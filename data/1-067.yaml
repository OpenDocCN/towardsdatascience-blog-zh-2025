- en: How To Build a Graph-Based Recommendation Engine Using EDG and Neo4j
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用EDG和Neo4j构建基于图的推荐引擎
- en: 原文：[https://towardsdatascience.com/how-to-build-a-recommendation-engine-using-edg-and-neo4j/](https://towardsdatascience.com/how-to-build-a-recommendation-engine-using-edg-and-neo4j/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-a-recommendation-engine-using-edg-and-neo4j/](https://towardsdatascience.com/how-to-build-a-recommendation-engine-using-edg-and-neo4j/)
- en: <mdspan datatext="el1763603428482" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763603428482" class="mdspan-comment">引言</mdspan>
- en: In this tutorial, I’ll show you how to manage a taxonomy in EDG and publish
    it to a Neo4j instance, where it can be populated with additional data to power
    a recommendation engine. The taxonomy, which is built and maintained in [TopQuadrant’s](https://www.topquadrant.com/)
    EDG, defines the structure. A set of (fake) academic journal articles serves as
    the instance data that populates [Neo4j](https://neo4j.com/). I’ll use a small
    hierarchy of STEM categories as the taxonomy to organize the articles. [This data](https://info.arxiv.org/help/license/index.html#metadata-license)
    is covered under the [Creative Commons CC0 1.0 Universal Public Domain Dedication](https://creativecommons.org/publicdomain/zero/1.0/).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程中，我将向您展示如何在EDG中管理分类法并将其发布到Neo4j实例中，在那里它可以填充额外的数据以驱动推荐引擎。在[TopQuadrant的](https://www.topquadrant.com/)
    EDG中构建和维护的分类法定义了结构。一组（虚构的）学术期刊文章作为实例数据，用于填充[Neo4j](https://neo4j.com/)。我将使用一个小型的STEM类别层次结构作为分类法来组织文章。[这些数据](https://info.arxiv.org/help/license/index.html#metadata-license)受[Creative
    Commons CC0 1.0 Universal Public Domain Dedication](https://creativecommons.org/publicdomain/zero/1.0/)的版权保护。
- en: '***Note 1:** Full disclosure — I work at TopQuadrant, the company that makes
    EDG, so I’m naturally biased toward the tools I know well. Both Neo4j and TopQuadrant’s
    EDG are commercial products and not open source. They each offer free trial versions
    suitable for following along with this tutorial: Neo4j provides one free cloud
    database instance (with limits on data volume, memory, and CPU), and TopQuadrant
    offers a 90-day free trial of EDG Desktop. Also, while the architecture outlined
    here has its benefits, it’s not the only approach, and these aren’t the only vendors
    capable of supporting this type of workflow. The pros and cons of this approach
    are listed below.*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '***注意1：完全披露——我在TopQuadrant工作，这是制作EDG的公司，因此我自然倾向于我熟悉的工具。Neo4j和TopQuadrant的EDG都是商业产品，不是开源的。它们各自提供适合跟随本教程的免费试用版本：Neo4j提供了一个免费的云数据库实例（数据量、内存和CPU有限制），而TopQuadrant提供EDG
    Desktop的90天免费试用。虽然这里概述的架构有其优点，但这不是唯一的方法，而且这些不是唯一能够支持此类工作流程的供应商。此方法的优缺点如下。***'
- en: '***Note 2:** [Here](https://learn.topquadrant.com/featurefocus-neo4j) is a
    video recording of what this demo looks like.*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '***注意2：[这里](https://learn.topquadrant.com/featurefocus-neo4j)是关于这个演示的视频记录。***'
- en: '***Note 3:** All images in this post are created by author.*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '***注意3：本帖中的所有图片均由作者创建。***'
- en: '![](../Images/991744f6d9bc26fff21897e4dfaf5625.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/991744f6d9bc26fff21897e4dfaf5625.png)'
- en: What’s the point of all of this? The point is that a lot of meaning lives in
    the taxonomy itself. Each article is tagged with the most specific category that
    applies, but because the taxonomy encodes parent–child relationships, we can infer
    higher-level associations automatically. For example, if an article is tagged
    with *Mathematical Software*, it’s also about *Computer Science* and *STEM*, even
    if it isn’t explicitly tagged that way. The taxonomy doesn’t just classify, it
    enables reasoning over how topics relate, so the data source only needs to record
    the most relevant tag, and the hierarchy fills in the rest.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些的目的是什么？目的是，大量的意义都存在于分类法本身。每篇文章都被标记为最具体的适用类别，但由于分类法编码了父子关系，我们可以自动推断出更高层次的关联。例如，如果一篇文章被标记为*数学软件*，那么它也涉及*计算机科学*和*STEM*，即使它没有明确地这样标记。分类法不仅进行分类，还使人们能够推理主题之间的关系，因此数据源只需要记录最相关的标签，而层次结构会填充其余部分。
- en: We are separating the instance level information on what an individual article
    is about from the meta information about the topics themselves and how they relate
    to each other.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在将关于单个文章主题的实例级信息与关于主题本身及其相互关系的元信息分开。
- en: 'The reasons you’d want to build with this kind of architecture are:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 您想要使用这种架构的原因是：
- en: '**Inferencing:** Tag with one concept but use the taxonomy to associate many
    other concepts to the content. Instead of tagging an article with *Mathematical
    Software* and *Computer Science*, I can just tag it with *Mathematical Software*.
    The taxonomy knows that *Mathematical Software* is a branch of *Computer Science*.
    The parent concept, *Computer Science*, can be inferred based on the taxonomy.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**推理：** 使用一个概念进行标记，但使用分类法将许多其他概念与内容关联起来。与其将文章标记为 *Mathematical Software* 和
    *Computer Science*，我只需将其标记为 *Mathematical Software*。分类法知道 *Mathematical Software*
    是 *Computer Science* 的一个分支。基于分类法，可以推断出父概念 *Computer Science*。'
- en: '**Aligning multiple systems:** I can use one taxonomy to build a recommendation
    engine in Neo4j and a GraphRAG application in [GraphDB](https://graphwise.ai/components/graphdb/).
    One team can use vector-based tagging on content stored in SharePoint while another
    uses NLP rule-based tagging on content stored in Adobe Experience Manager (AEM).
    All of these apps are aligned because they’re all using the same reference data.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对齐多个系统：** 我可以使用一个分类法在 Neo4j 中构建推荐引擎，在 [GraphDB](https://graphwise.ai/components/graphdb/)
    中构建 GraphRAG 应用。一个团队可以在 SharePoint 中存储的内容上使用基于向量的标记，而另一个团队则使用基于 NLP 规则的标记在 Adobe
    Experience Manager (AEM) 中存储的内容上。所有这些应用都是对齐的，因为它们都在使用相同的参考数据。'
- en: '**Change management:** If I want to recategorize *Mathematical Software* as
    a branch of *Mathematics* rather than a branch of *Computer Science,* I just need
    to change its parent in the taxonomy. If I don’t have a separate taxonomy, I’d
    need to retag every document tagged with *Mathematical Software.* If I have multiple
    downstream apps using the same list of terms, this becomes a nightmare. I’d need
    to retag every entity tagged with *Mathematical Software* in every application
    and ensure all the other tags associated with that document are correct.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**变更管理：** 如果我想将 *Mathematical Software* 重新分类为 *Mathematics* 的一个分支而不是 *Computer
    Science* 的一个分支，我只需更改它在分类法中的父类。如果没有单独的分类法，我需要重新标记所有标记为 *Mathematical Software*
    的文档。如果有多个下游应用使用相同的术语列表，这将成为一场噩梦。我需要在每个应用中重新标记所有标记为 *Mathematical Software* 的实体，并确保与该文档相关联的所有其他标签都是正确的。'
- en: '**Play to tools’ strengths:** EDG is great and managing metadata and taxonomies
    and ensuring those things are aligned and governed well. Neo4j and other graph
    databases are great at high-performance graph analytics at scale but struggle
    with the metadata management side of things. With this set up, we can get the
    best of both worlds'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**发挥工具的优势：** EDG 在管理元数据和分类法以及确保这些事物对齐和良好治理方面表现优秀。Neo4j 和其他图数据库在可扩展的高性能图分析方面表现卓越，但在元数据管理方面存在挑战。在这种配置下，我们可以兼得两者之长。'
- en: 'There are other architectural approaches to building something like this, of
    course, and there are drawbacks to the approach I outline here. Some of the main
    ones include:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，还有其他构建类似架构的方法，而且我概述的方法也存在一些缺点。其中主要的一些包括：
- en: '**Overkill for simple use cases:** This tutorial uses a simple demo, but the
    architecture makes the most sense when your data and use cases are complex. Most
    graph databases, including Neo4j, let you define a schema or basic ontology and
    represent taxonomies with hierarchical relationships. If your data is relatively
    simple, your taxonomy is straightforward, or only one team needs to use it, you
    may not need this many tools.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对于简单用例过度：** 这个教程使用了一个简单的演示，但当你数据和用例复杂时，这种架构才最有意义。大多数图数据库，包括 Neo4j，都允许你定义模式或基本本体，并用层次关系表示分类法。如果你的数据相对简单，你的分类法很简单，或者只有一个团队需要使用它，你可能不需要这么多工具。'
- en: '**Skillset and learning curve:** Using EDG and Neo4j together assumes familiarity
    with two different paradigms: ontology modeling in RDF/SHACL and graph querying
    in property graphs/Cypher. Many teams are comfortable with one but not the other.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**技能集和学习曲线：** 使用 EDG 和 Neo4j 一起假设对两种不同的范式熟悉：在 RDF/SHACL 中的本体建模和在属性图/Cypher
    中的图查询。许多团队对其中一种范式感到舒适，但对另一种则不然。'
- en: '**More moving parts:** Keeping a taxonomy separate from the data you are tagging
    means you need to ensure that the tags align with the taxonomy. If they drift,
    the graph stops fitting together cleanly in the database.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**更多移动部件：** 将分类法与您标记的数据分开意味着您需要确保标签与分类法对齐。如果它们发生偏移，图在数据库中就无法干净地组合在一起。'
- en: '**Vendor lock-in:** Both Neo4j and EDG are commercial products so there is
    always going to be some lock-in and potential migration costs. The standards underlying
    EDG (RDF, SHACL, and [SPARQL](https://www.w3.org/TR/sparql12-query/)), are open
    source standards from the [W3C](https://www.w3.org/), which does mitigate overall
    technical lock-in.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**供应商锁定：**Neo4j 和 EDG 都是商业产品，因此总会有一些锁定和潜在的迁移成本。EDG 的底层标准（RDF、SHACL 和 [SPARQL](https://www.w3.org/TR/sparql12-query/)）是来自
    [W3C](https://www.w3.org/) 的开源标准，这有助于减轻整体技术锁定。'
- en: Neo4j is a labeled property graph (LPG). EDG is a knowledge graph curation tool
    based in [RDF](https://www.w3.org/RDF/) and [SHACL](http://w3.org/TR/shacl/).
    LPGs and RDF are two different graph technologies that, historically, have not
    been compatible. EDG has recently built a Neo4j integration feature, however,
    which allows users to build using both technologies.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Neo4j 是一个带标签的属性图（LPG）。EDG 是一个基于 [RDF](https://www.w3.org/RDF/) 和 [SHACL](http://w3.org/TR/shacl/)
    的知识图谱编辑工具。LPG 和 RDF 是两种不同的图技术，在历史上它们并不兼容。然而，EDG 最近构建了一个 Neo4j 集成功能，允许用户使用这两种技术来构建。
- en: Below is a visual representation of how these two technologies can work together.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这两种技术如何协同工作的可视化表示。
- en: '![](../Images/a6bd76d1340537dd9a43b7452c4c99a8.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a6bd76d1340537dd9a43b7452c4c99a8.png)'
- en: At the bottom in pink, you have data storage. I have this split into internal
    data and external data. Internal data is the raw data you could be storing in
    a data lake, a content management system (CMS) like SharePoint, or a relational
    database. There may also be external datasets you want to integrate into your
    app. These could be public, free data sources like [WikiData](https://www.wikidata.org/wiki/Wikidata:Main_Page),
    upper level ontologies like [gist](https://www.semanticarts.com/gist/), or proprietary
    reference datasets like [SNOMED](https://www.snomed.org/) or [MedDRA](https://www.meddra.org/)
    (medical taxonomies).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在底部以粉色显示的是数据存储。我将这些分为内部数据和外部数据。内部数据是您可以存储在数据湖、内容管理系统（CMS）如 SharePoint 或关系型数据库中的原始数据。还可能有您想要集成到应用程序中的外部数据集。这些可能是公共、免费的数据源，如
    [WikiData](https://www.wikidata.org/wiki/Wikidata:Main_Page)，高级本体如 [gist](https://www.semanticarts.com/gist/)，或专有参考数据集，如
    [SNOMED](https://www.snomed.org/) 或 [MedDRA](https://www.meddra.org/)（医疗分类）。
- en: EDG can then act as the semantic layer between the underlying data and downstream
    apps. You can manage your ontologies, taxonomies, reference data, and metadata
    in one place and push what you need to applications like Neo4j as needed. You
    can also load data directly from your underlying data sources into Neo4j or any
    other application.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: EDG 可以作为底层数据和下游应用之间的语义层。您可以在一个地方管理您的本体、分类法、参考数据和元数据，并在需要时将所需内容推送到像 Neo4j 这样的应用程序。您还可以直接从底层数据源将数据加载到
    Neo4j 或任何其他应用程序中。
- en: 'Step 1: Get free versions of EDG and Neo4j'
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 1 步：获取 EDG 和 Neo4j 的免费版本
- en: First, we are going to need to get free versions of these products to play around
    with.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要获取这些产品的免费版本来尝试。
- en: For EDG, you’ll need to go to [this](https://learn.topquadrant.com/get-started-free)
    website and request a free trial. You’ll get a link to download EDG along with
    a license in an email. After the download completes, there is an executable file
    in the edg folder, also called edg. Double click that and it should start running
    in your browser. If you don’t have Java installed, it will prompt you to install
    Java first.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 EDG，您需要访问 [这个](https://learn.topquadrant.com/get-started-free) 网站，并请求免费试用。您将通过电子邮件获得下载
    EDG 和许可证的链接。下载完成后，edg 文件夹中有一个可执行文件，也称为 edg。双击它，它应该在您的浏览器中启动。如果您没有安装 Java，它将提示您首先安装
    Java。
- en: '![](../Images/715cbb2738c983c85c1a03ce4b96e1e5.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/715cbb2738c983c85c1a03ce4b96e1e5.png)'
- en: EDG will then open in your browser in a new tab called something like [http://localhost:8083/](http://localhost:8083/).
    But it will say it is not registered. Click on Product Registration and then upload
    the license file that was also sent in the email. Then click “Register Product”.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然后 EDG 将在新标签页中打开，标签页名称可能类似于 [http://localhost:8083/](http://localhost:8083/)。但它会显示它尚未注册。点击“产品注册”，然后上传随电子邮件一起发送的许可证文件。然后点击“注册产品”。
- en: '![](../Images/d0582e24327563dcb4e97fc71b45362f.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d0582e24327563dcb4e97fc71b45362f.png)'
- en: After uploading the license, you can go back to the home screen by clicking
    the TopQuadrant logo in the top left corner. Now you should be able to see the
    main EDG landing page.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 上传许可证后，您可以通过点击左上角的 TopQuadrant 标志返回主页。现在您应该能够看到主要的 EDG 登录页面。
- en: '![](../Images/2bbb067fc09546caecf95b3b18b01632.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2bbb067fc09546caecf95b3b18b01632.png)'
- en: 'Now we need a free version of Neo4j. Go to [this link](https://console.neo4j.io/)
    to get started with your free trial. If you don’t have an account already, you
    will need to make one. After you create a Neo4j account you will land on a screen
    like this:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要一个Neo4j的免费版本。访问[这个链接](https://console.neo4j.io/)开始你的免费试用。如果你还没有账户，你需要创建一个。创建Neo4j账户后，你会看到一个类似这样的屏幕：
- en: '![](../Images/87712ce2fb588545480875b1bb5834dc.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87712ce2fb588545480875b1bb5834dc.png)'
- en: Click “Create instance” and then select the free option.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“创建实例”然后选择免费选项。
- en: '![](../Images/a03796c692370c02a3188159ef40dae0.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a03796c692370c02a3188159ef40dae0.png)'
- en: When you click “Create instance” you will be shown your username and password.
    The username is usually just “Neo4j” but the password is unique, so write it down
    somewhere.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当你点击“创建实例”时，你会看到你的用户名和密码。用户名通常是“Neo4j”，但密码是唯一的，所以请记下来。
- en: 'Step 2: Set up integration'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步：设置集成
- en: In EDG, in the top right corner, click on the user icon (it looks like a person).
    Then click “Server Administration”. This will take you to a screen with a bunch
    of options. Click “Product Configuration Parameters”. On the left toolbar you
    will see a bunch of integration options. Click “Neo4j”.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在EDG中，在右上角点击用户图标（它看起来像一个人）。然后点击“服务器管理”。这将带你去一个有很多选项的屏幕。点击“产品配置参数”。在左侧工具栏中，你会看到很多集成选项。点击“Neo4j”。
- en: '![](../Images/612ac9774390792f8effb68f0496ecb5.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/612ac9774390792f8effb68f0496ecb5.png)'
- en: You can configure this to push to multiple Neo4j databases, but for this tutorial
    we will just point to the Neo4j instance we just created. On the right side of
    the empty Neo4j database line there is a plus sign. Click that and you will be
    prompted to enter the Neo4j credentials.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以配置它将数据推送到多个Neo4j数据库，但在这个教程中，我们将只指向我们刚刚创建的Neo4j实例。在空白的Neo4j数据库行右侧有一个加号。点击它，你将被提示输入Neo4j凭据。
- en: '![](../Images/1c346eaaaef2f74a93e696a5d34ee1f0.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1c346eaaaef2f74a93e696a5d34ee1f0.png)'
- en: 'You can name this configuration anything but I chose “neo4jtest1”. The ID should
    be autofilled by EDG. For the Neo4j database URL, you will need to inspect the
    Neo4j instance you created in Neo4j. It will look something like this: neo4j+s://cd227570.databases.neo4j.io.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以给这个配置起任何名字，但我选择了“neo4jtest1”。ID应该会由EDG自动填写。对于Neo4j数据库URL，你需要检查你在Neo4j中创建的Neo4j实例。它看起来可能像这样：neo4j+s://cd227570.databases.neo4j.io。
- en: Click “Create and Select”. Now you will need to enter your password. This is
    the one that Neo4j gave you when you created your Neo4j instance.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“创建并选择”。现在你需要输入你的密码。这是Neo4j在你创建Neo4j实例时给你的那个。
- en: '![](../Images/d316dab484356e5671c7352a30570b58.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d316dab484356e5671c7352a30570b58.png)'
- en: Now we are all configured.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们都已经配置好了。
- en: 'Step 3: Import taxonomy'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步：导入分类法
- en: Go to my GitHub and download [this taxonomy](https://github.com/SteveHedden/kg_llm/blob/main/arxiv_benchmark_taxonomy_steve.zip).
    This is a list of STEM topics in a hierarchy i.e. a taxonomy.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 前往我的GitHub并下载[这个分类法](https://github.com/SteveHedden/kg_llm/blob/main/arxiv_benchmark_taxonomy_steve.zip)。这是一个STEM主题的分层列表，即分类法。
- en: Click “New +” at the top of the screen in EDG then “Import asset collections
    from TriG or Zip file”. Choose the zip file you got from my GitHub and load it
    into EDG. Click Finish. When you go to the taxonomy you should see a hierarchical
    list of a bunch of different STEM categories.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在EDG屏幕顶部点击“新建+”然后选择“从TriG或Zip文件导入资产集合”。选择你从我的GitHub获得的zip文件并将其加载到EDG中。点击完成。当你转到分类法时，你应该会看到一个包含许多不同STEM类别的分层列表。
- en: '![](../Images/ae07191385ee161edee49569771f97da.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ae07191385ee161edee49569771f97da.png)'
- en: 'Step 4: Push taxonomy to Neo4j'
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步：将分类法推送到Neo4j
- en: Click the cloud dropdown to manage integrations. In the dropdown menu you will
    see the option to “Link to Neo4j Database”.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 点击云下拉菜单来管理集成。在下拉菜单中，你会看到一个“链接到Neo4j数据库”的选项。
- en: '![](../Images/701aa6b4e8615d148be440b974ef8f85.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/701aa6b4e8615d148be440b974ef8f85.png)'
- en: When you click this you will be able to choose which Neo4j integration you want
    to use. Click the one you created in step 2 above.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当你点击这个选项时，你将能够选择你想要使用的Neo4j集成。点击你在第2步中创建的那个。
- en: '![](../Images/56439b28e222f7fbb428b98db9756b88.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/56439b28e222f7fbb428b98db9756b88.png)'
- en: After you select the Neo4j integration, the integration between this taxonomy
    and your Neo4j instance will be created. It will look like the popup below. Click
    the integration to navigate to it. In my example below it is called “Integration
    with Neo4j database neo4jtest1”. Then click “Ok”.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在您选择Neo4j集成后，此分类法与您的Neo4j实例之间的集成将被创建。它看起来像下面的弹出窗口。点击集成以导航到它。在我的示例中，它被称为“与Neo4j数据库neo4jtest1的集成”。然后点击“确定”。
- en: '![](../Images/88d9fecaa2a92fc976ba8f1a3c88fdb4.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/88d9fecaa2a92fc976ba8f1a3c88fdb4.png)'
- en: The integration will now appear in the editor and we can change any settings
    if we want. You’ll notice next to the cloud dropdown there is a icon for pushing
    to integrated systems that looks like a cloud with an arrow on it.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在集成将出现在编辑器中，如果我们想的话，我们可以更改任何设置。你会注意到云下拉菜单旁边有一个看起来像带有箭头的云的图标，用于将内容推送到集成系统。
- en: '![](../Images/e2fb7d349043fd09ae58b7209622dbba.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e2fb7d349043fd09ae58b7209622dbba.png)'
- en: Click edit and then scroll down to “included classes”. This is where we specify
    which classes in our taxonomy we want to push to this Neo4j instance. For this
    tutorial, select “Concept”. This should include everything in the taxonomy. This
    may seem unnecessary, but it is important for large taxonomies with many kinds
    of classes.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 点击编辑，然后滚动到“包含的类”。这是我们指定我们想要推送到此Neo4j实例中的分类法中的哪些类的位置。对于这个教程，选择“概念”。这应该包括分类法中的所有内容。这看起来可能是不必要的，但对于具有许多不同类的大型分类法来说，这是很重要的。
- en: '![](../Images/d5fa94f1cf2d307d801a062390eaa97c.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5fa94f1cf2d307d801a062390eaa97c.png)'
- en: Also select “always overwrite” to be “True”. This ensures that when we push,
    we overwrite whatever is in the Neo4j instance.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 还选择“总是覆盖”为“True”。这确保了当我们推送时，我们将覆盖Neo4j实例中的任何内容。
- en: '![](../Images/9224efa9b909782c49300521c880c56e.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9224efa9b909782c49300521c880c56e.png)'
- en: Now click “Save Changes”.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在点击“保存更改”。
- en: Back in the editor interface, click the cloud push icon that is in the top toolbar
    now that we have established a Neo4j integration. A popup should appear that looks
    like the image below. If we have multiple integrations configured with multiple
    different applications, we’d see them all here. For this tutorial, you should
    just see the one you made and it should be automatically selected. Now click “Ok”.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在编辑器界面中，点击现在我们已经建立了Neo4j集成后的顶部工具栏中的云推送图标。应该会出现一个看起来像下面图片的弹出窗口。如果我们配置了多个与多个不同应用程序集成的集成，我们会在这里看到它们。对于这个教程，你应该只看到你创建的那个，并且它应该自动被选中。现在点击“确定”。
- en: '![](../Images/cc8c66d68265d7b50d336cc27b7e6214.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cc8c66d68265d7b50d336cc27b7e6214.png)'
- en: You should see a progress bar of your concepts getting pushed to Neo4j.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该会看到一个进度条，显示你的概念正在被推送到Neo4j。
- en: '![](../Images/aa789d502f7fba957592323596403ba1.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aa789d502f7fba957592323596403ba1.png)'
- en: 'Step 5: Explore data in Neo4j'
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步：在Neo4j中探索数据
- en: Now go back to your Neo4j Aura instance. If you click Instances on the left
    toolbar you will see the instance we created in Step 1\. Now you will see that
    there are Nodes and Relationships in it!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在回到你的Neo4j Aura实例。如果你点击左侧工具栏上的“实例”，你会看到我们在第1步中创建的实例。现在你会看到其中包含节点和关系！
- en: '![](../Images/af9eecc7ec66ce8f4684e48de417dcc3.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/af9eecc7ec66ce8f4684e48de417dcc3.png)'
- en: You can click “Connect” and then “Explore” which will take you to a visual representation
    of your graph.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以点击“连接”，然后点击“探索”，这将带你到你的图的视觉表示。
- en: '![](../Images/e4a15e2c1ef29c60888668d143cb820f.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e4a15e2c1ef29c60888668d143cb820f.png)'
- en: Below is the visual explorer of Neo4j Aura. You can just search on the generic
    term “Resource – BROADER – Resource” to see all of the concepts we pushed from
    EDG along with their parent concepts.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是Neo4j Aura的视觉探索器。你只需在通用术语“资源 – 广义 – 资源”上搜索，就可以看到我们从EDG推送的所有概念及其父概念。
- en: '![](../Images/dd11afe4558383e96e75156d0071b5e2.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dd11afe4558383e96e75156d0071b5e2.png)'
- en: 'Step 6: Upload articles to Neo4j'
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6步：将文章上传到Neo4j
- en: Download a list of journal articles from my GitHub [here](https://github.com/SteveHedden/kg_llm/blob/main/Articles.csv).
    This is a short list of fake academic journal articles. The idea here is that
    we want the taxonomy to come from EDG but the article metadata to come from somewhere
    else.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 从我的GitHub[这里](https://github.com/SteveHedden/kg_llm/blob/main/Articles.csv)下载一份期刊文章列表。这是一份假的学术期刊文章的简短列表。这里的想法是我们希望分类法来自EDG，而文章元数据来自其他地方。
- en: Now in Neo4j, click “Import” on the left toolbar and “New data source”. A list
    of options will appear. You could import your instance data from anywhere, but
    for this tutorial we will just upload the csv file directly. The source of data
    doesn’t matter, what matters is that the instance data is tagged with terms that
    come from the taxonomy that we are managing in EDG. That is how we can align the
    article metadata with our taxonomy and broader semantic layer.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在 Neo4j 中，点击左侧工具栏中的“导入”和“新数据源”。将出现一个选项列表。你可以从任何地方导入你的实例数据，但在这个教程中，我们只是直接上传
    csv 文件。数据源不重要，重要的是实例数据被标记了来自我们在 EDG 中管理的分类法中的术语。这就是我们如何将文章元数据与我们的分类法和更广泛的语义层对齐。
- en: '![](../Images/6ce0bfc5570457fe89b8af1bd034dd80.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6ce0bfc5570457fe89b8af1bd034dd80.png)'
- en: Upload the csv you downloaded from my GitHub. You will then be asked how you
    want to define your model. Select “Generate from schema”.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 上传从我的 GitHub 下载的 csv 文件。然后你会被询问如何定义你的模型。选择“从模式生成”。
- en: '![](../Images/16147f6603e022758a8557bc5f88768c.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/16147f6603e022758a8557bc5f88768c.png)'
- en: You’ll see Articles.csv pop up as a node. Click the node. You’ll need to specify
    which property you want to use as the primary key. There is a property in this
    list of articles called “id” which we will use as the primary key. To set this
    as the key, click the key icon in the bottom right for the “id” row. Then select
    “Run Import”.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你会看到 Articles.csv 作为节点出现。点击该节点。你需要指定想要用作主键的属性。在这个文章列表中有一个名为“id”的属性，我们将使用它作为主键。要将此设置为键，点击“id”行右下角的键图标。然后选择“运行导入”。
- en: '![](../Images/ecfb18c9727d7eff859daaf56b2063a8.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ecfb18c9727d7eff859daaf56b2063a8.png)'
- en: You will be prompted to enter the password for this instance, which is the one
    you wrote down at the beginning. It will take a second to run but then you will
    get this popup of Import results.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你将被提示输入此实例的密码，这是你最初记下的那个。运行需要一秒钟，然后你会得到一个导入结果的弹出窗口。
- en: '![](../Images/39e05361efbc80edb7657fdab0d458f3.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39e05361efbc80edb7657fdab0d458f3.png)'
- en: You can see that 15 nodes were created. The csv file contained 15 articles and
    each of them became a node. Now we can go back to the Explore feature and search
    for “Articles.csv”. You’ll see Articles show up in the visual in pink alongside
    the STEM categories in green. This is great but they are not yet linked. To connect
    the instance data (articles) to the categories, we need to run a cypher query.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到创建了15个节点。csv 文件包含了15篇文章，每篇文章都变成了一个节点。现在我们可以回到“探索”功能并搜索“Articles.csv”。你会看到文章以粉红色出现在视觉中，与绿色STEM类别并列。这很好，但它们还没有连接。要将实例数据（文章）与类别连接，我们需要运行一个
    cypher 查询。
- en: '![](../Images/7407d4d5c91475c3729f9a56035055dd.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7407d4d5c91475c3729f9a56035055dd.png)'
- en: 'Step 7: Connect instance data with taxonomy'
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7步：将实例数据与分类关联
- en: 'Click Query in the left toolbar. In the query box enter:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧工具栏中点击“查询”。在查询框中输入：
- en: '[PRE0]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'It should look like this:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 它应该看起来像这样：
- en: '![](../Images/b27b4e0714e6a8c0e9e3a8bd50e7998b.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b27b4e0714e6a8c0e9e3a8bd50e7998b.png)'
- en: Then press “Run”. You’ll see right under that query something that will say
    “Created 15 relationships”. That’s a good sign. Now go back to the Explorer. Now
    search for “Articles.csv – TAGGED_WITH – Resource”. You’ll see that all of those
    pink nodes are now connected to our green taxonomy!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 然后按“运行”。你会在查询下方看到“创建了15个关系”。这是一个好兆头。现在回到“资源管理器”。现在搜索“Articles.csv – TAGGED_WITH
    – Resource”。你会看到所有那些粉红色的节点现在都连接到了我们的绿色分类法！
- en: '![](../Images/e43989136c715babbea95ac2101e8fd1.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e43989136c715babbea95ac2101e8fd1.png)'
- en: 'Step 8: Build a recommendation engine'
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第8步：构建推荐引擎
- en: 'We are going to run some very basic similarity queries to demonstrate how you’d
    use the graph we just built for recommendations. First, let’s look at an article
    and which category it is tagged with. Enter this cypher query into query interface.
    This will list the categories that the article “Advances in Mathematical Software
    Studies #7” was tagged with.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '我们将运行一些非常基础的相似度查询来展示如何使用我们刚刚构建的图进行推荐。首先，让我们看看一篇文章及其被标记的类别。将以下 cypher 查询输入到查询界面。这将列出文章“Advances
    in Mathematical Software Studies #7”被标记的类别。'
- en: '[PRE1]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You should see the following output and the category “Mathematical Software”.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到以下输出和类别“Mathematical Software”。
- en: '![](../Images/5e642c63216f7332a2eea595e0a0c2ec.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5e642c63216f7332a2eea595e0a0c2ec.png)'
- en: Suppose we want to find articles similar to this page turner because we want
    to recommend them to potential readers. We can look for other articles that are
    also tagged with Mathematical Software, but we can also take advantage of taxonomical
    structure we have in our graph. *Mathematical Software* is a subclass of *Computer
    Science*, according to the STEM taxonomy. You can go back to EDG to explore the
    categories and their children. For our recommendation engine, to find articles
    similar to our *Mathematical Software* article, we want to find other articles
    that are tagged with *Mathematical Software*, but ALSO articles tagged with other
    branches of computer science.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要找到与这篇引人入胜的文章相似的文章，因为我们想向潜在的读者推荐它们。我们可以寻找也被标记为数学软件的其他文章，但我们可以利用我们在图中已有的分类结构。根据STEM分类法，*数学软件*是*计算机科学*的一个子类。你可以回到EDG去探索类别及其子类别。对于我们的推荐引擎，为了找到与我们的*数学软件*文章相似的文章，我们想要找到被标记为*数学软件*的其他文章，但也想要找到被标记为计算机科学其他分支的文章。
- en: 'We can do that with the following cypher query:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用以下Cypher查询来实现：
- en: '[PRE2]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'You should get the following results:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该得到以下结果：
- en: '![](../Images/d4d4ba47ed6669d0ed292f3f33c17f31.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4d4ba47ed6669d0ed292f3f33c17f31.png)'
- en: There are no other articles tagged with *Mathematical Software*, but there are
    articles tagged with other branches of computer science. “Advances in Computers
    and Society Studies” is an article tagged with the category “Computers and Society”.
    This is recommended because the graph knows that both *Computers and Society*
    and *Mathematical Software* are branches of *Computer Science.*
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 没有其他文章被标记为*数学软件*，但有文章被标记为计算机科学的其他分支。“计算机与社会研究进展”是一篇被标记为“计算机与社会”类别的文章。这是推荐的，因为图知道*计算机与社会*和*数学软件*都是*计算机科学*的分支。
- en: 'Step 9: Adjusting our taxonomy'
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第9步：调整我们的分类法
- en: I mentioned earlier that one reason you’d want to separate your taxonomy from
    your graph database is so you can make changes to your taxonomy and easily see
    the downstream effects in your apps. Let’s try that.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前提到，你想要将你的分类法与你的图数据库分开的一个原因是你可以在你的分类法中做出更改，并轻松地在你的应用程序中看到下游的影响。让我们试试。
- en: Suppose we want to recategorize *Mathematical Software* as a branch of *Mathematics*
    rather than a branch of *Computer Science*. To do this in our taxonomy, we just
    drag and drop the term in the tree structure in EDG.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要将*数学软件*重新归类为*数学*的一个分支，而不是计算机科学的一个分支。要在我们的分类法中这样做，我们只需在EDG的树结构中将术语拖放即可。
- en: '![](../Images/23a4df085afd05c559af594ebaf7824b.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23a4df085afd05c559af594ebaf7824b.png)'
- en: Now push the taxonomy back into Neo4j using the same cloud button.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 现在通过相同的云按钮将分类法推回Neo4j。
- en: '![](../Images/78eac5136a9ddad2c4503d0d6cd8dcde.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/78eac5136a9ddad2c4503d0d6cd8dcde.png)'
- en: Now when we go back to Neo4j and run the recommendation algorithm again, the
    results are totally different. This is because our original article was tagged
    with *Mathematical Software*, which we’ve now classified as a branch of *Mathematics*.
    The other articles that are recommended to us are other articles about math, not
    computer science.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们回到Neo4j再次运行推荐算法，结果完全不同。这是因为我们的原始文章被标记为*数学软件*，我们现在将其归类为*数学*的一个分支。推荐给我们的其他文章都是关于数学的文章，而不是计算机科学。
- en: '![](../Images/5cca1a4c83da34d1c5094f35921e5bd9.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5cca1a4c83da34d1c5094f35921e5bd9.png)'
- en: Conclusion
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This simple demo shows how a taxonomy can bring structure, flexibility, and
    intelligence to your data applications. By separating your taxonomy (in EDG) from
    your instance metadata (in Neo4j), you gain the ability to infer relationships,
    align systems, and evolve your model over time, without having to retag or rebuild
    downstream apps. The result is a modular architecture that makes your graph smarter
    as your understanding of the domain grows.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的演示展示了分类法如何为你的数据应用带来结构、灵活性和智能。通过将你的分类法（在EDG中）与你的实例元数据（在Neo4j中）分开，你获得了推断关系、对齐系统和随着时间的推移发展你的模型的能力，而无需重新标记或重建下游应用程序。结果是模块化架构，随着你对领域理解的加深，你的图变得更智能。
- en: '**About the author: **Steve Hedden is the Head of Product Management at [TopQuadrant](https://www.topquadrant.com/),
    where he leads the strategy for EDG, a platform for knowledge graph and metadata
    management. His work focuses on bridging enterprise data governance and AI through
    ontologies, taxonomies, and semantic technologies. Steve writes and speaks regularly
    about knowledge graphs, and the evolving role of semantics in AI systems.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于作者：**Steve Hedden是[TopQuadrant](https://www.topquadrant.com/)的产品管理负责人，在那里他领导着知识图谱和元数据管理平台EDG的战略。他的工作专注于通过本体、分类法和语义技术将企业数据治理与人工智能连接起来。Steve经常撰写和发表关于知识图谱以及语义在人工智能系统演变中的角色的文章和演讲。'
