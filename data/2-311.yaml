- en: How to Reduce Your Power BI Model Size by 90%
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何将您的Power BI模型大小减少90%
- en: 原文：[https://towardsdatascience.com/how-to-reduce-your-power-bi-model-size-by-90/](https://towardsdatascience.com/how-to-reduce-your-power-bi-model-size-by-90/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-reduce-your-power-bi-model-size-by-90/](https://towardsdatascience.com/how-to-reduce-your-power-bi-model-size-by-90/)
- en: '*<mdspan datatext="el1748302398761" class="mdspan-comment">Have you ever wondered</mdspan>
    what makes Power BI so fast and powerful when it comes to performance? So powerful,
    that it performs complex calculations over millions of rows in the blink of an
    eye.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1748302398761" class="mdspan-comment">您是否曾想过</mdspan>是什么让Power
    BI在性能上如此快、如此强大？强大到它能在瞬间完成数百万行的复杂计算。*'
- en: '*In this article, we will dig deep to discover what is “under the hood” of
    Power BI, how your data is being stored, compressed, queried, and finally, brought
    back to your report. Once you finish reading, I hope that you will get a better
    understanding of the hard work happening in the background and appreciate the
    importance of creating an optimal data model to get maximum performance from the
    Power BI engine.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*在这篇文章中，我们将深入挖掘，了解Power BI的“内部机制”，了解您的数据是如何被存储、压缩、查询，最后被带回您的报告中的。一旦您阅读完毕，我希望您能更好地理解后台发生的辛勤工作，并欣赏创建一个最佳数据模型以从Power
    BI引擎中获得最佳性能的重要性。*'
- en: First look under the hood — Formula Engine and Storage Engine
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 首先看看内部机制——公式引擎和存储引擎
- en: First, I want you to meet the **VertiPaq** engine, “brain & muscles” of the
    system behind not only Power BI, but also Analysis Services Tabular and Excel
    Power Pivot. Truth to be said, VertiPaq represents only one part of the storage
    engine within the Tabular model, besides DirectQuery, which we will discuss separately
    in one of the next articles.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我想向您介绍**VertiPaq**引擎，它是系统背后的“大脑和肌肉”，不仅包括Power BI，还包括Analysis Services Tabular和Excel
    Power Pivot。说实话，VertiPaq只是Tabular模型中存储引擎的一部分，除了DirectQuery，我们将在下一篇文章中单独讨论。
- en: 'When you send the query to get data for your Power BI report, here is what
    happens:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当您发送查询以获取Power BI报告中的数据时，以下是会发生的情况：
- en: '*Formula Engine (FE)* accepts the request, processes it, generates the query
    plan, and finally executes it'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*公式引擎（FE）*接受请求，处理它，生成查询计划，并最终执行它。'
- en: '*Storage Engine (SE)* pulls the data out of the Tabular model to satisfy the
    request issued within the query generated by the Formula Engine'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*存储引擎（SE）*从Tabular模型中提取数据，以满足公式引擎生成的查询中发出的请求。'
- en: Storage Engine works in two different ways to retrieve requested data: VertiPaq keeps
    a snapshot of the data in memory. This snapshot can be refreshed from time to
    time from the original data source.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 存储引擎以两种不同的方式检索请求的数据：VertiPaq在内存中保留数据的快照。这个快照可以不时地从原始数据源刷新。
- en: On the contrary, *DirectQuery* doesn’t store any data. It just forwards the
    query straight to the data source for every single request.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，*DirectQuery*不会存储任何数据。它只是将查询直接转发到数据源，针对每个请求。
- en: '![](../Images/4ba370b6248ef5455039debe4746c5b2.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4ba370b6248ef5455039debe4746c5b2.png)'
- en: '[Photo by RKTW extend on Unsplash](https://unsplash.com/photos/2EHRBs1gefY)'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[Photo by RKTW extend on Unsplash](https://unsplash.com/photos/2EHRBs1gefY)'
- en: Data in the Tabular model is usually stored either as an in-memory snapshot
    (VertiPaq) or in DirectQuery mode. However, there is also a possibility of implementing
    a hybrid Composite model, which relies on both architectures in parallel.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: Tabular模型中的数据通常以内存快照（VertiPaq）或DirectQuery模式存储。然而，也存在实现混合复合模型的可能性，该模型同时依赖于这两种架构。
- en: Formula Engine — “Brain” of Power BI
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 公式引擎——Power BI的“大脑”
- en: As I already stressed, Formula Engine accepts the query, and since it’s able
    to “understand” DAX (and MDX also, but it is out of the scope of this series), it
    “translates” DAX into a specific query plan, consisting of physical operations
    that need to be executed to get results back.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前强调的，公式引擎接受查询，并且由于它能够“理解”DAX（以及MDX，但超出了本系列的范围），它“翻译”DAX成特定的查询计划，该计划由需要执行以获取结果的物理操作组成。
- en: Those physical operations can be joins between multiple tables, filtering, or
    aggregations. It’s important to know that Formula Engine works in a single-threaded
    way, which means that requests to Storage Engine are always being sent sequentially.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这些物理操作可以是多个表之间的连接、过滤或聚合。重要的是要知道，公式引擎以单线程方式工作，这意味着对存储引擎的请求总是按顺序发送。
- en: Storage Engine — “Muscles” of Power BI
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 存储引擎——Power BI的“肌肉”
- en: Once the query has been generated and executed by the Formula Engine, the Storage
    Engine comes into the scene. It physically goes through the data stored within
    the Tabular model (VertiPaq) or goes directly to a different data source (SQL
    Server, for example, if DirectQuery storage mode is in place).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦公式引擎生成并执行了查询，存储引擎就登场了。它物理地遍历 Tabular 模型（VertiPaq）中存储的数据，或者直接访问不同的数据源（例如，如果启用了
    DirectQuery 存储模式，则为 SQL Server）。
- en: 'When it comes to specifying the storage engine for the table, there are three
    possible options to choose from:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到指定表的存储引擎时，有三种可能的选择可供选择：
- en: '***Import mode*** — based on VertiPaq. Table data is being stored in memory
    as a snapshot. Data can be refreshed periodically'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**导入模式** — 基于 VertiPaq。表数据以快照的形式存储在内存中。数据可以定期刷新'
- en: '***DirectQuery mode*** — data is being retrieved from the data source at query
    time. Data resides in its original source before, during, and after the query
    execution'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DirectQuery 模式** — 在查询时从数据源检索数据。在查询执行之前、期间和之后，数据都位于其原始源中'
- en: '***Dual mode*** — a combination of the first two options. Data from the table
    is being loaded into memory, but at query time it can also be retrieved directly
    from the source'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双模式** — 前两种选项的组合。表中的数据被加载到内存中，但在查询时也可以直接从源中检索'
- en: As opposed to Formula Engine, which doesn’t support parallelism, the Storage
    Engine can work asynchronously.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 与不支持并行处理的公式引擎相反，存储引擎可以异步工作。
- en: Meet VertiPaq Storage Engine
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识 VertiPaq 存储引擎
- en: As we have drawn a big picture previously, let me explain in more detail what
    VertiPaq does in the background to boost the performance of our Power BI reports.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前已经绘制了一个大图，让我更详细地解释一下 VertiPaq 在后台是如何提升我们的 Power BI 报告性能的。
- en: 'When we choose Import mode for our Power BI tables, VertiPaq performs the following
    actions:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们为我们的 Power BI 表选择导入模式时，VertiPaq 执行以下操作：
- en: Reads the data source, transforms data into a columnar structure, encodes, and
    compresses data within each of the columns
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读取数据源，将数据转换为列式结构，并在每个列中对数据进行编码和压缩
- en: Establishes a dictionary and index for each of the columns
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个列建立字典和索引
- en: Prepares and establishes relationships
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准备并建立关系
- en: Computes all calculated columns and calculated tables, and compresses them
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算所有计算列和计算表，并对它们进行压缩
- en: 'The two main characteristics of VertiPaq are:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: VertiPaq 的两个主要特点是：
- en: '*VertiPaq is a columnar database*'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*VertiPaq 是一个列式数据库*'
- en: '*VertiPaq is an in-memory database*'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*VertiPaq 是一个内存数据库*'
- en: '![](../Images/096037d5d698f876f806e3580ff0bb21.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/096037d5d698f876f806e3580ff0bb21.png)'
- en: Image by author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: As you can see in the illustration above, columnar databases store and compress
    data in a different way from traditional row-store databases. Columnar databases
    are optimized for vertical data scanning, which means that every column is structured
    in its own way and physically separated from other columns!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，列式数据库以与传统行存储数据库不同的方式存储和压缩数据。列式数据库针对垂直数据扫描进行了优化，这意味着每个列都以自己的方式结构化，并且物理上与其他列分离！
- en: Without going into deep analysis about advantages and drawbacks between row-store
    vs column-store databases, since it would require a separate series of articles,
    let me just pinpoint a few key differentials in terms of performance.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 由于深入分析行存储数据库与列存储数据库之间的优缺点需要单独的文章系列，因此我仅指出一些关于性能的关键差异。
- en: With columnar databases, single-column access is fast and effective. Once the
    computation starts to involve multiple columns, things become more complex, as
    the intermediary steps’ results need to be temporarily stored in some way.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在列式数据库中，单列访问速度快且有效。一旦计算开始涉及多个列，事情就会变得更加复杂，因为中间步骤的结果需要以某种方式临时存储。
- en: Simply said, columnar databases are more CPU-intensive, while row-store databases
    increase I/O, because of many scans of useless data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，列式数据库更注重 CPU 性能，而行存储数据库则增加了 I/O，因为需要扫描大量无用的数据。
- en: So far, we painted a big picture of the architecture that enables Power BI to
    fully shine as an ultimate BI tool. Now, we are ready to dive deeper into specific
    architectural solutions and consequently leverage this knowledge to make the most
    of our Power BI reports, by tuning our data model to extract the maximum from
    the underlying engine.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经描绘了一个架构的大图，使得 Power BI 能够作为终极 BI 工具充分展现其光芒。现在，我们准备深入探讨具体的架构解决方案，并利用这些知识来最大限度地发挥我们的
    Power BI 报告的优势，通过调整我们的数据模型来从底层引擎中提取最大价值。
- en: Inside VertiPaq in Power BI — Compress for success!
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Power BI中的VertiPaq内——压缩以成功！
- en: '![](../Images/7e7b54cd248f7e6a8f7fce8f8903e688.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7e7b54cd248f7e6a8f7fce8f8903e688.png)'
- en: '[Photo by Kaboompics at Pexels](https://www.pexels.com/photo/crop-man-crushing-plastic-bottle-4498091/)'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '![照片由Kaboompics在Pexels提供](https://www.pexels.com/photo/crop-man-crushing-plastic-bottle-4498091/)'
- en: As you might recall from the previous part of this article, we scratched the
    surface of VertiPaq, a powerful storage engine, which is “responsible” for the
    blazing-fast performance of most of your Power BI reports (whenever you are using
    Import mode or Composite model).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如您可能从本文的前一部分所回忆的，我们只是触及了VertiPaq这个强大存储引擎的表面，它是“负责”您大多数Power BI报告（无论您使用的是导入模式还是复合模型）的闪电般快速性能的。
- en: 3, 2, 1…Fasten your seatbelts!
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3，2，1…系好安全带！
- en: One of the key characteristics of the VertiPaq is that it’s a columnar database.
    We learned that columnar databases store data optimized for vertical scanning,
    which means that every column has its own structure and is physically separated
    from other columns.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: VertiPaq的一个关键特性是它是一个列式数据库。我们了解到列式数据库存储的数据是针对垂直扫描优化的，这意味着每一列都有其自己的结构，并且物理上与其他列分离。
- en: That fact enables VertiPaq to apply different types of compression to each of
    the columns independently, choosing the optimal compression algorithm based on
    the values in that specific column.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这个事实使得VertiPaq能够独立地对每一列应用不同类型的压缩，根据该特定列中的值选择最优的压缩算法。
- en: Compression is being achieved by encoding the values within the column. But,
    before we dive deeper into a detailed overview of encoding techniques, just keep
    in mind that this architecture is not exclusively related to Power BI — in the
    background is a Tabular model, which is also “under the hood” of Analysis Services
    Tabular and Excel Power Pivot.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 压缩是通过编码列中的值来实现的。但在我们深入探讨编码技术的详细概述之前，请记住，这种架构不仅与Power BI相关——在后台是一个Tabular模型，这也是Analysis
    Services Tabular和Excel Power Pivot的“幕后”。
- en: Value Encoding
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 值编码
- en: This is the most desirable value encoding type since it works exclusively with
    integers and, therefore, requires less memory than, for example, when working
    with text values.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最佳的价值编码类型，因为它仅与整数一起工作，因此比例如处理文本值时需要的内存更少。
- en: How does this look in reality? Let’s say we have a column containing a number
    of phone calls per day, and the value in this column varies from 4.000 to 5.000. What
    the VertiPaq would do, is to find the minimum value in this range (which is 4.000)
    as a starting point, then calculate the difference between this value and all
    the other values in the column, storing this difference as a new value.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中这看起来是什么样子？假设我们有一个包含每天电话数量的列，该列中的值在4,000到5,000之间变化。VertiPaq会做的是找到这个范围内的最小值（即4,000）作为起点，然后计算这个值与其他列中所有其他值的差异，并将这个差异存储为新的值。
- en: '![](../Images/ad802633d242bebb290d7f7d378ce585.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ad802633d242bebb290d7f7d378ce585.png)'
- en: Image by author
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: At first glance, 3 bits per value might not look like a significant saving,
    but multiply this by millions or even billions of rows and you will appreciate
    the amount of memory saved.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 乍一看，每个值3位可能看起来并不像是一个显著的节省，但乘以数百万或数十亿行，你就会欣赏到节省的内存量。
- en: As I already stressed, Value Encoding is being applied exclusively to integer
    data type columns (currency data type is also stored as an integer).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前强调的，值编码仅应用于整数数据类型的列（货币数据类型也存储为整数）。
- en: Hash Encoding (Dictionary Encoding)
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哈希编码（字典编码）
- en: This is probably the most frequently used compression type by a VertiPaq. Using
    Hash encoding, VertiPaq creates a dictionary of the distinct values within one
    column and afterward replaces “real” values with index values from the dictionary.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是VertiPaq最常用的压缩类型。使用哈希编码，VertiPaq创建一个包含某一列中所有不同值的字典，然后使用字典中的索引值替换“实际”值。
- en: 'Here is an example to make things clearer:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子来使事情更清晰：
- en: '![](../Images/24d6e203e7bc414fd778013d727d00de.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/24d6e203e7bc414fd778013d727d00de.png)'
- en: Image by author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: As you may notice, VertiPaq identified distinct values within the Subjects column,
    built a dictionary by assigning indexes to those values, and finally stored index
    values as pointers to “real” values. I assume you are aware that integer values
    require way less memory space than text, so that’s the logic behind this type
    of data compression.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你可能注意到的，VertiPaq在“主题”列中识别了不同的值，通过为这些值分配索引来构建字典，并最终将索引值作为指向“真实”值的指针存储。我假设你意识到整数值所需的内存空间远小于文本，这就是这种类型数据压缩背后的逻辑。
- en: Additionally, by being able to build a dictionary for any data type, VertiPaq
    is practically data type independent!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，由于VertiPaq能够为任何数据类型构建字典，它在实际上是不依赖于数据类型的！
- en: '**This brings us to another key takeover: no matter if your column is of text,
    bigint or float data type — from VertiPaq perspective it’s the same — it needs
    to create a dictionary for each of those columns, which implies that all these
    columns will provide the same performance, both in terms of speed and memory space
    allocated!** Of course, by assuming that there are no significant differences
    in dictionary sizes between these columns.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**这引出了另一个关键点：无论你的列是文本、bigint还是float数据类型——从VertiPaq的角度来看都是一样的——它需要为这些列中的每一个创建一个字典，这意味着所有这些列在速度和内存空间分配方面都将提供相同的性能！**当然，这是基于假设这些列之间的字典大小没有显著差异。'
- en: So, it’s a myth that the data type of the column affects its size within the
    data model. On the contrary, the number of distinct values within the column,
    which is known as ***cardinality***, mostly influences column memory consumption.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，关于列的数据类型影响数据模型中其大小的说法是一种神话。相反，列中不同值的数量，即所谓的**基数**，主要影响列的内存消耗。
- en: RLE (Run-Length-Encoding)
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RLE (Run-Length-Encoding)
- en: The third algorithm (RLE) creates a kind of mapping table, containing ranges
    of repeating values, avoiding storing every single (repeated) value separately.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 第三种算法（RLE）创建了一种映射表，包含重复值的范围，避免单独存储每个（重复的）值。
- en: 'Again, taking a look at an example will help to better understand this concept:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，通过查看一个示例将有助于更好地理解这个概念：
- en: '![](../Images/186a7598653087bc709bf77f366be409.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/186a7598653087bc709bf77f366be409.png)'
- en: Image by author
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In real life, VertiPaq doesn’t store Start values, because it can quickly calculate
    where the next node begins by summing previous Count values.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中，VertiPaq不会存储起始值，因为它可以通过累加之前的计数值快速计算出下一个节点开始的位置。
- en: As powerful as it might look at first glance, the RLE algorithm is highly dependent
    on the ordering within the column. If the data is stored the way you see in the
    example above, RLE will perform great. However, if your data buckets are smaller
    and rotate more frequently, then RLE would not be an optimal solution.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然乍一看可能看起来很强大，但RLE算法高度依赖于列内的排序。如果数据以示例中所示的方式存储，RLE将表现得很好。然而，如果你的数据桶较小且旋转更频繁，那么RLE可能不是最佳解决方案。
- en: 'One more thing to keep in mind regarding RLE: In reality, VertiPaq doesn’t
    store data the way it is shown in the illustration above. First, it performs Hash
    encoding and creates a dictionary of the subjects, and then applies the RLE algorithm,
    so the final logic, in its most simplified way, would be something like this:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 关于RLE还有一点需要注意：实际上，VertiPaq不会以图中所示的方式存储数据。首先，它执行哈希编码并创建主题的字典，然后应用RLE算法，因此其最终逻辑在最简化的方式下可能如下所示：
- en: '![](../Images/c1596908fa9f5f3fe1140a606b276f27.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c1596908fa9f5f3fe1140a606b276f27.png)'
- en: Image by author
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: So, RLE occurs after Value or Hash Encoding, in those scenarios when VertiPaq
    “thinks” that it makes sense to compress data additionally (when data is ordered
    in that way that RLE would achieve better compression).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，RLE发生在值或哈希编码之后，在这些VertiPaq“认为”有进一步压缩数据意义的场景中（当数据以RLE能够实现更好压缩的方式排序时）。
- en: Re-Encoding considerations
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重新编码考虑事项
- en: 'No matter how “smart” VertiPaq is, it can also make some bad decisions, based
    on incorrect assumptions. Before I explain how re-encoding works, let me just
    briefly iterate through the process of data compression for a specific column:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 无论VertiPaq多么“智能”，它也可能基于错误的假设做出一些不良决策。在解释重新编码的工作原理之前，让我简要地回顾一下特定列的数据压缩过程：
- en: VertiPaq scans a sample of rows from the column
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: VertiPaq从列中扫描一行样本
- en: If the column data type is not an integer, it will look no further and use Hash
    encoding
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果列的数据类型不是整数，它将不再进一步查看并使用哈希编码
- en: 'If the column is of integer data type, some additional parameters are evaluated:
    if the numbers in the sample linearly increase, VertiPaq assumes that it is probably
    a primary key and chooses Value encoding'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果列是整数数据类型，还会评估一些额外的参数：如果样本中的数字线性增加，VertiPaq假设它可能是一个主键，并选择值编码
- en: If the numbers in the column are reasonably close to each other (the number
    range is not very wide, like in our example above with 4.000–5.000 phone calls
    per day), VertiPaq will use Value encoding. On the contrary, when values fluctuate
    significantly within the range (for example between 1.000 and 1.000.000), then
    Value encoding doesn’t make sense, and VertiPaq will apply the Hash algorithm
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果列中的数字彼此之间相对接近（数字范围不是很宽，比如我们上面的例子中每天有4,000到5,000个电话），VertiPaq将使用值编码。相反，当值在范围内显著波动（例如在1,000到1,000,000之间）时，值编码就不适用了，VertiPaq将应用哈希算法。
- en: However, it can happen sometimes that VertiPaq makes a decision about which
    algorithm to use based on the sample data, but then some outlier pops up and it
    needs to re-encode the column from scratch.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有时会发生这样的情况，VertiPaq会根据样本数据来决定使用哪种算法，但随后出现了一些异常值，它需要从头开始重新编码列。
- en: 'Let’s use our previous example for the number of phone calls: VertiPaq scans
    the sample and chooses to apply Value encoding. Then, after processing 10 million
    rows, all of a sudden it found a 500.000 value (it can be an error, or whatever).
    Now, VertiPaq re-evaluates the choice, and it can decide to re-encode the column
    using the Hash algorithm instead. Surely, that would impact the whole process
    in terms of the time needed for reprocessing.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用之前的电话通话次数的例子来说明：VertiPaq扫描样本并选择应用值编码。然后，在处理了1000万行之后，突然发现了一个500,000的值（这可能是一个错误，或者任何其他原因）。现在，VertiPaq重新评估了选择，并可能决定使用哈希算法重新编码列。当然，这将对整个处理过程所需的时间产生影响。
- en: 'Finally, here is the list of parameters (in order of importance) that VertiPaq
    considers when choosing which algorithm to use:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这里列出了VertiPaq在选择使用哪种算法时考虑的参数列表（按重要性排序）：
- en: Number of distinct values in the column (Cardinality)
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列中的唯一值数量（基数）
- en: Data distribution in the column — column with many repeating values can be better
    compressed than one containing frequently changing values (RLE can be applied)
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列中的数据分布——具有许多重复值的列可以比包含频繁变化值的列更好地压缩（可以应用RLE）
- en: Number of rows in the table
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表中的行数
- en: Column data type — impacts only the dictionary size
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列数据类型——仅影响字典大小
- en: Reducing the data model size by 90% — real story!
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据模型大小减少90%——真实故事！
- en: After we laid the theoretical ground for understanding the architecture behind
    the VertiPaq storage engine, and which types of compression it uses to optimize
    your Power BI data model, it’s the right moment to get our hands dirty and apply
    our knowledge in a real-life case!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们为理解VertiPaq存储引擎背后的架构以及它使用哪些类型的数据压缩来优化Power BI数据模型奠定理论基础之后，现在是时候动手实践并将我们的知识应用于实际案例了！
- en: Starting point = 776 MB
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 起始点 = 776 MB
- en: Our data model is quite simple, yet memory-intensive. We have a fact table (factChat),
    which contains data about live support chats and one dimension table (dimProduct),
    which relates to a fact table. Our fact table has around 9 million rows, which
    should not be a big deal for Power BI, but the table was imported as it is, without
    any additional optimization or transformation.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的数据模型相当简单，但内存密集。我们有一个事实表（factChat），其中包含实时支持聊天的数据，以及一个维度表（dimProduct），它与事实表相关联。我们的事实表大约有900万行，这对Power
    BI来说不应该是个大问题，但表是直接导入的，没有任何额外的优化或转换。
- en: '![](../Images/35e2ad09edb6916a1185eb240c4207e3.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/35e2ad09edb6916a1185eb240c4207e3.png)'
- en: Image by author
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Now, this pbix file consumes a whopping 777 MB!!! You can’t believe it? Just
    take a look:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这个pbix文件消耗了惊人的777 MB！你无法相信？只需看看：
- en: '![](../Images/4b3e190c16f1564fa86e2c39e32162d7.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4b3e190c16f1564fa86e2c39e32162d7.png)'
- en: Image by author
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Just remember this picture! Of course, I don’t need to tell you how much time
    this report needs to load or refresh, and how our calculations are slow because
    of the file size.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 只需记住这张图片！当然，我无需告诉你这个报告需要多长时间来加载或刷新，以及由于文件大小，我们的计算速度有多慢。
- en: …and it’s even worse!
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ……而且情况甚至更糟！
- en: 'Additionally, it’s not just 776 MBs that take our memory, since memory consumption
    is being calculated taking into account the following factors:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，不仅仅是776 MB的内存消耗，因为内存消耗的计算考虑了以下因素：
- en: PBIX file
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PBIX文件
- en: Dictionary (you’ve learned about the dictionary in the beginning sections of
    this article)
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 词典（你已经在本文的前几节中了解了词典）
- en: Column hierarchies
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列层次结构
- en: User-defined hierarchies
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户定义的层次结构
- en: Relationships
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关系
- en: Now, if I open Task Manager, go to the Details tab, and find the msmdsrv.exe
    process, I will see that it burns more than 1 GB of memory!
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果打开任务管理器，转到详细信息标签页，找到msmdsrv.exe进程，我会看到它消耗了超过1 GB的内存！
- en: Oh, man, that really hurts! And we haven’t even interacted with the report!
    So, let’s see what we can do to optimize our model…
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 哎，这真的很痛苦！而且我们还没有与报告互动过！所以，让我们看看我们可以做些什么来优化我们的模型…
- en: 'Rule #1 — Import only those columns you really need'
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则#1 — 只导入你真正需要的列
- en: The first and the most important rule is: ***keep in your data model only those
    columns you really need for the report!***
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 第一条也是最重要的规则是：**在你的数据模型中只保留那些你真正需要的列！**
- en: That being said, do I really need both the chatID column, which is a surrogate
    key, and the sourceID column, which is a primary key from the source system? Both
    of these values are unique, so even if I need to count the total number of chats,
    I would still be fine with only one of them.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我真的需要chatID列，它是一个代理键，以及sourceID列，它是源系统的主键吗？这两个值都是唯一的，所以即使我需要计算聊天的总数，我也只需要其中一个。
- en: '![](../Images/01e5f21c449c60c737b99cd3014570e7.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/01e5f21c449c60c737b99cd3014570e7.png)'
- en: Image by author
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'So, I’ll remove the sourceID column and check how the file looks now:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我将删除sourceID列，并检查文件现在看起来如何：
- en: '![](../Images/533205c7760cd3bd401ad2a0b1d2836b.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/533205c7760cd3bd401ad2a0b1d2836b.png)'
- en: Image by author
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: By removing just one unnecessary column, we saved more than 100 MB!!! Let’s
    examine further what can be removed without taking a deeper look (and we will
    come to this later, I promise).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仅仅删除一个不必要的列，我们就节省了超过100 MB！！！让我们进一步检查可以删除的内容，而不需要深入查看（我保证我们稍后会做到这一点）。
- en: Do we really need both the original start time of the chat and UTC time, one
    stored as a Date/Time/Timezone type, the other as Date/Time, and both going to
    a second level of precision??!!
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们真的需要同时存储聊天原始开始时间和UTC时间，一个存储为日期/时间/时区类型，另一个存储为日期/时间，并且两者都达到秒级精度吗？！！
- en: Let me get rid of the original start time column and keep only UTC values.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 让我删除原始开始时间列，只保留UTC值。
- en: '![](../Images/c38775012f1c23e65d8342cc0e271ba7.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c38775012f1c23e65d8342cc0e271ba7.png)'
- en: Image by author
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Another 100 MB of wasted space gone! By removing just two columns we don’t need,
    we reduced the size of our file by 30%!
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仅仅删除我们不需要的两列，我们就减少了文件大小的30%！
- en: Now, that was without even looking into the details of the memory consumption. Let’s
    now turn on [DAX Studio](https://daxstudio.org/), my favorite tool for troubleshooting
    Power BI reports. As I already stressed a few times, this tool is a MUST if you
    plan to work seriously with Power BI — and it’s completely free!
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这还没有考虑到内存消耗的细节。现在，让我们打开[DAX Studio](https://daxstudio.org/)，这是我最喜欢的用于调试Power
    BI报告的工具。正如我已经多次强调的那样，如果你打算认真使用Power BI，这个工具是必不可少的——而且它是完全免费的！
- en: 'One of the features in DAX Studio is a [VertiPaq Analyzer](https://www.sqlbi.com/tools/vertipaq-analyzer/),
    a very useful tool built by Marco Russo and Alberto Ferrari from sqlbi.com. When
    I connect to my pbix file with DAX Studio, here are the numbers related to my
    data model size:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: DAX Studio中的一个功能是[VertiPaq Analyzer](https://www.sqlbi.com/tools/vertipaq-analyzer/)，这是一个由sqlbi.com的Marco
    Russo和Alberto Ferrari构建的非常有用的工具。当我用DAX Studio连接到我的pbix文件时，这里是我的数据模型大小相关的数字：
- en: '![](../Images/4f419b602eded78e1d2087cb4d2c93d7.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4f419b602eded78e1d2087cb4d2c93d7.png)'
- en: Image by author
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: I can see here what the most expensive columns are in my data model and decide
    if I can discard some of them, or if I need to keep them all.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以看到在我数据模型中最昂贵的列是什么，并决定是否可以丢弃其中的一些，或者是否需要保留所有这些。
- en: At first glance, I have few candidates for removal — *sessionReferrer* and *referrer* columns
    have high cardinality and therefore can’t be optimally compressed. Moreover, as
    these are text columns and need to be encoded using a Hash algorithm, you can
    see that their dictionary size is extremely high! If you take a closer look, you
    can notice that these two columns take almost 40% of my table size!
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 初看之下，我几乎没有可以删除的候选者——*sessionReferrer*和*referrer*列具有高基数，因此无法进行最优压缩。此外，由于这些是文本列，需要使用哈希算法进行编码，你可以看到它们的字典大小非常高！如果你仔细观察，你会发现这两个列几乎占了我的表大小的40%！
- en: After checking with my report users if they need any of these columns, or maybe
    only one of them, I’ve got a confirmation that they don’t perform any analysis
    on those columns. So, why on Earth should we bloat our data model with them??!!
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在与我的报告用户确认他们是否需要这些列，或者可能只需要其中之一后，我得到了确认，他们根本不会对这些列进行任何分析。那么，我们为什么要让我们的数据模型因为这些列而膨胀呢？！
- en: Another strong candidate for removal is the LastEditDate column. This column
    just shows the date and time when the record was last edited in the data warehouse.
    Again, I checked with the report users, and they didn’t even know that this column
    exists!
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个值得删除的候选列是 LastEditDate 列。这个列仅显示记录在数据仓库中最后编辑的日期和时间。同样，我检查了报告用户，他们甚至不知道这个列的存在！
- en: 'I removed these three columns, and the result is:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我移除了这三列，结果是：
- en: '![](../Images/e17f37ca887fbb8962b6f9e4e29ca08a.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e17f37ca887fbb8962b6f9e4e29ca08a.png)'
- en: Image by author
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Oh, God, we halved the size of our data model by just removing a few unnecessary
    columns.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，上帝，我们仅仅通过移除一些不必要的列就减半了我们的数据模型大小。
- en: Truth be told, there are a few more columns that could be dismissed from the
    data model, but let’s now focus on other techniques for data model optimization.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，还有几列可以从数据模型中删除，但现在让我们专注于其他数据模型优化技术。
- en: 'Rule #2 — Reduce the column cardinality!'
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '规则 #2 — 减少列基数！'
- en: 'As you may recall from the previous part of the article, the rule of thumb
    is: the higher the cardinality of a column, the harder for VertiPaq to optimally
    compress the data. Especially if we are not working with integer values.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 如您从文章的前一部分所回忆的那样，经验法则是：列的基数越高，VertiPaq 越难最优地压缩数据。尤其是如果我们不处理整数值时。
- en: 'Let’s take a deeper look at VertiPaq Analyzer results:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地查看 VertiPaq 分析器结果：
- en: '![](../Images/52187c161a731a0754c4b289012a4095.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/52187c161a731a0754c4b289012a4095.png)'
- en: Image by author
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: As you see, even if the chatID column has higher cardinality than the datetmStartUTC
    column, it takes almost 7 times less memory! Since it is a surrogate key integer
    value, VertiPaq applies Value encoding, and the size of a dictionary is irrelevant.
    On the other hand, Hash encoding is being applied for the column of date/time
    data type with high cardinality, so the dictionary size is enormously higher.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，即使 chatID 列的基数比 datetmStartUTC 列高，它的内存占用几乎减少了7倍！由于它是一个代理键整数值，VertiPaq 应用值编码，字典的大小无关紧要。另一方面，对于具有高基数的日期/时间数据类型的列，正在应用哈希编码，因此字典的大小会大大增加。
- en: There are multiple techniques for reducing the column cardinality, such as splitting
    columns. Here are a few examples of using this technique.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 减少列基数有多种技术，例如拆分列。这里有一些使用这种技术的例子。
- en: 'For Integer columns, you can split them into two even columns using division
    and modulo operations. In our case, it would be:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 对于整数列，您可以使用除法和取模运算将它们拆分为两个相等的列。在我们的例子中，将是：
- en: '[PRE0]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This optimization technique must be performed on the source side (in this case,
    by writing a T-SQL statement). If we use the calculated columns, there is no benefit
    at all, since the original column has to be stored in the data model first.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这种优化技术必须在源端执行（在这种情况下，通过编写 T-SQL 语句）。如果我们使用计算列，那么根本没有任何好处，因为原始列必须首先存储在数据模型中。
- en: A similar technique can bring significant savings when you have decimal values
    in the column. You can simply split values before and after the decimal as explained
    in [this article](https://www.fourmoo.com/2019/11/27/how-i-saved-40-on-my-power-bi-dataset-size/).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 当列中有小数值时，类似的技巧可以带来显著的节省。您可以简单地按照本文中解释的方式在小数点前后拆分值。[这篇文章](https://www.fourmoo.com/2019/11/27/how-i-saved-40-on-my-power-bi-dataset-size/)。
- en: Since we don’t have any decimal values, let’s focus on our problem — optimizing
    the datetmStartUTC column. There are multiple valid options to optimize this column.
    The first is to check if your users need granularity higher than the day level
    (in other words, can you remove hours, minutes, and seconds from your data).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们没有小数值，让我们专注于我们的问题——优化 datetmStartUTC 列。优化这个列有多个有效选项。第一个是检查您的用户是否需要比日级别更高的粒度（换句话说，您是否可以从数据中移除小时、分钟和秒）。
- en: 'Let’s check what savings this solution would bring:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看这个解决方案会带来哪些节省：
- en: '![](../Images/d541cc4ad785977a8c8ba42751974c68.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d541cc4ad785977a8c8ba42751974c68.png)'
- en: Image by author
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The first thing we notice is that our file is now 271 MB, so 1/3 of what we
    started with. VertiPaq Analyzer’s results show that this column is now almost
    perfectly optimized, going from taking over 62% of our data model to just slightly
    over 2.5%! That’s huuuuge!
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先注意到，我们的文件现在已经是271 MB，是原来大小的1/3。VertiPaq分析器的结果显示，这个列现在几乎已经完全优化，从占用超过62%的数据模型到仅仅超过2.5%！这太棒了！
- en: '![](../Images/585bd312245db69a94a278f174b33c60.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/585bd312245db69a94a278f174b33c60.png)'
- en: Image by author
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: However, it appeared that the day-level grain was not fine enough, and my users
    needed to analyze figures on the hour level. OK, so we can at least get rid of
    minutes and seconds, and that would also decrease the cardinality of the column.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，看起来日粒度不够细，用户需要按小时分析数据。好吧，我们至少可以去掉分钟和秒，这也会减少列的基数。
- en: 'So, I’ve imported values rounded per hour:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我已经导入了每小时四舍五入的值：
- en: '[PRE1]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: It appeared that my users also didn’t need a chatVariables column for analysis,
    so I’ve also removed it from the data model.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来我的用户也不需要chatVariables列来进行分析，所以我也将它从数据模型中移除了。
- en: 'Finally, after [disabling Auto Date/Time](https://data-mozart.com/powerbi/tiq-part-1-how-to-destroy-your-power-bi-model-with-auto-date-time/) in
    Options for Data Load, my data model size was around 220 MB! However, one thing
    still bothered me: the chatID column was still occupying almost 1/3 of my table.
    And this is just a surrogate key, which is not used in any of the relationships
    within my data model.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在数据加载选项中禁用[自动日期/时间](https://data-mozart.com/powerbi/tiq-part-1-how-to-destroy-your-power-bi-model-with-auto-date-time/)后，我的数据模型大小大约是220
    MB！然而，还有一件事让我感到烦恼：chatID列仍然占据了表格大约1/3的空间。而这只是一个代理键，在我的数据模型中的任何关系中都没有被使用。
- en: '![](../Images/6a7deb2fcd62d4975701b3d1bda800f1.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6a7deb2fcd62d4975701b3d1bda800f1.png)'
- en: Image by author
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'So, here I was examining two different solutions: the first was to simply remove
    this column and aggregate the number of chats, counting them using the GROUP BY
    clause. However, there would be no benefit by keeping the chatID column at all,
    since it’s not being used anywhere in our data model. Once I’ve removed it from
    the model, one last time, let’s check the pbix file size:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，这里我正在检查两种不同的解决方案：第一个方案是简单地删除这个列，并使用GROUP BY子句来聚合聊天数量。然而，保留chatID列没有任何好处，因为在我们数据模型中的任何地方都没有使用它。当我最后一次从模型中移除它后，让我们检查pbix文件的大小：
- en: '![](../Images/b9ba8c26faea15e51a7adb6c0f2e7feb.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9ba8c26faea15e51a7adb6c0f2e7feb.png)'
- en: Image by author
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Please recall the number we started at: 776 MB! ***So, I’ve managed to reduce
    my data model size by almost 90%***, applying some simple techniques which enabled
    the VertiPaq storage engine to perform more optimal compression of the data.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 请回忆一下我们开始时的数据量：776 MB！所以，我通过应用一些简单的技术，使VertiPaq存储引擎能够对数据进行更优化的压缩，成功将我的数据模型大小减少了近90%。
- en: And this was a real use case, which I faced during the last year!
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我去年遇到的一个真实案例！
- en: General rules for reducing data model size
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 减小数据模型大小的通用规则
- en: 'To conclude, here is the list of general rules you should keep in mind when
    trying to reduce the data model size:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一下，以下是在尝试减小数据模型大小时你应该记住的一些通用规则：
- en: '**Keep only those columns your users need in the report!** Just sticking with
    this one single rule will save you an unbelievable amount of space, I assure you…'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**只保留用户在报告中需要的列！**我相信，仅仅遵循这一条规则，你就能节省难以置信的空间…'
- en: '**Try to optimize column cardinality whenever possible.** The golden rule here
    is: test, test, test…and if there is a significant benefit from, for example,
    splitting one column into two, or to substitute a decimal column with two whole
    number columns, then do it! But, also keep in mind that your measures need to
    be rewritten to handle those structural changes, in order to display expected
    results. So, if your table is not big, or if you have to rewrite hundreds of measures,
    maybe it’s not worth splitting the column. As I said, it depends on your specific
    scenario, and you should carefully evaluate which solution makes more sense'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尽可能优化列的基数。**这里的黄金规则是：测试，测试，测试…如果从分割一个列到两个列，或者用两个整数列替换一个十进制列等，有显著的收益，那么就去做！但是，也要记住，你需要重写你的度量来处理这些结构变化，以便显示预期的结果。所以，如果你的表不大，或者你必须重写数百个度量，那么分割列可能不值得。就像我说的，这取决于你的具体场景，你应该仔细评估哪种解决方案更有意义。'
- en: 'Same as for columns, **keep only those rows you need**: for example, maybe
    you don’t need to import data from the last 10 years, but only 5! That will also
    reduce your data model size. Talk to your users, ask them what they really need,
    before blindly putting everything inside your data model'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与列相同，**只保留您需要的那些行**：例如，可能您不需要导入过去 10 年的数据，而只需要 5 年！这也会减小您的数据模型大小。在与用户交谈之前，先询问他们真正需要什么，然后再盲目地将所有内容放入您的数据模型中
- en: '**Aggregate your data whenever possible!** That means — fewer rows, lower cardinality,
    so all nice things you are aiming to achieve! If you don’t need hours, minutes,
    or seconds level of granularity, don’t import them! Aggregations in Power BI (and
    Tabular model in general) are a very important and wide topic, which is out of
    the scope of this series, but I strongly recommend you check [Phil Seamark’s blog](https://dax.tips/2019/10/18/creative-aggs-part-i-introduction/) and
    his series of posts on creative aggregations usage'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尽可能进行数据聚合**！这意味着——行数更少，基数更低，这样您就能实现所有想要达到的美好效果！如果您不需要小时、分钟或秒级别的粒度，就别导入它们！Power
    BI（以及一般意义上的 Tabular 模型）中的聚合是一个非常重要且广泛的话题，但这超出了本系列的范畴，但我强烈推荐您查看 [Phil Seamark 的博客](https://dax.tips/2019/10/18/creative-aggs-part-i-introduction/)
    以及他关于创意聚合使用的一系列帖子'
- en: Avoid using DAX calculated columns whenever possible, since they are not being
    optimally compressed. Instead, try to push all calculations to a data source (SQL
    database, for example) or perform them using the Power Query editor
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽可能避免使用 DAX 计算列，因为它们没有被最优压缩。相反，尝试将所有计算推送到数据源（例如 SQL 数据库）或使用 Power Query 编辑器执行
- en: '**Use proper data types** (for example, if your data granularity is on a day
    level, there is no need to use Date/Time data type. Date data type will suffice)'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用适当的数据类型**（例如，如果您的数据粒度在日级别，就没有必要使用日期/时间数据类型。日期数据类型就足够了）'
- en: '**Disable Auto Date/Time option** for data loading (this will remove a bunch
    of automatically created date tables in the background)'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**禁用数据加载的自动日期/时间选项**（这将删除在后台自动创建的一堆日期表）'
- en: Conclusion
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: After you learned the basics of the VertiPaq storage engine and different techniques
    it uses for data compression, I wanted to wrap up this article by showing you
    a real-life example of how we can “help” VertiPaq (and Power BI consequently)
    to get the best out of report performance and optimal resource consumption.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在您学习了 VertiPaq 存储引擎的基本原理以及它用于数据压缩的不同技术之后，我想通过向您展示一个真实生活中的例子来结束这篇文章，这个例子展示了我们如何“帮助”
    VertiPaq（以及随之而来的 Power BI）获得最佳报告性能和最优资源消耗。
- en: Thanks for reading, hope that you enjoyed the article!
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读，希望您喜欢这篇文章！
