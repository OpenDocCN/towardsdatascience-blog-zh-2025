- en: From Resume to Cover Letter Using AI and LLM, with Python and Streamlit
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI和LLM从简历到求职信，利用Python和Streamlit
- en: 原文：[https://towardsdatascience.com/from-resume-to-cover-letter-using-ai-and-llm-with-python-and-streamlit/](https://towardsdatascience.com/from-resume-to-cover-letter-using-ai-and-llm-with-python-and-streamlit/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/from-resume-to-cover-letter-using-ai-and-llm-with-python-and-streamlit/](https://towardsdatascience.com/from-resume-to-cover-letter-using-ai-and-llm-with-python-and-streamlit/)
- en: '**DISCLAIMER**: The idea of doing Cover Letter or even Resume with AI does
    not obviously start with me. **A lot of people have done this before** (very successfully)
    and have built websites and even companies from the idea. This is just a **tutorial**
    on how to build your own Cover Letter AI Generator App using Python and a few
    lines of code. All the code you will say in this blog post can be found in my
    public [Github folder](https://github.com/PieroPaialungaAI/CoverLetterAI/tree/main).
    Enjoy. 🙂'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**免责声明**：使用AI制作求职信或简历的想法显然不是从我这里开始的。**很多人之前已经做过这个，并且非常成功**，他们从这一想法中建立了网站甚至公司。这只是一个**教程**，教你如何使用Python和几行代码构建自己的求职信AI生成器应用程序。你将在本博客文章中提到的所有代码都可以在我的公共[GitHub文件夹](https://github.com/PieroPaialungaAI/CoverLetterAI/tree/main)中找到。祝您享受。 🙂'
- en: Pep Guardiola is a (very successful) Manchester City **football** coach. During
    Barcelona’s Leo Messi years, he invented a way of playing football known as “***Tiki-Taka***”.
    This means that as soon as you receive the ball, you pass the ball, immediately,
    without even controlling it. You can pass the ball 30–40 times before scoring
    a goal.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 比尔·盖茨是一位（非常成功）的曼城**足球**教练。在巴塞罗那的莱昂内尔·梅西时代，他发明了一种足球打法，称为“**控球战术**”。这意味着一旦你接到球，你就立即传球，甚至不控制球。你可以在进球前传球30-40次。
- en: More than a decade later, we can see how the way of playing football made Guardiola
    and his Barcelona famous is gone. If you look at a Manchester City match, they
    take the ball and immediately look for the striker or the winger. You only need
    a few, vertical passes, immediately looking for the opportunity. It is more predictable,
    but you do it so many times that you will eventually find the space to hit the
    target.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 十多年后，我们可以看到让瓜迪奥拉和他的巴塞罗那队成名的足球打法已经消失了。如果你看曼城的比赛，他们会拿球并立即寻找前锋或边锋。你只需要几脚垂直传球，立即寻找机会。这更加可预测，但你做得如此频繁，最终你会找到射门得分的空间。
- en: I think that the **job market** has somehow gone in the same direction.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为**就业市场**也以某种方式走向了同一方向。
- en: Before you had the opportunity to go to the company, hand in your resume, talk
    to them, be around them, schedule an interview, and actively talk to people. You
    would spend weeks preparing for that trip, polishing your resume, and reviewing
    questions and answers.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在你有机会去公司，提交简历，与他们交谈，在他们周围，安排面试，并积极与人交谈之前。你会花几周时间准备这次旅行，润色你的简历，并复习问题和答案。
- en: For many, this old-fashioned strategy still works, and **I** **believe it**.
    If you have a good networking opportunity, or the right time and place, the handing
    the resume thing works very well. We love the human connection, and it is very
    effective to actually **know** someone.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多人来说，这种老式的策略仍然有效，**我** **相信**这一点。如果你有一个好的社交机会，或者正确的时间和地点，递交简历的事情会非常顺利。我们喜欢人与人之间的联系，实际上**认识**某人是非常有效的。
- en: It is important to consider that there is a whole other approach as well. Companies
    like **LinkedIn**, **Indeed,** and even in general the **internet** completely
    changed the game. You can send so many resumes to so many companies and find a
    job out of statistics. **AI is changing this game** a little bit further. There
    are a lot of AI tools to tailor your resume for the specific company, make your
    resume more impressive, or build the **job specific cover letter**. There are
    indeed many **companies** that sell this kind of services to people that are looking
    for jobs.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 需要考虑的是，还有一种完全不同的方法。像**LinkedIn**、**Indeed**这样的公司，甚至整个**互联网**都彻底改变了游戏规则。你可以向许多公司发送许多简历，并从统计数据中找到一份工作。**AI正在进一步改变这个游戏**。有许多AI工具可以帮助你为特定公司定制简历，使你的简历更加引人注目，或者构建**针对特定工作的求职信**。确实有许多**公司**向寻找工作的人提供这类服务。
- en: Now, believe me, I have got **nothing** against these companies, at all, but
    the AI that they are using it’s not really “***their AI***”. What I mean by that
    is that if you use ChatGPT, Gemini, or the super new DeepSeek to do the exact
    task you will very likely **not** get a worse response than the (paid) tool that
    you are using on their website. You are really paying for the “**commodity**”
    of having a backend API that does what we would have to do through ChatGPT. And
    that’s fair.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，请相信我，我对这些公司没有任何意见，但它们使用的 AI 并非真正的“***它们的 AI***”。我的意思是，如果你使用 ChatGPT、Gemini
    或最新的 DeepSeek 来完成确切的任务，你很可能**不会**得到比你在它们网站上使用的（付费）工具更差的响应。你实际上是在为拥有一个后端 API 而付费，这个
    API 做的事情是我们通过 ChatGPT 必须做的。这是公平的。
- en: Nonetheless, I want to show you that it is indeed very simple **and cheap**
    to make your own “resume assistant” using **Large Language Models**. In particular,
    I want to focus on **cover letters**. **You give me your resume and the job description,
    and I give you your cover letter you can copy and paste to LinkedIn, Indeed, or
    your email**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，我想向你展示，使用**大型语言模型**制作自己的“简历助手”确实非常简单且便宜。特别是，我想专注于**求职信**。**你给我你的简历和职位描述，我给你你的求职信，你可以复制粘贴到
    LinkedIn、Indeed 或你的电子邮件**。
- en: 'In one image, it will look like this:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在一张图片中，它看起来像这样：
- en: '![](../Images/41d3c87b349fc0f916d5e8194ae418ac.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/41d3c87b349fc0f916d5e8194ae418ac.png)'
- en: Now, Large Language Models (LLMs) are specific AI models that produce text.
    More specifically, they are **HUGE** Machine Learning models (even the small ones
    are very big).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，大型语言模型（LLM）是专门用于生成文本的 AI 模型。更具体地说，它们是**巨大的**机器学习模型（即使是小的模型也非常大）。
- en: This means that building your own LLM or training one from scratch is very,
    **very** expensive. We won’t do anything like that. We will use a perfectly working
    LLM and we will smartly instruct it to perform our task. More specifically, we
    will do that in **Python** and using some APIs. Formally, it is a paid API. Nonetheless,
    since I started the whole project (with all the trial and error process) I spent
    ***less than 30 cents***. You will likely spend **4** or **5 cents on it.  **
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着自己构建 LLM 或从头开始训练一个 LLM 非常，非常昂贵。我们不会做这样的事情。我们将使用一个完全工作的 LLM，并巧妙地指导它执行我们的任务。更具体地说，我们将使用
    **Python** 和一些 API 来做这件事。正式来说，这是一个付费 API。尽管如此，自从我开始整个项目（包括所有试错过程）以来，我只花了 ***不到
    30 美分***。你可能会花 **4** 或 **5 美分**。
- en: Additionally, we will make a working **web app** that will allow you to have
    your cover letter in a few clicks. It will be an effort of a couple hundred lines
    of code (with spaces 🙂).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还将制作一个可工作的 **Web 应用程序**，让你只需几点击就能拥有你的求职信。这将是一个包含几百行代码（包括空格）的努力。
- en: 'To motivate you, here are screenshots of the final app:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 为了激励你，这里有一些最终应用程序的截图：
- en: '![](../Images/efdc3ec915a37209310799517b8c4a63.png)![](../Images/46852cfba2f0800149190a26a297c647.png)![](../Images/a3ad8ab11094d2db10b54736a1f5a89d.png)![](../Images/d6d89c55c8a53115e17e4d1d729f1c63.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/efdc3ec915a37209310799517b8c4a63.png)![图片](../Images/46852cfba2f0800149190a26a297c647.png)![图片](../Images/a3ad8ab11094d2db10b54736a1f5a89d.png)![图片](../Images/d6d89c55c8a53115e17e4d1d729f1c63.png)'
- en: 'Pretty cool right? It took me less than 5 hours to build the whole thing from
    scratch. Believe me: ***it’s that simple***. In this blog post, we will describe,
    in order:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 很酷吧？我从头开始构建整个东西只花了不到 5 个小时。相信我：***这真的很简单***。在这篇博客文章中，我们将按以下顺序描述：
- en: The **LLM API Strategy.** This part will help the reader understand what LLM
    Agents we are using and how we are connecting them.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**LLM API 策略**。这部分将帮助读者了解我们正在使用哪些 LLM 代理以及我们如何将它们连接起来。'
- en: The **LLM Object**. This is the implementation of the LLM API strategy above
    using **Python**.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**LLM 对象**。这是使用 **Python** 实现上述 LLM API 策略的实现。'
- en: The **Web App and results**.The LLM Object is then transferred into a web app
    using **Streamlit**. I’ll show you how to access it and some results.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Web 应用程序和结果**。然后，使用 **Streamlit** 将 LLM 对象转移到 Web 应用程序中。我会向你展示如何访问它和一些结果。'
- en: I’ll try to be as specific as possible so that you have **everything** you need
    to make it yourself, but if this stuff gets too technical, feel free to skip to
    part 3 and just enjoy the sunset 🙃.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我会尽量具体，以便你拥有自己制作所需的所有内容，但如果这部分内容过于技术性，你可以自由地跳到第 3 部分，尽情享受日落🙃。
- en: Let’s get started!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: 1\. LLM API Strategy
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. LLM API 策略
- en: This is the Machine Learning System Design part of this project, which I kept
    **extremely** light, because I wanted to maximize the readability of the whole
    approach (and because it honestly didn’t need to be more complicated than that).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这个项目的机器学习系统设计部分，我将其保持得非常简洁，因为我希望最大化整个方法的可读性（而且说实话，它不需要比那样更复杂）。
- en: 'We will use two APIs:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用两个API：
- en: '**A Document Parser LLM API** will read the resume and extract all the meaningful
    information**.** This information will be put in a .json file so that, in production,
    we will have the resume already processed and stored somewhere in our memory.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**一个文档解析LLM API**将读取简历并提取所有有意义的信息**。**这些信息将被放入一个.json文件中，以便在生产中，我们可以在我们的内存中的某个地方存储已经处理并存储好的简历。'
- en: '**A cover letter LLM API.** This API will read the parsed resume (the output
    of the previous API) and the **job description** and it will output the Cover
    Letter.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**一个封面信LLM API**。这个API将读取解析后的简历（前一个API的输出）和**职位描述**，然后输出封面信。'
- en: '![](../Images/a55522db67eecea291507764b2e2fc67.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a55522db67eecea291507764b2e2fc67.png)'
- en: 'Two main points:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 两个主要点：
- en: '**What is the best LLM for this task?** For text extraction and summarization,
    [**LLama**](https://medium.com/@ankit941208/generating-summaries-for-large-documents-with-llama2-using-hugging-face-and-langchain-f7de567339d2)
    or [**Gemma**](https://ai.google.dev/gemma) are known to be a reasonably cheap
    and efficient LLM. As we are going to use LLama for the summarization task, in
    order to keep consistency, we can adopt it for the other API as well. If you want
    to use another model, feel free to do so.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**这个任务最好的LLM是什么？**对于文本提取和摘要，已知**LLama**（https://medium.com/@ankit941208/generating-summaries-for-large-documents-with-llama2-using-hugging-face-and-langchain-f7de567339d2）或**Gemma**（https://ai.google.dev/gemma）是相对便宜且高效的LLM。由于我们打算使用LLama进行摘要任务，为了保持一致性，我们也可以将其用于其他API。如果你想使用其他模型，请随意。'
- en: '**How do we connect the APIs**? There are a variety of ways you can do that.
    I decided to give it a try to [**Llama API**](https://www.llama-api.com/). The
    documentation is not exactly extensive, but it works well and it allows you to
    play with many models. You will need to log in, buy some credit ($1 is more than
    sufficient for this task), and save your API key. Feel free to switch to another
    solution (like [Hugging Face](https://huggingface.co/meta-llama/Llama-3.3-70B-Instruct)
    or [Langchain](https://www.langchain.com/)) if you feel like it.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**我们如何连接API**？你可以用很多种方式来做这件事。我决定尝试使用[**Llama API**](https://www.llama-api.com/)。文档并不十分详尽，但它工作得很好，并允许你尝试许多模型。你需要登录，购买一些信用（1美元对这个任务来说已经足够了），并保存你的API密钥。如果你觉得其他解决方案（如[Hugging
    Face](https://huggingface.co/meta-llama/Llama-3.3-70B-Instruct)或[Langchain](https://www.langchain.com/))更适合，请随意切换。'
- en: Ok, now that we know **what** to do, we just need to actually implement it in
    Python.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们已经知道了**要做什么**，我们只需要实际在Python中实现它。
- en: 2\. LLM Object
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. LLM对象
- en: The first thing that we need is the actual **LLM** prompts. In the API, the
    prompts are usually passed using a dictionary. As they can be pretty long, and
    their structure is always similar, it makes sense to store them in **.json files**.
    We will read the JSON files and use them as inputs for the API call.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先需要的是实际的**LLM**提示。在API中，提示通常使用字典传递。由于它们可能相当长，并且结构总是相似的，因此将它们存储在**.json文件**中是有意义的。我们将读取JSON文件，并将它们用作API调用的输入。
- en: 2.1 LLM Prompts
  id: totrans-36
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.1 LLM提示
- en: 'In this .json file, you will have the **model (**you can call whatever model
    you like) and the **content** which is the instruction for the LLM. Of course,
    the content key has a static part, which is the “instruction” and a “dynamic”
    part, which is the specific input of the API call. For example: this is the .json
    file for the first API, I called it ***resume_parser_api.json***:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个.json文件中，你将会有**模型**（你可以称它为你喜欢的任何名称）和**内容**，这是LLM的指令。当然，内容键有一个静态部分，即“指令”，以及一个“动态”部分，即API调用的具体输入。例如：这是第一个API的.json文件，我将其命名为***resume_parser_api.json***：
- en: 'As you can see from the “content” there is the static call:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如您从“内容”中看到的，有一个静态调用：
- en: “You are a resume parser. You will extract information from this resume and
    put them in a .json file. The keys of your dictionary will be first_name, last_name,
    location, work_experience, school_experience, skills. In selecting the information,
    keep track of the most insightful.”
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “你是一个简历解析器。你将从这份简历中提取信息，并将它们放入一个.json文件中。你的字典键将是first_name、last_name、location、work_experience、school_experience、skills。在选择信息时，注意最具有洞察力的。”
- en: 'The keys I want to extract out of my “.json” files are:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要从我的“.json”文件中提取的键是：
- en: '[PRE0]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Feel free to add anything more information that you want to be “extracted” out
    of your resume, but remember that this is stuff that should matter **only for
    your cover letter.** The specific resume will be added after this text to form
    the full call/instruction. More on that later.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 随意添加任何你想要从简历中“提取”的更多信息，但请记住，这些信息只应该对求职信有影响。具体的简历将在文本之后添加，以形成完整的调用/指令。稍后会有更多关于这个的说明。
- en: The order instruction is the ***cover_letter_api.json:***
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 指令的顺序是***cover_letter_api.json***：
- en: 'Now the instruction is this one:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在指令是这样的：
- en: '“You are an expert in job hunting and a cover letter writer. Given a resume
    json file, the job description, and the date, write a cover letter for this candidate.
    Be persuasive and professional. Resume JSON: {resume_json} ; Job Description:
    {job_description}, Date: {date}”'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “你是求职和求职信写作的专家。给定一个简历json文件、工作描述和日期，为这位候选人写一封求职信。要有说服力，要专业。简历JSON：{resume_json}；工作描述：{job_description}，日期：{date}”
- en: 'As you can see, there are three placeholders: “**Resume_json**”, “**job_description**”
    and “**date**”.As before,these placeholders will then be replaced with the correct
    information to form the full prompt.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，有三个占位符：“**Resume_json**”，“**job_description**”和“**date**”。和之前一样，这些占位符将被正确信息替换，以形成完整的提示。
- en: 2.2 constants.py
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.2 constants.py
- en: I made a very small ***constants.py*** file with the path of the two .json prompt
    files and the API that you have to generate from LLamaApi (or really whatever
    API you are using). Modify this if you want to run the file locally.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了一个非常小的***constants.py***文件，其中包含两个.json提示文件的路径以及你必须从LLamaApi（或实际上你使用的任何API）生成的API。如果你想在本地上运行文件，请修改此文件。
- en: 2.3 file_loader.py
  id: totrans-49
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.3 file_loader.py
- en: This file is a collection of “loaders” for your resume. Boring stuff but important.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这个文件是简历的“加载器”集合。虽然无聊但很重要。
- en: 2.4 cover_letter.py
  id: totrans-51
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.4 cover_letter.py
- en: 'The whole implementation of the LLM Strategy can be found in this object that
    I called **CoverLetterAI**. There it is:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: LLM策略的整个实现都可以在这个我称之为**CoverLetterAI**的对象中找到。就在这里：
- en: I spent quite some time trying to make everything modular and easy to read.
    I also made a lot of comments to all the functions so you can see exactly what
    does what. **How do we use this beast?**
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我花了很多时间试图使一切模块化并易于阅读。我还为所有函数添加了很多注释，这样你可以清楚地看到每个函数的作用。**我们如何使用这个怪物**？
- en: 'So the whole code runs in 5 simple lines. Like this:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 所以整个代码只运行了5行。就像这样：
- en: '[PRE1]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'So in order:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 所以按照顺序：
- en: You call the **CoverLetterAI** object. It will be the star of the show
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你调用**CoverLetterAI**对象。它将是这场演出的明星
- en: You give me the path to your **resume**. It can be PDF or Word and I read your
    information and store them in a variable.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你给我你的**简历**路径。可以是PDF或Word格式，我会阅读你的信息并将它们存储在一个变量中。
- en: You call ***profile_candidate(),*** and I run my first LLM. This process the
    candidate word info and creates the .json file we will use for the second LLM
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你调用***profile_candidate()***，然后我运行我的第一个LLM。这个过程处理候选人的单词信息，并创建我们将用于第二个LLM的.json文件
- en: You give me the **job_description** and you add it to the system. Stored.
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你给我**工作描述**，并将其添加到系统中。已存储。
- en: You call ***write_cover_letter()***and I run my second LLM that generates, given
    the job description and the resume .json file, the cover letter
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你调用***write_cover_letter()***，然后我运行我的第二个LLM，根据工作描述和简历.json文件生成求职信
- en: 3\. Web App and Results
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 网络应用程序和结果
- en: So that is really it. You saw all the technical details of this blog post in
    the previous paragraphs.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这就是全部内容。你已经在之前的段落中看到了这篇博客文章的所有技术细节。
- en: Just to be extra fancy and show you that it works, I also made it a web app,
    where you can just **upload your resume**, **add your job description** and click
    **generate cover letter**. This is the [link](https://coverletterpieropaialunga.streamlit.app/)
    and this is the [code](https://github.com/PieroPaialungaAI/CoverLetterAI/blob/main/main.py).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更加花哨并展示它的工作原理，我还将其制作成了一个网络应用程序，你只需**上传你的简历**，**添加你的工作描述**，然后点击**生成求职信**。这是[链接](https://coverletterpieropaialunga.streamlit.app/)，这是[代码](https://github.com/PieroPaialungaAI/CoverLetterAI/blob/main/main.py)。
- en: Now, the **cover letters** that are generated are scary good.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，生成的**求职信**非常好。
- en: 'This is a random one:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个随机例子：
- en: February 1, 2025
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 2025年2月1日
- en: Hiring Manager,
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 招聘经理，
- en: '[Company I am intentionally blurring]'
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[我故意模糊的公司]'
- en: ''
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I am thrilled to apply for the Distinguished AI Engineer position at [Company
    I am intentionally blurring], where I can leverage my passion for building responsible
    and scalable AI systems to revolutionize the banking industry. As a seasoned machine
    learning engineer and researcher with a strong background in physics and engineering,
    I am confident that my skills and experience align with the requirements of this
    role.
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我非常激动能够申请[我故意模糊的公司名称]的杰出人工智能工程师职位，在那里我可以利用我对构建负责任和可扩展人工智能系统的热情，来革新银行业。作为一名经验丰富的机器学习工程师和研究员，我在物理学和工程学方面有着坚实的背景，我坚信我的技能和经验与这个职位的要求数值相符。
- en: ''
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With a Ph.D. in Aerospace Engineering and Engineering Mechanics from the University
    of Cincinnati and a Master’s degree in Physics of Complex Systems and Big Data
    from the University of Rome Tor Vergata, I possess a unique blend of theoretical
    and practical knowledge. My experience in developing and deploying AI models,
    designing and implementing machine learning algorithms, and working with large
    datasets has equipped me with the skills to drive innovation in AI engineering.
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我拥有辛辛那提大学航空航天工程和工程力学博士学位以及罗马托尔维加塔大学复杂系统物理和大数据硕士学位，我拥有独特的理论与实践知识结合。我在开发和部署人工智能模型、设计和实现机器学习算法以及处理大数据方面的经验，使我具备了推动人工智能工程创新的能力。
- en: ''
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a Research and Teaching Assistant at the University of Cincinnati, I applied
    surrogate models to detect and classify cracks in pipes, achieving a 14% improvement
    in damage detection experiments. I also developed surrogate models using deep
    learning algorithms to accelerate Finite Element Methods (FEM) simulations, resulting
    in a 1M-fold reduction in computational time. My experience in teaching and creating
    courses in signal processing and image processing for teens interested in AI has
    honed my ability to communicate complex concepts effectively.
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 作为辛辛那提大学的科研和教学助理，我应用代理模型来检测和分类管道裂缝，在损伤检测实验中实现了14%的改进。我还开发了使用深度学习算法的代理模型来加速有限元方法（FEM）模拟，从而将计算时间减少了1百万倍。我在为对人工智能感兴趣的青少年教授信号处理和图像处理课程的经验，磨练了我有效传达复杂概念的能力。
- en: ''
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In my previous roles as a Machine Learning Engineer at Gen Nine, Inc., Apex
    Microdevices, and Accenture, I have successfully designed, developed, and deployed
    AI-powered solutions, including configuring mmWave radar and Jetson devices for
    data collection, implementing state-of-the-art point cloud algorithms, and leading
    the FastMRI project to accelerate MRI scan times. My expertise in programming
    languages such as Python, TensorFlow, PyTorch, and MATLAB, as well as my experience
    with cloud platforms like AWS, Docker, and Kubernetes, has enabled me to develop
    and deploy scalable AI solutions.
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在我之前担任Gen Nine, Inc.、Apex Microdevices和Accenture的机器学习工程师角色中，我成功设计、开发和部署了人工智能解决方案，包括配置毫米波雷达和Jetson设备进行数据收集，实施最先进的点云算法，并领导FastMRI项目以加速MRI扫描时间。我在Python、TensorFlow、PyTorch和MATLAB等编程语言方面的专业知识，以及我在AWS、Docker和Kubernetes等云平台方面的经验，使我能够开发和部署可扩展的人工智能解决方案。
- en: ''
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I am particularly drawn to [Company I am intentionally blurring] commitment
    to creating responsible and reliable AI systems that prioritize customer experience
    and simplicity. My passion for staying abreast of the latest AI research and my
    ability to judiciously apply novel techniques in production align with the company’s
    vision. I am excited about the opportunity to work with a cross-functional team
    of engineers, research scientists, and product managers to deliver AI-powered
    products that transform how [Company I am intentionally blurring] serves its customers.
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我特别被[我故意模糊的公司名称]致力于创建负责任和可靠的AI系统所吸引，这些系统优先考虑客户体验和简单性。我对紧跟最新人工智能研究的热情以及我在生产中审慎应用新技术的能力与公司的愿景相吻合。我对有机会与一个跨职能团队——包括工程师、研究科学家和产品经理——合作，交付能够改变[我故意模糊的公司名称]服务客户方式的人工智能产品感到兴奋。
- en: ''
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In addition to my technical skills and experience, I possess excellent communication
    and presentation skills, which have been demonstrated through my technical writing
    experience at Towards Data Science, where I have written comprehensive articles
    on machine learning and data science, reaching a broad audience of 50k+ monthly
    viewers.
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 除了我的技术技能和经验外，我还拥有出色的沟通和演示技巧，这在我在Towards Data Science的科技写作经验中得到了证明，在那里我撰写了关于机器学习和数据科学的全面文章，每月吸引了50k+的观众。
- en: ''
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thank you for considering my application. I am eager to discuss how my skills
    and experience can contribute to the success of the [Company I am intentionally
    blurring] and [Company I am intentionally blurring]’s mission to bring humanity
    and simplicity to banking through AI. I am confident that my passion for AI, my
    technical expertise, and my ability to work collaboratively will make me a valuable
    asset to your team.
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 感谢您考虑我的申请。我渴望讨论我的技能和经验如何为[我故意模糊的公司]和[我故意模糊的公司]通过人工智能将人类和简单性带入银行业的使命做出贡献。我坚信，我对人工智能的热情、我的技术专长以及我协作的能力将使我成为您团队的有价值资产。
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Sincerely,
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 诚挚地，
- en: ''
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Piero Paialunga
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Piero Paialunga
- en: They look just like I would write them for a specific job description. That
    being said, in 2025, you need to be careful because hiring managers **do know**
    that you are using AI to write them and the “computer tone” is pretty easy to
    spot (e.g. words like “***eager***” are **very** ChatGPT-ish lol). For this reason,
    I’d like to say to **use these tools wisely**. Sure, you can build your “***template***”
    with them, but be sure to add your personal touch, otherwise your cover letter
    will be exactly like the other thousands of cover letters that the other applicants
    are sending in.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 它们看起来就像我会为特定的职位描述写的。话虽如此，在2025年，你需要小心，因为招聘经理**确实**知道你在使用AI来写它们，而且“计算机语气”很容易被发现（例如，“***渴望***”这样的词非常ChatGPT风格lol）。因此，我想说，**要明智地使用这些工具**。当然，你可以用它们构建你的“***模板***”，但一定要加入你个人的风格，否则你的求职信将与其他数千封求职信一样，其他申请人也在发送。
- en: This is the code to build the web [app](https://github.com/PieroPaialungaAI/CoverLetterAI/blob/main/main.py).
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是构建网页[应用](https://github.com/PieroPaialungaAI/CoverLetterAI/blob/main/main.py)的代码。
- en: 4\. Conclusions
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 结论
- en: 'In this blog article, we discovered how to use LLM to convert your resume and
    job description into a specific **cover letter**. These are the points we touched:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们发现了如何使用LLM将您的简历和职位描述转换为特定的**求职信**。以下是我们的观点：
- en: '**The use of AI in job hunting**.In the first chapter we discussed how job
    hunting is now completely revolutionized by AI.'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人工智能在求职中的应用**。在第一章中，我们讨论了求职是如何被人工智能彻底革命的。'
- en: '**Large Language Models idea**. It is important to design the LLM APIs wisely.
    We did that in the second paragraph'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**大型语言模型的想法**。明智地设计LLM API非常重要。我们在第二段中做到了这一点。'
- en: '**LLM API implementation**. We used Python to implement the LLM APIs organically
    and efficiently'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**LLM API实现**。我们使用Python有机且高效地实现了LLM API。'
- en: '**The Web App**. We used streamlit to build a Web App API to display the power
    of this approach.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**网页应用**。我们使用streamlit构建了一个Web App API来展示这种方法的力量。'
- en: '**Limits of this approach**. I think that AI generated cover letters are indeed
    very good. They are on point, professional and well crafted. Nonetheless, if everyone
    starts using AI to build cover letters, they all really look the same, or at least
    they all have the same tone, which is not great. Something to think about.'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**这种方法的优势**。我认为AI生成的求职信确实非常好。它们切中要点，专业且制作精良。尽管如此，如果每个人都开始使用AI来构建求职信，它们看起来都差不多，或者至少它们都有相同的语气，这并不好。有些事情需要思考。'
- en: 5\. References and other brilliant implementations
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 参考文献和其他出色的实现
- en: I feel that is just fair to mention a lot of brilliant people that have had
    this idea before me and have made this public and available for anyone. This is
    only a few of them I found online.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为公正地提到许多在我之前就有这个想法并且已经公开并使任何人都可以使用这个想法的杰出人物是应该的。这些只是我在网上找到的一小部分。
- en: '[**Cover Letter Craft**](https://coverlettercraft.com/)by [**Balaji Kesavan**](https://balajikesavan.com/)
    is a Streamlit app that implements a very similar idea of crafting the cover letter
    using AI. What we do different from that app is that we extract the resume directly
    from the word or PDF, while his app requires copy-pasteing. That being said, I
    think the guy is incredibly talented and very creative and I recommend giving
    a look to his [portoflio](https://balajikesavan.com/).'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '[**求职信制作**](https://coverlettercraft.com/)由[**Balaji Kesavan**](https://balajikesavan.com/)开发的Streamlit应用，实现了使用AI制作求职信的非常类似的想法。我们与那个应用的不同之处在于，我们直接从Word或PDF中提取简历，而他的应用则需要复制粘贴。话虽如此，我认为这个人非常有才华，非常富有创意，我推荐您看看他的[作品集](https://balajikesavan.com/)。'
- en: '[**Randy Pettus**](https://medium.com/u/a55ed7fac031)has a [**similar idea**](https://medium.com/better-programming/creating-an-ai-powered-cover-letter-generator-with-openai-ad224852f80a)
    as well. The difference between his approach and the one proposed in this tutorial
    is that he is very specific in the information, asking questions like “current
    hiring manager” and the temperature of the model. It’s very interesting (and smart)
    that you can clearly see the way he is thinking of Cover Letters to guide the
    AI to build it the way he likes them. Highly recommended.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '[**兰迪·佩图斯**](https://medium.com/u/a55ed7fac031)也有一个[**类似的想法**](https://medium.com/better-programming/creating-an-ai-powered-cover-letter-generator-with-openai-ad224852f80a)。他方法和本教程中提出的方法的区别在于，他在信息上非常具体，会问一些像“当前招聘经理”和模型温度这样的问题。他思考求职信的方式非常有趣（而且聪明），你可以清楚地看到他是如何引导AI按照他喜欢的样子构建求职信的。强烈推荐。'
- en: '[**Juan Esteban Cepeda**](https://github.com/Juanchobanano) does a very good
    job in his [**app**](https://datapalooza-cover-letters.streamlit.app/) as well.
    You can also tell that he was working on making it bigger than a simple streamlit
    add because he added the link to his company and a bunch of reviews by users.
    Great job and great hustle. 🙂'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '[**胡安·埃斯特班·塞佩达**](https://github.com/Juanchobanano)在他的[**应用**](https://datapalooza-cover-letters.streamlit.app/)中也做得非常好。你也可以看出，他正在努力使它不仅仅是一个简单的streamlit插件，因为他添加了公司链接和用户的一堆评论。干得好，非常努力。
    🙂'
- en: 6\. About me!
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 关于我！
- en: Thank you again for your time. It means a lot ❤
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 再次感谢您抽出宝贵时间。这对您意义重大 ❤
- en: 'My name is Piero Paialunga and I’m this guy here:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我的名字是皮埃罗·帕亚尔乌恩加，就是我这个人：
- en: '![](../Images/30d2b2050037985627cef1e5b9c28d93.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/30d2b2050037985627cef1e5b9c28d93.png)'
- en: 'I am a Ph.D. candidate at the University of Cincinnati Aerospace Engineering
    Department and a Machine Learning Engineer for Gen Nine. I talk about AI, and
    Machine Learning in my blog posts and on Linkedin. If you liked the article and
    want to know more about machine learning and follow my studies you can:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我是辛辛那提大学航空航天工程系的一名博士候选人，也是Gen Nine的机器学习工程师。我在博客文章和领英上谈论人工智能和机器学习。如果您喜欢这篇文章，并想了解更多关于机器学习的内容，以及跟随我的研究，您可以：
- en: A. Follow me on [**Linkedin**](https://www.linkedin.com/in/pieropaialunga/),
    where I publish all my stories
  id: totrans-107
  prefs: []
