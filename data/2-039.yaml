- en: 'The MCP Security Survival Guide: Best Practices, Pitfalls, and Real-World Lessons'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP安全生存指南：最佳实践、陷阱和现实世界经验
- en: It’s been impossible to miss the buzz around the model context protocol in recent
    months. [Hailey Quach](https://towardsdatascience.com/author/hailey-quach/) highlights
    the risks that this open-source framework poses, and the mitigating steps data
    and ML professionals should take to ensure its integration doesn’t become a security
    nightmare.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在最近几个月，模型上下文协议的热潮无法忽视。[海莉·夸克](https://towardsdatascience.com/author/hailey-quach/)强调了这一开源框架带来的风险，以及数据科学家和机器学习专业人士应采取的缓解措施，以确保其集成不会变成一个安全噩梦。
- en: '[The MCP Security Survival Guide: Best Practices, Pitfalls, and Real-World
    Lessons](https://towardsdatascience.com/the-mcp-security-survival-guide-best-practices-pitfalls-and-real-world-lessons/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[MCP安全生存指南：最佳实践、陷阱和现实世界经验](https://towardsdatascience.com/the-mcp-security-survival-guide-best-practices-pitfalls-and-real-world-lessons/)'
- en: 'Reducing Time to Value for Data Science Projects: Part 4'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 减少数据科学项目的时间价值：第4部分
- en: Kristopher McGlinchey stresses that nothing is more important for data scientists
    than “being a good software developer”—even with the rise of coding agents.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 克里斯托弗·麦格利尼强调，对于数据科学家来说，没有什么比“成为一名优秀的软件开发者”更重要——即使随着编码代理的兴起。
- en: '[Reducing Time to Value for Data Science Projects: Part 4](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-4/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[减少数据科学项目的时间价值：第4部分](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-4/)'
- en: Things I Wish I Had Known Before Starting ML
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在开始机器学习之前我希望知道的事情
- en: “if you try to keep up with *everything*, you’ll end up keeping up with *nothing*.”
    Pascal Janetzky offers insights on what it takes to achieve success in a highly
    competitive field.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: “如果你试图跟上*一切*，你最终会一无所获。”帕斯卡尔·扬特茨基分享了在高度竞争的领域取得成功所需的见解。
- en: '[Things I Wish I Had Known Before Starting ML](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml-2/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在开始机器学习之前我希望知道的事情](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml-2/)'
