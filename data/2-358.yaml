- en: I refer to Glitter as “him” for stylistic ease, knowing he’s an “it” – a language
    model—programmed, not personified—except through the voice I gave him/it.
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我把 Glitter 称作“他”，为了风格上的方便，知道它是一个“它”——一个语言模型——编程的，而不是拟人化的——除了通过我赋予它的声音。
- en: I am building a GlitterGPT with persistent closet storage for up to 100 testers,
    who will get to try this for free. We’re about half full. Our target audience
    is female, ages 30 and up. If you or someone you know falls into this category,
    DM me on Instagram at @arielle.caron and we can chat about inclusion.
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我正在构建一个带有持久衣柜存储的 GlitterGPT，最多可容纳 100 名测试者，他们将免费试用这个产品。目前我们大约只满了半数。我们的目标受众是
    30 岁及以上的女性。如果你或你认识的人属于这个类别，请在 Instagram 上私信我 @arielle.caron，我们可以聊聊关于包容性的话题。
- en: If I were scaling this beyond 100 testers, I’d consider offloading wardrobe
    recall to a vector store with embeddings and tuning for wear-frequency weighting.
    That may be coming, it depends on how well the trial goes!
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果我要将这个项目扩展到 100 名测试者以上，我会考虑将衣柜召回任务外包给一个带有嵌入和按穿戴频率加权的向量存储。这可能即将到来，这取决于试验进行得如何！
