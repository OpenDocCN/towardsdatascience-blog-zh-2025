  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[使用 torch.compile 编译优化器 (PyTorch 文档)](https://pytorch.org/tutorials/recipes/compiling_optimizer.html?ref=alexdremov.me)'
- en: '[How should I use torch.compile properly? (PyTorch discussion)](https://discuss.pytorch.org/t/how-should-i-use-torch-compile-properly/144598?ref=alexdremov.me)'
  id: totrans-71
  prefs:
