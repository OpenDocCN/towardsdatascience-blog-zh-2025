  type: TYPE_NORMAL
  zh: '[如何正确使用 torch.compile？(PyTorch 讨论区)](https://discuss.pytorch.org/t/how-should-i-use-torch-compile-properly/144598?ref=alexdremov.me)'
- en: '[Using User-Defined Triton Kernels with torch.compile (PyTorch Docs)](https://pytorch.org/tutorials/recipes/torch_compile_user_defined_triton_kernel_tutorial.html?ref=alexdremov.me)'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[使用 torch.compile 与用户定义的 Triton 内核 (PyTorch 文档)](https://pytorch.org/tutorials/recipes/torch_compile_user_defined_triton_kernel_tutorial.html?ref=alexdremov.me)'
- en: '[Torch.compile with custom Triton kernel (PyTorch discussion)](https://discuss.pytorch.org/t/torch-compile-with-custom-triton-kernel/192876?ref=alexdremov.me)'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[使用 torch.compile 与自定义 Triton 内核 (PyTorch 讨论区)](https://discuss.pytorch.org/t/torch-compile-with-custom-triton-kernel/192876?ref=alexdremov.me)'
- en: '[GitHub: fattorib/CudaSoftmax](https://github.com/fattorib/CudaSoftmax?ref=alexdremov.me)'
  id: totrans-74
