  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: About the Author
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于作者
- en: '***Nishant Arora** is a **Solutions Architect** at **Amazon Web Services**
    specializing in Automotive and Manufacturing industries, where he helps companies
    implement AI and cloud technologies*'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**Nishant Arora** 是 **亚马逊网络服务** 的 **解决方案架构师**，专注于汽车和制造业，在那里他帮助公司实施人工智能和云技术*'
