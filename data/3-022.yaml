- en: Fine-Tuning VLMs for Document Understanding
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为文档理解微调VLMs
- en: 原文：[https://towardsdatascience.com/vllm-fine-tuning-for-document-understanding/](https://towardsdatascience.com/vllm-fine-tuning-for-document-understanding/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/vllm-fine-tuning-for-document-understanding/](https://towardsdatascience.com/vllm-fine-tuning-for-document-understanding/)
- en: In this article, I discuss how you can fine<mdspan datatext="el1746374215548"
    class="mdspan-comment">-tune VLMs</mdspan> (visual language models) like [Qwen
    2.5 VL 7B.](https://arxiv.org/abs/2502.13923) I will introduce you to a dataset
    of handwritten digits, which the base version of Qwen 2.5 VL struggles with. We
    will then inspect the dataset, annotate it, and use it to create a fine-tuned
    Qwen 2.5 VL, specialized in extracting hand-written text.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将讨论如何微调（mdspan datatext="el1746374215548" class="mdspan-comment">-tune）VLMs（视觉语言模型）如[Qwen
    2.5 VL 7B](https://arxiv.org/abs/2502.13923)。我将向您介绍一个手写数字数据集，Qwen 2.5 VL的基础版本难以处理这个数据集。然后我们将检查数据集，对其进行标注，并使用它来创建一个微调后的Qwen
    2.5 VL，专门用于提取手写文本。
- en: Overview
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: 'The main goal of this article is to fine-tune a VLM on a dataset, an important
    machine-learning technique in today’s world, where language models revolutionize
    the way data scientists and ML engineers work and achieve. I will be discussing
    the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的主要目标是微调一个VLM（视觉语言模型）在数据集上，这是当今世界一项重要的机器学习技术，语言模型正在改变数据科学家和机器学习工程师的工作方式和取得成就的方式。我将讨论以下主题：
- en: 'Motivation and Goal: Why use VLMs for text extraction'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动机和目标：为什么使用VLMs进行文本提取
- en: Advantages of VLMs
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: VLMs的优势
- en: The dataset
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集
- en: Annotation and fine-tuning
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标注和微调
- en: SFT technical details
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SFT技术细节
- en: Results and plots
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结果和图表
- en: 'Note: This article is written as part of the work done at [Findable](https://www.findable.ai/).
    We do not profit financially from this work. It is done to highlight the technical
    capabilities of modern vision-language models and digitize and share a valuable
    handwritten phenology dataset, which may have a significant impact on climate
    research. Furthermore, the topic of this article was covered in a presentation
    during the [Data & Draft event](https://www.meetup.com/netlight-edge/events/306719173/)
    by [Netlight](https://www.netlight.com/).'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本文是作为在[Findable](https://www.findable.ai/)完成的工作的一部分而撰写的。我们从这个工作中没有获得任何经济利益。这项工作是为了突出现代视觉语言模型的技术能力，并将一个有价值的手写物候数据集数字化和共享，这可能会对气候研究产生重大影响。此外，本文的主题在[Data
    & Draft活动](https://www.meetup.com/netlight-edge/events/306719173/)期间由[Netlight](https://www.netlight.com/)进行了介绍。
- en: You can view all the code used for this article [in our GitHub repository](https://github.com/findable-no/phenology-data/tree/main),
    and [all data is available on HuggingFace](https://huggingface.co/datasets/findableai/phenology).
    If you’re specifically interested in the extracted phenology data from Norway,
    including geographical coordinates corresponding to the data, the information
    is directly available in this [Excel sheet](https://huggingface.co/datasets/findableai/phenology/blob/main/phenology_extracted_data_non_manual_verified.xlsx).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以查看用于本文的所有代码，[在我们的GitHub仓库中](https://github.com/findable-no/phenology-data/tree/main)，以及所有数据都在[HuggingFace](https://huggingface.co/datasets/findableai/phenology)上可用。如果您特别感兴趣的是从挪威提取的物候数据，包括与数据相对应的地理坐标，这些信息直接可在以下[Excel表格](https://huggingface.co/datasets/findableai/phenology/blob/main/phenology_extracted_data_non_manual_verified.xlsx)中找到。
- en: Motivation and Goal
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机和目标
- en: The goal of this article is to show you how you can fine-tune a VLM such as
    Qwen for optimized performance on a particular task. The task we are working on
    here is extracting handwritten text from a series of images. The work in this
    article is based on a Norwegian phenology dataset, which you can read more about
    in [the README in this GitHub repository.](https://github.com/findable-no/phenology-data)
    The main point is that the information contained in these images is highly valuable
    and can, for example, be used to conduct climate research. There is also definitive
    scientific interest in this topic, for example, [this article on analysing long-term
    changes in when plants flower,](https://link.springer.com/article/10.1134/S1067413609020039)
    or the [Eastern Pennsylvania Phenology Project.](https://lgnc.org/pdfdocs/phenologyBrochure.pdf)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的目标是向您展示您如何微调一个像Qwen这样的VLM，以在特定任务上实现优化性能。我们在这里正在处理的工作是从一系列图像中提取手写文本。本文中的工作基于挪威物候数据集，您可以在[这个GitHub仓库的README中了解更多信息](https://github.com/findable-no/phenology-data)。主要观点是这些图像中包含的信息非常有价值，例如，可以用于气候研究。对此主题也有明确的科学兴趣，例如，[关于分析植物开花长期变化的这篇文章](https://link.springer.com/article/10.1134/S1067413609020039)，或[东部宾夕法尼亚物候项目](https://lgnc.org/pdfdocs/phenologyBrochure.pdf)。
- en: Note that the data extracted is presented in good faith, and I do not make any
    claims as to what the data implies. The main goal of this article is to show you
    how to extract this data and present you with the extracted data, to be used for
    scientific research.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，提取的数据是本着良好的意愿提供的，我并不对数据的含义做出任何声明。本文的主要目标是向您展示如何提取这些数据，并为您提供提取的数据，以便用于科学研究。
- en: '![](../Images/636c15654c166a061f58e56556ce3c55.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/636c15654c166a061f58e56556ce3c55.png)'
- en: In this article, we will extract the text from these kinds of images using Qwen
    2.5 VL. These cells are extracted from tables like the one in the featured image,
    using image processing techniques that will be covered in a separate article.
    Image by the author.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将使用Qwen 2.5 VL从这类图像中提取文本。这些单元格是从如图像中展示的表格中提取的，使用将在另一篇文章中介绍到的图像处理技术。图像由作者提供。
- en: 'The result model I make in this article can be used to extract the text from
    all images. This data can then be converted to tables, and you can plot the information
    as you see in the image below:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 本文制作的模型可以用于从所有图像中提取文本。然后，这些数据可以转换为表格，您可以将信息绘制成如图像下所示的样子：
- en: '![](../Images/56015ff88b17b056197445c503c5f540.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/56015ff88b17b056197445c503c5f540.png)'
- en: This plot shows the tree line numbers extracted from the images, plotted onto
    a map in Norway. Colder colored hexagons mean a lower tree line, which, as expected,
    occurs the closer to the ocean you get, and the further north you go. Warmer colors
    represent higher tree lines, which are expected to occur the further into the
    country we go. Image by the author, made using [H3 by Uber.](https://www.uber.com/en-NO/blog/h3/)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 此图显示了从图像中提取的树线编号，绘制在挪威的地图上。较冷的六边形颜色代表较低的树线，正如预期的那样，越靠近海洋，越往北走，树线越低。较暖的颜色代表较高的树线，预计在我们深入国家内部时会出现。图像由作者提供，使用
    [H3 by Uber](https://www.uber.com/en-NO/blog/h3/) 制作。
- en: If you are only interested in viewing the data extracted in this study, you
    can view it in [this parquet file.](https://huggingface.co/datasets/findableai/phenology/blob/main/df_labels_and_images.parquet)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您只想查看本研究中提取的数据，您可以在[这个parquet文件](https://huggingface.co/datasets/findableai/phenology/blob/main/df_labels_and_images.parquet)中查看。
- en: Why do we need to use VLMs
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们为什么需要使用VLM
- en: When looking at the images, you may think we should apply traditional OCR to
    this problem. [OCR](https://aws.amazon.com/what-is/ocr/#:~:text=Optical%20Character%20Recognition%20(OCR)%20is,scan%20as%20an%20image%20file.)
    is the science of extracting text from images, and in previous years, it has been
    dominated by engines like [Tesseract](https://github.com/tesseract-ocr/tesseract),
    [DocTR](https://github.com/mindee/doctr), and [EasyOCR](https://github.com/mindee/doctr).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当查看这些图像时，你可能认为我们应该应用传统的OCR技术来解决这个问题。[OCR](https://aws.amazon.com/what-is/ocr/#:~:text=Optical%20Character%20Recognition%20(OCR)%20is,scan%20as%20an%20image%20file.)
    是从图像中提取文本的科学，在过去的几年中，它一直由像 [Tesseract](https://github.com/tesseract-ocr/tesseract)、[DocTR](https://github.com/mindee/doctr)
    和 [EasyOCR](https://github.com/mindee/doctr) 这样的引擎主导。
- en: However, these models are often outperformed by the modern large language models,
    particularly the ones incorporating vision (typically referred to as VLMs or VLLMs)—the
    image below highlights why you want to use a VLM instead of traditional OCR engines.
    The first column shows example images from our dataset, and the two other columns
    compare EasyOCR vs the fine-tuned Qwen model we will train in this article.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些模型通常被现代大型语言模型所超越，尤其是那些结合了视觉功能（通常称为VLMs或VLLMs）的模型——下面的图像突出了为什么你想要使用VLM而不是传统的OCR引擎。第一列显示了我们的数据集中的示例图像，其他两列比较了EasyOCR和我们将在这篇文章中训练的微调Qwen模型。
- en: '![](../Images/e6e8bd23bf055e81dbf243a85d21a4d2.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e6e8bd23bf055e81dbf243a85d21a4d2.png)'
- en: This figure highlights why you want to use VLMs (such as Qwen2.5 VL) over traditional
    OCR engines (such as EasyOCR). The first column shows the images we want to extract
    the text from, and the other two columns show the extracted text using EasyOCR
    and a fine-tuned Qwen model. In the first image, you can notice two problems.
    First, EasyOCR does not detect the “2”, which is faintly written. Secondly, EasyOCR
    also mistakes the cell border for a “1”, another critical mistake. In the second
    image, you can see that the image has a lot of dots in it (a result of the image
    processing we did), which makes EasyOCR unable to extract the text from the image.
    In the last image, EasyOCR mistakes a “1” for a “7”, and again makes the mistake
    of believing the cell border is the digit “1”.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图突出了为什么你想要使用VLMs（如Qwen2.5 VL）而不是传统的OCR引擎（如EasyOCR）。第一列显示了我们要从中提取文本的图像，其他两列显示了使用EasyOCR和微调的Qwen模型提取的文本。在第一张图像中，你可以注意到两个问题。首先，EasyOCR没有检测到“2”，它被写得比较淡。其次，EasyOCR还将单元格边界误认为是“1”，这是另一个关键的错误。在第二张图像中，你可以看到图像中有许多点（这是由于我们进行的图像处理的结果），这使得EasyOCR无法从图像中提取文本。在最后一张图像中，EasyOCR将“1”误认为是“7”，并且再次犯了一个错误，认为单元格边界是数字“1”。
- en: 'This highlights the main reason to use a VLM over a traditional OCR engine,
    to extract text from images: **VLMs often outperform traditional OCR engines when
    extracting text from images.**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这突出了使用VLM而不是传统OCR引擎从图像中提取文本的主要原因：**VLMs在从图像中提取文本时通常优于传统的OCR引擎**。
- en: Advantages of VLMs
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: VLMs的优点
- en: There are several advantages to using VLMs when extracting text from images.
    In the last section, you saw how the output quality from the VLM exceeds the output
    quality of a traditional OCR engine. Another advantage is that you can provide
    instructions to VLMs on how you want it to act, which traditional OCR engines
    cannot provide.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在从图像中提取文本时使用VLMs（视觉语言模型）有几个优点。在上一个部分，你看到了VLMs的输出质量超过了传统OCR（光学字符识别）引擎的输出质量。另一个优点是你可以向VLMs提供指令，说明你希望它们如何行动，而传统的OCR引擎无法提供这种功能。
- en: 'The two main advantages of VLMs are thus:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，VLMs的两个主要优点是：
- en: VLMs excel at OCR (particularly handwriting)
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: VLMs在OCR（尤其是手写OCR）方面表现卓越
- en: You can provide instructions
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以提供指令
- en: VLMs are good at OCR because it’s part of the training process for these models.
    This is, for example, mentioned in [Qwen 2.5 VL Technical report section 2.2.1
    Pre-Training Data](https://arxiv.org/abs/2502.13923), where they list an OCR dataset
    as part of their pre-training data.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: VLMs擅长OCR，因为这是这些模型训练过程的一部分。例如，在[Qwen 2.5 VL技术报告第2.2.1节预训练数据](https://arxiv.org/abs/2502.13923)中提到了这一点，其中他们将OCR数据集列为他们的预训练数据之一。
- en: Handwriting
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 手写
- en: Extracting handwritten text has been notoriously difficult in the past and is
    still a challenge today. The reason for this is that handwriting is **non-standardized**.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 过去提取手写文本一直非常困难，至今仍然是一个挑战。这是因为手写是非标准化的。
- en: With non-standardized, I refer to the fact that the characters will look vastly
    different from person to person. As an example of a **standardized** character,
    if you write a character on a computer, it will consistently look very similar
    across different computers and people writing it. For instance, the computer character
    “a” looks very similar no matter which computer it is written on. This makes it
    simpler for an OCR engine to pick up the character, since the characters it extracts
    from images, most likely, look quite similar to the characters it encountered
    in its training set.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我所说的非标准化是指字符在每个人之间看起来会有很大的不同。例如，作为一个**标准化**字符的例子，如果你在电脑上写一个字符，它在不同的电脑和不同的人写的时候看起来会非常相似。例如，电脑字符“a”无论在哪个电脑上写，看起来都非常相似。这使得OCR引擎更容易识别字符，因为它从图像中提取的字符，很可能与它在训练集中遇到的字符非常相似。
- en: Handwritten text, however, is the opposite. Handwriting varies widely from person
    to person, which is why you sometimes struggle with reading other people’s handwriting.
    OCR engines also have this exact problem. If characters vary widely, there is
    a lower chance that it has encountered a specific character variation in its training
    set, thus making extracting the correct character from an image more difficult.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，手写文本则相反。每个人的书写差异很大，这就是为什么有时你很难阅读别人的手写笔记。OCR引擎也存在这个问题。如果字符差异很大，它在其训练集中遇到特定字符变化的可能性较低，因此从图像中提取正确的字符变得更加困难。
- en: You can, for example, look at the image below. Imagine only looking at the ones
    in the image (so mask over the 7). Looking at the image now, the “1” looks quite
    similar to a “7”. You are, of course, able to separate the two characters because
    you can see them in context, and think critically that if a seven looks like it
    does (with a horizontal line), the first two characters in the image must be ones.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以看看下面的图片。想象一下只看图片中的1（所以遮住7）。现在看这张图片，数字“1”看起来非常像数字“7”。当然，你能够区分这两个字符，因为你可以在上下文中看到它们，并且批判性地思考，如果一个7看起来像这样（有一条水平线），那么图片中的前两个字符必须是1。
- en: Traditional OCR engines, however, don’t have this ability. They don’t look at
    the entire image, think critically about one character’s look, and use that to
    determine other characters. They must simply guess which character it is when
    looking at the isolated digit.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，传统的OCR引擎没有这种能力。它们不会查看整个图像，批判性地思考一个字符的外观，并据此确定其他字符。它们在查看孤立数字时，必须简单地猜测它是哪个字符。
- en: '![](../Images/057de740dc92e699aeb15293a11e4fcb.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/057de740dc92e699aeb15293a11e4fcb.png)'
- en: This is an image that highlights the challenge with separating ones from sevens.
    Looking at all three numbers in the context of each other, you can easily see
    that the first two digits are ones, while the last digit is a seven. However,
    if you cover up the last digit and only look at the first two digits, you will
    notice how the digits could very well be interpreted as a seven as well. Image
    by the author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一张突出显示从1和7中区分挑战的图片。从相互关联的每个数字的上下文中看，你可以很容易地看出前两位数字是1，而最后一位数字是7。然而，如果你遮住最后一位数字，只看前两位数字，你会注意到这些数字完全可以被解释为7。图片由作者提供
- en: How to separate the digit “1” from “7”, ties nicely into the next section, about
    providing instructions to the VLMs, when extracting text.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如何区分数字“1”和“7”，很好地与下一节关于在提取文本时向VLMs提供指令的内容相联系。
- en: I would also like to add that some OCR engines, such as [TrOCR](https://arxiv.org/abs/2109.10282),
    are made to extract handwritten text. From experience, however, such models are
    not comparable in performance to state-of-the-art VLMs such as Qwen 2.5 VL.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想补充说，一些OCR引擎，如[TrOCR](https://arxiv.org/abs/2109.10282)，是为了提取手写文本而设计的。然而，根据经验，这些模型在性能上无法与最先进的VLMs（如Qwen
    2.5 VL）相提并论。
- en: Providing instructions
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提供指令
- en: Another significant advantage of using VLMs for extracting text is that you
    can provide instructions to the model. This is naturally impossible with traditional
    OCR engines since they extract all the text in the image. They can only input
    an image and not separate text instructions for extracting the text from the image.
    When we want to extract text using Qwen 2.5 VL, we provide a system prompt, such
    as the one below.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 使用VLMs提取文本的另一个显著优势是你可以向模型提供指令。这对于传统的OCR引擎来说是不可能的，因为它们会提取图像中的所有文本。它们只能输入一个图像，而不能为从图像中提取文本提供分离的文本指令。当我们想使用Qwen
    2.5 VL提取文本时，我们提供一个系统提示，如下所示。
- en: '[PRE0]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The system prompt sets the outline for how Qwen should extract the text, which
    gives Qwen a major advantage over traditional OCR engines.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 系统提示为Qwen提取文本的轮廓设定了框架，这使得Qwen在传统OCR引擎上具有重大优势。
- en: 'There are mainly two points that give it an advantage:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 主要有两个方面使其具有优势：
- en: We can tell Qwen which characters to expect in the image
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们可以告诉Qwen在图像中期望看到哪些字符
- en: We can tell Qwen what characters look like (particularly important for handwritten
    text.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们可以告诉Qwen哪些字符看起来像什么（尤其是对于手写文本来说尤为重要）。
- en: You can see point one addressed in the points 1) -> 7), where we inform it that
    it can only see 1–3 digits, which digits and letters it can see, and so on. This
    is a significant advantage, since Qwen is aware that if it detects characters
    out of this range, it is most likely misinterpreting the image, or a particular
    challenge. It can better predict which character it thinks is in the image.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在1) -> 7)的要点中看到第一点的说明，我们告知它只能看到1-3位数字，它能看到的数字和字母，等等。这是一个显著的优势，因为Qwen知道，如果它检测到这个范围之外的字符，它很可能是误解了图像，或者是一个特定的挑战。它能更好地预测它认为图像中包含的字符。
- en: The second point is particularly relevant for the problem I mentioned earlier
    of separating “1” from “7,” which look quite similar. Luckily for us, the author
    of this dataset was consistent with how he wrote 1s and 7s. The 1s were always
    written diagonally, and 7s always included the horizontal stroke, which clearly
    separates the “7” from a “1,” at least from a human perspective of looking at
    the image.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 第二点特别适用于我之前提到的问题，即区分“1”和“7”，它们看起来非常相似。幸运的是，这个数据集的作者在写1和7时是一致的。1总是以对角线形式书写，7总是包含水平线，这清楚地将“7”与“1”区分开来，至少从人类观察图像的角度来看是这样。
- en: However, providing such detailed prompts and specifications to the model is
    only possible once you really understand the dataset you are working on and its
    challenges. This is why you always have to spend time manually inspecting the
    data when working on a machine-learning problem such as this. In the next section,
    I will discuss the dataset we are working on.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，只有真正理解你正在工作的数据集及其挑战，才能向模型提供如此详细的提示和规范。这就是为什么在处理像这样的机器学习问题时，你总是必须花时间手动检查数据。在下一节中，我将讨论我们正在工作的数据集。
- en: The dataset
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: Manual inspection of data has probably the highest value-to-prestige ratio of
    any activity in machine learning.
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 手动检查数据可能是机器学习活动中价值与声望比最高的活动。
- en: ''
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Greg Brockman (@gdb) [February 6, 2023](https://twitter.com/gdb/status/1622683988736479232?ref_src=twsrc%5Etfw)
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Greg Brockman (@gdb) [2023年2月6日](https://twitter.com/gdb/status/1622683988736479232?ref_src=twsrc%5Etfw)
- en: I start this section with a quote from Greg Brockman (President of [OpenAI](https://openai.com/) as
    of writing this article), highlighting an important point. In his tweet, he refers
    to the fact that data annotation and inspection are not prestigious work, but
    nonetheless, it’s one of the most important tasks you can be spending time on
    when working on a machine-learning project.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我以Greg Brockman（截至撰写本文时为OpenAI的总裁）的一句话开始本节，强调一个重要观点。在他的推文中，他提到了数据标注和检查并不是一项令人尊敬的工作，但无论如何，这是你在进行机器学习项目时可以花费时间的最重要的任务之一。
- en: At [Findable](https://www.findable.ai/), I started as a data annotator and proceeded
    to manage the labeling team at Findable before I now work as a data scientist.
    The work with annotation highlighted the importance of manually inspecting and
    understanding the data you are working on, and taught me how to do it effectively.
    Greg Brockman is referring to the fact that this work is not prestigious, which
    is often correct, since data inspection and annotation can be monotonous. However,
    you should always spend considerable time inspecting your dataset when working
    on a machine-learning problem. This time will provide you with insights that you
    can, for example, use to provide the detailed system prompt I highlighted in the
    last section.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在[Findable](https://www.findable.ai/)，我最初是一名数据标注员，然后在我现在作为数据科学家工作之前，我管理了Findable的标注团队。标注工作强调了手动检查和理解你正在工作的数据的重要性，并教会了我如何有效地进行这项工作。Greg
    Brockman提到这项工作并不令人尊敬，这通常是正确的，因为数据检查和标注可能是单调的。然而，在处理机器学习问题时，你应该始终花大量时间检查你的数据集。这些时间将为你提供洞察力，例如，你可以使用这些洞察力来提供我在上一节中强调的详细系统提示。
- en: The dataset we are working on consists of around 82000 images, such as the ones
    you see below. The cells vary in width from 81 to 93 pixels and in height from
    48 to 57 pixels, meaning we are working on very small images.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在工作的数据集大约由82000张图像组成，例如你下面看到的那些。这些单元格的宽度从81到93像素不等，高度从48到57像素不等，这意味着我们正在处理非常小的图像。
- en: '![](../Images/8658c54280bbba3d5ee83e61a93d5065.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8658c54280bbba3d5ee83e61a93d5065.png)'
- en: These images showcase images present in the dataset. Image by the author,
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这些图像展示了数据集中存在的图像。图像由作者提供，
- en: 'When starting this project, I first spent time looking at the different images
    to understand the variations in the dataset. I, for example, notice:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始这个项目时，我首先花时间查看不同的图像，以了解数据集中的变化。例如，我注意到：
- en: The “1”s look similar to the “7”s
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这些“1”看起来和“7”很相似
- en: There is some faint text in some of the images (for example, the “8” in the
    bottom left image above, and the “6” in the bottom right image
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一些图像中有些模糊的文本（例如，上图左下角的“8”和右下角的“6”）
- en: From a human perspective, all the images are very readable, so we should be
    able to extract all the text correctly
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从人类的角度来看，所有图像都非常易于阅读，因此我们应该能够正确地提取所有文本
- en: I then continue by using the base version of Qwen 2.5 VL 7B to predict some
    of the images and see which areas the model struggles with. I immediately noticed
    that the model (unsurprisingly) had problems separating “1”s from “7”s.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我继续使用Qwen 2.5 VL 7B的基础版本预测一些图像，并查看模型在哪些方面有困难。不出所料，模型在区分“1”和“7”方面存在问题。
- en: 'After this process of first manually inspecting the data, then predicting a
    bit with the model to see where it struggles, I note down the following data challenges:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个过程中，首先手动检查数据，然后用模型进行一点预测以查看它在哪些方面有困难，我记录以下数据挑战：
- en: “1” and “7” look similar
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “1”和“7”看起来很相似
- en: Dots in the background on some images
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一些图像背景上的点
- en: Cell borders can be misinterpreted as characters
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单元格边框可能会被误解为字符
- en: Parentheses and brackets can sometimes be confused
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 括号和方括号有时可能会混淆
- en: The text is faint in some images
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一些图像中的文本较淡
- en: We have to solve these challenges when fine-tuning the model to extract the
    text from the images, which I discuss in the next section.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在微调模型以从图像中提取文本时必须解决这些挑战，我将在下一节中讨论。
- en: Annotation and fine-tuning
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 标注和微调
- en: After properly inspecting your dataset, it’s time to work on annotation and
    fine-tuning. Annotation is the process of setting labels to each image, and fine-tuning
    is using these labels to improve the quality of your model.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在适当检查你的数据集后，是时候进行标注和微调了。标注是将标签设置到每张图像上的过程，微调是使用这些标签来提高模型的质量。
- en: 'The **main goal** when doing the annotation is to **create a dataset efficiently**.
    This means quickly producing a lot of labels and ensuring the quality of the labels
    is high. To achieve this goal of rapidly creating a high-quality dataset, I divided
    the process into three main steps:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行标注时的**主要目标**是**高效地创建数据集**。这意味着快速产生大量标签并确保标签的质量很高。为了实现快速创建高质量数据集的目标，我将这个过程分为三个主要步骤：
- en: Predict
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预测
- en: Review & correct model mistakes
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查并纠正模型错误
- en: Retrain
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新训练
- en: You should note that this process works well when you have a model already quite
    good at performing the task. In this problem, for example, Qwen is already quite
    good at extracting the text from the images, and only makes mistakes in 5–10%
    of the cases. If you have a completely new task for the model, this process will
    not work as well.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 应该注意的是，当你已经有了一个在执行任务方面相当出色的模型时，这个过程效果很好。在这个问题中，例如，Qwen已经相当擅长从图像中提取文本，并且只在5-10%的情况下出错。如果你为模型有一个全新的任务，这个过程可能不会那么有效。
- en: '![](../Images/c0fc15b944183aade3bae42178d2ec2e.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c0fc15b944183aade3bae42178d2ec2e.png)'
- en: This figure highlights my three-step process for rapidly creating an annotated
    dataset and fine-tuning Qwen. Step 1 uses the base model to predict on a few hundred
    samples. I then go through the model predictions and correct mistakes. After this,
    I train the model on my current set of annotated samples. Continuing, I use this
    fine-tuned model to predict on a new set of a few hundred samples, review and
    correct mistakes, and retrain. I continue this process until the model performance
    starts to converge. This process of creating a dataset is much faster than, for
    example, looking at each image and writing down the text in the image to create
    an annotated dataset. Image by the author.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 此图突出了我快速创建标注数据集和微调Qwen的三个步骤。第一步使用基础模型对几百个样本进行预测。然后我检查模型预测并纠正错误。之后，我在当前标注样本集上训练模型。继续进行，我使用这个微调模型对新的一组几百个样本进行预测，审查并纠正错误，然后重新训练。我继续这个过程，直到模型性能开始收敛。创建数据集的过程比例如查看每张图像并写下图像中的文本来创建标注数据集要快得多。图由作者提供。
- en: Step 1: Predict
  id: totrans-84
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第一步：预测
- en: The first step is to predict (extract the text) from a few hundred images using
    the base model. The specific number of images you predict on does not really matter,
    but you should try to strike a balance between gathering enough labels so a training
    run will improve the model enough (step 3) and taking into account the overhead
    required to train a model.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是从几百张图像中预测（提取文本）使用基础模型。你预测的图像数量并不真的重要，但你应该尝试在收集足够的标签以便训练运行足够改进模型（第3步）和考虑到训练模型所需的额外开销之间取得平衡。
- en: 'Step 2: Review & correct model mistakes'
  id: totrans-86
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第2步：回顾与纠正模型错误
- en: After you have predicted on a few hundred samples, it’s time to review and correct
    the model mistakes. You should set up your environment to easily display the images
    and labels and fix the errors. In the image below, you can see my setup for reviewing
    and correcting mistakes. On the left side, I have a Jupyter notebook where I can
    run the cell to display the following five samples and the corresponding line
    to which the label belongs. On the right side, all my labels are listed on the
    corresponding lines. To review and correct mistakes, I run the Jupyter notebook
    cell, make sure the labels on the right match the images on the left, and then
    rerun the cell to get the following five images. I repeat this process until I
    have looked through all the samples.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在对几百个样本进行预测之后，是时候回顾和纠正模型的错误了。你应该设置你的环境以便轻松显示图像和标签并修复错误。在下面的图像中，你可以看到我用于回顾和纠正错误的设置。在左侧，我有一个Jupyter笔记本，我可以运行单元格来显示以下五个样本及其对应的标签行。在右侧，所有我的标签都列在相应的行上。为了回顾和纠正错误，我运行Jupyter笔记本的单元格，确保右侧的标签与左侧的图像匹配，然后重新运行单元格以获取以下五个图像。我重复这个过程，直到我检查完所有样本。
- en: '![](../Images/4340f0559b20fac113a626ebc48a6abd.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4340f0559b20fac113a626ebc48a6abd.png)'
- en: This image shows my environment for reviewing and correcting model mistakes.
    On the left side, I have a Jupyter notebook where I can run the cell to display
    the next five images, along with the line to which each image’s label belongs.
    On the right side, I have all my labels on the corresponding lines. This environment
    makes it easy to look through all the model predictions and correct any mistakes.
    Image by the author.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图像显示了我用于回顾和纠正模型错误的设置。在左侧，我有一个Jupyter笔记本，我可以运行单元格来显示接下来的五个图像，以及每个图像的标签行。在右侧，我所有的标签都列在相应的行上。这个环境使得查看所有模型预测并纠正任何错误变得容易。图由作者提供。
- en: 'Step 3: Retrain:'
  id: totrans-90
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第3步：重新训练：
- en: Now that you have a few hundred correct samples, it is time to train the model.
    In my case, I take Qwen 2.5 VL 7B and tune it to my current set of labels. I fine-tune
    using the Unsloth package, which provides this notebook on fine-tuning Qwen (the
    notebook is for Qwen 2 VL, but all the code is the same, except changing the naming,
    as you see in the code below). You can check out the next section to learn more
    details about the fine-tuning process.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经收集了几百个正确的样本，是时候训练模型了。在我的情况下，我使用Qwen 2.5 VL 7B并调整它以适应我当前的标签集。我使用Unsloth包进行微调，该包提供了这个关于微调Qwen的笔记本（笔记本是为Qwen
    2 VL准备的，但所有代码都是相同的，除了命名更改，如下面的代码所示）。你可以查看下一节以了解更多关于微调过程的信息。
- en: The training creates a fine-tuned version of the model, and I go back to step
    1 to predict on a few hundred new samples. I repeat this cycle of predicting,
    correcting, and training until I notice model performance converges.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 训练创建了一个微调后的模型版本，然后我回到第1步，对几百个新的样本进行预测。我重复预测、纠正和训练的循环，直到我注意到模型性能收敛。
- en: '[PRE1]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: To determine how well my model is performing, I also create a test set on which
    I test each fine-tuned model. I never train on this test set to ensure unbiased
    results. This test set is how I can determine whether the model’s performance
    is converging.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定我的模型表现如何，我还创建了一个测试集，用于测试每个微调后的模型。我从不在这个测试集上训练，以确保结果的无偏性。这个测试集是我确定模型性能是否收敛的方法。
- en: SFT technical details
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SFT技术细节
- en: SFT stands for supervised fine-tuning, which is the process of updating the
    model’s weights to perform better on the dataset we provide. The problem we are
    working on here is quite interesting, as the base Qwen 2.5 VL model is already
    quite good at OCR. This differs from many other tasks we apply VLMs to at Findable,
    where we typically teach the VLM a completely new task with which it essentially
    has no prior experience.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: SFT代表监督微调，这是更新模型权重以在提供的数据集上表现更好的过程。我们正在解决的问题是相当有趣的，因为基础Qwen 2.5 VL模型在OCR方面已经相当出色。这与我们在Findable应用VLM的许多其他任务不同，我们通常教VLM一个完全新的任务，它实际上没有任何先验经验。
- en: When fine-tuning a VLM such as Qwen on a new task, model performance rapidly
    increases once you start training it. However, the task we are working on here
    is quite different, since we only want to nudge Qwen to be a little bit better
    at reading the handwriting for our particular images. As I mentioned, the model’s
    performance is around 90–95 % accurate (depending on the specific images we test
    on), on this dataset.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 当在新的任务上微调VLM，如Qwen，模型性能一旦开始训练就会迅速提高。然而，我们正在解决的任务相当不同，因为我们只想推动Qwen在读取特定图像的手写方面变得更好一点。正如我提到的，模型在这个数据集上的性能大约是90-95%（取决于我们测试的具体图像），准确。
- en: This requirement of only nudging the model makes the model super sensitive to
    the tuning process parameters. To ensure we nudge the model properly, we do the
    following
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这种仅对模型进行微调的要求使得模型对调整过程参数非常敏感。为了确保我们正确地推动模型，我们采取以下措施
- en: Set a **low learning rate**, to only slightly update the weights
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置一个**低学习率**，以仅略微更新权重
- en: Set a **low LoRA rank** to only update a small set of the model weights
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置一个**低LoRA秩**，以仅更新一小部分模型权重
- en: Ensure **all labels are correct** (the model is super sensitive to just a few
    annotation errors)
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保所有标签都是正确的（模型对仅仅几个标注错误非常敏感）
- en: '**Balance the dataset** (there are a lot of blank images, we filter out some
    of them)'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平衡数据集**（有很多空白图片，我们过滤掉了一些）'
- en: '**Tune all layers** of the VLM'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调整VLM的所有层**'
- en: Perform a **hyperparameter search**
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行**超参数搜索**
- en: '* * *'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'I will add some additional notes on some of the points:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我将对一些要点添加一些额外的说明：
- en: Label correctness
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 标签正确性
- en: Label correctness is of utmost importance. Just a few labeling errors can have
    a detrimental effect on model performance. As an example, when I was working on
    fine-tuning my model, I noticed the model started confusing parentheses “( )”
    with brackets “[ ]”. This is, of course, a significant error, so I started looking
    into why this occurred. My first intuition was that this was due to issues with
    some of my labels (i.e, some images that were in fact parentheses, had received
    a label with brackets). I started looking into my labels and noticed this error
    in around 0.5% of them.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 标签的正确性至关重要。仅仅几个标签错误就可能会对模型性能产生负面影响。例如，当我正在微调我的模型时，我发现模型开始混淆括号“（ ）”和方括号“[ ]”。这当然是一个重大的错误，所以我开始调查为什么会出现这种情况。我的第一个直觉是，这可能是由于一些标签的问题（即，一些实际上是括号的图片，却收到了带有方括号的标签）。我开始检查我的标签，并注意到大约0.5%的标签存在这个错误。
- en: This helped me make an interesting observation, however. I had a set of around
    1000 labels. 99.5% of the labels were correct, while 0.5% (5 labels!) were incorrect.
    However, after fine-tuning my model, it actually performed worse on the test set.
    This highlights that just a few incorrect labels can hurt your model’s performance.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这帮助我做出了一个有趣的观察。我有一组大约1000个标签。其中99.5%的标签是正确的，而0.5%（5个标签！）是错误的。然而，在微调我的模型后，它在测试集上的表现实际上更差了。这突出了仅仅几个错误的标签就会损害模型性能。
- en: '![](../Images/731b6f59460eb6e459919f0af7e6197d.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/731b6f59460eb6e459919f0af7e6197d.png)'
- en: This is an example of an image where the label was set to a bracket, while you
    can clearly see the image contains parentheses. Image by the author.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个例子，标签被设置为方括号，而你可以清楚地看到图片中包含括号。图片由作者提供。
- en: The reason so few mistakes can have such a large impact is that the model blindly
    trusts the labels you give it. The model doesn’t look at the image and think *Hmmm,
    why is this a bracket when the image has a parenthesis?* (like you might do).
    The model blindly trusts the labels and accepts it as a fact that this image (which
    is a parenthesis) contains a bracket. This really degrades model performance,
    as you are giving incorrect information, which it now uses to perform future predictions.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 很少错误能产生如此大的影响的原因是模型盲目地信任你给它提供的标签。模型不会查看图像并思考“嗯，为什么图像中有括号时，这个括号是一个括号？”（就像你可能会做的那样）。模型盲目地信任标签，并接受它作为一个事实，即这张图像（是一个括号）包含一个括号。这实际上会降低模型性能，因为你提供了错误的信息，它现在会使用这些信息来进行未来的预测。
- en: Data balancing
  id: totrans-113
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据平衡
- en: Another detail of the fine-tuning is that I balance out the dataset to limit
    the number of blank images. Around 70% of the cells contain blank images, and
    I want to avoid spending too much fine-tuning on those images (the model already
    manages to ignore those cells really well). Thus, I ensure that a maximum of 30%
    of the data we fine-tune contains blank images.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 精调的另一个细节是，我平衡数据集以限制空白图像的数量。大约70%的细胞包含空白图像，我希望避免在这些图像上花费过多的精调时间（模型已经能够很好地忽略这些细胞）。因此，我确保我们精调的数据中最多只有30%包含空白图像。
- en: Selecting layers to tune
  id: totrans-115
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 选择要微调的层
- en: 'The image below shows the general architecture of a VLM:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图像显示了VLM的一般架构：
- en: '![](../Images/5aa15dfe3675e5d0f769c07e7febeb12.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5aa15dfe3675e5d0f769c07e7febeb12.png)'
- en: This image shows the standard architecture layout of a VLM. The image is fed
    through a ViT (vision transformer), which extracts visual tokens from the image.
    These tokens are then fed through a VL (vision-language) adapter to ensure image
    tokens are in the same embedding space as text tokens. Text fed into the model
    is simply tokenized. Both the text and image tokens are then fed into the decoder,
    which produces output text.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图像显示了VLM的标准架构布局。图像通过ViT（视觉转换器）进行处理，从中提取视觉标记。然后这些标记被输入到VL（视觉-语言）适配器中，以确保图像标记与文本标记处于相同的嵌入空间。输入到模型中的文本被简单地标记化。文本和图像标记随后被输入到解码器中，解码器产生输出文本。
- en: A consideration to make when fine-tuning VLMs is which layers you fine-tune.
    Ideally, you want to tune all the layers (marked in green in the image below),
    which I also did when working on this problem. However, sometimes you will have
    compute constraints, which makes tuning all layers difficult, and you might not
    need to tune all layers. An example of this could be if you have a very image-dependent
    task. At Findable, for example, we classify drawings from architects, civil engineers,
    etc. This is naturally a very vision-dependent task, and this is an example of
    a case where you can potentially get away with only tuning the vision layers of
    the model (the ViT — Vision transformer, and the Vision-Language adapter, sometimes
    referred to as a projector).
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调VLM时需要考虑的一个因素是你要微调哪些层。理想情况下，你希望调整所有层（如图中绿色标记所示），我在解决这个问题时也是这样做的。然而，有时你会遇到计算限制，这使得调整所有层变得困难，你可能不需要调整所有层。一个例子是，如果你有一个非常依赖图像的任务。例如，在Findable，我们分类来自建筑师、土木工程师等的图纸。这自然是一个非常依赖视觉的任务，这是一个你可以只调整模型视觉层（ViT——视觉转换器和视觉-语言适配器，有时被称为投影仪）的案例。
- en: '![](../Images/42d9a0a8788c6912a2d28f40093f2c72.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/42d9a0a8788c6912a2d28f40093f2c72.png)'
- en: This is an example of an architect’s drawing. The drawing is sourced from the
    Oslo municipality and is unrelated to the Findable AS customer data. The drawing
    is found by going to the Oslo municipality website for saksinnsyn (case access
    in English) ([https://innsyn.pbe.oslo.kommune.no/saksinnsyn/main.asp](https://innsyn.pbe.oslo.kommune.no/saksinnsyn/main.asp)).
    Searching for Camilla Collects vei (a randomly selected address). Then pressing
    the button Søk i sak (search in case). Selecting the case with Saksnummer (case
    number ) 202317562, pressing the tab with tegninger, and selecting the drawing
    called plan 8 etasje. The figure is used after speaking to City of Oslo Planning
    and Building Services, who gave permission to use any publicly available drawings
    on their website. The drawing was accessed on 23.05.2024
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一张建筑师绘图的例子。这张图来自奥斯陆市政府，与Findable AS客户数据无关。通过访问奥斯陆市政府网站上的saksinnsyn（英文中的案例访问）([https://innsyn.pbe.oslo.kommune.no/saksinnsyn/main.asp](https://innsyn.pbe.oslo.kommune.no/saksinnsyn/main.asp))找到这张图。搜索Camilla
    Collects vei（随机选择的一个地址）。然后点击Søk i sak（搜索案例）按钮。选择Saksnummer（案例编号）为202317562的案例，点击包含tegnninger（图纸）的标签页，并选择名为plan
    8 etasje的图纸。这张图是在与奥斯陆市规划和建设服务部门交谈后使用的，他们允许使用网站上任何公开可用的图纸。该图纸是在2024年5月23日访问的。
- en: Hyperparameter search
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 超参数搜索
- en: I also did a hyperparameter search to find the optimal set of parameters to
    fine-tune the model. It is worth noting, however, that a hyperparameter search
    will not always be possible. Some training processes for large language models
    can take several days, and in such scenarios, performing an extensive hyperparameter
    search is not feasible, so you will have to work with your intuition to find a
    good set of parameters.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '我还进行了一次超参数搜索，以找到微调模型的最佳参数集。然而，值得注意的是，超参数搜索并不总是可行的。一些大型语言模型的训练过程可能需要几天时间，在这种情况下，进行广泛超参数搜索是不可行的，因此您将不得不依靠直觉来找到一组好的参数。 '
- en: However, for this problem of extracting handwritten text, I had access to an
    A100 80 GB GPU. The images are quite small (less than 100px in each direction),
    and I’m working with the 7B model. This made the training take 10–20 minutes,
    which makes an overnight hyperparameter search feasible.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于提取手写文本这个问题，我有一个A100 80 GB GPU。图像相当小（每个方向小于100px），我使用的是7B模型。这使得训练只需要10-20分钟，这使得过夜的超参数搜索变得可行。
- en: '![](../Images/ac89465518f47ef53eaab8d48562343c.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ac89465518f47ef53eaab8d48562343c.png)'
- en: This is an arbitrary graph I created showing the amount of effort required to
    improve a model’s accuracy. As you can see in the figure, much less effort is
    required to go from 80–90% accuracy than the effort required to go from 95–99%
    accuracy. Image by the author.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个我创建的任意图表，展示了提高模型准确度所需付出的努力。如图所示，从80-90%的准确度提升到95-99%的准确度所需的努力要少得多。图片由作者提供。
- en: Results and plots
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果和图表
- en: 'After repeating the cycle of training the model, creating more labels, retraining,
    and so on, I have created a high-performing fine-tuned model. Now it’s time to
    see the final results. I have made four test sets, each consisting of 278 samples.
    I run EasyOCR, the base [Qwen 2.5 VL 7B model](https://qwenlm.github.io/blog/qwen2.5-vl/)
    (*Qwen base model*), and the fine-tuned model on the data, and you can see the
    results in the table below:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在重复训练模型、创建更多标签、重新训练等循环之后，我已经创建了一个高性能的微调模型。现在是时候查看最终结果了。我制作了四个测试集，每个测试集包含278个样本。我在数据上运行了EasyOCR、基础[Qwen
    2.5 VL 7B模型](https://qwenlm.github.io/blog/qwen2.5-vl/)（*Qwen基础模型*）以及微调模型，您可以在下表看到结果：
- en: '![](../Images/7358a374d1f0414ea4b625be17fd4a3f.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7358a374d1f0414ea4b625be17fd4a3f.png)'
- en: These are the results from three different models on four test sets. You can
    see that EasyOCR is not performing well, and its results are so bad that you cannot
    trust the numbers it provides. The Qwen base model performs quite well, ranging
    from 93–99%. This could be acceptable performance in some scenarios, but it was
    not enough for the dataset I was working on and my performance expectations. You
    can, however, clearly see that the fine-tuning of the model worked well, and it
    performs better than the base Qwen model on all testsets than number 4, where
    the two models are equally good. The Qwen base and fine-tuned models are based
    on Qwen 2.5 VL 7B by Alibaba.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是从四个测试集得到的三个不同模型的结果。你可以看到EasyOCR的表现并不好，其结果非常糟糕，以至于你无法相信它提供的数字。Qwen基础模型表现相当好，范围在93-99%。在某些场景下，这种性能可能是可以接受的，但对我来说，我所工作的数据集和我的性能预期并不足够。然而，你可以清楚地看到，模型的微调工作得很好，它在所有测试集上的表现都优于基础Qwen模型，尤其是在第4个测试集中，两个模型的表现相当。Qwen基础模型和微调模型基于阿里巴巴的Qwen
    2.5 VL 7B。
- en: Thus, the results clearly show that the fine-tuning has worked as expected,
    vastly improving model performance.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，结果清楚地表明，微调正如预期的那样工作，大大提高了模型性能。
- en: To end off, I would also like to share some plots you can make with the data.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我还想分享一些你可以用这些数据制作的图表。
- en: '![](../Images/ccc7db2b412592e4a7f9f8940d3fbe16.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ccc7db2b412592e4a7f9f8940d3fbe16.png)'
- en: This is tree line data, extracted from the images, and plotted onto a map of
    Norway using [H3 by Uber](https://www.uber.com/en-NO/blog/h3/). You can see how
    the tree line gets colder (lower) towards the ocean, and to the north, and it
    gets warmer (higher), if you look inwards into the country. Image by the author,
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这是来自图像中提取的树木线数据，使用[Uber的H3](https://www.uber.com/en-NO/blog/h3/)绘制在挪威地图上。你可以看到树木线如何向海洋和北方变冷（变低），如果你朝向国家内部看，它会变暖（变高）。图片由作者提供，
- en: If you want to investigate the data further, it is all contained in [this parquet
    file on HuggingFace](https://huggingface.co/datasets/findableai/phenology/blob/main/df_labels_and_images.parquet).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想进一步调查数据，它全部包含在[HuggingFace上的这个parquet文件](https://huggingface.co/datasets/findableai/phenology/blob/main/df_labels_and_images.parquet)中。
- en: Conclusion
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have introduced you to a Phenology dataset, consisting of
    small images with handwritten text. The problem I have addressed in this article
    is how to extract the handwritten text from these images effectively. First, we
    inspected the dataset to understand what it looks like, the variance in the data,
    and the challenges the vision language model faces when extracting the text from
    the images. I then discussed the three-step pipeline you can use to create a labelled
    dataset and fine-tune a model to improve performance. Finally, I highlighted some
    results, showing how fine-tuning Qwen works better than the base Qwen model, and
    I also showed some plots representing the data we extracted.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我向您介绍了一个物候数据集，它由带有手写文本的小图像组成。我在本文中解决的问题是如何有效地从这些图像中提取手写文本。首先，我们检查了数据集，以了解其外观、数据的变异性以及视觉语言模型在从图像中提取文本时面临的挑战。然后，我讨论了你可以使用的三步流程来创建标记数据集并微调模型以提高性能。最后，我突出了一些结果，展示了微调Qwen如何比基础Qwen模型表现更好，我还展示了表示我们提取的数据的一些图表。
- en: The work in this article is performed by [Eivind Kjosbakken](https://www.linkedin.com/in/eivind-kjosbakken/)
    and [Lars Aurdal](https://www.linkedin.com/in/lars-aurdal-a2582b1b/).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 本文中的工作由 [Eivind Kjosbakken](https://www.linkedin.com/in/eivind-kjosbakken/)
    和 [Lars Aurdal](https://www.linkedin.com/in/lars-aurdal-a2582b1b/) 完成。
