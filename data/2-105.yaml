- en: 'Automating Ticket Creation in Jira With the OpenAI Agents SDK: A Step-by-Step
    Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 OpenAI 代理 SDK 自动创建 Jira 问题的步骤指南：自动化 Jira 问题的创建
- en: 原文：[https://towardsdatascience.com/automating-ticket-creation-in-jira-with-the-openai-agents-sdk-a-step-by-step-guide/](https://towardsdatascience.com/automating-ticket-creation-in-jira-with-the-openai-agents-sdk-a-step-by-step-guide/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/automating-ticket-creation-in-jira-with-the-openai-agents-sdk-a-step-by-step-guide/](https://towardsdatascience.com/automating-ticket-creation-in-jira-with-the-openai-agents-sdk-a-step-by-step-guide/)
- en: What if after finishing a meeting with a colleague you would already have all
    your discussed items in your project-management tool? No need for writing anything
    down during the meeting, nor to manually create corresponding tickets! That was
    the thought of this short experimental project.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在会议结束后，你已经在项目管理工具中有了所有讨论的项目，会怎样？在会议期间无需写下任何东西，也不必手动创建相应的票证！这正是这个短期实验项目的想法。
- en: In this step-by-step guide we will create the Python application “TaskPilot”
    using [OpenAI’s Agents SDK](https://openai.github.io/openai-agents-python/) to
    automatically create Jira issues given a meeting transcript.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本步骤指南中，我们将使用 [OpenAI 的代理 SDK](https://openai.github.io/openai-agents-python/)
    创建名为“TaskPilot”的 Python 应用程序，以自动根据会议记录创建 Jira 问题。
- en: 'The Challenge: From Conversation to Actionable Tasks'
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战：从对话到可执行任务
- en: Given the transcript of a meeting, create issues in a Jira project automatically
    and corresponding to what was discussed in the meeting.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 根据会议记录，自动在 Jira 项目中创建问题，并对应于会议中讨论的内容。
- en: 'The Solution: Automating with OpenAI Agents'
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案：使用 OpenAI 代理自动化
- en: Using the [**OpenAI Agents SDK**](https://openai.github.io/openai-agents-python/)we
    will implement an agents workflow that**:**
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 [**OpenAI 代理 SDK**](https://openai.github.io/openai-agents-python/)，我们将实现一个代理工作流程，**：**
- en: '*Receives and reads a meeting transcript****.***'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*接收并读取会议记录****.***'
- en: '*Uses an AI agent to extract action items from the conversation.*'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*使用 AI 代理从对话中提取行动项。*'
- en: '*Uses another AI agent to create Jira issues from those action items.*'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*使用另一个 AI 代理根据那些行动项创建 Jira 问题。*'
- en: '![](../Images/d7c3b454077877013b3569bb02bc02c9.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d7c3b454077877013b3569bb02bc02c9.png)'
- en: 'Agent flow: Image created by the author'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 代理流程：图像由作者创建
- en: '* * *'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The OpenAI Agents SDK
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OpenAI 代理 SDK
- en: The [OpenAI Agents SDK](https://openai.github.io/openai-agents-python/) is a
    Python library to create AI agents programmatically that can interact with tools,
    use MCP-Servers or hand off tasks to other agents.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[OpenAI 代理 SDK](https://openai.github.io/openai-agents-python/) 是一个 Python
    库，可以编程创建 AI 代理，它们可以与工具交互、使用 MCP 服务器或将任务委托给其他代理。'
- en: 'Here are some of the key features of the SDK:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: SDK 的一些关键特性如下：
- en: '**Agent Loop:** A built-in agent loop that handles the back-and-forth communication
    with the LLM until the agent is done with its task.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理循环**：一个内置的代理循环，处理与 LLM 的来回通信，直到代理完成其任务。'
- en: '**Function Tools:** Turns any Python function into a tool, with automatic schema
    generation and Pydantic-powered validation.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**功能工具**：将任何 Python 函数转换为工具，具有自动模式生成和 Pydantic 驱动的验证。'
- en: '**MCP Support**: Allows agents to use MCP servers to extend its capabilities
    of interacting with the outside world.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP 支持**：允许代理使用 MCP 服务器扩展其与外部世界交互的能力。'
- en: '**Handoffs:** Allows agents to delegate tasks to other agents depending on
    their expertise/role.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务委托**：允许代理根据其专长/角色将任务委托给其他代理。'
- en: '**Guardrails**: Validates the inputs and outputs of the agents. Aborts execution
    early if the agent receives invalid input.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全网**：验证代理的输入和输出。如果代理收到无效输入，则提前终止执行。'
- en: '**Sessions:** Automatically manages the conversation history. Ensures that
    the agents have the context they need to perform their tasks.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**会话管理**：自动管理对话历史。确保代理拥有执行任务所需的上下文。'
- en: '**Tracing:** Provides a tracing context manager which allows to visualize the
    entire execution flow of the agents, making it easy to debug and understand what’s
    happening under the hood.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跟踪**：提供跟踪上下文管理器，允许可视化代理的整个执行流程，使其易于调试和理解底层发生的事情。'
- en: Now, let’s dive into the implementation!
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们深入了解实现过程！
- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Implementation
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现
- en: 'We will implement our project in 8 simple steps:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将按照以下 8 个简单步骤实现我们的项目：
- en: '[Setting up the project structure](#step-one)'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[设置项目结构](#step-one)'
- en: '[The TaskPilotRunner](#step-two)'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[TaskPilot 运行器](#step-two)'
- en: '[Defining our data models](#step-three)'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[定义我们的数据模型](#step-three)'
- en: '[Creating the agents](#step-four)'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[创建代理](#step-four)'
- en: '[Providing tools](#step-five)'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[提供工具](#step-five)'
- en: '[Configuring the application](#step-six)'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[配置应用程序](#step-six)'
- en: '[Bringing it all together in `main.py`](#step-seven)'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[在 `main.py` 中整合一切](#step-seven)'
- en: '[Monitoring our runs in the OpenAI Dev Platform](#step-eight)'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[在 OpenAI 开发平台中监控我们的运行](#step-eight)'
- en: Let’s get hands on!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们动手实践吧！
- en: 'Step 1: Setting Up the Project Structure'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 1 步：设置项目结构
- en: 'First, let’s create the basic structure of our project:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们创建我们项目的基本结构：
- en: 'The `taskpilot` directory: will contain our main application logic.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`taskpilot` 目录：将包含我们的主要应用程序逻辑。'
- en: 'The `local_agents`directory: will contain where we define the agents we will
    use in this project (“local_agents” so that there is no interference with the
    OpenAI library `agents`)'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`local_agents` 目录：将包含我们将在本项目中使用代理的定义（“local_agents”以避免与 OpenAI 库 `agents` 发生冲突）。'
- en: 'The `utils` directory: for helper functions, a config parser and data models.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`utils` 目录：用于辅助函数、配置解析器和数据模型。'
- en: '[PRE0]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Step 2: The TaskPilotRunner'
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 2 步：TaskPilotRunner
- en: The `TaskPilotRunner` class in `taskpilot/taskpilot_runner.py` will be the heart
    of our application. It will orchestrate the entire workflow, extracting action
    items from the meeting transcript and then creating the Jira tickets from the
    action items. At the same time it will activate the built-in tracing from the
    Agents SDK to collect a record of events during the agents run that will help
    for debugging and monitoring the agent workflows.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '`taskpilot/taskpilot_runner.py` 中的 `TaskPilotRunner` 类将是我们的应用程序的核心。它将协调整个工作流程，从会议记录中提取行动项，然后从行动项中创建
    Jira 票据。同时，它将激活代理 SDK 内置的跟踪，以收集代理运行期间的事件记录，这有助于调试和监控代理工作流程。'
- en: 'Let’s start with the implementation:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从实现开始：
- en: In the `__init__()` method we will create the two agents used for this workflow.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 `__init__()` 方法中，我们将创建用于此工作流程的两个代理。
- en: The `run()` method will be the most important of the `TaskPilotRunner` class,
    which will receive the meeting transcript and pass it to the agents to create
    the Jira issues. The agents will be started and run within a **trace context manager**
    i.e. `with trace("TaskPilot run", trace_id):` . A trace from the Agents SDK represents
    a single end-to-end operation of a “workflow”.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`run()` 方法将是 `TaskPilotRunner` 类中最重要的方法，它将接收会议记录并将其传递给代理以创建 Jira 问题。代理将在一个
    **跟踪上下文管理器** 中启动和运行，即 `with trace("TaskPilot run", trace_id):`。来自代理 SDK 的跟踪代表一个“工作流程”的单个端到端操作。'
- en: The `_extract_action_items()` and `_create_tickets()` methods will start and
    run each of the agents respectively. Within these methods the `Runner.run()` method
    from the OpenAI Agents SDK will be used to trigger the agents. It takes an agent
    and an input, and it returns the final output of the agent’s execution. Finally,
    the result of each agent will be parsed to its defined output type.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`_extract_action_items()` 和 `_create_tickets()` 方法将分别启动和运行每个代理。在这些方法中，将使用 OpenAI
    代理 SDK 的 `Runner.run()` 方法来触发代理。该方法接受一个代理和一个输入，并返回代理执行的最终输出。最后，每个代理的结果将被解析为其定义的输出类型。'
- en: '[PRE1]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '*The three methods are defined as* ***asynchronous functions****. The reason
    for this is that the `Runner.run()` method from the OpenAI Agents SDK is defined
    itself as an `async` coroutine. This allows multiple agents, tool calls, or streaming
    endpoints to run* ***in parallel without blocking****.*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '*这三个方法被定义为* ***异步函数****。这样做的原因是，来自 OpenAI 代理 SDK 的 `Runner.run()` 方法本身被定义为
    `async` 协程。这允许多个代理、工具调用或流端点** ***并行运行而不阻塞****。*'
- en: 'Step 3: Defining Our Data Models'
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 3 步：定义我们的数据模型
- en: Without specific configuration agents return text in `str` as output. To ensure
    that our agents provide structured and predictable responses, the library supports
    the use of [Pydantic](https://docs.pydantic.dev/latest/) models for defining the
    `output_type` of the agents ([it actually supports any type that can be wrapped
    in a Pydantic TypeAdapter — dataclasses, lists, TypedDict, etc.](https://openai.github.io/openai-agents-python/agents/#output-types)).
    The data-models we define will be the data structures that our agents will work
    with.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 没有特定配置的情况下，代理将以 `str` 作为输出返回文本。为了确保我们的代理提供结构化和可预测的响应，库支持使用 [Pydantic](https://docs.pydantic.dev/latest/)
    模型来定义代理的 `output_type`（[它实际上支持任何可以包裹在 Pydantic TypeAdapter 中的类型——dataclasses、列表、TypedDict
    等](https://openai.github.io/openai-agents-python/agents/#output-types)）。我们定义的数据模型将是代理将与之交互的数据结构。
- en: 'For our usecase we will define three models in `taskpilot/utils/models.py`:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的用例，我们将在 `taskpilot/utils/models.py` 中定义三个模型：
- en: '**`ActionItem`:** This model represents a single action item that is extracted
    from the meeting transcript.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`ActionItem`**：此模型代表从会议记录中提取的单个行动项。'
- en: '**`ActionItemsList`:** This model is a list of `ActionItem` objects.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`ActionItemsList`**：此模型是`ActionItem`对象的列表。'
- en: '**`CreateIssuesResponse`:** This model defines the structure of the response
    from the agent that will create the issues/tickets.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`CreateIssuesResponse`**：此模型定义了代理创建问题/工单的响应结构。'
- en: '[PRE2]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Step 4: Creating the Agents'
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 4 步：创建代理
- en: 'The agents are the core of our application. Agents are basically an LLM configured
    with instructions (the `AGENT_PROMPT`) and access to tools for them to act on
    its own on defined tasks. An agent from the OpenAI Agents SDK is defined by the
    following parameters:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 代理是应用程序的核心。代理基本上是一个配置了指令（`AGENT_PROMPT`）并有权访问工具以在定义的任务上自主行动的 LLM。OpenAI 代理 SDK
    中的代理由以下参数定义：
- en: '**`name`:** The name of the agent for identification.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`name`**：用于识别代理的名称。'
- en: '**`instructions`:** The prompt to tell the agent its role or task it shall
    execute (aka. system prompt).'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`instructions`**：告知代理其角色或应执行的任务的提示（也称为系统提示）。'
- en: '**`model`:** Which LLM to use for the agent. The SDK provides out-of-the-box
    support for OpenAI models, however you can also use non-OpenAI models (see [Agents
    SDK: Models](https://openai.github.io/openai-agents-python/models/)).'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`model`**：用于代理的 LLM。SDK 为 OpenAI 模型提供开箱即用的支持，但是您也可以使用非 OpenAI 模型（见 [Agents
    SDK：模型](https://openai.github.io/openai-agents-python/models/)）。'
- en: '**`output_type`:** Python object that the agent shall returned, as mentioned
    previously.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`output_type`**：代理应返回的 Python 对象，如前所述。'
- en: '**`tools`:** A list of python callables, that will be the tools that the agent
    can use to perform its tasks.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`tools`**：一个 Python 可调用列表，这些将作为代理可以使用的工具来执行其任务。'
- en: 'Based on this information, let’s create our two agents: the **`ActionItemsExtractor`**
    and the **`TicketsCreator`**.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些信息，让我们创建我们的两个代理：**`ActionItemsExtractor`** 和 **`TicketsCreator`**。
- en: Action Items Extractor
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 行动项提取器
- en: This agent’s job is to read the meeting transcript and extract the action items.
    We’ll create it in `taskpilot/local_agents/action_items_extractor.py`.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 此代理的任务是读取会议记录并提取行动项。我们将在`taskpilot/local_agents/action_items_extractor.py`中创建它。
- en: '[PRE3]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: As you can see, in the `AGENT_PROMPT` we tell the agent very detailed that its
    job is to extract action items and provide a detailed description of how we want
    the action items to be extracted.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，在`AGENT_PROMPT`中，我们详细告知代理其任务是提取行动项，并详细说明我们希望如何提取行动项。
- en: Tickets Creator
  id: totrans-70
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 票据创建器
- en: This agent takes the list of action items and creates Jira issues. We’ll create
    it in `taskpilot/local_agents/tickets_creator.py`.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 此代理接受行动项列表并创建 Jira 工单。我们将在`taskpilot/local_agents/tickets_creator.py`中创建它。
- en: '[PRE4]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Here we set the `tools` parameter and give the agent the `create_jira_issue`
    tool, which we’ll create in the next step.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们设置`tools`参数，并给代理提供`create_jira_issue`工具，我们将在下一步创建它。
- en: 'Step 5: Providing Tools'
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 5 步：提供工具
- en: 'One of the most powerful features of agents is their ability to use tools to
    interact with the outside world. One could argue that the use of tools is what
    turns the interaction with an LLM into an agent. The OpenAI Agents SDK allows
    the agents to use three types of tools:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 代理最强大的功能之一是它们使用工具与外部世界交互的能力。有人可能会说，工具的使用是将与 LLM 的交互转变为代理的关键。OpenAI 代理 SDK 允许代理使用三种类型的工具：
- en: '**Hosted tools**: Provided directly from OpenAI such as searching the web or
    files, computer use, running code, among others.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**托管工具**：直接由 OpenAI 提供，如搜索网络或文件、计算机使用、运行代码等。'
- en: '**Function calling**: Using any Python function as a tool.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**函数调用**：使用任何 Python 函数作为工具。'
- en: '**Agents as tools**: Allowing agents to call other agents without handing off.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理作为工具**：允许代理调用其他代理而无需移交。'
- en: 'For our usecase, we will be using function calling and implement a function
    to create the Jira issues using [Jira’s REST API](https://developer.atlassian.com/cloud/jira/platform/rest/v3/).
    By personal choice, I decided to separate it in two files:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的用例，我们将使用函数调用并实现一个使用[Jira 的 REST API](https://developer.atlassian.com/cloud/jira/platform/rest/v3/)创建
    Jira 工单的函数。根据个人选择，我决定将其分为两个文件：
- en: In `taskpilot/utils/jira_interface_functions.py` we will write the functions
    to interact through HTTP Requests with the Jira REST API.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`taskpilot/utils/jira_interface_functions.py`中，我们将编写通过 HTTP 请求与 Jira REST API
    交互的函数。
- en: In `taskpilot/utils/agents_tools.py` we will write wrappers of the functions
    to be provided to the agents. These wrapper-functions have additional response
    parsing to provide the agent a processed text response instead of a JSON. Nevertheless,
    the agent should also be able to handle and understand JSON as response.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 `taskpilot/utils/agents_tools.py` 中，我们将编写要提供给代理的函数的包装器。这些包装函数具有额外的响应解析，以便为代理提供一个处理过的文本响应而不是
    JSON。尽管如此，代理也应该能够处理和理解 JSON 作为响应。
- en: 'First we implement the `create_issue()` function in `taskpilot/utils/jira_interface_functions.py` :'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们在 `taskpilot/utils/jira_interface_functions.py` 中实现 `create_issue()` 函数：
- en: '[PRE5]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: As you can see, we need to authenticate to our Jira account using our Jira user
    and a corresponding `API_KEY` that we can obtain on [Atlassian Account Management](https://id.atlassian.com/manage-profile/security/api-tokens).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们需要使用我们的 Jira 用户和相应的 `API_KEY`（我们可以在 [Atlassian 账户管理](https://id.atlassian.com/manage-profile/security/api-tokens)
    上获取）来验证我们的 Jira 账户。
- en: 'In `taskpilot/utils/agents_tools.py` we implement the `create_jira_issue()`
    function, that we will then provide to the `TicketsCreator` agent:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `taskpilot/utils/agents_tools.py` 文件中，我们实现了 `create_jira_issue()` 函数，该函数将被提供给
    `TicketsCreator` 代理：
- en: '[PRE6]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Very important**: The **`@function_tool`** decorator is what makes this function
    usable for our agent. The agent can now call this function and pass it an `ActionItem`
    object. The function then uses the `create_issue` function which accesses the
    Jira API to create a new issue.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**非常重要**：**`@function_tool`** 装饰器使得这个函数可以被我们的代理使用。现在代理可以调用这个函数并传递一个 `ActionItem`
    对象。然后该函数使用 `create_issue` 函数，该函数通过访问 Jira API 来创建一个新的问题。'
- en: 'Step 6: Configuring the Application'
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 6 步：配置应用程序
- en: To make our application parametrizable, we’ll use a **`config.yml`** file for
    the configuration settings, as well as a **`.env`** file for the API keys.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使我们的应用程序可参数化，我们将使用 **`config.yml`** 文件进行配置设置，以及用于 API 密钥的 **`.env`** 文件。
- en: 'The configuration of the application is separated in:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的配置被分开：
- en: '**`agents`**: To configure the agents and the access to the OpenAI API. Here
    we have two parameters: `model` , which is the LLM that shall be used by the agents,
    and `OPENAI_API_KEY` , in the `.env` file, to authenticate the use of the OpenAI
    API. You can obtain an OpenAI API Key in your [OpenAI Dev Platform](https://platform.openai.com/settings/organization/api-keys).'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`agents`**: 用于配置代理和对 OpenAI API 的访问。这里有两个参数：`model`，这是代理将使用的 LLM，以及 `.env`
    文件中的 `OPENAI_API_KEY`，用于验证对 OpenAI API 的使用。您可以在您的 [OpenAI 开发平台](https://platform.openai.com/settings/organization/api-keys)
    上获取 OpenAI API 密钥。'
- en: '**`jira`**: To configure the access to the Jira API. Here we need four parameters:
    `url_rest_api` , which is the URL to the REST API of our Jira instance; `user` ,
    which is the user we use to access Jira; `request_timeout` , which is the timeout
    in seconds to wait for the server to send data before giving up, and finally `ATLASSIAN_API_KEY` ,
    in the `.env` file, to authenticate to your Jira instance.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`jira`**: 用于配置对 Jira API 的访问。这里需要四个参数：`url_rest_api`，这是我们 Jira 实例的 REST API
    的 URL；`user`，这是我们用于访问 Jira 的用户；`request_timeout`，这是在放弃之前等待服务器发送数据的超时时间（以秒为单位），最后是
    `.env` 文件中的 `ATLASSIAN_API_KEY`，用于验证对 Jira 实例的访问。'
- en: 'Here is our `.env` file, that in the next step will be loaded to our application
    in the `main.py` using the [`python-dotenv` library](https://pypi.org/project/python-dotenv/):'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们的 `.env` 文件，在下一步中，它将通过 `main.py` 中的 `python-dotenv` 库（[https://pypi.org/project/python-dotenv/](https://pypi.org/project/python-dotenv/)）被加载到我们的应用程序中：
- en: '[PRE7]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'And here is our `config.yml` file:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们的 `config.yml` 文件：
- en: '[PRE8]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: We’ll also create a config parser at `taskpilot/utils/config_parser.py` to load
    this configuration. For this we implement the `Config` class as a singleton (meaning
    there can only be one instance of this class throughout the application lifespan).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将在 `taskpilot/utils/config_parser.py` 中创建一个配置解析器来加载这个配置。为此，我们实现了 `Config`
    类作为单例（这意味着在整个应用程序生命周期中只能有一个此类实例）。
- en: '[PRE9]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Step 7: Bringing It All Together in `main.py`'
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 7 步：在 `main.py` 中整合所有内容
- en: Finally, in `taskpilot/main.py`, we’ll bring everything together. This script
    will load the meeting transcript, create an instance of the `TaskPilotRunner` ,
    and then call the `run()` method.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在 `taskpilot/main.py` 中，我们将把所有这些整合在一起。这个脚本将加载会议记录，创建 `TaskPilotRunner` 的实例，然后调用
    `run()` 方法。
- en: '[PRE10]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Step 8: Monitoring Our Runs in the OpenAI Dev Platform'
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 8 步：在 OpenAI 开发平台中监控我们的运行
- en: As mentioned, one of the advantages of the OpenAI Agents SDK is that, due to
    its tracing feature, it is possible to visualize the entire execution flow of
    our agents. This makes it easy to debug and understand what’s happening under
    the hood in the [OpenAI Dev Platform](https://platform.openai.com/).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 正如之前提到的，OpenAI Agents SDK的一个优点是，由于其跟踪功能，我们可以可视化我们代理的整个执行流程。这使得调试和理解在[OpenAI开发平台](https://platform.openai.com/)底层的操作变得容易。
- en: 'In the [Traces Dashboard](https://platform.openai.com/traces) one can:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在[跟踪仪表板](https://platform.openai.com/traces)中，你可以：
- en: Track each run of the agents workflow.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪代理工作流程的每一次运行。
- en: '![](../Images/fdcf5a890a11cd00219f05910d97850a.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fdcf5a890a11cd00219f05910d97850a.png)'
- en: Screenshot by the author
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: Understand exactly what the agents did within the agent workflow and monitor
    performance.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精确了解代理在代理工作流程中做了什么，并监控性能。
- en: '![](../Images/4809a85df3fe7277458d57e16c614d01.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4809a85df3fe7277458d57e16c614d01.png)'
- en: Screenshot by the author
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: Debug every call to the OpenAI API as well as monitor how many tokens were used
    in each input and output.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调试对OpenAI API的每一次调用，以及监控每个输入和输出中使用的令牌数量。
- en: '![](../Images/74d819b94dd5907e2432e047d2f30da8.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74d819b94dd5907e2432e047d2f30da8.png)'
- en: Screenshot by the author
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: So take advantage of this feature to evaluate, debug and monitor your agent
    runs.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，利用这个功能来评估、调试和监控你的代理运行。
- en: Conclusion
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: And that’s it! In this eight simple steps we have implemented an application
    that can automatically create Jira issues from a meeting transcript. Thanks to
    the simple interface of the OpenAI Agents SDK you can easily create agents programmatically
    to help you automatize your tasks!
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 就这么简单！在这八个简单步骤中，我们实现了一个可以自动从会议记录中创建Jira问题的应用。感谢OpenAI Agents SDK的简单界面，你可以轻松编程创建代理来帮助你自动化任务！
- en: Feel free to clone the repository (the project as described in this post is
    in branch `function_calling`), try it out for yourself, and start building your
    own AI-powered applications!
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 随意克隆这个仓库（本帖中描述的项目位于`function_calling`分支），亲自尝试一下，并开始构建你自己的AI驱动应用！
