- en: How Does Luck Influence the Board Game Sequence?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 运气如何影响棋盘游戏Sequence？
- en: 原文：[https://towardsdatascience.com/how-does-luck-influence-the-board-game-sequence/](https://towardsdatascience.com/how-does-luck-influence-the-board-game-sequence/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-does-luck-influence-the-board-game-sequence/](https://towardsdatascience.com/how-does-luck-influence-the-board-game-sequence/)
- en: Losing in board games is rarely fun. And certainly not when luck decides the
    game. But how much influence does luck actually have in popular board games like
    Sequence? I played the game and looked at the numbers. This analysis can **not**
    be generalized to other players, not to mention Sequence variants with more than
    2 players, as it is based only on matches between me and my partner.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在棋盘游戏中输通常没有乐趣。而且当运气决定游戏时更是如此。但在像Sequence这样的流行棋盘游戏中，运气实际上有多大的影响？我玩了这款游戏，并观察了数据。这项分析**不能**推广到其他玩家，更不用说有超过2名玩家的Sequence变体了，因为它仅基于我和我的搭档之间的比赛。
- en: What Is the Game About?
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 游戏是关于什么的？
- en: 'If you’ve never played Sequence, here’s a quick introduction:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从未玩过Sequence，这里有一个快速介绍：
- en: 'The game board is a 10 by 10 grid, where each space corresponds to a card (Figure
    1). The game is played with two decks with a total of 104 cards. Each player is
    dealt a number of cards and takes turns playing one card and placing a token on
    the corresponding space on the board, then draws a new card from the deck. There
    are also some *lucky* cards:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏棋盘是一个10x10的网格，其中每个空间对应一张牌（图1）。游戏使用两个牌组，总共有104张牌。每位玩家被发一定数量的牌，轮流玩一张牌并在棋盘上对应的空间放置一个标记，然后从牌组中抽取一张新牌。还有一些*幸运*的牌：
- en: '**Two-eyed Jack:** Allows you to place a token anywhere. 4 cards in total.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双眼杰克**：允许你在任何地方放置一个标记。总共4张牌。'
- en: '**One-eyed Jack:** Removes one of your opponent’s tokens. 4 cards in total.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**独眼杰克**：移除你对手的一个标记。总共4张牌。'
- en: In this analysis, we focus on a two-player Sequence, where a player wins by
    being the first to make two sequences of five tokens in a row — horizontally,
    vertically, or diagonally.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次分析中，我们专注于两人制的Sequence，玩家通过成为第一个在水平、垂直或对角线上形成两个连续五标记序列的玩家来获胜。
- en: '![](../Images/2d5a2a16f17be7510474e07de3aa52c7.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2d5a2a16f17be7510474e07de3aa52c7.png)'
- en: 'Figure 1: Sequence board game before (lef) and after blue wins (right). Image
    by author.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：游戏棋盘在蓝色获胜前（左）和获胜后（右）的序列。图片由作者提供。
- en: Let us play
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们开始玩
- en: In the name of statistics, I played 51 games with my partner. Going forward,
    we will refer to ourselves as Player 1 and Player 2\. We recorded several variables,
    including the number of rounds, the winner, and the number of one-eyed and two-eyed
    jacks drawn in each game, excluding those drawn in the last two rounds unless
    they were played.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了统计学的名义，我和我的搭档玩了51场比赛。从现在起，我们将自己称为玩家1和玩家2。我们记录了几个变量，包括回合数、获胜者和每场比赛中抽取的独眼和双眼杰克的数量，除非它们是在最后两轮中抽取的，否则不包括在内。
- en: Distribution of jacks
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 杠子的分布
- en: 'Our first task on this meaningless journey was to answer the question: Did
    we make some lucky draws?'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次无意义的旅程中，我们的第一个任务是回答这个问题：我们是否抽到了一些幸运的牌？
- en: 'To that end, let *N, X[1eye] and X[2eye]* be the random variables which describe
    the number of rounds, the one-eyed cards and two-eyed cards seen by one player.
    If we assume a game lasts *N = n* rounds, then we can ask what is the expected
    number of one- or two-eyed jacks in such a game. Assuming the deck of 104 cards
    is randomly shuffled, and each player is dealt cards interchangeably, this question
    is similar to asking what is the expected number of successes in *N* draws without
    replacement, given a population of size 104\. This is the well-known hypergeometric
    distribution, and since there are 4 one-eyed and 4 two-eyed jacks, it follows:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，设*N, X[1eye]和X[2eye]*为描述一名玩家看到的回合数、独眼牌和双眼牌的随机变量。如果我们假设游戏持续*N = n*回合，那么我们可以问在这样的游戏中，期望有多少个独眼或双眼杰克。假设104张牌的牌组是随机洗牌的，并且每位玩家交替抽牌，这个问题类似于在104张牌的总体中，在不放回抽取*N*次的情况下，期望有多少次成功。这是著名的超几何分布，由于有4张独眼和4张双眼杰克，因此可以得出以下结论：
- en: '![](../Images/0143578fa183172254cb9557e6ce15d7.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0143578fa183172254cb9557e6ce15d7.png)'
- en: 'Using the same argument, we find:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 使用相同的论点，我们发现：
- en: '![](../Images/3be0f408996a2cdbd2c279a13bfb5e1b.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3be0f408996a2cdbd2c279a13bfb5e1b.png)'
- en: 'where *X* is the number of jacks (any type) seen by a player. The variance
    of the distribution is:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 其中*X*是玩家看到的杰克（任何类型）的数量。分布的方差是：
- en: '![](../Images/f5342c3b5d71fe9f0b3eb633ccb61dfb.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f5342c3b5d71fe9f0b3eb633ccb61dfb.png)'
- en: We can look at Figure 2 and verify that jacks drawn follow the distribution
    nicely with only 6.25% of extreme cases (i.e. outside the 95% prediction interval),
    which also reassures us that the cards are properly shuffled.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以查看图2并验证抽到的杰克遵循分布，只有6.25%的极端情况（即超出95%预测区间），这也使我们确信牌是正确洗过的。
- en: '![](../Images/d079c6e472440b8b9d8a099b0b8c23d5.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d079c6e472440b8b9d8a099b0b8c23d5.png)'
- en: 'Our recordings provide estimates for the mean rounds *E[N]≈19 and* variance
    *V[N]≈24* and using the tower property of conditional expectation we find:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的记录提供了平均回合数 *E[N]≈19* 和方差 *V[N]≈24* 的估计，并使用条件期望的塔性质，我们发现：
- en: '![](../Images/f67a68a565882bc0843a515ed200a2bb.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f67a68a565882bc0843a515ed200a2bb.png)'
- en: 'and from the law of total variance, we find:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 根据总方差定律，我们发现：
- en: '![](../Images/10d283635effb2a7a08b9a0851cc4d99.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/10d283635effb2a7a08b9a0851cc4d99.png)'
- en: 'Empirically, we found:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 经验上，我们发现：
- en: '![](../Images/bfa52f9a27b292dc9b445868c234fc84.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bfa52f9a27b292dc9b445868c234fc84.png)'
- en: 'for Player 1, and:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 对于玩家1，和：
- en: '![](../Images/2d16e5d7cdd19c0ba7a718c872db7de5.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2d16e5d7cdd19c0ba7a718c872db7de5.png)'
- en: for Player 2, suggesting that we might have been more than average lucky with
    drawing Jacks.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于玩家2，这表明我们抽到杰克可能比平均水平更幸运。
- en: What is the real value of jacks?
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 杰克的真实价值是多少？
- en: One thing is getting lucky cards, another thing is how much a lucky card (a
    jack) actually impacts the game. To investigate, we performed a simple logistic
    regression, with the aim of measuring the effect of one-eyed and two-eyed jacks
    on the winning chance, denoted *p:*
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面是抽到幸运牌，另一方面是幸运牌（杰克）实际上对游戏的影响有多大。为了调查这一点，我们进行了一个简单的逻辑回归，目的是衡量单眼和双眼杰克对获胜机会的影响，表示为
    *p:*。
- en: '![](../Images/97e5cd7f800fe8b6bf730806928383a7.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/97e5cd7f800fe8b6bf730806928383a7.png)'
- en: 'where ⍺ is the effect on winning from drawing a one-eyed jack and β is the
    effect on winning from drawing a two-eyed jack. The parameter ɣ is other contributions.
    We fit the model in R using the function **glm**. The estimates [p-value] are:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ⍺ 是抽到单眼杰克对获胜的影响，β 是抽到双眼杰克对获胜的影响。参数 ɣ 是其他贡献。我们使用 R 中的 **glm** 函数拟合模型。估计 [p-value]
    如下：
- en: '![](../Images/49b460c84a557efe5cdf0b62ce159227.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/49b460c84a557efe5cdf0b62ce159227.png)'
- en: 'The only significant effect is from the two-eyed jacks, which also has the
    largest effect on the winning outcome. Specifically, we find that the odds of
    winning with a two-eyed jack is:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一显著的影响来自双眼杰克，它对获胜结果的影响也最大。具体来说，我们发现使用双眼杰克获胜的几率是：
- en: '![](../Images/122f2f910d0db1eb8b9cf2fd810732cc.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/122f2f910d0db1eb8b9cf2fd810732cc.png)'
- en: which is 2.27 times those with a one-eyed jack.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是单眼杰克的两倍多。
- en: Metric of luck
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 幸运指标
- en: 'Based on our regression, the value of a one-eyed jack and two-eyed jack, written
    *v[1]* and *v[2]* respectively, was determined by the equations:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们的回归，单眼杰克和双眼杰克的价值，分别用 *v[1]* 和 *v[2]* 表示，由以下方程确定：
- en: '![](../Images/d147f544265a27409f39e4c5fd6d1696.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d147f544265a27409f39e4c5fd6d1696.png)'
- en: For each player and each game i, we defined a luck score ( *H[i]* ) as the total
    value of the player’s jacks. A score of *H[i]* = 0 meant no luck (no jacks), while
    *H[i]* = 1 meant maximum luck (all 8 jacks; 4 × *v[1]* + 4 × *v[2]*).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个玩家和每场比赛 i，我们定义一个运气分数（ *H[i]* ）为玩家杰克的总价值。*H[i]* = 0 表示没有运气（没有杰克），而 *H[i]*
    = 1 表示最大运气（所有8张杰克；4 × *v[1]* + 4 × *v[2]*）。
- en: 'We could further calculate the difference in luck ∆*H[i]* = *H[i]^(player 1)
    – H[i]^(player 2)* between players. A score of ∆*H[i]* = 0 meant an equal amount
    of luck (measured by the total value of the jacks), while ∆*H[i] = 1* meant that
    Player 1 drew all 8 jacks. When ∆*H[i] = -1* it meant that Player 2 drew all 8
    jacks. We agreed on some (semi) arbitrary bounds:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以进一步计算玩家之间运气差异 ∆*H[i]* = *H[i]^(玩家1) – H[i]^(玩家2)*。∆*H[i]* = 0 表示运气相等（通过杰克的总价值衡量），而
    ∆*H[i] = 1 表示玩家1抽到了所有8张杰克。当 ∆*H[i] = -1 时，表示玩家2抽到了所有8张杰克。我们商定了一些（半）任意界限：
- en: '*∆H[i] = -0.5 corresponds to* ***very lucky (player 2)***'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*∆H[i] = -0.5 corresponds to* ***非常幸运（玩家2）***'
- en: '*∆H[i] = -0.25 corresponds to* ***lucky (player 2)***'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*∆H[i] = -0.25 corresponds to* ***幸运（玩家2）***'
- en: '*∆H[i] = 0 corresponds to* ***no luck (either player)***'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*∆H[i] = 0 corresponds to* ***没有运气（任一玩家）***'
- en: ∆*H[i] = 0.25 corresponds to* ***lucky (player 1)***
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ∆*H[i] = 0.25 corresponds to* ***幸运（玩家1）***
- en: ∆*H[i] = 0.5 corresponds to* ***very lucky (player 1)***
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ∆*H[i] = 0.5 corresponds to* ***非常幸运（玩家1）***
- en: We found that when a player experienced luck, the chance of winning was dramatically
    increased. Only in 7 out of 51 games did the unlucky player manage to win. See
    Figure 3, where the compelling image is shown.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现，当一名玩家运气好时，获胜的机会会显著增加。在51场比赛中，运气不佳的玩家只有7次获胜。见图3，其中展示了令人信服的图像。
- en: '![](../Images/de23a54e6ab855393cf5d6794a565fb2.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/de23a54e6ab855393cf5d6794a565fb2.png)'
- en: Metric of skill
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技能指标
- en: 'Now, it would be controversial to claim that two-player Sequence is no different
    from a coin toss. So how much is *skill*? Here we defined a skill score *E**[i]*
    for each game i using the following formula:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，声称两人序列游戏与抛硬币没有区别可能会引起争议。那么*技能*有多少？在这里，我们使用以下公式为每个游戏i定义了一个技能得分*E**[i]*：
- en: '![](../Images/cbe5824606b9cfc932b9685c2a668763.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cbe5824606b9cfc932b9685c2a668763.png)'
- en: The expression 1 + H[i] represents the number of skill points we want to award
    the player. However, we will only award points if the player has **not** been
    lucky. This is described by the indicator function ↿[{∆H≤ 0}] for Player 1, and
    ↿[{∆H≥0}] for Player 2\. Also, we will only add skill points if the player actually
    wins, described by the indicator function ↿[{Winner = Player 1}] for Player 1
    and ↿[{Winner = Player 2}] for Player 2\. Thus, assuming a player wins, the skill
    score is zero, if the player was lucky, 1 if either player was equally lucky,
    and 1 + H[i] otherwise. The skill score is also zero, if the player loses.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 表达式1 + H[i]代表我们想要授予玩家的技能点数。然而，只有当玩家**没有**运气时，我们才会授予分数。这由玩家1的指示函数↿[{∆H≤ 0}]和玩家2的↿[{∆H≥0}]描述。此外，只有当玩家实际获胜时，我们才会添加技能点数，由玩家1的指示函数↿[{Winner
    = Player 1}]和玩家2的↿[{Winner = Player 2}]描述。因此，假设玩家获胜，如果玩家运气好，技能得分是0，如果两位玩家运气相等，得分是1，否则是1
    + H[i]。如果玩家输了，技能得分也是0。
- en: 'Our best estimate of a player’s skill in Sequence is the average skill score
    *Ē* over all games where E[i] ≥ 1(i.e. where the player has been skillful). For
    both Player 1 and Player 2, there are m = 7 games where the players have been
    skillful, as seen from Figure 3\. The score is then:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对序列游戏中玩家技能的最佳估计是所有E[i] ≥ 1（即玩家表现有技巧）的游戏中的平均技能得分*Ē*。对于玩家1和玩家2，都有m = 7场比赛，玩家表现有技巧，如图3所示。那么得分就是：
- en: '![](../Images/f3f2a8b4bcc336378b340cf9522a7c59.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f3f2a8b4bcc336378b340cf9522a7c59.png)'
- en: In Figure 4, we used a technique called *bootstrap resampling* to create 5 million
    replicas of the average skill score *Ē* for both Player 2 and Player 1, based
    on our games. We then computed 5 million differences ∆*Ē* =*Ē*[player 1] – *Ē*[player
    2] and plotted the histogram, along with a 95% (bootstrap) confidence interval,
    and the mean difference.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在图4中，我们使用了一种称为*自举重采样*的技术，根据我们的游戏，为玩家2和玩家1的平均技能得分*Ē*创建了500万个副本。然后我们计算了500万个差异∆*Ē*
    =*Ē*[玩家1] – *Ē*[玩家2]，并绘制了直方图，同时绘制了95%（自举）置信区间和平均差异。
- en: '![](../Images/2018946c8879af7e08b96faa596b8076.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2018946c8879af7e08b96faa596b8076.png)'
- en: The figure shows significant uncertainty about which player performs the best.
    In particular, it is noted that the confidence interval contains 0, which means
    that at a 5% significance level, we cannot reject the hypothesis that the two
    players are equally skilled.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图表显示了关于哪位玩家表现最好的显著不确定性。特别是，注意到置信区间包含0，这意味着在5%的显著性水平下，我们不能拒绝两位玩家技能相等的假设。
- en: A game of chance?
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一场运气游戏？
- en: We have demonstrated that luck plays a major role in our games of Sequence.
    When either me or my partner drew enough jacks, victory was nearly certain. To
    evaluate the ability to strategically navigate a fair game or one with opposition,
    we developed a skill score. The analysis of 51 games showed no significant difference
    in skill between my partner and me. Other luck factors, such as card order, are
    not accounted for in our model, meaning that the games used to calculate the skill
    score may themselves be influenced by elements of luck. If this is the case, the
    game is more affected by chance than our analysis suggests.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经证明，运气在我们的序列游戏中起着重要作用。当我和我的搭档抽到足够的J牌时，胜利几乎是肯定的。为了评估在公平游戏或对抗游戏中战略导航的能力，我们开发了一个技能得分。对51场比赛的分析显示，我和我的搭档之间没有显著的技能差异。其他运气因素，如牌序，没有在我们的模型中考虑，这意味着用于计算技能得分的游戏本身可能受到运气因素的影响。如果是这样，游戏受到运气的影响可能比我们的分析所暗示的更大。
- en: Our study is based on 51 games, which is a relative low number. These games
    were played by me and my partner and **cannot** be generalized. Other players
    with greater or lesser strategic sense will likely affect the outcome differently.
    Still, our analysis revealed that two-eyed jacks displayed a significant and substantial
    effect on the chance of winning, suggesting that they play an important role,
    regardless of the players. Although one-eyed jacks were not statistically significant,
    we still considered them to be lucky cards, as they are logically expected to
    have some influence. Ultimately, while our findings suggest that the strongest
    predictor of victory is the number of two-eyed jacks, further analysis over many
    more games with a broader range of players would obviously be needed to fully
    understand the dynamics at play. For example, it might be hypothesized that equally
    skilled players profit significantly more from luck, as opposed to players of
    uneven skill.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的研究基于51场比赛，这是一个相对较低的数量。这些比赛是由我和我的搭档进行的，**不能**推广到其他玩家。具有更多或更少战略意识的玩家可能会对结果产生不同的影响。尽管如此，我们的分析显示，双头杰克对获胜机会产生了显著和实质性的影响，这表明它们在游戏中扮演着重要的角色，无论玩家是谁。尽管单头杰克在统计上并不显著，我们仍然认为它们是幸运牌，因为它们在逻辑上预期会有些影响。最终，虽然我们的发现表明，胜利的最强预测因素是双头杰克的数量，但显然还需要对更多、范围更广的玩家进行进一步的分析，以全面理解游戏中的动态。例如，可以假设技能水平相当的玩家从运气中获得的好处更大，而不是技能不均的玩家。
