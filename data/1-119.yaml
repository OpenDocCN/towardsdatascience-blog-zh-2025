- en: '[Ibrahim Salami](https://towardsdatascience.com/author/ibrahim-salami/) has
    kicked things off with a stellar, beginner-friendly series of NumPy tutorials.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
