  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: TDS通讯：有效使用AI的理论与实践
- en: 原文：[https://towardsdatascience.com/tds-newsletter-the-theory-and-practice-of-using-ai-effectively/](https://towardsdatascience.com/tds-newsletter-the-theory-and-practice-of-using-ai-effectively/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tds-newsletter-the-theory-and-practice-of-using-ai-effectively/](https://towardsdatascience.com/tds-newsletter-the-theory-and-practice-of-using-ai-effectively/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的每一期新版本，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: 'When we encounter a new technology — say, [LLM applications](https://towardsdatascience.com/tag/llm-applications/) —
    some of us tend to jump right in, sleeves rolled up, impatient to start tinkering.
    Others prefer a more cautious approach: reading a few relevant research papers,
    or browsing through a bunch of blog posts, with the goal of understanding the
    context in which these tools have emerged.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们遇到一项新技术——比如说[LLM应用](https://towardsdatascience.com/tag/llm-applications/)——我们中的一些人倾向于立即动手，袖子卷起，迫不及待地开始尝试。其他人则更喜欢更谨慎的方法：阅读几篇相关的研究论文，或者浏览一堆博客文章，目的是理解这些工具出现的背景。
- en: The articles we chose for you this week come with a decidedly “why not both?”
    attitude towards AI agents, LLMs, and their day-to-day use cases. They highlight
    the importance of understanding complex systems from the ground up, but also insist
    on blending abstract theory with actionable and pragmatic insights. If a hybrid
    learning strategy sounds promising to you, read on — we think you’ll find it rewarding.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本周为您精选的文章，对AI代理、LLM及其日常用例持一种明确的“为什么不两者都要？”的态度。它们强调了从底层理解复杂系统的重要性，同时也坚持将抽象理论与可操作和实用见解相结合。如果您觉得混合学习策略很有前景，请继续阅读——我们认为您会发现它很有价值。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Agentic AI from First Principles: Reflection'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从第一性原理出发的代理AI：反思
- en: For a solid understanding of agentic AI, [Mariya Mansurova](https://towardsdatascience.com/author/miptgirl/) prescribes
    a thorough exploration of their key components and design patterns. Her accessible
    deep dive zooms in on reflection, moving from existing frameworks to a from-scratch
    implementation of a text-to-SQL workflow that incorporates robust feedback loops.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了对代理AI有一个扎实的理解，[Mariya Mansurova](https://towardsdatascience.com/author/miptgirl/)建议彻底探索其关键组件和设计模式。她易于理解的深入分析聚焦于反思，从现有的框架到从头开始实现一个文本到SQL工作流程，该工作流程包含强大的反馈循环。
- en: '[Agentic AI from First Principles: Reflection](https://towardsdatascience.com/agentic-ai-from-first-principles-reflection/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[从第一性原理出发的代理AI：反思](https://towardsdatascience.com/agentic-ai-from-first-principles-reflection/)'
- en: It Doesn’t Need to Be a Chatbot
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不必一定要是聊天机器人
- en: 'For Janna Lipenkova, successful AI integrations differ from failed ones in
    one key way: they are shaped by a concrete understanding of the value AI solutions
    can realistically add.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Janna Lipenkova来说，成功的AI集成与失败的集成在一点上有所不同：它们由对AI解决方案可以实际增加的价值的切实理解所塑造。
- en: '[It Doesn’t Need to Be a Chatbot](https://towardsdatascience.com/it-doesnt-need-to-be-a-chatbot/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[不必一定要是聊天机器人](https://towardsdatascience.com/it-doesnt-need-to-be-a-chatbot/)'
- en: What “Thinking” and “Reasoning” Really Mean in AI and LLMs
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在AI和LLM中“思考”和“推理”的真正含义
- en: For an incisive look at how LLMs work — and why it’s important to understand
    their limitations in order to optimize their use — don’t miss Maria Mouschoutzi’s
    latest explainer.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了深入了解LLM的工作原理——以及为什么理解它们的局限性对于优化它们的用途很重要——不要错过Maria Mouschoutzi的最新解释。
- en: '[Water Cooler Small Talk, Ep. 9: What “Thinking” and “Reasoning” Really Mean
    in AI and LLMs](https://towardsdatascience.com/water-cooler-small-talk-ep-9-what-thinking-and-reasoning-really-mean-in-ai-and-llms/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[水壶闲聊，第9集：在AI和LLM中“思考”和“推理”的真正含义](https://towardsdatascience.com/water-cooler-small-talk-ep-9-what-thinking-and-reasoning-really-mean-in-ai-and-llms/)'
