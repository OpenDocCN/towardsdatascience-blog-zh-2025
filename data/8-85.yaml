- en: 'Mastering the Basics: How Linear Regression Unlocks the Secrets of Complex
    Models'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 掌握基础知识：线性回归如何解锁复杂模型的秘密
- en: 原文：[https://towardsdatascience.com/mastering-the-basics-how-linear-regression-unlocks-the-secrets-of-complex-models-8aa33920c105/](https://towardsdatascience.com/mastering-the-basics-how-linear-regression-unlocks-the-secrets-of-complex-models-8aa33920c105/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-the-basics-how-linear-regression-unlocks-the-secrets-of-complex-models-8aa33920c105/](https://towardsdatascience.com/mastering-the-basics-how-linear-regression-unlocks-the-secrets-of-complex-models-8aa33920c105/)
- en: '![The Crane Stance. Public Domain image from Openverse](../Images/6c045748b44211aaee7bf7c8a074bcbb.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![鹤形拳。来自Openverse的公有领域图片](../Images/6c045748b44211aaee7bf7c8a074bcbb.png)'
- en: The Crane Stance. Public Domain image from [Openverse](https://openverse.org/image/dfa430e5-882e-4758-ba73-3248fcfe9464?q=karate+kid&p=11)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 鹤形拳。来自[Openverse](https://openverse.org/image/dfa430e5-882e-4758-ba73-3248fcfe9464?q=karate+kid&p=11)的公有领域图片
- en: Just like Mr. Miyagi taught young Daniel LaRusso karate through repetitive simple
    chores, which ultimately transformed him into the Karate Kid, mastering foundational
    algorithms like linear regression lays the groundwork for understanding the most
    complex of AI architectures such as Deep Neural Networks and LLMs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 就像宫崎先生通过重复简单的家务教会年轻丹尼尔·拉索斯空手道，最终将他变成了空手道小子，掌握像线性回归这样的基础算法为理解最复杂的AI架构，如深度神经网络和LLMs奠定了基础。
- en: Through this deep dive into the simple yet powerful linear regression, you will
    learn many of the fundamental parts that make up the most advanced models built
    today by billion-dollar companies.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对简单而强大的线性回归的深入研究，你将了解构成当今由数十亿美元公司构建的最先进模型的基本组成部分。
- en: What is Linear Regression?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是线性回归？
- en: Linear regression is a simple mathematical method used to understand the **linear
    relationship** between a dependant variable (what you want to predict) and a single
    or group of independent variables (the factors you believe affect the value of
    the dependant variable).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归是一种简单的数学方法，用于理解一个因变量（你想要预测的内容）与一个或多个自变量（你认为影响因变量价值的因素）之间的**线性关系**。
- en: For example, if you wanted to predict the price of a diamond, you might use
    the number of carats as the main factor. The dependent variable (price) depends
    on one or more independent variables (carats).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你想预测钻石的价格，你可能使用克拉数作为主要因素。因变量（价格）依赖于一个或多个自变量（克拉）。
- en: The linear relationship part means that as your factor(s) change, your dependent
    variable changes at a consistent rate (the slope, m), determined by the straight-line
    formula. **y = m*x + c**
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 线性关系部分意味着，当你的因素（s）变化时，你的因变量将以一致的速度（斜率，m）变化，由直线公式确定。**y = m*x + c**
- en: 'Consider we see in the market 5 prices for diamonds:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们在市场上看到5颗钻石的价格：
- en: 2 carat diamond for $2k
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2克拉钻石售价为2千美元
- en: 4 carat diamond for $4k
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4克拉钻石售价为4千美元
- en: 6 carat diamond for $4k
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 6克拉钻石售价为4千美元
- en: 8 carat diamond for $4k
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 8克拉钻石售价为4千美元
- en: 8 carat diamond for $5k
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 8克拉钻石售价为5千美元
- en: (I know, the market is a bit messed up! This inconsistency happens often in
    real-world data, and regression helps us find an overall trend.)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: （我知道，市场有点混乱！这种不一致性在现实世界的数据中经常发生，回归帮助我们找到整体趋势。）
- en: If we plot this data on a graph, we can use a linear regression model to draw
    a "**line of best fit**" (we will later see how its calculated). This line minimises
    the overall difference between the actual data points and the values it predicts,
    it helps us estimate new values – for instance, the price of a 9-carat diamond.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在图上绘制这些数据，我们可以使用线性回归模型来绘制一个“**最佳拟合线**”（我们稍后会看到它是如何计算的）。这条线最小化了实际数据点与预测值之间的总体差异，它帮助我们估计新的值——例如，9克拉钻石的价格。
- en: '![Steps involved in Applying Linear Regression to data and predicting with
    the model. Image by author.](../Images/335ec6b2ad6ebe80c728fad2e498245c.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![应用线性回归到数据并使用模型进行预测的步骤。图片由作者提供。](../Images/335ec6b2ad6ebe80c728fad2e498245c.png)'
- en: Steps involved in Applying Linear Regression to data and predicting with the
    model. Image by author.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 应用线性回归到数据并使用模型进行预测的步骤。图片由作者提供。
- en: 'In this example, the line of best fit is represented by the equation: **Price
    = 0.5 × (Carats) + 1**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，最佳拟合线由以下方程表示：**价格 = 0.5 × (克拉) + 1**
- en: 'Using this equation, the estimated price of a 9-carat diamond is: **Price =
    0.5 × 9 + 1 = 5.5** (thousands of dollars).'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个方程，9克拉钻石的估计价格为：**价格 = 0.5 × 9 + 1 = 5.5**（千美元）。
- en: Keep in mind that in real-life situations, additional factors such as clarity,
    cut, and colour could also affect the price. These factors can be added as independent
    variables in the regression model for more accurate predictions.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，在现实生活中的情况下，像净度、切工和颜色这样的额外因素也可能影响价格。这些因素可以作为回归模型中的独立变量添加，以获得更准确的预测。
- en: The Linear Regression Formula
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 线性回归公式
- en: '![Labelled Linear Regression Formula. Image by author](../Images/4225703f2cc251b7925aaaba0f4d7844.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![标记的线性回归公式。图片由作者提供](../Images/4225703f2cc251b7925aaaba0f4d7844.png)'
- en: Labelled Linear Regression Formula. Image by author
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 标记的线性回归公式。图片由作者提供
- en: 'This formula is the same as what you saw before in the diamonds example, just
    a bit fancier. In our example, since the number of independent variables is one
    (n=1) the formula we used is: **Y = β0 + β1*X1** Where Y is the price, β0 = 1,
    β1 = 0.5, and X1 is the carats.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这个公式与你在钻石示例中看到的是一样的，只是稍微复杂一些。在我们的例子中，由于独立变量的数量是一个（n=1），我们使用的公式是：**Y = β0 + β1*X1**
    其中 Y 是价格，β0 = 1，β1 = 0.5，而 X1 是克拉数。
- en: 'In another case, if we had three independent variables (n=3), we would use:
    **Y = β0 + β1*X1 + β2*X2 + β3*X3**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一种情况下，如果我们有三个独立变量（n=3），我们将使用：**Y = β0 + β1*X1 + β2*X2 + β3*X3**
- en: Note that despite the added independent variables, the formula still resembles
    a line. The only difference is that we add dimensions to the space in which this
    line lives. When we plotted the line of best fit earlier, it was a 2D graph because
    we only had one independent variable (carats). If we had two independent variables
    (e.g., carats and clarity), the graph would be in 3D. With three or more independent
    variables, the ‘line’ lives in an even higher-dimensional space (which we can’t
    easily visualise but can still calculate).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，尽管增加了独立变量，但公式仍然类似于一条直线。唯一的区别是我们增加了这条线所存在的空间维度。当我们之前绘制最佳拟合线时，它是一个二维图表，因为我们只有一个独立变量（克拉数）。如果我们有两个独立变量（例如，克拉数和净度），图表将是三维的。当有三个或更多独立变量时，这条“线”存在于一个更高维度的空间中（我们虽然难以直观地可视化，但仍然可以计算）。
- en: It’s important to notice that Y refers to the actual, observed value (like the
    real diamond prices in the market). However, when you’re using the model to make
    predictions, the output is *Ŷ* (read as "y hat"). This distinction reminds us
    that *Ŷ* is only an estimate – it’s what the model thinks the value should be,
    not necessarily the true value.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，Y 指的是实际观察到的值（如市场上的真实钻石价格）。然而，当你使用模型进行预测时，输出是 *Ŷ*（读作“y hat”）。这种区别提醒我们
    *Ŷ* 只是一个估计——它是模型认为的值应该是多少，而不一定是真实值。
- en: The parameters (β) are the values that the model adjusts (or learns) during
    training to capture the relationship between the independent variables *X* and
    the dependent variable *Y*. We will now go through the process to understand how
    these values are calculated, which is the same process neural networks and large
    language models use to "learn".
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 参数（β）是模型在训练过程中调整（或学习）的值，以捕捉独立变量 *X* 和因变量 *Y* 之间的关系。我们现在将了解这些值的计算过程，这与神经网络和大型语言模型用来“学习”的过程是相同的。
- en: Parameter Learning
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 参数学习
- en: We require a few things to be able to adjust the parameters and achieve accurate
    predictions.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一些东西来调整参数并实现准确的预测。
- en: Training Data – this data consists of input and output pairs. The inputs will
    be fed into the model and during training, the parameters will be adjusted in
    an attempt to output the target (true) value. We already saw this earlier, those
    5 diamond prices were our training data.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练数据——这些数据由输入和输出对组成。输入将被输入到模型中，在训练过程中，参数将被调整，试图输出目标（真实）值。我们之前已经看到了这一点，那些 5 颗钻石的价格是我们的训练数据。
- en: Cost function – also known as the **loss function**, is a mathematical function
    that measures how well a model’s prediction matches the target value.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成本函数——也称为**损失函数**，是一个数学函数，用于衡量模型预测与目标值匹配的程度。
- en: Training Algorithm – is a method used to adjust the parameters of the model
    to minimise the error as measured by the cost function.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练算法——是一种用于调整模型参数以最小化由成本函数测量的错误的方法。
- en: Let’s go over a cost function and training algorithm that can be used in linear
    regression.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下线性回归中可以使用的成本函数和训练算法。
- en: 'Cost Function: Mean Squared Error (MSE)'
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成本函数：均方误差（MSE）
- en: 'Mean Squared Error is a widely used cost function in regression tasks, where
    the goal is to predict a continuous number. It measures how far the predictions
    are from the actual values by calculating the average of the squared differences
    between them. The goal is to make this difference as small as possible. When we
    work to reduce the value of the cost function, we call this value the "**loss**."
    This is how its calculated:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 均方误差（MSE）是回归任务中广泛使用的成本函数，其目标是预测一个连续数值。它通过计算预测值与实际值之间平方差的平均值来衡量预测值与实际值之间的距离。目标是使这个差异尽可能小。当我们努力减少成本函数的值时，我们称这个值为“**损失**”。这是它的计算方式：
- en: '![Mean Squared Error (MSE) formula. Image by author.](../Images/d84ddda236363724f2dc709556252cda.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![均方误差（MSE）公式。图片由作者提供。](../Images/d84ddda236363724f2dc709556252cda.png)'
- en: Mean Squared Error (MSE) formula. Image by author.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 均方误差（MSE）公式。图片由作者提供。
- en: Calculate the difference between the predicted value, *Ŷ*, and the target value,
    *Y*.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算预测值*Ŷ*和目标值*Y*之间的差异。
- en: Square this difference – ensuring all errors are positive and also penalising
    large errors more heavily.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将这个差异平方——确保所有误差都是正的，并且对大误差进行更重的惩罚。
- en: Sum the squared differences for all data samples
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对所有数据样本的平方差异求和。
- en: Divide the sum by the number of samples, *n*, to get the average squared error
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将总和除以样本数*n*，得到平均平方误差。
- en: Later we will see a more practical example, but consider this one for now. We
    have three samples in our training data and we want to calculate the MSE.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 后面我们将看到一个更实际的例子，但现在考虑这个。我们的训练数据中有三个样本，我们想要计算均方误差（MSE）。
- en: '![Calculation example of MSE. Image by author.](../Images/b0b5ac99fc002b53748cd0b4b1117dc1.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![MSE计算示例。图片由作者提供。](../Images/b0b5ac99fc002b53748cd0b4b1117dc1.png)'
- en: Calculation example of MSE. Image by author.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: MSE计算示例。图片由作者提供。
- en: Good models will have a low MSE, because the difference between the target and
    the prediction is small. On the other hand, worse models will have a large MSE,
    because the difference will be higher.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 好的模型将具有低MSE，因为目标和预测之间的差异很小。另一方面，较差的模型将具有较大的MSE，因为差异会更大。
- en: 'Training Algorithm: Gradient Descent'
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练算法：梯度下降
- en: Gradient descent is like hiking down a hill in the dark with the goal of reaching
    the lowest point – the **global minimum** – where the cost (error) is smallest.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降就像在黑暗中下山，目标是达到最低点——**全局最小值**——那里的成本（误差）最小。
- en: The **cost function** is what tells us how good or bad the current model’s predictions
    are. It gives us a "score" (called loss) that measures how far off our predictions
    are from the actual target values. Randomly changing the model’s parameters (the
    things it adjusts to learn) won’t help us consistently improve.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**成本函数**告诉我们当前模型的预测是好是坏。它给我们一个“分数”（称为损失），衡量我们的预测与实际目标值之间的偏差。随机改变模型的参数（它调整以学习的东西）不会帮助我们持续改进。'
- en: Instead, we use the **gradient** of the cost function, which tells us the slope
    or direction of steepest descent. Think of the gradient as a guide pointing us
    downhill. By following this direction, we can update the parameters to reduce
    the cost, meaning our predictions get closer to the actual targets.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们使用成本函数的**梯度**，它告诉我们最陡下降的斜率或方向。把梯度想象成指向下山的指南。通过跟随这个方向，我们可以更新参数以减少成本，这意味着我们的预测值更接近实际目标。
- en: '![Labelled graph showing the key concepts of the gradient descent algorithm.
    Image by author.](../Images/d75b0ff912770ec0f668c83012b5406a.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![标注的图表显示了梯度下降算法的关键概念。图片由作者提供。](../Images/d75b0ff912770ec0f668c83012b5406a.png)'
- en: Labelled graph showing the key concepts of the gradient descent algorithm. Image
    by author.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 标注的图表显示了梯度下降算法的关键概念。图片由作者提供。
- en: 'The size of each step (called the **learning rate**) is very important:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 每个步长的大小（称为**学习率**）非常重要：
- en: If the steps are **too big**, we might overshoot the lowest point and never
    find it.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果步长**太大**，我们可能会超过最低点，永远找不到它。
- en: If the steps are **too small**, we’ll move very slowly and waste time, or even
    get stuck on a small dip (a local minimum) instead of finding the lowest point
    overall.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果步长**太小**，我们会移动得很慢，浪费时间，甚至可能卡在一个小低谷（局部最小值）而不是找到整体最低点。
- en: The key is to take steps that are just the right size so we can efficiently
    and accurately reach the global minimum.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 关键是要采取恰到好处的步长，这样我们才能高效且准确地达到全局最小值。
- en: Gradient Descent Formula
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 梯度下降公式
- en: '![Labelled Gradient Descent formula. Image by author.](../Images/7098642e87648ce1aa315b2012e0cf61.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![标记的梯度下降公式。图由作者提供。](../Images/7098642e87648ce1aa315b2012e0cf61.png)'
- en: Labelled Gradient Descent formula. Image by author.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 标记的梯度下降公式。图由作者提供。
- en: In the diamonds example, θ could be _β_0 or *β1*. The gradient is the partial
    derivative of the cost function with respect to θ, or in simpler terms, it is
    a measure of how much the cost function changes when the parameter θ is slightly
    adjusted.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在钻石的例子中，θ 可以是 _β_0 或 *β1*。梯度是代价函数相对于 θ 的偏导数，或者用更简单的话说，它是衡量代价函数在参数 θ 稍微调整时变化多少的一个度量。
- en: A large gradient indicates that the parameter has a significant effect on the
    cost function, while a small gradient suggests a minor effect. The sign of the
    gradient indicates the direction of change for the cost function. A negative gradient
    means the cost function will decrease as the parameter increases, while a positive
    gradient means it will increase.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 大梯度表示参数对代价函数有显著影响，而小梯度则表示影响较小。梯度的符号表示代价函数变化的方向。负梯度意味着随着参数的增加，代价函数将减少，而正梯度则意味着它将增加。
- en: So, in the case of a large negative gradient, what happens to the parameter?
    Well, the negative sign in front of the learning rate will cancel with the negative
    sign of the gradient, resulting in an addition to the parameter. And since the
    gradient is large we will be adding a large number to it. So, the parameter is
    adjusted substantially reflecting its greater influence on reducing the cost function.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，在梯度很大的情况下，参数会发生什么变化？嗯，学习率前面的负号将与梯度的负号相抵消，从而在参数上增加。由于梯度很大，我们将向其添加一个很大的数字。因此，参数会大幅调整，反映出它对降低代价函数的更大影响。
- en: Practical Example
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际例子
- en: Let’s take a look at the prices of the sponges Karate Kid used to wash Mr. Miyagi’s
    car. If we wanted to predict their price based on their height and width, we could
    model it using linear regression.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看《空手道小子》用来洗三浦先生的车的海绵的价格。如果我们想根据它们的宽度和高度预测它们的价格，我们可以使用线性回归来建模。
- en: We can start with these three training data samples.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从这三个训练数据样本开始。
- en: '![Training data for the linear regression example modelling prices of sponges.
    Image by author.](../Images/a3bedf6af542941674787fc84dcc4676.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![用于模拟海绵价格的线性回归示例的训练数据。图由作者提供。](../Images/a3bedf6af542941674787fc84dcc4676.png)'
- en: Training data for the linear regression example modelling prices of sponges.
    Image by author.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 用于模拟海绵价格的线性回归示例的训练数据。图由作者提供。
- en: Now, let’s use the Mean Square Error (MSE) as our cost function *J*, and linear
    regression as our model.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们以均方误差（MSE）作为我们的代价函数 *J*，并以线性回归作为我们的模型。
- en: '![Formula for the cost function derived from MSE and linear regression. Image
    by author.](../Images/e03a98aa033d79d5d9d0d294a943acbd.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![由均方误差和线性回归推导出的代价函数公式。图由作者提供。](../Images/e03a98aa033d79d5d9d0d294a943acbd.png)'
- en: Formula for the cost function derived from MSE and linear regression. Image
    by author.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 由均方误差和线性回归推导出的代价函数公式。图由作者提供。
- en: Notice we have substituted *Ŷ,* in the MSE formula for the linear regression
    formula, as we will use linear regression to make predictions. The linear regression
    formula uses X1 and X2 for width and height respectively, as there are no more
    independent variables since our training data doesn’t include more. That is the
    assumption we take in this example, that the width and height of the sponge are
    enough to predict its price.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们在均方误差公式中用 *Ŷ* 替换了线性回归公式，因为我们将会使用线性回归进行预测。线性回归公式使用 X1 和 X2 分别表示宽度和高度，因为没有更多的自变量，因为我们的训练数据不包括更多。这就是我们在本例中做出的假设，即海绵的宽度和高度足以预测其价格。
- en: Now, the first step is to initialise the parameters, in this case to 0\. This
    is so that we have some starting values as our parameters that allow us to make
    predictions. These will not be optimal (often they will be pretty bad), but it
    gives us a starting point.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，第一步是初始化参数，在这种情况下为 0。这是为了让我们有一些起始值作为参数，以便我们可以做出预测。这些可能不是最优的（通常它们会很糟糕），但它们为我们提供了一个起点。
- en: We can then feed the independent variables into the model to get our predictions,
    *Ŷ*, and check how far these are from our target *Y.*
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以将自变量输入模型以获取我们的预测值，*Ŷ*，并检查这些预测值与我们的目标 *Y* 相距多远。
- en: '![Step 0 in gradient descent algorithm and the calculation of the mean squared
    error. Image by author.](../Images/8b86344d36d9b0b9bb4bd7c9b0b0d884.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降算法的第 0 步和均方误差的计算。图由作者提供。](../Images/8b86344d36d9b0b9bb4bd7c9b0b0d884.png)'
- en: Step 0 in gradient descent algorithm and the calculation of the mean squared
    error. Image by author.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降算法的第0步和均方误差的计算。图片由作者提供。
- en: Right now, as you can imagine, the parameters are not very helpful. But we are
    now prepared to use the Gradient Descent algorithm to update the parameters into
    more useful ones. First, we need to calculate the partial derivatives of each
    parameter, which will require some calculus, but luckily we only need to this
    once in the whole process. Recall that the partial derivatives of each parameter,
    will tell us how the loss changes when we change that parameter slightly.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，正如你可以想象的那样，参数并不是很有帮助。但我们现在准备使用梯度下降算法来更新参数，使其更加有用。首先，我们需要计算每个参数的偏导数，这需要一些微积分知识，但幸运的是，在整个过程中我们只需要做一次。回想一下，每个参数的偏导数将告诉我们当我们稍微改变该参数时损失如何变化。
- en: '![Working out of the partial derivatives of the linear regression parameters.
    Image by author.](../Images/c45da61131a66261035b9d40b5328860.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![计算线性回归参数的偏导数。图片由作者提供。](../Images/c45da61131a66261035b9d40b5328860.png)'
- en: Working out of the partial derivatives of the linear regression parameters.
    Image by author.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 计算线性回归参数的偏导数。图片由作者提供。
- en: With the partial derivatives, we can substitute in the values from our errors
    to calculate the gradient of each parameter.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过偏导数，我们可以将我们的误差值代入来计算每个参数的梯度。
- en: '![Calculation of parameter gradients. Image by author.](../Images/f2d8ae5dd5392b4893728e9508385e9e.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![参数梯度计算。图片由作者提供。](../Images/f2d8ae5dd5392b4893728e9508385e9e.png)'
- en: Calculation of parameter gradients. Image by author.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 参数梯度的计算。图片由作者提供。
- en: Notice there wasn’t any need to calculate the MSE, as it’s not directly used
    in the process of updating parameters, only its derivative is. It’s also immediately
    apparent that all gradients are negative, meaning that all can be increased to
    reduce the loss. The next step is to update the parameters with a learning rate,
    which is a hyper-parameter, i.e. a configuration setting in a machine learning
    model that is specified before the training process begins. Unlike model parameters,
    which are learned during training, hyper-parameters are set manually and control
    aspects of the learning process. Here we arbitrarily use 0.01.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，没有必要计算MSE，因为它在参数更新过程中并没有直接使用，只有它的导数被使用。这也立即很明显，所有梯度都是负的，这意味着所有梯度都可以增加以减少损失。下一步是使用学习率来更新参数，学习率是一个超参数，即在训练过程开始之前在机器学习模型中指定的配置设置。与在训练过程中学习的模型参数不同，超参数是手动设置的，并控制学习过程的各个方面。在这里，我们任意使用0.01。
- en: '![Parameter updating in the first iteration of gradient descent. Image by author.](../Images/3718bd9fe31d9e0b0ca6136a86671619.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降第一次迭代的参数更新。图片由作者提供。](../Images/3718bd9fe31d9e0b0ca6136a86671619.png)'
- en: Parameter updating in the first iteration of gradient descent. Image by author.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降第一次迭代的参数更新。图片由作者提供。
- en: This has been the final step of our first iteration in the process of gradient
    descent. We can use these new parameter values to make new predictions and recalculate
    the MSE of our model.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经是我们梯度下降过程中的第一次迭代的最后一步。我们可以使用这些新的参数值来做出新的预测并重新计算我们模型的MSE。
- en: '![Last step in the first iteration of gradient descent, and recalculation of
    MSE after parameter updates. Image by author.](../Images/7d0630d57bd76862ca27313dbdc2e54d.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降第一次迭代的最后一步，以及参数更新后的MSE重新计算。图片由作者提供。](../Images/7d0630d57bd76862ca27313dbdc2e54d.png)'
- en: Last step in the first iteration of gradient descent, and recalculation of MSE
    after parameter updates. Image by author.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降第一次迭代的最后一步，以及参数更新后的MSE重新计算。图片由作者提供。
- en: The new parameters are getting closer to the true sponge prices, and have yielded
    a much lower MSE, but there is a lot more training left to do. If we iterate through
    the gradient descent algorithm 50 times, this time using Python instead of doing
    it by hand – since Mr. Miyagi never said anything about coding – we will reach
    the following values.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 新参数正在接近真实的海绵价格，并且已经产生了更低的MSE，但还有很多训练要做。如果我们迭代梯度下降算法50次，这次使用Python而不是手动操作——因为宫崎先生从未提到过编码——我们将达到以下值。
- en: '![Results of some iterations of the gradient descent algorithm, and a graph
    showing the MSE over the gradient descent steps. Image by author.](../Images/c6f353dad9b9c8417c13f85973aa7b64.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降算法的一些迭代结果，以及显示MSE随梯度下降步骤变化的图表。图片由作者提供。](../Images/c6f353dad9b9c8417c13f85973aa7b64.png)'
- en: Results of some iterations of the gradient descent algorithm, and a graph showing
    the MSE over the gradient descent steps. Image by author.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降算法的一些迭代结果，以及一个显示梯度下降步骤中均方误差的图表。图片由作者提供。
- en: Eventually we arrived to a pretty good model. The true values I used to generate
    those numbers were [1, 2, 3] and after only 50 iterations, the model’s parameters
    came impressively close. Extending the training to 200 steps, which is another
    hyper-parameter, with the same learning rate allowed the linear regression model
    to converge almost perfectly to the true parameters, demonstrating the power of
    gradient descent.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 最终我们得到了一个相当不错的模型。我用来生成这些数字的真实值是[1, 2, 3]，经过仅仅50次迭代，模型的参数就令人印象深刻地接近了。将训练扩展到200步，这是一个另一个超参数，使用相同的学习率，使得线性回归模型几乎完美地收敛到真实参数，展示了梯度下降法的强大能力。
- en: Conclusions
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Many of the fundamental concepts that make up the complicated martial art of
    artificial intelligence, like cost functions and gradient descent, can be thoroughly
    understood just by studying the simple "wax on, wax off" tool that linear regression
    is.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 构成复杂的人工智能武术的基本概念，如代价函数和梯度下降，仅通过研究线性回归的简单“磨刀不误砍柴工”工具就可以彻底理解。
- en: Artificial intelligence is a vast and complex field, built upon many ideas and
    methods. While there’s much more to explore, mastering these fundamentals is a
    significant first step. Hopefully, this article has brought you closer to that
    goal, one "wax on, wax off" at a time.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是一个庞大而复杂的领域，建立在许多想法和方法之上。尽管还有更多值得探索，但掌握这些基础知识是一个重要的第一步。希望这篇文章能让你更接近这个目标，一次“磨刀不误砍柴工”。
