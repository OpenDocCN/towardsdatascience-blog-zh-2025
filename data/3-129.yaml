- en: Understanding the Tech Stack Behind Generative AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解生成式AI背后的技术栈
- en: 原文：[https://towardsdatascience.com/tech-stack-generative-ai/](https://towardsdatascience.com/tech-stack-generative-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tech-stack-generative-ai/](https://towardsdatascience.com/tech-stack-generative-ai/)
- en: When ChatGPT reached the one million user mark within five days and took off
    faster than any other technology in history, the world began to pay attention
    to artificial intelligence and AI applications.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当ChatGPT在五天内达到一百万用户标记并比历史上任何其他技术发展得更快时，世界开始关注人工智能和AI应用。
- en: And so it continued apace. Since then, many different terms have been buzzing
    around — from ChatGPT and Nvidia H100 chips to Ollama, LangChain, and Explainable
    AI. What is actually meant for what?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，它继续快速发展。从那时起，许多不同的术语都在热议——从ChatGPT和Nvidia H100芯片到Ollama、LangChain和可解释AI。实际上它们分别代表什么？
- en: 'That’s exactly what you’ll find in this article: A structured overview of the
    technology ecosystem around generative AI and LLMs.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是您在这篇文章中会发现的内容：围绕生成式AI和LLMs的技术生态系统的结构化概述。
- en: Let’s dive in!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨！
- en: '***Table of Contents**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '***目录**'
- en: 1 [What makes generative AI work – at its core](#core)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 1 [是什么让生成式AI工作——其核心](#core)
- en: '2 [Scaling AI: Infrastructure and Compute Power](#scaling)'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 2 [扩展AI：基础设施和计算能力](#scaling)
- en: '3 [The Social Layer of AI: Explainability, Fairness and Governance](#social)'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 3 [AI的社会层：可解释性、公平性和治理](#social)
- en: '4 [Emerging Abilities: When AI Starts to Interact and Act'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 4 [新兴能力：当AI开始互动和行动
- en: Final Thoughts](#emerging)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的想法](#emerging)
