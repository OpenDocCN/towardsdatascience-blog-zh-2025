- en: Beginner’s Guide to Creating a S3 Storage on AWS
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AWS上创建S3存储的入门指南
- en: 原文：[https://towardsdatascience.com/beginners-guide-to-creating-a-s3-storage-on-aws/](https://towardsdatascience.com/beginners-guide-to-creating-a-s3-storage-on-aws/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/beginners-guide-to-creating-a-s3-storage-on-aws/](https://towardsdatascience.com/beginners-guide-to-creating-a-s3-storage-on-aws/)
- en: <mdspan datatext="el1745296693599" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745296693599" class="mdspan-comment">简介</mdspan>
- en: AWS is a well-known cloud provider whose primary goal is to allocate server
    resources for software engineers to deploy their applications. AWS offers many
    services, one of which is EC2, providing virtual machines for running software
    applications in the cloud.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: AWS是一家知名的云服务提供商，其主要目标是分配服务器资源，以便软件工程师部署他们的应用程序。AWS提供许多服务，其中之一是EC2，它提供虚拟机以在云中运行软件应用程序。
- en: However, for data-intensive applications, storing data inside EC2 instances
    is not always the optimal choice. While EC2 offers fast read and write speeds,
    it is not optimized for scalability. A better alternative is to use S3 storage
    instead.
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然而，对于数据密集型应用程序，将数据存储在EC2实例中并不总是最佳选择。虽然EC2提供快速的读写速度，但它并不适合可扩展性。更好的替代方案是使用S3存储。
- en: Storing data in EC2 vs S3
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在EC2与S3中存储数据
- en: 'Amazon S3 was specifically designed for storing massive amounts of unstructured
    data:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊S3专门设计用于存储大量非结构化数据：
- en: It has a highly reliable resilience system, thanks to which the durability rate
    exceeds 99.99%.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它有一个高度可靠的弹性系统，这使得耐用率超过99.99%。
- en: S3 automatically replicates data across multiple servers to prevent potential
    data loss.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: S3会自动在多个服务器之间复制数据，以防止潜在的数据丢失。
- en: It seamlessly integrates with other AWS services for data analytics and machine
    learning.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它与其他AWS服务无缝集成，用于数据分析和机器学习。
- en: Storing data in S3 is significantly more cost-effective compared to EC2.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在S3中存储数据与EC2相比，具有显著的成本效益。
- en: The main use case where EC2 might be preferred is when frequent data access
    is required. For example, during machine learning model training, where the dataset
    must be read repeatedly for each batch. In most other cases, S3 is the better
    choice.
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: EC2可能更受欢迎的主要用例是当需要频繁访问数据时。例如，在机器学习模型训练期间，数据集必须为每个批次重复读取。在大多数其他情况下，S3是更好的选择。
- en: About this article
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于本文
- en: The objective of this article is to demonstrate how to create a basic S3 storage.
    By the end of the tutorial, we will have a functioning S3 storage that allows
    remote access to uploaded images.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的目标是演示如何创建基本的S3存储。到教程结束时，我们将拥有一个可以远程访问上传图片的功能性S3存储。
- en: To keep the focus on key aspects, we will cover only the storage creation process
    and not dive into best security practices.
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了保持对关键方面的关注，我们将仅涵盖存储创建过程，而不会深入最佳安全实践。
- en: Tutorial
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教程
- en: 01\. Create S3 storage
  id: totrans-16
  prefs:
  - PREF_H3
  - PREF_H1
  type: TYPE_NORMAL
  zh: 01\. 创建S3存储
- en: To perform any operations related to S3 storage management, select the ***Storage*** option
    from the service menu. In the submenu that appears, choose ***S3***.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行与S3存储管理相关的任何操作，从服务菜单中选择 ***存储*** 选项。在出现的子菜单中，选择 ***S3***。
- en: '![](../Images/26f3b772192e8177e236f963642ad236.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/26f3b772192e8177e236f963642ad236.png)'
- en: AWS organizes data into collections called **buckets**. To create a bucket,
    click ***Create bucket***.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: AWS将数据组织成称为**存储桶**的集合。要创建存储桶，点击 ***创建存储桶***。
- en: '![](../Images/1820cc15e619d0b15f4dc8b185ae0db7.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1820cc15e619d0b15f4dc8b185ae0db7.png)'
- en: Each bucket requires a unique global name. Most other settings can be left as
    default.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 每个存储桶都需要一个唯一的全局名称。大多数其他设置可以保留为默认值。
- en: '![](../Images/fcffa0e4488a31a3de280a364dfdccf8.png)![](../Images/122de0540bf1f8b51058f9462c07a909.png)![](../Images/a301c7a1c04dab045b47ad5dbcc608b6.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fcffa0e4488a31a3de280a364dfdccf8.png)![图片](../Images/122de0540bf1f8b51058f9462c07a909.png)![图片](../Images/a301c7a1c04dab045b47ad5dbcc608b6.png)'
- en: Once all options are selected, click ***Create bucket***. After a few seconds,
    AWS will redirect you to the bucket management panel.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 选择所有选项后，点击 ***创建存储桶***。几秒钟后，AWS将您重定向到存储桶管理面板。
- en: 02\. Create folder (optional step)
  id: totrans-24
  prefs:
  - PREF_H3
  - PREF_H1
  type: TYPE_NORMAL
  zh: 02\. 创建文件夹（可选步骤）
- en: Folders in S3 function similarly to standard computer folders, helping to organize
    hierarchical data. Additionally, any file stored in an S3 folder will have a URL
    prefix that includes the folder path.
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: S3中的文件夹功能类似于标准计算机文件夹，有助于组织分层数据。此外，存储在S3文件夹中的任何文件都将有一个包含文件夹路径的URL前缀。
- en: To create a folder, click the ***Create folder*** button.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 创建文件夹，点击 ***创建文件夹*** 按钮。
- en: '![](../Images/52521281fe1154fae45c6fc024acff77.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/52521281fe1154fae45c6fc024acff77.png)'
- en: In the appearing window, choose a custom name for the folder.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在出现的窗口中，为文件夹选择一个自定义名称。
- en: '![](../Images/80cf8ddca558fd9fadbe82582020e85c.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/80cf8ddca558fd9fadbe82582020e85c.png)'
- en: After clicking the ***Create folder button***, the folder will be created! You
    can now navigate to it. Since no images have been uploaded yet, the folder is
    empty for now, but we will add images in step 4.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**创建文件夹按钮**后，文件夹将被创建！您现在可以导航到它。由于尚未上传任何图片，目前文件夹是空的，但在步骤4中我们将添加图片。
- en: '![](../Images/5a6eb9c812f3ef69257ce9164c995873.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5a6eb9c812f3ef69257ce9164c995873.png)'
- en: 03\. Adjust data access
  id: totrans-32
  prefs:
  - PREF_H3
  - PREF_H1
  type: TYPE_NORMAL
  zh: 03\. 调整数据访问
- en: As a reminder, our goal is to create a publicly visible image storage that allows
    remote access. To achieve this, we need to adjust data access policies.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 作为提醒，我们的目标是创建一个公开可见的图像存储库，允许远程访问。为了实现这一点，我们需要调整数据访问策略。
- en: By clicking on the ***Permissions*** tab under the bucket name, you will see
    a list of options to modify access settings.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击桶名称下的**权限**标签页，您将看到一系列选项来修改访问设置。
- en: '![](../Images/4ea86f56dd5e482dd71de928239ccc69.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4ea86f56dd5e482dd71de928239ccc69.png)'
- en: We need to unblock public access, so click on the respective ***Edit button*** in
    the interface and uncheck all the checkboxes related to access blocking.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要解除公开访问的限制，因此点击界面中的相应**编辑按钮**，并取消选中所有与访问阻止相关的复选框。
- en: '![](../Images/6af655ebf2500b38a22d819e486f4e66.png)![](../Images/f716a8dfde845f2bc019b27d947298f9.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6af655ebf2500b38a22d819e486f4e66.png)![](../Images/f716a8dfde845f2bc019b27d947298f9.png)'
- en: After saving the changes, we should see an exclamation mark icon with the *“Off”* text.
    Then, navigate to the ***Bucket policy ***section and click ***Edit***.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 保存更改后，我们应该看到一个感叹号图标，旁边有*“关闭”*文本。然后，导航到**桶策略**部分并点击**编辑**。
- en: 'To allow read access, insert the following policy text:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 要允许读取访问，插入以下策略文本：
- en: '![](../Images/62ee7e10ad50416690edb75277997e72.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/62ee7e10ad50416690edb75277997e72.png)'
- en: 04\. Upload images
  id: totrans-41
  prefs:
  - PREF_H3
  - PREF_H1
  type: TYPE_NORMAL
  zh: 04\. 上传图片
- en: Now it is time to upload images. To do that, navigate to the created *“images”*
    folder and click on the ***Upload*** button.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候上传图片了。为此，导航到创建的*“images”*文件夹，并点击**上传**按钮。
- en: '![](../Images/8fafbee28609599354cc258c7aacf0ea.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8fafbee28609599354cc258c7aacf0ea.png)'
- en: Click on the ***Add files*** button, which will open a file explorer on your
    computer. Choose and import the images from there.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**添加文件**按钮，这将打开您的计算机上的文件资源管理器。从那里选择并导入图片。
- en: '![](../Images/f86f84adcd9e4eb0a4ddc0036a8a3ad0.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f86f84adcd9e4eb0a4ddc0036a8a3ad0.png)'
- en: Depending on the number and size of the imported images, AWS might take some
    time to process them.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 根据导入图片的数量和大小，AWS可能需要一些时间来处理它们。
- en: '![](../Images/9ecacab0003eb61e600e7715cb481eb0.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9ecacab0003eb61e600e7715cb481eb0.png)'
- en: In this example, I have imported nine images.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我已导入九张图片。
- en: 05\. Access data
  id: totrans-49
  prefs:
  - PREF_H3
  - PREF_H1
  type: TYPE_NORMAL
  zh: 05\. 访问数据
- en: After the images have been successfully imported, click on any of their filenames
    to get more information.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图片成功导入后，点击任何一个文件名以获取更多信息。
- en: '![](../Images/4fabd3030cb59a0b26650edf58391ddc.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4fabd3030cb59a0b26650edf58391ddc.png)'
- en: In the opened panel, you will see metadata related to the chosen image. As we
    can see in the *“Object URL”* field, AWS created a unique URL for our image!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在打开的面板中，您将看到与所选图像相关的元数据。正如我们在*“对象URL”*字段中看到的那样，AWS为我们的图像创建了一个唯一的URL！
- en: Additionally, we can notice that the URL contains the images/ prefix, which
    corresponds exactly to the folder structure we defined above!
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还可以注意到URL中包含images/前缀，这与我们上面定义的文件夹结构完全对应！
- en: Finally, since we have authorized read access, we can now publicly access this
    URL.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，由于我们已经授权了读取访问权限，现在我们可以公开访问这个URL。
- en: '![](../Images/e05fb9806646d347d2ab017afaa785fb.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e05fb9806646d347d2ab017afaa785fb.png)'
- en: If you click on the image URL and copy it into the browser’s address bar, the
    image will be displayed!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您点击图像URL并将其复制到浏览器的地址栏中，图像将被显示！
- en: '![](../Images/214aa547e4edb175f3ddb64f26d18ae7.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/214aa547e4edb175f3ddb64f26d18ae7.png)'
- en: The amazing part about this is that you can now create a URL template in the
    form `https://<bucket_url>/<folder_path>/<filename>`.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊讶的是，您现在可以创建一个格式为`https://<bucket_url>/<folder_path>/<filename>`的URL模板。
- en: By doing so, you can dynamically replace the <filename> field in a program to
    access images and perform data manipulation.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，您可以在程序中动态替换<filename>字段以访问图像并执行数据处理。
- en: Conclusion
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we have introduced the AWS S3 storage system, which is very
    useful for storing large amounts of unstructured data. With its advanced scalability
    and security mechanisms, S3 is perfect for organizing massive data volumes at
    a much lower cost compared to EC2 containers.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们介绍了 AWS S3 存储系统，这对于存储大量非结构化数据非常有用。凭借其先进的可扩展性和安全机制，与 EC2 容器相比，S3 在以更低成本组织大量数据量方面非常理想。
- en: '*All images are by the author unless noted otherwise.*'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*所有图片除非另有说明，均为作者原创。*'
