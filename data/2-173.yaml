  type: TYPE_NORMAL
  zh: 两个程序都表现良好，但 Cython 的速度几乎快了 25 倍。
- en: What about running Cython outside a Notebook environment?
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，在笔记本环境外运行 Cython 呢？
- en: So far, everything I’ve shown you assumes you’re running your code inside a
    Jupyter Notebook. The reason I did this is that it’s the easiest way to introduce
    Cython and get some code up and running quickly. While the Notebook environment
    is extremely popular among Python developers, a huge amount of Python code is
    still contained in regular .py files and run from a terminal using the Python
    command.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我向你展示的一切都假设你在 Jupyter Notebook 内运行你的代码。我这样做的原因是因为这是介绍 Cython 并快速运行代码的最简单方法。虽然
    Notebook 环境在 Python 开发者中非常受欢迎，但大量的 Python 代码仍然包含在常规的 .py 文件中，并通过 Python 命令在终端中运行。
- en: If that’s your primary mode of coding and running Python scripts, the **%load_ext**
    and **%%cython** IPython magic commands won’t work since those are only understood
    by Jupyter/IPython.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这是你主要的编码和运行 Python 脚本的方式，那么 **%load_ext** 和 **%%cython** IPython 魔法命令将不起作用，因为那些命令只被
    Jupyter/IPython 所理解。
- en: So, here’s how to adapt my four-step Cython conversion process if you’re running
    your code as a regular Python script.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这里是如何适应我的四个步骤 Cython 转换过程，如果你以常规 Python 脚本运行你的代码。
- en: Let’s take my first **sum_of_squares** example to showcase this.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以我的第一个 **sum_of_squares** 示例来展示这一点。
- en: 1/ Create a .pyx file instead of using %%cython
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 1/ 创建一个 .pyx 文件而不是使用 %%cython
- en: Move your Cython-enhanced code into a file named, for example:-
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的 Cython 增强代码移动到一个名为，例如：-
- en: sum_of_squares.pyx
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: sum_of_squares.pyx
- en: '[PRE16]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: All we did was remove the %%cython directive and the timing code (which will
    now be in the calling function)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所做的只是移除了 %%cython 指令和计时代码（现在将位于调用函数中）
- en: 2/ Create a setup.py file to compile your .pyx file
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 2/ 创建一个 setup.py 文件来编译你的 .pyx 文件
- en: '[PRE17]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 3/ Run the setup.py file using this command,
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 3/ 使用以下命令运行 setup.py 文件，
- en: '[PRE18]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 4/ Create a regular Python module to call our Cython code, as shown below, and
    then run it.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 4/ 创建一个常规 Python 模块来调用我们的 Cython 代码，如下所示，然后运行它。
- en: '[PRE19]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '[PRE20]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Summary
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Hopefully, I’ve convinced you of the efficacy of using the Cython library in
    your code. Although it might seem a bit complicated at first sight, with a little
    effort, you can get incredible performance enhancements to your run times over
    using regular Python, even when using fast numerical libraries such as NumPy.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我已经说服了你使用 Cython 库在代码中的有效性。尽管一开始看起来可能有些复杂，但只要稍加努力，你就可以在运行时间上获得令人难以置信的性能提升，即使是在使用像
    NumPy 这样的快速数值库时也是如此。
- en: I provided a four-step process to convert your regular Python code to use Cython
    for running within Jupyter Notebook environments. Additionally, I explained the
    steps required to run Cython code from the command line outside a Notebook environment.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我提供了一个四步过程，将你的常规 Python 代码转换为使用 Cython 在 Jupyter Notebook 环境中运行。此外，我还解释了在非 Notebook
    环境中运行 Cython 代码所需的步骤。
- en: Finally, I reinforced the above by showcasing examples of converting regular
    Python code to use Cython.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我通过展示将常规 Python 代码转换为使用 Cython 的示例来强化上述内容。
- en: In the three examples I showed, we achieved gains of 80x, 10x and 25x speed-ups,
    which is not too shabby at all.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在我展示的三个例子中，我们实现了 80 倍、10 倍和 25 倍的速度提升，这绝对不赖。
