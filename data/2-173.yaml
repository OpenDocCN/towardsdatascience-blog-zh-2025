- en: Run Your Python Code up to 80x Faster Using the Cython Library
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Cython库将Python代码运行速度提升至80倍
- en: 原文：[https://towardsdatascience.com/run-your-python-code-up-to-80x-faster-using-the-cython-library/](https://towardsdatascience.com/run-your-python-code-up-to-80x-faster-using-the-cython-library/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/run-your-python-code-up-to-80x-faster-using-the-cython-library/](https://towardsdatascience.com/run-your-python-code-up-to-80x-faster-using-the-cython-library/)'
- en: <mdspan datatext="el1751951097703" class="mdspan-comment">Python may be an</mdspan>
    excellent language for rapid prototyping and code development, but one thing I
    often hear people say about using it is that it’s slow to execute. This is a particular
    pain point for data scientists and ML engineers, as they often perform computationally
    intensive operations, such as matrix multiplication, gradient descent calculations
    or image processing.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751951097703" class="mdspan-comment">Python可能是一个</mdspan>出色的快速原型设计和代码开发语言，但我经常听到人们说使用它的一个问题是执行速度慢。这对于数据科学家和机器学习工程师来说是一个特别的痛点，因为他们经常执行计算密集型操作，如矩阵乘法、梯度下降计算或图像处理。
- en: Over time, Python has evolved internally to address some of these issues by
    introducing new features to the language, such as multi-threading or rewriting
    existing functionality for improved performance. However, Python’s use of the
    Global Interpreter Lock (GIL) often hamstrung efforts like this.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，Python通过引入新的语言特性来解决这些问题，例如多线程或重写现有功能以提高性能，从而在内部进行了演变。然而，Python使用全局解释器锁（GIL）通常限制了这类努力的进展。
- en: Many external libraries have also been written to bridge this perceived performance
    gap between Python and compiled languages such as Java. Perhaps the most used
    and well-known of these is the **NumPy** library. Implemented in the C language,
    NumPy was designed from the ground up to support multiple CPU cores and super-fast
    numerical and array processing.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 许多外部库也被编写来弥合Python和编译语言（如Java）之间感知的性能差距。其中最常用和最知名的是**NumPy**库。NumPy是用C语言实现的，从头开始设计以支持多个CPU核心和超快的数值和数组处理。
- en: There are alternatives to NumPy, and in a recent TDS article, I introduced the
    **numexpr** library, which, in many use cases, can even outperform NumPy. If you’re
    interested in learning more, I’ll include a link to that story at the end of this
    article.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy有替代品，在最近的一篇TDS文章中，我介绍了**numexpr**库，在许多用例中，它可以甚至超越NumPy。如果你有兴趣了解更多，我将在文章末尾包含对该故事的链接。
- en: Another external library that is very effective is **Numba**. Numba utilises
    a Just-in-Time (JIT) compiler for Python, which translates a subset of Python
    and NumPy code into fast machine code at runtime. It is designed to accelerate
    numerical and scientific computing tasks by leveraging LLVM (Low-Level Virtual
    Machine) compiler infrastructure.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个非常有效的外部库是**Numba**。Numba利用Python的即时（JIT）编译器，在运行时将Python和NumPy代码的一部分转换为快速的机器代码。它通过利用LLVM（低级虚拟机）编译器基础设施来设计用于加速数值和科学计算任务。
- en: In this article, I would like to discuss another runtime-enhancing external
    library, **Cython**. It’s one of the most performant Python libraries but also
    one of the least understood and used. I think this is at least partially because
    you have to get your hands a little bit dirty and make some changes to your original
    code. But if you follow the simple four-step plan I’ll outline below, the performance
    benefits you can achieve will make it more than worthwhile.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我想讨论另一个运行时增强的外部库，**Cython**。它是性能最出色的Python库之一，但同时也是最不被理解和使用的库之一。我认为这至少部分是因为你必须稍微动手，对你的原始代码做一些修改。但如果你遵循我下面将要概述的简单四步计划，你所能获得的性能提升将使这一切变得物有所值。
- en: What is Cython?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是Cython？
- en: If you haven’t heard of Cython, it’s a superset of Python designed to provide
    C-like performance with code written mainly in Python. It allows for converting
    Python code into C code, which can then be compiled into shared libraries that
    can be imported into Python just like regular Python modules. This process results
    in the performance benefits of C while maintaining the readability of Python.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有听说过Cython，它是一种Python的超集，旨在通过主要使用Python编写的代码提供类似C的性能。它允许将Python代码转换为C代码，然后可以编译成共享库，就像常规Python模块一样导入Python。这个过程实现了C的性能优势，同时保持了Python的可读性。
- en: I’ll showcase the exact benefits you can achieve by converting your code to
    use Cython, examining three use cases and providing the four steps required to
    convert your existing Python code, along with comparative timings for each run.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我将展示通过将您的代码转换为使用 Cython 可以实现的精确好处，通过检查三个用例并提供将现有 Python 代码转换为所需的四个步骤，以及每个运行的比较时间。
- en: Setting up a development environment
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: Before continuing, we should set up a separate development environment for coding
    to keep our project dependencies separate. I’ll be using WSL2 Ubuntu for Windows
    and a Jupyter Notebook for code development. I use the UV package manager to set
    up my development environment, but feel free to use whatever tools and methods
    suit you.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，我们应该为编码设置一个单独的开发环境，以保持我们的项目依赖项分离。我将使用 WSL2 Ubuntu for Windows 和 Jupyter
    Notebook 进行代码开发。我使用 UV 包管理器来设置我的开发环境，但请随意使用适合您的任何工具和方法。
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, type **‘jupyter notebook’** into your command prompt. You should see a
    notebook open in your browser. If that doesn’t happen automatically, what you’ll
    likely see is a screenful of information after running the Jupyter Notebook command.
    Near the bottom of that, there will be a URL you should copy and paste into your
    browser to initiate the Jupyter Notebook.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在命令提示符中输入 **‘jupyter notebook’**。您应该在浏览器中看到一个笔记本打开。如果这没有自动发生，您可能会在运行 Jupyter
    Notebook 命令后看到一屏幕的信息。在那下面，将有一个您应该复制并粘贴到浏览器中以启动 Jupyter Notebook 的 URL。
- en: Your URL will be different to mine, but it should look something like this:-
