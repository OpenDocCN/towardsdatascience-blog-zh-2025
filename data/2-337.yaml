- en: There are loads of resources, and it really comes down to your learning style.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 资源很多，这主要取决于你的学习风格。
- en: 'If you are after textbooks, then you can’t go wrong with the following and
    is pretty much all you need:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要教科书，以下几本都是不错的选择，而且基本上你只需要这些：
- en: '[**Practical Statistics For Data Scientist **](https://www.amazon.co.uk/Practical-Statistics-Data-Scientists-Essential/dp/149207294X)— I
    recommend this book all the time and for good reason. This is the only textbook
    you realistically need to learn the statistics for data science and machine learning.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[数据科学家实用统计学](https://www.amazon.co.uk/Practical-Statistics-Data-Scientists-Essential/dp/149207294X)
    —** 我一直推荐这本书，而且有充分的理由。这是学习数据科学和机器学习统计学唯一真正需要的教科书。'
- en: '**[Mathematics for Machine Learning](https://www.amazon.co.uk/Mathematics-Machine-Learning-Peter-Deisenroth/dp/110845514X/) **— As
    the name implies, this textbook will teach the maths for machine learning. A lot
    of the information in this book may be overkill, but your maths skills will be
    excellent if you study everything.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[机器学习数学](https://www.amazon.co.uk/Mathematics-Machine-Learning-Peter-Deisenroth/dp/110845514X/)
    —** 如其名所示，这本书将教授机器学习所需的数学。这本书中的很多信息可能有些过度，但如果你学习所有内容，你的数学技能将会非常出色。'
- en: If you want some online courses, I have heard good things about the following
    ones.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要一些在线课程，我听说以下几门课程都很好。
- en: '**[Mathematics for Machine Learning and Data Science Specialisation](https://www.coursera.org/specializations/mathematics-for-machine-learning-and-data-science) — **This
    course is by DeepLearning.AI, the same people who made the Machine Learning Specialisation,
    arguably the best machine learning course.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[机器学习与数据科学数学专项课程](https://www.coursera.org/specializations/mathematics-for-machine-learning-and-data-science)
    —** 这门课程由DeepLearning.AI提供，他们同样提供了备受赞誉的机器学习专项课程。'
- en: Learning Advice
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习建议
- en: The amount of maths content you need to learn may seem overwhelming, but don’t
    worry.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要学习的数学内容可能看起来令人望而生畏，但不要担心。
- en: The main thing is to break it down step by step.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 主要是要一步一步地分解。
- en: 'Pick one of the three: statistics, linear algebra or calculus.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 从这三个中选择一个：统计学、线性代数或微积分。
- en: Look at the things I wrote above you need to know and choose one resource. It
    doesn’t have to be any of the ones I recommended above.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 看看上面我提到的你需要知道的东西，选择一个资源。它不必是上面我推荐的任何一个。
- en: That’s the initial work done. Don’t overcomplicate by looking for the “best
    resource” because such a thing doesn’t exist.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是初步的工作。不要过度复杂化，寻找“最佳资源”，因为这样的东西并不存在。
- en: Now, start working through the resources, but don’t just blindly read or watch
    the videos.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，开始通过资源进行学习，但不要只是盲目地阅读或观看视频。
- en: Actively take notes and document your understanding. I personally write blog
    posts, which essentially employ the [Feynman technique](https://fs.blog/feynman-technique/),
    as I am, in a way, “teaching” others what I know.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 积极做笔记并记录你的理解。我本人写博客，本质上运用了[Feynman技巧](https://fs.blog/feynman-technique/)，因为在某种程度上，我是在“教”别人我所知道的东西。
- en: Writing blogs may be too much for some people, so just make sure you have good
    notes, either physically or digitally, that are in your own words and that you
    can reference later.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些人来说，写博客可能太多，所以请确保你有一些好的笔记，无论是物理的还是数字的，都是你自己的话，并且你可以稍后参考。
- en: 'The learning process is generally quite simple, and there have been studies
    done on how to do it effectively. The general gist is:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 学习过程通常相当简单，并且已经有一些关于如何有效进行学习的研究。大致要点是：
- en: Do a little bit every day
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天做一点
- en: Review old concepts frequently (spaced repetition)
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经常复习旧概念（间隔重复）
- en: Document your learning
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录你的学习
- en: It’s all about the process; follow it, and you will learn!
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是过程；遵循它，你就会学到东西！
- en: '* * *'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
