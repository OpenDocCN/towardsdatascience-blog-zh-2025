- en: How to Learn the Math Needed for Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何学习机器学习所需的数学
- en: 原文：[https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/](https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/](https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/)
- en: <mdspan datatext="el1747243138238" class="mdspan-comment">Maths</mdspan> can
    be a scary topic for people.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747243138238" class="mdspan-comment">数学</mdspan>可能对一些人来说是一个令人畏惧的话题。
- en: Many of you want to work in machine learning, but the maths skills needed may
    seem overwhelming.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人都想从事机器学习工作，但所需的数学技能可能看起来令人望而生畏。
- en: I am here to tell you that it’s nowhere as intimidating as you may think and
    to give you a roadmap, resources, and advice on how to learn math effectively.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里告诉你，这并不像你想象的那么令人生畏，并且为你提供一条路线图、资源和建议，告诉你如何有效地学习数学。
- en: Let’s get into it!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Do you need maths for machine learning?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你需要数学知识才能从事机器学习吗？
- en: 'I often get asked:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常被问到：
- en: Do you need to know maths to work in machine learning?
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你需要数学知识才能在机器学习领域工作吗？
- en: The short answer is generally *yes*, but the depth and extent of maths you need
    to know depends on the type of role you are going for.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的回答通常是*是的*，但你需要了解的数学的深度和广度取决于你追求的角色类型。
- en: 'A research-based role like:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于以下基于研究的角色：
- en: '**Research Engineer — **Engineer who runs experiments based on research ideas.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究工程师**—基于研究想法进行实验的工程师。'
- en: '**Research Scientist — **A full-time researcher on cutting edge models.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究科学家**—全职从事前沿模型的研究。'
- en: '**Applied Research Scientist** — Somewhere between research and industry.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用研究科学家**—介于研究和产业之间。'
- en: You will particularly need strong maths skills.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 你特别需要强大的数学技能。
- en: 'It also depends on what company you work for. If you are a machine learning
    engineer or data scientist or any tech role at:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这也取决于你为哪家公司工作。如果你是机器学习工程师、数据科学家或任何在以下公司的技术角色：
- en: '**Deepmind**'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Deepmind**'
- en: '**Microsoft AI**'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft AI**'
- en: '**Meta Research**'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Meta Research**'
- en: '**Google Research**'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Google Research**'
- en: You will also need strong maths skills because you are working in a research
    lab, akin to a university or college research lab.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你还需要强大的数学技能，因为你在一个研究实验室工作，类似于大学或学院的研究实验室。
- en: In fact, most machine learning and AI research is done at large corporations
    rather than universities due to the financial costs of running models on massive
    data, which can be millions of pounds.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，由于在大量数据上运行模型的经济成本，大多数机器学习和AI研究都是在大型公司而不是大学进行的，这可能需要数百万英镑。
- en: For these roles and positions I have mentioned, your maths skills will need
    to be a minimum of a bachelor’s degree in a subject such as math, physics, computer
    science, statistics, or engineering.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我提到的这些角色和职位，你的数学技能至少需要数学、物理、计算机科学、统计学或工程学等学科的学士学位。
- en: However, ideally, you will have a master’s or PhD in one of those subjects,
    as these degrees teach the research skills needed for these research-based roles
    or companies.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，理想情况下，你将拥有这些学科中的一个硕士学位或博士学位，因为这些学位教授了这些研究型角色或公司所需的研究技能。
- en: This may sound heartening to some of you, but this is just the truth from the
    statistics.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能对一些人来说是令人欣慰的，但这只是从统计数据中得出的真相。
- en: According to a [notebook](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.7.1.2-Education-and-Yearly-Income)
    from the [2021 Kaggle Machine Learning & Data Science Survey](https://www.kaggle.com/competitions/kaggle-survey-2021/overview),
    the research scientist role is highly popular among PhD and doctorates.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 根据[2021 Kaggle机器学习与数据科学调查](https://www.kaggle.com/competitions/kaggle-survey-2021/overview)中的[笔记本](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.7.1.2-Education-and-Yearly-Income)，研究科学家这一职位在博士和博士研究生中非常受欢迎。
- en: '![](../Images/276856552e2f5b9e527356ebca4f89d9.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/276856552e2f5b9e527356ebca4f89d9.png)'
- en: '[Source](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.2.5.4-Education-vs.-Role).'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[来源](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.2.5.4-Education-vs.-Role)。'
- en: And in general, the higher your education the more money you will earn, which
    will correlate with maths knowledge.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，你的教育水平越高，你赚的钱就越多，这与数学知识相关。
- en: '![](../Images/b31aea3ff783e4b04e7cd61c7a3b57f0.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b31aea3ff783e4b04e7cd61c7a3b57f0.png)'
- en: '[Source](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.7.1.2-Education-and-Yearly-Income).'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '[来源](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.7.1.2-Education-and-Yearly-Income)。'
- en: However, if you want to work in the industry on production projects, the math
    skills needed are considerably less. Many people I know working as machine learning
    engineers and data scientists don’t have a “target” background.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你想从事工业界的生产项目，所需的数学技能就相对较少。我知道的许多作为机器学习工程师和数据科学家工作的人并没有“目标”背景。
- en: This is because industry is not so “research” intensive. It’s often about determining
    the optimal business strategy or decision and then implementing that into a machine-learning
    model.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为工业界并不那么“研究”密集。它通常关于确定最佳商业策略或决策，然后将它实施到机器学习模型中。
- en: Sometimes, a simple decision engine is only required, and machine learning would
    be overkill.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，只需要一个简单的决策引擎，机器学习就会过度。
- en: High school maths knowledge is usually sufficient for these roles. Still, you
    may need to brush up on key areas, particularly for interviews or specific specialisms
    like reinforcement learning or time series, which are quite maths-intensive.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 高中数学知识通常就足够了，但对于这些职位，你可能需要复习关键领域，尤其是在面试或强化学习或时间序列等数学密集型特定专业领域。
- en: To be honest, the majority of roles are in industry, so the maths skills needed
    for most people will not be at the PhD or master’s level.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 说实话，大多数职位都在工业界，所以大多数人需要的数学技能不会达到博士或硕士学位水平。
- en: But I would be lying if I said these qualifications do not give you an advantage.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我说我这些资格不会给你带来优势，那我就撒谎了。
- en: What maths do you need to know?
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你需要了解哪些数学？
- en: 'There are three core areas you need to know:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要了解三个核心领域：
- en: '**Statistics**'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统计学**'
- en: '**Calculus**'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微积分**'
- en: '**Linear Algebra**'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**线性代数**'
- en: Statistics
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计学
- en: I may be slightly biased, but statistics is the most important area you should
    know and put the most effort into understanding.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我可能有点偏见，但统计学是你应该了解并投入最大努力去理解的最重要领域。
- en: Most machine learning originated from statistical learning theory, so learning
    statistics will mean you will inherently learn machine learning or its basics.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数机器学习都源于统计学习理论，所以学习统计学意味着你将自然而然地学习机器学习或其基础知识。
- en: 'These are the areas you should study:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你应该研究的领域：
- en: '**Descriptive Statistics** — This is useful for general analysis and diagnosing
    your models. This is all about summarising and portraying your data in the best
    way.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述性统计**—这有助于一般分析和诊断你的模型。这全部关于以最佳方式总结和描绘你的数据。'
- en: 'Averages: Mean, Median, Mode'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均值：均值、中位数、众数
- en: 'Spread: Standard Deviation, Variance, Covariance'
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 散布：标准差、方差、协方差
- en: 'Plots: Bar, Line, Pie, Histograms, Error Bars'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图表：柱状图、折线图、饼图、直方图、误差条
- en: '**Probability Distributions** — This is the heart of statistics as it defines
    the shape of the probability of events. There are many, and I mean many, distributions,
    but you certainly don’t need to learn all of them.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**概率分布**—这是统计学的核心，因为它定义了事件概率的形状。有很多，我意思是很多，分布，但你当然不需要学习所有这些。'
- en: Normal
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正态分布
- en: Binomial
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 二项式分布
- en: Gamma
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伽马分布
- en: Log-normal
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对数正态分布
- en: Poisson
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 泊松分布
- en: Geometric
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几何
- en: '**Probability Theory **— As I said earlier, machine learning is based on statistical
    learning, which comes from understanding how probability works. The most important
    concepts are'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**概率论**—正如我之前所说，机器学习基于统计学习，这来自于理解概率是如何工作的。最重要的概念是'
- en: Maximum likelihood estimation
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最大似然估计
- en: Central limit theorem
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中心极限定理
- en: Bayesian statistics
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 贝叶斯统计
- en: '**Hypothesis Testing** —Most real-world use cases of data and machine learning
    revolve around testing. You will test your models in production or carry out an
    A/B test for your customers; therefore, understanding how to run hypothesis tests
    is very important.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假设检验**—大多数数据和机器学习的实际应用案例都围绕测试。你将在生产中测试你的模型或为客户执行A/B测试；因此，了解如何进行假设检验非常重要。'
- en: Significance Level
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 显著性水平
- en: Z-Test
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Z检验
- en: T-Test
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: t检验
- en: Chi-Square Test
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卡方检验
- en: Sampling
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 样本
- en: '**Modelling & Inference** —Models like linear regression, logistic regression,
    polynomial regression, and any regression algorithm originally came from statistics,
    not machine learning.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建模与推断**—像线性回归、逻辑回归、多项式回归以及任何回归算法最初都源于统计学，而不是机器学习。'
- en: Linear Regression
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性回归
- en: Logistic Regression
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逻辑回归
- en: Polynomial Regression
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多项式回归
- en: Model Residuals
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型残差
- en: Model Uncertainty
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型不确定性
- en: Generalised Linear Models
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广义线性模型
- en: Calculus
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微积分
- en: Most machine learning algorithms learn from gradient descent in one way or another.
    And, gradient descent has its roots in calculus.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数机器学习算法都以某种方式从梯度下降中学习。而且，梯度下降的根源在于微积分。
- en: 'There are two main areas in calculus you should cover:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在微积分中，你应该涵盖的两个主要领域是：
- en: Differentiation
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微分
- en: What is a derivative?
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是导数？
- en: Derivatives of common functions.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 常见函数的导数。
- en: Turning point, maxima, minima and saddle points.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转折点、极大值、极小值和鞍点。
- en: Partial derivatives and multivariable calculus.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏导数和多变量微积分。
- en: Chain and product rules.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 链式法则和乘积法则。
- en: Convex vs non-convex differentiable functions.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 凸函数与非凸可微函数。
- en: Integration
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 积分
- en: What is integration?
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是积分？
- en: Integration by parts and substitution.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分部积分和换元法。
- en: The integral of common functions.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 常见函数的积分。
- en: Integration of areas and volumes.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 面积和体积的积分。
- en: Linear Algebra
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性代数
- en: Linear algebra is used everywhere in machine learning, and a lot in deep learning.
    Most models represent data and features as matrices and vectors.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 线性代数在机器学习中无处不在，在深度学习中应用也很多。大多数模型将数据和特征表示为矩阵和向量。
- en: '**Vectors **'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量**'
- en: What are vectors
  id: totrans-92
