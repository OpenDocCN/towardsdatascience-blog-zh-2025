- en: 1\. Project Environment Setup
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 项目环境设置
- en: Follow the [CrewAI’s QuickStart](https://docs.crewai.com/en/quickstart) guide
    to setup the development environment. We use the following directory structure
    for this project.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 按照CrewAI的[快速入门](https://docs.crewai.com/en/quickstart)指南设置开发环境。我们为这个项目使用以下目录结构。
- en: '[PRE5]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 2\. Develop Tools
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 开发工具
- en: The first tool we add to the crew is [`WebsiteSearchTool`](https://docs.crewai.com/en/tools/search-research/websitesearchtool)which
    is a built-in tool implemented by CrewAI for conducting semantic searches within
    the content of websites.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先为团队添加的工具是[`网站搜索工具`](https://docs.crewai.com/en/tools/search-research/websitesearchtool)，这是一个由CrewAI实现的内置工具，用于在网站内容中进行语义搜索。
- en: We just need a few lines of code to install the crewai tools package and use
    the `WebsiteSearchTool`. This tool is accessible by the market researcher agent
    to find latest market trends or industry news related to a given topic.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只需要几行代码就可以安装crewai工具包并使用`WebsiteSearchTool`。这个工具可以通过市场研究代理访问，以找到与给定主题相关的最新市场趋势或行业新闻。
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The screenshot below shows the output of `web_search_tool` when given the topic
    “YouTube videos”.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的截图显示了当输入“YouTube 视频”这一主题时，`web_search_tool`的输出结果。
- en: '![Agentic AI Tool Output Example](../Images/f4c101ccd5fb8ab639a4d732319d7ae5.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![代理人工智能工具输出示例](../Images/f4c101ccd5fb8ab639a4d732319d7ae5.png)'
- en: Next, we’ll create a custom `keyword_tool` by inheriting from the BaseTool class
    and using the [SerpApi (Google Trend API)](https://serpapi.com/). As shown in
    the code below, this tool generates the top searched, trending queries related
    to the input keyword. This tool is accessible by the marketing specialist agent
    to investigate trending keywords and refine the blog post for search engine optimization.
    We will see an example of the keyword tool’s output in the next section.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将通过继承BaseTool类并使用[SerpApi (Google 趋势 API)](https://serpapi.com/)来创建一个自定义的`keyword_tool`。如下面的代码所示，这个工具生成与输入关键词相关的顶级搜索和趋势查询。这个工具可以通过营销专家代理访问，以调查趋势关键词并优化博客文章以进行搜索引擎优化。我们将在下一节中看到一个关键词工具输出的示例。
- en: '[PRE8]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 3\. Define the Crew Class
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 定义团队类
- en: '![CrewAI Architecture](../Images/8a75999a210840f193361c7e7c709100.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![CrewAI 架构](../Images/8a75999a210840f193361c7e7c709100.png)'
- en: In the crew.py script, we define our social media crew team with three agents—*market_researcher*,
    *content_creator*, *marketing_specialist*—and assign tasks to each. We initialize
    the `SocialMediaCrew()` class using the `@CrewBase` decorator. The `topic` attribute
    passes the user’s input about their topic of interest, and `llm` , `model_name`
    attributes specify the default model used throughout the Crew workflow.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在`crew.py`脚本中，我们定义了我们的社交媒体团队，包含三个代理——*市场研究员*、*内容创作者*、*市场营销专家*——并为每个代理分配任务。我们使用`@CrewBase`装饰器初始化`SocialMediaCrew()`类。`topic`属性传递用户关于他们感兴趣主题的输入，而`llm`、`model_name`属性指定了在整个团队工作流程中使用的默认模型。
- en: '[PRE9]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 4\. Define Agents
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 定义代理
- en: CrewAI Agents rely on three essential parameters—*role, goal, and backstory*—to
    define their characteristics as well as the context they are operating in. Additionally,
    we provide Agents with relevant `tools` to facilitate their jobs and other parameters
    to control the resource consumption of the Agent calling and avoid unnecessary
    LLM token usage.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: CrewAI代理依赖于三个基本参数——*角色、目标和背景故事*——来定义它们的特征以及它们操作的环境。此外，我们还为代理提供相关的`工具`以方便他们的工作，以及其他参数以控制调用代理的资源消耗，避免不必要的LLM令牌使用。
- en: For example, we define the “Marketing Specialist Agent” using the code below.
    Start with using `@agent` decorator. Define the role as “Marketing Specialist”
    and provide the access to `keyword_tool` we previously developed, so that the
    marketing specialist can research the trending keywords to refine the blog contents
    for optimal SEO performance.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们使用以下代码定义了“市场营销专家代理”。从使用`@agent`装饰器开始。将角色定义为“市场营销专家”，并提供我们之前开发的`keyword_tool`的访问权限，以便市场营销专家可以研究趋势关键词，以优化博客内容，实现最佳的SEO性能。
- en: '*Visit our [GitHub repository](https://github.com/destingong/social-media-agent)
    for the full code of other Agent definitions.*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*访问我们的[GitHub仓库](https://github.com/destingong/social-media-agent)以获取其他代理定义的完整代码。*'
- en: '[PRE10]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Setting `verbose` to true allows us to utilize CrewAI’s traceability functionality
    to observe intermediate output throughout the Agent calling. The screenshots below
    show the thought process of “Marketing Specialist” Agent using the`keyword_tool`
    to research “YouTube trends”, as well as the SEO-optimized blog post based on
    the tool output.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 将`verbose`设置为true允许我们利用CrewAI的可追溯性功能来观察代理调用过程中的中间输出。下面的截图显示了“市场营销专家”代理使用`keyword_tool`研究“YouTube趋势”的思想过程，以及基于工具输出的SEO优化博客文章。
- en: '*Intermediate Output from Marketing Specialist*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*市场营销专家的中间输出*'
- en: '![](../Images/67bb784314ccd07c0f004aedfff35921.png)![](../Images/e6abd914d4b3ddc34be975c3a22bf328.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片1](../Images/67bb784314ccd07c0f004aedfff35921.png)![图片2](../Images/e6abd914d4b3ddc34be975c3a22bf328.png)'
- en: An alternative approach to define Agent is to store the Agent context in a YAML
    file using the format below, providing additional flexibility of experiment and
    iterating on prompt engineering when necessary.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 定义代理的另一种方法是使用以下格式将代理上下文存储在YAML文件中，提供额外的实验灵活性和在必要时迭代提示工程。
- en: '*Example* *agent.yaml*'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例* *agent.yaml*'
- en: '[PRE11]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 5\. Define Tasks
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 定义任务
- en: If an Agent is considered as the employee (“who”) specialised in a domain (e.g.
    content creation, research), embodied with a persona or characteristics, then
    Tasks are the actions (“what”) that the employee performs with predefined objectives
    and output expectations.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个代理被视为一个在特定领域（例如内容创作、研究）专业化的员工（“谁”），并具有角色或特征，那么任务就是员工执行的动作（“什么”），具有预定义的目标和输出预期。
- en: In CrewAI, a Task is configured using `description`, `expected_output`, and
    the optional parameter `output_file` saves the intermediate output as a file.
    Alternatively, it is also recommended to use a standalone YAML file to provide
    a cleaner, maintainable way to define Tasks. In the code snippet below, we provide
    precise instructions for the crew to carry out four tasks and assign them to agents
    with relevant skillsets. We also save the output of each task in the working folder
    for the ease of comparing different output versions.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在CrewAI中，任务是通过`description`、`expected_output`和可选参数`output_file`配置的，该参数将中间输出保存为文件。另外，也建议使用独立的YAML文件来提供更干净、可维护的方式来定义任务。在下面的代码片段中，我们为团队提供了执行四个任务的精确指令，并将它们分配给具有相关技能集的代理。我们还将在工作文件夹中保存每个任务的输出，以便于比较不同的输出版本。
- en: '`research`: research on the market trend of the given topic; assigned to the
    market researcher.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`research`：研究给定主题的市场趋势；分配给市场研究员。'
- en: '`write`: write an engaging blog post; assigned to the content creator.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`write`：撰写一篇引人入胜的博客文章；分配给内容创作者。'
- en: '`refine`: refine blog post based for optimal SEO performance; assigned to the
    marketing specialist.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`refine`: 优化博客文章以实现最佳SEO性能；分配给市场营销专员。'
- en: '`distribute`: generate platform-specific messages for distributing on each
    social media channel; assigned to the marketing specialist.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`distribute`: 生成适用于每个社交媒体渠道的特定平台消息；分配给市场营销专员。'
- en: '[PRE12]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The CrewAI output log below shows task execution details, including status,
    agent assignments, and tool usage.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的CrewAI输出日志显示了任务执行细节，包括状态、代理分配和工具使用。
- en: '[PRE13]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 6\. Kick Off the Crew
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 启动团队
- en: As the final step in the crew.py script, we orchestrate Tasks, Agents and Tools
    together to define the crew.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在crew.py脚本的最后一步，我们协调任务、代理和工具来定义团队。
- en: '[PRE14]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: In the main.py, we instantiate a `SocialMediaCrew()` object and run the crew
    by accepting the user’s input for their topic of interest.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在main.py中，我们实例化一个`SocialMediaCrew()`对象，并通过接受用户对其感兴趣的主题的输入来运行团队。
- en: '[PRE15]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Now let’s use “Agentic AI” as an example and here are output files generated
    by our social media crew after sequentially executing the tasks.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们以“代理式AI”为例，以下是我们的社交媒体团队在依次执行任务后生成的输出文件。
