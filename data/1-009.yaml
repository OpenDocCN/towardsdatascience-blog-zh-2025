- en: 'The Machine Learning “Advent Calendar” Day 7: Decision Tree Classifier'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习“圣诞日历”第7天：决策树分类器
- en: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-7-decision-tree-classifier/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-7-decision-tree-classifier/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-7-decision-tree-classifier/)'
- en: <mdspan datatext="el1764983749230" class="mdspan-comment">In [the previous article](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)</mdspan>,
    we explored how a **Decision Tree Regressor** chooses its optimal split by minimizing
    the **Mean Squared Error (MSE)**.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在[上一篇文章](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)中，我们探讨了**决策树回归器**如何通过最小化**均方误差
    (MSE**)来选择其最优分割。
- en: Today for Day 7 of the [Machine Learning “Advent Calendar”](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/),
    we continue the same approach but with a **Decision Tree Classifier**, the classification
    counterpart of yesterday’s model.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 今天是[机器学习“圣诞日历”](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/)的第7天，我们继续使用相同的方法，但使用**决策树分类器**，这是昨天模型的分类对应物。
- en: Quick intuition experiment with two simple datasets
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用两个简单数据集的快速直观实验
- en: 'Let us begin with a very small toy dataset that I generated, with one numerical
    feature and one target variable with two classes: 0 and 1.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一个非常小的玩具数据集开始，这是我生成的，包含一个数值特征和一个有两个类别：0和1的目标变量。
- en: 'The idea is to cut the dataset into two parts, based on one rule. But the question
    is: **what should this rule be?** What is the criterion that tells us which split
    is better?'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 理念是将数据集根据一个规则分割成两部分。但问题是：**这个规则应该是什么？**告诉我们哪个分割更好的标准是什么？
- en: Now, even if we do not know the mathematics yet, we can already look at the
    data and guess possible split points.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，即使我们还没有了解数学，我们也可以查看数据并猜测可能的分割点。
- en: And visually, it would **8** or **12**, right?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 从视觉上看，应该是**8**或**12**，对吧？
- en: But the question is which one is more suitable numerically.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 但问题是哪个在数值上更合适。
- en: '![](../Images/da24f915d1c6f2d542de3a7d3d2ffb62.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/da24f915d1c6f2d542de3a7d3d2ffb62.png)'
- en: Decision Tree Classifier in Excel – image by author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树分类器在Excel中的图像 – 作者
- en: 'If we think intuitively:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们直观地思考：
- en: 'With a split at **8**:'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**8**处进行分割：
- en: 'left side: no misclassification'
  id: totrans-14
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左侧：没有误分类
- en: 'right side: one misclassification'
  id: totrans-15
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右侧：一个误分类
- en: 'With a split at **12**:'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**12**处进行分割：
- en: 'right side: no misclassification'
  id: totrans-17
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右侧：没有误分类
- en: 'left side: two misclassifications'
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左侧：两个误分类
- en: So clearly, the split at 8 feels better.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 所以很明显，8处的分割感觉更好。
- en: '![](../Images/422b1d78a882a32d320166b896303ca4.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/422b1d78a882a32d320166b896303ca4.png)'
- en: Now, let us look at an example with **three classes**. I added some more random
    data, and made 3 classes.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看一个有三个类别的例子。我添加了一些更多的随机数据，并创建了3个类别。
- en: '![](../Images/53f9685f2cfeeed8794b6d8593b51462.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/53f9685f2cfeeed8794b6d8593b51462.png)'
- en: Here I label them **0, 1, 3**, and I plot them vertically.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里将它们标记为**0, 1, 3**，并垂直绘制它们。
- en: 'But we must be careful: these numbers are **just category names**, not numeric
    values. They should not be interpreted as “ordered”.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们必须小心：这些数字**只是类别名称**，不是数值。它们不应被解释为“有序”。
- en: 'So the intuition is always: **How homogeneous is each region after the split?**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 所以直觉总是：**分割后每个区域有多均匀？**
- en: But it is harder to visually determine the best split.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 但在视觉上确定最佳分割更困难。
- en: Now, we need a mathematical way to express this idea.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要一种数学方法来表达这个想法。
- en: This is exactly the topic of the next chapter.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是下一章的主题。
- en: Impurity measure as the criterion of split
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 纯度度量作为分割的标准
- en: 'In the Decision Tree Regressor, we already know:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在决策树回归器中，我们已经知道：
- en: The prediction for a region is the **average** of the target.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于一个区域的预测是目标变量的**平均值**。
- en: The quality of a split is measured by **MSE**.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分割的质量是通过**MSE**来衡量的。
- en: 'In the Decision Tree Classifier:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在决策树分类器中：
- en: The prediction for a region is the **majority class** of the region.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于一个区域的预测是该区域的**多数类**。
- en: 'The quality of a split is measured by an **impurity measure**: **Gini impurity**
    or **Entropy**.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分割的质量是通过一个**纯度度量**来衡量的：**Gini纯度**或**熵**。
- en: Both are standard in textbooks, and both are available in scikit-learn. Gini
    is used by default.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种在教科书中都是标准的，并且都在scikit-learn中可用。默认使用Gini。
- en: BUT, what is this impurity measure, really?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这个纯度度量实际上是什么？
- en: 'If you look at the curves of **Gini** and **Entropy**, they both behave the
    same way:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看看**基尼**和**熵**的曲线，它们都以相同的方式表现：
- en: They are **0** when the node is **pure** (all samples have the same class).
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当节点是**纯的**（所有样本具有相同的类别）时，它们是**0**。
- en: They reach their **maximum** when the classes are **evenly mixed** (50 percent
    / 50 percent).
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当类别均匀混合时（50/50），它们达到**最大**。
- en: The curve is **smooth**, symmetric, and increases with disorder.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 曲线是**平滑**、**对称**的，并随着无序的增加而增加。
- en: 'This is the essential property of any **impurity measure**:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这是任何**不纯度度量**的基本属性：
- en: Impurity is low when groups are clean, and high when groups are mixed.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当组干净时，不纯度低，当组混合时，不纯度高。
- en: '![](../Images/bba60eceef9aefb37e80311c1c7ea83a.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bba60eceef9aefb37e80311c1c7ea83a.png)'
- en: Decision Tree Classifier in Excel – gini and entropy – image by author
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器 – gini和熵 – 作者图片
- en: So we will use these measures to decide which split to create.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们将使用这些指标来决定创建哪个分割。
- en: Split with One Continuous Feature
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有一个连续特征的分割
- en: Just like for the Decision Tree Regressor, we will follow the same structure.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 就像决策树回归器一样，我们将遵循相同的结构。
- en: List of all possible splits
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 所有可能分割的列表
- en: Exactly like the regressor version, with one numerical feature, the only splits
    we need to test are the midpoints between consecutive sorted x values.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 与回归器版本完全一样，只有一个数值特征，我们只需要测试连续排序的x值之间的中点。
- en: For each split, compute impurity on each side
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于每个分割，计算每一侧的不纯度
- en: Let us take a split value, for example, **x = 5.5**.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们取一个分割值，**x = 5.5**。
- en: 'We separate the dataset into two regions:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将数据集分为两个区域：
- en: 'Region L: x < 5.5'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区域L：x < 5.5
- en: 'Region R: x ≥ 5.5'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区域R：x ≥ 5.5
- en: 'For each region:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个区域：
- en: We count the total number of observations
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们计算观察值的总数
- en: We compute Gini impurity
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们计算基尼不纯度
- en: At last, we compute weighted impurity of the split
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们计算分割的加权不纯度
- en: '![](../Images/556e07d9916d498f0703f588867ac75b.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/556e07d9916d498f0703f588867ac75b.png)'
- en: Decision Tree Classifier in Excel – image by author
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器 – 作者图片
- en: Select the split with the lowest impurity
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择具有最低不纯度的分割
- en: 'Like in the regressor case:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在回归器案例中：
- en: List all possible splits
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有可能分割的列表
- en: Compute impurity for each
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个计算不纯度
- en: The optimal split is the one with the **minimum impurity**
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最佳分割是具有**最小不纯度**的分割
- en: '![](../Images/c72086e0e64e503ffe642b1ec9ae6b48.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c72086e0e64e503ffe642b1ec9ae6b48.png)'
- en: Decision Tree Classifier in Excel – image by author
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器 – 作者图片
- en: '**Synthetic Table of All Splits**'
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**所有分割的综合表格**'
- en: To make everything automatic in Excel,
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在Excel中使一切自动化，
- en: 'we organize all calculations in **one table**, where:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将所有计算组织在一个**表格**中，其中：
- en: '**each row corresponds to one candidate split**,'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每一行对应一个候选分割**，'
- en: 'for each row, we compute:'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每一行，我们计算：
- en: Gini of the **left** region,
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**左侧**区域的基尼系数，'
- en: Gini of the **right** region,
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正确**区域的基尼系数，'
- en: and the **overall weighted Gini** of the split.
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及分割的**总体加权基尼**。
- en: This table gives a clean, compact overview of every possible split,
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 此表提供了一个清晰、紧凑的概述，列出了每个可能的分割，
- en: and the best split is simply the one with the lowest value in the final column.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳分割只是最终列中值最低的那个。
- en: '![](../Images/7a84e7a3fc615b8b07a8d396685ad603.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7a84e7a3fc615b8b07a8d396685ad603.png)'
- en: Decision Tree Classifier in Excel – image by author
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器 – 作者图片
- en: Multi-class classification
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多类别分类
- en: Until now, we worked with two classes. But the Gini impurity extends naturally
    to **three classes**, and the logic of the split stays exactly the same.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直在处理两个类别。但基尼不纯度自然扩展到**三个类别**，分割的逻辑保持完全相同。
- en: 'Nothing changes in the structure of the algorithm:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 算法的结构没有变化：
- en: we list all possible splits,
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们列出所有可能的分割，
- en: we compute impurity on each side,
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在每一侧计算不纯度，
- en: we take the weighted average,
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们取加权平均值，
- en: we select the split with the lowest impurity.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们选择具有最低不纯度的分割。
- en: Only the formula of the Gini impurity becomes slightly longer.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 只有基尼不纯度的公式稍微长一点。
- en: '**Gini impurity with three classes**'
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**三个类别的基尼不纯度**'
- en: If a region contains proportions p1,  p2,  p3
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个区域包含比例p1、p2、p3
- en: 'for the three classes, then the Gini impurity is:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 对于三个类别，基尼不纯度为：
- en: '![](../Images/a81f5562949d106124d390a3baa2cc7e.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a81f5562949d106124d390a3baa2cc7e.png)'
- en: 'The same idea as before:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前相同的思想：
- en: a region is “pure” when one class dominates,
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个类别占主导地位时，一个区域是“纯的”，
- en: and the impurity becomes large when classes are mixed.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 当类别混合时，不纯度变得很大。
- en: '**Left and Right regions**'
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**左右区域**'
- en: 'For each split:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个分割：
- en: Region L contains some observations of classes 1, 2, and 3
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区域 L 包含一些类别 1、2 和 3 的观测值
- en: Region R contains the remaining observations
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区域 R 包含剩余的观测值
- en: 'For each region:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个区域：
- en: count how many points belong to each class
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算属于每个类别的点数
- en: compute the proportions p1,p2,p3
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算比例 p1,p2,p3
- en: compute the Gini impurity using the formula above
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用上述公式计算基尼不纯度
- en: Everything is exactly the same as in the binary case, just with one more term.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都与二进制情况完全相同，只是多了一个项。
- en: '**Summary Table for 3-class splits**'
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**3 类分割的总结表**'
- en: 'Just like before, we collect all computations in one table:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 就像之前一样，我们将所有计算汇总到一个表中：
- en: each row is one possible split
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每一行代表一个可能的分割
- en: we count class 1, class 2, class 3 on the left
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在左侧计算类别 1、类别 2、类别 3
- en: we count class 1, class 2, class 3 on the right
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在右侧计算类别 1、类别 2、类别 3
- en: we compute Gini (Left), Gini (Right)​, and the weighted Gini
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们计算基尼（左），基尼（右），以及加权基尼
- en: The split with the **smallest weighted impurity** is the one selected by the
    decision tree.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 具有**最小加权不纯度**的分割是决策树选择的分割。
- en: '![](../Images/ffd6c68d8ac3a9fcc319391b7196f892.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ffd6c68d8ac3a9fcc319391b7196f892.png)'
- en: Decision Tree Classifier in Excel – image by author
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器 – 图像由作者提供
- en: We can easily generalize the algorithm to K classes, using these following formulas
    to calculate Gini or Entropy
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以很容易地将算法推广到 K 个类别，使用以下公式计算基尼或不纯度
- en: '![](../Images/44af87a7003734125d426e6ff34cc2f5.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/44af87a7003734125d426e6ff34cc2f5.png)'
- en: Decision Tree Classifier in Excel – image by author
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器 – 图像由作者提供
- en: How Different Are Impurity Measures, Really?
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 真的不纯度度量之间有多大的不同？
- en: Now, we always mention Gini or Entropy as criterion, but **do they really differ**?
    When looking at the mathematical formulas, some may say
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们总是提到基尼或熵作为标准，但**它们真的不同吗**？当查看数学公式时，有些人可能会说
- en: '**The answer is not that much.**'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案不是很多。**'
- en: 'In theory, in almost all practical situations:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上，在几乎所有实际情况下：
- en: Gini and Entropy **choose the same split**
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基尼和熵**选择相同的分割**
- en: The tree structure is **almost identical**
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 树结构几乎是**相同**的
- en: The predictions are **the same**
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测是**相同的**
- en: Why?
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because their curves look extremely similar.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它们的曲线看起来非常相似。
- en: They both peak at 50 percent mixing and drop to zero at purity.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 它们在 50% 混合时达到峰值，在纯净度时降至零。
- en: 'The only difference is the *shape* of the curve:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的区别是曲线的**形状**：
- en: '**Gini** is a **quadratic** function.​ It penalizes misclassification more
    linearly.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基尼**是一个**二次**函数。它对误分类的惩罚更线性。'
- en: '**Entropy** is a **logarithmic** function, so it penalizes uncertainty a bit
    more strongly near 0.5.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**熵**是一个**对数**函数，因此它在 0.5 附近对不确定性的惩罚要强一些。'
- en: But the difference is tiny, in practice, and you can do it in Excel!
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 但实际上差异很小，你可以在 Excel 中完成它！
- en: Other impurity measures?
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他不纯度度量？
- en: 'Another natural question: is it possible to invent/use other measures?'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个自然的问题是：是否可以发明/使用其他度量？
- en: 'Yes, you could invent your own function, as long as:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你可以发明你自己的函数，只要：
- en: It is **0** when the node is pure
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当节点纯净时，它是**0**
- en: It is **maximal** when classes are mixed
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当类别混合时，它是**最大**的
- en: It is **smooth** and strictly increasing in “disorder”
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它在“无序”中是**平滑**且严格递增的
- en: 'For example: Impurity = 4*p0*p1'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：不纯度 = 4*p0*p1
- en: This is another valid impurity measure. And it is actually equal to **Gini**
    multiplied by a constant when there are only two classes.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种有效的不纯度度量。实际上，当只有两个类别时，它等于**基尼**乘以一个常数。
- en: So again, it gives **the same splits**. If you are not convinced, you can
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，它再次给出了**相同的分割**。如果你还不信服，你可以
- en: Here are some other measures that can also be used.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些也可以使用的其他度量。
- en: '![](../Images/1527964d1cd38d66bb900b50a02324b3.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1527964d1cd38d66bb900b50a02324b3.png)'
- en: Decision Tree Classifier in Excel – many impurity measures – image by author
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器 – 许多不纯度度量 – 图像由作者提供
- en: Exercises in Excel
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Excel中的练习
- en: Tests with other parameters and features
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用其他参数和特征的测试
- en: 'Once you build the first split, you can extend your file:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你建立了第一个分割，你就可以扩展你的文件：
- en: Try **Entropy** instead of Gini
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试使用**熵**而不是基尼
- en: Try adding **categorical features**
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试添加**分类特征**
- en: Try building the **next split**
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试建立**下一个分割**
- en: Try changing **max depth** and observe under- and over-fitting
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试更改**最大深度**并观察欠拟合和过拟合
- en: Try creating a confusion matrix for predictions
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试为预测创建一个混淆矩阵
- en: These simple tests already give you a good intuition for how real decision trees
    behave.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这些简单的测试已经让你对真实决策树的行为有了很好的直观感受。
- en: Implementations of the rules for Titanic Survival Dataset
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为泰坦尼克号生存数据集实现规则
- en: A natural follow-up exercise is to recreate decision rules for the famous **[Titanic
    Survival Dataset](https://www.kaggle.com/datasets/yasserh/titanic-dataset)** (**CC0
    / Public Domain**).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 一个自然的后续练习是重新创建著名的**[泰坦尼克号生存数据集](https://www.kaggle.com/datasets/yasserh/titanic-dataset)**（**CC0
    / 公共领域**）的决策规则。
- en: 'First, we can start with only two features: **sex** and **age**.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们可以只从两个特征开始：**性别**和**年龄**。
- en: 'Implementing the rules in Excel is long and a bit tedious, but this is exactly
    the point: it makes you realize what decision rules really look like.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中实现规则既长又有点繁琐，但这正是重点：它让你真正意识到决策规则的真实样子。
- en: They are nothing more than a sequence of **IF / ELSE** statements, repeated
    again and again.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 它们不过是一系列反复出现的**IF / ELSE**语句。
- en: 'This is the true nature of a decision tree: simple rules, stacked on top of
    each other.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是决策树的真正本质：简单的规则，层层叠加。
- en: '![](../Images/51ef7d36087fe581e53a42f6e37e3fbb.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/51ef7d36087fe581e53a42f6e37e3fbb.png)'
- en: Decision Tree Classifier in Excel for Titanic Survival Dataset (**CC0 / Public
    Domain**) – image by author
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的泰坦尼克号生存数据集决策树分类器（**CC0 / 公共领域**）——图片由作者提供
- en: Conclusion
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Implementing a Decision Tree Classifier in Excel is surprisingly accessible.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中实现决策树分类器出奇地容易。
- en: 'With a few formulas, you uncover the heart of the algorithm:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 只需几个公式，你就能揭开算法的核心：
- en: list possible splits
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出可能的分割
- en: compute impurity
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算不纯度
- en: choose the cleanest split
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择最干净的分割
- en: '![](../Images/c5d5639a1267b5724a771c45ada621cc.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c5d5639a1267b5724a771c45ada621cc.png)'
- en: Decision Tree Classifier in Excel – image by author
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树分类器——图片由作者提供
- en: This simple mechanism is the foundation of more advanced ensemble models like
    **Gradient Boosted Trees**, which we will discuss later in this series.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的机制是更高级的集成模型，如**梯度提升树**的基础，我们将在本系列的后续内容中讨论。
- en: And stay tuned for **Day 8** tomorrow!
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 明天请继续关注**第8天**！
