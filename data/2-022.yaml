  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：收集电子邮件并下载附件
- en: The Gmail trigger node collects the email body and downloads the attachment.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: Gmail触发节点收集电子邮件正文并下载附件。
- en: '![](../Images/7b7314851077f72ab155274e0399a9b3.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7b7314851077f72ab155274e0399a9b3.png)'
