  prefs: []
  type: TYPE_NORMAL
  zh: 专注于工作流程的代理部分 – (图片由Samir Saci提供)
- en: In the system prompt of the first AI Agent node, we detail how to parse the
    email to collect the proper parameters.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一个AI代理节点系统中，我们详细说明了如何解析电子邮件以收集适当的参数。
