  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 通过电子邮件收到的请求示例 – (图片由Samir Saci提供)
- en: The AI Agent presented before will receive data from another agent that will
    parse the email to extract the relevant parameters.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 之前展示的AI代理将从另一个代理那里接收数据，该代理将解析电子邮件以提取相关参数。
