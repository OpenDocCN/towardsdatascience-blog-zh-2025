  prefs: []
  type: TYPE_NORMAL
  zh: 系统提示 – (图片由Samir Saci提供)
- en: The outputs of this AI Agent Parser are sent to the second AI Agent that will
    query the backend.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 此 AI 代理解析器的输出发送到第二个 AI 代理，该代理将查询后端。
