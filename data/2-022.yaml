  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 上文邮件中 AI 代理解析器的输出 – （图片由 Samir Saci 提供）
- en: In a minimal system prompt, we instruct the **AI Agent API Request** on how
    to use the tool.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在最小系统提示中，我们指导 **AI 代理 API 请求**如何使用工具。
