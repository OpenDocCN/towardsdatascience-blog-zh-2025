- en: The Mythical Pivot Point from Buy to Build for Data Platforms
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从购买到构建的数据平台神话般的转折点
- en: 原文：[https://towardsdatascience.com/mythical-pivot-point-from-buy-to-build-for-data-platforms/](https://towardsdatascience.com/mythical-pivot-point-from-buy-to-build-for-data-platforms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mythical-pivot-point-from-buy-to-build-for-data-platforms/](https://towardsdatascience.com/mythical-pivot-point-from-buy-to-build-for-data-platforms/)
- en: '**TL;DR:** <mdspan datatext="el1750895483935" class="mdspan-comment">For companies</mdspan>
    with data-intensive architectures, there often comes a pivotal point where building
    in-house data platforms makes more sense than buying off-the-shelf solutions.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**TL;DR:** <mdspan datatext="el1750895483935" class="mdspan-comment">对于数据密集型架构的公司</mdspan>来说，在某个关键时刻，构建内部数据平台比购买现成解决方案更有意义。'
- en: '* * *'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Mystical Pivot Point
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 神秘的转折点
- en: 'Buying off-the-shelf data platforms is a popular choice for startups to accelerate
    their business, especially in the early stages. However, is it true that companies
    that have already bought never need to pivot to build, just like service providers
    had promised? There are reasons for both sides of the view:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 购买现成的数据平台是初创公司加速业务的一种流行选择，尤其是在早期阶段。然而，是否真的像服务提供商所承诺的那样，已经购买的公司永远不会需要转向构建？这个观点的两边都有理由：
- en: '![](../Images/df446a5e076e8b9143a83c0ead4c455f.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/df446a5e076e8b9143a83c0ead4c455f.png)'
- en: Image by Author
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Need to Pivot: The cost of buying will eventually exceed the cost of building,
    as the cost grows faster when you buy.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要转向：购买的成本最终将超过构建的成本，因为购买的成本增长速度更快。
- en: 'No need to Pivot: The platform’s requirements will continue to evolve and increase
    the cost of building, so buying will always be cheaper.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无需转向：平台的需求将继续演变并增加构建的成本，因此购买将始终更便宜。
- en: It is such a puzzle, yet few articles have discussed it. In this post, we will
    delve into this topic, analyzing three dynamics that increase the reasons for
    building and two strategies to consider when deciding to pivot.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个如此复杂的谜题，然而却很少有文章讨论它。在这篇文章中，我们将深入探讨这个话题，分析三个增加构建原因的动力以及决定转向时需要考虑的两个策略。
- en: '| **Dynamics** | **Pivot Strategies** |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| **动态** | **转向策略** |'
- en: '| – Growth of Technical Credit – Shift of Customer Persona'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '| – 技术信用的增长 – 客户角色的转变'
- en: – Misaligned Priority | – Cost-Based Pivoting – Value-Based Pivoting |
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: – 不一致的优先级 | – 基于成本的转向 – 基于价值的转向 |
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Growth of Technical Credit
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术信用的增长
- en: It all began outside the scope of the data platform. Want it or not, to improve
    efficiency or your operation, your company needs to build up ***Technical Credits***
    at three different levels. Realising it or not, they will start making building
    easier for you.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这一切都始于数据平台之外。无论你是否想要，为了提高效率或运营，你的公司需要在三个不同级别上建立***技术信用***。无论你是否意识到，它们都将使构建对你来说更容易。
- en: What is technical credit? Check out this [artile](https://cacm.acm.org/opinion/technical-credit/)
    published in ACM.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 技术信用是什么？查看ACM发布的这篇[文章](https://cacm.acm.org/opinion/technical-credit/)。
- en: 'Those three levels of ***Technical Credits*** are:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个级别的***技术信用***是：
- en: '| **Technical Credit**s | **Key Purposes** |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| **技术信用** | **关键目的** |'
- en: '| Cluster Orchestration | Enhance efficiency in managing multi-flavor Kubernetes
    clusters. |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
  zh: '| 集群编排 | 提高管理多口味Kubernetes集群的效率。|'
- en: '| Container Orchestration | Enhance efficiency in managing microservices and
    open-source stacks |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
  zh: '| 容器编排 | 通过管理微服务和开源堆栈提高效率 |'
- en: '| Function Orchestration | Enhance efficiency by setting up an internal FaaS
    (Function as a Service) that abstracts all infrastructure details away. |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| 函数编排 | 通过设置内部FaaS（函数即服务）来抽象所有基础设施细节，从而提高效率。|'
- en: For cluster orchestration, there are typically three different flavors of Kubernetes
    clusters.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 对于集群编排，通常有三种不同的Kubernetes集群口味。
- en: Clusters for microservices
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微服务集群
- en: Clusters for streaming services
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 流服务集群
- en: Clusters for batch processing
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批处理集群
- en: Each of them requires different provision strategies, especially in network
    design and auto-scaling. Check out this [post](https://medium.com/towardsdev/network-design-of-kuberentes-cluster-on-cloud-4fca233425a9)
    for an overview of the network design differences.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 每个都需要不同的提供策略，尤其是在网络设计和自动扩展方面。查看这篇[文章](https://medium.com/towardsdev/network-design-of-kuberentes-cluster-on-cloud-4fca233425a9)以了解网络设计差异的概述。
- en: '![](../Images/26efebdd38a67eaaae00a7e0b754d6ce.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/26efebdd38a67eaaae00a7e0b754d6ce.png)'
- en: Network Design Differences for Different Types of K8s Clusters. Image by Author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 不同类型K8s集群的网络设计差异。图片由作者提供
- en: For container orchestration efficiency, one possible way to accelerate is by
    extending the Kubernetes cluster with a custom resource definition (CRD). In this
    post, I shared how kubebuilder works and a few examples built with it. e.g., an
    in-house DS platform by CRD.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高容器编排效率，一种可能的加速方法是通过对 Kubernetes 集群扩展自定义资源定义（CRD）。在这篇文章中，我分享了 kubebuilder
    的工作原理以及用它构建的一些示例。例如，通过 CRD 构建的内部 DS 平台。
- en: '![](../Images/581233fa14387393617ddf824a2f2161.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/581233fa14387393617ddf824a2f2161.png)'
- en: A DS platform built with CRD. Image by Author
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 CRD 构建的 DS 平台。作者图片
- en: For the function orchestration efficiency, it required a combination of the
    SDK and the infrastructure. Many organisations will use scaffolding tools to generate
    code skeletons for microservices. With this inversion of control, the task for
    the user is simply filling up the rest-api’s handler body.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高函数编排效率，需要 SDK 和基础设施的结合。许多组织将使用脚手架工具为微服务生成代码骨架。在这种控制反转中，用户的任务仅仅是填充 rest-api
    的处理器体。
- en: In this [post](https://towardsdatascience.com/from-data-platform-to-ml-platform-4a8192edab5d/)
    on Toward Data Science, most services in the MLOps journey are built using FaaS.
    Especially for model-serving services, machine learning engineers only need to
    fill in a few essential functions, which are critical to feature loading, transformation,
    and request routing.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Toward Data Science 上的这篇 [文章](https://towardsdatascience.com/from-data-platform-to-ml-platform-4a8192edab5d/)
    中，MLOps 旅程中的大多数服务都是使用 FaaS 构建的。特别是对于模型服务服务，机器学习工程师只需要填写几个关键函数，这些函数对于特征加载、转换和请求路由至关重要。
- en: '![](../Images/56205735f1acc5d9a8edad11ed1ba258.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/56205735f1acc5d9a8edad11ed1ba258.png)'
- en: Image by Author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: The following table shares the ***Key User Journey*** and ***Area of Control***
    of different levels of ***Technical Credits***.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 下表分享了不同级别 **技术贡献** 的 **关键用户旅程** 和 **控制区域**。
- en: '| **Technical Credit**s | **Key User Journey** | **Area of Control** |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| **技术贡献** | **关键用户旅程** | **控制区域** |'
- en: '| Cluster Orchestration | Self-serve on creating multi-flavour K8s clusters.
    | – Policy for Region, Zone, and IP CIDR Assignment – Network Peering'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '| 集群编排 | 自助创建多功能的 K8s 集群。 | – 区域、区域和 IP CIDR 分配策略 – 网络对等'
- en: – Policy for Instance Provisioning
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: – 实例供应策略
- en: – Security & OS harden
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: – 安全和操作系统加固
- en: – Terraform Modules and CI/CD pipelines |
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: – Terraform 模块和 CI/CD 管道 |
- en: '| Container Orchestration | Self-serve on service deployment, open-source stack
    deployment, and CRD building | – GitOps for Cluster Resources Releases – Policy
    for Ingress Creation'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '| 容器编排 | 自助进行服务部署、开源堆栈部署和 CRD 构建 | – 集群资源发布的 GitOps – 入口创建策略'
- en: – Policy for Customer Resource Definition
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: – 客户资源定义策略
- en: – Policy for Cluster Auto Scaling
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: – 集群自动缩放策略
- en: – Policy for Metric Collection and Monitoring
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: – 指标收集和监控策略
- en: – Cost Tracking
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: – 成本跟踪
- en: '|'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Function Orchestration | Focus solely on implementing business logic by filling
    pre-defined function skeletons. | – Identity and Permission Control – Configuration
    Management'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '| 函数编排 | 专注于通过填充预定义的函数骨架来实施业务逻辑。 | – 身份和权限控制 – 配置管理'
- en: – Internal State Checkpointing
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: – 内部状态检查点
- en: – Scheduling & Migration
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: – 调度和迁移
- en: – Service Discovery
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: – 服务发现
- en: – Health Monitoring |
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: – 健康监控 |
- en: With the growth of ***Technical Credits***, the cost of building will reduce.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 随着 **技术贡献** 的增长，构建成本将降低。
- en: '![](../Images/abad854def1b5997087250da9e8a0e54.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/abad854def1b5997087250da9e8a0e54.png)'
- en: Image by Author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 'However, the transferability differs for different levels of Technical Credits.
    From bottom to top, it becomes less and less transferable. You will be able to
    enforce consistent infrastructure management and reuse microservices. However,
    it is hard to reuse the technical credit for building FaaS across different topics.
    Furthermore, declining building costs do not mean you need to rebuild everything
    yourself. For a complete build-vs-buy trade-off analysis, two more factors play
    a part, which are:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，不同级别的技术贡献的可转移性有所不同。从下到上，可转移性越来越低。你将能够实施一致的基础设施管理和重用微服务。然而，很难在不同主题之间重用构建 FaaS
    的技术贡献。此外，建设成本的下降并不意味着你需要自己重建一切。对于完整的构建-购买权衡分析，还有两个因素发挥作用，它们是：
- en: Shift of Customer Persona
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户角色转变
- en: Misaligned Priority
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不一致的优先级
- en: Shift of Customer Persona
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户角色转变
- en: As your company grows, you will soon realize that persona distribution for data
    platforms is shifting.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 随着公司的成长，你很快就会意识到数据平台的角色分布正在转变。
- en: '![](../Images/3f808f999bb9b7251b3c584adccf0b53.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3f808f999bb9b7251b3c584adccf0b53.png)'
- en: Image by Author
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: When you are small, the majority of your users are Data Scientists and Data
    Analysts. They explore data, validate ideas, and generate metrics. However, when
    more data-centric product features are released, engineers begin to write Spark
    jobs to back up their online services and ML models. Those data pipelines are ***first-class
    citizens*** just like microservices. Such a persona shift, making a fully GitOps
    data pipeline development journey acceptable and even welcomed.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当您规模较小时，您的多数用户是数据科学家和数据分析师。他们探索数据，验证想法，并生成指标。然而，当更多以数据为中心的产品功能发布时，工程师开始编写Spark作业来支持他们的在线服务和机器学习模型。这些数据管道就像微服务一样是**一等公民**。这种角色转变使得完全GitOps数据管道开发之旅变得可接受，甚至受欢迎。
- en: Misaligned Priority
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不一致的优先级
- en: 'There will be misalignments between SaaS providers and you, simply because
    everyone needs to act in the best interest of their own company. The misalignment
    initially appears minor but might gradually worsen over time. Those potential
    misalignments are:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每个人都需要在自己的公司利益下行动，因此SaaS提供商和您之间将存在不匹配。这种不匹配最初可能看起来很小，但随着时间的推移可能会逐渐恶化。这些潜在的冲突包括：
- en: '| **Priority** | **SaaS provider** | **You** |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| **优先级** | **SaaS提供商** | **您** |'
- en: '| Feature Prioritisation | Benefit of the Majority of Customers | Benefits
    of your Organisation |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| 功能优先级 | 大多数客户的好处 | 您组织的好处 |'
- en: '| Cost | Secondary Impact(potential customer churn) | Direct Impact(need to
    pay more) |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| 成本 | 次要影响（潜在客户流失） | 直接影响（需要支付更多） |'
- en: '| System Integration | Standard Interface | Customisable Integration |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| 系统集成 | 标准接口 | 可定制的集成 |'
- en: '| Resource Pooling | Share between their Tenants | Share across your internal
    system |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| 资源池 | 在他们的租户之间共享 | 在您的内部系统之间共享 |'
- en: For resource pooling, data systems are ideal for co-locating with online systems,
    as their workloads typically peak at different times. Most of the time, online
    systems experience peak usage during the day, whereas data platforms peak at night.
    With higher commitments to your cloud provider, the benefits of resource pooling
    become more significant. Especially when you purchase yearly reserved instance
    quotas, combining both online and offline workload gives you stronger bargaining
    power. SaaS providers, however, will prioritise pivoting to serverless architecture
    to enable resource pooling among their customers, thereby improving their profit
    margin.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 对于资源池，数据系统与在线系统协同定位是理想的，因为它们的工作负载通常在不同的时间达到峰值。大多数时候，在线系统在白天经历高峰使用，而数据平台在夜间达到峰值。对您的云提供商的更高承诺使得资源池化的好处更加显著。特别是当您购买年度预留实例配额时，结合在线和离线工作负载可以为您提供更强的议价能力。然而，SaaS提供商将优先考虑转向无服务器架构，以使其客户之间实现资源池化，从而提高其利润率。
- en: '* * *'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Pivot! Pivot! Pivot?
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 转向！转向！转向？
- en: 'Even with the cost of building declining and misalignments rising, building
    will never be an easy option. It requires domain expertise and long-term investment.
    However, the good news is that you don’t have to perform a complete switch. There
    are compelling reasons to adopt a hybrid approach or step-by-step pivoting, maximizing
    the return on investment from both buying and building. There might be two ways
    moving forward:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 即使建设成本下降，不匹配上升，建设永远不会是一个容易的选择。它需要领域专业知识以及长期投资。然而，好消息是您不必进行完全切换。采用混合方法或逐步转向有令人信服的理由，可以最大化从购买和建设中获得的投资回报。向前发展可能有两条途径：
- en: Cost-Based Pivoting
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于成本的转向
- en: Value-Based Pivoting
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于价值的转向
- en: '* * *'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Disclaimer: I hereby present my perspective. It presents some general principles,
    and you are encouraged to do your own research for validation.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 免责声明：我在此提出我的观点。它提出了一些一般原则，并鼓励您进行自己的研究以进行验证。
- en: 'Approach One: Cost-Based Pivoting'
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 方法一：基于成本的转向
- en: The 80/20 rule also applies well to the Spark jobs. 80% of Spark jobs run in
    production, while the remaining 20% are submitted by users from the dev/sandbox
    environment. Among the 80% of jobs in production, 80% are small and straightforward,
    while the remaining 20% are large and complex. *A premium Spark engine distinguishes
    itself mostly on large and complex jobs*.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 80/20规则也适用于Spark作业。80%的Spark作业在生产环境中运行，而剩余的20%是由开发/沙盒环境中的用户提交的。在生产中的80%的作业中，80%是小型且简单的，而剩余的20%是大型且复杂的。*高级Spark引擎主要在大型且复杂的作业中脱颖而出*。
- en: Want to understand why Databricks Photon performs well on complex spark jobs?
    Check out this [post](https://codecookcash.substack.com/p/lessons-learned-sortmergejoin-vs)
    by [Huong](https://www.linkedin.com/in/hoaihuongbk/).
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 想要知道为什么Databricks Photon在复杂的Spark作业上表现良好？请查看[Huong](https://www.linkedin.com/in/hoaihuongbk/)的这篇[文章](https://codecookcash.substack.com/p/lessons-learned-sortmergejoin-vs)。
- en: Additionally, sandbox or development environments require stronger data governance
    controls and data discoverability capabilities, both of which require quite complex
    systems. In contrast, the production environment is more focused on GitOps control,
    which is easier to build with existing offerings from the Cloud and the open-source
    community.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，沙盒或开发环境需要更强的数据治理控制和数据可发现性能力，这两者都需要相当复杂系统。相比之下，生产环境更侧重于GitOps控制，这可以通过云和开源社区现有的产品更容易地构建。
- en: '![](../Images/e5f69d4b43d88adae3aa70bddde44f77.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5f69d4b43d88adae3aa70bddde44f77.png)'
- en: Image by Author
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'If you can build a cost-based dynamic routing system, such as a multi-armed
    bandit, to route less complex Spark jobs to a more affordable in-house platform,
    you can potentially save a significant amount of cost. However, with two prerequisites:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够构建一个基于成本的动态路由系统，例如多臂老虎机，将更简单的Spark作业路由到更经济的内部平台，你可能会节省大量的成本。然而，有两个前提条件：
- en: '***Platform-agnostic Artifact***: A platform like Databricks may have its own
    SDK or notebook notation that is specific to the Databricks ecosystem. To achieve
    dynamic routing, you must enforce standards to create platform-agnostic artifacts
    that can run on different platforms. This practice is crucial to prevent vendor
    lock-in in the long term.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平台无关的工件**：Databricks这样的平台可能有自己的SDK或笔记本符号，这是特定于Databricks生态系统的。为了实现动态路由，必须强制执行标准以创建可以在不同平台上运行的平台无关工件。这种做法对于长期防止供应商锁定至关重要。'
- en: '***Patching Missing Components*** (e.g., Hive Metastore): It is an anti-pattern
    to have two duplicated systems side by side. But it can be necessary when you
    pivot to build. For example, open-source Spark can not leverage Databricks’ Unity
    Catalog to its full capability. Therefore, you may need to develop a catalog service,
    such as a Hive metastore, for your in-house platform.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**修补缺失组件**（例如，Hive Metastore）：两个系统并排存在是一种反模式。但在转向构建时，这可能是有必要的。例如，开源Spark无法充分利用Databricks的Unity
    Catalog。因此，你可能需要为你的内部平台开发一个目录服务，如Hive Metastore。'
- en: Please also note that a small proportion of complex jobs may account for a large
    portion of your bill. Therefore, conducting thorough research for your case is
    required.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，一小部分复杂的作业可能会占据你账单的大部分。因此，对你的案例进行彻底的研究是必要的。
- en: 'Approach Two: Value-Based Pivoting'
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二种方法：基于价值的转向
- en: The second pivot approach is based on how the dose pipeline generates values
    for your company.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种转向方法是基于剂量流水线为公司创造价值的方式。
- en: 'Operational: Data as Product as Value'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 操作：数据作为产品作为价值
- en: 'Analytical: Insight as Values'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析：洞察作为价值
- en: 'The framework of breakdown is inspired by this article, [MLOps: Continuous
    delivery and automation pipelines in machine learning](https://cloud.google.com/architecture/mlops-continuous-delivery-and-automation-pipelines-in-machine-learning).
    It brings up an important concept called experimental-operational symmetry.'
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 破坏框架的灵感来源于这篇文章，[MLOps：机器学习中的持续交付和自动化流水线](https://cloud.google.com/architecture/mlops-continuous-delivery-and-automation-pipelines-in-machine-learning)。它提出了一个重要的概念，称为实验-操作对称性。
- en: '![](../Images/8230e0bbd791a0ca9afa21194a0369af.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8230e0bbd791a0ca9afa21194a0369af.png)'
- en: Image by Author
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'We classify our data pipelines in two dimensions:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从两个维度对数据流水线进行分类：
- en: Based on the complexity of the artifact, they are classified into low-code,
    scripting, and high-code pipelines.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据工件复杂性，它们被分为低代码、脚本和高度代码流水线。
- en: Based on the value it generates, they are classified into operational and analytical
    pipelines.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据其产生的价值，它们被分为操作和分析流水线。
- en: High-code and operational pipelines require ***staging->production symmetry***
    for rigorous code review and validation. Scripting and analytical pipelines require
    ***dev->staging symmetry*** for fast development velocity. When an analytical
    pipeline carries an important analytical insight and needs to be democratized,
    it should be transitioned to an operational pipeline with code reviews, as the
    health of this pipeline will become critical to many others.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 高代码和操作管道需要***预发布->生产对称性***以进行严格的代码审查和验证。脚本和分析管道需要***开发->预发布对称性***以实现快速的开发速度。当一个分析管道携带重要的分析洞察并需要民主化时，它应该过渡到带有代码审查的操作管道，因为这个管道的健康状况将变得对许多人至关重要。
- en: The total symmetry, ***dev -> stg -> prd***, is not recommended for scripting
    and high-code artifacts.
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 总体对称性，***开发 -> 预发布 -> 生产***，不建议用于脚本和高度代码化的工件。
- en: Let’s examine the operational principles and key requirements of these different
    pipelines.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看这些不同管道的操作原理和关键要求。
- en: '| **Pipeline Type** | **Operational Principle** | **Key Requirements of the
    Platform** |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
  zh: '| **管道类型** | **操作原理** | **平台的关键要求** |'
- en: '| Data as Product(Operational) | Strict GitOps, Rollback on Failure | Stability
    & Close Internal Integration |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
  zh: '| 数据作为产品（操作） | 严格的GitOps，失败时回滚 | 稳定性与紧密的内部集成 |'
- en: '| Insight as Values(Analytical) | Fast Iteration, Rollover on Failure | User
    Experience & Developer Velocity |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| 洞察作为价值观（分析） | 快速迭代，失败时回滚 | 用户体验与开发者速度 |'
- en: 'Because of the different ways of yielding value and operation principles, you
    can:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 由于产生价值和操作原理的不同方式，您可以：
- en: 'Pivot Operational Pipelines: Since internal integration is more critical for
    the operational pipeline, it makes more sense to pivot those to in-house platforms
    first.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转向操作管道：由于内部集成对于操作管道更为关键，因此首先转向内部平台更有意义。
- en: 'Pivot low-code Pipelines: The low-code pipeline can also be easily switched
    over due to its low-code nature.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转向低代码管道：由于其低代码特性，低代码管道也可以轻松切换。
- en: '* * *'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: At Last
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后
- en: 'Pivot or Not Pivot, it is not an easy call. In summary, these are practices
    you should adopt regardless of the decision you make:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 转向与否，都不是一个容易的决定。总的来说，无论您做出什么决定，以下都是您应该采取的实践：
- en: Pay attention to the growth of your internal technical credit, and refresh your
    evaluation of total cost of ownership.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关注您内部技术信用的增长，并刷新您对总拥有成本的评估。
- en: Promote ***Platform-Agnostic Artifacts*** to avoid vendor lock-in.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推广***平台无关的工件***以避免供应商锁定。
- en: Of course, when you indeed need to pivot, have a thorough strategy. How does
    AI change our evaluation here?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，当您确实需要转向时，制定一个彻底的策略。人工智能如何改变我们的评估？
- en: AI makes prompt->high-code possible. It dramatically accelerates the development
    of both operational and analytical pipelines. To keep up with the trend, you might
    want to consider buying or building if you are confident.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能使得从提示到高代码成为可能。它极大地加速了操作和分析管道的开发。为了跟上趋势，如果您有信心，您可能需要考虑购买或构建。
- en: AI demands higher quality from data. Ensuring data quality will be more critical
    for both in-house platforms and SaaS providers.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能对数据质量要求更高。确保数据质量对于内部平台和SaaS提供商都更为关键。
- en: Here are my thoughts on this unpopular topic, ***pivoting from buy to build***.
    Let me know your thoughts on it. Cheers!
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我对这个不受欢迎话题的看法，***从购买转向构建***。请告诉我您的看法。干杯！
