- en: 'Unlock the Power of ROC Curves: Intuitive Insights for Better Model Evaluation'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解锁ROC曲线的力量：更好的模型评估的直观洞察
- en: 原文：[https://towardsdatascience.com/unlock-the-power-of-roc-curves-intuitive-insights-for-better-model-evaluation/](https://towardsdatascience.com/unlock-the-power-of-roc-curves-intuitive-insights-for-better-model-evaluation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/unlock-the-power-of-roc-curves-intuitive-insights-for-better-model-evaluation/](https://towardsdatascience.com/unlock-the-power-of-roc-curves-intuitive-insights-for-better-model-evaluation/)
- en: <mdspan datatext="el1744140846685" class="mdspan-comment">We’ve</mdspan> all
    been in that moment, right? Staring at a chart as if it’s some ancient script,
    wondering how we’re supposed to make sense of it all. That’s exactly how I felt
    when I was asked to explain the AUC for the ROC curve at work recently.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1744140846685" class="mdspan-comment">我们</mdspan>都经历过那个时刻，对吧？盯着图表，就像它是某种古老的脚本，想知道我们该如何理解这一切。这正是我最近在工作中被要求解释ROC曲线的AUC时感受到的。
- en: Though I had a solid understanding of the math behind it, breaking it down into
    simple, digestible terms proved to be a challenge. I realized that if I was struggling
    with it, others probably were too. So, I decided to write this article to share
    an intuitive way to understand the AUC-ROC curve through a practical example.
    No dry definitions here—just clear, straightforward explanations focused on the
    intuition.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我对它背后的数学有很好的理解，但将其分解成简单、易消化的术语却是一项挑战。我意识到，如果我都在为此感到困难，其他人可能也是如此。因此，我决定写这篇文章，分享一种通过实际例子直观理解AUC-ROC曲线的方法。这里没有枯燥的定义——只有清晰、直接的解释，专注于直觉。
- en: Here’s the [code](https://github.com/Swpnilsp/ROC-AUC-Curve/blob/main/RoC_Curve_Analysis%20(2).ipynb)¹ used
    in this article.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是本文使用的[code](https://github.com/Swpnilsp/ROC-AUC-Curve/blob/main/RoC_Curve_Analysis%20(2).ipynb)¹。
- en: Every data scientist goes through a phase of evaluating classification models.
    Amidst an array of evaluation metrics, Receiver Operating Characteristic **(ROC)** curve
    and the Area Under the Curve **(AUC)** is an indispensable tool for gauging model’s
    performance. In this comprehensive article, we will discuss basic concepts and
    see them in action using our good old [Titanic dataset](https://www.kaggle.com/competitions/titanic/data)².
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 每个数据科学家都会经历评估分类模型的过程。在众多评估指标中，接收者操作特征（ROC）曲线和曲线下面积（AUC）是衡量模型性能不可或缺的工具。在这篇全面的文章中，我们将讨论基本概念，并使用我们熟悉的[Titanic数据集](https://www.kaggle.com/competitions/titanic/data)²来展示它们的应用。
- en: '**Section 1: ROC Curve**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第1节：ROC曲线**'
- en: '*At its core, the ROC curve visually portrays the delicate balance between
    a model’s sensitivity and specificity across varying classification thresholds.*'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*在本质上，ROC曲线直观地描绘了模型在变化分类阈值下的敏感性和特异性的微妙平衡。*'
- en: 'To fully grasp the ROC curve, let’s delve into the concepts:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 要完全掌握ROC曲线，让我们深入探讨相关概念：
- en: '**Sensitivity/Recall (True Positive Rate):** Sensitivity quantifies a model’s
    adeptness at correctly identifying positive instances. In our Titanic example,
    sensitivity corresponds to the the proportion of actual survival cases that the
    model accurately labels as positive.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵敏度/召回率（真阳性率）：** 灵敏度量化模型正确识别正例的能力。在我们的泰坦尼克号例子中，灵敏度对应于模型准确地将实际生存案例标记为正例的比例。'
- en: '![](../Images/7072d4848f202b789db8bab9698bafaf.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7072d4848f202b789db8bab9698bafaf.png)'
- en: '**Specificity (True Negative Rate):** Specificity measures a model’s proficiency
    in correctly identifying negative instances. For our dataset, it represents the
    proportion of actual non-survived cases (Survival = 0) that the model correctly
    identifies as negative.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特异率（真阴性率）：** 特异率衡量模型正确识别负例的能力。对于我们的数据集，它表示模型正确地将实际非生存案例（生存 = 0）识别为负例的比例。'
- en: '![](../Images/74b4f6626a3ce7a0bcc91c5400e1c1f5.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/74b4f6626a3ce7a0bcc91c5400e1c1f5.png)'
- en: '**False Positive Rate:** FPR measures the proportion of negative instances
    that are incorrectly classified as positive by the model.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假阳性率（FPR）：** FPR衡量模型错误地将负例分类为正例的比例。'
- en: '![](../Images/9290244349edb2265bf0523c39e2a768.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9290244349edb2265bf0523c39e2a768.png)'
- en: Notice that Specificity and FPR are complementary to each other. While specificity
    focuses on the correct classification of negative instances, FPR focuses on the
    incorrect classification of negative instances as positive. Thus-
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，特异性和FPR是相互补充的。特异性能专注于正确分类负例，而FPR专注于将负例错误分类为正例。因此-
- en: '![](../Images/a6c3f4d9e803660ef18031be527a0eba.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a6c3f4d9e803660ef18031be527a0eba.png)'
- en: 'Now that we know the definitions, let’s work with an example. For Titanic dataset,
    I have built a simple logistic regression model that predicts whether the passenger
    survived the shipwreck or not, using following features: *Passenger Class, Sex,
    # of siblings/spouses aboard, passenger fare and Port of Embarkation.* Note that,
    the model predicts the ‘probability of survival’. The default threshold for logistic
    regression in sklearn is 0.5\. However, this default threshold may not always
    make sense for the problem being solved and we need to play around with the probability
    threshold i.e. if the predicted probability > threshold, instance is predicted
    to be positive else negative.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了定义，让我们用一个例子来工作。对于泰坦尼克号数据集，我构建了一个简单的逻辑回归模型，用于预测乘客是否在船难中幸存，使用以下特征：*乘客等级、性别、船上的兄弟姐妹/配偶数量、乘客票价和登船港口。*请注意，该模型预测的是“生存概率”。sklearn
    中逻辑回归的默认阈值为 0.5。然而，这个默认阈值可能并不总是适用于所解决的问题，我们需要调整概率阈值，即如果预测概率 > 阈值，实例被预测为阳性，否则为阴性。
- en: Now, let’s revisit the definitions of Sensitivity, Specificity and FPR above.
    Since our predicted binary classification is dependent on the probability threshold,
    for the given model, these three metrics will change based on the probability
    threshold we use. If we use a higher probability threshold, we will classify fewer
    cases as positives i.e. our true positives will be fewer, resulting in lower Sensitivity/Recall.
    A higher probability threshold also means fewer false positives, so low FPR. As
    such, increasing sensitivity/recall could lead to increased FPR.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们重新审视上面提到的敏感性、特异性和 FPR 的定义。由于我们的预测二元分类依赖于概率阈值，对于给定的模型，这三个指标将根据我们使用的概率阈值而变化。如果我们使用更高的概率阈值，我们将把更少的案例分类为阳性，即我们的真正阳性将更少，从而导致较低的敏感性/召回率。更高的概率阈值也意味着更少的假阳性，因此
    FPR 较低。因此，提高敏感性/召回率可能会导致 FPR 增加。
- en: For our training data, we will use 10 different probability cutoffs and calculate
    Sensitivity/TPR and FPR and plot in a chart below. Note, the size of circles in
    the scatterplot correspond to the probability threshold used for classification.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的训练数据，我们将使用 10 个不同的概率截止值，并计算敏感性/TPR 和 FPR，然后在下面的图表中绘制。注意，散点图中圆圈的大小对应于用于分类的概率阈值。
- en: '![](../Images/8d34ff736744a6e38e5d04a17498f408.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8d34ff736744a6e38e5d04a17498f408.png)'
- en: 'Chart 1: FPR vs TPR chart along with actual values in the DataFrame (image
    by author)'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 1：DataFrame 中的 FPR 与 TPR 图表以及实际值（图片由作者提供）
- en: Well, that’s it. The graph we created above plots Sensitivity (TPR) Vs. FPR
    at various probability thresholds IS the ROC curve!
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 好了，就是这样。我们上面创建的图表，展示了在各个概率阈值下敏感性（TPR）与 FPR 的关系，这就是 ROC 曲线！
- en: In our experiment, we used 10 different probability cutoffs with an increment
    of 0.1 giving us 10 observations. If we use a smaller increment for the probability
    threshold, we will end up with more data points and the graph will look like our
    familiar ROC curve.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的实验中，我们使用了 10 个不同的概率截止值，增量为 0.1，给我们提供了 10 个观察值。如果我们使用更小的概率阈值增量，我们将得到更多的数据点，图表将看起来像我们熟悉的
    ROC 曲线。
- en: To confirm our understanding, for the model we built for predicting passenger’s
    survival, we will loop through various predicted probability thresholds and calculate
    TPR, FPR for the testing dataset *(see code snippet below)*. Plot the results
    in a graph and compare this graph with the ROC curve plotted using sklearn’s [`roc_curve`](https://scikit-learn.org/stable/modules/generated/sklearn.metrics.roc_curve.html#sklearn.metrics.roc_curve)³ <mdspan
    datatext="el1744084760394" class="mdspan-comment">function</mdspan>.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确认我们的理解，对于我们为预测乘客生存而构建的模型，我们将遍历各种预测概率阈值，并计算测试数据集的 TPR 和 FPR（见下面的代码片段）。在图表中绘制结果，并将此图表与使用
    sklearn 的 `roc_curve` 函数绘制的 ROC 曲线进行比较。
- en: '![](../Images/fbd16023ea470f84a4da4b7c718f4390.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fbd16023ea470f84a4da4b7c718f4390.png)'
- en: 'Chart 2: sklearn ROC curve on the left and manually created ROC curve on right
    (image by author)'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 2：左侧为 sklearn ROC 曲线，右侧为手动创建的 ROC 曲线（图片由作者提供）
- en: As we can see, the two curves are almost identical. Note the **AUC=0.92** was
    calculated using the [`roc_auc_score`](https://scikit-learn.org/stable/modules/generated/sklearn.metrics.roc_auc_score.html)⁴ function.
    We will discuss this AUC in the later part of this article.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，两条曲线几乎完全相同。注意 **AUC=0.92** 是使用 `roc_auc_score` 函数计算的。我们将在本文的后续部分讨论这个 AUC。
- en: '**To summarize, ROC curve plots TPR and FPR for the model at various probability
    thresholds. **Note that, the actual probabilities are **NOT displayed **in the
    graph, but one can assume that the observations on the lower left side of the
    curve correspond to higher probability thresholds (low TPR), and observation on
    the top right side correspond to lower probability thresholds (high TPR).'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**总结来说，ROC曲线显示了模型在各个概率阈值下的TPR和FPR。**请注意，图中**实际概率**并未显示，但可以假设曲线左下方的观测值对应于更高的概率阈值（低TPR），而右上方的观测值对应于更低的概率阈值（高TPR）。'
- en: To visualize what’s stated above, refer to the below chart, where I have tried
    to annotate TPR and FPR at different probability cutoffs.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了可视化上述内容，请参考下方的图表，其中我尝试在不同概率阈值下标注了TPR（真正例率）和FPR（假正例率）。
- en: '![](../Images/356612a9a6b7688bbdb2141ed1b7eb90.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/356612a9a6b7688bbdb2141ed1b7eb90.png)'
- en: 'Chart 3: ROC Curve with different probability cutoffs (image by author)'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图表3：不同概率阈值下的ROC曲线（作者：[作者名]）
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Section 2: AUC**'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第2节：AUC**'
- en: Now that we have developed some intuition around what ROC curve is, the next
    step is to understand **Area Under the Curve (AUC)**. But before delving into
    the specifics, let’s think about what a perfect classifier looks like. In the
    ideal case, we want the model to achieve perfect separation between positive and
    negative observations. In other words, the model assigns low probabilities to
    negative observations and high probabilities to positive observations with no
    overlap. Thus, there will exist some probability cut off, such that all observations
    with predicted probability < cut off are negative, and all observations with probability
    >= cut off are positive. When this happens, True Positive Rate will be 1 and False
    Positive Rate will be 0.So the ideal state to achieve is TPR=1 and FPR=0. ***In
    reality, this does not happen, and a more practical expectation should be to maximize
    TPR and minimize FPR.***
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对ROC曲线有了某种直觉，下一步是理解**曲线下面积（AUC）**。但在深入具体细节之前，让我们思考一下完美分类器是什么样的。在理想情况下，我们希望模型能够完美地区分正例和负例。换句话说，模型对负例分配低概率，对正例分配高概率，没有重叠。因此，将存在某个概率阈值，使得所有预测概率小于该阈值的观测值都是负例，所有概率大于等于该阈值的观测值都是正例。当这种情况发生时，真正例率将是1，假正例率将是0。所以理想状态是TPR=1且FPR=0。***在现实中，这种情况不会发生，更实际的期望是最大化TPR并最小化FPR。***
- en: In general, as TPR increases with lowering probability threshold, the FPR also
    increases *(see chart 1)*. We want TPR to be much higher than FPR. This is characterized
    by the ROC curve that is bent towards the top left side. The following ROC space
    chart shows the perfect classifier with a blue circle (TPR=1 and FPR=0). Models
    that yield the ROC curve closer to the blue circle are better. ***Intuitively,
    it means that the model is able to fairly separate negative and positive observations. ***Among
    the ROC curves in the following chart, light blue is best followed by green and
    orange. The dashed diagonal line represents random guesses (think of a coin flip).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，随着概率阈值的降低，TPR会增加，同时FPR也会增加（参见图表1）。我们希望TPR远高于FPR。这可以通过ROC曲线向左上方弯曲来表示。下面的ROC空间图显示了具有蓝色圆圈的完美分类器（TPR=1且FPR=0）。产生接近蓝色圆圈的ROC曲线的模型更好。***直观上，这意味着模型能够公平地分离负例和正例。***在下面的ROC曲线中，浅蓝色最佳，其次是绿色和橙色。虚线对角线代表随机猜测（想想抛硬币）。
- en: '![](../Images/7cb5b649b1ed912e5aaa163233ba7f19.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7cb5b649b1ed912e5aaa163233ba7f19.png)'
- en: 'Chart 4: ROC Curve Comparison ([source](https://en.wikipedia.org/wiki/Receiver_operating_characteristic)⁵)'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图表4：ROC曲线比较 ([来源](https://en.wikipedia.org/wiki/Receiver_operating_characteristic)⁵)
- en: Now that we understand ROC curves skewed to the top left are better, how do
    we quantify this? Well, mathematically, this can be quantified by calculating
    the Area Under the Curve. ***The Area Under the Curve (AUC) of the ROC curve is
    always between 0 and 1 because our ROC space is bounded between 0 and 1 on both
    axes. ***Among the above ROC curves, the model corresponding to the light blue
    ROC curve is better compared to green and orange as it has higher AUC.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了偏向左上方的ROC曲线更好，那么我们如何量化这一点呢？数学上，这可以通过计算曲线下面积（AUC）来实现。***ROC曲线的曲线下面积（AUC）总是在0到1之间，因为我们的ROC空间在两个轴上都被限制在0到1之间。***在上述ROC曲线中，与浅蓝色ROC曲线对应的模型比绿色和橙色的模型更好，因为它具有更高的AUC。
- en: But how is AUC calculated? Computationally, AUC involves integrating the ROC
    curve. For models generating discrete predictions, AUC can be approximated using
    the [trapezoidal rule](https://en.wikipedia.org/wiki/Trapezoidal_rule)⁶. In its
    simplest form, the trapezoidal rule works by approximating the region under the
    graph as a trapezoid and calculating its area. I’ll probably discuss this in another
    article.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 但AUC是如何计算的？从计算的角度来看，AUC涉及到ROC曲线的积分。对于生成离散预测的模型，可以使用[梯形法则](https://en.wikipedia.org/wiki/Trapezoidal_rule)来近似AUC。在它的最简单形式中，梯形法则通过将图形下的区域近似为梯形并计算其面积来工作。我可能会在另一篇文章中讨论这个问题。
- en: 'This brings us to the last and the most awaited part — how to intuitively make
    sense of AUC? Let’s say you built a first version of a classification model with
    AUC 0.7 and you later fine tune the model. The revised model has an AUC of 0.9\.
    We understand that the model with higher AUC is better. But what does it really
    mean? What does it imply about our improved prediction power? Why does it matter?
    Well, there’s a lot of literature explaining AUC and its interpretation. Some
    of them are too technical, some incomplete, and some are outright wrong! One interpretation
    that made the most sense to me is:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了最后一个也是最令人期待的环节——如何直观地理解AUC？假设你构建了一个分类模型的第一个版本，其AUC为0.7，后来你对模型进行了微调。改进后的模型AUC为0.9。我们理解AUC值更高的模型更好。但它究竟意味着什么？它对我们的预测能力提升有何含义？为什么这很重要？嗯，有很多文献解释AUC及其解释。其中一些过于技术性，一些不完整，还有一些是完全错误的！对我最有意义的解释是：
- en: '**AUC is the probability that a randomly chosen positive instance possesses
    a higher predicted probability than a randomly chosen negative instance.**'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**AUC是指随机选择的一个正例实例具有比随机选择的一个负例实例更高的预测概率的概率。**'
- en: Let’s verify this interpretation. For the simple logistic regression we built,
    we will visualize the predicted probabilities of positive and negative classes
    (i.e. Survived the shipwreck or not).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来验证这个解释。对于我们所构建的简单逻辑回归，我们将可视化正类和负类的预测概率（即是否幸存于海难）。
- en: '![](../Images/e5422327ce05de412a2bbfb27da023a3.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5422327ce05de412a2bbfb27da023a3.png)'
- en: 'Chart 5: Predicted Probabilities of Survived and Not Survived Passengers (image
    by author)'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图表5：幸存和未幸存乘客的预测概率（作者：本人）
- en: We can see the model performs pretty well in assigning a higher probability
    to Survived cases than those that did not. There’s some overlap of probabilities
    in the middle section. The AUC calculated using the `auc score` function in sklearn
    for our model on the test dataset is **0.92** (see chart 2). So based on the above
    interpretation of AUC, if we randomly choose a positive instance and a negative
    instance, the probability that the positive instance will have a higher predicted
    probability than the negative instance should be **~92%**.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到模型在为幸存案例分配比未幸存案例更高的概率方面表现相当好。中间部分有一些概率的重叠。使用sklearn中的`auc score`函数在测试数据集上计算出的我们的模型的AUC是**0.92**（见图表2）。所以根据上述AUC的解释，如果我们随机选择一个正例实例和一个负例实例，正例实例具有比负例实例更高的预测概率的概率应该是**~92%**。
- en: For this purpose, we will create pools of predicted probabilities of positive
    and negative outcomes. Now we randomly select one observation each from both the
    pools and compare their predicted probabilities. We repeat this 100K times. Later
    we calculate % of times the predicted probability of a positive instance was >
    predicted probability of a negative instance. If our interpretation is correct,
    this should be equal to <mdspan datatext="el1744084809114" class="mdspan-comment">AUC</mdspan>.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，我们将创建正类和负类预测概率的池。现在我们从这两个池中随机选择一个观测值，并比较它们的预测概率。我们重复这个过程100K次。然后我们计算正例实例的预测概率大于负例实例预测概率的百分比。如果我们的解释是正确的，这应该等于<mdspan
    datatext="el1744084809114" class="mdspan-comment">AUC</mdspan>。
- en: '![](../Images/1ed77b3a4b07e54bb32a5d9874175ab9.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1ed77b3a4b07e54bb32a5d9874175ab9.png)'
- en: We did indeed get 0.92! Hope this helps.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们确实得到了0.92！希望这有所帮助。
