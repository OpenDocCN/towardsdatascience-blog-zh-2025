- en: Building A Successful Relationship With Stakeholders
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与利益相关者建立成功的关系
- en: 原文：[https://towardsdatascience.com/building-a-successful-relationship-with-stakeholders-2/](https://towardsdatascience.com/building-a-successful-relationship-with-stakeholders-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/building-a-successful-relationship-with-stakeholders-2/](https://towardsdatascience.com/building-a-successful-relationship-with-stakeholders-2/)
- en: <mdspan datatext="el1760465182527" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760465182527" class="mdspan-comment">引言</mdspan>
- en: As a data scientist your job is to leverage data to solve business problems
    and bring value, normally by building models. This typically involves running
    a series of experiments where lots of ideas are iterated through until the best
    solution is selected as part of the business proposal. Evaluating the best model
    is typically done by minimizing or maximising some performance metric, such as
    the mean squared error for regression models or the F1 score for binary classification
    models.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据科学家，你的工作是利用数据来解决业务问题并创造价值，通常是通过构建模型。这通常涉及运行一系列实验，其中许多想法被迭代，直到选择最佳解决方案作为商业提案的一部分。评估最佳模型通常是通过最小化或最大化某些性能指标来完成的，例如回归模型的均方误差或二元分类模型的F1分数。
- en: However, the creation of a model is just one part in the overall process. Surrounding
    your model are two significant questions, namely does your solution answer the
    original problem, and how much benefit does it bring to the business. These questions
    can only be answered by the stakeholders of your project as they set the requirements
    and the success criteria. In an ideal world these would be clearly defined but
    this can often not be the case. It may be that the requirements are quite vague
    in nature and broad, sometimes being as simple as trying to prevent customer churn
    or protecting customers against fraud. In this case it will be up to the data
    scientists and stakeholders to work together to better refine these questions
    and define what success means. To do so they must be on the same page so to speak,
    as a failure to do so can lead to miscommunication and friction that will inevitably
    end up with a project not succeeding.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，创建一个模型只是整体过程中的一个部分。围绕你的模型有两个重要的问题，即你的解决方案是否解决了原始问题，以及它能为业务带来多少利益。这些问题只能由你的项目利益相关者回答，因为他们设定了需求和成功标准。在理想的世界里，这些应该是明确定义的，但这种情况往往并不成立。可能需求在本质上相当模糊和广泛，有时只是简单地尝试防止客户流失或保护客户免受欺诈。在这种情况下，数据科学家和利益相关者将不得不共同努力来更好地细化这些问题，并定义成功意味着什么。为了做到这一点，他们必须达成共识，否则可能会导致沟通不畅和摩擦，这最终会导致项目失败。
- en: Throughout my career I have seen stakeholders and data scientists speak different
    languages to each other, one looking outward to the business and the other facing
    inward to the data. The consequence of this is that good projects fail to hit
    the mark and not gather the enthusiasm they deserve, leading to them not reaching
    deployment. I believe that to succeed as a great data scientist you must be able
    to bridge this gap between the business and the technical. Illustrating your solutions
    impact through business outcomes and showing what can be gained from it is the
    key to getting stakeholder buy in to your solution. In this article I want to
    outline some philosophies that have helped me to improve my communication when
    engaging with the wider business.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的职业生涯中，我看到了利益相关者和数据科学家彼此说着不同的语言，一个面向业务，另一个面向数据。这种后果是，好的项目未能达到预期，未能获得应有的热情，导致它们无法部署。我相信，要成为一名伟大的数据科学家，你必须能够弥合业务和技术之间的差距。通过展示你的解决方案对业务成果的影响以及从中可以获得什么来获得利益相关者的支持是关键。在这篇文章中，我想概述一些帮助我在与更广泛的业务互动时提高沟通能力的理念。
- en: Translating Requirements And Reporting Performance
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 翻译需求并报告性能
- en: The start of a new project is a hectic time with lots of kick-off meetings,
    bringing together of team members and getting access requirements set up just
    to name a few. However, one aspect that you may not have been a part of as a data
    scientist is the one that decided the need for the project in the first place.
    This is done by members like stakeholders and product owners, typically the management
    layer of an organisation. This means that a project’s high level goals are decided
    before a data scientist ever joins.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 新项目的开始是一个繁忙的时期，有很多启动会议，汇集团队成员，以及设置访问要求等等。然而，作为数据科学家，你可能没有参与决定项目最初需求的那一部分。这是由利益相关者、产品所有者等成员完成的，通常是组织的管理层。这意味着在数据科学家加入之前，项目的高层次目标就已经确定。
- en: 'Due to requirements already being decided, there will be a tendency that the
    data scientist may go straight into the experimentation process without giving
    due attention to the goals of the project. They know its overall aim and think
    that is enough for them to progress. However, it is critical that time is taken
    at this point to refine the business question into a set of very clear requirements.
    This ensures that:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 由于需求已经确定，数据科学家可能会直接进入实验过程，而没有充分关注项目的目标。他们知道其总体目标，认为这足以让他们前进。然而，在这个时候花时间将业务问题细化为一组非常明确的需求至关重要。这确保了：
- en: There is no ambiguity between data scientists and the wider business
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据科学家和更广泛的业务之间没有歧义
- en: There is a clear understanding of what is to be solved
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对要解决的问题有清晰的理解
- en: There are clear metrics that define whether the objective has been achieved
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有明确的指标可以定义是否实现了目标
- en: 'As an example, let’s return to the earlier ask of a stakeholder wanting to
    protect customers against fraud. There are many possible avenues such an ask can
    take, and refining this requirement is key in ensuring that your project hits
    the mark. It is therefore critical that meetings are put in place to allow follow
    up questions to be asked. Some examples are:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们回到一个利益相关者想要保护客户免受欺诈的早期请求。这样的请求可能有多种可能的途径，而细化这一需求是确保你的项目达到目标的关键。因此，安排会议以允许提出后续问题至关重要。以下是一些例子：
- en: Do we want to prevent fraud as it is occurring or inform customers if they are
    at risk?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是希望防止欺诈发生，还是通知客户他们处于风险之中？
- en: Do we want a yes / no answer or something more nuanced?
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是希望得到是/否的答案，还是更细致的答案？
- en: Do we want something more autonomous in decision making or something that augments
    current processes?
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是否希望决策更加自主，或者希望增强现有流程？
- en: How often will the solution be executed? It it offline batch or online real
    time?
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决方案将多久执行一次？是离线批量还是在线实时？
- en: Are there any operational constraints we need to be aware of?
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是否需要了解任何运营限制？
- en: So for instance requiring a real time fraud defence solution is very different
    from predicting that a customer may become at risk of fraud in the next 30 days.
    Asking these questions will help steer you towards solutions that you will want
    to investigate further.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，要求实时欺诈防御解决方案与预测客户在接下来的30天内可能面临欺诈风险非常不同。提出这些问题将帮助你找到你想要进一步调查的解决方案。
- en: '![](../Images/c280f434f8d9652e76e216b0eb3d4a45.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c280f434f8d9652e76e216b0eb3d4a45.png)'
- en: Inferencing data is just one step in the chain. Image by author.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 推理数据只是链条中的一步。图由作者提供。
- en: 'The end of project experimentation can be just as hectic as the beginning.
    At this point you need to choose your best solution and present it to the business.
    This is crucial as there is no guarantee that your solution will be accepted and
    will progress onward to become a new product. Putting in any new process such
    as a model into a live state comes with costs that must be weighed against the
    benefit. There are considerations about who is responsible for its deployment
    and monitoring, as well as maintenance if its performance no longer meets requirements.
    You need to consider how often adverse outcomes can occur, their potential severity,
    and any repercussions from them. You may need to consider any additional operational
    impact your new process introduces. Consider a fraud detection platform, you need
    to think about:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 项目实验的结束可能和开始一样忙碌。在这个时候，你需要选择你的最佳方案，并向业务部门展示。这是至关重要的，因为不能保证你的方案会被接受，并继续向前发展，最终成为新产品。将任何新的流程，如模型，投入实际状态都会带来成本，这些成本必须与收益相权衡。需要考虑谁负责其部署和监控，以及如果其性能不再满足要求时的维护。你需要考虑负面结果可能发生的频率，它们的潜在严重性，以及由此产生的任何后果。你可能需要考虑你的新流程引入的任何额外的运营影响。考虑一个欺诈检测平台，你需要思考：
- en: How often will your detector miss fraudulent transactions?
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的检测器会错过多少欺诈交易？
- en: How often will your detector wrongly classify genuine transactions as fraud
    and impact the customer?
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的检测器会错误地将真实交易分类为欺诈，并影响客户的情况会有多频繁？
- en: What is the total volume of transactions that will be flagged as fraud and is
    there operational capacity to investigate all these events?
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将被标记为欺诈的交易总量是多少，并且是否有足够的运营能力调查所有这些事件？
- en: 'To overcome any apprehensions or misgivings you need to be able to sell your
    solution, just building it is not enough. When showcasing your solution you should:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了克服任何疑虑或误解，你需要能够推销你的解决方案，仅仅构建它是不够的。在展示你的解决方案时，你应该：
- en: Start With A Problem, Not A Technology
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从问题开始，而不是从技术开始
- en: It is tempting to focus on the technical acumen of your solution, such as the
    model used or the data processing pipeline. This is where you have the spent the
    past months of your life, and you want to show that you have worked very hard
    to solve this problem. Therefore when you present to stakeholders you will be
    tempted to talk about things like how you used one hot encoding, performed mean
    imputation and used the Optuna library for hyperparameter tuning a LightGBM model.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于你解决方案的技术专长，比如使用的模型或数据处理流程，是很诱人的。这就是你过去几个月的生活所在，你想要展示你已经非常努力地解决了这个问题。因此，当你向利益相关者展示时，你可能会倾向于谈论如何使用独热编码，执行均值插补，并使用Optuna库对LightGBM模型进行超参数调整。
- en: 'The problem with this is that the stakeholders priority is not how the model
    works, but what it can do. They care about how the business question is being
    answered and what benefit can be derived. In this case we need to reframe how
    we present our results to be business oriented and focus on what our solution
    solved rather than how it is solved. We should therefore say less sentences like:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题的症结在于，利益相关者的优先级不是模型如何工作，而是它能做什么。他们关心的是业务问题是如何被回答的，以及可以从中获得什么好处。在这种情况下，我们需要重新思考我们如何呈现我们的结果，使其面向业务，并关注我们的解决方案解决了什么问题，而不是它是如何解决的。因此，我们应该少说一些像以下这样的句子：
- en: We developed a LightGBM binary classification for fraud detection
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们开发了一个用于欺诈检测的LightGBM二分类模型
- en: And more sentences like
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 以及更多类似的情况
- en: Our proposed solution improves the ability of our current systems to detect
    fraud
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们提出的解决方案提高了我们当前系统检测欺诈的能力
- en: Business vs Model Performance
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 业务与模型性能
- en: Related to the above point, it is all too common to focus on reporting the model
    performance. Metrics such as F1, AUC etc. give an objective way to decide what
    is the best model and you want to pass that information on to the stakeholders.
    To a data scientist it is clear what the difference between a recall of 0.8 and
    0.9 means.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 关于上述观点，过于关注报告模型性能是很常见的。像F1、AUC等指标提供了一个客观的方式来决定哪个模型最好，并且你希望将这些信息传达给利益相关者。对于数据科学家来说，0.8的召回率和0.9的召回率之间的差异是显而易见的。
- en: 'However to a stakeholder, the model performance doesn’t tell them what value
    the solution brings to the business. They need to know the impact that it will
    have on current processes and procedures. Data scientists should therefore frame
    the performance of the model in terms of business level KPI’s. A good idea is
    to always consider:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于利益相关者来说，模型的表现并不能告诉他们解决方案能为业务带来什么价值。他们需要知道它将对当前流程和程序产生什么影响。因此，数据科学家应该用业务层面的关键绩效指标来阐述模型的表现。一个好的想法是始终考虑：
- en: Does it generate money, save money or save time? If so, how much?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 它能赚钱、省钱还是节省时间？如果是的话，能节省多少？
- en: 'Clearly quantifying what you solutions brings will help to drive engagement
    and greatly increase the chance of it being adopted. We should therefore says
    less of:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 明确量化你的解决方案带来的好处将有助于推动参与度，并极大地增加其被采用的机会。因此，我们应该少说：
- en: Our LightGBM model achieved a recall of 0.9
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们的LightGBM模型实现了0.9的召回率
- en: 'and more of:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 以及更多：
- en: Our solution can detect £10m worth of fraud annually
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们的解决方案每年可以检测到价值1000万英镑的欺诈行为
- en: Never Neglect Explainability
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 永远不要忽视可解释性
- en: Being able to understand and justify why your solution made its decisions is
    key in building trust with stakeholders. If you are implementing a solution around
    accepting mortgage applications for example, being able to justify why applications
    are declined is vital if customers challenge this decision. It also ensures the
    model has not picked up any biases or prejudices that could put you at risk of
    legal or regulatory issues.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 能够理解和证明你的解决方案为何做出这些决策，这对于与利益相关者建立信任至关重要。例如，如果你正在实施一个围绕接受抵押贷款申请的解决方案，那么在客户质疑这一决策时，能够证明为什么申请被拒绝是至关重要的。这也确保了模型没有吸收任何可能导致法律或监管问题的偏见或偏见。
- en: 'Explainability can also provide sense checks or even challenge preconceived
    notions about what information is useful. All of this means that embedding explainability
    throughout the process can give assurances to stakeholders that care and consideration
    has been taken. Key points to adhere to are:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 可解释性还可以提供感觉检查或甚至挑战关于哪些信息有用的先入之见。所有这些都意味着在整个过程中嵌入可解释性可以给关心和考虑过问题的利益相关者提供保证。需要遵守的关键点是：
- en: Be able to say which features the model relies on
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够说出模型依赖哪些特征
- en: Be able to explain a decision in terms of its features
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够用其特征来解释一个决策
- en: This means either sticking to a model that has good explainability (regression,
    decision trees etc) or rely on 3^(rd) party explainability libraries (SHAP, LIME,
    etc).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着要么坚持使用具有良好可解释性的模型（回归、决策树等），要么依赖第三方可解释性库（SHAP、LIME等）。
- en: '![](../Images/0e9f70aa72c803001904e6c7b58cd686.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0e9f70aa72c803001904e6c7b58cd686.png)'
- en: Knowing why is key. Image by author.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 知道为什么是关键。图片由作者提供。
- en: Presenting Results to Maximize Engagement
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 以最大化参与度的方式展示结果
- en: After experimentation has finished and you have chosen your solution, the next
    step is to share your results with stakeholders for them to give the go-ahead.
    This is normally done in the form of a presentation deck, where you will need
    to motivate the problem and show why your solution is the right choice. This is
    a critical point where you must be able to communicate clearly with your stakeholders.
    I have seen good proposals fall flat due to presentations that either did not
    engage the audience or even worse put them off. Designing an engaging presentation
    is a mixture of art and skill, and is something that you need to actively work
    on.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 实验结束后，你已经选择了你的解决方案，下一步就是与利益相关者分享你的结果，以便他们批准。这通常以演示文稿的形式进行，你需要阐述问题并展示为什么你的解决方案是正确的选择。这是一个关键点，你必须能够与你的利益相关者进行清晰沟通。我见过一些好的提案因为演示文稿未能吸引观众甚至更糟糕的是让他们感到厌烦而失败。设计一个引人入胜的演示文稿是艺术和技能的结合，这是你需要积极工作的。
- en: 'Some general tips that should serve as guidelines are:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 一些应该作为指导原则的一般性建议是：
- en: Know Your Audience And Objective
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 了解你的受众和目标
- en: 'When first starting to write a presentation you need to ask yourself:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始撰写演示文稿时，你需要问自己：
- en: What am I trying to sell and who am I selling it to?
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我在尝试销售什么，我要把它卖给谁？
- en: While having a presentation just to capture your work has merit, if you are
    trying to secure buy in for your project then you should be laser focussed on
    the point you are trying to convey. Trying to cover too much within a single presentation
    will lead to confusion and may lead to your overall message being diluted. You
    should ask yourself “what is the one thing I want my audience to know about” and
    then structure your presentation around that.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然仅仅为了展示你的工作而有一个演示有其价值，但如果你试图为你的项目争取支持，那么你应该专注于你试图传达的观点。试图在单个演示中涵盖太多内容会导致混乱，并可能导致你的整体信息被稀释。你应该问自己“我想让我的观众了解哪一件事”然后围绕这一点来构建你的演示
- en: Knowing the technical and project knowledge level of your audience can impact
    how you decide to convey your message. If your stakeholder is more intimately
    familiar with the subject matter then there is background knowledge that can be
    assumed. But if they are not, then you will need to really think on what can and
    can’t be assumed to ensure everyone involved can follow your message. If your
    stakeholder has a more technical skillset then there is some scope to give a bit
    more details on the methods you have used but I would keep this to a minimum.
    As previously discussed we want to emphasise the business benefit of a project.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 了解你观众的技伎和项目知识水平会影响你决定如何传达你的信息。如果你的利益相关者对主题非常熟悉，那么可以假设有背景知识。但如果不熟悉，那么你需要真正思考什么可以假设，什么不可以假设，以确保所有相关人员都能理解你的信息。如果你的利益相关者拥有更技术性的技能集，那么在方法上可以提供更多细节，但我建议尽量保持简洁。如前所述，我们想要强调项目的商业效益。
- en: '![](../Images/6a72ebdd382033ac588c0a38ee9a2822.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6a72ebdd382033ac588c0a38ee9a2822.png)'
- en: Think about what your audience needs to know. Image by author.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑你的观众需要了解什么。图片由作者提供。
- en: Style Matters
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 风格很重要
- en: 'Being able to follow a presentation relies a lot on things. Your audience has
    to both listen to you and look at what is on the screen at the same time, so the
    styling of your presentation will have a huge impact on their ability to do so.
    When designing a presentation these tips have helped me to maximise its impact:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 能够跟随一个演示依赖于很多因素。你的观众必须同时听你说话并查看屏幕上的内容，因此你的演示风格将对他们的这种能力产生巨大影响。在设计演示时，以下这些技巧帮助我最大化其影响力：
- en: 'Use a theme: Either provided by your business or from a stock website, having
    a pre-set colour scheme, font sizing’s etc make a big difference'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用主题：无论是来自你的公司还是来自股票网站，拥有预设的色彩方案、字体大小等都会产生很大影响
- en: 'Use partitions to draw the eye: Encasing important points in coloured boxes
    help to guide the audience through your slide'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用分区来引导视线：将重要点放在彩色框中可以帮助引导观众通过你的幻灯片
- en: 'Don’t go overboard on text and visuals: Don’t write paragraphs the audience
    can’t read and keep visuals such as graphs big and simplified'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要在文本和视觉上过度：不要写观众无法阅读的段落，并保持图表等视觉元素大而简洁
- en: '![](../Images/ec3c58cbf23c17d7fe97f91dd6c54a91.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ec3c58cbf23c17d7fe97f91dd6c54a91.png)'
- en: Information overload can put off and confuse your audience. Image by author.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 信息过载可能会让听众感到厌烦和困惑。图片由作者提供。
- en: All Killer No Filler
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 全是杀手，没有填充物
- en: 'Your time is limited when engaging with stakeholders. You need to make an impact
    and hold their attention while you sell them on your solution. You therefore need
    to find a balance between background, theory, solution and impact. So you need
    to make sure that each slide brings something useful to the table. Some ways of
    doing this are:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 与利益相关者互动时，你的时间有限。你需要产生影响并吸引他们的注意力，同时向他们推销你的解决方案。因此，你需要找到背景、理论、解决方案和影响之间的平衡。所以你需要确保每一张幻灯片都能提供有用的信息。一些实现方式包括：
- en: 'Start with the results: This isn’t a mystery novel leading up to a big reveal,
    put your best foot forward and say exactly what you are selling'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从结果开始：这不是一个神秘小说，最终会有一个重大揭露，要展示你的最佳状态，明确说出你正在销售的内容
- en: 'Use headings to make an impact: Heading are a summary of what the slide contains
    and should give the most important information'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用标题来产生影响力：标题是幻灯片内容的总结，应该提供最重要的信息
- en: 'Lead by example: If you are trying to explain how things work, use data to
    make your point. Don’t live in the abstract'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以身作则：如果你试图解释事物是如何工作的，使用数据来支持你的观点。不要停留在抽象层面
- en: '![](../Images/9937b23fecf392e29ab1884dd8ab10a7.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9937b23fecf392e29ab1884dd8ab10a7.png)'
- en: Time is limited so make the most of it. Information is on a need to know basis.
    Image by author.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 时间有限，所以要充分利用。信息是基于需要知道的。图片由作者提供。
- en: Conclusion
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article I have discussed the importance of engaging with stakeholders
    to help showcase the value of proposed data science solutions. Refining requirements
    and being business impact driven in your work can ensure that your results are
    easily interpretable and can be acted upon. All of this is embodied in creating
    an engaging and knowledgeable presentation deck as a means of showing stakeholders
    you can translate requirements into actionable outcomes.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我讨论了与利益相关者互动的重要性，以帮助展示所提出的数据科学解决方案的价值。在您的工作中细化需求并以业务影响为导向可以确保您的结果易于解释并可采取行动。所有这些都体现在创建一个引人入胜且知识丰富的演示文稿中，作为一种向利益相关者展示您可以将需求转化为可执行成果的手段。
