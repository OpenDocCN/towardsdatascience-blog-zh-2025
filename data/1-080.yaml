- en: Why LLMs Aren’t a One-Size-Fits-All Solution for Enterprises
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么大型语言模型不是企业的一站式解决方案
- en: 原文：[https://towardsdatascience.com/why-llms-arent-a-one-size-fits-all-solution-for-enterprises/](https://towardsdatascience.com/why-llms-arent-a-one-size-fits-all-solution-for-enterprises/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-llms-arent-a-one-size-fits-all-solution-for-enterprises/](https://towardsdatascience.com/why-llms-arent-a-one-size-fits-all-solution-for-enterprises/)
- en: <mdspan datatext="el1763427290024" class="mdspan-comment">Executives everywhere</mdspan>
    are racing to use LLMs, but often for tasks they aren’t well-suited to. In fact,
    according to recent research by MIT, [95% of GenAI pilots fail](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf)
    — they’re getting zero return.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763427290024" class="mdspan-comment">世界各地的管理者</mdspan>都在竞相使用大型语言模型，但往往用于不适合的任务。实际上，根据麻省理工学院最近的研究，[95%的通用人工智能试点项目失败](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf)——他们没有获得任何回报。
- en: An area that has been overlooked in the GenAI storm is that of structured data,
    not only from an adoption standpoint, but also from a technological front. In
    reality, there is a goldmine of potential value that can be extracted from structured
    data, particularly in the form of predictions.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在通用人工智能的风暴中被忽视的一个领域是结构化数据，这不仅从采用的角度来看，也从技术的角度来看。实际上，从结构化数据中可以挖掘出大量的潜在价值，尤其是以预测的形式。
- en: In this piece, I will go over what LLMs can and can’t do, what value you can
    get from AI running over your structured data, specifically for predictive modeling,
    and industry approaches used today — including one that I developed with my team.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将探讨大型语言模型能做什么和不能做什么，从运行在您的结构化数据上的AI中您可以获得什么价值，特别是针对预测建模，以及今天使用的行业方法——包括我和我的团队开发的一个方法。
- en: Why LLMs aren’t optimized for business data and workflows
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么大型语言模型没有针对业务数据和流程进行优化
- en: While large language models have completely transformed text and communication,
    they fall short in making predictions from the structured, relational data that
    moves the needle, driving real business outcomes — customer lifecycle management,
    sales optimization, ads and marketing, recommendations, fraud detection, and supply
    chain optimization.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大型语言模型已经彻底改变了文本和通信，但在从推动实际业务成果的、结构化的、关系型数据中进行预测方面，它们却显得力不从心——这些成果包括客户生命周期管理、销售优化、广告和营销、推荐、欺诈检测和供应链优化。
- en: Business data, the data enterprises are grounded in, is inherently structured.
    It often resides in tables, databases, and workflows, where meaning is derived
    from relationships across entities such as customers, transactions, and supply
    chains. In other words, this is all relational data.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 企业数据，企业所依赖的数据，本质上是结构化的。它通常驻留在表格、数据库和工作流程中，其中意义来自于实体之间的关系，如客户、交易和供应链。换句话说，这些都是关系型数据。
- en: LLMs took the world by storm and played a key role in advancing AI. That said,
    they were designed to work with unstructured data and aren’t naturally suited
    to reason over rows, columns, or joins. As a result, they struggle to capture
    the depth and complexity within relational data. Another challenge is that relational
    data changes in real time, while LLMs are typically trained on static snapshots
    of text. They also treat numbers and quantities as tokens in a sequence, rather
    than “understanding” them mathematically. In practice, this means an LLM is optimized
    to predict the next most likely token, which it does incredibly well, but not
    to verify whether a calculation is correct. So, whether the model outputs 3 or
    200 when the true answer is 2, the penalty the model receives is the same.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型席卷全球，并在推进人工智能方面发挥了关键作用。然而，它们被设计用来处理非结构化数据，并不自然地适合对行、列或连接进行推理。因此，它们难以捕捉关系型数据中的深度和复杂性。另一个挑战是，关系型数据是实时变化的，而大型语言模型通常是在静态的文本快照上进行训练的。它们还将数字和数量视为序列中的标记，而不是“理解”它们数学上的含义。在实践中，这意味着大型语言模型优化于预测下一个最可能的标记，它在这方面做得非常好，但并不用于验证计算是否正确。因此，无论模型输出的是3还是200，当正确答案是2时，模型所受到的惩罚是相同的。
- en: LLMs are capable of multi-step reasoning through chain-of-thought-based inferencing,
    but they can face reliability challenges in certain cases. Because they can hallucinate,
    and do so confidently, might I add, even a small probability of error in a multi-step
    workflow can compound across steps. This lowers the overall likelihood of a correct
    outcome, and in business processes such as approving a loan or predicting supply
    shortages, just one small mistake can be catastrophic.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）能够通过基于思维链的推理进行多步推理，但它们在某些情况下可能会面临可靠性挑战。因为它们可能会产生幻觉，而且自信地产生幻觉，我必须补充一点，即使在多步工作流程中存在很小的错误概率，也可能在步骤之间累积。这降低了正确结果的整体可能性，在诸如批准贷款或预测供应短缺等商业流程中，仅仅一个小错误就可能是灾难性的。
- en: Because of all this, enterprises today rely on traditional machine learning
    pipelines that take months to build and maintain, limiting the measurable impact
    of AI on revenue. When you want to apply AI to this kind of tabular data, you
    are essentially teleported back thirty years and need humans to painstakingly
    engineer features and build bespoke models from scratch. For each single task
    separately! This approach is slow, expensive, does not scale, and maintaining
    such models is a nightmare.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由于所有这些原因，今天的企业依赖于传统的机器学习管道，这些管道需要数月时间来构建和维护，从而限制了人工智能对收入的可衡量影响。当你想要将人工智能应用于这种表格数据时，你实际上被传送回三十年前，需要人类辛苦地构建特征并从头开始构建定制模型。对于每个单独的任务！这种方法很慢，成本高昂，无法扩展，维护此类模型是一场噩梦。
- en: How we built our Relational Foundation Model
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们是如何构建我们的关系型基础模型的
- en: My career has revolved around AI and machine learning over graph-structured
    data. Early on, I recognized that data points don’t exist in isolation. Rather,
    they are part of a graph connected to other pieces of knowledge. I applied this
    view to my work on online social networks and information virality, working with
    data from Facebook, Twitter, LinkedIn, Reddit, and others.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我的职业生涯围绕着图结构数据的AI和机器学习。一开始，我就认识到数据点并不是孤立存在的。相反，它们是连接到其他知识点的图的一部分。我将这种观点应用于我的在线社交网络和信息病毒性工作，使用来自Facebook、Twitter、LinkedIn、Reddit和其他来源的数据。
- en: This insight led me to help pioneer Graph Neural Networks at Stanford, a framework
    that enables machines to learn from the relationships between entities rather
    than just the entities themselves. I applied this while serving as Chief Scientist
    at Pinterest, where an algorithm known as [PinSage](https://arxiv.org/abs/1806.01973)
    transformed how users experience Pinterest. That work later evolved into Graph
    Transformers, which bring Transformer architecture capabilities to graph-structured
    data. This allows models to capture both local connections and long-range dependencies
    within complex networks.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这个洞察力使我帮助在斯坦福大学开创了图神经网络，这是一个框架，它使机器能够从实体之间的关系而不是实体本身学习。我在担任Pinterest首席科学家期间应用了这一点，一个名为[PinSage](https://arxiv.org/abs/1806.01973)的算法改变了用户在Pinterest上的体验。这项工作后来演变为图变换器，它将变换器架构的能力带到了图结构数据。这使得模型能够捕捉复杂网络中的局部连接和长距离依赖。
- en: As my research advanced, I saw computer vision transformed by convolutional
    networks and language reshaped by LLMs. But, I realized the predictions businesses
    depend on from structured relational data were still waiting for their breakthrough,
    limited by machine learning techniques that hadn’t changed in over twenty years!
    Decades!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我的研究深入，我看到计算机视觉被卷积网络所改变，语言被LLMs所重塑。但是，我意识到企业依赖的结构化关系数据的预测仍然等待着它们的突破，受到二十多年来没有改变的机器学习技术的限制！几十年！
- en: The culmination of this research and foresight led my team and me to create
    the first Relational Foundation Model (RFM) for business data. Its purpose is
    to enable machines to reason directly over structured data, to understand how
    entities, such as customers, transactions, and products, connect. By knowing the
    relationships between these entities, we then enable users to make accurate predictions
    from those specific relationships and patterns.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究和远见卓识的结晶使我团队和我创造了第一个针对商业数据的关系型基础模型（RFM）。其目的是使机器能够直接对结构化数据进行推理，理解实体，如客户、交易和产品，是如何连接的。通过了解这些实体之间的关系，我们然后使用户能够从那些特定的关系和模式中做出准确的预测。
- en: '![Key capabilities of Relational Foundation Models. Image by author ](../Images/22b7dab37f22822cb62a0713637bca80.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![关系型基础模型的关键能力。图片由作者提供](../Images/22b7dab37f22822cb62a0713637bca80.png)'
- en: Key capabilities of Relational Foundation Models. Image by author
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 关系型基础模型的关键能力。图片由作者提供
- en: Unlike LLMs, RFMs have been designed for structured relational data. RFMs are
    pretrained on a number of (synthetic) datasets as well as on a number of tasks
    over structured business data. Like LLMs, RFMs can be simply prompted to produce
    instant responses to a wide variety of predictive tasks over a given database,
    all without task-specific or database-specific training.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 与 LLMs 不同，RFMs（关系基础模型）是为结构化关系数据设计的。RFMs 在多个（合成）数据集以及多个结构化业务数据任务上进行预训练。像 LLMs
    一样，RFMs 可以简单地提示以对给定数据库中的各种预测任务产生即时响应，所有这些都不需要特定于任务或数据库的训练。
- en: 'We wanted a system that could learn directly from how real databases are structured,
    and without all the usual manual setup. To make that possible, we treated each
    database like a graph: tables became node types, rows turned into nodes, and foreign
    keys linked everything together. This way, the model could actually “see” how
    things like customers, transactions, and products connect and change over time.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望有一个能够直接从真实数据库的结构中学习的系统，而不需要所有通常的手动设置。为了实现这一点，我们将每个数据库视为一个图：表变成了节点类型，行变成了节点，外键将所有内容连接在一起。这样，模型实际上可以“看到”客户、交易和产品如何连接和随时间变化。
- en: At the heart of it, the model combines a column encoder with a relational graph
    transformer. Every cell in a table is turned into a small numerical embedding
    based on what kind of data it holds, whether it’s a number, category, or a timestamp.
    The Transformer then looks across the graph to pull context from related tables,
    which helps the model adapt to new database schemas and data types.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，该模型结合了一个列编码器和一个关系图转换器。表格中的每个单元格都根据其包含的数据类型（无论是数字、类别还是时间戳）转换为一个小型的数值嵌入。然后，转换器在图中查看，从相关的表中提取上下文，这有助于模型适应新的数据库模式和数据类型。
- en: For users to input which predictions they’d like to make, we built a simple
    interface called Predictive Query Language (PQL). It lets users describe what
    they want to predict, and the model takes care of the rest. The model pulls the
    right data, learns from past examples, and reasons through an answer. Because
    it uses in-context learning, it doesn’t have to be retrained for every task, either!
    We do have an option for fine-tuning, but this is for very specialized tasks.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让用户输入他们想要做出的预测，我们构建了一个简单的界面，称为预测查询语言（PQL）。它允许用户描述他们想要预测的内容，而模型则负责其余部分。模型提取正确的数据，从过去的例子中学习，并通过推理得出答案。因为它使用上下文学习，所以也不需要为每个任务重新训练！我们确实有一个微调的选项，但这仅适用于非常专业的任务。
- en: '![Overview of architecture. Image by author'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '![架构概述。图片由作者提供'
- en: '](../Images/787fb2d5c8b01b64a98c19f93301c20b.png)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/787fb2d5c8b01b64a98c19f93301c20b.png)'
- en: Overview of architecture. Image by author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 架构概述。图片由作者提供
- en: 'But this is just one approach. Across the industry, several other strategies
    are being explored:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 但这只是一个方法。在整个行业中，还在探索几种其他策略：
- en: Industry approaches
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行业方法
- en: 1\. Internal foundation models
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 内部基础模型
- en: 'Companies like [Netflix](https://netflixtechblog.com/foundation-model-for-personalized-recommendation-1a0bd8e02d39)
    are building their own large-scale foundation models for recommendations. As described
    in their blog, the goal is to move away from dozens of specialized models toward
    a single centralized model that learns member preferences across the platform.
    Analogy to LLMs is clear: like a sentence is represented as a sequence of words,
    a user is represented as a sequence of movies the user interacted with. This allows
    innovations to support long-term personalization by processing massive interaction
    histories.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '[Netflix](https://netflixtechblog.com/foundation-model-for-personalized-recommendation-1a0bd8e02d39)
    等公司正在构建他们自己的大规模基础模型以用于推荐。正如他们在博客中描述的，目标是摆脱数十个专用模型，转向一个单一的集中式模型，该模型可以在整个平台上学习会员的偏好。与大型语言模型（LLMs）的类比是明显的：就像一个句子被表示为一系列单词的序列一样，一个用户被表示为用户与之互动的一系列电影。这允许通过处理大量的交互历史来支持长期个性化创新。'
- en: The benefits of owning such a model include control, differentiation, and the
    ability to tailor architectures to domain-specific needs (e.g., sparse attention
    for latency, metadata-driven embeddings for cold start). On the flip side, these
    models are extremely costly to train and maintain, requiring vast amounts of data,
    compute, and engineering resources. Furthermore, they are trained on a single
    dataset (e.g., Netflix user behavior) for a single task (e.g., recommendations).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有此类模型的好处包括控制、差异化以及根据特定领域需求定制架构的能力（例如，为了降低延迟使用稀疏注意力，为了冷启动使用元数据驱动的嵌入）。然而，这些模型的训练和维护成本极高，需要大量的数据、计算和工程资源。此外，它们是在单个数据集（例如，Netflix用户行为）上针对单个任务（例如，推荐）进行训练的。
- en: 2\. Automating model development with AutoML or Data Science agents
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 使用AutoML或数据科学代理自动化模型开发
- en: 'Platforms like DataRobot and SageMaker Autopilot have pushed forward the idea
    of automating parts of the machine learning pipeline. They help teams move faster
    by handling pieces like feature engineering, model selection, and training. This
    makes it easier to experiment, reduce repetitive work, and expand access to machine
    learning beyond just highly specialized teams. In a similar vein, Data Scientist
    agents are emerging, where the idea is that the Data Scientist agent will perform
    all the classical steps and iterate over them: data cleaning, feature engineering,
    model building, model evaluation, and finally model development. While a true
    innovative feat, the jury is still out on whether this approach will be effective
    in the long term.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 平台如DataRobot和SageMaker Autopilot推动了机器学习管道部分自动化的想法。它们通过处理特征工程、模型选择和训练等部分，帮助团队加快速度。这使得实验更容易进行，减少重复性工作，并使机器学习能够超越仅限于高度专业化的团队。在类似的方向上，数据科学家代理正在出现，其理念是数据科学家代理将执行所有经典步骤并迭代它们：数据清洗、特征工程、模型构建、模型评估，最后是模型开发。虽然这是一个真正的创新壮举，但关于这种方法在长期内是否有效，人们仍然意见不一。
- en: 3\. Using graph databases for connected data
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 使用图数据库处理关联数据
- en: Companies like Neo4j and TigerGraph have advanced the use of graph databases
    to better capture how data points are connected. This has been especially impactful
    in areas like fraud detection, cybersecurity, and supply chain management, places
    where the relationships between entities often matter more than the entities themselves.
    By modeling data as networks rather than isolated rows in a table, graph systems
    have opened up new ways of reasoning about complex, real-world problems.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: Neo4j和TigerGraph等公司推动了图数据库的使用，以更好地捕捉数据点之间的连接。这在欺诈检测、网络安全和供应链管理等领域产生了特别显著的影响，在这些领域，实体之间的关系往往比实体本身更重要。通过将数据建模为网络而不是表格中的孤立行，图系统为解决复杂、现实世界问题开辟了新的推理方式。
- en: Lessons learned
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 得到的教训
- en: 'When we set out to build our technology, our goal was simple: develop neural
    network architectures that could learn directly from raw data. This approach mirrors
    the current AI (literal) revolution, which is fueled by neural networks that learn
    directly from pixels in an image or words in a document.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们着手构建我们的技术时，我们的目标很简单：开发能够直接从原始数据学习的神经网络架构。这种方法与当前由直接从图像中的像素或文档中的单词学习的神经网络推动的AI（字面）革命相呼应。
- en: Practically speaking, our vision for the product also entailed a person simply
    connecting to the data and making a prediction. That led us to the ambitious target
    of creating a pretrained foundation model designed for business data from the
    ground up (as explained above), removing the need to manually create features,
    training datasets, and custom task-specific models. An ambitious task indeed.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我们对产品的愿景还包括一个人简单地连接到数据并做出预测。这导致我们设定了一个雄心勃勃的目标，即从头开始创建一个为商业数据设计的预训练基础模型（如上所述），从而消除了手动创建特征、训练数据集和定制特定任务模型的必要性。这确实是一项雄心勃勃的任务。
- en: When building our Relational Foundation Model, we developed new transformer
    architectures that attend over a set of interconnected tables, a database schema.
    This required extending the classical LLM attention mechanism, which attends over
    a linear sequence of tokens, to an attention mechanism that attends over a graph
    of data. Critically, the attention mechanism had to generalize across different
    database structures as well as across different types of tables, wide or narrow,
    with varied column types and meanings.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建我们的关系型基础模型时，我们开发了新的Transformer架构，这些架构关注于一系列相互连接的表格，即数据库模式。这需要扩展经典的LLM注意力机制，该机制关注于线性序列的标记，到一个关注于数据图的注意力机制。关键的是，注意力机制必须能够泛化到不同的数据库结构以及不同类型的表格，无论是宽表还是窄表，具有不同的列类型和含义。
- en: Another challenge was inventing a new training scheme, because predicting the
    next token is not the right objective. Instead, we generated many synthetic databases
    and predictive tasks mimicking challenges like fraud detection, time series forecasting,
    supply chain optimization, risk profiling, credit scoring, personalized recommendations,
    customer churn prediction, and sales lead scoring.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个挑战是发明一种新的训练方案，因为预测下一个标记不是正确的目标。相反，我们生成了许多模拟数据库和预测任务，模仿了诸如欺诈检测、时间序列预测、供应链优化、风险评估、信用评分、个性化推荐、客户流失预测和销售线索评分等挑战。
- en: In the end, this resulted in a pretrained Relational Foundation Model that can
    be prompted to solve business tasks, whether it is financial versus insurance
    fraud or medical versus credit risk scoring.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，这导致了一个预训练的关系型基础模型，可以提示解决业务任务，无论是金融欺诈与保险欺诈，还是医疗与信用风险评估。
- en: Conclusion
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Machine learning is here to stay, and as the field evolves, it’s our responsibility
    as data scientists to spark more thoughtful and candid discourse about the true
    capabilities of our technology — what it’s good at, and where it falls short.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习将长期存在，随着该领域的发展，作为数据科学家，我们有责任激发更多深思熟虑和坦率的讨论，关于我们技术的真正能力——它擅长什么，以及它的不足之处。
- en: We all know how transformative LLMs were, and continue to be, but too often,
    they are implemented hastily before considering internal goals or needs. As technologists,
    we should encourage executives to take a closer look at their proprietary data,
    which anchors their company’s uniqueness, and take the time to thoughtfully identify
    which technologies will best capitalize on that data to advance their business
    objectives.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都知道LLM是多么具有变革性，并且继续如此，但往往在考虑内部目标或需求之前，它们被仓促实施。作为技术人员，我们应该鼓励高管们更仔细地审视他们专有的数据，这些数据是他们公司独特性的基石，并花时间深思熟虑地确定哪些技术将最好地利用这些数据来推进他们的商业目标。
- en: In this piece, we went over LLM capabilities, the value that lies within the
    (often) overlooked side of structured data, and industry solutions for applying
    AI over structured data — including my own solution and the lessons learned from
    building that.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了LLM的能力，以及（通常）被忽视的结构化数据中的价值，以及应用AI于结构化数据的行业解决方案——包括我自己的解决方案和从构建过程中学到的经验。
- en: Thank you for reading.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
