  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索代理协议的新世界
- en: 原文：[https://towardsdatascience.com/explore-the-new-world-of-agent-protocols/](https://towardsdatascience.com/explore-the-new-world-of-agent-protocols/)
  id: totrans-1
  prefs:
  - PREF_BQ
