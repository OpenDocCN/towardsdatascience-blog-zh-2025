  zh: 原文：[https://towardsdatascience.com/explore-the-new-world-of-agent-protocols/](https://towardsdatascience.com/explore-the-new-world-of-agent-protocols/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 千万不要错过我们每周的精选通讯《变量》，它包含编辑精选、深度分析、社区新闻等内容。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Have you been hearing a lot of buzz around [Anthropic’s MCP](https://towardsdatascience.com/tag/mcp/) and
    other agent-focused protocols, but weren’t sure what they were — and whether they
    might be relevant for your projects?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 您是否经常听到关于[Anthropic的MCP](https://towardsdatascience.com/tag/mcp/)和其他以代理为中心的协议的讨论，但不确定它们是什么——以及它们是否可能对您的项目相关？
- en: 'You’re in the right place: in this week’s Variable, we present three accessible
    articles that will help you gain a deeper, hands-on understanding of this emerging
    cluster of tools.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在就在正确的位置：在本周的《变量》中，我们为您呈现了三篇易于理解的文章，帮助您更深入、更实际地了解这一新兴工具集群。
- en: 'Before we jump right in, a quick update for all our contributors: we’re thrilled
    to share that with [our just-announced Stripe integration](https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/),
    payouts from the Author Payment Program are going to be a *lot* more streamlined
    going forward.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨之前，我们向所有贡献者快速更新一下：我们非常高兴地分享，随着我们刚刚宣布的Stripe集成[https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/](https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/)，作者支付计划的支付将变得更加**流畅**。
- en: How I Finally Understood MCP — and Got It Working in Real Life
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何最终理解MCP并在现实生活中实现它
- en: For anyone taking their first steps with the model context protocol, Hailey
    Quach’s beginner-friendly guide is the perfect place to start. It covers all the
    basic concepts you need to know before zooming in on what you can actually accomplish
    with this versatile open standard for agent-centric workflows.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对于刚开始使用模型上下文协议的人来说，Hailey Quach的入门友好指南是完美的起点。它涵盖了您在深入了解这个适用于以代理为中心的工作流程的多功能开放标准之前需要了解的所有基本概念。
- en: '[How I Finally Understood MCP — and Got It Working in Real Life](https://towardsdatascience.com/how-i-finally-understood-mcp-and-got-it-working-irl-2/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何最终理解MCP并在现实生活中实现它](https://towardsdatascience.com/how-i-finally-understood-mcp-and-got-it-working-irl-2/)'
- en: How Not to Write an MCP Server
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何不编写MCP服务器
- en: Looking for helpful pointers? [Roni Dover](https://towardsdatascience.com/author/roni-dover/) shares
    several, based on the challenges he faced in his first MCP project.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 想要一些有用的提示吗？[Roni Dover](https://towardsdatascience.com/author/roni-dover/)根据他在第一个MCP项目中的挑战分享了几个。
- en: '[How Not to Write an MCP Server](https://towardsdatascience.com/how-not-to-write-an-mcp-server/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何不编写MCP服务器](https://towardsdatascience.com/how-not-to-write-an-mcp-server/)'
- en: 'ACP: The Internet Protocol for AI Agents'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ACP：AI代理的互联网协议
- en: MCP isn’t the only game in town — Sandi Besen introduces us to the new “HTTP
    of agent communication.”
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: MCP并非唯一的选择——Sandi Besen向我们介绍了新的“代理通信的HTTP”。
- en: '[ACP: The Internet Protocol for AI Agents](https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[ACP：AI代理的互联网协议](https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/)'
- en: Other Recommended Reads
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他推荐阅读
- en: 'If you feel like exploring a wider set of topics this week, we invite you to
    read these excellent articles on AI ethics and regulation, prompt engineering,
    and more:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想在本周探索更多主题，我们邀请您阅读这些关于AI伦理和监管、提示工程等方面的优秀文章：
- en: It’s increasingly crucial to understand the environmental impact of AI model
    training. [Ngoc Doan](https://towardsdatascience.com/author/ngoc-doan/)‘s analysis
    offers an [in-depth look at the limitations and potential upside](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/) of
    hardware improvements.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解AI模型训练的环境影响变得越来越重要。[Ngoc Doan](https://towardsdatascience.com/author/ngoc-doan/)的分析深入探讨了硬件改进的局限性和潜在优势。[https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/)
- en: '[Rethinking the Environmental Costs of Training AI — Why We Should Look Beyond
    Hardware](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[重新思考训练人工智能的环境成本——为什么我们应该超越硬件](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/)'
- en: What is missing from current AI regulations? [Dariusz Jemielniak](https://towardsdatascience.com/author/jemielniak/) argues
    that [it’s time for a fourth law of robotics](https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/),
    limiting AI systems’ ability to pretend to be human.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前人工智能法规中缺少了什么？[Dariusz Jemielniak](https://towardsdatascience.com/author/jemielniak/)
    认为，[是时候制定第四条机器人法则](https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/)，限制人工智能系统假装成人类的能力。
- en: '[We Need a Fourth Law of Robotics in the Age of AI](https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/)'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在人工智能时代，我们需要第四条机器人法则](https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/)'
- en: Children are very aware of AI’s growing footprint in our (and their) daily lives,
    but [how should adults talk to them](https://towardsdatascience.com/talking-to-kids-about-ai/) about
    it? [Stephanie Kirmer](https://towardsdatascience.com/author/s-kirmer/) shares
    concrete insights to help parents and educators.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 孩子们非常清楚人工智能在我们（以及他们）的日常生活中日益增长的影响，但 [成年人应该如何与他们谈论这个问题](https://towardsdatascience.com/talking-to-kids-about-ai/)？[Stephanie
    Kirmer](https://towardsdatascience.com/author/s-kirmer/) 分享了一些具体的见解，以帮助家长和教育工作者。
- en: '[Talking to Kids About AI](https://towardsdatascience.com/talking-to-kids-about-ai/)'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[关于 AccentFold 的评论：非洲 ASR 最重要论文之一](https://towardsdatascience.com/a-review-of-accentfold-one-of-the-most-important-papers-on-african-asr/)'
- en: '[Learn the ins and outs of regression discontinuity design](https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/) (RDD)
    — a patient deep dive by [Alejandro Alvarez Perez](https://towardsdatascience.com/author/alejandroalvarezprez/) explores
    how it works, how to run it, and how to get it right.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[学习回归不连续设计（RDD）的方方面面](https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/)
    —— [Alejandro Alvarez Perez](https://towardsdatascience.com/author/alejandroalvarezprez/)
    通过一篇深入的研究文章探讨了其工作原理、如何运行以及如何正确实施。'
- en: '[Regression Discontinuity Design: How It Works and When to Use It](https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/)'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[回归不连续设计：它是如何工作的以及何时使用它](https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/)'
- en: After introducing her GPT-powered fashion assistant in an earlier article, [Arielle
    Caron](https://towardsdatascience.com/author/ariellercaron/) shares the lessons
    she’s learned about [the challenges of effective prompting](https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/).
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一篇早前的文章中介绍了她基于 GPT 的时尚助手之后，[Arielle Caron](https://towardsdatascience.com/author/ariellercaron/)
    分享了她关于 [有效提示的挑战](https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/)
    学到的经验教训。
- en: '[What My GPT Stylist Taught Me About Prompting Better](https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/)'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[我的 GPT 风格设计师教我的关于如何更好地提示的技巧](https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/)'
- en: Meet Our New Authors
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Don’t miss the work of some of our newest contributors:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 不要错过我们一些最新贡献者的作品：
- en: '[Zaynab Awofeso’](https://towardsdatascience.com/author/zaynab-awofeso/)s debut
    TDS article walks us through cutting-edge research on African-focused automatic
    speech recognition (ASR) systems and the challenges of working on low-resource
    accents.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Zaynab Awofeso’](https://towardsdatascience.com/author/zaynab-awofeso/) 的首篇
    TDS 文章带我们了解了针对非洲的自动语音识别（ASR）系统的研究前沿以及处理低资源口音的挑战。'
- en: '[A Review of AccentFold: One of the Most Important Papers on African ASR](https://towardsdatascience.com/a-review-of-accentfold-one-of-the-most-important-papers-on-african-asr/)'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[与孩子谈论人工智能](https://towardsdatascience.com/talking-to-kids-about-ai/)'
- en: '[Akrita Agarwal](https://towardsdatascience.com/author/akrita-agarwal/) joins
    our community with deep expertise in software engineering at startups and tech
    giants alike.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Akrita Agarwal](https://towardsdatascience.com/author/akrita-agarwal/) 加入我们的社区，在初创公司和科技巨头中都有深厚的软件工程专业知识。'
- en: '[Pause Your ML Pipelines for Human Review Using AWS Step Functions + Slack](https://towardsdatascience.com/pause-your-ml-pipelines-for-human-review-using-aws-step-functions-slack/)'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用 AWS Step Functions + Slack 暂停您的机器学习管道以供人工审查](https://towardsdatascience.com/pause-your-ml-pipelines-for-human-review-using-aws-step-functions-slack/)'
- en: '[Yagmur Gulec](https://towardsdatascience.com/author/yagmur-gulec/) recently
    published a fascinating article, outlining an innovative approach that leverages
    machine learning in preventive healthcare.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[亚古穆·古莱克](https://towardsdatascience.com/author/yagmur-gulec/)最近发表了一篇引人入胜的文章，概述了一种利用机器学习在预防性医疗保健中应用的创新方法。'
- en: '[Clustering Eating Behaviors in Time: A Machine Learning Approach to Preventive
    Health](https://towardsdatascience.com/clustering-eating-behaviors-in-time-a-machine-learning-approach-to-preventive-health/)'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在时间上聚类饮食习惯：一种预防性健康的机器学习方法](https://towardsdatascience.com/clustering-eating-behaviors-in-time-a-machine-learning-approach-to-preventive-health/)'
- en: Contribute to TDS
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为TDS贡献
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近写了一个有趣的项目演练、教程或对我们核心主题的理论反思，为什么不考虑[与我们分享？](https://towardsdatascience.com/questions-96667b06af5/)
- en: '* * *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
