- en: Data Engineering – ORM and ODM with Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据工程 – 使用Python的ORM和ODM
- en: 原文：[https://towardsdatascience.com/data-engineering-orm-and-odm-with-python-cff97532e464/](https://towardsdatascience.com/data-engineering-orm-and-odm-with-python-cff97532e464/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/data-engineering-orm-and-odm-with-python-cff97532e464/](https://towardsdatascience.com/data-engineering-orm-and-odm-with-python-cff97532e464/)
- en: '![Photo by David Clode on Unsplash](../Images/02ff00df15a765a3fa503f12a3762f38.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![David Clode在Unsplash上的照片](../Images/02ff00df15a765a3fa503f12a3762f38.png)'
- en: Photo by [David Clode](https://unsplash.com/@davidclode?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: David Clode在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: When working on data science projects, one fundamental pipeline to set up is
    the one regarding data collection. Real-world Machine Learning mainly differs
    from Kaggle-like problems because data is not static. We need to scrape websites,
    gather data from APIs, and so on. This way of collecting data might look chaotic,
    and it is! That’s why we need to structure our code following best practices to
    bring some sort of order to all this mess.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理数据科学项目时，一个基本的设置管道是关于数据收集的。现实世界的机器学习主要区别于Kaggle-like问题，因为数据不是静态的。我们需要抓取网站，从API收集数据等等。这种收集数据的方式可能看起来很混乱，确实如此！这就是为什么我们需要遵循最佳实践来结构化我们的代码，以在所有这些混乱中带来一些秩序。
- en: The ORM software pattern
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ORM软件模式
- en: 'Once you identified the sources from which you want to gather your data, you
    need to collect them in a structured way to store those in your database. For
    example, you might decide that in order to train your LLM what you need are data
    sources which contain 3 fields: *author, content,* and *link.*'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你确定了想要收集数据的来源，你需要以结构化的方式收集它们，以便将它们存储在你的数据库中。例如，你可能决定，为了训练你的LLM，你需要的数据源包含3个字段：*作者，内容，*和*链接*。
- en: What you could do is to download the data, and then write SQL queries to store
    and retrieve data from your database. More commonly you might want to implement
    all the queries to perform **CRUD** operations. CRUD stands for create, read,
    update, and delete. These are the four basic functions of persistent storage.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以做的另一件事是下载数据，然后编写SQL查询来存储和检索数据库中的数据。更常见的是，你可能希望实现所有查询以执行**CRUD**操作。CRUD代表创建、读取、更新和删除。这些都是持久存储的基本功能。
- en: Now, what you can do is encapsulate the complexity of writing SQL queries into
    an OMR (**object-relational mapping**) class that handles all the database operations.
    The OMR will be capable of interacting with SQL databases such as MySQL or PostgreSQL.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以做的是将编写SQL查询的复杂性封装到一个OMR（**对象关系映射**）类中，该类处理所有数据库操作。OMR将能够与SQL数据库（如MySQL或PostgreSQL）交互。
- en: Let’ code
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 让我们开始编码
- en: To start with, we need to import the necessary libraries and define a base class
    for all the OMR models.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要导入必要的库并定义所有OMR模型的基础类。
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We are ready now to define a model. A model represents a table in our database.
    Here I am interested in building a *document* class to store my data. We need
    a user ID which will be our primary key for this model. If you are familiar with
    SQL, you should be familiar with this. In the model class, we also need to specify
    the table name to which the Python class will be associated. Let’s also rewrite
    the magic method **repr** to be sure our objects will be represented and printed
    in a good way.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经准备好定义一个模型了。模型代表了我们数据库中的一个表。在这里，我感兴趣的是构建一个*文档*类来存储我的数据。我们需要一个用户ID，它将成为这个模型的主键。如果你熟悉SQL，你应该熟悉这一点。在模型类中，我们还需要指定Python类将关联的表名。让我们也重写魔法方法**repr**，以确保我们的对象将以良好的方式表示和打印。
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Let’s define a SQLite database
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义一个SQLite数据库
- en: '[PRE2]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: It is also important to initialize a session with which we will actually be
    able to perform operations over our database.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化一个会话也很重要，这样我们才能真正在我们的数据库上执行操作。
- en: '[PRE3]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We can add data to our database using Python!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用Python向我们的数据库添加数据！
- en: '[PRE4]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Same for querying the DB. We can also filter based on some attributes like the
    author’s name.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于查询数据库，我们也可以根据一些属性进行过滤，比如作者的名字。
- en: '[PRE5]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Check this [link](https://docs.sqlalchemy.org/en/20/orm/) to learn more about
    SQLAlchemy ORM.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 查阅这个[链接](https://docs.sqlalchemy.org/en/20/orm/)了解更多关于SQLAlchemy ORM的信息。
- en: The ODM software pattern
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ODM软件模式
- en: The ODM pattern which stands for **object document mapping** is extremely similar
    to the ORM pattern, but instead of working with relational databases, we work
    with NoSQL databases such as [MongoDB](https://www.mongodb.com/).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: ODM模式，即**对象文档映射**，与ORM模式极为相似，但与关系型数据库不同，我们与NoSQL数据库（如[MongoDB](https://www.mongodb.com/)）一起工作。
- en: ODM maps object-oriented code to JSON-like documents and stores them in the
    database.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: ODM将面向对象的代码映射到类似JSON的文档，并将它们存储在数据库中。
- en: 'This means that the class we are going to build will shape how the JSON data
    is represented in the DB. For this reason, we will adopt Pydantic, which provides:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们将要构建的类将决定JSON数据在数据库中的表示方式。因此，我们将采用Pydantic，它提供：
- en: '**validation**: automatically checks if the input data matches the expected
    types and constraints'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证**：自动检查输入数据是否与预期的类型和约束匹配'
- en: '**serialization**.: converts Python objects to and from formats like JSON or
    dictionaries.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**序列化**：将Python对象转换为JSON或字典等格式，或将它们转换回Python对象。'
- en: Let’ code
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 让我们开始编码
- en: We start with the imports as usual.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们像往常一样开始导入。
- en: '[PRE6]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The class we are going to build will inherit from Pydantic **BaseModel** to
    use Pydantics features.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要构建的类将继承自Pydantic的**BaseModel**以使用Pydantic的功能。
- en: The type UUID is used to specify that the id variable should be a universally
    unique identifier. The Field class is provided by Pydantic to add constraints
    to variables (for validation) or to add some metadata. _default*factory=uuid4*
    means that when a document is created without an ID the method uuid4() is automatically
    called to create an ID. uuid4() generates a random number.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 使用UUID类型来指定id变量应该是一个通用唯一标识符。Pydantic提供的Field类用于向变量添加约束（用于验证）或添加一些元数据。"default_factory=uuid4"意味着当创建一个没有ID的文档时，会自动调用uuid4()方法来创建ID。uuid4()生成一个随机数。
- en: '[PRE7]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now I want to define a method to generate an instance of the class starting
    from a dictionary object.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我想定义一个方法，从字典对象开始生成类的实例。
- en: This will be a class method. In this way, we have a reference to the class (cls)
    and can leverage this to use the [Pydantic](https://docs.pydantic.dev/latest/)
    feature to automatically convert a JSON-like object into a class instance.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是一个类方法。这样，我们就有了对类的引用（cls），可以利用这一点来使用[Pydantic](https://docs.pydantic.dev/latest/)功能，自动将类似JSON的对象转换为类实例。
- en: The type returned is therefore a Document. We need to use the apexes ‘Document’
    to return the type of the class we are implementing in the class itself.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 返回的类型因此是Document。我们需要使用“Document”这个顶点来返回我们在类本身中实现的类的类型。
- en: '[PRE8]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In a similar way we implement the to_mongo() method.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 以类似的方式，我们实现to_mongo()方法。
- en: '[PRE9]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'The entire class then would be the following:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 整个类将是以下内容：
- en: '[PRE10]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We can instantiate a MongoDB connection and use these methods to insert and
    fetch data easily to and from Mongo.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以实例化一个MongoDB连接，并使用这些方法轻松地将数据插入到MongoDB中，并从MongoDB中检索数据。
- en: '[PRE11]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Done!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 完成！
- en: 'This is a very simple example. You might consider implementing some other methods
    to streamline the interaction with Mongo. For example, some methods you could
    implement are:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常简单的例子。你可能考虑实现一些其他方法来简化与Mongo的交互。例如，你可以实现的一些方法包括：
- en: 'save(): to allow an instance of the model to be inserted into the database'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: save()：允许模型实例被插入到数据库中
- en: 'get_or_create(): method which attempts to find a document in a database, if
    not existing it is created.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: get_or_create()：尝试在数据库中找到一个文档，如果不存在则创建。
- en: 'bulk_insert(): to insert multiple documents in the database'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: bulk_insert()：在数据库中插入多个文档
- en: 'find(): search in the database using advanced filters'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: find()：使用高级过滤器在数据库中进行搜索
- en: 'bulk_find(): find multiple documents'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: bulk_find()：查找多个文档
- en: 'get_collection_name(): determines the name of the MongoDB collection'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: get_collection_name()：确定MongoDB集合的名称
- en: Final Thoughts
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: In this article, I described how to implement the ORM and ODM paradigms to streamline
    the work with relational and document-based databases. These approaches abstract
    the complexity of managing the database and writing SQL queries by writing clean
    and maintainable code.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我描述了如何实现ORM和ODM范式以简化与关系型数据库和文档型数据库的工作。这些方法通过编写干净且易于维护的代码来抽象管理数据库和编写SQL查询的复杂性。
