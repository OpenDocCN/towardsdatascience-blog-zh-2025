- en: 'Experiments Illustrated: How We Optimized Premium Listings on Our Nursing Job
    Board'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实验展示：我们如何优化我们的护士招聘板上的高级列表
- en: 原文：[https://towardsdatascience.com/experiments-illustrated-how-we-optimized-premium-listings-on-our-nursing-job-board/](https://towardsdatascience.com/experiments-illustrated-how-we-optimized-premium-listings-on-our-nursing-job-board/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/experiments-illustrated-how-we-optimized-premium-listings-on-our-nursing-job-board/](https://towardsdatascience.com/experiments-illustrated-how-we-optimized-premium-listings-on-our-nursing-job-board/)
- en: Running experiments is a task that often falls to data scientists. If that’s
    you, congrats! It can be a rewarding and high-impact area of work, but also requires
    tools found outside the typical ML-heavy data science curriculum.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 运行实验通常是数据科学家的任务。如果你是，恭喜你！这可以是一个有回报且影响深远的工作领域，但也需要典型以机器学习为主的数据科学课程之外的工具。
- en: Even with the best tools, only a small share of experiments deliver meaningful
    business value. I’ve been lucky to design and execute many experiments. Of those,
    I have a few winners. From these, I’m sharing some stories to illustrate key concepts
    related to experiments.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 即使拥有最好的工具，也只有一小部分实验能带来有意义的商业价值。我很幸运设计并执行了许多实验。其中，我有几个成功的案例。从这些案例中，我分享了一些故事，以说明与实验相关的关键概念。
- en: '[Multiple Comparisons & How Random Assignment Saved us $1M in Marketing Spend](https://towardsdatascience.com/experiments-illustrated-how-random-assignment-saved-us-1m-in-marketing-spend/)'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[多重比较与随机分配如何为我们节省100万美元的营销支出](https://towardsdatascience.com/experiments-illustrated-how-random-assignment-saved-us-1m-in-marketing-spend/)'
- en: '[Choosing what to test & How IntelyCare tested its referral bonus program into
    existence](https://towardsdatascience.com/experiments-illustrated-can-1-change-behavior-more-than-100/)'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[选择要测试的内容 & IntelyCare如何测试其推荐奖金计划](https://towardsdatascience.com/experiments-illustrated-can-1-change-behavior-more-than-100/)'
- en: '**Background:** I work at a company called IntelyCare. We help connect nurses
    with various work opportunities (full-time, part-time, contracts, per-diem… the
    whole menu).'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**背景：** 我在一家名为IntelyCare的公司工作。我们帮助护士与各种工作机会（全职、兼职、合同、日薪……应有尽有）建立联系。'
- en: One of our core offerings is a nursing-only [job board](https://www.intelycare.com/jobs/).
    If you take a look in the year 2025, you’ll notice two possible ways of sorting
    jobs by date and by relevance.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的核心服务之一是专为护士提供的[招聘板](https://www.intelycare.com/jobs/)。如果你在2025年查看，你会注意到两种按日期和相关性排序工作的可能方式。
- en: '**Why it matters:** The sort-by-relevance feature is our current best lever
    to guarantee a good experience for paying customers. It also gives us an opportunity
    to improve the overall efficiency of our job board by steering eyeballs away from
    low-quality jobs.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这很重要：** 按相关性排序的功能是我们目前保证付费客户良好体验的最好杠杆。它还给我们提供了一个机会，通过引导目光远离低质量工作，来提高我们招聘板的整体效率。'
- en: Unfortunately, we can’t put *every* job at the top of a search result. We face
    a tradeoff between the *quantity* of top-page listings and the *quality* of the
    experience in the form of increased applies.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们无法将*每个*工作都放在搜索结果的最顶部。我们在首页列表的数量和以增加申请为形式的经验质量之间面临权衡。
- en: '**How it works: “**Relevance” doesn’t mean what it normally means. Sorry!'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何工作：“相关性”并不像通常所意味的那样。抱歉！**'
- en: We give each job a score between 0 and 100\. When filling a page with jobs,
    sorting by relevance means we sort the results by that score. That’s it! For brevity,
    we’ll say any job with a score higher than 0 is “boosted.”
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们给每个工作分配一个0到100之间的分数。当用工作填充页面时，按相关性排序意味着我们按那个分数排序结果。就是这样！为了简洁起见，我们将任何分数高于0的工作称为“提升”。
- en: I know what you’re thinking, “This isn’t relevance!” And you’re right, at least
    in the normal sense of the word. The score doesn’t vary across job-seekers or
    search terms. A better name would be “relevant to Google.” We’re OK with that
    because a huge share of our job-board traffic comes from Google, as shown below.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道你在想什么，“这不是相关性！”你是对的，至少在这个词的正常意义上。分数不会因求职者或搜索词而变化。更好的名字应该是“与谷歌相关”。我们对此表示接受，因为我们的招聘板流量中有很大一部分来自谷歌，如下所示。
- en: '![Screenshot of Google search results](../Images/01bb9969a8efcc28b030222f0e0d705e.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![Google搜索结果截图](../Images/01bb9969a8efcc28b030222f0e0d705e.png)'
- en: “Sort by relevance” here is shorthand for “relevant to Google.” (Image by author)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: “按相关性排序”在这里是“与谷歌相关”的简称。（图片由作者提供）
- en: '**In math:** We have N jobs. Every day we generate a vector of N integers between
    0 and 100\. We feed this vector into a black box named Google. If we do a good
    job, the black box rewards us with many job applications.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**在数学上：** 我们有N个工作。每天我们生成一个介于0到100之间的N个整数的向量。我们将这个向量输入到一个名为谷歌的黑盒中。如果我们做得好，黑盒会奖励我们许多工作申请。'
- en: By putting the “right” jobs at the top of the page (loaded word there), we can
    improve upon a chronological sort. Before we can identify the right jobs, we need
    to know how much Google actually rewards higher-placed jobs.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将“正确”的工作放在页面顶部（那里加载的单词），我们可以改进按时间顺序排序。在我们能够确定正确的工作之前，我们需要知道谷歌实际上是如何奖励排名更高的工作的。
- en: 'Day 0: Making progress when you know nothing'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第0天：当你一无所知时的进步
- en: 'Sometimes, just to justify all the simplifying assumptions I’m going to make
    later, I start a project by writing down the math equation I’d *lik*e to solve.
    I imagine ours looks something like this:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，为了证明我后面将要做的所有简化假设的合理性，我会先从写下我想解决的数学方程式开始一个项目。我想象我们的方程式可能看起来像这样：
- en: '![](../Images/789e40cf16449881aac21da9c87cdf95.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/789e40cf16449881aac21da9c87cdf95.png)'
- en: '***S*** is our vector of relevancy scores. There are N jobs, so each *s_i (*an
    element of S) corresponds to a different job. A function called *applies* turns
    **S** into a scalar. Each day we’d like to find the **S** that makes that number
    as large as possible — the relevancy scores that generate the greatest number
    of job applications for intelycare.com/jobs.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**S** 是我们的相关性得分向量。有N个工作，所以S中的每个s_i（S的一个元素）对应一个不同的工作。一个名为“申请”的函数将**S**转换为一个标量。我们每天都想找到使这个数字尽可能大的**S**——为intelycare.com/jobs生成最多工作申请的相关性得分。'
- en: '*applies* is a fine objective function on Day 0\. Later on our objective function
    could change (e.g. revenue, lifetime value). Applies are easy to count, though,
    and lets me spend my [complexity tokens](https://mcfunley.com/choose-boring-technology)
    elsewhere. It’s Day 0, people. We’ll come back to these questions on Day 1.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “申请”是第0天的一个很好的目标函数。稍后，我们的目标函数可能会改变（例如，收入，终身价值）。但是，申请很容易计数，这让我可以在其他地方花费我的[复杂性令牌](https://mcfunley.com/choose-boring-technology)。这是第0天，人们。我们将在第1天回到这些问题。
- en: Problem. We know nothing about the *applies* function until we start feeding
    it relevancy scores. 😱
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题。在我们开始向“申请”函数提供相关性得分之前，我们对“申请”函数一无所知。😱
- en: '**First things first:** Seeing that we know nothing about the *applies* function,
    our first question is, “how do we choose an ongoing wave of daily S vectors *so
    we can learn* what the *applies* function looks like?”'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先，最重要的是：** 由于我们知道关于“申请”函数一无所知，我们的第一个问题是，“我们如何选择一个持续的每日S向量波，以便我们可以学习“申请”函数的样子？”'
- en: We know (1) which jobs are boosted and when, (2) how many applies each job receives
    each day. Note the absence of page-load data. It’s Day 0! You might not have all
    the data you want on Day 0, but if we’re clever, we can make do with what we have.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们知道（1）哪些工作被提升以及何时提升，（2）每天每个工作收到多少申请。注意缺少页面加载数据。这是第0天！你可能不会在第0天得到你想要的所有数据，但如果我们足够聪明，我们可以利用我们拥有的数据。
- en: Note the subtle change in our objective. Earlier, our goal was to accomplish
    some business objective (maximize applies), and eventually, we’ll come back to
    that goal. We took off our business hat for a minute and put on our science hat.
    Our only goal now is to learn something. If we can learn something, we can use
    it (later) to help achieve some business objective.🤓
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意我们目标的微妙变化。之前，我们的目标是完成某些商业目标（最大化申请量），我们最终会回到这个目标。我们暂时摘下了商业帽子，戴上了科学帽子。我们现在的唯一目标就是学习。如果我们能学到一些东西，我们就可以（以后）用它来帮助实现某些商业目标。🤓
- en: Since our goal is to learn *something,* above all we want to avoid learning
    *nothing*. Remember it’s Day 0 and we have no guarantee that the Google Monster
    will pay any attention to how we sort things. We may as well go for broke and
    make sure this thing works before throwing more time at improving it.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于我们的目标是学习“一些”东西，首先我们想要避免学习“什么都没有”。记住这是第0天，我们没有保证谷歌怪物会关注我们如何排序。我们不妨孤注一掷，确保这个玩意儿在投入更多时间改进它之前能正常工作。
- en: '**How do we choose an initial wave of daily S vectors?** We’ll give every job
    a score of 0 (default score), and choose a *random* subset of jobs to boost to
    100.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们如何选择初始的每日S向量波？** 我们会给每个工作一个0分（默认分数），并选择一个随机的工作子集将其提升到100分。'
- en: Maybe I’m stating the obvious, but it has to be random if you want to isolate
    the effect of page-position on job applications. We want the only difference between
    boosted jobs and other jobs to be their relative ordering on the page as determined
    by our relevance scores. [I can’t tell you how many phone screens I’ve conducted
    where a candidate doubled down on running an A/B test with the good customers
    in one group and the bad customers in the other group. In fairness, I’ve also
    vetted marketing-tech vendors who do the same thing 😭].
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 也许我在陈述显而易见的事情，但如果你想隔离页面位置对工作申请的影响，就必须是随机的。[我无法告诉你我进行了多少次电话面试，候选人在一个组中针对好客户进行A/B测试，而在另一个组中针对坏客户进行A/B测试。公平地说，我也审查过做同样事情的营销技术供应商
    😭]。
- en: The randomness will be nice later on for other reasons. It’s likely that some
    jobs benefit from page-placement more than others. We’ll have an easier time identifying
    those jobs with a big, randomly-generated dataset.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机性在以后会因其他原因而变得很棒。很可能有些工作比其他工作更能从页面放置中受益。我们将更容易地通过一个大的、随机生成的数据集来识别这些工作。
- en: 'The plan: Subtle but important details'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计划：微妙但重要的细节
- en: We know we can’t boost *every* job. Anytime I put a job at the top of the page,
    I bump all other jobs down the page (classic example of a “[spillover](https://en.wikipedia.org/wiki/Spillover_(experiment))”).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道我们不可能提升*所有*工作。每次我把一个工作放在页面顶部，就会把所有其他工作推到页面下方（这是典型的“[溢出](https://en.wikipedia.org/wiki/Spillover_(experiment))”例子）。
- en: The spillover gets worse as I boost more and more jobs, I impose a greater and
    greater punishment on all other jobs by pushing them down in the sort (including
    other boosted jobs).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 随着提升的工作越来越多，溢出效应变得更糟，我通过在排序中推低所有其他工作（包括其他提升的工作）对它们施加了更大和更大的惩罚。
- en: With little exception, nursing jobs are in-person and local, so any boosting
    spillovers will be limited to other nearby jobs. This is important.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除了少数例外，护理工作通常是面对面和当地的，因此任何提升的溢出都将限制在附近的其他工作。这很重要。
- en: '**How do we choose an initial wave of daily S vectors? (final answer)** We’ll
    give every job a score of 0 (default score), and choose a random subset of jobs
    to boost to 100\. *The size of the random subset will vary across geographies.*'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们如何选择初始的每日S向量波？(最终答案)** 我们将给每个工作分配一个0分（默认分数），并随机选择一部分工作将其提升到100分。*随机子集的大小将在不同地区有所不同。*'
- en: We create 4 groups of distinct geographies with roughly the same amount of web
    traffic in each group. Each group is balanced along the key dimensions we think
    are important. We randomly boost a different percentage of jobs in each group.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们创建了4组具有大致相同网络流量的不同地理区域。每个组在我们认为重要的关键维度上都是平衡的。我们在每个组中随机提升不同百分比的工作。
- en: Here’s how it looked…
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来是这样的...
- en: '![](../Images/e6cebf9ee1c5fa85edd57bcb35e1e51c.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e6cebf9ee1c5fa85edd57bcb35e1e51c.png)'
- en: '*Daily Applies for boosted vs unboosted Jobs. Note how boosted jobs do better
    when there are fewer of them. (Image by author)*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*每日申请量对比提升和不提升的工作。注意当提升的工作较少时，提升的工作表现更好。(图片由作者提供)*'
- en: Each black circle represents a different geography. Its elevation shows the
    difference in applies-per-job between boosted jobs and all other jobs (measured
    as a percent).
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个黑色圆圈代表一个不同的地理区域。它的高度显示了提升工作与其他工作之间申请量每工作的差异（以百分比衡量）。
- en: While groups are balanced in aggregate, the individual geographies vary considerably.
    The balance is still important though. Otherwise, what you see in the chart could
    be an artifact of the mix of urban/rural or large/small geographies in each group.
    As it is, we’re confident the results come from our relevancy scores.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然总体上组是平衡的，但各个地理区域差异很大。尽管如此，平衡仍然很重要。否则，图表中显示的可能是每个组中城市/乡村或大/小地理区域的混合造成的。实际上，我们相信结果来自我们的相关性评分。
- en: A quick-and-dirty interpretation of this chart is something like, “the 5% of
    jobs at the top of the page have ~26% more applies per day than the 95% of jobs
    placed below. The 10% of jobs at the top of the page have ~21% more applies per
    day than the 90% of jobs underneath…” and so on. I would never be so bold as to
    say that in real life, but in a perfect-experiment world it would be true.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对这张图的快速而粗略的解释可能是这样的，“页面上部的5%的工作每天比下部的95%的工作多26%的申请量。页面上部的10%的工作每天比下部的90%的工作多21%的申请量……”等等。我永远不会那么大胆地说在现实生活中会是这样，但在一个完美的实验世界中这将是真实的。
- en: By the time we boost 25% of jobs, the boost experience is entirely averaged
    out! We diluted the perks of premium placement to practically nothing for the
    median geography. [“And when everyone is super, no one will be! <evil laugh>.”](https://www.youtube.com/watch?v=fmSO2cz2ozQ)
    Can you imagine learning this the hard way?
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 到我们提升25%的职位时，提升体验已经完全平均化了！对于中位数地理区域，我们稀释了高级位置的好处，实际上已经没有多少了。[“当每个人都超级时，就没有人会被注意到！<邪恶的笑声>。”](https://www.youtube.com/watch?v=fmSO2cz2ozQ)你能想象以这种方式艰难地学到这一点吗？
- en: There are many other layers to peel back. Perhaps dilution happens more quickly
    for nursing specialties with many pages of listings? What about states that overlap
    with our long-standing per-diem staffing business? Many fine questions, we have
    answers for some, but all more than I can include in this post.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 还有许多其他层次可以剥开。也许对于有许多列表的护理专业，稀释发生得更快？关于与我们长期日薪人员业务重叠的州呢？有许多很好的问题，我们对一些问题有答案，但所有这些问题都超出了这篇文章的范围。
- en: '**What comes next?** Day 1 is when the real fun begins! 🎉'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**接下来是什么？** 第一天是真正的乐趣开始的时候！🎉'
- en: We now have guardrails against diluting our premium experience (super important),
    but what is the best ~10% of jobs to boost each day? Obviously our paying customers
    have priority, but then what?
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们现在有了防止稀释我们高级体验的防护栏（超级重要），但每天最好的10%的职位提升是什么？显然，我们的付费客户有优先权，但接下来呢？
- en: Does boost help some jobs more than others? The randomly-generated data from
    our experiment is well suited to answer this and many other questions. We’ll save
    those questions for future posts.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升是否对某些职位比其他职位更有帮助？我们实验中随机生成的数据非常适合回答这个问题以及许多其他问题。我们将把这些问题留到未来的文章中讨论。
- en: Once we have a strategy for boosting, is our objective really to maximize the
    *total* number of applies? Or do we only care about the applies for boosted jobs?
    🤔 (Sometimes I miss the Day 0 days when all the jobs were equally relevant. Might
    be time to revisit those equations at the top of the post.)
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦我们有了提升策略，我们的目标真的是最大化**总数**的申请量吗？或者我们只关心提升职位的申请量？🤔（有时我想念那些所有职位都同等相关的Day 0的日子。可能是有时候要回顾一下文章顶部的那些方程式了。）
- en: Key takeaways for those who made it this far
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对那些坚持到这里的人来说，关键要点
- en: By being thoughtful about how we generated our initial data, we quickly found
    a convincing answer to our question, set ourselves up to answer many future questions,
    and saved ourselves a ton of time trying to build an uplift model on non-existent
    historical data.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过深思熟虑我们如何生成初始数据，我们很快找到了对我们问题的令人信服的答案，为回答许多未来的问题做好了准备，并且节省了大量时间，因为我们试图在不存在的历史数据上构建提升模型。
- en: Thinking of a test? Go for it! If you execute well, you can see the results
    clearly in a chart and avoid all the complicated statistics ([obligatory xkcd](https://www.explainxkcd.com/wiki/index.php/2400:_Statistics)
    reference). [hmm, maybe *most* of the statistics. I still love a good regression
    table.]
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在想进行测试吗？那就去做吧！如果你执行得好，你可以在图表中清楚地看到结果，并避免所有复杂的统计数据（[必要的xkcd](https://www.explainxkcd.com/wiki/index.php/2400:_Statistics)参考）。[嗯，也许*大多数*统计数据。我仍然喜欢一个好的回归表。]
- en: Spillovers are everywhere. Sometimes varying the treatment across an aggregated
    group can help like it did here. That can quickly axe your sample-size, but I
    find it better to have a small data set with meaning than a big data set that’s
    hot garbage.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 溢出效应无处不在。有时在汇总的群体中改变处理方式，就像这里一样，可能会有所帮助。这可能会迅速减少样本量，但我认为拥有一个有意义的较小数据集比拥有一个垃圾数据集要好。
- en: 'Bonus: We ran this experiment in 2023\. How are things now?'
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励：我们在2023年进行了这个实验。现在情况如何？
- en: At the time of our little geo-randomized experiment, you see in the charts that
    our premium job openings performed ~25% better than regular jobs (meaning they
    had 25% more applies on average).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的小型地理随机实验期间，你可以在图表中看到，我们的高级职位空缺表现比常规职位好约25%（这意味着平均有25%的申请量）。
- en: '**Why it matters:** We’ve taken over a year to grow and iterate our product
    to ensure our premium listings deliver the best possible experience. Looking at
    some recent numbers… (literally running the queries as I write this)'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这很重要：** 我们花费了一年的时间来增长和迭代我们的产品，以确保我们的高级列表提供最佳体验。看看一些最近的数据……（我实际上是在写这篇文章时运行这些查询）'
- en: Boosted job openings receive **425% more applies** than regular openings
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升职位空缺比常规职位空缺收到**425%更多的申请**。
- en: Boosted jobs are **450% more likely to have receive at least one apply** compared
    to regular openings
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与常规职位相比，提升职位**有450%的可能性至少收到一份申请**。
- en: Not bad! This isn’t randomized, so that 425% includes all sorts of selection
    bias, additional product work, a crack SEO team, and a successful email operation,
    all in addition to the incremental effects from premium page position. Importantly,
    all the extra product and marketing work is focused on a small number of jobs
    as our initial testing recommends. 🏆
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 还不错！这不是随机化的，所以425%包括了各种选择偏差、额外的产品工作、一个优秀的SEO团队以及成功的电子邮件运营，所有这些都加上来自优质页面位置的增量效应。重要的是，所有额外的产品和营销工作都集中在少数几个职位上，正如我们的初步测试所建议的那样。🏆
