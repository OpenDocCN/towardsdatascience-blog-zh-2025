- en: Some graded measures
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些分级指标
- en: For graded retrieval measures, it is first of all important to understand the
    concept of graded relevance. That is, for graded measures, a retrieved item can
    be more or less relevant, as quantified by `rel_i`.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对于分级检索指标，首先重要的是理解分级相关性的概念。也就是说，对于分级指标，检索到的项目可以或多或少地相关，这由`rel_i`来量化。
- en: '![](../Images/a5f19faae7e455849ed9dbc7248c9e45.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a5f19faae7e455849ed9dbc7248c9e45.png)'
- en: Image by author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 🎯 Discounted Cumulative Gain (DCG@k)
  id: totrans-16
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🎯 折现累积增益 (DCG@k)
- en: 'Discounted Cumulative Gain (DCG@k) is a graded, order-aware retrieval evaluation
    metric, allowing us to quantify how useful a retrieved result is, taking into
    account the rank with which it is retrieved. We can calculate it as follows:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 折现累积增益 (DCG@k) 是一个分级、顺序感知的检索评估指标，它允许我们量化检索结果的有用性，考虑到它被检索的排名。我们可以如下计算它：
- en: '![](../Images/9a267ea4e9cc6d7e0d5e0712ed6b38e1.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9a267ea4e9cc6d7e0d5e0712ed6b38e1.png)'
- en: Image by author
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Here, the numerator `rel_i` is the graded relevance of the retrieved result
    i, essentially, is a quantification of how relevant the retrieved text chunk is.
    Moreover, the denominator of this formula is the log of the ranking of the result
    i. Essentially, this allows us to penalize items that appear in the retrieved
    set with lower ranks, emphasizing the idea that results appearing at the top are
    more important. Thus, the more relevant a result is, the higher the score, but
    the lower the ranking it appears at, the lower the score.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，分子 `rel_i` 是检索结果i的分级相关性，本质上是对检索到的文本片段相关性的量化。此外，这个公式的分母是结果i的排名的对数。本质上，这允许我们对排名较低出现在检索集中的项目进行惩罚，强调结果出现在顶部更重要。因此，结果的相关性越高，得分越高，但排名越低，得分越低。
- en: 'Let’s further explore this with a simple example:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个简单的例子进一步探讨这个问题：
- en: '![](../Images/f0ff6af51ef1c4fb4c7f1385b1c67723.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f0ff6af51ef1c4fb4c7f1385b1c67723.png)'
- en: Image by author
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In any case, a major issue of DCG@k is that, as you can see, is essentially
    a sum function of all the relevant items. Thus, a retrieved set with more items
    (a larger k) and/or more relevant items is going to inevitably result in a larger
    DCG@k. For instance, if in for example, just consider k = 4, we would end up with
    a DCG@4 = 28.19\. Similarly, DCG@6 would be higher and so on. As k increases,
    DCG@k typically increases, since we include more results, unless additional items
    have zero relevance. Nonetheless, this doesn’t necessarily mean that its retrieval
    performance is superior. On the contrary, this rather causes a problem because
    it doesn’t allow us to compare retrieved sets with different k values based on
    DCG@k.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，DCG@k的一个主要问题是，正如你所看到的，它本质上是一个所有相关项目的和函数。因此，包含更多项目（更大的k）和/或更多相关项目的检索集将不可避免地导致更大的DCG@k。例如，如果我们考虑k
    = 4，我们最终会得到DCG@4 = 28.19。同样，DCG@6会更高，依此类推。随着k的增加，DCG@k通常会增加，因为我们包括了更多的结果，除非有额外的项目为零相关。然而，这并不一定意味着其检索性能更优越。相反，这反而造成了一个问题，因为它不允许我们根据DCG@k比较不同k值的检索集。
- en: This issue is effectively solved by the next graded measure we are going to
    be discussing later on today – NDCG@k. But before that, we need to introduce IDCG@K,
    required for calculating NDCG@K.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题将通过我们今天稍后将要讨论的下一个分级度量来解决，那就是NDCG@k。但在那之前，我们需要介绍IDCG@K，它是计算NDCG@K所必需的。
- en: 🎯 Ideal Discounted Cumulative Gain (IDCG@k)
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🎯 理想折现累积增益 (IDCG@k)
- en: 'Ideal Discounted Cumulative Gain (IDCG@k), as its name suggests, is the DCG
    we would get in the ideal situation where our retrieved set is perfectly ranked
    based on the retrieved results’ relevance. Let’s see what the IDCG for our example
    would be:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 理想折现累积增益 (IDCG@k)，正如其名所示，是在我们的检索集根据检索结果的相关性完美排名的理想情况下我们会得到的DCG。让我们看看我们例子的IDCG会是什么：
- en: '![](../Images/6ade7fa2e57c96ac5ed685c5b1407864.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6ade7fa2e57c96ac5ed685c5b1407864.png)'
- en: Image by author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Apparently, for a fixed k, IDCG@k is going to always be equal to or larger than
    any DCG@k, since it represents the score for a perfect retrieval and ranking of
    results for a certain k.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，对于固定的k，IDCG@k将始终等于或大于任何DCG@k，因为它代表了一个完美检索和基于检索结果相关性的排名的得分数。
- en: Finally, we can now calculate Normalized Discounted Cumulative Gain (NDCG@k),
    using DCG@k and IDCG@k.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们现在可以使用DCG@k和IDCG@k来计算标准化折现累积增益 (NDCG@k)。
- en: 🎯 Normalized Discounted Cumulative Gain (NDCG@k)
  id: totrans-32
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🎯 标准化折现累积增益 (NDCG@k)
- en: 'Normalized Discounted Cumulative Gain (NDCG@k) is essentially a normalised
    expression of DCG@k, solving our initial problem and rendering it comparable for
    different retrieved set sizes k. We can calculate NDCG@k with this straightforward
    formula:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 标准化折现累积增益 (NDCG@k) 实质上是DCG@k的一个标准化表达式，解决了我们最初的问题，并使其对于不同检索集大小k的可比性。我们可以用这个简单的公式来计算NDCG@k：
- en: '![](../Images/23f9d179ab48040dc19e234dac1a442f.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23f9d179ab48040dc19e234dac1a442f.png)'
- en: Image by author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Basically, NDCG@k allows us to quantify how close our current retrieval and
    ranking is to the ideal one, for a given k. This conveniently provides us with
    a number that *is* comparable for different values of k. In our example, NDCG@k=5
    would be:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，NDCG@k允许我们量化我们的当前检索和排序与理想值之间的接近程度，对于给定的k。这方便地为我们提供了一个可以比较不同k值的数字。在我们的例子中，NDCG@k=5将是：
- en: '![](../Images/7435668b0b75b0f15be50196ba50ba7b.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7435668b0b75b0f15be50196ba50ba7b.png)'
- en: Image by author
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In general, NDCG@k can range from 0 to 1, with 1 representing a perfect retrieval
    and ranking of the result, and 0 indicating a complete mess.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，NDCG@k的值可以从0到1，其中1表示完美的检索和结果排序，而0则表示完全混乱。
- en: So, how do we actually calculate DCG and NDCG in Python?
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，我们如何在Python中实际计算DCG和NDCG呢？
- en: If you’ve read my [other RAG tutorials](https://towardsdatascience.com/rag-explained-reranking-for-better-answers/),
    you know this is where the **War and Peace** example would usually come in. Nonetheless,
    this code example is getting too massive to include in every post, so instead
    I’m going to show you how to calculate DCG and NDCG in Python, doing my best to
    keep this post at a reasonable length.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你阅读过我的[其他RAG教程](https://towardsdatascience.com/rag-explained-reranking-for-better-answers/)，你知道通常在这里会有一个**《战争与和平》**的例子。不过，这个代码示例太大，无法包含在每一篇文章中，所以我会展示如何在Python中计算DCG和NDCG，尽量保持这篇文章的长度合理。
- en: To calculate these retrieval metrics, we first need to define a ground truth
    set, [exactly as we did in Part 1](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)
    when calculating Precision@K and Recall@K. The difference here is that, instead
    of characterising each retrieved chunk as relevant or not, using binary relevances
    (0 or 1), we now assign to it a graded relevance score; for example, from completely
    irrelevant (0), to super relevant (5). Thus, our ground truth set would include
    the text chunks that have the highest graded relevance scores for each query.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算这些检索指标，我们首先需要定义一个真实集，[正如我们在第1部分中所做的那样](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)，当计算Precision@K和Recall@K时。这里的区别在于，我们不是用二进制相关性（0或1）来描述每个检索到的块是否相关，而是给它分配一个分级的相关性评分；例如，从完全不相关（0）到超级相关（5）。因此，我们的真实集将包括每个查询具有最高分级相关性评分的文本块。
- en: For instance, for a query like *“Who is Anna Pávlovna?”*, a retrieved chunk
    that perfectly matches the answer might receive a score of 3, one that partially
    mentions the needed information could get a 2, and a completely unrelated chunk
    would get a relevance score equal to 0\.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对于一个像“安娜·帕夫洛夫娜是谁？”这样的查询，一个完美匹配答案的检索到的块可能会得到3分，一个部分提及所需信息的块可能会得到2分，而一个完全不相关的块将得到0分的相关性评分。
- en: 'Using these graded relevance lists for a retrieved result set, we can then
    calculate DCG@k, IDCG@k, and NDCG@k. We’ll use Python’s `math` library to handle
    the logarithmic terms:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些分级相关性列表来计算检索结果集的DCG@k、IDCG@k和NDCG@k。我们将使用Python的`math`库来处理对数项：
- en: '[PRE0]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'First of all, we can define a function for calculating **DCG@k** as follows:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们可以定义一个计算**DCG@k**的函数，如下所示：
- en: '[PRE1]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We can also calculate **IDCG@k** applying a similar logic. Essentially, **IDCG@k**
    is **DCG@k** for a perfect retrieval and ranking; thus, we can easily calculate
    it by calculating **DCG@k** after sorting the results by descending relevance.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以通过类似的逻辑计算**IDCG@k**。本质上，**IDCG@k**是完美检索和排序的**DCG@k**；因此，我们可以通过在按相关性降序排序结果后计算**DCG@k**来轻松计算它。
- en: '[PRE2]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Finally, after we have calculated **DCG@k** and **IDCG@k**, we can also easily
    calculate **NDCG@k** as their function. More specifically:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在计算了**DCG@k**和**IDCG@k**之后，我们也可以很容易地通过它们的函数计算**NDCG@k**。更具体地说：
- en: '[PRE3]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'As explained, each of these functions takes as input a list of graded relevance
    scores for retrieved chunks. For instance, let’s suppose that for a specific query,
    ground truth set, and retrieved results test, we end up with the following list:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如所述，这些函数中的每一个都接受一个检索到的块的相关性评分列表作为输入。例如，假设对于特定的查询、真实集和检索结果测试，我们得到以下列表：
- en: '[PRE4]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Then, we can calculate the graded retrieval metrics using our functions <mdspan
    datatext="el1762808668418" class="mdspan-comment">as follows</mdspan>:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以使用我们的函数<mdspan datatext="el1762808668418" class="mdspan-comment">如下计算分级检索指标：
- en: '[PRE5]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: And that was that! This is how we get our graded retrieval performance measures
    for our RAG pipeline in Python.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！这就是我们如何在Python中为我们的RAG管道获取分级检索性能指标的方法。
- en: Finally, similarly to all other retrieval performance metrics, we can also average
    the scores of a metric across different queries to get a more representative overall
    score.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，类似于所有其他检索性能指标，我们也可以对不同查询的指标分数进行平均，以获得更具代表性的整体分数。
- en: On my mind
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在我心目中
- en: Today’s post about the graded relevance measures concludes my post series about
    the most commonly used metrics for evaluating the retrieval performance of RAG
    pipelines. In particular, throughout this post series, we explored binary measures,
    order-unaware and order-aware, as well as graded measures, gaining a holistic
    view of how we approach this. Apparently, there are lots of other things that
    we can look at in order to evaluate a retrieval mechanism of a RAG pipeline, as
    for instance, latency per query or context tokens sent. Nonetheless, the measures
    I went over in these posts cover the fundamentals for evaluating retrieval performance.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 今天这篇关于分级相关度测量的帖子标志着我对RAG管道检索性能最常用指标系列帖子的结束。特别是，在整个帖子系列中，我们探讨了二元度量、无序和有序度量，以及分级度量，从而全面了解了我们如何处理这个问题。显然，我们还可以从许多其他方面来评估RAG管道的检索机制，例如每个查询的延迟或发送的上下文标记。尽管如此，我在这些帖子中提到的指标涵盖了评估检索性能的基础。
- en: This allows us to quantify, evaluate, and ultimately improve the performance
    of the retrieval mechanism, ultimately paving the way for building an effective
    RAG pipeline that produces meaningful answers, grounded in the documents of our
    choice.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我们能够量化、评估，并最终提高检索机制的性能，最终为构建一个有效的RAG管道铺平道路，该管道能够基于我们选择的文档产生有意义的答案。
