  zh: '*确保也查看前几部分*：'
- en: '👉***Part 1: [Precision@k, Recall@k, and F1@k](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)***'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 👉***第一部分：[Precision@k, Recall@k, 和 F1@k](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)***
- en: '👉*[**Part 2: Mean Reciprocal Rank (MRR) and Average Precision (AP)**](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/)*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 👉*[**第二部分：平均倒数排名（MRR）和平均精度（AP）**](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/)*
- en: <mdspan datatext="el1762808739563" class="mdspan-comment">In the previous parts</mdspan>
    of my post series on retrieval evaluation measures for RAG pipelines, we took
    a detailed look at the binary retrieval evaluation metrics. More specifically,
    in Part 1, we went over binary, order-unaware retrieval evaluation metrics, like
    HitRate@K, Recall@K, Precision@K, and F1@K. Binary, order-unaware retrieval evaluation
    metrics are essentially the most basic type of measures we can use for scoring
    the performance of our retrieval mechanism; they just classify a result either
    as relevant or irrelevant, and evaluate if relevant results make it to the retrieved
    set.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762808739563" class="mdspan-comment">在我关于RAG管道检索评估指标的系列文章的前几部分中</mdspan>，我们详细探讨了二值检索评估指标。更具体地说，在第一部分，我们讨论了二值、无序检索评估指标，如HitRate@K、Recall@K、Precision@K和F1@K。二值、无序检索评估指标基本上是我们可以用作评估检索机制性能的最基本类型的指标；它们只是将结果分类为相关或不相关，并评估相关结果是否出现在检索集中。
- en: Then, in part 2, we reviewed binary, order-aware evaluation metrics like Mean
    Reciprocal Rank (MRR) and Average Precision (AP). Binary, order-aware measures
    categorise results either as relevant or irrelevant and check if they appear in
    the retrieval set, but on top of this, they also quantify how well the results
    are ranked. In other words, they also take into account the ranking with which
    each result is retrieved, apart from whether it is retrieved or not in the first
    place.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在第二部分，我们回顾了二值、有序评估指标，如平均倒数排名（MRR）和平均精度（AP）。二值、有序指标将结果分类为相关或不相关，并检查它们是否出现在检索集中，但除此之外，它们还量化了结果的排名情况。换句话说，它们还考虑了每个结果检索时的排名，而不仅仅是它是否被检索。
- en: In this final part of the retrieval evaluation metrics post series, I’m going
    to further elaborate on the other large category of metrics, beyond binary metrics.
    That is, ***graded metrics***. Unlike binary metrics, where results are either
    relevant or irrelevant, for graded metrics, relevance is rather a spectrum. In
    this way, the retrieved chunk can be ***more or less relevant*** to the user’s
    query.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在检索评估指标系列文章的最后一部分，我将进一步阐述其他大型指标类别，超越二值指标。那就是，***分级指标***。与结果要么相关要么不相关的二值指标不同，对于分级指标，相关性更像是一个连续体。这样，检索到的片段可以与用户的查询有***更多或更少的相关性***。
- en: Two commonly used graded relevance metrics that we are going to be taking a
    look at in today’s post are Discounted Cumulative Gain (DCG@K) and Normalized
    Discounted Cumulative Gain (NDCG@k).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天这篇文章中，我们将探讨两种常用的分级相关性指标：折算累积收益（DCG@K）和标准化折算累积收益（NDCG@k）。
