- en: What I Learned in my First 18 Months as a Freelance Data Scientist
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我作为自由职业数据科学家前18个月学到的经验
- en: 原文：[https://towardsdatascience.com/what-i-learned-in-my-first-18-months-as-a-freelance-data-scientist-the-taxes-and-health-insurance-edition/](https://towardsdatascience.com/what-i-learned-in-my-first-18-months-as-a-freelance-data-scientist-the-taxes-and-health-insurance-edition/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[我在作为自由职业数据科学家前18个月学到的经验：税收和医疗保险篇](https://towardsdatascience.com/what-i-learned-in-my-first-18-months-as-a-freelance-data-scientist-the-taxes-and-health-insurance-edition/)'
- en: <mdspan datatext="el1751607141925" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751607141925" class="mdspan-comment">引言</mdspan>
- en: It has been nearly 18 months since I started up my freelancing career — I can
    hardly believe it! When I first got started, I thought I had an idea of how things
    would evolve. In some ways I was right and in some ways I was wrong. You can read
    about the early days of my freelancing in my [first](https://towardsdatascience.com/what-i-learned-in-my-first-3-months-as-a-freelance-data-scientist-8e3417ff8165/)
    and [second](https://towardsdatascience.com/what-i-learned-in-my-first-9-months-as-a-freelance-data-scientist-f7401382dc62/)
    posts on the subject. In those blog posts I was just starting out and getting
    my feet under me. I still had many questions and, in fact, said I would write
    a new post after some crucial milestones (*ahem*, paying my first year of taxes).
    So in this post I am looking to fill in some of those gaps that I couldn’t answer
    a year ago. But I also have learned a lot of unexpected things over the past several
    months, particularly as I have met with more people who are either already freelancing
    or are considering it. So I wanted to capture that information as well.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我开始我的自由职业生涯已经快18个月了——我简直不敢相信！当我刚开始的时候，我以为我对事情会如何发展有一个想法。在某些方面我是对的，在某些方面我是错的。你可以通过阅读我在这个主题上的[第一篇](https://towardsdatascience.com/what-i-learned-in-my-first-3-months-as-a-freelance-data-scientist-8e3417ff8165/)和[第二篇](https://towardsdatascience.com/what-i-learned-in-my-first-9-months-as-a-freelance-data-scientist-f7401382dc62/)博客文章来了解我自由职业的早期情况。在那篇博客文章中，我刚开始起步，正在站稳脚跟。我还有很多问题，实际上，我说过在达到一些关键里程碑（嗯哼，支付第一年的税收）之后我会写一篇新的文章。所以在这篇文章中，我想填补一些我一年前无法回答的空白。但我也在过去的几个月里学到了很多意想不到的东西，尤其是在我遇到了更多已经自由职业或正在考虑这样做的人。所以我想捕捉这些信息。
- en: How We Got to Where We are Today
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们是如何走到今天的
- en: In December of 2023 I launched my own “solopreneur” business. There we are a
    lot of reasons I went this route. Perhaps the biggest of them was that the job
    market at the time was pretty terrible (and it is even worse as I write this article).
    I had been looking for a new job for several months, but nobody was hiring. I
    am a Gen X-er and my generation has been hit pretty hard by tech layoffs and the
    rampant [ageism](https://www.forbes.com/sites/jackkelly/2025/04/01/generation-x-at-work-confronting-ageism-competition-and-a-challenging-job-market/)
    that is [common among tech companies](https://www.wired.com/story/ageism-haunts-tech-workers-layoffs-race-to-get-hired/).
    It was a hard pill to swallow having over 20 years of experience in the field
    and yet being viewed as someone who could not learn and adapt to the ever-changing
    tech landscape.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年12月，我启动了自己的“单打独斗”企业。我选择这条道路有很多原因。其中最大的原因可能是当时的工作市场相当糟糕（而且在我写这篇文章的时候变得更糟）。我已经找了几个月的新工作，但没有人招聘。我是一个X世代的人，我的这一代人受到了科技裁员和科技公司在职场上普遍存在的[年龄歧视](https://www.forbes.com/sites/jackkelly/2025/04/01/generation-x-at-work-confronting-ageism-competition-and-a-challenging-job-market/)的严重影响。尽管我在这个领域有超过20年的经验，但仍然被视为一个无法学习和适应不断变化的科技景观的人，这对我来说是很难接受的。
- en: '![](../Images/87eef18a17d198791be5e822dad809a0.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/87eef18a17d198791be5e822dad809a0.png)'
- en: Image by author with ChatGPT-4o.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 作者与ChatGPT-4o合作的照片。
- en: At the same time, I also really wanted to craft a different life for myself.
    My burnout and stress level in corporate had really gotten out of hand. It had
    gotten so bad that I had not been able to swallow solid food for months. I would
    regularly get hives and cellulitis requiring medical intervention, particularly
    if I had to go into the office. I wasn’t sleeping, I wasn’t doing anything outside
    of work like hobbies (because I was always at work and even when I wasn’t, I couldn’t
    unplug), and my mental health had really taken a nose dive. I knew something needed
    to change and, for a long time, had bought into the fallacy that a “change” would
    be to find a different company to work for. However, in interview after interview
    across my career, I discovered it was pretty rare to find a place that shared
    my views on work and its relationship to life. **I work to live**, meaning work
    is the thing that I do in order to afford my life. **I do NOT live to work**.
    Some people do. Some people are happy being completely chained to their desks,
    having themselves and their existence tied to their jobs. Some people just really
    enjoy working on a problem morning, noon, and night. I am not one of them. I have
    a family that needs me, friends I like to hang out with, and I have hobbies I
    enjoy. And I wasn’t getting to do any of that. After one particularly bad day
    at work, I came to the realization that I could actually create that work environment
    I was looking for rather than trying (in vain) to find it.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，我也非常想为自己打造一种不同的生活。我在企业中的倦怠和压力水平已经失控。情况已经糟糕到几个月来我无法吞咽固体食物。我经常会出现荨麻疹和蜂窝织炎，需要医疗干预，尤其是当我不得不去办公室的时候。我睡不着觉，除了工作之外不做任何事（因为我总是工作，即使我不在工作，我也无法放松），我的心理健康状况急剧下降。我知道需要改变，长期以来，我一直相信“改变”就是找到一家不同的公司去工作。然而，在我的职业生涯中，一次又一次的面试让我发现，找到一个与我关于工作和生活关系的观点相一致的地方是非常罕见的。**我工作是为了生活**，这意味着工作是我为了支付生活费用而做的事情。**我不是为了工作而生活**。有些人就是这样。有些人乐于完全被他们的办公桌束缚，他们的存在与他们的工作紧密相连。有些人真的很喜欢从早到晚解决问题。我不是这样的人。我有一个需要我的家庭，有一些我喜欢与之交往的朋友，还有一些我喜欢的爱好。而我却无法做到这些。在特别糟糕的工作日之后，我意识到我实际上可以创造出我一直在寻找的工作环境，而不是徒劳地试图找到它。
- en: 'Another factor that kept me tied so long to corporate work was the fact that
    I am the primary (and sometimes sole, since my spouse works a seasonal job) breadwinner
    for my family. So there was certainly fear in going into this. I viewed working
    for a company as being the only possible stable income. And yet we have recently
    seen corporate layoff after corporate layoff in order to try and save the company
    a little more money and make the shareholders happy. *(Brief aside: do you remember
    when Wall Street used to punish companies who did that??? Ah, the good ole days.)*
    We have even seen the historically incredibly safe US government jobs become plagued
    with layoffs. So I humbly suggest that this view of corporate employment as being
    “safe” is just an illusion.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个让我长时间与企业工作联系在一起的因素是，我是家庭的主要（有时是唯一，因为我的配偶从事季节性工作）经济支柱。所以进入这个领域确实有恐惧。我认为为一家公司工作是唯一可能的稳定收入。然而，我们最近看到公司接二连三地裁员，试图为公司节省一点钱，让股东们高兴。（简短插话：你还记得华尔街曾经惩罚那些这样做公司的日子吗？？？啊，那些美好的日子。)*
    我们甚至看到历史上极其安全的美国政府工作也受到了裁员的影响。所以我谦逊地建议，这种将企业就业视为“安全”的观点只是一个错觉。
- en: So in discussion with my spouse, we decided that I would go solo. I created
    an LLC to take on work and reached out to my network via a LinkedIn post to let
    them know what I was doing to try and drum up business.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 所以在与配偶的讨论中，我们决定我独自行动。我成立了一家有限责任公司来承接工作，并通过LinkedIn帖子联系我的网络，让他们知道我在做什么，试图吸引生意。
- en: Fast forward 18 months. I have been happily employed in the freelance world
    with a small handful of clients. Working with my network, I was very fortunate
    in that I was able to easily replace my corporate salary. Better yet, I am doing
    it on my own terms. The things I hated about working in corporate (meaningless
    performance reviews for a raise less than the increase in the cost of living,
    ridiculous required “don’t stare into the sun” trainings, asking permission to
    do the most mundane of things like buy a book for my continuing education or attend
    a conference that I had been asked to speak at, etc.) are now long in the past.
    Good riddance! And I am also pleased to report that I did manage to get my health
    (mental and physical) back in check. It took a few months, but I began to be able
    to swallow solid food and started living my life again.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 快进18个月。我在自由职业者的世界里快乐地工作，客户数量不多。通过与我的网络合作，我非常幸运，能够轻松地替代我的公司薪水。更好的是，我是按照自己的条件来做这件事的。我讨厌在公司工作的那些事情（为了微薄的加薪而进行的毫无意义的绩效评估，荒谬的“不要直视太阳”培训，为了做一些最平凡的事情如购买继续教育的书籍或参加我被邀请演讲的会议而请求许可等等）现在都已烟消云散。再见了！我还很高兴地报告，我确实设法让我的健康（精神和身体）回到了正轨。这花了几个月的时间，但我开始能够吞咽固体食物，又开始过我的生活了。
- en: '![](../Images/f97df6342b1012506831d526591b746e.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f97df6342b1012506831d526591b746e.png)'
- en: Image created by author with ChatGPT-4o.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者使用ChatGPT-4o创建的图像。
- en: 'Health Insurance: The 800 lb. Gorilla in the Room'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 健康保险：房间里的大猩猩
- en: What follows is going to be a very US-centric perspective on freelancing. I
    envy those of you who live in countries that provide you with health insurance.
    Here in the US, where I am presently based, we are not as fortunate. Health insurance
    is *expensive.* And, in fact, its cost keeps many people from freelancing.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将提供一个非常以美国为中心的自由职业者视角。我羡慕那些生活在提供健康保险的国家的人们。在这里，我目前所在的美国，我们并不那么幸运。健康保险是**昂贵的**。事实上，它的成本阻止了许多人从事自由职业。
- en: We are fortunate in that my spouse’s seasonal job offers us health insurance
    during the season (the winter ski season). However, that season is only 7 months
    of the year. This means that we had to figure out what to do for the other 5 months.
    During my first year working as a freelancer, I had to have knee surgery while
    still on that insurance. This meant that I had reached my maximum out-of-pocket
    (OOP). We decided that we would put the family on COBRA during the off season.
    For those not familiar with COBRA, it is a US law that allows people to temporarily
    stay on their health insurance following the end of their employment so long as
    you pay your full monthly premiums, including the portion paid by your employer.
    We had decent insurance through my spouse’s company…certainly not C-suite level
    insurance, but pretty good. For our family of 3 (my spouse, myself, and my teenager),
    this came out to $3000/month. Yes, you read that right. It made sense at the time
    with the above logic, but had we really sat down and calculated out how much it
    saved us by me being at my maximum OOP, it really wasn’t the right decision.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很幸运，因为我的配偶的季节性工作在季节（冬季滑雪季节）期间为我们提供了健康保险。然而，这个季节只有一年中的7个月。这意味着我们不得不想出其他5个月怎么办。在我作为自由职业者工作的第一年，我还在那份保险下做了膝盖手术。这意味着我已经达到了我的最高自付额（OOP）。我们决定在淡季将全家都放在COBRA计划下。对于那些不熟悉COBRA的人来说，这是一项美国法律，允许人们在结束雇佣关系后暂时留在他们的健康保险计划中，只要你支付全额月保费，包括雇主支付的部分。通过我配偶的公司，我们得到了相当不错的保险……当然不是C级管理层水平的保险，但相当不错。对于我们这个三口之家（我的配偶、我自己和我的青少年），这每月的费用是3000美元。是的，你没看错。在当时，根据上述逻辑，这是合理的，但如果我们真的坐下来计算一下，由于我达到了最高自付额，我们实际上并没有节省多少，这并不是一个正确的决定。
- en: This year, we decided to go onto the open market, which you are allowed to do
    outside of the open enrollment period with a qualifying life event. (The end of
    my spouse’s seasonal job is considered to be one of those.) This brings our monthly
    bill to about $1000/month for the whole family.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 今年，我们决定进入公开市场，你可以在公开注册期之外，通过一个合格的生活事件来做这件事。（我配偶的季节性工作结束被认为是其中之一。）这使我们的全家每月账单降至大约1000美元。
- en: 'While it seems obvious that this would be the better choice, there are actually
    a lot of things to consider with this decision. For example, while the monthly
    premiums are less on the open market, the coverage is nowhere near as good as
    what we have during the season. Should you find yourself in this situation, I
    strongly recommend talking with an actual insurance broker to go over the pros
    and cons of each approach. Also, it is very important that said broker be located
    in your area. We talked with people in the closest major town (which is 2 hours
    away) who had no idea which healthcare providers *really* accept certain insurance
    in your area. Pro tip: just because the insurance provider’s webpage *says* a
    certain doctor is in network doesn’t make it so! These webpages are frequently
    out of date and are marketing tools: they know you want to see that a whole ton
    of doctors are covered in your area, even if they aren’t accepting that insurance
    anymore! Ask me how I know…'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这似乎是更好的选择，但实际上有很多事情需要考虑。例如，虽然市场上的月保费较低，但覆盖范围远远不如我们在旺季时的覆盖范围。如果你发现自己处于这种情况，我强烈建议与实际的保险经纪人交谈，讨论每种方法的优缺点。也非常重要的是，这位经纪人应该位于你的地区。我们与最近的主要城镇（距离2小时）的人交谈过，他们根本不知道你所在地区哪些医疗保健提供者**真正**接受某些保险。小贴士：即使保险提供商的网页**声称**某个医生在网内，这并不意味着真的是这样！这些网页通常过时，是营销工具：他们知道你希望看到你所在地区有大量的医生被覆盖，即使他们不再接受这种保险！问问我是怎么知道的…
- en: '![](../Images/e6f4ee0125554178081facdc45d16585.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e6f4ee0125554178081facdc45d16585.png)'
- en: Photo by [Jon Tyson](https://unsplash.com/@jontyson?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash) on [Unsplash](https://unsplash.com/photos/red-love-neon-light-signage-qAQsVsSxp_w?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Jon Tyson](https://unsplash.com/@jontyson?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/red-love-neon-light-signage-qAQsVsSxp_w?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: Taxes
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 税务
- en: 'Let me begin this section with the important caveat: I am not an accountant
    or an attorney. Everything I am about to say here is based on my experience and
    is my opinion. And, again, this is all going to be coming from a US perspective.
    DO NOT PURSUE A CAREER FREELANCING WITHOUT TAKING TO PROFESSIONALS IN BOTH OF
    THESE ARENAS!!!'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我从一条重要的警告开始这个部分：我既不是会计师也不是律师。我即将在这里说的每一件事都是基于我的经验，是我的观点。而且，再次强调，这一切都将从美国的角度出发。在没有咨询这两个领域的专业人士的情况下，**不要追求自由职业者的职业生涯**！！！
- en: OK…now with that out of the way…
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧…现在我们已经把那部分说完了…
- en: I cannot stress strongly enough how important it is to set up your business
    properly so that you can get paid and pay taxes as you need to do. In discussion
    with my tax accountant and attorney back when I was getting started, we decided
    that my company would initially be set up as a single-member LLC. Let’s break
    that into pieces.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我强烈强调，正确设置你的业务是多么重要，这样你就可以在你需要的时候收到付款并支付税款。在我刚开始的时候，我和我的税务会计师和律师讨论后，我们决定我的公司最初将以单一成员有限责任公司（LLC）的形式设立。让我们把它分解成几个部分。
- en: 'First, let’s look at the most common business structures for freelancing work:
    LLCs and S-Corps. It is important to consider setting up under one of these structures
    because they give you legal liability protection. The last thing you want is some
    upset client trying to come after your personal assets because they are unhappy
    with your work!'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看自由职业工作中最常见的商业结构：有限责任公司（LLC）和S型公司。考虑在这些结构之一下设立是很重要的，因为它们为你提供了法律责任保护。你不想让某个不满意的客户试图追讨你的个人资产，因为他们对你的工作不满意！
- en: There are tax implications on which of these options you choose involving what
    portion of your income is subjected to self-employment tax, which is around 35%.
    Generally speaking though, LLCs are easy to set up and do not require corporate
    formalities like board meetings, corporate resolutions, etc. S-Corps require more
    formality, but the benefit there is that you only pay the self-employment tax
    on your salary, not on distributions. (Again, consult with the professionals to
    learn the ins and outs of that bit!)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你选择哪种选项，这些选项都有税务影响，涉及你的收入中有多少部分需要缴纳自雇税，大约是35%。然而，一般来说，有限责任公司（LLC）很容易设立，不需要像董事会会议、公司决议等公司正式程序。S型公司需要更多的正式性，但好处是你只需对你的薪水缴纳自雇税，而不是对分配缴纳。（再次提醒，请咨询专业人士了解这方面的细节！）
- en: I decided to go the easy LLC route. But regardless of what you decide, here
    are the things I learned from now having actually *done* my taxes for a year in
    this modality.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定走简单的有限责任公司（LLC）路线。但无论你做出什么决定，以下是我现在实际上已经在这个模式下为一年报税所学到的东西。
- en: You will need to file quarterly estimated payments on your income. When you
    are in corporate, your employer takes taxes out of every paycheck. When you work
    for yourself, that is not true. You need to make payments 4 times per year. Your
    accountant can help you work out what those payments will be.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你需要提交季度预估税款。当你处于公司职位时，你的雇主会从每一份工资中扣除税款。当你为自己工作时，情况并非如此。你需要每年支付四次款项。你的会计师可以帮助你计算出这些款项。
- en: 'ALWAYS keep your business finances 1000000% completely separate from your personal
    finances! This means you will want to have a business banking account and you
    will pay yourself (called “taking a draw”) from that account. Have a debit card
    associated with that account. Do not use that card for anything other than business
    expenses! Do not use your personal accounts for business expenses. Trust me: this
    will save you a TON of time at tax season!'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总是1000000%完全地将你的业务财务与个人财务分开！这意味着你将想要有一个业务银行账户，并且你会从这个账户中支付给自己（称为“提款”）。与该账户关联一张借记卡。不要用这张卡做任何除了业务费用以外的事情！不要用你的个人账户支付业务费用。相信我：这将在税务季节为你节省大量的时间！
- en: Get whatever bookkeeping software your accountant recommends and give them access
    to your books. In my case, my accountant prefers Xero. This software allows full
    adjudication of the books.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取你的会计师推荐的任何会计软件，并让他们有权访问你的账簿。在我的情况下，我的会计师更喜欢Xero。这款软件允许对账簿进行全面裁决。
- en: 'Your accountant will be preparing a 1040 Schedule C (“Profit or Loss From Business”)
    for you. The correct software choice from #3 will help them do this. Essentially,
    what you are preparing in this is a complete accounting of your business’ income,
    expenses, cost of goods sold, etc. With the proper software linked to your business
    banking account (and assuming that the *only* thing you do in that account is
    business related, *right???*), this is essentially prepared with the click of
    a button.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的会计师将为你准备1040表附表C（“业务利润或亏损”）。从第3步选择的正确软件将帮助他们完成这项工作。本质上，你在这里准备的是你业务收入、支出、商品销售成本等的完整会计记录。如果你的业务银行账户与适当的软件链接（并且假设你在该账户中做的唯一事情是与业务相关，*对吧？？？*），这基本上是一键准备。
- en: Keep. Receipts. For. EVERYTHING. Your business expenses are tax deductible.
    So is what you are paying out of pocket on health insurance. If you get audited,
    you will absolutely need these things. Get in the habit of just doing it.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存所有收据。你的业务费用是可抵扣的税款。你为健康保险支付的现金也是。如果你被审计，你绝对需要这些东西。养成这样做的习惯。
- en: Bear in mind that as your business becomes more complicated, so do your taxes.
    For example, I stated that my business is a sole proprietorship LLC, meaning I
    have no other employees. Over the past year I have had several people reach out
    to me asking if I could hire them into my business. There are significant tax
    implications in doing so and, as usual, I recommend talking with your accountant
    about them.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，随着你的业务变得更加复杂，你的税务也会变得更加复杂。例如，我提到我的业务是一家单一所有者有限责任公司（LLC），这意味着我没有其他员工。在过去的一年里，有几个人联系我，问我能否雇佣他们加入我的业务。这样做有重大的税务影响，并且，像往常一样，我建议你与你的会计师讨论这些问题。
- en: 'If there was one piece of advice I would have to get started right it would
    be this: I really can’t emphasize enough how important it is to **keep your business
    and personal finances separate**. The *only* time money should mix from your business
    bank account to your personal one is when you pay yourself. This will make your
    tax life infinitely easier when your accountant doesn’t have to try and create
    Schedule C from a whole series of bank accounts, weeding through what were actual
    business expenses and what were personal. And trust me…you want to keep your accountant
    happy!'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我有一些建议要开始，那就是这个：我真的无法强调得更多，保持你的业务和个人财务分开是多么的重要。唯一一次从你的业务银行账户向你的个人账户转账的时间是你支付给自己。当你的会计师不需要从一系列银行账户中创建附表C，从中筛选出实际业务费用和个人费用时，这会让你的税务生活变得无比简单。并且相信我……你想要让你的会计师开心！
- en: Concluding Thoughts
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结性思考
- en: There are many ways to start freelancing. You might be fortunate in finding
    a way to get started as a side hustle where you don’t have to worry yet about
    finding insurance yet or needing to fully replace your salary immediately. Or,
    like me, you might get thrown quickly into it full time. Regardless of how you
    get there, these are two of the biggest hurdles you must overcome to becoming
    successful in freelancing.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 开始自由职业有很多种方式。你可能很幸运地找到一种方式作为兼职开始，你不必担心还要找保险，或者需要立即完全替代你的薪水。或者，像我一样，你可能很快就会全身心投入其中。无论你是如何到达那里的，这些都是在自由职业中取得成功必须克服的两个最大障碍。
- en: The insurance question is potentially going to be changing soon due to the politics
    in the US right now and the uncertainty around the open market. As for taxes,
    I recommend quickly adapting the mindset that you are an official business, especially
    if you are going to go all in and freelance full time, and establish business
    formalities when it comes to finances immediately.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 由于目前美国的政治局势以及开放市场的不确定性，保险问题可能很快就会发生变化。至于税收，我建议你迅速调整心态，认为自己是正式的商务人士，尤其是如果你打算全身心投入并全职自由职业，那么在财务方面立即建立商务规范。
- en: I have been very fortunate in that things have been taking off for my business
    as I learn more about the needs of those interested in contracting with me. So
    hopefully I will have an update soon about some new ways I am looking to grow
    my business!
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常幸运，因为我随着对那些有兴趣与我签订合同的人的需求了解越来越多，我的业务正在蓬勃发展。所以，我希望很快就能更新一些我正在寻找的新方法来扩大我的业务！
