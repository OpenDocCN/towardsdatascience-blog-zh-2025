- en: How I Built Business-Automating Workflows with AI Agents
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用AI代理构建业务自动化工作流程
- en: 原文：[https://towardsdatascience.com/how-i-built-a-business-automating-workflows-with-ai-agents/](https://towardsdatascience.com/how-i-built-a-business-automating-workflows-with-ai-agents/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-i-built-a-business-automating-workflows-with-ai-agents/](https://towardsdatascience.com/how-i-built-a-business-automating-workflows-with-ai-agents/)
- en: <mdspan datatext="el1746588221730" class="mdspan-comment">AI agents</mdspan>
    and automation are no longer just a trend — they are transforming how companies
    operate.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746588221730" class="mdspan-comment">AI代理</mdspan>和自动化不再只是趋势 — 它们正在改变公司运营的方式。
- en: In a previous article, I shared several case studies of AI Agents supporting
    the sustainability roadmaps of small, medium and large companies.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的一篇文章中，我分享了几个关于AI代理支持小型、中型和大型公司可持续发展路线图的案例研究。
- en: '![](../Images/6639d366d3491642c4941b72cbb75a4e.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6639d366d3491642c4941b72cbb75a4e.png)'
- en: AI Agents for Sustainability — (Image by Samir Saci)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理助力可持续发展 — (图片由Samir Saci提供)
- en: This is part of a **4-month exploration** of how agentic AI can drive business
    digital transformations.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们对如何通过代理式AI推动业务数字化转型进行**4个月探索**的一部分。
- en: It all began when I discovered no-code tools like **n8n**, which allow you to
    design and automate powerful workflows with just a few clicks.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一切始于我发现像**n8n**这样的无代码工具，只需几点击就能设计和自动化强大的工作流程。
- en: '![](../Images/5e8c213d0e0af57ac07066ab7bffba73.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5e8c213d0e0af57ac07066ab7bffba73.png)'
- en: Example of Workflows Designed with n8n — (Image by Samir Saci)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 使用n8n设计的流程示例 — (图片由Samir Saci提供)
- en: 'My co-founder summed up the opportunity perfectly:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我的联合创始人完美地总结了这个机会：
- en: '*“We need a method to deploy simple and efficient solutions to scale our offer
    of analytics and automation.”*'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“我们需要一种方法来部署简单高效解决方案，以扩展我们的分析和自动化产品。”*'
- en: So we got to work.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们开始着手工作。
- en: We built case studies and prototypes to show how these AI agents can help customers
    accelerate digital transformation.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建了案例研究和原型，以展示这些AI代理如何帮助客户加速数字化转型。
- en: Today, AI agents for workflow automation **represent over 60% of our revenue.**
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，用于工作流程自动化的AI代理代表了我们的收入超过**60%**。
- en: In this article, I want to share the inside story of our explorative journey
    and how we turned this opportunity into a business so you can learn to replicate
    our approach.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我想分享我们探索之旅的内幕故事以及我们如何将这个机会转化为业务，以便你可以学习复制我们的方法。
- en: Far from buzzwords and clickbait articles, we will take a pragmatic approach
    to explaining how these tools can bring added value to businesses without selling
    dreams.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 远离热门词汇和点击诱饵文章，我们将采取实用主义的方法来解释这些工具如何为业务带来附加价值，而不只是推销梦想。
- en: In short, we will cover
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，我们将涵盖
- en: '**What types of examples and case studies we shared** to attract customers'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们分享了哪些类型的示例和案例研究**来吸引客户'
- en: '**The problems prospects brought to us** (and how we listen to their needs)'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在客户向我们提出的问题** (以及我们如何倾听他们的需求)'
- en: '**How do we sell these solutions** ***(**ROI arguments and business impact)*'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们如何销售这些解决方案** ***(**投资回报率和业务影响)*'
- en: If you’ve been wondering how to turn automation and AI agents into a profitable
    service, this article is a good inspiration to start investigating.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你一直在想如何将自动化和AI代理转化为盈利性服务，这篇文章是开始调查的好灵感。
- en: How Case Studies Brought Customers to Our Door
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究如何吸引客户
- en: Learning by doing
  id: totrans-23
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 通过实践学习
- en: When I want to learn a new tool, I create **case studies.**
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当我想学习一个新工具时，我会创建**案例研究**。
- en: When OpenAI released its first GPT API, I started exploring LangChain [with
    a case study shared in this blog.](https://towardsdatascience.com/leveraging-llms-with-langchain-for-supply-chain-analytics-a-control-tower-powered-by-gpt-21e19b33b5f0/)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当OpenAI发布了其首个GPT API时，我开始探索LangChain [并在本博客中分享了一个案例研究。](https://towardsdatascience.com/leveraging-llms-with-langchain-for-supply-chain-analytics-a-control-tower-powered-by-gpt-21e19b33b5f0/)
- en: '![](../Images/0f5d9b4c20e9acefbf19f1c60b2336cb.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0f5d9b4c20e9acefbf19f1c60b2336cb.png)'
- en: '[Example of the case study I used to explore LangChain in 2023](https://towardsdatascience.com/leveraging-llms-with-langchain-for-supply-chain-analytics-a-control-tower-powered-by-gpt-21e19b33b5f0/) — (Image
    by Samir Saci)'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[我用于探索LangChain的2023年案例研究示例](https://towardsdatascience.com/leveraging-llms-with-langchain-for-supply-chain-analytics-a-control-tower-powered-by-gpt-21e19b33b5f0/) — (图片由Samir Saci提供)'
- en: It’s my favourite way to turn curiosity into hands-on expertise.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我将好奇心转化为实际技能的最爱方式。
- en: Therefore, my blog contains over **70 case studies** covering analytics for
    supply chain optimisation, logistics cost reduction, and sustainability.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我的博客包含超过**70个案例研究**，涵盖了供应链优化、物流成本降低和可持续性分析。
- en: 'So when I discovered AI-powered workflow automation with n8n, I **replicated
    this proven process**:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当我发现n8n的AI驱动的流程自动化时，我**复制了这个经过验证的过程**：
- en: Learn the basics of the tool
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习工具的基本知识
- en: Pick an example of an operational or business problem from the multiple projects
    I conducted in the past.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从我过去进行的多个项目中挑选一个运营或业务问题作为例子。
- en: Build a prototype and measure its impact
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建原型并衡量其影响
- en: Publish a case study
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发布案例研究
- en: My n8n creator profile became a playground to connect business and operational
    problems with real-world solutions.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我的n8n创建者个人资料成为了一个连接业务和运营问题与实际解决方案的游乐场。
- en: '![](../Images/08ee5777eb1264877b5fe8b49ec9436a.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/08ee5777eb1264877b5fe8b49ec9436a.png)'
- en: Samir Saci n8n [creator profile](https://n8n.io/creators/samirsaci/) — (Image
    by Samir Saci)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Samir Saci n8n [创建者个人资料](https://n8n.io/creators/samirsaci/)（图片由Samir Saci提供）
- en: This approach sharpened my skills and became a boost to attract customers looking
    for practical solutions to their problems.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法磨练了我的技能，并成为吸引寻找解决他们问题实际方案的客户的助推器。
- en: How to select your first case study?
  id: totrans-39
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 如何选择你的第一个案例研究？
- en: I started by focusing on the **most significant pain points** I had seen during
    my 9+ years in logistics — across 3PLs, FMCG companies, and luxury brands.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先关注我在物流行业9+年期间看到的**最显著的痛点**——跨越3PL、快速消费品公司和奢侈品牌。
- en: What manual processes were draining productivity and limiting capacity?
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 哪些手动流程正在消耗生产力并限制容量？
- en: One example that came to mind was from the **distribution operations** of a
    fashion company in China.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子来自中国一家时尚公司的**分销运营**。
- en: '![](../Images/a19562b58135f7e4ff3db98ba3d0cdb3.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a19562b58135f7e4ff3db98ba3d0cdb3.png)'
- en: CAD model of the reception area of the warehouse — (Image by Samir Saci)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 仓库接待区的CAD模型（图片由Samir Saci提供）
- en: The pallets, shipped from Europe, were delivered by a truck in the morning.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从欧洲运来的托盘在早上由卡车交付。
- en: Unfortunately, we were not connected to the supplier via [Electronic Data Interchange
    (EDI).](https://towardsdatascience.com/what-is-edi-electronic-data-interchange-92f7215bb699#:~:text=Electronic%20Data%20Interchange%20(EDI)%20is,EDI%20%E2%80%93%20(Image%20by%20Author))
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们没有通过[电子数据交换（EDI）](https://towardsdatascience.com/what-is-edi-electronic-data-interchange-92f7215bb699#:~:text=Electronic%20Data%20Interchange%20(EDI)%20is,EDI%20%E2%80%93%20(Image%20by%20Author))与供应商连接。
- en: We had to rely on email exchanges to know what we would receive.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须依赖电子邮件交换来了解我们将收到什么。
- en: '![](../Images/87a35078e6fd29577c363237a4c14e9a.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87a35078e6fd29577c363237a4c14e9a.png)'
- en: Example of Email Received with Order Information — (Image by Samir Saci)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 带有订单信息的收到的电子邮件示例（图片由Samir Saci提供）
- en: 'This meant warehouse admins had to:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着仓库管理员必须：
- en: Review the emails coming from the customer’s logistics team.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查来自客户物流团队的电子邮件。
- en: Manually input order details into the system (PO number, delivery date, SKU
    ID, quantities)
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动将订单详情输入系统（采购订单号、交货日期、SKU ID、数量）
- en: '*What are the pain points here?*'
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这里的痛点是什么？*'
- en: This is a **bottleneck** for the reception process.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对接待流程的**瓶颈**。
- en: Indeed, if the orders are not keyed into the system, inbound teams cannot receive
    the pallets.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 的确，如果订单没有输入到系统中，进货团队将无法接收托盘。
- en: But more importantly, this manual process **impacts the productivity of admin
    teams** that spend time on tasks that do not provide added value.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 但更重要的是，这个手动流程**影响了花费时间在无增值任务上的管理员团队的生产力**。
- en: '![](../Images/5063c8a5b6e8fc4aae630a1c121681a5.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5063c8a5b6e8fc4aae630a1c121681a5.png)'
- en: Workflow designed to automate this process with n8n using GPT-4o — (Image by
    Samir Saci)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GPT-4o和n8n自动化此流程的工作流程设计（图片由Samir Saci提供）
- en: Therefore, I used this example to build my first n8n automation.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我使用这个例子来构建我的第一个n8n自动化。
- en: It is a simple workflow connected to Gmail that automatically analyses all the
    emails related to inbound orders.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单的与Gmail连接的工作流程，它会自动分析所有与进货订单相关的电子邮件。
- en: A GPT-powered AI node analyses the content of the email to extract the order
    information.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由GPT驱动的AI节点分析电子邮件内容以提取订单信息。
- en: '![](../Images/d1ef924cb945435bd8e64d18981b111c.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d1ef924cb945435bd8e64d18981b111c.png)'
- en: Outputs with Dummy Data — (Image by Samir Saci)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 使用虚拟数据输出的示例（图片由Samir Saci提供）
- en: The output is saved in a spreadsheet ready to be loaded into the system by a
    script.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 输出保存在电子表格中，以便通过脚本加载到系统中。
- en: For more information about this workflow, check the complete tutorial here
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 有关此工作流程的更多信息，请在此处查看完整教程
- en: What happened after I published this workflow?
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 发布此工作流程后发生了什么？
- en: The Problems Clients Brought — and How We Solved Them
  id: totrans-67
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 客户带来的问题——以及我们是如何解决的
- en: After publishing, prospects from different industries and countries began seeking
    help with similar problems.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 发布后，来自不同行业和国家的潜在客户开始寻求帮助以解决类似问题。
- en: 'This is answering a common problem: **the lack of interconnectivity between
    systems.**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在回答一个常见问题：**系统之间缺乏互连性。**
- en: Before, companies would rely on manual work to bridge the gaps.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 以前，公司会依赖人工工作来填补差距。
- en: Now, we can deploy **AI agents** to automate those bridges.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以部署 **AI 代理**来自动化这些桥梁。
- en: '![](../Images/203e1f1b35222b421e9b6855e6799251.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/203e1f1b35222b421e9b6855e6799251.png)'
- en: What is Electronic Data Interchange (EDI) Article published in TDS — (Image
    by Samir Saci)
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是电子数据交换 (EDI) 文章发布在 TDS — (图片由 Samir Saci 提供)
- en: A furniture company in the Netherlands contacted us.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 荷兰的一家家具公司联系我们。
- en: A part of their value chain (small suppliers) wasn’t connected via EDI.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的价值链的一部分（小型供应商）没有通过 EDI 连接。
- en: Therefore, they relied on manual processes to send and receive orders.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，他们依赖人工流程来发送和接收订单。
- en: '![](../Images/8a88777008fe9c724cef3704e0ffc7b8.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8a88777008fe9c724cef3704e0ffc7b8.png)'
- en: Example of an Electronic Data Interchange message for a purchase order — (Image
    by Samir Saci)
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 采购订单的电子数据交换消息示例 – (图片由 Samir Saci 提供)
- en: 'After multiple interviews with their IT team, we learned:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在与他们的 IT 团队进行多次访谈后，我们了解到：
- en: The systems could **generate** EDI messages
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统可以**生成** EDI 消息
- en: But they couldn’t **receive** or process incoming messages
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 但他们无法**接收**或处理传入的消息
- en: '![](../Images/d2bda578368e15169619853fc319315a.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d2bda578368e15169619853fc319315a.png)'
- en: Example of EDI Message sent by email — (Image by Samir Saci)
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 通过电子邮件发送的 EDI 消息示例 – (图片由 Samir Saci 提供)
- en: Therefore, we have proposed a **workaround**
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们提出了一个**解决方案**
- en: The sender would generate the EDI message and send it via email
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送者会生成 EDI 消息并通过电子邮件发送
- en: An n8n workflow would collect the email, parse the content and save the outputs.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: n8n 工作流程会收集电子邮件，解析内容并保存输出。
- en: We have now removed a significant pain point for the customer by “partially”
    automating the process.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过“部分”自动化流程，为客户去除了一个重要的痛点。
- en: 'In this example, AI agents provide a great added value: adapting the tool to
    the format of the EDI message.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，AI 代理提供了巨大的附加价值：将工具调整到 EDI 消息的格式。
- en: '![](../Images/8ea94ff85e3107633667c4e08a498568.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8ea94ff85e3107633667c4e08a498568.png)'
- en: A non-exhaustive list of EDI message types – (Image by Samir Saci)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: EDI 消息类型的不完整列表 – (图片由 Samir Saci 提供)
- en: This makes the tool more robust and adaptable to the different systems their
    suppliers are using.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得工具更加健壮，并能够适应其供应商使用的不同系统。
- en: For more information on implementing this solution (with the template available),
    check this tutorial.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 有关实施此解决方案（附带模板）的更多信息，请查看此教程。
- en: 'This solution has multiple advantages:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 此解决方案具有多个优点：
- en: It is cheaper and easier to deploy than properly connecting the furniture company
    to each supplier.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与将家具公司正确连接到每个供应商相比，这更便宜、更容易部署。
- en: This improves the data quality and allows the company to allocate these data
    input teams to customer service.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这提高了数据质量，并允许公司将这些数据输入团队分配给客户服务。
- en: This was our first victory and proof that we can support businesses with simple
    solutions.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们第一次胜利，也是我们能够通过简单解决方案支持企业的证明。
- en: For the following projects, we developed a process to qualify customers and
    standardised the solutions design.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 对于以下项目，我们开发了一个流程来评估客户并标准化解决方案设计。
- en: '**Define the problem faced by the customer**'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义客户面临的问题**'
- en: → *We need to manually input orders received from suppliers.*
  id: totrans-99
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: → *我们需要手动输入从供应商收到的订单。*
- en: '**Find the root cause**'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**找出根本原因**'
- en: → *Absence of Electronic Data Interchange (EDI) connections*
  id: totrans-101
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: → *缺乏电子数据交换 (EDI) 连接*
- en: '**Design a solution**'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计解决方案**'
- en: → *AI-powered workflow automation to parse EDI messages.*
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: → *AI 驱动的流程自动化以解析 EDI 消息。*
- en: But, how do we sell these solutions?
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但是，我们如何销售这些解决方案？
- en: I’ll share our **method for selling these automation solutions in the next section**.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在下一节中分享我们销售这些自动化解决方案的方法。
- en: How We Sell These Solutions
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们如何销售这些解决方案
- en: 'After building and testing these automation prototypes, the next challenge
    was clear: **How do we position and sell these solutions to clients?**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建和测试这些自动化原型之后，下一个挑战清晰：**我们如何定位和向客户销售这些解决方案？**
- en: Considering that most of our leads come from my content ([Towards Data Science](https://towardsdatascience.com/author/s-saci95/),
    [YouTube](https://www.youtube.com/@SupplyScience), [n8n Creator Page](https://n8n.io/creators/samirsaci/)),
    we developed **three sales approaches adapted to the request** of the prospect.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到我们的大部分潜在客户都来自我的内容（[Towards Data Science](https://towardsdatascience.com/author/s-saci95/)，[YouTube](https://www.youtube.com/@SupplyScience)，[n8n
    Creator Page](https://n8n.io/creators/samirsaci/)），我们开发了**三种适应潜在客户需求的销售方法**。
- en: '![](../Images/09f8bfb4843dd115c2ac8e8755505708.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/09f8bfb4843dd115c2ac8e8755505708.png)'
- en: Our sales approach  adapted to the prospect’s request — (Image by Samir Saci)
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的销售方法——适应潜在客户的需求——(Samir Saci的图片)
- en: The idea is to adapt the sales pitch to clear business outcomes and return on
    investment (ROI).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 理念是将销售演讲调整为清晰的业务成果和投资回报率（ROI）。
- en: 'Approach 1: Automate to Improve Productivity'
  id: totrans-112
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 方法1：自动化以提高生产力
- en: This is the primary concern of our customers.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们客户的主要关注点。
- en: They are pressured to reduce costs by improving the productivity of their operators
    and admin teams.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 他们受到压力，需要通过提高操作员和行政团队的生产力来降低成本。
- en: 'Prospect: *“A customer service admin can process 6 orders per hour with our
    manual process. How many orders can you process with AI?”*'
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 潜在客户：“使用我们的人工处理流程，客户服务管理员每小时可以处理6个订单。使用AI你能处理多少订单？”
- en: 'When we have a customer with a case related to productivity, we focus our questions
    on:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们遇到与生产力相关的客户案例时，我们将我们的问题集中在：
- en: '**Defining the current workflow**, including every step with a detailed description
    (data input, outputs, systems used)'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义当前的工作流程**，包括每个步骤的详细描述（数据输入，输出，使用的系统）'
- en: '**Estimating the current productivity** (number of actions per hour) and the
    workforce cost ($/hour)'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**估算当前的生产力**（每小时的动作数量）和劳动力成本（$/小时）'
- en: For instance, an agency focusing on ESG consulting approached us to help them
    **automate their sustainability regulation monitoring process.**
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一家专注于ESG咨询的代理机构向我们寻求帮助，以帮助他们**自动化他们的可持续性法规监控流程**。
- en: They ask their highly skilled (high hourly cost) ESG analysts to **review the
    European Parliament’s activity reports** and select those related to sustainability.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 他们要求他们的高技能（高时薪）ESG分析师**审查欧洲议会的活动报告**并选择那些与可持续性相关的报告。
- en: 'Prospect: “We want these analysts to focus on tasks with higher added value.”'
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 潜在客户：“我们希望这些分析师专注于更高附加值的工作。”
- en: We developed a workflow to completely automate this process with an AI agent,
    providing a high return on investment.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开发了一个工作流程，使用AI代理完全自动化这个过程，提供高投资回报率。
- en: ROI = Time Saved × Hourly Rate of Analysts
  id: totrans-123
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 投资回报率 = 节省的时间 × 分析师的小时费率
- en: This simple calculation is key to convincing the decision maker that it is worth
    investing resources and money in implementing your automation.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的计算对于说服决策者投资资源并实施自动化是至关重要的。
- en: 'To our prospect: “This solution will save you XXX euros per month, you will
    recover your investment by YYY months.”'
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对我们的潜在客户说：“这个解决方案将为您每月节省XXX欧元，您将在YYY个月内收回投资。”
- en: For more information about this workflow, check the complete tutorial
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 有关此工作流程的更多信息，请查看完整的教程
- en: For some prospects, the priority is bringing more business; we can also use
    AI.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些潜在客户，优先考虑的是带来更多业务；我们也可以使用AI。
- en: 'Approach 2: Automate for Marketing & Promotion'
  id: totrans-128
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 方法2：自动化营销和推广
- en: In my startup, [LogiGreen](https://logi-green.com), we were the first users
    of this kind of workflow.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的初创公司[LogiGreen](https://logi-green.com)中，我们是这种工作流程的第一批用户。
- en: As a small structure, we don’t have the financial means to recruit a complete
    marketing and commercial.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个小型结构，我们没有足够的资金来招聘一个完整的营销和商业团队。
- en: How can we build an automated machine of content distribution to increase our
    reach?
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们如何构建一个自动化的内容分发机器来增加我们的覆盖范围？
- en: Therefore, we **rely on automation to promote our business **— a great way to
    create or curate engaging content.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们**依赖自动化来推动我们的业务**——这是一种创造或整理引人入胜内容的好方法。
- en: '![](../Images/0a157882cbc962dd5f4dbf6ef6e7b975.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0a157882cbc962dd5f4dbf6ef6e7b975.png)'
- en: 'Example of Automation: A Sustainability Newsletter — (Image by Samir Saci)'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化示例：可持续性通讯——(Samir Saci的图片)
- en: The screenshot above comes from an email generated by our fully automated newsletter.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的截图来自我们完全自动化的通讯生成的电子邮件。
- en: You can find links to our website in the header and footer.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以在页眉和页脚中找到我们网站的链接。
- en: The distribution list includes all our customers and prospects.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分发名单包括所有我们的客户和潜在客户。
- en: We use n8n with GPT-4o to automate this solution.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用n8n与GPT-4o自动化这个解决方案。
- en: '![](../Images/5dd72fa4b7b78b4f3c3c5d854a538d9a.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5dd72fa4b7b78b4f3c3c5d854a538d9a.png)'
- en: AI-Powered Workflow Automation — (Image by Samir Saci)
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: AI-Powered Workflow Automation — (图片由 Samir Saci 提供)
- en: This simple workflow uses **a classification agent to curate a list of articles
    related to sustainability** coming from multiple sources (EU news, specialised
    journals, social media).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的流程使用**分类代理**从多个来源（欧盟新闻、专业期刊、社交媒体）整理与可持续性相关的文章列表。
- en: '![](../Images/b56a0bbe2852675bc26077b6aff092ef.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b56a0bbe2852675bc26077b6aff092ef.png)'
- en: Example of articles that could be shared in this newsletter — (Image by Samir Saci)
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 可在此新闻通讯中分享的文章示例 – (图片由 Samir Saci 提供)
- en: The AI agent handles the editorial choices based on the instructions in its
    system prompt.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: AI 代理根据其系统提示中的说明处理编辑选择。
- en: '![](../Images/e5700c4c6f3bb260e6348d2752781a1f.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5700c4c6f3bb260e6348d2752781a1f.png)'
- en: An example of a system prompt used for the curation of articles – (Image by
    Samir Saci)
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 用于文章编纂的系统提示示例 – (图片由 Samir Saci 提供)
- en: It is an excellent way for **us to create an online community**, stay top of
    mind with our customers, and share engaging content.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们创建在线社区、保持客户关注并分享吸引人内容的好方法。
- en: 'To our prospects: “With this content creation machine, you can occupy the space,
    provide value and create an online community centered around your business.”'
  id: totrans-148
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 致我们的潜在客户：“有了这个内容创作机器，您可以在您的业务周围占据空间，提供价值，并创建一个在线社区。”
- en: We are now selling this “content creation machine” to our prospects!
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在正在向我们的潜在客户销售这款“内容创作机器”！
- en: For more information about this “automated newsletter”, check the video below
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 想了解更多关于这个“自动化新闻通讯”的信息，请查看下面的视频
- en: Some prospects that contacted us said their top priority is not just productivity
    or marketing.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 一些与我们联系的客户表示，他们的首要任务不仅仅是生产效率或市场营销。
- en: 'Approach 3: Automate for Quality and Error Reduction'
  id: totrans-152
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 方法3：自动化以提高质量和减少错误
- en: '**They must ensure quality and reduce errors**, especially in critical reporting
    and compliance workflows.'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '**他们必须确保质量并减少错误**，尤其是在关键报告和合规流程中。'
- en: For instance, a growing number of companies need to comply with the **Corporate
    Sustainability Reporting Directive (CSRD)**
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，越来越多的公司需要遵守**企业可持续发展报告指令 (CSRD**)。
- en: This requires publishing ESG disclosures in machine-readable XHTML format, embedded
    with XBRL tags.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要以机器可读的 XHTML 格式发布 ESG 披露信息，并嵌入 XBRL 标签。
- en: '![](../Images/ec1cfcbe303c16c319980d4c460ca81d.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ec1cfcbe303c16c319980d4c460ca81d.png)'
- en: Example of XHTML code block for a CSRD report – (Image by Samir Saci)
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: CSRD 报告的 XHTML 代码块示例 – (图片由 Samir Saci 提供)
- en: These reports must meet **strict formatting and compliance standards** to be
    accepted by regulators.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这些报告必须满足**严格的格式和合规标准**，才能被监管机构接受。
- en: 'Prospect: “We have issues with formatting our reports correctly.”'
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 潜在客户：“我们在正确格式化报告方面存在问题。”
- en: To support this prospect, we developed an **n8n workflow** that helps sustainability
    teams and ESG consultants automatically audit these reports.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 为了支持这一前景，我们开发了一个**n8n 工作流程**，帮助可持续性团队和 ESG 咨询师自动审计这些报告。
- en: Their analysts have to email a draft of the report to a specific address.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的分析师必须将报告草案发送到特定的地址。
- en: The attachment is downloaded, and its content is analysed to find missing values
    and format errors.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 附件被下载，其内容被分析以查找缺失值和格式错误。
- en: '![](../Images/76b22f06eccdf3dd849f58a56bb1e90b.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/76b22f06eccdf3dd849f58a56bb1e90b.png)'
- en: Simplified version of the workflow — (Image by Samir Saci)
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程简化版 – (图片由 Samir Saci 提供)
- en: The output of this audit is sent to an AI agent that will explain, in plain
    English, the errors found in the report.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 审计结果发送给一个 AI 代理，该代理将用通俗易懂的语言解释报告中的错误。
- en: '![](../Images/2ceaf2adcd6876bcdda401b28e4f7d05.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ceaf2adcd6876bcdda401b28e4f7d05.png)'
- en: Example of audit report generated by the AI agent — (Image by Samir Saci)
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: AI 代理生成的审计报告示例 – (图片由 Samir Saci 提供)
- en: We position this product as **reducing errors to save time and money.**
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将这款产品定位为**减少错误以节省时间和金钱**。
- en: Before having this tool, they relied on a third-party company to check their
    reports.
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在拥有这个工具之前，他们依赖第三方公司检查他们的报告。
- en: 'By automating the audit process, companies can:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自动化审计流程，公司可以实现：
- en: Avoid costly reporting mistakes
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免昂贵的报告错误
- en: Reduce the risk of regulatory non-compliance
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降低违规风险
- en: Accelerate turnaround time on reports
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加快报告的周转时间
- en: Free up expert resources to focus on analysis, not formatting.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 释放专家资源，专注于分析而非格式化。
- en: The Return On Investment here comes from minimising **rework costs and delays**
    while increasing the reliability of reported data.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的投资回报来自于最小化**返工成本和延迟**，同时提高报告数据的可靠性。
- en: For more details about this automation, check this tutorial (including the n8n
    template)
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 想了解更多关于这个自动化的细节，请查看这个教程（包括n8n模板）
- en: You will discover that the core block of this audit tool still uses deterministic
    code (for reliability).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 您会发现，这个审计工具的核心模块仍然使用确定性代码（为了可靠性）。
- en: However, AI is improving the user experience by providing explanations in plain
    English.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，人工智能通过提供简单的英文解释来改善用户体验。
- en: 'To our prospects: “You don’t need to be an XHTML expert to correct the report.”'
  id: totrans-179
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对我们的潜在客户说：“您不需要是XHTML专家就能纠正报告。”
- en: 'We are selling this to our customers: AI provides advanced **analytics-as-a-service**
    capabilities to any company.'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 我们向我们的客户销售的是：人工智能为任何公司提供先进的**分析即服务**能力。
- en: Conclusion
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: Over the past few months, we have transformed automation from **a personal exploration**
    into a promising business offer.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几个月里，我们将自动化从**个人探索**转变为一个有潜力的商业提案。
- en: By focusing on three key approaches — **improving productivity, boosting marketing
    reach, and ensuring quality** — we helped companies across industries solve real
    problems, save time and increase their impact.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 通过关注三种关键方法——**提高生产力、提升营销覆盖范围和确保质量**——我们帮助各行业的公司解决实际问题，节省时间并增加其影响力。
- en: We don’t sell dreams with AGI replacing their entire supply chain departments.
  id: totrans-184
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们不通过AGI取代他们的整个供应链部门来销售梦想。
- en: The opportunity here is enormous.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的机会是巨大的。
- en: Businesses seek people who can bridge the gap between operational challenges
