- en: 'Toward Digital Well-Being: Using Generative AI to Detect and Mitigate Bias
    in Social Networks'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 向数字健康迈进：利用生成式人工智能检测和减轻社交网络中的偏见
- en: 原文：[https://towardsdatascience.com/toward-digital-well-being-using-generative-ai-to-detect-and-mitigate-bias-in-social-networks/](https://towardsdatascience.com/toward-digital-well-being-using-generative-ai-to-detect-and-mitigate-bias-in-social-networks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/toward-digital-well-being-using-generative-ai-to-detect-and-mitigate-bias-in-social-networks/](https://towardsdatascience.com/toward-digital-well-being-using-generative-ai-to-detect-and-mitigate-bias-in-social-networks/)
- en: <mdspan datatext="el1756421367625" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756421367625" class="mdspan-comment">引言</mdspan>
- en: Artificial Intelligence (AI) dominates today’s headlines—hailed as a breakthrough
    one day, warned against as a threat the next. Yet much of this debate happens
    in a bubble, focused on abstract hopes and fears rather than concrete solutions.
    Meanwhile, one urgent challenge often overlooked is the rise of mental health
    issues in online communities, where biased or hostile exchanges erode trust and
    psychological safety.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）今天占据了新闻头条——一天被赞扬为突破，另一天又被视为威胁。然而，这场辩论大多发生在泡沫中，关注的是抽象的希望和恐惧，而不是具体的解决方案。与此同时，一个经常被忽视的紧迫挑战是网络社区中心理健康问题的上升，其中带有偏见或敌意的交流侵蚀了信任和心理健康。
- en: 'This article introduces a practical application of AI aimed at that problem:
    a machine learning pipeline designed to detect and mitigate bias in user-generated
    content. The system combines deep learning models for classification with generative
    large language models (LLMs) for crafting context-sensitive responses. Trained
    on more than two million Reddit and Twitter comments, it achieved high accuracy
    (F1 = 0.99) and generated tailored moderation messages through a virtual moderator
    persona.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文介绍了一种针对该问题的实际应用：一个旨在检测和减轻用户生成内容中偏见的机器学习流程。该系统结合了用于分类的深度学习模型和用于构建上下文相关响应的生成大型语言模型（LLMs）。在超过两百万条Reddit和Twitter评论上进行训练，它实现了高精度（F1
    = 0.99），并通过虚拟调解员角色生成定制化的管理信息。
- en: Unlike much of the hype surrounding AI, this work demonstrates a tangible, deployable
    tool that supports digital well-being. It shows how AI can serve not just business
    efficiency or profit, but the creation of fairer, more inclusive spaces where
    people connect online. In what follows, I outline the pipeline, its performance,
    and its broader implications for online communities and digital well-being. For
    readers interested in exploring the research in more depth, including a poster
    presentation video explaining the code areas and the full-length research report,
    resources are available on Github. [1]
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 与围绕AI的许多炒作不同，这项工作展示了一个具体、可部署的工具，支持数字健康。它展示了AI不仅可以服务于商业效率或利润，还可以创造更公平、更具包容性的在线连接空间。以下，我概述了流程、其性能及其对在线社区和数字健康的更广泛影响。对于想要更深入探索研究（包括解释代码区域和完整研究报告的演示文稿视频）的读者，GitHub上有相关资源。[1]
- en: '*A machine learning pipeline that employs generative artificial intelligence
    to address bias in social networks has value to society’s mental well being. More
    and more, the human interaction with computers is trusting of answers that large
    language models provide in reasoning dialogue.*'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*采用生成式人工智能来处理社交网络中的偏见，这样的机器学习流程对社会心理健康具有价值。越来越多的人在与计算机的互动中信任大型语言模型在推理对话中提供的答案。*'
- en: Method
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 方法
- en: 'The system was designed as a three-phase pipeline: collect, detect, and mitigate.
    Each phase combined established natural language processing (NLP) techniques with
    modern transformer models to capture both the scale and subtlety of biased language
    online.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 该系统被设计为一个三阶段流程：收集、检测和减轻。每个阶段都将既定的自然语言处理（NLP）技术与现代转换器模型相结合，以捕捉在线偏见语言的规模和微妙之处。
- en: '**Step 1\. Data Collection and Preparation**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤1. 数据收集和准备**'
- en: I sourced 1 million Twitter posts from the Sentiment140 dataset [2] and 1 million
    Reddit comments from a curated Pushshift corpus (2007–2014) [3]. Comments were
    cleaned, anonymized, and deduplicated. Preprocessing included tokenization, lemmatization,
    stopword removal, and phrase matching using NLTK and spaCy.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我从Sentiment140数据集[2]中获取了100万条Twitter帖子，并从2007年至2014年的精选Pushshift语料库[3]中获取了100万条Reddit评论。评论被清理、匿名化和去重。预处理包括使用NLTK和spaCy进行分词、词元还原、停用词移除和短语匹配。
- en: To train the models effectively, I engineered metadata features—such as bias_terms,
    has_bias, and bias_type—that allowed stratification across biased and neutral
    subsets. Table 1 summarizes these features, while Figure 1 shows the frequency
    of bias terms across the datasets.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地训练模型，我设计了元数据特征，如bias_terms、has_bias和bias_type，这些特征允许对有偏差和无偏差的子集进行分层。表1总结了这些特征，而图1显示了偏差术语在数据集中的频率。
- en: '![](../Images/c711e295d65d6b766327ee8e2e38e2a8.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c711e295d65d6b766327ee8e2e38e2a8.png)'
- en: Table 1\. Columns used for bias analysis.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 表1. 用于偏差分析的列。
- en: '*Addressing data leakage and model overfitting issues are important in early
    data preparation stages.*'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*解决数据泄露和模型过拟合问题在早期数据准备阶段非常重要。*'
- en: '![](../Images/08235640c2d1d9545b80ddc71f91b77e.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/08235640c2d1d9545b80ddc71f91b77e.png)'
- en: Figure 1\. Bias terms occurrences (entire dataset v. stratified dataset v. training
    dataset).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 偏差术语出现频率（整个数据集 vs. 分层数据集 vs. 训练数据集）。
- en: '*Supervised learning techniques are used to label bias terms and classify them
    as implicit or explicit forms.*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*使用监督学习技术对偏差术语进行标注，并将它们分类为隐式或显式形式。*'
- en: Step 2\. Bias Annotation and Labeling
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：偏差标注和标记
- en: 'Bias was annotated on two axes: presence (biased vs. non-biased) and form (implicit,
    explicit, or none). Implicit bias was defined as subtle or coded language (e.g.,
    stereotypes), while explicit bias was overt slurs or threats. For example, “Grandpa
    Biden fell up the stairs” was coded as ageist, while “Biden is a grandpa who loves
    his family” was not. This contextual coding reduced false positives.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 偏差在两个轴上进行标注：存在（有偏差 vs. 无偏差）和形式（隐式、显式或无）。隐式偏差被定义为微妙或编码的语言（例如，刻板印象），而显式偏差则是明显的侮辱或威胁。例如，“拜登爷爷从楼梯上摔下来”被编码为年龄歧视，而“拜登是一位热爱家庭的爷爷”则不是。这种上下文编码减少了误报。
- en: Step 3\. Sentiment and Classification Models
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：情感和分类模型
- en: 'Two transformer models powered the detection stage:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 两个transformer模型推动了检测阶段：
- en: – RoBERTa [4] was fine-tuned for sentiment classification. Its outputs (positive,
    neutral, negative) helped infer the tone of biased comments.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: – RoBERTa [4]经过微调用于情感分类。其输出（正面、中性、负面）有助于推断有偏差评论的语气。
- en: – DistilBERT [5] was trained on the enriched dataset with implicit/explicit
    labels, enabling precise classification of subtle cues.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: – DistilBERT [5] 在带有隐式/显式标签的丰富数据集上训练，能够精确分类细微的线索。
- en: '*With the detection model trained at the highest accuracy, comments are evaluated
    by a large language model and a response is produced.*'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*使用训练精度最高的检测模型，评论通过大型语言模型进行评估，并生成相应的响应。*'
- en: Step 4\. Mitigation Strategy
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：缓解策略
- en: 'Bias detection was followed by real-time mitigation. Once a biased comment
    was identified, the system generated a response tailored to the bias type:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 偏差检测之后是实时缓解。一旦识别出有偏差的评论，系统就会根据偏差类型生成相应的响应：
- en: '– Explicit bias: direct, assertive corrections.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: – 明确偏差：直接、断言性的纠正。
- en: '– Implicit bias: softer rephrasings or educational suggestions.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: – 隐式偏差：较柔和的重新表述或教育性建议。
- en: Responses were generated by ChatGPT [6], chosen for its flexibility and context
    sensitivity. All responses were framed through a fictional moderator persona,
    JenAI-Moderator™, which maintained a consistent voice and tone (Figure 3).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 响应由ChatGPT [6]生成，选择它是因为其灵活性和对上下文的敏感性。所有响应都通过一个虚构的调解者角色JenAI-Moderator™进行框架化，该角色保持了统一的语气和语调（图3）。
- en: '![](../Images/948e7da72f91d6e3fa1f1cacf699c69c.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/948e7da72f91d6e3fa1f1cacf699c69c.png)'
- en: Fig. 3\. Mitigation Responses to Social Network Comments
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. 对社交网络评论的缓解响应
- en: Step 5\. System Architecture
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：系统架构
- en: The full pipeline is illustrated in Figure 4\. It integrates preprocessing,
    bias detection, and generative mitigation. Data and model outputs were stored
    in a PostgreSQL relational schema, enabling logging, auditing, and future integration
    with human-in-the-loop systems.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的流程在图4中展示。它集成了预处理、偏差检测和生成式缓解。数据和模型输出存储在PostgreSQL关系模式中，从而实现了日志记录、审计和未来与人工辅助系统的集成。
- en: '![](../Images/428fcb728d24112a6d5765ee5f94fe94.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/428fcb728d24112a6d5765ee5f94fe94.png)'
- en: Fig. 4\. Methodology Flow from Bias Detection to Mitigation
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 从偏差检测到缓解的方法流程
- en: Results
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: The system was evaluated on a dataset of over two million Reddit and Twitter
    comments, focusing on accuracy, nuance, and real-world applicability.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 系统在超过两百万条Reddit和Twitter评论的数据集上进行了评估，重点关注准确性、细微差别和现实世界的适用性。
- en: Feature Extraction
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 特征提取
- en: As shown in Figure 1, terms related to race, gender, and age appeared disproportionately
    in user comments. In the first pass of data exploration, the entire datasets were
    explored, and there was a 4 percent occurrence of bias identified in comments.
    Stratification was used to address the imbalance of not bias-to-bias occurrences.
    Bias terms like brand and bullying appeared infrequently, while political bias
    showed up as prominently as other equity related biases.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如图1所示，与种族、性别和年龄相关的术语在用户评论中出现了不成比例的情况。在数据探索的第一阶段，整个数据集都被探索，评论中发现了4%的偏差。分层被用来解决非偏差到偏差发生的不平衡。品牌和欺凌等偏差术语出现频率较低，而政治偏见与其他公平相关偏见一样突出。
- en: Model Performance
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型性能
- en: – RoBERTa achieved 98.6% validation accuracy by the second epoch. Its loss curves
    (Figure 5) converged quickly, with a confusion matrix (Figure 6) showing strong
    class separation.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: – RoBERTa在第二个时间步长达到了98.6%的验证准确率。其损失曲线（图5）迅速收敛，混淆矩阵（图6）显示出强烈的类别分离。
- en: – DistilBERT, trained on implicit/explicit labels, reached a 99% F1 score (Figure
    7). Unlike raw accuracy, F1 better reflects the balance of precision and recall
    in imbalanced datasets[7].
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: – 在隐含/明确标签上训练的DistilBERT达到了99%的F1分数（图7）。与原始准确率不同，F1更好地反映了不平衡数据集中精确度和召回率的平衡[7]。
- en: '![](../Images/70458e8e8703389045e4abad1e376f26.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/70458e8e8703389045e4abad1e376f26.png)'
- en: Figure 5\. RoBERTa Models | Training v. Validation Loss, Model Performance over
    Epochs
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. RoBERTa模型 | 训练与验证损失，模型性能随时间步长变化
- en: '![](../Images/2ec86f9a1d34dd8e96d2262bf55cfcca.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ec86f9a1d34dd8e96d2262bf55cfcca.png)'
- en: Figure 6\. RoBERTa Model Confusion Matrix
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. RoBERTa模型混淆矩阵
- en: '![](../Images/655000170a42568e85042d6576162d2d.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/655000170a42568e85042d6576162d2d.png)'
- en: Figure 7\. DistilBERT Models | Training v. Validation Loss, Model Performance
    over Epochs
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图7. DistilBERT模型 | 训练与验证损失，模型性能随时间步长变化
- en: Bias Type Distribution
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 偏差类型分布
- en: Figure 8 shows boxplots of bias types distributed over predicted sentiment record
    counts. The length of the box plots for negative comments where about 20,000 records
    of the stratified database that included very negative and negative comments combined.
    For positive comments, that is, comments reflecting affectionate or non-bias sentiment,
    the box plots span about 10,000 records. Neutral comments were in about 10,000
    records.  The bias and predicted sentiment breakdown validates the sentiment-informed
    classification logic.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图8显示了偏差类型在预测情感记录计数上的箱线图分布。对于负面评论，箱线图的长度大约是包含非常负面和负面评论的分层数据库中约20,000条记录。对于正面评论，即反映亲切或非偏见情感的评论，箱线图跨越了约10,000条记录。中性评论大约有10,000条。偏差和预测情感的分解验证了基于情感信息的分类逻辑。
- en: '![](../Images/4eec73f2ca2527820591644d9253c220.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4eec73f2ca2527820591644d9253c220.png)'
- en: Fig. 8\. Bias Type by Prediced Sentiment Distribution
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图8. 预测情感分布的偏差类型
- en: Mitigation Effectiveness
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缓解效果
- en: Generated responses from JenAI-Moderator depicted in Figure 3 were evaluated
    by human reviewers. Responses were judged linguistically accurate and contextually
    appropriate, especially for implicit bias. Table 2 provides examples of system
    predictions with original comments, showing sensitivity to subtle cases.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图3中展示的JenAI-Moderator生成的响应由人工审阅员进行评估。这些响应在语言准确性和情境适宜性方面被判定为正确，尤其是在隐含偏见方面。表2提供了系统预测与原始评论的示例，显示了系统对微妙情况的敏感性。
- en: '![](../Images/140de107b93dda4e4af2d39f9dd8df4a.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/140de107b93dda4e4af2d39f9dd8df4a.png)'
- en: Table 2\. Model Test with Example Comments (selected).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 表2. 模型测试示例评论（选取）。
- en: Discussion
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 讨论
- en: 'Moderation is often framed as a technical filtering problem: detect a banned
    word, delete the comment, and move on. But moderation is also an interaction between
    users and systems. In HCI research, fairness is not only technical but experiential
    [8]. This system embraces this perspective, framing mitigation as dialogue through
    a persona-driven moderator: JenAI-Moderator.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 调解通常被框架为技术过滤问题：检测到禁用词，删除评论，然后继续。但调解也是用户与系统之间的交互。在HCI研究中，公平不仅与技术相关，也与经验相关[8]。这个系统拥抱这一观点，将缓解框架为通过角色驱动的调解者（JenAI-Moderator）进行的对话。
- en: Moderation as Interaction
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调解作为交互
- en: Explicit bias often requires firm correction, while implicit bias benefits from
    constructive feedback. By reframing rather than deleting, the system fosters reflection
    and learning [9].
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 明确的偏见通常需要坚定的纠正，而隐含的偏见则受益于建设性的反馈。通过重新构架而不是删除，系统促进了反思和学习[9]。
- en: Fairness, Tone, and Design
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 公平性、语气和设计
- en: 'Tone matters. Overly harsh corrections risk alienating users; overly polite
    warnings risk being ignored. This system varies tone: assertive for explicit bias,
    educational for implicit bias (Figure 4, Table 2). This aligns with research showing
    fairness depends on context [10].'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 语气很重要。过于严厉的纠正可能会疏远用户；过于礼貌的警告可能会被忽视。该系统会根据情况调整语气：对明显偏见采用断言语气，对隐含偏见采用教育语气（图4，表2）。这与研究表明公平取决于情境
    [10] 的研究一致。
- en: Scalability and Integration
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可扩展性和集成
- en: The modular design supports API-based integration with platforms. Built-in logging
    enables transparency and review, while human-in-the-loop options ensure safeguards
    against overreach.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 模块化设计支持基于API的平台集成。内置日志功能实现透明度和审查，而人工介入选项确保了防止过度干预的安全措施。
- en: Ethical and Sociotechnical Considerations
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 道德和社会技术考量
- en: Bias detection risks false positives or over-policing marginalized groups. Our
    approach mitigates this by stripping personal information data, avoiding demographic
    labels, and storing reviewable logs. Still, oversight is essential. As Mehrabi
    et al. [7] argue, bias is never fully eliminated but must be continually managed.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见检测可能导致误报或过度监管边缘群体。我们的方法通过剥离个人信息数据、避免人口统计标签和存储可审查日志来减轻这一问题。然而，监督仍然是必要的。正如 Mehrabi
    等人 [7] 所论证的，偏见永远不会完全消除，但必须持续管理。
- en: Conclusion
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This project demonstrates that AI can be deployed constructively in online communities—not
    just to detect bias, but to mitigate it in ways that preserve user dignity and
    promote digital well-being.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目证明了AI可以在线社区中建设性地应用——不仅用于检测偏见，而且以保护用户尊严和促进数字福祉的方式减轻偏见。
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>*Key
    contributions*:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>*主要贡献*:'
- en: – Dual-pipeline architecture (RoBERTa + DistilBERT).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: – 双管道架构（RoBERTa + DistilBERT）。
- en: – Tone-adaptive mitigation engine (ChatGPT).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: – 语气自适应缓解引擎（ChatGPT）。
- en: – Persona-based moderation (JenAI-Moderator). </summary>
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: – 基于角色的审核（JenAI-Moderator）。 </summary>
- en: 'The models achieved near-perfect F1 scores (0.99). More importantly, mitigation
    responses were accurate and context-sensitive, making them practical for deployment.</details>
    <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>*Future
    directions*:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '模型实现了接近完美的F1分数（0.99）。更重要的是，缓解措施准确且具有情境敏感性，使其适用于部署。</details> <details class="wp-block-details
    is-layout-flow wp-block-details-is-layout-flow"><summary>*未来方向*:'
- en: – User studies to evaluate reception.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: – 用户研究以评估接受度。
- en: – Pilot deployments to test trust and engagement.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: – 进行试点部署以测试信任和参与度。
- en: – Strengthening robustness against evasion (e.g., coded language).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: – 加强对规避行为的抵抗力（例如，编码语言）。
- en: – Expanding to multilingual datasets for global fairness.</summary>
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: – 扩展到多语言数据集以实现全球公平。</summary>
- en: At a time when AI is often cast as hype or hazard, this project shows how it
    can be socially beneficial AI. By embedding fairness and transparency it promotes
    healthier online spaces where people feel safer and respected.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能常被看作是炒作或危害的时期，这个项目展示了它如何成为有益于社会的AI。通过嵌入公平和透明度，它促进了更健康的在线空间，让人们感到更安全和受到尊重。
- en: '*Images, tables, and figures illustrated in this report were created solely
    by the author.*</details>'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*本报告中展示的图像、表格和图表均由作者独立创作。*</details>'
- en: Acknowledgements
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 致谢
- en: This project fulfilled the Milestone II and Capstone requirements for the Master
    of Applied Data Science (MADS) program at the University of Michigan School of
    Information (UMSI). The project’s poster received a MADS Award at the UMSI Exposition
    2025 Poster Session. Dr. Laura Stagnaro served as the Capstone project mentor,
    and Dr. Jinseok Kim served as the Milestone II project mentor.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 该项目满足了密歇根大学信息学院（UMSI）应用数据科学（MADS）硕士项目的里程碑II和毕业设计要求。该项目的海报在2025年UMSI展览会的海报环节获得了MADS奖。Laura
    Stagnaro博士担任毕业设计项目的导师，Jinseok Kim博士担任里程碑II项目的导师。
- en: About the Author
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于作者
- en: Celia B. Banks is a social and data scientist whose work bridges human systems
    and applied data science. Her doctoral research in Human and Organization Systems
    explored how organizations evolve into virtual environments, reflecting her broader
    interest in the intersection of people, technology, and structures. Dr. Banks
    is a lifelong learner, and her current focus builds on this foundation through
    applied research in data science and analytics.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Celia B. Banks是一位社会和数据科学家，她的工作连接了人类系统和应用数据科学。她在人类和组织系统领域的博士研究探讨了组织如何演变成为虚拟环境，反映了她对人们、技术和结构交叉的更广泛兴趣。Banks博士是一位终身学习者，她目前的研究重点是通过数据科学和分析的应用研究建立在这一基础之上。
