- en: 'We hope you take the time to explore the excellent work from the latest cohort
    of TDS contributors:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望您花时间探索TDS最新一批贡献者的优秀作品：
- en: '[Illia Smoliienko](https://towardsdatascience.com/author/illia-smoliienko/) unpacks
    the limitations of AI in analytics through the example of bearing-vibration data
    analysis.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Illia Smoliienko](https://towardsdatascience.com/author/illia-smoliienko/)通过轴承振动数据分析的例子，探讨了人工智能在分析中的局限性。'
- en: '[Why AI Still Can’t Replace Analysts: A Predictive Maintenance Example](https://towardsdatascience.com/why-ai-still-cant-replace-analysts-a-predictive-maintenance-example/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[为什么AI仍然不能取代分析师：预测性维护的例子](https://towardsdatascience.com/why-ai-still-cant-replace-analysts-a-predictive-maintenance-example/)'
- en: '[Elisha Rosensweig](https://towardsdatascience.com/author/elisha-rosensweig/) and
    Eitan Wagner pour some cold water on the notion that vibe-coding is somehow an
    improvement over traditional programming.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Elisha Rosensweig](https://towardsdatascience.com/author/elisha-rosensweig/)和Eitan
    Wagner对振动编码是传统编程改进的观点泼了一盆冷水。'
