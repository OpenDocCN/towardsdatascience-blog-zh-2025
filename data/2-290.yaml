- en: The Secret Power of Data Science in Customer Support
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 客户支持中数据科学的秘密力量
- en: 原文：[https://towardsdatascience.com/the-secret-power-of-data-science-in-customer-support/](https://towardsdatascience.com/the-secret-power-of-data-science-in-customer-support/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/the-secret-power-of-data-science-in-customer-support/](https://towardsdatascience.com/the-secret-power-of-data-science-in-customer-support/)'
- en: <mdspan datatext="el1748635056639" class="mdspan-comment">Most of the data science</mdspan>
    content online focuses on how it can be applied in Product or Marketing — the
    two most common fields where data scientists create great value. However, working
    at a startup, I’ve had to work with many more functions outside these two. Data
    exists across the company, and the reality is that every department can benefit
    from data science and analytics to improve efficiency and drive business value.
    In this article, I am going to discuss one of those less-covered topics — data
    science for the Customer Support (CX) team.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748635056639" class="mdspan-comment">大多数在线的数据科学</mdspan>内容都集中在它是如何应用于产品或营销——这是数据科学家创造巨大价值的两个最常见领域。然而，在初创公司工作，我不得不与这两个领域之外更多的职能合作。数据存在于公司的各个部门，现实是每个部门都可以从数据科学和数据分析中受益，以提高效率和推动业务价值。在这篇文章中，我将讨论那些较少涉及的议题之一——客户支持（CX）团队的数据科学。
- en: I remember the first time I was pulled into a meeting with the CX team, I was
    completely clueless. I didn’t know what to expect or how data could actually help
    them. But now I have worked with the team for over three years as their data science
    partner, from the early days when we barely had any data reporting to now, when
    we are deeply embedded in the function and support data-driven decisions. In the
    sections below, let me go through the common data science use cases in CX.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得第一次被拉进客户体验团队会议时，我完全不知所措。我不知道该期待什么，也不知道数据实际上如何帮助他们。但现在，我已经作为他们的数据科学合作伙伴与他们共事超过三年了，从我们刚开始几乎没有数据报告的早期，到现在我们深深嵌入到该职能并支持数据驱动的决策。在下文中，让我带你们了解客户体验中常见的应用数据科学案例。
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. Metrics Tracking
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 指标跟踪
- en: Before you can improve anything, you have to measure it — and CX is no exception.
    Building metrics is also a good way to establish trust with your stakeholders.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在你能够改进任何事物之前，你必须对其进行衡量——客户体验也不例外。建立指标也是与利益相关者建立信任的好方法。
- en: 'For CX specifically, some common metrics include:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 对于客户体验（CX）而言，一些常见的指标包括：
- en: '**SLA (Service Level Agreement)**: This is the commitment or target for how
    quickly the customer support team responds to customer contacts. For example,
    “respond to all chats within 3 minutes.” It is critical to monitor whether the
    team always complies with the SLA. It is typically measured as the percentage
    of support interactions that meet this goal.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SLA (服务水平协议)**: 这是客户支持团队对客户联系响应速度的承诺或目标。例如，“3分钟内回复所有聊天。” 监控团队是否始终遵守SLA至关重要。这通常以符合此目标的客户支持互动的百分比来衡量。'
- en: '**TTR (Time to Resolution)**: SLA cares about whether each interaction was
    done in a timely manner, while TTR measures the total time it takes to resolve
    a support ticket — including all the back and forth. Imagine you, as a user, reached
    out to customer support via email for a product question. They responded quickly
    every time you messaged them, but none of the replies actually solved the question.
    In this case, SLA would look good, but TTR would be long. That’s why we need both
    to complete the story.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TTR (解决时间)**: 服务水平协议关注的是每次互动是否及时完成，而TTR衡量解决客户支持工单所需的总时间——包括所有来回。想象一下，作为用户，你通过电子邮件联系客户支持询问产品问题。他们每次回复都很迅速，但没有任何回复真正解决了问题。在这种情况下，服务水平协议看起来很好，但TTR会很长。这就是为什么我们需要两者来完整这个故事。'
- en: '**FCR (First Contact Resolution)**: Ideally, the customer will be provided
    with what exactly they are looking for in the very first conversation. Therefore,
    FCR is designed to measure the percentage of support tickets that are resolved
    without needing follow-ups. Naturally, a low FCR is correlated with a high TTR.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FCR (首次接触解决率)**: 理想情况下，客户将在第一次对话中就得到他们所寻找的确切信息。因此，FCR旨在衡量无需后续跟进即可解决的客户支持工单的百分比。自然地，低FCR与高TTR相关。'
- en: '**CSAT (Customer Satisfaction Score)**: The above metrics are all internal
    measures of how quickly we get back to our customers and solve the issues, while
    CSAT is a direct external measure of how satisfied customers are with the support
    they received. It is often captured via a survey after a support ticket is resolved,
    with a question like “How satisfied were you with the support you received?” (score
    1 to 5).'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CSAT（客户满意度评分）**：上述指标都是衡量我们多快回到客户那里并解决问题的内部指标，而CSAT是衡量客户对所收到的支持满意度的直接外部指标。它通常在支持工单解决后通过调查来捕捉，例如“你对所收到的支持满意吗？”（评分1到5）。'
- en: '**Contact Rate**: We care about the quality of the service, but it is equally
    important to understand how many support cases are generated. A great way to normalize
    the case volume is to calculate the Contact Rate as the `number of cases / number
    of active customers`. This tells us how often customers encounter issues and need
    help, so it is also a measure of product friction.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接触率**：我们关注服务质量，但同样重要的是了解产生了多少支持案例。将案例量正常化的一个好方法是计算接触率，即`案例数量 / 活跃客户数量`。这告诉我们客户遇到问题并需要帮助的频率，因此它也是产品摩擦的衡量标准。'
- en: Of course, there are many more metrics we have built for the CX team, but the
    above metrics should give you a good first glimpse into what data matters to the
    CX team. They, of course, are organized and presented in dashboards so the team
    can monitor the performance and dive into certain case types, teams, or customer
    segments. At my company, the data team also co-hosts a weekly metrics review meeting
    to spot trends, surface insights, and drive discussions.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我们为CX团队构建了更多指标，但上述指标应该能让你对CX团队关注的数据有一个良好的初步了解。当然，这些指标是组织并展示在仪表板上的，这样团队可以监控性能并深入分析特定案例类型、团队或客户细分市场。在我的公司，数据团队还共同主持每周的指标审查会议，以发现趋势、提出见解并推动讨论。
- en: Now that we have all these metrics, how shall we utilize them to drive changes?
    That’s where the real power of data science comes in. See the following use cases.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了所有这些指标，我们该如何利用它们来推动变革呢？这正是数据科学真正力量的所在。请看以下用例。
- en: 2\. Workforce Management
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 工作人员管理
- en: Each customer support interaction results in labor costs as well as technology
    costs, overhead costs, and other operational costs that come with it. Therefore,
    it is critical to accurately monitor capacity and forecast future support demand
    for staffing and planning.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 每次客户支持互动都会产生劳动力成本、技术成本、管理费用以及其他与之相关的运营成本。因此，准确监控容量并预测未来的支持需求对于人员配备和规划至关重要。
- en: 'The data team can provide lots of value here:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 数据团队在这里可以提供很多价值：
- en: '**Forecasting contact volume**: This is a complex but high-impact task. It
    first requires cross-functional collaboration to get the right assumption of customer
    growth projections and adjust the contact rate expectation given product launches
    and improvements. Then, data scientists can utilize data toolkits like time series
    models to bake in all the assumptions and predict the support case volume.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测接触量**：这是一个复杂但影响巨大的任务。首先需要跨职能协作，以获得正确的客户增长预测假设，并根据产品发布和改进调整接触率预期。然后，数据科学家可以利用时间序列模型等数据工具包，将所有假设
    baked in 并预测支持案例量。'
- en: '**Capacity planning**: Once we get a good prediction of contact volume, the
    next question is how many support agents we will need to maintain a good level
    of service. This requires scenario simulation of agent performance and availability,
    and optimization of the agent shift schedules to ensure we meet SLAs without overstaffing.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容量规划**：一旦我们获得了良好的接触量预测，下一个问题是我们需要多少支持代表来维持良好的服务水平。这需要模拟代表的表现和可用性，并优化代表班次表，以确保我们满足服务级别协议（SLA）而不过度配备人员。'
- en: 3\. Process Improvements
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 流程改进
- en: 'Data is not only helpful to track the team performance, but it can also drive
    real process improvements. Just to give you a few examples that I have seen:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 数据不仅有助于跟踪团队绩效，还可以推动真正的流程改进。以下是我看到的一些例子：
- en: '**TTR analysis:** TTR is just a random large number without making sense of
    it. The data team can analyze TTR to identify drivers of long resolution time
    and use that to inform process improvements. For example, if the onboarding-related
    cases often take a longer time with many back-and-forths, this could imply that
    the CX team needs more training regarding the current onboarding process, or the
    onboarding flow is over-complicated, so customers constantly find it confusing.
    If the cases coming from email usually have a long time to resolution with a low
    CSAT, maybe we should allocate more resources to answer the email queue to speed
    up the responses, or provide better tooling support to help agents draft their
    emails.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TTR分析**：TTR只是一个没有意义的随机大数字。数据团队可以分析TTR以识别导致长时间解决时间的原因，并利用这些信息来指导流程改进。例如，如果与入职相关的案例通常需要更长的时间，并且有很多来回，这可能意味着CX团队需要更多关于当前入职流程的培训，或者入职流程过于复杂，因此客户经常感到困惑。如果来自电子邮件的案例通常需要很长时间才能解决，并且CSAT评分低，我们可能需要分配更多资源来回答电子邮件队列以加快响应速度，或者提供更好的工具支持以帮助代理撰写电子邮件。'
- en: '**Support tiering strategy**: Not all customers are of equal value to a business.
    Therefore, a common practice is to create support tiers among customers and prioritize
    the contacts from top-tier customers. The data team can help come up with the
    tiering system based on customer value and monitor the effectiveness over time.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持分层策略**：并非所有客户对业务的价值都相同。因此，常见的做法是在客户之间创建支持层级，并优先处理顶级客户的联系。数据团队可以帮助根据客户价值制定分层系统，并随着时间的推移监控其有效性。'
- en: '**A/B testing of support flow**: Where should we put the live chat button?
    How to make the support center more discoverable for customers? Is a certain auto-reply
    email format better than another? A/B testing method helps us answer these support
    flow design questions.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持流程的A/B测试**：我们应该把实时聊天按钮放在哪里？如何使客户更容易发现支持中心？某种自动回复电子邮件格式是否比另一种更好？A/B测试方法帮助我们回答这些支持流程设计问题。'
- en: '**Self-service enhancements**: The ideal world of customer support is no human
    support needed 🙂 Though this is nearly impossible to reach, the data team can
    help to get closer. For example, we looked at what kind of questions users failed
    to resolve via the help center. This informs what new topics should be added to
    the help articles and how the help center search function should be improved.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自助服务增强**：理想的客户支持世界是不需要任何人工支持 😊 虽然这几乎是不可能实现的，但数据团队可以帮助我们更接近这个目标。例如，我们研究了用户通过帮助中心未能解决的问题类型。这有助于确定应该添加哪些新主题到帮助文章中，以及如何改进帮助中心的搜索功能。'
- en: '**Chatbot improvements**: Chatbot is a common tool to answer customers’ questions
    without routing to real agents. Especially in this AI era, we have seen significant
    improvements in chatbot quality and availability. Our data team has played a critical
    role in two rounds of chatbot vendor evaluation with the CX team — setting up
    the data pipeline, A/B testing of different chatbot options, evaluating chatbot
    performance, identifying the low-performing contact categories, and helping fine-tune
    the bots to achieve a better chatbot containment rate.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天机器人改进**：聊天机器人是回答客户问题而不需要路由到真实代理的常用工具。特别是在这个AI时代，我们看到了聊天机器人质量和可用性的显著提升。我们的数据团队在CX团队的两轮聊天机器人供应商评估中发挥了关键作用——建立数据管道，对不同聊天机器人选项进行A/B测试，评估聊天机器人性能，识别表现不佳的联系人类别，并帮助微调机器人以实现更好的聊天机器人控制率。'
- en: 4\. Customer Feedback Analysis
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 客户反馈分析
- en: Last but not least, support contacts generate a great amount of text data —
    they come directly from the customers and can be used to understand customer pain
    points and product gaps.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，支持联系人产生了大量的文本数据——它们直接来自客户，可以用来了解客户的痛点以及产品差距。
- en: '**Case categorization**: Support cases can be categorized manually by the CX
    team or with a rule-based framework, but the data team can help to automate this
    step, especially with AI’s power today. With simple prompt engineering, most LLMs
    today can categorize each case based on your product context with decent accuracy.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**案例分类**：支持案例可以由CX团队手动分类，或者通过基于规则的框架进行分类，但数据团队可以帮助自动化这一步骤，尤其是在今天AI的力量下。通过简单的提示工程，今天的大多数LLM可以根据您的产品背景以相当高的准确性对每个案例进行分类。'
- en: '**Text analysis**: Except from categorization, AI can take the whole case transcripts
    to summarize and identify the customer pain points. My team collaborated with
    the engineers to build an internal AI product called “Voice of the Customers”
    that processes all case details through LLM and surfaces the most common customer
    complaints in each product area. This is a perfect opportunity to bring CX insights
    to the whole company and close the feedback loop with product and marketing. We
    have seen it being used actively in product roadmapping.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本分析**：除了分类之外，AI还可以对整个案例记录进行总结和识别客户痛点。我的团队与工程师合作开发了一个内部AI产品，名为“客户之声”，该产品通过LLM处理所有案例细节，并呈现每个产品领域中最常见的客户投诉。这是一个将CX洞察带给整个公司的完美机会，并与产品和营销部门关闭反馈循环。我们已经看到它被积极用于产品路线图规划中。'
- en: '* * *'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Working with the CX team has been an unexpected but rewarding part of my data
    science journey. From tracking team performance, supporting capacity planning,
    to optimizing internal processes, and improving customer experiences, data science
    can really transform how the customer support team operates.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 与CX团队合作是我数据科学之旅中一个意外但收获颇丰的部分。从跟踪团队绩效，支持容量规划，到优化内部流程，以及提升客户体验，数据科学真的可以彻底改变客户支持团队的运营方式。
