- en: The Programming Skills You Need for Today’s Data Roles
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你需要为今天的数据角色掌握的编程技能
- en: 原文：[https://towardsdatascience.com/the-programming-skills-you-need-for-todays-data-roles/](https://towardsdatascience.com/the-programming-skills-you-need-for-todays-data-roles/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[你需要为今天的数据角色掌握的编程技能](https://towardsdatascience.com/the-programming-skills-you-need-for-todays-data-roles/)'
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的最新一期，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: Things move fast in the world of data science and AI, and that includes the [programming
    know-how](https://towardsdatascience.com/tag/programming/) today’s roles require.
    Sure, some Python and SQL tricks remain evergreen. But to stand out in a crowded
    field, you should stay up-to-date — and we’re here to support you on your learning
    journey.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学和人工智能的世界发展迅速，这包括今天角色所需的编程知识。当然，一些Python和SQL技巧始终是永恒的。但要在竞争激烈的环境中脱颖而出，你需要保持最新——我们在这里支持你的学习之旅。
- en: To kick off back-to-school season in earnest, we’ve gathered some top-notch,
    coding-focused tutorials we’ve published recently. Regardless of your current
    level, you’ll find something here to inspire you to start tinkering.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了认真开始新学期，我们收集了一些我们最近发布的、以编码为重点的顶级教程。无论你的当前水平如何，你在这里都会找到一些能激发你开始尝试的东西。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How to Import Pre-Annotated Data into Label Studio and Run the Full Stack with
    Docker
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何将预标注数据导入Label Studio并使用Docker运行全栈
- en: Object-detection projects can be frustratingly time-consuming. [Yagmur Gulec](https://towardsdatascience.com/author/yagmur-gulec/) introduces
    us to open-source tool Label Studio, and walks us through the necessary steps
    for building a much more streamlined process of importing pre-annotated visual
    data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对象检测项目可能非常耗时。Yagmur Gulec向我们介绍了开源工具Label Studio，并指导我们完成导入预标注视觉数据的简化流程。
- en: '[How to Import Pre-Annotated Data into Label Studio and Run the Full Stack
    with Docker](https://towardsdatascience.com/how-to-import-pre-annotated-data-into-label-studio-and-run-the-full-stack-with-docker/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何将预标注数据导入Label Studio并使用Docker运行全栈](https://towardsdatascience.com/how-to-import-pre-annotated-data-into-label-studio-and-run-the-full-stack-with-docker/)'
- en: 'A Deep Dive into RabbitMQ & Python’s Celery: How to Optimise Your Queues'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深入了解RabbitMQ和Python的Celery：如何优化你的队列
- en: We may think of queuing systems as something that simply hums along in the background.
    Clara Chong invites us to make smarter decisions for cumulative efficiency — especially
    in the era of complex LLM-based tasks.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能会认为队列系统只是简单地运行在后台。Clara Chong邀请我们做出更明智的决定，以实现累积效率——特别是在复杂基于LLM的任务时代。
- en: '[A Deep Dive into RabbitMQ & Python’s Celery: How to Optimise Your Queues](https://towardsdatascience.com/deep-dive-into-rabbitmq-pythons-celery-how-to-optimise-your-queues/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[深入了解RabbitMQ和Python的Celery：如何优化你的队列](https://towardsdatascience.com/deep-dive-into-rabbitmq-pythons-celery-how-to-optimise-your-queues/)'
- en: Implementing the Hangman Game in Python
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Python中实现猜字游戏
- en: For Python beginners, Mahnoor Javed offers an accessible and engaging primer
    on coding basics — think variables, loops, and conditions — at the end of which
    you will have created a functional (and playable) Hangman program.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Python初学者，Mahnoor Javed在文章末尾提供了一个易于理解和吸引人的编程基础入门指南——包括变量、循环和条件等——在阅读完毕后，你将创建一个功能齐全（并可玩）的猜字游戏程序。
- en: '[Implementing the Hangman Game in Python](https://towardsdatascience.com/implementing-the-hangman-game-in-python/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在Python中实现猜字游戏](https://towardsdatascience.com/implementing-the-hangman-game-in-python/)'
