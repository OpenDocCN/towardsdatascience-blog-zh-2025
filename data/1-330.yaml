- en: Meet Our New Authors
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Explore excellent work from some of our recently added contributors:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们最近添加的一些贡献者的优秀作品：
- en: '[Sathya Krishnan Suresh](https://towardsdatascience.com/author/sathyakrishnan-suresh/),
    a Singapore-based AI scientist, published a comprehensive guide to Transformers’
    positional embeddings.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Sathya Krishnan Suresh](https://towardsdatascience.com/author/sathyakrishnan-suresh/)，一位新加坡的AI科学家，发布了一本关于Transformers位置嵌入的全面指南。'
- en: '[Positional Embeddings in Transformers: A Math Guide to RoPE & ALiBi](https://towardsdatascience.com/positional-embeddings-in-transformers-a-math-guide-to-rope-alibi/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Transformers中的位置嵌入：RoPE与ALiBi的数学指南](https://towardsdatascience.com/positional-embeddings-in-transformers-a-math-guide-to-rope-alibi/)'
- en: '[Ahmad Talal Riaz](https://towardsdatascience.com/author/ahmadtalal-riaz/),
    who recently wrote on the fundamentals of LLM monitoring and observability, joins
    us with a versatile skill set, honed across several AI/ML research and engineering
    roles.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Ahmad Talal Riaz](https://towardsdatascience.com/author/ahmadtalal-riaz/)，最近撰写了关于LLM监控和可观察性的基础，他带着在多个AI/ML研究和工程角色中磨炼的技能加入我们。'
- en: '[LLM Monitoring and Observability: Hands-on with Langfuse](https://towardsdatascience.com/llm-monitoring-and-observability-hands-on-with-langfuse/)'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[LLM监控和可观察性：Langfuse的实际操作](https://towardsdatascience.com/llm-monitoring-and-observability-hands-on-with-langfuse/)'
- en: '[Noah Swan](https://towardsdatascience.com/author/noah-swan/) is currently
    pursuing a graduate statistics degree at the University of Chicago; his debut
    article aims to demystify Bayesian hyperparameter optimization.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Noah Swan](https://towardsdatascience.com/author/noah-swan/) 目前正在芝加哥大学攻读统计学研究生学位；他的处女作旨在揭开贝叶斯超参数优化的神秘面纱。'
- en: '[Marginal Effect of Hyperparameter Tuning with XGBoost](https://towardsdatascience.com/marginal-effect-of-hyperparameter-tuning-with-xgboost/)'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用XGBoost的超参数调优的边际效应](https://towardsdatascience.com/marginal-effect-of-hyperparameter-tuning-with-xgboost/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近写了一个有趣的项目教程、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
