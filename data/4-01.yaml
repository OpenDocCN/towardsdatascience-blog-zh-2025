- en: 5 Essential Tips Learned from My Data Science Journey
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从我的数据科学之旅中学到的五个关键提示
- en: 原文：[https://towardsdatascience.com/5-essential-tips-learned-from-my-data-science-journey-c1f3b9a18e6f/](https://towardsdatascience.com/5-essential-tips-learned-from-my-data-science-journey-c1f3b9a18e6f/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/5-essential-tips-learned-from-my-data-science-journey-c1f3b9a18e6f/](https://towardsdatascience.com/5-essential-tips-learned-from-my-data-science-journey-c1f3b9a18e6f/)
- en: '![Image created by Midjourney](../Images/e755c37921a3a2539fb4d825df859730.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Midjourney创建的图片](../Images/e755c37921a3a2539fb4d825df859730.png)'
- en: Image created by Midjourney
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由Midjourney创建的图片
- en: Ten years ago, I embarked on my journey in the field of data science. I clearly
    remember the beginning of this adventure – my thoughts, my emotions, and the excitement
    that came with stepping into a new territory. It all started with a consultancy
    position at a large insurance company.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 十年前，我开始了我的数据科学领域之旅。我清楚地记得这次冒险的开始——我的想法、我的情感，以及踏入新领域的兴奋。一切始于在一家大型保险公司担任咨询职位。
- en: I was part of the Research and Development team, where our goals were – quite
    frankly – undefined. We craved data within the company to experiment, try something
    different, and innovate.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我是研发团队的一员，我们的目标——坦白说——是不明确的。我们渴望在公司内部获取数据来实验，尝试不同的事物，并创新。
- en: Neither I nor the company was truly ready for this. But looking back, I see
    how essential that step was. The company has since grown into a tech leader, and
    for me, those years were a playground of learning – exploring, studying, and mastering
    the tools and technologies of the time.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我和公司都真正没有准备好迎接这一步。但回顾过去，我看到这一步是多么关键。公司后来成长为一个技术领导者，对我而言，那些年是一个学习的游乐场——探索、学习和掌握那个时代的工具和技术。
- en: When I remember myself in that context, I see a young professional Brimming
    with energy and a desire to innovate. I look back on all my daily failures with
    great affection and a hint of nostalgia because they shaped the professional I
    am today.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当我回想起那个情境时，我看到一个充满活力和渴望创新的年轻专业人士。我带着极大的喜爱和一丝怀旧之情回顾我每天所犯的失败，因为它们塑造了今天的我。
- en: If I could speak to that younger version of myself, I would offer some advice
    to ease his journey. Interestingly, they would be the same advice I now give to
    my team members.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能和那个年轻的自己对话，我会给他一些建议，以减轻他的旅程。有趣的是，那些建议和我现在给团队成员的建议是一样的。
- en: This article will summarize five things I have learned the hard way over these
    ten years.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将总结我在这十年中艰难学到的五件事。
- en: Understanding Business Logic
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解商业逻辑
- en: '![Image created by Midjourney](../Images/b2558701445e07cdd5b15f6b1e9aff4e.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![由Midjourney创建的图片](../Images/b2558701445e07cdd5b15f6b1e9aff4e.png)'
- en: Image created by Midjourney
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 由Midjourney创建的图片
- en: It may sound surprising, but I still find people who fail to connect technical
    decisions to business objectives.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能听起来令人惊讶，但我仍然发现有些人未能将技术决策与商业目标联系起来。
- en: Understanding the nature of the problem is critical not just for building an
    algorithmic solution, but also for creating meaningful variables and evaluating
    their impact.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 理解问题的本质不仅对于构建算法解决方案至关重要，而且对于创建有意义的变量和评估它们的影响也至关重要。
- en: Once, I evaluated the impact of a "sort of oven" temperature data on a food
    production process.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 曾经，我评估了一种“类似烤箱”的温度数据对食品生产过程的影响。
- en: We were investigating a defect that caused a "sort of burning effect" on the
    product. What the business (and common sense) suggested was that abnormally higher
    temperatures may have been correlated with this defect.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在调查一种导致产品出现“类似燃烧效果”的缺陷。商业逻辑（以及常识）表明，异常高的温度可能与这种缺陷有关联。
- en: However, what we discovered with our analysis was the presence of a significant
    spike in the burning effect when the temperature was lower than the normal temperature.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们通过分析发现，当温度低于正常温度时，燃烧效果出现了显著的峰值。
- en: An inexperienced analyst could have been satisfied with finding such a strong
    predictive pattern. However, business logic told us to dig deeper. Together with
    the team, we opted to consider it, although formally predictive, as a spurious
    phenomenon induced by another factor in the realization process that was unknown
    at the time.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一个缺乏经验的分析师可能会满足于找到这样一个强大的预测模式。然而，商业逻辑告诉我们需要深入挖掘。与团队一起，我们决定将其视为一个虚假现象，尽管它具有预测性，但这是由实现过程中未知的其他因素引起的。
- en: 'By tracing back the possible causes, we discovered that the phenomenon was
    caused by an event that had remained exogenous until then: a previous and untracked
    step!'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 通过追溯可能的原因，我们发现这一现象是由一个之前一直外生的事件引起的：一个之前未被追踪的步骤！
- en: This insight allowed us to trace a new data source related to the exogenous
    event, leading to more predictive and interpretable variables.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这个洞察力使我们能够追踪到与外生事件相关的新数据源，从而得到更多可预测和可解释的变量。
- en: I could mention countless examples like this. The lesson? Always anchor your
    analysis in business logic. This is what allows us to guide mathematics towards
    ever-rosier horizons.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以提到无数这样的例子。教训？始终将你的分析建立在业务逻辑上。这正是我们引导数学走向更加光明的未来的原因。
- en: If You’re Not Skilled, You Can’t Write Bad Code
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如果你技术不精，你无法写出糟糕的代码
- en: You actually can, but please don’t.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你实际上可以，但请尽量不要。
- en: '![Image created by Midjourney](../Images/f62a4dd826e9a7cdab40bc49e6b4ff2a.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![由Midjourney创建的图片](../Images/f62a4dd826e9a7cdab40bc49e6b4ff2a.png)'
- en: Image created by Midjourney
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 由Midjourney创建的图片
- en: There is not always the time needed to follow all the programming best practices.
    Moving forward dirty and fast is often necessary in experimental contexts where
    time is tight. Focusing the effort on trying different solutions instead of looking
    for the "best" code can be a strategic advantage.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 并非总是有足够的时间遵循所有编程最佳实践。在时间紧迫的实验环境中，快速前进通常是必要的。将精力集中在尝试不同的解决方案，而不是寻找“最佳”代码，可以是一个战略优势。
- en: However, writing "bad code" is a privilege for the experienced data scientist.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，写出“糟糕的代码”是经验丰富的数据科学家的特权。
- en: If you are not yet a "pro" developer, it is safer to go slower and try to adhere
    to high-quality standards. This way, you minimize the risk of making gross errors
    during your experimentation.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还不是“专业”开发者，以较慢的速度前进并努力遵守高质量标准会更安全。这样，你可以在实验过程中最大限度地减少犯重大错误的风险。
- en: 'Contradiction? Not really. Here is the thing: experimenting more leads you
    to have more opportunities in the next phases, but this is true just under the
    assumption of not committing gross mistakes.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 矛盾吗？其实并不。事情是这样的：进行更多实验会让你在下一阶段有更多机会，但这只在没有犯重大错误的前提下才是真的。
- en: Evaluation errors during experiments can snowball into costly setbacks later
    – or worse, lead to unfeasible solutions also affecting your reputation.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 实验中的评估错误可能会演变成代价高昂的挫折——或者更糟，导致不可行的解决方案，这也会影响你的声誉。
- en: As usual, we might then look for a trade-off. Would you indeed be happy if your
    plumber broke your entire bathroom only to tell you that the renovation you dreamed
    about cannot be done?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，我们可能会寻找一个折衷方案。如果你请的管道工只为了告诉你你梦寐以求的翻新无法完成，就破坏了你整个浴室，你会真的高兴吗？
- en: I needed a lot of time to learn to write good code, but it took me even longer
    to learn to write bad and useful code.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要很多时间来学习编写好的代码，但学习编写糟糕而有用的代码花了我更长的时间。
- en: Bad and useless code, however, everyone knows how to write.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，糟糕且无用的代码，每个人都知道如何编写。
- en: If You Don’t Want to Dive Deep into the Maths, Master the Intuitions
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如果你不想深入研究数学，就掌握直觉
- en: '![Image created by Midjourney](../Images/5e29a8ed8fc4dbfa99ae19d94eca176a.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: 由Midjourney创建的图片
- en: Image created by Midjourney
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 由Midjourney创建的图片
- en: I fondly remember when I used to read scientific articles two by two. Unfortunately,
    staying on the cutting edge is a full-time job.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我深情地回忆起我过去一篇一篇阅读科学文章的日子。不幸的是，保持前沿是一个全职工作。
- en: I’ve read more useless papers than useful ones in my career. Many seemingly
    brilliant ideas over time have been forgotten; some others became surprisingly
    very popular with subsequent studies.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的职业生涯中，我读过的无用论文比有用的论文多。随着时间的推移，许多看似绝妙的主意都被遗忘了；一些其他的主意在后续研究中意外地变得非常受欢迎。
- en: It is not always easy to keep up, therefore.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，保持跟进并不总是容易。
- en: Not everyone can afford to study full-time; many people must study and update
    themselves while working.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个人都能负担得起全职学习；许多人必须在工作中学习和更新自己。
- en: For this reason, the technique I have identified over time is to focus on intuitions
    instead of on mathematical reproducibility.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我逐渐确定的技术是专注于直觉而不是数学可重复性。
- en: I come from a very theoretical Italian university, which taught me that if you
    can’t prove it, it means you don’t know it. It was very difficult to limit myself
    to managing intuitions. I was inclined to delve deeply, to do the calculations
    by hand, but I couldn’t with that amount of information.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我来自一所非常理论化的意大利大学，它教会了我，如果你不能证明它，那就意味着你不知道它。限制自己只管理直觉是非常困难的。我倾向于深入挖掘，手动进行计算，但面对如此大量的信息，我做不到。
- en: 'I had to change the paradigm to: if you can’t summarize it (if you can’t draw
    it), it means you don’t know it.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我不得不改变范式：如果你不能总结它（如果你不能画出来），那就意味着你不知道它。
- en: In this way, I shifted from wanting to understand the **HOW** in detail to focusing
    on the **WHY**.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，我从想要详细了解**如何**转变为关注**为什么**。
- en: I’m not suggesting you completely neglect mathematics; I’m suggesting you choose
    where to delve into mathematics when to delve, and mastering intuitions first.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是建议你完全忽视数学；我是建议你选择何时深入研究数学，以及首先掌握直觉。
- en: But please don’t just "use" things!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 但请不要只是“使用”事物！
- en: No Rules Rules
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 没有规则规则
- en: '![Image created by Midjourney](../Images/c494867e83ea53138340972c82b62088.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![由Midjourney创建的图像](../Images/c494867e83ea53138340972c82b62088.png)'
- en: Image created by Midjourney
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 由Midjourney创建的图像
- en: The human brain is presumptuous. It seeks preconceptions and creates prejudices
    to simplify the computational process. We are programmed this way; I am not the
    right person to talk to you about these things, but I assure you that just looking
    at the literature on the subject leads to this conclusion.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 人类大脑是自大的。它寻求先入为主的观念，并创造偏见以简化计算过程。我们是按照这种方式编程的；我不是谈论这些事情的正确人选，但我向你保证，仅仅阅读关于这个主题的文献就会得出这个结论。
- en: Why this introduction on preconceptions? Because people tend to simplify by
    building constructs, and procedures to follow. Some examples?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么介绍先入为主的观念？因为人们倾向于通过构建结构和遵循的程序来简化。一些例子？
- en: '*"One hot encoding": I remove a category otherwise "it breaks".* I see lots
    of decision trees with missing categories.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*"热编码": 我移除一个类别，否则“它就会出错”。* 我看到很多决策树中存在缺失的类别。'
- en: '*Are there missing values? I impute the mean, and the mode; I remove them.*
    How many XGBoost have I seen with heaps of missings imputed in a fanciful way?
    It’s not necessary in this scenario!'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '*是否有缺失值？我使用均值和众数进行插补；我移除它们。* 我见过多少XGBoost模型中存在大量以奇妙方式插补的缺失值？在这种情况下并不必要！'
- en: '*Data on different scales? I standardize, normalize, MinMaxScale.* And the
    trees look at us very puzzled.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*不同尺度的数据？我进行标准化、归一化、MinMaxScale。* 树木看起来对我们非常困惑。'
- en: 'All the young people in the field ask me the same question: "What should I
    do?"'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 该领域的所有年轻人都会问我同样的问题：“我应该做什么？”
- en: 'The correct answer is the easiest one: it depends!'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 正确的答案是最简单的：这取决于！
- en: There are no golden rules; otherwise, there would be a script _data*scientist.py*
    to apply all those rules, and in fact, I wouldn’t need a team of people but just
    the need to scale that script.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 没有金科玉律；否则，就会有脚本 _data*scientist.py* 来应用所有这些规则，实际上，我就不需要一个团队，只需要扩展这个脚本。
- en: Fortunately (as of today 🙂 , not sure for any longer) there is still a need
    for someone to think, someone to evaluate. Every story, every problem, has its
    peculiarities. You need to get into the business logic, critically evaluate the
    problems, and find micro-solutions with creativity and competence.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是（截至今天 😊，不知道以后是否如此），仍然需要有人去思考，有人去评估。每个故事，每个问题，都有其独特性。你需要深入业务逻辑，批判性地评估问题，并以创造性和能力找到微观解决方案。
- en: So? What should I do? It depends!
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 那么？我应该做什么？这取决于！
- en: Mathematics is the Simple Part
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数学是简单的一部分
- en: '![Image created by Midjourney](../Images/41f09fefff78c09f2a785d8007cf2c01.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![由Midjourney创建的图像](../Images/41f09fefff78c09f2a785d8007cf2c01.png)'
- en: Image created by Midjourney
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 由Midjourney创建的图像
- en: In my experience, data science projects rarely fail due to mathematical shortcomings.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的经验中，数据科学项目很少因为数学缺陷而失败。
- en: Instead, they usually falter because of poor alignment with business needs or
    user expectations.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，它们通常因为与业务需求或用户期望的匹配度差而失败。
- en: Is the solution addressing a real problem? Is it cost-effective? Is it user-friendly?
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案是否解决了一个真实的问题？是否具有成本效益？是否用户友好？
- en: Let’s consider of a really silly case. Let’s assume we have a problem that can
    be faced with artificial intelligence. Let’s suppose that the problem itself costs
    the company €10,000/year. What happens if your solution costs €50,000/year?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个非常愚蠢的案例。假设我们有一个可以用人工智能解决的问题。假设问题本身每年要花费公司€10,000。如果你的解决方案每年要花费€50,000会发生什么？
- en: '**I keep the problem since it isn’t worth solving**.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**我保留问题，因为它不值得解决**。'
- en: Similarly, what about a brilliant solution that is however inconvenient for
    the user?
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，关于一个虽然不便但非常出色的解决方案呢？
- en: '**No one will do it!**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**没有人会去做！**'
- en: Rarely in my career have I seen a project fail due to mathematics; many times,
    I have seen them fail due to stupid behaviors, only a few for computational reasons.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的职业生涯中，很少看到项目因数学问题而失败；很多时候，我看到它们因愚蠢的行为而失败，只有少数是因为计算原因。
- en: '**Conclusion**'
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: Here we are. I hope these five tips can be useful to someone. In my daily life,
    I often find myself talking about them to refresh the memory of some forgetful
    person.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里。我希望这五个小贴士对某个人有所帮助。在我的日常生活中，我经常发现自己在与一些健忘的人交谈时提及它们，以刷新他们的记忆。
- en: See you around.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 再见。
