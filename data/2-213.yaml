- en: Economic Cycle Synchronization with Dynamic Time Warping
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用动态时间扭曲进行经济周期同步
- en: 原文：[https://towardsdatascience.com/economic-cycle-synchronization-with-dynamic-time-warping/](https://towardsdatascience.com/economic-cycle-synchronization-with-dynamic-time-warping/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[经济周期同步与动态时间扭曲](https://towardsdatascience.com/economic-cycle-synchronization-with-dynamic-time-warping/)'
- en: <mdspan datatext="el1750896368962" class="mdspan-comment">Economic cycles</mdspan> — periods
    of expansion and contraction in output or financial markets — lie at the heart
    of macroeconomic analysis. When countries share a common currency, as in the eurozone,
    synchronized cycles are necessary for a one-size-fits-all monetary policy to work.
    This idea was first put forth by Robert Mundell (1961), the father of Optimum
    Currency Area theory. If, for example, Germany is in crisis and Spain is booming,
    as was the case after the turn of the millennium, the European Central Bank (ECB)
    cannot set the right interest rate for both countries. A lower interest rate would
    lead to overheating the economy in Spain, and a higher interest rate would exacerbate
    the crisis in Germany.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750896368962" class="mdspan-comment">经济周期</mdspan>— 产出或金融市场扩张和收缩的时期— 是宏观经济分析的核心。当国家共享一种货币，如欧元区，同步周期对于一种适合所有情况的货币政策来说是必要的。这个想法最初由罗伯特·蒙代尔（1961年）提出，他是最优货币区理论的创始人。例如，如果德国处于危机之中，而西班牙正在繁荣，就像千年之交之后的情况一样，欧洲中央银行（ECB）无法为这两个国家设定正确的利率。较低的利率会导致西班牙经济过热，而较高的利率会加剧德国的危机。
- en: Traditional measures of cycle synchronization often rely on simple correlations.
    But what happens if two economies are following very similar business or financial
    patterns, but one is just “ahead” or “behind” the other by a few quarters?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 循环同步的传统度量通常依赖于简单的相关性。但如果两个经济体遵循非常相似的商业或金融模式，但一个只是“领先”或“落后”另一个几个季度，会发生什么呢？
- en: 'Enter Dynamic Time Warping (DTW), a technique originally developed for speech
    recognition but increasingly popular in data science for comparing time series
    with similar shapes yet different timings. In our [paper](https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5238187),
    “Warpings in Time: Business and Financial Cycle Synchronization in the Euro Area”
    (Bugdalle & Pfeifer, 2025), we construct composite indices of euro-area business
    and financial cycles and then use DTW to measure how closely these cycles align
    across countries. Our Optimal Currency Area (OCA) monitor that makes it possible
    to track cycle divergence in real time — and to spot phase lags without penalizing
    them as harshly as traditional metrics would.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 进入动态时间扭曲（DTW），这是一种最初为语音识别开发的技巧，但越来越在数据科学中流行，用于比较形状相似但时间不同的时间序列。在我们的论文“时间扭曲：欧元区商业和金融周期同步”（Bugdalle
    & Pfeifer，2025年）中，我们构建了欧元区商业和金融周期的综合指数，然后使用DTW来衡量这些周期在不同国家之间的对齐程度。我们的最优货币区（OCA）监控器使得能够实时跟踪周期差异— 并且能够发现相位滞后，而不会像传统指标那样严厉地惩罚它们。
- en: Capturing phase shifts and amplitude differences
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 捕捉相位移动和振幅差异
- en: 'Most existing studies of cycle synchronization do three things that can be
    problematic:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数现有的循环同步研究做了三件事，这些事情可能会存在问题：
- en: '**Static treatment of cycles**: For example, trend-extraction methods (like
    the HP filter) remove the cyclical components from the data. Even in more complex
    frameworks — such as state-space models that do allow for cyclicality — the cycle
    frequency itself often remains fixed.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对周期的静态处理**：例如，趋势提取方法（如HP滤波器）从数据中移除周期成分。即使在更复杂的框架中— 例如允许周期性的状态空间模型— 周期频率本身通常保持固定。'
- en: '**Use of the mean**: Standard dispersion indicators like variance or standard
    deviation always misinterpret the average as the “optimum”. In other words, distances
    are not measured between pairs of cycles, but relative to a mean or reference
    cycle. This obscures multimodality. For instance, if our cycles actually fall
    into two (or more) well-separated clusters, the centroid will lie between them — in
    a region where no real data exist — and all the cycle-to-mean distances will look
    moderate, even though cycles from different clusters are actually extremely distant.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用平均值**：标准分散指标，如方差或标准差，总是错误地将平均值解释为“最佳”。换句话说，距离不是在两个周期之间测量，而是相对于平均值或参考周期。这掩盖了多模态性。例如，如果我们的周期实际上落入两个（或更多）很好地分离的簇中，质心将位于它们之间— 在一个没有真实数据的区域— 并且所有周期到平均值的距离看起来都很适中，尽管来自不同簇的周期实际上非常遥远。'
- en: '**Phase shifts**: Most distance measures are Euclidean. For example, two cycles
    may be slightly shifted in time yet still perfectly synchronized. This point may
    be particularly important for monetary policy. Many OCA indicators end up overstating
    divergence, especially in periods when economies are “nearly” in sync but offset
    by a few months or quarters.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**相位偏移**：大多数距离度量都是欧几里得距离。例如，两个周期可能在时间上略有偏移，但仍能完美同步。这一点对于货币政策可能尤为重要。许多OCA指标最终会高估分歧，尤其是在经济“几乎”同步但相差几个月或几个季度的情况下。'
- en: Dynamic Time Warping (DTW) for cycle synchronization
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 周期同步的动态时间扭曲（DTW）
- en: 'DTW is a non-parametric algorithm that finds the optimal alignment (or “warping”)
    between two time series by allowing one series to stretch or compress in time
    to match the other. In our case, DTW is applied to each type of the smoothed cycle
    indices, meaning one measure of similarity is estimated for each type of cycle.
    Within each cycle category, DTW computes the alignment path *π*[*ij*] for each
    pair of countries *i* and *j* that minimizes the cumulative distance between two
    cycles:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: DTW是一种非参数算法，通过允许一个时间序列在时间上拉伸或压缩以匹配另一个时间序列，从而找到两个时间序列之间的最佳对齐（或“扭曲”）。在我们的案例中，DTW应用于每种平滑周期指数类型，这意味着为每种周期类型估计一个相似度度量。在每个周期类别中，DTW计算每对国家*i*和*j*之间的对齐路径*π*[*ij*]，该路径最小化了两个周期之间的累积距离：
- en: \[D(\mathbf{x}_i, \mathbf{x}_j) = \min{\pi_{ij}} \sum_{(t, s) \in \pi_{ij}}
    \left| \mathbf{x}_{i,t} – \mathbf{x}_{j,s} \right|^2,\]
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: \[D(\mathbf{x}_i, \mathbf{x}_j) = \min{\pi_{ij}} \sum_{(t, s) \in \pi_{ij}}
    \left| \mathbf{x}_{i,t} – \mathbf{x}_{j,s} \right|^2,\]
- en: where **x**[i]and **x**[j]is the smoothed cycle values at time *t* and *s* for
    countries *i* and *j*, respectively. The resulting distance ***D***(**x**[i],
    **x**[j]) captures the degree of similarity, with smaller values indicating closer
    alignment of the two cycles. To ensure that the DTW comparison reflects the timing
    of cyclical movements, the alignment is performed over a local window (Sakoe-Chiba
    Band) defined by the average cycle duration. Finally, to aggregate all pairwise
    DTW distances into one euro‐area indicator, we compute a GDP‐weighted mean of
    ***D***(**x**[i], **x**[j]). This weighted average is the divergence index shown
    below (Figure 3).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 其中**x**[i]和**x**[j]是时间*t*和*s*时国家*i*和*j*的平滑周期值。结果距离***D***(**x**[i], **x**[j])捕捉了相似度程度，较小的值表示两个周期更接近对齐。为了确保DTW比较反映了周期性运动的时机，对齐是在由平均周期持续时间定义的局部窗口（Sakoe-Chiba
    Band）上进行的。最后，为了将所有成对DTW距离汇总成一个欧元区指标，我们计算了***D***(**x**[i], **x**[j])的GDP加权平均值。这个加权平均值是下面显示的分歧指数（图3）。
- en: 'Key benefits of DTW with Sakoe-Chiba Bands in an economic-cycle context:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在经济周期背景下使用Sakoe-Chiba Bands的DTW的关键优势：
- en: '**Phase-invariance.** Small lags or leads don’t automatically trigger large
    divergence scores. A one-quarter shift won’t severely penalize the distance if
    the underlying patterns remain almost identical.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相位不变性**。小的滞后或领先不会自动触发大的分歧得分。如果基本模式几乎相同，一个季度的偏移不会严重惩罚距离。'
- en: '**Shape sensitivity.** DTW preserves information about amplitude, trend reversals,
    and the relative “shape” of booms and busts. Two countries that both experience
    a sharp credit boom — even if one is ahead by a quarter — will still be deemed
    highly similar.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**形状敏感性**。DTW保留了关于振幅、趋势反转以及繁荣和萧条相对“形状”的信息。两个都经历过急剧信贷繁荣的国家——即使其中一个领先一个季度——仍将被认为高度相似。'
- en: '**Time-varying flexibility.** By applying DTW over a rolling window (e.g.,
    a local band of ±5 quarters for business cycles, ±6 quarters for financial cycles),
    the method adapts to changing cycle durations without imposing a fixed frequency.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间变化的灵活性**。通过在滚动窗口（例如，商业周期的±5个季度，金融周期的±6个季度）上应用DTW，该方法适应了变化的周期持续时间，而不强加一个固定的频率。'
- en: Building composite business and financial cycles
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建复合商业和金融周期
- en: 'To illustrate DTW’s power, we first construct two composite cycle indices for
    each euro-area country:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明DTW的力量，我们首先为每个欧元区国家构建两个复合周期指数：
- en: '**Business Cycle Index**: Quarterly real GDP growth, private consumption growth,
    gross fixed capital formation growth, and unemployment growth.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**商业周期指数**：季度实际GDP增长、私人消费增长、固定资本形成总额增长和失业增长。'
- en: '**Financial Cycle Index**: Quarterly real credit growth (bank lending), house-price
    growth, stock-price growth, and government bond-price growth.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**金融周期指数**：季度实际信贷增长（银行贷款）、房价增长、股价增长和政府债券价格增长。'
- en: Using a non-parametric approach introduced by Schüler et al. (2020), we extract
    each country’s underlying cycle — an index that alternates between 0 and 1 to
    reflect expansionary versus contractionary phases, but with time-varying amplitude
    and duration. This avoids rigid detrending and keeps turning points intact.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Schüler等人（2020年）引入的非参数方法，我们提取每个国家的潜在周期——一个在0和1之间交替的指数，以反映扩张和收缩阶段，但具有随时间变化的振幅和持续时间。这避免了刚性去趋势并保持转折点完整。
- en: '**Figures 1 and 2**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1和图2**'
- en: '![](../Images/5c6fc1c1b9a391c8f5fae7489fc86f62.png)![](../Images/7849a2574e6f06827c628a33695f4c63.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5c6fc1c1b9a391c8f5fae7489fc86f62.png)![图片](../Images/7849a2574e6f06827c628a33695f4c63.png)'
- en: 'Note: Indices of business cycle and financial cycles as deviations from their
    historical median growth — 0.5 corresponds to the long-term median growth rate
    of each index. The composite financial cycle combines quarter-on-quarter growth
    in credit, house prices, equity prices and bond prices — showing both the raw
    (unfiltered) series and the band-pass-filtered series using country-specific frequency
    bands. The filtered business cycle combines quarter-on-quarter growth in GDP,
    consumption, investment, and unemployment'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：商业周期和金融周期的指数是相对于其历史中位数的偏差——0.5对应于每个指数的长期中位增长率。综合金融周期结合了信贷、房价、股票价格和债券价格的季度环比增长——显示了原始（未过滤）序列和采用特定国家频率带的带通滤波序列。过滤后的商业周期结合了GDP、消费、投资和失业的季度环比增长
- en: From pairwise DTW distances to an aggregate divergence monitor
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从成对DTW距离到综合分歧监控器
- en: Once each country’s business and financial cycles are estimated, we compute
    pairwise DTW distances between every pair of countries (e.g., Germany vs. Spain,
    France vs. Italy, etc.). To form a single euro-area “divergence index,” they take
    a GDP-weighted average of all pairwise DTW distances. A higher index value means
    greater divergence across national cycles; a lower value means tighter synchronization.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦估计了每个国家的商业和金融周期，我们就计算每对国家之间的成对DTW距离（例如，德国与西班牙，法国与意大利等）。为了形成一个单一的欧元区“分歧指数”，他们计算所有成对DTW距离的GDP加权平均值。指数值越高，意味着国家周期之间的分歧越大；值越低，意味着同步性越紧密。
- en: '**Figure 3**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3**'
- en: '![](../Images/1637de7c66b96a015792fbd92a9fdc1d.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1637de7c66b96a015792fbd92a9fdc1d.png)'
- en: 'Note: The figure shows quarterly measures of cycle divergence in the euro area
    from 1985Q1–2023Q4\. The dashed purple line plots the mean dynamic-time-warping
    (DTW) distance across all pairwise comparisons of national financial-cycle indices;
    the dashed blue line shows the equivalent for business-cycle indices. The solid
    black line is the GDP-weighted average of these two series, our composite Divergence
    Monitor. Shaded grey bands mark OECD recession periods for the eurozone. Higher
    values indicate greater divergence across member-state cycle'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：该图显示了1985Q1至2023Q4欧元区周期分歧的季度度量。虚线紫色线表示所有国家金融周期指数成对比较的平均动态时间规整（DTW）距离；虚线蓝色线显示商业周期指数的等效值。实线黑色线是这两个系列的GDP加权平均值，我们的综合分歧监控器。阴影灰色带标记欧元区的经合组织（OECD）衰退期。值越高，意味着成员国周期之间的分歧越大
- en: 'When you plot this series (Figure 3), several patterns emerge:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当你绘制这个序列（图3）时，会出现几个模式：
- en: '**1990s convergence**: Business-cycle divergence fell sharply as convergence
    criteria under Maastricht took hold.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1990年代的收敛**：商业周期分歧在马斯特里赫特标准下的收敛标准确立后急剧下降。'
- en: '**Pre-2008 financial divergence**: Financial cycles actually diverged well
    before the global financial crisis — that peak in divergence is almost invisible
    to correlation or amplitude-based metrics.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2008年前的金融分歧**：金融周期实际上在金融危机之前就已经开始分歧——这种分歧的峰值几乎对基于相关性或振幅的指标不可见。'
- en: '**Post-2010 re-alignment**: ECB unconventional monetary policy (OMT, QE) coincided
    with convergence in both business and financial cycles.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2010年后的重新定位**：欧洲央行（ECB）的非传统货币政策（OMT，QE）与商业和金融周期的收敛相一致。'
- en: '**Late-2021 uptick**: Since the COVID-19 shock, divergence has begun creeping
    back up, as some countries likely recovered faster than others.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2021年末的上升**：自COVID-19冲击以来，分歧开始缓慢上升，因为一些国家的恢复可能比其他国家更快。'
- en: Takeaways for data scientists and economists
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对数据科学家和经济学家的启示
- en: '**Flexible pattern matching**: When comparing economic (or any) time series
    that may share the same “shape” but are out of phase, DTW is often a better similarity
    measure than Euclidean distance or straightforward correlation.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活模式匹配**：当比较可能具有相同“形状”但不同步的经济（或任何）时间序列时，DTW（动态时间规整）通常比欧几里得距离或直接相关性是一个更好的相似度度量。'
- en: '**Handling non-stationary frequencies**: Business and financial cycles don’t
    come in neat, fixed-length packages. DTW’s ability to adapt to varying cycle durations
    preserves real-world turning points.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理非平稳频率**：商业和金融周期并非以整洁、固定长度的包出现。DTW适应不同周期长度的能力保留了现实世界的转折点。'
- en: Interested in exploring the code or following the live “Divergence Monitor”
    for the euro area? Check out [](https://github.com/Moritz-Pfeifer/Divergence_Monitor)
    [https://github.com/Moritz-Pfeifer/Divergence_Monitor](https://github.com/Moritz-Pfeifer/Divergence_Monitor)
    for data, Python notebooks, and [https://moritz-pfeifer.github.io/eurozone-divergence-monitor/](https://moritz-pfeifer.github.io/eurozone-divergence-monitor/)
    for an interactive visualization that lets you see how synchronization has evolved
    since the 1980s.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 想要探索代码或跟踪欧元区的实时“分歧监控器”？请查看[代码或监控器](https://github.com/Moritz-Pfeifer/Divergence_Monitor)
    [https://github.com/Moritz-Pfeifer/Divergence_Monitor](https://github.com/Moritz-Pfeifer/Divergence_Monitor)以获取数据、Python笔记本，以及[交互式可视化](https://moritz-pfeifer.github.io/eurozone-divergence-monitor/)
    [https://moritz-pfeifer.github.io/eurozone-divergence-monitor/](https://moritz-pfeifer.github.io/eurozone-divergence-monitor/)，让您看到自1980年代以来同步如何演变。
- en: '**References:**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考文献：**'
- en: '**Bugdalle, T., Pfeifer, M. (2025).** Warpings in time: Business and financial
    cycle synchronization in the euro area. *SSRN* preprint. [Link to working paper](https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5238187)'
  id: totrans-41
