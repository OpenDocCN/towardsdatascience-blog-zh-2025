- en: 'Designing Trustworthy ML Models: Alan & Aida Discover Monotonicity in Machine
    Learning'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设计可信赖的机器学习模型：艾伦与艾达发现机器学习中的单调性
- en: 原文：[https://towardsdatascience.com/designing-trustworthy-ml-models-alan-aida-discover-monotonicity-in-machine-learning/](https://towardsdatascience.com/designing-trustworthy-ml-models-alan-aida-discover-monotonicity-in-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/designing-trustworthy-ml-models-alan-aida-discover-monotonicity-in-machine-learning/](https://towardsdatascience.com/designing-trustworthy-ml-models-alan-aida-discover-monotonicity-in-machine-learning/)
- en: <mdspan datatext="el1755805211291" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755805211291" class="mdspan-comment">简介</mdspan>
- en: Machine learning models are powerful, but sometimes they produce predictions
    that break human intuition.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习模型很强大，但有时它们会产生违反人类直觉的预测。
- en: 'Imagine this: you’re predicting house prices. A 2,000 sq. ft. home is predicted
    cheaper than a 1,500 sq. ft. home. Sounds wrong, right?'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：你正在预测房价。一个2000平方英尺的房子预测的价格比1500平方英尺的房子便宜。听起来不对，对吧？
- en: This is where **monotonicity constraints** step in. They make sure models follow
    the logical business rules we expect.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**单调性约束**介入的地方。它们确保模型遵循我们期望的逻辑业务规则。
- en: Let’s follow two colleagues, **Alan** and **Aida**, on their journey to discover
    why monotonicity matters in machine learning.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们跟随两位同事，**艾伦**和**艾达**，了解他们在机器学习中为什么单调性很重要。
- en: 'The Story: Alan & Aida’s Discovery'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故事：艾伦与艾达的发现
- en: Alan is a practical engineer. Aida is a principled scientist. Together, they’re
    building a house price prediction model.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 艾伦是一位务实的工程师。艾达是一位有原则的科学家。他们一起构建了一个房价预测模型。
- en: 'Alan proudly shows Aida his model results:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 艾伦自豪地向艾达展示他的模型结果：
- en: “Look! R² is great, the error is low. We’re ready to deploy!”
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: “看！R² 值很好，误差很低。我们准备部署了！”
- en: 'Aida takes the model out for testing:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 艾达将模型拿出进行测试：
- en: For a house with **1500 sq ft** → Model predicts **$300,000**
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于面积为**1500 平方英尺**的房屋→模型预测**$300,000**
- en: For a house with **2000 sq ft** → Model predicts **$280,000** 😮
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于面积为**2000 平方英尺**的房屋→模型预测**$280,000** 😮
- en: 'Aida frowns as she looks at the predictions:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 艾达看着预测结果皱起了眉头：
- en: “Wait a second… Why is this 2,000 sq. ft. home predicted cheaper than a 1,500
    sq. ft. home? That doesn’t make sense.”
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: “等等…为什么这个2000平方英尺的房子预测的价格比1500平方英尺的房子便宜？这说不通。”
- en: 'Alan shrugs:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 艾伦耸了耸肩：
- en: “That’s because the model found noise in the training data. It’s not always
    logical. But, the accuracy is good overall. Isn’t that enough?”
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: “那是因为模型在训练数据中发现了噪声。它并不总是合乎逻辑的。但是，整体上准确率是好的。这还不够吗？”
- en: 'Aida shakes her head:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 艾达摇了摇头：
- en: “Not really. A trustworthy model must not only be accurate but also follow logic
    people can trust. Customers won’t trust us if bigger homes sometimes look cheaper.
    We need a guarantee. This is a **monotonicity problem**.”
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: “不尽然。一个可信赖的模型不仅必须是准确的，还必须遵循人们可以信赖的逻辑。如果大房子有时看起来更便宜，客户就不会信任我们。我们需要保证。这是一个**单调性问题**。”
- en: 'And just like that, Alan learns his next big ML lesson: metrics aren’t everything.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样，艾伦学到了他的下一个重要机器学习课程：指标并非一切。
- en: What is Monotonicity in ML?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习中的单调性是什么？
- en: 'Aida explains:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 艾达解释说：
- en: '**“Monotonicity** means predictions move in a consistent direction as inputs
    change. It is like telling the model: as square footage goes up, price should
    never go down. We call it **Monotone increasing.** Or, as another example, as
    a house age gets older, predicted prices should not go up. We call this **Monotone
    decreasing**.”'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**“单调性”意味着随着输入的变化，预测结果会朝着一致的方向移动。这就像告诉模型：随着面积的增大，价格永远不会下降。我们称之为**单调递增**。或者，以另一个例子来说，随着房屋年龄的增长，预测价格不应上升。我们称之为**单调递减**。”'
- en: 'Alan concludes that:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 艾伦总结说：
- en: '“So monotonicity here matters because it:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: “所以这里的单调性很重要，因为它：
- en: Aligns with **business logic**, and
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与**业务逻辑**一致，
- en: Improves **trust & interpretability**.”
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高信任度和**可解释性**。”
- en: 'Aida nodded:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 艾达点了点头：
- en: “Yes, Plus, it helps meet **fairness & regulatory expectations**.”
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “是的，而且它有助于满足**公平性与监管期望**。”
- en: Visualizing the Problem
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化问题
- en: 'Aida creates a toy dataset in Pandas to show the problem:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Aida 在 Pandas 中创建了一个玩具数据集来展示问题：
- en: '[PRE0]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'And then she plots the violations:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，她绘制了违规情况：
- en: '[PRE2]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/8e3e01d295323f7a7982cf54a94f2dbd.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8e3e01d295323f7a7982cf54a94f2dbd.png)'
- en: 'Aida points to the Dips: “Here’s the problem: **1,800 sq. ft. is priced lower
    than 1,500 sq. ft. and 2,250 sq. ft. is priced lower than 2,200 sq. ft.**”'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 艾达指向低谷：“这里的问题是：**1800平方英尺的价格低于1500平方英尺，而2250平方英尺的价格低于2200平方英尺**。”
- en: Fixing It with Monotonicity Constraints in XGBoost
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 XGBoost 中使用单调性约束来修复问题
- en: Alan retrains the model and sets a **monotonic increasing constraint** on *square
    footage* and **monotonic decreasing constraint** on*house age*.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Alan重新训练模型，并对*面积*设置**单调递增约束**，对*房屋年龄*设置**单调递减约束**。
- en: This forces the model to always
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这迫使模型始终
- en: increase (or stay the same) when *square footage* increases given all other
    features are fixed.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当所有其他特征固定时，给定*面积*增加（或保持不变）。
- en: decrease (or stay the same) when house age increases given all other features
    are fixed.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当房屋年龄增加（或保持不变）时，给定所有其他特征固定。
- en: 'He uses XGBoost that makes it easy to enforce monotonicity:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 他使用XGBoost，这使得强制单调性变得容易：
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Alan hands over the new model to Aida. “Now the model respects domain knowledge.
    Predictions for larger houses **will never dip below** smaller ones.”
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: Alan将新模型交给Aida。“现在模型尊重领域知识。对于更大的房屋的预测**永远不会低于**较小的房屋。”
- en: 'Aida tests the model again:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Aida再次测试模型：
- en: 1500 sq ft → $300,000
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1500平方英尺 → $300,000
- en: 2000 sq ft → $350,000
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2000平方英尺 → $350,000
- en: 2500 sq ft → $400,000
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2500平方英尺 → $400,000
- en: Now she sees a smoother plot of house prices vs square footage.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，她看到了更平滑的房价与面积的关系图。
- en: '[PRE5]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/4cc445c9110d18aedf9745caa6cf8b37.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4cc445c9110d18aedf9745caa6cf8b37.png)'
- en: '**Aida:** “Perfect! When homes are of the same age, a larger size consistently
    leads to a higher or equal price. Conversely, homes of the same square footage
    will always be priced lower if they are older.”'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**Aida:** “完美！当房屋年龄相同时，更大的面积始终会导致更高的或相等的房价。相反，如果房屋面积相同，那么较旧的房屋价格总是会低一些。”'
- en: '**Alan:** “Yes — we gave the model *guardrails* that align with domain knowledge.”'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**Alan:** “是的——我们给模型提供了与领域知识一致的*限制条件*。”'
- en: Real-World Examples
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现实世界案例
- en: '**Alan:** what other domains can benefit from monotonicity constraints?'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**Alan:** 哪些其他领域可以从单调性约束中受益？'
- en: '**Aida:** Anywhere **customers or money** are involved, monotonicity can impact
    trust. Some domains where monotonicity really matters are:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**Aida:** 在任何涉及客户或金钱的地方，单调性都可能影响信任。一些单调性真正重要的领域包括：'
- en: '**House pricing** → Larger homes should not be priced lower.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**房屋定价** → 更大的房屋不应定价低于。'
- en: '**Loan approvals** → Higher income should not reduce approval probability.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贷款批准** → 更高的收入不应降低批准概率。'
- en: '**Credit scoring** → Longer repayment history should not lower the score.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信用评分** → 更长的还款历史不应降低评分。'
- en: '**Customer lifetime value (CLV)** → More purchases shouldn’t lower CLV predictions.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户终身价值 (CLV)** → 更多购买不应降低CLV预测。'
- en: '**Insurance pricing** → More coverage should not reduce the premium.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保险定价** → 更多的保险范围不应降低保费。'
- en: '* * *'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Takeaways
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸收要点
- en: Accuracy alone doesn’t guarantee **trustworthiness**.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仅准确性并不能保证**可靠性**。
- en: Monotonicity ensures predictions align with **common sense and business rules**.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单调性确保预测与**常识和商业规则**一致。
- en: Customers, regulators, and stakeholders are more likely to accept and use models
    that are both **accurate and logical**.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户、监管机构和利益相关者更有可能接受和使用既**准确又合理**的模型。
- en: 'As Aida reminds Alan:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 正如Aida提醒Alan的：
- en: “Make models not just smart, but sensible.”
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: “让模型不仅聪明，而且明智。”
- en: '* * *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Closing Thoughts
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: 'Next time you build a model, don’t just ask: *How accurate is it?* Also ask:
    *Does it make sense to the people who’ll use it?*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 下次你构建模型时，不要只问：“它的准确度如何？”也要问：“它对使用它的人有意义吗？”
- en: Monotonicity constraints are one of many tools for **designing trustworthy ML
    models** — alongside explainability, fairness constraints, and transparency.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 单调性约束是设计**可信赖的机器学习模型**的许多工具之一——与可解释性、公平性约束和透明度并列。
- en: . . .
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: . . .
