- en: What Being a Data Scientist at a Startup Really Looks Like
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 初创公司数据科学家的真实面貌
- en: 原文：[https://towardsdatascience.com/what-being-a-data-scientist-at-a-startup-really-looks-like/](https://towardsdatascience.com/what-being-a-data-scientist-at-a-startup-really-looks-like/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/what-being-a-data-scientist-at-a-startup-really-looks-like/](https://towardsdatascience.com/what-being-a-data-scientist-at-a-startup-really-looks-like/)'
- en: <mdspan datatext="el1756874384863" class="mdspan-comment">After an incredible</mdspan>
    five years, I left Brex in August. Time really flies. I joined Brex when it was
    three years old, and I can still vividly remember my first day. At the same time,
    those five years felt much longer. This is all due to the extensive knowledge
    I’ve gained along the way, from joining a young data team and learning the full
    data cycle, to collaborating with Operations, GTM, and Product, and eventually
    [transitioning into management](https://towardsdatascience.com/from-data-scientist-ic-to-manager-one-year-in/).
    This accelerated growth is one of the biggest benefits of joining a startup as
    a data scientist.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756874384863" class="mdspan-comment">在令人难以置信的</mdspan>五年后，我在八月份离开了Brex。时间真的飞逝。我是在Brex成立三年时加入的，我仍然清晰地记得我的第一天。同时，这五年感觉要长得多。这一切都归功于我在路上获得的大量知识，从加入一个年轻的数据团队并学习完整的数据周期，到与运营、GTM和产品团队合作，最终[过渡到管理](https://towardsdatascience.com/from-data-scientist-ic-to-manager-one-year-in/)。这种加速增长是作为数据科学家加入初创公司最大的好处之一。
- en: “Shall I join a startup or a more established company?” I hear this question
    from my network all the time. In this article, I will share the data scientist’s
    life at a startup based on my own experience. Hopefully, this will help you navigate
    through your own career path.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: “我应该加入初创公司还是一家更成熟的公司？”我经常从我的网络中听到这个问题。在这篇文章中，我将根据我的个人经验分享初创公司数据科学家的生活。希望这能帮助你在自己的职业道路上找到方向。
- en: '*A quick note: “startup” is a broad term that covers many types of companies.
    For context, Brex is a US-based fintech startup that provides corporate cards,
    banking services, and expense management software for business customers. I joined
    Brex after three years of full-time experience in product data science. At the
    time, Brex was a three-year-old Series C startup with 500+ employees. Therefore,
    my experience may differ from what you’d experience at an earlier-stage company.*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*快速笔记：“初创公司”是一个广泛的概念，涵盖了多种类型的公司。为了便于理解，Brex是一家位于美国的金融科技初创公司，为商业客户提供企业卡、银行服务和费用管理软件。我在拥有三年全职产品数据科学经验后加入了Brex。当时，Brex是一家拥有500多名员工的三年级C轮融资初创公司。因此，我的经验可能与你在早期阶段公司的工作经验不同。*'
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I. Domain-specific vs. Goal-oriented
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I. 领域特定与目标导向
- en: Startups move fast — they need to adjust strategies based on the market feedback
    and iterate constantly to ensure product-market fit. Data Scientists, as an expensive
    resource, need to shift their focus area accordingly to create the largest business
    value.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 初创公司发展迅速——他们需要根据市场反馈调整策略，并不断迭代以确保产品与市场匹配。作为一项昂贵的资源，数据科学家需要相应地调整他们的关注领域，以创造最大的商业价值。
- en: 'Taking my own experience as an example:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 以我自己的经验为例：
- en: When I first joined Brex, the priority was to onboard as many customers as we
    could while controlling for fraud risk. Therefore, I worked closely with the Onboarding
    team to optimize the account application flow and improve resource allocation
    for the Operations team.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当我最初加入Brex时，优先事项是尽可能多地上线客户，同时控制欺诈风险。因此，我密切与上线团队合作，优化账户申请流程，并改善运营团队的资源分配。
- en: As our customer base grew, the next priority was to scale our customer support
    (CX) function to provide the best-in-class support. I partnered with the CX team
    to analyze customer pain points and reduce product frictions. (Read [my article](https://towardsdatascience.com/the-secret-power-of-data-science-in-customer-support/)
    for more details on DS in CX.)
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随着我们的客户群不断扩大，下一个优先事项是扩展我们的客户支持（CX）功能，以提供一流的客户支持。我与CX团队合作，分析客户痛点并减少产品摩擦。（阅读[我的文章](https://towardsdatascience.com/the-secret-power-of-data-science-in-customer-support/)了解更多关于CX中数据科学的细节。）
- en: Later, I collaborated with the Implementation team to accelerate ramp-up for
    new customers and with the product team to identify churn drivers and improve
    retention.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 之后，我与实施团队合作，加快新客户的上线速度，并与产品团队合作，识别流失驱动因素并提高留存率。
- en: As you can see, startups are very goal-oriented. At large firms, you might specialize
    in one product feature for years; At a startup, the company’s needs can completely
    change within a quarter, and data scientists change their domains more frequently
    as a result.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，初创公司非常以目标为导向。在大公司中，你可能会专注于一个产品特性多年；而在初创公司，公司的需求可能在季度内完全改变，数据科学家也因此更频繁地改变他们的领域。
- en: The upside is that this allows the data scientists to explore and collaborate
    with more functions and have a more holistic view of the business. I worked with
    nearly every team at Brex in the past five years — watching how GTM (go-to-market)
    found prospects and closed deals, seeing how Product and Customer Support worked
    together to address customer pain points, and learning how the Customer Success
    team reduced churn and drove upsell. This is a far more effective way to understand
    business operations than reading books or taking courses at a business school.
    It also ensures the data scientists have clear and high-impact business questions
    to solve.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 优点是这允许数据科学家探索并与更多功能协作，对业务有更全面的了解。在过去五年中，我几乎与Brex的每个团队都合作过——观察GTM（市场进入）如何寻找潜在客户并关闭交易，看到产品与客户支持如何共同解决客户痛点，以及学习客户成功团队如何降低客户流失率并推动增值销售。这比阅读书籍或参加商学院的课程更有效地了解业务运营。这也确保了数据科学家有明确且具有高影响力的业务问题要解决。
- en: But what’s the challenge? Data scientists need to follow the company’s strategy
    and adapt to changes constantly. This means shifting priorities accordingly, and
    sometimes having to build things the fastest way, instead of the most scalable
    or reliable way. Tech debt piles up quickly with tons of one-off dashboards and
    multiple versions of the same metric, confusing stakeholders and the data team
    itself. Establishing the best practices takes time, so living with the chaos sometimes
    is unavoidable — though being able to set up the standards from 0 to 1 (or seeing
    others doing so) is also a rewarding part of working at a startup, especially
    for aspiring data science leaders.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 但挑战是什么？数据科学家需要遵循公司的战略并不断适应变化。这意味着相应地调整优先级，有时不得不以最快的方式构建事物，而不是最可扩展或最可靠的方式。随着大量一次性仪表板和多个版本的同一样指标的累积，技术债务迅速增加，这会让利益相关者和数据团队本身感到困惑。建立最佳实践需要时间，因此有时不得不与混乱共存——尽管能够从零开始建立标准（或看到别人这样做）也是初创公司工作中的一个有回报的部分，尤其是对于有志成为数据科学领导者的人来说。
- en: II. Data Analyst vs. Data Engineer vs. Data Scientist? All the Above.
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II. 数据分析师 vs. 数据工程师 vs. 数据科学家？以上皆是。
- en: Job titles in data these days are confusing — Some Data Scientists focus on
    experimentation, while some are deep in machine learning; Some Data Analysts simply
    build dashboards, but some primarily do product analytics. But when it comes to
    startups, titles matter less — you will likely do everything.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的数据职位名称很令人困惑——一些数据科学家专注于实验，而另一些则深入机器学习；一些数据分析师只是构建仪表板，但一些主要进行产品分析。但说到初创公司，头衔的重要性较小——你可能会做所有的事情。
- en: When I joined Brex, everyone had the same title, “Data Scientist”, but we all
    had to wear multiple hats. We split the data team into DS, DA, and DE functions
    only since early last year. As I mentioned above, startups are goal-oriented.
    Therefore, when there are limited people and no clear team structure, you will
    need to do everything to achieve the goal.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当我加入Brex时，每个人都拥有相同的头衔，“数据科学家”，但我们所有人都必须戴多顶帽子。我们只是在去年初将数据团队分为DS、DA和DE功能。如我上面提到的，初创公司以目标为导向。因此，当人员有限且没有明确的团队结构时，你需要做一切事情来实现目标。
- en: '**Data Engineering**: I learned [data modeling](https://towardsdatascience.com/top-5-principles-for-building-user-friendly-data-tables-0dfe168cecc1/),
    Airflow, ETL processes, [SQL optimization](https://towardsdatascience.com/mastering-sql-optimization-from-functional-to-efficient-queries-74d8692f10be/),
    and many other data engineering skills in the past five years. I remember one
    of my first projects at Brex was to migrate our data pipelines from dbt to an
    internal tool. Yes, as a data scientist at a startup, there is a high chance you
    also need to build, own, and maintain your own data pipelines.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据工程**：在过去五年中，我学习了数据建模、Airflow、ETL流程、SQL优化等许多数据工程技能。[数据建模](https://towardsdatascience.com/top-5-principles-for-building-user-friendly-data-tables-0dfe168cecc1/)、Airflow、ETL流程、[SQL优化](https://towardsdatascience.com/mastering-sql-optimization-from-functional-to-efficient-queries-74d8692f10be/)等。我还记得我在Brex的第一个项目是将我们的数据管道从dbt迁移到内部工具。是的，作为初创公司的数据科学家，你很可能也需要构建、拥有和维护自己的数据管道。'
- en: '**Analytics**: Joining a startup means there are many business areas with no
    or minimal data support. Therefore, to help the team better understand their performance
    and gain their trust, the very first step (after you have built the data pipelines)
    is to define the success metrics and build the dashboards. Once the metrics are
    closely monitored, questions like why they moved or how to move them come next
    naturally. These are all common analytics tasks.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析**：加入一家初创公司意味着有许多业务领域没有或只有很少的数据支持。因此，为了帮助团队更好地理解他们的表现并赢得他们的信任，在你建立数据管道之后的第一步是定义成功指标并构建仪表板。一旦指标得到密切监控，接下来自然会出现诸如为什么它们会移动或如何移动它们等问题。这些都是常见的分析任务。'
- en: '**Data Science**: There are also plenty of advanced data science use cases
    at startups. Machine learning models are helpful to detect fraud, predict churn,
    estimate LTV (lifetime value), etc. Causal inference is also critical to evaluate
    the impact of a marketing campaign or a product launch.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据科学**：初创公司也有很多高级数据科学用例。机器学习模型有助于检测欺诈、预测流失、估算LTV（终身价值）等。因果推断对于评估营销活动或产品发布的影响也至关重要。'
- en: Is it a good or bad thing to wear multiple hats?
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 同时戴多顶帽子是好事还是坏事？
- en: If you are not yet sure about which type of data track you are most interested
    in, joining a startup will help you to get some flavor of everything and decide
    which route to go next. Or if you would like to become a Head of Data or even
    build your own company someday, this full-cycle exposure is super valuable.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有确定你对哪种类型的数据跟踪最感兴趣，加入一家初创公司将帮助你尝试一切，并决定下一步走哪条路。或者，如果你希望成为数据部门负责人甚至有朝一日建立自己的公司，这种全周期的接触是非常宝贵的。
- en: Meanwhile, the downside is also very clear — you will spend time on things you
    are not interested in, or not that relevant to your long-term career goal. The
    fact that you own the whole data lifecycle can also confuse stakeholders, as they
    usually only care about a certain type of output, for example, dashboards or models,
    but do not realize you need to spend another 50% of time on data pipelining.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，缺点也很明显——你会在你不太感兴趣或与你的长期职业目标不太相关的事情上浪费时间。你拥有整个数据生命周期的事实也可能让利益相关者感到困惑，因为他们通常只关心某种类型的输出，例如仪表板或模型，但没有意识到你需要花另外50%的时间在数据管道上。
- en: III. Higher visibility
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III. 更高的可见性
- en: Data scientists at startups never lack visibility. From day one at Brex, I got
    to work directly with the C-suite. Leadership will often come to you with urgent
    and important business questions, hoping you can do some data magic to uncover
    insights and drive business growth. This is not something you usually get to experience
    at an established company, especially as a junior data scientist. It is a high-pressure
    but highly rewarding environment.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 初创公司的数据科学家从不缺乏可见性。自从加入Brex的第一天起，我就有机会直接与高管层合作。领导层经常会带着紧急且重要的业务问题来找你，希望你能施展一些数据魔法来揭示洞察力并推动业务增长。这通常不是你在一家成熟公司能体验到的，尤其是作为一名初级数据科学家。这是一个高压但极具回报的环境。
- en: For example, during the [Silicon Valley Bank Crisis in March 2023](https://en.wikipedia.org/wiki/Collapse_of_Silicon_Valley_Bank),
    many startups were impacted, facing the risk of losing their operational funds.
    I worked very closely with the leadership team to help startups survive this hard
    time. I created a real-time tracker on new customer applications, analyzed application
    review velocity to estimate additional workforce needs, and collaborated with
    other DS to automate and speed up onboarding checks. It was an intense weekend,
    working cross-functionally in a war room (virtually on Zoom) from 8 am to midnight.
    However, this is one of my best memories at Brex, showing the true customer obsession
    from our leadership, and how data scientists can contribute directly and drive
    huge business impact.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在2023年3月的[硅谷银行危机](https://en.wikipedia.org/wiki/Collapse_of_Silicon_Valley_Bank)期间，许多初创公司受到了影响，面临着失去运营资金的危险。我与领导团队紧密合作，帮助初创公司度过这段艰难时期。我创建了一个实时跟踪新客户申请的系统，分析了申请审查速度以估算额外的人力需求，并与其他数据科学家合作自动化和加速入职检查。这是一个紧张的周末，我们从早上8点工作到午夜，在战室（通过Zoom虚拟会议）跨职能工作。然而，这却是我在Brex最好的回忆之一，展示了我们领导层的真正客户至上，以及数据科学家如何直接贡献并推动巨大的商业影响。
- en: IV. Exposure to new tools
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: IV. 接触新工具
- en: Young startups are also brave enough to try a new tech stack. Therefore, they
    are often the early adopters of new tools, while larger companies might take months
    (and layers of approval) before even piloting, not to mention the significant
    migration costs.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 年轻的初创公司也足够勇敢地尝试新的技术堆栈。因此，它们通常是新工具的早期采用者，而大公司可能需要数月（以及多层审批）才能进行试点，更不用说重大的迁移成本了。
- en: For example, during my time at Brex,
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在我任职Brex期间，
- en: We started exploring LLM use cases in data science two years ago, and have access
    to all major LLM APIs (OpenAI, Claude, and Gemini) internally, open to everyone.
    Every year, Brex hosts an internal hackathon and encourages employees to innovate.
    Two years ago, I collaborated with engineers to build an [AI-powered customer
    feedback platform](https://medium.com/brexeng/brexs-ai-powered-engine-for-identifying-customer-insights-72aadeb62e8e?source=list---------5-------predefined%3A5462c48cfc57%3AREADING_LIST----------------------------)
    to automatically categorize, summarize, and analyze various unstructured feedback
    data. Last year, I built a RAG-based chatbot to help stakeholders retrieve customer
    feedback related to a specific product feature easily. This year, I worked with
    other data scientists to explore text-to-SQL capabilities with Claude Code and
    Snowflake CLI. I absolutely enjoyed these opportunities to apply cutting-edge
    techniques to data science workstreams.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们两年前开始探索数据科学中的LLM用例，并内部访问了所有主要的LLM API（OpenAI、Claude和Gemini），对所有员工开放。每年，Brex都会举办内部黑客马拉松，并鼓励员工创新。两年前，我与其他工程师合作构建了一个[AI驱动的客户反馈平台](https://medium.com/brexeng/brexs-ai-powered-engine-for-identifying-customer-insights-72aadeb62e8e?source=list---------5-------predefined%3A5462c48cfc57%3AREADING_LIST----------------------------)，以自动分类、总结和分析各种非结构化反馈数据。去年，我构建了一个基于RAG的聊天机器人，帮助利益相关者轻松检索与特定产品功能相关的客户反馈。今年，我与其他数据科学家一起探索了Claude
    Code和Snowflake CLI的文本到SQL功能。我非常享受将这些尖端技术应用于数据科学工作流程的机会。
- en: We frequently piloted new data solutions. For example, we were an early customer
    of [Hex](https://hex.tech/) for collaborative and easy-to-share data notebooks.
    We use [Statsig](https://www.statsig.com/) for experimentation and event tracking.
    We also tried various AI-powered business intelligence software for better self-service
    analytics.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们经常试点新的数据解决方案。例如，我们是协作和易于共享数据笔记本的[Hex](https://hex.tech/)的早期客户。我们使用[Statsig](https://www.statsig.com/)进行实验和事件跟踪。我们还尝试了各种AI驱动的商业智能软件，以实现更好的自助式分析。
- en: Working at a startup helped me stay informed of new technologies and adopt them
    into my daily workflows. That not only made the work more exciting but also kept
    me competitive as the industry evolved.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在初创公司工作帮助我了解新技术并将其融入我的日常工作中。这不仅使工作更有趣，而且随着行业的演变，也使我保持了竞争力。
- en: On the flip side, being an early adopter can mean disrupting existing workflows
    and rebuilding infrastructure. It also means a less stable development experience.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，作为早期采用者，可能意味着颠覆现有的工作流程和重建基础设施。这也意味着一个不太稳定的开发体验。
- en: '* * *'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: So, should you join a startup or a more established company?
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你应该加入初创公司还是一家更成熟的公司呢？
- en: Startups offer speed, variety, visibility, and cutting-edge exposure. But they
    also bring chaos, shifting priorities, and the need to wear hats you may not enjoy.
    If you thrive in ambiguity and want to accelerate your learning curve, a startup
    can be an incredible place to grow as a data scientist.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 初创公司提供速度、多样性、可见性和前沿的曝光。但它们也带来了混乱、不断变化的重心和可能不喜欢的角色。如果你在不确定性中茁壮成长，并希望加速你的学习曲线，初创公司可以是一个作为数据科学家成长的绝佳地方。
- en: For me, five years at Brex have taught me an incredible amount of knowledge
    about business and data. I will forever be grateful for the lessons, the people,
    and the chance to see what data science can look like at a fast-growing startup.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，在Brex的五年来，我学到了关于商业和数据的宝贵知识。我将永远感激这些教训、这些人以及看到数据科学在快速增长的初创公司中可能是什么样子的机会。
