- en: 'Roadmap to Becoming a Data Scientist, Part 3: Machine Learning'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 成为数据科学家之路，第3部分：机器学习
- en: 原文：[https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-3-machine-learning-628248c96cb5/](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-3-machine-learning-628248c96cb5/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-3-machine-learning-628248c96cb5/](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-3-machine-learning-628248c96cb5/)
- en: '![](../Images/99ff3c51985f159d5cd1c41f4ce69dd0.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/99ff3c51985f159d5cd1c41f4ce69dd0.png)'
- en: Introduction
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Data science is undoubtedly one of the most fascinating fields today. Following
    significant breakthroughs in machine learning about a decade ago, data science
    has surged in popularity within the tech community. Each year, we witness increasingly
    powerful tools that once seemed unimaginable. Innovations such as the *Transformer
    architecture*, *ChatGPT*, the *Retrieval-Augmented Generation (RAG*) framework,
    and state-of-the-art *computer vision models* – including *GANs* – have had a
    profound impact on our world.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学无疑是当今最迷人的领域之一。在机器学习领域大约十年前取得重大突破之后，数据科学在科技社区中的受欢迎程度急剧上升。每年，我们都见证了曾经看似不可思议的强大工具。诸如
    *Transformer 架构*、*ChatGPT*、*检索增强生成 (RAG*) 框架以及最先进的 *计算机视觉模型*（包括 *GANs*）等创新，对我们世界产生了深远的影响。
- en: However, with the abundance of tools and the ongoing hype surrounding AI, it
    can be overwhelming – especially for beginners – to determine which skills to
    prioritize when aiming for a career in data science. Moreover, this field is highly
    demanding, requiring substantial dedication and perseverance.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着工具的丰富和围绕人工智能的持续炒作，确定在追求数据科学职业时应该优先考虑哪些技能可能会让人感到不知所措——尤其是对于初学者来说。此外，这个领域要求极高，需要大量的投入和毅力。
- en: The first two parts of this [series](https://medium.com/@slavahead/list/career-tips-f0a32130fde3)
    focused on essential math and software skills to obtain to become a data scientist.
    In this part, we will dive into probably the most exciting part that directly
    touches necessary machine learning skills!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本系列的的前两部分重点介绍了成为数据科学家所需的基本数学和软件技能。在本部分，我们将深入探讨可能是最激动人心的部分，即直接涉及必要的机器学习技能！
- en: This article will focus solely on the math skills necessary to start a career
    in Data Science. Whether pursuing this path is a worthwhile choice based on your
    background and other factors will be discussed in a separate article.
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 本文将仅关注开始数据科学职业生涯所需的数学技能。是否根据你的背景和其他因素选择这条道路是值得的，将在另一篇文章中讨论。
- en: ''
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Roadmap to Becoming a Data Scientist, Part 1: Maths**](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27)'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**成为数据科学家之路，第1部分：数学**](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27)'
- en: ''
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Roadmap to Becoming a Data Scientist, Part 2: Software Engineering**](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-2-software-engineering-e2fee3fe4d71)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**成为数据科学家之路，第2部分：软件工程**](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-2-software-engineering-e2fee3fe4d71)'
- en: Maths + Engineering → Machine learning
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数学 + 工程学 → 机器学习
- en: Machine learning is a very diverse domain, but to be successful in it, it is
    essential to have solid skills in both math and software engineering.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习是一个非常多样化的领域，但要在这个领域取得成功，必须具备扎实的数学和软件工程技能。
- en: Math knowledge reinforces a deep understanding of the logic behind algorithms,
    which is useful for choosing better solutions, easier debugging, and grasping
    more complex ideas.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数学知识加强了算法背后的逻辑的深入理解，这对于选择更好的解决方案、更容易调试以及掌握更复杂的概念非常有用。
- en: Software engineering allows for the efficient implementation of algorithms and
    pipelines in code using the best development practices.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软件工程允许使用最佳开发实践在代码中高效地实现算法和管道。
- en: '![Artificial Intelligence vs Machine Learning vs Deep Learning](../Images/c413746770ebc2e100147e0ba12d62e9.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![人工智能 vs 机器学习 vs 深度学习](../Images/c413746770ebc2e100147e0ba12d62e9.png)'
- en: Artificial Intelligence vs Machine Learning vs Deep Learning
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能 vs 机器学习 vs 深度学习
- en: 01\. Introduction
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 01. 简介
- en: Before diving directly into algorithms, it is necessary to understand several
    important fundamental blocks. First of all, it is the definition of **machine
    learning**, its difference from **artificial intelligence**, and what makes a
    machine learning algorithm so distinct from a normal algorithm.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在直接深入研究算法之前，理解几个重要的基本模块是必要的。首先，是**机器学习**的定义，它与**人工智能**的区别，以及是什么使得机器学习算法与普通算法如此不同。
- en: 'Due to the variety of machine learning methods, it is essential to distinguish
    the high-level differences between the most important methods:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于机器学习方法的多样性，区分最重要的方法之间的高级差异是至关重要的：
- en: Supervised learning
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监督学习
- en: Unsupervised learning
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无监督学习
- en: Semi-supervised learning
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 半监督学习
- en: Reinforcement learning
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强化学习
- en: '![Roadmap for getting started in machine learning](../Images/52c6b9a24a50aa67b86c98079b983095.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![机器学习入门路线图](../Images/52c6b9a24a50aa67b86c98079b983095.png)'
- en: Roadmap for getting started in machine learning
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习入门路线图
- en: After that, learners should understand the main types of problems, which include
    **classification, regression, ranking, clustering, dimensionality reduction, recommendation**,
    etc. In most courses, the initial focus is typically on **supervised learning**
    and how it is used to solve classification and regression problems. Other learning
    methods and problem types are usually considered more advanced topics and are
    studied later.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，学习者应该了解主要的问题类型，包括**分类、回归、排序、聚类、降维、推荐**等。在大多数课程中，最初的焦点通常是**监督学习**及其在解决分类和回归问题中的应用。其他学习方法和问题类型通常被视为更高级的主题，并在之后进行学习。
- en: Apart from that, before studying concrete algorithms, learners should understand
    how the input data for those algorithms can be represented. In particular, this
    applies to the **tabular format**, which is frequently used. Terms like **dataset,
    target, features**, and **objects** should be clear from the beginning.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在学习具体算法之前，学习者应该了解这些算法的输入数据如何表示。特别是，这适用于经常使用的**表格格式**。从开始就应该清楚**数据集、目标、特征**和**对象**等术语。
- en: Finally, the last important topic in this chapter involves the evaluation of
    algorithms. It is necessary to study the main evaluation metrics and techniques
    to be comfortable later when estimating how good or bad a given algorithm is or
    when comparing several of them.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，本章最后一个重要话题涉及算法的评价。研究主要评价指标和技术是必要的，这样在以后评估给定算法的好坏或比较几个算法时才会感到舒适。
- en: 02\. Classical machine learning
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 02\. 经典机器学习
- en: After building a solid foundation in machine learning, it is time to learn the
    main algorithms that work on tabular data. Not only are these algorithms widely
    used on tabular data, but they also play an important role in introducing smart
    concepts and ideas that can be reused in more complex algorithms and domains.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习打下坚实基础之后，是时候学习主要针对表格数据的算法了。这些算法不仅在表格数据上广泛应用，而且在引入可重用于更复杂算法和领域的智能概念和思想方面也发挥着重要作用。
- en: '![Classical machine learning roadmap](../Images/5d4e2049e9c195421f1a5d77cf3f4b69.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![经典机器学习路线图](../Images/5d4e2049e9c195421f1a5d77cf3f4b69.png)'
- en: Classical machine learning roadmap
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 经典机器学习路线图
- en: The first essential algorithm to study is **[linear regression](https://medium.com/towards-data-science/linear-regression-from-scratch-e4db8c6d81db)**.
    Under the hood, linear regression uses **stochastic gradient descent (SGD)**,
    whose goal is to find the algorithm parameters that minimize a given loss function.
    Without SGD, it would be impossible to imagine other optimization algorithms and
    the entire AI domain, as a significant number of algorithms rely on SGD to find
    optimal weights. While studying linear regression, it is also an excellent opportunity
    to familiarize yourself with the most commonly used loss functions in machine
    learning.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要学习的基本算法是**[线性回归](https://medium.com/towards-data-science/linear-regression-from-scratch-e4db8c6d81db)**。在内部，线性回归使用**随机梯度下降（SGD）**，其目标是找到最小化给定损失函数的算法参数。没有SGD，就难以想象其他优化算法和整个AI领域，因为许多算法依赖于SGD来找到最优权重。在研究线性回归的同时，也是熟悉机器学习中常用损失函数的绝佳机会。
- en: Next comes the **support vector machine (SVM)**. Although SVM is rarely used
    in practice due to its slow performance on large datasets, it still introduces
    the interesting concept of the **kernel trick**. This allows the transformation
    of initially linearly inseparable data into a new space where the data points
    can be easily separated.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是**支持向量机（SVM）**。尽管由于在大型数据集上性能缓慢，SVM在实际应用中很少使用，但它仍然引入了有趣的**核技巧**概念。这允许将最初线性不可分的数据转换到一个新的空间，在这个空间中数据点可以很容易地被分离。
- en: '![Kernel Trick. The initial inseparable data in the 1D space (on the left)
    is transformed into a 2D space, where it gains a new dimension y = x² and becomes
    separable.](../Images/75026128edc6dd41e583d5ebaf684931.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![核技巧。一维空间（左侧）中的初始不可分数据被转换到二维空间，其中它获得了一个新的维度 y = x² 并变得可分。](../Images/75026128edc6dd41e583d5ebaf684931.png)'
- en: Kernel Trick. The initial inseparable data in the 1D space (on the left) is
    transformed into a 2D space, where it gains a new dimension y = x² and becomes
    separable.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 核技巧。一维空间（左侧）中的初始不可分数据被转换到二维空间，其中它获得了一个新的维度 y = x² 并变得可分。
- en: The next family of algorithms worth exploring are tree-based algorithms, starting
    with the **decision tree**. A decision tree can recursively split data into two
    subsets based on a chosen binary condition at each tree node. As a result, when
    a new object is given for prediction, it is run through the entire structure of
    the decision tree to ultimately reach the leaf node corresponding to the predicted
    class.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 值得探索的下一个算法系列是基于树的算法，从**决策树**开始。决策树可以根据每个树节点选择的二元条件递归地将数据分割成两个子集。因此，当给出一个新对象进行预测时，它会通过决策树结构的整个结构，最终到达对应于预测类别的叶节点。
- en: Traditionally, after decision trees, the next topic is **random forests**, which
    consist of a set of decision trees. Given that a single decision tree can make
    errors in its predictions, a random forest improves the overall system by constructing
    several trees that can "vote" for the best prediction, thus reducing the overall
    error probability. The concepts of **voting** and **bagging** introduced in random
    forests can also be applied to any base algorithm (not just decision trees) to
    make the entire system more resilient to errors.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，在决策树之后，下一个主题是**随机森林**，它由一组决策树组成。鉴于单个决策树可能在预测中出错，随机森林通过构建多个可以进行“投票”以选择最佳预测的树来提高整体系统的性能，从而降低整体错误概率。随机森林中引入的**投票**和**袋装**的概念也可以应用于任何基础算法（不仅仅是决策树），以使整个系统对错误更加鲁棒。
- en: '![Voting Example: The input vector is sent to several models, each of which
    individually makes predictions. The most frequent prediction is selected as the
    final output.](../Images/fb53cd03b1e7444ee89b4b49431eb6ea.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![投票示例：输入向量被发送到多个模型，每个模型单独做出预测。选择最频繁的预测作为最终输出。](../Images/fb53cd03b1e7444ee89b4b49431eb6ea.png)'
- en: 'Voting Example: The input vector is sent to several models, each of which individually
    makes predictions. The most frequent prediction is selected as the final output.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 投票示例：输入向量被发送到多个模型，每个模型单独做出预测。选择最频繁的预测作为最终输出。
- en: One of the most, if not the most, powerful algorithms for tabular data is **gradient
    boosting**. Like random forests, it combines several base algorithms, but it does
    so differently. Instead of aggregating predictions from several strong algorithms
    run independently, gradient boosting creates a sequential structure of weak algorithms.
    Each subsequent algorithm learns to reduce the accumulated error produced by the
    previous algorithms. *The most popular variation of gradient boosting uses decision
    trees as the base algorithm.*
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于表格数据来说，最强大（如果不是最强大）的算法之一是**梯度提升**。像随机森林一样，它结合了多个基础算法，但它以不同的方式做到这一点。梯度提升不是从独立运行的多个强大算法中汇总预测，而是创建了一个弱算法的顺序结构。每个后续算法都学习减少先前算法产生的累积误差。*梯度提升最流行的变体使用决策树作为基础算法*。
- en: Speaking of algorithms, I would ultimately recommend looking at the **k nearest
    neighbours (kNN)** algorithm as one of the best and simplest examples demonstrating
    the fundamental difference between parametric and non-parametric algorithms. Unlike
    the parametric algorithms discussed previously, kNN does not learn any parameters.
    Instead, it relies on certain assumptions about the data and predicts the class
    of a new object based on the class of the most similar objects from the training
    dataset.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 谈到算法，我最终会推荐查看**k最近邻（kNN）**算法，作为最佳和最简单的例子之一，展示了参数化算法和非参数化算法之间的基本区别。与之前讨论的参数化算法不同，kNN不学习任何参数。相反，它依赖于对数据的某些假设，并根据训练数据集中最相似对象的类别来预测新对象的类别。
- en: '![kNN algorithm](../Images/374f6b14da00df0f94a150ce3815d365.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![kNN算法](../Images/374f6b14da00df0f94a150ce3815d365.png)'
- en: kNN algorithm
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: kNN算法
- en: At the same time, it is also necessary to learn several techniques for performing
    data analysis and processing, such as **exploratory data analysis (EDA), feature
    engineering, one-hot encoding**, and addressing issues related to **class imbalance**.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，学习进行数据分析和处理的一些技术也是必要的，例如**探索性数据分析（EDA）**、**特征工程**、**独热编码**，以及解决与**类别不平衡**相关的问题。
- en: Finally, another important concept is **hyperparameter tuning**. At this stage,
    it is sufficient to understand what it is and to be able to implement the **grid
    search** strategy in code. Grid search is one of the simplest methods to adjust
    algorithms and improve their performance.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，另一个重要的概念是**超参数调整**。在这个阶段，理解它是什么以及能够在代码中实现**网格搜索**策略就足够了。网格搜索是调整算法并提高其性能的最简单方法之一。
- en: Personal advice
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 个人建议
- en: While learning all of these algorithms, it is also important to understand how
    the same algorithm can be adjusted to be used for both classification and regression
    tasks.
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在学习所有这些算法的同时，了解同一个算法如何调整以用于分类和回归任务也是非常重要的。
- en: ''
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These algorithms might seem challenging at first for beginners, as they are
    very different from the classic algorithms used in computer science. One of the
    best pieces of advice for gaining a deep understanding of their workflow is to
    implement them manually in code without relying on any libraries.
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些算法对于初学者来说可能一开始看起来很有挑战性，因为它们与计算机科学中使用的经典算法非常不同。要深入理解它们的流程，最好的建议之一是在代码中手动实现它们，而不依赖于任何库。
- en: Libraries and frameworks
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 库和框架
- en: In the machine learning industry, most of the time developers use pre-implemented
    algorithms from standard Python libraries. Given this, it is important to know
    how to use them in practice. Luckily, the majority of libraries provide a very
    easy-to-understand interface, so anyone with even basic coding skills can train
    and use machine learning models.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习行业中，大多数时候开发者使用标准Python库中的预实现算法。鉴于这一点，了解如何在实践中使用它们是非常重要的。幸运的是，大多数库提供了一个非常易于理解的接口，因此即使只有基本编码技能的人也可以训练和使用机器学习模型。
- en: '![Python libraries: Scikit-learn (machine learning), Pandas (data analysis),
    NumPy (linear algebra)](../Images/19c5e33ba02088abe4abbc671ff48fa7.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![Python库：Scikit-learn（机器学习）、Pandas（数据分析）、NumPy（线性代数）](../Images/19c5e33ba02088abe4abbc671ff48fa7.png)'
- en: 'Python libraries: Scikit-learn (machine learning), Pandas (data analysis),
    NumPy (linear algebra)'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: Python库：Scikit-learn（机器学习）、Pandas（数据分析）、NumPy（线性代数）
- en: All of the algorithms discussed in this section are implemented in the Scikit-learn
    package in Python. Additionally, to perform basic data manipulations and run data
    analysis, it is necessary to know Pandas. Finally, it might also be worth exploring
    NumPy, a well-known Python package used for linear algebra tasks.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 本节中讨论的所有算法都在Python的Scikit-learn包中实现。此外，为了执行基本的数据操作和数据分析，了解Pandas是必要的。最后，探索NumPy也可能是有价值的，这是一个用于线性代数任务的知名Python包。
- en: 03\. Deep learning
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 03\. 深度学习
- en: '**Deep learning** is a subset of machine learning that focuses on solving problems
    using **neural networks**. A neural network is typically represented as a combination
    of fully connected layers consisting of perceptrons, where the input layer receives
    the dataset features, which are then transformed by the intermediate layers, and
    the predicted result is produced in the output layer.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**深度学习**是机器学习的一个子集，它专注于使用**神经网络**解决问题。神经网络通常表示为由感知器组成的全连接层的组合，其中输入层接收数据集特征，然后由中间层进行转换，最终在输出层产生预测结果。'
- en: To be confident when working with neural networks, it is essential to fully
    understand their learning process. In fact, a neural network can be viewed as
    a very complex mathematical function with a large number of parameters. As was
    done with linear regression, we can apply the SGD algorithm to perform model updates
    and ultimately find the best neural network parameters. Easy, right?
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 要在处理神经网络时保持自信，完全理解其学习过程是至关重要的。实际上，神经网络可以被视为一个非常复杂的数学函数，具有大量参数。就像线性回归所做的那样，我们可以应用SGD算法来执行模型更新，并最终找到最佳的神经网络参数。简单，对吧？
- en: However, the reality is quite different, and there is a whole theory dedicated
    to training neural networks because the simple SGD algorithm is usually not enough.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，现实情况截然不同，有一个完整的理论专门用于训练神经网络，因为简单的SGD算法通常是不够的。
- en: '![Deep learning roadmap](../Images/7023bc607af8e8f225bcd042677d43e9.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![深度学习路线图](../Images/7023bc607af8e8f225bcd042677d43e9.png)'
- en: Deep learning roadmap
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习路线图
- en: First, it is necessary to understand the details of the **forward and backward
    propagation** algorithms for training a neural network, along with their **vectorization**
    techniques, which can be applied to accelerate the training process. **Computational
    graphs** and the **chain rule of differentiation** (which should be learned earlier
    in [calculus theory](https://medium.com/towards-data-science/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27))
    play a crucial role in backpropagation.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，理解训练神经网络时**前向和反向传播**算法的细节，以及它们的**向量化**技术，这些技术可以应用于加速训练过程，是非常重要的。**计算图**和**微分链式法则**（应该在[微积分理论](https://medium.com/towards-data-science/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27)中较早学习）在反向传播中起着至关重要的作用。
- en: Next, learners should study different types and properties of **activation functions**,
    which transform the original linear neural network into a more complex set of
    mathematical operations, enabling the solution of more sophisticated tasks.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，学习者应该研究不同类型和属性的**激活函数**，这些函数将原始线性神经网络转换成更复杂的数学运算集，从而能够解决更复杂的问题。
- en: '**[Deep learning optimizers](https://medium.com/towards-data-science/understanding-deep-learning-optimizers-momentum-adagrad-rmsprop-adam-e311e377e9c2)**
    and learning rate schedulers also play a key role in modern neural networks, allowing
    them to converge to the optimum much faster. The most important optimizers to
    study are **Momentum, RMSProp, AdaGrad, and Adam**.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**[深度学习优化器](https://medium.com/towards-data-science/understanding-deep-learning-optimizers-momentum-adagrad-rmsprop-adam-e311e377e9c2)**和学习率调度器在现代神经网络中也起着关键作用，使它们能够更快地收敛到最优解。最重要的优化器是**动量、RMSProp、AdaGrad和Adam**。'
- en: Due to the complex structures of neural networks, **vanishing and exploding
    gradients** can become significant problems that prevent the network from learning.
    Therefore, it is essential to know how to handle such situations. One such method
    involves using skip connections.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 由于神经网络结构的复杂性，**梯度消失和梯度爆炸**可能成为阻止网络学习的重要问题。因此，了解如何处理这种情况是至关重要的。其中一种方法涉及使用跳跃连接。
- en: Finally, to reduce the chance of overfitting, it is necessary to apply standard
    **regularization** techniques, which generally include **batch normalization,
    weight decay, and dropout**.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，为了减少过拟合的可能性，有必要应用标准的**正则化**技术，这通常包括**批量归一化、权重衰减和dropout**。
- en: Personal advice
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 个人建议
- en: In contrast to classic machine learning algorithms, I would generally advise
    beginners against implementing neural networks from scratch.
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 与经典的机器学习算法相比，我通常建议初学者不要从头开始实现神经网络。
- en: Nevertheless, it is always an excellent way to gain a deeper understanding of
    how neural networks function in practice. The problem is that deep learning algorithms
    are much harder to implement compared to the previous algorithms we discussed,
    and they may require a significant amount of time that could be better spent focusing
    on other theoretical aspects.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，深入了解神经网络在实际中是如何工作的，始终是一个极好的方法。问题是与之前讨论过的算法相比，深度学习算法的实现要困难得多，并且可能需要大量的时间，而这些时间本可以更好地用于关注其他理论方面。
- en: Regardless of the decision you ultimately make, I believe it is vital to understand
    the theoretical concepts of deep learning described above.
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 无论你最终做出什么决定，我相信理解上述深度学习的理论概念是至关重要的。
- en: Libraries and frameworks
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 库和框架
- en: The top three well-known state-of-the-art Python frameworks for working with
    neural networks are PyTorch, TensorFlow, and Keras. Learners often ask which of
    these three they should choose for implementing their own networks.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用神经网络方面，最著名的三个最先进的Python框架是PyTorch、TensorFlow和Keras。学习者经常询问他们应该选择这三个中的哪一个来实现自己的网络。
- en: '![The most popular deep learning frameworks: PyTorch, TensorFlow, Keras](../Images/62ea156287a1becc73a85d70d06f9c3c.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![最受欢迎的深度学习框架：PyTorch、TensorFlow、Keras](../Images/62ea156287a1becc73a85d70d06f9c3c.png)'
- en: 'The most popular deep learning frameworks: PyTorch, TensorFlow, Keras'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 最受欢迎的深度学习框架：PyTorch、TensorFlow、Keras
- en: In reality, when building a neural network, there is not much difference in
    terms of which of these three frameworks is used, as they all provide essentially
    the same functionality for basic tasks. Moreover, the code often looks almost
    identical in all of them.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，在构建神经网络时，使用这三个框架中的哪一个并没有太大的区别，因为它们在基本任务上提供的基本功能本质上都是相同的。此外，这些框架中的代码通常看起来几乎完全相同。
- en: It might play a role in the future if you work on a project that uses a particular
    framework or if you are an advanced researcher who needs very specific functionality
    that is not implemented in other frameworks. However, for beginners, any framework
    will be a good choice as long as the developer understands what happens behind
    the scenes when constructing and later training a neural network architecture.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在使用特定框架的项目上工作，或者你是一位需要非常特定功能（这些功能在其他框架中未实现）的高级研究人员，那么它可能在将来发挥作用。然而，对于初学者来说，只要开发者理解在构建和后续训练神经网络架构时幕后发生的事情，任何框架都是一个不错的选择。
- en: Keras is built on top of TensorFlow and provides the simplest functionality
    for those taking their first steps in deep learning. However, in the long term,
    I would encourage learners to choose between TensorFlow and PyTorch.
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Keras建立在TensorFlow之上，为那些在深度学习领域迈出第一步的人提供了最简单的功能。然而，从长远来看，我会鼓励学习者选择TensorFlow和PyTorch之间的一个。
- en: Conclusion
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we have covered the necessary machine learning theoretical
    blocks that every data scientist or machine learning engineer should know.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们涵盖了每个数据科学家或机器学习工程师都应该知道的必要机器学习理论模块。
- en: If you have gained solid knowledge of math, software engineering, and machine
    learning skills as described in the first three articles of this [series](https://medium.com/@slavahead/list/career-tips-f0a32130fde3),
    then you should be confident enough to consider yourself at least a Junior data
    scientist. Despite this significant achievement, it may still be challenging to
    find a job in today’s market, which is highly competitive in data science.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经掌握了如前三篇文章中所述的数学、软件工程和机器学习技能，那么你应该有足够的信心认为自己至少是一名初级数据科学家。尽管取得了这一显著成就，但在当今竞争激烈的数据科学市场中找到工作可能仍然具有挑战性。
- en: If you have reached this point, you should now be able to pick up and study
    more advanced machine learning topics that will expand your expertise and contribute
    to your professional growth.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你已经到达这个阶段，你现在应该能够拾起并学习更多高级机器学习主题，这将扩展你的专业知识并有助于你的职业发展。
- en: These topics and new domains will be discussed in the fourth part of this [series](https://medium.com/@slavahead/list/career-tips-f0a32130fde3).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这些主题和新领域将在本系列的第四部分中讨论。[系列](https://medium.com/@slavahead/list/career-tips-f0a32130fde3)。
