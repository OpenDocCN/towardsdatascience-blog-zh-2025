- en: 'Positional Embeddings in Transformers: A Math Guide to RoPE & ALiBi'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 位置嵌入在Transformer中的使用：RoPE与ALiBi的数学指南
- en: 原文：[https://towardsdatascience.com/positional-embeddings-in-transformers-a-math-guide-to-rope-alibi/](https://towardsdatascience.com/positional-embeddings-in-transformers-a-math-guide-to-rope-alibi/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/positional-embeddings-in-transformers-a-math-guide-to-rope-alibi/](https://towardsdatascience.com/positional-embeddings-in-transformers-a-math-guide-to-rope-alibi/)'
- en: <mdspan datatext="el1756159917000" class="mdspan-comment">In human language</mdspan>,
    the order of words is fundamental to meaning. The phrases “the dog chased the
    cat” and “the cat chased the dog” use the exact same words, but their sequence
    conveys entirely different events. However, the Transformer architecture, which
    powers most modern language models, processes all input tokens in parallel. This
    parallel processing makes it incredibly efficient but also inherently blind to
    the order of the tokens. Without a mechanism to understand sequence, the model
    would treat a sentence like an unordered bag of words.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756159917000" class="mdspan-comment">在人类语言中</mdspan>，单词的顺序对于意义是基本的。短语“狗追猫”和“猫追狗”使用了完全相同的单词，但它们的顺序传达了完全不同的事件。然而，驱动大多数现代语言模型的Transformer架构，并行处理所有输入标记。这种并行处理使其效率极高，但也天生对标记的顺序视而不见。如果没有理解序列的机制，模型将把句子视为无序的词袋。
- en: To solve this, **positional embeddings** were introduced. These are vectors
    that provide the model with explicit information about the position of each token
    in the sequence. By combining token embeddings with positional embeddings, the
    model can learn to leverage word order and understand the contextual relationships
    that depend on it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，**位置嵌入**被引入。这些向量向模型提供了关于序列中每个标记位置的显式信息。通过结合标记嵌入和位置嵌入，模型可以学习利用词序并理解依赖于它的上下文关系。
- en: 'This article provides a mathematical deep dive into three pivotal positional
    embedding techniques, complete with code examples to solidify your understanding.
    We will explore:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文深入探讨了三种关键的位置嵌入技术，并附带了代码示例以巩固您的理解。我们将探讨：
- en: '**Absolute Positional Embeddings (APE):** The original sinusoidal method proposed
    in the “Attention Is All You Need” paper, which assigns a unique positional vector
    to each absolute position. [2]'
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**绝对位置嵌入（APE）**：在“Attention Is All You Need”论文中提出的原始正弦波方法，为每个绝对位置分配一个独特的位置向量。[2]'
- en: '**Rotary Position Embedding (RoPE):** An elegant approach that incorporates
    relative positional information by rotating the query and key vectors in the attention
    mechanism. [4]'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**旋转位置嵌入（RoPE）**：一种优雅的方法，通过在注意力机制中旋转查询和键向量来引入相对位置信息。[4]'
- en: '**Attention with Linear Biases (ALiBi):** A simple yet effective technique
    that avoids adding embeddings altogether, instead biasing the attention scores
    based on the distance between tokens. [5]'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**具有线性偏置的注意力（ALiBi）**：一种简单而有效的技术，它避免了添加嵌入，而是根据标记之间的距离对注意力分数进行偏置。[5]'
- en: 'To build a solid foundation, let’s first begin with the building block for
    the original positional encoding: the sinusoidal wave.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了建立一个坚实的基础，让我们首先从原始位置编码的构建块开始：正弦波。
- en: Sinusoidal Wave
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正弦波
- en: '![](../Images/0f3aa12e921eba28ef2f89db3d5fbc7c.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0f3aa12e921eba28ef2f89db3d5fbc7c.png)'
- en: 'Figure 1: Sine wave image taken from Wikipedia [3]'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：来自维基百科的正弦波图像 [3]
- en: Let’s start with understanding the sinusoidal wave (figure 1). Here \(\omega\)
    is the angular frequency, \(u\) is the unit against which the wave is tracked
    and \(\phi_0\) is the initial phase constant (often set to 0 in embeddings). The
    unit \(u\) can be distance (measured in metres), time (measured in seconds) or
    for embeddings  –  the position. Angular frequency measures the amount by which
    the phase or the angle changes per unit \(u\).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从理解正弦波（图1）开始。在这里，\(\omega\) 是角频率，\(u\) 是波追踪的单位，\(\phi_0\) 是初始相位常数（在嵌入中通常设置为0）。单位
    \(u\) 可以是距离（以米为单位），时间（以秒为单位），或者对于嵌入来说——位置。角频率衡量相位或角度每单位 \(u\) 变化的量。
- en: \[\displaystyle
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: \[\displaystyle
- en: y = sin(\omega u + \phi_0) \tag{1}
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: \(y = \sin(\omega u + \phi_0) \tag{1}\)
- en: \]
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Wavelength (\(\lambda\)) is the distance between any two consecutive peaks or
    any two troughs (lowest points of the wave), meaning that when a wave has travelled
    a distance of wavelength, we have one full rotation (2*\(\pi\)).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 波长 (\(\lambda\)) 是任意两个连续峰值或任意两个波谷（波的最小点）之间的距离，这意味着当波传播了波长距离时，我们完成了一次完整的旋转（\(2*\(\pi\))）。
- en: The following block derives the relationship between the wavelength and the
    angular frequency and it shows that they are inversely proportional. From this
    inverse relation we can infer that when the angular frequency is high, the rate
    of oscillation is high, since the wavelength is small and the wave repeats within
    a short distance and when the angular frequency is low, the rate of oscillation
    is low, meaning the wave’s position is almost unchanged.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 以下块推导了波长和角频率之间的关系，并表明它们是成反比的。从这个反比关系中，我们可以推断出，当角频率高时，振荡速率高，因为波长小，波在短距离内重复；当角频率低时，振荡速率低，意味着波的位几乎不变。
- en: \[\displaystyle
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: \[\displaystyle
- en: \begin{aligned}
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: y(u+\lambda) &= y(u) \\
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: y(u+\lambda) &= y(u) \\
- en: \sin\!\big(\omega(u+\lambda)+\phi_0\big) &= \sin(\omega u+\phi_0) \\
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\!\big(\omega(u+\lambda)+\phi_0\big) &= \sin(\omega u+\phi_0) \\
- en: \sin(\omega u+\phi_0+\omega\lambda) &= \sin(\omega u+\phi_0)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: \sin(\omega u+\phi_0+\omega\lambda) &= \sin(\omega u+\phi_0)
- en: \end{aligned}
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[\displaystyle
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: \[\displaystyle
- en: \text{LHS = RHS only if }\ \omega\lambda = 2\pi n,\quad n\in\mathbb{Z}.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: \text{LHS = RHS only if }\ \omega\lambda = 2\pi n,\quad n\in\mathbb{Z}.
- en: \] \[\displaystyle
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[\displaystyle
- en: \text{Since }\lambda\text{ is the distance between consecutive peaks/troughs,
    set }n=1
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: \text{由于 }\lambda\text{ 是连续峰值/谷之间的距离，设 }n=1
- en: \Rightarrow
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow
- en: \lambda = \frac{2\pi}{\omega}. \tag{2}
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: \lambda = \frac{2\pi}{\omega}. \tag{2}
- en: \]
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: With this understanding of the sine wave, we are now in a position to understand
    “Absolute Positional Embeddings”
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对正弦波的理解，我们现在可以理解“绝对位置嵌入”
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Absolute Positional Embeddings
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 绝对位置嵌入
- en: Absolute Positional Embeddings (APE) was first introduced in the “Attention
    Is All You Need” [2] paper and this forms the basis either directly or indirectly
    for many of the positional embedding methods that are used today. In this section
    I will present a detailed mathematical background behind the formulation presented
    the paper. I’ll start off with the actual formulation used in the paper (refer
    to figure 2) and then proceed to break it down. The equation might seem simple
    but it has so many useful properties.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对位置嵌入（APE）首次在“Attention Is All You Need” [2] 论文中提出，这构成了今天使用的许多位置嵌入方法的直接或间接基础。在本节中，我将详细介绍论文中提出的公式的数学背景。我将从论文中实际使用的公式（参见图2）开始，然后对其进行分解。这个方程可能看起来很简单，但它具有许多有用的性质。
- en: '![](../Images/f153563c2dadb48ab95dd54f62916a21.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f153563c2dadb48ab95dd54f62916a21.png)'
- en: 'Figure 2: APE explanation taken from the paper'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：来自论文的APE解释
- en: 'The variables used in the equation from the figure are:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图中方程中使用的变量如下：
- en: \(pos\) – position of a token in the given sequence
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: \(pos\) – 给定序列中标记的位置
- en: \(d_{model}\) – dimensionality of the position vector
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: \(d_{model}\) – 位置向量的维度
- en: \(i\) – the \(i_{th}\) dimension of the position vector
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: \(i\) – 位置向量的第\(i\)维度
- en: Let’s compare how the equation compares with the traditional sinusoidal wave
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们比较一下方程与传统正弦波的比较
- en: For an even dimension \(i\), the sine curve is
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 对于偶数维度\(i\)，正弦曲线是
- en: \[\displaystyle
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: \[\displaystyle
- en: y_i(\mathrm{pos}) \;=\; \sin\left(\frac{\mathrm{pos}}{10000^{\frac{2i}{d_{\mathrm{model}}}}}\right)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: y_i(\mathrm{pos}) \;=\; \sin\left(\frac{\mathrm{pos}}{10000^{\frac{2i}{d_{\mathrm{model}}}}}\right)
- en: \;=\; \sin\left(\frac{\mathrm{pos}}{B_i}\right). \tag{3}
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: \;=\; \sin\left(\frac{\mathrm{pos}}{B_i}\right). \tag{3}
- en: \]
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Comparing equation (3) with equation (1), we get:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 将方程(3)与方程(1)进行比较，我们得到：
- en: \[\displaystyle
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: \[\displaystyle
- en: \omega \;=\; \frac{1}{B_i}. \tag{4}
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: \omega \;=\; \frac{1}{B_i}. \tag{4}
- en: \]
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'From equation 4, we can infer that as \(i\) increases the angular frequency
    of the wave decreases, meaning that at higher dimensions the values don’t change
    much between the positional vectors of two different positions. But at lower dimensions
    the values change rapidly. This is a highly useful property because within a single
    vector we can encode both high frequency (lower dimensions) and low frequency
    information (higher dimensions). We can prove this by comparing the cosine similarity
    of lower dimension sub-vectors of adjacent positions and higher dimension sub-vectors
    of adjacent positions. Readers can execute the code below to verify it for themself:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 从方程4中，我们可以推断出，随着\(i\)的增加，波的角频率降低，这意味着在更高维度上，两个不同位置的位置向量之间的值变化不大。但在较低维度上，值变化迅速。这是一个非常有用的性质，因为在一个向量中，我们可以编码高频（低维度）和低频信息（高维度）。我们可以通过比较相邻位置的低维度子向量和相邻位置的高维度子向量的余弦相似度来证明这一点。读者可以执行下面的代码来验证：
- en: '[PRE0]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'At this point you are like: “Okay, but how is this useful?”, well I can explain
    how it is useful in two ways. The first explanation is that the weights of the
    model can learn to associate the difference in the lower dimensions with the difference
    in the position of the tokens and can learn to associate the similarity in the
    higher dimensions with the long range dependency.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可能觉得：“好吧，但这有什么用？”，我可以从两个角度来解释它的用途。第一种解释是，模型的权重可以学会将低维度的差异与标记的位置差异相关联，并可以学会将高维度的相似性与长距离依赖性相关联。
- en: The second explanation involves breaking down the attention mechanism, which
    is what I’ll be doing below 🙂
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种解释涉及分解注意力机制，这正是我下面将要做的 😊
- en: Consider two tokens at positions \(m\) and \(n\) respectively. Their embedding
    \(x_m\) and \(x_n\) are made up of the token embedding \(w_{m,n}\) and position
    embedding \(p_{m,n}\). The attention mechanism works by calculating the dot product
    between the query vector of \(m\) and the key vector of \(n\), which is broken
    down equation 5.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑位于 \(m\) 和 \(n\) 位置的两种标记。它们的嵌入 \(x_m\) 和 \(x_n\) 由标记嵌入 \(w_{m,n}\) 和位置嵌入 \(p_{m,n}\)
    组成。注意力机制通过计算 \(m\) 的查询向量与 \(n\) 的键向量的点积来工作，这就是分解方程 5。
- en: \[
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \begin{aligned}
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: q^\top k
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: q^\top k
- en: '&= (W_q x_m)^\top (W_k x_n) \\'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '&= (W_q x_m)^\top (W_k x_n) \\'
- en: '&= \big(W_q(w_m+p_m)\big)^\top \big(W_k(w_n+p_n)\big) \\'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '&= \big(W_q(w_m+p_m)\big)^\top \big(W_k(w_n+p_n)\big) \\'
- en: '&= (w_m^\top W_q^\top + p_m^\top W_q^\top)(W_k w_n + W_k p_n) \\'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '&= (w_m^\top W_q^\top + p_m^\top W_q^\top)(W_k w_n + W_k p_n) \\'
- en: '&= \underbrace{w_m^\top W_q^\top W_k w_n}_{\text{content–content}}'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '&= \underbrace{w_m^\top W_q^\top W_k w_n}_{\text{内容-内容}}'
- en: + \underbrace{\big(w_m^\top W_q^\top W_k p_n + p_m^\top W_q^\top W_k w_n\big)}_{\text{content–position}}
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: + \underbrace{\big(w_m^\top W_q^\top W_k p_n + p_m^\top W_q^\top W_k w_n\big)}_{\text{内容-位置}}
- en: + \underbrace{p_m^\top W_q^\top W_k p_n}_{\text{position–position}} .
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: + \underbrace{p_m^\top W_q^\top W_k p_n}_{\text{位置-位置}} .
- en: \end{aligned}
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \tag{5}
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{5}
- en: \end{equation}
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Since this is a blog post on the impact of position, the last term in equation
    5, where the position embeddings interact is our main point of interest. From
    figure 2, we know that a position embedding is made up of pairs of sin / cos waves,
    which form d/2 vectors of dimension 2\. In the following example for simplicity
    we will consider one sin / cos pair and we will assume that the weight matrices
    \(W_q\) and \(W_k\) are identity matrices, which results in just vector dot product
    of \(p_m\) and\(p_n\). Equation 6 shows the result of the dot product for the
    position vectors for any single sin / cos pair. We can see that the dot product
    depends on the difference between the position of the vectors. Generalizing this
    to multiple dimensions we get equation 6.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这是一篇关于位置影响的博客文章，方程 5 中的最后一个项，即位置嵌入相互作用的项，是我们主要关注的点。从图 2 中，我们知道位置嵌入由一对正弦/余弦波组成，形成
    d/2 个 2 维向量。在下面的例子中，为了简单起见，我们将考虑一对正弦/余弦波，并假设权重矩阵 \(W_q\) 和 \(W_k\) 是单位矩阵，这导致 \(p_m\)
    和 \(p_n\) 的向量点积。方程 6 显示了任何单个正弦/余弦对的位置向量的点积结果。我们可以看到，点积取决于向量的位置差异。将这一般化到多个维度，我们得到方程
    6。
- en: \[
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \begin{aligned}
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: \mathbf{p}_m &= \begin{bmatrix}
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{p}_m &= \begin{bmatrix}
- en: \sin\!\left(\frac{m}{B_i}\right)\\[2pt]
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\!\left(\frac{m}{B_i}\right)\\[2pt]
- en: \cos\!\left(\frac{m}{B_i}\right)
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\!\left(\frac{m}{B_i}\right)
- en: \end{bmatrix},\quad
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix},\quad
- en: \mathbf{p}_n = \begin{bmatrix}
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{p}_n = \begin{bmatrix}
- en: \sin\!\left(\frac{n}{B_i}\right)\\[2pt]
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\!\left(\frac{n}{B_i}\right)\\[2pt]
- en: \cos\!\left(\frac{n}{B_i}\right)
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\!\left(\frac{n}{B_i}\right)
- en: \end{bmatrix},\\
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix},\\
- en: \mathbf{p}_m^\top \mathbf{p}_n
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{p}_m^\top \mathbf{p}_n
- en: '&= \sin\!\left(\frac{m}{B_i}\right)\sin\!\left(\frac{n}{B_i}\right)'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '&= \sin\!\left(\frac{m}{B_i}\right)\sin\!\left(\frac{n}{B_i}\right)'
- en: + \cos\!\left(\frac{m}{B_i}\right)\cos\!\left(\frac{n}{B_i}\right) \\
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: + \cos\!\left(\frac{m}{B_i}\right)\cos\!\left(\frac{n}{B_i}\right) \\
- en: '&= \cos\!\left(\frac{m-n}{B_i}\right).'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '&= \cos\!\left(\frac{m-n}{B_i}\right).'
- en: \end{aligned}
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \tag{6}
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{6}
- en: \end{equation}
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \mathbf{p}_m^\top \mathbf{p}_n
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{p}_m^\top \mathbf{p}_n
- en: = \sum_{i=0}^{\frac{d}{2}-1} \cos\!\left(\frac{m-n}{B_i}\right).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: = \sum_{i=0}^{\frac{d}{2}-1} \cos\!\left(\frac{m-n}{B_i}\right).
- en: \tag{7}
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{7}
- en: \end{equation}
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: And from equation 7, we can infer that high frequency pairs (small \(B_i\),
    lower dimensions) are highly sensitive to changes in the relative position while
    low frequency pairs (big \(B_i\), higher dimensions) change slowly with the change
    in relative position which helps keeping the long range dependency. This is how
    having high frequency and low frequency components within the same vector helps
    the model learn about position and relative position.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 并且从方程7中，我们可以推断出高频对（小的 \(B_i\)，较低的维度）对相对位置的变化非常敏感，而低频对（大的 \(B_i\)，较高的维度）随着相对位置的变化而缓慢变化，这有助于保持长距离依赖性。这就是在同一个向量内具有高频和低频成分如何帮助模型学习位置和相对位置。
- en: I’d like to discuss one more property, which is that the position vector \(p_{(m+t)}\)
    is just the pairwise clockwise rotation of the position vector \(p_m\) with each
    pair rotated by an angle \((t/B_i)\). The proof is worked out in figure 6\. We
    can easily extend this to the whole vector, where the rotation matrix will be
    a sparse matrix with dimensions \(d_{model} x d_{model}\).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我想讨论另一个属性，即位置向量 \(p_{(m+t)}\) 只是位置向量 \(p_m\) 的成对顺时针旋转，每一对旋转的角度为 \((t/B_i)\)。证明已在图6中完成。我们可以轻松地将此扩展到整个向量，其中旋转矩阵将是一个
    \(d_{model} x d_{model}\) 维度的稀疏矩阵。
- en: \[
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \begin{aligned}
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: \mathbf{p}_m &=
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{p}_m &=
- en: \begin{bmatrix}
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{bmatrix}
- en: \sin\left(\frac{m}{B_i}\right)\\[2pt]
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\left(\frac{m}{B_i}\right)\\[2pt]
- en: \cos\left(\frac{m}{B_i}\right)
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\left(\frac{m}{B_i}\right)
- en: \end{bmatrix},\quad
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix},\quad
- en: \mathbf{p}_{m+t} =
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{p}_{m+t} =
- en: \begin{bmatrix}
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{bmatrix}
- en: \sin\left(\frac{m+t}{B_i}\right)\\[2pt]
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\left(\frac{m+t}{B_i}\right)\\[2pt]
- en: \cos\left(\frac{m+t}{B_i}\right)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\left(\frac{m+t}{B_i}\right)
- en: \end{bmatrix},\\[4pt]
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix},\\[4pt]
- en: \mathbf{p}_{m+t}
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{p}_{m+t}
- en: '&='
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '&='
- en: \begin{bmatrix}
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{bmatrix}
- en: \sin\left(\frac{m}{B_i}\right)\cos\left(\frac{t}{B_i}\right)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\left(\frac{m}{B_i}\right)\cos\left(\frac{t}{B_i}\right)
- en: +\cos\left(\frac{m}{B_i}\right)\sin\left(\frac{t}{B_i}\right)\\
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: +\cos\left(\frac{m}{B_i}\right)\sin\left(\frac{t}{B_i}\right)\\
- en: \cos\left(\frac{m}{B_i}\right)\cos\left(\frac{t}{B_i}\right)
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\left(\frac{m}{B_i}\right)\cos\left(\frac{t}{B_i}\right)
- en: -\sin\left(\frac{m}{B_i}\right)\sin\left(\frac{t}{B_i}\right)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: -\sin\left(\frac{m}{B_i}\right)\sin\left(\frac{t}{B_i}\right)
- en: \end{bmatrix}\\
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix}\\
- en: '&='
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '&='
- en: \underbrace{
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: \underbrace{
- en: \begin{bmatrix}
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{bmatrix}
- en: \cos\left(\frac{t}{B_i}\right) & \sin\left(\frac{t}{B_i}\right)\\
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\left(\frac{t}{B_i}\right) & \sin\left(\frac{t}{B_i}\right)\\
- en: -\sin\left(\frac{t}{B_i}\right) & \cos\left(\frac{t}{B_i}\right)
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: -\sin\left(\frac{t}{B_i}\right) & \cos\left(\frac{t}{B_i}\right)
- en: \end{bmatrix}
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix}
- en: '}_{R\left(\frac{t}{B_i}\right)}'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '}_{R\left(\frac{t}{B_i}\right)}'
- en: \begin{bmatrix}
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{bmatrix}
- en: \sin\left(\frac{m}{B_i}\right)\\
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\left(\frac{m}{B_i}\right)\\
- en: \cos\left(\frac{m}{B_i}\right)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\left(\frac{m}{B_i}\right)
- en: \end{bmatrix}
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix}
- en: = R\left(\frac{t}{B_i}\right)\mathbf{p}_m .
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: = R\left(\frac{t}{B_i}\right)\mathbf{p}_m .
- en: \end{aligned}
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \tag{8}
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{8}
- en: \end{equation}
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: If you take a pair of dimensions (even, odd) and plot them in a 2-dimensional
    plane, you will get a nice circle because of the rotation property.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你取一对维度（偶数，奇数）并在二维平面上绘制它们，由于旋转属性，你会得到一个漂亮的圆圈。
- en: '![](../Images/b70eb4d0f5d8038d14e29430de9ed19d.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b70eb4d0f5d8038d14e29430de9ed19d.png)'
- en: 'Figure 3: Circle created by a pair of dimensions (image by author)'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：由一对维度创建的圆圈（图片由作者提供）
- en: In my second explanation on the usefulness of having high frequency and low
    frequency pairs, we made one small but important simplification which is assuming
    that the weight matrices were identity matrices. If we remove this simplification,
    we’ll still have the advantages we discussed in this section but we will also
    have absolute pieces mixed in the calculation which don’t contribute to the attention
    mechanism. So to this end, we would like the equation 5 to look something like
    equation 9, which just contains the content-content information and the position
    / relative position information. This is where RoPE [4], comes in, which is discussed
    in detail in the next section.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在我对具有高频和低频对的有用性的第二次解释中，我们做了一些小但重要的简化，即假设权重矩阵是单位矩阵。如果我们去掉这个简化，我们仍然会拥有本节中讨论的优点，但我们也会在计算中混合一些绝对部分，这些部分不会对注意力机制做出贡献。因此，我们希望方程5看起来像方程9，它只包含内容-内容信息和位置/相对位置信息。这就是RoPE
    [4]发挥作用的地方，它将在下一节中详细讨论。
- en: \[
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: q^\top k \;=\; w_m^\top W_q^\top W_k\, w_n \;+\; g(n-m).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: q^\top k \;=\; w_m^\top W_q^\top W_k\, w_n \;+\; g(n-m).
- en: \tag{9}
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{9}
- en: \end{equation}
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '* * *'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Rotary Position Embedding (RoPE)
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 旋转位置嵌入 (RoPE)
- en: 'Okay, we now know how APE works, why is it good and why it is not great. From
    the concluding paragraph of the previous section, we know that we need a formulation
    where we are only concerned about the relative position between the tokens and
    not the absolute position of them. To get such a formulation the authors of RoPE
    [4], proposed the following set of equations as the solution:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们现在知道了 APE 的工作原理，为什么它很好，为什么它又不那么好。从上一节的结尾段落，我们知道我们需要一个只关注标记之间相对位置而不是它们绝对位置的公式。为了得到这样的公式，RoPE
    [4] 的作者提出了以下一组方程作为解决方案：
- en: \[
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \begin{aligned}
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: q_m &= R(\theta, m)\, W_q\, x_q,\\
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: q_m &= R(\theta, m)\, W_q\, x_q,\\
- en: k_n &= R(\theta, n)\, W_k\, x_k,\\
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: k_n &= R(\theta, n)\, W_k\, x_k,\\
- en: q_m^\top k_n &= (W_q x_q)^\top\, R(\theta, n – m)\, (W_k x_k).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: q_m^\top k_n &= (W_q x_q)^\top\, R(\theta, n – m)\, (W_k x_k).
- en: \end{aligned}
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \tag{10}
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{10}
- en: \end{equation}
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: As you can see in equation 10, we get a query-key dot product that depends only
    on the relative position of the tokens (through the rotation matrix \(R\), explained
    below) and their semantic content (the token embeddings), which removes the absolute
    position leakage and the interaction between the absolute position and semantic
    content that was present in APE (figure 3).
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在方程 10 中看到的，我们得到一个查询-键点积，它只依赖于标记的相对位置（通过下面的旋转矩阵 \(R\) 解释）和它们的语义内容（标记嵌入），这消除了
    APE 中存在的绝对位置泄漏和绝对位置与语义内容之间的交互（图 3）。
- en: 'Note: I will only be discussing the properties of the RoPE embedding and I
    won’t be deriving it here, because trying to represent all the equations here
    became quite hard. So for interested readers, I wrote a latex doc that contains
    the derivation — [here](https://skandml.github.io/assets/rope_derivation.pdf).'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我只会讨论 RoPE 嵌入的性质，而不会在这里推导它，因为在这里尝试表示所有方程变得相当困难。所以对于感兴趣的读者，我写了一个 LaTeX 文档，其中包含了推导过程——[这里](https://skandml.github.io/assets/rope_derivation.pdf)。
- en: So what is ‘*R’* in equation 10? *‘R’* is a rotation matrix that rotates a vector
    and the angle by which it rotates depends on the position of the vector in the
    sequence. For a two dimensional vector at position \(n\), \(R\) is shown in equation
    11\. So how do we extend to more than two dimensions ie how do we rotate a d-dimensional
    vector? The authors take inspiration from the APE paper where each pair of dimensions
    are rotated, leading to a sparse matrix which is represented in equation 12.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，方程 10 中的“*R*”是什么？*“R”* 是一个旋转矩阵，它旋转一个向量，它旋转的角度取决于向量在序列中的位置。对于位置 \(n\) 的二维向量，\(R\)
    如方程 11 所示。那么我们如何扩展到超过两个维度，即如何旋转一个 d 维向量？作者从 APE 论文中获得灵感，其中每一对维度都会旋转，导致一个稀疏矩阵，如方程
    12 所示。
- en: \[
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: R(\theta,n)=
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: R(\theta,n)=
- en: \begin{bmatrix}
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{bmatrix}
- en: \cos(n\theta) & -\sin(n\theta)\\
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: \cos(n\theta) & -\sin(n\theta)\\
- en: \sin(n\theta) & \cos(n\theta)
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: \sin(n\theta) & \cos(n\theta)
- en: \end{bmatrix}.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix}.
- en: \tag{11}
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{11}
- en: \end{equation}
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: R(\theta,n)=\mathrm{blkdiag}\!\big(R(n\theta_1),R(n\theta_2),\ldots,R(n\theta_L)\big)\in\mathbb{R}^{2L\times
    2L},
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: R(\theta,n)=\mathrm{blkdiag}\!\big(R(n\theta_1),R(n\theta_2),\ldots,R(n\theta_L)\big)\in\mathbb{R}^{2L\times
    2L},
- en: \quad\text{where }
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: \quad\text{其中 }
- en: R(n\theta_i)=
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: R(n\theta_i)=
- en: \begin{bmatrix}
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{bmatrix}
- en: \cos(n\theta_i) & -\sin(n\theta_i)\\
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: \cos(n\theta_i) & -\sin(n\theta_i)\\
- en: \sin(n\theta_i) & \cos(n\theta_i)
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: \sin(n\theta_i) & \cos(n\theta_i)
- en: \end{bmatrix}.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: \end{bmatrix}.
- en: \tag{12}
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: \tag{12}
- en: \end{equation}
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The rotation matrix is also an orthogonal matrix which ensures training stability
    because it does not shrink or enlarge the gradient vector during backpropagation.
    The sparsity of the matrix also makes the rotation of the vector computationally
    easier.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 旋转矩阵也是一个正交矩阵，它确保了训练的稳定性，因为在反向传播过程中它不会缩小或放大梯度向量。矩阵的稀疏性也使得向量的旋转在计算上更容易。
- en: Given below is a self-contained implementation of RoPE for readers who have
    gone through my derivation and are wondering how to implement it. The intuition
    behind this code and the way it is written (I implemented mine by referring to
    LLaMA’s code base) is so beautiful which I think needs a separate blog post in
    itself. Explaining it here would make the blog post big and so I resist myself:)
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个为那些已经看过我的推导并想知道如何实现它的读者提供的 RoPE 的自包含实现。这个代码背后的直觉以及它的编写方式（我通过参考 LLaMA 的代码库来实现）非常美妙，我认为它本身就需要一篇单独的博客文章。在这里解释它会使博客文章变得很长，所以我抵制自己：)
- en: '[PRE1]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '* * *'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Attention with Linear Biases (ALiBi):'
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性偏差注意（ALiBi）：
- en: If the readers had diligently gone through the code snippets for both APE and
    RoPE, then a question that would have naturally risen is, what if we go beyond
    the context window during inference? Since both APE and RoPE are static, we know
    that the positional embeddings can be extended beyond the context window but do
    they perform well? This is what the authors of [ALiBi](https://arxiv.org/pdf/2108.12409)
    [5] explore and also propose ALiBi that performs better than APE and RoPE when
    we go beyond the context window during inference and also trains faster than RoPE.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 如果读者们仔细阅读了APE和RoPE的代码片段，那么一个自然而然会提出的问题是，如果我们超出推理过程中的上下文窗口会怎样？由于APE和RoPE都是静态的，我们知道位置嵌入可以扩展到上下文窗口之外，但它们的性能如何？这正是[ALiBi](https://arxiv.org/pdf/2108.12409)
    [5]的作者所探索的，他们也提出了ALiBi，当我们在推理过程中超出上下文窗口时，它的性能优于APE和RoPE，并且训练速度也比RoPE快。
- en: After going through math intense positional embedding types, ALiBi should be
    easier to understand and after you go through the experiments section, you will
    also be able to appreciate ALiBi and Occam’s Razor.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在经历了数学密集型的位置嵌入类型之后，ALiBI应该更容易理解，在你阅读完实验部分之后，你也将能够欣赏ALiBi和Occam的剃刀。
- en: ALiBI does not add positional embeddings to the token embeddings like APE or
    rotates the token embeddings to inject positional information like RoPE rather
    it introduces recency bias to certain heads while maintaining long term dependency
    to other heads by adding a static matrix to the attention matrix of each head.
    This is shown visually in figure 4, where \(m\) is called the ‘slope’ whose value
    changes based on the attention head. As you can see from the figure, as the distance
    between two tokens increases the penalty on the dot product increases; even RoPE
    has this nice property where the dot product between distant vectors are smaller
    than the dot product between nearby vectors and it is called **long term decay**
    which is another important property of RoPE and ALiBi as well.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: ALiBI不像APE那样将位置嵌入添加到标记嵌入，也不像RoPE那样旋转标记嵌入以注入位置信息，而是对某些头引入近期偏差，同时通过向每个头的注意力矩阵中添加一个静态矩阵来保持对其他头的长期依赖。这在图4中有所展示，其中\(m\)被称为‘斜率’，其值根据注意力头的变化而变化。如图所示，随着两个标记之间的距离增加，点积的惩罚也会增加；即使是RoPE也有这种很好的性质，即远距离向量的点积小于近距离向量的点积，这被称为**长期衰减**，这是RoPE和ALiBi的另一个重要特性。
- en: '![](../Images/8e38151a65756e4e269cc6c309ff4e52.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8e38151a65756e4e269cc6c309ff4e52.png)'
- en: 'Figure 4: ALiBI formulation taken from the paper'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：来自论文的ALiBI公式
- en: To decide the value of ‘m’ for a particular head the authors use a simple geometric
    progression which has both the start and the ratio as \(2^{-8/n_{heads}}\), where
    n is the number of attention heads. The authors also experimented with making
    ‘m’ learnable but the results showed that it did not provide them with good extrapolation
    results. Given below is the code implementation for ALiBi and it is just replicating
    figure 4 in PyTorch code.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 为了决定特定头的‘m’值，作者使用了一个简单的几何级数，其起始值和比率都是\(2^{-8/n_{heads}}\)，其中n是注意力头的数量。作者还尝试使‘m’可学习，但结果显示这并没有给他们提供良好的外推结果。下面是ALiBi的代码实现，它只是用PyTorch代码复制了图4。
- en: '[PRE2]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '* * *'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Experiments
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验
- en: After going through all the theory, it is always best to implement these different
    types of embeddings, train language models that uses different types of positional
    embeddings and compare them on certain metrics. I have provided the complete code
    for the experiments in this repo  - [https://github.com/SkAndMl/llama](https://github.com/SkAndMl/pe-bench)
    and the results of my experiments on TinyStories dataset [6] (CDLA-Sharing-1.0
    LICENSE) are given below. I urge the readers to download the code and train the
    different models locally as it will also give you a feel of training language
    models.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在经历了所有理论之后，最好的做法是实现这些不同类型的嵌入，训练使用不同类型位置嵌入的语言模型，并在某些指标上比较它们。我在这个repo中提供了实验的完整代码[https://github.com/SkAndMl/llama](https://github.com/SkAndMl/pe-bench)，以及我在TinyStories数据集[6]（CDLA-Sharing-1.0许可证）上的实验结果如下。我敦促读者下载代码并在本地训练不同的模型，因为这也会让你感受到训练语言模型的过程。
- en: Figures 5 and 6 show the training loss, validation loss, perplexity and time
    taken to train 28M parameter LLaMA inspired language model with 4 heads, 4 layers,
    256 context size and 256 embedding dimension on an M2 Macbook Pro laptop. All
    the models were trained for 1000 steps and used a batch size of 32\. As you can
    see both ALiBi and RoPE have similar performances and are much better than APE
    which has to deal with “extra terms” in the attention mechanism. One distinct
    advantage that ALiBi has over RoPE is that it is faster to train models using
    ALiBi as can be seen from figure 6\. To be honest, I can provide no theoretical
    explanation or intuition behind why one performed better than the other since
    any deep learning idea currently can only be validated via experiments.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5 和 6 展示了训练损失、验证损失、困惑度和训练 28M 参数 LLaMA 启发式语言模型（4 个头，4 层，256 个上下文大小，256 个嵌入维度）在
    M2 Macbook Pro 笔记本电脑上所需的时间。所有模型都训练了 1000 步，并使用了 32 个批处理大小。正如您所看到的，ALiBi 和 RoPE
    的性能相似，并且比必须处理注意力机制中“额外项”的 APE 要好得多。ALiBi 相对于 RoPE 的一个显著优势是，使用 ALiBi 训练模型的速度更快，如图
    6 所示。说实话，我无法提供任何理论解释或直觉来解释为什么一个比另一个表现更好，因为目前任何深度学习想法都只能通过实验来验证。
- en: '![](../Images/0baa926cafa853a57cb3d5e03bb6ac3d.png)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0baa926cafa853a57cb3d5e03bb6ac3d.png)'
- en: 'Figure 5: Training loss (image by author)'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5：训练损失（图片由作者提供）
- en: '![](../Images/175fd0ff664106f6ed92a2780488284e.png)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/175fd0ff664106f6ed92a2780488284e.png)'
- en: 'Figure 6: Evaluation results (image by author)'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6：评估结果（图片由作者提供）
- en: Conclusion
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Oh god, I had so much fun writing this article, reading about positional embeddings,
    coding them and understanding the math behind them. This took me about a month
    to write and it helped me understand a lot about positional embeddings. I hope
    you guys enjoy it too. Cheers!
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀，我写这篇文章真的很开心，阅读有关位置嵌入的内容，编写它们，并理解其背后的数学。这花了我大约一个月的时间来写，并且它帮助我理解了很多关于位置嵌入的知识。希望你们也喜欢它。干杯！
