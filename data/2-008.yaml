- en: Why Your Prompts Don’t Belong in Git
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么你的提示不属于Git
- en: 原文：[https://towardsdatascience.com/why-your-prompts-dont-belong-in-git/](https://towardsdatascience.com/why-your-prompts-dont-belong-in-git/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-your-prompts-dont-belong-in-git/](https://towardsdatascience.com/why-your-prompts-dont-belong-in-git/)
- en: <mdspan datatext="el1756156485455" class="mdspan-comment">This is my very first</mdspan>
    post after a while, and I want to start with something that bit me early on.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756156485455" class="mdspan-comment">这是我一段时间后的第一次发帖，我想从一些早期就触动我的事情开始讲起。
- en: When I was building and shipping my first **Generative AI** product, I did what
    most of us do. I hard-coded the prompts. It worked until it didn’t. Every time
    I wanted to tweak the tone, improve the wording, or fix a hallucination, it meant
    pushing code and re-deploying the service.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当我构建和发布我的第一个**生成式AI**产品时，我做了我们大多数人都会做的事情。我硬编码了提示。它一直有效，直到它不再有效。每次我想调整语气、改进措辞或修复幻觉时，就意味着要推送代码并重新部署服务。
- en: This made fast iteration nearly impossible and left product folks completely
    out of the loop. Eventually I realised that prompts should be treated like content,
    not code.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得快速迭代几乎不可能，并且让产品人员完全脱离了循环。最终我意识到，提示应该像内容一样被对待，而不是代码。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What Breaks When Prompts Live in the Code
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示存在于代码中时会发生什么
- en: At first it feels like just another string in your backend. But prompts are
    not static config. They are behaviour and behaviour needs room to evolve.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 起初它感觉就像你后端中的另一个字符串。但提示不是静态配置。它们是行为，而行为需要空间来发展。
- en: The moment your prompts are shipped with your code, every small change becomes
    a process. You need to create a branch.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的提示与代码一起发布时，每一个小的改变都变成了一个过程。你需要创建一个分支。
- en: Make a commit. Open a pull request. Wait for CI pipelines to run. Merge. Then
    redeploy. All this friction for what might be a one-word change in how your assistant
    talks to users.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 提交一个commit。打开一个pull request。等待CI管道运行。合并。然后重新部署。所有这些摩擦可能只是为了改变你的助手与用户交流时的一句话。
- en: You lose the ability to iterate quickly. You block product folks or non-engineers
    from contributing. And worst of all, your prompts end up inheriting all the friction
    of your backend deployment process.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你失去了快速迭代的能力。你阻止了产品人员或非工程师的贡献。最糟糕的是，你的提示最终继承了你的后端部署过程的所有摩擦。
- en: It also becomes nearly impossible to understand what changed and why. Git might
    show you the diff, but not the outcome.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 它也几乎不可能理解发生了什么变化以及原因。Git可能会显示差异，但不会显示结果。
- en: '***Did that change to reduce hallucinations?***'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***这改变减少了幻觉吗？***'
- en: '***Did it make completions shorter?***'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***这使完成变得更短了吗？***'
- en: '***Are users happier?***'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***用户更满意吗？***'
- en: Without tracking and experimentation, you’re guessing. You wouldn’t hard-code
    customer support replies in your source code or your marketing copy. Prompts deserve
    the same level of flexibility.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 没有跟踪和实验，你只是在猜测。你不会在源代码或营销文案中硬编码客户支持回复。提示应享有相同的灵活性。
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What Prompt Management Actually Looks Like
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示管理实际上是什么样的
- en: Prompt management is not some fancy new practice.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 提示管理不是某种新潮的实践。
- en: It is just applying the same principles we already use for other dynamic parts
    of the product, like CMS content, feature flags, or translations.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是应用我们已经在产品的其他动态部分使用的相同原则，比如CMS内容、功能标志或翻译。
- en: A good prompt management setup gives you a place outside of your codebase where
    prompts can live, evolve, and be tracked over time.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的提示管理设置给你一个地方，你的提示可以在那里生活、发展，并且随着时间的推移进行跟踪。
- en: It does not have to be complex. You just need a simple way to store, version,
    and update prompts without touching your application code.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不需要复杂。你只需要一个简单的方法来存储、版本控制和更新提示，而不需要触及你的应用程序代码。
- en: Once you decouple prompts from the code, everything gets easier. You can update
    a prompt without redeploying. You can roll back to a previous version if something
    breaks.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你将提示与代码解耦，一切都会变得简单。你可以更新提示而不需要重新部署。如果出现问题，你可以回滚到之前的版本。
- en: You can let non-engineers make changes safely, and you can start connecting
    prompt versions to outcomes, so you can actually learn what works and what does
    not.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以让非工程师安全地做出更改，并且你可以开始将提示版本与结果连接起来，这样你实际上可以学习到哪些是有效的，哪些是不行的。
- en: Some tools offer built-in versioning and prompt analytics. Others plug into
    your existing stack. The important thing is *not* what tool you use, but that
    you stop treating prompts as static strings buried in code.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一些工具提供了内置的版本控制和提示分析。其他工具可以集成到你的现有堆栈中。重要的是*不是*你使用什么工具，而是你停止将提示视为代码中埋藏的静态字符串。
- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Using Langfuse For Prompt Management
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Langfuse进行提示管理
- en: One tool I have used and recommend is [***Langfuse***](https://www.langfuse.com/).
    It is open source, developer-friendly, and built to support teams working with
    LLM-powered applications in production.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用并推荐的一个工具是[***Langfuse***](https://www.langfuse.com/)。它是开源的，对开发者友好，旨在支持在生产环境中使用LLM应用程序的团队。
- en: Prompt management is just one of the things it helps with. LangFuse also gives
    you full visibility into your application’s traces, latency, and cost.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 提示管理只是它帮助解决的事情之一。LangFuse还让你能够全面了解应用程序的跟踪、延迟和成本。
- en: But for me, it’s the approach to managing and iterating on prompts that was
    a turning point.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 但对我来说，管理并迭代提示的方法是一个转折点。
- en: Langfuse gives you a clean interface where you can create and update prompts
    outside your codebase.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: Langfuse为你提供了一个干净的界面，你可以在代码库之外创建和更新提示。
- en: You can version them, track changes over time, and roll back if something goes
    wrong.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以对其进行版本控制，跟踪随时间的变化，并在出现问题的情况下回滚。
- en: You can also A/B test different versions of the same prompt and see how each
    one performs in production and you can do all this without redeploying your app.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以对同一提示的不同版本进行A/B测试，并查看每个版本在生产中的表现，而你无需重新部署你的应用程序。
- en: '*This is not a sponsored mention. Just a personal recommendation based on what
    has worked well in my own projects.*'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这不是一个赞助提及。这只是基于我在自己的项目中取得良好效果的个人推荐。*'
- en: It also makes it easier for non-engineers to contribute.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 它还使非工程师更容易做出贡献。
- en: The Langfuse console lets product teams or writers tweak prompts safely, without
    touching the codebase or waiting for a release. It fits well into modern Generative
    AI stacks.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: Langfuse控制台让产品团队或作家可以安全地调整提示，而无需接触代码库或等待发布。它非常适合现代生成AI堆栈。
- en: You can use it with ***LangChain***, ***LlamaIndex***, or your own custom setup
    and since it is open source, you can self-host it if you want full control.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用它与***LangChain***、***LlamaIndex***或你自己的自定义设置，由于它是开源的，如果你想完全控制，你可以自行托管。
- en: '* * *'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: A Quick Look at How it Works
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速了解其工作原理
- en: Just to give you a feel for it, here’s a basic example of how prompt management
    with Lang-fuse works in practice.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让你有个感觉，这里有一个Lang-fuse在实际中如何进行提示管理的基本示例。
- en: We can simply create a new prompt with variables, through the User Interface *(you
    can *[***create or update prompts programmatically***](https://langfuse.com/docs/prompts/get-started#message-placeholders)*,
    too).*
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过用户界面简单地创建一个新的带有变量的提示，**（你还可以通过编程方式创建或更新提示**[***https://langfuse.com/docs/prompts/get-started#message-placeholders***]）。*
- en: '![](../Images/1870e2fe414ecaf715da8d410645a0f5.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1870e2fe414ecaf715da8d410645a0f5.png)'
- en: Note the `production` and `latest` labels assigned to the specific prompt version.
    You can use labels to retrieve specific versions of the prompts.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 注意分配给特定提示版本的`production`和`latest`标签。你可以使用标签来检索提示的具体版本。
- en: This makes it super easy to test new prompt versions on staging or development
    environments as well as performing A/B testing.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得在预发布或开发环境中测试新的提示版本以及进行A/B测试变得超级简单。
- en: We can now pull the latest version of a prompt and use it in a simple generation
    pipeline with Google’s GenAI SDK.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以拉取提示的最新版本，并使用Google的GenAI SDK在简单的生成管道中使用它。
- en: '![](../Images/fa2a167e623bb4114eccacb17fabbeb9.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fa2a167e623bb4114eccacb17fabbeb9.png)'
- en: '* * *'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What I’d Do Differently Today
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我今天会做不同的事情
- en: If I were starting again, I would never hard-code prompts into my app. It slows
    you down, hides things from the people who could help, and turns every tiny change
    into a release.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我再次开始，我绝不会将提示硬编码到我的应用程序中。这会减慢你的速度，隐藏那些可能帮助的人，并将每一个微小的变化变成一个发布。
- en: Prompt management sounds like a nice-to-have until your first iteration bottleneck.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一次迭代瓶颈出现之前，提示管理听起来像是一个锦上添花的功能。
- en: Then it becomes obvious. Decouple your prompts early. You’ll move faster, build
    better, and keep your team in the loop.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，这一点就变得明显了。尽早解耦你的提示。你会更快地移动，构建得更好，并让你的团队保持同步。
