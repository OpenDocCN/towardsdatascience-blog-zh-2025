- en: The Age of Self-Evolving AI Is Here
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自进化人工智能时代已经到来
- en: 原文：[https://towardsdatascience.com/the-age-of-self-evolving-ai-is-here/](https://towardsdatascience.com/the-age-of-self-evolving-ai-is-here/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-age-of-self-evolving-ai-is-here/](https://towardsdatascience.com/the-age-of-self-evolving-ai-is-here/)
- en: 1\. <mdspan datatext="el1752805566918" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. <mdspan datatext="el1752805566918" class="mdspan-comment">引言</mdspan>
- en: In one of my previous [articles](https://towardsdatascience.com/can-ai-truly-develop-a-memory-that-adapts-like-ours/),
    we explored Google’s Titans ([Behrouz et al., 2024](https://arxiv.org/abs/2501.00663))¹
    and how TTT (Test-Time Training) can be used to equip an LLM with a human-like,
    malleable memory, which can update its information at test time.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的一篇[文章](https://towardsdatascience.com/can-ai-truly-develop-a-memory-that-adapts-like-ours/)中，我们探讨了谷歌的Titans
    ([Behrouz等人，2024](https://arxiv.org/abs/2501.00663))¹以及如何使用TTT（测试时训练）来装备一个LLM（大型语言模型）以类似人类的、可塑的记忆，该记忆可以在测试时更新其信息。
- en: Test-time training, as the name suggests, is a paradigm that lets the model
    update its parameters on unseen data. But at test time, there are no ground truth
    labels that can help steer the model in the right direction (because that would
    be overt cheating). Instead, it performs a task with the data (designed and baked
    into the model), which leads the model to “subconsciously” learn about it.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如其名所示，测试时训练是一种允许模型在未见数据上更新其参数的范例。但在测试时，没有可以引导模型正确方向的地面真实标签（因为这将是明显的作弊）。相反，它使用数据执行一个任务（设计和嵌入到模型中），这使模型“潜意识”地了解它。
- en: 'Examples of such tasks can be:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的任务示例可以是：
- en: '***Rotation Prediction*** **([Gidaris et al., 2018](https://arxiv.org/abs/1803.07728))²*:***
    The input images are rotated arbitrarily (eg, by 90°, 180°, or 270°), with the
    model being made to predict which is the correct orientation. This enables it
    to recognize salient features and determine which way is “up”.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***旋转预测*** **([Gidaris等人，2018](https://arxiv.org/abs/1803.07728))²***：输入图像被任意旋转（例如，90°、180°或270°），模型被要求预测正确的方向。这使得它能够识别显著特征并确定哪个方向是“向上”。'
- en: '***Masked-Language Modeling* ([Devlin et al., 2019](https://aclanthology.org/N19-1423/?utm_campaign=The+Batch&utm_source=hs_email&utm_medium=email&_hsenc=p2ANqtz-_m9bbH_7ECE1h3lZ3D61TYg52rKpifVNjL4fvJ85uqggrXsWDBTB7YooFLJeNXHWqhvOyC))³*:***
    One or more tokens are masked from the test instance. The model’s job is to predict
    the missing tokens while the masked tokens play as the ground truths, which incentivizes
    a multi-faceted understanding of language.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***掩码语言建模* ([Devlin等人，2019](https://aclanthology.org/N19-1423/?utm_campaign=The+Batch&utm_source=hs_email&utm_medium=email&_hsenc=p2ANqtz-_m9bbH_7ECE1h3lZ3D61TYg52rKpifVNjL4fvJ85uqggrXsWDBTB7YooFLJeNXHWqhvOyC))³***：测试实例中的一个或多个标记被掩码。模型的任务是在掩码标记作为地面真实值的同时预测缺失的标记，这激励了对语言的多方面理解。'
- en: '***Confidence Maximization* ([Sun et al., 2020](https://proceedings.mlr.press/v119/sun20b.html))⁴*:***
    Where the model is incentivized to make its output logits (eg, classification
    logits [0.3, 0.4, 0.3]) to be more peaked (eg, [0.1, 0.8, 0.1]), hence ebbing
    its diplomatic tendencies.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***置信度最大化* ([Sun等人，2020](https://proceedings.mlr.press/v119/sun20b.html))⁴***：模型被激励使其输出logits（例如，分类logits
    [0.3, 0.4, 0.3]）更加尖锐（例如，[0.1, 0.8, 0.1]），从而减弱其外交倾向。'
- en: But these are all educated guesses as to which task might translate the best
    to learning, because humans imagined them, and as humans are not the “smartest”
    ones these days, why don’t we let AI figure it out for itself?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 但这些都是关于哪些任务可能最好地转化为学习的推测，因为是人类想象出来的，而如今人类并不是“最聪明”的，为什么不让我们让AI自己找出答案呢？
- en: Our gradient descent and optimization algorithms are generally considered among
    the most consequential algorithms humanity has ever invented. So, why not leave
    the test time training to these algorithms altogether and let the models learn
    about learning?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的梯度下降和优化算法通常被认为是人类有史以来最具有影响力的算法之一。那么，为什么不把这些测试时训练完全留给这些算法，让模型学习如何学习呢？
- en: '2\. Motivation: Why was it needed?'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 动机：为什么需要它？
- en: At its heart, this research was driven by a core frustration with the existing
    Test-Time Training (TTT) paradigm. Prior TTT algorithms have historically relied
    on a form of artistry. A human “designer” (i.e., a creative researcher) must hand-craft
    a self-supervised task like the ones mentioned above and hope that practicing
    this specific task will somehow translate to better performance on the main objective.
    The paper aptly calls this an “art, combining ingenuity with trial and error,”
    a process that is extremely vulnerable to humanistic fallacies.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，这项研究是由对现有测试时训练（TTT）范式的基本不满所驱动的。历史上的TTT算法一直依赖于一种艺术形式。一个人类“设计师”（即一个有创造力的研究人员）必须手工制作一个自我监督的任务，如上述任务，并希望练习这个特定任务会在某种程度上转化为对主要目标更好的表现。论文恰当地称这种过程为“艺术，结合独创性和试错”，这个过程极其容易受到人文谬误的影响。
- en: Not only can human-designed tasks perform suboptimally, but they can even be
    counter-productive. Imagine making a model an expert on rotation-prediction as
    its TTT task. But now, if an image has direction-specific characteristics, like
    a pointing-down arrow that signifies “download this file,” gets flipped to a pointing-up
    arrow because of the TTT task (which signifies upload), it might completely corrupt
    the understanding of the model for that image.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅人类设计的任务可能表现不佳，甚至可能适得其反。想象一下，如果将模型训练为旋转预测的专家作为其TTT任务。但现在，如果一个图像具有特定方向的特征，比如指向下箭头表示“下载此文件”，由于TTT任务（表示上传）而被翻转成指向上的箭头，它可能会完全破坏模型对该图像的理解。
- en: 'Moreover, we can extrapolate it to ever-decreasing reliance on human ingenuity
    and increasing reliance on automation. Tasks like curating a word-bank with thousands
    of “bad words”, just to classify spam emails, are a relic of the past, that remind
    us how far we’ve come. Over the years, a conventional rule has emerged: automation
    has always eclipsed the very human ingenuity that conceived it.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们可以将其外推到对人类独创性的日益减少依赖和对自动化的日益依赖。像整理包含数千个“不良词汇”的词汇库，仅为了分类垃圾邮件这样的任务，已经成为过去的遗迹，提醒我们我们已经走了多远。多年来，一个传统的规则已经出现：自动化始终超越了构思它的非常人类独创性。
- en: '![](../Images/eb8c8feadfc917746d8e95282822f798.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eb8c8feadfc917746d8e95282822f798.png)'
- en: '(Source: Author)'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: Visual depiction of why manual TTT design would be inferior to Meta-TTT via
    Gradient Descent.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 通过梯度下降可视化为什么手动TTT设计会劣于Meta-TTT。
- en: 3\. Learning to (Learn at test-time)
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 学习在测试时学习
- en: Researchers at Meta, Stanford, and Berkley ([Sun et al., 2024](https://arxiv.org/abs/2407.04620))⁵
    all came together for this monumental collaboration, and they successfully parameterized
    the TTT task itself, which means that now the model can choose, instead of humans,
    which task will have the greatest impact on improving the performance on the main
    objective.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Meta、斯坦福和伯克利的研究人员([Sun等人，2024](https://arxiv.org/abs/2407.04620))⁵共同参与了这次重大的合作，他们成功地参数化了TTT任务本身，这意味着现在模型可以选择，而不是人类，哪个任务将对提高主要目标的表现产生最大的影响。
- en: This means that now the model can not only train on test data, but also choose
    how that test data is to be used to train itself!
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着现在模型不仅可以训练测试数据，还可以选择如何使用测试数据来训练自己！
- en: 3.1 How Does It Work?
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 它是如何工作的？
- en: The researchers segregated the entire process into two parts — Inner and Outer
    Loop, where the Outer loop trains the model on its main objective and defines
    the TTT task, while the Inner loop trains the hidden layers on the defined TTT
    task.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员将整个过程分为两个部分——内部循环和外部循环，其中外部循环在主要目标上训练模型并定义TTT任务，而内部循环在定义的TTT任务上训练隐藏层。
- en: '3.1.1\. The Outer Loop: Taking Human Ingenuity Out of The Equation'
  id: totrans-23
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.1.1 外部循环：将人类独创性从方程式中排除
- en: This acts as the “meta-teacher” in this system. Apart from making the model
    learn how to classify images, it’s also assigned to create a curriculum for the
    inner loop to perform TTT on. It achieves this by transforming the entire TTT
    process into a one giant, differentiable function and optimizing it from end to
    end.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这在这个系统中充当“元教师”。除了让模型学习如何分类图像外，它还被分配为创建内部循环以执行TTT的教程。它通过将整个TTT过程转换为一个巨大的、可微分的函数，并从端到端进行优化来实现这一点。
- en: 'This multi-step process can be outlined as below:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这个多步骤的过程可以概述如下：
- en: '![](../Images/e6fbbf095e0c5a98c0e99d56e3c21862.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e6fbbf095e0c5a98c0e99d56e3c21862.png)'
- en: '(Source: Author; Original puppy photo by Kristin O Karlsen on Unsplash)'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者；原始小狗照片由Kristin O Karlsen在Unsplash上拍摄）
- en: The full architectural diagram of the model, including a zoomed-in view of the
    MTTT layer.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的完整架构图，包括对 MTTT 层的放大视图。
- en: The numbers in black indicate the sequence of information flow in the model
    (Steps).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 黑色数字表示模型中信息流的序列 (步骤)。
- en: '**Steps 1 & 2: Input Preparation**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1 & 2：输入准备**'
- en: First, the input image X is broken down into patches, and each patch is then
    converted into an embedding via Embedding Layers. This gives us a sequence of
    vectors, the Patch embedding vector, which we’ll call P = (P₁, P₂, …, Pₙ).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，输入图像 X 被分解成块，然后每个块通过嵌入层转换成一个嵌入。这给我们一个向量序列，即块嵌入向量，我们将其称为 P = (P₁, P₂, …, Pₙ)。
- en: '**Step 3: The Overall Architecture**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3：整体架构**'
- en: This vector P is then fed through a series of Stacked MTTT layers, which are
    also the brain of the model. After passing through all the layers, the final representation
    is sent to a standard Classification Head to produce the final output. To understand
    what happens in each MTTT layer, we zoom into one to dissect and understand its
    inner machinery.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这个向量 P 然后通过一系列堆叠的 MTTT 层，这些层也是模型的“大脑”。通过所有层后，最终表示被发送到一个标准的分类头以产生最终输出。为了理解每个
    MTTT 层中发生的事情，我们放大其中一个以剖析和理解其内部机制。
- en: '**Step 4: Learning From the Embeddings**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：从嵌入中学习**'
- en: Each MTTT layer has a set of learnable parameters *W₀* *(Step 4b)*, which act
    as a “generic” or “start-off” state, before it sees any data.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 每个 MTTT 层都有一个可学习的参数集 *W₀* (步骤 4b)，它在看到任何数据之前充当一个“通用”或“起始”状态。
- en: The original input patch embeddings *(P)* are marked as *Step 4a*.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 原始输入块嵌入 *(P)* 被标记为 *步骤 4a*。
- en: '**Step 5: The Inner Loop and Data Transformation**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 5：内层循环和数据转换**'
- en: 'The Outer Loop now invokes the Inner Loop, which we’ll treat as a black-box
    for now. As per the diagram, it provides two key things:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 外层循环现在调用内层循环，我们目前将其视为一个黑盒。根据图示，它提供了两个关键点：
- en: '**The Starting Point (5b):** The Initial layer weights, W₀, are fed to the
    Inner Loop, along with the current input. The Inner Loop outputs W[T] weights
    for the layer, which are tuned specifically for the current input.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**起点 (5b)：** 初始层权重 W₀ 与当前输入一起馈送到内层循环。内层循环为该层输出 W[T] 权重，这些权重针对当前输入进行了特定调整。'
- en: '![](../Images/6a464669b2efb0c8e88184b6381d07f6.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6a464669b2efb0c8e88184b6381d07f6.png)'
- en: '(Source: Author)'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: 'W[T], W[0]: The Input-Specific Weights and Baseline Generic Weights, respectively.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: W[T]，W[0]：输入特定权重和基线通用权重，分别。
- en: 'P: Patch Embedding Vector.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: P：块嵌入向量。
- en: 'θ[I]: Learnable Parameters of the Inner Loop.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: θ[I]：内层循环的可学习参数。
- en: '**The Data (5a):** The Input embeddings *P* are prepared to be processed by
    the adapted layer by a simple linear transformation *(ψ)*. This is done to increase
    the expressivity and make every MTTT layer learn different sets of attributes
    about the input.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据 (5a)：** 输入嵌入 *P* 通过简单的线性变换 *(ψ)* 准备好由适配层处理。这样做是为了增加表达性，并使每个 MTTT 层学习关于输入的不同属性集。'
- en: Here, the new weights *W[T]*, which are now specifically tuned for the puppy
    image, are loaded into the layer.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，新的权重 *W[T]*，现在针对小狗图像进行了特定调整，被加载到该层中。
- en: '**Steps 6 & 7: The Main Task Forward Pass**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 6 & 7：主要任务正向传递**'
- en: Now that the feature extractor has the specialized weights *W[T]*, it uses them
    to process the data for the main task.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在特征提取器拥有了专门的权重 *W[T]*，它使用这些权重来处理主要任务的数据。
- en: The transformed input embeddings from *Step 5a* are finally processed by the
    input-specific feature extractor layer *(Step 6)* and are yielded as the output
    of the first MTTT layer *(Step 7)*, which are then processed by multiple other
    MTTT layers, repeating the process all over again.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 从 *步骤 5a* 转换后的输入嵌入最终由针对输入的特征提取器层 *(步骤 6)* 处理，并作为第一个 MTTT 层的输出 *(步骤 7)*，然后由多个其他
    MTTT 层处理，重复此过程。
- en: '**Steps 8 **&** 9: The Final Output**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 8 **&** 9：最终输出**'
- en: After the data has passed through all the stacked MTTT layers *(Step 8)* and
    the final Classification Head *(Step 9)*, we get a final prediction, *ŷ*.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 数据通过所有堆叠的 MTTT 层 *(步骤 8)* 和最终的分类头 *(步骤 9)* 后，我们得到最终的预测，*ŷ*。
- en: '* * *'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Test vs Train:**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**测试 vs 训练：**'
- en: If the model is being tested, *ŷ* remains as the final output, but if the model
    is being trained, the output *(Step 9)* is used to calculate a loss (typically
    cross-entropy) against the ground truth *y*.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果模型正在测试，*ŷ* 保持为最终输出，但如果模型正在训练，则输出 *(步骤 9)* 用于计算损失（通常是交叉熵）与真实值 *y*。
- en: 'The Outer Loop, with this loss, calculates the gradient with respect to all
    parameters, and is hence called the “meta-gradient”. This gradient, along with
    training the model on the main task, also trains the Inner Loop’s parameters,
    which define the TTT’s self-supervised task. In essence, it uses the final classification
    error signal to ask itself:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 外层循环，考虑到这个损失，计算所有参数的梯度，因此被称为“元梯度”。这个梯度，连同在主要任务上训练模型，也训练了内层循环的参数，这些参数定义了TTT的自监督任务。本质上，它使用最终的分类误差信号来问自己：
- en: '***“How should I have set up the test-time learning problem so that the final
    outcome would have been better?”***'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***“我应该如何设置测试时学习问题，以便最终结果会更好？”***'
- en: This makes the model setup the most effective supervised task to best improve
    the performance on the main task, taking human guesswork and intuitive sense completely
    off the equation.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得模型设置最有效的监督任务，以最好地提高主要任务的表现，完全排除人类的猜测和直观感觉。
- en: '3.1.2 The Inner Loop: Unveiling the Black-Box'
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.1.2 内层循环：揭示黑盒
- en: Now that we understand the Outer Loop, we unroll the Black-box, a.k.a. the Inner
    Loop.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们理解了外层循环，我们展开黑盒，即内层循环。
- en: Its goal is to take the generic layer weights (W₀) and rapidly adapt them into
    specialized weights (W[T]) for the input it’s currently observing.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 它的目标是将通用层权重（W₀）快速调整为当前观察到的输入的专用权重（W[T]）。
- en: 'It achieves this by solving the self-supervised reconstruction task, which
    the Outer Loop designed for it. This self-contained learning procedure looks like
    this:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 它通过解决外层循环为其设计的自监督重建任务来实现这一点。这个自包含的学习过程如下：
- en: '![](../Images/830f2fb04d43e1e57f5cdebabe38db1b.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/830f2fb04d43e1e57f5cdebabe38db1b.png)'
- en: '(Source: Author)'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: Zoomed-in view of the Inner Loop, describing its inner workings.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 内层循环的放大视图，描述其内部工作原理。
- en: The numbers in black indicate the sequence of information flow (Steps).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 黑色数字表示信息流序列（步骤）。
- en: '**Steps 1-3: Setting Up the Learning Problem**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤1-3：设置学习问题**'
- en: 'The Inner Loop gets two distinct inputs from the Outer Loop:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 内层循环从外层循环获得两个不同的输入：
- en: The Input Patch Embeddings *(Step 2)*, and,
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入块嵌入（步骤2），以及，
- en: The generic weights for the feature extractor, W[0].
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 特征提取器的通用权重W[0]。
- en: As shown in Step 3, these original embeddings `P=(P<sub>1</sub>, P<sub>2</sub>,
    ...) `are made into a “test-time dataset”, where each datapoint is a singular
    patch’s embedding yielded sequentially.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如步骤3所示，这些原始嵌入`P=(P₁, P₂, ...)`被制作成一个“测试时数据集”，其中每个数据点是按顺序产生的单个块的嵌入。
- en: '**Steps 4 & 5: The Forward Pass – Creating a Puzzle**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤4 & 5：正向传递 – 创建谜题**'
- en: First, an input patch is passed through the Encoder (a linear layer whose parameters, *θ[Φ]*,
    were learned by the Outer Loop). This function “corrupts” the input *(Step 4)*,
    creating a puzzle that the subsequent network must solve. This corrupted patch
    is then fed into the Feature Extractor (The ‘Brain’), which processes it using
    its current generic weights *(Step 5)* to create a feature representation.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，一个输入块通过编码器（外层循环学习到的参数*θ[Φ]*的线性层）。这个函数“破坏”了输入（步骤4），创建了一个后续网络必须解决的谜题。这个被破坏的块随后被输入到特征提取器（“大脑”），它使用当前的通用权重（步骤5）来处理它，以创建一个特征表示。
- en: '**Steps 6 & 7: The Learning Step – Solving the Puzzle**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤6 & 7：学习步骤 – 解决谜题**'
- en: The feature representation from the “Brain” is then passed to the Decoder (a
    linear layer whose parameters, *θ[g]*, were also learned). The Decoder’s job is
    to utilize these features to reconstruct the *original*, uncorrupted patch *(Step
    6)*. The Inner Loop then measures how well it did by calculating a loss—typically
    Mean Squared Error (MSE)—between its reconstruction and the original patch. This
    error signal drives the Gradient Step *(Step 7)*, which calculates a small update
    for the Feature Extractor’s weights.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 来自“大脑”的特征表示随后传递到解码器（其参数*θ[g]*也被学习）。解码器的任务是利用这些特征来重建*原始*、未破坏的块（步骤6）。然后内层循环通过计算其重建与原始块之间的损失（通常是均方误差MSE）来衡量其表现。这个误差信号驱动梯度步骤（步骤7），该步骤计算特征提取器权重的小更新。
- en: '**Steps 8-9: The Final Output**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤8-9：最终输出**'
- en: This update process, from the old weights to the new, is shown in Step 8a. After
    running for a set number of steps, *T* (until all patches are utilized sequentially),
    the final, adapted weights *(W[T])* are ready. The Inner Loop’s job is complete,
    and as shown in Step 8b, it outputs these new weights to be used by the Outer
    Loop for the main task prediction.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这个从旧权重到新权重的更新过程在步骤8a中展示。经过一定数量的步骤运行后，*T*（直到所有补丁按顺序使用），最终的、适应的权重*(W[T])*就准备好了。内循环的任务完成了，如图8b所示，它输出这些新的权重供外循环用于主要任务预测。
- en: 3.2 Attention as a Special Case of the MTTT Framework
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 注意力作为MTTT框架的特殊情况
- en: 'So far, we’ve treated MTTT as a novel framework. But here is where the paper
    delivers its most elegant insight: the attention mechanisms, which are globally
    accepted as the de facto, are just simple versions of this very same “learning
    to learn” process. This also makes sense because now the model is not constrained
    to adhere to a particular schema; rather, it can choose and curate the perfect
    framework for itself, which makes it act as a superset that encompasses everything,
    including attention.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们将MTTT视为一个新颖的框架。但在这里，论文提供了其最优雅的洞察：被全球普遍接受的注意力机制，正是这种“学习学习”过程的简单版本。这也很有道理，因为现在模型不再受限于遵循特定的架构；相反，它可以为自己选择和定制完美的框架，这使得它作为一个包含一切的超级集，包括注意力。
- en: The authors prove this with a series of deterministic mathematical derivations
    (which would be way beyond the scope of this article). They show that if you make
    specific choices for the “Brain” of the inner loop (the Feature Extractor), the
    entire complex, two-loop MTTT procedure simplifies and becomes an attention mechanism.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 作者通过一系列确定性数学推导（这将远远超出本文的范围）来证明这一点。他们表明，如果你为内循环的“大脑”（特征提取器）做出特定的选择，整个复杂、双循环的MTTT过程将简化并变成一个注意力机制。
- en: '**Case 1: Feature Extractor = Simple Linear Model**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**案例 1: 特征提取器 = 简单线性模型**'
- en: Linear attention ([Katharopoulos et al., 2020](https://proceedings.mlr.press/v119/katharopoulos20a.html?ref=mackenziemorehead.com))⁶
    is a much faster and similar implementation to the self-attention ([Vaswani et
    al., 2017](https://proceedings.neurips.cc/paper/2017/hash/3f5ee243547dee91fbd053c1c4a845aa-Abstract.html))⁷
    we use widely today. Unlike self-attention, where we compute the (*N×N*) attention
    matrix (where ‘*N*‘ is the number of tokens) that results in an O(n²) bottleneck,
    linear attention calculates the K^T×V matrix (*DXD*; ‘*D*‘ is the hidden dimension),
    which is linear in *N*.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 线性注意力([Katharopoulos等人，2020](https://proceedings.mlr.press/v119/katharopoulos20a.html?ref=mackenziemorehead.com))⁶是一种比我们今天广泛使用的自注意力([Vaswani等人，2017](https://proceedings.neurips.cc/paper/2017/hash/3f5ee243547dee91fbd053c1c4a845aa-Abstract.html))⁷更快且类似的实现。与自注意力不同，我们计算(*N×N*)注意力矩阵（其中“*N*”是标记的数量），导致O(n²)瓶颈，线性注意力计算K^T×V矩阵(*DXD*；其中“*D*”是隐藏维度），它在*N*上是线性的。
- en: '![](../Images/64a2387ea57b8a92c4287f0c59f399db.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/64a2387ea57b8a92c4287f0c59f399db.png)'
- en: '(Source: Author)'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: By multiplying K^T and V matrices first, we circumvent the O(n²) attention matrix,
    which we calculate in the standard self-attention
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 通过首先乘以K^T和V矩阵，我们绕过了标准自注意力中计算的O(n²)注意力矩阵
- en: When “the brain” is just a single linear layer that takes one learning step
    (T=1, aka just one patch), its “correction” (the gradient step) is mathematically
    linear regression. The researchers showed that this entire process collapses perfectly
    into the formula for Linear Attention. The Encoder learns the role of the Key
    (K), the Decoder learns the role of the Value (V), and the main task’s Input Transformation
    *(ψ)* learns the role of the Query (Q)!
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当“大脑”只是一个单层线性层，执行一次学习步骤（T=1，即只是一个补丁）时，它的“校正”（梯度步骤）在数学上就是线性回归。研究人员表明，整个过程完美地折叠成线性注意力的公式。编码器学习键（K）的角色，解码器学习值（V）的角色，主要任务输入变换（ψ）学习查询（Q）的角色！
- en: '**Case 2: Feature Extractor = Kernel Estimator**.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**案例 2: 特征提取器 = 核估计器**.'
- en: Now, if the learning layer (feature extractor) is replaced with a Kernel Estimator
    (which computes a weighted average), specifically the Nadaraya-Watson estimator
    ([Nadaraya, 1964](https://epubs.siam.org/doi/abs/10.1137/1109020?journalCode=tprbau))⁸
    & ([Watson, 1964](https://www.jstor.org/stable/25049340))⁹, the MTTT process becomes
    identical to the standard Self-Attention. The kernel’s similarity function collapses
    to the Query-Key dot product, and its normalization step becomes the Softmax function.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果学习层（特征提取器）被替换为一个核估计器（计算加权平均），特别是Nadaraya-Watson估计器([Nadaraya, 1964](https://epubs.siam.org/doi/abs/10.1137/1109020?journalCode=tprbau))⁸
    & ([Watson, 1964](https://www.jstor.org/stable/25049340))⁹，MTTT过程就与标准的自注意力相同。核的相似性函数简化为查询-键点积，其归一化步骤变为Softmax函数。
- en: '![](../Images/9b5a4806878ed504c5ae636a8c7e70bd.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9b5a4806878ed504c5ae636a8c7e70bd.png)'
- en: '(Source: Author)'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: The standard self-attention formula is also just an instantiation of the “learning
    to learn” superset
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 标准的自注意力公式也只是“学习学习”超集的一个实例
- en: '**What does this mean?**'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**这意味着什么？**'
- en: The authors state that in the past three decades of machine learning and AI,
    a clear pattern regarding the performance of algorithms can be observed.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 作者表示，在过去三十年的机器学习和人工智能中，关于算法性能的清晰模式可以观察到。
- en: '![](../Images/cedb78f2d7391d0baf8a939bbb229b32.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cedb78f2d7391d0baf8a939bbb229b32.png)'
- en: '(Source: Author)'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: 'We know that:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道：
- en: When the feature extractor is a linear model, we get fast but not so impressive
    linear attention.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当特征提取器是一个线性模型时，我们得到快速但并不那么令人印象深刻的线性注意力。
- en: When the feature extractor is a kernel, we get the ubiquitous self-attention.
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当特征提取器是一个核时，我们得到普遍的自注意力。
- en: When the feature extractor is a deep-learning model (an MLP, for example), we
    get….?
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当特征提取器是一个深度学习模型（例如MLP）时，我们得到……？
- en: '**What happens if we put an even *better* learner (like MLP) inside the Inner
    Loop?** **Would it perform better?**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果我们把一个更好的学习者（如MLP）放入内循环会发生什么？** **它会表现得更好吗？**'
- en: '4\. MTTT-MLP: The Primary Contribution'
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. MTTT-MLP：主要贡献
- en: The answer to the above question is the main contribution of the authors in
    this paper. They equip the inner loop with a small, 2-layer Multi-Layer Perceptron
    (MLP) as the feature extractor.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的问题的答案是本文作者的主要贡献。他们在内循环中配备了一个小型、两层多层感知器（MLP）作为特征提取器。
- en: 4.1 Self-Attention vs. MTTT-MLP vs. Linear-Attention
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1 自注意力 vs. MTTT-MLP vs. 线性注意力
- en: 'The authors put MTTT-MLP to the test in two drastically different scenarios
    on the ImageNet dataset:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在ImageNet数据集上的两个截然不同的场景中对MTTT-MLP进行了测试：
- en: 'Scenario 1: The Standard Scenario (ImageNet with Patches)'
  id: totrans-104
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 场景1：标准场景（使用补丁的ImageNet）
- en: First, they tested a Vision Transformer (ViT) on standard 224×224 images, broken
    into 196 patches. In this configuration, the O(n²) methods are practical as well,
    which makes it an even playing field for all models.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，他们在一个标准的224×224图像上测试了一个视觉Transformer（ViT），该图像被分割成196个补丁。在这个配置中，O(n²)的方法也是实用的，这使得所有模型处于同一起跑线。
- en: '**The Results:**'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果：**'
- en: MTTT-MLP (74.6% acc.) beat its theoretical predecessor, MTTT-Linear (72.8% acc.),
    confirming the hypothesis that more complex learners perform better.
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: MTTT-MLP（74.6%准确率）击败了其理论前身MTTT-Linear（72.8%准确率），证实了更复杂的学习者表现更好的假设。
- en: However, standard self-attention (76.5% acc.) still reigned supreme. Although
    contrary to our hypothesis, it still makes sense because when you can afford the
    expensive quadratic computation on short sequences, the original is hard to top.
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然而，标准的自注意力（76.5%准确率）仍然占据主导地位。尽管这与我们的假设相反，但仍有道理，因为当你能承担在短序列上进行昂贵的二次计算时，原始的自注意力很难超越。
- en: 'Scenario 2: The Non-Standard Scenario (ImageNet with Raw Pixels)'
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 场景2：非标准场景（使用原始像素的ImageNet）
- en: The researchers drastically changed the environment by feeding the model raw
    pixels instead of patches. This inflates the sequence length from a manageable
    196 to a massive 50,176 tokens, which is the very arch-nemesis of the standard
    attention algorithms.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 研究者们通过用原始像素而不是补丁来喂养模型，极大地改变了环境。这使得序列长度从可管理的196增加到庞大的50,176个标记，这正是标准注意力算法的宿敌。
- en: '**The Results:**'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果：**'
- en: This comparison could only be held between linear attention and MTTT-MLP because
    self-attention **failed to even run**. Modeling 50,176 tokens resulted in 2.5
    billion entries in the attention matrix, which immediately threw an OOM (Out-Of-Memory)
    error on any standard GPU.
  id: totrans-112
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这种比较只能在线性注意力与MTTT-MLP之间进行，因为自注意力**甚至无法运行**。对50,176个标记进行建模导致了注意力矩阵中的25亿个条目，这立即在任何标准GPU上引发了OOM（内存不足）错误。
- en: Linear Attention performed mediocre, achieving around 54-56% accuracy.
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性注意力表现平庸，准确率在54-56%之间。
- en: MTTT-MLP won this round by a large margin, reaching 61.9% accuracy.
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: MTTT-MLP以大幅优势赢得这一轮，达到61.9%的准确率。
- en: Even when pitted against a larger Linear Attention model with 3x the parameters
    and 2x the FLOPs, MTTT-MLP still won by around a 10% margin.
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使与具有3倍参数和2倍FLOPs的更大线性注意力模型相抗衡，MTTT-MLP仍然以大约10%的优势获胜。
- en: The key takeaway from these experiments was that though self-attention reigned
    supreme in terms of raw performance, MTTT-MLP provides a huge boost in modeling
    power over linear attention while retaining the same sweet O(n) linear complexity
    that allows it to scale to massive inputs.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这些实验的关键结论是，尽管自注意力在原始性能方面占据主导地位，但MTTT-MLP在建模能力上提供了巨大的提升，同时保持了相同的甜美的O(n)线性复杂度，使其能够扩展到大量输入。
- en: 4.2 Watching How the Inner Loop Learns
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2 观察内层循环的学习过程
- en: To interpret the trends of their novel approach, the authors provide a pair
    of graphs that help us peek into how the inner loop learns and how the outer loop
    makes it learn the best possible lessons.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解释他们新颖方法的趋势，作者提供了一对图表，帮助我们窥视内层循环是如何学习的，以及外层循环是如何让它学习最佳可能的教训的。
- en: 'Steps vs. Accuracy: The More The Merrier, But Not Always'
  id: totrans-119
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步数与准确率：越多越好，但并非总是如此
- en: '![](../Images/bea065fef6822121ecbef7aa83edcac3.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bea065fef6822121ecbef7aa83edcac3.png)'
- en: '(Source: Adapted from [Sun et al., 2024](https://arxiv.org/abs/2407.04620),
    Figure 1)'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：改编自 [Sun等人，2024](https://arxiv.org/abs/2407.04620)，图1）
- en: The x-axis shows the number of inner-loop gradient steps (T), and the y-axis
    shows the final classification accuracy on the ImageNet dataset.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: x轴显示内层循环的梯度步数（T），y轴显示在ImageNet数据集上的最终分类准确率。
- en: As T increases from 1 to 4, the model’s accuracy on the main classification
    task increases commensurately. This demonstrates that allowing the layer to perform
    a few steps of self-adaptation on each image directly translates to better overall
    performance. This shows that the inner loop does indeed help the main task, but
    the benefit isn’t infinite.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 当T从1增加到4时，模型在主要分类任务上的准确率相应地提高。这表明允许层在每个图像上进行几步自我适应，直接转化为更好的整体性能。这表明内层循环确实有助于主要任务，但好处并非无限。
- en: The performance peaks at T=4 and then slightly dips. This means that T=4 is
    the sweet spot, where the model learns enough to aid the main task, but not enough
    where the model focuses too much on the current input and forgets generalizability.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 性能在T=4时达到峰值，然后略有下降。这意味着T=4是最佳点，模型学习到足够的知识来辅助主要任务，但不会过多地专注于当前输入而忘记泛化性。
- en: 'Epochs vs. Loss: Synergy Between the Two Loops'
  id: totrans-125
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 时代与损失：两个循环的协同作用
- en: '![](../Images/d4ca73cdab6411f8282337df42caaf3e.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4ca73cdab6411f8282337df42caaf3e.png)'
- en: '(Source: Adapted from [Sun et al., 202](https://arxiv.org/abs/2310.13807)[4](https://arxiv.org/abs/2407.04620),
    Figure 1)'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：改编自 [Sun等人，202](https://arxiv.org/abs/2310.13807)[4](https://arxiv.org/abs/2407.04620)，图1）
- en: The x-axis shows the training epochs, and the y-axis shows the inner loop’s
    reconstruction loss on the TTT task. The colors of different lines indicate the
    inner loop’s training steps (T).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: x轴显示训练时代，y轴显示内层循环在TTT任务上的重建损失。不同线条的颜色表示内层循环的训练步骤（T）。
- en: This graph is the most information-dense. It gives us a look at how the performance
    of the inner loop changes as the outer loop learns to design a more sophisticated
    TTT task.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图信息量最大。它让我们看到，随着外层循环学会设计更复杂的TTT任务，内层循环的性能是如何变化的。
- en: 'There are two key trends to observe:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个关键趋势需要观察：
- en: '**Inner-Loop Optimization (The Vertical Trend)**'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**内层循环优化（垂直趋势**）'
- en: If you look at the blue line (T=0) as a whole, you’ll notice that it has the
    highest loss, because it’s the case when the outer loop keeps getting better at
    designing the TTT task (as epochs progress), while the inner loop doesn’t learn
    anything from it.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你整体观察蓝色线（T=0），你会注意到它的损失最高，因为这是外层循环在不断地改进设计TTT任务（随着时代的进步），而内层循环却从中没有学到任何东西的时候。
- en: If you look at any single epoch (a vertical slice of the graph), for all the
    others (T ∈ [1,4]), the loss is lower than the blue line, and for every increment
    in T, the loss decreases. This indicates that the more the inner loop is allowed
    to learn, the better its performance gets (which is the expected behavior).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你观察任何单个时代（图表的垂直切片），对于所有其他（T ∈ [1,4]）的情况，损失低于蓝色线，并且随着T的增加，损失减少。这表明内层循环被允许学习得越多，其性能就越好（这是预期的行为）。
- en: '**Outer-Loop Meta-Learning (The Horizontal Trend)**'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**外部循环元学习（水平趋势**）'
- en: This could be a bit counterintuitive, as every single line trends upwards in
    loss over the course of training. If you notice, all the lines except the blue
    (T=0) start from relatively the same loss value (at 0^(th) epoch), which is much
    lower than the blue’s loss. This is because the inner loop is allowed to train
    on the “not-hard” TTT task. After all, the outer loop hasn’t gotten the chance
    to design it yet, which causes all except the blue to ace it.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能有点反直觉，因为训练过程中每一条线在损失上都有上升趋势。如果你注意到，除了蓝色（T=0）之外的所有线条都是从相对相同的损失值（在第0个时代）开始的，这比蓝色的损失要低得多。这是因为内部循环被允许在“不太难”的TTT任务上训练。毕竟，外部循环还没有机会设计它，这导致除了蓝色之外的所有线条都做得很好。
- en: But as soon as the outer loop starts to pick up pace (as epochs go by), the
    inner loop finds it harder and harder to complete the now increasingly difficult
    but helpful task, leading to the inner loop’s loss to slowly creep up.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 但随着外部循环开始加速（随着时代的推移），内部循环发现完成现在越来越困难但有用的任务变得越来越困难，导致内部循环的损失逐渐上升。
