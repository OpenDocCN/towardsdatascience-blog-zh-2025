- en: 'The Machine Learning “Advent Calendar” Day 1: k-NN Regressor in Excel'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习“日历”第一天：Excel 中的 k-NN 回归器
- en: 原文：[https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/](https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/](https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/)
- en: <mdspan datatext="el1764618373080" class="mdspan-comment">Welcome</mdspan> to
    this [“Advent Calendar” of Machine learning and deep learning in Excel](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764618373080" class="mdspan-comment">欢迎</mdspan>来到这个 [“日历”中的机器学习和深度学习在
    Excel 中](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/)。
- en: For Day 1, we begin with the k-NN (k-Nearest Neighbors) regressor algorithm.
    And as you will see, this is really the simplest model and it is a good way to
    start.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第一天，我们从 k-NN（k-Nearest Neighbors）回归器算法开始。正如你将看到的，这实际上是最简单的模型，也是一个好的开始方式。
- en: For those who already know this model, here are some questions for you. Hopefully,
    they will make you want to continue reading. And there are some subtle lessons
    that are not taught in traditional courses.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 对于已经了解这个模型的人来说，这里有一些问题给你。希望这些问题能让你继续阅读。还有一些细微的教训，这些在传统的课程中是没有教授的。
- en: Is scaling of continuous features important for this model?
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连续特征的缩放对于这个模型重要吗？
- en: How can categorical features be handled?
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何处理分类特征？
- en: What should be done to the continuous features to improve model performance?
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了提高模型性能，应该对连续特征做些什么？
- en: What types of distance measures can be more suitable in certain situations?
    For example, when predicting house prices where geographical location matters?
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在某些情况下，哪些类型的距离度量可能更合适？例如，在预测房价，地理位置很重要的情况下？
- en: '**Spoiler:** with a naive k-NN, you cannot get the ideal scaling automatically.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**剧透：**使用简单的 k-NN，你不能自动获得理想的缩放。'
- en: It is also an opportunity, if you are not familiar with Excel formulas, to use
    formulas such as RANK, IF, SUMPRODUCT, and other useful Excel functions.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是一个机会，如果你不熟悉 Excel 公式，可以使用 RANK、IF、SUMPRODUCT 等其他有用的 Excel 函数。
- en: '![](../Images/349a85934b352ac939435215c2007f6b.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/349a85934b352ac939435215c2007f6b.png)'
- en: k-NN regressor in Excel – image by author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 k-NN 回归器 – 图片由作者提供
- en: The principle of k-NN
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: k-NN 原则
- en: If you want to sell or buy an apartment, how would you estimate the price?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要出售或购买一套公寓，你会如何估算价格？
- en: Please think about a very realistic approach, not some complex model that you
    have to spend hours to build.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 请考虑一个非常实际的方法，而不是一些复杂的模型，你需要花费数小时来构建。
- en: Something that you can do for real.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以真正做到的事情。
- en: Well, you would probably ask your neighbors who have an apartment of the same
    or similar size. And you calculate the average value of these apartments.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，你可能会的做法是询问那些拥有相同或类似大小公寓的邻居。然后计算这些公寓的平均值。
- en: 'Yes, that is exactly the idea of k-NN, for k-Nearest Neighbors: search for
    the most similar examples, and use their values to estimate the new one.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这正是 k-NN 的理念，即 k-Nearest Neighbors：寻找最相似的例子，并使用它们的值来估计新的值。
- en: To illustrate this task with a concrete example of house pricing estimation,
    we will use this well-known dataset called California Housing Dataset. This is
    the Census data from California block groups, used to predict **median house value**.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了用房屋定价估计的实例来说明这个任务，我们将使用这个著名的名为 California Housing Dataset 的数据集。这是加利福尼亚街区群体的普查数据，用于预测
    **房屋价值的中间值**。
- en: '![](../Images/3a69f0b0fef097c2c6ff13fa2211efd6.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3a69f0b0fef097c2c6ff13fa2211efd6.png)'
- en: '[California Housing Dataset](https://huggingface.co/datasets/gvlassis/california_housing)
    – **License:** **MIT**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[California Housing Dataset](https://huggingface.co/datasets/gvlassis/california_housing)
    – **许可:** **MIT**'
- en: Each observation is not an individual house, but it is still interesting to
    use this example.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 每个观察值不是一个单独的房屋，但使用这个例子仍然很有趣。
- en: Here is a quick description of the variables.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是变量的快速描述。
- en: '**Target variable** is **MedHouseVal**, which is the median house value, in
    units of **100,000 USD** (example: 3.2 means 320,000 dollars).'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标变量**是 **MedHouseVal**，即房屋价值的中间值，单位为 **100,000 美元**（例如：3.2 表示 320,000 美元）。'
- en: 'The **feature variables** are as follows:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**特征变量**如下：'
- en: '**1\. MedInc**: median income (in units of 10,000 USD)'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**1\. MedInc**: 中等收入（单位为 10,000 美元）'
- en: '**2\. HouseAge**: median age of houses'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**2\. HouseAge**: 房屋的中等年龄'
- en: '**3\. AveRooms**: average number of rooms per household'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**3\. AveRooms**: 每户平均房间数'
- en: '**4\. AveBedrms**: average number of bedrooms per household'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. AveBedrms**：每户平均卧室数'
- en: '**5\. Population**: people living in the block group'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 人口**：居住在街区组中的人数'
- en: '**6\. AveOccup**: average number of occupants per household'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**6. AveOccup**：每户平均居住人数'
- en: '**7\. Latitude**: geographic latitude'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**7. 纬度**：地理纬度'
- en: '**8\. Longitude**: geographic longitude'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**8. 经度**：地理经度'
- en: k-NN with One Continuous Feature
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有一个连续特征的k-NN
- en: Before we use multiple features to find the neighbors, let’s first only use
    one feature and a few observations.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们使用多个特征来查找邻居之前，让我们首先只使用一个特征和一些观测值。
- en: Even though the process for one continuous feature will be very simple, we will
    still follow every step. We first explore our dataset, then we train the model
    with a hyperparameter, and at last, we can use the model to predict.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 即使对于连续特征的过程将非常简单，我们仍然会遵循每个步骤。我们首先探索我们的数据集，然后使用超参数训练模型，最后我们可以使用模型进行预测。
- en: Training dataset
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练数据集
- en: Here is the plot of this simple dataset of 10 observations. The x-axis is the
    continuous feature, and the y-axis is the target variable.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这是10个观测值简单数据集的图。x轴是连续特征，y轴是目标变量。
- en: '![](../Images/de1d11b6ec0d4edca73c982f0a65ec75.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/de1d11b6ec0d4edca73c982f0a65ec75.png)'
- en: One simple feature for K-NN – image by author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: K-NN的一个简单特征——作者图片
- en: Now, imagine that we have to predict the value for a new observation x=10\.
    How can we do that?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设我们必须预测新观测值x=10的值。我们该如何做呢？
- en: Model training?
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型训练？
- en: The first step for almost all machine learning models is training.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎所有机器学习模型的第一步是训练。
- en: But for k-NN, your model is your entire dataset. In other words, you don’t have
    to train the model, you use the original dataset directly.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于k-NN，您的模型就是您的整个数据集。换句话说，您不需要训练模型，直接使用原始数据集即可。
- en: So in scikit-learn, when you do model.fit, for a k-NN estimator, nothing really
    happens.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在scikit-learn中，当您执行model.fit时，对于k-NN估计器，实际上并没有发生任何事情。
- en: 'Some may ask: what about k?'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会问：k值是多少？
- en: Well, k is the hyperparameter. So you have to choose a value for k, and it can
    be tuned.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，k是超参数。因此，您必须为k选择一个值，并且它可以进行调整。
- en: Prediction for one new observation
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对一个新观测值的预测
- en: For the hyperparameter k, we will use k=3, since the dataset is very small.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于超参数k，我们将使用k=3，因为数据集非常小。
- en: For one feature variable, the distance can trivially be the **absolute value**
    of the difference of the value between the new observation and the others.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个特征变量，距离可以简单地是新观测值与其他观测值之间值的**绝对值**差异。
- en: In the sheet “algo1D”, you can change the value of the new observation, and
    use the filter on distance column C to order the dataset in the increasing order,
    the 3-nearest neighbors will be plotted.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在“algo1D”工作表中，您可以更改新观测值的值，并使用距离列C上的过滤器按升序排列数据集，将最近的3个邻居绘制出来。
- en: To make the calculation more automatic, we can use RANK function to see the
    smallest observations in terms of distance.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使计算更加自动化，我们可以使用RANK函数查看距离最小的观测值。
- en: And we also can create a column of indicators (column G), with indicator = 1,
    if they belong to the k-nearest neighbors.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以创建一个指标列（列G），如果它们属于k个最近邻居，则指标=1。
- en: Finally, for the prediction, we can use SUMPRODUCT to calculate the average
    value of all y values with indicator =1.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，对于预测，我们可以使用SUMPRODUCT计算所有y值中指标=1的平均值。
- en: In the plot,
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在图中，
- en: the light blue dots represent the dataset
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 浅蓝色点代表数据集
- en: the red dot represents the new observation with the predicted y value
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 红色点代表具有预测y值的新观测值
- en: the yellow dots represent the 3-nearest neighbors of the new observation (in
    red)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黄色点代表新观测值（红色）的3个最近邻居
- en: '![](../Images/db7ac9363f3be0cf4b4bd0b72c6ff459.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/db7ac9363f3be0cf4b4bd0b72c6ff459.png)'
- en: k-NN regressor in Excel with one feature – image by author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 带有一个特征的Excel中的k-NN回归器——作者图片
- en: 'Let’s recap — the prediction phase consists of the following steps:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下——预测阶段包括以下步骤：
- en: For one given new observation, calculate the distance between this new observation
    and all the observations in the training dataset.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于一个给定的新观测值，计算这个新观测值与训练数据集中所有观测值之间的距离。
- en: Identify the k observations that have the shortest distance. In Excel, we will
    use the filter to order manually the training dataset. Or we can use RANK (and
    a indicator column) to get the top k observations.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别具有最短距离的k个观测值。在Excel中，我们将使用过滤器手动排序训练数据集。或者我们可以使用RANK（以及一个指标列）来获取前k个观测值。
- en: Calculate the predicted value, by calculating the average value of the target
    variable, by using SUMPRODUCT.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过使用SUMPRODUCT计算目标变量的平均值来计算预测值。
- en: Prediction for an interval of new observations
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对新观测值区间的预测
- en: In the sheet “*algo1D f*” (f for final), I plotted the prediction for a list
    of new observations, ranging from 1 to 17.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在“*algo1D f*”工作表（f代表最终）中，我绘制了一系列新观测值的预测，范围从1到17。
- en: With a programming language, we could do it easily in a loop, and for a larger
    number of new observations, so the representation could be denser.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 使用编程语言，我们可以轻松地在循环中完成它，对于更多的新观测值，表示可以更密集。
- en: 'With Excel, I manually repeated the following steps:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel，我手动重复以下步骤：
- en: input a value for x
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入x的值
- en: order the distance column
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 排序距离列
- en: copy-paste the prediction
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制粘贴预测值
- en: '![](../Images/5927ae348a5cf32e477b4c7c6c8a2ada.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5927ae348a5cf32e477b4c7c6c8a2ada.png)'
- en: k-NN regressor in Excel with one feature – image by author
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中带有单个特征的k-NN回归器 – 作者图片
- en: Effect of the hyperparameter k
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 超参数k的影响
- en: The hyperparameter that is used in k-NN is the number of neighbors that we take
    into account for the calculation of average value.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在k-NN中使用的超参数是我们用于计算平均值时考虑的邻居数量。
- en: We usually use this following graph to explain how a model can be underfitted,
    or overfitted.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常使用以下图表来解释模型如何欠拟合或过拟合。
- en: '![](../Images/486609a183050b249246d934791be1c2.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/486609a183050b249246d934791be1c2.png)'
- en: k-NN regressor overfitting and overfitting – image by author
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: k-NN回归器过拟合和过拟合 – 作者图片
- en: In our case, if k is small, there can be a risk of overfitting.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，如果k值较小，可能会存在过拟合的风险。
- en: If k is large, there can be risk of underfitting.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果k值较大，可能会存在欠拟合的风险。
- en: 'The extreme case of very large k is that k can be the total number of the training
    dataset. And the value of the prediction will be the same for every new observation:
    it is the global average.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 非常大的k的极端情况是k可以是训练数据集的总数。对于每个新的观测值，预测值将是相同的：它是全局平均值。
- en: '![](../Images/38ce9fcc1bc9178349a516d5be5ec236.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/38ce9fcc1bc9178349a516d5be5ec236.png)'
- en: k-NN regressor in Excel with effect of k – image by author
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中带有k影响的k-NN回归器 – 作者图片
- en: So, we can say that k-NN improves the idea of predicting with a calculation
    of the average value with a few observations that are close to the new observation.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以说k-NN通过计算接近新观测值的几个观测值的平均值来改进预测的想法。
- en: k-NN with Two Continuous Features
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于两个连续特征的k-NN
- en: Now, we will study the case of two continuous feature variables x1 and x2\.
    And we will only talk about the differences with the previous situation of one
    feature variable.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将研究两个连续特征变量x1和x2的情况，并且我们只讨论与之前一个特征变量情况的不同。
- en: Two continuous feature variables dataset
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 两个连续特征变量数据集
- en: When we have two feature variables, I cannot plot in 3D with Excel, so the plot
    contains only x1 as x-axis, and x2 as y-axis.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们有两个特征变量时，我无法使用Excel进行3D绘图，因此图表只包含x1作为x轴，x2作为y轴。
- en: So don’t be confused with the previous dataset, for which y-axis represents
    the target value y.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，不要对之前的dataset混淆，其中y轴表示目标值y。
- en: '![](../Images/9eeec24cba46cfbf3b7d9366f5b398f1.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9eeec24cba46cfbf3b7d9366f5b398f1.png)'
- en: K-NN with two features in Excel – image by author
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中带有两个特征的K-NN – 作者图片
- en: Prediction with the Euclidean distance
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用欧几里得距离进行预测
- en: Now that we have two features, we have to take both of them into account.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有两个特征，我们必须考虑它们两个。
- en: One usual distance we can use is the Euclidean Distance.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用的一个常用距离是欧几里得距离。
- en: Then we can use the same process to the top k observations that have the minimum
    distance with the new observation.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以使用相同的过程处理与新的观测值距离最小的top k个观测值。
- en: '![](../Images/cf7c59a3f15a7c011bb561292481c231.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cf7c59a3f15a7c011bb561292481c231.png)'
- en: k-NN regressor in Excel with two features – image by author
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中带有两个特征的k-NN回归器 – 作者图片
- en: To get a visual plot, we can use the same colors
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 为了得到可视化的图表，我们可以使用相同的颜色
- en: Blue for training dataset
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蓝色表示训练数据集
- en: Red for the new observation
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 红色表示新观测值
- en: Yellow for the found k nearest neighbors
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黄色表示找到的k个最近邻
- en: '![](../Images/9544d4c810145489d0bbcd8faf05a16b.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9544d4c810145489d0bbcd8faf05a16b.png)'
- en: k-NN regressor in Excel plot with two features – image by author
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中带有两个特征的k-NN回归器 – 作者图片
- en: Impact of the scale of the variables
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变量规模的影响
- en: When you have two features, one question that we can ask is the impact of the
    scale of the feature for the result of prediction.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有两个特征时，我们可以问的一个问题是特征规模对预测结果的影响。
- en: First, let’s see this simple example, I multiplied the feature x2 by 10.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看这个简单的例子，我将特征x2乘以10。
- en: '![](../Images/72d8f07bf25afb4e4d5178127c6cbebe.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/72d8f07bf25afb4e4d5178127c6cbebe.png)'
- en: k-NN regressor in Excel with different scales – image by author
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的不同规模的k-NN回归器 – 作者图片
- en: Will this scaling impact the predictions? The answer is of course yes.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这种缩放会影响预测吗？答案是当然会的。
- en: And we can easily compare them, as in the following image.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以很容易地比较它们，如下面的图像所示。
- en: '![](../Images/34f9b93d7eb74961825ccd62de858887.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/34f9b93d7eb74961825ccd62de858887.png)'
- en: k-NN regressor in Excel with different scales – image by author
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的不同规模的k-NN回归器 – 作者图片
- en: It is easy enough to understand that the Euclidean Distance sums the squared
    difference of the features, regardless of their scales.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易理解，欧几里得距离将特征之间的平方差相加，而不考虑它们的规模。
- en: As a result, the feature that has a large scale will dominate the distance.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，具有较大规模的特性将主导距离。
- en: When it comes to feature scaling, one common operation is standardization (also
    called centering and reduction) or min–max scaling. The idea is to place all features
    on a comparable scale.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到特征缩放时，一个常见的操作是标准化（也称为中心化和归一化）或最小-最大缩放。其思想是将所有特征放置在可比较的规模上。
- en: 'BUT, let’s think about this situation: what if one feature is expressed in
    dollars, and the other in yen.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，让我们考虑这种情况：如果一个特征以美元表示，而另一个以日元表示。
- en: In the real world, the correct relation between the two scales is about 1 dollar
    = 156 yen (as of November 2025). We know this because we understand the meaning
    of the units.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中，两个规模之间的正确关系大约是1美元=156日元（截至2025年11月）。我们知道这一点，因为我们理解了单位的意义。
- en: How would the model know this? It DOES NOT.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 模型会如何知道这一点呢？它**不知道**。
- en: The only hyperparameter is k, and the model does not adjust anything to correct
    for differences in units or scales. k-NN has no internal mechanism for understanding
    that two features have different units.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的超参数是k，模型不会调整任何东西来纠正单位或规模的差异。k-NN没有内部机制来理解两个特征具有不同的单位。
- en: And this is only the begining of the problems…
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是问题开始的一部分...
- en: k-NN with the California Housing dataset
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: k-NN与加利福尼亚住房数据集
- en: Now, let’s finally use the real-world dataset of California Housing dataset.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们最终使用加利福尼亚住房数据集的实际情况数据集。
- en: With the one-feature dataset, we got the basic idea of how k-NN works. With
    two-feature dataset, we saw that the scale of features is important.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 使用单特征数据集，我们得到了k-NN是如何工作的基本概念。使用双特征数据集，我们看到了特征规模的重要性。
- en: Now, with this real-world dataset, we will see that the heterogeneous nature
    of the features make the Euclidean distance meaningless.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用这个实际情况数据集，我们将看到特征的异质性使得欧几里得距离变得没有意义。
- en: We will see some other more important ideas when we use k-NN in practice.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在实践中使用k-NN时，我们将看到一些其他更重要的想法。
- en: Naive application of k-NN regressor
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Naive应用k-NN回归器
- en: Since all features in this dataset are continuous, we can easily calculate the
    Euclidean Distance. And we define a number k, to calculate the average value of
    the target variable, here MedHouseVal.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个数据集中的所有特征都是连续的，我们可以轻松地计算欧几里得距离。我们定义一个数字k，来计算目标变量的平均值，这里MedHouseVal。
- en: In Excel, you can easily do that yourself. Or you can support me [here](https://ko-fi.com/s/4ddca6dff1)
    and get all the files.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，你可以轻松地自己做到这一点。或者你可以支持我[这里](https://ko-fi.com/s/4ddca6dff1)并获取所有文件。
- en: '![](../Images/42dbe0b3a6235f34eaf8bbaa842321da.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/42dbe0b3a6235f34eaf8bbaa842321da.png)'
- en: k-NN regressor in Excel with California Housing dataset – image by author
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的加利福尼亚住房数据集的k-NN回归器 – 作者图片
- en: Notion of distance based on different features
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于不同特征的距离概念
- en: 'I said that the previous application is naive, because if you look closer,
    you will see these problems:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我说之前的应用是naive的，因为如果你仔细看，你会看到这些问题：
- en: MedInc (median income) is expressed in units of 10,000 USD. If we decide to
    express it in 100,000 USD or in 1,000 USD instead, the prediction will change,
    because k-NN is sensitive to the scale of the features. We saw this problem before.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: MedInc（中位数收入）以10,000美元为单位表示。如果我们决定用100,000美元或1,000美元来表示，预测将会改变，因为k-NN对特征的规模很敏感。我们之前已经看到过这个问题。
- en: Now, moreover, each feature has a different nature.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，更进一步，每个特性都有不同的性质。
- en: MedInc is an amount of money (in dollars).
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MedInc是金额（美元）。
- en: HouseAge is an age in years.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HouseAge是按年计算的年龄。
- en: AveRooms is a count of rooms.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AveRooms是房间数量的计数。
- en: Population is a number of persons.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Population是人数。
- en: Latitude and longitude are geographic coordinates.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 纬度和经度是地理坐标。
- en: Therefore, the Euclidean distance is doomed.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，欧几里得距离注定是注定要失败的。
- en: Different types of distances
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不同的距离类型
- en: The most common choice is the Euclidean distance, but it is not the only one.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的选择是欧几里得距离，但并非只有这一种。
- en: We can also use **Manhattan distance** when features represent grid-like movements,
    and **Cosine distance** when only the direction matters (as with text embeddings).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以在特征表示网格状移动时使用**曼哈顿距离**，而在只有方向重要时（如文本嵌入）使用**余弦距离**。
- en: Each distance changes how “nearest” is defined, and therefore can change which
    neighbors KNN selects.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 每个距离都会改变“最近”的定义，因此可以改变KNN选择的邻居。
- en: Depending on the data, other distances can be more appropriate.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 根据数据，其他距离可能更合适。
- en: For example, with latitude and longitude, we can use the real geographical distance
    (in meters) instead of a simple Euclidean distance on degrees.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对于纬度和经度，我们可以使用实际的地理距离（以米为单位），而不是简单的以度为单位的欧几里得距离。
- en: In the California Housing dataset, this is especially useful because we have
    the exact latitude and longitude of each district.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在加利福尼亚住房数据集中，这一点特别有用，因为我们有每个地区的确切纬度和经度。
- en: However, once we try to combine these geographical distances with other variables
    (such as median income, number of rooms, or population), the problem becomes more
    complex, because the variables have very different natures and scales.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一旦我们尝试将这些地理距离与其他变量（如中位数收入、房间数量或人口）相结合，问题就变得更加复杂，因为这些变量具有非常不同的性质和尺度。
- en: '![](../Images/b85a260b839bf0ab5349c2834842ab56.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b85a260b839bf0ab5349c2834842ab56.png)'
- en: k-NN regressor in Excel with geographical distance – image by author
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN回归器带有地理距离 - 作者图片
- en: In the cartography renderings below, I used k-NN as a smoothing function to
    refine the values associated with different areas of Paris.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的地图渲染中，我使用了k-NN作为平滑函数来细化与巴黎不同区域相关的值。
- en: On the left, each area has only a single value, so from one quarter to its neighboring
    quarters, there can be a discontinuity of the variable.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧，每个区域只有一个值，因此从一个区域到其相邻区域，变量的连续性可能会有间断。
- en: On the right, k-NN allows me to estimate a value for every specific address
    by smoothing the information based on nearby areas.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在右侧，k-NN允许我通过对附近区域的基于信息进行平滑来为每个特定地址估计一个值。
- en: Moreover, for indicators such as the proportion of certain professional categories,
    I also applied population-based weighting so that larger areas have a stronger
    influence in the smoothing process.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，对于如某些专业类别比例这样的指标，我还应用了基于人口的加权，以便较大的区域在平滑过程中有更强的影响力。
- en: '![](../Images/91453c3f4e6a44f0da9b142490857ec8.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/91453c3f4e6a44f0da9b142490857ec8.png)'
- en: k-NN regressor in Excel with smoothing – image by author
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN回归器带有平滑功能 - 作者图片
- en: As a conclusion, when the situation allows it, choosing a more specific distance
    can help us better capture the underlying reality.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 作为结论，当情况允许时，选择一个更具体的距离可以帮助我们更好地捕捉潜在的现实。
- en: 'By linking the distance to the nature of the data, we can make k-NN much more
    meaningful: geographical distance for coordinates, cosine distance for embeddings,
    and so on. The choice of distance is not just a technical detail, it changes how
    the model “sees” the world and which neighbors it considers relevant.'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将距离与数据的性质联系起来，我们可以使k-NN变得更加有意义：地理距离用于坐标，余弦距离用于嵌入，等等。距离的选择不仅仅是技术细节，它改变了模型“看待”世界的方式以及它认为哪些邻居是相关的。
- en: How Categorical Features can be Modeled
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何对分类特征进行建模
- en: You may hear that *categorical features cannot be handled in k-NN models*.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会听到*分类特征不能在k-NN模型中处理*的说法。
- en: But this is not completely true.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不完全正确。
- en: k-NN can work with categorical variables as long as we can **define a distance**
    between two observations.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 只要我们可以在两个观测值之间**定义一个距离**，k-NN就可以与分类变量一起工作。
- en: 'Many people will say: *“just use one-hot encoding.”*'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人会说：“*只需使用独热编码即可。”*
- en: Others mention *label encoding*, or ordinal encoding.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 其他提到*标签编码*或有序编码。
- en: But these methods behave very differently in a distance-based model.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 但这些方法在基于距离的模型中表现非常不同。
- en: 'To make this clear, we will use another dataset: the **[diamond price dataset](https://www.tensorflow.org/datasets/catalog/diamonds)**
    (CC BY 4.0 license), which contains several features such as carat, *cut*, *color*,
    and *clarity*.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点更清晰，我们将使用另一个数据集：**[钻石价格数据集](https://www.tensorflow.org/datasets/catalog/diamonds)**（CC
    BY 4.0许可），它包含诸如克拉、*切割*、*颜色*和*净度*等几个特征。
- en: For simplicity, we will use only **carat** (numerical) and **clarity** (categorical)
    to demonstrate a few results.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单起见，我们将只使用**克拉**（数值）和**净度**（分类）来展示一些结果。
- en: Predicting Prices with Carat
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用克拉预测价格
- en: First, we will start with **carat**, since you probably know that the price
    of a diamond depends mainly on the size (carat) of the stone.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将从**克拉**开始，因为你可能知道钻石的价格主要取决于宝石的大小（克拉）。
- en: The graphic below shows how k-NN can find diamonds with similar sizes to estimate
    the price.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图形显示了k-NN如何找到与相似大小的钻石来估计价格。
- en: '![](../Images/cc42ec94d4757f8fc79d71f10619a24c.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cc42ec94d4757f8fc79d71f10619a24c.png)'
- en: k-NN regressor in Excel with diamond price dataset – image by author
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN回归器，使用钻石价格数据集 – 图像由作者提供
- en: One-Hot Encoding for Clarity Feature
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 净度特征的One-Hot编码
- en: Now let us look at **clarity**.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来看看**净度**。
- en: Below is the table of categories with their meanings, and we apply **one-hot
    encoding** to transform each category into a binary vector.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是类别及其含义的表格，我们应用**one-hot编码**将每个类别转换为一个二进制向量。
- en: '| **Clarity** | **Meaning** |'
  id: totrans-176
  prefs: []
  type: TYPE_TB
  zh: '| **净度** | **含义** |'
- en: '| IF | Internally Flawless |'
  id: totrans-177
  prefs: []
  type: TYPE_TB
  zh: '| IF | 完美无瑕 |'
- en: '| VVS1 | Very Very Slightly Included 1 |'
  id: totrans-178
  prefs: []
  type: TYPE_TB
  zh: '| VVS1 | 非常非常轻微包裹1 |'
- en: '| VVS2 | Very Very Slightly Included 2 |'
  id: totrans-179
  prefs: []
  type: TYPE_TB
  zh: '| VVS2 | 非常非常轻微包裹2 |'
- en: '| VS1 | Very Slightly Included 1 |'
  id: totrans-180
  prefs: []
  type: TYPE_TB
  zh: '| VS1 | 非常轻微包裹1 |'
- en: '| VS2 | Very Slightly Included 2 |'
  id: totrans-181
  prefs: []
  type: TYPE_TB
  zh: '| VS2 | 非常轻微包裹2 |'
- en: '| SI1 | Slightly Included 1 |'
  id: totrans-182
  prefs: []
  type: TYPE_TB
  zh: '| SI1 | 轻微包裹1 |'
- en: '| SI2 | Slightly Included 2 |'
  id: totrans-183
  prefs: []
  type: TYPE_TB
  zh: '| SI2 | 轻微包裹2 |'
- en: '| I1 | Included 1 |'
  id: totrans-184
  prefs: []
  type: TYPE_TB
  zh: '| I1 | 包裹1 |'
- en: In this table, we see that for the new diamond with clarity **VVS2**, the nearest
    neighbors are all diamonds **from the same clarity category**.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个表中，我们可以看到对于新的具有净度**VVS2**的钻石，最近的邻居都是**来自同一净度类别**的钻石。
- en: The numerical feature *carat* has very little influence on the distance, whereas
    it is a more important feature, as you can see in the price column.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 数值特征*克拉*对距离的影响很小，而它是一个更重要的特征，正如你在价格列中可以看到的那样。
- en: '![](../Images/0c8f8c8d81217093fff1aa551db12dc5.png)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0c8f8c8d81217093fff1aa551db12dc5.png)'
- en: k-NN regressor in Excel with one-hot encoding for clarity in diamond price dataset
    – image by author
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN回归器，使用钻石价格数据集中的one-hot编码进行净度 – 图像由作者提供
- en: '**Key issue 1: all categories are equally distant**'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键问题1：所有类别距离相等**'
- en: 'When using Euclidean distance on one-hot vectors:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用欧几里得距离在一维向量上：
- en: IF vs VVS1 → distance = √2
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IF vs VVS1 → 距离 = √2
- en: IF vs SI2 → distance = √2
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IF vs SI2 → 距离 = √2
- en: IF vs I1 → distance = √2
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IF vs I1 → 距离 = √2
- en: '**Every different category is at exactly the same distance.**'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '**每个不同的类别都处于完全相同的距离。**'
- en: This does not reflect the real diamond grading scale.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不反映真实的钻石评级标准。
- en: '**Key issue 2: scaling problem with continuous variables**'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键问题2：连续变量的缩放问题**'
- en: 'Because we combine one-hot clarity with carat (a continuous feature), we face
    another problem:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将one-hot净度与克拉（一个连续特征）结合，我们面临另一个问题：
- en: carat values in our example are below 1
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的例子中的克拉值在1以下
- en: clarity vectors have differences of √2 → **clarity dominates the distance calculation**
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 净度向量之间的差异为√2 → **净度主导距离计算**
- en: So even small changes in clarity overpower the effect of carat.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，即使净度的微小变化也会压倒克拉的影响。
- en: This is exactly the same scaling issue we face with multi-continuous features,
    but even stronger.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我们面对的多连续特征缩放问题，但更为严重。
- en: Ordinal Encoding for Clarity
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 净度的顺序编码
- en: Now we can try encoding the **Clarity** feature with numerical labels. But instead
    of using the classic labels 1, 2, 3… we use **expert-based labels** that reflect
    the real grading scale.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以尝试使用数值标签对**净度**特征进行编码。但不是使用经典的标签1、2、3……我们使用**基于专家的标签**，这些标签反映了真实的评级标准。
- en: The idea is to translate the clarity levels into values that behave more like
    a continuous feature, similar to carat, even if clarity is not strictly continuous.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 理念是将净度级别转换为更类似于连续特征（类似于克拉）的值，即使净度不是严格连续的。
- en: '![](../Images/f1aa17c34927ffc7ddf384e080cbd768.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f1aa17c34927ffc7ddf384e080cbd768.png)'
- en: k-NN regressor in Excel with clarity encoding – image by author
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN回归器，使用净度编码 – 图像由作者提供
- en: With this expert-based encoding, the distances become more meaningful.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种基于专家的编码，距离变得更有意义。
- en: Carat and clarity are now on comparable scales, so neither feature completely
    dominates the distance calculation.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 钻石的大小和清晰度现在处于可比较的尺度上，因此没有任何一个特征完全主导距离计算。
- en: So, we obtain a **better balance** between size and clarity when selecting neighbors,
    which gives more realistic predictions.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们在选择邻居时获得了更好的尺寸和清晰度之间的平衡，这给出了更现实的预测。
- en: '![](../Images/835adc5b02a74ddd607ef6952d7f77aa.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/835adc5b02a74ddd607ef6952d7f77aa.png)'
- en: k-NN regressor in Excel with ordinal encoding for clarity feature in diamond
    price dataset – image by author
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 k-NN 回归器，使用顺序编码对钻石价格数据集中的清晰度特征进行编码 – 图像由作者提供
- en: Conclusions
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, the k-NN regressor is a highly non-linear, local estimator. It
    is so local that only the K closest observations are actually used.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，k-NN 回归器是一个高度非线性的局部估计器。它是如此局部，以至于实际上只使用了 K 个最近的观察值。
- en: 'After implementing k-NN regressor in Excel, I think that we can really ask
    this question: Is the k-NN regressor really a Machine Learning model?'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Excel 中实现 k-NN 回归器之后，我认为我们真的可以提出这个问题：k-NN 回归器真的是一个机器学习模型吗？
- en: There is no model training
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有模型训练
- en: When predicting, the selection of the neighbor observations does not depend
    on the value of target variable
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在预测时，邻居观察值的选取不依赖于目标变量的值
- en: But, it is so easy to understand, that with Excel, we can just implement the
    whole algorithm. Moreover, we can adjust the distance as we wish.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，它如此容易理解，以至于我们只需使用 Excel 就可以实施整个算法。此外，我们可以随意调整距离。
- en: 'Businesspeople can see the idea directly: **to predict a value, we look at
    similar observations.**'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 商人可以直接看到这个想法：**为了预测一个值，我们查看相似的观察结果**。
- en: 'The actual problems with k-NN, and all models that are based on distance:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: k-NN 以及所有基于距离的模型的实际问题：
- en: the scale of the features
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征的尺度
- en: the heterogeneous nature of features, which makes the sum meaningless
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征的异质性，这使得总和没有意义
- en: the specific distance that should be defined in concrete situations
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在具体情况下应定义的具体距离
- en: for categorical features, label/ordinal encoding could be optimized if we could
    find the optimal scaling.
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于分类特征，如果我们能找到最优缩放，标签/顺序编码可以优化。
- en: So in short, the problem is the scaling of the features. We may think that they
    can be tuned as hyperparameters, but then the tuning would require so much time.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，问题是特征缩放。我们可能会认为它们可以作为超参数进行调整，但调整将需要花费大量时间。
- en: We will see later that it is exactly the motivation behind another family of
    models.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在后面看到，这正是另一系列模型的动机。
- en: Here, the notion of scale is also equivalent to the notion of feature importance,
    because in k-NN the importance of each feature is defined **before** using the
    model.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，尺度的概念也等同于特征重要性的概念，因为在 k-NN 中，每个特征的重要性是在使用模型之前定义的。
- en: 'So this is only the beginning of our journey. We will discover together other
    models that can do better, from this simple model, by improving in different directions:
    feature scaling, from distance to probability, splitting to better model each
    category…'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这只是我们旅程的开始。我们将一起发现其他可以从不同方向改进、做得更好的模型，从这个简单的模型开始：特征缩放、从距离到概率、分割以更好地对每个类别建模...
