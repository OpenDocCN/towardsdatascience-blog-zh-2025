- en: Creating and Deploying an MCP Server from Scratch
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从零开始创建和部署MCP服务器
- en: 原文：[https://towardsdatascience.com/creating-and-deploying-an-mcp-server-from-scratch/](https://towardsdatascience.com/creating-and-deploying-an-mcp-server-from-scratch/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/creating-and-deploying-an-mcp-server-from-scratch/](https://towardsdatascience.com/creating-and-deploying-an-mcp-server-from-scratch/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1758563591407" class="mdspan-comment">During one of the
    weekends</mdspan> in September 2025, I took part in a hackathon organized by Mistral
    in Paris. All the teams had to create an MCP server and integrate it into Mistral.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758563591407" class="mdspan-comment">在2025年9月的一个周末</mdspan>，我参加了在巴黎由Mistral组织的一场黑客马拉松。所有团队都必须创建一个MCP服务器并将其集成到Mistral中。
- en: Though my team did not win anything, it was a fantastic personal experience!
    Additionally, I had never created an MCP server before, so it allowed me to gain
    direct experience with new technologies.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我的团队没有赢得任何东西，但这是一次极好的个人经历！此外，我以前从未创建过MCP服务器，因此这让我有机会直接接触新技术。
- en: As a result, we created [**Prédictif **](https://www.youtube.com/watch?v=5tNjjvV4B6g)— 
    an MCP server allowing to train and test machine learning models directly in the
    chat and persist saved datasets, results and models across different conversations.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们创建了[**Prédictif**](https://www.youtube.com/watch?v=5tNjjvV4B6g)——一个允许直接在聊天中训练和测试机器学习模型，并在不同对话中持久保存数据集、结果和模型的MCP服务器。
- en: '![](../Images/0a19ec0301c0d8a105486ff6ca59f42c.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0a19ec0301c0d8a105486ff6ca59f42c.png)'
- en: Prédictif logo
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Prédictif标志
- en: '*Given that I really enjoyed the event, I decided to take it a step further
    and write this article to provide other engineers with a simple introduction to
    MCP and also offer a guide on creating an MCP server from scratch.*'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*鉴于我真的很喜欢这个活动，我决定更进一步，写这篇文章，为其他工程师提供一个简单的MCP介绍，并提供从零开始创建MCP服务器的指南*。'
- en: '*If you are curious, the hackathon’s solutions from all teams are [here](https://cerebralvalley.ai/e/mistral-mcp-hackathon/hackathon/gallery)*.'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果你好奇，所有团队的解决方案都在这里[这里](https://cerebralvalley.ai/e/mistral-mcp-hackathon/hackathon/gallery)*。'
- en: MCP
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP
- en: AI agents and MCP servers are relatively new technologies that are currently
    in high demand in the machine learning world.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理和MCP服务器是相对较新的技术，目前在机器学习领域需求很高。
- en: '**MCP** stands for *“Model Context Protocol”* and was initially developed in
    2024 by Anthropic and then open-sourced. The motivation for creating MCP was the
    fact that different LLM vendors (OpenAI, Google, Mistral, etc.) provided different
    APIs for creating external tools (connectors) for their LLMs.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**MCP**代表“模型上下文协议”，最初于2024年由Anthropic开发，然后开源。创建MCP的动机是不同LLM供应商（OpenAI、Google、Mistral等）为他们的LLM提供了不同的API来创建外部工具（连接器）。'
- en: As a result, if a developer created a connector for OpenAI, then they would
    have to perform another integration if they wanted to plug it in for Mistral and
    so on. This approach did not allow the simple reuse of connectors. That is where
    MCP stepped in.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果一个开发者为OpenAI创建了一个连接器，那么如果他们想要将其插入Mistral等，他们就必须进行另一个集成。这种方法不允许简单重用连接器。这就是MCP介入的地方。
- en: With MCP, developers can create a tool and reuse it across multiple MCP-compatible
    LLMs. It results in a much simpler workflow for developers as they no longer need
    to perform additional integrations. The same is compatible with many LLMs.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 使用MCP，开发者可以创建一个工具，并在多个MCP兼容的LLM（大型语言模型）之间重用它。这为开发者带来了更简单的流程，因为他们不再需要执行额外的集成。这与许多LLM兼容。
- en: '![](../Images/0030e2a08ebabde3eaaeb9efd66bd7c7.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0030e2a08ebabde3eaaeb9efd66bd7c7.png)'
- en: Two diagrams illustrating the developers’ workflow in the past, when there was
    no MCP (left), and after the MCP’s introduction (right). As we can see, MCP unifies
    the integration process; thus, the same tool can be connected agnostically to
    multiple vendors without additional steps.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 两个图表说明了在没有MCP（左侧）和MCP引入后（右侧）的开发者工作流程。正如我们所见，MCP统一了集成过程；因此，相同的工具可以无差别地连接到多个供应商，而无需额外步骤。
- en: '*For information, MCP uses **JSON-RPC** protocol.*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*为了信息，MCP使用**JSON-RPC**协议*。'
- en: Example
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例
- en: Step 1
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步
- en: We are going to build a very simple MCP server that will have only one tool,
    whose goal will be to greet the user. For that, we are going to use FastMCP — a
    library that allows us to build MCP servers in a Pythonic way.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将构建一个非常简单的MCP服务器，它将只有一个工具，其目标将是问候用户。为此，我们将使用FastMCP——一个允许我们以Pythonic方式构建MCP服务器的库。
- en: 'First of all, we need to setup the environment:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要设置环境：
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Add a fastmcp dependency (this will update the *pyproject.toml* file):'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 添加一个 fastmcp 依赖项（这将更新 *pyproject.toml* 文件）：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Create a main.py file and put the following code there:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个 main.py 文件并将以下代码放在那里：
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Great! Now the MCP server is complete and can even be deployed locally:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！现在 MCP 服务器已经完成，甚至可以本地部署：
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: From now on, create a GitHub repository and push the local project directory
    there.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 从现在开始，创建一个 GitHub 仓库并将本地项目目录推送到那里。
- en: Step 2
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 2 步
- en: Our MCP server is ready, but is not deployed. For deployment, we are going to
    use [**Alpic** ](https://alpic.ai)— a platform that allows us to deploy MCP servers
    in literally several clicks. For that, create an account and sign in to Alpic.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的自定义 MCP 服务器已经准备好了，但尚未部署。为了部署，我们将使用 [**Alpic**](https://alpic.ai) —— 一个允许我们在几个点击中部署
    MCP 服务器的平台。为此，创建一个账户并登录到 Alpic。
- en: In the menu, choose an option to create a new project. Alpic proposes to import
    an existing Git repository. If you connect your GitHub account to Alpic, you should
    be able to see the list of available repositories that can be used for deployment.
    Select the one corresponding to the MCP server and click “Import”.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在菜单中，选择一个选项来创建一个新的项目。Alpic 提议导入一个现有的 Git 仓库。如果你将 GitHub 账户连接到 Alpic，你应该能够看到可用于部署的可用仓库列表。选择与
    MCP 服务器对应的选项，然后点击“导入”。
- en: '![](../Images/4720a29d987a0d3d935e92af970d5486.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4720a29d987a0d3d935e92af970d5486.png)'
- en: In the following window, Alpic proposes several options to configure the environment.
    For our example, you can leave these options by default and click *“Deploy”*.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个窗口中，Alpic 提供了几个配置环境的选项。对于我们的例子，你可以保留这些选项的默认设置，然后点击 *“部署”*。
- en: '![](../Images/9a527eba4c5e794e304072905e67f44d.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9a527eba4c5e794e304072905e67f44d.png)'
- en: After that, Alpic will construct a Docker container with the imported repository.
    Depending on the complexity, deployment may take some time. If everything goes
    well, you will see the *“Deployed”* status with a green circle near it.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，Alpic 将使用导入的仓库构建一个 Docker 容器。根据复杂度，部署可能需要一些时间。如果一切顺利，你将看到带有绿色圆圈的 *“已部署”*
    状态。
- en: '![](../Images/c410d352f6feb2b897eeb322f76a8435.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c410d352f6feb2b897eeb322f76a8435.png)'
- en: Under the label *“Domain”*, there is a JSON-RPC address of the deployed server.
    Copy it for now, as we will need to connect it in the next step.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在标签 *“域”* 下，有一个已部署服务器的 JSON-RPC 地址。现在先复制它，因为我们将在下一步连接它。
- en: Step 3
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 3 步
- en: The MCP server is built. Now we need to connect it to the LLM provider so that
    we can use it in conversations. In our example, we will use Mistral, but the connection
    process should be similar for other LLM providers.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: MCP 服务器已经构建。现在我们需要将其连接到 LLM 提供商，以便我们可以在对话中使用它。在我们的例子中，我们将使用 Mistral，但对于其他 LLM
    提供商，连接过程应该是类似的。
- en: In the left menu, select the “Connectors” option, which will open a new window
    with available connectors. Connectors enable LLMs to connect to MCP servers. For
    example, if you add a GitHub connector to Mistral, then in the chat, if needed,
    LLM will be able to search code in your repositories to provide an answer to a
    given prompt.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧菜单中，选择“连接器”选项，这将打开一个新窗口，显示可用的连接器。连接器使 LLM 能够连接到 MCP 服务器。例如，如果你向 Mistral 添加
    GitHub 连接器，那么在聊天中，如果需要，LLM 将能够搜索你的仓库中的代码，以提供对给定提示的答案。
- en: In our case, we want to import a custom MCP server we have just built, so we
    click on the “Add connector” button.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，我们想要导入我们刚刚构建的自定义 MCP 服务器，因此我们点击“添加连接器”按钮。
- en: '![](../Images/f3750c8f5bc464b5ccb8a4be4ff7fa00.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f3750c8f5bc464b5ccb8a4be4ff7fa00.png)'
- en: In the modal window, navigate to “Custom MVP Connector” and fill in the necessary
    information as shown in the screenshot below. For the connector server, use the
    HTTPS address of the deployed MCP server in step 2.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在模态窗口中，导航到“自定义 MVP 连接器”并填写以下截图所示的信息。对于连接器服务器，使用第 2 步中部署的 MCP 服务器的 HTTPS 地址。
- en: 'After the connector is added, you can see it in the connectors’ menu:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在连接器添加后，你可以在连接器菜单中看到它：
- en: '![](../Images/09878216e15ecf7802cb62dc50f25555.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/09878216e15ecf7802cb62dc50f25555.png)'
- en: If you click on the MCP connector, in the *“Functions”* subwindow, you will
    see a list of implemented tools in the MCP server. In our example, we have only
    implemented a single tool *“Welcome”*, so it is the only function we see here.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你点击 MCP 连接器，在 *“函数”* 子窗口中，你将看到 MCP 服务器中实现的工具列表。在我们的例子中，我们只实现了一个工具 *“欢迎”*，因此这是我们在这里看到的唯一功能。
- en: '![](../Images/7c731c5a40c8f435fb76f25e1578f18d.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7c731c5a40c8f435fb76f25e1578f18d.png)'
- en: Step 4
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 4 步
- en: Now, return to the chat and click the *“Enable tools”* button, which allows
    you to specify the tools or MCP servers the LLM is permitted to use.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，返回聊天并点击*“启用工具”*按钮，这允许您指定LLM被允许使用的工具或MCP服务器。
- en: '![](../Images/90fb60bd37f5320b56b3198adeb5119c.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/90fb60bd37f5320b56b3198adeb5119c.png)'
- en: Click on the checkbox corresponding to our connector.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 点击对应于我们连接器的复选框。
- en: '![](../Images/5d9cc266b1314b64b9a0bc90675c22c3.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5d9cc266b1314b64b9a0bc90675c22c3.png)'
- en: Now it is time to test the connector. We can ask the LLM to use the “Welcome”
    tool to greet the user. In Mistral chat, if the LLM recognizes that it needs to
    use an external tool, a modal window appears, displaying the tool name (*“Welcome”*)
    and the arguments it will take (*name = “Francisco”*).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候测试连接器了。我们可以要求LLM使用“欢迎”工具来问候用户。在Mistral聊天中，如果LLM意识到它需要使用外部工具，将出现一个模态窗口，显示工具名称（*“欢迎”*）和它将接受的参数（*name
    = “Francisco”*）。
- en: '![](../Images/a009bf7bb4756debd102048b32023182.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a009bf7bb4756debd102048b32023182.png)'
- en: 'To confirm the choice, click on *“Continue”*. In that case, we will get a response:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确认选择，请点击*“继续”*。在这种情况下，我们将得到一个响应：
- en: '![](../Images/64b457cf5a40043d91bfc50928a36d6a.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/64b457cf5a40043d91bfc50928a36d6a.png)'
- en: Excellent! Our MCP server is working correctly. Similarly, we can create more
    complex tools.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 太棒了！我们的MCP服务器正在正常运行。同样，我们可以创建更复杂的工具。
- en: Conclusion
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we introduce MCP as an efficient mechanism for creating connectors
    with LLM vendors. Its simplicity and reusability have made MCP very popular nowadays,
    allowing developers to reduce the time required to implement LLM plugins.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们介绍MCP作为一种高效机制，用于与LLM供应商创建连接器。其简洁性和可重用性使得MCP在当今非常受欢迎，允许开发者减少实现LLM插件所需的时间。
- en: Furthermore, we have examined a simple example that demonstrates how to create
    an MCP server. In reality, nothing prevents developers from building more advanced
    MCP applications and leveraging additional functionality from LLM providers.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们检查了一个简单的示例，展示了如何创建MCP服务器。实际上，没有任何东西阻止开发者构建更高级的MCP应用程序并利用LLM提供商的附加功能。
- en: For example, in the case of Mistral, MCP servers can utilize the functionality
    of Libraries and Documents, allowing tools to take as input not only text prompts
    but also uploaded files. These results can be saved in the chat and made persistent
    across different conversations.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在Mistral的情况下，MCP服务器可以利用库和文档的功能，使工具不仅可以接受文本提示作为输入，还可以接受上传的文件。这些结果可以保存在聊天中，并在不同的对话中保持持久性。
