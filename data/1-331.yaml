- en: Useful Python Libraries You Might Not Have Heard Of:  Freezegun
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你可能没听过的有用Python库：Freezegun
- en: 原文：[https://towardsdatascience.com/useful-python-libraries-you-might-not-have-heard-of-freezegun/](https://towardsdatascience.com/useful-python-libraries-you-might-not-have-heard-of-freezegun/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/useful-python-libraries-you-might-not-have-heard-of-freezegun/](https://towardsdatascience.com/useful-python-libraries-you-might-not-have-heard-of-freezegun/)
- en: <mdspan datatext="el1756945676472" class="mdspan-comment">I think we can all
    agree</mdspan> that testing our code is a crucial and essential part of the software
    development life cycle. This is perhaps even more important when we’re discussing
    AI and ML systems, where an inherent uncertainty and hallucinatory element are
    potentially already baked in from the outset.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756945676472" class="mdspan-comment">我认为我们都可以同意</mdspan>，测试我们的代码是软件开发生命周期中一个关键且必要的部分。当我们讨论AI和ML系统时，这可能更为重要，因为固有的不确定性和幻觉元素可能从一开始就已经嵌入。
- en: And within that general testing framework, testing code that behaves differently
    based on the current date or time can be a real headache. How do you reliably
    check logic that triggers only at midnight, calculates relative dates (“2 hours
    ago”), or handles tricky situations like leap years or month-ends? Manually mocking
    Python’s datetime module can be cumbersome and error-prone.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个通用测试框架内，测试基于当前日期或时间表现不同的代码可能真的让人头疼。你如何可靠地检查仅在午夜触发的逻辑、计算相对日期（“2小时前”）或处理像闰年或月末这样的棘手情况？手动模拟Python的datetime模块可能会很繁琐且容易出错。
- en: If you’ve ever wrestled with this, you’re not alone. But what if you could simply
    … stop time? Or even travel through it within your tests?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经为此而挣扎过，你并不孤单。但如果你能简单地……停止时间？或者甚至在你测试中穿越时间呢？
- en: That’s precisely what the Freezegun library lets you do. It’s an elegant solution
    to a common testing problem, yet many experienced Python developers have never
    heard of it.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是Freezegun库让你做到的。它是对一个常见测试问题的优雅解决方案，但许多经验丰富的Python开发者从未听说过它。
- en: '**Freezegun** allows your Python tests to simulate specific moments in time
    by mocking the datetime, date, time, and pendulum Python modules. It’s simple
    to use but powerful for creating deterministic and reliable tests for time-sensitive
    code.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**Freezegun** 允许你的Python测试通过模拟datetime、date、time和pendulum Python模块来模拟特定的时间点。它使用简单但功能强大，可以创建针对时间敏感代码的确定性和可靠的测试。'
- en: Why is Freezegun so helpful?
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么Freezegun如此有用？
- en: '**Determinism.** This is Freezegun’s primary benefit. Tests involving time
    become entirely predictable. Running datetime.now() inside a frozen block returns
    the same frozen timestamp, eliminating flaky tests caused by millisecond differences
    or date rollovers during test execution.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确定性**。这是Freezegun的主要优势。涉及时间的测试变得完全可预测。在冻结块内运行datetime.now()返回相同的冻结时间戳，消除了由于测试执行期间毫秒差异或日期回滚而导致的不可靠测试。'
- en: '**Simplicity.** Compared to manually patching **datetime.now** or using **unittest.mock**,
    Freezegun is often much cleaner and requires less boilerplate code, especially
    when temporarily changing the time.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**简单性**。与手动修补 **datetime.now** 或使用 **unittest.mock** 相比，Freezegun 通常更干净，且需要的样板代码更少，尤其是在临时更改时间时。'
- en: '**Time Travel.** Easily simulate specific dates and times — past, present,
    or future. This is crucial for testing edge cases, such as year-end processing,
    leap seconds, daylight saving time transitions, or simply verifying logic tied
    to specific events.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**时间旅行**。轻松模拟特定日期和时间——过去、现在或未来。这对于测试边缘情况至关重要，例如年终处理、闰秒、夏令时转换，或者简单地验证与特定事件相关的逻辑。'
- en: '**Relative Time Testing.** Test functions that calculate relative times (e.g.,
    “expires in 3 days”) by freezing time and creating timestamps relative to that
    frozen moment.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**相对时间测试**。通过冻结时间并创建相对于该冻结时刻的时间戳来测试计算相对时间的函数（例如，“3天后到期”）。'
- en: '**Tick Tock.** Freezegun allows time to advance (“tick”) from the frozen moment
    within a test, which is perfect for testing timeouts, durations, or sequences
    of time-dependent events.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**滴答声**。Freezegun 允许时间在测试中从冻结的瞬间前进（“滴答”），这对于测试超时、持续时间或时间依赖事件的序列来说非常完美。'
- en: Hopefully, I’ve convinced you that Freezegun could be a valuable addition to
    your Python toolbox. Let’s see it in action by looking through some sample code
    snippets.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我已经说服你，Freezegun 可以成为你的Python工具箱中的一个宝贵补充。让我们通过查看一些示例代码片段来实际看看它的作用。
