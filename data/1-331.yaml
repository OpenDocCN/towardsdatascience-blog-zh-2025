- en: Summary
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Freezegun is a fantastic tool for any Python developer who needs to test code
    involving dates and times. It transforms potentially flaky, hard-to-write tests
    into simple, robust, and deterministic ones. By allowing you to freeze, tick,
    and travel through time with ease — and by making it clear when time *isn’t* controlled — it
    unlocks the ability to effectively and reliably test previously challenging scenarios.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Freezegun是任何需要测试涉及日期和时间的Python开发者的绝佳工具。它将可能不稳定的、难以编写的测试转换为简单、健壮和确定的测试。通过允许你轻松地冻结、滴答和穿越时间，并且清楚地表明时间*没有被控制*，它解锁了有效地和可靠地测试以前具有挑战性的场景的能力。
- en: To illustrate this, I provided several examples covering different instances
    involving date and time testing and showed how using Freezegun eliminates many
    of the obstacles that a traditional testing framework might encounter.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这一点，我提供了几个涵盖不同实例的例子，这些实例涉及日期和时间测试，并展示了如何使用Freezegun消除传统测试框架可能遇到的许多障碍。
- en: While we’ve covered the core functionalities, you can do more with Freezegun,
    and I recommend checking out its [GitHub page](https://github.com/spulec/freezegun).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们已经涵盖了核心功能，但你还可以用Freezegun做更多的事情，我建议查看其[GitHub页面](https://github.com/spulec/freezegun)。
- en: In short, Freezegun is a library you should know and use if your code deals
    with time and you need to test it thoroughly and reliably.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，Freezegun 是一个你应该了解并使用的库，如果你的代码处理时间并且需要彻底且可靠地进行测试。
