- en: Conclusions
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The release of o1 introduced a new dimension by which LLMs can be improved: **test-time
    compute**. Although OpenAI did not release its secret sauce for doing this, 5
    months later, DeepSeek was able to replicate this reasoning behavior and publish
    the technical details of its approach.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: o1的发布引入了一个新的维度，通过这个维度可以改进LLM：**测试时计算**。尽管OpenAI没有发布其秘密配方，但5个月后，DeepSeek能够复制这种推理行为并发布其方法的技术细节。
- en: While current reasoning models have limitations, this is a promising research
    direction because it has demonstrated that reinforcement learning (without humans)
    can **produce models that learn independently**. This (potentially) breaks the
    implicit limitations of current models, which can only *recall *and* remix* information
    previously seen on the internet (i.e., existing human knowledge).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然当前的推理模型存在局限性，但这是一个有希望的研究方向，因为它已经证明，强化学习（无需人类）可以**产生独立学习的模型**。这（可能）打破了当前模型的隐含局限性，这些模型只能**回忆**和**混搭**之前在互联网上看到的信息（即现有的人类知识）。
- en: The promise of this new RL approach is that models can surpass human understanding
    (on their own), leading to new scientific and technological breakthroughs that
    might take us decades to discover (on our own).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这种新的强化学习方法的承诺是，模型可以超越人类理解（独立地），导致可能需要我们花费数十年时间才能发现（独立地）的新科学和技术突破。
