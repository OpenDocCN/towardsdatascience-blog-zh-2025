  type: TYPE_NORMAL
  zh: '[Together](https://www.together.ai/) (DeepSeek-V3, DeepSeek-R1, 和蒸馏版本)'
- en: '[Hyperbolic](https://hyperbolic.xyz/) (DeepSeek-V3, DeepSeek-R1-Zero, and DeepSeek-R1)'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Hyperbolic](https://hyperbolic.xyz/) (DeepSeek-V3, DeepSeek-R1-Zero, 和 DeepSeek-R1)'
