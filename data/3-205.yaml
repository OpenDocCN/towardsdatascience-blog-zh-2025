- en: How to Train LLMs to “Think” (o1 & DeepSeek-R1)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何训练LLMs“思考”（o1 & DeepSeek-R1）
- en: 原文：[https://towardsdatascience.com/how-to-train-llms-to-think-o1-deepseek-r1/](https://towardsdatascience.com/how-to-train-llms-to-think-o1-deepseek-r1/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-train-llms-to-think-o1-deepseek-r1/](https://towardsdatascience.com/how-to-train-llms-to-think-o1-deepseek-r1/)
- en: In September 2024, OpenAI released its o1 model, trained on large-scale reinforcement
    learning, giving it “advanced reasoning” capabilities. Unfortunately, the details
    of how they pulled this off were never shared publicly. Today, however, DeepSeek
    (an AI research lab) has replicated this reasoning behavior and published the
    full technical details of their approach. In this article, I will discuss the
    key ideas behind this innovation and describe how they work under the hood.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年9月，OpenAI发布了其o1模型，该模型在大规模强化学习上进行训练，赋予其“高级推理”能力。不幸的是，他们如何实现这一点的细节从未公开分享。然而，今天，DeepSeek（一个AI研究实验室）已经复制了这种推理行为，并发布了他们方法的全套技术细节。在这篇文章中，我将讨论这一创新背后的关键思想，并描述它们在底层是如何工作的。
- en: OpenAI’s o1 model marked a new paradigm for training large language models (LLMs).
    It introduced so-called **“thinking” tokens**, which enable a sort of **scratch
    pad that the model can use to think** **through problems** and user queries.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的o1模型为大型语言模型（LLMs）的训练开辟了新的范式。它引入了所谓的**“思考”tokens**，这使模型能够使用一种**草稿本**来思考问题和使用者的查询。
- en: The major insight from o1 was performance improved with increased **test-time
    compute**. This is just a fancy way of saying that **the more tokens a model generates,
    the better its response**. The figure below, reproduced from OpenAI’s blog, captures
    this point nicely.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: o1的主要洞察是性能随着**测试时间计算**的增加而提高。这仅仅是一种说法，即**模型生成的tokens越多，其响应越好**。下面的图表，摘自OpenAI的博客，很好地捕捉了这一点。
- en: '![Graphs displaying AIME accuracy scaling with train-time and test-time compute.](../Images/9c3779825d505296b62f01006fe4e2a4.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![显示AIME准确率随训练时间和测试时间计算缩放的图表](../Images/9c3779825d505296b62f01006fe4e2a4.png)'
- en: AIME accuracy scaling with train-time and test-time compute, respectively. Plots
    reillustrated from [1].
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: AIME准确率随训练时间和测试时间计算缩放，分别。图表重绘自[1]。
- en: In the plots above, the y-axes are model performance on AIME (math problems),
    while the x-axes are various compute times. The left plot depicts the well-known
    neural scaling laws that kicked off the LLM rush of 2023\. In other words, the **longer
    a model is *trained* (i.e. train-time compute)**, the **better its performance**.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的图表中，y轴表示AIME（数学问题）的模型性能，而x轴是各种计算时间。左边的图表描绘了启动2023年LLM热潮的著名神经缩放定律。换句话说，**模型训练时间（即训练时间计算）越长**，其**性能越好**。
- en: On the right, however, we see a new type of scaling law. Here, **the more *tokens* a
    model generates** **(i.e. test-time compute)**, **the better its performance**.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在右边，我们看到一种新的缩放定律。在这里，**模型生成的** **tokens（即测试时间计算）越多**，其**性能越好**。
- en: “Thinking” tokens
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: “思考”tokens
- en: A key feature of o1 is its so-called **“thinking” tokens**. These are **special
    tokens introduced during post-training, which delimit the model’s chain of thought
    (CoT)** reasoning (i.e., thinking through the problem). These special tokens are
    important for two reasons.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: o1的一个关键特性是其所谓的**“思考”tokens**。这些是在**训练后引入的特殊tokens**，它们界定模型的思维链（CoT）推理（即思考问题）。这些特殊tokens有两个重要原因。
- en: '**One**, they clearly demarcate where the model’s “thinking” starts and stops
    so it can be easily parsed when spinning up a UI. **And two**, it produces a human-interpretable
    readout of how the model “thinks” through the problem.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一**，他们清楚地界定了模型的“思考”开始和结束的位置，以便在启动UI时可以轻松解析。**第二**，它产生了对模型如何“思考”问题的可解释读数。'
- en: Although OpenAI disclosed that they used reinforcement learning to produce this
    ability, the exact details of *how* they did it were not shared. Today, however,
    we have a pretty good idea thanks to a recent publication from DeepSeek.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管OpenAI披露他们使用了强化学习来产生这种能力，但他们如何做到的详细细节并未公开。然而，今天，我们通过DeepSeek最近的一篇论文有了相当好的了解。
- en: DeepSeek’s paper
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DeepSeek的论文
- en: 'In January 2025, DeepSeek published “*DeepSeek-R1: Incentivizing Reasoning
    Capability in LLMs via Reinforcement Learning*” [2]**.** While this paper caused
    its fair share of pandemonium, its central contribution was **unveiling the secrets
    behind o1**.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 2025年1月，DeepSeek发表了“*DeepSeek-R1：通过强化学习激励LLMs的推理能力*” [2]****。虽然这篇论文引起了不少骚动，但其主要贡献是**揭示了o1背后的秘密**。
- en: It introduces two models: **DeepSeek-R1-Zero** and **DeepSeek-R1**. The former
    was trained exclusively on reinforcement learning (RL), and the latter was a mixture
    of Supervised Fine-tuning (SFT) and RL.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 它引入了两个模型：**DeepSeek-R1-Zero**和**DeepSeek-R1**。前者完全通过强化学习（RL）进行训练，而后者是监督微调（SFT）和RL的混合。
- en: Although the headlines (and title of the paper) were about DeepSeek-R1, the
    former model is important because, one, it generated training data for R1, and
    two, it demonstrates striking emergent reasoning **abilities that were not taught
    to the model**.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管标题（和论文标题）是关于DeepSeek-R1的，但前一个模型很重要，因为它首先为R1生成了训练数据，其次，它展示了模型未被教授的显著涌现推理**能力**。
- en: In other words, **R1-Zero *discovers* CoT and test-time compute scaling through
    RL alone!** Let’s discuss how it works.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，**R1-Zero仅通过强化学习（RL）就**发现了CoT和测试时计算缩放！让我们讨论它是如何工作的。
- en: DeepSeek-R1-Zero (RL only)
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DeepSeek-R1-Zero（仅限RL）
- en: '**Reinforcement learning (RL)** is a machine learning approach in which, rather
    than training models on explicit examples, **models learn through trial and error** [3].
    It works by passing a reward signal to a model that has no explicit functional
    relationship with the model’s parameters.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**强化学习（RL）**是一种机器学习方法，在这种方法中，不是在显式示例上训练模型，**模型通过试错学习**[3]。它通过向一个与模型参数没有明确功能关系的模型传递奖励信号来工作。'
- en: This is similar to how we often learn in the real world. For example, if I apply
    for a job and don’t get a response, I have to figure out what I did wrong and
    how to improve. This is in contrast to supervised learning, which, in this analogy,
    would be like the recruiter giving me specific feedback on what I did wrong and
    how to improve.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我们在现实世界中通常的学习方式相似。例如，如果我申请一份工作而没有得到回应，我就必须找出我哪里做错了以及如何改进。这与监督学习形成对比，在这个类比中，招聘人员会给我具体的反馈，告诉我哪里做错了以及如何改进。
- en: 'While using RL to train R1-Zero consists of many technical details, I want
    to highlight 3 key ones: the **prompt template**, **reward signal**, and **GRPO** (Group
    Relative Policy Optimization).'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然使用RL训练R1-Zero包含许多技术细节，但我想要强调三个关键点：**提示模板**、**奖励信号**和**GRPO**（组相对策略优化）。
- en: 1) Prompt template
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 提示模板
- en: The **template** used for training is given below, where `{prompt}` is replaced
    with a question from a dataset of (presumably) complex math, coding, and logic
    problems. Notice the inclusion of `<answer>` and `<think>` tags via simple prompting.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 用于训练的**模板**如下所示，其中`{prompt}`被来自（可能）复杂数学、编码和逻辑问题数据集的问题所替换。注意通过简单的提示包含了`<answer>`和`<think>`标签。
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Something that stands out here is the minimal and relaxed prompting strategy.
    This was an intentional choice by DeepSeek to **avoid biasing model responses** and
    to **observe its natural evolution during RL**.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这里引人注目的是最小化和宽松的提示策略。这是DeepSeek有意选择的做法，以**避免对模型响应产生偏差**，并**观察其在RL过程中的自然演变**。
- en: 2) Reward signal
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 奖励信号
- en: The RL **reward** has **two components**: **accuracy and format rewards**. Since
    the training dataset consists of questions with clear right answers, a simple
    rule-based strategy is used to evaluate response accuracy. Similarly, a rule-based
    formatting reward is used to ensure reasoning tokens are generated in between
    the thinking tags.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: RL的**奖励**有两个组成部分：**准确性和格式奖励**。由于训练数据集由具有明确正确答案的问题组成，因此使用简单的基于规则的策略来评估响应准确性。同样，使用基于规则的格式奖励来确保推理标记在思考标签之间生成。
- en: It’s noted by the authors that a neural reward model isn’t used (i.e. rewards
    are not computed by a neural net), because these may be prone to **reward hacking**.
    In other words, the **LLM learns how to *trick* the reward model into maximizing
    rewards** while decreasing downstream performance.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 作者指出，没有使用神经奖励模型（即奖励不是由神经网络计算），因为这些可能容易受到**奖励黑客攻击**。换句话说，**LLM学习如何通过欺骗奖励模型来最大化奖励**，同时降低下游性能。
- en: This is just like how humans find ways to exploit any incentive structure to
    maximize their personal gains while forsaking the original intent of the incentives.
    This highlights the difficulty of producing good rewards (whether for humans or
    computers).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像人类找到利用任何激励结构以最大化个人收益的方法，同时放弃激励的原始意图。这突出了产生良好奖励（无论是针对人类还是计算机）的难度。
- en: 3) GRPO (Group Relative Policy Optimization)
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) GRPO（组相对策略优化）
- en: The final detail is how rewards are translated into model parameter updates.
    This section is quite technical, so the enlightened reader can feel free to skip
    ahead.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的细节是如何将奖励转换为模型参数更新。这一部分相当技术性，所以有启发的读者可以自由跳过。
- en: '**GRPO** is an **RL approach that combines a collection of responses to update
    model parameters**. To encourage stable training, the authors also incorporate
    clipping and KL-divergence regularization terms into the loss function. Clipping
    ensures optimization steps are not too big, and regularization ensures the model
    predictions do not change too abruptly.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**GRPO**是一种**RL方法，它结合了一系列响应来更新模型参数**。为了鼓励稳定的训练，作者们还将剪裁和KL-散度正则化项纳入损失函数。剪裁确保优化步骤不会太大，而正则化确保模型预测不会过于突然地改变。'
- en: Here is the complete loss function with some (hopefully) helpful annotations.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是完整的损失函数，附带一些（希望）有帮助的注释。
- en: '![Annotated GRPO loss function](../Images/1e7e2c1a499c35323ea2b245fcad17c6.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![标注的GRPO损失函数](../Images/1e7e2c1a499c35323ea2b245fcad17c6.png)'
- en: Annotated GRPO loss function. Image by author.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 标注的GRPO损失函数。图由作者提供。
- en: Results (emergent abilities)
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果（涌现能力）
- en: The most striking result of R1-Zero is that, despite its minimal guidance, it
    develops effective reasoning strategies that we might recognize.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: R1-Zero最显著的结果是，尽管其指导最少，但它发展出了我们可能识别的有效推理策略。
- en: For example, it learns **implicitly through the RL to improve responses through
    test-time compute** (recall the earlier insight from o1). This is depicted via
    the plot below from the R1 paper [2].
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，它通过RL隐式地学习在测试时通过计算来改进响应（回想一下之前从o1中得到的洞察）。这通过R1论文 [2]中的以下图表来展示。
- en: '![Graph demonstrating that average DeepSeek-R1-Zero response length increases
    with additional training](../Images/8b5ad1f2d701060a216b907c5f32b5c6.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![展示平均DeepSeek-R1-Zero响应长度随额外训练增加的图表](../Images/8b5ad1f2d701060a216b907c5f32b5c6.png)'
- en: Average response length increases with additional training (and improved performance).
    Screenshot from DeepSeek R1 paper [2].
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 平均响应长度随着额外训练（和改进的性能）的增加而增加。来自DeepSeek R1论文 [2]的截图。
- en: Another notable ability is reflecting on past responses with an uncanny human-like
    internal monologue. Here is an example from R1-Zero. Notice the **long CoT and
    additional verification step** before generating the final answer (I omitted some
    parts because the response was very long).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个值得注意的能力是反思过去的响应，具有类似人类内部独白的特点。以下是一个来自R1-Zero的示例。注意在生成最终答案之前的长CoT和额外的验证步骤（我省略了一些部分，因为响应非常长）。
- en: '[PRE1]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Problems with R1-Zero
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: R1-Zero的问题
- en: Although the thinking tokens from R1-Zero give a human-readable window into
    the model’s “thought process,” the authors report some issues. Namely, the learned
    CoT sometimes suffers from **readability issues and language mixing**. Suggesting
    (perhaps) that its reasoning begins to veer away from something easily interpretable
    by humans.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然R1-Zero的思维标记为人类提供了阅读模型“思维过程”的窗口，但作者们报告了一些问题。具体来说，学到的CoT有时会遭受**可读性问题**和**语言混合**。这（或许）表明其推理开始偏离人类容易理解的东西。
- en: DeepSeek-R1 (SFT + RL)
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DeepSeek-R1（SFT + RL）
- en: To mitigate R1-Zero’s interpretability issues, the authors explore a multi-step
    training strategy that **utilizes both supervised fine-tuning (SFT) and RL**.
    This strategy results in **DeepSeek-R1**, a better-performing model that is getting
    more attention today. The entire training process can be broken down into 4 steps.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减轻R1-Zero的可解释性问题，作者们探索了一种多步训练策略，该策略**利用了监督微调（SFT）和RL**。这种策略导致了**DeepSeek-R1**，一个表现更好的模型，今天受到了越来越多的关注。整个训练过程可以分为4个步骤。
- en: 'Step 1: SFT with reasoning data'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一步：使用推理数据进行SFT
- en: To help get the model on the right track when it comes to learning how to reason,
    the authors start with SFT. This **leverages 1000s of long CoT examples** from
    various sources, including few-shot prompting (i.e., showing examples of how to
    think through problems), directly prompting the model to use reflection and verification,
    and refining synthetic data from R1-Zero [2].
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助模型在学习如何推理时走上正确的轨道，作者们从SFT开始。这**利用了来自各种来源的数千个长CoT示例**，包括少样本提示（即展示如何通过问题进行思考的示例）、直接提示模型使用反思和验证，以及从R1-Zero
    [2]中精炼合成数据。
- en: The **two key advantages** of this are, **one**, the desired response format
    can be explicitly shown to the model, and **two**, seeing curated reasoning examples
    unlocks better performance for the final model.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这**两个关键优势**是，**一是**，期望的响应格式可以明确地展示给模型，**二是**，看到精心挑选的推理示例可以解锁最终模型的更好性能。
- en: 'Step 2: R1-Zero style RL (+ language consistency reward)'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤2：R1-Zero风格的RL（+语言一致性奖励）
- en: Next, an RL training step is applied to the model after SFT. This is done in
    an **identical way as R1-Zero with an added component** to the reward signal that
    incentivizes language consistently. This was added to the reward because R1-Zero
    tended to mix languages, making it difficult to read its generations.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在SFT之后对模型应用一个RL训练步骤。这是以与R1-Zero相同的方式进行的，但奖励信号中增加了一个组件，以激励语言的一致性。这是因为R1-Zero倾向于混合语言，使其生成的内容难以阅读。
- en: 'Step 3: SFT with mixed data'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤3：混合数据的SFT
- en: At this point, the model likely has on par (or better) performance than R1-Zero
    on reasoning tasks. However, this intermediate model wouldn’t be very practical
    because it wants to reason about any input it receives (e.g., “hi there”), which
    is unnecessary for factual Q&A, translation, and creative writing. That’s why
    another SFT round is performed with both **reasoning (600k examples)** and **non-reasoning
    (200k examples)** data.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，该模型在推理任务上的性能可能与R1-Zero相当（甚至更好）。然而，这个中间模型不太实用，因为它想要对收到的任何输入进行推理（例如，“嗨，你好”），这对于事实问答、翻译和创意写作来说是不必要的。这就是为什么还要进行另一轮SFT，使用**推理（600k个示例）**和**非推理（200k个示例）**数据。
- en: The **reasoning data** here is generated from the resulting model from Step
    2\. Additionally, examples are included which use an LLM judge to compare model
    predictions to ground truth answers.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的**推理数据**是从步骤2的结果模型生成的。此外，还包括使用LLM评判员比较模型预测与真实答案的示例。
- en: The **non-reasoning data** comes from two places. First, the SFT dataset used
    to train DeepSeek-V3 (the base model). Second, synthetic data generated by DeepSeek-V3\.
    Note that examples are included that do not use CoT so that the model doesn’t
    use thinking tokens for every response.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**非推理数据**来自两个地方。首先，用于训练DeepSeek-V3（基础模型）的SFT数据集。其次，由DeepSeek-V3生成的合成数据。请注意，包括了一些不使用CoT的示例，这样模型就不会在每次响应中使用思考标记。'
- en: 'Step 4: RL + RLHF'
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤4：RL + RLHF
- en: Finally, another RL round is done, which includes (again) R1-Zero style reasoning
    training and RL on human feedback. This latter component helps **improve the model’s
    helpfulness and harmlessness**.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，又进行了一轮RL，包括（再次）R1-Zero风格的推理训练和基于人类反馈的RL。这个后者的组件有助于**提高模型的有用性和无害性**。
- en: The result of this entire pipeline is DeepSeek-R1, which excels at reasoning
    tasks and is an AI assistant you can chat with normally.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 整个流程的结果是DeepSeek-R1，它在推理任务上表现出色，是一个你可以正常聊天的AI助手。
- en: Accessing R1-Zero and R1
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 访问R1-Zero和R1
- en: Another key contribution from DeepSeek is that the weights of the two models
    described above (and many other distilled versions of R1) were made publicly available.
    This means there are many ways to access these models, whether using an **inference
    provider or running them locally**.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的另一个关键贡献是，上述两个模型（以及许多其他R1的蒸馏版本）的权重被公开发布。这意味着可以通过多种方式访问这些模型，无论是使用推理提供者还是本地运行。
- en: Here are a few places that I’ve seen these models.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我看到这些模型的一些地方。
