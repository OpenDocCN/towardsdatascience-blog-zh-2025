- en: LangGraph in the Spotlight
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangGraph备受关注
- en: 'While not exactly new, several authors have found fresh use cases for LangGraph,
    an open-source tool that enables multi-agent systems using graph-based architectures.
    Two such articles became instant hits in the past month:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然LangGraph这个开源工具并不是全新的，但几位作者找到了新的用例，这个工具允许使用基于图架构的多智能体系统。在过去的一个月里，两篇文章立刻成为了热门：
- en: 'LangGraph 101: Let’s Build A Deep Research Agent, by Shuai Guo'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LangGraph 101：让我们构建一个深度研究代理，作者：Shuai Guo
