- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的每一期新版本，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: Welcome to our final monthly recap of the summer! From [agentic AI](https://towardsdatascience.com/tag/agentic-ai/) workflows
    to cutting-edge tools, our community ignored the heat and remained as focused
    as ever on practical data and machine learning solutions that help teams and practitioners
    excel.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到我们夏季的最后一期月度总结！从[代理AI](https://towardsdatascience.com/tag/agentic-ai/)工作流到尖端工具，我们的社区忽略了炎热，一如既往地专注于实用的数据和机器学习解决方案，帮助团队和从业者脱颖而出。
- en: As for our authors, they responded with top-notch articles that cut through
    the noise—whether it’s LLM hype or the nearest beach party—and unpacked complex
    topics into accessible and actionable reads. Let’s explore August’s most popular
    stories.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 关于我们的作者，他们以高质量的稿件回应，这些稿件能够穿透噪音——无论是LLM的炒作还是最近的沙滩派对——并将复杂主题分解成易于理解和可操作的阅读材料。让我们来探索八月份最受欢迎的故事。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How We Reduced LLM Costs by 90% with 5 Lines of Code
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何用5行代码将LLM成本降低90%
- en: '[Uri Peled](https://towardsdatascience.com/author/uri-peled/)‘s first TDS article
    made waves as soon as it came out — which is hardly a surprise when an article
    is engaging, clear, *and* might just help your company spend less on LLMs. The
    takeaway is essential: “small, overlooked design decisions, sometimes just a few
    lines of code, can lead to massive inefficiencies.”'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '[Uri Peled](https://towardsdatascience.com/author/uri-peled/) 的第一篇TDS文章一经发布就引起了轰动——当一篇文章引人入胜、清晰，并且可能帮助你的公司在LLM上节省开支时，这几乎不足为奇。关键点是：
    “一些小而容易被忽视的设计决策，有时只是几行代码，可能导致巨大的低效。”'
- en: '[How We Reduced LLM Costs by 90% with 5 Lines of Code](https://towardsdatascience.com/how-we-reduced-llm-cost-by-90-with-5-lines-of-code/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何用5行代码将LLM成本降低90%](https://towardsdatascience.com/how-we-reduced-llm-cost-by-90-with-5-lines-of-code/)'
