- en: Audio Spectrogram Transformers Beyond the Lab
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超出实验室的音频频谱变换器
- en: 原文：[https://towardsdatascience.com/audio-spectrogram-transformers-beyond-the-lab/](https://towardsdatascience.com/audio-spectrogram-transformers-beyond-the-lab/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/audio-spectrogram-transformers-beyond-the-lab/)'
- en: <mdspan datatext="el1749599095175" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749599095175" class="mdspan-comment">简介</mdspan>
- en: Want to know what draws me to soundscape analysis?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 想知道是什么吸引我进行声音景观分析？
- en: It’s a field that combines science, creativity, and exploration in a way few
    others do. First of all, **your laboratory is wherever your feet take you **—
    a forest trail, a city park, or a remote mountain path can all become spaces for
    scientific discovery and acoustic investigation. Secondly,** monitoring a chosen
    geographic area is all about creativity.** Innovation is at the heart of environmental
    audio research, whether it’s rigging up a custom device, hiding sensors in tree
    canopies, or using solar power for off-grid setups. Finally, **the sheer volume
    of data is truly incredible, **and as we know, in spatial analysis, all methods
    are fair game**.** From hours of animal calls to the subtle hum of urban machinery,
    the acoustic data collected can be vast and complex, and that opens the door to
    using everything from deep learning to geographical information systems (GIS)
    in making sense of it all.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个将科学、创造力和探索结合在一起，而其他领域很少做到的领域。首先，**你的实验室就是你的脚步所到之处**——森林小径、城市公园或偏远山间小路都可以成为科学发现和声学调查的空间。其次，**监测选定的地理区域完全是关于创造力的**。创新是环境音频研究的核心，无论是搭建定制设备、在树冠中隐藏传感器，还是使用太阳能进行离网设置。最后，**数据的量确实令人难以置信**，正如我们所知，在空间分析中，所有方法都是公平竞争的**。**从动物的叫声到城市机械的微妙嗡嗡声，收集到的声学数据可以非常庞大和复杂，这为使用从深度学习到地理信息系统（GIS）来理解所有这些数据打开了大门。
- en: After my earlier adventures with [soundscape analysis of one of Poland’s rivers](https://medium.com/@maciej.adamiak/soundscapes-unveiled-6e2525391aa0),
    I decided to raise the bar and design and implement a solution capable of analysing
    soundscapes in **real time**. In this blog post, you’ll find a description of
    the proposed method, along with some code that powers the entire process, mainly
    using an [Audio Spectrogram Transformer](https://arxiv.org/abs/2104.01778) (AST)
    for sound classification.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前对波兰某条河流的[声音景观分析](https://medium.com/@maciej.adamiak/soundscapes-unveiled-6e2525391aa0)的冒险之后，我决定提高标准，设计和实施一个能够实时分析声音景观的解决方案。在这篇博客文章中，您将找到所提出的方法描述，以及一些推动整个过程的代码，主要使用[音频频谱变换器](https://arxiv.org/abs/2104.01778)（AST）进行声音分类。
- en: '![Device prototype](../Images/b86be5444e5e24eb975f2df1e7edf678.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![设备原型](../Images/b86be5444e5e24eb975f2df1e7edf678.png)'
- en: Outdoor/Urban version of the sensor prototype (image by author)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 传感器原型的户外/城市版本（图片由作者提供）
- en: Methods
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 方法
- en: Setup
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置
- en: There are many reasons why, in this particular case, I chose to use a combination
    of [Raspberry Pi](https://www.raspberrypi.com/) 4 and AudioMoth. Believe me, I
    tested a wide range of devices — from less power-hungry models of the [Raspberry
    Pi](https://www.raspberrypi.com/products/raspberry-pi-zero-2-w/) family, through
    various Arduino versions, including the [Portenta](https://docs.arduino.cc/hardware/portenta-h7/),
    all the way to the [Jetson Nano](https://developer.nvidia.com/embedded/jetson-nano). And
    that was just the beginning. Choosing the right microphone turned out to be even
    more complicated.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定情况下，我选择使用Raspberry Pi 4和AudioMoth的组合有许多原因。相信我，我测试了各种设备——从Raspberry Pi家族中更节能的型号，经过各种Arduino版本，包括[Portenta](https://docs.arduino.cc/hardware/portenta-h7/)，一直到[Jetson
    Nano](https://developer.nvidia.com/embedded/jetson-nano)。这只是开始。选择正确的麦克风证明更加复杂。
- en: Ultimately, I went with the **Pi 4 B (4GB RAM)** because of its solid performance
    and relatively low power consumption (~**700mAh** when running my code). Additionally,
    pairing it with the AudioMoth in USB microphone mode gave me a lot of flexibility
    during prototyping. [AudioMoth](https://www.openacousticdevices.info/audiomoth) is
    a powerful device with a wealth of configuration options, e.g. sampling rate from
    8 kHz to stunning 384 kHz. I have a strong feeling that — in the long run — this
    will prove to be a perfect choice for my soundscape studies.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我选择了 **Pi 4 B (4GB RAM**)，因为它性能稳定且功耗相对较低（运行我的代码时约为 ~**700mAh**）。此外，将其与 AudioMoth
    以 USB 麦克风模式配对，在原型设计阶段给了我很大的灵活性。[AudioMoth](https://www.openacousticdevices.info/audiomoth)
    是一款功能强大的设备，拥有丰富的配置选项，例如采样率从 8 kHz 到惊人的 384 kHz。我坚信——从长远来看——这将证明是我声音景观研究的一个完美选择。
- en: '![](../Images/eac5c736b0c9f0c7013d383c0b3eaa83.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eac5c736b0c9f0c7013d383c0b3eaa83.png)'
- en: AudioMoth USB Microphone configuration app. Remember about flashing the device
    with the proper firmware before configuring.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: AudioMoth USB 麦克风配置应用程序。记得在配置之前用适当的固件刷写设备。
- en: Capturing sound
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 捕获声音
- en: 'Capturing audio from a USB microphone using Python turned out to be surprisingly
    troublesome. After struggling with various libraries for a while, I decided to
    fall back on the good old Linux `arecord`. The whole sound capture mechanism is
    encapsulated with the following command:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Python 从 USB 麦克风捕获音频竟然出奇地麻烦。在与各种库斗争了一段时间后，我决定回归到古老的 Linux `arecord` 命令。整个声音捕获机制都封装在以下命令中：
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: I’m deliberately using a plug-in device to enable automatic conversion in case
    I would like to introduce any changes to the **USB microphone** configuration.
    AST is run on **16 kHz** samples, so the recording and AudioMoth sampling are
    set to this value.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意使用一个插件设备来启用自动转换，以防我需要修改 **USB microphone** 的配置。AST 在 **16 kHz** 采样上运行，因此录音和
    AudioMoth 采样都设置为这个值。
- en: Pay attention to the generator in the code. It’s important that the device continuously
    captures audio at the time intervals I specify. I aimed to store only the most
    recent audio sample on the device and discard it after the classification. This
    approach will be especially useful later during larger-scale studies in urban
    areas, as it helps ensure people’s privacy and aligns with **GDPR compliance**.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 注意代码中的生成器。在指定的时间间隔内持续捕获音频非常重要。我的目标是只存储设备上最新的音频样本，并在分类后丢弃它。这种方法在后续更大规模的城区研究中特别有用，因为它有助于确保人们的隐私并符合
    **GDPR** 合规性。
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Classification
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类
- en: Now for the most exciting part.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候介绍最激动人心的部分了。
- en: Using the Audio Spectrogram Transformer (AST) and the excellent [HuggingFace](https://huggingface.co/) ecosystem,
    we can efficiently analyse audio and classify detected segments into over 500
    categories.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 利用音频频谱变换器（AST）和出色的 [HuggingFace](https://huggingface.co/) 生态系统，我们可以高效地分析音频并将检测到的片段分类到超过
    500 个类别中。
- en: Note that I’ve prepared the system to support various pre-trained models. By
    default, I use [*MIT/ast-finetuned-audioset-10–10–0.4593*](https://huggingface.co/MIT/ast-finetuned-audioset-10-10-0.4593),
    as it delivers the best results and runs well on the Raspberry Pi 4\. However, [*onnx-community/ast-finetuned-audioset-10–10–0.4593-ONNX*](https://huggingface.co/onnx-community/ast-finetuned-audioset-10-10-0.4593-ONNX) is
    also worth exploring — especially its **quantised version**, which requires less
    memory and serves the inference results quicker.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我已经准备了系统以支持各种预训练模型。默认情况下，我使用 [*MIT/ast-finetuned-audioset-10–10–0.4593*](https://huggingface.co/MIT/ast-finetuned-audioset-10-10-0.4593)，因为它提供了最佳结果，并且在
    Raspberry Pi 4 上运行良好。然而，[*onnx-community/ast-finetuned-audioset-10–10–0.4593-ONNX*](https://huggingface.co/onnx-community/ast-finetuned-audioset-10-10-0.4593-ONNX)
    也值得探索——特别是它的 **量化版本**，它需要的内存更少，并且可以更快地提供推理结果。
- en: You may notice that I’m not limiting the model to a single classification label,
    and that’s intentional. Instead of assuming that only one sound source is present
    at any given time, I apply a **sigmoid function to the model’s logits** to obtain **independent
    probabilities for each class**. This allows the model to express **confidence
    in multiple labels simultaneously**, which is crucial for **real-world soundscapes** where
    overlapping sources — like birds, wind, and distant traffic — often occur together.
    Taking the **top five results** ensures that the system captures the most likely
    sound events in the sample without forcing a winner-takes-all decision.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会注意到我没有将模型限制在单个分类标签上，这是故意的。而不是假设在任何给定时间只有一个声音源存在，我将对模型的logits应用**sigmoid函数**以获得**每个类别的独立概率**。这允许模型同时表达对多个标签的**信心**，这对于**现实世界的声音景观**至关重要，在这些景观中，重叠的声音源——如鸟鸣、风和远处的交通——经常同时出现。选择**前五个结果**确保系统在样本中捕获最可能的声音事件，而不强制做出赢家通吃的决定。
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: To run the ONNX version of the model, you need to add [Optimum](https://huggingface.co/docs/optimum/index) to
    your dependencies.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行模型的ONNX版本，您需要将[Optimum](https://huggingface.co/docs/optimum/index)添加到您的依赖项中。
- en: Sound pressure level
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 声压级
- en: Along with the audio classification, I capture information on sound pressure
    level. This approach not only identifies *what* made the sound but also gains
    insight into *how strongly* each sound was present. In that way, the model captures
    a richer, more realistic representation of the acoustic scene and can eventually
    be used to detect finer-grained noise pollution information.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 除了音频分类之外，我还捕捉了声压级的信息。这种方法不仅确定了**是什么**产生了声音，而且还了解了每个声音**强度**的细节。通过这种方式，模型捕捉到了更丰富、更真实的声音场景表示，最终可以用来检测更细粒度的噪声污染信息。
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The gain (preamp + amp), sensitivity (dB/V), and Vadc (V) are set primarily
    for AudioMoth and confirmed experimentally. If you are using a different device,
    you must identify these values by referring to the technical specification.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 增益（前置放大器+放大器）、灵敏度（dB/V）和Vadc（V）主要是为AudioMoth设置的，并通过实验验证。如果你使用的是不同设备，你必须通过参考技术规范来识别这些值。
- en: Storage
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 存储
- en: Data from each sensor is synchronised with a PostgreSQL database every 30 seconds.
    The current urban soundscape monitor prototype uses an Ethernet connection; therefore,
    I am not restricted in terms of network load. The device for more remote areas
    will synchronise the data each hour using a GSM connection.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 每个传感器的数据每30秒与PostgreSQL数据库同步。当前的都市声音景观监控原型使用以太网连接；因此，我在网络负载方面没有限制。用于更偏远地区的设备将使用GSM连接每小时同步数据。
- en: '[PRE4]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Results
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: A separate application, built using [Streamlit](https://streamlit.io/) and [Plotly](https://plotly.com/),
    accesses this data. Currently, it displays information about the device’s location,
    temporal SPL (sound pressure level), identified sound classes, and a range of [acoustic
    indices](https://scikit-maad.github.io/_auto_examples/2_advanced/plot_extract_alpha_indices.html).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一个独立的应用程序，使用[Streamlit](https://streamlit.io/)和[Plotly](https://plotly.com/)构建，访问这些数据。目前，它显示有关设备位置、时间性SPL（声压级）、识别的声音类别以及一系列[声学指数](https://scikit-maad.github.io/_auto_examples/2_advanced/plot_extract_alpha_indices.html)的信息。
- en: '![Dashboard](../Images/3b78809c43a8b1a93cd184ccaae9b2ab.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![仪表板](../Images/3b78809c43a8b1a93cd184ccaae9b2ab.png)'
- en: Streamit analytical dashboard (image by author)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Streamit分析仪表板（图片由作者提供）
- en: And now we are good to go. The plan is to extend the sensor network and reach
    around 20 devices scattered around multiple places in my [city](https://pl.wikipedia.org/wiki/%C5%81%C3%B3d%C5%BA).
    More information about a larger area sensor deployment will be available soon.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们准备就绪。计划扩展传感器网络，并达到我[城市](https://pl.wikipedia.org/wiki/%C5%81%C3%B3d%C5%BA)多个地方分散的约20个设备。有关更大区域传感器部署的更多信息将很快可用。
- en: Moreover, I’m collecting data from a deployed sensor and plan to share the data
    package, dashboard, and analysis in an upcoming blog post. I’ll use an interesting
    approach that warrants a deeper dive into audio classification. The main idea
    is to match different sound pressure levels to the detected audio classes. I hope
    to find a better way of describing noise pollution. So stay tuned for a more detailed
    breakdown soon.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我正在从部署的传感器收集数据，并计划在即将发表的博客文章中分享数据包、仪表板和分析。我将使用一个有趣的方法，值得深入探讨音频分类。主要思想是将不同的声压级与检测到的音频类别相匹配。我希望找到一种更好的方法来描述噪声污染。所以请耐心等待，很快就会有更详细的分解。
- en: In the meantime, you can read the [preliminary paper](https://czasopisma.ltn.lodz.pl/Acta-Geographica-Lodziensia/article/view/2512/2290?source=post_page-----1be80a0b1ce4---------------------------------------)
    on my soundscapes studies (headphones are obligatory).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，您可以阅读关于我的声音景观研究的[初步论文](https://czajopisma.ltn.lodz.pl/Acta-Geographica-Lodziensia/article/view/2512/2290?source=post_page-----1be80a0b1ce4---------------------------------------)（务必佩戴耳机）。
