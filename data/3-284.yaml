- en: Supercharge Your RAG with Multi-Agent Self-RAG
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用多智能体Self-RAG提升你的RAG
- en: 原文：[https://towardsdatascience.com/supercharge-your-rag-with-multi-agent-self-rag/](https://towardsdatascience.com/supercharge-your-rag-with-multi-agent-self-rag/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/supercharge-your-rag-with-multi-agent-self-rag/](https://towardsdatascience.com/supercharge-your-rag-with-multi-agent-self-rag/)
- en: '**Introduction**'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**引言**'
- en: Many of us might have tried to build a RAG application and noticed it falls
    significantly short of addressing real-life needs. Why is that? It’s because many
    real-world problems require multiple steps of information retrieval and reasoning.
    We need our agent to perform those as humans normally do, yet most RAG applications
    fall short of this.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的许多人可能都尝试过构建RAG应用，并注意到它严重不足于满足现实需求。为什么是这样呢？这是因为许多现实世界问题需要多个步骤的信息检索和推理。我们需要我们的代理像人类一样执行这些步骤，然而，大多数RAG应用都未能达到这一点。
- en: This article explores how to supercharge your RAG application by making its
    data retrieval and reasoning process similar to how a human would, under a multi-agent
    framework. The framework presented here is based on the [Self-RAG strategy](https://langchain-ai.github.io/langgraph/tutorials/rag/langgraph_self_rag/) but
    has been significantly modified to enhance its capabilities. Prior knowledge of
    the original strategy is not necessary for reading this article.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文探讨了如何在多智能体框架下，通过使数据检索和推理过程类似于人类的方式，来提升你的RAG应用。这里提出的框架基于[Self-RAG策略](https://langchain-ai.github.io/langgraph/tutorials/rag/langgraph_self_rag/)，但已经进行了重大修改以增强其功能。阅读本文不需要对原始策略有先验知识。
- en: '**Real-life Case**'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**真实案例**'
- en: 'Consider this: I was going to fly from Delhi to Munich (let’s assume I am taking
    the flight from an EU airline), but I was denied boarding somehow. Now I want
    to know what the compensation should be.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这一点：我本来要从德里飞往慕尼黑（让我们假设我是在欧盟航空公司乘坐航班），但不知何故我被拒绝登机。现在我想知道应该得到多少补偿。
- en: These two webpages contain relevant information, I go ahead adding them to my
    vector store, trying to have my agent answer this for me by retrieving the right
    information.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个网页包含相关信息，我继续将它们添加到我的向量存储中，试图让我的代理通过检索正确的信息来为我回答这个问题。
- en: '[Flight compensation policy](https://www.eu-startups.com/2024/04/comparative-analysis-eu-vs-us-flight-compensation-policies-sponsored/)'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[航班补偿政策](https://www.eu-startups.com/2024/04/comparative-analysis-eu-vs-us-flight-compensation-policies-sponsored/)'
- en: '[Distance between Munich and other major cities in the world](https://www.geodatos.net/en/distances/cities/germany/bavaria/munich) (note:
    it does not reflect the distance between airports, but it serves the purpose for
    our demonstration)'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[慕尼黑与世界其他主要城市之间的距离](https://www.geodatos.net/en/distances/cities/germany/bavaria/munich) (注意：它不反映机场之间的距离，但对我们演示的目的来说足够了)'
- en: Now, I pass this question to the vector store: ***“how much can I receive if
    I am denied boarding, for flights from Delhi to Munich?”***.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我将这个问题传递给向量存储：***“如果我被拒绝登机，从德里到慕尼黑的航班我能得到多少补偿？”***。
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Unfortunately, they contain only generic flight compensation policies, without
    telling me how much I can expect when denied boarding from Delhi to Munich specifically.
    If the RAG agent takes these as the sole context, it can only provide a generic
    answer about flight compensation policy, without giving the answer we want.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，它们只包含通用的航班补偿政策，没有告诉我从德里到慕尼黑被拒绝登机时我能期待多少。如果RAG代理将这些作为唯一上下文，它只能提供关于航班补偿政策的通用答案，而无法给出我们想要的答案。
- en: 'However, while the documents are not immediately useful, there is an important
    insight contained in the 2nd piece of context: ***compensation varies according
    to flight distance***. If the RAG agent thinks more like human, it should follow
    these steps to provide an answer:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管这些文件不是立即有用的，但第二段上下文中包含了一个重要的见解：***补偿根据航班距离而变化***。如果RAG代理更像人类，它应该遵循以下步骤来提供答案：
- en: Based on the retrieved context, reason that compensation varies with flight
    distance
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据检索到的上下文，推理出补偿与航班距离相关
- en: Next, retrieve the flight distance between Delhi and Munich
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，检索德里和慕尼黑之间的航班距离
- en: Given the distance (which is around 5900km), classify the flight as a long-distance
    one
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑到距离（大约5900公里），将航班分类为长途航班
- en: Combined with the previously retrieved context, figure out I am due 600 EUR,
    assuming other conditions are fulfilled
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结合之前检索到的上下文，假设其他条件得到满足，计算出我应该得到600欧元
- en: 'This example demonstrates how a simple RAG, in which a single retrieval is
    made, fall short for several reasons:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了为什么一个简单的RAG，其中只进行了一次检索，由于几个原因而不足：
- en: '**Complex Queries**: Users often have questions that a simple search can’t
    fully address. For example, “What’s the best smartphone for gaming under $500?”
    requires consideration of multiple factors like performance, price, and features,
    which a single retrieval step might miss.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**复杂查询**：用户经常有简单搜索无法完全解决的问题。例如，“500美元以下最好的游戏手机是什么？”需要考虑性能、价格和功能等多个因素，而单个检索步骤可能会错过。'
- en: '**Deep Information**: Some information lies across documents. For example,
    research papers, medical records, or legal documents often include references
    that need to be made sense of, before one can fully understand the content of
    a given article. Multiple retrieval steps help dig deeper into the content.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**深度信息**：一些信息跨越多个文档。例如，研究论文、医疗记录或法律文件通常包括需要理解的参考文献，在完全理解给定文章的内容之前。'
- en: Multiple retrievals supplemented with human-like reasoning allow for a more
    nuanced, comprehensive, and accurate response, adapting to the complexity and
    depth of user queries.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 多次检索辅以类似人类的推理，可以提供更细腻、全面和准确的响应，适应用户查询的复杂性和深度。
- en: Multi-Agent Self-RAG
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多代理自我-RAG
- en: Here I explain the reasoning process behind this strategy, afterwards I will
    provide the code to show you how to achieve this!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我解释了这种策略背后的推理过程，之后我将提供代码以展示如何实现这一点！
- en: 'Note: For readers interested in knowing how my approach differs from the [original
    Self-RAG](https://langchain-ai.github.io/langgraph/tutorials/rag/langgraph_self_rag/),
    I will describe the discrepancies in quotation boxes like this. But general readers
    who are unfamiliar with the original Self-RAG can skip them.'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：对于对了解我的方法与[原始Self-RAG](https://langchain-ai.github.io/langgraph/tutorials/rag/langgraph_self_rag/)有何不同感兴趣的读者，我将在这样的引号框中描述差异，如这样。但那些不熟悉原始Self-RAG的一般读者可以跳过它们。
- en: In the below graphs, each circle represents a step (aka **Node**), which is
    performed by a dedicated agent working on the specific problem. We orchestrate
    them to form a multi-agent RAG application.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的图表中，每个圆圈代表一个步骤（即**节点**），由专门处理特定问题的代理执行。我们协调它们以形成一个多代理RAG应用。
- en: '1st iteration: Simple RAG'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1次迭代：简单的RAG
- en: '![](../Images/3e93d3aa6427236f7cb1697453d4cdef.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3e93d3aa6427236f7cb1697453d4cdef.png)'
- en: A simple RAG chain
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的RAG链
- en: This is just the vanilla RAG approach I described in “Real-life Case”, represented
    as a graph. After `Retrieve documents`, the `new_documents` will be used as input
    for `Generate Answer`. Nothing special, but it serves as our starting point.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是我在“实际案例”中描述的vanilla RAG方法，以图表形式表示。在`检索文档`之后，`new_documents`将被用作`生成答案`的输入。没有什么特别的，但它作为我们的起点。
- en: '2nd iteration: Digest documents with “Grade documents”'
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2次迭代：使用“评估文档”摘要文档
- en: '![](../Images/b7f1c9640452c0a5a8354cb4d2fd7d54.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b7f1c9640452c0a5a8354cb4d2fd7d54.png)'
- en: Reasoning like human do
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 类似人类的推理
- en: Remember I said in the “Real-life Case” section, that as a next step, the agent
    should ***“reason that compensation varies with flight distance”***? The `Grade
    documents` step is exactly for this purpose.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 记得我在“实际案例”部分说过，作为下一步，代理应该**“推理补偿与飞行距离的关系”**？`评估文档`步骤正是为此目的。
- en: 'Given the `new_documents`, the agent will try to output two items:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 给定`新文档`，代理将尝试输出两项：
- en: '`useful_documents`: Comparing the question asked, it determines if the documents
    are useful, and retain a memory for those deemed useful for future reference.
    As an example, since our question does not concern compensation policies for US,
    documents describing those are discarded, leaving only those for EU'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`useful_documents`: 比较提出的问题，它确定文档是否有用，并为那些被认为对未来参考有用的文档保留记忆。例如，由于我们的问题不涉及美国的补偿政策，描述这些政策的文档被丢弃，只留下针对欧盟的文档'
- en: '`hypothesis`: Based on the documents, the agent forms a hypothesis about how
    the question can be answered, that is, flight distance needs to be identified'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`hypothesis`: 根据文档，代理形成了一个关于如何回答问题的假设，即需要识别飞行距离'
- en: Notice how the above reasoning resembles human thinking! But still, while these
    outputs are useful, we need to instruct the agent to use them as input for performing
    the next document retrieval. Without this, the answer provided in `Generate answer` is
    still not useful.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 注意上述推理如何类似于人类思维！但尽管这些输出是有用的，我们仍需要指示代理将它们作为输入用于执行下一个文档检索。没有这个，`生成答案`中提供的答案仍然没有用。
- en: '`useful_documents` are appended for each document retrieval loop, instead of
    being overwritten, to keep a memory of documents that are previously deemed useful. `hypothesis` is
    formed from `useful_documents` and `new_documents` to provide an “abstract reasoning”
    to inform how query is to be transformed subsequently.'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '`useful_documents`在每个文档检索循环中附加，而不是被覆盖，以保留先前被视为有用的文档的记忆。`hypothesis`从`useful_documents`和`new_documents`形成，以提供“抽象推理”，告知如何随后的查询要如何转换。'
- en: ''
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The `hypothesis` is especially useful when no useful documents can be identified
    initially, as the agent can still form hypothesis from documents not immediately
    deemed as useful / only bearing indirect relationship to the question at hand,
    for informing what questions to ask next
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当最初无法识别有用文档时，`hypothesis`特别有用，因为代理可以从被视为无用/仅与当前问题间接相关的文档中形成假设，以告知接下来要问的问题。
- en: '3rd iteration: Brainstorm new questions to ask'
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3次迭代：提出新的问题
- en: '![](../Images/e10e387b4e93a2f996674eeedb99da62.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e10e387b4e93a2f996674eeedb99da62.png)'
- en: Suggest questions for additional information retrieval
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 提出用于额外信息检索的问题
- en: We have the agent reflect upon whether the answer is useful and grounded in
    context. If not, it should proceed to `Transform query` to ask further questions.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们让代理反思答案是否有用且基于上下文。如果不是，它应继续到`Transform query`以提出更多问题。
- en: The output `new_queries` will be a list of new questions that the agent consider
    useful for obtaining extra information. Given the `useful_documents` (compensation
    policies for EU), and `hypothesis` (need to identify flight distance between Delhi
    and Munich), it asks questions like **“What is the distance between Delhi and
    Munich?”**
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 输出的`new_queries`将是一系列新问题列表，代理认为这些问题对于获取额外信息是有用的。鉴于`useful_documents`（欧盟的补偿政策）和`hypothesis`（需要识别德里和慕尼黑之间的飞行距离），它提出像**“德里和慕尼黑之间的距离是多少？”**这样的问题。
- en: Now we are ready to use the `new_queries` for further retrieval!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经准备好使用`new_queries`进行进一步的检索！
- en: The `transform_query` node will use `useful_documents` (which are accumulated
    per iteration, instead of being overwritten) and `hypothesis` as input for providing
    the agent directions to ask new questions.
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '`transform_query`节点将使用`useful_documents`（每次迭代累积，而不是被覆盖）和`hypothesis`作为输入，为代理提供询问新问题的方向。'
- en: ''
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The new questions will be a list of questions (instead of a single question)
    separated from the original `question`, so that the original question is kept
    in state, otherwise the agent could lose track of the original question after
    multiple iterations.
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 新问题将是一个问题列表（而不是单个问题），与原始`question`分开，以便保留原始问题，否则代理在多次迭代后可能会失去对原始问题的追踪。
- en: 'Final iteration: Further retrieval with new questions'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最终迭代：使用新问题进行进一步检索
- en: '![](../Images/1f4824fc416826a22d6095aaec8d7db3.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1f4824fc416826a22d6095aaec8d7db3.png)'
- en: Issuing new queries to retrieve extra documents
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 发起新查询以检索额外文档
- en: The output `new_queries` from `Transform query` will be passed to the `Retrieve
    documents` step, forming a retrieval loop.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`Transform query`的输出`new_queries`将被传递到`Retrieve documents`步骤，形成一个检索循环。'
- en: Since the question ***“What is the distance between Delhi and Munich?”***is
    asked, we can expect the flight distance is then retrieved as `new_documents`,
    and subsequently graded as `useful_documents`, further used as an input for `Generate
    answer`.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 自从提出问题“德里和慕尼黑之间的距离是多少？”以来，我们可以预期飞行距离随后被检索为`new_documents`，并随后被评估为`useful_documents`，进一步用作`Generate
    answer`的输入。
- en: The *`grade_documents`* node will compare the documents against both the original *`question`* and *`new_questions`* list,
    so that documents that are considered useful for *`new_questions`*, even if not
    so for the original *`question`*, are kept.
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '`*grade_documents*`节点将文档与原始的`*question*`和`*new_questions*`列表进行比较，以便保留对`*new_questions*`有用但原始`*question*`不用的文档。'
- en: ''
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is because those documents might help answer the original *`question`* indirectly,
    by being relevant to *`new_questions` (like “*What is the distance between Delhi
    and Munich?”)
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是因为这些文档可能通过与新问题（如“*德里和慕尼黑之间的距离是多少？”）的相关性间接回答原始`*question*`。
- en: '![](../Images/a4599bfbe5c468cb77be822740654429.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a4599bfbe5c468cb77be822740654429.png)'
- en: Final answer!
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 最终答案！
- en: Equipped with this new context about flight distance, the agent is now ready
    to provide the right answer: **600 EUR**!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 带着关于飞行距离的新上下文，代理现在准备好提供正确的答案：**600 EUR**！
- en: Next, let us now dive into the code to see how this multi-agent RAG application
    is created.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们深入代码，看看这个多智能体RAG应用程序是如何创建的。
- en: Implementation
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现
- en: The source code can be found [here](https://github.com/yip-kl/enhanced-self-rag).
    Our multi-agent RAG application involves iterations and loops, and LangGraph is
    a great library for building such complex multi-agent application. If you are
    not familiar with LangGraph, you are strongly suggested to have a look at [LangGraph’s
    Quickstart guide](https://langchain-ai.github.io/langgraph/tutorials/introduction/) to
    understand more about it!
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 源代码可以在[这里](https://github.com/yip-kl/enhanced-self-rag)找到。我们的多智能体RAG应用程序涉及迭代和循环，LangGraph是一个构建此类复杂多智能体应用程序的绝佳库。如果您不熟悉LangGraph，强烈建议您查看[LangGraph的快速入门指南](https://langchain-ai.github.io/langgraph/tutorials/introduction/)，以了解更多相关信息！
- en: To keep this article concise, I will focus on the key code snippets only.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这篇文章简洁，我将只关注关键代码片段。
- en: '**Important note**: I am using OpenRouter as the [Llm](https://towardsdatascience.com/tag/llm/) interface,
    but the code can be easily adapted for other LLM interfaces. Also, while in my
    code I am using Claude 3.5 Sonnet as model, you can use any LLM as long as it
    support `tools` as parameter (check this list [here](https://openrouter.ai/models?fmt=cards&order=newest&supported_parameters=tools)),
    so you can also run this with other models, like DeepSeek V3 and OpenAI o1!'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要提示**：我正在使用OpenRouter作为[Llm](https://towardsdatascience.com/tag/llm/)接口，但代码可以很容易地适应其他LLM接口。此外，虽然在我的代码中我使用的是Claude
    3.5 Sonnet作为模型，但只要LLM支持`tools`参数（请在此[列表](https://openrouter.ai/models?fmt=cards&order=newest&supported_parameters=tools)中检查），您可以使用任何LLM，因此您也可以使用其他模型，如DeepSeek
    V3和OpenAI o1来运行此代码！'
- en: State definition
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 状态定义
- en: In the previous section, I have defined various elements e.g. `new_documents`, `hypothesis` that
    are to be passed to each step (aka **Nodes**), in LangGraph’s terminology these
    elements are called **State**.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我已经定义了各种元素，例如`new_documents`、`hypothesis`，这些元素需要传递给每个步骤（即**节点**），在LangGraph的术语中，这些元素被称为**状态**。
- en: We define the State formally with the following snippet.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以下面的片段正式定义状态。
- en: '[PRE1]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Graph definition
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图定义
- en: This is where we combine the different steps to form a “**Graph**”, which is
    a representation of our multi-agent application. The definitions of various steps
    (e.g. `grade_documents`) are represented by their respective functions.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们将不同的步骤组合成一个“**图**”的地方，这个图是我们多智能体应用程序的表示。各种步骤的定义（例如`grade_documents`）通过它们各自的功能来表示。
- en: '[PRE2]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Running the above code, you should see this graphical representation of our
    RAG application. Notice how it is essentially equivalent to the graph I have shown
    in the final iteration of “Enhanced Self-RAG Strategy”!
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 运行上述代码，你应该看到我们RAG应用程序的图形表示。注意，它本质上等同于我在“增强自我RAG策略”最终迭代中展示的图！
- en: '![](../Images/99ab0d879d190453a2a3b3a254c62213.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/99ab0d879d190453a2a3b3a254c62213.png)'
- en: Visualizing the multi-agent RAG graph
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化多智能体RAG图
- en: After `generate`, if the answer is considered “not supported”, the agent will
    proceed to `transform_query` intead of to `generate` again, so that the agent
    will look for additional information rather than trying to regenerate answers
    based on existing context, which might not suffice for providing a “supported”
    answer
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在`generate`之后，如果答案被认为“不受支持”，代理将转到`transform_query`而不是再次转到`generate`，这样代理将寻找更多信息，而不是尝试根据现有上下文重新生成答案，这可能不足以提供“受支持”的答案。
- en: Now we are ready to put the multi-agent application to test! With the below
    code snippet, we ask this question `how much can I receive if I am denied boarding,
    for flights from Delhi to Munich?`
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经准备好对多智能体应用程序进行测试！以下代码片段，我们提出这个问题：“如果我被拒绝登机，从德里到慕尼黑的航班我能得到多少？”
- en: '[PRE3]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: While output might vary (sometimes the application provides the answer without
    any iterations, because it “guessed” the distance between Delhi and Munich), it
    should look something like this, which shows the application went through multiple
    rounds of data retrieval for RAG.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然输出可能有所不同（有时应用程序在没有任何迭代的情况下提供答案，因为它“猜测”了德里和慕尼黑之间的距离），但它应该看起来像这样，这表明应用程序已经进行了多轮数据检索以用于RAG。
- en: '[PRE4]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: And the final answer is what we aimed for!
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 最终答案正是我们期望的！
- en: '[PRE5]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Inspecting the State, we see how the `hypothesis` and `new_queries` enhance
    the effectiveness of our multi-agent RAG application by mimicking human thinking
    process.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 检查状态，我们看到`hypothesis`和`new_queries`如何通过模拟人类思维过程来增强我们多智能体RAG应用程序的有效性。
- en: '**Hypothesis**'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**假设**'
- en: '[PRE6]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**New Queries**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**新查询**'
- en: '[PRE8]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Conclusion
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Simple RAG, while easy to build, might fall short in tackling real-life questions.
    By incorporating human thinking process into a multi-agent RAG framework, we are
    making RAG applications much more practical.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的RAG（关系图）虽然易于构建，但在解决现实生活中的问题时可能力不从心。通过将人类思维过程融入多智能体RAG框架中，我们使RAG应用变得更加实用。
- en: '**Unless otherwise noted, all images are by the author*'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**除非另有说明，所有图像均由作者提供**'
