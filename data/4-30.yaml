    和 [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 Unsplash 上拍摄（整体图片由作者提供）。
- en: We observe that the model gives detailed captions for the provided images, covering
    all the aspects in detail.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们观察到，该模型为提供的图片提供了详细的描述，详细涵盖了所有方面。
- en: Few-Shot Prompting
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 少样本提示
- en: Few-Shot Prompting involves providing examples or demostrations of the task
    as context to the VLM to provide more reference and context to the model about
    the task to be performed.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示涉及提供任务的示例或演示作为上下文，为 VLM 提供更多参考和上下文，以便模型了解将要执行的任务。
- en: '![Representation of Few-Shot Prompting (Image by Author)](../Images/84fbbfa9ae5503564a489a539db4b7ee.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![少样本提示的表示（图片由作者提供）](../Images/84fbbfa9ae5503564a489a539db4b7ee.png)'
- en: Representation of Few-Shot Prompting (Image by Author)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示的表示（图片由作者提供）
- en: 'The advantages of few-shot prompting is that it helps provide additional grounding
    for the task, compared to zero-shot prompting. Let’s look at how this practically
    occurs in our task. First, consider our existing implementation:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示的优势在于，与零样本提示相比，它有助于为任务提供额外的依据。让我们看看这在我们的任务中是如何实际发生的。首先，考虑我们的现有实现：
- en: '[PRE4]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: I utilize 3 images as few-shot examples to the VLM, and then run our system.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我将 3 张图片作为少样本示例提供给 VLM，然后运行我们的系统。
- en: '[PRE5]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![Few-Shot Prompting outputs. Images in this picture are taken by Josh Frenette
    on [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by Alexander Zaytsev on Unsplash (Overall Image by Author).](../Images/ae3240e46c1152bc963d122cfe94a0d2.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![Few-Shot Prompting 输出。图中图片由 Josh Frenette 在 [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    和 Alexander Zaytsev 在 Unsplash 上拍摄（整体图片由作者提供）](../Images/ae3240e46c1152bc963d122cfe94a0d2.png)'
- en: Few-Shot Prompting outputs. Images in this picture are taken by [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash (Overall Image by Author).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示的输出。图中图片由 [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    和 [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 Unsplash 上拍摄（整体图片由作者提供）。
- en: 'Notice the captions generated with the VLM using the few-shot examples. These
    captions are much shorter and concise compared to the captions generated in the
    zero-shot prompting setting. Let’s look at how the captions for these examples
    look like:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 注意使用少样本示例通过 VLM 生成的描述。与零样本提示设置中生成的描述相比，这些描述要简短得多。让我们看看这些示例的描述是什么样的：
- en: '![The few-shot images used and their corresponding captions. Images in this
    picture are by Mathias Reding on [[Unsplash](https://unsplash.com/photos/a-man-standing-next-to-a-tent-in-the-desert-ckfXPMb2_BI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-white-car-driving-on-a-desert-road-nOhLRqb5AV0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash),
    sander traa on Unsplash, NEOM on Unsplash. (Image by author)](../Images/4ec42f385da64c35aa2128cdacf81a69.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![使用的少样本图像及其对应的标题。图中图片由Mathias Reding在[[Unsplash](https://unsplash.com/photos/a-man-standing-next-to-a-tent-in-the-desert-ckfXPMb2_BI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-white-car-driving-on-a-desert-road-nOhLRqb5AV0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)，sander
    traa在Unsplash，NEOM在Unsplash。图片由作者提供](../Images/4ec42f385da64c35aa2128cdacf81a69.png)'
- en: The few-shot images used and their corresponding captions. Images in this picture
    are by [Mathias Reding](https://unsplash.com/@matreding?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[[Unsplash](https://unsplash.com/photos/a-man-standing-next-to-a-tent-in-the-desert-ckfXPMb2_BI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-white-car-driving-on-a-desert-road-nOhLRqb5AV0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-blurry-photo-of-a-city-street-with-buildings-5-LTB9YPwkY?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash),
    [sander traa](https://unsplash.com/@sandertraa?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash, [NEOM](https://unsplash.com/@neom?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash. (Image by author)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 使用的少样本图像及其对应的标题。图中图片由[Mathias Reding](https://unsplash.com/@matreding?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[[[Unsplash](https://unsplash.com/photos/a-man-standing-next-to-a-tent-in-the-desert-ckfXPMb2_BI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-white-car-driving-on-a-desert-road-nOhLRqb5AV0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-blurry-photo-of-a-city-street-with-buildings-5-LTB9YPwkY?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)，[sander
    traa](https://unsplash.com/@sandertraa?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在Unsplash，[NEOM](https://unsplash.com/@neom?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在Unsplash。图片由作者提供
- en: '**This difference is primarily due to the influence of the few-shot examples.**
    The captions in the few-shot examples clearly influence the output by the VLM
    for the new images we use, leading to more concise and shorter captions. This
    illustrates how powerful the selection of few-shot examples can be in shaping
    the behavior of the VLM. Users can direct the model’s output to more closely match
    their preferred style, tone, or amount of detail by carefully choosing few-shot
    samples.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种差异主要归因于少样本示例的影响**。少样本示例中的标题明显影响了VLM对我们使用的新图像的输出，导致更简洁、更短的标题。这说明了选择少样本示例在塑造VLM行为方面可以多么强大。用户可以通过仔细选择少样本样本，引导模型的输出更接近他们偏好的风格、语气或细节程度。'
- en: Chain of Thought Prompting
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 思维链提示
- en: Chain of Thought (CoT) prompting [9], initially developed for LLMs, enables
    them to tackle address complex problems by breaking them into simpler, intermediate
    steps and encouraging the model to "think" before answering. This technique can
    be applied to VLMs without any adjustments. The primary difference is that the
    VLM can use both image and text as inputs when reasoning under CoT to answer the
    question.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 思维链（CoT）提示[9]，最初是为LLMs开发的，使它们能够通过将复杂问题分解成更简单、中间的步骤并鼓励模型在回答之前“思考”来处理复杂问题。这项技术可以无任何调整地应用于VLMs。主要区别在于，VLM在CoT推理下回答问题时可以使用图像和文本作为输入。
- en: 'To implement this, I utilize the 3 examples I picked for few-shot prompting
    and construct a CoT trace for them by first utilizing **OpenAI’s O1 model** (which
    is a multimodal VLM for reasoning tasks). I then use these CoT reasoning traces
    as my few-shot examples for prompting the VLM. For example, a CoT trace looks
    like this for one of the images:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点，我利用我挑选的3个用于少样本提示的例子，并首先通过使用**OpenAI的O1模型**（这是一个用于推理任务的跨模态视觉语言模型）为它们构建CoT跟踪。然后，我将这些CoT推理跟踪作为我的少样本例子来提示VLM。例如，一个CoT跟踪看起来像这样，针对其中一张图片：
- en: '![CoT trace for an image. Image in this picture is from Mathias Reding on Unsplash
    (Image by Author)](../Images/c3a0bf2b12f774d47695621761288a7f.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图像的CoT跟踪。图中图片来自Mathias Reding在Unsplash（图片由作者提供）](../Images/c3a0bf2b12f774d47695621761288a7f.png)'
- en: CoT trace for an image. Image in this picture is from [Mathias Reding](https://unsplash.com/@matreding?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-blurry-photo-of-a-city-street-with-buildings-5-LTB9YPwkY?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    (Image by Author)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: CoT跟踪图像。图中图像来自[Mathias Reding](https://unsplash.com/@matreding?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-blurry-photo-of-a-city-street-with-buildings-5-LTB9YPwkY?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)（图片由作者提供）
- en: The few-shot CoT traces I created for the images contain detailed reasoning
    for each aspect of the image that is important for creating the final caption.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我为图像创建的少量样本CoT跟踪包含创建最终标题每个重要方面的详细推理。
- en: '[PRE6]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'We run the CoT prompt setup for the VLM and obtain the results for these images:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为VLM运行CoT提示设置，并获得了这些图像的结果：
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![Outputs obtained from Chain-of-Thought prompting. Images in this picture
    are taken by Josh Frenette on [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by Alexander Zaytsev on Unsplash (Image by Author)](../Images/5e5620ad9664b427316b39fc76a54ab4.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![从思维链提示中获得的输出。图中图像由Josh Frenette在[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)和Alexander
    Zaytsev在Unsplash上拍摄（图片由作者提供）](../Images/5e5620ad9664b427316b39fc76a54ab4.png)'
- en: Outputs obtained from Chain-of-Thought prompting. Images in this picture are
    taken by [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash (Image by Author)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 从思维链提示中获得的输出。图中图像由[Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)和[Alexander
    Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在Unsplash上拍摄（图片由作者提供）
- en: The outputs from the few-shot CoT setup shows that the VLM is now capable of
    breaking down the image into intermediate steps before arriving at the final caption.
    This approach highlights the power of CoT prompting in influencing the behaviour
    of the VLM for a given task.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 几个样本的CoT（思维链）设置输出显示，VLM现在能够在得出最终标题之前将图像分解成中间步骤。这种方法突出了CoT提示在影响VLM针对特定任务行为方面的力量。
- en: Object Detection Guided Prompting
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标检测引导提示
- en: An interesting implication of having models capable of processing images directly
    and recognizing various aspects is that it opens up numerous opportunities to
    guide VLMs in performing tasks more efficiently and implementing "feature engineering".
    If you think about it, you’ll quickly realize that you could provide images with
    embedded metadata that is relevant to the VLM’s task.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有能够直接处理图像并识别各种方面的模型的一个有趣含义是，它为引导VLM更有效地执行任务和实现“特征工程”提供了众多机会。如果你这么想，你很快就会意识到你可以提供与VLM任务相关的嵌入式元数据的图像。
- en: An example of this is to use object detection as an additional component in
    prompting VLMs. Such techniques are also explored in detail in this blog from
    AWS [10]. In this blog, I leverage an object detection model as an additional
    component in the prompting pipeline for the VLM.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的例子是将目标检测作为VLMs（视觉语言模型）提示中的附加组件。此类技术也在AWS的这篇博客[10]中进行了详细探讨。在这篇博客中，我利用目标检测模型作为VLM提示管道中的附加组件。
- en: '![An overview of the Object Detection Guided Prompting with VLMs. Image in
    this picture is taken by Josh Frenette on Unsplash (Image by Author)](../Images/5a59518e95226d2c8e35c48dcd0b6645.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![VLMs引导的目标检测概述。图中图像由Josh Frenette在Unsplash上拍摄（图片由作者提供）](../Images/5a59518e95226d2c8e35c48dcd0b6645.png)'
- en: An overview of the Object Detection Guided Prompting with VLMs. Image in this
    picture is taken by [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    (Image by Author)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: VLM引导的对象检测概述。此图中的图像由[Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)上拍摄（图片由作者提供）
- en: Generally, an object detection model is trained with a fixed vocabulary, meaning
    it can only recognize a predefined set of object categories. However, in our pipeline,
    since we can’t predict in advance which objects will appear in the image, we need
    an object detection model that is versatile and capable of recognizing a wide
    range of object classes. To achieve this, I use the OWL-ViT model [11], an open-vocabulary
    object detection model. This model requires text prompts that specifies the objects
    to be detected.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，一个对象检测模型是用一个固定的词汇表训练的，这意味着它只能识别一组预定义的对象类别。然而，在我们的流程中，由于我们无法提前预测图像中会出现哪些对象，我们需要一个通用且能够识别广泛对象类别的对象检测模型。为了实现这一点，我使用了OWL-ViT模型[11]，这是一个开放词汇的对象检测模型。该模型需要一个文本提示来指定要检测的对象。
- en: Another challenge that needs to be addressed is obtaining a high-level idea
    of the objects present in the image before utilizing the OWL-ViT model, as it
    requires a text prompt describing the objects. This is where VLMs come to the
    rescue! First, we pass the image to the VLM with a prompt to identify the high-level
    objects in the image. These detected objects are then used as text prompts, along
    with the image, for the OWL-ViT model to generate detections. Next, we plot the
    detections as bounding boxes on the same image and pass this updated image to
    the VLM, prompting it to generate a caption. The code for inference is partially
    adapted from [12].
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要解决的问题是在使用OWL-ViT模型之前，需要获得图像中存在对象的总体概念，因为它需要一个描述对象的文本提示。这正是VLM发挥作用的地方！首先，我们使用一个提示将图像传递给VLM，以识别图像中的高级对象。然后，这些检测到的对象被用作文本提示，与图像一起用于OWL-ViT模型以生成检测。接下来，我们在同一图像上绘制检测到的边界框，并将此更新后的图像传递给VLM，提示它生成标题。推理代码部分改编自[12]。
- en: '[PRE8]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'I detect the objects present in each image using the VLM:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用VLM检测每张图像中的对象：
- en: '[PRE9]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The detected objects are now passed as text prompts to the OWL-ViT model to
    obtain the predictions for the images. I implement a helper function that predicts
    the bounding boxes for the images, and then plots the bounding box on the original
    image.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将检测到的对象作为文本提示传递给OWL-ViT模型，以获取图像的预测。我实现了一个辅助函数，用于预测图像的边界框，然后在原始图像上绘制边界框。
- en: '[PRE11]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The images with the detected objects plotted are now passed to the VLM for
    captioning:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将绘制了检测到的对象的图像传递给VLM进行标题生成：
- en: '[PRE13]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![Outputs obtained from Object Detection Guided Prompting. Images in this picture
    are taken by Josh Frenette on [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by Alexander Zaytsev on Unsplash (Image by Author)](../Images/e4530ed393ecd1325400cef6f3e834b6.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![从对象检测引导提示获得的输出。此图中的图像由Josh Frenette在[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)和Alexander
    Zaytsev在Unsplash上拍摄（图片由作者提供）](../Images/e4530ed393ecd1325400cef6f3e834b6.png)'
- en: Outputs obtained from Object Detection Guided Prompting. Images in this picture
    are taken by [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash (Image by Author)
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 从Object Detection Guided Prompting获得的输出。这幅图中的图像由[Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)上拍摄，以及由[Alexander
    Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在Unsplash上拍摄（图片由作者提供）
- en: In this task, given the simple nature of the images we use, the location of
    the objects does not add any significant information to the VLM. However, Object
    Detection Guided Prompting can be a powerful tool for more complex tasks, such
    as Document Understanding, where layout information can be effectively provided
    through object detection to the VLM for further processing. Additionally, Semantic
    Segmentation can be employed as a method to guide prompting by providing segmentation
    masks to the VLM.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个任务中，鉴于我们使用的图像的简单性质，物体的位置并没有向VLM添加任何显著信息。然而，Object Detection Guided Prompting可以作为更复杂任务（如文档理解）的一个强大工具，在这些任务中，布局信息可以通过对象检测有效地提供给VLM以进行进一步处理。此外，语义分割可以通过向VLM提供分割掩码作为引导提示的方法。
- en: Conclusion
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: VLMs are a powerful tool in the arsenal of AI engineers and scientists for solving
    a variety of problems that require a combination of vision and text skills. In
    this article, I explore prompting strategies in the context of VLMs to effectively
    use these models for tasks such as image captioning. This is by no means an exhaustive
    or comprehensive list of prompting strategies. One thing that has become increasingly
    clear with the advancements in GenAI is the limitless potential for creative and
    innovative approaches to prompt and guide LLMs and VLMs in solving tasks. For
    a complementary resource on prompting with VLMs, I would also recommend this [material
    from Azure](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/gpt-4-v-prompt-engineering)
    [13].
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: VLMs是AI工程师和科学家在解决需要结合视觉和文本技能的多种问题时的强大工具。在这篇文章中，我探讨了VLMs背景下的提示策略，以有效地使用这些模型进行图像描述等任务。这绝对不是提示策略的详尽或全面列表。随着GenAI的进步，一个越来越明显的事实是，在解决任务时，提示和引导LLMs和VLMs的创造性和创新方法具有无限潜力。对于关于使用VLMs进行提示的补充资源，我也推荐这份来自Azure的[材料](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/gpt-4-v-prompt-engineering)
    [13]。
