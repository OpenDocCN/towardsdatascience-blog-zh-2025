- en: Introduction
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: VLMs are extensions of existing LLMs – particularly in that they process vision
    as an additional modality. VLMs are typically trained with mechanisms that align
    image and text representations in the same representation or vector space, using
    techniques like **cross-attention** [1] [2] [3] [4]. The advantages of such systems
    is that you can interact or "query" images through text as a convenient interface.
    Because of their multi-modal capacity, VLMs are crucial for bridging the gap between
    textual and visual data, opening up a large range of use cases that text-only
    models can’t address. For a more in-depth understanding of how VLMs work, I recommend
    [Sebastian Raschka’s excellent article on multi-modal LLMs](https://sebastianraschka.com/blog/2024/understanding-multimodal-llms.html).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: VLMs（视觉语言模型）是现有LLMs（大型语言模型）的扩展——尤其是在它们将视觉处理作为一个额外的模态。VLMs通常使用将图像和文本表示对齐到同一表示或向量空间中的机制进行训练，使用诸如**交叉注意力**[1]
    [2] [3] [4]等技术。此类系统的优势在于，您可以通过文本作为便捷的界面与图像进行交互或“查询”。由于它们的多模态能力，VLMs对于弥合文本和视觉数据之间的差距至关重要，开辟了仅文本模型无法解决的问题的大量用例。为了更深入地了解VLMs的工作原理，我推荐阅读[Sebastian
    Raschka关于多模态LLMs的优秀文章](https://sebastianraschka.com/blog/2024/understanding-multimodal-llms.html)。
- en: Prompting with VLMs
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用VLMs进行提示
- en: In an earlier blog, I touched upon techniques for [prompting LLMs](https://medium.com/towards-data-science/an-introduction-to-prompting-for-llms-61d36aec2048).
    Similar to LLMs, VLMs can also be prompted using similar techniques – with the
    added advantage of incorporating images to help models better understand the task
    at hand. In this blog, I talk about the common prompting paradigms that apply
    to VLMs, covering zero-shot, few-shot and chain-of-thought prompting. I also explore
    how other deep learning methods can help guide in prompting VLMs – such as integrating
    object detection into prompting strategies. For my experiments, I use **OpenAI’s
    GPT-4o-mini** model which is a VLM.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在一篇早期的博客中，我提到了[提示LLMs](https://medium.com/towards-data-science/an-introduction-to-prompting-for-llms-61d36aec2048)的技术。与LLMs类似，VLMs也可以使用类似的技术进行提示——增加了结合图像以帮助模型更好地理解当前任务的优势。在这篇博客中，我讨论了适用于VLMs的常见提示范式，包括零样本、少样本和思维链提示。我还探讨了其他深度学习方法如何帮助指导VLMs的提示——例如将目标检测集成到提示策略中。在我的实验中，我使用了**OpenAI的GPT-4o-mini**模型，这是一个VLM。
- en: All code and resources used in this blog post are available at this [link on
    github](https://github.com/anand-subu/blog_resources/tree/main/prompting_with_vlms).
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在这篇博客文章中使用的所有代码和资源都可以在以下[github链接](https://github.com/anand-subu/blog_resources/tree/main/prompting_with_vlms)中找到。
