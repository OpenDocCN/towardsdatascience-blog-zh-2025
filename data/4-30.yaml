- en: Prompting Vision Language Models
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用VLMs进行视觉语言模型提示
- en: 原文：[https://towardsdatascience.com/prompting-with-vision-language-models-bdabe00452b7/](https://towardsdatascience.com/prompting-with-vision-language-models-bdabe00452b7/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/prompting-with-vision-language-models-bdabe00452b7/](https://towardsdatascience.com/prompting-with-vision-language-models-bdabe00452b7/)
- en: Vision Language Models (VLMs) represent a significant advancement in processing
    and understanding multimodal data by combining text and visual inputs.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉语言模型（VLMs）通过结合文本和视觉输入，在处理和理解多模态数据方面取得了重大进步。
- en: '![High Level Overview of VLMs. The picture of the cute dog is from Josh Frenette
    on Unsplash. This image is inspired by the representation of VLMs provided in
    this blog from HuggingFace (https://huggingface.co/blog/vlms) (Overall Image By
    Author)](../Images/2c9f3bfd610029c8f32acfed565cf87c.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![VLMs的高级概述。可爱小狗的图片来自Josh Frenette在Unsplash。这幅图像灵感来源于HuggingFace（https://huggingface.co/blog/vlms）在此博客中提供的VLMs表示（整体图片由作者提供）](../Images/2c9f3bfd610029c8f32acfed565cf87c.png)'
- en: High Level Overview of VLMs. The picture of the cute dog is from [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash).
    This image is inspired by the representation of VLMs provided in this blog from
    HuggingFace ([https://huggingface.co/blog/vlms](https://huggingface.co/blog/vlms))
    (Overall Image By Author)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: VLMs的高级概述。可爱小狗的图片来自[Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)。这幅图像灵感来源于HuggingFace在此博客中提供的VLMs表示([https://huggingface.co/blog/vlms](https://huggingface.co/blog/vlms))（整体图片由作者提供）
- en: Unlike Large Language Models (LLMs), which handle only text, VLMs are multimodal,
    enabling users to address tasks requiring both visual and textual comprehension.
    This capability opens up a wide range of applications, such as Visual Question
    Answering (VQA), where models answer questions based on images, and Image Captioning,
    which involves generating descriptive text for images. In this blog post, I explain
    how we can prompt VLMs for tasks requiring visual understanding, and the different
    ways in which we can do so.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 与仅处理文本的大型语言模型（LLMs）不同，VLMs是多模态的，使用户能够处理需要视觉和文本理解的任务。这种能力开辟了广泛的应用，例如视觉问答（VQA），其中模型根据图像回答问题，以及图像描述，这涉及到为图像生成描述性文本。在这篇博客文章中，我解释了如何提示VLMs以执行需要视觉理解的任务，以及我们可以以不同的方式做到这一点。
