- en: '5 Simple Projects to Start Today: A Learning Roadmap for Data Engineering'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 今天开始做的5个简单项目：数据工程学习路线图
- en: 原文：[https://towardsdatascience.com/5-simple-projects-to-start-today-a-learning-roadmap-for-data-engineering-940ecbad6b5f/](https://towardsdatascience.com/5-simple-projects-to-start-today-a-learning-roadmap-for-data-engineering-940ecbad6b5f/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/5-simple-projects-to-start-today-a-learning-roadmap-for-data-engineering-940ecbad6b5f/](https://towardsdatascience.com/5-simple-projects-to-start-today-a-learning-roadmap-for-data-engineering-940ecbad6b5f/)
- en: Tutorials help you to understand the basics. You will definitely learn something.
    However, the real learning effect comes when you directly implement small projects.
    And thus combine theory with practice.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 指南帮助你理解基础知识。你肯定会学到一些东西。然而，真正的学习效果来自于你直接实施小型项目，并将理论与实践相结合。
- en: You will benefit even more if you explain what you have learned to someone else.
    You can also use ChatGPT as a learning partner or tutor – explain in your own
    words what you have learned and get feedback. Use one of the prompts that I have
    attached after the roadmap.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你向他人解释你所学的知识，你会受益更多。你还可以使用ChatGPT作为学习伙伴或导师 – 用你自己的话解释你所学的知识，并获得反馈。使用我在路线图后附上的提示。
- en: In this article, I present a roadmap for 4 months to learn the most important
    concepts in data engineering for beginners. You start with the basics and increase
    the level of difficulty to tackle more complex topics. The only requirements are
    that you have some Python programming skills, basic knowledge of data manipulation
    (e.g. simple SQL queries) and motivation 🚀
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我提出了一份为期4个月的路线图，以学习数据工程初学者最重要的概念。你从基础知识开始，逐步提高难度，以应对更复杂的话题。唯一的要求是你有一些Python编程技能，对数据处理有基本了解（例如简单的SQL查询）以及动力🚀
- en: Why only 4 months?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么只有4个月？
- en: It is much easier for us to commit to a goal over a shorter period of time.
    We stay more focused and motivated. Open your favorite app right away and start
    a project based on the examples. Or set a calendar entry to make time for the
    implementation.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在较短的时间内承诺一个目标对我们来说更容易。我们保持更专注和有动力。立即打开你喜欢的应用并基于示例开始一个项目。或者设置日历条目来为实施留出时间。
- en: 5 projects for your 4-month roadmap
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4个月路线图中的5个项目
- en: As a data engineer, you ensure that the right data is collected, stored and
    prepared in such a way that it is accessible and usable for data scientists and
    analysts.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据工程师，你确保收集、存储和准备的数据对数据科学家和分析人员来说是可访问和可用的。
- en: You are the kitchen chef, so to speak, who organizes the kitchen and ensures
    that all ingredients are fresh and ready to hand. The data scientist is the cook
    chief who combines them into creative dishes.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以说是厨房厨师，负责组织厨房并确保所有原料都是新鲜且随时可用的。数据科学家是主厨，将它们结合成创意菜肴。
- en: Month 1 – Programming and SQL
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1个月 – 编程和SQL
- en: '**Deepen your knowledge of Python basics** CSV and JSON files are common formats
    for data exchange. Learn how to edit CSV and JSON files. Understand how to manipulate
    data with the Python libraries with Pandas and NumPy.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**深化Python基础知识** CSV和JSON文件是数据交换的常见格式。学习如何编辑CSV和JSON文件。了解如何使用Pandas和NumPy库操纵数据。'
- en: '**A small project to start in Month 1** Clean a CSV file with unstructured
    data, prepare it for data analysis and save it in a clean format. Use Pandas for
    data manipulation and basic Python functions for editing.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**第1个月开始的小项目** 清理包含非结构化数据的CSV文件，为数据分析做准备，并以干净格式保存。使用Pandas进行数据处理和基本的Python函数进行编辑。'
- en: Read the file with ‘pd.read_csv()’ and get an overview with ‘df.head()’ and
    ‘df.info()’.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用‘pd.read_csv()’读取文件，并通过‘df.head()’和‘df.info()’获取概览。
- en: 'Remove duplicates with ‘df.drop_duplicates()’ and fill in missing values with
    the average using ‘df.fillna(df.mean())’. Optional: Research what options are
    available to handle missing values.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用‘df.drop_duplicates()’删除重复项，并使用‘df.fillna(df.mean())’用平均值填充缺失值。可选：研究处理缺失值可用的选项。
- en: Create a new column with ‘df[‘new_column’]’, which, for example, fills all rows
    above a certain value with a ‘True’ and all others with a ‘False’.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用‘df[‘new_column’]’创建一个新列，例如，将所有高于某个值的行填充为‘True’，其余的填充为‘False’。
- en: Save the cleansed data with ‘df.to_csv(‘new_name.csv’, index=False)’ in a new
    CSV file.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用‘df.to_csv(‘new_name.csv’, index=False)’将清洗后的数据保存到新的CSV文件中。
- en: What problem does this project solve? Data quality is key. Unfortunately, this
    is not always the case when you receive data in the business world.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目解决了什么问题？数据质量至关重要。不幸的是，在商业世界中接收数据时，这并不总是如此。
- en: '*Tools & Languages: Python (Pandas & NumPy library), Jupyter Lab*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：Python（Pandas & NumPy 库）、Jupyter Lab*'
- en: '**Understanding SQL** SQL allows you to query and organize data efficiently.
    Understand how to use the most important commands such as CREATE TABLE, ALTER
    TABLE, DROP TABLE, SELECT, WHERE, ORDER BY, GROUP BY, HAVING, COUNT, SUM, AVG,
    MAX & MIN, JOIN.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**理解 SQL** SQL 允许你高效地查询和组织数据。了解如何使用最重要的命令，如 CREATE TABLE、ALTER TABLE、DROP TABLE、SELECT、WHERE、ORDER
    BY、GROUP BY、HAVING、COUNT、SUM、AVG、MAX & MIN、JOIN。'
- en: '**A small project to deepen your knowledge in month 1:** Create a relational
    data model that maps real business processes. Do you have a medium-sized bookstore
    in your city? This is certainly a good scenario to start.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一个月的小项目：** 创建一个关系数据模型，以映射真实业务流程。你所在的城市有没有中型书店？这无疑是一个很好的起点场景。'
- en: Think about what data the bookshop manages. For example, books with the data
    title, author, ISBN (unique identification number), customers with the data name,
    e-mail, etc.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑书店管理的数据。例如，包含标题、作者、ISBN（唯一标识符）的书籍，以及包含姓名、电子邮件等数据的客户。
- en: Now draw a diagram that shows the relationships between the data. A bookstore
    has several books, which can be from several authors. Customers buy these books
    at the same time. Think about how this data is connected.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在绘制一个显示数据之间关系的图表。书店有几种书籍，这些书籍可能来自几位作者。客户同时购买这些书籍。考虑这些数据是如何相互关联的。
- en: Next, write down which tables you need and which columns each table has. For
    example, the columns ISBN, title, author and price for the book table. Do this
    step for all the data you identified in step 1.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，列出你需要哪些表以及每个表有哪些列。例如，书籍表中的列有 ISBN、标题、作者和价格。为步骤 1 中确定的所有数据执行此步骤。
- en: 'Optional: Create the tables with ‘CREATE TABLE nametable ();’ in a SQLite database.
    You can create a table with the following code.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可选：使用‘CREATE TABLE nametable ();’在 SQLite 数据库中创建表。你可以使用以下代码创建一个表。
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: What problem does this project solve? With a well thought-out data model, a
    company can efficiently set up important processes such as tracking customer purchases
    or managing inventory.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目解决了什么问题？通过一个精心设计的数据库模型，公司可以高效地设置重要流程，例如跟踪客户购买或管理库存。
- en: '*Tools & languages: SQL, SQLite, MySQL or PostgreSQL*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：SQL、SQLite、MySQL 或 PostgreSQL*'
- en: Month 2 – Databases and ETL pipelines
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二个月 – 数据库和 ETL 管道
- en: '**Mastering relational DBs and NoSQL databases** Understand the concepts of
    tables, relationships, normalization and queries with SQL. Understand what CRUD
    operations (Create, Read, Update, Delete) are. Learn how to store, organize and
    query data efficiently Understand the advantages of NoSQL over relational databases.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**掌握关系数据库和 NoSQL 数据库** 了解表、关系、归一化和 SQL 查询的概念。了解 CRUD 操作（创建、读取、更新、删除）是什么。学习如何高效地存储、组织和查询数据。了解
    NoSQL 相对于关系数据库的优势。'
- en: '*Tools and languages: SQLite, MySQL, PostgreSQL for relational databases; MongoDB
    or Apache Cassandra for NoSQL databases*'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：SQLite、MySQL、PostgreSQL 用于关系数据库；MongoDB 或 Apache Cassandra 用于 NoSQL
    数据库*'
- en: '**Understand the ETL basics** Understand how to extract data from CSV, JSON
    or XML files and from APIs. Learn how to load cleansed data into a relational
    database.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**理解 ETL 基础** 了解如何从 CSV、JSON 或 XML 文件以及从 API 中提取数据。学习如何将清洗后的数据加载到关系数据库中。'
- en: '**A small project for month 2** Create a pipeline that extracts data from a
    CSV file, transforms it and loads it into a SQLite database. Implement a simple
    ETL logic.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二个月的小项目：** 创建一个管道，从 CSV 文件中提取数据，转换它并将其加载到 SQLite 数据库中。实现简单的 ETL 逻辑。'
- en: Load a CSV file with ‘pd.read_csv()’ and get an overview of the data again.
    Again, remove missing values and duplicates (see project 1). You can find publicly
    accessible datasets on Kaggle. For example, search for a dataset with products.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用‘pd.read_csv()’加载 CSV 文件，并再次查看数据概览。同样，删除缺失值和重复项（参见项目 1）。你可以在 Kaggle 上找到公开可访问的数据集。例如，搜索包含产品的数据集。
- en: Create a SQLite database and define a table according to the data from the CSV.
    Below you can see an example code for this. SQLite is easier to get started with,
    as the SQLite library is available in Python by default (module sqlite3).
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据 CSV 数据创建 SQLite 数据库并定义一个表。下面可以看到这个示例的代码。SQLite 更容易上手，因为 SQLite 库在 Python
    中默认可用（模块 sqlite3）。
- en: Load the cleaned data from the DataFrame into the SQLite database with ‘df.to_sql(‘tablename’,
    conn, if_exists=’replace’, index=False)’.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用‘df.to_sql(‘tablename’, conn, if_exists=’replace’, index=False)’将清洗后的数据从 DataFrame
    导入 SQLite 数据库。
- en: Now execute a simple SQL query e.g. with SELECT and ORDER BY. Limit the results
    to 5 outputs. Close the connection to the database at the end.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在执行一个简单的SQL查询，例如使用SELECT和ORDER BY。将结果限制为5个输出。最后关闭数据库连接。
- en: '[PRE1]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '*Tools and languages: Python (SQLAlchemy library), SQL*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：Python（SQLAlchemy库），SQL*'
- en: Month 3 – Workflow orchestration and cloud storage
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3个月 – 工作流程编排和云存储
- en: '**Workflow orchestration** Workflow orchestration means that you automate and
    coordinate processes (tasks) in a specific order. Learn how to plan and execute
    simple workflows. You will also gain a basic understanding of the DAG (Directed
    Acyclic Graph) framework. A DAG is the basic structure in Apache Airflow and describes
    which tasks are executed in a workflow and in which order.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**工作流程编排** 工作流程编排意味着你以特定的顺序自动化和协调流程（任务）。学习如何规划和执行简单的工作流程。你还将获得DAG（有向无环图）框架的基本理解。DAG是Apache
    Airflow的基本结构，描述了工作流程中哪些任务被执行以及执行顺序。'
- en: '*Tools and languages: Apache Airflow*'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：Apache Airflow*'
- en: '**Cloud storage** Learn how to store data in the cloud. Know at least the names
    of the major products from the biggest cloud providers such as S3, EC2, Redshift
    from AWS, BigQuery, Dataflow, Cloud Storage from Google Cloud and Azure Blob Storage,
    Synapse Analytics, Azure Data Factory from Azure. The many different products
    can be overwhelming – start with something you enjoy.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**云存储** 学习如何在云中存储数据。至少了解最大的云服务提供商（如AWS的S3、EC2、Redshift，Google Cloud的BigQuery、Dataflow、Cloud
    Storage，Azure的Blob Storage，Synapse Analytics，Azure Data Factory）的主要产品名称。众多不同的产品可能会让人感到不知所措——从你喜欢的开始。'
- en: '**A small project for month 3** Create a simple workflow orchestration concept
    with Python (without Apache Airflow, as this lowers the barrier to getting started
    for you) that sends you automated reminders during your daily routine:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**第3个月的一个小项目** 使用Python创建一个简单的工作流程编排概念（不使用Apache Airflow，因为这会降低你的入门门槛），在日常生活中发送自动提醒：'
- en: 'Plan the workflow: Define tasks such as reminders to "Drink water", "Exercise
    for 3 minutes" or "Get some fresh air".'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 规划工作流程：定义诸如“喝水”、“锻炼3分钟”或“呼吸新鲜空气”的提醒任务。
- en: 'Create a sequence of the tasks (DAG): Decide the order in which the tasks should
    be executed. Define if they are dependent on each other. For example, Task A ("Drink
    water") runs first, followed by Task B ("Exercise for 3 minutes"), and so on.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建任务序列（DAG）：决定任务执行的顺序。定义它们是否相互依赖。例如，任务A（“喝水”）先执行，然后是任务B（“锻炼3分钟”），依此类推。
- en: 'Implement the task in Python: Write a Python function for each reminder (see
    code snippet 1 below as an example).'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Python中实现任务：为每个提醒编写一个Python函数（见下面的代码片段1作为示例）。
- en: 'Link the tasks: Arrange the functions so that they execute sequentially (see
    code snipped 2 below as an example).'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将任务链接起来：安排函数以便它们按顺序执行（见下面的代码片段2作为示例）。
- en: '[PRE2]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Too easy? Install Apache Airflow and create your first DAG that performs the
    task of printing out "Hello World" or load your transformed data into an S3 bucket
    and analyze it locally.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 太简单了吗？安装Apache Airflow并创建你的第一个DAG，执行打印“Hello World”的任务，或者将转换后的数据加载到S3桶中并本地分析。
- en: '*Tools and languages: AWS, Google Cloud, Azure*'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：AWS，Google Cloud，Azure*'
- en: '![Implement the 5 projects to learn twice as much as if you only look at the
    theory.](../Images/83b0241eb3da6e5054c6048a0be3e0a0.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![通过实施5个项目，你将比只看理论学到的多一倍。](../Images/83b0241eb3da6e5054c6048a0be3e0a0.png)'
- en: Implement the 5 projects to learn twice as much as if you only look at the theory.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施5个项目，你将比只看理论学到的多一倍。
- en: Month 4 – Introduction to Big Data and Visualization
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4个月 – 大数据与可视化简介
- en: '**Big data basics** Understand the basics of Hadoop and Apache Spark. Below
    you can find a great, super-short video from simplilearn to introduce you to Hadoop
    and Apache Spark.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**大数据基础** 理解Hadoop和Apache Spark的基础知识。以下是一个来自simplilearn的极简视频，介绍了Hadoop和Apache
    Spark。'
- en: '*Tools and languages: Hadoop, Apache Spark, PySpark (Python API für Apache
    Spark), Python*'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：Hadoop，Apache Spark，PySpark（Apache Spark的Python API），Python*'
- en: '**Data visualization** Understand the basics of data visualization'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据可视化** 理解数据可视化的基础知识'
- en: '**A small project for month 4** To avoid the need for big data tools like Apache
    Spark or Hadoop, but still apply the concepts, download a dataset from Kaggle,
    analyze it with Python and visualize the results:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**第4个月的一个小项目** 为了避免需要像Apache Spark或Hadoop这样的大数据工具，但仍然应用这些概念，从Kaggle下载一个数据集，用Python分析它并可视化结果：'
- en: Download a publicly available medium sized dataset from Kaggle (e.g. weather
    data), read in the dataset with Pandas and get an overview of your data.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 Kaggle 下载一个公开的中等规模数据集（例如天气数据），使用 Pandas 读取数据集，并了解你的数据概览。
- en: Perform a small exploratory data analysis (EDA).
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行一个小型的探索性数据分析（EDA）。
- en: Create e.g. a line chart of average temperatures or a bar chart of rain and
    sun days per month.
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建例如平均温度的折线图或每月降雨和日照天数的条形图。
- en: '*Tools and languages: Python (Matplotlib & Seaborn libraries)*'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具和语言：Python（Matplotlib & Seaborn 库）*'
- en: 2 prompts to use ChatGPT as a learning partner or tutor
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 作为学习伙伴或导师的 2 个提示
- en: When I learn something new, the two prompts help me to reproduce what I have
    learned and use ChatGPT to check whether I have understood it. Try it out and
    see if it helps you too.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当我学习新事物时，这两个提示帮助我重现我所学的知识，并使用 ChatGPT 检查我是否理解了它。试试看它是否对你也有帮助。
- en: '*I have just learned about the [topic / project] and want to make sure I have
    understood it correctly. Here is my explanation: [your explanation]. Give me feedback
    on my explanation. Add anything that is missing or that I have not explained clearly.*'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*我刚刚学习了[主题/项目]，并想确保我正确理解了它。以下是我的解释：[你的解释]。请对我的解释提供反馈。添加任何遗漏或我没有清楚解释的内容。*'
- en: '*I would like to understand the topic [topic/project] better. Here is what
    I have learned so far: [your explanation]. Are there any mistakes, gaps or tips
    on how I can explain this even better? Optional: How could I expand the project?
    What could I learn next?*'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*我希望更好地理解[主题/项目]。以下是我迄今为止学到的东西：[你的解释]。我的解释中是否有错误、遗漏或如何更好地解释的建议？可选：我如何扩展项目？我接下来可以学习什么？*'
- en: What comes next?
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来是什么？
- en: Deepen the concepts from months 1–4.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深入理解第 1-4 个月的概念。
- en: Learn complex SQL queries such as subqueries and database optimization techniques.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习复杂的 SQL 查询，如子查询和数据库优化技术。
- en: Understand the principles of data warehouses, data lakes and data lakehouses.
    Look at tools such as Snowflake, AmazonRedshift, GoogleBigQuery or Salesforce
    Data Cloud.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解数据仓库、数据湖和数据湖屋的原则。查看 Snowflake、AmazonRedshift、GoogleBigQuery 或 Salesforce Data
    Cloud 等工具。
- en: Learn CI/CD practices for data engineers.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习数据工程师的 CI/CD 实践。
- en: Learn how to prepare data pipelines for machine learning models
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何为机器学习模型准备数据管道
- en: Deepen your knowledge of cloud platforms – especially in the area of serverless
    computing (e.g. AWS Lambda)
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深化你对云平台的知识，特别是在无服务器计算（例如 AWS Lambda）领域。
- en: '![Own visualization - Illustrations from unDraw.co](../Images/f1eb20f8de2b4266aabae9366e0863ac.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![自己的可视化 - 来自 unDraw.co 的插图](../Images/f1eb20f8de2b4266aabae9366e0863ac.png)'
- en: Own visualization – Illustrations from [unDraw.co](https://undraw.co/illustrations)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 自己的可视化 – 来自 [unDraw.co](https://undraw.co/illustrations) 的插图
- en: Final Thoughts
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Companies and individuals are generating more and more data – and the growth
    continues to accelerate. One reason for this is that we have more and more data
    from sources such as IoT devices, social media and customer interactions. At the
    same time, data forms the basis for machine learning models, the importance of
    which will presumably continue to increase in everyday life. The use of cloud
    services such as AWS, Google Cloud or Azure is also becoming more widespread.
    Without well-designed data pipelines and scalable infrastructures, this data can
    neither be processed efficiently nor used effectively. In addition, in areas such
    as e-commerce or financial technology, it is becoming increasingly important that
    we can process data in real-time.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 公司和个人正在生成越来越多的数据 – 而且增长仍在加速。其中一个原因是，我们从物联网设备、社交媒体和客户互动等来源获得了越来越多的数据。同时，数据是机器学习模型的基础，其在日常生活中的重要性预计将继续增加。使用
    AWS、Google Cloud 或 Azure 等云服务也越来越普遍。如果没有设计良好的数据管道和可扩展的基础设施，这些数据既不能被有效地处理，也不能被有效地使用。此外，在电子商务或金融科技等领域，我们能够实时处理数据变得越来越重要。
- en: As data engineers, we create the infrastructure so that the data is available
    for machine learning models and real-time streaming (zero ETL). With the points
    from this roadmap, you can develop the foundations.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据工程师，我们创建基础设施，以便数据可供机器学习模型和实时流式传输（零 ETL）使用。通过这个路线图中的要点，你可以建立基础。
- en: Where can you continue learning?
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你在哪里可以继续学习？
