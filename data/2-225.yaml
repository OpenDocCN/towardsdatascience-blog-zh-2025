- en: Understanding Application Performance with Roofline Modeling
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Roofline建模理解应用性能
- en: 原文：[https://towardsdatascience.com/understanding-application-performance-with-roofline-modeling/](https://towardsdatascience.com/understanding-application-performance-with-roofline-modeling/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/understanding-application-performance-with-roofline-modeling/](https://towardsdatascience.com/understanding-application-performance-with-roofline-modeling/)
- en: <mdspan datatext="el1750375931063" class="mdspan-comment">A common challenge</mdspan>
    with calculating an application’s performance is that the real-world performance
    and theoretical performance can differ. With an ecosystem of products that is
    growing with high performance needs such as High Performance Computing (HPC),
    gaming, or in the current landscape – Large Language Models (LLMs), it is essential
    to calculate accurately the performance of an application.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750375931063" class="mdspan-comment">计算应用性能时常见的挑战</mdspan>是实际性能和理论性能可能不同。随着高性能需求的产品生态系统（如高性能计算（HPC）、游戏或当前环境中的大型语言模型（LLMs））不断增长，准确计算应用性能变得至关重要。
- en: Simply measuring theoretical GFLOPs (Floating-Point Operations Per Second) is
    not enough, as applications rarely reach these maximums in the real world. This
    is where the Roofline Model comes in, offering a clear visual method to estimate
    an application’s performance and highlighting the critical role of hardware-specific
    optimizations.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 简单地测量理论上的每秒浮点运算次数（GFLOPs）是不够的，因为应用很少在现实世界中达到这些最大值。这就是Roofline模型发挥作用的地方，它提供了一种清晰的可视化方法来估计应用性能，并突出了硬件特定优化的关键作用。
- en: Why simple metrics aren’t enough
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么简单的指标不够
- en: 'When we think about measuring performance, there are a few metrics that come
    to mind:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们思考性能测量时，会想到几个指标：
- en: '**Execution time:** This tells you *how long* a task took but offers no insight
    into *why*.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行时间：** 这告诉你任务花费了多长时间，但无法提供关于*为什么*的见解。'
- en: '**Cycles per Instructions (CPI):** This o*nly* measures the processor’s compute
    performance.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每条指令的周期数（CPI）：** 这仅衡量处理器的计算性能。'
- en: '**Serial vs Parallel execution:** Measures compute performance *overlooking*
    any hardware optimizations.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**串行与并行执行：** 该指标衡量计算性能时忽略了任何硬件优化。'
- en: '**Floating Point Operations Per Second (FLOP/s):** This o*nly* represents a
    theoretical maximum which is often not achievable in a real-world scenario.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每秒浮点运算次数（FLOP/s）：** 这仅代表一个理论上的最大值，在现实场景中往往难以实现。'
- en: While these are good metrics, they generally do not provide enough information.
    For instance, using the Floating Point Operations Per Seconds is a theoretical
    limit which is not often achieved. So using that as the *only* metric is not enough
    since it ignores a common performance limiter – data movement.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些是好的指标，但它们通常提供的信息不足。例如，使用每秒浮点运算次数是一个理论极限，通常在现实场景中难以实现。因此，仅使用该指标作为*唯一*的指标是不够的，因为它忽略了常见的性能限制因素——数据移动。
- en: Roofline Modeling
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Roofline建模
- en: The Roofline Model is a powerful tool that visually maps an application’s performance
    against the capabilities of a specific hardware architecture, such as a CPU or
    GPU. The model gets its name from the shape of the graph it produces, which features
    a “roof” composed of a slanted line and a flat, horizontal line. This shape represents
    the ultimate performance limits imposed by the hardware.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Roofline模型是一个强大的工具，它将应用性能与特定硬件架构（如CPU或GPU）的能力进行可视化映射。该模型的名字来源于它产生的图形的形状，该图形具有一个由斜线和水平线组成的“屋顶”。这种形状代表了硬件强加的最终性能限制。
- en: 'From this modeling technique, there are two parameters which define the achievable
    limits with hardware:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 从这种建模技术中，有两个参数定义了硬件可实现的极限：
- en: '**Data movement:** The time it takes to move data, calculated as the total
    data size divided by the system’s peak memory bandwidth.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据移动：** 移动数据所需的时间，计算为总数据大小除以系统的峰值内存带宽。'
- en: '**Computation:** The time required for calculations, determined by dividing
    the total number of floating-point operations by the system’s peak compute performance
    (commonly measured in GFLOP/s).'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算：** 计算所需的时间，通过将总浮点运算次数除以系统的峰值计算性能（通常以GFLOP/s衡量）来确定。'
- en: 'The total execution time of an application is determined by the greater of
    these two values: `max {data_movement, computation}`.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的总执行时间由这两个值中的较大者决定：`max {data_movement, computation}`。
- en: Despite the hardware having better compute performance, data movement can often
    become the bottleneck. Roofline Modeling introduces the concept of **Arithmetic
    Intensity (AI)**. AI is the ratio of floating-point operations performed for every
    byte of data moved from memory.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管硬件具有更好的计算性能，但数据移动往往可能成为瓶颈。Roofline建模引入了**算术强度（AI）**的概念。AI是每移动每字节数据所执行的浮点运算的比率。
- en: An algorithm with high Arithmetic Intensity is considered compute-hungry. Its
    performance is limited by how quickly calculations can be performed.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有高算术强度的算法被认为是计算饥渴型。其性能受限于计算速度。
- en: An algorithm with low Arithmetic Intensity is considered data-hungry. Its performance
    is limited by how quickly data can be moved.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有低算术强度的算法被认为是数据饥渴型。其性能受限于数据移动速度。
- en: Understanding the graph
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解图表
- en: '![Roofline Model Graph](../Images/e003094fea28314733ba1bf8ba308bab.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![Roofline模型图](../Images/e003094fea28314733ba1bf8ba308bab.png)'
- en: '[https://commons.wikimedia.org/wiki/File:Example_of_a_naive_Roofline_model.svg](https://commons.wikimedia.org/wiki/File:Example_of_a_naive_Roofline_model.svg)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://commons.wikimedia.org/wiki/File:Example_of_a_naive_Roofline_model.svg](https://commons.wikimedia.org/wiki/File:Example_of_a_naive_Roofline_model.svg)'
- en: '[Creative Commons](https://en.wikipedia.org/wiki/en:Creative_Commons) [Attribution-Share
    Alike 4.0 International](https://creativecommons.org/licenses/by-sa/4.0/deed.en)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[创意共享](https://en.wikipedia.org/wiki/en:Creative_Commons) [署名-相同方式共享 4.0 国际](https://creativecommons.org/licenses/by-sa/4.0/deed.en)'
- en: A Roofline graph plots the Attainable FLOP/s (y-axis) against the Arithmetic
    Intensity (x-axis). The “roof” itself shows the hardware’s limitations. The slanted
    part of the roof represents the peak data bandwidth (in GB/s), while the flat
    part represents the peak computational performance (in GFLOPS). Note that everything
    in the image is in a logarithmic scale.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Roofline图将可达到的FLOP/s（y轴）与算术强度（x轴）进行对比。屋顶本身显示了硬件的限制。屋顶的斜面部分代表峰值数据带宽（以GB/s计），而平坦部分代表峰值计算性能（以GFLOPS计）。请注意，图像中的所有内容都是对数刻度。
- en: '**Points below the roof:** Indicate suboptimal performance indicating scope
    of improvement.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低于屋顶的点**：表示次优性能，表明改进的范围。'
- en: '**Points hitting the slanted line:** Data hungry application. Its performance
    is limited by data bandwidth.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**击中斜线的点**：数据饥渴型应用程序。其性能受限于数据带宽。'
- en: '**Points hitting the flat line:** Compute hungry application. It is using the
    full computational power of the processor.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**击中平坦线的点**：计算饥渴型应用程序。它正在使用处理器的全部计算能力。'
- en: Why is Roofline Modeling important?
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么Roofline建模很重要？
- en: Roofline Modeling provides a visual, intuitive way to understand application
    performance, showing key characteristics like Operational Intensity, GPU capabilities,
    and attainable FLOP/s. This kind of modeling helps the programmer make targeted
    optimizations to their application for hardware with which better results can
    be obtained.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: Roofline建模提供了一种直观的视觉方式来理解应用程序性能，展示了关键特性如操作强度、GPU能力以及可达到的FLOP/s。这种建模有助于程序员针对他们使用且能获得更好结果的硬件对应用程序进行有针对性的优化。
- en: '**Bottleneck analysis:** Having a visual aid makes it easy for the developer
    to figure out where the bottleneck is – memory or performance. If the application
    is memory intensive, a developer can focus on improving data locality with techniques
    like caching or loop tiling. If it’s compute intensive, the focus can shift to
    enabling more parallel computations or leveraging compiler optimizations.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**瓶颈分析**：拥有视觉辅助工具使得开发者能够轻松地找出瓶颈所在——是内存还是性能。如果应用程序对内存需求较大，开发者可以专注于通过缓存或循环填充等技术来提高数据局部性。如果计算密集，则可以转向启用更多并行计算或利用编译器优化。'
- en: '**Hardware and software design:** Software engineers should not fear the underlying
    hardware. Instead, the hardware design should be embraced and optimized. Software
    engineers can use insights from Roofline Modeling to embrace and optimize for
    the specific architecture they are using.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬件和软件设计**：软件工程师不应害怕底层硬件。相反，应该拥抱并优化硬件设计。软件工程师可以使用Roofline建模的见解来拥抱并针对他们使用的特定架构进行优化。'
- en: Roofline Modeling in Action
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Roofline建模实践
- en: To perform Roofline Modeling, we need to profile the application to understand
    the performance. From profiling, we can get metrics such as Floating Point Operations
    (FLOPs) and memory bandwidth usage, both of which are required for Roofline Modeling.
    This article explores two of these tools – Nvidia’s `ncu` which is the Nsight
    Compute CLI for GPU analysis and PyTorch’s profiler, specifically for applications
    using PyTorch.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了执行 Roofline 模型，我们需要分析应用程序以了解性能。从分析中，我们可以获得如浮点运算（FLOPs）和内存带宽使用等指标，这些对于 Roofline
    模型都是必需的。本文探讨了这些工具中的两个——Nvidia 的 `ncu`，它是用于 GPU 分析的 Nsight Compute CLI，以及 PyTorch
    的分析器，特别是用于使用 PyTorch 的应用程序。
- en: For detailed CUDA kernel optimization and precise FLOP/byte calculations, `ncu`
    provides direct GPU hardware counter information. In contrast, `torch.profiler.profile`
    offers a higher-level perspective within PyTorch, helping in the understanding
    of operator-level performance, tensor memory usage, and the overall application
    behavior encompassing both CPU and GPU activities.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 对于详细的 CUDA 内核优化和精确的 FLOP/byte 计算，`ncu` 提供了直接的 GPU 硬件计数器信息。相比之下，`torch.profiler.profile`
    在 PyTorch 中提供了一个更高级别的视角，有助于理解操作级别的性能、张量内存使用以及包含 CPU 和 GPU 活动的整体应用程序行为。
- en: Profiling with ncu
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 ncu 进行分析
- en: '`ncu` is the command line interface which is used for profiling CUDA kernels
    [2]. It can display results directly in the terminal or save them to a log file
    for later analysis. To build a Roofline model, we need to capture the specific
    metrics that will allow us to calculate Arithmetic Intensity.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '`ncu` 是用于分析 CUDA 内核的命令行界面 [2]。它可以直接在终端显示结果或将它们保存到日志文件以供后续分析。为了构建 Roofline 模型，我们需要捕获将允许我们计算算术强度的特定指标。'
- en: We’ll use the PyTorch ImageNet repository [3] as our example. It’s a good choice
    because it’s easy to understand, well-documented by PyTorch, and works with their
    profiler, so we can really dig into the performance.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用 PyTorch ImageNet 存储库 [3] 作为我们的示例。这是一个不错的选择，因为它易于理解，由 PyTorch 良好地记录，并且与他们的分析器兼容，因此我们可以真正深入性能分析。
- en: 'Step 1: Run the ncu command to collect metrics'
  id: totrans-38
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第1步：运行 ncu 命令以收集指标
- en: 'The first step is to run the application through ncu to collect the necessary
    hardware-level data. The command looks like this:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是通过 ncu 运行应用程序以收集必要的硬件级数据。命令看起来像这样：
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'log-file: The log file in which we want to store the results.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'log-file: 我们想要存储结果的日志文件。'
- en: 'metrics: This is the most important parameter and depicts the metrics that
    we want to capture. For calculating Arithmetic Intensity, we consider:'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指标：这是最重要的参数，描述了我们想要捕获的指标。为了计算算术强度，我们考虑：
- en: '`dram__sectors_write.sum` : sum of DRAM sectors written'
  id: totrans-43
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dram__sectors_write.sum` : 写入的DRAM扇区求和'
- en: '`dram__sectors_read.sum` : sum of DRAM sectors read'
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dram__sectors_read.sum` : 读取的DRAM扇区求和'
- en: '`smsp__sass_thread_inst_executed_op_fadd_pred_on.sum` : sum of floating-point
    additions'
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`smsp__sass_thread_inst_executed_op_fadd_pred_on.sum` : 浮点加法求和'
- en: '`smsp__sass_thread_inst_executed_op_fmul_pred_on.sum` : sum of floating-point
    multiplications'
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`smsp__sass_thread_inst_executed_op_fmul_pred_on.sum` : 浮点乘法求和'
- en: '`smsp__sass_thread_inst_executed_op_ffma_pred_on.sum` : sum of floating-point
    fused multiply add operations'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`smsp__sass_thread_inst_executed_op_ffma_pred_on.sum` : 浮点融合乘加操作的求和'
- en: 'target-process: `all` flag ensures that we profile the entire application.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'target-process: `all` 标志确保我们分析整个应用程序。'
- en: 'Our ncu command changes to:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的 ncu 命令变为：
- en: '[PRE1]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Step 2: Calculating FLOPs from the metrics'
  id: totrans-51
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第2步：从指标计算 FLOPs
- en: 'Once the profiler has run, we can aggregate the collected metrics to calculate
    the total floating-point operations. The formula is:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦分析器运行完毕，我们可以汇总收集到的指标来计算总的浮点运算。公式是：
- en: \[FLOPs = 2 * FMA\_count + FADD\_count + FMUL\_count\]
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: \[FLOPs = 2 * FMA\_count + FADD\_count + FMUL\_count\]
- en: '**FLOPs:** Count of Floating Point Operations.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FLOPs:** 浮点运算的计数。'
- en: '**FMA_count:** Fused Multiply-Add (FMA) operations typically count as 2 FLOPs
    (one multiplication and one addition). This is represented by the `smsp__sass_thread_inst_executed_op_ffma_pred_on.sum`
    metric.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FMA_count:** 融合乘加（FMA）操作通常计为 2 个 FLOPs（一个乘法和一次加法）。这由 `smsp__sass_thread_inst_executed_op_ffma_pred_on.sum`
    指标表示。'
- en: '**FADD_count:** This is represented by the `smsp__sass_thread_inst_executed_op_fadd_pred_on.sum`
    metric.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FADD_count:** 这由 `smsp__sass_thread_inst_executed_op_fadd_pred_on.sum` 指标表示。'
- en: '**FMUL_count:** This is represented by the `smsp__sass_thread_inst_executed_op_fmul_pred_on.sum`
    metric.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FMUL_count:** 这由 `smsp__sass_thread_inst_executed_op_fmul_pred_on.sum` 指标表示。'
- en: 'Step 3: Calculate the bytes transferred'
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第3步：计算传输的字节数
- en: 'Next, we calculate the total data transferred to and from DRAM. The ncu metrics
    provide the number of DRAM sectors read and written. Assuming a common sector
    size of 32 bytes for modern GPUs:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们计算传输到和从DRAM的总数据量。ncu指标提供了读取和写入DRAM扇区的数量。假设现代GPU的扇区大小为32字节：
- en: \[Total\_DRAM\_bytes = (dram\_\_sectors\_read.sum + dram\_\_sectors\_write.sum)
    * 32\]
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: \[Total\_DRAM\_bytes = (dram\_\_sectors\_read.sum + dram\_\_sectors\_write.sum)
    * 32\]
- en: 'Step 4: Calculate the Arithmetic Intensity'
  id: totrans-61
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第4步：计算算术强度
- en: 'With FLOPs and total bytes, we can now calculate the Arithmetic Intensity:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 使用FLOPs和总字节数，我们现在可以计算算术强度：
- en: \[AI = FLOPs / Total\_DRAM\_Bytes\]
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: \[AI = FLOPs / Total\_DRAM\_Bytes\]
- en: 'Step 5: Calculate execution time'
  id: totrans-64
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第5步：计算执行时间
- en: To find the application’s performance in FLOP/s, we also need the execution
    time. For this, we can use NVIDIA Nsight Systems (nsys), a system-wide profiler
    that can accurately measure the runtime of application segments. We run our application
    again, this time with nsys, to generate a time-based report. From this report,
    we can extract the total GPU running time.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到应用程序在FLOP/s中的性能，我们还需要执行时间。为此，我们可以使用NVIDIA Nsight Systems (nsys)，这是一个系统级的分析器，可以精确地测量应用程序段运行时间。我们再次运行我们的应用程序，这次使用nsys来生成基于时间的报告。从这份报告中，我们可以提取总的GPU运行时间。
- en: '[PRE2]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Our nsys command changes to:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的nsys命令变为：
- en: '[PRE3]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: After running this command, we can get the `GPU_RUNNING_TIME`.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此命令后，我们可以获取`GPU_RUNNING_TIME`。
- en: 'Step 6: Calculate the application performance'
  id: totrans-70
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6步：计算应用程序性能
- en: 'Finally, we calculate the achieved performance in FLOP/s by dividing the total
    FLOPs by the execution time:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们通过将总FLOPs除以执行时间来计算实现的性能（FLOP/s）：
- en: \[FLOP/s = FLOPs / GPU\_RUNNING\_TIME\]
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: \[FLOP/s = FLOPs / GPU\_RUNNING\_TIME\]
- en: This value gives us the “attainable FLOP/s” that we can plot on our Roofline
    graph.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这个值给出了我们可以在Roofline图上绘制的“可达到的FLOP/s”。
- en: Profiling with torch
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用torch进行性能分析
- en: 'For applications written in PyTorch, the built-in `torch.profiler.profile`
    offers a user-friendly way to gather performance data. There are 2 options that
    are provided to the developers:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 对于用PyTorch编写的应用程序，内置的`torch.profiler.profile`提供了一个用户友好的方式来收集性能数据。提供了两个选项供开发者选择：
- en: Use the Profiler Context Manager
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用分析器上下文管理器
- en: Targeting Profiling for specific neural network layers
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 针对特定神经网络层的性能分析
- en: Profiler Context Manager
  id: totrans-78
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分析器上下文管理器
- en: The part of the code that we want to profile can be wrapped within the with
    `torch.profiler.profile()` context manager. In the `with` statement, you can define
    the `activities` to trace (CPU, CUDA, or both), set a `schedule` to profile specific
    training steps, and choose whether to record tensor shapes, memory usage, or FLOPs.
    Once inside the context, you must call `prof.step()` at the end of each iteration
    to signal the profiler to advance, especially when a schedule is used.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要分析代码的部分可以包裹在`torch.profiler.profile()`上下文管理器中。在`with`语句中，你可以定义要跟踪的活动（CPU、CUDA或两者），设置一个`schedule`来分析特定的训练步骤，并选择是否记录张量形状、内存使用情况或FLOPs。一旦进入上下文，必须在每个迭代的末尾调用`prof.step()`来通知分析器前进，尤其是在使用schedule的情况下。
- en: '[PRE4]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**activities**: Specify whether to profile the CPU, CUDA or both.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**activities**: 指定是否分析CPU、CUDA或两者。'
- en: '**schedule:** Useful for profiling multiple steps in the training loop. If
    the schedule parameter is used, the profiler needs to call prof.step() to move
    to the next step.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**schedule:** 对于在训练循环中分析多个步骤非常有用。如果使用schedule参数，分析器需要调用prof.step()来移动到下一个步骤。'
- en: '**record_shapes:** Whether to record the shapes of the tensors.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**record_shapes:** 是否记录张量的形状。'
- en: '**profile_memory:** To capture memory usage'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**profile_memory:** 用于捕获内存使用情况'
- en: '**with_flops:** This is experimental but is used to FLOPs with operators.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**with_flops:** 这是一个实验性功能，用于使用算子计算FLOPs。'
- en: 'Our profiler command changes to:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的分析器命令变为：
- en: '[PRE5]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Targeting Profiling for specific neural network layers
  id: totrans-88
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 针对特定神经网络层的性能分析
- en: The profiler can also be used in a more targeted manner to analyze specific
    layers of a neural network. This is useful to check whether some specific layer
    is contributing more to the performance than the other layers giving the developer
    the option of modifying specific layers. While using this is very easy to use,
    in most cases, the first option works better. The PyTorch profiler results can
    also be exported and visualized on a TensorBoard.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 分析器也可以更具体地用于分析神经网络的具体层。这有助于检查某些特定层是否比其他层对性能的贡献更大，从而给开发者提供修改特定层的选项。虽然使用起来非常简单，但在大多数情况下，第一个选项效果更好。PyTorch分析器的结果也可以导出并在TensorBoard上可视化。
- en: '[PRE6]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: LLMs and Roofline Modeling
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs和Roofline建模
- en: Coming to the topic everyone has been waiting for – does Roofline Modeling help
    with LLM performance calculation? The short answer is yes.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 来到大家一直期待的话题——屋顶线建模是否有助于LLM性能计算？简短的答案是肯定的。
- en: LLMs are complex neural network architectures with billions of parameters and
    the massive datasets that they process. While training is a very resource-intensive
    task, inference and fine tuning the model also need to be efficient.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs是具有数十亿参数的复杂神经网络架构，以及它们处理的庞大数据集。虽然训练是一个非常资源密集的任务，但推理和微调模型也需要高效。
- en: '**Bottlenecks:** LLMs during inference can suffer from bottlenecks due to the
    sheer amount of parameters that it is working with. These parameters are the weights
    of the models and they cause memory bandwidth issues. Using Roofline Modeling,
    the exact layers can be profiled for the bottlenecks.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**瓶颈：** 在推理过程中，LLM可能会因为处理的大量参数而遭受瓶颈。这些参数是模型的权重，它们导致内存带宽问题。使用屋顶线建模，可以针对瓶颈进行精确的层分析。'
- en: '**Hardware selection:** As most organizations fine-tune existing models rather
    than training them from scratch, choosing the right infrastructure is crucial
    for managing costs. This underscores the importance of choosing optimal infrastructure
    for training. For example, choosing the hardware according to your LLM architecture
    or optimizing your model to run on a specific architecture can cut training and
    inference costs.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬件选择：** 由于大多数组织更倾向于微调现有模型而不是从头开始训练，因此选择正确的基础设施对于管理成本至关重要。这强调了选择最佳基础设施进行训练的重要性。例如，根据您的LLM架构选择硬件或优化模型以在特定架构上运行可以降低训练和推理成本。'
- en: Conclusion
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The Roofline Model offers a powerful visual analysis of application performance
    optimization. By visualizing the application performance across memory and compute,
    a clear guidance is provided in choosing the best way to approach optimizations.
    While this article only considered Naive Roofline Models, there are more advanced
    techniques such as Hierarchical Roofline Models or adding ceilings for specific
    compute optimizations.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 屋顶线模型提供了对应用程序性能优化的强大可视化分析。通过可视化应用程序在内存和计算方面的性能，提供了明确的指导，以选择最佳的方法来接近优化。虽然这篇文章只考虑了简单的屋顶线模型，但还有更高级的技术，例如分层屋顶线模型或为特定的计算优化添加天花板。
