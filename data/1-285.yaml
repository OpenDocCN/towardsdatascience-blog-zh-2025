  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| **选择误差** | 0.053 | 0.027 | 0.036 |'
- en: Unsurprisingly, increasing the number of estimators five-fold increased the
    time to fit significantly (in this case by six-fold, but that may just be a one-off).
    However, we still haven’t surpassed the scores of the constrained trees above
    — I guess we’ll need to do a hyperparameter search to see if we can beat them.
    Also, for the chosen block, as can be seen in the plot, after about 300 iterations
    none of the models really improved. If this is consistent across all the data,
    then the extra 700 iterations were unnecessary. I mentioned earlier about how
    it’s possible to avoid wasting time iterating without improving; now’s time to
    look into that.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 毫不奇怪，将估计器的数量增加五倍显著增加了拟合时间（在这种情况下增加了六倍，但这可能只是偶然）。然而，我们还没有超过上述约束树的分数——我想我们需要进行超参数搜索，看看我们是否能打败它们。此外，对于所选块，如图所示，在约300次迭代后，没有模型真正得到改善。如果这在所有数据中都是一致的，那么额外的700次迭代是不必要的。我之前提到过，如何避免在没有改善的情况下浪费时间迭代；现在是时候深入研究这一点了。
- en: '**n_iter_no_change, validation_fraction, and tol**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**n_iter_no_change，validation_fraction，和 tol**'
- en: It’s possible for additional iterations to not improve the final result, yet
    it still takes time to run them. This is where early stopping comes in.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 有可能额外的迭代不会改善最终结果，但运行它们仍然需要时间。这就是提前停止发挥作用的地方。
- en: There are three relevant hyperparameters. The first, `n_iter_no_change`, is
    how many iterations for there to be “no change” before doing no more iterations.
    `tol`[erance] is how big the change in validation score should be to be classified
    as “no change”. And `validation_fraction` is how much of the training data to
    be used as a validation set to generate the validation score (note this is separate
    from the test data).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 有三个相关的超参数。第一个，`n_iter_no_change`，是指在进行更多迭代之前，有多少次迭代没有变化。`tol`[erance] 是验证分数变化的大小，以被分类为“没有变化”。`validation_fraction`
    是用作验证集以生成验证分数的训练数据量（注意这不同于测试数据）。
- en: 'Comparing a 1000-estimator GBT with one with a fairly aggressive early stopping
    — `n_iter_no_change=5, validation_fraction=0.1, tol=0.005` — the latter one stopped
    after only 61 estimators (and hence only took 5~6% of the time to fit):'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 比较一个有1000个估计器的GBT和一个有相当激进的提前停止的GBT——`n_iter_no_change=5，validation_fraction=0.1，tol=0.005`——后者在只有61个估计器后停止（因此只用了5~6%的时间来拟合）：
- en: '![](../Images/d504df0a68c4bec353925cf948cd57d5.png)'
  id: totrans-94
