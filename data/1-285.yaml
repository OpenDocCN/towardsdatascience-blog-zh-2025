- en: A Visual Guide to Tuning Gradient Boosted Trees
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 梯度提升树的调参指南
- en: 原文：[https://towardsdatascience.com/a-visual-guide-to-tuning-gradient-boosted-trees/](https://towardsdatascience.com/a-visual-guide-to-tuning-gradient-boosted-trees/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-visual-guide-to-tuning-gradient-boosted-trees/](https://towardsdatascience.com/a-visual-guide-to-tuning-gradient-boosted-trees/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: My [previous](https://towardsdatascience.com/visualising-decision-trees/) [posts](https://towardsdatascience.com/a-visual-guide-to-tuning-random-forest-hyperparameters/)
    looked at the bog-standard decision tree and the wonder of a random forest. Now,
    to complete the triplet, I’ll visually explore <mdspan datatext="el1757962485769"
    class="mdspan-comment">gradient boosted trees</mdspan>!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我的[之前](https://towardsdatascience.com/visualising-decision-trees/) [帖子](https://towardsdatascience.com/a-visual-guide-to-tuning-random-forest-hyperparameters/)探讨了标准的决策树和随机森林的奇迹。现在，为了完成这个三元组，我将可视化地探索<mdspan
    datatext="el1757962485769" class="mdspan-comment">梯度提升树</mdspan>！
- en: There are a bunch of gradient boosted tree libraries, including XGBoost, CatBoost,
    and LightGBM. However, for this I’m going to use sklearn’s one. Why? Simply because,
    compared with the others, it allowed me to visualise easier. In practice I tend
    to use the other libraries more than the sklearn one; however, this project is
    about visual learning, not pure performance.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多梯度提升树库，包括XGBoost、CatBoost和LightGBM。然而，对于这个项目，我将使用sklearn的库。为什么？简单来说，与其他库相比，它让我更容易可视化。在实践中，我倾向于使用其他库多于sklearn；然而，这个项目是关于可视化学习，而不是纯性能。
- en: Fundamentally, a GBT is a combination of trees that *only work together*. While
    a single decision tree (including one extracted from a random forest) can make
    a decent prediction by itself, taking an individual tree from a GBT is unlikely
    to give anything usable.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，GBT是树的组合，*只协同工作*。虽然单个决策树（包括从随机森林中提取的一个）可以独立做出合理的预测，但从GBT中提取单个树不太可能得到任何有用的结果。
- en: Beyond this, as always, no theory, no maths — just plots and hyperparameters.
    As before, I’ll be using the California housing dataset via scikit-learn (CC-BY),
    the same general process as described in my previous posts, the code is at [https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees](https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees),
    and all images below are created by me (apart from the GIF, which is from [Tenor](https://tenor.com/view/ryu-haduken-street-figfter-gif-601629130662770429)).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这个，一如既往，没有理论，没有数学——只有图表和超参数。就像以前一样，我将使用scikit-learn的加利福尼亚住房数据集（CC-BY），与我在之前的帖子中描述的相同的一般过程，代码在[https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees](https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees)，下面的所有图像都是我制作的（除了GIF，它来自[Tenor](https://tenor.com/view/ryu-haduken-street-figfter-gif-601629130662770429)）。
- en: A basic gradient boosted tree
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个基本的梯度提升树
- en: 'Starting with a basic GBT: `gb = GradientBoostingRegressor(random_state=42)`.
    Similar to other tree types, the default settings for `min_samples_split`, `min_samples_leaf`,
    `max_leaf_nodes` are 2, 1, `None` respectively. Interestingly, the default `max_depth`
    is 3, not `None` as it is with decision trees/random forests. Notable hyperparameters,
    which I’ll look into more later, include `learning_rate` (how steep the gradient
    is, default 0.1), and `n_estimators` (similar to random forest — the number of
    trees).'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个基本的GBT开始：`gb = GradientBoostingRegressor(random_state=42)`。与其他树类型类似，`min_samples_split`、`min_samples_leaf`、`max_leaf_nodes`的默认设置分别是2、1、`None`。有趣的是，默认的`max_depth`是3，而不是决策树/随机森林中的`None`。值得注意的超参数，我稍后会进一步探讨，包括`learning_rate`（梯度有多陡，默认0.1）和`n_estimators`（与随机森林类似——树的数量）。
- en: 'Fitting took 2.2s, predicting took 0.005s, and the results:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 调整需要2.2秒，预测需要0.005秒，结果如下：
- en: '| Metric | max_depth=None |'
  id: totrans-10
  prefs: []
  type: TYPE_TB
  zh: '| 指标 | max_depth=None |'
- en: '| --- | --- |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| **MAE** | 0.369 |'
  id: totrans-12
  prefs: []
  type: TYPE_TB
  zh: '| **MAE** | 0.369 |'
- en: '| **MAPE** | 0.216 |'
  id: totrans-13
  prefs: []
  type: TYPE_TB
  zh: '| **MAPE** | 0.216 |'
- en: '| **MSE** | 0.289 |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
  zh: '| **MSE** | 0.289 |'
- en: '| **RMSE** | 0.538 |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| **RMSE** | 0.538 |'
- en: '| **R²** | 0.779 |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| **R²** | 0.779 |'
- en: So, quicker than the default random forest, but slightly worse performance.
    For my chosen block, it predicted 0.803 (actual 0.894).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，比默认的随机森林快，但性能略差。对于我选择的块，它预测了0.803（实际值为0.894）。
- en: Visualising
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化
- en: This is why you’re here, right?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你们在这里的原因，对吧？
- en: '**The tree**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**树**'
- en: 'Similar to before, we can plot a single tree. This is the first one, accessed
    with `gb.estimators_[0, 0]`:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前类似，我们可以绘制一棵单独的树。这是第一棵，通过`gb.estimators_[0, 0]`访问：
- en: '![](../Images/0725dca162d9d580374f53f339430770.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0725dca162d9d580374f53f339430770.png)'
- en: 'I’ve explained these in the previous posts, so I won’t do so again here. One
    thing I will bring to your attention though: notice how terrible the values are!
    Three of the leaves even have negative values, which we know cannot be the case.
    This is why a GBT only works as a combined ensemble, not as separate standalone
    trees like in a random forest.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我在之前的帖子中解释了这些，所以这里不再重复。不过，我要提醒你一点：注意这些值有多糟糕！三个叶子节点甚至有负值，我们知道这是不可能的。这就是为什么 GBT
    只能作为一个组合集成工作，而不能像随机森林中的单独树那样独立工作。
- en: '**Predictions and errors**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**预测和误差**'
- en: 'My favourite way to visualise GBTs is with prediction vs iteration plots, using
    `gb.staged_predict`. For my chosen block:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的可视化 GBTs 的方法是使用预测与迭代图，使用 `gb.staged_predict`。对于我选择的块：
- en: '![](../Images/720e66d982820f959dd13cb7a2bca69f.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/720e66d982820f959dd13cb7a2bca69f.png)'
- en: Remember the default model has 100 estimators? Well, here they are. The initial
    prediction was way off — 2! But each time it learnt (remember `learning_rate`?),
    and got closer to the real value. Of course, it was trained on the training data,
    not this specific data, so the final value was off (0.803, so about 10% off),
    but you can clearly see the process.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 记得默认模型有 100 个估计器吗？嗯，这里就是它们。初始预测远远不准确——2！但每次它学习（记得 `learning_rate` 吗？），就越来越接近真实值。当然，它是基于训练数据训练的，而不是这个具体的数据，所以最终值是不准确的（0.803，大约
    10% 的误差），但你可以清楚地看到这个过程。
- en: In this case, it reached a fairly steady state after about 50 iterations. Later
    we’ll see how to stop iterating at this stage, to avoid wasting time and money.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，它在大约 50 次迭代后达到了相当稳定的状态。稍后我们将看到如何在这个阶段停止迭代，以避免浪费时间和金钱。
- en: 'Similarly, the error (i.e. the prediction minus the true value) can be plotted.
    Of course, this gives us the same plot, simply with different y-axis values:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，误差（即预测值与真实值之差）也可以绘制。当然，这给出了相同的图表，只是 y 轴的值不同：
- en: '![](../Images/d1c423aa7b2941f9b422205d4dc5f085.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d1c423aa7b2941f9b422205d4dc5f085.png)'
- en: Let’s take this one step further! The test data has over 5000 blocks to predict;
    we can loop through each, and predict them all, for each iteration!
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更进一步！测试数据有超过 5000 个块需要预测；我们可以遍历每个块，并对每个迭代进行预测！
- en: '![](../Images/8489d325e3739efbeefb3ade4c5ee81d.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8489d325e3739efbeefb3ade4c5ee81d.png)'
- en: I love this plot.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢这个图表。
- en: '![](../Images/d19731e1fa54673fc258c8e8532fb437.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d19731e1fa54673fc258c8e8532fb437.png)'
- en: They all start around 2, but explode across the iterations. We know all the
    true values vary from 0.15 to 5, with a mean of 2.1 (check my [first post](https://towardsdatascience.com/visualising-decision-trees/)),
    so this spreading out of predictions (from ~0.3 to ~5.5) is as expected.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 它们都是从 2 开始，但在迭代过程中爆炸式增长。我们知道所有真实值从 0.15 到 5 变化，平均值为 2.1（检查我的 [第一篇帖子](https://towardsdatascience.com/visualising-decision-trees/)），所以预测值的这种分散（从
    ~0.3 到 ~5.5）是预期的。
- en: 'We can also plot the errors:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以绘制误差图：
- en: '![](../Images/40597890e5b550f9221dc9f977046481.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/40597890e5b550f9221dc9f977046481.png)'
- en: At first glance, it seems a bit strange — we’d expect them to start at, say,
    ±2, and converge on 0\. Looking carefully though, this does happen for most —
    it can be seen in the left-hand side of the plot, the first 10 iterations or so.
    The problem is, with over 5000 lines on this plot, there are a lot of overlapping
    ones, making the outliers stand out more. Perhaps there’s a better way to visualise
    these? How about…
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 初看之下，这似乎有点奇怪——我们预计它们将从，比如说，±2 开始，并收敛到 0。但仔细观察后，这种情况确实发生在大多数情况下——可以在图表的左侧看到，大约前
    10 次迭代。问题是，在这个图表上有超过 5000 条线，有很多重叠，使得异常值更加突出。也许有更好的可视化方法？比如...
- en: '![](../Images/2a3b81cf1fd1d6847171e31afb1ee20b.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2a3b81cf1fd1d6847171e31afb1ee20b.png)'
- en: The median error is 0.05 — which is very good! The IQR is less than 0.5, which
    is also decent. So, while there are some terrible predictions, most are decent.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 中位数误差为 0.05——这非常好！IQR 小于 0.5，这也是不错的。所以，虽然有一些糟糕的预测，但大多数都是不错的。
- en: Hyperparameter tuning
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超参数调整
- en: '**Decision tree hyperparameters**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**决策树超参数**'
- en: Same as before, let’s compare how the hyperparameters explored in the original
    decision tree post apply to GBTs, with the default hyperparameters of `learning_rate
    = 0.1, n_estimators = 100`. The `min_samples_leaf`, `min_samples_split`, and `max_leaf_nodes`
    one also have `max_depth = 10`, to make it a fair comparison to previous posts
    and to each other.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 和之前一样，让我们比较一下原始决策树帖子中探索的超参数如何应用于 GBTs，使用默认超参数 `learning_rate = 0.1, n_estimators
    = 100`。`min_samples_leaf`、`min_samples_split` 和 `max_leaf_nodes` 的 `max_depth`
    也设置为 10，以便与之前的帖子以及彼此进行公平的比较。
- en: '| Model | max_depth=None | max_depth=10 | min_samples_leaf=10 | min_samples_split=10
    | max_leaf_nodes=100 |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | max_depth=None | max_depth=10 | min_samples_leaf=10 | min_samples_split=10
    | max_leaf_nodes=100 |'
- en: '| --- | --- | --- | --- | --- | --- |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- | --- |'
- en: '| **Fit Time (s)** | 10.889 | 7.009 | 7.101 | 7.015 | 6.167 |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| **拟合时间（秒）** | 10.889 | 7.009 | 7.101 | 7.015 | 6.167 |'
- en: '| **Predict Time (s)** | 0.089 | 0.019 | 0.015 | 0.018 | 0.013 |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| **预测时间（秒）** | 0.089 | 0.019 | 0.015 | 0.018 | 0.013 |'
- en: '| **MAE** | 0.454 | 0.304 | 0.301 | 0.302 | 0.301 |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| **MAE** | 0.454 | 0.304 | 0.301 | 0.302 | 0.301 |'
- en: '| **MAPE** | 0.253 | 0.177 | 0.174 | 0.174 | 0.175 |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| **MAPE** | 0.253 | 0.177 | 0.174 | 0.174 | 0.175 |'
- en: '| **MSE** | 0.496 | 0.222 | 0.212 | 0.217 | 0.210 |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| **MSE** | 0.496 | 0.222 | 0.212 | 0.217 | 0.210 |'
- en: '| **RMSE** | 0.704 | 0.471 | 0.46 | 0.466 | 0.458 |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| **RMSE** | 0.704 | 0.471 | 0.46 | 0.466 | 0.458 |'
- en: '| **R²** | 0.621 | 0.830 | 0.838 | 0.834 | 0.840 |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| **R²** | 0.621 | 0.830 | 0.838 | 0.834 | 0.840 |'
- en: '| **Chosen Prediction** | 0.885 | 0.906 | 0.962 | 0.918 | 0.923 |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| **选择预测** | 0.885 | 0.906 | 0.962 | 0.918 | 0.923 |'
- en: '| **Chosen Error** | 0.009 | 0.012 | 0.068 | 0.024 | 0.029 |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| **选择误差** | 0.009 | 0.012 | 0.068 | 0.024 | 0.029 |'
- en: Unlike decision trees and random forests, the deeper tree performed far worse!
    And took longer to fit. However, increasing the depth from 3 (the default) to
    10 has improved the scores. The other constraints resulted in further improvements
    — again showing how all hyperparameters can play a role.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 与决策树和随机森林不同，深度更大的树表现远差！并且拟合时间更长。然而，将深度从3（默认）增加到10提高了分数。其他约束条件导致了进一步的改进——再次表明所有超参数都可以发挥作用。
- en: '**learning_rate**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**learning_rate**'
- en: GBTs operate by tweaking predictions after each iteration based on the error. 
    The higher the adjustment (a.k.a. the gradient, a.k.a. the learning rate), the
    more the prediction changes between iterations.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: GBTs通过根据每次迭代的误差调整预测来运行。调整幅度越大（即梯度，即学习率），预测在迭代之间的变化就越大。
- en: 'There is a clear trade-off for learning rate. Comparing learning rates of 0.01
    (Slow), 0.1 (Default), and 0.5 (Fast), over 100 iterations:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 学习率存在明显的权衡。比较0.01（慢速）、0.1（默认）和0.5（快速）的学习率，经过100次迭代：
- en: '![](../Images/3a0bdffd4b9f4d12d3b96c20cf6979ec.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3a0bdffd4b9f4d12d3b96c20cf6979ec.png)'
- en: 'Faster learning rates can get to the correct value quicker, but they’re more
    likely to overcorrect and jump past the true value (think fishtailing in a car),
    and can lead to oscillations. Slow learning rates may never reach the correct
    value (think… not turning the steering wheel enough and driving straight into
    a tree). As for the stats:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 更快的学习率可以更快地达到正确值，但它们更容易过度校正并跳过真实值（想想汽车打滑），并可能导致振荡。慢速学习率可能永远无法达到正确值（想想……没有足够转动方向盘，直接撞到树上）。至于统计数据：
- en: '| Model | Default | Fast | Slow |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | 默认 | 快速 | 慢速 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| **Fit Time (s)** | 2.159 | 2.288 | 2.166 |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| **拟合时间（秒）** | 2.159 | 2.288 | 2.166 |'
- en: '| **Predict Time (s)** | 0.005 | 0.004 | 0.015 |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| **预测时间（秒）** | 0.005 | 0.004 | 0.015 |'
- en: '| **MAE** | 0.370 | 0.338 | 0.629 |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| **MAE** | 0.370 | 0.338 | 0.629 |'
- en: '| **MAPE** | 0.216 | 0.197 | 0.427 |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| **MAPE** | 0.216 | 0.197 | 0.427 |'
- en: '| **MSE** | 0.289 | 0.247 | 0.661 |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| **MSE** | 0.289 | 0.247 | 0.661 |'
- en: '| **RMSE** | 0.538 | 0.497 | 0.813 |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| **RMSE** | 0.538 | 0.497 | 0.813 |'
- en: '| **R²** | 0.779 | 0.811 | 0.495 |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| **R²** | 0.779 | 0.811 | 0.495 |'
- en: '| **Chosen Prediction** | 0.803 | 0.949 | 1.44 |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| **选择预测** | 0.803 | 0.949 | 1.44 |'
- en: '| **Chosen Error** | 0.091 | 0.055 | 0.546 |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| **选择误差** | 0.091 | 0.055 | 0.546 |'
- en: Unsurprisingly, the slow learning model was terrible. For this block, fast was
    slightly better than the default overall. However, we can see on the plot how,
    at least for the chosen block, it was the last 90 iterations that got the fast
    model to be more accurate than the default one — if we’d stopped at 40 iterations,
    for the chosen block at least, the default model would have been far better. The
    joys of visualisation!
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 慢速学习模型的表现出人意料地糟糕。对于这个区块，快速模型整体上略好于默认模型。然而，我们可以从图中看到，至少对于所选区块，是最后90次迭代使快速模型比默认模型更准确——如果我们只进行到40次迭代，至少对于所选区块，默认模型会更好。可视化带来的乐趣！
- en: '**n_estimators**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**n_estimators**'
- en: As mentioned above, the number of estimators goes hand in hand with the learning
    rate. *In general*, the more estimators the better, as it gives more iterations
    to measure and adjust for the error — although this comes at an additional time
    cost.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，估计器的数量与学习率密切相关。*一般来说*，估计器越多越好，因为它提供了更多的迭代来测量和调整误差——尽管这会带来额外的时间成本。
- en: 'As seen above, a sufficiently high number of estimators is especially important
    for a low learning rate, to ensure the correct value is reached. Increasing the
    number of estimators to 500:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，足够高的估计器数量对于低学习率尤为重要，以确保达到正确的值。将估计器的数量增加到500：
- en: '![](../Images/7cff0b6d1d0465e6a80fa4c1420da8c6.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7cff0b6d1d0465e6a80fa4c1420da8c6.png)'
- en: 'With enough iterations, the slow learning GBT did reach the true value. In
    fact, they all ended up much closer. The stats confirm this:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 足够的迭代次数后，学习速度较慢的GBT确实达到了真实值。事实上，它们最终都接近了。统计数据证实了这一点：
- en: '| Model | DefaultMore | FastMore | SlowMore |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | 默认More | 快速More | 慢速More |'
- en: '| --- | --- | --- | --- |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| **Fit Time (s)** | 12.254 | 12.489 | 11.918 |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| **拟合时间 (s)** | 12.254 | 12.489 | 11.918 |'
