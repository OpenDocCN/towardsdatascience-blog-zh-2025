- en: 'But as always, the question to ask: is it worth investing 20x the time to improve
    the R² by 10%, or reducing the error by 20%?'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 但一如既往，需要问的问题是：是否值得投入20倍的时间来提高R² 10%，或者减少20%的误差？
- en: Bayes searching
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 贝叶斯搜索
- en: 'You were probably expecting this. The search spaces:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能期待看到这个。搜索空间：
- en: '[PRE0]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Most are similar to my previous posts; the only additional hyperparameter is
    `learning_rate`.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数与我的之前的帖子相似；唯一的额外超参数是 `learning_rate`。
- en: 'It took the longest so far, at 96 mins (~50% more than the random forest!)
    The best hyperparameters are:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这到目前为止花费了最长时间，96 分钟（比随机森林多出约 50%）！最佳超参数如下：
- en: '[PRE1]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`max_features`, `max_leaf_nodes`, and `min_samples_leaf`, are very similar
    to the tuned random forest. `n_estimators` is too, and it aligns with what the
    chosen block plot above suggested — the extra 700 iterations were mostly unnecessary.
    However, compared with the tuned random forest, the trees are only a third as
    deep, and `min_samples_split` is far higher than we’ve seen so far. The value
    of `learning_rate` was not too surprising based on what we saw above.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '`max_features`、`max_leaf_nodes` 和 `min_samples_leaf` 与调整过的随机森林非常相似。`n_estimators`
    也是如此，并且与上面选择的块图建议一致——额外的 700 次迭代大多是不必要的。然而，与调整过的随机森林相比，这些树只有三分之一的深度，而 `min_samples_split`
    的值远高于我们迄今为止看到的。`learning_rate` 的值基于我们上面的观察并不令人惊讶。'
- en: 'And the cross-validated scores:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 以及交叉验证的分数：
