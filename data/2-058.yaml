- en: 'Agentic AI: On Evaluations'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理AI：关于评估
- en: 原文：[https://towardsdatascience.com/agentic-ai-evaluation-playbook/](https://towardsdatascience.com/agentic-ai-evaluation-playbook/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/agentic-ai-evaluation-playbook/](https://towardsdatascience.com/agentic-ai-evaluation-playbook/)
- en: <mdspan datatext="el1754592262853" class="mdspan-comment">Agentic Evals are</mdspan>
    mostly a<mdspan datatext="el1754430863368" class="mdspan-comment">bout testing
    your LLM application to make sure it performs consistently.</mdspan>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754592262853" class="mdspan-comment">代理评估主要是</mdspan>测试您的LLM应用以确保其性能的一致性。
- en: It’s not the most exciting topic, but more and more companies are paying attention.
    So it’s worth digging into which metrics to track to actually measure that performance.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个最激动人心的主题，但越来越多的公司开始关注。因此，了解要跟踪哪些指标来实际衡量性能是值得的。
- en: It also helps to have proper evals in place anytime you push changes, to make
    sure things don’t go haywire.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在您推送更改时，拥有适当的评估也很重要，以确保事情不会变得混乱。
- en: So, for this article I’ve done some research on common metrics for multi-turn
    chatbots, RAG, and agentic applications.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于这篇文章，我对多轮聊天机器人、RAG和代理应用的常见指标进行了一些研究。
- en: I’ve also included a quick review of frameworks like DeepEval, RAGAS, and OpenAI’s
    Evals library, so you know when to pick what.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我还简要回顾了DeepEval、RAGAS和OpenAI的Evals库等框架，以便您知道何时选择什么。
- en: '![The different popular frameworks we’ll cover later around performing evals
    | Image by author](../Images/169ddba3f12963cf603579ebbc4a6166.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![我们将要覆盖的执行评估的不同流行框架 | 图片由作者提供](../Images/169ddba3f12963cf603579ebbc4a6166.png)'
- en: This article is split in two. If you’re new, Part 1 talks a bit about traditional
    metrics like BLEU and ROUGE, touches on LLM benchmarks, and introduces the idea
    of using an LLM as a judge in evals.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章分为两部分。如果您是新手，第一部分会简要介绍传统的指标，如BLEU和ROUGE，涉及LLM基准，并介绍在评估中使用LLM作为评委的想法。
- en: If this isn’t new to you, you can skip this. Part 2 digs into evaluations of
    different kinds of LLM applications.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这对您来说不是新内容，您可以跳过这部分。第二部分将深入探讨不同类型LLM应用的评估。
- en: What we did before
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们之前做了什么
- en: If you’re well versed in how we evaluate NLP tasks and how public benchmarks
    work, you can skip this first part.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对如何评估NLP任务以及公共基准如何工作非常熟悉，您可以跳过这部分。
- en: If you’re not, it’s good to know what the earlier metrics like accuracy and
    BLEU were originally used for and how they work, along with understanding how
    we test for public benchmarks like MMLU.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不熟悉，了解早期指标如准确性和BLEU最初用于什么以及它们是如何工作的，以及了解我们如何测试公共基准如MMLU，是很好的。
- en: Evaluating NLP tasks
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估NLP任务
- en: When we evaluate traditional NLP tasks such as classification, translation,
    summarization, and so on, we turn to traditional metrics like accuracy, precision,
    F1, BLEU, and ROUGE
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们评估传统的NLP任务，如分类、翻译、摘要等时，我们转向传统的指标，如准确率、精确率、F1、BLEU和ROUGE。
- en: '![](../Images/d756c4a2120baec316130daa8da3319b.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d756c4a2120baec316130daa8da3319b.png)'
- en: These metrics are still used today, but mostly when the model produces a single,
    easily comparable “right” answer.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标至今仍在使用，但主要是在模型产生单一、易于比较的“正确”答案时。
- en: Take classification, for example, where the task is to assign each text a single
    label. To test this, we can use accuracy by comparing the label assigned by the
    model to the reference label in the eval dataset to see if it got it right.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 以分类为例，任务是为每个文本分配一个单独的标签。为了测试这一点，我们可以使用准确率，通过比较模型分配的标签与评估数据集中的参考标签，看看它是否正确。
- en: 'It’s very clear-cut: if it assigns the wrong label, it gets a 0; if it assigns
    the correct label, it gets a 1.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常明确：如果它分配了错误的标签，它得到0分；如果它分配了正确的标签，它得到1分。
- en: This means if we build a classifier for a spam dataset with 1,000 emails, and
    the model labels 910 of them correctly, the accuracy would be 0.91.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着如果我们为包含1,000封电子邮件的垃圾邮件数据集构建一个分类器，并且模型正确标记了其中的910封，那么准确率将是0.91。
- en: For text classification, we often also use F1, precision, and recall.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于文本分类，我们通常还使用F1、精确率和召回率。
- en: When it comes to NLP tasks like summarization and machine translation, people
    often used ROUGE and BLEU to see how closely the model’s translation or summary
    lines up with a reference text.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到摘要和机器翻译等NLP任务时，人们经常使用ROUGE和BLEU来查看模型的翻译或摘要与参考文本的匹配程度。
- en: Both scores count overlapping n-grams, and while the direction of the comparison
    is different**,** essentially it just means the more shared word chunks, the higher
    the score.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个分数都计算重叠的n-gram，尽管比较的方向不同**，**本质上它只是意味着共享的单词块越多，分数越高。
- en: This is pretty simplistic, since if the outputs use different wording, it will
    score low.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这相当简单，因为如果输出使用了不同的措辞，得分就会低。
- en: All of these metrics work best when there’s a single right answer to a response
    and are often not the right choice for the LLM applications we build today.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些指标在有一个正确答案的响应中效果最好，而且通常不是我们今天构建的 LLM 应用程序的正确选择。
- en: LLM benchmarks
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM 基准
- en: 'If you’ve watched the news, you’ve probably seen that every time a new version
    of a large language model gets released, it follows a few benchmarks: MMLU Pro,
    GPQA, or Big-Bench.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看过新闻，你可能注意到每次大型语言模型的新版本发布时，都会遵循几个基准：MMLU Pro、GPQA 或 Big-Bench。
- en: '![](../Images/7955af8f950a533fdc85524c1253bc1c.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7955af8f950a533fdc85524c1253bc1c.png)'
- en: These are generic evals for which the proper term is really “benchmark” and
    not evals (which we’ll cover later).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是通用的评估，其正确术语实际上是“基准”而不是评估（我们稍后会讨论）。
- en: Although there’s a variety of other evaluations done for each model, including
    for toxicity, hallucination, and bias, the ones that get most of the attention
    are more like exams or leaderboards.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管为每个模型进行了各种其他评估，包括毒性、幻觉和偏见，但最受关注的是更像是考试或排行榜。
- en: Datasets like MMLU are multiple-choice and have been around for quite some time.
    I’ve actually skimmed through it before and seen how messy it is.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 像MMLU这样的数据集是选择题，并且已经存在了一段时间。我实际上之前已经浏览过它，并看到了它的混乱程度。
- en: Some questions and answers are quite ambiguous, which makes me think that LLM
    providers will try to train their models on these datasets just to make sure they
    get them right.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 有些问题和答案相当模糊，这让我认为 LLM 提供商将尝试在这些数据集上训练他们的模型，以确保他们正确无误。
- en: This creates some fear in the general public that most LLMs are just overfitting
    when they do well on these benchmarks and why there’s a need for newer datasets
    and independent evaluations.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这在公众中引起了一些恐惧，即大多数 LLM 在这些基准测试中表现良好时只是过度拟合，为什么需要新的数据集和独立评估。
- en: LLM scorers
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM 评分者
- en: To run evaluations on these datasets, you can usually use accuracy and unit
    tests. However, what’s different now is the addition of something called LLM-as-a-judge.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 要在这些数据集上运行评估，你通常可以使用准确性和单元测试。然而，现在不同的是增加了所谓的“LLM-as-a-judge”。
- en: To benchmark the models, teams will mostly use traditional methods.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了基准测试模型，团队将主要使用传统方法。
- en: So as long as it’s multiple choice or there’s just one right answer, there’s
    no need for anything else but to compare the answer to the reference for an exact
    match.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，只要是有选择题或者只有一个正确答案，就没有必要做其他任何事情，只需将答案与参考答案进行精确匹配即可。
- en: '![](../Images/e47bba42e1516eea84aabe5a0f1cfb0e.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e47bba42e1516eea84aabe5a0f1cfb0e.png)'
- en: This is the case for datasets such as MMLU and GPQA, which have multiple choice
    answers.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这适用于像 MMLU 和 GPQA 这样的数据集，它们有多个选择题答案。
- en: For the coding tests (HumanEval, SWE-Bench), the grader can simply run the model’s
    patch or function. If every test passes, the problem counts as solved, and vice
    versa.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于编码测试（HumanEval、SWE-Bench），评分者可以简单地运行模型的补丁或函数。如果每个测试都通过，问题就算解决了，反之亦然。
- en: However, as you can imagine, if the questions are ambiguous or open-ended, the
    answers may fluctuate. This gap led to the rise of “LLM-as-a-judge,” where a large
    language model like GPT-4 scores the answers.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，正如你可以想象的那样，如果问题是模糊或开放式的，答案可能会波动。这个差距导致了“LLM-as-a-judge”的兴起，其中大型语言模型如 GPT-4
    评分答案。
- en: '![](../Images/4f355b367419ca70202bd3f48c4b7bf1.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4f355b367419ca70202bd3f48c4b7bf1.png)'
- en: MT-Bench is one of the benchmarks that uses LLMs as scorers, as it feeds GPT-4
    two competing multi-turn answers and asks which one is better.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: MT-Bench 是使用 LLM 作为评分者的基准之一，因为它为 GPT-4 提供了两个竞争性的多轮答案，并询问哪个更好。
- en: Chatbot Arena, which use human raters, I think now scales up by also incorporating
    the use of an LLM-as-a-judge.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 使用人工评分员的 Chatbot Arena，我认为现在通过结合使用 LLM-as-a-judge 的方法也扩大了规模。
- en: '*For transparency, you can also use semantic rulers such as BERTScore to compare
    for semantic similarity. I’m glossing over what’s out there to keep it condensed.*'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '*为了透明度，你也可以使用语义尺，如 BERTScore，来比较语义相似度。我在这里略过了一些内容，以保持简洁。*'
- en: So, teams may still use overlap metrics like BLEU or ROUGE for quick sanity
    checks, or rely on exact-match parsing when possible, but what’s new is to have
    another large language model judge the output.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，团队可能仍然会使用重叠指标，如 BLEU 或 ROUGE，进行快速检查，或者在可能的情况下依赖精确匹配解析，但新的是让另一个大型语言模型来评判输出。
- en: What we do with LLM apps
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们如何处理 LLM 应用
- en: The primary thing that changes now is that we’re not just testing the LLM itself
    but the entire system.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在变化的主要事情是我们不仅测试LLM本身，而是整个系统。
- en: '![](../Images/66e6780450136b82bbc6f150ae7e436f.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/66e6780450136b82bbc6f150ae7e436f.png)'
- en: When we can, we still use programmatic methods to evaluate, just like before.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们能够做到的时候，我们仍然使用程序性方法来评估，就像以前一样。
- en: For more nuanced outputs, we can start with something cheap and deterministic
    like BLEU or ROUGE to look at n-gram overlap, but most modern frameworks out there
    will now use LLM scorers to evaluate.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更细致的输出，我们可以从一些便宜且确定性的东西开始，比如BLEU或ROUGE，来查看n-gram重叠，但大多数现代框架现在将使用LLM评分器来评估。
- en: 'There are three areas worth talking about: how to evaluate multi-turn conversations,
    RAG, and agents, in terms of how it’s done and what kinds of metrics we can turn
    to.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 有三个领域值得讨论：如何评估多轮对话、RAG和代理，以及我们如何进行评估和我们可以转向哪些类型的指标。
- en: '![](../Images/3ef44e3a7df51487891ffd024ac1e388.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3ef44e3a7df51487891ffd024ac1e388.png)'
- en: We’ll talk about all of these metrics that have already been defined briefly
    before moving on to the different frameworks that help us out.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续探讨不同的框架之前，我们将简要讨论已经定义的所有这些指标。
- en: Multi-turn conversations
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多轮对话
- en: The first part of this is about building evals for multi-turn conversations,
    the ones we see in chatbots.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这一部分是关于构建多轮对话的评估，也就是我们在聊天机器人中看到的那些。
- en: When we interact with a chatbot, we want the conversation to feel natural, professional,
    and for it to remember the right bits. We want it to stay on topic throughout
    the conversation and actually answer the thing we asked.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们与聊天机器人互动时，我们希望对话感觉自然、专业，并且它能记住正确的信息。我们希望它在整个对话中保持主题，并真正回答我们提出的问题。
- en: There are quite a few standard metrics that have already been defined here.
    The first we can talk about are **Relevancy/Coherence** and **Completeness**.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这里已经定义了相当多的标准指标。我们可以先讨论的是**相关性/连贯性**和**完整性**。
- en: '**Relevancy** is a metric that should track if the LLM appropriately addresses
    the user’s query and stays on topic, whereas Completeness is high if the final
    outcome actually addresses the user’s goal.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**相关性**是一个应该追踪LLM是否适当地回答用户的查询并保持主题的指标，而**完整性**则是在最终结果实际上解决了用户目标时很高。'
- en: '![](../Images/5c1f68bced134fdfd910b0470b2adf13.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5c1f68bced134fdfd910b0470b2adf13.png)'
- en: That is, if we can track satisfaction across the entire conversation, we can
    also track whether it really does “reduce support costs” and increase trust, along
    with providing high “self-service rates.”
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，如果我们能够追踪整个对话中的满意度，我们也可以追踪它是否真的“减少了支持成本”并增加了信任，同时提供高“自助率”。
- en: The second part is **Knowledge Retention** and **Reliability**.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分是**知识保留**和**可靠性**。
- en: 'That is: does it remember key details from the conversation, and can we trust
    it not to get “lost”? It’s not just enough that it remembers details. It also
    needs to be able to correct itself.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说：它是否记得对话中的关键细节，我们是否可以信任它不会“迷失”？仅仅记住细节是不够的。它还需要能够自我纠正。
- en: '![](../Images/e0941ba25506651c9f986661a06b43e4.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e0941ba25506651c9f986661a06b43e4.png)'
- en: This is something we see in vibe coding tools. They forget the mistakes they’ve
    made and then keep making them. We should be tracking this as low **Reliability**
    or Stability.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们看到在vibe编码工具中的东西。它们忘记了它们犯过的错误，然后继续犯同样的错误。我们应该将其追踪为低**可靠性**或稳定性。
- en: The third part we can track is **Role Adherence** and **Prompt Alignment**.
    This tracks whether the LLM sticks to the role it’s been given and whether it
    follows the instructions in the system prompt.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以追踪的第三部分是**角色遵守**和**提示对齐**。这追踪了LLM是否坚持其被赋予的角色，以及它是否遵循系统提示中的指令。
- en: '![](../Images/e872c2799fc2bf24de4abe15ada64f07.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e872c2799fc2bf24de4abe15ada64f07.png)'
- en: Next are metrics around safety, such as **Hallucination** and **Bias/Toxicity**.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是关于安全性的指标，例如**幻觉**和**偏见/毒性**。
- en: '**Hallucination** is important to track but also quite difficult. People may
    try to set up web search to evaluate the output, or they split the output into
    different claims that are evaluated by a larger model (LLM-as-a-judge style).'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**幻觉**是重要的追踪指标，但也相当困难。人们可能会尝试设置网络搜索来评估输出，或者将输出分成不同的主张，由更大的模型（LLM作为法官风格）进行评估。'
- en: There are also other methods, such as SelfCheckGPT, which checks the model’s
    consistency by calling it several times on the same prompt to see if it sticks
    to its original answer and how many times it diverges.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 还有其他方法，例如SelfCheckGPT，它通过多次在相同的提示下调用模型来检查模型的一致性，看看它是否坚持其原始答案以及它偏离了多少次。
- en: For **Bias/Toxicity**, you can use other NLP methods, such as a fine-tuned classifier.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**偏差/毒性**，你可以使用其他NLP方法，例如微调的分类器。
- en: Other metrics you may want to track could be custom to your application, for
    example, code correctness, security vulnerabilities, JSON correctness, and so
    on.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还想跟踪的其他指标可能针对你的应用程序是定制的，例如代码正确性、安全漏洞、JSON正确性等等。
- en: As for how to do the evaluations, you don’t always have to use an LLM, although
    in most of these cases the standard solutions do.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 至于如何进行评估，你不必总是使用LLM，尽管在这些情况下标准解决方案通常是这样做。
- en: In cases where we can extract the correct answer, such as parsing JSON, we naturally
    don’t need to use an LLM. As I said earlier, many LLM providers also benchmark
    with unit tests for code-related metrics.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们可以提取正确答案的情况下，例如解析JSON，我们自然不需要使用LLM。正如我之前所说的，许多LLM提供商也使用单元测试来基准测试与代码相关的指标。
- en: It goes without saying that using an LLM as a judge isn’t always super reliable,
    just like the applications they measure, but I don’t have any numbers for you
    here, so you’ll have to hunt for that on your own.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 不言而喻，使用LLM作为评判者并不总是非常可靠，就像它们所衡量的应用一样，但我这里没有具体的数字，所以你可能需要自己寻找。
- en: Retrieval Augmented Generation (RAG)
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检索增强生成（RAG）
- en: To continue building on what we can track for multi-turn conversations, we can
    turn to what we need to measure when using Retrieval Augmented Generation (RAG).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 要继续构建我们可以跟踪的多轮对话，我们可以转向使用检索增强生成（RAG）时需要衡量的内容。
- en: 'With RAG systems, we need to split the process into two: measuring retrieval
    and generation metrics separately.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在RAG系统中，我们需要将过程分为两部分：分别衡量检索和生成指标。
- en: '![](../Images/5b3d877e93a05b1608bd5efd9956e096.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5b3d877e93a05b1608bd5efd9956e096.png)'
- en: The first part to measure is retrieval and whether the documents that are fetched
    are the correct ones for the query.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要衡量的是检索，以及检索到的文档是否是针对查询的正确文档。
- en: If we get low scores on the retrieval side, we can tune the system by setting
    up better chunking strategies, changing the embedding model, adding techniques
    such as hybrid search and re-ranking, filtering with metadata, and similar approaches.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在检索方面得到低分，我们可以通过设置更好的分块策略、更改嵌入模型、添加混合搜索和重新排序等技术、使用元数据进行过滤等方法来调整系统。
- en: To measure retrieval, we can use older metrics that rely on a curated dataset,
    or we can use reference-free methods that use an LLM as a judge.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 为了衡量检索，我们可以使用依赖于精选数据集的旧指标，或者我们可以使用无参考方法，这些方法使用LLM作为评判者。
- en: I need to mention the classic IR metrics first because they were the first on
    the scene. For these, we need “gold” answers, where we set up a query and then
    rank each document for that particular query.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要先提到经典的IR指标，因为它们是第一个出现的。对于这些，我们需要“黄金”答案，即我们设置一个查询，然后为该特定查询对每个文档进行排名。
- en: Although you can use an LLM to build these datasets, we don’t use an LLM to
    measure, since we already have scores in the dataset to compare against.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可以使用LLM来构建这些数据集，但我们不使用LLM来衡量，因为我们已经在数据集中有了可以比较的分数。
- en: '![](../Images/a76c1a4bbceb03530afd4b42933bdb9e.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a76c1a4bbceb03530afd4b42933bdb9e.png)'
- en: The most well-known IR metrics are Precision@k, Recall@k, and Hit@k.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 最著名的IR指标是Precision@k、Recall@k和Hit@k。
- en: These measure the amount of relevant documents in the results, how many relevant
    documents were retrieved based on the gold reference answers, and whether at least
    one relevant document made it into the results.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标衡量了结果中相关文档的数量，基于黄金参考答案检索了多少个相关文档，以及是否至少有一个相关文档进入了结果。
- en: The newer frameworks such as RAGAS and DeepEval introduces reference-free, LLM-judge
    style metrics like Context Recall and Context Precision.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 新的框架如RAGAS和DeepEval引入了无参考、LLM评判风格的指标，如上下文召回率和上下文精确率。
- en: These count how many of the truly relevant chunks made it into the top K list
    based on the query, using an LLM to judge.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标计算根据查询，有多少真正相关的片段进入了前K列表，使用LLM进行评判。
- en: That is, based on the query, did the system actually return any relevant documents
    based on the answer, or are there too many irrelevant ones to answer the question
    properly?
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，基于查询，系统是否实际上根据答案返回了任何相关文档，或者有太多不相关的文档无法正确回答问题？
- en: To build datasets for evaluating retrieval, you can mine questions from real
    logs and then use a human to curate them.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建用于评估检索的数据集，你可以从真实日志中挖掘问题，然后使用人工进行整理。
- en: You can also use dataset generators with the help of an LLM, which exist in
    most frameworks or as standalone tools like YourBench.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以使用大型语言模型（LLM）的帮助，在大多数框架中或作为独立工具（如 YourBench）使用数据集生成器。
- en: If you were to set up your own dataset generator using an LLM, you could do
    something like below.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用 LLM 设置自己的数据集生成器，你可以做如下操作。
- en: '[PRE0]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: But it would have to be a bit more advanced.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 但这需要更高级一些。
- en: If we turn to the generation part of the RAG system, we are now measuring how
    well it answers the question using the provided docs.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们转向 RAG 系统的生成部分，我们现在正在衡量它使用提供的文档回答问题的效果。
- en: If this part isn’t performing well, we can adjust the prompt, tweak the model
    settings (temperature, etc.), replace the model entirely, or fine-tune it for
    domain expertise. We can also force it to “reason” using CoT-style loops, check
    for self-consistency, and so on.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这部分表现不佳，我们可以调整提示，调整模型设置（温度等），完全更换模型，或者针对领域专业知识进行微调。我们还可以强制它使用 CoT 风格的循环“推理”，检查自我一致性，等等。
- en: 'For this part, RAGAS is useful with its metrics: Answer Relevancy, Faithfulness,
    and Noise Sensitivity.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这部分，RAGAS 的指标：答案相关性、忠实度和噪声敏感性很有用。
- en: '![](../Images/fc66d6e970c62e7c735287837d45cce4.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fc66d6e970c62e7c735287837d45cce4.png)'
- en: These metrics ask whether the answer actually addresses the user’s question,
    whether every claim in the answer is supported by the retrieved docs, and whether
    a bit of irrelevant context throws the model off course.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标询问答案是否真正回答了用户的问题，答案中的每个主张是否都得到了检索到的文档的支持，以及一些无关的上下文是否会使模型偏离轨道。
- en: If we look at RAGAS, what they likely do for the first metric is ask the LLM
    to “Rate from 0 to 1 how directly this answer addresses the question,” providing
    it with the question, answer, and retrieved context. This returns a raw 0–1 score
    that can be used to compute averages.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们看看 RAGAS，它们可能首先会要求大型语言模型（LLM）“从 0 到 1 评分，以判断这个答案有多直接地回答了问题”，并提供给它问题、答案和检索到的上下文。这会返回一个
    0-1 的原始分数，可以用来计算平均值。
- en: So, to conclude we split the system into two to evaluate, and although you can
    use methods that rely on the IR metrics you can also use reference free methods
    that rely on an LLM to score.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了总结，我们将系统分为两部分进行评估，虽然你可以使用依赖于信息检索（IR）指标的方 法，但你也可以使用不依赖参考的、依赖于 LLM 进行评分的方法。
- en: The last thing we need to cover is how agents are expanding the set of metrics
    we now need to track, beyond what we’ve already covered.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要讨论的最后一件事是，代理如何扩展我们现在需要跟踪的指标集，而不仅仅是已经讨论过的那些。
- en: Agents
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理
- en: With agents, we’re not just looking at the output, the conversation, and the
    context.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 对于代理，我们不仅关注输出、对话和上下文。
- en: 'Now we’re also evaluating how it “moves”: whether it can complete a task or
    workflow, how effectively it does so, and whether it calls the right tools at
    the right time.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们还在评估它“移动”的能力：它是否能够完成任务或工作流程，以及它完成得有多有效，以及它是否在正确的时间调用正确的工具。
- en: Frameworks will call these metrics differently, but essentially the top two
    you want to track are Task Completion and Tool Correctness.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 框架将用不同的方式称呼这些指标，但本质上你想要跟踪的前两个是任务完成和工具正确性。
- en: '![](../Images/ee0888171b936a7cca1d46230efcc71b.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ee0888171b936a7cca1d46230efcc71b.png)'
- en: For tracking tool usage, we want to know if the correct tool was used for the
    user’s query.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 对于跟踪工具使用，我们想知道是否使用了用户查询的正确工具。
- en: We do need some kind of gold script with ground truth built in to test each
    run, but you can author that once and then use it each time you make changes.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们确实需要某种带有内置真实情况的黄金脚本来测试每次运行，但你可以一次性编写它，然后在每次进行更改时使用它。
- en: For Task Completion, the evaluation is to read the entire trace and the goal,
    and return a number between 0 and 1 with a rationale. This should measure how
    effective the agent is at accomplishing the task.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任务完成，评估是阅读整个跟踪和目标，并返回一个介于 0 和 1 之间的数字，并附上理由。这应该衡量代理完成任务的效率。
- en: For agents, you’ll still need to test other things we’ve already covered, depending
    on your application
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 对于代理来说，你仍然需要根据你的应用程序测试我们已经讨论过的其他事情。
- en: '*I just have to note: even if there are quite a few defined metrics available,
    your use case will differ, so it’s worth registering what the common ones are
    but don’t assume they are the best ones to track.*'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*我必须指出：即使有相当多的定义好的指标可用，你的用例可能会有所不同，因此值得记录下常见的指标，但不要假设它们是最好的跟踪指标*。'
- en: Next, let’s turn to get an overview of the popular frameworks out there that
    can help you out.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们来概述一下流行的框架，这些框架可以帮助您。
- en: Eval frameworks
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估框架
- en: 'There are quite a few frameworks that help you out with evals, but I want to
    talk about a few popular ones: RAGAS, DeepEval, OpenAI’s and MLFlow’s Evals, and
    break down what they’re good at and when to use what.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多框架可以帮助你进行评估，但我想谈谈几个流行的框架：RAGAS、DeepEval、OpenAI 的和 MLFlow 的 Evals，以及它们擅长什么以及何时使用什么。
- en: '![](../Images/ea66507c2a85c20fc62200bedb9718ae.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ea66507c2a85c20fc62200bedb9718ae.png)'
- en: '*You can find the full list of different eval frameworks I’ve found in* [*this
    repository*](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#evaluation-frameworks-and-add-ons)*.*'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '*您可以在* [*这个仓库*](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#evaluation-frameworks-and-add-ons)
    *中找到我找到的不同评估框架的完整列表*。'
- en: '*You can also use quite a few framework-specific eval systems, such as LlamaIndex,
    especially for quick prototyping.*'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '*您还可以使用许多特定于框架的评估系统，例如 LlamaIndex，特别是用于快速原型设计*。'
- en: OpenAI and MLFlow’s Evals are add-ons rather than stand-alone frameworks, whereas
    RAGAS was primarily built as a metric library for evaluating RAG applications
    (although they offer other metrics as well).
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 和 MLFlow 的 Evals 是附加组件，而不是独立的框架，而 RAGAS 主要被构建为评估 RAG 应用程序的指标库（尽管他们也提供了其他指标）。
- en: DeepEval is possibly the most comprehensive evaluation library out of all of
    them.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: DeepEval 可能是所有这些中最全面的评估库。
- en: '![](../Images/2e80bf35e6b85f696c259044d628d6f9.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2e80bf35e6b85f696c259044d628d6f9.png)'
- en: However, it’s important to mention that they all offer the ability to run evals
    on your own dataset, work for multi-turn, RAG, and agents in some way or another,
    support LLM-as-a-judge, allow setting up custom metrics, and are CI-friendly.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，重要的是要提到，它们都提供了在您自己的数据集上运行评估的能力，以某种方式支持多轮对话、RAG 和代理，支持 LLM 作为裁判，允许设置自定义指标，并且对
    CI 友好。
- en: They differ, as mentioned, in how comprehensive they are.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 正如之前提到的，它们在全面性方面有所不同。
- en: MLFlow was primarily built to evaluate traditional ML pipelines, so the number
    of metrics they offer is lower for LLM-based apps. OpenAI is a very lightweight
    solution that expects you to set up your own metrics, although they provide an
    example library to help you get started.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: MLFlow 主要被构建来评估传统的机器学习管道，因此他们提供的指标数量对于基于 LLM 的应用程序来说较低。OpenAI 是一个非常轻量级的解决方案，它期望您自己设置指标，尽管他们提供了一个示例库来帮助您开始。
- en: RAGAS provides quite a few metrics and integrates with LangChain so you can
    run them easily.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: RAGAS 提供了许多指标，并与 LangChain 集成，因此您可以轻松运行它们。
- en: DeepEval offers a lot out of the box, including the RAGAS metrics.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: DeepEval 提供了许多开箱即用的功能，包括 RAGAS 指标。
- en: '![](../Images/71f397bb6edf84881e841079c5bc77fa.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/71f397bb6edf84881e841079c5bc77fa.png)'
- en: '*You can see the repository with the comparisons [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#evaluation-frameworks-and-add-ons).*'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '*您可以在[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#evaluation-frameworks-and-add-ons)找到比较的仓库*。'
- en: If we look at the metrics being offered, we can get a sense of how extensive
    these solutions are.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们看看提供的指标，我们可以了解这些解决方案的广泛程度。
- en: It’s worth noting that the ones offering metrics don’t always follow a standard
    in naming. They may mean the same thing but call it something different.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，提供指标的那些框架并不总是遵循一个标准的命名规范。它们可能意味着相同的事情，但称呼不同。
- en: For example, faithfulness in one may mean the same as groundedness in another.
    Answer relevancy may be the same as response relevance, and so on.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个方面的忠实度可能意味着另一个方面的扎根性。答案的相关性可能与响应的相关性相同，等等。
- en: This creates a lot of unnecessary confusion and complexity around evaluating
    systems in general.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这在评估系统方面造成了大量的不必要的混淆和复杂性。
- en: Nevertheless, DeepEval stands out with over 40 metrics available and also offers
    a framework called G-Eval, which helps you set up custom metrics quickly making
    it the fastest way from idea to a runnable metric.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，DeepEval 以超过 40 个指标脱颖而出，并且还提供了一个名为 G-Eval 的框架，该框架可以帮助你快速设置自定义指标，使其成为从想法到可运行的指标的最快方式。
- en: OpenAI’s Evals framework is better suited when you want bespoke logic, not when
    you just need a quick judge.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 当您需要定制逻辑而不是仅仅需要一个快速裁判时，OpenAI 的 Evals 框架更适合。
- en: According to the DeepEval team, custom metrics are what developers set up the
    most, so don’t get stuck on who offers what metric. Your use case will be unique,
    and so will how you evaluate it.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 DeepEval 团队的说法，自定义指标是开发者设置最多的，所以不要纠结于谁提供什么指标。你的用例将是独特的，因此评估方式也将是独特的。
- en: So, **which should you use for what situation?**
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，**在什么情况下你应该使用哪个呢？**
- en: Use RAGAS when you need specialized metrics for RAG pipelines with minimal setup.
    Pick DeepEval when you want a complete, out-of-the-box eval suite.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要为 RAG 管道设置专用指标且设置最小化时，请使用 RAGAS。当你想要一个完整、即插即用的评估套件时，请选择 DeepEval。
- en: MLFlow is a good choice if you’re already invested in MLFlow or prefer built-in
    tracking and UI features. OpenAI’s Evals framework is the most barebones, so it’s
    best if you’re tied into OpenAI infrastructure and want flexibility.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经投资了 MLFlow 或者更喜欢内置的跟踪和 UI 功能，那么 MLFlow 是一个不错的选择。OpenAI 的 Evals 框架最为基础，所以如果你与
    OpenAI 基础设施紧密相连并且想要灵活性，那么它是最适合的。
- en: Lastly, DeepEval also provides red teaming via their DeepTeam framework, which
    automates adversarial testing of LLM systems. There are other frameworks out there
    that do this too, although perhaps not as extensively.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，DeepEval 还通过他们的 DeepTeam 框架提供红队测试，该框架自动化了 LLM 系统的对抗性测试。还有其他框架也做这件事，尽管可能没有这么广泛。
- en: I’ll have to do something on adversarial testing of LLM systems and prompt injections
    in the future. It’s an interesting topic.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我将来必须做一些关于 LLM 系统的对抗性测试和提示注入的工作。这是一个有趣的话题。
- en: '* * *'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The dataset business is lucrative business which is why it’s great that we’re
    now at this point where we can use other LLMs to annotate data, or score tests.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集业务是一个有利可图的业务，这也是为什么我们现在到了这个地步，可以使用其他 LLM 来标注数据或评分测试。
- en: However, LLM judges aren’t magic and the evals you’ll set up you’ll probably
    find a bit flaky, just as with any other LLM application you build. According
    to the world wide web, most teams and companies sample-audit with humans every
    few weeks to stay real.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，LLM 判定者并不是魔术师，你设置的评估可能你会发现有点不可靠，就像你构建的任何其他 LLM 应用程序一样。根据网络上的信息，大多数团队和公司每隔几周就会进行一次人工抽样审计，以保持真实。
- en: The metrics you set up for your app will likely be custom, so even though I’ve
    now put you through hearing about quite many you’ll probably build something on
    your own.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你为你的应用程序设置的指标很可能是定制的，所以尽管我现在已经让你听到了很多，但你可能还是会自己构建一些东西。
- en: It’s good to know what the standard ones are though.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 了解标准指标是什么总是好的。
- en: Hopefully it proved educational anyhow.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 希望无论如何它都证明了其教育价值。
- en: If you liked this one, be sure to read some of my other articles here on TDS,
    or on [Medium](https://medium.com/@ilsilfverskiold).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这篇文章，请务必阅读我在 TDS 上的其他文章，或者在中[Medium](https://medium.com/@ilsilfverskiold)上。
- en: You can follow me here, [LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/)
    or my [website](https://www.ilsilfverskiold.com/) if you want to get notified
    when I release something new.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要在发布新内容时得到通知，可以关注我的[LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/)或我的[网站](https://www.ilsilfverskiold.com/)。
