- en: The Machine Learning Lessons I’ve Learned This Month
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本月我学到的机器学习教训
- en: 原文：[https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month/](https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month/](https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month/)
- en: <mdspan datatext="el1759175806926" class="mdspan-comment">Most days</mdspan>
    in machine learning are the same.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759175806926" class="mdspan-comment">在机器学习的多数日子里</mdspan>都是一样的。
- en: 'Coding, waiting for results, interpreting them, returning back to coding. Plus,
    some intermediate presentations of one’s progress. But, things mostly being the
    same does not mean that there’s nothing to learn. Quite on the contrary! Two to
    three years ago, I started a daily habit of writing down lessons that I learned
    from my ML work. In looking back through some of the lessons from this month,
    I found three practical lessons that stand out:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 编码、等待结果、解释结果、返回编码。此外，还有一些关于个人进度中间展示的内容。但是，事情大多相同并不意味着没有东西可以学习。恰恰相反！两到三年前，我开始养成一个习惯，每天记录我从机器学习工作中学到的教训。回顾这个月的部分课程，我发现有三个实用的教训脱颖而出：
- en: For new projects, choose libraries wisely
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于新项目，要明智地选择库
- en: Use a clipboard manager to save your clips
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用剪贴板管理器保存你的剪辑
- en: Read broadly to read deeply
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 广泛阅读以深入阅读
- en: Choosing Between Libraries and Self-Made Code
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在库和自编代码之间做出选择
- en: 'Machine learning projects often begin with the same question: should you build
    everything yourself, or rely on existing libraries?'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习项目通常以相同的问题开始：你应该自己构建一切，还是依赖现有的库？
- en: At the most fundamental level, this can mean deciding between frameworks like
    PyTorch or TensorFlow. Back when Towards Data Science was still hosted on Medium,
    I was a strong advocate for TensorFlow. Today, I lean much more towards PyTorch.
    But this section is not about such framework-level decisions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在最根本的层面，这可能意味着在PyTorch或TensorFlow等框架之间做出选择。当Towards Data Science还托管在Medium上的时候，我强烈支持TensorFlow。今天，我更倾向于PyTorch。但本节并不是关于这样的框架级决策。
- en: Instead, I want to focus on project-level choices.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我想专注于项目级的选择。
- en: 'Imagine you are tasked with setting up a new ML project. The requirements are
    specific: sparsely labeled data, image inputs, and some architectural constraints.
    What should you do?'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你被分配了一个新的机器学习项目。要求是具体的：稀疏标记的数据、图像输入，以及一些架构限制。你应该怎么做？
- en: 'A good starting point is to search GitHub for projects that might already meet
    most of your needs. If you find one that matches 100%, great — use it. If you
    don’t find anything close, that’s also great — because the decision is now clear:
    you’ll need to build it yourself.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的起点是搜索GitHub上可能已经满足你大部分需求的项目。如果你找到一个完全匹配的，那太好了——使用它。如果你找不到类似的东西，那也很好——因为现在决策很明确了：你需要自己构建。
- en: The more challenging case is when you do find something, but it doesn’t quite
    fit. Do you patch the existing codebase until it works? Or would it be faster
    to implement your own solution from scratch?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 更具挑战性的情况是当你找到了一些东西，但它并不完全适合。你是修补现有的代码库直到它工作，还是从头开始实现自己的解决方案会更快？
- en: 'There’s no single right answer, but I’ve found a few rules of thumb useful:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 没有唯一的正确答案，但我发现了一些有用的经验法则：
- en: '**If you need fine-grained control** over every aspect of the ML pipeline →
    build it yourself.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你需要对机器学习流程的每个方面进行精细控制**→ 自己构建。'
- en: '**If you just need a standard training pipeline** → use a library.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你只需要标准的训练流程**→ 使用库。'
- en: '**If you want to modify an existing method** → start with the library that
    already has it.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你想要修改现有的方法**→ 从已经拥有该方法的库开始。'
- en: '**If you’re introducing your own method** → do it yourself.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你正在引入自己的方法**→ 自己来做。'
- en: Another factor worth considering is longevity. Code that you write yourself
    is code you fully control — no sudden breaking changes, no obscure bugs hidden
    in a third-party repo. On the other hand, libraries can provide you with years
    of accumulated testing and optimization, things you’d struggle to reproduce alone.
    The art is to balance speed of progress now against maintainability later.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个值得考虑的因素是持久性。你自己写的代码是你完全控制的代码——没有突然的破坏性更改，没有隐藏在第三方仓库中的神秘错误。另一方面，库可以为你提供多年的累积测试和优化，这些是你单独难以复制的。艺术在于平衡现在的进步速度和未来的可维护性。
- en: Sometimes, I’ve even found that starting with a library for rapid prototyping,
    and then reimplementing the crucial parts myself once I knew what works, stroke
    the best balance. That way, I get quick feedback early but still retain full ownership
    over the parts that matter most. In my experience, the best libraries, at least
    for research-heavy projects, are those that *feel* like research code.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，我发现从库开始快速原型设计，然后在我知道哪些有效后自己重新实现关键部分，可以达到最佳平衡。这样，我可以在早期获得快速反馈，但仍然完全控制最重要的部分。根据我的经验，最好的库，至少对于研究密集型项目，是那些感觉像研究代码的库。
- en: Two contrasting examples would be the Avalanche and Mammoth libraries. Avalanche
    is much more full fledged, and everything is nicely abstracted. On the other hand,
    Mammoth is more like an expanded research project, where you still directly can
    control the methodological parts. Libraries like that latter can give you the
    best of both worlds.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 两个对比的例子是Avalanche和Mammoth库。Avalanche功能更全面，一切都被很好地抽象化。另一方面，Mammoth更像是一个扩展的研究项目，你仍然可以直接控制方法论部分。这样的库可以给你带来两者的最佳结合。
- en: The above guidelines won’t solve the dilemma of self-vs-library every time,
    but over they allowed me to more systematically approach it. Over the years, and
    this September again, they saved me days of indecision.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 上述指南并不总是能解决自我 vs 库的困境，但它们确实让我更系统地处理这个问题。多年来，今年九月也是如此，它们帮我节省了几天犹豫不决的时间。
- en: The Benefit of Clipboard Managers
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 剪贴板管理器的益处
- en: 'Suppose you’re controlling an ML project from the command line. You start a
    run like this: `python3 run.py --param1 --param2`'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在命令行中控制一个机器学习项目。你这样启动一个运行：`python3 run.py --param1 --param2`
- en: Then another one with different parameters. And another. Soon you’re juggling
    several runs, and you want to compare the results.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，另一个使用不同参数的。再一个。很快，你就要同时处理几个运行，并想比较结果。
- en: 'The naive way is to copy each output manually into a central place: copy, paste;
    copy, paste; copy, paste. Until at some point, you overwrite the wrong result
    and have to start again.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 常规的方法是将每个输出手动复制到一个中央位置：复制，粘贴；复制，粘贴；复制，粘贴。直到某个时候，你覆盖了错误的结果，不得不重新开始。
- en: This exact situation occurred to me at the beginning of this month. When I was
    setting up a new project (after deciding on doing it myself versus using a library;
    see above), I also did some code testing. I wanted to see if everything runs without
    any errors. So, I evaluated several parameter settings, often changing one to
    two arguments from run to run. As my project was a ML project – and thus involved
    training ML models-, it took a while for a script to run through, which meant
    I had to wait until I could test the next parameter. Spinning up separate runs
    was not an option due to cluster occupation.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 本月初，我遇到了这种情况。当我正在设置一个新项目（在决定自己动手做还是使用库；见上文）时，我还进行了一些代码测试。我想看看是否一切都能正常运行，没有任何错误。因此，我评估了几个参数设置，经常在运行之间更改一到两个参数。由于我的项目是一个机器学习项目——因此涉及训练机器学习模型——脚本运行需要一段时间，这意味着我必须等到我可以测试下一个参数。由于集群占用，启动单独的运行不是选项。
- en: Between testing two parameters settings, I thus focused on the project setup
    and fixing bugs. Then, once I saw that a parameter had been tested successfully,
    I scheduled the next parameter test, and resumed the project setup.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试两个参数设置之间，我专注于项目设置和修复错误。然后，一旦我看到一个参数已经成功测试，我就安排下一个参数测试，并继续项目设置。
- en: As you can imagine, this strategy only works unto a certain point. After repeating
    this back and forth for a while, I lost track of the parameter combinations that
    I already tested. Because it was only a setup phase, I had not yet implemented
    real testing and results collection; this I usually do later. Luckily, my habit
    of copying commands, pasting them, and then modifying arguments saved me from
    having to run test twice. This, in combination with using a clipboard manager.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所想，这种策略只适用于某个程度。在反复进行这种来回操作一段时间后，我失去了对已经测试过的参数组合的跟踪。因为这只是设置阶段，我还没有实施真正的测试和结果收集；这我通常稍后进行。幸运的是，我复制命令、粘贴并修改参数的习惯让我免于不得不运行测试两次。这，加上使用剪贴板管理器。
- en: Instead of only storing the most recent item, these tools keep a history of
    everything you’ve copied. At any time, you can browse back and select the clip
    you need*.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 与仅存储最近的项目不同，这些工具会保存你复制过的所有内容的历史记录。在任何时候，你都可以回溯并选择所需的剪辑*。
- en: The real strength of clipboard managers is how they reduce cognitive overhead.
    Instead of constantly worrying “did I just overwrite my last copy?” or “where
    did I save that snippet?”, you free up mental bandwidth for the actual task at
    hand. It’s one of those small tools** that doesn’t look like much but compounds
    over time.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 剪贴板管理器的真正优势在于它们如何减少认知负担。你不必不断担心“我刚才是否覆盖了我的上一个副本？”或者“我刚才在哪里保存了那个片段？”，这样你就可以为实际任务腾出更多的精神带宽。这是那些看似不起眼但随时间积累的工具之一。
- en: And importantly, this isn’t only about experiments. The same holds when you’re
    preparing a talk, drafting a paper, or gathering figures from multiple sources.
    Once you’ve used a clipboard manager long enough, you’ll wonder how you ever worked
    without one.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，这不仅仅关乎实验。当你准备演讲、起草论文或从多个来源收集图表时，情况也是如此。一旦你使用足够长时间的剪贴板管理器，你就会 wonder how
    you ever worked without one。
- en: I can attest that from my own experience. On my Mac machines, I have been using
    the Launchbar clipboard manager (though it’s much more than this!) for years;
    and on Windows I installed the free Ditto utility. They’ve often helped me when
    I clipped something, then deleted the original content (from which I wanted to
    clip something). At all times, the last clips were still available with a single
    command – readily providing me the needed information.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以证明这一点，从我自己的经验来看。在我的Mac机器上，我已经使用了多年的Launchbar剪贴板管理器（尽管它远不止这个！）；在Windows上，我安装了免费的Ditto实用程序。它们经常在我剪贴了某些内容，然后删除了原始内容（我想从中剪贴内容）时帮助我。在所有时候，只需一个命令就可以访问最后的剪贴内容——为我提供了所需的信息。
- en: Depth and Breadth in Reading
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 阅读的深度与广度
- en: 'The same project also reminded me of something about reading papers. Setting
    it up required combining recent methodological advances with tabular data. As
    always, there was a flood of potentially relevant work. The question was: what
    should I read, and what can I skip?'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的项目也让我想起了关于阅读论文的一些事情。设置它需要结合最近的方法论进展和表格数据。一如既往，有大量的可能相关的工作。问题是：我应该读什么，什么可以跳过？
- en: This time, the decision was easier than expected. Over the past few months,
    I had been reading papers regularly — not intensively, but steadily, on and off.
    That gave me a solid mental map of my research field. More importantly, I had
    also read adjacent work, i.e. papers that are not fully from my field, but that
    tackle very similar challenges.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，决定比预期的要容易。在过去的几个月里，我一直在定期阅读论文——不是密集的，而是稳步的，断断续续的。这给了我一个坚实的研究领域心理地图。更重要的是，我还阅读了相邻的工作，即不是完全来自我的领域的论文，但它们处理了非常相似的问题。
- en: Reading widely now helped me identify connections across fields and recognize
    which methods were truly relevant. Instead of feeling overwhelmed, I could quickly
    decide which papers were worth my attention, and which ones I could safely ignore.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在广泛阅读帮助我识别了跨领域之间的联系，并认识到哪些方法是真正相关的。我不会感到不知所措，我可以迅速决定哪些论文值得我的关注，哪些我可以安全地忽略。
- en: But, the benefit goes beyond efficiency (and knowledge, the primary goal of
    reading). Looking outside your main field often gets you ideas you wouldn’t have
    encountered otherwise. For me, insights from adjacent areas sometimes end up shaping
    the core of my own projects. In other words, breadth isn’t just preparation for
    depth — it’s also a source of creativity.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，好处不仅限于效率（以及知识，阅读的主要目标）。跳出你的主要领域，往往能给你带来你原本不会遇到的想法。对我来说，来自相邻领域的洞察有时最终会塑造我自己的项目核心。换句话说，广度不仅仅是深度的基础，也是创造力的来源。
- en: 'Over time, the practice of reading from close fields builds resilience. Research
    fields shift quickly, and methods that are *en* *vogue* today may be forgotten
    tomorrow. But if you’ve cultivated breadth, you can adapt more easily: you already
    know the neighboring fields, and you can move with the field rather than being
    swept away by it.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，从接近领域阅读的实践会增强你的韧性。研究领域会迅速变化，今天流行的方法明天可能就会被遗忘。但如果你培养了广度，你就可以更容易地适应：你已经了解了相邻领域，你可以随着领域的发展而发展，而不是被它冲走。
- en: '* * *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '* not recommended, but often the quickest way at the early stages of a project.
    For later stages, i recommend centrally logging the results.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '* 不推荐，但在项目早期阶段通常是最快的方式。对于后期阶段，我建议集中记录结果。'
- en: '** for Windows: Ditto; for Mac: Launchbar.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于Windows： Ditto；对于Mac：Launchbar。'
