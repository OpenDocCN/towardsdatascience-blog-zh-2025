- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: March is in the books, and in this week’s Variable we celebrate our most-read
    and -shared articles of the past month — read on to explore emerging trends in
    enterprise computing setups, catch up on novel approaches to LLM optimization,
    and get up-and-running with Python dependency management (among other topics).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 三月已经过去，在本周的《变量》中，我们庆祝了过去一个月最受欢迎和分享的文章——继续阅读，探索企业计算配置的新趋势，了解LLM优化的新方法，以及如何使用Python依赖管理（以及其他主题）。
- en: Before we jump in, we also wanted to share our latest resource geared towards
    TDS authors: [a quick(ish) guide to formatting your draft](https://towardsdatascience.com/how-to-format-your-tds-draft-a-quickish-guide/) on
    our recently launched [Contributor Portal](https://contributor.insightmediagroup.io/).
    If you’re an existing or aspiring author, this one’s for you!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨之前，我们还想分享我们最新面向TDS作者的资源：[如何格式化你的TDS草稿（快速指南）](https://towardsdatascience.com/how-to-format-your-tds-draft-a-quickish-guide/)，这是在我们最近推出的[贡献者门户](https://contributor.insightmediagroup.io/)上发布的。如果你是现有或希望成为作者的人，这个指南就是为你准备的！
- en: Forget About Cloud Computing. On-Premises Is All the Rage Again
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 忘记云计算吧。本地化计算再次成为热门
- en: The most widely circulating article we published in March didn’t tackle data
    or machine learning directly, but focused on a topic that touches the work of
    virtually all tech practitioners. [Ari Joury](https://towardsdatascience.com/author/arijoury/) drew
    our attention to the diminishing popularity of cloud computing, and outlined the
    reasons both startups and more established organizations are giving on-premise
    setups another look.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在三月发布的最受欢迎的文章并没有直接涉及数据或机器学习，而是关注了一个几乎触及所有技术实践者工作的主题。[Ari Joury](https://towardsdatascience.com/author/arijoury/)引起了我们的注意，云计算的受欢迎程度正在下降，并概述了初创公司和更成熟的组织为何再次考虑本地化设置的原因。
- en: '[Forget About Cloud Computing. On-Premises Is All the Rage Again](https://towardsdatascience.com/forget-about-cloud-computing-on-premises-is-all-the-rage-again/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[忘记云计算吧。本地化计算再次成为热门](https://towardsdatascience.com/forget-about-cloud-computing-on-premises-is-all-the-rage-again/)'
- en: How to Switch from Data Analyst to Data Scientist
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何从数据分析师转变为数据科学家
- en: Career changes are never easy — especially in a competitive job market. [Marina
    Wyss](https://towardsdatascience.com/author/gratitudedriven/) shares actionable
    advice for those who’d like to jump from data analytics to DS.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 职业转变从来都不容易——尤其是在竞争激烈的就业市场中。[Marina Wyss](https://towardsdatascience.com/author/gratitudedriven/)分享了那些希望从数据分析跳转到数据科学的人可以采取的行动建议。
- en: '[How to Switch from Data Analyst to Data Scientist](https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何从数据分析师转变为数据科学家](https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/)'
- en: 'LLM + RAG: Creating an AI-Powered File Reader Assistant'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM + RAG：创建一个AI驱动的文件阅读器助手
- en: 'Leverage AI to boost your productivity: follow along [Gustavo Santos](https://towardsdatascience.com/author/gustavorsantos/)‘
    hands-on guide to building a question-answering chatbot.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 利用AI提升你的生产力：跟随[Gustavo Santos](https://towardsdatascience.com/author/gustavorsantos/)的实操指南来构建一个问答聊天机器人。
- en: '[LLM + RAG: Creating an AI-Powered File Reader Assistant](https://towardsdatascience.com/llm-rag-creating-an-ai-powered-file-reader-assistant/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[LLM + RAG：创建一个AI驱动的文件阅读器助手](https://towardsdatascience.com/llm-rag-creating-an-ai-powered-file-reader-assistant/)'
- en: Other Top Reads
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他热门阅读
- en: 'What else was on our readers’ radar last month? Python, fine-tuning, heatmaps,
    and more:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 上个月读者们都在关注什么？Python、微调、热图等等：
- en: In a clear and focused post, [Vyacheslav Efimov](https://towardsdatascience.com/author/slavahead/) introduced
    us to the [fundamental principles of Python dependency management](https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/).
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一篇清晰专注的文章中，[Vyacheslav Efimov](https://towardsdatascience.com/author/slavahead/)
    介绍了 Python 依赖关系管理的 [基本原理](https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/)。
- en: '[Comprehensive Guide to Dependency Management in Python](https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/)'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Python 依赖关系管理的全面指南](https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/)'
- en: How can you [make your LLM more accurate](https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/)?
    Read the latest beginner-friendly guide by [Sarah Schürch](https://towardsdatascience.com/author/schuerch_sarah/),
    unpacking the role of RAG and fine-tuning.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何 [使你的 LLM 更准确](https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/)？阅读
    [Sarah Schürch](https://towardsdatascience.com/author/schuerch_sarah/) 的最新入门友好指南，了解
    RAG 和微调的作用。
- en: '[How to Make Your LLM More Accurate with RAG & Fine-Tuning](https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/)'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何使用 RAG 和微调使你的 LLM 更准确](https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/)'
- en: '[Learn how to visualize trends and outliers](https://towardsdatascience.com/heatmaps-for-time-series/) with
    non-linear color—[Lee Vaughan](https://towardsdatascience.com/author/lee_vaughan/)‘s
    latest hands-on tutorial is all about well-designed heatmaps.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[学习如何使用非线性颜色可视化趋势和异常值](https://towardsdatascience.com/heatmaps-for-time-series/)
    —— [Lee Vaughan](https://towardsdatascience.com/author/lee_vaughan/) 的最新实战教程完全关于精心设计的热图。'
- en: '[Heatmaps for Time Series ](https://towardsdatascience.com/heatmaps-for-time-series/)'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[时间序列热图](https://towardsdatascience.com/heatmaps-for-time-series/)'
- en: Curious to learn about fine-tuning options beyond LoRA? [Martin Görner](https://towardsdatascience.com/author/martin-gorner/)‘s
    overview walks us through [some of the most promising recent alternatives](https://towardsdatascience.com/are-you-still-using-lora-to-fine-tune-your-llm/).
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想了解 LoRA 之外的微调选项？[Martin Görner](https://towardsdatascience.com/author/martin-gorner/)
    的概述带我们了解了 [一些最有前景的近期替代方案](https://towardsdatascience.com/are-you-still-using-lora-to-fine-tune-your-llm/)。
- en: '[Are You Still Using LoRA to Fine-Tune Your LLM?](https://towardsdatascience.com/are-you-still-using-lora-to-fine-tune-your-llm/)'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[你还在使用 LoRA 来微调你的 LLM 吗？](https://towardsdatascience.com/are-you-still-using-lora-to-fine-tune-your-llm/)'
- en: From [Tula Masterman](https://towardsdatascience.com/author/tula-masterman/),
    a new deep dive presents the “pyramid search approach” to [leveraging agentic
    knowledge distillation](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/).
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自 [Tula Masterman](https://towardsdatascience.com/author/tula-masterman/) 的新深度文章介绍了“金字塔搜索方法”来利用
    [代理知识蒸馏](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/)。
- en: '[Overcome Failing Document Ingestion & RAG Strategies with Agentic Knowledge
    Distillation](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/)'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[通过代理知识蒸馏克服失败的文档摄取和 RAG 策略](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/)'
- en: Meet Our New Authors
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Explore top-notch work from some of our recently added contributors:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们最近添加的一些贡献者的顶级作品：
- en: '[Qian (Alex) Wan](https://towardsdatascience.com/author/qianalex-wan/) and
    Eli Ruoyong Hong shared a fascinating look into the challenges of Japanese-Chinese
    translation with generative AI.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Qian (Alex) Wan](https://towardsdatascience.com/author/qianalex-wan/) 和 Eli
    Ruoyong Hong 分享了对使用生成式 AI 进行日中翻译挑战的迷人洞察。'
- en: '[Japanese-Chinese Translation with GenAI: What Works and What Doesn’t](https://towardsdatascience.com/japanese-chinese-translation-with-genai-what-works-and-what-doesnt/)'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用 GenAI 进行日中翻译：什么有效，什么无效](https://towardsdatascience.com/japanese-chinese-translation-with-genai-what-works-and-what-doesnt/)'
- en: '[Archit Datar](https://towardsdatascience.com/author/archit-datar/)‘s debut
    TDS article focuses on uncertainty quantification in machine learning and introduces
    a new Python package.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Archit Datar](https://towardsdatascience.com/author/archit-datar/) 的首篇 TDS
    文章专注于机器学习中的不确定性量化，并介绍了一个新的 Python 包。'
- en: '[Uncertainty Quantification in Machine Learning with an Easy Python Interface](https://towardsdatascience.com/uncertainty-quantification-in-machine-learning-with-an-easy-python-interface/)'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用简单的 Python 接口进行机器学习中的不确定性量化](https://towardsdatascience.com/uncertainty-quantification-in-machine-learning-with-an-easy-python-interface/)'
- en: '[Jordy Davelaar](https://towardsdatascience.com/author/jordy-davelaar/) took
    a break from his astrophysics work to write on March Madness and the intersection
    of data science and sports analytics.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Jordy Davelaar](https://towardsdatascience.com/author/jordy-davelaar/) 从他的天体物理学工作中抽出时间，撰写了关于疯狂三月和数据分析与体育分析交叉领域的文章。'
- en: '[Data-Driven March Madness Predictions](https://towardsdatascience.com/data-driven-march-madness-predictions/)'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[数据驱动的疯狂三月预测](https://towardsdatascience.com/data-driven-march-madness-predictions/)'
- en: Contribute to TDS
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为TDS投稿
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近撰写了一个有趣的项目演练、教程或对我们核心主题的理论反思，为什么不 [与我们分享？](https://towardsdatascience.com/questions-96667b06af5/)
