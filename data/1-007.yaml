- en: Optimizing PyTorch Model Inference on CPU
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在CPU上优化PyTorch模型推理
- en: 原文：[https://towardsdatascience.com/optimizing-pytorch-model-inference-on-cpu/](https://towardsdatascience.com/optimizing-pytorch-model-inference-on-cpu/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/optimizing-pytorch-model-inference-on-cpu/](https://towardsdatascience.com/optimizing-pytorch-model-inference-on-cpu/)
- en: <mdspan datatext="el1764509051498" class="mdspan-comment">As</mdspan> <mdspan
    datatext="el1764807856821" class="mdspan-comment">reliance on AI models</mdspan>
    grows, so does the criticality of optimizing their runtime performance. While
    the degree to which AI models will outperform human intelligence remains a heated
    topic of debate, their need for powerful and expensive compute resources is unquestionable
    — and even notorious.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764509051498" class="mdspan-comment">随着</mdspan> <mdspan
    datatext="el1764807856821" class="mdspan-comment">对AI模型</mdspan>的依赖性增加，优化它们运行时性能的重要性也在增加。虽然AI模型将超越人类智能的程度仍然是一个热烈的辩论话题，但它们对强大且昂贵的计算资源的需求是不容置疑的——甚至可以说是臭名昭著的。
- en: 'In [previous posts](https://towardsdatascience.com/author/chaimrand/), we covered
    the topic of AI model optimization — primarily in the context of model training
    — and demonstrated how it can have a decisive impact on the cost and speed of
    AI model development. In this post, we focus our attention on AI model inference,
    where model optimization has an additional objective: To minimize the latency
    of inference requests and improve the user experience of the model consumer.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [之前的文章](https://towardsdatascience.com/author/chaimrand/)中，我们讨论了AI模型优化的主题——主要是在模型训练的背景下——并展示了它如何对AI模型开发的成本和速度产生决定性的影响。在这篇文章中，我们将关注AI模型推理，其中模型优化有一个额外的目标：最小化推理请求的延迟并提高模型消费者的用户体验。
- en: In this post, we will assume that the platform on which model inference is performed
    is a 4th Gen Intel® Xeon® Scalable CPU processor, more specifically, an Amazon
    EC2 [c7i.xlarge](https://aws.amazon.com/ec2/instance-types/c7i/) instance (with
    4 Intel Xeon vCPUs) running a dedicated [Deep Learning Ubuntu (22.04) AMI](https://docs.aws.amazon.com/dlami/latest/devguide/aws-deep-learning-x86-gpu-pytorch-2.7-ubuntu-22-04.html) and
    a CPU build of [PyTorch 2.8.0](https://pytorch.org/get-started/locally/). Of course,
    the choice of a model deployment platform is one of the many important decisions
    taken when designing an AI solution along with the choice of model architecture,
    development framework, training accelerator, data format, deployment strategy,
    etc. — each one of which must be taken with consideration of the associated costs
    and runtime speed. The choice of a CPU processor for running model inference may
    seem surprising in an era in which the number of dedicated AI inference accelerators
    is continuously growing. However, as we will see, there are some occasions when
    the best (and cheapest) option may very well be just a good old-fashioned CPU.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将假设模型推理所进行的平台是一个第4代英特尔® 至强® 可扩展处理器，更具体地说，是一个亚马逊EC2 [c7i.xlarge](https://aws.amazon.com/ec2/instance-types/c7i/)实例（带有4个英特尔至强vCPU），运行一个专门的 [深度学习Ubuntu
    (22.04) AMI](https://docs.aws.amazon.com/dlami/latest/devguide/aws-deep-learning-x86-gpu-pytorch-2.7-ubuntu-22-04.html)和一个CPU构建的 [PyTorch
    2.8.0](https://pytorch.org/get-started/locally/)。当然，选择模型部署平台是在设计AI解决方案时做出的许多重要决策之一，包括模型架构、开发框架、训练加速器、数据格式、部署策略等的选择——每个选择都必须考虑到相关的成本和运行速度。在专用AI推理加速器数量持续增长的时代，为运行模型推理选择CPU处理器可能看起来有些令人惊讶。然而，正如我们将看到的，在某些情况下，最佳（且最经济）的选择可能恰恰是一个老式的优秀CPU。
- en: We will introduce a toy image-classification model and proceed to demonstrate
    some of the optimization opportunities for AI model inference on an Intel® Xeon®
    CPU. The deployment of an AI model typically includes a full inference server
    solution, but for the sake of simplicity, we will limit our discussion to just
    the model’s core execution. For a primer on model inference serving, please see
    our previous post: [The Case for Centralized AI Model Inference Serving](https://towardsdatascience.com/the-case-for-centralized-ai-model-inference-serving/).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将介绍一个玩具图像分类模型，并继续展示在英特尔® 至强® CPU上对AI模型推理进行优化的机会。AI模型的部署通常包括一个完整的推理服务器解决方案，但为了简化讨论，我们将仅限于讨论模型的核执行部分。有关模型推理服务的入门知识，请参阅我们之前的文章： [集中式AI模型推理服务的案例](https://towardsdatascience.com/the-case-for-centralized-ai-model-inference-serving/)。
- en: 'Our intention in this post is to demonstrate that: 1) a few simple optimization
    techniques can result in meaningful performance gains and 2) that reaching such
    results does not require specialized expertise in performance analyzers (such
    as [Intel® VTune™ Profiler](https://www.intel.com/content/www/us/en/developer/tools/oneapi/vtune-profiler.html))
    or on the inner workings of the low-level compute kernels. Importantly, the process
    of AI model optimization can differ considerably based on the model architecture
    and runtime environment. Optimizing for training will differ from optimizing for
    inference. Optimizing a transformer model will differ from optimizing a CNN model.
    Optimizing a 22-billion-parameter model will differ from optimizing a 100-million
    parameter model. Optimizing a model to run on a GPU will differ from optimizing
    it for a CPU. Even different generations of the same CPU family may have different
    computation components and, consequently, different optimization techniques. While
    the high-level steps for optimizing a given model on a given instance are pretty
    standard, the specific course it will take and the end result can vary greatly
    based on the project at hand.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们的目的是展示：1）一些简单的优化技术可以带来有意义的性能提升，2）达到这样的结果并不需要性能分析器（如[Intel® VTune™ Profiler](https://www.intel.com/content/www/us/en/developer/tools/oneapi/vtune-profiler.html)）或底层计算内核内部工作的专业知识。重要的是，AI模型优化的过程可能因模型架构和运行时环境的不同而有很大差异。针对训练的优化与针对推理的优化不同。优化Transformer模型与优化CNN模型不同。优化22亿参数模型与优化1亿参数模型不同。优化模型在GPU上运行与优化它在CPU上运行不同。即使是同一CPU系列的不同的代产品，也可能有不同的计算组件和相应的优化技术。虽然优化给定实例上给定模型的总体步骤相当标准，但具体路径和最终结果可能会根据具体项目有很大的不同。
- en: The code snippets we will share are intended for demonstrative purposes. Please
    do not rely on their accuracy or their optimality. Please do not interpret our
    mention of any tool or technique as an endorsement for its use. Ultimately, the
    best design choices for your use case will greatly depend on the details of your
    project and, given the extent of the potential impact on performance, should be
    evaluated with the appropriate time and attention.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将分享的代码片段仅用于演示目的。请勿依赖它们的准确性或最优性。请勿将我们提及的任何工具或技术解释为对其使用的认可。最终，最适合你用例的设计选择将极大地取决于你项目的细节，鉴于对性能可能产生的影响程度，应该用适当的时间和注意力进行评估。
- en: Why CPU?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么是CPU？
- en: With the ever-increasing number of hardware solutions for executing AI/ML model
    inference, our choice of a CPU may seem surprising. In this section, we describe
    some scenarios in which CPU may be the preferred platform for inference.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 随着执行AI/ML模型推理的硬件解决方案数量的不断增长，我们选择CPU作为推理平台可能看起来令人惊讶。在本节中，我们将描述一些CPU可能是推理首选平台的情况。
- en: '**Accessibility**: The use of dedicated AI accelerators — such as GPUs — typically
    requires dedicated deployment and maintenance or, alternatively, access to such
    instances on a cloud service platform. CPUs, on the other hand, are everywhere.
    Designing a solution to run on a CPU provides much greater flexibility and increases
    the opportunities for deployment.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可访问性**：使用专用的人工智能加速器（如GPU）通常需要专门的部署和维护，或者，在云服务平台上访问这些实例。另一方面，CPU无处不在。设计在CPU上运行的解决方案提供了更大的灵活性，并增加了部署的机会。'
- en: '**Availability**: Even if your algorithm can access an AI accelerator, there
    is the question of availability. AI accelerators are in extremely high demand,
    and even if/when you are able to acquire one, whether it be on-prem or in the
    cloud, you may choose to prioritize them for tasks that are even more resource
    intensive, such as AI model training.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可用性**：即使你的算法可以访问人工智能加速器，也存在可用性的问题。人工智能加速器需求极高，即使你能够获得一个，无论是本地还是云端的，你可能会选择将它们优先用于更资源密集型的任务，例如人工智能模型训练。'
- en: '**Reduced Latency**: There are many situations in which your AI model is just
    one component in a pipeline of software algorithms running on a standard CPU.
    While the AI model may perform significantly faster on an AI accelerator, when
    taking into account the time required to send an inference request over the network,
    it is quite possible that running it on the same CPU will be faster.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**降低延迟**：有许多情况，你的AI模型只是运行在标准CPU上的软件算法管道中的一个组件。虽然AI模型在人工智能加速器上可能执行得更快，但考虑到发送推理请求到网络所需的时间，它在同一CPU上运行可能会更快。'
- en: '**Underuse of Accelerator**: AI accelerators are typically quite expensive.
    To justify their cost, your goal should be to keep them fully occupied, minimizing
    their idle time. In some cases, the inference load will not justify the cost of
    an expensive AI accelerator.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**加速器利用率不足**：AI加速器通常相当昂贵。为了证明其成本合理，你的目标应该是保持其完全占用，最小化其空闲时间。在某些情况下，推理负载可能无法证明昂贵AI加速器的成本合理。'
- en: '**Model Architecture**: These days, we tend to automatically assume that AI
    models will perform significantly better on AI accelerators than on CPUs. And
    while more often than not, this is indeed the case, your model may include layers
    that perform better on CPU. For example, sequential algorithms such as Non-Maximum
    Suppression (NMS) and the Hungarian matching algorithm tend to perform better
    on CPU than GPU and are often offloaded onto the CPU even if a GPU is available
    (e.g., see [here](https://github.com/pytorch/vision/blob/v0.19.1/torchvision/csrc/ops/cuda/nms_kernel.cu)).
    If your model contains many such layers, running it on a CPU might not be such
    a bad option.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型架构**：如今，我们往往自动假设AI模型在AI加速器上的性能将显著优于CPU。尽管这种情况通常确实如此，但你的模型可能包含在CPU上表现更好的层。例如，序列算法如非极大值抑制（NMS）和匈牙利匹配算法通常在CPU上的表现优于GPU，即使有GPU可用，也经常将它们卸载到CPU上（例如，参见[这里](https://github.com/pytorch/vision/blob/v0.19.1/torchvision/csrc/ops/cuda/nms_kernel.cu)）。如果你的模型包含许多这样的层，在CPU上运行可能并不是一个糟糕的选择。'
- en: Why Intel Xeon?
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么选择Intel Xeon？
- en: '[Intel® Xeon® Scalable CPU](https://www.intel.com/content/www/us/en/products/details/processors/xeon/scalable.html) processors
    come with built-in accelerators for the matrix and convolution operators that
    are common in typical AI/ML workloads. These include [AVX-512](https://www.intel.com/content/www/us/en/architecture-and-technology/avx-512-overview.html) (introduced
    in Gen1), the [VNNI extension](https://www.intel.com/content/www/us/en/developer/articles/guide/deep-learning-with-avx512-and-dl-boost.html) (Gen2),
    and [AMX](https://www.intel.com/content/www/us/en/products/docs/accelerator-engines/what-is-intel-amx.html) (Gen4).
    The AMX engine, in particular, includes specialized hardware instructions for
    executing AI models using bfloat16 and int8 precision data types. The acceleration
    engines are tightly integrated with Intel’s optimized software stack, which includes [oneDNN](https://www.intel.com/content/www/us/en/developer/tools/oneapi/onednn.html), [OpenVINO](https://www.intel.com/content/www/us/en/developer/tools/openvino-toolkit/overview.html),
    and the [Intel Extension for PyTorch](https://www.intel.com/content/www/us/en/developer/articles/technical/accelerate-with-intel-extension-for-pytorch.html) (IPEX).
    These libraries utilize the dedicated Intel® Xeon® hardware capabilities to optimize
    model execution with minimal code changes.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[Intel® Xeon® 可扩展 CPU](https://www.intel.com/content/www/us/en/products/details/processors/xeon/scalable.html)处理器内置了针对典型AI/ML工作负载中常见的矩阵和卷积算子的加速器。这些包括[AVX-512](https://www.intel.com/content/www/us/en/architecture-and-technology/avx-512-overview.html)（在第一代中引入）、[VNNI
    扩展](https://www.intel.com/content/www/us/en/developer/articles/guide/deep-learning-with-avx512-and-dl-boost.html)（第二代）和[AMX](https://www.intel.com/content/www/us/en/products/docs/accelerator-engines/what-is-intel-amx.html)（第四代）。特别是，AMX
    引擎包括用于使用bfloat16和int8精度数据类型执行AI模型的专用硬件指令。加速引擎与英特尔优化的软件堆栈紧密集成，该软件堆栈包括[oneDNN](https://www.intel.com/content/www/us/en/developer/tools/oneapi/onednn.html)、[OpenVINO](https://www.intel.com/content/www/us/en/developer/tools/openvino-toolkit/overview.html)和[PyTorch的英特尔扩展](https://www.intel.com/content/www/us/en/developer/articles/technical/accelerate-with-intel-extension-for-pytorch.html)（IPEX）。这些库利用了专门的Intel®
    Xeon®硬件能力，以最小的代码更改优化模型执行。'
- en: Despite the arguments made in this section, the choice of inference vehicle
    should be made after considering all options available and after assessing the
    opportunities for optimization on each one. In the next sections, we will introduce
    a toy experiment and explore some of the optimization opportunities on CPU.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管本节中提出了论点，但在考虑所有可用选项并评估每个选项的优化机会之后，才应做出推理工具的选择。在下一节中，我们将介绍一个玩具实验并探讨CPU上的某些优化机会。
- en: Inference Experiment
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理实验
- en: In this section, we define a toy AI model inference experiment comprising a [Resnet50](https://docs.pytorch.org/vision/main/models/generated/torchvision.models.resnet50.html) image
    classification model, a randomly generated input batch, and a simple benchmarking
    utility which we use to report the average number of input samples processed per
    second (SPS).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们定义了一个玩具AI模型推理实验，包括一个[Resnet50](https://docs.pytorch.org/vision/main/models/generated/torchvision.models.resnet50.html)图像分类模型、一个随机生成的输入批次，以及一个简单的基准测试工具，我们使用它来报告每秒处理的平均输入样本数（SPS）。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The baseline performance of our toy model is 22.76 samples per second (SPS).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们玩具模型的基线性能为每秒22.76个样本（SPS）。
- en: Model Inference Optimization
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型推理优化
- en: In this section, we apply a number of optimizations to our toy experiment and
    assess their impact on runtime performance. Our focus will be on optimization
    techniques that can be applied with relative ease. While it is quite likely that
    additional performance gains can be achieved, these may require much greater specialization
    and a more significant time investment.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们对玩具实验应用了多项优化，并评估了它们对运行时性能的影响。我们的重点是那些相对容易应用的优化技术。虽然很可能会实现额外的性能提升，但这些可能需要更大的专业化和更多的时间投入。
- en: Our focus will be on optimizations that do not change the model architecture;
    optimization techniques such as model distillation and model pruning are out of
    the context of this post. Also out of scope are methods for optimizing specific
    model components, e.g., by implementing custom PyTorch operators.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的重点将放在不改变模型架构的优化上；如模型蒸馏和模型剪枝等优化技术超出了本文的范畴。此外，优化特定模型组件的方法，例如通过实现定制的PyTorch运算符，也不在本节讨论范围内。
- en: In a previous post we discussed AI model optimization on Intel XEON CPUs in
    the context of training workloads. In this section we will revisit some of the
    techniques mentioned there, this time in the context of AI model inference. We
    will complement these with optimization techniques that are unique to inference
    settings, including model compilation for inference, INT8 quantization, and multi-worker
    inference.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的一篇文章中，我们讨论了在Intel XEON CPU上针对训练工作负载的AI模型优化。在本节中，我们将回顾其中的一些技术，这次是在AI模型推理的背景下。我们将补充一些仅适用于推理设置的优化技术，包括推理模型编译、INT8量化以及多工作者推理。
- en: The order in which we present the optimization methods is not binding. In fact,
    some of the techniques are interdependent; for example, increasing the number
    of inference workers could impact the optimal choice of batch size.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们展示优化方法的顺序不是强制性的。实际上，一些技术是相互依赖的；例如，增加推理工作者的数量可能会影响最佳批次大小的选择。
- en: 'Optimization 1: Batched Inference'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化1：批处理推理
- en: A common method for increasing resource utilization while reducing the average
    inference response time is to group input samples into batches. In real-world
    scenarios, we need to make sure to cap the batch size so that we meet the service
    level response time requirements, but for the purposes of our experiment we ignore
    this requirement. Experimenting with different batch sizes we find that a batch
    size of 8 results in a throughput of 26.28 SPS, 15% higher than the baseline result.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 提高资源利用率同时减少平均推理响应时间的常用方法是将输入样本分组为批次。在现实场景中，我们需要确保限制批次大小以满足服务级别响应时间要求，但为了实验目的，我们忽略这一要求。通过实验不同批次大小，我们发现批次大小为8时，吞吐量为26.28
    SPS，比基线结果高15%。
- en: Note that in the case that the shapes of the input samples vary, batching requires
    more handling (e.g., see [here](https://towardsdatascience.com/optimizing-transformer-models-for-variable-length-input-sequences-19fb88fddf71/)).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果输入样本的形状不同，分组需要更多的处理（例如，参见[这里](https://towardsdatascience.com/optimizing-transformer-models-for-variable-length-input-sequences-19fb88fddf71/)）。
- en: 'Optimization 2: Channels-Last Memory Format'
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化2：通道最后内存格式
- en: 'By default in PyTorch, 4D tensors are stored in NCHW format, i.e., the four
    dimensions represent the batch size, channels, height, and width, respectively. However,
    the channels-last or NHWC format (i.e., batch size, height, width, and channels)
    exhibits better performance on CPU. Adjusting our inference script to apply the
    channels-last optimization is a simple matter of setting the memory format of
    both the model and the input to *torch.channels_last* as shown below:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在 PyTorch 中，默认情况下，4D 张量以 NCHW 格式存储，即四个维度分别代表批大小、通道、高度和宽度。然而，channels-last 或
    NHWC 格式（即批大小、高度、宽度、通道）在 CPU 上表现出更好的性能。调整我们的推理脚本以应用 channels-last 优化，只需将模型和输入的内存格式设置为
    *torch.channels_last*，如下所示：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Applying the *channels-last* memory optimization, results in a further boost
    of 25% in throughput.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 应用 *channels-last* 内存优化，进一步提升了 25% 的吞吐量。
- en: The impact of this optimization is most noticeable on models that have many
    convolutional layers. It is not expected to make a noticeable impact on other
    model architectures (e.g., transformer models).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这种优化的影响在具有许多卷积层的模型上最为明显。预计它不会对其他模型架构（例如，转换器模型）产生明显的影响。
- en: Please see the [PyTorch documentation](https://docs.pytorch.org/tutorials/intermediate/memory_format_tutorial.html) for
    more details on the memory format optimization and the [Intel documentation](https://intel.github.io/intel-extension-for-pytorch/cpu/latest/tutorials/features/nhwc.html) for
    details on how this is implemented internally in oneDNN.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅 [PyTorch 文档](https://docs.pytorch.org/tutorials/intermediate/memory_format_tutorial.html)
    了解内存格式优化的更多详细信息，以及 [英特尔文档](https://intel.github.io/intel-extension-for-pytorch/cpu/latest/tutorials/features/nhwc.html)
    了解如何在 oneDNN 内部实现此功能。
- en: 'Optimization 3: Automatic Mixed Precision'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 3：自动混合精度
- en: 'Modern Intel® Xeon® Scalable processors (from Gen3) include native support
    for the bfloat16 data type, a 16-bit floating point alternative to the standard
    float32\. We can take advantage of this by applying PyTorch’s automatic mixed
    precision package, [torch.amp](https://pytorch.org/docs/stable/amp.html), as demonstrated
    below:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现代英特尔® 至强® 可扩展处理器（从第 3 代开始）原生支持 bfloat16 数据类型，这是标准 float32 的 16 位浮点数替代品。我们可以通过应用
    PyTorch 的自动混合精度包 [torch.amp](https://pytorch.org/docs/stable/amp.html) 来利用这一点，如下所示：
- en: '[PRE2]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The result of applying mixed precision is a throughput of 86.95 samples per
    second, 2.6 times the previous experiment and 3.8 times the baseline result.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 应用混合精度后的结果是每秒 86.95 个样本的吞吐量，是之前实验的 2.6 倍，是基准结果的 3.8 倍。
- en: Note that the use of a reduced precision floating point type can have an impact
    on numerical accuracy, and its effect on model quality performance must be evaluated.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，使用降低精度的浮点数类型可能会影响数值精度，并且其对模型质量性能的影响必须进行评估。
- en: 'Optimization 4: Memory Allocation Optimization'
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 4：内存分配优化
- en: 'Typical AI/ML workloads require the allocation and access of large blocks of
    memory. A number of optimization techniques are aimed at tuning the way memory
    is allocated and used during model execution. One common step is to replace the
    default system allocator (ptmalloc) with an alternative memory allocation libraries,
    such as [Jemalloc](https://github.com/jemalloc/jemalloc) and [TCMalloc](https://google.github.io/tcmalloc/overview.html),
    which have been shown to perform better on common AI/ML workloads (e.g., see [here](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html#choosing-an-optimized-memory-allocator)).
    To install [TCMalloc](https://google.github.io/tcmalloc/overview.html) run:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的 AI/ML 工作负载需要分配和访问大块内存。许多优化技术旨在调整模型执行期间内存的分配和使用方式。一个常见的步骤是将默认的系统分配器（ptmalloc）替换为替代内存分配库，例如
    [Jemalloc](https://github.com/jemalloc/jemalloc) 和 [TCMalloc](https://google.github.io/tcmalloc/overview.html)，这些库在常见的
    AI/ML 工作负载上已被证明表现更佳（例如，参见 [此处](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html#choosing-an-optimized-memory-allocator)）。要安装
    [TCMalloc](https://google.github.io/tcmalloc/overview.html)，请运行：
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'We program its use via the *LD_PRELOAD* environment variable:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过 *LD_PRELOAD* 环境变量来编程其使用：
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'This optimization results in another significant performance boost: 117.54
    SPS, 35% higher than our previous experiment!!'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这种优化带来了另一个显著的性能提升：117.54 SPS，比我们之前的实验高出 35%！！
- en: 'Optimization 5: Enable Huge Page Allocations'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 5：启用大页分配
- en: By default, the Linux kernel allocates memory in blocks of 4 KB, commonly referred
    to as pages. The mapping between the virtual and physical memory addresses is
    managed by the CPU’s Memory Management Unit (MMU), which uses a small hardware
    cache called the Translation Lookaside Buffer (TLB). The TLB is limited in the
    number entries it can hold. When you have *many* small pages (as in large neural
    network models), the number of TLB cache misses can climb quickly, increasing
    latency and slowing down the speed of the program. A common way to address this
    is to use “huge pages” — blocks of 2 MB (or 1 GB) per page. This reduces the number
    of TLB entries required, improving memory access efficiency and lowering allocation
    latency.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，Linux 内核以 4 KB 的块分配内存，通常称为页面。虚拟和物理内存地址之间的映射由 CPU 的内存管理单元（MMU）管理，它使用一个称为转换后备缓冲器（TLB）的小型硬件缓存。TLB
    的条目数量有限。当你有 *很多* 小页面（如大型神经网络模型）时，TLB 缓存未命中次数会迅速增加，增加延迟并降低程序的速度。解决这个问题的常见方法是使用“大页面”——每个页面
    2 MB（或 1 GB）的块。这减少了所需的 TLB 条目数量，提高了内存访问效率并降低了分配延迟。
- en: '[PRE5]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In the case of our model, the impact is negligible. However, this is an important
    optimization for many AI/ML workloads.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的模型情况下，影响微乎其微。然而，这对于许多 AI/ML 工作负载来说是一个重要的优化。
- en: 'Optimization 6: IPEX'
  id: totrans-51
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 优化 6：IPEX
- en: '[Intel® Extension for PyTorch (IPEX)](https://intel.github.io/intel-extension-for-pytorch/cpu/latest/) is
    a library extension for PyTorch with the latest performance optimizations for
    Intel hardware. To install it we run:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '[Intel® Extension for PyTorch (IPEX)](https://intel.github.io/intel-extension-for-pytorch/cpu/latest/)
    是一个针对 PyTorch 的库扩展，为英特尔硬件提供了最新的性能优化。要安装它，我们运行：'
- en: '[PRE6]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: In the code block below, we demonstrate the basic use of the [ipex.optimize](https://intel.github.io/intel-extension-for-pytorch/latest/tutorials/api_doc.html) API.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我们演示了 [ipex.optimize](https://intel.github.io/intel-extension-for-pytorch/latest/tutorials/api_doc.html)
    API 的基本用法。
- en: '[PRE7]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The resultant throughout is 159.31 SPS, for another 36% performance boost.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 结果的吞吐量为 159.31 SPS，提高了 36% 的性能。
- en: Please see the official documentation for more details on the many optimizations
    that IPEX has to offer.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅官方文档以获取更多关于 IPEX 提供的众多优化细节。
- en: 'Optimization 7: Model Compilation'
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 7：模型编译
- en: 'Another popular PyTorch optimization is torch.compile. Introduced in PyTorch
    2.0, this just-in-time (JIT) compilation feature, performs kernel fusion and other
    optimizations. In a previous post we covered PyTorch compilation in great detail,
    covering some its many features, controls, and limitations. Here we demonstrate
    its basic use:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个流行的 PyTorch 优化是 torch.compile。自 PyTorch 2.0 引入，这个即时编译（JIT）功能执行内核融合和其他优化。在之前的文章中，我们详细介绍了
    PyTorch 的编译，涵盖了其许多功能、控制和限制。在这里，我们演示其基本用法：
- en: '[PRE8]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Applying torch.compile on the IPEX-optimized model results in a throughput of
    144.5 SPS, which is lower than our previous experiment. In the case of our model,
    IPEX and torch.compile do not coexist well. When applying just the torch.compile
    the throughput is 133.36 SPS.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在 IPEX 优化的模型上应用 torch.compile，结果吞吐量为 144.5 SPS，低于我们之前的实验。在我们的模型情况下，IPEX 和 torch.compile
    并不兼容。仅应用 torch.compile 时，吞吐量为 133.36 SPS。
- en: The general takeaway from this experiment is that, for a given model, any two
    optimization techniques could interfere with one another. This necessitates evaluating
    the impact of multiple configurations on the runtime performance of a given model
    in order to find the best one.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个实验中得出的总体结论是，对于给定的模型，任何两种优化技术都可能相互干扰。这需要评估多个配置对给定模型运行时性能的影响，以找到最佳配置。
- en: 'Optimization 8: Auto-tune Environment Setup With **`torch.xeon.run_cpu`**'
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 8：使用 **`torch.xeon.run_cpu`** 自动调整环境设置
- en: There are a number of environment settings that control thread and memory management
    and can be used to further fine-tune the runtime performance of an AI/ML workload.
    Rather than setting these manually, PyTorch offers the [torch.xeon.run_cpu](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html) script
    that does this automatically. In preparation for the use of this script, we install
    Intel’s threading and multiprocessing libraries, [one TBB](https://www.intel.com/content/www/us/en/developer/tools/oneapi/onetbb.html) and [Intel
    OpenMP](https://www.intel.com/content/www/us/en/docs/oneapi/installation-guide-linux/2023-0/pip.html).
    We also add a symbolic link to our [TCMalloc](https://google.github.io/tcmalloc/overview.html) installation.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多环境设置可以控制线程和内存管理，并可用于进一步微调 AI/ML 工作负载的运行时性能。而不是手动设置这些设置，PyTorch 提供了 [torch.xeon.run_cpu](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html)
    脚本来自动完成这些操作。为了使用此脚本，我们安装了英特尔的多线程和进程库，[one TBB](https://www.intel.com/content/www/us/en/developer/tools/oneapi/onetbb.html)
    和 [Intel OpenMP](https://www.intel.com/content/www/us/en/docs/oneapi/installation-guide-linux/2023-0/pip.html)。我们还添加了一个符号链接到我们的
    [TCMalloc](https://google.github.io/tcmalloc/overview.html) 安装。
- en: '[PRE9]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: In the case of our toy model, using torch.xeon.run_cpu increases the throughput
    to 162.15 SPS — a slight increase over our previous maximum of 159.31 SPS.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的玩具模型中，使用 torch.xeon.run_cpu 将吞吐量提高到 162.15 SPS —— 比我们之前的最大值 159.31 SPS 略有增加。
- en: Please see the [PyTorch documentation](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html) for
    more features of the `torch.xeon.run_cpu` and more details on the environment
    variables it applies.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅 [PyTorch 文档](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html)
    了解 `torch.xeon.run_cpu` 的更多功能和它应用的环境变量的更多详细信息。
- en: 'Optimization 9: Multi-worker Inference'
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 9：多工作者推理
- en: 'Another popular technique for increasing resource utilization and scale is
    to load multiple instances of the AI model and run them in parallel in separate
    processes. Although this technique is more commonly applied on machines with many
    CPUs (separated into multiple [NUMA nodes](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html#applying-numa-access-control))
    — not on our small 4-vCPU instance — we include it here for the sake of demonstration.
    In the script below we run 2 instances of our model in parallel:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种提高资源利用率和扩展性的流行技术是加载多个 AI 模型实例，并在单独的进程中并行运行它们。尽管这种技术更常应用于具有许多 CPU 的机器（分为多个
    [NUMA 节点](https://docs.pytorch.org/tutorials/recipes/xeon_run_cpu.html#applying-numa-access-control)）——
    而不是我们的小型 4-vCPU 实例——但我们在此处包含它以供演示。在下面的脚本中，我们并行运行了我们的模型 2 个实例：
- en: '[PRE10]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This results in a throughput of 169.4 SPS — additional modest but meaningful
    4% increase.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得吞吐量达到 169.4 SPS —— 另外一个适度但有意义 4% 的增加。
- en: Optimization 10: INT8 Quantization
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 10：INT8 量化
- en: INT8 quantization is another common technique for accelerating AI model inference
    execution. In INT8 quantization, the floating point datatypes of the model weights
    and activations are replaced by 8-bit integers. Intel’s Xeon processors include
    dedicated accelerators for processing INT8 operations (e.g., see [here](https://pytorch.org/blog/int8-quantization/)).
    INT8 quantization can result in a meaningful increase in speed and a lower memory
    footprint. Importantly, the reduced bit-precision can have a significant impact
    on the quality of the model output. There are many different approaches to INT8
    quantization some of which include calibration or retraining. There are also a
    wide variety of tools and libraries for applying quantization. A full discussion
    on the topic of quantization is beyond the scope of this post.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: INT8 量化是加速 AI 模型推理执行的另一种常见技术。在 INT8 量化中，模型权重和激活的浮点数据类型被替换为 8 位整数。英特尔的 Xeon 处理器包括用于处理
    INT8 操作的专用加速器（例如，请参阅 [此处](https://pytorch.org/blog/int8-quantization/))）。INT8
    量化可以导致速度的显著提高和更低的内存占用。重要的是，降低的位精度可能会对模型输出的质量产生重大影响。关于 INT8 量化的方法有很多，其中一些包括校准或重新训练。还有许多不同的工具和库可以用于应用量化。关于量化的全面讨论超出了本文的范围。
- en: Since in this post we are interested just in the potential performance impact,
    we demonstrate one quantization scheme using [TorchAO](https://github.com/pytorch/ao),
    without consideration of the impact on model quality. In the code block below,
    we implement [PyTorch 2 Export Quantization with X86 Backend through Inductor](https://docs.pytorch.org/ao/stable/tutorials_source/pt2e_quant_x86_inductor.html).
    INT8 quantization is another common technique for accelerating AI model inference
    execution. In INT8 quantization, the floating point datatypes of the model weights
    and activations are replaced by 8-bit integers. Intel’s Xeon processors include
    dedicated accelerators for processing INT8 operations (e.g., see [here](https://pytorch.org/blog/int8-quantization/)).
    INT8 quantization can result in a meaningful increase in speed and a lower memory
    footprint.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在这篇文章中我们只关注潜在的性能影响，我们展示了使用[TorchAO](https://github.com/pytorch/ao)的一个量化方案，没有考虑对模型质量的影响。在下面的代码块中，我们实现了[通过Inductor使用X86后端进行PyTorch
    2导出量化](https://docs.pytorch.org/ao/stable/tutorials_source/pt2e_quant_x86_inductor.html)。INT8量化是加速AI模型推理执行的一种常见技术。在INT8量化中，模型权重和激活的浮点数据类型被替换为8位整数。Intel的Xeon处理器包括用于处理INT8操作的专用加速器（例如，请参阅[这里](https://pytorch.org/blog/int8-quantization/)）。INT8量化可以显著提高速度并降低内存占用。
- en: 'Importantly, the reduced bit-precision can have a significant impact on the
    quality of the model output. There are many different approaches to INT8 quantization
    some of which include calibration or retraining. There are also a wide variety
    of tools and libraries for applying quantization. A full discussion on the topic
    of quantization is beyond the scope of this post. Since in this post we are interested
    just in the potential performance impact, we demonstrate one quantization scheme
    using [TorchAO](https://github.com/pytorch/ao), without consideration of the impact
    on model quality. In the code block below, we implement [PyTorch 2 Export Quantization
    with X86 Backend through Inductor](https://docs.pytorch.org/ao/stable/tutorials_source/pt2e_quant_x86_inductor.html).
    Please see the documentation for the full details:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，降低的位精度可能会对模型输出的质量产生重大影响。关于INT8量化有许多不同的方法，其中一些包括校准或重新训练。还有各种各样的工具和库用于应用量化。关于量化的全面讨论超出了本文的范围。由于在这篇文章中我们只关注潜在的性能影响，我们展示了使用[TorchAO](https://github.com/pytorch/ao)的一个量化方案，没有考虑对模型质量的影响。在下面的代码块中，我们实现了[通过Inductor使用X86后端进行PyTorch
    2导出量化](https://docs.pytorch.org/ao/stable/tutorials_source/pt2e_quant_x86_inductor.html)。请参阅文档以获取完整详情：
- en: '[PRE11]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This results in a throughput of 172.67 SPS.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致吞吐量为172.67 SPS。
- en: Please see [here](https://docs.pytorch.org/docs/2.9/quantization.html) for more
    details on quantization in PyTorch.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[这里](https://docs.pytorch.org/docs/2.9/quantization.html)以获取PyTorch中关于量化的更多详细信息。
- en: 'Optimization 11: Graph Compilation and Execution With ONNX'
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化11：使用ONNX进行图编译和执行
- en: There are a number of third party libraries that specialize in compiling PyTorch
    models into graph representations and optimizing them for runtime performance
    on target inference devices. One of the most popular libraries for this is [Open
    Neural Network Exchange](https://onnx.ai/) (ONNX). ONNX performs ahead-of-time
    compilation of AI/ML models and executes them using a dedicated runtime library.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多第三方库专门用于将PyTorch模型编译成图表示，并针对目标推理设备上的运行时性能进行优化。其中最受欢迎的库之一是[Open Neural Network
    Exchange](https://onnx.ai/)（ONNX）。ONNX对AI/ML模型进行预编译，并使用专用运行时库执行它们。
- en: 'While ONNX compilation support is included in PyTorch, we require the following
    library for executing an ONNX model:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然PyTorch包含ONNX编译支持，但执行ONNX模型需要以下库：
- en: '[PRE12]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'In the code block below, we demonstrate ONNX compilation and model execution:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我们展示了ONNX编译和模型执行：
- en: '[PRE13]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The resultant throughput is 44.92 SPS, far lower than in our previous experiments.
    In the case of our toy model, the ONNX runtime does not provide a benefit.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 结果吞吐量为44.92 SPS，远低于我们之前的实验。在我们的玩具模型中，ONNX运行时并没有提供任何优势。
- en: 'Optimization 12: Graph Compilation and Execution with OpenVINO'
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化12：使用OpenVINO进行图编译和执行
- en: 'Another opensource toolkit aimed at deploying highly performant AI solutions
    is [OpenVINO](https://docs.openvino.ai/2025/index.html). [OpenVINO](https://pypi.org/project/openvino/) is [highly
    optimized](https://www.intel.com/content/www/us/en/developer/tools/openvino-toolkit/overview.html) for
    model execution on Intel hardware — e.g., by fully leveraging the Intel AMX instructions.
    A common way to apply OpenVINO in PyTorch is to first convert the model to ONNX:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个针对部署高性能AI解决方案的开源工具包是[OpenVINO](https://docs.openvino.ai/2025/index.html)。[OpenVINO](https://pypi.org/project/openvino/)针对在英特尔硬件上执行模型进行了高度优化——例如，通过充分利用英特尔AMX指令。在PyTorch中应用OpenVINO的常见方法是将模型首先转换为ONNX：
- en: '[PRE14]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The result of this optimization is a throughput of 297.33 SPS, nearly twice
    as fast as our previous best experiment!!
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这次优化的结果是吞吐量为297.33 SPS，几乎是之前最佳实验的两倍速度！！
- en: Please see the official documentation for more details on OpenVINO.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅官方文档以获取更多关于OpenVINO的详细信息。
- en: 'Optimization 13: INT8 Quantization in OpenVINO with NNCF'
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化13：OpenVINO中的NNCF INT8量化
- en: As our final optimization, we revisit INT8 quantization, this time in the framework
    of [OpenVINO compilation](https://docs.openvino.ai/2025/openvino-workflow/model-optimization.html).
    As before, there are a number of methods for performing quantization — aimed at
    minimizing the impact on quality performance. Here we demonstrate the basic flow
    using the [NNCF](https://pypi.org/project/nncf/) library as documented [here](https://docs.openvino.ai/2025/openvino-workflow/model-optimization-guide/quantizing-models-post-training/basic-quantization-flow.html).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 作为我们最后的优化，我们重新审视了INT8量化，这次是在[OpenVINO编译](https://docs.openvino.ai/2025/openvino-workflow/model-optimization.html)的框架下。和之前一样，有几种执行量化的方法——旨在最小化对质量性能的影响。在这里，我们使用[NNCF](https://pypi.org/project/nncf/)库演示了基本流程，如[此处](https://docs.openvino.ai/2025/openvino-workflow/model-optimization-guide/quantizing-models-post-training/basic-quantization-flow.html)所述。
- en: '[PRE15]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This results in a throughput of 482.46(!!) SPS, another drastic improvement
    and over 18 times faster than our baseline experiment.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得吞吐量达到了482.46(!!) SPS，又一次大幅提升，比我们的基线实验快18倍以上。
- en: Results
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果
- en: 'We summarize the results of our experiments in the table below:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在下面的表格中总结了我们的实验结果：
- en: '![](../Images/c10c0af9fa1a4276275d8cc7249b03b8.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c10c0af9fa1a4276275d8cc7249b03b8.png)'
- en: ResNet50 Inference Experiment (by Author)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet50推理实验（作者）
- en: In the case of our toy model, the optimizations steps we demonstrated resulted
    in huge performance gains. Importantly, the impact of each optimization can vary
    greatly based on the details of the model. You may find that some of these techniques
    do not apply to your model, or do not result in improved performance. For example,
    when we reapply the same sequence of optimizations to a Vision Transformer (ViT)
    model, the resultant performance boost is 8.41X — still significant, but less
    than the 18.36X of our experiment. Please see the appendix to this post for details.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的玩具模型的情况下，我们展示的优化步骤导致了巨大的性能提升。重要的是，每个优化的影响可能会根据模型的细节有很大的不同。你可能发现这些技术中的一些并不适用于你的模型，或者并没有带来性能提升。例如，当我们将相同的优化序列重新应用于一个视觉Transformer
    (ViT) 模型时，结果性能提升为8.41X——仍然很显著，但低于我们实验中的18.36X。请参阅本帖的附录以获取详细信息。
- en: Our focus has been on runtime performance, but it is critical that you also
    evaluate the impact of each optimization on other metrics that are important to
    you — most importantly model quality.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的重点一直在于运行时性能，但评估每个优化对您认为重要的其他指标的影响也同样关键——最重要的是模型质量。
- en: There are, undoubtedly, many more optimization techniques that can be applied;
    we have merely scratched the surface. Hopefully, the
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，还有许多更多的优化技术可以应用；我们仅仅只是触及了表面。希望，
- en: Summary
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This post continues our [series](https://towardsdatascience.com/author/chaimrand/) on
    the important topic of AI/ML model runtime performance analysis and optimization.
    Our focus in this post was on model inference on Intel® Xeon® CPU processors.
    Given the ubiquity and prevalence of CPUs, the ability to execute models on them
    in a reliable and performant manner, can be extremely compelling. As we have shown,
    by applying a number of relatively simple techniques, we can achieve considerable
    gains in model performance with profound implications on inference costs and inference
    latency.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 本文继续我们关于AI/ML模型运行时性能分析和优化的重要主题系列[文章](https://towardsdatascience.com/author/chaimrand/)。本文的重点是模型在Intel®
    Xeon® CPU处理器上的推理。鉴于CPU的普遍性和普及性，能够在它们上以可靠和高效的方式执行模型的能力，可能极具吸引力。正如我们所展示的，通过应用一系列相对简单的技术，我们可以在模型性能上实现显著的提升，这对推理成本和推理延迟有深远的影响。
- en: Please do not hesitate to reach out with comments, questions, or corrections.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 请随时提出评论、问题或更正。
- en: 'Appendix: Vision Transformer Optimization'
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 附录：视觉Transformer优化
- en: 'To demonstrate how the impact of the runtime optimizations we discussed depend
    on the details of the AI/ML model, we reran our experiment on a Vision Transformer
    (ViT) model from the popular [timm](https://pypi.org/project/timm/) library:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示我们讨论的运行时优化对我们讨论的AI/ML模型细节的影响，我们在流行的[timm](https://pypi.org/project/timm/)库中的一个视觉Transformer（ViT）模型上重新进行了实验：
- en: '[PRE16]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'One modification in this experiment was to apply [OpenVINO compilation directly
    to the PyTorch model](https://docs.openvino.ai/2025/openvino-workflow/model-preparation/convert-model-pytorch.html) rather
    than an intermediate ONNX model. This was due to the fact that OpenVINO compilation
    failed on the ViT ONNX model. The revised [NNCF quantization](https://docs.openvino.ai/2025/openvino-workflow/model-optimization-guide/quantizing-models-post-training/basic-quantization-flow.html#) and
    OpenVINO compilation sequence is shown below:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中的一个修改是将[OpenVINO编译直接应用于PyTorch模型](https://docs.openvino.ai/2025/openvino-workflow/model-preparation/convert-model-pytorch.html)，而不是中间的ONNX模型。这是因为OpenVINO编译在ViT
    ONNX模型上失败了。下面展示了修订后的[NNCF量化](https://docs.openvino.ai/2025/openvino-workflow/model-optimization-guide/quantizing-models-post-training/basic-quantization-flow.html#)和OpenVINO编译序列：
