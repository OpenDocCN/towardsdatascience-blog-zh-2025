- en: 'Learnings from a Machine Learning Engineer — Part 4: The Model'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习工程师的学习经验——第四部分：模型
- en: 原文：[https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-4-the-model/](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-4-the-model/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-4-the-model/](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-4-the-model/)
- en: In this latest part of my series, I will share what I have learned on selecting
    a model for image classification and how to fine tune that model. I will also
    show how you can leverage the model to accelerate your labelling process, and
    finally how to justify your efforts by generating usage and performance statistics.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列的最新部分，我将分享我在选择图像分类模型以及如何微调该模型方面的学习经验。我还会展示您如何利用该模型来加速您的标注过程，最后是如何通过生成使用和性能统计来证明您的努力。
- en: In [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/),
    I discussed the process of labelling your image data that you use in your image
    classification project. I showed how define “good” images and create sub-classes.
    In [Part 2](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/),
    I went over various data sets, beyond the usual train-validation-test sets, with
    benchmark sets, plus how to handle synthetic data and duplicate images. In [Part
    3](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/),
    I explained how to apply different evaluation criteria to a trained model versus
    a deployed model, and using benchmarks to determine when to deploy a model.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第一部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)中，我讨论了在您的图像分类项目中使用的图像数据的标注过程。我展示了如何定义“好的”图像并创建子类别。在[第二部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/)中，我概述了各种数据集，包括常规的训练-验证-测试集、基准集，以及如何处理合成数据和重复图像。在[第三部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)中，我解释了如何将不同的评估标准应用于训练模型和部署模型，以及如何使用基准来确定何时部署模型。
- en: '**Model selection**'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**模型选择**'
- en: So far I have focused a lot of time on labelling and curating the set of images,
    and also evaluating model performance, which is like putting the cart before the
    horse. I’m not trying to minimize what it takes to design a massive neural network
    — this is a very important part of the application you are building. In my case,
    I spent a few weeks experimenting with different available models before settling
    on one that fit the bill.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我投入了大量时间在标注和整理图像集，以及评估模型性能，这就像是本末倒置。我并不是试图最小化设计大型神经网络所需的努力——这是您正在构建的应用程序的重要组成部分。在我的情况下，我在确定一个合适的模型之前，花了几周时间尝试不同的可用模型。
- en: Once you pick a model structure, you usually don’t make any major changes to
    it. For me, six years into deployment, I’m still using the same one. Specifically,
    I chose Inception V4 because it has a large input image size and an adequate number
    of layers to pick up on subtle image features. It also performs inference fast
    enough on CPU, so I don’t need to run expensive hardware to serve the model.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦选择了模型结构，您通常不会对其做出任何重大更改。对我来说，在部署了六年之后，我仍在使用同一个模型。具体来说，我选择了Inception V4，因为它具有较大的输入图像尺寸和足够的层数来捕捉细微的图像特征。它还在CPU上足够快地进行推理，因此我不需要运行昂贵的硬件来提供服务。
- en: Your mileage may vary. But again, the main takeaway is that focusing on your
    data will pay dividends versus searching for the best model.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 您的里程数可能会有所不同。但再次强调，主要收获是专注于您的数据将比寻找最佳模型带来更多回报。
- en: '**Fine tuning**'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**微调**'
- en: I will share a process that I found to work extremely well. Once I decided on
    the model to use, I randomly initialized the weights and let the model train for
    about 120 epoch before improvements plateau at a fairly modest accuracy, like
    93%. At this point, I performed the evaluation of the trained model (see [Part
    3](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/))
    to clean up the data set. I also incorporated new images as part of the data pipeline
    (see [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/))
    and prepared the data sets for the next training run.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我将分享一个我发现效果极好的过程。一旦我决定了要使用的模型，我就随机初始化权重，并让模型训练大约120个epoch，直到改进达到一个相当适中的准确率，比如93%。在这个时候，我进行了训练模型的评估（见[第3部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/))，以清理数据集。我还将新的图像作为数据管道的一部分（见[第1部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/))，并为下一次训练运行准备数据集。
- en: Before starting the next training run, I simply take the last trained model,
    pop the output layer, and add it back in with random weights. Since the number
    of output classes are constantly increasing in my case, I have to pop that layer
    anyway to account for the new number of classes. Importantly, I leave the rest
    of the trained weights as they were and allow them to continue updating for the
    new classes.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始下一次训练运行之前，我简单地取最后训练好的模型，移除输出层，并用随机权重将其重新添加。由于在我的情况下输出类别的数量一直在增加，我无论如何都需要移除这一层来适应新的类别数量。重要的是，我保留了其余训练好的权重，并允许它们继续更新以适应新的类别。
- en: This allows the model to train much faster before improvements stall. After
    repeating this process dozens of times, the training reaches plateau after about
    20 epochs, and the test accuracy can reach 99%! The model is building upon the
    low-level features that it established from the previous runs while re-learning
    the output weights to prevent overfitting.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得模型在改进停滞之前能够更快地训练。经过几十次重复这个过程后，训练在大约20个epoch后达到平台期，测试准确率可以达到99%! 模型正在建立从之前运行中建立的底层特征，同时重新学习输出权重以防止过拟合。
- en: It took me a while to trust this process, and for a few years I would train
    from scratch every time. But after I attempted this and saw the training time
    (not to mention the cost of cloud GPU) go down while the accuracy continued to
    go up, I started to embrace the process. More importantly, I continue to see the
    evaluation metrics of the deployed model return solid performances.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我花了很长时间才信任这个过程，而且有好几年我每次都是从零开始训练。但是在我尝试了这个方法并看到训练时间（更不用说云GPU的成本）下降，而准确率持续上升后，我开始接受这个过程。更重要的是，我继续看到部署的模型的评估指标返回稳定的性能。
- en: '**Augmentation**'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**增强**'
- en: During training, you can apply transformations on your images (called “augmentation”)
    to give you more diversity from you data set. With our zoo animals, it is fairly
    safe to apply left-right flop, slight rotations clockwise and counterclockwise,
    and slight resize that will zoom in and out.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，你可以在你的图像上应用变换（称为“增强”），以从数据集中获得更多多样性。在我们的动物园动物中，应用左右翻转、轻微的顺时针和逆时针旋转以及轻微的缩放（放大和缩小）是相当安全的。
- en: With these transformations in mind, make sure your images are still able to
    act as good training images. In other words, an image where the subject is already
    small will be even smaller with a zoom out, so you probably want to discard the
    original. Also, some of your original pictures may need to be re-oriented by 90
    degrees to be upright since a further rotation would make them look unusual.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些变化，确保你的图像仍然能够作为良好的训练图像。换句话说，如果主题本身已经很小，那么在缩放后会更小，所以你可能想丢弃原始图像。此外，一些原始图片可能需要旋转90度才能竖直，因为进一步的旋转会使它们看起来不寻常。
- en: '**Bulk identification**'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**批量识别**'
- en: As I mentioned in [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/),
    you can use the trained model to assist you in labelling images one at a time.
    But the way to take this even further is to have your newly trained model identify
    hundreds at a time while building a list of the results that you can then filter.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在[第1部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/))中提到的，你可以使用训练好的模型来帮助你一次标记一张图像。但更进一步的方法是让你的新训练模型一次识别数百张图像，同时构建一个你可以过滤的结果列表。
- en: Typically, we have large collections of **unlabelled** images that have come
    in either through regular usage of the application or some other means. Recall
    from [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)
    assigning “unknown” labels to interesting pictures but you have no clue what it
    is. By using the bulk identification method, we can sift through the collections
    quickly to target the labelling once we know what they are.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，我们拥有大量来自应用程序的常规使用或其他方式的**未标记**图像集合。回想一下在[第一部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)中将“未知”标签分配给有趣的图片，但你并不知道它是什么。通过使用批量识别方法，我们可以在知道它们是什么之后快速筛选这些集合以进行标记。
- en: 'By combining your current image counts with the bulk identification results,
    you can target classes that need expanded coverage. Here are a few ways you can
    leverage bulk identification:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合您当前的图像数量和批量识别结果，您可以针对需要扩展覆盖率的类别。以下是一些您可以利用批量识别的方法：
- en: '**Increase low image counts** — Some of your classes may have just barely made
    the cutoff to be included in the training set, which means you need more examples
    to improve coverage. Filter for images that have low counts.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增加低图像数量** — 您的一些类别可能刚刚达到训练集的门槛，这意味着您需要更多示例来提高覆盖率。过滤掉数量低的图像。'
- en: '**Replace staged or synthetic images** — Some classes may be built entirely
    using non-real-world images. These pictures may be good enough to get started
    with, but may cause performance issues down the road because they look different
    than what typically comes through. Filter for classes that depend on staged images.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**替换场景或合成图像** — 一些类别可能完全使用非真实世界图像构建。这些图片可能足够开始使用，但可能因为它们看起来与通常通过的内容不同而引起性能问题。过滤掉依赖于场景图像的类别。'
- en: '**Find look-alike classes** — A class in your data set may look like another
    one. For example, let’s say your model can identify an antelope, and that looks
    like a gazelle which your model cannot identify yet. Setting a filter for antelope
    and a lower confidence score may reveal gazelle images that you can label.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**寻找相似类别** — 您的数据集中的某个类别可能看起来像另一个类别。例如，假设您的模型可以识别羚羊，而它看起来像您模型尚未识别的瞪羚。为羚羊设置过滤器并设置较低的置信度分数可能会揭示您可以标记的瞪羚图像。'
- en: '**Unknown labels** — You may not have known how to identify the dozens of cute
    wallaby pictures, so you saved them under “Unknown” because it was a good image.
    Now that you know what it is, you can filter for its look-alike kangaroo and quickly
    add a new class.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未知标签** — 您可能不知道如何识别几十张可爱袋鼠的图片，所以您将它们保存在“未知”类别下，因为这是一张好图片。现在您知道了它是什么，您可以过滤出其相似的袋鼠并快速添加一个新类别。'
- en: '**Mass removal of low scores** — As a way to clean out your large collection
    of unlabelled images that have nothing worth labelling, set a filter for lowest
    scores.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大量移除低分** — 作为清理大量无价值标记的未标记图像的一种方式，设置一个最低分数的过滤器。'
- en: '**Throw-away training run**'
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**废弃训练运行**'
- en: Recall the decision I made to have image cutoffs from [Part 2](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/),
    which allows us to ensure an adequate number of example images of a class before
    we train and server a model to the public. The problem is that you may have a
    number of classes that are **just** below your cutoff (in my case, 40) and don’t
    make it into the model.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下我在[第二部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/)中做出的图像截止决定，这使我们能够在训练和向公众提供模型之前确保有足够的类别示例图像。问题是您可能有一些类别**刚好**低于您的截止值（在我的情况下是40），并且没有进入模型。
- en: The way I approach this is with a “throw-away” training run that I do not intend
    to move to production. I will decrease the lower cutoff from 40 to perhaps 35,
    build my train-validation-test sets, then train and evaluate like I normally do.
    The most important part of this is the bulk identification at the end!
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我处理这个问题的方式是进行一个“废弃”的训练运行，我不打算将其移至生产环境。我将降低下限截止值从40降至可能35，构建我的训练-验证-测试集，然后像平常一样进行训练和评估。最重要的是最后的批量识别！
- en: There is a chance that somewhere in the large collection of unlabelled images
    I will find the few that I need. Doing the bulk identification with this throw-away
    model helps find them.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 有可能在大量未标记的图像中找到我需要的少数几个。使用这个废弃模型进行批量识别有助于找到它们。
- en: '**Performance Reporting**'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**性能报告**'
- en: One very important aspect of any machine learning application is being able
    to show usage and performance reports. Your manager will likely want to see how
    many times the application is being used to justify the expense, and you as the
    ML engineer will want to see how the latest model is performing compared to the
    previous one.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 任何机器学习应用的一个重要方面是能够展示使用和性能报告。你的经理可能会想看到应用被使用多少次以证明支出的合理性，而你作为机器学习工程师，则想看到最新模型与之前模型相比的表现。
- en: You should build logging into your model serving to record every transaction
    going through the system. Also, the manual evaluations from [Part 3](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)
    should be recorded so you can report on performance for such things as accuracy
    over time, by model version, by confidence scores, by class, etc. You will be
    able to detect trends and make adjustments to improve the overall solution.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在模型服务中构建日志记录，以记录通过系统的每一笔交易。此外，从[第三部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)中进行的手动评估也应记录下来，这样你就可以报告性能，例如随着时间的推移准确性、按模型版本、按置信度分数、按类别等。你将能够检测趋势并对整体解决方案进行调整。
- en: There are a lot of reporting tools, so I won’t recommend one over the other.
    Just make sure you are collecting as much information as you can to build these
    dashboards. This will justify the time, effort, and cost associated with maintaining
    the application.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 报告工具有很多，所以我不建议你选择其中一个。只需确保你收集尽可能多的信息来构建这些仪表板。这将证明维护应用所花费的时间、精力和成本是合理的。
- en: '**Conclusion**'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: We covered a lot of ground across this four-part series on building an image
    classification project and deploying it in the real world. It all starts with
    the data, and by investing the time and effort into maintaining the highest quality
    image library, you can reach impressive levels of model performance that will
    gain the trust and confidence of your business partners.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个关于构建图像分类项目并在现实世界中部署的四部分系列中，我们覆盖了很多内容。一切始于数据，通过投入时间和精力来维护最高质量图像库，你可以达到令人印象深刻的模型性能水平，这将赢得你商业伙伴的信任和信心。
- en: As a machine learning engineer, you are primarily responsible for building and
    deploying your model. But it doesn’t stop there — dive into the data. The more
    familiar you are with the data, the better you will understand the strengths and
    weaknesses of your model. Take a close look at the evaluations and use them as
    an opportunity to adjust the data set.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 作为机器学习工程师，你主要负责构建和部署你的模型。但这并不结束——深入数据。你对数据的熟悉程度越高，你对模型的优势和劣势的理解就越好。仔细查看评估结果，并利用它们作为调整数据集的机会。
- en: I hope these articles have helped you find new ways to improve your own machine
    learning project. And by the way, don’t let the machine do all the learning —
    as humans, our job is to continue our own learning, so don’t ever stop!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这些文章能帮助你找到改进你自己的机器学习项目的新方法。顺便说一句，不要让机器做所有的学习——作为人类，我们的工作是继续我们的学习，所以永远不要停止！
- en: Thank you for taking this deep dive with me into a data-driven approach to model
    optimization. I look forward to your feedback and how you can apply this to your
    own application.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢你与我一起深入探讨数据驱动的方法来优化模型。我期待你的反馈以及你如何将这些应用到自己的应用中。
