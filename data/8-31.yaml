- en: Sustainable Business Strategy with Data Analytics
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于数据分析的可持续发展商业策略
- en: 原文：[https://towardsdatascience.com/sustainable-business-strategy-with-data-analytics-ce27180f8ddb/](https://towardsdatascience.com/sustainable-business-strategy-with-data-analytics-ce27180f8ddb/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/sustainable-business-strategy-with-data-analytics-ce27180f8ddb/](https://towardsdatascience.com/sustainable-business-strategy-with-data-analytics-ce27180f8ddb/)
- en: Consensus means that everyone agrees to say collectively what no one believes
    individually.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 一致意味着每个人都同意集体说出他们个人不相信的事情。
- en: 'This quote captures a critical issue many companies face during their strategic
    green transformation: aligning diverse objectives across teams and departments.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这句话捕捉了许多公司在战略绿色转型过程中面临的一个关键问题：在团队和部门之间协调不同的目标。
- en: 'Sustainability Team: “We need to reduce emissions by 30%”.'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 可持续发展团队：“我们需要将排放量减少30%”。
- en: Imagine a hypothetical manufacturing company with, at the centre of its business
    strategy, an **ambitious target of reducing CO2 emissions by 30%.**
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一家假设的制造公司，其商业策略的核心是一个**雄心勃勃的目标：将二氧化碳排放量减少30%。**
- en: '![Value chain of our example - (Image by Samir Saci)](../Images/44f3b4e0007d4b09cc02539dea36c276.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![我们示例的价值链 – (图片由Samir Saci提供)](../Images/44f3b4e0007d4b09cc02539dea36c276.png)'
- en: Value chain of our example – (Image by Samir Saci)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们示例的价值链 – (图片由Samir Saci提供)
- en: The sustainability team’s challenge is to enforce process changes that may disrupt
    the activities of multiple departments along the value chain.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续发展团队的挑战是实施可能扰乱价值链上多个部门活动的流程变更。
- en: '![Sustainability Project Steering Committee - (Image by Samir Saci)](../Images/3beffd68ef3d46a76c8bc1e590ff37e1.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![可持续发展项目指导委员会 – (图片由Samir Saci提供)](../Images/3beffd68ef3d46a76c8bc1e590ff37e1.png)'
- en: Sustainability Project Steering Committee – (Image by Samir Saci)
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续发展项目指导委员会 – (图片由Samir Saci提供)
- en: How do you secure the approval of multiple stakeholders, that potentially have
    conflicting interests?
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你如何确保多个潜在存在利益冲突的股东的批准？
- en: In this article, we will use this company as an example to illustrate how analytics
    models can support sustainable business strategy.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将使用这家公司作为例子，说明分析模型如何支持可持续发展商业策略。
- en: How to Build a Sustainability Roadmap?
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何构建可持续发展路线图？
- en: You are a **Data Science Manager** in the Supply Chain department of this **international**
    **manufacturing group.**
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 您是这家**国际****制造集团**供应链部门的**数据科学经理**。
- en: Under pressure from shareholders and European regulations, your CEO set ambitious
    targets for **reducing the environmental footprint by 2030.**
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在股东和欧洲法规的压力下，您的首席执行官为**到2030年减少环境足迹**设定了雄心勃勃的目标。
- en: '![Stakeholders Involved in the Process - (Image by Samir Saci)](../Images/c00be893ff44ff5ac5d086cabf4b2e59.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![参与流程的股东 – (图片由Samir Saci提供)](../Images/c00be893ff44ff5ac5d086cabf4b2e59.png)'
- en: Stakeholders Involved in the Process – (Image by Samir Saci)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 参与流程的股东 – (图片由Samir Saci提供)
- en: The **sustainability department** leads a cross-functional transformation program
    involving multiple departments working together to implement green initiatives.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**可持续发展部门**领导一个跨职能转型项目，涉及多个部门共同实施绿色倡议。'
- en: Sustainable Supply Chain Network Optimization
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可持续供应链网络优化
- en: To illustrate my point, I will focus on **Supply Chain Network Optimization.**
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明我的观点，我将专注于**供应链网络优化**。
- en: The objective is to redesign the network of factories to meet market demand
    while optimizing cost and environmental footprint.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是重新设计工厂网络以满足市场需求，同时优化成本和环境足迹。
- en: '![Five Markets of our Manufacturing Company - (Image by Samir Saci)](../Images/97044341a8b5be2e4ad434d77bad5c0a.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![我们制造公司的五个市场 – (图片由Samir Saci提供)](../Images/97044341a8b5be2e4ad434d77bad5c0a.png)'
- en: Five Markets of our Manufacturing Company – (Image by Samir Saci)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们制造公司的五个市场 – (图片由Samir Saci提供)
- en: 'The total demand is **48,950 units per month, spread across five markets: Japan,
    the USA, Germany, Brazil,** and India.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 总需求量为每月**48,950个单位，分布在五个市场：日本、美国、德国、巴西**和印度。
- en: '![Demand Distribution per Market - (Image by Samir Saci)](../Images/bee35f78f51c8fcca842be510123464e.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![各市场需求分布 – (图片由Samir Saci提供)](../Images/bee35f78f51c8fcca842be510123464e.png)'
- en: Demand Distribution per Market – (Image by Samir Saci)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 各市场需求分布 – (图片由Samir Saci提供)
- en: 'Markets can be categorized based on customer purchasing power:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 市场可以根据客户购买力进行分类：
- en: '**High-price markets** (USA, Japan and Germany) account for 93.8% of the demand
    but have **elevated production costs**.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高价市场**（美国、日本和德国）占需求的93.8%，但**生产成本较高**。'
- en: '**Low-price markets** (Brazil and India) only account for **6.2%** of the demand,
    but **production costs are more competitive.**'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低价市场**（巴西和印度）仅占需求的**6.2**%，但**生产成本更具竞争力。'
- en: What do we want to achieve?
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们想要实现什么？
- en: ''
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Meet the demand at the lowest cost with a reasonable environmental footprint.
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 以合理的环境影响最低成本满足需求。
- en: '![Market Demand vs. Supply Capacity - (Image by Samir Saci)](../Images/7040334537a139ac8a5231b521c3d3ad.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![市场需求与供应能力对比 – （图片由Samir Saci提供）](../Images/7040334537a139ac8a5231b521c3d3ad.png)'
- en: Market Demand vs. Supply Capacity – (Image by Samir Saci)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 市场需求与供应能力对比 – （图片由Samir Saci提供）
- en: We must decide **where to open factories** to balance cost and environmental
    impacts (CO2 Emissions, waste, water and energy usage).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须决定**在哪里开设工厂**以平衡成本和环境影响（二氧化碳排放、废物、水和能源使用）。
- en: '**Manufacturing Capacity**In each location, we can open low or high-capacity
    plants.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**制造能力**在每个地点，我们可以开设低产能或高产能的工厂。'
- en: '![Production Capacity per Location - (Image by Samir Saci)](../Images/080aa3306cfc49ea2f1d0ee65fb7a011.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![每个地点的生产能力 – （图片由Samir Saci提供）](../Images/080aa3306cfc49ea2f1d0ee65fb7a011.png)'
- en: Production Capacity per Location – (Image by Samir Saci)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 每个地点的生产能力 – （图片由Samir Saci提供）
- en: '**Fixed Production Costs**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**固定生产成本**'
- en: High-capacity plants have elevated fixed costs but can achieve economies of
    scale.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 高产能工厂的固定成本较高，但可以实现规模经济。
- en: '![Fixed Production Costs - (Image by Samir Saci)](../Images/e0a2687d1fbabfec64a6cefc4cf6a3c3.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![固定生产成本 – （图片由Samir Saci提供）](../Images/e0a2687d1fbabfec64a6cefc4cf6a3c3.png)'
- en: Fixed Production Costs – (Image by Samir Saci)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 固定生产成本 – （图片由Samir Saci提供）
- en: A high-capacity plant in India has lower fixed costs than a low-capacity plant
    in the USA.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 印度的高产能工厂比美国低产能工厂的固定成本要低。
- en: Fixed costs per unit are lower in an Indian high-capacity plant (used at full
    capacity) than in a US low-capacity factory.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在印度的高产能工厂（满负荷运行）中，每单位固定成本比在美国的低产能工厂低。
- en: '**Variable Costs**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**可变成本**'
- en: Variable costs are mainly driven by labour costs, which will impact the competitiveness
    of a location.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 可变成本主要受劳动力成本驱动，这将影响一个地区的竞争力。
- en: '![Production Costs per Location - (Image by Samir Saci)](../Images/867509e2c22b712e8493f5abf0bbe87d.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![每个地点的生产成本 – （图片由Samir Saci提供）](../Images/867509e2c22b712e8493f5abf0bbe87d.png)'
- en: Production Costs per Location – (Image by Samir Saci)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 每个地点的生产成本 – （图片由Samir Saci提供）
- en: However, we need to add freight delivery rates from the factory to the markets
    in addition to production costs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们需要在生产成本之外，加上从工厂到市场的运费。
- en: If you move the production (for the North American market) from the USA to India,
    you will reduce production costs but incur additional freight costs.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将生产（针对北美市场）从美国转移到印度，你会降低生产成本，但会产生额外的运费。
- en: What about the environmental impacts?
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 环境影响如何？
- en: Manufacturing teams collected indicators from each plant to calculate the impact
    per unit produced.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 制造团队从每个工厂收集指标，以计算每单位生产的冲击。
- en: '**CO2 emissions** of the freight are based on the distance between the plants
    and their markets.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运输的**二氧化碳排放**基于工厂与市场之间的距离。
- en: Environmental indicators include CO2 emissions, waste generated, water consumed
    and energy usage.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境指标包括二氧化碳排放、产生的废物、消耗的水和能源使用。
- en: '![Environmental Footprint of Manufacturing & Logistics - (Image by Samir Saci)](../Images/b1456cb5971db342389bf7ee386c0535.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![制造与物流的环境足迹 – （图片由Samir Saci提供）](../Images/b1456cb5971db342389bf7ee386c0535.png)'
- en: Environmental Footprint of Manufacturing & Logistics – (Image by Samir Saci)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 制造与物流的环境足迹 – （图片由Samir Saci提供）
- en: We take the average output per unit produced to simplify the problem.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们取每单位生产的平均产量来简化问题。
- en: '![Environmental Impact per unit produced for each location - (Image by Samir
    Saci)](../Images/0b5317039516206406c6272fc1a84f45.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![每个地点每单位生产的环境影响 – （图片由Samir Saci提供）](../Images/0b5317039516206406c6272fc1a84f45.png)'
- en: Environmental Impact per unit produced for each location – (Image by Samir Saci)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 每个地点每单位生产的环境影响 – （图片由Samir Saci提供）
- en: For instance, producing a single unit in India requires 3,500 litres of water.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在印度生产单个单位需要3500升水。
- en: To summarize these four graphs, high-cost manufacturing locations are “greener”
    than low-cost locations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 总结这四张图，高成本制造地点比低成本地点“更绿色”。
- en: You can sense the conflicting interests of reducing costs and minimizing environmental
    footprint.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以感受到降低成本和最小化环境影响之间的冲突利益。
- en: What is the optimal footprint of factories to minimize CO2 Emissions?
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 工厂的最佳足迹是什么，以最小化二氧化碳排放？
- en: Data-driven Supply Chain Network Design
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据驱动的供应链网络设计
- en: If we aim to reduce the environmental impact of our production network, the
    **trivial answer is to produce only in high-end “green” facilities.**
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们旨在减少生产网络的环境影响，**简单的答案就是只在高端“绿色”设施中生产**。
- en: 'Unfortunately, this may raise additional questions:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，这可能会引发更多的问题：
- en: '![Steering Committee questions - (Image by Samir Saci)](../Images/f0eb5673edfc99264aa643bbe0a9adb7.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![指导委员会问题 – (图片由Samir Saci提供)](../Images/f0eb5673edfc99264aa643bbe0a9adb7.png)'
- en: Steering Committee questions – (Image by Samir Saci)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 指导委员会问题 – (图片由Samir Saci提供)
- en: '**Logistics Department:** What about the CO2 emissions of transportation for
    countries that don’t have green facilities?'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**物流部门**：对于那些没有绿色设施的国家，运输的二氧化碳排放量如何？'
- en: '**Finance Team:** How much will the overall profitability be impacted if we
    move to costly facilities?'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**财务团队**：如果我们转移到成本高昂的设施，整体盈利能力会受到多大影响？'
- en: '**Merchandising:** If you move production to expensive “green” locations, what
    will happen to the cost of goods sold in India and Brazil?'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**销售**：如果你将生产转移到昂贵的“绿色”地点，印度和巴西的商品销售成本会发生什么变化？'
- en: These are questions that your steering committee may raise when the sustainability
    team pushes for a specific network design.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是当可持续性团队推动特定的网络设计时，你的指导委员会可能会提出的问题。
- en: In the next section, we will simulate each initiative to measure the impact
    on these KPIs and give a complete picture to all stakeholders.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将模拟每个倡议，以衡量其对这些KPI的影响，并向所有利益相关者提供一个完整的画面。
- en: Data Analytics for Sustainable Business Strategy
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据分析用于可持续商业战略
- en: 'In another article, I introduce the model we will use to illustrate the complexity
    of this exercise with two scenarios:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一篇文章中，我介绍了我们将使用的模型，通过两个场景来展示这个练习的复杂性：
- en: '**Scenario 1**: your finance director wants to **minimize the overall costs**'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**场景1**：你的财务总监希望**最小化整体成本**'
- en: '**Scenario 2**: sustainability teams push to **minimize CO2 emissions**'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**场景2**：可持续性团队推动**最小化二氧化碳排放**'
- en: Model outputs will include **financial and operational indicators** to illustrate
    scenarios’ impact on KPIs followed by each department.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 模型输出将包括**财务和运营指标**，以展示场景对每个部门所遵循的KPI的影响。
- en: '![Multiple KPIs involving several departments - (Image by Samir Saci)](../Images/612fc0b8508e76b13eff4a2698d8c530.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![涉及多个部门的多个KPI – (图片由Samir Saci提供)](../Images/612fc0b8508e76b13eff4a2698d8c530.png)'
- en: Multiple KPIs involving several departments – (Image by Samir Saci)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 涉及多个部门的多个KPI – (图片由Samir Saci提供)
- en: '**Manufacturing**: CO2 emissions, resource usage and cost per unit'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制造**：二氧化碳排放量、资源使用量和单位成本'
- en: '**Logistics**: freight costs and emissions'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**物流**：运费成本和排放'
- en: '**Retail / Merchandising**: Cost of Goods Sold (COGS)'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零售/销售**：商品销售成本（COGS）'
- en: As we will see in the different scenarios, each scenario can be favourable for
    some departments and detrimental for others.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们将在不同的场景中看到的，每个场景都可能对某些部门有利，而对其他部门有害。
- en: Do you imagine a logistics director, pressured to deliver on time at a minimal
    cost, **accepting the disruption of her distribution chain** for a random sustainable
    initiative?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 你能想象一个物流总监，在尽可能低成本的条件下，为了一个随机的可持续性倡议而**接受其分销链的干扰**吗？
- en: Data (may) help us to find a consensus.
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 数据（可能）帮助我们找到共识。
- en: 'Scenario 1: Minimize Costs of Goods Sold'
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 场景1：最小化商品销售成本
- en: I propose to fix the baseline with a scenario that minimizes the Cost of Goods
    Sold (COGS).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议使用最小化商品销售成本（COGS）的场景来设定基线。
- en: The model found the optimal set of plants to minimize this metric by opening
    **four factories.**
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型通过**开启四个工厂**来找到最小化这一指标的最优工厂组合。
- en: '![Manufacturing network for Scenario 1 - (Image by Samir Saci)](../Images/2f7035035e933edeef7b31d902987510.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![场景1的制造网络 – (图片由Samir Saci提供)](../Images/2f7035035e933edeef7b31d902987510.png)'
- en: Manufacturing network for Scenario 1 – (Image by Samir Saci)
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 场景1的制造网络 – (图片由Samir Saci提供)
- en: '**Two factories in India** (low and high) will supply 100% of the local demand
    and use the remaining capacity for German, USA and Japanese markets.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**印度两个工厂**（低和高）将满足100%的当地需求，并利用剩余产能供应德国、美国和日本市场。'
- en: A **single high-capacity** plant in Japan dedicated to meeting (partially) the
    local demand.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日本的一个**单一高产能工厂**，专门用于满足（部分）当地需求。
- en: '**A high-capacity** factory in Brazil for its market and export to the USA.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**巴西的一个高产能工厂**为其市场和出口到美国。'
- en: '![Solution 1 to minimize costs - (Image by Samir Saci)](../Images/2e117f3d6279e5019bc653175730afc5.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![最小化成本解决方案1 – (图片由Samir Saci提供)](../Images/2e117f3d6279e5019bc653175730afc5.png)'
- en: Solution 1 to minimize costs – (Image by Samir Saci)
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 最小化成本的解决方案1 - (图片由Samir Saci提供)
- en: '**Local Production**: 10,850 Units/Month'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本地生产**：每月10,850个单位'
- en: '**Export Production**: 30,900 Units/Month'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**出口生产**：每月30,900个单位'
- en: With this export-oriented footprint, we have a total cost of **5.68 M€/month**,
    including production and transportation.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种出口导向的足迹，我们的总成本为**5.68百万欧元/月**，包括生产和运输。
- en: '![Total Costs Breakdown - (Image by Samir Saci)](../Images/ac1c463414948b26bb1cd1eaaa231e7d.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![总成本分解 - (图片由Samir Saci提供)](../Images/ac1c463414948b26bb1cd1eaaa231e7d.png)'
- en: Total Costs Breakdown – (Image by Samir Saci)
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 总成本分解 - (图片由Samir Saci提供)
- en: The good news is that the model allocation is optimal; all factories are used
    at maximum capacity.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，模型的分配是最佳的；所有工厂都达到了最大产能。
- en: What about the Costs of Goods Sold (COGS)?
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 商品销售成本（COGS）如何？
- en: '![COGS Breakdown for Scenario 1 - (Image by Samir Saci)](../Images/faf5e1cf03d83e7eda59962e390759bc.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![场景1的COGS分解 - (图片由Samir Saci提供)](../Images/faf5e1cf03d83e7eda59962e390759bc.png)'
- en: COGS Breakdown for Scenario 1 – (Image by Samir Saci)
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 场景1的COGS分解 - (图片由Samir Saci提供)
- en: Except for the Brazilian market, the costs of goods sold are roughly in line
    with the local purchasing power.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 除了巴西市场外，商品销售成本大致与当地购买力相匹配。
- en: A step further would be to increase **India’s production capacity** or reduce
    **Brazil’s factory costs**.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步的步骤是增加**印度的生产能力**或减少**巴西的工厂成本**。
- en: From a cost point of view, it seems perfect. But is it a good deal for the sustainability
    team?
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从成本角度来看，这似乎是完美的。但这对可持续发展团队来说是个好交易吗？
- en: The sustainability department is raising the alert as **CO2 emissions are exploding.**
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续发展部门正在拉响警报，因为**二氧化碳排放量正在激增**。
- en: We have **5,882 (Tons CO2eq)** of emissions for **48,950 Units produced.**
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有**5,882（吨二氧化碳当量）**的排放量，对应**48,950个生产单位**。
- en: '![Emissions per Market - (Image by Samir Saci)](../Images/d6517e02f387813f317206bd3c586e53.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![按市场划分的排放量 - (图片由Samir Saci提供)](../Images/d6517e02f387813f317206bd3c586e53.png)'
- en: Emissions per Market – (Image by Samir Saci)
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 按市场划分的排放量 - (图片由Samir Saci提供)
- en: Most of these emissions are due to the **transportation from factories to the
    US market.**
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 大部分这些排放都源于**从工厂到美国市场的运输**。
- en: The top management is pushing to propose a network transformation to **reduce
    emissions by 30%.**
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 高层管理正在推动提出一个网络转型，以**减少30%的排放**。
- en: What would be the impact on production, logistics and retail operations?
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这将对生产、物流和零售运营产生什么影响？
- en: 'Scenario 2: Localization of Production'
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 场景2：生产本地化
- en: We switch the model’s objective function to **minimize CO2 emissions**.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将模型的优化目标函数改为**最小化二氧化碳排放**。
- en: '![Manufacturing network for Scenario 2 - (Image by Samir Saci)](../Images/3a81ad7ba71d590cbc296f171ba43535.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![场景2的制造网络 - (图片由Samir Saci提供)](../Images/3a81ad7ba71d590cbc296f171ba43535.png)'
- en: Manufacturing network for Scenario 2 – (Image by Samir Saci)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 场景2的制造网络 - (图片由Samir Saci提供)
- en: As transportation is the major driver of CO2 emissions, the model proposes to
    open **seven factories** to **maximize local fulfilment**.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 由于运输是二氧化碳排放的主要驱动因素，模型建议开设**七个工厂**以**最大化本地满足需求**。
- en: '![Supply Chain Flows for Scenario 2 - (Image by Samir Saci)](../Images/94fa84e0f15b37ff6173859c5ee24cea.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![场景2的供应链流程 - (图片由Samir Saci提供)](../Images/94fa84e0f15b37ff6173859c5ee24cea.png)'
- en: Supply Chain Flows for Scenario 2 – (Image by Samir Saci)
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 场景2的供应链流程 - (图片由Samir Saci提供)
- en: '**Two low-capacity factories in India** **and Brazil** fulfil their respective
    local markets only.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**印度和巴西的两个低产能工厂**仅满足各自的本地市场。'
- en: A **single high-capacity** factory in Germany is used for the local market and
    exports to the USA.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 德国的一个**单一高产能**工厂用于本地市场并出口到美国。
- en: We have **two pairs of low and high-capacity plants** in Japan and the USA dedicated
    to local markets.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在**日本和美国**拥有**两对高低产能工厂**，专门服务于本地市场。
- en: From the **manufacturing department’s point of view**, this setup is far from
    optimal.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 从**制造部门的观点来看**，这种设置远非最佳。
- en: We have four low-capacity plants in India and Brazil that are **used way below
    their capacity.**
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在印度和巴西有四个低产能工厂，其**产能利用率远低于预期**。
- en: '![Costs Analysis - (Image by Samir Saci)](../Images/e6a12471df9f33818ec9a44b8a1ad524.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![成本分析 - (图片由Samir Saci提供)](../Images/e6a12471df9f33818ec9a44b8a1ad524.png)'
- en: Costs Analysis – (Image by Samir Saci)
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 成本分析 - (图片由Samir Saci提供)
- en: Therefore, fixed costs have more than doubled, resulting in a total budget of
    **8.7** **M€/month** (versus 5.68 M€/month for Scenario 1).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，固定成本翻了一番多，总预算达到**8.7百万欧元/月**（与场景1的5.68百万欧元/月相比）。
- en: Have we reached our target of Emissions Reductions?
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们是否达到了我们的减排目标？
- en: Emissions have dropped from **5,882 (Tons CO2eq)** to **2,136 (Tons CO2eq),**
    reaching the target fixed by the sustainability team.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 排放量从**5,882 (吨 CO2eq)**降至**2,136 (吨 CO2eq**)，达到可持续发展团队设定的目标。
- en: '![Emissions per Market (Scenario 2) - (Image by Samir Saci)](../Images/307f8541366a2344a7c4a819c432085a.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![按市场排放量（场景 2）- (图片由 Samir Saci 提供)](../Images/307f8541366a2344a7c4a819c432085a.png)'
- en: Emissions per Market (Scenario 2) – (Image by Samir Saci)
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 按市场排放量（场景 2） – (图片由 Samir Saci 提供)
- en: However, your CFO and the merchandising team are worried about the **increased
    cost of sold goods**.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你的首席财务官和商品团队担心**销售商品的成本增加**。
- en: '![New COGS for Scenario 2 - (Image by Samir Saci)](../Images/163d025b54f02df9aab35f2f59b89305.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![场景 2 的新可变成本 – (图片由 Samir Saci 提供)](../Images/163d025b54f02df9aab35f2f59b89305.png)'
- en: New COGS for Scenario 2 – (Image by Samir Saci)
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 场景 2 的新可变成本 – (图片由 Samir Saci 提供)
- en: Because output volumes do not absorb the fixed costs of their factories, Brazil
    and India **now have the highest COGS,** going **up to 290.47** €/unit.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 因为产量没有吸收他们工厂的固定成本，巴西和印度**现在拥有最高的可变成本**，高达 290.47 €/单位。
- en: However, they remain the markets with the lowest purchasing power.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它们仍然是购买力最低的市场。
- en: 'Merchandising Team: “As we cannot increase prices there, we will not be profitable
    in Brazil and India.”'
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 商品团队：“由于我们无法提高那里的价格，我们在巴西和印度将不会盈利。”
- en: We are not yet done. We did not consider the other environmental indicators.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还没有完成。我们没有考虑其他环境指标。
- en: The sustainability team would like also to reduce water usage.
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 可持续发展团队也希望减少用水量。
- en: 'Scenario 3: Minimize Water Usage'
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 场景 3：最小化用水量
- en: With the previous setup, we reached an average consumption of **2,683 kL of
    Water per unit produced.**
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的设置中，我们达到了每单位生产的平均消耗量为**2,683 kL 水**。
- en: To meet the regulation in 2030, there is a push to reduce it below **2650 kL/Unit.**
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 为了满足 2030 年的法规，有推动将其降低至**2650 kL/单位**以下。
- en: '![Water Usage for Scenario 2 vs. Unit Consumption - (Image by Samir Saci)](../Images/c9a372d63252cc61273946c1ac472e9f.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![场景 2 与单位消耗量相比的用水量 – (图片由 Samir Saci 提供)](../Images/c9a372d63252cc61273946c1ac472e9f.png)'
- en: Water Usage for Scenario 2 vs. Unit Consumption – (Image by Samir Saci)
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 场景 2 与单位消耗量相比的用水量 – (图片由 Samir Saci 提供)
- en: This can be done by shifting production to the USA, Germany and Japan while
    closing factories in Brazil and India.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过将生产转移到美国、德国和日本，同时关闭巴西和印度的工厂来实现。
- en: Let us see what the model proposed.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看模型提出了什么。
- en: '![Manufacturing network for Scenario 3 - (Image by Samir Saci)](../Images/c20f08413d3ed388b1046fd97d05f6f7.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![场景 3 制造网络 – (图片由 Samir Saci 提供)](../Images/c20f08413d3ed388b1046fd97d05f6f7.png)'
- en: Manufacturing network for Scenario 3 – (Image by Samir Saci)
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 场景 3 制造网络 – (图片由 Samir Saci 提供)
- en: It looks like the mirrored version of Scenario 1, with a majority of **35,950
    units exported** and **only 13,000 units locally produced**.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 它看起来像是场景 1 的镜像版本，**35,950 单位出口**和**仅 13,000 单位本地生产**。
- en: '![Flow chart for the Scenario 3 - (Image by Samir Saci)](../Images/9fe5857881e30cb88fbf1912278a5179.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![场景 3 流程图 - (图片由 Samir Saci 提供)](../Images/9fe5857881e30cb88fbf1912278a5179.png)'
- en: Flow chart for the Scenario 3 – (Image by Samir Saci)
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 场景 3 流程图 – (图片由 Samir Saci 提供)
- en: But now, production is pushed by **five factories in “expensive” countries**
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在，生产由“昂贵”国家的**五家工厂**推动。
- en: Two factories in the USA deliver locally and in Japan.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 美国的两家工厂本地交付并在日本交付。
- en: We have two more plants in Germany only to supply the USA market.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在德国还有两个工厂，只为美国市场供应。
- en: A single high-capacity plant in Japan will be opened to meet the remaining local
    demand and deliver to small markets (India, Brazil, and Germany).
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日本将开设一个单一的高产能工厂以满足剩余的本地需求和向小市场（印度、巴西和德国）交付。
- en: 'Finance Department: “It’s the least financially optimal setup you proposed.”'
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 财务部门：“这是你提出的方案中财务上最不优的设置。”
- en: '![Costs Analysis for Scenario 3 - (Image by Samir Saci)](../Images/0f9544f5d81d1cca49cbcd7cc92be6aa.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![场景 3 成本分析 – (图片由 Samir Saci 提供)](../Images/0f9544f5d81d1cca49cbcd7cc92be6aa.png)'
- en: Costs Analysis for Scenario 3 – (Image by Samir Saci)
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 场景 3 成本分析 – (图片由 Samir Saci 提供)
- en: From a cost perspective, this is the worst-case scenario, as production and
    transportation costs are exploding.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 从成本角度来看，这是最坏的情况，因为生产和运输成本正在激增。
- en: This results in a budget of **8.89 M€/month** (versus 5.68 M€/month for Scenario
    1).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致预算为**8.89 M€/月**（与场景 1 的 5.68 M€/月相比）。
- en: 'Merchandising Team: “Units sold in Brazil and India have now more reasonable
    COGS.”'
  id: totrans-164
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 商品团队：“在巴西和印度销售的单元的可变成本现在更加合理。”
- en: '![New COGS for Scenario 2 - (Image by Samir Saci)](../Images/2961cfb360caeb6891c0cc13548c1643.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![场景2的新COGS – (图片由萨米尔·萨奇提供)](../Images/2961cfb360caeb6891c0cc13548c1643.png)'
- en: New COGS for Scenario 2 – (Image by Samir Saci)
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 场景2的新COGS – (图片由萨米尔·萨奇提供)
- en: From a retail point of view, things are better than in Scenario 2 as the Brazil
    and India markets now have COGS in line with the local purchasing power.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 从零售角度来看，情况比场景2要好，因为巴西和印度的市场现在成本与当地购买力相匹配。
- en: However, the logistics team is challenged as we have the majority of volumes
    for export markets.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，物流团队面临挑战，因为我们有大量出口市场的体积。
- en: 'Sustainability Team: “What about water usage and CO2 emissions?”'
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 可持续发展团队：“关于水使用量和二氧化碳排放量呢？”
- en: Water usage is now **2,632 kL/Unit**, below our target of 2,650 kL.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 水的使用量现在为 **2,632 kL/单位**，低于我们的目标2,650 kL。
- en: However, CO2 emissions exploded.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，二氧化碳排放量激增。
- en: '![Emissions per Market (Scenario 3) - (Image by Samir Saci)](../Images/faa59d17205e4c0d9a8a4d5977cfaa69.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![市场排放量（场景3） – (图片由萨米尔·萨奇提供)](../Images/faa59d17205e4c0d9a8a4d5977cfaa69.png)'
- en: Emissions per Market (Scenario 3) – (Image by Samir Saci)
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 市场排放量（场景3） – (图片由萨米尔·萨奇提供)
- en: We came back to the Scenario 1 situation with **4,742 (Tons CO2eq)** of emissions
    (versus 2,136 (Tons CO2eq) for Scenario 2).
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 我们回到了场景1的情况，排放量为**4,742（吨CO2eq）**（而场景2为2,136（吨CO2eq））。
- en: We can assume that this scenario is satisfying for no parties.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以假设这个场景对任何一方来说都是令人满意的。
- en: The difficulty of finding a consensus
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 寻求共识的难度
- en: As we observed in this simple example, we *(as data analytics experts)* cannot
    provide the perfect solution that meets every party’s needs.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在这个简单例子中观察到的，我们**(作为数据分析专家)**无法提供满足所有方需求的完美解决方案。
- en: '![Scenarios and impacts on teams - (Image by Samir Saci)](../Images/fa0085ef816f65b119e45cfea9b49651.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![场景和团队影响 – (图片由萨米尔·萨奇提供)](../Images/fa0085ef816f65b119e45cfea9b49651.png)'
- en: Scenarios and impacts on teams – (Image by Samir Saci)
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 场景和团队影响 – (图片由萨米尔·萨奇提供)
- en: Each scenario improves a specific metric to the detriment of other indicators.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 每个场景都会提高一个特定指标，但会损害其他指标。
- en: 'CEO: “Sustainability is not a choice, it’s our priority to become more sustainable.”'
  id: totrans-181
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 首席执行官：“可持续性不是选择，而是我们优先考虑的成为更加可持续的事情。”
- en: However, these data-driven insights will feed advanced discussions to find a
    final consensus and move to the implementation.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些数据驱动的见解将为高级讨论提供信息，以找到最终共识并进入实施阶段。
- en: '![Data Driven Solution Design - (Image by Samir Saci)](../Images/065887305708d43d01f061348147765e.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![数据驱动解决方案设计 – (图片由萨米尔·萨奇提供)](../Images/065887305708d43d01f061348147765e.png)'
- en: Data Driven Solution Design – (Image by Samir Saci)
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 数据驱动解决方案设计 – (图片由萨米尔·萨奇提供)
- en: In this spirit, I developed this tool to address the complexity of company management
    and conflicting interests between stakeholders.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个精神指导下，我开发了这款工具来解决公司管理和利益相关者之间冲突利益的问题。
- en: Conclusion
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article used a simple example to explore the challenges of balancing profitability
    and sustainability when building a transformation roadmap.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 本文通过一个简单的例子探讨了在构建转型路线图时平衡盈利性和可持续性的挑战。
- en: This network design exercise demonstrated how optimizing for different objectives
    (costs, CO2 emissions, and water usage ) can lead to trade-offs that impact all
    stakeholders.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 这个网络设计练习展示了优化不同目标（成本、二氧化碳排放量和水使用量）如何导致影响所有利益相关者的权衡。
- en: '![Conflicting interest among stakeholders - (Image by Samir Saci)](../Images/1e814f70c0cbd9c58525a3353250e75d.png)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
  zh: '![利益相关者之间的冲突利益 – (图片由萨米尔·萨奇提供)](../Images/1e814f70c0cbd9c58525a3353250e75d.png)'
- en: Conflicting interest among stakeholders – (Image by Samir Saci)
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 利益相关者之间的冲突利益 – (图片由萨米尔·萨奇提供)
- en: These examples highlighted the complexity of achieving consensus in sustainability
    transitions.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子突显了在可持续发展转型中达成共识的复杂性。
- en: As analytics experts, we can play a key role on providing all the metrics to
    animate discussions.
  id: totrans-192
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 作为分析专家，我们可以在提供所有指标以推动讨论方面发挥关键作用。
- en: The visuals and analysis presented are based on the **Supply Chain Optimization
    module of a web application I have** designed to support companies in tackling
    these multi-dimensional challenges.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 展示的视觉和分析是基于我设计的**网络应用供应链优化模块**，旨在支持公司应对这些多维挑战。
- en: '![Demo of the User Interface : Test it here — (Image by Samir Saci)](../Images/78dff9420e411d58269941e6a9d728ca.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![用户界面演示：在此测试 – (图片由萨米尔·萨奇提供)](../Images/78dff9420e411d58269941e6a9d728ca.png)'
- en: 'Demo of the User Interface : [Test it here](https://bit.ly/try-logigreen-app)
    — (Image by Samir Saci)'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 用户界面演示：[在此测试](https://bit.ly/try-logigreen-app) – (图片由萨米尔·萨奇提供)
- en: 'The module is available for testing here: [Test the App](https://bit.ly/try-logigreen-app)'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 该模块可供测试：[测试应用](https://bit.ly/try-logigreen-app)
- en: How to reach a consensus among stakeholders?
  id: totrans-197
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如何在利益相关者之间达成共识？
- en: To prove my point, I used **extreme examples in which we set the objective function**
    to minimize CO2 emissions or water usage.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 为了证明我的观点，我使用了**极端示例，我们将目标函数**设置为最小化二氧化碳排放或用水量。
- en: '![Extreme examples used in this case study - (Image by Samir Saci)](../Images/04ffdd9285c801e89f26311d01cdae74.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![本案例研究中使用的极端示例 - (图片由Samir Saci提供)](../Images/04ffdd9285c801e89f26311d01cdae74.png)'
- en: Extreme examples used in this case study – (Image by Samir Saci)
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 本案例研究中使用的极端示例 – (图片由Samir Saci提供)
- en: Therefore, we get solutions that are not financially viable.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们得到的是不可行的解决方案。
- en: Using the app, you can do the exercise of keeping the **objective of cost efficiency**
    and **add sustainability constraints** like
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 使用该应用，你可以进行保持**成本效率目标**并**添加可持续性约束**的练习，
- en: CO2 emissions per unit produced should be below XX (kgCO2eq)
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每单位产品产生的二氧化碳排放量应低于XX (kgCO2eq)
- en: Water usage per unit produced
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每单位产品用水量
- en: This (may) provide more reasonable solutions that could lead to a consensus.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 这（可能）提供更合理的解决方案，可能导致达成共识。
- en: 'Logistics Operations: We need support to implement this transformation.'
  id: totrans-206
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 物流运营：我们需要支持来实现这一转型。
- en: What’s next?
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 接下来是什么？
- en: Your contribution to the sustainability roadmap can be greater than providing
    insights for a network design study.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 你对可持续性路线图的贡献可以大于仅仅为网络设计研究提供见解。
- en: In this blog, I shared several case studies using analytics to design and implement
    sustainable initiatives across the value chain.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客中，我分享了几个使用分析来设计和实施贯穿整个价值链的可持续性倡议的案例研究。
- en: '![Example of initiative: Implement a Circular Economy - (Image by Samir Saci)](../Images/ddaa10bb0ab625b60c865b81b0079c61.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![实施循环经济的示例：实施循环经济 - (图片由Samir Saci提供)](../Images/ddaa10bb0ab625b60c865b81b0079c61.png)'
- en: 'Example of initiative: Implement a Circular Economy – (Image by Samir Saci)'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 实施循环经济的示例：实施循环经济 – (图片由Samir Saci提供)
- en: For instance, you can contribute to implementing a circular economy by estimating
    the impact of renting products in your stores.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以通过估算你在商店租用产品的影響来为实施循环经济做出贡献。
- en: A circular economy is an economic model that aims to minimize waste and maximize
    resource efficiency.
  id: totrans-213
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 循环经济是一种旨在最小化浪费和最大化资源效率的经济模式。
- en: In a detailed case study, I present a model used to simulate the logistics flows
    covering a scope of 3,300 unique items rented in 10 stores.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个详细的案例研究中，我展示了一个用于模拟覆盖10家商店中租用的3,300个独特物品的物流流程的模型。
- en: '![Simulation Parameters - (Image by Samir Saci)](../Images/dc8939469ad9d57650ddbe9c8de5b7ea.png)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![模拟参数 – (图片由Samir Saci提供)](../Images/dc8939469ad9d57650ddbe9c8de5b7ea.png)'
- en: Simulation Parameters – (Image by Samir Saci)
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟参数 – (图片由Samir Saci提供)
- en: Results show that you can **reduce emissions by 90%** for some references in
    the catalogue.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示，你可以为目录中的一些参考项**减少90%的排放**。
- en: '![Example of CO2 emissions reductions - (Image by Samir Saci)](../Images/1e904de06d2cf514e687d4e661de9aa1.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![二氧化碳排放量减少的示例 – (图片由Samir Saci提供)](../Images/1e904de06d2cf514e687d4e661de9aa1.png)'
- en: Example of CO2 emissions reductions – (Image by Samir Saci)
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 二氧化碳排放量减少的示例 – (图片由Samir Saci提供)
- en: These insights can convince the management to invest in implementing the additional
    logistics processes required to support this model.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这些见解可以说服管理层投资实施支持该模型所需的额外物流流程。
- en: For more information, have a look at the complete article
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 更多信息，请查看完整文章
- en: '[**Data Science for Sustainability – Simulate a Circular Economy**](https://www.samirsaci.com/how-sustainable-is-your-circular-economy/)'
  id: totrans-222
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**可持续性数据科学 – 模拟循环经济**](https://www.samirsaci.com/how-sustainable-is-your-circular-economy/)'
- en: About Me
  id: totrans-223
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于我
- en: Let’s connect on [LinkedIn](https://www.linkedin.com/in/samir-saci) and [Twitter](https://x.com/Samir_Saci_).
    I am a Supply Chain Data Scientist who uses data analytics to improve logistics
    operations and reduce costs.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在[LinkedIn](https://www.linkedin.com/in/samir-saci)和[Twitter](https://x.com/Samir_Saci_)上建立联系。我是一个供应链数据科学家，使用数据分析来改进物流运营并降低成本。
- en: If you need consulting or advice for your supply chain transformation, contact
    me via [Logigreen Consulting](https://www.logi-green.com/).
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要供应链转型的咨询或建议，请通过[Logigreen Consulting](https://www.logi-green.com/)联系我。
- en: If you are interested in data analytics and supply chain, please visit my website.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对数据分析和企业供应链感兴趣，请访问我的网站。
