- en: 'Tree of Thought Prompting: Teaching LLMs to Think Slowly'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 思维树提示：教LLMs慢慢思考
- en: 原文：[https://towardsdatascience.com/tree-of-thought-prompting-teaching-llm-to-think-slowly/](https://towardsdatascience.com/tree-of-thought-prompting-teaching-llm-to-think-slowly/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tree-of-thought-prompting-teaching-llm-to-think-slowly/](https://towardsdatascience.com/tree-of-thought-prompting-teaching-llm-to-think-slowly/)
- en: '*“Slow thinking (system 2) is effortful, infrequent, logical, calculating,
    conscious.”*'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“慢思考（系统2）是费力的、不频繁的、逻辑的、计算的、有意识的。”*'
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Daniel Kahneman, *Thinking, Fast and Slow*
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹尼尔·卡尼曼，《思考，快与慢》
- en: <mdspan datatext="el1748380071877" class="mdspan-comment">Introduction</mdspan>
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748380071877" class="mdspan-comment">简介</mdspan>
- en: 'Large Language models (LLMs) such as ChatGPT often behave as what Daniel Kahneman—winner
    of the 2002 Nobel Memorial Prize in Economic Sciences—defines as System 1: it
    is fast, confident and almost effortless. You are right: there is also a System
    2, a slower, more effortful mode of thinking.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）如ChatGPT通常表现为2002年诺贝尔经济学奖获得者丹尼尔·卡尼曼（Daniel Kahneman）所定义的系统1：它快速、自信且几乎不费力。你是正确的：还有一个系统2，这是一种更慢、更费力的思考模式。
- en: Researchers have been developing methods these years to bring System 2-style
    thinking into LLMs through better prompting strategies. Tree-of-Thought (ToT)
    prompting is one the most outstanding techniques and it allows the model to follow
    multiple reasoning paths leading to potentially better decisions.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这些年，研究人员一直在开发方法，通过更好的提示策略将系统2风格的思考引入LLMs。思维树（ToT）提示是其中最突出的技术之一，它允许模型遵循多个推理路径，可能导致更好的决策。
- en: In this blog post, I’ll do a case study where a ToT-powered LLM agent plays
    the classic game Minesweeper — not by guessing, but by reasoning. Just like you
    would.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我将进行一个案例研究，其中ToT驱动的LLM代理玩经典的扫雷游戏——不是通过猜测，而是通过推理。就像你一样。
- en: CoT and ToT
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CoT和ToT
- en: 'We might start our story with **Chain-of-Thought (CoT) prompting** — a technique
    that guides LLMs to reason step by step. Look at the following example:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能从**思维链（CoT）提示**开始我们的故事——这是一种引导LLMs逐步推理的技术。看看以下例子：
- en: '**Q:** I bought 10 apples in the supermarket. Then I gave 2 apples to the neighbor
    and another 2 to my pigs. Not enough apples for me now!!I then bought 5 more apples
    from a grocery but 1 was rotten. How many apples now?'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**Q:** 我在超市买了10个苹果。然后我给了邻居2个苹果，又给了我的猪2个。现在对我来说苹果不够了！！然后我又从杂货店买了5个苹果，但有一个是烂的。现在有多少个苹果？'
- en: '**A:** You used to have 10 apples. You gave 2 apples to the neighbor and 2
    to the pigs. Now you have 6 apples. Then you bought 5 more apples, so you had
    11 apples. Finally, you ate 1 apple, so you still have 10 apples in the end.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**A:** 你原本有10个苹果。你给了邻居2个苹果，又给了猪2个。现在你有6个苹果。然后你买了5个更多的苹果，所以你有11个苹果。最后，你吃了一个苹果，所以最后你仍然有10个苹果。'
- en: As you can see, guided to think step-by-step, the LLM simulates better reasoning.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，通过逐步引导思考，LLM模拟了更好的推理。
- en: '**Tree-of-Thought (ToT) prompting** expands on CoT. As the name suggests, It
    organizes reasoning like a tree where each node is a potential “thought,” and
    branches are possible paths. It does not follow a linear process like CoT.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**思维树（ToT）提示**扩展了CoT。正如其名所示，它像树一样组织推理，其中每个节点都是一个潜在的“思想”，分支是可能的路径。它不遵循CoT的线性过程。'
- en: In practice, ToT creates a tree structure with branches, each with sub-steps
    leading to a final resolution. The model then evaluates each step, assigning each
    idea a classification as “sure”, “likely” or “impossible”. Next, ToT goes through
    the entire problem space by applying search algorithms such as **Breadth-First
    Search (BFS)** and **Depth-First Search (DFS)** in order to choose the best paths.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，ToT创建了一个带有分支的树结构，每个分支都有子步骤，最终导致一个解决方案。然后模型评估每个步骤，给每个想法分配一个分类，如“确定”、“可能”或“不可能”。接下来，ToT通过应用搜索算法，如**广度优先搜索（BFS）**和**深度优先搜索（DFS）**，遍历整个问题空间，以选择最佳路径。
- en: 'Here is an example in an office building: I have an office with a max capacity
    of 20 people, but 28 people are coming this week. I have the following three branches
    as possible solutions:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个在办公楼中的例子：我有一个最多容纳20人的办公室，但这个星期有28人来。我有以下三个可能的解决方案：
- en: '**Branch 1: Move 8 people**'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分支1：移动8个人**'
- en: Is there another room nearby? → Yes
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 附近有其他房间吗？→ 是的
- en: Does it have space for 8 more people? → Yes
  id: totrans-19
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它有空间再容纳8个人吗？→ 是的
- en: Can we move people without any administrative process? → Maybe
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能否在不进行任何行政程序的情况下移动人员？→ 可能
- en: 'Evaluation: Promising!'
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估：有希望！
- en: '**Branch 2: Expand the Room **'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分支2：扩大房间**'
- en: Can we make the room larger? → Maybe
  id: totrans-23
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能否使房间更大？→ 可能
- en: Is this allowed under safety? → No
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这在安全方面允许吗？→ 不允许
- en: Can we request an exception in the building? → No
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能否在建筑中请求例外？→ 不行
- en: 'Evaluation: It wont work!'
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估：这行不通！
- en: '**Branch 3: Split the group into two**'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分支 3：将小组分成两组**'
- en: Can we divide these people into two groups? → Yes
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能否将这些人分成两组？→ 可以
- en: Can we let them come on different days? → Maybe
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能否让他们在不同的日子来？→ 可能
- en: 'Evaluation: Good potential!'
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估：有很好的潜力！
- en: 'As you can see, this process mimics how we solve hard problems: we don’t think
    in a straight line. Instead, we explore, evaluate, and choose.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，这个过程模仿了我们解决难题的方式：我们不是直线思考。相反，我们探索、评估和选择。
- en: Case study
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究
- en: Minesweeper
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矿雷扫雷
- en: '![](../Images/87d86e434fe3e870bb61bd45fbb5a7aa.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87d86e434fe3e870bb61bd45fbb5a7aa.png)'
- en: 'Minesweeper: [wikipedia ](https://en.wikipedia.org/wiki/Minesweeper_%28video_game%29)'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 矿雷扫雷：[维基百科](https://en.wikipedia.org/wiki/Minesweeper_%28video_game%29)
- en: It is almost impossible but In case you don’t know, minesweeper is a simple
    video game.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎不可能，但如果你不知道的话，扫雷是一款简单的视频游戏。
- en: The board is divided into cells, with mines randomly distributed. The number
    on a cell shows the number of mines adjacent to it. You win when you open all
    the cells. However, if you hit a mine before opening all the cells, the game is
    over and you lose.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 棋盘被分成单元格，其中地雷随机分布。单元格上的数字显示与它相邻的地雷数量。当你打开所有单元格时，你就赢了。然而，如果你在打开所有单元格之前触碰到地雷，游戏就结束了，你输了。
- en: We are applying ToT in Minesweeper which requires some logic rules and reasoning
    under constraints.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在扫雷中应用 ToT，这需要一些逻辑规则和约束下的推理。
- en: We simulate the game with the following code：
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用以下代码来模拟游戏：
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: You can see that we generate a `BOARD_SIZE*BOARD_SIZE` size board with `NUM_MINES`
    mines.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到我们生成了一个 `BOARD_SIZE*BOARD_SIZE` 大小的棋盘，上面有 `NUM_MINES` 个地雷。
- en: ToT LLM Agent
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ToT LLM 代理
- en: We are now ready to build our ToT LLM agent to solve the puzzle of minesweeper.
    First, we need to define a function that returns thought on the current board
    by using an LLM such as GPT-4o.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在准备好构建我们的 ToT LLM 代理来解决扫雷难题。首先，我们需要定义一个函数，该函数使用 LLM（如 GPT-4o）返回当前棋盘上的想法。
- en: '[PRE1]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'This might look a little long but the essential part of the function is the
    prompt part which not only explains the rules of the game to the LLM (how to understand
    the board, which moves are valid, etc. ) and also the reasoning behind each valid
    move. Moreover, it tells how to assign a score to each possible move. These construct
    our branches of thoughts and finally, our tree ToT. For example, we have a step
    by step guide:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来有点长，但函数的核心部分是提示部分，它不仅向 LLM 解释游戏的规则（如何理解棋盘、哪些移动是有效的等），还解释了每个有效移动背后的推理。此外，它还说明了如何为每个可能的移动分配分数。这些构成了我们的思维分支，最终形成了我们的树形
    ToT。例如，我们有一个逐步指南：
- en: '[PRE2]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: These lines guide the LLM to propose multiple moves and to justify each of these
    moves based on the current state; it then has to evaluate each of these possible
    moves by a score ranging from 0 to 1\. The agent will use these scores to find
    the best option.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这些行指导 LLM 提出多个移动，并基于当前状态为每个移动进行辩护；然后它必须通过从 0 到 1 的分数来评估每个可能的移动。代理将使用这些分数来找到最佳选项。
- en: 'We now build an LLM agent using these generated thoughts to move a “real” move.
    Consider the following code:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用这些生成的想法构建一个 LLM 代理来执行“真实”的移动。考虑以下代码：
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The agent first calls the LLM to suggest several possible next moves with the
    confidence score. If the LLM fails to return any thought, the agent will fall
    back to a baseline agent defined earlier and it can only make random moves. If
    we are fortunate enough to get several moves proposed by the LLM, the agent will
    don a first filter to exclude invalid moves such those which fall out of the board.
    It will then sort the valid thoughts according to the confidence score in a descending
    order and returns the best move if the score is higher than 0.9\. If none of the
    suggestions are higher than this threshold, it falls back to the baseline agent.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 代理首先调用 LLM 建议几个可能的下一步移动，并带有置信度分数。如果 LLM 无法返回任何想法，代理将回退到之前定义的基线代理，并且它只能做出随机移动。如果我们足够幸运，得到了
    LLM 提出的几个移动，代理将进行第一轮过滤，排除无效的移动，例如那些超出棋盘范围的移动。然后，它将根据置信度分数按降序排列有效的想法，如果分数高于 0.9，则返回最佳移动。如果没有建议的分数高于这个阈值，它将回退到基线代理。
- en: Play
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始游戏
- en: We will now try to play a standard 8×8 Minesweeper board game with 10 hidden
    mines. We played 10 games and reached an accuracy of 100%! Please check the [notebook](https://colab.research.google.com/drive/1z4zheiBZckN1ELjDlncrZXmGMYsV8Gbx#scrollTo=2f04458d-59ce-42b8-91de-cd6862985942)
    for complete codes.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将尝试玩一个标准的 8×8 扫雷棋盘游戏，其中有 10 个隐藏的地雷。我们玩了 10 场游戏，达到了 100% 的准确率！请查看[笔记本](https://colab.research.google.com/drive/1z4zheiBZckN1ELjDlncrZXmGMYsV8Gbx#scrollTo=2f04458d-59ce-42b8-91de-cd6862985942)以获取完整的代码。
- en: Conclusion
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: ToT prompting gives LLMs such as GPT-4o more reasoning ability, going beyond
    fast and intuitive thinking. We have applied ToT to the Minesweeper game and received
    good results. This example shows that the ToT can transform LLMs from chat assistants
    to complicated problem solvers with real logic and reasoning ability.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: ToT 提示词赋予 GPT-4o 等大型语言模型更强的推理能力，超越了快速直观思考。我们已经将 ToT 应用于扫雷游戏，并取得了良好的效果。这个例子表明，ToT
    可以将 LLM 从聊天助手转变为具有真实逻辑和推理能力的复杂问题解决者。
