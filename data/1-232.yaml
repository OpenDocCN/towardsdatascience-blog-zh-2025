- en: 'The Gini Coefficient: From Lorenz Curves to Model Evaluation'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 吉尼系数：从洛伦兹曲线到模型评估
- en: 原文：[https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/](https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/](https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/)
- en: <mdspan datatext="el1759191862708" class="mdspan-comment">We have already</mdspan>
    discussed about classification metrics like ROC-AUC and Kolmogorov-Smirnov (KS)
    Statistic in previous blogs.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759191862708" class="mdspan-comment">我们已经在之前的博客中讨论了分类指标，如ROC-AUC和柯尔莫哥洛夫-斯米尔诺夫（KS）统计量。</mdspan>
- en: In this blog, we will explore another important classification metric called
    the **Gini Coefficient**.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客中，我们将探讨另一个重要的分类指标，即**吉尼系数**。
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why do we have multiple classification metrics?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们为什么有多个分类指标？
- en: Every classification metric tells us the model performance from a different
    angle. We know that ROC-AUC gives us the overall ranking ability of a model, while
    KS Statistic shows us where the maximum gap between two groups occurs.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 每个分类指标都从不同的角度告诉我们模型的表现。我们知道ROC-AUC给我们提供了模型的总体排序能力，而KS统计量则显示了两组之间最大差距出现在哪里。
- en: '**When it comes to the Gini Coefficient, it tells us how much better our model
    is than random guessing at ranking the positives higher than the negatives.**'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**当谈到吉尼系数时，它告诉我们我们的模型在将正值排序高于负值方面比随机猜测要好多少。**'
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: First, let’s see how the Gini Coefficient is calculated.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看吉尼系数是如何计算的。
- en: For this, we again use the [German Credit Dataset](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个，我们再次使用[德国信用数据集](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data)。
- en: Let’s use the same sample data that we used to understand the calculation of
    Kolmogorov-Smirnov (KS) Statistic.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用之前用来理解柯尔莫哥洛夫-斯米尔诺夫（KS）统计量计算的数据样本。
- en: '![](../Images/55f161aba2ee1868138b68a5f83ba6ff.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/55f161aba2ee1868138b68a5f83ba6ff.png)'
- en: Image by Author
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: This sample data was obtained by applying logistic regression on the German
    Credit dataset.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这个样本数据是通过在德国信用数据集上应用逻辑回归获得的。
- en: Since the model outputs probabilities, we selected a sample of 10 points from
    those probabilities to demonstrate the calculation of the Gini coefficient.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 由于模型输出概率，我们从这些概率中选取了10个点来展示吉尼系数的计算。
- en: Calculation
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计算
- en: 'Step 1: Sort the data by predicted probabilities.'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：按预测概率对数据进行排序。
- en: The sample data is already sorted ascending by predicting probabilities.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 样本数据已经按照预测概率升序排序。
- en: 'Step 2: Compute Cumulative Population and Cumulative Positives.'
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：计算累计人口和累计正值。
- en: '**Cumulative Population:** The cumulative number of records considered up to
    that row.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**累计人口：** 到目前为止考虑的记录的累计数量。'
- en: '**Cumulative Population (%):** The percentage of the total population covered
    so far.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**累计人口（%）：** 到目前为止覆盖的总人口百分比。'
- en: '**Cumulative Positives:** How many actual positives (class 2) we’ve seen up
    to this point.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**累计正值：** 到目前为止我们看到的实际正值（类别2）的数量。'
- en: '****C**umulative Positives (%):** The percentage of positives captured so far.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '****累计正值（%）：** 到目前为止捕获的正值百分比。'
- en: '![](../Images/3193aae319edd13bf5d2a8e27cce5bf3.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3193aae319edd13bf5d2a8e27cce5bf3.png)'
- en: Image by Author
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Step 3: Plot X and Y values'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：绘制X和Y值
- en: X = Cumulative Population (%)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: X = 累计人口（%）
- en: Y = Cumulative Positives (%)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Y = 累计正值（%）
- en: Here, let’s use Python to plot these X and Y values.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们将使用Python来绘制这些X和Y值。
- en: '**Code:**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE0]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Plot:**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**图表：**'
- en: '![](../Images/87c5eb9901ab268889bd25a76c128139.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87c5eb9901ab268889bd25a76c128139.png)'
- en: Image by Author
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The curve we get when we plot Cumulative Population (%) and Cumulative Positives
    (%) is called the **Lorenz curve.**
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们绘制累计人口（%）和累计正值（%）时得到的曲线称为**洛伦兹曲线**。
- en: 'Step 4: Calculate the area under the Lorenz curve.'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：计算洛伦兹曲线下的面积。
- en: When we discussed ROC-AUC, we found the area under the curve using the trapezoid
    formula.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们讨论ROC-AUC时，我们使用梯形公式来找到曲线下的面积。
- en: Each region between two points was treated as a trapezoid, its area was calculated,
    and then all areas were added together to get the final value.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 两个点之间的每个区域都被视为梯形，其面积被计算，然后将所有面积相加得到最终值。
- en: The same method is applied here to calculate the area under the Lorenz curve.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这里应用相同的方法来计算洛伦兹曲线下的面积。
- en: '**Area under the Lorenz curve**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**洛伦兹曲线下的面积**'
- en: 'Area of Trapezoid:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 梯形面积：
- en: $$
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \text{Area} = \frac{1}{2} \times (y_1 + y_2) \times (x_2 – x_1)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: \text{面积} = \frac{1}{2} \times (y_1 + y_2) \times (x_2 – x_1)
- en: $$
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \[
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{aligned}
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: A_1 &= \tfrac{1}{2}(0 + 0)(0.1 – 0.0) = 0.0000 \\[6pt]
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: A_1 &= \tfrac{1}{2}(0 + 0)(0.1 – 0.0) = 0.0000 \\[6pt]
- en: A_2 &= \tfrac{1}{2}(0 + 0)(0.2 – 0.1) = 0.0000 \\[6pt]
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: A_2 &= \tfrac{1}{2}(0 + 0)(0.2 – 0.1) = 0.0000 \\[6pt]
- en: A_3 &= \tfrac{1}{2}(0 + 0)(0.3 – 0.2) = 0.0000 \\[6pt]
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: A_3 &= \tfrac{1}{2}(0 + 0)(0.3 – 0.2) = 0.0000 \\[6pt]
- en: A_4 &= \tfrac{1}{2}(0 + 0)(0.4 – 0.3) = 0.0000 \\[6pt]
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: A_4 &= \tfrac{1}{2}(0 + 0)(0.4 – 0.3) = 0.0000 \\[6pt]
- en: A_5 &= \tfrac{1}{2}(0 + 0)(0.5 – 0.4) = 0.0000 \\[6pt]
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: A_5 &= \tfrac{1}{2}(0 + 0)(0.5 – 0.4) = 0.0000 \\[6pt]
- en: A_6 &= \tfrac{1}{2}(0 + 0.25)(0.6 – 0.5) = 0.0125 \\[6pt]
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: A_6 &= \tfrac{1}{2}(0 + 0.25)(0.6 – 0.5) = 0.0125 \\[6pt]
- en: A_7 &= \tfrac{1}{2}(0.25 + 0.25)(0.7 – 0.6) = 0.0250 \\[6pt]
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: A_7 &= \tfrac{1}{2}(0.25 + 0.25)(0.7 – 0.6) = 0.0250 \\[6pt]
- en: A_8 &= \tfrac{1}{2}(0.25 + 0.50)(0.8 – 0.7) = 0.0375 \\[6pt]
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: A_8 &= \tfrac{1}{2}(0.25 + 0.50)(0.8 – 0.7) = 0.0375 \\[6pt]
- en: A_9 &= \tfrac{1}{2}(0.50 + 0.75)(0.9 – 0.8) = 0.0625 \\[6pt]
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: A_9 &= \tfrac{1}{2}(0.50 + 0.75)(0.9 – 0.8) = 0.0625 \\[6pt]
- en: A_{10} &= \tfrac{1}{2}(0.75 + 1.00)(1.0 – 0.9) = 0.0875 \\[8pt]
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: A_{10} &= \tfrac{1}{2}(0.75 + 1.00)(1.0 – 0.9) = 0.0875 \\[8pt]
- en: '\text{Total Area Under Lorenz Curve: }'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: \text{洛伦兹曲线下的总面积：}
- en: A &= 0.0000 + 0.0000 + 0.0000 + 0.0000 + 0.0000 \\[6pt]
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: A &= 0.0000 + 0.0000 + 0.0000 + 0.0000 + 0.0000 \\[6pt]
- en: '&\quad + 0.0125 + 0.0250 + 0.0375 + 0.0625 + 0.0875 \\[6pt]'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '&\quad + 0.0125 + 0.0250 + 0.0375 + 0.0625 + 0.0875 \\[6pt]'
- en: '&= 0.2250'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '&= 0.2250'
- en: \end{aligned}
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: We calculated the area under the Lorenz curve, which is 0.225.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们计算了洛伦兹曲线下的面积，为0.225。
- en: Here, we plotted the cumulative population on the X-axis and the cumulative
    positives on the Y-axis.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们在X轴上绘制了累积人口，在Y轴上绘制了累积正样本。
- en: The Lorenz curve helps us understand how the positives (class 2) are distributed
    across the population as we move from the lowest to the highest predicted probability.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 洛伦兹曲线帮助我们理解，当我们从最低到最高的预测概率移动时，正样本（类别2）如何在人口中分布。
- en: When the curve remains flat for a long stretch and then rises sharply near the
    end, it means most of the positives are concentrated among the highest-scoring
    observations. This is exactly what a good model is expected to do.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当曲线在一段时间内保持平坦，然后在接近结束时急剧上升时，这意味着大多数正样本都集中在得分最高的观察值中。这正是好的模型所期望做到的。
- en: In our sample dataset, there are four positives (class 2) and six negatives
    (class 1). The shape of the curve shows how effectively the model separates the
    two classes.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的样本数据集中，有四个正样本（类别2）和六个负样本（类别1）。曲线的形状显示了模型如何有效地分离这两个类别。
- en: A model that pushes positives toward the higher predicted probabilities will
    create a more curved Lorenz plot, which indicates stronger separation and better
    ranking ability.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 将正样本推向更高的预测概率的模型将创建一个更弯曲的洛伦兹图，这表明更强的分离能力和更好的排序能力。
- en: If the model were perfect, all the positives would appear only in the highest
    predicted probability region.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果模型是完美的，所有正样本都只会出现在最高的预测概率区域。
- en: In that case, the Lorenz curve would stay at zero for most of the population
    and then suddenly rise to 100 percent right near the end. This steep jump shows
    perfect separation.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在那种情况下，洛伦兹曲线会在大多数人口中保持为零，然后在接近结束时突然上升到100%。这个陡峭的跳跃显示了完美的分离。
- en: The curve looks like this for a perfect model.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 对于完美模型，曲线看起来是这样的。
- en: '![](../Images/a00104d716ccfc1c5857027790a68e8f.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a00104d716ccfc1c5857027790a68e8f.png)'
- en: Image by Author
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Area under the lorenz curve for the perfect model.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 完美模型的洛伦兹曲线下的面积。
- en: \[
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{aligned}
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: \text{Perfect Area} &= \tfrac{1}{2} \times \text{base} \times \text{height}
    \\[6pt]
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: \text{完美面积} &= \tfrac{1}{2} \times \text{底} \times \text{高} \\[6pt]
- en: '&= \tfrac{1}{2} \times (1.0 – 0.6) \times 1.0 \\[6pt]'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '&= \tfrac{1}{2} \times (1.0 – 0.6) \times 1.0 \\[6pt]'
- en: '&= \tfrac{1}{2} \times 0.4 \\[6pt]'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '&= \tfrac{1}{2} \times 0.4 \\[6pt]'
- en: '&= 0.2'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '&= 0.2'
- en: \end{aligned}
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: We also have another method to calculate the Area under the curve for the perfect
    model.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还有另一种方法来计算完美模型的曲线下的面积。
- en: \[
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{Let } \pi \text{ be the proportion of positives in the dataset.}
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: \text{设} \pi \text{为数据集中正样本的比例。}
- en: \]
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{Perfect Area} = \frac{1}{2} (1 – (1 – \pi)) \times 1
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: \text{完美面积} = \frac{1}{2} (1 – (1 – \pi)) \times 1
- en: \] \[
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \frac{1}{2} \pi
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{1}{2} \pi
- en: \] \[
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \frac{1}{2} \times 0.4
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{1}{2} \times 0.4
- en: \] \[
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = 0.2
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: = 0.2
- en: \]
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'For our dataset:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的数据集：
- en: 'Here, we have 4 positives out of 10 records, so: π = 4/10 = 0.4.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们有10条记录中的4个正样本，所以：π = 4/10 = 0.4。
- en: We calculated the area under the lorenz curve for our sample dataset and also
    for the perfect model with same number of positives and negatives.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们计算了样本数据集和具有相同正负样本数量的完美模型的洛伦兹曲线下的面积。
- en: Now, if we go through the dataset without sorting, the positives are evenly
    spread out. This means the rate at which we collect positives is the same as the
    rate at which we move through the population.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们不对数据集进行排序就通过它，正面结果会均匀分布。这意味着我们收集正面的速率与我们通过人口的速率相同。
- en: This is the random model, and it always gives an area under the curve of 0.5.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这是随机模型，它总是给出曲线下的面积为0.5。
- en: '![](../Images/a0e154a625154bf83dcdfbb46d17376b.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a0e154a625154bf83dcdfbb46d17376b.png)'
- en: Image by Author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 'Step 5: Calculate the Gini Coefficient'
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：计算基尼系数
- en: \[
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: A_{\text{model}} = 0.225
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: A_{\text{model}} = 0.225
- en: \]
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: A_{\text{random}} = 0.5
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: A_{\text{random}} = 0.5
- en: \] \[
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: A_{\text{perfect}} = 0.2
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: A_{\text{perfect}} = 0.2
- en: \] \[
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \text{Gini} = \frac{A_{\text{random}} – A_{\text{model}}}{A_{\text{random}}
    – A_{\text{perfect}}}
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: \text{Gini} = \frac{A_{\text{random}} – A_{\text{model}}}{A_{\text{random}}
    – A_{\text{perfect}}}
- en: \] \[
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \frac{0.5 – 0.225}{0.5 – 0.2}
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{0.5 – 0.225}{0.5 – 0.2}
- en: \] \[
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \frac{0.275}{0.3}
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{0.275}{0.3}
- en: \] \[
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \approx 0.92
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: \approx 0.92
- en: \]
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: We got Gini = 0.92, which means almost all the positives are concentrated at
    the top of the sorted list. This shows that the model does a very good job of
    separating positives from negatives, coming close to perfect.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了基尼系数为0.92，这意味着几乎所有的正面结果都集中在排序列表的顶部。这表明模型在将正面结果与负面结果分开方面做得非常好，接近完美。
- en: '* * *'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: As we have seen how the Gini Coefficient is calculated, let’s look at what we
    actually did during the calculation.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，基尼系数是如何计算的，让我们看看在计算过程中我们实际上做了什么。
- en: We considered a sample of 10 points consisting of output probabilities from
    logistic regression.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我们考虑了一个由逻辑回归输出概率组成的10个点的样本。
- en: We sorted the probabilities in ascending order.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们按升序排列了概率。
- en: Next, we calculated Cumulative Population (%) and Cumulative Positives (%) and
    then plotted them.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: Next, we calculated Cumulative Population (%) and Cumulative Positives (%) and
    then plotted them.
- en: We got a curve called the Lorenz curve, and we calculated the area under it,
    which is 0.225.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了一个称为洛伦兹曲线的曲线，并计算了其下的面积，为0.225。
- en: Now let’s understand what is 0.225?
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们理解0.225是什么意思？
- en: Our sample consists of 4 positives (class 2) and 6 negatives (class 1).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的样本由4个正面（类别2）和6个负面（类别1）组成。
- en: The output probabilities are for class 2, which means the higher the probability,
    the more likely the customer belongs to class 2.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 输出的概率是针对类别2的，这意味着概率越高，客户属于类别2的可能性就越大。
- en: In our sample data, there are four positives (class 2) and six negatives (class
    1). The Lorenz curve shows how these positives are distributed as we move from
    the lowest to the highest predicted probability.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的样本数据中，有四个正面（类别2）和六个负面（类别1）。洛伦兹曲线显示了随着我们从最低预测概率移动到最高预测概率，这些正面的分布情况。
- en: In a perfect model, all four positives would appear only at the highest predicted
    scores, which means the curve would remain at zero for most of the population
    and then jump to 100 percent near the end.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个完美的模型中，所有四个正面结果只会出现在最高预测分数处，这意味着曲线在大多数人口中保持为零，然后在接近结束时跳到100%。
- en: In that case, the positives would be captured entirely within the final 40 percent
    of the population, and the area under the Lorenz curve would be 0.2.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，正面结果将完全包含在最后40%的人口中，洛伦兹曲线下的面积将为0.2。
- en: For our model, the area under the Lorenz curve is 0.225, which is very close
    to the perfect value.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的模型，洛伦兹曲线下的面积为0.225，非常接近完美值。
- en: 'This means the model is doing a good job of ranking the observations: most
    of the positives are concentrated among the highest scores, and the model is effectively
    separating the two classes.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着模型在排序观测值方面做得很好：大多数正面结果都集中在最高分数中，模型有效地将两个类别分开。
- en: The smaller the area under the Lorenz curve, the more efficiently the model
    captures positives, which indicates stronger predictive performance.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 洛伦兹曲线下的面积越小，模型捕捉正面的效率就越高，这表明预测性能更强。
- en: Next, we calculated the Gini Coefficient, which is 0.92.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们计算了基尼系数，为0.92。
- en: \[
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{Gini} = \frac{A_{\text{model}} – A_{\text{random}}}{A_{\text{perfect}}
    – A_{\text{random}}}
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: \text{Gini} = \frac{A_{\text{model}} – A_{\text{random}}}{A_{\text{perfect}}
    – A_{\text{random}}}
- en: \]
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The numerator tells us how much better our model is than random guessing.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 分子告诉我们我们的模型比随机猜测好多少。
- en: The denominator tells us the maximum possible improvement over random.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 分母告诉我们相对于随机情况的最大可能改进。
- en: The ratio puts these two together, so the Gini coefficient always falls between
    0 (random) and 1 (perfect).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这个比率将这两个结合起来，因此基尼系数总是在0（随机）和1（完美）之间。
- en: Gini is used to measure how close the model is to being perfect in separating
    positive and negative classes.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 基尼系数用于衡量模型在分离正负类别方面有多接近完美。
- en: But we may get a doubt about why we calculated Gini and why we didn’t stop after
    0.225.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们可能会质疑为什么我们要计算基尼系数，以及为什么我们没有在 0.225 后停止。
- en: 0.225 is the area under the Lorenz curve for our model. It doesn’t tell us how
    close the model is to being perfect without comparing it to 0.2, which is the
    area for the perfect model.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 0.225 是我们模型下洛伦兹曲线下的面积。如果不与 0.2（完美模型的面积）进行比较，它并不能告诉我们模型离完美有多近。
- en: So, we calculate Gini to standardize it so that it falls between 0 and 1, which
    makes it easy to compare models.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们计算基尼系数以标准化它，使其介于 0 和 1 之间，这使得比较模型变得容易。
- en: '* * *'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In economics, the diagonal is often called the line of equality, and the Lorenz
    curve is usually interpreted based on how close it is to that line.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在经济学中，对角线通常被称为平等线，洛伦兹曲线通常根据其与该线的接近程度来解释。
- en: If the curve is very close, it means income is distributed more evenly across
    the population, which is considered a good thing.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果曲线非常接近，这意味着收入在人口中的分布更加均匀，这被认为是一件好事。
- en: But in our case, we are not measuring income inequality. We are trying to see
    how well a model can separate defaulters from non-defaulters.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们的情况下，我们不是在衡量收入不平等。我们试图了解模型在区分违约者和非违约者方面的表现如何。
- en: Here, we actually want the Lorenz curve to stay far away from the line of equality.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们实际上希望洛伦兹曲线远离平等线。
- en: The farther it bends away, the better the model is at distinguishing between
    the two classes, and the stronger its predictive performance will be.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 它弯曲得越远，模型在区分两个类别方面的能力就越强，其预测性能也会越强。
- en: A Gini coefficient of 0.92 would usually be seen as a bad thing in economics
    because it means there is a lot of inequality and most of the income is concentrated
    among a small group of people.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在经济学中，基尼系数为 0.92 通常被视为不良现象，因为它意味着存在大量不平等，大部分收入集中在少数人手中。
- en: But in machine learning, the meaning is completely different. A Gini of 0.92
    is considered very good because it shows that the model is doing an excellent
    job of separating the two classes.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 但在机器学习中，其含义完全不同。基尼系数为 0.92 被认为是非常好的，因为它表明模型在分离两个类别方面做得非常出色。
- en: It means most defaulters and non-defaulters are being ranked correctly, and
    the model is achieving about 92 percent of the best possible separation.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着大多数违约者和非违约者都被正确地排名，模型实现了大约 92% 的最佳分离度。
- en: '* * *'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Banks also use Gini Coefficient to evaluate credit risk models alongside ROC-AUC
    and KS Statistic. Together, these measures give a complete picture of model performance.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 银行也使用基尼系数与 ROC-AUC 和 KS 统计量一起评估信用风险模型。这些指标共同给出了模型性能的完整图景。
- en: '* * *'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now, let’s calculate ROC-AUC for our sample data.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们计算我们的样本数据的 ROC-AUC。
- en: '[PRE1]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We got AUC = 0.9583
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了 AUC = 0.9583
- en: Now, Gini = (2 * AUC) – 1 = (2 * 0.9583) – 1 = 0.92
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Gini = (2 * AUC) – 1 = (2 * 0.9583) – 1 = 0.92
- en: This is the relation between Gini & ROC-AUC.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这是基尼系数与 ROC-AUC 之间的关系。
- en: '* * *'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now let’s calculate Gini Coefficient on a full dataset.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们在完整的数据集上计算基尼系数。
- en: '**Code:**'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE2]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/b104e89588ccc29267143e60ee3b938a.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b104e89588ccc29267143e60ee3b938a.png)'
- en: Image by Author
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We got Gini = 0.60, which means the model is good at ranking positives above
    negatives and achieves about 60% of the separation that a perfect model would.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了基尼系数 Gini = 0.60，这意味着模型在将正样本排在负样本之上方面做得很好，并且达到了一个完美模型大约 60% 的分离度。
- en: 'Interpretation (ML / Credit Scoring context):'
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解释（机器学习/信用评分背景）：
- en: A Gini score below 0.5 usually indicates a weak model that is not much better
    than random guessing.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 基尼系数低于 0.5 通常表明模型较弱，并不比随机猜测好多少。
- en: A score between 0.5 and 0.6 suggests the model is acceptable and has some predictive
    power.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 介于 0.5 和 0.6 之间的分数表明模型是可以接受的，并且具有一定的预测能力。
- en: A range between 0.6 and 0.7 is considered good, showing the model can reliably
    distinguish between the classes.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 介于 0.6 和 0.7 之间的范围被认为是好的，表明模型可以可靠地区分这两个类别。
- en: A Gini above 0.8 is considered excellent and is rarely achieved in real-world
    scenarios.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 基尼系数高于 0.8 被认为是优秀的，在现实场景中很少实现。
- en: '* * *'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Dataset
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: The dataset used in this blog is the [German Credit dataset](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data),
    which is publicly available on the UCI Machine Learning Repository. It is provided
    under the [Creative Commons Attribution 4.0 International (CC BY 4.0) License](https://creativecommons.org/licenses/by/4.0/legalcode).
    This means it can be freely used and shared with proper attribution.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 本博客使用的数据集是[德国信用数据集](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data)，该数据集在UCI机器学习库上公开可用。它是在[Creative
    Commons Attribution 4.0 国际（CC BY 4.0）许可](https://creativecommons.org/licenses/by/4.0/legalcode)下提供的。这意味着它可以自由使用和分享，只要适当注明出处。
- en: '* * *'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I hope you found this article helpful and clear.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您觉得这篇文章有用且清晰。
- en: If you haven’t read my earlier blogs on [ROC-AUC](https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/)
    and [Kolmogorov Smirnov Statistic](https://towardsdatascience.com/kolmogorov-smirnov-statistic-explained-measuring-model-power-in-credit-risk-modeling/),
    you can check them out here.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您还没有阅读我之前关于[ROC-AUC](https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/)和[Kolmogorov
    Smirnov 统计量](https://towardsdatascience.com/kolmogorov-smirnov-statistic-explained-measuring-model-power-in-credit-risk-modeling/)的博客，您可以在下面查看。
- en: If you’d like to read more of my writing, you can also find it on [Medium](https://medium.com/@dasarinikhil076)
    and [LinkedIn](https://www.linkedin.com/in/nikhildasari-dataanalyst/).
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想阅读我的更多作品，您也可以在[Medium](https://medium.com/@dasarinikhil076)和[LinkedIn](https://www.linkedin.com/in/nikhildasari-dataanalyst/)上找到。
- en: '**Note:** I made a small mistake in my earlier explanation of this part. I’ve
    corrected it now, so the concept is clearer and more accurate.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：** 我在之前对这个部分的解释中犯了一个小错误。我已经纠正了它，所以概念更加清晰和准确。'
- en: Thanks for reading!
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读！
