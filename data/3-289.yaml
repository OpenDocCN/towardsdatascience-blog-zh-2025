- en: Neural Networks – Intuitively and Exhaustively Explained
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 神经网络 – 直观且详尽地解释
- en: 原文：[https://towardsdatascience.com/neural-networks-intuitively-and-exhaustively-explained-0153f85c1007/](https://towardsdatascience.com/neural-networks-intuitively-and-exhaustively-explained-0153f85c1007/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/neural-networks-intuitively-and-exhaustively-explained-0153f85c1007/](https://towardsdatascience.com/neural-networks-intuitively-and-exhaustively-explained-0153f85c1007/)
- en: '!["The Thinking Part" by Daniel Warfield using MidJourney. All images by the
    author unless otherwise specified. Article originally made available on Intuitively
    and Exhaustively Explained.](../Images/fa4d7920377acbeaff099656903bcc66.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '!["The Thinking Part" by Daniel Warfield 使用 Midjourney。除非另有说明，所有图片均为作者所有。文章最初在
    Intuitively and Exhaustively Explained 上提供。](../Images/fa4d7920377acbeaff099656903bcc66.png)'
- en: '"The Thinking Part" by Daniel Warfield using MidJourney. All images by the
    author unless otherwise specified. Article originally made available on [Intuitively
    and Exhaustively Explained](https://iaee.substack.com/).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '"The Thinking Part" by Daniel Warfield 使用 MidJourney。除非另有说明，所有图片均为作者所有。文章最初在
    [Intuitively and Exhaustively Explained](https://iaee.substack.com/) 上提供。'
- en: In this article we’ll form a thorough understanding of the neural network, a
    cornerstone technology underpinning virtually all cutting edge AI systems. We’ll
    first explore neurons in the human brain, and then explore how they formed the
    fundamental inspiration for neural networks in AI. We’ll then explore back-propagation,
    the algorithm used to train neural networks to do cool stuff. Finally, after forging
    a thorough conceptual understanding, we’ll implement a Neural Network ourselves
    from scratch and train it to solve a toy problem.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将全面了解神经网络，这是支撑几乎所有前沿人工智能系统的基石技术。我们将首先探索人脑中的神经元，然后探讨它们如何成为人工智能中神经网络的基本灵感来源。然后，我们将探讨反向传播，这是用于训练神经网络执行酷炫操作的算法。最后，在建立全面的概念理解之后，我们将从头开始实现一个神经网络，并训练它来解决一个玩具问题。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Who is this useful for?** Anyone who wants to form a complete understanding
    of the state of the art of AI.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**这对谁有用？** 任何想要全面了解人工智能最新进展的人。'
- en: '**How advanced is this post?** This article is designed to be accessible to
    beginners, and also contains thorough information which may serve as a useful
    refresher for more experienced readers.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**这篇文章有多高级？** 这篇文章旨在让初学者易于理解，同时也包含详尽的信息，可能对经验更丰富的读者也很有用。'
- en: '**Pre-requisites:** None'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**先决条件：无**'
- en: '* * *'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Inspiration From the Brain
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 来自大脑的灵感
- en: Neural networks take direct inspiration from the human brain, which is made
    up of billions of incredibly complex cells called neurons.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络直接从人脑中汲取灵感，人脑由数十亿个被称为神经元的极其复杂的细胞组成。
- en: '![The Neuron, source](../Images/caffe4c52a25f64ed3af385f3a7fa4e2.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![神经元，来源](../Images/caffe4c52a25f64ed3af385f3a7fa4e2.png)'
- en: The Neuron, [source](https://en.wikipedia.org/wiki/Neuron#/media/File:Blausen_0657_MultipolarNeuron.png)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元，[来源](https://en.wikipedia.org/wiki/Neuron#/media/File:Blausen_0657_MultipolarNeuron.png)
- en: The process of thinking within the human brain is the result of communication
    between neurons. You might receive stimulus in the form of something you saw,
    then that information is propagated to neurons in the brain via electrochemical
    signals.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 人类大脑中的思维过程是神经元之间通信的结果。你可能以你所看到的东西的形式接收刺激，然后通过电化学信号将信息传播到大脑中的神经元。
- en: '![eye image generated with Midjourney](../Images/82abb5dff13c0d8180deaf8286860a87.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![使用 Midjourney 生成的眼睛图像](../Images/82abb5dff13c0d8180deaf8286860a87.png)'
- en: eye image generated with Midjourney
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Midjourney 生成的眼睛图像
- en: The first neurons in the brain receive that stimulus, then each neuron may choose
    whether or not to "fire" based on how much stimulus it received. "Firing", in
    this case, is a neurons decision to send signals to the neurons it’s connected
    to.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑中的第一个神经元接收那个刺激，然后每个神经元可能会根据它接收到的刺激量选择是否“放电”。“放电”，在这种情况下，是神经元决定向其连接的神经元发送信号的决定。
- en: '![Imagine the signal from the eye directly feeds into three neurons, and two
    decide to fire.](../Images/f719eb46ef0ae2f5fb61a4c79fc75c86.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![想象眼睛的信号直接进入三个神经元，其中两个决定放电。](../Images/f719eb46ef0ae2f5fb61a4c79fc75c86.png)'
- en: Imagine the signal from the eye directly feeds into three neurons, and two decide
    to fire.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 想象眼睛的信号直接进入三个神经元，其中两个决定放电。
- en: Then the neurons which those Neurons are connected to may or may not choose
    to fire.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，与这些神经元相连的神经元可能会选择放电，也可能不会。
- en: '![Neurons receive stimulus from previous neurons and then choose whether or
    not to fire based on the magnitude of the stimulus.](../Images/d2794fa3f09d25cfe2552d6d1801285f.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![神经元从之前的神经元接收刺激，然后根据刺激的强度选择是否放电。](../Images/d2794fa3f09d25cfe2552d6d1801285f.png)'
- en: Neurons receive stimulus from previous neurons and then choose whether or not
    to fire based on the magnitude of the stimulus.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元从之前的神经元接收刺激，然后根据刺激的强度选择是否放电。
- en: Thus, a "thought" can be conceptualized as a large number of neurons choosing
    to, or not to fire based on the stimulus from other neurons.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，“思想”可以理解为大量神经元根据来自其他神经元的刺激选择是否放电。
- en: As one navigates throughout the world, one might have certain thoughts more
    than another person. A cellist might use some neurons more than a mathematician,
    for instance.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个人在世界中导航时，他可能会有比另一个人更多的某些想法。例如，一个大提琴家可能比数学家更多地使用某些神经元。
- en: '![Different tasks require the use of different neurons. Images generated with
    Midjourney](../Images/a7fe20f8856fa96fe1dac87ffe0802bf.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![不同的任务需要使用不同的神经元。Midjourney生成的图像](../Images/a7fe20f8856fa96fe1dac87ffe0802bf.png)'
- en: Different tasks require the use of different neurons. Images generated with
    Midjourney
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的任务需要使用不同的神经元。Midjourney生成的图像
- en: When we use certain neurons more frequently, their connections become stronger,
    increasing the intensity of those connections. When we don’t use certain neurons,
    those connections weaken. This general rule has inspired the phrase "Neurons that
    fire together, wire together", and is the high-level quality of the brain which
    is responsible for the learning process.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们更频繁地使用某些神经元时，它们的连接会变得更强，增加这些连接的强度。当我们不使用某些神经元时，这些连接会减弱。这个一般规则启发了“一起放电的神经元，一起连接”的短语，这是大脑负责学习过程的高级特性。
- en: '![The process of using certain neurons strengthens their connections.](../Images/f8cd5a5304a7c31935dfd4f032a3c4c4.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![使用某些神经元加强其连接的过程](../Images/f8cd5a5304a7c31935dfd4f032a3c4c4.png)'
- en: The process of using certain neurons strengthens their connections.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 使用某些神经元加强其连接的过程。
- en: I’m not a neurologist, so of course this is a tremendously simplified description
    of the brain. However, it’s enough to understand the fundamental idea of a neural
    network.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是神经学家，所以当然这是一个极度简化的脑部描述。然而，这足以理解神经网络的基本概念。
- en: The Intuition of Neural Networks
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 神经网络的直觉
- en: Neural networks are, essentially, a mathematically convenient and simplified
    version of neurons within the brain. A neural network is made up of elements called
    "perceptrons", which are directly inspired by neurons.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络在本质上是一种数学上方便且简化的脑部神经元版本。神经网络由称为“感知器”的元素组成，这些元素直接受到神经元的启发。
- en: '![A perceptron, on the left, vs a neuron, on the right. [source](https://en.wikipedia.org/wiki/Neuron#/media/File:Blausen_0657_MultipolarNeuron.png)
    1, source 2](../Images/e5b20b6842d4f8dc6be7ac2946ccd467.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![左边的感知器与右边的神经元。[来源](https://en.wikipedia.org/wiki/Neuron#/media/File:Blausen_0657_MultipolarNeuron.png)
    1, 来源 2](../Images/e5b20b6842d4f8dc6be7ac2946ccd467.png)'
- en: A perceptron, on the left, vs a neuron, on the right. [[source](https://en.wikipedia.org/wiki/Neuron#/media/File:Blausen_0657_MultipolarNeuron.png)
    1](https://commons.wikimedia.org/wiki/File:ArtificialNeuronModel_english.png),
    source 2
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 左边的感知器与右边的神经元。[来源](https://en.wikipedia.org/wiki/Neuron#/media/File:Blausen_0657_MultipolarNeuron.png)
    1](https://commons.wikimedia.org/wiki/File:ArtificialNeuronModel_english.png),
    来源 2
- en: Perceptrons take in data, like a neuron does,
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器接收数据，就像神经元一样，
- en: '![Perceptrons in AI work with numbers, while Neurons within the brain work
    with electrochemical signals.](../Images/ba7adbd37c55251db6f12d2e95b76acb.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![人工智能中的感知器使用数字，而大脑中的神经元使用电化学信号。](../Images/ba7adbd37c55251db6f12d2e95b76acb.png)'
- en: Perceptrons in AI work with numbers, while Neurons within the brain work with
    electrochemical signals.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能中的感知器使用数字，而大脑中的神经元使用电化学信号。
- en: aggregate that data, like a neuron does,
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 像神经元一样聚合数据，
- en: '![Perceptrons aggregate numbers to come up with an output, while neurons aggregate
    electrochemical signals to come up with an output.](../Images/8f99d9fe17bd3c595fc31aac7b54e582.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![感知器通过聚合数字来得出输出，而神经元通过聚合电化学信号来得出输出。](../Images/8f99d9fe17bd3c595fc31aac7b54e582.png)'
- en: Perceptrons aggregate numbers to come up with an output, while neurons aggregate
    electrochemical signals to come up with an output.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器通过聚合数字来得出输出，而神经元通过聚合电化学信号来得出输出。
- en: then output a signal based on the input, like a neuron does.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 然后根据输入输出信号，就像神经元一样。
- en: '![Perceptrons output numbers, while neurons output electrochemical signals.](../Images/0c8b0f1a706b8f846a6980c79c138ea1.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![感知器输出数字，而神经元输出电化学信号。](../Images/0c8b0f1a706b8f846a6980c79c138ea1.png)'
- en: Perceptrons output numbers, while neurons output electrochemical signals.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器输出数字，而神经元输出电化学信号。
- en: A neural network can be conceptualized as a big network of these perceptrons,
    just like the brain is a big network of neurons.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 可以将神经网络概念化为由这些感知器组成的大网络，就像大脑是由神经元组成的大网络一样。
- en: '![A neural network (left) vs the brain (right). src1 src2](../Images/4b400911a0b571818967cf88384a4c9f.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![神经网络（左）与大脑（右）。src1 src2](../Images/4b400911a0b571818967cf88384a4c9f.png)'
- en: A neural network (left) vs the brain (right). [src1](https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Artificial_neural_network.svg/560px-Artificial_neural_network.svg.png)
    [src2](https://www.google.com/url?sa=i&url=https%3A%2F%2Fcommons.wikimedia.org%2Fwiki%2FNeuron&psig=AOvVaw16zt0cwZKdlPi6mQqgRQLT&ust=1736975287779000&source=images&cd=vfe&opi=89978449&ved=0CBQQjRxqFwoTCNi7sKyP9ooDFQAAAAAdAAAAABAE)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络（左）与大脑（右）。[src1](https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Artificial_neural_network.svg/560px-Artificial_neural_network.svg.png)
    [src2](https://www.google.com/url?sa=i&url=https%3A%2F%2Fcommons.wikimedia.org%2Fwiki%2FNeuron&psig=AOvVaw16zt0cwZKdlPi6mQqgRQLT&ust=1736975287779000&source=images&cd=vfe&opi=89978449&ved=0CBQQjRxqFwoTCNi7sKyP9ooDFQAAAAAdAAAAABAE)
- en: When a neuron in the brain fires, it does so as a binary decision. Or, in other
    words, neurons either fire or they don’t. Perceptrons, on the other hand, don’t
    "fire" per-se, but output a range of numbers based on the perceptrons input.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当大脑中的神经元放电时，它以二进制决策的形式放电。或者换句话说，神经元要么放电，要么不放电。另一方面，感知器本身并不“放电”，而是根据感知器的输入输出一系列数字。
- en: '![Perceptrons output a continuous range of numbers, while Neurons either fire
    or they don''t.](../Images/536ceb20f12978a3dcecfd6590413031.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![感知器输出一系列连续的数字，而神经元要么放电，要么不放电。](../Images/536ceb20f12978a3dcecfd6590413031.png)'
- en: Perceptrons output a continuous range of numbers, while Neurons either fire
    or they don’t.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器输出一系列连续的数字，而神经元要么放电，要么不放电。
- en: Neurons within the brain can get away with their relatively simple binary inputs
    and outputs because thoughts exist over time. Neurons essentially [pulse at different
    rates](https://www.youtube.com/watch?v=Nxa19uWC_oA), with slower and faster pulses
    communicating different information.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑中的神经元可以因其相对简单的二进制输入和输出而幸存，因为思想存在于时间之中。神经元本质上[以不同的速率脉冲](https://www.youtube.com/watch?v=Nxa19uWC_oA)，较慢和较快的脉冲传递不同的信息。
- en: So, neurons have simple inputs and outputs in the form of on or off pulses,
    but the rate at which they pulse can communicate complex information. Perceptrons
    only see an input once per pass through the network, but their input and output
    can be a continuous range of values. If you’re familiar with electronics, you
    might reflect on how this is similar to the relationship between digital and analogue
    signals.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，神经元以开或关脉冲的形式具有简单的输入和输出，但它们脉冲的速率可以传递复杂的信息。感知器在每个网络通过中只看到一次输入，但它们的输入和输出可以是一个连续的值范围。如果你熟悉电子学，你可能会对数字信号和模拟信号之间的关系进行反思。
- en: The way the math for a perceptron actually shakes out is pretty simple. A standard
    neural network consists of a bunch of weights connecting the perceptron’s of different
    layers together.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器的数学计算实际上非常简单。一个标准的神经网络由连接不同层感知器的一组权重组成。
- en: '![A neural network, with the weights leading into and out of a particular perceptron
    highlighted.](../Images/c7ab5d40f40ae3079ac6af240552362f.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![一个神经网络，其中特定感知器的输入和输出权重被突出显示。](../Images/c7ab5d40f40ae3079ac6af240552362f.png)'
- en: A neural network, with the weights leading into and out of a particular perceptron
    highlighted.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一个神经网络，其中特定感知器的输入和输出权重被突出显示。
- en: You can calculate the value of a particular perceptron by adding up all the
    inputs, multiplied by their respective weights.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过将所有输入加起来，乘以它们各自的权重来计算特定感知器的值。
- en: '![An example of how the value of a perceptron might be calculated. (0.3×0.3)
    + (0.7×0.1) +(-0.5×0.5)=-0.09](../Images/e224c1910e52a14ef2cb45bb86b4acc8.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![感知器值计算示例。（0.3×0.3）+（0.7×0.1）+（-0.5×0.5）=-0.09](../Images/e224c1910e52a14ef2cb45bb86b4acc8.png)'
- en: An example of how the value of a perceptron might be calculated. (0.3×0.3) +
    (0.7×0.1) +(-0.5×0.5)=-0.09
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器值可能计算的示例。（0.3×0.3）+（0.7×0.1）+（-0.5×0.5）=-0.09
- en: Many Neural Networks also have a "bias" associated with each perceptron, which
    is added to the sum of the inputs to calculate the perceptron’s value.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 许多神经网络也与每个感知器相关联一个“偏差”，这个偏差被加到输入的总和上，以计算感知器的值。
- en: '![An example of how the value of a perceptron might be calculated when a bias
    term is included in the model. (0.3×0.3) + (0.7×0.1) +(-0.5×0.5) + 0.01 =-0.08](../Images/2cc7cbaa477424d5799fb4fe338c4cd9.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![一个例子是，当模型中包含偏差项时，感知器的值可能如何计算。（0.3×0.3）+（0.7×0.1）+（-0.5×0.5）+ 0.01 = -0.08](../Images/2cc7cbaa477424d5799fb4fe338c4cd9.png)'
- en: An example of how the value of a perceptron might be calculated when a bias
    term is included in the model. (0.3×0.3) + (0.7×0.1) +(-0.5×0.5) + 0.01 =-0.08
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子是，当模型中包含偏差项时，感知器的值可能如何计算。（0.3×0.3）+（0.7×0.1）+（-0.5×0.5）+ 0.01 = -0.08
- en: Calculating the output of a neural network, then, is just doing a bunch of addition
    and multiplication to calculate the value of all the perceptrons.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，计算神经网络的输出，实际上就是进行一系列加法和乘法运算，以计算所有感知器的值。
- en: Sometimes data scientists refer to this general operation as a "linear projection",
    because we’re mapping an input into an output via linear operations (addition
    and multiplication). One problem with this approach is, even if you daisy chain
    a billion of these layers together, the resulting model will still just be a linear
    relationship between the input and output because it’s all just addition and multiplication.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 有时数据科学家将这种通用操作称为“线性投影”，因为我们通过线性运算（加法和乘法）将输入映射到输出。这种方法的一个问题是，即使将数十亿个这样的层连接在一起，得到的模型仍然只是输入和输出之间的线性关系，因为所有这些都是加法和乘法。
- en: This is a serious problem because not all relationships between an input and
    output are linear. To get around this, data scientists employ something called
    an "activation function". These are non-linear functions which can be injected
    throughout the model to, essentially, sprinkle in some non-linearity.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个严重的问题，因为输入和输出之间的所有关系并不都是线性的。为了解决这个问题，数据科学家采用了一种称为“激活函数”的方法。这些是非线性函数，可以在整个模型中注入，从而在本质上添加一些非线性。
- en: '![Examples of a variety of functions which, given some input, produce some
    output. The top three are linear, while the bottom three are non-linear.](../Images/e8488ef964bdf797ae3d43ab40220e91.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![各种函数的示例，给定一些输入，产生一些输出。前三项是线性的，而后三项是非线性的。](../Images/e8488ef964bdf797ae3d43ab40220e91.png)'
- en: Examples of a variety of functions which, given some input, produce some output.
    The top three are linear, while the bottom three are non-linear.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 各种函数的示例，给定一些输入，产生一些输出。前三项是线性的，而后三项是非线性的。
- en: by interweaving non-linear activation functions between linear projections,
    neural networks are capable of learning very complex functions,
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在线性投影之间交织非线性激活函数，神经网络能够学习非常复杂的函数，
- en: '![By placing non-linear activation functions within a neural network, neural
    networks are capable of modeling complex relationships.](../Images/0665df4c6a1648017b2dcae9680b9943.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![通过在神经网络中放置非线性激活函数，神经网络能够模拟复杂的关系。](../Images/0665df4c6a1648017b2dcae9680b9943.png)'
- en: By placing non-linear activation functions within a neural network, neural networks
    are capable of modeling complex relationships.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在神经网络中放置非线性激活函数，神经网络能够模拟复杂的关系。
- en: 'In AI there are many popular activation functions, but the industry has largely
    converged on three popular ones: ReLU, Sigmoid, and Softmax, which are used in
    a variety of different applications. Out of all of them, ReLU is the most common
    due to its simplicity and ability to generalize to mimic almost any other function.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能领域，有许多流行的激活函数，但行业已经大量集中在三种流行的函数上：ReLU、Sigmoid和Softmax，它们被用于各种不同的应用。在所有这些函数中，ReLU由于其简单性和能够泛化以模仿几乎任何其他函数的能力，是最常见的。
- en: '![The ReLU activation function, where the output is equal to zero if the input
    is less than zero, and the output is equal to the input if the input is greater
    than zero.](../Images/a9d9ac455ea155327202e815acdd7cd1.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![ReLU激活函数，当输入小于零时输出为零，当输入大于零时输出等于输入。](../Images/a9d9ac455ea155327202e815acdd7cd1.png)'
- en: The ReLU activation function, where the output is equal to zero if the input
    is less than zero, and the output is equal to the input if the input is greater
    than zero.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: ReLU激活函数，当输入小于零时输出为零，当输入大于零时输出等于输入。
- en: So, that’s the essence of how AI models make predictions. It’s a bunch of addition
    and multiplication with some nonlinear functions sprinkled in between.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这就是AI模型进行预测的本质。它是一系列加法和乘法运算，其中穿插了一些非线性函数。
- en: Another defining characteristic of neural networks is that they can be trained
    to be better at solving a certain problem, which we’ll explore in the next section.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的另一个定义特征是它们可以被训练以更好地解决某个特定问题，我们将在下一节中探讨这一点。
- en: Back Propagation
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 反向传播
- en: One of the fundamental ideas of AI is that you can "train" a model. This is
    done by asking a neural network (which starts its life as a big pile of random
    data) to do some task. Then, you somehow update the model based on how the model’s
    output compares to a known good answer.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的一个基本思想是你可以“训练”一个模型。这是通过让一个神经网络（它最初的生命开始于一大堆随机数据）执行某些任务来完成的。然后，你根据模型输出与已知正确答案的比较来更新模型。
- en: '![The fundamental idea of training a neural network. You give it some data
    where you know what you want the output to be, compare the neural networks output
    with your desired result, then use how wrong the neural network was to update
    the parameters so it''s less wrong.](../Images/f73e2a5a59b50584a631c17847993b6b.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![训练神经网络的根本思想。你给它一些数据，其中你知道你想要什么输出，比较神经网络的输出与你的期望结果，然后使用神经网络错误的大小来更新参数，使其更少错误。](../Images/f73e2a5a59b50584a631c17847993b6b.png)'
- en: The fundamental idea of training a neural network. You give it some data where
    you know what you want the output to be, compare the neural networks output with
    your desired result, then use how wrong the neural network was to update the parameters
    so it’s less wrong.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 训练神经网络的根本思想。你给它一些数据，其中你知道你想要什么输出，比较神经网络的输出与你的期望结果，然后使用神经网络错误的大小来更新参数，使其更少错误。
- en: For this section, let’s imagine a neural network with an input layer, a hidden
    layer, and an output layer.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 对于本节，让我们想象一个具有输入层、隐藏层和输出层的神经网络。
- en: '![A neural network with two inputs and a single output, with a hidden layer
    in-between allowing the model to make more complex predictions.](../Images/9d7c8fd2a6d1219c2f2608ed131f6b4d.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![具有两个输入和一个输出，中间有一个隐藏层，允许模型做出更复杂预测的神经网络。](../Images/9d7c8fd2a6d1219c2f2608ed131f6b4d.png)'
- en: A neural network with two inputs and a single output, with a hidden layer in-between
    allowing the model to make more complex predictions.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有两个输入和一个输出的神经网络，中间有一个隐藏层，允许模型做出更复杂的预测。
- en: Each of these layers are connected together with, initially, completely random
    weights.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这些每一层都通过最初完全随机的权重连接在一起。
- en: '![The neural network, with random weights and biases defined.](../Images/3102540689b7f7ad388fa4724fe6be0b.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![具有随机定义的权重和偏差的神经网络。](../Images/3102540689b7f7ad388fa4724fe6be0b.png)'
- en: The neural network, with random weights and biases defined.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络，具有随机定义的权重和偏差。
- en: And we’ll use a ReLU activation function on our hidden layer.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在我们的隐藏层上使用ReLU激活函数。
- en: '![We''ll apply the ReLU activation function to the value of our hidden perceptrons.](../Images/abc40cae6d4af6161a375c89c609949c.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![我们将ReLU激活函数应用于我们的隐藏感知器的值。](../Images/abc40cae6d4af6161a375c89c609949c.png)'
- en: We’ll apply the ReLU activation function to the value of our hidden perceptrons.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将ReLU激活函数应用于我们的隐藏感知器的值。
- en: Let’s say we have some training data, in which the desired output is the average
    value of the input.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一些训练数据，其中期望输出是输入的平均值。
- en: '![An example of the data that we''ll be training off of.](../Images/0fb0df52dd0c2a3dff41b38079a652f0.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![我们将要训练的数据示例。](../Images/0fb0df52dd0c2a3dff41b38079a652f0.png)'
- en: An example of the data that we’ll be training off of.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要训练的数据示例。
- en: And we pass an example of our training data through the model, generating a
    prediction.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将一个训练数据的示例通过模型传递，生成一个预测。
- en: '![Calculating the value of the hidden layer and output based on the input,
    including all major intermediary steps.](../Images/f9385f4ff8242007fb02412260c2bcda.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![基于输入计算隐藏层和输出的值，包括所有主要中间步骤。](../Images/f9385f4ff8242007fb02412260c2bcda.png)'
- en: Calculating the value of the hidden layer and output based on the input, including
    all major intermediary steps.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 基于输入计算隐藏层和输出的值，包括所有主要中间步骤。
- en: To make our neural network better at the task of calculating the average of
    the input, we first compare the predicted output to what our desired output is.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使我们的神经网络在计算输入平均值的任务上表现得更好，我们首先将预测输出与我们的期望输出进行比较。
- en: '![The training data has an input of 0.1 and 0.3, and the desired output (the
    average of the input) is 0.2\. The prediction from the model was -0.1\. Thus,
    the difference between the output and the desired output is 0.3.](../Images/fb1a27f063da0040520af0d2b85f2f57.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![训练数据输入为0.1和0.3，期望输出（输入的平均值）为0.2。模型的预测值为-0.1。因此，输出与期望输出之间的差异是0.3。](../Images/fb1a27f063da0040520af0d2b85f2f57.png)'
- en: The training data has an input of 0.1 and 0.3, and the desired output (the average
    of the input) is 0.2\. The prediction from the model was -0.1\. Thus, the difference
    between the output and the desired output is 0.3.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据输入为0.1和0.3，期望输出（输入的平均值）为0.2。模型的预测值为-0.1。因此，输出与期望输出之间的差异是0.3。
- en: Now that we know that the output should increase in size, we can look back through
    the model to calculate how our weights and biases might change to promote that
    change.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道输出应该增加大小，我们可以回过头来通过模型计算我们的权重和偏差可能如何变化以促进这种变化。
- en: 'First, let’s look at the weights leading immediately into the output: w₇, w₈,
    w₉. Because the output of the third hidden perceptron was -0.46, the activation
    from ReLU was 0.00.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看直接指向输出的权重：w₇、w₈、w₉。因为第三个隐藏感知器的输出是-0.46，ReLU的激活是0.00。
- en: '![The ultimate, activated output of the third perceptron, 0.00](../Images/df574cf1f01b3ed1ae060d14961fd4ad.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![第三感知器的最终激活输出，0.00](../Images/df574cf1f01b3ed1ae060d14961fd4ad.png)'
- en: The ultimate, activated output of the third perceptron, 0.00
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 第三感知器的最终激活输出，0.00
- en: As a result, there’s no change to w₉ that could result us getting closer to
    our desired output, because every value of w₉ would result in a change of zero
    in this particular example.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，w₉的任何值都不会导致我们接近期望输出的变化，因为在特定例子中，w₉的每个值都会导致零的变化。
- en: The second hidden neuron, however, does have an activated output which is greater
    than zero, and thus adjusting w₈ will have an impact on the output for this example.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，第二个隐藏神经元确实有一个大于零的激活输出，因此调整w₈将对本例的输出产生影响。
- en: '![](../Images/42d951449c58f58880c58720560781ec.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/42d951449c58f58880c58720560781ec.png)'
- en: The way we actually calculate how much w₈ should change is by multiplying how
    much the output should change, times the input to w₈.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们实际上计算w₈应该变化多少的方法是将其应该变化的量乘以w₈的输入。
- en: '![How we calculate how the weight should change. Here the symbol Δ(delta) means
    "change in", so Δw₈ means the "change in w₈"](../Images/3b66b9ef7b570cebf288b6e5cffe5e25.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![我们如何计算权重应该如何变化。这里符号Δ(Δelta)表示“变化”，所以Δw₈表示w₈的变化](../Images/3b66b9ef7b570cebf288b6e5cffe5e25.png)'
- en: How we calculate how the weight should change. Here the symbol Δ(delta) means
    "change in", so Δw₈ means the "change in w₈"
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何计算权重应该如何变化。这里符号Δ(Δelta)表示“变化”，所以Δw₈表示w₈的变化
- en: The easiest explanation of why we do it this way is "because calculus", but
    if we look at how all weights get updated in the last layer, we can form a fun
    intuition.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们这样做最简单的解释是“因为微积分”，但如果我们看看最后一层中所有权重的更新方式，我们可以形成一个有趣的直觉。
- en: '![Calculating how the weights leading into the output should change.](../Images/b6a8c47f2ba01555884a42bdb5cfa574.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![计算指向输出的权重应该如何变化。](../Images/b6a8c47f2ba01555884a42bdb5cfa574.png)'
- en: Calculating how the weights leading into the output should change.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 计算指向输出的权重应该如何变化。
- en: Notice how the two perceptrons that "fire" (have an output greater than zero)
    are updated together. Also, notice how the stronger a perceptrons output is, the
    more its corresponding weight is updated. This is somewhat similar to the idea
    that "Neurons that fire together, wire together" within the human brain.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 注意两个“触发”（输出大于零）的感知器是如何一起更新的。也要注意，一个感知器的输出越强，其对应的权重更新就越多。这在某种程度上类似于人类大脑中“神经元一起触发，一起连接”的概念。
- en: Calculating the change to the output bias is super easy. In fact, we’ve already
    done it. Because the bias is how much a perceptrons output should change, the
    change in the bias is just the changed in the desired output. So, Δb₄=0.3
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 计算输出偏差的变化非常简单。实际上，我们已经在做了。因为偏差是感知器输出应该变化多少，所以偏差的变化就是期望输出的变化。所以，Δb₄=0.3
- en: '![how the bias of the output should be updated.](../Images/609b940fcdb3e42bcc78b7ea33d67c57.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![如何更新输出偏差。](../Images/609b940fcdb3e42bcc78b7ea33d67c57.png)'
- en: how the bias of the output should be updated.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如何更新输出偏差。
- en: Now that we’ve calculated how the weights and bias of the output perceptron
    should change, we can "back propagate" our desired change in output through the
    model. Let’s start with back propagating so we can calculate how we should update
    w₁.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经计算了输出感知器的权重和偏差应该如何改变，我们可以“反向传播”我们期望的输出变化通过模型。让我们从反向传播开始，这样我们可以计算我们应该如何更新w₁。
- en: First, we calculate how the activated output of the of the first hidden neuron
    should change. We do that by multiplying the change in output by w₇.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们计算第一个隐藏神经元的激活输出应该如何改变。我们通过将输出变化乘以w₇来实现这一点。
- en: '![Calculating how the activated output of the first hidden neuron should have
    changed by multiplying the desired change in the output by w₇.](../Images/a6b6d04dc6d632b34ea5297e396ea893.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![通过将期望的输出变化乘以w₇来计算第一个隐藏神经元的激活输出应该如何改变](../Images/a6b6d04dc6d632b34ea5297e396ea893.png)'
- en: Calculating how the activated output of the first hidden neuron should have
    changed by multiplying the desired change in the output by w₇.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将期望的输出变化乘以w₇来计算第一个隐藏神经元的激活输出应该如何改变。
- en: For values that are greater than zero, ReLU simply multiplies those values by
    1\. So, for this example, the change we want the un-activated value of the first
    hidden neuron is equal to the desired change in the activated output
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大于零的值，ReLU只是将这些值乘以1。因此，在这个例子中，我们想要改变的第一个隐藏神经元的未激活值等于激活输出中期望的改变
- en: '![How much we want to change the un-activated value of the first hidden perceptron,
    based on back-propagating from the output.](../Images/226981bbfd2bf32dac991ad0ebf313e6.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![我们想要根据从输出反向传播的结果来改变第一个隐藏感知器的未激活值](../Images/226981bbfd2bf32dac991ad0ebf313e6.png)'
- en: How much we want to change the un-activated value of the first hidden perceptron,
    based on back-propagating from the output.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要根据从输出反向传播的结果来改变第一个隐藏感知器的未激活值
- en: Recall that we calculated how to update w₇ based on multiplying it’s input by
    the change in its desired output. We can do the same thing to calculate the change
    in w₁.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们计算了如何通过将其输入乘以期望输出的变化来更新w₇。我们可以用同样的方法来计算w₁的变化。
- en: '![Now that we''ve calculated how the first hidden neuron should change, we
    can calculate how we should update w₁ the same way we calculated how w₇ should
    be updated previously.](../Images/c2b5cd214a1f4ef6584b193972997a3c.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![现在我们已经计算了第一个隐藏神经元应该如何改变，我们可以像之前计算w₇应该如何更新一样计算我们应该如何更新w₁](../Images/c2b5cd214a1f4ef6584b193972997a3c.png)'
- en: Now that we’ve calculated how the first hidden neuron should change, we can
    calculate how we should update w₁ the same way we calculated how w₇ should be
    updated previously.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经计算了第一个隐藏神经元应该如何改变，我们可以像之前计算w₇应该如何更新一样计算我们应该如何更新w₁。
- en: It’s important to note, we’re not actually updating any of the weights or biases
    throughout this process. Rather, we’re taking a tally of how we should update
    each parameter, assuming no other parameters are updated.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，在整个过程中，我们实际上并没有更新任何权重或偏差。相反，我们正在记录我们应该如何更新每个参数，假设没有其他参数被更新。
- en: So, we can do those calculations to calculate all parameter changes.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以进行这些计算来计算所有参数的变化。
- en: '![By back propagating through the model, using a combination of values from
    the forward passes and desired changes from the backward pass at various points
    of the model, we can calculate how all parameters should change](../Images/da038d91396dc88c9f97ba2bbc710986.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![通过在模型的各个点使用前向传递的值和反向传递的期望变化值的组合来通过模型反向传播，我们可以计算所有参数应该如何改变](../Images/da038d91396dc88c9f97ba2bbc710986.png)'
- en: By back propagating through the model, using a combination of values from the
    forward passes and desired changes from the backward pass at various points of
    the model, we can calculate how all parameters should change
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在模型的各个点使用前向传递的值和反向传递的期望变化值的组合来通过模型反向传播，我们可以计算所有参数应该如何改变
- en: A fundamental idea of back propagation is called "Learning Rate", which concerns
    the size of the changes we make to neural networks based on a particular batch
    of data. To explain why this is important, I’d like to use an analogy.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播的一个基本思想被称为“学习率”，它关注的是我们根据特定批次的数据对神经网络所做的变化的大小。为了解释为什么这很重要，我想用一个类比来说明。
- en: Imagine you went outside one day, and everyone wearing a hat gave you a funny
    look. You probably don’t want to jump to the conclusion that `wearing hat = funny
    look` , but you might be a bit skeptical of people wearing hats. After three,
    four, five days, a month, or even a year, if it seems like the vast majority of
    people wearing hats are giving you a funny look, you may start considering that
    a strong trend.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 想象有一天你出去，看到戴帽子的每个人都给你一个滑稽的表情。你可能不想得出“戴帽子 = 滑稽表情”的结论，但你可能会对戴帽子的人有点怀疑。经过三天、四天、五天，一个月甚至一年，如果大多数戴帽子的人都给你一个滑稽的表情，你可能会开始考虑这是一个强烈的趋势。
- en: Similarly, when we train a neural network, we don’t want to completely change
    how the neural network thinks based on a single training example. Rather, we want
    each batch to only incrementally change how the model thinks. As we expose the
    model to many examples, we would hope that the model would learn important trends
    within the data.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，当我们训练一个神经网络时，我们不想根据单个训练示例完全改变神经网络的想法。相反，我们希望每个批次只逐步改变模型的想法。当我们向模型展示许多示例时，我们希望模型能够学习数据中的重要趋势。
- en: After we’ve calculated how each parameter should change as if it were the only
    parameter being updated, we can multiply all those changes by a small number,
    like `0.001` , before applying those changes to the parameters. This small number
    is commonly referred to as the "learning rate", and the exact value it should
    have is dependent on the model we’re training on. This effectively scales down
    our adjustments before applying them to the model.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们计算出每个参数应该如何变化，就像它是唯一被更新的参数一样之后，我们可以在应用这些变化到参数之前，将这些变化乘以一个很小的数，比如`0.001`。这个小的数通常被称为“学习率”，它应该有的确切值取决于我们正在训练的模型。这实际上在我们将调整应用到模型之前缩小了我们的调整幅度。
- en: At this point we covered pretty much everything one would need to know to implement
    a neural network. Let’s give it a shot!
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经涵盖了实现神经网络所需了解的几乎所有内容。让我们试一试！
- en: '![Join IAEE](../Images/2a9c3e57702ebb121facc3090149bca1.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![加入IAEE](../Images/2a9c3e57702ebb121facc3090149bca1.png)'
- en: '[Join IAEE](https://iaee.substack.com/)'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '[加入IAEE](https://iaee.substack.com/)'
- en: Implementing a Neural Network from Scratch
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从零开始实现神经网络
- en: Typically, a data scientist would just use a library like `PyTorch` to implement
    a neural network in a few lines of code, but we’ll be defining a neural network
    from the ground up using NumPy, a numerical computing library.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，数据科学家会使用像`PyTorch`这样的库，用几行代码实现神经网络，但我们将从零开始使用NumPy，一个数值计算库来定义神经网络。
- en: First, let’s start with a way to define the structure of the neural network.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们从定义神经网络结构的方法开始。
- en: '[PRE0]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![The weight and bias matrix defined in a sample neural network.](../Images/9ffccd4329a17429cf5e6c72e924dfd3.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![在样本神经网络中定义的权重和偏差矩阵。](../Images/9ffccd4329a17429cf5e6c72e924dfd3.png)'
- en: The weight and bias matrix defined in a sample neural network.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在样本神经网络中定义的权重和偏差矩阵。
- en: While we typically draw neural networks as a dense web in reality we represent
    the weights between their connections as matrices. This is convenient because
    matrix multiplication, then, is equivalent to passing data through a neural network.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们通常将神经网络绘制成一个密集的网络，但在现实中，我们用矩阵表示它们之间的权重。这是因为矩阵乘法相当于通过神经网络传递数据，这很方便。
- en: '![Thinking of a dense network as weighted connections on the left, and as matrix
    multiplication on the right. On the right hand side diagram, the vector on the
    left would be the input, the matrix in the center would be the weight matrix,
    and the vector on the right would be the output. Only a portion of values are
    included for readability. From my article on LoRA.](../Images/75720f485ea7fd7c65a4f4189540a461.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![将密集网络视为左边的加权连接，以及右边的矩阵乘法。在右侧的图中，左侧的向量是输入，中间的矩阵是权重矩阵，右侧的向量是输出。为了可读性，只包含了一部分值。来自我的关于LoRA的文章。](../Images/75720f485ea7fd7c65a4f4189540a461.png)'
- en: Thinking of a dense network as weighted connections on the left, and as matrix
    multiplication on the right. On the right hand side diagram, the vector on the
    left would be the input, the matrix in the center would be the weight matrix,
    and the vector on the right would be the output. Only a portion of values are
    included for readability. From my article on [LoRA](https://medium.com/towards-data-science/lora-intuitively-and-exhaustively-explained-e944a6bff46b).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 将密集网络视为左侧的加权连接，右侧的矩阵乘法。在右侧的图中，左侧的向量是输入，中间的矩阵是权重矩阵，右侧的向量是输出。为了可读性，只包含了一部分值。参见我关于[LoRA](https://medium.com/towards-data-science/lora-intuitively-and-exhaustively-explained-e944a6bff46b)的文章。
- en: We can make our model make a prediction based on some input by passing the input
    through each layer.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过将输入通过每一层来使我们的模型根据一些输入做出预测。
- en: '[PRE1]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![the result of passing our data through the model. Our model is randomly defined,
    so this isn''t a useful prediction, but it confirms that the model is working.](../Images/3c39943db60a63b269c8c7230a1068de.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![将我们的数据通过模型后的结果。我们的模型是随机定义的，所以这不是一个有用的预测，但它证实了模型正在工作。](../Images/3c39943db60a63b269c8c7230a1068de.png)'
- en: the result of passing our data through the model. Our model is randomly defined,
    so this isn’t a useful prediction, but it confirms that the model is working.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 将我们的数据通过模型后的结果。我们的模型是随机定义的，所以这不是一个有用的预测，但它证实了模型正在工作。
- en: 'We need to be able to train this model, and to do that we’ll first need a problem
    to train the model on. I defined a random function that takes in two inputs and
    results in an output:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要能够训练这个模型，为此我们首先需要一个用于训练模型的问题。我定义了一个随机函数，它接受两个输入并产生一个输出：
- en: '[PRE2]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![The modeling objective. Given two inputs (here plotted as x and y), the model
    needs to predict an output (here represented as color). This is a completely arbitrary
    function](../Images/b9316f70c57c4bdf98494d2cf8652852.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![建模目标。给定两个输入（在此图中表示为 x 和 y），模型需要预测一个输出（在此图中表示为颜色）。这是一个完全随机的函数](../Images/b9316f70c57c4bdf98494d2cf8652852.png)'
- en: The modeling objective. Given two inputs (here plotted as x and y), the model
    needs to predict an output (here represented as color). This is a completely arbitrary
    function
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 建模目标。给定两个输入（在此图中表示为 x 和 y），模型需要预测一个输出（在此图中表示为颜色）。这是一个完全随机的函数
- en: 'In the real world we wouldn’t know the underlying function. We can mimic that
    reality by creating a dataset consisting of random points:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，我们不会知道底层函数。我们可以通过创建一个由随机点组成的数据集来模拟这种现实：
- en: '[PRE3]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![This is the data we''ll be training on to try to learn our function.](../Images/f94c65405dcabc6f10af6dc89ff5fade.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![这是我们将在上面训练以尝试学习我们的函数的数据。](../Images/f94c65405dcabc6f10af6dc89ff5fade.png)'
- en: This is the data we’ll be training on to try to learn our function.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们将在上面训练以尝试学习我们的函数的数据。
- en: 'Recall that the back propagation algorithm updates parameters based on what
    happens in a forward pass. So, before we implement backpropagation itself, let’s
    keep track of a few important values in the forward pass: The inputs and outputs
    of each perceptron throughout the model.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，反向传播算法根据前向传递中发生的情况更新参数。因此，在我们实现反向传播本身之前，让我们记录前向传递中的一些重要值：模型中每个感知器的输入和输出。
- en: '[PRE4]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![The values throughout various layers of the model as a result of the forward
    pass. This will allow us to compute the necessary changes to update the model.](../Images/0c6253cfe7791acc0b448ae0050ef06a.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![前向传递后，模型各层的值。这将使我们能够计算更新模型所需的必要变化。](../Images/0c6253cfe7791acc0b448ae0050ef06a.png)'
- en: The values throughout various layers of the model as a result of the forward
    pass. This will allow us to compute the necessary changes to update the model.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 前向传递后，模型各层的值。这将使我们能够计算更新模型所需的必要变化。
- en: Now that we have a record stored of critical intermediary value within the network,
    we can use those values, along with the error of a model for a particular prediction,
    to calculate the changes we should make to the model.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经记录了网络中关键中间值，我们可以使用这些值，以及模型对特定预测的错误，来计算我们应该对模型做出的更改。
- en: '[PRE5]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/921846885bce99454c76eb63ea532fea.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/921846885bce99454c76eb63ea532fea.png)'
- en: This is probably the most complex implementation step, so I want to take a moment
    to dig through some of the details. The fundamental idea is exactly as we described
    in previous sections. We’re iterating over all layers, from back to front, and
    calculating what change to each weight and bias would result in a better output.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是最复杂的实现步骤，所以我想要花点时间深入探讨一些细节。基本思想与我们之前章节中描述的完全一样。我们正在从前向后迭代所有层，计算每个权重和偏差的变化，以产生更好的输出。
- en: '[PRE6]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Calculating the change to bias is pretty straight forward. If you look at how
    the output of a given neuron should have impacted all future neurons, you can
    add up all those values (which are both positive and negative) to get an idea
    of if the neuron should be biased in a positive or negative direction.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 计算偏差的变化相当直接。如果你看看一个给定神经元的输出应该如何影响所有未来的神经元，你可以将这些值（既有正数也有负数）加起来，以了解神经元应该向正方向还是负方向偏置。
- en: The way we calculate the change to weights, by using matrix multiplication,
    is a bit more mathematically complex.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过矩阵乘法计算权重变化的方式在数学上稍微复杂一些。
- en: '[PRE7]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Basically, this line says that the change in the weight should be equal to the
    value going into the perceptron, times how much the output should have changed.
    If a perceptron had a big input, the change to its outgoing weights should be
    a large magnitude, if the perceptron had a small input, the change to its outgoing
    weights will be small. Also, if a weight points towards an output which should
    change a lot, the weight should change a lot.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这一行表示权重的变化应该等于进入感知器的值，乘以输出应该变化的程度。如果一个感知器有大的输入，其输出的权重变化应该是一个大的幅度；如果一个感知器有小的输入，其输出的权重变化将很小。此外，如果一个权重指向应该有很大变化的输出，那么这个权重应该有很大的变化。
- en: There is another line we should discuss in our back propagation implement.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在反向传播实现中还应讨论另一行。
- en: '[PRE8]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In this particular network, there are activation functions throughout the network,
    following all but the final output. When we do back propagation, we need to back-propagate
    through these activation functions so that we can update the neurons which lie
    before them. We do this for all but the last layer, which doesn’t have an activation
    function, which is why `dZ = dA if i == len(self.weights) - 1` .
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定的网络中，除了最终的输出之外，整个网络中都有激活函数。当我们进行反向传播时，我们需要通过这些激活函数进行反向传播，以便我们可以更新它们之前的神经元。我们只对除了最后一层之外的所有层这样做，因为最后一层没有激活函数，这就是为什么
    `dZ = dA if i == len(self.weights) - 1` 的原因。
- en: In fancy math speak we would call this a derivative, but because I don’t want
    to get into calculus, I called the function `relu_as_weights` . Basically, we
    can treat each of our ReLU activations as something like a tiny neural network,
    who’s weight is a function of the input. If the input of the ReLU activation function
    is less than zero, then that’s like passing that input through a neural network
    with a weight of zero. If the input of ReLU is greater than zero, then that’s
    like passing the input through a neural netowork with a weight of one.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在复杂的数学术语中，我们会称之为导数，但因为我不想涉及微积分，所以我将这个函数称为 `relu_as_weights`。基本上，我们可以将我们的每个ReLU激活视为一个类似的小型神经网络，其权重是输入的函数。如果ReLU激活函数的输入小于零，那么就像通过一个权重为零的神经网络传递那个输入一样。如果ReLU的输入大于零，那么就像通过一个权重为之一的神经网络传递输入一样。
- en: '![Recall the ReLU activation function.](../Images/a9d9ac455ea155327202e815acdd7cd1.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![回忆ReLU激活函数。](../Images/a9d9ac455ea155327202e815acdd7cd1.png)'
- en: Recall the ReLU activation function.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 回忆ReLU激活函数。
- en: This is exactly what the `relu_as_weights` function does.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是 `relu_as_weights` 函数所做的事情。
- en: '[PRE9]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Using this logic we can treat back propagating through ReLU just like we back
    propagate through the rest of the neural network.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个逻辑，我们可以将ReLU的反向传播处理得就像我们在整个神经网络中的反向传播一样。
- en: Again, I’ll be covering this concept from a more robust mathematical prospective
    soon, but that’s the essential idea from a conceptual perspective.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我很快会从更稳健的数学角度来介绍这个概念，但这是从概念角度的基本想法。
- en: Now that we have the forward and backward pass implemented, we can implement
    training the model.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经实现了前向和反向传播，我们可以实现模型的训练。
- en: '[PRE10]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The `train` function:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: '`train` 函数：'
- en: iterates through all the data some number of times (defined by `epoch` )
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历所有数据若干次（由 `epoch` 定义）
- en: passes the data through a forward pass
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过前向传播传递数据
- en: calculates how the weights and biases should change
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算权重和偏差应该如何变化
- en: updates the weights and biases, by scaling their changes by the learning rate
    ( `lr` )
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过按学习率（`lr`）缩放它们的改变来更新权重和偏差
- en: And thus we’ve implemented a neural network! Let’s train it.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经实现了一个神经网络！让我们来训练它。
- en: Training and Evaluating the Neural Network.
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练和评估神经网络。
- en: Recall that we defined an arbitrary 2D function we wanted to learn how to emulate,
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们定义了一个任意的二维函数，我们想要学习如何模拟，
- en: '![](../Images/b9316f70c57c4bdf98494d2cf8652852.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9316f70c57c4bdf98494d2cf8652852.png)'
- en: and we sampled that space with some number of points, which we’re using to train
    the model.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用一些点采样了这个空间，这些点被用来训练模型。
- en: '![](../Images/8b37301cface7f59115f8a89bdd7ca5a.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8b37301cface7f59115f8a89bdd7ca5a.png)'
- en: Before feeding this data into our model, it’s vital that we first "normalize"
    the data. Certain values of the dataset are very small or very large, which can
    make training a neural network very difficult. Values within the neural network
    can quickly grow to absurdly large values, or diminish to zero, which can inhibit
    training. Normalization squashes all of our inputs, and our desired outputs, into
    a more reasonable range averaging around zero with a standardized distribution
    called a "normal" distribution.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在将此数据输入我们的模型之前，我们首先“归一化”数据至关重要。数据集的某些值非常小或非常大，这可能会使训练神经网络变得非常困难。神经网络中的值可以迅速增长到荒谬的大值，或者减少到零，这可能会阻碍训练。归一化将我们所有的输入和期望的输出压缩到一个更合理的范围，平均值为零，具有称为“正态”分布的标准分布。
- en: '[PRE11]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: If we want to get back predictions in the actual range of data from our original
    dataset, we can use these values to essentially "un-squash" the data.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要从原始数据集的实际数据范围内获取预测，我们可以使用这些值来基本上“解压”数据。
- en: Once we’ve done that, we can define and train our model.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们做到了这一点，我们就可以定义并训练我们的模型。
- en: '[PRE12]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![As can be seen, the value of loss is going down consistently, implying the
    model is improving.](../Images/915808199e10deb9c233bede3ae85901.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![如图所示，损失值持续下降，表明模型正在改进。](../Images/915808199e10deb9c233bede3ae85901.png)'
- en: As can be seen, the value of loss is going down consistently, implying the model
    is improving.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 如图所示，损失值持续下降，表明模型正在改进。
- en: Then we can visualize the output of the neural network’s prediction vs the actual
    function.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以可视化神经网络预测的输出与实际函数的输出。
- en: '[PRE13]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![](../Images/cea56751479f77468824dcb493ce34a7.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cea56751479f77468824dcb493ce34a7.png)'
- en: 'This did an ok job, but not as great as we might like. This is where a lot
    of data scientists spend their time, and there are a ton of approaches to making
    a neural network fit a certain problem better. Some obvious ones are:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这做得还不错，但并没有我们期望的那么好。这就是许多数据科学家花费大量时间的地方，有许多方法可以使神经网络更好地适应特定问题。一些明显的方法包括：
- en: use more data
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用更多数据
- en: play around with the learning rate
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试调整学习率
- en: train for more epochs
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行更多epoch的训练
- en: change the structure of the model
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改变模型的架构
- en: It’s pretty easy for us to crank up the amount of data we’re training on. Let’s
    see where that leads us. Here I’m sampling our dataset 10,000 times, which is
    10x more training samples than our previous dataset.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们来说，增加训练数据量非常容易。让我们看看这会带我们到哪。在这里，我正在对数据集进行10,000次采样，这比我们之前的数据集多10倍的训练样本。
- en: '![](../Images/9989a38181a23a3aefec2f3862deab95.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9989a38181a23a3aefec2f3862deab95.png)'
- en: And then I trained the model just like before, except this time it took a lot
    longer because each epoch now analyses 10,000 samples rather than 1,000.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我像之前一样训练了模型，但这次花费的时间更长，因为每个epoch现在分析的是10,000个样本，而不是1,000个。
- en: '[PRE14]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/b81c8f81dc488c91214e9c1c15e5f5c9.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b81c8f81dc488c91214e9c1c15e5f5c9.png)'
- en: I then rendered the output of this model, the same way I did before, but it
    didn’t really look like the output got much better.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我然后以同样的方式渲染了这个模型的输出，但输出并没有看起来有太大的改进。
- en: '![](../Images/0a50f30a3e70a12e17ba06dcbb88914a.png)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0a50f30a3e70a12e17ba06dcbb88914a.png)'
- en: Looking back at the loss output from training, it seems like the loss is still
    steadily declining. Maybe I just need to train for longer. Let’s try that.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾训练中的损失输出，损失似乎仍在稳步下降。也许我只需要训练更长的时间。让我们试试。
- en: '[PRE15]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '![](../Images/b50c79268c2413b0019b7e3daf69f343.png)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b50c79268c2413b0019b7e3daf69f343.png)'
- en: The results seem to be a bit better, but they aren’t’ amazing.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 结果似乎好一些，但并不令人惊叹。
- en: '![](../Images/00978844cefd54acc36926db50d038a2.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/00978844cefd54acc36926db50d038a2.png)'
- en: I’ll spare you the details. I ran this a few times, and I got some decent results,
    but never anything 1 to 1\. I’ll be covering some more advanced approaches data
    scientists use, like annealing and dropout, in future articles which will result
    in a more consistent and better output. Still, though, we made a neural network
    from scratch and trained it to do something, and it did a decent job! Pretty neat!
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会详细说明。我运行了这个程序几次，得到了一些不错的结果，但从未达到完全一致。在未来的文章中，我将介绍数据科学家使用的更多高级方法，如退火和dropout，这将导致更一致和更好的输出。尽管如此，我们还是从头开始构建了一个神经网络，并训练它做某件事，它做得相当不错！非常酷！
- en: Conclusion
  id: totrans-219
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article we avoided calculus like the plague while simultaneously forging
    an understanding of Neural Networks. We explored their theory, a little bit about
    the math, the idea of back propagation, and then implemented a neural network
    from scratch. We then applied a neural network to a toy problem, and explored
    some of the simple ideas data scientists employ to actually train neural networks
    to be good at things.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们像躲避瘟疫一样避开了微积分，同时锻造了对神经网络的理解。我们探讨了其理论，一点关于数学的内容，反向传播的概念，然后从头开始实现了一个神经网络。然后我们将神经网络应用于一个玩具问题，并探讨了数据科学家实际训练神经网络以擅长某些事情所采用的一些简单想法。
- en: In future articles we’ll explore a few more advanced approaches to Neural Networks,
    so stay tuned! For now, you might be interested in a more thorough analysis of
    Gradients, the fundamental math behind back propagation.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来的文章中，我们将探讨神经网络的一些更高级的方法，所以请保持关注！目前，你可能对梯度的更深入分析感兴趣，这是反向传播背后的基本数学。
- en: '[**What Are Gradients, and Why Do They Explode?**](https://towardsdatascience.com/what-are-gradients-and-why-do-they-explode-add23264d24b)'
  id: totrans-222
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**什么是梯度，为什么它们会爆炸？**](https://towardsdatascience.com/what-are-gradients-and-why-do-they-explode-add23264d24b)'
- en: You might also be interested in this article, which covers training a neural
    network using more conventional data science tools like PyTorch.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还对这篇文章感兴趣，它涵盖了使用更传统的数据科学工具如PyTorch训练神经网络的内容。
- en: '[**AI for the Absolute Novice – Intuitively and Exhaustively Explained**](https://towardsdatascience.com/ai-for-the-absolute-novice-intuitively-and-exhaustively-explained-7b353a31e6d7)'
