- en: Build and Deploy Your First Supply Chain App in 20 Minutes
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在20分钟内构建和部署你的第一个供应链应用程序
- en: 原文：[https://towardsdatascience.com/build-and-deploy-your-first-supply-chain-app-in-20-minutes/](https://towardsdatascience.com/build-and-deploy-your-first-supply-chain-app-in-20-minutes/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/build-and-deploy-your-first-supply-chain-app-in-20-minutes/](https://towardsdatascience.com/build-and-deploy-your-first-supply-chain-app-in-20-minutes/)
- en: <mdspan datatext="el1764703043459" class="mdspan-comment">In Supply Chain Management</mdspan>,
    it is easy to make an impact with your data science and analytics skills.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764703043459" class="mdspan-comment">在供应链管理中</mdspan>，利用你的数据科学和数据分析技能很容易产生影响。
- en: Even if data quality remains an issue most of the time, you can find opportunities
    to solve problems by **providing insights** to operational teams.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 即使数据质量在大多数时候仍然是一个问题，你仍然可以通过向运营团队提供**见解**来找到解决问题的机会。
- en: 'Operations Manager: “How many temporary workers should I recruit next to meet
    our workforce demand at the lowest cost?'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 运营经理：“我应该招聘多少临时工才能以最低的成本满足我们的劳动力需求？”
- en: When I was a Supply Chain Solution Manager in a logistics company, I learned
    data science by applying **mathematical principles** to solve **operational problems**
    in our warehouses.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我在一家物流公司的供应链解决方案经理时，我通过将**数学原理**应用于解决我们仓库中的**运营问题**来学习数据科学。
- en: '![](../Images/02038bb5f093fcb133908e7018b800c2.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/02038bb5f093fcb133908e7018b800c2.png)'
- en: Example of analytics solutions presented in previous articles of this blog –
    (Image by Samir Saci)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本博客先前文章中展示的分析解决方案示例 – (图片由Samir Saci提供)
- en: It was very archaic.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 它非常古老。
- en: I was running Python scripts or Jupyter notebooks on my machine and sharing
    the results with my colleagues.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的机器上运行Python脚本或Jupyter笔记本，并与我的同事分享结果。
- en: Until I discovered **Streamlit**, which let me effortlessly package my models
    into web applications that I could easily deploy.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 直到我发现**Streamlit**，它让我能够轻松地将我的模型打包成我可以轻松部署的Web应用程序。
- en: '![](../Images/0d17bb0ca70bc982827b6d4f1ae503ec.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0d17bb0ca70bc982827b6d4f1ae503ec.png)'
- en: Inventory Web Application that you will build in this tutorial – (Image by Samir
    Saci)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你将在本教程中构建的库存Web应用程序 – (图片由Samir Saci提供)
- en: This is crucial for any supply chain process engineer or data scientist to learn
    how to **productise analytics tools**.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于任何供应链流程工程师或数据科学家来说都是至关重要的，他们需要学习如何**产品化分析工具**。
- en: How to transform Python code into actionable insights?
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如何将Python代码转换为可操作的见解？
- en: In this article, I will show you how to **transform** a **simulation model**
    built in **Jupyter Notebook** into a fully functioning **web application.**
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向你展示如何**转换**在**Jupyter Notebook**中构建的**模拟模型**，将其转换为完全功能性的**Web应用程序**。
- en: This exercise was part of a tutorial series on my YouTube Channel, in which
    we use Python to learn **Inventory Management in Supply Chain.**
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习是我YouTube频道上的教程系列的一部分，我们使用Python来学习**供应链中的库存管理**。
- en: 'You will learn how I took a core module written in Python scripts to build
    **an interactive application** with which you can:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 你将学习我是如何将用Python脚本编写的核心模块转换为**一个交互式应用程序**，你可以用它来做以下事情：
- en: Simulate multiple inventory management rules
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟多个库存管理规则
- en: Test several scenarios with different delivery **lead times** (LD in days),
    **demand variability** (sigma in pieces) and **cycle time** (T in days)
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试不同交付**提前期**（LD以天为单位）、**需求变化**（sigma以件为单位）和**周期时间**（T以天为单位）的几个场景
- en: If you are not familiar with these concepts, you can still follow this tutorial,
    as **I will briefly introduce them** in the first section.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这些概念不熟悉，你仍然可以跟随这个教程，因为**我将在第一部分简要介绍它们**。
- en: Or **you can directly jump into the second section** that focuses only on the
    creation and deployment of the app.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 或者**你可以直接跳到第二部分**，该部分仅关注应用程序的创建和部署。
- en: '*Note: This is an introductory tutorial to help you build and deploy your first
    app. If you need more challenging exercises, have a look at the case studies shared
    in the conclusion.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：这是一个入门教程，旨在帮助你构建和部署你的第一个应用程序。如果你需要更具挑战性的练习，请查看结论中分享的案例研究。*'
- en: Inventory Management Simulation with Python
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Python的库存管理模拟
- en: What is inventory management?
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 库存管理是什么？
- en: Most retailers I’ve worked with in Asia and Europe manage store orders with
    **rule-based** methods built into their ERPs.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我在亚洲和欧洲合作的大多数零售商都使用嵌入在其ERP系统中的**基于规则的**方法来管理店铺订单。
- en: When do you need to replenish your stores to avoid stock-outs?
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你何时需要补充你的商店库存以避免缺货？
- en: These rules are usually implemented in an Enterprise Resource Planning (ERP)
    software that sends orders to a Warehouse Management System (WMS).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这些规则通常在企业管理资源计划（ERP）软件中实现，该软件向仓库管理系统（WMS）发送订单。
- en: '![](../Images/c5a80ff381ede079b3d0d51b1bac43a1.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c5a80ff381ede079b3d0d51b1bac43a1.png)'
- en: Store replenishment process in most of the large retail companies – (Image by
    Samir Saci)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数大型零售公司中的商店补充流程 – （图片由Samir Saci提供）
- en: The goal is to develop a policy that minimises ordering, holding and shortage
    costs.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是制定一项政策，以最小化订购、持有和短缺成本。
- en: '**Ordering Costs**: fixed cost to place an order'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**订购成本**：下订单的固定成本'
- en: '**Holding Costs: **variable costs required to keep your inventory(storage and
    capital costs)'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持有成本**：为保持库存所需的变动成本（存储和资本成本）'
- en: '**Shortage Costs:** the costs of not having enough inventory to meet the customer
    demand (Lost Sales, Penalty)'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**短缺成本**：因库存不足而无法满足客户需求（销售额损失、罚款）'
- en: We will act as data scientists in a retail company and assess the efficiency
    of the inventory team’s rules.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将扮演零售公司的数据科学家，评估库存团队规则的有效性。
- en: 'Logistics Director: “Samir, we need your support to understand why some stores
    face stockouts while other have too much inventory.”'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 物流总监：“Samir，我们需要你的支持来了解为什么一些商店面临缺货，而其他商店库存过多。”
- en: For that, we need a tool to simulate multiple scenarios and visualise the impact
    of key parameters on costs and stock availability.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们需要一个工具来模拟多个场景，并可视化关键参数对成本和库存可用性的影响。
- en: '![](../Images/d520320792b10eb290c5ab4cc73ccf0f.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d520320792b10eb290c5ab4cc73ccf0f.png)'
- en: 'Visual of the Inventory Policy (Red: Store Demand, Blue: Orders, Green: Inventory
    On Hand) – (Image by Samir Saci)'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 库存政策的可视化（红色：商店需求，蓝色：订单，绿色：现有库存） – （图片由Samir Saci提供）
- en: 'In the chart above, you have an example of a rule with:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的图表中，你有一个包含以下规则的示例：
- en: A uniform **demand distribution** (i.e σ = 0)
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 均匀的**需求分布**（即 σ = 0）
- en: '*Every day, your store will sell the same number of items.*'
  id: totrans-41
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*每天，您的商店将销售相同数量的商品。*'
- en: A periodic review policy with T = 10 days
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10天的定期审查政策
- en: '*You replenish the stores every 10 days.*'
  id: totrans-43
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*你每10天补充一次商店的库存。*'
- en: A delivery lead time of LD = 1 day.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提前期为LD = 1天的交货期。
- en: '*If you order today, you will receive the goods tomorrow.*'
  id: totrans-45
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*如果你今天下单，你将明天收到货物。*'
- en: As you can see in the green chart, your **inventory on-hand (IOH)** is always
    **positive** (i.e. you don’t experience stock-outs).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在绿色图表中看到的，您的**现有库存（IOH）**始终是**正值**（即您不会经历缺货）。
- en: What if you have a 3-day lead time?
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你有3天的提前期呢？
- en: What would be the impact of variability in the demand (σ > 0)?
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需求的可变性（σ > 0）会有什么影响？
- en: Can we reduce the average inventory on hand?
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们能否减少平均现有库存？
- en: To answer these questions, I developed a simulation model using Jupyter Notebook
    to generate visuals [in a complete tutorial.](https://youtu.be/1oRebt_Q0dY)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这些问题，我开发了一个使用Jupyter Notebook的模拟模型来生成可视化[在完整的教程中](https://youtu.be/1oRebt_Q0dY)。
- en: '![](../Images/cb9c9d14e46a3567c350fcf6856a23e2.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cb9c9d14e46a3567c350fcf6856a23e2.png)'
- en: '[Complete an end-to-end tutorial](https://youtu.be/1oRebt_Q0dY) during which
    I explain how I built this model – (Image by Samir Saci)'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '[完成端到端教程](https://youtu.be/1oRebt_Q0dY)，其中我解释了我是如何构建这个模型的 – （图片由Samir Saci提供）'
- en: In this article, I will briefly introduce the core functions I built in this
    tutorial and show how we will **reuse them in our Streamlit app.**
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将简要介绍我在本教程中构建的核心功能，并展示我们将如何在Streamlit应用程序中**重用它们**。
- en: '***Note:** I will keep explanations high-level to focus on the Streamlit app.
    For details, you can watch the full video later.*'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '***注意：**我将保持解释的高层次，以专注于Streamlit应用程序。对于详细信息，您可以稍后观看完整视频。*'
- en: Your Inventory Simulation Tool in a Jupyter Notebook
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您的库存模拟工具在Jupyter Notebook中
- en: The results of this tutorial will serve as the core foundation of our **Inventory
    Simulation Streamlit App**.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程的结果将作为我们**库存模拟Streamlit应用程序**的核心基础。
- en: The project structure is basic with two Python files (.py) and a **Jupyter Notebook**.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 项目结构很简单，包含两个Python文件（.py）和一个**Jupyter Notebook**。
- en: '[PRE0]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In `inventory_models.py`, you can find a Pydantic class that contains all the
    input parameters for our simulation.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `inventory_models.py` 中，您可以找到一个包含我们模拟所有输入参数的Pydantic类。
- en: '[PRE1]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: These operational parameters cover
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这些运营参数包括
- en: '**Demand Distribution**: the total demand `D` *(pcs)*, our simulation horizon
    `T_total` *(*pcs*)* and the variability σ *(*pcs*)*'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**需求分布**：总需求 `D` *(件)*，我们的模拟范围 `T_total` *(*件)* 和可变性 σ *(*件)*'
- en: '**Logistics Operations**: with the **delivery lead time** `LD` (in days)'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**物流操作**：具有**交货提前期** `LD`（以天为单位）'
- en: '**Inventory rule parameters**: including the cycle time `T`, order quantity
    `Q` and the initial inventory on hand `initial_ioh`'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**库存规则参数**：包括周期时间 `T`、订购数量 `Q` 和初始库存 `initial_ioh`'
- en: 'Based on these parameters, we want to simulate the impact on our distribution
    chain:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这些参数，我们想要模拟对我们分销链的影响：
- en: 'Demand distribution: how many units did we sell?'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需求分布：我们卖出了多少单位？
- en: 'Inventory On-Hand in green: how many units do we have in the store?'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 库存（绿色）：我们在商店有多少单位？
- en: 'Replenishment orders in blue: when and how much have we ordered?'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蓝色补货订单：我们何时以及订购了多少？
- en: '![](../Images/d520320792b10eb290c5ab4cc73ccf0f.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d520320792b10eb290c5ab4cc73ccf0f.png)'
- en: 'Inventory Simulation Visual: Demand (Red) / Orders (Blue) and Inventory On
    Hand (Green) – (Image by Samir Saci)'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 库存模拟可视化：需求（红色）/ 订单（蓝色）和库存（绿色） – (Image by Samir Saci)
- en: In the example above, you see a simulation of a periodic review policy with
    a 10-day cycle time.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的例子中，你看到的是一个 10 天周期时间的定期审查策略的模拟。
- en: How did I generate these visuals?
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我是如何生成这些视觉效果的？
- en: These functions are simulated using the class InventorySimulation created in
    `inventory_analysis.py`.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数是通过在 `inventory_analysis.py` 中创建的 `InventorySimulation` 类进行模拟的。
- en: '[PRE2]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'We start by initialising the input parameters for the functions:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先初始化函数的输入参数：
- en: '`order()` which represents a periodic ordering policy (you order Q units every
    T days)'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`order()` 代表周期性订购策略（你每 T 天订购 Q 单位）'
- en: '`simulation_1()` that calculates the impact of the demand (sales) and the ordering
    policy on the inventory on hand each day'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`simulation_1()` 计算需求（销售）和订购策略对每天库存的影响'
- en: '[PRE3]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The function `simulation_1()` includes a mechanism that updates **inventory
    on-hand** based on store demand (sales) and supply (replenishment orders).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `simulation_1()` 包含一个机制，根据商店需求（销售）和供应（补货订单）更新**库存**。
- en: My goal for this tutorial was to start with two basic rules to explain what
    happens when you introduce a lead time, as shown below.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我本教程的目标是从两个基本规则开始，解释当你引入提前期时会发生什么，如下所示。
- en: '![](../Images/7c13a14c4dbdfacdabc02ed2a537e42e.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7c13a14c4dbdfacdabc02ed2a537e42e.png)'
- en: Basic rules with a lead time of LD = 3 days – (Image by Samir Saci)
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 基本规则，提前期 LD = 3 天 – (Image by Samir Saci)
- en: Stores experience stock-outs, as shown in the green chart.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如绿色图表所示，商店经历了缺货情况。
- en: Their on-hand inventory becomes negative due to late deliveries.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 由于延迟交货，他们的库存出现负数。
- en: What can we do? Maybe increasing the order quantity Q?
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们能做什么？也许增加订购数量 Q？
- en: This is what I tried in the tutorial; we discovered that this solution does
    not work.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我教程中尝试的内容；我们发现这个解决方案不起作用。
- en: '![](../Images/880ea8d8fa0a4c6df52eb935d8db113a.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/880ea8d8fa0a4c6df52eb935d8db113a.png)'
- en: This is what happens when you want to increase Q to compensate for the additional
    leadtime – (Image by Samir Saci)
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想增加 Q 以补偿额外的提前期时，这就是会发生的情况 – (Image by Samir Saci)
- en: These two scenarios highlighted the need for an **improved ordering policy**
    that compensates for lead times.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个场景突出了需要一种**改进的订购策略**来补偿提前期。
- en: That is what we built in the second part of the tutorial with these two additional
    functions.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们教程的第二部分中添加这两个附加功能所构建的内容。
- en: '[PRE4]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The idea is quite simple.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法相当简单。
- en: In practice, that means inventory planners must create replenishment orders
    at day = T – LD to compensate for the lead time.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这意味着库存计划师必须在 `T - LD` 天创建补货订单以补偿提前期。
- en: '![](../Images/3aa691c6ded0d4baa3805088bd25aad0.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3aa691c6ded0d4baa3805088bd25aad0.png)'
- en: 4 days leadtime with the new ordering policy – (Image by Samir Saci)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 新订购策略的 4 天提前期 – (Image by Samir Saci)
- en: This ensures stores receive their goods on day = T as shown in the chart above.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这确保了商店在图表上显示的 `T` 天收到货物。
- en: At the end of this tutorial, we had a complete simulation tool that lets you
    test any scenario to become familiar with inventory management rules.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程结束时，我们有一个完整的模拟工具，让你测试任何场景以熟悉库存管理规则。
- en: 'If you need more clarification, you can find detailed explanations in [this
    step-by-step YouTube tutorial](https://youtu.be/1oRebt_Q0dY):'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要更多澄清，你可以在[这个逐步 YouTube 教程](https://youtu.be/1oRebt_Q0dY)中找到详细解释：
- en: However, I was not satisfied with the result.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我对结果并不满意。
- en: Why do we need to package this in a web application?
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为什么我们需要将这个功能包装成网络应用程序？
- en: Productising This Simulation Tool
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 产品化这个模拟工具
- en: As you can see in the video, I manually changed the parameters in the Jupyter
    notebook to test different scenarios.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在视频中看到的，我手动在 Jupyter 笔记本中更改参数以测试不同的场景。
- en: '![](../Images/1e83fd3dcb6f76032a854326dff7e166.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1e83fd3dcb6f76032a854326dff7e166.png)'
- en: Examples of scenarios we tested together in the tutorial – (Image by Samir Saci)
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在教程中一起测试的场景示例 – (图片由 Samir Saci 提供)
- en: This is somewhat normal for data scientists like us.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们这样的数据科学家来说，这很正常。
- en: But, would you imagine our Logistics Director opening a Jupyter Notebook in
    VS Code to test the different scenarios?
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但是，你能想象我们的物流总监在 VS Code 中打开 Jupyter Notebook 来测试不同的场景吗？
- en: We need to productise this tool so anyone can access it without requiring programming
    or data science skills.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要将这个工具产品化，以便任何人都可以访问它，而无需编程或数据科学技能。
- en: Good news, 70% of the job is done as we have the core modules.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息，70% 的工作已经完成，因为我们已经有了核心模块。
- en: In the next section, I will explain how we can package this in a user-friendly
    analytics product.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我将解释我们如何将其打包成一个用户友好的分析产品。
- en: Create your Inventory Simulation App using Streamlit
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Streamlit 创建您的库存模拟应用
- en: In this section, we will create a single-page Streamlit App based on the core
    module from the first tutorial.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将基于第一教程中的核心模块创建一个单页 Streamlit 应用。
- en: You can start by [cloning this repository](https://github.com/samirsaci/inventory-streamlit-app-starter/tree/main)
    that contains the core simulation, including `inventory_models.py` and `inventory_analysis.py`.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从克隆这个包含核心模拟的存储库开始，包括 `inventory_models.py` 和 `inventory_analysis.py`：[克隆此存储库](https://github.com/samirsaci/inventory-streamlit-app-starter/tree/main)。
- en: '![](../Images/74be467c3d84dd8ff9d8bef7a745e24a.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/74be467c3d84dd8ff9d8bef7a745e24a.png)'
- en: Github Repository Streamlit App Starter – (Image by Samir Saci)
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Github 存储库 Streamlit 应用启动器 – (图片由 Samir Saci 提供)
- en: 'With this repository on your local machine, you can follow the tutorial and
    end up with a deployed app like this one:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的本地机器上拥有这个存储库后，您可以按照教程操作，最终得到一个像这样的部署应用：
- en: '![](../Images/0d17bb0ca70bc982827b6d4f1ae503ec.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0d17bb0ca70bc982827b6d4f1ae503ec.png)'
- en: 'Inventory Web Application that you will build: [Access it here](https://supplyscience-inventory.streamlit.app)
    – (Image by Samir Saci)'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 您将构建的库存网络应用：[在此访问](https://supplyscience-inventory.streamlit.app) – (图片由 Samir
    Saci 提供)
- en: Let’s start!
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Project Setup
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 项目设置
- en: The first step is to create a local Python environment for the project.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是为项目创建一个本地 Python 环境。
- en: 'For that, I advise you to use the package manager uv:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我建议您使用包管理器 uv：
- en: '[PRE5]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'It will install the libraries listed in the requirements file:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 它将安装需求文件中列出的库：
- en: '[PRE6]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We include Streamlit, Pydantic, and libraries for data manipulation (numpy,
    pandas) and for generating visuals (matplotlib).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我们包括 Streamlit、Pydantic 以及用于数据处理（numpy、pandas）和生成视觉（matplotlib）的库。
- en: Now you are ready to build your app.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您已经准备好构建您的应用。
- en: Create your Streamlit Page
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建您的 Streamlit 页面
- en: 'Create a Python file that you call: `app.py`'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为：`app.py` 的 Python 文件
- en: '[PRE7]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'In this file, we start by:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在此文件中，我们首先：
- en: Importing the libraries installed and the analysis module with its Pydantic
    class for the input parameters
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入已安装的库和分析模块及其 Pydantic 类（用于输入参数）
- en: Defining a seed for random distribution generation that will be used to generate
    a variable demand
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义用于生成随机分布的种子，该种子将用于生成变量需求
- en: 'Then we start to create the page with st.set_page_config(), in which we include
    as parameters:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们开始使用 st.set_page_config() 创建页面，其中我们包括以下参数：
- en: '`page_title`: the title of the web page of your app'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`page_title`：您应用的网页标题'
- en: '`layout`: an option to set the layout of the page'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`layout`：设置页面布局的选项'
- en: '![](../Images/da933becf9fea2ee38fb8e6ce00b41da.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/da933becf9fea2ee38fb8e6ce00b41da.png)'
- en: Your App with different layouts (Wide on the right) – (Image by Samir Saci)
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 您的应用具有不同的布局（右侧为宽版） – (图片由 Samir Saci 提供)
- en: By setting the parameter layout to “wide”, we ensure the page is wide by default.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将参数布局设置为“wide”，我们确保页面默认为宽版。
- en: You can run your app now,
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以运行您的应用，
- en: '[PRE8]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'After running this command, your app can be opened using the local URL shared
    in your terminal:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此命令后，您可以使用终端中共享的本地 URL 打开您的应用：
- en: '![](../Images/acbed8dee79337e3f70cde03f7764c67.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/acbed8dee79337e3f70cde03f7764c67.png)'
- en: Local URL to reach your app
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 本地 URL 以访问您的应用
- en: 'After loading, what you have is this blank page:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 加载后，您将得到这个空白页面：
- en: '![](../Images/c31c09d615abed9f3037e9a534349a0b.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c31c09d615abed9f3037e9a534349a0b.png)'
- en: Initial Blank Page – (Image by Samir Saci)
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 初始空白页面 – (图片由 Samir Saci 提供)
- en: Congratulations, you have run your app!
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜，您已经运行了您的应用！
- en: 'If you face any issues at this stage, please check that:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在这个阶段遇到任何问题，请检查以下内容：
- en: The local Python environment is set up properly
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本地 Python 环境已正确设置
- en: You have installed all the libraries inside the requirements file
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您已经在 requirements 文件中安装了所有库。
- en: Now we can start building our **Inventory Management App**.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以开始构建我们的**库存管理应用**了。
- en: A Sidebar with Inventory Management Parameters
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有库存管理参数的侧边栏
- en: Do you remember the Pydantic class we have defined in `inventory_models.py`?
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 您还记得我们在 `inventory_models.py` 中定义的 Pydantic 类吗？
- en: They will serve as our input parameters for the app, and we will display them
    in a Streamlit sidebar.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 它们将作为我们应用程序的输入参数，我们将在 Streamlit 侧边栏中显示它们。
- en: '[PRE9]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'In this sidebar, we include:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个侧边栏中，我们包括：
- en: A title using `st.markdown()`
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `st.markdown()` 创建的标题。
- en: Number Input fields for all the parameters with their minimum, default, and
    incremental step values
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有参数的数字输入字段，包括它们的最低值、默认值和增量步长值
- en: A radio button to select the ordering method (considering or not lead time)
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个用于选择排序方法（考虑或不考虑提前期）的单选按钮。
- en: A button to start the first simulation
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个用于启动第一个模拟的按钮
- en: '![](../Images/5b093c37de163909bb2fb00bd7b7c468.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5b093c37de163909bb2fb00bd7b7c468.png)'
- en: Examples of Number Input Field (left) / Radio Button (Middle) and Streamlit
    Button (Right) – Image by Samir Saci)
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 数字输入字段（左侧）/ 单选按钮（中间）和 Streamlit 按钮的示例（右侧）—— 图片由 Samir Saci 提供）
- en: 'Before this block, we should add a session state variable:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个块之前，我们应该添加一个会话状态变量：
- en: '[PRE10]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This boolean indicates whether the user has already clicked the simulation button.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这个布尔值表示用户是否已经点击了模拟按钮。
- en: If that’s the case, the app will automatically rerun all calculations whenever
    the user changes a parameter.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样，当用户更改参数时，应用程序将自动重新运行所有计算。
- en: 'Great, now you `app.py` should look like this:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，现在您的 `app.py` 应该看起来像这样：
- en: '[PRE11]'
  id: totrans-168
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'You can have a look at your app, normally the window should look like this
    after a refresh:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以查看您的应用程序，通常在刷新后窗口应该看起来像这样：
- en: '![](../Images/c884615e79ba4c2aaea7991d60d904d8.png)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c884615e79ba4c2aaea7991d60d904d8.png)'
- en: Your app is starting to look like something we can use – (Image by Samir Saci)
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 您的应用程序开始看起来像我们可以使用的东西了——（图片由 Samir Saci 提供）
- en: On the left, you have your sidebar that we just created.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧，您有我们刚刚创建的侧边栏。
- en: '![](../Images/20e0c9032d6e1a1045e573432c045404.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/20e0c9032d6e1a1045e573432c045404.png)'
- en: Title of the page with six cards reminding the parameters selected – (Image
    by Samir Saci)
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 页面标题带有六个卡片，提醒所选参数——（图片由 Samir Saci 提供）
- en: Then, for aesthetics and user experience, I want to add a title and a reminder
    of the parameters used.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，为了美观和用户体验，我想添加一个标题和已使用参数的提醒。
- en: Why do I want to remind the parameters used?
  id: totrans-176
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为什么我要提醒使用的参数？
- en: On the top-left side of the window, you have a button to hide the side panel,
    as shown below.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在窗口的左上角，您有一个按钮可以隐藏侧面板，如下所示。
- en: '![](../Images/37115e4e033c21cc97c67a76caabdfb5.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/37115e4e033c21cc97c67a76caabdfb5.png)'
- en: Our streamlit app with the side panel hidden – (Image by Samir Saci)
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我们隐藏侧面板的 streamlit 应用程序——（图片由 Samir Saci 提供）
- en: This helps users to have more space to show the visual.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于用户有更多空间来展示视觉内容。
- en: However, the input parameters will be hidden.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，输入参数将被隐藏。
- en: Therefore, we need to add a reminder at the top.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要在顶部添加一个提醒。
- en: '[PRE12]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'In the piece of code above, I have introduced :'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码片段中，我介绍了：
- en: CSS styling embedded in Streamlit to create cards
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 嵌入 Streamlit 的 CSS 样式以创建卡片。
- en: The function quick_card will create a card for each parameter using its `label`,
    `value` and `units`
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`quick_card` 函数将使用其 `label`、`value` 和 `units` 为每个参数创建一个卡片。'
- en: '![](../Images/b3808291c674e6eebfa334d27a6f60da.png)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b3808291c674e6eebfa334d27a6f60da.png)'
- en: Here are the cards with the labels, values and units – (Image by Samir Saci)
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是带有标签、值和单位的卡片——（图片由 Samir Saci 提供）
- en: Then we can generate these cards in the same row using the streamlit object
    `st.columns()`.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以使用 streamlit 对象 `st.columns()` 在同一行生成这些卡片。
- en: '[PRE13]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The first line defines the six columns in which we place the cards using the
    quick_card function.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 第一行定义了使用 quick_card 函数放置卡片的六个列。
- en: '![](../Images/a9e6d36befcd941486efcb5f1109042b.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a9e6d36befcd941486efcb5f1109042b.png)'
- en: Your app should look like this now – (Image by Samir Saci)
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 您的应用程序现在应该看起来像这样——（图片由 Samir Saci 提供）
- en: 'We can move on to the interesting part: integrating the simulation tool into
    the app.'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以继续到有趣的部分：将模拟工具集成到应用程序中。
- en: Any question or blocking at this step? You can use the comment section of the
    video, I’ll try my best to answer promptly.
  id: totrans-195
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在这个步骤中遇到任何问题或阻碍吗？您可以在视频的评论区使用，我会尽力尽快回答。
- en: Integrating the inventory simulation module in the Streamlit App
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将库存模拟模块集成到 Streamlit 应用程序中
- en: We can now start working on the main page.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以开始工作在主页面上了。
- en: Let us imagine that our Logistics Director arrives on the page, selects the
    different parameters and clicks on **“Run Simulation”**.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一下，我们的物流总监来到这个页面，选择不同的参数，然后点击**“运行模拟”**。
- en: 'This should trigger the simulation module:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 这应该会触发模拟模块：
- en: '[PRE14]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'In this short piece of code, we do many things:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在这段简短的代码中，我们做了很多事情：
- en: We build the input parameter object using the Pydantic class from `inventory_models.py`
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们使用`inventory_models.py`中的Pydantic类构建输入参数对象
- en: '*This ensures every value (demand, lead time, review period, sigma…) has the
    correct data type before running the simulation.*'
  id: totrans-203
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*这确保在运行模拟之前，每个值（需求、提前期、审查期、sigma...）都有正确的数据类型。*'
- en: We create the simulation engine `InventorySimulation` class from `inventory_analysis.py`
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们从`inventory_analysis.py`创建模拟引擎`InventorySimulation`类
- en: '*This class contains all the inventory logic I developed in the first tutorial.*'
  id: totrans-205
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*这个类包含我在第一个教程中开发的全部库存逻辑。*'
- en: Nothing will change on the user interface.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 用户界面不会有任何变化。
- en: We can now start to define the computation part.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以开始定义计算部分。
- en: '[PRE15]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: First, we select the correct ordering method.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们选择正确的排序方法。
- en: 'Depending on the ordering rule chosen in the radio button of the sidebar, we
    call the appropriate simulation method:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 根据侧边栏单选按钮中选择的排序规则，我们调用适当的模拟方法：
- en: '**method=”order”**: is the initial method that I showed you, which failed to
    keep a stable inventory when I added a lead time'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**method="order"**：是我最初向你展示的方法，我在添加提前期时未能保持库存的稳定性'
- en: '**method=”order_leadtime”**: is the improved method that orders at day = T
    – LD'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**method="order_leadtime"**：是改进的方法，在T - LD天进行排序'
- en: '![](../Images/af2a82c9237858bb90302b9911477e17.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/af2a82c9237858bb90302b9911477e17.png)'
- en: Inventory On Hand with negative values on top (Simple Ordering) vs. Lead-time
    ordering – (Image by Samir Saci)
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 库存在手，负值在顶部（简单排序）与提前期排序 – （图片由Samir Saci提供）
- en: The results, stored in the pandas dataframe, `df` are used to compute key indicators
    such as the number of **stockouts** and the **minimum** and **maximum inventory
    levels**.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 存储在pandas数据框`df`中的结果用于计算关键指标，如**缺货**数量以及**最小**和**最大库存水平**。
- en: Now that we have simulation results available, let’s create our visuals.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了模拟结果，让我们创建我们的可视化。
- en: Create Inventory Simulation Visuals on Streamlit
  id: totrans-217
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在Streamlit上创建库存模拟可视化
- en: If you followed the video version of this tutorial, you probably noticed that
    I copied and pasted the code from the notebook created in the first tutorial.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你跟随了本教程的视频版本，你可能已经注意到我复制并粘贴了来自第一个教程中创建的笔记本中的代码。
- en: '[PRE16]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Indeed, the same visual code that you use to prototype in your Notebooks will
    work in your app.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，你用于在笔记本中原型设计的相同视觉代码也可以在你的应用中使用。
- en: 'The only difference is that instead of using `plt.show()`, you conclude the
    section with:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的区别是，你不需要使用`plt.show()`，而是在这一节结束时使用：
- en: '[PRE17]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Streamlit needs to explicitly control of the rendering using
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit需要显式控制渲染，使用
- en: '**`fig`** which is the Matplotlib figure you created earlier.'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`fig`**，这是你之前创建的Matplotlib图形。'
- en: '**`clear_figure=True`** which is a parameter to clear the figure from memory
    after rendering to avoid duplicated plots when parameters are updated.'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`clear_figure=True`**，这是一个参数，在渲染后从内存中清除图形，以避免在参数更新时出现重复的图表。'
- en: '**`use_container_width=True`** to make the chart automatically resize to the
    width of the Streamlit page'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`use_container_width=True`** 使图表自动调整到Streamlit页面的宽度'
- en: 'At this stage, normally you have this on your app:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，通常你的应用中会有以下内容：
- en: '![](../Images/96cbba8085b51a391bbdbc3eee5c704c.png)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/96cbba8085b51a391bbdbc3eee5c704c.png)'
- en: Screen of your app with the visual generated – (Image by Samir Saci)
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的屏幕截图，显示生成的可视化 – （图片由Samir Saci提供）
- en: If you try to change any parameter, for example, change the ordering method,
    you will see the visual automatically updated.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你尝试更改任何参数，例如，更改排序方法，你会看到视觉自动更新。
- en: What is remaining?
  id: totrans-231
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 还剩下什么？
- en: As a bonus, I added a section to help you discover additional functionalities
    of streamlit.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外的好处，我添加了一个部分来帮助你发现Streamlit的额外功能。
- en: '[PRE18]'
  id: totrans-233
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'In addition to the columns that we already defined in the previous section,
    we have:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 除了我们在上一节中定义的列之外，我们还有：
- en: '`metric()` that generates a clean and built-in Streamlit card'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`metric()` 生成一个干净且内置的Streamlit卡片'
- en: '*Unlike my custom card, you don’t need CSS here.*'
  id: totrans-236
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*与我的自定义卡片不同，这里不需要CSS。*'
- en: '`st.success()` to display a green success banner to notify the user that the
    results have been updated.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`st.success()` 显示一个绿色的成功横幅，通知用户结果已更新。'
- en: '![](../Images/1629ee39f4353d31a5a14b5840ce0891.png)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1629ee39f4353d31a5a14b5840ce0891.png)'
- en: Metric cards and the success message – (Image by Samir Saci)
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 指标卡和成功信息 – (图片由 Samir Saci 提供)
- en: This is the cherry on the cake that we needed to conclude this app.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们需要的蛋糕上的樱桃，用于结束此应用。
- en: You now have a complete app that automatically generates visuals and easily
    tests scenarios, working on your machine.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在拥有了一个完整的应用，该应用可以自动生成可视化效果，并轻松测试场景，在您的机器上运行。
- en: What about our Logistics Director? How he can use it?
  id: totrans-242
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们的物流总监怎么办？他如何使用它？
- en: Let me show you how to deploy it for free on **Streamlit Community Cloud** easily.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 让我向您展示如何轻松地在 **Streamlit 社区云** 上免费部署它。
- en: Deploy your App on Streamlit Community
  id: totrans-244
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 Streamlit 社区部署您的应用
- en: 'You first need to push your code to your GitHub, as I did here: [GitHub Repository](https://github.com/samirsaci/inventory-streamlit-app/tree/main).'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 您首先需要将您的代码推送到您的 GitHub，就像我这里所做的那样：[GitHub 仓库](https://github.com/samirsaci/inventory-streamlit-app/tree/main)。
- en: Then you go to the top right of your app, and you click on `Deploy`.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 然后您转到应用的右上角，并点击“部署”。
- en: '[![](../Images/839b464a30eafb64343170751a8c311a.png)](Deploy your app window
    - (Image by Samir Saci))'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/839b464a30eafb64343170751a8c311a.png)(部署应用窗口 - 图片由 Samir Saci
    提供)'
- en: Deploy your app window – (Image by Samir Saci)
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 部署应用窗口 – (图片由 Samir Saci 提供)
- en: Then click Deploy now, and follow the steps to provide access to your GitHub
    account (Streamlit will automatically detect that you have pushed your code to
    GitHub).
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 那么现在点击部署，并按照步骤提供对您的 GitHub 账户的访问权限（Streamlit 将自动检测您已将代码推送到 GitHub）。
- en: '![](../Images/5084a0ea600c0db1a89a0d06708e93c1.png)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5084a0ea600c0db1a89a0d06708e93c1.png)'
- en: Provide the App URL – (Image by Samir Saci)
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 提供应用 URL – (图片由 Samir Saci 提供)
- en: 'You can create a custom URL: mine is [supplyscience](https://supplyscience.streamlit.app).'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以创建一个自定义 URL：我的网址是 [supplyscience](https://supplyscience.streamlit.app)。
- en: After clicking on Deploy, Streamlit will redirect you to your deployed app!
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 点击部署后，Streamlit 将将您重定向到您的已部署应用！
- en: Congratulations, you have deployed your first Supply Chain Analytics Streamlit
    App!
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜您，您已成功部署了您的第一个供应链分析 Streamlit 应用！
- en: Any question? Feel free to [check the complete tutorial](https://www.youtube.com/watch?v=FC8nULkvHcQ).
  id: totrans-255
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有任何问题？请随意 [查看完整教程](https://www.youtube.com/watch?v=FC8nULkvHcQ)。
- en: Feel free to use the comment to ask your questions or share what you deployed
    on Streamlit.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎使用评论来提问或分享您在 Streamlit 上部署的内容。
- en: Conclusion
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I designed this tutorial for the version of myself from 2018.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 我为 2018 年的我设计了这篇教程。
- en: Back then, I knew enough Python and analytics to build optimisation and simulation
    tools for my colleagues, but I did not yet know how to turn them into real products.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 那时候，我足够了解 Python 和分析，可以为我的同事构建优化和模拟工具，但我还不知道如何将它们转化为真实的产品。
- en: This tutorial is the first step in your journey toward industrialising analytics
    solutions.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程是您迈向工业级分析解决方案的第一步。
- en: What you built here is probably not production-ready, but it is a functional
    app that you can share with our Logistics Director.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 您在这里构建的可能是非生产就绪的，但它是一个功能性的应用，您可以与我们的物流总监分享。
- en: Do you need inspiration for other applications?
  id: totrans-262
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 您需要其他应用的灵感吗？
- en: How to Complete this App?
  id: totrans-263
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何完成此应用？
- en: Now that you have the playbook for deploying Supply Chain Analytics apps, you
    probably want to improve the app by adding more models.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您有了部署供应链分析应用的剧本，您可能想通过添加更多模型来改进应用。
- en: I have a suggestion for you.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一些建议给您。
- en: You can follow this step-by-step tutorial to implement [Product Segmentation
    with Pareto Analysis and ABC Chart](https://youtu.be/Qglr9Yqa44I).
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以按照这个逐步教程来实现 [使用帕累托分析和 ABC 图进行产品细分](https://youtu.be/Qglr9Yqa44I)。
- en: You will learn how to deploy strategic visuals like the ABC XYZ that help retail
    companies manage their inventory.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 您将学习如何部署像 ABC XYZ 这样的战略可视化，帮助零售公司管理他们的库存。
- en: '![](../Images/4d20149acaee1e505c1cd450eeb1a6b5.png)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d20149acaee1e505c1cd450eeb1a6b5.png)'
- en: ABC Chart with Analysis of the Demand Variability – (Image by Samir Saci)
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 带有需求可变性分析的 ABC 图 – (图片由 Samir Saci 提供)
- en: This can be easily implemented on the second page of the app that you just deployed.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以轻松地实现您刚刚部署的应用的第二页。
- en: If needed, I can work on another article focusing on this solution!
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要，我可以撰写另一篇文章，专注于这个解决方案！
- en: Tired of inventory management?
  id: totrans-272
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对库存管理感到厌倦了吗？
