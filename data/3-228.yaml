- en: Talking about Games
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 讨论博弈
- en: 原文：[https://towardsdatascience.com/talking-about-games/](https://towardsdatascience.com/talking-about-games/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/talking-about-games/](https://towardsdatascience.com/talking-about-games/)
- en: Game theory is a field of research that is quite prominent in economics but
    rather unpopular in other scientific disciplines. However, the concepts used in
    game theory can be of interest to a wider audience, including data scientists,
    statisticians, computer scientists or psychologists, to name just a few. This
    article is the opener to a four-chapter tutorial series on the fundamentals of
    game theory, so stay tuned for the upcoming articles.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 博弈论是一个在经济学中相当突出但在其他科学学科中并不受欢迎的研究领域。然而，博弈论中使用的概念可能对更广泛的受众感兴趣，包括数据科学家、统计学家、计算机科学家或心理学家，仅举几个例子。本文是关于博弈论基础的四章教程系列的序言，所以请关注即将到来的文章。
- en: In this article, I will explain the kinds of problems game theory deals with
    and introduce the main terms and concepts used to describe a game. We will see
    some examples of games that are typically analysed within game theory and lay
    the foundation for deeper insights into the capabilities of game theory in the
    later chapters. But before we go into the details, I want to introduce you to
    some applications of game theory, that show the multitude of areas game-theoretic
    concepts can be applied to.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将解释博弈论处理的问题类型，并介绍用于描述博弈的主要术语和概念。我们将看到一些在博弈论中通常分析的博弈示例，并为后续章节中对博弈论能力的更深入洞察奠定基础。但在我们深入细节之前，我想向您介绍一些博弈论的应用，这些应用展示了博弈论概念可以应用于众多领域。
- en: '**Applications of game theory**'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**博弈论的应用**'
- en: '![](../Images/3bec2e5e7c7f89016593a6b82478db83.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3bec2e5e7c7f89016593a6b82478db83.png)'
- en: Even french fries can be an application of game theory. Photo by [engin akyurt](https://unsplash.com/@enginakyurt)
    on [Unsplash](https://unsplash.com)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是薯条也可以是博弈论的应用。照片由 [engin akyurt](https://unsplash.com/@enginakyurt) 在 [Unsplash](https://unsplash.com)
    提供
- en: Does it make sense to vote for a small party in an election if this party may
    not have a chance to win anyway? Is it worth starting a price war with your competitor
    who offers the same goods as you? Do you gain anything if you reduce your catch
    rate of overfished areas if your competitors simply carry on as before? Should
    you take out insurance if you believe that the government will pay for the reconstruction
    after the next hurricane anyway? And how should you behave in the next auction
    where you are about to bid on your favourite Picasso painting?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在选举中为一个小党派投票是否有意义，如果这个党派无论如何都没有机会获胜？与提供相同商品的你竞争的对手开始价格战是否值得？如果你减少过度捕捞区域的捕捞率，而你的竞争对手仍然像以前一样继续捕捞，你有什么收获吗？如果你认为政府会在下一次飓风后支付重建费用，那么你应该购买保险吗？你应该如何在即将拍卖你最喜欢的毕加索画作的情况下表现？
- en: All these questions (and many more) live within the area of applications that
    can be modelled with game theory. Whenever a situation includes strategic decisions
    in interaction with others, game-theoretic concepts can be applied to describe
    this situation formally and search for decisions that are not made intuitively
    but that are backed by a notion of rationality. Key to all the situations above
    is that your decisions depend on other people’s behaviour. If everybody agrees
    to conserve the overfished areas, you want to play along to preserve nature, but
    if you think that everybody else will continue fishing, why should you be the
    only one to stop? Likewise, your voting behaviour in an election might heavily
    depend on your assumptions about other people’s votes. If nobody votes for that
    candidate, your vote will be wasted, but if everybody thinks so, the candidate
    doesn’t have a chance at all. Maybe there are many people who say “I would vote
    for him if others vote for him too”.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些问题（以及更多）都存在于可以用博弈论建模的应用领域。每当一个情况包括与其他人的互动中的战略决策时，博弈论概念就可以应用于正式描述这种情况并寻找不是基于直觉而是基于理性观念的决策。所有上述情况的关键在于你的决策取决于他人的行为。如果每个人都同意保护过度捕捞区域，你想要参与以保护自然，但如果你认为其他人会继续捕鱼，为什么你应该成为唯一一个停止的人？同样，你的选举投票行为可能严重依赖于你对他人投票的假设。如果没有人投票给那个候选人，你的投票将浪费，但如果每个人都这样认为，候选人根本就没有机会。也许有很多人会说“如果其他人也投票给他，我会投票给他”。
- en: Similar situations can happen in very different situations. Have you ever thought
    about having food delivered and everybody said “You don’t have to order anything
    because of me, but if you order anyway, I’d take some french fries”? All these
    examples can be applications of game theory, so let’s start understanding what
    game theory is all about.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的情况可能发生在非常不同的情境中。你有没有想过，当你想要叫外卖时，每个人都这么说：“你不用因为我而点任何东西，但如果你还是要点，我可以来点薯条”？所有这些例子都可以是博弈论的应用，所以让我们开始了解博弈论究竟是什么。
- en: Understanding the game
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解游戏
- en: '![](../Images/1da882905f4b11b98d141843c16d8c54.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1da882905f4b11b98d141843c16d8c54.png)'
- en: Before playing, you need to understand the components of the game. Photo by
    [Laine Cooper](https://unsplash.com/@laine23) on [Unsplash](https://unsplash.com)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始玩之前，你需要了解游戏的组成部分。照片由 [Laine Cooper](https://unsplash.com/@laine23) 在 [Unsplash](https://unsplash.com)
    提供
- en: 'When you hear the word *game*, you might think of *video games* such as Minecraft,
    *board games* such as Monopoly, or *card games* such as poker. There are some
    common principles to all these games: We always have some *players* who are allowed
    to do certain things determined by the game’s *rules*. For example, in poker,
    you can raise, check or give up. In Monopoly, you can buy a property you land
    on or don’t buy it. What we also have is some notion of how to *win* the game.
    In poker, you have to get the best hand to win and in Monopoly, you have to be
    the last person standing after everybody went bankrupt. That also means that some
    actions are better than others in some scenarios. If you have two aces on the
    hand, staying in the game is better than giving up.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当你听到“游戏”这个词时，你可能会想到像 Minecraft 这样的**视频游戏**，像大富翁这样的**桌面游戏**，或者像扑克这样的**卡牌游戏**。所有这些游戏都有一些共同的原则：我们总是有一些**玩家**被允许做游戏规则确定的事情。例如，在扑克中，你可以加注、检查或放弃。在大富翁中，你可以购买你到达的财产或者不购买。我们还必须有关于如何**赢得**游戏的概念。在扑克中，你必须得到最好的牌才能赢，在大富翁中，你必须是在所有人破产之后最后一个站着的人。这也意味着在某些情况下，某些行动比其他行动更好。如果你手里有两张
    A，留在游戏中比放弃更好。
- en: When we look at games from the perspective of game theory, we use the same concepts,
    just more formally.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们从博弈论的角度看待游戏时，我们使用相同的概念，只是更加正式。
- en: '![](../Images/0317941daa6e9ed806fa25970c64d710.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0317941daa6e9ed806fa25970c64d710.png)'
- en: A game in game theory consists of n players, where each player has a strategy
    set and a utility function.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 博弈论中的博弈由 n 个玩家组成，其中每个玩家都有一个策略集和一个效用函数。
- en: 'A game consists of a set of **players** **I** = {1, .., n}, where each player
    has a set of **strategies** **S** and a **utility** **function** **ui(s1, s2,
    … sn)**. The set of strategies is determined by the rules of the games. For example,
    it could be S = {check, raise, give-up} and the player would have to decide which
    of these actions they want to use. The utility function u (also called **reward**)
    describes how valuable a certain action of a player would be, given the actions
    of the other players. Every player wants to maximize their utility, but now comes
    the tricky part: The utility of an action of yours depends on the other players’
    actions. But for them, the same applies: Their actions’ utilities depend on the
    actions of the other players (including yours).'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 一个博弈由一组**玩家** **I** = {1, .., n}组成，其中每个玩家都有一个策略集**S**和一个**效用****函数** **ui(s1,
    s2, … sn)**。策略集由游戏的规则决定。例如，它可以是 S = {check, raise, give-up}，玩家必须决定他们想要使用哪些行动。效用函数
    u（也称为**奖励**）描述了在给定其他玩家的行动的情况下，玩家的某个特定行动的价值。每个玩家都希望最大化他们的效用，但这里有一个棘手的部分：你的行动的效用取决于其他玩家的行动。但对他们来说，情况相同：他们的行动的效用取决于其他玩家的行动（包括你的）。
- en: Let’s consider a well-known game to illustrate this point. In rock-paper-scissors,
    we have n=2 players and each player can choose between three actions, hence the
    strategy set is S={rock, paper, scissors} for each player. But the utility of
    an action depends on what the other player does. If our opponent chooses rock,
    the utility of paper is high (1), because paper beats rock. But if your opponent
    chooses scissors, the utility of paper is low (-1), because you would lose. Finally,
    if your opponent chooses paper as well, you reach a draw and the utility is 0.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个著名的博弈来说明这一点。在剪刀石头布游戏中，我们有 n=2 个玩家，每个玩家可以选择三种行动之一，因此每个玩家的策略集是 S={rock,
    paper, scissors}。但行动的效用取决于其他玩家的行动。如果我们的对手选择石头，纸的效用就高（1），因为纸能打败石头。但如果你的对手选择剪刀，纸的效用就低（-1），因为你会输。最后，如果你的对手也选择纸，你将达到平局，效用为
    0。
- en: '![](../Images/d5afed706b46306e58e9575deab6a37d.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5afed706b46306e58e9575deab6a37d.png)'
- en: Utility values for player one choosing paper for three choices of the opponents
    strategy.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当对手选择三种策略时，玩家1选择纸的效用值。
- en: 'Instead of writing down the utility function for each case individually, it
    is common to display games in a matrix like this:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是为每个情况单独写下效用函数，通常以这种矩阵形式展示游戏：
- en: '![](../Images/0750685b02c11168b72cecc9e4cab29d.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0750685b02c11168b72cecc9e4cab29d.png)'
- en: The first player decides for the row of the matrix by selecting his action and
    the second player decides for the column. For example, if player 1 chooses paper
    and player 2 chooses scissors, we end up in the cell in the third column and second
    row. The value in this cell is the utility for both players, where the first value
    corresponds to player 1 and the second value corresponds to player 2\. (-1,1)
    means that player 1 has a utility of -1 and player 2 has a utility of 1\. Scissors
    beat paper.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵的第一位玩家通过选择他的行动来决定矩阵的行，第二位玩家通过选择列来决定。例如，如果玩家1选择纸，玩家2选择剪刀，我们最终会落在第三列第二行的单元格中。这个单元格中的值是两位玩家的效用，其中第一个值对应玩家1，第二个值对应玩家2。(-1,1)表示玩家1的效用为-1，玩家2的效用为1。剪刀胜过纸。
- en: Some more details
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更多细节
- en: Now we have understood the main components of a game in game theory. Let me
    add a few more hints on what game theory is about and what assumptions it uses
    to describe its scenarios.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了博弈论中游戏的主要组成部分。让我再补充一些关于博弈论是什么以及它使用哪些假设来描述其情景的提示。
- en: We often assume that the players select their actions at the same time (like
    in rock-paper-scissors). We call such games **static** games. There are also **dynamic**
    games in which players take turns deciding on their actions (like in chess). We
    will consider these cases in a later chapter of this tutorial.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们通常假设玩家同时选择他们的行动（比如在剪刀石头布游戏中）。我们称这样的游戏为**静态游戏**。也存在**动态游戏**，其中玩家轮流决定他们的行动（比如在国际象棋中）。我们将在本教程的后续章节中考虑这些情况。
- en: In game theory, it is typically assumed that the players **can not communicate**
    with each other so they can’t come to an agreement before deciding on their actions.
    In rock-paper-scissors, you wouldn’t want to do that anyway, but there are other
    games where communication would make it easier to choose an action. However, we
    will always assume that communication is not possible.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在博弈论中，通常假设玩家**不能相互沟通**，因此他们在决定行动之前不能达成协议。在剪刀石头布游戏中，你当然不希望这样做，但还有其他游戏，沟通会使选择行动变得更容易。然而，我们始终假设沟通是不可能的。
- en: Game theory is considered a **normative** theory, not a descriptive one. That
    means we will analyse games concerning the question “What would be the rational
    solution?” This may not always be what people do in a likewise situation in reality.
    Such descriptions of real human behaviour are part of the research field of behavioural
    economics, which is located on the border between psychology and economics.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 博弈论被认为是一个**规范性理论**，而不是描述性理论。这意味着我们将分析游戏，关注“什么会是合理的解决方案？”这并不总是现实世界中类似情况下人们所做的事情。对真实人类行为的这种描述是行为经济学研究领域的部分，它位于心理学和经济学的交界处。
- en: The prisoner’s dilemma
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 囚徒困境
- en: '![](../Images/e5b1c17284e036865663239a28078950.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5b1c17284e036865663239a28078950.png)'
- en: The prisoner’s dilemma is all about not ending up here. Photo by [De an Sun](https://unsplash.com)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 囚徒困境的全部内容就是不要陷入这种境地。图片由[De an Sun](https://unsplash.com)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供
- en: 'Let us become more familiar with the main concepts of game theory by looking
    at some typical games that are often analyzed. Often, such games are derived from
    are story or scenario that may happen in the real world and require people to
    decide between some actions. One such story could be as follows:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察一些典型的游戏，我们可以更熟悉博弈论的主要概念，这些游戏经常被分析。通常，这类游戏来源于现实世界中可能发生的故事或情景，需要人们在某些行动之间做出选择。以下是一个这样的故事：
- en: 'Say we have two criminals who are suspected of having committed a crime. The
    police have some circumstantial evidence, but no actual proof for their guilt.
    Hence they question the two criminals, who now have to decide if they want to
    confess or deny the crime. If you are in the situation of one of the criminals,
    you might think that denying is always better than confessing, but now comes the
    tricky part: The police propose a deal to you. If you confess while your partner
    denies, you are considered a crown witness and will not be punished. In this case,
    you are free to go but your partner will go to jail for six years. Sounds like
    a good deal, but be aware, that the outcome also depends on your partner’s action.
    If you both confess, there is no crown witness anymore and you both go to jail
    for three years. If you both deny, the police can only use circumstantial evidence
    against you, which will lead to one year in prison for both you and your partner.
    But be aware, that your partner is offered the same deal. If you deny and he confesses,
    he is the crown witness and you go to jail for six years. How do you decide?'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有两个被怀疑犯有罪行的罪犯。警方有一些间接证据，但没有实际证据证明他们的罪行。因此，他们审问这两个罪犯，现在他们必须决定是想承认罪行还是否认。如果你是其中一个罪犯的情况，你可能会认为否认总是比承认好，但现在到了棘手的部分：警方提出了一项交易给你。如果你在伙伴否认的情况下承认，你将被视为证人，将不会受到惩罚。在这种情况下，你可以自由离开，但你的伙伴将被判入狱六年。听起来像是一笔好交易，但请注意，结果也取决于你伙伴的行动。如果你俩都承认，就没有证人了，你们俩都将被判入狱三年。如果你俩都否认，警方只能使用间接证据对你进行指控，这将导致你和你的伙伴都将被判入狱一年。但请注意，你的伙伴也被提供了同样的交易。如果你否认而他承认，他就是证人，你将被判入狱六年。你该如何决定？
- en: '![](../Images/efd25f5b072e4000454d9ebcc373b046.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/efd25f5b072e4000454d9ebcc373b046.png)'
- en: The prisoner’s dilemma.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 囚徒困境。
- en: The game derived from this story is called the **prisoner’s dilemma** and is
    a typical example of a game in game theory. We can visualize it as a matrix just
    like we did with rock-paper-scissors before and in this matrix, we easily see
    the dilemma the players are in. If both deny, they receive a rather low punishment.
    But if you assume that your partner denies, you might be tempted to confess, which
    would prevent you from going to jail. But your partner might think the same, and
    if you both confess, you both go to jail for longer. Such a game can easily make
    you go round in circles. We will talk about solutions to this problem in the [next
    chapter](https://towardsdatascience.com/i-wont-change-unless-you-do/) of this
    tutorial. First, let’s consider some more examples.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个故事中衍生出的游戏被称为**囚徒困境**，它是博弈论中游戏的典型例子。我们可以像之前用剪刀石头布一样将其可视化为一个矩阵，在这个矩阵中，我们很容易看到玩家所处的困境。如果你们俩都否认，他们将受到相对较低的惩罚。但如果你假设你的伙伴会否认，你可能会倾向于承认，这样可以防止你入狱。但你的伙伴可能也会有同样的想法，如果你们俩都承认，你们俩都将被判入狱更长时间。这样的游戏很容易让人陷入困境。我们将在本教程的[下一章](https://towardsdatascience.com/i-wont-change-unless-you-do/)中讨论这个问题的解决方案。首先，让我们考虑一些更多的例子。
- en: Bach vs. Stravinsky
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 巴赫 vs. 斯特拉文斯基
- en: '![](../Images/53f2b4221e77920cc3de61baafa2831d.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/53f2b4221e77920cc3de61baafa2831d.png)'
- en: Who do you prefer, Bach or Stravinsky? Photo by [Sigmund](https://unsplash.com/@sigmund)
    on [Unsplash](https://unsplash.com)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你更喜欢巴赫还是斯特拉文斯基？照片由[Sigmund](https://unsplash.com/@sigmund)在[Unsplash](https://unsplash.com)提供
- en: 'You and your friend want to go to a concert together. You are a fan of Bach’s
    music but your friend favors the Russian 20th. century composer Igor Stravinsky.
    However, you both want to avoid being alone in any concert. Although you prefer
    Bach over Stravinsky, you would rather go to the Stravinsky concert with your
    friend than go to the Bach concert alone. We can create a matrix for this game:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你和你的朋友想一起去听音乐会。你是巴赫音乐的粉丝，但你的朋友更喜欢俄罗斯20世纪的作曲家伊戈尔·斯特拉文斯基。然而，你们俩都希望避免在任何一场音乐会上独自一人。尽管你更喜欢巴赫而不是斯特拉文斯基，但你宁愿和你的朋友一起去斯特拉文斯基的音乐会，也不愿独自去听巴赫的音乐会。我们可以为这个游戏创建一个矩阵：
- en: '![](../Images/23b0f407f0ac164a27ac7d2642d2b168.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23b0f407f0ac164a27ac7d2642d2b168.png)'
- en: Bach vs. Stravinsky
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 巴赫 vs. 斯特拉文斯基
- en: You decide for the row by going to the Bach or Stravinsky concert and your friend
    decides for the column by going to one of the concerts as well. For you, it would
    be best if you both chose Bach. Your reward would be 2 and your friend would get
    a reward of 1, which is still better for him than being in the Stravinsky concert
    all by himself. However, he would be even happier, if you were in the Stravinsky
    concert together.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过去巴赫或斯特拉文斯基的音乐会来决定行，而你的朋友通过去任何一场音乐会来决定列。对你来说，最好的情况是你们都选择巴赫。你的奖励将是2分，而你的朋友将得到1分的奖励，这对他来说比他独自在斯特拉文斯基的音乐会上要好。然而，如果他和你一起在斯特拉文斯基的音乐会上，他会更高兴。
- en: Do you remember, that we said players are not allowed to communicate before
    making their decision? This example illustrates why. If you could just call each
    other and decide where to go, this would not be a game to investigate with game
    theory anymore. But you can’t call each other so you just have to go to any of
    the concerts and hope you will meet your friend there. What do you do?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你还记得我们说过玩家在做出决定之前不允许交流吗？这个例子说明了原因。如果你只是互相打电话决定去哪里，这就不再是游戏理论可以研究的游戏了。但你不能互相打电话，所以你只能去任何一场音乐会，希望在那里遇到你的朋友。你会怎么做？
- en: Arm or disarm?
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解除武装还是升级？
- en: '![](../Images/7f7546c8c4656142fa3acef3cebbadfa.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f7546c8c4656142fa3acef3cebbadfa.png)'
- en: Make love, not war. Photo by [Artem Beliaikin](https://unsplash.com/@belart84)
    on [Unsplash](https://unsplash.com)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 爱情而非战争。照片由 [Artem Beliaikin](https://unsplash.com/@belart84) 在 [Unsplash](https://unsplash.com)
    提供
- en: 'A third example brings us to the realm of international politics. The world
    would be a much happier place with fewer firearms, wouldn’t it? However, if nations
    think about disarmament, they also have to consider the choices other nations
    make. If the USA disarms, the Soviet Union might want to rearm, to be able to
    attack the USA — that was the thinking during the Cold War, at least. Such a scenario
    could be described with the following matrix:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个例子把我们带到了国际政治的领域。如果世界上枪支更少，世界会是一个更快乐的地方，不是吗？然而，如果国家考虑解除武装，它们也必须考虑其他国家做出的选择。如果美国解除武装，苏联可能会想要重新武装，以便能够攻击美国——至少在冷战期间是这样的思考。这样的场景可以用以下矩阵来描述：
- en: '![](../Images/eeb654f2a5e1bb89710c94dfb6cf1652.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eeb654f2a5e1bb89710c94dfb6cf1652.png)'
- en: The matrix for the disarm vs. upgrade game.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 解除武装与升级游戏的矩阵。
- en: As you see, when both nations disarm, they get the highest reward (3 each),
    because there are fewer firearms in the world and the risk of war is minimized.
    However, if you disarm, while the opponent upgrades, your opponent is in the better
    position and gets a reward of 2, while you only get 0\. Then again, it might have
    been better to upgrade yourself, which gives a reward of 1 for both players. That
    is better than being the only one who disarms, but not as good as it would get
    if both nations disarmed.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，当两个国家都解除武装时，它们会获得最高的奖励（每个3分），因为世界上枪支更少，战争的风险最小化。然而，如果你解除武装，而对手升级，对手就会处于更好的位置，并获得2分的奖励，而你只能得到0分。再次，升级自己可能更好，这对两个玩家都有1分的奖励。这比只有你自己解除武装要好，但不如两个国家都解除武装的情况好。
- en: The solution?
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案？
- en: 'All these examples have one thing in common: There is no single option that
    is always the best. Instead, the utility of an action for one player always depends
    on the other player’s action, which, in turn, depends on the first player’s action
    and so on. Game theory is now interested in finding the optimal solution and deciding
    what would be the rational action; that is, the action that maximizes the expected
    reward. Different ideas on how exactly such a solution looks like will be part
    of the next [chapter](https://towardsdatascience.com/i-wont-change-unless-you-do/)
    in this series.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些例子都有一个共同点：没有一种选择总是最好的。相反，一个玩家的行动效用总是取决于另一个玩家的行动，而这反过来又取决于第一个玩家的行动，以此类推。现在博弈论感兴趣的是寻找最优解，并决定什么才是理性的行动；也就是说，最大化预期奖励的行动。关于这种解决方案具体是什么样的不同想法将是本系列下一章
    [章节](https://towardsdatascience.com/i-wont-change-unless-you-do/) 的内容。
- en: Summary
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: '![](../Images/372d38a83724b95ee177e898d64fe9a8.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/372d38a83724b95ee177e898d64fe9a8.png)'
- en: Learning about game theory is as much fun as playing a game, don’t you think?
    Photo by [Christopher Paul High](https://unsplash.com/@christopherphigh) on [Unsplash](https://unsplash.com)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 学习博弈论就像玩游戏一样有趣，你不这么认为吗？照片由 [Christopher Paul High](https://unsplash.com/@christopherphigh)
    在 [Unsplash](https://unsplash.com) 提供
- en: Before continuing with finding solutions in the [next chapter](https://towardsdatascience.com/i-wont-change-unless-you-do/),
    let us recap what we have learned so far.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续阅读[下一章](https://towardsdatascience.com/i-wont-change-unless-you-do/)中寻找解决方案之前，让我们回顾一下到目前为止我们已经学到了什么。
- en: A game consists of **players**, that decide for **actions**, which have a **utility**
    or **reward**.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一款游戏由**玩家**组成，他们决定**行动**，这些行动具有**效用**或**奖励**。
- en: The utility/reward of an action **depends** on the other players’ actions.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行动的效用/奖励**取决于**其他玩家的行动。
- en: In **static** games, players decide for their actions simultaneously. In **dynamic**
    games, they take turns.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**静态**游戏中，玩家同时决定他们的行动。在**动态**游戏中，他们轮流进行。
- en: The **prisoner’s dilemma** is a very popular example of a game in game theory.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**囚徒困境**是博弈论中一个非常流行的游戏例子。'
- en: Games become increasingly interesting if there is no single action that is better
    than any other.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果没有单一的行动比其他任何行动都好，游戏就会变得更有趣。
- en: Now that you are familiar with how games are described in game theory, you can
    check out the [next chapter](https://towardsdatascience.com/i-wont-change-unless-you-do/)
    to learn how to find solutions for games in game theory.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经熟悉了在博弈论中如何描述游戏，你可以查看[下一章](https://towardsdatascience.com/i-wont-change-unless-you-do/)来学习如何在博弈论中寻找游戏的解决方案。
- en: '**References**'
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**参考文献**'
- en: 'The topics introduced here are typically covered in standard textbooks on game
    theory. I mainly used this one, which is written in German though:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这里介绍的主题通常在标准的博弈论教科书中都有涉及。我主要使用了这本，尽管它是用德语写的：
- en: 'Bartholomae, F., & Wiens, M. (2016). *Spieltheorie. Ein anwendungsorientiertes
    Lehrbuch*. Wiesbaden: Springer Fachmedien Wiesbaden.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Bartholomae, F.，& Wiens, M. (2016). *博弈论：一本应用导向的教科书*. Wiesbaden: Springer Fachmedien
    Wiesbaden.'
- en: 'An alternative in English language could be this one:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 英文的一个替代版本可以是这个：
- en: 'Espinola-Arredondo, A., & Muñoz-Garcia, F. (2023). *Game Theory: An Introduction
    with Step-by-step Examples*. Springer Nature.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Espinola-Arredondo, A.，& Muñoz-Garcia, F. (2023). *博弈论：带步骤示例的入门*. Springer Nature.
- en: 'Game theory is a rather young field of research, with the first main textbook
    being this one:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 博弈论是一个相对较新的研究领域，第一本主要教科书是这本：
- en: Von Neumann, J., & Morgenstern, O. (1944). Theory of games and economic behavior.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Von Neumann, J.，& Morgenstern, O. (1944). 博弈论与经济行为理论。
- en: '*Like this article?* [*Follow me*](https://medium.com/@doriandrost) *to be
    notified of my future posts.*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*喜欢这篇文章吗？* [*关注我*](https://medium.com/@doriandrost) 以获取我的未来文章通知。'
