  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**[语言模型API](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#35f8)**.
    运行量化Qwen2.5–0.5B-Instruct模型的llama.cpp语言模型推理服务器 [🤖.](https://github.com/jsbaan/ai-app-from-scratch/tree/main/lm-api)'
- en: '**[PostgreSQL database server](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#65d7).**
