- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: The aim of this project is to learn about the fundamentals of modern, scalable
    web applications by designing, building and deploying an AI-powered chat app from
    scratch. We won’t use fancy frameworks or commercial platforms like ChatGPT. This
    will provide a better understanding of how real-world systems may work under the
    hood, and give us full control over the language model, infrastructure, data and
    costs. The focus will be on engineering, backend and cloud deployment, rather
    than the language model or a fancy frontend.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本项目的目标是通过对从零开始设计、构建和部署一个由人工智能驱动的聊天应用来学习现代、可扩展的Web应用的基础知识。我们不会使用花哨的框架或像ChatGPT这样的商业平台。这将使我们更好地理解现实世界系统在底层可能的工作方式，并让我们对语言模型、基础设施、数据和成本拥有完全的控制权。重点将放在工程、后端和云部署上，而不是语言模型或花哨的前端。
- en: This is part 1\. We will design and build a cloud-native app with several APIs,
    a database, private network, reverse proxy, and simple user interface with sessions.
    Everything runs on our local computer. In [part 2](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5),
    we will deploy our application to a cloud platform like AWS, GCP or Azure with
    a focus on scalability so actual users can reach it over the internet.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这是第一部分。我们将设计和构建一个具有多个API、数据库、私有网络、反向代理和简单用户界面（带有会话）的云原生应用。所有这些都在我们的本地计算机上运行。在[第二部分](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5)中，我们将把我们的应用程序部署到AWS、GCP或Azure等云平台，重点是可扩展性，以便实际用户可以通过互联网访问它。
- en: '![A quick demo of the app. We start a new chat, come back to that same chat,
    and start another chat. We will now build this app locally and make it available
    at localhost.](../Images/114434b7f4457b1b57c9d8baf16a75dc.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![应用程序的快速演示。我们开始一个新的聊天，回到那个相同的聊天，然后开始另一个聊天。现在我们将本地构建这个应用程序，并在localhost上提供它。](../Images/114434b7f4457b1b57c9d8baf16a75dc.png)'
- en: A quick demo of the app[.](https://chat.jorisbaan.nl.) We start a new chat,
    come back to that same chat, and start another chat. We will now build this app
    locally and make it available at localhost.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的快速演示[.]。我们开始一个新的聊天，回到那个相同的聊天，然后开始另一个聊天。现在我们将本地构建这个应用程序，并在localhost上提供它。
- en: You can find the codebase at [https://github.com/jsbaan/ai-app-from-scratch](https://github.com/jsbaan/ai-app-from-scratch).
    Throughout this post I will link to specific lines of code with this hyperlink
    robot [🤖](https://github.com/jsbaan/ai-app-from-scratch) (try it!)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://github.com/jsbaan/ai-app-from-scratch](https://github.com/jsbaan/ai-app-from-scratch)找到代码库。在这篇文章中，我会通过这个超链接机器人[🤖](https://github.com/jsbaan/ai-app-from-scratch)链接到特定的代码行（试试看！）
- en: Microservices and APIs
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微服务和API
- en: Modern web applications are often built using microservices – small, independent
    software components with a specific role. Each service runs in its own Docker
    container – an isolated environment independent of the underlying operating system
    and hardware. Services communicate with each other over a network using REST APIs.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 现代Web应用通常使用微服务构建——具有特定角色的独立软件组件。每个服务都在自己的Docker容器中运行——一个独立于底层操作系统和硬件的环境。服务通过REST
    API在网络中相互通信。
- en: You can think of a REST API as the interface that defines how to interact with
    a service by defining *endpoints* – specific URLs that represent the possible
    resources or actions, formatted like [http://hostname](http://hostname):port/endpoint-name
    Endpoints, also called paths or routes, are accessed with HTTP requests that can
    have various types like GET to retrieve data or POST to create data. Parameters
    can be passed in the URL itself or in the request body or header.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将REST API视为通过定义*端点*来定义如何通过服务进行交互的接口——代表可能资源或操作的特定URL，格式如下：[http://hostname](http://hostname):port/endpoint-name
    端点，也称为路径或路由，可以通过具有各种类型的HTTP请求访问，如GET用于检索数据或POST用于创建数据。参数可以包含在URL本身中，或在请求体或头中传递。
- en: Architecture
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 架构
- en: 'Let’s make this more concrete. We want a web page where users can chat with
    a language model and come back to their previous chats. Our architecture will
    look like this:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更具体一些。我们想要一个网页，用户可以在其中与语言模型聊天，并返回到之前的聊天。我们的架构将如下所示：
- en: '![Local architecture of the app. Each service runs in its own Docker container
    and communicates over a private network. Made by author in draw.io.](../Images/6a327310808396833592bff41f3535cd.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![应用程序的本地架构。每个服务都在自己的Docker容器中运行，并通过私有网络进行通信。由作者在draw.io中制作。](../Images/6a327310808396833592bff41f3535cd.png)'
- en: Local architecture of the app. Each service runs in its own Docker container
    and communicates over a private network. Made by author in draw.io.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的本地架构。每个服务都在自己的Docker容器中运行，并通过私有网络进行通信。由作者在draw.io中制作。
- en: The above architecture diagram shows how a user’s HTTP request to [localhost](http://localhost)
    on the left flows through the system. We will discuss and set up each individual
    service, starting with the backend services on the right. Finally, we discuss
    communication, networking and container orchestration.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 上述架构图显示了用户向左侧的[localhost](http://localhost)发送的HTTP请求如何通过系统流动。我们将讨论和设置每个单独的服务，从右侧的后端服务开始。最后，我们将讨论通信、网络和容器编排。
- en: 'The structure of this post follows the components in our architecture (click
