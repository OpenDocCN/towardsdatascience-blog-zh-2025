  - PREF_OL
  type: TYPE_NORMAL
  zh: '**[数据库API](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#7e22)**.
    一个FastAPI和Uvicorn Python服务器，查询PostgreSQL数据库 [🤖.](https://github.com/jsbaan/ai-app-from-scratch/tree/main/db-api)'
- en: '**[User interface](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#b75e).**
