- en: 'Master the 3D Reconstruction Process: A Step-by-Step Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 掌握3D重建过程：一步步指南
- en: 原文：[https://towardsdatascience.com/master-the-3d-reconstruction-process-step-by-step-guide/](https://towardsdatascience.com/master-the-3d-reconstruction-process-step-by-step-guide/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/master-the-3d-reconstruction-process-step-by-step-guide/](https://towardsdatascience.com/master-the-3d-reconstruction-process-step-by-step-guide/)
- en: <mdspan datatext="el1742241650978" class="mdspan-comment">The 3D Reconstruction</mdspan>
    journey from 2D photographs to 3D models follows a structured path.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1742241650978" class="mdspan-comment">从2D照片到3D模型的3D重建之旅遵循一个结构化的路径。*
- en: This path consists of distinct steps that build upon each other to transform
    flat images into spatial information.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 此路径由一系列相互依赖的步骤组成，将平面图像转换为空间信息。
- en: Understanding this pipeline is crucial for anyone looking to create high-quality
    3D reconstructions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这个管道对于任何想要创建高质量3D重建的人来说至关重要。
- en: Let me explain…
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我来解释……
- en: 'Most people think 3D reconstruction means:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人认为3D重建意味着：
- en: Taking random photos around an object
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在物体周围随机拍照
- en: Pressing a button in expensive software
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在昂贵的软件中按下一个按钮
- en: Waiting for magic to happen
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等待魔法发生
- en: Getting perfect results every time
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每次都获得完美的结果
- en: Skipping the fundamentals
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跳过基础知识
- en: No thanks.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 不需要。
- en: 'The most successful 3D Reconstruction I have seen are built on three core principles:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我所见过的最成功的3D重建都是基于三个核心原则：
- en: They use pipelines that work with fewer images but position them better.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们使用与较少图像一起工作的管道，但位置更好。
- en: They make sure users spend less time processing but achieve cleaner results.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们确保用户花费更少的时间处理，但获得更干净的结果。
- en: They permit troubleshooting faster because users know exactly where to look.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们允许更快地进行故障排除，因为用户知道确切的位置在哪里。
- en: 'Therefore, this hints at a nice lesson:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这给我们提供了一个很好的教训：
- en: Your 3D models can only be as good as your understanding of how they’re created.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你的3D模型只能与你对它们创建方式的理解一样好。
- en: Looking at this from a scientific perspective is really key.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 从科学的角度来看，这一点非常重要。
- en: Let us dive right into it!
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们直接深入探讨！
- en: 🦊 *If you are new to my (3D) writing world, welcome! We are going on an exciting
    adventure that will allow you to master an essential 3D Python skill.*
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🦊 *如果你是第一次接触我的（3D）写作世界，欢迎！我们将踏上一次激动人心的冒险之旅，让你掌握一个关键的3D Python技能。*
- en: '*Once the scene is laid out, we embark on the Python journey. Everything is
    provided, included resources at the end. You will see Tips (*🦚**Notes***and *🌱**Growing***)
    to help you get the most out of this article. Thanks to the *[***3D Geodata Academy***](https://learngeodata.eu/)* for
    supporting the endeavor.* *This article is inspired by a small section of Module
    1 of the 3D [Reconstructor OS Course](https://learngeodata.eu/3d-course-pack/)*.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*一旦场景布置好，我们就开始Python之旅。一切都被提供，包括资源列表。你将看到提示（*🦚**注意事项***和 *🌱**成长***）以帮助你充分利用这篇文章。感谢*[***3D
    Geodata Academy***](https://learngeodata.eu/)*对这项事业的支持。* *本文灵感来源于3D [Reconstructor
    OS课程](https://learngeodata.eu/3d-course-pack/)模块1的一个小节。*'
- en: The Complete 3D Reconstruction Workflow
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 完整的3D重建工作流程
- en: Let me highlight the 3D Reconstruction pipeline with Photogrammetry. The process
    follows a logical sequence of steps, as illustrated below.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 让我突出一下使用摄影测量的3D重建管道。该过程遵循以下逻辑步骤，如下所示。
- en: '![](../Images/f49a9d6c337919d07cdfc2f5c0aa3d82.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f49a9d6c337919d07cdfc2f5c0aa3d82.png)'
- en: What is important to note, is that each step builds upon the previous one. Therefore,
    the quality of each stage directly impacts the final result, which is very important
    to have in mind!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，每一步都是建立在之前步骤之上的。因此，每个阶段的质量直接影响到最终结果，这一点非常重要！
- en: 🦊 *Understanding the entire process is crucial for troubleshooting workflows
    due to its sequential nature.*
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🦊 *理解整个过程对于故障排除工作流程至关重要，因为它具有顺序性。*
- en: With that in mind, let’s detail each step, focusing on both the theory and practical
    implementation.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，让我们详细说明每一步，重点关注理论和实际应用。
- en: 'Natural Feature Extraction: Finding the Distinctive Points'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自然特征提取：寻找独特点
- en: Natural feature extraction is the foundation of the photogrammetry process.
    It identifies distinctive points in images that can be reliably located across
    multiple photographs.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 自然特征提取是摄影测量的基础。它识别图像中的独特点，这些点可以在多张照片中可靠地定位。
- en: '![](../Images/6d779e94d2a0346a409b0aa820e155c7.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6d779e94d2a0346a409b0aa820e155c7.png)'
- en: These points serve as anchors that tie different views together.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这些点作为锚点，将不同的视图连接在一起。
- en: 🌱 *When working with low-texture objects, consider adding temporary markers
    or texture patterns to improve feature extraction results.*
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🌱 *当处理低纹理物体时，考虑添加临时标记或纹理图案以改善特征提取结果。*
- en: 'Common feature extraction algorithms include:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的特征提取算法包括：
- en: '| **Algorithm** | **Strengths** | **Weaknesses** | **Best For** |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| **算法** | **优点** | **缺点** | **最佳用途** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| SIFT | Scale and rotation invariant | Computationally expensive | High-quality,
    general-purpose reconstruction |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| SIFT | 尺度和旋转不变 | 计算成本高 | 高质量、通用重建 |'
- en: '| SURF | Faster than SIFT | Less accurate than SIFT | Quick prototyping |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| SURF | 比SIFT快 | 比SIFT不准确 | 快速原型设计 |'
- en: '| ORB | Very fast, no patent restrictions | Less robust to viewpoint changes
    | Real-time applications |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| ORB | 非常快，没有专利限制 | 对视点变化不太鲁棒 | 实时应用 |'
- en: 'Let’s implement a simple feature extraction using OpenCV:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用OpenCV实现一个简单的特征提取：
- en: '[PRE0]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: What I do here is run through an image, and hunt for distinctive patterns that
    stand out from their surroundings.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里做的是遍历一张图像，寻找从周围环境中脱颖而出的独特模式。
- en: These patterns create mathematical “signatures” called descriptors that remain
    recognizable even when viewed from different angles or distances.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式创建了数学“签名”称为描述符，即使在从不同的角度或距离观看时也能被识别。
- en: Think of them as unique fingerprints that can be matched across multiple photographs.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 将它们视为可以在多张照片之间匹配的独特指纹。
- en: The visualization step reveals exactly what the algorithm finds important in
    your image.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化步骤揭示了算法在您的图像中认为重要的是什么。
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Notice how corners, edges, and textured areas attract more keypoints, while
    smooth or uniform regions remain largely ignored.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到角落、边缘和纹理区域吸引了更多的关键点，而平滑或均匀的区域则基本被忽略。
- en: '![](../Images/a4dce869dbb16618a1ea5c3a289f98e0.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a4dce869dbb16618a1ea5c3a289f98e0.png)'
- en: This visual feedback is invaluable for understanding why some objects reconstruct
    better than others.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这种视觉反馈对于理解为什么某些物体的重建比其他物体好非常有价值。
- en: '🦥 **Geeky Note**: *The max_features parameter is critical. Setting it too high
    can dramatically slow processing and capture noise, while setting it too low might
    miss important details. For most objects, 2000-5000 features provide a good balance,
    but I’ll push it to 10,000+ for highly detailed architectural reconstructions.*'
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🦥 **技术笔记**：*`max_features`参数至关重要。设置得太高会显著减慢处理速度并捕获噪声，而设置得太低可能会错过重要细节。对于大多数物体，2000-5000个特征提供了一个良好的平衡，但我会将其推至10,000+以进行高度详细的结构重建。*
- en: 'Feature Matching: Connecting Images Together'
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 特征匹配：将图像连接在一起
- en: Once features are extracted, the next step is to find correspondences between
    images. This process identifies which points in different images represent the
    same physical point in the real world. Feature matching creates the connections
    needed to determine camera positions.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦提取了特征，下一步就是找到图像之间的对应关系。这个过程确定了不同图像中哪些点代表现实世界中的同一物理点。特征匹配创建了确定相机位置所需的连接。
- en: '![](../Images/912598cf53aed8d3e2ec2bb0cbf1cf25.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/912598cf53aed8d3e2ec2bb0cbf1cf25.png)'
- en: I’ve seen countless attempts fail because the algorithm couldn’t reliably connect
    the same points across different images.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到无数次的尝试失败，因为算法无法在不同图像之间可靠地连接相同的点。
- en: The ratio test is the silent hero that weeds out ambiguous matches before they
    poison your reconstruction.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 比率测试是默默的英雄，在它们毒害你的重建之前，它会清除模糊的匹配。
- en: '[PRE2]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The matching process works by comparing feature descriptors between two images,
    measuring their mathematical similarity. For each feature in the first image,
    we find its two closest matches in the second image and assess their relative
    distances.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 匹配过程通过比较两张图像之间的特征描述符，测量它们的数学相似度。对于第一张图像中的每个特征，我们在第二张图像中找到其两个最近的匹配项，并评估它们的相对距离。
- en: If the closest match is significantly better than the second-best (as controlled
    by the ratio threshold), we consider it reliable.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果最近的匹配项明显优于第二好的匹配项（由比率阈值控制），我们认为它是可靠的。
- en: '[PRE3]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Visualizing these matches reveals the spatial relationships between your images.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化这些匹配揭示了您图像之间的空间关系。
- en: '![](../Images/065e3450faf9e52efebad179e0f441a4.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/065e3450faf9e52efebad179e0f441a4.png)'
- en: Good matches form a consistent pattern that reflects the transform between viewpoints,
    while outliers appear as random connections.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 良好的匹配形成了一个一致的图案，反映了视点的转换，而异常值则表现为随机的连接。
- en: This pattern provides immediate feedback on image quality and camera positioning—clustered,
    consistent matches suggest good reconstruction potential.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式立即提供了关于图像质量和相机定位的反馈——聚集的、一致的匹配表明有良好的重建潜力。
- en: '🦥 **Geeky Note**: The ratio_thresh parameter (0.75) is Lowe’s original recommendation
    and works well in most situations. Lower values (0.6-0.7) produce fewer but more
    reliable matches, which is preferable for scenes with repetitive patterns. Higher
    values (0.8-0.9) yield more matches but increase the risk of outliers contaminating
    your reconstruction.'
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '🦥 **Geeky Note**: ratio_thresh参数（0.75）是Lowe最初的建议，在大多数情况下效果良好。较低的值（0.6-0.7）会产生较少但更可靠的匹配，这对于具有重复图案的场景更可取。较高的值（0.8-0.9）会产生更多匹配，但会增加异常值污染重建的风险。'
- en: 'Beautiful, now, let us move at the main stage: the Structure from Motion node.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们转到主舞台：从运动结构节点。
- en: 'Structure From Motion: Placing Cameras in Space'
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从运动结构：在空间中放置相机
- en: Structure from Motion (SfM) reconstructs both the 3D scene structure and camera
    motion from the 2D image correspondences. This process determines where each photo
    was taken from and creates an initial sparse point cloud of the scene.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 从运动结构（SfM）从二维图像对应关系重建3D场景结构和相机运动。这个过程确定了每张照片是从哪里拍摄的，并创建了一个场景的初始稀疏点云。
- en: 'Key steps in SfM include:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: SfM（从运动结构）的关键步骤包括：
- en: Estimating the fundamental or essential matrix between image pairs
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 估计图像对之间的基本或本质矩阵
- en: Recovering camera poses (position and orientation)
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 恢复相机姿态（位置和方向）
- en: Triangulating 3D points from 2D correspondences
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从二维对应关系中三角测量3D点
- en: Building a track graph to connect observations across multiple images
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建立一个轨迹图来连接多张图像中的观测
- en: The essential matrix encodes the geometric relationship between two camera viewpoints,
    revealing how they’re positioned relative to each other in space.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 本质矩阵编码了两个相机视点的几何关系，揭示了它们在空间中的相对位置。
- en: This mathematical relationship is the foundation for reconstructing both the
    camera positions and the 3D structure they observed.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这种数学关系是重建相机位置和它们观察到的3D结构的基础。
- en: '[PRE4]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '🦥 **Geeky Note**: The RANSAC threshold parameter (threshold=1.0) determines
    how strict we are about geometric consistency. I’ve found that 0.5-1.0 works well
    for controlled environments, but increasing to 1.5-2.0 helps with outdoor scenes
    where wind might cause slight camera movements. The probability parameter (prob=0.999)
    ensures high confidence but increases computation time; 0.95 is sufficient for
    prototyping.'
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '🦥 **Geeky Note**: RANSAC阈值参数（threshold=1.0）决定了我们对几何一致性的严格程度。我发现0.5-1.0在受控环境中效果良好，但增加到1.5-2.0有助于处理可能因风力导致轻微相机移动的户外场景。概率参数（prob=0.999）确保了高置信度，但会增加计算时间；0.95对于原型设计来说已经足够。'
- en: The essential matrix estimation uses matched feature points and the camera’s
    internal parameters to calculate the geometric relationship between images.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 本质矩阵估计使用匹配的特征点和相机的内部参数来计算图像之间的几何关系。
- en: '![](../Images/791bd0ce50fb14f3f7b0630d8664fc05.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/791bd0ce50fb14f3f7b0630d8664fc05.png)'
- en: This relationship is then decomposed to extract rotation and translation information
    – essentially determining where each photo was taken from in 3D space. The accuracy
    of this step directly affects everything that follows.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将这种关系分解以提取旋转和平移信息——本质上确定每张照片在三维空间中的位置。这一步骤的准确性直接影响着后续的所有操作。
- en: '[PRE5]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Once camera positions are established, triangulation projects rays from matched
    points in multiple images to determine where they intersect in 3D space.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦确定了相机位置，三角测量会将多张图像中匹配点的光线投影到三维空间中，以确定它们在哪里相交。
- en: '[PRE6]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: These intersections form the initial sparse point cloud, providing the skeleton
    upon which dense reconstruction will later build. The visualization shows both
    the reconstructed points and the camera positions, helping you understand the
    spatial relationships in your dataset.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这些交点形成了初始的稀疏点云，为后续的密集重建提供了骨架。可视化显示了重建的点云和相机位置，有助于您理解数据集中的空间关系。
- en: 🌱 SfM works best with a good network of overlapping images. Aim for at least
    60% overlap between adjacent images for reliable reconstruction.
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🌱 SfM与良好的重叠图像网络效果最佳。目标是在相邻图像之间至少有60%的重叠，以实现可靠的重建。
- en: 'Bundle Adjustment: Optimizing for Accuracy'
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集束调整：优化精度
- en: There is an extra optimization stage that comes in within the Structure from
    Motion “compute node”.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在从运动结构“计算节点”中还有一个额外的优化阶段。
- en: 'This is called: Bundle adjustment.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为：捆绑调整。
- en: It is a refinement step that jointly optimizes camera parameters and 3D point
    positions. What that means, is that it minimizes the reprojection error, i.e.
    the difference between observed image points and the projection of their corresponding
    3D points.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个优化步骤，它联合优化相机参数和3D点位置。这意味着它最小化了重投影误差，即观测到的图像点与其对应3D点的投影之间的差异。
- en: 'Does this make sense to you? Essentially, this optimization is great as it
    permits to:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这对你来说有道理吗？本质上，这种优化很好，因为它允许：
- en: improves the accuracy of the reconstruction
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高了重建的精度
- en: correct for accumulated drift
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 校正累积漂移
- en: Ensures global consistency of the model
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保模型的全局一致性
- en: At this stage, this should be enough to get a good intuition of how it works.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，这应该足以让你对它的工作方式有一个良好的直观理解。
- en: 🌱 In larger projects, incremental bundle adjustment (optimizing after adding
    each new camera) can improve both speed and stability compared to global adjustment
    at the end.
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🌱 在更大的项目中，增量捆绑调整（在添加每个新相机后进行优化）可以与全局调整相比提高速度和稳定性。
- en: 'Dense Matching: Creating Detailed Reconstructions'
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 稠密匹配：创建详细重建
- en: After establishing camera positions and sparse points, the final step is dense
    matching to create a detailed representation of the scene.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立相机位置和稀疏点之后，最后一步是稠密匹配，以创建场景的详细表示。
- en: '![](../Images/b80efcabe0c951598aa7b27efd1a39ca.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b80efcabe0c951598aa7b27efd1a39ca.png)'
- en: Dense matching uses the known camera parameters to match many more points between
    images, resulting in a complete point cloud.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 稠密匹配使用已知的相机参数在图像之间匹配更多的点，从而生成完整的点云。
- en: 'Common approaches include:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的方法包括：
- en: Multi-View Stereo (MVS)
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多视图立体（MVS）
- en: Patch-based Multi-View Stereo (PMVS)
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于补丁的多视图立体（PMVS）
- en: Semi-Global Matching (SGM)
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 半全局匹配（SGM）
- en: 'Putting It All Together: Practical Tools'
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将一切整合：实用工具
- en: 'The theoretical pipeline is implemented in several open-source and commercial
    software packages. Each offers different features and capabilities:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上的管道已在几个开源和商业软件包中实现。每个软件包都提供不同的功能和能力：
- en: '| **Tool** | **Strengths** | **Use Case** | **Pricing** |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| **工具** | **优点** | **用例** | **定价** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-106
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| COLMAP | Highly accurate, customizable | Research, precise reconstructions
    | Free, open-source |'
  id: totrans-107
  prefs: []
  type: TYPE_TB
  zh: '| COLMAP | 高度准确，可定制 | 研究，精确重建 | 免费，开源 |'
- en: '| OpenMVG | Modular, extensive documentation | Education, integration with
    custom pipelines | Free, open-source |'
  id: totrans-108
  prefs: []
  type: TYPE_TB
  zh: '| OpenMVG | 模块化，广泛的文档 | 教育，与自定义管道集成 | 免费，开源 |'
- en: '| Meshroom | User-friendly, node-based interface | Artists, beginners | Free,
    open-source |'
  id: totrans-109
  prefs: []
  type: TYPE_TB
  zh: '| Meshroom | 用户友好的基于节点的界面 | 艺术家，初学者 | 免费，开源 |'
- en: '| RealityCapture | Extremely fast, high-quality results | Professional, large-scale
    projects | Commercial |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
  zh: '| RealityCapture | 极快，高质量的结果 | 专业，大规模项目 | 商业 |'
- en: These tools package the various pipeline steps described above into a more user-friendly
    interface, but understanding the underlying processes is still essential for troubleshooting
    and optimization.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具将上述描述的各种管道步骤打包成一个更用户友好的界面，但理解底层过程对于故障排除和优化仍然是必要的。
- en: Automating the reconstruction pipeline saves countless hours of manual work.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化重建流程节省了无数小时的手动工作。
- en: The real productivity boost comes from scripting the entire process end-to-end,
    from raw photos to dense point cloud.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的生产力提升来自于从原始照片到稠密点云的整个过程的脚本化。
- en: COLMAP’s command-line interface makes this automation possible, even for complex
    reconstruction tasks.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: COLMAP的命令行界面使得这种自动化成为可能，即使是复杂的重建任务。
- en: '[PRE7]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The script orchestrates a series of COLMAP operations that would normally require
    manual intervention at each stage. It handles the progression from feature extraction
    through matching, sparse reconstruction, and finally dense reconstruction – maintaining
    the correct data flow between steps. This automation becomes invaluable when processing
    multiple datasets or when iteratively refining reconstruction parameters.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本编排了一系列COLMAP操作，这些操作通常在每个阶段都需要手动干预。它处理从特征提取到匹配、稀疏重建，最后到稠密重建的过程，保持步骤之间的正确数据流。当处理多个数据集或迭代优化重建参数时，这种自动化变得非常有价值。
- en: '[PRE8]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: One key aspect is the automatic selection of the largest reconstructed model.
    In challenging datasets, COLMAP sometimes creates multiple disconnected reconstructions
    rather than a single cohesive model.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 一个关键方面是自动选择最大的重建模型。在具有挑战性的数据集中，COLMAP有时会创建多个不连接的重建，而不是一个单一的连贯模型。
- en: The script intelligently identifies and continues with the most complete reconstruction,
    using image count as a proxy for model quality and completeness.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本智能地识别并继续使用最完整的重建，使用图像数量作为模型质量和完整性的代理。
- en: '🦥 **Geeky Note**: The –SiftExtraction.use_gpu and –SiftMatching.use_gpu flags
    enable GPU acceleration, speeding up processing by 5-10x. For dense reconstruction,
    the –PatchMatchStereo.geom_consistency true parameter significantly improves quality
    by enforcing consistency across multiple views, at the cost of longer processing
    time.'
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🦥 **极客笔记**：–SiftExtraction.use_gpu 和 –SiftMatching.use_gpu 标志启用GPU加速，将处理速度提高5-10倍。对于密集重建，–PatchMatchStereo.geom_consistency
    true参数通过强制多个视图的一致性，显著提高质量，但代价是更长的处理时间。
- en: The Power of Understanding the Pipeline
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解流程的力量
- en: Understanding the full reconstruction pipeline gives you control over your 3D
    modeling process. When you encounter issues, knowing which stage might be causing
    problems allows you to target your troubleshooting efforts effectively.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 理解完整的重建流程让你能够控制你的3D建模过程。当你遇到问题时，知道哪个阶段可能引起问题，可以让你有效地针对故障排除工作。
- en: '![](../Images/7828d742576ff3745a977db8f6e0d9fb.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7828d742576ff3745a977db8f6e0d9fb.png)'
- en: 'As illustrated, common issues and their sources include:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，常见问题和它们的来源包括：
- en: '**Missing or incorrect camera poses**: Feature extraction and matching problems'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**缺失或错误的相机位姿**：特征提取和匹配问题'
- en: '**Incomplete reconstruction**: Insufficient image overlap'
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**不完整的重建**：图像重叠不足'
- en: '**Noisy point clouds**: Poor bundle adjustment or camera calibration'
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**噪声点云**：糟糕的捆绑调整或相机校准'
- en: '**Failed reconstruction**: Problematic images (motion blur, poor lighting)'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重建失败**：问题图像（运动模糊，光线不足）'
- en: The ability to diagnose these issues comes from a deep understanding of how
    each pipeline component works and interacts with others.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 诊断这些问题的能力来自于对每个流程组件如何工作以及如何与其他组件交互的深入了解。
- en: 'Next Steps: Practice and Automation'
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步：实践和自动化
- en: Now that you understand the pipeline, it’s time to put it into practice. Experiment
    with the provided code examples and try automating the process for your own datasets.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了整个流程，是时候将其付诸实践了。尝试使用提供的代码示例，并尝试自动化你自己的数据集的过程。
- en: Start with small, well-controlled scenes and gradually tackle more complex environments
    as you gain confidence.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 从小型、控制良好的场景开始，随着你获得信心，逐渐处理更复杂的环境。
- en: Remember that the quality of your input images dramatically affects the final
    result. Take time to capture high-quality photographs with good overlap, consistent
    lighting, and minimal motion blur.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，你输入图像的质量会极大地影响最终结果。花时间捕捉高质量的照片，确保有良好的重叠、一致的光线和最小的运动模糊。
- en: 🌱 *Consider starting a small personal project to reconstruct an object you own.
    Document your process, including the issues you encounter and how you solve them
    – this practical experience is invaluable.*
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🌱 *考虑开始一个小型的个人项目，重建你拥有的物体。记录你的过程，包括你遇到的问题以及你如何解决它们——这种实践经验是无价的。*
- en: If you want to build proper expertise, consider
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要建立真正的专业知识，考虑
- en: the **[3D Reconstructor OS Course](https://learngeodata.eu/3d-course-pack/)**
    ▶️,
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**[3D重建操作系统课程](https://learngeodata.eu/3d-course-pack/)** ▶️，'
- en: or [**3D Data Science with Python**](https://www.oreilly.com/library/view/3d-data-science/9781098161323/)
    📕 (O’Reilly)
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 或 [**使用Python进行3D数据科学**](https://www.oreilly.com/library/view/3d-data-science/9781098161323/)
    📕 (O’Reilly)
- en: References and useful resources
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考资料和有用资源
- en: 'I compiled for you some interesting software, tools, and useful algorithm extended
    documentation:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我为你整理了一些有趣的软件、工具和有用的算法扩展文档：
- en: '**Software and Tools**'
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**软件和工具**'
- en: '[COLMAP](https://colmap.github.io/) – Free, open-source 3D reconstruction software'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[COLMAP](https://colmap.github.io/) – 免费开源的3D重建软件'
- en: '[OpenMVG](https://github.com/openMVG/openMVG) – Open Multiple View Geometry
    library'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[OpenMVG](https://github.com/openMVG/openMVG) – 开放多视图几何库'
- en: '[Meshroom](https://alicevision.org/#meshroom) – Free node-based photogrammetry
    software'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Meshroom](https://alicevision.org/#meshroom) – 免费基于节点的摄影测量软件'
- en: '[RealityCapture](https://www.capturingreality.com/) – Commercial high-performance
    photogrammetry software'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[RealityCapture](https://www.capturingreality.com/) – 商业高性能摄影测量软件'
- en: '[Agisoft Metashape](https://www.agisoft.com/) – Commercial photogrammetry and
    3D modeling software'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Agisoft Metashape](https://www.agisoft.com/) – 商业摄影测量和3D建模软件'
- en: '[OpenCV](https://opencv.org/) – Computer vision library with feature detection
    implementations'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[OpenCV](https://opencv.org/) – 具有特征检测实现的计算机视觉库'
- en: '[3DF Zephyr](https://www.3dflow.net/) – Photogrammetry software for 3D reconstruction'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[3DF Zephyr](https://www.3dflow.net/) – 3D重建的摄影测量软件'
- en: '[Python](https://www.python.org/) – Programming language ideal for 3D reconstruction
    automation'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Python](https://www.python.org/) – 适用于3D重建自动化的理想编程语言'
- en: '**Algorithms**'
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**算法**'
- en: '[SIFT (Scale-Invariant Feature Transform)](https://en.wikipedia.org/wiki/Scale-invariant_feature_transform)
    – Robust feature detection algorithm'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[SIFT (尺度不变特征变换)](https://en.wikipedia.org/wiki/Scale-invariant_feature_transform)
    – 鲁棒特征检测算法'
- en: '[SURF (Speeded-Up Robust Features)](https://en.wikipedia.org/wiki/Speeded_up_robust_features)
    – Fast feature detection algorithm'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[SURF (加速鲁棒特征)](https://en.wikipedia.org/wiki/Speeded_up_robust_features) –
    快速特征检测算法'
- en: '[ORB (Oriented FAST and Rotated BRIEF)](https://docs.opencv.org/3.4/d1/d89/tutorial_py_orb.html)
    – Efficient alternative to SIFT and SURF'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[ORB (方向快速和旋转BRIEF)](https://docs.opencv.org/3.4/d1/d89/tutorial_py_orb.html)
    – SIFT和SURF的高效替代方案'
- en: '[RANSAC (Random Sample Consensus)](https://en.wikipedia.org/wiki/Random_sample_consensus)
    – Used for outlier rejection in matching'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[RANSAC (随机样本一致性)](https://en.wikipedia.org/wiki/Random_sample_consensus) –
    用于匹配中的异常值拒绝'
- en: '[Structure from Motion (SfM)](https://en.wikipedia.org/wiki/Structure_from_motion)
    – Algorithm for recovering 3D structure from 2D images'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[运动结构 (SfM)](https://en.wikipedia.org/wiki/Structure_from_motion) – 从2D图像恢复3D结构的算法'
- en: '[Multi-View Stereo (MVS)](https://en.wikipedia.org/wiki/Multi-view_stereo)
    – Dense reconstruction algorithm'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[多视图立体 (MVS)](https://en.wikipedia.org/wiki/Multi-view_stereo) – 密集重建算法'
- en: '[Bundle Adjustment](https://en.wikipedia.org/wiki/Bundle_adjustment) – Optimization
    technique for camera poses and 3D points'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[捆绑调整](https://en.wikipedia.org/wiki/Bundle_adjustment) – 用于相机姿态和3D点的优化技术'
- en: '[FLANN (Fast Library for Approximate Nearest Neighbors)](https://github.com/flann-lib/flann)
    – Fast matching algorithm for feature descriptors'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[FLANN (快速近似最近邻库)](https://github.com/flann-lib/flann) – 用于特征描述符的快速匹配算法'
- en: About the author
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于作者
- en: '[**Florent Poux, Ph.D.**](https://medium.com/u/8ba7bf4ad784?source=post_page---user_mention--de393e1f23f4---------------------------------------) *is
    a Scientific and Course Director focused on educating engineers on leveraging
    AI and 3D Data Science. He leads research teams and teaches 3D Computer Vision
    at various universities. His current aim is to ensure humans are correctly equipped
    with the knowledge and skills to tackle 3D challenges for impactful innovations.*'
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Florent Poux, Ph.D.**](https://medium.com/u/8ba7bf4ad784?source=post_page---user_mention--de393e1f23f4---------------------------------------)
    *是一位专注于教育工程师利用AI和3D数据科学的科学和课程总监。他领导研究团队，并在多所大学教授3D计算机视觉。他目前的目的是确保人类能够正确装备知识和技能，以应对3D挑战，实现有影响力的创新。*'
