- en: The Death of Human-Written Code Tutorials in the ChatGPT Era … Or Not?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT时代人类编写代码教程的终结……还是不会？
- en: 原文：[https://towardsdatascience.com/the-death-of-human-written-code-tutorials-in-the-chatgpt-era-or-not-9a437a58a0b2/](https://towardsdatascience.com/the-death-of-human-written-code-tutorials-in-the-chatgpt-era-or-not-9a437a58a0b2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-death-of-human-written-code-tutorials-in-the-chatgpt-era-or-not-9a437a58a0b2/](https://towardsdatascience.com/the-death-of-human-written-code-tutorials-in-the-chatgpt-era-or-not-9a437a58a0b2/)
- en: '![Dear AI, please generate an image of an advanced AI chatbot writing a coding
    tutorial article for people to read.](../Images/0029dc964676dbc12fbde05131cfd5bb.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![亲爱的AI，请生成一张高级AI聊天机器人撰写编程教程文章供人们阅读的图片。](../Images/0029dc964676dbc12fbde05131cfd5bb.png)'
- en: Dear AI, please generate an image of an advanced AI chatbot writing a coding
    tutorial article for people to read.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 亲爱的AI，请生成一张高级AI聊天机器人撰写编程教程文章供人们阅读的图片。
- en: In a world where ChatGPT reigns, one might expect human-written code tutorials
    to fall flat.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT称霸的世界里，人们可能会预期人类编写的代码教程会变得毫无吸引力。
- en: After all, who’s going to read a human-written tutorial on a detailed software
    process, when they can simply ask ChatGPT for precisely the output they want?
    Toss in an advanced LLM subscription and a few advanced prompt engineering techniques,
    and anyone can generate detailed explanations about any topic. Why waste the time
    and effort to research, brainstorm, and write such an article?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，谁会去读一篇关于详细软件流程的人类编写的教程，当他们可以直接向ChatGPT询问他们想要的精确输出呢？再加上高级LLM订阅和几个高级提示工程技巧，任何人都可以就任何主题生成详细的解释。为什么还要浪费时间精力去研究、头脑风暴和撰写这样的文章？
- en: 'Let’s begin with a fundamental question, the answer to which will underpin
    the entirety of my argument: *what exactly is ChatGPT?*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一个问题开始，这个问题的答案将支撑我的整个论点：*ChatGPT究竟是什么？*
- en: Well, ChatGPT, or any large language model (LLM) for that matter, operates via
    a machine learning algorithm that predicts what words should follow an input based
    on training data. What separates an LLM from earlier iterations of language models
    is the sheer size of its training data. ChatGPT’s training, for instance, included
    the Common Crawl data set – [a giant data set that includes billions of web pages](https://www.edureka.co/blog/how-chatgpt-works-training-model-of-chatgpt/).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，ChatGPT，或者更确切地说，任何大型语言模型（LLM），是通过机器学习算法来操作的，该算法根据训练数据预测输入后应跟什么词语。将LLM与早期语言模型版本区分开来的是其训练数据的大小。例如，ChatGPT的训练包括了Common
    Crawl数据集——[这是一个包含数十亿网页的巨型数据集](https://www.edureka.co/blog/how-chatgpt-works-training-model-of-chatgpt/)。
- en: This is crucial to remember. No matter how incredible and seamless these generated
    responses appear, they are fundamentally just a probabilistic prediction grounded
    in prior data. They are the most likely output based on what the model has seen
    before. **They are not novel.**
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点至关重要。无论这些生成的回复看起来多么令人难以置信和无缝，它们本质上只是基于先前数据的概率预测。它们是基于模型之前所见的最可能输出。**它们不是新颖的**。
- en: 'Human creativity, by contrast, often results from new insights – commonly referred
    to as "light-bulb moments." Yes, having prior knowledge helps – but at its core,
    the beauty of these new ideas is that they are precisely that: *new*. When an
    scientist or writer or artist has a rare moment such as this, they’ve hit the
    jackpot.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，人类的创造力往往源于新的见解——通常被称为“灵光一闪”的时刻。是的，拥有先前的知识有帮助——但本质上，这些新想法的美丽之处在于它们确实是：*新的*。当一个科学家、作家或艺术家有如此罕见的时刻时，他们就是中了大奖。
- en: 'Let’s tie this back into the topic at hand: human-written coding tutorials.
    When do people write articles or publish books on a programming topic? Usually,
    for one of the following two reasons:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将这个话题重新引回到手头的主题：人类编写的编程教程。人们通常在什么情况下撰写文章或出版关于编程主题的书籍？通常有以下两个原因：
- en: To offer a new *perspective* on an existing idea. Many tutorials teach the same
    general topic, but with variations in style, approach, or methodology.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了对一个现有想法提供新的*视角*。许多教程教授相同的一般主题，但在风格、方法或方法上有所不同。
- en: To convey a new idea or topic altogether.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了传达全新的想法或主题。
- en: An LLM-generated response can do neither of these.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由LLM生成的回复无法做到这两点。
- en: 'Let’s consider an example. In early 2023, I wrote "4 Essential Techniques You
    Must Learn as a Python Beginner" for Towards Data Science, an article that was
    generally well read and received. Below, I’ve inserted two excerpts:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个例子。在2023年初，我为Towards Data Science撰写了“作为Python初学者必须学习的4个基本技巧”一文，这篇文章普遍受到好评。下面，我插入了两段摘录：
- en: The section on lambda functions from the article I actually wrote.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我实际撰写的关于lambda函数的部分。
- en: The section on lambda functions as written by ChatGPT-4o after I provided the
    necessary details and requested the associated content.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT-4o在我提供必要细节并请求相关内容后撰写的关于lambda函数的部分。
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Example 1: A Lambda Tutorial by a Human'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例1：由人类撰写的Lambda教程
- en: Let’s say you are working with some data in a Jupyter notebook, just doing some
    quick exploration and analysis. You’re still in the early stages of data cleaning
    and processing, far from any production-ready models or visualizations or applications.
    But you do have a deadline to meet, so you’re exploring quickly and efficiently,
    making use of your stellar Python skills.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在Jupyter笔记本中处理一些数据，只是做一些快速探索和分析。你仍然处于数据清洗和处理的早期阶段，远未达到任何生产就绪的模型、可视化或应用。但你有一个截止日期要遵守，所以你快速而高效地探索，充分利用你的卓越Python技能。
- en: In the midst of your adventures, you come across a column in your data that
    requires transformation. You just need to square the numbers in the column. It’s
    nothing crazy, but it’s unfortunately also one of those weird necessities that
    is simple enough to be quick, but complex enough to not have its own built-in
    function.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的冒险过程中，你发现数据中的一个列需要转换。你只需要将该列中的数字平方。这并不疯狂，但遗憾的是，这也是那些简单到足以快速完成，但复杂到没有内置函数的奇怪需求之一。
- en: 'So, you decide to use pandas’s `apply` function to transform the data column
    using your own, custom function. To do this, you need to write a function that
    squares numbers, and you do so in the only way you know how:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你决定使用pandas的`apply`函数通过你自己的自定义函数转换数据列。为此，你需要编写一个平方数字的函数，而你正是这样做的：
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This gets the job done, but it’s a little annoying and messy, especially for
    a Jupyter notebook. It doesn’t meld well with the one-line structure of most pandas
    operations, and accordingly won’t look very nice when your colleagues review your
    notebook.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了任务，但有点令人烦恼和杂乱，尤其是在Jupyter笔记本中。它与大多数pandas操作的单一行结构不太融合，因此当你的同事审查你的笔记本时，看起来可能不太美观。
- en: 'But do not despair, my friend, for the lambda function is here to save you.
    **Lambda functions –** or, more generally, anonymous functions – provide an alternative
    way to define functions in Python. And the best part is, you can write them in
    a single line! This is most easily seen via example:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 但不要绝望，我的朋友，因为lambda函数就在这里来救你。**Lambda函数**——或者更普遍地说，匿名函数——为在Python中定义函数提供了一种替代方法。最好的部分是，你可以一行写出它们！这最容易通过示例来展示：
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The above code is identical to our earlier definition of this function. Here
    are a few things you should know:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码与我们的早期函数定义完全相同。以下是一些你应该知道的事情：
- en: The `lambda` keyword is analogous to the `def` keyword, letting Python know
    we want to define a function.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`lambda`关键字与`def`关键字类似，让Python知道我们想要定义一个函数。'
- en: The parameters for lambda functions are to the left of the colon, and the return
    statement is to the right of the colon (and doesn’t actually use the `return`
    keyword).
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: lambda函数的参数位于冒号的左侧，返回语句位于冒号的右侧（实际上并不使用`return`关键字）。
- en: We don’t have to give the function a name, but if we wish to do so, we can do
    it using variable assignment.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们不必给函数命名，但如果我们愿意，我们可以通过变量赋值来实现。
- en: That last point is key. Using lambda functions lets us define a function and
    call it or pass it in as an argument to another function without ever having to
    give it a name. Let’s illustrate this by returning to our previous example and
    making it concrete.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点是关键。使用lambda函数让我们能够定义一个函数，而无需给它命名，就可以调用它或将它作为参数传递给另一个函数。让我们通过回到我们之前的示例并使其具体化来展示这一点。
- en: 'Let’s imagine we have the DataFrame `my_df` below, containing three people’s
    salaries:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设我们有一个名为`my_df`的DataFrame，其中包含三个人的薪水：
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'In this ridiculously idealistic world, employers have just announced that everyone’s
    salaries will be *squared*. We can update our DataFrame in a single line by using
    a lambda function:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个荒谬的理想主义世界中，雇主刚刚宣布每个人的薪水都将被**平方**。我们可以通过使用lambda函数在一行内更新我们的DataFrame：
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: And voila – endless riches! Perhaps a bit dramatic, but hopefully you will now
    remember what lambda functions are and how to use them. If you would like a more
    detailed discussion on their nuances and subtleties, I recommend checking out
    my [two-part article series that discusses lambda functions in great detail](https://towardsdatascience.com/whats-in-a-lambda-c8cdc67ff107).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 哇哦——无尽的财富！或许有点夸张，但希望你现在能记住 lambda 函数是什么以及如何使用它们。如果你想更详细地了解它们的细微差别，我建议查看我的[两篇详细讨论
    lambda 函数的文章系列](https://towardsdatascience.com/whats-in-a-lambda-c8cdc67ff107)。
- en: '* * *'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Example 2: A Lambda Tutorial by a Large Language Model'
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例 2：大型语言模型编写的 Lambda 教程
- en: '***Prompt**: I am writing an article called "4 Essential Techniques You Must
    Learn as a Python Beginner" for the publication Towards Data Science on Medium.
    The 4 topics I will cover are 1) lambda functions, 2) list comprehensions, 3)
    continue and break statements, and 4) user input. Can you generate the section
    on lambdas for me? It should be about 300 words, consist of an example, and have
    a personable tone without being too casual.*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '***提示：**我正在为 Medium 上的 Towards Data Science 出版物撰写一篇名为 "4 Essential Techniques
    You Must Learn as a Python Beginner" 的文章。我将涵盖的 4 个主题是 1) lambda 函数，2) 列推导式，3)
    continue 和 break 语句，以及 4) 用户输入。你能为我生成关于 lambda 函数的部分吗？它应该大约 300 字，包含一个示例，并且要有亲切的语气，但不要过于随意。*'
- en: 'Lambda Functions: Unlocking Python’s Anonymous Heroes'
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Lambda 函数：解锁 Python 的匿名英雄
- en: 'Lambda functions, also known as anonymous functions, are one of Python’s most
    flexible tools. While they might sound intimidating at first, their purpose is
    simple: to create small, single-use functions without the need for the usual `def`
    keyword or a function name. Think of them as quick, disposable tools in your Python
    toolbox.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Lambda 函数，也称为匿名函数，是 Python 最灵活的工具之一。虽然一开始可能听起来有些令人生畏，但它们的目的是简单的：创建小型、单次使用的函数，无需使用常规的
    `def` 关键字或函数名。把它们想象成你的 Python 工具箱中的快速、一次性工具。
- en: 'Let’s break it down. A lambda function is defined with the keyword `lambda`,
    followed by the parameters, a colon, and the expression to evaluate. Here’s the
    syntax:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解一下。使用关键字 `lambda` 定义一个 lambda 函数，后面跟着参数，一个冒号，以及要评估的表达式。以下是语法：
- en: '`lambda parameters: expression`'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '`lambda 参数: 表达式`'
- en: Why use them? Lambda functions shine in situations where you need a simple function
    for a short period, such as when working with built-in functions like `map()`,
    `filter()`, or `sorted()`.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么使用它们？Lambda 函数在需要短期使用简单函数的情况下表现出色，例如当与内置函数 `map()`、`filter()` 或 `sorted()`
    一起工作时。
- en: 'Here’s an example to illustrate:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个示例来展示：
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Output:** `[(1, ''apple''), (3, ''banana''), (2, ''cherry'')]`'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出结果：** `[(1, ''apple''), (3, ''banana''), (2, ''cherry'')]`'
- en: 'In this snippet, the lambda function `lambda x: x[1]` extracts the second element
    of each tuple, allowing `sorted()` to arrange the data alphabetically.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '在这个片段中，lambda 函数 `lambda x: x[1]` 提取每个元组的第二个元素，使 `sorted()` 能够按字母顺序排列数据。'
- en: 'While lambda functions are incredibly handy, they come with a caveat: readability.
    Overusing them or cramming complex logic into a lambda can make your code harder
    to understand. When your logic gets more complex, it’s better to stick to regular
    functions with descriptive names.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 lambda 函数非常方便，但它们也有一个缺点：可读性。过度使用它们或在 lambda 函数中塞入复杂的逻辑会使你的代码更难以理解。当你的逻辑变得更加复杂时，坚持使用具有描述性名称的常规函数会更好。
- en: In essence, lambda functions are a quick way to write short, throwaway code.
    As a beginner, mastering them will not only make your code cleaner but also help
    you better understand how Python embraces simplicity and power.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，lambda 函数是编写简短、一次性代码的快捷方式。作为一个初学者，掌握它们不仅会使你的代码更整洁，而且有助于你更好地理解 Python 如何拥抱简洁和强大。
- en: '* * *'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Let’s break down some important differences between these two excerpts. In each
    bullet that follows, I describe the difference, and then explain why it is important.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析这两段之间的一些重要差异。在下面的每个要点中，我描述了差异，然后解释为什么它很重要。
- en: 'The human version opens with a motivating problem, whereas the AI version gets
    straight into definitions. **People love examples.** They make difficult concepts
    easier to understand and make writing more engaging. It’s worth pointing out that
    you could *ask* an AI to start with an example, but that misses the fundamental
    point: unlike high-quality human writers, AI by default does not know how to effectively
    curate and fine tune writing to achieve the best results with varied audiences.
    Not starting this particular excerpt with a motivating opening is just one example
    of this broader reality.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类版本以一个激励性问题开头，而AI版本则直接进入定义。**人们喜欢例子。** 它们使难以理解的概念更容易理解，并使写作更具吸引力。值得指出的是，你可以**要求**AI从一个例子开始，但这忽略了基本点：与高质量的人类作家不同，AI默认不知道如何有效地编辑和调整写作以适应不同的受众群体。这个特定的摘录没有以激励性的开头开始，只是这个更广泛现实的一个例子。
- en: The AI-generated version fails to address the fact that lambda functions *can*
    be assigned to a variable if one wishes to reuse them, and also confines them
    to a single use with the sentence, "In essence, lambda functions are a quick way
    to write short, throwaway code." **Both of these flaws – the former an omission
    of important information, and the latter a needlessly absolutist statement – have
    the potential to mislead the novice programmers who are often the target audience
    for code tutorials.** A reader should be aware that there is a way to prevent
    lambda functions from immediately disappearing, and they should also understand
    that while lambdas can *sometimes* be used as a throw-away functions, they can
    also be a useful tool in certain programming environments (such as within a [functional
    paradigm](https://en.wikipedia.org/wiki/Functional_programming)). Or, even if
    the details of this are unnecessary to describe for beginners, a tutorial definitely
    should not explicitly state that lambdas are essentially always throw-away functions.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI生成的版本未能解决lambda函数**可以**被分配给变量以供重用的事实，并且将它们限制在单次使用中，句子说，“本质上，lambda函数是编写简短、一次性代码的快捷方式。”
    **这两个缺陷——前者是重要信息的遗漏，后者是一个不必要的绝对陈述——有可能误导那些通常是代码教程目标受众的新手程序员。** 读者应该意识到有一种方法可以防止lambda函数立即消失，他们也应该理解虽然lambda函数**有时**可以用作一次性函数，但在某些编程环境中（如[函数式编程](https://en.wikipedia.org/wiki/Functional_programming)中）它们也可以是一个有用的工具。或者，即使这些细节对初学者来说可能不必要描述，教程绝对不应该明确指出lambda函数本质上总是一次性函数。
- en: Something about the writing in the AI version *feels* off, but it is difficult
    to pinpoint what exactly that is at first glance. **If you were to read and break
    down the two excerpts carefully – as one might do in a writing/rhetoric course
    – you would realize that the human version flows better and is easier to follow.**
    The reason for this is that the human version revolves around a single thread
    – working with a data set and using lambda functions to accomplish a specific
    goal more effectively – which stretches through the entire excerpt. Everything
    else, including the core content about lambdas, is structured around that. By
    contrast, the AI version is a collection of loosely connected facts with an example.
    The important thing here is that even though the average reader isn’t going to
    break down the text in this way; they will subconsciously notice if something
    *feels* off, and it will impact their learning and retention negatively.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在AI版本中的写作感觉有些不对劲，但一开始很难确切指出是什么地方。**如果你仔细阅读并分析这两段摘录——就像在写作/修辞课程中可能会做的那样——你会意识到人类版本的表达更流畅，更容易理解。**
    这是因为人类版本围绕一个单一的线索展开——与数据集一起工作，并使用lambda函数更有效地实现特定目标——这一线索贯穿整个摘录。其他所有内容，包括关于lambda的核心内容，都是围绕这一点构建的。相比之下，AI版本是一系列松散相连的事实和例子。这里重要的是，尽管普通读者不太可能以这种方式分解文本；但他们会在潜意识中注意到如果有什么地方感觉不对劲，这将对他们的学习和记忆产生负面影响。
- en: There are other differences as well, such as the lack of an example with an
    actual dataset in the GPT version. Such differences are not as severe – as they
    can be corrected with some prompting adjustments – but are still worth noting
    as an example of how AI often struggles with nuance and subtlety in its responses.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 还有一些其他的不同之处，比如GPT版本中缺少一个实际数据集的例子。这些差异并不那么严重——它们可以通过一些提示调整来纠正——但仍然值得注意，作为AI在回应中经常难以处理细微差别和微妙之处的例子。
- en: This brings me to my main point. It has been stated time and again that human
    creativity is not replaceable by machines. Here, I argue that same point, but
    in the specific context of this article. Why do we need human creativity specifically
    for coding tutorials?
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我回到了我的主要观点。人们一次又一次地声明，人类的创造力是无法被机器取代的。在这里，我同样提出这个观点，但是在本文的具体背景下。为什么我们需要人类的创造力来编写编程教程？
- en: '***Because a human walks you through the process as you are – a living, thinking,
    person trying to learn a confusing new concept – whereas a machine will at best
    give you just what it is, facts and no emotion or passion.***'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '***因为人类会像你一样引导你通过这个过程——一个活生生的、思考的、试图学习一个令人困惑的新概念的个体——而机器至多只能给你它所拥有的，事实和没有情感或激情。***'
- en: And these things matter, despite not appearing so at the surface. "Emotion"
    and "passion" may seem like words far removed from code, but each of the examples
    from my lambda example above fall under their banner. We just don’t always pay
    attention. Machines may feign emotion and passion with weighted words and a slew
    of adjectives, but at the end of the day, their writing simply won’t be the same.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然表面上看起来并不明显，但这些事情很重要。“情感”和“激情”这两个词可能看起来与代码相去甚远，但上面提到的我的lambda示例中的每一个例子都落在这两个词的范畴之下。我们只是没有总是注意到。机器可能会用加权的词汇和一系列形容词来假装情感和激情，但最终，它们的写作根本不会一样。
- en: And sometimes, that’s fine. I’ll be the first to admit it. If you just need
    some basic Python code to do a task – then fine, use ChatGPT. But this is fundamentally
    the same as going on Stack Overflow and copy-pasting code – we have been doing
    it for years, but we did not pretend such resources rendered coding tutorials
    obsolete. Why? Because these tutorials fill in the gaps that resources like this
    don’t give us. Long, detailed walk-throughs, not just with the common mistakes
    that GPT gives, but often the exact mistakes you run into when coding. Meaningful
    problems, not just with the example data that Claude generates, but with a real,
    fundamental issue a human was working on. And passionate writing, not just with
    the dry and fact-based directions Gemini provides, but with the same emotional
    investment in the task at hand that you yourself have. A human-written tutorial
    will give you these things.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，这很正常。我首先承认这一点。如果你只需要一些基本的Python代码来完成一个任务——那么没问题，使用ChatGPT。但这本质上与去Stack Overflow复制粘贴代码是一样的——我们多年来一直在做，但我们并没有假装这样的资源使编程教程变得过时。为什么？因为这些教程填补了这些资源没有给我们填补的空白。长篇大论的详细说明，不仅仅是GPT给出的常见错误，而且经常是你在编码时遇到的精确错误。有意义的问题，不仅仅是Claude生成的示例数据，而是人类正在解决的真实、基本问题。以及充满激情的写作，不仅仅是Gemini提供的枯燥和基于事实的指导，而是对当前任务的同样情感投入，就像你自己一样。一个由人类编写的教程会给你这些。
- en: AI will not.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: AI不会。
- en: This is not a limitation, but rather an opportunity. An opportunity for writers
    and readers of publications like Towards Data Science, if only we take a moment
    to recognize what it is we valued in the first place.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是限制，而是一个机会。对于像《数据科学向导》这样的出版物，如果我们花点时间认识到我们最初所重视的东西，那么这确实是一个值得追求的目标。
- en: And that, I think, is a worthy endeavor indeed.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为，这确实是一项值得追求的事业。
