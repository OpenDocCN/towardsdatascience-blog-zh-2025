- en: 'Understanding Emergent Capabilities in LLMs: Lessons from Biological Systems'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解大型语言模型中的涌现能力：从生物系统中学到的经验
- en: 原文：[https://towardsdatascience.com/understanding-emergent-capabilities-in-llms-lessons-from-biological-systems-d59b67ea0379/](https://towardsdatascience.com/understanding-emergent-capabilities-in-llms-lessons-from-biological-systems-d59b67ea0379/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/understanding-emergent-capabilities-in-llms-lessons-from-biological-systems-d59b67ea0379/](https://towardsdatascience.com/understanding-emergent-capabilities-in-llms-lessons-from-biological-systems-d59b67ea0379/)
- en: '![Image by Michaela. Pixabay.com](../Images/faf10713b1fbb4db4ed30ee8122dcdf6.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Michaela提供的图片。Pixabay.com](../Images/faf10713b1fbb4db4ed30ee8122dcdf6.png)'
- en: Image by Michaela. Pixabay.com
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由Michaela提供的图片。Pixabay.com
- en: '*Note: This article presents key findings from our recent research paper, "A
    non-ergodic framework for understanding emergent capabilities in Large Language
    Models" [[link1](https://openreview.net/forum?id=glHw8AKwqD&noteId=glHw8AKwqD)]
    [[link2](https://arxiv.org/abs/2501.01638)]. While the paper offers a comprehensive
    mathematical framework and detailed experimental evidence, this post aims to make
    these insights accessible to a broader audience.*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：本文展示了我们最近的研究论文“理解大型语言模型中涌现能力的一种非遍历框架”的关键发现 [[链接1](https://openreview.net/forum?id=glHw8AKwqD&noteId=glHw8AKwqD)]
    [[链接2](https://arxiv.org/abs/2501.01638)]。虽然该论文提供了一个全面的数学框架和详细的实验证据，但本文旨在将这些见解普及给更广泛的受众。*'
- en: However, how many kinds of sentence are there? Say assertion, question and command?
    There are countless kinds; countless different kinds of use of all the things
    we call "signs", "words", "sentences". Furthermore, this diversity is not something
    fixed, given once for all; but new types of language, new language-games, as we
    may say, come into existence, and others become obsolete and get forgotten. We
    can get a rough picture of this from the changes in mathematics.
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然而，有多少种句子类型呢？比如陈述句、疑问句和祈使句？种类繁多；无数种不同的使用方式，所有我们称之为“符号”、“词语”、“句子”的东西。此外，这种多样性并非一成不变，而是不断变化的；新的语言类型、新的语言游戏，正如我们可能说的那样，不断出现，而其他类型则变得过时并被遗忘。我们可以从数学的变化中大致了解这一点。
- en: ''
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ludwing Wittgenstein, Philosophical investigations, first. publ. in 1953, 4th
    ed. 2009, Wiley-Blackwell, UK
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 鲁道夫·维特根斯坦，《哲学研究》，首次出版于1953年，第四版2009年，Wiley-Blackwell，英国
- en: Motivation
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: I remember the summer of 2006 vividly. As I sat at my desk, surrounded by stacks
    of papers on innovation management theory and the logic of invention, my research
    had hit a wall. The econometric frameworks for understanding how innovation emerges
    in organizations felt mechanical and out-of-date. I was missing something essential
    about how new possibilities arise from existing capabilities. That’s when I first
    found Stuart Kauffman’s book ‘Investigations’ ¹. Its ambitious subtitle—"The Nature
    of autonomous agents and the worlds they mutually create"—is both appealing and
    spooky. When I finally began reading, I found myself drawn into Kauffman’s exploration
    of how complex biological systems perpetually generate novelty. His central idea,
    the "adjacent possible," described how each new innovation in biological systems
    opens up new possibilities, creating an ever-expanding space of potential futures.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我清晰地记得2006年的夏天。当我坐在办公桌前，周围堆满了关于创新管理理论和发明逻辑的论文时，我的研究遇到了瓶颈。理解创新如何在组织中出现的计量经济学框架感觉机械且过时。我缺失了关于新可能性如何从现有能力中产生的关键信息。就在那时，我第一次发现了Stuart
    Kauffman的书籍《调查》¹。其雄心勃勃的副标题——“自主代理的本质以及它们共同创造的世界”——既吸引人又令人不安。当我最终开始阅读时，我发现自己在Kauffman对复杂生物系统如何不断产生新颖性的探索中陷入了沉思。他的核心思想“相邻可能”描述了生物系统中的每一次新创新如何开辟新的可能性，创造一个不断扩展的潜在未来空间。
- en: The idea wouldn’t let me go. Kauffman’s mathematical framework for understanding
    how biological systems explore and expand their possibility spaces through restricted
    combinations of existing elements rather than random search felt profound. It
    opened a path to think about innovation not as a linear process but as an organic
    expansion of possibilities.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法让我无法释怀。Kauffman理解生物系统如何通过现有元素的有限组合而不是随机搜索来探索和扩展其可能性空间，这一数学框架让我深感深刻。它开辟了一条思考创新不是线性过程，而是可能性有机扩展的路径。
- en: Fast forward to 2024\. The rise of increasingly sophisticated large language
    models such as GPT 4o or Claude 3.5\. Current research primarily emphasizes empirical
    observations and scaling laws—regularities found in the empirical analysis of
    LLM as well as in many real-world complex systems describing how system’s properties
    change with size. But prevailing approaches still struggle to explain the real
    large language model’s behavior. Fulfilling the promises of superintelligence
    and AGI will require a clear response to the question of how edge models work.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 快进到2024年。越来越复杂的大型语言模型如GPT 4o或Claude 3.5的兴起。当前研究主要强调经验观察和扩展定律——在LLM的经验分析以及许多描述系统属性随规模变化的现实世界复杂系统中发现的规律性。但主流方法仍然难以解释真实大型语言模型的行为。要实现超级智能和AGI的承诺，需要明确回答边缘模型是如何工作的这个问题。
- en: Theoretical physics (and theoretical biology too), in its effort to understand
    a natural process’s essence without accessories, finds that things become more
    symmetrical, more similar, and more indistinguishable. This simplifies the development
    of mathematically simpler and more comprehensible models. Hilbert asserted that
    all reality can be expressed mathematically, and ultimately, it is geometric in
    nature. According to him, physics can be articulated using geometry. I’m convinced
    this vision can be very useful when trying to understand large language models.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 理论物理学（以及理论生物学也是如此），在努力理解自然过程的本质而不依赖辅助工具时，发现事物变得更加对称、更加相似、更加难以区分。这简化了数学上更简单、更易于理解的模型的发展。希尔伯特断言，所有现实都可以用数学表达，最终，它具有几何性质。根据他的观点，物理学可以用几何来阐述。我相信这种观点在尝试理解大型语言模型时非常有用。
- en: The way these AI systems seem to develop new capabilities—not gradually but
    through sudden transitions—reminded me of Kauffman’s ideas of how biological systems
    evolve. Could the same theoretical framework that helped explain the expansion
    of biological possibility spaces help us understand how large language models
    develop their capabilities?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这些AI系统似乎发展新能力的方式——不是逐渐发展，而是通过突然的过渡——让我想起了Kauffman关于生物系统演化的观点。同样的理论框架是否有助于解释生物可能性空间的扩展，从而帮助我们理解大型语言模型是如何发展其能力的？
- en: 'Emergence in complex systems: when the whole becomes more than its parts'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 复杂系统中的涌现：当整体大于其部分时
- en: When OpenAI released GPT-4o, something unexpected happened. The model didn’t
    just get marginally better at existing tasks—it suddenly showed entirely new capabilities
    that weren’t explicitly programmed into it. This aspect, where complex behaviors
    arise unexpectedly from simpler rules and interactions, in physics is called "emergence"
    and plays a central role in describing, with simple rules, complex systems. But
    to understand why this is so significant for AI, we need to first understand how
    emergence works in complex systems.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当OpenAI发布GPT-4o时，发生了一些意想不到的事情。该模型不仅在现有任务上有所改进，而且突然展现出了它没有明确编程的新能力。这一方面，即复杂行为意外地从简单的规则和相互作用中产生，在物理学中被称为“涌现”，在用简单规则描述复杂系统方面起着核心作用。但为了理解这对AI为何如此重要，我们首先需要理解涌现如何在复杂系统中工作。
- en: A complex system isn’t just complicated or messy—it has specific properties
    that make it fundamentally different from other systems. Think of the difference
    between an automatic Swiss watch and an ant colony. A watch, though sophisticated,
    behaves in predictable ways that can be understood by analyzing its parts. Ant
    colony dynamics, however, show behaviors that can’t be predicted just by analyzing
    individual ants movements.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 一个复杂系统不仅仅是复杂或混乱的——它具有使它与其他系统根本不同的特定特性。想想自动瑞士手表和蚁群之间的差异。手表虽然复杂，但其行为可以通过分析其部分来预测和理解。然而，蚁群动力学显示的行为，仅通过分析单个蚂蚁的运动是无法预测的。
- en: 'Complex systems share three key properties: non-linear interactions between
    components, spontaneous self-organization at critical points, and the emergence
    of new properties at different scales.'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 复杂系统具有三个关键特性：组件之间的非线性相互作用、在临界点上的自组织，以及在不同尺度上出现的新特性。
- en: '![Figure 1\. Avalanche dynamics in sand piles can be explained with self-organized
    critically theory (SOC). As grains are added, the pile maintains a stable slope
    until reaching a critical point where additional grains trigger avalanches. Similarly,
    language models exhibit SOC behavior: attention patterns maintain stable distributions
    until critical points where sudden reorganizations cascade through the network,
    leading to new emergent capabilities. These reorganizations show scale-free distributions
    characteristic of criticality, with attention weights shifting from uniform to
    specialized patterns across multiple network layers. Illustration by author.](../Images/c5cf8d7b19be55fa2b7f315f7194df2a.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图1. 沙堆中的雪崩动力学可以用自组织临界理论（SOC）来解释。随着沙粒的添加，沙堆保持一个稳定的斜率，直到达到一个临界点，此时额外的沙粒会引发雪崩。同样，语言模型表现出SOC行为：注意力模式保持稳定的分布，直到达到临界点，此时突然的重组织通过网络级联，导致新的涌现能力。这些重组织显示出临界性的无尺度分布特征，注意力权重从均匀模式转变为多个网络层中的专业模式。插图由作者绘制。](../Images/c5cf8d7b19be55fa2b7f315f7194df2a.png)'
- en: '**Figure 1**. Avalanche dynamics in sand piles can be explained with self-organized
    critically theory (SOC). As grains are added, the pile maintains a stable slope
    until reaching a critical point where additional grains trigger avalanches. Similarly,
    language models exhibit SOC behavior: attention patterns maintain stable distributions
    until critical points where sudden reorganizations cascade through the network,
    leading to new emergent capabilities. These reorganizations show scale-free distributions
    characteristic of criticality, with attention weights shifting from uniform to
    specialized patterns across multiple network layers. Illustration by author.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**. 沙堆中的雪崩动力学可以用自组织临界理论（SOC）来解释。随着沙粒的添加，沙堆保持一个稳定的斜率，直到达到一个临界点，此时额外的沙粒会引发雪崩。同样，语言模型表现出SOC行为：注意力模式保持稳定的分布，直到达到临界点，此时突然的重组织通过网络级联，导致新的涌现能力。这些重组织显示出临界性的无尺度分布特征，注意力权重从均匀模式转变为多个网络层中的专业模式。插图由作者绘制。'
- en: In complex systems, changes do not happen gradually. At certain moments, small
    changes lead to sudden qualitative shifts—what physicists call phase transitions.
    The classic example is water turning to ice. No matter how slowly you decrease
    the temperature, at exactly 0°C, water molecules suddenly realign into a crystalline
    structure (to be precise, below 4°C, water molecules start to form isolated crystals).
    These transitions follow a mathematical pattern.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在复杂系统中，变化不是逐渐发生的。在某个时刻，小的变化会导致突然的质变——物理学家称之为相变。经典的例子是水变成冰。无论你如何缓慢地降低温度，在恰好0°C时，水分子会突然重新排列成晶体结构（更准确地说，在4°C以下，水分子开始形成孤立的晶体）。这些转变遵循数学模式。
- en: 'When a system approaches a critical point, certain quantities follow a power
    law that can be mathematically described as ξ ~ |T – Tₖ|^(-ν), where T is the
    system parameter (like temperature), Tₖ is the critical point, and ν is a critical
    exponent. This equation tells us something fundamental: emergence often happens
    through sudden reorganizations at specific critical points, not through gradual
    improvement. In physics, phase transitions are related to the physics fundamental
    concept of symmetry².'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当系统接近临界点时，某些量遵循幂律，可以用数学公式ξ ~ |T – Tₖ|^(-ν)来描述，其中T是系统参数（如温度），Tₖ是临界点，ν是临界指数。这个方程告诉我们一些基本的东西：涌现通常发生在特定的临界点上的突然重组织，而不是通过逐渐改进。在物理学中，相变与物理基本概念对称性²相关。
- en: When we analyzed how these models develop new capabilities, we found patterns
    similar to phase transitions in physical systems. For example, we observed that
    the ability to solve multi-step mathematical problems doesn’t improve linearly
    with model size. Instead, there’s a critical point where the model suddenly transitions
    from random attempts to structured, step-by-step solutions. But perhaps the most
    surprising aspect of emergence in LLMs is self-organization. Just as birds in
    a flock follow simple local rules that lead to complex collective behavior, neural
    networks develop organized patterns of information processing without explicit
    programming. We can measure this self-organization through the attention patterns
    in transformer models. At critical points, these patterns spontaneously reorganize
    from relatively uniform distributions to highly specialized structures. This reorganization
    happens through sudden transitions that point to the emergence of new capabilities.
    This behavior would explain why traditional statistical measures such as perplexity
    often fail to fully capture the capabilities of the model. Just as measuring the
    average velocity of water molecules wouldn’t predict ice formation, statistical
    metrics can’t capture the complex reorganizations happening within these models.
    Doesn’t this sound a lot like the concept of emergence in complex systems? Does
    this indicate that language models follow the fundamental laws discovered by physicists
    in nature?
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们分析这些模型如何发展新的能力时，我们发现了一些与物理系统中相变相似的图案。例如，我们观察到解决多步数学问题的能力并不随着模型大小的线性增长而提高。相反，存在一个临界点，模型突然从随机尝试过渡到结构化、逐步的解决方案。但也许LLM中出现的最令人惊讶的方面是自我组织。正如一群鸟遵循简单的局部规则导致复杂的集体行为一样，神经网络在没有明确编程的情况下发展出有组织的模式来处理信息。我们可以通过变压器模型中的注意力模式来衡量这种自我组织。在临界点，这些模式自发地从相对均匀的分布重新组织成高度专业化的结构。这种重新组织是通过突然的过渡发生的，这指向了新能力的出现。这种行为可以解释为什么传统的统计度量，如困惑度，往往无法完全捕捉到模型的能力。正如测量水分子的平均速度不能预测冰的形成一样，统计指标无法捕捉这些模型内部发生的复杂重组。这听起来是不是很像复杂系统中的出现概念？这表明语言模型遵循物理学家在自然界发现的根本定律吗？
- en: 'The adjacent possible: from biology to AI'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 相邻可能：从生物学到人工智能
- en: Kauffman’s theory of the adjacent possible³, or TAP, provides a powerful tool
    for analyzing how systems can be both constrained by their current state and perpetually
    creative. In biological systems, each new innovation opens up new possibilities,
    but these possibilities are constrained by what can be reached from the current
    state. Think of the sequence of characters of the word "LOT". The sequence has
    the consonant "L, followed by a vowel "O", and followed by another consonant "T".
    If we keep the consonants, using a binomial coefficient (|P| choose i) where P=[a,e,i,o,u],
    the adjacent possible would lead us to the series LAT, LET, LIT, LOT, LUT. But,
    as far as I know, the word "LUT" is not in the English dictionary (the lexicon).
    It means not all possible adjacent states are reachable.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 凯夫曼的相邻可能理论³，或称TAP，为分析系统如何既受其当前状态的限制，又始终具有创造力提供了一个强大的工具。在生物系统中，每一次新的创新都开辟了新的可能性，但这些可能性受到从当前状态可达到的范围的限制。想想单词“LOT”的字符序列。这个序列有一个辅音“L”，后面跟着一个元音“O”，再后面跟着另一个辅音“T”。如果我们保持辅音，使用二项式系数（|P|
    choose i）其中P=[a,e,i,o,u]，相邻可能将引导我们到系列LAT, LET, LIT, LOT, LUT。但是，据我所知，单词“LUT”不在英语词典（词汇）中。这意味着并非所有可能的相邻状态都是可达到的。
- en: This same principle might apply to how language models develop their capabilities.
    Each new ability emerges not in isolation but from combinations of existing patterns
    and capabilities, constrained by the model’s architecture, training, and context.
    Just as biological systems explore their possibility spaces through restricted
    combinations of existing elements, language models might navigate their semantic
    spaces through constrained exploration of learned patterns.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这个相同的原理可能适用于语言模型发展其能力的方式。每一种新的能力并不是孤立出现的，而是从现有模式和能力的组合中产生，受到模型架构、训练和上下文的限制。正如生物系统通过现有元素的受限组合来探索其可能性空间一样，语言模型可能通过限制性地探索学习到的模式来导航其语义空间。
- en: '![Figure 2\. This pop art composition illustrates the principle of adjacent
    possible transformation through its iterative color variations. The same base
    portrait is reimagined in different color schemes, with each panel building upon
    and diverging from the others—much like how the adjacent possible works in creative
    processes. The artist starts with a single image and explores the "adjacent" color
    possibilities, creating four different interpretations. Image by Javier Rodriguez
    in Pixabay.](../Images/6c6f17ecb4803542c2fa860496bdc930.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图2. 这幅波普艺术作品通过其迭代的色彩变化展示了相邻可能性的转换原理。同一基础肖像以不同的色彩方案重新构想，每个面板都是基于并偏离其他面板——就像相邻可能性在创造性过程中的工作方式。艺术家从一个单一图像开始，探索“相邻”的色彩可能性，创造出四种不同的解读。图片由Javier
    Rodriguez在Pixabay提供。](../Images/6c6f17ecb4803542c2fa860496bdc930.png)'
- en: '**Figure 2**. This pop art composition illustrates the principle of adjacent
    possible transformation through its iterative color variations. The same base
    portrait is reimagined in different color schemes, with each panel building upon
    and diverging from the others—much like how the adjacent possible works in creative
    processes. The artist starts with a single image and explores the "adjacent" color
    possibilities, creating four different interpretations. Image by [Javier Rodriguez](https://pixabay.com/es/users/rosiette-stock-15911/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2706464)
    in [Pixabay](https://pixabay.com/es//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2706464).'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**. 这幅波普艺术作品通过其迭代的色彩变化展示了相邻可能性的转换原理。同一基础肖像以不同的色彩方案重新构想，每个面板都是基于并偏离其他面板——就像相邻可能性在创造性过程中的工作方式。艺术家从一个单一图像开始，探索“相邻”的色彩可能性，创造出四种不同的解读。图片由[Javier
    Rodriguez](https://pixabay.com/es/users/rosiette-stock-15911/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2706464)在[Pixabay](https://pixabay.com/es//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2706464)提供。'
- en: We need to prove three key hypotheses
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们需要证明三个关键假设
- en: 'To test the applicability of the adjacent possible theory to describe LLMs
    behavior, in the above-mentioned paper we developed three hypotheses about how
    language models develop new capabilities:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试相邻可能性理论描述LLMs行为的适用性，在上述论文中，我们提出了关于语言模型如何发展新能力的三个假设：
- en: Capabilities emerge through phase transitions in semantic space, similar to
    how biological systems undergo sudden reorganizations at critical points.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能力通过语义空间中的相变而产生，类似于生物系统在临界点突然重组的方式。
- en: These transitions are shaped by the multiplicative interaction of architectural,
    training, and contextual constraints.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些转变是由架构、训练和上下文约束的乘性交互所塑造的。
- en: The path a model takes through its possibility space fundamentally influences
    its future capabilities, making these systems inherently non-ergodic.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型在其可能性空间中走过的路径从根本上影响了其未来的能力，使得这些系统本质上是非遍历的。
- en: Current research primarily emphasizes empirical observations and scaling laws¹.
    Scaling laws are regularities found in the empirical analysis of LLM as well as
    in many real-world complex systems describing how system’s properties change with
    size. But current approaches still struggle to explain the model’s behavior. The
    challenge becomes particularly evident when we observe that these capabilities
    don’t emerge gradually; they often appear through sudden transitions at certain
    scales. Furthermore, these models show strong dependence on their interaction
    history, suggesting that their behavior might be fundamentally different from
    simple statistical systems.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当前研究主要强调经验观察和扩展定律¹。扩展定律是在LLM的经验分析以及许多描述系统属性随规模变化的现实世界复杂系统中发现的规律性。但当前的方法仍然难以解释模型的行为。当我们观察到这些能力不是逐渐出现，而是在某些尺度上突然通过转变出现时，挑战变得尤为明显。此外，这些模型对其交互历史的强烈依赖表明，它们的行为可能与简单的统计系统根本不同。
- en: 'In nature, some complex biological systems, like developing organisms and ecosystems,
    show similar patterns: capabilities emerge through sudden transitions rather than
    gradual improvements, system behavior depends strongly on historical context,
    and responses change significantly based on the evolution path taken to reach
    a particular state. In this post, we’ll explore some fundamental aspects of language
    model behavior that parallel complex systems in nature. By understanding these
    principles, we can better predict and potentially guide how language models develop
    new capabilities.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在自然界中，一些复杂的生物系统，如发育中的生物和生态系统，表现出类似的模式：能力通过突然转变而不是逐渐改进而产生，系统行为强烈依赖于历史背景，并且根据达到特定状态的演化路径，响应会显著变化。在这篇文章中，我们将探讨一些与自然界中的复杂系统平行的语言模型行为的基本方面。通过理解这些原则，我们可以更好地预测并可能指导语言模型如何发展新的能力。
- en: 'Hypothesis 1\. Non-ergodic systems: the memory effect'
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 假设 1. 非随机游走系统：记忆效应
- en: 'To understand how language models develop capabilities, we first need to address
    a fundamental question: do these models explore their possibility space uniformly
    over time (ergodic behavior), or does their history fundamentally constrain their
    future states (non-ergodic behavior)? Ergodic theory studies the long-term statistical
    behavior of dynamical systems, addressing the long-term statistical behavior of
    these systems⁴. Formally, a system is non-ergodic when its time averages differ
    from its ensemble averages.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解语言模型如何发展能力，我们首先需要解决一个基本问题：这些模型是否在时间上均匀地探索它们的可能性空间（随机游走行为），或者它们的历史从根本上限制了它们的未来状态（非随机游走行为）？随机游走理论研究动力系统的长期统计行为，解决这些系统的长期统计行为⁴。形式上，当系统的时间平均值与其集合平均值不同时，该系统是非随机游走的。
- en: Consider this simple example. Let’s ask the model the question, "What is quantum
    entanglement**?**" but in two different contexts.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这个简单的例子。让我们向模型提出问题，“什么是量子纠缠**？**”，但在两种不同的上下文中。
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '[PRE1]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The same prompt, given to multiple instances of a model (ensemble average),
    produces different results than giving prompts sequentially to a single instance
    (time average). Thus, system future "states" (possible responses) depend critically
    on its history; time averages and ensemble averages diverge. This provides an
    initial argument that LLMs are non-ergodic systems.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 同一个提示，给多个模型实例（集合平均值）的结果与依次给单个实例提示（时间平均值）的结果不同。因此，系统的未来“状态”（可能的响应）关键取决于其历史；时间平均值和集合平均值发散。这提供了一个初步论据，表明大型语言模型是非随机游走系统。
- en: '![Figure 3\. Ergodic vs. non-ergodic system response to the prompt "What is
    quantum entanglement?". In an ergodic system, time averages equal ensemble averages:
    as t → ∞, the system explores the entire state space uniformly, making all response
    states equally accessible regardless of initial conditions or path taken. In a
    non-ergodic system, time and ensemble averages diverge: as t → ∞, the system''s
    trajectory remains constrained to a subset of the total phase space determined
    by its history. The system breaks ergodicity by forming distinct basins of attraction
    in the response space. These basins are created by previous prompts (context),
    which create path-dependent constraints that persist indefinitely and irreversibily,
    preventing the system from exploring certain regions of the state space, even
    in the infinite time limit. This behavior is characteristic of systems showing
    strong history-dependence and non-Markovian dynamics⁵, where the system''s evolution
    depends not just on its current state but on its entire trajectory through the
    phase space. Figure by author.](../Images/0d3e15612f1dd591496514c17c9b9f89.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图 3. 随机游走系统与非随机游走系统对“什么是量子纠缠？”这一提示的反应。在随机游走系统中，时间平均值等于集合平均值：当 t → ∞ 时，系统均匀地探索整个状态空间，使得所有响应状态无论初始条件或路径如何都同样可访问。在非随机游走系统中，时间和集合平均值发散：当
    t → ∞ 时，系统的轨迹仍然被其历史所决定的整个相空间的一个子集所限制。系统通过在响应空间中形成不同的吸引域来打破随机游走性。这些吸引域是由之前的提示（上下文）创造的，它们创建了路径相关的约束，这些约束无限期且不可逆地持续存在，阻止系统探索状态空间中的某些区域，即使在无限时间极限下也是如此。这种行为是具有强烈历史依赖性和非马尔可夫动力学⁵的系统所特有的，其中系统的演化不仅取决于其当前状态，还取决于其通过相空间的整个轨迹。图由作者绘制。](../Images/0d3e15612f1dd591496514c17c9b9f89.png)'
- en: '**Figure 3.** Ergodic vs. non-ergodic system response to the prompt "What is
    quantum entanglement?**"**. In an ergodic system, time averages equal ensemble
    averages: as t → ∞, the system explores the entire state space uniformly, making
    all response states equally accessible regardless of initial conditions or path
    taken. In a non-ergodic system, time and ensemble averages diverge: as t → ∞,
    the system’s trajectory remains constrained to a subset of the total phase space
    determined by its history. The system breaks ergodicity by forming distinct basins
    of attraction in the response space. These basins are created by previous prompts
    (context), which create path-dependent constraints that persist indefinitely and
    irreversibily, preventing the system from exploring certain regions of the state
    space, even in the infinite time limit. This behavior is characteristic of systems
    showing strong history-dependence and non-Markovian dynamics⁵, where the system’s
    evolution depends not just on its current state but on its entire trajectory through
    the phase space. Figure by author.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3.** 遍历与非遍历系统对提示“什么是量子纠缠？”的响应**。在遍历系统中，时间平均等于集合平均：当t → ∞时，系统均匀地探索整个状态空间，使得所有响应状态无论初始条件或路径如何都同样可访问。在非遍历系统中，时间和集合平均发散：当t
    → ∞时，系统的轨迹仍然被其历史所决定的整个相空间的一个子集所限制。系统通过在响应空间中形成不同的吸引域来打破遍历性。这些吸引域是由先前的提示（上下文）创建的，它们创建了路径相关的约束，这些约束无限期且不可逆地持续存在，阻止系统探索状态空间中的某些区域，即使在无限时间极限下也是如此。这种行为是表现出强烈的历史依赖性和非马尔可夫动力学⁵的系统特征，其中系统的演化不仅取决于其当前状态，还取决于其通过相空间的整个轨迹。图由作者绘制。'
- en: In our experiments, we measured this effect systematically across different
    models. When we tracked how models solved complex problems, we found that some
    models showed an imporant difference in their solution paths depending on the
    previous context. Even more telling, the length and style of their responses varied
    by up to several steps (more than 10) on average when we changed the order of
    information presented.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的实验中，我们系统地测量了这种效应在不同模型上的表现。当我们追踪模型解决复杂问题的方式时，我们发现某些模型在解决方案路径上显示出根据先前上下文的重要差异。更有说服力的是，当我们改变呈现信息的顺序时，它们的响应长度和风格平均变化了几个步骤（超过10个）。
- en: 'Our experimental results indicate the large language models share three fundamental
    properties with non-ergodic systems:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实验结果表明，大型语言模型与非遍历系统共享三个基本属性：
- en: '**Path-dependent state space:** In contrast to a gas molecule that eventually
    explores all potential states no matter the initial conditions, language models
    show constrained exploration patterns. Each interaction effectively modifies the
    model’s next toke accessible state space. This is why the same prompt can lead
    to different solutions depending on previous interactions—the model isn’t exploring
    all possible responses but rather following paths shaped by its interaction history.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**路径相关的状态空间**：与最终无论初始条件如何都会探索所有潜在状态的气体分子不同，语言模型表现出受限的探索模式。每次交互实际上都会修改模型下一个可访问状态空间。这就是为什么相同的提示可以根据先前的交互导致不同的解决方案——模型不是在探索所有可能的响应，而是在遵循由其交互历史塑造的路径。'
- en: '**Time-ensemble inequivalence:** Another defining feature of non-ergodic systems
    is that averaging over time produces different results than averaging over multiple
    instances. We observed this directly: running the same sequence of prompts multiple
    times (ensemble average) produced significantly different results than running
    different prompt sequences over time (time average). This inequivalence is a key
    property of non-ergodic systems.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间平均不等价性**：非遍历系统的另一个定义特征是，随时间平均的结果与在多个实例上平均的结果不同。我们直接观察到这一点：多次运行相同的提示序列（集合平均）产生的结果与随时间运行不同的提示序列（时间平均）产生的结果显著不同。这种不等价性是非遍历系统的一个关键属性。'
- en: '![Figure 4\. Entropy-performance relationship across different model architectures,
    showing how attention distribution patterns correlate with problem-solving capabilities.
    The x-axis shows attention entropy (measuring how evenly attention is distributed),
    while the y-axis shows performance on complex tasks. GPT2-xl (green) operates
    at higher entropy (~1.7) with better performance (0.15–0.20), revealing more distributed
    attention patterns. In contrast, opt-1.3b and pythia-1.4b show lower entropy (1.3–1.4)
    and performance (0.025–0.090). These results suggest that higher entropy in attention
    distribution correlates with better capability emergence, supporting our hypothesis
    about phase transitions in semantic space organization. Image by author.](../Images/f7fb699035704f7bff9cb54af2482e4a.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图4. 不同模型架构的熵-性能关系，展示了注意力分布模式如何与问题解决能力相关。x轴表示注意力熵（衡量注意力分布的均匀程度），而y轴表示复杂任务的表现。GPT2-xl（绿色）在更高的熵（约1.7）下运行，性能更好（0.15–0.20），显示出更分散的注意力模式。相比之下，opt-1.3b和pythia-1.4b显示出较低的熵（1.3–1.4）和性能（0.025–0.090）。这些结果表明，注意力分布中的高熵与更好的能力出现相关，支持我们关于语义空间组织中的相变假设。图片由作者提供。](../Images/f7fb699035704f7bff9cb54af2482e4a.png)'
- en: '**Figure 4.** Entropy-performance relationship across different model architectures,
    showing how attention distribution patterns correlate with problem-solving capabilities.
    The x-axis shows attention entropy (measuring how evenly attention is distributed),
    while the y-axis shows performance on complex tasks. GPT2-xl (green) operates
    at higher entropy (~1.7) with better performance (0.15–0.20), revealing more distributed
    attention patterns. In contrast, opt-1.3b and pythia-1.4b show lower entropy (1.3–1.4)
    and performance (0.025–0.090). These results suggest that higher entropy in attention
    distribution correlates with better capability emergence, supporting our hypothesis
    about phase transitions in semantic space organization. Image by author.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**图4**。不同模型架构的熵-性能关系，展示了注意力分布模式如何与问题解决能力相关。x轴表示注意力熵（衡量注意力分布的均匀程度），而y轴表示复杂任务的表现。GPT2-xl（绿色）在更高的熵（约1.7）下运行，性能更好（0.15–0.20），显示出更分散的注意力模式。相比之下，opt-1.3b和pythia-1.4b显示出较低的熵（1.3–1.4）和性能（0.025–0.090）。这些结果表明，注意力分布中的高熵与更好的能力出现相关，支持我们关于语义空间组织中的相变假设。图片由作者提供。'
- en: '**Memory effects:** Just as a river’s future path depends on the channels it
    has already carved, each model interaction creates patterns that influence future
    responses. The fact that response length and solution paths changed by an average
    of over 10 steps shows that these aren’t just effects of the context; they’re
    fundamental changes in how the model navigates its knowledge space.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆效应**：正如河流的未来路径取决于它已经开辟的河道一样，每个模型交互都会创建影响未来响应的模式。响应长度和解决方案路径平均变化超过10步的事实表明，这些并非仅仅是环境效应；它们是模型在知识空间中导航的根本性变化。'
- en: '![Figure 5\. Path dependence in language model responses measured through step
    length differences. The graph shows how different models exhibit varying degrees
    of path dependence when solving the same problems under different contexts. Pythia-1.4b
    shows the highest sensitivity (≈16 steps difference), while opt-1.3b shows the
    lowest (≈12 steps). These important differences indicate that path dependence
    is a fundamental property of these systems rather than a simple context effect.
    Model architecture appears to influence the degree of this effect, with more advanced
    architectures showing higher path sensitivity. Image by author.](../Images/14ccffca9e6e91a7047af252c5588d6a.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图5. 通过步长差异测量的语言模型响应中的路径依赖性。图表显示了不同模型在不同环境下解决相同问题时表现出不同程度的路径依赖性。Pythia-1.4b显示出最高的敏感性（≈16步差异），而opt-1.3b显示出最低的（≈12步）。这些重要差异表明，路径依赖性是这些系统的基本属性，而不仅仅是简单的环境效应。模型架构似乎影响这种效应的程度，更先进的架构显示出更高的路径敏感性。图片由作者提供。](../Images/14ccffca9e6e91a7047af252c5588d6a.png)'
- en: '**Figure 5**. Path dependence in language model responses measured through
    step length differences. The graph shows how different models exhibit varying
    degrees of path dependence when solving the same problems under different contexts.
    Pythia-1.4b shows the highest sensitivity (≈16 steps difference), while opt-1.3b
    shows the lowest (≈12 steps). These important differences indicate that path dependence
    is a fundamental property of these systems rather than a simple context effect.
    Model architecture appears to influence the degree of this effect, with more advanced
    architectures showing higher path sensitivity. Image by author.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**图5**. 通过步长差异测量的语言模型响应中的路径依赖性。图表显示了不同模型在解决不同情境下的相同问题时表现出不同程度的路径依赖性。Pythia-1.4b显示出最高的敏感性（≈16步差异），而opt-1.3b显示出最低的（≈12步）。这些重要差异表明，路径依赖性是这些系统的基本属性，而不仅仅是简单情境效应。模型架构似乎影响这种程度，更高级的架构显示出更高的路径敏感性。图片由作者提供。'
- en: These properties have direct practical implications when using large language
    models. For example, sequential ordering of prompts matters because each interaction
    modifies the accessible state space. Solutions found in one context might be unreachable
    in another due to path dependence. This concept helps explain why prompt engineering
    is more than just finding the right words; *it’s about understanding how to guide
    a non-ergodic system through its state space to reach desired capabilities*.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用大型语言模型时，这些特性具有直接的实践意义。例如，提示的顺序很重要，因为每次交互都会修改可访问的状态空间。在一个情境中找到的解决方案可能在另一个情境中无法触及，这是由于路径依赖性。这个概念有助于解释为什么提示工程不仅仅是找到正确的词语；*它关乎理解如何引导非遍历系统穿越其状态空间以达到期望的能力*。
- en: 'Hypothesis 2\. Phase transitions: when models learn to rise'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 假设2. 相变：当模型学会上升
- en: 'Language models don’t develop new abilities through steady improvement but
    through sudden changes, what in physics is called phase transitions. These sudden
    shifts don’t happen gradually; they occur at specific critical points where the
    entire system reorganizes itself. A classic example is water turning to ice: no
    matter how slowly you decrease the temperature, at exactly 0°C, water molecules
    suddenly realign into a crystalline structure in a complete reorganization of
    the system’s behavior. At certain critical points, a system’s fundamental behavior
    changes not because of external forces but through internal reorganization. This
    is called self-organized critically, or SOC, in complex systems theory: *a complex
    system will naturally organize itself into a state that is on a critical point
    that is the edge of two different regimes, without intervention from outside the
    system.* Our research shows that language models have identical behavior.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型并非通过稳步提升而发展新能力，而是通过突然变化，这在物理学中被称为相变。这些突然的转变并非逐渐发生；它们发生在特定的临界点上，整个系统重新组织。一个经典的例子是水结冰：无论你如何缓慢地降低温度，在恰好0°C时，水分子会突然重新排列成晶体结构，系统行为发生完全重组。在一定的临界点上，系统的基本行为发生变化，并非由于外部力量，而是通过内部重组。这在复杂系统理论中被称为自组织临界性，或SOC：*一个复杂系统会自然地组织成处于两个不同状态边缘的临界点，而不需要来自系统外部的干预.*
    我们的研究表明，语言模型具有相同的行为。
- en: '**Critical points in learning:** Large language models show distinct critical
    points where their capabilities suddenly change. Performance doesn’t improve smoothly—instead,
    we observed sharp transitions where problem-solving abilities emerge suddenly.
    At these critical points, the model’s internal organization fundamentally shifts.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习的临界点：** 大型语言模型显示出明显的临界点，在这些点上它们的性能突然改变。性能并非平滑提升——相反，我们观察到解决问题的能力突然出现的急剧转变。在这些临界点上，模型的内部组织发生了根本性的转变。'
- en: '**Symmetry breaking:** Before this phase transition, large language models
    explore possibilities somewhat randomly. But after reaching a critical point,
    they develop structured, consistent problem-solving strategies. This mirrors how
    magnetic materials suddenly align their internal structure at certain temperatures—a
    fundamental principle in physics called symmetry breaking⁶.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对称破缺：** 在这个相变之前，大型语言模型以某种随机的方式探索可能性。但达到临界点后，它们发展出结构化、一致的问题解决策略。这反映了磁性材料在特定温度下突然对其内部结构进行对齐的现象——物理学中的一个基本原理，称为对称破缺⁶。'
- en: '**Energy landscapes:** The path to these transitions follows predictable patterns.
    We observed that just before a capability emerges, the model’s attention patterns
    (its way of processing information) reorganize themselves. This reorganization
    isn’t random; it follows specific patterns that we can measure and potentially
    predict. These reorganizations represent the model finding lower-energy configurations
    that enable more efficient information processing. For instance, when a model
    suddenly develops the ability to solve multi-step math problems, we observe a
    rapid shift from random attempts to structured, step-by-step solutions.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能量景观**：通往这些转变的路径遵循可预测的模式。我们观察到，在能力出现之前，模型的注意力模式（其处理信息的方式）会重新组织。这种重新组织不是随机的；它遵循我们可以测量和预测的特定模式。这些重新组织代表了模型找到低能量配置，从而实现更有效的信息处理。例如，当模型突然发展出解决多步数学问题的能力时，我们观察到从随机尝试到结构化、逐步解决方案的快速转变。'
- en: Understanding these phase transitions gives us new insights into how LLM models
    develop. We might be able to predict and eventually guide the emergence of new
    model capabilities by identifying and analyzing these critical points.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些相变过程使我们能够深入了解LLM模型的发展。通过识别和分析这些关键点，我们可能能够预测并最终引导新模型能力的出现。
- en: Hypothesis 3\. The three forces shaping large language models behavior
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 假设3. 影响大型语言模型行为的三个力量
- en: 'Kauffman’s theory of the adjacent possible starts with a surprisingly simple
    but powerful equation:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: Kauffman的相邻可能理论从一个简单但强大的方程开始：
- en: '![Equation 1\. TAP model equation introduced by Kauffman. Image by author](../Images/20e2c3cba7e8b4bba8fe89dd8bd1e1db.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![方程1. Kauffman提出的TAP模型方程。图片由作者提供](../Images/20e2c3cba7e8b4bba8fe89dd8bd1e1db.png)'
- en: '**Equation 1**. TAP model equation introduced by Kauffman. Image by author'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**方程1. Kauffman提出的TAP模型方程。图片由作者提供**'
- en: 'This simple equation helps us understand a simple idea: new possibilities don’t
    emerge randomly but through constrained combinations of what already exists. Mₜ
    represents the number of possibilities available at time t, and the summation
    describes how these possibilities can combine to create new ones. The αⁱ term
    is key in the equation. It describes different constraints’ interactions that
    limit which combinations are actually possible. As a result of this combination
    and the constraints interactions, we can get the space of available possibilities
    Mₜ₊₁ at time t+1.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的方程帮助我们理解一个简单想法：新的可能性不是随机出现的，而是通过现有事物的约束组合出现的。Mₜ代表在时间t时可能性的数量，求和描述了这些可能性如何组合以创造新的可能性。方程中的αⁱ项是关键。它描述了不同约束之间的相互作用，限制了哪些组合实际上是可能的。由于这种组合和约束之间的相互作用，我们可以在时间t+1时得到可用的可能性空间Mₜ₊₁。
- en: 'When we applied this framework to large language models, we discovered three
    fundamental types of constraints that shape how these models develop new capabilities:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将这个框架应用于大型语言模型时，我们发现三种基本类型的约束塑造了这些模型如何发展新能力：
- en: '**Architectural Constraints**'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构约束**'
- en: The model’s architecture sets fundamental limits on what it can process. Memory
    capacity acts like the cell’s physical size, limiting how much information can
    be held at once. Attention mechanisms behave like cellular pathways, ruling how
    different pieces of information can interact. Lastly, network connectivity creates
    the equivalent of cellular signaling networks, establishing possible routes for
    information flow.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的架构为其可以处理的内容设定了基本限制。内存容量就像细胞的物理大小一样，限制了可以同时持有的信息量。注意力机制就像细胞途径一样，决定了不同信息片段如何相互作用。最后，网络连接创建了细胞信号网络的等效物，为信息流动建立了可能的路径。
- en: '**Training Constraints**'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练约束**'
- en: Similar to how evolutionary history shapes what adaptations are possible for
    an organism, training molds the model’s landscape of possibilities. Training examples
    seize preferred pathways through the possibility space, meanwhile training data
    distribution creates "valleys" that attract similar patterns. These learned patterns
    act like enzymes, making some transformations easier while inhibiting others.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于进化历史塑造了生物体可能适应的方式，训练塑造了模型可能性的景观。训练示例通过可能性空间中的偏好路径，同时训练数据分布创造了吸引相似模式的“山谷”。这些学习到的模式就像酶一样，使某些转换变得更容易，而抑制其他转换。
- en: '**Contextual Constraints**'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文约束**'
- en: Like a cell reacting (we should better say "adapting") to its current environment,
    context dynamically shapes what’s possible. Last interactions modify the local
    "landscape" of token possibilities, as illustrated in figure 2\. Current context
    provides scaffolding that enables some combinations while blocking others. These
    effects create temporary patterns driving the model’s behavior.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 就像细胞对其当前环境的反应（我们最好说“适应”）一样，上下文动态地塑造了可能性的范围。最近的交互修改了标记可能性的局部“景观”，如图2所示。当前上下文提供了支架，使得某些组合成为可能，同时阻止其他组合。这些效应创造了暂时模式，驱动模型的行为。
- en: The multiplicative nature of constraints
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 约束的乘法性质
- en: Constraints can interact in different ways, such as additively or multiplicatively.
    What we have found in our research is that large language model constraints interact
    multiplicatively. This means that, like a chemical reaction requiring both the
    right temperature and the right pH level and the right catalysts, a model capability
    only emerges when all constraints align favorably. This multiplicative interaction
    explains why model capabilities often appear suddenly rather than gradually. It’s
    similar to how you can’t partially boil water—it needs to reach exactly 100°C
    (at sea level) for the phase transition to occur. All the necessary conditions
    must be met concurrently.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 约束可以以不同的方式相互作用，例如加法或乘法。我们在研究中发现，大型语言模型的约束以乘法方式相互作用。这意味着，就像需要正确的温度、正确的pH水平和正确的催化剂的化学反应一样，只有当所有约束都顺利对齐时，模型能力才会出现。这种乘法相互作用解释了为什么模型能力往往突然出现而不是逐渐出现。这就像你不能部分地煮沸水——它需要精确达到100°C（在海平面上）才能发生相变。所有必要条件必须同时满足。
- en: '![Figure 6\. Like the multiplicative constraints in language models, enzyme
    cascades demonstrate how biological systems require the alignment of multiple
    factors to achieve complex transformations. Just as simple chemical substrates
    are transformed into pharmaceutical products through a series of sequential enzyme
    reactions (each dependent on the success of previous steps), language model capabilities
    emerge through the multiplicative interaction of architectural, training, and
    contextual constraints. Each enzyme in the cascade acts as a constraint that must
    be satisfied for the process to continue—if any single enzyme fails, the entire
    cascade fails. This multiplicative nature explains why capabilities in language
    models often emerge suddenly rather than gradually—all constraints must work simultaneously,
    similar to how all enzymes in a cascade must be present and functional for the
    final product to be synthesized. Illustration adapted from Benítez-Mateos, A.I.,
    Roura Padrosa, D. & Paradisi, F. Multistep enzyme cascades as a route towards
    green and sustainable pharmaceutical syntheses. Nat. Chem. 14, 489–499 (2022).
    https://doi.org/10.1038/s41557-022-00931-2.](../Images/6461141358ff0aa8b6fc850647803865.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图6. 就像语言模型中的乘法约束一样，酶级联展示了生物系统如何需要多个因素的协调以实现复杂的转化。正如简单的化学底物通过一系列连续的酶反应（每个反应都依赖于前一步的成功）转化为药物产品一样，语言模型能力通过架构、训练和上下文约束的乘法相互作用而产生。级联中的每个酶都充当一个必须满足的约束，以便过程继续进行——如果任何单个酶失败，整个级联都会失败。这种乘法性质解释了为什么语言模型中的能力往往突然出现而不是逐渐出现——所有约束必须同时工作，就像级联中的所有酶都必须存在且功能正常，才能合成最终产品。插图改编自Benítez-Mateos,
    A.I., Roura Padrosa, D. & Paradisi, F. 多步骤酶级联作为绿色和可持续药物合成的途径。Nat. Chem. 14, 489–499
    (2022)。https://doi.org/10.1038/s41557-022-00931-2。](../Images/6461141358ff0aa8b6fc850647803865.png)'
- en: '**Figure 6**. Like the multiplicative constraints in language models, enzyme
    cascades demonstrate how biological systems require the alignment of multiple
    factors to achieve complex transformations. Just as simple chemical substrates
    are transformed into pharmaceutical products through a series of sequential enzyme
    reactions (each dependent on the success of previous steps), language model capabilities
    emerge through the multiplicative interaction of architectural, training, and
    contextual constraints. Each enzyme in the cascade acts as a constraint that must
    be satisfied for the process to continue—if any single enzyme fails, the entire
    cascade fails. This multiplicative nature explains why capabilities in language
    models often emerge suddenly rather than gradually—all constraints must work simultaneously,
    similar to how all enzymes in a cascade must be present and functional for the
    final product to be synthesized. Illustration adapted from Benítez-Mateos, A.I.,
    Roura Padrosa, D. & Paradisi, F. Multistep enzyme cascades as a route towards
    green and sustainable pharmaceutical syntheses. *Nat. Chem.* **14**, 489–499 (2022).
    [https://doi.org/10.1038/s41557-022-00931-2](https://doi.org/10.1038/s41557-022-00931-2).'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**图6**。与语言模型中的乘法约束类似，酶级联展示了生物系统如何需要多个因素的协调以实现复杂的转换。正如简单的化学底物通过一系列连续的酶反应（每个步骤都依赖于前一步的成功）转化为药物产品一样，语言模型的能力也是通过架构、训练和上下文约束的乘法交互产生的。级联中的每个酶都充当一个必须满足的约束，以便过程继续进行——如果任何单个酶失败，整个级联都会失败。这种乘法性质解释了为什么语言模型中的能力往往突然出现而不是逐渐出现——所有约束都必须同时工作，类似于级联中的所有酶都必须存在且功能正常，才能合成最终产品。插图改编自Benítez-Mateos,
    A.I.，Roura Padrosa, D. & Paradisi, F. 多步骤酶级联作为绿色和可持续药物合成的途径。*Nat. Chem.* **14**,
    489–499 (2022)。[https://doi.org/10.1038/s41557-022-00931-2](https://doi.org/10.1038/s41557-022-00931-2)。'
- en: 'To adapt the original TAP equality in Equatoin 2 to how language models explore
    their possibility space, we have developed the following equation (the aim of
    the paper presented at the beginning of this post):'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将方程2中的原始TAP等式适应语言模型探索其可能性空间的方式，我们开发了以下方程（本文开头所展示论文的目标）：
- en: '![Equation 2\. Proposed resource-bounded expansion equation for language models.
    Figure by author.](../Images/500cd63c9693a3d7909d55c1d5f3c6ab.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![方程2。为语言模型提出的资源限制扩展方程。图由作者绘制。](../Images/500cd63c9693a3d7909d55c1d5f3c6ab.png)'
- en: '**Equation 2**. Proposed resource-bounded expansion equation for language models.
    Figure by author.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**方程2**。为语言模型提出的资源限制扩展方程。图由作者绘制。'
- en: Aₜ₊₁ represents the accessible state space at the next time step, and Aₜ is
    the current accessible state space. The first sum Σ captures the hierarchical
    levels of language processing (from tokens to phrases to broader structures),
    where gₗ is a hierarchical function that transforms these combinations into the
    model’s semantic space, being L the total number of hierarchical levels in the
    language model’s processing⁷. The second sum Σ represents all possible combinations
    within the vocabulary size |Vₜ| or lexicon. Parameter α(t,i) combines all constraints
    (architectural, training, and contextual) at time t, and the binomial coefficient
    (|Vₜ| choose i) represents possible combinations of tokens. Equation 2 may point
    to approaches to better direct the development of AI systems in the future.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Aₜ₊₁代表下一个时间步的可达状态空间，而Aₜ是当前可达状态空间。第一个求和Σ捕捉了语言处理的层次水平（从标记到短语再到更广泛的结构），其中gₗ是一个层次函数，将这些组合转换为模型的语义空间，L是语言模型处理中的总层次水平数⁷。第二个求和Σ代表词汇大小|Vₜ|或词汇表中的所有可能组合。参数α(t,i)在时间t结合所有约束（架构、训练和上下文），二项式系数（|Vₜ|
    choose i）代表标记的可能组合。方程2可能指向未来更好地指导AI系统发展的方法。
- en: Practical implications
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际影响
- en: Our theoretical framework offers several potential insights for working with
    large language models, though we must be careful not to overstate their immediate
    practical applications.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的理论框架为与大型语言模型一起工作提供了几个潜在的见解，尽管我们必须小心不要过分夸大它们的即时实际应用。
- en: What we can say with (statistical) confidence
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们可以以（统计）信心说
- en: '**Context ordering matters:** Our experiments prove that the order in which
    information is presented to a model significantly affects its responses, reflecting
    fundamental constraints on how models access their capabilities. For instance,
    we observed that presenting mathematical concepts before problem-solving tasks
    consistently led to better performance than presenting the same information in
    reverse order.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**上下文排序的重要性：** 我们的实验证明，向模型呈现信息的顺序会显著影响其响应，反映了模型访问其能力的基本约束。例如，我们发现，在问题解决任务之前呈现数学概念，其表现始终优于以相反顺序呈现相同信息。'
- en: '**Critical points in training:** The identification of phase transitions (symmetry
    breaking) suggests that certain capabilities might emerge suddenly rather than
    gradually during training. This could help explain why intermediate checkpoints
    often show surprisingly large jumps in performance. However, we cannot yet reliably
    predict when these transitions will occur.'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**训练中的关键点：** 识别相变（对称破缺）表明，某些能力可能在训练过程中突然出现，而不是逐渐出现。这有助于解释为什么中间检查点通常会显示出令人惊讶的性能大幅跳跃。然而，我们目前还不能可靠地预测这些转变何时会发生。'
- en: '**Resource allocation trade-offs:** Understanding the multiplicative nature
    of constraints helps explain why simply increasing computational resources doesn’t
    always improve performance proportionally. All three types of constraints—architectural,
    training, and contextual—need to align for new capabilities to emerge.'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**资源分配权衡：** 理解约束的乘性性质有助于解释为什么仅仅增加计算资源并不总是按比例提高性能。所有三种类型的约束——架构、训练和上下文——都需要一致，以便新的能力出现。'
- en: Limitations and open questions
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 局限性和开放性问题
- en: While our framework explains observed phenomena, its predictive power remains
    limited. We cannot yet reliably forecast when specific capabilities will emerge
    in new models or architectures. Though we understand that architectural constraints
    play a crucial role, translating this insight into concrete architecture improvements
    requires additional research. The link between model architecture and capability
    emergence remains largely correlational. Our framework suggests that training
    strategies might be optimized around critical points, but we don’t yet have reliable
    methods to identify these points in advance.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们的框架可以解释观察到的现象，但其预测能力仍然有限。我们目前还不能可靠地预测在新的模型或架构中何时会出现特定的能力。尽管我们理解架构约束起着至关重要的作用，但将这一洞察转化为具体的架构改进还需要进一步的研究。模型架构与能力出现之间的联系在很大程度上仍然是相关性的。我们的框架表明，训练策略可能围绕关键点进行优化，但我们还没有可靠的方法来提前识别这些点。
- en: Future Research Directions
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 未来研究方向
- en: 'The most promising areas for applying this framework include:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 应用此框架最有潜力的领域包括：
- en: '**Diagnostic tools:** developing better tools for identifying when models are
    approaching critical transitions in capability development.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**诊断工具：** 开发更好的工具，以识别模型在能力发展中接近关键转变的时刻。'
- en: '**Resource optimization:** understanding how to better balance computational
    resources across different architectural components based on constraint interactions.'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**资源优化：** 理解如何根据约束相互作用更好地平衡不同架构组件的计算资源。'
- en: '**Training curriculum optimization:** exploring how the order of training examples
    might be optimized to work with, rather than against, the natural phase transitions
    in model development.Disclaimer'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**训练课程优化：** 探索如何优化训练示例的顺序，以便与模型开发中的自然相变相协调，而不是与之相冲突。'
- en: Disclaimer
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 免责声明
- en: While our framework provides a new lens for understanding LLM behavior, it should
    be seen as a starting point rather than a complete theory. Like any model of complex
    systems, it necessarily simplifies many aspects of LLM behavior. Its primary value
    lies in suggesting new ways to think about and investigate these systems, rather
    than providing immediate solutions to practical challenges.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们的框架为理解LLM行为提供了一个新的视角，但它应被视为一个起点，而不是一个完整的理论。像任何复杂系统的模型一样，它必然简化了LLM行为的许多方面。它的主要价值在于提出新的思考和研究这些系统的方法，而不是提供解决实际挑战的即时解决方案。
- en: '* * *'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '¹ Readers can find a copy of the book ‘Investigations’ at the Santa Fe institute
    web site: [https://www.santafe.edu/research/results/working-papers/investigations](https://www.santafe.edu/research/results/working-papers/investigations)'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: ¹ 读者可以在圣塔菲研究所网站上找到《调查》一书的副本：[https://www.santafe.edu/research/results/working-papers/investigations](https://www.santafe.edu/research/results/working-papers/investigations)
- en: '² Symmetries can be seen as a geometric language used by physics to describe
    fundamental observations of reality. In mathematics, symmetries are referred to
    as group theory, a highly powerful tool that enables us to model complex observations
    in an accessible manner. This language can be useful in understanding complex
    phenomena such as the behavior of huge language models. You can find in this book
    a comprehensive explanation of symmetries importance in real-world phenomena:
    [https://link.springer.com/book/10.1007/978-3-030-03633-1](https://link.springer.com/book/10.1007/978-3-030-03633-1)'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: ² 对称性可以被视为物理学用来描述现实基本观察的几何语言。在数学中，对称性被称为群论，这是一种非常强大的工具，使我们能够以可访问的方式对复杂观察进行建模。这种语言在理解复杂现象，如大型语言模型的行为方面非常有用。您可以在本书中找到对称性在现实世界现象中重要性的全面解释：[https://link.springer.com/book/10.1007/978-3-030-03633-1](https://link.springer.com/book/10.1007/978-3-030-03633-1)
- en: ³ Kauffman, S. (2022). Is There a Fourth Law for Non-Ergodic Systems That Do
    Work to Construct Their Expanding Phase Space? Entropy 2022, Vol. 24, Page 1383,
    24 (10), 1383\. [https://doi.org/10.3390/E24101383](https://doi.org/10.3390/E24101383)
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: ³ Kauffman, S. (2022). Is There a Fourth Law for Non-Ergodic Systems That Do
    Work to Construct Their Expanding Phase Space? Entropy 2022, Vol. 24, Page 1383,
    24 (10), 1383\. [https://doi.org/10.3390/E24101383](https://doi.org/10.3390/E24101383)
- en: '⁴ A deeper dive in the ergodic theory can be found here: [https://plato.stanford.edu/entries/ergodic-hierarchy/#Ergo](https://plato.stanford.edu/entries/ergodic-hierarchy/#Ergo)'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ⁴ 在这里可以找到对遍历理论的更深入探讨：[https://plato.stanford.edu/entries/ergodic-hierarchy/#Ergo](https://plato.stanford.edu/entries/ergodic-hierarchy/#Ergo)
- en: ⁵ Markovian dynamics refer to systems where the probability distribution of
    future states depends simply on the current state, not on the sequence of events
    that preceded it. Formally, for a system with states {Xₜ}, it satisfies P(Xₜ₊₁|Xₜ,Xₜ₋₁,…,X₁)
    = P(Xₜ₊₁|Xₜ). Language models exhibit non-Markovian behavior as their responses
    depend on their entire interaction history.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: ⁵ 马尔可夫动力学指的是未来状态的概率分布仅取决于当前状态，而不取决于之前的事件序列。形式上，对于一个具有状态 {Xₜ} 的系统，它满足 P(Xₜ₊₁|Xₜ,Xₜ₋₁,…,X₁)
    = P(Xₜ₊₁|Xₜ)。语言模型表现出非马尔可夫行为，因为它们的响应取决于它们的整个交互历史。
- en: ⁶ Symmetry breaking refers to a phenomenon where a system that appears symmetric
    under certain conditions transitions to a state with less symmetry. A classic
    example is a pencil balanced perfectly on its tip—while the initial setup is symmetric
    (it could fall in any direction), once it falls, this symmetry is "broken" as
    it chooses one specific direction. In particle physics, this concept explains
    how particles gain mass through the Higgs mechanism, where an initially symmetric
    state transitions to one with lower symmetry. In our analysis of language models,
    we observe similar symmetry breaking when models transition from exploring all
    possibilities equally (symmetric state) to developing preferred, structured approaches
    (broken symmetry state).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: ⁶ 对称性破缺是指一个系统在特定条件下看似对称，但会转变为具有较少对称性的状态。一个经典的例子是笔尖完美平衡的情况——初始设置是对称的（它可以向任何方向掉落），但一旦掉落，这种对称性就被“打破”了，因为它选择了特定的一个方向。在粒子物理学中，这个概念解释了粒子如何通过希格斯机制获得质量，即一个最初对称的状态转变为具有较低对称性的状态。在我们对语言模型的分析中，我们观察到当模型从平等探索所有可能性（对称状态）转变为发展出首选的、结构化的方法（对称性破缺状态）时，存在类似的对称性破缺现象。
- en: '⁷ The hierarchical nature of non-ergodicity in language models shows interesting
    parallels with LeCun’s H-JEPA framework. While H-JEPA explicitly designs architectures
    for hierarchical prediction-based learning, our framework describes how hierarchies
    emerge naturally through constraint interactions. Both approaches postulate that
    lower levels constrain higher-level predictions, creating path-dependent learning.
    This similarity suggests that non-ergodic behavior might be fundamental to hierarchical
    learning in AI systems, rather than just an architectural artifact. The key difference
    lies in implementation: H-JEPA builds hierarchical structures into the architecture,
    while we observe them emerging from constraint interactions. This alignment between
    designed and emergent hierarchies suggests promising directions for architecture
    design, though the underlying mechanisms may differ substantially. LeCun’s work
    provides an interesting perspective on how we might intentionally structure these
    hierarchical relationships in future AI systems.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: ⁷ 语言模型中非遍历性的层级性质与LeCun的H-JEPA框架显示出有趣的相似性。虽然H-JEPA明确为基于层级预测的学习设计了架构，但我们的框架描述了层级如何通过约束交互自然地出现。两种方法都假设较低层级约束了较高层级的预测，从而创建出路径依赖的学习。这种相似性表明，非遍历行为可能是人工智能系统中层级学习的基本特征，而不仅仅是架构上的产物。关键的区别在于实现方式：H-JEPA将层级结构构建到架构中，而我们观察到它们从约束交互中产生。这种设计和涌现层级的对齐为架构设计提供了有希望的方向，尽管潜在机制可能存在显著差异。LeCun的工作为我们提供了有趣的视角，关于我们如何在未来的AI系统中有意构建这些层级关系。
