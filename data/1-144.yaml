- en: Meet Our Returning Authors
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 欢迎我们的回归作者
- en: 'Just as we’re thrilled to welcome new contributors to TDS, we’re always happy
    to see familiar voices appearing in our publication after a hiatus. Case in point:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们欢迎新的贡献者加入TDS一样，我们总是很高兴看到熟悉的声音在停刊后再次出现在我们的出版物中。举例来说：
- en: '[Barr Moses](https://towardsdatascience.com/author/barrmoses/) published a
    new article full of sharp insights on the macro trends shaping the future of AI.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Barr Moses](https://towardsdatascience.com/author/barrmoses/)发布了一篇充满深刻见解的新文章，探讨了塑造AI未来宏观趋势的趋势。'
- en: '[10 Data + AI Observations for Fall 2025](https://towardsdatascience.com/10-data-ai-observations-to-watch-in-fall-2025/)'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[2025年秋季的10个数据+AI观察](https://towardsdatascience.com/10-data-ai-observations-to-watch-in-fall-2025/)'
- en: '[Jingyi Jessica Li](https://towardsdatascience.com/author/jsb-ucla/) (with
    coauthor Pan Liu) offered an accessible writeup of their latest research at the
    intersection of statistics, bioinformatics, and medical data science.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Jingyi Jessica Li](https://towardsdatascience.com/author/jsb-ucla/)（与合著者Pan
    Liu）提供了一篇易于理解的最新研究综述，该研究涉及统计学、生物信息学和医学数据科学。'
- en: '[Statistical Method mcRigor Enhances the Rigor of Metacell Partitioning in
    Single-Cell Data Analysis](https://towardsdatascience.com/statistical-method-mcrigor-enhances-the-rigor-of-metacell-partitioning-in-single-cell-data-analysis/)'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[统计方法mcRigor增强单细胞数据分析中元细胞划分的严谨性](https://towardsdatascience.com/statistical-method-mcrigor-enhances-the-rigor-of-metacell-partitioning-in-single-cell-data-analysis/)'
- en: '[Robert Constable](https://towardsdatascience.com/author/rjconstable1989/) presented
    an accessible, hands-on introduction to building a geospatial lakehouse with open
    source tools and Databricks.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Robert Constable](https://towardsdatascience.com/author/rjconstable1989/)通过开源工具和Databricks提供了一篇易于理解、动手操作的构建地理空间数据湖的介绍。'
- en: '[Building a Geospatial Lakehouse with Open Source and Databricks](https://towardsdatascience.com/building-a-geospatial-lakehouse-with-open-source-and-databricks-2/)'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用开源和Databricks构建地理空间数据湖](https://towardsdatascience.com/building-a-geospatial-lakehouse-with-open-source-and-databricks-2/)'
- en: Whether you’re an existing author or a new one, we’d love to consider your next
    article — so if you’ve recently written an interesting project walkthrough, tutorial,
    or theoretical reflection on any of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是现有作者还是新作者，我们都非常乐意考虑你的下一篇文章——所以如果你最近写了一个有趣的项目演练、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
