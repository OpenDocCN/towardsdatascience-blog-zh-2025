- en: Interactive Data Exploration for Computer Vision Projects with Rerun
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Rerun进行计算机视觉项目的交互式数据探索
- en: 原文：[https://towardsdatascience.com/interactive-data-exploration-for-computer-vision-projects-with-rerun/](https://towardsdatascience.com/interactive-data-exploration-for-computer-vision-projects-with-rerun/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/interactive-data-exploration-for-computer-vision-projects-with-rerun/](https://towardsdatascience.com/interactive-data-exploration-for-computer-vision-projects-with-rerun/)
- en: <mdspan datatext="el1751483641277" class="mdspan-comment">Interactive</mdspan>
    tools for data visualization and exploration have allowed me to iterate way quicker
    on my computer vision projects, especially when the problems I am faced with are
    not straightforward and I need to **make algorithm or design decisions based on
    dynamic time-varying signals**. These signals can often be challenging to analyze
    by just looking at rapidly changing numbers plotted on the screen or saved in
    a table.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751483641277" class="mdspan-comment">交互式</mdspan>数据可视化和探索工具使我能够更快地迭代我的计算机视觉项目，尤其是在我面临的问题不是直截了当，我需要**根据动态变化信号做出算法或设计决策**时。这些信号通常仅通过观察屏幕上快速变化的数字或保存在表格中的数字来分析是具有挑战性的。
- en: '![](../Images/8255ab002b5d720370f76d0c6e4de15e.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8255ab002b5d720370f76d0c6e4de15e.png)'
- en: While working on some of these problems, I explored the built-in interactive
    elements from `OpenCV`, but apart from some sliders the options there are very
    limited, especially when trying to integrate some animated plots. There’s some
    *hacky* ways to get dynamic plots from `matplotlib` into `OpenCV`, which I explored
    in this [post](https://towardsdatascience.com/animated-plotting-in-python-with-opencv-and-matplotlib-d640462c41f4/).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决这些问题的一些过程中，我探索了`OpenCV`内置的交互式元素，但除了几个滑块外，那里的选项非常有限，尤其是在尝试集成一些动画图表时。有一些从`matplotlib`到`OpenCV`获取动态图表的**巧妙**方法，我在这篇[文章](https://towardsdatascience.com/animated-plotting-in-python-with-opencv-and-matplotlib-d640462c41f4/)中进行了探索。
- en: I also explored different UI frameworks like `tkinter`, which I used in my [last
    project](https://towardsdatascience.com/real-time-interactive-sentiment-analysis-in-python/)
    for a sentiment analysis visualization. I built a custom component that allowed
    me to display dynamic frames. However it still didn’t really feel like the right
    tool for the task, especially when trying to work with interactive plots.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我还探索了不同的UI框架，例如`tkinter`，我在我的[上一个项目](https://towardsdatascience.com/real-time-interactive-sentiment-analysis-in-python/)中用它来进行情感分析的可视化。我构建了一个自定义组件，允许我显示动态帧。然而，它仍然感觉并不是完成这项任务的正确工具，尤其是在尝试与交互式图表一起工作时。
- en: And then I stumbled upon **[Rerun](https://rerun.io/)**. Every once in a while
    I discover a tool or framework that really excites me, and this was exactly one
    of those times. Rerun is an open source tool for visualizing data typically found
    in the robotics domain ranging from simple time series data and static images
    to complex 3D point clouds, video streams or other types of multi-modal data.
    The demos look really impressive and the setup and code samples are so simple,
    I was immediately hooked.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我偶然发现了**[Rerun](https://rerun.io/)**。偶尔我会发现一个真正让我兴奋的工具或框架，这正是其中之一。Rerun是一个开源工具，用于可视化通常在机器人领域发现的数据，从简单的时序数据、静态图像到复杂的3D点云、视频流或其他类型的多模态数据。演示看起来非常令人印象深刻，设置和代码示例非常简单，我立刻被吸引住了。
- en: '![](../Images/32a8accf5aacc7a87778b334a5677f7e.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/32a8accf5aacc7a87778b334a5677f7e.png)'
- en: '[Rerun Demo running in a web browser](https://rerun.io/viewer?url=https%3A%2F%2Fapp.rerun.io%2Fversion%2F0.23.3%2Fexamples%2Fgraphs.rrd)'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '[Rerun演示在网页浏览器中运行](https://rerun.io/viewer?url=https%3A%2F%2Fapp.rerun.io%2Fversion%2F0.23.3%2Fexamples%2Fgraphs.rrd)'
- en: So I decided to rework my ball tracking demo from a previous project and plot
    the data using rerun. Let me show you how easy it is to use and create interactive
    applications!
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我决定重新设计之前项目中的球跟踪演示，并使用rerun来绘制数据。让我向您展示使用rerun和使用创建交互式应用程序是多么简单！
- en: Quickstart
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速入门
- en: 'You can install rerun in any of your python projects using pip or uv:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用pip或uv在您的任何Python项目中安装rerun。
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'You can start the viewer after installing the sdk by simply running it from
    the command line:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 安装SDK后，您只需从命令行运行它即可启动查看器：
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The viewer will be your main window where your experiments will be shown. You
    can leave it open or close it between your experiments.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 查看器将是您的主要窗口，其中将显示您的实验。您可以在实验之间保持它打开或关闭。
- en: '![](../Images/2044e2f438d120f9d49c276626441b61.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2044e2f438d120f9d49c276626441b61.png)'
- en: 'To instantiate a rerun viewer from a python script, you need to spawn an instance
    with an experiment name:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 要从Python脚本中实例化rerun查看器，您需要使用实验名称创建一个实例：
- en: '[PRE2]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Ball Tracking Demo
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 球跟踪演示
- en: Rerun experiment recordings can be saved to and loaded from `.rrd` recording
    files. You can download the recording file for the ball tracking demo from [here](https://github.com/trflorian/ball-tracking-live-plot/blob/rerun/rerun/data.rrd).
    Press `Ctrl + O` or select `Open...` in the menu on the top left of the rerun
    viewer and load the downloaded recording file.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Rerun实验录制可以保存到和从`.rrd`录制文件中加载。您可以从[这里](https://github.com/trflorian/ball-tracking-live-plot/blob/rerun/rerun/data.rrd)下载球跟踪演示的录制文件。按`Ctrl
    + O`或选择rerun查看器左上角的菜单中的`打开...`来加载下载的录制文件。
- en: '![](../Images/0d7fd06842800453c16a0dbbf01749ea.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0d7fd06842800453c16a0dbbf01749ea.png)'
- en: You will see the ball tracking demo playback once and then the video stops.
    At the bottom of the viewer, you have the timeline. You can scrub through the
    timeline by clicking and dragging the handle.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 您将看到球跟踪演示播放一次，然后视频停止。在查看器的底部，您有时间线。您可以通过点击并拖动手柄在时间线上进行刮擦。
- en: '![](../Images/10c83a057e6968415e83e8394f2a55f2.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/10c83a057e6968415e83e8394f2a55f2.png)'
- en: These recording files only contain the data of the experiment including the
    video, its annotations and the time series of the tracking. The layout of the
    viewer is stored separately in a `.rbl` blueprint file. Download the blueprint
    file for the demo [here](https://github.com/trflorian/ball-tracking-live-plot/blob/rerun/rerun/ball_tracking.rbl)
    and open it on top of the existing data file.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这些录制文件只包含实验数据，包括视频、其注释和跟踪的时间序列。查看器的布局存储在单独的`.rbl`蓝图文件中。请在此处下载蓝图文件以进行演示[这里](https://github.com/trflorian/ball-tracking-live-plot/blob/rerun/rerun/ball_tracking.rbl)，并在现有数据文件之上打开它。
- en: '![](../Images/f1242f7ac33347da464457f2ee506fd4.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f1242f7ac33347da464457f2ee506fd4.png)'
- en: Now we have a slightly better overview with the position, velocity and acceleration
    plots separated and the video prominently centered.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了稍微更好的概览，位置、速度和加速度图被分开，视频被突出地居中显示。
- en: In the video frame you can click on the annotations and in the left `Blueprint`
    panel you can hide or show them individually.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在视频帧中，您可以点击注释，在左侧的`Blueprint`面板中可以单独隐藏或显示它们。
- en: '![](../Images/02a071b868c37ad2126bfe862194a880.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/02a071b868c37ad2126bfe862194a880.png)'
- en: Time Series Plots
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时间序列图
- en: To analyze a specific plot, you can click on the expand view button at the top
    right of any window, for example the position plot.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要分析特定的图，您可以在任何窗口的右上角点击展开视图按钮，例如位置图。
- en: '![](../Images/56ca4842062b34b872b55bd95f766927.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/56ca4842062b34b872b55bd95f766927.png)'
- en: This is a `TimeSeriesView`. This view can be used to plot data in a 2D chart
    with the x-axis representing the time domain, in our case the discrete frame index
    of the video. In this ball tracking demo, we iterate over the video frames in
    a loop, where we can set the frame index of our timeline explicitly.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个`TimeSeriesView`。此视图可用于在2D图表中绘制数据，其中x轴表示时间域，在我们的案例中是视频的离散帧索引。在这个球跟踪演示中，我们在循环中迭代视频帧，其中我们可以显式设置时间线的帧索引。
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'To create the plot for the position, you need to log a Scalar value for the
    position of the tracked ball at every frame index. In this case after we calculate
    the position we can simply log it to rerun:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建位置图，您需要为每个帧索引记录跟踪球的Scalar位置值。在这种情况下，在计算位置后，我们可以简单地将其记录到rerun中：
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: To configure the style of this plot, we also need to log something to the same
    entity path (`ball/position_y`), but since the style doesn’t change we can log
    it once before the loop and supply a static argument.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 要配置此图的样式，我们还需要将某些内容记录到相同的实体路径（`ball/position_y`），但由于样式不会改变，我们可以在循环之前记录一次并提供一个静态参数。
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: To define the axis range that’s visible per default, we need to specify a layout
    component.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 要定义默认情况下可见的轴范围，我们需要指定一个布局组件。
- en: '[PRE6]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Video Stream
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 视频流
- en: Similarly we can create a view for the video frames by logging the image to
    rerun. Since rerun expects an RGB images but OpenCV ues BGR for its color channel
    ordering, we need to convert the frames from BGR to RGB before passing them to
    rerun.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以通过将图像记录到rerun来为视频帧创建一个视图。由于rerun期望RGB图像，但OpenCV使用BGR进行其颜色通道排序，我们需要在将帧传递给rerun之前将帧从BGR转换为RGB。
- en: '[PRE7]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'To add annotations to the image view we need to log spatial elements to a sub
    path of the specified entity path. For example, we can draw the center of the
    tracked ball:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 要向图像视图添加注释，我们需要将空间元素记录到指定实体路径的子路径中。例如，我们可以绘制跟踪球的中心：
- en: '[PRE8]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'To include the video frame view in the layout, we can use a `Spatial2DView`
    node:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 要将视频帧视图包含在布局中，我们可以使用一个`Spatial2DView`节点：
- en: '[PRE9]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Then we can stack the plot from before vertically with the frame view by using
    a `Vertical` layout component:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以通过使用一个`Vertical`布局组件，将之前的图表垂直堆叠到帧视图中：
- en: '[PRE10]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The row shares specifies how much each of the rows occupies in percentages.
    We can omit the second row share entry for the frame view since the shares have
    to add up to 1.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 行共享指定了每一行占用的百分比。对于帧视图，我们可以省略第二行共享条目，因为共享总和必须为1。
- en: '![](../Images/ece939c2e1a242c92bcb0b175d68819b.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ece939c2e1a242c92bcb0b175d68819b.png)'
- en: Limitations
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 局限性
- en: While working on this project, I ran into some limitations of Rerun. In the
    original project I visualized a prediction of the trajectory at every timestep,
    but this is currently not possible in a time series view. Also the layouts and
    configuration of the plotted data is limited, for example there’s no built-in
    way to draw a circle without fill. But since the project is very actively being
    developed, there’s a good chance that some of these might be possible in the future.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行这个项目的过程中，我遇到了Rerun的一些局限性。在原始项目中，我在每个时间步长都可视化了轨迹的预测，但在时间序列视图中目前无法实现这一点。此外，绘制的布局和数据配置有限，例如没有内置的绘制填充圆的方法。但是，由于该项目正在非常积极地开发中，未来可能会有一些可能性。
- en: Conclusion
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The developer experience with this tool as a computer vision engineer is extremely
    nice, the user interface loads almost instantly and the timeline scrubbing can
    be incredibly helpful for understanding or debugging signals in time series plots
    or in videos. I will definitely keep using and exploring this project and can
    only recommend you to try it out for yourself!
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名计算机视觉工程师，使用这个工具的开发体验非常好，用户界面几乎瞬间加载，时间轴滚动对于理解或调试时间序列图或视频中的信号非常有帮助。我肯定会继续使用并探索这个项目，并且只能推荐你自己尝试一下！
- en: '* * *'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: For more details and the full implementation, checkout the source code of this
    project under `src/ball_tracking/trajectory_rerun.py`.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 更多细节和完整实现，请查看此项目在`src/ball_tracking/trajectory_rerun.py`下的源代码。
- en: '[https://github.com/trflorian/ball-tracking-live-plot](https://github.com/trflorian/ball-tracking-live-plot)'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/trflorian/ball-tracking-live-plot](https://github.com/trflorian/ball-tracking-live-plot)'
- en: '* * *'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: All visualizations in this post were created by the author.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 本帖中的所有可视化都是由作者创建的。
