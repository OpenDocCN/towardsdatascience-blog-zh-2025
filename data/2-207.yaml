- en: Hitchhiker’s Guide to RAG with ChatGPT API and LangChain
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT API和LangChain的RAG的旅行者指南
- en: 原文：[https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/](https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/](https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/)
- en: <mdspan datatext="el1750879903177" class="mdspan-comment">Nowadays, LLMs can
    easily</mdspan> generate tons of words and responses based on general knowledge,
    but what happens when we need answers requiring accurate and specific knowledge?
    Solely generative models frequently struggle to provide answers on domain-specific
    questions for a bunch of reasons; maybe the data they were trained on is now outdated,
    maybe what we are asking for is *really *specific and specialized, maybe we want
    responses that take into account personal or corporate data that just aren’t public…
    🤷‍♀️ the list goes on.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750879903177" class="mdspan-comment">如今，大型语言模型可以轻松地根据一般知识生成大量的文字和回应，但当我们需要准确和具体的知识答案时会发生什么呢？仅仅基于生成模型的模型往往难以在特定领域的问题上提供答案，原因有很多；可能它们训练的数据现在已经过时，可能我们要求的是非常具体和专业的，可能我们希望得到的回应要考虑到个人或公司数据，而这些数据并不公开…
    🤷‍♀️ 列表还可以继续下去。
- en: 'So, how can we leverage generative AI while keeping our responses accurate,
    relevant, and down-to-earth? A good answer to this question is the [Retrieval-Augmented
    Generation (RAG)](https://en.wikipedia.org/wiki/Retrieval-augmented_generation) framework.
    RAG is a framework that consists of two key components: retrieval and generation
    (duh!). Unlike solely generative models that are pre-trained on specific data,
    RAG incorporates an extra step of retrieval that allows us to push additional
    information into the model from an external source, such as a database or a document.
    To put it differently, a RAG pipeline allows for providing coherent and natural
    responses (provided by the generation step), which are also factually accurate
    and grounded in a knowledge base of our choice (provided by the retrieval step).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何利用生成式AI同时保持我们的回应准确、相关且接地气呢？对这个问题的好答案是[检索增强生成（RAG）](https://en.wikipedia.org/wiki/Retrieval-augmented_generation)框架。RAG是一个由两个关键组件组成的框架：检索和生成（duh！）。与仅基于特定数据预训练的生成模型不同，RAG增加了一个检索步骤，允许我们从外部来源（如数据库或文档）向模型推送更多信息。换句话说，RAG管道允许提供连贯且自然的回应（由生成步骤提供），这些回应也是事实准确的，并且基于我们选择的某个知识库（由检索步骤提供）。
- en: 🍨*[**DataCream**](https://datacream.substack.com/) is a newsletter offering
    stories and tutorials on AI, data, tech. If you are interested in these topics,
    **[subscribe here](https://datacream.substack.com/).***
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🍨*[**DataCream**](https://datacream.substack.com/) 是一个提供关于AI、数据、技术的故事和教程的通讯。如果您对这些主题感兴趣，**[在此订阅](https://datacream.substack.com/)**。
- en: In this way, RAG can be an extremely valuable tool for applications where highly
    specialized data is needed, as for instance customer support, legal advice, or
    technical documentation. One typical example of a RAG application is customer
    support chatbots, answering customer issues based on a company’s database of support
    documents and FAQs. Another example would be complex software or technical products
    with extensive troubleshooting guides. One more example would be legal advice — a
    RAG model would access and retrieve custom data from law libraries, previous cases,
    or firm guidelines. The examples are really endless; however, in all these cases,
    the access to external, specific, and relevant to the context data enables the
    model to offer more precise and accurate responses.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，RAG可以成为在需要高度专业数据的应用中极具价值的工具，例如客户支持、法律咨询或技术文档。RAG的一个典型应用示例是客户支持聊天机器人，根据公司的支持文档和常见问题解答数据库回答客户问题。另一个例子是具有广泛故障排除指南的复杂软件或技术产品。另一个例子是法律咨询——RAG模型将访问和检索来自法律图书馆、先前案例或公司指南的定制数据。例子真的很多；然而，在这些所有情况下，访问外部、具体且与上下文相关的数据使模型能够提供更精确和准确的回应。
- en: So, in this post, I walk you through building a simple RAG pipeline in Python,
    utilizing ChatGPT API, LangChain, and FAISS.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在这篇文章中，我将向您展示如何在Python中构建一个简单的RAG管道，利用ChatGPT API、LangChain和FAISS。
- en: What about RAG?
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，RAG是什么呢？
- en: From a more technical perspective, RAG is a technique used to enhance an LLM’s
    responses by injecting it with additional, domain-specific information. In essence,
    RAG allows for a model to also take into account additional external information — like
    a recipe book, a technical manual, or a company’s internal knowledge base — while
    forming its responses.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 从更技术性的角度来看，RAG是一种通过向LLM注入额外的、特定领域的知识来增强LLM响应的技术。本质上，RAG允许模型在形成响应时也考虑额外的外部信息——比如食谱书、技术手册或公司的内部知识库。
- en: 'This is very important because it allows us to eliminate a bunch of problems
    inherent to LLMs, as for instance:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常重要，因为它允许我们消除LLM固有的许多问题，例如：
- en: '[Hallucinations](https://en.wikipedia.org/wiki/Hallucination_%28artificial_intelligence%29) — making
    things up'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[幻觉](https://en.wikipedia.org/wiki/Hallucination_%28artificial_intelligence%29)——编造事物'
- en: Outdated information — if the model wasn’t trained on recent data
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息过时——如果模型没有在最近的数据上训练
- en: Transparency — not knowing where responses are coming from
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 透明度——不知道响应来自哪里
- en: To make this work, the external documents are first processed into vector embeddings
    and stored in a vector database. Then, when we submit a prompt to the LLM, any
    relevant data is retrieved from the vector database and passed to the LLM along
    with our prompt. As a result, the response of the LLM is formed by considering
    both our prompt and any relevant information existing in the vector database in
    the background. Such a vector database can be hosted locally or in the cloud,
    using a service like [Pinecone](https://www.pinecone.io/) or [Weaviate](https://github.com/weaviate/weaviate).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这成为可能，首先将外部文档处理成向量嵌入并存储在向量数据库中。然后，当我们向LLM提交提示时，任何相关的数据都会从向量数据库中检索出来，并连同我们的提示一起传递给LLM。因此，LLM的响应是通过考虑我们的提示和向量数据库中存在的任何相关信息形成的。这样的向量数据库可以托管在本地或云端，使用像[Pinecone](https://www.pinecone.io/)或[Weaviate](https://github.com/weaviate/weaviate)这样的服务。
- en: '![](../Images/e3c3352727b0ff1f5371a2821b3a5162.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e3c3352727b0ff1f5371a2821b3a5162.png)'
- en: Image by author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: What about ChatGPT API, LangChain, and FAISS?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，ChatGPT API、LangChain和FAISS如何？
- en: The first component for building a RAG pipeline is the LLM model that will generate
    the responses. This can be any LLM, like Gemini or Claude, but in this post, I
    will be using OpenAI’s ChatGPTmodels via their [API platform](https://openai.com/api/).
    In order to use their API, we need to sign in and obtain an API key. We also need
    to make sure the respective Python libraries are installed.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 构建RAG管道的第一个组件是生成响应的LLM模型。这可以是任何LLM，例如Gemini或Claude，但在这篇博文中，我将使用OpenAI的ChatGPT模型，通过他们的[API平台](https://openai.com/api/)。为了使用他们的API，我们需要登录并获取API密钥。我们还需要确保安装了相应的Python库。
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The other major component of building a RAG is processing external data — generating
    embeddings from documents and storing them in a vector database. The most popular
    framework for performing such a task is [LangChain](https://www.langchain.com/langchain).
    In particular, LangChain allows:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 构建RAG的另一个主要组件是处理外部数据——从文档中生成嵌入并将它们存储在向量数据库中。执行此类任务最流行的框架是[LangChain](https://www.langchain.com/langchain)。特别是，LangChain允许：
- en: Load and extract text from various document types (PDFs, DOCX, TXT, etc.)
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加载并从各种文档类型（PDF、DOCX、TXT 等）中提取文本
- en: Split the text into chunks suitable for generating the embeddings
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将文本分割成适合生成嵌入的块
- en: Generate vector embeddings (in this post, with the assistance of OpenAI’s API)
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成向量嵌入（在本篇博文中，借助 OpenAI 的 API）
- en: Store and search embeddings via vector databases like [FAISS](https://github.com/facebookresearch/faiss), [Chroma](https://www.trychroma.com/),
    and [Pinecone](https://www.pinecone.io/)
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过向量数据库如[FAISS](https://github.com/facebookresearch/faiss)、[Chroma](https://www.trychroma.com/)和[Pinecone](https://www.pinecone.io/)存储和搜索嵌入
- en: 'We can easily install the required LangChain libraries by:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以轻松地通过以下方式安装所需的LangChain库：
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'In this post, I’ll be using LangChain together with [FAISS](https://github.com/facebookresearch/faiss),
    a local vector database developed by Facebook AI Research. FAISS is a very lightweight
    package, and is thus appropriate for building a simple/small RAG pipeline. It
    can be easily installed with:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博文中，我将使用LangChain与Facebook AI Research开发的本地向量数据库[FAISS](https://github.com/facebookresearch/faiss)一起。FAISS是一个非常轻量级的包，因此适合构建简单的/小型RAG管道。它可以轻松安装，如下所示：
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Putting everything together
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将所有内容整合在一起
- en: 'So, in summary, I will use:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，总的来说，我将使用：
- en: ChatGPT models via OpenAI’s API as the LLM
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用OpenAI的API作为LLM的ChatGPT模型
- en: LangChain, along with OpenAI’s API, to load the external files, process them,
    and generate the vector embeddings
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangChain，结合OpenAI的API，用于加载外部文件、处理它们并生成向量嵌入
- en: FAISS to generate a local vector database
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用FAISS生成本地向量数据库
- en: The file that I will be feeding into the RAG pipeline for this post is a text
    file with some facts about me. This text file is located in the folder ‘RAG files’.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我将用于此帖子的RAG管道的输入文件是一个包含关于我的事实的文本文件。这个文本文件位于“RAG文件”文件夹中。
- en: '![](../Images/13e84efd9cf656d119e0fe816ac0bd30.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/13e84efd9cf656d119e0fe816ac0bd30.png)'
- en: 'Now we are all set up, and we can start by specifying our API key and initializing
    our model:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经设置好了，我们可以通过指定我们的API密钥和初始化我们的模型来开始：
- en: '[PRE3]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Then we can load the files we want to use for the RAG, generate the embeddings,
    and store them as a vector database as follows:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以加载我们想要用于RAG的文件，生成嵌入，并将它们作为向量数据库存储如下：
- en: '[PRE4]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Finally, we can wrap everything in a simple executable Python file:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以将所有内容封装在一个简单的Python可执行文件中：
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Notice how the system prompt is defined. Essentially, a system prompt is an
    instruction given to the LLM that sets the behavior, tone, or constraints of the
    assistant before the user interacts. For example, we could set the system prompt
    to make the LLM provide responses like talking to a 4-year-old or a rocket scientist — here
    we ask to provide responses only based on the external data we provided, the ‘*Maria
    facts*’
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 注意系统提示是如何定义的。本质上，系统提示是给LLM（大型语言模型）的一个指令，它设置了在用户交互之前助手的行为了、语气或约束。例如，我们可以设置系统提示，让LLM提供像与4岁孩子或火箭科学家交谈一样的回应——在这里，我们要求只基于我们提供的‘*Maria事实*’来提供回应
- en: So, let’s see what we’ve cooked! 🍳
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们看看我们煮了些什么！ 🍳
- en: Firstly, I ask a question that is irrelevant to the provided external datasource,
    to make sure that the model only uses the provided datasource when forming the
    responses and not general knowledge.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我提出一个问题，这个问题与提供的外部数据源无关，以确保模型在形成回应时只使用提供的数据源，而不是一般知识。
- en: '![](../Images/653c42a49df2e4d5665d72a9cb3e966b.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/653c42a49df2e4d5665d72a9cb3e966b.png)'
- en: '[](https://substackcdn.com/image/fetch/$s_!22PH!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F49a603c2-239b-4db3-b363-770cf0599584_694x352.gif)
    … and then I asked some questions specifically from the file I provided…'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '[](https://substackcdn.com/image/fetch/$s_!22PH!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F49a603c2-239b-4db3-b363-770cf0599584_694x352.gif)
    …然后我针对我提供的文件中的具体内容提出了一些问题…'
- en: '![](../Images/bbf0abf2b4b6c6f865c0357fa4289394.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bbf0abf2b4b6c6f865c0357fa4289394.png)'
- en: ✨✨✨✨
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: ✨✨✨✨
- en: On my mind
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在我心中
- en: Apparently, this is a very simplistic example of a RAG setup — there’s much
    more to consider when implementing it in a real business environment, such as
    security concerns around how data is handled, or performance issues when dealing
    with a larger, more realistic knowledge corpus and increased token usage. Nonetheless,
    I believe OpenAI’s API is truly impressive and offers immense, untapped potential
    for building custom, context-specific AI applications.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，这是一个非常简单的RAG设置示例——在将其应用于实际商业环境时，还有许多其他因素需要考虑，例如数据处理的安全问题，或者处理更大、更真实的知识库和增加的令牌使用时的性能问题。尽管如此，我相信OpenAI的API真正令人印象深刻，并为构建定制、特定上下文的AI应用提供了巨大的、尚未开发的潜力。
