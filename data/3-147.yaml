- en: Data-Driven March Madness Predictions
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据驱动的三月疯狂赛预测
- en: 原文：[https://towardsdatascience.com/data-driven-march-madness-predictions/](https://towardsdatascience.com/data-driven-march-madness-predictions/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/data-driven-march-madness-predictions/](https://towardsdatascience.com/data-driven-march-madness-predictions/)
- en: '**<mdspan datatext="el1742929816083" class="mdspan-comment">March</mdspan>
    Madness is infamously unpredictable**, a perfect storm where favorites tumble
    and underdogs rise to do the impossible. Every March, 64 men’s and 64 women’s
    college basketball teams battle for glory, while millions of fans, analysts, and
    betting markets scramble to predict the outcomes. But the odds of picking a perfect
    bracket? 1 in 9.2 quintillion (9 billion billions). Even if you are a basketball
    expert, your chances barely improve, maybe 1 in 120 billion. In the entire history
    of the tournament, no one has ever gotten it 100% right, the record is 49 games
    until the first mistake. When an invite to a March Madness pool landed in my inbox,
    I felt completely lost. As a Dutch guy living in the US, I had no idea who the
    teams were and had to do a crash course on how the tournament worked. But there’s
    one thing I do know: coding.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**<mdspan datatext="el1742929816083" class="mdspan-comment">三月疯狂赛**》臭名昭著地难以预测，是一场完美的风暴，其中热门球队跌落，黑马球队崛起，完成不可能的任务。每年三月，64支男子和64支女子大学篮球队为荣耀而战，而数百万的球迷、分析师和投注市场都在争先恐后地预测结果。但选择完美胜负表的几率是多少？9.2亿亿分之一（90亿亿）。即使你是篮球专家，你的机会也几乎不会提高，可能只有120亿分之一。在整个锦标赛的历史上，没有人曾经100%正确，记录是49场比赛直到第一次出错。当一份三月疯狂赛的邀请函落在我的邮箱里时，我感到完全不知所措。作为一个居住在美国的荷兰人，我根本不知道这些球队是谁，不得不对锦标赛的运作进行快速学习。但有一件事我知道：编程。'
- en: Finding the right data
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 寻找正确的数据
- en: Different sources offer different ways of measuring team strength, each with
    its methods. Some of the more commonly used sources are; [KenPom Ratings](https://kenpom.com),
    [Nate Silver’s FiveThirtyEight’s Predictions](https://www.natesilver.net/p/sbcb-college-basketball-ratings-men),
    the [NCAA Standings and Team Stats](https://www.ncaa.com/standings/basketball-men/d1),
    or even [Vegas Odds and Betting Markets](https://www.vegasinsider.com/college-basketball/odds/las-vegas/).
    The latter is an intersting predicting of the game since it factors in a lot of
    different sentiment either from just the public or experts.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的来源提供不同的衡量球队实力的方法，每种方法都有其特点。一些更常用的来源包括；[KenPom排名](https://kenpom.com)，[内特·西尔弗的FiveThirtyEight预测](https://www.natesilver.net/p/sbcb-college-basketball-ratings-men)，[NCAA排名和球队统计数据](https://www.ncaa.com/standings/basketball-men/d1)，甚至[拉斯维加斯赔率和投注市场](https://www.vegasinsider.com/college-basketball/odds/las-vegas/)。后者是预测比赛的一个有趣的方法，因为它考虑了来自公众或专家的大量不同情绪。
- en: Each of these sources has strengths and weaknesses, some are heavier on the
    statistical methods and even combine various data sources, e.g. Nate Silver, while
    others use the raw season information and historical trends. Understanding these
    differences between the sources is key when deciding which numbers to trust in
    your bracket predictions.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 每个这些来源都有其优势和劣势，有些更侧重于统计方法，甚至结合了各种数据来源，例如内特·西尔弗，而有些则使用原始赛季信息和历史趋势。在决定在您的胜负预测中信任哪些数字时，理解这些来源之间的差异是关键。
- en: 'Before diving into the key metrics, it’s important to acknowledge a fundamental
    limitation: in an ideal world, a fully optimized model would incorporate individual
    game statistics from the past season, player performance data, and historical
    trends. Unfortunately, I don’t have access to that level of granular data, and
    seconly since this is just a fun project I dont want to make things overly complicated.
    Instead, I had to rely on my own brain an use proxies based on the KenPom rankings
    data. The big question remains:* How well will this model perform?* I make no
    claims that it will be perfect. In fact, the only certainty in March Madness is
    that **it will be wrong**. But at the very least, this model provides a structured,
    data-driven way to make better decisions, even with my limited knowledge of college
    basketball teams.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入研究关键指标之前，重要的是要承认一个基本限制：在一个理想的世界里，一个完全优化的模型将结合过去赛季的每场比赛统计数据、球员表现数据和历史趋势。不幸的是，我没有访问到这种细粒度数据，其次，由于这只是一个有趣的项目，我不想让它过于复杂。因此，我不得不依靠自己的大脑，并使用基于KenPom排名数据的代理。最大的问题仍然是：这个模型的表现将如何？我并不声称它将是完美的。事实上，三月疯狂赛唯一确定的是**它将会出错**。但至少，这个模型提供了一种结构化、数据驱动的决策方式，即使我对大学篮球队的了解有限。
- en: The key metrics to unlock a winning bracket
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解锁获胜胜负的关键指标
- en: When building a predictive model for March Madness, the challenge is deciding
    which statistics truly matter. Not every statistic is important, some provide
    deeper insight into team performance, while others are just cuase confusion. To
    balance predictive power with simplicity, I selected a handful of key metrics
    that capture overall team strength, consistency, and potential for upsets. These
    include efficiency ratings, luck, momentum, tempo, and volatility, each playing
    a crucial role in simulating realistic tournament outcomes.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建March Madness的预测模型时，挑战在于决定哪些统计数据真正重要。并非每个统计数据都重要，有些提供了对球队表现的更深入洞察，而有些则只是造成混淆。为了在预测能力和简单性之间取得平衡，我选择了一些关键指标，这些指标捕捉了整体球队实力、一致性和潜在的意外性。这些包括效率评级、运气、势头、节奏和波动性，每个都在模拟现实锦标赛结果中扮演着关键角色。
- en: Team efficiency (net ratings & adjusted ratings)
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 队伍效率（净效率和调整效率）
- en: '*Net Rating*: This is the difference between a team’s *Offensive Rating *and
    it’s *Defensive Rating*. This metric gives me a measure of overall team strength
    Kenpom calculates this by computing by how many points a team outscores its opponents
    per 100 possessions.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*净效率*：这是球队进攻效率与防守效率之间的差异。这个指标给了我一个衡量整体球队实力的度量。Kenpom通过计算球队每100次控球比对手多出的分数来计算这个指标。'
- en: '*Adjusted Efficiency*: Sine some leagues or more competitive than others I
    felt that relying only on Net Rating would unfairly treat teams in though competitions.
    So I use the conference average competitativeness as an adjustment that ensures
    that teams playing in weaker conferences and doing really well are penalized while
    teams facing though competitors get a bonus.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '*调整效率*：由于一些联赛比其他联赛更具竞争力，我觉得仅仅依靠净效率是不公平的，这会对待那些在激烈竞争中表现不错的队伍。因此，我使用联盟平均竞争力作为调整因素，以确保那些在较弱联盟中表现优异的队伍受到惩罚，而面对强劲对手的队伍则获得加分。'
- en: The faster you go, the harder you fall
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 越快，跌得越重
- en: My logic here was that teams that play at a faster pace create more possessions
    per game. This has the disadvantage that not only increases it the number of opportunities
    for scoring but also for mistakes. This higher tempo can, therefore, lead to greater
    variance in performance. And a high variance in performance makes the team more
    prone to high-risk, high-reward scenarios, resulting in either blowout wins or
    shocking upsets. This allows team that are on paper disfavored to close the gap
    in quality difference and give their opponents a harder time. Teams that rely
    on high-tempo play styles are.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我这里的逻辑是，那些比赛节奏较快的队伍每场比赛能创造更多的控球机会。这有一个缺点，那就是不仅增加了得分的机会，也增加了失误的机会。因此，这种较高的节奏可能会导致表现上的更大波动。而表现上的高波动性使得队伍更容易陷入高风险、高回报的场景，从而导致一边倒的胜利或令人震惊的失败。这也使得那些在纸面上处于不利地位的队伍有机会缩小与对手在质量上的差距，给对手制造更大的困难。那些依赖高节奏比赛风格的队伍就是这样的。
- en: Luck factor
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运气因素
- en: Not all wins and losses tell the full story. Some teams are known to win more
    games than they should compared to the predictions that data might give. While
    others can underperform, an example is that they lose close games that should
    have turned their way. However, Luck might be the hardest of the metrics to really
    trust, like I don’t even trust my own luck…
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有的胜负都能完全讲述故事。有些队伍相对于数据预测的胜负，实际上赢得的比赛更多。而有些队伍可能表现不佳，例如，他们输掉了本应属于他们的关键比赛。然而，运气可能是最难真正信赖的指标，就像我甚至不相信自己的运气一样…
- en: So, how do I fold in the Luck Factor? Based on Kenpoms data, Luck measures the
    difference between a team’s actual win-loss record and its expected record. A
    team with a high luck rating won more games than expected. While a team with negative
    luck may have been on the wrong end of buzzer-beaters, while they overall play
    good games.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我如何将运气因素纳入其中？根据Kenpom的数据，运气衡量的是一支球队的胜负记录与其预期记录之间的差异。运气高的球队赢得了比预期更多的比赛。而运气差的球队可能在关键时刻输掉比赛，尽管他们整体表现良好。
- en: 'Momentum: High peaks and low lows'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 势头：高点和低点
- en: In an ideal world, I would measure momentum by looking at a team’s last 10–20
    games, identifying the teams that feel invincible leading into the tournament.
    But without direct access to that data, I had to get creative and find a proxy.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个理想的世界里，我会通过观察一支球队过去10-20场比赛的表现来衡量势头，识别那些在锦标赛前感觉不可战胜的球队。但因为没有直接访问这些数据，我不得不发挥创意，找到一个替代指标。
- en: I define momentum as how much a team is overperforming relative to the league
    average. I compare a team’s Net Rating to the overall league mean, teams that
    are well above average are considered to have more momentum, while teams that
    fall below average get reduced.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我将势头定义为球队相对于联赛平均水平的超额表现程度。我比较球队的净评级与整个联赛的平均值，表现远高于平均水平的球队被认为有更多的势头，而低于平均水平的球队则减少。
- en: 'Fatigue: A tournament is a marathon not a sprint'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 疲劳：锦标赛是一场马拉松，而不是短跑
- en: Not all wins have the same effect on a team’s energy levels. A nail-biting overtime
    victory against a strong opponent could have serious consequences compared to
    an easy double-digit win. To account for this, I rescale the team’s rating with
    a fatigue factor. This factor is computed by penalizing teams that are predicted
    to win with a slim probability margin.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有胜利对球队的能量水平都有相同的影响。与强队进行的紧张加时赛胜利可能比轻松的两位数胜利有严重的后果。为了解决这个问题，我使用疲劳因素重新调整球队的评级。这个因素通过惩罚预测获胜概率微小的球队来计算。
- en: In summary, these six factors are the main ingredients into computing the probability
    if a team wins or loses. But knowing the metrics is only half the story. Now,
    I need a code that can fully simulate the tournament, and I hope that I get more
    realistic outcomes than just relying on the cutest-looking mascot (I do like the
    dogs!) or seed-based assumptions.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这六个因素是计算球队获胜或失败概率的主要成分。但了解这些指标只是故事的一半。现在，我需要一个可以完全模拟锦标赛的代码，我希望我能得到比仅仅依赖最可爱的吉祥物（我喜欢狗狗！）或基于种子的假设更现实的结局。
- en: '**The algorithm: Simulating the madness**'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**算法：模拟疯狂**'
- en: In short, my March Madness model is built around so called Monte Carlo simulations,
    these are probabilistic simulations that turn my basketball metrics into tens
    of thousands of tournament outcomes to find out which team advances to the next
    rounds. So I am not computing a single bracket, my codes runs tens of thousands
    of simulations, each time playing out the tournament from start to finish under
    different conditions.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，我的疯狂三月模型是基于所谓的蒙特卡洛模拟构建的，这些是概率模拟，将我的篮球指标转化为数以万计的锦标赛结果，以找出哪支队伍可以晋级下一轮。因此，我并不是计算一个单独的赛程表，我的代码运行了数以万计的模拟，每次都在不同的条件下从开始到结束模拟整个锦标赛。
- en: '![](../Images/b0047ec11d57ed98c9c128bb67228719.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b0047ec11d57ed98c9c128bb67228719.png)'
- en: Photo by [Arif Riyanto](https://unsplash.com/@arifriyanto?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Arif Riyanto](https://unsplash.com/@arifriyanto?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral) 提供
- en: '**Step 1: Generating matchups**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一步：生成比赛对阵**'
- en: The first-round matchups are built using the tournament seeds from NCAA, where
    I had to make sure that the bracket I simulate follows result in proper team pairings.
    For this I use the seeding rules, pairing teams like 1-seed vs. 16-seed, 8-seed
    vs. 9-seed, and so on, just like in the real tournament.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 第一轮的对阵是通过使用NCAA的锦标赛种子来构建的，我必须确保我模拟的赛程表会导致适当的球队配对。为此，我使用种子规则，将球队配对为1号种子对阵16号种子，8号种子对阵9号种子，等等，就像在真正的锦标赛中一样。
- en: '**Step 2: Computing win probabilities**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二步：计算获胜概率**'
- en: Each game is simulated using a logistic probability function. This means every
    game has some form of complex level of uncertainty, instead of simply favoring
    the higher seed every time. The probability then depends on the key metric I described
    above: **Adjusted Team Strength, Volatility, Style of Play, Fatigue Effects and
    Luck.** Lastly I added a Upset generator, for this I randomly drawn a number from
    a heavy side t-distribution, these distribution are great to mimic rare events
    and adds a bit more noise to the predictions. Each factor has its own weight factor
    that the I can pick to make certain effects more or less important and a total
    combined probability is calculated.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 每场比赛都使用逻辑概率函数进行模拟。这意味着每场比赛都有某种形式的不确定性，而不仅仅是每次都偏向种子更高的球队。概率然后取决于我上面描述的关键指标：**调整后的球队实力、波动性、比赛风格、疲劳效应和运气**。最后我添加了一个意外事件生成器，为此我从一个重侧t分布中随机抽取一个数字，这些分布非常适合模拟罕见事件，并为预测添加了一些噪声。每个因素都有其自己的权重因子，我可以选择以使某些效果更重要或更不重要，并计算出一个总联合概率。
- en: '**Step 3: Running the tournament**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三步：运行锦标赛**'
- en: The simulator then runs in two modes, the first mode can determine the most
    probable bracket; the model simulates each game in a round tens of thousands of
    times. After each round, it computes how often a team wins or loses, and computes
    a certainty; the ratio between the number of wins to the number of games played,
    this will be important for finding potential upsets. The winners move on, and
    new matchups are formed and the cycle is repeated for the next rounds.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟器以两种模式运行，第一种模式可以确定最可能的赛程；模型在每一轮中模拟每场比赛数万次。在每一轮之后，它计算一个队伍赢得或输掉的频率，并计算一个确定性；赢得的比赛数与比赛总数的比率，这对于寻找潜在的爆冷非常重要。胜者晋级，形成新的对决，然后下一轮重复这个过程。
- en: The second mode computes champion predictions, this means that instead of running
    each game tens of thousands of times, I run full brackets tens of thousands of
    times and afterwards I count how often each team wins it all.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种模式计算冠军预测，这意味着不是每次比赛都运行数万次，而是运行数万次完整的赛程，然后计算每个队伍赢得全部比赛的概率。
- en: '**Step 4: Analyzing outcomes**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：分析结果**'
- en: 'After the tens of thousands of simulated tournaments, the model sums up the
    results and leaves it me to analyze the results:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行了数万次模拟锦标赛之后，模型汇总了结果，然后留给我分析结果：
- en: • **Championship Odds** (How often each team wins it all)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: • **冠军概率**（每个队伍赢得全部比赛的概率）
- en: • **Final Four Probabilities** (Who makes it deep into the bracket)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: • **最终四强概率**（谁将深入赛程）
- en: • **Biggest Upset Chances** (Which lower seeds pull off shocking wins)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: • **最大爆冷机会**（哪些排名较低的球队会实现惊人的胜利）
- en: Rather than simply guessing winners, the model quantifies which teams are *most
    likely* to either advance or win the championship, I get a percentage by counting
    their succeses compared to the total simulations the code ran.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 模型并非简单地猜测胜者，而是量化哪些队伍最有可能晋级或赢得冠军，我通过计算它们相对于代码运行的总模拟次数的成功率来得到一个百分比。
- en: The base prediction
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基础预测
- en: So onto the fun part, how do I pick for March Madness?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们进入有趣的部分，我如何为疯狂三月挑选？
- en: Crowning a champion
  id: totrans-42
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 冠军诞生
- en: For my top four champions I found; Duke, Florida, Auburn and Houston. Compared
    to betting offices this looks fairly reasonable! Not surprisingly these four teams
    also have the highest odds of making the Final Four and are the highest seeds
    going into the tournament. If you don’t have one of these four as your winner…
    You might be in trouble!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我找到的前四名冠军：杜克、佛罗里达、奥本和休斯顿。与赌场相比，这看起来相当合理！不出所料，这四支球队也有进入最终四强的最高概率，并且是进入锦标赛时排名最高的种子。如果你没有选择这四支球队中的任何一支作为你的冠军……你可能麻烦了！
- en: Deciding the bracket
  id: totrans-44
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 决定赛程
- en: Once I have the full bracket and the potential champions the work is only just
    getting started. Who will be the big upsets this year? And this is where things
    get interesting, as anyone who ever participated in these bracket challenges knows.
    On one hand you want to bank on games that have a very clear winner, and identify
    a handful of close games that might go either way and roll the die. After all,
    March Madness isn’t about getting every pick right, it’s about picking the right
    surprises.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我有了完整的赛程和潜在冠军，工作才刚刚开始。今年会有哪些大冷门？这正是这些Bracket挑战的参与者所知道的地方。一方面，你希望押注那些胜者非常明确的比赛，并识别出几场可能胜负难分的比赛，然后掷骰子。毕竟，疯狂三月不仅仅是关于每次选择都正确，而是关于选择正确的惊喜。
- en: '**Pick your upsets**'
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**挑选你的爆冷**'
- en: So, the toughest question remains, how do you spot this year’s Cinderella story?
    Every tournament, a lower-seeded team shocks the field, busting brackets everywhere.
    But can I predict which teams are most likely to pull off an upset?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，最困难的问题仍然是，你如何找到今年的灰姑娘故事？每个锦标赛，排名较低的球队都会给赛场带来惊喜，打破所有预测。但我能预测哪些队伍最有可能实现爆冷吗？
- en: 'To find potential upsets, I focused on two sets of teams:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了找到潜在的爆冷，我专注于两套队伍：
- en: 1. **Teams that are predicted to beat their higher-ranked opponent**
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **预计将击败排名更高的对手的队伍**
- en: Some teams in my model are projected to win their game while their opponent
    has a higher seed. These are slam-dunk picks for an upset! To give some examples
    that came out of my final simulation;
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我模型中的某些队伍预计将在比赛中获胜，而他们的对手排名更高。这些是爆冷取胜的绝佳选择！以下是一些来自我最终模拟的例子；
- en: Memphis [5] vs Colorado St. [12] -> Colorado St. [12]
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 孟菲斯 [5] 对科罗拉多州立 [12] -> 科罗拉多州立 [12]
- en: Mississippi St. [8] vs Baylor [9] -> Baylor [9]
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 密西西比州立 [8] 对贝勒 [9] -> 贝勒 [9]
- en: 2. **Is the game projected to be close?**
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **比赛预计会接近吗？**
- en: This is more tricky and will come down to luck. Any game where the model gives
    the underdog at least a 40% chance I identify as a potential upset. A specific
    good example of this is Connecticut [8] vs Oklahoma [9] -> Connecticut [8] which
    truly is a coin toss in my simulation. Which of these potential upsets to pick
    as actual upsets… That’s down to a coin flip.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这更加棘手，最终将取决于运气。任何模型给出至少40%机会的弱队比赛，我都会将其识别为潜在的意外。一个具体的良好例子是康涅狄格[8] 对俄克拉荷马[9]
    -> 康涅狄格[8]，在我的模拟中这确实是一场真正的抛硬币比赛。选择哪些潜在的意外作为实际意外……这取决于抛硬币的结果。
- en: At the end of the day, March Madness thrives on chaos. You can use data, probability,
    and past performance to make smarter picks, but sometimes the biggest upsets come
    down to nothing but luck. Choose wisely…
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，三月疯狂赛事依赖于混乱。你可以使用数据、概率和过去的表现来做出更明智的选择，但有时最大的意外只是纯粹的运气。明智地选择……
- en: 'Wrapping up: What I learned'
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结：我所学到的
- en: This project was a deep dive into finding order in the chaos of March Madness,
    combining my knowledge of data science with the unpredictability of college basketball.
    I had a lot of fun building my, and if there’s one thing I’ve learned, it’s that
    you don’t need code to compute the probability of being wrong. Being wrong is
    a 100% given. The real question is: **are you less wrong than everyone else? **There
    are so many uncertainties that I haven’t accounted for or are impossible to avoid.
    Upsets will happen, Cinderella stories will unfold, and no model, can fully predict
    the Madness.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目是对三月疯狂赛事混乱中寻找秩序的深入探索，结合了我对数据科学的了解和大学篮球的不确定性。我建造这个项目时非常愉快，如果说我学到了什么，那就是你不需要代码来计算犯错的概率。犯错是100%必然的。真正的问题是：**你是否比其他人犯的错误更少？**有许多不确定性我没有考虑到或者无法避免。意外会发生，灰姑娘的故事会展开，没有任何模型可以完全预测疯狂。
- en: 'If you want to have a look at my code: [https://github.com/jordydavelaar/MarchMadSim](https://github.com/jordydavelaar/MarchMadSim)'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想看看我的代码：[https://github.com/jordydavelaar/MarchMadSim](https://github.com/jordydavelaar/MarchMadSim)
- en: '**A Word of Caution:** The code I developed was just a fun weekend project,
    and this write-up is meant to be educational, not financial advice. Sports betting
    is very risky, and while data can provide insights, it can’t predict the future.
    Bet responsibly and seek help if you need it. Call 1–800-GAMBLER.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意事项**：我开发的代码只是一个有趣的周末项目，这份文档的目的是教育性的，而不是财务建议。体育博彩风险很高，虽然数据可以提供洞察，但它不能预测未来。负责任地投注，并在需要时寻求帮助。拨打1–800-GAMBLER。'
- en: '**Acknowledgment**: While writing my code, I made use of the LLM ChatGPT, the
    data used to make predictions was paid for and came from [Kenpom](https://kenpom.com).'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**致谢**：在编写我的代码时，我使用了LLM ChatGPT，用于预测的数据是付费获取的，并来自[Kenpom](https://kenpom.com)。'
