- en: 'Exponential Moving Average (EMA):'
  id: totrans-142
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 指数移动平均（EMA）：
- en: Training a neural network using mini batches introduces noise and less accurate
    gradients when gradient descent updates the model parameters between batches.
    Exponential moving average is used in training deep neural networks to improve
    their stability and generalization.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 使用小批量训练神经网络会在梯度下降在批量之间更新模型参数时引入噪声和更不精确的梯度。指数移动平均在训练深度神经网络时用于提高其稳定性和泛化能力。
- en: Instead of just using the raw weights that are directly learned during training,
    EMA maintains a running average of the model weights which are then updated at
    each training step using a weighted average of the current weights and the previous
    EMA values.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 与仅使用训练期间直接学习的原始权重不同，EMA维护模型权重的运行平均值，然后在每一步训练中使用当前权重和先前EMA值的加权平均值进行更新。
- en: 'Specifically, at each training step, the EMA weights are updated using:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，在每一步训练中，指数移动平均（EMA）的权重是通过以下方式更新的：
- en: \[\theta_{\mathrm{EMA}} \leftarrow \alpha \, \theta_{\mathrm{EMA}} + (1 – \alpha)
    \, \theta\]
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: \[\theta_{\mathrm{EMA}} \leftarrow \alpha \, \theta_{\mathrm{EMA}} + (1 – \alpha)
    \, \theta\]
- en: where θ are the current model weights and α is a decay factor controlling how
    much weight is given to the past.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 其中θ是当前模型权重，α是一个衰减因子，它控制过去赋予多少权重。
- en: By evaluating the EMA weights rather than the raw ones at test time, we found
    improved consistency in performance across runs, especially in the later stages
    of training.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在测试时评估EMA权重而不是原始权重，我们发现运行间的性能一致性得到了改善，尤其是在训练的后期阶段。
