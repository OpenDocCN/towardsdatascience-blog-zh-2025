- en: 'Trivial Augment​:'
  id: totrans-83
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Trivial Augment：
- en: To explore the impact of stronger data augmentation, we replaced the baseline
    augmentation with **TrivialAugment**. Trivial Augment works as follows. It takes
    an image x and a set of augmentations A as  input. It then simply samples an augmentation
    from A uniformly at random and applies this augmentation to the given image x
    with a strength m, sampled uniformly at random from the set of possible strengths {0,
    . . . , 30}, and returns the augmented image.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 为了探索更强的数据增强的影响，我们将基线增强替换为 **TrivialAugment**。Trivial Augment 的工作原理如下。它接受一个图像
    x 和一组增强 A 作为输入。然后它简单地从 A 中均匀随机抽取一个增强，并以从可能的强度集合 {0, ..., 30} 中均匀随机抽取的强度 m 应用此增强到给定的图像
    x，并返回增强后的图像。
- en: What makes TrivialAugment especially attractive is that it’s **completely parameter-free,**
    it doesn’t require search or tuning, making it a simple yet effective drop-in
    replacement that reduces experimental complexity.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 使 TrivialAugment 特别吸引人的是，它是 **完全无参数的**，不需要搜索或调整，使其成为一个简单而有效的即插即用替换，从而降低了实验复杂性。
- en: While it may seem counterintuitive that such a generic and randomized strategy
    would outperform augmentations specifically tailored to the dataset or more sophisticated
    automated augmentation methods, we tried a variety of alternatives, and **TrivialAugment
    consistently delivered strong results** across runs. Its simplicity, stability,
    and surprisingly high effectiveness make it a compelling default choice.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这样的通用和随机策略似乎会优于针对数据集特定定制的增强或更复杂的自动化增强方法，但我们尝试了各种替代方案，**TrivialAugment 在所有运行中始终提供了强大的结果**。它的简单性、稳定性和出人意料的高效性使其成为一个有吸引力的默认选择。
