- en: 'Random Erasing:'
  id: totrans-127
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 随机擦除：
- en: As an additional form of regularization, we introduced Random Erasing into the
    training pipeline. This technique randomly selects a rectangular region within
    an image and replaces its pixels with random values, with a fixed probability.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一种额外的正则化形式，我们将随机擦除引入到训练流程中。这种技术随机选择图像中的一个矩形区域，并用随机值替换其像素，以固定的概率。
- en: Often paired with Automatic Augmentation methods, it usually yields additional
    improvements in accuracy due to its regularization effect.​ We added Random Erasing
    with a probability of 0.1.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 通常与自动增强方法配对，由于其正则化效果，通常会在准确率上带来额外的改进。我们添加了概率为0.1的随机擦除。
