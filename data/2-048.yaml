  zh: '| **0.994** | **94.93** | 0 | +6.71 |  |'
- en: We tested EMA in isolation, and found that it led to notable improvements in
    both training stability and validation performance. But when we integrated EMA
    into the full recipe alongside other techniques, it did not provide further improvement.
    The results appeared to plateau, suggesting that most of the gains had already
    been captured by the other components.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我们单独测试了EMA，并发现它在训练稳定性和验证性能方面都带来了显著的改进。但是，当我们把EMA与其他技术整合到完整的方案中时，它并没有带来进一步的改进。结果似乎达到了平台期，这表明大部分的收益已经被其他组件所捕获。
- en: Because our goal is to develop a **general-purpose training recipe** rather
    than one overly tailored to a single dataset, we chose to **keep EMA in the final
    setup**. Its benefits may be more pronounced in other conditions, and its low
    overhead makes it a safe inclusion.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的目标是开发一个**通用训练方案**而不是针对单个数据集过度定制，我们选择**保留EMA在最终设置中**。在其他条件下，其优势可能更为明显，并且其低开销使其成为一个安全的选择。
- en: 'Optimizations we tested but didn’t adopt:'
  id: totrans-161
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 我们测试了一些优化方法但没有采用：
- en: 'We also explored a range of additional techniques that are commonly effective
    in other image classification tasks, but found that they either **did not lead
    to significant improvements** or, in some cases, **slightly regressed performance**
    on the Stanford Cars dataset:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还探索了一系列在其他图像分类任务中通常有效的额外技术，但发现它们要么**没有带来显著的改进**，或者在某些情况下，**在斯坦福汽车数据集上略微降低了性能**：
- en: '**Weight Decay:** Adds L2 regularization to discourage large weights during
    training. We experimented extensively with weight decay in our use case, but it
    consistently regressed performance.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**权重衰减**：在训练过程中添加L2正则化以抑制大权重。我们在我们的用例中广泛地实验了权重衰减，但它始终降低了性能。'
- en: '**Cutmix/Mixup:** Cutmix replaces random patches between images and mixes the
    corresponding labels. Mixup creates new training samples by linearly combining
    pairs of images and labels.  We tried applying either CutMix or MixUp randomly
    with equal probability during training, but this approach regressed results.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Cutmix/Mixup**：Cutmix替换图像之间的随机补丁并混合相应的标签。Mixup通过线性组合图像和标签对来创建新的训练样本。我们尝试在训练过程中随机以相等的概率应用CutMix或MixUp，但这种方法降低了结果。'
- en: '**AutoAugment:** Delivered strong results and competitive accuracy, but we
    found **TrivialAugment** to be better. More importantly, TrivialAugment is completely
    parameter-free, which cuts down our search space and simplifies tuning.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AutoAugment**：取得了强大的结果和有竞争力的准确度，但我们发现**TrivialAugment**更好。更重要的是，TrivialAugment完全无参数，这减少了我们的搜索空间并简化了调整。'
- en: '**Alternative Optimizers and Schedulers:** We experimented with a wide range
    of optimizers and learning rate schedules. **Nesterov Accelerated Gradient (NAG)**
    consistently gave us the best performance among optimizers, and **Cosine Annealing**
    stood out as the best scheduler, delivering strong results with no additional
    hyperparameters to tune.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**替代优化器和调度器**：我们尝试了广泛的优化器和学习率调度器。**Nesterov加速梯度（NAG）**在优化器中始终给我们带来最佳性能，而**余弦退火**作为最佳调度器脱颖而出，它提供了强大的结果，无需调整额外的超参数。'
- en: '4\. Conclusion:'
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 结论：
- en: 'The graph below summarizes the improvements as we progressively built up our
    training recipe:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表总结了我们在逐步构建训练方案过程中的改进：
- en: '![](../Images/3e12ef5bbac0292e87c4acd523ed087d.png)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3e12ef5bbac0292e87c4acd523ed087d.png)'
- en: Cumulative Accuracy Improvement from Model Refinements. Image by author.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 模型细化带来的累积准确度提升。图由作者提供。
- en: Using just a standard **ResNet-50**, we were able to achieve **strong performance
    on the Stanford Cars dataset**, demonstrating that careful tuning of a few simple
    techniques can go a long way in fine-grained classification.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 仅使用标准的**ResNet-50**，我们就能在**斯坦福汽车数据集**上实现**强大的性能**，这证明了仔细调整一些简单技术可以在细粒度分类中取得长足的进步。
- en: However, it’s important to keep this in perspective. These results mainly show
    that we can train a model to distinguish between fine-grained, well-represented
    classes in a clean, curated dataset. The **Stanford Cars dataset** is nearly **class-balanced**,
    with **high-quality, mostly frontal images** and **no major occlusion or real-world
    noise**. It does **not address challenges like long-tailed distributions**, domain
    shift, or recognition of unseen classes.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，保持这种观点很重要。这些结果主要表明，我们可以在一个干净、精心整理的数据集中训练一个模型来区分细粒度、表现良好的类别。**斯坦福汽车数据集**几乎**类别平衡**，包含**高质量、主要是正面的图像**，且**没有重大遮挡或现实世界的噪声**。它**没有解决像长尾分布、领域迁移或未知类别的识别**等挑战。
- en: In practice, you’ll never have a dataset that covers **every car model**—especially
    one that’s **updated daily** as new models appear. Real-world systems need to
    handle **distributional shifts**, **open-set recognition**, and **imperfect inputs**.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，你永远不会有一个覆盖**所有汽车型号**的数据集——尤其是那些**每天更新**以适应新模型的型号。现实世界的系统需要处理**分布性变化**、**开放集识别**和**不完美的输入**。
- en: So while this served as a **strong baseline and proof of concept**, there was
    still significant work to be done to build something **robust and production-ready**.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，虽然这提供了一个**强大的基线和概念证明**，但仍然需要做大量的工作来构建一个**稳健且适用于生产的**系统。
