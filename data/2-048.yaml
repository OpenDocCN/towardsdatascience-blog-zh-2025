  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 交叉熵损失 | 224×224 | 600 | 200 | 标准化 | 88.22 |'
- en: We fix the **random seed** across runs to ensure reproducibility and reduce
    variance between experiments. To assess the true effect of a change in the recipe,
    we follow best practices and average results over **multiple runs (typically 3
    to 5)**.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在运行之间固定**随机种子**以确保可重复性和减少实验之间的方差。为了评估配方变化的真正影响，我们遵循最佳实践，并在**多次运行（通常是3到5次）**上平均结果。
- en: We’ll now build on top of this baseline step-by-step, introducing one technique
    at a time and tracking its impact on accuracy. The goal is to isolate what each
    component contributes and how they compound when applied together.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将逐步构建在这个基础之上，每次介绍一种技术，并跟踪其对准确率的影响。目标是隔离每个组件的贡献以及它们组合应用时的累积效应。
- en: Large batch training:​
  id: totrans-65
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 大批量训练：
- en: In mini-batch SGD, gradient descending is a random process because the examples 
    are randomly selected in each batch. Increasing the batch size does not change
    the expectation of the stochastic gradient but reduces its variance.  Using large
    batch size, however, may slow down the training progress. For the same number
    of epochs, training with a large batch size results in a model with degraded validation
    accuracy compared to the ones trained with smaller batch sizes. ​
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在小批量SGD中，梯度下降是一个随机过程，因为每个批次中的示例是随机选择的。增加批大小不会改变随机梯度的期望，但会减少其方差。然而，使用大批大小可能会减慢训练进度。对于相同数量的epoch，与使用较小批大小训练的模型相比，使用大批大小训练的模型在验证准确率上有所下降。
- en: He *et al [5]* argues that linearly increasing the learning rate with the batch
    size works empirically for ResNet-50 training.​
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: He等人[5]认为，随着批大小的增加线性增加学习率在ResNet-50训练中经验上是有效的。
- en: To improve both the accuracy and the speed of our training we change the batch
    size to 128 and the learning rate to 0.1\. We add a StepLR scheduler that decays
    the learning rate of each parameter group by 0.1 every 30 epochs.​
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高训练的准确性和速度，我们将批大小改为128，学习率改为0.1。我们添加了一个StepLR调度器，每30个epoch将每个参数组的学习率衰减0.1。
- en: Learning rate warmup:​
  id: totrans-69
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 学习率预热：
- en: Since at the beginning of the training all parameters are typically random values 
    using a too large learning rate may result in numerical instability.​
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在训练开始时所有参数通常是随机值，因此使用过大的学习率可能会导致数值不稳定性。
- en: In the warmup heuristic, we use a small learning rate at the beginning and then 
    switch back to the initial learning rate when the training process is stable.
    We use a gradual warmup strategy that increases the learning rate from 0 to the
    initial learning rate linearly.​
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在预热启发式方法中，我们开始时使用一个小学习率，然后在训练过程稳定后切换回初始学习率。我们使用一种逐渐预热策略，将学习率从 0 线性增加到初始学习率。
- en: We add a linear warmup strategy for 5 epochs.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为 5 个轮次添加了线性预热策略。
