- en: A Refined Training Recipe for Fine-Grained Visual Classification
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 精细视觉分类的精炼训练配方
- en: 原文：[https://towardsdatascience.com/a-refined-training-recipe-for-fine-grained-visual-classification/](https://towardsdatascience.com/a-refined-training-recipe-for-fine-grained-visual-classification/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-refined-training-recipe-for-fine-grained-visual-classification/](https://towardsdatascience.com/a-refined-training-recipe-for-fine-grained-visual-classification/)
- en: <mdspan datatext="el1755020362112" class="mdspan-comment">For the past year</mdspan>,
    my research at **Multitel** has focused on **fine-grained visual classification
    (FGVC)**. Specifically, I worked on building a **robust car classifier that can
    work in real-time on edge devices.** This post is part of what may become a small
    series of reflections on this experience. I’m writing to share some of the lessons
    I learned but also to organize and compound what I’ve learned. At the same time,
    I hope this gives a sense of the kind of high-level engineering and applied research
    we do at Multitel, work that blends academic rigor with real-world constraints.
    Whether you’re a fellow researcher, a curious engineer, or someone considering
    joining our team, I hope this post offers both insight and inspiration.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755020362112" class="mdspan-comment">在过去的一年里</mdspan>，我在**Multitel**的研究主要集中在**细粒度视觉分类（FGVC**）上。具体来说，我致力于构建一个**能够在边缘设备上实时运行的鲁棒汽车分类器**。这篇帖子是关于这一经历可能成为的一系列反思的一部分。我写这篇文章是为了分享我所学到的经验教训，同时也是为了组织和巩固我所学到的知识。同时，我希望这能让你对我们在Multitel进行的高层次工程和应用研究有一个感性的认识，这种工作将学术严谨性与现实世界的限制相结合。无论你是同行研究者、好奇的工程师，还是考虑加入我们团队的人，我希望这篇帖子能提供洞察和灵感。
- en: '1\. The problem:'
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 问题：
- en: We needed a system that could **identify specific car models**, not just “this
    is a BMW,” but *which* BMW model and year. And it needed to run in real time on
    resource-constrained edge devices alongside other models. This kind of task falls
    under what’s known as **fine-grained visual classification (FGVC)**.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一个能够**识别特定车型**的系统，而不仅仅是“这是一辆宝马”，还需要知道是哪款宝马以及哪一年。它还需要在资源受限的边缘设备上实时运行，与其他模型并行。这类任务属于**细粒度视觉分类（FGVC**）的范畴。
- en: '![](../Images/8affe64a87c8bf78273b9881f5f03a13.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8affe64a87c8bf78273b9881f5f03a13.png)'
- en: Example of two models along with discriminative parts [1].
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 两个模型及其判别部分的示例[1]。
- en: FGVC aims to recognize images belonging to multiple subordinate categories of
    a super-category (e.g. species of animals / plants, models of cars etc).​ The
    difficulty lies with understanding fine-grained visual differences that sufficiently
    discriminate between objects that are highly similar in overall appearance but
    differ in fine-grained features *[2]*.​
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: FGVC旨在识别属于超类别（例如动物/植物的物种、汽车型号等）多个下级类别的图像。难度在于理解细粒度视觉差异，这些差异足以区分在整体外观上高度相似但在细粒度特征上有所不同的对象[2]。
- en: '![](../Images/a6e20ca6a5e75f56d2d3f1e4f3b3d394.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a6e20ca6a5e75f56d2d3f1e4f3b3d394.png)'
- en: Fine-grained classification vs. general image classification​ [3].
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 细粒度分类与通用图像分类[3]。
- en: What makes FGVC particularly tricky?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: FGVC特别棘手的原因是什么？
- en: '**Small inter-class variation**: The visual differences between classes can
    be extremely subtle.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类间差异小**：类与类之间的视觉差异可能非常微妙。'
- en: '**Large intra-class variation**: At the same time, instances within the same
    class may vary greatly due to changes in lighting, pose, background, or other
    environmental factors.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类内差异大**：同时，同一类别的实例可能由于光照、姿势、背景或其他环境因素的变化而有很大的差异。'
- en: '**The subtle visual differences** can be easily overwhelmed by the other factors
    such as poses and viewpoints​.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**细微的视觉差异**很容易被其他因素如姿势和视角所掩盖。'
- en: '**Long-tailed distributions**: Datasets typically have a few classes with many
    samples and many classes with very few examples. For example, you might have only
    a couple of images of a rare spider species found in a remote region, while common
    species have thousands of images. This imbalance makes it difficult for models
    to learn equally well across all categories.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长尾分布**：数据集通常只有少数类别有大量样本，而许多类别只有非常少的示例。例如，你可能只有几幅图像是关于在偏远地区发现的稀有蜘蛛物种，而常见物种有成千上万幅图像。这种不平衡使得模型难以在所有类别中均匀学习。'
- en: '![](../Images/8f824d796fe0c4fc7e444e6476c86b1a.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8f824d796fe0c4fc7e444e6476c86b1a.png)'
- en: Two species of gulls from CUB 200 dataset illustrate the diﬃculty of ﬁne-grained
    object classiﬁcation [4].
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: CUB 200数据集中的两种海鸥物种展示了**细粒度对象分类**的难度[4]。
- en: '2\. The landscape:'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 景观：
- en: When we first started tackling this problem, we naturally turned to literature.
    We dove into academic papers, examined benchmark datasets, and explored state-of-the-art
    FGVC methods. And at first, the problem seemed far more complicated than it actually
    turned out to be, at least in our specific context.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们最初开始解决这个问题时，我们自然转向了文献。我们深入研究学术论文，检查基准数据集，并探索最先进的FGVC方法。起初，这个问题似乎比实际情况要复杂得多，至少在我们特定的环境中是这样。
- en: 'FGVC has been actively researched for years, and there’s no shortage of approaches
    that introduce increasingly complex architectures and pipelines. Many early works,
    for example, proposed two-stage models: a localization subnetwork would first
    identify discriminative object parts, and then a second network would classify
    based on those parts. Others focused on custom loss functions, high-order feature
    interactions, or label dependency modeling using hierarchical structures.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: FGVC已经活跃研究多年，并且有大量方法引入了越来越复杂的架构和流程。例如，许多早期工作提出了两阶段模型：一个定位子网络首先识别判别性物体部分，然后第二个网络基于这些部分进行分类。其他人则专注于定制损失函数、高阶特征交互或使用分层结构进行标签依赖建模。
- en: All of these methods were designed to tackle the subtle visual distinctions
    that make FGVC so challenging. If you’re curious about the evolution of these
    approaches, Wei et al *[2]*. provide a solid survey that covers many of them in
    depth.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些方法都是为了解决使FGVC如此具有挑战性的微妙视觉差异。如果你对这些方法的演变感兴趣，Wei等人*[2]*提供了一个深入的综述，涵盖了其中许多方法。
- en: '![](../Images/a92f8e67cacf8fc7a603e393aa956291.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a92f8e67cacf8fc7a603e393aa956291.png)'
- en: Overview of the landscape of deep learning based fine-grained image analysis
    (FGIA) [2].
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 基于深度学习的细粒度图像分析（FGIA）景观概述 [2]。
- en: When we looked closer at recent [benchmark results](https://web.archive.org/web/20250317111655/https://paperswithcode.com/sota/fine-grained-image-classification-on-stanford)
    (archived from Papers with Code), many of the top-performing solutions were based
    on transformer architectures. These models often reached state-of-the-art accuracy,
    but with little to no discussion of inference time or deployment constraints.
    Given our requirements, we were fairly certain that these models wouldn’t hold
    up in real-time on an edge device already running multiple models in parallel.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们更仔细地查看最近的[基准结果](https://web.archive.org/web/20250317111655/https://paperswithcode.com/sota/fine-grained-image-classification-on-stanford)（来自Papers
    with Code的存档），许多表现最好的解决方案都是基于transformer架构。这些模型通常达到了最先进的准确率，但很少讨论推理时间或部署约束。鉴于我们的要求，我们相当确信这些模型在边缘设备上实时运行时不会表现良好，因为该设备已经并行运行了多个模型。
- en: At the time of this work, the best reported result on Stanford Cars was 97.1%
    accuracy, achieved by **CMAL-Net**.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在这项工作的时间，斯坦福汽车的最好结果是97.1%的准确率，由**CMAL-Net**实现。
- en: '3\. Our approach:'
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 我们的方法：
- en: 'Instead of starting with the most complex or specialized solutions, we took
    the opposite approach: Could a model that we already knew would meet our real-time
    and deployment constraints perform well enough on the task? Specifically, we asked
    whether a solid general-purpose architecture could get us close to the performance
    of more recent, heavier models, if trained properly.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有从最复杂或最专业的解决方案开始，而是采取了相反的方法：一个我们已知能够满足我们的实时和部署约束的模型，是否能够在任务上表现良好？具体来说，我们询问一个坚实的通用架构是否能够在适当训练的情况下，接近更近期的、更重的模型的表现。
- en: 'That line of thinking led us to a paper by Ross Wightman et al., *“ResNet Strikes
    Back: An Improved Training Procedure in Timm.”* In it, Wightman makes a compelling
    argument: most new architectures are trained using the latest advancements and
    techniques but then compared against older baselines trained with outdated recipes.
    Wightman argues that ResNet-50, which is frequently used as a benchmark, is often
    not given the benefit of these modern improvements. His paper proposes a refined
    training procedure and shows that, when trained properly, even a vanilla ResNet-50
    can achieve surprisingly strong results, including on several FGVC benchmarks.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '这种思维方式引导我们阅读了Ross Wightman等人撰写的论文*“ResNet Strikes Back: An Improved Training
    Procedure in Timm.”* 在这篇论文中，Wightman提出了一个有力的论点：大多数新架构都是使用最新的进步和技术进行训练，但随后与使用过时配方训练的旧基线进行比较。Wightman认为，经常用作基准的ResNet-50并没有得到这些现代改进的好处。他的论文提出了一种改进的训练程序，并表明，当适当训练时，即使是普通的ResNet-50也能取得令人惊讶的良好结果，包括在几个FGVC基准上。'
- en: 'With these constraints and goals in mind, we set out to build our own strong,
    reusable training procedure, one that could deliver high performance on FGVC tasks
    without relying on architecture-specific tricks. The idea was simple: start with
    a known, efficient backbone like ResNet-50 and focus entirely on improving the
    training pipeline rather than modifying the model itself. That way, the same recipe
    could later be applied to other architectures with minimal adjustments.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些约束和目标在心中，我们着手构建我们自己的强大、可重用的训练流程，一个可以在FGVC任务上提供高性能而无需依赖特定架构技巧的流程。想法很简单：从一个已知、高效的骨干网络如ResNet-50开始，并完全专注于改进训练流程而不是修改模型本身。这样，相同的配方可以稍后应用于其他架构，只需进行最小调整。
- en: 'We began collecting ideas, techniques, and training refinements from across
    several sources, compounding best practices into a single, cohesive pipeline.
    In particular, we drew from four key resources:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开始从多个来源收集想法、技术和训练改进，将最佳实践复合成一个单一的、连贯的流程。特别是，我们从四个关键资源中汲取灵感：
- en: Bag of Tricks for Image Classification with Convolutional Neural Networks (He
    et al.)
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用卷积神经网络进行图像分类的技巧集（He等人）
- en: Compounding the Performance Improvements of Assembled Techniques in a Convolutional
    Neural Network (Lee et al.)
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复合卷积神经网络中组装技术的性能改进（Lee等人）
- en: 'ResNet Strikes Back: An Improved Training Procedure in Timm (Wightman et al.)'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ResNet反击：Timm（Wightman等人）中的改进训练流程
- en: How to Train State-of-the-Art Models Using TorchVision’s Latest Primitives (Vryniotis)
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用TorchVision最新原语训练最先进模型的方法（Vryniotis）
- en: Our goal was to create a robust training pipeline that didn’t rely on model-specific
    tweaks. That meant focusing on techniques that are broadly applicable across architectures.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是创建一个不依赖于模型特定调整的稳健训练流程。这意味着专注于在架构间广泛适用的技术。
- en: To test and validate our training pipeline, we used the Stanford Cars dataset
    [9], a widely used fine-grained classification benchmark that closely aligns with
    our real-world use case. The dataset contains 196 car categories and 16,185 images,
    all taken from the rear to emphasize subtle inter-class differences. The data
    is nearly evenly split between 8,144 training images and 8,041 testing images.
    To simulate our deployment scenario, where the classification model operates downstream
    of an object detection system, we crop each image to its annotated bounding box
    before training and evaluation.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试和验证我们的训练流程，我们使用了斯坦福汽车数据集[9]，这是一个广泛使用的细粒度分类基准，与我们的实际应用场景紧密相关。该数据集包含196个汽车类别和16,185张图片，所有图片都是从后面拍摄的，以强调类间细微的差异。数据几乎均匀地分为8,144张训练图片和8,041张测试图片。为了模拟我们的部署场景，其中分类模型在目标检测系统之后运行，我们在训练和评估之前将每张图片裁剪到其标注的边界框。
- en: While the original hosting site for the dataset is no longer available, it remains
    accessible via curated repositories such as Kaggle, and Huggingface. The dataset
    is distributed under the **BSD-3-Clause license**, which permits both commercial
    and non-commercial use. In this work, it was used solely in a research context
    to produce the results presented here.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然数据集的原始托管网站已不再可用，但它仍然可以通过如Kaggle和Huggingface等精选仓库访问。该数据集在**BSD-3-Clause许可**下分发，允许商业和非商业使用。在本工作中，它仅用于研究背景，以产生此处展示的结果。
- en: '![](../Images/b5ff3750939edc2f7e935d2a14946139.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b5ff3750939edc2f7e935d2a14946139.png)'
- en: Example of a cropped Image from the Stanford Cars dataset [9].
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 斯坦福汽车数据集[9]裁剪图片的示例。
- en: Building the Recipe
  id: totrans-39
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建配方
- en: What follows is the distilled training recipe we arrived at, built through experimentation,
    iteration, and careful aggregation of ideas from the works mentioned above. The
    idea is to show that by simply applying modern training best practices, without
    any architecture-specific hacks, we could get a general-purpose model like ResNet-50
    to perform competitively on a fine-grained benchmark.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是我们通过实验、迭代和仔细汇总上述作品中提到的想法而得出的提炼训练配方。我们的想法是表明，通过简单地应用现代训练最佳实践，没有任何架构特定技巧，我们可以使通用模型如ResNet-50在细粒度基准上具有竞争力。
- en: We’ll start with a vanilla ResNet-50 trained using a basic setup and progressively
    introduce improvements, one step at a time.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从使用基本设置训练的vanilla ResNet-50开始，并逐步引入改进，一次一步。
- en: 'With each technique, we’ll report:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每种技术，我们将报告：
- en: The individual performance gain
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人性能提升
- en: The cumulative gain when added to the pipeline
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加到流程后的累积增益
- en: While many of the techniques used are likely familiar, our intent is to highlight
    how powerful they can be when compounded intentionally. Benchmarks often obscure
    this by comparing new architectures trained with the latest advancements to old
    baselines trained with outdated recipes. Here, we want to flip that and show what’s
    possible with a carefully tuned recipe applied to a widely available, efficient
    backbone.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然许多使用的技术可能很熟悉，但我们的意图是强调当有意组合时它们可以多么强大。基准测试通常通过比较使用最新进展训练的新架构与使用过时配方训练的旧基线来掩盖这一点。在这里，我们想反过来，展示在广泛可用、高效的骨干网络上应用精心调校的配方所能实现的可能性。
- en: We also recognize that many of these techniques interact with each other. So,
    in practice, we tuned some combinations through greedy or grid search to account
    for synergies and interdependencies.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也认识到许多这些技术之间相互影响。因此，在实践中，我们通过贪婪搜索或网格搜索调整了一些组合，以考虑协同作用和相互依赖。
- en: 'The Base Recipe:'
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 基础配方：
- en: Before diving into optimizations, we start with a clean, simple baseline.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入优化之前，我们从一个干净、简单的基线开始。
- en: We train a **ResNet-50** model pretrained on **ImageNet** using the **Stanford
    Cars** dataset. Each model is trained for **600 epochs** on a single **RTX 4090
    GPU**, with **early stopping** based on validation accuracy using a **patience
    of 200 epochs**.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用**Stanford Cars**数据集在预训练的**ImageNet**上训练一个**ResNet-50**模型。每个模型在一个单独的**RTX
    4090 GPU**上训练**600个epoch**，基于验证准确率使用**200个epoch的耐心**进行**早期停止**。
- en: 'We use:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用：
- en: '**Nesterov Accelerated Gradient (NAG)** for optimization'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Nesterov加速梯度（NAG）**用于优化'
- en: '**Learning rate**: 0.01'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习率**：0.01'
- en: '**Batch size**: 32'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**批大小**：32'
- en: '**Momentum**: 0.9'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动量**：0.9'
- en: '**Loss function**: Cross-entropy'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**损失函数**：交叉熵'
- en: All training and validation images are **cropped to their bounding boxes** and
    resized to **224×224** pixels. We start with the same standard augmentation policy
    as in [5].
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 所有训练和验证图像都被**裁剪到其边界框**并调整到**224×224**像素。我们开始时采用与[5]中相同的标准增强策略。
- en: 'Here’s a summary of the base training configuration and its performance:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是基础训练配置及其性能的总结：
