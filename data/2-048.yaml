  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| ResNet50 | ImageNet | NAG | 0.01 | 0.9 | 32 |'
- en: '| Loss function | Image size | Epochs | Patience | Augmentation | Accuracy
    |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 损失函数 | 图像大小 | Epochs | Patience | 增强策略 | 准确率 |'
