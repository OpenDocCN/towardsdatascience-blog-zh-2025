- en: 'Label Smoothing:'
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 标签平滑：
- en: 'A good technique to reduce overfitting is to stop the model from becoming overconfident.
    This can be achieved by softening the ground truth using Label Smoothing. The
    idea is to change the construction of the true label to:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 减少过拟合的一个好方法是阻止模型变得过于自信。这可以通过使用标签平滑来软化真实标签来实现。其思路是将真实标签的构造改为：
- en: \[q_i = \begin{cases}
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: \[q_i = \begin{cases}
- en: 1 – \varepsilon, & \text{if } i = y, \\
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 1 – ε，& 如果 i = y，\\
- en: \frac{\varepsilon}{K – 1}, & \text{otherwise}.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\varepsilon}{K – 1}, & \text{otherwise}.
- en: \end{cases} \]
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: \end{cases} \]
- en: There is a single parameter which controls the degree of smoothing (the higher
    the stronger) that we need to specify. We used a smoothing factor of **ε = 0.1**,
    which is the standard value proposed in the original paper and widely adopted
    in the literature.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个参数控制平滑的程度（越高越强），我们需要指定。我们使用了**ε = 0.1**的平滑因子，这是原始论文中提出的标准值，并且在文献中被广泛采用。
- en: Interestingly, we found empirically that adding label smoothing reduced gradient
    variance during training. This allowed us to safely increase the learning rate
    without destabilizing training. As a result, we **increased the initial learning
    rate from 0.1 to 0.4**
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，我们通过实验发现，添加标签平滑可以减少训练过程中的梯度方差。这使得我们能够安全地增加学习率，而不会破坏训练过程。因此，我们将**初始学习率从0.1增加到0.4**。
