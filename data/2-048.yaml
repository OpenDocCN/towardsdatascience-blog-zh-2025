- en: 'Cosine Learning Rate Decay:'
  id: totrans-97
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 余弦学习率衰减：
- en: Next, we explored modifying the learning rate schedule. We switched to a **cosine
    annealing** strategy, which decreases the learning rate from the initial value
    to 0 by following the cosine function.​ A big advantage of cosine is that there
    are no hyper-parameters to optimize, which cuts down again our search space.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们探索了修改学习率计划。我们切换到**余弦退火**策略，该策略通过余弦函数从初始值降低到0来降低学习率。余弦的一个大优点是没有任何超参数需要优化，这又减少了我们的搜索空间。
