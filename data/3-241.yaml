- en: How to Fine-Tune DistilBERT for Emotion Classification
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何微调DistilBERT进行情感分类
- en: 原文：[https://towardsdatascience.com/how-to-fine-tune-distilbert-for-emotion-classification/](https://towardsdatascience.com/how-to-fine-tune-distilbert-for-emotion-classification/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何微调DistilBERT进行情感分类](https://towardsdatascience.com/how-to-fine-tune-distilbert-for-emotion-classification/)'
- en: The customer support teams were drowning with the overwhelming volume of customer
    inquiries at every company I’ve worked at. Have you had similar experiences?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我工作的每家公司，客户支持团队都因客户咨询量的巨大而陷入困境。你有过类似的经历吗？
- en: What if I told you that you could use AI to automatically **identify**, **categorize,**
    and even **resolve** the most common issues?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我告诉你，你可以使用AI自动**识别**、**分类**甚至**解决**最常见的常见问题呢？
- en: By fine-tuning a transformer model like BERT, you can build an automated system
    that tags tickets by issue type and routes them to the right team.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 通过微调BERT这样的transformer模型，你可以构建一个自动化的系统，根据问题类型标记工单并将它们路由到正确的团队。
- en: 'In this tutorial, I’ll show you how to fine-tune a transformer model for emotion
    classification in five steps:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个教程中，我将展示如何通过五个步骤微调一个用于情感分类的transformer模型：
- en: '**Set Up Your Environment**: Prepare your dataset and install necessary libraries.'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设置你的环境**：准备你的数据集并安装必要的库。'
- en: '**Load and Preprocess Data**: Parse text files and organize your data.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**加载数据并进行预处理**：解析文本文件并组织你的数据。'
- en: '**Fine-Tune DistilBERT**: Train model to classify emotions using your dataset.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**微调DistilBERT**：使用你的数据集训练模型以分类情感。'
- en: '**Evaluate Performance**: Use metrics like accuracy, F1-score, and confusion
    matrices to measure model performance.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估性能**：使用准确率、F1分数和混淆矩阵等指标来衡量模型性能。'
- en: '**Interpret Predictions**: Visualize and understand predictions using SHAP
    (SHapley Additive exPlanations).'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解释预测**：使用SHAP（SHapley Additive exPlanations）可视化和理解预测。'
- en: By the end, you’ll have a fine-tuned model that classifies emotions from text
    inputs with high accuracy, and you’ll also learn how to interpret these predictions
    using SHAP.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 到最后，你将拥有一个经过微调的模型，能够以高精度从文本输入中分类情感，你还将学习如何使用SHAP来解释这些预测。
- en: This same approach can be applied to real-world use cases beyond emotion classification,
    such as customer support automation, sentiment analysis, content moderation, and
    more.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这种相同的方法可以应用于情感分类以外的现实世界用例，如客户支持自动化、情感分析、内容审核等。
- en: Let’s dive in!
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Choosing the Right Transformer Model
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择合适的Transformer模型
- en: 'When selecting a transformer model for **text classification**, here’s a quick
    breakdown of the most common models:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当选择用于**文本分类**的transformer模型时，以下是对最常见模型的快速概述：
- en: '**BERT**: Great for general NLP tasks, but computationally expensive for both
    training and inference.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**BERT**：非常适合通用NLP任务，但在训练和推理方面计算成本较高。'
- en: '**DistilBERT**: 60% faster than BERT while retaining 97% of its capabilities,
    making it ideal for real-time applications.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DistilBERT**：比BERT快60%，同时保留了97%的功能，使其非常适合实时应用。'
- en: '**RoBERTa:** A more robust version of BERT, but requires more resources.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RoBERTa**：BERT的一个更健壮的版本，但需要更多的资源。'
- en: '**XLM-RoBERTa**: A multilingual variant of RoBERTa trained on 100 languages.
    It is perfect for multilingual tasks, but is quite resource-intensive.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**XLM-RoBERTa**：在100种语言上训练的RoBERTa的多语言变体。它非常适合多语言任务，但资源消耗相当大。'
- en: For this tutorial, I chose to fine-tune DistilBERT because it offers the best
    balance between performance and efficiency.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个教程，我选择微调DistilBERT，因为它在性能和效率之间提供了最佳平衡。
- en: '**Step 1: Setup and Installing Dependencies**'
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第一步：设置和安装依赖项**'
- en: 'Ensure you have the required libraries installed:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你已经安装了所需的库：
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Step 2: Load and Preprocess Data**'
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第二步：加载数据并进行预处理**'
- en: 'I used the [Emotions dataset for NLP](https://www.kaggle.com/datasets/praveengovi/emotions-dataset-for-nlp)
    by Praveen Govi, available on Kaggle and [licensed for commercial use](https://creativecommons.org/licenses/by-sa/4.0/).
    It contains text labeled with emotions. The data comes in three `.txt` files:
    **train, validation,** and **test**.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用了Praveen Govi提供的[情感数据集](https://www.kaggle.com/datasets/praveengovi/emotions-dataset-for-nlp)，可在Kaggle上找到，并且[商业用途许可](https://creativecommons.org/licenses/by-sa/4.0/)。该数据集包含带有情感标签的文本。数据包含三个`.txt`文件：**训练集**、**验证集**和**测试集**。
- en: 'Each line contains a sentence and its corresponding emotion label, separated
    by a semicolon:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 每一行包含一个句子及其对应的情感标签，由分号分隔：
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Parsing the Dataset into a Pandas DataFrame**'
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**将数据集解析为Pandas DataFrame**'
- en: 'Let’s load the dataset:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们加载数据集：
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Understanding the Label Distribution**'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**理解标签分布**'
- en: 'This dataset contains **16k training examples** and **2k examples** for the
    validation and testing. Here’s the label distribution breakdown:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据集包含**16k 个训练示例**和 **2k 个示例**用于验证和测试。以下是标签分布的分解：
- en: '![](../Images/f388d9432458876c0e4d2c49bcff8b28.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f388d9432458876c0e4d2c49bcff8b28.png)'
- en: Image by author.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: The bar chart above shows that the dataset is **imbalanced,** with the majority
    of samples labels as joy and sadness.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的条形图显示，数据集**不平衡**，大多数样本标签为快乐和悲伤。
- en: For a fine-tuning a production model, I would consider experimenting with different
    sampling techniques to overcome this class imbalance problem and improve the model’s
    performance.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 对于微调生产模型，我会考虑尝试不同的采样技术来克服这个类别不平衡问题，并提高模型的表现。
- en: '**Step 3: Tokenization and Data Preprocessing**'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**步骤 3：分词和数据预处理**'
- en: 'Next, I loaded in DistilBERT’s tokenizer:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我加载了 DistilBERT 的分词器：
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Then, I used it to tokenize text data and transform the labels into numerical
    IDs:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我使用它对文本数据进行分词，并将标签转换为数值 ID：
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Step 4: Fine-Tuning Model**'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**步骤 4：微调模型**'
- en: 'Next, I loaded a pre-trained DistilBERT model with a classification head for
    our text classification text. I also specified what the labels for this dataset
    looks like:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我加载了一个带有分类头的预训练 DistilBERT 模型用于我们的文本分类任务。我还指定了此数据集的标签看起来像什么：
- en: '[PRE5]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The pre-trained DistilBERT model for classification consists of **five layers
    plus a classification head**.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 用于分类的预训练 DistilBERT 模型由**五层加上一个分类头**组成。
- en: 'To prevent overfitting, I **froze the first four layers**, preserving the knowledge
    learned during pre-training. This allows the model to retain general language
    understanding while only fine-tuning the fifth layer and classification head to
    adapt to my dataset. Here’s how I did this:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止过拟合，我**冻结了前四层**，保留了预训练期间学习到的知识。这允许模型保留对通用语言的理解，同时仅微调第五层和分类头以适应我的数据集。以下是我是如何做到这一点的：
- en: '[PRE6]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Defining Metrics**'
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**定义指标**'
- en: Given the label imbalance, I thought accuracy may not be the most appropriate
    metric, so I chose to include other metrics suited for classification problems
    like precision, recall, F1-score, and AUC score.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到标签不平衡，我认为准确率可能不是最合适的指标，所以我选择了其他适合分类问题的指标，如精确率、召回率、F1 分数和 AUC 分数。
- en: 'I also used “weighted” averaging for F1-score, precision, and recall to address
    the class imbalance problem. This parameter ensures that all classes contribute
    proportionally to the metric and prevent any single class from dominating the
    results:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我还使用了“加权”平均法来计算 F1 分数、精确率和召回率，以解决类别不平衡问题。此参数确保所有类别按比例对指标做出贡献，并防止任何单个类别主导结果：
- en: '[PRE7]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Let’s set up the training process:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们设置训练过程：
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**Step 5: Evaluating Model Performance**'
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**步骤 5：评估模型性能**'
- en: 'After training, I evaluated the model’s performance on the test set:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 训练完成后，我在测试集上评估了模型的表现：
- en: '[PRE9]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'This is how the fine-tuned DistilBERT model did on the test set compared to
    the pre-trained base model:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这是微调后的 DistilBERT 模型在测试集上的表现，与预训练的基础模型相比：
- en: '![](../Images/9d2db067fa061af3e4ac4e7c18e36865.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9d2db067fa061af3e4ac4e7c18e36865.png)'
- en: '*Radar chart of fine-tuned DistilBERT model. Image by author*.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*微调后的 DistilBERT 模型的雷达图。图片由作者提供*。'
- en: Before fine-tuning, the pre-trained model performed poorly on our dataset, because
    it hasn’t seen the specific emotion labels before. It was essentially guessing
    at random, as reflected in an AUC score of 0.5 that indicates no better than chance.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调之前，预训练模型在我们的数据集上表现不佳，因为它之前没有见过特定的情绪标签。它本质上是在随机猜测，正如反映在 AUC 分数为 0.5 的结果所示，这表明没有比机会更好的表现。
- en: After fine-tuning, the model significantly **improved across all metrics**,
    achieving 83% accuracy in correctly identifying emotions. This demonstrates that
    the model has successfully learned meaningful patterns in the data, even with
    just 16k training samples.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 微调后，模型在所有指标上均显著**提升**，正确识别情绪的准确率达到 83%。这表明模型已成功从数据中学习到有意义的模式，即使只有 16k 个训练样本。
- en: That’s amazing!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这太棒了！
- en: '**Step 6: Interpreting Predictions with SHAP**'
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**步骤 6：使用 SHAP 解释预测**'
- en: 'I tested the fine-tuned model on three sentences and here are the emotions
    that it predicted:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我在三个句子上测试了微调后的模型，以下是它预测的情绪：
- en: “*The thought of speaking in front of a large crowd makes my heart race, and
    I start to feel overwhelmed with anxiety*.” → fear 😱
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “*站在一大群人面前讲话的想法让我心跳加速，我开始感到焦虑不堪*。” → 恐惧 😱
- en: '*“I can’t believe how disrespectful they were! I worked so hard on this project,
    and they just dismissed it without even listening. It’s infuriating!”* → anger
    😡'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*“我简直不敢相信他们多么无礼！我在这项项目上投入了大量的努力，他们甚至没有听就驳回了它。这太令人愤怒了！”* → 愤怒 😡'
- en: '*“I absolutely love this new phone! The camera quality is amazing, the battery
    lasts all day, and it’s so fast. I couldn’t be happier with my purchase, and I
    highly recommend it to anyone looking for a new phone.”* → joy 😀'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*“我真的很喜欢这款新手机！摄像头质量惊人，电池续航一整天，而且速度非常快。我对我的购买非常满意，并且强烈推荐给任何寻找新手机的人。”* → 快乐 😀'
- en: Impressive, right?!
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 非常棒，对吧？!
- en: I wanted to understand how the model made its predictions, I used using [SHAP](https://shap.readthedocs.io/en/latest/example_notebooks/text_examples/sentiment_analysis/Emotion%20classification%20multiclass%20example.html)
    (Shapley Additive exPlanations) to visualize feature importance.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我想了解模型是如何做出预测的，所以我使用了 [SHAP](https://shap.readthedocs.io/en/latest/example_notebooks/text_examples/sentiment_analysis/Emotion%20classification%20multiclass%20example.html)（Shapley
    加性解释）来可视化特征重要性。
- en: 'I started by creating an explainer:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我从创建一个解释说明开始：
- en: '[PRE10]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Then, I computed SHAP values using the explainer:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我使用解释说明计算 SHAP 值：
- en: '[PRE11]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'The plot below visualizes how each word in the input text contributes to the
    model’s output using SHAP values:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图展示了使用 SHAP 值如何可视化输入文本中的每个单词对模型输出的贡献：
- en: '![](../Images/ebdc8e6f5b2f8b0eb281064e9ee512c7.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ebdc8e6f5b2f8b0eb281064e9ee512c7.png)'
- en: SHAP text plot. Image by author.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: SHAP 文本图。图片由作者提供。
- en: In this case, the plot shows that “anxiety” is the most important factor in
    predicting “fear” as the emotion.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，该图显示“焦虑”是预测“恐惧”情感的最重要因素。
- en: The SHAP text plot is a nice, intuitive, and interactive way to understand predictions
    by breaking down how much each word influences the final prediction.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: SHAP 文本图是一种很好的、直观的、交互式的方式来理解预测，通过分解每个单词对最终预测的影响程度来理解。
- en: '**Summary**'
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**总结**'
- en: You’ve successfully learned to fine-tune DistilBERT for emotion classification
    from text data! (You can check out the model on Hugging Face [here](https://huggingface.co/ds-claudia/classify_emotions_into_six_categories_with_distilbert)).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经成功学会了如何从文本数据中微调 DistilBERT 进行情感分类！（你可以在 Hugging Face [这里](https://huggingface.co/ds-claudia/classify_emotions_into_six_categories_with_distilbert)查看模型）。
- en: 'Transformer models can be fine-tuned for many real-world applications, including:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer 模型可以微调以适应许多现实世界的应用，包括：
- en: Tagging customer service tickets (as discussed in the introduction),
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标记客户服务工单（如引言中所述），
- en: Flagging mental health risks in text-based conversations,
  id: totrans-83
  prefs:
