- en: '* * *'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In this blog, I used Python to perform statistical tests and, based on the results,
    determined whether the time series is stationary or non-stationary.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客中，我使用Python进行统计测试，并根据结果确定时间序列是平稳的还是非平稳的。
- en: Next up in this series is a detailed discussion of the statistical tests (ADF
    and KPSS tests) used to identify stationarity.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 本系列的下一个是关于用于识别平稳性的统计测试（ADF和KPSS测试）的详细讨论。
- en: I hope you found this blog intuitive and helpful.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你觉得这篇博客直观且有用。
