- en: 'Real-Time Intelligence in Microsoft Fabric: The Ultimate Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 微软Fabric中的实时智能：终极指南
- en: 原文：[https://towardsdatascience.com/real-time-intelligence-in-microsoft-fabric-the-ultimate-guide/](https://towardsdatascience.com/real-time-intelligence-in-microsoft-fabric-the-ultimate-guide/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/real-time-intelligence-in-microsoft-fabric-the-ultimate-guide/](https://towardsdatascience.com/real-time-intelligence-in-microsoft-fabric-the-ultimate-guide/)
- en: <mdspan datatext="el1759512612142" class="mdspan-comment">Once upon a time</mdspan>,
    handling streaming data was considered an *avant-garde* approach. Since the introduction
    of relational database management systems in the 1970s and traditional data warehousing
    systems in the late 1980s, all data workloads began and ended with the so-called *batch
    processing*. Batch processing relies on the concept of collecting numerous tasks
    in a group (or batch) and processing these tasks in a single operation.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759512612142" class="mdspan-comment">从前有段时间</mdspan>，处理流数据被认为是一种**先锋**方法。自从20世纪70年代引入关系数据库管理系统和20世纪80年代末的传统数据仓库系统以来，所有数据工作负载都始于所谓的**批量处理**。批量处理依赖于将大量任务收集在组（或批量）中，并在单个操作中处理这些任务。
- en: On the flip side, there is a concept of *streaming data*. Although streaming
    data is still sometimes considered a cutting-edge technology, it already has a
    solid history. Everything started in 2002, when Stanford University researchers
    published the paper called “[Models and Issues in Data Stream Systems”](https://dl.acm.org/doi/10.1145/543613.543615).
    However, it wasn’t until almost a decade later (2011) that streaming data systems
    started to reach a wider audience, when the Apache Kafka platform for storing
    and processing streaming data was open-sourced. The rest is history, as people
    say. Nowadays, processing streaming data is not considered a luxury but a necessity.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，有一个**流数据**的概念。尽管流数据有时仍被认为是一种尖端技术，但它已经拥有一个坚实的基础。一切始于2002年，当时斯坦福大学的研究人员发表了题为“[数据流系统中的模型和问题](https://dl.acm.org/doi/10.1145/543613.543615)”的论文。然而，直到近十年后（2011年），流数据系统才开始获得更广泛的受众，当时用于存储和处理流数据的Apache
    Kafka平台被开源。正如人们所说，其余的都是历史。如今，处理流数据不再被视为一种奢侈品，而是一种必需品。
- en: Microsoft recognized the growing need to process the data “*as soon as it arrives*”.
    Hence, Microsoft Fabric doesn’t disappoint in that regard, as Real-time Intelligence
    is at the core of the entire platform and offers a whole range of capabilities
    to handle streaming data efficiently.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 微软认识到处理数据“**一旦到达**”的日益增长的需求。因此，在这一点上，微软Fabric不会让人失望，因为实时智能是整个平台的核心，并提供了一系列功能来高效地处理流数据。
- en: Before we dive deep into explaining each component of Real-time Intelligence,
    let’s take one step back and take a more tool-agnostic approach to stream processing
    in general.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入解释实时智能的每个组件之前，让我们退一步，以更工具无关的方法来探讨流处理的一般方法。
- en: '***What is stream processing?***'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '***什么是流处理？***'
- en: If you enter the phrase from the section title in Google Search, you’ll get
    more than 100,000 results! Therefore, I’m sharing an illustration that represents *our* understanding
    of stream processing.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从章节标题中输入短语到谷歌搜索，你会得到超过10万条结果！因此，我分享了一个代表 **我们** 对流处理理解的插图。
- en: '![](../Images/1e4125aedde717a4d753ed90eb8f5a93.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1e4125aedde717a4d753ed90eb8f5a93.png)'
- en: Illustration by author
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插画
- en: 'Let’s now examine typical use cases for stream processing:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在来探讨流处理的典型用例：
- en: Fraud detection
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 欺诈检测
- en: Real-time stock trades
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时股票交易
- en: Customer activity
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户活动
- en: Log monitoring — troubleshooting systems, devices, etc.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日志监控——故障排除系统、设备等。
- en: Security information and event management — analyzing logs and real-time event
    data for monitoring and threat detection
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全信息和事件管理——分析日志和实时事件数据以进行监控和威胁检测
- en: Warehouse inventory
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仓库库存
- en: Ride share matching
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 共享出行匹配
- en: Machine learning and predictive analytics
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习和预测分析
- en: As you may have noticed, streaming data has become an integral part of numerous
    real-life scenarios and is considered vastly superior to traditional batch processing
    for the aforementioned use cases.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你可能已经注意到的，流数据已成为众多现实场景的组成部分，并且被认为在上述用例中远远优于传统的批量处理。
- en: Let’s now explore how streaming data processing is performed in Microsoft Fabric
    and which tools of trade we have at our disposal.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在来探讨在微软Fabric中如何执行流数据处理，以及我们有哪些可用的工具。
- en: 'The following illustration shows the high-level overview of all Real-time Intelligence
    components in Microsoft Fabric:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的插图显示了Microsoft Fabric中所有实时智能组件的高级概述：
- en: '![](../Images/fdc0532fa924dd781e67e8f81f3abc78.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fdc0532fa924dd781e67e8f81f3abc78.png)'
- en: Illustration from Microsoft learn
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 微软学习插图
- en: Real-Time hub
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实时中心
- en: Let’s kick it off by introducing a Real-Time hub. Every Microsoft Fabric tenant
    automatically provisions a Real-Time hub. This is a focal point for all *data-in-motion* across
    the entire organization. Similar to OneLake, there can be one, and only one, Real-Time
    hub per tenant — this means, you can’t provision or create multiple Real-Time
    hubs.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从介绍实时中心开始。每个Microsoft Fabric租户都会自动配置一个实时中心。这是整个组织所有*数据流*的焦点。类似于OneLake，每个租户只能有一个实时中心——这意味着您不能配置或创建多个实时中心。
- en: 'The main purpose of the Real-Time hub is to enable quick and easy discovery,
    ingestion, management, and consumption of streaming data from a wide range of
    sources. In the following illustration, you can find the overview of all the data
    streams in the Real-Time hub in Microsoft Fabric:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 实时中心的主要目的是使从广泛的数据源快速轻松地发现、摄取、管理和消费流数据成为可能。在下面的插图中，您可以找到Microsoft Fabric中实时中心中所有数据流的概述：
- en: '![](../Images/e47a9761a0eb1f60399f3e6f1dca40b2.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e47a9761a0eb1f60399f3e6f1dca40b2.png)'
- en: Image by author
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s now explore all the available options in the Real-Time hub.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在探索实时中心中所有可用的选项。
- en: '**All data streams** tab displays all the streams and tables you can access.
    Streams represent the output from Fabric eventstreams, whereas tables come from
    KQL databases. We will explore both evenstreams and KQL databases in more detail
    in the following sections'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**所有数据流**标签显示您可以访问的所有流和表。流代表Fabric事件流的输出，而表来自KQL数据库。在接下来的几节中，我们将更详细地探讨事件流和KQL数据库。'
- en: '**My data streams** tab shows all the streams you brought into Microsoft Fabric
    into My workspace'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我的数据流**标签显示所有已将到Microsoft Fabric中的我的工作区中的流。'
- en: '**Data sources** tab is at the core of bringing the data into Fabric, both
    from inside and outside. Once you find yourself in the Data sources tab, you can
    choose between numerous, out-of-the-box provided connectors, such as Kafka, CDC
    streams for various database systems, external cloud solutions like AWS and GCP,
    and many more'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据源**标签是数据进入Fabric的核心，无论是内部还是外部。一旦您进入数据源标签，您可以选择众多开箱即用的连接器，例如Kafka、针对各种数据库系统的CDC流、AWS和GCP等外部云解决方案，等等。'
- en: '**Microsoft sources** tab filters out the previous set of sources to include
    Microsoft data sources only'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft数据源**标签筛选出之前的一组源，仅包括Microsoft数据源。'
- en: '**Fabric events** tab displays the list of system events generated in Microsoft
    Fabric that you can access. Here, you may choose between Job events, OneLake events,
    and Workspace item events. Let’s dive into each of these three options:'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Fabric事件**标签显示您可以访问的Microsoft Fabric中生成的系统事件列表。在这里，您可以选择作业事件、OneLake事件和工作区项目事件。让我们深入了解这三个选项：'
- en: Job events are events produced by status changes on Fabric monitor activities,
    such as job created, succeeded, or failed
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作业事件是由Fabric监控活动状态变化产生的事件，例如作业创建、成功或失败。
- en: OneLake events represent events produced by actions on files and folders in
    OneLake, such as file created, deleted, or renamed
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: OneLake事件代表在OneLake中对文件和文件夹进行操作产生的事件，例如文件创建、删除或重命名
- en: Workspace item events are produced by actions on workspace items, such as item
    created, deleted, or renamed
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工作区项目事件是由对工作区项目进行的操作产生的，例如项目创建、删除或重命名。
- en: '**Azure events** tab shows the list of system events generated in Azure blob
    storage'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure事件**标签显示在Azure Blob存储中生成的系统事件列表。'
- en: The Real-Time hub provides various connectors for ingesting the data into Microsoft
    Fabric. It also enables creating streams for all of the supported sources. After
    the stream is created, you can process, analyze, and act on them.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 实时中心提供了各种连接器，用于将数据导入Microsoft Fabric。它还允许为所有支持的数据源创建流。创建流后，您可以处理、分析和对它们采取行动。
- en: '**Processing** a stream allows you to apply numerous transformations, such
    as aggregate, filter, union, and many more. The goal is to transform the data
    before you send the output to supported destinations'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理**流允许您应用多种转换，例如聚合、过滤、合并等等。目标是转换数据，在将输出发送到支持的目的地之前。'
- en: '**Analyzing** a stream enables you to add a KQL database as a destination of
    the stream, and then open the KQL Database and execute queries against the database.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析**流可以使你将KQL数据库作为流的目的地添加，然后打开KQL数据库并对其执行查询。'
- en: '**Acting** on streams assumes setting the alerts based on conditions and specifying
    actions to be taken when certain conditions are met'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对流的操作**假设基于条件设置警报并指定在满足某些条件时要采取的操作'
- en: Eventstreams
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Eventstreams
- en: 'If you’re a low-code or no-code data professional and you need to handle streaming
    data, you’ll love Eventstreams. In a nutshell, Eventstream allows you to connect
    to numerous data sources, which we examined in the previous section, optionally
    apply various data transformation steps, and finally output results into one or
    more destinations. The following figure illustrates a common workflow for ingesting
    streaming data into three different destinations — Eventhouse, Lakehouse, and
    Activator:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名低代码或无代码数据专业人士，并且需要处理流数据，你将喜欢Eventstreams。简而言之，Eventstream允许你连接到众多数据源，我们在上一节中已经考察过，可选地应用各种数据转换步骤，并将最终结果输出到一个或多个目的地。以下图显示了将流数据导入三个不同目的地（Eventhouse、Lakehouse和Activator）的常见工作流程：
- en: '![](../Images/9459a905a1295056322d1de011ccd1ac.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9459a905a1295056322d1de011ccd1ac.png)'
- en: Image by author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Within the Eventstream settings, you can adjust the retention period for the
    incoming data. By default, the data is retained for one day, and events are automatically
    removed when the retention period expires.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在Eventstream设置中，你可以调整传入数据的保留期。默认情况下，数据保留期为一天，当保留期到期时，事件将自动删除。
- en: 'Aside from that, you may also want to fine-tune the event throughput for incoming
    and outgoing events. There are three options to choose from:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些，你可能还希望微调传入和传出事件的吞吐量。有三种选项可供选择：
- en: '**Low**: < 10 MB/s'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**低**：< 10 MB/s'
- en: '**Medium**: 10-100 MB/s'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**中**：10-100 MB/s'
- en: '**High**: > 100 MB/s'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**高**：> 100 MB/s'
- en: Eventhouse and KQL database
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Eventhouse和KQL数据库
- en: In the previous section, you’ve learned how to connect to various streaming
    data sources, optionally transform the data, and finally load it into the final
    destination. As you might have noticed, one of the available destinations is the
    Eventhouse. In this section, we’ll explore Microsoft Fabric items used to store
    the data within the Real-Time Intelligence workload.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，你已经学习了如何连接到各种流数据源，可选地转换数据，并将其最终加载到最终目的地。你可能已经注意到，其中一个可用的目的地是Eventhouse。在本节中，我们将探讨用于在实时智能工作负载中存储数据的Microsoft
    Fabric项目。
- en: Eventhouse
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Eventhouse
- en: 'We’ll first introduce the Eventhouse item. The Eventhouse is nothing else but
    a container for KQL databases. Eventhouse itself does not store any data — it
    simply provides the infrastructure within the Fabric workspace for dealing with
    streaming data. The following figure displays the System overview page of the
    Eventhouse:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先介绍Eventhouse项目。Eventhouse实际上就是一个KQL数据库的容器。Eventhouse本身不存储任何数据——它只是在Fabric工作区中提供处理流数据的基础设施。以下图显示了Eventhouse的系统概述页面：
- en: '![](../Images/e947b7dc376e27934672ec7db559371e.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e947b7dc376e27934672ec7db559371e.png)'
- en: Image by author
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The great thing about the System overview page is that it provides all the key
    information at a glance. Hence, you can immediately understand the running state
    of the eventhouse, OneLake storage usage, further broken down per individual KQL
    database level, compute usage, most active databases and users, and recent events.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 系统概述页的好处是它提供了一览无余的所有关键信息。因此，你可以立即了解eventhouse的运行状态，OneLake存储使用情况，按每个KQL数据库级别进一步细分，计算使用情况，最活跃的数据库和用户，以及最近的事件。
- en: 'If we switch to the Databases page, we will be able to see a high-level overview
    of KQL databases that are part of the existing Eventhouse, as shown below:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们切换到数据库页面，我们将能够看到现有Eventhouse中包含的KQL数据库的高级概述，如下所示：
- en: '![](../Images/2cb95e07e754f60e5033ab9ceb575409.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2cb95e07e754f60e5033ab9ceb575409.png)'
- en: Image by author
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'You can create multiple eventhouses in a single Fabric workspace. Also, a single
    eventhouse may contain one or more KQL databases:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在单个Fabric工作区中创建多个eventhouse。此外，单个eventhouse可能包含一个或多个KQL数据库：
- en: '![](../Images/29e628e8403211ef287d47fa9aeb4049.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29e628e8403211ef287d47fa9aeb4049.png)'
- en: Image by author
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s wrap up the story about the Eventhouse by explaining the concept of ***Minimum
    consumption***. By design, the Eventhouse is optimized to auto-suspend services
    when not in use. Therefore, when these services are reactivated, it might take
    some time for the Eventhouse to be fully available again. However, there are certain
    business scenarios when this latency is not acceptable. In those scenarios, make
    sure to configure the Minimum consumption feature. By configuring the Minimum
    consumption, the service is always available, but you are in charge of determining
    the minimum level, which is then available for KQL databases inside the Eventhouse.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 通过解释“**最小消耗**”的概念来结束 Eventhouse 的故事。按照设计，Eventhouse 在不使用时会自动挂起服务。因此，当这些服务重新激活时，可能需要一些时间才能使
    Eventhouse 完全可用。然而，在某些业务场景中，这种延迟是不可接受的。在这些场景中，请确保配置最小消耗功能。通过配置最小消耗，服务始终可用，但你需要负责确定最小水平，然后该水平可供
    Eventhouse 内部的 KQL 数据库使用。
- en: KQL database
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: KQL 数据库
- en: Now that you’ve learned about the Eventhouse container, let’s focus on examining
    the core item for storing real-time analytics data — the KQL database.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了 Eventhouse 容器，让我们集中精力考察存储实时分析数据的核心项目——KQL 数据库。
- en: Let’s take one step back and explain the name of the item first. While most
    data professionals have *at least heard* about SQL (which stands for Structured
    Query Language), I’m quite confident that KQL is way more cryptic than its “structured”
    relative.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们退一步，先解释一下这个项目的名称。虽然大多数数据专业人士至少听说过 SQL（代表结构化查询语言），但我非常确信 KQL 比它的“结构化”亲戚更加神秘。
- en: 'You might have rightly assumed that QL in the abbreviation stands for Query
    Language. But, what does this letter K represent? It’s an abbreviation for *Kusto*.
    I hear you, I hear you: what is now Kusto?! Although the urban legend says that
    the language was named after the famous polymath and oceanographer Jacques Cousteau
    (his last name is pronounced “*Kusto*”), I couldn’t find any official confirmation
    from Microsoft to confirm this story. What is definitely known is that it was [the
    internal project name for the Log Analytics Query Language](https://techcommunity.microsoft.com/discussions/azureobservability/what-is-name-of-azure-log-analytics-query-language-/173912).'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经正确地假设，缩写中的 QL 代表查询语言。但，这个字母 K 代表什么呢？它是 **Kusto** 的缩写。我听到了，我听到了：现在的 Kusto
    是什么？！尽管都市传说称这种语言是以著名的全能学者和海洋学家雅克·库斯托（他的姓氏发音为“**Kusto**”）命名的，但我无法找到来自微软的任何官方确认来证实这个故事。可以肯定的是，它曾是
    [日志分析查询语言的内部项目名称](https://techcommunity.microsoft.com/discussions/azureobservability/what-is-name-of-azure-log-analytics-query-language-/173912)。
- en: 'When we talk about history, let’s share some more history lessons. If you ever
    worked with Azure Data Explorer (ADX) in the past, you are in luck. KQL database
    in Microsoft Fabric is the official successor of ADX. Similar to many other Azure
    data services that were rebuilt and integrated into SaaS-fied nature of Fabric,
    ADX provided platform for storing and querying real-time analytics data for KQL
    databases. The engine and core capabilities of the KQL database are the same as
    in Azure Data Explorer — the key difference is the management behavior: Azure
    Data Explorer represents a PaaS (Platform-as-a-Service), whereas KQL database
    is a SaaS (Software-as-a-Service) solution.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈到历史时，让我们分享更多历史教训。如果你过去曾与 Azure Data Explorer (ADX) 合作过，你很幸运。Microsoft Fabric
    中的 KQL 数据库是 ADX 的官方继任者。类似于许多其他被重建并集成到 Fabric SaaS 化特性的 Azure 数据服务，ADX 为存储和查询 KQL
    数据库的实时分析数据提供了平台。KQL 数据库的引擎和核心能力与 Azure Data Explorer 相同——主要区别在于管理行为：Azure Data
    Explorer 代表一个 PaaS（平台即服务），而 KQL 数据库是一个 SaaS（软件即服务）解决方案。
- en: Although you may store any data in the KQL database (non-structured, semi-structured,
    and structured), its main purpose is handling telemetry, logs, events, traces,
    and time series data. Under the hood, the engine leverages optimized storage formats,
    automatic indexing and partitioning, and advanced data statistics for efficient
    query planning.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管你可以在 KQL 数据库中存储任何数据（非结构化、半结构化和结构化），但其主要目的是处理遥测、日志、事件、跟踪和时间序列数据。在底层，引擎利用优化的存储格式、自动索引和分区以及高级数据统计来实现高效的查询规划。
- en: 'Let’s now examine how to leverage the KQL database in Microsoft Fabric to store
    and query real-time analytics data. Creating a database is as straightforward
    as it could be. The following figure illustrates the 2-step process of creating
    a KQL database in Fabric:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来探讨如何利用Microsoft Fabric中的KQL数据库来存储和查询实时分析数据。创建数据库的过程非常简单。以下图示了在Fabric中创建KQL数据库的2步过程：
- en: '![](../Images/78b198a71f88c794f7f73567b209b201.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/78b198a71f88c794f7f73567b209b201.png)'
- en: Image by author
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Click on the “+” sign next to KQL databases
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击KQL数据库旁边的“+”号
- en: Provide the database name and choose its type. Type can be the default new database,
    or a shortcut database. Shortcut database is a reference to a different database
    that can be either another KQL database in Real-Time Intelligence in Microsoft
    Fabric, or an Azure Data Explorer database
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供数据库名称并选择其类型。类型可以是默认的新数据库，或快捷方式数据库。快捷方式数据库是对不同数据库的引用，可以是Microsoft Fabric中的实时智能中的另一个KQL数据库，或Azure
    Data Explorer数据库
- en: '*Don’t mix the concept of [OneLake shortcuts](https://data-mozart.com/mastering-dp-600-exam-create-and-manage-onelake-shortcuts/) with
    the concept of shortcut database type in Real-Time Intelligence! While the latter
    simply references the entire KQL/Azure Data Explorer database, OneLake shortcuts
    allow the use of the data stored in Delta tables across other OneLake workloads,
    such as lakehouses and/or warehouses, or even external data sources (ADLS Gen2,
    Amazon S3, Dataverse, Google Cloud Storage, to name a few). This data can then
    be accessed from KQL databases by using the **external_table()** function*'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '*不要将[OneLake快捷方式](https://data-mozart.com/mastering-dp-600-exam-create-and-manage-onelake-shortcuts/)的概念与实时智能中的快捷方式数据库类型混淆！后者仅仅引用了整个KQL/Azure
    Data Explorer数据库，而OneLake快捷方式允许使用存储在其他OneLake工作负载中的Delta表中的数据，例如lakehouses和/或warehouses，甚至外部数据源（例如ADLS
    Gen2、Amazon S3、Dataverse、Google Cloud Storage等）。然后，可以使用**external_table()**函数从KQL数据库访问这些数据*'
- en: 'Let’s now take a quick tour of the key features of the KQL database from the
    user-interface perspective. The figure below illustrates the main points of interest:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们从用户界面角度快速浏览KQL数据库的关键功能。以下图示了主要感兴趣的点：
- en: '![](../Images/717ca4429090c7a2e715961212a103a9.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/717ca4429090c7a2e715961212a103a9.png)'
- en: Image by author
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '**Tables** – displays all the tables in the database'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**表** – 显示数据库中的所有表'
- en: '**Shortcuts** – shows tables created as OneLake shortcuts'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**快捷方式** – 显示作为OneLake快捷方式创建的表'
- en: '**Materialized views** – a materialized view represents the aggregation query
    over a source table or another materialized view. It consists of a single summarize
    statement'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**物化视图** – 物化视图表示对源表或另一个物化视图的聚合查询。它由一个汇总语句组成'
- en: '**Functions** – these are User-defined functions stored and managed on a database
    level, similar to tables. These functions are created by using the .create function
    command'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**函数** – 这些是在数据库级别存储和管理的用户定义函数，类似于表。这些函数是通过使用.create function命令创建的'
- en: '**Data streams** – all streams that are relevant for the selected KQL database'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据流** – 所有与所选KQL数据库相关的流'
- en: '**Data Activity Tracker** – shows the activity in the database for the selected
    time period'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据活动跟踪器** – 显示所选时间段的数据库活动'
- en: '**Tables/Data preview** – enables switching between two different views. Tables
    displays the high-level overview of the database tables, whereas Data preview
    shows the top 100 records of the selected table'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**表/数据预览** – 允许在两种不同的视图之间切换。表显示数据库表的概述，而数据预览显示所选表的顶部100条记录'
- en: Query and visualize data in Real-Time Intelligence
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在实时智能中查询和可视化数据
- en: Now that you’ve learned how to store real-time analytics data in Microsoft Fabric,
    it’s time to get our hands dirty and provide some business insight out of this
    data. In this section, I will focus on explaining various options for extracting
    useful information from the data stored in the KQL database.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经学会了如何在Microsoft Fabric中存储实时分析数据，是时候动手从这些数据中提供一些业务见解了。在本节中，我将重点解释从存储在KQL数据库中的数据中提取有用信息的各种选项。
- en: Hence, in this section, I will introduce common KQL functions for data retrieval,
    and explore Real-time dashboards for visualizing the data.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在本节中，我将介绍常用的KQL函数用于数据检索，并探讨实时仪表板用于数据可视化。
- en: KQL queryset
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: KQL查询集
- en: The KQL queryset is the fabric item used to run queries and view and customize
    results from various data sources. As soon as you create a new KQL database, the
    KQL queryset item will be provisioned out of the box. This is a default KQL queryset
    that is automatically connected to the KQL database under which it exists. The
    default KQL queryset doesn’t allow multiple connections.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: KQL查询集是用于运行查询和从各种数据源查看和自定义结果的实体。一旦创建一个新的KQL数据库，KQL查询集项就会自动提供。这是一个默认的KQL查询集，它自动连接到它存在的KQL数据库。默认的KQL查询集不允许多个连接。
- en: 'On the flip side, when you create a custom KQL queryset item, you can connect
    it to multiple data sources, as shown in the following illustration:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 反过来，当你创建自定义的KQL查询集项时，你可以将其连接到多个数据源，如下面的插图所示：
- en: '![](../Images/1cb8ade2cb8f2b27194900ddcac7fb80.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1cb8ade2cb8f2b27194900ddcac7fb80.png)'
- en: Image by author
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s now introduce the building blocks of the KQL and examine some of the most
    commonly used operators and functions. KQL is a fairly simple yet powerful language.
    To some extent, it’s very similar to SQL, especially in terms of using schema
    entities that are organized in hierarchies, such as databases, tables, and columns.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来介绍KQL的构建块，并检查一些最常用的操作符和函数。KQL是一种相当简单但功能强大的语言。在某种程度上，它与SQL非常相似，特别是在使用组织在层次结构中的模式实体方面，如数据库、表和列。
- en: 'The most common type of KQL query statement is a*** tabular expression*** statement.
    This means that both query input and output consist of tables or tabular datasets.
    Operators in a tabular statement are sequenced by the “|” (pipe) symbol. Data
    is flowing (is piped) from one operator to the next, as displayed in the following
    code snippet:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的KQL查询语句类型是***表表达式语句***。这意味着查询输入和输出都由表或表格数据集组成。表语句中的操作符按“|”符号（管道）进行排序。数据从（通过管道）一个操作符流向下一个操作符，如下面的代码片段所示：
- en: '[PRE0]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '***The piping is sequential — the data is flowing from one operator to another
    — this means that the query operator order is important and may have an impact
    on both the output results and performance.***'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '***管道是顺序的——数据是从一个操作员流向另一个操作员——这意味着查询操作员的顺序很重要，可能会对输出结果和性能产生影响。***'
- en: In the above code example, the data in MyTable is first filtered on the StartTime
    column, then filtered on the State column, and finally, the query returns a table
    containing a single column and single row, displaying the count of the filtered
    rows.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述代码示例中，MyTable中的数据首先根据StartTime列进行过滤，然后根据State列进行过滤，最后查询返回一个包含单个列和单行的表，显示过滤行的计数。
- en: 'The fair question at this point would be: what if I already know SQL? Do I
    need to learn another language just for the sake of querying real-time analytics
    data? The answer is as usual: *it depends.*'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 此时，一个公平的问题可能是：如果我已经知道SQL，我是否需要学习另一种语言只是为了查询实时分析数据？答案是通常如此：*这取决于*。
- en: Luckily, I have good and great news to share here!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我有好消息要分享！
- en: 'The good news is: you **CAN** write SQL statements to query the data stored
    in the KQL database. But, the fact that you *can* do something, doesn’t mean you *should*…By
    using SQL-only queries, you are missing the point, and limitting yourself from
    using many KQL-specific functions that are built to cope with real-time analytics
    queries in the most efficient way'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是：你可以**可以**编写SQL语句来查询存储在KQL数据库中的数据。但，你*可以*做某事，并不意味着你*应该*…通过使用仅SQL的查询，你错过了重点，并限制了自己使用许多专为以最有效的方式处理实时分析查询而构建的KQL特定函数。
- en: 'The great news is: by leveraging the ***explain*** operator, you can “ask”
    Kusto to translate your SQL statement into an equivalent KQL statement, as displayed
    in the following figure:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是：通过利用***explain***操作符，你可以“询问”Kusto将你的SQL语句翻译成等效的KQL语句，如下面的图所示：
- en: '![](../Images/dd891c68550ede587235453a79f2b0ea.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dd891c68550ede587235453a79f2b0ea.png)'
- en: Image by author
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'In the following examples, we will query the sample Weather dataset, which
    contains data about weather storms and damages in the USA. Let’s start simple
    and then introduce some more complex queries. In the first example, we will count
    the number of records in the Weather table:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下示例中，我们将查询示例天气数据集，该数据集包含有关美国天气风暴和损害的数据。让我们从简单的查询开始，然后介绍一些更复杂的查询。在第一个示例中，我们将计算Weather表中的记录数：
- en: '[PRE1]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Wondering how to retrieve only a subset of records? You can use either *take* or *limit* operator:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 想要知道如何检索记录的子集？你可以使用*take*或*limit*操作符：
- en: '[PRE2]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Please keep in mind that the *take* operator will not return the TOP n number
    of records, unless your data is sorted in the specific order. Normally, the take
    operator returns **any** n number of records from the table.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，*take*操作符不会返回前n条记录，除非你的数据按特定顺序排序。通常，take操作符会从表中返回**任意**n条记录。
- en: 'In the next step, we want to extend this query and return not only a subset
    of rows, but also a subset of columns:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一步中，我们希望扩展这个查询，不仅返回行子集，还返回列子集：
- en: '[PRE3]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The ***project*** operator is the equivalent of the SELECT statement in SQL.
    It specifies which columns should be included in the result set.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**project**操作符相当于SQL中的SELECT语句。它指定了应包含在结果集中的哪些列。'
- en: 'In the following example, we are creating a calculated column, Duration, that
    represents a duration between EndTime and StartTime values. In addition, we want
    to display only top 10 records sorted by the DamageProperty value in descending
    order:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下示例中，我们创建了一个计算列，Duration，它表示EndTime和StartTime值之间的持续时间。此外，我们还想按DamageProperty值降序显示仅前10条记录：
- en: '[PRE4]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'It’s the right moment to introduce the ***summarize*** operator. This operator
    produces a table that aggregates the content of the input table. Hence, the following
    statement will display the total number of records per each state, including only
    the top 5 states:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候介绍**summarize**操作符了。此操作符生成一个表，该表聚合输入表的内容。因此，以下语句将显示每个州的总记录数，包括仅前5个州：
- en: '[PRE5]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Let’s expand on the previous code and visualize the data directly in the result
    set. I’ll add another line of KQL code to render results as a bar chart:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们扩展之前的代码，并在结果集中直接可视化数据。我将添加另一行KQL代码以将结果渲染为柱状图：
- en: '![](../Images/daa0e8d9ad4e99331a50bc7ee0871375.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/daa0e8d9ad4e99331a50bc7ee0871375.png)'
- en: Image by author
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: As you may notice, the chart can be additionally customized from the Visual
    formatting pane on the right-hand side, which provides even more flexibility when
    visualizing the data stored in the KQL database.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所注意到的，图表可以通过右侧的视觉格式化面板进一步自定义，这为可视化存储在KQL数据库中的数据提供了更多的灵活性。
- en: These were just basic examples of using KQL language to retrieve the data stored
    in the Eventhouse and KQL databases. I can assure you that KQL won’t let you down
    in more advanced use cases when you need to manipulate and retrieve real-time
    analytics data.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是使用KQL语言从Eventhouse和KQL数据库中检索数据的简单示例。我可以向你保证，在需要操作和检索实时分析数据的高级用例中，KQL不会让你失望。
- en: I understand that SQL is the “*Lingua franca*” of many data professionals. And
    although you can write SQL to retrieve the data from the KQL database, I strongly
    encourage you to refrain from doing this. As a quick reference, I’m providing
    you with a “**[SQL to KQL cheat sheet](https://learn.microsoft.com/en-us/kusto/query/sql-cheat-sheet?view=azure-data-explorer&preserve-view=true#sql-to-kusto-cheat-sheet)**”
    to give you a head start when transitioning from SQL to KQL.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我明白SQL是许多数据专业人士的“通用语言”。尽管你可以编写SQL从KQL数据库中检索数据，但我强烈建议你避免这样做。作为一个快速参考，我为你提供了一个“**[SQL到KQL速查表](https://learn.microsoft.com/en-us/kusto/query/sql-cheat-sheet?view=azure-data-explorer&preserve-view=true#sql-to-kusto-cheat-sheet)**”，以便你在从SQL过渡到KQL时有一个良好的开端。
- en: Also, my friend and fellow MVP [Brian Bønk](https://www.linkedin.com/in/brianbonk/) published
    and maintains a fantastic reference guide for the KQL language [here](https://kql.how/).
    Make sure to give it a try if you are working with KQL.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我的朋友和同事MVP [Brian Bønk](https://www.linkedin.com/in/brianbonk/) 发布并维护了一个关于KQL语言的出色参考指南[在此](https://kql.how/)。如果你在使用KQL，请务必尝试一下。
- en: Real-time dashboards
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实时仪表板
- en: While KQL querysets represent a powerful way of exploring and querying data
    stored in Eventhouses and KQL databases, their visualization capabilities are
    pretty limited. Yes, you *can* visualize results in the query view, as you’ve
    seen in one of the previous examples, but this is more of a “first aid” visualization
    that won’t make your managers and business decision-makers happy.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 KQL 查询集代表了一种探索和查询存储在Eventhouses和KQL数据库中的数据的有力方式，但它们的可视化能力相当有限。是的，你可以在查询视图中可视化结果，就像你在之前的示例中看到的那样，但这更像是一种“急救”可视化，这不会让你的经理和业务决策者满意。
- en: Fortunately, there is an out-of-the-box solution in Real-Time Intelligence that
    supports advanced data visualization concepts and features. Real-Time Dashboard
    is a Fabric item that enables the creation of interactive and visually appealing
    business-reporting solutions.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，实时智能中有一个现成的解决方案，支持高级数据可视化概念和功能。实时仪表板是 Fabric 中的一个项目，它能够创建交互性和视觉上吸引人的业务报告解决方案。
- en: Let’s first identify the core elements of the Real-Time Dashboard. A dashboard
    consists of one or more tiles, optionally structured and organized in pages, where
    each tile is populated by the underlying KQL query.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先确定实时仪表板的核心元素。仪表板由一个或多个小部件组成，这些小部件可以按页结构化和组织，其中每个小部件由底层的 KQL 查询填充。
- en: 'As a first step in the process of creating Real-Time Dashboards, this setting
    must be enabled in the Admin portal of your Fabric tenant:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建实时仪表板的过程中的第一步，必须在你的 Fabric 租户的管理门户中启用此设置：
- en: '![](../Images/4de88db71fcf9342c9f6b2c4e6e324c5.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4de88db71fcf9342c9f6b2c4e6e324c5.png)'
- en: Image by author
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Next, you should create a new Real-Time Dashboard item in the Fabric workspace.
    From there, let’s connect to our Weather dataset and configure our first dashboard
    tile. We’ll execute one of the queries from the previous section to retrieve the
    top 10 states with the conditional count function. The figure below shows the
    tile settings panel with numerous options to configure:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你应在 Fabric 工作区中创建一个新的实时仪表板项目。从那里，让我们连接到我们的天气数据集并配置我们的第一个仪表板小部件。我们将执行上一节中的一个查询，以检索具有条件计数函数的前10个州。下面的图显示了具有众多配置选项的小部件设置面板：
- en: '![](../Images/59fdfb834b0c685092d191da34c622e2.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/59fdfb834b0c685092d191da34c622e2.png)'
- en: Image by author
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: KQL query to populate the tile
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用于填充小部件的 KQL 查询
- en: Visual representation of the data
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据的视觉表示
- en: Visual formatting pane with options to set the tile name and description
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可视格式化面板，其中包含设置小部件名称和描述的选项
- en: Visual type drop-down menu to select the desired visual type (in our case, it’s
    table visual)
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可视类型下拉菜单用于选择所需的视觉类型（在我们的案例中，是表格视觉）
- en: Let’s now add two more tiles to our dashboard. I’ll copy and paste two queries
    that we previously used — the first will retrieve the top 5 states per total number
    of records, whereas the other will display the damage property value change over
    time for the state of New York and for event type, which equals winter weather.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们再向仪表板添加两个更多的小部件。我将复制并粘贴我们之前使用的两个查询——第一个将检索按总记录数排名前5的州，而另一个将显示纽约州和事件类型（等于冬季天气）随时间变化的损害属性值。
- en: '![](../Images/e4ad4a8b8654989d43470280676dba5e.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e4ad4a8b8654989d43470280676dba5e.png)'
- en: Image by author
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'You can also add a tile directly from the KQL queryset to the existing dashboard,
    as illustrated below:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以直接从 KQL 查询集中将小部件添加到现有仪表板中，如图所示：
- en: '![](../Images/a89f649ec8c9e1e5479ce4e0d3da9438.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a89f649ec8c9e1e5479ce4e0d3da9438.png)'
- en: Image by author
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s now focus on the various capabilities you have when working with Real-Time
    Dashboards. In the top ribbon, you’ll find options to add a New data source, set
    a new parameter, and add base queries. However, what really makes Real-Time Dashboards
    powerful is the possibility to set alerts on a Real-Time Dashboard. Depending
    if the conditions defined in the alert are met, you can trigger a specific action,
    such as sending an email or Microsoft Teams message. An alert is created using
    the Activator item.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来关注你在使用实时仪表板时拥有的各种功能。在上方的工具栏中，你可以找到添加新的数据源、设置新的参数和添加基本查询的选项。然而，真正使实时仪表板强大的是设置实时仪表板警报的可能性。根据警报中定义的条件是否满足，你可以触发特定的操作，例如发送电子邮件或
    Microsoft Teams 消息。警报是通过激活项目创建的。
- en: '![](../Images/dac8ca282f32e19f32cec56c5f817544.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dac8ca282f32e19f32cec56c5f817544.png)'
- en: Image by author
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Visualize data with Power BI
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Power BI 可视化数据
- en: Power BI is a mature and widely adopted tool for building robust, scalable,
    and interactive business reporting solutions. In this section, we specifically
    focus on examining how Power BI works in synergy with the Real-Time Intelligence
    workload in Microsoft Fabric.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI 是一个成熟且广泛采用的工具，用于构建强大、可扩展和交互式的业务报告解决方案。在本节中，我们特别关注探讨 Power BI 如何与 Microsoft
    Fabric 中的实时智能工作负载协同工作。
- en: 'Creating a Power BI report based on the data stored in the KQL database couldn’t
    be easier. You can choose to create a Power BI report directly from the KQL queryset,
    as displayed below:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 基于存储在 KQL 数据库中的数据创建 Power BI 报告非常简单。你可以选择直接从下面的 KQL 查询集中创建 Power BI 报告，如图所示：
- en: '![](../Images/89767cef906596635ea80250a84ebba0.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/89767cef906596635ea80250a84ebba0.png)'
- en: Image by author
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Each query in the KQL queryset represents a table in the Power BI semantic model.
    From here, you can build visualizations and leverage all the existing Power BI
    features to design an effective, visually appealing report.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: KQL 查询集中每个查询都代表 Power BI 语义模型中的一个表。从这里，你可以构建可视化并利用所有现有的 Power BI 功能来设计一个有效且视觉上吸引人的报告。
- en: 'Obviously, you can still leverage the “regular” Power BI workflow, which assumes
    connecting from the Power BI Desktop to a KQL database as a data source. In this
    case, you need to open a OneLake data hub and select KQL Databases as a data source:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，你仍然可以利用“常规”的 Power BI 工作流程，该工作流程假设从 Power BI Desktop 连接到 KQL 数据库作为数据源。在这种情况下，你需要打开
    OneLake 数据中心并选择 KQL 数据库作为数据源：
- en: '![](../Images/88f7f573ab81e053ecef2864481dca15.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/88f7f573ab81e053ecef2864481dca15.png)'
- en: Image by author
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The same as for SQL-based data sources, you can choose between the Import and
    DirectQuery storage modes for your real-time analytics data. Import mode creates
    a local copy of the data in Power BI’s database, whereas DirectQuery enables querying
    the KQL database in near-real-time.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 与基于 SQL 的数据源一样，你可以为你的实时分析数据选择导入和 DirectQuery 存储模式。导入模式在 Power BI 的数据库中创建数据的本地副本，而
    DirectQuery 则允许在近实时查询 KQL 数据库。
- en: Activator
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Activator
- en: Activator is one of the most innovative features in the entire Microsoft Fabric
    realm. I’ll cover Activator in detail in a separate article. Here, I just want
    to introduce this service and briefly emphasize its main characteristics.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: Activator 是整个 Microsoft Fabric 领域中最具创新性的功能之一。我将在另一篇文章中详细介绍 Activator。在这里，我只是想介绍这个服务，并简要强调其主要特点。
- en: Activator is a no-code solution for automatically taking actions when conditions
    in the underlying data are met. Activator can be used in conjunction with Eventstreams,
    Real-Time Dashboards, and Power BI reports. Once the data hits a certain threshold,
    the Activator automatically triggers the specified action — for example, sending
    the email or Microsoft Teams message, or even firing Power Automate flows. I’ll
    cover all these scenarios in more depth in a separate article, where I also provide
    some practical scenarios for implementing the Activator item.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: Activator 是一种无代码解决方案，当底层数据满足条件时自动执行操作。Activator 可以与 Eventstreams、实时仪表板和 Power
    BI 报告结合使用。一旦数据达到某个阈值，Activator 就会自动触发指定的操作——例如，发送电子邮件或 Microsoft Teams 消息，甚至触发
    Power Automate 流。我将在另一篇文章中更深入地介绍所有这些场景，并在此提供一些实施 Activator 项的实际场景。
- en: Conclusion
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Real-Time Intelligence — something that started as a part of the “Synapse experience”
    in Microsoft Fabric, is now a separate, dedicated workload. That tells us a lot
    about Microsoft’s vision and roadmap for Real-Time Intelligence!
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 实时智能——最初是 Microsoft Fabric 中的“Synapse 体验”的一部分，现在已成为一个独立的、专门的工作负载。这让我们对微软对实时智能的愿景和路线图有了很多了解！
- en: 'Don’t forget: initially, Real-Time Analytics was included under the Synapse
    umbrella, together with Data Engineering, Data Warehousing, and Data Science experiences.
    However, Microsoft thought that handling streaming data deserves a dedicated workload
    in Microsoft Fabric, which absolutely makes sense considering the growing need
    to deal with *data in motion *and provide insight from this data as soon as it
    is captured. In that sense, Microsoft Fabric provides a whole suite of powerful
    services, as the next generation of tools for processing, analyzing, and acting
    on data as it’s generated.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 不要忘记：最初，实时分析包含在 Synapse 之下，与数据工程、数据仓库和数据科学体验一起。然而，微软认为处理流数据值得在 Microsoft Fabric
    中拥有一个专门的工作负载，这在处理日益增长的需求和提供数据捕获时的洞察力方面绝对是有道理的。从这个意义上说，Microsoft Fabric 提供了一套强大的服务，作为处理、分析和在数据生成时采取行动的下一代工具。
- en: I’m quite confident that the Real-Time Intelligence workload will become more
    and more significant in the future, considering the evolution of data sources
    and the increasing pace of data generation.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常确信，随着数据源的发展和数据生成速度的加快，实时智能工作负载在未来将变得越来越重要。
- en: Thanks for reading!
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
