- en: '**Why become a contributor?**'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**为什么成为贡献者？**'
- en: We are looking for writers to propose up-to-date content focused on data science,
    machine learning, artificial intelligence and programming. If you love to write
    about these topics, read on!
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在寻找作者，提出关于数据科学、机器学习、人工智能和编程的最新内容。如果你喜欢撰写这些主题的文章，请继续阅读！
- en: '**Reach a broader audience.** TDS is the leading global destination for thoughtful
    and actionable articles on data science, machine learning, and AI. We attract
    readers from a wide range of industries, backgrounds, and experience levels: from
    professors to early-stage learners, and from job seekers to tech executives.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**触及更广泛的受众**。TDS是数据科学、机器学习和AI上深思熟虑且可操作文章的领先全球目的地。我们吸引了来自各行各业、背景和经验水平的读者：从教授到早期学习者，从求职者到技术高管。'
- en: 'Every article we publish benefits from our built-in visibility, but we also
    work hard to ensure your work enjoys maximum reach:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发布的每一篇文章都受益于我们内置的可见性，但我们也在努力确保您的工作获得最大范围的传播：
- en: Our [independent domain](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)
    and SEO strategy generate strong direct traffic, driving **675k+ monthly clicks**
    via Google Search, News, and Discover alone.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的[独立域名](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)和SEO策略产生了强大的直接流量，仅通过谷歌搜索、新闻和发现就驱动了**67.5k+每月点击量**。
- en: Every story we publish spends at least 24 hours on our homepage, which attracts
    more than **100k monthly views**.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们发布的每篇文章至少在我们的主页上展示24小时，这吸引了超过**10k每月浏览量**。
- en: With **950k+ followers** on our social accounts (where every article appears
    up to four times) and **150k+ newsletter subscribers**, your stories’ reach extends
    deep into readers’ inboxes and social feeds.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我们的社交媒体账号上（每篇文章最多出现四次），有**95k+关注者**，以及**15k+新闻通讯订阅者**，您的故事可以深入到读者的收件箱和社交媒体动态中。
- en: '**Earn money with the Towards Data Science Author Payment Program**. When publishing
    in TDS, our authors can decide to apply to our Payment Program, which enables
    them to earn from their work. You can read more about our [Author Payment Program
    here](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/).'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过TDS作者支付计划赚钱**。在TDS发表文章时，我们的作者可以选择申请我们的支付计划，使他们能够从他们的工作中获得收益。您可以在[这里](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)了解更多关于我们的作者支付计划的信息。'
- en: '* * *'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Submission Guidelines**'
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**投稿指南**'
- en: '**Before submitting your article, there are a few essential things you need
    to know. Make sure you read each point well, and that you understand them, as
    by submitting an article to TDS, you are agreeing to comply with all of them.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**在提交您的文章之前，有一些基本事项您需要了解。请确保您仔细阅读每个要点，并理解它们，因为通过向TDS提交文章，您同意遵守所有这些条款**。'
- en: Please take a few minutes to familiarize yourself with our [Author Terms and
    Conditions of Use](https://towardsdatascience.com/author-terms-and-conditions-of-use-b9b3935ff999) — they
    govern the relationship between contributors and TDS.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 请花几分钟时间熟悉我们的[作者条款和条件](https://towardsdatascience.com/author-terms-and-conditions-of-use-b9b3935ff999)——它们规定了贡献者与TDS之间的关系。
- en: Any article you share with us must be entirely your own original work; you can’t
    take other writers’ words and present them as your own.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 您与我们分享的任何文章都必须是完全您自己的原创作品；您不能拿其他作者的词句来当作自己的。
- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Guidelines**'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**指南**'
- en: '****How to get your article ready for publication!**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '****如何让你的文章准备好发表！**'
- en: We aim to strike a balance between innovating, informing and philosophizing.
    We want to hear from you! If you are not a professional writer, consider the following
    points when preparing your article. We want to publish high quality, professional
    articles that people want to read.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们旨在在创新、信息和哲学思考之间取得平衡。我们期待你的声音！如果你不是专业作家，在准备你的文章时考虑以下要点。我们希望发表高质量、专业的文章，人们愿意阅读。
- en: '**1\. Is your story a story that needs to be told?**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 你的故事是一个需要讲述的故事吗？**'
- en: '**Before you start writing, ask yourself: is this story a story that needs
    to be told?'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**在开始写作之前，问问自己：这个故事是一个需要讲述的故事吗？'
- en: If you have read many articles addressing the same issue or explaining the same
    concept, think twice before writing another one. If you have a radical, new take
    on an old chestnut, we want to hear from you… but, we need you to persuade us
    that your article is something special that distinguishes itself from the pack
    and speaks to our audience.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经阅读了许多涉及同一问题或解释同一概念的文章，在撰写另一篇之前请三思。如果你对一个老生常谈的话题有激进的新看法，我们想听听你的声音……但是，我们需要你说服我们你的文章是与众不同的，能够脱颖而出，并吸引我们的听众。
- en: Conversely, if your article addresses an underserved area or presents a new
    idea or method, that’s just what we are after!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，如果你的文章涉及一个未被充分关注的领域，或提出了一个新想法或方法，这正是我们所追求的！
- en: '**2\. What is your message?**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 你的信息是什么？**'
- en: '**Let us know what your main message is, right from the start. Give your piece
    a snappy introduction that tells us:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们从一开始就了解你的主要信息。给你的作品一个简洁的介绍，告诉我们：'
- en: What is your novel idea?
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的新颖想法是什么？
- en: Why should we care?
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们为什么要关心？
- en: How are you going to prove your point?
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你将如何证明你的观点？
- en: Once you’ve got that out of the way, you can be as conversational as you like,
    but keep calling back to the central message and give us a solid conclusion.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你完成了这些，你可以像聊天一样随意，但始终要回到核心信息，并给出一个明确的结论。
- en: Remember though, Towards Data Science is not your personal blog, keep it sharp
    and on-topic!
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，记住，数据科学向导不是你的个人博客，保持它尖锐且切题！
- en: '**3\. On the internet, nobody knows you are a dog**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 在互联网上，没有人知道你是一条狗**'
- en: '**You’ve got a new idea or a new way of doing things, you want to tell the
    community and start a discussion. Fantastic, that’s what we want too, but we’re
    not going to take for granted that you know what you are talking about or that
    we should uncritically believe what you say… you’ve got to persuade us (your audience)
    that:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你有一个新的想法或做事的新方法，你想告诉社区并开始讨论。太棒了，这正是我们想要的，但我们不会假设你知道你在说什么，或者我们应该不加批判地相信你所说的话……你必须说服我们（你的听众）你：'
- en: The subject matter is important
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题内容很重要
- en: There is a gap that needs to be filled
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要填补一个空白
- en: You have the answer
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你有答案
- en: Your solution works
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的解决方案是可行的
- en: Your idea is based on a logical progression of ideas and evidence
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的想法是基于逻辑上的一连串思想和证据
- en: If you are giving us a tutorial, tell us why people would need to use this tool
    and why your way is better than the methods already published.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你是在提供教程，告诉我们为什么人们需要使用这个工具，以及你的方法为什么比已经发表的方法更好。
- en: You can do this by explaining the background, showing examples, providing an
    experiment or just laying out how data you have extracted from various sources
    allowed you to synthesise this new idea.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过解释背景、展示例子、提供实验或只是阐述从各种来源提取的数据如何让你综合出这个新想法来实现这一点。
- en: Are there arguments that counter your opinion or your findings? Explain why
    that interpretation conflicts with your idea and why your idea comes out on top.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 有没有反驳你观点或发现的观点？解释为什么这种解释与你的想法相冲突，以及为什么你的想法更胜一筹。
- en: '**4\. Do you have a short title with an insightful subtitle?**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 你有一个简短且富有洞察力的副标题吗？**'
- en: '**If you scroll up to the top of this page, you will see an example of a title
    and subtitle. Your post needs to have a short title and a longer subtitle that
    tell readers what your article is about or why they should read it. Your header
    is useful for attracting potential readers and making your intentions clear. To
    remain consistent and give readers the best experience possible, we do not allow
    titles or subtitles written in all-caps. We also ask that you avoid profanity
    in both your title and subtitle.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你滚动到这个页面的顶部，你会看到一个标题和副标题的例子。你的文章需要有一个简短的标题和一个较长的副标题，告诉读者你的文章是关于什么的，或者为什么他们应该阅读它。你的标题对于吸引潜在读者和明确你的意图很有用。为了保持一致并提供最佳的读者体验，我们不允许使用全大写的标题或副标题。我们还要求你在标题和副标题中避免使用粗俗的语言。'
- en: When your subtitle is directly under the title and formatted correctly, it will
    show up in some post previews, which helps with your click-through rate.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的副标题直接位于标题下方并且格式正确时，它会在某些文章预览中显示出来，这有助于提高你的点击率。
- en: '**5\. What makes your post valuable to readers?**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 你的文章对读者有什么价值？**'
- en: A successful post has a clearly defined and well-scoped goal, and follows through
    on its promise. If your title tells us you’re going to unpack a complex algorithm,
    show the benefits of a new library, or walk us through your own data pipeline,
    make sure the rest of the post delivers.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一篇成功的文章有一个明确界定和范围合理的目标，并且履行其承诺。如果你的标题告诉我们你将拆解一个复杂的算法，展示一个新库的好处，或者带我们了解你的数据管道，确保文章的其余部分能够实现这些承诺。
- en: '**Here are a few pointers to help you plan and execute a well-crafted post:**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下是一些帮助你规划和执行精心制作的文章的要点：**'
- en: '**1\. Decide what your topic is — and what it isn’t** If you’re not sure what
    your post is going to be about, there’s very little chance your audience will
    when they read it. Define the problem or question your article will tackle, and
    stick to it: anything that doesn’t address the core of your post should stay out.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1. 决定你的主题是什么——以及它不是什么** 如果你不确定你的文章将要讨论什么，那么读者在阅读时几乎不可能确定。定义你的文章将要解决的问题或提出的问题，并坚持这一点：任何没有触及文章核心的内容都应该被排除在外。'
- en: '**2\. Create a clear plan** With your topic in hand, sketch out a clear structure
    for your post, and keep in mind the overall structure it’ll follow. Remember that
    your main goal is to keep your reader engaged and well-oriented, so it’s never
    too early to think about formatting and how you’ll break down the topic into digestible
    sections. Consider adding section headings along the way to make your structure
    visible.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2. 制定一个清晰的计划** 在掌握你的主题后，为你的文章绘制一个清晰的框架，并记住它将遵循的整体结构。记住，你的主要目标是保持读者的参与和良好的方向感，因此考虑格式和如何将主题分解成可消化的部分永远不会太早。考虑在过程中添加章节标题，使你的结构更加明显。'
- en: '**3\. Use clear, action-driven language** If you’re still finding your personal
    voice as a data-science author, a good place to start is keeping things clean,
    clear, and easy to follow.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**3. 使用清晰、以行动为导向的语言** 如果你还在寻找作为数据科学作者的个人声音，一个好的开始是保持内容整洁、清晰且易于跟随。'
- en: If your article is full of neutral, generic verbs (like to be, have, go, become,
    make, etc.), try to mix in more precise action verbs. When it makes sense, use
    specific, lively descriptors instead of dull ones (for example, you could replace
    “easy” with “frictionless,” “accessible,” or “straightforward,” depending on the
    context).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的文章充满了中性的、通用的动词（如to be、have、go、become、make等），尝试混合使用更精确的动作动词。当合适时，使用具体、生动的描述词而不是枯燥的描述词（例如，你可以根据上下文将“easy”替换为“frictionless”、“accessible”或“straightforward”）。
- en: 'There are few things editors appreciate more than a clean first draft, so don’t
    forget to proofread your post a couple of times before sharing it with TDS: look
    for spelling, punctuation, and grammar issues, and do your best to fix them. What
    we hope to offer to our readers are clear explanations, a smooth overall flow — pay
    attention to those transitions! — and a strong sense of what you’re aiming to
    achieve with your post.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑们最欣赏的莫过于一篇干净的第一稿，所以不要忘记在将文章与TDS分享之前仔细校对几次：查找拼写、标点符号和语法问题，并尽力修正它们。我们希望提供给读者的是我们清晰的解释、流畅的整体流程——注意那些过渡！——以及对你希望通过文章实现的目标的强烈感觉。
- en: 'If you’d like to expand your toolkit beyond the basics, the Internet is full
    of great writing resources. Here are a few ideas to help you get started:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要在基础知识之外扩展你的工具箱，互联网上充满了优秀的写作资源。以下是一些帮助你开始的想法：
- en: '[Writing for an academic journal: 10 tips. The Guardian](https://www.theguardian.com/higher-education-network/blog/2013/sep/06/academic-journal-writing-top-tips)'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[为学术期刊写作：10个技巧。卫报](https://www.theguardian.com/higher-education-network/blog/2013/sep/06/academic-journal-writing-top-tips)'
- en: '[6 of the Best Pieces of Advice from Successful Writers](https://blog.bufferapp.com/6-of-the-most-important-aspects-of-successful-writing)'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[来自成功作家的6条最佳建议](https://blog.bufferapp.com/6-of-the-most-important-aspects-of-successful-writing)'
- en: '[Steven Pinker’s Sense of Style](https://www.scientificamerican.com/article/steven-pinker-s-sense-of-style/)'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[史蒂文·平克的风格感](https://www.scientificamerican.com/article/steven-pinker-s-sense-of-style/)'
- en: '**4\. Include your own images, graphs, and gifs** One of the most effective
    ways to get your key points across to your readers is to illustrate them with
    your compelling visuals.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**4. 包含你自己的图片、图表和GIF** 将你的关键点通过引人入胜的视觉元素展示给读者，这是传达信息最有效的方法之一。'
- en: For example, if you’re talking about a data pipeline you built, text can only
    take you so far; adding a diagram or flowchart could make things even clearer.
    If you’re covering an algorithm or another abstract concept, make it more concrete
    with graphs, drawings, or gifs to complement your verbal descriptions. (If you’re
    using images someone else created, you’ll need to source and cite them carefully — read
    our image guidelines below for more details.)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你在谈论你构建的数据管道，文字只能带你走这么远；添加图表或流程图可以使事情更加清晰。如果你在介绍算法或其他抽象概念，用图表、绘图或GIF来补充你的口头描述，使其更加具体。（如果你使用的是其他人创建的图像，你需要仔细地来源和引用它们——阅读我们下面的图像指南以获取更多详细信息。）
- en: A strong visual component will hook your readers’ attention and guide them along
    as they read your post. It will also help you develop a personal style as an author,
    grow your following, and draw more attention on social media.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 强大的视觉元素将吸引读者的注意力，并在他们阅读你的帖子时引导他们。它还将帮助你作为一个作者发展个人风格，扩大你的追随者群体，并在社交媒体上吸引更多关注。
- en: '**6\. Are your code and equations well displayed?**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**6. 你的代码和方程式是否展示得很好？**'
- en: '**TDS readers love to tinker with the ideas and workflows you share with them,
    which means that including a code implementation and relevant equation(s) in your
    post is often a great idea.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**TDS读者喜欢摆弄你与他们分享的想法和工作流程，这意味着在你的帖子中包含代码实现和相关方程式通常是一个很好的主意。**'
- en: To make code snippets more accessible and usable, avoid screenshots. Use WordPress’s
    [code blocks & inline code](https://wordpress.com/support/wordpress-editor/blocks/code-block/)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使代码片段更易于访问和使用，避免使用截图。使用WordPress的[代码块和内联代码](https://wordpress.com/support/wordpress-editor/blocks/code-block/)
- en: To share math equations with your readers, [Embed.fun](https://embed.fun/) is
    a great option. Alternatively, you can [use Unicode characters](https://medium.com/@tylerneylon/how-to-write-mathematics-on-medium-f89aa45c42a0#.tb4rw3gqc)
    and upload an image of the resulting equation.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 要与读者分享数学方程式，[Embed.fun](https://embed.fun/)是一个很好的选择。或者，你可以[使用Unicode字符](https://medium.com/@tylerneylon/how-to-write-mathematics-on-medium-f89aa45c42a0#.tb4rw3gqc)并上传结果的方程式图像。
- en: When you include code or an equation within your article, be sure to explain
    it and add some context around it so readers of all levels can follow along.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在文章中包含代码或方程时，务必解释它，并在其周围添加一些上下文，以便所有水平的读者都能跟上。
- en: To learn more about using these embeds and others in your post, check out this
    [resource](https://wordpress.com/support/wordpress-editor/blocks/embed-block/).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于在帖子中使用这些嵌入和其他内容的信息，请查看这个[资源](https://wordpress.com/support/wordpress-editor/blocks/embed-block/)。
- en: '**7\. Check your facts**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**7. 检查你的事实**'
- en: '**Whenever you provide a fact, if it’s not self-evident, let us know where
    you learned it. Tell us who your sources are and where your data originated. If
    we want to have a conversation we all need to be on the same page. Maybe something
    you say will spark a discussion, but if we want to be sure we are not at cross
    purposes, we need to go back to the original and read for ourselves in case we
    are missing a vital piece of the puzzle that makes everything you say make sense.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**无论何时提供事实，如果它不是显而易见的，请告诉我们你从哪里学到的。告诉我们你的来源是谁以及你的数据来源。如果我们想要进行对话，我们都必须站在同一起跑线上。也许你说的某句话会引发讨论，但如果我们想要确保我们不是南辕北辙，我们需要回到原始资料并亲自阅读，以防我们遗漏了使你所说的一切都有意义的至关重要的信息。**'
- en: '**8\. Is your conclusion to the point and not promotional?**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**8. 你的结论是否简洁，而不是促销性的？**'
- en: '**Please make sure that you include a conclusion at the end of your article.
    It’s a great way to help your readers review and remember the essential points
    or ideas you’ve covered. You can also use your conclusion to link an original
    post or a few relevant articles.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**请确保在文章末尾包含一个结论。这是一个帮助读者回顾和记住您所涵盖的要点或想法的好方法。您还可以使用结论来链接原始帖子或几篇相关文章。**'
- en: Adding an extra link to your author profile or to a social media account is
    fine, but please avoid call-to-action (CTA) buttons.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的作者资料或社交媒体账户中添加额外的链接是可以的，但请避免使用呼吁行动（CTA）按钮。
- en: 'For your **references**, please respect this format:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对于您的**参考**，请尊重以下格式：
- en: '[X] N. Name, Title (Year), Source'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '[X] N. Name, Title (Year), Source'
- en: 'For example, your first reference should look like this:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，您的第一个参考应该看起来像这样：
- en: '[1] A. Pesah, A. Wehenkel and G. Louppe, [Recurrent Machines for Likelihood-Free
    Inference](https://arxiv.org/abs/1811.12932) (2018), NeurIPS 2018 Workshop on
    Meta-Learning'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '[1] A. Pesah, A. Wehenkel and G. Louppe, [Recurrent Machines for Likelihood-Free
    Inference](https://arxiv.org/abs/1811.12932) (2018), NeurIPS 2018 Workshop on
    Meta-Learning'
- en: '**9\. Are your tags precise enough?**'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**9. 您的标签是否足够精确？**'
- en: '**The more specific your tags, the easier it is for readers to find your article
    and for us to classify and recommend your post to the relevant audience.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**标签越具体，读者就越容易找到您的文章，我们也就越容易对您的帖子进行分类并向相关受众推荐。**'
- en: We may change one or two tags before publication. We would do this only to keep
    our different sections relevant to our readers. For instance, we would want to
    avoid tagging a post on linear regression as “Artificial Intelligence”.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在发表之前，我们可能会更改一两个标签。我们只会这样做，以确保我们的不同部分与读者相关。例如，我们不想将关于线性回归的帖子标记为“人工智能”。
- en: '**10\. Do you have an amazing image?**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**10. 您有没有令人惊叹的图片？**'
- en: '**A great image attracts and excites readers. That’s why all the best newspapers
    always display incredible pictures.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**一张优秀的图片能吸引和激发读者的兴趣。这就是为什么所有最好的报纸总是展示令人难以置信的图片。**'
- en: 'This is what you can do to add a fantastic featured image to your post:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这是您可以为您的帖子添加一个精彩的特色图片所做的事情：
- en: '**Use** [**Unsplash**](https://unsplash.com/)**.** Most of the content on Unsplash
    is fine to use without asking for permission. You can learn more about their license
    [here](https://unsplash.com/license).'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用** [**Unsplash**](https://unsplash.com/) **。** 大多数Unsplash上的内容都可以使用，无需请求许可。您可以在[这里](https://unsplash.com/license)了解更多关于他们许可证的信息。'
- en: '**Take one yourself**. Your phone is almost certainly good enough to capture
    a cool image of your surroundings. You might even already have an image on your
    phone that would make a great addition to your article.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自己拍摄一张照片**。您的手机几乎可以捕捉到周围环境的精彩图片。您甚至可能已经在手机上有一张可以很好地补充您文章的图片。'
- en: '**Make a great graph**. If your post involves data analysis, spend some time
    making at least one graph truly unique. You can try R, Python, D3.js or Plotly.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制作一个优秀的图表**。如果您的帖子涉及数据分析，请花些时间制作至少一个真正独特的图表。您可以使用R、Python、D3.js或Plotly。'
- en: '**If you decide to purchase a license for an image to be used in your article**,
    please note that we only allow the use of images under a license that: (i) does
    not expire; and (ii) that can be used for commercial purposes on the TDS Publication.
    You are responsible for ensuring you comply with the license terms of use. You
    must also include a caption below the image, as follows, or as otherwise required
    by the license provider: “*Image via [license provider’s name] under license to
    [your name]*.” Finally, please email us a copy of a receipt or other evidence
    of the purchased license, along with the corresponding license terms of use.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您决定购买用于文章中的图片的许可证**，请注意我们只允许使用以下许可证的图片：（i）不会过期；（ii）可以在TDS出版物上用于商业目的。您有责任确保您遵守许可证的使用条款。您还必须在图片下方包含以下或根据许可证提供者要求的内容作为标题：“*图片由[许可证提供者名称]授权[您的姓名]*。”最后，请将购买许可证的收据或其它证据的副本以及相应的使用条款发送给我们。'
- en: '**If you’ve chosen to create images for your article using an AI tool** (like
    DALL·E 2, DALL·E, Midjourney, or Stable Diffusion, among others), it’s your responsibility
    to ensure that you’ve read, understood, and followed the tool’s terms. Any image
    you use on TDS must be licensed for commercial use, including AI-generated images.
    Not all AI tools permit images to be used for commercial purposes and some require
    payment to permit you to use the image.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您选择使用AI工具**（如DALL·E 2、DALL·E、Midjourney或Stable Diffusion等）为您的文章创建图像，您有责任确保您已阅读、理解并遵循该工具的条款。您在TDS上使用的任何图像都必须获得商业使用许可，包括AI生成的图像。并非所有AI工具都允许将图像用于商业目的，有些工具可能需要付费才能允许您使用该图像。'
- en: The images you generate with AI tools cannot violate the copyright of other
    creators. If the AI generated image resembles or is identical to an existing copyrighted
    image or fictional character (like Harry Potter, Fred Flinstone etc.), you are
    not permitted to use it on TDS. Use your best judgment and avoid AI-generated
    images that copy or closely emulate another work. If in doubt, use an image search
    tool — like [Google Lens](https://support.google.com/websearch/answer/1325808?),
    [TinEye](https://tineye.com/), or others — to check whether your images are too
    similar to an existing work. We may also ask that you provide details of the text
    prompts you used in the AI tool to confirm you did not use the names of copyrighted
    works.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI工具生成的图像不能侵犯其他创作者的版权。如果AI生成的图像与现有的受版权保护的图像或虚构角色（如哈利·波特、弗雷德·弗林斯通等）相似或完全相同，您不允许在TDS上使用它。请使用您的最佳判断力，避免使用复制或与另一作品非常相似的AI生成的图像。如有疑问，请使用图像搜索工具（如[Google
    Lens](https://support.google.com/websearch/answer/1325808?)、[TinEye](https://tineye.com/)或其他人）检查您的图像是否与现有作品过于相似。我们也可能要求您提供在AI工具中使用的文本提示详情，以确认您没有使用受版权保护的作品的名称。
- en: Your text prompts cannot use the names of real people, nor can your images be
    used if they feature a real person (whether a celebrity, politician, or anyone
    else).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 您的文本提示不能使用真实人的名字，您的图像也不能包含真实人物（无论是名人、政治家还是其他人）。
- en: '**Please remember to cite the source of your images even if you aren’t legally
    obligated to do so.** If you created an image yourself, you can add (*Image by
    author*) in the caption. Whichever way you decide to go, your image source should
    look like this:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**请记住，即使您没有法律义务，也要注明图像的来源**。如果您自己创建了图像，您可以在图注中添加（*图像由作者提供*）。无论您选择哪种方式，您的图像来源应如下所示：'
- en: '![](../Images/afd4b27a1b1429e0dc3be3c67fd41672.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/afd4b27a1b1429e0dc3be3c67fd41672.png)'
- en: Photo by [Marco Xu](https://unsplash.com/@marcute?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/woman-holding-dslr-camera-ToUPBCO62Lw?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Marco Xu](https://unsplash.com/@marcute?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/woman-holding-dslr-camera-ToUPBCO62Lw?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: '![](../Images/4774e484a332a2cc6980db0b4c3d77b4.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4774e484a332a2cc6980db0b4c3d77b4.png)'
- en: 'Photo by Nubia Navarro (nubikini): https://www.pexels.com/photo/art-artistic-creative-design-1110354/'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Nubia Navarro (nubikini)提供：https://www.pexels.com/photo/art-artistic-creative-design-1110354/
- en: '![](../Images/1b4ba6846f05dac9fbed08fcebf12a1f.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1b4ba6846f05dac9fbed08fcebf12a1f.png)'
- en: Image by [Micha Sager](https://pixabay.com/users/michasager-6459346/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2755908)
    from [Pixabay](https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2755908)
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Micha Sager](https://pixabay.com/users/michasager-6459346/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2755908)在[Pixabay](https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2755908)提供
- en: Your image should both have the source and the link to that source. If you created
    an image yourself, you can add “Image by author”.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 您的图像应同时包含来源和该来源的链接。如果您自己创建了图像，您可以在图注中添加“图像由作者提供”。
- en: '**If you’ve created an image that was lightly inspired** by an existing image,
    please add the caption “Image by Author, inspired by source[include the link].”
    **If you’ve edited an existing image**, please make sure you have the right to
    use and edit that image and include the caption “Image by source[include the link],
    edited with permission by the author.”'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您创建的图像是受现有图像轻微启发的**，请在图注中添加“图像由作者提供，受来源启发[包含链接]”。**如果您编辑了现有图像**，请确保您有权使用和编辑该图像，并在图注中包含“图像由来源提供[包含链接]，经作者许可编辑。”'
- en: '**Danger zone**: Do not use images (including logos and gifs) you found online
    without explicit permission from the owner. Adding the source to an image doesn’t
    grant you the right to use it.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**危险区域**：不要在没有所有者明确许可的情况下使用您在网上找到的图片（包括标志和 gif）。在图片中添加来源并不赋予您使用它的权利。'
- en: '**11\. Where did you get your data?**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**11. 您的数据是从哪里获得的？**'
- en: The Towards Data Science team is committed to the creation of a respectful community
    of data science authors, researchers, and readers. For our authors, this means
    respecting the work of others, taking care to honor copyrights associated with
    images, published material, and data. Please always ensure that you have the right
    to collect, analyze, and present the data you’re using in your article.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: Towards Data Science 团队致力于建立一个尊重数据科学作者、研究人员和读者的社区。对于我们的作者来说，这意味着尊重他人的工作，注意尊重与图像、已发布材料和数据相关的版权。请始终确保您有权收集、分析和展示您在文章中使用的数据。
- en: There are plenty of great sources of data that are freely available. Try searching
    university databases, government open data sites, and international institutions,
    such as the [UCI Irvine Machine Learning Repository](https://archive.ics.uci.edu/ml/index.php),
    [U.S. Government](https://data.gov/), and [World Bank Open Data](https://data.worldbank.org/).
    And don’t forget about sites that hold specific data relating to fields like physics,
    astrophysics, earth science, sports, and politics like [CERN](http://opendata.cern.ch/),
    [NASA](https://data.nasa.gov/), and [FiveThirtyEight](https://data.fivethirtyeight.com/).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多免费提供的数据来源。尝试搜索大学数据库、政府开放数据网站和国际机构，例如 [UCI Irvine 机器学习存储库](https://archive.ics.uci.edu/ml/index.php)、[美国政府](https://data.gov/)
    和 [世界银行开放数据](https://data.worldbank.org/)。别忘了还有像 [CERN](http://opendata.cern.ch/)、[NASA](https://data.nasa.gov/)
    和 [FiveThirtyEight](https://data.fivethirtyeight.com/) 这样的专门数据网站。
- en: TDS is a commercial publication. Before submitting your article to us, **please
    verify your dataset is** [**licensed for commercial use**](https://towardsdatascience.com/writers-faq-462571b65b35/#dataset-license)**,
    or obtain written permission to use it**. Please note that not all the datasets
    on the websites we’ve listed are fine to use. No matter where you obtain your
    data, we advise you to double-check that the dataset permits commercial use.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: TDS 是一份商业出版物。在将您的文章提交给我们之前，**请核实您的数据集是** [**商业用途许可**](https://towardsdatascience.com/writers-faq-462571b65b35/#dataset-license)**，或者获得使用它的书面许可**。请注意，我们列出的网站上并非所有数据集都可以用于。无论您从哪里获取数据，我们建议您务必核实数据集是否允许商业用途。
- en: If you aren’t confident you have the right to use it for commercial purposes,
    consider contacting the owner. Many authors receive a quick, positive response
    to a [well-constructed email](https://towardsdatascience.com/writers-faq-462571b65b35/#email-dataset).
    Explain how you intend to use the data, share your article or idea, and provide
    a link to TDS. When you receive permission, please forward a copy to us at [[email protected]](/cdn-cgi/l/email-protection).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不确定是否有权将其用于商业目的，请考虑联系数据所有者。许多作者在发送一份[精心构建的电子邮件](https://towardsdatascience.com/writers-faq-462571b65b35/#email-dataset)后都能收到快速、积极的回复。解释您打算如何使用数据，分享您的文章或想法，并提供
    TDS 的链接。当您收到许可后，请将副本转发给我们至 [[email protected]](/cdn-cgi/l/email-protection)。
- en: This is especially important if you plan to use web scraping to create your
    own dataset. If the website does not explicitly allow data scraping for commercial
    purposes, we strongly recommend that you contact the website owner for permission.
    Without explicit permission, we won’t be able to publish your work, so please
    forward us a copy via email.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这尤其重要，如果您计划使用网络爬虫来创建自己的数据集。如果网站没有明确允许用于商业目的的数据抓取，我们强烈建议您联系网站所有者以获得许可。没有明确的许可，我们无法出版您的作品，因此请通过电子邮件将副本转发给我们。
- en: And sometimes, simple works best! If you just want a dataset to explain how
    an algorithm works, you can always create an artificial or simulated dataset.
    Here’s a quick [tutorial](https://towardsdatascience.com/top-3-python-packages-to-generate-synthetic-data-33a351a5de0c),
    and an [article](https://towardsdatascience.com/how-to-use-synthetic-and-simulated-data-effectively-04d8582b6f88/)
    that uses a simulated dataset you might find helpful.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，简单的方法最好！如果您只想创建一个数据集来解释算法的工作原理，您始终可以创建一个人工或模拟的数据集。这里有一个快速[教程](https://towardsdatascience.com/top-3-python-packages-to-generate-synthetic-data-33a351a5de0c)，以及一篇[文章](https://towardsdatascience.com/how-to-use-synthetic-and-simulated-data-effectively-04d8582b6f88/)，其中使用了一个可能对您有帮助的模拟数据集。
- en: Please remember to add a link to the site where the dataset is stored, and credit
    the owner/creator in your article. Ideally, this is done on first mention of the
    dataset, or in a resource list at the end of the article. Please carefully follow
    any instructions relating to attribution that you find on the site. If you have
    created your own artificial or simulated dataset, it is important to mention that
    too.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住在文章中添加数据集存储网站的链接，并注明所有者/创作者。理想情况下，这应该在数据集首次提及时或在文章末尾的资源列表中完成。请仔细遵循你在网站上找到的任何关于归属的说明。如果你创建了你自己的人工或模拟数据集，这也非常重要。
- en: We know interpreting a license can be challenging. It is your responsibility
    to be certain that you can present your data and findings in an article published
    with TDS, but if you’re stuck, please reach out to our editorial team for assistance.
    We would rather work with you in the early stages of your project than to have
    to decline your completed article due to a dataset license issue.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道解读许可证可能具有挑战性。确保你可以在使用TDS发表的文章中展示你的数据和发现是你的责任，但如果你遇到困难，请联系我们的编辑团队寻求帮助。我们宁愿在项目早期阶段与你合作，也不愿因为数据集许可证问题而不得不拒绝你完成的文章。
- en: '**12\. Is your content original?**'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**12. 你的内容是否原创？**'
- en: While we do accept content that has already been published (for example, on
    your personal blog or website), our focus is on promoting and sharing new and
    original content with our readers. That means that by publishing your article
    in TDS first (or exclusively), you have a greater chance to be featured on our
    publication, our social media channels, and in our newsletter.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们接受已经发表的内容（例如，在你的个人博客或网站上），但我们的重点是推广和与读者分享新的和原创的内容。这意味着，通过首先（或独家）在TDS上发表你的文章，你更有可能被我们的出版物、社交媒体渠道和我们的通讯中突出展示。
- en: We love original content because it’s something that our audience hasn’t seen
    before. We want to give as much exposure to new material as possible and keep
    TDS fresh and up-to-date.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢原创内容，因为它是我们观众之前没有看到过的东西。我们希望尽可能多地展示新材料，并保持TDS的新鲜和时效性。
- en: Originality also means that you (and your coauthors, if any) are the sole creator
    of each and every element in your post. Any time you rely on someone else’s words,
    you have to cite and quote them properly, otherwise we consider it an instance
    of plagiarism.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 原创性还意味着你（以及如果有，你的合著者）是你帖子中每个元素的唯一创作者。每次你依赖他人的话语时，你必须正确地引用和引用他们，否则我们将其视为剽窃的一个例子。
- en: '**13\. Did you get any feedback before submitting your post?**'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '**13. 在提交帖子之前，你收到任何反馈吗？**'
- en: Get into the habit of always asking a friend for feedback before publishing
    your article. Having worked so hard on that article, you wouldn’t want to let
    a silly mistake push readers away.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在发布文章之前，养成向朋友寻求反馈的习惯。既然你已经那么努力地完成了这篇文章，你不想让一个愚蠢的错误让读者远离。
- en: '**14\. Has your Author profile been completed correctly?**'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**14. 你的作者个人资料是否已经正确完成？**'
- en: Please include your **real name**, a **photo**, and a **bio**. We don’t publish
    posts from anonymous writers — it’s easier to build trust with readers when they
    associate your words with an actual person.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 请包括你的**真实姓名**、一张**照片**和一份**个人简介**。我们不发表匿名作者的帖子——当读者将你的话语与一个真实的人联系起来时，更容易建立信任。
- en: Use your profile to introduce yourself, your expertise, your and achievements — optimizing
    it will help you develop a meaningful relationship with your audience beyond a
    single post.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你的个人资料介绍你自己、你的专业知识、你的成就——优化它将帮助你与观众建立超越单一帖子的有意义的关系。
- en: If you are a company and would like to publish with us, please note that we
    almost exclusively publish articles submitted directly from the author.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一家公司，并希望与我们合作发表，请注意我们几乎只发表直接从作者那里提交的文章。
- en: '**15\. Are you getting better?**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**15. 你是否在变得更好？**'
- en: Take a minute to reflect on the work you have been doing so far, and the current
    article you wish to publish. What value are you bringing, and to whom? In which
    ways are this article better or worse than the ones you previously published?
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 花一分钟反思你迄今为止所做的工作，以及你希望发布的当前文章。你带来了什么价值，对谁有价值？这篇文章与之前你发表的文章相比，有哪些优点或缺点？
- en: '* * *'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Longform posts, columns, and online books**'
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**长篇帖子、专栏和在线书籍**'
- en: '**Have a lot to say? Good. We love to dive deep into complex topics, and so
    do our readers. Here’s how you can publish longform posts, columns, and online
    books on TDS.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '**有很多话要说吗？很好。我们喜欢深入研究复杂的话题，我们的读者也是如此。以下是如何在TDS上发布长篇帖子、专栏和在线书籍的方法。**'
- en: '**Longform posts**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**长篇帖子**'
- en: '**We love long reads! If your article’s reading time is shorter than 25 minutes,
    we recommend that you *don’t* break it into multiple pieces — keep it as-is. A
    single post makes it easier for readers to search and find all the information
    they need, and less likely that they’ll miss an important part of your argument.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们喜欢长篇阅读！如果你的文章阅读时间少于25分钟，我们建议你不要将其分成多个部分——保持原样。一篇文章使读者更容易搜索和找到他们所需的所有信息，并且不太可能错过你论点的重要部分。'
- en: To create a smoother reading experience, you can add a table of contents to
    orient your audience around your post. Adding high-quality images and lots of
    white space is always a good idea, too — a long text doesn’t have to be a wall
    of text.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建更流畅的阅读体验，你可以添加目录来引导你的听众了解你的帖子。添加高质量图片和大量空白也是好主意——长篇文章不一定是文字墙。
- en: We regularly add the most engaging and thoughtful longform posts to our [Deep
    Dives page](https://towardsdatascience.com/tagged/deep-dives).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定期将最具吸引力和思考性的长篇帖子添加到我们的[深度探索页面](https://towardsdatascience.com/tagged/deep-dives)。
- en: '**Columns**'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**专栏**'
- en: '**If your post’s reading time exceeds 25 minutes, or if you plan to focus on
    the same topic over multiple articles and a longer stretch of time, you can create
    your own TDS column. All it takes are three steps:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你的帖子阅读时间超过25分钟，或者你计划在多篇文章和更长的时间内专注于同一主题，你可以创建自己的TDS专栏。只需三个步骤即可：'
- en: '**Add a custom tag to your post.** This tag needs to be unique and reflect
    the theme of your project. Every time you publish a post with that tag, it will
    be added to your column’s landing page: [towardsdatascience.com/tagged/[your-tag](http://towardsdatascience.com/tagged/%5byour-tag)].'
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**给你的帖子添加一个自定义标签。** 这个标签需要是唯一的，并反映你项目的主题。每次你发布带有该标签的帖子时，它都会被添加到你的专栏着陆页：[towardsdatascience.com/tagged/[你的标签](http://towardsdatascience.com/tagged/%5Byour-tag)]。'
- en: '**Add a kicker to your post.** It’s like adding a subtitle but above your title.'
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在你的帖子中添加一个亮点。** 这就像添加一个副标题，但位于你的标题之上。'
- en: '**Link your kicker** to your column’s landing page.'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将你的亮点链接到专栏的着陆页。**'
- en: You can create a TDS column and invite multiple authors to contribute. Just
    let your colleague(s) know which tag you decided to use so that they can add the
    same one to their articles. [Here](https://towardsdatascience.com/our-columns-53501f74c86d)
    are some examples from our team.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以创建一个TDS专栏，并邀请多位作者投稿。只需让你的同事（们）知道你决定使用的标签，这样他们就可以将其添加到他们的文章中。[这里](https://towardsdatascience.com/our-columns-53501f74c86d)有一些我们团队的示例。
- en: '**Online Books**'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**在线书籍**'
- en: '**A column is a great format to use if you have an open-ended topic that you
    plan to write about for a while. If, on the other hand, your idea has a finite,
    defined scope and a clear sense of progression from one post to the next, you
    may want to create a series of articles that feels more like an online book. Here
    is the format we recommend using.'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你计划长期撰写一个开放性的主题，专栏是一个很好的格式。另一方面，如果你的想法有一个有限、定义明确的范围，并且从一篇帖子到另一篇有明确的进展感，你可能想创建一系列更像在线书籍的文章。以下是推荐的格式。'
- en: Keep the reading time of each article — or “chapter” — between 12 to 25 minutes,
    and aim for a series that has at least 5 articles (but probably not more than,
    say, 16). You can add links to previous or subsequent items from within each article — for
    example, in the introduction and/or conclusion.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 保持每篇文章或“章节”的阅读时间在12到25分钟之间，并力求至少有5篇文章（但可能不会超过，比如说，16篇）。你可以在每篇文章中添加链接到之前或后续的项目——例如，在引言和/或结论中。
- en: To publish your online book, you can submit all your articles to our editorial
    team in one go, or one by one as you finish working on each. We’ll review them
    and publish them as they come along. Let us know your post is part of a planned
    online book project.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 要发布你的在线书籍，你可以一次性将所有文章提交给我们的编辑团队，或者在你完成每篇文章的工作后逐个提交。我们将审查它们，并随着它们的到来发布它们。让我们知道你的帖子是计划中的在线书籍项目的一部分。
- en: Please ensure that each article or online book chapter follows the same guidelines
    and rules as any other post that TDS publishes. If you ever decide to sell or
    exclusively license your book to a third party publisher, you will have to make
    sure you have their consent to continue to publish the book with TDS. If you do
    not have such consent, it is your responsibility to remove your content from the
    TDS publication.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保每篇文章或在线书籍章节都遵循TDS发布的任何其他帖子的相同指南和规则。如果你决定将你的书籍出售或独家许可给第三方出版商，你必须确保你有他们的同意才能继续在TDS上发布这本书。如果你没有这样的同意，你有责任从TDS出版物中删除你的内容。
- en: '* * *'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '****How To Submit Your Work****'
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '****如何提交您的作品****'
- en: '**To become a writer, please send your article using [our form](https://contributor.insightmediagroup.io/).**'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '**要成为作家，请使用[我们的表格](https://contributor.insightmediagroup.io/)提交您的文章。**'
- en: We aim to respond to authors as quickly as possible and to let them know whether
    or not we’ve accepted their articles.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是尽可能快地回应作者，并告知他们是否已接受他们的文章。
- en: On rare occasions, the volume of submissions we receive makes it difficult to
    respond to everyone; as a general rule, if you haven’t heard from us within a
    week of submitting your post, it’s safe to assume we won’t move forward with publishing
    it.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在少数情况下，我们收到的投稿量使我们难以回应每个人；一般来说，如果您在提交帖子一周内没有收到我们的回复，可以安全地假设我们不会继续出版它。
- en: '[**Contribute to Towards Data Science**](https://contributor.insightmediagroup.io/)
    ✨'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '[**为数据科学贡献**](https://contributor.insightmediagroup.io/) ✨'
- en: If you’re having an issue with our online form, please let us know via email
    ([[email protected]](/cdn-cgi/l/email-protection)) so we can help you complete
    the process. Please do not email us an article that you have already sent via
    our form.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在使用我们的在线表格时遇到问题，请通过电子邮件（[[email protected]](/cdn-cgi/l/email-protection)）告诉我们，以便我们帮助您完成流程。请不要通过我们的表格发送您已经发送过的文章。
- en: FAQ
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: FAQ
- en: Our FAQ can be found [here](https://towardsdatascience.com/writers-faq-462571b65b35/).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 您的常见问题解答（FAQ）可以在[这里](https://towardsdatascience.com/writers-faq-462571b65b35/)找到。
- en: '* * *******************************'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *******************************'
