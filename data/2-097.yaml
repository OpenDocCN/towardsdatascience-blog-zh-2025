- en: End-to-End AWS RDS Setup with Bastion Host Using Terraform
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Terraform通过堡垒主机进行端到端AWS RDS设置
- en: 原文：[https://towardsdatascience.com/end-to-end-aws-rds-setup-with-bastion-host-using-terraform/](https://towardsdatascience.com/end-to-end-aws-rds-setup-with-bastion-host-using-terraform/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/end-to-end-aws-rds-setup-with-bastion-host-using-terraform/](https://towardsdatascience.com/end-to-end-aws-rds-setup-with-bastion-host-using-terraform/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1753672648786" class="mdspan-comment">In</mdspan> any data
    pipeline, data sources — especially databases — are the backbone. To simulate
    a realistic pipeline, I needed a secure, reliable database environment to serve
    as the source of truth for downstream ETL jobs.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753672648786" class="mdspan-comment">在</mdspan>任何数据管道中，数据源——尤其是数据库——是骨架。为了模拟一个真实的管道，我需要一个安全、可靠的数据库环境作为下游ETL作业的真相来源。
- en: Rather than provisioning this manually, I chose to **automate everything** using
    **Terraform**, aligning with modern data engineering and DevOps best practices.
    This not only saved time but also ensured the environment could be easily recreated,
    scaled, or destroyed with a single command — just like in production. **And if
    you’re working on the AWS Free Tier, this is even more important — automation
    ensures you can clean up everything without forgetting a resource that might generate
    costs.**
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是手动配置，我选择使用 **Terraform** 自动化一切，符合现代数据工程和DevOps最佳实践。这不仅节省了时间，还确保了环境可以轻松地重新创建、扩展或销毁，只需一个命令即可——就像在生产环境中一样。**如果您正在AWS免费层上工作，这尤为重要——自动化确保您可以清理所有内容，而不会忘记可能产生成本的资源。**
- en: Prerequisites
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前提条件
- en: 'To follow along with this project, you’ll need the following tools and setup:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 要跟随这个项目，你需要以下工具和设置：
- en: '**Terraform** installed [https://developer.hashicorp.com/terraform/install](https://developer.hashicorp.com/terraform/install)'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Terraform**已安装 [https://developer.hashicorp.com/terraform/install](https://developer.hashicorp.com/terraform/install)'
- en: '**AWS CLI & IAM Setup**'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AWS CLI与IAM设置**'
- en: Install the AWS CLI
  id: totrans-9
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装AWS CLI
- en: 'Follow the official guide here: [https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html](https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html)'
  id: totrans-10
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按照官方指南操作：[https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html](https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html)
- en: 'Create an IAM user with programmatic access that has permission to:'
  id: totrans-11
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个具有程序访问权限的IAM用户，并具有以下权限：
- en: Attach the policy **`AdministratorAccess`** (or create a custom policy with
    limited permissions to create all the resources included)
  id: totrans-12
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 附加策略 **`AdministratorAccess`**（或创建一个具有有限权限的自定义策略以创建所有资源）
- en: Download the Access Key ID and Secret Access Key
  id: totrans-13
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下载访问密钥ID和秘密访问密钥
- en: Configure the AWS CLI
  id: totrans-14
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置AWS CLI
- en: '**An AWS Key Pair**'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AWS密钥对**'
- en: Required to SSH into the bastion host. You can create one in the AWS Console
