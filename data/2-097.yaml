  id: totrans-16
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 必须用于SSH进入堡垒主机。您可以在AWS控制台下的EC2 > 密钥对中创建一个。
- en: '**A Unix-based environment** (Linux/macOS, or WSL for Windows)'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于Unix的环境**（Linux/macOS，或Windows的WSL）'
- en: This ensures compatibility with the shell script and Terraform commands.
  id: totrans-18
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这确保了与shell脚本和Terraform命令的兼容性。
- en: 'Getting Started: What We’re Building'
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 入门：我们要构建什么
- en: Let’s walk through how to build a **secure and automated AWS database setup**
    using Terraform.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步步了解如何使用Terraform构建一个 **安全和自动化的AWS数据库设置**。
- en: Infrastructure Overview
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基础设施概述
- en: 'This project provisions a complete, production-style AWS environment using
    Terraform. The following resources will be created:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 此项目使用Terraform配置了一个完整的生产风格AWS环境。以下资源将被创建：
- en: Networking
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网络配置
- en: A **custom VPC** with a CIDR block (`10.0.0.0/16`)
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个 **自定义VPC**，具有CIDR块（`10.0.0.0/16`）
- en: '**Two private subnets** in different Availability Zones (for the RDS instance)'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**两个私有子网**位于不同的可用区（用于RDS实例）'
- en: '**One public subnet** (for the bastion host)'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一个公共子网**（用于堡垒主机）'
- en: '**Internet Gateway** and **Route Tables** for public subnet routing'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互联网网关**和**路由表**用于公共子网路由'
- en: A **DB Subnet Group** for multi-AZ RDS deployment
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个 **DB子网组** 用于多可用区RDS部署
- en: Compute
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算
- en: A **bastion EC2 instance** in the public subnet
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公共子网中的**堡垒EC2实例**
- en: Used to SSH into the private subnets and access the database securely
  id: totrans-31
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于SSH进入私有子网并安全访问数据库
- en: Provisioned with a custom security group allowing only port 22 (SSH) access
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置了一个自定义安全组，仅允许端口22（SSH）访问
- en: Database
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据库
- en: A **MySQL RDS instance**
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个 **MySQL RDS实例**
- en: Deployed in private subnets (not accessible from the public internet)
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 部署在私有子网中（不可从公共互联网访问）
- en: Configured with a dedicated security group that allows access only from the
    bastion host
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置了仅允许堡垒主机访问的专用安全组
- en: Security
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安全
- en: '**Security groups**:'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全组**：'
- en: 'Bastion SG: allows inbound SSH (port 22) from your IP'
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 堡垒SG：允许来自您的IP的SSH（端口22）入站流量
- en: 'RDS SG: allows inbound MySQL (port 3306) from the bastion’s SG'
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: RDS SG：允许堡垒安全组从MySQL（端口3306）接收入站流量
- en: Automation
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动化
- en: 'A **setup script** (`setup.sh`) that:'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**设置脚本**（`setup.sh`），它：
- en: Exports Terraform variables
  id: totrans-43
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导出Terraform变量
- en: Modular Design With Terraform
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Terraform的模块化设计
- en: I broke the infrastructure into modules like network, bastion and rds. This
    allows me to reuse, scale and test different components independently.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我将基础设施分解为网络、堡垒和rds等模块。这使得我可以独立重用、扩展和测试不同的组件。
- en: The following diagram illustrates how Terraform understands and structures the
    dependencies between different components of the infrastructure, where each node
    represents a resource or module.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表说明了Terraform如何理解和结构化基础设施不同组件之间的依赖关系，其中每个节点代表一个资源或模块。
- en: 'This visualization helps verify that:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这种可视化有助于验证以下内容：
- en: Resources are properly connected (e.g., the RDS instance depends on private
    subnets),
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源连接得当（例如，RDS实例依赖于私有子网），
- en: Modules are isolated yet interoperable (e.g., `network`, `bastion`, and `rds`),
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模块是隔离的但可互操作的（例如，`network`、`bastion`和`rds`），
- en: There are no circular dependencies.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有循环依赖。
- en: '![](../Images/a396d48e2147e621c066cae4b1ee669f.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a396d48e2147e621c066cae4b1ee669f.png)'
- en: Terraform Dependency Graph (Image by Author)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: Terraform依赖关系图（作者图片）
- en: To maintain the above-mentioned modular configuration, I structured the project
    accordingly and provided explanations for each component to clarify their roles
    within the setup.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了维持上述的模块化配置，我相应地构建了项目，并为每个组件提供了说明，以明确它们在设置中的作用。
- en: '[PRE0]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'With the modular structure in place, the `main.tf` file is located in the `rds-bastion`
    directory acts as the **orchestrator**. It ties together the core components:
    the network, the RDS database, and the bastion host. Each module is invoked with
    required inputs, most of which are defined in `variables.tf` or passed via environment
    variables (`TF_VAR_*`).'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在模块化结构到位的情况下，`main.tf`文件位于`rds-bastion`目录中，充当**协调器**。它将核心组件：网络、RDS数据库和堡垒主机连接起来。每个模块都使用必需的输入调用，其中大部分在`variables.tf`中定义或通过环境变量（`TF_VAR_*`）传递。
- en: '[PRE1]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In this modular setup, each infrastructure component is loosely coupled but
    connected through well-defined **inputs and outputs**.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个模块化设置中，每个基础设施组件松散耦合但通过定义良好的**输入和输出**连接。
- en: For example, after provisioning the **VPC and subnets** in the `network` module,
    I retrieve their IDs using its **outputs**, and pass them as **input variables**
    to other modules like `rds` and `bastion`. This avoids hardcoding and enables
    Terraform to dynamically **resolve dependencies** and **build the dependency graph**
    internally.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在`network`模块中配置了**VPC和子网**之后，我使用其**输出**检索它们的ID，并将它们作为**输入变量**传递给其他模块，如`rds`和`bastion`。这避免了硬编码，并使Terraform能够动态**解析依赖关系**并内部构建依赖关系图。
- en: In some cases (such as within the `bastion` module), I also use `data` sources
    to **reference existing resources** created by previous modules, instead of recreating
    or duplicating them.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下（例如在`bastion`模块内部），我也使用`data`源来**引用**由先前模块创建的现有资源，而不是重新创建或复制它们。
- en: The **dependency between modules** relies on the correct **definition and exposure
    of outputs** from previously created modules. These outputs are then passed as
    input variables to dependent modules, enabling Terraform to build an internal
    dependency graph and orchestrate the correct creation order.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**模块之间的依赖关系**依赖于先前创建的模块的正确**定义和暴露**输出。然后，这些输出作为输入变量传递给依赖模块，使Terraform能够构建内部依赖关系图并协调正确的创建顺序。'
- en: For example, the `network` module **exposes** the VPC ID and subnet IDs using
    `outputs.tf`. These values are then **consumed** by downstream modules like `rds`
    and `bastion` through the `main.tf` file of the root configuration.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，`network`模块使用`outputs.tf`**暴露**VPC ID和子网ID。然后，这些值通过根配置的`main.tf`文件由下游模块如`rds`和`bastion`**消费**。
- en: 'Below is how this works in practice:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何在实际中工作的：
- en: 'Inside `modules/network/outputs.tf`:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在`modules/network/outputs.tf`内部：
- en: '[PRE2]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Inside `modules/bastion/variables.tf`:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在`modules/bastion/variables.tf`内部：
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Inside `modules/bastion/network.tf`:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在`modules/bastion/network.tf`内部：
- en: '[PRE4]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: To provision the RDS instance, I created **two private subnets in different
    Availability Zones**, as AWS requires **at least two subnets in separate AZs**
    to set up a DB subnet group.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 为了配置RDS实例，我创建了**两个位于不同可用区的私有子网**，因为AWS要求**至少在两个不同的可用区中设置两个子网**来设置DB子网组。
- en: Although I met this requirement for correct configuration, I **disabled Multi-AZ
    deployment** during RDS creation to **stay within the AWS Free Tier limits** and
    **avoid additional costs**. This setup still simulates a production-grade network
    layout while remaining cost-effective for development and testing.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我满足了正确配置的要求，但在创建RDS时我**禁用了多可用区部署**，以**保持在AWS免费层限制内**并**避免额外费用**。这种设置仍然模拟了生产级网络布局，同时对于开发和测试来说仍然具有成本效益。
- en: Deployment Workflow
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 部署工作流程
- en: With all the modules properly wired through inputs and outputs, and the infrastructure
    logic encapsulated in reusable blocks, the next step is to **automate the provisioning
    process**. Instead of manually passing variables each time, a helper script `setup.sh`
    is used to export necessary environment variables (`TF_VAR_*`).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将所有模块通过输入和输出正确连接，并将基础设施逻辑封装在可重用块中，下一步是**自动化配置过程**。不再需要每次手动传递变量，而是使用辅助脚本`setup.sh`来导出必要的环境变量（`TF_VAR_*`）。
- en: Once the setup script is sourced, deploying the infrastructure becomes as simple
    as running a few Terraform commands.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦设置脚本被源码导入，部署基础设施就变得像运行几个Terraform命令一样简单。
- en: '[PRE5]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: To streamline the Terraform deployment process, I created a helper script (`setup.sh`)
    that automatically exports required environment variables using the `TF_VAR_`
    naming convention. Terraform automatically picks up variables prefixed with `TF_VAR_`,
    so this approach avoids hardcoding values in `.tf` files or requiring manual input
    every time.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化Terraform部署过程，我创建了一个辅助脚本（`setup.sh`），该脚本自动使用`TF_VAR_`命名约定导出所需的变量。Terraform会自动获取以`TF_VAR_`为前缀的变量，因此这种方法避免了在`.tf`文件中硬编码值或每次都需要手动输入。
- en: '[PRE6]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'After running `terraform apply`, Terraform will provision all the defined resources—VPC,
    subnets, route tables, RDS instance, and Bastion host. Once the process completes
    successfully, you’ll see output values similar to the following:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 运行`terraform apply`后，Terraform将配置所有定义的资源——VPC、子网、路由表、RDS实例和堡垒主机。一旦过程成功完成，你将看到类似以下输出的值：
- en: '[PRE7]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'These outputs are defined in the `outputs.tf` files of your modules and re-exported
    in the root module (`rds-bastion/outputs.tf`). They are crucial for:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这些输出定义在模块的`outputs.tf`文件中，并在根模块（`rds-bastion/outputs.tf`）中重新导出。它们对于以下内容至关重要：
- en: '**SSH-ing into the Bastion Host**'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SSH连接到堡垒主机**'
- en: '**Connecting securely to the private RDS instance**'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全连接到私有RDS实例**'
- en: '**Validating resource creation**'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证资源创建**'
- en: Connecting to the RDS via Bastion Host and Seeding the Database
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过堡垒主机连接到RDS并初始化数据库
- en: 'Now that the infrastructure is provisioned, the next step is to **seed the
    MySQL database hosted on the RDS instance**. Since the database is inside a **private
    subnet**, we cannot access it directly from our local machine. Instead, we’ll
    use the **Bastion EC2 instance** as a jump host to:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在基础设施已配置，下一步是**在RDS实例上初始化MySQL数据库**。由于数据库位于**私有子网**中，我们无法直接从本地机器访问它。相反，我们将使用**堡垒EC2实例**作为跳转主机来：
- en: Transfer the sample dataset (`mysqlsampledatabase.sql`) to the Bastion.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将示例数据集（`mysqlsampledatabase.sql`）传输到堡垒。
- en: Connect from the Bastion to the RDS instance.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从堡垒主机连接到RDS实例。
- en: Import the SQL data to initialize the database.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将SQL数据导入以初始化数据库。
- en: You may move two directories up from the Terraform main directory and send the
    SQL content to the remote EC2 (Bastion) after reading the local SQL file inside
    data directory.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从Terraform主目录向上移动两个目录，并在读取数据目录内的本地SQL文件后，将SQL内容发送到远程EC2（堡垒）。
- en: '[PRE8]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Once the dataset is copied to the Bastion EC2 instance, the next step is to
    SSH into the remote machine and :'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦数据集被复制到堡垒EC2实例，下一步是通过SSH连接到远程机器并：
- en: '[PRE9]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'After connecting, you can use the MySQL client (already installed if you used
    `mariadb105` in your EC2 setup) to import the SQL file into your RDS database:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 连接后，你可以使用MySQL客户端（如果你在EC2设置中使用`mariadb105`，它已经安装）将SQL文件导入到你的RDS数据库中：
- en: '[PRE10]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Enter the password when prompted.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示时输入密码。
- en: Once the import is complete, you can connect to the RDS MySQL database again
    to verify that the database and its tables have been successfully created.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦导入完成，你可以再次连接到RDS MySQL数据库以验证数据库及其表已成功创建。
- en: 'Run the following command from within the Bastion host:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在堡垒主机内部运行以下命令：
- en: '[PRE11]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'After entering your password, you can list the available databases and tables:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 输入密码后，您可以列出可用的数据库和表：
- en: '![](../Images/9e73f3012acb1d7afdea359c441b982e.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9e73f3012acb1d7afdea359c441b982e.png)'
- en: List of databases (Image by Author)
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库列表（图片由作者提供）
- en: '![](../Images/87d3fab58bdad546b99137b0db610146.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/87d3fab58bdad546b99137b0db610146.png)'
- en: List of tables in the databases (Image by Author)
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库中的表列表（图片由作者提供）
- en: 'To ensure the dataset was properly imported into the RDS instance, I ran a
    simple query:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保数据集正确导入到RDS实例，我运行了一个简单的查询：
- en: '![](../Images/a0e103bd9da52d927ed8e64adc373a0d.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a0e103bd9da52d927ed8e64adc373a0d.png)'
- en: Query results from the customers table (Image by Author)
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 来自客户表的查询结果（图片由作者提供）
- en: 'This returned a row from the `customers` table, confirming that:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这返回了`customers`表中的一行，确认了：
- en: The database and tables were created successfully
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据库和表已成功创建
- en: The sample dataset was seeded into the RDS instance
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 样本数据集已播种到RDS实例
- en: The Bastion host and private RDS setup are working as intended
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 堡垒主机和私有RDS设置按预期工作
- en: This completes the infrastructure setup and data import process.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了基础设施设置和数据导入过程。
- en: Destroying the Infrastructure
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 销毁基础设施
- en: Once you’re done testing or demonstrating your setup, it’s important to destroy
    the AWS resources to **avoid unnecessary charges**.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您完成测试或演示您的设置，重要的是销毁AWS资源以**避免不必要的费用**。
- en: 'Since everything was provisioned using Terraform, tearing down the entire infrastructure
    is just as simple as running one command after navigating to your root configuration
    directory:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 由于一切都是使用Terraform配置的，因此销毁整个基础设施就像在导航到根配置目录后运行一个命令一样简单：
- en: '[PRE12]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Conclusion
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this project, I demonstrated how to provision a secure and production-like
    database infrastructure using **Terraform** on AWS. Rather than exposing the database
    to the public internet, I implemented best practices by placing the RDS instance
    in **private subnets**, accessible only via a **bastion host** in a public subnet.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我展示了如何使用AWS上的**Terraform**提供安全且类似生产环境的数据库基础设施。而不是将数据库暴露给公共互联网，我通过将RDS实例放置在**私有子网**中，并通过公共子网中的**堡垒主机**进行访问，实施了最佳实践。
- en: By structuring the project with **modular Terraform configurations**, I ensured
    each component—network, database, and bastion host—was **loosely coupled**, reusable,
    and easy to manage. I also showcased how Terraform’s internal **dependency graph**
    handles the orchestration and sequencing of resource creation seamlessly.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用**模块化Terraform配置**来构建项目，我确保每个组件——网络、数据库和堡垒主机——都是**松散耦合**的、可重用的且易于管理。我还展示了Terraform的内部**依赖图**如何无缝地处理资源创建的编排和排序。
- en: Thanks to infrastructure as code (IaC), the entire environment can be brought
    up or torn down with a single command, making it ideal for **ETL prototyping**,
    **data engineering practice**, or **proof-of-concept pipelines**. Most importantly,
    this automation helps avoid unexpected costs by letting you destroy all resources
    cleanly once you’re done.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢基础设施即代码（IaC），整个环境可以一键启动或销毁，这使得它非常适合**ETL原型设计**、**数据工程实践**或**概念验证管道**。最重要的是，这种自动化通过让您在完成后干净地销毁所有资源，有助于避免意外费用。
- en: 'You can find the complete source code, Terraform configuration, and setup scripts
    in my GitHub repository:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在我的GitHub仓库中找到完整的源代码、Terraform配置和设置脚本：
- en: '[https://github.com/YagmurGULEC/rds-ec2-terraform.git](https://github.com/YagmurGULEC/rds-ec2-terraform.git)'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/YagmurGULEC/rds-ec2-terraform.git](https://github.com/YagmurGULEC/rds-ec2-terraform.git)'
- en: Feel free to explore the code, clone the repo, and adapt it to your own AWS
    projects. Contributions, feedback, and stars are always welcome!
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 随意探索代码，克隆仓库，并将其适应您自己的AWS项目。贡献、反馈和星标总是受欢迎！
