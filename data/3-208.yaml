- en: 'Data Science: From School to Work, Part II'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学：从学校到工作，第二部分
- en: 原文：[https://towardsdatascience.com/data-science-from-school-to-work-part-ii/](https://towardsdatascience.com/data-science-from-school-to-work-part-ii/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/data-science-from-school-to-work-part-ii/](https://towardsdatascience.com/data-science-from-school-to-work-part-ii/)
- en: In my previous article, I highlighted the importance of effective project management
    in Python development. Now, let’s shift our focus to the code itself and explore
    how to write clean, maintainable code — an essential practice in professional
    and collaborative environments.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的一篇文章中，我强调了在Python开发中有效项目管理的重要性。现在，让我们将焦点转移到代码本身，探讨如何编写干净、易于维护的代码——这是专业和协作环境中的一项基本实践。
- en: '**Readability & Maintainability:** Well-structured code is easier to read,
    understand, and modify. Other developers — or even your future self — can quickly
    grasp the logic without struggling to decipher messy code.'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可读性与可维护性**：结构良好的代码更容易阅读、理解和修改。其他开发者——甚至是你未来的自己——可以快速掌握逻辑，而无需费力去解析混乱的代码。'
- en: '**Debugging & Troubleshooting:** Organized code with clear variable names and
    structured functions makes it easier to identify and fix bugs efficiently.'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调试与故障排除**：具有清晰变量名和结构化函数的代码更容易高效地识别和修复错误。'
- en: '**Scalability & Reusability:** Modular, well-organized code can be reused across
    different projects, allowing for seamless scaling without disrupting existing
    functionality.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性与可重用性**：模块化、组织良好的代码可以在不同的项目中重用，允许无缝扩展而不会破坏现有功能。'
- en: 'So, as you work on your next Python project, remember:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当你着手你的下一个Python项目时，请记住：
- en: Half of good code is clean code.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的代码一半是干净的代码。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Introduction
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Python is one of the most popular and versatile programming languages, appreciated
    for its simplicity, comprehensibility and large community. Whether web development,
    data analysis, artificial intelligence or automation of tasks — Python offers
    powerful and flexible tools that are suitable for a wide range of areas.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: Python是最受欢迎且多才多艺的编程语言之一，因其简洁、易理解以及庞大的社区而受到赞赏。无论是网站开发、数据分析、人工智能还是任务自动化——Python提供了强大且灵活的工具，适用于广泛的领域。
- en: However, the efficiency and maintainability of a Python project depends heavily
    on the practices used by the developers. Poor structuring of the code, a lack
    of conventions or even a lack of documentation can quickly turn a promising project
    into a maintenance and development-intensive puzzle. It is precisely this point
    that makes the difference between student code and professional code.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，Python项目的效率和可维护性在很大程度上取决于开发者使用的实践。代码结构不良、缺乏约定或甚至缺乏文档，都可能迅速将一个有潜力的项目变成维护和开发密集型的谜题。正是这一点区分了学生代码和专业代码。
- en: This article is intended to present the most important best practices for writing
    high-quality Python code. By following these recommendations, developers can create
    scripts and applications that are not only functional, but also readable, performant
    and easily maintainable by third parties.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 本文旨在介绍编写高质量Python代码的最重要最佳实践。遵循这些推荐，开发者可以创建既功能性强又易于阅读、性能优良且易于第三方维护的脚本和应用程序。
- en: Adopting these best practices right from the start of a project not only ensures
    better collaboration within teams, but also prepares your code to evolve with
    future needs. Whether you’re a beginner or an experienced developer, this guide
    is designed to support you in all your Python developments.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目一开始就采用这些最佳实践不仅确保了团队内更好的协作，而且使你的代码能够随着未来需求的发展而演进。无论你是初学者还是有经验的开发者，本指南旨在支持你在所有Python开发中的工作。
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The code structuration
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码结构化
- en: 'Good code structuring in Python is essential. There are two main project layouts:
    **flat layout** and **src layout**.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: Python代码的良好结构至关重要。主要有两种项目布局：**扁平布局**和**src布局**。
- en: The **flat layout** places the source code directly in the project root without
    an additional folder. This approach simplifies the structure and is well-suited
    for small scripts, quick prototypes, and projects that do not require complex
    packaging. However, it may lead to unintended import issues when running tests
    or scripts.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**扁平布局**将源代码直接放置在项目根目录中，没有额外的文件夹。这种方法简化了结构，非常适合小型脚本、快速原型和不需要复杂打包的项目。然而，在运行测试或脚本时可能会出现意外的导入问题。'
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: On the other hand, the **src layout** (src is the contraction of source) organizes
    the source code inside a dedicated `src/` directory, preventing accidental imports
    from the working directory and ensuring a clear separation between source files
    and other project components like tests or configuration files. This layout is
    ideal for large projects, libraries, and production-ready applications as it enforces
    proper package installation and avoids import conflicts.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，**src布局**（src是source的缩写）在专门的`src/`目录内组织源代码，防止意外从工作目录导入，并确保源文件与其他项目组件（如测试或配置文件）之间的清晰分离。这种布局对于大型项目、库和现成应用程序来说非常理想，因为它强制执行适当的包安装并避免导入冲突。
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Choosing between these layouts depends on the project’s complexity and long-term
    goals. For production-quality code, the `src/` layout is often recommended, whereas
    the flat layout works well for simple or short-lived projects.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 选择这些布局取决于项目的复杂性和长期目标。对于生产质量的代码，通常推荐使用`src/`布局，而对于简单或短期项目，平面布局则效果良好。
- en: You can imagine different templates that are better adapted to your use case.
    It is important that you maintain the modularity of your project. Do not hesitate
    to create subdirectories and to group together scripts with similar functionalities
    and separate those with different uses. A good code structure ensures readability,
    maintainability, scalability and reusability and helps to identify and correct
    errors efficiently.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以想象不同的模板，这些模板更适合你的用例。保持你项目的模块化非常重要。不要犹豫去创建子目录，并将具有相似功能的脚本分组在一起，将具有不同用途的脚本分开。良好的代码结构确保了可读性、可维护性、可扩展性和可重用性，并有助于高效地识别和纠正错误。
- en: '[Cookiecutter](https://www.cookiecutter.io/) is an open-source tool for generating
    preconfigured project structures from templates. It is particularly useful for
    ensuring the coherence and organization of projects, especially in Python, by
    applying good practices from the outset. The flat layout and src layout can be
    initiate using a UV [tool](https://github.com/fpgmaas/cookiecutter-uv).'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Cookiecutter](https://www.cookiecutter.io/) 是一个开源工具，可以从模板生成预配置的项目结构。它特别有用，可以通过从一开始就应用良好的实践来确保项目的连贯性和组织性，尤其是在Python中。可以使用UV
    [工具](https://github.com/fpgmaas/cookiecutter-uv)来启动平面布局和src布局。'
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The SOLID principles
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SOLID原则
- en: SOLID programming is an essential approach to software development based on
    five basic principles for improving code quality, maintainability and scalability.
    These principles provide a clear framework for developing robust, flexible systems.
    By following the SOLID principles, you reduce the risk of complex dependencies,
    make testing easier and ensure that applications can evolve more easily in the
    face of change. Whether you are working on a single project or a large-scale application,
    mastering SOLID is an important step towards adopting object-oriented programming
    best practices.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: SOLID编程是基于五个基本原则的软件开发方法，这些原则旨在提高代码质量、可维护性和可扩展性。这些原则提供了一个清晰的框架来开发健壮、灵活的系统。通过遵循SOLID原则，可以降低复杂依赖的风险，使测试更容易，并确保应用程序在面对变化时更容易进化。无论你是在处理单个项目还是大型应用程序，掌握SOLID都是采用面向对象编程最佳实践的重要一步。
- en: '**S — Single Responsibility Principle (SRP)**'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**S — 单一职责原则 (SRP)**'
- en: The principle of single responsibility means that a class/function can only
    manage one thing. This means that it only has one reason to change. This makes
    the code more maintainable and easier to read. A class/function with multiple
    responsibilities is difficult to understand and often a source of errors.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 单一职责原则意味着一个类/函数只能管理一件事情。这意味着它只有一个改变的理由。这使得代码更易于维护和阅读。具有多个职责的类/函数难以理解，并且往往是错误的一个来源。
- en: '**Example:**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Here, the MLPipeline class has two responsibilities: to process data and to
    train the model.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，MLPipeline类有两个职责：处理数据和训练模型。
- en: '[PRE3]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**O — Open/Closed Principle (OCP)**'
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**O — 开放/关闭原则 (OCP)**'
- en: The open/close principle means that a class/function must be open to extension,
    but closed to modification. This makes it possible to add functionality without
    the risk of breaking existing code.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 开放/关闭原则意味着一个类/函数必须对扩展开放，但对修改关闭。这使得在不破坏现有代码的情况下添加功能成为可能。
- en: It is not easy to develop with this principle in mind, but a good indicator
    for the main developer is to see more and more additions (+) and fewer and fewer
    removals (-) in the merge requests during project development.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这个原则进行开发并不容易，但对于主要开发者来说，一个良好的指标是在项目开发过程中合并请求中看到越来越多的添加（+）和越来越少删除（-）。
- en: '**L — Liskov Substitution Principle (LSP)**'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**L — 里氏替换原则（Liskov Substitution Principle, LSP）**'
- en: The Liskov substitution principle states that a subordinate class can replace
    its parent class without changing the behavior of the program, ensuring that the
    subordinate class meets the expectations defined by the base class. It limits
    the risk of unexpected errors.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 里氏替换原则指出，子类可以在不改变程序行为的情况下替换其父类，确保子类满足基类定义的期望。这限制了意外错误的风险。
- en: '**Example :**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '[PRE4]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'To respect the LSP, it is better to avoid this hierarchy and use independent
    classes:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 为了尊重里氏替换原则（LSP），最好避免这种层次结构并使用独立的类：
- en: '[PRE5]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**I — Interface Segregation Principle (ISP)**'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**I — 接口隔离原则（Interface Segregation Principle, ISP）**'
- en: The principle of interface separation states that several small classes should
    be built instead of one with methods that cannot be used in certain cases. This
    reduces unnecessary dependencies.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 接口分离原则指出，应该构建几个小的类，而不是一个在某些情况下无法使用的方法的类。这减少了不必要的依赖。
- en: '**Example:**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '[PRE6]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'It is better to split the class `Animal` into several classes:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 最好将类 `Animal` 分割成几个类：
- en: '[PRE7]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: D — Dependency Inversion Principle (DIP)
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: D — 依赖倒置原则（DIP）
- en: The Dependency Inversion Principle means that a class must depend on an abstract
    class and not on a concrete class. This reduces the connections between the classes
    and makes the code more modular.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 依赖倒置原则（Dependency Inversion Principle）意味着一个类必须依赖于抽象类，而不是具体类。这减少了类之间的连接，使得代码更加模块化。
- en: '**Example:**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '[PRE8]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Here, the attribute db of UserService depends on the class Database. To respect
    the DIP, db has to depend on an abstract class.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，UserService 的属性 db 依赖于类 Database。为了尊重依赖倒置原则（DIP），db 必须依赖于一个抽象类。
- en: '[PRE9]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**PEP standards**'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**PEP 标准**'
- en: PEPs (Python Enhancement Proposals) are technical and informative documents
    that describe new features, language improvements or guidelines for the Python
    community. Among them, PEP 8, which defines style conventions for Python code,
    plays a fundamental role in promoting readability and consistency in projects.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: PEP（Python 增强提案）是技术性和信息性文档，描述了新功能、语言改进或 Python 社区的指南。其中，定义 Python 代码风格规范的 PEP
    8 在促进项目可读性和一致性方面发挥着基本作用。
- en: Adopting the PEP standards, especially PEP 8, not only ensures that the code
    is understandable to other developers, but also that it conforms to the standards
    set by the community. This facilitates collaboration, re-reads and long-term maintenance.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 采用 PEP 标准，特别是 PEP 8，不仅确保代码对其他开发者可理解，而且符合社区设定的标准。这促进了协作、重读和长期维护。
- en: 'In this article, I present the most important aspects of the PEP standards,
    including:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我介绍了 PEP 标准最重要的方面，包括：
- en: 'Style Conventions (PEP 8): Indentations, variable names and import organization.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 样式规范（PEP 8）：缩进、变量名和导入组织。
- en: Best practices for documenting code (PEP 257).
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编码文档的最佳实践（PEP 257）。
- en: Recommendations for writing typed, maintainable code (PEP 484 and PEP 563).
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写类型化、可维护代码的建议（PEP 484 和 PEP 563）。
- en: Understanding and applying these standards is essential to take full advantage
    of the Python ecosystem and contribute to professional quality projects.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和应用这些标准对于充分利用 Python 生态系统并贡献专业质量的项目至关重要。
- en: '* * *'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**PEP 8**'
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**PEP 8**'
- en: '[This documentation](https://peps.python.org/pep-0008/) is about coding conventions
    to standardize the code, and there exists a lot of documentation about the PEP
    8\. I will not show all recommendation in this posts, only those that I judge
    essential when I review a code'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '[本文档](https://peps.python.org/pep-0008/)是关于编码规范的，以标准化代码，并且关于 PEP 8 的文档有很多。在此帖子中，我不会展示所有建议，只展示我在审查代码时认为至关重要的那些。'
- en: '**Naming conventions**'
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**命名规范**'
- en: Variable, function and module names should be in lower case, and use underscore
    to separate words. This typographical convention is called snake_case.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 变量、函数和模块名应使用小写字母，并使用下划线分隔单词。这种排版约定称为 snake_case。
- en: '[PRE10]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Constances are written in capital letters and set at the beginning of the script
    (after the imports):'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 常量以大写字母书写，并放置在脚本的开头（导入之后）：
- en: '[PRE11]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Finally, class names and exceptions use the CamelCase format (a capital letter
    at the beginning of each word). Exceptions must contain an Error at the end.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，类名和异常使用驼峰式格式（每个单词的开头字母大写）。异常必须在末尾包含Error。
- en: '[PRE12]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Remember to give your variables names **that make sense**! Don’t use variable
    names like v1, v2, func1, i, toto…
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 记得给你的变量命名**要有意义**！不要使用像v1、v2、func1、i、toto这样的变量名...
- en: 'Single-character variable names are permitted for loops and indexes:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 对于循环和索引，允许使用单字符变量名：
- en: '[PRE13]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'A more “pythonic” way of writing, to be preferred to the previous example,
    gets rid of the i index:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 更“Pythonic”的编写方式，相较于之前的例子，去掉了i索引：
- en: '[PRE14]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Spaces management
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 空格管理
- en: 'It is recommended surrounding operators (+, -, *, /, //, %, ==, !=, >, not,
    in, and, or, …) with a space before AND after:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 建议在操作符（+、-、*、/、//、%、==、!=、>、not、in、and、or等）前后都加一个空格：
- en: '[PRE15]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'You can’t add several spaces around an operator. On the other hand, there are
    no spaces inside square brackets, braces or parentheses:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能在操作符周围添加多个空格。另一方面，方括号、花括号或括号内部没有空格：
- en: '[PRE16]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'A space is recommended after the characters “:” and “,”, but not before:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在“:”和“,”字符后面建议加一个空格，但前面不加：
- en: '[PRE17]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'However, when indexing lists, we don’t put a space after the “:”:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在索引列表时，我们不在“:”后面加空格：
- en: '[PRE18]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '**Line length**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**行长度**'
- en: For the sake of readability, we recommend writing lines of code no longer than
    80 characters long. However, in certain circumstances this rule can be broken,
    especially if you are working on a Dash project, it may be complicated to respect
    this recommendation
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 为了可读性，我们建议编写不超过80个字符的代码行。然而，在某些情况下，这个规则可以被打破，特别是如果你正在处理Dash项目，遵守这个建议可能很复杂
- en: The `\` character can be used to cut lines that are too long.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用`\`字符来截断过长的行。
- en: 'For example:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: '[PRE19]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Within a parenthesis, you can return to the line without using the \ character.
    This can be useful for specifying the arguments of a function or method when defining
    or using it:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在括号内，你可以不使用`\`字符就返回到行首。这可以在定义或使用函数或方法时指定其参数很有用：
- en: '[PRE20]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'It is also possible to create multi-line lists or dictionaries by skipping
    a line after a comma:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以通过在逗号后跳一行来创建多行列表或字典：
- en: '[PRE21]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**Blank lines**'
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**空行**'
- en: In a script, blank lines are useful for visually separating different parts
    of the code. It is recommended to leave two blank lines before the definition
    of a function or class, and to leave a single blank line before the definition
    of a method (in a class). You can also leave a blank line in the body of a function
    to separate the logical sections of the function, but this should be used sparingly.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在脚本中，空行有助于在视觉上分隔代码的不同部分。建议在函数或类的定义前留两个空行，在方法的定义（在类中）前留一个空行。你还可以在函数体中留一个空行来分隔函数的逻辑部分，但应尽量少用。
- en: '**Comments**'
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**注释**'
- en: 'Comments always begin with the # symbol followed by a space. They give clear
    explanations of the purpose of the code and must be synchronized with the code,
    i.e. if the code is modified, the comments must be too (if applicable). They are
    on the same indentation level as the code they comment on. Comments are complete
    sentences, with a capital letter at the beginning (unless the first word is a
    variable, which is written without a capital letter) and a period at the end.I
    strongly recommend writing comments in English and it is important to be consistent
    between the language used for comments and the language used to name variables.
    Finally, Comments that follow the code on the same line should be avoided wherever
    possible, and should be separated from the code by at least two spaces.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 注释始终以#符号开头，后跟一个空格。它们清楚地解释了代码的目的，并且必须与代码同步，即如果代码被修改，注释也必须修改（如果适用）。注释与它们所注释的代码处于相同的缩进级别。注释是完整的句子，以大写字母开头（除非第一个单词是变量，此时不使用大写字母）并以句号结尾。我强烈建议用英语写注释，并且注释使用的语言和变量命名的语言之间要保持一致。最后，应尽可能避免在同一行上跟随代码的注释，并且应至少用两个空格与代码分开。
- en: '**Tool to help you**'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**辅助工具**'
- en: '[Ruff](https://docs.astral.sh/ruff/) is a linter (code analysis tool) and formatter
    for Python code written in Rust. It combines the advantages of the **flake8**
    linter and **black** and **isort** formatting while being faster.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '[Ruff](https://docs.astral.sh/ruff/)是一个用Rust编写的Python代码的代码分析工具和格式化工具。它结合了**flake8**分析器和**black**、**isort**格式化的优点，同时运行更快。'
- en: Ruff has an extension on the VS Code editor.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: Ruff在VS Code编辑器上有一个扩展。
- en: 'To check your code you can type:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 要检查你的代码，你可以输入：
- en: '[PRE22]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'But, it is also possible to correct it with the following command:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，也可以用以下命令进行纠正：
- en: '[PRE23]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '**PEP 20**'
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**PEP 20**'
- en: '[PEP 20: The Zen of Python](https://peps.python.org/pep-0020/) is a set of
    19 principles written in poetic form. They are more a way of coding than actual
    guidelines.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '[PEP 20: Python的禅](https://peps.python.org/pep-0020/)是一组以诗的形式写成的19条原则。它们更多的是一种编码方式，而不是实际的指南。'
- en: Beautiful is better than ugly.
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 美丽优于丑陋。
- en: Explicit is better than implicit.
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 明确优于隐含。
- en: Simple is better than complex.
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 简单优于复杂。
- en: Complex is better than complicated.
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 复杂优于复杂。
- en: Flat is better than nested.
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 平坦优于嵌套。
- en: Sparse is better than dense.
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 稀疏优于密集。
- en: Readability counts.
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 可读性很重要。
- en: Special cases aren’t special enough to break the rules.
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 特殊情况并不足以打破规则。
- en: Although practicality beats purity.
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 尽管实用性胜过纯粹性。
- en: Errors should never pass silently.
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 错误不应该默默通过。
- en: Unless explicitly silenced.
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 除非明确禁止。
- en: In the face of ambiguity, refuse the temptation to guess.
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 面对歧义时，拒绝猜测的诱惑。
- en: There should be one– and preferably only one –obvious way to do it.
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 应该只有一个——最好是只有一个——明显的做法。
- en: Although that way may not be obvious at first unless you’re Dutch.
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 虽然一开始可能不明显，除非你是荷兰人。
- en: Now is better than never.
  id: totrans-123
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在比从未好。
- en: Although never is often better than *right* now.
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 虽然永远比现在更合适。
- en: If the implementation is hard to explain, it’s a bad idea.
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果实现起来难以解释，那是个坏主意。
- en: If the implementation is easy to explain, it may be a good idea.
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果实现起来易于解释，那可能是个好主意。
- en: Namespaces are one honking great idea — let’s do more of those!
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 命名空间是一个非常好的想法——让我们做更多这样的！
- en: '**PEP 257**'
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**PEP 257**'
- en: The aim of [PEP 257](https://peps.python.org/pep-0257/) is to standardize the
    use of docstrings.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '[PEP 257](https://peps.python.org/pep-0257/)的目标是标准化文档字符串的使用。'
- en: '**What is a docstring?**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么是文档字符串？**'
- en: A docstring is a string that appears as the first instruction after the definition
    of a function, class or method. A docstring becomes the output of the `__doc__`
    special attribute of this object.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 文档字符串是一个字符串，出现在函数、类或方法定义之后的第一个指令。文档字符串成为该对象的`__doc__`特殊属性的输出。
- en: '[PRE24]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'And we have:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还有：
- en: '[PRE25]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: We always write a docstring between triple double quote `"""`.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们总是用三重双引号`"""`写文档字符串。
- en: '**Docstring on a line**'
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**单行文档字符串**'
- en: Used for simple functions or methods, it must fit on a single line, with no
    blank line at the beginning or end. The closing quotes are on the same line as
    opening quotes and there are no blank lines before or after the docstring.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 用于简单函数或方法，它必须在一行内，开头或结尾没有空白行。关闭引号与打开引号在同一行上，文档字符串前后没有空白行。
- en: '[PRE26]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Single-line docstring MUST NOT reintegrate function/method parameters. Do not
    do:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 单行文档字符串绝对不能重新整合函数/方法参数。不要这样做：
- en: '[PRE27]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '**Docstring on several lines**'
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**多行文档字符串**'
- en: The first line should be a summary of the object being documented. An empty
    line follows, followed by more detailed explanations or clarifications of the
    arguments.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 第一行应该是被文档化的对象的摘要。之后是一个空行，然后是更详细或对参数的解释或澄清。
- en: '[PRE28]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '**Complete Docstring**'
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**完整的文档字符串**'
- en: A complete docstring is made up of several parts (in this case, based on the
    numpydoc standard).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 一个完整的文档字符串由几个部分组成（在这种情况下，基于numpydoc标准）。
- en: 'Short description: Summarizes the main functionality.'
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简短描述：总结主要功能。
- en: 'Parameters: Describes the arguments with their type, name and role.'
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参数：描述参数的类型、名称和角色。
- en: 'Returns: Specifies the type and role of the returned value.'
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 返回值：指定返回值的类型和角色。
- en: 'Raises: Documents exceptions raised by the function.'
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 抛出：记录函数抛出的异常。
- en: 'Notes (optional): Provides additional explanations.'
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 备注（可选）：提供额外的解释。
- en: 'Examples (optional): Contains illustrated usage examples with expected results
    or exceptions.'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 示例（可选）：包含带有预期结果或异常的说明性使用示例。
- en: '[PRE29]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: '**Tool to help you**'
  id: totrans-153
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**帮助你工具**'
- en: VsCode’s [autoDocstring](https://marketplace.visualstudio.com/items?itemName=njpwerner.autodocstring)
    extension lets you automatically create a docstring template.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: VsCode的[autoDocstring](https://marketplace.visualstudio.com/items?itemName=njpwerner.autodocstring)扩展允许你自动创建文档字符串模板。
- en: '**PEP 484**'
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**PEP 484**'
- en: In some programming languages, typing is mandatory when declaring a variable.
    In Python, typing is optional, but strongly recommended. [PEP 484](https://peps.python.org/pep-0484/)
    introduces a typing system for Python, annotating the types of variables, function
    arguments and return values. This PEP provides a basis for improving code readability,
    facilitating static analysis and reducing errors.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些编程语言中，在声明变量时必须进行类型注解。在Python中，类型注解是可选的，但强烈推荐。[PEP 484](https://peps.python.org/pep-0484/)为Python引入了类型注解系统，注解变量的类型、函数参数和返回值。本PEP为提高代码可读性、促进静态分析和减少错误提供了基础。
- en: '**What is typing?**'
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是类型注解？**'
- en: Typing consists in explicitly declaring the type (float, string, etc.) of a
    variable. The typing module provides standard tools for defining generic types,
    such as Sequence, List, Union, Any, etc.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 类型注解包括显式声明变量的类型（如float、string等）。`typing`模块提供了定义通用类型的标准工具，例如Sequence、List、Union、Any等。
- en: To type function attributes, we use “:” for function arguments and “->” for
    the type of what is returned.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 要对函数属性进行类型注解，我们使用“:”表示函数参数，使用“->”表示返回值的类型。
- en: 'Here a list of none typing functions:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个无类型函数的列表：
- en: '[PRE30]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Now here’s how they should look:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 现在看看它们应该如何呈现：
- en: '[PRE31]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: '**Tool to help you**'
  id: totrans-164
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**帮助您的工具**'
- en: '[The MyPy extension](https://marketplace.visualstudio.com/items?itemName=ms-python.mypy-type-checker)
    automatically checks whether the use of a variable corresponds to the declared
    type. For example, for the following function:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '[MyPy扩展](https://marketplace.visualstudio.com/items?itemName=ms-python.mypy-type-checker)会自动检查变量的使用是否与声明的类型相符。例如，对于以下函数：'
- en: '[PRE32]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The editor will point out that a float has no “mean” attribute.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑器会指出浮点数没有“mean”属性。
- en: '![](../Images/53de333dc1650add9afc415da74f444c.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/53de333dc1650add9afc415da74f444c.png)'
- en: Image from author
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'The benefit is twofold: you’ll know whether the declared type is the right
    one and whether the use of this variable corresponds to its type.'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这种好处是双重的：您将知道声明的类型是否正确，以及该变量的使用是否与其类型相符。
- en: In the above example, x must be of a type that has a mean() method (e.g. np.array).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述示例中，x必须是具有mean()方法（例如np.array）的类型。
- en: '* * *'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Conclusion**'
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: In this article, we have looked at the most important principles for creating
    clean Python production code. A solid architecture, adherence to SOLID principles,
    and compliance with PEP recommendations (at least the four discussed here) are
    essential for ensuring code quality. The desire for beautiful code is not (just)
    coquetry. It standardizes development practices and makes teamwork and maintenance
    much easier. There’s nothing more frustrating than spending hours (or even days)
    reverse-engineering a program, deciphering poorly written code before you’re finally
    able to fix the bugs. By applying these best practices, you ensure that your code
    remains clear, scalable, and easy for any developer to work with in the future.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了创建干净的Python生产代码最重要的原则。一个稳固的架构、遵循SOLID原则以及遵守PEP建议（至少是这里讨论的四个）对于确保代码质量至关重要。对美好代码的追求并非（仅仅是）矫揉造作。它标准化了开发实践，使得团队合作和维护变得更加容易。没有什么比花费数小时（甚至数天）逆向工程程序、在最终修复错误之前解读糟糕的代码更令人沮丧的了。通过应用这些最佳实践，您确保您的代码保持清晰、可扩展，并且任何开发者在未来都能轻松地与之合作。
