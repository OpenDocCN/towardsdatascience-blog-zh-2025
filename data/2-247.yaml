- en: Stop Building AI Platforms
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 停止构建 AI 平台
- en: 原文：[https://towardsdatascience.com/stop-building-ai-platforms/](https://towardsdatascience.com/stop-building-ai-platforms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[停止构建 AI 平台](https://towardsdatascience.com/stop-building-ai-platforms/)'
- en: '<mdspan datatext="el1749864167449" class="mdspan-comment">TL;DR: Whereas small</mdspan>
    and medium companies achieve success in building Data and ML platforms, building
    AI platforms is now profoundly challenging. This post discusses three key reasons
    why you should be cautious about building AI platforms and proposes my thoughts
    on promising directions instead.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749864167449" class="mdspan-comment">TL;DR：虽然小型和中型公司在构建数据和
    ML 平台方面取得了成功，但构建 AI 平台现在是一个巨大的挑战。本文讨论了三个你应该谨慎构建 AI 平台的关键原因，并提出了我对有希望的方向的看法。
- en: '**Disclaimer**: It is based on personal views and does not apply to cloud providers
    and data/ML SaaS companies. They should instead double down on the research of
    AI platforms.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**免责声明**：这基于个人观点，并不适用于云服务提供商和数据/ML SaaS 公司。他们应该加倍研究 AI 平台。'
- en: Where I am Coming From
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我从哪里来
- en: 'In my previous article [*From Data Platform to ML Platform*](https://towardsdatascience.com/from-data-platform-to-ml-platform-4a8192edab5d/)
    in Toward Data Science, I shared how a data platform evolves into an ML platform.
    This journey applies to most small and medium-sized companies. However, there
    was no clear path for small and medium-sized companies to continue developing
    their platforms into AI platforms **yet**. Leveling up to AI platforms, the path
    forked into two directions:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前发表在 Toward Data Science 的文章 [*从数据平台到 ML 平台*](https://towardsdatascience.com/from-data-platform-to-ml-platform-4a8192edab5d/)
    中，我分享了数据平台如何演变成 ML 平台的过程。这一过程适用于大多数小型和中型企业。然而，目前对于小型和中型企业来说，将他们的平台继续发展成为 AI 平台还没有明确的路径。升级到
    AI 平台，路径分为两个方向：
- en: 'AI Infrastructure: The “New Electricity” (AI Inference) is more efficient when
    centrally generated. It is a game for big techs and large model providers.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI 基础设施：当集中生成时，“新电力”（AI 推理）更有效率。这是一场大科技公司和大模型提供商的游戏。
- en: 'AI Applications Platform: Cannot build the “beach house” (AI platform) on constantly
    shifting ground. The evolving AI capability and emerging new development paradigm
    make finding lasting standardization challenging.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI 应用平台：不能在不断变化的土地上建造“海滩别墅”（AI 平台）。不断发展的 AI 能力和新兴的新发展范式使得找到持久的标准化的挑战性很大。
- en: However, there are still directions that are likely to remain important even
    as AI models continue to evolve. It is covered at the end of this post.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，即使 AI 模型继续发展，仍有一些方向可能会保持重要。这将在本文的结尾部分讨论。
- en: High Barrier of AI Infrastructure
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 基础设施的高门槛
- en: While Databricks is maybe only several times better than your own Spark jobs,
    DeepSeek could be 100x more efficient than you on LLM inferencing. Training and
    serving an LLM model require significantly more investment in infrastructure and,
    as importantly, control over the LLM model’s structure.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Databricks 可能只比你的 Spark 作业好几倍，但 DeepSeek 在 LLM 推理上可能比你好 100 倍。训练和部署 LLM 模型需要显著增加基础设施投资，并且同样重要的是，对
    LLM 模型结构的控制。
- en: '![](../Images/460258c95edaa36650be47dafd2266d8.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/460258c95edaa36650be47dafd2266d8.png)'
- en: Image Generated by OpenAI ChatGPT 4o
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 由 OpenAI ChatGPT 4o 生成的图像
- en: In [this series](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-one-parallel-training-9a96508c741f),
    I briefly shared the infrastructure for LLM training, which includes [parallel
    training strategies](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-one-parallel-training-9a96508c741f),
    [topology designs](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-two-topology-design-bb14c0e69cb1),
    and [training accelerations](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-three-training-acceleration-af8d6dcb6c0f).
    On the hardware side, besides high-performance GPUs and TPUs, a significant portion
    of the cost went to networking setup and high-performance storage services. Clusters
    require an additional RDMA network to enable non-blocking, point-to-point connections
    for data exchange between instances. The orchestration services must support complex
    job scheduling, failover strategies, hardware issue detection, and GPU resource
    abstraction and pooling. The training SDK needs to facilitate asynchronous checkpointing,
    data processing, and model quantization.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在[这个系列](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-one-parallel-training-9a96508c741f)中，我简要介绍了LLM训练的基础设施，包括[并行训练策略](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-one-parallel-training-9a96508c741f)、[拓扑设计](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-two-topology-design-bb14c0e69cb1)和[训练加速](https://medium.com/@ming.gao.gm/distributed-model-training-at-scale-part-three-training-acceleration-af8d6dcb6c0f)。在硬件方面，除了高性能GPU和TPU之外，相当一部分成本用于网络设置和高性能存储服务。集群需要额外的RDMA网络来启用实例之间数据交换的非阻塞、点对点连接。编排服务必须支持复杂的作业调度、故障转移策略、硬件问题检测以及GPU资源抽象和池化。训练SDK需要促进异步检查点、数据处理和模型量化。
- en: Regarding model serving, model providers often incorporate inference efficiency
    during model development stages. Model providers likely have better model quantification
    strategies, which would produce the same model quality with a significantly smaller
    model size. Model providers are likely to develop a better model parallel strategy
    due to the control they have over the model structure. It can increase the batch
    size during LLM inference, which effectively increases GPU utilization. Additionally,
    large LLM players have logistical advantages that enable them to access cheaper
    routers, mainframes, and GPU chips. More importantly, stronger model structure
    control and better model parallel capability mean model providers can leverage
    cheaper GPU devices. For model consumers relying on open-source models, GPU deprecation
    could be a bigger concern.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 关于模型服务，模型提供商通常在模型开发阶段就考虑推理效率。模型提供商可能拥有更好的模型量化策略，这可以在显著减小模型尺寸的同时保持相同的模型质量。由于对模型结构的控制，模型提供商可能开发出更好的模型并行策略。这可以在LLM推理期间增加批量大小，从而有效提高GPU利用率。此外，大型LLM玩家具有物流优势，使他们能够以更低的价格获取路由器、主机和GPU芯片。更重要的是，更强的模型结构控制和更好的模型并行能力意味着模型提供商可以利用更便宜的GPU设备。对于依赖开源模型的模型消费者来说，GPU的过时可能是一个更大的问题。
- en: Take DeepSeek R1 as an example. Let’s say you’re using p5e.48xlarge AWS instance
    which provide 8 H200 chips with NVLink connected. It will cost you [35$ per hour](https://aws.amazon.com/ec2/capacityblocks/pricing/).
    Assuming you are doing as well as Nvidia and achieve [151 tokens/second performance](https://developer.nvidia.com/blog/nvidia-blackwell-delivers-world-record-deepseek-r1-inference-performance/).
    To generate 1 million output tokens, it will cost you $64(1 million / (151 * 3600)
    * $35). How much does DeepSeek sell its token at per million? [2$ only](https://api-docs.deepseek.com/quick_start/pricing)!
    DeepSeek can achieve 60 times the efficiency of your cloud deployment (assuming
    a 50% margin from DeepSeek).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 以DeepSeek R1为例。假设你正在使用p5e.48xlarge AWS实例，该实例提供了8个NVLink连接的H200芯片。这将花费你[每小时35美元](https://aws.amazon.com/ec2/capacityblocks/pricing/)。假设你的表现与Nvidia相当，并实现了[每秒151个token的性能](https://developer.nvidia.com/blog/nvidia-blackwell-delivers-world-record-deepseek-r1-inference-performance/)。要生成100万个输出token，你需要花费$64（100万
    / (151 * 3600) * $35）。DeepSeek每百万token售价是多少？[仅需2美元](https://api-docs.deepseek.com/quick_start/pricing)！DeepSeek可以达到你云部署效率的60倍（假设DeepSeek有50%的利润率）。
- en: So, LLM inference power is indeed like electricity. It reflects the diversity
    of applications that LLMs can power; it also implies that it is most efficient
    when centrally generated. Nevertheless, you should still self-host LLM services
    for privacy-sensitive use cases, just like hospitals have their electricity generators
    for emergencies.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，大型语言模型推理能力确实像电力一样。它反映了LLM可以推动的多样化应用；这也意味着当集中生成时最为高效。不过，对于隐私敏感的使用案例，你仍然应该自托管LLM服务，就像医院有他们的应急发电机一样。
- en: Constantly shifting ground
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 持续变化的地形
- en: Investing in AI infrastructure is a bold game, and building lightweight platforms
    for AI applications comes with its hidden pitfalls. With the rapid evolution of
    AI model capabilities, there is no aligned paradigm for AI applications; therefore,
    there is a lack of a solid foundation for building AI applications.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI基础设施上进行投资是一场大胆的游戏，为AI应用构建轻量级平台伴随着其隐藏的陷阱。随着AI模型能力的快速演变，没有针对AI应用的统一范式；因此，缺乏构建AI应用的坚实基础。
- en: '![](../Images/ddfb51b3e047ff21269df656abe25580.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ddfb51b3e047ff21269df656abe25580.png)'
- en: Image Generated by OpenAI ChatGPT 4o
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由 OpenAI ChatGPT 4o 生成的图像
- en: 'The simple answer to that is: ***be patient.***'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对此的简单答案是：***耐心等待***。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>If
    we take a holistic view of data and ML platforms, development paradigms emerge
    only when the capabilities of algorithms converge.</summary>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>如果我们从整体的角度看待数据和机器学习平台，只有在算法能力汇聚时，才会出现开发范式。</summary>
- en: '| Domains | Algorithm Emerge | Solution Emerge | Big Platforms Emerge |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| 领域 | 算法出现 | 解决方案出现 | 大平台出现 |'
- en: '| Data Platform | **2004** — MapReduce (Google) | **2010–2015** — Spark, Flink,
    Presto, Kafka | **2020–Now** — Databricks, Snowflake |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| 数据平台 | **2004** — MapReduce (Google) | **2010–2015** — Spark, Flink, Presto,
    Kafka | **2020–Now** — Databricks, Snowflake |'
- en: '| ML Platform | **2012** — ImageNet (AlexNet, CNN breakthrough) | **2015–2017**
    — TensorFlow, PyTorch, Scikit-learn | **2018–Now** — SageMaker, MLflow, Kubeflow,
    Databricks ML |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| 机器学习平台 | **2012** — ImageNet (AlexNet, CNN突破) | **2015–2017** — TensorFlow,
    PyTorch, Scikit-learn | **2018–Now** — SageMaker, MLflow, Kubeflow, Databricks
    ML |'
- en: '| AI Platform | **2017** — Transformers (Attention is All You Need) | **2020–2022**
    —ChatGPT, Claude, Gemini, DeepSeek | **2023–Now** — ?? |</details>'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '| AI平台 | **2017** — Transformers (Attention is All You Need) | **2020–2022**
    —ChatGPT, Claude, Gemini, DeepSeek | **2023–Now** — ?? |</details>'
- en: After several years of fierce competition, a few large model players remain
    standing in the Arena. However, the evolution of the AI capability is not yet
    converging. With the advancement of AI models’ capabilities, the existing development
    paradigm will quickly become obsolete. Big players have just started to take their
    stab at agent development platforms, and new solutions are popping up like popcorn
    in an oven. Winners will eventually appear, I believe. For now, building agent
    standardization themselves is a tricky call for small and medium-sized companies.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 经过几年的激烈竞争，几个大型模型玩家仍然在竞技场上屹立不倒。然而，AI能力的演变尚未收敛。随着AI模型能力的提升，现有的开发范式将迅速过时。大玩家刚刚开始尝试开发代理开发平台，新的解决方案如烤箱中的爆米花般涌现。我相信赢家最终会出现。目前，对于小型和中型公司来说，自己构建代理标准化是一个棘手的选择。
- en: Path Dependency of Old Success
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 旧成功案例的路径依赖
- en: Another challenge of building an AI platform is rather subtle. It is about reflecting
    the mindset of platform builders, whether having path dependency from the previous
    success of building data and ML platforms.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 构建AI平台的另一个挑战相当微妙。它关乎平台构建者的心态，是否从之前构建数据和机器学习平台的成功中产生路径依赖。
- en: '![](../Images/7557df118f2c21fcd56c68129527d328.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7557df118f2c21fcd56c68129527d328.png)'
- en: Image Generated by OpenAI ChatGPT 4o
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 由 OpenAI ChatGPT 4o 生成的图像
- en: 'As we previously shared, since 2017, the data and ML development paradigms
    are well-aligned, and the most critical task for the ML platform is standardization
    and abstraction. However, the development paradigm for AI applications is not
    yet established. If the team follows the previous success story of building a
    data and ML platform, they might end up prioritizing standardization at the wrong
    time. Possible directions are:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前分享的，自2017年以来，数据和机器学习开发范式已经很好地对齐，机器学习平台最关键的任务是标准化和抽象化。然而，AI应用的开发范式尚未确立。如果团队遵循之前构建数据和机器学习平台的成功故事，他们可能会在错误的时间优先考虑标准化。可能的方向是：
- en: 'Build an AI Model Gateway: Provide centralised audit and logging of requests
    to LLM models.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建AI模型网关：提供对LLM模型请求的集中审计和日志记录。
- en: 'Build an AI Agent Framework: Develop a self-built SDK for creating AI agents
    with enhanced connectivity to the internal ecosystem.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建AI代理框架：开发一个自建的SDK，用于创建具有增强内部生态系统连接的AI代理。
- en: 'Standardise RAG Practices: Building a Standard Data Indexing Flow to lower
    the bar for engineer build knowledge services.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准化RAG实践：构建标准数据索引流程，降低工程师构建知识服务的门槛。
- en: 'Those initiatives can indeed be significant. But the ROI really depends on
    the scale of your company. Regardless, you’re gonna have the following challenges:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这些举措确实可能具有重要意义。但投资回报率（ROI）实际上取决于您公司的规模。无论如何，您将面临以下挑战：
- en: Keep up with the latest AI developments.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟上最新的AI发展。
- en: Customer adoption rate when it is easy for customers to bypass your abstraction.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当客户容易绕过您的抽象时，客户的采用率。
- en: Suppose builders of data and ML platforms are like “Closet Organizers”, AI builders
    now should act like “Fashion Designers”. It requires embracing new ideas, conducting
    rapid experiments, and even accepting a level of imperfection.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 假设数据和ML平台的构建者像是“壁橱整理师”，AI构建者现在应该像“时尚设计师”。这需要拥抱新想法，进行快速实验，甚至接受一定程度的不完美。
- en: My Thoughts on Promising Directions
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我对有前景方向的思考
- en: 'Even though so many challenges are ahead, please be reminded that it is still
    gratifying to work on the AI platform right now, as you have substantial leverage
    which wasn’t there before:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管前方有许多挑战，但请记住，现在在AI平台上工作仍然令人欣慰，因为您拥有以前没有的实质性杠杆：
- en: The transformation capability of AI is more substantial than that of data and
    machine learning.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI的转型能力比数据和机器学习更强大。
- en: The motivation to adopt AI is way more potent than ever.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 采用AI的动机比以往任何时候都要强烈。
- en: 'If you pick the right direction and strategy, the transformation you can bring
    to your organisation is significant. Here are some of my thoughts on directions
    that might experience less disruption as the AI model scales further. I think
    they are equally important with AI platformisation:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您选择了正确的方向和策略，您可以为您的组织带来的转型将是显著的。以下是我对在AI模型进一步扩展时可能经历较少干扰的方向的一些看法。我认为它们与AI平台化同样重要：
- en: 'High-quality, rich-semantic data products: Data products with high accuracy
    and accountability, rich descriptions, and trustworthy metrics will “radiate”
    more impact with the growth of AI models.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高质量、丰富语义的数据产品：具有高精度和问责制、丰富描述和可信度量的数据产品将在AI模型增长的过程中“辐射”出更大的影响。
- en: 'Multi-modal Data Serving: OLTP, OLAP, NoSQL, and Elasticsearch, a scalable
    knowledge service behind the MCP server, may require multiple types of databases
    to support high-performance data serving. It is challenging to maintain a single
    source of truth and performance with constant reverse ETL jobs.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多模态数据服务：OLTP、OLAP、NoSQL和Elasticsearch，MCP服务器背后的可扩展知识服务可能需要多种类型的数据库来支持高性能数据服务。保持单一事实来源和性能，同时进行持续的逆向ETL作业具有挑战性。
- en: 'AI DevOps: AI-centric software development, maintenance, and analytics. Code-gen
    accuracy is greatly increased over the past 12 months.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI DevOps：以AI为中心的软件开发、维护和分析。在过去12个月内，代码生成精度大幅提高。
- en: 'Experimentation and Monitoring: Given the increased uncertainty of AI applications,
    the evaluation and monitoring of these applications are even more critical.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实验和监控：鉴于AI应用的增加不确定性，对这些应用的评估和监控变得更加关键。
- en: These are my thoughts on building AI platforms. Please let me know your thoughts
    on it as well. Cheers!
  id: totrans-49
