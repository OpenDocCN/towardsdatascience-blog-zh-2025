- en: As we can see, these pre-trained models are incredibly robust and can be leveraged
    for most use cases. However, they’re not perfect for every situation. For instance,
    if we’re working with niche domains like legal or medical texts, general-purpose
    embeddings may fail to capture the specific meanings and nuances of the language.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，这些预训练模型非常稳健，可以用于大多数用例。然而，它们并不适合每种情况。例如，如果我们处理的是像法律或医学文本这样的利基领域，通用嵌入可能无法捕捉语言的具体含义和细微差别。
- en: 'Say we have this legal text:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个法律文本：
- en: '"The appellant seeks declaratory relief under Rule 57, asserting that the respondent’s
    fiduciary duty was breached by non-disclosure of material facts in accordance
    with Section 10(b) of the Securities Exchange Act of 1934."'
  id: totrans-171
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '"上诉人根据第57条规则寻求宣告性救济，声称被告违反了1934年证券交易法第10(b)条，未披露重要事实的受托人义务。"'
- en: Legal documents are often written in a formal, highly structured style, with
    terms like **"Rule 57"** or **"Section 10(b)"** referencing specific laws and
    statutes. Words like **"material facts"** have a precise legal meaning – facts
    that can influence the outcome of a case – which is very different from how "material"
    is understood in everyday language.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 法律文件通常以正式、高度结构化的风格编写，使用诸如**"Rule 57"**或**"Section 10(b)"**之类的术语引用特定的法律和法规。像**"material
    facts"**这样的词有精确的法律含义——可以影响案件结果的事实——这与日常语言中对"material"的理解非常不同。
- en: Pre-trained embeddings trained on general corpora, such as **Google News**,
    won’t capture these nuanced, domain-specific meanings. Instead, for tasks like
    this, we need embeddings trained on **domain-specific corpora**, such as legal
    judgments, statutes, or contracts.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在通用语料库上训练的预训练嵌入，如**Google新闻**，无法捕捉这些细微的、特定领域的含义。相反，对于这类任务，我们需要在**特定领域语料库**上训练的嵌入，如法律判决、法规或合同。
- en: Code our own Word2Vec from scratch
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从零开始编写我们自己的Word2Vec
- en: This is where building our own Word2Vec model is helpful. By training on a legal
    corpus, we can create embeddings tailored to our use case, capturing the relationships
    and meanings specific to the legal domain.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是构建我们自己的Word2Vec模型有所帮助的地方。通过在法律语料库上训练，我们可以创建针对我们用例的嵌入，捕捉法律领域的特定关系和含义。
- en: '* * *'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: And just like that we’re done! You now know everything you need to know about
    Word2Vec.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样，我们就完成了！你现在已经知道了关于Word2Vec你需要知道的一切。
