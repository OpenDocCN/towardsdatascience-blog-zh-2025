- en: 'NLP Illustrated, Part 3: Word2Vec'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: NLP图解，第三部分：Word2Vec
- en: 原文：[https://towardsdatascience.com/nlp-illustrated-part-3-word2vec-5b2e12b6a63b/](https://towardsdatascience.com/nlp-illustrated-part-3-word2vec-5b2e12b6a63b/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/nlp-illustrated-part-3-word2vec-5b2e12b6a63b/](https://towardsdatascience.com/nlp-illustrated-part-3-word2vec-5b2e12b6a63b/)
- en: Welcome to Part 3 of our illustrated journey through the exciting world of Natural
    Language Processing! If you caught [Part 2](https://medium.com/r?url=https%3A%2F%2Ftowardsdatascience.com%2Fnlp-illustrated-part-2-word-embeddings-6d718ac40b7d),
    you’ll remember that we chatted about word embeddings and why they’re so cool.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到我们探索自然语言处理激动人心的世界的第三部分！如果你已经阅读了[第二部分](https://medium.com/r?url=https%3A%2F%2Ftowardsdatascience.com%2Fnlp-illustrated-part-2-word-embeddings-6d718ac40b7d)，你会记得我们讨论了词嵌入以及为什么它们如此酷。
- en: '[**NLP Illustrated, Part 2: Word Embeddings**](https://medium.com/towards-data-science/nlp-illustrated-part-2-word-embeddings-6d718ac40b7d)'
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**NLP图解，第二部分：词嵌入**](https://medium.com/towards-data-science/nlp-illustrated-part-2-word-embeddings-6d718ac40b7d)'
- en: Word embeddings allow us to create maps of words that capture their nuances
    and intricate relationships.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 词嵌入使我们能够创建捕捉其细微差别和复杂关系的单词地图。
- en: '![](../Images/dbcd3f8b6df13307b9d8c09a450d1d9e.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dbcd3f8b6df13307b9d8c09a450d1d9e.png)'
- en: This article will break down the math behind building word embeddings using
    a technique called **Word2Vec – a machine learning model specifically designed
    to generate meaningful word embeddings.**
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将解析使用称为**Word2Vec**的技术构建词嵌入背后的数学，Word2Vec是一种专门设计用来生成有意义的词嵌入的机器学习模型。
- en: Word2Vec offers two methods – Skip-gram and CBOW – but we’ll focus on how the
    Skip-gram method works, as it’s the most widely used.
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Word2Vec提供了两种方法——Skip-gram和CBOW——但我们将重点介绍Skip-gram方法的工作原理，因为它是最广泛使用的。
- en: These words and concepts might sound complex right now but don’t worry – at
    its core, it’s just some intuitive math (and a sprinkle of machine learning magic).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这些单词和概念现在可能听起来很复杂，但不用担心——其核心只是一些直观的数学（和一些机器学习魔法）。
- en: '*Real quick – before diving into this article, I strongly encourage you to
    read my [series on the basics of machine learning](https://medium.com/@shreya.rao/list/machine-learning-starter-pack-b89c3a7f97ad).
    A couple of concepts (like gradient descent and loss functions**)** build on those
    fundamentals, and understanding them will make this article much easier to follow.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*简短地说——在深入这篇文章之前，我强烈建议你阅读我的[机器学习基础知识系列](https://medium.com/@shreya.rao/list/machine-learning-starter-pack-b89c3a7f97ad)。一些概念（如梯度下降和损失函数**）建立在那些基础知识之上，理解它们会让这篇文章更容易理解。*'
- en: '[**Machine Learning Starter Pack**](https://medium.com/@shreya.rao/list/b89c3a7f97ad)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**机器学习入门包**](https://medium.com/@shreya.rao/list/b89c3a7f97ad)'
- en: '*That said, don’t worry if you’re unfamiliar with those concepts – this article
    will cover them at a high level to ensure you can still follow along!*'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '*话虽如此，如果你对这些概念不熟悉，请不要担心——这篇文章将简要介绍它们，以确保你仍然可以跟上！*'
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Since Word2Vec is a machine-learning model, like any ML model, it needs two
    things:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Word2Vec是一个机器学习模型，就像任何ML模型一样，它需要两样东西：
- en: '**Training data**: text data to learn from'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练数据**：用于学习文本数据'
- en: '**A problem statement**: the question the model is trying to answer'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题陈述**：模型试图回答的问题'
- en: Training data
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练数据
- en: 'We’re trying to create a map of words, so our training data is going to be
    text. Let’s start with this sentence:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们试图创建一个单词地图，因此我们的训练数据将是文本。让我们从这句话开始：
- en: '![](../Images/f4fcfe04366e2dcef8c49f8b2fa899b3.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f4fcfe04366e2dcef8c49f8b2fa899b3.png)'
- en: This will be our toy training data. Of course, in the real world, Word2Vec is
    trained on massive corpora of text – think entire books, Wikipedia, or large collections
    of websites. For now though, we’re keeping it simple with just this one sentence,
    so the model will only learn embeddings for these 18 words.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是我们的玩具训练数据。当然，在现实世界中，Word2Vec是在大量的文本语料库上训练的——想想整本书、维基百科或大量的网站集合。但现在，我们保持简单，只使用这句话，因此模型将只为这18个单词学习嵌入。
- en: A problem statement
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题陈述
- en: 'For Word2Vec, the core problem is simple: ***Given two words, determine whether
    they are neighbors***'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Word2Vec来说，核心问题很简单：***给定两个单词，确定它们是否是邻居***
- en: '![](../Images/3e41e7e1e2626db0debdf0db2a2fd6ff.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3e41e7e1e2626db0debdf0db2a2fd6ff.png)'
- en: To define "neighbors," we use something called a context window, which specifies
    how many neighboring words on either side to consider.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了定义“邻居”，我们使用一个称为上下文窗口的东西，它指定了要考虑的两侧相邻单词的数量。
- en: For instance, if we want to find the neighbors of the word *"happiness"…*
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我们想找到单词 *"happiness"* 的邻居…*
- en: '![](../Images/5112fb85d15b00de56ce89a325243af2.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5112fb85d15b00de56ce89a325243af2.png)'
- en: …and set the context window size to 2, the neighbors of *"happiness"* will be
    *"can"* and **"***be"*.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: …并将上下文窗口大小设置为2，*"happiness"* 的邻居将是 *"can"* 和 **"***be"*。
- en: '![](../Images/31ee897e433e269b32857fe6bf8c5eb5.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/31ee897e433e269b32857fe6bf8c5eb5.png)'
- en: And here, if we input *"happiness"* and *"can"* into the model, ideally we want
    it to predict that they are neighbors.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，如果我们把 *"happiness"* 和 *"can"* 输入到模型中，理想情况下我们希望它预测它们是邻居。
- en: '![](../Images/8fa6cb6022daf48332054531cdd6333b.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8fa6cb6022daf48332054531cdd6333b.png)'
- en: Similarly, for the word *"darkness,"* with a context window of 2, the neighbors
    would be *"in"* and *"the"* (before), and *"of"* and *"times"* (after).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，对于单词 *"darkness"*，上下文窗口为2时，邻居将是 *"in"* 和 *"the"*（之前），以及 *"of"* 和 *"times"*（之后）。
- en: '![](../Images/26bc40017305d309fd13f2e793c952a7.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/26bc40017305d309fd13f2e793c952a7.png)'
- en: If we set our context window to 3, the neighbors for *"happiness"* will be three
    words on either side.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将上下文窗口设置为3，*"happiness"* 的邻居将是两侧各三个词。
- en: '![](../Images/cb73e00cac1fd163c80c0a1813e3d71c.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cb73e00cac1fd163c80c0a1813e3d71c.png)'
- en: '**Terminology segway:** Here "happiness" is referred to as the **target word**,
    while the neighboring words are known as the **context words**.'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**术语过渡**：在这里，"happiness"被称为**目标词**，而邻近的词被称为**上下文词**。'
- en: '**By default, the context window size in Word2Vec is set to 5\. However, for
    simplicity in our example, we’ll use a context window size of 2.**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认情况下，Word2Vec中的上下文窗口大小设置为5。然而，为了简化我们的示例，我们将使用上下文窗口大小为2。**'
- en: Now, we need to convert this sentence into a neat little table, just like we
    do for other machine learning problems, with clearly defined **inputs** and **output
    values**.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要将这个句子转换成一个整洁的小表格，就像我们处理其他机器学习问题一样，有明确定义的**输入**和**输出值**。
- en: '![](../Images/ebfba92032b6a12b4f463b1bbc8b10fd.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ebfba92032b6a12b4f463b1bbc8b10fd.png)'
- en: We can construct this dataset by pairing the **target word** with each of its
    **context words** as inputs…
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过将**目标词**与每个**上下文词**配对作为输入来构建这个数据集...
- en: '![](../Images/50a22df1785f2d9563dc666cddc32ac2.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/50a22df1785f2d9563dc666cddc32ac2.png)'
- en: '…and the **output** will be a label indicating whether the target and context
    words are neighbors:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: …输出将是一个标签，表示目标词和上下文词是否是邻居：
- en: '![](../Images/9c3da661e1418eb1204b865b4681b87a.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c3da661e1418eb1204b865b4681b87a.png)'
- en: 1 indicates that they are neighbors
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1表示它们是邻居
- en: But there’s a glaring issue with this. All our training pairs are positive examples
    (neighbors), which doesn’t teach the model what *non-neighbors* look like.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里有一个明显的问题。我们所有的训练对都是正例（邻居），这并没有教会模型什么是**非邻居**。
- en: Enter **Negative Sampling**.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 进入**负采样**。
- en: '**Negative Sampling** introduces pairs of words that are *not neighbors*. So
    for instance, we know that *"happiness"* and *"light"* are not neighbors, so we
    add that data to our training data with the label 0 to indicate that they are
    not neighbors.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**负采样**引入了不是邻居的词对。例如，我们知道 *"happiness"* 和 *"light"* 不是邻居，因此我们将这些数据添加到我们的训练数据中，并使用标签0表示它们不是邻居。'
- en: '![](../Images/01aa44b41a833a66cc5292af987d08ca.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/01aa44b41a833a66cc5292af987d08ca.png)'
- en: By adding negative samples, the final dataset contains a mix of positive and
    negative pairs so that the model can learn to predict whether a given pair is
    a true neighbor or not.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通过添加负样本，最终数据集包含正负样本对，以便模型可以学习预测给定对是否为真实邻居。
- en: Typically, we use 2 — 5 negative samples per positive pair for large datasets
    and up to 10 for smaller ones.
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通常，对于大型数据集，我们使用每对正样本2到5个负样本，对于小型数据集，最多10个。
- en: 'We’ll use 2 negative pairs per positive pair. Our training dataset now looks
    like this:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用每对正样本2个负样本。我们的训练数据集现在看起来是这样的：
- en: '![](../Images/f895d466884b413d60b5b50f963406c3.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f895d466884b413d60b5b50f963406c3.png)'
- en: 'Now comes the fun part – the machine learning magic. Here’s the problem we’re
    solving: **Given a target word and a context word, predict the probability that
    they are neighbors.**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候进入有趣的部分了——机器学习的魔法。这是我们正在解决的问题：**给定一个目标词和一个上下文词，预测它们是邻居的概率。**
- en: Let’s break it down step by step.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步一步来分析。
- en: 'Step 0: Decide embedding dimensions'
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤0：决定嵌入维度
- en: The first thing we do is to decide the size of the word embeddings. As we’ve
    learned, **larger embeddings capture more nuances** and richer relationships but
    come at the cost of increased computational expense.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先决定词嵌入的大小。正如我们所学的，**更大的嵌入可以捕捉到更多的细微差别**和更丰富的关系，但代价是计算成本的增加。
- en: '**The default embedding size in Word2Vec is 100 dimensions, but to keep the
    explanation simple, let’s use just 2 dimensions.**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**Word2Vec的默认嵌入大小是100维，但为了使解释简单，我们只需使用2维。**'
- en: '![](../Images/72f031c50dc01be0fbe02dbf9a0e2f4f.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/72f031c50dc01be0fbe02dbf9a0e2f4f.png)'
- en: This means each word will be represented as a point on a 2D graph like so**:**
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着每个词都将被表示为2D图上的一个点，如下所示**：**
- en: '![](../Images/db2f5f07f96b5151fbe17127bb96b64d.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/db2f5f07f96b5151fbe17127bb96b64d.png)'
- en: 'Step 1: Initialize embedding matrices'
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步：初始化嵌入矩阵
- en: Next, we initialize two distinct sets of embeddings – **target embeddings**
    and **context embeddings**.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们初始化两组不同的嵌入 - **目标嵌入**和**上下文嵌入**。
- en: '![](../Images/164087596d5621d4666c855a0ed36f79.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/164087596d5621d4666c855a0ed36f79.png)'
- en: And, at the start of training, these embeddings are **randomly initialized with
    values:**
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，在训练开始时，这些嵌入是**随机初始化的**：
- en: '![](../Images/c26a735faf4b37351f77182de5028ef7.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c26a735faf4b37351f77182de5028ef7.png)'
- en: '**The target embeddings and context embeddings are randomly initialized with
    different values because they serve distinct purposes.**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标嵌入和上下文嵌入以不同的值随机初始化，因为它们具有不同的用途。**'
- en: '**Target Embeddings**: Represent each word when it’s the target word in training'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标嵌入**：表示在训练中作为目标词的每个词'
- en: '**Context Embeddings**: Represent each word when it’s a context (neighboring)
    word'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文嵌入**：表示当它是一个上下文（邻近）词时的每个词'
- en: 'Step 2: Calculate the similarity of target word and context word'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步：计算目标词和上下文词的相似度
- en: In the training process, we work with blocks of one positive pair and their
    corresponding negative samples.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，我们处理一个正对及其对应的负样本块。
- en: So in the first pass, we only focus on the first positive pair and its corresponding
    2 negative samples.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在第一次遍历中，我们只关注第一个正对及其对应的2个负样本。
- en: '![](../Images/a5cbd7a1f5bc71a9c9e43cce525c42da.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a5cbd7a1f5bc71a9c9e43cce525c42da.png)'
- en: '**Now we can determine how similar 2 words are by calculating the [dot product](https://tivadardanka.com/blog/how-the-dot-product-measures-similarity)
    of their embeddings: the target embedding (if its a target word) and the context
    embedding (if its a context word).**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在我们可以通过计算两个嵌入的[点积](https://tivadardanka.com/blog/how-the-dot-product-measures-similarity)来确定两个词的相似度：目标嵌入（如果是目标词）和上下文嵌入（如果是上下文词）。**'
- en: A larger dot product indicates the words are more "similar" (likely neighbors)
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 较大的点积表明词更“相似”（可能是邻居）
- en: A smaller dot product suggests they are more dissimilar (less likely to be neighbors)
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 较小的点积表明它们更不相似（不太可能是邻居）
- en: '*And remember, in the first pass, we only calculate the similarity of the 3
    pairs in the first block.*'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '*记住，在第一次遍历中，我们只计算第一个块中3对之间的相似度。*'
- en: 'Let’s start by taking the dot product of the target word embedding of *"happiness"*
    with the context word embedding of *"can"*:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先计算目标词嵌入 *"happiness"* 与上下文词嵌入 *"can"* 的点积：
- en: '![](../Images/1fc075bd78325552e1c3029b8b097db5.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1fc075bd78325552e1c3029b8b097db5.png)'
- en: 'We get:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到：
- en: '![](../Images/4c6d2cbcdd569ba46a7de950faee0759.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4c6d2cbcdd569ba46a7de950faee0759.png)'
- en: Now we need to find a way to convert these scores to probabilities because we
    want to know how likely is it that these two words are neighbors. We can do that
    by passing this dot product through a sigmoid function.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要找到一种方法将这些分数转换为概率，因为我们想知道这两个词成为邻居的可能性有多大。我们可以通过将这个点积通过sigmoid函数来实现。
- en: As a quick refresher, the sigmoid function squishes any input value into a range
    between 0 and 1, making it perfect for interpreting probabilities. If the dot
    product is large (indicating high similarity), the sigmoid output will be close
    to 1 and if the dot product is small (indicating low similarity), the sigmoid
    output will be closer to 0.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 作为快速复习，sigmoid函数将任何输入值压缩到0到1之间的范围，这使得它非常适合解释概率。如果点积很大（表示高度相似），sigmoid输出将接近1；如果点积很小（表示低相似度），sigmoid输出将更接近0。
- en: '![](../Images/aef048c301c97dcc593aeeaccdc88072.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aef048c301c97dcc593aeeaccdc88072.png)'
- en: 'So passing the dot product, -0.36, through the sigmoid function, we get:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，将点积 -0.36 通过sigmoid函数，我们得到：
- en: '![](../Images/bc8bd7a27d333add42f45f5247b7dc20.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bc8bd7a27d333add42f45f5247b7dc20.png)'
- en: Similarly, we can calculate the dot product and corresponding probabilities
    for the other two pairs…
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以计算其他两个对的点积和相应的概率...
- en: '![](../Images/c8937171696a4a04c350b7ac97e0ed74.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c8937171696a4a04c350b7ac97e0ed74.png)'
- en: …to get the predicted probability that *"happiness"* and *"light"* are neighbors…
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: …以得到预测 *"幸福"* 和 *"光"* 是邻居的概率…
- en: '![](../Images/ef6d2e10c1a683670ececefc437201d9.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ef6d2e10c1a683670ececefc437201d9.png)'
- en: '…and the predicted probability that *"happiness"* and *"even"* are neighbors:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: …以及预测 *"幸福"* 和 *"甚至"* 是邻居的概率：
- en: '![](../Images/11384d409217cb91f20af9ae0cd7d0cb.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/11384d409217cb91f20af9ae0cd7d0cb.png)'
- en: This is how we calculate the model’s predicted probabilities of these 3 pairs
    being neighbors.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是计算模型预测这些3对邻居概率的方法。
- en: '![](../Images/5d45b617658f28961cb2a401854e6e80.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5d45b617658f28961cb2a401854e6e80.png)'
- en: As we can see, the predicted values are pretty random and inaccurate, which
    makes sense because the embeddings were initialized with random values.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，预测值相当随机且不准确，这是有道理的，因为嵌入层是用随机值初始化的。
- en: 'Next, we move on to the key step: **updating these embeddings to improve the
    predictions.**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们进入关键步骤：**更新这些嵌入以改进预测**。
- en: 'Step 4: Calculate error'
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步：计算误差
- en: 'NOTE: If you haven’t read the article on Logistic Regression, it might be helpful
    to do so, as the process of calculating error there is very similar. But don’t
    worry, we’ll also go over the basics here.'
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：如果你还没有阅读关于逻辑回归的文章，阅读它可能会有所帮助，因为那里计算误差的过程与这里非常相似。但不用担心，我们也会在这里介绍基础知识。
- en: Now that we have our predictions, we need to calculate the "error" value to
    measure how far off the model’s predictions are from the true labels. For this,
    we use the **Log Loss function.**
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了我们的预测，我们需要计算“误差”值来衡量模型的预测与真实标签之间的偏差程度。为此，我们使用**对数损失函数**。
- en: 'For every prediction, the error is calculated as:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一个预测，误差的计算如下：
- en: '![](../Images/9c05a56f432c95c75273d0ea7955643b.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c05a56f432c95c75273d0ea7955643b.png)'
- en: 'And the overall Log Loss for all predictions in the block is the average of
    the individual prediction errors:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 块中所有预测的整体对数损失是各个预测误差的平均值：
- en: '![](../Images/d5eda421325aba48989431a9cb2bb8fd.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5eda421325aba48989431a9cb2bb8fd.png)'
- en: 'For our example, if we calculate the loss for the 3 pairs above, it will look
    like this:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的例子，如果我们计算上面3对的损失，它将看起来像这样：
- en: '![](../Images/b953fc20c5b57d679918824176f6c14d.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b953fc20c5b57d679918824176f6c14d.png)'
- en: Evaluating this…
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 评估这一点…
- en: '![](../Images/ae7d9e4cc0e52466fb20be2c7f3b8caa.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ae7d9e4cc0e52466fb20be2c7f3b8caa.png)'
- en: …we get 0.3\. Our goal is to reduce this loss to **0** or as close to **0**
    as possible. A loss of **0** means that the model’s predictions perfectly match
    the true labels.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: …我们得到0.3。我们的目标是减少这个损失到**0**或尽可能接近**0**。损失为**0**意味着模型的预测完美匹配真实标签。
- en: 'Step 4: Update embeddings using gradient descent'
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步：使用梯度下降更新嵌入
- en: Again won’t dive into the details here since we covered this in our previous
    article on Logistic Regression. However, **we know that the best way to minimize
    the loss function is by using gradient descent.**
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在之前的逻辑回归文章中已经介绍过这一点，所以这里不再深入细节。然而，**我们知道最小化损失函数的最佳方式是使用梯度下降**。
- en: To put it simply, Log Loss is a convex function…
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，对数损失是一个凸函数…
- en: '![](../Images/9a2110421655c99869a241421f8ab91e.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9a2110421655c99869a241421f8ab91e.png)'
- en: …and gradient descent helps us find the lowest point on this curve – the point
    where the loss is minimized.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: …并且梯度下降帮助我们找到这条曲线上的最低点——损失最小化的点。
- en: '![](../Images/0563f0dac415e8a84eb44b5f2aaf6889.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0563f0dac415e8a84eb44b5f2aaf6889.png)'
- en: 'It does so by:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 它通过以下方式做到这一点：
- en: calculating the gradient (the slope) of the loss function with respect to the
    embeddings and
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算损失函数相对于嵌入的梯度（斜率），
- en: adjusting the embeddings slightly in the opposite direction of the gradient
    to reduce the loss
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过在梯度的相反方向上稍微调整嵌入来减少损失
- en: 'So once gradient descent works its magic, we get new embeddings like so:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一旦梯度下降发挥了作用，我们就会得到新的嵌入，如下所示：
- en: '![](../Images/8802105ea89eb30fbc8a9aac6b6a5c22.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8802105ea89eb30fbc8a9aac6b6a5c22.png)'
- en: Let’s visualize this change. We start with our target embedding (*"hapiness"*)
    and context embedding (*"can", "light"* and *"even"*) in our block.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化这个变化。我们以我们的目标嵌入（*"幸福"*)和上下文嵌入（*"可以"，"光"*和*"甚至"*）在我们的块中开始。
- en: '![](../Images/f855453d5cd9ef9c5ef074ba8e284fa8.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f855453d5cd9ef9c5ef074ba8e284fa8.png)'
- en: 'And after gradient descent, they shift slightly like so:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降后，它们稍微移动了一下，如下所示：
- en: '![](../Images/627dafdd371308a0a8d4367edded6657.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/627dafdd371308a0a8d4367edded6657.png)'
- en: 'This is the REAL magic of this step. We see that automatically:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这一步骤的真正魔力。我们看到自动地：
- en: for the positive pair, the target embedding of*"happiness"* is nudged closer
    to the context embedding of *"can,"* its neighbor
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于正对，目标嵌入“*幸福*”被推向与上下文嵌入“*可以*”更近的位置，其邻居
- en: and for the negative pairs, the target embedding (*"happiness"*) is adjusted
    to move further away from the non-neighboring context embeddings of *"light"*
    and *"even"*
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于负对，目标嵌入（*“幸福”*）被调整以远离非邻近上下文嵌入“*光*”和“*甚至*”
- en: 'Step 5: Repeat steps 2–4'
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤 5：重复步骤 2–4
- en: Now all we have to do is rinse and repeat steps 2- 4 using the next block of
    positive and negative pairs.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们只需要使用下一块的正负对来冲洗并重复步骤 2-4。
- en: Let’s see what this looks like for the second block.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看第二个块看起来是什么样子。
- en: '![](../Images/496cecdec15a76fe8df1441ab12e9eb2.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/496cecdec15a76fe8df1441ab12e9eb2.png)'
- en: 'For these values, we determine the model’s predictions of whether the words
    are neighbors or not by:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些值，我们通过以下方式确定模型对词语是否为邻居的预测：
- en: (1) Taking dot products and passing them through the sigmoid function…
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: （1）计算点积并通过 sigmoid 函数传递...
- en: '![](../Images/d2a49720148b178111d0430b5327cf8d.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d2a49720148b178111d0430b5327cf8d.png)'
- en: '(2) And then using the Log Loss and gradient descent we update the target and
    context embedding values for the words in this block:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: （2）然后使用对数损失和梯度下降来更新这个块中词语的目标和上下文嵌入值：
- en: '![](../Images/f67c16d8b96436cad437eed542e9aa72.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f67c16d8b96436cad437eed542e9aa72.png)'
- en: Again, doing so will nudge the neighboring word embedding closer together and
    dissimilar ones are pushed farther apart.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，这样做会将邻近的词嵌入拉近，而不同的词嵌入会被推开更远。
- en: That’s pretty much it. We just repeat these steps with each block in our training
    data.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 大概就是这样。我们只需重复这些步骤，针对训练数据中的每个块。
- en: '**Sidenote: Going through all blocks in the training dataset once is called
    an epoch. We usually repeat this for 5–20 epochs for a super robust training process.**'
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**旁注：在训练数据集的所有块中通过一次被称为一个周期。我们通常重复 5-20 个周期以获得超级稳健的训练过程。**'
- en: 'By the end of our full training process, we’ll get up with our final target
    and embeddings that look something like this:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 到我们完整训练过程的结束时，我们将得到最终的目标和嵌入，看起来可能像这样：
- en: '![](../Images/63338122dc9b65c61acd1a84ec807993.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/63338122dc9b65c61acd1a84ec807993.png)'
- en: If we get rid of the context embedding, we are left with just the final target
    embeddings.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们去掉上下文嵌入，我们就只剩下最终的目标嵌入。
- en: '![](../Images/0cbbcb9776afbb11e9a104bfcd5a8e14.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0cbbcb9776afbb11e9a104bfcd5a8e14.png)'
- en: '**And these final target embeddings are the word embedding that we were after
    at the beginning!!**'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**而这些最终的目标嵌入正是我们最初追求的词嵌入！！**'
- en: 'SIDENOTE: If needed, the context embeddings could be averaged or combined with
    the target embeddings to create a hybrid representation. However, this is rare
    and not standard practice.'
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 旁注：如果需要，上下文嵌入可以平均或与目标嵌入结合以创建混合表示。然而，这种情况很少见，并不是标准做法。
- en: This happens because the training process refines embeddings based on word relationships.
    Similar words (neighbors) are pulled closer together, while dissimilar words (non-neighbors)
    are pushed apart. While doing so, it also ends up capturing deeper relationships
    between words, including synonyms, analogies, and subtle contextual similarities.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为训练过程根据词关系来细化嵌入。相似词语（邻居）被拉近，而不同词语（非邻居）被推开。在这个过程中，它还捕捉到词语之间的更深层次关系，包括同义词、类比和细微的上下文相似性。
- en: Here, our training data was just a single sentence with 18 words, so the embeddings
    may not seem meaningful. But imagine training on a massive corpus – an entire
    book, a collection of articles, or billions of sentences from the web.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们的训练数据只是一个包含 18 个单词的单句，所以嵌入可能看起来没有意义。但想象一下在庞大的语料库上训练——一整本书、一系列文章或来自网络的数十亿个句子。
- en: And that’s it! That’s how we create word embeddings using Word2Vec, specifically
    the skip-gram method.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！这就是我们如何使用 Word2Vec 创建词嵌入，特别是 skip-gram 方法。
- en: Word2Vec IRL
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Word2Vec 真实应用
- en: Now that we’ve unpacked the mathematical magic behind Word2Vec, let’s bring
    it to life and create our own word embeddings.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经揭开了 Word2Vec 背后的数学魔法，让我们将其变为现实，并创建我们自己的词嵌入。
- en: Use pre-trained word embeddings
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用预训练的词嵌入
- en: The easiest and most efficient way to get started is to use **pre-trained word
    embeddings**. These embeddings are already trained on massive datasets like Google
    News and Wikipedia, so they’re incredibly robust. This means we don’t have to
    start from scratch, saving both time and computational resources.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 开始的最简单和最有效的方法是使用**预训练的词嵌入**。这些嵌入已经在像Google新闻和维基百科这样的大规模数据集上进行了训练，因此它们非常稳健。这意味着我们不必从头开始，这样可以节省时间和计算资源。
- en: We leverage some pre-trained Word2Vec embeddings using **Gensim**, a popular
    Python library for NLP that’s optimized for handling large-scale text processing
    tasks.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们利用一些预训练的Word2Vec嵌入，使用**Gensim**，这是一个流行的Python库，用于NLP，它针对处理大规模文本处理任务进行了优化。
- en: '[PRE0]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let’s look at all available pre-trained Word2Vec models in Gensim:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看Gensim中所有可用的预训练Word2Vec模型：
- en: '[PRE1]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-153
