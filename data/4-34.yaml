- en: How to do Date calculations in DAX
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在DAX中进行日期计算
- en: 原文：[https://towardsdatascience.com/how-to-do-date-calculations-in-dax-95e792f65e5e/](https://towardsdatascience.com/how-to-do-date-calculations-in-dax-95e792f65e5e/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-do-date-calculations-in-dax-95e792f65e5e/](https://towardsdatascience.com/how-to-do-date-calculations-in-dax-95e792f65e5e/)
- en: '*Moving back and forth in time is a common task for Time Intelligence calculations
    in DAX. We have some excellent functions; one of the most useful is DATEADD. Let’s
    take a detailed look at it.*'
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '*在时间智能计算中，在DAX中来回移动时间是常见任务。我们有一些优秀的函数；其中最有用的是DATEADD。让我们详细了解一下它。*'
- en: '![Photo by Towfiqu barbhuiya on Unsplash](../Images/cd398c857285d08a3143094f668d39d0.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![由Towfiqu barbhuiya在Unsplash上的照片](../Images/cd398c857285d08a3143094f668d39d0.png)'
- en: Photo by [Towfiqu barbhuiya](https://unsplash.com/@towfiqu999999?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Towfiqu barbhuiya](https://unsplash.com/@towfiqu999999?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: What is it for?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这是为了什么？
- en: 'I have shown the usefulness of the [DATEADD()](https://dax.guide/dateadd/)
    function in one of my past articles:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的过去的一篇文章中展示了[DATEADD()](https://dax.guide/dateadd/)函数的有用性：
- en: '[**Explore variants of Time Intelligence in DAX**](https://towardsdatascience.com/explore-variants-of-time-intelligence-in-dax-e795545e2a40)'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**探索DAX中时间智能的变体**](https://towardsdatascience.com/explore-variants-of-time-intelligence-in-dax-e795545e2a40)'
- en: But sometimes, we want to do other stuff.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但有时，我们想要做其他事情。
- en: For example, we have a fixed date and want to move it back or forward in time.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们有一个固定的日期，想要将其向前或向后移动时间。
- en: 'If we want to do it for some days, it’s very easy:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们要对几天进行操作，这非常简单：
- en: 'For example, I want to move the date 2025/01/15 10 days into the future:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我想将日期2025/01/15向前移动10天：
- en: '![Figure 1 - Moving a date ten days into the future (Figure by the Author)](../Images/5f339f4dfa2c4269ed9d2943471eb063.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图1 - 将日期向前移动十天（作者提供的图）](../Images/5f339f4dfa2c4269ed9d2943471eb063.png)'
- en: Figure 1 – Moving a date ten days into the future (Figure by the Author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 将日期向前移动十天（作者提供的图）
- en: I must add the curly brackets as EVALUATE expects a table, and these brackets
    create a table from the output of the expression.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须添加花括号，因为EVALUATE期望一个表，这些括号从表达式的输出中创建一个表。
- en: But what when we want to do this for months, quarters, years, or weeks?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但当我们想要对月份、季度、年份或周进行此类操作时怎么办？
- en: Look at some use cases.
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 看一些用例。
- en: The DATEADD() function seems the obvious choice for the function to perform
    such tasks.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: DATEADD()函数似乎是我们执行此类任务的明显选择。
- en: Before working with DAX, I worked with T-SQL for SQL Server. The T-SQL [DATEADD()](https://learn.microsoft.com/en-us/sql/t-sql/functions/dateadd-transact-sql)
    function could be used precisely for this.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用DAX之前，我使用T-SQL为SQL Server工作。T-SQL [DATEADD()](https://learn.microsoft.com/en-us/sql/t-sql/functions/dateadd-transact-sql)函数可以用于此目的。
- en: 'OK, let’s give it a try to go back two months, starting with 2025/01/25:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，让我们试一试将日期回退两个月，从2025/01/25开始：
- en: '![Figure 2 - Error message when we try using DATEADD() with a simple Date variable
    (Figure by the Author)](../Images/b150bda02d038153c29314028ad321a8.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图2 - 尝试使用简单的日期变量与DATEADD()一起使用时出现的错误信息（作者提供的图）](../Images/b150bda02d038153c29314028ad321a8.png)'
- en: Figure 2 – Error message when we try using DATEADD() with a simple Date variable
    (Figure by the Author)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – 尝试使用简单的日期变量与DATEADD()一起使用时出现的错误信息（作者提供的图）
- en: This doesn’t work, as I passed a Date variable. Even though it looks intuitive,
    it doesn’t work.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这不起作用，因为我传递了一个日期变量。尽管它看起来直观，但它不起作用。
- en: The [documentation](https://dax.guide/dateadd/) explains that the first parameter
    must be a column containing dates.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[文档](https://dax.guide/dateadd/)解释说第一个参数必须是一个包含日期的列。'
- en: Therefore, we must persuade the engine to think that we pass a date column to
    the function.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们必须说服引擎认为我们传递了一个日期列给函数。
- en: 'One way to do it is by using [TREATAS()](https://dax.guide/dateadd/):'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '做这件事的一种方法是通过使用[TREATAS()](https://dax.guide/dateadd/):'
- en: '[PRE0]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Notice that we don’t need the curly brackets, as DATEADD() returns a table with
    one column and, in this case, one row.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们不需要花括号，因为DATEADD()返回一个包含一列的表，在这种情况下，只有一行。
- en: 'When executing this query, DATEADD() thinks that it receives a value from the
    [Date] column from the Date table as a parameter and performs the calculation
    as expected:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当执行此查询时，DATEADD()认为它从日期表中的[日期]列接收一个值作为参数，并按预期执行计算：
- en: '![Figure 3 - Using DATEADD() with a fixed date a TREATAS() (Figure by the Author)](../Images/2ab48516a8f169673c341a768b3f906c.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图 3 - 使用 DATEADD() 和 TREATAS() 的固定日期（图由作者提供）](../Images/2ab48516a8f169673c341a768b3f906c.png)'
- en: Figure 3 – Using DATEADD() with a fixed date a TREATAS() (Figure by the Author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3 – 使用 DATEADD() 和 TREATAS() 的固定日期（图由作者提供）
- en: 'Another way to perform this task is by using the Date table and passing the
    Variable with the date as a filter:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种执行此任务的方法是使用日期表并通过传递日期作为过滤器的变量：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The result is the same as before, and there is no notable difference in the
    execution time (Between 7 and 10 ms).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 结果与之前相同，并且在执行时间上没有明显的差异（在 7 到 10 毫秒之间）。
- en: Again, when looking at the documentation on DAX.guide, they use the second approach
    for doing the job.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，当查看 DAX.guide 上的文档时，他们使用第二种方法来完成这项工作。
- en: 'We can change the second expression to get one single value:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将第二个表达式更改为获取一个单一值：
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: These three approaches are almost identical functionally. However, the difference
    is that we can use these two approaches differently.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这三种方法在功能上几乎相同。然而，区别在于我们可以以不同的方式使用这两种方法。
- en: For example, we want to calculate the Online Sale for the day 2 months before
    2025/01/25.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们想要计算 2025/01/25 之前 2 个月的在线销售额。
- en: 'Here is the first approach:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是第一种方法：
- en: '[PRE3]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'And here is the second one:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是第二种方法：
- en: '[PRE4]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The result of the expression is not essential here.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 表达式的结果在这里并不重要。
- en: But do you notice the difference?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但你注意到区别了吗？
- en: The first expression uses DATEADD to get a table aligned with the [Date] column
    of the Date table. I can directly use this table as a Filter in [CALCULATE()](https://dax.guide/calculate/).
    It will follow the filter’s Lineage (the origin) and can be applied directly to
    the Data model.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个表达式使用 DATEADD 来获取与日期表中的 [日期] 列对齐的表。我可以直接将此表用作 [CALCULATE()](https://dax.guide/calculate/)
    中的过滤器。它将遵循过滤器的谱系（起源）并可以直接应用于数据模型。
- en: The second expression generates a single value and loses the lineage to the
    Date table.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个表达式生成一个单一值并失去了与日期表的谱系。
- en: Therefore, we must use the = operator to filter the Date table.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们必须使用 = 运算符来过滤日期表。
- en: Again, both approaches return identical results and are equivalent performance-wise.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，两种方法返回相同的结果，并且在性能上等效。
- en: What about weeks?
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，关于周呢？
- en: Calculating with weeks is not as easy as using DATEADD(), as this function supports
    only Days, Months, Quarters, and Years.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 使用周进行计算并不像使用 DATEADD() 那样简单，因为这个函数只支持天、月、季度和年。
- en: Fortunately, weeks always have 7 days. Therefore, we can move back and forth
    by multiplying 7 days by the number of weeks we want to move the start date.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，周总是有 7 天。因此，我们可以通过将 7 天乘以我们想要移动起始日期的周数来回移动。
- en: 'For example, I want to go back three weeks:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我想回退三周：
- en: '7 x 3 = 21 days: 2025/01/25 to 2025/01/04:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 7 x 3 = 21 天：2025/01/25 到 2025/01/04：
- en: '![Figure 4 - Going back three weeks by subtracting 21 days from the starting
    date (Figure by the Author)](../Images/8a5feadd83726f7b495a947ad412a112.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图 4 - 从起始日期减去 21 天回退三周（图由作者提供）](../Images/8a5feadd83726f7b495a947ad412a112.png)'
- en: Figure 4 – Going back three weeks by subtracting 21 days from the starting date
    (Figure by the Author)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4 – 从起始日期减去 21 天回退三周（图由作者提供）
- en: 'A more elaborate pattern for the same task is this:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 对于同一任务，有一个更复杂的模式：
- en: '[PRE5]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Here, I leverage two columns I commonly add to my Date tables:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我利用了两个我经常添加到我的日期表中的列：
- en: Day of Week
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 星期几
- en: 'WeekIndex: This one counts the number of weeks starting from the week of the
    last data refresh. Today, it’s zero, the week before the current is -1, and the
    week after the current week is 1, etc.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 周索引：这个计数从最后数据刷新的周开始计算周数。今天，它是零，当前周之前是 -1，当前周之后是 1 等。
- en: Now, I can use them to perform a dynamic calculation based on these columns.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我可以用它们根据这些列执行动态计算。
- en: Interestingly, this version of the query’s performance is not slower than before.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，这个查询版本的性能并不比之前慢。
- en: 'The result is still the same:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 结果仍然是相同的：
- en: '![Figure 5 - More complex approach to go back three weeks (Figure by the Author)](../Images/a3ede0e44c05476a87db0bc2098ec93f.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图 5 - 回退三周的更复杂方法（图由作者提供）](../Images/a3ede0e44c05476a87db0bc2098ec93f.png)'
- en: Figure 5 – More complex approach to go back three weeks (Figure by the Author)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5 – 回退三周的更复杂方法（图由作者提供）
- en: But why should I use a more complex approach when subtracting some days lead
    to the same result?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么我需要使用更复杂的方法，当减去一些天数会导致相同的结果时？
- en: Well, it depends on what you want to achieve. I experienced some scenarios where
    a more complex approach leads to more possibilities, and it can be used more generically.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，这取决于你想要实现什么。我经历过一些场景，在这些场景中，更复杂的方法带来了更多的可能性，并且可以更通用地使用。
- en: In this specific case, the first approach works very well.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定情况下，第一种方法非常有效。
- en: Conclusion
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Manipulating dates is one of the main tasks when analyzing or visualizing data.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 操作日期是在分析或可视化数据时的主要任务之一。
- en: The DATEADD() function is a crucial part of the DAX language’s toolset, and
    it’s important to know how it works and how it can be used.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: DATEADD() 函数是 DAX 语言工具集的重要组成部分，了解其工作原理以及如何使用它非常重要。
- en: 'There are three main points with this function:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数有三个主要点：
- en: How the input date-parameter must look like
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入日期参数应该如何看起来
- en: How can I manipulate a date to work with DATEADD()
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我该如何操作日期以与 DATEADD() 函数一起使用
- en: How can I use the output of DATEADD() in Measures
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我该如何在度量中使用 DATEADD() 函数的输出
- en: I tried to show you all of them in this piece. I hope that you found this helpful.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图在这篇文章中展示所有这些方法。我希望你觉得这很有帮助。
- en: I will show you more complex scenarios in an upcoming piece, where using such
    additional columns can save you much time – both development and execution time.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在接下来的文章中展示更多复杂场景，使用这样的附加列可以节省你大量时间——无论是开发时间还是执行时间。
- en: In the meantime, you can start incorporating these techniques into your work.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，你可以开始将这些技术应用到你的工作中。
