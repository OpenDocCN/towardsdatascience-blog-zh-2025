- en: 'You can find more information about my date-table here:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里找到更多关于我的日期表的信息：
- en: '[**3 Ways to Improve your reporting with an expanded date table**](https://towardsdatascience.com/3-ways-to-improve-your-reporting-with-an-expanded-date-table-2d983d76cced)'
  id: totrans-85
