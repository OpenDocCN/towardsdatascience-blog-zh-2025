  type: TYPE_NORMAL
  zh: '[**使用扩展的日期表改进报告的 3 种方法**](https://towardsdatascience.com/3-ways-to-improve-your-reporting-with-an-expanded-date-table-2d983d76cced)'
- en: 'Read this piece to learn how to extract performance data in DAX-Studio and
    how to interpret it:'
  id: totrans-86
