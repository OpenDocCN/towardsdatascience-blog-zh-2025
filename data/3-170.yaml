- en: 'Essential Review Papers on Physics-Informed Neural Networks: A Curated Guide
    for Practitioners'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 物理信息神经网络：必备综述论文集：实践者的精选指南
- en: 原文：[https://towardsdatascience.com/essential-review-papers-on-physics-informed-neural-networks-a-curated-guide-for-practitioners/](https://towardsdatascience.com/essential-review-papers-on-physics-informed-neural-networks-a-curated-guide-for-practitioners/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/essential-review-papers-on-physics-informed-neural-networks-a-curated-guide-for-practitioners/](https://towardsdatascience.com/essential-review-papers-on-physics-informed-neural-networks-a-curated-guide-for-practitioners/)
- en: Staying on top of a fast-growing research field is never easy.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪快速发展的研究领域从来都不容易。
- en: 'I face this challenge firsthand as a practitioner in Physics-Informed Neural
    Networks (PINNs). New papers, be they algorithmic advancements or cutting-edge
    applications, are published at an accelerating pace by both academia and industry.
    While it is exciting to see this rapid development, it inevitably raises a pressing
    question:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作为物理信息神经网络（PINNs）的实践者，我亲自面临这个挑战。无论是算法进步还是尖端应用，学术界和工业界都以越来越快的速度发表新论文。虽然看到这种快速发展令人兴奋，但它不可避免地提出了一个紧迫的问题：
- en: '*How can one stay informed without spending countless hours sifting through
    papers?*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*如何在不花费无数小时筛选论文的情况下保持信息更新？*'
- en: This is where I have found review papers to be exceptionally valuable. Good
    review papers are effective tools that distill essential insights and highlight
    important trends. They are big-time savers guiding us through the flood of information.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我发现综述论文特别有价值的地方。好的综述论文是有效的工具，可以提炼出关键见解并突出重要趋势。它们是节省大量时间的指南，引导我们穿越信息洪流。
- en: In this blog post, I would like to share with you my **personal, curated list
    of must-read review papers on PINNs**, that are especially influential for my
    own understanding and use of PINNs. Those papers cover key aspects of PINNs, including
    algorithmic developments, implementation best practices, and real-world applications.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我想与你分享我**个人精选的PINNs必备综述论文列表**，这些论文对我的PINNs理解和应用特别有影响力。这些论文涵盖了PINNs的关键方面，包括算法发展、实施最佳实践和现实世界应用。
- en: In addition to what’s available in existing literature, I’ve included one of
    my own review papers, which provides a comprehensive analysis of **common functional
    usage patterns of PINNs** — a practical perspective often missing from academic
    reviews. This analysis is based on my review of around 200 arXiv papers on PINNs
    across various engineering domains in the past 3 years and can serve as an essential
    guide for practitioners looking to deploy these techniques to tackle real-world
    challenges.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 除了现有文献中可用的内容之外，我还包括了我自己的一篇综述论文，它对**PINNs的常见功能使用模式**进行了全面分析——这是学术评论中经常缺失的实用视角。这项分析基于我对过去三年中约200篇关于PINNs的arXiv论文的回顾，涵盖了各种工程领域的应用，可以作为希望将这些技术部署来解决现实世界挑战的实践者的必备指南。
- en: For each review paper, I will explain why it deserves your attention by explaining
    its unique perspective and indicating practical takeaways that you can benefit
    from immediately.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一篇综述论文，我将通过解释其独特的视角和指出你可以立即从中受益的实用要点来解释为什么它值得你的关注。
- en: Whether you’re just getting started with PINNs, using them to tackle real-world
    problems, or exploring new research directions, I hope this collection makes navigating
    the busy field of PINN research easier for you.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是刚开始接触PINNs，使用它们来解决实际问题，还是探索新的研究方向，我希望这个精选集能让你在PINNs研究繁忙的领域中更容易地导航。
- en: Let’s cut through the complexity together and focus on what truly matters.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们共同简化复杂性，关注真正重要的事情。
- en: '1️⃣ Scientific Machine Learning through Physics-Informed Neural Networks: Where
    we are and what’s next'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1️⃣ 通过物理信息神经网络进行科学机器学习：我们现在在哪里以及下一步是什么
- en: 📄 Paper at a glance
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📄 简要概述
- en: 🔍 What it covers
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔍 涵盖内容
- en: '**Authors**: S. Cuomo, V. Schiano di Cola, F. Giampaolo, G. Rozza, M. Raissi,
    and F. Piccialli'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**作者**：S. Cuomo, V. Schiano di Cola, F. Giampaolo, G. Rozza, M. Raissi, and
    F. Piccialli'
- en: '**Year**: 2022'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**年份**：2022'
- en: '**Link**: [arXiv](https://arxiv.org/abs/2201.05624)'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链接**：[arXiv](https://arxiv.org/abs/2201.05624)'
- en: 'This review is structured around key themes in PINNs: the fundamental components
    that define their architecture, theoretical aspects of their learning process,
    and their application to various computing challenges in engineering. The paper
    also explores the available toolsets, emerging trends, and future directions.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇综述围绕PINNs的关键主题构建：定义其架构的基本组件、学习过程的理论方面以及它们在工程计算挑战中的应用。论文还探讨了可用的工具集、新兴趋势和未来方向。
- en: '![](../Images/dfeeca76deca0f7b3224e0471fa9e010.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dfeeca76deca0f7b3224e0471fa9e010.png)'
- en: 'Fig 1\. Overview of the #1 review paper. (Image by author)'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '图 1\. #1 综述论文概述。（作者提供图片）'
- en: ✨ What’s unique
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✨ 独特之处
- en: 'This review paper stands out in the following ways:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇综述论文在以下方面脱颖而出：
- en: '**One of the best introductions to PINN fundamentals**. This paper takes a
    well-paced approach to explaining PINNs from the ground up. *Section 2* systematically
    dissects the building blocks of a PINN, covering various underlying neural network
    architectures and their associated characteristics, how PDE constraints are incorporated,
    common training methodologies, and learning theory (convergence, error analysis,
    etc.) of PINNs.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PNN 基础知识的最佳入门之一**。本文以稳健的节奏从基础开始解释 PNN，*第 2 节* 系统地剖析了 PNN 的构建块，包括各种底层神经网络架构及其相关特性、如何融入偏微分方程约束、常见的训练方法以及
    PNN 的学习理论（收敛性、误差分析等）。'
- en: '**Putting PINNs in historical context**. Rather than simply presenting PINNs
    as a standalone solution, the paper traces their development from earlier work
    on using deep learning to solve differential equations. This historical framing
    is valuable because it helps demystify PINNs by showing that they are an evolution
    of previous ideas, and it makes it easier for practitioners to see what alternatives
    are available.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将 PNN 放入历史背景中**。本文不是简单地将 PNN 作为一种独立的解决方案来介绍，而是追溯了其从早期使用深度学习求解微分方程的工作中的发展。这种历史框架很有价值，因为它通过显示
    PNN 是先前想法的演变，有助于消除 PNN 的神秘感，并使从业者更容易看到可用的替代方案。'
- en: '**Equation-driven organization**. Instead of just classifying PINN research
    by scientific domains (e.g., geoscience, material science, etc.) as many other
    reviews do, this paper categorizes PINNs based on the types of differential equations
    (e.g., diffusion problems, advection problems, etc.) they solve. This *equation-first
    perspective* encourages knowledge transfer as the same set of PDEs could be used
    across multiple scientific domains. In addition, it makes it easier for practitioners
    to see the strengths and weaknesses of PINNs when dealing with different types
    of differential equations.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以方程为中心的组织**。与许多其他综述不同，本文不是按科学领域（例如，地球科学、材料科学等）对 PNN 研究进行分类，而是根据它们解决的微分方程类型（例如，扩散问题、对流问题等）对
    PNN 进行分类。这种*方程优先的视角*鼓励知识转移，因为同一组偏微分方程可以跨越多个科学领域使用。此外，它使从业者更容易看到处理不同类型的微分方程时 PNN
    的优势和劣势。'
- en: 🛠 Practical goodies
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🛠 实用技巧
- en: 'Beyond its theoretical insights, this review paper offers immediately useful
    resources for practitioners:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 除了其理论洞察力之外，这篇综述论文还为从业者提供了立即有用的资源：
- en: '**A complete implementation example**. In *section 3.4*, this paper walks through
    a full PINN implementation to solve a 1D Nonlinear Schrödinger equation. It covers
    translating equations into PINN formulations, handling boundary and initial conditions,
    defining neural network architectures, choosing training strategies, selecting
    collocation points, and applying optimization methods. All implementation details
    are clearly documented for easy reproducibility. The paper compares PINN performance
    by varying different hyperparameters, which could offer immediately applicable
    insights for your own PINN experiments.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完整的实现示例**。在 *第 3.4 节*，本文详细介绍了如何使用 PNN 解决一维非线性薛定谔方程的完整实现。它涵盖了将方程转换为 PNN 公式、处理边界和初始条件、定义神经网络架构、选择训练策略、选择配置点和应用优化方法。所有实现细节都进行了清晰的文档记录，以便于轻松复现。本文通过改变不同的超参数来比较
    PNN 的性能，这可以为你的 PNN 实验提供立即可应用的见解。'
- en: '**Available frameworks and software tools**. *Table 3* compiles a comprehensive
    list of major PINN toolkits, with detailed tool descriptions provided in *section
    4.3*. The considered backends include not only Tensorflow and PyTorch but also
    Julia and Jax. This side-by-side comparison of different frameworks is especially
    useful for picking the right tool for your needs.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可用的框架和软件工具**。*表 3* 汇编了一个全面的 PNN 工具包列表，其中在第 4.3 节中提供了详细的工具描述。考虑的后端不仅包括 Tensorflow
    和 PyTorch，还包括 Julia 和 Jax。这种不同框架的并列比较对于选择满足你需求正确的工具特别有用。'
- en: 💡Who would benefit
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 受益人群
- en: This review paper benefits **anyone new to PINNs** and looking for a clear,
    structured introduction.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这篇综述论文对任何刚开始接触 PNN 并寻求清晰、结构化介绍的人来说都大有裨益。
- en: '**Engineers and developers** looking for practical implementation guidance
    would find the realistic, hands-on demo, and the thorough comparison of existing
    PINN frameworks most interesting. Additionally, they can find relevant prior work
    on differential equations similar to their current problem, which offers insights
    they can leverage in their own problem-solving.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工程师和开发者**寻找实际实施指导的人会发现现实、实用的演示以及现有PINN框架的全面比较最有兴趣。此外，他们还可以找到与当前问题类似微分方程的相关先前工作，这为他们自己的问题解决提供了可以利用的见解。'
- en: '**Researchers** investigating theoretical aspects of PINN convergence, optimization,
    or efficiency can also greatly benefit from this paper.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究人员**在研究PINN收敛、优化或效率的理论方面也可以从这篇论文中受益良多。'
- en: '2️⃣ From PINNs to PIKANs: Recent Advances in Physics-Informed Machine Learning'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2️⃣ 从PINNs到PIKANs：物理信息机器学习的最新进展
- en: 📄 Paper at a glance
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📄 概览论文
- en: '**Authors**: J. D. Toscano, V. Oommen, A. J. Varghese, Z. Zou, N. A. Daryakenari,
    C. Wu, and G. E. Karniadakis'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**作者**：J. D. Toscano, V. Oommen, A. J. Varghese, Z. Zou, N. A. Daryakenari,
    C. Wu, 和 G. E. Karniadakis'
- en: '**Year**: 2024'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**年份**：2024'
- en: '**Link**: [arXiv](https://arxiv.org/abs/2410.13228)'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链接**：[arXiv](https://arxiv.org/abs/2410.13228)'
- en: 🔍 What it covers
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔍 涵盖内容
- en: This paper provides one of the *most up-to-date* overviews of the latest advancements
    in PINNs. It emphasises enhancements in network design, feature expansion, optimization
    strategies, uncertainty quantification, and theoretical insights. The paper also
    surveys key applications across a range of domains.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇论文提供了对PINNs最新进展的*最新*概述。它强调了网络设计、特征扩展、优化策略、不确定性量化以及理论洞察力的改进。论文还概述了跨多个领域的关键应用。
- en: '![](../Images/b709d141f6962dc91bdfac3c75fe74dd.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b709d141f6962dc91bdfac3c75fe74dd.png)'
- en: 'Fig 2\. Overview of the #2 review paper. (Image by author)'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '图2. #2综述论文概述。（图片由作者提供）'
- en: ✨ What’s unique
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✨ 独特之处
- en: 'This review paper stands out in the following ways:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇综述论文在以下方面脱颖而出：
- en: '**A structured taxonomy of algorithmic developments**. One of the most fresh
    contributions of this paper is its taxonomy of algorithmic advancements. This
    new taxonomy scheme elegantly categorizes all the advancements into three core
    areas: (1) *representation model*, (2) *handling governing equations*, and (3)
    *optimization process*. This structure provides a clear framework for understanding
    both current developments and potential directions for future research. In addition,
    the illustrations used in the paper are top-notch and easily digestible.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**算法发展的结构化分类法**。本文最引人注目的贡献之一是其算法进步的分类法。这个新的分类方案巧妙地将所有进步分为三个核心领域：(1) *表示模型*，(2)
    *处理控制方程*，和(3) *优化过程*。这种结构为理解当前的发展以及未来研究的潜在方向提供了一个清晰的框架。此外，论文中使用的插图质量上乘，易于理解。'
- en: '![](../Images/76f8dbd9a96bf2a1bd8f2e87ac19db6e.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/76f8dbd9a96bf2a1bd8f2e87ac19db6e.png)'
- en: 'Fig 3\. The taxonomy of algorithmic developments in PINNs proposed by the #2
    paper. (Image by author)'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '图3. #2论文提出的PINNs算法发展分类法。（图片由作者提供）'
- en: '**Spotlight on physics-informed Kolmogorov–Arnold Networks (KAN)**. KAN, a
    new architecture based on the Kolmogorov–Arnold representation theorem, is currently
    a hot topic in deep learning. In the PINN community, some work has already been
    done to replace the multilayer perceptions (MLP) representation with KANs to gain
    more expressiveness and training efficiency. The community lacks a comprehensive
    review of this new line of research. This review paper (*section 3.1*) exactly
    fills in the gap.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聚焦于物理信息Kolmogorov–Arnold网络（KAN）**。基于Kolmogorov–Arnold表示定理的新架构KAN，目前在深度学习中是一个热门话题。在PINN社区中，一些工作已经完成，用KANs替换多层感知器（MLP）表示，以获得更多的表达能力和训练效率。社区缺乏对这个新研究方向的综合回顾。这篇综述论文（第3.1节）正好填补了这个空白。'
- en: '**Review on uncertainty quantification (UQ) in PINNs**. UQ is essential for
    the reliable and trustworthy deployment of PINNs when tackling real-world engineering
    applications. In *section 5*, this paper provides a dedicated section on UQ, explaining
    the common sources of uncertainty in solving differential equations with PINNs
    and reviewing strategies for quantifying prediction confidence.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对PINNs中不确定性量化（UQ）的评论**。UQ对于处理实际工程应用中的PINNs至关重要。在*第5节*中，本文提供了一个关于UQ的专门部分，解释了解决微分方程时PINNs中不确定性的常见来源，并回顾了量化预测置信度的策略。'
- en: '**Theoretical advances in PINN training dynamics**. In practice, training PINNs
    is non-trivial. Practitioners are often puzzled by why PINNs training sometimes
    fail, or how they should be trained optimally. In *section 6.2*, this paper provides
    one of the most detailed and up-to-date discussions on this aspect, covering the
    Neural Tangent Kernel (NTK) analysis of PINNs, information bottleneck theory,
    and multi-objective optimization challenges.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PINN训练动态的理论进展**。在实践中，训练PINNs并非易事。从业者常常困惑于为什么PINNs的训练有时会失败，或者应该如何最优地训练。在*第6.2节*中，本文提供了关于这一方面的最详细和最新的讨论，涵盖了PINNs的神经切线核(NTK)分析、信息瓶颈理论和多目标优化挑战。'
- en: 🛠 Practical goodies
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🛠 实用技巧
- en: 'Even though this review paper leans towards the theory-heavy side, two particularly
    valuable aspects stand out from a practical perspective:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这篇综述论文偏向于理论，但从实际角度来看，有两个特别有价值的方面脱颖而出：
- en: '**A timeline of algorithmic advances in PINNs**. In *Appendix A Table*, this
    paper tracks the milestones of key advancements in PINNs, from the original PINN
    formulation to the most recent extensions to KANs. If you’re working on algorithmic
    improvements, this timeline gives you a clear view of what’s already been done.
    If you’re struggling with PINN training or accuracy, you can use this table to
    find existing methods that might solve your issue.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PINNs算法进展的时间线**。在*附录A表格*中，本文追踪了PINNs关键进展的里程碑，从最初的PINN公式到最新的KAN扩展。如果你在算法改进方面工作，这个时间线为你提供了一个清晰的视图，了解已经做了什么。如果你在PINN训练或准确性方面遇到困难，你可以使用这个表格来找到可能解决你问题的现有方法。'
- en: '**A broad overview of PINN applications across domains**. Compared to all the
    other reviews, this paper strives to give the *most comprehensive and updated
    coverage* of PINN applications in not only the engineering domains but also other
    less-covered fields such as finance. Practitioners can easily find prior works
    conducted in their domains and draw inspiration.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨领域PINN应用的广泛概述**。与所有其他综述相比，本文力求提供对PINN应用的最全面和最新的覆盖，不仅包括工程领域，还包括其他较少涉及的领域，如金融。从业者可以轻松找到他们领域内已完成的工作，并从中获得灵感。'
- en: 💡Who would benefit
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 受益者
- en: For **practitioners** working in safety-critical fields that need confidence
    intervals or reliability estimates on their PINN predictions, the discussion on
    UQ would be useful. If you are struggling with PINN training instability, slow
    convergence, or unexpected failures, the discussion on PINN training dynamics
    can help unpack the theoretical reasons behind these issues.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于在需要对其PINN预测的置信区间或可靠性估计的安全关键领域工作的**从业者**，关于UQ的讨论将是有用的。如果你在PINN训练不稳定、收敛缓慢或意外失败方面遇到困难，关于PINN训练动态的讨论可以帮助你理解这些问题的理论原因。
- en: '**Researchers** may find this paper especially interesting because of the new
    taxonomy, which allows them to see patterns and identify gaps and opportunities
    for novel contributions. In addition, the review of cutting-edge work on PI-KAN
    can also be inspiring.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究人员**可能会因为新的分类法而特别感兴趣，这使他们能够看到模式，并识别出新颖贡献的差距和机会。此外，对PI-KAN前沿工作的回顾也可能很有启发性。'
- en: '3️⃣ Physics-Informed Neural Networks: An Application-Centric Guide'
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3️⃣ 物理信息神经网络：以应用为中心的指南
- en: 📄 Paper at a glance
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📄 概览
- en: '**Authors**: S. Guo (this author)'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**作者**：S. Guo（本文作者）'
- en: '**Year**: 2024'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**年份**：2024'
- en: '**Link**: [Medium](https://medium.com/towards-data-science/physics-informed-neural-networks-an-application-centric-guide-dc1013526b02?sk=b40ab4e08c2c93034161da8e9be72e30)'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链接**：[Medium](https://medium.com/towards-data-science/physics-informed-neural-networks-an-application-centric-guide-dc1013526b02?sk=b40ab4e08c2c93034161da8e9be72e30)'
- en: 🔍 What it covers
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔍 涵盖内容
- en: This article reviews how PINNs are used to tackle different types of engineering
    tasks. For each task category, the article discusses the problem statement, why
    PINNs are useful, how PINNs can be implemented to address the problem, and is
    followed by a concrete use case published in the literature.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 本文回顾了如何使用PINNs来解决不同类型的工程任务。对于每个任务类别，文章讨论了问题陈述、为什么PINNs是有用的、如何实现PINNs以解决问题，并随后是文献中发表的特定用例。
- en: '![](../Images/043caa96b612fb6b8af69f44f5c56f43.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/043caa96b612fb6b8af69f44f5c56f43.png)'
- en: 'Fig 4\. Overview of the #3 review paper. (Image by author)'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 第3篇综述论文概述。（图片由作者提供）
- en: ✨ What’s unique
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✨ 独特之处
- en: 'Unlike most reviews that categorize PINN applications either based on the type
    of differential equations solved or specific engineering domains, this article
    picks an angle that practitioners care about the most: the **engineering tasks**
    solved by PINNs. This work is based on reviewing papers on PINN case studies scattered
    in various engineering domains. The outcome is a list of distilled recurring functional
    usage patterns of PINNs:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 与大多数基于解决微分方程的类型或特定工程领域对PINN应用进行分类的综述不同，本文选取了一个实践者最关心的角度：PINNs解决的**工程任务**。这项工作基于对散布在各种工程领域的PINN案例研究论文的回顾。结果是PINNs的提炼出的重复功能使用模式列表：
- en: '**Predictive modeling and simulations**, where PINNs are leveraged for dynamical
    system forecasting, coupled system modeling, and surrogate modeling.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测建模和模拟**，其中PINNs被用于动态系统预测、耦合系统建模和代理建模。'
- en: '**Optimization**, where PINNs are commonly employed to achieve efficient design
    optimization, inverse design, model predictive control, and optimized sensor placement.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化**，其中PINNs通常被用于实现高效的设计优化、逆向设计、模型预测控制和优化传感器放置。'
- en: '**Data-driven insights**, where PINNs are used to identify the unknown parameters
    or functional forms of the system, as well as to assimilate observational data
    to better estimate the system states.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据驱动洞察**，其中PINNs用于识别系统的未知参数或函数形式，以及将观测数据同化以更好地估计系统状态。'
- en: '**Data-driven enhancement**, where PINNs are used to reconstruct the field
    and enhance the resolution of the observational data.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据驱动增强**，其中PINNs用于重建场并增强观测数据的分辨率。'
- en: '**Monitoring, diagnostic, and health assessment**, where PINNs are leveraged
    to act as virtual sensors, anomaly detectors, health monitors, and predictive
    maintainers.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监测、诊断和健康评估**，其中PINNs被利用作为虚拟传感器、异常检测器、健康监控器和预测维护者。'
- en: 🛠 Practical goodies
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🛠实用好物
- en: 'This article places practitioners’ needs at the forefront. While most existing
    review papers merely answer the question, “*Has PINN been used in my field?*”,
    practitioners often seek more specific guidance: “*Has PINN been used for the
    type of problem I’m trying to solve?*”. This is precisely what this article tries
    to address.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将实践者的需求放在首位。虽然大多数现有的综述论文仅仅回答了“*PINN在我的领域被使用过吗？*”的问题，但实践者通常寻求更具体的指导：“*PINN被用于我试图解决的问题类型吗？*”。这正是本文试图解决的问题。
- en: By using the proposed five-category functional classification, practitioners
    can conveniently map their problems to these categories, see how others have solved
    them, and what worked and what did not. Instead of reinventing the wheel, practitioners
    can leverage established use cases and adapt proven solutions to their own problems.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用提出的五类功能分类，实践者可以方便地将他们的问题映射到这些类别，了解其他人是如何解决它们的，以及什么有效什么无效。无需重新发明轮子，实践者可以利用既定的用例，并将经过验证的解决方案适应到他们自己的问题上。
- en: 💡Who would benefit
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡受益者是谁
- en: This review is best for practitioners who want to see how PINNs are actually
    being used in the real world. It can also be particularly valuable for cross-disciplinary
    innovation, as practitioners can learn from solutions developed in other fields.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇综述最适合那些想了解PINNs在现实世界中实际应用情况的实践者。它对于跨学科创新也特别有价值，因为实践者可以从其他领域开发的解决方案中学习。
- en: 4️⃣ An Expert’s Guide to Training Physics-informed Neural Networks
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4️⃣ 物理信息神经网络训练专家指南
- en: 📄 Paper at a glance
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📄快速浏览论文
- en: '**Authors**: S. Wang, S. Sankaran, H. Wang, P. Perdikaris'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**作者**：S. Wang, S. Sankaran, H. Wang, P. Perdikaris'
- en: '**Year**: 2023'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**年份**：2023'
- en: '**Link**: [arXiv](https://arxiv.org/abs/2308.08468)'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链接**：[arXiv](https://arxiv.org/abs/2308.08468)'
- en: 🔍 What it covers
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔍涵盖内容
- en: Even though it doesn’t market itself as a “standard” review, this paper goes
    all in on providing a comprehensive handbook for training PINNs. It presents a
    detailed set of best practices for training physics-informed neural networks (PINNs),
    addressing issues like spectral bias, unbalanced loss terms, and causality violations.
    It also introduces challenging benchmarks and extensive ablation studies to demonstrate
    these methods.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这篇文章没有将自己宣传为“标准”综述，但它全面地提供了一本关于训练PINNs的综合手册。它提出了一套详细的最佳实践，用于训练物理信息神经网络（PINNs），解决诸如频谱偏差、不平衡损失项和因果关系违反等问题。它还介绍了具有挑战性的基准和广泛的消融研究来展示这些方法。
- en: '![](../Images/b0d8fdc0e6333fed3bed4d1fc40154fc.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b0d8fdc0e6333fed3bed4d1fc40154fc.png)'
- en: 'Fig 5\. Overview of the #4 review paper. (Image by author)'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '图5. #4综述论文概述。（图片由作者提供）'
- en: ✨ What’s unique
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✨独特之处
- en: '**A unified “expert’s guide”**. The main authors are active researchers in
    PINNs, working extensively on improving PINN training efficiency and model accuracy
    for the past years. This paper is a distilled summary of the authors’ past work,
    synthesizing a broad range of recent PINN techniques (e.g., Fourier feature embeddings,
    adaptive loss weighting, causal training) into a cohesive training pipeline. This
    feels like having a mentor who tells you exactly what does and doesn’t work with
    PINNs.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统一的“专家指南”**. 主要作者是在PINNs领域活跃的研究人员，过去几年一直在广泛研究提高PINN训练效率和模型精度。这篇论文是作者过去工作的提炼总结，将一系列最新的PINN技术（例如，傅里叶特征嵌入、自适应损失加权、因果训练）综合成一个连贯的训练流程。这感觉就像有一个导师，会告诉你PINNs中哪些方法有效，哪些无效。'
- en: '**A thorough hyperparameter tuning study**. This paper conducts various experiments
    to show how different tweaks (e.g., different architectures, training schemes,
    etc.) play out on different PDE tasks. Their ablation studies show precisely which
    methods move the needle, and by how much.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全面的超参数调整研究**. 这篇论文进行了各种实验，展示了不同的调整（例如，不同的架构、训练方案等）在不同PDE任务上的表现。他们的消融研究精确地显示了哪些方法有效，以及效果如何。'
- en: '**PDE benchmarks**. The paper compiles a suite of challenging PDE benchmarks
    and offers state-of-the-art results that PINNs can achieve.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏微分方程（PDE）基准**. 论文汇编了一套具有挑战性的PDE基准，并提供了PINNs可以达到的最先进结果。'
- en: 🛠 Practical goodies
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🛠实用资源
- en: '**A problem-solution cheat sheet**. This paper thoroughly documents various
    techniques addressing common PINN training pain-points. Each technique is clearly
    presented using a structured format: the why (motivation), how (how the approach
    addresses the problem), and what (the implementation details). This makes it very
    easy for practitioners to identify the “cure” based on the “symptoms” observed
    in their PINN training process. What’s great is that the authors transparently
    discussed potential pitfalls of each approach, allowing practitioners to make
    well-informed decisions and effective trade-offs.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题-解决方案速查表**. 这篇论文详细记录了各种解决常见PINN训练痛点的技术。每个技术都使用结构化格式清晰地展示：为什么（动机）、如何（该方法如何解决问题）以及什么（实现细节）。这使得实践者根据在PINN训练过程中观察到的“症状”轻松识别“治疗方法”。令人高兴的是，作者透明地讨论了每种方法的潜在陷阱，使实践者能够做出明智的决定和有效的权衡。'
- en: '**Empirical insights**. The paper shares valuable empirical insights obtained
    from extensive hyperparameter tuning experiments. It offers practical guidance
    on choosing suitable hyperparameters, e.g., network architectures and learning
    rate schedules, and demonstrates how these parameters interact with the advanced
    PINN training techniques proposed.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**经验洞察**. 这篇论文分享了从广泛的超参数调整实验中获得的有价值的经验洞察。它提供了选择合适超参数的实用指导，例如网络架构和学习率调度，并展示了这些参数如何与提出的先进PINN训练技术相互作用。'
- en: '**Ready-to-use library**. The paper is accompanied by an optimized JAX library
    that practitioners can directly adopt or customize. The library supports multi-GPU
    environments and is ready for scaling to large-scale problems.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现成库**. 论文附带了一个优化的JAX库，实践者可以直接采用或定制。该库支持多GPU环境，并已准备好扩展到大规模问题。'
- en: 💡Who would benefit
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡受益人群
- en: '**Practitioners** who are struggling with unstable or slow PINN training can
    find many practical strategies to fix common pathologies. They can also benefit
    from the straightforward templates (in JAX) to quickly adapt PINNs to their own
    PDE setups.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实践者**在处理不稳定或缓慢的PINN训练时，可以找到许多实用的策略来解决常见的病理问题。他们还可以从直接模板（在JAX中）中受益，以快速将PINNs适应到自己的PDE设置中。'
- en: '**Researchers** looking for challenging benchmark problems and aiming to benchmark
    new PINN ideas against well-documented baselines will find this paper especially
    handy.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究人员**寻找具有挑战性的基准问题，并旨在将新的PINN想法与经过良好记录的基线进行基准测试的人会发现这篇论文特别有用。'
- en: 5️⃣ Domain-Specific Review Papers
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5️⃣特定领域的综述论文
- en: Beyond general reviews in PINNs, there are several nice review papers that focus
    on specific scientific and engineering domains. If you’re working in one of these
    fields, these reviews could provide a deeper dive into best practices and cutting-edge
    applications.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 除了PINNs的一般性综述之外，还有一些优秀的综述论文专注于特定的科学和工程领域。如果你在这些领域工作，这些综述可以提供对最佳实践和尖端应用的更深入了解。
- en: 1\. Heat Transfer Problems
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 热传递问题
- en: 'Paper: [Physics-Informed Neural Networks for Heat Transfer Problems](https://www.researchgate.net/publication/350146453_Physics-Informed_Neural_Networks_PINNs_for_Heat_Transfer_Problems)'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 论文：[用于传热问题的物理信息神经网络](https://www.researchgate.net/publication/350146453_Physics-Informed_Neural_Networks_PINNs_for_Heat_Transfer_Problems)
- en: The paper provides anapplication-centric discussion on how PINNs can be used
    to tackle various thermal engineering problems, including inverse heat transfer,
    convection-dominated flows, and phase-change modeling. It highlights real-world
    challenges such as missing boundary conditions, sensor-driven inverse problems,
    and adaptive cooling system design. The industrial case study related to power
    electronics is particularly insightful for understanding the usage of PINNs in
    practice.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 论文提供了一种以应用为中心的讨论，说明PINNs如何用于解决各种热工程问题，包括逆传热、对流主导流动和相变建模。它突出了现实世界的挑战，如缺失边界条件、传感器驱动的逆问题和自适应冷却系统设计。与电力电子相关的工业案例研究对于理解PINNs在实际中的应用特别有洞察力。
- en: 2\. Power Systems
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 电力系统
- en: 'Paper: [Applications of Physics-Informed Neural Networks in Power Systems — A
    Review](https://ieeexplore.ieee.org/document/9743327)'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 论文：[物理信息神经网络在电力系统中的应用综述](https://ieeexplore.ieee.org/document/9743327)
- en: This paper offers a structured overview of how PINNs are applied to critical
    power grid challenges, including state/parameter estimation, dynamic analysis,
    power flow calculation, optimal power flow (OPF), anomaly detection, and model
    synthesis. For each type of application, the paper discusses the shortcomings
    of traditional power system solutions and explains why PINNs could be advantageous
    in addressing those shortcomings. This comparative summary is useful for understanding
    the motivation for adopting PINNs.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 本文提供了一个结构化的概述，说明了PINNs如何应用于关键电力系统挑战，包括状态/参数估计、动态分析、电力流计算、最优电力流（OPF）、异常检测和模型合成。对于每种应用类型，本文讨论了传统电力系统解决方案的不足，并解释了为什么PINNs在解决这些不足方面可能具有优势。这个比较总结有助于理解采用PINNs的动机。
- en: 3\. Fluid Mechanics
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 流体力学
- en: 'Paper: [Physics-informed neural networks (PINNs) for fluid mechanics: A review](https://arxiv.org/abs/2105.09506)'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 论文：[物理信息神经网络在流体力学中的应用：综述](https://arxiv.org/abs/2105.09506)
- en: 'This paper explored three detailed case studies that demonstrate PINNs application
    in fluid dynamics: (1) 3D wake flow reconstruction using sparse 2D velocity data,
    (2) inverse problems in compressible flow (e.g., shock wave prediction with minimal
    boundary data), and (3) biomedical flow modeling, where PINNs infer thrombus material
    properties from phase-field data. The paper highlights how PINNs overcome limitations
    in traditional CFD, e.g., mesh dependency, expensive data assimilation, and difficulty
    handling ill-posed inverse problems.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 本文探讨了三个详细的案例研究，展示了PINNs在流体动力学中的应用：(1) 使用稀疏二维速度数据重建3D尾流流动，(2) 可压缩流动中的逆问题（例如，使用最小边界数据预测激波），以及(3)
    生物医学流动建模，其中PINNs从相场数据中推断血栓材料属性。本文突出了PINNs如何克服传统CFD的局限性，例如网格依赖性、昂贵的数据同化以及处理病态逆问题的困难。
- en: 4\. Additive Manufacturing
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 添加制造
- en: 'Paper: [A review on physics-informed machine learning for monitoring metal
    additive manufacturing process](https://www.researchgate.net/publication/381368027_A_review_on_physics-informed_machine_learning_for_monitoring_metal_additive_manufacturing_process)'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 论文：[关于监测金属增材制造过程的物理信息机器学习的综述](https://www.researchgate.net/publication/381368027_A_review_on_physics-informed_machine_learning_for_monitoring_metal_additive_manufacturing_process)
- en: This paper examines how PINNs address critical challenges specific to additive
    manufacturing process prediction or monitoring, including temperature field prediction,
    fluid dynamics modeling, fatigue life estimation, accelerated finite element simulations,
    and process characteristics prediction.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 本文探讨了PINNs如何解决特定于增材制造过程预测或监测的关键挑战，包括温度场预测、流体动力学建模、疲劳寿命估计、加速有限元模拟和过程特性预测。
- en: 6️⃣ Conclusion
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6️⃣ 结论
- en: In this blog post, we went through a curated list of review papers on PINNs,
    covering fundamental theoretical insights, the latest algorithmic advancements,
    and practical application-oriented perspectives. For each paper, we highlighted
    unique contributions, key takeaways, and the audience that would benefit the most
    from these insights. I hope this curated collection can help you better navigate
    the evolving field of PINNs.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我们回顾了一系列关于PINNs的综述论文，涵盖了基本理论洞察、最新的算法进展以及面向实际应用的视角。对于每一篇论文，我们都突出了其独特的贡献、关键要点以及从这些洞察中受益最大的受众。我希望这个精选集合能帮助您更好地导航PINNs这一不断发展的领域。
