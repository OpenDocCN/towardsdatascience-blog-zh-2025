- en: How Your Prompts Lead AI Astray
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你的提示如何将AI引入歧途
- en: 原文：[https://towardsdatascience.com/how-your-prompts-lead-ai-astray/](https://towardsdatascience.com/how-your-prompts-lead-ai-astray/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-your-prompts-lead-ai-astray/](https://towardsdatascience.com/how-your-prompts-lead-ai-astray/)
- en: '<mdspan datatext="el1753804462495" class="mdspan-comment">I’ve</mdspan> been
    working on improving my prompting skills, and this is one of the most important
    lessons I’ve learnt so far:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753804462495" class="mdspan-comment">我</mdspan>一直在努力提高我的提示技巧，这是迄今为止我学到的最重要的教训之一：
- en: The way you talk to AI may steer it in a certain direction that does not benefit
    the quality of your answers. Maybe more than you think (more than I realised,
    for sure).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你与AI的交流方式可能会引导它走向一个不利于你答案质量的特定方向。也许比你想象的要多（确实比我意识到的要多）。
- en: 'In this article, I’ll explain how you can unconsciously introduce bias into
    your prompts, why this is problematic (because it affects the quality of your
    answers), and, most importantly: what you can do about it, so you can get better
    results from AI.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将解释你如何在不自觉的情况下将偏差引入你的提示中，为什么这很成问题（因为它会影响你答案的质量），最重要的是：你可以做什么来解决这个问题，以便你能从AI中获得更好的结果。
- en: Bias in AI
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能中的偏差
- en: Apart from the biases that are already present in some AI models (due to the
    training data used), such as **demographic bias** (e.g., a model that associates
    ‘kitchens’ more often with women than men), **cultural bias** (the model associates
    ‘holidays’ more readily with Christmas rather than Diwali or Ramadan), or **language
    bias** (a model performs better in certain languages, usually English), you also
    influence the skew of the answers you get.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 除了由于使用的训练数据而存在于某些AI模型中的偏差（例如**人口统计偏差**（例如，一个模型更频繁地将“厨房”与女性而不是男性相关联））、**文化偏差**（模型更容易将“节日”与圣诞节而不是排灯节或斋月相关联）或**语言偏差**（模型在特定语言中表现更好，通常是英语）之外，你还会影响你得到的答案的偏差。
- en: Yes, through your prompt. A single word in your question can be enough to set
    the model down a particular path.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，通过你的提示。你问题中的一个单词就足以将模型引向特定的路径。
- en: What is (prompt) bias?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是（提示）偏差？
- en: '*Bias is a distortion in the way a model processes or prioritises information,
    creating systematic skewing. *'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*偏差是模型处理或优先处理信息的方式的扭曲，造成系统性的偏差。*'
- en: In the context of AI prompting, it involves giving subtle signals to the model
    that ‘colour’ the answer. Often, without you being aware of it.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI提示的背景下，这涉及到向模型发出微妙的信号，这些信号“着色”了答案。通常，你并没有意识到这一点。
- en: Why is it a problem?
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么这是一个问题？
- en: AI systems are increasingly used for decision-making, analysis, and creation.
    In that context, quality matters. Bias can reduce that quality.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统越来越多地用于决策、分析和创作。在这种情况下，质量至关重要。偏差会降低这种质量。
- en: '**The risks of unconscious bias:**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**无意识偏差的风险：**'
- en: You get a less nuanced or even incorrect answer
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你得到的答案是缺乏细微差别，甚至可能是错误的
- en: You (unconsciously) repeat your own prejudices
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你（无意识地）重复了自己的偏见
- en: You miss relevant perspectives or nuance
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你错过了相关的观点或细微差别
- en: In professional contexts (journalism, research, policy), it can damage your
    credibility
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在专业环境中（新闻业、研究、政策），这可能会损害你的信誉
- en: When are you at risk?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你何时处于风险之中？
- en: 'TL;DR: always, but it becomes especially visible when you use few-shot prompting.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: TL;DR：总是如此，但当你使用少量提示时，它变得尤为明显。
- en: 'Long version: The risk of bias exists whenever you give an AI model a prompt,
    simply because every word, every sequence, and every example carries something
    of your intention, background, or expectation.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 长版本：每当给你一个AI模型提示时，偏差的风险就会存在，因为每个单词、每个序列和每个示例都承载着你的意图、背景或期望的一部分。
- en: With few-shot prompting (where you provide examples for the model to mirror),
    the risk of bias is more visible because you give examples that the model mirrors.
    The order of those examples, the distribution of labels, and even small formatting
    differences can influence the answer.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在少量提示（其中你为模型提供示例以供其模仿）的情况下，偏差的风险更为明显，因为你提供了模型会模仿的示例。这些示例的顺序、标签的分布，甚至微小的格式差异都可能影响答案。
- en: '*(I’ve based all bias risks in this article on the top 5 most common prompting
    methods, currently: instruction, zero-shot, few-shot, chain of thought, and role-based
    prompting.) *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*(我在本文中基于目前最常用的前5种提示方法中的所有偏差风险：指令、零样本、少量样本、思维链和基于角色的提示。)*'
- en: Common biases in few-shot prompting
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 少量提示中的常见偏差
- en: Which biases commonly occur in few-shot prompting, and what do they involve?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 常见于少量提示中的偏差有哪些，它们涉及什么？
- en: Majority label bias
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多数标签偏差
- en: '**The issue**: Model more often chooses the most common label in your examples.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：模型更频繁地选择你示例中最常见的标签。'
- en: '**Example**: If 3 of your 4 examples have “yes” as an answer, the model will
    more readily predict “yes”.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：如果你的4个示例中有3个答案是“是”，模型将更愿意预测“是”。'
- en: '**Solution**: Balance labels.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：平衡标签。'
- en: Selection bias
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择偏误
- en: '**The issue**: Examples or context aren’t representative.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：示例或上下文不具有代表性。'
- en: '**Example**: All your examples are about tech startups, so the model sticks
    to that context.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：你所有的示例都是关于科技初创公司的，所以模型坚持那个上下文。'
- en: '**Solution**: Vary/balance examples.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：变化/平衡示例。'
- en: Anchoring bias
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 锚定偏误
- en: '**The issue**: First example or statement determines the output direction too
    much.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：第一个示例或陈述过多地决定了输出方向。'
- en: '**Example**: If the first example describes something as “cheap and unreliable”,
    the model may treat similar items as low quality, regardless of later examples.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：如果第一个示例将某物描述为“便宜且不可靠”，模型可能会将类似物品视为低质量，无论后续示例如何。'
- en: '**Solution**: Start neutrally. Vary order. Explicitly ask for reassessment.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：开始时保持中立。变化顺序。明确要求重新评估。'
- en: Recency bias
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 近期偏误
- en: '**The issue**: Model attaches more value to the last example in a prompt.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：模型更重视提示中的最后一个示例。'
- en: '**Example**: The answer resembles the example mentioned last.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：答案类似于最后提到的示例。'
- en: '**Solution**: Rotate examples/reformulate questions in new turns.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：在新的回合中旋转示例/重新表述问题。'
- en: Formatting bias
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 格式化偏误
- en: '**The issue**: Formatting differences influence outcome: layout (e.g., bold)
    affects attention and choice.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：格式差异影响结果：布局（例如，粗体）影响注意力和选择。'
- en: '**Example**: A bold label is chosen more often than one without formatting.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：比没有格式的标签更常选择加粗标签。'
- en: '**Solution**: Keep formatting consistent.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：保持格式一致。'
- en: Positional bias
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 位置偏误
- en: '**The issue**: Answers at the beginning or end of a list are chosen more often.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：列表开头或结尾的答案被选择得更频繁。'
- en: '**Example**: In multiple-choice questions, the model more often chooses A or
    D.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：在多项选择题中，模型更常选择A或D。'
- en: '**Solution**: Switch order of options.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：交换选项的顺序。'
- en: '![A person that is filling out what looks like a multiple choice test](../Images/8c682299a70864c24fe622b472c2abd7.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![填写看似多项选择题的人](../Images/8c682299a70864c24fe622b472c2abd7.png)'
- en: Photo by [Nguyen Dang Hoang Nhu](https://unsplash.com/@nguyendhn?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/person-writing-on-white-paper-qDgTQOYk6B8?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由 [Nguyen Dang Hoang Nhu](https://unsplash.com/@nguyendhn?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/person-writing-on-white-paper-qDgTQOYk6B8?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    提供
- en: Other biases in different prompting methods
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不同提示方法中的其他偏误
- en: Bias can also occur in situations other than few-shot prompting. Even with zero-shot
    (without examples), one-shot (1 example), or in AI agents you are building, you
    can cause biases.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 偏误也可能出现在除了少样本提示之外的情况中。即使是没有示例（零样本）、一个示例（1个示例）或在您构建的AI代理中，您也可能造成偏误。
- en: Instruction bias
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指令偏误
- en: Instruction prompting is the most commonly used method at the moment (according
    to ChatGPT). If you explicitly give the model a style, tone, or role (“Write an
    argument against vaccination”), this can reinforce bias. The model then tries
    to fulfil the assignment, even if the content isn’t factual or balanced.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 指令提示是目前最常用的方法（根据ChatGPT）。如果您明确给出模型风格、语气或角色（“写一篇反对疫苗接种的论点”），这可能会加强偏误。然后模型会试图完成作业，即使内容不是事实或平衡的。
- en: '**How to prevent**: ensure balanced, nuanced instructions. Use neutral wording.
    Explicitly ask for multiple perspectives.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何预防**：确保平衡、细微的指令。使用中性措辞。明确要求提供多个观点。'
- en: '**Not so good**: “Write as an experienced investor why cryptocurrency is the
    future”.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不太好的做法**：“像一位经验丰富的投资者一样写，为什么加密货币是未来”。'
- en: '**Better**: “Analyse as an experienced investor the advantages and disadvantages
    of cryptocurrency”.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好的做法**：“像一位经验丰富的投资者一样分析加密货币的优缺点”。'
- en: Confirmation bias
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确认偏误
- en: Even when you don’t provide examples, your phrasing can already steer in a certain
    direction.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 即使您没有提供示例，您的措辞也可能已经引导了某个方向。
- en: '**How to prevent**: avoid leading questions.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何预防**：避免引导性问题。'
- en: '**Not so good**: “Why is cycling without a helmet dangerous?” → “Why is X dangerous?”
    leads to a confirmatory answer, even if that’s not factually correct.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不那么好**：“为什么说骑自行车不戴头盔是危险的？”→ “为什么X是危险的？”会导致一个确认性的答案，即使那在事实上可能是不正确的。'
- en: '**Better**: “What are the risks and benefits of cycling without a helmet?”'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好**：“不戴头盔骑行的风险和好处是什么？”'
- en: '**Even better**: “Analyse the safety aspects of cycling with and without helmets,
    including counter-arguments”.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好**：“分析戴头盔和不戴头盔骑行的安全方面，包括反方论点”。'
- en: Framing bias
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 框架偏见
- en: Similar to confirmation bias, but different. With framing bias, you influence
    the AI through how you present the question or information. The phrasing or context
    steers interpretation and the answer in a particular direction, often unconsciously.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 与确认偏见类似，但不同。在框架偏见中，你通过如何呈现问题或信息来影响AI。措辞或背景引导解释和答案走向特定方向，通常是无意中发生的。
- en: '**How to prevent**: Use neutral or balanced framing.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何预防**：使用中性或平衡的框架。'
- en: '**Not so good**: “How dangerous is cycling without a helmet?” → Here the emphasis
    is on danger, so the answer will likely mainly mention risks.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不那么好**：“不戴头盔骑行的危险有多大？”→ 这里强调的是危险，所以答案可能会主要提到风险。'
- en: '**Better**: “What are people’s experiences of cycling without a helmet?”'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好**：“人们不戴头盔骑行的体验是怎样的？”'
- en: '**Even better**: “What are people’s experiences of cycling without a helmet?
    Mention all positive and all negative experiences”.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好**：“人们不戴头盔骑行的体验是怎样的？提及所有正面和所有负面的体验”。'
- en: Follow-up bias
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 后续偏差
- en: Previous answers influence subsequent ones in a multi-turn conversation. With
    follow-up bias, the model adopts the tone, assumptions, or framing of your earlier
    input, especially in multi-turn conversations. The answer seems to want to please
    you or follows the logic of the previous turn, even if that was coloured or wrong.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在多轮对话中，先前的答案会影响后续的回答。随着后续偏差，模型会采用你早期输入的语气、假设或框架，尤其是在多轮对话中。答案似乎想要取悦你或遵循前一个回合的逻辑，即使那可能是带有偏见或错误的。
- en: '**Example scenario**:'
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例场景**：'
- en: ''
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'You: “*That new marketing strategy seems risky to me*”'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你：“*那个新的营销策略在我看来似乎很冒险*”
- en: 'AI: “*You’re right, there are indeed risks…*”'
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: AI：“*你是对的，确实存在风险…*”
- en: 'You: “*What are other options?*”'
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你：“*还有什么其他选择吗？*”
- en: 'AI: [*Will likely mainly suggest safe, conservative options*]'
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: AI：[*可能会主要建议安全、保守的选项*]
- en: '**How to prevent**: Ensure neutral questions, ask for a counter-voice, put
    the model in a role.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何预防**：确保使用中性的问题，请求一个反方声音，让模型扮演一个角色。'
- en: Compounding bias
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 累积偏见
- en: 'Particularly with Chain-of-Thought (CoT) Prompting (asking the model to reason
    step by step before giving an answer), prompt chaining (AI models generating prompts
    for other models), or deploying more complex workflows like agents, bias can accumulate
    over multiple steps in a prompt or interaction chain: compounding bias.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是在思维链提示（要求模型在给出答案之前逐步推理）、提示链（AI模型为其他模型生成提示）或部署更复杂的流程如代理时，偏见可能会在提示或交互链的多个步骤中累积：累积偏见。
- en: '**How to prevent**: Evaluate intermediately, break the chain, red teaming.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何预防**：进行中间评估，打断链条，进行红队行动。'
- en: 'Checklist: How to reduce bias in your prompts'
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 清单：如何减少提示中的偏见
- en: Bias isn’t always avoidable, but you can definitely learn to recognise and limit
    it. These are some practical tips to reduce bias in your prompts.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见并非总是可以避免的，但你确实可以学会识别和限制它。以下是一些减少提示中偏见的具体建议。
- en: '![A spirit level that is perfectly balanced.](../Images/2a9e57bd5b016af65f730e451d2bda26.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![一个完美平衡的水平仪](../Images/2a9e57bd5b016af65f730e451d2bda26.png)'
- en: Photo by [Eran Menashri](https://unsplash.com/@chesnutt?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/white-and-green-electronic-device-zfVIh4cX_4c?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Eran Menashri](https://unsplash.com/@chesnutt?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/white-and-green-electronic-device-zfVIh4cX_4c?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    提供
- en: 1\. **Check your phrasing**
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. **检查你的措辞**
- en: Avoid leading the witness, avoid questions that already lean in a direction,
    “Why is X better?” → “What are the advantages and disadvantages of X?”
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 避免引导证人，避免已经倾向于某个方向的提问，“为什么X更好？”→ “X的优点和缺点是什么？”
- en: '**2\. Mind your examples**'
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2. 注意你的例子**'
- en: Using few-shot prompting? Ensure labels are balanced. Also vary the order occasionally.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 使用少量样本提示？确保标签平衡。偶尔也改变顺序。
- en: '**3\. Use more neutral prompts**'
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**3. 使用更中性的提示**'
- en: 'For example: give the model an empty field (“N/A”) as a possible outcome. This
    calibrates its expectations.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：给模型一个空字段（“N/A”）作为可能的输出。这调整了它的期望。
- en: 4\. **Ask for reasoning**
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. **要求解释**
- en: Have the model explain how it reached its answer. This is called ‘chain-of-thought
    prompting’ and helps make blind assumptions visible.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 让模型解释它是如何得出答案的。这被称为“思维链提示”，有助于使盲目的假设变得可见。
- en: 5\. **Experiment!**
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. **实验！**
- en: Ask the same question in multiple ways and compare answers. Only then do you
    see how much influence your phrasing has.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 以多种方式提出相同的问题并比较答案。只有这样，你才能看到你的措辞有多大的影响。
- en: Conclusion
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In short, bias is always a risk when prompting, through how you ask, what you
    ask, and when you ask it during a series of interactions. I believe this should
    be a constant point of attention whenever you use LLMs.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，在一系列交互中，通过你如何提问、你问什么以及何时提问，提示时总是存在偏见的风险。我相信这应该是在你使用LLMs时始终需要注意的持续关注点。
- en: I’m going to keep experimenting, varying my phrasing, and staying critical of
    my prompts to get the most out of AI without falling into the traps of bias.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我将继续进行实验，改变我的措辞，并保持对我的提示的批判性，以充分利用AI而不陷入偏见的陷阱。
- en: I’m excited to keep improving my prompting skills. Got any tips or advice on
    prompting you’d like to share? Please do! 🙂
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我很兴奋地继续提高我的提示技巧。你有什么关于提示的技巧或建议想要分享吗？请务必分享！ 🙂
