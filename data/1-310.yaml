- en: Exploring Merit Order and Marginal Abatement Cost Curve in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在Python中探索优先顺序和边际减排成本曲线
- en: 原文：[https://towardsdatascience.com/merit-order-and-marginal-abatement-cost-curve-in-python/](https://towardsdatascience.com/merit-order-and-marginal-abatement-cost-curve-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/merit-order-and-marginal-abatement-cost-curve-in-python/](https://towardsdatascience.com/merit-order-and-marginal-abatement-cost-curve-in-python/)'
- en: <mdspan datatext="el1757377454549" class="mdspan-comment">To achieve the global</mdspan>
    temperature limit goals of 1.5°C by the end of the century set by the Paris Agreement,
    different institutions have come up with different scenarios. There is a consensus
    among [the mitigation scenarios](https://www.ipcc.ch/site/assets/uploads/sites/2/2019/05/SR15_Chapter2_Low_Res.pdf) that
    the share of low-carbon technologies such as renewable energy needs to increase,
    and fossil fuels need to decline steadily in the energy mix of tomorrow.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757377454549" class="mdspan-comment">为了实现巴黎协定设定的本世纪末将全球温度限制在1.5°C的目标，不同的机构提出了不同的情景。在[缓解情景](https://www.ipcc.ch/site/assets/uploads/sites/2/2019/05/SR15_Chapter2_Low_Res.pdf)方面达成共识，即低碳技术如可再生能源的份额需要增加，而化石燃料在未来的能源组合中需要稳步下降。
- en: The deployment of mitigation technology options (such as renewable energy, Electric
    Vehicles (EVs), green hydrogen, etc.) come up with their own set of costs and
    benefits. The mix of renewable energy and fossil fuels in the electricity generation
    portfolio of a country not only determines the CO2 emissions but can also influence
    the electricity price. In this post, I am going to discuss how the electricity
    price is determined in a wholesale electricity market by **merit order curve**
    (based on the concept of **marginal costs or production**), and how the cost-effectiveness
    of decarbonisation opportunities in a country or region or an organisation could
    be assessed based on **marginal abatement costs curve. **I am going to use Python
    to construct these two curves, and discuss the implementation along the way.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 减缓技术选项（如可再生能源、电动汽车（EV）、绿色氢等）的实施会产生自己的成本和收益。一个国家电力生成组合中可再生能源和化石燃料的混合不仅决定了二氧化碳排放，还可以影响电力价格。在这篇文章中，我将讨论批发电力市场中电力价格是如何通过**优先顺序曲线**（基于边际成本的概念）确定的，以及如何根据**边际减排成本曲线**评估一个国家、地区或组织脱碳机会的成本效益。我将使用Python构建这两个曲线，并在过程中讨论实现方法。
- en: Let’s get started!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Merit Order Curve
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优先顺序曲线
- en: An electricity authority or a utility in a country could have competing power
    plants of different types in its portfolio to offer electricity output to retailers.
    This is known as a [wholesale electricity market](https://fsr.eui.eu/electricity-markets-in-the-eu/) (also
    known as spot market). The cost of generating electricity differs according to
    the type of power plant. For example, there is zero or minimal cost of electricity
    generation from solar PV or wind turbines since they don’t require any fuels.
    On the other hand, power plants based on fossil fuels have higher running costs
    depending on the prices of fuels such as coal, oil, or gas that is combusted to
    generate electricity. In the language of economics, the cost of producing one
    additional unit of a product is called [**marginal cost of production**](https://www.investopedia.com/terms/m/marginalcostofproduction.asp).In
    the power system, available power plants in the portfolio are scheduled to be
    online **based on the ascending order of short-run marginal costs of production
    of electricity**. This sequence is referred to as the **merit order**. The power
    plants with the lowest marginal costs are scheduled to meet demand first, followed
    by the power plants with higher marginal costs to optimise the electricity supply
    costs.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一个国家的电力管理局或公用事业公司在其组合中可能有不同类型的发电厂，以向零售商提供电力输出。这被称为[批发电力市场](https://fsr.eui.eu/electricity-markets-in-the-eu/)（也称为现货市场）。发电的成本根据发电厂的类型而有所不同。例如，太阳能光伏或风力涡轮机发电的电力成本为零或最小，因为它们不需要任何燃料。另一方面，基于化石燃料的发电厂运行成本较高，这取决于燃烧以发电的煤炭、石油或天然气等燃料的价格。在经济学语言中，生产一个额外产品单位的生产成本被称为[**生产边际成本**](https://www.investopedia.com/terms/m/marginalcostofproduction.asp)。在电力系统中，组合中可用的发电厂根据发电的短期边际成本递增顺序安排上线。这个顺序被称为**优先顺序**。具有最低边际成本的发电厂首先安排满足需求，然后是具有更高边际成本的发电厂，以优化电力供应成本。
- en: In this section, I am going to implement the different steps to construct the
    merit order curve in Python and discuss how the merit order sets the wholesale
    electricity price.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将实现构建电力优先级曲线的不同步骤，并讨论电力优先级如何设定批发电力价格。
- en: Implementation
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现
- en: Let’s consider that there are power plants of nine types in the electricity
    portfolio of a country as shown in the list `power_plants`. These power plants
    must be arranged in ascending order of `marginal_costs`. The data used in this example
    are based on my assumption and can be regarded as dummy datasets.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个国家的电力投资组合中有九种类型的发电厂，如列表“`power_plants`”所示。这些发电厂必须按照“`边际成本`”的升序排列。本例中使用的数据基于我的假设，可以被视为虚拟数据集。
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: First, I convert this data into a dataframe with `power_plants` in index and `marginal_cost` in
    the column. Next, I iterate through the index of dataframe and ask the user to
    enter the available capacity of each power plant. The available capacity of each
    power plant is stored in an individual variable using the `globals()` method as
    shown below.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我将这些数据转换为以“`power_plants`”为索引、“`边际成本`”为列的数据框。接下来，我遍历数据框的索引，并要求用户输入每个发电厂的可用容量。每个发电厂的可用容量使用“`globals()`”方法存储在单独的变量中，如下所示。
- en: '![](../Images/4f3d492111e5c5e1bdd861cd5728a05e.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4f3d492111e5c5e1bdd861cd5728a05e.png)'
- en: ^(Asking user input for the available capacity of each power plant type using
    for-loop and the globals() method.)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: ^（使用循环和“`globals()`”方法请求用户输入每种发电厂类型的可用容量。）
- en: The total available capacity in the portfolio of country X sums to 1800 MW.
    Then, I create a new column called `Cumulative capacity (MW)`, which is the cumulative
    sum of `Available capacity (MW)` .
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 国家X的投资组合中可用的总容量总计为1800兆瓦。然后，我创建了一个名为“`累积容量（兆瓦）`”的新列，它是“`可用容量（兆瓦）`”的累积总和。
- en: '![](../Images/e5a511db6ef561d3d628c4be90ac31cf.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e5a511db6ef561d3d628c4be90ac31cf.png)'
- en: ^(Dataframe containing marginal cost and available capacity of each power plant
    type in country X. Image by Author.)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: ^（包含国家X每种发电厂类型的边际成本和可用容量的数据框。图片由作者提供。）
- en: I ask the user to enter the electricity demand in country X at a given timeframe.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我要求用户输入国家X在特定时间段的电力需求。
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Let’s assume the `demand` is 1500 MW.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 假设“`需求`”为1500兆瓦。
- en: Now that the data is ready, I can start compiling the building blocks for the
    merit order curve. In a merit order curve, the power plant are ordered in ascending
    order of marginal costs of electricity generation in the form of bar plots. The
    width of bars represents the available capacity of each power plant type and the
    height represents the corresponding marginal cost. Since the widths of bars are
    not equal, they look quite different from the normal bar plots.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在数据已经准备好了，我可以开始编译构建电力优先级曲线的构建块。在电力优先级曲线中，发电厂按照发电边际成本的升序排列，以条形图的形式呈现。条形的宽度代表每种发电厂类型的可用容量，高度代表相应的边际成本。由于条形的宽度不相等，它们看起来与正常的条形图相当不同。
- en: The position of ticks on the x-axis for the first bar (here Solar) is the same
    as half of its `Available capacity (MW)`. For the other power plant type, the
    position is calculated as the sum of `Cumulative capacity (MW)` till the power
    plant type before it, and half of its `Available capacity (MW)`. I have prepared
    a for-loop to get this position in `xpos` column of `df` as shown in the first
    part of the gist below.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 第一条形（此处为太阳能）的x轴刻度位置与它的“`可用容量（兆瓦）`”的一半相同。对于其他发电厂类型，位置计算为之前发电厂类型的“`累积容量（兆瓦）`”总和，加上其“`可用容量（兆瓦）`”的一半。我已经准备了一个循环来获取“`df`”的“`xpos`”列中的这个位置，如下面的代码片段的第一部分所示。
- en: Next, I analyse the position at which the demand lies on the x-axis. The position
    at which the power demand intersects with the cumulative power supply at the x-axis
    determines  `cut_off_power_plant`. In turn, the marginal cost of the `cut_off_power_plant` determines
    the clearing price of all power plants in the merit order before it, which participate
    in the wholesale market. The buyers of electricity in this wholesale market will
    all pay that same price.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我分析需求在x轴上的位置。电力需求与x轴上累积电力供应相交的位置确定了“`关断发电厂`”。反过来，“`关断发电厂`”的边际成本决定了在它之前的所有电力优先级发电厂的清算价格，这些发电厂参与批发市场。这个批发市场的电力买家都将支付相同的价格。
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: For loop on the top determines the position of the bar of each power plant type
    on the x-axis. cut_off function on the bottom determines the power plant type
    that intersects with the power demand.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 顶部的for循环确定每种发电厂类型在X轴上的条形位置。底部的cut_off函数确定与电力需求相交的发电厂类型。
- en: The code to generate the merit order curve is as shown.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 生成边际效益顺序曲线的代码如下所示。
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The resulting plot is as shown below.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 最终生成的图表如下所示。
- en: '![](../Images/0b488e522a891da73fd7147e83ae5835.png)^(Merit order curve of the
    given electricity market. The X-axis represents the available capacity of power
    plants. The Y-axis represents the marginal cost of each power plant. The vertical
    red dashed line represents the demand which is intersects with gas. The horizontal
    dashed red line represents the marginal cost of electricity generation from gas,
    which sets the market clearing price. Image by Author.)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![边际效益顺序曲线](../Images/0b488e522a891da73fd7147e83ae5835.png)^(所示为给定电力市场的边际效益顺序曲线。X轴表示发电厂的可用容量。Y轴表示每个发电厂的边际成本。垂直红色虚线表示需求，与燃气相交。水平红色虚线表示燃气发电的边际成本，它设定了市场出清价格。图片由作者提供。)'
- en: In the resulting plot, the power demand of 1500 MW is represented by the vertical
    dashed red line. This coincides with the power supply from gas when all the power
    plants are arranged in ascending order by marginal cost. Hence, the marginal cost
    of electricity generation from gas i.e. 80 $/MWh is the market clearing price.
    This implies all the power plants on and before the vertical dashed red line on
    the X-axis i.e. solar, wind, hydro, nuclear, biomass, coal, and gas need to deliver
    power to meet the demand. And all of them receive the price set by the marginal
    cost of production from gas.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成的图表中，1500兆瓦的电力需求由垂直虚线红色的线表示。这恰好与当所有发电厂按边际成本升序排列时的燃气供电相吻合。因此，燃气发电的边际成本即80美元/兆瓦时是市场出清价格。这意味着X轴上垂直虚线红色线之前和之后的所有发电厂，即太阳能、风能、水能、核能、生物质能、煤炭和燃气，都需要提供电力以满足需求。并且它们都接受由燃气生产边际成本设定的价格。
- en: Merit Order Effect
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 效益顺序效应
- en: When the demand level changes in the power system, the wholesale electricity
    price also reacts accordingly. This is demonstrated in the GIF image below. To
    get the animation in Python, I have used the `interact` function from `ipywidgets` as
    shown below. I have also used `IntSlider` widget to set the`demand` as the user-defined
    parameter to interact with. To avoid flickering while dragging along the slider,
    I have set `continuous_update` to False.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当电力系统中的需求水平发生变化时，批发电价也会相应地做出反应。这在上面的GIF图像中得到了演示。为了在Python中获得动画，我使用了`ipywidgets`中的`interact`函数，如下所示。我还使用了`IntSlider`小部件来设置用户定义的`demand`参数以进行交互。为了避免在拖动滑块时闪烁，我将`continuous_update`设置为False。
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/5a158ddf3d28076cace00f181faf06d3.png)^(Animation showing the
    change in cut off power plant and wholesale electricity price as the demand changes.
    Image by Author.)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![动画显示需求变化时截止发电厂和批发电价的变化](../Images/5a158ddf3d28076cace00f181faf06d3.png)^(动画显示了需求变化时截止发电厂和批发电价的变化。图片由作者提供。)'
- en: As shown in the GIF image above, when the demand increases, more power plants
    towards the right of the merit order need to be dispatched, which increases the
    clearing price and vice versa. If there is a more available capacity of renewable
    power plants in the portfolio, more share of the demand is met by renewable sources.
    This tends to lower the electricity price, which is known as the **merit order
    effect**.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图GIF图像所示，当需求增加时，需要调度更多位于效益顺序右侧的发电厂，这会增加市场出清价格，反之亦然。如果组合中可再生能源发电厂的可用容量更多，那么更多的需求份额将由可再生能源满足。这往往会导致电价下降，这被称为**效益顺序效应**。
- en: Marginal Abatement Cost Curve
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 边际减排成本曲线
- en: The [**abatement cost**](https://www.investopedia.com/terms/a/abatementcost.asp#:~:text=An%20abatement%20cost%20is%20a,negative%20byproducts%20created%20during%20production.&text=The%20most%20common%20scenario%20in,spills%2C%20whether%20accidental%20or%20intentional.) is
    a cost borne by firms for removing or reducing the externalities (negative byproducts)
    created during production. And the **marginal abatement cost** measures the cost
    of reducing one additional unit of externalities, e.g. CO2 emissions. While the
    merit order curve is based on ordering technologies by marginal costs of production,
    the marginal abatement costs (MAC) curve is based on ordering different mitigation
    opportunities in the ascending order of marginal abatement costs.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '[**减排成本**](https://www.investopedia.com/terms/a/abatementcost.asp#:~:text=An%20abatement%20cost%20is%20a,negative%20byproducts%20created%20during%20production.&text=The%20most%20common%20scenario%20in,spills%2C%20whether%20accidental%20or%20intentional.)是企业为消除或减少生产过程中产生的外部性（负副产品）而承担的成本。而**边际减排成本**衡量减少额外单位外部性的成本，例如二氧化碳排放。虽然优势顺序曲线是基于按生产边际成本对技术进行排序，但边际减排成本（MAC）曲线是基于按边际减排成本的升序对不同的缓解机会进行排序。'
- en: In a MAC curve, the width of the bar represents the greenhouse gas (GHG) emissions
    reduction potential of any technology or option. And the height of the bar represents
    the cost of reducing one additional unit of GHG emissions with the given opportunity.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在MAC曲线中，柱状图的宽度代表任何技术或选项的温室气体（GHG）排放减少潜力。柱状图的高度代表使用给定机会减少额外单位温室气体排放的成本。
- en: '![](../Images/86c866aa1e2e500feec70639ecf28a1c.png)^(Dataframe containing mitigation
    potential and marginal abatement costs of different opportunities. Data is based
    on the author’s assumption.)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![包含不同机会的缓解潜力和边际减排成本的数据框](../Images/86c866aa1e2e500feec70639ecf28a1c.png)^(数据基于作者假设。)'
- en: The data for this example is based on my assumption and can be regarded as a
    dummy dataset. The implementation of the MAC curve in Python is similar to that
    of the merit order curve.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例的数据基于我的假设，可以被视为一个虚拟数据集。在Python中实现MAC曲线的方法与优势顺序曲线类似。
- en: '![](../Images/b86f0c3bbd8316d207f44084d5ca4a22.png)^(MAC curve for a certain
    year for country X. Image by Author.)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![国家X某一年份的MAC曲线](../Images/b86f0c3bbd8316d207f44084d5ca4a22.png)^(图像由作者提供。)'
- en: The width of the bar represents the annual GHG emissions reduction potential
    of the mitigation opportunity. The height of the bar represents the estimated
    costs in a given year to reduce emissions by 1 tCO2e.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图的宽度代表缓解机会的年度温室气体排放减少潜力。柱状图的高度代表在特定年份减少1吨二氧化碳当量排放的估计成本。
- en: As shown in the plot above, replacing old lights with LED lights is the most
    cost-effective measure for decarbonisation. The negative marginal abatement costs
    for certain opportunities imply that there are net cost savings (or profit) when
    those measures are implemented. As we move towards the right end of the X-axis
    in a MAC curve, it becomes more expensive to abate one unit of GHG emissions.
    The widest bar on the MAC curve, reforestation has the highest overall potential
    of GHG emissions reductions.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，用LED灯替换旧灯是脱碳最有效的措施。某些机会的负边际减排成本意味着在实施这些措施时会有净成本节约（或利润）。当我们向MAC曲线的X轴右侧移动时，减排一单位温室气体排放的成本就会增加。MAC曲线上最宽的柱状图，即重新造林，具有最高的整体温室气体排放减少潜力。
- en: Thus, the MAC curve allows measures from various sectors (here power, transport,
    buildings, forestry, and waste) to be compared on equivalent terms. While the
    MAC curve provides a key initial assessment on the potential and cost-effectiveness
    of various mitigation opportunities, combining this assessment with insights from
    other modelling tools provides a strong base for formulating policies and investment
    decisions.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，MAC曲线允许将来自各个部门（在此处为电力、交通、建筑、林业和废物）的测量结果在等效的条件下进行比较。虽然MAC曲线为各种缓解机会的潜力和成本效益提供了关键性的初步评估，但将这种评估与其他建模工具的见解相结合，为制定政策和投资决策提供了坚实的基础。
- en: Conclusion
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: As we are traversing through the global energy transition, burning more fossil
    fuels to meet our energy needs would lead to soon exceeding the emissions budget
    that we need to respect to meet the global climate objectives. There are already
    technically proven and economically feasible opportunities in place, that can
    significantly reduce GHG emissions from both energy and non-energy sectors. Moreover,
    with economies of scale, the proven mitigation technologies (e.g. wind and solar)
    are getting cheaper every year.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们穿越全球能源转型，为了满足我们的能源需求而燃烧更多的化石燃料将很快超过我们需要尊重的排放预算，以实现全球气候目标。目前已经存在技术上证明可行且经济上可行的机会，可以显著减少能源和非能源部门的温室气体排放。此外，随着规模经济的实现，经过验证的减缓技术（例如风能和太阳能）每年都在变得更便宜。
- en: It is important to harness the proven mitigation technology options to cut down
    on the emissions significantly. The mitigation options come up with their own
    set of costs and benefits. In this post, I discussed how the share of renewable
    energy and fossil fuels in the power system portfolio of a country influences
    the wholesale electricity prices with the concept of **merit order curve **(**based
    on marginal costs of production**). And I presented how the emissions reduction
    potential and cost-effectiveness of mitigation opportunities in a country could
    be assessed based on the **marginal abatement cost curve**. The implementation
    of these curves in Python is available in this [GitHub repository](https://github.com/hbshrestha/Data_Analytics).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地利用经过验证的减缓技术选项对于显著减少排放至关重要。这些减缓选项带来自己的成本和收益。在这篇文章中，我讨论了可再生能源和化石燃料在一个国家电力系统组合中的份额如何通过**边际成本曲线**（基于生产边际成本）的概念影响批发电力价格。我还介绍了如何根据**边际减排成本曲线**来评估一个国家减缓机会的减排潜力和成本效益。这些曲线在Python中的实现可以在本[GitHub仓库](https://github.com/hbshrestha/Data_Analytics)中找到。
