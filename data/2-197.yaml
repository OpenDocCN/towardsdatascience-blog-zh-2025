- en: Revisiting Benchmarking of Tabular Reinforcement Learning Methods
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 重新审视表格强化学习方法基准测试
- en: 原文：[https://towardsdatascience.com/revisiting-benchmarking-of-tabular-reinforcement-learning-methods/](https://towardsdatascience.com/revisiting-benchmarking-of-tabular-reinforcement-learning-methods/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/revisiting-benchmarking-of-tabular-reinforcement-learning-methods/](https://towardsdatascience.com/revisiting-benchmarking-of-tabular-reinforcement-learning-methods/)
- en: <mdspan datatext="el1751303600366" class="mdspan-comment">After</mdspan> publishing
    my [previous post](https://towardsdatascience.com/benchmarking-tabular-reinforcement-learning-algorithms/)
    on benchmarking tabular reinforcement learning (RL) methods, I couldn’t shake
    the feeling that something wasn’t quite right. The results looked off, and I wasn’t
    fully satisfied with how they turned out.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751303600366" class="mdspan-comment">在</mdspan>发布我关于基准测试表格强化学习（RL）方法的[上一篇文章](https://towardsdatascience.com/benchmarking-tabular-reinforcement-learning-algorithms/)后，我无法摆脱这种感觉，那就是某些地方并不完全正确。结果看起来不对劲，我对它们的结果并不完全满意。
- en: Still, I continued with the post series, shifting focus to multi-player games
    and approximate solution methods. To support this, I’ve been steadily refactoring
    the original framework we built. The new version is cleaner, more general, and
    easier to use. In the process, it also helped uncover a few bugs and edge-case
    issues in some of the earlier algorithms (more on that later).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，我继续了这个系列文章，将重点转向多玩家游戏和近似解法。为了支持这一点，我一直在重构我们构建的原始框架。新版本更干净、更通用、更易于使用。在这个过程中，它还帮助发现了早期算法中的一些错误和边缘情况问题（关于这一点稍后详述）。
- en: In this post, I’ll introduce the updated framework, highlight the mistakes I
    made, share corrected results, and reflect on key lessons learned, setting the
    stage for more complex experiments to come.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将介绍更新的框架，突出我犯的错误，分享纠正后的结果，并反思学到的关键经验教训，为未来的更复杂实验奠定基础。
- en: The updated code can be found on [GitHub](https://github.com/hermanmichaels/rl_book).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 更新后的代码可以在[GitHub](https://github.com/hermanmichaels/rl_book)上找到。
- en: Framework
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 框架
- en: The biggest change from the previous version of the code is that RL solution
    methods are now implemented as **classes**. These classes expose common methods
    like `act()` (for selecting actions) and `update()` (for adjusting model parameters).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 与代码的前一个版本相比，最大的变化是现在RL解决方案方法被实现为**类**。这些类公开了常见的如`act()`（用于选择动作）和`update()`（用于调整模型参数）的方法。
- en: 'Complementing this, a **unified training script** manages the interaction with
    the environment: it generates episodes and feeds them into the appropriate method
    for learning—using the shared interface provided by those class methods.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 补充这一点，一个**统一的训练脚本**管理着与环境交互：它生成场景并将它们输入到适当的用于学习的方法中——使用那些类方法提供的共享接口。
- en: This refactoring significantly simplifies and standardizes the training process.
    Previously, each method had its own standalone training logic. Now, training is
    centralized, and each method’s role is clearly defined and modular.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这次的重构显著简化并标准化了训练过程。之前，每种方法都有自己的独立训练逻辑。现在，训练是集中的，每种方法的角色被明确定义且模块化。
- en: 'Before diving into the method classes in detail, let’s first look at the training
    loop for single-player environments:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在详细探讨方法类之前，让我们首先看看单玩家环境的训练循环：
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let’s visualize what a completed episode looks like—and when the `update()`
    and `finalize()` methods are called during the process:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化一个完成的场景看起来是什么样子——以及在这个过程中何时调用`update()`和`finalize()`方法：
- en: '![](../Images/d8105c7b5b02dc1171c1ed6efebd456f.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d8105c7b5b02dc1171c1ed6efebd456f.png)'
- en: Image by author
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: After each replay item is processed—consisting of a state, the action taken,
    and the reward received—the method’s `update()` function is called to adjust the
    model’s internal parameters. The specific behavior of this function depends on
    the algorithm being used.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个重放项被处理——包括状态、采取的动作和收到的奖励——之后，调用方法的`update()`函数来调整模型的内部参数。这个函数的具体行为取决于所使用的算法。
- en: To give you a concrete example, let’s take a quick look at how this works for
    **Q-learning**.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给您一个具体的例子，让我们快速看看这是如何应用于**Q学习**的。
- en: 'Recall the Q-learning update rule:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下Q学习的更新规则：
- en: '![](../Images/488933b15346f628647e36d0f324f4f5.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/488933b15346f628647e36d0f324f4f5.png)'
- en: Image from [1]
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自[1]
- en: When the second call to `update()` occurs, we have S[t]​ = s[1​], A[t] = a1
    and R[t+1] = r[2].
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当第二次调用`update()`时，我们有S[t] = s[1], A[t] = a1 和 R[t+1] = r[2]。
- en: Using this information, the Q-learning agent updates its value estimates accordingly.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些信息，Q学习代理相应地更新其价值估计。
- en: '**Unsupported Methods**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**不支持的方法**'
- en: '**Dynamic programming (DP)** methods do not fit above introduced structure
    – since they are based upon iterating over all states of the environment. For
    that reason, we leave their code untouched and handle training them differently.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**动态规划（DP）**方法不适合上述引入的结构——因为它们基于遍历环境中的所有状态。因此，我们保留它们的代码不变，并以不同的方式处理它们的训练。'
- en: Further, we completely remove the support for **Prioritized Sweeping**. Also,
    here we need to iterate over states in some way to find predecessor states, which,
    again – does not fit into our update training structure – and, more importantly,
    is not feasible for more complex multi-player games, where the number of states
    is much larger and harder to iterate.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们完全移除了对**优先级遍历**的支持。同时，在这里我们需要以某种方式遍历状态来找到前驱状态，这再次——不适合我们的更新训练结构——更重要的是，对于更复杂的多人游戏来说，状态的数量更大，遍历更困难。
- en: 'Since this method anyways did not produce good results, we focus on the remaining
    ones. Note: a similar reasoning was done for DP methods: these cannot be extended
    so easily to multi-player games, and thus will be of lesser interest in the future.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这种方法无论如何都没有产生好的结果，我们专注于剩余的方法。注意：对于DP方法也进行了类似的推理：这些方法不能轻易扩展到多人游戏，因此在未来将不太受关注。
- en: Bugs
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 错误
- en: Bugs happen — everywhere, and this project is no exception. In this section,
    I’ll highlight a particularly impactful bug that made its way into the results
    of the previous post, along with some minor changes and improvements. I’ll also
    explain how these affected earlier results.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 错误无处不在，这个项目也不例外。在本节中，我将突出一个特别有影响的错误，该错误出现在上一篇文章的结果中，以及一些小的更改和改进。我还会解释这些如何影响早期结果。
- en: '**Incorrect Action Probability Calculation**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**不正确的动作概率计算**'
- en: 'Some methods require the probability of a chosen action during the update step.
    In the earlier code version, we had:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 一些方法需要在更新步骤中选择动作的概率。在较早的代码版本中，我们有：
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This worked **only for strictly positive Q-values**, but broke down when Q-values
    were negative — making the normalization invalid.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这**仅适用于严格正的Q值**，但当Q值为负时就会崩溃——使归一化无效。
- en: 'The corrected version handles both positive and negative Q-values properly
    using a softmax approach:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 修正版本使用softmax方法正确处理正负Q值：
- en: '[PRE2]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This bug significantly impacted **Expected SARSA** and **n-step Tree Backup**,
    as their updates relied heavily on action probabilities.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这个错误对**期望SARSA**和**n步树备份**产生了重大影响，因为它们的更新严重依赖于动作概率。
- en: '**Tie-Breaking in Greedy Action Selection**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**贪婪动作选择中的平局处理**'
- en: 'Previously, when generating episodes, we either selected the greedy action
    or sampled randomly with ε-greedy logic:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 以前，在生成剧集时，我们要么选择贪婪动作，要么使用ε-greedy逻辑随机采样：
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'However, this didn’t properly handle **ties**, i.e., when multiple actions
    shared the same maximum Q-value. The updated `act()` method now includes fair
    tie-breaking:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并没有正确处理**平局**，即当多个动作共享相同的最大Q值时。更新的`act()`方法现在包括公平的平局处理：
- en: '[PRE4]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: A small change, but possibly quite relevant – since this e.g. stimulates a more
    explorative action selection at the start of each training, where all Q-values
    are equal.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一个小的变化，但可能相当相关——因为例如，这刺激了每次训练开始时的更探索性的动作选择，此时所有Q值都相等。
- en: This small change may have a noticeable impact—especially early in training,
    when all Q-values are initialized equally. It encourages a more diverse exploration
    strategy during the critical early phase.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这个小的变化可能会有明显的影响——尤其是在训练的早期，当所有Q值都初始化为相等时。它鼓励在关键早期阶段采取更多样化的探索策略。
- en: 'As previously discussed—and as we’ll see again below—RL methods exhibit high
    variance, making the impact of such changes difficult to measure precisely. However,
    this adjustment seemed to **slightly improve** the performance of several methods:
    **Sarsa**, **Q-learning**, **Double Q-learning**, and **Sarsa-n**.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述——并且我们将在下面再次看到——强化学习（RL）方法表现出高方差，这使得这种变化的影响难以精确测量。然而，这种调整似乎**略微提高了**几种方法的性能：**Sarsa**、**Q-learning**、**Double
    Q-learning**和**Sarsa-n**。
- en: Updated Results
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更新后的结果
- en: Let’s now examine the updated results — for completeness, we include all methods,
    not just the improved ones.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来检查更新后的结果——为了完整性，我们包括所有方法，而不仅仅是改进的方法。
- en: 'But first, a quick reminder of the task we are solving: we’re working with
    Gymnasium’s **GridWorld** environment [2] — essentially a maze-solving task:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，让我们快速回顾一下我们正在解决的问题：我们使用Gymnasium的**GridWorld**环境[2]——本质上是一个迷宫解决任务：
- en: '![](../Images/daf5317a616fa5440cb7817afb8c0cdd.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/daf5317a616fa5440cb7817afb8c0cdd.png)'
- en: Image by author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The agent must navigate from the top-left to the bottom-right of the grid while
    avoiding icy lakes.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 代理必须从网格的左上角导航到底部右部，同时避免冰冻的湖泊。
- en: To evaluate each method’s performance, we scale the gridworld size and measure
    the number of **update steps until convergence**.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估每种方法的性能，我们调整网格世界的大小，并测量**更新步骤直到收敛**的数量。
- en: '**Monte Carlo Methods**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**蒙特卡洛方法**'
- en: 'These methods were not affected by the recent implementation changes, so we
    observe results consistent with our earlier findings:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这些方法没有受到最近实现更改的影响，因此我们观察到与早期发现一致的结果：
- en: Both are capable of solving environments up to **25×25** in size.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们都能解决大小为**25×25**的环境。
- en: '**On-policy MC** performs slightly better than off-policy.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在策略MC**的表现略好于离策略。'
- en: '![](../Images/171a24e211d10904e4e3fc3442e4e86a.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/171a24e211d10904e4e3fc3442e4e86a.png)'
- en: Image by author
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '**Temporal Difference Methods**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间差分方法**'
- en: 'For these, we measure the following results:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些，我们测量以下结果：
- en: '![](../Images/27e24158862dc5f814f1852e1856cca7.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/27e24158862dc5f814f1852e1856cca7.png)'
- en: Image by author
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: For these, we immediately notice that Expected Sarsa now fares much better,
    due to fixing above mentioned bug about computing the action probabilities.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些，我们立即注意到由于修复了上述关于计算动作概率的bug，Expected Sarsa现在表现更好。
- en: 'But also the other methods perform better: as mentioned above, this could just
    be chance / variance – or be a consequence of the other minor improvements we
    did, in particular the better handling of ties during action selection.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 但其他方法的表现也好：如上所述，这可能是偶然/方差——或者是我们所做的其他一些小改进的结果，特别是动作选择中更好的处理平局。
- en: '**TD-n**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**TD-n**'
- en: 'For TD-n methods, our results look much different:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于TD-n方法，我们的结果看起来大不相同：
- en: '![](../Images/31c64600f5501f0d2c0872adead449bd.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/31c64600f5501f0d2c0872adead449bd.png)'
- en: Image by author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Sarsa-n also has improved, probably for similar reasons as discussed in the
    last section – but in particular n-step tree backup now performs really well –
    proving that with correct action selection this indeed is a very powerful solution
    method.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: Sarsa-n也有所改进，可能是因为与上一节讨论的类似原因——但特别是n步树备份现在表现非常好——证明在正确的动作选择下，这确实是一个非常强大的解决方案。
- en: '**Planning**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**规划**'
- en: 'For planning, we only have Dyna-Q left – which also seems to have improved
    slightly:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于规划，我们只剩下Dyna-Q——它似乎也有所改进：
- en: '![](../Images/1af1c6ee4de8e66498ea81f39f50569d.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1af1c6ee4de8e66498ea81f39f50569d.png)'
- en: Image by author
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '**Comparing the Best Solution Methods on Larger Environments**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**比较大型环境中的最佳解决方案方法**'
- en: With that, let’s visualize the best-performing methods from all categories in
    one diagram. Due to the removal of some methods like DP, I now selected on-policy
    MC, Sarsa, Q-learning, Sarsa-n, n-step tree backup and Dyna-Q.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们在一个图表中可视化所有类别中表现最佳的方法。由于移除了一些方法如DP，我现在选择了在策略MC、Sarsa、Q-learning、Sarsa-n、n步树备份和Dyna-Q。
- en: 'We begin by showing results for grid worlds up to size 50 x 50:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先展示大小为50 x 50的网格世界的测试结果：
- en: '![](../Images/338c2633f24f976aa7ee9a96b648a29a.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/338c2633f24f976aa7ee9a96b648a29a.png)'
- en: Image by author
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We observe **on-policy MC** to perform surprisingly well — consistent with earlier
    findings. Its strength likely stems from its **simplicity and unbiased estimates**,
    which work well for short- to medium-length episodes.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们观察到**在策略MC**表现出人意料的出色——与早期发现一致。其优势可能源于其**简单性和无偏估计**，这对于短到中长度的剧集非常有效。
- en: 'However, unlike the previous post, **n-step Tree Backup** clearly emerges as
    the top-performing method. This aligns with theory: its use of expected multi-step
    backups enables **smooth and stable value propagation**, combining the strengths
    of off-policy updates with the stability of on-policy learning.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，与之前的帖子不同，**n步树备份**明显成为表现最佳的方法。这与理论相符：它使用预期的多步备份，使得**平滑且稳定的值传播**成为可能，结合了离策略更新的优势与在策略学习的稳定性。
- en: 'Next, we observe a middle cluster: **Sarsa, Q-learning, and Dyna-Q** — with
    **Sarsa** slightly outperforming the others.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们观察到中间的一个集群：**Sarsa、Q-learning和Dyna-Q**——其中**Sarsa**略胜一筹。
- en: It’s somewhat surprising that the model-based updates in Dyna-Q don’t lead to
    better performance. This might point to limitations in the model accuracy or the
    number of planning steps used. **Q-learning** tends to underperform due to the
    increased variance introduced by its off-policy nature.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 令人有些惊讶的是，Dyna-Q中的基于模型的更新并没有带来更好的性能。这可能会指向模型精度或使用的规划步骤数量的限制。**Q-learning**由于其离策略性质引入的方差增加，往往表现不佳。
- en: The **worst-performing method** in this experiment is **Sarsa-n**, consistent
    with earlier observations. We suspect the degradation in performance comes from
    the increased **variance and bias** due to n-step sampling without expectation
    over actions.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中，**表现最差的方法**是**Sarsa-n**，这与之前的观察一致。我们怀疑性能下降是由于n步采样没有对动作进行期望，导致**方差和偏差**增加。
- en: 'It’s still somewhat unexpected that MC methods outperform TD in this setting
    — traditionally, TD methods are expected to do better in large environments. However,
    this is mitigated in our setup by the **reward shaping strategy**: we provide
    a small positive reward at each step as the agent moves closer to the goal. This
    alleviates one of MC’s major weaknesses — poor performance in sparse reward settings.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个设置中，MC方法优于TD方法仍然有些令人意外——传统上，TD方法在大型环境中预期表现会更好。然而，在我们的设置中，这通过**奖励塑造策略**得到了缓解：当智能体接近目标时，我们在每一步提供一个小正奖励。这缓解了MC的一个主要弱点——在稀疏奖励设置中的表现不佳。
- en: Conclusion and Learnings
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论与收获
- en: In this post, we shared updates to the RL framework developed over this series.
    Alongside various improvements, we fixed some bugs — which significantly enhanced
    algorithm performance.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们分享了本系列中开发出的强化学习框架的更新。在众多改进的同时，我们修复了一些bug——这显著提升了算法性能。
- en: 'We then applied the updated methods to increasingly larger GridWorld environments,
    with the following findings:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们随后将更新的方法应用于越来越大的GridWorld环境，以下是我们发现的结果：
- en: '**n-step Tree Backup** emerged as the best method overall, thanks to its expected
    multi-step updates that combine the benefits of both on- and off-policy learning.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**n步树备份**由于其预期的多步更新，结合了在线和离线学习的优点，成为整体最佳方法。'
- en: '**Monte Carlo methods** followed, showing surprisingly strong performance due
    to their unbiased estimates and the intermediate rewards guiding learning.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蒙特卡洛方法**随后出现，由于它们的无偏估计和中间奖励引导学习，表现出惊人的强大性能。'
- en: A cluster of **TD methods** — Q-learning, Sarsa, and Dyna-Q — followed. Despite
    Dyna-Q’s model-based updates, it didn’t significantly outperform its model-free
    counterparts.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一系列**TD方法**——Q-learning、Sarsa和Dyna-Q——随后出现。尽管Dyna-Q具有基于模型的更新，但它并没有显著优于其无模型对应版本。
- en: '**Sarsa-n** performed worst, likely due to the compounded bias and variance
    introduced by sampling n-step returns.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Sarsa-n**表现最差，可能是由于采样n步回报引入的累积偏差和方差。'
- en: Thanks for reading this update! Stay tuned for further content — next up, we
    cover **multi-player games and environments.**
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读这篇更新！请继续关注后续内容——接下来，我们将介绍**多人游戏和环境**。
