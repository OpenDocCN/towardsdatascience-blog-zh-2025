    a cappuccino. 😊'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你想支持我的工作**，你可以[买我喜欢的咖啡](https://buymeacoffee.com/saranobregu)：一杯卡布奇诺。😊'
