- en: 'I Transitioned from Data Science to AI Engineering: Here’s Everything You Need
    to Know'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从数据科学转向人工智能工程：你需要知道的一切
- en: 原文：[https://towardsdatascience.com/i-transitioned-from-data-science-to-ai-engineering-heres-everything-you-need-to-know/](https://towardsdatascience.com/i-transitioned-from-data-science-to-ai-engineering-heres-everything-you-need-to-know/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/i-transitioned-from-data-science-to-ai-engineering-heres-everything-you-need-to-know/)'
- en: <mdspan datatext="el1748482478941" class="mdspan-comment">Data Science</mdspan>
    isn’t dying, but it is evolving. Fast.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748482478941" class="mdspan-comment">数据科学</mdspan>并没有消亡，但它正在快速发展。
- en: AI-related jobs are [projected](https://www.interviewquery.com/p/the-2024-data-science-report)
    to grow **~40% year-over-year**, creating over a million new roles by 2027\.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 预计人工智能相关的工作将每年增长**~40**%，到2027年将创造超过一百万个新的职位。
- en: In this article, I’ll take you through my **transition** from **Data Science**
    to **AI Engineering**, as well as give you some practical advice on how to transition
    or to learn more about this area.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将带您了解我从**数据科学**到**人工智能工程**的**转变**，并为您提供一些关于如何转变或了解更多关于这个领域的实用建议。
- en: 'My **path** through Data Science to AI Engineering has been interesting and
    full of learnings. Here is a short snapshot of my journey so far:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我在数据科学到人工智能工程的道路上经历了有趣且充满学习的过程。以下是我迄今为止旅程的简要概述：
- en: I graduated from Physics and Astrophysics(bachelor’s and master’s) and [transitioned](https://towardsdatascience.com/how-to-transition-from-physics-to-data-science-a-comprehensive-guide-ff1951090f65)
    to Data Science;
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我毕业于物理学和天体物理学（学士和硕士），然后转向数据科学；
- en: Performed **two internships abroad** in Data Science and Machine Learning;
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在数据科学和机器学习领域在国外完成了**两次实习**；
- en: Got my first **full-time job as a Data Scientist** in the biggest energy company
    of my country;
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我国最大的能源公司获得了我的第一份**全职数据科学家**工作；
- en: '**Transitioned to AI Engineering** less than a year ago (as of May 2025) and
    now I work for a big logistics company.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在2025年5月之前不到一年**转向人工智能工程，现在我在一家大型物流公司工作。'
- en: If you are a **data scientist**, how often do you think about how your code
    reaches **production**? If the answer is ‘almost never’, AI Engineering might
    shock you.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名**数据科学家**，你认为你多久会考虑一下你的代码是如何达到**生产**环境的？如果答案是“几乎从不”，那么人工智能工程可能会让你感到震惊。
- en: Curious abouthow **real-world** experience in **data science** could **shape
    your journey into AI engineering,** or what **surprising challenges** I faced?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 对如何在数据科学中的**现实世界**经验塑造你进入人工智能工程的旅程感兴趣吗？或者想知道我遇到了哪些**令人惊讶的挑战**？
- en: How is a **daily life of an AI Engineer** compare to a Data Scientist’s one?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能工程师的**日常生活**与数据科学家的有何不同？
- en: What **tools** and **platforms** I use **now,** compared to **before?**
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前相比，我现在使用哪些**工具**和**平台**？
- en: Keep reading it to know all about it!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 继续阅读，了解所有相关信息！
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Hello there!
  id: totrans-16
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 你好！
- en: My name is [Sara Nóbrega](https://linktr.ee/saranobrega), and I am a an AI Engineer.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我的名字是 [Sara Nóbrega](https://linktr.ee/saranobrega)，我是一名人工智能工程师。
- en: I write about data science, artificial intelligence, and data science career
    advice. Make sure to [**follow me**](https://medium.com/@saranobregafn) to receive
    updates when the next article is published!
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我写有关数据科学、人工智能以及数据科学职业建议的文章。确保[**关注我**](https://medium.com/@saranobregafn)，以便在发布下一篇文章时收到更新！
- en: '* * *'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Differences and Similarities Between Data Science and AI Engineering
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学与人工智能工程之间的异同
- en: AI Engineering is a very broad term and it may even include many data science
    tasks. In fact, it is often used as an umbrella term.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能工程是一个非常广泛的概念，它甚至可能包括许多数据科学任务。实际上，它通常被用作一个总称。
- en: As a Data Scientist, I once spent 3 weeks tuning a model offline. Now, as an
    AI Engineer, we have 3 days to deploy it into production. Priorities shifted fast!
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名数据科学家，我曾经花了3周时间离线调整模型。现在，作为一名人工智能工程师，我们只有3天时间将其部署到生产环境中。优先级快速转变了！
- en: But does that mean that both **roles** are completely **different** and never
    **overlap**?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但这难道意味着这两个**角色**完全**不同**且**从不重叠**吗？
- en: What if one day you want to apply to an AI Engineer role? Are data science skills
    transferable to the world of AI Engineering?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有一天你想申请人工智能工程师的职位？数据科学技能是否可以转移到人工智能工程领域？
- en: First, I will show you some findings of the research I did on this and then
    my personal intake and experience on the subject.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我将向您展示我对这一主题进行的这项研究的一些发现，然后是我的个人见解和经验。
- en: I did a little research for you…
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 我为你做了一点研究…
- en: From my investigation, the responsibilities of each role have broadened and
    converged over the past **three years**.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的调查，过去**三年**中每个角色的职责都得到了扩展和融合。
- en: '**Data Scientist** job descriptions today include more and more tasks besides
    analysis and model tuning. They often include: **deploying models**, building
    **data pipelines**, and applying Machine Learning Operations **(MLOps)** best
    practices.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据科学家**的职位描述现在除了分析和模型调整之外，还包括越来越多的任务。它们通常包括：**部署模型**、构建**数据管道**以及应用机器学习操作**（MLOps）**最佳实践。'
- en: Guess what, this is what I mainly do as an AI Engineer! (More on this in the
    next sections).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 猜猜看，这就是我作为AI工程师主要做的事情！（更多内容将在下一节中介绍）。
- en: For example, a recent Data Scientist posting I saw explicitly required “experience
    with enterprise DataOps, DevSecOps, and **MLOps”.**
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我最近看到的一个数据科学家职位发布明确要求“有企业数据操作（DataOps）、DevSecOps和**MLOps**的经验”。**
- en: Until some years ago, data scientists focused mainly on research and modeling.
    Now, companies often expect data scientists to be “**full stack**”, which overwhelmingly
    means,  fluent in almost *everything*.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 直到几年前，数据科学家主要专注于研究和建模。现在，公司通常期望数据科学家能够成为“**全栈**”的，这几乎意味着，精通几乎**一切**。
- en: This means that it is expected that data scientists have some knowledge of cloud
    platforms, software engineering, and even DevOps,  so their models can directly
    support products.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着预计数据科学家对云平台、软件工程甚至DevOps有一定的了解，以便他们的模型可以直接支持产品。
- en: '[One survey](https://365datascience.com/career-advice/the-future-of-data-science/)
    found **69%** of data scientist job listings request machine learning skills and
    about **19%** mention NLP, up from just **5%** a year prior.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '[一项调查](https://365datascience.com/career-advice/the-future-of-data-science/)发现，**69%**的数据科学家职位列表要求机器学习技能，大约**19%**提到自然语言处理（NLP），比一年前的**5%**有所增加。'
- en: '**Cloud** computing skills (AWS, Azure) and deep learning frameworks (TensorFlow/PyTorch)
    now appear in ~**10–15%** of data scientist ads as well, indicating a **rising
    overlap** with **AI engineering skill sets**.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**云计算**技能（AWS、Azure）和深度学习框架（TensorFlow/PyTorch）现在也出现在约**10-15%**的数据科学家招聘广告中，这表明与**AI工程技能集**的重叠正在增加。'
- en: There is a **clear convergence** in the **skill sets** of Data Scientists and
    AI Engineers. Both roles heavily use programming (especially **Python**) and data
    skills (SQL), and both need understanding of machine learning algorithms.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家和AI工程师的**技能集**存在**明显的融合**。这两个角色都大量使用编程（尤其是**Python**）和数据技能（SQL），并且都需要理解机器学习算法。
- en: According to an analysis of 2024 job postings, **Python** is required in ~56–57%
    of both data scientist and ML engineer listings.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 根据对2024年职位发布的分析，**Python**在约56-57%的数据科学家和机器学习工程师职位列表中是必需的。
- en: '**Cloud** and **MLOps** skills seem to be the **new common ground**, as AI
    Engineers are expected to deploy on **AWS/Azure** and likewise “cloud skills will
    be essential” for future **data scientists**.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**云计算**和**MLOps**技能似乎成为了**新的共同点**，因为AI工程师被期望在**AWS/Azure**上部署，同样，“云技能对于未来的数据科学家来说将是必不可少的”。'
- en: 'The table below highlights some core skills and how frequently they appear
    in job ads for each role, according to the sources that I list in the references
    section:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 下表根据我在参考文献部分列出的来源，突出了某些核心技能以及它们在每个角色招聘广告中出现的频率：
- en: '![Key Skills and Tools for each role. Image by Author.](../Images/fd2086d5b394c9a73bfc50245aaf648b.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![每个角色的关键技能和工具。图片由作者提供。](../Images/fd2086d5b394c9a73bfc50245aaf648b.png)'
- en: 'At first glance, the **divergence** is obvious. **Data Scientist** roles remain
    grounded in traditional data tasks: Python, SQL, general machine learning, and
    deriving insights from structured data.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 初看之下，**差异**很明显。**数据科学家**角色仍然根植于传统的数据任务：Python、SQL、通用机器学习以及从结构化数据中提取见解。
- en: '**ML/AI Engineers** are positioned much closer to the world of software engineering.
    These professionals are tasked with taking experimental models and making them
    robust, scalable, and continuously deliverable.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**机器学习/人工智能工程师**位于软件工程世界的更近位置。这些专业人士的任务是将实验模型变得稳健、可扩展，并持续交付。'
- en: But there is a clear **convergence** that is interesting and strategic.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个有趣且具有战略性的**融合**趋势。
- en: We can see that cloud platforms are increasingly mentioned for **Data Scientists**,
    and **MLOps** tools are no longer confined to engineering roles. The skill sets
    are **blending**!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，云平台越来越多地被提及用于**数据科学家**，而**MLOps**工具也不再局限于工程角色。技能集正在**融合**！
- en: We’re seeing a trend where Data Scientists are being nudged closer to the **engineering**
    stack.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们观察到一种趋势，即数据科学家正被推向更接近 **工程** 堆栈。
- en: My Personal Journey and Intake
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的个人旅程和收获
- en: What did I do as a Data Scientist? What do I do know as an AI Engineering?
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 我作为数据科学家做了什么？我现在作为 AI 工程师做什么？
- en: To give you some context, I worked as a data scientist in a big energy company,
    where my responsibilities revolved around developing **time-series forecasting**
    models (using XGBoost, LightGBM, SARIMAX, and RNNs), generating and validating
    **synthetic data** (via TimeGAN, statistical distributions, and imputation techniques),
    doing deep and extensive **statistical analyses** and employing **machine learning**
    models to tackle missing data in big data.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给您一些背景信息，我曾在一家大型能源公司担任数据科学家，我的职责是开发 **时间序列预测** 模型（使用 XGBoost、LightGBM、SARIMAX
    和 RNNs），生成和验证 **合成数据**（通过 TimeGAN、统计分布和插补技术），进行深入和广泛的 **统计分析**，并使用 **机器学习** 模型来解决大数据中的缺失数据。
- en: If you are interested, I wrote a [ton of useful articles](https://towardsdatascience.com/author/saranobregafn/)
    to deal with time-series data.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您感兴趣，我写了很多 [有用的文章](https://towardsdatascience.com/author/saranobregafn/) 来处理时间序列数据。
- en: 'Some of the **tools** and platforms I used as a **Data Scientist** included:
    VSCode, Jupyter, MLflow, Flask, FastAPI, and Python libraries such as TensorFlow,
    scikit-learn, pandas, NumPy, Matplotlib, Seaborn, ydata-synthetic, statsmodels,
    and others.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我作为 **数据科学家** 使用的一些 **工具** 和平台包括：VSCode、Jupyter、MLflow、Flask、FastAPI，以及 Python
    库如 TensorFlow、scikit-learn、pandas、NumPy、Matplotlib、Seaborn、ydata-synthetic、statsmodels
    等。
- en: In my previous **internship**, I would use PyTorch, Transformers, Weights &
    Biases, Git, and Python libraries for data distillation, supervised learning,
    applied statistics, computer vision, NLP, object detection, data augmentation,
    and deep learning.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的 **实习** 中，我会使用 PyTorch、Transformers、Weights & Biases、Git 以及 Python 库进行数据蒸馏、监督学习、应用统计、计算机视觉、NLP、目标检测、数据增强和深度学习。
- en: The tools and platforms I use now
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我现在使用的工具和平台
- en: '**Python** is still the main language I use. I do use **Jupyter** notebooks
    for prototyping, but most of my time is now spent writing Python code in **VSCode**
    (scripts, APIs, tests, etc).'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python** 仍然是我主要使用的语言。我确实使用 **Jupyter** 笔记本进行原型设计，但现在我大部分时间都在 **VSCode** 中编写
    Python 代码（脚本、API、测试等）。'
- en: My work is very connected to **Microsoft Azure**, particularly **Azure Machine
    Learning**, as my team uses it to manage, train, deploy, and monitor our ML models.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我的工作与 **Microsoft Azure** 非常紧密相关，特别是 **Azure Machine Learning**，因为我的团队使用它来管理、训练、部署和监控我们的
    ML 模型。
- en: '![Source: DALL-E.](../Images/0670e70d9dcfe94db70548e7e7e0c61e.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![来源：DALL-E.](../Images/0670e70d9dcfe94db70548e7e7e0c61e.png)'
- en: The entire **MLOps** lifecycle (from development all the way to deployment)
    runs in Azure. We also utilize **MLflow** to track experiments, compare different
    models and parameters and register all the model versions.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 整个 **MLOps** 生命周期（从开发到部署）都在 Azure 上运行。我们还利用 **MLflow** 来跟踪实验、比较不同的模型和参数，并注册所有模型版本。
- en: A major shift for me from DS to AI Engineering has been the consistent use of
    **CI/CD** tools, especially **GitHub Actions**. This was actually one of my first
    tasks when I started this job!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 从 DS 到 AI 工程的转变对我来说是一个重大转变，那就是持续使用 **CI/CD** 工具，特别是 **GitHub Actions**。这实际上是我开始这份工作的第一个任务之一！
- en: GitHub Actions allow me to build **automated workflows** that test and deploy
    ML models, so that they can be integrated into other pipelines.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Actions 允许我构建 **自动化工作流**，以测试和部署 ML 模型，以便它们可以集成到其他管道中。
- en: Beyond machine learning, I also build and deploy backend components. For that,
    I work with **REST APIs**, with **FastAPI** and **Azure Functions**, to serve
    model predictions and connect them to our frontend applications or external services.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 除了机器学习之外，我还构建和部署后端组件。为此，我使用 **REST APIs**，以及 **FastAPI** 和 **Azure Functions**
    来提供模型预测并将它们连接到我们的前端应用程序或外部服务。
- en: I have started working with **Snowflake** to explore and transform structured
    datasets using **SQL**.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经开始使用 **Snowflake** 来探索和转换结构化数据集，使用 **SQL** 进行操作。
- en: Regarding infrastructure as a code, **I have used Terraform** to manage cloud
    resources as code.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 关于基础设施即代码，我使用 **Terraform** 来以代码的形式管理云资源。
- en: Other tools I use include **Git**, **Bash**, and **Linux** environment. These
    are important for collaboration, scripting automation, troubleshooting, and managing
    deployments.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用的其他工具包括 **Git**、**Bash** 和 **Linux** 环境。这些对于协作、脚本自动化、故障排除和管理部署都至关重要。
- en: Some tasks I have performed as an AI Engineer
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 作为 AI 工程师，我执行的一些任务
- en: Now, I work as an **AI Engineer** for a big **logistics** company.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我在一家大型**物流**公司担任**AI工程师**。
- en: The first task I was assigned to was to improve and optimize continuous integration/continuous
    deployment (**CI/CD**) pipelines of ML models using **GitHub Actions** and **Azure
    Machine Learning**.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我被分配的第一个任务是改进和优化机器学习模型的持续集成/持续部署（**CI/CD**）管道，使用**GitHub Actions**和**Azure Machine
    Learning**。
- en: What does this mean in practice, you ask?
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会问，这实际上意味着什么呢？
- en: Well, my company wanted a reusable **MLOps template** that new projects could
    adopt without starting from scratch. This template is like a starter pack. It’s
    in a **GitHub** repo and has everything you’d need to go from a prototype in a
    notebook to something that can actually run in production.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，我的公司希望有一个可重用的**MLOps模板**，新项目可以采用这个模板而不需要从头开始。这个模板就像一个启动包。它位于**GitHub**仓库中，包含了从笔记本中的原型到实际可以运行在生产环境中的所有你需要的东西。
- en: Inside this repo, there is a **Makefile** (a script that lets you run setup
    tasks like installing packages or running tests with a single command), a **CI
    workflow written in YAML** (a file that defines exactly what happens every time
    someone pushes new code, for example, tests are run, and models get evaluated),
    and **unit tests for both the Python scripts and the configuration files** (to
    make sure everything behaves as expected and nothing breaks without us noticing).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个仓库中，有一个**Makefile**（一个脚本，允许你使用单个命令运行设置任务，例如安装包或运行测试），一个用YAML编写的**CI工作流程**（一个文件，定义了每次有人推送新代码时确切会发生什么，例如运行测试和评估模型），以及**Python脚本和配置文件的单元测试**（以确保一切按预期运行，并且没有在我们没有注意到的情况下出现故障）。
- en: If you wish to learn more about this, I actually wrote a full **[Dev Checklist
    for ML projects](https://medium.com/data-science-collective/from-notebook-to-production-a-dev-checklist-for-ml-projects-4032645df6f5?sk=573b92095e6cf1a383c437eaccbf30b0)**
    that describe these best practices, and that is totally beginner-friendly.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你希望了解更多关于这个的信息，我实际上写了一个完整的**[ML项目开发清单](https://medium.com/data-science-collective/from-notebook-to-production-a-dev-checklist-for-ml-projects-4032645df6f5?sk=573b92095e6cf1a383c437eaccbf30b0)**，它描述了这些最佳实践，而且对初学者非常友好。
- en: 'From linting and Makefiles to GitHub Actions and branch protection, it’s packed
    with the practical steps that I wish I knew earlier:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 从代码检查和Makefile到GitHub Actions和分支保护，它包含了我想早点知道的实用步骤：
- en: '*👉* [*Read it here: From Notebook to Production — A Dev Checklist for ML Projects*](https://medium.com/data-science-collective/from-notebook-to-production-a-dev-checklist-for-ml-projects-4032645df6f5?sk=573b92095e6cf1a383c437eaccbf30b0)'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '*👉* [*在此阅读：从笔记本到生产——ML项目开发清单*](https://medium.com/data-science-collective/from-notebook-to-production-a-dev-checklist-for-ml-projects-4032645df6f5?sk=573b92095e6cf1a383c437eaccbf30b0)'
- en: '**Unit tests** are actually a core part of AI Engineering. They are often not
    the favorite task of anyone… but they are crucial for making sure things don’t
    break when your model hits the real world.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**单元测试**实际上是AI工程的核心部分。它们通常不是任何人的最爱任务……但它们对于确保模型进入现实世界时不会出现故障至关重要。'
- en: Because imagine you’ve spent days training a model, only to have a tiny bug
    in your preprocessing script mess everything up in production. **Unit tests**
    help catch those silent failures early!
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 因为想象一下，你花费了几天时间训练一个模型，结果在预处理脚本中有一个小小的错误，导致生产环境中的所有东西都出了问题。**单元测试**有助于早期捕捉这些无声的失败！
- en: But does this mean I have stopped performing Data Science tasks? Not at all!
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 但这难道意味着我停止了数据科学任务吗？当然不是！
- en: In fact, one of my current tasks involves mapping departure and arrival times,
    cleaning route data, and integrating the results into a frontend app.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我当前的一项任务涉及绘制出发和到达时间，清理路线数据，并将结果集成到前端应用程序中。
- en: I think it is a perfect example of how **Data Science** (EDA, mapping, cleaning)
    blends with **AI Engineering** (integration, deployment awareness).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是一个很好的例子，说明了**数据科学**（EDA、映射、清理）如何与**AI工程**（集成、部署意识）相结合。
- en: I want to highlight that **both roles** (Data Scientist and AI Engineer) can
    be quite **broad** and their responsibilities often vary from company to company,
    even sector to sector. What I’m sharing here is only based on my **personal experience,**
    which may not reflect everyone’s journey or expectations in these roles!
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我想强调的是，**两个角色**（数据科学家和AI工程师）都可以相当**广泛**，他们的责任通常因公司而异，甚至因行业而异。我分享的这些内容仅基于我的**个人经验**，这可能并不反映每个人在这些角色中的旅程或期望！
- en: Collaboration Patterns
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 协作模式
- en: One thing I have noticed is that this overlap in responsibilities has forced
    closer collaboration with other team members. I have noticed that data scientists
    are increasingly **working side-by-side with DevOps and backend engineers** to
    ensure models actually run in production.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到，这种责任的重叠迫使与其他团队成员更紧密地合作。我发现数据科学家越来越多地**与DevOps和后端工程师并肩工作**，以确保模型实际上在生产中运行。
- en: A [study found](https://venturebeat.com/ai/why-do-87-of-data-science-projects-never-make-it-into-production/)
    that **87%** of machine learning solutions fail to make it out of the lab without
    teams coordinating in an efficient way.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 一项[研究发现](https://venturebeat.com/ai/why-do-87-of-data-science-projects-never-make-it-into-production/)，**87%**的机器学习解决方案在没有团队以有效方式协调的情况下无法从实验室中走出。
- en: Over the last years, companies have recognized the need for collaboration. In
    fact, the need for **MLOps** best practices have come to life to bridge this gap
    between data scientists and DevOps.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，公司已经认识到协作的需求。事实上，对**MLOps**最佳实践的需求已经出现，以弥合数据科学家和DevOps之间的差距。
- en: Biggest Challenges So Far
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 到目前为止最大的挑战
- en: I’m not gonna lie, this journey has been challenging. Everyone must be aware
    of the **imposter’s syndrome**, and I have certainly suffered from it as well.
    I guess it disappears over time as I feel I add value to the projects I participate
    in.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会撒谎，这段旅程充满了挑战。每个人都必须意识到**冒名顶替综合症**，我当然也深受其害。我想随着时间的推移，当我感觉我为参与的项目增加了价值时，这种感觉就会消失。
- en: Right when I started to work as an AI Engineer, the **biggest challenge** was
    to get used to new tools, and to use them all together. As I was assigned an important
    task that only I was working on (the MLOps template one), I felt I had suddenly
    a lot of responsibility. I had to quickly learn the YAML language, Github Actions
    and how they connect to Azure.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始作为AI工程师工作时，**最大的挑战**是适应新工具，并将它们全部结合起来使用。由于我被分配了一个只有我一个人在做的（MLOps模板）重要任务，我突然感到责任重大。我必须快速学习YAML语言、GitHub
    Actions以及它们如何连接到Azure。
- en: Since I was really into **MLOps**, I ended up taking on the role of **system
    architect** in a few projects. I was responsible for figuring out how all the
    **pieces would fit and work together**, and then explaining it clearly to my managers.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我对**MLOps**非常感兴趣，我在几个项目中承担了**系统架构师**的角色。我负责弄清楚所有**部件如何配合并协同工作**，然后清楚地向我的经理解释。
- en: I was definitely not used to these responsibilities and roles, but over time
    I’ve grown more confident in handling them.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我确实不习惯这些职责和角色，但随着时间的推移，我在处理它们方面变得更加自信。
- en: Tips to transition from DS to AI Engineering
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从DS过渡到AI工程的技巧
- en: I would say that the first step to become an AI Engineer is to start by being
    **interested** and **curious** about how the big picture of AI works. **This is
    how I started.**
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以说，成为AI工程师的第一步是开始对AI的整体运作**感兴趣**和**好奇**。**这就是我开始的途径。**
- en: This is how I started!
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我开始的原因！
- en: 'I started by asking myself: How will this model actually go **live** to the
    users? How will it add **value**? How does the **databases** work, and how can
    we fetch the data in production? How can I make sure that in 6 months this model
    still works? How can I make sure that my model will be as **accurate** locally
    as in production?'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先问自己：这个模型将如何真正地**投入使用**给用户？它将如何**增值**？数据库是如何工作的，我们如何在生产中获取数据？我如何确保6个月后这个模型仍然有效？我如何确保我的模型在本地和在生产中一样**准确**？
- en: Then, I started **reading** articles online and LinkedIn posts as well, before
    I transitioned to AI Engineering.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我在转向AI工程之前，开始**阅读**在线文章和LinkedIn帖子。
- en: There is a huge amount of **useful content online**, for free. I also started
    taking some **online courses** so my skills become more solid.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在线上有大量的**有用内容**，都是免费的。我也开始参加一些**在线课程**，这样我的技能变得更加扎实。
- en: If you are in a data science role, you could **ask your manager** to start contributing
    to **production** code in your team, or to include you in the **meetings** with
    the AI Engineers. From my experience, managers always like employees that want
    to learn more.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你处于数据科学角色，你可以**向你的经理**提出开始为团队中的**生产代码**做出贡献，或者让你参加与AI工程师的**会议**。根据我的经验，经理们总是喜欢想要学习更多的员工。
- en: Then, you can **learn online** about GitHub Actions, Docker, and Azure/AWS.
    Learn about important **production metrics** like latency, uptime, monitoring
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以**在线学习**GitHub Actions、Docker和Azure/AWS。了解重要的**生产指标**，如延迟、正常运行时间、监控。
- en: This is a very short **roadmap**, I will leave the rest of the tips for the
    next article 😉.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常简短的**路线图**，我将把剩下的建议留到下一篇文章中😉。
- en: Final Word
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的话
- en: '**My Mindset Shifted: Why AI Engineers Must Think Like Devs**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**我的思维发生了转变：为什么AI工程师必须像开发者一样思考**'
- en: 'To transition to an AI Engineering role, it is important to think about the
    **big picture** of a ML lifecycle: that is, to make sure the model will actually
    **work**, create **impact** and add **value** to the company.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 要转型为AI工程角色，重要的是要考虑机器学习生命周期的**整体图景**：也就是说，确保模型实际上**能够工作**，创造**影响**并为公司**增值**。
- en: What does this mean?
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着什么？
- en: It means taking into account, during the whole lifecycle, how the model will
    be **integrated** into real-world systems — how it will be deployed, monitored,
    scaled, and maintained over time.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着在整个生命周期中考虑模型如何集成到现实世界的系统中——它将如何部署、监控、扩展和维护。
- en: 'It means thinking **beyond notebooks** and training accuracy, and **asking
    questions** like: *Where will this model run? How do we update it safely? What
    happens if the input data shifts next month?*'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着要**超越笔记本**和训练精度，并提出像这样的问题：*这个模型将在哪里运行？我们如何安全地更新它？如果下个月输入数据发生变化会发生什么？*
- en: 'For those entering or transitioning within the AI space, remember: you **don’t
    need to master** **everything**, but you do need to understand how your **work
    fits** into the larger picture of the ML lifecycle.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些进入或正在转型AI领域的人来说，请记住：你**不需要掌握**一切，但你确实需要了解你的**工作如何融入**机器学习生命周期的整体图景。
- en: The deeper your empathy for the “other side” of the pipeline, the more impact
    you’ll have.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你对“管道另一端”的同理心越深，你的影响力就越大。
- en: As you noticed through this article, **transitioning to AI Engineering** for
    me has been about **working** on, **learning** about and **owning** the entire
    **ML lifecycle**, not just the model training.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在本文中注意到的那样，对我而言，**转向AI工程**意味着**工作**在、**学习**关于以及**拥有**整个**机器学习生命周期**，而不仅仅是模型训练。
- en: In my past role as a data scientist, I was performing traditional **DS** tasks
    like EDA, anomaly detection, data wrangling, model development and packaging.
    Indeed, it was directly connected to what I had learned in university.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在我过去的数据科学家角色中，我执行了传统的**数据科学**任务，如EDA、异常检测、数据处理、模型开发和打包。确实，这与我在大学学到的直接相关。
- en: As an AI Engineer, I feel my daily tasks are a **blend of both roles.** I still
    explore and clean data, but I feel I need to **think like a dev**, so I am sure
    the models work in production and maintained over time.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名AI工程师，我觉得我的日常工作是**两种角色的结合**。我仍然探索和清理数据，但我感觉我需要**像开发者一样思考**，以确保模型在生产环境中运行并随着时间的推移得到维护。
- en: 'Definitely one of the biggest **mindset shifts** was learning how to ship code
    ready for production and also to develop a **mindset** of **automation**: automate
    installations, testing, deployment, monitoring.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的**思维转变**之一是学习如何将代码部署到生产环境中，以及培养一种**自动化**的**思维模式**：自动化安装、测试、部署、监控。
- en: It has been an interesting journey so far, that I intend to document and share
    further on.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，这已经是一次有趣的旅程，我打算进一步记录和分享。
- en: Thank you for reading! Hope you found this post useful.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！希望你觉得这篇文章有用。
- en: '* * *'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔔 One more thing!
  id: totrans-110
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🔔 再说一件事！
- en: I also write a free newsletter, [**Sara’s AI Automation Digest**](https://saranfn.substack.com/),
    where I share monthly insights, tools, and behind-the-scenes takes on AI, automation,
    and how it’s transforming the way we work.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我还写了一个免费的通讯简报，[**Sara的AI自动化摘要**](https://saranfn.substack.com/)，在那里我分享每月的见解、工具，以及关于AI、自动化以及它如何改变我们工作方式的幕后信息。
- en: Subscribe now and get access to my [**FREE AI Tools Library** ](https://saranfn.substack.com/)— a
    curated Notion database of 20+ AI tools with real-world use cases, features, and
    limitations.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在订阅并获取对我的[**免费AI工具库**](https://saranfn.substack.com/)的访问权限——这是一个包含20多个具有实际用例、功能和限制的AI工具的精选Notion数据库。
- en: '* * *'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I offer **mentorship** on career growth and transition [here](https://topmate.io/sara_nobrega).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里提供关于职业成长和转型的**辅导**[链接](https://topmate.io/sara_nobrega)。
