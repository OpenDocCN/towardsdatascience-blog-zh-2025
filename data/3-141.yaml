- en: About Towards Data Science
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于《数据科学之路》
- en: 原文：[https://towardsdatascience.com/about-towards-data-science-d691af11cc2f/](https://towardsdatascience.com/about-towards-data-science-d691af11cc2f/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/about-towards-data-science-d691af11cc2f/)'
- en: Towards Data Science started in 2016 as a community-powered hub where data science
    and machine learning practitioners can share their knowledge and ideas with their
    peers – regardless of their location or background. This fundamental goal remains
    the same today.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 《数据科学之路》始于2016年，作为一个由社区驱动的中心，数据科学和机器学习从业者可以与同行分享他们的知识和想法——无论他们的位置或背景如何。这个基本目标至今依然不变。
- en: Over the years, we’ve grown into a publication with hundreds of active authors,
    a team of editors that ensure the quality of the articles we publish, and millions
    of readers and followers across our main site, newsletters, and social channels.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 几年来，我们已经发展成为一个拥有数百位活跃作者、一支确保我们发表文章质量的编辑团队，以及在我们主要网站、通讯和社交媒体渠道上拥有数百万读者和粉丝的出版物。
- en: We’re thrilled to be a leading hub for learning about data science, ML, AI,
    and adjacent topics, especially as developments in these fields affect an increasing
    number of people, communities, and societies around the world. We’re equally proud
    to be a welcoming and inclusive community, where authors and readers from all
    over the world, representing a wide range of opinions and experience levels, come
    together with a shared sense of mutual respect and a focus on professional and
    intellectual growth.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们非常高兴成为数据科学、机器学习、人工智能和相邻主题学习的领先中心，尤其是在这些领域的发展影响到了世界上越来越多的个人、社区和社会。我们同样自豪地成为了一个欢迎和包容的社区，在这里，来自世界各地的作者和读者，代表广泛的观点和经验水平，汇聚在一起，共同拥有相互尊重的感觉，并专注于专业和智力成长。
- en: In 2024, Insight Media Group [acquired the Towards Data Science publication](https://towardsdatascience.com/community-announcement-insight-media-group-llc-acquires-towards-data-science-publication-fc1adcb3e378/).
    The following year we [launched our own self-hosted](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)
    website and contributor platform, enabling us to host and pay contributors.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在2024年，洞察媒体集团[收购了《数据科学之路》出版物](https://towardsdatascience.com/community-announcement-insight-media-group-llc-acquires-towards-data-science-publication-fc1adcb3e378/)。第二年，我们[推出了我们自己的自托管网站和贡献者平台](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)，使我们能够托管并支付贡献者的费用。
- en: We’ve evolved in many ways since our early days, and we’re sure that we’ll continue
    to grow alongside our community. What will never change is our mission to share
    the best writing we can find on the topics we cover. Thank you for joining us
    on this journey.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我们的早期以来，我们已经以许多方式发展，我们确信我们将继续与我们的社区一起成长。永远不会改变的是，我们分享我们所能找到的关于我们涵盖主题的最好写作的使命。感谢您加入我们的旅程。
- en: 'For those of you who’d like to become more actively involved with our publication,
    we’re always happy to consider work from new authors who have insight and expertise
    to share around our core focus areas: data science, machine learning, AI, and
    related programming topics.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些希望更积极地参与我们出版物的人来说，我们总是愿意考虑那些有见解和专业知识与我们核心关注领域（数据科学、机器学习、人工智能和相关编程主题）分享的新作者的作品。
- en: You’ll find all the details and guidelines about submitting your work on the
    [Write for Towards Data Science page](https://towardsdatascience.com/questions-96667b06af5/).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[为《数据科学之路》投稿页面](https://towardsdatascience.com/questions-96667b06af5/)上找到有关提交您作品的详细信息和指南。
- en: If you have any questions, feel free to reach out at [[email protected]](/cdn-cgi/l/email-protection#54373b3a20263d3621203b2614203b23352630273035203527373d313a37317a373b39).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有任何问题，请随时通过[[email protected]](/cdn-cgi/l/email-protection#54373b3a20263d3621203b2614203b23352630273035203527373d313a37317a373b39)联系我们。
- en: If you’re interested in advertising opportunities, [learn more here](https://contact.towardsdatascience.com/advertise-with-towards-data-science).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对广告机会感兴趣，[了解更多信息](https://contact.towardsdatascience.com/advertise-with-towards-data-science)。
- en: For general questions and inquiries, you can contact us at [[email protected]](/cdn-cgi/l/email-protection#bbcbced9d7d2d8dacfd2d4d5fbcfd4ccdac9dfc8dfdacfdac8d8d2ded5d8de95d8d4d6).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一般问题和咨询，您可以通过[[email protected]](/cdn-cgi/l/email-protection#bbcbced9d7d2d8dacfd2d4d5fbcfd4ccdac9dfc8dfdacfdac8d8d2ded5d8de95d8d4d6)联系我们。
