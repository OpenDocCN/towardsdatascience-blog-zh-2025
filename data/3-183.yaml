- en: '1\. Basics: What is RAG? What is fine-tuning?'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 基础知识：什么是RAG？什么是微调？
- en: Large Language Models (LLMs) such as ChatGPT from OpenAI, Gemini from Google,
    Claude from Anthropics or Deepseek are incredibly powerful and have established
    themselves in everyday work over an extremely short time.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLM）如OpenAI的ChatGPT、Google的Gemini、Anthropics的Claude或Deepseek都极其强大，并在极短的时间内确立了在日常工作中的地位。
- en: 'One of their biggest limitations is that their knowledge is limited to training.
    A model that was trained in 2024 does not know events from 2025\. If we ask the
    4o model from ChatGPT who the current US President is and give the clear instruction
    that the Internet should not be used, we see that it cannot answer this question
    with certainty:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 它们最大的局限性之一是它们的认知仅限于训练。2024年训练的模型不知道2025年的事件。如果我们要求ChatGPT的4o模型回答当前美国总统是谁，并给出明确的指示不要使用互联网，我们会看到它无法确定地回答这个问题：
- en: '![](../Images/dfaa869c170e92d274a5ff80d1838554.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dfaa869c170e92d274a5ff80d1838554.png)'
- en: Screenshot taken by the author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: In addition, the models cannot easily access company-specific information, such
    as internal guidelines or current technical documentation.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，模型难以访问公司特定的信息，例如内部指南或当前的技术文档。
- en: This is exactly where RAG and fine-tuning come into play.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是RAG和微调发挥作用的地方。
- en: 'Both methods make it possible to adapt an LLM to specific requirements:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种方法使得将LLM适应特定需求成为可能：
- en: RAG — The model remains the same, the input is improved
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAG — 模型保持不变，输入得到改进
- en: An LLM with Retrieval Augmented Generation (RAG) remains unchanged.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 具有检索增强生成（RAG）的LLM保持不变。
- en: However, it gains access to an external knowledge source and can therefore retrieve
    information that is not stored in its model parameters. RAG extends the model
    in the inference phase by using external data sources to provide the latest or
    specific information. The inference phase is the moment when the model generates
    an answer.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它获得了访问外部知识源的权利，因此可以检索模型参数中未存储的信息。RAG通过使用外部数据源在推理阶段扩展模型，以提供最新或特定信息。推理阶段是模型生成答案的时刻。
- en: This allows the model to stay up to date without retraining.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得模型无需重新训练就能保持最新状态。
- en: '**How does it work?**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**它是如何工作的？**'
- en: A user question is asked.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户提出一个问题。
- en: The query is converted into a vector representation.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查询被转换为向量表示。
- en: A retriever searches for relevant text sections or data records in an external
    data source. The documents or FAQS are often stored in a vector database.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检索器在外部数据源中搜索相关的文本部分或数据记录。文档或常见问题解答（FAQS）通常存储在向量数据库中。
- en: The content found is transferred to the model as additional context.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到的内容被转移到模型中作为额外的上下文。
- en: The LLM generates its answer on the basis of the retrieved and current information.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLM基于检索到的和当前的信息生成其答案。
- en: The key point is that the LLM itself remains unchanged and the internal weights
    of the LLM remain the same.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 关键点在于LLM本身保持不变，LLM的内部权重也保持不变。
- en: Let’s assume a company uses an internal AI-powered support chatbot.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 假设一家公司使用一个内部人工智能（AI）驱动的支持聊天机器人。
- en: The chatbot helps employees to answer questions about company policies, IT processes
    or HR topics. If you would ask ChatGPT a question about your company (e.g. How
    many vacation days do I have left?), the model would logically not give you back
    a meaningful answer. A classic LLM without RAG would know nothing about the company
    – it has never been trained with this data.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人帮助员工回答有关公司政策、IT流程或人力资源（HR）主题的问题。如果你向ChatGPT提出关于你公司的问题（例如，我还有多少带薪休假？），模型从逻辑上不会给你一个有意义的答案。没有RAG的经典LLM对公司一无所知——它从未用这些数据进行过训练。
- en: 'This changes with RAG: The chatbot can search an external database of current
    company policies for the most relevant documents (e.g. PDF files, wiki pages or
    internal FAQs) and provide specific answers.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这与RAG不同：聊天机器人可以搜索包含最新公司政策的现有外部数据库中最相关的文档（例如PDF文件、维基百科页面或内部FAQS），并提供具体的答案。
- en: RAG works similarly as when we humans look up specific information in a library
    or Google search – but in real-time.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: RAG的工作方式与人类在图书馆或Google搜索中查找特定信息时相似——但这是实时的。
- en: A student who is asked about the meaning of CRUD quickly looks up the Wikipedia
    article and answers Create, Read, Update and Delete – just like a RAG model retrieves
    relevant documents. This process allows both humans and AI to provide informed
    answers without memorizing everything.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当学生被问及CRUD的含义时，会迅速查找维基百科文章并回答创建（Create）、读取（Read）、更新（Update）和删除（Delete）——就像RAG模型检索相关文档一样。这个过程允许人类和AI提供有根据的答案，而无需记住所有内容。
- en: And this makes RAG a powerful tool for keeping responses accurate and current.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得RAG成为保持回答准确和及时的强大工具。
- en: '![](../Images/ec0c3bb440ebce988e0d063a08b61280.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ec0c3bb440ebce988e0d063a08b61280.png)'
- en: '*Own visualization by the author*'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '*作者自绘可视化*'
- en: Fine-tuning — The model is trained and stores knowledge permanently
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微调——模型被训练并永久存储知识
- en: Instead of looking up external information, an LLM can also be directly updated
    with new knowledge through fine-tuning.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 除了查找外部信息外，LLM还可以通过微调直接更新新知识。
- en: Fine-tuning is used during the training phase to provide the model with additional
    domain-specific knowledge. An existing base model is further trained with specific
    new data. As a result, it “learns” specific content and internalizes technical
    terms, style or certain content, but retains its general understanding of language.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 微调在训练阶段使用，为模型提供额外的特定领域知识。现有基础模型进一步使用特定新数据进行训练。因此，它“学习”了特定内容，并内化了技术术语、风格或某些内容，但保留了其对语言的总体理解。
- en: This makes fine-tuning an effective tool for customizing LLMs to specific needs,
    data or tasks.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得微调成为定制LLM以满足特定需求、数据或任务的有效工具。
- en: '**How does this work?**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**这是如何工作的？**'
- en: The LLM is trained with a specialized data set. This data set contains specific
    knowledge about a domain or a task.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLM使用专门的数据集进行训练。该数据集包含特定领域或任务的具体知识。
- en: The model weights are adjusted so that the model stores the new knowledge directly
    in its parameters.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型权重被调整，以便模型直接将其参数中存储新知识。
- en: After training, the model can generate answers without the need for external
    sources.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练后，模型可以在不需要外部来源的情况下生成答案。
- en: Let’s now assume we want to use an LLM that provides us with expert answers
    to legal questions.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在假设我们想要使用一个LLM，它能为我们提供法律问题的专家答案。
- en: To do this, this LLM is trained with legal texts so that it can provide precise
    answers after fine-tuning. For example, it learns complex terms such as “intentional
    tort” and can name the appropriate legal basis in the context of the relevant
    country. Instead of just giving a general definition, it can cite relevant laws
    and precedents.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，这个LLM需要用法律文本进行训练，以便在微调后提供精确的答案。例如，它学习复杂的术语，如“故意侵权”，并能在相关国家的背景下命名适当的法律依据。它不仅提供一般定义，还可以引用相关的法律和先例。
- en: This means that you no longer just have a general LLM like GPT-4o at your disposal,
    but a useful tool for legal decision-making.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你不再只有像GPT-4o这样的通用LLM，而是一个用于法律决策的有用工具。
- en: If we look again at the analogy with humans, fine-tuning is comparable to having
    internalized knowledge after an intensive learning phase.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们再次将类比应用于人类，微调可以与经过密集学习阶段后内化的知识相提并论。
- en: After this learning phase, a computer science student knows that the term CRUD
    stands for Create, Read, Update, Delete. He or she can explain the concept without
    needing to look it up. The general vocabulary has been expanded.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个学习阶段之后，计算机科学学生知道CRUD这个术语代表创建、读取、更新、删除。他或她可以解释这个概念，而无需查找。通用词汇已经扩展。
- en: This internalization allows for faster, more confident responses—just like a
    fine-tuned LLM.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这种内化允许更快、更自信的回应——就像微调的LLM一样。
- en: 2\. Differences between RAG and fine-tuning
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. RAG与微调的区别
- en: Both methods improve the performance of an LLM for specific tasks.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种方法都提高了LLM在特定任务上的性能。
- en: Both methods require well-prepared data to work effectively.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种方法都需要准备良好的数据才能有效工作。
- en: And both methods help to reduce hallucinations – the generation of false or
    fabricated information.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种方法都有助于减少幻觉——即生成虚假或编造的信息。
- en: 'But if we look at the table below, we can see the differences between these
    two methods:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我们看下表，我们可以看到这两种方法之间的差异：
- en: RAG is particularly flexible because the model can always access up-to-date
    data without having to be retrained. It requires less computational effort in
    advance, but needs more resources while answering a question (inference). The
    latency can also be higher.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: RAG特别灵活，因为模型可以始终访问最新数据，而无需重新训练。它需要较少的预先计算努力，但在回答问题时（推理）需要更多资源。延迟也可能更高。
- en: Fine-tuning, on the other hand, offers faster inference times because the knowledge
    is stored directly in the model weights and no external search is necessary. The
    major disadvantage is that training is time-consuming and expensive and requires
    large amounts of high-quality training data.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，微调提供了更快的推理时间，因为知识直接存储在模型权重中，无需外部搜索。主要的缺点是训练耗时且昂贵，需要大量高质量的训练数据。
- en: RAG provides the model with tools to look up knowledge when needed without changing
    the model itself, whereas fine-tuning stores the additional knowledge in the model
    with adjusted parameters and weights.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: RAG为模型提供工具，在需要时查找知识，而无需改变模型本身，而微调则将额外知识存储在带有调整参数和权重的模型中。
- en: '![](../Images/302e56023660a322f7b32c6279cad393.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/302e56023660a322f7b32c6279cad393.png)'
- en: Own visualization by the author
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 作者自己的可视化
- en: 3\. Ways to build a RAG model
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 构建RAG模型的方法
- en: A popular framework for building a Retrieval Augmented Generation (RAG) pipeline
    is LangChain. This framework facilitates the linking of LLM calls with a retrieval
    system and makes it possible to retrieve information from external sources in
    a targeted manner.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 构建检索增强生成（RAG）管道的流行框架是LangChain。该框架简化了LLM调用与检索系统的链接，并使从外部来源有针对性地检索信息成为可能。
- en: How does RAG work technically?
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAG是如何在技术上工作的？
- en: '**1\. Query embedding**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 查询嵌入**'
- en: In the first step, the user request is converted into a vector using an embedding
    model. This is done, for example, with text-embedding-ada-002 from OpenAI or all-MiniLM-L6-v2
    from Hugging Face.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一步中，用户请求通过嵌入模型被转换为一个向量。例如，可以使用OpenAI的text-embedding-ada-002或Hugging Face的all-MiniLM-L6-v2。
- en: This is necessary because vector databases do not search through conventional
    texts, but instead calculate semantic similarities between numerical representations
    (embeddings). By converting the user query into a vector, the system can not only
    search for exactly matching terms, but also recognize concepts that are similar
    in content.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为向量数据库不是通过传统文本进行搜索，而是计算数值表示（嵌入）之间的语义相似性。通过将用户查询转换为向量，系统不仅可以搜索精确匹配的术语，还可以识别内容上相似的概念。
- en: '**2\. Search in the vector database**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 在向量数据库中进行搜索**'
- en: The resulting query vector is then compared with a vector database. The aim
    is to find the most relevant information to answer the question.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将生成的查询向量与向量数据库进行比较。目标是找到回答问题的最相关信息。
- en: This similarity search is carried out using Approximate Nearest Neighbors (ANN)
    algorithms. Well-known open source tools for this task are, for example, FAISS
    from Meta for high-performance similarity searches in large data sets or ChromaDB
    for small to medium-sized retrieval tasks.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这种相似性搜索是使用近似最近邻（ANN）算法进行的。为此任务而著名的开源工具，例如，Meta的FAISS，用于在大数据集中进行高性能的相似性搜索，或ChromaDB，用于小型到中型检索任务。
- en: '**3\. Insertion into the LLM context**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 插入到LLM上下文中**'
- en: In the third step, the retrieved documents or text sections are integrated into
    the prompt so that the LLM generates its response based on this information.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三步，检索到的文档或文本部分被整合到提示中，以便LLM根据这些信息生成其响应。
- en: '**4\. Generation of the response**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 生成响应**'
- en: The LLM now combines the information received with its general language vocabulary
    and generates a context-specific response.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，LLM将接收到的信息与其通用语言词汇结合，并生成一个上下文特定的响应。
- en: 'An alternative to LangChain is the Hugging Face Transformer Library, which
    provides specially developed RAG classes:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain的替代方案是Hugging Face Transformer库，它提供了专门开发的RAG类：
- en: ‘RagTokenizer’ tokenizes the input and the retrieval result. The class processes
    the text entered by the user and the retrieved documents.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ‘RagTokenizer’对输入和检索结果进行分词。该类处理用户输入的文本和检索到的文档。
- en: The ‘RagRetriever’ class performs the semantic search and retrieval of relevant
    documents from the predefined knowledge base.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ‘RagRetriever’类执行从预定义的知识库中检索相关文档的语义搜索和检索。
- en: The ‘RagSequenceForGeneration’ class takes the documents provided, integrates
    them into the context and transfers them to the actual language model for answer
    generation.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ‘RagSequenceForGeneration’类接受提供的文档，将它们整合到上下文中，并将它们传输到实际的语言模型以生成答案。
- en: 4\. Options for fine-tuning a model
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 微调模型的选项
- en: While an LLM with RAG uses external information for the query, with fine-tuning
    we change the model weights so that the model permanently stores the new knowledge.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当LLM使用RAG时，它使用外部信息进行查询，而在微调中，我们改变模型权重，以便模型永久存储新知识。
- en: How does fine-tuning work technically?
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微调在技术上是如何工作的？
- en: '**1\. Preparation of the training data**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 准备训练数据**'
- en: Fine-tuning requires a high-quality collection of data. This collection consists
    of inputs and the desired model responses. For a chatbot, for example, these can
    be question-answer pairs. For medical models, this could be clinical reports or
    diagnostic data. For a legal AI, these could be legal texts and judgments.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 微调需要一个高质量的数据集。这个集合包括输入和期望的模型响应。例如，对于聊天机器人，这些可以是问答对。对于医疗模型，这可能是临床报告或诊断数据。对于法律AI，这些可能是法律文本和判决。
- en: 'Let’s take a look at an example: If we look at the [documentation of OpenAI](https://platform.openai.com/docs/guides/fine-tuning),
    we see that these models use a standardized chat format with roles (system, user,
    assistant) during fine-tuning. The data format of these question-answer pairs
    is JSONL and looks like this, for example:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个例子：如果我们查看[OpenAI的文档](https://platform.openai.com/docs/guides/fine-tuning)，我们会看到这些模型在微调期间使用带有角色（系统、用户、助手）的标准聊天格式。这些问答对的数据格式是JSONL，例如看起来是这样的：
- en: '[PRE0]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Other models use other data formats such as CSV, JSON or PyTorch datasets.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 其他模型使用其他数据格式，例如CSV、JSON或PyTorch数据集。
- en: '**2\. Selection of the base model**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 基础模型的选择**'
- en: We can use a pre-trained LLM as a starting point. These can be closed-source
    models such as GPT-3.5 or GPT-4 via OpenAI API or open-source models such as DeepSeek,
    LLaMA, Mistral or Falcon or T5 or FLAN-T5 for NLP tasks.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用预训练的LLM作为起点。这些可以是OpenAI API中的闭源模型，如GPT-3.5或GPT-4，或开源模型，如DeepSeek、LLaMA、Mistral或Falcon或T5或FLAN-T5，用于NLP任务。
- en: '**3\. Training of the model**'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 模型的训练**'
- en: Fine-tuning requires a lot of computing power, as the model is trained with
    new data to update its weights. Especially large models such as GPT-4 or LLaMA
    65B require powerful GPUs or TPUs.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 微调需要大量的计算能力，因为模型使用新数据来更新其权重。特别是像GPT-4或LLaMA 65B这样的大型模型，需要强大的GPU或TPU。
- en: To reduce the computational effort, there are optimized methods such as LoRA
    (Low-Rank Adaption), where only a small number of additional parameters are trained,
    or QLoRA (Quantized LoRA), where quantized model weights (e.g. 4-bit) are used.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减少计算工作量，有如LoRA（低秩调整）等优化方法，其中只训练少量额外的参数，或者QLoRA（量化LoRA），其中使用量化模型权重（例如4位）。
- en: '**4\. Model deployment & use**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 模型部署与使用**'
- en: Once the model has been trained, we can deploy it locally or on a cloud platform
    such as Hugging Face Model Hub, AWS or Azure.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练完成后，我们可以将其部署在本地或云平台，如Hugging Face模型中心、AWS或Azure。
- en: 5\. When is RAG recommended? When is fine-tuning recommended?
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 何时推荐使用RAG？何时推荐微调？
- en: 'RAG and fine-tuning have different advantages and disadvantages and are therefore
    suitable for different use cases:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: RAG和微调具有不同的优缺点，因此适用于不同的用例：
- en: RAG is particularly suitable when content is updated dynamically or frequently.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: RAG特别适用于内容动态更新或频繁更新的情况。
- en: For example, in FAQ chatbots where information needs to be retrieved from a
    knowledge database that is constantly expanding. Technical documentation that
    is regularly updated can also be efficiently integrated using RAG – without the
    model having to be constantly retrained.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在需要从不断扩展的知识数据库中检索信息的FAQ聊天机器人中。定期更新的技术文档也可以通过RAG有效地集成，而无需不断重新训练模型。
- en: 'Another point is resources: If limited computing power or a smaller budget
    is available, RAG makes more sense as no complex training processes are required.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 另一点是资源：如果可用的计算能力有限或预算较小，RAG更有意义，因为不需要复杂的训练过程。
- en: Fine-tuning, on the other hand, is suitable when a model needs to be tailored
    to a specific company or industry.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，微调适用于模型需要针对特定公司或行业定制的情况。
- en: The response quality and style can be improved through targeted training. For
    example, the LLM can then generate medical reports with precise terminology.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 通过有针对性的训练，可以提高响应质量和风格。例如，LLM可以生成具有精确术语的医疗报告。
- en: 'The basic rule is: RAG is used when the knowledge is too extensive or too dynamic
    to be fully integrated into the model, while fine-tuning is the better choice
    when consistent, task-specific behavior is required.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 基本规则是：当知识过于广泛或动态，无法完全集成到模型中时，使用RAG；而当需要一致的任务特定行为时，微调是更好的选择。
- en: And then there’s RAFT — the magic of combination
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 然后是RAFT——组合的魔法
- en: What if we combine the two?
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将两者结合起来会怎样？
- en: That’s exactly what happens with [Retrieval Augmented Fine-Tuning (RAFT)](https://techcommunity.microsoft.com/blog/aiplatformblog/raft-a-new-way-to-teach-llms-to-be-better-at-rag/4084674).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是[检索增强微调（RAFT）](https://techcommunity.microsoft.com/blog/aiplatformblog/raft-a-new-way-to-teach-llms-to-be-better-at-rag/4084674)所发生的情况。
- en: The model is first enriched with domain-specific knowledge through fine-tuning
    so that it understands the correct terminology and structure. The model is then
    extended with RAG so that it can integrate specific and up-to-date information
    from external data sources. This combination ensures both deep expertise and real-time
    adaptability.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 模型首先通过微调丰富特定领域的知识，以便理解正确的术语和结构。然后通过RAG扩展，使其能够从外部数据源整合特定和最新的信息。这种组合确保了深度专业知识和实时适应性。
- en: Companies use the advantages of both methods.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 公司利用两种方法的优势。
- en: Final thoughts
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Both methods—RAG and fine-tuning—extend the capabilities of a basic LLM in different
    ways.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种方法——RAG和微调——以不同的方式扩展了基本LLM的能力。
- en: Fine-tuning specializes the model for a specific domain, while RAG equips it
    with external knowledge. The two methods are not mutually exclusive and can be
    combined in hybrid approaches. Looking at computational costs, fine-tuning is
    resource-intensive upfront but efficient during operation, whereas RAG requires
    fewer initial resources but consumes more during use.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 微调针对特定领域专门化模型，而RAG则为其配备外部知识。这两种方法不是相互排斥的，可以结合在混合方法中。从计算成本来看，微调在初期资源密集，但在运行时效率高，而RAG则需要较少的初始资源，但在使用时消耗更多。
- en: RAG is ideal when knowledge is too vast or dynamic to be integrated directly
    into the model. Fine-tuning is the better choice when stability and consistent
    optimization for a specific task are required. Both approaches serve distinct
    but complementary purposes, making them valuable tools in AI applications.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 当知识过于庞大或动态，无法直接集成到模型中时，RAG 是理想的选择。当需要针对特定任务进行稳定性和一致优化时，微调是更好的选择。这两种方法服务于不同的但互补的目的，使它们成为人工智能应用中的宝贵工具。
- en: On my [Substack](https://sarahleaschrch.substack.com/), I regularly write summaries
    about the published articles in the fields of Tech, Python, Data Science, Machine
    Learning and AI. If you’re interested, take a look or subscribe.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的 [Substack](https://sarahleaschrch.substack.com/) 上，我定期撰写关于科技、Python、数据科学、机器学习和人工智能领域已发布文章的总结。如果你感兴趣，可以查看或订阅。
