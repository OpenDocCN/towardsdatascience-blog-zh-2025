- en: How to Make Your LLM More Accurate with RAG & Fine-Tuning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用RAG和微调使你的LLM更准确
- en: 原文：[https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/](https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/](https://towardsdatascience.com/how-to-make-your-llm-more-accurate-with-rag-fine-tuning/)
- en: Imagine studying a module at university for a semester. At the end, after an
    intensive learning phase, you take an exam – and you can recall the most important
    concepts without looking them up.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下在大学里学习一个模块一个学期。在密集的学习阶段结束后，你参加考试——你可以在不查找的情况下回忆起最重要的概念。
- en: 'Now imagine the second situation: You are asked a question about a new topic.
    You don’t know the answer straight away, so you pick up a book or browse a wiki
    to find the right information for the answer.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象第二种情况：有人问你一个关于新主题的问题。你立刻不知道答案，于是你拿起一本书或者浏览维基百科来找到正确的信息。
- en: 'These two analogies represent two of the most important methods for improving
    the basic model of an LLM or adapting it to specific tasks and areas: **Retrieval
    Augmented Generation (RAG) and Fine-Tuning. **'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个类比代表了两种最重要的方法，用于改进LLM的基本模型或将其适应特定任务和领域：**检索增强生成（RAG）和微调**。
- en: But which example belongs to which method?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但哪个例子属于哪种方法？
- en: 'That’s exactly what I’ll explain in this article: After that, you’ll know what
    RAG and fine-tuning are, the most important differences and which method is suitable
    for which application.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我将在本文中解释的内容：之后，你就会知道什么是RAG和微调，最重要的区别以及哪种方法适用于哪种应用。
- en: Let’s dive in!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨！
- en: '***Table of content***s'
