- en: How To Generate GIFs from 3D Models with Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用Python从3D模型生成GIF
- en: 原文：[https://towardsdatascience.com/how-to-generate-gifs-from-3d-models-with-python/](https://towardsdatascience.com/how-to-generate-gifs-from-3d-models-with-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-generate-gifs-from-3d-models-with-python/](https://towardsdatascience.com/how-to-generate-gifs-from-3d-models-with-python/)
- en: As a data scientist, you know that effectively communicating your insights is
    as important as the insights themselves.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据科学家，你知道有效地传达你的见解与见解本身一样重要。
- en: But how do you communicate over **3D** **data**?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但你如何传达3D数据呢？
- en: 'I can bet most of us have been there: you spend days, weeks, maybe even months
    meticulously collecting and processing 3D data. Then comes the moment to share
    your findings, whether it’s with clients, colleagues, or the broader scientific
    community. You throw together a few static screenshots, but they just don’t capture
    the essence of your work. The subtle details, the spatial relationships, the sheer
    scale of the data—it all gets lost in translation.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我敢打赌，我们大多数人都有过这样的经历：你花费数天、数周，甚至数月的时间，一丝不苟地收集和处理3D数据。然后到了分享你的发现的时候，无论是与客户、同事还是更广泛的科学界。你匆匆拼凑了几张静态截图，但它们根本无法捕捉到你工作的精髓。那些细微的细节、空间关系以及数据的规模——所有这些都丢失在翻译过程中。
- en: '![](../Images/d1c6637fa873064431859a95b5e1400f.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d1c6637fa873064431859a95b5e1400f.png)'
- en: Comparing 3D Data Communication Methods. © [F. Poux](https://learngeodata.eu/)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 比较三维数据通信方法。© [F. Poux](https://learngeodata.eu/)
- en: Or maybe you’ve tried using specialized 3D visualization software. But when
    your client uses it, they struggle with clunky interfaces, steep learning curves,
    and restrictive licensing.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，也许你已经尝试过使用专门的3D可视化软件。但当你客户使用它时，他们会因为笨拙的界面、陡峭的学习曲线和限制性的许可而感到困扰。
- en: 'What should be a smooth, intuitive process becomes a frustrating exercise in
    technical acrobatics. It’s an all-too-common scenario: the brilliance of your
    3D data is trapped behind a wall of technical barriers.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 应该是一个流畅、直观的过程，却变成了令人沮丧的技术杂技练习。这是一个过于常见的场景：你3D数据的辉煌被技术壁垒所困。
- en: 'This highlights a common issue: the need to create shareable content that can
    be opened by anyone, i.e., that does not demand specific 3D data science skills.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这突出了一个常见问题：需要创建任何人都可以打开的可分享内容，即不需要特定的3D数据科学技能。
- en: 'Think about it: what is the most used way to share visual information? **Images.**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 想想看：分享视觉信息最常用的方式是什么？**图像**。
- en: But how can we convey the 3D information from a simple 2D image?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们如何从简单的2D图像传达3D信息呢？
- en: 'Well, let us use “first principle thinking”: let us create shareable content
    stacking multiple 2D views, such as GIFs or MP4s, from raw point clouds.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们用“第一性原理思考”：让我们创建可分享的内容，堆叠多个2D视图，例如GIF或MP4，从原始点云中生成。
- en: '![The bread of magic to generate GIF and MP4](../Images/9c5f34be0191bc1c1a76c48cba32d658.png)*The
    bread of magic to generate GIF and MP4\. © [F. Poux](https://learngeodata.eu/)*'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '![生成GIF和MP4的魔法面包](../Images/9c5f34be0191bc1c1a76c48cba32d658.png)*生成GIF和MP4的魔法面包。©
    [F. Poux](https://learngeodata.eu/)*'
- en: This process is critical for presentations, reports, and general communication.
    But generating GIFs and MP4s from 3D data can be complex and time-consuming. I’ve
    often found myself wrestling with the challenge of quickly generating rotating
    GIF or MP4 files from a 3D point cloud, a task that seemed simple enough but often
    spiraled into a time-consuming ordeal.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程对于演示、报告和一般沟通至关重要。但从3D数据生成GIF和MP4可能很复杂且耗时。我经常发现自己在与从3D点云快速生成旋转GIF或MP4文件的挑战作斗争，这个任务看起来很简单，但往往变成了耗时的工作。
- en: Current workflows might lack efficiency and ease of use, and a streamlined process
    can save time and improve data presentation.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的流程可能缺乏效率和易用性，而一个简化的流程可以节省时间并改善数据展示。
- en: Let me share a solution that involves leveraging Python and specific libraries
    to automate the creation of GIFs and MP4s from point clouds (or any 3D dataset
    such as a mesh or a CAD model).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 让我分享一个解决方案，它涉及利用Python和特定的库来自动化从点云（或任何3D数据集，如网格或CAD模型）创建GIF和MP4的过程。
- en: Think about it. You’ve spent hours meticulously collecting and processing this
    3D data. Now, you need to present it in a compelling way for a presentation or
    a report. But how can we be sure it can be integrated into a SaaS solution where
    it is triggered on upload? You try to create a dynamic visualization to showcase
    a critical feature or insight, and yet you’re stuck manually capturing frames
    and stitching them together. How can we automate this process to seamlessly integrate
    it into your existing systems?
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 想想看。您已经花费数小时仔细收集和处理这些3D数据。现在，您需要以引人入胜的方式展示它们，用于演示或报告。但我们如何确保它能够集成到在上传时触发的SaaS解决方案中？您试图创建一个动态的可视化来展示关键功能或见解，但您却陷入了手动捕获帧并拼接它们的困境。我们如何自动化这一过程，使其无缝集成到您现有的系统中？
- en: '![](../Images/631b6e79d074c18c856414e1c9cc157f.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/631b6e79d074c18c856414e1c9cc157f.png)'
- en: An example of a GIF generated with the methodology. © [F. Poux](https://learngeodata.eu/)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 使用该方法生成的GIF示例。© [F. Poux](https://learngeodata.eu/)
- en: If you are new to my (3D) writing world, welcome! We are going on an exciting
    adventure that will allow you to master an essential 3D Python skill. Before diving,
    I like to establish a clear scenario, the **mission brief**.
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果您是新手（3D）写作世界，欢迎！我们将进行一次激动人心的冒险，让您掌握一项重要的3D Python技能。在深入之前，我喜欢建立一个清晰的场景，即**任务简报**。
- en: ''
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Once the scene is laid out, we embark on the Python journey. Everything is
    given. You will see Tips (*🦚**Notes***and* 🌱**Growing***) to help you get the
    most out of this article. Thanks to the*[***3D Geodata Academy***](https://learngeodata.eu/)
    *for supporting the endeavor.*'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*一旦场景布局完成，我们就开始Python之旅。一切皆备。您将看到提示（*🦚**笔记***和* 🌱**成长***）以帮助您充分利用这篇文章。感谢*[***3D
    Geodata Academy***](https://learngeodata.eu/) *对这一努力的支持。*'
- en: '**The Mission 🎯**'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**任务目标 🎯**'
- en: You are working for a new engineering firm, “Geospatial Dynamics,” which wants
    to showcase its cutting-edge LiDAR scanning services. Instead of sending clients
    static point cloud images, you propose to use a new tool, which is a Python script,
    to generate dynamic rotating GIFs of project sites.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 您正在为一家新的工程公司“地理空间动态”工作，该公司希望展示其尖端的激光雷达扫描服务。您不是发送静态点云图像给客户，而是提出使用一个新的工具，即Python脚本，来生成项目现场的动态旋转GIF。
- en: After doing so market research, you found that this can immediately elevate
    their proposals, resulting in a **20%** higher project approval rate. That’s the
    power of visual storytelling.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行市场调研后，您发现这可以立即提高他们的提案质量，从而将项目批准率提高**20%**。这就是视觉叙事的力量。
- en: '![](../Images/df37a7f62715ad9e0bfd851bb7f609a4.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/df37a7f62715ad9e0bfd851bb7f609a4.png)'
- en: The three stages of the mission towards an increase project approval. © [F.
    Poux](https://learngeodata.eu/)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 向提高项目批准率迈进的三阶段任务。© [F. Poux](https://learngeodata.eu/)
- en: On top, you can even imagine a more compelling scenario, where “GeoSpatial Dynamics”
    is able to process point clouds massively and then generate MP4 videos that are
    sent to potential clients. This way, you lower the churn and make the brand more
    memorable.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，您甚至可以想象一个更有吸引力的场景，即“地理空间动态”能够大量处理点云，然后生成发送给潜在客户的MP4视频。这样，您就可以降低流失率，使品牌更具记忆性。
- en: With that in mind, we can start designing a robust framework to answer our mission’s
    goal.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，我们可以开始设计一个强大的框架来回答我们任务的目标。
- en: '**The Framework**'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**框架**'
- en: I remember a project where I had to show a detailed architectural scan to a
    group of investors. The usual still images just could not capture the fine details.
    I desperately needed a way to create a rotating GIF to convey the full scope of
    the design. That is why I’m excited to introduce this Cloud2Gif Python solution.
    With this, you’ll be able to easily generate shareable visualizations for presentations,
    reports, and communication.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得有一个项目，我需要向一群投资者展示详细的建筑扫描。通常的静态图像根本无法捕捉到细微的细节。我迫切需要一种方法来创建旋转GIF，以传达设计的全貌。这就是为什么我对这个Cloud2Gif
    Python解决方案感到兴奋。有了这个，您将能够轻松地为演示、报告和沟通生成可分享的视觉内容。
- en: 'The framework I propose is straightforward yet effective. It takes raw 3D data,
    processes it using Python and the PyVista library, generates a series of frames,
    and stitches them together to create a GIF or MP4 video. The high-level workflow
    includes:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我提出的框架简单而有效。它处理原始3D数据，使用Python和PyVista库进行处理，生成一系列帧，并将它们拼接在一起以创建GIF或MP4视频。高级工作流程包括：
- en: '![](../Images/1a90f899e70f12ac11a6ccb7a4a1d1ed.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1a90f899e70f12ac11a6ccb7a4a1d1ed.png)'
- en: The various stages of the framework in this article. © [F. Poux](https://learngeodata.eu/)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 本文中所提到的框架的各个阶段。© [F. Poux](https://learngeodata.eu/)
- en: 1\. Loading the 3D data (mesh with texture).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 加载 3D 数据（带纹理的网格）。
- en: 2\. Loading a 3D Point Cloud
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 加载 3D 点云
- en: 3\. Setting up the visualization environment.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 设置可视化环境。
- en: 4\. Generating a GIF
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 生成 GIF
- en: 4.1\. Defining a camera orbit path around the data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 4.1. 定义数据周围的相机轨道路径。
- en: 4.2\. Rendering frames from different viewpoints along the path.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 4.2. 沿路径从不同视角渲染帧。
- en: 4.3\. Encoding the frames into a GIF or
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 4.3. 将帧编码为 GIF 或
- en: 5\. Generating an orbital MP4
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 生成轨道 MP4
- en: 6\. Creating a Function
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创建一个函数
- en: 7\. Testing with multiple datasets
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 使用多个数据集进行测试
- en: This streamlined process allows for easy customization and integration into
    existing workflows. The key advantage here is the simplicity of the approach.
    By leveraging the basic principles of 3D data rendering, a very efficient and
    self-contained script can be put together and deployed on any system as long as
    Python is installed.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简化的流程允许轻松定制并集成到现有的工作流程中。这里的关键优势是方法的简单性。通过利用 3D 数据渲染的基本原理，可以构建一个非常高效且自包含的脚本，并部署在任何安装了
    Python 的系统上。
- en: This makes it compatible with various edge computing solutions and allows for
    easy integration with sensor-heavy systems. The goal is to generate a GIF and
    an MP4 from a 3D data set. The process is simple, requiring a 3D data set, a bit
    of magic (the code), and the output as GIF and MP4 files.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得它兼容各种边缘计算解决方案，并允许与传感器密集型系统轻松集成。目标是生成一个 GIF 和一个 MP4 文件从 3D 数据集中。这个过程很简单，需要一个
    3D 数据集，一点魔法（代码），以及输出为 GIF 和 MP4 文件。
- en: '![](../Images/d2dd09a3ef69eb7fcd1bb00898ef5266.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d2dd09a3ef69eb7fcd1bb00898ef5266.png)'
- en: The growth of the solution as we move along the major stages. © [F. Poux](https://learngeodata.eu/)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们沿着主要阶段前进，解决方案的增长。© [F. Poux](https://learngeodata.eu/)
- en: Now, what are the tools and libraries that we will need for this endeavor?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将需要哪些工具和库来完成这项任务？
- en: '**1\. Setup Guide: The Libraries, Tools and Data**'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1. 设置指南：库、工具和数据**'
- en: '![](../Images/33b518f6a94c515bfb195596ba8e1eaa.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/33b518f6a94c515bfb195596ba8e1eaa.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: 'For this project, we primarily use the following two Python libraries:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个项目，我们主要使用以下两个 Python 库：
- en: '**NumPy**: The cornerstone of numerical computing in Python. Without it, I
    would have to deal with every vertex (point) in a very inefficient way. [NumPy
    Official Website](https://numpy.org/)'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NumPy**：Python 中数值计算的基石。没有它，我不得不以非常低效的方式处理每个顶点（点）。[NumPy 官方网站](https://numpy.org/)'
- en: '**pyvista**: A high-level interface to the Visualization Toolkit (VTK). PyVista
    enables me to easily visualize and interact with 3D data. It handles rendering,
    camera control, and exporting frames. [PyVista Official Website](https://www.pyvista.org/)'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pyvista**：到可视化工具包（VTK）的高级接口。PyVista 使我能够轻松地可视化和交互 3D 数据。它处理渲染、相机控制和导出帧。[PyVista
    官方网站](https://www.pyvista.org/)'
- en: '![](../Images/e7a3f29782ab00288a291fe25c0bdda3.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e7a3f29782ab00288a291fe25c0bdda3.png)'
- en: PyVista and Numpy libraries for 3D Data. © [F. Poux](https://learngeodata.eu/)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: PyVista 和 Numpy 库用于 3D 数据。© [F. Poux](https://learngeodata.eu/)
- en: These libraries provide all the necessary tools to handle data processing, visualization,
    and output generation. This set of libraries was carefully chosen so that a minimal
    amount of external dependencies is present, which improves sustainability and
    makes it easily deployable on any system.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这些库提供了处理数据、可视化和输出生成的所有必要工具。这套库被精心挑选，以确保外部依赖性最小化，这提高了可持续性，并使其易于在任何系统上部署。
- en: Let me share the details of the environment as well as the data preparation
    setup.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让我分享环境详情以及数据准备设置。
- en: '**Quick Environment Setup Guide**'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**快速环境设置指南**'
- en: Let me provide very brief details on how to set up your environment.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我简要说明如何设置您的环境。
- en: '**Step 1: Install Miniconda**'
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**步骤 1: 安装 Miniconda**'
- en: 'Four simple steps to get a working Miniconda version:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 四个简单步骤即可获得一个可工作的 Miniconda 版本：
- en: 'Visit: [https://docs.conda.io/projects/miniconda/en/latest/](https://docs.conda.io/projects/miniconda/en/latest/)'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问：[https://docs.conda.io/projects/miniconda/en/latest/](https://docs.conda.io/projects/miniconda/en/latest/)
- en: Download the “installer file” for your Operating System (Let it be Windows,
    MacOS or a Linux distribution)
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下载您操作系统的“安装文件”（可以是 Windows、MacOS 或 Linux 发行版）
- en: Run the installer
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行安装程序
- en: 'Open terminal/command prompt and verify with: conda — version'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
