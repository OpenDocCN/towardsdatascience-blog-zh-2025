  zh: 提取PLY文件
- en: 'For quick testing, you can also use PyVista’s built-in example data:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为了快速测试，你也可以使用PyVista内置的示例数据：
- en: '[PRE3]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '🦚 **Note**: *Remember to always check the data license and attribution requirements
    when using public datasets.*'
  id: totrans-104
