  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问：[https://www.eth3d.net/datasets](https://www.eth3d.net/datasets)
- en: Download the “high-res multi-view” datasets
  id: totrans-100
  prefs:
  - PREF_UL
