  type: TYPE_NORMAL
  zh: 🦚 **注意**：*记住在使用公共数据集时始终检查数据许可和归属要求。*
- en: 'Finally, to ensure a complete setup, below is a typical expected folder structure:'
  id: totrans-105
  prefs: []
