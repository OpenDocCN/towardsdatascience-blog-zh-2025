  zh: 最后，为了确保完整的设置，以下是典型的预期文件夹结构：
- en: '[PRE4]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Beautiful, we can now jump right onto the first stage: loading and visualizing
    textured mesh data.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 美丽，我们现在可以直接进入第一阶段：加载和可视化纹理网格数据。
- en: '**2\. Loading and Visualizing Textured Mesh Data**'
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2. 加载和可视化纹理网格数据**'
- en: One first critical step is properly loading and rendering 3D data. In my research
    laboratory, I have found that PyVista provides an excellent foundation for handling
    complex 3D visualization tasks.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个关键步骤是正确加载和渲染3D数据。在我的研究实验室中，我发现PyVista为处理复杂的3D可视化任务提供了一个优秀的基础。
- en: '![](../Images/c25304c70e13def22e6fb7bab3dd2f7c.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c25304c70e13def22e6fb7bab3dd2f7c.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: 'Here’s how you can approach this fundamental step:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你可以如何处理这一基本步骤的方法：
- en: '[PRE5]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This code snippet loads a textured globe mesh, but the principles apply to any
    textured 3D model.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码片段加载了一个纹理地球网格，但原理适用于任何纹理3D模型。
- en: '![](../Images/7685e8c346186f0383edca076ea10127.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7685e8c346186f0383edca076ea10127.png)'
- en: The earth rendered as a sphere with PyVista. © [F. Poux](https://learngeodata.eu/)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 使用PyVista将地球渲染成球形。© [F. Poux](https://learngeodata.eu/)
- en: Let me discuss and speak a bit about the smooth_shading parameter. It’s a tiny
    element that renders the surfaces more continuous (as opposed to faceted), which,
    in the case of spherical objects, improves the visual impact.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 让我讨论并简要谈谈 smooth_shading 参数。这是一个微小的元素，它使表面更加连续（与面片相比），在球形物体的情况下，这提高了视觉影响。
- en: Now, this is just a starter for 3D mesh data. This means that we deal with surfaces
    that join points together. But what if we want to work solely with point-based
    representations?
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这只是一个 3D 网格数据的起点。这意味着我们处理的是连接点的表面。但如果我们只想使用基于点的表示呢？
- en: In that scenario, we have to consider shifting our data processing approach
    to propose solutions to the unique visual challenges attached to point cloud datasets.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在那种情况下，我们必须考虑调整我们的数据处理方法，以提出解决点云数据集的独特视觉挑战的解决方案。
- en: '**3\. Point Cloud Data Integration**'
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**3. 点云数据集成**'
- en: Point cloud visualization demands extra attention to detail. In particular,
    adjusting the point density and the way we represent points on the screen has
    a noticeable impact.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 点云可视化需要特别注意细节。特别是，调整点密度和我们代表屏幕上的点的方式对视觉效果有显著影响。
- en: '![](../Images/cccead6f45a11ab93a6957b7ffa65d66.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cccead6f45a11ab93a6957b7ffa65d66.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: Let us use a PLY file for testing (see the end of the article for resources).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用 PLY 文件进行测试（请参阅文章末尾的资源）。
- en: '![](../Images/d1c63b25b84896ac34c0f0a2a9205844.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d1c63b25b84896ac34c0f0a2a9205844.png)'
- en: The example PLY point cloud data with PyVista. © [F. Poux](https://learngeodata.eu/)
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 PyVista 的示例 PLY 点云数据。© [F. Poux](https://learngeodata.eu/)
- en: You can load a point cloud pv.read and create scalar fields for better visualization
    (such as using a scalar field based on the height or extent around the center
    of the point cloud).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用 pv.read 加载点云并创建标量场以获得更好的可视化（例如，使用基于点云中心高度或范围的标量场）。
- en: 'In my work with LiDAR datasets, I’ve developed a simple, systematic approach
    to point cloud loading and initial visualization:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的 LiDAR 数据集工作中，我开发了一种简单、系统的点云加载和初始可视化的方法：
- en: '[PRE6]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The scalar computation here is particularly important. By calculating the distance
    from each point to the cloud’s center, we create a basis for color-coding that
    helps convey depth and structure in our visualizations. This becomes especially
    valuable when dealing with large-scale point clouds where spatial relationships
    might not be immediately apparent.
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在这里，标量计算尤为重要。通过计算每个点到云中心的距离，我们为着色创建了一个基础，这有助于在可视化中传达深度和结构。当处理大规模点云时，这种关系可能不会立即明显，这时它变得特别有价值。
- en: Moving from basic visualization to creating engaging animations requires careful
    consideration of the visualization environment. Let’s explore how to optimize
    these settings for the best possible results.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 从基本可视化到创建引人入胜的动画，需要仔细考虑可视化环境。让我们探讨如何优化这些设置以获得最佳结果。
- en: '**4\. Optimizing the Visualization Environment**'
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4. 优化可视化环境**'
- en: The visual impact of our animations heavily depends on the visualization environment
    settings.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们动画的视觉影响很大程度上取决于可视化环境设置。
- en: '![](../Images/fa7931eacacdf8f8f32afe647e080914.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fa7931eacacdf8f8f32afe647e080914.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: 'Through extensive testing, I’ve identified key parameters that consistently
    produce professional-quality results:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 通过广泛的测试，我确定了产生专业质量结果的几个关键参数：
- en: '[PRE7]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: As you can see, **t**he plotter is initialized off_screen=False to render directly
    to the screen. The point cloud is then added to the plotter with specified styling.
    The style=’points’ parameter ensures that the point cloud is rendered as individual
    points. The scalars=’scalars’ argument uses the previously computed scalar field
    for coloring, while point_size sets the size of the points, and opacity adjusts
    the transparency. A base color is also set.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，绘图器初始化时设置 off_screen=False 以直接渲染到屏幕上。然后，使用指定的样式将点云添加到绘图器中。style='points'
    参数确保点云以单独的点渲染。scalars='scalars' 参数使用之前计算的标量场进行着色，而 point_size 设置点的大小，opacity 调整透明度。还设置了一个基础颜色。
- en: '*🦚 **Note**: In my experience, rendering points as spheres significantly improves
    the depth perception in the final generated animation. You can also combine this
    by using the eye_dome_lighting feature. This algorithm adds another layer of depth
    cues through some sort of normal-based shading, which makes the structure of point
    clouds more apparent.*'
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*🦚 **注意**：根据我的经验，将点渲染为球体可以显著提高最终生成的动画的深度感知。您还可以通过使用eye_dome_lighting功能来结合这一方法。此算法通过某种基于法线的阴影添加另一层深度提示，使点云的结构更加明显。*'
- en: You can play around with the various parameters until you obtain a rendering
    that is satisfying for your applications. Then, I propose that we move to creating
    the animated GIFs.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以尝试调整各种参数，直到获得满足您应用需求的渲染图。然后，我建议我们转向创建动画GIF。
- en: '![A GIF of the point cloud](../Images/493eb78abe737b8027665438633059ea.png)*A
    GIF of the point cloud. © [F. Poux](https://learngeodata.eu/)*'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '![点云的GIF动画](../Images/493eb78abe737b8027665438633059ea.png)*点云的GIF动画。© [F.
    Poux](https://learngeodata.eu)*'
- en: '**5\. Creating Animated GIFs**'
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**5. 创建动画GIF**'
- en: At this stage, our aim is to generate a series of renderings by varying the
    viewpoint from which we generate these.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，我们的目标是通过对生成这些点云的视角进行变化来生成一系列渲染图。
- en: '![](../Images/6609d91421f881085ac36d469490f78b.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6609d91421f881085ac36d469490f78b.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: This means that we need to design a camera path that is sound, from which we
    can generate frame rendering.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们需要设计一个合理的相机路径，从而可以生成帧渲染。
- en: This means that to generate our GIF, we must first create an orbiting path for
    the camera around the point cloud. Then, we can sample the path at regular intervals
    and capture frames from different viewpoints.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着为了生成我们的GIF，我们首先需要在点云周围为相机创建一个轨道路径。然后，我们可以以固定间隔采样路径并从不同视角捕获帧。
- en: 'These frames can then be used to create the GIF. Here are the steps:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这些帧可以用来创建GIF。以下是步骤：
- en: '![](../Images/59f975314abcb2794dd5418e490cf508.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/59f975314abcb2794dd5418e490cf508.png)'
- en: The 4 stages in the animated gifs generation. © [F. Poux](https://learngeodata.eu/)
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 动画GIF生成过程中的4个阶段。© [F. Poux](https://learngeodata.eu/)
- en: I change to `off-screen` rendering
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我切换到`离屏渲染`
- en: I take the cloud length parameters to set the camera
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我使用云长度参数来设置相机
- en: I create a path
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我创建一个路径
- en: I create a loop that takes a point of this pass
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我创建一个循环，从中获取这个遍历的点
- en: 'Which translates into the following:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这转化为以下内容：
- en: '[PRE8]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: As you can see, an orbital path is created around the point cloud using `pl.generate_orbital_path()`.
    The path’s radius is determined by cloud_length, the center is set to the center
    of the point cloud, and the normal vector is set to `[0, 0, 1]`, indicating that
    the circle lies in the `XY` plane.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，使用`pl.generate_orbital_path()`在点云周围创建了一个轨道路径。路径的半径由cloud_length决定，中心设置为点云的中心，法向量设置为`[0,
    0, 1]`，表示圆位于`XY`平面。
- en: From there, we can enter a loop to generate individual frames for the GIF (the
    camera’s focal point is set to the center of the point cloud).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，我们可以进入循环以生成GIF的单独帧（相机的焦点设置为点云的中心）。
- en: The `image_scale` parameter deserves special attention—it determines the resolution
    of our output.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '`image_scale`参数值得特别注意——它决定了我们输出的分辨率。'
- en: I’ve found that a value of 2 provides a good balance between the perceived quality
    and the file size. Also, the `viewup` vector is crucial for maintaining proper
    orientation throughout the animation. You can experiment with its value if you
    want a rotation following a non-horizontal plane.
  id: totrans-160
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我发现2的值在感知质量和文件大小之间提供了良好的平衡。此外，`viewup`向量对于在整个动画中保持正确的方向至关重要。如果您想要非水平平面的旋转，可以尝试调整其值。
- en: This results in a GIF that you can use to communicate very easily.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这将生成一个可以轻松用于交流的GIF。
- en: '![Another synthetic point cloud generated GIF](../Images/9f70d0fad5b9ba70c5fe4e9a4fccb444.png)*Another
    synthetic point cloud generated GIF. © [F. Poux](https://learngeodata.eu/)*'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '![另一个合成的点云生成的GIF动画](../Images/9f70d0fad5b9ba70c5fe4e9a4fccb444.png)*另一个合成的点云生成的GIF动画。©
    [F. Poux](https://learngeodata.eu)*'
- en: 'But we can push one extra stage: creating an MP4 video. This can be useful
    if you want to obtain higher-quality animations with smaller file sizes as compared
    to GIFs (which are not as compressed).'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们可以再推进一步：创建MP4视频。如果您希望获得比GIF（未进行压缩）更小的文件大小且质量更高的动画，这可能很有用。
- en: '**6\. High-Quality MP4 Video Generation**'
  id: totrans-164
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**6. 高质量MP4视频生成**'
- en: The generation of an MP4 video follows the exact same principles as we used
    to generate our GIF.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 生成 MP4 视频遵循与我们生成 GIF 相同的精确原则。
- en: '![](../Images/5f1a2263f74281c7bfda943079643772.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5f1a2263f74281c7bfda943079643772.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: 'Therefore, let me get straight to the point. To generate an MP4 file from any
    point cloud, we can reason in four stages:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我直接切入正题。要从任何点云生成 MP4 文件，我们可以分四个阶段进行推理：
- en: '![](../Images/02c5ee99331725bde438048e7dd46d85.png)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/02c5ee99331725bde438048e7dd46d85.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: Gather your configurations over the parameters that best suit you.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收集适合您的最佳参数配置。
- en: Create an orbital path the same way you did with GIFs
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个与 GIF 相同的轨道路径
- en: Instead of using the `open_gif function`, let us use it `open_movie` to write
    a “movie” type file.
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们不使用 `open_gif 函数`，而是使用它 `open_movie` 来写入“电影”类型的文件。
- en: We orbit on the path and write the frames, similarly to our GIF method.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们沿着路径进行环绕并编写框架，类似于我们的 GIF 方法。
- en: '🦚 **Note**: *Don’t forget to use your proper configuration in the definition
    of the path.*'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 🦚 **注意**：*不要忘记在路径定义中使用您的适当配置。*
- en: 'This is what the end result looks like with code:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是代码的最终结果：
- en: '[PRE9]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Notice the use of `points_gaussian` style and adjusted opacity—these settings
    provide interesting visual quality in video format, particularly for dense point
    clouds.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 注意使用 `points_gaussian` 风格和调整后的不透明度——这些设置在视频格式中提供了有趣的视觉质量，尤其是对于密集的点云。
- en: And now, what about streamlining the process?
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，关于简化流程的事情呢？
- en: '**7\. Streamlining the Process with a Custom Function**'
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**7. 使用自定义函数简化流程**'
- en: '![](../Images/864d08f3c00adc5f9d0ab299215bdc50.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/864d08f3c00adc5f9d0ab299215bdc50.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: 'To make this process more efficient and reproducible, I’ve developed a function
    that encapsulates all these steps:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这个过程更高效和可重复，我开发了一个封装所有这些步骤的函数：
- en: '[PRE10]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '🦚 **Note**: This function standardizes our visualization process while maintaining
    flexibility through its parameters. It incorporates several optimizations I’ve
    developed through extensive testing. Note the different n_points values for GIF
    (40) and MP4 (100)—this balances file size and smoothness appropriately for each
    format. The automatic filename generation `split(‘.’)[0]` ensures consistent output
    naming.'
  id: totrans-185
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🦚 **注意**：此函数通过其参数保持灵活性，同时标准化我们的可视化过程。它结合了我在广泛测试中开发的几个优化。注意 GIF（40）和 MP4（100）的不同
    n_points 值——这为每个格式适当地平衡了文件大小和流畅性。自动文件名生成 `split(‘.’)[0]` 确保输出命名的一致性。
- en: And what better than to test our new creation on multiple datasets?
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在多个数据集上测试我们的新创作不是更好吗？
- en: '**8\. Batch Processing Multiple Datasets**'
  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**8. 批处理多个数据集**'
- en: '![](../Images/d6d9d86f77877a95fa486f9d5e6d34ec.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d6d9d86f77877a95fa486f9d5e6d34ec.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: 'Finally, we can apply our function to multiple datasets:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以将我们的函数应用于多个数据集：
- en: '[PRE11]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This approach can be remarkably efficient when processing large datasets made
    of several files. Indeed, if your parametrization is sound, you can maintain consistent
    3D visualization across all outputs.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理由多个文件组成的大型数据集时，这种方法可以非常高效。确实，如果您的参数化合理，您可以在所有输出中保持一致的 3D 可视化。
- en: '![](../Images/83fc9266f66a336d334abcccb27ec16e.png)![](../Images/864028feb4411f23766b9757c86b6d63.png)![](../Images/5f90161ede21761eccde3fc26ce3b73e.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/83fc9266f66a336d334abcccb27ec16e.png)![](../Images/864028feb4411f23766b9757c86b6d63.png)![](../Images/5f90161ede21761eccde3fc26ce3b73e.png)'
- en: '🌱 **Growing**: I am a big fan of 0% supervision to create 100% automatic systems.
    This means that if you want to push the experiments even more, I suggest investigating
    ways to automatically infer the parameters based on the data, i.e., data-driven
    heuristics. Here is an example of a paper I wrote a couple of years down the line
    that focuses on such an approach for [unsupervised segmentation (Automation in
    Construction, 2022)](https://www.sciencedirect.com/science/article/abs/pii/S0926580522001236)'
  id: totrans-194
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🌱 **成长**：我是 0% 监督以创建 100% 自动系统的忠实粉丝。这意味着，如果您想进一步推动实验，我建议调查基于数据自动推断参数的方法，即数据驱动的启发式方法。以下是我几年后写的一篇论文的例子，它专注于这种方法的
    [无监督分割（自动化建设，2022）](https://www.sciencedirect.com/science/article/abs/pii/S0926580522001236)
- en: '**A Little Discussion **'
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**一点讨论**'
- en: 'Alright, you know my tendency to push innovation. While relatively simple,
    this **Cloud2Gif** solution has direct applications that can help you propose
    better experiences. Three of them come to mind, which I leverage on a weekly basis:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，你知道我倾向于推动创新。虽然相对简单，但这个**Cloud2Gif**解决方案有直接的应用，可以帮助你提出更好的体验。以下是我每周都会用到其中的三个应用：
- en: '![](../Images/16e1717b5a6231917132aa48d99ecbdd.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/16e1717b5a6231917132aa48d99ecbdd.png)'
- en: © [F. Poux](https://learngeodata.eu/)
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: © [F. Poux](https://learngeodata.eu/)
- en: '**Interactive Data Profiling and Exploration**: By generating GIFs of complex
    simulation results, I can profile my results at scale very quickly. Indeed, the
    qualitative analysis is thus a matter of slicing a sheet filled with metadata
    and GIFs to check if the results are on par with my metrics. This is very handy'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互式数据分析和探索**：通过生成复杂模拟结果的GIF，我可以非常快速地对我的结果进行规模分析。确实，定性分析就是将一个充满元数据和GIF的表格切片，检查结果是否与我的指标相符。这非常方便'
- en: '**Educational Materials**: I often use this script to generate engaging visuals
    for my [online courses](https://learngeodata.eu/) and tutorials, enhancing the
    learning experience for the professionals and students that go through it. This
    is especially true now that most material is found online, where we can leverage
    the capacity of browsers to play animations.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育材料**：我经常使用这个脚本来为我的[在线课程](https://learngeodata.eu/)和教程生成引人入胜的视觉内容，增强通过这些课程的专业人士和学生的学习体验。尤其是在大多数材料都可在网上找到的情况下，我们可以利用浏览器播放动画的能力。'
- en: '**Real-time Monitoring Systems**: I worked on integrating this script into
    a real-time monitoring system to generate visual alerts based on sensor data.
    This is especially relevant for sensor-heavy systems, where it can be difficult
    to extract meaning from the point cloud representation manually. Especially when
    conceiving 3D Capture Systems, leveraging SLAM or other techniques, it can be
    helpful to get a feedback loop in real-time to ensure a cohesive registration.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时监控系统**：我致力于将这个脚本集成到实时监控系统，以便根据传感器数据生成视觉警报。这对于传感器密集型系统尤为重要，在这些系统中，手动从点云表示中提取意义可能很困难。特别是在构思3D捕获系统时，利用SLAM或其他技术，实时获取反馈循环以确保一致注册可能很有帮助。'
- en: However, when we consider the broader research landscape and the pressing needs
    of the 3D data community, the real value proposition of this approach becomes
    evident. Scientific research is increasingly interdisciplinary, and communication
    is key. We need tools that enable researchers from diverse backgrounds to understand
    and share complex 3D data easily.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当我们考虑更广泛的研究领域和3D数据社区的迫切需求时，这种方法的真正价值主张变得明显。科学研究越来越跨学科，沟通是关键。我们需要能够使来自不同背景的研究人员轻松理解和共享复杂3D数据的工具。
- en: The Cloud2Gif script is self-contained and requires minimal external dependencies.
    This makes it ideally suited for deployment on resource-constrained edge devices.
    And this may be the top application that I worked on, leveraging such a straightforward
    approach.
  id: totrans-203
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Cloud2Gif 脚本是自包含的，并且对外部依赖最少。这使得它非常适合部署在资源受限的边缘设备上。这可能是我所工作的最重要的应用之一，利用这种直接的方法。
- en: As a little digression, I saw the positive impact of the script in two scenarios.
    First, I designed an environmental monitoring system for diseases in farmland
    crops. This was a 3D project, and I could include the generation of visual alerts
    (with an MP4 file) based on the real-time LiDAR sensor data. A great project!
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个小插曲，我看到了这个脚本在两个场景中的积极影响。首先，我为农田作物中的疾病监测系统设计了一个环境监控系统。这是一个3D项目，我可以包括基于实时激光雷达传感器数据的视觉警报（MP4文件）生成。这是一个伟大的项目！
- en: In another context, I wanted to provide visual feedback to on-site technicians
    using a SLAM-equipped system for mapping purposes. I integrated the process to
    generate a GIF every 30 seconds that showed the current state of data registration.
    It was a great way to ensure consistent data capture. This actually allowed us
    to reconstruct complex environments with better consistency in managing our data
    drift.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一个背景下，我想为使用SLAM系统进行测绘目的的现场技术人员提供视觉反馈。我将这个过程集成到每30秒生成一个显示当前数据注册状态的GIF中。这是一个确保持续数据捕获的好方法。这实际上使我们能够以更好的数据漂移管理一致性重建复杂环境。
- en: '**Conclusion**'
  id: totrans-206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: Today, I walked through a simple yet powerful Python script to transform 3D
    data into dynamic GIFs and MP4 videos. This script, combined with libraries like
    NumPy and PyVista, allows us to create engaging visuals for various applications,
    from presentations to research and educational materials.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我介绍了一个简单而强大的Python脚本，可以将3D数据转换为动态GIF和MP4视频。这个脚本结合了NumPy和PyVista等库，使我们能够为各种应用创建引人入胜的视觉效果，从演示到研究材料和教育资料。
- en: 'The key here is accessibility: the script is easily deployable and customizable,
    providing an immediate way of transforming complex data into an accessible format.
    This Cloud2Gif script is an excellent piece for your application if you need to
    share, assess, or get quick visual feedback within data acquisition situations.'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的关键是易用性：脚本易于部署和定制，提供了一种将复杂数据转换为可访问格式的即时方法。如果你需要在数据采集情况下分享、评估或快速获取视觉反馈，这个Cloud2Gif脚本是你应用程序的一个优秀组件。
- en: '**What is next?**'
  id: totrans-209
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**接下来是什么？**'
- en: Well, if you feel up for a challenge, you can create a simple web application
    that allows users to upload point clouds, trigger the video generation process,
    and download the resulting GIF or MP4 file.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，如果你愿意接受挑战，你可以创建一个简单的网络应用程序，允许用户上传点云，触发视频生成过程，并下载生成的GIF或MP4文件。
- en: 'This, in a similar manner as shown here:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 这与这里展示的类似：
- en: In addition to Flask, you can also create a simple web application that can
    be deployed on Amazon Web Services so that it is scalable and easily accessible
    to anyone, with minimal maintenance.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 除了Flask，你还可以创建一个简单的网络应用程序，可以在Amazon Web Services上部署，使其可扩展，并且对任何人易于访问，维护成本最低。
- en: These are skills that you develop through the [Segmentor OS](https://learngeodata.eu/3d-python-segmentation-course-os/)
    Program at the [3D Geodata Academy](https://learngeodata.eu/).
  id: totrans-213
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些是通过[3D地数据学院](https://learngeodata.eu/)的[Segmentor OS](https://learngeodata.eu/3d-python-segmentation-course-os/)项目培养的技能。
- en: '**About the author**'
  id: totrans-214
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**关于作者**'
- en: '[**Florent Poux, Ph.D.**](https://medium.com/u/8ba7bf4ad784) is a Scientific
    and Course Director focused on educating engineers on leveraging AI and 3D Data
    Science. He leads research teams and teaches 3D Computer Vision at various universities.
    His current aim is to ensure humans are correctly equipped with the knowledge
    and skills to tackle 3D challenges for impactful innovations.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '[**Florent Poux, Ph.D.**](https://medium.com/u/8ba7bf4ad784)是一位专注于教育工程师利用AI和3D数据科学的科学和课程总监。他领导研究团队，并在多所大学教授3D计算机视觉。他目前的目的是确保人类能够正确装备知识和技能，以应对3D挑战，实现有影响力的创新。'
- en: '**Resources**'
  id: totrans-216
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**资源**'
- en: '🏆Awards: [Jack Dangermond Award](https://www.geographie.uliege.be/cms/c_5724437/en/florent-poux-and-roland-billen-winners-of-the-2019-jack-dangermond-award)'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 🏆奖项：[Jack Dangermond Award](https://www.geographie.uliege.be/cms/c_5724437/en/florent-poux-and-roland-billen-winners-of-the-2019-jack-dangermond-award)
- en: '📕Book: [3D Data Science with Python](https://www.amazon.fr/Data-Science-Python-Environments-Workflows/dp/1098161335)'
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 📕书籍：[使用Python进行3D数据科学](https://www.amazon.fr/Data-Science-Python-Environments-Workflows/dp/1098161335)
