- en: 'Beyond Code Generation: Continuously Evolve Text with LLMs'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码生成之外：使用LLMs持续进化文本
- en: 原文：[https://towardsdatascience.com/beyond-code-generation-continuously-evolve-text-with-llms/](https://towardsdatascience.com/beyond-code-generation-continuously-evolve-text-with-llms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/beyond-code-generation-continuously-evolve-text-with-llms/](https://towardsdatascience.com/beyond-code-generation-continuously-evolve-text-with-llms/)
- en: <mdspan datatext="el1750311146010" class="mdspan-comment">What do you do when</mdspan>
    the initial response from an LLM doesn’t suit you? You rerun it, right? Now, if
    you were to automate that…
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750311146010" class="mdspan-comment">当LLM的初始响应不符合您的需求时，您会重新运行它，对吧？现在，如果您想自动化这个过程…
- en: '[PRE0]'
  id: totrans-3
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Alright, something like that. People have done it for code, and the same applies
    to non-code if the *evaluate()* function is suitable. Nowadays, you can use **LLMs
    for content generation and evaluation.** However, a simple while loop that waits
    for the best random result is not always good enough. Sometimes, you need to modify
    the prompt. Experiment and mix things up, and keep track of what works and what
    doesn’t. Follow along different ideation paths to keep your options open…
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，类似这样。人们已经为代码做过这件事，如果*evaluate()*函数适用，同样的方法也适用于非代码。如今，您可以使用**LLMs进行内容生成和评估**。然而，一个简单的等待最佳随机结果的while循环并不总是足够好。有时，您需要修改提示。进行实验，混合不同的方法，并记录哪些有效，哪些无效。跟随不同的创意路径以保持选项开放…
- en: In this article, we will discuss how **OpenEvolve** [1], an open-source implementation
    of Google’s AlphaEvolve paper [2], can be used for content creation. In the background,
    it applies this “experiment and mix, follow different paths” approach to optimize
    the LLM prompts.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将讨论如何使用**OpenEvolve** [1]，这是Google的AlphaEvolve论文[2]的开源实现，用于内容创作。在幕后，它应用了这种“实验和混合，跟随不同路径”的方法来优化LLM提示。
- en: 'The AlphaEvolve paper applied an **evolutionary system** to the code generation
    with LLMs. Read more about the exciting, brand-new results of this paper in my
    article, [Google’s AlphaEvolve: Getting Started with Evolutionary Coding Agents](https://towardsdatascience.com/googles-alphaevolve-getting-started-with-evolutionary-coding-agents/).
    In essence, in a survival of the fittest scheme, programs are mixed and improved
    upon. The authors suggest that these evolutionary coding agents can achieve research
    breakthroughs and present several results.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: AlphaEvolve论文将**进化系统**应用于LLMs的代码生成。在我的文章中了解更多关于这篇激动人心的、全新的论文结果，[Google的AlphaEvolve：使用进化编码代理开始](https://towardsdatascience.com/googles-alphaevolve-getting-started-with-evolutionary-coding-agents/)。本质上，在适者生存的方案中，程序被混合并得到改进。作者建议这些进化编码代理可以实现研究突破，并提出了几个结果。
- en: Due to the sheer number of things that content can be, I think there may bepotential
    for **high-value content creation other than code** that utilizes such a long-running,
    continuous evolution process. In this article, we explore how to apply the same
    technology to a non-code use case where LLMs, rather than algorithms, judge the
    results of the LLM-generated solution. We also dicuss how to examine the results.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 由于内容可以具有的纯粹数量，我认为除了代码之外，还有可能存在**高价值内容创作**，这利用了这样一个长期运行、持续进化的过程。在这篇文章中，我们探讨了如何将相同的技术应用于一个非代码用例，其中LLMs而不是算法判断LLM生成的解决方案的结果。我们还讨论了如何检查结果。
- en: Prerequisites
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前提条件
- en: First, let’s prepare a quick, basic setup.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们准备一个快速、基本的设置。
- en: LLM server
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM服务器
- en: In order to use OpenEvolve, you will need access to an LLM server with OpenAI-compatible
    API endpoints. You can register with Cerebras (they have a free tier), OpenAI,
    Google Gemini, or a similar service. Alternatively, if you have a capable GPU,
    you can set up your own server, for example with ollama. You will need to pick
    at least two different LLM models, a weak one (e.g., 4bn parameters) and a strong
    one (e.g., 17bn parameters).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用OpenEvolve，您需要访问一个具有OpenAI兼容API端点的LLM服务器。您可以在Cerebras（他们有一个免费层）、OpenAI、Google
    Gemini或类似的服务上注册。或者，如果您有一个强大的GPU，您可以设置自己的服务器，例如使用ollama。您至少需要选择两种不同的LLM模型，一个是弱模型（例如，4bn参数）和一个强模型（例如，17bn参数）。
- en: Python envionment & git
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python环境 & git
- en: I presume that you are running a Linux system with a prepared Python environment,
    in which you can create virtual environments and install packages from the Python
    Package index.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设您正在运行一个带有准备好的Python环境的Linux系统，在其中您可以创建虚拟环境并从Python包索引安装包。
- en: OpenEvolve setup
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenEvolve配置
- en: 'Install OpenEvolve, then prepare your own project & prompt folders:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 安装OpenEvolve，然后准备您自己的项目和提示文件夹：
- en: '[PRE1]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'A little warning: OpenEvolve is currently a research project. Its code base
    is still developing quickly. Therefore, it is a good idea to follow all updates
    closely.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 一点警告：OpenEvolve 目前是一个研究项目。其代码库仍在快速发展。因此，密切关注所有更新是一个好主意。
- en: Configuration
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置
- en: Create the file *examples/my_project/config.yaml:*
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 创建文件 *examples/my_project/config.yaml:*
- en: '[PRE2]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: To get a general idea of what you are configuring here, consider how new solutions
    are generated and evaluated in OpenEvolve. Solutions consist of their respective
    text content and are stored in a database alongside their evaluation metrics and
    “side channel” textual results (e.g., errors during execution or textual improvement
    suggestions). The database also stores a list of elite programs and programs that
    perform particularly well on different metrics (MAP-Elites) to be able to provide
    inspirations for new solutions. An LLM generates these new, mutated solutions
    based on a single parent. Programmatic and/or LLM evaluators then judge the new
    solution before feeding it back into the database.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解您在这里配置的内容，请考虑在 OpenEvolve 中新解决方案是如何生成和评估的。解决方案包括它们各自的内容文本，并存储在数据库中，与它们的评估指标和“旁路”文本结果（例如，执行过程中的错误或文本改进建议）一起。数据库还存储了一份精英程序列表和在不同指标上表现特别好的程序列表（MAP-Elites），以便为新解决方案提供灵感。一个大型语言模型（LLM）基于单个父本生成这些新的、变异的解决方案。然后，程序性和/或LLM评估器在将其反馈到数据库之前评估新的解决方案。
- en: '![Sketch of the OpenEvolve generation & evaluation flow](../Images/7b0fe7535d383105ac506fd1d22a486b.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![OpenEvolve 生成与评估流程草图](../Images/7b0fe7535d383105ac506fd1d22a486b.png)'
- en: 'The OpenEvolve generation and evaluation flow: Sample a parent and inspirations,
    generate a new child, evaluate it, and store it in the same island as the parent.
    (Image by author)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: OpenEvolve 的生成和评估流程：采样一个父本和灵感，生成一个新的子本，评估它，并将其存储在父本所在的同一岛屿上。（图片由作者提供）
- en: 'The configuration options include:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 配置选项包括：
- en: '**llm: models, evaluator_models**'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**llm：models, evaluator_models**'
- en: For generation and evaluation, you can configure any number of models.
  id: totrans-26
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于生成和评估，您可以配置任意数量的模型。
- en: The idea behind using multiple models is to use a fast (weak) model that quickly
    explores many different options and a slower (stronger) model that adds quality.
    For generation, the weight parameter controls the probability that each model
    will be selected in an iteration — it is only one model at a time, not multiple.
    For evaluation, all models will be executed each time, and their output metrics
    are weighed with the specified parameter.
  id: totrans-27
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用多个模型背后的想法是使用一个快速（弱）模型来快速探索许多不同的选项，以及一个较慢（更强）的模型来增加质量。对于生成，权重参数控制每个模型在每次迭代中被选中的概率——一次只能选择一个模型，而不是多个。对于评估，每次都会执行所有模型，并且它们的输出指标会根据指定的参数进行加权。
- en: The temperature setting influence how random these models behave. A value of
    1.5 is very high, and 0.9 is still a high temperature value. For the creative
    use case, I think these are good. For business content or code, use lower values.
    The OpenEvolve default setting is 0.7.
  id: totrans-28
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 温度设置影响这些模型的行为的随机性。1.5 的值非常高，而 0.9 仍然是一个高温值。对于创意用例，我认为这些值是好的。对于商业内容或代码，使用较低的值。OpenEvolve
    的默认设置是 0.7。
- en: '**prompt: template_dir**'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示：template_dir**'
- en: The template_dir option specifies the directory that contains the prompt templates
    that are used to overwrite the defaults. See below for more information on the
    folder’s contents.
  id: totrans-30
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`template_dir` 选项指定包含用于覆盖默认值的提示模板的目录。有关文件夹内容的更多信息，请参阅下文。'
- en: '**database: num_top_programs, num_diverse_programs**'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据库：num_top_programs, num_diverse_programs**'
- en: The prompts for generating new solutions can include inspirations from other
    programs in the database. With a value of 0, I turned this function off, because
    I found that the inspirations — which do not include the content itself, rather
    just metrics and change summary — were not too useful for creative content evolution.
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 生成新解决方案的提示可以包括来自数据库中其他程序的灵感。我将此功能关闭，因为我认为这些灵感——不包括内容本身，而是仅包括指标和变更摘要——对于创意内容进化并不太有用。
- en: '**database: num_islands** controls how many separate sub-populations are maintained
    in the database. The more islands you use, the more diverging solution paths will
    result, whereas within the same island you will observe fewer substantial variations.
    For creative use cases, if you have enough time and resources to run many iterations,
    it may be beneficial to increase the number of islands.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据库：num_islands** 控制在数据库中维护多少个独立的子种群。你使用的岛屿越多，产生的解决方案路径的多样性就越大，而在同一岛屿内，你会观察到更少的实质性变化。对于创意用例，如果你有足够的时间和资源来运行多次迭代，增加岛屿的数量可能是有益的。'
- en: '**evaluator: llm_feedback_weight**'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估器：llm_feedback_weight**'
- en: The combined metrics generated by the evaluation LLMs are multiplied with this
    parameter. Together with the algorithmically generated metrics, the numeric average
    is then used to find the best program. Say the generated metrics were
  id: totrans-35
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 评估LLM生成的综合指标与这个参数相乘。然后，与算法生成的指标一起，使用数值平均值来找到最佳程序。假设生成的指标是
- en: '*length: 1.0'
  id: totrans-36
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*length: 1.0'
- en: 'llm_correctness: 0.5'
  id: totrans-37
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'llm_correctness: 0.5'
- en: 'llm_style: 0.7*'
  id: totrans-38
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'llm_style: 0.7*'
- en: with an *llm_feedback_weight* of 1.0, the overall score would be (1.0+0.5*1.0+0.7*1.0)/3
  id: totrans-39
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当 *llm_feedback_weight* 为1.0时，整体分数将是 (1.0+0.5*1.0+0.7*1.0)/3
- en: '**diff_base_evolution / allow_full_rewrites:**'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**diff_base_evolution / allow_full_rewrites:**'
- en: Two different prompt approaches for the generator LLM are supported. In the
    diff mode, the LLM uses a search-and-replace response format to replace specific
    elements in the current solution. In the full_rewrite mode, the LLM simply outputs
    a full rewrite. The latter mode is less demanding for less capable LLMs, but it
    is also less suitable for long content. Quality is also better with diff mode,
    based on my tests.
  id: totrans-41
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 支持两种不同的生成器LLM提示方法。在diff模式下，LLM使用搜索和替换的响应格式来替换当前解决方案中的特定元素。在full_rewrite模式下，LLM简单地输出完整的重写。后者对于能力较弱的LLM来说要求较低，但不太适合长内容。根据我的测试，diff模式下的质量也更好。
- en: For more options, refer to *configs/default_config.yaml.*
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更多选项，请参阅 *configs/default_config.yaml*。
- en: Prompts
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示
- en: OpenEvolve’s default prompts are written for code evolution. Therefore, its
    prompts are not suitable for non-code generation by default. Fortunately, we can
    overwrite them. The default prompts are encoded in the file *openevolve/prompt/templates.py*.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: OpenEvolve的默认提示是为代码进化编写的。因此，其提示默认不适用于非代码生成。幸运的是，我们可以覆盖它们。默认提示编码在文件 *openevolve/prompt/templates.py*
    中。
- en: Create the following files and adapt the prompts to match your use case. Let’s
    try a simple example for creating poems.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 创建以下文件，并根据你的用例调整提示。让我们尝试一个简单的例子来创建诗歌。
- en: '**Initial placeholder content:** *examples/my_project/initial_content.txt*'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**初始占位符内容：** *examples/my_project/initial_content.txt*'
- en: '[PRE3]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The initial prompt represents the “first generation” parent. It affects its
    offspring, the second-generation solutions.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示代表“第一代”父代。它影响其后代，即第二代解决方案。
- en: For the initial content, you could provide an existing version or an empty placeholder
    text. You could also provide specific instructions, such as “Make sure it mentions
    cats,” to guide the initial generation in a desired direction. If you need more
    general context for all generations, include it in the system prompt.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初始内容，你可以提供一个现有版本或一个空占位符文本。你也可以提供特定的说明，例如“确保提到猫”，以引导初始生成向期望的方向发展。如果你需要为所有生成提供更一般的上下文，请将其包含在系统提示中。
- en: '**The system prompt:** *examples/my_project/prompts/system_message.txt*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**系统提示：** *examples/my_project/prompts/system_message.txt*'
- en: '[PRE4]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The system prompt just sets the general context for your generator model so
    it knows what your use case is all about. In this example, we are not creating
    code, we are writing poems.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 系统提示仅设置生成器模型的通用上下文，以便它知道你的用例是什么。在这个例子中，我们不是创建代码，而是在写诗。
- en: '**User prompt for content generation:** *examples/my_project/prompts/diff_user.txt*'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**用户内容生成提示：** *examples/my_project/prompts/diff_user.txt*'
- en: '[PRE5]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '{current_program}'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '{current_program}'
- en: '[PRE6]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The content generation user prompt is very general. It contains several placeholders,
    that will be replaced with the content from the solution database, including the
    evaluation results of the parent program. This prompt illustrates how the evolution
    process influences the generation of new solutions.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 内容生成用户提示非常通用。它包含几个占位符，这些占位符将被从解决方案数据库中的内容所替换，包括父程序的评估结果。这个提示说明了进化过程如何影响新解决方案的生成。
- en: '**User prompt for content generation without the diff method:** *examples/my_project/prompts/full_rewrite.txt*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**无diff方法的用户内容生成提示：** *examples/my_project/prompts/full_rewrite.txt*'
- en: '[PRE7]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '{current_program}'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '{当前程序}'
- en: '[PRE8]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**Prompt fragment for the evolution history:***examples/my_project/prompts/*evolution_history.txt'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**演变历史的提示片段：***examples/my_project/prompts/*evolution_history.txt*'
- en: '[PRE9]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**Prompt fragment for the top programs:***examples/my_project/prompts/*top_programs.txt'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**顶级程序的提示片段：***examples/my_project/prompts/*top_programs.txt*'
- en: '[PRE10]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '{program_snippet}'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '{程序片段}'
- en: '[PRE11]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**System prompt for the evaluator:** *examples/my_project/prompts/evaluator_system_message.txt*'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**评估器的系统提示：** *examples/my_project/prompts/evaluator_system_message.txt*'
- en: '[PRE12]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This system prompt for the evaluator models is essentially the same as the system
    prompt for the generator LLM.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这个系统提示用于评估器模型与用于生成器 LLM 的系统提示基本相同。
- en: '**User prompt for the evaluator:** *examples/my_project/prompts/evaluation.txt*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**评估器的用户提示：** *examples/my_project/prompts/evaluation.txt*'
- en: '[PRE13]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '{current_program}'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '{当前程序}'
- en: '[PRE14]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This is where the magic happens. In this prompt, you must think of metrics that
    represent what you are optimizing. What determines whether the content is good
    or bad? Correctness? Humor? Writing skill? Decide what is important to you, and
    encode it wisely. This may take some experimentation before you see the evolution
    converge the way you intended. Play around as you observe the evolution of your
    content (more on that below).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是魔法发生的地方。在这个提示中，您必须考虑代表您所优化内容的指标。什么决定了内容是好是坏？正确性？幽默？写作技巧？决定什么对您来说很重要，并明智地编码它。这可能需要一些实验，您才能看到进化以您期望的方式收敛。观察您内容的变化时，请进行一些尝试（更多内容见下文）。
- en: Be careful — every metric is rated equally. They are multiplied by the *llm_feedback_weight*
    factor in your *config.yaml.* It is also a good idea to keep an *overall_score*
    metric that provides a summary of the big picture evaluation. You can then sort
    the generated solutions by it.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意——每个指标都被同等对待。它们在您的 *config.yaml* 文件中乘以 *llm_feedback_weight* 因子。保留一个提供整体评估总结的
    *overall_score* 指标也是一个好主意。您可以根据它对生成的解决方案进行排序。
- en: 'The *improvement_suggestion* is a textual recommendation from the evaluator
    LLM. It will be stored along with the metrics in the database and provided to
    the generator LLM when this solution is used as a parent, as part of the *{artifacts}*
    placeholder you saw above. (Note: As of this writing, textual LLM feedback is
    still a pull request [under review](https://github.com/codelion/openevolve/pull/68)
    in the OpenEvolve codebase, be sure to use a version that supports it.)'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '*improvement_suggestion* 是评估器 LLM 的文本建议。它将与指标一起存储在数据库中，并在使用此解决方案作为父项时，作为您上面看到的
    *{artifacts}* 占位符的一部分提供给生成器 LLM。（注意：截至本文写作时，文本 LLM 反馈仍然是 OpenEvolve 代码库中的一个拉取请求[正在审查](https://github.com/codelion/openevolve/pull/68)，请确保使用支持它的版本。）'
- en: The evaluator program
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估程序
- en: OpenEvolve was designed for code generation with algorithmic evaluators. Although
    it is difficult to write an algorithm that judges the beauty of a poem, we *can*
    design a useful algorithmic evaluation function also for our content generation
    use case. For instance, we can define a metric that targets a particular number
    of lines or words.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: OpenEvolve 是为具有算法评估器的代码生成而设计的。虽然很难编写一个判断诗歌美感的算法，但我们 *可以* 为我们的内容生成用例设计一个有用的算法评估函数。例如，我们可以定义一个针对特定行数或单词数的指标。
- en: Create a file *examples/my_project/evaluation.txt:*
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '创建一个文件 *examples/my_project/evaluation.txt:* '
- en: '[PRE15]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'This code has two aspects:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码有两个方面：
- en: First, it creates a metric value that allows us to quantify the quality of the
    response length. If the response is too short *or* too long, the score is lower.
    If the response is just right, the score reaches 1.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，它创建一个指标值，使我们能够量化响应长度的质量。如果响应太短或太长，则分数较低。如果响应恰到好处，则分数达到 1。
- en: 'Second, this code prepares *textual feedback* that the LLM can intuitively
    understand, so it knows what to change without getting lured into a predetermined
    idea of what to do when the length is not good. For example, it won’t mistakenly
    think: “I need to write more.. and more..”.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '其次，这段代码准备 LLM 可以直观理解的 *文本反馈*，这样它就知道在长度不佳时应该改变什么，而不会陷入预先设定的关于应该做什么的想法。例如，它不会错误地认为：“我需要写更多..更多..”。 '
- en: 'Data review: Evolution at play'
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据审查：演变中的进化
- en: 'Run the evolution process:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 运行进化过程：
- en: '[PRE16]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'It is best to begin with only a few iterations and analyze the results closely
    to ensure everything is functioning properly. To do so, start the visualization
    web server and observe in real time:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 最好从只有少数迭代开始，并仔细分析结果，以确保一切正常工作。为此，启动可视化网络服务器，并实时观察：
- en: '[PRE17]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Or, if you have a specific past checkpoint that you wish to analyze, open it
    with:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，如果您有一个希望分析的特定过去检查点，请使用以下方式打开：
- en: '[PRE18]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'When rerunning your tests after making improvements, be sure to move the current
    checkpoint folders out of the way before starting over:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行改进后重新运行测试时，请确保在重新开始之前将当前检查点文件夹移开：
- en: '[PRE19]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '![](../Images/27601f5da01b029d0ce4cc013004e774.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/27601f5da01b029d0ce4cc013004e774.png)'
- en: If everything is configured properly, you should see an evolution of improving
    results (Image by author)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切配置正确，你应该能看到结果的演变（图片由作者提供）
- en: 'In the visualization front end, click the nodes to see the associated current
    solution text, as well as all of their metrics, prompts and LLM responses. You
    can also easily click through children in the sidebar. Use the yellow locator
    button if you get lost in the graph and can’t see a node. By observing the prompts,
    you can trace how the evaluation response from a parent affects the generation
    user prompt of the child. (Note: As of this writing, prompt & response logging
    is still a pull request [under review](https://github.com/codelion/openevolve/pull/73)
    in the OpenEvolve codebase, be sure to use a version that supports it.)'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在可视化前端，点击节点以查看相关的当前解决方案文本，以及它们的所有指标、提示和 LLM 响应。你还可以轻松地在侧边栏中点击子节点。如果你在图中迷路且看不到节点，请使用黄色定位按钮。通过观察提示，你可以追踪父节点的评估响应如何影响子节点的生成用户提示。（注意：截至本文写作时，提示和响应记录仍然是
    OpenEvolve 代码库中的一个拉取请求[正在审查](https://github.com/codelion/openevolve/pull/73)，请确保使用支持它的版本。）
- en: 'If you are interested in comparing all solutions by a specific metric, select
    it from the top bar:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要比较特定指标的解决方案，请从顶部栏中选择它：
- en: '![](../Images/74e7eb14cc9f2aab826c418a793ab9c9.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74e7eb14cc9f2aab826c418a793ab9c9.png)'
- en: The metrics select box shows all the metrics produced by your evaluation.py
    logic and evaluation.txt prompt. With it, you can change the metric used to determine
    the radii of the nodes in the graph. (Image by author)
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 指标选择框显示了由你的 evaluation.py 逻辑和 evaluation.txt 提示产生的所有指标。通过它，你可以更改用于确定图中节点半径的指标。（图片由作者提供）
- en: The node colors represent the islands, in which evolution takes place largely
    separately (if you run it long enough!) and in different directions. Occasionally,
    depending on the migration parameters in the configuration, individuals from one
    island can be copied over into another.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 节点颜色代表岛屿，进化主要在这些岛屿上独立进行（如果你运行足够长时间！）并且朝不同的方向。偶尔，根据配置中的迁移参数，一个岛屿的个体可以被复制到另一个岛屿。
- en: The size of each node indicates its performance on the currently selected metric.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个节点的尺寸表示其在当前所选指标上的性能。
- en: The edges in the visualization show which parent was modified to produce the
    child. This clearly has the strongest influence on the descendant.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可视化中的边显示了哪个父节点被修改以产生子节点。这显然对后代有最强的影响。
- en: 'In fact, the AlphaEvolve algorithm incorporates learnings from several previous
    programs in its prompting (configurable top-*n* programs). The generation prompt
    is augmented with a summary of previous changes and their influence on the resulting
    metrics. This “prompt crossover” is not visualized. Also not visualized are the
    relations of “clones”: When a solution migrates to another island, it is copied
    with all of its data, including its ID. The copy shows up as an unlinked element
    in the graph.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，AlphaEvolve 算法在其提示中结合了几个先前程序的学习成果（可配置的前 *n* 个程序）。生成提示被添加了先前更改的总结及其对结果指标的影响。这种“提示交叉”没有可视化。同样没有可视化的是“克隆”的关系：当一个解决方案迁移到另一个岛屿时，它会连同所有数据（包括其
    ID）一起复制。复制在图中显示为一个未链接的元素。
- en: In any case, the best solution will be saved to *examples/my_project/openevolve_output/best/best_program.txt:*
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '在任何情况下，最佳解决方案将保存到 *examples/my_project/openevolve_output/best/best_program.txt:* '
- en: In silken moonlight, where night’s veil is lifted,
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在丝绸般的月光下，夜幕被揭开，
- en: A constellation of dreams is gently shifted,
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一群梦想被轻轻移动，
- en: The heart, a canvas, painted with vibrant hues,
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 心脏，一幅用鲜艳色彩绘制的画布。
- en: A symphony of feelings, in tender Muse.
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在温柔的缪斯中，情感交响。
- en: Can I…
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我可以……
- en: '**..use my own start prompt?**'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**..使用我自己的起始提示？**'
- en: Yes! Just put the solution you already have in your initial_content.txt.
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 是的！只需将你已有的解决方案放入你的 initial_content.txt 中。
- en: '**..not create my own start prompt?**'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**..不创建我自己的起始提示？**'
- en: Yes! Just put a placeholder like *“No initial poem, invent your own. Make sure
    it mentions cats.”* in your *initial_content.txt.*
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 是的！只需在 *initial_content.txt* 中放一个占位符，例如 *“没有初始诗歌，自己创作。确保提到猫。”* 在你的 *initial_content.txt*
    中。
- en: '**..not write any code?**'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**..不写任何代码？**'
- en: 'Yes! If you don’t want an algorithmic evaluator, put a stub in your *evaluator.py*
    like this:'
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 是的！如果你不想使用算法评估器，在你的 *evaluator.py* 中放一个存根，如下所示：
- en: '[PRE20]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**…use a local or non-OpenAI LLM?**'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**…使用本地或非OpenAI LLM？**'
- en: 'Yes, as long as it is compatible with the OpenAI API! In your *config.yaml*,
    change the *llm: api_base:* to a value like ”http://localhost:11434/v1/” for a
    default ollama configuration. On the command-line, set your API key before calling
    the Python program:'
  id: totrans-118
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '是的，只要它与OpenAI API兼容！在您的*config.yaml*中，将*llm: api_base:*更改为类似于”http://localhost:11434/v1/”的值，以进行默认的ollama配置。在命令行中，在调用Python程序之前设置您的API密钥：'
- en: '[PRE21]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Final thought
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: This article described an experiment with the use of LLM feedback in the context
    of evolutionary algorithms. I wanted to enable and explore this use case, because
    the AlphaEvolve paper itself hinted at it — and mentioned that they hadn’t optimized
    for that yet. This is only the beginning. The right use cases where this comparatively
    high effort for content generation is worth it and more experiments still need
    to follow. Hopefully, all of this will become easier to use in the future.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章描述了在进化算法的背景下使用LLM反馈的实验。我想启用并探索这个用例，因为AlphaEvolve论文本身也暗示了这一点——并提到他们还没有针对这一点进行优化。这只是开始。这种相对较高的内容生成努力值得使用的正确用例，还需要更多的实验。希望，所有这些在将来都会更容易使用。
- en: 'Real-life results: In practice I find that improvements across all metrics
    are observable up to a certain point. However, it is difficult to obtain good
    numeric metrics from an LLM because their ratings are not fine-grained and therefore
    quickly plateau. Better prompts, especially for the evaluator, could possibly
    improve upon this. Either way, the combination of algorithmic and LLM evaluation
    with a powerful evolutionary algorithm and many configuration options makes the
    overall approach very effective.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 实际结果：在实践中，我发现所有指标在某个点上都有所改善。然而，由于LLM的评分不够精细，因此很快就会达到平台期，从LLM中获得良好的数值指标是困难的。更好的提示，特别是对于评估者来说，可能会改善这一点。无论如何，算法和LLM评估与强大的进化算法以及许多配置选项的结合，使得整体方法非常有效。
- en: To generate more exciting LLM metrics that justify the long-running evolution,
    multi-stage LLM evaluator pipelines could be incorporated. These pipelines could
    summarize content and ensure the presence of certain facts, among other things.
    By calling these pipelines from the *evaluator.py* file, this is possible right
    now within OpenEvolve.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 为了生成更多令人兴奋的LLM指标，以证明长期演化的合理性，可以纳入多阶段LLM评估器管道。这些管道可以总结内容并确保某些事实的存在，等等。通过从*evaluator.py*文件调用这些管道，现在在OpenEvolve中就可以实现这一点。
- en: With knowledge bases and tools, the capabilities of such evolutionary systems
    that incorporate LLM feedback can be extended further. An exciting addition for
    OpenEvolve could be the support for MCP servers in the future, but again, in the
    *evaluator.py* file you could already make use of these to generate feedback.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 通过知识库和工具，可以进一步扩展包含LLM反馈的这种进化系统的能力。对于OpenEvolve来说，一个令人兴奋的补充可能是未来对MCP服务器的支持，但同样，你可以在*evaluator.py*文件中利用这些来生成反馈。
- en: This whole approach could also be applied with multi-modal LLMs or a separate
    backend LLM, that generates the actual content in a different modality, and is
    prompted by the evolutionary system. Existing MCP servers could generate images,
    audio and more. As long as we have an LLM suitable for evaluating the result,
    we can then refine the prompt to generate new, improved offspring.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这种整个方法也可以应用于多模态LLM或单独的后端LLM，后者以不同的模态生成实际内容，并由进化系统提示。现有的MCP服务器可以生成图像、音频等。只要我们有一个适合评估结果的LLM，我们就可以进一步细化提示以生成新的、改进的后代。
- en: In summary, there are many more experiments within this exciting framework waiting
    to be done. I look forward to your responses and am eager to see the outcome of
    this. Thanks for reading!
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，在这个激动人心的框架中还有许多更多的实验等待完成。我期待着您的回复，并渴望看到这个的结果。感谢阅读！
- en: References
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'Asankhaya Sharma, [OpenEvolve: Open-source implementation of AlphaEvolve](https://github.com/codelion/openevolve)
    (2025), Github'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Asankhaya Sharma，[OpenEvolve：AlphaEvolve的开源实现](https://github.com/codelion/openevolve)（2025），Github
- en: 'Novikov et al., [AlphaEvolve: A Gemini-Powered Coding Agent for Designing Advanced
    Algorithms](https://deepmind.google/discover/blog/alphaevolve-a-gemini-powered-coding-agent-for-designing-advanced-algorithms/)
    (2025), Google DeepMind'
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Novikov等人，[AlphaEvolve：一个Gemini驱动的用于设计高级算法的编码代理](https://deepmind.google/discover/blog/alphaevolve-a-gemini-powered-coding-agent-for-designing-advanced-algorithms/)（2025），Google
    DeepMind
