- en: 'ResNeXt Paper Walkthrough: Taking ResNet to the Next Level'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ResNeXt论文解读：将ResNet提升到下一个层次
- en: 原文：[https://towardsdatascience.com/taking-resnet-to-the-next-level/](https://towardsdatascience.com/taking-resnet-to-the-next-level/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/taking-resnet-to-the-next-level/](https://towardsdatascience.com/taking-resnet-to-the-next-level/)
- en: <mdspan datatext="el1751515760765" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751515760765" class="mdspan-comment">简介</mdspan>
- en: If you read the title of this article, you might probably think that ResNeXt
    is directly derived from ResNet. Well, that’s true, but I think it’s not entirely
    accurate. In fact, to me ResNeXt is kind of like the combination of ResNet, VGG,
    and Inception at the same time — I’ll show you the reason in a second. In this
    article we are going to talk about the ResNeXt architecture, which includes the
    history, the details of the architecture itself, and the last but not least, the
    code implementation from scratch with PyTorch.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你阅读了这篇文章的标题，你可能可能会想ResNeXt是直接从ResNet派生出来的。这是真的，但我认为这并不完全准确。事实上，对我来说，ResNeXt更像是ResNet、VGG和Inception的结合——我将在下一秒告诉你原因。在这篇文章中，我们将讨论ResNeXt架构，包括其历史、架构本身的细节，以及最后但同样重要的是，使用PyTorch从头开始实现的代码。
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The History of ResNeXt
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ResNeXt的历史
- en: The hyperparameter we usually put our concern on when tuning a neural network
    model is the depth and width, which corresponds to the number of layers and the
    number of channels, respectively. We see this in VGG and ResNet, where the authors
    of the two models proposed small-sized kernels and skip-connections so that they
    can increase the depth of the model easily. In theory, this simple approach is
    indeed capable of expanding model capacity. However, the two hyperparameter dimensions
    are always associated with a significant change in the number of parameters, which
    is definitely a problem since at some point we will have our model becoming too
    large just to make a slight improvement on accuracy. On the other hand, we knew
    that in theory Inception is computationally cheaper, yet it has a complex architectural
    design, which requires us to put more effort to tune the depth and the width of
    this network. If you have ever learned about Inception, it essentially works by
    passing a tensor through several convolution layers of different kernel sizes
    and let the network decide which one is better to represent the features of a
    specific task.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当调整神经网络模型时，我们通常关注的超参数是深度和宽度，分别对应于层数和通道数。我们在VGG和ResNet中看到了这一点，两个模型的作者提出了小型核和跳跃连接，以便他们可以轻松增加模型的深度。从理论上讲，这种方法确实能够扩展模型容量。然而，这两个超参数维度总是与参数数量的显著变化相关联，这无疑是一个问题，因为到了某个时候，我们的模型可能仅仅为了在精度上略有提高而变得过大。另一方面，我们知道从理论上讲，Inception在计算上更便宜，但它有一个复杂的架构设计，这要求我们投入更多精力来调整这个网络的深度和宽度。如果你曾经了解过Inception，它本质上是通过通过几个不同核大小的卷积层传递张量，让网络决定哪一个更适合表示特定任务的特性。
- en: Xie *et al.* wondered if they could extract the best part of the three models
    so that model tuning can be easier like VGG and ResNet while still maintaining
    the efficiency of Inception. All their ideas are wrapped in a paper titled “*Aggregated
    Residual Transformations for Deep Neural Networks*” [1], where they named the
    network *ResNeXt*. This is essentially where a new concept referred to as *cardinality*
    came from, in which it essentially adopts the idea of Inception, i.e., passing
    a tensor through multiple branches, yet in a simpler, more scalable way. We can
    perceive cardinality as a new parameter possible to be tuned in addition to depth
    and width. By doing so, we now essentially have the *next* hyperparameter dimension — hence
    the name, *ResNeXt* — which allows us to have a higher degree of freedom to perform
    parameter tuning.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 谢等人想知道他们是否能够提取三个模型中的最佳部分，以便模型调整可以像VGG和ResNet一样更容易，同时仍然保持Inception的效率。他们所有的想法都包含在一篇题为“*深度神经网络聚合残差变换*”的论文中[1]，其中他们将网络命名为*ResNeXt*。这就是所谓的*基数*这一新概念产生的根本原因，它本质上采用了Inception的想法，即通过多个分支传递张量，但以一种更简单、更可扩展的方式。我们可以将基数视为一个新参数，除了深度和宽度之外，还可以对其进行调整。通过这样做，我们现在本质上有了*下一个*超参数维度——因此得名*ResNeXt*——这使我们能够在参数调整方面拥有更高的自由度。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ResNeXt Module
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ResNeXt模块
- en: According to the paper, there are three ways we can do to implement cardinality,
    which you can see in Figure 1 below. The paper also mentions that setting cardinality
    to 32 is the best practice as it generally provides a good balance between accuracy
    and computational complexity, so I’ll use this number to explain the following
    example.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 根据论文，我们可以用三种方式来实现基数，您可以在下面的图1中看到。论文还提到，将基数设置为32是最佳实践，因为它通常在准确性和计算复杂度之间提供了良好的平衡，所以我会用这个数字来解释下面的例子。
- en: '![](../Images/20bbb989d73fbdde0df205a8aaa978ab.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/20bbb989d73fbdde0df205a8aaa978ab.png)'
- en: Figure 1\. The three ResNeXt module variants [1].
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 三个ResNeXt模块变体[1]。
- en: 'The input of the three modules above is exactly the same, i.e., an image tensor
    having 256 channels. In variant (a), the input tensor is duplicated 32 times,
    in which each copy will be processed independently to represent the 32 paths.
    The first convolution layer in each path is responsible to project the 256-channel
    image into 4 using 1×1 kernel, which is followed by two more layers: a 3×3 convolution
    that preserves the number of channels, and a 1×1 convolution that expands the
    channels back to 256\. The tensors from the 32 branches are then aggregated by
    element-wise summation before eventually being summed again with the original
    input tensor from the very beginning of the module through skip-connection.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 上述三个模块的输入完全相同，即一个具有256个通道的图像张量。在变体（a）中，输入张量被复制了32次，每个副本将独立处理以表示32条路径。每条路径中的第一个卷积层负责使用1×1核将256通道的图像投影到4个通道，随后是两个额外的层：一个保持通道数量的3×3卷积层，以及一个将通道扩展回256的1×1卷积层。然后，来自32个分支的张量通过逐元素求和进行聚合，最终再次与模块一开始的原始输入张量相加，通过跳跃连接实现。
- en: Remember that Inception uses the idea of *split-transform-merge*. This is exactly
    what I just explained for the ResNeXt block variant (a), where the *split* is
    done before the first 1×1 convolution layer, the *transform* is performed within
    each branch, and the *merge* is the element-wise summation operations. This idea
    also applies to the ResNeXt module variant (b), in which case the *merge* operation
    is performed by channel-wise concatenation resulting in 128-channel image (which
    comes from 4 channels × 32 paths). The resulting tensor is then projected back
    to the original dimension by 1×1 convolution layer before eventually summed with
    the original input tensor.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，Inception使用了*split-transform-merge*的概念。这正是我刚才解释的ResNeXt块变体（a）中的情况，其中*split*是在第一个1×1卷积层之前进行的，*transform*在每个分支内部执行，而*merge*是逐元素求和操作。这个想法也适用于ResNeXt模块变体（b），在这种情况下，*merge*操作是通过通道拼接来执行的，结果得到一个128通道的图像（由4个通道×32条路径组成）。然后，通过1×1卷积层将得到的张量投影回原始维度，最终与原始输入张量相加。
- en: Notice that there is a word *equivalent* in the top-left corner of the above
    figure. This means that these three ResNeXt block variants are basically the similar
    in terms of the number of parameters, FLOPs, and the resulting accuracy scores.
    This notion makes sense because they are all basically derived from the same mathematical
    formulation. I’ll talk more about it later in the subsequent section. Despite
    this equivalency, I’ll go with option (c) later in the implementation part. This
    is because this variant employs the so-called *group convolution*, which is much
    easier to implement than (a) and (b). In case you’re not yet familiar with the
    term, it is essentially a technique in a convolution operation where we divide
    all input channels into several groups in which every single of those is responsible
    to process channels within the same group before eventually concatenating them.
    In the case of (c), we reduce the number of channels from 256 to 128 before the
    splitting is done, allowing us to have 32 convolution kernel groups where each
    responsible to process 4 channels. We then project the tensor back to the original
    number of channels so that we can sum it with the original input tensor.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到上图左上角有一个单词 *equivalent*。这意味着这三个 ResNeXt 块变体在参数数量、FLOPs 和最终准确度得分方面基本上是相似的。这个概念是有意义的，因为它们基本上都源自相同的数学公式。我将在后续部分详细讨论这一点。尽管存在这种等价性，但在实现部分我仍将选择选项
    (c)。这是因为这个变体采用了所谓的 *分组卷积*，这比 (a) 和 (b) 更容易实现。如果你还不熟悉这个术语，它本质上是一种卷积操作中的技术，其中我们将所有输入通道分成几个组，每个组中的每个通道负责在最终连接之前处理同一组内的通道。在
    (c) 的情况下，我们在分割之前将通道数量从 256 减少到 128，从而让我们有 32 个卷积核组，每个组负责处理 4 个通道。然后我们将张量投影回原始的通道数量，以便我们可以将其与原始输入张量相加。
- en: Mathematical Definition
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数学定义
- en: As I mentioned earlier, here’s what the formal mathematical definition of a
    ResNeXt module looks like.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前提到的，下面是 ResNeXt 模块的正式数学定义。
- en: '![](../Images/8ec15343b01a65305fdf9176f254b95a.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8ec15343b01a65305fdf9176f254b95a.png)'
- en: Figure 2\. The mathematical expression of a ResNeXt module [1].
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2. ResNeXt 模块的数学表达式 [1]。
- en: The above equation encapsulates the entire *split-transform-merge* operation,
    where *x* is the original input tensor, *y* is the output tensor, *C* is the cardinality
    parameter to determine the number of parallel paths used, *T* is the transformation
    function applied to each path, and *∑* indicates that we will merge all information
    from the transformed tensors. However, it is important to note that even though
    sigma usually denotes summation, only (a) that actually sums the tensors. Meanwhile,
    both (b) and (c) do the merging through concatenation followed by 1×1 convolution
    instead, which in fact is still equivalent to (a).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 上述方程封装了整个 *分割-变换-合并* 操作，其中 *x* 是原始输入张量，*y* 是输出张量，*C* 是基数参数，用于确定使用的并行路径数量，*T*
    是应用于每个路径的变换函数，而 *∑* 表示我们将合并来自变换张量的所有信息。然而，需要注意的是，尽管 sigma 通常表示求和，但只有 (a) 实际上对张量进行求和。同时，(b)
    和 (c) 通过连接后跟 1×1 卷积来完成合并，这实际上仍然等同于 (a)。
- en: The Entire ResNeXt Architecture
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 整个 ResNeXt 架构
- en: The structure displayed in Figure 1 and the equation in Figure 2 basically only
    correspond to a single ResNeXt block. In order to construct the entire architecture,
    we need to stack the block multiple times following the structure shown in Figure
    3 below.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1 中显示的结构和图 2 中的方程基本上只对应一个 ResNeXt 块。为了构建整个架构，我们需要按照图 3 中的结构多次堆叠该块。
- en: '![](../Images/96933282ce8bc3b3122e5d0652755dfd.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/96933282ce8bc3b3122e5d0652755dfd.png)'
- en: Figure 3\. The ResNet-50 architecture and the ResNeXt-50 (32×4d) counterpart
    [1].
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3. ResNet-50 架构和 ResNeXt-50 (32×4d) 对应版本 [1]。
- en: Here you can see that the structure of ResNeXt is nearly identical to ResNet.
    So, I believe you will later find the ResNeXt implementation extremely easy, especially
    if you have ever implemented ResNet before. The first difference you might notice
    in the architecture is the number of kernels of the first two convolution layers
    in each block, where the ResNeXt block generally has twice as many kernels as
    that of the corresponding ResNet block, especially starting from the *conv2* stage
    all the way to the *conv5* stage. Secondly, it is also clearly seen that we have
    the cardinality parameter applied to the second convolution layer in each ResNeXt
    block.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以看到 ResNeXt 的结构几乎与 ResNet 完全相同。所以，我相信你会在以后发现 ResNeXt 的实现非常容易，尤其是如果你之前已经实现过
    ResNet。你可能会注意到的第一个架构差异是每个块中前两个卷积层的内核数量，其中 ResNeXt 块通常比相应的 ResNet 块多一倍内核，特别是从 *conv2*
    阶段一直到 *conv5* 阶段。其次，很明显，我们在每个 ResNeXt 块的第二卷积层应用了基数参数。
- en: The ResNeXt variant implemented above, which is equivalent to ResNet-50, is
    the one referred to as *ResNeXt-50 (32×4d)*. This naming convention indicates
    that this variant consists of 50 layers in the main branch with 32 cardinality
    and 4 number of channels in each path within the *conv2* stage. As of this writing,
    there are three ResNeXt variants already implemented in PyTorch, namely *resnext50_32x4d*,
    *resnext101_32x8d*, and *resnext101_64x4d* [2]. You can definitely import them
    easily alongside the pretrained weights if you want. However, in this article
    we are going to implement the architecture from scratch instead.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 上文中实现的 ResNeXt 变体，相当于 ResNet-50，被称为 *ResNeXt-50 (32×4d)*。这种命名约定表明，这个变体在主分支中有
    50 层，每条路径在 *conv2* 阶段有 32 个基数和 4 个通道数。截至本文写作时，PyTorch 中已经实现了三种 ResNeXt 变体，分别是
    *resnext50_32x4d*、*resnext101_32x8d* 和 *resnext101_64x4d* [2]。如果你想要导入它们并使用预训练的权重，那肯定可以轻松做到。然而，在这篇文章中，我们将从头开始实现架构。
- en: '* * *'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ResNeXt Implementation
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ResNeXt 实现
- en: As we have understood the underlying theory behind ResNeXt, let’s now get our
    hands dirty with the code! The first thing we do is to import the required modules
    as shown in Codeblock 1 below.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经理解了 ResNeXt 的底层理论，现在让我们动手编写代码！我们首先做的是导入所需的模块，如下面的代码块 1 所示。
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Here I am going to implement the *ResNeXt-50 (32×4d)* variant. So, I need to
    set the parameters in Codeblock 2 according to the architectural details shown
    back in Figure 3.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我将实现 *ResNeXt-50 (32×4d)* 变体。因此，我需要根据图 3 中显示的架构细节在代码块 2 中设置参数。
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The `CARDINALITY` variable at line `#(1)` is self-explanatory, so I don’t think
    I need to explain it any further. Next, the `NUM_CHANNELS` variable is used to
    store the number of output channels of each stage, except for index 0 where it
    corresponds to the number of input channels (`#(2)`). At line `#(3)`, `NUM_BLOCKS`
    is used to determine how many times we will repeat the corresponding block. Note
    that we don’t specify any number for the *conv1* stage since this stage only consists
    of a single block. Lastly here we set the `NUM_CLASSES` parameter to 1000 since
    ResNeXt is originally pretrained on ImageNet-1K dataset (`#(4)`).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 第 `#(1)` 行的 `CARDINALITY` 变量是显而易见的，所以我认为没有必要进一步解释。接下来，`NUM_CHANNELS` 变量用于存储每个阶段的输出通道数，除了索引
    0，它对应于输入通道数 (`#(2)`)。在第 `#(3)` 行，`NUM_BLOCKS` 用于确定我们将重复相应块多少次。请注意，我们没有为 *conv1*
    阶段指定任何数字，因为这个阶段只包含一个块。最后在这里，我们将 `NUM_CLASSES` 参数设置为 1000，因为 ResNeXt 是在 ImageNet-1K
    数据集上预训练的 (`#(4)`)。
- en: The ResNeXt Module
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ResNeXt 模块
- en: Since the entire ResNeXt architecture is basically just a bunch of ResNeXt modules,
    we can basically create a single class to define the module and later use it repeatedly
    in the main class. In this case, I refer to the module as `Block`. The implementation
    of this class is pretty long, though. So I decided to break it down into several
    codeblocks. Just ensure that all the codeblocks of the same number are placed
    within the same notebook cell if you want to run the code.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 由于整个 ResNeXt 架构基本上只是一系列 ResNeXt 模块，我们可以创建一个单独的类来定义模块，并在主类中重复使用它。在这种情况下，我将该模块称为
    `Block`。这个类的实现相当长，所以我决定将其分解成几个代码块。如果你想要运行代码，请确保相同编号的所有代码块都放置在同一个笔记本单元中。
- en: You can see in the Codeblock 3a below that the `__init__()` method of this class
    accepts several parameters. The `in_channels` parameter (`#(1)`) is used to set
    the number of channels of the tensor to be passed into the block. I set it to
    be adjustable because the blocks in different stage will have different input
    shapes. Secondly, the `add_channel` and `downsample` parameters (`#(2,4)`) are
    flags to control whether the block will perform downsampling. If you take a closer
    look at Figure 3, you’ll notice that every time we move from one stage to another,
    the number of output channels of the block becomes twice as large as the output
    from the previous stage while at the same time the spatial dimension is reduced
    by half. We need to set both `add_channel` and `downsample` to `True` whenever
    we move from one stage to the next one. Otherwise, we set the two parameters to
    `False` if we only move from one block to another within the same stage. The `channel_multiplier`
    parameter (`#(3)`), on the other hand, is used to determine the number of output
    channels relative to the number of input channels by changing the multiplication
    factor. This parameter is important because there is a special case where we need
    to make the number of output channels to be four times larger instead of two,
    i.e., when we move from *conv1* stage (64) to *conv2* stage (256).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在下面的代码块3a中看到，这个类的`__init__()`方法接受几个参数。`in_channels`参数（`#(1)`）用于设置要传递到块的张量的通道数。我将其设置为可调整的，因为不同阶段的块将有不同的输入形状。其次，`add_channel`和`downsample`参数（`#(2,4)`）是标志，用于控制块是否执行下采样。如果你仔细观察图3，你会注意到，每次我们从一级移动到另一级时，块的输出通道数是前一级的两倍，同时空间维度减半。当我们从一个阶段移动到下一个阶段时，我们需要将`add_channel`和`downsample`都设置为`True`。否则，如果我们只从一个块移动到同一阶段内的另一个块，我们将这两个参数设置为`False`。另一方面，`channel_multiplier`参数（`#(3)`）用于通过改变乘数来确定输出通道数相对于输入通道数的数量。这个参数很重要，因为有一个特殊情况，我们需要将输出通道数增加到四倍而不是两倍，即当我们从*conv1*阶段（64）移动到*conv2*阶段（256）时。
- en: '[PRE2]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The parameters we just discussed directly control the `if` statements at line
    `#(5)` and `#(9)`. The former is going to be executed whenever the `add_channel`
    is `True`, in which case the number of input channels will be multiplied by `channel_multiplier`
    to obtain the number of output channels (`#(6)`). Meanwhile, if it is `False`,
    we will make input and the output tensor dimension to be the same (`#(7)`). Here
    we set `mid_channels` to be half the size of `out_channels` (`#(8)`). This is
    because according to Figure 3 the number of channels in the output tensor of the
    first two convolution layers within each block is half of that of the third convolution
    layer. Next, the `downsample` flag we defined earlier is used to control the `if`
    statement at line `#(9)`. Whenever it is set to `True`, it will assign the `stride`
    variable to 2 (`#(10)`), which will later cause the convolution layer to reduce
    the spatial dimension of the image by half.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚才讨论的参数直接控制第`#(5)`行和`#(9)`行的`if`语句。前者将在`add_channel`为`True`时执行，在这种情况下，输入通道的数量将乘以`channel_multiplier`以获得输出通道的数量（`#(6)`）。同时，如果它是`False`，我们将使输入和输出张量的维度相同（`#(7)`）。在这里，我们将`mid_channels`设置为`out_channels`大小的一半（`#(8)`）。这是因为根据图3，每个块中前两个卷积层的通道数是第三个卷积层的一半。接下来，我们之前定义的`downsample`标志用于控制第`#(9)`行的`if`语句。每当它设置为`True`时，它将把`stride`变量设置为2（`#(10)`），这将在之后导致卷积层将图像的空间维度减半。
- en: Still inside the `__init__()` method, let’s now define the layers within the
    ResNeXt block. See the Codeblock 3b below for the details.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然在`__init__()`方法中，现在让我们定义ResNeXt块内的层。请参见下面的代码块3b以获取详细信息。
- en: '[PRE3]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Remember that there are cases where the output dimension of a ResNeXt block
    is different from the input. In such a case, element-wise summation at the last
    step cannot be performed (refer to Figure 1). This is the reason that we need
    to initialize a `projection` layer whenever either the `add_channel` or `downsample`
    flags are `True` (`#(1)`). This `projection` layer (`#(2)`), which is a 1×1 convolution,
    is used to process the tensor in the skip-connection so that the output shape
    is going to match the tensor processed by the main flow, allowing them to be summed.
    Otherwise, if we want the ResNeXt module to preserve the tensor dimension, we
    need to set both flags to `False` so that the projection layer will not be initialized
    since we can directly sum the skip-connection with the tensor from the main flow.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，存在一些情况，ResNeXt模块的输出维度与输入维度不同。在这种情况下，在最后一步无法执行逐元素求和（参见图1）。这就是为什么每当`add_channel`或`downsample`标志为`True`（`#(1)`）时，我们需要初始化一个`projection`层的原因。这个`projection`层（`#(2)`），它是一个1×1卷积，用于处理跳跃连接中的张量，以便输出形状将与主流程处理过的张量相匹配，从而允许它们相加。否则，如果我们想让ResNeXt模块保留张量维度，我们需要将两个标志都设置为`False`，这样投影层就不会被初始化，因为我们可以直接将跳跃连接与主流程中的张量相加。
- en: The main flow of the ResNeXt module itself comprises three convolution layers,
    which I refer to as `conv0`, `conv1` and `conv2`, as written at line `#(3)`, `#(5)`
    and `#(8)` respectively. If we take a closer look at these layers, we can see
    that both `conv0` and `conv2` are responsible for manipulating the number of channels.
    At lines `#(3)` and `#(4)`, we can see that `conv0` changes the number of image
    channels from `in_channels` to `mid_channels`, while `conv2` changes it from `mid_channels`
    to `out_channels` (`#(8-9)`). On the other hand, the `conv1` layer is responsible
    to control the spatial dimension through the `stride` parameter (`#(6)`), in which
    the value is determined according to the `dowsample` flag we discussed earlier.
    Furthermore, this `conv1` layer will do the entire *split-transform-merge* process
    through group convolution (`#(7)`), which in the case of ResNeXt it corresponds
    to cardinality.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: ResNeXt模块本身的主流程由三个卷积层组成，我分别称之为`conv0`、`conv1`和`conv2`，分别写在行`#(3)`、`#(5)`和`#(8)`。如果我们仔细观察这些层，我们可以看到`conv0`和`conv2`都负责调整通道数。在行`#(3)`和`#(4)`中，我们可以看到`conv0`将图像通道数从`in_channels`变为`mid_channels`，而`conv2`将其从`mid_channels`变为`out_channels`（`#(8-9)`）。另一方面，`conv1`层负责通过`stride`参数控制空间维度（`#(6)`），其值根据我们之前讨论的`dowsample`标志确定。此外，这个`conv1`层将通过分组卷积（`#(7)`）完成整个*split-transform-merge*过程，在ResNeXt的情况下对应于基数。
- en: Additionally, here we initialize batch normalization layers named `bn_proj`,
    `bn0`, `bn1`, and `bn2`. Later in the `forward()` method, we are going to place
    them right after the corresponding convolution layers following the *Conv-BN-ReLU*
    structure, which is a standard practice when it comes to constructing a CNN-based
    model. Not only that, notice that here we also write `nn.init.kaiming_normal_()`
    after the initialization of each convolution layer. This is essentially done so
    that the initial layer weights follow the Kaiming normal distribution as mentioned
    in the paper.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在这里我们初始化了名为`bn_proj`、`bn0`、`bn1`和`bn2`的批量归一化层。在`forward()`方法中，我们将它们放置在相应的卷积层之后，遵循*Conv-BN-ReLU*结构，这是构建基于CNN的模型时的标准做法。不仅如此，请注意，在这里我们还在每个卷积层初始化后写入了`nn.init.kaiming_normal_()`。这实际上是为了确保初始层权重遵循论文中提到的Kaiming正态分布。
- en: That was everything about the `__init__()` method, now that we are going to
    move on to the `forward()` method to actually define the flow of the ResNeXt module.
    See the Codeblock 3c below.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 关于`__init__()`方法的所有内容就到这里，现在我们将继续到`forward()`方法，以实际定义ResNeXt模块的流程。请参见下面的代码块3c。
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Here you can see that this function accepts `x` as the only input, in which
    it is basically a tensor produced by the previous ResNeXt block. The `if` statement
    I write at line `#(1)` checks whether we are about to perform downsampling. If
    so, the tensor in the skip-connection is going to be passed through the `projection`
    layer and the corresponding batch normalization layer before eventually stored
    in the `residual` variable (`#(2)`). But if downsampling is not performed, we
    are going to set `residual` to be exactly the same as `x` (`#(3)`). Next, we will
    process the main tensor `x` using the stack of convolution layers starting from
    `conv0` (`#(4)`) all the way to `conv2` (`#(5)`). It is important to note that
    the *Conv-BN-ReLU* structure of the `conv2` layer is slightly different, where
    the ReLU activation function is applied after element-wise summation is performed
    (`#(6)`).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以看到这个函数只接受`x`作为唯一输入，其中它基本上是由前面的ResNeXt块产生的张量。我在行`#(1)`写的`if`语句检查我们是否即将执行下采样。如果是这样，跳连接中的张量将通过`projection`层和相应的批量归一化层，最终存储在`residual`变量中（`#(2)`）。但如果不下采样，我们将把`residual`设置为与`x`完全相同（`#(3)`）。接下来，我们将使用从`conv0`（`#(4)`）到`conv2`（`#(5)`）的卷积层堆栈处理主张量`x`。重要的是要注意，`conv2`层的*Conv-BN-ReLU*结构略有不同，其中ReLU激活函数是在逐元素相加之后应用的（`#(6)`）。
- en: Now let’s test the ResNeXt block we just created to find out whether we have
    implemented it correctly. There are three conditions I am going to test here,
    namely when we move from one stage to another (setting both `add_channel` and
    `downsample` to `True`), when we move from one block to another within the same
    stage (both `add_channel` and `downsample` are `False`), and when we move from
    *conv1* stage to *conv2* stage (setting `downsample` to `False` and `add_channel`
    to `True` with 4 channel multiplier).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们测试我们刚刚创建的ResNeXt块，以确定我们是否正确实现了它。我将在这里测试三个条件，即当我们从一个阶段移动到另一个阶段时（将`add_channel`和`downsample`都设置为`True`），当我们从一个块移动到同一阶段内的另一个块时（`add_channel`和`downsample`都是`False`），以及当我们从*conv1*阶段移动到*conv2*阶段时（将`downsample`设置为`False`，将`add_channel`设置为`True`，并使用4个通道乘数）。
- en: Test Case 1
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试用例1
- en: The Codeblock 4 below demonstrates the first test case, in which here I simulate
    the first block of the *conv3* stage. If you go back to Figure 3, you will see
    that the output from the previous stage is a 256-channel image. Thus, we need
    to set the `in_channels` parameter according to this number. Meanwhile, the output
    of the ResNeXt block in the stage has 512 channels with 28×28 spatial dimension.
    This tensor shape transformation is actually the reason that we set both flags
    to `True`. Here we assume that the `x` tensor passed through the network is a
    dummy image produced by the *conv2* stage.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码块4演示了第一个测试用例，在这里我模拟了*conv3*阶段的第一个块。如果你回到图3，你会看到前一个阶段的输出是一个256通道的图像。因此，我们需要根据这个数字设置`in_channels`参数。同时，该阶段的ResNeXt块的输出有512个通道，空间维度为28×28。这种张量形状转换实际上是我们设置两个标志为`True`的原因。在这里，我们假设通过网络传递的`x`张量是由*conv2*阶段产生的虚拟图像。
- en: '[PRE5]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: And below is what the output looks like. It is seen at line `#(1)` that our
    `projection` layer successfully projected the tensor to 512×28×28, exactly matching
    the shape of the output tensor from the main flow (`#(4)`). The `conv0` layer
    at line `#(2)` does not alter the tensor dimension at all since in this case our
    `in_channels` and `mid_channels` are the same. The actual spatial downsampling
    is performed by the `conv1` layer, where the image resolution is reduced from
    56×56 to 28×28 (`#(3)`) thanks to the stride which is set to 2 for this case.
    The process is then continued by the `conv2` layer which doubles the number of
    channels from 256 to 512 (`#(4)`). Lastly, this tensor will be element-wise summed
    with the projected skip-connection tensor (`#(5)`). And with that, we successfully
    converted our tensor from 256×56×56 to 512×28×28.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 以下展示的是输出结果的样子。在行`#(1)`中可以看到，我们的`projection`层成功地将张量投影到512×28×28，这与主流程（`#(4)`）输出的张量形状完全匹配。行`#(2)`中的`conv0`层并没有改变张量的维度，因为在这种情况下，我们的`in_channels`和`mid_channels`是相同的。实际的空间下采样是由`conv1`层执行的，图像分辨率从56×56减少到28×28（`#(3)`），这得益于设置为2的步长。然后，这个过程由`conv2`层继续，该层将通道数从256增加到512（`#(4)`）。最后，这个张量将与投影的跳跃连接张量（`#(5)`）逐元素相加。就这样，我们成功地将我们的张量从256×56×56转换为512×28×28。
- en: '[PRE6]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Test Case 2
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试用例2
- en: In order to demonstrate the second test case, here I will simulate the block
    inside the *conv3* stage which the input is a tensor produced by the previous
    block within the same stage. In such a case, we want the input and output dimension
    of this ResNeXt module to be the same, hence we need to set both `add_channel`
    and `downsample` to `False`. See the Codeblock 5 and the resulting output below
    for the details.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示第二个测试案例，这里我将模拟*conv3*阶段的内部块，输入是由同一阶段中前一个块生成的张量。在这种情况下，我们希望这个ResNeXt模块的输入和输出维度相同，因此我们需要将`add_channel`和`downsample`都设置为`False`。请参阅代码块5和下面的输出结果以获取详细信息。
- en: '[PRE7]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '[PRE8]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: As I’ve mentioned earlier, the projection layer is not going to be used if the
    input tensor is not downsampled. This is the reason that at line `#(1)` we have
    our skip-connection tensor shape unchanged. Next, we have our channel count reduced
    to 256 by the `conv0` layer since in this case `mid_channels` is half the size
    of `out_channels` (`#(2)`). We eventually expand this number of channels back
    to 512 using the *conv2* layer (`#(3)`). Additionally, this kind of structure
    is commonly known as *bottleneck* since it follows the *wide-narrow-wide* pattern,
    which was first introduced in the original ResNet paper [3].
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前所述，如果输入张量没有下采样，则不会使用投影层。这就是为什么在行`#(1)`中我们的跳过连接张量形状保持不变的原因。接下来，由于在这种情况下`mid_channels`是`out_channels`大小的一半，`conv0`层将通道数减少到256。我们最终使用`*conv2*`层将通道数扩展回512（`#(3)`）。此外，这种结构通常被称为*bottleneck*，因为它遵循*宽-窄-宽*的模式，这种模式最初在原始ResNet论文[3]中提出。
- en: Test Case 3
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试案例3
- en: The third test is actually a special case since we are about to simulate the
    first block in the *conv2* stage, where we need to set the `add_channel` flag
    to `True` while the `downsample` to `False`. Here we don’t want to perform spatial
    downsampling in the convolution layer because it is already done by a maxpooling
    layer. Furthermore, you can also see in Figure 3 that the *conv1* stage returns
    an image of 64 channels. Due to this reason, we need to set the `channel_multiplier`
    parameter to 4 since we want the subsequent *conv2* stage to return 256 channels.
    See the details in the Codeblock 6 below.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个测试实际上是一个特殊情况，因为我们即将模拟*conv2*阶段的第一个块，其中我们需要将`add_channel`标志设置为`True`，而`downsample`设置为`False`。我们不想在卷积层中进行空间下采样，因为这是由maxpooling层完成的。此外，你还可以在图3中看到*conv1*阶段返回了一个64通道的图像。由于这个原因，我们需要将`channel_multiplier`参数设置为4，因为我们希望随后的*conv2*阶段返回256通道。请参阅下面的代码块6中的详细信息。
- en: '[PRE9]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: It is seen in the resulting output above that the ResNeXt module automatically
    utilize the `projection` layer, which in this case it successfully converted the
    64×56×56 tensor into 256×56×56 (`#(1)`). Here you can see that the number of channels
    expanded to be 4 times larger while the spatial dimension remained the same. Afterwards,
    we shrink the channel count to 128 (`#(2)`) and expand it back to 256 (`#(3)`)
    to simulate the *bottleneck* mechanism. Thus, we can now perform summation between
    the tensor from the main flow and the one produced by the `projection` layer.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的输出结果中可以看出，ResNeXt模块自动利用了`projection`层，在这种情况下，它成功地将64×56×56的张量转换为256×56×56（`#(1)`）。在这里，你可以看到通道数扩展到原来的4倍，而空间维度保持不变。之后，我们将通道数减少到128（`#(2)`），然后将其扩展回256（`#(3)`）来模拟*bottleneck*机制。因此，我们现在可以在主流和由`projection`层产生的张量之间进行求和。
- en: At this point we already got our ResNeXt module works properly to handle the
    three cases. So, I believe this module is now ready to be assembled to actually
    construct the entire ResNeXt architecture.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经让ResNeXt模块正确地处理了三种情况。因此，我相信这个模块现在可以组装起来，实际上构建整个ResNeXt架构。
- en: The Entire ResNeXt Architecture
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 整个ResNeXt架构
- en: Since the following ResNeXt class is pretty long, I break it down into two codeblocks
    to make things easier to follow. What we basically need to do in the `__init__()`
    method in Codeblock 7a is to initialize the ResNeXt modules using the `Block`
    class we created earlier. The way to implement the *conv3* (`#(9)`), *conv4* (`#(12)`)
    and *conv5* (`#(15)`) stages are pretty straightforward since what we basically
    need to do is just to initialize the blocks inside `nn.ModuleList`. Remember that
    the first block within each stage is a downsampling block, while the rest them
    are not intended to perform downsampling. Due to this reason, we need to initialize
    the first block manually by setting both `add_channel` and `downsample` flags
    to `True` (`#(10,13,16)`) whereas the remaining blocks are initialized using loops
    which iterate according to the numbers stored in the `NUM_CHANNELS` list (`#(11,14,17)`).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 由于接下来的ResNeXt类相当长，我将它拆分为两个代码块，以便更容易理解。在代码块7a的`__init__()`方法中，我们基本上需要使用我们之前创建的`Block`类来初始化ResNeXt模块。实现*conv3*（`#(9)`）、*conv4*（`#(12)`）和*conv5*（`#(15)`）阶段的方式相当直接，因为我们基本上只需要初始化`nn.ModuleList`内部的模块。记住，每个阶段内的第一个模块是一个下采样模块，而其余的模块并不打算执行下采样。由于这个原因，我们需要手动初始化第一个模块，将`add_channel`和`downsample`标志都设置为`True`（`#(10,13,16)`），而其余模块则使用循环初始化，循环根据`NUM_CHANNELS`列表中存储的数字进行迭代（`#(11,14,17)`）。
- en: '[PRE11]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: As we discussed earlier, the *conv2* stage (`#(5)`) is a bit special since the
    first block within this stage does increase the number of channels yet it does
    not reduce the spatial dimension. This is essentially the reason that I set the
    `add_channel` parameter to `True` (`#(6)`) while the `downsample` parameter is
    set to `False` (`#(7)`). The initialization of the remaining blocks is the same
    as the other stages we discussed earlier, where we can just do it with a simple
    loop (`#(8)`).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前讨论的，*conv2*阶段（`#(5)`）有一点特别，因为这个阶段内的第一个模块确实增加了通道数，但并没有减少空间维度。这基本上是我将`add_channel`参数设置为`True`（`#(6)`）而将`downsample`参数设置为`False`（`#(7)`）的原因。剩余模块的初始化与其他阶段我们之前讨论的相同，我们可以通过一个简单的循环来完成它（`#(8)`）。
- en: The *conv1* stage (`#(1)`) on the other hand, does not utilize the `Block` class
    since the structure is completely different from the other stages. According to
    Figure 3, this stage only comprises a single 7×7 convolution layer (`#(2)`), which
    allows us to capture a larger context from the input image. The tensor produced
    by this layer will have half the spatial dimensions of the input thanks to the
    `stride` parameter which is set to 2 (`#(3)`). Further downsampling is performed
    using maxpooling layer with the same stride, which again, reduces the spatial
    dimension by half (`#(4)`). — In fact, this maxpooling layer should be inside
    the *conv2* stage instead, but in this implementation I put it outside the `nn.ModuleList`
    of that stage for the sake of simplicity.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，*conv1*阶段（`#(1)`）没有使用`Block`类，因为其结构与其他阶段完全不同。根据图3，这个阶段只包含一个7×7的卷积层（`#(2)`），这使我们能够从输入图像中捕获更大的上下文。由于`stride`参数设置为2（`#(3)`），这个层产生的张量将具有输入一半的空间维度。进一步的下采样是通过具有相同步长的maxpooling层来执行的，这再次将空间维度减半（`#(4)`）。— 实际上，这个maxpooling层应该放在*conv2*阶段内部，但在这个实现中，我为了简单起见将其放在该阶段的`nn.ModuleList`外部。
- en: Lastly, we need to initialize a global average pooling layer (`#(18)`) which
    works by taking the average value of each channel in the tensor produced by the
    last convolution layer. By doing this, we are going to have a single number representing
    each channel. This tensor will then be connected to the output layer that produces
    `NUM_CLASSES` (1000) neurons (`#(19)`), in which every single of them corresponds
    to each class in the dataset.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要初始化一个全局平均池化层（`#(18)`），它通过取最后卷积层产生的张量中每个通道的平均值来工作。通过这样做，我们将得到一个代表每个通道的单个数字。这个张量随后将连接到输出层，该层产生`NUM_CLASSES`（1000）个神经元（`#(19)`），其中每一个都对应于数据集中的每个类别。
- en: Now look at the Codeblock 7b below to see how I define the `forward()` method.
    I think there is not much thing I need to explain since what we basically do here
    is just to pass the tensor from one layer to the subsequent one sequentially.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在看看下面的代码块7b，看看我是如何定义`forward()`方法的。我认为这里没有太多需要解释的，因为我们基本上只是按顺序将张量从一个层传递到下一个层。
- en: '[PRE12]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Next, let’s test our ResNeXt class using the following code. Here I am going
    to test it by passing a dummy tensor of size 3×224×224 which simulates a single
    RGB image of size 224×224.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们使用以下代码测试我们的 ResNeXt 类。这里我将通过传递一个大小为 3×224×224 的虚拟张量来测试它，这模拟了一个 224×224
    大小的单个 RGB 图像。
- en: '[PRE13]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '[PRE14]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We can see in the above output that our *conv1* stage correctly reduce the spatial
    dimension from 224×224 to 112×112 while at the same time also increasing the number
    of channels to 64 (`#(1)`). The downsapling is continued by the maxpooling layer,
    where it makes the spatial dimension of the image reduced to 56×56 (`#(2)`). Moving
    on to the *conv2* stage, we can see that our first block in the stage successfully
    converted the 64-channel image into 256 (`#(3)`), in which the subsequent blocks
    in the same stage preserve the dimension of this tensor (`#(4–5)`). The same thing
    is also done by the next stages until we reach the global average pooling layer
    (`#(6)`). It is important to note that we need to perform tensor flattening (`#(7)`)
    to drop the empty axes before eventually connecting it to the output layer (`#(8)`).
    And that concludes how a tensor flows through the ResNeXt architecture.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从上面的输出中看到，我们的 *conv1* 阶段正确地将空间维度从 224×224 减少到 112×112，同时还将通道数增加到 64 (`#(1)`).
    通过最大池化层继续下采样，将图像的空间维度减少到 56×56 (`#(2)`). 接下来是 *conv2* 阶段，我们可以看到该阶段中的第一个块成功地将 64
    通道图像转换为 256 (`#(3)`), 其中该阶段中后续的块保持了这个张量的维度 (`#(4–5)`). 同样的操作也在后续阶段中执行，直到我们达到全局平均池化层
    (`#(6)`). 重要的是要注意，我们需要执行张量展平 (`#(7)`) 来删除空轴，然后再将其连接到输出层 (`#(8)`). 这样就完成了张量在 ResNeXt
    架构中的流动过程。
- en: Additionally, you can use the `summary()` function that we previously loaded
    from `torchinfo` if you want to get even deeper into the architectural details.
    You can see at the end of the output below that we got 25,028,904 parameters in
    total. In fact, this number of params matches exactly with the one belongs to
    the *ResNeXt-50 32x4d* model from PyTorch, so I believe our implementation here
    is correct. You can verify this in the link at reference number [4].
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果您想深入了解架构细节，可以使用我们之前从 `torchinfo` 加载的 `summary()` 函数。您可以在下面的输出末尾看到，我们总共获得了
    25,028,904 个参数。实际上，这个参数数量与 PyTorch 的 *ResNeXt-50 32x4d* 模型的数量完全一致，因此我相信我们这里的实现是正确的。您可以在参考文献编号
    [4] 的链接中验证这一点。
