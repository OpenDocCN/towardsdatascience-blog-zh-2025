- en: 3\. Image Captioning
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 图像描述
- en: '![](../Images/2d1a6b9c12c42428065f88bb85812994.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2d1a6b9c12c42428065f88bb85812994.png)'
- en: Image Captioning, also known as image to text, translates images into text sequences
    that describe the image contents. This task requires capabilities of both image
    understanding and text generation, therefore well suited for a multimodal model
    that can process image and text data simultaneously.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图像描述，也称为图像到文本，将图像转换为描述图像内容的文本序列。这项任务需要图像理解和文本生成的能力，因此非常适合能够同时处理图像和文本数据的跨模态模型。
- en: '**Visual Encoder-Decoder**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**视觉编码器-解码器**'
- en: Visual Encoder-Decoder is a multimodal architecture that combines a vision model
    for image understanding with a pretrained language model for text generation.
    A common example is ViT-GPT2, which chains together the Vision Transformer (introduced
    in section 1\. Image Classification) as the visual encoder and the GPT-2 model
    as the decoder to perform autoregressive text generation.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉编码器-解码器是一种多模态架构，它将用于图像理解的视觉模型与用于文本生成的预训练语言模型相结合。一个常见的例子是ViT-GPT2，它将视觉Transformer（在第1节“图像分类”中介绍）作为视觉编码器，将GPT-2模型作为解码器，以执行自回归文本生成。
- en: '**BLIP (Boostrapping Language-Image Pretraining)**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**BLIP (Boostrapping Language-Image Pretraining)**'
- en: '![](../Images/0ebde4c2e0963cde217d43cc7474e201.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0ebde4c2e0963cde217d43cc7474e201.png)'
- en: BLIP, developed by Salesforce Research, leverages 4 core modules – an image
    encoder, a text encoder, followed by an image-grounded text encoder that fuses
    visual and textual features via attention mechanisms, as well as an image-grounded
    text decoder for text sequence generation. The pretraining process involves minimizing
    image-text contrastive loss, image-text matching loss and language modeling loss,
    with the objectives of aligning the semantic relationship between visual information
    and text sequences. It offers higher flexibility in applications and can be applied
    for VQA (visual question answering), but it also introduces more complexity in
    the architectural design.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce Research开发的BLIP利用了4个核心模块——一个图像编码器、一个文本编码器，随后是一个通过注意力机制融合视觉和文本特征的图像基础文本编码器，以及一个用于文本序列生成的图像基础文本解码器。预训练过程涉及最小化图像-文本对比损失、图像-文本匹配损失和语言建模损失，目标是使视觉信息和文本序列之间的语义关系对齐。它在应用中提供了更高的灵活性，可以用于VQA（视觉问答），但它也引入了更多复杂性到架构设计中。
- en: '**Implementation**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**实现**'
- en: We use the code snippet below to generate output from an image captioning pipeline.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用下面的代码片段从图像字幕管道生成输出。
- en: '[PRE6]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We tried three different models below and they all generates reasonably accurate
    image descriptions, with the larger model performs better than the base one.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们下面尝试了三种不同的模型，它们都能生成相当准确的图像描述，其中较大的模型比基础模型表现更好。
- en: '*Visual Encoder-Decoder “ydshieh/vit-gpt2-coco-en” output*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*视觉编码器-解码器“ydshieh/vit-gpt2-coco-en”输出*'
