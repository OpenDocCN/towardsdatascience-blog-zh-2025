  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '*BLIP“Salesforce/blip-image-captioning-large”输出*'
- en: '[PRE9]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 4\. Visual Question Answering
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 视觉问答
- en: '![](../Images/66fe5297e312b7f913a435befaf3408f.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/66fe5297e312b7f913a435befaf3408f.png)'
- en: Visual Question Answering (VQA) has gained increasing popularity as it enables
    users to ask questions about an image and receive coherent text responses. It
    also requires a multimodal model that can extract key information in visual data
    while also capable of generating text responses. What it differentiates from image
    captioning is accepting user prompts as input in addition to an image, therefore
    requiring an encoder that interprets both modalities at the same time.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉问答（VQA）因其能够使用户对图像提出问题并获得连贯的文本响应而越来越受欢迎。它还需要一个多模态模型，能够从视觉数据中提取关键信息，同时也能够生成文本响应。它与图像字幕的不同之处在于，除了图像外，它还接受用户提示作为输入，因此需要一个同时解释两种模态的编码器。
- en: '**ViLT (Vision Language Transformer)**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**ViLT (视觉语言转换器**)'
- en: '![ViLT model architecture](../Images/da3bbff9d9c6896cb0bd3f0560524c24.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![ViLT模型架构](../Images/da3bbff9d9c6896cb0bd3f0560524c24.png)'
- en: 'ViLT is a computationally efficient model architecture for executing VQA task.
    ViLT incorporates image patch embeddings and text embeddings into an unified transformer
    encoder which is pre-trained for three objectives:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: ViLT是一个计算效率高的模型架构，用于执行VQA任务。ViLT将图像补丁嵌入和文本嵌入整合到一个统一的转换器编码器中，该编码器针对三个目标进行预训练：
- en: 'image-text matching: learn the semantic relationship between image-text pairs'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像-文本匹配：学习图像-文本对之间的语义关系
- en: 'masked language modeling: learn to predict the masked word/token from the vocabulary
    based on the text and image input'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掩码语言建模：学习根据文本和图像输入从词汇表中预测掩码词/标记
- en: 'word patch alignment: learn the associations between words and image patches'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 词补对齐：学习单词和图像补丁之间的关联
- en: ViLT adopts an encoder-only architecture with task specific heads (e.g. classification
    head, VQA head), with this minimal design achieving ten times faster speed than
    a VLP (Vision-and-Language Pretraining) model that relies on region supervision
    for object detection and convolutional architecture for feature extraction. However,
    this simplified architecture results in suboptimal performance on complex tasks
    and relies on massive training data for achieving generalized functionality. As
    demonstrated later, one drawback is that ViLT model produces token-based outputs
    for VQA rather than coherent sentences, very much like an image classification
    task with a large amount of candidate labels.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: ViLT采用仅编码器架构，具有特定任务的头部（例如分类头部、VQA头部），这种最小化设计比依赖于区域监督进行对象检测和卷积架构进行特征提取的VLP（视觉和语言预训练）模型快十倍。然而，这种简化的架构在复杂任务上导致性能次优，并且依赖于大量训练数据来实现泛化功能。如后文所示，一个缺点是ViLT模型为VQA生成基于标记的输出，而不是连贯的句子，这与具有大量候选标签的图像分类任务非常相似。
- en: '**BLIP**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**BLIP**'
- en: As introduced in the section 3\. Image Captioning, BLIP is a more extensive
    model that can also be fine-tuned for performing visual question answering task.
    As the result of it encoder-decoder architecture, it generates complete text sequences
    instead of tokens.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如第3节“图像标题”中所述，BLIP是一个更广泛的模型，也可以针对执行视觉问答任务进行微调。由于其编码器-解码器架构，它生成完整的文本序列而不是标记。
- en: '**Implementation**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**实现**'
- en: VQA is implemented using the code snippet below, taking both an image and a
    text prompt as the model inputs.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: VQA使用下面的代码片段实现，将图像和文本提示作为模型输入。
- en: '[PRE10]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: When comparing ViLT and BLIP models for the question “describe this image”,
    the outputs differ significantly due to their distinct model architectures. ViLT
    predicts the highest scoring tokens from its existing vocabulary, while BLIP generates
    more coherent and sensible results.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当比较ViLT和BLIP模型在“描述这张图片”的问题上时，由于它们不同的模型架构，输出结果差异显著。ViLT从其现有的词汇表中预测得分最高的标记，而BLIP生成更连贯和合理的成果。
- en: '*ViLT “dandelin/vilt-b32-finetuned-vqa” output*'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '*ViLT “dandelin/vilt-b32-finetuned-vqa”输出*'
- en: '[PRE11]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '*BLIP “Salesforce/blip-vqa-capfilt-large” output*'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '*BLIP “Salesforce/blip-vqa-capfilt-large”输出*'
- en: '[PRE12]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '* * *'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: End-to-End Computer Vision App Development
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 端到端计算机视觉应用程序开发
- en: Let’s break down the web app development into 6 steps you can easily follow
    to build your own interactive Streamlit app or customize it for your needs. Check
    out our [GitHub](https://github.com/destingong/computer-vision) repository for
    the end-to-end implementation.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将网络应用程序开发分解为6个易于遵循的步骤，以便您能够轻松构建自己的交互式Streamlit应用程序或根据您的需求进行定制。请查看我们的[GitHub](https://github.com/destingong/computer-vision)存储库以获取端到端实现。
- en: 1\. Initialize the web app and configure the page layout.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 初始化网络应用程序并配置页面布局。
- en: '[PRE13]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 2\. Prompt the user to upload an image.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 提示用户上传图像。
- en: '[PRE14]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 3\. Select one or more computer vision tasks using a multi-select dropdown list
    (also accept user entered options e.g. “document-question-answering”). It will
    prompt user to enter the question if ‘visual-question-answering’ or ‘document-question-answering’
    is selected, because these two tasks require “question” as an additional input
    parameter.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用多选下拉列表选择一个或多个计算机视觉任务（也接受用户输入的选项，例如“document-question-answering”）。如果选择“visual-question-answering”或“document-question-answering”，它将提示用户输入问题，因为这两个任务需要“问题”作为额外的输入参数。
- en: '[PRE15]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 4\. Prompt the user to choose between the default model built into the hugging
    face pipeline or enter their own model.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 提示用户在集成到hugging face管道的默认模型或输入自己的模型之间进行选择。
- en: '[PRE16]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 5\. Create task pipelines based on the user-entered parameters, then collects
    the model outputs and processing times. The result is displayed in a table format
    using `st.dataframe()` to compare the different *task name, output, runtime, model
    name, and model type*. For image segmentation tasks, the segmentation mask is
    also displayed using `st.image()`.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 根据用户输入的参数创建任务管道，然后收集模型输出和处理时间。结果以表格格式显示，使用`st.dataframe()`比较不同的*任务名称、输出、运行时间、模型名称和模型类型*。对于图像分割任务，分割掩码也使用`st.image()`显示。
- en: '[PRE17]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 6\. Lastly, chain these functions together using the main function. Use a “Generate
    Response” button to trigger these functions and display the results in the app.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 最后，使用主函数将这些函数链接在一起。使用“生成响应”按钮触发这些函数，并在应用程序中显示结果。
- en: '[PRE18]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '* * *'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Takeaway Message
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要信息
- en: We introduced the evolution from traditional CNN-based approaches to transformer
    architectures, comparing vision models with language models and multimodal models.
    We also explored 4 fundamental computer vision tasks and their corresponding techniques,
    providing a practical Streamlit implementation guide to building your own computer
    vision web applications for further explorations.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了从传统的基于CNN的方法到转换器架构的演变，比较了视觉模型与语言模型和多模态模型。我们还探讨了4个基本的计算机视觉任务及其相应的技术，并提供了一个实用的Streamlit实现指南，以构建您自己的计算机视觉网络应用程序，以便进一步探索。
- en: 'The fundamental Computer Vision tasks and models include:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 基本的计算机视觉任务和模型包括：
- en: '**Image Classification:** Analyze images and assign them to one or more predefined
    categories or classes, utilizing model architectures like ViT (Vision Transformer).'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像分类：**分析图像并将它们分配到一个或多个预定义的类别或类别，利用如ViT（视觉转换器）之类的模型架构。'
- en: '**Image Segmentation**: Classify image pixels into specific categories, creating
    detailed masks that outline object boundaries, including DETR and Mask2Former
    model architectures.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像分割：**将图像像素分类到特定类别，创建详细的面罩，以描绘对象边界，包括DETR和Mask2Former模型架构。'
- en: '**Image Captioning:** Generates descriptive text for images, demonstrating
    models like visual encoder-decoder and BLIP that combine visual encoding with
    language generation capabilities.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像描述:** 为图像生成描述性文本，展示将视觉编码与语言生成能力相结合的模型，如视觉编码器-解码器和 BLIP。'
- en: '**Visual Question Answering (VQA):** Process both image and text queries to
    answer open-ended questions based on image content, comparing architectures like
    ViLT (Vision Language Transformer) with its token-based outputs and BLIP with
    more coherent responses.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视觉问答 (VQA):** 处理图像和文本查询，基于图像内容回答开放式问题，比较如 ViLT (视觉语言转换器) 的基于标记的输出与 BLIP 的更连贯的响应等架构。'
