- en: 'NumExpr: The “Faster than Numpy” Library Most Data Scientists Have Never Used'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: NumExpr：大多数数据科学家从未使用过的“比 NumPy 更快的库”
- en: 原文：[https://towardsdatascience.com/numexpr-the-faster-than-numpy-library-that-no-ones-heard-of/](https://towardsdatascience.com/numexpr-the-faster-than-numpy-library-that-no-ones-heard-of/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/numexpr-the-faster-than-numpy-library-that-no-ones-heard-of/](https://towardsdatascience.com/numexpr-the-faster-than-numpy-library-that-no-ones-heard-of/)
- en: <mdspan datatext="el1745609197438" class="mdspan-comment">Browsing GitHub</mdspan>
    the other day, I came across a library I’d never heard of before. It was called
    **NumExpr**.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745609197438" class="mdspan-comment">前几天在 GitHub 上浏览时，我遇到了一个我以前从未听说过的库。它被称为
    **NumExpr**。</mdspan>
- en: I was immediately interested because of some claims made about the library.
    In particular, it stated that for some complex numerical calculations, it was
    up to 15 times faster than NumPy.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我立刻对此产生了兴趣，因为关于这个库的一些说法。特别是，它声称对于某些复杂的数值计算，它的速度比 NumPy 快 15 倍。
- en: I was intrigued because, up until now, NumPy has remained unchallenged in its
    dominance in the numerical computation space in Python. In particular with data
    science, NumPy is a cornerstone for machine learning, exploratory data analysis
    and model training. Anything we can use to squeeze out every last bit of performance
    in our systems will be welcomed. So, I decided to put the claims to the test myself.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我对此感到好奇，因为到目前为止，NumPy 在 Python 的数值计算空间中一直占据主导地位。特别是在数据科学领域，NumPy 是机器学习、数据探索分析和模型训练的基石。任何可以帮助我们从系统中挤出最后一丝性能的东西都将受到欢迎。因此，我决定亲自对这些说法进行测试。
- en: You can find a link to the NumExpr repository at the end of this article.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在本文末尾找到 NumExpr 存储库的链接。
- en: What is NumExpr?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 NumExpr？
- en: According to its GitHub page, NumExpr is a fast numerical expression evaluator
    for NumPy. Using it, expressions that operate on arrays are accelerated and use
    less memory than performing the same calculations in Python with other numerical
    libraries, such as NumPy.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 根据其 GitHub 页面，NumExpr 是一个快速的 NumPy 数值表达式评估器。使用它，操作数组的表达式会加速，并且比使用其他数值库（如 NumPy）在
    Python 中执行相同的计算使用更少的内存。
- en: In addition, as it is multithreaded, NumExpr can use all your CPU cores, which
    generally results in substantial performance scaling compared to NumPy.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，由于它是多线程的，NumExpr 可以使用您所有的 CPU 核心，这通常会导致与 NumPy 相比有实质性的性能提升。
- en: Setting up a development environment
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: Before we start coding, let’s set up our development environment. The best practice
    is to create a separate Python environment where you can install any necessary
    software and experiment with coding, knowing that anything you do in this environment
    won’t affect the rest of your system. I use conda for this, but you can use whatever
    method you know best that suits you.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始编码之前，让我们设置我们的开发环境。最佳实践是创建一个单独的 Python 环境，在那里您可以安装任何必要的软件并尝试编码，知道您在这个环境中所做的任何操作都不会影响您的整个系统。我使用
    conda 来做这件事，但您可以使用您最熟悉且适合您的方法。
- en: 'If you want to go down the Miniconda route and don’t already have it, you must
    install Miniconda first. Get it using this link:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想走 Miniconda 路线并且还没有安装它，您必须首先安装 Miniconda。使用此链接获取它：
- en: '[https://www.anaconda.com/docs/main](https://www.anaconda.com/docs/main)'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.anaconda.com/docs/main](https://www.anaconda.com/docs/main)'
- en: '**1/ Create our new dev environment and install the required libraries**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**1/ 创建我们的新开发环境并安装所需的库** '
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**2/ Start Jupyter**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**2/ 开始 Jupyter**'
- en: Now type in `jupyter notebook `into your command prompt. You should see a jupyter
    notebook open in your browser. If that doesn’t happen automatically, you’ll likely
    see a screenful of information after the `jupyter notebook `command. Near the
    bottom, you will find a URL that you should copy and paste into your browser to
    launch the Jupyter Notebook.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 现在请在您的命令提示符中输入`jupyter notebook`。您应该在浏览器中看到一个打开的 Jupyter Notebook。如果它没有自动打开，您可能会在`jupyter
    notebook`命令后看到一整屏的信息。在底部附近，您会找到一个您应该复制并粘贴到浏览器中以启动 Jupyter Notebook 的 URL。
- en: Your URL will be different to mine, but it should look something like this:-
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 您的 URL 将与我的不同，但它应该看起来像这样：-
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Comparing NumExpr and NumPy performance
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 比较 NumExpr 和 NumPy 的性能
- en: To compare the performance, we’ll run a series of numerical computations using
    NumPy and NumExpr, and time both systems.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了比较性能，我们将使用 NumPy 和 NumExpr 运行一系列数值计算，并测量这两个系统的运行时间。
- en: '**Example 1 — A simple array addition calculation**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 1 — 一个简单的数组加法计算**'
- en: In this example, we run a vectorised addition of two large arrays 5000 times.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们运行了两个大型数组向量化加法 5000 次。
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: I have to say, that’s a pretty impressive start from the NumExpr library already.
    I make that a 6 times improvement over the NumPy runtime.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须说，NumExpr库的起点已经相当令人印象深刻了。我认为这比NumPy运行时间快了6倍。
- en: Let’s double-check that both operations return the same result set.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次确认这两个操作返回相同的结果集。
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Example 2 — Calculate Pi using a Monte Carlo simulation**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例2—使用蒙特卡洛计算π**'
- en: Our second example will examine a more complicated use case with more real-world
    applications.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的第二个例子将检查一个更复杂的用例，它有更多的实际应用。
- en: Monte Carlo simulations involve running many iterations of a random process
    to estimate a system’s properties, which can be computationally intensive.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 蒙特卡洛模拟涉及运行许多随机过程的迭代来估计系统的属性，这可能计算量很大。
- en: In this case, we’ll use Monte Carlo to calculate the value of Pi. This is a
    well-known example where we take a square with a side length of one unit and inscribe
    a quarter circle inside it with a radius of one unit. The ratio of the quarter
    circle’s area to the square’s area is *(π*/4)/1, and we can multiply this expression
    by four to get ***π***on its own.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将使用蒙特卡洛计算π的值。这是一个众所周知的例子，我们取一个边长为1个单位的正方形，并在其中绘制一个半径为1个单位的四分之一圆。四分之一圆的面积与正方形面积之比为*(π/4)/1，我们可以将这个表达式乘以4来得到***π***。
- en: So, if we consider numerous random (x,y) points that all lie within or on the
    bounds of the square, as the total number of these points tends to infinity, the
    ratio of points that lie on or inside the quarter circle to the total number of
    points tends towards Pi.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果我们考虑所有位于或位于正方形边界内的随机(x,y)点，随着这些点的总数趋于无穷大，位于或位于四分之一圆内或其上的点的比例趋于π。
- en: First, the NumPy implementation.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，是NumPy的实现。
- en: '[PRE4]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now, using NumExpr.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用NumExpr。
- en: '[PRE5]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: OK, so the speed-up was not as impressive that time, but a 20% improvement isn’t
    terrible either. Part of the reason is that NumExpr doesn’t have an optimised
    SUM() function, so we had to default back to NumPy for that operation.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，那次加速并不那么令人印象深刻，但20%的改进也不算差。部分原因是NumExpr没有优化的SUM()函数，所以我们不得不默认回到NumPy来执行这个操作。
- en: '**Example 3 — Implementing a Sobel image filter**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例3—实现Sobel图像滤波器**'
- en: In this example, we’ll implement a Sobel filter for images. The Sobel filter
    is commonly used in image processing for edge detection. It calculates the image
    intensity gradient at each pixel, highlighting edges and intensity transitions.
    Our input image is of the Taj Mahal in India.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将实现图像的Sobel滤波器。Sobel滤波器在图像处理中常用于边缘检测。它计算每个像素的图像强度梯度，突出边缘和强度变化。我们的输入图像是印度的泰姬陵。
- en: '![](../Images/e2807268462369ca6055136216f22720.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e2807268462369ca6055136216f22720.png)'
- en: '**Original image by Yury Taranik (licensed from Shutterstock)**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**原始图像由Yury Taranik提供（授权自Shutterstock）**'
- en: Let’s see the NumPy code running first and time it.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先看看NumPy代码的运行情况，并计时。
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: And now the NumExpr code.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在来看看NumExpr的代码。
- en: '[PRE7]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: On this occasion, using NumExpr led to a great result, with a performance that
    was close to double that of NumPy.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个场合，使用NumExpr得到了一个很好的结果，性能接近NumPy的两倍。
- en: Here is what the edge-detected image looks like.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是边缘检测图像的样子。
- en: '![](../Images/06327c88f1fb7b90b0e8a7bbc3281d5c.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/06327c88f1fb7b90b0e8a7bbc3281d5c.png)'
- en: '**Image by Author**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像由作者提供**'
- en: '**Example 4 —  Fourier series approximation**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例4—傅里叶级数近似**'
- en: It’s well known that complex periodic functions can be simulated by applying
    a series of sine waves superimposed on each other. At the extreme, even a square
    wave can be easily modelled in this way. The method is called the Fourier series
    approximation. Although an approximation, we can get as close to the target wave
    shape as memory and computational capacity allow.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 众所周知，复周期函数可以通过叠加一系列正弦波来模拟。在极端情况下，甚至可以用这种方法轻松地模拟方波。这种方法被称为傅里叶级数近似。虽然是一种近似，但我们可以在内存和计算能力允许的范围内尽可能接近目标波形。
- en: The maths behind all this isn’t the primary focus. Just be aware that when we
    increase the number of iterations, the run-time of the solution rises markedly.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些背后的数学并不是主要关注点。只需知道，当我们增加迭代次数时，解决方案的运行时间会显著增加。
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: And the output?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 输出结果是什么？
- en: '![](../Images/c89b0351361ca84e8ada06603b85f54a.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c89b0351361ca84e8ada06603b85f54a.png)'
- en: '**Image by Author**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像由作者提供**'
- en: That is another pretty good result. NumExpr shows a 5 times improvement over
    Numpy on this occasion.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这又是一个相当不错的结果。在这个场合，NumExpr比Numpy快了5倍。
- en: Summary
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: NumPy and NumExpr are both powerful libraries used for Python numerical computations.
    They each have unique strengths and use cases, making them suitable for different
    types of tasks. Here, we compared their performance and suitability for specific
    computational tasks, focusing on examples such as simple array addition to more
    complex applications, like using a Sobel filter for image edge detection.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 和 NumExpr 都是用于 Python 数值计算的强大库。它们各自具有独特的优势和用例，使得它们适用于不同类型的任务。在这里，我们比较了它们在特定计算任务中的性能和适用性，重点关注从简单的数组加法到更复杂的应用，例如使用
    Sobel 滤波器进行图像边缘检测的示例。
- en: While I didn’t quite see the claimed 15x speed increase over NumPy in my tests,
    there’s no doubt that NumExpr can be significantly faster than NumPy in many cases.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在我的测试中并没有看到声称的比 NumPy 快 15 倍的速度提升，但毫无疑问，在许多情况下 NumExpr 可以比 NumPy 快得多。
- en: If you’re a heavy user of NumPy and need to extract every bit of performance
    from your code, I recommend trying the NumExpr library. Besides the fact that
    not all NumPy code can be replicated using NumExpr, there’s practically no downside,
    and the upside might surprise you.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个 NumPy 的重度用户，并且需要从你的代码中提取每一分性能，我建议尝试使用 NumExpr 库。除了并非所有 NumPy 代码都可以使用
    NumExpr 来复制之外，实际上没有多少缺点，而且潜在的好处可能会让你感到惊讶。
- en: For more details on the NumExpr library, check out the GitHub page [here](https://github.com/pydata/numexpr).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多关于 NumExpr 库的详细信息，请查看 GitHub 页面 [这里](https://github.com/pydata/numexpr)。
