- en: Introducing Server-Sent Events in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 Python 中介绍服务器发送事件
- en: 原文：[https://towardsdatascience.com/introducing-server-sent-events-in-python/](https://towardsdatascience.com/introducing-server-sent-events-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/introducing-server-sent-events-in-python/](https://towardsdatascience.com/introducing-server-sent-events-in-python/)
- en: <mdspan datatext="el1754326673698" class="mdspan-comment">As</mdspan> a developer,
    I’m always looking for ways to make my applications more dynamic and interactive.
    Users today expect real-time features, such as live notifications, streaming updates,
    and dashboards that refresh automatically. The tool that often comes to mind for
    web developers when considering these types of applications is WebSockets, and
    it is incredibly powerful.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754326673698" class="mdspan-comment">作为一名开发者，我总是寻找让我的应用程序更加动态和交互的方法。如今，用户期望实时功能，例如实时通知、流式更新和自动刷新的仪表板。当考虑这些类型的应用程序时，网络开发者通常会想到
    WebSocket，它非常强大。
- en: There are times, though, when WebSockets can be overkill, and their full functionality
    is often not required. They provide a complex, bi-directional communication channel,
    but many times, all I need is for the server to push updates ***to*** the client.
    For these common scenarios, a more straightforward and elegant solution that is
    built right into modern web platforms is known as Server-Sent Events (SSE).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有时 WebSocket 可能过于强大，并且其全部功能通常并不需要。它们提供了一个复杂的双向通信通道，但很多时候，我只需要服务器向客户端推送更新***到***客户端。对于这些常见场景，一个更直接且优雅的解决方案，它直接集成在现代网络平台中，被称为服务器发送事件（Server-Sent
    Events，SSE）。
- en: In this article, I’m going to introduce you to Server-Sent Events. We’ll discuss
    what they are, how they compare to WebSockets, and why they are often the perfect
    tool for the job. Then, we’ll dive into a series of practical examples, using
    Python and the FastAPI framework to build real-time applications that are surprisingly
    simple yet powerful.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向您介绍服务器发送事件。我们将讨论它们是什么，它们与 WebSocket 的比较，以及为什么它们通常是完成工作的完美工具。然后，我们将深入一系列实际示例，使用
    Python 和 FastAPI 框架构建实时应用程序，这些应用程序简单而强大。
- en: What are Server-Sent Events (SSE)?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是服务器发送事件（SSE）？
- en: Server-Sent Events is a web technology standard that allows a server to push
    data to a client asynchronously once an initial client connection has been established.
    It provides a one-way, server-to-client stream of data over a single, long-lived
    HTTP connection. The client, typically a web browser, subscribes to this stream
    and can react to the messages it receives.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器发送事件（Server-Sent Events）是一种网络技术标准，允许服务器在建立初始客户端连接后异步地向客户端推送数据。它通过单个长连接提供单向、服务器到客户端的数据流。客户端，通常是网络浏览器，订阅此流并可以对其接收到的消息做出反应。
- en: 'Some key aspects of Server-Sent Events include:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器发送事件的一些关键特性包括：
- en: '**Simple Protocol.** SSE is a straightforward, text-based protocol. Events
    are just chunks of text sent over HTTP, making them easy to debug with standard
    tools like curl.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简单协议**。SSE 是一种简单、基于文本的协议。事件只是通过 HTTP 发送的文本块，这使得它们可以通过像 curl 这样的标准工具轻松调试。'
- en: '**Standard HTTP.** SSE works over regular HTTP/HTTPS. This means it’s generally
    more compatible with existing firewalls and proxy servers.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标准 HTTP**。SSE 在常规 HTTP/HTTPS 上工作。这意味着它通常与现有的防火墙和代理服务器更兼容。'
- en: '**Automatic Reconnection.** This is a killer feature. If the connection to
    the server is lost, the browser’s EventSource API will automatically try to reconnect.
    You get this resilience for free, without writing any extra JavaScript code.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动重连**。这是一个杀手级特性。如果与服务器的连接丢失，浏览器的事件源 API 将自动尝试重新连接。您无需编写任何额外的 JavaScript
    代码即可获得这种弹性。'
- en: '**One-Way Communication.** SSE is strictly for server-to-client data pushes.
    If you need full-duplex, client-to-server communication, WebSockets are the more
    appropriate choice.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单向通信**。SSE 仅用于服务器到客户端的数据推送。如果您需要全双工、客户端到服务器的通信，WebSocket 是更合适的选择。'
- en: '**Native Browser Support.** All modern web browsers have built-in support for
    Server-Sent Events (SSE) through the EventSource interface, eliminating the need
    for client-side libraries.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**原生浏览器支持**。所有现代网络浏览器都通过 EventSource 接口内置了对服务器发送事件（SSE）的支持，消除了对客户端库的需求。'
- en: Why SSE Matters/Common Use Cases
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么 SSE 很重要/常见用例
- en: The primary advantage of SSE is its simplicity. For a large class of real-time
    problems, it provides all the necessary functionality with a fraction of the complexity
    of WebSockets, both on the server and the client. This means faster development,
    easier maintenance, and fewer things that can go wrong.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: SSE的主要优势是其简单性。对于一大类实时问题，它提供了所有必要的功能，而其复杂度仅为WebSockets的一小部分，无论是在服务器端还是客户端。这意味着开发更快，维护更容易，出错的可能性更少。
- en: SSE is a perfect fit for any scenario where the server needs to initiate communication
    and send updates to the client. For example …
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: SSE非常适合任何服务器需要主动发起通信并向客户端发送更新的场景。例如...
- en: '**Live Notification Systems.** Pushing notifications to a user when a new message
    arrives or an important event occurs.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时通知系统.** 当有新消息到达或发生重要事件时向用户推送通知。'
- en: '**Real-Time Activity Feeds.** Streaming updates to a user’s activity feed,
    similar to a Twitter or Facebook timeline.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时活动流.** 向用户的活动流中实时推送更新，类似于Twitter或Facebook的时间线。'
- en: '**Live Data Dashboards.** Sending continuous updates for stock tickers, sports
    scores, or monitoring metrics to a live dashboard.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时数据仪表板.** 向实时仪表板发送股票行情、体育比分或监控指标的连续更新。'
- en: '**Streaming Log Outputs.** Displaying the live log output from a long-running
    background process directly in the user’s browser.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时日志输出.** 在用户的浏览器中直接显示长时间运行的背景过程的实时日志输出。'
- en: '**Progress Updates.** Showing the real-time progress of a file upload, a data
    processing job, or any other long-running task initiated by the user.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**进度更新.** 显示文件上传、数据处理作业或其他由用户发起的任何长时间运行任务的实时进度。'
- en: That’s enough theory; let’s see just how easy it is to implement these ideas
    with Python.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 理论就到这里；让我们看看用Python实现这些想法有多简单。
- en: Setting up the Development Environment
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: We will utilise FastAPI, a modern and high-performance Python web framework.
    Its native support for asyncio and streaming responses makes it a perfect match
    for implementing Server-Sent Events. You’ll also need the Uvicorn ASGI server
    to run the application.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将利用FastAPI，这是一个现代且高性能的Python网络框架。它对asyncio和流式响应的原生支持使其非常适合实现服务器端发送事件。您还需要Uvicorn
    ASGI服务器来运行应用程序。
- en: As usual, we’ll set up a development environment to keep our projects separate.
    I suggest using MiniConda for this, but feel free to use whichever tool you’re
    accustomed to.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如往常一样，我们将设置一个开发环境以保持我们的项目分离。我建议使用MiniConda，但请随意使用您习惯的任何工具。
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, install the external libraries we need.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，安装我们需要的外部库。
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: That’s all the setup we need. Now, we can start coding.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们需要的所有设置。现在，我们可以开始编码了。
- en: Code Example 1 — The Python Backend. A Simple SSE Endpoint
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码示例1—Python后端。一个简单的SSE端点
- en: Let’s create our first SSE endpoint. It will send a message with the current
    time to the client every second.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建我们的第一个SSE端点。它将每秒向客户端发送包含当前时间的消息。
- en: Create a file named app.py and type the following into it.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为app.py的文件，并将以下内容输入其中。
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: I hope you agree that this code is straightforward.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您同意，这段代码很简单。
- en: We define an event_stream() function. This loop repeats endlessly, producing
    a string every second.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们定义了一个event_stream()函数。这个循环无限重复，每秒产生一个字符串。
- en: 'The yielded string is formatted according to the SSE spec: it must start with
    **data:** and end with two newlines (**\n\n**).'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成的字符串按照SSE规范格式化：它必须以**data:**开头，并以两个换行符（**\n\n**）结尾。
- en: Our endpoint /stream-time returns a StreamingResponse, passing our generator
    to it and setting the media_type to text/event-stream. FastAPI handles the rest,
    keeping the connection open and sending each yielded chunk to the client.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们的端点/stream-time返回一个StreamingResponse，将我们的生成器传递给它，并将媒体类型设置为text/event-stream。FastAPI处理其余部分，保持连接打开，并将每个生成的块发送到客户端。
- en: To run the code, don’t use the standard **Python app.py** command as you would
    normally. Instead, do this.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行代码，不要使用您通常使用的标准**Python app.py**命令。相反，这样做。
- en: '[PRE3]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now, type this address into your browser …
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，将此地址输入您的浏览器...
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: … and you should see something like this.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: …并且您应该看到类似这样的内容。
- en: '![](../Images/224f2402105b04b0f2c698ecebe6d144.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/224f2402105b04b0f2c698ecebe6d144.png)'
- en: Image by Author
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The screen should display an updated time record every second.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕应该每秒显示一个更新的时间记录。
- en: Code example 2\. Real-Time System Monitoring Dashboard
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码示例2. 实时系统监控仪表板
- en: In this example, we will monitor our PC or laptop’s CPU and memory usage in
    real time.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将实时监控我们的PC或笔记本电脑的CPU和内存使用情况。
- en: Here is the app.py code you need.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是您需要的app.py代码。
- en: '[PRE5]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This code constructs a real-time system monitoring service using the FastAPI
    web framework. It creates a web server that continuously tracks and broadcasts
    the host machine’s CPU and memory usage to any connected web client.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码使用FastAPI网络框架构建了一个实时系统监控服务。它创建了一个网络服务器，该服务器持续跟踪并向任何连接的网络客户端广播主机机的CPU和内存使用情况。
- en: First, it initialises a FastAPI application and configures Cross-Origin Resource
    Sharing (CORS) middleware. This middleware is a security feature that is explicitly
    configured here to allow a web page served from http://localhost:8080 to make
    requests to this server, which is a common requirement when the frontend and backend
    are developed separately.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，它初始化一个FastAPI应用程序并配置跨源资源共享（CORS）中间件。这个中间件是一个安全特性，在这里被明确配置，以允许从`http://localhost:8080`提供的网页向这个服务器发送请求，这是前后端分开开发时的常见需求。
- en: The core of the application is the system_stats_generator asynchronous function.
    This function runs in an infinite loop, and in each iteration, it uses the psutil
    library to fetch the current CPU utilisation percentage and detailed memory statistics,
    including the percentage used, megabytes used, and total megabytes. It packages
    this information into a dictionary, converts it to a JSON string, and then yields
    it in the specific “text/event-stream” format (data: …\n\n).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '应用程序的核心是`system_stats_generator`异步函数。该函数在一个无限循环中运行，并在每次迭代中使用`psutil`库获取当前的CPU利用率百分比和详细的内存统计信息，包括使用百分比、使用的兆字节和总兆字节。它将此信息打包成一个字典，将其转换为JSON字符串，然后以特定的“text/event-stream”格式（data:
    …\n\n）产生它。'
- en: The use of asyncio.sleep(1) introduces a one-second pause between updates, preventing
    the loop from consuming excessive resources. The function is also designed to
    detect when a client has disconnected and gracefully stop sending data for that
    client.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`asyncio.sleep(1)`在更新之间引入了一秒的暂停，防止循环消耗过多的资源。该函数还设计用于检测客户端是否已断开连接，并优雅地停止向该客户端发送数据。
- en: The script defines two web endpoints. The @app.get(“/system-stats”) endpoint
    creates a StreamingResponse that initiates the system_stats_generator. When a
    client makes a GET request to this URL, it establishes a persistent connection,
    and the server begins streaming the system stats every second. The second endpoint,
    @app.get(“/”), serves a static HTML file named index.html as the main page. This
    HTML file would typically contain the JavaScript code needed to connect to the
    /system-stats stream and dynamically display the incoming performance data on
    the web page.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本定义了两个网络端点。`@app.get(“/system-stats”)`端点创建了一个`StreamingResponse`，它启动了`system_stats_generator`。当客户端对这个URL发起GET请求时，它建立了一个持久连接，服务器开始每秒流式传输系统统计信息。第二个端点`@app.get(“/”)`作为主页提供名为`index.html`的静态HTML文件。这个HTML文件通常包含连接到`/system-stats`流并动态显示网页上传入的性能数据的JavaScript代码。
- en: Now, here is the updated (index.html) front-end code.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里是更新后的（index.html）前端代码。
- en: '[PRE6]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Run the app using Uvicorn, as we did in Example 1\. Then, in a separate command
    window, type the following to start a Python server.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Uvicorn运行应用程序，就像我们在示例1中所做的那样。然后在另一个命令窗口中，键入以下内容以启动Python服务器。
- en: '[PRE7]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now, open the URL http://localhost:8080/index.html in your browser, and you
    will see the output, which should update continuously.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在您的浏览器中打开URL `http://localhost:8080/index.html`，您将看到输出，它应该会持续更新。
- en: '![](../Images/956ecedc9e914c6f44ded6bc99a5277c.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/956ecedc9e914c6f44ded6bc99a5277c.png)'
- en: Image by Author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '**Code example 3 — Background task progress bar**'
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**代码示例3—后台任务进度条**'
- en: In this example, we initiate a task and display a bar indicating the task’s
    progress.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们启动一个任务并显示一个表示任务进度的条形图。
- en: Updated app.py
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 更新后的app.py
- en: '[PRE8]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The updated index.html code is this.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 更新后的index.html代码如下。
- en: '[PRE9]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Stop your existing uvicorn and Python server processes if they’re still running,
    and then restart both.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它们仍在运行，请停止现有的uvicorn和Python服务器进程，然后重新启动它们。
- en: Now, when you open the index.html page, you should see a screen with a button.
    Pressing the button will start a dummy task, and a moving bar will display the
    task progress.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当您打开index.html页面时，您应该看到一个带有按钮的屏幕。按下按钮将启动一个模拟任务，并显示移动的进度条。
- en: '![](../Images/3085a5d9988cda3c726ac232ec7c6e25.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3085a5d9988cda3c726ac232ec7c6e25.png)'
- en: Image by Author
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Code Example 4— A Real-Time Financial Stock Ticker
  id: totrans-71
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例4—实时金融股票行情
- en: 'For our final example, we will create a simulated stock ticker. The server
    will generate random price updates for several stock symbols and send them using
    named events, where the event name corresponds to the stock symbol (e.g., event:
    AAPL, event: GOOGL). This is a powerful pattern for multiplexing different kinds
    of data over a single SSE connection, allowing the client to handle each stream
    independently.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的最终示例中，我们将创建一个模拟的股票行情。服务器将为几个股票代码生成随机的价格更新，并通过命名事件发送它们，其中事件名称对应于股票代码（例如，事件：AAPL，事件：GOOGL）。这是在单个
    SSE 连接上多路复用不同类型数据的一种强大模式，允许客户端独立处理每个流。
- en: Here is the updated app.py code you’ll need.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是您需要的更新后的 app.py 代码。
- en: '[PRE10]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: And the updated index.html
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 以及更新的 index.html
- en: '[PRE11]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Stop then restart the uvicorn and Python processes as before. This time, when
    you open http://localhost:8080/index.html in your browser, you should see a screen
    like this, which will continually update the dummy prices of the three stocks.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 然后像之前一样停止并重新启动 uvicorn 和 Python 进程。这次，当您在浏览器中打开 http://localhost:8080/index.html
    时，您应该会看到一个像这样的屏幕，它将不断更新三只股票的模拟价格。
- en: '![](../Images/8f220595085645278e4b94a6cb68ef84.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8f220595085645278e4b94a6cb68ef84.png)'
- en: Image by Author
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Summary
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this article, I demonstrated that for many real-time use cases, Server-Sent
    Events offer a simpler alternative to WebSockets. We discussed the core principles
    of SSE, including its one-way communication model and automatic reconnection capabilities.
    Through a series of hands-on examples using Python and FastAPI, we saw just how
    easy it is to build powerful real-time features. We covered:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我展示了对于许多实时用例，Server-Sent Events 提供了比 WebSocket 更简单的替代方案。我们讨论了 SSE 的核心原则，包括其单向通信模型和自动重连功能。通过一系列使用
    Python 和 FastAPI 的动手示例，我们看到了构建强大实时功能是多么容易。我们涵盖了：
- en: A simple Python back-end and SSE endpoint
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个简单的 Python 后端和 SSE 端点
- en: A live system monitoring dashboard streaming structured JSON data.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个实时系统监控仪表板，流式传输结构化 JSON 数据。
- en: A real-time progress bar for a simulated long-running background task.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个用于模拟长时间运行的后台任务的实时进度条。
- en: A multiplexed stock ticker using named events to manage different data streams.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用命名事件管理不同数据流的复用股票行情。
- en: Next time you need to push data from your server to a client, I encourage you
    to pause before reaching for WebSockets. Ask yourself if you truly need bi-directional
    communication. If the answer is no, then Server-Sent Events are likely the more
    straightforward, faster, and more robust solution you’ve been looking for.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 下次您需要从服务器向客户端推送数据时，我鼓励您在伸手去拿 WebSocket 之前先停下来。问问自己你是否真的需要双向通信。如果答案是“否”，那么 Server-Sent
    Events 可能就是您一直在寻找的更简单、更快、更稳健的解决方案。
