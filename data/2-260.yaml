- en: 'Automate Models Training: An MLOps Pipeline with Tekton and Buildpacks'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自动化模型训练：使用 Tekton 和 Buildpacks 的 MLOps 管道
- en: 原文：[https://towardsdatascience.com/automate-models-training-an-mlops-pipeline-with-tekton-and-buildpacks/](https://towardsdatascience.com/automate-models-training-an-mlops-pipeline-with-tekton-and-buildpacks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/automate-models-training-an-mlops-pipeline-with-tekton-and-buildpacks/](https://towardsdatascience.com/automate-models-training-an-mlops-pipeline-with-tekton-and-buildpacks/)
- en: <mdspan datatext="el1749532257635" class="mdspan-comment">The drive to operationalize</mdspan>
    machine learning effectively means that simply training a model is no longer enough;
    robust, automated, and reproducible training pipelines are fast becoming standard
    requirements in MLOps. Many teams struggle to integrate machine learning experimentation
    with production-grade CI/CD practices, often becoming entangled in manual processes
    or complex container configurations. What if you could streamline the containerization
    of your training workflows and orchestrate them without ever needing to write
    a Dockerfile?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749532257635" class="mdspan-comment">有效实施机器学习的动力意味着仅仅训练一个模型已经不再足够；健壮、自动化和可重复的训练管道正在迅速成为
    MLOps 的标准要求。许多团队在将机器学习实验与生产级 CI/CD 实践集成时遇到困难，常常陷入手动流程或复杂的容器配置中。如果你能够简化训练工作流程的容器化并编排它们，而无需编写
    Dockerfile 会怎样呢？
- en: In this tutorial, I’ll show how to automate training a GPT-2 model using open-source
    [Tekton](https://tekton.dev/) pipelines and [Buildpacks](https://buildpacks.io/).
    We’ll containerize a training workflow without writing a Dockerfile, and use Tekton
    to orchestrate the build and training steps.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程中，我将展示如何使用开源 [Tekton](https://tekton.dev/) 管道和 [Buildpacks](https://buildpacks.io/)
    自动化训练 GPT-2 模型。我们将容器化训练工作流程而无需编写 Dockerfile，并使用 Tekton 来编排构建和训练步骤。
- en: I’ll demonstrate this with a lightweight GPT-2 tuning example, showing the model’s
    output before versus after training, and provide step-by-step instructions to
    recreate the pipeline.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我将通过一个轻量级的 GPT-2 调整示例来演示这一点，展示训练前后模型的输出，并提供逐步说明以重新创建管道。
- en: 'Overview of the toolkit: Tekton, Buildpacks, and GPT-2'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具包概述：Tekton、Buildpacks 和 GPT-2
- en: 'Tekton Pipelines: Cloud-Native CI/CD for ML'
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Tekton Pipelines：云原生 CI/CD for ML
- en: Tekton Pipelines is an open-source CI/CD framework that runs natively on Kubernetes.
    It allows you to define pipelines as Kubernetes resources, enabling cloud-native
    build, test, and deploy workflows. In a Tekton pipeline, each step runs in a container,
    making it an ideal fit for ML workflows that require isolation and reproducibility.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Tekton Pipelines 是一个开源的 CI/CD 框架，它原生运行在 Kubernetes 上。它允许你将管道定义为 Kubernetes 资源，从而实现云原生构建、测试和部署工作流程。在
    Tekton 管道中，每个步骤都在容器中运行，这使得它非常适合需要隔离和可重复性的 ML 工作流程。
- en: 'Buildpacks: skipping Dockerfiles'
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Buildpacks：跳过 Dockerfile
- en: Remember the last time you wrestled with a complex Dockerfile, trying to get
    all dependencies and configurations just right? [Paketo Buildpacks](https://paketo.io/)
    (an implementation of Cloud Native Buildpacks) offer a refreshing alternative.
    They automate the creation of container images directly from your source code.
    Buildpacks analyze your project, detect the language and dependencies, and then
    build an optimized, secure container image for you. This not only saves time but
    also incorporates best practices into your image-building process, often resulting
    in more secure and efficient images than those created manually with Dockerfiles.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 记得上次你与复杂的 Dockerfile 斗争，试图将所有依赖和配置都调整得恰到好处吗？[Paketo Buildpacks](https://paketo.io/)（Cloud
    Native Buildpacks 的一个实现）提供了一个令人耳目一新的替代方案。它们直接从你的源代码中自动化创建容器镜像。Buildpacks 分析你的项目，检测语言和依赖项，然后为你构建一个优化、安全的容器镜像。这不仅节省了时间，还将最佳实践纳入到你的镜像构建过程中，通常会产生比手动使用
    Dockerfile 创建的更安全、更高效的镜像。
- en: 'GPT-2: lightweight model'
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GPT-2：轻量级模型
- en: We’ll be using GPT-2 as our example model. It’s a well-known transformer model,
    and crucially, it’s lightweight enough for us to tune quickly on a small, custom
    dataset. This makes it perfect for demonstrating the mechanics of our training
    pipeline without requiring massive compute resources or hours of waiting. We’ll
    tune it on a tiny set of question-answer pairs, allowing us to see a clear difference
    in its outputs after our pipeline works its magic.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将以 GPT-2 作为示例模型。它是一个知名的变压器模型，并且关键的是，它足够轻量，我们可以快速在小型自定义数据集上调整它。这使得它非常适合演示我们的训练管道的机制，而无需大量的计算资源或等待数小时。我们将使用一组微小的问答对来调整它，这样我们就可以在管道施展魔法后清楚地看到其输出的差异。
- en: The goal here isn’t to achieve groundbreaking NLP results with GPT-2\. Instead,
    we’re focusing squarely on showcasing an efficient and automated CI/CD pipeline
    for model training. The model is our payload.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的目标不是使用 GPT-2 实现突破性的 NLP 结果。相反，我们专注于展示一个高效且自动化的模型训练 CI/CD pipeline。模型是我们的有效载荷。
- en: 'Peeking Inside the Project: Code, Data, and Pipeline Structure'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 查看项目内部：代码、数据和 Pipeline 结构
- en: 'I’ve set up an example [repository on GitHub](https://github.com/sylvainkalache/Automate-PyTorch-Model-Training-with-Tekton-and-Buildpacks)
    that contains everything you’ll need to follow along. Let’s take a quick tour
    of the key components:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我在 GitHub 上设置了一个示例 [仓库](https://github.com/sylvainkalache/Automate-PyTorch-Model-Training-with-Tekton-and-Buildpacks)，其中包含了您需要的一切来跟随操作。让我们快速浏览一下关键组件：
- en: '`training_process/train.py` – the model training script. It uses HuggingFace
    Transformers with PyTorch to fine-tune GPT-2 on a custom Q&A dataset. It reads
    a small text file of question-answer pairs (see below), fine-tunes GPT-2 on this
    data, and saves the trained model to an output directory.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`training_process/train.py` – 模型训练脚本。它使用 HuggingFace Transformers 和 PyTorch
    在自定义问答数据集上微调 GPT-2。它读取一个包含问答对的文本文件（见下文），在此数据集上微调 GPT-2，并将训练好的模型保存到输出目录。'
- en: '`training_process/requirements.txt` – Python dependencies needed for training.
    Buildpacks will auto-install these into the image.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`training_process/requirements.txt` – 训练所需的 Python 依赖项。Buildpacks 将自动将这些依赖项安装到镜像中。'
- en: '`training_process/train.txt` – A small dataset of Q&A pairs. Feel free to customize
    it 🙂'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`training_process/train.txt` – 一组问答对的小数据集。请随意自定义它 🙂'
- en: '`untrained_model.py` – A helper script to test GPT-2 before fine-tuning.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`untrained_model.py` – 一个辅助脚本，用于在微调之前测试 GPT-2。'
- en: '**Tekton Pipeline Files:**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**Tekton Pipeline 文件：**'
- en: '`model-training-pipeline.yaml` – defines the Tekton pipeline with two tasks
    (explained in the next section).'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`model-training-pipeline.yaml` – 定义了 Tekton pipeline，包含两个任务（下一节将解释）。'
- en: '`source-pv-pvc.yaml` – defines a PersistentVolume and PersistentVolumeClaim
    for sharing the source code and data with the Tekton tasks (used as a workspace).'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`source-pv-pvc.yaml` – 定义了一个 PersistentVolume 和 PersistentVolumeClaim，用于与 Tekton
    任务（用作工作区）共享源代码和数据。'
- en: '`kind-config.yaml` – a [Kind](https://kind.sigs.k8s.io/) cluster configuration
    to mount the local `training_process/` directory into the Kubernetes cluster.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kind-config.yaml` – 一个 [Kind](https://kind.sigs.k8s.io/) 集群配置，用于将本地 `training_process/`
    目录挂载到 Kubernetes 集群中。'
- en: '`sa.yml`– a ServiceAccount and secret configuration for pushing the built image
    to a container registry (Docker Hub in this case).'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`sa.yml`– 用于将构建的镜像推送到容器注册库（在本例中为 Docker Hub）的 ServiceAccount 和密钥配置。'
- en: With these pieces, we have our code, data, and pipeline definitions ready. Now,
    let’s examine the structure of the Tekton pipeline.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些组件，我们已经准备好了代码、数据和 Pipeline 定义。现在，让我们检查 Tekton pipeline 的结构。
- en: 'Anatomy of Our Tekton Pipeline: Building and Training'
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们 Tekton Pipeline 的结构：构建和训练
- en: At its core, a Tekton Pipeline resource is what orchestrates your CI/CD workflow
    by defining a series of Tasks. You can think of these Tasks as reusable building
    blocks, each composed of one or more Steps where your actual commands and scripts
    execute — all neatly packaged within containers.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在核心上，Tekton Pipeline 资源通过定义一系列任务来编排您的 CI/CD 工作流程。您可以将这些任务视为可重用的构建块，每个任务由一个或多个步骤组成，在这些步骤中执行实际的命令和脚本——所有这些都被巧妙地封装在容器中。
- en: 'For our specific MLOps goal of automating the GPT-2 model training, the Pipeline
    (defined in `model-training-pipeline.yaml`) is designed with a clear, sequential
    structure. It will execute two primary Tasks, one after the other: first, to build
    and containerize our training code, and second, to run the training process using
    that fresh container image.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现我们特定的 MLOps 目标，即自动化 GPT-2 模型训练，我们设计的 Pipeline（在 `model-training-pipeline.yaml`
    中定义）具有清晰、顺序性的结构。它将依次执行两个主要任务：首先，构建和容器化我们的训练代码，其次，使用这个新的容器镜像运行训练过程。
- en: '![Diagram showing the Tekton pipeline  Tasks](../Images/e0e20a33d43b28d45845fdcc88a2a09f.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![显示 Tekton pipeline 任务的图](../Images/e0e20a33d43b28d45845fdcc88a2a09f.png)'
- en: Let’s go over each in detail.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐一详细说明。
- en: 'Build The Image: Containerize the Training Code'
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建镜像：容器化训练代码
- en: 'This task utilizes Paketo Buildpacks to create a Docker image that contains
    our training code and all itsdependencies. Importantly, no Dockerfile is required:
    the Buildpacks builder will automatically detect the Python app and install PyTorch,
    Transformers, and other dependencies as specified in the requirements.txt file.
    In the pipeline, this task is referred to as `build-image`. It runs the Paketo
    Buildpacks builder (`paketobuildpacks/builder:full`) with the source code workspace
    mounted. Under the hood, it invokes the Cloud Native Buildpacks lifecycle creator:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 此任务利用 Paketo Buildpacks 创建包含我们的训练代码及其所有依赖项的 Docker 镜像。重要的是，不需要 Dockerfile：Buildpacks
    构建器将自动检测 Python 应用并安装 PyTorch、Transformers 以及在 requirements.txt 文件中指定的其他依赖项。在管道中，此任务被称为
    `build-image`。它运行带有源代码工作区挂载的 Paketo Buildpacks 构建器 (`paketobuildpacks/builder:full`)。在底层，它调用
    Cloud Native Buildpacks 生命周期创建器：
- en: '`/cnb/lifecycle/creator -skip-restore -app "$(workspaces.source.path)" "$(params.APP_IMAGE)"`'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '`/cnb/lifecycle/creator -skip-restore -app "$(workspaces.source.path)" "$(params.APP_IMAGE)"`'
- en: This command tells Buildpacks to create a container image from the app source
    in the workspace and tag it as `$(params.APP_IMAGE)`. By default, `APP_IMAGE`
    is set to a Docker Hub repository (e.g., `sylvainkalache/automate-pytorch-model-training-with-tekton-and-buildpacks:latest`).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令告诉 Buildpacks 从工作区中的应用源创建一个容器镜像，并将其标记为 `$(params.APP_IMAGE)`。默认情况下，`APP_IMAGE`
    设置为 Docker Hub 仓库（例如，`sylvainkalache/automate-pytorch-model-training-with-tekton-and-buildpacks:latest`）。
- en: Note that you’ll need to substitute with your registry. I use Docker Hub in
    this example. After this step, our training code is packaged into a container
    image and pushed to the registry.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，你需要用你的注册表替换它。在这个例子中，我使用 Docker Hub。在此步骤之后，我们的训练代码被打包成一个容器镜像并推送到注册表。
- en: Train the Model
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: The second task, `run-training`, depends on the first. This task pulls and runs
    the image produced by the build step to execute the model training. Essentially,
    it starts a container from the image (which has Python, GPT-2 code, etc. installed)
    and runs the `train.py` script inside that container.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个任务 `run-training` 依赖于第一个任务。此任务从构建步骤生成的镜像中拉取并运行图像以执行模型训练。本质上，它从包含 Python、GPT-2
    代码等（已安装）的镜像中启动一个容器，并在该容器内运行 `train.py` 脚本。
- en: 'The Shared Workspace: Connecting the Dots'
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 共享工作区：连接点
- en: Let’s go over why we need a shared workspace in our Tekton pipeline. In this
    automated workflow composed of multiple stages, the build stage and training stage
    require a shared place to exchange files or data. Our build-image task needs access
    to our local source code to containerize it. Later, the run-training task needs
    access to the training data. Finally, when the training task successfully generates
    a fine-tuned model, we need a way to save and retrieve that valuable output.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看为什么在我们的 Tekton 管道中需要一个共享工作区。在这个由多个阶段组成的自动化工作流程中，构建阶段和训练阶段需要一个共享的地方来交换文件或数据。我们的
    build-image 任务需要访问我们的本地源代码以将其容器化。稍后，run-training 任务需要访问训练数据。最后，当训练任务成功生成一个微调模型时，我们需要一种保存和检索这个宝贵输出的方法。
- en: '​​Both tasks share a Tekton Workspace named “source”. This workspace is backed
    by a PersistentVolumeClaim (`source-pvc`), which is set up to mount our local
    code. This is how the pipeline accesses the training script and data: the same
    files you have in `training_process/` on your machine are mounted into the Tekton
    task pods at `/workspace/source`.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个任务共享一个名为“source”的 Tekton Workspace。此 Workspace 由一个 PersistentVolumeClaim
    (`source-pvc`) 支持，该 PersistentVolumeClaim 已配置为挂载我们的本地代码。这就是管道如何访问训练脚本和数据：你机器上
    `training_process/` 目录中的相同文件被挂载到 Tekton 任务 Pod 的 `/workspace/source`。
- en: '![Diagram showing how the code is connected to the Kind cluster where the Tekton
    pipeline will run](../Images/deeb4928ef67970b0065d8b0a99387b0.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![展示代码如何连接到 Tekton 管道将运行的 Kind 集群的图](../Images/deeb4928ef67970b0065d8b0a99387b0.png)'
- en: The Buildpacks builder reads the code from there to build the image, and the
    training container later reads the data and writes outputs there as well. Using
    a shared workspace ensures that the model saved during training persists after
    the task completes (so we can retrieve it) and that both tasks operate on the
    same code base. Note that this setup is suitable for this tutorial, but it is
    unlikely to be something you’d want for production.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Buildpacks 构建器从那里读取代码以构建镜像，训练容器随后读取数据并将输出写入那里。使用共享工作区确保在训练期间保存的模型在任务完成后仍然持续存在（以便我们可以检索它），并且两个任务都在相同的代码库上操作。请注意，这种设置适合这个教程，但不太可能适用于生产环境。
- en: Now, merging the two sections, this is what the entire training pipeline looks
    like.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，合并这两个部分，这就是整个训练管道的样子。
- en: '![A diagram of the entire process, showing how the code and passed to Kind
    and the Tekton pipeline in its entirety ](../Images/784529f2d8b85a3fbcea22c5997283cf.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![整个过程的图解，展示了代码如何传递给 Kind 以及 Tekton 管道整体](../Images/784529f2d8b85a3fbcea22c5997283cf.png)'
- en: Now that we understand the pipeline, let’s walk through setting it up and running
    it.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们了解了管道，让我们一步步设置并运行它。
- en: 'Step-by-Step: Running the Tekton Pipeline for GPT-2 Training'
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤-by-步骤：运行 GPT-2 训练的 Tekton Pipeline
- en: Ready to see it in action? Follow these steps to set up your environment, deploy
    the Tekton resources, and trigger the training pipeline. This assumes you have
    a Kubernetes cluster (for local testing, you can use [Kind](https://kind.sigs.k8s.io/)
    with the provided config) and `kubectl` access to it. If you do not have such
    a setup, [here](https://github.com/sylvainkalache/Automate-PyTorch-Model-Training-with-Tekton-and-Buildpacks/blob/main/install.sh)
    is a rough list of commands you’ll need to get the necessary tools. This tutorial
    was tested on Ubuntu 22.04.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 准备看到它实际运行吗？按照以下步骤设置您的环境，部署 Tekton 资源，并触发训练管道。这假设您有一个 Kubernetes 集群（对于本地测试，您可以使用提供的配置使用
    [Kind](https://kind.sigs.k8s.io/)），并且有 `kubectl` 访问权限。如果您没有这样的设置，[这里](https://github.com/sylvainkalache/Automate-PyTorch-Model-Training-with-Tekton-and-Buildpacks/blob/main/install.sh)
    是您需要获取必要工具的命令列表。本教程已在 Ubuntu 22.04 上进行测试。
- en: Clone the Example Repository
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 克隆示例仓库
- en: 'Get the code and pipeline manifests on your machine:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的机器上获取代码和管道清单：
- en: '[PRE0]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Install Tekton Pipelines
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装 Tekton Pipelines
- en: 'If Tekton is not already installed on your cluster, install it by applying
    the official release YAML:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 Tekton 在您的集群上尚未安装，请通过应用官方发布 YAML 进行安装：
- en: '`kubectl apply -f https://storage.googleapis.com/tekton-releases/pipeline/latest/release.yaml`'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`kubectl apply -f https://storage.googleapis.com/tekton-releases/pipeline/latest/release.yaml`'
- en: This command will create the Tekton CRDs (Pipeline, Task, PipelineRun, etc.)
    in your cluster. You only need to do this once.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令将在您的集群中创建 Tekton CRDs（Pipeline、Task、PipelineRun 等）。您只需执行一次。
- en: Apply the Pipeline and Volume Manifests
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用管道和卷清单
- en: 'Deploy the Tekton pipeline definition and supporting Kubernetes resources:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 部署 Tekton 管道定义和支持的 Kubernetes 资源：
- en: '[PRE1]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Let’s go over the details of each command:**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们详细了解一下每个命令：**'
- en: The first command creates the Tekton Pipeline object `model-training-pipeline`
    in the cluster.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个命令在集群中创建 Tekton Pipeline 对象 `model-training-pipeline`。
- en: The second creates a PersistentVolume and Claim. The provided `source-pv-pvc.yaml`
    assumes you’re using Kind and mounts the local `training_process/` directory into
    the cluster. It defines a hostPath volume at `/mnt/training_process` on the node,
    and ties it to a PVC named `source-pvc`.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二个创建一个 PersistentVolume 和 Claim。提供的 `source-pv-pvc.yaml` 假设您正在使用 Kind，并将本地
    `training_process/` 目录挂载到集群中。它定义了节点上的 `/mnt/training_process` 位置的 hostPath 卷，并将其绑定到名为
    `source-pvc` 的 PVC。
- en: The third applies a ServiceAccount for Tekton to use when running the pipeline.
    This `sa.yml` should reference the Docker registry secret created in the next
    step, allowing Tekton’s build step to push the image.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三个命令为 Tekton 在运行管道时使用的服务帐户应用 ServiceAccount。此 `sa.yml` 应引用在下一步中创建的 Docker 仓库密钥，允许
    Tekton 的构建步骤推送镜像。
- en: Create Docker Registry Secret
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 Docker 仓库密钥
- en: 'Tekton’s Buildpacks task will push the built image to a container registry.
    For this, you need to provide your registry credentials (e.g., Docker Hub login).
    Create a Kubernetes secret with your registry auth details:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: Tekton 的 Buildpacks 任务会将构建的镜像推送到容器仓库。为此，您需要提供您的仓库凭证（例如，Docker Hub 登录）。使用您的仓库认证详情创建一个
    Kubernetes 密钥：
- en: '[PRE2]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This secret will store your auth info. Ensure the ServiceAccount from step 3
    is configured to use this secret for image pull and push.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 此密钥将存储您的认证信息。确保步骤 3 中的 ServiceAccount 配置为使用此密钥进行镜像拉取和推送。
- en: Run the Tekton Pipeline
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行 Tekton Pipeline
- en: 'With everything in place, you can start the pipeline, run:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 一切准备就绪后，您可以开始管道，运行：
- en: '[PRE3]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here we pass the PVC as the source workspace. Also specify the service account
    (`-s`) that has the registry secret. This will start the pipeline. Use `tkn pipelinerun
    logs -f` to watch the progress. You should see output from the Buildpacks creator
    (detecting a Python app, installing requirements) and then from the training script
    (printing training epochs and completion).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将 PVC 作为源工作区传递。还指定了具有仓库密钥的服务帐户（`-s`）。这将启动管道。使用 `tkn pipelinerun logs -f`
    来查看进度。您应该看到来自 Buildpacks 创建者（检测 Python 应用，安装需求）的输出，然后是来自训练脚本的输出（打印训练轮次和完成）。
- en: After the pipeline finishes successfully, the fine-tuned model will be saved
    in the `training_process/output-model` directory (thanks to the PVC workspace,
    it persists on your local filesystem via the Kind mount). We can now compare the
    GPT-2 model’s output before and after fine-tuning.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在管道成功完成后，微调后的模型将被保存在`training_process/output-model`目录中（多亏了PVC工作区，它通过Kind挂载在你的本地文件系统中持久化）。现在我们可以比较微调前后GPT-2模型的输出。
- en: 'The Proof is in the Pudding: GPT-2 Output Before vs. After Training'
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 真理在于甜点：训练前后GPT-2的输出对比
- en: Did our automated pipeline improve the model? Let’s find out.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们自动化的管道是否改进了模型？让我们来看看。
- en: Before The Training
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在训练之前
- en: 'What does the off-the-shelf GPT-2 model say? Run `untrained_model.py` with
    a question. For example:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 原版的GPT-2模型说了些什么？运行`untrained_model.py`并输入一个问题。例如：
- en: '![Terminal screenshot showing that the off the shelf model did not correctly
    answer the question “How far is the sun?”](../Images/9f9c896943656780e8b9cb6b26a8e360.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![终端截图显示现成的模型没有正确回答“太阳有多远？”这个问题](../Images/9f9c896943656780e8b9cb6b26a8e360.png)'
- en: We can see that GPT-2 gave a rambling response that didn’t correctly answer
    the question.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到GPT-2给出了一个漫无边际的回答，并没有正确回答问题。
- en: After the Training Process
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练过程之后
- en: 'Now let’s see GPT-2 tuned on our Q&A data. We can load the model saved by our
    pipeline and generate an answer. The script `training_process/serve.py` does this.
    For example:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看在问答数据上微调的GPT-2。我们可以加载由我们的管道保存的模型并生成一个答案。脚本`training_process/serve.py`就是做这个的。例如：
- en: '![Terminal screenshot showing that the trained model correctly answer the question
    “How far is the sun?”](../Images/bcd868403265c53b36021af3674e62c2.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![终端截图显示训练后的模型正确回答了“太阳有多远？”这个问题](../Images/bcd868403265c53b36021af3674e62c2.png)'
- en: 'Because we trained on a QA format, the fine-tuned GPT-2 will produce an answer
    after the `|` separator. Indeed, after training, the model’s answer to *“How far
    is the sun?”* was: “150 million kilometers away.” — precisely the answer from
    our training data.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们是在QA格式上训练的，所以微调后的GPT-2会在`|`分隔符之后生成答案。确实，训练后，模型对“太阳有多远？”这个问题的回答是：“距离1.5亿公里。”——这正是我们从训练数据中得到的确切答案。
- en: This simple comparison demonstrates that our CI/CD pipeline successfully took
    our source code, built it, trained the model, and produced an improved version.
    While this was a minimal dataset for illustrative purposes, imagine plugging in
    your larger, domain-specific datasets. The pipeline structure remains unchanged,
    providing a robust and automated path for model updates.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的比较表明，我们的CI/CD管道成功地处理了源代码，构建了它，训练了模型，并生成了一个改进版本。虽然这只是一个用于说明的最小数据集，但想象一下将你的更大、特定领域的数据集插入其中。管道结构保持不变，为模型更新提供了一个强大且自动化的路径。
- en: 'Tekton + Buildpacks: A Winning Combo for Simpler ML CI/CD'
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Tekton + Buildpacks：简化ML CI/CD的获胜组合
- en: Using Tekton pipelines with Buildpacks offers an elegant solution for machine
    learning CI/CD workflows. Both Tekton and Buildpacks are cloud-native, open-source
    solutions that integrate well with the rest of your Kubernetes ecosystem.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Tekton管道与Buildpacks为机器学习CI/CD工作流程提供了一个优雅的解决方案。Tekton和Buildpacks都是云原生、开源的解决方案，与你的Kubernetes生态系统中的其他部分很好地集成。
- en: By automating model training in this way, ML engineers and DevOps teams can
    collaborate more effectively. The ML code is treated similarly to application
    code in CI/CD – every change can trigger a pipeline that reliably builds and trains
    the model. Tekton provides the pipeline glue with Kubernetes scalability, and
    Paketo Buildpacks take the hassle out of containerizing ML workloads. The end
    result is faster experimentation and deployment for ML models, achieved with a
    declarative, easy-to-maintain pipeline. I hope you like it!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以这种方式自动化模型训练，机器学习工程师和DevOps团队能够更有效地协作。在CI/CD中，ML代码被处理得与应用程序代码类似——每次更改都可以触发一个可靠地构建和训练模型的管道。Tekton提供了与Kubernetes可伸缩性相结合的管道粘合剂，Paketo
    Buildpacks则消除了容器化ML工作负载的麻烦。结果是更快地进行实验和部署ML模型，通过声明性、易于维护的管道实现。希望你们喜欢它！
- en: Thanks For Reading
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 感谢阅读
- en: 'I’m Sylvain Kalache, leading [Rootly AI Labs](http://labs.rootly.com/): a fellow-driven
    community building AI-centric prototypes, open-source tools, and research to redefine
    reliability engineering. Sponsored by Anthropic, Google Cloud, and Google DeepMind,
    all our work is freely available on [GitHub](https://github.com/Rootly-AI-Labs).
    For more of my stories, follow me on [LinkedIn](https://www.linkedin.com/in/sylvainkalache/)
    or explore my writing in my [portfolio](https://www.sylvainkalache.com/#writing).'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我叫Sylvain Kalache，是[Rootly AI Labs](http://labs.rootly.com/)的领导者：一个由同仁驱动的社区，致力于构建以AI为中心的原型、开源工具和研究，以重新定义可靠性工程。由Anthropic、Google
    Cloud和Google DeepMind赞助，我们所有的作品都在[GitHub](https://github.com/Rootly-AI-Labs)上免费提供。想了解更多我的故事，请关注我的[LinkedIn](https://www.linkedin.com/in/sylvainkalache/)或在我的[作品集](https://www.sylvainkalache.com/#writing)中探索我的写作。
- en: '![Sylvain Kalache](../Images/c7c3eeecb47fc672ea38e73c650a323e.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![Sylvain Kalache](../Images/c7c3eeecb47fc672ea38e73c650a323e.png)'
