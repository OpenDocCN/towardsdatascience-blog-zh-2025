  prefs: []
  type: TYPE_NORMAL
  zh: 运行上述代码，然后在您的浏览器中打开models.html文件。这次，您应该能够点击播放/下一页/上一页按钮，看到LangExtract文本处理动作的更好可视化。
- en: For more details on LangExtract, check out Google’s GitHub repo [here](https://github.com/google/langextract).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 关于LangExtract的更多详细信息，请查看Google的GitHub仓库[这里](https://github.com/google/langextract)。
- en: Summary
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, I introduced you to LangExtract, a new Python library and framework
    from Google that allows you to extract structured output from unstructured input.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我向您介绍了LangExtract，这是Google推出的一款新的Python库和框架，允许您从非结构化输入中提取结构化输出。
- en: I outlined some of the advantages that using LangExtract can bring, including
    its ability to handle large documents, its augmented knowledge extraction and
    multi-model support.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我概述了使用LangExtract可以带来的优势，包括其处理大型文档的能力、增强的知识提取和多模型支持。
- en: I took you through the install process — a simple pip install, then, by way
    of some example code, showed how to use LangExtract to perform needle-in-the-haystack
    type queries on a large body of unstructured text.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我向您介绍了安装过程——简单的pip安装，然后通过一些示例代码展示了如何使用LangExtract在大量非结构化文本上执行针尖对麦芒式的查询。
- en: In my final example code, I demonstrated a more traditional RAG-type operation
    by extracting multiple entities (AI Model names) and an associated attribute (date
    of release). For both my primary examples, I also showed you how to code a visual
    representation of how LangExtract works in action that you can open and play back
    in a browser window.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的最后一个示例代码中，我通过提取多个实体（AI模型名称）和相关的属性（发布日期）来演示了一种更传统的RAG-type操作。对于我的主要示例，我还向您展示了如何编写LangExtract在实际操作中的视觉表示代码，您可以在浏览器窗口中打开并回放。
