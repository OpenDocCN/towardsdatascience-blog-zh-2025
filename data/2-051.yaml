- en: Pre-requisites
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 前提条件
- en: As we’re using a Google LLM model (gemini-2.5-flash) for our processing engine,
    you’ll need a Gemini API key. You can get this from Google Cloud. You can also
    use LLMs from OpenAI, and I’ll show an example of how to do this in a bit.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们使用Google LLM模型（gemini-2.5-flash）作为我们的处理引擎，你需要一个Gemini API密钥。你可以从Google Cloud获取这个密钥。你也可以使用OpenAI的LLM，我将在稍后展示如何做到这一点。
- en: Code example 1 — needle-in-a-haystack
  id: totrans-25
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例1—针尖上的麦芒
- en: The first thing we need to do is get some input data to work with. You can use
    any input text file or HTML file for this. For previous experiments using RAG,
    I used a book I downloaded from Project Gutenberg; the consistently riveting “**Diseases
    of cattle, sheep, goats, and swine by Jno. A. W. Dollar & G. Moussu”**
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先需要做的是获取一些输入数据来处理。你可以使用任何输入文本文件或HTML文件。对于之前使用RAG的实验，我使用了一本我从Project Gutenberg下载的书；始终令人着迷的“**Jno.
    A. W. Dollar & G. Moussu所著的牛、羊、山羊和猪的疾病**”**
- en: Note that you can view the Project Gutenberg Permissions, Licensing and other
    Common Requests page using the following link.
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意，你可以使用以下链接查看Project Gutenberg的权限、许可和其他常见请求页面。
