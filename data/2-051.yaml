  zh: '![](../Images/f415e3760d25bfa41be776426a9c3509.png)'
- en: Code example 3 — retrieving multiple structured outputs
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 3—检索多个结构化输出
- en: In this example, we’ll take some unstructured input text — an article from Wikipedia
    on OpenAI, and try to retrieve the names of all the different large language models
    mentioned in the article, together with their release date. The link to the article
    is,
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将取一些非结构化输入文本——一篇关于OpenAI的维基百科文章，并尝试检索文章中提到的所有不同的大型语言模型的名称及其发布日期。文章的链接是，
- en: '[PRE8]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Note: Most text in Wikipedia, excluding quotations, has been released under
    the [Creative Commons Attribution-Sharealike 4.0 International License](https://en.wikipedia.org/wiki/Wikipedia:Text_of_Creative_Commons_Attribution-ShareAlike_4.0_International_License)
    (CC-BY-SA) and the [GNU Free Documentation License](https://en.wikipedia.org/wiki/Wikipedia:Text_of_the_GNU_Free_Documentation_License)
    (GFDL) In short this means that you are free:'
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：维基百科中的大部分文本（不包括引文）已根据[Creative Commons Attribution-Sharealike 4.0 International
    License](https://en.wikipedia.org/wiki/Wikipedia:Text_of_Creative_Commons_Attribution-ShareAlike_4.0_International_License)（CC-BY-SA）和[GNU
    Free Documentation License](https://en.wikipedia.org/wiki/Wikipedia:Text_of_the_GNU_Free_Documentation_License)（GFDL）发布。简而言之，这意味着你可以：
- en: ''
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**to Share** — copy and redistribute the material in any medium or format'
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**分享**—以任何媒体或格式复制和重新分发材料'
- en: ''
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**to Adapt** — remix, transform, and build upon the material'
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**改编**—混搭、转换和基于材料进行构建'
- en: ''
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: for any purpose, even commercially.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用于任何目的，包括商业用途。
- en: Our code is pretty similar to our first example. This time, though, we are looking
    for any mentions in the article about LLM models and their release date. One other
    step we have to do is clean up the HTML of the article first to ensure that LangExtract
    has the best chance of reading it. We use the BeautifulSoup library for this.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的代码与第一个例子非常相似。不过，这次我们正在寻找文章中关于LLM模型及其发布日期的任何提及。我们还需要做的一个步骤是清理文章的HTML，以确保LangExtract有最大的机会读取它。我们使用BeautifulSoup库来完成这个任务。
- en: '[PRE9]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: This is a cut-down sample of the output I got.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我得到的输出样本的简化版。
- en: '[PRE10]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Let’s double-check a couple of these. One of the outputs from our code was this.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再检查一下这些内容。我们代码的一个输出是这样的。
- en: '[PRE11]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: And from the Wikipedia article …
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 并且从维基百科文章中……
- en: “On January 23, OpenAI released *Operator*, an [AI agent](https://en.wikipedia.org/wiki/AI_agent)
    and web automation tool for accessing websites to execute goals defined by users.
    The feature was only available to Pro users in the United States.[[113]](https://en.wikipedia.org/wiki/OpenAI#cite_note-113)[[114]](https://en.wikipedia.org/wiki/OpenAI#cite_note-114)”
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “1月23日，OpenAI发布了*Operator*，这是一个[AI代理](https://en.wikipedia.org/wiki/AI_agent)和网站自动化工具，用于访问网站以执行用户定义的目标。该功能仅对美国的Pro用户可用。[[113]](https://en.wikipedia.org/wiki/OpenAI#cite_note-113)[[114]](https://en.wikipedia.org/wiki/OpenAI#cite_note-114)”
- en: So on that occasion, it might have hallucinated the year as being 2025 when
    no year was given. Remember, though, that LangExtract can use its internal knowledge
    of the world to supplement its outputs, and it may have got the year from that
    or from other contexts surrounding the extracted entity. In any case, I think
    it would be pretty easy to tweak the input prompt or the output to ignore model
    release date information that did not include a year.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 所以在那次事件上，它可能在没有给出年份的情况下将年份误认为是2025年。记住，尽管如此，LangExtract可以使用其对世界的内部知识来补充其输出，并且它可能从那个或其他与提取实体相关的上下文中获得了年份。无论如何，我认为调整输入提示或输出以忽略未包含年份的模型发布日期信息应该是相当容易的。
- en: Another output was this.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个输出是这个。
- en: '[PRE12]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: I can see two references to ChatGPT Pro in the original article.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我在原文中看到了两个关于ChatGPT Pro的引用。
- en: Franzen, Carl (December 5, 2024). [“OpenAI launches full o1 model with image
    uploads and analysis, debuts ChatGPT Pro”](https://venturebeat.com/ai/openai-launches-full-o1-model-with-34-reduced-error-rate-debuts-chatgpt-pro/).
    *VentureBeat*. [Archived](https://web.archive.org/web/20241207181403/https://venturebeat.com/ai/openai-launches-full-o1-model-with-34-reduced-error-rate-debuts-chatgpt-pro/)
    from the original on December 7, 2024\. Retrieved December 11, 2024.
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Franzen, Carl (December 5, 2024). [“OpenAI推出带有图像上传和分析的完整o1模型，推出ChatGPT Pro”](https://venturebeat.com/ai/openai-launches-full-o1-model-with-34-reduced-error-rate-debuts-chatgpt-pro/).
    *VentureBeat*. [存档](https://web.archive.org/web/20241207181403/https://venturebeat.com/ai/openai-launches-full-o1-model-with-34-reduced-error-rate-debuts-chatgpt-pro/)于2024年12月7日。2024年12月11日检索。
- en: And
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 然后
- en: In December 2024, during the “12 Days of OpenAI” event, the company launched
    the [Sora](https://en.wikipedia.org/wiki/Sora_%28text-to-video_model%29) model
    for ChatGPT Plus and Pro users,[[105]](https://en.wikipedia.org/wiki/OpenAI#cite_note-105)[[106]](https://en.wikipedia.org/wiki/OpenAI#cite_note-106)
    It also launched the advanced [OpenAI o1](https://en.wikipedia.org/wiki/OpenAI_o1)
    reasoning model[[107]](https://en.wikipedia.org/wiki/OpenAI#cite_note-107)[[108]](https://en.wikipedia.org/wiki/OpenAI#cite_note-108)
    Additionally, ChatGPT Pro — a $200/month subscription service offering unlimited
    o1 access and enhanced voice features — was introduced, and preliminary benchmark
    results for the upcoming [OpenAI o3](https://en.wikipedia.org/wiki/OpenAI_o3)
    models were shared
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在2024年12月，在“12天OpenAI”活动期间，公司为ChatGPT Plus和Pro用户推出了[Sora](https://en.wikipedia.org/wiki/Sora_%28text-to-video_model%29)模型，[[105]](https://en.wikipedia.org/wiki/OpenAI#cite_note-105)[[106]](https://en.wikipedia.org/wiki/OpenAI#cite_note-106)，它还推出了高级[OpenAI
    o1](https://en.wikipedia.org/wiki/OpenAI_o1)推理模型[[107]](https://en.wikipedia.org/wiki/OpenAI#cite_note-107)[[108]](https://en.wikipedia.org/wiki/OpenAI#cite_note-108)。此外，还推出了ChatGPT
    Pro——一个每月200美元的订阅服务，提供无限的o1访问和增强的语音功能——以及即将推出的[OpenAI o3](https://en.wikipedia.org/wiki/OpenAI_o3)模型的初步基准结果。
- en: So I think LangExtract was pretty accurate with this extraction.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我认为LangExtract在这个提取上非常准确。
