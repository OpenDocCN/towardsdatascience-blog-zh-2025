- en: '[PRE13]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Run the above code and then open the models.html file in your browser. This
    time, you should be able to click the Play/Next/Previous buttons and see a better
