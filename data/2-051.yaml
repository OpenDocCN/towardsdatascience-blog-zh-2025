  type: TYPE_NORMAL
  zh: 字符。这种断裂很少复杂。症状包括
- en: lameness diminish with rest, but deformity continues.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 跛行在休息后会减轻，但畸形会持续。
- en: ''
