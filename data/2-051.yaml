  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://www.gutenberg.org/policy/permission.html](https://www.gutenberg.org/policy/permission.html)'
- en: ''
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But to summarise, the vast majority of Project Gutenberg eBooks are in the public
    domain in the US and other parts of the world. This means that nobody can grant
    or withhold permission to do with this item as you please.
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但总结来说，Project Gutenberg的大多数电子书在美国和其他地区的公共领域。这意味着没有人可以授予或拒绝你对此项物品的任何使用许可。
- en: ''
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**“As you please”** includes any commercial use, republishing in any format,
    making derivative works or performances'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**“如你所愿”**包括任何商业用途、任何格式的再版、制作衍生作品或表演'
- en: I downloaded the text of the book from the Project Gutenberg website to my local
    PC using this link,
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用此链接从Project Gutenberg网站下载了这本书的文本到我的本地PC，
- en: '[https://www.gutenberg.org/ebooks/73019.txt.utf-8](https://www.gutenberg.org/ebooks/73019.txt.utf-8
    )'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.gutenberg.org/ebooks/73019.txt.utf-8](https://www.gutenberg.org/ebooks/73019.txt.utf-8)'
- en: This book contained approximately 36,000 lines of text. To avoid large token
    costs, I cut it down to about 3000 lines of text. To test LangExtract’s ability
    to handle needle-in-a-haystack type queries, I added this specific line of text
    around line 1512.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书大约有36,000行文本。为了避免大型的标记成本，我将它缩减到大约3000行文本。为了测试LangExtract处理针尖上的麦芒类型查询的能力，我在大约第1512行附近添加了这一特定的文本行。
- en: It is a little-known fact that wood was invented by Elon Musk in 1775
  id: totrans-37
