- en: This code snippet sets up a **prompt and example** to guide the LangExtract
    extraction task. This is essential for few-shot learning with a structured schema.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码片段设置了一个**提示和示例**，以指导LangExtract提取任务。这对于具有结构化模式的少量学习至关重要。
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now, we run the structured entity extraction. First, we open the file and read
    its contents into a variable. The heavy lifting is done by the **lx.extract**
    call. After that, we just print out the relevant outputs.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们运行结构化实体提取。首先，我们打开文件并将内容读入一个变量。繁重的工作由**lx.extract**调用完成。之后，我们只需打印出相关的输出。
- en: '[PRE4]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: And here are our outputs.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们的输出。
- en: '[PRE5]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Not too shabby.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 还不错。
- en: Note, if you wanted to use an OpenAI model and API key, your extraction code
    would look something like this,
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果你想要使用OpenAI模型和API密钥，你的提取代码可能看起来像这样，
- en: '[PRE6]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Code example 2 — extraction visual validation**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码示例 2—提取可视化验证**'
- en: LangExtract provides a visualisation of how it extracted the text. It’s not
    particularly useful in this example, but it gives you an idea of what is possible.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: LangExtract提供了如何提取文本的可视化。在这个例子中，它并不特别有用，但它给你一个可能的思路。
- en: Just add this little snippet of code to the end of your existing code. This
    will create an HTML file that you can open in a browser window. From there, you
    can scroll up and down your input text and “play” back the steps that LangExtract
    took to get its outputs.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 只需将这段小代码片段添加到现有代码的末尾。这将创建一个可以在浏览器窗口中打开的HTML文件。从那里，你可以滚动查看输入文本，并“播放”LangExtract获取其输出的步骤。
- en: '[PRE7]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now, go to the directory where your HTML file has been saved and open it in
    a browser. This is what I see.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，前往保存你的HTML文件的目录，并在浏览器中打开它。这是我看到的。
