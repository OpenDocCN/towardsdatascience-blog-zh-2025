- en: About Calculating Date Ranges in DAX
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于在 DAX 中计算日期范围
- en: 原文：[https://towardsdatascience.com/about-calculating-date-ranges-in-dax/](https://towardsdatascience.com/about-calculating-date-ranges-in-dax/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[关于在 DAX 中计算日期范围](https://towardsdatascience.com/about-calculating-date-ranges-in-dax/)
- en: <mdspan datatext="el1747770331300" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747770331300" class="mdspan-comment">简介</mdspan>
- en: When developing Time Intelligence Measures with Power BI or in Fabric in Semantic
    Models, it can be necessary to create a date range to calculate the result for
    a specific time frame.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 Power BI 或在语义模型中的 Fabric 开发时间智能度量时，创建日期范围以计算特定时间框架的结果可能是必要的。
- en: To be precise, almost all of the Time Intelligence functions in DAX create a
    list of dates for a date range.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 要精确一点，DAX 中几乎所有的时间智能函数都会为日期范围创建一个日期列表。
- en: But sometimes we must create a custom date range due to specific requirements.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但有时我们必须根据特定要求创建自定义日期范围。
- en: 'DAX offers us two functions for this task:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: DAX 为我们提供了两个用于此任务的功能：
- en: '[`DATEINPERIOD()`](https://dax.guide/datesinperiod/)'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`DATEINPERIOD()`](https://dax.guide/datesinperiod/)'
- en: '[`DATESBETWEEN()`](https://dax.guide/datesbetween/)'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`DATESBETWEEN()`](https://dax.guide/datesbetween/)'
- en: Both functions take a Start Date as a parameter.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个函数都接受开始日期作为参数。
- en: But for the End Date, the behavior is different.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于结束日期，行为不同。
- en: While `DATESINPERIOD()` takes Intervals (Days, Months, Quarters, Years), `DATESBETWEEN()`
    takes a specified Date used as the End Date.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 而 `DATESINPERIOD()` 使用间隔（天数、月份、季度、年份），而 `DATESBETWEEN()` 使用指定的日期作为结束日期。
- en: In contrast, [`DATEADD()`](https://dax.guide/dateadd/) uses the current Filter
    Context to get the Start Date and to calculate the End Date.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，[`DATEADD()`](https://dax.guide/dateadd/) 使用当前筛选上下文来获取开始日期并计算结束日期。
- en: But we want to pass a Start Date, which can differ from the Date(s) in the current
    Filter Context.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们希望传递一个开始日期，它可能不同于当前筛选上下文中的日期（s）。
- en: This is when one of the functions mentioned above comes into play.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这时，上述提到的某个函数就派上用场了。
- en: At the end of this article, I will show you a practical example using the techniques
    shown here.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文末尾，我将通过使用这里展示的技术展示一个实际示例。
- en: Tools and scenario
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具和场景
- en: Like in many other articles, I use DAX Studio to write DAX Queries and analyze
    the results.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 像在许多其他文章中一样，我使用 DAX Studio 编写 DAX 查询并分析结果。
- en: 'If you are not familiar with writing DAX queries, read my piece on how to learn
    to write such queries:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不太熟悉编写 DAX 查询，请阅读我关于如何学习编写此类查询的文章：
- en: '[How to Write Queries for Tabular Models with DAX](https://towardsdatascience.com/601823-2/)'
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何使用 DAX 为表格模型编写查询](https://towardsdatascience.com/601823-2/)'
- en: This time, I use the Data model only for the Date table.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我只使用数据模型中的日期表。
- en: I want to calculate a date range starting from May 5\. 2025 and either 25 days
    or 2 Months into the future.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我想计算从 2025 年 5 月 5 日开始，25 天或 2 个月后的日期范围。
- en: 'To set the start date, I use this expression:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要设置开始日期，我使用这个表达式：
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This is the result in DAX Studio:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 DAX Studio 中的结果：
- en: '![](../Images/a4868af89eacd1edc45ddef4918e6283.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a4868af89eacd1edc45ddef4918e6283.png)'
- en: Figure 1 – Query and result in DAX Studio (Figure by the Author)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1 – DAX Studio 中的查询和结果（图由作者提供）
- en: I define a Variable and assign the result of the date expression for the subsequent
    queries.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我定义了一个变量，并将日期表达式的结果分配给后续的查询。
- en: Another way to define the start date is to create a date value using `DATE(2025,
    05, 05)`.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种定义开始日期的方法是使用 `DATE(2025, 05, 05)` 创建一个日期值。
- en: The result will be the same.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 结果将相同。
- en: The difference between these two approaches is that the first returns a string,
    but the second returns a proper date.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种方法之间的区别在于，第一种返回一个字符串，但第二种返回一个正确的日期。
- en: The DAX functions used here can work with both.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这里使用的 DAX 函数可以与两者一起工作。
- en: Using DATESINPERIOD()
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 DATESINPERIOD()
- en: Let’s start with `DATEINPERIOD()`.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从 `DATEINPERIOD()` 开始。
- en: 'I will use this function to get a date range string from the Start Date and
    25 days into the future:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用此函数从开始日期和未来 25 天获取日期范围字符串：
- en: '[PRE1]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The result is a table with 25 rows for the days starting from May 05, 2025,
    to May 29, 2025:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个包含从 2025 年 5 月 5 日到 2025 年 5 月 29 日的 25 行天的表格：
- en: '![](../Images/edee3db5790b39856ec20ffc7b24f30c.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/edee3db5790b39856ec20ffc7b24f30c.png)'
- en: Figure 2 – 25 Days calculated with DATESINPERIOD() (Figure by the Author)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2 – 使用 DATESINPERIOD() 计算的 25 天（图由作者提供）
- en: 'Now, let’s slightly change the query to get a list of all dates from the Start
    Date to 2 Months into the future:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们稍微改变查询，以获取从开始日期到未来 2 个月的日期列表：
- en: '[PRE2]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The query returns 61 rows starting from Max 05, 2025, until July 04, 2025:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 查询从 2025 年 5 月 5 日开始返回 61 行，直到 2025 年 7 月 4 日：
- en: '![](../Images/f613411f0a24111cdeb3067962a8098f.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f613411f0a24111cdeb3067962a8098f.png)'
- en: Figure 3 – 2 Months of dates generated with DATESINPERIOD() (Figure by the Author)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – 使用 DATESINPERIOD() 生成的 2 个月的日期（图由作者绘制）
- en: I can pass the interval with an arbitrary number of days (e.g., 14, 28, 30,
    or 31 days), and the function automatically calculates the date range.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以用任意数量的天数（例如，14、28、30 或 31 天）传递间隔，函数会自动计算日期范围。
- en: When I pass negative numbers, the date range goes to the past, starting with
    the start date.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当我传递负数时，日期范围会到过去，从起始日期开始。
- en: Using DATESBETWEEN()
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 DATESBETWEEN()
- en: Now, let’s look at `DATESBETWEEN()`.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看 `DATESBETWEEN()`。
- en: '`DATESBETWEEN()` takes a Start- and an End-Date as parameters.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '`DATESBETWEEN()` 以起始日期和结束日期作为参数。'
- en: This means I must calculate the end date before using it.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我必须在使用它之前计算结束日期。
- en: 'When I want to get a date range from May 05 to May 29, 2025, I must use the
    following query:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当我想从 2025 年 5 月 5 日到 2025 年 5 月 29 日获取日期范围时，我必须使用以下查询：
- en: '[PRE3]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The result is the same as with `DATESINPERIOD()`.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 结果与 `DATESINPERIOD()` 相同。
- en: 'However, there is one crucial point: The end date is included in the result.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有一个关键点：结束日期包含在结果中。
- en: 'This means I can write something like this to get a date range over two months
    from May 05 to July 05, 2025:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我可以写一些像这样的事情来获取从 2025 年 5 月 5 日到 2025 年 7 月 5 日的两个月日期范围：
- en: '[PRE4]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The result is very similar to the one using `DATESINPERIOD()` and month as
    the interval, but with one row more:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 结果与使用 `DATESINPERIOD()` 和月份作为间隔的结果非常相似，但多一行：
- en: '![](../Images/53ee1eb50a7c58906a24991c64700c46.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/53ee1eb50a7c58906a24991c64700c46.png)'
- en: Figure 4 – Result for a date range over two months, plus one row (Figure by
    the Author)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 两个月日期范围加一行结果（图由作者绘制）
- en: This gives me more flexibility to create the date ranges, as I can pre-calculate
    the end date according to my needs.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我能够更灵活地创建日期范围，因为我可以根据我的需求预先计算结束日期。
- en: Use in Measures – a practical example.
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在度量中使用 – 一个实际例子。
- en: I can use these methods to calculate a running total in a Measure.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以使用这些方法在度量中计算一个累计总和。
- en: But we must take care to use the two functions in the right way
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们必须注意正确地使用这两个函数。
- en: For example, to calculate the running total per month for 25 days.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，为了计算 25 天的每月累计总和。
- en: 'Look at the following code, where I define two Measures using the two functions:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 看看以下代码，其中我定义了两个使用两个函数的度量：
- en: '[PRE5]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'This is the result:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这是结果：
- en: '![](../Images/a1c3ef41b2c0d193d6e8effe4e55dcfa.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a1c3ef41b2c0d193d6e8effe4e55dcfa.png)'
- en: Figure 5 – Result of the running total over 25 days with the two functions (Figure
    by the Author)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 使用两个函数计算 25 天滚动总计数的结果（图由作者绘制）
- en: Notice the difference between the two results.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 注意两个结果之间的差异。
- en: This is because `DATESBETWEEN()` includes the end date in the result, while
    `DATESINPERIOD()` adds the number of intervals to the start date but includes
    the start date.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为 `DATESBETWEEN()` 包含了结束日期在结果中，而 `DATESINPERIOD()` 将间隔数量加到起始日期上，但包括起始日期。
- en: 'Try it out with the following query:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 用以下查询尝试一下：
- en: '[PRE6]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The first returns 25 rows (May 05 – May 29, 2025) and the second returns 26
    rows (May 05 – May 30, 2025).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个返回 25 行（2025 年 5 月 5 日至 2025 年 5 月 29 日）和第二个返回 26 行（2025 年 5 月 5 日至 2025
    年 5 月 30 日）。
- en: Therefore, I must change one of the two Measures to get the same result.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我必须更改这两个度量中的一个来得到相同的结果。
- en: 'In this case, the calculation definition is: Start from the first date and
    go 25 into the future.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，计算定义是从第一个日期开始，向前 25 天。
- en: 'The corrected logic is this:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 校正后的逻辑如下：
- en: '[PRE7]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Now, both measures return the same result:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这两个度量返回相同的结果：
- en: '![](../Images/a1c3ef41b2c0d193d6e8effe4e55dcfa.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a1c3ef41b2c0d193d6e8effe4e55dcfa.png)'
- en: Figure 6 – Result of the corrected Measures (Figure by the Author)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 校正后的度量结果（图由作者绘制）
- en: I tested the performance of both functions for the same calculation (Rolling
    total over 25 days), and the results were equal. There was no difference in performance
    or efficiency between these two.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我测试了这两个函数在相同计算（25 天的滚动总计数）上的性能，结果相同。在这些两个之间没有性能或效率的差异。
- en: Even the execution plan is the same.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 即使执行计划也是相同的。
- en: This means that `DATEINPERIOD()` is a shortcut function for `DATESBETWEEN()`.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着 `DATEINPERIOD()` 是 `DATESBETWEEN()` 的一个快捷函数。
- en: Conclusion
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: From a functionality point of view, both of the shown functions are almost equivalent.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从功能角度来看，这两个显示的函数几乎是等效的。
- en: The same applies from the performance point of view.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 从性能角度来看，也是如此。
- en: They differ in the way the end date is defined.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 它们在定义结束日期的方式上有所不同。
- en: '`DATESINPERIOD()` is based on calendar intervals, like days, months, quarters,
    and years.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '`DATESINPERIOD()`基于日历间隔，如天、月、季度和年。'
- en: This function is used when the date range must be calculated based on the calendar.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 当需要基于日历来计算日期范围时，会使用此函数。
- en: But when we have a pre-defined end date or must calculate the date range between
    two pre-defined dates, the `DATESBETWEEN()` function is the function to use.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 但当我们有一个预定义的结束日期或者必须计算两个预定义日期之间的日期范围时，应该使用`DATESBETWEEN()`函数。
- en: For example, I use `DATESBETWEEN()` when performing time intelligence calculations
    for weeks.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我在进行时间智能计算时使用`DATESBETWEEN()`。
- en: 'You can read this piece to learn more about weekly calculations:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过阅读这篇文章来了解更多关于周计算的信息：
- en: '[Advanced Time Intelligence in DAX with Performance in Mind](https://towardsdatascience.com/advanced-time-intelligence-in-dax-with-performance-in-mind/)'
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[考虑性能的DAX高级时间智能](https://towardsdatascience.com/advanced-time-intelligence-in-dax-with-performance-in-mind/)'
- en: As you can read, I store the start and end dates of the week for each row in
    the data table.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您所读到的，我在数据表的每一行中存储了每周的开始和结束日期。
- en: This way, I can easily look up each date’s start and end dates.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我可以轻松地查找每个日期的开始和结束日期。
- en: So, when we must select between these two functions, it’s not a matter of functionality
    but of requirements defined by the stakeholders of the new reports or the needed
    data analysis.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当我们必须在这两个函数之间进行选择时，这并不是功能问题，而是新报告的受益者或所需数据分析的需求定义的问题。
