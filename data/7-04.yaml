- en: Apollo and Design Choices of Video Large Multimodal Models (LMMs)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Apollo 和视频大型多模态模型（LMMs）的设计选择
- en: 原文：[https://towardsdatascience.com/apollo-and-design-choices-of-video-large-multimodal-models-lmms-0e672c618cf0/](https://towardsdatascience.com/apollo-and-design-choices-of-video-large-multimodal-models-lmms-0e672c618cf0/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/apollo-and-design-choices-of-video-large-multimodal-models-lmms-0e672c618cf0/](https://towardsdatascience.com/apollo-and-design-choices-of-video-large-multimodal-models-lmms-0e672c618cf0/)
- en: '![Image by Author - Flux.1 Schnell](../Images/5f566f2425a4c5c217992fdfb2a74e6b.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![作者提供的图像 - Flux.1 Schnell](../Images/5f566f2425a4c5c217992fdfb2a74e6b.png)'
- en: Image by Author – Flux.1 Schnell
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图像 - Flux.1 Schnell
- en: As we’ve been anticipating, models are becoming increasingly capable of understanding
    different types of inputs. We’ve seen image transformer models (see my blogs on
    [fine-tuning Flux](https://medium.com/@mgunton7/step-by-step-lets-fine-tune-flux-1-822f92c07c15)
    and the [research behind MM1](https://medium.com/towards-data-science/multimodal-large-language-models-apples-mm1-c1e94d87a161))
    and now we’re beginning to see video models hit the scene.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所期待的，模型越来越能够理解不同类型的输入。我们已经看到了图像 Transformer 模型（参见我关于[微调 Flux](https://medium.com/@mgunton7/step-by-step-lets-fine-tune-flux-1-822f92c07c15)和MM1背后的[研究](https://medium.com/towards-data-science/multimodal-large-language-models-apples-mm1-c1e94d87a161)的博客），现在我们开始看到视频模型出现在场景中。
- en: In December of 2024, Meta unveiled their new Apollo family of models. When they
    unveiled these, they also published a paper detailing their research and work
    around Large Multimodal Models (LMMs). The paper is full of great details, so
    rather than try to cover it all I’ll be focusing on the 4 major design choices
    they highlighted when making their model.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年12月，Meta 推出了其新的 Apollo 系列模型。当他们推出这些模型时，还发布了一篇论文，详细介绍了他们在大型多模态模型（LMMs）方面的研究和工作。这篇论文充满了许多精彩细节，因此，而不是试图涵盖所有内容，我将专注于他们在构建模型时强调的4个主要设计选择。
- en: Let’s dive in!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨！
- en: Background
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: Embedding
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 嵌入
- en: Let’s first layout some quick ideas that are important to understand what’s
    going on here. Every Transformer relies on embeddings for its input. However,
    user input is typically first converted from something user-understood (text,
    videos) to tokens and then embeddings. To convert to embeddings, we use an embedding
    model. For multi-modal inputs, we typically use a different encoder for each input
    type.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先列出一些快速想法，这些想法对于理解这里发生的事情很重要。每个 Transformer 都依赖于嵌入作为其输入。然而，用户输入通常首先从用户理解的内容（文本、视频）转换为标记，然后转换为嵌入。为了转换为嵌入，我们使用嵌入模型。对于多模态输入，我们通常为每种输入类型使用不同的编码器。
- en: '![Figure 1 from the paper](../Images/0d958b8dbaa7b7c4ef8e19c528575312.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的图 1](../Images/0d958b8dbaa7b7c4ef8e19c528575312.png)'
- en: Figure 1 from [the paper](https://arxiv.org/pdf/2412.10360)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 论文中的图 1 [链接](https://arxiv.org/pdf/2412.10360)
- en: While it’s easy to see how we can use this to set up an image encoder, it is
    not as straight forward to see how we should adapt this process for video.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们可以很容易地看到如何使用这种方法来设置图像编码器，但如何将这个过程适应视频则并不那么直接。
- en: We’ll see the authors explored how best to choose the encoder.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将看到作者探讨了如何最好地选择编码器。
- en: ApolloBench Dataset
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ApolloBench 数据集
- en: The authors began by doing an analysis of the existing video benchmarks. Benchmarks
    need to be analyzed so that we know high-scores on them actually correlate with
    better performance. The authors however found that some of these benchmarks can
    be gamed by having the model only understand part of the data fed in. For instance,
    if the model only understands one frame of the video, it shouldn’t score well
    – and yet it was able to do just that in a surprising number of benchmarks (shown
    by the red box and whiskers plot). The authors found that a significant portion
    can be answered solely relying on text and image understanding alone – making
    them more guides for video understanding. Moreover, when comparing different models
    on the benchmarks, they found that many of the models’ performances were clustered,
    resulting in a less useful benchmark.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 作者首先对现有的视频基准进行了分析。基准需要进行分析，这样我们才知道在这些基准上的高分实际上与更好的性能相关。然而，作者发现其中一些基准可以通过模型只理解输入数据的一部分来操纵。例如，如果模型只理解视频的一帧，那么它的得分应该不高——然而，在令人惊讶的许多基准测试中，它做到了这一点（如红色方框和须状图所示）。作者发现，很大一部分可以通过仅依靠文本和图像理解来回答——这使得它们成为视频理解的指南。此外，当在基准测试中比较不同模型时，他们发现许多模型的性能聚集在一起，导致基准测试不那么有用。
- en: '![Figure 2 from the paper](../Images/c363277ac92e1e682cb1e27fb4fff3c3.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的图 2](../Images/c363277ac92e1e682cb1e27fb4fff3c3.png)'
- en: Figure 2 from [the paper](https://arxiv.org/pdf/2412.10360)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图2来自[该论文](https://arxiv.org/pdf/2412.10360)
- en: 'Based on these findings, the authors decided to create a new benchmark that
    would more clearly test video understanding and distinguish model performance.
    The authors chose only multi-choice answers to avoid the need for additional analysis
    from outside models to finish answering questions. They removed all questions
    that were answered correctly by more than 50% of the models, as well as those
    that did not require any video understanding. With the remaining questions, the
    authors segmented them into 5 categories based off the skill they tested: Temporal
    OCR, Egocentric, Spatial, Perception, and Reasoning. From each categories only
    the top 400 questions that clearly drove different results between models were
    kept in the benchmark.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些发现，作者决定创建一个新的基准，以更清楚地测试视频理解和区分模型性能。作者只选择了多选题来避免需要从外部模型进行额外分析以完成回答问题。他们移除了那些被超过50%的模型正确回答的问题，以及那些不需要任何视频理解的问题。对于剩余的问题，作者根据他们测试的技能将它们分为5个类别：时间OCR、自我中心、空间、感知和推理。从每个类别中只保留了那些明显导致模型之间结果不同的前400个问题，这些问题被保留在基准中。
- en: We’ll see they used their new dataset to inform almost all of their design choices.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将看到他们使用他们新的数据集来指导几乎所有的设计选择。
- en: Video Sampling
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视频采样
- en: The first design choice we have is how much of the data to pull in. For an image,
    we only have 1 frame, so that frame should be processed. However for video, we
    are often running at 30 frames-per-second. While each frame is slightly different,
    they typically are not so radically different that missing one is an issue ([see
    the Phi Phenomenon as an example](https://en.wikipedia.org/wiki/Phi_phenomenon))
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们面临的第一项设计选择是抽取多少数据。对于图像，我们只有一个帧，所以该帧应该被处理。然而对于视频，我们通常以每秒30帧的速度运行。虽然每一帧略有不同，但它们通常并不那么极端不同，以至于缺少一帧就是一个问题（[以Phi现象为例](https://en.wikipedia.org/wiki/Phi_phenomenon)）
- en: Uniform Sampling vs Frames Per Second
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 均匀采样与每秒帧数
- en: In the paper, they compared Uniform Sampling and Frames-per-Second Sampling
    (FPS sampling). Uniform sampling means that we will be randomly taking a frame
    from the video. So let’s say we have a 10 second clip with 30 frames per second.
    If we want to do uniform sampling of size 5, we will randomly pick 5 of the 300
    possible frames and pass that through our embedder. While this guarantees that
    even for longer videos we will always have enough memory, there are a few notable
    distortions here that make this less desirable. Most importantly, by picking them
    randomly, we are losing the time element between the frames, potentially leading
    the model to have a false idea of how fast things happen. By comparison, sampling
    at a per-second basis will maintain the time information between frames, but it
    will require far more tokens to be sent through the model, thus being more expensive
    in terms of memory.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在论文中，他们比较了均匀采样和每秒帧数采样（FPS采样）。均匀采样意味着我们将从视频中随机抽取一帧。假设我们有一个10秒的剪辑，每秒30帧。如果我们想进行大小为5的均匀采样，我们将随机选择300个可能的帧中的5个，并通过我们的嵌入器传递。虽然这保证了即使对于更长的视频，我们也将始终有足够的内存，但这里有一些显著的扭曲，使得这种方法不太理想。最重要的是，通过随机选择，我们丢失了帧之间的时间元素，可能导致模型对事物发生速度有一个错误的看法。相比之下，基于每秒的采样将保持帧之间的时间信息，但需要通过模型发送更多的标记，因此在内存方面成本更高。
- en: Performance Comparison
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 性能比较
- en: To compare the sampling options, they trained five different models that were
    trained either with uniform sampling at a set rate (8, 16, 32, and 64) or FPS
    sampling. They then evaluated them during test time. The graph on the left shows
    when the models are tested based on their corresponding training method. As you
    can see, across all 5 categories in the ApolloBench dataset, FPS sampling did
    better (see Figure 4 Left).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了比较采样选项，他们训练了五个不同的模型，这些模型要么使用均匀采样在设定速率下（8、16、32和64）训练，要么使用每秒帧数（FPS）采样。然后他们在测试时间对这些模型进行了评估。左边的图表显示了模型是根据其相应的训练方法进行测试的。正如你所见，在ApolloBench数据集的所有5个类别中，FPS采样表现更好（见图4左侧）。
- en: '![Figure 4 (Left and Middle) from the paper](../Images/13f98aa30753ae5bf254bbad86b31765.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图4（左侧和中间）来自论文](../Images/13f98aa30753ae5bf254bbad86b31765.png)'
- en: Figure 4 (Left and Middle) from [the paper](https://arxiv.org/pdf/2412.10360)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图4（左侧和中间）来自[该论文](https://arxiv.org/pdf/2412.10360)
- en: To remove doubt that the training was the difference here, the authors also
    ran the experiment using frames-per-second inference sampling for all the models.
    We saw again that the FPS trained model performed best. Nevertheless, given the
    major improvement seen for the uniform sampling models (especially the ones with
    fewer frames sampled), it’s worth noting how powerful FPS sampling seems to be
    on its own.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了消除训练是这里差异的疑虑，作者们还使用每秒帧数推理采样对所有模型进行了实验。我们再次看到，每秒帧数训练的模型表现最好。尽管如此，鉴于均匀采样模型（尤其是采样帧数较少的模型）取得的重大改进，值得注意的是FPS采样似乎非常强大。
- en: Given the success of FPS sampling, the authors wanted to see how best to use
    the additional tokens it requires. The graph below shows the authors varying how
    many tokens are sent to the model from each frame via the token resampler (more
    on that below). The color in the graph shows the accuracy, the x-axis is the frames
    per second, y-axis is the tokens per second, and the number near the dotted red
    line shows the tokens per frame.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在FPS采样成功的基础上，作者们想看看如何最好地使用它所需的额外token。下面的图表显示了作者们通过token重采样器（下面会详细介绍）调整每个帧发送给模型的token数量。图表中的颜色表示准确率，x轴是每秒帧数，y轴是每秒token数，靠近虚线红线的数字表示每帧token数。
- en: '![Figure 4 (right) from the paper](../Images/6a56f7aed8518abaa9ba7c06a257dd1b.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图4（右）来自论文](../Images/6a56f7aed8518abaa9ba7c06a257dd1b.png)'
- en: Figure 4 (right) from [the paper](https://arxiv.org/pdf/2412.10360)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图4（右）来自[该论文](https://arxiv.org/pdf/2412.10360)
- en: The highest consistent accuracy seems to be found between 8 and 32 tokens per
    frame. The fact that we see less accuracy with higher and lower tokens per frame
    suggests a trade off happening here with more (or less) data to attend to. It’s
    also worth pointing out that the frames per second didn’t matter nearly as much
    as the tokens per second and tokens per frame. To me, this suggests that certain
    key moments need to be highly sampled, and as we cannot currently predict these
    moments, the best bet is to have multiple connections at play.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在每帧8到32个token之间似乎找到了最高的持续准确率。我们看到在每帧更高和更低的token数量下准确率较低，这表明这里发生了权衡，因为需要处理的数据更多（或更少）。还值得指出的是，每秒帧数并不像每秒token数和每帧token数那样重要。对我来说，这表明某些关键时刻需要高度采样，而我们目前无法预测这些时刻，因此最好的办法是让多个连接同时发挥作用。
- en: Video Representation
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视频表示
- en: Before we had talked about how we use a different encoder for different kinds
    of inputs. For text we may use something like [tiktoken](https://github.com/openai/tiktoken),
    while for more complex input the industry hasn’t coalesced behind one form yet.
    This means that when we’re looking to represent our video as a token, we should
    consider a number of different encoding strategies based on what has worked well
    for other modals (especially image).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前讨论了如何为不同类型的输入使用不同的编码器。对于文本，我们可能会使用类似[tiktoken](https://github.com/openai/tiktoken)的东西，而对于更复杂的输入，行业还没有统一采用一种形式。这意味着当我们试图将视频表示为token时，我们应该考虑基于其他模态（尤其是图像）中效果良好的多种编码策略。
- en: Image Encoders
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像编码器
- en: 'Image encoders typically come in two kinds: language-supervised and self-supervised
    encodings. The two are used the same way (image in, embedding out), but the training
    is different. For language-supervised encoding models (like CLIP), we have both
    an image and a descriptive text as inputs. We embed both separately and try to
    make the two embeddings similar. Moreover, with every image-text pair within a
    batch, we do our best to make the embeddings distinct from other image-text pair’s
    embeddings (this is the contrastive part of CLIP). On the other hand, self-supervised
    encodings only take in an image as an input for training. The model learns to
    create the right embedding by playing games like predicting the angle of a rotated
    image, or predicting the relative position of image patches (you’ve seen these
    in reCAPTCHAs). The goal here is to drive the model to learn useful parts of an
    image without labels.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图像编码器通常有两种类型：语言监督和自监督编码。两者使用方式相同（输入图像，输出嵌入），但训练方式不同。对于语言监督编码模型（如CLIP），我们有图像和描述性文本作为输入。我们分别嵌入两者并尝试使两个嵌入相似。此外，对于批次中的每个图像-文本对，我们尽力使嵌入与其他图像-文本对的嵌入不同（这是CLIP的对比部分）。另一方面，自监督编码只接受图像作为训练输入。模型通过玩游戏（如预测旋转图像的角度或预测图像块之间的相对位置）来学习创建正确的嵌入（你已经在reCAPTCHAs中见过这些）。这里的目的是驱使模型学习图像的有用部分，而不需要标签。
- en: '![Figure 1 from Learning Transferable Visual Models From Natural Language Supervision](../Images/7a577367404b137c6c7904244fe7fc2b.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![来自《从自然语言监督中学习可迁移的视觉模型》的图1](../Images/7a577367404b137c6c7904244fe7fc2b.png)'
- en: Figure 1 from [Learning Transferable Visual Models From Natural Language Supervision](https://arxiv.org/pdf/2103.00020.pdf)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图1来自[从自然语言监督中学习可迁移的视觉模型](https://arxiv.org/pdf/2103.00020.pdf)
- en: Video Encoders
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 视频编码器
- en: As video has both image and sound, encoding strategies here can be more complex
    than image. What many of the leading video encoders do is build off of the strategies
    from image, such as masking and language-supervision, to drive our video encoders
    to learn key features. Likewise, building off the contrastive loss we use in CLIP,
    we can use contrastive loss to get the embedder to align video and audio data
    together. Let’s go deeper into masking and contrastive loss strategies, explaining
    how they work through an example.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 由于视频同时包含图像和声音，这里的编码策略可能比图像更复杂。许多领先的视频编码器所做的是基于图像策略，例如掩码和语言监督，以驱动我们的视频编码器学习关键特征。同样，基于我们在CLIP中使用的对比损失，我们可以使用对比损失来使嵌入器将视频和音频数据对齐。让我们更深入地探讨掩码和对比损失策略，通过一个示例解释它们是如何工作的。
- en: For masking, imagine you have a video where a bear walks through the woods.
    We generally see people mask a few randomly chosen part of the video. This masked
    input is then processed by the embedder and the embedder’s goal is to correctly
    predict the token at the end. Once we see a satisfactory aggregate loss, we simply
    adjust our model at the end to output the final logits rather than the probabilities
    of the next token. We use these logits as the embeddings
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于掩码，想象你有一个熊穿过森林的视频。我们通常看到人们会随机选择视频的几个部分进行掩码。这个掩码输入随后被嵌入器处理，嵌入器的目标是正确预测最后的标记。一旦我们看到一个令人满意的聚合损失，我们只需在最后调整我们的模型以输出最终的logits而不是下一个标记的概率。我们将这些logits用作嵌入
- en: 'For multimodal contrastive loss, I’m going to explain this using an example.
    Let’s say we have 3 videos each with audio. We start off by embedding all of the
    videos with the video embedder and all the audio with the audio embedder. This
    gives us 3 pairs of embedding logits: (V1, A1), (V2, A2), (V3, A3). We now do
    cosine similarity on all 3 so we can teach the model to distinguish between all
    of the pairs. The goal is that our cosine similarity for the correct pair (V1,
    A1) is higher than for the wrong pairs (V1,A2) and (V1, A3). Once we do this enough,
    the model will learn how to generate similar embeddings for audio-video pairs.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于多模态对比损失，我将通过一个示例来解释这一点。假设我们有3个视频，每个视频都有音频。我们首先使用视频嵌入器嵌入所有视频，使用音频嵌入器嵌入所有音频。这给我们3对嵌入logits：(V1,
    A1), (V2, A2), (V3, A3)。我们现在对这3个进行余弦相似度计算，这样我们可以教会模型区分所有这些对。目标是我们的正确对(V1, A1)的余弦相似度高于错误对(V1,A2)和(V1,
    A3)。一旦我们这样做足够多，模型就会学会如何为音频-视频对生成相似的嵌入。
- en: '![Image by Author - Example calculation of Contrastive Loss](../Images/b5653c41c34b8c3ec1bed0bd1e0c0328.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供 – 对比损失的示例计算](../Images/b5653c41c34b8c3ec1bed0bd1e0c0328.png)'
- en: Image by Author – Example calculation of Contrastive Loss
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供 – 对比损失的示例计算
- en: Combining Image & Video Encoders
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像与视频编码器的结合
- en: At this point, you’re likely wondering why we discussed image encoders at all
    when there are video encoders out there. After testing a number of different video
    encoders, the authors found that they do not perform categorically better than
    image encoders on video data. While image encoders won’t have any time information
    explicit in their embeddings, they appear to provide higher-quality embeddings
    generally, allowing for better model performance.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可能想知道为什么我们讨论了图像编码器，因为已经有了视频编码器。在测试了多种不同的视频编码器后，作者发现它们在视频数据上并不比图像编码器有明显的优势。虽然图像编码器在其嵌入中不会包含任何时间信息，但它们似乎提供了更高质量的嵌入，从而允许更好的模型性能。
- en: The authors trained several models using different encoders (both video and
    image) and then compared their performance in the graph below. You can see that
    generally speaking the language-supervised models outperformed the self-supervised
    ones. Importantly, the best performing one, [SigLIP SO400M](https://huggingface.co/google/siglip-so400m-patch14-384),
    is an image embedder.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用不同的编码器（视频和图像）训练了几个模型，并在下面的图表中比较了它们的性能。你可以看到，总的来说，语言监督模型优于自监督模型。重要的是，表现最好的模型，[SigLIP
    SO400M](https://huggingface.co/google/siglip-so400m-patch14-384)，是一个图像嵌入器。
- en: '![Figure 5 (left) from the paper](../Images/e0e06c7a5e98a118fc87aca8d042e8a8.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的图5（左）](../Images/e0e06c7a5e98a118fc87aca8d042e8a8.png)'
- en: Figure 5 (left) from [the paper](https://arxiv.org/pdf/2412.10360)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 来自[该论文](https://arxiv.org/pdf/2412.10360)的图5（左）
- en: They then tested if accuracy would improve by pairing the encoders together.
    The hypothesis was that while image encoders have bad temporal understanding,
    they have good spatial. On the other hand, video encoders have good temporal understanding
    and bad spatial. The below graph shows performance for certain pairs of image
    encoders and video encoders. Interestingly, combining the best performing image
    encoder ([SigLIP SO400M](https://huggingface.co/google/siglip-so400m-patch14-384))
    with the best-performing video encoder ([InternVideo2](https://huggingface.co/collections/OpenGVLab/internvideo2-6618ccb574bd2f91410df5cd))
    did indeed raise accuracy above what each could do on their own (an increase of
    ~ 4%).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 他们随后测试了通过配对编码器来提高准确性的可能性。假设是，虽然图像编码器在时间理解方面表现不佳，但在空间理解方面表现良好。另一方面，视频编码器在时间理解方面表现良好，但在空间理解方面表现不佳。下面的图表显示了某些图像编码器和视频编码器对的性能。有趣的是，将表现最好的图像编码器([SigLIP
    SO400M](https://huggingface.co/google/siglip-so400m-patch14-384))与表现最好的视频编码器([InternVideo2](https://huggingface.co/collections/OpenGVLab/internvideo2-6618ccb574bd2f91410df5cd))结合起来，确实提高了准确性，超过了各自单独所能达到的水平（提高了约4%）。
- en: '![Figure 5 (right) from the paper— note the Y-axis is the same here as in Figure
    5 (left)](../Images/34ef2b416ddc4846c607d40bf5ea81f7.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的图5（右）—— 注意这里的Y轴与图5（左）相同](../Images/34ef2b416ddc4846c607d40bf5ea81f7.png)'
- en: Figure 5 (right) from [the paper](https://arxiv.org/pdf/2412.10360)— note the
    Y-axis is the same here as in Figure 5 (left)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 来自[该论文](https://arxiv.org/pdf/2412.10360)的图5（右）—— 注意这里的Y轴与图5（左）相同
- en: Video Token Sampling
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视频令牌采样
- en: Our video encodings output their embeddings in a lower dimension than our model’s
    hidden layer expects. The typical solution to this problem is to upsample so we
    project up 2–4x. Naturally, this added information is not as high-signal as our
    regular embeddings, so it is a place we can look to fix. One solution is resampling
    – where we combine multiple tokens into one. This was tried with image models
    and there was no degradation in performance. There are a number of different ways
    to combine the tokens (using QFormer, average pooling), but previous papers had
    found channel concatenation to be the best, so this is what the authors tested.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的视频编码输出其嵌入维度低于模型隐藏层预期的维度。解决这个问题的典型方法是通过上采样，我们将投影放大2-4倍。自然地，这个额外信息并不像我们的常规嵌入那样具有高信号，因此这是一个我们可以寻找来修复的地方。一个解决方案是重采样——我们将多个令牌组合成一个。这已经在图像模型中尝试过，并且没有降低性能。有几种不同的方法可以组合令牌（使用QFormer，平均池化），但之前的论文发现通道连接是最佳的，因此这是作者们所测试的。
- en: '![Figure 1 from "Perceiver: General Perception with Iterative Attention"](../Images/4869533004a6d23e3ac3ba6b3ec701ca.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![“Perceiver: 通过迭代注意力实现通用感知”中的图1](../Images/4869533004a6d23e3ac3ba6b3ec701ca.png)'
- en: 'Figure 1 from "[Perceiver: General Perception with Iterative Attention](https://arxiv.org/abs/2103.03206)"'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '来自"[Perceiver: 通过迭代注意力实现通用感知](https://arxiv.org/abs/2103.03206)"的图1'
- en: 'The authors tried 3 techniques: `mlp up-projection + average pooling`, `2D
    conv + average pooling`, and `perceiver resampling`. MLP up-projection is using
    multilayer perceptrons to handle our upscaling and then average pooling all of
    the now expanded tensors. 2D Convolution is using a convolution operation to combine
    the 2 tensors and then using average pooling from there to output the result.
    Finally, we have Perceiver resampling which uses the Perceiver architecture (shown
    above) to determine how best to combine the tokens.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 作者们尝试了3种技术：`mlp up-projection + average pooling`，`2D conv + average pooling`，和`perceiver
    resampling`。MLP上投影是使用多层感知器来处理我们的上采样，然后对所有现在扩展的张量进行平均池化。2D卷积是使用卷积操作来组合两个张量，然后从那里使用平均池化来输出结果。最后，我们有Perceiver重采样，它使用Perceiver架构（如上图所示）来确定如何最佳地组合令牌。
- en: As you can see from the below, using the Perceiver Resampler to combine tokens
    led to the greatest overall score.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如下所示，使用Perceiver重采样器来组合令牌导致了最高的整体得分。
- en: '![Table 1 from the paper](../Images/3747e9c31b8ff3466d316c27060b016e.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的表1](../Images/3747e9c31b8ff3466d316c27060b016e.png)'
- en: Table 1 from [the paper](https://arxiv.org/pdf/2412.10360)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 来自[该论文](https://arxiv.org/pdf/2412.10360)的表1
- en: Video Token Integration
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视频令牌集成
- en: As with other multimodal models, a critical design choice is how to combine
    different token types. Initially, these tokens were simply directly concatenated
    and sent through the model, however, recent work has been done to explicitly distinguish
    the two. This is done either with new special tokens or with text.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他多模态模型一样，一个关键的设计选择是如何结合不同的标记类型。最初，这些标记只是简单地直接连接并传递给模型，然而，最近的研究已经明确地区分了这两种类型。这是通过新的特殊标记或文本来实现的。
- en: The authors experimented with 4 different ways to separate. One had no distinction
    (`<vid_token>`), the other had 2 special tokens on either side of the vid_token
    (`<vid_start>...<vid_end>`). The last two used a timestamp to directly encode
    time information. They either put this time information right before the video
    token, or right before our first special token.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 作者尝试了4种不同的分离方式。一种没有任何区分（`<vid_token>`），另一种在vid_token的两侧各有2个特殊标记（`<vid_start>...<vid_end>`）。最后两种使用时间戳直接编码时间信息。他们要么在视频标记之前放置这些时间信息，要么在我们第一个特殊标记之前。
- en: Running these 4 methods through ApolloBench showed that the timestamp at the
    beginning with no special tokens was most effective. The theory was that by adding
    new vocabulary we were increasing the cognitive load of the model, requiring more
    training to learn these weights without a significant improvement. Meanwhile,
    by adding in timing information, we were using the original vocabulary and giving
    the model needed context.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 通过ApolloBench运行这4种方法表明，在开头没有特殊标记的时间戳最为有效。理论是，通过添加新词汇，我们增加了模型的认知负荷，需要更多的训练来学习这些权重，而没有显著的改进。同时，通过添加时间信息，我们使用了原始词汇，并为模型提供了所需上下文。
- en: '![Table 2 from the paper](../Images/3093ae8017f9532183ca4955ace6192b.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![Table 2 from the paper](../Images/3093ae8017f9532183ca4955ace6192b.png)'
- en: Table 2 from [the paper](https://arxiv.org/pdf/2412.10360)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '[论文中的Table 2](https://arxiv.org/pdf/2412.10360)'
- en: Conclusion
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: We’ve now gone through 4 of the critical design choices Meta made in their LMM.
    As the research here improves, it seems like the ideal encoder (or encoder pair)
    will unlock major performance gains. Today, we are broadly seeing models handle
    ever larger context lengths with more types of inputs. I would expect that once
    we have a powerful encoder for video, we would see an explosion in data that can
    then be used to train these models.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在已经了解了Meta在他们的LMM中做出的4个关键设计选择。随着这里的研究不断改进，似乎理想的编码器（或编码器对）将解锁重大的性能提升。今天，我们广泛地看到模型可以处理更大长度的上下文，并且有更多类型的输入。我预计一旦我们有一个强大的视频编码器，我们将看到可用于训练这些模型的数据爆炸式增长。
- en: '[With my MM1 blog](https://towardsdatascience.com/multimodal-large-language-models-apples-mm1-c1e94d87a161),
    I had said we were going to start seeing more multimodal models coming out. It’s
    been really cool to see not only has that come true, but that the encoder way
    of thinking has been applicable to multiple domains.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '[通过我的MM1博客](https://towardsdatascience.com/multimodal-large-language-models-apples-mm1-c1e94d87a161)，我曾提到我们将开始看到更多多模态模型的推出。看到这一点不仅成真，而且编码器思维方式适用于多个领域，这真的非常酷。'
- en: It’s an exciting time to be building!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是构建模型的一个激动人心的时刻！
