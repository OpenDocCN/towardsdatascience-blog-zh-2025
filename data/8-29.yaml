- en: In this article we’ll make an AI model that can solve a Rubik’s Cube. We’ll
    define our own dataset, make a transformer style model that can learn based on
    that dataset, and use that model to solve new and randomly shuffled Rubik’s Cubes.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将构建一个可以解决魔方的AI模型。我们将定义自己的数据集，创建一个基于该数据集学习的transformer风格模型，并使用该模型来解决新的和随机打乱的魔方。
- en: In tackling this problem we’ll discuss practical problems which come up frequently
    in data science, and the techniques data scientists use to solve those problems.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决这个问题的过程中，我们将讨论在数据科学中经常出现的一些实际问题，以及数据科学家用来解决这些问题的技术。
- en: '**Who is this useful for?** Anyone interested in achieving mastery of modern
    AI.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**这对谁有用？** 对希望掌握现代人工智能的任何人有用。'
- en: '**How advanced is this post?** This post covers advanced modeling strategies
    intuitively, and is appropriate for readers of all levels.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**这篇文章有多高级？** 本文直观地介绍了高级建模策略，适合所有水平的读者。'
- en: '**Pre-requisites:** There are no prerequisites for this article, though an
    understanding of transformer style models may be useful for some of the later,
    code heavy sections.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**先决条件：** 本文没有先决条件，尽管对transformer风格模型的理解可能对一些较后的、代码密集的部分有所帮助。'
- en: '**References:** A link to the code and supporting resources can be found in
    the reference section at the end of this article.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考文献：** 在本文末尾的参考文献部分可以找到代码和相关资源的链接。'
- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Defining a Rubik’s Cube as a Modeling Problem
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将魔方定义为建模问题
- en: As you likely know, the Rubik’s Cube is a geometric game featuring a 3x3x3 cube
    with different colored segments on each face. These faces can be turned by 90
    degrees in either direction to scramble or solve the Rubik’s Cube.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所知，魔方是一种几何游戏，它有一个3x3x3的立方体，每个面都有不同颜色的部分。这些面可以旋转90度，无论是顺时针还是逆时针，都可以打乱或解决魔方。
- en: '![The goal of solving a Rubik''s Cube is to make all faces a single uniform
    color by performing a series of rotations. The process of mixing up a Rubik''s
    Cube by randomly rotating various faces is called "Scrambling".](../Images/85f4b01499e1561be5adec7541a004f2.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![解决魔方的目标是通过对一系列旋转进行操作，使所有面都变成单一均匀的颜色。通过随机旋转各个面来打乱魔方的过程称为“打乱”。](../Images/85f4b01499e1561be5adec7541a004f2.png)'
- en: The goal of solving a Rubik’s Cube is to make all faces a single uniform color
    by performing a series of rotations. The process of mixing up a Rubik’s Cube by
    randomly rotating various faces is called "Scrambling".
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 解决魔方的目标是通过对一系列旋转进行操作，使所有面都变成单一均匀的颜色。通过随机旋转各个面来打乱魔方的过程称为“打乱”。
- en: The goal of this article is to create a model which can accept a scrambled Rubik’s
    Cube and output a series of steps to solve said Rubik’s Cube.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的目标是创建一个模型，它可以接受一个打乱的魔方，并输出一系列步骤来解决这个魔方。
- en: '![The Goal of the AI Model: to accept some shuffled Rubik''s Cube and output
    a list of steps to solve that Rubik''s Cube.](../Images/1800c7ff59a8fbd8f2ff2a0bace1a284.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![人工智能模型的目标：接受一些打乱的魔方，并输出一系列步骤来解决该魔方。](../Images/1800c7ff59a8fbd8f2ff2a0bace1a284.png)'
- en: 'The Goal of the AI Model: to accept some shuffled Rubik’s Cube and output a
    list of steps to solve that Rubik’s Cube.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能模型的目标：接受一些打乱的魔方，并输出一系列步骤来解决该魔方。
- en: 'There are a ton of ways this can be done. In this article we’ll be exploring
    one of the more straightforward approaches: supervised learning.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多种方法可以实现这一点。在这篇文章中，我们将探讨其中一种更直接的方法：监督学习。
- en: The Plan, From a High Level
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高层次的计划
- en: A natural approach to making an AI model that solves Rubik’s Cubes might be
    to gather data from solutions of skilled players, then train a model to mimic
    those solutions. While using human data to train a model has its merits, it also
    has its drawbacks. Finding and licensing data from pro Rubik’s Cube players might
    be difficult if not impossible and hiring pro Rubik’s Cube players to create a
    custom dataset would be costly and time consuming. If you’re clever, all this
    work might be unnecessary. In this article, for instance, we’ll be using a completely
    synthetic dataset, meaning we’ll be generating all our training data automatically,
    and not using any data from human players.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 制作一个能解决魔方的AI模型的一种自然方法可能是从高手的解决方案中收集数据，然后训练一个模型来模仿这些解决方案。虽然使用人类数据来训练模型有其优点，但也有其缺点。寻找和许可专业魔方选手的数据可能很困难，甚至不可能，雇佣专业魔方选手来创建定制数据集将耗费大量成本和时间。如果你足够聪明，所有这些工作可能都是不必要的。例如，在这篇文章中，我们将使用一个完全合成的数据集，这意味着我们将自动生成所有训练数据，而不使用任何来自人类玩家的数据。
- en: Essentially, we’ll frame the task of solving a Rubik’s Cube as trying to predict
    the reverse of the sequence that was used to scramble it. The idea is to randomly
    scramble millions of Rubik’s Cubes, reverse the sequence used to scramble them,
    then create a model which is tasked with predicting the reversed scrambling sequence.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 实质上，我们将解决魔方的任务表述为尝试预测用于打乱魔方的序列的反向。想法是随机打乱数百万个魔方，反转用于打乱它们的序列，然后创建一个模型，其任务是预测反转的打乱序列。
- en: '![To create our dataset we''ll come up with random moves to scramble our Rubik''s
    Cube. The model''s job will be to predict the reverse order and orientation of
    that scrambling sequence, which will solve the Rubik''s Cube.](../Images/f8f0e0f88354a35bb47ebf8cfd9b93ee.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![为了创建我们的数据集，我们将想出随机移动来打乱我们的魔方。模型的任务将是预测打乱序列的反向和方向，这将解决魔方。](../Images/f8f0e0f88354a35bb47ebf8cfd9b93ee.png)'
- en: To create our dataset we’ll come up with random moves to scramble our Rubik’s
    Cube. The model’s job will be to predict the reverse order and orientation of
    that scrambling sequence, which will solve the Rubik’s Cube.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建我们的数据集，我们将想出随机移动来打乱我们的魔方。模型的任务将是预测打乱序列的反向和方向，这将解决魔方。
- en: This strategy falls under "Supervised Learning", which is the prototypical approach
    to training an AI model. When training a model with supervised learning you essentially
    say to the model "here’s an input (a scrambled Rubik’s Cube), predict an output
    (a list of steps), and I’ll train you based on how well your response aligns with
    what I expected (the reverse of the scrambling sequence)".
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略属于“监督学习”，这是训练人工智能模型的典型方法。在使用监督学习训练模型时，你本质上是在告诉模型“这里有一个输入（一个打乱的魔方），预测一个输出（一系列步骤），然后我会根据你的回答与我预期的匹配程度（即打乱序列的反向）来训练你”。
- en: There are other forms of learning, like contrastive learning, semi-supervised
    learning, and reinforcement learning, but in this article we’ll stick with the
    basics. If you’re curious about some of those approaches, I provided some links
    in the reference section at the end of the article.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 还有其他形式的学习，如对比学习、半监督学习和强化学习，但在这篇文章中，我们将坚持基本原理。如果你对其中的一些方法感兴趣，我在文章末尾的参考文献部分提供了一些链接。
- en: 'So, we have a high-level plan: shuffle a bunch of Rubik’s Cubes and train a
    model to predict the opposite of the sequence used to scramble them. Before we
    get into the intricacies of defining a custom Transformer style model to work
    with this data, let’s review the idea of transformer style models in general.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有一个高层次的计划：打乱一堆魔方，并训练一个模型来预测用于打乱它们的序列的反向。在我们深入定义一个定制的Transformer风格模型来处理这些数据之前，让我们先回顾一下Transformer风格模型的一般概念。
- en: A Brief Introduction to the Transformer
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Transformer的简要介绍
- en: 'This section will briefly review transformer style models. This is, essentially,
    a condensed version of my more comprehensive article on the subject:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将简要回顾Transformer风格的模型。这基本上是我关于该主题更全面文章的浓缩版：
- en: '[**Transformers – Intuitively and Exhaustively Explained**](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Transformer – 直观且全面解释**](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)'
- en: In its most basic sense, the transformer is an encoder-decoder style model.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在其最基本的意义上，Transformer是一个编码器-解码器风格的模型。
- en: '![A transformer working in a translation task. The input (I am a manager) is
    compressed to some abstract representation that encodes the meaning of the entire
    input. The decoder works recurrently, by feeding into itself, to construct the
    output. From my article on transformers](../Images/5c2aa9e0f8a0e21ecda31c0c73751cdf.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![在翻译任务中工作的Transformer。输入（我是经理）被压缩成一个抽象表示，该表示编码了整个输入的意义。解码器通过自我反馈的方式递归工作，以构建输出。来自我的关于Transformer的文章](../Images/5c2aa9e0f8a0e21ecda31c0c73751cdf.png)'
- en: A transformer working in a translation task. The input (I am a manager) is compressed
    to some abstract representation that encodes the meaning of the entire input.
    The decoder works recurrently, by feeding into itself, to construct the output.
    From [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在翻译任务中工作的Transformer。输入（我是经理）被压缩成一个抽象表示，该表示编码了整个输入的意义。解码器通过自我反馈的方式递归工作，以构建输出。来自[我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
- en: The encoder converts an input into an abstract representation which the decoder
    uses to iteratively generate output.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器将输入转换为一个抽象表示，解码器使用这个表示来迭代生成输出。
- en: '![A high-level representation of how the output of the encoder relates to the
    decoder. the decoder references the encoded input for every loop of the output.
    The decoder generates the entire sequence by taking it''s previous outputs as
    input, and predicting what token it thinks should come next. From my article on
    transformers](../Images/70b0366c1a3b4aedc2003f05ca60c4a2.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![编码器输出与解码器之间的高层次关系表示。解码器在输出过程中的每一轮都引用编码后的输入。解码器通过将之前的输出作为输入，并预测它认为应该出现的下一个标记来生成整个序列。来自我的关于Transformer的文章](../Images/70b0366c1a3b4aedc2003f05ca60c4a2.png)'
- en: A high-level representation of how the output of the encoder relates to the
    decoder. the decoder references the encoded input for every loop of the output.
    The decoder generates the entire sequence by taking it’s previous outputs as input,
    and predicting what token it thinks should come next. From [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器输出与解码器之间的高层次关系表示。解码器在输出过程中的每一轮都引用编码后的输入。解码器通过将之前的输出作为输入，并预测它认为应该出现的下一个标记来生成整个序列。来自[我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
- en: both the encoder and decoder employ an abstract representation of text which
    is created using an operation called multi-headed self-attention.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器和解码器都使用一个由称为多头自注意力操作创建的文本的抽象表示。
- en: '![Multi Headed self attention, in a nutshell. The mechanism mathematically
    combines the vectors for different words, creating a matrix which encodes a deeper
    meaning of the entire input. From my article on transformers](../Images/fe58456a82561835b794a84cefb2f37f.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![多头自注意力，简而言之。该机制从数学上结合不同单词的向量，创建一个矩阵，该矩阵编码了整个输入的更深层次意义。来自我的关于Transformer的文章](../Images/fe58456a82561835b794a84cefb2f37f.png)'
- en: Multi Headed self attention, in a nutshell. The mechanism mathematically combines
    the vectors for different words, creating a matrix which encodes a deeper meaning
    of the entire input. From [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 多头自注意力，简而言之。该机制从数学上结合不同单词的向量，创建一个矩阵，该矩阵编码了整个输入的更深层次意义。来自[我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
- en: There’s a few steps which multiheaded self attention employs to construct this
    abstract representation. In a nutshell, a dense neural network constructs three
    representations, usually referred to as the query, key, and value, based on the
    input.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 多头自注意力机制在构建这种抽象表示时采用了几个步骤。简而言之，一个密集神经网络基于输入构建三个表示，通常被称为查询、键和值。
- en: '![Turning the input into the query, key, and value. The query, key, and value
    all have the same dimensions as the input, and can be thought of as several different
    representations of the input. From my article on transformers](../Images/c3e58d781b3b14ae4af9b7257215cec4.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![将输入转换为查询、键和值。查询、键和值都与输入具有相同的维度，可以将其视为输入的几种不同表示。来自我的关于Transformer的文章](../Images/c3e58d781b3b14ae4af9b7257215cec4.png)'
- en: Turning the input into the query, key, and value. The query, key, and value
    all have the same dimensions as the input, and can be thought of as several different
    representations of the input. From [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 将输入转换为查询、键和值。查询、键和值都与输入具有相同的维度，可以将其视为输入的几种不同表示。[关于我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
- en: The query and key are multiplied together. Thus, some representation of every
    word is combined with a representation of every other word.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 查询和键相乘。因此，每个词的某种表示与每个其他词的表示相结合。
- en: '![Calculating the attention matrix with the query and key. The attention matrix
    is then used, in combination with the value, to generate the final output of the
    attention mechanism. From my article on transformers](../Images/801b1d7c0b435cf36db1dca47d6ef62a.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![使用查询和键计算注意力矩阵。然后，结合值使用注意力矩阵生成注意力机制的最终输出。来自我的关于Transformer的文章](../Images/801b1d7c0b435cf36db1dca47d6ef62a.png)'
- en: Calculating the attention matrix with the query and key. The attention matrix
    is then used, in combination with the value, to generate the final output of the
    attention mechanism. From [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 使用查询和键计算注意力矩阵。然后，结合值使用注意力矩阵生成注意力机制的最终输出。[来自我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
- en: The value is then multiplied by this abstract combination of the query and key,
    constructing the final output of multi headed self-attention.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，将值乘以查询和键的这种抽象组合，构建多头自注意力的最终输出。
- en: '![The attention matrix (which is the matrix multiplication of the query and
    key) multiplied by the value matrix to yield the final result of the attention
    mechanism. Because of the shape of the attention matrix, the result is the same
    shape as the value matrix. Note, I''m skipping some very important steps. From
    my article on transformers](../Images/2d26042083e441b7df363dcf4b166879.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![注意力矩阵（即查询和键的矩阵乘积）乘以值矩阵以产生注意力机制的最终结果。由于注意力矩阵的形状，结果与值矩阵具有相同的形状。注意，我跳过了一些非常关键的步骤。来自我的关于Transformer的文章](../Images/2d26042083e441b7df363dcf4b166879.png)'
- en: The attention matrix (which is the matrix multiplication of the query and key)
    multiplied by the value matrix to yield the final result of the attention mechanism.
    Because of the shape of the attention matrix, the result is the same shape as
    the value matrix. Note, I’m skipping some very important steps. From [my article
    on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力矩阵（即查询和键的矩阵乘积）乘以值矩阵以产生注意力机制的最终结果。由于注意力矩阵的形状，结果与值矩阵具有相同的形状。注意，我跳过了一些非常关键的步骤。[关于我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
- en: The encoder uses multi-headed self attention to create abstract representations
    of the input, and the decoder uses multi-headed self attention to create abstract
    representations of the output.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器使用多头自注意力来创建输入的抽象表示，解码器使用多头自注意力来创建输出的抽象表示。
- en: '![The Transformer Architecture, with the encoder on the left and the decoder
    on the right. image source](../Images/31dc1ebdff8bf2885e8114d066d26c00.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![Transformer架构，左侧是编码器，右侧是解码器。图片来源](../Images/31dc1ebdff8bf2885e8114d066d26c00.png)'
- en: The Transformer Architecture, with the encoder on the left and the decoder on
    the right. image [source](https://arxiv.org/pdf/1706.03762v2.pdf)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer架构，左侧是编码器，右侧是解码器。[图片来源](https://arxiv.org/pdf/1706.03762v2.pdf)
- en: '![Recall that this is what the transformer is doing, in essence.](../Images/aa62f00be26a0f7751b1dbaaf63217ba.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![回想一下，本质上这是Transformer所做的事情。](../Images/aa62f00be26a0f7751b1dbaaf63217ba.png)'
- en: Recall that this is what the transformer is doing, in essence.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，本质上这是Transformer所做的事情。
- en: That was a super quick rundown on transformers. I tried to cover the high points
    without getting too in the weeds, feel free to refer to my [article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
    for more information.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是对变压器的快速概述。我试图涵盖要点，而不深入细节，如果您想了解更多信息，请随时参考我的[关于变压器的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)。
- en: While the original transformer was created for English to French translation,
    in an abstract way the process of solving a Rubik’s Cube is somewhat similar.
    We have some input (a shuffled Rubik’s Cube, vs a French sentence), and we need
    to predict some sequence based on that input (a sequence of moves, vs a sequence
    of English words).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然最初的变压器是为了英语到法语翻译而创建的，但从抽象意义上讲，解决魔方的过程与这个过程有些相似。我们有一些输入（一个打乱的魔方，与一个法语句子），我们需要根据这个输入预测一些序列（一系列移动，与一系列英语单词）。
- en: '![The transformer was originally designed for English to French translation
    (left), we''re using it to solve a Rubik''s Cube (right).](../Images/fed110652c50a299f7a6bdc441952d2d.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![变压器最初是为英语到法语翻译设计的（左），我们现在用它来解决魔方（右）。](../Images/fed110652c50a299f7a6bdc441952d2d.png)'
- en: The transformer was originally designed for English to French translation (left),
    we’re using it to solve a Rubik’s Cube (right).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器最初是为英语到法语翻译设计的（左），我们现在用它来解决魔方（右）。
- en: We don’t need to make any changes to the fundamental structure of the transformer
    to get it to solve a Rubik’s Cube. All we have to do is properly format the Rubik’s
    Cube and moves into a representation the transformer can understand. We’ll cover
    that in the following sections.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要对变压器的根本结构进行任何修改，就可以让它解决魔方。我们只需要将魔方和移动正确地格式化为变压器可以理解的形式。我们将在接下来的章节中介绍这一点。
- en: Defining The Cube and Moves
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义魔方和移动
- en: Originally, I thought to define the Rubik’s Cube as a 3x3x3 matrix of segments,
    each of which has some number of faces which have some color.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，我认为将魔方定义为3x3x3矩阵的段，每个段都有一些面，这些面都有一些颜色。
- en: '![The Rubik''s Cube can be thought of as a data structure. The Cube itself
    consisting of segments, each of which has some number of colored stickers.](../Images/ac19b824b13d7d3339af1ca8711c2a9b.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![魔方可以被视为一种数据结构。魔方本身由段组成，每个段都有一些带有颜色的贴纸。](../Images/ac19b824b13d7d3339af1ca8711c2a9b.png)'
- en: The Rubik’s Cube can be thought of as a data structure. The Cube itself consisting
    of segments, each of which has some number of colored stickers.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 魔方可以被视为一种数据结构。魔方本身由段组成，每个段都有一些带有颜色的贴纸。
- en: 'This is totally possible, but I’m a data scientist and my 3D spatial programming
    hasn’t seen the light of day in a hot minute. After some reflection, I decided
    on a creative and perhaps more elegant approach: representing the Rubik’s Cube
    as a 5x5x5 tensor, rather than a 3x3x3 cube of segments.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这完全可能，但我是数据科学家，我的3D空间编程已经有一段时间没有见到阳光了。经过一番思考，我决定采用一种创造性和可能更优雅的方法：将魔方表示为一个5x5x5张量，而不是3x3x3段的立方体。
- en: '![Representing a Rubik''s Cube as a 5x5x5 tensor, rather than a 3x3x3 cube
    of segments. Essentially, we''re keeping track of the location of all of the stickers
    as they float through empty space. Note, the tensor on the right doesn''t represent
    the same Rubik''s Cube as the one on the left, so don''t go pulling your hair
    out trying to reconcile the two.](../Images/ccd51a493c33323ae7e53564e35c18e6.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![将魔方表示为一个5x5x5张量，而不是3x3x3段的立方体。本质上，我们正在跟踪所有贴纸在空中的位置。注意，右边的张量并不代表与左边相同的魔方，所以不要试图调和这两个张量。](../Images/ccd51a493c33323ae7e53564e35c18e6.png)'
- en: Representing a Rubik’s Cube as a 5x5x5 tensor, rather than a 3x3x3 cube of segments.
    Essentially, we’re keeping track of the location of all of the stickers as they
    float through empty space. Note, the tensor on the right doesn’t represent the
    same Rubik’s Cube as the one on the left, so don’t go pulling your hair out trying
    to reconcile the two.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 将魔方表示为一个5x5x5张量，而不是3x3x3段的立方体。本质上，我们正在跟踪所有贴纸在空中的位置。注意，右边的张量并不代表与左边相同的魔方，所以不要试图调和这两个张量。
- en: The essential idea is that we, technically speaking, don’t really care about
    the cube. Rather, we care about the stickers and where they are relative to each
    other. So, instead of having a 3x3x3 data structure consisting of complicated
    segments that have to obey complicated rules, we can simply put that cube within
    a 5x5x5 grid and keep track of where the sticker colors are within this space.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 核心思想是，从技术角度讲，我们实际上并不关心立方体。相反，我们关心的是贴纸以及它们相对于彼此的位置。因此，我们不需要一个由复杂段组成、必须遵守复杂规则的3x3x3数据结构，我们只需将这个立方体放入一个5x5x5网格中，并跟踪贴纸颜色在这个空间中的位置。
- en: When we rotate a "face", we simply need to rotate all the spaces in the 5x5x5
    grid which correspond to the stickers that would be on that face and corresponding
    edges.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们旋转一个“面”时，我们只需要旋转5x5x5网格中对应于该面上贴纸以及相应边缘的所有空间。
- en: '![Rotating a face, in our 5x5x5 tensor, means we just have to swap some values
    around. This might require a bit of head scratching, but it''s way easier than
    actually defining a Rubik''s Cube as a bunch of tiny segments, then getting them
    to play nicely with one another.](../Images/81c4787fd7de007fd81afb7ec848e195.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![在我们的5x5x5张量中旋转一个面，意味着我们只需要交换一些值。这可能需要一点思考，但比实际定义一个魔方作为许多小段，然后让它们彼此友好地互动要容易得多。](../Images/81c4787fd7de007fd81afb7ec848e195.png)'
- en: Rotating a face, in our 5x5x5 tensor, means we just have to swap some values
    around. This might require a bit of head scratching, but it’s way easier than
    actually defining a Rubik’s Cube as a bunch of tiny segments, then getting them
    to play nicely with one another.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的5x5x5张量中旋转一个面，意味着我们只需要交换一些值。这可能需要一点思考，但比实际定义一个魔方作为许多小段，然后让它们彼此友好地互动要容易得多。
- en: There’s 12 fundamental rotations one can apply to a Rubik’s Cube. We can rotate
    the front, back, top, bottom, left, and right face (6 faces) and we can rotate
    each of those 90 degrees clockwise or counterclockwise.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 一个魔方可以应用12个基本旋转。我们可以旋转前、后、上、下、左和右面（6个面），并且我们可以顺时针或逆时针旋转每个面90度。
- en: When we scramble a cube we apply some number of these rotations, and then to
    solve the Rubik’s Cube one can simply reverse the order and direction of the moves.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们打乱一个立方体时，我们应用了一些这些旋转，然后要解决魔方，一个人可以简单地反转移动的顺序和方向。
- en: 'Here’s a class that defines a Rubik’s Cube and it’s moves, as well as a neat
    little visualization:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个定义魔方及其移动以及一个简洁的可视化类的例子：
- en: '[PRE0]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![Creating a Cube, rotating a face, and rendering a visualization of that cube.
    You can imagine View 1 being the main view, and View 2 being the view you might
    get from flipping the Rubik''s Cube over and looking at the opposite corner. They
    both, together, represent a single Rubik''s Cube.](../Images/113e79e933ff8f61fd54cb3200143d33.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![创建一个立方体，旋转一个面，并渲染该立方体的可视化。你可以想象视图1是主视图，视图2是从翻转魔方并查看对角线另一端得到的视图。它们共同代表一个单一的魔方。](../Images/113e79e933ff8f61fd54cb3200143d33.png)'
- en: Creating a Cube, rotating a face, and rendering a visualization of that cube.
    You can imagine View 1 being the main view, and View 2 being the view you might
    get from flipping the Rubik’s Cube over and looking at the opposite corner. They
    both, together, represent a single Rubik’s Cube.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个立方体，旋转一个面，并渲染该立方体的可视化。你可以想象视图1是主视图，视图2是从翻转魔方并查看对角线另一端得到的视图。它们共同代表一个单一的魔方。
- en: We can scramble our Rubik’s Cube by simply performing a few random moves.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过简单地执行几个随机移动来打乱我们的魔方。
- en: '[PRE1]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![An example of a shuffled Rubik''s Cube](../Images/5e3f79a673073fd89f5c27db1161eb0c.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![一个打乱顺序的魔方示例](../Images/5e3f79a673073fd89f5c27db1161eb0c.png)'
- en: An example of a shuffled Rubik’s Cube
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 一个打乱顺序的魔方示例
- en: And, to solve that Rubik’s Cube we can simply reverse the order of the moves,
    and reverse the direction in which they rotate.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，为了解决这个魔方，我们可以简单地反转移动的顺序，并反转它们的旋转方向。
- en: '[PRE2]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![The result of un-scrambling the Rubik''s Cube by reversing the order and
    direction of the moves](../Images/da3f57bc9e765d69e597ae45690ca1df.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![通过反转移动的顺序和方向来解乱魔方的结果](../Images/da3f57bc9e765d69e597ae45690ca1df.png)'
- en: The result of un-scrambling the Rubik’s Cube by reversing the order and direction
    of the moves
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 通过反转移动的顺序和方向来解乱魔方的结果
- en: Using this code, we can generate a synthetic dataset consisting of shuffled
    Rubik’s Cubes and their solutions.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此代码，我们可以生成一个由打乱顺序的魔方及其解决方案组成的合成数据集。
- en: '[PRE3]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In this code, `X` is the thing we’ll be passing into the model (the shuffled
    Rubik’s Cube) and `y` will be the thing we try to predict (the sequence of operations
    to solve it).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在这段代码中，`X`是我们将传递到模型中的东西（打乱后的魔方），而`y`将是我们要尝试预测的东西（解决它的操作序列）。
- en: '![In data science, it''s common to label the input to the model as X and the
    desired output as y. Our dataset consists of two million examples of shuffled
    Rubik''s Cubes (X), and their corresponding solutions (y)](../Images/6dc3327f4c26934f2bf3289e38a3feab.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![在数据科学中，通常将模型的输入标记为X，将期望的输出标记为y。我们的数据集包含两百万个打乱后的魔方示例（X）及其相应的解决方案（y）](../Images/6dc3327f4c26934f2bf3289e38a3feab.png)'
- en: In data science, it’s common to label the input to the model as X and the desired
    output as y. Our dataset consists of two million examples of shuffled Rubik’s
    Cubes (X), and their corresponding solutions (y)
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学中，通常将模型的输入标记为X，将期望的输出标记为y。我们的数据集包含两百万个打乱后的魔方示例（X）及其相应的解决方案（y）
- en: 'I’m using two helper functions, `tokenize` and `move_to_output_index` , to
    help me turn the Rubik’s Cube and list of moves into a more friendly representation
    for modeling. I don’t think it’s necessary to go over the implementation (feel
    free to [refer to the code](https://github.com/DanielWarfield1/MLWritingAndResearch/blob/main/RubiksCubeAI.ipynb)),
    but from a high level:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用了两个辅助函数，`tokenize`和`move_to_output_index`，来帮助我将魔方和移动列表转换成更适合建模的表示形式。我认为没有必要详细说明实现过程（请随意[参考代码](https://github.com/DanielWarfield1/MLWritingAndResearch/blob/main/RubiksCubeAI.ipynb))，但从高层次上讲：
- en: the `tokenize` function accepts a 5x5x5 tensor consisting of sticker colors
    and empty spaces and outputs a 54×4 tensor. This 54×4 tensor has a vector for
    all 54 stickers in the Rubik’s Cube where each vector contains the `(color, x
    position, y position, z position)` of a particular sticker. It ignores all the
    empty spaces in the 5x5x5 tensor.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tokenize`函数接受一个由贴纸颜色和空格组成的5x5x5张量，并输出一个54×4张量。这个54×4张量包含魔方中所有54个贴纸的向量，每个向量包含特定贴纸的`(颜色,
    x位置, y位置, z位置)`。它忽略了5x5x5张量中的所有空格。'
- en: The `move_to_output_index` function simply turns a move, like `(top, clockwise)`
    into a number. All 12 moves are assigned a unique number. The reason we add the
    number 3 in the code will become apparent when we discuss the input and output
    of the decoder portion of the transformer model.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`move_to_output_index`函数简单地将一个移动，如`(顶部，顺时针)`转换为一个数字。所有12种移动都被分配了一个唯一的数字。我们在代码中添加数字3的原因将在我们讨论transformer模型解码器部分的输入和输出时变得明显。'
- en: So, the input to the transformer is a list of 54 vectors consisting of `(color,
    x position, y position, z position)` , and the output of the transformer is a
    list of numbers where each number correspond to one of 12 moves.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，transformer的输入是一个包含54个向量的列表，这些向量由`(颜色, x位置, y位置, z位置)`组成，而transformer的输出是一个数字列表，每个数字对应于12种移动中的一种。
- en: '![After reformatting, a single X/y pair looks like this.](../Images/bbef469b84a75f69295346af11867e46.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![重新格式化后，单个X/y对看起来像这样。](../Images/bbef469b84a75f69295346af11867e46.png)'
- en: After reformatting, a single X/y pair looks like this.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 重新格式化后，单个X/y对看起来像这样。
- en: This slight re-formatting of the data has little conceptual impact but will
    be practically handy when we apply a model to this data.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这种数据格式的小幅调整在概念上影响不大，但在我们将模型应用于这些数据时将非常有用。
- en: Now that we’ve constructed our dataset of shuffled Rubik’s Cubes and sequences
    of moves to solve them, we can work towards feeding that data into a transformer.
    This is done through a process called embedding.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经构建了我们的打乱后的魔方和解决它们的移动序列的数据集，我们可以着手将这些数据输入到transformer中。这是通过一个称为嵌入的过程来完成的。
- en: Embedding
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 嵌入
- en: When creating a transformer in a natural language context you first create a
    vocabulary consisting of the words (or pieces of words) that your model will understand.
    Then, you turn all the words in the model’s vocabulary into a vector. When the
    model receives an input sequence of words, it can "think" about the sequence by
    doing math with the vectors that represent the words.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在自然语言环境中创建transformer时，你首先创建一个词汇表，其中包含模型将理解的单词（或单词片段）。然后，将模型词汇表中的所有单词转换为向量。当模型接收到一个单词输入序列时，它可以通过对代表单词的向量进行数学运算来“思考”这个序列。
- en: '![The job of a word to vector embedder: turn words into numbers so that a language
    model can reason about them. From my article on transformers.](../Images/ce59383c517195d34b4c915a15b34948.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![单词到向量嵌入器的工作：将单词转换为数字，以便语言模型可以对其进行推理。来自我的关于transformer的文章。](../Images/ce59383c517195d34b4c915a15b34948.png)'
- en: 'The job of a word to vector embedder: turn words into numbers so that a language
    model can reason about them. From [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb).'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 单词到向量嵌入器的工作：将单词转换为数字，以便语言模型可以对其进行分析。[我的关于变换器的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)。
- en: We can do something similar to our Rubik’s Cube, we can think of the "vocabulary"
    of our Rubik’s Cube as six tokens, one for each colored sticker. Then we can assign
    each of those colors some random vector that represents it.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对魔方做类似的事情，我们可以将魔方的“词汇”视为六个标记，每个标记对应一个彩色贴纸。然后我们可以为这些颜色中的每一个分配一个代表它的随机向量。
- en: '![We can assign each of the colors of a Rubik''s Cube some random vector of
    numbers. These vectors will be used to allow our models to reason about stickers
    and how they relate to one another. Initially the values in these vectors will
    be defined randomly, but they''ll be updated based on the model''s needs through
    the training process, allowing the model to come up with its own representations
    of the colors.](../Images/9c20e84cb1b6e5c36f542112c562d9ea.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![我们可以为魔方的每种颜色分配一些随机的数字向量。这些向量将用于让我们的模型推理贴纸以及它们之间的关系。最初，这些向量中的值将随机定义，但它们将通过训练过程根据模型的需求进行更新，从而使模型能够提出自己关于颜色的表示。](../Images/9c20e84cb1b6e5c36f542112c562d9ea.png)'
- en: We can assign each of the colors of a Rubik’s Cube some random vector of numbers.
    These vectors will be used to allow our models to reason about stickers and how
    they relate to one another. Initially the values in these vectors will be defined
    randomly, but they’ll be updated based on the model’s needs through the training
    process, allowing the model to come up with its own representations of the colors.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以为魔方的每种颜色分配一些随机的数字向量。这些向量将用于让我们的模型推理贴纸以及它们之间的关系。最初，这些向量中的值将随机定义，但它们将通过训练过程根据模型的需求进行更新，从而使模型能够提出自己关于颜色的表示。
- en: When we want to give a Rubik’s Cube to the input of our encoder, we can iterate
    through all the stickers in the Rubik’s Cube and, every time there’s a sticker,
    we can look up the vector that corresponds to that color and add it to a sequence.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们想要将魔方作为编码器的输入时，我们可以遍历魔方上的所有贴纸，每次遇到一个贴纸，我们都可以查找对应颜色的向量并将其添加到序列中。
- en: '![Recall that we re-represented the Rubik''s Cube as a list of vectors, where
    the first item in each vector corresponded a stickers color. If we iterate through
    that list, and look up the corresponding vector of each color, we can effectively
    turn the Rubik''s Cube into a sequence of vectors.](../Images/ff1ff9d9744f389b405aaa3d71d77033.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![回想一下，我们将魔方重新表示为向量列表，其中每个向量中的第一个元素对应一个贴纸的颜色。如果我们遍历这个列表，并查找每种颜色的对应向量，我们就可以有效地将魔方转换为向量序列。](../Images/ff1ff9d9744f389b405aaa3d71d77033.png)'
- en: Recall that we re-represented the Rubik’s Cube as a list of vectors, where the
    first item in each vector corresponded a stickers color. If we iterate through
    that list, and look up the corresponding vector of each color, we can effectively
    turn the Rubik’s Cube into a sequence of vectors.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们将魔方重新表示为向量列表，其中每个向量中的第一个元素对应一个贴纸的颜色。如果我们遍历这个列表，并查找每种颜色的对应向量，我们就可以有效地将魔方转换为向量序列。
- en: Transformers have become widely popular in a variety of applications, from computer
    vision, to audio syntheses, to video generation. It turns out "take whatever data
    you have and represent it as a list of vectors, then throw it into a transformer"
    is a pretty good general strategy.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器在各种应用中变得非常流行，从计算机视觉到音频合成，再到视频生成。结果证明，“将你拥有的任何数据表示为向量列表，然后将其投入变换器”是一种相当好的通用策略。
- en: 'Before we put this sequence of vectors into a transformer, though, we need
    one more piece of information: position.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我们将这个向量序列放入变换器之前，我们还需要一个额外的信息：位置。
- en: Positional Encoding
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 位置编码
- en: Every time we convert our Rubik’s Cube into a sequence of vectors, weather we’re
    training our model or trying to predict a solution, we’ll be converting the stickers
    of the Rubik’s Cube to vectors in the same order. That means each location in
    the embedded sequence will always correspond to the same location in the Rubik’s
    Cube.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 每次我们将魔方转换为向量序列时，无论是训练模型还是尝试预测解决方案，我们都会以相同的顺序将魔方的贴纸转换为向量。这意味着嵌入序列中的每个位置都将始终对应魔方中的相同位置。
- en: '![If we use well defined and consistent code, then the first index in our list
    of vectors will always represent the same location in our Rubik''s Cube. Likewise,
    the second, third, fourth, and all other vectors will all always represent the
    same location across Rubik''s Cubes. Note, the colors of this particular Rubik''s
    Cube don''t correspond to this list of vectors shown, this figure is for conceptual
    demonstration.](../Images/a3655d19096d27435d3d0abc386f46c5.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![如果我们使用定义良好且一致的代码，那么我们向量列表中的第一个索引将始终代表我们魔方中的同一位置。同样，第二个、第三个、第四个以及所有其他向量都将始终代表魔方中相同的同一位置。注意，这个特定魔方的颜色与显示的向量列表不对应，这个图是为了概念演示。](../Images/a3655d19096d27435d3d0abc386f46c5.png)'
- en: If we use well defined and consistent code, then the first index in our list
    of vectors will always represent the same location in our Rubik’s Cube. Likewise,
    the second, third, fourth, and all other vectors will all always represent the
    same location across Rubik’s Cubes. Note, the colors of this particular Rubik’s
    Cube don’t correspond to this list of vectors shown, this figure is for conceptual
    demonstration.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们使用定义良好且一致的代码，那么我们向量列表中的第一个索引将始终代表我们魔方中的同一位置。同样，第二个、第三个、第四个以及所有其他向量都将始终代表魔方中相同的同一位置。注意，这个特定魔方的颜色与显示的向量列表不对应，这个图是为了概念演示。
- en: Some modeling strategies, like convolutional and dense networks, are good at
    learning to leverage this consistency. They can learn "this location corresponds
    to this sticker, that location corresponds to that sticker", and thus it’s not
    necessary to add any additional information about position into the input.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 一些建模策略，如卷积和密集网络，擅长学习利用这种一致性。它们可以学习“这个位置对应这个贴纸，那个位置对应那个贴纸”，因此不需要在输入中添加任何关于位置的信息。
- en: Transformer style models, on the other hand, are famously prone to losing track
    of the order of the input. To create their abstract and meaning rich representations,
    they mix and mangle the input so much that positional information (as in "this
    vector came before that vector") is lost very quickly. As a result, when using
    a transformer, it’s customary to use a positional encoding.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 与此相反，Transformer风格的模型以容易丢失输入顺序而闻名。为了创建它们的抽象和意义丰富的表示，它们将输入混合和扭曲得如此之甚，以至于位置信息（如“这个向量在另一个向量之前”）很快就会丢失。因此，当使用Transformer时，通常使用位置编码。
- en: The idea is to add some information about where each sticker was in our Rubik’s
    Cube to the vector which represents that stickers color. This will allow the model
    to inject explicit information about location into the value which represents
    each sticker, meaning it can reason about that stickers position, as well as its
    color.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 想法是将关于每个贴纸在魔方中位置的某些信息添加到代表该贴纸颜色的向量中。这将允许模型将关于位置和颜色的显式信息注入到代表每个贴纸的值中，这意味着它可以对该贴纸的位置和颜色进行推理。
- en: '![The idea is to add some positional information to the value of the vectors
    themselves, allowing the values of the vector to represent both a stickers color
    and position.](../Images/68b2405a97a08617de41fa2e8302f197.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![这个想法是在向量的值本身中添加一些位置信息，使得向量的值可以代表贴纸的颜色和位置。](../Images/68b2405a97a08617de41fa2e8302f197.png)'
- en: The idea is to add some positional information to the value of the vectors themselves,
    allowing the values of the vector to represent both a stickers color and position.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 想法是在向量的值本身中添加一些位置信息，使得向量的值可以代表贴纸的颜色和位置。
- en: We’ll be using a lookup table very similar to the approach described in the
    previous section. In the previous section we assigned a random vector to each
    color.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用一个非常类似于前一小节中描述的方法的查找表。在前一小节中，我们为每种颜色分配了一个随机向量。
- en: '![Recall that we encoded sticker color by creating a lookup table for each
    sticker color which corresponds to some random vector.](../Images/9c20e84cb1b6e5c36f542112c562d9ea.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![回想一下，我们通过为每种贴纸颜色创建一个查找表来编码贴纸颜色，该查找表对应某个随机向量。](../Images/9c20e84cb1b6e5c36f542112c562d9ea.png)'
- en: Recall that we encoded sticker color by creating a lookup table for each sticker
    color which corresponds to some random vector.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们通过为每种贴纸颜色创建一个查找表来编码贴纸颜色，该查找表对应某个随机向量。
- en: To encode position, we’ll also assign a random vector to each X, Y, and Z position
    in the 5x5x5 space of vectors.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为了编码位置，我们还将为向量空间中的每个X、Y和Z位置分配一个随机向量，该空间是一个5x5x5的空间。
- en: '![Recall that we converted our Rubik''s Cube into a list of vectors corresponding
    to the color, and X, Y, Z position of each sticker](../Images/b71579c4dbdc7d69d9ec19b8c18fdca8.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![回想一下，我们将魔方转换为一个向量列表，对应于每个贴纸的颜色和X、Y、Z位置。](../Images/b71579c4dbdc7d69d9ec19b8c18fdca8.png)'
- en: Recall that we converted our Rubik’s Cube into a list of vectors corresponding
    to the color, and X, Y, Z position of each sticker
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们将魔方转换为一个向量列表，对应于每个贴纸的颜色和X、Y、Z位置。
- en: '![Each of the five possible positions, across each axis, can be assigned a
    random vector](../Images/255b92c9a66639ae668b8712cefe6b7f.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![每个轴上的五个可能位置都可以分配一个随机向量](../Images/255b92c9a66639ae668b8712cefe6b7f.png)'
- en: Each of the five possible positions, across each axis, can be assigned a random
    vector
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 每个轴上的五个可能位置都可以分配一个随机向量
- en: For each sticker we can add the vector for where that sticker was along the
    X, Y, and Z axis to the vector that represents the stickers color and, as a result,
    represent the sticker color and position of each sticker using a single vector.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个贴纸，我们可以将沿X、Y和Z轴的贴纸向量添加到表示贴纸颜色的向量中，从而使用单个向量表示每个贴纸的颜色和位置。
- en: '![If we add the vectors for color, X, Y, and Z positions together, we can create
    a list of vectors that represent all the stickers in the Rubik''s Cube.](../Images/a34e863c208b1c1417e4714016550ea6.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![如果我们把颜色、X、Y和Z位置的向量相加，我们可以创建一个向量列表，代表魔方中的所有贴纸。](../Images/a34e863c208b1c1417e4714016550ea6.png)'
- en: If we add the vectors for color, X, Y, and Z positions together, we can create
    a list of vectors that represent all the stickers in the Rubik’s Cube.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将颜色、X、Y和Z位置的向量相加，我们可以创建一个向量列表，代表魔方中的所有贴纸。
- en: 'Here’s the implementation for a model which can embed the sticker colors of
    a Rubik’s Cube and apply a positional encoding:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个实现模型嵌入魔方贴纸颜色并应用位置编码的示例：
- en: '[PRE4]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![In this particular example the input is a batch of 10 Rubik''s Cubes. Each
    of these cubes has 54 stickers which are described as a 4 value vector: The stickers
    color, x position, y position, and z position. The encoder_embedding looks up
    the four vectors that represent the color and positions of the sticker and adds
    them all together. Thus, the output is a batch of 10 Rubik''s Cubes, now represented
    as 54 unique vectors where each vector contains values that describe the color
    and position of the sticker. 128 represents the model_dimension, which is an arbitrary
    number defining how long the vectors are which represent an input element. Large
    transformers (like OpenAI''s GPT models) use vectors which are many hundreds if
    not thousands of values long. With a larger model dimension more complex representations
    of the input can be made, at the cost of computational load. I opted to go for
    a relatively small model dimension, but still large enough to allow the model
    to think through the problem. This parameter could certainly be played with.](../Images/9506665b50be27e0aa5ef06eefd1bcae.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![在这个特定例子中，输入是一批10个魔方。每个魔方有54个贴纸，这些贴纸被描述为一个4值向量：贴纸颜色、x位置、y位置和z位置。编码嵌入查找代表贴纸颜色和位置的四个向量，并将它们全部相加。因此，输出是一批10个魔方，现在表示为54个独特的向量，其中每个向量包含描述贴纸颜色和位置的值。128代表模型维度，这是一个任意数字，定义了表示输入元素的向量的长度。大型变压器（如OpenAI的GPT模型）使用长度为数百甚至数千个值的向量。较大的模型维度可以使输入的复杂表示更加复杂，但代价是计算负载。我选择了相对较小的模型维度，但仍然足够大，以便模型能够思考问题。这个参数当然可以进行调整。](../Images/9506665b50be27e0aa5ef06eefd1bcae.png)'
- en: 'In this particular example the input is a batch of 10 Rubik’s Cubes. Each of
    these cubes has 54 stickers which are described as a 4 value vector: The stickers
    color, x position, y position, and z position. The `encoder_embedding` looks up
    the four vectors that represent the color and positions of the sticker and adds
    them all together. Thus, the output is a batch of 10 Rubik’s Cubes, now represented
    as 54 unique vectors where each vector contains values that describe the color
    and position of the sticker. 128 represents the `model_dimension`, which is an
    arbitrary number defining how long the vectors are which represent an input element.
    Large transformers (like OpenAI’s GPT models) use vectors which are many hundreds
    if not thousands of values long. With a larger model dimension more complex representations
    of the input can be made, at the cost of computational load. I opted to go for
    a relatively small model dimension, but still large enough to allow the model
    to think through the problem. This parameter could certainly be played with.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定的例子中，输入是一个包含10个魔方的批次。每个魔方有54个贴纸，这些贴纸被描述为一个4值向量：贴纸的颜色、x位置、y位置和z位置。`encoder_embedding`查找代表贴纸颜色和位置的四个向量，并将它们全部相加。因此，输出是一个包含10个魔方的批次，现在这些魔方被表示为54个独特的向量，其中每个向量包含描述贴纸颜色和位置的值。128代表`model_dimension`，这是一个任意数字，定义了表示输入元素的向量的长度。大型变换器（如OpenAI的GPT模型）使用长度为数百甚至数千的向量。较大的模型维度可以使输入的复杂表示更加复杂，但这会带来计算负载的增加。我选择了相对较小的模型维度，但仍然足够大，以便模型能够思考问题。这个参数当然可以进行调整。
- en: When we create a new model, we’ll be using completely random vectors to represent
    both the sticker color and where those stickers are located. Naturally this random
    information will probably be really hard for the model to understand at first.
    The idea is that, throughout the training process, these random vectors will update
    so that the model learns to create vectors for sticker color and position which
    it understands.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们创建一个新的模型时，我们将使用完全随机的向量来表示贴纸的颜色以及这些贴纸的位置。自然地，这种随机信息一开始可能对模型来说非常难以理解。我们的想法是，在整个训练过程中，这些随机向量将更新，以便模型学会创建它理解的贴纸颜色和位置的向量。
- en: '![We just implemented the input embedding and positional encoding within the
    greater transformer architecture](../Images/d64ce05ac2b3454a4c1e58472a07ca80.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![我们刚刚在更大的变换器架构中实现了输入嵌入和位置编码](../Images/d64ce05ac2b3454a4c1e58472a07ca80.png)'
- en: We just implemented the input embedding and positional encoding within the greater
    transformer architecture
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚在更大的变换器架构中实现了输入嵌入和位置编码
- en: So, we’ve turned the Rubik’s Cube into a list of vectors which a transformer
    can understand. We’ll also need to perform a similar process to the sequence of
    moves we want the model to output but, before we do, I’d like to discuss some
    intricacies of the decoder.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们将魔方转换成了一个变换器可以理解的向量列表。我们还需要对模型想要输出的移动序列执行一个类似的过程，但在我们这样做之前，我想讨论一下解码器的一些复杂性。
- en: '![Join IAEE](../Images/b2fb8abda5a77fa23ca0a89e1c088b94.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![加入IAEE](../Images/b2fb8abda5a77fa23ca0a89e1c088b94.png)'
- en: '[Join IAEE](https://iaee.substack.com/)'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '[加入IAEE](https://iaee.substack.com/)'
- en: The Input and Output of the Decoder
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解码器的输入和输出
- en: Recall that when a transformer outputs a sequence, it does so "autoregressively",
    meaning when you put some sequence into the decoder, the decoder will output a
    prediction as to what it thinks the next token should be. That new token can be
    then fed back into the input of the decoder, allowing the transformer to generate
    a sequence one token at a time.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，当变换器输出一个序列时，它是“自回归地”输出的，这意味着当你将一些序列放入解码器时，解码器将输出一个预测，即它认为下一个标记应该是什么。然后，这个新标记可以被反馈到解码器的输入中，允许变换器逐个标记地生成序列。
- en: '![Recall the general process of autoregressive generation. the decoder references
    the encoded input for every loop of the output. The decoder generates the entire
    sequence by taking it''s previous outputs as input, and predicting what token
    it thinks should come next. From my article on transformers](../Images/70b0366c1a3b4aedc2003f05ca60c4a2.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![回忆自回归生成的通用过程。解码器在输出循环的每一轮都参考编码后的输入。解码器通过将其先前输出作为输入，并预测它认为下一个应该出现的标记来生成整个序列。请参阅我的关于变换器的文章](../Images/70b0366c1a3b4aedc2003f05ca60c4a2.png)'
- en: Recall the general process of autoregressive generation. the decoder references
    the encoded input for every loop of the output. The decoder generates the entire
    sequence by taking it’s previous outputs as input, and predicting what token it
    thinks should come next. From [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下自回归生成的通用过程。解码器在输出循环的每一轮都参考编码后的输入。解码器通过将之前的输出作为输入，并预测它认为应该出现的下一个标记来生成整个序列。参见[我的关于转换器的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
- en: One of the defining characteristics of a transformer is the way they’re trained.
    Older styles of models would typically train on one token at a time. You would
    feed a sequence into the model, predict a token, then update the model based on
    whether it was right or wrong. This is an incredibly slow and computationally
    expensive process, and severely limited older styles of models when applying them
    to sequences.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 转换器的一个定义特征是它们的训练方式。旧式的模型通常一次只训练一个标记。你会将一个序列输入到模型中，预测一个标记，然后根据预测是正确还是错误来更新模型。这是一个极其缓慢且计算成本高昂的过程，严重限制了旧式模型在应用于序列时的应用。
- en: When training a transformer, on the other hand, you input the entire sequence
    you want, then the transformer predicts all tokens for each input as if future
    tokens did not exist.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当训练一个转换器时，另一方面，你输入你想要的整个序列，然后转换器预测每个输入的所有标记，就像未来的标记不存在一样。
- en: '![How the decoder of a transformer is trained. Instead of training on words
    one by one, it''s given the entire sequence of words it''s supposed to output
    and is tasked with predicting all next words simultaneously. The reason the decoder
    uses "masked" multi-headed self-attention is to prevent the model from trivially
    copying future words to come up with its output. When predicting what word should
    come after "trained" in this example, the model can only see the sequence " A
    Sentence a model is being trained" and is tasked with predicting that the word
    "on" is the next word. From my article on Speculative Sampling](../Images/411c6df1e5a0ed221ab4108689b724cd.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![转换器的解码器是如何训练的。它不是逐个训练单词，而是给出它应该输出的整个单词序列，并要求它同时预测所有下一个单词。解码器使用“掩码”多头自注意力的原因是防止模型简单地复制未来的单词来生成输出。在这个例子中，当预测“trained”之后的单词时，模型只能看到序列“A
    Sentence a model is being trained”并要求预测下一个单词是“on”。参见我关于推测采样的文章](../Images/411c6df1e5a0ed221ab4108689b724cd.png)'
- en: How the decoder of a transformer is trained. Instead of training on words one
    by one, it’s given the entire sequence of words it’s supposed to output and is
    tasked with predicting all next words simultaneously. The reason the decoder uses
    "masked" multi-headed self-attention is to prevent the model from trivially copying
    future words to come up with its output. When predicting what word should come
    after "trained" in this example, the model can only see the sequence " A Sentence
    a model is being trained" and is tasked with predicting that the word "on" is
    the next word. From my article on [Speculative Sampling](https://medium.com/towards-data-science/speculative-sampling-intuitively-and-exhaustively-explained-2daca347dbb9)
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 转换器的解码器是如何训练的。它不是逐个训练单词，而是给出它应该输出的整个单词序列，并要求它同时预测所有下一个单词。解码器使用“掩码”多头自注意力的原因是防止模型简单地复制未来的单词来生成输出。在这个例子中，当预测“trained”之后的单词时，模型只能看到序列“
    A Sentence a model is being trained”，并要求预测下一个单词是“on”。参见我关于[推测采样](https://medium.com/towards-data-science/speculative-sampling-intuitively-and-exhaustively-explained-2daca347dbb9)的文章
- en: So, it predicts the next token for the first spot, the next token for the second
    spot, the next token for the third spot, etc. simultaneously.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，它同时预测第一个位置的下个标记，第二个位置的下个标记，第三个位置的下个标记，等等。
- en: I talk about how this works in my [article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
    more in depth, and explore how this quirk of transformers can be used to interesting
    effect in my article on [speculative sampling](https://medium.com/towards-data-science/speculative-sampling-intuitively-and-exhaustively-explained-2daca347dbb9).
    For now, though, we know enough of the high-level theory to discuss implementing
    the embedding and positional encoding for the decoder.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的[关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)中更深入地讨论了这一点，并在我的[关于投机抽样的文章](https://medium.com/towards-data-science/speculative-sampling-intuitively-and-exhaustively-explained-2daca347dbb9)中探讨了如何利用Transformer的这个特性产生有趣的效果。然而，目前我们已经有足够的高层次理论来讨论实现解码器的嵌入和位置编码。
- en: Tokenizing, Embedding, and Positionally Encoding the Solution Sequence
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对解决方案序列进行标记化、嵌入和位置编码
- en: As discussed in the previous section, when we’re training our model we need
    to input the sequence we want into the decoder, then the decoder will make predictions
    of all the next moves in the sequence as if future moves didn’t exist.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，在训练我们的模型时，我们需要将我们想要的序列输入到解码器中，然后解码器将预测序列中的所有后续移动，就像未来的移动不存在一样。
- en: '![A breakdown of the general flow of training. Our Rubik''s Cube get''s represented
    as a list of vectors which represent the color and position of each sticker, which
    is passed to the encoder. The decoder uses the encoded input to generate move
    predictions](../Images/332579e9c13cffb0aaf5c7884516d83e.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![训练流程的分解。我们的魔方被表示为一系列向量，这些向量代表每个贴纸的颜色和位置，这些信息被传递给编码器。解码器使用编码后的输入来生成移动预测](../Images/332579e9c13cffb0aaf5c7884516d83e.png)'
- en: A breakdown of the general flow of training. Our Rubik’s Cube get’s represented
    as a list of vectors which represent the color and position of each sticker, which
    is passed to the encoder. The decoder uses the encoded input to generate move
    predictions
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 训练流程的分解。我们的魔方被表示为一系列向量，这些向量代表每个贴纸的颜色和位置，这些信息被传递给编码器。解码器使用编码后的输入来生成移动预测
- en: Just like the input to the encoder, the input to the decoder will take the form
    of a sequence of vectors.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 就像编码器的输入一样，解码器的输入也将以向量序列的形式出现。
- en: '![The input to the encoder is similar to the input to the decoder: a list of
    vectors. However, the vectors for the encoder represent stickers, while the vectors
    for the decoder represent moves.](../Images/aae1436e28770de7d9c2ead37cf6845a.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![编码器的输入与解码器的输入类似：都是一系列向量。然而，编码器的向量代表贴纸，而解码器的向量代表移动。](../Images/aae1436e28770de7d9c2ead37cf6845a.png)'
- en: 'The input to the encoder is similar to the input to the decoder: a list of
    vectors. However, the vectors for the encoder represent stickers, while the vectors
    for the decoder represent moves.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器的输入与解码器的输入类似：都是一系列向量。然而，编码器的向量代表贴纸，而解码器的向量代表移动。
- en: The process of creating those vectors is similar to the process in which we
    embedded and positionally encoded the Rubik’s Cube. There are 12 possible moves
    (6 faces in two directions), meaning each of the moves can be represented with
    a list of 12 vectors.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 创建这些向量的过程与我们嵌入和位置编码魔方的过程类似。有12种可能的移动（两个方向的6个面），这意味着每种移动都可以用12个向量的列表来表示。
- en: '![We can create a "vocabulary" of moves. We can assign each move some vector.
    When we want to input some list of moves into the decoder, we''ll do so by feeding
    the decoder a list of these vectors.](../Images/5f818a64d1c896d08015f99eec5f0eb3.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![我们可以创建一个“词汇表”来表示移动。我们可以为每个移动分配一些向量。当我们想要将一系列移动输入到解码器时，我们将通过向解码器提供这些向量的列表来实现。](../Images/5f818a64d1c896d08015f99eec5f0eb3.png)'
- en: We can create a "vocabulary" of moves. We can assign each move some vector.
    When we want to input some list of moves into the decoder, we’ll do so by feeding
    the decoder a list of these vectors.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以创建一个“词汇表”来表示移动。我们可以为每个移动分配一些向量。当我们想要将一系列移动输入到解码器时，我们将通过向解码器提供这些向量的列表来实现。
- en: These moves can be positionally encoded by creating a vector for each location
    in the sequence.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这些移动可以通过为序列中的每个位置创建一个向量来进行位置编码。
- en: '![When converting a sequence of moves into a sequence of vectors, we need to
    add a vector for each position to encode location, just like what we did when
    defining the positional encoding for the Rubik''s Cube. For positionally encoding
    the sequence we need a vector for each possible element in the sequence.](../Images/97418dfe47c2f105f1740385898e614b.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![当将移动序列转换为向量序列时，我们需要为每个位置添加一个向量来编码位置，就像我们在定义魔方位置编码时做的那样。为了对序列进行位置编码，我们需要为序列中的每个可能元素提供一个向量。](../Images/97418dfe47c2f105f1740385898e614b.png)'
- en: When converting a sequence of moves into a sequence of vectors, we need to add
    a vector for each position to encode location, just like what we did when defining
    the positional encoding for the Rubik’s Cube. For positionally encoding the sequence
    we need a vector for each possible element in the sequence.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 当将移动序列转换为向量序列时，我们需要为每个位置添加一个向量来编码位置，就像我们在定义魔方位置编码时做的那样。为了对序列进行位置编码，我们需要为序列中的每个可能元素提供一个向量。
- en: Apparently, the maximum number of moves to solve a Rubik’s Cube is 20 moves
    (Don’t ask me how they figured that out), so we can assume the output sequence
    of our model will have a maximum length of 20, plus space for two "utility tokens".
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，解决魔方所需的最大移动次数是20次（不要问我他们是如何得出这个结论的），因此我们可以假设我们模型的输出序列的最大长度为20，再加上两个“效用标记”的空间。
- en: A utility token is a special token that doesn’t matter in terms of final output
    but is useful from a modeling perspective. For instance, it can be useful for
    a model to have a way to say it’s done generating output. This is a common token
    called the "end of sequence", often abbreviated as `<EOS>` , token.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 效用标记是一个特殊的标记，在最终输出中并不重要，但在建模方面很有用。例如，对于模型来说，有一个方式来说明它已经完成了输出生成是有用的。这是一个常见的标记，称为“序列结束”，通常缩写为`<EOS>`标记。
- en: Also, recall how the decoder predicts all next tokens based on an input token,
    meaning we need to input some token to get the first prediction. It’s common practice
    to prepend each sequence with a "start of sequence" (`<SOS>`) token, which holds
    the space for the first prediction from the model.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，回想一下解码器是如何根据输入标记预测所有下一个标记的，这意味着我们需要输入一些标记来获取第一个预测。在序列前添加一个“序列开始”（`<SOS>`）标记是一种常见的做法，它为模型的第一预测留出空间。
- en: Another token we’ll be using is a pad (`<PAD>`) token. Basically, all the math
    under the hood of the transformer uses matrices, which require some uniform shape.
    So, if we have a few sequences of moves that are short, and a few sequences that
    are long, they all need to fit within the same matrix. We can do that by "padding"
    all the short sequences until they’re the same length as the longest sequence.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将使用一个填充（`<PAD>`）标记。基本上，变压器底层的所有数学运算都使用矩阵，这需要一定的统一形状。因此，如果我们有一些短的移动序列和一些长的移动序列，它们都需要适应同一个矩阵。我们可以通过“填充”所有短的序列，直到它们的长度与最长的序列相同来实现这一点。
- en: '![The "vocabulary" for our model is actually 15 elements: 12 moves and three
    utility tokens.](../Images/f88d71915fb4fea4666164085e8f8c74.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![我们模型的“词汇表”实际上有15个元素：12个移动和三个效用标记。](../Images/f88d71915fb4fea4666164085e8f8c74.png)'
- en: 'The "vocabulary" for our model is actually 15 elements: 12 moves and three
    utility tokens.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 我们模型的“词汇表”实际上有15个元素：12个移动和三个效用标记。
- en: So, the "vocabulary" of the decoder will be our 12 possible moves, plus the
    start-of-sequence (`<SOS>`), end-of-sequence (`<EOS>`), and pad (`<PAD>`) tokens.
    The total sequence length will be 22, because the maximum number of moves needed
    to solve any Rubik’s Cube is 20 (again, I have no idea why), and we need to make
    room for an (`<SOS>`) and (`<EOS>`) token on even the longest sequences.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，解码器的“词汇表”将包括我们的12个可能的移动，以及序列开始（`<SOS>`）、序列结束（`<EOS>`）和填充（`<PAD>`）标记。总序列长度将是22，因为解决任何魔方所需的最大移动次数是20（再次，我不知道为什么），并且我们需要为最长的序列中的（`<SOS>`）和（`<EOS>`）标记留出空间。
- en: Now that our tokens are thought out, and we know how long the sequence will
    be, we can just initialize 15 random vectors for the token embedding, and 22 random
    vectors for each location in the sequence. When we take in some sequence to either
    train or make some prediction, we can use these vectors to represent both the
    value and position of all of the moves.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经想好了标记，并且知道了序列的长度，我们就可以初始化15个随机的向量用于标记嵌入，以及为序列中的每个位置初始化22个随机的向量。当我们接收一些序列用于训练或进行预测时，我们可以使用这些向量来表示所有移动的值和位置。
- en: '![The move vectors will be the values for the move plus the values of the move
    position in the sequence.](../Images/aae1436e28770de7d9c2ead37cf6845a.png)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![动作向量将是动作的值加上动作在序列中的位置值。](../Images/aae1436e28770de7d9c2ead37cf6845a.png)'
- en: The move vectors will be the values for the move plus the values of the move
    position in the sequence.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 动作向量将是动作的值加上动作在序列中的位置值。
- en: Let’s go ahead and implement the decoder embedding. First of all, our data already
    has our utility tokens built in. Recall we used this code to generate the y portion
    of our dataset
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续实现解码器嵌入。首先，我们的数据已经内置了我们的效用标记。回想一下，我们使用这段代码来生成数据集的y部分
- en: '[PRE5]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: here we’re converting each of our moves to an integer from 3–14 with the expression
    `move_to_output_index(m) + 3` (which adds 3 to the numbers which represent our
    possible moves labeled as 0–11). It then adds `0` and `1` to the beginning and
    end of the sequence and appends a list of `2's` on the end until the total sequence
    is of length 22.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将每个动作转换为3到14之间的整数，使用表达式`move_to_output_index(m) + 3`（这会将表示我们可能动作的数字0到11加上3）。然后，它在序列的开始和结束处添加`0`和`1`，并在末尾附加一个`2`的列表，直到整个序列长度为22。
- en: 'Thus:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 因此：
- en: '`0` represents start of sequence `<sos>`'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`0`代表序列开始`<sos>`'
- en: '`1` represents end of sequence `<eos>`'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`1`代表序列结束`<eos>`'
- en: '`2` represents pad `<pad>`'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`2`代表填充`<pad>`'
- en: '`3` – `14` represent our possible moves'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`3` – `14`代表我们的可能动作'
- en: '![What a batch of 10 solution sequences look like in y. They all start with  (0),
    proceed with some number of moves (3–14), and in  (1), then any remaining room
    is filled with  (2).](../Images/f0e2910875723ac3e04d5811f6a6aeaa.png)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![在y中，10个解决方案序列批次的外观。它们都以(0)开始，然后进行一些动作（3–14），然后在(1)中，剩余的空间被(2)填充。](../Images/f0e2910875723ac3e04d5811f6a6aeaa.png)'
- en: What a batch of 10 solution sequences look like in y. They all start with (0),
    proceed with some number of moves (3–14), and in (1), then any remaining room
    is filled with (2).
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在y中，10个解决方案序列批次的外观。它们都以(0)开始，然后进行一些动作（3–14），然后在(1)中，剩余的空间被(2)填充。
- en: 'So, we can implement embedding and positional encoding for our sequence of
    moves as follows:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以如下实现动作序列的嵌入和位置编码：
- en: '[PRE6]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![Here, we''re processing a batch of 10 solution sequences. This encoder takes
    a list of 22 tokens, expressed as one of our 15 integers which corresponds to
    the 15 elements in our move and utility token vocabulary, and converts each of
    those tokens into a vector. It does that by adding the vector that represents
    the value of the move with a vector that represents the position of that move
    within the sequence. For convenience and for the same conceptual reasons, the
    model_dim of 128 is the same as the one used in encoding the Rubik''s Cube which
    we defined in a previous section.](../Images/70e2bb482749b540687961f44e791ac3.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![这里，我们正在处理10个解决方案序列的批次。这个编码器接受一个由22个标记组成的列表，这些标记以我们15个整数之一的形式表示，这些整数对应于我们的动作和效用标记词汇表中的15个元素，并将这些标记中的每一个转换为向量。它是通过将表示动作值的向量与表示该动作在序列中位置的向量相加来实现的。为了方便起见，以及出于相同的概念原因，模型维度`model_dim`为128，与我们在前一个部分中定义的用于编码魔方的维度相同。](../Images/70e2bb482749b540687961f44e791ac3.png)'
- en: Here, we’re processing a batch of 10 solution sequences. This encoder takes
    a list of 22 tokens, expressed as one of our 15 integers which corresponds to
    the 15 elements in our move and utility token vocabulary, and converts each of
    those tokens into a vector. It does that by adding the vector that represents
    the value of the move with a vector that represents the position of that move
    within the sequence. For convenience and for the same conceptual reasons, the
    `model_dim` of 128 is the same as the one used in encoding the Rubik’s Cube which
    we defined in a previous section.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们正在处理10个解决方案序列的批次。这个编码器接受一个由22个标记组成的列表，这些标记以我们15个整数之一的形式表示，这些整数对应于我们的动作和效用标记词汇表中的15个元素，并将这些标记中的每一个转换为向量。它是通过将表示动作值的向量与表示该动作在序列中位置的向量相加来实现的。为了方便起见，以及出于相同的概念原因，`model_dim`的128与我们在前一个部分中定义的用于编码魔方的维度相同。
- en: '![What we just implemented, an embedder and positional encoder for the move
    sequences.](../Images/fac8bdcaa02301677f0c7f9db736aaf8.png)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
  zh: '![我们刚刚实现了一个嵌入器和位置编码器，用于动作序列。](../Images/fac8bdcaa02301677f0c7f9db736aaf8.png)'
- en: What we just implemented, an embedder and positional encoder for the move sequences.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚实现了一个嵌入器和位置编码器，用于动作序列。
- en: Alright, we’ve figured out how to encode both the Rubik’s Cube, and sequences
    of moves to solve them, in a way the transformer can understand (a big list of
    vectors). Now we can actually get into building the transformer.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们已经找到了如何将魔方和解决它们的移动序列编码成Transformer可以理解的方式（一个大的向量列表）。现在我们可以真正开始构建Transformer了。
- en: Implementing the Transformer
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现Transformer
- en: The main point of this article isn’t really the model, but rather the thought
    process around making modeling decisions. We’ve really done all the heavy lifting
    already. By turning our moves into vectors which a transformer understands, we
    can use the same standard transformer used in countless other applications.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的重点并不是模型本身，而是围绕建模决策的思考过程。我们已经完成了所有的繁重工作。通过将我们的移动转换为Transformer可以理解的向量，我们可以使用在无数其他应用中使用的相同标准Transformer。
- en: I’ve covered the core ideas of the transformer in many different articles at
    this point. Still, this wouldn’t be "exhaustive" if I didn’t cover implementing
    the transformer, so let’s do it. This will be a fairly brief pass over the process,
    feel free to dig into some of the linked articles in the reference section for
    a more in-depth understanding.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我已经在许多不同的文章中介绍了Transformer的核心思想。尽管如此，如果不介绍实现Transformer，这还不能算是“详尽无遗”，所以让我们来做这件事。这将对过程进行相当简短的概述，你可以自由地深入研究参考部分中的一些链接文章，以获得更深入的理解。
- en: 1) The Encoder
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 编码器
- en: We already made the embedding and positional encoding that turns a Rubik’s Cube
    into a list of vectors, so now we need to implement the encoder portion of the
    model which is tasked with thinking about that representation and turning it into
    an abstract but meaning rich representation.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经创建了将魔方转换为向量列表的嵌入和位置编码，所以现在我们需要实现模型的编码器部分，该部分负责考虑这种表示并将其转换为抽象但意义丰富的表示。
- en: '[PRE7]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![The output of the encoder is the same size as the input. We gave it a batch
    of 10 Rubik''s Cubes, each with 54 stickers represented with a vector of 128,
    and we got the same sized output. The encoder gets all these vectors to interact
    with each other, giving us a similar sized input, but one that is much more abstract
    and meaning rich.](../Images/e653f407f1d7926cf1d29c2262ab33c7.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![编码器的输出大小与输入相同。我们给它一个包含10个魔方块的数据批次，每个魔方块由128维向量表示54个贴纸，我们得到了相同大小的输出。编码器将这些向量相互交互，给我们一个大小相似但更加抽象和意义丰富的输入。](../Images/e653f407f1d7926cf1d29c2262ab33c7.png)'
- en: The output of the encoder is the same size as the input. We gave it a batch
    of 10 Rubik’s Cubes, each with 54 stickers represented with a vector of 128, and
    we got the same sized output. The encoder gets all these vectors to interact with
    each other, giving us a similar sized input, but one that is much more abstract
    and meaning rich.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器的输出大小与输入相同。我们给它一个包含10个魔方块的数据批次，每个魔方块由128维向量表示54个贴纸，我们得到了相同大小的输出。编码器将这些向量相互交互，给我们一个大小相似但更加抽象和意义丰富的输入。
- en: pytorch already has an implementation for the encoder block, so we just used
    that.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch 已经实现了编码器块，所以我们只是使用了那个。
- en: '`num_heads` describes how many heads are used in each multi-headed self attention
    block (see [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
    if you want to understand more)'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`num_heads` 描述了每个多头自注意力块中使用了多少个头（如果你想要了解更多，请参阅[我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)）'
- en: '`num_layers` describes how many encoder blocks are used (see [my article on
    transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)
    if you want to understand more)'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`num_layers` 描述了使用了多少个编码器块（如果你想要了解更多，请参阅[我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)）'
- en: '`d_ff` is how large the feed-forward network in the transformer is. This is
    typically much larger than the `model_dim` as it allows the feed forward network
    to look at each vector in the model, expand it into a few representations, then
    shrink those vectors back down into the original size based on that expanded information.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`d_ff` 表示Transformer中前馈网络的大小。这通常比 `model_dim` 大得多，因为它允许前馈网络查看模型中的每个向量，将其扩展为几个表示，然后根据这些扩展信息将这些向量缩小回原始大小。'
- en: '`dropout` is a regularizing parameter which randomly hides certain values in
    the model. `dropout` is a common trick that helps AI models learn trends in data
    without simply memorizing individual examples in the dataset.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dropout` 是一个正则化参数，它随机隐藏模型中的某些值。`dropout` 是一个常见的技巧，它帮助 AI 模型学习数据中的趋势，而不仅仅是记住数据集中的单个示例。'
- en: 2) The Decoder
  id: totrans-201
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 解码器
- en: The decoder takes the embedded representation of the move sequence, and combines
    it with the output of the encoder to make predictions about which move should
    come next.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器接收移动序列的嵌入表示，并将其与编码器的输出结合起来，以预测下一个应该发生的移动。
- en: 'So, let’s build it:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，让我们来构建它：
- en: '[PRE8]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![Here, the decoder is taking in a batch of 10 solutions, each with 22 possible
    tokens (our moves and three utility tokens) represented as a 128 valued vector,
    and it''s outputting a matrix of the same exact dimension. While the output is
    a similar size to the input, it is much more abstract, meaning rich, and has allowed
    the representation of the Rubik''s Cube to interact with the previous moves.](../Images/298249d19e61e98b78d8dca19eaa93fe.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![在这里，解码器正在接收一个包含10个解决方案的批次，每个解决方案有22个可能的标记（我们的移动和三个效用标记），这些标记以一个128维的向量表示，并且它输出一个相同维度的矩阵。虽然输出的大小与输入相似，但它要抽象得多，意味着更丰富，并允许
    Rubik 速拧的表示与之前的移动进行交互](../Images/298249d19e61e98b78d8dca19eaa93fe.png)'
- en: Here, the decoder is taking in a batch of 10 solutions, each with 22 possible
    tokens (our moves and three utility tokens) represented as a 128 valued vector,
    and it’s outputting a matrix of the same exact dimension. While the output is
    a similar size to the input, it is much more abstract, meaning rich, and has allowed
    the representation of the Rubik’s Cube to interact with the previous moves.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，解码器正在接收一个包含10个解决方案的批次，每个解决方案有22个可能的标记（我们的移动和三个效用标记），这些标记以一个128维的向量表示，并且它输出一个相同维度的矩阵。虽然输出的大小与输入相似，但它要抽象得多，意味着更丰富，并允许
    Rubik 速拧的表示与之前的移动进行交互。
- en: 3) The Classification Head
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 分类头
- en: The output of the decoder represents all of the moves the model thinks should
    be taken, but it does so as a big list of abstract vectors. The goal of the Classification
    Head is to turn each of these abstract vectors into a prediction of what token
    should be output (our 12 moves and 3 utility tokens). we do that by simply using
    a neural network on each vector to turn our 128-value long vector into a vector
    of length 15\. Then we turn those 15 values into probabilities (where bigger numbers
    are higher probability) using an operation called SoftMax.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器的输出代表了模型认为应该采取的所有移动，但它这样做的方式是一个包含抽象向量的长列表。分类头的目标是将这些抽象向量中的每一个转换成对应该输出哪个标记的预测（我们的12个移动和3个效用标记）。我们通过在每个向量上简单地使用一个神经网络来实现这一点，将我们的128维向量转换成长度为15的向量。然后，我们使用一个称为
    SoftMax 的操作将这些15个值转换成概率（数值越大表示概率越高）。
- en: So, in other words, the prediction head turns all our abstract vectors into
    a prediction of which move should happen at each spot in the solution sequence.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，预测头将所有我们的抽象向量转换成对解决方案序列中每个位置的移动应该发生什么进行预测。
- en: '![The output of the decoder starts as a bunch of random vectors of length model_dim.
    After the linear projection, all those vectors are turned into vectors of length
    vocab_size. Then, softmax is used to turn that into a probabalistic prediction.](../Images/a7f6132bf5df8b6f9b0c121d2c324a1b.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![解码器的输出最初是一系列长度为 model_dim 的随机向量。经过线性投影后，所有这些向量都被转换成长度为 vocab_size 的向量。然后，使用
    softmax 将其转换为概率预测](../Images/a7f6132bf5df8b6f9b0c121d2c324a1b.png)'
- en: The output of the decoder starts as a bunch of random vectors of length model_dim.
    After the linear projection, all those vectors are turned into vectors of length
    vocab_size. Then, softmax is used to turn that into a probabalistic prediction.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器的输出最初是一系列长度为 model_dim 的随机向量。经过线性投影后，所有这些向量都被转换成长度为 vocab_size 的向量。然后，使用
    softmax 将其转换为概率预测。
- en: 'Here’s that code:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是那段代码：
- en: '[PRE9]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![passing a batch of 10 solution sequences through the decoder, each of which
    has a sequence length of 22\. For each point in the sequence the prediction head
    makes a prediction about which of the 15 possible tokens is the most relevant
    to be the next prediction. For a single output, the probabilities of all 15 predictions
    add up to 1 (or close to 1, due to rounding error).](../Images/1f89065cd120b18d04fe7930f5df93d8.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![通过解码器传递10个解决方案序列的批次，每个序列的长度为22。对于序列中的每个点，预测头都会预测15个可能的标记中哪一个是最相关的下一个预测。对于单个输出，所有15个预测的概率之和为1（或接近1，由于舍入误差）](../Images/1f89065cd120b18d04fe7930f5df93d8.png)'
- en: passing a batch of 10 solution sequences through the decoder, each of which
    has a sequence length of 22\. For each point in the sequence the prediction head
    makes a prediction about which of the 15 possible tokens is the most relevant
    to be the next prediction. For a single output, the probabilities of all 15 predictions
    add up to 1 (or close to 1, due to rounding error).
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 通过解码器传递一批10个解决方案序列，每个序列的长度为22。对于序列中的每个点，预测头都会预测15个可能的标记中哪一个最相关，应该是下一个预测。对于单个输出，所有15个预测的概率之和为1（或接近1，由于舍入误差）。
- en: 4) The Model
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 模型
- en: 'We created:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了：
- en: a way to embed sticker colors and encode the location of stickers on a Rubik’s
    Cube as a list of vectors
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种将贴纸颜色嵌入并编码魔方上贴纸位置的方法，作为一个向量列表
- en: a way to embed moves and encode their position in a solution sequence as a list
    of vectors
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种将移动嵌入并编码其在解决方案序列中的位置的方法，作为一个向量列表
- en: the encoder, which accepts the vectors representing a Rubik’s Cube and allows
    a model to convert that data into a dense and meaning rich representation
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编码器，它接受代表魔方的向量并允许模型将数据转换为密集且意义丰富的表示
- en: the decoder, which accepts previous moves and outputs predictions of future
    moves that should be taken based on the value of previous moves and the encoded
    representation of the Rubik’s Cube
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解码器，它接受之前的移动并基于之前移动的值和魔方的编码表示输出未来应该采取的预测移动
- en: A projection head which takes the output of the decoder and turns it into probabilistic
    predictions that certain moves should be made
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个投影头，它接收解码器的输出并将其转换为某些移动应该被做出的概率预测
- en: Now we can put that all together to define the actual model
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以将这些内容结合起来，定义实际的模型
- en: '[PRE10]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![The model took in a batch of 10 Rubik''s Cubes (X), each of their solutions
    (y) and, for each one, made a prediction of which of the 15 tokens it thought
    should be in all possible locations in the 22 output positions.](../Images/bfee9c24bd0c382a5b7c9f683f6467e3.png)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![模型接收了10个魔方批次的输入（X），每个魔方的解决方案（y），并且对每个魔方，预测了它认为应该出现在22个输出位置中所有可能位置的15个标记之一。](../Images/bfee9c24bd0c382a5b7c9f683f6467e3.png)'
- en: The model took in a batch of 10 Rubik’s Cubes (X), each of their solutions (y)
    and, for each one, made a prediction of which of the 15 tokens it thought should
    be in all possible locations in the 22 output positions.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 模型接收了10个魔方批次的输入（X），每个魔方的解决方案（y），并且对每个魔方，预测了它认为应该出现在22个输出位置中所有可能位置的15个标记之一。
- en: Now we can train this model on our synthetic dataset. Before we do, though,
    I’d like to take a step back and consider some of the costs and benefits of our
    approach.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以用我们的合成数据集训练这个模型。在我们这样做之前，我想退一步考虑一下我们方法的一些成本和收益。
- en: The Subtlety of Training Strategy
  id: totrans-228
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练策略的微妙之处
- en: Before we get into creating our model, I’d like to reflect on the synthetic
    dataset we created in the previous section, and some of the implications that
    dataset suggests.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始创建我们的模型之前，我想回顾一下上一节中创建的合成数据集，以及该数据集提出的一些影响。
- en: 'In this article we’re computing a perfectly random sequence of moves, using
    it to shuffle a Rubik’s Cube, then asking the model to predict the exact opposite
    of the shuffling sequence. This is great in theory, but there’s a practical problem;
    if we happened to generate a random sequence of moves like this:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们计算了一个完全随机的移动序列，使用它来打乱魔方，然后要求模型预测与打乱序列正好相反的序列。这在理论上是很好的，但存在一个实际问题；如果我们碰巧生成了一个这样的随机移动序列：
- en: '`<sos>, front clockwise, front counterclockwise, front clockwise, front counterclockwise,
    <eos>`'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: '`<sos>, 前面顺时针，前面逆时针，前面顺时针，前面逆时针，<eos>`'
- en: Then instead of training the model to predict that the Rubik’s Cube is already
    completed (because it is, these random moves simply undo each other), we would
    train the model to predict the same erroneous set of steps and then output that
    the Rubik’s Cube is completed.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们不是训练模型预测魔方已经完成（因为它是，这些随机移动只是相互抵消），而是训练模型预测相同的错误步骤集，然后输出魔方已完成。
- en: 'There are a lot of ways to get around this problem. I went with the simplest
    approach: ignoring it.'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多方法可以解决这个问题。我选择了最简单的方法：忽略它。
- en: Transformers, the style of model we’re using, are known to perform remarkably
    well in a natural language context, which has a lot of random noise and occasional
    non-sense. So, we already know transformers are good at learning to model complex
    sequences despite some poor-quality examples in the training set.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器，我们使用的模型风格，在自然语言环境中表现出色，这种环境中有很多随机噪声和偶尔的胡言乱语。所以，我们已经知道，即使训练集中有一些质量较差的示例，变换器也擅长学习复杂的序列。
- en: The hope, for us, is that silly moves will be much less common than productive
    moves and, as a result, the model will tend to learn productive decisions.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们来说，希望愚蠢的移动会比有效的移动少得多，因此，模型将倾向于学习有效的决策。
- en: So, Basically, if a transformer is good at learning language even if there are
    occasionally silly words in the training set, maybe it will be good at solving
    a Rubik’s Cube even if the dataset it’s trained on has occasionally silly moves.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，基本上，如果一个变换器即使在训练集中偶尔有愚蠢的词语，也擅长学习语言，那么它可能擅长解决魔方，即使它所训练的数据集偶尔有愚蠢的移动。
- en: It can be easy to be too hopeful about this type of assumption early on. It’s
    important to remember that, when constructing an AI model, the model is attempting
    to learn *exactly* what you’re training it to do. No more, no less. We can hope
    that the nature of the model will deal with quirks in our synthetic dataset elegantly,
    but we’ll only really know if we made the right call once we’ve gone ahead, trained,
    and then tested our model.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在一开始就过于乐观地假设这种假设是很容易的。重要的是要记住，在构建人工智能模型时，模型正在尝试学习你训练它去做的事情。不多也不少。我们可以希望模型的本质会优雅地处理我们合成数据集中的怪癖，但只有当我们继续前进，训练并测试我们的模型后，我们才能真正知道我们是否做出了正确的选择。
- en: Generally speaking, I’ve found that the best modeling strategy is the one you
    think might work and can implement quickly. Iteration is a fact of life in complex
    ML problems.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，我发现最好的建模策略是那种你认为可能有效且可以快速实施的策略。迭代是复杂机器学习问题中的一个事实。
- en: So let’s give it a shot. We have a transformer and a dataset, let’s train this
    sucker.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 所以让我们试一试。我们有一个变换器和数据集，让我们训练这个家伙。
- en: Training the Model
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Before I actually train the model, I’m doing a bit of setup work:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 在我实际训练模型之前，我做一些设置工作：
- en: '[PRE11]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Transformers can take a while to train (I trained this model over the course
    of several days). Also, Google Colab has a tendency to log you out of a session
    if you’ve been away from the keyboard for too long. As a result, it was vital
    to save model checkpoints somewhere such that I could recover and resume training.
    This code allows me to recover the most recent checkpoint from my Google Drive
    before I continue. If there’s no checkpoint, it defines a new model.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器模型训练可能需要一段时间（我花了几天时间来训练这个模型）。此外，Google Colab 有一个倾向，如果你长时间离开键盘，它会让你登出会话。因此，将模型检查点保存在某个地方至关重要，这样我就可以恢复并继续训练。这段代码允许我在继续之前从我的
    Google Drive 中恢复最新的检查点。如果没有检查点，它将定义一个新的模型。
- en: this code also does some other quality of life things, like turning our training
    data into a `DataLoader` that takes care of creating batches and shuffling data
    across epochs, and making sure our model and data are both on the GPU.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码还做了一些其他提高生活质量的事情，比如将我们的训练数据转换为 `DataLoader`，它负责创建批次并在每个时期内打乱数据，并确保我们的模型和数据都在
    GPU 上。
- en: There’re a few things going on in the actual training code. Let’s go through
    section by section.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 实际训练代码中发生了一些事情。让我们逐节进行讨论。
- en: '[PRE12]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![An example of some of the output when training the model. Training was done
    over the course of several days.](../Images/9705d7c7ec42bff17749aaebf75533e8.png)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![模型训练过程中的一些输出示例。训练持续了几天。](../Images/9705d7c7ec42bff17749aaebf75533e8.png)'
- en: An example of some of the output when training the model. Training was done
    over the course of several days.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练过程中的一些输出示例。训练持续了几天。
- en: I have this little block of code for my own debugging purposes. I defined a
    function that gives me the total number of trainable parameters in my model, which
    is useful in me getting a rough idea of how large the model I’m training is.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一小块代码，用于自己的调试目的。我定义了一个函数，它可以给我模型中可训练参数的总数，这对于我大致了解我正在训练的模型大小非常有用。
- en: '[PRE13]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Next I’m defining my "criterion", which is a fancy way of saying how I’ll be
    judging how right or wrong the model is. Here’ I’m using cross entropy, which
    is a standard loss function that compares what the model predicted, and what it
    should have predicted and spits out a big number if the model was very wrong and
    a small number if the model was mostly right.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将定义我的“标准”，这是一种说法，即我将如何判断模型的对错。在这里，我使用交叉熵，这是一个标准的损失函数，它比较模型预测的结果和应该预测的结果，如果模型预测错误很多，则输出一个大数字，如果模型预测大部分正确，则输出一个小数字。
- en: '[PRE14]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Then we get into our actual training loop by first defining how many times we
    want to iterate through our dataset, then iterating over our dataset. Here I’m
    using `tqdm` to render fancy little progress bars which allow me to observe how
    quickly training is going.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们通过首先定义我们想要遍历数据集的次数，然后遍历数据集来进入实际的训练循环。在这里，我使用`tqdm`来渲染漂亮的进度条，这使我能够观察训练的进度。
- en: '[PRE15]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: First thing we do in a training iteration is unpack the batch
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练迭代中，我们首先解包批次
- en: '[PRE16]'
  id: totrans-256
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Then we reset the gradients of the optimizer. I think the intricacies of training
    are out of scope for this article, but if you want to learn more check out my
    [beginner’s introduction to AI](https://medium.com/towards-data-science/ai-for-the-absolute-novice-intuitively-and-exhaustively-explained-7b353a31e6d7)
    and my [article on gradients](https://medium.com/towards-data-science/what-are-gradients-and-why-do-they-explode-add23264d24b)
    for more information. For our purposes, we’ll just say this line of code gets
    us ready to learn from a new batch of examples.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们重置优化器的梯度。我认为训练的复杂性超出了这篇文章的范围，但如果你想了解更多，请查看我的[AI入门介绍](https://medium.com/towards-data-science/ai-for-the-absolute-novice-intuitively-and-exhaustively-explained-7b353a31e6d7)和我的[关于梯度的文章](https://medium.com/towards-data-science/what-are-gradients-and-why-do-they-explode-add23264d24b)以获取更多信息。对于我们来说，我们只需说这一行代码使我们准备好从新的示例批次中学习。
- en: '[PRE17]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'at this point `y_batch` represents the entire solution sequence. We want to
    turn that solution into two representations, what we would be putting into the
    model and the predictions we would like to get back. For instance, for this sequence:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，`y_batch`代表整个解决方案序列。我们希望将这个解决方案转换成两种表示，即我们想要放入模型中的内容和我们希望从模型中获取的预测。例如，对于这个序列：
- en: '`<sos>, move 0, move 1, move 3, <eos>`'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '`<sos>，移动0，移动1，移动3，<eos>`'
- en: 'we would want to put in this sequence into our decoder:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望将这个序列放入我们的解码器：
- en: '`<sos>, move 0, move 1, move 3`'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '`<sos>，移动0，移动1，移动3`'
- en: 'and hope to get back this sequence from the decoder output:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 并希望从解码器输出中获取这个序列：
- en: '`move 0, move 1, move 3, <eos>`'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '`移动0，移动1，移动3，<eos>`'
- en: In this block of code we’re defining the input to the model, getting the models
    prediction of what moves should be made, and getting what we would have liked
    the model to have predicted
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个代码块中，我们定义了模型的输入，获取模型对应该执行哪些移动的预测，以及我们希望模型预测的内容
- en: '[PRE18]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Then we’re figuring out how wrong the model was, keeping track of that information
    to get an idea of if the models getting better, and updating our model to be ever
    so slightly less bad at that particular example.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们确定模型有多错误，跟踪这些信息以了解模型是否在改进，并更新我们的模型，使其在该特定示例上稍微不那么糟糕。
- en: '[PRE19]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: We’re also doing some other quality of life stuff, like printing out statuses
    and saving model checkpoints.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还在做一些提高生活质量的事情，比如打印状态和保存模型检查点。
- en: '[PRE20]'
  id: totrans-270
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: And, tadah, we have defined a Rubik’s Cube solving model and trained it. Let’s
    see how good it is.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 哇，我们已经定义了一个魔方解决模型并对其进行了训练。让我们看看它有多好。
- en: Testing our Model
  id: totrans-272
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试我们的模型
- en: Now that we’ve trained our model we can go ahead and apply it to some newly
    shuffled Rubik’s Cubes and see how it performs. This code creates a new Rubik’s
    Cube and generates a sequence of move predictions until the model outputs the
    `<stop>` token
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经训练了我们的模型，我们可以将其应用于一些新打乱的魔方，并查看其表现。此代码创建一个新的魔方并生成一系列移动预测，直到模型输出`<stop>`标记
- en: '[PRE21]'
  id: totrans-274
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'We can adjust `NUMBER_OF_SHUFFLES` to observe how well our model solves a few
    Rubik’s Cubes of various difficulty:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以调整`NUMBER_OF_SHUFFLES`来观察我们的模型解决各种难度的一些魔方的情况：
- en: '![solving a 3 move scramble](../Images/dfb7e1b7a17638507960d61b5ebebf9e.png)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![解决3步打乱](../Images/dfb7e1b7a17638507960d61b5ebebf9e.png)'
- en: solving a 3 move scramble
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 解决3步打乱
- en: '![solving a 4 move scramble](../Images/99050734b8c5fab0adb8de1c507c96b3.png)'
  id: totrans-278
  prefs: []
  type: TYPE_IMG
  zh: '![解决4步打乱](../Images/99050734b8c5fab0adb8de1c507c96b3.png)'
- en: solving a 4 move scramble
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 解决4步打乱
- en: '![solving a 5 move scramble](../Images/9fe8533e53193ac44f300ddf305e549b.png)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![解决5步打乱](../Images/9fe8533e53193ac44f300ddf305e549b.png)'
- en: solving a 5 move scramble
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 解决5步打乱
- en: '![solving a 6 move scramble](../Images/52b2915c01c8c254b9d14c447cf04447.png)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
  zh: '![解决6步打乱](../Images/52b2915c01c8c254b9d14c447cf04447.png)'
- en: solving a 6 move scramble
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 解决6步打乱
- en: It’s doing a pretty good job, certainly much better than I can.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 它做得相当不错，当然比我好得多。
- en: 'It does appear that the general assumption that the model would have a tendency
    to ignore erroneous moves was at least somewhat correct. Here’s a few examples
    of the model predicting better solutions than reversing shuffling:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来，普遍认为模型倾向于忽略错误移动的假设至少是部分正确的。这里有一些模型预测比反转打乱更好的解决方案的例子：
- en: '![](../Images/86b90da4d125d334653018f21aec48d7.png)![](../Images/c833f7e824dd345526848c88bf634796.png)![](../Images/ba8c5309b9db4ed4e6885e261258a772.png)'
  id: totrans-286
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/86b90da4d125d334653018f21aec48d7.png)![](../Images/c833f7e824dd345526848c88bf634796.png)![](../Images/ba8c5309b9db4ed4e6885e261258a772.png)'
- en: 'It’s not all roses, though. The model appears to be somewhat inconsistent at
    solving a small number of scrambles:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，并非一切都很顺利。模型在解决少量打乱时似乎有些不一致：
- en: '![](../Images/2ef15cad2e4750d70c7cf2700355d250.png)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ef15cad2e4750d70c7cf2700355d250.png)'
- en: and for complex scrambles, (like over 7) the model is pretty much hopeless.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 对于复杂的打乱（如超过7步），模型几乎毫无希望。
- en: '![](../Images/430d1917ccde8d02a84061dae5317dfe.png)'
  id: totrans-290
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/430d1917ccde8d02a84061dae5317dfe.png)'
- en: 'There’s one easy solution to this problem: just train for longer. Transformers
    benefit from a ton of training data and a ton of training time. I have no doubt
    that, given a few weeks of training this model could learn to solve pretty much
    any Rubik’s Cube you throw at it. You could always increase some of the model
    parameters to make the model better at understanding intricacies about the problem.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题的简单方法之一：只是训练更长的时间。Transformer从大量的训练数据和大量的训练时间中受益。我毫不怀疑，如果给这个模型几周的训练时间，它就能学会解决你扔给它的几乎任何魔方。你总是可以增加一些模型参数，使模型更好地理解问题的复杂性。
- en: 'There’s another solution as well: use a better training strategy. Supervised
    learning is ok, but this erroneous move issue adds a lot of noise to the training
    set which likely becomes exacerbated as the number of shuffles grows. I think
    it’s likely that using the reverse of the shuffling sequence makes less and less
    sense the longer the sequence gets, meaning we would need a fair amount of training
    time to get to the point of a highly performant model.'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种解决方案是使用更好的训练策略。监督学习是可以的，但这个错误移动问题给训练集增加了大量的噪声，这可能会随着打乱次数的增加而加剧。我认为，随着序列变长，使用打乱序列的逆序变得越来越没有意义，这意味着我们需要相当多的训练时间才能达到高性能模型的程度。
- en: If you want a super performant Rubik’s Cube right now, go ahead and throw the
    code described in this article at a GPU, wait a while, and see what happens. Personally,
    I’m more interested in exploring a better approach to modeling.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你现在想要一个超级高效的魔方，就赶紧把这篇文章中描述的代码扔到GPU上，稍等片刻，看看会发生什么。就我个人而言，我更感兴趣的是探索更好的建模方法。
- en: In a future article I’ll be fine-tuning this model with reinforcement learning
    which, hopefully, will allow the model to become much more robust very quickly.
    So, stay tuned.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来的文章中，我将使用强化学习微调这个模型，这有望使模型快速变得非常鲁棒。所以，请保持关注。
- en: Conclusion
  id: totrans-295
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article we created a model that can solve Rubik’s Cubes from scratch
    by learning based off of a synthetic dataset of shuffled Rubik’s Cubes. First,
    we created a way to define a Rubik’s Cube such that we could shuffle and solve
    it, then we used that definition to generate a dataset of 2 million shuffled Rubik’s
    Cubes and their solutions. We figured out how to tokenize, embed, and positionally
    encode both the Rubik’s Cube and series of moves, then created a transformer which
    could accept those moves and output next move predictions. We trained that transformer
    based on our data and tested it on new Rubik’s Cubes. In the end, we got a promising
    first proof of concept model which we’ll use for future exploration around this
    topic.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们创建了一个模型，可以通过学习基于打乱魔方的合成数据集从头开始解决魔方。首先，我们创建了一种定义魔方的办法，这样我们就可以打乱并解决它，然后我们使用这个定义生成了200万个打乱魔方的数据集及其解决方案。我们找到了如何标记化、嵌入和位置编码魔方和一系列移动的方法，然后创建了一个可以接受这些移动并输出下一步预测的Transformer。我们根据我们的数据训练了这个Transformer，并在新的魔方上进行了测试。最后，我们得到了一个有希望的第一代概念模型，我们将用它来探索这个主题的未来。
- en: Join Intuitively and Exhaustively Explained
  id: totrans-297
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参加直观且详尽的解释
- en: 'At IAEE you can find:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 在IAEE，你可以找到：
- en: Long form content, like the article you just read
  id: totrans-299
  prefs:
  - PREF_UL
