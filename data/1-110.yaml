- en: Why Storytelling With Data Matters for Business and Data Analysts
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么数据讲故事对商业和数据分析师来说很重要
- en: 原文：[https://towardsdatascience.com/why-storytelling-with-data-matters-for-business-and-data-analysts/](https://towardsdatascience.com/why-storytelling-with-data-matters-for-business-and-data-analysts/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-storytelling-with-data-matters-for-business-and-data-analysts/](https://towardsdatascience.com/why-storytelling-with-data-matters-for-business-and-data-analysts/)
- en: <mdspan datatext="el1762801975704" class="mdspan-comment">For any organization</mdspan>
    that works with data, big or small, what truly sets the tone for the future is
    making the best sense of that data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762801975704" class="mdspan-comment">对于任何与数据打交道的企业</mdspan>，无论大小，真正为未来定调的是对数据的最佳解读。
- en: As a professional working in data or business analytics, your role goes beyond
    producing reports for you have the power to transform raw data into stories that
    inspire action. We all know the feeling where we spend hours creating dashboards,
    report performance metrics, or put together Excel spreadsheets only to find that
    our stakeholders still struggle to translate those numbers into meaningful decisions.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作为在数据或商业分析领域工作的专业人士，你的角色不仅限于制作报告，因为你有能力将原始数据转化为能够激发行动的故事。我们都知道那种感觉，我们花费数小时创建仪表板、报告绩效指标或制作Excel电子表格，结果发现我们的利益相关者仍然难以将这些数字转化为有意义的决策。
- en: '**That’s where storytelling comes in!**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**这就是讲故事的作用所在！**'
- en: With the right mindset, tools, and approach, you can move beyond spreadsheets
    and charts to frame data in a way that builds stronger business cases, unlocks
    agility, and drives alignment across teams.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 借助正确的思维方式、工具和方法，你可以超越电子表格和图表，以构建更强大的商业案例、提高敏捷性并推动团队之间的协同。
- en: 'Too often, analysts end up sharing data as rows and columns in an Excel file
    or as dense reports. This used to be me five years ago where the information was
    all there but it rarely drove any action because the consumers of my data would
    struggle to find the “so what.” Now, contrast that with a single powerful takeaway
    slide: a clear headline, compelling visuals, and a strong, concise recommendation
    based on the data you analyzed — that same data has now suddenly become valuable,
    actionable, and persuasive.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 太频繁了，分析师最终只是将数据作为Excel文件中的行和列或作为密集的报告来分享。五年前的我就是这样，信息都在那里，但很少能驱动任何行动，因为我的数据消费者们很难找到“所以呢”。现在，对比一下一张单一有力的总结幻灯片：一个清晰的标题、引人入胜的视觉元素，以及基于你分析的数据的强大、简洁的建议——同样的数据现在突然变得有价值、可操作和有说服力。
- en: That’s the difference between reporting numbers and telling a story with them!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是用数字报告和用它们讲故事之间的区别！
- en: From my experience working alongside data leaders and spending almost five years
    as an analytics consultant, I’ve learned that **storytelling with data is what
    turns raw information into insight.** Through this article, my hope is to share
    practical approaches to help you start telling stories with your data so you can
    make smarter, faster, and more confident decisions, without getting lost in the
    numbers.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 从我与数据领导者并肩工作以及作为分析顾问近五年的经验来看，我了解到**用数据讲故事是将原始信息转化为洞察力的关键**。通过这篇文章，我的希望是分享实用的方法，帮助你开始用你的数据讲故事，以便你能做出更明智、更快、更有信心的决策，而不会迷失在数字中。
- en: How can you as a data professional start telling stories with data?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 作为数据专业人士，你如何开始用数据讲故事？
- en: Start by Asking the Right Questions
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从提出正确的问题开始
- en: 'Many analysts see and treat data as a technical element but it can go way beyond
    that. Look at data as your key partner in the decision-making processes.When you
    shift your mindset this way, you begin to connect analysis to action. A great
    way to start is by asking:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 许多分析师将数据和处理视为一个技术元素，但它可以远远超出这一点。将数据视为你在决策过程中的关键合作伙伴。当你这样转变思维方式时，你开始将分析连接到行动。一个很好的开始方式是问自己：
- en: What decision am I trying to make?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我试图做出什么决策？
- en: What data can help inform this decision?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些数据可以帮助告知这个决策？
- en: What insights am I missing that prevent me from reaching the goal?
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我错过了哪些洞察力，阻止我达到目标？
- en: This shift is the first step to transform your role from reporting information
    to guiding smarter decisions.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变是将你的角色从报告信息转变为引导更明智决策的第一步。
- en: Focus on the Right Data (Not All Data)
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关注正确的数据（而不是所有数据）
- en: One of the biggest mistakes we need to avoid as analysts is drowning in too
    much data. More numbers don’t always mean better insights. Your skill as an analyst
    is in identifying what data serves you the most, filtering the noise and zeroing
    in on the data that directly supports your goals.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们作为分析师需要避免的最大错误之一是陷入过多的数据中。更多的数字并不总是意味着更好的洞察力。你作为分析师的技能在于识别对你最有用的数据，过滤噪音，并专注于直接支持你目标的数据。
- en: How to Identify Actionable Metrics
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如何识别可操作的指标
- en: 'Define Your Objectives: What are you trying to achieve? Growth, efficiency,
    customer satisfaction?'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义你的目标：你试图实现什么？增长、效率、客户满意度？
- en: 'Use Leading Indicators: Instead of just tracking past performance, look for
    signals that predict future success. (e.g., Customer engagement today can predict
    retention tomorrow.)'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用领先指标：不要仅仅跟踪过去的绩效，寻找预示未来成功的信号。（例如，今天的客户参与度可以预测明天的留存率。）
- en: 'Keep It Simple: If a metric doesn’t help you make a decision, maybe it is just
    noise.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简化：如果一个指标不能帮助你做出决策，那么它可能只是噪音。
- en: 'For example, a sales report may consist of some 200 columns and thousands of
    rows, allowing you to calculate many metrics. But instead of tracking everything,
    the sharper questions to filter your data would be: *which customers convert fastest,
    which strategies close deals quicker, or what patterns drive revenue?* That’s
    where action lives.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一份销售报告可能包含约200列和数千行，让你能够计算许多指标。但不要跟踪一切，更尖锐的问题来过滤你的数据将是：*哪些客户转换最快，哪些策略更快地关闭交易，或者什么模式推动收入？*
    这就是行动所在。
- en: This approach helps you act on insights rather than just observing numbers.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法帮助你基于洞察力采取行动，而不仅仅是观察数字。
- en: Build a Data-Driven Culture in Your Team
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在你的团队中建立一个数据驱动文化
- en: As an analyst, your role is to work with data but wouldn’t it be fun if you
    encourage your team to embrace it too!? When everyone on your team understands
    the value of storytelling with data, decisions can become more impactful.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 作为分析师，你的角色是与数据工作，但如果你能鼓励你的团队也拥抱它，那岂不是很有趣！当你的团队中的每个人都理解用数据讲故事的价值时，决策可以变得更加有影响力。
- en: '*How to Build a Data-Driven Team*:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '*如何建立一个数据驱动团队*：'
- en: 'Encourage Data Storytelling: Numbers alone can be dry so ask your team to present
    insights with context, trends, and potential actions that tell stories, not stats.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励数据讲故事：数字本身可能很枯燥，所以请让你的团队用背景、趋势和潜在行动来呈现洞察力，讲述故事，而不是统计数据。
- en: 'Make it simple: Create reports and dashboards that non-technical teammates
    and stakeholders can easily grasp.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化：创建非技术团队成员和利益相关者可以轻松理解的报告和仪表板。
- en: 'Ask for Data in Meetings: When discussing challenges or opportunities with
    the team, ask, “what does the data tell us?”'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在会议中要求数据：当与团队讨论挑战或机遇时，问，“数据告诉我们什么？”
- en: A workforce that embraces data at every level will be far more agile and effective
    in decision-making.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个层面都拥抱数据的劳动力将更加敏捷和高效，在决策方面。
- en: Go Beyond Data and Start Communicating Impact
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 超越数据，开始沟通影响
- en: 'Data analytics shouldn’t just be about numbers; it should tell a story that
    drives action and to turn analytics into powerful narratives for smarter business
    decisions:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析不应仅仅关于数字；它应该讲述一个推动行动的故事，并将分析转化为强大的叙事，以支持更明智的商业决策：
- en: 'Create Decision Loops That Tell a Story Over Time: Instead of waiting for perfect
    data, use small, iterative loops to parse through your data and refine your story
    as you go. Review short-term outcomes with long-term trends and adjust strategies
    to show how each decision builds toward a bigger business narrative to inform
    long-term planning.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建随时间讲述故事的决策循环：不要等待完美的数据，使用小的、迭代的循环来解析你的数据，并在过程中完善你的故事。用短期结果与长期趋势进行审查，并调整策略，以展示每个决策如何构建更大的商业叙事，从而为长期规划提供信息。
- en: 'Use Predictive Analytics: Predictive models turn historical data into future-focused
    stories. For example, retail companies use sales patterns not just to plan inventory,
    but to anticipate customer behavior and craft campaigns that resonate with what
    comes next.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用预测分析：预测模型将历史数据转化为面向未来的故事。例如，零售公司使用销售模式不仅来计划库存，而且来预测客户行为，制定与未来产生共鸣的活动。
- en: 'Leverage AI and Automation: AI tools can analyze large data sets quickly, helping
    you uncover insights that might take humans much longer to spot. Automation tools
    also free analysts to focus on the “why” behind the numbers—crafting insights
    that inspire confidence and drive change. If you haven’t explored AI-driven analytics
    yet, now is the time.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用人工智能和自动化：人工智能工具可以快速分析大量数据集，帮助你发现可能需要人类更长的时间才能发现的信息。自动化工具也让分析师能够专注于数字背后的“为什么”——制定出能够激发信心并推动变革的见解。如果你还没有探索过由人工智能驱动的分析，现在是时候了。
- en: '**In summary, here’s your action plan to start telling stories with data:**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**总结，以下是你开始用数据讲故事的行动计划**：'
- en: 'To make your insights truly resonate with the consumers of data, you need to
    go beyond the conventional thoughts of an analyst and start thinking like a storyteller
    and to do so:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要让你的见解真正与数据消费者产生共鸣，你需要超越分析师的常规思维，开始像讲故事的人一样思考，为此：
- en: '**Identify Business Objectives:** Clearly identify the issue or opportunity
    that requires a decision. Conduct Interviews with the stakeholders and gather
    all business context and that will guide you for your next step of data selection.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定商业目标**：明确识别需要决策的问题或机会。与利益相关者进行访谈，收集所有商业背景信息，这将指导你进行下一步的数据选择。'
- en: '**Define the Story You’re Trying to Tell:** Every great story starts with a
    purpose. As an analyst, figure out what is the key question or decision you’re
    trying to influence and identify the business moment that your story will support,
    to inform your data strategy.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义你想要讲述的故事**：每个伟大的故事都始于一个目的。作为一名分析师，弄清楚你试图影响的关键问题或决策是什么，并确定你的故事将支持的商业时刻，以指导你的数据策略。'
- en: '**Identify the Data That Shapes Your Narrative:** Determine the data sets you
    will require to tell the story because not all data deserves to be used. You also
    need to identify what numbers or trends help explain what’s happening and why?'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定塑造你叙述的数据**：确定你需要的数据集来讲述这个故事，因为并非所有数据都值得使用。你还需要确定哪些数字或趋势有助于解释正在发生的事情以及为什么？'
- en: Where are the gaps that might change the story?
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些差距可能会改变故事？
- en: Are you focusing on *leading indicators* that reveal what’s coming next, or
    only on historical data?
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是否专注于*领先指标*来揭示即将发生的事情，或者只是关注历史数据？
- en: '**Explore and Visualize the Data:** Review and evaluate all available resources
    (data sources, dashboards, reports, or analytics tools) based on alignment with
    goals, potential risks and benefits, and resource availability to uncover patterns
    and themes. A correct data analysis can help quantify the potential impact of
    each option, allowing for a more objective selection.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索和可视化数据**：根据与目标的一致性、潜在风险和收益以及资源可用性，审查和评估所有可用资源（数据来源、仪表板、报告或分析工具），以揭示模式和主题。正确的数据分析可以帮助量化每个选项的潜在影响，从而允许进行更客观的选择。'
- en: '**Interpret the ‘Why,’ Not Just the ‘What’:** Numbers are facts and so they
    can tell you *what’s the matter* but stories explain *why they matter*. Translate
    your findings into insights your audience can connect with. Use visuals, comparisons,
    or real-world examples to make complex points simple and memorable and transform
    abstract metrics into something people can see and feel.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解释‘为什么’，而不仅仅是‘什么’**：数字是事实，所以它们可以告诉你*出了什么问题*，但故事解释*为什么它们很重要*。将你的发现转化为受众能够产生共鸣的见解。使用视觉、比较或现实世界的例子，使复杂的问题简单且易于记忆，并将抽象的指标转化为人们能够看到和感受到的东西。'
- en: '**Share the Story and Track Its Impact:** Develop a clear socialization plan
    for your data story to establish metrics to monitor effectiveness. I strongly
    recommend assessing the impact of your story, how it is being seen and allowing
    for adjustments if necessary. Ask for actions that it inspired.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分享故事并跟踪其影响**：为你的数据故事制定一个清晰的社会化计划，以建立衡量有效性的指标。我强烈建议评估你故事的影响，了解它是如何被看待的，并在必要时进行调整。询问它激发的行动。'
- en: The best leaders don’t just collect data, they use that data to make smart,
    confident decisions. By shifting your mindset, focusing on the right numbers,
    building a data-driven culture, and avoiding common pitfalls, you can transform
    raw data into clear business action.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的领导者不仅收集数据，还利用这些数据做出明智、自信的决策。通过转变你的思维方式，关注正确的数字，建立数据驱动文化，并避免常见陷阱，你可以将原始数据转化为清晰的业务行动。
- en: Ready to make data work for you? Start today with one decision and let the storytelling
    lead the way.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 准备让数据为你工作了吗？从今天开始，做出一个决定，让讲故事引领方向。
- en: '* * *'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: That’s it from my end on this blog post. Thank you for reading! I hope you found
    it an interesting read. Let me know in the comments about your experience with
    storytelling, your journey in data, and what you are looking for in 2025!
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我在这篇博客文章中的全部内容。感谢您的阅读！希望您觉得这是一篇有趣的阅读。请在评论中告诉我您在讲故事、数据之旅以及您在2025年寻找什么方面的体验！
- en: Happy Data Tenting!
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 高兴地进行数据露营！
- en: '*Rashi is a data wiz from Chicago who loves to analyze data and create data
    stories to communicate insights. She’s a full-time healthcare data analytics consultant
    and likes to write blogs about data on weekends with a cup of coffee…*'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*拉希是一位来自芝加哥的数据专家，她喜欢分析数据并创建数据故事来传达洞察。她是一位全职的医疗数据分析顾问，喜欢在周末一边喝咖啡一边写关于数据的博客…*'
