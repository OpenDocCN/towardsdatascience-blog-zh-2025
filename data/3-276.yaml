- en: The Method of Moments Estimator for Gaussian Mixture Models
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高斯混合模型矩估计法
- en: 原文：[https://towardsdatascience.com/the-method-of-moments-estimator-for-gaussian-mixture-models/](https://towardsdatascience.com/the-method-of-moments-estimator-for-gaussian-mixture-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-method-of-moments-estimator-for-gaussian-mixture-models/](https://towardsdatascience.com/the-method-of-moments-estimator-for-gaussian-mixture-models/)
- en: 'Audio processing is one of the most important application domains of digital
    signal processing (DSP) and machine learning. Modeling acoustic environments is
    an essential step in developing digital audio processing systems such as: speech
    recognition, speech enhancement, acoustic echo cancellation, etc.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 音频处理是数字信号处理（DSP）和机器学习最重要的应用领域之一。建模声学环境是开发数字音频处理系统（如语音识别、语音增强、声学回声消除等）的必要步骤。
- en: Acoustic environments are filled with background noise that can have multiple
    sources. For example, when sitting in a coffee shop, walking down the street,
    or driving your car, you hear sounds that can be considered as interference or
    background noise. Such interferences do not necessarily follow the same statistical
    model, and hence, a mixture of models can be useful in modeling them.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 声学环境中充满了可能具有多个来源的背景噪声。例如，当坐在咖啡馆里，走在街上，或者开车时，你会听到可以被认为是干扰或背景噪声的声音。这种干扰不一定遵循相同的统计模型，因此，在建模它们时，使用模型混合可能是有用的。
- en: Those statistical models can also be useful in classifying acoustic environments
    into different categories, e.g., a quiet auditorium (class 1), or a slightly noisier
    room with closed windows (class 2), and a third option with windows open (class
    3). In each case, the level of background noise can be modeled using a mixture
    of noise sources, each happening with a different probability and with a different
    acoustic level.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些统计模型在将声学环境分类到不同类别时也非常有用，例如，一个安静的礼堂（类别1），或者窗户关闭的稍微嘈杂的房间（类别2），以及窗户打开的第三种情况。在每种情况下，背景噪声的水平都可以使用不同概率和不同声学水平的噪声源混合来建模。
- en: Another application of such models is in the simulation of acoustic noise in
    different environments based on which DSP and machine learning solutions can be
    designed to solve specific acoustic problems in practical audio systems such as
    interference cancellation, echo cancellation, speech recognition, speech enhancement,
    etc.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模型的另一个应用是基于不同环境的声学噪声模拟，基于此，可以设计DSP和机器学习解决方案来解决实际音频系统中的特定声学问题，如干扰消除、回声消除、语音识别、语音增强等。
- en: '![](../Images/b337b1266c0db685e64cc3697299e88b.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b337b1266c0db685e64cc3697299e88b.png)'
- en: Photo by [Matoo.Studio](https://unsplash.com/@matoovisato) on [Unsplash](https://unsplash.com)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Matoo.Studio](https://unsplash.com/@matoovisato) 在 [Unsplash](https://unsplash.com)
    提供
- en: A simple statistical model that can be useful in such scenarios is the **Gaussian
    mixture model** (GMM) in which each of the different noise sources is assumed
    to follow a specific Gaussian distribution with a certain variance. All the distributions
    can be assumed to have zero mean while still being sufficiently accurate for this
    application, as also shown in this [article](https://www.mdpi.com/1424-8220/19/12/2827#:~:text=The%20GMM%20is%20an%20alternative,i.e.%2C%20in%20the%20target%20scenario.).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在此类场景中，一个有用的简单统计模型是**高斯混合模型**（GMM），其中假设每个不同的噪声源都遵循特定的高斯分布，具有特定的方差。所有分布都可以假设具有零均值，同时对于此应用来说足够准确，正如这篇[文章](https://www.mdpi.com/1424-8220/19/12/2827#:~:text=The%20GMM%20is%20an%20alternative,i.e.%2C%20in%20the%20target%20scenario.)所示。
- en: Each of the GMM distributions has its own probability of contributing to the
    background noise. For example, there could be a consistent background noise that
    occurs most of the time, while other sources can be intermittent, such as the
    noise coming through windows, etc. All this has to be considered in our statistical
    model.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 每个高斯混合分布都有其自身对背景噪声的贡献概率。例如，可能存在一种持续存在的背景噪声，它大多数时间都会出现，而其他来源的噪声可能是间歇性的，例如通过窗户传入的噪声等。所有这些都需要在我们的统计模型中考虑。
- en: An example of simulated GMM data over time (normalized to the sampling time)
    is shown in the figure below in which there are two Gaussian noise sources, both
    of zero mean but with two different variances. In this example, the lower variance
    signal occurs more often with 90% probability hence the intermittent spikes in
    the generated data representing the signal with higher variance.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 下面图表展示了模拟的GMM数据随时间的变化（归一化到采样时间），其中有两个高斯噪声源，它们的均值都是零，但方差不同。在这个例子中，低方差信号以90%的概率出现，因此在生成数据中表现为间歇性的尖峰，代表具有更高方差的信号。
- en: '![](../Images/f6d03ecc11a6c3fd5951fb4792227c7e.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f6d03ecc11a6c3fd5951fb4792227c7e.png)'
- en: In other scenarios and depending on the application, it could be the other way
    around in which the high variance noise signal occurs more often (as will be shown
    in a later example in this article). Python code used to generate and analyze
    GMM data will also be shown later in this article.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他场景和根据应用的不同，情况可能正好相反，即高方差噪声信号出现的频率更高（将在本文后面的示例中展示）。本文后面还将展示用于生成和分析高斯混合模型（GMM）数据的Python代码。
- en: Turning to a more formal modelling language, let’s assume that the background
    noise signal that is collected (using a high-quality microphone for example) is
    modeled as realizations of independent and identically distributed (iid) random
    variables that follow a GMM as shown below.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 转到更正式的建模语言，假设收集到的背景噪声信号（例如，使用高质量的麦克风）被建模为独立同分布（iid）随机变量的实现，这些随机变量遵循以下所示的高斯混合模型（GMM）。
- en: '![](../Images/1cf6c3a4b257d0f9bddc9ab704cddbf9.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1cf6c3a4b257d0f9bddc9ab704cddbf9.png)'
- en: The modeling problem thus boils down to estimating the model parameters (i.e.,
    p1, σ²1, and σ²2) using the observed data (iid). In this article, we will be using
    the [method of moments](https://towardsdatascience.com/method-of-moments-estimation-with-python-code-f19102ce5897)
    (MoM) estimator for such purpose.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，建模问题简化为使用观测数据（独立同分布）估计模型参数（即，p1、σ²1和σ²2）。在本文中，我们将使用[矩估计法](https://towardsdatascience.com/method-of-moments-estimation-with-python-code-f19102ce5897)（MoM）估计量来完成这一目的。
- en: 'To simplify things further, we can assume that the noise variances (σ²1 and
    σ²2) are known and that only the mixing parameter (p1) is to be estimated. The
    MoM estimator can be used to estimate more than one parameter (i.e., p1, σ²1,
    and σ²2) as shown in Chapter 9 of the book: “*Statistical Signal Processing: Estimation
    Theory”,* by Steven Kay. However, in this example, we will assume that only p1
    is unknown and to be estimated.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步简化问题，我们可以假设噪声方差（σ²1和σ²2）是已知的，并且只有混合参数（p1）需要估计。MoM估计量可以用来估计多个参数（即，p1、σ²1和σ²2），如书中第9章所述：“*统计信号处理：估计理论*”，作者Steven
    Kay。然而，在这个例子中，我们将假设只有p1是未知的，需要估计。
- en: Since both gaussians in the GMM are zero mean, we will start with the second
    moment and try to obtain the unknown parameter p1 as a function of the second
    moment as follows.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 由于GMM中的两个高斯分布都是零均值，我们将从二阶矩开始，并尝试将未知参数p1作为二阶矩的函数来获得如下。
- en: '![](../Images/d035c8b8f7b85dd96fe41c81edcfa6e3.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d035c8b8f7b85dd96fe41c81edcfa6e3.png)'
- en: 'Note that another simple method to obtain the moments of a random variable
    (e.g., second moment or higher) is by using the moment generating function (MGF).
    A good textbook in probability theory that covers such topics, and more is: “*Introduction
    to Probability for Data Science*”, by Stanley H. Chan.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，另一种获取随机变量（例如，二阶矩或更高阶矩）矩的方法是使用矩生成函数（MGF）。一本涵盖此类主题以及更多内容的优秀概率论教科书是：Stanley
    H. Chan所著的“*数据科学概率导论*”。
- en: Before proceeding any further, we would like to quantify this estimator in terms
    of the fundamental properties of estimators such as bias, variance, consistency,
    etc. We will verify this later numerically with a Python example.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，我们希望用估计量的基本属性（如偏差、方差、一致性等）来量化这个估计量。我们将在后面的Python示例中通过数值验证这一点。
- en: Starting with the estimator bias, we can show that the above estimator of p1
    is indeed unbiased as follows.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 从估计量的偏差开始，我们可以证明上述p1的估计量确实是无偏的如下。
- en: '![](../Images/0bb2377d86ad61e683385a14a5a36413.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0bb2377d86ad61e683385a14a5a36413.png)'
- en: We can then proceed to derive the variance of our estimator as follows.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以继续推导出我们估计量的方差如下。
- en: '![](../Images/378749c950afbd9fea44de98e4247ce3.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/378749c950afbd9fea44de98e4247ce3.png)'
- en: It is also clear from the above analysis that the estimator is consistent since
    it is unbiased and also its variance decreases when the sample size (N) increases.
    We will also use the above formula of the p1 estimator variance in our Python
    numerical example (shown in detail later in this article) when comparing theory
    with practical numerical results.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 从上述分析中也可以清楚地看出，估计量是一致的，因为它是无偏的，并且当样本量（N）增加时，其方差也会减小。我们还将使用上述p1估计量方差的公式在我们的Python数值示例中（本文后面将详细展示）比较理论与实际数值结果。
- en: Now let’s introduce some Python code and do some fun stuff!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们介绍一些Python代码，做一些有趣的事情！
- en: First, we generate our data that follows a GMM with zero means and standard
    deviations equal to 2 and 10, respectively, as shown in the code below. In this
    example, the mixing parameter p1 = 0.2, and the sample size of the data equals
    1000.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们生成遵循具有零均值和标准差分别为2和10的GMM的数据，如下所示。在这个例子中，混合参数p1 = 0.2，数据的样本量为1000。
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then we plot the histogram of the generated data versus the probability density
    function as shown below. The figure shows the contribution of both Gaussian densities
    in the overall GMM, with each density scaled by its corresponding factor.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们绘制生成数据的直方图与概率密度函数的对比图，如下所示。该图显示了整体GMM中高斯密度的贡献，每个密度都按其对应因子缩放。
- en: '![](../Images/72736c1aa2366088f6d3fc408ffe28ef.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/72736c1aa2366088f6d3fc408ffe28ef.png)'
- en: The Python code used to generate the above figure is shown below.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 以下Python代码展示了生成上述图的代码。
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: After that, we compute the estimate of the mixing parameter p1 that we derived
    earlier using MoM and which is shown here again below for reference.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们计算了之前使用MoM推导出的混合参数p1的估计值，此处再次展示以供参考。
- en: '![](../Images/699e00f133aa8646571d0140e393a7ad.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/699e00f133aa8646571d0140e393a7ad.png)'
- en: The Python code used to compute the above equation using our GMM sample data
    is shown below.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 以下Python代码展示了使用我们的GMM样本数据计算上述方程的过程。
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: In order to properly assess this estimator, we use **Monte Carlo** simulation
    by generating multiple realizations of the GMM data and estimate p1 for each realization
    as shown in the Python code below.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了正确评估这个估计量，我们通过生成多个GMM数据的实现来使用**蒙特卡洛**模拟，并如以下Python代码所示，为每个实现估计p1。
- en: '[PRE3]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Then, we check for the bias and variance of our estimator and compare to the
    theoretical results that we derived earlier as shown below.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们检查我们估计量的偏差和方差，并与我们之前推导的理论结果进行比较，如下所示。
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We can observe from the above results that the mean of the p1 estimate equals
    0.2051 which is very close to the true parameter p1 = 0.2\. This mean gets even
    closer to the true parameter as the sample size increases. Thus, we have numerically
    shown that the estimator is **unbiased** as confirmed by the theoretical results
    done earlier.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 从上述结果中，我们可以观察到p1估计值的均值为0.2051，这非常接近真实的参数p1 = 0.2。随着样本量的增加，这个均值会更接近真实参数。因此，我们通过数值证明了估计量是无偏的，这与之前的理论结果相符。
- en: Moreover, the sample variance of the p1 estimator (0.001876) is almost identical
    to the theoretical variance (0.001897) which is beautiful.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，p1估计量的样本方差（0.001876）几乎与理论方差（0.001897）相同，这是很美的。
- en: It is always a happy moment when theory matches practice!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当理论与实际相符时，总是一个令人愉快的时刻！
