    stories to communicate business insights. She’s a full-time healthcare data analyst
    and blogs about data on weekends with a good cup of hot coffee.*'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '*Rashi是一位来自芝加哥的数据专家，她喜欢可视化数据并创建有洞察力的故事来传达商业见解。她是一位全职医疗保健数据分析师，在周末用一杯热咖啡写关于数据的博客。*'
