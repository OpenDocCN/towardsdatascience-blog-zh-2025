- en: How a Research Lab Made Entirely of LLM Agents Developed Molecules That Can
    Block a Virus
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 一个完全由LLM代理组成的科研实验室如何开发出可以阻断病毒的分子
- en: 原文：[https://towardsdatascience.com/a-research-lab-made-entirely-of-virtual-llm-agents-developed-molecules-that-block-a-virus-as-tested-in-real-life/](https://towardsdatascience.com/a-research-lab-made-entirely-of-virtual-llm-agents-developed-molecules-that-block-a-virus-as-tested-in-real-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-research-lab-made-entirely-of-virtual-llm-agents-developed-molecules-that-block-a-virus-as-tested-in-real-life/](https://towardsdatascience.com/a-research-lab-made-entirely-of-virtual-llm-agents-developed-molecules-that-block-a-virus-as-tested-in-real-life/)
- en: '*<mdspan datatext="el1754434391394" class="mdspan-comment">A team of autonomous</mdspan>
    GPT-4o-based agents led by a human collaborated to develop experimentally validated
    nanobodies against SARS-CoV-2\. Discover with me how we are entering the era of
    automated reasoning and work with actionable outputs, and let’s imagine how this
    will go even further when robotic lab technicians can also carry out the wet lab
    parts of any research project!*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1754434391394" class="mdspan-comment">一支由自主的</mdspan>基于GPT-4o的代理团队，由人类领导，合作开发了对SARS-CoV-2进行实验验证的纳米抗体。跟我一起探索我们如何进入自动化推理的时代，并产生可操作的输出，让我们想象一下，当机器人实验室技术人员也能执行任何研究项目的湿实验室部分时，这将会走得更远！*'
- en: 'In an era where artificial intelligence continues to reshape how we code, write,
    and even reason, a new frontier has emerged: AI conducting real scientific research,
    as several companies (from major established players like Google to dedicated
    spin offs) are trying to achieve. And we are not talking just about simulations,
    automated summarization, data crunching, or theoretical outputs, but actually
    about producing experimentally validated materials, such as biological designs
    with potential clinical relevance, in this case that I bring you today.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能继续重塑我们编码、写作甚至推理的时代，一个新的前沿出现了：人工智能进行真正的科学研究，正如几家公司（从像谷歌这样的主要 established
    玩家到专门的衍生公司）正在尝试实现。我们谈论的不仅仅是模拟、自动摘要、数据处理或理论输出，而是实际上产生经过实验验证的材料，例如具有潜在临床相关性的生物设计，例如我今天带来的这个例子。
- en: That future just got much closer; very close indeed!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 那个未来已经变得非常接近；确实非常接近！
- en: In a groundbreaking paper just published in *Nature* by researchers from Stanford
    and the Chan Zuckerberg Biohub, a novel system called the Virtual Lab demonstrated
    that a human researcher working with a team of large language model (LLM) agents
    can design new nanobodies—these are tiny, antibody-like proteins that can bind
    others to block their function—to target fast-mutating variants of SARS-CoV-2\.
    This was not just a narrow chatbot interaction or a tool-assisted paper; it was
    an open-ended, multi-phase research process led and executed by AI agents, each
    having a specialized expertise and role, resulting in real-world validated biological
    molecules that could perfectly move on to downstream studies for actual applicability
    in disease (in this case Covid-19) treatment.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在斯坦福大学和陈-扎克伯格生物实验室的研究人员刚刚发表在《自然》杂志上的一篇开创性论文中，一个名为虚拟实验室的新系统展示了人类研究人员与一组大型语言模型（LLM）代理合作可以设计新的纳米抗体——这些是微小的、类似抗体的蛋白质，可以结合其他物质以阻断其功能——以针对SARS-CoV-2的快速突变变种。这不仅仅是一个狭窄的聊天机器人交互或辅助工具的论文；这是一个由AI代理领导并执行的开放式、多阶段研究过程，每个代理都有专门的专长和角色，最终产生了经过现实世界验证的生物分子，这些分子可以完美地进入下游研究，以在疾病（在这种情况下是Covid-19）治疗中实际应用。
- en: Let’s delve into it to see how this is serious, replicable research presenting
    an approach to AI-human (and actually AI-AI) collaborative science works.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨，看看这是如何严肃、可复制的研究，展示了人工智能-人类（实际上还有人工智能-人工智能）协作科学的工作方式。
- en: From “simple” applications to materializing a full-staff AI lab
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从“简单”应用发展到实现一个完整的AI实验室
- en: Although there are some precedents to this, the new system is unlike anything
    before it. And one of the coolest things is that it is not based on a special-purpose
    trained LLM or tool; rather, it uses GPT-4o instructed with prompts that make
    it play the role of the different kinds of people often involved in a research
    team.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有一些先例，但这个新系统与之前任何事物都不同。其中最酷的一点是，它不是基于专门训练的LLM或工具；相反，它使用经过提示的GPT-4o，使其扮演在研究团队中经常涉及的不同种类的人的角色。
- en: Until recently, the role of LLMs in science was limited to question-answering,
    summarizing, writing support, coding and perhaps some direct data analysis. Useful,
    yes, but not transformative. The Virtual Lab presented in this new *Nature* paper
    changes that by elevating LLMs from assistants to autonomous researchers that
    interact with one another and with a human user (who brings the research question,
    runs experiments when required, and eventually concludes the project) in structured
    meetings to explore, hypothesize, code, analyze, and iterate.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 直到最近，LLMs在科学中的作用仅限于问答、总结、写作支持、编码以及可能的一些直接数据分析。有用，是的，但不是变革性的。这篇新发表在*Nature*上的虚拟实验室论文通过将LLMs从助手提升到相互之间以及与人类用户（带来研究问题，在需要时运行实验，并最终完成项目）进行结构化会议以探索、假设、编码、分析和迭代，从而改变了这一点。
- en: The core idea at the heart of this work was indeed to simulate an interdisciplinary
    lab staffed by AI agents. Each agent has a scientific role—say, immunologist,
    computational biologist, or machine learning specialist—and is instantiated from
    GPT-4o with a “persona” crafted via careful prompt engineering. These agents are
    led by a Principal Investigator (PI) Agent and monitored by a Scientific Critic
    Agent, both virtual agents.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这项工作的核心思想确实是要模拟一个由AI代理组成的跨学科实验室。每个代理都有一个科学角色——比如说，免疫学家、计算生物学家或机器学习专家——并且是从GPT-4o实例化出来的，具有通过精心提示工程打造的“人格”。这些代理由一个主要研究员（PI）代理领导，并由一个科学评论员代理监控，两者都是虚拟代理。
- en: The Critic Agent challenges assumptions and pinpoints errors, acting as the
    lab’s skeptical reviewer; as the paper explored, this was a key element of the
    workflow without which too many errors and overlooks happened that went in detriment
    of the project.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 评论员代理挑战假设并指出错误，作为实验室的怀疑性评论员；正如论文所探讨的，这是工作流程中的关键要素，没有它，就会发生太多错误和疏忽，这对项目不利。
- en: The human researcher sets high-level agendas, injects domain constraints, and
    ultimately runs the outputs (especially the wet-lab experiments). But the “thinking”
    (maybe I should start considering removing the quotation marks?) is done by the
    agents.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 人类研究者设定高级议程，注入领域约束，并最终运行输出（尤其是湿实验室实验）。但“思考”（也许我应该开始考虑去掉引号？）是由代理完成的。
- en: How it all worked
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一切是如何运作的
- en: 'The Virtual Lab was tasked with solving a real and urgent biomedical challenge:
    design new nanobody binders for the KP.3 and JN.1 variants of SARS-CoV-2, which
    had evolved resistance to existing treatments. Instead of starting from scratch,
    the AI agents decided (yes, they took this decision by themselves) to mutate existing
    nanobodies that were effective against the ancestral strain but no longer worked
    as well. Yes, they decided on that!'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟实验室被赋予了解决一个真实且紧迫的生物医药挑战的任务：为SARS-CoV-2的KP.3和JN.1变种设计新的纳米抗体结合剂，这些变种已经对现有治疗产生了抗性。而不是从头开始，AI代理决定（是的，他们自己做出了这个决定）突变现有的对祖先菌株有效的纳米抗体，但不再那么有效。是的，他们就是做出了这个决定！
- en: As all interactions are tracked and documented, we can see exactly how the team
    moved forward with the project.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 由于所有交互都被跟踪和记录，我们可以确切地看到团队是如何推进项目的。
- en: First of all, the human defined only the PI and Critic agents. The PI agent
    then created the scientific team by spawning specialized agents. In this case
    they were an Immunologist, a Machine Learning Specialist and a Computational Biologist.
    In a team meeting, the agents debated whether to design antibodies or nanobodies,
    and whether to design from scratch or mutate existing ones. They chose nanobody
    mutation, justified by faster timelines and available structural data. They then
    discussed about what tools to use and how to implement them. They went for the
    ESM protein language model coupled to AlphaFold multimer for structure prediction
    and Rosetta for binding energy calculations. For implementation, the agents decided
    to go with Python code. Very interestingly, the code needed to be reviewed by
    the Critic agent multiple times, and was refined through multiple asynchronous
    meetings.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，人类只定义了PI和Critic代理。然后，PI代理通过产生专门的代理来创建科学团队。在这种情况下，他们是一个免疫学家、一个机器学习专家和一个计算生物学家。在团队会议上，代理们讨论了是设计抗体还是纳米抗体，以及是从零开始设计还是突变现有的。他们选择了纳米抗体突变，理由是时间线更快且可用的结构数据。然后他们讨论了要使用哪些工具以及如何实现它们。他们选择了ESM蛋白质语言模型与AlphaFold多聚体结合用于结构预测，以及Rosetta用于结合能计算。对于实现，代理们决定使用Python代码。非常有趣的是，代码需要由Critic代理多次审查，并通过多次异步会议进行精炼。
- en: From the meetings and multiple runs of code, an exact strategy was devised on
    how to propose the final set of mutations to be tested. Briefly, for the bioinformaticians
    reading this post, the PI agent designed an iterative pipeline that uses ESM to
    score all point mutations on a nanobody sequence by log-likelihood ratio, selects
    top mutants to predict their structures in complex with the target protein using
    AlphaFold-Multimer, scores the interfaces via ipLDDT, then uses Rosetta to estimate
    binding energy, and finally combines the scores to come up with a ranking of all
    proposed mutations. This actually was repeated in a cycle, to introduce more mutations
    as needed.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 通过会议和多次代码运行，制定了一个精确的策略，用于提出要测试的最终突变集。简而言之，对于阅读这篇帖子的生物信息学家来说，PI代理设计了一个迭代管道，使用ESM通过对数似然比评分纳米抗体序列上的所有点突变，使用AlphaFold-Multimer选择顶级突变体来预测它们与目标蛋白质的复合结构，通过ipLDDT评分界面，然后使用Rosetta估计结合能，最后将评分结合起来，对提出的所有突变进行排名。这实际上是在循环中重复的，以根据需要引入更多突变。
- en: The computational pipeline generated 92 nanobody sequences that were synthesized
    and tested in a real-world lab, finding that most of them were actually proteins
    that can be produced and handled. Two of these proteins gained affinity to the
    SARS-CoV-2 proteins they were designed to bind, both to modern mutants and to
    ancestral forms.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 由计算管道生成的92个纳米抗体序列在现实世界实验室中进行了合成和测试，发现其中大多数实际上是可生产和处理的蛋白质。其中两种蛋白质对其设计用于结合的SARS-CoV-2蛋白质产生了亲和力，无论是现代突变体还是祖先形式。
- en: These success rates are similar to those coming from analogous projects running
    in traditional form (that is executed by humans), but they took much much less
    time to conclude. And it hurts to say it, but I’m pretty sure the virtual lab
    entailed much lower costs overall, as it involved much fewer people (hence salaries).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这些成功率与传统形式（即由人类执行）的类似项目相当，但它们所需的时间少得多。而且说出来很痛心，但我相当确信虚拟实验室总体成本要低得多，因为它涉及的人数要少得多（因此工资也少）。
- en: 'Like in a human group of scientists: meetings, roles, and collaboration'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 就像人类科学家群体一样：会议、角色和合作
- en: 'We saw above how the Virtual Lab mimics how human science happens: via structured
    interdisciplinary meetings. Each meeting is either a “Team Meeting”, where multiple
    agents discuss broad questions (the PI starts, others contribute, the Critic reviews,
    and the PI summarizes and decides); or an “Individual Meeting” where a single
    agent (with or without the Critic) works on a specific task, e.g., writing code
    or scoring outputs.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在上面看到，虚拟实验室如何模仿人类科学的发生方式：通过结构化的跨学科会议。每次会议要么是“团队会议”，其中多个代理讨论广泛的问题（PI开始，其他人贡献，评论员审查，PI总结并决定）；要么是“个人会议”，其中单个代理（有无评论员）在一个特定任务上工作，例如编写代码或评分输出。
- en: To avoid hallucinations and inconsistency, the system also uses parallel meetings;
    that is, the same task is run multiple times with different randomness (i.e. at
    high “temperature”). It is interesting that the outcomes from these several meetings
    is the condensed in a single low-temperature merge meeting that is much more deterministic
    and can quite safely decide which conclusions, among all coming from the various
    meetings, make more sense.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免幻觉和不一致性，该系统还使用了并行会议；也就是说，相同的任务多次运行，使用不同的随机性（即在高温下）。有趣的是，这些几次会议的结果在单个低温合并会议中得到了浓缩，这个会议更加确定，可以相当安全地决定在所有来自各种会议的结论中，哪个更有意义。
- en: Clearly, these ideas can be applied to any other kind of multi-agent interaction,
    and for any purpose!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，这些想法可以应用于任何其他类型的多代理交互，以及任何目的！
- en: How much did the humans do?
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人类做了多少？
- en: Surprisingly little, for the computational part of course–as the experiments
    can’t be so much automated yet, though keep reading to find some reflections about
    robots in labs!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 对于计算部分来说，出人意料地少——因为实验还不能如此自动化，尽管请继续阅读，以找到一些关于实验室中机器人的反思！
- en: In this Virtual Lab round, LLM agents wrote **98.7%** of the total words (over
    120,000 tokens), while the human researcher contributed just 1,596 words in total
    across the entire project. The Agents wrote all the scripts for ESM, AlphaFold-Multimer
    post-processing, and Rosetta XML workflows. The human only helped running the
    code and facilitated the real-world experiments. The Virtual Lab pipeline was
    built in 1-2 days of prompting and meetings, and the nanobody design computation
    ran in ~1 week.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次虚拟实验室轮次中，LLM代理撰写了总字数的**98.7%**（超过12万个标记），而人类研究人员在整个项目中总共贡献了1,596个字。代理编写了所有ESM、AlphaFold-Multimer后处理和Rosetta
    XML工作流程的脚本。人类仅帮助运行代码并促进现实世界实验。虚拟实验室管道在1-2天的提示和会议中构建，纳米抗体设计计算在大约一周内完成。
- en: Why this matters (and what comes next)
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么这很重要（以及接下来会发生什么）
- en: The **Virtual Lab** could serve as the prototype for a fundamentally new research
    model–and actually for a fundamentally new way to work, where everything that
    can be done on a computer is left automated, with humans only taking the very
    critical decisions. LLMs are clearly shifting from passive tools to active collaborators
    that, as the Virtual Lab shows, can drive complex, interdisciplinary projects
    from idea to implementation.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**虚拟实验室**可能成为根本新的研究模型的原型——实际上，它可能成为一种全新的工作方式，其中所有可以在计算机上完成的任务都实现自动化，而人类只需做出非常关键的决策。大型语言模型（LLMs）显然正从被动工具转变为积极合作者，正如虚拟实验室所展示的，它们可以从想法到实施推动复杂的多学科项目。'
- en: 'The next ambitious leap? Replace the hands of human technicians, who ran the
    experiments, with robotic ones. Clearly, the next frontier is in automatizing
    the physical interaction with the real world, which is essentially what robots
    are. Imagine then the full pipeline as applied to a research lab:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个雄心勃勃的飞跃？用机器人取代运行实验的人类技术人员的手。显然，下一个前沿是自动化与真实世界的物理交互，这本质上是机器人的本质。想象一下，将整个流程应用于研究实验室：
- en: A human PI defines a high-level biological goal.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类PI定义了一个高级生物目标。
- en: The team does research of existing information, scans databases, brainstorms
    ideas.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队对现有信息进行研究，扫描数据库，头脑风暴想法。
- en: A set of AI agents selects computational tools if required, writes and runs
    code and/or analyses, and finally proposes experiments.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果需要，一组AI代理选择计算工具，编写和运行代码和/或分析，并最终提出实验方案。
- en: 'Then, robotic lab technicians, rather than human technicians, carry out the
    protocols: pipetting, centrifuging, plating, imaging, data collection.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，机器人实验室技术人员，而不是人类技术人员，执行实验方案：移液、离心、培养、成像、数据收集。
- en: The results flow back into the Virtual Lab, closing the loop.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结果流回虚拟实验室，闭环完成。
- en: Agents analyze, adapt, iterate.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理分析、适应、迭代。
- en: This would make the research process truly end-to-end autonomous. From problem
    definition to experiment execution to result interpretation, all components would
    be run by an integrated AI-robotics system with minimal human intervention—just
    high-level steering, supervision, and global vision.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这将使研究过程真正实现端到端自主。从问题定义到实验执行再到结果解释，所有组件都将由一个集成的AI-机器人系统运行，人类干预最小——只需高级指导、监督和全局视野。
- en: Robotic biology labs are already being prototyped. Emerald Cloud Lab, Strateos,
    and Transcriptic (now part of Colabra) offer robotic wet-lab-as-a-service. Future
    House is a non-profit building AI agents to automate research in biology and other
    complex sciences. In academia, some autonomous chemistry labs exist whose robots
    can explore chemical space on their own. Biofoundries use programmable liquid
    handlers and robotic arms for synthetic biology workflows. Adaptyv Bio automates
    protein expression and testing at scale.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人生物学实验室正在被原型化。Emerald Cloud Lab、Strateos和Transcriptic（现在是Colabra的一部分）提供机器人湿实验室即服务。Future
    House是一个非营利组织，正在构建AI代理来自动化生物学和其他复杂科学的研究。在学术界，一些自主化学实验室存在，其机器人可以独立探索化学空间。生物工厂使用可编程液体处理器和机器人臂进行合成生物学工作流程。Adaptyv
    Bio在规模上自动化蛋白质表达和测试。
- en: Such kinds of automatized laboratory systems coupled to emerging systems like
    Virtual Lab could radically transform how science and technology progress. The
    intelligent layer drives the project and give those robots work to do, whose output
    then feeds back into the thinking tool in a closed-loop discovery engine that
    would run 24/7 without fatigue or scheduling conflicts, conduct hundreds or thousands
    of micro-experiments in parallel, and rapidly explore vast hypothesis spaces that
    are just not feasible for human labs. Moreover, the labs, virtual labs, and managers
    don’t even need to be physically together, allowing to optimize how resources
    are spread.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这种与新兴系统如虚拟实验室相结合的自动化实验室系统将彻底改变科学技术进步的方式。智能层推动项目，给那些机器人分配工作，其输出随后反馈到闭环发现引擎中的思考工具，该引擎可以24/7不间断运行，无需疲劳或安排冲突，并行进行数百或数千个微观实验，并快速探索对人类实验室来说根本不可行的广阔假设空间。此外，实验室、虚拟实验室和管理者甚至不需要物理上在一起，这允许优化资源分配的方式。
- en: There are challenges, of course. Real-world science is messy and nonlinear.
    Robotic protocols must be incredibly robust. Unexpected errors still need judgment.
    But as robotics and AI continue to evolve, those gaps will certainly shrink.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，也存在挑战。现实世界的科学是混乱和非线性的。机器人协议必须极其稳健。意外的错误仍然需要判断。但随着机器人和AI的持续发展，这些差距肯定会缩小。
- en: Final thoughts
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: We humans were always confident that technology in the form of smart computers
    and robots would kick us out of our highly repetitive physical jobs, while creativity
    and thinking would still be our domain of mastery for decades, perhaps centuries.
    However, despite quite some automation via robots, the AI of the 2020s has shown
    us that technology can also be better than us at some of our most brain-intensive
    jobs.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们人类一直自信，以智能计算机和机器人形式的技术将会把我们从高度重复的体力工作中解放出来，而创造力和思考将仍然是我们的专长领域，几十年甚至几个世纪都将是如此。然而，尽管有相当一部分自动化是通过机器人实现的，但2020年代的AI已经向我们展示了，在某些我们最需要脑力劳动的工作中，技术甚至可以比我们做得更好。
- en: In the near future, LLMs don’t just answer our questions or barely help us with
    work. They will ask, argue, debate, decide. And sometimes, they will discover!
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在不久的将来，大型语言模型（LLMs）不仅会回答我们的问题，或者仅仅在工作上给我们提供一些帮助。它们会提问、争论、辩论、决定。有时，它们还会发现新事物！
