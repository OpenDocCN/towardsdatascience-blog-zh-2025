- en: How to Perform Effective Data Cleaning for Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何为机器学习进行有效的数据清洗
- en: 原文：[https://towardsdatascience.com/how-to-perform-effective-data-cleaning-for-machine-learning/](https://towardsdatascience.com/how-to-perform-effective-data-cleaning-for-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[如何为机器学习进行有效的数据清洗](https://towardsdatascience.com/how-to-perform-effective-data-cleaning-for-machine-learning/)
- en: Data cleaning is arguably the most important step you can perform in your machine-learning
    pipeline. Without data, your model algorithm improvements likely won’t matter.
    After all, the saying ‘garbage in, garbage out’ is not just a saying, but an inherent
    truth within machine learning. Without proper high-quality data, you will struggle
    to create a high-quality machine learning model.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清洗可以说是你在机器学习流程中可以执行的最重要的一步。没有数据，你的模型算法改进可能不会产生影响。毕竟，“垃圾进，垃圾出”不仅仅是一句俗语，而是机器学习中的一个固有真理。没有适当的高质量数据，你将难以创建高质量的机器学习模型。
- en: '![](../Images/50eb5ff65f3347b5506924e4fee29e52.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/50eb5ff65f3347b5506924e4fee29e52.png)'
- en: This infographic summarizes the article. I start by explaining my motivation
    for this article and defining data cleaning as a task. I then continue discussing
    three different data cleaning techniques, and some notes to keep in mind when
    performing data cleaning. Image by ChatGPT.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图总结了文章内容。我首先解释了写这篇文章的动机，并将数据清洗定义为一项任务。然后我继续讨论三种不同的数据清洗技术，以及在进行数据清洗时需要注意的一些事项。图片由ChatGPT提供。
- en: In this article, I discuss how you can effectively apply data cleaning to your
    own dataset to improve the quality of your fine-tuned machine-learning models.
    I will go through why you need data cleaning and data cleaning techniques. Lastly,
    I will also provide important notes to keep in mind, such as keeping a short experimental
    loop
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将讨论如何有效地将数据清洗应用于您的数据集，以提升您微调的机器学习模型的质量。我会解释为什么需要数据清洗以及数据清洗技术。最后，我还会提供一些重要的注意事项，例如保持短的实验循环。
- en: '*You can also read articles on [How to Benchmark LLMs](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)*,
    [How to Write Insightful Technical Articles](https://towardsdatascience.com/how-to-write-insightful-technical-articles/)[,](https://contributor.insightmediagroup.io/how-to-maximize-technical-events-nvidia-gtc-paris-2025/)
    and [Creating Powerful Embeddings for Machine Learning.](https://eivindkjosbakken.wordpress.com/2024/02/21/how-to-create-powerful-embeddings-from-your-data-to-feed-into-your-ai/)'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*您还可以阅读有关[如何基准测试LLMs](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)、[如何撰写有洞察力的技术文章](https://towardsdatascience.com/how-to-write-insightful-technical-articles/)、[如何最大化技术活动](https://contributor.insightmediagroup.io/how-to-maximize-technical-events-nvidia-gtc-paris-2025/)以及[为机器学习创建强大的嵌入](https://eivindkjosbakken.wordpress.com/2024/02/21/how-to-create-powerful-embeddings-from-your-data-to-feed-into-your-ai/)的文章*。'
