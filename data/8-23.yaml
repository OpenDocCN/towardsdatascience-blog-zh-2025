- en: What is MicroPython? Do I Need to Know it as a Data Scientist?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是MicroPython？作为数据科学家，我需要了解它吗？
- en: 原文：[https://towardsdatascience.com/what-is-micropython-do-i-need-to-know-it-as-a-data-scientist-5b4567a21b99/](https://towardsdatascience.com/what-is-micropython-do-i-need-to-know-it-as-a-data-scientist-5b4567a21b99/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-is-micropython-do-i-need-to-know-it-as-a-data-scientist-5b4567a21b99/](https://towardsdatascience.com/what-is-micropython-do-i-need-to-know-it-as-a-data-scientist-5b4567a21b99/)
- en: When I saw MicroPython on the list of the Stack Overflow survey from this year,
    I wanted to know what I could use this language for. And I wondered if it could
    serve as a bridge between hardware and software. In this article, I break down
    what MicroPython is and what data scientists should know about it.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当我看到MicroPython出现在今年Stack Overflow调查的列表上时，我想知道我能用这种语言做什么。我还想知道它是否可以作为硬件和软件之间的桥梁。在这篇文章中，我将分解MicroPython是什么以及数据科学家应该了解什么。
- en: '**Table of Content** 1 – [What is MicroPython and why is it special?](#0256)
    2 – [Why should I know MicroPython as a data scientist?](#478b) 3 – [What is the
    difference to Python and other programming languages?](#bb8c) 4 – [What does this
    look like in practice? (Only with web based simulator)](#3055) 5 – [Final Thoughts](#97ec)
    & [Where to continue learning?](#ab70)'
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**目录** 1 – [MicroPython是什么？为什么它很特别？](#0256) 2 – [为什么作为数据科学家，我应该了解MicroPython？](#478b)
    3 – [与Python和其他编程语言有什么区别？](#bb8c) 4 – [这在实践中看起来是什么样子？（仅限基于Web的模拟器）](#3055) 5 –
    [最后思考](#97ec) & [在哪里继续学习？](#ab70)'
- en: '![Image from Stack Overflow](../Images/65b53d563bd175881b8d9854c2e0dc2c.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![来自Stack Overflow的图片](../Images/65b53d563bd175881b8d9854c2e0dc2c.png)'
- en: Image from [Stack Overflow](https://survey.stackoverflow.co/2024/technology#admired-and-desired?target=blank)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 来自[Stack Overflow](https://survey.stackoverflow.co/2024/technology#admired-and-desired?target=blank)的图片
- en: What is MicroPython and why is it special?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MicroPython是什么？为什么它很特别？
- en: MicroPython is a simplified, compact version of Python 3 designed specifically
    for use on microcontrollers and other low-resource embedded systems. As we can
    read on the official website, the language offers a reduced standard library and
    special modules to interact directly with hardware components such as GPIO pins,
    sensors or LEDs.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: MicroPython是专为微控制器和其他资源有限的嵌入式系统设计的Python 3的简化、紧凑版本。正如我们可以在官方网站上阅读到的，该语言提供精简的标准库和特殊模块，可以直接与GPIO引脚、传感器或LED等硬件组件交互。
- en: '*[Reference: Official MicroPython Website](https://micropython.org/)*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '*[参考资料：官方MicroPython网站](https://micropython.org/)*'
- en: '**Let’s break this definition down:**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们来分解这个定义：**'
- en: 'Simplified, compact Python: MicroPython is designed to use less memory and
    computing power than the standard Python version. The language is perfect for
    devices with just a few kilobytes of RAM.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简化、紧凑的Python：MicroPython的设计是为了使用比标准Python版本更少的内存和计算能力。该语言非常适合只有几KB RAM的设备。
- en: 'Microcontrollers & embedded systems: Think of a microcontroller as a tiny computer
    on a chip. It can control devices such as IoT sensors, smart home devices and
    robots.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微控制器和嵌入式系统：将微控制器想象成芯片上的小型计算机。它可以控制物联网传感器、智能家居设备和机器人等设备。
- en: 'Low-resource systems: This means that these systems have little memory (often
    less than 1 MB) and limited computing power.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源有限的系统：这意味着这些系统内存很小（通常小于1 MB）且计算能力有限。
- en: 'GPIO Pins: These are pins on a microcontroller that can be used for various
    input and output functions. For example, they can be used to control LEDs or read
    sensor data.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPIO引脚：这些是微控制器上的引脚，可用于各种输入和输出功能。例如，它们可以用来控制LED或读取传感器数据。
- en: Why is MicroPython relevant?
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么MicroPython很重要？
- en: If you know Python, you can program hardware with MicroPython – without learning
    a new complex language like C++ or assembly. Sure, you have more options with
    C++ and assembly and both are closer to machine languages. But if you want to
    create a prototype with relatively little effort, MicroPython offers you an ideal
    starting point.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你了解Python，你可以用MicroPython编程硬件——无需学习像C++或汇编这样的新复杂语言。当然，C++和汇编有更多选项，并且两者都更接近机器语言。但如果你想要以相对较少的努力创建原型，MicroPython为你提供了一个理想的起点。
- en: Why should I know MicroPython as a data scientist?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么作为数据科学家，我应该了解MicroPython？
- en: 'Simply put: Because it is listed in the Stack Overflow survey and gaining traction
    in the developer community…'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之：因为它出现在Stack Overflow调查中，并且在开发者社区中越来越受欢迎...
- en: IoT and edge computing are playing an increasingly important role in AI and
    data science projects. Especially as we want to make our cities smarter (smart
    cities).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 物联网和边缘计算在人工智能和数据科学项目中扮演着越来越重要的角色。尤其是当我们想要使我们的城市更智能（智能城市）时。
- en: MicroPython can serve as a bridge between hardware and software here, as it
    makes it possible to collect sensor data and process it in data science pipelines
    or machine learning models. For example, a MicroPython sensor can measure air
    quality and send the data to a Machine Learning pipeline. MicroPython can also
    run simple AI models directly on devices (edge computing) – this makes it ideal
    for local computing without the device being dependent on the cloud.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: MicroPython 可以作为硬件和软件之间的桥梁，因为它使得收集传感器数据并在数据科学管道或机器学习模型中处理数据成为可能。例如，一个 MicroPython
    传感器可以测量空气质量并将数据发送到机器学习管道。MicroPython 还可以直接在设备上运行简单的 AI 模型（边缘计算）——这使得它非常适合本地计算，设备不依赖于云。
- en: 'So my conclusion: MicroPython makes hardware more accessible for data scientists.
    If you know Python, you can also use MicroPython and apply it in a smart home
    project.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我的结论是：MicroPython 使硬件对数据科学家更加可访问。如果你知道 Python，你还可以使用 MicroPython 并将其应用于智能家居项目。
- en: What is the difference to Python and other programming languages?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与 Python 和其他编程语言相比，有什么区别？
- en: While Python was developed for general software applications that run on powerful
    devices such as PCs or servers, MicroPython was developed for low-resource devices
    such as microcontrollers, which often only have a few kilobytes of memory and
    computing power.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Python 是为在功能强大的设备上运行的一般软件应用而开发的，例如个人电脑或服务器，但 MicroPython 是为低资源设备开发的，例如微控制器，这些设备通常只有几千字节内存和计算能力。
- en: As we all know, Python offers an extensive library for data analysis (pandas,
    numpy), machine learning (scikit-learn, tensorflow) or web development. MicroPython,
    on the other hand, only contains a reduced standard library and slimmed-down modules
    such as ‘math’ or ‘os’. Instead, it offers special hardware modules such as ‘utime’
    for timers or ‘machine’ for controlling microcontroller pins.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，Python 提供了广泛的数据分析库（pandas、numpy）、机器学习（scikit-learn、tensorflow）或网络开发库。另一方面，MicroPython
    只包含一个精简的标准库和如‘math’或‘os’这样的精简模块。相反，它提供了特殊的硬件模块，如用于计时器的‘utime’或用于控制微控制器引脚的‘machine’。
- en: While Python is better suited for data-intensive tasks, MicroPython enables
    direct access to hardware components and is therefore ideal for embedded systems
    (e.g. everyday electronics such as microwaves & smart TVs or medical devices such
    as blood pressure monitors) and IoT projects.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Python 更适合数据密集型任务，但 MicroPython 允许直接访问硬件组件，因此非常适合嵌入式系统（例如日常电子产品如微波炉和智能电视或医疗设备如血压计）和物联网项目。
- en: What does this look like in practice? Application areas and a quick simulator
    demo
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际上这看起来是什么样子？应用领域和快速模拟器演示
- en: In which areas is MicroPython used?
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: MicroPython 在哪些领域被使用？
- en: 'Internet of Things (IoT): MicroPython can be used to control smart home devices
    or control sensor data for dashboards.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物联网（IoT）：MicroPython 可以用于控制智能家居设备或控制仪表板上的传感器数据。
- en: 'Edge computing: You can run machine learning models directly on edge devices
    (e.g. IoT sensors, smartphones, routers, intelligent cameras, smart home devices,
    etc.).'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 边缘计算：你可以在边缘设备上直接运行机器学习模型（例如物联网传感器、智能手机、路由器、智能摄像头、智能家居设备等）。
- en: 'Prototyping: With relatively little effort, you can quickly set up a prototype
    for a hardware project – especially if you know Python.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原型设计：只需相对较少的努力，你就可以快速为硬件项目设置原型——特别是如果你知道 Python。
- en: 'Robotics: MicroPython can be used to control motors or sensors in robotics
    projects.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器人技术：MicroPython 可以用于控制机器人项目中的电机或传感器。
- en: Flashing LED in the simulator as a practical example
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在模拟器中闪烁 LED 作为实际示例
- en: 'Since as a data scientist or software specialist you probably don’t want to
    buy hardware just to try out MicroPython, I explored a MicroPython simulator available
    online. This is a simple and beginner-firendly way to get started with programming
    hardware concepts without the need for physical devices:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 由于作为数据科学家或软件专家，你可能不想仅仅为了尝试 MicroPython 就购买硬件，所以我探索了在线可用的 MicroPython 模拟器。这是一种简单且适合初学者的方式，可以在不使用物理设备的情况下开始编程硬件概念：
- en: Open [https://micropython.org/unicorn/](https://micropython.org/unicorn/)
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 [https://micropython.org/unicorn/](https://micropython.org/unicorn/)
