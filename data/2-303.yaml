- en: Multi-Agent Communication with the A2A Python SDK
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用A2A Python SDK的多代理通信
- en: 原文：[https://towardsdatascience.com/multi-agent-communication-with-the-a2a-python-sdk/](https://towardsdatascience.com/multi-agent-communication-with-the-a2a-python-sdk/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/multi-agent-communication-with-the-a2a-python-sdk/](https://towardsdatascience.com/multi-agent-communication-with-the-a2a-python-sdk/)
- en: If <mdspan datatext="el1748462464521" class="mdspan-comment">you’re not living</mdspan>
    under a rock and you work with AI, you’ve probably heard about Agent2Agent (A2A)
    Protocol, “an open standard designed to enable communication and collaboration
    between AI agents”. It’s still pretty new, but it’s already getting a lot of buzz.
    Since it plays so nicely with MCP (which looks like it’s becoming the industry’s
    standard), A2A is shaping up to be *the* go-to standard for multi-agent communication
    in the industry.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不是躲在岩石下生活并且与AI工作，你很可能已经听说过Agent2Agent（A2A）协议，“一个旨在使AI代理之间能够通信和协作的开放标准”。它仍然相当新，但它已经引起了很大的关注。由于它与MCP（看起来它将成为行业标准）配合得很好，A2A正在成为行业中多代理通信的**首选**标准。
- en: 'When Google first dropped the [Protocol Specification](https://google.github.io/A2A/specification/),
    my first reaction was basically: “Okay, cool… but what am I supposed to do with
    this?” Thankfully, this week they released the official Python SDK for the protocol,
    so now it finally speaks a language I understand.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当谷歌首次发布[协议规范](https://google.github.io/A2A/specification/)时，我的第一反应基本上是：“好吧，酷……但我应该用这个做什么？”幸运的是，本周他们发布了该协议的官方Python
    SDK，现在它终于说出了我能理解的语言。
- en: 'In this article we’re going to dive into how the protocol actually sets up
    communication between agents and clients. Spoiler: it’s all in a task-oriented
    manner. To make things less abstract, let’s build a little toy example together.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将深入探讨协议实际上是如何在代理和客户端之间建立通信的。剧透：它完全是面向任务的方式。为了使事情更具体，让我们一起构建一个小玩具示例。
- en: Communication between the Event Detector Agent and an A2A Client
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 事件检测代理与A2A客户端之间的通信
- en: In our systems we have an **Event Detector AI Agent** (responsible for detecting
    events) and an **Alert AI Agent** (responsible for alerting the user of the events).
    Since I’m focusing on the A2A protocol here, both agents are mocked as simple
    Python methods that return strings. But in real life you can build your agents
    with any framework you like (LangGraph, Google ADK, CrewAI and so on).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的系统中，我们有一个**事件检测AI代理**（负责检测事件）和一个**警报AI代理**（负责向用户发出事件警报）。由于我这里专注于A2A协议，这两个代理都被模拟为简单的Python方法，返回字符串。但在现实生活中，你可以使用你喜欢的任何框架（LangGraph、Google
    ADK、CrewAI等等）来构建你的代理。
- en: We have three characters in our system, the **user**, the **Event Agent** and
    the **Alert Agent**. They all communicate using **`Messages`**. A **`Message`**
    represents a single turn of communication in the A2A protocol. We wrap the agents
    into **A2A Servers**. The servers expose an HTTP endpoint implementing the protocol.
    Each A2A Server has **`Event queues`** that act as a buffer between the agent’s
    asynchronous execution and the server’s response handling.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们系统中有三个角色，即**用户**、**事件代理**和**警报代理**。他们都使用**`Messages`**进行通信。**`Message`**代表A2A协议中的一次单独通信。我们将代理封装到**A2A服务器**中。服务器公开了一个实现协议的HTTP端点。每个A2A服务器都有一个**`Event
    queues`**，它充当代理的异步执行和服务器响应处理之间的缓冲区。
- en: The **A2A Client** initiates communication, and if two agents need to communicate
    an **A2A Server** can also play the role of a **A2A Client**. The diagram below
    shows how a Client and a Server communicate within the protocol.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**A2A客户端**启动通信，如果两个代理需要通信，**A2A服务器**也可以扮演**A2A客户端**的角色。下面的图示显示了在协议中客户端和服务器是如何通信的。'
- en: '![](../Images/f774f32c5ec16518e1f26f2b4032ac4a.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f774f32c5ec16518e1f26f2b4032ac4a.png)'
- en: '*Image by author*'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片由作者提供*'
- en: 'The `EventQueue` stores **`Messages`**, **`Tasks`**, **`TaskStatusUpdateEvent`**,
    **`TaskArtifactUpdateEvent`**, **`A2AError`**and **`JSONRPCError`** objects. The
    **`Task`** might be the most important object to understand how to build multi-agent
    systems with A2A. According to the [A2A documentation](https://google.github.io/A2A/topics/key-concepts/#fundamental-communication-elements):'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '`EventQueue`存储**`Messages`**、**`Tasks`**、**`TaskStatusUpdateEvent`**、**`TaskArtifactUpdateEvent`**、**`A2AError`**和**`JSONRPCError`**对象。**`Task`**可能是理解如何使用A2A构建多代理系统最重要的对象。根据[A2A文档](https://google.github.io/A2A/topics/key-concepts/#fundamental-communication-elements)：'
- en: When a client sends a message to an agent, the agent might determine that fulfilling
    the request requires a stateful task to be completed (e.g., “generate a report,”
    “book a flight,” “answer a question”).
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当客户端向代理发送消息时，代理可能会确定满足请求需要完成一个有状态的任务（例如，“生成报告”、“预订航班”、“回答问题”）。
- en: Each task has a unique ID defined by the agent and progresses through a defined
    lifecycle (e.g., `submitted`, `working`, `input-required`, `completed`, `failed`).
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个任务都有一个由代理定义的唯一 ID，并按照定义的生命周期（例如，`submitted`、`working`、`input-required`、`completed`、`failed`）进行进展。
- en: Tasks are stateful and can involve multiple exchanges (messages) between the
    client and the server.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务是有状态的，可能涉及客户端和服务器之间的多个交换（消息）。
- en: 'Think of a `Task` as something in your multi-agent system that has a **clear**
    and **unique** goal. We have two tasks in our system:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 将 `Task` 视为多智能体系统中具有 **明确** 和 **独特** 目标的东西。我们系统中有两个任务：
- en: Detect an event
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检测事件
- en: Alert the user
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通知用户
- en: Each Agent does its own thing (task). Let’s build the A2A Server for the Event
    Agent so things become more tangible.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 每个代理都执行自己的任务。让我们构建事件代理的 A2A 服务器，使事情更加具体。
- en: Building the A2A Server for the Event Agent
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建事件代理的 A2A 服务器
- en: 'First up: the **Agent Card**. The Agent Card is JSON document used to get to
    know other agents available. <mdspan datatext="el1748462266520" class="mdspan-comment">It
    describes the following</mdspan>:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 首先：**代理卡**。代理卡是一个 JSON 文档，用于了解其他可用的代理。 <mdspan datatext="el1748462266520" class="mdspan-comment">它描述以下内容</mdspan>：
- en: Server’s identity
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务器的身份
- en: Capabilities
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能力
- en: Skills
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技能
- en: Service endpoint
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务端点
- en: URL
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: URL
- en: How clients should authenticate and interact with the agent
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户端应该如何验证和与代理交互
- en: 'Let’s first define the Agent Card for the Event Detector AI Agent (I’ve defined
    the skills based on [this example](https://github.com/google/a2a-python/tree/main/examples/google_adk)
    from Google):'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先定义事件检测 AI 代理的 `Agent Card`（我已经根据 [这个示例](https://github.com/google/a2a-python/tree/main/examples/google_adk)
    定义了技能，该示例来自 Google）：
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'You can learn more about the Agent Card object structure here: [https://google.github.io/A2A/specification/#55-agentcard-object-structure](https://google.github.io/A2A/specification/#55-agentcard-object-structure)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里了解更多关于代理卡对象结构的信息：[https://google.github.io/A2A/specification/#55-agentcard-object-structure](https://google.github.io/A2A/specification/#55-agentcard-object-structure)
- en: The agent itself will actually be a Uvicorn server, so let’s build the `main()`
    method to get it up and running. All the request will be handled by the `DefaultRequestHandler`
    of the a2a-python SDK. The handler needs a `TaskStore` to store the Tasks and
    an `AgentExecutor` which has the implementation of the core logic of the agent
    (we’ll build the `EventAgentExecutor` in a minute).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 代理本身实际上将是一个 Uvicorn 服务器，因此让我们构建 `main()` 方法来使其启动并运行。所有请求将由 a2a-python SDK 的
    `DefaultRequestHandler` 处理。处理程序需要一个 `TaskStore` 来存储任务，以及一个 `AgentExecutor`，它具有代理的核心逻辑实现（我们将在下一分钟构建
    `EventAgentExecutor`）。
- en: 'The last component of the `main()` method is the `A2AStarletteApplication`,
    which is the [Starlette](https://www.starlette.io/) application that implements
    the A2A protocol server endpoints. We need to provide the `Agent Card` and the
    `DefaultRequestHandler` to initialize it. Now the last step is to run the app
    using uvicorn. Here is the full code of the `main()` method:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '`main()` 方法的最后一个组件是 `A2AStarletteApplication`，这是实现 A2A 协议服务器端点的 [Starlette](https://www.starlette.io/)
    应用程序。我们需要提供 `Agent Card` 和 `DefaultRequestHandler` 来初始化它。现在最后一步是使用 uvicorn 运行应用程序。以下是
    `main()` 方法的完整代码：'
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Creating the EventAgentExecutor
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 EventAgentExecutor
- en: Now it’s time to build the core of our agent and finally see how to use the
    Tasks to make the agents interact with each other. The `EventAgentExecutor` class
    inherits from [`AgentExecutor`](https://github.com/google/a2a-python/blob/main/src/a2a/server/agent_execution/agent_executor.py)
    interface and thus we need to implement the `execute()` and the `cancel()` methods.
    Both take a `RequestContext` and an `EventQueue` object as parameters. The [`RequestContext`](https://github.com/google/a2a-python/blob/20f0826a2cb9b77b89b85189fd91e7cd62318a30/src/a2a/server/agent_execution/context.py#L15)
    holds information about the current request being processed by the server and
    the [`EventQueue`](https://github.com/google/a2a-python/blob/main/src/a2a/server/events/event_queue.py)
    acts as a buffer between the agent’s asynchronous execution and the server’s response
    handling.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候构建我们代理的核心，并最终了解如何使用任务使代理相互交互了。`EventAgentExecutor` 类继承自 `AgentExecutor`
    接口，因此我们需要实现 `execute()` 和 `cancel()` 方法。这两个方法都接受一个 `RequestContext` 和一个 `EventQueue`
    对象作为参数。`RequestContext` 存储有关服务器正在处理当前请求的信息，而 `EventQueue` 则作为代理异步执行和服务器响应处理之间的缓冲区。
- en: Our agent will just check if the string “`event`” is in the message the user
    have sent ([KISS](https://www.interaction-design.org/literature/topics/keep-it-simple-stupid)
    ✨). If the “`event`” is there then we should call the Alert Agent. We’ll do that
    by sending a `Message` to this other Alert agent. This is the [Direct Configuration](https://google.github.io/A2A/topics/agent-discovery/#2-curated-registries-catalog-based-discovery)
    strategy, meaning we’ll configure the agent with a URL to fetch the Agent Card
    of the Alert Agent. To do that our Event Agent will act like a A2A Client.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的代理将只检查用户发送的消息中是否包含字符串“`event`”。如果存在“`event`”，则应调用警报代理。我们将通过向另一个警报代理发送一个 `Message`
    来完成此操作。这是 [直接配置](https://google.github.io/A2A/topics/agent-discovery/#2-curated-registries-catalog-based-discovery)
    策略，意味着我们将使用一个 URL 来配置代理以获取警报代理的代理卡。为此，我们的事件代理将充当 A2A 客户端。
- en: 'Let’s build the Executor step by step. First let’s create the main Task (the
    task to detect the events). We need to instantiate a `TaskUpdater` object (a helper
    class for agents to publish updates to a task’s event queue), then submit the
    task and announce we are working on it with the `start_work()` method:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐步构建 Executor。首先，让我们创建主要任务（检测事件的任务）。我们需要实例化一个 `TaskUpdater` 对象（一个辅助类，用于代理向任务的事件队列发布更新），然后提交任务，并使用
    `start_work()` 方法宣布我们正在处理它：
- en: '[PRE2]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The message the user will send to the agent will look like this:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 用户将发送给代理的消息将看起来像这样：
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'A **`Part`** represents a distinct piece of content within a `Message`, representing
    exportable content as either `TextPart`, `FilePart`, or `DataPart`. We’ll use
    a `TextPart` so we need to unwrap it in the executor:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**`Part`** 代表 `Message` 中的一个独立内容块，表示可导出的内容，可以是 `TextPart`、`FilePart` 或 `DataPart`。我们将使用
    `TextPart`，因此需要在执行器中将其展开：'
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Time to create the super advanced logic of our agent. If the message doesn’t
    have the string “`event`” we don’t need to call the Alert Agent and the task is
    done:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候创建我们代理的超级高级逻辑了。如果消息中没有字符串“`event`”，我们就不需要调用警报代理，任务就完成了：
- en: '[PRE5]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Creating an A2A Client for the User
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为用户创建 A2A 客户端
- en: 'Let’s create an A2A Client so we can test the agent as it is. The client uses
    the `get_client_from_agent_card_url()` method from `A2AClient` class to (guess
    what) get the agent card. Then we wrap the message in a `SendMessageRequest` object
    and send it to the agent using the `send_message()` method of the client. Here
    is the full code:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个 A2A 客户端，这样我们就可以测试代理了。客户端使用 `A2AClient` 类中的 `get_client_from_agent_card_url()`
    方法（猜猜看）获取代理卡。然后我们将消息包装在一个 `SendMessageRequest` 对象中，并通过客户端的 `send_message()` 方法将其发送到代理。以下是完整的代码：
- en: '[PRE6]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'This is what happens in the terminal that is running the EventAgent server:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这是运行 EventAgent 服务器的终端中发生的事情：
- en: '![](../Images/a3e0965e661274530c95fdb86bfdf52e.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a3e0965e661274530c95fdb86bfdf52e.png)'
- en: '*Image by author*'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片由作者提供*'
- en: 'And this is the message the client sees:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这是客户端看到的消息：
- en: '![](../Images/90615a6a782a80c065d2131f49b6727f.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/90615a6a782a80c065d2131f49b6727f.png)'
- en: '*Image by author*'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片由作者提供*'
- en: The task to detect the event was created and no event was detected, nice! But
    the whole point of A2A is to make Agents communicate with each other, so let’s
    make the Event Agent talk to the Alert Agent.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 事件检测任务已创建，但没有检测到事件，太好了！但A2A的整个目的就是让智能体相互通信，所以让我们让事件智能体与警报智能体通信。
- en: Making the Event Agent talk to the Alert Agent
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使事件智能体与警报智能体通信
- en: 'To make the Event Agent talk to the Alert Agent the Event Agent will act as
    a client as well:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 要使事件智能体与警报智能体通信，事件智能体将充当客户端：
- en: '[PRE7]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'We call the Alert Agent just as we called the Event Agent as the user, and
    when the Alert Agent task is done, we complete the original Event Agent task.
    Let’s call the Event Agent again but this time with an event:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将警报智能体称为用户称呼的事件智能体，当警报智能体任务完成后，我们完成原始的事件智能体任务。让我们再次调用事件智能体，但这次带有一个事件：
- en: '![](../Images/ac0430c875d47de9798e923328703225.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ac0430c875d47de9798e923328703225.png)'
- en: '*Image by author*'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片由作者提供*'
- en: The beauty here is that we simply called the Alert Agent and we don’t need to
    know anything about how it alerts the user. We just send a message to it and wait
    for it to finish.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的美妙之处在于我们只需调用警报智能体，而无需了解它如何向用户发出警报。我们只需向它发送一条消息，并等待它完成。
- en: 'The Alert Agent is super similar to the Event Agent. You can check the whole
    code here: [https://github.com/dmesquita/multi-agent-communication-a2a-python](https://github.com/dmesquita/multi-agent-communication-a2a-python)'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 警报智能体与事件智能体非常相似。你可以在这里查看整个代码：[https://github.com/dmesquita/multi-agent-communication-a2a-python](https://github.com/dmesquita/multi-agent-communication-a2a-python)
- en: Final Thoughts
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Understanding how to build multi-agent systems with A2A might be daunting at
    first, but in the end you just **send messages to let the agents do their thing**.
    All you need to do to integrate you agents with A2A is to create a class with
    the agent’s logic that inherit from the `AgentExecutor` and run the agent as a
    server.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 初次理解如何使用A2A构建多智能体系统可能会感到有些令人畏惧，但最终你只需**发送消息让智能体完成它们的工作**。要将你的智能体与A2A集成，你需要创建一个包含智能体逻辑的类，该类继承自`AgentExecutor`，并将智能体作为服务器运行。
- en: I hope this article have helped you in your A2A journey, thanks for reading!
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这篇文章能帮助你完成A2A之旅，感谢阅读！
