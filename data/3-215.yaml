- en: Debugging the Dreaded NaN
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 调试令人恐惧的NaN
- en: 原文：[https://towardsdatascience.com/debugging-the-dreaded-nan/](https://towardsdatascience.com/debugging-the-dreaded-nan/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/debugging-the-dreaded-nan/](https://towardsdatascience.com/debugging-the-dreaded-nan/)
- en: You are training your latest AI model, anxiously watching as the loss steadily
    decreases when suddenly — boom! Your logs are flooded with NaNs (Not a Number)
    — your model is irreparably corrupted and you’re left staring at your screen in
    despair. To make matters worse, the NaNs don’t appear consistently. Sometimes
    your model trains just fine; other times, it fails inexplicably. Sometimes it
    will crash immediately, sometimes after many days of training.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在训练最新的AI模型，焦急地观察着损失稳步下降，突然——砰！你的日志被NaN（非数字）填满——你的模型已经不可修复地损坏，你只能绝望地盯着屏幕。更糟糕的是，NaN并不总是出现。有时你的模型训练得很好；有时，它无法解释地失败。有时它立即崩溃，有时在训练了许多天后才会崩溃。
- en: NaNs in deep learning workloads are amongst the most frustrating issues to encounter.
    And because they often appear sporadically — triggered by a specific combination
    of model state, input data, and stochastic factors — they can be incredibly difficult
    to reproduce and debug.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习工作负载中的NaN（非数字）问题是遇到的最令人沮丧的问题之一。由于它们通常突然出现——由模型状态、输入数据和随机因素的特定组合触发——因此它们可能极其难以重现和调试。
- en: 'Given the considerable cost of training AI models and the potential waste caused
    by NaN failures, it is recommended to have dedicated tools for capturing and analyzing
    NaN occurrences. In a [previous post](https://contributor.insightmediagroup.io/capturing-a-training-state-in-tensorflow-7d643e3fb20b/),
    we discussed the challenge of debugging NaNs in a TensorFlow training workload.
    We proposed an efficient scheme for capturing and reproducing NaNs and shared
    a sample TensorFlow implementation. In this post, we adopt and demonstrate a similar
    mechanism for debugging NaNs in PyTorch workloads. The general scheme is as follows:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到训练AI模型的成本相当高以及NaN失败可能造成的潜在浪费，建议拥有专门的工具来捕获和分析NaN的发生。在[之前的文章](https://contributor.insightmediagroup.io/capturing-a-training-state-in-tensorflow-7d643e3fb20b/)中，我们讨论了在TensorFlow训练工作负载中调试NaN的挑战。我们提出了一种高效的方法来捕获和重现NaN，并分享了一个示例TensorFlow实现。在这篇文章中，我们采用并展示了类似机制来调试PyTorch工作负载中的NaN。一般方案如下：
- en: 'On each training step:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个训练步骤：
- en: Save a copy of the training input batch.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存训练输入批次的副本。
- en: Check the gradients for NaN values. If any appear, save a checkpoint with the
    current model weights before the model is corrupted. Also, save the input batch
    and, if necessary, the stochastic state. Discontinue the training job.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查梯度中的NaN值。如果出现任何NaN值，在模型被破坏之前保存当前模型权重的检查点。此外，保存输入批次，如果需要，保存随机状态。中断训练作业。
- en: Reproduce and debug the NaN occurrence by loading the saved experiment state.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过加载保存的实验状态来重现和调试NaN的发生。
- en: Although this scheme can be easily implemented in native PyTorch, we will take
    the opportunity to demonstrate some of the conveniences of [PyTorch Lightning](https://github.com/Lightning-AI/pytorch-lightning) —
    a powerful open-source framework designed to streamline the development of machine
    learning (ML) models. Built on PyTorch, Lightning abstracts away many of the boiler-plate
    components of an ML experiment, such as training loops, data distribution, logging,
    and more, enabling developers to focus on the core logic of their models.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这个方案可以很容易地在原生PyTorch中实现，但我们将借此机会展示一些[PyTorch Lightning](https://github.com/Lightning-AI/pytorch-lightning)的便利之处——这是一个强大的开源框架，旨在简化机器学习（ML）模型的开发。建立在PyTorch之上，Lightning抽象掉了许多机器学习实验的样板代码组件，如训练循环、数据分布、日志记录等，使开发者能够专注于模型的核心逻辑。
- en: To implement our NaN capturing scheme, we will use [Lightning’s callback](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html) interface
    — a dedicated structure that enables inserting custom logic at specific points
    during the flow of execution.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现我们的NaN捕获方案，我们将使用[Lightning的回调](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html)接口——这是一个专门的架构，允许在执行流程的特定点插入自定义逻辑。
- en: Importantly, please do not view our choice of Lightning or any other tool or
    technique that we mention as an endorsement of its use. The code that we will
    share is intended for demonstrative purposes — please do not rely on its correctness
    or optimality.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，请不要将我们选择Lightning或我们提到的任何其他工具或技术视为对其使用的认可。我们将分享的代码仅用于演示目的——请勿依赖其正确性或最优性。
- en: Many thanks to [Rom Maltser](https://www.linkedin.com/in/rom-maltser/?originalSubdomain=il) for
    his contributions to this post.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢[Rom Maltser](https://www.linkedin.com/in/rom-maltser/?originalSubdomain=il)为此帖子的贡献。
- en: NaNCapture Callback
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NaNCapture回调
- en: To implement our NaN capturing solution, we create a NaNCapture Lightning callback.
    The constructor receives a directory path for storing/loading checkpoints and
    sets up the NaNCapture state. We also define utilities for checking for NaNs,
    storing checkpoints, and halting the training job.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现我们的NaN捕获解决方案，我们创建了一个NaNCapture Lightning回调。构造函数接收一个用于存储/加载检查点的目录路径，并设置NaNCapture状态。我们还定义了用于检查NaN、存储检查点和停止训练作业的实用工具。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Callback Function: on_train_batch_start'
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回调函数：on_train_batch_start
- en: We begin by implementing the [on_train_batch_start](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#on-train-batch-start) hook
    to store a copy of each input batch. In case of a NaN event, this batch will be
    stored in the checkpoint.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先实现[on_train_batch_start](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#on-train-batch-start)钩子，以存储每个输入批次的副本。在发生NaN事件的情况下，这个批次将被存储在检查点中。
- en: 'Callback Function: on_before_optimizer_step'
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回调函数：on_before_optimizer_step
- en: Next we implement the [on_before_optimizer_step](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#on-before-optimizer-step) hook.
    Here, we check for NaN entries in all of the gradient tensors. If found, we store
    a checkpoint with the uncorrupted model weights and halt the training.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来我们实现[on_before_optimizer_step](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#on-before-optimizer-step)钩子。在这里，我们检查所有梯度张量中是否存在NaN条目。如果找到，我们将存储一个包含未损坏模型权重的检查点并停止训练。
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Capturing the Training State
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 捕获训练状态
- en: 'To enable reproducibility, we include the NaNCapture state in the checkpoint
    by appending it to the training state dictionary. Lightning provides dedicated
    utilities for saving and loading a [callback state](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#save-callback-state):'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了启用可重现性，我们将NaNCapture状态包含在检查点中，通过将其附加到训练状态字典。Lightning提供了用于保存和加载[callback状态](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#save-callback-state)的专用实用工具：
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Reproducing the NaN Occurrence
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 复现NaN的出现
- en: We have described how our NaNCapture callback can be used to store the training
    state that resulted in a NaN, but how do we reload this state in order to reproduce
    the issue and debug it? To accomplish this, we leverage Lightning’s dedicated
    data loading class, [LightningDataModule](https://lightning.ai/docs/pytorch/stable/data/datamodule.html).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经描述了如何使用NaNCapture回调来存储导致NaN的训练状态，但如何重新加载此状态以重现问题并进行调试？为了完成这项任务，我们利用Lightning的专用数据加载类[LightningDataModule](https://lightning.ai/docs/pytorch/stable/data/datamodule.html)。
- en: 'DataModule Function: on_before_batch_transfer'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: DataModule函数：on_before_batch_transfer
- en: 'In the code block below, we extend the [LightningDataModule](https://lightning.ai/docs/pytorch/stable/data/datamodule.html) class
    to allow injecting a fixed training input batch. This is achieved by overriding
    the [on_before_batch_transfer](https://lightning.ai/docs/pytorch/stable/data/datamodule.html#on-before-batch-transfer) hook,
    as shown below:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我们扩展了[LightningDataModule](https://lightning.ai/docs/pytorch/stable/data/datamodule.html)类，以允许注入一个固定的训练输入批次。这是通过覆盖[on_before_batch_transfer](https://lightning.ai/docs/pytorch/stable/data/datamodule.html#on-before-batch-transfer)钩子来实现的，如下所示：
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Callback Function: on_train_start'
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回调函数：on_train_start
- en: The final step is modifying the [on_train_start](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#on-train-start) hook
    of our NaNCapture callback to inject the stored training batch into the [LightningDataModule](https://lightning.ai/docs/pytorch/stable/data/datamodule.html).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是修改NaNCapture回调的[on_train_start](https://lightning.ai/docs/pytorch/stable/extensions/callbacks.html#on-train-start)钩子，将存储的训练批次注入到[LightningDataModule](https://lightning.ai/docs/pytorch/stable/data/datamodule.html)。
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: In the next section we will demonstrate the end-to-end solution using a toy
    example.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将使用玩具示例演示端到端解决方案。
- en: Toy Example
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 玩具示例
- en: To test our new callback, we create a [resnet50](https://pytorch.org/vision/main/models/generated/torchvision.models.resnet50)-based
    image classification model with a loss function deliberately designed to trigger
    NaN occurrences.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试我们新的回调，我们创建了一个基于[resnet50](https://pytorch.org/vision/main/models/generated/torchvision.models.resnet50)的图像分类模型，并故意设计了一个损失函数来触发NaN的出现。
- en: Instead of using the standard [CrossEntropy](https://pytorch.org/docs/stable/generated/torch.nn.CrossEntropyLoss.html) loss,
    we compute [binary_cross_entropy_with_logits](https://pytorch.org/docs/stable/generated/torch.nn.functional.binary_cross_entropy_with_logits.html) for
    each class independently and divide the result by the number of samples belonging
    to that class. Inevitably, we will encounter a batch in which one or more classes
    are missing, leading to a divide-by-zero operation, resulting in NaN values and
    corrupting the model.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有使用标准的[CrossEntropy](https://pytorch.org/docs/stable/generated/torch.nn.CrossEntropyLoss.html)损失，而是为每个类别独立计算[binary_cross_entropy_with_logits](https://pytorch.org/docs/stable/generated/torch.nn.functional.binary_cross_entropy_with_logits.html)，并将结果除以属于该类别的样本数量。不可避免地，我们将遇到一个批次，其中一个或多个类别缺失，导致除以零操作，从而产生NaN值并损坏模型。
- en: The implementation below follows Lightning’s [introductory tutorial](https://lightning.ai/docs/pytorch/stable/starter/introduction.html).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的实现遵循Lightning的[introductory tutorial](https://lightning.ai/docs/pytorch/stable/starter/introduction.html)。
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'We define a synthetic dataset and encapsulate it in our `InjectableDataModule`
    class:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义了一个合成数据集，并将其封装在我们的`InjectableDataModule`类中：
- en: '[PRE6]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Finally, we initialize a Lightning [Trainer](https://lightning.ai/docs/pytorch/stable/common/trainer.html) with
    our NaNCapture callback and call trainer.fit with our Lightning module and Lightning
    DataModule.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们使用我们的NaNCapture回调函数初始化一个Lightning [Trainer](https://lightning.ai/docs/pytorch/stable/common/trainer.html)，并使用我们的Lightning模块和Lightning
    DataModule调用trainer.fit。
- en: '[PRE7]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: After a number of training steps, a NaN event will occur. At this point a checkpoint
    is saved with the full training state and the training is halted.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在经过一定数量的训练步骤后，将发生NaN事件。此时，将保存包含完整训练状态的检查点，并停止训练。
- en: When the script is run again the exact state that caused the NaN will be reloaded
    allowing us to easily reproduce the issue and debug its root cause.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当脚本再次运行时，将重新加载导致NaN的确切状态，使我们能够轻松地重现问题并调试其根本原因。
- en: Performance Overhead
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能开销
- en: To assess the impact of our NaNCapture callback on runtime performance, we modified
    our experiment to use [CrossEntropyLoss](https://pytorch.org/docs/stable/generated/torch.nn.CrossEntropyLoss.html) (to
    avoid NaNs) and measured the average throughput when running with and without
    NaNCapture callback. The experiments were conducted on an [NVIDIA L40S GPU](https://www.nvidia.com/en-eu/data-center/l40s/),
    with a [PyTorch 2.5.1 Docker](https://hub.docker.com/layers/pytorch/pytorch/2.5.1-cuda12.4-cudnn9-devel/images/sha256-14611869895df612b7b07227d5925f30ec3cd6673bad58ce3d84ed107950e014) image.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估我们的NaNCapture回调函数对运行时性能的影响，我们修改了实验，使用[CrossEntropyLoss](https://pytorch.org/docs/stable/generated/torch.nn.CrossEntropyLoss.html)（以避免NaN）并测量了在有和无NaNCapture回调函数运行时的平均吞吐量。实验在一个[NVIDIA
    L40S GPU](https://www.nvidia.com/en-eu/data-center/l40s/)上执行，使用了一个[PyTorch 2.5.1
    Docker](https://hub.docker.com/layers/pytorch/pytorch/2.5.1-cuda12.4-cudnn9-devel/images/sha256-14611869895df612b7b07227d5925f30ec3cd6673bad58ce3d84ed107950e014)镜像。
- en: '![](../Images/074229c165b441d786daf55b0ca11c0b.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/074229c165b441d786daf55b0ca11c0b.png)'
- en: Overhead of NaNCapture Callback (by Author)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: NaNCapture回调函数的开销（作者提供）
- en: For our toy model, the NaNCapture callback adds a minimal 1.5% overhead to the
    runtime performance — a small price to pay for the valuable debugging capabilities
    it provides.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的玩具模型，NaNCapture回调函数为运行时性能增加了最小的1.5%开销——为了它提供的宝贵调试能力，这是一个微不足道的代价。
- en: Naturally, the actual overhead will depend on the specifics of the model and
    runtime environment.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，实际的开销将取决于模型和运行时环境的特定细节。
- en: How to Handle Stochasticity
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何处理随机性
- en: The solution we have described henceforth will succeed in reproducing the training
    state provided that the model does not include any randomness. However, introducing
    stochasticity into the model definition is often critical for convergence. A common
    example of a stochastic layer is [torch.nn.Dropout](https://pytorch.org/docs/stable/generated/torch.nn.Dropout.html).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们之前描述的解决方案将成功重现训练状态，前提是模型不包含任何随机性。然而，将随机性引入模型定义对于收敛通常是至关重要的。一个常见的随机层示例是[torch.nn.Dropout](https://pytorch.org/docs/stable/generated/torch.nn.Dropout.html)。
- en: 'You may find that your NaN event depends on the precise state of randomness
    when the failure occurred. Consequently, we would like to enhance our NaNCapture
    callback to capture and restore the random state at the point of failure. The
    random state is determined by a number of libraries. In the code block below,
    we attempt to capture the full state of randomness:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会发现你的 NaN 事件取决于失败发生时随机状态的精确状态。因此，我们希望增强我们的 NaNCapture 回调，以捕获和恢复失败点的随机状态。随机状态由多个库决定。在下面的代码块中，我们尝试捕获随机状态的完整状态：
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Importantly, setting the random state may not guarantee full [reproducibility](https://pytorch.org/docs/stable/notes/randomness.html#reproducibility).
    The GPU owes its power to its massive parallelism. In some GPU operations, multiple
    threads may read or write concurrently to the same memory locations resulting
    in nondeterminism. PyTorch allows for some control over this via its [use_deterministic_algorithms](https://pytorch.org/docs/stable/generated/torch.use_deterministic_algorithms.html),
    but this may impact the runtime performance. Additionally, there is a possibility
    that the NaN event will not reproduced once this configuration setting is changed.
    Please see the PyTorch documentation on [reproducibility](https://pytorch.org/docs/stable/notes/randomness.html#reproducibility) for
    more details.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，设置随机状态可能无法保证完全的[可复现性](https://pytorch.org/docs/stable/notes/randomness.html#reproducibility)。GPU
    的强大之处在于其巨大的并行性。在某些 GPU 操作中，多个线程可能同时读取或写入相同的内存位置，导致非确定性。PyTorch 允许通过其 [use_deterministic_algorithms](https://pytorch.org/docs/stable/generated/torch.use_deterministic_algorithms.html)
    提供一些控制，但这可能会影响运行时性能。此外，一旦更改此配置设置，NaN 事件可能无法再次复现。请参阅 PyTorch 关于 [可复现性](https://pytorch.org/docs/stable/notes/randomness.html#reproducibility)
    的文档以获取更多详细信息。
- en: Summary
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Encountering NaN failures is one of the most discouraging events that can happen
    in machine learning development. These errors not only waste valuable computation
    and development resources, but often indicate fundamental issues in the model
    architecture or experiment design. Due to their sporadic, sometimes elusive nature,
    debugging NaN failures can be a nightmare.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 遇到 NaN 错误是机器学习开发中最令人沮丧的事件之一。这些错误不仅浪费了宝贵的计算和开发资源，而且通常表明模型架构或实验设计中存在根本问题。由于它们具有偶然性和有时难以捉摸的特性，调试
    NaN 错误可能是一场噩梦。
- en: This post introduced a proactive approach for capturing and reproducing NaN
    errors using a dedicated Lightning callback. The solution we shared is a proposal
    which can be modified and extended for your specific use case.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 本文介绍了一种使用专用 Lightning 回调捕获和复现 NaN 错误的主动方法。我们分享的解决方案是一个可以修改和扩展以适应您特定用例的提案。
- en: While this solution may not address every possible NaN scenario, it significantly
    reduces debugging time when applicable, potentially saving developers countless
    hours of frustration and wasted effort.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然此解决方案可能无法解决每个可能的 NaN 场景，但在适用的情况下，它显著减少了调试时间，可能为开发者节省了无数小时的挫败感和浪费的努力。
