- en: How to Ensure Reliability in LLM Applications
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何确保LLM应用中的可靠性
- en: 原文：[https://towardsdatascience.com/how-to-ensure-reliability-in-llm-applications/](https://towardsdatascience.com/how-to-ensure-reliability-in-llm-applications/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-ensure-reliability-in-llm-applications/](https://towardsdatascience.com/how-to-ensure-reliability-in-llm-applications/)
- en: <mdspan datatext="el1752530367282" class="mdspan-comment">LLMs</mdspan> have
    entered the world of computer science at a record pace. LLMs are powerful models
    capable of effectively performing a wide variety of tasks. However, LLM outputs
    are stochastic, making them unreliable. In this article, I discuss how you can
    ensure reliability on your LLM applications by properly prompting the model and
    handling the output.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752530367282" class="mdspan-comment">LLMs</mdspan>以创纪录的速度进入了计算机科学领域。LLM是强大的模型，能够有效地执行各种任务。然而，LLM的输出是随机的，这使得它们不可靠。在这篇文章中，我讨论了如何通过正确提示模型和处理输出，确保你的LLM应用中的可靠性。
