- en: Top Machine Learning Jobs and How to Prepare For Them
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最受欢迎的机器学习职位及其准备方法
- en: 原文：[https://towardsdatascience.com/top-machine-learning-jobs-and-how-to-prepare-for-them/](https://towardsdatascience.com/top-machine-learning-jobs-and-how-to-prepare-for-them/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/top-machine-learning-jobs-and-how-to-prepare-for-them/](https://towardsdatascience.com/top-machine-learning-jobs-and-how-to-prepare-for-them/)'
- en: <mdspan datatext="el1747889275317" class="mdspan-comment">These</mdspan> days,
    job titles like *data scientist*, *machine learning engineer*, and *AI engineer*
    are everywhere — and if you were anything like me, it can be hard to understand
    what each of them actually does if you are not working within the field.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747889275317" class="mdspan-comment">这些</mdspan>天，像 *数据科学家*、*机器学习工程师*
    和 *AI 工程师* 这样的职位无处不在——如果你像我一样，如果你不在该领域工作，可能会很难理解他们实际上做什么。
- en: And then there are titles that sound even more confusing — like *quantum blockchain
    LLM robotic engineer* (okay, I made that one up, but you get the point).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然后还有一些听起来更令人困惑的职位名称，比如 *量子区块链 LLM 机器人工程师*（好吧，这是我编造的，但你应该明白我的意思）。
- en: The job market is full of buzzwords and overlapping roles, which can make it
    difficult to know where to start if you’re interested in a career in machine learning.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 人才市场上充满了各种术语和重叠的角色，如果你对机器学习职业感兴趣，可能会很难知道从哪里开始。
- en: In this article, I’ll break down the top machine learning roles and explain
    what each one involves — plus what you need to do to prepare for them.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分解顶级机器学习职位，并解释每个职位涉及的内容——以及你需要做什么来为它们做准备。
- en: Data Scientist
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学家
- en: What is it?
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 那是什么？
- en: A data scientist is the most well-known role, but has the largest range of job
    responsibilities.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家是最为人所熟知的角色，但承担的工作职责范围最广。
- en: 'In general, there are two types of data scientists:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，数据科学家有两种类型：
- en: Analytics and experiment-focused.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析和实验导向。
- en: Machine learning and modelling focused.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习和建模导向。
- en: The former includes things like running A/B tests, conducting deep dives to
    determine where the business could improve, and suggesting improvements to machine
    learning models by identifying their blind spots. A lot of this work is called
    explanatory data analysis or EDA for short.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 前者包括运行 A/B 测试、进行深度分析以确定业务可以改进的地方，并通过识别其盲点来提出改进机器学习模型的建议。这项工作很多被称为解释性数据分析或简称为
    EDA。
- en: The latter is mainly about building PoC machine learning models and decision
    systems that benefit the business. Then, working with software and machine learning
    engineers, to deploy those models to production and monitor their performance.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 后者主要关于构建有助于业务的 PoC 机器学习模型和决策系统。然后，与软件和机器学习工程师合作，将这些模型部署到生产环境中并监控其性能。
- en: 'Many of the machine learning algorithms will typically be on the simpler side
    and be regular supervised and unsupervised learning models, like:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 许多机器学习算法通常较为简单，并且是常规的监督学习和无监督学习模型，例如：
- en: XGBoost
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: XGBoost
- en: Linear and logistic regression
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性和逻辑回归
- en: Random forest
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机森林
- en: K-means clustering
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: K-means 聚类
- en: I was a data scientist at my old company, but I mainly built machine learning
    models and didn’t run many A/B tests or experiments. That was work that was carried
    out by data analysts and product analysts.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我以前的公司是一名数据科学家，但我主要构建机器学习模型，并没有运行很多 A/B 测试或实验。那是数据分析师和产品分析师进行的工作。
- en: However, at my current company, data scientists don’t build machine learning
    models but mainly do deep-dive analysis and measure experiments. Model development
    is mainly done by machine learning engineers.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我目前的公司，数据科学家并不构建机器学习模型，而是主要进行深度分析和测量实验。模型开发主要由机器学习工程师完成。
- en: It all really comes down to the company. Therefore, it is really important that
    you read the job description to make sure it’s the right job for you.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都归结于公司。因此，确保你阅读职位描述，确保这是适合你的工作，非常重要。
- en: What do they use?
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 他们使用什么？
- en: 'As a data scientist, these are generally the things you need to know (it’s
    not exhaustive and will vary by role):'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据科学家，以下是你通常需要了解的内容（这不是详尽的，并且会因角色而异）：
- en: Python and SQL
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python 和 SQL
- en: Git and GitHub
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Git 和 GitHub
- en: Command Line (Bash and Zsh)
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命令行（Bash 和 Zsh）
- en: Statistics and maths knowledge
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 统计学和数学知识
- en: Basic machine learning skills
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础机器学习技能
- en: A bit of cloud systems (AWS, Azure, GCP)
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些云系统知识（AWS、Azure、GCP）
- en: I have roadmaps on becoming a data scientist that you can check out below if
    this role interests you.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这个角色感兴趣，以下是我为你准备的成为数据科学家的路线图。
- en: '[How I’d Become a Data Scientist (If I Had to Start Over)](https://towardsdatascience.com/how-id-become-a-data-scientist-if-i-had-to-start-over-d966a9de12c2/)'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如果我要重新开始，我将如何成为一名数据科学家](https://towardsdatascience.com/how-id-become-a-data-scientist-if-i-had-to-start-over-d966a9de12c2/)'
- en: Machine Learning Engineer
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习工程师
- en: What is it?
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它是什么？
- en: As the title suggests, a machine learning engineer is all about building machine
    learning models and deploying them into production systems.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 正如标题所暗示的，机器学习工程师的一切都是关于构建机器学习模型并将它们部署到生产系统中。
- en: It originally came from software engineering, but is now its own job/title.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 它最初来自软件工程，但现在已经成为一个独立的职位/头衔。
- en: The significant distinction between machine learning engineers and data scientists
    is that machine learning engineers deploy the algorithms.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习工程师和数据科学家之间的显著区别在于，机器学习工程师部署算法。
- en: 'As leading AI/ML practitioner [Chip Huyen](https://huyenchip.com/ml-interviews-book/contents/1.1.3.3-machine-learning-engineer-vs.-data-scientist.html)
    puts it:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如领先的AI/ML实践者[Chip Huyen](https://huyenchip.com/ml-interviews-book/contents/1.1.3.3-machine-learning-engineer-vs.-data-scientist.html)所说：
- en: '*The goal of data science is to **generate business insights**, whereas the
    goal of ML engineering is to **turn data into products**.*'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*数据科学的目的是**生成商业洞察力**，而机器学习工程的目标是**将数据转化为产品**。*'
- en: You will find that data scientists often come from a strong maths, statistics,
    or economics background, and machine learning engineers come more from science
    and engineering backgrounds.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你会发现数据科学家通常来自强大的数学、统计学或经济学背景，而机器学习工程师则更多来自科学和工程背景。
- en: However, there is a big overlap in this role, and some companies may bundle
    the data scientist and machine learning engineer positions into a single job,
    frequently with the data scientist title.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个角色有很大的重叠，一些公司可能会将数据科学家和机器学习工程师职位合并为一个职位，通常使用数据科学家的头衔。
- en: The machine learning engineer job is typically found in more established tech
    companies; however, it is slowly becoming more popular over time.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习工程师的职位通常在更成熟的科技公司中找到；然而，随着时间的推移，它正逐渐变得更加流行。
- en: 'There also exist further specialisms within the machine learning engineer role,
    like:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习工程师角色中，也存在进一步的专长，如：
- en: ML platform engineer
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习平台工程师
- en: ML hardware engineer
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习硬件工程师
- en: ML solutions architect
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习解决方案架构师
- en: Don’t worry about these if you are a beginner, as they are pretty niche and
    only relevant after a few years of experience in the field. I just wanted to add
    these so you know the various options out there.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个初学者，不必担心这些，因为它们相当小众，并且只有在该领域有几年经验后才相关。我只是想添加这些，让你知道市场上各种选择。
- en: What do they use?
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 他们使用什么？
- en: 'The tech stack is quite similar for machine learning engineers as for data
    scientists, but has more software engineering elements:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对于机器学习工程师和数据科学家来说，技术栈相当相似，但包含更多的软件工程元素：
- en: Python and SQL, however, some companies may require other languages. For example,
    in my current role, Rust is needed.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然而，尽管需要Python和SQL，但一些公司可能需要其他语言。例如，在我目前的工作中，需要Rust语言。
- en: Git and GitHub
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Git和GitHub
- en: Bash and Zsh
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bash和Zsh
- en: AWS, Azure or GCP
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AWS、Azure或GCP
- en: Software engineering fundamentals like CI/CD, MLOps and Docker.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软件工程基础，如CI/CD、MLOps和Docker。
- en: Excellent machine learning knowledge, ideally a specialism in an area.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优秀的机器学习知识，理想情况下是某个领域的专长。
- en: AI Engineer
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI工程师
- en: What is it?
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它是什么？
- en: This is a new title that cropped up with all the AI hype going on now, and to
    be honest, I think it’s an odd title and not really needed. Often, a machine learning
    engineer will do the role of an AI engineer at most companies.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个随着现在AI炒作而出现的新头衔，坦白说，我认为这个头衔很奇怪，实际上并不必要。通常，机器学习工程师在大多数公司中最多会承担AI工程师的角色。
- en: Most AI engineer roles are actually about GenAI, not AI as a whole. This distinction
    normally makes no sense to people outside of the industry.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数AI工程师角色实际上都是关于生成式AI，而不是整个AI领域。这种区别通常对行业外的人来说没有意义。
- en: However, AI encompasses almost any decision-making algorithm and is larger than
    the machine learning field.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，AI几乎涵盖了任何决策算法，并且比机器学习领域更大。
- en: '![](../Images/d525d02a52c2b10c7f01687d215a1e10.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d525d02a52c2b10c7f01687d215a1e10.png)'
- en: Image by author.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: The current definition of an AI engineer is someone who works mainly with LLM
    and GenAI tools to help the business.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 当前AI工程师的定义是那些主要使用LLM和生成式AI工具来帮助业务的人。
- en: They don’t necessarily develop the underlying algorithms from scratch, mainly
    because it’s hard to do unless you’re in a research lab, and many of the top models
    are open-sourced, so you don’t need to reinvent the wheel.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 他们并不一定从头开始开发底层算法，主要是因为除非你在研究实验室，否则很难做到，而且许多顶级模型都是开源的，所以你不需要重新发明轮子。
- en: Instead, they focus on adapting and building the product first, then worrying
    about the model fine-tuning afterwards. So, they wu
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，他们首先关注适应和构建产品，然后再考虑模型微调。因此，他们...
- en: It is a lot closer to traditional software engineering than the machine learning
    engineer role as it currently stands. Although many machine learning engineers
    will operate as AI engineers, the job is new and not fully fleshed out yet.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这个角色与传统软件工程师的角色相比要接近得多。尽管许多机器学习工程师会作为AI工程师工作，但这个职位是新的，还没有完全明确。
- en: What do they use?
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 他们使用什么？
- en: 'This role is evolving quite a bit, but in general, you need good knowledge
    of all the latest GenAI and LLM trends:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这个角色正在经历很大的变化，但总的来说，你需要对最新的GenAI和LLM趋势有很好的了解：
- en: Solid software engineering skills
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 稳定的软件工程技能
- en: Python, SQL and backend langauges like Java or GO are useful
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python、SQL以及Java或GO等后端语言很有用
- en: CI/CD
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续集成/持续部署
- en: Git
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Git
- en: LLMs and transformers
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大型语言模型和转换器
- en: RAG
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAG
- en: Prompt engineering
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示工程
- en: Foundational models
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础模型
- en: Fine tuning
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调
- en: I also recommend you check out Datacamp’s associates AI engineer for data scientist
    track, that will also set you up nicely for a career as a data scientist. This
    is linked in the description below.
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我还推荐你查看Datacamp的数据科学家AI工程师副修课程，这将为你成为一名数据科学家的事业打下良好的基础。这在下面的描述中有链接。
- en: Research Scientist/Engineer
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 研究科学家/工程师
- en: What is it?
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 那是什么呢？
- en: The previous roles were mainly industry positions, but these next two will be
    research-based.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的主要是行业职位，但接下来的两个将是基于研究的。
- en: Industry roles are mainly associated with business and are all about generating
    business value. Whether you use linear regression or a transformer model, what
    matters is the impact, not necessarily the method.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 行业角色主要与商业相关，都是关于创造商业价值。无论你使用线性回归还是转换器模型，重要的是影响，而不是方法。
- en: Research aims to expand the current knowledge capabilities theoretically and
    practically. This approach revolves around the scientific method and deep experiments
    in a niche field.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 研究旨在从理论和实践上扩展当前的知识能力。这种方法围绕科学方法和在特定领域的深入实验。
- en: 'The difference between what’s research and industry is vague and often overlaps.
    For example, a lot of the top research labs are actually big tech companies:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 研究和行业之间的区别是模糊的，并且经常重叠。例如，许多顶级研究实验室实际上是大型科技公司：
- en: Meta Research
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Meta Research
- en: Google AI
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谷歌AI
- en: Microsoft AI
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微软AI
- en: These companies initially started to solve business problems, but now have dedicated
    research sectors, so you may work on industry and research problems. Where one
    begins and the other ends is not always clear.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这些公司最初是为了解决商业问题而开始的，但现在它们有专门的研究部门，因此你可能会在行业和研究问题上工作。一个开始和另一个结束的地方并不总是很清楚。
- en: 'If you are interested in exploring the differences between research and industry
    more deeply, I recommend you read this document. It’s the first lecture of [Stanford’s
    CS 329S, lecture 1: Understanding machine learning production](https://docs.google.com/document/d/1VuofeF5okBATz1F7HRQmOgi5Jc4bmUiHMYjRqwF-29s/edit?usp=sharing).'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要更深入地了解研究和行业之间的差异，我建议你阅读这份文档。这是斯坦福CS 329S的第一讲：理解机器学习生产[链接](https://docs.google.com/document/d/1VuofeF5okBATz1F7HRQmOgi5Jc4bmUiHMYjRqwF-29s/edit?usp=sharing)。
- en: In general, there are more industry positions than research, as only the large
    companies can afford the data and computing costs.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，行业职位比研究职位多，因为只有大型公司才能承担数据和处理成本。
- en: Anyway, as a research engineer or scientist, you will essentially be working
    on cutting-edge research, pushing the boundaries of machine learning knowledge.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，作为一名研究工程师或科学家，你将主要致力于前沿研究，推动机器学习知识的边界。
- en: There is a slight distinction between the two the jobs. As a research scientist,
    you will need a Phd, but this is not necessarily true for a research engineer.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个职位之间有一些细微的区别。作为一名研究科学家，你需要拥有博士学位，但对于研究工程师来说，这并不一定成立。
- en: A research engineer typically implements the theoretical details and ideas of
    the research scientist. This role is usually at large, established research companies;
    in most situations, the research engineer and scientist jobs are the same though.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 研究工程师通常负责实施研究科学家的理论细节和想法。这个角色通常在大型的、已建立的研究公司中；在大多数情况下，研究工程师和科学家的职位是相同的。
- en: Companies may offer the research scientist title as it gives you more “clout”
    and makes you more likely to take the job.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 公司可能会提供研究科学家的头衔，因为它给你更多的“影响力”，并使你更有可能接受这份工作。
- en: What do they use?
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 他们使用什么？
- en: This one is similar to machine learning engineering, but the depth of knowledge
    and qualifications is often greater.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这个领域与机器学习工程类似，但知识的深度和资质要求通常更高。
- en: Python and SQL
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python 和 SQL
- en: Git and GitHub
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Git 和 GitHub
- en: Bash and Zsh
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bash 和 Zsh
- en: AWS, Azure or GCP
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AWS、Azure 或 GCP
- en: Software engineering fundamentals like CI/CD, MLOps and Docker.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软件工程基础，如 CI/CD、MLOps 和 Docker。
- en: Excellent machine learning knowledge and a specialism in a cutting-edge area
    like computer vision, reinforcement learning, LLM, etc.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优秀的机器学习知识，以及在计算机视觉、强化学习、LLM 等前沿领域的专业。
- en: PhD or at least a master’s in a relevant discipline.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 博士或至少相关学科的硕士学位。
- en: Research experience.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究经验。
- en: '* * *'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: This article has just scratched the surface of machine learning roles, and there
    are many more niche jobs and specialisms within these four or five I mentioned.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章只是刚刚触及了机器学习角色的表面，还有更多我提到的这四个或五个领域内的细分工作和专业。
- en: I always recommend starting your career by getting your foot in the door and
    then pivoting to the direction you want to go. This strategy is much more effective
    than tunnel vision for only one role.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是建议通过进入门槛并转向你想要的方向来开始你的职业生涯。这种策略比只专注于一个角色的隧道视野更有效。
