- en: Deep Dive into WebSockets and Their Role in Client-Server Communication
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 深入探讨 WebSockets 及其在客户端-服务器通信中的作用
- en: 原文：[https://towardsdatascience.com/deep-dive-into-websockets-and-their-role-in-client-server-communication-aac387e10cb6/](https://towardsdatascience.com/deep-dive-into-websockets-and-their-role-in-client-server-communication-aac387e10cb6/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/deep-dive-into-websockets-and-their-role-in-client-server-communication-aac387e10cb6/](https://towardsdatascience.com/deep-dive-into-websockets-and-their-role-in-client-server-communication-aac387e10cb6/)
- en: '![Image by Kelly from Unsplash](../Images/a13c48836c2a9f4e4f5a3a12ed17a771.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由 Kelly 从 Unsplash 提供的图片](../Images/a13c48836c2a9f4e4f5a3a12ed17a771.png)'
- en: Image by [Kelly](https://unsplash.com/@kellysikkema) from [Unsplash](https://unsplash.com/)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Kelly](https://unsplash.com/@kellysikkema) 提供，来自 [Unsplash](https://unsplash.com/)
- en: Real-time communication is everywhere – live chatbots, data streams, or instant
    messaging. WebSockets are a powerful enabler of this, but when should you use
    them? How do they work, and how do they differ from traditional HTTP requests?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 实时通信无处不在——实时聊天机器人、数据流或即时消息。WebSockets 是实现这一功能的强大工具，但何时应该使用它们？它们是如何工作的，以及它们与传统
    HTTP 请求有何不同？
- en: This article was inspired by a recent system design interview – "design a real
    time messaging app" – where I stumbled through some concepts. Now that I’ve dug
    deeper, I’d like to share what I’ve learned so you can avoid the same mistakes.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本文灵感来源于最近的一次系统设计面试——“设计一个实时消息应用”——我在其中遇到了一些概念。现在我已经深入研究了这些概念，我想与你分享我所学到的，以便你可以避免犯同样的错误。
- en: In this article, we’ll explore how WebSockets fit into the bigger picture of
    client‑server communication. We’ll discuss what they do well, where they fall
    short, and – yes – how to design a real‑time messaging app.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将探讨 WebSockets 如何融入客户端-服务器通信的更大图景。我们将讨论它们擅长什么，它们在哪里不足，以及——是的——如何设计一个实时消息应用。
- en: Client-server communication
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户端-服务器通信
- en: 'At its core, client-server communication is the exchange of data between two
    entities: a client and a server.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在本质上，客户端-服务器通信是两个实体之间数据交换的过程：客户端和服务器。
- en: The client requests for data, and the server processes these requests and returns
    a response. These roles are not exclusive – services can act as both a client
    and a server simultaneously, depending on the context.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端请求数据，服务器处理这些请求并返回响应。这些角色并非互斥——服务可以根据上下文同时充当客户端和服务器。
- en: Before diving into the details of WebSockets, let’s take a step back and explore
    the bigger picture of client-server communication methods.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨 WebSockets 的细节之前，让我们退一步，探讨客户端-服务器通信方法的更大图景。
- en: 1\. Short polling
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 短轮询
- en: Short polling is the simplest, most familiar approach.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 短轮询是最简单、最熟悉的方法。
- en: The client repeatedly sends HTTP requests to the server at regular intervals
    (e.g., every few seconds) to check for new data. Each request is independent and
    one-directional (client → server).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端会定期（例如，每隔几秒）向服务器发送 HTTP 请求以检查新数据。每个请求都是独立的且单向的（客户端 → 服务器）。
- en: This method is easy to set up but can waste resources if the server rarely has
    fresh data. Use it for less time‑sensitive applications where occasional polling
    is sufficient.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法易于设置，但如果服务器很少提供新鲜数据，可能会浪费资源。适用于对时间敏感度较低的应用，偶尔轮询就足够了。
- en: 2\. Long polling
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 长轮询
- en: Long polling is an improvement over short polling, designed to reduce the number
    of unnecessary requests. Instead of the server immediately responding to a client
    request, the server **keeps the connection open** until new data is available.
    Once the server has data, it sends the response, and the client immediately establishes
    a new connection.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 长轮询是短轮询的改进，旨在减少不必要的请求数量。服务器不会立即响应用户请求，而是**保持连接打开**，直到有新数据可用。一旦服务器有数据，它就会发送响应，客户端立即建立新的连接。
- en: Long polling is also **stateless** and **one-directional** (client → server).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 长轮询也是**无状态的**和**单向的**（客户端 → 服务器）。
- en: A typical example is a ride‑hailing app, where the client waits for a match
    or booking update.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一个典型的例子是打车应用，客户端等待匹配或预订更新。
- en: 3\. Webhooks
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. Webhooks
- en: Webhooks flip the script by making the server the initiator. The server sends
    **HTTP POST** requests to a client-defined endpoint whenever specific events occur.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Webhooks 通过使服务器成为发起者来改变规则。每当发生特定事件时，服务器都会向客户端定义的端点发送 **HTTP POST** 请求。
- en: Each request is **independent** and does not rely on a persistent connection.
    Webhooks are also **one-directional** (server to client).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 每个请求都是**独立的**，且不依赖于持久连接。Webhooks 也是**单向的**（服务器到客户端）。
- en: Webhooks are widely used for asynchronous notifications, especially when integrating
    with third-party services. For example, payment systems use webhooks to notify
    clients when the status of a transaction changes.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: Webhooks被广泛用于异步通知，尤其是在与第三方服务集成时。例如，支付系统使用webhooks在交易状态改变时通知客户端。
- en: 4\. Server-Sent Events (SSE)
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 服务器发送事件（SSE）
- en: SSEs are a **native HTTP-based event streaming protocol** that allows servers
    to push real-time updates to clients over a single, **persistent connection**.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: SSE是一种**基于HTTP的本地事件流协议**，允许服务器通过单个、**持久连接**向客户端推送实时更新。
- en: SSE works using the `EventSource` API, making it simple to implement in modern
    web applications. It is **one-directional** (server to client) and ideal for situations
    where the client only needs to receive updates.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: SSE使用`EventSource` API进行工作，这使得它在现代Web应用中实现起来很简单。它是**单向的**（从服务器到客户端），非常适合客户端只需要接收更新的情况。
- en: SSE is well-suited for applications like trading platforms or live sports updates,
    where the server pushes data like stock prices or scores in real time. The client
    does not need to send data back to the server in these scenarios.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: SSE非常适合像交易平台或实时体育更新这样的应用，在这些应用中，服务器实时推送像股价或比分这样的数据。在这些情况下，客户端不需要向服务器发送数据。
- en: But what about two-way communication?
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 但双向通信怎么办？
- en: All the methods above focus on one‑directional flow. For true two‑way, real‑time
    exchanges, we need a different approach. That’s where WebSockets shine.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 所有上述方法都关注单向流。对于真正的双向、实时交换，我们需要不同的方法。这正是WebSocket发光发热的地方。
- en: Let’s dive in.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解。
- en: How do WebSockets work?
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: WebSocket是如何工作的？
- en: WebSockets enable **real-time, bidirectional communication**, making them perfect
    for applications like chat apps, live notifications, and online gaming. Unlike
    the traditional HTTP request-response model, WebSockets create a **persistent**
    connection, where both client and server can send messages independently without
    waiting for a request.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: WebSocket允许**实时、双向通信**，使它们非常适合像聊天应用、实时通知和在线游戏这样的应用。与传统的HTTP请求-响应模型不同，WebSocket创建了一个**持久**的连接，客户端和服务器都可以独立发送消息，而无需等待请求。
- en: The connection begins as a regular HTTP request and is upgraded to a WebSocket
    connection through a handshake.
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 连接开始时是一个常规的HTTP请求，并通过握手升级到WebSocket连接。
- en: Once established, it uses a single TCP connection, operating on the same ports
    as HTTP (80 and 443). Messages sent over WebSockets are small and lightweight,
    making them efficient for low-latency, high-interactivity use cases.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立，它使用单个TCP连接，在相同的端口上运行HTTP（80和443）。通过WebSocket发送的消息小而轻量，这使得它们对于低延迟、高交互性的用例非常高效。
- en: 'WebSocket connections follow a specific URI format: `ws://` for regular connections
    and `wss://` for secure, encrypted connections.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: WebSocket连接遵循特定的URI格式：`ws://`用于常规连接，`wss://`用于安全、加密的连接。
- en: '**What’s a handshake?**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么是握手？**'
- en: A handshake is the process of **initialising a connection** between two systems.
    For WebSockets, it begins with an HTTP GET request from the client, asking for
    a protocol upgrade. This ensures compatibility with HTTP infrastructure before
    transitioning to a persistent WebSocket connection.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 握手是两个系统之间**初始化连接**的过程。对于WebSocket，它从客户端发起一个HTTP GET请求，请求协议升级。这确保在过渡到持久的WebSocket连接之前与HTTP基础设施兼容。
- en: '**Client sends a request, with headers that look like:**'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**客户端发送请求，带有如下头信息：**'
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '`Upgrade` – signals the request to switch the protocol'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Upgrade` – 表示请求切换协议'
- en: '`Sec-WebSocket-Key` – Randomly generated, base64 encoded string used for handshake
    verification'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Sec-WebSocket-Key` – 用于握手验证的随机生成、Base64编码的字符串'
- en: '`Sec-WebSocket-Protocol` (optional) – Lists subprotocols the client supports,
    allowing the server to pick one.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Sec-WebSocket-Protocol`（可选）- 列出客户端支持的子协议，允许服务器选择一个。'
- en: '**2\. Server responds to resquest**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 服务器响应请求**'
- en: 'If the server supports WebSockets and agrees to the upgrade, it responds with
    a **101 Switching Protocols** status. Example headers:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果服务器支持WebSocket并同意升级，它将以**101 Switching Protocols**状态响应。示例头信息：
- en: '[PRE1]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`Sec-WebSocket-Accept` – Base64 encoded hash of the client’s `Sec-WebSocket-Key`
    and a GUID. This ensures the handshake is secure and valid.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Sec-WebSocket-Accept` – 客户端`Sec-WebSocket-Key`的Base64编码哈希值和一个GUID。这确保握手是安全和有效的。'
- en: '**3\. Handshake validation**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 握手验证**'
- en: With the `101 Switching Protocols` response, the WebSocket connection is successfully
    established and both client and server can start exchanging messages in real time.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `101 Switching Protocols` 响应，WebSocket 连接成功建立，客户端和服务器可以开始实时交换消息。
- en: This connection will remain open till it is explicitly closed by either party.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 此连接将保持开启状态，直到任一方明确关闭。
- en: If any code other than `101` is returned, the client has to end the connection
    and the WebSocket handshake will fail.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果返回的不是 `101` 代码，客户端必须结束连接，WebSocket 握手将失败。
- en: Here’s a summary.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个总结。
- en: '![Summary of WebSockets (drawn by me)](../Images/0663170403b822b6094f6e9f1427b019.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![WebSocket 概述（由我绘制）](../Images/0663170403b822b6094f6e9f1427b019.png)'
- en: Summary of WebSockets (drawn by me)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: WebSocket 概述（由我绘制）
- en: WebSocket use cases
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: WebSocket 用例
- en: We’ve talked about how WebSockets enable real-time, bidirectional communication,
    but that’s still pretty abstract term. Let’s nail down some real examples.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了 WebSocket 如何实现实时、双向通信，但这仍然是一个相当抽象的概念。让我们通过一些实际例子来具体化。
- en: WebSockets are widely used in real-time collaboration tools and chat applications,
    such as Excalidraw, Telegram, WhatsApp, Google Docs, Google Maps and the live
    chat section during a YouTube or TikTok live stream.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: WebSocket 在实时协作工具和聊天应用中得到了广泛使用，例如 Excalidraw、Telegram、WhatsApp、Google Docs、Google
    Maps 以及 YouTube 或 TikTok 直播期间的实时聊天部分。
- en: Trade offs
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 权衡
- en: 1\. Having a fallback strategy if connections are terminated
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 如果连接终止，有回退策略
- en: WebSockets don’t automatically recover if the connection is terminated due to
    network issues, server crashes, or other failures. The client must explicitly
    detect the disconnection and attempt to re-establish the connection.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果由于网络问题、服务器崩溃或其他故障导致连接终止，WebSocket 不会自动恢复。客户端必须显式检测断开连接并尝试重新建立连接。
- en: '**Long polling** is often used as a backup while a WebSocket connection tries
    to get reestablished.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**长轮询**通常在 WebSocket 连接尝试重新建立时作为备份使用。'
- en: 2\. Not optimised for streaming audio and video data
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 不适用于流式传输音频和视频数据
- en: WebSocket messages are designed for sending **small, structured messages.**
    To stream large media data, a technology like WebRTC is better suited for these
    scenarios.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: WebSocket 消息设计用于发送**小型、结构化的消息**。要流式传输大型媒体数据，WebRTC 等技术更适合这些场景。
- en: 3\. WebSockets are stateful, hence horizontally scaling is not trivial
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. WebSocket 是有状态的，因此横向扩展不是简单的事情
- en: WebSockets are **stateful**, meaning the server must maintain an active connection
    for every client. This makes horizontal scaling more complex compared to stateless
    HTTP, where any server can handle a client request without maintaining persistent
    state.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: WebSockets 是**有状态的**，这意味着服务器必须为每个客户端维护一个活跃的连接。这使得与无状态的 HTTP 相比，横向扩展更加复杂，在无状态的
    HTTP 中，任何服务器都可以处理客户端请求而不需要维护持久状态。
- en: You’ll need an additional layer of pub/sub mechanisms to do this.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要额外的 pub/sub 机制层来实现这一点。
- en: Design a real time messaging app
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计实时消息应用
- en: Now let’s see how this is applied in system design. I’ve covered both the simple
    (unscalable) solution and a horizontally scaled one.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们看看这是如何在系统设计中应用的。我已经涵盖了简单（不可扩展）解决方案和横向扩展解决方案。
- en: '![End-to-end flow for a horizontally scaled, real time 1–1 chat (drawn by me)](../Images/98b9b867b06132df3f906407f4fa5754.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![横向扩展的实时 1-1 聊天端到端流程（由我绘制）](../Images/98b9b867b06132df3f906407f4fa5754.png)'
- en: End-to-end flow for a horizontally scaled, real time 1–1 chat (drawn by me)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 横向扩展的实时 1-1 聊天端到端流程（由我绘制）
- en: 'Non-scalable single server app: How do two users chat real time?'
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不可扩展的单服务器应用：两个用户如何实现实时聊天？
- en: 'All users connect via WebSocket to one server. The server holds an in-memory
    mapping of `userID : WebSocket conn 1`'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '所有用户都通过 WebSocket 连接到一个服务器。服务器保存一个内存映射，`userID : WebSocket conn 1`'
- en: user1 sends the message over its WebSocket connection to the server.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: user1 通过其 WebSocket 连接向服务器发送消息。
- en: The server writes the message to the MessageDB (persistence first).
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 服务器将消息写入 MessageDB（首先进行持久化）。
- en: 'The server then looks up `user2 : WebSocket conn 2` in it’s in memory map.
    If user2 is online, it delivers the message in real time.'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '服务器随后在其内存映射中查找 `user2 : WebSocket conn 2`。如果用户 2 在线，它将实时传递消息。'
- en: If user2 is offline, the server writes to InboxDB (a store of undelivered messages).
    When user2 returns online, the server fetches all offline messages from InboxDB.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果用户 2 不在线，服务器将消息写入 InboxDB（未投递消息的存储库）。当用户 2 返回在线状态时，服务器从 InboxDB 中检索所有离线消息。
- en: '***Horizontally scaled system: How do two users chat real time?***'
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '***横向扩展系统：两个用户如何实现实时聊天？***'
- en: A single server can only handle so many concurrent WebSockets. To serve more
    users, you need to horizontally scale your WebSocket connections.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 单个服务器只能处理这么多并发WebSocket连接。为了服务更多用户，您需要水平扩展您的WebSocket连接。
- en: 'The key challenge: If user1 is connected to server1 but user2 is connected
    to server2, how does the system know where to send the message?'
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 关键挑战：如果用户1连接到server1但用户2连接到server2，系统如何知道将消息发送到何处？
- en: 'Redis can be used as a global data store that maps `userID : serverID` for
    active WebSocket sessions. Each server updates Redis when a user connects (goes
    online) or disconnects (goes offline).'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 'Redis可以用作全局数据存储，映射`userID : serverID`以表示活跃的WebSocket会话。每个服务器在用户连接（上线）或断开连接（下线）时更新Redis。'
- en: 'For instance:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: 'user1 connects to server1. server1’s in memory map: `user1 : WebSocket connection`
    server1 also writes to Redis: `user1 : server1`'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'user1连接到server1。server1的内存映射：`user1 : WebSocket连接` server1还写入Redis：`user1 :
    server1`'
- en: 'user2 connects to server2. server2’s in memory map: `user2 : WebSocket connection`
    server2 also writes to Redis: `user2 : server2`'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'user2连接到server2。server2的内存映射：`user2 : WebSocket连接` server2还写入Redis：`user2 :
    server2`'
- en: '***End to end chat flow: user1 sends a message to user2***'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**端到端聊天流程：用户1向用户2发送消息**'
- en: user1 sends a message through it’s WebSocket on server1.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: user1通过server1上的WebSocket发送消息。
- en: server1 passes the message to a Chat Service.
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: server1将消息传递给聊天服务。
- en: Chat Service first writes the message to MessageDB for persistence.
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聊天服务首先将消息写入消息数据库（MessageDB）以实现持久化。
- en: Chat Service then checks Redis to get the online/offline status of user2.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聊天服务随后检查Redis以获取用户2的在线/离线状态。
- en: '**If user2 is online**, Chat Service publishes the message to a message broker,
    tagging it with: "user2: server2".'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如果用户2在线**，聊天服务将消息发布到消息代理，并标记为："user2: server2"。'
- en: The broker then routes the message to server2.
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代理然后将消息路由到server2。
- en: server2 looks up it’s local in memory mapping to find the WebSocket connection
    of user2 and pushes the message real time over that WebSocket.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: server2查找其本地内存映射以找到用户2的WebSocket连接，并通过该WebSocket实时推送消息。
- en: '**If user2 is offline (no entry in Redis)**, Chat Service writes the message
    to the InboxDB. When user2 returns online, Chat Service will fetch all the undelivered
    messages.'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如果用户2离线（Redis中没有条目）**，聊天服务将消息写入收件箱数据库（InboxDB）。当用户2返回在线状态时，聊天服务将检索所有未交付的消息。'
- en: Whenever a new WebSocket connection is opened or closed, the servers update
    Redis.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每当打开或关闭一个新的WebSocket连接时，服务器都会更新Redis。
- en: When a user first loads the app or opens a chat, the Chat Service fetches historical
    messages (e.g., from the last 10 days) from MessageDB. A cache layer can reduce
    repeated DB queries.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当用户首次加载应用或打开聊天时，聊天服务从消息数据库（MessageDB）获取历史消息（例如，过去10天的消息）。缓存层可以减少重复的数据库查询。
- en: 'Some important design considerations:'
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一些重要的设计考虑因素：
- en: '**Persistence first** All messages go to the DB before being delivered. If
    a push to WebSocket fails, the message is still safe in the DB.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**首先持久化** 所有消息在发送之前都先存储到数据库中。如果WebSocket推送失败，消息仍然安全地存储在数据库中。'
- en: '**Redis** Stores **only** **active** connections to minimize overhead. A replica
    can be added to prevent a single point of failure.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Redis** 仅存储**活跃**连接以最小化开销。可以添加副本以防止单点故障。'
- en: Inbox DB helps to handle offline cases cleanly.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收件箱数据库有助于干净地处理离线情况。
- en: '**Chat Service abstraction** The WebSocket servers handle real‐time connections
    and routing. The Chat Service layer handles HTTP requests and all DB writes. This
    separation of concerns makes it easier to scale or evolve each piece.'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**聊天服务抽象** WebSocket服务器处理实时连接和路由。聊天服务层处理HTTP请求和所有数据库写入。这种关注点的分离使得扩展或演进每个部分变得更加容易。'
- en: '**Ensuring in order delivery of messages** Typical "real time push" workflows
    can have network variations, leading to messages arriving out of order. Many message
    brokers also **do not guarantee** strict ordering. To handle this, each message
    is assigned a timestamp at creation. Even if messages arrive out of order, the
    client can reorder them based on the timestamp.'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确保消息按顺序交付** 传统的“实时推送”工作流程可能会有网络变化，导致消息顺序混乱。许多消息代理也不**保证**严格的顺序。为了处理这种情况，每个消息在创建时都会分配一个时间戳。即使消息顺序混乱，客户端也可以根据时间戳重新排序它们。'
- en: '**Load balancers** L4 Load Balancer (TCP) for sticky WebSocket connections.
    L7 Load Balancer (HTTP) for regular requests (CRUD, login, etc).'
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**负载均衡器** L4负载均衡器（TCP）用于粘性WebSocket连接。L7负载均衡器（HTTP）用于常规请求（CRUD、登录等）。'
- en: Wrapping up
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: That’s all for now! There’s so much more we could explore, but I hope this gave
    you a solid starting point. Feel free to drop your questions in the comments below
    🙂
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 就到这里吧！我们还有很多可以探索的内容，但我希望这已经为你提供了一个坚实的起点。欢迎在下面的评论中提出你的问题 :)
- en: I write regularly on Python, software development and the projects I build,
    so give me a follow to not miss out. See you in the next article.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常撰写关于Python、软件开发以及我构建的项目的内容，所以请关注我，以免错过。我们下篇文章再见。
