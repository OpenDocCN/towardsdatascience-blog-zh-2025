- en: Hands-on Multi Agent LLM Restaurant Simulation, with Python and OpenAI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Python和OpenAI的动手多代理LLM餐厅模拟
- en: 原文：[https://towardsdatascience.com/hands-on-multi-agent-llm-restaurant-simulation-with-python-and-openai/](https://towardsdatascience.com/hands-on-multi-agent-llm-restaurant-simulation-with-python-and-openai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/hands-on-multi-agent-llm-restaurant-simulation-with-python-and-openai/](https://towardsdatascience.com/hands-on-multi-agent-llm-restaurant-simulation-with-python-and-openai/)
- en: <mdspan datatext="el1745642950463" class="mdspan-comment">Last week</mdspan>,
    OpenAI released a [PDF](https://cdn.openai.com/business-guides-and-resources/a-practical-guide-to-building-agents.pdf),
    and everyone is talking about it. This PDF is a 34-page guide that explains what
    LLM Agents are and how to use them.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745642950463" class="mdspan-comment">上周</mdspan>，OpenAI发布了一份[PDF](https://cdn.openai.com/business-guides-and-resources/a-practical-guide-to-building-agents.pdf)，每个人都开始讨论它。这份PDF是一份34页的指南，解释了LLM代理是什么以及如何使用它们。
- en: 'The PDF is fairly short and also very readable (you don’t need to be a Prompt/Software
    Engineer to understand it), but in a few words, it explains three things:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这份PDF相当简短，也非常易于阅读（你不需要是提示/软件工程师就能理解它），但简而言之，它解释了三件事：
- en: .1\. LLM Agents **“are systems that independently accomplish tasks on your behalf.”**
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: .1. LLM代理**“是独立代表你完成任务的系统。”**
- en: So aren’t they simple LLM prompts called through an API? Well, yes and no. You
    are using the same model(s) of Chat Completion, so they kind of are, ***but***
    they are meant to create a specific action. What I mean by that is that the output
    of your agents **should translate into an actionable output** in your system.
    For example, if the LLM output says “spaghetti,” then “spaghetti” gets added to
    your data pipeline and eventually will be seen by someone who will cook spaghetti
    (spoiler).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 难道它们不是通过API调用的简单LLM提示吗？嗯，是的，也不是。你使用的是相同的Chat Completion模型，所以它们某种程度上是，***但是***它们旨在创建一个特定的动作。我的意思是，你的代理的输出**应该转化为你系统中可操作的结果**。例如，如果LLM输出说“意大利面”，那么“意大利面”就会被添加到你的数据管道中，最终会被看到并烹饪意大利面的人看到（剧透）。
- en: 2\. LLM Agents are particularly well integrated with **function (tools)**
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. LLM代理特别适合与**功能（工具）**集成
- en: I am talking about when you ask a question to ChatGPT and it pulls out its image
    generator/web searcher/code snippets. It is internally using a function called
    tool, which is triggered by your prompt. Now, the image generator is an in-built
    function, but they can also call **your function (tool),** which you can specifically
    define for your task.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我说的是当你向ChatGPT提问时，它会调用其图像生成器/网络搜索器/代码片段。它内部使用一个名为工具的功能，该功能由你的提示触发。现在，图像生成器是一个内置的功能，但它们也可以调用**你的功能（工具）**，你可以为你的任务专门定义。
- en: 3\. Multiple LLM Agents can be integrated **back to back.**
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 3. 多个LLM代理可以**连续**集成。
- en: You can either integrate a single agent and provide him with multiple tools
    ***or*** split the tools into specific agents, which is what we are going to do
    in this article (second spoiler, lol).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以集成单个代理并为他提供多个工具***或者***将工具拆分为特定的代理，这正是我们在这篇文章中要做的（第二个剧透，哈哈）。
- en: Now, the technical details might be of interest to the software engineers, but
    why is this Agents thing a big deal for anyone else?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，技术细节可能对软件工程师来说很有趣，但为什么这个“代理”对其他人来说是个大问题呢？
- en: 'Well, it is because this is a paradigm shift that helps provide usefulness
    to the Open AI models. Think about it: now the LLMs provide **actionable output.**
    So it is not about using LLM prompts in the very last step of a pipeline to beautify
    your final output; it is about **integrating your whole pipeline with LLM Agents**
    to improve the whole pipeline quality.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，这是因为这是一个范式转变，有助于为Open AI模型提供实用性。想想看：现在LLM提供了**可操作的结果**。所以这不仅仅是将LLM提示用于管道的最后一步来美化最终输出；这是将你的整个管道与LLM代理**集成**起来，以提高整个管道的质量。
- en: As much as I try to explain it with words, I think it is just easier to show
    you. Let’s consider a **restaurant,** for example.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我尽力用语言解释，但我认为直接展示给你会更容易。让我们以**餐厅**为例。
- en: 'The standard restaurant has a very obvious natural pipeline: you wait in line,
    you order your food, you wait for your food, eat, and leave. Now, if we translate
    this with an “agent” approach, we can identify at least three agents:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 标准餐厅有一个非常明显的自然流程：你排队等候，你点餐，你等待食物，吃饭，然后离开。现在，如果我们用“代理”方法来翻译，我们可以至少识别出三个代理：
- en: The **customer** agent is an LLM Agent that orders food or asks the waiter for
    suggestions
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户**代理是一个LLM代理，它订购食物或向服务员提出建议'
- en: The **waiter** agent is an LLM that collects the orders and provides suggestions
    when necessary
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务员**代理是一个LLM，它收集订单并在必要时提供建议'
- en: The **entertainment** agent is an LLM with the purpose of dealing with the complaints
    of the customers.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**娱乐**代理是一个LLM，目的是处理客户的投诉。'
- en: Now, OpenAI tells you very specifically how to build these beasts, but that’s
    the relatively easy part; there is much more, right?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，OpenAI非常具体地告诉你如何构建这些怪物，但这相对容易；还有更多，对吧？
- en: 'We need to implement the **restaurant**, we need to create a **queue method**,
    where people get seated based on how busy the restaurant easy, we need to create
    the **menu**, simulate the **waiting time**, make sure everything works, and *then*
    *and only then* we can plug the agents in. As always:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要实现**餐厅**，我们需要创建一个**排队方法**，人们根据餐厅的繁忙程度就座，我们需要创建**菜单**，模拟**等待时间**，确保一切正常，然后**然后**，**只有然后**我们才能连接代理。一如既往：
- en: Generative AI is powerful, provided it is in the right context.
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 生成式AI很强大，前提是它处于正确的环境中。
- en: 'So, before we get to the juicy part of the agents, in this article, you will
    see this:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在我们进入这篇文章中关于代理的精彩部分之前，你会看到以下内容：
- en: The **System Design** for the LLM Agent restaurant. A codeless idea, pen and
    paper (more like mouse and PowerPoint) scheme of the project.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLM代理餐厅的**系统设计**。一个无代码的想法，用笔和纸（更像是鼠标和PowerPoint）的项目方案。
- en: '**An Agent-free Restaurant implementation.** plain and simple, just to create
    our code skeleton'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无代理餐厅实现**。简单明了，只是为了创建我们的代码框架'
- en: '**The Agent Restaurant implementation.** Plus, a simple GUI to display it nicely'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理餐厅实现**。此外，一个简单的GUI来优雅地显示它'
- en: '**Considerations and final remarks.**'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**考虑事项和最终评论**。'
- en: Looks like we have a lot of ground to cover. To the lab! 🧪
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来我们有很多东西要覆盖。去实验室吧！🧪
- en: 1\. Restaurant System Design
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 餐厅系统设计
- en: 'NOTE: If you did some technical rounds, you will find this system design pretty
    easy. The goal of this design is not to comprehensively show every part of an
    ML system (like they ask you in a 15-minute-long interview 🙃), but it is just
    to provide some guidelines on what we are going to do next.'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意**：如果你进行了一些技术轮询，你会发现这个系统设计相当简单。这个设计的目的是不是全面展示一个机器学习系统的每个部分（就像他们在15分钟的面试中问你的那样），而是仅仅提供一些关于我们接下来要做什么的指导。'
- en: 'The way we can picture the restaurant process, integrated with LLM, is summarized
    in this picture:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以想象餐厅流程的方式，与LLM集成，总结在这张图片中：
- en: '![](../Images/b3ffee359b0f30a574211c8252dbec58.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b3ffee359b0f30a574211c8252dbec58.png)'
- en: Image made by the author. Small icons generated with ChatGPT
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由作者制作。小图标由ChatGPT生成
- en: 'Let me explain:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我来解释：
- en: '**Restaurant()** and **Menu()** are two classes. We declare them, and all the
    tables, orders, and system information will be defined inside the classes and
    dynamically updated'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Restaurant()**和**Menu()**是两个类。我们声明它们，并且所有的桌子、订单和系统信息都将定义在类中，并动态更新'
- en: The **new customer** will have to go through a seating mechanism. If they can
    sit (enough free tables), that’s fantastic, we can let them sit; otherwise, the
    customer will wait in line (queued).
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**新客户**必须通过一个座位机制。如果他们可以坐下（有足够的空闲桌子），那就太好了，我们可以让他们坐下；否则，客户将排队等待（排队）。'
- en: For the **seated** customer, there will be a waiter who will let them order
    food. They can “complain” and ask how long the food will take after they order.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于**已坐下**的客户，将有一位服务员让他们点餐。他们可以“抱怨”并询问点餐后食物需要多长时间。
- en: The **queued** people can’t do much, but they can “complain” too and ask how
    long they will have to be in line before they can sit.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**排队**的人无法做太多，但他们也可以“抱怨”并询问他们需要排队多长时间才能坐下。'
- en: Now, if you think about it, you don’t *need* an LLM for this. For example, we
    can precompute the waiting time and then communicate it with a pre-defined, formatted
    string. We can also use a simple list to collect the orders (like the McDonald’s
    automated kiosk) and call it a day. Sure, we can do that, but think about it.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你这么想，你**不需要**LLM来做这件事。例如，我们可以预先计算等待时间，然后通过预定义的格式化字符串进行沟通。我们还可以使用一个简单的列表来收集订单（就像麦当劳的自动亭子一样），然后结束。当然，我们可以这么做，但想想看。
- en: What if the customer wants to ask for information about the menu **while they
    wait**? What if they are **undecided** about the food? What if they want to know
    the **juiciest vegan option** on the menu? What if they want a **good wine at
    a decent price**? We can either start declaring rule-based methods for every single
    one of these scenarios, wasting our time and money, or we can start using AI.
    That is what this article is about. If we use LLM Agents, we have a shot at dealing
    with all these scenarios in a single pass.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果顾客在等待时想询问菜单信息怎么办？如果他们对食物犹豫不决怎么办？如果他们想知道菜单上**最诱人的素食选项**怎么办？如果他们想找一瓶价格合理的**好酒**怎么办？我们要么为这些场景中的每一个开始声明基于规则的解决方案，浪费我们的时间和金钱，要么开始使用AI。这正是这篇文章的主题。如果我们使用LLM代理，我们就有机会在一次遍历中处理所有这些场景。
- en: Now, if I did learn something, it is that software engineering needs to be done
    ***step by step****.* It is best to have a **skeleton** of your model, and then
    add the bells and whistles. For this reason, we will build an agent-free version
    of the product above. This simplified version will have a queuing system that
    computes the waiting time and menu implementation, so everything will run smoothly
    without any AI. After this step, we can put the agents in the places that we discussed
    and shown above (customer, entertainer, and waiter).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我确实学到了什么，那就是软件工程需要逐步进行。最好是有一个你模型的**骨架**，然后添加铃声和哨声。出于这个原因，我们将构建上述产品的代理自由版本。这个简化版本将有一个计算等待时间和菜单实现的排队系统，所以一切都会在没有AI的情况下顺利运行。在这个步骤之后，我们可以将代理放在我们上面讨论和展示的位置（顾客、表演者和服务员）。
- en: 2\. Agent Free Implementation
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 代理自由实现
- en: It’s always a good idea to keep everything as simple as possible in the main
    script, and let the backend do the dirty work. Our agent free implementation can
    be run in this code.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在主脚本中尽可能保持一切尽可能简单总是一个好主意，让后端做脏活。我们的代理自由实现可以在这个代码中运行。
- en: 'As we can see, we can change:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，我们可以改变：
- en: '**num_tables;** the number of tables in our restaurant'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**num_tables**；我们餐厅的桌子数量'
- en: '**arrival_prob**; is the probability that a customer is coming at every time
    step'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**arrival_prob**；是顾客在每一步到达的概率'
- en: '**tick**; is the time step of our simulation'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**tick**；是模拟的时间步长'
- en: '**pause**; regulates the time.sleep(), and it is used to simulate a real restaurant
    streamline.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pause**；调节 time.sleep()，它用于模拟真实餐厅的流程。'
- en: Now, all this implementation is done in **naive_models.py**, which is here.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，所有这些实现都是在 **naive_models.py** 中完成的，它在这里。
- en: So this is long, let me walk you through some steps.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这很长，让我带你走一些步骤。
- en: 'The whole script runs on naive_sim on the command **.run()** with the following
    functions:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 整个脚本在命令 **.run()** 上运行在 naive_sim 上，具有以下功能：
- en: '**arrive**, which models the customers arriving and ordering, or arriving and
    getting queued'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**arrive**，模拟顾客到达并点餐，或者到达并排队'
- en: '**process_cooking**, which simulates the cooking of every table,'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**process_cooking**，模拟每张桌子的烹饪过程，'
- en: '**process_departures,** which simulates the customers leaving,'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**process_departures**，模拟顾客离开'
- en: '**seat_from_queue**, which simulates the customers getting seated from the
    queue'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**seat_from_queue**，模拟顾客从队列中就坐'
- en: '**handle_random_query,** which gets called randomly, where the customer in
    the queue or waiting for their food can ask for the waiting time'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**handle_random_query**，随机调用，其中队列中的顾客或等待食物的顾客可以询问等待时间'
- en: If we run naive_sim.py we got this from the terminal.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们运行 naive_sim.py，我们可以在终端得到这个。
- en: '![](../Images/9350af0da2d7132b6fbfb34c7d7677e7.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9350af0da2d7132b6fbfb34c7d7677e7.png)'
- en: GIF of the output code, Image generated by author.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 输出代码的GIF，由作者生成。
- en: Now, this is a data science product itself. You could run monte carlo chain
    with this, you can see the probability of creating long queue, Restaurants can
    use this “digital twin” of their restaurant and see when critical things can happen.
    Now that we have a product that works, let’s make it prettier and more powerful
    with AI.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这本身就是一个数据科学产品。你可以用这个产品运行蒙特卡洛链，你可以看到形成长队的概率，餐馆可以使用他们餐厅的“数字孪生”来查看何时会发生关键事件。现在我们有一个工作的产品，让我们用AI让它更漂亮、更强大。
- en: 3\. Agent Restaurant Implementation
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 代理餐厅实现
- en: Now, as we see above, customers are already able to ask questions, and we already
    have the answer as a number. The customer also picks random food in our implementation.
    Let’s try to add our agents to the scheme.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，正如我们上面看到的，顾客已经能够提问，我们已经有了一个作为数字的答案。在我们的实现中，顾客也会随机选择食物。让我们尝试将我们的代理添加到这个方案中。
- en: 3.1 Custom Agents Implementation
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 自定义代理实现
- en: 'You will need to have the agents module installed:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要安装代理模块：
- en: '[PRE0]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The implementation of the customer, entertainment, and complaint handler is
    this.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 顾客、娱乐和投诉处理器的实现如下。
- en: So we have the **client** definition, which is the OpenAI client call, **newtools.py,**
    which is pulling the menu, **call_agent** which is calling the single agent and
    running it through the **runner**.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有**客户端**定义，即OpenAI客户端调用，**newtools.py**，它拉取菜单，**call_agent**，它调用单个代理并通过**runner**运行。
- en: This is exactly what we were talking about in the introduction. We are defining
    multiple **agents** that will be connected, and they use **tools** that are defined
    by my code.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我们在引言中讨论的内容。我们正在定义多个**代理**，它们将连接起来，并使用由我的代码定义的工具。
