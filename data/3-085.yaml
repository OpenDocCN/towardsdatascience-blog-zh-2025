- en: Load-Testing LLMs Using LLMPerf
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用LLMPerf对LLMs进行负载测试
- en: 原文：[https://towardsdatascience.com/load-testing-llmperf/](https://towardsdatascience.com/load-testing-llmperf/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/load-testing-llmperf/](https://towardsdatascience.com/load-testing-llmperf/)
- en: <mdspan datatext="el1744962075287" class="mdspan-comment">Deploying your Large</mdspan>
    Language Model (LLM) is not necessarily the final step in productionizing your
    Generative AI application. An often forgotten, yet crucial part of the MLOPs lifecycle
    is properly [load testing](https://www.opentext.com/what-is/load-testing) your
    LLM and ensuring it is ready to withstand your expected production traffic. Load
    testing at a high level is the practice of testing your application or in this
    case your model with the traffic it would be expecting in a production environment
    to ensure that it’s performant.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1744962075287" class="mdspan-comment">部署你的大型语言模型（LLM）并不一定是将你的生成式AI应用投入生产的最终步骤。MLOps生命周期中经常被遗忘但至关重要的一个部分是正确地进行[负载测试](https://www.opentext.com/what-is/load-testing)你的LLM，并确保它能够承受你预期的生产流量。在较高层次上，负载测试是一种测试你的应用或在此情况下你的模型在预期生产环境中预期流量的实践，以确保其性能表现。>
- en: In the past we’ve discussed [load testing traditional ML models](https://towardsdatascience.com/why-load-testing-is-essential-to-take-your-ml-app-to-production-faab0df1c4e1/)
    using open source Python tools such as [Locust](https://locust.io/). Locust helps
    capture general performance metrics such as requests per second (RPS) and latency
    percentiles on a per request basis. While this is effective with more traditional
    APIs and ML models it doesn’t capture the full story for LLMs.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，我们讨论了使用开源Python工具如[Locust](https://locust.io/)进行[负载测试传统ML模型](https://towardsdatascience.com/why-load-testing-is-essential-to-take-your-ml-app-to-production-faab0df1c4e1/)的方法。Locust有助于捕捉一般性能指标，如每秒请求数（RPS）和基于每个请求的延迟百分位数。虽然这对于更传统的API和ML模型是有效的，但它并不能完全捕捉到LLMs的全貌。
- en: LLMs traditionally have a much lower RPS and higher latency than traditional
    ML models due to their size and larger compute requirements. In general the RPS
    metric does not really provide the most accurate picture either as requests can
    greatly vary depending on the input to the LLM. For instance you might have a
    query asking to summarize a large chunk of text and another query that might require
    a one-word response.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 由于大小和更大的计算需求，LLMs通常比传统的ML模型具有更低的RPS和更高的延迟。一般来说，RPS指标并不真正提供最准确的画面，因为请求可能会根据LLM的输入而大幅变化。例如，你可能有一个请求要求总结一大段文本，另一个请求可能只需要一个单词的响应。
- en: This is why [tokens](https://learn.microsoft.com/en-us/dotnet/ai/conceptual/understanding-tokens)
    are seen as a much more accurate representation of an LLM’s performance. At a
    high level a token is a chunk of text, whenever an LLM is processing your input
    it “tokenizes” the input. A token differs depending specifically on the LLM you
    are using, but you can imagine it for instance as a word, sequence of words, or
    characters in essence.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么[标记](https://learn.microsoft.com/en-us/dotnet/ai/conceptual/understanding-tokens)被视为LLM性能的一个更准确的表示。在较高层次上，一个标记是一段文本，每当LLM处理你的输入时，它都会“标记化”输入。标记的具体差异取决于你使用的LLM，但你可以想象它，例如，是一个单词、一系列单词或本质上是一系列字符。
- en: '![](../Images/dfa8d54c04e760717e670845e3a9c6ba.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dfa8d54c04e760717e670845e3a9c6ba.png)'
- en: Image by Author
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: What we’ll do in this article is explore how we can generate token based metrics
    so we can understand how your LLM is performing from a serving/deployment perspective.
    After this article you’ll have an idea of how you can set up a load-testing tool
    specifically to benchmark different LLMs in the case that you are evaluating many
    models or different deployment configurations or a combination of both.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将探讨如何生成基于标记的指标，以便我们可以从服务/部署的角度了解你的LLM的表现。在阅读完这篇文章后，你将了解如何设置一个负载测试工具，专门用于基准测试不同的LLMs，在你评估多个模型或不同的部署配置，或者两者的组合时。
- en: 'Let’s get hands on! If you are more of a video based learner feel free to follow
    my corresponding YouTube video down below:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们动手实践！如果你更倾向于视频学习，请自由地观看下面的YouTube视频：
- en: '**NOTE**: This article assumes a basic understanding of Python, LLMs, and Amazon
    Bedrock/SageMaker. If you are new to Amazon Bedrock please refer to my starter
    guide [here](https://www.youtube.com/watch?v=8aMJUV0qhow&t=3s). If you want to
    learn more about SageMaker JumpStart LLM deployments refer to the video [here](https://www.youtube.com/watch?v=c0ASHUm3BwA&t=636s).'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：本文假设你对 Python、LLM 和 Amazon Bedrock/SageMaker 有基本的了解。如果你是 Amazon Bedrock
    的新手，请参阅我的入门指南[这里](https://www.youtube.com/watch?v=8aMJUV0qhow&t=3s)。如果你想了解更多关于
    SageMaker JumpStart LLM 部署的信息，请参阅视频[这里](https://www.youtube.com/watch?v=c0ASHUm3BwA&t=636s)。'
- en: '**DISCLAIMER**: I am a Machine Learning Architect at AWS and my opinions are
    my own.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**免责声明**：我是 AWS 的机器学习架构师，我的观点仅代表个人。'
- en: Table of Contents
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 目录
- en: LLM Specific Metrics
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLM 特定指标
- en: LLMPerf Intro
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLMPerf 简介
- en: Applying LLMPerf to Amazon Bedrock
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 LLMPerf 应用于 Amazon Bedrock
- en: Additional Resources & Conclusion
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 其他资源与结论
- en: LLM-Specific Metrics
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM 特定指标
- en: As we briefly discussed in the introduction in regards to LLM hosting, token
    based metrics generally provide a much better representation of how your LLM is
    responding to different payload sizes or types of queries (summarization vs QnA).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在引言中简要讨论的 LLM 托管问题，基于令牌的指标通常能更好地反映你的 LLM 对不同负载大小或查询类型（摘要 vs 问答）的响应。
- en: 'Traditionally we have always tracked RPS and latency which we will still see
    here still, but more so at a token level. Here are some of the metrics to be aware
    of before we get started with load testing:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，我们一直跟踪 RPS 和延迟，我们在这里仍然会看到，但更多地是在令牌级别。在我们开始负载测试之前，这里有一些需要注意的指标：
- en: '**Time to First Token**: This is the duration it takes for the first token
    to generate. This is especially handy when streaming. For instance when using
    ChatGPT we start processing information when the first piece of text (token) appears.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**首次生成令牌时间**：这是第一个令牌生成所需的时间。这在流式传输时特别有用。例如，当使用 ChatGPT 时，我们会在第一个文本片段（令牌）出现时开始处理信息。'
- en: '**Total Output Tokens Per Second**: This is the total number of tokens generated
    per second, you can think of this as a more granular alternative to the requests
    per second we traditionally track.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**每秒总输出令牌数**：这是每秒生成的总令牌数，你可以将其视为比我们传统上跟踪的每秒请求数更细粒度的替代方案。'
- en: These are the major metrics that we’ll focus on, and there’s a few others such
    as inter-token latency that will also be displayed as part of the load tests.
    Keep in mind the parameters that also influence these metrics include the expected
    input and output token size. We specifically play with these parameters to get
    an accurate understanding of how our LLM performs in response to different generation
    tasks.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我们将关注的重点指标，还有一些其他指标，如令牌间延迟，也将在负载测试中显示。请注意，影响这些指标的因素还包括预期的输入和输出令牌大小。我们特别调整这些参数，以准确了解我们的
    LLM 在应对不同生成任务时的表现。
- en: Now let’s take a look at a tool that enables us to toggle these parameters and
    display the relevant metrics we need.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看一个工具，它使我们能够切换这些参数并显示我们需要的相关指标。
- en: LLMPerf Intro
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMPerf 简介
- en: LLMPerf is built on top of [Ray](https://github.com/ray-project/ray), a popular
    distributed computing Python framework. LLMPerf specifically leverages Ray to
    create distributed load tests where we can simulate real-time production level
    traffic.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: LLMPerf 是建立在 [Ray](https://github.com/ray-project/ray) 之上的，这是一个流行的分布式计算 Python
    框架。LLMPerf 特别利用 Ray 创建分布式负载测试，我们可以模拟实时生产级别的流量。
- en: Note that any load-testing tool is also only going to be able to generate your
    expected amount of traffic if the client machine it is on has enough compute power
    to match your expected load. For instance as you scale the concurrency or throughput
    expected for your model, you’d also want to scale the client machine(s) where
    you are running your load test.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，任何负载测试工具也仅能在客户端机器有足够的计算能力以匹配你预期的负载时生成你预期的流量量。例如，当你扩展模型预期的并发性或吞吐量时，你也会想扩展运行负载测试的客户端机器。
- en: 'Now specifically within [LLMPerf](https://github.com/ray-project/llmperf) there’s
    a few parameters that are exposed that are tailored for LLM load testing as we’ve
    discussed:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在特别在 [LLMPerf](https://github.com/ray-project/llmperf) 中，有一些参数被公开，这些参数针对 LLM
    负载测试进行了定制，正如我们之前讨论的那样：
- en: '**Model**: This is the model provider and your hosted model that you’re working
    with. For our use-case it’ll be [Amazon Bedrock](https://aws.amazon.com/bedrock/?trk=0eaabb80-ee46-4e73-94ae-368ffb759b62&sc_channel=ps&ef_id=Cj0KCQjwzYLABhD4ARIsALySuCRjoAi5pM0Mqz39YZd4i9YhVEBCQi7FFzshxslxIvrxgcl1lWipOvoaAl9BEALw_wcB:G:s&s_kwcid=AL!4422!3!692006004688!p!!g!!amazon%20bedrock!21048268554!159639952935&gclid=Cj0KCQjwzYLABhD4ARIsALySuCRjoAi5pM0Mqz39YZd4i9YhVEBCQi7FFzshxslxIvrxgcl1lWipOvoaAl9BEALw_wcB)
    and [Claude 3 Sonnet](https://www.anthropic.com/news/claude-3-5-sonnet) specifically.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型**：这是您正在使用的模型提供者和托管模型。在我们的用例中，它将是[Amazon Bedrock](https://aws.amazon.com/bedrock/?trk=0eaabb80-ee46-4e73-94ae-368ffb759b62&sc_channel=ps&ef_id=Cj0KCQjwzYLABhD4ARIsALySuCRjoAi5pM0Mqz39YZd4i9YhVEBCQi7FFzshxslxIvrxgcl1lWipOvoaAl9BEALw_wcB:G:s&s_kwcid=AL!4422!3!692006004688!p!!g!!amazon%20bedrock!21048268554!159639952935&gclid=Cj0KCQjwzYLABhD4ARIsALySuCRjoAi5pM0Mqz39YZd4i9YhVEBCQi7FFzshxslxIvrxgcl1lWipOvoaAl9BEALw_wcB)和[Claude
    3 Sonnet](https://www.anthropic.com/news/claude-3-5-sonnet)。'
- en: '**LLM API**: This is the API format in which the payload should be structured.
    We use [LiteLLM](https://www.litellm.ai/) which provides a standardized payload
    structure across different model providers, thus simplifying the setup process
    for us especially if we want to test different models hosted on different platforms.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM API**：这是负载应该结构化的API格式。我们使用[LiteLLM](https://www.litellm.ai/)，它为不同的模型提供者提供标准化的负载结构，从而简化了我们的设置过程，特别是如果我们想要测试托管在不同平台上的不同模型。'
- en: '**Input Tokens**: The mean input token length, you can also specify a standard
    deviation for this number.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入令牌**：平均输入令牌长度，您还可以指定此数字的标准差。'
- en: '**Output Tokens**: The mean output token length, you can also specify a standard
    deviation for this number.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输出令牌**：平均输出令牌长度，您也可以指定此数字的标准差。'
- en: '**Concurrent Requests**: The number of concurrent requests for the load test
    to simulate.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并发请求**：负载测试模拟的并发请求数量。'
- en: '**Test Duration**: You can control the duration of the test, this parameter
    is enabled in seconds.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试持续时间**：您可以控制测试的持续时间，此参数以秒为单位启用。'
- en: LLMPerf specifically exposes all these parameters through their [token_benchmark_ray.py](https://github.com/ray-project/llmperf/blob/main/token_benchmark_ray.py)
    script which we configure with our specific values. Let’s take a look now at how
    we can configure this specifically for Amazon Bedrock.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: LLMPerf特别通过他们的[token_benchmark_ray.py](https://github.com/ray-project/llmperf/blob/main/token_benchmark_ray.py)脚本公开了所有这些参数，我们使用特定的值进行配置。现在让我们看看如何具体为Amazon
    Bedrock配置它。
- en: Applying LLMPerf to Amazon Bedrock
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将LLMPerf应用于Amazon Bedrock
- en: Setup
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置
- en: For this example we’ll be working in a [SageMaker Classic Notebook Instance](https://docs.aws.amazon.com/sagemaker/latest/dg/nbi.html)
    with a **conda_python3 kernel** and **ml.g5.12xlarge** instance. Note that you
    want to select an instance that has enough compute to generate the traffic load
    that you want to simulate. Ensure that you also have your [AWS credentials](https://docs.aws.amazon.com/cli/v1/userguide/cli-configure-files.html)
    for LLMPerf to access the hosted model be it on Bedrock or SageMaker.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，我们将在一个[SageMaker Classic Notebook实例](https://docs.aws.amazon.com/sagemaker/latest/dg/nbi.html)上工作，使用**conda_python3内核**和**ml.g5.12xlarge**实例。请注意，您需要选择一个具有足够计算能力以生成您想要模拟的流量负载的实例。确保您还有LLMPerf的[AWS凭证](https://docs.aws.amazon.com/cli/v1/userguide/cli-configure-files.html)，以便LLMPerf可以访问托管模型，无论是在Bedrock还是SageMaker上。
- en: LiteLLM Configuration
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LiteLLM配置
- en: 'We first configure our LLM API structure of choice which is LiteLLM in this
    case. With LiteLLM there’s support across various model providers, in this case
    we configure the [completion API](https://docs.litellm.ai/docs/completion) to
    work with Amazon Bedrock:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先配置我们选择的LLM API结构，在这个例子中是LiteLLM。在LiteLLM中，支持各种模型提供者，在这种情况下，我们配置[完成API](https://docs.litellm.ai/docs/completion)以与Amazon
    Bedrock一起工作：
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: To work with Bedrock we configure the Model ID to point towards Claude 3 Sonnet
    and pass in our prompt. The neat part with LiteLLM is that messages key has a
    consistent format across model providers.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 要与Bedrock一起工作，我们配置模型ID指向Claude 3 Sonnet，并传递我们的提示。LiteLLM的巧妙之处在于，消息键在模型提供者之间具有一致的格式。
- en: Post-execution here we can focus on configuring LLMPerf for Bedrock specifically.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 执行后，我们可以专注于为Bedrock特别配置LLMPerf。
- en: LLMPerf Bedrock Integration
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMPerf Bedrock集成
- en: 'To execute a load test with LLMPerf we can simply use the provided [token_benchmark_ray.py](https://github.com/ray-project/llmperf/blob/main/token_benchmark_ray.py)
    script and pass in the following parameters that we talked of earlier:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用LLMPerf执行负载测试，我们可以简单地使用提供的[token_benchmark_ray.py](https://github.com/ray-project/llmperf/blob/main/token_benchmark_ray.py)脚本，并传递我们之前提到的以下参数：
- en: Input Tokens Mean & Standard Deviation
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入令牌的均值与标准差
- en: Output Tokens Mean & Standard Deviation
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出令牌的均值与标准差
- en: Max number of requests for test
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试的最大请求数量
- en: Duration of test
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试持续时间
- en: Concurrent requests
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并发请求
- en: 'In this case we also specify our API format to be LiteLLM and we can execute
    the load test with a simple shell script like the following:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们也指定我们的API格式为LiteLLM，并且我们可以使用以下简单的shell脚本来执行负载测试：
- en: '[PRE1]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In this case we keep the concurrency low, but feel free to toggle this number
    depending on what you’re expecting in production. Our test will run for 300 seconds
    and post duration you should see an output directory with two files representing
    statistics for each inference and also the mean metrics across all requests in
    the duration of the test.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们保持并发量较低，但请根据你在生产中期望的值自由调整这个数字。我们的测试将运行300秒，在测试持续时间后，你应该会看到一个输出目录，其中包含两个文件，分别代表每个推理的统计数据以及测试持续时间内的所有请求的平均指标。
- en: 'We can make this look a little neater by parsing the summary file with pandas:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过使用pandas解析摘要文件来使这个看起来更整洁：
- en: '[PRE2]'
