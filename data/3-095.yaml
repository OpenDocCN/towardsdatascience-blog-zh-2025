- en: 'Sesame  Speech Model:  How This Viral AI Model Generates Human-Like Speech'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 芝麻语音模型：这个病毒式AI模型如何生成类似人类的语音
- en: 原文：[https://towardsdatascience.com/sesame-speech-model-how-this-viral-ai-model-generates-human-like-speech/](https://towardsdatascience.com/sesame-speech-model-how-this-viral-ai-model-generates-human-like-speech/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/sesame-speech-model-how-this-viral-ai-model-generates-human-like-speech/](https://towardsdatascience.com/sesame-speech-model-how-this-viral-ai-model-generates-human-like-speech/)
- en: <mdspan datatext="el1744400684138" class="mdspan-comment">Recently, **Sesame
    AI**</mdspan> published a demo of their latest Speech-to-Speech model. A conversational
    AI agent who is *really* good at speaking, they provide relevant answers, they
    speak with expressions, and honestly, they are just very fun and interactive to
    play with.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1744400684138" class="mdspan-comment">最近，**芝麻AI**</mdspan>发布了一个他们最新的语音到语音模型的演示。一个擅长说话的对话式AI代理，他们提供相关的答案，他们说话时带有表情，而且说实话，他们非常有趣，互动性很强。
- en: '*Note that a technical paper is not out yet, but they do have a* [*short blog
    post*](https://www.sesame.com/research/crossing_the_uncanny_valley_of_voice) *that
    provides a lot of information about the techniques they used and previous algorithms
    they built upon.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意，技术论文尚未发布，但他们确实有一篇* [*简短的博客文章*](https://www.sesame.com/research/crossing_the_uncanny_valley_of_voice)
    *提供了关于他们使用的技巧和之前构建的算法的大量信息*。'
- en: Thankfully, they provided enough information for me to write this article and
    make a [YouTube video](https://youtu.be/ThG9EBbMhP8) out of it. Read on!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，他们提供了足够的信息，让我写这篇文章，并制作了一个[YouTube视频](https://youtu.be/ThG9EBbMhP8)。继续阅读！
- en: Training a Conversational Speech Model
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练对话语音模型
- en: Sesame is a **Conversational Speech Model**, or a CSM. It inputs both text and
    audio, and generates speech as audio. While they haven’t revealed their training
    data sources in the articles, we can still try to take a solid guess. The *blog
    post* heavily cites another CSM, [2024’s Moshi](https://moshi.chat/), and fortunately,
    the creators of Moshi did reveal their data sources in their [paper](https://arxiv.org/abs/2410.00037).
    Moshi uses *7 million hours* of unsupervised speech data, *170 hours* of natural
    and scripted conversations (for multi-stream training), and *2000 more hours*
    of telephone conversations (The Fischer Dataset).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 芝麻是一个**对话语音模型**，或称为CSM。它输入文本和音频，并生成语音。虽然他们还没有在文章中透露他们的训练数据来源，但我们仍然可以尝试做一个合理的猜测。*博客文章*大量引用了另一个CSM，[2024年的莫希](https://moshi.chat/)，幸运的是，莫希的创作者在他们的[论文](https://arxiv.org/abs/2410.00037)中透露了他们的数据来源。莫希使用了*700万小时的未监督语音数据*，*170小时的天然和脚本对话*（用于多流训练），以及*2000小时的电话对话*（Fischer数据集）。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![](../Images/9da1d3df6a3685ddd9bfa4b235516f20.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9da1d3df6a3685ddd9bfa4b235516f20.png)'
- en: Sesame builds upon the [Moshi Paper](https://arxiv.org/abs/2410.00037) (2024)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 芝麻基于[莫希论文](https://arxiv.org/abs/2410.00037)（2024）
- en: But what does it really take to generate audio?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 但要生成音频究竟需要什么？
- en: '**In raw form, audio is just a long sequence of amplitude values** — a waveform.
    For example, if you’re sampling audio at 24 kHz, you are capturing 24,000 float
    values every second.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**在原始形式中，音频只是一长串振幅值**—**一个波形**。例如，如果你以24 kHz的采样率采样音频，你每秒捕获24,000个浮点值。'
- en: '![](../Images/15c35434da8c31b30ed6010ea071bb2c.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/15c35434da8c31b30ed6010ea071bb2c.png)'
- en: There are 24000 values here to represent 1 second of speech! (Image generated
    by author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这里共有24,000个值来表示1秒钟的语音！（由作者生成图像）
- en: '**Of course, it is quite resource-intensive to process 24000 float values for
    just one second of data**, especially because transformer computations scale quadratically
    with sequence length. It would be great if we could compress this signal and reduce
    the number of samples required to process the audio.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**当然，仅处理一秒钟数据中的24,000个浮点值就非常资源密集**，尤其是在因为变换器计算与序列长度成平方关系的情况下。如果能压缩这个信号并减少处理音频所需的样本数量那就太好了。'
- en: We will take a deep dive into the **Mimi encoder** and specifically **Residual
    Vector Quantizers (RVQ)**, which are the backbone of Audio/Speech modeling in
    Deep Learning today. We will end the article by learning about how Sesame generates
    audio using its special dual-transformer architecture.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将深入探讨**米米编码器**和具体地**残差向量量化器（RVQ**），它们是当今深度学习领域音频/语音建模的骨干。我们将通过了解芝麻如何使用其特殊的双变换器架构生成音频来结束这篇文章。
- en: Preprocessing audio
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预处理音频
- en: Compression and feature extraction are where convolution helps us. Sesame uses
    the Mimi speech encoder to process audio. **Mimi was introduced in the aforementioned**
    [**Moshi paper**](https://arxiv.org/pdf/2410.00037) **as well**. Mimi is a self-supervised
    audio encoder-decoder model that converts audio waveforms into discrete “latent”
    tokens first, and then reconstructs the original signal. Sesame only uses the
    encoder section of Mimi to tokenize the input audio tokens. Let’s learn how.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 压缩和特征提取是卷积帮助我们的地方。芝麻使用Mimi语音编码器处理音频。**Mimi在上述** [**Moshi论文**](https://arxiv.org/pdf/2410.00037)
    **中也提到了**。Mimi是一个自监督的音频编码器-解码器模型，它首先将音频波形转换为离散的“潜在”标记，然后重建原始信号。芝麻只使用Mimi的编码器部分来标记输入音频标记。让我们来学习一下。
- en: Mimi inputs the raw speech waveform at 24Khz, passes them through several strided
    convolution layers to downsample the signal, with a stride factor of 4, 5, 6,
    8, and 2\. This means that the first CNN block downsamples the audio by 4x, then
    5x, then 6x, and so on. In the end, it downsamples by a factor of 1920, reducing
    it to just 12.5 frames per second.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: Mimi以24KHz的原始语音波形输入，通过几个步长卷积层对信号进行下采样，步长因子为4、5、6、8和2。这意味着第一个CNN块将音频下采样4倍，然后是5倍，然后是6倍，以此类推。最后，它以1920倍的下采样因子下采样，将其减少到每秒12.5帧。
- en: The convolution blocks also project the original float values to an embedding
    dimension of 512\. Each embedding aggregates the local features of the original
    1D waveform. 1 second of audio is now represented as around 12 vectors of size
    512\. This way, Mimi reduces the sequence length from 24000 to just 12 and converts
    them into dense continuous vectors.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积块还将原始浮点值投影到512维的嵌入维度。每个嵌入聚合原始1D波形的局部特征。现在，1秒的音频被表示为大约12个512大小的向量。这样，Mimi将序列长度从24000减少到仅12，并将它们转换为密集的连续向量。
- en: '![](../Images/70e0db446eba6337aa8cd7c2daab9b95.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/70e0db446eba6337aa8cd7c2daab9b95.png)'
- en: Before applying any quantization, the Mimi Encoder downsamples the input 24KHz
    audio by 1920 times, and embeds it into 512 dimensions. In other words, you get
    12.5 frames per second with each frame as a 512-dimensional vector. [(Image from
    author’s video)](https://youtu.be/ThG9EBbMhP8)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用任何量化之前，Mimi编码器将24KHz的输入音频下采样1920倍，并将其嵌入到512维。换句话说，你每秒得到12.5帧，每帧是一个512维向量。[(图片来自作者的视频)](https://youtu.be/ThG9EBbMhP8)
- en: What is Audio Quantization?
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是音频量化？
- en: Given the continuous embeddings obtained after the convolution layer, we want
    to tokenize the input speech. **If we can represent speech as a sequence of tokens,
    we can apply standard language learning transformers to train generative models.**
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在卷积层获得连续嵌入后，我们希望标记输入语音。**如果我们能将语音表示为一系列标记，我们就可以应用标准的语言学习转换器来训练生成模型**。
- en: Mimi uses a **Residual Vector Quantizer or RVQ tokenizer** to achieve this.
    We will talk about the residual part soon, but first, let’s look at what a simple
    vanilla Vector quantizer does.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Mimi使用**残差矢量量化器或RVQ标记器**来实现这一点。我们很快就会讨论残差部分，但首先，让我们看看一个简单的普通矢量量化器做了什么。
- en: Vector Quantization
  id: totrans-25
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 矢量量化
- en: 'The idea behind Vector Quantization is simple: you train a codebook , which
    is a collection of, say, 1000 random vector codes all of size 512 (same as your
    embedding dimension).'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 矢量量化的理念很简单：你训练一个码本，比如说，一个包含1000个随机矢量码的集合，每个码的大小为512（与你的嵌入维度相同）。
- en: '![](../Images/12adddaee0ddbb08b0e702d1444dcc6d.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/12adddaee0ddbb08b0e702d1444dcc6d.png)'
- en: A Vanilla Vector Quantizer. A codebook of embeddings is trained. Given an input
    embedding, we map/quantize it to the nearest codebook entry. [(Screenshot from
    author’s video)](https://youtu.be/ThG9EBbMhP8)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 一个普通的矢量量化器。训练一个嵌入码本。给定一个输入嵌入，我们将它映射/量化到最近的码本条目。[(作者视频的截图)](https://youtu.be/ThG9EBbMhP8)
- en: Then, given the input vector, we will map it to the closest vector in our codebook — basically
    snapping a point to its nearest cluster center. This means we have effectively
    created a fixed vocabulary of tokens to represent each audio frame, because whatever
    the input frame embedding may be, we will represent it with the nearest cluster
    centroid. If you want to learn more about Vector Quantization, check out my video
    on this topic where I go much deeper with this.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，给定输入矢量，我们将它映射到我们码本中最接近的矢量——基本上是将一个点捕捉到其最近的簇中心。这意味着我们实际上创建了一个固定词汇表来表示每个音频帧，因为无论输入帧嵌入是什么，我们都会用最近的簇质心来表示它。如果你想了解更多关于矢量量化的信息，请查看我关于这个主题的视频，我在那里对此进行了更深入的探讨。
- en: More about Vector Quantization! (Video by author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于矢量量化！ (作者的视频)
- en: Residual Vector Quantization
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 剩余向量量化
- en: The problem with simple vector quantization is that the loss of information
    may be too high because we are mapping each vector to its cluster’s centroid.
    This *“snap”* is rarely perfect, so there is always an error between the original
    embedding and the nearest codebook.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 简单向量量化的问题是，由于我们将每个向量映射到其簇的中心，信息丢失可能太高。这种*“突然”*很少是完美的，因此原始嵌入和最近的码本之间总是存在误差。
- en: The big idea of Residual Vector Quantization is that it doesn’t stop at having
    just one codebook. Instead, it tries to use multiple codebooks to represent the
    input vector.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余向量量化的核心思想是它不仅仅止步于只有一个码本。相反，它试图使用多个码本来表示输入向量。
- en: '**First**, you quantize the original vector using the first codebook.'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**首先**，你使用第一个码本对原始向量进行量化。'
- en: '**Then**, you subtract that centroid from your original vector. What you’re
    left with is the **residual** — the error that wasn’t captured in the first quantization.'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**然后**，你从原始向量中减去那个质心。你剩下的是**残差**——在第一次量化中未被捕捉到的误差。'
- en: Now take this residual, and **quantize it again**, using a **second codebook
    full of brand new code vectors **— again by snapping it to the nearest centroid.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在将这个残差**再次量化**，使用一个充满全新码向量的**第二个码本**——再次通过将其“突然”移动到最近的质心。
- en: Subtract *that* too, and you get a smaller residual. Quantize again with a third
    codebook… and you can keep doing this for as many codebooks as you want.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减去*那个*，你得到一个更小的残差。再次使用第三个码本进行量化……你可以继续这样做，直到你想要的码本数量。
- en: '![](../Images/959df4bbf74e2b40b9d6ab7a6cd5337d.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/959df4bbf74e2b40b9d6ab7a6cd5337d.png)'
- en: Residual Vector Quantizers (RVQ) hierarchically encode the input embeddings
    by using a new codebook and VQ layer to represent the previous codebook’s error.
    (Illustration by the author)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余向量量化器（RVQ）通过使用新的码本和VQ层来表示前一个码本的误差，层次化地编码输入嵌入。（作者插画）
- en: Each step hierarchically captures a little more detail that was missed in the
    previous round. If you repeat this for, let’s say, N codebooks, you get a collection
    of N discrete tokens from each stage of quantization to represent one audio frame.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 每一步都层次化地捕捉到前一轮中遗漏的更多细节。如果你重复这个过程，比如说，N个码本，你将得到每个量化阶段从每个阶段收集的N个离散标记来表示一个音频帧。
- en: The coolest thing about RVQs is that they are designed to have a high inductive
    bias towards capturing the most essential content in the very first quantizer.
    In the subsequent quantizers, they learn more and more fine-grained features.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: RVQ最酷的地方在于它们被设计成具有高度归纳偏差，以捕捉第一个量化器中最基本的内容。在后续的量化器中，它们学会越来越多地捕捉更精细的特征。
- en: If you’re familiar with PCA, you can think of the first codebook as containing
    the primary principal components, capturing the most critical information. The
    subsequent codebooks represent higher-order components, containing information
    that adds more details.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你熟悉PCA，你可以认为第一个码本包含主要的主成分，捕捉最重要的信息。后续的码本代表更高阶的成分，包含提供更多细节的信息。
- en: '![](../Images/a60068cf5f88c5f3f9acbded261e06de.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a60068cf5f88c5f3f9acbded261e06de.png)'
- en: Residual Vector Quantizers (RVQ) uses multiple codebooks to encode the input
    vector — one entry from each codebook. [(Screenshot from author’s video)](https://youtu.be/ThG9EBbMhP8)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余向量量化器（RVQ）使用多个码本对输入向量进行编码——每个码本中的一个条目。[（作者视频截图）](https://youtu.be/ThG9EBbMhP8)
- en: Acoustic vs Semantic Codebooks
  id: totrans-45
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 声学码本与语义码本
- en: Since Mimi is trained on the task of audio reconstruction, the encoder compresses
    the signal to the discretized latent space, and the decoder reconstructs it back
    from the latent space. When optimizing for this task, the RVQ codebooks learn
    to capture the essential acoustic content of the input audio inside the compressed
    latent space.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Mimi是在音频重建的任务上训练的，编码器将信号压缩到离散的潜在空间，解码器从潜在空间重建它。在优化这个任务时，RVQ码本学会在压缩的潜在空间中捕捉输入音频的基本声学内容。
- en: 'Mimi also separately trains a single codebook (vanilla VQ) that only focuses
    on embedding the semantic content of the audio. This is why **Mimi is called a
    split-RVQ tokenizer** – it divides the quantization process into two independent
    parallel paths: one for semantic information and another for acoustic information.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Mimi还单独训练了一个单个码本（vanilla VQ），它只专注于嵌入音频的语义内容。这就是为什么**Mimi被称为分割-RVQ标记器**——它将量化过程分为两个独立的并行路径：一个用于语义信息，另一个用于声学信息。
- en: '![](../Images/907a53e962892fb376262525635d9dd6.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/907a53e962892fb376262525635d9dd6.png)'
- en: 'The Mimi Architecture (Source: Moshi paper) License: Free'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: Mimi 架构（来源：Moshi 论文）许可：免费
- en: To train semantic representations, Mimi used knowledge distillation with an
    existing speech model called WavLM as a semantic teacher. Basically, Mimi introduces
    an additional loss function that decreases the cosine distance between the semantic
    RVQ code and the WavLM-generated embedding.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 为了训练语义表示，Mimi 使用了与现有语音模型 WavLM 结合的知识蒸馏作为语义教师。基本上，Mimi 引入了一个额外的损失函数，该函数减小了语义
    RVQ 代码与 WavLM 生成的嵌入之间的余弦距离。
- en: '* * *'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Audio Decoder
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 音频解码器
- en: Given a conversation containing text and audio, we first convert them into a
    sequence of token embeddings using the text and audio tokenizers. This token sequence
    is then input into a transformer model as a time series. In the blog post, this
    model is referred to as the Autoregressive Backbone Transformer. Its task is to
    process this time series and output the “zeroth” codebook token.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 给定包含文本和音频的对话，我们首先使用文本和音频分词器将它们转换为标记嵌入序列。然后，这个标记序列作为时间序列输入到 Transformer 模型中。在博客文章中，这个模型被称为自回归骨干
    Transformer。其任务是处理这个时间序列并输出“零阶”代码簿标记。
- en: A lighterweight transformer called the audio decoder then reconstructs the next
    codebook tokens conditioned on this zeroth code generated by the backbone transformer.
    Note that the zeroth code already contains a lot of information about the history
    of the conversation since the backbone transformer has visibility of the entire
    past sequence. **The lightweight audio decoder only operates on the zeroth token
    and generates the other N-1** codes. These codes are generated by using N-1 distinct
    linear layers that output the probability of choosing each code from their corresponding
    codebooks.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一个较轻的 Transformer，称为音频解码器，根据骨干 Transformer 生成的零阶代码重建下一个代码簿标记。注意，零阶代码已经包含了关于对话历史的很多信息，因为骨干
    Transformer 可以看到整个过去序列。**轻量级的音频解码器只对零阶标记进行操作，并生成其他 N-1 个代码**。这些代码是通过使用 N-1 个不同的线性层生成的，这些层输出从它们各自的代码簿中选择每个代码的概率。
- en: You can imagine this process as predicting a text token from the vocabulary
    in a text-only LLM. Just that a text-based LLM has a single vocabulary, but the
    RVQ-tokenizer has multiple vocabularies in the form of the N codebooks, so you
    need to train a separate linear layer to model the codes for each.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将这个过程想象成从一个只有文本的 LLM 中的词汇表预测一个文本标记。只是基于文本的 LLM 有一个单一的词汇表，但 RVQ 分词器有多个词汇表，以
    N 个代码簿的形式存在，因此你需要为每个代码训练一个单独的线性层来建模。
- en: '![](../Images/f7a3ca827e8ecd9196b2c059070f50f5.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f7a3ca827e8ecd9196b2c059070f50f5.png)'
- en: The Sesame Architecture (Illustration by the author)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 芝麻架构（作者插画）
- en: Finally, after the codewords are all generated, we aggregate them to form the
    combined continuous audio embedding. The final job is to convert this audio back
    to a waveform. For this, we apply transposed convolutional layers to upscale the
    embedding back from 12.5 Hz back to KHz waveform audio. Basically, reversing the
    transforms we had applied originally during audio preprocessing.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在所有码字都生成后，我们将它们聚合起来形成一个组合的连续音频嵌入。最后的工作是将这个音频转换回波形。为此，我们应用转置卷积层将嵌入从 12.5 Hz
    上采样回 KHz 波形音频。基本上，这是逆转我们在音频预处理期间应用的变换。
- en: In Summary
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总结
- en: Check out the accompanying video on this article! (Video by author)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 查看本文的配套视频！（视频由作者提供）
- en: So, here is the overall summary of the Sesame model in some bullet points.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，以下是一些关于芝麻模型的整体总结的要点。
- en: Sesame is built on a multimodal Conversation Speech Model or a CSM.
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 芝麻是基于多模态对话语音模型或 CSM 构建的。
- en: Text and audio are tokenized together to form a sequence of tokens and input
    into the backbone transformer that autoregressively processes the sequence.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本和音频一起分词，形成一个标记序列，并输入到自回归处理序列的骨干 Transformer 中。
- en: While the text is processed like any other text-based LLM, the audio is processed
    directly from its waveform representation. They use the Mimi encoder to convert
    the waveform into latent codes using a split RVQ tokenizer.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当文本像任何其他基于文本的 LLM 一样处理时，音频则直接从其波形表示进行处理。他们使用 Mimi 编码器将波形转换为使用分割 RVQ 分词器生成的潜在代码。
- en: The multimodal backbone transformers consume a sequence of tokens and predict
    the next zeroth codeword.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 多模态骨干 Transformer 消耗一个标记序列并预测下一个零阶码字。
- en: Another lightweight transformer called the Audio Decoder predicts the next codewords
    from the zeroth codeword.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 另一个轻量级的 Transformer，称为音频解码器，从零阶码字预测下一个码字。
- en: The final audio frame representation is generated from combining all the generated
    codewords and upsampled back to the waveform representation.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最终的音频帧表示是通过组合所有生成的码字并上采样回波形表示生成的。
