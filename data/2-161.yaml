- en: 'Evaluation-Driven Development for LLM-Powered Products: Lessons from Building
    in Healthcare'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估驱动的LLM产品开发：从医疗保健领域构建中汲取的教训
- en: 原文：[https://towardsdatascience.com/evaluation-driven-development-for-llm-powered-products-lessons-from-building-in-healthcare/](https://towardsdatascience.com/evaluation-driven-development-for-llm-powered-products-lessons-from-building-in-healthcare/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/evaluation-driven-development-for-llm-powered-products-lessons-from-building-in-healthcare/](https://towardsdatascience.com/evaluation-driven-development-for-llm-powered-products-lessons-from-building-in-healthcare/)
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: <mdspan datatext="el1752108482014" class="mdspan-comment">The pace of development</mdspan>
    in the field of large language models (LLM) and their applications is extraordinarily
    rapid. Costs are coming down and foundation models are becoming increasingly capable,
    able to handle communication in text, images, video. Open source solutions have
    also exploded in diversity and capability, with many models being lightweight
    enough to explore, fine-tune and iterate on without huge expense. Finally, cloud
    AI training and inference providers such as Databricks and Nebius are making it
    increasingly easy for organizations to scale up their applied AI products from
    POCs to production ready systems. These advances go hand in hand with a diversification
    of the business uses of LLMs and the rise of agentic applications, where models
    plan and execute complex multi-step workflows that may involve interaction with
    tools or other agents. These technologies are already making an impact in healthcare
    and this is projected to grow rapidly [1].
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752108482014" class="mdspan-comment">大型语言模型（LLM）及其应用领域的开发速度非常快。成本正在下降，基础模型的能力也在不断增强，能够处理文本、图像、视频的通信。开源解决方案在多样性和能力上也得到了爆炸性的增长，许多模型足够轻量，可以探索、微调和迭代，而无需巨大的开销。最后，像Databricks和Nebius这样的云AI训练和推理提供商使得组织从POC到生产就绪系统的应用AI产品规模化变得越来越容易。这些进步与LLM的商业用途的多样化以及代理应用的兴起相辅相成，其中模型规划并执行涉及与工具或其他代理交互的复杂多步骤工作流程。这些技术已经在医疗保健领域产生了影响，预计其增长将非常迅速[1]。
- en: 'All of this capability makes it exciting to get started, and building a baseline
    solution for a particular use case can be very fast. However, by their nature
    LLMs are non-deterministic and less predictable than traditional software or ML
    models. The real challenge therefore comes in iteration: How do we know that our
    development process is improving the system? If we fix a problem, how do we know
    if the change won’t break something else? Once in production, how do we check
    if performance is on par with what we saw in development? Answering these questions
    with systems that make single LLM calls is hard enough, but with [agentic systems](https://en.wikipedia.org/wiki/Agentic_AI)
    we also need to consider all the individual steps and routing decisions made between
    them. To address these issues — and therefore gain trust and confidence in the
    systems we build — we need [evaluation-driven development](https://arxiv.org/html/2411.13768v2).
    This is a methodology that places iterative, actionable evaluation at the core
    of the product lifecycle from development and deployment to monitoring.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些能力都使得开始这项工作变得令人兴奋，为特定用例构建一个基线解决方案可以非常快。然而，由于它们的本质，大型语言模型（LLM）是非确定性的，比传统的软件或ML模型更难以预测。因此，真正的挑战在于迭代：我们如何知道我们的开发过程正在改进系统？如果我们修复了一个问题，我们如何知道这个改变不会破坏其他东西？一旦投入生产，我们如何检查性能是否与我们在开发中看到的一致？使用仅进行单个LLM调用的系统来回答这些问题已经足够困难，但使用[代理系统](https://en.wikipedia.org/wiki/Agentic_AI)时，我们还需要考虑它们之间所有单个步骤和路由决策。为了解决这些问题——并且因此在我们构建的系统中获得信任和信心——我们需要[评估驱动的开发](https://arxiv.org/html/2411.13768v2)。这是一种将迭代、可操作的评价置于产品生命周期核心的方法，从开发、部署到监控。
- en: As a data scientist at Nuna, Inc., a healthcare AI company, I’ve been spearheading
    our efforts to embed evaluation-driven development into our products. With the
    support of our leadership, we’re sharing some of the key lessons we’ve learned
    so far. We hope these insights will be valuable not only to those building AI
    in healthcare but also to anyone developing AI products, especially those just
    beginning their journey.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 作为Nuna, Inc.这家医疗AI公司的数据科学家，我一直负责将以评估驱动的开发融入我们的产品中。在领导层的支持下，我们分享了一些我们迄今为止学到的关键经验教训。我们希望这些见解不仅对那些在医疗领域构建AI的人有价值，而且对任何正在开发AI产品的人，尤其是那些刚开始他们旅程的人，也很有价值。
- en: This article is broken into the following sections, which seek to explain our
    broad learnings from the literature in addition to tricks and tips gained from
    experience.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本文分为以下几部分，旨在解释我们从文献中获得的广泛知识，以及从经验中获得的技巧和提示。
- en: In Section 1 we’ll briefly touch on Nuna’s products and explain why AI evaluation
    is so critical for us and for healthcare-focused AI in general.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第1节中，我们将简要介绍Nuna的产品，并解释为什么AI评估对我们以及一般医疗保健AI至关重要。
- en: In Section 2, we’ll explore how evaluation-driven development brings structure
    to the pre-deployment phase of our products. This involves developing metrics
    using both LLM-as-Judge and programmatic approaches, which are heavily inspired
    by [this excellent article](https://hamel.dev/blog/posts/llm-judge/). Once reliable
    judges and expert-aligned metrics have been established, we describe how to use
    them to iterate in the right direction using error analysis. In this section,
    we’ll also touch on the unique challenges posed by chatbot applications.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第2节中，我们将探讨如何通过评估驱动的开发为我们的产品的预部署阶段带来结构。这包括使用LLM作为评判者和程序性方法来开发指标，这些方法受到了[这篇优秀的文章](https://hamel.dev/blog/posts/llm-judge/)的极大启发。一旦建立了可靠的评判者和与专家对齐的指标，我们将描述如何使用它们通过错误分析来迭代正确的方向。在本节中，我们还将触及聊天机器人应用带来的独特挑战。
- en: In Section 3, we’ll discuss the use of model-based classification and alerting
    to monitor applications in production and use this feedback for further improvements.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第3节中，我们将讨论使用基于模型的分类和警报来监控生产中的应用程序，并使用这些反馈进行进一步的改进。
- en: Section 4 summarizes all that we’ve learned
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第4节总结了我们所学到的所有内容
- en: Any organization’s perspective on these subjects is influenced by the tools
    it uses — for example we use MLflow and Databricks Mosaic Evaluation to keep track
    of our pre-production experiments, and AWS Agent Evaluation to test our chatbot.
    However, we believe that the ideas presented here should be applicable regardless
    of tech stack, and there are many excellent options available from the likes of
    Arize (Phoenix evaluation suite), LangChain (LangSmith) and Confident AI (DeepEval).
    Here we’ll focus on projects where iterative development mainly involves prompt
    engineering, but a similar approach could be followed for fine-tuned models too.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 任何组织对这些主题的看法都受到其使用的工具的影响——例如，我们使用MLflow和Databricks Mosaic Evaluation来跟踪我们的预生产实验，并使用AWS
    Agent Evaluation来测试我们的聊天机器人。然而，我们相信这里提出的思想应该适用于任何技术堆栈，并且有许多来自Arize（凤凰城评估套件）、LangChain（LangSmith）和Confident
    AI（DeepEval）等公司的优秀选项。在这里，我们将关注主要涉及提示工程的项目，但对于微调模型也可以采用类似的方法。
- en: 1.0 AI and evaluation at Nuna
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.0 Nuna的AI和评估
- en: '[Nuna’s](https://www.nuna.com/) goal is to reduce the total cost of care and
    improve the lives of people with chronic conditions such as hypertension (high
    blood pressure) and diabetes, which together affect more than 50% of the US adult
    population [2,3]. This is done through a patient-focused mobile app that encourages
    healthy habits such as medication adherence and blood pressure monitoring, in
    addition to a care-team-focused dashboard that organizes data from the app to
    providers*. In order for the system to succeed, both patients and care teams must
    find it easy to use, engaging and insightful. It must also produce measurable
    benefits to health. This is critical because it distinguishes healthcare technology
    from most other technology sectors, where business success is more closely tied
    to engagement alone.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[Nuna的](https://www.nuna.com/)目标是降低护理的总成本，并改善患有慢性疾病（如高血压和糖尿病）的人的生活，这些疾病共同影响了超过50%的美国成年人口[2,3]。这是通过一个以患者为中心的移动应用来实现的，该应用鼓励健康习惯，如药物依从性和血压监测，同时还有一个以护理团队为中心的仪表板，该仪表板组织来自应用的数据以供提供者*使用。为了使系统成功，患者和护理团队必须觉得它易于使用、引人入胜且富有洞察力。它还必须产生可衡量的健康益处。这一点至关重要，因为它将医疗保健技术与其他大多数技术领域区分开来，在其他技术领域，商业成功与参与度更为紧密相关。'
- en: 'AI plays a critical, patient and care-team-facing role in the product: On the
    patient side we have an in-app care coach chatbot, as well as features such as
    medication containers and meal photo-scanning. On the care-team side we are developing
    summarization and data sorting capabilities to reduce time to action and tailor
    the experience for different users. The table below shows the four AI-powered
    product components whose development served as inspiration for this article, and
    which will be referred to in the following sections.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: AI在产品中扮演着关键、耐心且面向护理团队的角色：在患者端，我们有应用内的护理教练聊天机器人，以及药物容器和餐食照片扫描等功能。在护理团队端，我们正在开发摘要和数据排序能力，以减少行动时间并针对不同用户定制体验。下表显示了四个由AI驱动的产品组件，这些组件的开发为本文提供了灵感，并在以下章节中提及。
- en: '| **Product description** | **Unique characteristics** | **Most critical evaluation
    components** |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| **产品描述** | **独特特性** | **最关键的评估组成部分** |'
- en: '| Scanning of medication containers (image to text) | Multimodal with clear
    ground truth labels (medication details extracted from container) | Representative
    development dataset, iteration and tracking, monitoring in production |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| 药物容器扫描（图像到文本） | 多模态，具有清晰的地面真实标签（从容器中提取的药物细节） | 典型的发展数据集，迭代和跟踪，生产中的监控 |'
- en: '| Scanning of meals (ingredient extraction, nutritional insights and scoring)
    | Multimodal, mixture of clear ground truth (extracted ingredients) and subjective
    judgment of LLM-generated assessments & SME input | Representative development
    dataset, appropriate metrics, iteration and tracking, monitoring in production
    |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| 餐食扫描（成分提取、营养洞察和评分） | 多模态，混合清晰的地面真实标签（提取的成分）和LLM生成的评估及小企业输入的主观判断 | 典型的发展数据集，适当的指标，迭代和跟踪，生产中的监控
    |'
- en: '| In-app care coach chatbot (text to text) | Multi-turn transcripts, tool calling,
    wide variety of personas and use cases, subjective judgement | Representative
    development dataset, appropriate metrics, monitoring in production |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
  zh: '| 应用内护理教练聊天机器人（文本到文本） | 多轮转录，工具调用，多样化的角色和用例，主观判断 | 典型的发展数据集，适当的指标，生产中的监控 |'
- en: '| Medical record summarization (text & numerical data to text)  | Complex input
    data, narrow use case, critical need for high accuracy and SME judgement | Representative
    development dataset, expert-aligned LLM-judge, iteration & tracking |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| 医疗记录摘要（文本和数值数据转换为文本）  | 复杂的输入数据，狭窄的应用场景，对高精度和小企业判断的迫切需求 | 典型的发展数据集，专家对齐的LLM判断，迭代和跟踪
    |'
- en: 'Figure 1: Table showing the AI use cases at Nuna which will be referred to
    in this article. We believe that the evaluation-driven development framework presented
    here is sufficiently broad to apply to these and similar types of AI products.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：展示Nuna中AI用例的表格，这些用例将在本文中提及。我们相信这里提出的以评估驱动的开发框架足够广泛，可以应用于这些和类似类型的AI产品。
- en: Respect for patients and the sensitive data they entrust us with is at the core
    of our business. In addition to safeguarding data privacy, we must ensure that
    our AI products operate in ways that are safe, reliable, and aligned with users’
    needs. We need to anticipate how people might use the products and test both standard
    and edge-case uses. Where mistakes are possible — such as ingredient recognition
    from meal photographs — we need to know where to invest in building ways for users
    to easily correct them. We also need to be on the lookout for more subtle failures
    — for example, [recent research suggests that prolonged chatbot use can lead to
    increased feelings of loneliness](https://www.media.mit.edu/publications/how-ai-and-human-behaviors-shape-psychosocial-effects-of-chatbot-use-a-longitudinal-controlled-study/)
    — so we need to identify and monitor for concerning use cases to ensure that our
    AI is aligned with the goal of improving lives and reducing cost of care. This
    aligns with recommendations from the NIST AI Risk Management Framework, which
    emphasizes preemptive identification of plausible misuse scenarios, including
    edge cases and unintended consequences, especially in high-impact domains such
    as healthcare.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 尊重患者以及他们托付给我们的敏感数据是我们业务的核心理念。除了保护数据隐私外，我们还必须确保我们的AI产品以安全、可靠、符合用户需求的方式运行。我们需要预测人们可能如何使用这些产品，并测试标准用法和边缘情况。在可能出现错误的地方——例如，从餐食照片中识别成分——我们需要知道在哪里投资建立用户轻松纠正错误的方法。我们还需要关注更微妙的问题——例如，[最近的研究表明，长时间使用聊天机器人可能导致孤独感增加](https://www.media.mit.edu/publications/how-ai-and-human-behaviors-shape-psychosocial-effects-of-chatbot-use-a-longitudinal-controlled-study/)——因此，我们需要识别和监控令人担忧的使用案例，以确保我们的AI与改善生活、降低护理成本的目标保持一致。这与NIST
    AI风险管理框架的建议相符，该框架强调预先识别可能的误用场景，包括边缘情况和意外后果，尤其是在影响重大的领域，如医疗保健。
- en: '**This system provides wellness support only and is not intended for medical
    diagnosis, treatment, or to replace professional healthcare judgment.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**本系统仅提供健康支持，并不用于医疗诊断、治疗，或替代专业医疗判断**。'
- en: '2.0 Pre-deployment: Metrics, alignment and iteration'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.0 部署前：指标、对齐和迭代
- en: In the development stage of an LLM-powered product, it is important to establish
    evaluation metrics that are aligned with the business/product goals, a testing
    dataset that is representative enough to simulate production behavior and a robust
    method to actually calculate the evaluation metrics. With these things in place,
    we can enter the virtuous cycle of iteration and error analysis (see [this short
    book](https://info.deeplearning.ai/machine-learning-yearning-book) for details).
    The faster we can iterate in the right direction, the higher our chances of success.
    It also goes without saying that whenever testing involves passing sensitive data
    through an LLM, it must be done from a secure environment with a trusted provider
    in accordance with data privacy regulations. For example, in the United States,
    the Health Insurance Portability and Accountability Act (HIPAA) sets strict standards
    for protecting patients’ health information. Any handling of such data must meet
    HIPAA’s requirements for security and confidentiality.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个由LLM（大型语言模型）驱动的产品的开发阶段，建立与业务/产品目标对齐的评估指标、一个足以模拟生产行为的测试数据集，以及一个实际计算评估指标的方法是非常重要的。有了这些，我们就可以进入迭代和错误分析的良性循环（详情见[这本书](https://info.deeplearning.ai/machine-learning-yearning-book)）。我们越快在正确的方向上进行迭代，成功的可能性就越高。不言而喻，当测试涉及通过LLM传递敏感数据时，必须在符合数据隐私法规的受信任环境中进行。例如，在美国，健康保险可携带性和问责法案（HIPAA）为保护患者健康信息设定了严格的标准。任何此类数据的处理都必须符合HIPAA对安全和保密的要求。
- en: 2.1 Development dataset
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 开发数据集
- en: At the outset of a project, it is important to identify and engage with subject
    matter experts (SMEs) who can help generate example input data and define what
    success looks like. At Nuna our SMEs are consultant healthcare professionals such
    as physicians and nutritionists. Depending on the problem context, we’ve found
    that opinions from healthcare experts can be nearly uniform — where the answer
    can be sourced from core principles of their training — or quite varied, drawing
    on their individual experiences. To mitigate this, we’ve found it useful to seek
    advice from a small panel of experts (typically 2-5) who are engaged from the
    beginning of the project and whose consensus view acts as our ultimate source
    of truth.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目开始时，识别并联系能够帮助生成示例输入数据和定义成功标准的主题领域专家（SMEs）非常重要。在Nuna，我们的SMEs是咨询医疗保健专业人士，如医生和营养师。根据问题背景，我们发现医疗保健专家的意见几乎是一致的——答案可以来源于他们培训的核心原则——或者非常多样化，借鉴他们个人的经验。为了减轻这种差异，我们发现从项目开始就寻求一小组专家（通常是2-5人）的意见是有用的，他们的共识观点作为我们最终的真实来源。
- en: It’s advisable to work with the SMEs to build a representative dataset of inputs
    to the system. To do this, we should consider the broad categories of personas
    who might be using it and the main functionalities. The broader the use case,
    the more of these there will be. For example, the Nuna chatbot is accessible to
    all users, helps answer any wellness-based question and also has access to the
    user’s own data via tool calls. Some of the functionalities are therefore “emotional
    support”, “hypertension support”, “nutrition advice”, “app support”, and we might
    consider splitting these further into “new user” vs. “exiting user” or “skeptical
    user” vs. “power user” personas. This segmentation is useful for the data generation
    process and error analysis later on, after these inputs have run through the system.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 建议与SMEs（行业专家）合作，构建系统的代表性输入数据集。为此，我们应该考虑可能使用该系统的各种用户角色的广泛类别和主要功能。用例越广泛，这些类别就越多。例如，Nuna聊天机器人对所有用户都开放，帮助回答任何基于健康的问题，并且可以通过工具调用访问用户自己的数据。因此，一些功能是“情感支持”、“高血压支持”、“营养建议”、“应用支持”，我们可能需要将这些功能进一步细分为“新用户”与“老用户”或“怀疑用户”与“高级用户”的用户角色。这种细分对数据生成过程和后续的错误分析很有用，在这些输入经过系统处理后。
- en: It’s also important to consider specific scenarios — both typical and edge-case
    — that the system must handle. For our chatbot these include “user asks for a
    diagnosis based on symptoms” (we always refer them to a healthcare professional
    in such situations), “user ask is truncated or incomplete”, “user attempts to
    jailbreak the system”. Of course, it’s unlikely that all critical scenarios will
    be accounted for, which is why later iteration (section 2.5) and monitoring in
    production (section 3.0) is needed.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，考虑系统必须处理的特定场景——包括典型场景和边缘情况——也很重要。对于我们聊天机器人来说，这些包括“用户根据症状请求诊断”（在这种情况下，我们总是建议他们联系医疗保健专业人士），“用户请求被截断或不完整”，“用户尝试越狱系统”。当然，不可能考虑到所有关键场景，这就是为什么需要后续迭代（第2.5节）和在生产中的监控（第3.0节）的原因。
- en: With the categories in place, the data itself might be generated by filtering
    existing proprietary or open source datasets (e.g. [Nutrition5k](https://github.com/google-research-datasets/Nutrition5k)
    for food images, OpenAI’s [HealthBench](https://openai.com/index/healthbench/)
    for patient-clinician conversations). In some cases, both inputs and gold standard
    outputs might be available, for example in the ingredient labels on each image
    in Nutition5k. This makes metric design (section 2.3) easier. More commonly though,
    expert labelling will be required for the gold standard outputs. Indeed, even
    if pre-existing input examples are not available, these can be generated synthetically
    with an LLM and then curated by the team — Databricks has some tools for this,
    described [here](https://docs.databricks.com/aws/en/generative-ai/agent-evaluation/synthesize-evaluation-set).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在类别设置到位后，数据本身可能通过过滤现有的专有或开源数据集（例如，用于食品图像的[Nutrition5k](https://github.com/google-research-datasets/Nutrition5k)，用于患者-医生对话的OpenAI的[HealthBench](https://openai.com/index/healthbench/)）来生成。在某些情况下，输入和黄金标准输出都可能可用，例如在Nutition5k中每张图像的成分标签。这使得指标设计（第2.3节）更加容易。然而，更常见的情况是需要专家对黄金标准输出进行标注。确实，即使没有现成的输入示例，也可以使用LLM（大型语言模型）合成这些示例，然后由团队进行整理——Databricks有一些工具用于此，详情请参阅[这里](https://docs.databricks.com/aws/en/generative-ai/agent-evaluation/synthesize-evaluation-set)。
- en: How big should this development set be? The more examples we have, the more
    likely it is to be representative of what the model will see in production but
    the more expensive it will be to iterate. Our development sets typically start
    out on the order of a few hundred examples. For chatbots, where to be representative
    the inputs might need to be multi-step conversations with sample patient data
    in context, we recommend using a testing framework like [AWS Agent Evaluation](https://awslabs.github.io/agent-evaluation/),
    where the input example files can be generated manually or via LLM by prompting
    and curation.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个开发集应该有多大？我们拥有的例子越多，它就越有可能代表模型在生产中看到的内容，但迭代的成本也越高。我们的开发集通常从几百个例子开始。对于聊天机器人，为了具有代表性，输入可能需要是包含样本患者数据的多步骤对话，我们建议使用像[AWS
    Agent Evaluation](https://awslabs.github.io/agent-evaluation/)这样的测试框架，其中输入示例文件可以手动生成或通过LLM通过提示和编辑生成。
- en: 2.2 Baseline model pipeline
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2 基线模型流程
- en: If starting from scratch, the process of thinking through the use cases and
    building the development set will likely give the team a sense for the difficulty
    of this problem and hence the architecture of the baseline system to be built.
    Unless made infeasible by security or cost concerns, it’s advisable to keep the
    initial architecture simple and use powerful, API-based models for the baseline
    iteration. The main purpose of the iteration process described in subsequent sections
    is to improve the prompts in this baseline version, so we typically keep them
    simple while trying to adhere to general prompt engineering best practices such
    as those described in this [guide by Anthropic](https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果从头开始，思考用例和构建开发集的过程可能会让团队对这个问题以及要构建的基线系统的架构有一个感觉。除非由于安全或成本问题而变得不可行，否则建议保持初始架构简单，并使用基于API的强大模型进行基线迭代。后续章节中描述的迭代过程的主要目的是改进这个基线版本中的提示，所以我们通常保持它们简单，同时尽量遵循一般的提示工程最佳实践，如本指南中描述的[Anthropic指南](https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview)。
- en: Once the baseline system is up and running, it should be run on the development
    set to generate the first outputs. Running the development dataset through the
    system is a batch process that may need to be repeated many times, so it is worth
    parallelizing. At Nuna we use PySpark on Databricks for this. The most straightforward
    method for batch parallelism of this type is the [pandas user-defined function](https://docs.databricks.com/aws/en/udf/pandas)
    (UDF), which allows us to call the model API in a loop over rows in Pandas dataframe,
    and then use Pyspark to break up the input dataset into chunks to be processed
    in parallel over the nodes of a cluster. An alternative method, described [here](https://docs.databricks.com/aws/en/machine-learning/model-inference/dl-model-inference),
    first requires us to log a script that calls the model as an [mlflow PythonModel
    object](https://mlflow.org/docs/latest/model#models-from-code), load that as a
    pandas UDF and then run inference using that.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦基线系统启动并运行，它应该运行在开发集上以生成第一个输出。将开发数据集通过系统运行是一个可能需要重复多次的批量过程，因此值得并行化。在Nuna，我们使用Databricks上的PySpark来完成这项工作。此类批量并行化的最直接方法是使用[pandas用户定义函数](https://docs.databricks.com/aws/en/udf/pandas)（UDF），它允许我们在Pandas数据框的行上循环调用模型API，然后使用Pyspark将输入数据集分割成块，以便在集群的节点上并行处理。另一种方法，如[此处](https://docs.databricks.com/aws/en/machine-learning/model-inference/dl-model-inference)所述，首先需要我们将调用模型的脚本作为[mlflow
    PythonModel对象](https://mlflow.org/docs/latest/model#models-from-code)记录下来，将其作为pandas
    UDF加载，然后使用它进行推理。
- en: '![](../Images/c4a15edb7a281151552073d63b583881.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c4a15edb7a281151552073d63b583881.png)'
- en: 'Figure 2: High level workflow showing the process of building the development
    dataset and metrics, with input from subject matter experts (SME). Construction
    of the dataset is iterative. After the baseline model is run, SME critiques can
    be used to define optimizing and satisficing metrics and their associated thresholds
    for success. Image generated by the author.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：展示构建开发数据集和指标的高级工作流程，其中包含来自领域专家（SME）的输入。数据集的构建是迭代的。在运行基线模型之后，领域专家的批评可以用来定义优化和满足的指标及其相关的成功阈值。图像由作者生成。
- en: 2.3 Metric design
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3 指标设计
- en: Designing evaluation metrics that are actionable and aligned with the feature’s
    goals is a critical part of evaluation-driven development. Given the context of
    the feature you are developing, there may be some metrics that are minimum requirements
    for ship — e.g. a minimum rate of the numerical accuracy for a text summary on
    a graph. Especially in a healthcare context, we have found that SMEs are again
    essential resources here in the identification of additional supplementary metrics
    that will be important for stakeholder buy-in and end-user interpretation. Asynchronously,
    SMEs should be able to securely review the inputs and outputs from the development
    set and make comments on them. Various purpose-built tools support this kind of
    review and can be adapted to the project’s sensitivity and maturity. For early-stage
    or low-volume work, lightweight methods such as a secure spreadsheet may suffice.
    If possible, the feedback should consist of a simple pass/fail decision for each
    input/output pair, along with critique of the LLM-generated output explaining
    the decision. The idea is that we can then use these critiques to inform our choice
    of evaluation metrics and provide few-shot examples to any LLM-judges that we
    build. Why pass/fail rather than a likert score or some other numerical metric?
    This is a developer choice, but we found it is much easier to get alignment between
    SMEs and LLM judges in the binary case. It is straightforward to aggregate results
    into a simple accuracy measure across the development set. For example, if 30%
    of the “90 day blood pressure time series summaries” get a zero for groundedness
    but none of the 30 day summaries do, then this points to the model struggling
    with long inputs.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 设计可操作且与功能目标一致的评估指标是评估驱动型开发的关键部分。考虑到你正在开发的功能的背景，可能有一些指标是发货的最低要求——例如，图表上文本摘要的数值准确性的最低比率。特别是在医疗保健环境中，我们发现SMEs在识别对利益相关者和最终用户解释重要的额外补充指标方面再次是关键资源。异步地，SMEs应该能够安全地审查开发集的输入和输出，并对它们进行评论。各种专门设计的工具支持这种类型的审查，并可以根据项目的敏感性和成熟度进行调整。对于早期阶段或低量级的工作，轻量级方法，如安全的电子表格，可能就足够了。如果可能的话，反馈应包括对每个输入/输出对的简单通过/失败决定，以及对LLM生成的输出的评论，解释决定。我们的想法是，然后我们可以使用这些评论来指导我们选择评估指标，并为任何我们构建的LLM-judges提供少量示例。为什么是通过/失败而不是李克特量表或其他数值指标？这是一个开发者选择，但我们发现，在二元情况下，SMEs和LLM
    judges之间的对齐要容易得多。将结果汇总为开发集的简单准确度度量是直接的。例如，如果30%的“90天血压时间序列摘要”在扎根性方面得到零分，而30天的摘要中没有，那么这表明模型在处理长输入时存在困难。
- en: At the initial review stage, it is often also useful to document a clear set
    of guidelines around what constitutes success in the outputs, which allows all
    annotators to have a source of truth. Disagreements between SME annotators can
    often be resolved with reference to these guidelines, and if disagreements persist
    this may be a sign that the guidelines — and hence the purpose of the AI system
    — is not defined clearly enough. It’s also important to note that depending on
    your company’s resourcing, ship timelines, and risk level of the feature, it may
    not be possible to get SME comments on the entire development set here — so it’s
    important to choose representative examples.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在初步审查阶段，记录一组关于输出成功构成要素的明确指南通常也是很有用的，这可以让所有注释者有一个可信的来源。SME注释者之间的分歧通常可以通过参考这些指南来解决，如果分歧持续存在，这可能是一个迹象，表明指南——以及AI系统的目的——定义得不够清楚。还重要的是要注意，根据你公司的资源、发货时间表和功能的危险级别，可能无法对整个开发集获得SME的评论——因此选择代表性的例子很重要。
- en: As a concrete example, Nuna has developed a medication logging history AI summary,
    to be displayed in the care team-facing portal. Early in the development of this
    AI summary, we curated a set of representative patient records, ran them through
    the summarization model, plotted the data and shared a secure spreadsheet containing
    the input graphs and output summaries with our SMEs for their comments. From this
    exercise we identified and documented the need for a range of metrics including
    readability, style (i.e. objective and not alarmist), formatting and groundedness
    (i.e. accuracy of insights against the input timeseries).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 作为具体例子，Nuna开发了一个药物日志历史AI摘要，用于在面向护理团队的门户中显示。在AI摘要的开发早期，我们收集了一组代表性患者记录，将它们通过摘要模型处理，绘制了数据，并与我们的专家共享了一个包含输入图表和输出摘要的安全电子表格，以供他们评论。从这个练习中，我们确定了需要一系列指标，包括可读性、风格（即客观而非惊悚的）、格式和扎根性（即洞察力与输入时间序列的准确性）。
- en: Some metrics can be calculated programmatically with simple tests on the output.
    This includes formatting and length constraints, and readability as quantified
    by scores like the [F-K grade level](https://en.wikipedia.org/wiki/Flesch%E2%80%93Kincaid_readability_tests).
    Other metrics require an LLM-judge (see below for more detail) because the definition
    of success is more nuanced. This is where we prompt an LLM to act like a human
    expert, giving pass/fail decisions and critiques of the outputs. The idea is that
    if we can align the LLM judge’s results with those of the experts, we can run
    it automatically on our development set and quickly compute our metrics when iterating.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一些指标可以通过对输出进行简单的编程测试来计算。这包括格式和长度限制，以及通过像[F-K等级](https://en.wikipedia.org/wiki/Flesch%E2%80%93Kincaid_readability_tests)这样的评分来量化的可读性。其他指标需要LLM评判者（见下文了解更多细节），因为成功的定义更为复杂。这就是我们提示LLM表现得像人类专家，给出通过/失败的决定和输出评论的地方。想法是，如果我们能够将LLM评判者的结果与专家的结果对齐，我们就可以在开发集上自动运行它，并在迭代时快速计算我们的指标。
- en: We found it useful to choose a single “optimizing metric” for each project,
    for example the proportion of the development set that is marked as accurately
    grounded in the input data, but back it up with several “satisficing metrics”
    such as percent within length constraints, percent with suitable style, percent
    with readability score > 60 etc. Factors like [latency percentile](https://www.tuanh.net/blog/oop/statistics-behind-latency-metrics-understanding-p90-p95-and-p99)
    and mean token cost per request also make ideal satisficing metrics. If an update
    makes the optimizing metric value go up without lowering any of the satisficing
    metric values below pre-defined thresholds, then we know we’re going in the right
    direction.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现为每个项目选择一个单一的“优化指标”很有用，例如开发集中被标记为准确基于输入数据的比例，但可以用几个“满意指标”来支持，例如在长度限制内的百分比、适合风格的百分比、可读性评分大于60的百分比等。像[延迟百分位数](https://www.tuanh.net/blog/oop/statistics-behind-latency-metrics-understanding-p90-p95-and-p99)和每请求平均令牌成本这样的因素也构成理想的满意指标。如果一个更新使得优化指标值上升，而没有将任何满意指标值降低到预定义的阈值以下，那么我们知道我们正在朝着正确的方向前进。
- en: 2.4 Building the LLM judge
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4 构建LLM评判者
- en: The purpose of LLM-judge development is to distill the advice of the SMEs into
    a prompt that allows an LLM to score the development set in a way that is aligned
    with their professional judgement. The judge is usually a larger/more powerful
    model than the one being judged, though this is not a strict requirement. We found
    that while it’s possible to have a single LLM judge prompt output the scores and
    critiques for several metrics, this can be confusing and incompatible with the
    tracking tools described in 2.4\. We therefore make a single judge prompt per
    metric, which has the added benefit of forcing conservatism on the number of LLM-generated
    metrics.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: LLM-judge开发的目的是将专家的建议提炼成一个提示，使LLM能够以与他们的专业判断一致的方式评分开发集。评判者通常是一个比被评判的模型更大/更强大的模型，尽管这不是一个严格的要求。我们发现，虽然有可能让单个LLM评判者提示输出多个指标的评分和评论，但这可能会造成混淆，并且与2.4中描述的跟踪工具不兼容。因此，我们为每个指标创建一个单独的评判者提示，这还有一个额外的优点，即强制限制LLM生成的指标数量。
- en: An initial judge prompt, to be run on the development set, might look something
    like the block below. The instructions will be iterated on during the alignment
    step, so at this stage they should represent a best effort to capture the SME’s
    thought process when writing their criques. It’s important to ensure that the
    LLM provides its reasoning, and that this is detailed enough to understand why
    it made the determination. We should also double check the reasoning against its
    pass/fail judgement to ensure they are logically consistent. For more detail about
    LLM reasoning in cases like this, we recommend this [excellent article](https://www.anthropic.com/research/tracing-thoughts-language-model).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 一个初始的裁判提示，将在开发集上运行，可能看起来像下面的块。在对齐步骤中，将迭代指令，因此在这个阶段，它们应该代表捕捉专家在撰写评论时的思维过程的最佳尝试。确保LLM提供其推理，并且这种推理足够详细，以便理解其做出决定的理由非常重要。我们还应该对照其通过/失败判断双重检查推理，以确保它们在逻辑上是一致的。关于此类情况中LLM推理的更多详细信息，我们推荐这篇[优秀文章](https://www.anthropic.com/research/tracing-thoughts-language-model)。
- en: '[PRE0]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: To keep the judge outputs as reliable as possible, its temperature setting should
    be as low as possible. To validate the judge, the SMEs need to see representative
    examples of input, output, judge decision and judge critique. This should preferably
    be a different set of examples than the ones they looked at for the metric design,
    and given the human effort involved in this step it can be small.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了尽可能保证裁判输出的可靠性，其温度设置应尽可能低。为了验证裁判，专家需要查看输入、输出、裁判决定和裁判评论的代表性示例。这些示例最好与他们在度量设计阶段查看的示例不同，考虑到这一步骤中涉及的人力，这些示例可以相对较少。
- en: The SMEs might first give their own pass/fail assessments for each example without
    seeing the judge’s version. They should then be able to see everything and have
    the opportunity to modify the model’s critique to become more aligned with their
    own thoughts. The results can be used to make modifications to the LLM judge prompt
    and the process repeated until the alignment between the SME assessments and model
    assessments stops improving, as time constraints allow. Alignment can be measured
    using simple accuracy or statistical measures such as [Cohen’s kappa](https://en.wikipedia.org/wiki/Cohen%27s_kappa).
    We have found that including relevant few-shot examples in the judge prompt typically
    helps with alignment, and there is also work suggesting that [adding grading notes](https://www.databricks.com/blog/enhancing-llm-as-a-judge-with-grading-notes)
    for each example to be judged is also beneficial.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 专家可能首先对每个示例给出自己的通过/失败评估，而不看裁判的版本。然后他们应该能够看到一切，并有机会修改模型的评论，使其更符合自己的思考。这些结果可以用来修改LLM裁判提示，并重复这个过程，直到专家评估和模型评估之间的对齐不再改善，时间限制允许为止。对齐可以使用简单的准确度或统计指标，如[Cohen的kappa](https://en.wikipedia.org/wiki/Cohen%27s_kappa)来衡量。我们发现，在裁判提示中包含相关的少量示例通常有助于对齐，也有研究表明，为每个要评判的示例添加[评分注释](https://www.databricks.com/blog/enhancing-llm-as-a-judge-with-grading-notes)也是有益的。
- en: We have typically used spreadsheets for this type of iteration, but more sophisticated
    tools such as Databrick’s [review apps](https://docs.databricks.com/aws/en/mlflow3/genai/human-feedback/concepts/review-app)
    also exist and could be adapted for LLM judge prompt development. With expert
    time in short supply, LLM judges are very important in healthcare AI and as foundation
    models become more sophisticated, their ability to stand in for human experts
    appears to be improving. [OpenAI’s HealthBench work](https://openai.com/index/healthbench/),
    for example, found that physicians were generally unable to improve the responses
    generated by April 2025’s models and that when GPT4.1 is used as a grader on healthcare-related
    problems, its scores are very well aligned with those of human experts [4].
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常使用电子表格进行此类迭代，但更复杂的工具，如Databricks的[审查应用](https://docs.databricks.com/aws/en/mlflow3/genai/human-feedback/concepts/review-app)也存在，并且可以用于LLM裁判提示的开发。由于专家时间短缺，LLM裁判在医疗保健AI中非常重要，随着基础模型变得更加复杂，它们替代人类专家的能力似乎在提高。[OpenAI的HealthBench工作](https://openai.com/index/healthbench/)，例如，发现医生通常无法改善2025年4月模型的响应，并且当GPT4.1作为医疗相关问题的评分者时，其评分与人类专家的评分非常一致[4]。
- en: '![](../Images/ccf3dc61a71bfbcfd31576fd54d198ac.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ccf3dc61a71bfbcfd31576fd54d198ac.png)'
- en: 'Figure 3: High level workflow showing how the development set (section 2.1)
    is used to build and align LLM judges. Experiment tracking is used for the evolution
    loop, which involves calculating metrics, refining the model, regenerating the
    output and re-running the judges. Image generated by the author.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：高级工作流程图，展示了如何使用开发集（第2.1节）构建和校准LLM评委。实验跟踪用于进化循环，涉及计算指标、优化模型、重新生成输出和重新运行评委。图像由作者生成。
- en: 2.5 Iteration and tracking
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.5 迭代和跟踪
- en: With our LLM judges in place, we are finally in a good position to start iterating
    on our main system. To do so, we’ll systematically update the prompts, regenerate
    the development set outputs, run the judges, compute the metrics and do a comparison
    between the new and old results. This is an iterative process with potentially
    many cycles, which is why it benefits from tracing, prompt logging and experiment
    tracking. The process of regenerating the development dataset outputs is described
    in section 2.1, and tools like MLflow make it possible to track and version the
    judge iterations too. We use [Databricks Mosaic AI Agent Evaluation](https://docs.databricks.com/aws/en/generative-ai/agent-evaluation/),
    which provides a framework for adding custom Judges (both LLM and programmatic),
    in addition to several built-in ones with pre-defined prompts (we typically turn
    these off). In code, the core evaluation commands look like this
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的LLM评委到位后，我们终于处于一个良好的位置，可以开始迭代我们的主要系统。为此，我们将系统地更新提示，重新生成开发集输出，运行评委，计算指标，并在新旧结果之间进行比较。这是一个可能包含许多周期的迭代过程，这就是为什么它受益于跟踪、提示日志和实验跟踪。重新生成开发数据集输出的过程在第2.1节中描述，像MLflow这样的工具使得跟踪和版本控制评委迭代也成为可能。我们使用[Databricks
    Mosaic AI Agent Evaluation](https://docs.databricks.com/aws/en/generative-ai/agent-evaluation/)，它提供了一个框架来添加自定义评委（包括LLM和程序化），除了几个具有预定义提示的内置评委（我们通常将其关闭）。在代码中，核心评估命令看起来像这样
- en: '[PRE1]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Under the hood, MLflow will issue parallel calls to the judge models (packaged
    in the agent metrics list in the code above) and also call the programmatic metrics
    with relevant functions (in the programmatic metrics list), saving the results
    and relevant artifacts to Unity Catalog and also providing a nice user interface
    with which to compare metrics across experiments, view traces and read the LLM
    judge critiques. It should be noted [MLflow 3.0](https://www.databricks.com/blog/mlflow-30-unified-ai-experimentation-observability-and-governance),
    released just after this was written, and has some tooling that may simplify the
    code above.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层，MLflow将对评委模型（如上述代码中的代理指标列表中所打包的）发出并行调用，并调用与相关函数（在程序化指标列表中）的程序化指标，将结果和相关工件保存到Unity目录，并提供一个用于比较实验中指标、查看跟踪和阅读LLM评委评论的出色用户界面。需要注意的是[MLflow
    3.0](https://www.databricks.com/blog/mlflow-30-unified-ai-experimentation-observability-and-governance)，在本文撰写之后发布，并有一些工具可能会简化上述代码。
- en: To identity improvements with highest ROI, we can revisit the development set
    segmentation into personas, functionalities and situations described in section
    2.1\. We can compare the value of the optimizing metric between segments and choose
    to focus our prompt iterations on the one with the lowest scores, or with the
    most concerning edge cases. With our evaluation loop in place, we can catch any
    unintended consequences of model updates. Additionally, with tracking we can reproduce
    results and revert to previous prompt versions if needed.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 为了识别具有最高投资回报率的改进，我们可以回顾第2.1节中描述的开发集分割成角色、功能和场景。我们可以比较不同段落的优化指标价值，并选择将我们的提示迭代重点放在得分最低的段落，或者最令人担忧的边缘案例上。有了我们的评估循环，我们可以捕捉到模型更新带来的任何意外后果。此外，通过跟踪，我们可以重现结果，并在需要时回滚到之前的提示版本。
- en: 2.6 When is it ready for production?
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.6 它何时准备好投入生产？
- en: In AI applications, and healthcare in particular, some failures are more consequential
    than others. We never want our chatbot to claim that it’s a healthcare professional,
    for example. But it is inevitable that our meal scanner will make mistakes identifying
    ingredients in uploaded images — humans are not particularly good at identifying
    ingredients from a photo, and so even human-level accuracy can contain frequent
    mistakes. It’s therefore important to work with the SMEs and product stakeholders
    to develop realistic thresholds for the optimizing metrics, above which the development
    work can be declared successful to enable migration into production. Some projects
    may fail at this stage because it’s not possible to push the optimizing metrics
    above the agreed threshold without compromising the satisificing metrics or because
    of resource constraints.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能应用中，尤其是在医疗保健领域，一些失败比其他失败更为严重。我们绝不想让我们的聊天机器人声称自己是医疗保健专业人士，例如。但我们的餐品扫描器在识别上传图像中的成分时出错是不可避免的——人类在从照片中识别成分方面并不特别擅长，因此即使是人类水平的准确性也可能包含频繁的错误。因此，与行业专家和产品利益相关者合作，为优化指标制定现实可行的阈值非常重要，超过这些阈值，开发工作可以宣布成功，以便迁移到生产环境。有些项目可能在这个阶段失败，因为在不损害令人满意的指标或由于资源限制的情况下，无法将优化指标推高到商定的阈值以上。
- en: If the thresholds are very high then missing them slightly might be acceptable
    because of unavoidable error or ambiguity in the LLM judge. For example we initially
    set a ship requirement of 100% of our development set health record summaries
    to be graded as “accurately grounded.” We then found that the LLM-judge occasionally
    would quibble over statements like, “the patient has recorded their blood pressure
    on most days of the last week”, when the actual number of days with recordings
    was 4\. In our judgement, a reasonable end-user would not find this statement
    troubling, despite the LLM-as-judge classifying it as a failure. Thorough manual
    review of failure cases is important to identify whether the performance is actually
    acceptable and/or whether further iteration is needed.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果阈值非常高，那么由于不可避免的错误或LLM评判中的歧义，稍微低于阈值可能是可以接受的。例如，我们最初设定了一个要求，即我们的开发集健康记录摘要的100%应被评为“准确无误”。然后我们发现，LLM评判偶尔会对诸如“病人在上周的大多数日子里记录了血压”之类的陈述进行挑剔，而实际上记录的天数是4天。根据我们的判断，一个合理的最终用户不会认为这个陈述令人烦恼，尽管LLM评判将其归类为失败。彻底手动审查失败案例对于确定性能是否实际上是可以接受的以及是否需要进一步迭代非常重要。
- en: These go/no-go decisions also align with the [NIST AI Risk Management Framework](https://www.nist.gov/itl/ai-risk-management-framework),
    which encourages context-driven risk thresholds and emphasizes traceability, validity,
    and stakeholder-aligned governance throughout the AI lifecycle.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是/否决策也与[NIST人工智能风险管理框架](https://www.nist.gov/itl/ai-risk-management-framework)相一致，该框架鼓励基于情境的风险阈值，并强调在整个人工智能生命周期中实现可追溯性、有效性和利益相关者一致的管理。
- en: Even with a temperature of zero, LLM judges are non-deterministic. A reliable
    judge should give the same determination and roughly the same critique every time
    it’s on a given example. If this is not happening, it suggests that the judge
    prompt needs to be improved. We found this issue to be particularly problematic
    in chatbot testing with the [AWS Evaluation Framework](https://awslabs.github.io/agent-evaluation/),
    where each conversation to be graded has a custom rubric and the LLM generating
    the input conversations has some leeway on the exact wording of the “user messages”.
    We therefore wrote a simple script to run each test multiple times and record
    the average failure rate. Tests with failure at a rate that is not 0 or 100% can
    be marked as unreliable and updated until they become consistent.This experience
    highlights the limitations of LLM judges and automated evaluation more broadly.
    It reinforces the importance of incorporating human review and feedback before
    declaring a system ready for production. Clear documentation of performance thresholds,
    test results, and review decisions supports transparency, accountability, and
    informed deployment.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 即使温度为零，LLM法官也是非确定性的。一个可靠的法官应该在每次面对给定示例时给出相同的判断和大致相同的评论。如果这种情况没有发生，这表明法官提示需要改进。我们发现这个问题在聊天机器人测试中尤其成问题，使用的是[AWS评估框架](https://awslabs.github.io/agent-evaluation/)，其中每个要评分的对话都有一个定制的评分标准，而生成输入对话的LLM在“用户消息”的确切措辞上有些自由度。因此，我们编写了一个简单的脚本来多次运行每个测试并记录平均失败率。失败率不是0或100%的测试可以标记为不可靠，并更新直到它们变得一致。这种经历突出了LLM法官和更广泛的自动化评估的限制。它强调了在宣布系统准备投入生产之前纳入人工审查和反馈的重要性。对性能阈值、测试结果和审查决策的明确记录支持透明度、问责制和明智的部署。
- en: In addition to performance thresholds, it’s important to assess the system against
    known security vulnerabilities. The [OWASP Top 10 for LLM Applications](https://owasp.org/www-project-top-10-for-large-language-model-applications/)
    outlines common risks such as prompt injection, insecure output handling, and
    over-reliance on LLMs in high-stakes decisions, all of which are highly relevant
    for healthcare use cases. Evaluating the system against this guidance can help
    mitigate downstream risks as the product moves into production.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 除了性能阈值之外，评估系统是否针对已知的网络安全漏洞也很重要。[OWASP LLM应用前10名](https://owasp.org/www-project-top-10-for-large-language-model-applications/)概述了常见的风险，如提示注入、不安全的输出处理以及在高风险决策中对LLM的过度依赖，这些都对医疗保健用例高度相关。根据此指南评估系统可以帮助减轻产品投入生产后的下游风险。
- en: '3.0 Post-deployment: Monitoring and classification'
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.0 部署后：监控和分类
- en: Moving an LLM application from development to deployment in a scalable, sustainable
    and reproducible way is a complex undertaking and the subject of excellent “LLMOps”
    articles like [this one](https://aws.amazon.com/blogs/machine-learning/fmops-llmops-operationalize-generative-ai-and-differences-with-mlops/).
    Having a process like this, which operationalizes each stage of the data pipeline,
    is very useful for evaluation-driven development because it allows for new iterations
    to be quickly deployed. However, in this section we’ll focus mainly on how to
    actually use the logs generated by an LLM application running in production to
    understand how it’s performing and inform further development.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 以可扩展、可持续和可重复的方式将LLM应用程序从开发转移到部署是一项复杂的任务，也是像这篇[文章](https://aws.amazon.com/blogs/machine-learning/fmops-llmops-operationalize-generative-ai-and-differences-with-mlops/)这样的“LLMOps”文章的主题。拥有这样一个将数据管道的每个阶段都实现操作化的流程非常有用，因为它允许快速部署新的迭代。然而，在本节中，我们将主要关注如何实际使用生产中运行的LLM应用程序生成的日志来了解其性能并指导进一步的开发。
- en: One major goal of monitoring is to validate that the evaluation metrics defined
    in the development phase behave similarly with production data, which is essentially
    a test of the representativeness of the development dataset. This should first
    ideally be done internally in a dogfooding or “bug bashing” exercise, with involvement
    from unrelated teams and SMEs. We can re-use the metric definitions and LLM judges
    built in development here, running them on samples of production data at periodic
    intervals and maintaining a breakdown of the results. For data security at Nuna,
    all of this is done within Databricks, which allows us to take advantage of Unity
    Catalog for lineage tracking and dashboarding tools for easy visualization.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 监控的一个主要目标是验证在开发阶段定义的评估指标在生产数据中的行为与开发数据集具有相似性，这本质上是对开发数据集代表性的测试。理想情况下，这首先应在内部通过狗粮测试或“虫子捣毁”练习来完成，涉及无关团队和SMEs。我们可以重用开发中构建的指标定义和LLM评审员，定期在生产数据的样本上运行它们，并保持结果的分解。在Nuna的数据安全方面，所有这些都在Databricks内部完成，这使我们能够利用Unity
    Catalog进行谱系跟踪和仪表板工具进行易于可视化的操作。
- en: Monitoring on LLM-powered products is a broad topic, and our focus here is on
    how it can be used to complete the evaluation-driven development loop so that
    the models can be improved and adjusted for drift. Monitoring should also be used
    to track broader “product success” metrics such as user-provided feedback, user
    engagement, token usage, and chatbot question resolution. This [excellent article](https://humanloop.com/blog/llm-monitoring)
    contains more details, and LLM judges can also be deployed in this capacity —
    they would go through the same development process described in section 2.4.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于LLM的产品上进行监控是一个广泛的话题，我们在这里关注的是如何使用它来完成以评估为导向的开发循环，以便改进和调整模型以适应漂移。监控还应用于跟踪更广泛的“产品成功”指标，例如用户提供的反馈、用户参与度、令牌使用情况和聊天机器人问题解决。这篇[优秀文章](https://humanloop.com/blog/llm-monitoring)包含了更多细节，LLM评审员也可以在这个角色中部署——他们将会经历与第2.4节中描述的相同的发展过程。
- en: This approach aligns with the NIST AI Risk Management Framework (“AI RMF”),
    which emphasizes continuous monitoring, measurement, and documentation to manage
    AI risk over time. In production, where ambiguity and edge cases are more common,
    automated evaluation alone is often insufficient. Incorporating structured human
    feedback, domain expertise, and transparent decision-making is essential for building
    trustworthy systems, especially in high-stakes domains like healthcare. These
    practices support the AI RMF’s core principles of governability, validity, reliability,
    and transparency.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法与NIST人工智能风险管理框架（“AI RMF”）相一致，该框架强调持续监控、测量和记录以管理人工智能风险。在生产环境中，由于模糊性和边缘情况更为常见，仅依靠自动化评估通常是不够的。结合结构化的人类反馈、领域专业知识和透明的决策对于构建可信赖的系统至关重要，尤其是在医疗保健等高风险领域。这些实践支持AI
    RMF的核心原则，即可治理性、有效性、可靠性和透明度。
- en: '![](../Images/cfee51a6e384d561036332c514b5f49b.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cfee51a6e384d561036332c514b5f49b.png)'
- en: 'Figure 4: High level workflow showing components of the post-deployment data
    pipeline that allows for monitoring, alerting, tagging and evaluation of the model
    outputs in production. This is essential for evaluation-driven development, since
    insights can be fed back into the development stage. Image generated by the author.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：展示部署后数据管道组件的高级工作流程，该管道允许监控、警报、标记和评估生产中的模型输出。这对于以评估为导向的开发至关重要，因为洞察可以反馈到开发阶段。图像由作者生成。
- en: 3.1 Additional LLM classification
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 附加LLM分类
- en: 'The concept of the LLM judge can be extended to post-deployment classification,
    assigning tags to model outputs and giving insights about how applications are
    being used “in the wild”, highlighting unexpected interactions and alerting about
    concerning behaviors. Tagging is the process of assigning simple labels to data
    so that they are easier to segment and analyze. This is particularly useful for
    chatbot applications: If users on a certain Nuna app version start asking our
    chatbot questions about our blood pressure cuff, for example, this may point to
    a cuff setup problem. Similarly, if certain styles of medication container are
    leading to higher than average failure rates from our medication scanning tool,
    this suggests the need to investigate and maybe update that tool.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: LLM裁判的概念可以扩展到部署后的分类，为模型输出分配标签，并给出关于应用程序在“野外”如何使用的见解，突出意外交互并警告关注的行为。标记是将简单的标签分配给数据的过程，以便它们更容易进行分割和分析。这对于聊天机器人应用尤其有用：例如，如果某个Nuna应用版本的用户开始询问我们的聊天机器人有关血压袖带的问题，这可能会指向袖带设置问题。同样，如果某些类型的药物容器导致我们的药物扫描工具的失败率高于平均水平，这表明需要调查并可能更新该工具。
- en: In practice, LLM classification is itself a development project of the type
    described in section 2\. We need to build a tag taxonomy (i.e. a description of
    each tag that could be assigned) and prompts with instructions about how to use
    it, then we need to use a development set to validate tagging accuracy. Tagging
    often involves generating consistently formatted output to be ingested by a downstream
    process — for example a list of topic ids for each chatbot conversation segment
    — which is why enforcing [structured output](https://humanloop.com/blog/structured-outputs)
    on the LLM calls can be very helpful here, and Databricks has [an example](https://docs.databricks.com/aws/en/machine-learning/model-inference/dl-model-inference)
    of how this is can be done at scale.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，LLM分类本身就是一个类似于第2节所述的开发项目。我们需要构建一个标签分类法（即每个可能分配的标签的描述）和带有使用说明的提示，然后我们需要使用开发集来验证标记的准确性。标记通常涉及生成一致格式的输出，以便由下游过程（例如，每个聊天机器人对话段的主题ID列表）摄取，这就是为什么在LLM调用上强制执行[结构化输出](https://humanloop.com/blog/structured-outputs)在这里非常有帮助，Databricks有一个[示例](https://docs.databricks.com/aws/en/machine-learning/model-inference/dl-model-inference)说明了如何大规模地完成这项工作。
- en: For long chatbot transcripts, LLM classification can be adapted for summarization
    to improve readability and protect privacy. Conversation summaries can then be
    vectorized, clustered and visualized to gain an understanding of groups that naturally
    emerge from the data. This is often the first step in designing a topic classification
    taxonomy such as the one the Nuna uses to tag our chats. Anthropic has also built
    an internal tool for similar purposes, which reveals fascinating insights into
    usage patterns of Claude and is outlined in their [Clio research article](https://www.anthropic.com/research/clio).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 对于较长的聊天机器人转录本，LLM分类可以适应摘要以提高可读性和保护隐私。然后可以将对话摘要向量化、聚类和可视化，以了解数据中自然出现的组。这通常是设计主题分类法的第一步，例如Nuna用来标记我们的聊天所使用的分类法。Anthropic也构建了一个内部工具用于类似目的，该工具揭示了关于Claude使用模式的迷人见解，并在他们的[Clio研究文章](https://www.anthropic.com/research/clio)中概述。
- en: Depending on the urgency of the information, tagging can happen in real time
    or as a batch process. Tagging that looks for concerning behavior — for example
    flagging chats for immediate review if they describe violence, illegal activities
    or severe health issues — might be best suited to a real-time system where notifications
    are sent as soon as conversations are tagged. Whereas more general summarization
    and classification can probably afford to happen as a batch process that updates
    a dashboard, and maybe only on a subset of the data to reduce costs. For chat
    classification, we found that including an “other” tag for the LLM to assign to
    examples that don’t fit neatly into the taxonomy is very useful. Data tagged as
    “other” can then be examined in more detail for new topics to add to the taxonomy.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 根据信息的紧急程度，标记可以实时进行或作为批量处理。寻找关注行为的标记——例如，如果聊天内容描述了暴力、非法活动或严重健康问题，则立即标记进行审查——可能最适合实时系统，其中在标记对话后立即发送通知。而更通用的摘要和分类可能可以作为一个批量处理过程进行，更新仪表板，也许只针对数据子集以降低成本。对于聊天分类，我们发现为LLM分配一个“其他”标记，用于那些无法完美归类到分类法中的示例，非常有用。标记为“其他”的数据可以更详细地检查，以添加新的主题到分类法中。
- en: 3.2 Updating the development set
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 更新开发集
- en: Monitoring and tagging grant visibility into application performance, but they
    are also part of the feedback loop that drives evaluation driven development.
    As new or unexpected examples come in and are tagged, they can be added to the
    development dataset, reviewed by the SMEs and run through the LLM judges. It’s
    possible that the judge prompts or few-shot examples may need to evolve to accommodate
    this new information, but the tracking steps outlined in section 2.4 should enable
    progress without the risk of confusing or unintended overwrites. This completes
    the feedback loop of evaluation-driven development and enables confidence in LLM
    products not just when they ship, but also as they evolve over time.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 监控和标记资助的可见性到应用程序性能，但它们也是驱动评估驱动的开发的反馈循环的一部分。随着新的或意外的示例出现并被标记，它们可以被添加到开发数据集中，由SMEs进行审查，并通过LLM评委。可能需要根据这些新信息调整评委提示或少样本示例，但第2.4节中概述的跟踪步骤应能够使进度不受混淆或意外覆盖的风险。这完成了评估驱动的开发的反馈循环，并使LLM产品不仅在发布时，而且在随时间演变时都充满信心。
- en: 4.0 Summary
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.0 摘要
- en: The rapid evolution of large language models (LLMs) is transforming industries
    and offers great potential to benefit healthcare. However, the non-deterministic
    nature of AI presents unique challenges, particularly in ensuring reliability
    and safety in healthcare applications.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）的快速进化正在改变行业，并为医疗保健领域带来巨大的潜在利益。然而，人工智能的非确定性本质带来了独特的挑战，尤其是在确保医疗保健应用中的可靠性和安全性方面。
- en: At Nuna, Inc., we’re embracing evaluation-driven development to address these
    challenges and drive our approach to AI products. In summary, the idea is to emphasize
    evaluation and iteration throughout the product lifecycle, from development to
    deployment and monitoring.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在Nuna, Inc.，我们拥抱以评估驱动的开发来应对这些挑战并推动我们的AI产品方法。总之，理念是在产品生命周期中强调评估和迭代，从开发到部署和监控。
- en: Our methodology involves close collaboration with subject matter experts to
    create representative datasets and define success criteria. We focus on iterative
    improvement through prompt engineering, supported by tools like MLflow and Databricks,
    to track and refine our models.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法包括与领域专家紧密合作，创建代表性的数据集并定义成功标准。我们通过提示工程进行迭代改进，并利用MLflow和Databricks等工具来跟踪和优化我们的模型。
- en: Post-deployment, continuous monitoring and LLM tagging provide insights into
    real-world application performance, enabling us to adapt and improve our systems
    over time. This feedback loop is crucial for maintaining high standards and ensuring
    AI products continue to align with our goals of improving lives and decreasing
    cost of care.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 部署后，持续监控和LLM标记提供了对实际应用性能的见解，使我们能够随着时间的推移调整和改进我们的系统。这个反馈循环对于保持高标准和确保AI产品继续与我们的目标保持一致至关重要，即改善生活质量和降低护理成本。
- en: In summary, evaluation-driven development is essential for building reliable,
    impactful AI solutions in healthcare and elsewhere. By sharing our insights and
    experiences, we hope to guide others in navigating the complexities of LLM deployment
    and contribute to the broader goal of improving efficiency of AI project development
    in healthcare.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，以评估驱动的开发对于在医疗保健和其他领域构建可靠、有影响力的AI解决方案至关重要。通过分享我们的见解和经验，我们希望指导他人导航LLM部署的复杂性，并为提高医疗保健AI项目开发效率的更广泛目标做出贡献。
