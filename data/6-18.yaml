- en: Missing Data in Time-Series? Machine Learning Techniques (Part 2)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 时间序列中的缺失数据？机器学习技术（第二部分）
- en: 原文：[https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-part-2-86fac838d1ce/](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-part-2-86fac838d1ce/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-part-2-86fac838d1ce/](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-part-2-86fac838d1ce/)
- en: Employ cluster algorithms to handle missing time-series data
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用聚类算法处理缺失的时间序列数据
- en: '![Image by Author.](../Images/555478cccddfbfdfee1f5a81d617969f.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/555478cccddfbfdfee1f5a81d617969f.png)'
- en: Image by Author.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: '***(If you haven’t read Part 1 yet, check it out [here](https://medium.com/towards-data-science/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45).)***'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '***(如果您还没有阅读第一部分，请在此处查看[链接](https://medium.com/towards-data-science/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45)。)***'
- en: Missing data in time-series analysis is a recurring problem.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列分析中的缺失数据是一个反复出现的问题。
- en: As we explored in [Part 1](https://medium.com/towards-data-science/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45),
    simple imputation techniques or even **regression-based models-linear regression,
    decision trees** can get us a long way.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在[第一部分](https://medium.com/towards-data-science/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45)中探讨的那样，简单的插补技术甚至基于回归的模型（如线性回归、决策树）可以让我们走得很远。
- en: But what if we **need to handle more subtle patterns a**nd capture the fine-grained
    fluctuation in the complex time-series data?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我们**需要处理更微妙的模式并捕捉复杂时间序列数据中的细微波动**呢？
- en: '**In this article we will explore K-Nearest Neighbors.** The strengths of this
    model include few assumptions with regards to nonlinear relationships in your
    data; hence, it becomes a versatile and robust solution for missing data imputation.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**在本文中，我们将探讨K-最近邻。**该模型的优点包括对数据中非线性关系的假设很少；因此，它成为缺失数据插补的灵活且稳健的解决方案。'
- en: We will be **using the same mock energy production dataset** that you’ve already
    seen in Part 1, with 10% values missing, introduced randomly.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用与第一部分中相同的模拟能源生产数据集，其中10%的值随机缺失。
- en: We will impute missing data in using a dataset that you can easily generate
    yourself, allowing you to follow along and apply the techniques in real-time as
    you explore the process step by step!
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们将使用一个您可以轻松生成的数据集来插补缺失数据，让您能够跟随并实时应用技术，在逐步探索过程中应用这些技术！
- en: This time, we will see how KNN can be more effective to fill up the gaps over
    simpler methods.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我们将看看KNN如何比简单方法更有效地填补空白。
