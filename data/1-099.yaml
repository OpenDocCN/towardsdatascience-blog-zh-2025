- en: Organizing Code, Experiments, and Research for Kaggle Competitions
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为 Kaggle 比赛**组织代码、实验和研究**
- en: 原文：[https://towardsdatascience.com/organizing-code-experiments-and-research-for-kaggle-competitions/](https://towardsdatascience.com/organizing-code-experiments-and-research-for-kaggle-competitions/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/organizing-code-experiments-and-research-for-kaggle-competitions/](https://towardsdatascience.com/organizing-code-experiments-and-research-for-kaggle-competitions/)
- en: <mdspan datatext="el1762998801858" class="mdspan-comment">Tell me</mdspan> and
    I forget. Teach me and I remember. Involve me and I learn.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762998801858" class="mdspan-comment">告诉我</mdspan>，我就忘记了。教我，我就记住了。参与其中，我就学会了。
- en: <mdspan datatext="el1762999364682" class="mdspan-comment">The old adage still</mdspan>
    holds true, and *learning by doing* is one of the most instructive processes to
    acquire a new skill. In the field of data science and machine learning, participating
    in competitions is one of the most effective ways to gain hands-on experience
    and enhance your skills and abilities.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762999364682" class="mdspan-comment">这句古老的谚语依然</mdspan>适用，*实践出真知*是掌握新技能最富有教育意义的途径之一。在数据科学和机器学习的领域，参加比赛是获得实际操作经验和提升技能能力最有效的方法之一。
- en: '[Kaggle](https://www.kaggle.com/) is the world’s largest data science community,
    and its competitions are highly respected in the industry. Many of the world’s
    leading ML conferences (e.g., [NeurIPS](https://neurips.cc/)), organizations (e.g., [Google](https://ai.googleblog.com/)),
    and universities (e.g., [Stanford](https://stanford.edu/)) host competitions on
    Kaggle.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[Kaggle](https://www.kaggle.com/)是世界最大的数据科学社区，其比赛在业界享有极高的声誉。世界上许多领先的机器学习会议（例如，[NeurIPS](https://neurips.cc/))、组织（例如，[Google](https://ai.googleblog.com/))和大学（例如，[Stanford](https://stanford.edu/))都在Kaggle上举办比赛。'
- en: The featured Kaggle Competitions award medals to top performers on the private
    leaderboard. Recently, I’ve participated in my very first medal-awarding Kaggle
    competition, and I was fortunate enough to earn a **Silver Medal**. This was the [NeurIPS
    – Ariel Data Challenge 2025](https://www.kaggle.com/competitions/ariel-data-challenge-2025).
    I don’t intend to share my solution here. If you’re interested, you can check
    out my [solution here](hhttps://ibrahimhabib.me/projects/ariel-2025).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 特色的 Kaggle 比赛向在私有排行榜上表现优异的选手颁发奖牌。最近，我参加了我的第一个颁发奖牌的 Kaggle 比赛，我有幸获得了**银牌**。这是[NeurIPS
    – Ariel 数据挑战 2025](https://www.kaggle.com/competitions/ariel-data-challenge-2025)。我并不打算在这里分享我的解决方案。如果你感兴趣，你可以在这里查看我的[solution
    here](https://ibrahimhabib.me/projects/ariel-2025)。
- en: What I didn’t realize prior to participation is how much Kaggle tests besides
    just ML skills.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在参加之前，我没有意识到 Kaggle 除了测试机器学习技能之外还测试了哪些方面。
- en: Kaggle tests one’s coding and software engineering skills. It stressed one’s
    ability to properly organize their codebase in order to quickly iterate and try
    new ideas. It also tested the ability to track experiments and results in a clear
    manner.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Kaggle 考验一个人的编码和软件工程技能。它强调正确组织代码库以快速迭代和尝试新想法的能力。它还考验了以清晰方式跟踪实验和结果的能力。
- en: Being part of the [NeurIPS 2025 Competition Track](https://nips.cc/virtual/2025/events/Competition),
    a research conference, also tested the ability to research and learn about a new
    domain quickly and effectively.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 成为[NeurIPS 2025 比赛赛道](https://nips.cc/virtual/2025/events/Competition)的一部分，这是一个研究会议，也考验了快速有效地研究并学习新领域的能力。
- en: All in all, this competition humbled me a lot and taught me many lessons besides
    ML.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，这次比赛让我受益匪浅，除了机器学习之外，还教会了我许多其他课程。
- en: The purpose of this article is to share some of these non-ML lessons with you.
    They all revolve around one principle: **organization**, **organization**, **organization**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章的目的是与你分享一些这些非机器学习课程。它们都围绕一个原则：**组织**，**组织**，**组织**。
- en: First, I will convince you why clear code structuring and process organization
    isn’t *time wasting* or *nice to have*, but rather *essential* for competing in
    Kaggle specifically and any successful data science project in general. Then,
    I will share with you some of the techniques I used and lessons learned regarding
    code structuring and the experimentation process.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我将说服你为什么清晰的代码结构和流程组织不是**浪费时间**或**锦上添花**，而是参加 Kaggle 比赛特别是任何成功的数据科学项目所必需的。然后，我将与你分享我在代码结构和实验过程中使用的一些技术和学到的经验教训。
- en: I want to start with a note of humility. By no means am I an expert in this
    field. I am still in the outset of my journey. All I hope for is that some readers
    will find some of these lessons beneficial and will learn from my pitfalls. If
    you have any other tips or suggestions, I urge you to share them so that we all
    can learn together.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我想以谦逊的态度开始。我绝不是这个领域的专家。我还在旅程的起点。我只希望一些读者能从中找到一些有益的教训，并从我的错误中学习。如果您有任何其他建议或建议，我敦促您分享它们，这样我们都可以一起学习。
- en: '1 Science Golden Tip: Organize'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1 科学黄金法则：组织
- en: It is no secret that natural scientists like to keep detailed records of their
    work and research process. Unclear steps may (and will) lead to incorrect conclusions
    and understanding. Irreproducible work is the bane of science. For us data scientists,
    why should it be any different?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 众所周知，自然科学家喜欢详细记录他们的工作和研究过程。不明确的步骤可能会导致（并将会导致）错误的结论和理解。不可重复的工作是科学的祸害。对于我们数据科学家来说，为什么应该有所不同呢？
- en: 1.1 But Speed is Important!
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1 但速度很重要！
- en: The common counterargument is that the nature of data science is *fast-paced* and *iterative*.
    Generally speaking, experimentation is cheap and quick; besides, who in the world
    prefers writing documentation over coding and building models?
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的反驳论点是数据科学的性质是**快节奏**和**迭代的**。一般来说，实验成本低且快速；此外，世界上有谁喜欢写文档而不是编码和构建模型呢？
- en: As much as I sympathize with this thought and I love quick results, I fear that
    this mindset is short-sighted. Remember that the final goal of any data science
    project is to either deliver accurate, data-supported, and reproducible insights
    or to build reliable and reproducible models. If fast work compromises the end
    goal, then it is not worth anything.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我对此观点表示同情，我也喜欢快速的结果，但我担心这种心态是短视的。记住，任何数据科学项目的最终目标要么是提供准确、数据支持的、可重复的见解，要么是构建可靠和可重复的模型。如果快速的工作妥协了最终目标，那么它就毫无价值。
- en: My solution to this dilemma is to make the *mundane* parts of organization as
    simple, quick, and painless as possible. We shouldn’t seek total deletion of the
    organization process, but rather fix its faults to make it as efficient and productive
    as possible.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我解决这个困境的方法是将组织中的**平凡**部分尽可能地简化、快速和痛苦最小化。我们不应该寻求完全删除组织过程，而应该修复其缺陷，使其尽可能高效和富有成效。
- en: 1.2 Costs of Lack of Organization
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2 缺乏组织的成本
- en: Imagine with me this scenario. For each of your experiments, you have a single
    notebook on Kaggle that does everything from loading and preprocessing the data
    to training the model, evaluating it, and finally submitting it. By now, you have
    run dozens of experiments. You discover a small bug in the data loading function
    that you used in all your experiments. Fixing it will be a nightmare because you
    will have to go through each of your notebooks, fix the bug, ensure no new bugs
    were introduced, and then re-run all your experiments to get the updated results.
    All of this would have been avoided if you had a clear code structure and your
    code were reusable and modular.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下这个场景。对于你的每一个实验，你都有一个Kaggle上的单独笔记本，它从加载数据和预处理到训练模型、评估它，最后提交它，样样都做。到目前为止，你已经运行了数十个实验。你发现了一个小错误，这个错误在你所有的实验中使用的数据加载函数中。修复它将是一场噩梦，因为你将不得不逐个检查你的笔记本，修复错误，确保没有引入新的错误，然后重新运行所有实验以获取更新的结果。所有这些本可以通过清晰的代码结构和可重用、模块化的代码来避免。
- en: Drivendata ([2022](#drivendata)) mentions a great example of the costs of an
    unorganized data science project. It mentions the story of a failed data science
    project that took months to complete and cost millions of dollars. The failure
    came down to an incorrect conclusion discovered early in the project. A code bug
    in the data cleaning polluted the data and led to wrong insights. If the team
    had better tracked the data sources and transformations, they would have caught
    the bug earlier, and money would have been saved.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Drivendata ([2022](#drivendata)) 提到了一个无组织数据科学项目成本的绝佳例子。它提到了一个失败的数据科学项目，该项目耗时数月才完成，耗资数百万美元。失败归结于项目早期发现的一个错误结论。数据清洗中的代码错误污染了数据，导致了错误的见解。如果团队更好地跟踪数据来源和转换，他们就会更早地捕捉到这个错误，从而节省资金。
- en: If there is one lesson to take away from this section, it is that **organization
    is not a nice-to-have, but rather an essential part of any data science project**.
    Without a clear code structure and process organization, we are bound to make
    mistakes, waste time, and produce irreproducible work.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果从这个章节中可以学到一点，那就是**组织不仅仅是锦上添花，而是数据科学项目的必要组成部分**。没有清晰的代码结构和流程组织，我们注定会犯错误、浪费时间，并产生不可复制的成果。
- en: 1.3 What to track and organize?
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.3 要跟踪和组织什么？
- en: 'There are three main aspects that I consider worth the effort to track:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为有三个主要方面值得跟踪：
- en: Codebase
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代码库
- en: Experiments Results and Configurations
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实验结果和配置
- en: Research and Learning
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究和学习
- en: 2 The Codebase
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2 代码库
- en: After all, code is the backbone of any data science project. So, there is a
    lesson or two to learn from software engineers here.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，代码是任何数据科学项目的骨架。因此，我们可以从软件工程师那里学到一些东西。
- en: 2.1 Repo Structure
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 仓库结构
- en: As long as you give much thought to the structure of your codebase, you are
    doing great.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 只要你认真思考你的代码库结构，你就在做得很棒。
- en: There is no one universally agreed upon structure (nor will ever be). So, this
    section is highly subjective and opinionated. I will discuss the general structure
    I like and use.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一个普遍认同的结构（也永远不会）。因此，本节非常主观和有偏见。我将讨论我喜欢并使用的通用结构。
- en: I like to initialize my work with the widely popular [Cookiecutter Data Science](https://cookiecutter-data-science.drivendata.org/) (ccds)
    template. When you initialize a project with ccds, it creates a folder with the
    following structure. ^([1](#foot-1))
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢使用广泛流行的 [Cookiecutter Data Science](https://cookiecutter-data-science.drivendata.org/)
    (ccds) 模板来初始化我的工作。当你使用 ccds 初始化一个项目时，它会创建一个具有以下结构的文件夹。^([1](#foot-1))
- en: '[PRE0]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 2.1.1 Environment Management
  id: totrans-35
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.1.1 环境管理
- en: When you use ccds, you are prompted to select an environment manager. I personally
    prefer [uv](https://docs.astral.sh/uv/#learn-more) by [Astral](https://astral.sh/).
    It records all the used packages in the `pyproject.toml` file and allows us to
    recreate the same environment by simply using `uv sync`.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用 ccds 时，你会被提示选择一个环境管理器。我个人更喜欢 [uv](https://docs.astral.sh/uv/#learn-more)
    由 [Astral](https://astral.sh/) 提供。它记录了 `pyproject.toml` 文件中使用的所有包，并允许我们通过简单地使用
    `uv sync` 来重新创建相同的环境。
- en: Under the hood, `uv` uses venv. I find using `uv` much simpler than directly
    managing virtual environments because managing and reading `pyproject.toml` is
    much simpler than `requirements.txt`.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层，`uv` 使用 venv。我发现使用 `uv` 比直接管理虚拟环境要简单得多，因为管理和读取 `pyproject.toml` 比读取 `requirements.txt`
    要简单得多。
- en: Moreover, I find `uv` much simpler than `conda`. `uv` is built specifically
    for python while `conda` is much more generic.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我发现 `uv` 比使用 `conda` 更简单。`uv` 是专门为 Python 构建的，而 `conda` 则更加通用。
- en: 2.1.2 The Generated Module
  id: totrans-39
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.1.2 生成的模块
- en: A great part of this template is the `{ cookiecutter.module_name }` directory.
    In this directory, you defined a Python package that shall contain all the important
    parts of your code (e.g. preprocessing functions, models definition, inference
    function, etc.).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 该模板的大部分内容是 `{ cookiecutter.module_name }` 目录。在这个目录中，你定义了一个 Python 包，该包应包含你代码的所有重要部分（例如，预处理函数、模型定义、推理函数等）。
- en: I find the usage of the package quite helpful, and in [Section 2.3](#code-types),
    I will discuss what to place here and what to place in Jupyter Notebooks.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现这个包的使用非常有帮助，在[第 2.3 节](#code-types)中，我将讨论这里应该放置什么内容，以及在 Jupyter 笔记本中应该放置什么内容。
- en: 2.1.3 Staying Flexible
  id: totrans-42
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.1.3 保持灵活性
- en: Don’t regard this structure as perfect or complete. You don’t have to use everything `ccds` provides,
    and you may (and should) alter it if the project requires it. `ccds` provides
    you with a great starting point for you to tune to your exact project needs and
    demands.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 不要认为这种结构是完美或完整的。你不必使用 `ccds` 提供的所有内容，如果项目需要，你可以（并且应该）对其进行修改。`ccds` 为你提供了一个很好的起点，以便根据你确切的项目需求和需求进行调整。
- en: 2.2 Version Control
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2 版本控制
- en: Git has become an absolute necessity for any project involving code. It allows
    us to track changes, revert to earlier versions, and, with GitHub, collaborate
    with team members.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Git 已经成为任何涉及代码的项目绝对必要的工具。它允许我们跟踪更改、回滚到早期版本，并且通过 GitHub 与团队成员协作。
- en: When you use Git, you basically access a time machine that can remedy any faults
    you introduce to your code. Today, the use of Git is non-negotiable.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用 Git 时，你基本上是在访问一台可以修复你代码中引入的任何错误的时光机。如今，Git 的使用是不可或缺的。
- en: 2.3 The Three Code Types
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3 三种代码类型
- en: Choosing when to use Python scripts and when to use Jupyter Notebooks is a long-debated
    topic in the data science community. Here I present my stance on the topic.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学社区中，何时使用Python脚本和何时使用Jupyter笔记本是一个长期争论的话题。在这里，我提出我对这个问题的立场。
- en: 'I like to separate all of my code into one of three directories:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢将所有代码分别存放在三个目录之一中：
- en: The Module
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模块
- en: Scripts
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 脚本
- en: Notebooks
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 笔记本
- en: 2.3.1 The Module
  id: totrans-53
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.3.1 模块
- en: The module should contain all the important functions and classes you create.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 该模块应包含你创建的所有重要函数和类。
- en: Its usage helps us minimize redundancy and create a single source of truth for
    all the important operations happening on the data.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 它的使用帮助我们最小化冗余，并为所有在数据上发生的重要操作创建单一的真实来源。
- en: In data science projects, some operations will be repeated in all your training
    and inference workflows, such as reading the data from files, transforming data,
    and model definitions. Repeating all these functions in all your notebooks or
    scripts is difficult and extremely boring. Using a module allows us to write the
    code once and then import it everywhere.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学项目中，一些操作将在所有的训练和推理工作流程中重复，例如从文件中读取数据、转换数据和模型定义。在所有的笔记本或脚本中重复所有这些函数是困难的，并且非常无聊。使用模块允许我们一次性编写代码，然后将其导入到任何地方。
- en: Moreover, this helps reduce errors and mistakes. When a bug in the module is
    discovered, you fix it once in the module, and it’s automatically fixed in all
    scripts and notebooks importing it.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这有助于减少错误和错误。当模块中发现错误时，你只需在模块中修复一次，它就会自动在所有导入它的脚本和笔记本中修复。
- en: 2.3.2 Scripts
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.3.2 脚本
- en: The scripts directory contains .py files. These files are the only source of
    generating outputs from the project. They are the interface to interacting with
    our module and code.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本目录包含.py文件。这些文件是项目生成输出的唯一来源。它们是与我们的模块和代码交互的接口。
- en: The two main usages for these files are training and inference. All the used
    models should be created by running one of the scripts, and all submissions on
    Kaggle should be made by such files.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这些文件的两个主要用途是训练和推理。所有使用的模型都应该通过运行其中一个脚本创建，所有在Kaggle上的提交都应该使用这样的文件。
- en: The usage of these scripts helps make our results reproducible. To reproduce
    an older result (train the same model, for example), one only has to clone the
    same version of the repo and run the script used to make the old results ^([2](#foot-2)).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这些脚本的使用有助于使我们的结果可重现。为了重现一个旧的结果（例如，训练相同的模型），只需要克隆相同版本的repo并运行用于生成旧结果的脚本^([2](#foot-2))。
- en: Since the scripts are run from the CLI, using a library to manage CLI arguments
    simplifies the code. I like using [typer](https://typer.tiangolo.com/) for simple
    scripts that don’t have many config options and using [hydra](https://hydra.cc/docs/intro/) for
    complex ones (I will discuss hydra in more depth later).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 由于脚本是从命令行界面（CLI）运行的，使用库来管理CLI参数可以简化代码。我喜欢为没有太多配置选项的简单脚本使用[typer](https://typer.tiangolo.com/)，而对于复杂的脚本则使用[hydra](https://hydra.cc/docs/intro/)（我将在稍后更深入地讨论hydra）。
- en: 2.3.3 Notebooks
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.3.3 笔记本
- en: Jupyter Notebooks are wonderful for exploration and prototyping because of the
    short feedback loop they provide.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter笔记本因其提供的快速反馈循环而非常适合探索和原型设计。
- en: On many occasions, I start writing code in a notebook to quickly test it and
    figure out all mistakes. Only then would I transfer it to the module.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，我会从笔记本中开始编写代码，以快速测试并找出所有错误。然后，我才会将其转移到模块中。
- en: However, notebooks shouldn’t be used to create final results. They are hard
    to reproduce and track changes in. Therefore, always use the scripts to create
    final outputs.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，笔记本不应该用来创建最终结果。它们难以重现和跟踪更改。因此，始终使用脚本创建最终输出。
- en: 3 Running the Codebase on Kaggle
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3 在Kaggle上运行代码库
- en: 'Using the structure discussed in the previous section, we need to follow these
    steps to run our code on Kaggle:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 使用前一小节中讨论的结构，我们需要遵循以下步骤在Kaggle上运行我们的代码：
- en: Clone The Repo
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 克隆仓库
- en: Install Required Packages
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装所需包
- en: Run one of the Scripts
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行其中一个脚本
- en: Because Kaggle provides us with a Jupyter Notebook interface to run our code
    and most Kaggle competitions have restrictions on internet access, submissions
    aren’t as straightforward as running a script on our local machine. In what follows,
    I will discuss how to perform each of the above steps on Kaggle.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Kaggle为我们提供了一个Jupyter Notebook界面来运行我们的代码，并且大多数Kaggle比赛都对互联网访问有限制，因此提交并不像在本地机器上运行脚本那样简单。以下，我将讨论如何在Kaggle上执行上述每个步骤。
- en: 3.1 Cloning The Repo
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 克隆仓库
- en: First of all, we can’t directly clone our repo from GitHub in the submission
    notebook because of the internet restrictions. However, Kaggle allows us to import
    outputs of other Kaggle notebooks into our current notebook. Therefore, the solution
    is to create a separate Kaggle notebook that clones our repo and installs the
    required packages. This notebook’s output is then imported into the submission
    notebook.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，由于网络限制，我们无法在提交笔记本中直接从GitHub克隆我们的仓库。然而，Kaggle允许我们将其他Kaggle笔记本的输出导入到当前笔记本中。因此，解决方案是创建一个单独的Kaggle笔记本，用于克隆我们的仓库并安装所需的软件包。然后，将这个笔记本的输出导入到提交笔记本中。
- en: Most likely, you will be using a private repo. The simplest way to clone a private
    repo on Kaggle is to use a personal access token (PAT). You can create a PAT on
    GitHub by following [this guide](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens).
    A great practice is to create a PAT specifically for Kaggle with the minimal required
    permissions.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 很可能您将使用私有仓库。在Kaggle上克隆私有仓库最简单的方法是使用个人访问令牌（PAT）。您可以通过遵循[这个指南](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens)在GitHub上创建PAT。一个很好的做法是为Kaggle创建一个具有最小所需权限的PAT。
- en: 'In the cloning notebook, you can use the following code to clone your repo:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在克隆笔记本中，您可以使用以下代码来克隆您的仓库：
- en: '[PRE1]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This code downloads your repo into the working directory of the current notebook.
    It assumes that you have stored your PAT in a Kaggle secret named `GITHUB_TOKEN`.
    Make sure that you activate the secret in the notebook settings before running
    it.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码将您的仓库下载到当前笔记本的工作目录中。它假设您已经将PAT存储在名为`GITHUB_TOKEN`的Kaggle秘密中。在运行它之前，请确保在笔记本设置中激活此秘密。
- en: 3.2 Installing Required Packages
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 安装所需软件包
- en: In the cloning notebook, you can also install the required packages. If you
    are using `uv`, you can build your custom module, install it, and install its
    dependencies by running the following commands: ^([3](#foot-3)).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在克隆笔记本中，您也可以安装所需的软件包。如果您使用的是`uv`，您可以通过运行以下命令来构建自定义模块、安装它以及安装其依赖项：^([3](#foot-3))。
- en: '[PRE2]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This creates a wheel file in the `dist/` directory for your module. You can
    then install it and all its dependencies in a custom directory by running: ^([4](#foot-4)).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这将在您的模块的`dist/`目录中创建一个wheel文件。然后您可以通过运行以下命令在自定义目录中安装它及其所有依赖项：^([4](#foot-4))。
- en: '[PRE3]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Make sure to replace `/path/to/wheel/file` and `/path/to/custom/dir` with the
    actual paths. `/path/to/wheel/file` will be the path to the .whl file inside the `REPO_NAME/dist/` directory.
    The `/path/to/custom/dir` can be any directory you like. Remember the custom directory
    path because subsequent notebooks will rely on it to import your module and your
    project dependencies.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保将`/path/to/wheel/file`和`/path/to/custom/dir`替换为实际路径。`/path/to/wheel/file`将是`REPO_NAME/dist/`目录中`.whl`文件的路径。`/path/to/custom/dir`可以是您喜欢的任何目录。请记住自定义目录路径，因为后续笔记本将依赖于它来导入您的模块和项目依赖项。
- en: I like to both download the repo and install the packages in a single notebook.
    I name this notebook the same name as the repo to simplify importing it later.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢在单个笔记本中同时下载仓库和安装软件包。我将这个笔记本命名为与仓库相同的名称，以简化后续的导入。
- en: 3.3 Running One of the Scripts
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3 运行脚本之一
- en: The first thing to do in any subsequent notebook is to import the notebook containing
    the cloned repo and installed packages. When you do this, Kaggle stores the contents
    of `/kaggle/working/` from the imported notebook into a directory named `/kaggle/input/REPO_NAME/`,
    where `REPO_NAME` is the name of the repo ^([5](#foot-5)).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何后续笔记本中要做的第一件事是导入包含克隆仓库和已安装软件包的笔记本。当您这样做时，Kaggle会将导入笔记本中`/kaggle/working/`目录的内容存储到名为`/kaggle/input/REPO_NAME/`的目录中，其中`REPO_NAME`是仓库的名称^([5](#foot-5))。
- en: Many times, your scripts will create outputs (e.g., submission files) relative
    to their locations. By default, your code will live on /kaggle/input/REPO_NAME/,
    which is read-only. Therefore, you need to copy the contents of the repo to `/kaggle/working/`,
    which is the current working directory and is read-write. While this may be unnecessary,
    it is a good practice that causes no harm and prevents silly issues.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 许多时候，您的脚本将创建相对于其位置的输出（例如，提交文件）。默认情况下，您的代码将位于/kaggle/input/REPO_NAME/，该目录为只读。因此，您需要将仓库的内容复制到`/kaggle/working/`，这是当前工作目录，并且是可读写的。虽然这可能是不必要的，但这是一个无害的好习惯，可以防止愚蠢的问题。
- en: '[PRE4]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'If you directly run your scripts from `/kaggle/working/scripts/`, you will
    get import errors because Python can’t find the installed packages and your module.
    This can easily be solved by updating the `PYTHONPATH` environment variable. I
    use the following command to update it and then run my scripts:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您直接从`/kaggle/working/scripts/`运行您的脚本，您将遇到导入错误，因为Python找不到已安装的包和您的模块。这可以通过更新`PYTHONPATH`环境变量来轻松解决。我使用以下命令更新它然后运行我的脚本：
- en: '[PRE5]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: I usually name any notebook running a script with the script name for simplicity.
    Moreover, when I re-run the notebook on Kaggle, I name the version with the hash
    of the current Git commit to keep track of which version of the code was used
    to generate the results. ^([6](#foot-6)).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常为了简便，将运行脚本的任何笔记本命名为脚本名称。此外，当我在Kaggle上重新运行笔记本时，我会用当前Git提交的哈希值来命名版本，以便跟踪使用了哪个版本的代码来生成结果。^([6](#foot-6))。
- en: 3.4 Gathering Everything Together
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4 收集所有内容
- en: 'At the end, two notebooks are necessary:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，需要两个笔记本：
- en: 'The Cloning Notebook: clones the repo and installs the required packages.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 克隆笔记本：克隆仓库并安装所需的包。
- en: 'The Script Notebook: runs one of the scripts.'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 脚本笔记本：运行其中一个脚本。
- en: You may need more script notebooks in the pipeline. For example, you may have
    one notebook for training and another for inference. Each of these notebooks will
    follow the same structure as the script notebook discussed above.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能需要在流程中添加更多的脚本笔记本。例如，您可能有一个用于训练的笔记本和一个用于推理的笔记本。这些笔记本中的每一个都将遵循上面讨论的脚本笔记本的结构。
- en: Separating each step in the pipeline (e.g. data preprocessing, training, inference)
    into its own notebook is useful when one step takes a long time to run and rarely
    changes. For example, in the Ariel Data Challenge, my preprocessing step took
    more than seven hours to run. If I had everything in one notebook, I would have
    to wait seven hours every time I tried a new idea. Moreover, time limits on Kaggle
    kernels would have made it impossible to run the entire pipeline in one notebook.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个步骤运行时间较长且很少变化时，将流程中的每个步骤（例如，数据预处理、训练、推理）分离到自己的笔记本中是有用的。例如，在Ariel数据挑战中，我的预处理步骤运行了超过七个小时。如果我把所有东西都放在一个笔记本中，每次尝试新想法时我都要等待七个小时。此外，Kaggle核的时限制将使得在一个笔记本中运行整个流程变得不可能。
- en: Each notebook would then import the previous notebook’s output and run its own
    step, and build from there. A good advice is to make the paths of any data files
    or models arguments to the scripts so that you can easily change them when running
    on Kaggle or any other environment.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，每个笔记本将导入前一个笔记本的输出并运行自己的步骤，并从这里开始构建。一个好的建议是将任何数据文件或模型的路径作为脚本的参数，这样您在Kaggle或其他环境中运行时可以轻松更改它们。
- en: When you update your code, re-run the cloning notebook to update the code on
    Kaggle. Then, re-run only the necessary script notebooks to generate the new results.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当您更新代码时，重新运行克隆笔记本以更新Kaggle上的代码。然后，仅重新运行必要的脚本笔记本以生成新的结果。
- en: 3.5 Is all this Effort Worth it?
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5 所有这些努力值得吗？
- en: Absolutely yes!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对是的！
- en: I know that the specified pipeline will add some overhead when starting your
    project. However, it will save you much more time and effort in the long run.
    You will be able to write all your code locally and run the same code on Kaggle.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道指定的流程在启动项目时会增加一些开销。然而，从长远来看，这将为您节省更多的时间和精力。您将能够在本地上编写所有代码，并在Kaggle上运行相同的代码。
- en: When you create a new model, all you have to do is copy one of the script notebooks
    and change the script. No conflicts will arise between your local and Kaggle code.
    You will be able to track all your changes using Git. You will be able to reproduce
    any old results by simply checking out the corresponding Git commit and re-running
    the necessary notebooks on Kaggle.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 当您创建新的模型时，您只需复制其中一个脚本笔记本并更改脚本即可。您的本地和Kaggle代码之间不会出现冲突。您将能够使用Git跟踪所有更改。您只需简单地检查出相应的Git提交并在Kaggle上重新运行必要的笔记本，就可以重现任何旧的结果。
- en: Moreover, you will be able to develop on any machine you like. Everything is
    centralized on GitHub. You can work from your local machine. If you need more
    power, you can work from a cloud VM. If you want to train on Kaggle, you can do
    that too. All your code and environment are the same everywhere.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，您将能够在任何您喜欢的机器上进行开发。所有东西都集中存储在GitHub上。您可以从本地机器工作。如果您需要更多计算能力，您可以从云虚拟机工作。如果您想在Kaggle上训练，您也可以这样做。您的所有代码和环境在所有地方都是相同的。
- en: 'This is such a small price to pay for such a great convenience. Once the pipeline
    is set up, you can forget about it and focus on what matters: researching and
    building models!'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为如此大的便利付出如此小的代价是值得的。一旦管道设置完成，你就可以将其抛诸脑后，专注于真正重要的事情：研究和构建模型！
- en: 4 Recording Learnings and Research
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4 记录学习和研究
- en: When diving into a new domain, a huge part of your time will be spent researching,
    studying, and reading papers. It is easy to get lost in all the information you
    read, and you can forget where you encountered a certain idea or concept. To that
    end, it is important to manage and organize your learning.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 当你深入研究一个新领域时，你将花费大量时间进行研究和阅读论文。很容易在阅读到的所有信息中迷失方向，你可能会忘记某个想法或概念是在哪里遇到的。因此，管理和组织你的学习非常重要。
- en: 4.1 Readings Tracking
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1 阅读跟踪
- en: Rajpurkar ([2023](#rajpurkar)) suggests having a list of all the papers and
    articles you read. This allows you to quickly overview what you have read and
    refer back to it when needed.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 拉杰普尔卡([2023](#rajpurkar)) 建议列出你阅读的所有论文和文章。这让你可以快速概述你阅读的内容，并在需要时参考它。
- en: Professor Rajpurkar also suggests annotating each paper with one, two, or three
    stars. One-star papers are irrelevant papers, but you didn’t know that before
    reading them. Two-star papers are relevant. Three-star papers are highly relevant.
    This allows you to quickly filter your readings later on.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 拉杰普尔卡教授还建议为每篇论文标注一、二或三星。一星论文是不相关的论文，但在阅读之前你可能不知道这一点。二星论文是相关的。三星论文是非常相关的。这让你可以快速过滤之后的阅读内容。
- en: You should also take notes on each paper you read. These notes should focus
    on how the paper relates to your project. They should be short to be reviewed
    easily, but have enough details to grasp the main ideas. In the papers list, you
    should link reading notes to each paper for easy access.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该在每篇你阅读的论文上做笔记。这些笔记应该关注论文如何与你项目相关。它们应该简短以便于回顾，但要有足够的细节来把握主要思想。在论文列表中，你应该为每篇论文链接阅读笔记，以便于访问。
- en: I also like keeping notes on the papers themselves, such as highlights. If you’re
    using a PDF reader or an e-Ink device, you should store the annotated version
    of the paper for future reference and link it in your notes. If you prefer reading
    on paper, you can scan the annotated version and store it digitally.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我还喜欢在论文本身上做笔记，例如高亮。如果你使用 PDF 阅读器或电子墨水设备，你应该存储论文的标注版本以供将来参考，并在你的笔记中链接它。如果你更喜欢在纸上阅读，你可以扫描标注版本并将其数字化存储。
- en: 4.2 Tools
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2 工具
- en: For most documents, I like using Google Docs because it allows me to access
    my notes from anywhere. Moreover, you can write on Google Docs in Markdown, which
    is my preferred writing format (I am using it to write this article).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数文档，我喜欢使用 Google Docs，因为它让我可以从任何地方访问我的笔记。此外，你可以在 Google Docs 中使用 Markdown
    编写，这是我最喜欢的写作格式（我正在用它来写这篇文章）。
- en: '[Zotero](https://www.zotero.org/) is a great tool for managing research papers.
    It is great at storing and organizing papers. You can create a collection for
    each project and store all the relevant papers there. Importing papers is very
    easy using the browser extension, and exporting citations in BibTeX format is
    straightforward.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '[Zotero](https://www.zotero.org/) 是一个管理研究论文的出色工具。它在存储和组织论文方面做得很好。你可以为每个项目创建一个收藏夹，并将所有相关论文存储在那里。使用浏览器扩展导入论文非常简单，并且以
    BibTeX 格式导出引用非常直接。'
- en: 5 Experiment Tracking
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5 实验跟踪
- en: In data science projects, you will often run many experiments and try many ideas.
    Once again, it is easy to get lost in all this mess.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学项目中，你经常会运行许多实验并尝试许多想法。再次强调，很容易在这片混乱中迷失方向。
- en: We have already made a great step forward by structuring our codebase properly
    and using scripts to run our experiments. Nevertheless, I want to discuss two
    software tools that allow us to do even better.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经通过正确地结构化我们的代码库并使用脚本来运行我们的实验取得了很大的进步。尽管如此，我仍想讨论两个软件工具，它们可以帮助我们做得更好。
- en: 5.1 Wandb
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.1 Wandb
- en: '[Weights and Biases (wandb)](https://wandb.ai/site/), pronounced “w-and-b”
    (for weights and biases) or “wand-b” (for being magical like a wand) or “wan-db”
    (for being a database), is a great tool for tracking experiments. It allows us
    to run multiple experiments and save all their configurations and results in a
    central place.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '[Weights and Biases (wandb)](https://wandb.ai/site/)，发音为“w-and-b”（代表权重和偏差）或“wand-b”（代表像魔杖一样神奇）或“wan-db”（代表像数据库一样），是一个跟踪实验的出色工具。它允许我们在一个中心位置运行多个实验并保存它们的配置和结果。'
- en: '![](../Images/011773b7360d77113eb7342518dcc128.png "Lessons and tips learned
    while earning a Kaggle Competition Medal")'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/011773b7360d77113eb7342518dcc128.png "在赢得 Kaggle 竞赛奖牌的过程中学到的经验和技巧")'
- en: 'Figure 1: Wandb Dashboard Image from Adrish Dey’s [Configuring W&B Projects
    with Hydra](https://wandb.ai/adrishd/hydra-example/reports/Configuring-W-B-Projects-with-Hydra--VmlldzoxNTA2MzQw) article'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1：Adrish Dey 的 [使用 Hydra 配置 W&B 项目](https://wandb.ai/adrishd/hydra-example/reports/Configuring-W-B-Projects-with-Hydra--VmlldzoxNTA2MzQw)
    文章中的 Wandb 仪表板图片
- en: Wandb provides us with a dashboard to compare the results of different experiments,
    the hyperparameters used, and the training curves. It also tracks system metrics
    such as GPU and CPU usage.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: Wandb 为我们提供了一个仪表板，用于比较不同实验的结果、使用的超参数和训练曲线。它还跟踪系统指标，如 GPU 和 CPU 使用情况。
- en: Wandb also integrates with [Hugging Face](https://huggingface.co/) libraries,
    making it easy to track experiments when using [transformers](https://huggingface.co/docs/transformers/en/index).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: Wandb 还集成了 [Hugging Face](https://huggingface.co/) 库，使得在使用 [transformers](https://huggingface.co/docs/transformers/en/index)
    时跟踪实验变得容易。
- en: Once you start using multiple experiments, wandb becomes an indispensable tool.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦开始使用多个实验，wandb 就成为了一个不可或缺的工具。
- en: 5.2 Hydra
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2 Hydra
- en: '[Hydra](https://hydra.cc/) is a tool built by Meta that simplifies configuration
    management. It allows you to define all your configuration in YAML files and easily
    override them from the CLI.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '[Hydra](https://hydra.cc/) 是 Meta 开发的一个工具，简化了配置管理。它允许你将所有配置定义在 YAML 文件中，并可以从
    CLI 轻松覆盖它们。'
- en: It is a very flexible tool and fits multiple use cases. [This guide](https://hydra.cc/docs/patterns/configuring_experiments/) discusses
    how to use Hydra for experiment configuration.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常灵活的工具，适用于多种用例。[本指南](https://hydra.cc/docs/patterns/configuring_experiments/)
    讨论了如何使用 Hydra 进行实验配置。
- en: 6 The End-to-End Process
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6 端到端流程
- en: '![](../Images/3bc0200fc81669ed052cd811b6d73f3c.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3bc0200fc81669ed052cd811b6d73f3c.png)'
- en: 'Figure 2: End-to-End Organized Kaggle Competition Process created by the Author
    using Mermaid.js'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2：作者使用 Mermaid.js 创建的端到端组织 Kaggle 竞赛流程
- en: '[Figure 2](#fig-2) summarizes the process discussed in this article. First,
    we research ideas and record our learnings. Then, we experiment with these ideas
    on our local machines in Jupyter Notebooks. Once we have a working idea, we refactor
    the code into our module and create scripts to run the experiments. We run the
    new experiment(s) on Kaggle. Finally, we track the results of the new experiments.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '[图 2](#fig-2) 总结了本文中讨论的流程。首先，我们研究想法并记录我们的学习成果。然后，我们在本地机器上的 Jupyter Notebooks
    中对这些想法进行实验。一旦我们有一个可行的想法，我们就将代码重构到我们的模块中，并创建脚本来运行实验。我们在 Kaggle 上运行新的实验。最后，我们跟踪新实验的结果。'
- en: Because everything is carefully tracked, we are able to predict our shortcomings
    and quickly head back to the research or development phases to fix them.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 由于一切都被仔细跟踪，我们能够预测我们的不足，并迅速回到研究或开发阶段进行修复。
- en: 7 Conclusion
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7 结论
- en: Disorder is the source of all evil in data science projects. If we are to produce
    reliable and reproducible work, we must strive for organization and clarity in
    our processes. Kaggle competitions are no exception.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 无序是数据科学项目中所有邪恶的根源。如果我们想要产生可靠且可重复的工作，我们必须在我们的流程中追求组织和清晰。Kaggle 竞赛也不例外。
- en: In this article, we discussed a technique to organize our codebase, tips to
    track research and learnings, and tools to track experiments. [Figure 2](#fig-2) summarizes
    the proposed technique.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们讨论了一种组织代码库的技术、跟踪研究和学习的小贴士以及跟踪实验的工具。[图 2](#fig-2) 总结了所提出的技术。
- en: I hope this article was helpful to you. If you have any other tips or suggestions,
    please share them in the comments section below.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这篇文章对你有所帮助。如果你有任何其他建议或意见，请在下面的评论部分分享。
- en: Best of luck in your next competition!
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 祝你在下一场比赛中好运！
- en: 7.1 References
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.1 参考文献
- en: Drivendata. (2022). *The 10 Rules of Reliable Data Science*.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: Drivendata. (2022). *The 10 Rules of Reliable Data Science*.
- en: Rajpurkar, P. (2023). *Harvard CS197: AI Research Experiences*. [https://www.cs197.seas.harvard.edu](https://www.cs197.seas.harvard.edu/)
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 'Rajpurkar, P. (2023). *Harvard CS197: AI Research Experiences*。[https://www.cs197.seas.harvard.edu](https://www.cs197.seas.harvard.edu/)'
- en: ''
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Footnotes
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 脚注
- en: The folder structure was copied from [ccds website](https://cookiecutter-data-science.drivendata.org/) on
    the time of article publishing.
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文章发布时，文件夹结构是从 [ccds 网站](https://cookiecutter-data-science.drivendata.org/) 复制的。
- en: It is assumed that a seed is used in all random number generators.
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设所有随机数生成器都使用了种子。
- en: When running any bash command in a code cell in a Jupyter Notebook, you need
    to prefix the command with `!`.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当在 Jupyter Notebook 中的代码单元运行任何 bash 命令时，你需要在命令前加上 `!` 前缀。
- en: When running any bash command in a code cell in Kaggle, it is assumed that the
    current working directory is `/kaggle/working/`. Any previous `cd` commands are
    ignored. You have to specify the path from `/kaggle/working/` in all your commands
    or start your commands with `cd PATH &&` to change the directory before running
    the rest of the command.
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当在 Kaggle 中的代码单元运行任何 bash 命令时，假设当前工作目录是 `/kaggle/working/`。任何之前的 `cd` 命令都将被忽略。你必须在所有命令中指定从
    `/kaggle/working/` 的路径，或者在你的命令前加上 `cd PATH &&` 以在运行剩余命令之前更改目录。
- en: If you forget the path, you can copy it from the notebook tab in the right sidebar
    of the notebook.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你忘记了路径，你可以从笔记本右侧边栏的笔记本标签中复制它。
- en: Note that you will have to re-run the cloning notebook to update the code on
    Kaggle before re-running the script notebook. Don’t forget to “Check for Updates”
    in the cloning notebook before re-running the script notebook.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注意，在重新运行脚本笔记本之前，你必须重新运行克隆笔记本以更新 Kaggle 上的代码。不要忘记在重新运行脚本笔记本之前，在克隆笔记本中“检查更新”。
