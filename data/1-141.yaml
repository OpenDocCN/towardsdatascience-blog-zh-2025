- en: 'RF-DETR Under the Hood: The Insights of a Real-Time Transformer Detection'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RF-DETR内部揭秘：实时Transformer检测的见解
- en: 原文：[https://towardsdatascience.com/rf-detr-under-the-hood-the-insights-of-a-real-time-transformer-detection/](https://towardsdatascience.com/rf-detr-under-the-hood-the-insights-of-a-real-time-transformer-detection/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/rf-detr-under-the-hood-the-insights-of-a-real-time-transformer-detection/](https://towardsdatascience.com/rf-detr-under-the-hood-the-insights-of-a-real-time-transformer-detection/)
- en: <mdspan datatext="el1761849071324" class="mdspan-comment">If you follow</mdspan>
    the world of computer vision, you’ve likely heard about RF-DETR, the new real-time
    object detection model from Roboflow. It has become the new SOTA for its impressive
    performance. But to truly appreciate what makes it tick, we need to look beyond
    the benchmarks and dive into its architectural DNA.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761849071324" class="mdspan-comment">如果你关注计算机视觉领域，你很可能已经听说过RF-DETR，这是来自Roboflow的新实时目标检测模型。它因其令人印象深刻的性能而成为新的SOTA。但要真正欣赏它的运作原理，我们需要超越基准，深入其架构DNA。
- en: RF-DETR isn’t a completely new invention; its story is a fascinating journey
    of solving one problem at a time, starting with a fundamental limitation in the
    original DETR and ending with a lightweight, real-time Transformer. Let’s trace
    this evolution.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: RF-DETR不是一个全新的发明；它的故事是一个解决一个问题的迷人旅程，从原始DETR中的基本局限性开始，以一个轻量级的实时Transformer结束。让我们追踪这一演变。
- en: A Paradigm Shift in Detection Pipelines
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检测管道的范式转变
- en: 'In 2020 came DETR (DEtection TRansformer) [1], a model that completely changed
    the object detection pipeline. It was the first fully end-to-end detector, eliminating
    the need for hand-designed components like anchor generation and non-maximum suppression
    (NMS). It achieved this by combining a CNN backbone with a Transformer encoder-decoder
    architecture. Despite its revolutionary design, the original DETR had significant
    problems:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年出现了DETR（DEtection TRansformer）[1]，这是一个完全改变了目标检测管道的模型。它是第一个完全端到端的检测器，消除了锚点生成和非最大抑制（NMS）等手工设计的组件的需求。它是通过结合CNN骨干网络和Transformer编码器-解码器架构实现的。尽管其设计具有革命性，但原始的DETR存在重大问题：
- en: '**Extremely Slow Convergence:** DETR required a massive number of training
    epochs to converge, which was 10-20 times slower than models like Faster R-CNN.'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收敛速度极慢**：DETR需要大量的训练轮次才能收敛，这比Faster R-CNN等模型慢10-20倍。'
- en: '**High Computational Complexity:** The attention mechanism in the Transformer
    encoder has a complexity of O(H²W²C) with respect to the spatial dimensions (H,
    W) of the feature map. This quadratic complexity made it prohibitively expensive
    to process high-resolution feature maps.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**高计算复杂度**：Transformer编码器中的注意力机制在特征图的空间维度（H, W）上具有O(H²W²C)的复杂度。这种二次复杂度使得处理高分辨率特征图变得成本过高。'
- en: '**Poor Performance on Small Objects**: As a direct consequence of its high
    complexity, DETR couldn’t use high-resolution feature maps, which are critical
    for detecting small objects.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对小物体检测性能差**：由于其高复杂度，DETR无法使用高分辨率特征图，而这些特征图对于检测小物体至关重要。'
- en: These issues were all rooted in the way Transformer attention processed image
    features by looking at every single pixel, which was both inefficient and difficult
    to train.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题都源于Transformer处理图像特征的方式，即查看每个单独的像素，这既低效又难以训练。
- en: 'The Breakthrough: Deformable DETR'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 突破：可变形DETR
- en: 'To solve DETR’s issues, researchers looked back and found inspiration in **Deformable
    Convolutional Networks** [2]**.** For years, CNNs have dominated computer vision.
    However, they have an inherent limitation: they struggle to model geometric transformations.
    This is because their core building blocks, like convolution and pooling layers,
    have fixed geometric structures.This is where Deformable CNNs came into the scene.
    The key idea was brilliantly simple: what if the sampling grid in CNNs wasn’t
    fixed?'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决DETR的问题，研究人员回顾过去，并在**可变形卷积网络**[2]**]中找到了灵感。多年来，CNN在计算机视觉领域占据主导地位。然而，它们有一个固有的局限性：它们难以建模几何变换。这是因为它们的核心理念，如卷积和池化层，具有固定的几何结构。这就是可变形CNN出现的地方。关键思想非常简单：如果CNN中的采样网格不是固定的会怎样？
- en: The new module, **deformable convolution**, augments the standard grid sampling
    locations with 2D offsets.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新模块**可变形卷积**通过2D偏移增加了标准网格采样位置。
- en: Crucially, these offsets are not fixed; they are ***learned*** from the preceding
    feature maps via additional convolutional layers.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键的是，这些偏移量不是固定的；它们是通过额外的卷积层从先前的特征图中**学习**得到的。
- en: This allows the sampling grid to **dynamically** deform and adapt to the object’s
    shape and scale in a local, dense manner.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这使得采样网格能够**动态地**变形并局部、密集地适应物体的形状和尺度。
- en: '![](../Images/1e8345825a549f9808b78b4073bf9926.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1e8345825a549f9808b78b4073bf9926.png)'
- en: Image by author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: This idea of adaptive sampling from Deformable Convolutions was applied to the
    Transformer’s attention mechanism. The result was **Deformable DETR** [3].
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这种从可变形卷积中自适应采样的想法被应用于Transformer的注意力机制。结果是**可变形DETR** [3]。
- en: 'The core innovation is the **Deformable Attention Module**. Instead of computing
    attention weights over all pixels in a feature map, this module does something
    much smarter:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 核心创新是**可变形注意力模块**。这个模块不是在特征图的所有像素上计算注意力权重，而是做了一些更智能的事情：
- en: It attends to only a small, fixed number of key sampling points around a reference
    point.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它只关注参考点周围的一小部分固定采样点。
- en: Just like in deformable convolution, the 2D offsets for these sampling points
    are learned from the query element itself via a linear projection.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 就像在可变形卷积中一样，这些采样点的2D偏移量是通过查询元素本身的线性投影来学习的。
- en: Bypasses the need for a separate FPN architecture because its attention mechanism
    has the built-in capability to process and fuse multi-scale features directly.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于其注意力机制具有内置处理和融合多尺度特征的能力，因此无需单独的FPN架构。
- en: '![](../Images/d46683c8f221b4c660a5f3b9c9b14c64.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d46683c8f221b4c660a5f3b9c9b14c64.png)'
- en: Illustration of the deformable attention module extracted from [3]
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 从[3]中提取的可变形注意力模块的示意图
- en: The breakthrough of Deformable Attention is that it “only attends to a small
    set of key sampling points” [3] around a reference point, regardless of the spatial
    size of the feature maps. The paper’s analysis shows that when this new module
    is applied in the encoder (where the number of queries, N[q], is equal to the
    spatial size, HW), the complexity becomes O(HWC²), which is linear with the spatial
    size. This singular change makes it computationally feasible to process high-resolution
    feature maps, dramatically improving performance on small objects.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 可变形注意力的突破在于它“只关注参考点周围的一小部分关键采样点” [3]，无论特征图的空间大小如何。论文的分析表明，当这个新模块应用于编码器（其中查询数N[q]等于空间大小HW）时，其复杂度变为O(HWC²)，这与空间大小成线性关系。这种独特的变化使得处理高分辨率特征图在计算上变得可行，显著提高了对小型物体的性能。
- en: 'Making it Real-Time: LW-DETR'
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现实时性：LW-DETR
- en: 'Deformable DETR fixed the convergence and accuracy problems, but to compete
    with models like YOLO, it needed to be faster. This is where **LW-DETR** (Light-Weight
    DETR) [4] comes in. Its goal was to create a Transformer-based architecture that
    could outperform YOLO models in real-time object detection. The architecture is
    a simple stack: a Vision Transformer (ViT) encoder, a projector, and a shallow
    DETR decoder. They got rid of the encoder-decoder architecture part from the DETR
    framework and kept only the decoder part, as it can be seen in [this line of code](https://github.com/roboflow/rf-detr/blob/f108f8587ac339368a233cb59e7faff800a7c3ed/rfdetr/models/transformer.py#L141).'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 可变形DETR解决了收敛和精度问题，但为了与YOLO等模型竞争，它需要更快。这就是**LW-DETR**（轻量级DETR）[4]出现的地方。其目标是创建一个基于Transformer的架构，能够在实时目标检测中优于YOLO模型。该架构是一个简单的堆叠：一个视觉Transformer（ViT）编码器、一个投影仪和一个浅层DETR解码器。他们从DETR框架中移除了编码器-解码器架构部分，只保留了解码器部分，如[此行代码](https://github.com/roboflow/rf-detr/blob/f108f8587ac339368a233cb59e7faff800a7c3ed/rfdetr/models/transformer.py#L141)所示。
- en: '![](../Images/d5f0b564fa0ab00193550afb7596970c.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5f0b564fa0ab00193550afb7596970c.png)'
- en: Image by author
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'To achieve its speed, it incorporated several key efficiency techniques:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了达到其速度，它采用了几个关键的效率技术：
- en: '**Deformable Cross-Attention:** The decoder directly uses the efficient deformable
    attention mechanism from Deformable DETR, which is crucial for its performance.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可变形交叉注意力**：解码器直接使用Deformable DETR中的高效可变形注意力机制，这对于其性能至关重要。'
- en: '**Interleaved Window and Global Attention:** The ViT encoder is expensive.
    To reduce its complexity, LW-DETR replaces some of the costly global self-attention
    layers with much cheaper window self-attention layers.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交错窗口和全局注意力**：ViT编码器成本高昂。为了降低其复杂性，LW-DETR用许多更便宜的窗口自注意力层替换了一些昂贵的全局自注意力层。'
- en: '**Shallower Decoder:** Standard DETR variants often use 6 decoder layers. LW-DETR
    uses only 3, which significantly reduces latency.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**较浅的解码器**：标准的DETR变体通常使用6个解码器层。LW-DETR只使用3个，这显著降低了延迟。'
- en: The projector in LW-DETR acts as a crucial bridge, connecting the Vision Transformer
    (ViT) encoder to the DETR decoder. It is built using a **C2f block**, which is
    an efficient convolutional block used in the YOLOv8 model. This block processes
    the features and prepares them for the decoder’s cross-attention mechanism. By
    combining the power of deformable attention with these lightweight design choices,
    LW-DETR proved that a DETR-style model could be a top-performing real-time detector.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在LW-DETR中，投影器充当一个至关重要的桥梁，将视觉Transformer（ViT）编码器连接到DETR解码器。它使用**C2f块**构建，这是一个在YOLOv8模型中使用的有效卷积块。该块处理特征并为解码器的交叉注意力机制做准备。通过结合可变形注意力和这些轻量级设计选择的力量，LW-DETR证明了DETR风格的模型可以成为性能优异的实时检测器。
- en: Assembling the Pieces for RF-DETR
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 组装RF-DETR的各个部分
- en: And that brings us back to RF-DETR [5]. It is not an isolated breakthrough but
    the logical next step in this evolutionary chain. Specifically, they created RF-DETR
    by combining LW-DETR with a pre-trained DINOv2 backbone as seen in [this line
    of code](https://github.com/roboflow/rf-detr/blob/f108f8587ac339368a233cb59e7faff800a7c3ed/rfdetr/models/backbone/backbone.py#L76).
    This gives the model exceptional ability to adapt to novel domains based on the
    knowledge stored in the pre-trained DINOv2 backbone. The reason for this exceptional
    adaptability is that DINOv2 is a self-supervised model. Unlike traditional backbones
    trained on ImageNet with fixed labels, DINOv2 was trained on a massive, uncurated
    dataset without any human labels. It learned by solving a “jigsaw puzzle” of sorts,
    forcing it to develop an incredibly rich and general-purpose understanding of
    texture, shape, and object parts. When RF-DETR uses this backbone, it isn’t just
    getting a feature extractor; it’s getting a deep visual knowledge base that can
    be fine-tuned for specialized tasks with remarkable efficiency.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这又把我们带回了RF-DETR [5]。它不是一个孤立的突破，而是这一进化链中的逻辑下一步。具体来说，他们通过将LW-DETR与预训练的DINOv2骨干相结合来创建RF-DETR，正如[此行代码](https://github.com/roboflow/rf-detr/blob/f108f8587ac339368a233cb59e7faff800a7c3ed/rfdetr/models/backbone/backbone.py#L76)所示。这使得模型具有非凡的能力，可以根据预训练DINOv2骨干中存储的知识适应新的领域。这种非凡适应性的原因是DINOv2是一个自监督模型。与在ImageNet上使用固定标签训练的传统骨干不同，DINOv2是在一个庞大、未经编辑的数据集上训练的，没有任何人工标签。它通过解决某种“拼图”问题来学习，迫使它发展出极其丰富和通用的纹理、形状和物体部分的理解。当RF-DETR使用这个骨干时，它不仅仅得到一个特征提取器；它得到一个可以以显著效率微调用于特定任务的深度视觉知识库。
- en: '![](../Images/92da6a5a14ce9082118fc279dfcb1d76.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/92da6a5a14ce9082118fc279dfcb1d76.png)'
- en: Image by author
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: A key distinction with respect to previous models is that Deformable DETR uses
    a multi-scale self-attention mechanism, whereas RF-DETR model extracts image feature
    maps from a single-scale backbone. Recently, the team behind the RF-DETR model,
    incorporated a segmentation head to provide masks in addition to bounding boxes,
    making it an ideal choice for segmentation tasks too. Please, check out its [documentation](https://rfdetr.roboflow.com/1.3.0/)
    to start using it, fine-tune it or even export it in ONNX format.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 与先前模型相比，一个关键的区别是Deformable DETR使用多尺度自注意力机制，而RF-DETR模型从单尺度骨干中提取图像特征图。最近，RF-DETR模型背后的团队增加了一个分割头，除了边界框外还提供掩码，使其也成为分割任务的理想选择。请查看其[文档](https://rfdetr.roboflow.com/1.3.0/)以开始使用它，微调它，甚至以ONNX格式导出它。
- en: Conclusion
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'The original DETR revolutionized the detection pipeline by removing hand-designed
    components like NMS, but it was impractical due to slow convergence and quadratic
    complexity. Deformable DETR provided the key architectural breakthrough, swapping
    global attention for an efficient, adaptive sampling mechanism inspired by deformable
    convolutions. LW-DETR then proved this efficient architecture could be packaged
    for real-time performance, challenging YOLO’s dominance. RF-DETR represents the
    logical next step: it combines this highly optimized, deformable architecture
    with the raw power of a modern, self-supervised backbone.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 原始DETR通过移除如NMS等手工设计的组件，革命性地改变了检测流程，但由于收敛速度慢和二次复杂度，实际上并不实用。Deformable DETR提供了关键的建筑突破，用高效的、自适应采样机制（灵感来自可变形卷积）替换了全局注意力。随后，LW-DETR证明了这种高效架构可以打包用于实时性能，挑战YOLO的主导地位。RF-DETR代表了逻辑上的下一步：它将高度优化的可变形架构与现代自监督骨干的原始力量相结合。
- en: References
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: '[1] End-to-End Object Detection with Transformers. Nicolas Carion et. al. 2020.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '[1] 使用Transformer进行端到端目标检测。Nicolas Carion等人，2020年。'
- en: '[2] Deformable Convolutional Networks. Jifeng Dai et. al. 2017.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '[2] 可变形卷积网络。Jifeng Dai等人，2017年。'
- en: '[3] Deformable DETR: Deformable Transformers for End-to-End Object Detection.
    Xizhou Zhu et. al. 2020.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '[3] 可变形DETR：用于端到端目标检测的可变形Transformer，朱锡洲等，2020年。'
- en: '[4] LW-DETR: A Transformer Replacement to YOLO for Real-Time Detection. Qiang
    Chen et. al. 2024.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '[4] LW-DETR：YOLO的实时检测替代方案，陈强等，2024年。'
- en: '[5] [https://github.com/roboflow/rf-detr/tree/develop](https://github.com/roboflow/rf-detr/tree/develop)'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '[5] [https://github.com/roboflow/rf-detr/tree/develop](https://github.com/roboflow/rf-detr/tree/develop)'
