- en: Behind the Scenes of a Successful Data Analytics Project
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 成功数据分析项目的幕后
- en: 原文：[https://towardsdatascience.com/behind-the-scenes-of-a-successful-data-analytics-project-8d45fb33e9c5/](https://towardsdatascience.com/behind-the-scenes-of-a-successful-data-analytics-project-8d45fb33e9c5/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/behind-the-scenes-of-a-successful-data-analytics-project-8d45fb33e9c5/](https://towardsdatascience.com/behind-the-scenes-of-a-successful-data-analytics-project-8d45fb33e9c5/)
- en: Having worked as a data analyst for a while and tackled numerous projects, I
    can say that even though each project is unique, there is always a proven way
    to approach it.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在担任数据分析师一段时间并处理了众多项目之后，我可以说，尽管每个项目都是独特的，但总有经过验证的方法来处理它。
- en: Today, I’ll share with you the steps I usually take when working on a data project
    so you can follow them too.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我将与你分享我在处理数据项目时通常采取的步骤，这样你也可以遵循它们。
- en: '![](../Images/caaf4b6ae31261f49b07fdcc3c5469d8.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/caaf4b6ae31261f49b07fdcc3c5469d8.png)'
- en: '**Step 1: Define the Problem and Objectives**'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1：定义问题和目标**'
- en: '![](../Images/6951385c57d93ba9fb78734d4e674714.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6951385c57d93ba9fb78734d4e674714.png)'
- en: You cannot solve a problem or answer a business question if you do not understand
    what it is and how it fits into the bigger picture.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道问题是什么以及它如何融入更大的图景，你就无法解决问题或回答商业问题。
- en: No matter how big or complex the task is, you must always understand what your
    business stakeholders are trying to achieve before diving into data. This is the
    part where you ask many questions, and before you get at least some answers, you
    are not diving into any data.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 无论任务有多大或有多复杂，在深入数据之前，你必须始终了解你的业务利益相关者试图实现什么。这是你需要提出许多问题的部分，在你至少得到一些答案之前，你不会深入任何数据。
- en: I learned this the hard way early in my career. Back then, when a vague request
    like *"We saw visitors drop this month. Can you check why?"* came, I would immediately
    jump into work. But every single time, I wasted hours trying to understand the
    real problem because I didn’t ask the right questions upfront.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我在职业生涯早期就痛苦地学到了这一点。当时，当收到像“这个月我们看到的访客数量下降了。你能检查一下原因吗？”这样的模糊请求时，我会立即开始工作。但每次，我都要浪费几个小时试图理解真正的问题，因为我没有一开始就提出正确的问题。
- en: '**I didn’t ask for context:**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**我没有询问背景信息：**'
- en: Why the team needed the traffic to be high?
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么团队需要高流量？
- en: What was the chosen strategy (brand awareness vs demand generation)?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择了哪种策略（品牌知名度与需求生成）？
- en: What were the chosen tactics (paid search vs programmatic)?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择了哪些策略（付费搜索与程序化购买）？
- en: What were the investments?
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资了什么？
- en: '**I didn’t ask stakeholders what they would do after receiving the data.**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**我没有询问利益相关者在收到数据后他们会做什么。**'
- en: Did they want to increase signups and sales?
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们是否希望增加注册和销售？
- en: Were they aware that website visits may look impressive but not necessarily
    correlate with business outcomes and that focusing on metrics such as conversion
    rate would have a much better effect?
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们是否意识到网站访问量可能看起来很令人印象深刻，但并不一定与业务成果相关，而且专注于像转化率这样的指标会产生更好的效果？
- en: 'This initial first step is important because it affects everything else: from
    the **data sources** you will use to retrieve the data to the **metrics** you
    will analyze, the **format** you will use to present the insights, and the **timeline**
    you need to be ready for.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这个初始的第一步非常重要，因为它会影响其他所有事情：从你将用于检索数据的**数据来源**到你要分析的**指标**，你将用于展示洞察的**格式**，以及你需要为准备好的**时间表**。
- en: '**So don’t ever skip it** or just partially understand hoping you will figure
    it out along the way.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**所以永远不要跳过它**，或者只是部分理解，希望你在过程中能弄清楚。'
- en: '**Step 2: Set Expectations**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2：设定期望**'
- en: '![](../Images/d7e6b4319d568474210d04480b495990.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d7e6b4319d568474210d04480b495990.png)'
- en: Once you’ve defined the problem, it’s time to set expectations.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你定义了问题，就是时候设定期望了。
- en: Stakeholders don’t always realize how much time and effort goes into collecting
    and analyzing data. You are among the few people in the organization who can find
    the answers, so you receive many requests. That is why you need to prioritize
    and set expectations.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 利益相关者并不总是意识到收集和分析数据需要多少时间和精力。你是组织中少数几个能够找到答案的人之一，因此你会收到很多请求。这就是为什么你需要优先排序并设定期望。
- en: Understanding the problem, its complexity, how it aligns with the organization’s
    goals from Step 1 helps prioritize and communicate to stakeholders when the task
    can be done or why you will not be prioritizing it right now. You want to focus
    on the most impactful work.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 理解问题、其复杂性以及它与组织目标（步骤 1）的一致性有助于优先考虑任务，并在必要时与利益相关者沟通，说明为什么你现在不会优先考虑这项任务。你希望专注于最有影响力的工作。
- en: A colleague of mine took a smart approach. They required stakeholders to fill
    out a questionnaire when submitting a task. This questionnaire included various
    questions about the problem description, timeline, etc., and it also asked, "*What
    will you do with the insights?*". This approach not only gathered all the necessary
    information upfront, eliminating the need for back-and-forth communication, but
    it also made stakeholders think twice before submitting another *"Can you quickly
    look at…?"* request. Genius, right?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我的同事采取了一种明智的方法。他们要求在提交任务时，利益相关者填写一份问卷。这份问卷包括有关问题描述、时间表等问题，还询问，“*你将如何使用这些见解？*”。这种方法不仅提前收集了所有必要的信息，消除了来回沟通的需要，而且使利益相关者在提交另一个“*你能快速查看……*”请求之前三思而后行。天才，对吧？
- en: '**Step 3: Prepare the Data**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3：准备数据**'
- en: '![](../Images/19124e42ee4651c4d465571fc9bfd9d5.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/19124e42ee4651c4d465571fc9bfd9d5.png)'
- en: Now that you’ve defined the problem and set expectations, it’s time to prepare
    the data.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经定义了问题并设定了期望，是时候准备数据了。
- en: 'This is the step where you ask youself:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你问自己的步骤：
- en: Do I have all the data available, or do I need to collect it first?
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否拥有所有数据，或者我需要先收集它们？
- en: Do I have all the domain knowledge needed, or do I need to do the research?
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否拥有所有必要的领域知识，或者我需要进行研究？
- en: Do I have documentation available for the associated datasets? *(If there is
    no documentation, you may need to contact the data owners for clarification.)*
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否有相关数据集的文档可用？*(如果没有文档，你可能需要联系数据所有者以获得澄清)*
- en: Another critical question to answer at this step is **_"_What metrics should
    I measure?"**
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一步骤中，另一个需要回答的关键问题是**“我应该测量哪些指标？”**
- en: I always align my metrics with the business objectives. For instance, if the
    goal is to increase brand awareness, I prioritize metrics like impressions, branded
    search volume, direct traffic, and reach. If the objective is to drive sales,
    I focus on conversion rates, average order value, and customer acquisition cost.
    I also explore secondary metrics (demographics, device usage, customer behavior)
    to ensure my analysis is comprehensive and paints a complete picture.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是将我的指标与业务目标对齐。例如，如果目标是提高品牌知名度，我会优先考虑指标，如曝光量、品牌搜索量、直接流量和覆盖范围。如果目标是推动销售，我会关注转化率、平均订单价值和客户获取成本。我还探索了次要指标（人口统计、设备使用、客户行为），以确保我的分析全面，并描绘出一幅完整的画面。
- en: '**Step 4: Explore the Data**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：探索数据**'
- en: '![](../Images/7fe7431b7b6ef7e69ce0e8aa7d40fdfe.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7fe7431b7b6ef7e69ce0e8aa7d40fdfe.png)'
- en: Now comes the fun part – Exploratory Data Analysis (EDA). I love this part because
    it is where all the magic happens. Like a detective, you review the evidence,
    investigate the case, formulate hypotheses, and look for hidden patterns.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是乐趣所在——探索性数据分析（EDA）。我喜欢这一部分，因为所有魔法都发生在这里。就像侦探一样，你审查证据，调查案件，形成假设，并寻找隐藏的模式。
- en: 'As you explore the data, you:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 当你探索数据时，你：
- en: '**Ask better questions.** As you become more familiar with data, you can approach
    data owners with concrete questions, making you look competent, knowledgeable,
    and confident in the eyes of your colleagues.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提出更好的问题**。随着你对数据的熟悉，你可以向数据所有者提出具体的问题，使你在同事眼中看起来更有能力、知识渊博和自信。'
- en: '**Innovate with feature engineering.** You understand whether or not you need
    to create new features from existing ones. This helps to better capture the underlying
    patterns in the data that would otherwise go unnoticed.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过特征工程进行创新**。你理解是否需要从现有特征中创建新特征。这有助于更好地捕捉数据中可能被忽视的潜在模式。'
- en: '**Assess data quality.** You check the number of rows of data and whether there
    are any anomalies, such as outliers, missing, or duplicate data.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估数据质量**。你检查数据的行数，并查看是否存在任何异常，例如异常值、缺失或重复数据。'
- en: If the exploration step shows data needs to be cleaned (and believe me, it is
    more than the case that it is not), you proceed with data cleanup.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果探索步骤表明数据需要清理（相信我，这种情况远不止于此），你就进行数据清理。
- en: '**Step 5: Clean the Data**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 5：清洗数据**'
- en: '![](../Images/cd17c3fe7bf2a51d304f399d6f4ff98a.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cd17c3fe7bf2a51d304f399d6f4ff98a.png)'
- en: No matter how polished a dataset looks at first glance, never assume it’s clean.
    Data quality issues are more common than not.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 无论数据集初看起来多么光鲜，永远不要假设它是干净的。数据质量问题比不常见的情况要多。
- en: 'The most common data quality problems you need to fix are:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要修复的最常见的数据质量问题包括：
- en: '*1.* **Missing values:**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '*1.* **缺失值：**'
- en: The way you will handle missing data differs from case to case.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 处理缺失数据的方式因情况而异。
- en: If it is due to errors in data entry, collaborate with the relevant teams to
    correct it.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果是由于数据录入错误，与相关团队合作进行更正。
- en: If the original data cannot be recovered, you need to either remove missing
    values or impute them using industry benchmarks, calculating the mean or median,
    or applying machine learning methods.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果原始数据无法恢复，你需要要么删除缺失值，要么使用行业标准进行插补，计算平均值或中位数，或者应用机器学习方法。
- en: If missing values represent a small portion of the dataset and won’t significantly
    impact the analysis, it is usually OK to remove them.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果缺失值只占数据集的一小部分，并且不会对分析产生重大影响，通常可以删除它们。
- en: '*2.* **Inconsistent data:** Check data for inconsistent data formats and standardize
    them.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*2.* **不一致的数据：** 检查数据的不一致数据格式，并标准化它们。'
- en: '*3.* **Duplicate records:** Identify and remove duplicate records to avoid
    skewing results.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '*3.* **重复记录：** 识别并删除重复记录，以避免结果偏差。'
- en: '*4.* **Outliers or errors in data:** Check for outliers or errors in the data.
    Based on its context, decide whether to remove, fix, or keep it.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*4.* **数据中的异常值或错误：** 检查数据中的异常值或错误。根据其上下文，决定是否删除、修复或保留。'
- en: Once your data is cleaned, it is time to proceed to the analysis phase.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清理完成后，就是进行分析阶段的时候了。
- en: '**Step 6: Analyze the Data**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**第6步：分析数据**'
- en: '![](../Images/22feaed9655c40cc23923caf1a97e578.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/22feaed9655c40cc23923caf1a97e578.png)'
- en: This is where your detective work starts to pay off.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你的侦探工作开始发挥作用的地方。
- en: The key is to start with a very focused and specific question and not to be
    biased by having a hypothesis in mind. Using data to tell the story you or your
    colleagues want or expect to hear might be tempting, but you must let the dataset
    speak for itself.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 关键是要从一个非常专注和具体的问题开始，不要受心中已有假设的影响。使用数据来讲述你或你的同事希望或期望听到的故事可能很有吸引力，但你必须让数据集为自己说话。
- en: 'I prefer to use the root-cause approach when analyzing data. For example, to
    answer the question, *"Why do we see a drop in signups?"* I would follow these
    10 steps:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我在分析数据时更喜欢使用根本原因方法。例如，为了回答“为什么我们看到注册量下降？”这个问题，我会遵循以下10个步骤：
- en: '**Trend analysis:** When does the drop happen for the first time? Is it seasonal?'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**趋势分析：** 下降第一次发生是什么时候？是季节性的吗？'
- en: '**Traffic and conversion rates:** Are fewer people visiting the site or fewer
    visitors signing up?'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**流量和转化率：** 是否有更少的人访问网站或更少的访客注册？'
- en: '**Offer performance:** Is the decline widespread or isolated to a particular
    offer?'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**优惠性能：** 下降是否普遍或仅限于特定的优惠？'
- en: '**Website Performance:** Are there any technical issues or broken links?'
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**网站性能：** 是否存在技术问题或断链？'
- en: '**User insights:** Is the pattern specific to a particular segment or all users?'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用户洞察：** 模式是否特定于某个细分市场或所有用户？'
- en: '**User journey analysis:** Are there any friction points where potential customers
    drop off?'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用户旅程分析：** 是否存在潜在的顾客流失的摩擦点？'
- en: '**Campaign performance:** Have any recent marketing campaigns or changes in
    strategy, budget allocation, or execution impacted effectiveness?'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**活动性能：** 任何最近的营销活动或策略、预算分配或执行的变化是否影响了效果？'
- en: '**Competitor activity:** Have competitors launched a marketing campaign, new
    product, or feature? Have they changed their prices? Is there another reason that
    might be attracting customers away?'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**竞争对手活动：** 竞争对手是否推出了营销活动、新产品或功能？他们是否改变了价格？是否有其他可能吸引顾客的原因？'
- en: '**Market trends:** Are there market trends and changes in consumer behavior
    affecting sales in the industry?'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**市场趋势：** 是否存在市场趋势和消费者行为的变化，影响了行业中的销售？'
- en: '**Customer feedback:** Are customers dissatisfied with the offering? Did their
    needs change? Do we receive more support tickets?'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**客户反馈：** 客户对提供的产品不满意吗？他们的需求是否改变？我们是否收到了更多的支持工单？'
- en: Another important point is that the fastest and most accurate answers aren’t
    usually the same, and a lot depends on **the context.** That is why you need to
    collaborate with cross-functional teams and develop strong domain and industry
    knowledge.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要点是，最快和最准确的答案通常并不相同，很多都取决于**上下文**。这就是为什么你需要与跨职能团队合作，并发展强大的领域和行业知识。
- en: '**Step 7: Build the Story**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 7：构建故事**'
- en: '![](../Images/689c2fb9c94df5aa37c6746299925e32.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/689c2fb9c94df5aa37c6746299925e32.png)'
- en: This step is my second favorite after data exploration because it is when all
    the data pieces fall into place, revealing a clear story and making perfect sense.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这个步骤是我最喜欢的第二个步骤，仅次于数据探索，因为这是所有数据片段都到位，揭示一个清晰的故事并完全有意义的时刻。
- en: A common mistake here is including everything you found interesting instead
    of focusing on what the audience cares about. I get it. After working hard to
    get insights, it’s tempting to show off all the cool stuff you did. But if you
    overload your audience with data, you can further confuse them.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的一个常见错误是包含你发现的所有有趣的东西，而不是专注于受众关心的事情。我理解。在努力获得洞察力之后，炫耀你做的所有酷东西是很诱人的。但如果你用数据压倒你的受众，你可能会进一步混淆他们。
- en: Don’t throw every data point at stakeholders; focus on what matters most to
    your audience instead. Think about their level of seniority, how familiar they
    are with the topic, their data literacy level, how much time they have, and whether
    you’re presenting in person or sending a report via email. This way you don’t
    waste anyone’s time – yours or theirs.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 不要向利益相关者抛出每个数据点；专注于对你受众最重要的东西。考虑他们的级别、他们对主题的熟悉程度、他们的数据素养水平、他们有多少时间，以及你是亲自演示还是通过电子邮件发送报告。这样你就不会浪费任何人的时间——无论是你的还是他们的。
- en: Lastly, always include actionable recommendations to stakeholders in your story.
    Your story should guide stakeholders on the next steps, ensuring that your insights
    drive meaningful decisions.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，始终在你的故事中向利益相关者包括可操作的推荐。你的故事应该指导利益相关者进行下一步，确保你的洞察推动有意义的决策。
- en: This brings us to the next point – sharing the insights and recommendations.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了下一个要点——分享洞察和建议。
- en: '**Step 8: Share the Insights**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 8：分享洞察**'
- en: '![](../Images/28e7c6855b62100a290df329a0523954.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/28e7c6855b62100a290df329a0523954.png)'
- en: As a data analyst, you have the power to drive change. The secret lies in how
    you share data and tell the story.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据分析师，你有推动变革的力量。秘密在于你如何分享数据和讲述故事。
- en: First, consider the format your audience expects (see Step 1). Are you creating
    a dashboard, emailing a report, or presenting in person? Data storytelling becomes
    crucial for live presentations.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，考虑你的受众期望的格式（参见步骤 1）。你是在创建仪表板、发送报告还是亲自演示？数据故事讲述对于现场演示至关重要。
- en: A great data story blends **data, narrative, visuals, and practice:**
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一个优秀的数据故事融合了**数据、叙事、视觉和练习**：
- en: '**Data**: Focus only on insights with real business impact. If you can’t find
    a compelling reason why your insight will matter to the audience, if it’s unclear
    what they should do with the insights, or if the business impact is minimal, move
    it to the appendix.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据：** 只关注具有真实商业影响的洞察。如果你找不到一个令人信服的理由来说明你的洞察对受众有何重要，如果他们不清楚如何使用这些洞察，或者商业影响很小，请将其移至附录。'
- en: '**Narrative:** Ensure that your story has a clear structure.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**叙事：** 确保你的故事有一个清晰的结构。'
- en: 'Set the scene: What’s happening now?'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置场景：现在发生了什么？
- en: Introduce the problem (to create some tension).
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍问题（以创造一些紧张感）。
- en: 'Reveal the key insights: What did you discover?'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 揭示关键洞察：你发现了什么？
- en: 'Finish with actionable steps: What should they do next?'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以可操作的步骤结束：他们接下来应该做什么？
- en: This keeps your audience interested and makes your story memorable.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以保持受众的兴趣，并使你的故事难忘。
- en: '**Visuals:** The chart that helped you discover an insight isn’t always the
    best for presenting it. Highlight the key points and avoid clutter. For example,
    if you analyzed 10 categories but only 2 are critical, focus on those.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**视觉：** 帮助你发现洞察力的图表并不总是最适合展示。突出重点，避免杂乱。例如，如果你分析了 10 个类别，但只有 2 个是关键的，那么就关注那些。'
- en: '**Practice:** Practicing helps you feel more comfortable with the material.
    It also allows you to focus on important things like eye contact, hand gestures,
    and pacing. The more you practice, the more confident and credible you will appear.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**练习：** 练习可以帮助你更舒适地掌握材料。它还允许你专注于重要的事情，如眼神交流、手势和节奏。你练习得越多，你看起来就越自信和可信。'
- en: You might think that once you’ve shared your insights, your job as a data analyst
    is done. In reality you want people not only hear what you’ve discovered but also
    act on your insights. This leads us to the final step – making people act on your
    data.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能认为一旦你分享了自己的见解，作为数据分析师的工作就完成了。实际上，你希望人们不仅听到你发现的成果，还能根据你的见解采取行动。这引出了最后一步——让人们根据你的数据采取行动。
- en: '**Step 9\. Make People Act on Your Data**'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**第9步：让人们根据你的数据采取行动**'
- en: '![](../Images/15d8b3dd44c4877878965d419adfaa3e.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/15d8b3dd44c4877878965d419adfaa3e.png)'
- en: Seeing my work have an impact and a chance to drive real change brings me the
    most satisfaction. So don’t let your hard work go to waste either.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 看到我的工作产生影响，有机会推动真正的变革，这给我带来了最大的满足感。所以，也不要让你的辛勤工作付诸东流。
- en: Work with the relevant teams to set clear action steps, timelines, and success
    metrics.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与相关团队合作，设定明确的行为步骤、时间表和成功指标。
- en: Monitor progress and ensure your recommendations are being implemented.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控进度，确保你的建议得到实施。
- en: Communicate regularly with cross-functional teams to track the impact of your
    recommendations.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期与跨职能团队沟通，跟踪你建议的影响。
- en: I understand that this might feel like a lot right now, but please don’t worry.
    With practice, it will become easier, and before you know it, these steps will
    become second nature.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我明白现在这可能会感觉很多，但请别担心。随着练习，它会变得更容易，在你不知不觉中，这些步骤将变得习以为常。
- en: '![](../Images/1b6a98c9033db35cc27bb825520ad57f.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1b6a98c9033db35cc27bb825520ad57f.png)'
- en: Good luck on your data analyst journey! You’re on the right track!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 祝你在数据分析师的旅程中好运！你正走在正确的道路上！
- en: '* * *'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
