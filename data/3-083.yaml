- en: How to Write Queries for Tabular Models with DAX
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用DAX编写表模型的查询
- en: 原文：[https://towardsdatascience.com/601823-2/](https://towardsdatascience.com/601823-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/601823-2/](https://towardsdatascience.com/601823-2/)
- en: <mdspan datatext="el1745276188880" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745276188880" class="mdspan-comment">引言</mdspan>
- en: '[`EVALUATE`](https://dax.guide/st/evaluate/) is the statement to query tabular
    models.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[`EVALUATE`](https://dax.guide/st/evaluate/)是查询表模型的语句。'
- en: Unfortunately, knowing SQL or any other query language doesn’t help as `EVALUATE`
    follows a different concept.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 很不幸，了解SQL或任何其他查询语言并不能有所帮助，因为`EVALUATE`遵循不同的概念。
- en: '`EVALUATE` has only two “Parameters”:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '`EVALUATE`只有两个“参数”：'
- en: A table to show
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要显示的表
- en: A sort order ([`ORDER BY`](https://dax.guide/st/order-by/))
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 排序顺序（[`ORDER BY`](https://dax.guide/st/order-by/））
- en: You can pass a third parameter ([`START AT`](https://dax.guide/st/start-at/)),
    but this one is rarely used.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以传递第三个参数（[`START AT`](https://dax.guide/st/start-at/）），但这个参数很少使用。
- en: However, a DAX query can have additional components. Those are defined in the
    `DEFINE` section of the query.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，DAX查询可以有额外的组件。这些组件在查询的`DEFINE`部分中定义。
- en: In the `DEFINE` section, you can define Variables and local Measures.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在`DEFINE`部分，您可以定义变量和局部度量值。
- en: You can use the `COLUMN` and `TABLE` keywords in `EVALUATE`, which I have never
    used until now.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在`EVALUATE`中使用`COLUMN`和`TABLE`关键字，这是我之前从未使用过的。
- en: Let’s start with some simple Queries and add some additional logic step by step.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一些简单的查询开始，逐步添加一些额外的逻辑。
- en: However, first, let’s discuss the Tools.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，首先，让我们讨论一下工具。
- en: Querying tools
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 查询工具
- en: 'There are two possibilities for querying a tabular model:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 查询表模型有两种可能性：
- en: Using the [DAX query view](https://learn.microsoft.com/en-us/power-bi/transform-model/dax-query-view)
    in Power BI Desktop.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用Power BI Desktop中的[DAX查询视图](https://learn.microsoft.com/en-us/power-bi/transform-model/dax-query-view)。
- en: Using [DAX Studio](https://www.sqlbi.com/tools/dax-studio/).
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用[DAX Studio](https://www.sqlbi.com/tools/dax-studio/)。
- en: Of course, the syntax is the same.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，语法是相同的。
- en: I prefer DAX Studio over DAX query view. It offers advanced features not available
    in Power BI Desktop, such as performance statistics with Server Timing and displaying
    the model’s metrics.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢DAX Studio而不是DAX查询视图。它提供了Power BI Desktop中不可用的高级功能，例如带有服务器时间的性能统计和显示模型的度量指标。
- en: On the other hand, the DAX query view in Power BI Desktop provides the option
    to apply changes in a Measure back to the model directly after I have modified
    them in the query.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，Power BI Desktop中的DAX查询视图提供了在查询中修改度量值后直接将其更改应用到模型中的选项。
- en: I will discuss this later when I explain more about the possibility of defining
    local measures. You can read the MS documentation on modifying Measures directly
    from the DAX query view.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在解释定义局部度量值的可能性时进一步讨论这个问题。您可以阅读MS文档，了解如何直接从DAX查询视图中修改度量值。
- en: You can find a link to the documentation in the References section below.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在下面的参考文献部分找到文档链接。
- en: In this article, I will use DAX Studio only.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将仅使用DAX Studio。
- en: Simple queries
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单查询
- en: 'The simplest query is to get all columns and all rows from a table:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的查询是从表中获取所有列和所有行：
- en: EVALUATE
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: EVALUATE
- en: Customer
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 客户
- en: 'This query returns the entire Customer table:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 此查询返回整个客户表：
- en: '![](../Images/cf0e6bf1eff7ec65896ed9279e6f24e7.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cf0e6bf1eff7ec65896ed9279e6f24e7.png)'
- en: Figure 1 – Simple query on the Customer table. The number of returned rows can
    be found in the bottom right corner of DAX Studio, as well as the position of
    the cursor in the Query (Figure by the Author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 在客户表上执行简单查询。返回的行数可以在DAX Studio的右下角找到，以及查询中光标的位置（图由作者提供）
- en: If I want to query the result of a single value, for example, a Measure, I must
    define a table, as `EVALUATE` requires a table as input.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想查询单个值的查询结果，例如一个度量值，我必须定义一个表，因为`EVALUATE`需要一个表作为输入。
- en: Curly brackets do this.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 花括号就是这样做的。
- en: 'Therefore, the query for a Measure looks like this:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，度量值的查询看起来像这样：
- en: EVALUATE
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: EVALUATE
- en: '{[Online Customer Count]}'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '{[在线客户数量]}'
- en: 'The result is one single value:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个单一值：
- en: '![](../Images/82ab2c0b6051d4257233e5c384c9ffbf.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/82ab2c0b6051d4257233e5c384c9ffbf.png)'
- en: Figure 2 – Querying a Measure with Curly brackets to define a table (Figure
    by the Author)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – 使用花括号定义表以查询度量值（图由作者提供）
- en: Get only the first 10 rows
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 只获取前10行
- en: It’s not unusual to have tables with thousands or even millions of rows.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 有成千上万甚至数百万行的表并不罕见。
- en: So, what if I want to see the first 10 rows to glimpse the data inside the table?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，如果我想要查看前10行以窥视表内的数据呢？
- en: For this, [`TOPN()`](https://dax.guide/topn/) does the trick.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这一点，[`TOPN()`](https://dax.guide/topn/)可以解决问题。
- en: '`TOPN()` accepts a sorting order. However, it doesn’t sort the data; it only
    looks at the values and gets the first or last rows according to the sorting criteria.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '`TOPN()`接受一个排序顺序。然而，它并不对数据进行排序；它只查看值并根据排序标准获取第一行或最后一行。'
- en: 'For example, let’s get the ten customers with the latest birthdate (Descending
    order):'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们获取最新出生日期的10位客户（降序）：
- en: EVALUATE
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: EVALUATE
- en: TOPN(10
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: TOPN(10
- en: ',Customer'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: ',Customer'
- en: ',Customer[BirthDate]'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: ',Customer[BirthDate]'
- en: ',DESC)'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ',DESC)'
- en: 'This is the result:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这是结果：
- en: '![](../Images/1cd4498178800049411b0d66abc0d587.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1cd4498178800049411b0d66abc0d587.png)'
- en: Figure 3 – Here, the result of TOPN() is used to get the top 10 rows by birthdate.
    See, that 11 rows are returned, as there are customers with the same birthdate
    (Figure by the Author)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – 这里，使用TOPN()函数按出生日期获取前10行。看，返回了11行，因为有客户拥有相同的出生日期（作者制图）
- en: 'The [DAX.guide](https://dax.guide/) article on [`TOPN()`](https://dax.guide/topn/)
    states the following about ties in the resulting data:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 关于[`TOPN()`](https://dax.guide/topn/)的[DAX.guide](https://dax.guide/)文章中提到关于结果中的平局如下：
- en: '*If there is a tie in `OrderBy_Expression` values at the N-th row of the table,
    then all tied rows are returned. Then, when there are ties at the N-th row, the
    function might return more than n rows.*'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果表的第N行`OrderBy_Expression`值有平局，则返回所有平局行。然后，当第N行有平局时，该函数可能会返回超过n行。*'
- en: This explains why we get 11 rows from the query. When sorting the output, we
    will see the tie for the last value, November 26, 1980.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这解释了为什么查询结果有11行。当对输出进行排序时，我们将看到最后值的平局，即1980年11月26日。
- en: 'To have the result sorted by the Birthdate, you must add an `ORDER BY`:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要按出生日期排序结果，您必须添加一个`ORDER BY`：
- en: EVALUATE
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: EVALUATE
- en: TOPN(10
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: TOPN(10
- en: ',Customer'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: ',Customer'
- en: ',Customer[BirthDate]'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: ',Customer[BirthDate]'
- en: ',DESC)'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: ',DESC)'
- en: ORDER BY Customer[BirthDate] DESC
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: ORDER BY Customer[BirthDate] DESC
- en: 'And here, the result:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，结果是：
- en: '![](../Images/fe661bd8e86dd31dfb00d144e8a849e6.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fe661bd8e86dd31dfb00d144e8a849e6.png)'
- en: Figure 4 – Result of the same TOPN() query as before, but with an ORDER BY to
    sort the output of the query by the Birthday descending (Figure by the Author)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 与之前相同的TOPN()查询结果，但添加了ORDER BY按生日降序排序（作者制图）
- en: Now, the ties at the last two rows are clearly visible.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，最后两行的平局情况清晰可见。
- en: Adding columns
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 添加列
- en: Usually, I want to select only a subset of all columns in a table.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，我想从表中选择所有列的一个子集。
- en: If I query multiple columns, I will only get the distinct values of the existing
    combination of values in both columns. This differs from other query languages,
    like SQL, where I must explicitly define that I want to remove duplicates, for
    example with `DISTINCT`.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我查询多个列，我只会得到两个列中现有值组合的唯一值。这与SQL等其他查询语言不同，在SQL中，我必须明确指定我想删除重复项，例如使用`DISTINCT`。
- en: 'DAX has multiple functions to get a subset of columns from a table:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: DAX有多个函数可以从表中获取列的子集：
- en: '[`ADDCOLUMNS()`](https://dax.guide/addcolumns/)'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`ADDCOLUMNS()`](https://dax.guide/addcolumns/)'
- en: '[`SELECTCOLUMNS()`](https://dax.guide/selectcolumns/)'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`SELECTCOLUMNS()`](https://dax.guide/selectcolumns/)'
- en: '[`SUMMARIZE()`](https://dax.guide/summarize/)'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`SUMMARIZE()`](https://dax.guide/summarize/)'
- en: '[`SUMMARIZECOLUMNS()`](https://dax.guide/summarizecolumns/)'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`SUMMARIZECOLUMNS()`](https://dax.guide/summarizecolumns/)'
- en: Of these four, [`SUMMARIZECOLUMNS()`](https://dax.guide/summarizecolumns/) is
    the most useful for general purposes.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这四个中，[`SUMMARIZECOLUMNS()`](https://dax.guide/summarizecolumns/) 对于一般用途最有用。
- en: When trying these four functions, be cautious when using [`ADDCOLUMNS()`](https://dax.guide/addcolumns/),
    as this function can result in unexpected results.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在尝试这四个函数时，使用[`ADDCOLUMNS()`](https://dax.guide/addcolumns/)时要小心，因为这个函数可能会导致意外结果。
- en: Read [this SQLBI article](https://www.sqlbi.com/articles/best-practices-using-summarize-and-addcolumns)
    for more details.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 读取[这篇SQLBI文章](https://www.sqlbi.com/articles/best-practices-using-summarize-and-addcolumns)以获取更多详细信息。
- en: 'OK, how can we use `SUMMARIZECOLUMNS()` in a query:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们如何在查询中使用`SUMMARIZECOLUMNS()`：
- en: EVALUATE
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: EVALUATE
- en: SUMMARIZECOLUMNS(‘Customer'[CustomerType])
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: SUMMARIZECOLUMNS(‘Customer'[CustomerType])
- en: 'This is the result:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这是结果：
- en: '![](../Images/10c9111a5ecd4ad43e15ab22aef4f1fd.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/10c9111a5ecd4ad43e15ab22aef4f1fd.png)'
- en: Figure 5 – Getting the Distinct values of CustomerType with SUMMARIZECOLUMNS()
    (Figure by the Author)
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 使用SUMMARIZECOLUMNS()获取CustomerType的不同值（作者制图）
- en: As described above, we get only the distinct values of the CustomerType column.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，我们只获取客户类型列的唯一值。
- en: 'When querying multiple columns, the result is the distinct combinations of
    the existing data:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当查询多个列时，结果是现有数据的唯一组合：
- en: '![](../Images/a3524f97e72186f2786f6b76b350f3a2.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a3524f97e72186f2786f6b76b350f3a2.png)'
- en: Figure 6 – Getting multiple columns (Figure by the Author)
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 获取多个列（图由作者绘制）
- en: 'Now, I can add a Measure to the Query, to get the number of Customers per combination:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我可以在查询中添加一个度量，以获取每个组合的客户数量：
- en: EVALUATE
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: EVALUATE
- en: SUMMARIZECOLUMNS(‘Customer'[CustomerType]
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: SUMMARIZECOLUMNS(‘客户'[客户类型]
- en: ',Customer[Gender]'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: ',客户[性别]'
- en: ',”Number of Customers”, [Online Customer Count])'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: ',“客户数量”, [在线客户计数])'
- en: As you can see, a label must be added for the Measure. This applies to all calculated
    columns added to a query.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，必须为度量添加一个标签。这适用于添加到查询中的所有计算列。
- en: 'This is the result of the query above:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这是上述查询的结果：
- en: '![](../Images/14c9be20659ea46c00892d3139e576b2.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/14c9be20659ea46c00892d3139e576b2.png)'
- en: Figure 7 – Result of the query with multiple columns and a Measure (Figure by
    the Author)
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图7 – 包含多个列和度量的查询结果（图由作者绘制）
- en: You can add as many columns and measures as you need.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以添加您需要的任意多的列和度量。
- en: Adding filters
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 添加过滤器
- en: The function [`CALCULATE()`](https://dax.guide/calculate/) is well-known for
    adding filters to a Measure.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 函数[`CALCULATE()`](https://dax.guide/calculate/)因向度量添加过滤器而闻名。
- en: For queries, we can use the [`CALCULATETABLE()`](https://dax.guide/calculatetable/)
    function, which works like `CALCULATE()`; only the first argument must be a table.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 对于查询，我们可以使用类似于`CALCULATE()`的`CALCULATETABLE()`函数；只需第一个参数必须是表即可。
- en: 'Here, the same query as before, only that the Customer-Type is filtered to
    include only “Persons”:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，与之前相同的查询，只是客户类型被过滤，只包括“个人”：
- en: EVALUATE
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 评估
- en: CALCULATETABLE(
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: CALCULATETABLE(
- en: SUMMARIZECOLUMNS(‘Customer'[CustomerType]
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: SUMMARIZECOLUMNS(‘客户'[客户类型]
- en: ',Customer[Gender]'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: ',客户[性别]'
- en: ',”Number of Customers”, [Online Customer Count])'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: ',“客户数量”, [在线客户计数])'
- en: ',’Customer''[CustomerType] = “Person”'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: ',’客户''[客户类型] = “个人”'
- en: )
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'Here, the result:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，结果是：
- en: '![](../Images/35c9790dea30b33a867371733290b51f.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/35c9790dea30b33a867371733290b51f.png)'
- en: Figure 8 – Query and result to filter the Customer-Type to “Person” (Figure
    by the Author)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图8 – 过滤客户类型为“个人”的查询和结果（图由作者绘制）
- en: It is possible to add filters directly to `SUMMARIZECOLUMNS()`. The queries
    generated by Power BI use this approach. But it is much more complicated than
    using `CALCULATETABLE()`.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 可以直接将过滤器添加到`SUMMARIZECOLUMNS()`。Power BI生成的查询使用这种方法。但它比使用`CALCULATETABLE()`要复杂得多。
- en: You can find examples for this approach on the [DAX.guide](https://dax.guide/)
    page for [`SUMMARIZECOLUMNS()`](https://dax.guide/summarizecolumns/).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[SUMMARIZECOLUMNS()](https://dax.guide/summarizecolumns/)的[DAX.guide](https://dax.guide/)页面上找到此方法的示例。
- en: Power BI uses this approach when building queries from the visualisations. You
    can get the queries from the Performance Analyzer in Power BI Desktop.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI在从可视化构建查询时使用这种方法。您可以从Power BI桌面版中的性能分析器中获取查询。
- en: You can read [my piece about collecting performance data](https://medium.com/towards-data-science/how-to-get-performance-data-from-power-bi-with-dax-studio-b7f11b9dd9f9)
    to learn how to use Performance Analyzer to get a query from a Visual.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以阅读[我关于收集性能数据的文章](https://medium.com/towards-data-science/how-to-get-performance-data-from-power-bi-with-dax-studio-b7f11b9dd9f9)，了解如何使用性能分析器从视觉中获取查询。
- en: You can also read the Microsoft documentation linked below, which explains this.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以阅读以下链接的Microsoft文档，它解释了这一点。
- en: Defining Local Measures
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义局部度量
- en: 'From my point of view, this is one of the most powerful features of DAX queries:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 从我的观点来看，这是DAX查询中最强大的功能之一：
- en: Adding Measures local to the query.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在查询中添加局部度量。
- en: The [`DEFINE`](https://dax.guide/st/define/) statement exists for this purpose.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，存在一个[`DEFINE`](https://dax.guide/st/define/)语句。
- en: For example, we have the Online Customer Count Measure.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们有在线客户计数度量。
- en: Now, I want to add a filter to count only customers of the type “Person”.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我想添加一个过滤器，只计算“个人”类型的客户。
- en: I can modify the code in the data model or test the logic in a DAX query.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以修改数据模型中的代码或测试DAX查询中的逻辑。
- en: The first step is to get the current code from the data model in the existing
    query.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是从现有查询的数据模型中获取当前代码。
- en: For this, I must place the cursor on the first line of the query. Ideally, I
    will add an empty line to the query.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个，我必须将光标放在查询的第一行上。理想情况下，我会在查询中添加一个空行。
- en: 'Now, I can use DAX Studio to extract the code of the Measure and add it to
    the Query by right-clicking on the Measure and clicking on “Define Measure”:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我可以通过右键单击度量并单击“定义度量”来使用 DAX Studio 提取度量的代码并将其添加到查询中：
- en: '![](../Images/1e798d14aba2879bd155814dd1f88aa3.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1e798d14aba2879bd155814dd1f88aa3.png)'
- en: Figure 9 – Use the “Define Measure” feature of DAX Studio to extract the DAX
    code for a Measure (Figure by the Author)
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9 – 使用 DAX Studio 的“定义度量”功能提取度量的 DAX 代码（图由作者提供）
- en: The same feature is also available in Power BI Desktop.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 此功能在 Power BI Desktop 中也有提供。
- en: 'Next, I can change the DAX code of the Measure by adding the Filter:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我可以通过添加筛选器来更改度量的 DAX 代码：
- en: DEFINE
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 定义
- en: —- MODEL MEASURES BEGIN —-
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: —- 模型度量开始 —-
- en: MEASURE ‘All Measures'[Online Customer Count] =
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: MEASURE ‘All Measures'[Online Customer Count] =
- en: CALCULATE(DISTINCTCOUNT(‘Online Sales'[CustomerKey])
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: CALCULATE(DISTINCTCOUNT(‘Online Sales'[CustomerKey])
- en: ',’Customer''[CustomerType] = “Person”'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: ，’Customer'[CustomerType] = “Person”
- en: )
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: ）
- en: —- MODEL MEASURES END —-
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: —- 模型度量结束 —-
- en: 'When executing the query, the local definition of the Measure is used, instead
    of the DAX code stored in the data model:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行查询时，使用的是度量的本地定义，而不是数据模型中存储的 DAX 代码：
- en: '![](../Images/c7b49003b6689371b04483266749bb28.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c7b49003b6689371b04483266749bb28.png)'
- en: Figure 10 – Query and results with the modified DAX code for the Measure (Figure
    by the Author)
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10 – 使用修改后的 DAX 代码查询和结果的度量（图由作者提供）
- en: Once the DAX code works as expected, you can take it and modify the Measure
    in Power BI Desktop.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦 DAX 代码按预期工作，您就可以将其取出来并修改 Power BI Desktop 中的度量。
- en: The DAX query view in Power BI Desktop is advantageous because you can directly
    right-click the modified code and add it back to the data model. Refer to the
    link in the References section below for instructions on how to do this.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Power BI Desktop 中，DAX 查询视图的优势在于您可以直接右键单击修改后的代码并将其添加回数据模型。有关如何操作的说明，请参阅下面参考文献部分中的链接。
- en: DAX Studio doesn’t support this feature.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: DAX Studio 不支持此功能。
- en: Putting the pieces together
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整合碎片
- en: 'OK, now let’s put the pieces together and write the following query: I want
    to get the top 5 products ordered by customers.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在让我们整合碎片并编写以下查询：我想获取按客户排序的前 5 个产品。
- en: 'I take the query from above, change the query to list the Product names, and
    add a `TOPN()`:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我从上面的查询中获取，将查询更改为列出产品名称，并添加 `TOPN()`：
- en: '[PRE0]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Notice that I pass the measure’s label, “Number of Customers”, instead of its
    name.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我传递的是度量的标签“客户数量”，而不是其名称。
- en: I must do it this way, as DAX replaces the measure’s name with the label. Therefore,
    DAX has no information about the Measure and only knows the label.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须这样做，因为 DAX 用标签替换了度量的名称。因此，DAX 对度量没有信息，只知道标签。
- en: 'This is the result of the query:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这是查询的结果：
- en: '![](../Images/08fa3ccfeafc8ac0103c96f3c3b8d130.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/08fa3ccfeafc8ac0103c96f3c3b8d130.png)'
- en: Figure 11 – The query result using TOPN() combined with a Measure. Notice that
    the label is used instead of the Measures name (Figure by the Author)
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11 – 使用 TOPN() 与度量结合的查询结果。注意，这里使用的是标签而不是度量名称（图由作者提供）
- en: Conclusion
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I often use queries in DAX Studio, as it is much easier for data validation.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常在 DAX Studio 中使用查询，因为它更容易进行数据验证。
- en: DAX Studio allows me to directly copy the result into the Clipboard or write
    it in an Excel file without explicitly exporting the data.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: DAX Studio 允许我直接将结果复制到剪贴板或写入 Excel 文件，而无需明确导出数据。
- en: This is extremely useful when creating a result set and sending it to my client
    for validation.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 当创建结果集并将其发送给我的客户进行验证时，这非常有用。
- en: Moreover, I can modify a Measure without changing it in Power BI Desktop and
    quickly validate the result in a table.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我可以在不更改 Power BI Desktop 中的度量的情况下修改度量，并快速在表中验证结果。
- en: I can use a Measure from the data model, temporarily create a modified version,
    and validate the results side-by-side.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以使用数据模型中的度量，临时创建一个修改版本，并对照验证结果。
- en: DAX queries have endless use cases and should be part of every Power BI developer’s
    toolkit.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: DAX 查询有无数的应用场景，应该成为每个 Power BI 开发者工具包的一部分。
- en: I hope that I was able to show you something new and explain why knowing how
    to write DAX queries is important for a Data model developer’s daily life.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我能够向您展示一些新内容，并解释为什么了解如何编写 DAX 查询对于数据模型开发者的日常生活非常重要。
- en: References
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'Microsoft’s documentation about applying changes from the DAX query view on
    the model:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 关于在模型上应用 DAX 查询视图更改的 Microsoft 文档：
- en: '[Update model with changes – DAX query view – Power BI | Microsoft Learn](https://learn.microsoft.com/en-us/power-bi/transform-model/dax-query-view#update-model-with-changes)'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '[更新模型以应用更改 – DAX 查询视图 – Power BI | 微软学习](https://learn.microsoft.com/en-us/power-bi/transform-model/dax-query-view#update-model-with-changes)'
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 和我之前的文章一样，我使用了 Contoso 示例数据集。您可以从微软[这里](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载
    ContosoRetailDW 数据集。
- en: The Contoso Data can be freely used under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 根据[此文档](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)中的描述，Contoso
    数据可以在 MIT 许可证下自由使用。我将数据集更改以将数据转移到当代日期。
