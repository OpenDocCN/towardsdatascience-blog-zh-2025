- en: How I Won the “Mostly AI” Synthetic Data Challenge
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何赢得“Mostly AI”合成数据挑战
- en: 原文：[https://towardsdatascience.com/how-i-won-the-mostly-ai-synthetic-data-challenge/](https://towardsdatascience.com/how-i-won-the-mostly-ai-synthetic-data-challenge/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-i-won-the-mostly-ai-synthetic-data-challenge/](https://towardsdatascience.com/how-i-won-the-mostly-ai-synthetic-data-challenge/)
- en: I <mdspan datatext="el1754528856866" class="mdspan-comment">recently participated</mdspan>
    in the [Mostly AI Prize](https://www.mostlyaiprize.com/) and won both the FLAT
    and SEQUENTIAL data challenges. The competition was a fantastic learning experience,
    and in this post, I want to provide some insights into my winning solution.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近参加了[Mostly AI Prize](https://www.mostlyaiprize.com/)并赢得了FLAT和SEQUENTIAL数据挑战。这次比赛是一次极好的学习经历，在这篇文章中，我想分享一些关于我获胜方案的想法。
- en: The Competition
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 比赛情况
- en: The goal of the competition was to generate a synthetic dataset with the same
    statistical properties as a source dataset, without copying the data.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 比赛的目标是生成一个具有与源数据集相同统计特性的合成数据集，而不复制数据。
- en: '![](../Images/b7cf5e116a204f4217ff3a9fb913a33d.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b7cf5e116a204f4217ff3a9fb913a33d.png)'
- en: 'Source: [https://www.mostlyaiprize.com/](https://www.mostlyaiprize.com/).'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[https://www.mostlyaiprize.com/](https://www.mostlyaiprize.com/)。
- en: 'The competition was split into two independent challenges:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 比赛分为两个独立挑战：
- en: '**FLAT Data Challenge**: Generate 100,000 records with 80 columns.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**FLAT数据挑战**：生成具有80列的100,000条记录。'
- en: '**SEQUENTIAL Data Challenge**: Generate 20,000 sequences (groups) of records.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**SEQUENTIAL数据挑战**：生成20,000个记录序列（组）。'
- en: To measure the quality of the synthetic data, the competition used an **Overall
    Accuracy** metric. This score measures the similarity between the synthetic and
    source distributions for single columns (univariates), pairs of columns (bivariates),
    and triples of columns (trivariates) using the L1 distance. Additionally, privacy
    metrics like **DCR (Distance to Closest Record)** and **NNDR (Nearest Neighbor
    Distance Ratio)** were used to ensure submissions weren’t just overfitting or
    copying the training data.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了衡量合成数据的质量，比赛使用了**总体准确率**指标。这个分数通过L1距离来衡量合成数据和源分布对于单列（单变量）、成对列（双变量）和三列（三变量）之间的相似性。此外，还使用了如**DCR（最近记录距离）**和**NNDR（最近邻距离比）**这样的隐私指标，以确保提交的数据不是仅仅过拟合或复制训练数据。
- en: '![](../Images/e94603710ba88dc535f54047e1ca3e8d.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e94603710ba88dc535f54047e1ca3e8d.png)'
- en: A sample of the training dataset for the FLAT challenge. Image by author.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: FLAT挑战的训练数据集样本。图片由作者提供。
- en: Solution Design
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案设计
- en: Initially, my goal was to create an ensemble of multiple different state-of-the-art
    models and combine their generated data. I experimented a lot with different models,
    but the results did not improve as much as I had hoped.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 初始目标是我创建多个不同最先进模型的集成，并合并它们生成的数据。我尝试了多种不同的模型，但结果并没有像我希望的那样有显著提升。
- en: I pivoted my approach and focused on **post-processing**. First, I trained a
    single generative model from the [Mostly AI SDK](https://github.com/mostly-ai/mostlyai),
    and instead of generating the required number of samples for the submission, I
    **oversampled** to create a large pool of candidate samples. From this pool, I
    then selected the final output in a way that matches the statistical properties
    of the source dataset much more closely.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我调整了我的方法，并专注于**后处理**。首先，我从[Mostly AI SDK](https://github.com/mostly-ai/mostlyai)训练了一个单一的生成模型，而不是生成提交所需的样本数量，我**过采样**以创建一个大量的候选样本池。从这个池中，我然后选择最终输出，使其更接近源数据集的统计特性。
- en: This approach led to a substantial jump in the leaderboard score. For the FLAT
    data challenge, the raw synthetic data from the model scored around 0.96, but
    after post-processing, the score jumped to **0.992**. I used a modified version
    of this approach for the SEQUENTIAL data challenge, which yielded a similar improvement.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法使得排行榜上的分数有了显著提升。对于FLAT数据挑战，模型的原始合成数据得分为约0.96，但经过后处理，分数提升到了**0.992**。我使用这个方法的修改版用于SEQUENTIAL数据挑战，也取得了类似的改进。
- en: 'My final pipeline for the FLAT challenge consisted of three main steps:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我为FLAT挑战的最终流程包括三个主要步骤：
- en: '**Iterative Proportional Fitting (IPF)** to select an oversized, high-quality
    subset.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**迭代比例拟合（IPF）**选择一个超大规模的高质量子集。'
- en: '**Greedy Trimming** to reduce the subset to the target size by removing the
    worst-fitting samples.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**贪婪剪枝**通过移除最不匹配的样本来将子集缩减到目标大小。'
- en: '**Iterative Refinement** to polish the final dataset by swapping samples for
    better fitting ones.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**迭代优化**以通过交换样本来提高最终数据集的匹配度。'
- en: '![](../Images/39dedb8d9f26bfe0334dda4d1a25c079.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39dedb8d9f26bfe0334dda4d1a25c079.png)'
- en: The impact of each post-processing step on the final accuracy score for the
    FLAT challenge. Image by author.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 每个后处理步骤对FLAT挑战最终准确度得分的影响。图由作者提供。
- en: 'Step 1: Iterative Proportional Fitting (IPF)'
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：迭代比例拟合（IPF）
- en: The first step in my post-processing pipeline was to get a strong initial subset
    from the oversampled pool (2.5 million generated rows). For this, I used [**Iterative
    Proportional Fitting (IPF)**](https://en.wikipedia.org/wiki/Iterative_proportional_fitting).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我的后处理流程的第一步是从过采样池（2.5百万生成的行）中获取一个强大的初始子集。为此，我使用了[**迭代比例拟合（IPF）**](https://en.wikipedia.org/wiki/Iterative_proportional_fitting)。
- en: IPF is a classical statistical algorithm used to adjust a sample distribution
    to match a known set of marginals. In this case, I wanted the synthetic data’s
    bivariate (2-column) distributions to match those of the original data. I also
    tested uni- and trivariate distributions, but I found that focusing on the bivariate
    relationships yielded the best performance while being computationally fast.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: IPF是一种经典的统计算法，用于调整样本分布以匹配已知的边缘集。在这种情况下，我希望合成数据的双变量（两列）分布与原始数据相匹配。我还测试了单变量和三变量分布，但发现专注于双变量关系在计算上既快又提供了最佳性能。
- en: 'Here’s how it worked:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是它是如何工作的：
- en: I identified the **5,000 most correlated column pairs** in the training data
    using mutual information. These are the most important relationships to preserve.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我使用互信息识别了训练数据中**5,000个最相关的列对**。这些是需要保留的最重要关系。
- en: IPF then calculated fractional weights for each of the 2.5 million synthetic
    rows. The weights were adjusted iteratively so that the weighted sums of the bivariate
    distributions in the synthetic pool matched the target distributions from the
    training data.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: IPF随后计算了2.5百万个合成行的分数权重。这些权重通过迭代调整，以确保合成池中双变量分布的加权和与训练数据中的目标分布相匹配。
- en: Finally, I used an expectation-rounding approach to convert these fractional
    weights into an integer count of how many times each row should be selected. This
    resulted in an oversized subset of 125,000 rows (1.25x the required size) that
    already had very strong bivariate accuracy.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我使用了一种期望四舍五入方法将这些分数权重转换为每个行应该被选择的整数计数。这导致了一个超集，包含125,000行（所需大小的1.25倍），并且已经具有非常强的双变量准确性。
- en: The IPF step provided a high-quality starting point for the next phase.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: IPF步骤为下一阶段提供了一个高质量的开端。
- en: Step 2: Trimming
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：修剪
- en: Generating an oversized subset of 125,000 rows from IPF was a deliberate choice
    that enabled this additional trimming step to remove samples that didn’t fit well.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 从IPF生成125,000行的超集是一个有意的选择，这使得可以执行额外的修剪步骤来移除不匹配的样本。
- en: I used a greedy approach that iteratively calculates the “error contribution”
    of each row in the current subset. The rows that contribute the most to the statistical
    distance from the target distribution are identified and removed. This process
    repeats until only 100,000 rows remain, ensuring that the worst 25,000 rows are
    discarded.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用了一种贪婪方法，该方法迭代地计算当前子集中每行的“误差贡献”。那些对目标分布的统计距离贡献最大的行被识别并移除。这个过程会重复进行，直到只剩下100,000行，确保最差的25,000行被丢弃。
- en: 'Step 3: Refinement (Swapping)'
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：优化（交换）
- en: The final step was an iterative refinement process to swap rows from the subset
    with better rows from the much larger, unused data pool (the remaining 2.4 million
    rows).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是一个迭代优化过程，通过从更大的未使用数据池（剩余的2.4百万行）中交换行来替换子集中的行。
- en: 'In each iteration, the algorithm:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在每次迭代中，算法：
- en: Identifies the worst rows within the current 100k subset (those contributing
    most to the L1 error).
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在当前100k子集中识别最差的行（那些对L1误差贡献最大的行）。
- en: Searches for the best replacement candidates from the outside pool that would
    reduce the L1 error if swapped in.
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在外部池中寻找最佳替换候选者，如果替换进去会减少L1误差。
- en: Performs the swap if it results in a better overall score.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果交换导致整体得分更好，则执行交换。
- en: As the accuracy of the synthetic sample is already quite high, the additional
    gain from this process is rather small.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 由于合成样本的准确性已经相当高，因此此过程带来的额外收益相当小。
- en: Adapting for the Sequential Challenge
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 适应序列挑战
- en: The SEQUENTIAL challenge required a similar approach, but with two changes.
    First, a sample consists of several rows, connected by the group ID. Secondly,
    the competition metric adds a measure for **coherence**. This means not only do
    the statistical distributions need to match, but the sequences of events also
    need to be similar to the source dataset.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: SEQUENTIAL挑战需要类似的方法，但有两个变化。首先，样本由几行组成，通过组ID连接。其次，竞赛指标增加了一个**连贯性**的度量。这意味着不仅统计分布需要匹配，事件的序列也需要与源数据集相似。
- en: '![](../Images/17100bc48b57fef12e229ff79a1c63d3.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/17100bc48b57fef12e229ff79a1c63d3.png)'
- en: A sample of the training dataset for the SEQUENTIAL challenge. Image by author.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: SEQUENTIAL挑战的训练数据集样本。图片由作者提供。
- en: 'My post-processing pipeline was adapted to handle groups and also optimize
    for coherence:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我的后处理流程被调整为处理组并优化连贯性：
- en: '**Coherence-Based Pre-selection**: Before optimizing for statistical accuracy,
    I ran a specialized refinement step. This algorithm iteratively swapped entire
    groups (sequences) to specifically match the coherence metrics of the original
    data, such as the distribution of “unique categories per sequence” and “sequences
    per category”. This ensured that we continued the post-processing with a sound
    sequential structure.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于连贯性的预选择**：在优化统计准确性之前，我运行了一个专门的细化步骤。该算法迭代地交换整个组（序列），以特别匹配原始数据的连贯性指标，例如“每个序列的独特类别分布”和“每个类别的序列”。这确保了我们继续后处理，保持良好的序列结构。'
- en: '**Refinement (Swapping)**: The 20,000 groups selected for coherence then went
    through the same statistical refinement process as the flat data. The algorithm
    swapped entire groups with better ones from the pool to minimize the L1 error
    of the uni-, bi-, and trivariate distributions. A secret ingredient was to include
    the “Sequence Length” as a feature, so the group lengths are also considered in
    the swapping.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**细化（交换）**：为了连贯性选出的20,000个组随后经历了与平坦数据相同的统计细化过程。算法将整个组与池中更好的组进行交换，以最小化单变量、双变量和三变量分布的L1误差。一个秘密成分是包括“序列长度”作为一个特征，因此组长度也在交换中考虑。'
- en: This two-stage approach ensured the final dataset was strong in both statistical
    accuracy and sequential coherence. Interestingly, the IPF-based approach that
    worked so well for the flat data was less effective for the sequential challenge.
    Therefore, I removed it to focus computing time on the coherence and swapping
    algorithms, which yielded better results.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这种两阶段方法确保了最终数据集在统计准确性和序列连贯性方面都很强。有趣的是，对于平坦数据效果很好的基于IPF的方法，在序列挑战中却不太有效。因此，我移除了它，将计算时间集中在连贯性和交换算法上，这产生了更好的结果。
- en: 'Making It Fast: Key Optimizations'
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让它变得快速：关键优化
- en: The post-processing strategy by itself was computationally expensive, and making
    it run within the competition time limit was a challenge in itself. To succeed,
    I relied on a few key optimizations.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 后处理策略本身计算成本很高，使其在竞赛时间限制内运行本身就是一项挑战。为了成功，我依赖几个关键优化。
- en: First, I **reduced the data types** wherever possible to handle the massive
    sample data pool without running out of memory. Changing the numerical type of
    a large matrix from 64-bit to 32 or 16-bit greatly reduces the memory footprint.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我在可能的情况下**减少了数据类型**，以处理大量的样本数据池而不会耗尽内存。将大型矩阵的数值类型从64位改为32或16位，可以大大减少内存占用。
- en: Secondly, when changing the data type was not enough, I used **sparse matrices**
    from SciPy. This technique allowed me to store the statistical contributions of
    each sample in an incredibly memory-efficient way.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，当更改数据类型不足以解决问题时，我使用了SciPy中的**稀疏矩阵**。这项技术使我能够以极低的内存效率方式存储每个样本的统计贡献。
- en: Lastly, the core refinement loop involved a lot of specialized calculations,
    some of which were very slow with `numpy`. To overcome this, I used `<strong>numba</strong>`.
    By extracting the bottlenecks in my code into specialized functions with the `@numba.njit`
    decorator, Numba automatically translated them into highly optimized machine code
    that runs at speeds comparable to C.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，核心细化循环涉及大量的专业计算，其中一些在`numpy`中非常慢。为了克服这一点，我使用了`<strong>numba</strong>`。通过将代码中的瓶颈提取到具有`@numba.njit`装饰器的专用函数中，Numba自动将它们转换为高度优化的机器代码，其运行速度与C语言相当。
- en: Here is an example of how I needed to speed up the summation of rows in sparse
    matrices, which was a major bottleneck in the original NumPy version**.**
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个例子，说明我需要加快稀疏矩阵中行求和的速度，这是原始NumPy版本中的主要瓶颈**。**
- en: '[PRE0]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: However, Numba is not a silver bullet; it’s helpful for numerical, loop-heavy
    code, but for most calculations, it is faster and easier to stick to vectorized
    NumPy operations. I advise you to only try it when a NumPy approach does not reach
    the required speed.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，Numba并非万能的银弹；它对于数值密集型和循环密集型的代码很有帮助，但对于大多数计算来说，坚持使用矢量化NumPy操作更快、更简单。我建议你只有在NumPy方法无法达到所需速度时才尝试使用它。
- en: Final Thoughts
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: '![](../Images/2328ed61f192db9d60329ea6cf071d91.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2328ed61f192db9d60329ea6cf071d91.png)'
- en: 'The top five submissions for each challenge. Source: [https://github.com/mostly-ai/the-prize-eval/](https://github.com/mostly-ai/the-prize-eval/tree/main).'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 每个挑战的前五名提交。来源：[https://github.com/mostly-ai/the-prize-eval/](https://github.com/mostly-ai/the-prize-eval/tree/main)。
- en: Even though ML models are getting increasingly stronger, I think that for most
    problems that Data Scientists are trying to solve, the secret ingredient is often
    not in the model. Of course, a strong model is an integral part of a solution,
    but the pre- and postprocessing are equally important. For these challenges, a
    post-processing pipeline targeted specifically for the evaluation metric led me
    to the winning solution, without any additional ML.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管机器学习模型正变得越来越强大，但我认为对于数据科学家试图解决的多数问题，关键因素往往不在于模型本身。当然，一个强大的模型是解决方案的重要组成部分，但预处理和后处理同样重要。对于这些挑战，一个专门针对评估指标的后处理流程引导我找到了获胜的解决方案，而且无需任何额外的机器学习。
- en: I learned a lot in this challenge, and I want to thank [Mostly AI](https://mostly.ai/)
