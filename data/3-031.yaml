- en: Talking to Kids About AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与孩子谈论人工智能
- en: 原文：[https://towardsdatascience.com/talking-to-kids-about-ai/](https://towardsdatascience.com/talking-to-kids-about-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/talking-to-kids-about-ai/](https://towardsdatascience.com/talking-to-kids-about-ai/)
- en: I’ve had the <mdspan datatext="el1746164844648" class="mdspan-comment">pleasant</mdspan>
    opportunity recently to be involved with a program called [Skype a Scientist](https://www.skypeascientist.com/),
    which pairs scientists of various types (biologists, botanists, engineers, computer
    scientists, etc) with classrooms of kids to talk about our work and answer their
    questions. I’m pretty familiar with discussing AI and machine learning with adult
    audiences, but this is the first time I’ve really sat down to think about how
    to talk to kids about this subject matter, and it’s been an interesting challenge.
    Today I’m going to share a few of the ideas I’ve come up with as part of the process,
    which may be useful to those of you with kids in your lives in some way.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 最近我有幸参与了一个名为[Skype a Scientist](https://www.skypeascientist.com/)的项目，该项目将各种类型的科学家（生物学家、植物学家、工程师、计算机科学家等）与孩子们的课堂配对，讨论我们的工作和回答他们的问题。我相当熟悉与成人听众讨论人工智能和机器学习，但这是我第一次真正坐下来思考如何与孩子们谈论这个主题，这确实是一个有趣的挑战。今天，我将分享我在这个过程中想到的一些想法，这些想法可能对那些在生活中以某种方式与孩子有关的人有所帮助。
- en: Preparing to Explain Something
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备解释某事
- en: I have a few rules of thumb I follow when preparing any talk, for any audience.
    I need to be very clear in my own mind about what information I intend to impart,
    and what new things the audience should know after they leave, because this shapes
    everything about what information I’m going to share. I also want to present my
    material at an appropriate level of complexity for the audience’s preexisting
    knowledge — not talking down, but also not way over their heads.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在准备任何演讲，无论面向哪个听众时，我都有一些经验法则。我需要在心里非常清楚我打算传达哪些信息，以及听众在离开后应该了解哪些新事物，因为这将决定我将分享的信息。我还想以适合听众现有知识水平的适当复杂度呈现我的材料——既不高高在上，也不低于他们的理解能力。
- en: In my day to day life, I’m not necessarily up to speed on what kids already
    know (or think they know) about AI. I want to make my explanations appropriate
    to the level of the audience, but in this case I have somewhat limited insight
    about where they’re coming from already. I have been surprised in some cases that
    the kids were actually quite aware of things like competition in AI between companies
    and across international boundaries. A useful exercise when deciding how to frame
    the content is coming up with metaphors that use concepts or technologies the
    audience is already very familiar with. Thinking about this also gives you an
    access point to where the audience is coming from. Beyond that, be prepared to
    pivot and adjust your presentation approach, if you determine that you’re not
    hitting the right level. I like to ask kids a little bit about what they think
    of AI and what they know at the start, so I can start to get that clarity before
    I’m too far along.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的日常生活中，我并不一定了解孩子们对人工智能的了解（或他们认为他们了解的）。我希望我的解释适合听众的水平，但在这个情况下，我对他们已有的观点了解有限。在某些情况下，我惊讶地发现孩子们实际上对像公司之间以及国际边界上的人工智能竞争这样的问题相当了解。在决定如何构建内容时，想出使用听众已经非常熟悉的概念或技术的隐喻是一个有用的练习。思考这一点也为你提供了一个了解听众来源的切入点。除此之外，如果你确定你的演讲没有达到正确的水平，要准备好调整你的演讲方式。我喜欢在开始时问孩子们他们对人工智能的看法以及他们知道什么，这样我可以在走得太远之前开始获得这种清晰度。
- en: Understanding the Technology
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解技术
- en: With kids in particular, I’ve got a number of themes I want to cover in my presentations.
    Regular readers will know [I’m a big advocate for laypersons being taught what
    LLMs and other AI models are trained to do](https://www.stephaniekirmer.com/writing/machinelearningspublicperceptionproblem/),
    and what their training data is, because that is vital for us to set realistic
    expectations for what the models’ results will be. I think it’s easy for anyone,
    kids included, to be taken in by the anthropomorphic nature of LLM tone, voice,
    and even “personality” and to lose track of the limitations in reality of what
    these tools can do.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是对孩子来说，我在我的演示中想要涵盖许多主题。经常阅读的读者会知道，[我强烈主张普通人了解LLMs和其他AI模型被训练去做的事情](https://www.stephaniekirmer.com/writing/machinelearningspublicperceptionproblem/)，以及它们的训练数据，因为这对我们设定对模型结果的现实预期至关重要。我认为任何人，包括孩子，都很容易被LLMs的语气、声音甚至“个性”的拟人化特性所吸引，从而忽略了这些工具在现实中的局限性。
- en: It’s a challenge to make it simple enough to be age-appropriate, but once you
    tell them about how training works, and how an LLM learns from seeing examples
    of written material, or a diffusion model learns from text-image pairs, they can
    interpolate their own intuition about what the results of that might be. As AI
    agents become more complex, and the underlying mechanisms get tougher to separate
    out, it’s important for users to know about the building blocks that lead to this
    capability.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让它足够简单以适合年龄是一个挑战，但一旦你告诉他们训练是如何进行的，以及LLM是如何通过观察书面材料的例子来学习的，或者扩散模型是如何通过文本-图像对来学习的，他们就可以推断出这些可能的结果。随着AI代理变得更加复杂，以及底层机制变得更加难以分离，用户了解导致这种能力的基础模块就变得很重要。
- en: For myself, I start with explaining training as a general concept, avoiding
    as much technical jargon as possible. When talking to kids, a little anthropomorphizing
    language can help make things seem a little less mysterious. For example, “we
    give computers lots of information and ask them to learn the patterns inside.”
    Next, I’ll describe examples of patterns like those in language or image pixels,
    because “patterns” by itself is too general and vague. Then, “those patterns it
    learns are written down using math, and then that math is what is inside a ‘model’.
    Now, when we give new information to the model, it sends us a response that is
    based on the patterns it learned.” From there, I give another end to end example,
    and walk through the process of a simplified training (usually a time series model
    because it’s pretty easy to visualize). After this, I’ll go into more detail about
    different types of model, and explain what’s different about neural networks and
    language models, to the degree that’s appropriate for the audience.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我自己来说，我首先从解释训练作为一个一般概念开始，尽可能避免使用技术术语。当与孩子交谈时，一点拟人化的语言可以帮助使事物看起来不那么神秘。例如，“我们给计算机大量的信息，并要求它们学习其中的模式。”接下来，我将描述语言或图像像素中的模式等例子，因为“模式”本身太过于宽泛和模糊。然后，“它所学习的模式是用数学写下来的，而那个数学就是‘模型’里面的内容。现在，当我们向模型提供新信息时，它发送给我们一个基于它所学习的模式的响应。”从那里，我给出另一个端到端示例，并解释简化训练的过程（通常是一个时间序列模型，因为它很容易可视化）。在此之后，我将更详细地介绍不同类型的模型，并解释神经网络和语言模型之间的不同之处，这取决于听众的适当程度。
- en: AI Ethics and Externalities
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能伦理和外部性
- en: I also want to cover ethical issues related to AI. I think kids who are in later
    elementary or middle grades and up are perfectly capable of understanding the [environmental](https://www.stephaniekirmer.com/writing/environmentalimplicationsoftheaiboom/) and [social
    impacts](https://www.stephaniekirmer.com/writing/seeingourreflectioninllms/) that
    AI can have. Many kids today seem to me to be quite advanced in their understanding
    of global climate change and the environmental crisis, so talking about how much
    power, water, and rare mineral usage is required to run LLMs isn’t unreasonable.
    It’s just important to make your explanations relatable and age appropriate. As
    I mentioned earlier, use examples that are relatable and connect to the lived
    experiences of your audience.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想要涵盖与AI相关的伦理问题。我认为在更高年级的小学或中学以及以上的孩子完全有能力理解AI可能带来的[环境](https://www.stephaniekirmer.com/writing/environmentalimplicationsoftheaiboom/)和[社会影响](https://www.stephaniekirmer.com/writing/seeingourreflectioninllms/)。在我看来，现在的许多孩子在理解全球气候变化和环境危机方面似乎相当先进，因此讨论运行LLMs所需的电力、水和稀有矿物的使用量并不无理。只是重要的是要使你的解释与听众的生活经验相关联，并适合他们的年龄。正如我之前提到的，使用与听众生活经验相关的例子，并将它们与听众的生活经验联系起来。
- en: Here’s an example of going from kid experience to the environmental impact of
    AI.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个从孩子体验到AI对环境影响的事例。
- en: '*“So you all have chromebooks to use for homework, right? Do you ever find
    that when you sit with your laptop on your lap and do work for a long time that
    the back gets warm? Maybe if you have a lot of files open at once, or watch a
    lot of videos? So that heating up is the same thing that happens in big computers
    called servers that run when an LLM is trained or is used, like when you go on
    chatGPT’s website.*'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“所以你们都有用于作业的chromebook，对吧？你们有没有发现，当你们长时间坐在笔记本电脑上工作，背部会变暖？也许如果你同时打开很多文件，或者看很多视频？所以这种加热与当大型计算机，也就是服务器在训练或使用大型语言模型（LLM）时发生的情况是一样的，比如当你访问chatGPT的网站时。*'
- en: ''
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*The data centers that keep chatGPT going are full of servers that are all
    running simultaneously, and all getting pretty darn hot, which isn’t good for
    the machinery. So, sometimes these data centers use cool water plus some chemicals
    together piped through tubes that go right over all the servers, and these help
    cool off the machines and keep them running. However, this means that a ton of
    water is being used, mixed with chemicals, and heated up as it goes through these
    systems, and it can mean that that water isn’t available for people to use for
    other things like farms or drinking water.*'
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*维持chatGPT运行的数据中心充满了同时运行的服务器，它们都变得非常热，这对机器来说可不是什么好事。所以，有时这些数据中心会使用冷却水加上一些化学物质，通过管道直接流过所有服务器，这些可以帮助冷却机器并保持它们运行。然而，这也意味着大量的水被使用，混合了化学物质，并且在通过这些系统时被加热，这意味着这些水可能无法供人们用于其他用途，比如农业或饮用水。*'
- en: ''
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Other times, these data centers use big air conditioners, which take a lot
    of electricity to run, which means there may not be enough electricity for our
    houses or for businesses. Electricity is also sometimes made by burning coal in
    power plants, which puts out exhaust into the air and increases pollution too.
    ”*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*有时，这些数据中心使用大型空调，这需要消耗大量的电力来运行，这意味着可能没有足够的电力供我们的家庭或企业使用。电力有时是通过在发电厂燃烧煤炭来制造的，这会将废气排放到空气中，并增加污染。“*'
- en: This brings the kid’s experience into the conversation, and gives them a tangible
    way to relate to the concept. You can do similar kinds of discussion around copyright
    ethics and stealing content, using artists and creators familiar to the children,
    without having to get deep in the weeds of IP law. Deepfakes, both sexual and
    otherwise, are certainly a topic lots of kids know about too, and it’s important
    that children are aware of the risks those present to individuals and the community
    as they use AI.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这将孩子的体验带入对话中，并给他们提供了一种具体的方式来与这个概念建立联系。你可以围绕版权伦理和内容盗用进行类似的讨论，使用孩子们熟悉的艺术家和创作者，而不必深入研究知识产权法。深度伪造，无论是性方面的还是其他方面的，也是许多孩子都知道的话题，重要的是孩子们在使用AI时意识到这些风险对个人和社区的影响。
- en: It can be scary, especially for younger kids, when they start to grasp some
    of the unethical applications of AI or global challenges it creates, and realize
    how powerful some of this stuff can be. I’ve had kids ask “how can we fix it if
    someone teaches AI to do bad things?”, for example. I wish I had better answers
    for that, because I had to essentially say “AI already sometimes has the information
    to do bad things, but there are also lots of people working hard to make AI more
    safe and prevent it from sharing any bad information or instructions on how to
    do bad things.”
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当孩子们开始理解AI的不道德应用或它创造的全球挑战，并意识到这些事物有多么强大时，可能会感到害怕，尤其是对年幼的孩子来说。我曾遇到过孩子问“如果有人教AI做坏事，我们怎么去修复它？”这样的问题。我希望我能有更好的答案，因为我实际上只能大致说“AI有时已经拥有做坏事的信息，但也有很多人在努力使AI更安全，防止它分享任何坏信息或如何做坏事的指令。”
- en: Unpacking the Idea of “Truth”
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解构“真相”这一概念
- en: The anthropomorphizing of AI problem is true for adults and kids both – we tend
    to trust a friendly, confident voice when it tells us things. A large part of
    the problem is that the LLM voice telling us things is frequently friendly, confident,
    and wrong. The concept of media literacy has been an important topic in pedagogy
    for years now, and [expanding this to LLMs is a natural progression](https://www.sciencedirect.com/science/article/pii/S2666920X21000357).
    Just like students (and adults) need to learn to be critical consumers of information
    generated by other people or corporations, we need to be critical and thoughtful
    consumers of computer-generated content.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能拟人化问题对成人和孩子都适用——我们倾向于信任一个友好、自信的声音在告诉我们事情。这个问题的大部分原因在于，经常告诉我们事情的LLM声音是友好、自信且错误的。媒体素养的概念在教育学中已经是一个重要的主题多年了，将这一概念扩展到LLM上是一种自然的进步[expanding
    this to LLMs is a natural progression](https://www.sciencedirect.com/science/article/pii/S2666920X21000357)。就像学生（和成人）需要学会成为他人或公司生成信息的批判性消费者一样，我们也需要成为批判性和深思熟虑的计算机生成内容的消费者。
- en: I think this goes along with understanding the tech, too. When I explain that [an
    LLM’s job is to learn and replicate human language, at the simplest level by selecting
    the probable next word in a series based on what came before](https://www.stephaniekirmer.com/writing/whatdoesitmeanwhenmachinelearningmakesamistake/),
    it makes sense when I go on to say that the LLM can’t understand the idea of “truth”.
    Truth isn’t part of the training process, and at the same time truth is a really
    hard concept even for people to figure out. The LLM might get the facts right
    frequently, but the blind spots and potential mistakes are going to show up from
    time to time, by the nature of probability. As a result, kids who use it need
    to be very conscious of the fallibility of the tool.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这也与理解技术有关。当我解释说[LLM的工作是学习和复制人类语言，在最低层次上是通过根据之前的内容选择可能的下一个词来实现的](https://www.stephaniekirmer.com/writing/whatdoesitmeanwhenmachinelearningmakesamistake/)，当我继续说LLM无法理解“真理”的概念时，这是有意义的。真理不是训练过程的一部分，同时真理对人类来说也是一个很难理解的概念。LLM可能会频繁地得到事实正确，但盲点和潜在的错误会不时地因为概率的本质而出现。因此，使用它的孩子们需要非常清醒地意识到这个工具的不可靠性。
- en: This lesson actually has value beyond just the use of AI, however, because what
    we’re teaching is about dealing with uncertainty, ambiguity, and mistakes. As [Bearman
    and Ajjawi (2023)](https://bera-journals.onlinelibrary.wiley.com/doi/full/10.1111/bjet.13337) note,
    “pedagogy for an AI-mediated world involves learning to work with opaque, partial
    and ambiguous situations, which reflect the entangled relationships between people
    and technologies.” I really like this framing, because it comes back around to
    something I think about a lot — that LLMs are created by humans and reflect back
    interpretations of human-generated content. When kids learn how models come to
    exist, that models are fallible, and that their output originates from human-generated
    input, they’re getting familiar with the blurry nature of how technology works
    today in our society more broadly. (In fact, I highly recommend the article in
    full for anyone who’s thinking about how to teach kids about AI themselves.)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个课程的实际价值并不仅限于AI的使用，因为我们所教授的是如何处理不确定性、模糊性和错误。正如[Bearman和Ajjawi (2023)](https://bera-journals.onlinelibrary.wiley.com/doi/full/10.1111/bjet.13337)
    指出的，“AI介导世界的教育学涉及学习如何与不透明、不完整和模糊的情况合作，这反映了人与人、技术与技术之间的复杂关系。”我真的很喜欢这种框架，因为它回到了我经常思考的事情上——LLM是由人类创造的，并反映了人类生成内容的意义。当孩子们学习模型是如何产生的，模型是可能出错的，以及它们的输出源自人类生成输入时，他们正在熟悉我们社会中技术工作的模糊性质。（事实上，我强烈推荐全文给任何考虑如何教孩子关于AI的人。）
- en: A side note on images and video
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于图像和视频的补充说明
- en: '[As I’ve written about before](https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/),
    the profusion of deepfake/”AI slop” video and image content online creates a lot
    of difficult questions. This is another area where I think giving kids information
    is important, because it’s easy to absorb misinformation or outright lies through
    convincing visual content. This content is also one step away from the actual
    creation process for most kids, as a lot of this material is being shared widely
    on social media, and is unlikely to be labeled. Talking to kids about what tell-tale
    signs help to detect AI generated material can help, as well as general critical
    media literacy skills like “if it’s too good to be true, it’s probably fake” and
    “double check things you hear in this kind of post”.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[正如我之前所写](https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/)，在线上大量出现的深度伪造/“AI垃圾”视频和图像内容引发了许多难题。这也是我认为向孩子们提供信息很重要的另一个领域，因为通过令人信服的视觉内容很容易吸收错误信息或谎言。对于大多数孩子来说，这种内容也只离实际创作过程一步之遥，因为大量这种材料在社交媒体上广泛传播，并且不太可能被标记。与孩子们谈论哪些明显的迹象有助于检测人工智能生成的材料，以及像“如果它好得令人难以置信，那它可能就是假的”和“在这样帖子中听到的事情要双重检查”这样的通用批判性媒体素养技能，都有所帮助。'
- en: Cheating
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 作弊
- en: However much we explain the ethical issues and the risks that the LLM will be
    wrong, these AI tools are incredibly useful and seductive, so it’s understandable
    that some kids will resort to using them to cheat on homework and in school. I’d
    like to say that we need to just reason with them, and explain that learning the
    skills to do the homework is the point, and if they don’t learn it they’ll be
    missing capabilities they need for future grades and later life… but we all know
    that kids are very rarely that logical. Their brains are still developing, and
    this sort of thing is hard even for adults to reason about at times.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 无论我们解释多少关于LLM可能出错伦理问题和风险，这些AI工具都非常有用且诱人，因此一些孩子会求助于使用它们来完成家庭作业和在学校作弊是可以理解的。我想说，我们需要与他们进行理性对话，并解释学习完成作业的技能才是重点，如果他们不学习这些技能，他们就会错过未来成绩和未来生活中需要的技能……但我们都知道，孩子们很少是那么理性的。他们的头脑仍在发育，有时这种事情甚至对成年人来说也很难进行理性思考。
- en: 'There are two approaches you might take, essentially: find ways to make schoolwork
    harder or impossible to cheat on, or incorporate AI into the classroom under the
    assumption that kids are going to have it at their disposal in the future. Now,
    monitored work in a classroom setting can give kids a chance to learn some skills
    they need to have without digital mediation. However, as I mentioned earlier,
    media literacy really has to include LLMs now, and I think supervised use of LLMs
    by an informed instructor can have plenty of pedagogical value. In addition, it’s
    really impossible to “AI-proof” homework that’s done outside of direct instructor
    supervision, and we should recognize that. I don’t want to make it sound like
    this is easy, however — see below in the **Further Reading** section for a number
    of scholarly articles on the broad challenges of teaching AI literacy in the classroom.
    Teachers have a very challenging task to try not only to keep up on the technology
    themselves and evolve their pedagogy to fit the times, but also to try and give
    their students the information they need to use AI responsibly.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能采取两种基本方法：要么找到让学校作业变得更难或无法作弊的方法，要么在假设孩子们未来会拥有它的情况下，将人工智能融入课堂。现在，在课堂环境下的监控作业可以给孩子们一个机会，在没有数字媒介介入的情况下学习他们需要的一些技能。然而，正如我之前提到的，媒体素养现在真的必须包括大型语言模型（LLMs），我认为由有知识的教师监督使用LLMs可以具有很大的教学价值。此外，要“AI化”直接教师监督之外的作业几乎是不可能的，我们应该认识到这一点。然而，我不想让它听起来很容易——请参阅下文**进一步阅读**部分，其中包含许多关于在课堂上教授AI素养的广泛挑战的学术文章。教师们面临着一个非常艰巨的任务，不仅要跟上技术发展并使他们的教学法适应时代，还要尝试给学生提供他们需要的信息，以便负责任地使用人工智能。
- en: Learning from the Example of Sex Ed
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从性教育案例中学习
- en: In the end, the question is what exactly we ought to be recommending kids do
    and not do in a world that contains AI, in the classroom and beyond. I’m rarely
    an advocate for banning or prohibition of ideas, and I think the example of science-based,
    age-appropriate comprehensive sex education presents a good lesson. If children
    are not given accurate information about their bodies and sexuality, they don’t
    have the knowledge necessary to make informed, responsible decisions in that area. [We
    learned this when abstinence-only sex ed made teen pregnancy rates](https://pmc.ncbi.nlm.nih.gov/articles/PMC3194801/) [go
    through the roof in the early 2000’s.](https://www.nyu.edu/about/news-publications/news/2022/february/federally-funded-sex-education-programs-linked-to-decline-in-tee.html) Adults
    will not be present to enforce mandates when kids are making the difficult decisions
    about what to do in challenging circumstances, so we need to make sure the kids
    are equipped with the information required to make those decisions responsibly
    themselves, and this includes ethical guidance but also factual information.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，问题是我们在一个包含人工智能的世界中，应该建议孩子们做什么，不应该做什么。我很少是禁止或禁止思想的倡导者，我认为基于科学的、适合年龄的综合性性教育提供了一个很好的例子。如果孩子们没有得到关于他们身体和性方面的准确信息，他们就没有做出明智、负责任的决定所必需的知识。[我们是在禁欲性教育导致2000年代初青少年怀孕率激增时了解到这一点的](https://pmc.ncbi.nlm.nih.gov/articles/PMC3194801/)。[联邦资助的性教育项目与青少年怀孕率的下降有关](https://www.nyu.edu/about/news-publications/news/2022/february/federally-funded-sex-education-programs-linked-to-decline-in-tee.html)。当孩子们在困难情况下做出艰难决定时，成年人不会在场执行命令，因此我们需要确保孩子们拥有做出这些决定所需的信息，这包括道德指导，也包括事实信息。
- en: Modeling Responsibility
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 树立责任感
- en: One last thing that I think is important to mention is that adults should be
    modeling responsible behavior with AI too. If teachers, parents, and other adults
    in kids’ lives are not critically literate about AI, then they aren’t going to
    be able to teach kids to be critical and thoughtful consumers of this technology
    either.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我认为还有一点很重要，那就是成年人也应该在人工智能方面树立负责任的行为榜样。如果教师、父母以及孩子们生活中的其他成年人对人工智能缺乏批判性素养，那么他们也无法教会孩子们成为批判性和深思熟虑的技术消费者。
- en: A [recent New York Times story](https://www.nytimes.com/2025/04/14/us/schools-ai-teachers-writing.html) about
    how teachers use AI made me a little frustrated. The article doesn’t reflect a
    great understanding of AI, conflating it with some basic statistics (a teacher
    analyzing student data to help personalize his teaching to their levels is both
    not AI and not new or problematic), but it does start a conversation about how
    adults in kids’ lives are using AI tools, and it mentions the need for those adults
    to model transparent and critical uses of it. (It also briefly grazes the issue
    of for-profit industry pushing AI into the classroom, which seems like a problem
    deserving more time — maybe I’ll write about that down the road.)
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一篇关于教师如何使用人工智能的[近期《纽约时报》报道](https://www.nytimes.com/2025/04/14/us/schools-ai-teachers-writing.html)让我有些沮丧。文章并没有很好地理解人工智能，将其与一些基本统计学混淆（一位分析学生数据以帮助个性化教学的教师既不是人工智能，也不是新事物或问题），但它确实开启了一场关于孩子们生活中的成年人如何使用人工智能工具的对话，并提到这些成年人需要以身作则，透明且批判性地使用它。（它也简要地触及了盈利行业将人工智能推入课堂的问题，这似乎是一个需要更多时间解决的问题——也许我会在将来写关于这个话题的文章。）
- en: To counter one assertion of the piece, I wouldn’t complain about teachers using
    LLMs to do a first pass at grading written material, as long as they are monitoring
    and validating the output. If the grading criteria are around grammar, spelling,
    and writing mechanics, an LLM is probably suitable based on how it’s trained.
    I wouldn’t want to blindly trust an LLM on this without a human taking at least
    a quick look, but human language is in fact what it’s designed to understand.
    The idea that “the student had to write it, so the teacher should have to grade
    it” is silly, because the purpose of the exercise is for the student to learn.
    Teachers already know the writing mechanics, this is not a project that is meant
    to force teachers to learn something that is only achievable by manually grading.
    I think the NYT knows this, and that the framing was mostly for clickbait purposes,
    but it’s worth saying clearly.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 为了反驳这篇文章中的一个观点，只要他们监控并验证输出结果，我不会抱怨教师使用大型语言模型（LLM）来初步批改书面材料。如果评分标准是语法、拼写和写作技巧，基于其训练方式，LLM可能适合。我不希望在没有人类至少快速查看的情况下盲目信任LLM，但人类语言正是它被设计来理解的。认为“学生必须写出来，所以老师必须批改”的想法是愚蠢的，因为这项练习的目的是让学生学习。教师已经知道写作技巧，这不是一个旨在强迫教师学习只能通过人工批改才能实现的东西的项目。我认为《纽约时报》知道这一点，而且这种框架主要是为了吸引点击量，但清楚地说明这一点是值得的。
- en: This point goes back, once again, to my earlier section about understanding
    the technology. If you confidently understand what the training process looks
    like, then you can decide whether that process would produce a tool that’s capable
    of managing a task, or not. But automating grading has been part of schooling
    for decades at least — anyone who’s filled out a scantron sheet knows that.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这个观点再次回到了我之前关于理解技术的部分。如果你自信地理解了训练过程的样子，那么你可以决定这个过程是否会产生一个能够管理任务的工具。但自动评分至少已经在学校中存在了几十年——任何填写过扫描卷的人都知道这一点。
- en: This technology’s development is forcing some amount of adaptation in our education
    system, but we can’t put that genie back in the bottle now. There are definitely
    some ways that AI can have positive effects on education (often cited examples
    are personalization and saving teachers time that can then be put towards direct
    student services), but as with most things I’m an advocate for a realistic view.
    As I believe most educators are only too well aware, education can’t just go on
    as it did before LLMs entered our lives.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术的发展正在迫使我们的教育体系进行一些适应，但现在我们无法把那个精灵放回瓶子里。确实有一些方式人工智能可以对教育产生积极影响（经常引用的例子是个性化以及节省教师时间，这些时间可以用于直接为学生提供服务），但就像大多数事情一样，我倡导一种现实的观点。正如我相信大多数教育工作者都非常清楚的那样，教育不能像LLM进入我们的生活之前那样继续进行。
- en: Conclusion
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Kids are smarter than we sometimes give them credit for, and I think they are
    capable of understanding a lot about what AI means in our world. My advice is
    to be transparent and forthright about the realities of the technology, including
    advantages and disadvantages it represents to us as individuals and to our broader
    society. How we use it ourselves will model to kids either positive or negative
    choices that they’re going to notice, so being thoughtful about our actions as
    well as what we say is key.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 孩子们比我们有时给予他们的评价要聪明，我认为他们能够理解我们世界中人工智能的很多含义。我的建议是关于技术的现实情况要透明和坦率，包括它对我们个人和更广泛社会的利弊。我们如何使用它将向孩子们展示他们将要注意到的积极或消极的选择，因此，我们不仅要思考我们的行为，还要思考我们说的话是关键。
