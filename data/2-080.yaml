- en: 'When Models Stop Listening: How Feature Collapse Quietly Erodes Machine Learning
    Systems'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 当模型停止倾听：特征崩溃如何悄然侵蚀机器学习系统
- en: 原文：[https://towardsdatascience.com/when-models-stop-listening-how-feature-collapse-quietly-erodes-machine-learning-systems/](https://towardsdatascience.com/when-models-stop-listening-how-feature-collapse-quietly-erodes-machine-learning-systems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/when-models-stop-listening-how-feature-collapse-quietly-erodes-machine-learning-systems/](https://towardsdatascience.com/when-models-stop-listening-how-feature-collapse-quietly-erodes-machine-learning-systems/)
- en: 'A <mdspan datatext="el1754051218345" class="mdspan-comment">model</mdspan>
    was implemented, studied, and proved. It was right in its predictions, and its
    metrics were consistent. The logs were clean. However, with time, there was a
    growing number of minor complaints: edge cases that were not accommodated, sudden
    decreases in adaptability, and, here and there, failures of a long-running segment.
    No drift, no signal degradation was evident. The system was stable and yet somehow
    no longer reliable.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 一个<mdspan datatext="el1754051218345" class="mdspan-comment">模型</mdspan>被实施、研究和证明。它的预测是正确的，其指标是一致的。日志是干净的。然而，随着时间的推移，出现了越来越多的微小投诉：未得到妥善处理的边缘情况、适应性突然下降，以及这里那里的长期段失败。没有漂移，没有信号退化是明显的。系统是稳定的，但不知何故，不再可靠。
- en: The problem was not what the model was able to predict, but what it had ceased
    listening to.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 问题不在于模型能够预测什么，而在于它已经停止倾听什么。
- en: This is the silent threat of feature collapse, a systematic reduction of the
    input attention of the model. It occurs when a model starts working only with
    a small number of high-signal features and disregards the rest of the input space.
    No alarms are rung. The dashboards are green. However, the model is more rigid,
    brittle, and less aware of variation at the time when it is required most.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这是特征崩溃的隐形威胁，即模型输入注意力的系统性减少。它发生在模型开始仅使用少数高信号特征，并忽视其余输入空间时。没有发出警报。仪表盘显示绿色。然而，当模型在最需要的时候，它变得更加僵硬、脆弱，并且对变化的意识更少。
- en: The Optimization Trap
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化陷阱
- en: Models Optimize for Speed, Not Depth
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型优化的是速度，而不是深度
- en: The collapse of features is not due to an error; it happens when optimization
    overperforms. Gradient descent exaggerates any feature that generates early predictive
    advantages when models are trained over large datasets. The training update is
    dominated by inputs that correlate fast with the target. This makes a self-reinforcing
    loop in the long run, as a few features gain more weight, and others become underutilized
    or forgotten.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 特征崩溃并非由于错误；它发生在优化过度时。当模型在大数据集上训练时，梯度下降会夸大任何在早期预测中产生优势的特征。训练更新主要由与目标快速相关的输入主导。这导致长期形成一个自我强化的循环，因为少数特征获得更多权重，而其他特征则被低估或遗忘。
- en: This tension is experienced throughout architecture. Early splits usually characterize
    the tree hierarchy in gradient-boosted trees. Dominant input pathways in transformers
    or deep networks dampen alternate explanations. The end product is a system that
    performs well until it is called upon to generalize outside its limited trail.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这种紧张感贯穿于整个架构中。早期的分割通常表征梯度提升树中的树层次结构。在转换器或深度网络中占主导地位输入路径会抑制其他解释。最终产品是一个系统，它在被要求在有限的范围内泛化之前表现良好。
- en: 'A Real-World Pattern: Overspecialization Through Proxy'
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 真实世界的模式：通过代理的过度专业化
- en: Take an example of a personalization model trained as a content recommender.
    The model discovers that engagement is very predictable on the basis of recent
    click behavior during early training. Other signals, e.g., length of a session,
    variety of contents, or relevance of topics, are displaced as optimization continues.
    There is an increase in short-term measures such as click-through rate. However,
    the model is not flexible when a new form of content is introduced. It has been
    overfitted to one behavioral proxy and cannot reason outside of it.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个作为内容推荐器训练的个性化模型为例。该模型在早期训练期间发现，基于最近的点击行为，参与度非常可预测。随着优化的继续，其他信号，例如会话长度、内容多样性或主题的相关性，则被取代。短期指标，如点击率有所上升。然而，当引入新的内容形式时，模型不够灵活。它已经过度拟合了一个行为代理，并且无法超出它进行推理。
- en: This is not only about the lack of one kind of signal. It is a matter of failing
    to adapt, since the model has forgotten how to utilize the rest of the input space.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是没有一种信号的问题。这是一个适应失败的问题，因为模型已经忘记了如何利用其余的输入空间。
- en: '![](../Images/ba64b74a86c3cb13fc62fd1cf5243ea8.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ba64b74a86c3cb13fc62fd1cf5243ea8.png)'
- en: Flow of Feature Collapse (Image by author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 特征崩溃的流程（图片由作者提供）
- en: Why Collapse Escapes Detection
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么崩溃逃过了检测
- en: Good Performance Masks Bad Reliance
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优秀的性能掩盖了糟糕的依赖
- en: The feature collapse is subtle in the sense that it is invisible. A model that
    makes use of just three powerful features may perform better than one that makes
    use of ten, particularly when the remaining features are noisy. However, when
    the environment is different, i.e., new users, new distributions, new intent,
    the model does not have any slack. During training, the ability to absorb change
    was destroyed, and the deterioration occurs at a slow pace that cannot be easily
    noticed.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 特征崩溃在微妙之处在于它是不可见的。一个仅使用三个强大特征的模型可能比使用十个特征的模型表现更好，尤其是当剩余的特征是噪声时。然而，当环境不同，即新用户、新分布、新意图时，模型没有任何余地。在训练过程中，吸收变化的能力被破坏，恶化以缓慢的速度发生，不易被察觉。
- en: One of the cases involved a fraud detection model that had been highly accurate
    for months. However, when the attacker’s behavior changed, with transaction time
    and routing being varied, the model did not detect them. An attribution audit
    showed that only two fields of metadata were used to make almost 90 percent of
    the predictions. Other fraud-related characteristics that were initially active
    were no longer influential; they had been outdone in training and simply left
    behind.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个案例涉及一个在数月内高度准确的欺诈检测模型。然而，当攻击者的行为改变，交易时间和路由发生变化时，模型没有检测到它们。归因审计显示，只有两个元数据字段被用来做出近90%的预测。最初活跃的其他与欺诈相关的特征不再有影响力；它们在训练中被超越，只是简单地被遗弃了。
- en: Monitoring Systems Aren’t Designed for This
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 监控系统没有为此而设计
- en: Standard MLOps pipelines monitor for prediction drift, distribution shifts,
    or inference errors. But they rarely track how feature importance evolves. Tools
    like SHAP or [LIME](https://www.datacamp.com/tutorial/explainable-ai-understanding-and-trusting-machine-learning-models)
    are often used for static snapshots, helpful for model interpretability, but not
    designed to track collapsing attention.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 标准的MLOps管道监控预测漂移、分布偏移或推理错误。但它们很少跟踪特征重要性的演变。SHAP或[LIME](https://www.datacamp.com/tutorial/explainable-ai-understanding-and-trusting-machine-learning-models)等工具通常用于静态快照，有助于模型可解释性，但不是设计来跟踪崩溃的注意力。
- en: The model can go from using ten meaningful features to just two, and unless
    you’re auditing temporal attribution trends, no alert will fire. The model is
    still “working.” But it’s less intelligent than it used to be.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 模型可以从使用十个有意义的特征变为仅使用两个，除非你正在审计时间归因趋势，否则不会触发任何警报。模型仍在“工作”。但它不如以前聪明。
- en: Detecting Feature Collapse Before It Fails You
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在它让你失败之前检测特征崩溃
- en: 'Attribution Entropy: Watching Attention Narrow Over Time'
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 归因熵：观察注意力随时间变窄
- en: A decline in attribution entropy, the distributional variance of feature contributions
    during inference, is one of the most obvious pre-training indicators. On a healthy
    model, the entropy of SHAP values ought to remain relatively high and constant,
    indicating a variety of feature influence. When the trend is downwards, it is
    an indication that the model is making its decisions on fewer and fewer inputs.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 归因熵的下降，即在推理过程中特征贡献的分布方差，是预训练中最明显的指标之一。在一个健康的模型中，SHAP值的熵应该保持相对较高且稳定，表明各种特征影响。当趋势向下时，这表明模型正在基于越来越少的信息做出决策。
- en: The SHAP entropy can be logged during retraining or validation slices to show
    entropy cliffs, points of attention diversity collapse, which are also the most
    likely precursors of production failure. It is not a standard tool in most of
    the stacks, though it ought to be.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在重新训练或验证切片期间可以记录SHAP熵，以显示熵悬崖、注意力多样性崩溃的点，这些也是生产失败最可能的先兆。尽管它应该在大多数堆栈中成为标准工具，但它并不是。
- en: '![](../Images/baf704a7c349a4fdaf57a5123c3b1aa9.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/baf704a7c349a4fdaf57a5123c3b1aa9.png)'
- en: SHAP Entropy Over Epochs (Image by author)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: SHAP熵随时间变化（图片由作者提供）
- en: Systemic Feature Ablation
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 系统性特征消除
- en: Silent ablation is another indication, in which the elimination of a feature
    that is expected to be significant results in no observable changes in output.
    This does not imply that the feature is useless; it means that the model no longer
    takes it into account. Such an effect is dangerous when it is used on segment-specific
    inputs such as user attributes, which are only important in niche cases.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 沉默消融是另一种指示，其中预期具有显著影响的特征的消除导致输出没有可观察的变化。这并不意味着该特征无用；这意味着模型不再考虑它。当用于特定段落的输入，如用户属性时，这种影响是危险的，因为用户属性仅在特定案例中很重要。
- en: Periodic or CI validation ablation tests that are segment-aware can detect asymmetric
    collapse, when the model performs well on most people, but poorly on underrepresented
    groups.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 定期或CI验证消融测试，如果对分段有意识，可以检测不对称崩溃，即模型在大多数人身上表现良好，但在代表性不足的群体上表现不佳。
- en: How Collapse Emerges in Practice
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实践中如何出现崩溃
- en: Optimization Doesn’t Incentivize Representation
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化并不激励表示
- en: Machine learning systems are trained to minimize error, not to retain explanatory
    flexibility. Once the model finds a high-performing path, there’s no penalty for
    ignoring alternatives. But in real-world settings, the ability to reason across
    input space is often what distinguishes robust systems from brittle ones.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习系统被训练以最小化错误，而不是保留解释灵活性。一旦模型找到高性能路径，忽略替代方案就不会受到惩罚。但在现实世界的设置中，跨输入空间推理的能力通常区分了鲁棒系统与脆弱系统。
- en: In predictive maintenance pipelines, models often ingest signals from temperature,
    vibration, pressure, and current sensors. If temperature shows early predictive
    value, the model tends to center on it. But when environmental conditions shift,
    say, seasonal changes affecting thermal dynamics, failure signs may surface in
    signals the model never fully learned. It’s not that the data wasn’t available;
    it’s that the model stopped listening before it learned to understand.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在预测性维护管道中，模型通常从温度、振动、压力和电流传感器中获取信号。如果温度显示出早期的预测价值，模型往往会集中在它上面。但当环境条件发生变化时，例如季节变化影响热动力学，失败迹象可能会在模型从未完全学习的信号中显现。并不是数据不可用；而是模型在学会理解之前就停止了监听。
- en: Regularization Accelerates Collapse
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正则化加速崩溃
- en: Well-meaning techniques like L1 regularization or early stopping can exacerbate
    collapse. Features with delayed or diffuse impact, common in domains like healthcare
    or finance, may be pruned before they express their value. As a result, the model
    becomes more efficient, but less resilient to edge cases or new scenarios.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 善意的技巧，如L1正则化或早期停止，可能会加剧崩溃。在医疗保健或金融等领域，具有延迟或扩散影响的特点可能在其表达价值之前被剪枝。结果，模型变得更加高效，但对抗边缘案例或新场景的鲁棒性降低。
- en: In medical diagnostics, for instance, symptoms often co-evolve, with timing
    and interaction effects. A model trained to converge quickly may over-rely on
    dominant lab values, suppressing complementary signs that emerge under different
    conditions, reducing its usefulness in clinical edge cases.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在医疗诊断中，症状通常共同进化，具有时间和交互效应。训练以快速收敛的模型可能会过度依赖主导的实验室值，抑制在不同条件下出现的互补迹象，降低其在临床边缘案例中的实用性。
- en: Strategies That Keep Models Listening
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 保持模型持续监听的策略
- en: Feature Dropout During Training
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练过程中的特征dropout
- en: Randomly masking of the input features during training makes the model learn
    more pathways to prediction. This is dropout in neural nets, but on the feature
    level. It assists in avoiding over-commitment of the system to early-dominant
    inputs and enhances robustness over correlated inputs, particularly in sensor-laden
    or behavioral data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中随机屏蔽输入特征使得模型学习到更多预测路径。这是神经网络中的dropout，但在特征层面。它有助于避免系统对早期主导输入的过度承诺，并增强对相关输入的鲁棒性，尤其是在传感器密集或行为数据中。
- en: Penalizing Attribution Concentration
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 惩罚归因集中度
- en: Putting attribution-aware regularization in training can preserve wider input
    dependence. This can be done by penalizing the variance of [SHAP values](https://www.datacamp.com/tutorial/introduction-to-shap-values-machine-learning-interpretability#:~:text=for%20interpreting%20models.-,What%20are%20SHAP%20Values?,on%20the%20interaction%20between%20features.)
    or by imposing constraints on the total importance of top-N features. The aim
    is not standardisation, but protection against premature dependence.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练中引入归因感知正则化可以保留更广泛的输入依赖。这可以通过惩罚[SHAP值](https://www.datacamp.com/tutorial/introduction-to-shap-values-machine-learning-interpretability#:~:text=for%20interpreting%20models.-,What%20are%20SHAP%20Values?,on%20the%20interaction%20between%20features.)的方差或通过对顶级-N特征的总体重要性施加约束来实现。目标不是标准化，而是防止过早依赖。
- en: Specialization is achieved in ensemble systems by training base learners on
    disjointed feature sets. The ensemble can be made to meet performance and diversity
    when combined, without collapsing into single-path solutions.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在互斥的特征集上训练基础学习器，在集成系统中实现专业化。当结合时，集成系统可以满足性能和多样性，而不会陷入单一路径解决方案。
- en: Task Multiplexing to Sustain Input Variety
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务多路复用来维持输入多样性
- en: Multi-task learning has an inherent tendency to promote the usage of wider features.
    The shared representation layers maintain access to signals that would otherwise
    be lost when auxiliary tasks depend on underutilised inputs. Task multiplexing
    is an effective method of keeping the ears of the model open in the sparse or
    noisy supervised environments.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务学习具有促进更广泛特征使用的内在倾向。共享表示层保持了在辅助任务依赖于未充分利用的输入时可能会丢失的信号。任务多路复用是保持模型在稀疏或噪声监督环境中保持警觉的有效方法。
- en: Listening as a First-Class Metric
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 倾听作为一级指标
- en: Modern MLOps should not be limited to the validation of outcome metrics. It
    needs to start gauging the formation of those results. The use of features needs
    to be considered as an observable, i.e., something being monitored, visualized,
    and alarmed.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现代MLOps不应仅限于验证结果指标。它需要开始衡量这些结果的形成。特征的使用需要被视为一个可观察的指标，即被监控、可视化和警报的东西。
- en: Auditing attention shift is possible by logging the feature contributions on
    a per-prediction basis. In CI/CD flows, this can be enforced by defining collapse
    budgets, which limit the amount of attribution that can be focused on the top
    features. Raw data drift is not the only thing that should be included in a serious
    monitoring stack, but rather visual drift in feature usage as well.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通过记录每个预测的基础特征贡献，可以审计注意力转移。在CI/CD流程中，这可以通过定义崩溃预算来实现，这限制了可以集中在顶级特征上的归因量。原始数据漂移不应是严肃监控堆栈中唯一应包括的内容，而应包括特征使用中的视觉漂移。
- en: Such models are not pattern-matchers. They are logical. And when their rationality
    becomes limited, we not only lose performance, but we also lose trust.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的模型不是模式匹配器。它们是逻辑的。当它们的理性变得有限时，我们不仅会失去性能，还会失去信任。
- en: Conclusion
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The weakest models are not those that learn the incorrect things, but those
    that know too little. The gradual, unnoticeable loss of intelligence is called
    feature collapse. It occurs not due to the failures of the systems, but rather
    due to the optimization of the systems without a view.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最弱模型不是那些学习错误事物，而是那些知道得太少。逐渐、不易察觉的智能损失被称为特征折叠。它不是由于系统的失败，而是由于系统在没有视野的情况下进行优化。
- en: What appears as elegance in the form of clean performance, tight attribution,
    and low variance may be a mask of brittleness. The models that cease to listen
    not only produce worse predictions. They leave the cues that give learning significance.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 表现为清洁性能、紧密归因和低方差优雅性的东西可能只是脆弱性的掩饰。那些停止倾听的模型不仅会产生更差的预测。它们还留下了赋予学习意义的线索。
- en: With machine learning becoming part of the decision infrastructure, we should
    increase the bar of model observability. It is not sufficient to just know what
    the model predicts. We have to understand how it gets there and whether its comprehension
    remains.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 随着机器学习成为决策基础设施的一部分，我们应该提高模型可观察性的标准。仅仅知道模型预测的内容是不够的。我们必须了解它是如何到达那里的，以及它的理解是否保持。
- en: Models are required to remain inquisitive in a world that changes rapidly and
    frequently without making noise. Since attention is not a fixed resource, it is
    a behaviour. And collapse is not only a performance failure; it is an inability
    to be open to the world.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 模型需要保持好奇心，在快速且频繁变化的世界中不发出噪音。由于注意力不是固定资源，它是一种行为。而崩溃不仅是一个性能失败；它是一种无法对世界开放的能力。
