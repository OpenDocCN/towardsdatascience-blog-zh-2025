- en: Build and Query Knowledge Graphs with LLMs
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 LLM 构建和查询知识图谱
- en: 原文：[https://towardsdatascience.com/build-query-knowledge-graphs-with-llms/](https://towardsdatascience.com/build-query-knowledge-graphs-with-llms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/build-query-knowledge-graphs-with-llms/](https://towardsdatascience.com/build-query-knowledge-graphs-with-llms/)'
- en: <mdspan datatext="el1746215600490" class="mdspan-comment">Knowledge</mdspan>
    Graphs are relevant
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746215600490" class="mdspan-comment">知识图谱</mdspan>是相关的
- en: A Knowledge Graph could be defined as a structured representation of information
    that connects concepts, entities, and their relationships in a way that mimics
    human understanding. It is often used to organise and integrate data from various
    sources, enabling machines to reason, infer, and retrieve relevant information
    more effectively.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱可以被定义为一种结构化信息表示，它以模仿人类理解的方式连接概念、实体及其关系。它通常用于组织并整合来自各种来源的数据，使机器能够更有效地进行推理、推断和检索相关信息。
- en: In a [previous post on Medium](https://medium.com/@tartarinidylan/on-knowledge-graphs-and-their-relevance-fc0b9dc1602c)
    I made the point that this kind of structured representation can be used to enhance
    and perfect the performances of LLMs in Retrieval Augmented Generation applications.
    We could speak of GraphRAG as an ensemble of techniques and strategies employing
    a graph-based representation of knowledge to better serve information to LLMs
    compared to more standard approaches that could be taken for “Chat with your documents”
    use cases.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Medium 的一篇[先前文章](https://medium.com/@tartarinidylan/on-knowledge-graphs-and-their-relevance-fc0b9dc1602c)中，我提出这种结构化表示可以用来增强和优化
    LLM 在检索增强生成应用中的性能。我们可以将 GraphRAG 理解为一种技术集合和策略，它使用基于图的知识表示来更好地服务于 LLM，相比于更标准的“与文档聊天”用例的方法。
- en: The “vanilla” RAG approach relies on vector similarity (and, sometimes, hybrid
    search) with the goal of retrieving from a vector database pieces of information
    (chunks of documents) that are ***similar*** to the user’s input, according to
    some similarity measure such as cosine or euclidean. These pieces of information
    are then passed to a Large Language Model that is prompted to use them as context
    to generate a relevant output to the user’s query.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: “原味”RAG 方法依赖于向量相似度（有时是混合搜索），目标是根据某些相似度度量（如余弦或欧几里得）从向量数据库中检索与用户输入 ***相似*** 的信息片段（文档片段）。然后，将这些信息片段传递给大型语言模型，并提示其使用这些信息作为上下文来生成与用户查询相关的输出。
- en: My argument is that the biggest point of failure in those kind of applications
    is similarity search relying on explicit mentions in the knowledge base (*intra-document
    level*), leaving the LLM blind to cross-references between documents, or even
    to implied (implicit) and contextual references. In brief, the LLM is limited
    as it cannot reason at a *inter-document* level.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我的观点是，这类应用中最大的失败点在于依赖于知识库中显式提及的相似性搜索（*文档内级别*），这使得 LLM 对文档之间的交叉引用、甚至隐含（隐式）和上下文相关的引用视而不见。简而言之，LLM
    的局限性在于它不能在 *文档间* 层面上进行推理。
- en: This can be addressed moving away from pure vector representations and vector
    stores to a more comprehensive way of organizing the knowledge base, extracting
    concepts from each piece of text and storing while keeping track of relationships
    between pieces of information.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过从纯向量表示和向量存储转向更全面的知识库组织方式来解决，从每段文本中提取概念，并在存储的同时跟踪信息片段之间的关系。
- en: Graph structure is in my opinion the best way of organizing a knowledge base
    with documents containing cross-references and implicit mentions to each other
    like it always happens inside organizations and enterprises. A graph main features
    are in fact
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，图结构是组织包含交叉引用和相互隐含提及的文档知识库的最佳方式，就像它总是在组织和企业内部发生的那样。图的主要特征实际上包括
- en: '**Entities** (Nodes): they represent real-world objects like people, places,
    organizations, or abstract concepts;'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实体**（节点）：它们代表现实世界中的对象，如人、地点、组织或抽象概念；'
- en: '**Relationships** (Edges): they define how entities are connected between them
    (i.e: “Bill → WORKS_AT → Microsoft”);'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关系**（边）：它们定义了实体之间如何相互连接（例如：“比尔 → WORKS_AT → 微软”）；'
- en: '**Attributes** (Properties): provide additional details about entities (e.g.,
    Microsoft’s founding year, revenue, or location) or relationships ( i.e. “Bill
    → FRIENDS_WITH {since: 2021} → Mark”).'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**属性**（属性）：提供关于实体（例如，微软的成立年份、收入或位置）或关系（例如，“比尔 → FRIENDS_WITH {since: 2021}
    → 马克”）的额外详细信息。'
- en: A Knowledge Graph can then be defined as the Graph representation of corpora
    of documents coming from a coherent domain. But how exactly do we move from vector
    representation and vector databases to a Knowledge Graph?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱可以定义为来自一致领域的文档语料库的图表示。但我们究竟如何从向量表示和向量数据库过渡到知识图谱呢？
- en: Further, **how do we even extract the key information to build a Knowledge Graph**?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，**我们如何提取关键信息来构建知识图谱**？
- en: 'In this article, I will present my point of view on the subject, with code
    examples from a repository I developed while learning and experimenting with Knowledge
    Graphs. This [repository](https://github.com/DylanTartarini1996/knowledge-graphs)
    is publicly available on my Github and contains:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将提出我对这个问题的观点，并从我在学习实验知识图谱时开发的仓库中提供代码示例。这个[仓库](https://github.com/DylanTartarini1996/knowledge-graphs)在我的GitHub上公开可用，并包含：
- en: the source code of the project
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 项目的源代码
- en: example notebooks written while building the repo
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在构建仓库时编写的示例笔记本
- en: a Streamlit app to showcase work done until this point
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个Streamlit应用程序来展示到目前为止完成的工作
- en: a Docker file to built the image for this project without having to go through
    the manual installation of all the software needed to run the project.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个Docker文件，用于构建项目的镜像，而无需手动安装运行项目所需的所有软件。
- en: 'The article will present the repo in order to cover the following topics:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 文章将介绍仓库，以涵盖以下主题：
- en: ✅ **Tech Stack Breakdown** of the tools available, with a brief presentation
    of each of the components used to build the project.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 工具**技术栈分解**，包括对构建项目所使用的每个组件的简要介绍。
- en: ✅ **How to get the Demo up and running** in your own local environment.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **如何在您自己的本地环境中启动和运行演示**。
- en: ✅ **How to perform the** **Ingestion Process** of documents, including extracting
    concepts from them and assembling them into a Knowledge Graph.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **如何执行文档的** **摄取过程**，包括从中提取概念并将它们组装成知识图谱。
- en: ✅ **How to query the Graph**, with a focus on the variety of possible strategies
    that can be employed to perform semantic search, graph query language generation
    and hybrid search.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **如何查询图谱**，重点关注可以采用的多种策略来执行语义搜索、图查询语言生成和混合搜索。
- en: If you are a Data Scientist, a ML/AI Engineer or just someone curious on how
    to build smarter search systems, this guide will walk you through the full workflow
    with code, context and clarity.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是数据科学家、ML/AI工程师或者只是对如何构建更智能的搜索系统感兴趣的人，这个指南将带你通过完整的代码、上下文和清晰度的工作流程。
- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Tech Stack Breakdown
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术栈分解
- en: As a Data Scientist who started learning programming in 2019/20, my main language
    is of course Python. Here, I am using its 3.12 version.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 作为从2019/20年开始学习编程的数据科学家，我的主要编程语言当然是Python。在这里，我使用的是其3.12版本。
- en: This project is built with a focus on open-source tools and free-tier accessibility
    both on the storage side as well as on the availability of Large Language Models.
    This makes it a good starting point for newcomers or for those who are not willing
    to pay for cloud infrastructure or for OpenAI’s API KEYs.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 该项目侧重于开源工具和免费层访问性，无论是在存储方面还是在大型语言模型的可用性方面。这使得它对于新入门者或不愿意为云基础设施或OpenAI的API密钥付费的人来说是一个很好的起点。
- en: The source code is, however, written with production use cases in mind — focusing
    not just on quick demos, but on how to transition a project to real-world deployment.
    The code is therefore designed to be **easily customizable**, **modular**, and
    **extendable**, so it could be adapted to your own data sources, LLMs, and workflows
    with minimal friction.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，源代码的编写是以生产用例为前提的——不仅关注快速演示，还关注如何将项目过渡到现实世界的部署。因此，代码被设计成**易于定制**、**模块化**和**可扩展**，以便可以以最小的摩擦适应您自己的数据源、LLMs和工作流程。
- en: Below is a breakdown of the key components and how they work together. You can
    also read the repo’s [README.md](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/README.md)
    for further information on how to get up and running with the demo app.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是关键组件的分解以及它们是如何协同工作的。您还可以阅读仓库的[README.md](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/README.md)，以获取有关如何启动和运行演示应用程序的更多信息。
- en: 🕸️ Neo4j — Graph Database + Vector Store
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🕸️ Neo4j—图数据库 + 向量存储
- en: 'Neo4j powers the knowledge graph layer and also stores vector embeddings for
    semantic search. The core of Neo4j is **Cypher**, the query language needed to
    interact with a Neo4j Database. Some of the key other features from Neo4j that
    are used in this project are:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: Neo4j提供知识图谱层，并存储用于语义搜索的向量嵌入。Neo4j的核心是**Cypher**，这是与Neo4j数据库交互所需的查询语言。在此项目中使用的Neo4j的一些关键其他功能包括：
- en: '**GraphDB**: To store structured relationships between entities and concepts.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GraphDB**：用于存储实体和概念之间的结构化关系。'
- en: '**VectorDB**: Embedding support allows similarity search and hybrid queries.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VectorDB**：嵌入支持允许相似性搜索和混合查询。'
- en: '**Python SDK**: Neo4j offers a [python driver](https://neo4j.com/docs/python-manual/current/)
    to interact with its instance and wrap around it. Thanks to the python driver,
    knowing Cypher is not mandatory to interact with the code in this repo. Thanks
    to the SDK, we are able to use other python graph data science libraries as well,
    such as `networkx` or `python-louvain`.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python SDK**：Neo4j提供了一个[python驱动程序](https://neo4j.com/docs/python-manual/current/)来与其实例交互并围绕它进行包装。多亏了python驱动程序，了解Cypher不是与这个repo中的代码交互的必要条件。多亏了SDK，我们能够使用其他Python图数据科学库，如`networkx`或`python-louvain`。'
- en: '**Local Development**: Neo4j offers a [Desktop version](https://neo4j.com/download/)
    and it also could be easily deployed via Docker images into containers or on any
    Virtual Machine (Linux/macOS/Windows).'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本地开发**：Neo4j提供[桌面版本](https://neo4j.com/download/)，并且也可以通过Docker镜像轻松部署到容器或任何虚拟机（Linux/macOS/Windows）。'
- en: '**Production Cloud**: You can also use [Neo4j Aura](https://neo4j.com/product/auradb/)
    for a fully-managed solution; this comes with a free tier, and it’s ready to be
    hosted in any cloud of your choice depending on your needs.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产云**：您还可以使用[Neo4j Aura](https://neo4j.com/product/auradb/)进行完全管理的解决方案；这附带免费层，并且可以根据您的需求托管在任何云中。'
- en: 🦜 LangChain — Agent Framework for LLM Workflows
  id: totrans-38
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🦜 LangChain — LLM工作流程的代理框架
- en: '[LangChain](https://www.langchain.com/) is used to coordinate how LLMs interact
    with tools like the vector index and the entities in the Knowledge Graphs, and
    of course with the user input.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '[LangChain](https://www.langchain.com/)用于协调LLM如何与向量索引和知识图谱中的实体以及用户输入等工具交互。'
- en: Used to define custom agents and toolchains.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于定义自定义代理和工具链。
- en: Integrates with retrievers, memory, and prompt templates.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与检索器、内存和提示模板集成。
- en: Makes it easy to swap in different LLM backends.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使替换不同的LLM后端变得容易。
- en: 🤖 LLMs + Embeddings
  id: totrans-43
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🤖 LLMs + Embeddings
- en: LLMs and Embeddings can be invoked both from a local deployment using [Ollama](https://ollama.com/)
    or an online endpoint of your choice. I am currently using the [Groq](https://console.groq.com/home)
    free-tier API to experiment, switching between `gemma2-9b-it` and various versions
    of Llama, such as `meta-llama/llama-4-scout-17b-16e-instruct` . For Embeddings,
    I am using `mxbai-embed-large` running via Ollama on my M1 Macbook Air; on the
    same setup I was also able to run `llama3.2` (2B) in the past, keeping in mind
    my hardware limitations.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs和Embeddings可以从使用[Ollama](https://ollama.com/)的本地部署或您选择的在线端点调用。我目前正在使用[Groq](https://console.groq.com/home)免费层API进行实验，在`gemma2-9b-it`和Llama的各种版本之间切换，例如`meta-llama/llama-4-scout-17b-16e-instruct`。对于Embeddings，我正在使用`mxbai-embed-large`在我的M1
    Macbook Air上通过Ollama运行；在相同的设置中，我过去还能够运行`llama3.2`（2B），考虑到我的硬件限制。
- en: Both Ollama and Groq are plug and play and have Langchain’s wrappers.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Ollama和Groq都是即插即用，并且有Langchain的包装器。
- en: 👑 Streamlit — Frontend UI for Interactions & Demos
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 👑 Streamlit — 交互和演示的前端UI
- en: I have written a small demo app using [Streamlit](https://streamlit.io/), a
    python library that allows developers to build minimal frontend layers without
    writing any HTML or CSS, just pure python.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用 [Streamlit](https://streamlit.io/) 编写了一个小型演示应用程序，这是一个允许开发者构建最小前端层而无需编写任何HTML或CSS，只需纯Python的Python库。
- en: In this demo app you will see how to
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个演示应用程序中，您将看到如何
- en: Ingest your documents into Neo4j under a Graph-based representation.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将您的文档以图为基础的形式导入Neo4j。
- en: Run live demos of the graph-based querying, showcasing key differences between
    various querying strategies.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 展示基于图查询的实时演示，突出各种查询策略之间的关键差异。
- en: Streamlit’s main advantages is that it’s super lightweight, fast to deploy,
    and doesn’t require a separate frontend framework or backend. Its features make
    it the perfect fit for demos and prototypes such as this one.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit的主要优势是它非常轻量级，部署速度快，不需要单独的前端框架或后端。其功能使其非常适合像这样的演示和原型。
- en: '![](../Images/70f93a1d6aea5d780d89ed0a1b987aa9.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/70f93a1d6aea5d780d89ed0a1b987aa9.png)'
- en: This is what an app looks like in Streamlit
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是Streamlit应用程序的外观。
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: However, it is not suitable for production apps because of it limited customisation
    features and UI control, as well as the absence of a native way to perform authorisation
    and authentication, and a proper way to handle scaling. Going from demo to production
    usually requires a more suitable front-end framework and a clear separation between
    back-end and front-end frameworks and their responsibilities.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于其有限的定制功能和UI控制，以及缺乏原生的授权和认证方式，以及适当的扩展处理方式，它不适合生产应用程序。从演示到生产通常需要更合适的客户端框架，以及后端和前端框架及其职责的明确分离。
- en: 🐳 Docker — Containerisation for Local Dev & Deployment
  id: totrans-56
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🐳 Docker—本地开发和部署的容器化工具
- en: Docker is a tool that lets you package your application and all its dependencies
    into a **container** — a lightweight, standalone, and portable environment that
    runs consistently on any system.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Docker是一个工具，它允许您将应用程序及其所有依赖项打包到一个**容器**中——一个轻量级、独立且可移植的环境，可以在任何系统上一致地运行。
- en: Since I imagined it could be challenging to manage all the mentioned dependencies,
    I also added a [Dockerfile](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/Dockerfile)
    for building an image of the app, so that Neo4j, Ollama and the app itself could
    run in isolated, reproducible containers via [docker-compose](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/docker-compose.yml).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我想象到管理所有提到的依赖项可能具有挑战性，我还添加了一个[Dockerfile](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/Dockerfile)，用于构建应用程序的镜像，这样Neo4j、Ollama以及应用程序本身就可以通过[docker-compose](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/docker-compose.yml)在隔离、可重复的容器中运行。
- en: To run the demo app yourself, you can follow the instructions on the [README.md](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/README.md)
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 要自己运行演示应用程序，您可以遵循[README.md](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/README.md)上的说明。
- en: Now that the tech stack we are going to use has been presented, we can deep
    dive into how the app actually works behind the curtains, starting from the ingestion
    pipeline.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经介绍了将要使用的技术栈，我们可以深入探讨应用程序背后幕后的实际工作原理，从摄入管道开始。
- en: '* * *'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: From Text Corpus to Knowledge Graph
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从文本语料库到知识图谱
- en: As I previously mentioned, it is recommendable that documents that are being
    ingested into a Knowledge Graph come from the same domain. These could be manuals
    from the medical domain on diseases and their symptoms, code documentation from
    past projects, or newspaper articles on a particular subject.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前提到的，建议被摄入到知识图谱中的文档来自同一领域。这些可能是关于疾病及其症状的医疗领域的手册，过去项目的代码文档，或者关于特定主题的报纸文章。
- en: Being a politics geek, to test and play with my code, I choose pdf Press Materials
    from the [European Commission’s Press corner](https://ec.europa.eu/commission/presscorner/home/en).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名政治爱好者，为了测试和玩弄我的代码，我选择了来自[欧洲委员会新闻角](https://ec.europa.eu/commission/presscorner/home/en)的PDF新闻资料。
- en: Once the documents have been collected, we have to ingest them into the Knowledge
    Graph.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦收集到文档，我们必须将它们摄入到知识图谱中。
- en: The ingestion pipeline needs to follow the steps reported below
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 摄入管道需要遵循以下步骤。
- en: The reference source code for this part of the article is in [src/ingestion](https://github.com/DylanTartarini1996/knowledge-graphs/tree/main/src/ingestion).
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 本文该部分的参考源代码位于[src/ingestion](https://github.com/DylanTartarini1996/knowledge-graphs/tree/main/src/ingestion)。
- en: 1\. Load files into a machine-friendly format
  id: totrans-68
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 将文件加载到机器友好的格式中
- en: In the code example below, the class `Ingestor`is used to infer the mime type
    of each file we’re trying to read and langchain’s document loaders are employed
    to read its content accordingly; this allows for customisations regarding the
    format of source files that will populate our Knowledge Graph.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码示例中，使用`Ingestor`类来推断我们试图读取的每个文件的MIME类型，并使用langchain的文档加载器相应地读取其内容；这允许对将填充我们的知识图谱的源文件格式进行自定义。
- en: '[PRE0]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 2\. Clean and split document content into text chunks
  id: totrans-71
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 清理并将文档内容分割成文本块
- en: This is necessary for the graph extraction phase ahead of us. To clean texts,
    depending on domain and on the document’s format, it might make sense to write
    custom cleaning and chunking functions. This is where the document’s `chunks`
    list is populated.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于我们即将进行的图提取阶段是必要的。为了清理文本，根据领域和文档的格式，编写自定义的清理和分块函数可能是有意义的。这就是文档的`chunks`列表被填充的地方。
- en: Chunking size, overlap and other possible configurations here could be domain
    dependent and should be configured according to the expertise of the DS / AI Engineer;
    the class in charge of chunking is exemplified below.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 块大小、重叠和其他可能的配置可能取决于领域，应根据DS / AI工程师的专业知识进行配置；负责分块的类在下面举例说明。
- en: '[PRE1]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 3\. Extract Concepts Graph
  id: totrans-75
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. 提取概念图
- en: For each chunk in the document, we want to extract a graph of concepts. To do
    so, we program a custom agent powered by a LLM with this precise task. Langchain
    comes in handy here due to a method called `with_structured_output` that wraps
    LLM calls and lets you define the expected output schema using a pydantic model.
    This ensures that the LLM of your choice returns **structured, validated responses
    and not free-form text**.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 对于文档中的每个块，我们希望提取一个概念图。为此，我们编写了一个由LLM驱动的自定义代理，用于执行这个精确的任务。Langchain在这里很有用，因为它有一个名为`with_structured_output`的方法，它包装LLM调用，并允许您使用pydantic模型定义预期的输出模式。这确保了您选择的LLM返回**结构化、验证过的响应，而不是自由形式的文本**。
- en: 'This is what the `GraphExtractor` looks like:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是`GraphExtractor`的外观：
- en: '[PRE2]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Notice that the expected output `_Graph` is defined as:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，预期的输出`_Graph`被定义为：
- en: '[PRE3]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Optionally, the LLM agent in charge of extracting a graph from chunks can be
    provided with an Ontology describing the domain of the documents.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 可选地，负责从块中提取图的LLM代理可以提供描述文档领域本体。
- en: An ontology can be described as the formal specification of the types of entities
    and relationships that can exist in the graph — it is, essentially, its **blueprint**.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 本体可以被描述为图中可以存在的实体类型和关系的正式规范——本质上，它是其**蓝图**。
- en: '[PRE4]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 4\. Embed each chunk of the document
  id: totrans-84
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4. 嵌入文档的每个块
- en: Next, we want to obtain a vector representation of the text contained in each
    chunk. This can be done using the Embeddings model of your choice and passing
    the list of documents to the `ChunkEmbedder` class.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们希望获得每个块中包含的文本的向量表示。这可以通过使用您选择的嵌入模型并将文档列表传递给`ChunkEmbedder`类来实现。
- en: '[PRE5]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '* * *'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 5\. Save the embedded chunks into the Knowledge Graph
  id: totrans-88
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 5. 将嵌入的块保存到知识图中
- en: Finally, we have to upload the documents and their chunks in our Neo4j instance.
    I’ve built upon the already available `Neo4jGraph` langchain class to create a
    customised version for this repo.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们必须将文档及其块上传到我们的Neo4j实例中。我已经基于现有的`Neo4jGraph` langchain类创建了一个针对此存储库的定制版本。
- en: 'The code of the `KnowledgeGraph` class is available at [src/graph/knowledge_graph.py](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/src/graph/knowledge_graph.py)
    and this is how its core method `add_documents` works:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '`KnowledgeGraph`类的代码可在[src/graph/knowledge_graph.py](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/src/graph/knowledge_graph.py)找到，这是其核心方法`add_documents`的工作方式：'
- en: a. for each file, create a **Document node** on the Graph with its properties
    (metadata) such as the source of the file, the name, the ingestion date..
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: a. 对于每个文件，在图上创建一个**文档节点**，并保存其属性（元数据），如文件来源、名称、摄入日期等。
- en: b. for each chunk, create a **Chunk node**, connected to the original Document
    node by a relationship (`PART_OF`) and save the embedding of the chunk as a property
    of the node; connect each Chunk node with the following with another relationship
    (`NEXT`).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: b. 对于每个块，创建一个**块节点**，通过一个关系（`PART_OF`）连接到原始文档节点，并将块的嵌入保存为节点的属性；通过另一个关系（`NEXT`）将每个块节点与其他节点连接。
- en: 'c. for each chunk, save the extracted subgraph: nodes, relationships and their
    properties; we also connect them to their source `Chunk` with a relationship (`MENTIONS`).'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: c. 对于每个块，保存提取的子图：节点、关系及其属性；我们还通过一个关系（`MENTIONS`）将它们连接到它们的源`Chunk`。
- en: d. perform **hierarchical clustering** on the Graph to detect **communities**
    of nodes inside it. Then, use a LLM to summarise the resulting communities obtaining
    Community Reports and embed said summaries.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: d. 在图上执行**层次聚类**以检测图内的**节点社区**。然后，使用一个LLM来总结生成的社区，获得社区报告，并将这些总结嵌入其中。
- en: Communities in a graph are **clusters or groups of nodes that are more densely
    connected to each other than to the rest of the graph**. In other words, nodes
    within the same community have many connections with each other and relatively
    fewer connections with nodes outside the group.
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 图中的社区是**节点簇或组**，它们彼此之间比与其他图中的节点更紧密地连接。换句话说，同一社区内的节点彼此之间有许多连接，而与组外节点的连接相对较少。
- en: 'The result of this process in Neo4j looks something like this: data structured
    into entities and relationships with their properties, just as we wanted. In particular,
    Neo4j also offers the opportunity to have multiple vector indexes in the same
    instance, and we exploit this feature to separate the embeddings of chunks from
    those of communities.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在Neo4j中，这个过程的结果看起来像这样：数据结构化为具有其属性的实体和关系，正如我们希望的那样。特别是，Neo4j还提供了在同一实例中拥有多个向量索引的机会，我们利用这个特性将块的嵌入与社区的嵌入分开。
- en: '![](../Images/62f4adac8d46ee0ae2cd95cc93e9be8d.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/62f4adac8d46ee0ae2cd95cc93e9be8d.png)'
- en: 'Knowledge Graph obtained from European Commission Press Corner’s PDFs: we can
    observe Document nodes (lightblue), Chunk nodes (pink) and Entity nodes (orange).
    Blue nodes represent Community Reports and green nodes are for Graph Metrics.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 从欧洲委员会新闻角PDFs中获取的知识图谱：我们可以观察到文档节点（浅蓝色）、块节点（粉色）和实体节点（橙色）。蓝色节点代表社区报告，绿色节点用于图指标。
- en: 'In the image above, you might have noticed that some nodes in the Graph are
    more connected to each other, while other nodes have fewer connection and lie
    on the borders of the Graph. Since the image you are looking at is produced from
    the European Commission’s Press Corner pdfs, it is only normal that in the center
    we could find entities such as “*Von Der Leyen*” (President of the European Commission)
    or even “*European Commission*”: in fact, those are some of the most mentioned
    entities in our Knowledge Graph.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的图像中，你可能已经注意到图中的一些节点彼此之间联系更紧密，而其他节点连接较少，位于图的边缘。由于你正在查看的图像是由欧洲委员会的新闻角PDFs生成的，所以在中心找到像“*冯·德·莱恩*”（欧洲委员会主席）甚至“*欧洲委员会*”这样的实体是很正常的：事实上，这些是我们知识图谱中最常提到的实体之一。
- en: Below, you can find a more zoomed-in screenshot, where relationship and entity
    names are actually visible. The original filename of the document (lightblue)
    at the center is “*Commission sets course for Europe’s AI leadership with an ambitious
    AI Continent Action Plan*”. Apparently the extraction of entities and relationships
    via LLM worked fairly fine on this one.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 下面，你可以找到一个更详细的截图，其中关系和实体名称实际上是可见的。文档的原文件名（浅蓝色）位于中心是“*委员会为欧洲的人工智能领导地位设定路线图：一项雄心勃勃的人工智能大陆行动计划*”。显然，通过LLM提取实体和关系在这个例子上工作得相当不错。
- en: '![](../Images/2b7f3d8eeb764c186451fd90f0c41e0c.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2b7f3d8eeb764c186451fd90f0c41e0c.png)'
- en: Here labels and relationships are visible and can be used to get a grasp on
    the subject of one of the press releases.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，标签和关系是可见的，可以用来了解一份新闻稿的主题。
- en: Once the Knowledge Graph has been created, we can employ LLMs and Agents to
    query it and ask questions on the available documents. Let’s go for it!
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦创建了知识图谱，我们就可以使用LLM和代理来查询它，并在可用的文档上提问。让我们开始吧！
- en: '* * *'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Graph-informed Retrieval Augmented Generation
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于图的检索增强生成
- en: Since the release of ChatGPT in late 2022, I have built my fair share of POCs
    and Demos on Retrieval Augmented Generation, “*chat-with-your-documents*” use
    cases.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 自从2022年底ChatGPT发布以来，我在检索增强生成、“*与你的文档聊天*”用例上构建了不少POCs和Demos。
- en: 'They all share the same methodology for giving the end user the desired answer:
    embed the user question, perform similarity search on the vector store of choice,
    retrieve *k* chunks (pieces of information) from the vector store, then pass the
    user’s question and the context obtained from those chunks to a LLM; finally,
    answer the question.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 它们都采用了相同的方法来给最终用户提供所需的答案：嵌入用户问题，在所选的向量存储上进行相似性搜索，从向量存储中检索*k*个块（信息片段），然后将用户的问题和从这些块中获得的上下文传递给LLM；最后回答问题。
- en: 'You might want to add some memory of the conversation (read: a *chat history*)
    and even callbacks to perform some *guardrail* activities such as keeping track
    of tokens spent in the process and latency of the answer. Many vector stores also
    allow for *hybrid search*, which is the same process mentioned above, only adding
    a filter on chunks based on their metadata before the similarity search even happens.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想要添加一些对话的记忆（即：聊天历史）以及执行一些*护栏*活动，例如跟踪过程中消耗的令牌和答案的延迟。许多向量存储也允许进行*混合搜索*，这和上面提到的过程相同，只是在相似性搜索之前，基于其元数据对块添加一个过滤器。
- en: 'This is the level of complexity you get with this kind of RAG applications:
    choose the number of *k* texts you want to retrieve, predetermine the filters,
    choose the LLM in charge of answering. **Eventually, these kind of approaches
    reach an asymptote in terms of performance**, and you might be left with only
    a handful of options on how to tweak the LLM parameters to better handle user
    queries.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这种RAG应用所达到的复杂程度：选择你想要检索的文本数量 *k*，预先确定过滤器，选择负责回答的LLM。**最终，这类方法在性能上达到一个渐近线**，你可能只剩下少数几种选项来调整LLM参数以更好地处理用户查询。
- en: '**Instead, what does the RAG approach looks like with a Knowledge Graph?**
    The honest answer to that question is: **It really boils down on what kind of
    questions you are going to ask**.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**相反，知识图谱中的RAG方法看起来是什么样子？**对这个问题的诚实答案是：**这实际上取决于你将要提出什么类型的问题**。'
- en: 'While learning about Knowledge Graphs and their applications in real world
    use cases, I spent a long time reading. Blogposts, articles and Medium posts,
    even some books. The more I dug, the more questions came to my mind, the less
    definitive my answers: apparently, **when dealing with knowledge that is structured
    BOTH in a graph representation and into vector indexes, a lot of options open
    up**.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习关于知识图谱及其在现实世界用例中的应用时，我花费了很长时间去阅读。博客文章、文章和Medium文章，甚至一些书籍。挖掘得越深，我心中的问题就越多，我的答案就越不明确：显然，**当处理既以图形表示又以向量索引结构化的知识时，会打开很多选项**。
- en: After my reading, I spent some time developing my own answers (and the code
    that goes with it) on **strategies that can be applied when querying the Knowledge
    Graph using Large Language Models**. What follows is a brief excursus on my take
    on the subject.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读之后，我花了一些时间开发我自己的答案（以及相应的代码）关于**在查询知识图谱时使用大型语言模型可以应用的战略**。以下是我对这个主题的简要探讨。
- en: the reference source code is part of the GraphAgentResponder class, available
    at [src/agents/graph_qa.p](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/src/agents/graph_qa.py)y .
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 参考源代码是GraphAgentResponder类的一部分，可在[src/agents/graph_qa.p](https://github.com/DylanTartarini1996/knowledge-graphs/blob/main/src/agents/graph_qa.py)找到。
- en: 1\. Enhanced RAG
  id: totrans-114
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 增强型RAG
- en: 'First of all, you could always perform the usual RAG process: chunks embeddings
    are, after all, available in the Graph, and they can be retrieved like with any
    other vector database. Moreover, you could also perform hybrid search, since those
    chunks are actually nodes, and nodes have properties (attributes) that can be
    used for filtering.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你始终可以执行常规的RAG过程：块嵌入毕竟在图中可用，并且可以像检索任何其他向量数据库一样检索。此外，你还可以执行混合搜索，因为那些块实际上是节点，节点有属性（属性）可以用于过滤。
- en: What if we went a step further and took into consideration that Chunk nodes
    are connected to each other by a `NEXT` relationship, and to the original Document
    node by a `PART_OF` relationship? **Querying for similarity on embeddings and
    then enriching the context with neighbouring chunks** might unlock new possibilities
    when it comes to level of details provided in the answer, but also the ability
    to quote the source file and its metadata.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们更进一步，考虑到块节点通过`NEXT`关系相互连接，并通过`PART_OF`关系与原始文档节点连接，会怎样？**在嵌入上进行相似性查询，然后通过相邻块丰富上下文**可能会在答案的细节级别和引用源文件及其元数据的能力方面解锁新的可能性。
- en: '![](../Images/1a48d35e7e16fdf29524a6f481191299.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1a48d35e7e16fdf29524a6f481191299.png)'
- en: Querying for neighbouring Chunks to enhance similarity search
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 查询相邻块以增强相似性搜索
- en: For instance, similarity search could end up pointing to chunk 2 of the previously
    mentioned document, but querying for neighbouring chunks could allow the LLM to
    provide a more detailed, contextualised answer.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，相似性搜索可能最终指向之前提到的文档的块2，但查询相邻块可能允许LLM提供更详细、更有上下文的答案。
- en: 'To give a working example, let’s consider a question on the nodes depicted
    in the screenshot previously shown about a press release focused on Artificial
    Intelligence: “*what is the EU strategy on Artificial Intelligence?”.* This is
    what our Agent answers:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提供一个工作示例，让我们考虑一个关于之前截图所示的关于人工智能新闻发布的节点的问题：“*欧盟在人工智能方面的战略是什么？*。”这是我们的代理给出的答案：
- en: '[PRE6]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 2\. Community Reports
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 社区报告
- en: Another version of enhanced RAG that came to my mind while building this first
    version of the repository employs Community Reports.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建这个存储库的第一个版本时，我想到了另一种增强型RAG版本，它采用了社区报告。
- en: In the last step of the ingestion phase in fact, we used **hierarchical clustering
    techniques** such as the Leiden or Louvain algorithm to detect communities between
    nodes in the Knowledge Graph, and then employed a LLM to **summarise those communities,
    obtaining Community Reports**.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，在摄取阶段的最后一步，我们使用了**层次聚类技术**，如Leiden或Louvain算法，在知识图中的节点之间检测社区，然后使用LLM来**总结这些社区，获得社区报告**。
- en: These reports are stored in the Graph under a different vector index than the
    one for Chunks, and **both of those two indexes can be queried via similarity
    search**. Further, retrieved contexts can be combined when passing them to the
    LLM to **obtain answers that are grounded at the intra-document level but also
    are informed of what is happening in the graph at the inter-document level**.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这些报告存储在Graph中，其向量索引与Chunks的索引不同，**这两个索引都可以通过相似度搜索进行查询**。此外，检索到的上下文可以在传递给LLM时组合，以**获得在文档内部级别有根据的答案，同时也了解跨文档级别图中的情况**。
- en: '![](../Images/21463d97aa8cc50c14c8372d6afb4265.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/21463d97aa8cc50c14c8372d6afb4265.png)'
- en: Community Reports stored in the Knowledge Graph as additional nodes with a summary
    and its embedding
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 作为知识图中的附加节点存储的社区报告，包括摘要及其嵌入
- en: This strategy is certainly better fitted for those kind of questions that might
    need information from multiple sources in the form of overviews or high level
    summaries.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略显然更适合那些可能需要从多个来源以概述或高级总结的形式获取信息的这类问题。
- en: 'Let’s go back to the “*What is the EU strategy on Artificial Intelligence?*”
    question and see how the bot answers now, being able to retrieve both chunks and
    community reports via similarity search:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到“*欧盟对人工智能的战略是什么？*”这个问题，看看现在机器人如何回答，因为它能够通过相似度搜索检索到块和社区报告：
- en: '[PRE7]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Clearly, the answer is more high-leveled than before. This is expected and is
    in fact what happens when having access to inter-documents contexts.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，答案的级别比之前更高。这是预期的，实际上当能够访问跨文档上下文时就会发生这种情况。
- en: 3\. Cypher Queries
  id: totrans-132
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. Cypher查询
- en: Moving away from the purely RAG-based strategy, a different option at our disposal
    now that we have our knowledge base structured in a graph is to **ask the LLM
    to traverse it using a graph query language**. In Neo4j, this means that we want
    to instruct the LLM with the schema of the graph and then ask it to write Cypher
    queries to inspect nodes, entities and relationships, based on the user’s question.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 离开纯粹基于RAG（关系图）的策略，现在我们有了一个结构化的图知识库，我们可以选择让LLM使用图查询语言遍历它。在Neo4j中，这意味着我们想要指导LLM了解图的架构，然后要求它编写Cypher查询来检查节点、实体和关系，基于用户的问题。
- en: This is all possible thanks to the `GraphCyperQAChain`, which is a Chain class
    from langchain for question-answering against a graph by generating Cypher statements.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都得益于`GraphCyperQAChain`，这是langchain中用于通过生成Cypher语句对图进行问答的Chain类。
- en: In the example below you are seeing what happens if you ask to the LLM the question
    “*Who is Thomas Regnier?*”.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的例子中，您可以看到如果您向LLM（大型语言模型）提出“*托马斯·雷吉耶是谁？*”这个问题会发生什么。
- en: The model writes a Cypher query similar to
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 模型编写一个类似于的Cypher查询
- en: '[PRE8]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'and after looking at the intermediate results answers like:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 并且在查看中间结果后，会得到如下回答：
- en: '[PRE9]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/c7701cf3560538335392335b35ee04c0.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c7701cf3560538335392335b35ee04c0.png)'
- en: Query for “Who is Thomas Regnier?” would result in these nodes being fetched
    in my graph
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 查询“Who is Thomas Regnier?”会导致在我的图中检索以下节点
- en: Another example question that you might be wanting to ask and that needs graph
    traversal capabilities to be answered could be “*What Document mentions Europe
    Direct?*”. The question would lead the Agent to write a Cypher query that search
    for the Europe Direct node → search for Chunk nodes mentioning that node → follow
    the `PART_OF` relationship that goes from Chunk to Document node(s).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个您可能想要询问并需要图遍历能力来回答的问题示例可能是“*哪些文档提到了Europe Direct？*”。这个问题将引导代理编写一个Cypher查询，搜索Europe
    Direct节点 → 搜索提及该节点的块节点 → 跟随从块到文档节点的关系。
- en: 'This is what the answer look like:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是答案的样子：
- en: '[PRE10]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Notice that this **purely query-based approach might work out best for those
    questions that have a concise and direct answer inside the Knowledge Graph or
    when the Graph schema is well defined**. Of course, the concept of schema in the
    Graph is tightly linked with the Ontology concept mentioned in the ingestion part
    of this article: the more precise and descriptive the Ontology, the better defined
    the schema, the easier for the LLM to write Cypher queries to inspect the Graph.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这种**纯粹基于查询的方法可能最适合那些在知识图谱中有简洁直接答案的问题，或者当图模式定义良好时**。当然，图中的模式概念与本文摄入部分提到的本体概念紧密相关：本体越精确、描述性越强，模式定义就越明确，LLM编写Cypher查询来检查图就越容易。
- en: 4\. Community Subgraph
  id: totrans-146
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4. 社区子图
- en: 'This strategy is a combination of the approach on CommunityReport and the Cypher
    approach, and can be broken down in the following steps:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略是社区报告方法和Cypher方法的组合，可以分解为以下步骤：
- en: obtain the most relevant Community Report(s) via similarity search
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过相似度搜索获取最相关的社区报告
- en: fetch the Chunks belonging to the most relevant communities
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取属于最相关社区的所有块片
- en: follow the `MENTIONS` relationship of those Chunks and use the community ids
    to obtain a **community subgraph**
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟随这些块片的`MENTIONS`关系，并使用社区ID来获取一个**社区子图**
- en: pass the resulting context and a dictionary representing the subgraph to a Large
    Language Model to decide how to answer to the user.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的上下文和一个表示子图的字典传递给大型语言模型，以决定如何回答用户。
- en: '![](../Images/5a064ed870f7866a0841888b505ddb53.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5a064ed870f7866a0841888b505ddb53.png)'
- en: Example of Community subgraph representing nodes in Leiden community between
    0 and 2 in my graph
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 社区子图示例，表示我在图中Leiden社区0到2之间的节点
- en: This is the most “***work in progress***” out of the strategies I listed so
    far, with results that vary greatly between different runs. They are not currently
    consistent and usually the LLM tends to get confused by all the information gathered.
    However, I do have the feeling this approach is worth exploring and investigating
    a little more.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我列出的策略中“***正在进行中***”最严重的一个，不同运行的结果差异很大。它们目前并不一致，而且LLM通常会被收集到的所有信息所困惑。然而，我确实觉得这种方法值得进一步探索和研究。
- en: What is immediately clear is how this strategy could get really complicated
    very soon. To handle this, I am pondering whether to use filters of some sort
    when fetching the community subgraph, while a bigger context size for the LLM
    (or a bigger LLM) could also surely help.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，这种策略很快就会变得非常复杂。为了处理这个问题，我在考虑在获取社区子图时是否使用某种类型的过滤器，同时更大的上下文大小对于LLM（或更大的LLM）也肯定有帮助。
- en: 5\. Cypher + RAG
  id: totrans-156
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 5. Cypher + RAG
- en: The last strategy I want to propose is based on the combination of the Enhanced
    RAG approach and the Cypher Approach. In fact, it **employs both the context from
    similarity search as well as the intermediate steps of the** `<strong>GraphCypherQAChain</strong>`
    **to come up with an exhaustive and coherent answer**.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要提出的最后一个策略是基于增强RAG方法和Cypher方法的组合。实际上，它**结合了来自相似度搜索的上下文以及`<strong>GraphCypherQAChain</strong>`的中间步骤，以提供一个全面且连贯的答案**。
- en: 'To give you an example of how the Agent might behave, let’s go back to one
    of the questions used for the query-based approach: “*what documents mentions
    Europe Direct?*”.'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你一个代理可能表现方式的例子，让我们回到用于基于查询方法的其中一个问题：“*哪些文档提到了Europe Direct?*”。
- en: The answer is shown below. As can be noticed, it is both shorter and more informative.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 答案如下。如你所见，它既简短又信息丰富。
- en: '[PRE11]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'This answering method is currently one of the most complete approaches I came
    up with, and it also has a fallback strategy: if something goes wrong on the query
    generation part (say, a query is too complex to write, or the LLM dedicated to
    it reaches its tokens limit), the Agent can still rely on the Enhanced RAG approach,
    so that we still get an answer from it.'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这种回答方法是迄今为止我提出的最完整的方法之一，它还有一个回退策略：如果在查询生成部分出现问题（比如说，查询太复杂难以编写，或者LLM达到其令牌限制），代理仍然可以依赖增强RAG方法，这样我们仍然可以从它那里得到答案。
- en: Summing up and approach comparison
  id: totrans-162
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 总结和策略比较
- en: 'In the past few paragraphs, I presented my take on different answering strategies
    available when our knowledge base is well-organised into a Graph. My presentation
    however is far from complete: many other possibilities could be available and
    I plan to continue on studying on the matter and come up with more options.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几段中，我介绍了在我们将知识库良好组织成图时可以采用的不同回答策略。然而，我的介绍远未完整：还有许多其他可能性，我计划继续研究这个问题，并提出更多选项。
- en: In my opinion, since Graphs unlock so many options, **the goal has to be understanding
    how these strategies would behave under different scenarios** — from lightweight
    semantic lookups to multi-hop reasoning over a richly linked knowledge graph — and
    how to make informed trade-offs depending on the use case.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，由于图解锁了如此多的选项，**目标必须是理解这些策略在不同场景下的表现**——从轻量级语义查找到在丰富链接的知识图谱上的多跳推理——以及如何根据用例做出明智的权衡。
- en: When building real-world applications, **it’s critical to weight answering strategies
    not just by accuracy, but also by cost, speed, and scalability**.
  id: totrans-165
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在构建现实世界应用时，**关键在于不仅要根据准确性权衡回答策略，还要根据成本、速度和可扩展性**。
- en: When deciding what strategy to employ, the **key drivers** that we might want
    to look at are
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在决定采用哪种策略时，我们可能想要考虑的关键驱动因素是
- en: '**Tokens Usage**: How many tokens are consumed per query, especially when traversing
    multi-hop paths or injecting large subgraphs into the prompt'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**令牌使用**：每个查询消耗的令牌数量，尤其是在遍历多跳路径或向提示中注入大型子图时'
- en: '**Latency**: The time it takes to process a retrieval + generation cycle, including
    graph traversal, prompt construction, and model inference'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：处理检索+生成周期所需的时间，包括图遍历、提示构建和模型推理'
- en: '**Performance**: The quality and relevance of the generated responses, with
    respect to semantic fidelity, factual grounding, and coherence.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能**：生成的响应的质量和相关性，与语义忠实度、事实基础和连贯性相关。'
- en: Below, I present a comparison table breaking down the answering methods proposed
    in this section, under the light of these drivers.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 下面，我提供了一个比较表，根据这些驱动因素分析了本节中提出的回答方法。
- en: '![](../Images/a14498936a0dbcb61a1ffbfb4c4d2c42.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a14498936a0dbcb61a1ffbfb4c4d2c42.png)'
- en: '* * *'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Closing Remarks
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: In this article, we walked through a complete pipeline for building and interacting
    with knowledge graphs using LLMs — from document ingestion all the way to querying
    the graph through a demo app.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们详细介绍了使用LLMs构建和交互知识图谱的完整流程——从文档摄取到通过演示应用程序查询图。
- en: 'We covered:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们涵盖了：
- en: How to ingest documents and transform unstructured content into a structured
    Knowledge Graph representation using semantic concepts and relationships extracted
    via LLMs
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用语义概念和关系将文档摄取并转换成结构化的知识图谱表示，这些概念和关系是通过LLMs提取的
- en: How to host the Knowledge Graph in Neo4j
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在Neo4j中托管知识图谱
- en: How to query the graph using a variety of strategies, from vector similarity
    and hybrid search to graph traversal and multi-hop reasoning — depending on the
    retrieval task
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用各种策略查询图，从向量相似性和混合搜索到图遍历和多跳推理——取决于检索任务
- en: How the pieces integrate into a fully functional demo created with Streamlit
    and containerized with Docker.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些组件如何集成到使用Streamlit创建的完整功能演示中，并通过Docker容器化。
- en: Now I would like to hear opinions and comments.. and **contributions are also
    welcome**!
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我想听听大家的意见和评论……**贡献也欢迎**！
- en: If you find this project useful, have ideas for new features, or want to help
    improve the existing components, feel free to jump in, open issues or sending
    in Pull Requests.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您觉得这个项目有用，有新功能的想法，或者想要帮助改进现有组件，请随时加入，提出问题或发送Pull Requests。
- en: Thank you for reading until this point!
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读到这里！
- en: '* * *'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: References
  id: totrans-184
  prefs:
  - PREF_H3
