- en: Mastering NLP with spaCy – Part 3
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 spaCy 掌握 NLP – 第 3 部分
- en: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-3/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-3/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-3/)
- en: <mdspan datatext="el1755663265451" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755663265451" class="mdspan-comment">介绍</mdspan>
- en: It is important to understand how to use spaCy rules to identify patterns within
    some text. There are entities like times, dates, IBANs and emails that follow
    a strict structure, so it is possible to identify them with deterministic rules,
    for example, by using **regular expressions** (**regexes**).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 理解如何使用 spaCy 规则来识别文本中的模式非常重要。有一些实体，如时间、日期、IBAN 和电子邮件，遵循严格的格式，因此可以使用确定性规则来识别它们，例如，使用
    **正则表达式**（**regexes**）。
- en: SpaCy simplifies the usage of regexes by making them more human-readable, so
    instead of weird symbols, you will use actual descriptions using the Matcher class.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: SpaCy 通过使它们更易于阅读来简化正则表达式的使用，因此您将使用 Matcher 类的实际描述来代替奇怪的符号。
- en: Token-based matching
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于标记的匹配
- en: 'A regex is a sequence of characters that specifies a search pattern. There
    is a Python built-in library to work with regexes called **re**: [https://docs.python.org/3/library/re.html](https://docs.python.org/3/library/re.html)'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 正则表达式是一个字符序列，它指定了一个搜索模式。有一个名为 **re** 的 Python 内置库用于处理正则表达式：[https://docs.python.org/3/library/re.html](https://docs.python.org/3/library/re.html)
- en: Let’s see an example.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个例子。
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In this example, the reg pattern captures all the previous strings. This pattern
    says that “Marcello” can be followed optionally by the word “Danilo” (since we
    are using the symbol “?”). Also, the symbol “\s” says that doesn’t matter in between
    the words we a using a space, a tab or multiple spaces.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，正则表达式模式捕获了所有前面的字符串。这个模式表示“Marcello”可以可选地后面跟着单词“Danilo”（因为我们使用了符号“？”）。此外，符号“\s”表示在单词之间使用空格、制表符或多个空格都可以。
- en: The problem with regexes, and the reason why many programmers don’t love them,
    is that they’re difficult to read. This is why spaCy provides a clean and production-level
    alternative with the **Matcher class**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 正则表达式的问题，以及为什么许多程序员不喜欢它们的原因，是它们难以阅读。这就是为什么 spaCy 提供了一个干净且适用于生产的替代方案，即 **Matcher
    类**。
- en: Let’s import the class and see how we can use it. (I will explain what Span
    is later).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们导入这个类并看看我们如何使用它。（我将在稍后解释 Span 是什么）。
- en: '[PRE1]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now we can define a pattern that matches some morning greetings, and we label
    this pattern “morningGreeting”. Defining a pattern with Matcher is straightforward.
    In this pattern, we expect a word that, when converted to lower case, matches
    the word “good”, then the same for “morning”, and then we accept so punctuation
    at the end.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以定义一个匹配某些早晨问候语的模式，并将此模式标记为“morningGreeting”。使用匹配器定义模式很简单。在这个模式中，我们期望一个单词，当转换为小写时，与单词“good”匹配，然后对“morning”也做同样的处理，然后我们接受结尾的标点符号。
- en: '[PRE2]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: A Span is a singular sentence, so the Matcher can find the starting and ending
    point of multiple spans that we iterate over with a for loop.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Span 是一个单独的句子，因此匹配器可以找到我们通过 for 循环迭代的多个跨度的起始和结束点。
- en: We add all the spans in a list and assign the list to the doc.spans[“sc”]. Then
    we can use displacy to visualise the span
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将所有跨度添加到一个列表中，并将该列表分配给 doc.spans[“sc”]。然后我们可以使用 displacy 来可视化跨度
- en: '[PRE3]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/f70806f25608da31868d1c8b96c1ed7e.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f70806f25608da31868d1c8b96c1ed7e.png)'
- en: Image by Author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '**A Matcher object accepts more than one pattern at a time!**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**匹配器对象一次可以接受多个模式！**'
- en: Let’s define a morningGreeting and a eveningGreeting.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义一个 morningGreeting 和一个 eveningGreeting。
- en: '[PRE5]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Then we add these patterns to the Matcher.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将这些模式添加到匹配器中。
- en: '[PRE6]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: As before, we iterate over the spans and display them.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们遍历这些跨度并显示它们。
- en: '[PRE7]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '[PRE8]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/576f1a2266b6a5bb5e5c824b5f667e32.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/576f1a2266b6a5bb5e5c824b5f667e32.png)'
- en: Image by Author
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The syntax supported by spaCy is huge. Here I report some of the most common
    patterns.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: spaCy 支持的语法非常庞大。在这里，我报告了一些最常见的模式。
- en: Text-based attributes
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文本属性
- en: '| Attribute | Description | Example |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| 属性 | 描述 | 示例 |'
- en: '| --- | --- | --- |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `"ORTH"` | Exact verbatim text | `{"ORTH": "Hello"}` |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| `"ORTH"` | 精确的文本 | `{"ORTH": "Hello"}` |'
- en: '| `"LOWER"` | Lowercase form of the token | `{"LOWER": "hello"}` |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| `"LOWER"` | 单词的小写形式 | `{"LOWER": "hello"}` |'
- en: '| `"TEXT"` | Same as `"ORTH"` | `{"TEXT": "World"}` |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| `"TEXT"` | 与 `"ORTH"` 相同 | `{"TEXT": "World"}` |'
- en: '| `"LEMMA"` | Lemma (base form) of the token | `{"LEMMA": "run"}` |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| `"LEMMA"` | 单词的词干（基本形式） | `{"LEMMA": "run"}` |'
- en: '| `"SHAPE"` | Shape of the word (e.g., `Xxxx`, `dd`) | `{"SHAPE": "Xxxx"}`
    |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| `"SHAPE"` | 单词的形状（例如，`Xxxx`，`dd`） | `{"SHAPE": "Xxxx"}` |'
- en: '| `"PREFIX"` | First character(s) of the token | `{"PREFIX": "un"}` |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| `"PREFIX"` | 标记的第一个字符（例如，“un”） | `{"PREFIX": "un"}` |'
- en: '| `"SUFFIX"` | Last character(s) of the token | `{"SUFFIX": "ing"}` |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| `"SUFFIX"` | 标记的最后字符（例如，“ing”） | `{"SUFFIX": "ing"}` |'
- en: Linguistic features
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语言学特征
- en: '| Attribute | Description | Example |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 属性 | 描述 | 示例 |'
- en: '| --- | --- | --- |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `"POS"` | Universal POS tag | `{"POS": "NOUN"}` |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| `"POS"` | 通用词性标签 | `{"POS": "NOUN"}` |'
- en: '| `"TAG"` | Detailed POS tag | `{"TAG": "NN"}` |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| `"TAG"` | 详细词性标签 | `{"TAG": "NN"}` |'
- en: '| `"DEP"` | Syntactic dependency | `{"DEP": "nsubj"}` |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| `"DEP"` | 语法依存关系 | `{"DEP": "nsubj"}` |'
- en: '| `"ENT_TYPE"` | Named entity type | `{"ENT_TYPE": "PERSON"}` |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| `"ENT_TYPE"` | 命名实体类型 | `{"ENT_TYPE": "PERSON"}` |'
- en: Boolean flags
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 布尔标志
- en: '| Attribute | Description | Example |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| 属性 | 描述 | 示例 |'
- en: '| --- | --- | --- |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `"IS_ALPHA"` | Token consists of alphabetic chars | `{"IS_ALPHA": True}`
    |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_ALPHA"` | 标记由字母字符组成 | `{"IS_ALPHA": True}` |'
- en: '| `"IS_ASCII"` | Token consists of ASCII characters | `{"IS_ASCII": True}`
    |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_ASCII"` | 标记由ASCII字符组成 | `{"IS_ASCII": True}` |'
- en: '| `"IS_DIGIT"` | Token is a digit | `{"IS_DIGIT": True}` |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_DIGIT"` | 标记是数字 | `{"IS_DIGIT": True}` |'
- en: '| `"IS_LOWER"` | Token is lowercase | `{"IS_LOWER": True}` |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_LOWER"` | 标记是小写字母 | `{"IS_LOWER": True}` |'
- en: '| `"IS_UPPER"` | Token is uppercase | `{"IS_UPPER": True}` |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_UPPER"` | 标记是大写字母 | `{"IS_UPPER": True}` |'
- en: '| `"IS_TITLE"` | Token is in title case | `{"IS_TITLE": True}` |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_TITLE"` | 标记是大写标题 | `{"IS_TITLE": True}` |'
- en: '| `"IS_PUNCT"` | Token is punctuation | `{"IS_PUNCT": True}` |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_PUNCT"` | 标点符号标记 | `{"IS_PUNCT": True}` |'
- en: '| `"IS_SPACE"` | Token is whitespace | `{"IS_SPACE": True}` |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_SPACE"` | 标记是空白字符 | `{"IS_SPACE": True}` |'
- en: '| `"IS_STOP"` | Token is a stop word | `{"IS_STOP": True}` |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_STOP"` | 标记是停用词 | `{"IS_STOP": True}` |'
- en: '| `"LIKE_NUM"` | Token looks like a number | `{"LIKE_NUM": True}` |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| `"LIKE_NUM"` | 标记看起来像数字 | `{"LIKE_NUM": True}` |'
- en: '| `"LIKE_EMAIL"` | Token looks like an email address | `{"LIKE_EMAIL": True}`
    |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| `"LIKE_EMAIL"` | 标记看起来像电子邮件地址 | `{"LIKE_EMAIL": True}` |'
- en: '| `"LIKE_URL"` | Token looks like a URL | `{"LIKE_URL": True}` |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| `"LIKE_URL"` | 标记看起来像URL | `{"LIKE_URL": True}` |'
- en: '| `"IS_SENT_START"` | Token is at sentence start | `{"IS_SENT_START": True}`
    |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| `"IS_SENT_START"` | 标记在句子开头 | `{"IS_SENT_START": True}` |'
- en: Operators
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 操作符
- en: 'Used to repeat or make patterns optional:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 用于重复或使图案可选：
- en: '| Operator | Description | Example |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| 操作符 | 描述 | 示例 |'
- en: '| --- | --- | --- |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `"OP"` | Pattern operator: |  |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| `"OP"` | 图案操作符： |  |'
- en: '|  | `"?"` – zero or one | `{"LOWER": "is", "OP": "?"}` |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '|  | `"?"` – 零个或一个 | `{"LOWER": "is", "OP": "?"}` |'
- en: '|  | `"*"` – zero or more | `{"IS_DIGIT": True, "OP": "*"}` |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '|  | `"*"` – 零个或多个 | `{"IS_DIGIT": True, "OP": "*"}` |'
- en: '|  | `"+"` – one or more | `{"IS_ALPHA": True, "OP": "+"}` |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '|  | `"+"` – 一个或多个 | `{"IS_ALPHA": True, "OP": "+"}` |'
- en: 'Example:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'What is a pattern that matches a string like: *“I have 2 red apples”, “We bought
    5 green bananas”, or “They found 3 ripe oranges”* ?'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 匹配如下字符串的图案是什么：*“我有2个红苹果”，“我们买了5个绿色的香蕉”，或者“他们找到了3个成熟的橙子”*？
- en: '**Pattern Requirements:**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**图案要求：**'
- en: Subject pronoun (e.g., “I”, “we”, “they”)
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主语代词（例如，“I”，“we”，“they”）
- en: A verb (e.g., “have”, “bought”, “found”)
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动词（例如，“have”，“bought”，“found”）
- en: A number (digit or written, like “2”, “five”)
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个数字（数字或书写，如“2”，“five”）
- en: An optional adjective (e.g., “red”, “ripe”)
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可选的形容词（例如，“red”，“ripe”）
- en: A plural noun (fruit, for example)
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复数名词（例如，水果）
- en: '[PRE9]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Patterns with PhraseMatcher
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用PhraseMatcher的图案
- en: We we work in a vertical domain, like medical or scientific, we usually have
    a set of words that spaCy might not be aware of, and we want to find them in some
    text.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在垂直领域工作，如医学或科学领域时，我们通常有一组spaCy可能不知道的单词，我们希望在文本中找到它们。
- en: The PhraseMatcher class is the spaCy solution for **comparing text against long
    dictionaries**. The usage is quite similar to the Matcher class, but in addition,
    we need to define the list of important terms we want to track. Let’s start with
    the imports.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: PhraseMatcher类是spaCy用于**比较文本与长字典**的解决方案。其用法与Matcher类非常相似，但除此之外，我们还需要定义我们想要跟踪的重要术语列表。让我们从导入开始。
- en: '[PRE10]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Now we define our matcher and our list of words, and tell Spacy to create a
    pattern just to recognise that list. Here, I want to identify the names of tech
    leaders and places.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们定义我们的匹配器和我们的单词列表，并告诉Spacy创建一个仅用于识别该列表的图案。在这里，我想识别技术领导者和地点的名称。
- en: '[PRE11]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Finally check the matches.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 最后检查匹配项。
- en: '[PRE12]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![](../Images/57be05eec1203db95a378492bc4e7771.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/57be05eec1203db95a378492bc4e7771.png)'
- en: Image by Author
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: We can enhance the capabilities of the PhraseMatcher by adding some attributes.
    For example, if we need to cach IP addresses in a text, maybe in some logs, we
    cannot write all the possible combinations of IP addresses, that would be crazy.
    But we can ask Spacy to catch the shape of some IP strings, and check for the
    same shape in a text.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过添加一些属性来增强PhraseMatcher的功能。例如，如果我们需要在文本中缓存IP地址，可能在某些日志中，我们不能写出所有可能的IP地址组合，那会太疯狂了。但我们可以要求Spacy捕捉一些IP字符串的形状，并在文本中检查是否有相同的形状。
- en: '[PRE13]'
  id: totrans-93
  prefs: []
