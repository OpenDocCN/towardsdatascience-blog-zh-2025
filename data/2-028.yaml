- en: Final Thoughts
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: I hope this article helped you to see how much we can do in NLP without always
    using huge models. Many times, we just need to find things that follow rules —
    like dates, IBANs, names or greetings — and for that, spaCy gives us great tools
    like `Matcher` and `PhraseMatcher`.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇文章能帮助你看到在NLP中我们可以做多少事情，而不必总是使用巨大的模型。很多时候，我们只需要找到遵循规则的事物——比如日期、IBAN、名字或问候语——而为此，spaCy为我们提供了像`Matcher`和`PhraseMatcher`这样的强大工具。
- en: In my opinion, working with patterns like these is a good way to better understand
    how text is structured. Also, it makes your work more efficient when you don’t
    want to waste resources on something simple.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，使用这样的模式工作是一种更好地理解文本结构的好方法。此外，当你不想在简单的事情上浪费资源时，它使你的工作更加高效。
- en: I still think regex is powerful, but sometimes hard to read and debug. With
    spaCy, things look clearer and easier to maintain in a real project.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然认为正则表达式非常强大，但有时难以阅读和调试。使用spaCy，事情看起来更清晰，更容易在实际项目中维护。
