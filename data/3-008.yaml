- en: Real-Time Interactive Sentiment Analysis in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python 中的实时交互式情感分析
- en: 原文：[https://towardsdatascience.com/real-time-interactive-sentiment-analysis-in-python/](https://towardsdatascience.com/real-time-interactive-sentiment-analysis-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/real-time-interactive-sentiment-analysis-in-python/](https://towardsdatascience.com/real-time-interactive-sentiment-analysis-in-python/)
- en: '![](../Images/db1970e0ec19ef17581cfc4036c821b0.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![情感可视化笑脸图像](../Images/db1970e0ec19ef17581cfc4036c821b0.png)'
- en: <mdspan datatext="el1746667834713" class="mdspan-comment">You know</mdspan>
    what the best part of being an engineer is? You can just build stuff. It’s like
    a superpower. One rainy afternoon I had this random idea of creating a sentiment
    visualization of a text input with a smiley face that changes it’s expression
    base on how positive the text is. The more positive the text, the happier the
    smiley looks. There are some interesting concepts to learn here, so let me guide
    you through how this project works!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746667834713" class="mdspan-comment">你知道</mdspan>成为工程师最好的部分是什么吗？你可以只是构建东西。这就像是一种超能力。一个下雨的下午，我有一个随机想法，就是创建一个文本输入的情感可视化，笑脸会根据文本的积极程度改变表情。文本越积极，笑脸看起来就越高兴。这里有一些有趣的概念可以学习，所以让我带你了解这个项目是如何工作的！
- en: Prerequisites
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前置条件
- en: 'To follow along, you need the following packages:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 要继续操作，你需要以下包：
- en: customtkinter
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: customtkinter
- en: opencv-python
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: opencv-python
- en: torch
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: torch
- en: transformers
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: transformers
- en: 'Using **[uv](https://docs.astral.sh/uv/)**, you can add the dependencies with
    the following command:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 **[uv](https://docs.astral.sh/uv/)**，你可以使用以下命令添加依赖项：
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**NOTE:** When using *uv* with torch you need to specify the index for the
    package. E.g if you want to use cuda, you need the following in your `pyproject.toml`:'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：** 当使用 *uv* 与 torch 结合时，你需要指定包的索引。例如，如果你想使用 cuda，你需要在你的 `pyproject.toml`
    中添加以下内容：'
- en: ''
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_PRE
  zh: '[PRE1]'
- en: UI Layout Skeleton
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: UI 布局骨架
- en: For these types of projects I always like to start with a quick layout of the
    UI components. In this case the layout will be quite simple, there’s a textbox
    with a single line at the top that fills the width and below it the canvas filling
    the rest of the available space. This will be where we draw the smiley face 🙂
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这类项目，我总是喜欢先快速布局 UI 组件。在这种情况下，布局将会非常简单，顶部有一个单行的文本框，它填满了宽度，下面是画布，占据了剩余的空间。这将是绘制笑脸的地方
    🙂
- en: 'Using `customtkinter`, we can write the layout as follows:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `customtkinter`，我们可以这样编写布局：
- en: '[PRE2]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Unfortunately there’s no good out of the box solution for drawing opencv frames
    on a UI element, so I built my own `CTkImageDisplay`. If you want to learn in
    detail how it works, check out [my previous post](https://towardsdatascience.com/modern-gui-applications-for-computer-vision-in-python/).
    In short, I use a `CTKLabel` component and decouple the thread that updates the
    image from the GUI thread using a synchronization queue.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，没有现成的解决方案可以在 UI 元素上绘制 opencv 框架，所以我构建了自己的 `CTkImageDisplay`。如果你想详细了解它是如何工作的，请查看我的[上一篇文章](https://towardsdatascience.com/modern-gui-applications-for-computer-vision-in-python/)。简而言之，我使用了一个
    `CTKLabel` 组件，并使用同步队列将更新图像的线程与 GUI 线程解耦。
- en: '![](../Images/3707c92a093bad8f752b04cb7e93a9d3.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![画布图像](../Images/3707c92a093bad8f752b04cb7e93a9d3.png)'
- en: Procedural Smiley
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 程序化笑脸
- en: For our smiley face, we could use different discrete images for sentiment ranges,
    so for example having three images saved for *negative*, *neutral* and *positive*.
    However, to get a more fine-grained sentiment visualized, we would need more images
    and it quickly becomes infeasible and we will not be able to animate transitions
    between these images.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的笑脸，我们可以为不同的情感范围使用不同的离散图像，例如，为 *负面*、*中性* 和 *正面* 保存三个图像。然而，为了更精细地可视化情感，我们需要更多的图像，这很快就会变得不可行，我们也将无法在这些图像之间进行动画过渡。
- en: '![discrete sentiment smiley face images](../Images/524153a6a738fca1a88cc1e17096cb55.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![离散情感笑脸图像](../Images/524153a6a738fca1a88cc1e17096cb55.png)'
- en: A better approach is to generate the image of the smiley face procedurally at
    runtime. To keep it simple, we will only change the background color of the smiley,
    as well as the curve of its mouth.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更好的方法是，在运行时以程序方式生成笑脸图像。为了保持简单，我们只会改变笑脸的背景颜色以及其嘴巴的曲线。
- en: '![continuous sentiment score smiley face images](../Images/66b048340dab7bbc793bea7c8156399f.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![连续情感评分笑脸图像](../Images/66b048340dab7bbc793bea7c8156399f.png)'
- en: First we need to generate a canvas image, on which we can draw the smiley.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要生成一个画布图像，我们可以在上面绘制笑脸。
- en: '[PRE3]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Our image should be transparent outside of the smiley face, so we need 4 color
    channels, the last one will be the alpha channel. Since OpenCV images are represented
    as `numpy` arrays with *unsigned 8-bit integers*, we create the image using the
    `np.uint8` data type. Remember that the arrays are stored *y-first*, so the `height`
    of the `image_size` is passed first to the array creation
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的形象应该在笑脸之外是透明的，因此我们需要4个颜色通道，最后一个将是alpha通道。由于OpenCV图像是以`numpy`数组的形式表示的，其中的元素是*无符号8位整数*，我们使用`np.uint8`数据类型来创建图像。记住，数组是按*y-first*顺序存储的，所以`image_size`的`height`首先传递给数组创建
- en: We can define some variables for the dimensions and colors of our smiley that
    will be helpful while drawing.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以定义一些变量来表示笑脸的尺寸和颜色，这些变量在绘制时将非常有用。
- en: '[PRE4]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The background color of the smiley face should be red for negative sentiments
    and green for positive sentiments. To achieve this with a uniform brightness across
    the transition, we can use the HSV color space and simply interpolate the hue
    between 0% and 30%.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 笑脸的背景颜色对于负面情感应该是红色，对于正面情感应该是绿色。为了在整个过渡中实现均匀的亮度，我们可以使用HSV颜色空间，并简单地插值色调在0%和30%之间。
- en: '![](../Images/0feb0cd97f0d6ca004a7eb56882aece8.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0feb0cd97f0d6ca004a7eb56882aece8.png)'
- en: '[PRE5]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We need to make sure to make the color fully opaque by adding a 100% alpha value
    in fourth channel. Now we can draw our smiley face circle with a border.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要确保通过在第四通道添加100%的alpha值来使颜色完全不透明。现在我们可以用边框绘制我们的笑脸圆圈。
- en: '[PRE6]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/17147eff45a1fe9fefab31cd6f1e59bd.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/17147eff45a1fe9fefab31cd6f1e59bd.png)'
- en: So far so good, now we can add the eyes. We calculate an offset from the center
    to the left and right to place the two eyes symmetrically.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止一切顺利，现在我们可以添加眼睛。我们计算从中心到左右两侧的偏移量，以对称地放置两个眼睛。
- en: '[PRE7]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/b007ee42bd968d20bafcc2c1b506ec56.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b007ee42bd968d20bafcc2c1b506ec56.png)'
- en: Now on to the challenging part, the mouth. The shape of the mouth will be a
    parabola scaled appropriately. We can simply multiply the standard parabola `y=x²`
    with the positivity score.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是挑战性的部分，嘴巴。嘴巴的形状将是一个适当缩放的抛物线。我们可以简单地用积极度分数乘以标准抛物线`y=x²`。
- en: '![](../Images/b0a990bde70a19566aa85a50a72aa80f.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b0a990bde70a19566aa85a50a72aa80f.png)'
- en: In the end the line will be drawn using `cv2.polylines`, which needs xy coordinate
    pairs. Using `np.linspace` we generate 100 points on the x-axis and the `polyval`
    function to calculate the according y values of the polygon.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，线条将使用`cv2.polylines`绘制，它需要xy坐标对。使用`np.linspace`我们在x轴上生成100个点，并使用`polyval`函数来计算多边形的相应y值。
- en: '[PRE8]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Et voilà, we have a procedural smiley face!
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: Et voilà，我们得到了一个程序化的笑脸！
- en: '![](../Images/5d68a5cc5ff7e4c1339a38e124c7208b.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5d68a5cc5ff7e4c1339a38e124c7208b.png)'
- en: 'To test the function, I wrote a quick test case using `pytest` that saves the
    smiley faces with different sentiment scores:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这个函数，我编写了一个快速测试用例，使用`pytest`保存了具有不同情感得分的笑脸：
- en: '[PRE9]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/7cf57581eb75f0aa1db01ab55fe176d9.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7cf57581eb75f0aa1db01ab55fe176d9.png)'
- en: Sentiment Analysis
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情感分析
- en: To determine how happy or sad our smiley should look like, we first need to
    analyze the text input and calculate a *sentiment*. This task is called **sentiment
    analysis**. We will use a pre-trained transformer model to predict a classification
    score for the classes *NEGATIVE*, *NEUTRAL* and *POSITIVE*. We can then fuse the
    confidence scores of these classes to calculate a final sentiment score between
    -1 and +1.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定我们的笑脸看起来是多高兴还是多悲伤，我们首先需要分析文本输入并计算一个*情感*。这个任务被称为**情感分析**。我们将使用一个预训练的transformer模型来预测*负面*、*中性*和*正面*类别的分类得分。然后我们可以融合这些类别的置信度得分来计算一个介于-1和+1之间的最终情感得分。
- en: Using the pipeline from the transformers library, we can define processing pipeline
    based on a [pre-trained model from huggingface.](https://huggingface.co/cardiffnlp/twitter-roberta-base-sentiment)
    Using the `top_k` parameter, we can specify how many classification results should
    be returned. Since we want all three classes, we set it to 3.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 使用transformers库中的管道，我们可以基于一个来自huggingface的[预训练模型](https://huggingface.co/cardiffnlp/twitter-roberta-base-sentiment)定义处理管道。使用`top_k`参数，我们可以指定应该返回多少个分类结果。由于我们想要所有三个类别，我们将它设置为3。
- en: '[PRE10]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: To run the sentiment analysis, we can call the pipeline with a string argument.
    This will return a list of results with a single element, so we need to unpack
    the first element.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行情感分析，我们可以用字符串参数调用管道。这将返回一个包含单个元素的结果列表，因此我们需要解包第一个元素。
- en: '[PRE11]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We can define a label mapping, that tells us how each confidence score affects
    the final sentiment. Then we can aggregate the positivity over all confidence
    scores.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以定义一个标签映射，告诉我们每个置信度得分如何影响最终的情感。然后我们可以汇总所有置信度得分上的积极性。
- en: '[PRE12]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: To test our pipeline, we can wrap it in a class and run some tests using `pytest`.
    We verify that sentences with a positive sentiment have a score greater than zero
    and vice versa sentences with a negative sentiment should have a score below zero.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试我们的管道，我们可以将其封装在一个类中，并使用 `pytest` 运行一些测试。我们验证具有积极情感的句子得分应大于零，反之，具有消极情感的句子得分应低于零。
- en: '[PRE13]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Integration
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成
- en: Now the last part that is missing, is simply hooking up the text box to our
    sentiment pipeline and updating the displayed image with the corresponding smiley
    face. We can add a `trace` to the text variable, which will run the sentiment
    pipeline in a new thread managed by a thread pool, to prevent the UI from freezing
    while the pipeline is running.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 现在缺少的最后部分，就是简单地将文本框连接到我们的情感管道，并更新显示的图像与相应的笑脸。我们可以在文本变量上添加一个 `trace`，这将在一个由线程池管理的新的线程中运行情感管道，以防止在管道运行时UI冻结。
- en: '[PRE14]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: And finally the smiley is visualized in the application and changes dynamically
    with the sentiment of the text input!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，表情符号在应用程序中被可视化，并随着文本输入的情感动态变化！
- en: '![](../Images/708801fff07b44dc89da2b2e2b47aed2.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/708801fff07b44dc89da2b2e2b47aed2.png)'
