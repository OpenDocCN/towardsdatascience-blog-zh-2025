- en: Python Can Now Call Mojo
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python Can Now Call Mojo
- en: 原文：[https://towardsdatascience.com/python-can-now-call-mojo/](https://towardsdatascience.com/python-can-now-call-mojo/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/python-can-now-call-mojo/)'
- en: <mdspan datatext="el1758301824242" class="mdspan-comment">As data scientists</mdspan>,
    ML engineers, and software developers, optimising every bit of performance from
    our codebases can be a crucial consideration. If you are a Python user, you’ll
    be aware of some of its deficits in this respect. Python is considered a slow
    language, and you’ve probably heard that a lot of the reason for this is due to
    its Global Interpreter Lock (GIL) mechanism.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758301824242" class="mdspan-comment">作为数据科学家、机器学习工程师和软件开发者，从我们的代码库中优化每一丝性能可能是一个重要的考虑因素。如果你是Python用户，你可能会意识到它在性能方面的某些不足。Python被认为是一种较慢的语言，你可能也听说过，造成这种情况的许多原因都归因于其全局解释器锁（GIL）机制。
- en: It is what it is, but what can we do about it? There are several ways we can
    ameliorate this issue when coding in Python, especially if you’re using a reasonably
    up-to-date version of Python.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是它的本质，但我们能做些什么呢？在Python中编码时，我们可以通过几种方式改善这个问题，尤其是如果你使用的是相对较新的Python版本。
- en: The very latest releases of Python have a way of running code without using
    the GIL.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python的最新版本有一种运行代码而不使用全局解释器锁（GIL）的方法。
- en: We can utilise high-performance third-party libraries, such as NumPy, to perform
    number crunching.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以利用高性能的第三方库，如NumPy，来进行数值计算。
- en: There are also many methods for parallel and concurrent processing built into
    the language now.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现在语言中内置了许多并行和并发处理的方法。
- en: One other method we can use is to call other high-performance languages from
    within Python for time-critical sections of our code. That’s what we’ll cover
    in this article as I show you how to call **Mojo** code from Python.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用的一种方法是，在Python中调用其他高性能语言，以处理代码中的时间关键部分。这就是本文将要介绍的内容，我将向您展示如何从Python中调用**Mojo**代码。
- en: Have you heard of Mojo before? If not, here’s a quick history lesson.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你之前听说过Mojo吗？如果没有，这里有一个快速的历史课。
- en: Mojo is a relatively new systems-level language developed by Modular Inc**.**
    (an AI infrastructure company co-founded in 2022 by compiler writing legend **Chris
    Lattner,** of LLVM and Swift creator fame, and former Google TPUs lead **Tim Davis**)
    and first shown publicly in **May 2023**.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: Mojo是由Modular Inc**.**（一家由LLVM和Swift的创始人、编译器编写传奇人物**Chris Lattner**和前Google
    TPUs负责人**Tim Davis**共同创立的AI基础设施公司）开发的一种相对较新的系统级语言，并于**2023年5月**首次公开亮相。
- en: It was born from a simple pain point, i.e. Python’s lack of performance that
    we discussed earlier. Mojo tackles this head-on by grafting a superset of Python’s
    syntax onto an LLVM/MLIR-based compiler pipeline that delivers zero-cost abstractions,
    static typing, ownership-based memory management, automatic vectorisation, and
    seamless code generation for CPU and GPU accelerators.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 它起源于一个简单的痛点，即我们之前讨论的Python性能不足。Mojo通过将Python语法的超集嫁接到基于LLVM/MLIR的编译器管道上，直接解决这个问题，该管道提供零成本抽象、静态类型、基于所有权的内存管理、自动向量化以及为CPU和GPU加速器无缝生成代码。
- en: Early benchmarks demoed at its launch ran kernel-dense workloads up to **35,000×
    faster** than vanilla Python, proving that Mojo can match — or exceed — the raw
    throughput of C/CUDA while letting developers stay in familiar “pythonic” territory.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在其发布时的早期基准测试中，内核密集型工作负载比纯Python快**35,000倍**，证明了Mojo可以匹配甚至超过C/CUDA的原始吞吐量，同时让开发者保持在熟悉的“Pythonic”领域。
- en: However, there is always a stumbling block, and that is folks’ inertia to move
    entirely to a new language. I’m one of those people, too, so I was delighted when
    I read that, as of a few weeks ago, it was now possible to call Mojo code directly
    from Python.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，总会有一个障碍，那就是人们不愿意完全转向一种新的语言。我也是这些人之一，所以我很高兴地读到，就在几周前，现在可以直接从Python中调用Mojo代码。
- en: 'Does this mean we get the best of both worlds: the simplicity of Python and
    the performance of Mojo?'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这是否意味着我们得到了两全其美的结果：Python的简单性和Mojo的性能？
- en: To test the claims, we will write some code using vanilla Python. Then, for
    each, we’ll also code a version using NumPy and, finally, a Python version that
    offloads some of its computation to a Mojo module. Ultimately, we’ll compare the
    various run times.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这些说法，我们将使用纯Python编写一些代码。然后，对于每个版本，我们还将使用NumPy编写一个版本，最后，我们将编写一个将部分计算卸载到Mojo模块的Python版本。最终，我们将比较各种运行时间。
- en: Will we see significant performance gains? Read on to find out.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们会看到显著的性能提升吗？请继续阅读以了解。
- en: Setting up a development environment
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: I’ll be using WSL2 Ubuntu for Windows for my development. The best practice
    is to set up a new development environment for each project you’re working on.
    I usually use conda for this, but as everyone and their granny seems to be moving
    towards using the new **uv** package manager, I’m going to give that a go instead.
    There are a couple of ways you can install uv.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用WSL2 Ubuntu for Windows进行我的开发。最佳实践是为每个正在工作的项目设置一个新的开发环境。我通常使用conda来做这件事，但似乎每个人和他们的祖母都在转向使用新的**uv**包管理器，所以我打算试一试。安装uv有几种方法。
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Next, initialise a project.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，初始化一个项目。
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now, add any external libraries we need
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，添加我们需要的任何外部库
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: How does calling Mojo from Python work?
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何从Python调用Mojo？
- en: Let’s assume we have the following simple Mojo function that takes a Python
    variable as an argument and adds two to its value. For example,
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个以下简单的Mojo函数，它接受一个Python变量作为参数并将其值增加二。例如，
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: When Python is trying to load add_two, it looks for a function called **PyInit_add_two()**.
    Within PyInit_add_two(), we have to declare all Mojo functions and types that
    are callable from Python using the **PythonModuleBuilder** library. So, in fact,
    our Mojo code in its final form will resemble this.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当Python尝试加载add_two时，它会寻找一个名为**PyInit_add_two()**的函数。在PyInit_add_two()中，我们必须使用**PythonModuleBuilder**库声明所有可以从Python调用的Mojo函数和类型。因此，实际上，我们最终的Mojo代码将类似于以下内容。
- en: '[PRE4]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The Python code requires additional boilerplate code to function correctly,
    as shown here.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Python代码需要额外的样板代码才能正确运行，如下所示。
- en: '[PRE5]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Code examples
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码示例
- en: For each of my examples, I’ll show three different versions of the code. One
    will be written in pure Python, one will utilise NumPy to speed things up, and
    the other will substitute calls to Mojo where appropriate.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的每个例子，我将展示三种不同的代码版本。一个将是纯Python编写的，一个将利用NumPy来加速，另一个将适当地替换Mojo的调用。
- en: Be warned that calling Mojo code from Python is in early development. You can
    expect significant changes to the API and ergonomics
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 提醒您，从Python调用Mojo代码还处于早期开发阶段。您可以期待API和用户体验将发生重大变化
- en: Example 1 — Calculating a Mandelbrot set
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1—计算曼德布罗特集
- en: For our first example, we’ll compute and display a Mandelbrot set. This is quite
    computationally expensive, and as we’ll see, the pure Python version takes a considerable
    amount of time to complete.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的第一个例子中，我们将计算并显示一个曼德布罗特集。这相当计算量大，而且正如我们将看到的，纯Python版本需要相当长的时间才能完成。
- en: We’ll need four files in total for this example.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子总共需要四个文件。
- en: 1/ mandelbrot_pure_py.py
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 1/ mandelbrot_pure_py.py
- en: '[PRE6]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 2/ mandelbrot_numpy.py
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 2/ mandelbrot_numpy.py
- en: '[PRE7]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 3/ mandelbrot_mojo.mojo
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 3/ mandelbrot_mojo.mojo
- en: '[PRE8]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 4/ main.py
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 4/ main.py
- en: This will call the other three programs and also allow us to plot out the Mandelbrot
    graph in a Jupyter Notebook. I’ll only show the plot once. You’ll have to take
    my word that it was plotted correctly on all three runs of the code.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这将调用其他三个程序，并允许我们在Jupyter Notebook中绘制曼德布罗特图。我只会展示一次图表。您必须相信，在代码的三个运行中，图表都正确绘制。
- en: '[PRE9]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Finally, here is the output.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这是输出结果。
- en: '![](../Images/e7e2f3eed61d7a5af4a8283771ed2b3e.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e7e2f3eed61d7a5af4a8283771ed2b3e.png)'
- en: Image by Author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Ok, so that’s an impressive start for Mojo. It was almost 20 times faster than
    the pure Python implementation and 5 times faster than the NumPy code.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，所以Mojo的起点很令人印象深刻。它比纯Python实现快了近20倍，比NumPy代码快5倍。
- en: Example 2 — Numerical integration
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2—数值积分
- en: For this example, we will perform numerical integration using Simpson’s rule
    to determine the value of sin(X) in the interval 0 to π. Recall that Simpson’s
    rule is a method of calculating an approximate value for an integral and is defined
    as,
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我们将使用辛普森法则进行数值积分，以确定0到π区间内sin(X)的值。回想一下，辛普森法则是计算积分近似值的一种方法，定义为，
- en: ∫ ≈ (h/3) * [f(x₀) + 4f(x₁) + 2f(x₂) + 4f(x₃) + … + 2f(xₙ-₂) + 4f(xₙ-₁) + f(xₙ)]
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: ∫ ≈ (h/3) * [f(x₀) + 4f(x₁) + 2f(x₂) + 4f(x₃) + … + 2f(xₙ-₂) + 4f(xₙ-₁) + f(xₙ)]
- en: 'Where:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: h is the width of each step.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: h是每步的宽度。
- en: The weights are 1, 4, 2, 4, 2, …, 4, 1.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权重为1，4，2，4，2，…，4，1。
- en: The first and last points have a weight of **1**.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个和最后一个点的权重为**1**。
- en: The points at **odd** indices have a weight of **4**.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 索引为**奇数**的点权重为**4**。
- en: The points at **even** indices have a weight of **2**.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 索引为**偶数**的点权重为**2**。
- en: The true value of the integral we’re trying to calculate is **two**. Let’s see
    how accurate (and fast) our methods are.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们试图计算的积分的真实值是**二**。让我们看看我们的方法有多准确（以及多快）。
- en: Once again, we need four files.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，我们需要四个文件。
- en: 1/ integration_pure_py.py
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 1/ integration_pure_py.py
- en: '[PRE10]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 2/ integration_numpy
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 2/ integration_numpy
- en: '[PRE11]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 3/ integration_mojo.mojo
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 3/ integration_mojo.mojo
- en: '[PRE12]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 4/ main.py
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 4/ main.py
- en: '[PRE13]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: And the results?
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，结果如何？
- en: '[PRE14]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'It’s interesting that this time, the NumPy code was marginally faster than
    the Mojo code, and its final value was more accurate. This highlights a key concept
    in high-performance computing: the trade-off between **vectorisation and JIT-compiled
    loops**.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 很有趣的是，这次，NumPy代码在速度上略快于Mojo代码，并且其最终值更准确。这突显了高性能计算中的一个关键概念：**向量化与即时编译循环**之间的权衡。
- en: NumPy’s strength lies in its ability to vectorise operations. It allocates a
    large block of memory and then calls highly optimised, pre-compiled C code that
    leverages modern CPU features, such as SIMD, to perform the sin() function on
    millions of values simultaneously. This “burst processing” is incredibly efficient.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy的优势在于其向量化操作的能力。它分配一大块内存，然后调用高度优化的、预编译的C代码，利用现代CPU特性，如SIMD，同时对数百万个值执行sin()函数。这种“爆发式处理”非常高效。
- en: Mojo, on the other hand, takes our simple while loop and JIT-compiles it into
    highly efficient machine code. While this avoids the large initial memory allocation
    of NumPy, in this specific case, the raw power of NumPy’s vectorisation gave it
    a slight edge.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，Mojo将我们的简单while循环即时编译成高度高效的机器代码。虽然这避免了NumPy的大规模初始内存分配，但在这种特定情况下，NumPy的向量化原始力量给它带来了一丝优势。
- en: Example 3— The sigmoid function
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例3——Sigmoid函数
- en: The sigmoid function is an important concept in AI as it’s the cornerstone of
    binary classification.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid函数是人工智能中的一个重要概念，因为它是二元分类的基石。
- en: Also known as the logistic function, it is defined as this.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 也被称为逻辑函数，其定义如下。
- en: '![](../Images/3254f1cb473b22490e5cbf1a4568f94f.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3254f1cb473b22490e5cbf1a4568f94f.png)'
- en: The sigmoid function takes any real-valued input x and “squashes” it smoothly
    into the open interval (0,1). In simple terms, no matter what is passed to the
    sigmoid function, it will always return a value between 0 and 1.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid函数接受任何实数值输入x，并将其平滑地“压缩”到开区间（0,1）。简单来说，无论传递给sigmoid函数什么值，它总会返回介于0和1之间的值。
- en: So, for example,
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，
- en: '[PRE15]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This makes it perfect for representing certain things like probabilities.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这使其非常适合表示某些事物，如概率。
- en: Because the Python code is simpler, we can include it in the benchmarking script,
    so we only have two files this time.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Python代码更简单，我们可以将其包含在基准测试脚本中，因此这次我们只有两个文件。
- en: '**sigmoid_mojo.mojo**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**sigmoid_mojo.mojo**'
- en: '[PRE16]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '**main.py**'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**main.py**'
- en: '[PRE17]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Here is the output.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是输出结果。
- en: '[PRE18]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The **Σσ=…** outputs are showing the sum of all the calculated Sigmoid values.
    In theory, this should be precisely equal to the input N divided by 2, as N tends
    towards infinity.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**Σσ=…**的输出显示了所有计算出的Sigmoid值的总和。从理论上讲，这应该精确等于输入N除以2，因为N趋向于无穷大。'
- en: But as we see, the mojo implementation represents a decent uplift of over 2x
    on the already fast NumPy code and is over 12x faster than the base Python implementation.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 但正如我们所见，Mojo实现相对于已经很快的NumPy代码提升了超过2倍，并且比基础Python实现快12倍以上。
- en: Not too shabby.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 还不错。
- en: Summary
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This article explored the exciting new capability of calling high-performance
    Mojo code directly from Python to accelerate computationally intensive tasks.
    Mojo, a relatively new systems programming language from Modular, promises C-level
    performance with a familiar Pythonic syntax, aiming to solve Python’s historical
    speed limitations.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 本文探讨了直接从Python调用高性能Mojo代码以加速计算密集型任务的新功能。Mojo是Modular公司的一个相对较新的系统编程语言，它承诺以熟悉的Python语法提供C级性能，旨在解决Python历史速度限制问题。
- en: 'To test this promise, we benchmarked three computationally expensive scenarios:
    Mandelbrot set generation, numerical integration, and the sigmoid calculation
    function, by implementing each in pure Python, optimised NumPy, and a hybrid Python-Mojo
    approach.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这一承诺，我们通过纯Python、优化NumPy和混合Python-Mojo方法实现了每个计算密集型场景：Mandelbrot集生成、数值积分和sigmoid计算函数。
- en: The results reveal a nuanced performance landscape for loop-heavy algorithms
    where data can be processed entirely with native Mojo types. Mojo can significantly
    outperform both pure Python and even highly optimised NumPy code. However, we
    also saw that for tasks that align perfectly with NumPy’s vectorised, pre-compiled
    C functions, NumPy can maintain a slight edge over Mojo.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 结果揭示了循环密集型算法的性能特点，在这些算法中，数据可以完全使用原生Mojo类型进行处理。Mojo可以显著优于纯Python代码，甚至比高度优化的NumPy代码还要快。然而，我们也看到，对于与NumPy的向量化、预编译C函数完美匹配的任务，NumPy可以保持对Mojo的微小优势。
- en: This investigation demonstrates that while Mojo is a powerful new tool for Python
    acceleration, achieving maximum performance requires a thoughtful approach to
    minimising the “bridge-crossing” overhead between the two language runtimes.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这项调查表明，虽然Mojo是Python加速的强大新工具，但要实现最佳性能，需要深思熟虑地减少两种语言运行时之间的“桥梁跨越”开销。
- en: As always, when considering performance enhancements to your code, test, test,
    test. That is the final arbiter as to whether it’s worthwhile or not.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 始终如一，在考虑对您的代码进行性能提升时，测试，测试，再测试。这是判断是否值得做的最终裁决。
