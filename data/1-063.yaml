- en: Your Next ‘Large’ Language Model Might Not Be Large After All
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您的下一个“大型”语言模型可能最终并不大
- en: 原文：[https://towardsdatascience.com/your-next-large-language-model-might-not-be-large-afterall-2/](https://towardsdatascience.com/your-next-large-language-model-might-not-be-large-afterall-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/your-next-large-language-model-might-not-be-large-afterall-2/](https://towardsdatascience.com/your-next-large-language-model-might-not-be-large-afterall-2/)
- en: <mdspan datatext="el1763754449550" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763754449550" class="mdspan-comment">引言</mdspan>
- en: <mdspan datatext="el1768890078904" class="mdspan-comment">Since</mdspan> the
    conception of AI, researchers have always held faith in scale — that general intelligence
    was an emergent property born out of size. If we just keep on adding parameters
    and train them on gargantuan corpora, human-like reasoning would manifest itself.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1768890078904" class="mdspan-comment">自AI概念提出以来</mdspan>，研究人员一直坚信规模的力量——普遍智能是随着规模的增长而出现的属性。如果我们只是继续增加参数并在庞大的语料库上训练它们，类似人类的推理就会显现出来。
- en: But we soon discovered that even this brute-force approach had its own shortcomings.
    Evidence suggests that a majority of our frontier models are severely undertrained
    and have inflated parameter counts [(Hoffmann et al., 2022)](https://arxiv.org/abs/2203.15556)³,
    which indicates that we might be spending compute in the wrong avenue after all.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们很快发现，即使是这种蛮力方法也有其自身的缺陷。证据表明，我们的大多数前沿模型都严重欠训练，参数计数过高[(Hoffmann等人，2022)](https://arxiv.org/abs/2203.15556)³，这表明我们可能最终还是把计算资源用在了错误的方向上。
- en: The Hidden Flaws of the AI Giants
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能巨头的隐藏缺陷
- en: 'We made the most powerful AI ever built think in a slow, awkward, foreign language:
    English. To find solutions to problems, they must “reason out loud” through a
    word-for-word, step-by-step process while also providing us with many irrelevant
    and inefficiently managed “tokens.”'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们让有史以来最强大的AI以缓慢、笨拙、外语：英语进行思考。为了找到问题的解决方案，它们必须通过逐字逐句、一步一步的过程“大声推理”，同时向我们提供许多无关且管理低效的“标记”。
- en: Then there is the well-established industry practice of “the-bigger-the-better.”
    This has led to the development of models with billions of parameters and training
    sets with trillions of tokens. The sheer size of such models implies that the
    models are not really reasoning; they are simply being the best possible imitators.
    Instead of finding an original, novel solution for a particular problem, they
    use the fact that they were previously shown something similar to the current
    problem during their training data to arrive at a solution.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然后是业界的“越大越好”的既定实践。这导致了拥有数十亿参数和包含万亿标记的训练集的模型的发展。这些模型的大小本身意味着它们并不是真正在推理；它们只是最好的模仿者。它们不是为特定问题找到原创的、新颖的解决方案，而是利用它们在训练数据中之前展示过与当前问题相似的事实来得出解决方案。
- en: Lastly, and perhaps most critically, these models are limited to a “one-size-fits-all”
    method of thinking. As an example, when dealing with a very difficult problem,
    a model cannot choose to spend additional processing time working on a particularly
    difficult area of the problem. Of course, if a model takes more time to work on
    a more difficult problem, it generates more CoT tokens ([Wei et al., 2022](https://arxiv.org/abs/2201.11903))⁴.
    But this doesn’t necessarily replicate human reasoning, which involves deep stages
    of pondering without any tangible verbal dialogue.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，也许是最关键的是，这些模型局限于一种“一刀切”的思考方法。例如，在处理一个非常困难的问题时，模型不能选择在问题的特定困难区域上花费额外的处理时间。当然，如果模型在更困难的问题上花费更多时间，它会产生更多的CoT标记([Wei等人，2022](https://arxiv.org/abs/2201.11903))⁴。但这并不一定复制人类的推理，人类的推理涉及没有具体口头对话的深思熟虑的阶段。
- en: Hierarchical Reasoning Models
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分层推理模型
- en: 'Introducing Hierarchical Reasoning Models (HRMs) ([Wang et al., 2025b](https://arxiv.org/abs/2506.21734))¹:
    instead of the clumsy “think out loud” approach, they reason silently and fluently
    within their native latent space—a rich, high-dimensional world of numbers. This
    is far closer to our own human intuition, where deep thoughts often precede the
    words we use to describe them.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 介绍分层推理模型（HRMs）([Wang等人，2025b](https://arxiv.org/abs/2506.21734))¹：它们不是笨拙的“大声思考”方法，而是在它们本地的潜在空间中无声且流畅地推理——一个充满数字的丰富、高维世界。这更接近我们自己的直觉，深层次的思考往往在我们用言语描述它们之前。
- en: 'The heart of this new architecture is beautifully simple yet dynamic: a patient,
    H-module which sets the overall strategy, while a fast, low-level L-module is
    responsible for seeing through the set strategy all the way. Both of the modules
    are implemented as simple transformer blocks [(Vaswani et al., 2017)](https://arxiv.org/abs/1706.03762)²
    stacked on top of each other.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这个新架构的核心是美丽而简单且动态的：一个耐心的高级H模块，负责设定整体策略，而一个快速的低级L模块则负责执行设定的策略。这两个模块都作为简单的转换器块[(Vaswani
    et al., 2017)](https://arxiv.org/abs/1706.03762)²堆叠在一起。
- en: 'How HRM Thinks: A Look Inside'
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: HRM是如何思考的：内部一瞥
- en: It breaks down the act of “thinking” into a dynamic, two-speed system. To understand
    how it solves a complex problem like a 30×30 maze, let’s walk through the entire
    journey from input to answer.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 它将“思考”的行为分解为一个动态的双速系统。为了理解它是如何解决像30×30迷宫这样的复杂问题，让我们从输入到答案的整个旅程进行回顾。
- en: '![](../Images/2f7772fb401bd9eec59e879ba4a3ec30.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2f7772fb401bd9eec59e879ba4a3ec30.png)'
- en: '(Source: Author)'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: Overall Architecture of the HRM
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: HRM的整体架构
- en: '(Note: All the H-modules and L-modules share their own respective weights across
    all instances and process information in a recurrent manner)'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: （注意：所有H模块和L模块在所有实例中共享它们各自的权重，并以循环的方式处理信息）
- en: '1\. The Setup: Embedding and Initializations'
  id: totrans-18
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 设置：嵌入和初始化
- en: '**Flatten and Embed:** As the name suggests, the input (for example, a Sudoku
    grid or maze) is flattened into a single-dimensional stream of patches/tokens,
    and then fed into an embedding model, which converts the human-interpretable maze
    into embedding vectors understood by machines.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**展平和嵌入**：正如其名所示，输入（例如，数独网格或迷宫）被展平成一个单维的补丁/标记流，然后输入到嵌入模型中，该模型将人类可解释的迷宫转换为机器可理解的嵌入向量。'
- en: '**Initialize Memory:** Two different modules are now instantiated: a High-Level
    state (z[H]), which acts as a supervisor, dictating the overarching direction
    of thought and reasoning, and a Low-Level state (zL) responsible for executing
    the reasoning in the set direction.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化记忆**：现在实例化了两个不同的模块：一个高级状态（z[H]），作为监督者，规定思考和推理的总体方向，以及一个低级状态（zL），负责在设定的方向上执行推理。'
- en: '2\. The Core Engine: Real Reasoning Starts Here'
  id: totrans-21
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 核心引擎：真正的推理从这里开始
- en: At its core, HRM is a nested loop, and a single pass through it is termed a
    “segment”. Each segment contains several *H* and *L* module cycles in itself.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，HRM是一个嵌套循环，通过它的一次遍历被称为“段”。每个段包含几个*H*和*L*模块周期。
- en: '**Step A: Setting the Plan**'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤A：设置计划**'
- en: The High-Level (H) module begins by establishing a high-level plan. Its memory
    state (z[H]) is held constant for a set number of steps and initialized randomly
    for the first pass. In our maze example, this initial plan might be very abstract/general,
    like “explore paths that move downwards and to the right.”
  id: totrans-24
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 高级（H）模块首先建立一个高级计划。它的记忆状态（z[H]）在固定数量的步骤中保持不变，并在第一次遍历时随机初始化。在我们的迷宫示例中，这个初始计划可能非常抽象/一般，例如“探索向下和向右移动的路径。”
- en: '**Step B: Executing the Plan**'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤B：执行计划**'
- en: 'With the High-Level module’s plan as a fixed guide, the Low-Level (L) module
    begins a series of recurrent computations. For a set number of timesteps (T),
    it iteratively updates its own hidden state (z[L]), with three inputs to work
    on:'
  id: totrans-26
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在高级模块的计划作为固定指南的情况下，低级（L）模块开始一系列循环计算。对于固定的timesteps（T）数量，它迭代地更新自己的隐藏状态（z[L]），有三个输入需要处理：
- en: Its own work from the previous step (z[L_previous]).
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上一步的自身工作（z[L_previous]）。
- en: The fixed plan from the High-Level Module (z[H]).
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高级模块的固定计划（z[H]）。
- en: The original problem (the embedded maze).
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原始问题（嵌入的迷宫）。
- en: The Low-Level module, while keeping the overarching strategy in mind, explores
    numerous paths, hits dead ends, backtracks and repeats, until it reaches a conclusion,
    that is then shared with the High-Level module.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 低级模块在保持总体策略的同时，探索众多路径，遇到死胡同，回溯并重复，直到得出结论，然后将结论与高级模块共享。
- en: '**Step C: Changing the Plan Accordingly**'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤C：相应地调整计划**'
- en: 'Once the L-module is done with its recurrent working cycles, its final memory
    state (z[L_final]), which represents the outcome of its computation, is fed to
    the H-module for refinement. The H-module modifies its own plans and devises a
    new strategy for the L-module to follow in the next iteration. For example: “The
    downward path is an eventual dead end. The new plan is to now explore paths leading
    right.”'
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一旦L模块完成了其重复工作循环，其最终记忆状态（z[L_final]），代表其计算的结果，被输入到H模块进行细化。H模块修改自己的计划，并为L模块在下一个迭代中制定新的策略。例如：“向下路径最终是死胡同。新的计划是现在探索向右的路径。”
- en: '**Step D: Reset and Repeat**'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤D：重置并重复**'
- en: The L-module receives this updated plan from its “supervisor” for the next cycle
    of its recurrent and intensive work. This goes on for the next “N” cycles for
    the H-module, each cycle consisting of “T” sub-cycles of the L-module.
  id: totrans-34
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: L模块从其“主管”那里接收这个更新的计划，用于其下一个循环的重复和密集工作。对于H模块来说，这个过程会持续进行下一个“N”个循环，每个循环由L模块的“T”个子循环组成。
- en: '3\. The “Exit” Button: Deciding When to Stop'
  id: totrans-35
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. “退出”按钮：决定何时停止
- en: A single pass through the engine (a “segment”) might not be enough for a more
    nuanced or harder problem. This is where HRM’s most ingenious feature comes in: **Adaptive
    Computation Time (ACT)** [(Graves, 2016)](https://arxiv.org/abs/1603.08983)⁶.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 通过引擎（一个“段落”）的单次遍历可能不足以解决更微妙或更难的问题。这就是HRM最巧妙的功能所在：**自适应计算时间（ACT）** [(Graves,
    2016)](https://arxiv.org/abs/1603.08983)⁶。
- en: 'After each full segment of thought (*N×T* cycles), the model generates a tentative
    answer. Then, it is fed into a simple linear network, which decides: “Am I confident
    enough to stop, or should I think more?”'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个完整的思维段落（*N×T* 循环）之后，模型生成一个试探性答案。然后，它被输入到一个简单的线性网络中，该网络决定：“我有足够的信心停止，还是应该再思考一下？”
- en: If the model determines that it is confident enough in its answer, it **halts** and
    presents it as the final solution.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果模型确定其对答案有足够的信心，它**停止**并展示为最终解决方案。
- en: If not, it decides to **“ponder”** further. It takes the final memory state
    of the L and H modules and uses it as initialization for an entirely new segment,
    which continues the thinking process.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果不是，它决定**“深思”**。它使用L和H模块的最终记忆状态作为全新段落的初始化，继续思考过程。
- en: '**Implementation of ACT:**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**ACT的实现**：'
- en: The model learns when to stop through a Q-learning paradigm.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 模型通过Q学习范式学习何时停止。
- en: '**The Q-Head:** This is a simple linear layer (Q-Head) that takes the call
    to either continue reasoning or to stop. It takes the final memory state of the
    H-module at the end of a segment and outputs two scores: Q[halt ]and Q[continue].'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Q-Head**：这是一个简单的线性层（Q-Head），它接受继续推理或停止的调用。它接受H模块在段落结束时的最终记忆状态，并输出两个分数：Q[halt]和Q[continue]。'
- en: '**The ‘Halt’ Value (Q[halt]):** This score represents the model’s confidence
    that it should stop now. During training, the model learns to make this score
    predict the immediate, final reward. The target it’s trained to match is simple: ***1*** if
    the predicted answer is correct, and ***0*** if it’s wrong.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**“停止”值（Q[halt]）**：这个分数代表模型现在应该停止的信心。在训练过程中，模型学习使这个分数预测立即的最终奖励。它训练以匹配的目标很简单：如果预测答案是正确的，则为***1***，如果错误，则为***0***。'
- en: '![](../Images/9a5d6bbea6592ec2a98a802239d6a7e8.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9a5d6bbea6592ec2a98a802239d6a7e8.png)'
- en: '(Source: Author)'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: 'G[halt]: The reward for stopping the reasoning process'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: G[halt]：停止推理过程的奖励
- en: 'ŷ^m: Predicted answer of the model for the task (eg, solution of the maze)'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: ŷ^m：模型对任务的预测答案（例如，迷宫的解决方案）
- en: 'y: Ground truth against the model’s prediction (eg, actual maze solution)'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: y：与模型预测的地面真实值（例如，实际的迷宫解决方案）
- en: 'm: The current segment iteration number'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: m：当前段落的迭代次数
- en: '**The ‘Continue’ Value (Q[continue]):** This represents the estimated reward
    the model would receive if it continued thinking for another segment, instead
    of stopping right now. Its target score is the estimated maximum possible value
    among the two Q-scores from the immediate next segment and is defined as:'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**“继续”值（Q[continue]）**：这代表模型如果继续思考另一个段落而不是立即停止，将会收到的估计奖励。其目标分数是来自下一个段落的两个Q分数中的估计最大可能值，定义为：'
- en: '![](../Images/e29ed4a7b41c36373bc4e6be3dffbac3.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e29ed4a7b41c36373bc4e6be3dffbac3.png)'
- en: '(Source: Author)'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: 'G[continue]: The reward for continuation of reasoning'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: G[continue]：继续推理的奖励
- en: 'm: The current segment iteration number'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: m：当前段落的迭代次数
- en: 'Q[continue/halt]: Q-heads predicted output'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: Q[continue/halt]：Q-Head预测的输出
- en: '**The Dual-Loss System:** After each segment of thought, the model’s total
    loss comprises two different objectives:'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双损失系统：**在每个思维片段之后，模型的总损失由两个不同的目标组成：'
- en: '**Task Loss:** The standard loss for getting the wrong answer (sequence-to-sequence
    cross-entropy).'
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务损失：**得到错误答案的标准损失（序列到序列交叉熵）。'
- en: '**Q-Learning Loss:** ACT loss for making a poor stopping decision (Binary Crossentropy).'
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Q-Learning损失：**做出不良停止决策的ACT损失（二元交叉熵）。'
- en: '![](../Images/0aec4b31a1f586e534abf161773a2f51.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0aec4b31a1f586e534abf161773a2f51.png)'
- en: '(Source: Author)'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: 'L^m[total]: Total loss for the entire model'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: L^m[total]：整个模型的总损失
- en: 'ŷ^m: Predicted answer of the model for the task (eg, solution of the maze)'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: ŷ^m：模型对任务的预测答案（例如，迷宫的解决方案）
- en: 'y: Ground truth against the model’s prediction (eg, actual maze solution)'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: y：模型预测的真实值（例如，实际的迷宫解决方案）
- en: 'Q^m: Q-Head’s output prediction of either to halt or continue'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: Q^m：Q-Head的输出预测，要么停止要么继续
- en: 'G^m: Q-Head’s output target'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: G^m：Q-Head的输出目标
- en: 'This enables the model to learn both objectives simultaneously: how to solve
    the given question while learning to recognize when it has been solved.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这使得模型能够同时学习两个目标：如何在解决问题的同时学习识别何时已经解决问题。
- en: 'Putting It to the Test: Results'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实践检验：结果
- en: Sudoku and Maze Benchmarks
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数独和迷宫基准
- en: On benchmarking against several state-of-the-art reasoning models, HRM performs
    significantly better on complex reasoning tasks involving Sudoku puzzles and 30×30
    mazes. Both of them require extensive logical deduction, the ability to backtrack,
    and spatial planning. As shown below, all other models that use Chain-of-Thought
    prompting failed to produce even a single valid solution. These findings validate
    the notion that making models reason in a much more representative latent space
    is better than making them talk to themselves via CoT.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在与几个最先进的推理模型进行基准测试时，HRM在涉及数独谜题和30×30迷宫的复杂推理任务上表现显著更好。它们都需要广泛的逻辑推理、回溯能力和空间规划能力。如下所示，所有使用思维链提示的其他模型都未能产生任何有效的解决方案。这些发现验证了这样一个观点：让模型在一个更具代表性的潜在空间中进行推理，比通过CoT让它们自我对话要好。
- en: '![](../Images/c1b0bbb42ca9390d6093798d9816361a.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c1b0bbb42ca9390d6093798d9816361a.png)'
- en: '(Source: Adapted from [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹,
    Figure 1)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：改编自 [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹，图1）
- en: 'X-axis: Accuracy of the models on the respective benchmarks'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: X轴：模型在相应基准上的准确率
- en: 'Architecture Over Scale: A Paradigm of Efficiency'
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 架构胜于规模：效率的范例
- en: The model can perform such a feat while also delivering extreme levels of parameter
    and data efficiency. It manages its top-tier performance with 27 million parameters,
    trained from scratch on roughly 1,000 datapoints per task. It also doesn’t need
    any expensive pre-training on web-scale datasets or brittle prompt engineering
    tactics. It further solidifies the hypothesis that the model can internalise general
    patterns and can reason much more efficiently than the standard CoT-based approach
    to reasoning.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 模型能够在保持极端的参数和数据效率的同时完成这样的壮举。它以27百万参数，在每个任务上从大约1000个数据点从头开始训练。它也不需要任何昂贵的在网页规模数据集上的预训练或脆弱的提示工程策略。这进一步巩固了模型可以内化通用模式，并且可以比标准基于CoT的推理方法更有效地推理的假设。
- en: 'Abstract Reasoning and Fluid Intelligence: The ARC-AGI Challenge'
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 抽象推理和流体智能：ARC-AGI挑战
- en: The Abstraction and Reasoning Corpus (ARC) [(Chollet, 2019)](https://arxiv.org/abs/1911.01547)⁵
    is a widely accepted benchmark for fluid intelligence and requires the models
    to infer vague and abstract rules, given only a few visual examples. HRM, with
    just 27 million parameters, outperforms most of the mainstream reasoning models.
    Despite its size, it scored 40.3% on ARC-AGI-1, while the much larger models with
    tremendous compute at their disposal, like o3-mini and Claude 3.7, managed to
    get a subpar score of 34.5% and 21.2% respectively.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 抽象和推理语料库（ARC）[(Chollet, 2019)](https://arxiv.org/abs/1911.01547)⁵是流体智能的广泛接受的标准，要求模型在只有少量视觉示例的情况下推断模糊和抽象的规则。HRM，仅27百万参数，就优于大多数主流推理模型。尽管其规模较小，但在ARC-AGI-1上得分40.3%，而那些规模更大、计算能力强大的模型，如o3-mini和Claude
    3.7，分别得到了34.5%和21.2%的次优分数。
- en: '![](../Images/b1dede40e27d08c6ed35afc03060ce5b.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b1dede40e27d08c6ed35afc03060ce5b.png)'
- en: '(Source: Adapted from [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹,
    Figure 1)'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：改编自 [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹，图1）
- en: 'X-axis: Accuracy of the models on the respective benchmarks'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: X轴：模型在相应基准上的准确率
- en: Unlocking True Computational Depth
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解锁真正的计算深度
- en: Performance on vanilla transformer architectures quickly starts to plateau when
    given more compute, i.e., simply adding more layers yields diminishing returns
    on complex reasoning. Contrastingly, HRM’s accuracy scales almost linearly with
    additional computational steps. This provides direct evidence from the paper that
    the model’s architecture is not a fixed-depth system. It possesses an intrinsic
    ability to utilize the extra compute to deal with complex tasks, a capability
    that the underlying structure of a standard Transformer lacks.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定的更多计算资源下，vanilla transformer 架构的性能很快就会开始达到平台期，即仅仅增加更多层会导致复杂推理的回报递减。相比之下，HRM
    的准确度几乎与额外的计算步骤线性增长。这为论文提供了直接证据，表明该模型的架构不是一个固定深度的系统。它具有利用额外计算资源来处理复杂任务的内禀能力，这是标准
    Transformer 的底层结构所缺乏的。
- en: '![](../Images/bbae9338d16f15213140c23ec8554a0e.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bbae9338d16f15213140c23ec8554a0e.png)'
- en: '(Source: Adapted from [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹,
    Figure 2)'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：改编自 [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹，图 2)
- en: 'X-axis: Accuracy of the models on the Sudoku-Extreme Full dataset'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: X 轴：Sudoku-Extreme Full 数据集上模型的准确度
- en: 'Intelligent Efficiency: Solving Problems with Less Effort'
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 智能效率：用更少的努力解决问题
- en: The Adaptive Computation Time (ACT) mechanism allows the model to dynamically
    allocate its computational resources based on problem difficulty. An HRM equipped
    with ACT achieves the same top-tier accuracy as a model hard-coded to use a high
    number of steps, but it does so with significantly fewer resources on average.
    It learns to conserve compute by solving easy problems quickly while dedicating
    more “ponder time” only when necessary, demonstrating an intelligent efficiency
    that moves beyond brute-force computation.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应计算时间 (ACT) 机制允许模型根据问题难度动态分配其计算资源。配备 ACT 的 HRM 实现了与硬编码使用大量步骤的模型相同的顶级准确度，但平均使用的资源显著更少。它通过快速解决简单问题来节省计算资源，仅在必要时分配更多“思考时间”，展示了超越蛮力计算的智能效率。
- en: '![](../Images/6825801c36fd2ee408637e0170e64c4b.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6825801c36fd2ee408637e0170e64c4b.png)'
- en: '(Source: Adapted from [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹,
    Figure 5)'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：改编自 [Wang et al., 2025](https://arxiv.org/abs/2506.21734)¹，图 5)
- en: 'These two graphs must be analysed together to understand the efficiency of
    the ACT mechanism. The X-axis on both charts represents the computational budget:
    for the “Fixed M” model, it is the exact number of steps it must perform, while
    for the “ACT” model, it is the maximum allowed number of steps (M[max]). The Y-axis on
    Figure (a) shows the average number of steps actually used, while the Y-axis on
    Figure (b) shows the final accuracy.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解 ACT 机制的效率，必须一起分析这两张图。两张图上的 X 轴都代表计算预算：对于“固定 M”模型，它是必须执行的精确步骤数，而对于“ACT”模型，它是允许的最大步骤数
    (M[max])。图 (a) 上的 Y 轴显示实际使用的平均步骤数，而图 (b) 上的 Y 轴显示最终的准确度。
- en: 'The “Fixed M” model’s accuracy (black line, Fig. b) peaks when its budget is
    8, but this comes at a fixed cost of using exactly 8 steps for every problem (black
    line, Fig. a). The “ACT” model (blue line, Fig. b) achieves a nearly identical
    peak accuracy when its maximum budget is 8\. However, Fig. (a) shows that to achieve
    this, it only uses an average of about 1.5 steps. The conclusion is clear: the
    ACT model learns to accomplish the same top-tier performance while using less
    than a quarter of the computational resources, intelligently stopping early on
    problems it has already solved.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: “固定 M”模型的准确度（黑色线条，图 b）在预算为 8 时达到峰值，但这需要为每个问题精确使用 8 个步骤（黑色线条，图 a）。而“ACT”模型（蓝色线条，图
    b）在最大预算为 8 时实现了几乎相同的峰值准确度。然而，图 (a) 显示，为了达到这一点，它平均只使用了大约 1.5 个步骤。结论是明确的：ACT 模型学会了以使用不到四分之一的计算资源完成相同的顶级性能，并在已经解决的问题上智能地提前停止。
- en: '**If you like these kinds of breakdowns, I share more insights, notes, and
    explainers here: [https://steadysurfdom.substack.com/](https://steadysurfdom.substack.com/)**'
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**如果您喜欢这类分解，我在这里分享更多见解、笔记和解释：[https://steadysurfdom.substack.com/](https://steadysurfdom.substack.com/)**'
