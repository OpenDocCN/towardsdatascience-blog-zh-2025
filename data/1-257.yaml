- en: 5 Techniques to Prevent Hallucinations in Your RAG Question Answering
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5种防止你的RAG问答中幻觉的技术
- en: 原文：[https://towardsdatascience.com/5-techniques-to-prevent-hallucinations-in-your-rag-question-answering/](https://towardsdatascience.com/5-techniques-to-prevent-hallucinations-in-your-rag-question-answering/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/5-techniques-to-prevent-hallucinations-in-your-rag-question-answering/](https://towardsdatascience.com/5-techniques-to-prevent-hallucinations-in-your-rag-question-answering/)
- en: <mdspan datatext="el1758592060552" class="mdspan-comment">Hallucinations are
    a massive</mdspan> problem when working with LLMs. They are a problem for two
    main reasons. The first apparent reason is that a hallucination naturally causes
    the user to receive an incorrect response. The second, arguably worse reason,
    is that hallucinations lower the users’ trust in the system. Without the user
    believing in your question answering system, it will be difficult to keep the
    users on your platform.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758592060552" class="mdspan-comment">在处理LLM时，幻觉是一个巨大的问题。它们有两个主要原因。第一个明显的原因是幻觉自然会使用户收到不正确的响应。第二个，可以说是更糟糕的原因，是幻觉降低了用户对系统的信任。如果没有用户相信你的问答系统，那么很难让用户留在你的平台上。
