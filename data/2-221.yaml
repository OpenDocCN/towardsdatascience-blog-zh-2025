- en: 'Programming, Not Prompting: A Hands-On Guide to DSPy'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 编程，而非提示：DSPy的实战指南
- en: 原文：[https://towardsdatascience.com/programming-not-prompting-a-hands-on-guide-to-dspy/](https://towardsdatascience.com/programming-not-prompting-a-hands-on-guide-to-dspy/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/programming-not-prompting-a-hands-on-guide-to-dspy/](https://towardsdatascience.com/programming-not-prompting-a-hands-on-guide-to-dspy/)
- en: <mdspan datatext="el1750720588795" class="mdspan-comment">The modern GenAI</mdspan>
    landscape is built around prompting. We instruct LLMs like ChatGPT or Claude using
    long, highly detailed, step-by-step guides to achieve the desired outcomes. Crafting
    these prompts takes a lot of time and effort, but we’re willing to spend it since
    better prompts usually lead to better results.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750720588795" class="mdspan-comment">现代通用人工智能（GenAI）的景观是围绕提示构建的。我们通过长篇、高度详细、分步的指南来指导LLM如ChatGPT或Claude，以实现预期的结果。制作这些提示需要花费大量的时间和精力，但我们愿意投入，因为更好的提示通常会导致更好的结果。
- en: However, reaching an optimal prompt is often a challenging task. It’s a trial-and-error
    process, where it’s not always clear what will work best for your specific task
    or a given LLM. As a result, it can take many iterations to arrive at a satisfactory
    result, especially when your prompt is several thousand words long.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，达到最佳提示通常是一个具有挑战性的任务。这是一个试错的过程，对于你的特定任务或给定的LLM来说，并不总是清楚什么是最有效的。因此，可能需要多次迭代才能得到令人满意的结果，尤其是当你的提示有数千字长时。
- en: 'To address these challenges, DataBricks launched the DSPy framework. DSPy stands
    for *Declarative Self-improving Python*. This framework allows you to build modular
    AI applications. It is based on the idea that LLM tasks can be treated as programming
    rather than manual prompting. Using standard building blocks, you can create a
    wide range of AI applications: from simple classifiers to RAG (Retrieval Augmented
    Generation) systems or even agents.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这些挑战，DataBricks推出了DSPy框架。DSPy代表*声明式自我改进Python*。这个框架允许你构建模块化的AI应用。它基于这样的想法，即LLM任务可以被当作编程而不是手动提示来处理。使用标准构建块，你可以创建各种AI应用：从简单的分类器到RAG（检索增强生成）系统，甚至是智能体。
- en: This approach seems promising. It would be exciting to build AI applications
    the same way as we build traditional software. So, I decided to give DSPy a try.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法看起来很有前景。如果能像构建传统软件一样构建AI应用，那将非常令人兴奋。因此，我决定尝试DSPy。
- en: 'In this article, we’ll explore the DSPy framework and its capabilities for
    building LLM pipelines. We’ll start with a simple combinatorics task to cover
    the basics. Then, we’ll apply DSPy to a real business problem: classifying NPS
    detractor comments. Based on this example, we’ll also test one of the framework’s
    most promising features: automatic instruction optimisation.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将探索DSPy框架及其构建LLM管道的能力。我们将从一个简单的组合任务开始，以涵盖基础知识。然后，我们将应用DSPy来解决一个真实的企业问题：对NPS负面评论进行分类。基于这个例子，我们还将测试框架最令人期待的功能之一：自动指令优化。
- en: DSPy basics
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DSPy基础知识
- en: We’ll begin exploring the DSPy framework by installing the package.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过安装包来开始探索DSPy框架。
- en: '[PRE0]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'As mentioned above, DSPy defines LLM applications in a structured and modular
    way. Every application is built using three main components:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，DSPy以结构化和模块化的方式定义LLM应用。每个应用都是使用三个主要组件构建的：
- en: '**language model** — LLM that will answer our questions,'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言模型**—能够回答我们问题的LLM'
- en: '**signature** —a declaration of the program’s input and output (*what task
    we want to solve*),'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**签名**—程序输入和输出的声明（*我们想要解决的任务是什么*）'
- en: '**module **— the prompting technique (*how we want to solve the task*).'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模块**—提示技术（*我们想要如何解决这个任务*）。'
- en: Let’s try it out with a very simple example.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个非常简单的例子来试试。
- en: As usual, we will start with a language model — the core of any LLM-powered
    application. I will be using a local model ([Llama](https://www.llama.com/) by
    Meta), accessed via [Ollama](https://github.com/ollama/ollama). If you don’t have
    Ollama installed yet, you can follow the instructions in [the documentation](https://github.com/ollama/ollama).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，我们将从语言模型开始，这是任何由LLM驱动的应用的核心。我将使用一个本地模型（Meta的[Llama](https://www.llama.com/)），通过[Ollama](https://github.com/ollama/ollama)访问。如果你还没有安装Ollama，可以按照[文档](https://github.com/ollama/ollama)中的说明进行操作。
- en: To create a language model in a DSPy application, we need to initialise a `dspy.LM`
    object and set it as a default LLM for our app. It goes without saying that DSPy
    supports not only local models but also popular APIs, such as OpenAI and Anthropic.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在DSPy应用中创建语言模型，我们需要初始化一个`dspy.LM`对象，并将其设置为我们的应用默认的LLM。不言而喻，DSPy不仅支持本地模型，还支持流行的API，如OpenAI和Anthropic。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We have our language model set up. The next step is to define the task by creating
    a module and a signature.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经设置了语言模型。下一步是通过创建模块和签名来定义任务。
- en: A **signature** defines the input and output for the model. It tells the model
    what we’re giving it and what result we expect in the end. The signature doesn’t
    specify to the model how to solve the task, it’s only a declaration.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**签名**定义了模型的输入和输出。它告诉模型我们给它什么，以及我们最终期望得到什么结果。签名不指定模型如何完成任务，它只是一个声明。'
- en: 'There are two ways to define a signature in DSPy: inline or using a class.
    For our first quick example, we will use a simple inline approach, but we will
    cover class-based definitions later in the article.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在DSPy中有两种定义签名的方法：内联或使用类。在我们的第一个快速示例中，我们将使用简单的内联方法，但稍后我们将在文章中介绍基于类的定义。
- en: '**Modules** are the building blocks of DSPy applications. They abstract different
    prompting strategies, such as [Chain-of-Thought](https://www.promptingguide.ai/techniques/cot)
    or [ReAct](https://www.promptingguide.ai/techniques/react.en). Modules are designed
    to work with any signature, so you don’t need to worry about compatibility yourself.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**模块**是DSPy应用程序的构建块。它们抽象了不同的提示策略，如[思维链](https://www.promptingguide.ai/techniques/cot)或[ReAct](https://www.promptingguide.ai/techniques/react.en)。模块被设计为与任何签名一起工作，因此您不必担心兼容性问题。'
- en: 'Here are some of the most commonly used DSPy modules (you can find the full
    list in [the documentation](https://dspy.ai/learn/programming/modules/)):'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些最常用的DSPy模块（您可以在[文档](https://dspy.ai/learn/programming/modules/)中找到完整的列表）：
- en: '`dspy.Predict` — a basic predictor;'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dspy.Predict` — 一个基本的预测器；'
- en: '`dspy.ChainOfThought` — guides an LLM to think step-by-step before returning
    a final answer;'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dspy.ChainOfThought` — 引导LLM逐步思考，然后再返回最终答案；'
- en: '`dspy.ReAct` — a basic agent that can call tools.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dspy.ReAct` — 一个可以调用工具的基本代理；'
- en: We will start with the simplest version— `dspy.Predict` and will build a basic
    model that can answer combinatorics questions. Since we expect an answer to be
    an integer, I’ve specified that in a signature.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从最简单的版本开始— `dspy.Predict`，并构建一个可以回答组合问题的基础模型。由于我们期望答案是整数，我在签名中指定了这一点。
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: That’s all we need. Now, we can start asking questions.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 需要的都准备好了。现在，我们可以开始提问了。
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We got the answer, but unfortunately, it’s incorrect. Still, let’s see how it
    works under the hood. We can see the full logs using the `dspy.inspect_history`
    command.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了答案，但不幸的是，它是错误的。尽管如此，让我们看看它内部是如何工作的。我们可以使用`dspy.inspect_history`命令查看完整的日志。
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We can see that DSPy has generated a detailed and well-structured prompt for
    us. That’s quite handy.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到DSPy为我们生成了一个详细且结构良好的提示。这非常方便。
- en: 'One last quick note before we move on to fixing the model: I noticed that DSPy
    [enables caching](https://dspy.ai/tutorials/cache/) for LLM responses by default.
    Caching might be helpful in some cases, for example, saving costs on debugging.
    However, if you want to disable it, you can either update the config or bypass
    it for a specific call.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续修复模型之前，有一个快速提醒：我注意到DSPy默认为LLM响应启用缓存[enables caching](https://dspy.ai/tutorials/cache/)。在某些情况下，缓存可能会有帮助，例如，节省调试成本。然而，如果您想禁用它，您可以通过更新配置或绕过特定调用来实现。
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Back to our task, let’s try adding reasoning to see if it improves the result.
    It’s as easy as changing the module.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 回到我们的任务，让我们尝试添加推理，看看它是否能改善结果。这就像更改模块一样简单。
- en: '[PRE6]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Hooray! The reasoning worked, and we got the correct result this time. Let’s
    see how the prompt has changed. The `reasoning` field has been added to the output
    variables.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 欢呼！推理起作用了，这次我们得到了正确的结果。让我们看看提示是如何改变的。`reasoning`字段已被添加到输出变量中。
- en: '[PRE7]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Let’s test our system with a slightly more challenging question.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个稍微更具挑战性的问题来测试我们的系统。
- en: '[PRE8]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The answer is definitely wrong. LLM shared the correct formula, but gave 55
    instead of the correct result (2,042,975). This is expected. The model hallucinated
    because it couldn’t perform the calculation accurately. So, it’s a perfect use
    case for an agent. We will equip our agent with a tool to do calculations and,
    hopefully, it will solve the problem.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 答案显然是错误的。LLM分享了正确的公式，但给出了55而不是正确的结果（2,042,975）。这是预期的。由于模型无法准确执行计算，它产生了幻觉。因此，这是一个代理的完美用例。我们将为我们的代理配备一个用于计算的工具，并希望它能解决这个问题。
- en: Before we jump to build our first DSPy agentic flow, let’s set up observability.
    It will help us understand the agent’s thought process. DSPy is integrated with
    [MLFlow](https://mlflow.org/) (an observability tool), making it easy to track
    everything in a user-friendly interface.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始构建第一个 DSPy 代理流程之前，让我们设置可观察性。这将帮助我们理解代理的思维过程。DSPy 与 [MLFlow](https://mlflow.org/)（一个可观察性工具）集成，使得在用户友好的界面中跟踪一切变得容易。
- en: To begin, we’ll make a couple of initial setup calls.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将进行几轮初始设置通话。
- en: '[PRE9]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: If you haven’t changed the default, MLFlow will be running on port 5000\. Next,
    we need to add some Python code to our program to start tracking. That’s it.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有更改默认设置，MLFlow 将在端口 5000 上运行。接下来，我们需要在我们的程序中添加一些 Python 代码以开始跟踪。就这样。
- en: '[PRE10]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Then, let’s define a calculation tool. We will give our agent the superpower
    to execute Python code.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，让我们定义一个计算工具。我们将赋予我们的代理执行 Python 代码的超能力。
- en: '[PRE11]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Now, we have everything we need to create our agent. As you can see, defining
    a DSPy agent is concise and straightforward.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们有了创建代理所需的一切。正如你所看到的，定义 DSPy 代理简洁明了。
- en: '[PRE12]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Thanks to the math capabilities, we got the correct answer. Let’s take a look
    at how the agent came up with this answer.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了数学功能，我们得到了正确答案。让我们看看代理是如何得出这个答案的。
- en: '[PRE13]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Overall, the trajectory makes sense. The LLM correctly tried to calculate the
    number of combinations with `math.comb(25, 9)` . I didn’t know that such a function
    existed, so that was a win. However, it initially forgot to import the math module,
    causing the execution to fail. On the next iteration, it corrected the Python
    code and got the result. For some reason, though, it repeated precisely the same
    action three more times. Not ideal, but we still got our answer.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，轨迹是有意义的。LLM 正确地尝试使用 `math.comb(25, 9)` 计算组合数。我不知道这个函数存在，所以这是一个胜利。然而，它最初忘记导入
    math 模块，导致执行失败。在下一个迭代中，它纠正了 Python 代码并得到了结果。然而，出于某种原因，它又重复了同样的动作三次。虽然不理想，但我们仍然得到了我们的答案。
- en: Since we enabled MLFlow, we can also view the complete log of the agent’s execution
    through the UI. It’s often more convenient than reading the trajectory as plain
    text.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我们启用了 MLFlow，我们也可以通过 UI 查看代理执行的完整日志。这通常比阅读纯文本轨迹更方便。
- en: '![](../Images/b565317f5710736fc92c78c4c0bda70e.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b565317f5710736fc92c78c4c0bda70e.png)'
- en: Image by author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Finally, we’ve successfully built an app that can accurately answer combinatorics
    questions and learned the basics of DSPy along the way. Now, it’s time to move
    on to actual business tasks.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们成功构建了一个能够准确回答组合问题并在此过程中学习了 DSPy 基础的应用程序。现在，是时候转向实际业务任务了。
- en: NPS topic modelling
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NPS 主题建模
- en: As we’ve covered the basics, let’s take a look at a real-world example. Imagine
    you’re a product analyst at a fashion retail company, and your task is to identify
    the most significant customer pain points. The company regularly conducts an NPS
    survey, so you decide to base your analysis on comments from NPS detractors.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经涵盖了基础知识，让我们看看一个现实世界的例子。想象一下，你是一家时尚零售公司的产品分析师，你的任务是确定最重要的客户痛点。公司定期进行 NPS
    调查，因此你决定基于 NPS 消极评论进行分析。
- en: 'Together with your product team, you reviewed a bunch of NPS comments, looked
    through previous customer research and brainstormed a list of key problems that
    customers might be facing in the product. As a result, you identified the following
    key topics:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 与你的产品团队一起，你审查了大量 NPS 评论，查阅了之前的客户研究，并头脑风暴出了一份可能面临的关键问题清单。结果，你确定了以下关键主题：
- en: Slow or Unreliable Shipping,
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 慢或不可靠的运输，
- en: Inaccurate Product Description or Photos,
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品描述或照片不准确，
- en: Limited Size or Shade Availability,
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尺寸或颜色选择有限，
- en: Unresponsive or Generic Customer Support,
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无响应或通用的客户支持，
- en: Website or App Bugs,
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站或应用程序错误，
- en: Confusing Loyalty or Discount Systems,
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 令人困惑的忠诚度或折扣系统，
- en: Complicated Returns or Exchanges,
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复杂的退货或换货，
- en: Customs and Import Charges,
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关税和进口费用，
- en: Difficult Product Discovery,
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 难以发现的产品，
- en: Damaged or Incorrect Items.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 损坏或错误的物品。
- en: We have a list of hypotheses and now just need to understand which problems
    customers mention most often. Fortunately, with LLMs, there’s no need to spend
    hours reading NPS comments ourselves. We will use DSPy to do topic modelling.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一系列假设，现在我们只需要了解客户最常提到哪些问题。幸运的是，有了 LLM，我们不需要花几个小时自己阅读 NPS 评论。我们将使用 DSPy 进行主题建模。
- en: Let’s start by defining a signature. The model will get an NPS comment as input,
    and we expect it to return one or more topics as output. From a declaration perspective,
    output will be an array of strings from a predefined list. Since this use case
    is a bit more complex, we will use a class-based signature for this task.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先定义一个签名。模型将获得一个NPS评论作为输入，我们期望它返回一个或多个主题作为输出。从声明角度来看，输出将是一个预定义列表中的字符串数组。由于这个用例稍微复杂一些，我们将为此任务使用基于类的签名。
- en: We need to create a class that inherits from `dspy.Signature` . This class should
    include a docstring that will be shared with the model as its objective. We also
    need to define the input and output fields, along with their respective types.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要创建一个继承自`dspy.Signature`的类。这个类应该包含一个文档字符串，它将被与模型共享作为其目标。我们还需要定义输入和输出字段，以及它们各自的数据类型。
- en: '[PRE14]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The next step is to define the module. Since we don’t need any tools, I will
    use a chain-of-thought prompting approach.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是定义模块。由于我们不需要任何工具，我将使用思维链提示方法。
- en: '[PRE15]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: That’s it. We can give it a try. Based on a single example, the model performs
    quite well.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。我们可以试一试。基于单个示例，模型的表现相当不错。
- en: '[PRE16]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: You might be wondering why we’re discussing such a straightforward task. It
    took us just 2 minutes to build the prototype. That’s true, but the goal here
    is to see how DSPy optimisation works in practice using this example.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道为什么我们要讨论这样一个简单的任务。构建原型只花了我们2分钟。这是真的，但这里的目的是看看使用这个例子，DSPy优化是如何在实际中工作的。
- en: Optimisation is one of the framework’s standout features. DSPy can automatically
    tune the model weights and adjust instructions to optimise for the evaluation
    criteria you specified.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 优化是框架的突出特点之一。DSPy可以自动调整模型权重并调整指令以优化您指定的评估标准。
- en: 'There are a bunch of [DSPy optimisers](https://dspy.ai/learn/optimization/optimizers/)
    available:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多[DSPy优化器](https://dspy.ai/learn/optimization/optimizers/)可供选择：
- en: '**Automatic few-shot learning** (for example, `BootstrapFewShot` or `BootstrapFewShotWithRandomSearch`)
    automatically selects the best examples and adds them to the signature, implementing
    a few-shot learning prompt.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动少样本学习**（例如，`BootstrapFewShot`或`BootstrapFewShotWithRandomSearch`）自动选择最佳示例并将它们添加到签名中，实现少样本学习提示。'
- en: '**Automatic instructions optimisation (**for example, `MIPROv2`) can simultaneously
    adjust instructions and select examples for few-shot learning.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动指令优化（例如，`MIPROv2`**）可以同时调整指令并选择示例用于少样本学习。'
- en: '**Automatic fine-tuning** (for example, `BootstrapFinetune`) adjusts the language
    model’s weights.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动微调**（例如，`BootstrapFinetune`）调整语言模型的权重。'
- en: In this article, I will focus solely on instruction optimisations. I’ve decided
    to start with the MIPROv2 optimiser (which stands for “*Multiprompt Instruction
    Proposal Optimizer Version 2*”), since it can tweak prompts and add examples at
    the same time. For more details, check [the article](https://arxiv.org/abs/2406.11695)
    “*Optimizing Instructions and Demonstrations for Multi-Stage Language Model Programs*”
    by Opsahl-Ong et al.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将专注于指令优化。我决定从MIPROv2优化器（代表“*Multiprompt Instruction Proposal Optimizer
    Version 2*”）开始，因为它可以同时调整提示并添加示例。更多详情，请参阅Opsahl-Ong等人撰写的文章“*Optimizing Instructions
    and Demonstrations for Multi-Stage Language Model Programs*”，链接为[该文章](https://arxiv.org/abs/2406.11695)。
- en: '*If you’re interested in a fine-tuning example, you can look it up in [the
    documentation.](https://dspy.ai/tutorials/games/)*'
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果您对微调示例感兴趣，可以在[文档中查找。](https://dspy.ai/tutorials/games/)*'
- en: 'For optimisation, we will need: a DSPy program (which we already have), a metric
    and a set of examples (ideally, divided into training and validation sets).'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 对于优化，我们需要：一个DSPy程序（我们已经有了一个）、一个指标和一组示例（理想情况下，分为训练集和验证集）。
- en: For the training set, I synthesised 100 examples of NPS comments with labels.
    Let’s split these into training and validation sets.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 对于训练集，我合成了100个带有标签的NPS评论示例。让我们将这些示例分为训练集和验证集。
- en: '[PRE17]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Now, let’s define the function that will calculate the metric. We need a custom
    function because the default function `dspy.evaluate.answer_exact_match` doesn’t
    work with arrays.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们定义一个函数，该函数将计算指标。我们需要一个自定义函数，因为默认函数`dspy.evaluate.answer_exact_match`不适用于数组。
- en: '[PRE18]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now, we have everything we need to start the optimisation process.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经拥有了开始优化过程所需的一切。
- en: '[PRE19]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: I chose `auto = "light"` to keep the number of iterations low, but even with
    this setting, optimisation might take quite a long time (60–90 mins).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择`auto = "light"`以保持迭代次数低，但即使有这个设置，优化可能仍然需要相当长的时间（60-90分钟）。
- en: Once it’s ready, we can run both models on the validation set and compare their
    results.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦准备就绪，我们可以在验证集上运行这两个模型并比较它们的结果。
- en: '[PRE20]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'We’ve gained a significant improvement in accuracy: from 62.3% to 82%. That’s
    a really cool result.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在准确性方面取得了显著的提升：从 62.3% 提升至 82%。这是一个非常酷的结果。
- en: 'Let’s compare the prompts to see what changed. The optimiser updated the objective
    from a high-level one, “*Classify NPS topics*”, that we initially defined, to
    a more specific one: “*Classify customer feedback comments related to online shopping
    issues, such as website bugs, product availability, and inaccurate descriptions,
    into relevant NPS topics.*” Additionally, the algorithm selected five examples
    to include in the prompt.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们比较一下提示，看看有什么变化。优化器将目标从最初定义的高级目标“*分类 NPS 主题*”更新为一个更具体的目标：“*将有关在线购物问题的客户反馈评论，如网站错误、产品可用性和不准确描述，分类到相关的
    NPS 主题中。*”此外，算法还选择了五个示例包含在提示中。
- en: '![](../Images/646c20c0090d05bc35565e541f2eabb5.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/646c20c0090d05bc35565e541f2eabb5.png)'
- en: Image by author
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: I tried a simpler version of the optimiser (`BootstrapFewShotWithRandomSearch`)
    that only adds examples to the prompt, and it achieved roughly the same results,
    77% accuracy. This suggests that few-shot prompting is the main driver of the
    accuracy improvement.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了一个更简单的优化器版本 (`BootstrapFewShotWithRandomSearch`)，它只向提示中添加示例，并取得了大致相同的结果，77%
    的准确性。这表明少样本提示是准确性提升的主要驱动力。
- en: '[PRE21]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: That’s it for the topic modelling task. We achieved remarkable results using
    a small local model and just a few lines of code.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 主题建模任务就到这里。我们使用了一个小型本地模型和几行代码就取得了显著成果。
- en: '*You can find the full code on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/dspy_example/nps_topic_modelling.ipynb). *'
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*您可以在 [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/dspy_example/nps_topic_modelling.ipynb)
    上找到完整的代码。*'
- en: Summary
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, we’ve explored the DSPy framework and its capabilities. Now,
    it’s time to wrap things up with a quick summary.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了 DSPy 框架及其功能。现在，是时候通过一个简要总结来结束本文了。
- en: DSPy (*Declarative Self-improving Python)* is a modular, declarative framework
    for building AI applications, developed by DataBricks.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DSPy (*Declarative Self-improving Python)* 是由 DataBricks 开发的一个模块化、声明式框架，用于构建人工智能应用。
- en: Its core philosophy is “*Programming — not prompting — LMs*”. So, the framework
    encourages you to create applications using structured building blocks like modules
    or signatures rather than handcrafted prompts. While I really like the idea of
    building LLM applications more like traditional software, I’ve grown so accustomed
    to prompting that it feels somewhat uncomfortable to give up this level of control.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其核心哲学是“*编程—而非提示—语言模型*”。因此，该框架鼓励你使用结构化构建块，如模块或签名来创建应用程序，而不是手工制作的提示。虽然我真的很喜欢将
    LLM 应用构建得更像传统软件的想法，但我已经习惯了提示，放弃这种程度的控制感有些不舒服。
- en: The most impressive feature of the framework is definitely optimisers. DSPy
    allows you to automatically improve the pipelines either by tuning prompts (both
    adjusting instructions and adding optimal few-shot examples) or by fine-tuning
    the language model’s weights.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 框架最令人印象深刻的特性无疑是优化器。DSPy 允许你通过调整提示（既调整指令又添加最优的少样本示例）或微调语言模型的权重来自动改进管道。
- en: '*Thank you a lot for reading this article. I hope this article was insightful
    for you.*'
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*非常感谢您阅读这篇文章。希望这篇文章对您有所启发。*'
- en: Reference
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'This article is inspired by the [“DSPy: Build and Optimise Agentic Apps”](https://www.deeplearning.ai/short-courses/dspy-build-optimize-agentic-apps/)
    short course from DeepLearning.AI.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '本文灵感来源于 DeepLearning.AI 的[“DSPy: Build and Optimise Agentic Apps”](https://www.deeplearning.ai/short-courses/dspy-build-optimize-agentic-apps/)短期课程。'
