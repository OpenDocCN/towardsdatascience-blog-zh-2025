- en: Decoding Nonlinear Signals in Large Observational Datasets
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在大型观测数据集中解码非线性信号
- en: 原文：[https://towardsdatascience.com/decoding-nonlinear-signals-in-large-observational-datasets/](https://towardsdatascience.com/decoding-nonlinear-signals-in-large-observational-datasets/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/decoding-nonlinear-signals-in-large-observational-datasets/](https://towardsdatascience.com/decoding-nonlinear-signals-in-large-observational-datasets/)
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: <mdspan datatext="el1758720664489" class="mdspan-comment">Motivation</mdspan>
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758720664489" class="mdspan-comment">动机</mdspan>
- en: In recent decades, global climate monitoring has made significant strides, leading
    to the creation of new, extensive observational datasets (Karpatne et al., 2019).
    These datasets are essential for improving numerical weather predictions and refining
    remote sensing retrievals by providing detailed insights into complex physical
    processes (Alizadeh, 2022). However, as the quantity and complexity of the data
    grows, identifying patterns within the observations becomes increasingly challenging
    (Zhou et al., 2021). Extracting key features from these datasets could lead to
    important advancements in our understanding of phenomena like convection and precipitation,
    further enhancing our knowledge of the changing global climate.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在最近几十年中，全球气候监测取得了重大进展，导致新的、广泛的观测数据集的创建（Karpatne等人，2019）。这些数据集对于通过提供对复杂物理过程的详细见解来提高数值天气预报和改进遥感反演至关重要（Alizadeh，2022）。然而，随着数据量和复杂性的增加，在观测中识别模式变得越来越具有挑战性（Zhou等人，2021）。从这些数据集中提取关键特征可能导致我们对对流和降水等现象的理解取得重要进展，进一步加深我们对全球气候变化的了解。
- en: In this post, we will explore some of these complex data patterns through the
    lens of precipitation, which has been highlighted as a critically important area
    of study under warming global temperatures (IPCC, 2023). Rather than relying on
    randomly generated or simulated data for this project, we will work with real-world
    observations from across the globe, [which are publicly accessible for you, my
    reader, to explore and experiment with as well](https://doi.org/10.7302/37yx-9q53).
    Let this post serve as a research guide, starting with the importance of good
    quality data, and concluding with insights on linear and nonlinear interpretations
    of said data.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将通过降水这一视角来探讨这些复杂的数据模式，降水在变暖的全球温度下已被强调为一个至关重要的研究领域（IPCC，2023）。对于这个项目，我们不会依赖于随机生成或模拟的数据，而是将使用来自全球的真实观测数据，[这些数据对您，我的读者，也是公开可访问的，以便您探索和实验](https://doi.org/10.7302/37yx-9q53)。让这篇文章作为研究指南，从高质量数据的重要性开始，并以对所提数据的线性和非线性解释的见解结束。
- en: If you’d like to follow along with some code, check out our [interactive Google
    Colab notebook](https://colab.research.google.com/drive/1bESVTHSmwZEdv5MyZQIRvarMJIhmWOMF?usp=share_link).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想跟随一些代码，请查看我们的[交互式Google Colab笔记本](https://colab.research.google.com/drive/1bESVTHSmwZEdv5MyZQIRvarMJIhmWOMF?usp=share_link)。
- en: 'This analysis unfolds in three parts, each of which is a separate, published
    research article:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这项分析分为三个部分，每个部分都是一篇独立发表的研究文章：
- en: Curating a robust, multidimensional dataset
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 筹备一个稳健的多维数据集
- en: Analyzing linear embeddings
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析线性嵌入
- en: Exploring nonlinear features
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索非线性特征
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. The Microphysical Dataset
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 微物理数据集
- en: '[https://doi.org/10.1029/2024EA003538](https://doi.org/10.1029/2024EA003538)'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://doi.org/10.1029/2024EA003538](https://doi.org/10.1029/2024EA003538)'
- en: When we talk about understanding the features of precipitation, what are we
    really asking? How complex can something as common as rain or snow be? It’s easy
    to look outside on a stormy day and say, “It’s raining” or “It’s snowing”. But
    what’s actually happening in those moments? Can we be more precise? For example,
    how intense is the rainfall? Are the raindrops large or small? If it’s snowing,
    what do the snowflakes look like ? Are they fluffy, dendritic crystals, or are
    they composed of multiple, fused particles in large aggregate clumps (e.g., Fig.
    1)? If the temperature hovers near zero degrees Celsius (C), do the snowflakes
    become dense and slushy? How fast are they falling? These differences could have
    a big impact on what happens when the particles reach the ground, and categorizing
    these processes into distinct groups is non-trivial (Pettersen et al., 2021).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈论理解降水特征时，我们真正在问什么？像雨或雪这样常见的东西能有多复杂？在暴风雨的日子里，很容易向外看并说，“它在下雨”或“它在下雪”。但那些时刻实际上发生了什么？我们能更精确吗？例如，降雨强度有多大？雨滴是大还是小？如果是下雪，雪花是什么样子？它们是蓬松的、树枝状晶体，还是由多个融合的粒子组成的大团块（例如，图1）？如果温度接近零摄氏度（C），雪花会变得密集和泥泞吗？它们落下的速度有多快？这些差异可能会对粒子到达地面时发生的事情产生重大影响，将这些过程分类到不同的组别是非同小可的（Pettersen等人，2021年）。
- en: '![](../Images/06819f79c9a10e1492874e4abfadae11.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/06819f79c9a10e1492874e4abfadae11.png)'
- en: '**Figure 1**: Macro photo of an aggregate snow particle composed of multiple
    fused snowflakes —  Photo by Author'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**：由多个融化的雪花组成的聚雪粒子的宏观照片 —  作者摄影'
- en: Understanding these processes is crucial for better monitoring and mitigating
    the impacts of flooding, runoff, freezing rain and extreme precipitation, all
    of which are potentially dangerous events with billions of dollars of associated
    global damages each year (Sturm et al., 2017). But with thousands of particles
    falling over just a few square meters in a matter of minutes, how do we quantify
    this complex process? It’s not just about counting the particles, we also need
    to capture key characteristics like size and shape. Instead of attempting this
    manually (an impossible task, go try for yourself), we typically rely on remote
    sensing instruments to do the heavy lifting. One such tool is the NASA Precipitation
    Imaging Package (PIP), a video disdrometer that provides detailed observations
    of falling rain drop and snow particles (Pettersen et al., 2020), as shown below
    in Fig. 2.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些过程对于更好地监测和减轻洪水、径流、冻雨和极端降水的影响至关重要，这些都是潜在的危险事件，每年与数十亿美元的相关全球损失相关（Sturm等人，2017年）。但是，在几分钟内，仅在几平方米的区域内就有数千个粒子落下，我们如何量化这个复杂的过程？这不仅仅是计数粒子，我们还需要捕捉到关键特征，如大小和形状。我们通常不尝试手动完成这项工作（这是一项不可能的任务，自己去试试），而是依赖遥感仪器来完成这项繁重的工作。其中一个这样的工具是美国国家航空航天局（NASA）的降水成像包（PIP），这是一种视频雨滴计，可以提供下落雨滴和雪粒子的详细观测（Pettersen等人，2020年），如图2所示。
- en: '![](../Images/aae39490b6adba01ee107f48faf21eb7.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/aae39490b6adba01ee107f48faf21eb7.png)'
- en: '**Figure 2:** Photo of the PIP instrument setup (camera and bulb) outside Marquette,
    MI — Photo courtesy of Claire Pettersen'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**：密歇根州马凯特市外PIP仪器设置（相机和灯泡）的照片 —  摄影归功于克莱尔·彼得森'
- en: This relatively inexpensive instrument consists of a 150-watt halogen bulb and
    a high-speed video camera (capturing at 380 frames per second) positioned two
    meters apart (King et al., 2024). As particles fall between the bulb and the camera,
    they block the light, creating silhouettes that can be analyzed for variations
    in size and shape. By tracking the same particle across multiple frames, the PIP
    software can also determine its fall speed (Fig. 3). With additional assumptions
    about particle motion in the air, the PIP data allow us to also derive minute-scale
    particle size distributions (PSDs), fall speeds, and effective particle density
    distributions (Newman et al., 2009). These microphysical measurements, when combined
    with nearby meteorological observations of surface variables like temperature,
    relative humidity, pressure, and wind speed, offer a comprehensive snapshot of
    the environment at the time of observation.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这个相对便宜的仪器由一个150瓦的卤素灯泡和一台高速摄像机（每秒捕捉380帧）组成，两者相距两米（King等人，2024年）。当粒子在灯泡和摄像机之间下落时，它们会阻挡光线，形成可以分析其大小和形状轮廓。通过跟踪多个帧中的同一粒子，PIP软件还可以确定其下落速度（图3）。通过关于空气中粒子运动的额外假设，PIP数据还允许我们推导出分钟尺度的粒子尺寸分布（PSD）、下落速度和有效粒子密度分布（Newman等人，2009年）。这些微物理测量，当与附近地面气象观测的表面变量（如温度、相对湿度、压力和风速）相结合时，提供了观测时刻环境的全面快照。
- en: '![](../Images/6e8fc23d91c380bd0caab968082fd2de.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6e8fc23d91c380bd0caab968082fd2de.png)'
- en: '**Figure 3:** PIP video with falling snowflakes, recorded Christmas Eve, 2021
    outside Storrs, Conneticuit (1/20th full speed). Particles are falling sideways
    due to wind interference — Video by Larry Bliven [Source: [https://www.youtube.com/@larrybliven832](https://www.youtube.com/@larrybliven832)]'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3：** 2021年圣诞前夕在康涅狄格州斯托尔斯外录制的带有降雪花的PIP视频（1/20全速）。由于风干扰，粒子向侧面下落 — 视频由拉里·布利文拍摄
    [来源：[https://www.youtube.com/@larrybliven832](https://www.youtube.com/@larrybliven832)]]'
- en: Over a span of 10 years, we collected more than 1 million minutes of particle
    microphysical observations, alongside collocated surface meteorological variables,
    across 10 different sites (Fig. 4). Gathering data from multiple regional climates
    over such a long period was crucial to building a robust database of precipitation
    events. To ensure consistency, all microphysical observations were recorded using
    the same type of instrument with identical calibration settings and software versions.
    We then conducted an extensive quality assurance (QA) process to eliminate erroneous
    data, correct timing drifts, and remove any unphysical outliers. This curated
    information was then standardized, packaged into [Network Common Data Form (NetCDF)](https://www.unidata.ucar.edu/software/netcdf/) files,
    and made [publicly available through the University of Michigan’s DeepBlue data
    repository](https://doi.org/10.7302/37yx-9q53).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在10年的时间跨度内，我们在10个不同的站点收集了超过100万分钟的粒子微物理观测数据，以及与之相对应的地面气象变量（图4）。在如此长的时期内从多个区域气候中收集数据对于构建一个可靠的降水事件数据库至关重要。为确保一致性，所有微物理观测都使用相同类型的仪器，具有相同的校准设置和软件版本进行记录。然后我们进行了一个广泛的质量保证（QA）过程，以消除错误数据、纠正时间漂移以及移除任何不合理的异常值。这些经过整理的信息随后被标准化，打包成[网络通用数据格式（NetCDF）](https://www.unidata.ucar.edu/software/netcdf/)文件，并通过密歇根大学的DeepBlue数据存储库[公开提供](https://doi.org/10.7302/37yx-9q53)。
- en: You are welcome to download and explore the dataset yourself! For more details
    on the sites included, the QA process, and the microphysical differences observed
    between locations, please refer to our [associated data paper published in the
    journal of Earth and Space Science](https://doi.org/10.1029/2024EA003538).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以自由下载并探索这个数据集！有关包括的站点、QA过程以及观测地点之间观察到的微物理差异的更多详细信息，请参阅我们发表在《地球与空间科学》杂志上的[相关数据论文](https://doi.org/10.1029/2024EA003538)。
- en: '![Study site locations and data coverage periods](../Images/bc546d0b1cba9a6d7a23970d3e0ecfd7.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![研究站位置和数据覆盖期](../Images/bc546d0b1cba9a6d7a23970d3e0ecfd7.png)'
- en: '**Figure 4: a)** Locations of measurement sites; and **b)** Gantt chart of
    observational coverage for each site — Image by Author'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**图4：a)** 测量点的位置；以及 **b)** 每个站点的观测覆盖情况的甘特图 — 图像由作者提供'
- en: To describe the PSD, we calculate a pair of parameters (n0, and λ) representing
    the intercept and slope of an inverse exponential fit (Eq. 1). This fit was selected
    as it has been extensively used in previous literature to accurately describe
    snowfall PSDs (Cooper et al., 2017; Wood and L’Ecuyer, 2021). However, other fits
    (e.g., a gamma distribution) could also be considered in future work to better
    capture large aggregate particles (Duffy et al., 2022).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了描述PSD，我们计算了一对参数（n0和λ），代表逆指数拟合的截距和斜率（方程1）。选择这种拟合是因为它在之前的文献中被广泛使用，以准确描述降雪PSD（Cooper等人，2017；Wood和L’Ecuyer，2021）。然而，在未来的工作中也可以考虑其他拟合（例如，伽马分布）以更好地捕捉大颗粒聚集物（Duffy等人，2022）。
- en: '![](../Images/206b39db4c498a4d9f369109e64d1e9e.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/206b39db4c498a4d9f369109e64d1e9e.png)'
- en: n0-λ joint 2D histograms are shown below in Fig. 5 for each site, demonstrating
    the wide variety of precipitation PSDs occurring across different regional climates.
    Note how some sites display bimodal distributions (OLY) compare to very narrow
    distributions at others (NSA). We have also put together a Python API for interacting
    with and visualizing this data called **pipdb**. Please see [our documentation
    on readthedocs](https://pipdb.readthedocs.io/en/latest/) for more information
    on how to install and use this package for your own project.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在图5中展示了每个站点的n0-λ联合二维直方图，展示了在不同区域气候中发生的降水PSD的广泛多样性。注意一些站点显示双峰分布（OLY），而其他站点则显示非常狭窄的分布（NSA）。我们还开发了一个Python
    API，用于交互和可视化这些数据，称为**pipdb**。请参阅[readthedocs上的我们的文档](https://pipdb.readthedocs.io/en/latest/)，了解如何安装和使用此包来为自己的项目使用。
- en: '![](../Images/028b4835efc5d7188e25589f3c9f45c9.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/028b4835efc5d7188e25589f3c9f45c9.png)'
- en: '**Figure 5:** 2D joint histograms of inverse exponential intercept (n0) and
    slope (λ) PSD parameters for each site — Image by Author'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**图5：**每个站点的逆指数截距（n0）和斜率（λ）PSD参数的二维联合直方图——图片由作者提供'
- en: In summary, we’ve compiled a high-quality, multidimensional dataset of precipitation
    microphysical observations, capturing details such as the particle size distributions,
    fall speeds, and effective densities. These measurements are complemented by a
    range of nearby surface meteorological variables, providing crucial context about
    the specific types of precipitation occurring during each minute (e.g., was it
    warm out, or cold?). A full list of the variables we’ve collected for this project
    is shown in Table 1 below.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们编制了一个高质量的、多维的降水微物理观测数据集，捕捉了如粒子大小分布、下降速度和有效密度等细节。这些测量值由一系列附近的表面气象变量补充，提供了关于每个分钟发生的特定降水类型的至关重要背景信息（例如，天气是暖和的还是寒冷的？）。我们为这个项目收集的变量完整列表如下表1所示。
- en: '![](../Images/fba3e249ab4b672a181cb4652b952182.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fba3e249ab4b672a181cb4652b952182.png)'
- en: '**Table 1: **Summary of all microphysical and surface meteorologic variables
    collected and made available in the DeepBlue dataset — Image by Author'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**表1：**DeepBlue数据集中收集和提供的所有微物理和地表气象变量的摘要——图片由作者提供'
- en: Now, **what can we do with this data?**
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，**我们能用这些数据做什么呢？**
- en: '* * *'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Examining Linear Embeddings with PCA
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 使用PCA检查线性嵌入
- en: '[https://doi.org/10.1175/JAS-D-24-0076.1](https://doi.org/10.1175/JAS-D-24-0076.1)'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://doi.org/10.1175/JAS-D-24-0076.1](https://doi.org/10.1175/JAS-D-24-0076.1)'
- en: With our data collected, it’s time to put it to use. We begin by exploring linear
    embeddings through Principal Component Analysis (PCA), following the methodology
    of Dolan et al. (2019). Their work focused on uncovering the latent features in **rainfall** drop
    size distributions (DSDs), identifying six key modes of variability linked to
    the physical processes that govern drop formation across a variety of locations.
    Building on this, we aim to extend the analysis to **snowfall** events using our
    custom dataset from Part 1\. I won’t delve into the mechanics of PCA here, as
    there are already many [excellent resources on TDS that cover its implementation
    in detail](https://towardsdatascience.com/a-one-stop-shop-for-principal-component-analysis-5582fb7e0a9c).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 收集了我们的数据后，是时候将其投入使用。我们首先通过主成分分析（PCA）探索线性嵌入，遵循Dolan等人（2019）的方法。他们的工作集中在揭示**降雨**滴大小分布（DSD）中的潜在特征，确定了与控制不同地点滴形成的物理过程相关的六个关键变化模式。在此基础上，我们旨在使用第一部分的自定义数据集将分析扩展到**降雪**事件。在这里，我不会深入探讨PCA的机制，因为已经有许多[优秀的资源详细介绍了TDS的实现](https://towardsdatascience.com/a-one-stop-shop-for-principal-component-analysis-5582fb7e0a9c)。
- en: Before applying PCA, we segment the full dataset into discrete 5-minute intervals.
    This segmentation allows us to calculate the PSD parameters with a sufficiently
    large sample size. We then filter these intervals, selecting only those with effective
    density values below 0.4 g/cm³ (i.e., values typically associated with snowfall
    and characterized by less dense particles). This filtering results in a dataset
    of **210,830 five-minute periods** ready for analysis. For the variables used
    to fit the PCA, we choose a subset from Table 1 related to snowfall, derived from
    the PIP. These variables include **n0, **λ**, Fs, Rho, Nt, and Sr** (see Table
    1 for details). We focused on a smaller subset of observations from the disdrometer
    alone here, because future sites might not have collocated surface variables and
    we were interested in what could be extracted from just this six-dimensional dataset.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用PCA之前，我们将整个数据集分割成离散的5分钟间隔。这种分割使我们能够使用足够大的样本量来计算PSD参数。然后我们过滤这些间隔，只选择那些有效密度值低于0.4
    g/cm³的间隔（即通常与降雪相关，特征是密度较低的颗粒）。这种过滤结果是一个包含**21,083个五分钟周期**的数据集，准备进行分析。对于用于拟合PCA的变量，我们从与降雪相关的表1中选择一个子集，这些变量来自PIP。这些变量包括**n0、λ、Fs、Rho、Nt和Sr**（详细信息请见表1）。在这里，我们只关注来自降雪谱仪的较小观测子集，因为未来的站点可能没有匹配的地面变量，而我们感兴趣的是仅从这个六维数据集中可以提取什么。
- en: Before diving into the analysis, it’s important to first inspect the data to
    ensure everything appears as expected. Remember the old GIGO addage, *garbage
    in, garbage out*. We want to mitigate the impact of bad data if we can. By examining
    the value distributions of each variable, we confirmed they fall within the anticipated
    ranges. Additionally, we reviewed the covariance matrix of the input variables
    to gain some preliminary insights into their joint behavior (Fig. 6). For instance,
    variables like n0 and Nt, both tightly coupled to the number of particles present,
    show high correlation as expected, while variables like effective density (Rho)
    and Nt display less of a relationship. After scaling and normalizing the inputs,
    we proceed by feeding them into [scikit-learn’s PCA implementation](https://scikit-learn.org/stable/modules/generated/sklearn.decomposition.PCA.html).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入分析之前，首先检查数据以确保一切如预期是很重要的。记住古老的GIGO格言，“垃圾输入，垃圾输出”。如果我们能减轻不良数据的影响，我们希望这样做。通过检查每个变量的值分布，我们确认它们都在预期的范围内。此外，我们审查了输入变量的协方差矩阵，以获得它们联合行为的初步见解（图6）。例如，像n0和Nt这样的变量，它们都与存在的颗粒数量紧密相关，表现出预期的高相关性，而像有效密度（Rho）和Nt这样的变量则显示出较少的关系。在将输入数据缩放和归一化后，我们通过将其输入到[scikit-learn的PCA实现](https://scikit-learn.org/stable/modules/generated/sklearn.decomposition.PCA.html)来继续操作。
- en: '![](../Images/43131a6024ea60e5cf23c3c7b85a0170.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/43131a6024ea60e5cf23c3c7b85a0170.png)'
- en: '**Figure 6:** Covariance matrix heatmap of PCA input variables — Image by Author'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**图6：** PCA输入变量的协方差矩阵热图——图片由作者提供'
- en: Applying PCA to the inputs results in three Empirical Orthogonal Functions (EOFs)
    that together account for 95% of the variability in the dataset (Fig. 7). The
    first EOF is the most significant, capturing approximately 55% of the dataset’s
    variance, as evidenced by its broad distribution in Fig. 6.a. When examining the
    standard anomalies of the EOF values for each input variable, EOF1 shows a strong
    negative relationship with all inputs. The second EOF accounts for about 20% of
    the variance, with a slightly narrower distribution (Fig. 6.b) and is most strongly
    associated with the Fallspeed and Rho (density) inputs. Finally, EOF3, which explains
    around 15% of the variance, is primarily related to λ and snowfall rate variables
    (Fig. 6.c).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 将PCA应用于输入数据，得到三个经验正交函数（EOFs），它们共同解释了数据集中95%的变异性（图7）。第一个EOF是最显著的，它解释了数据集大约55%的方差，如图6.a中其广泛的分布所示。当检查每个输入变量的EOF值的标准化异常时，EOF1显示出与所有输入变量之间强烈的负相关关系。第二个EOF解释了大约20%的方差，分布略窄（图6.b），并且与Fallspeed和Rho（密度）输入变量关联最紧密。最后，EOF3解释了大约15%的方差，主要与λ和降雪速率变量相关（图6.c）。
- en: '![](../Images/dd83853189d32a86d87a0bc7bcda7670.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dd83853189d32a86d87a0bc7bcda7670.png)'
- en: '**Figure 7:** 2D joint histograms showing normalized counts of a) EOF1 v. EOF2;
    b) EOF2 v. EOF3; c) EOF3 v. EOF1; and d) the EOF value for each normalized input
    feature (note that the sign of each anomaly is arbitrary) — Image by Author'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**图7：** 2D联合直方图显示归一化计数，a) EOF1与EOF2；b) EOF2与EOF3；c) EOF3与EOF1；以及d)每个归一化输入特征的EOF值（请注意，每个异常的符号是任意的）——图片由作者提供'
- en: On their own, these EOFs are challenging to interpret in physical terms. What
    underlying features are they capturing? Are these embeddings physically meaningful?
    One way to simplify the interpretation is by focusing on the most extreme values
    in each distribution, as these are most strongly associated with each EOF. While
    this manual clustering approach leaves much of the distribution near the origin
    ambiguous, it allows us to separate the data into distinct groups that can be
    analyzed more closely. By applying a σ > 2 threshold (represented by the thin
    white dashed lines in Fig. 6.a-c), we can divide this 3D distribution of points
    into six distinct groups of equal sampling volume. Since visualizing this separation
    in 2D is particularly challenging, we’ve provided an interactive data viewer (Fig.
    8), created with [Plotly](https://plotly.com/), to make this distinction clearer.
    Feel free to click on the figure below to [explore the data yourself](https://frasertheking.com/interactive/pca.html).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 单独来看，这些EOF在物理意义上的解释具有挑战性。它们捕捉到了哪些潜在特征？这些嵌入在物理上是否有意义？一种简化解释的方法是关注每个分布中最极端的值，因为这些值与每个EOF关联最紧密。虽然这种手动聚类方法使得大部分分布接近原点仍然模糊，但它允许我们将数据分离成可以更仔细分析的独立组。通过应用σ
    > 2的阈值（在图6.a-c中以细白虚线表示），我们可以将这个点的3D分布划分为六个具有相等采样体积的独立组。由于在二维空间中可视化这种分离特别具有挑战性，我们提供了一个交互式数据查看器（图8），使用[Plotly](https://plotly.com/)创建，以使这种区分更清晰。请随意点击下面的图片以[自行探索数据](https://frasertheking.com/interactive/pca.html)。
- en: '[![](../Images/645c622862717da3db3a8a2a3d6316f8.png)](https://frasertheking.com/interactive/pca.html)'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/645c622862717da3db3a8a2a3d6316f8.png)[链接](https://frasertheking.com/interactive/pca.html)'
- en: '**Figure 8:** Interactive 3D plotly scatter of PCA EOF embeddings. Points are
    colored by their respective manual clustering groups (with ambiguous in gray).
    Click to interact with the data yourself — Image by Author'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**图8**：PCA EOF嵌入的交互式3D plotly散点图。点根据各自的手动聚类组着色（模糊的用灰色表示）。点击以自行交互数据——图片由作者提供'
- en: 'With the most extreme EOF clusters selected, we can now plot these in physical
    variable spaces to begin interpreting them. This is demonstrated in Fig. 9 across
    different variable spaces: n0-λ (panel a), Fs-Rho (panel b), λ-Dm (panel c), and
    Sr-Dm (panel d). Starting with the red and blue clusters in Fig. 9.a (representing
    the positive and negative EOF1 values), we see a clear separation in n0-λ space.
    The red cluster, characterized by a high PSD intercept and slope, indicates a
    high-intensity grouping, suggestive of many small particles, while the blue cluster
    shows the opposite behavior. This is indicative of a potential intensity embedding.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择了最极端的EOF聚类后，我们现在可以在物理变量空间中绘制这些聚类，以开始解释它们。这在图9的不同变量空间中得到了演示：n0-λ（面板a）、Fs-Rho（面板b）、λ-Dm（面板c）和Sr-Dm（面板d）。从图9.a中的红色和蓝色聚类开始（代表正负EOF1值），我们在n0-λ空间中看到明显的分离。红色聚类，以高PSD截距和斜率为特征，表明高强度分组，暗示有许多小粒子，而蓝色聚类则表现出相反的行为。这表明可能存在强度嵌入。
- en: In panel b, there’s a distinct separation between the purple and light blue
    clusters (corresponding to the positive and negative EOF2 values). The purple
    cluster, associated with high fall speed and density, contrasts with the light
    blue cluster, which shows the opposite characteristics. This pattern likely represents
    a particle temperature/wetness embedding, describing the “stickiness” of the snow
    as it falls. Warmer, denser particles (such as partially melted or frozen particles)
    tend to fall faster, much like how a slushy pellet falls faster than a dry snowflake.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在面板b中，紫色和浅蓝色聚类（对应正负EOF2值）之间有明显的分离。紫色聚类，与高速和高密度相关联，与浅蓝色聚类形成对比，后者表现出相反的特征。这种模式可能代表粒子温度/湿度嵌入，描述了雪在下落时的“粘性”。较暖、较密的粒子（如部分融化的或冻结的粒子）往往下落得更快，就像湿雪球比干雪花下落得更快一样。
- en: Finally, in panels c and d, the yellow and magenta clusters are separated based
    on PSD slope and mass-weighted mean diameter. While less clear, this suggests
    a potential relationship with particle size and the underlying snowfall regime,
    such as differences between complex shallow systems and deep systems.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在面板c和d中，黄色和洋红色聚类根据PSD斜率和质量加权平均直径进行分离。虽然不太明显，但这表明可能与粒子大小和潜在的降雪模式有关，例如复杂浅层系统与深层系统之间的差异。
- en: '![](../Images/580608e62fe663dffdbbab95c817286e.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/580608e62fe663dffdbbab95c817286e.png)'
- en: '**Figure 9:** Physical variable space comparisons for each of the PC groups,
    including: a) n0-λ, b) Fs-Rho, c) λ-Dm and d) Sr-Dm, with the colored contours
    highlighting each PC group using a smoothed kernel density approximation — Image
    by Author'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**图9**：每个PC组的物理变量空间比较，包括：a) n0-λ，b) Fs-Rho，c) λ-Dm 和 d) Sr-Dm，使用平滑核密度近似突出显示每个PC组，彩色等高线表示——图片由作者提供'
- en: Another way to strengthen our confidence in these attributions is by comparing
    the groups to independent observations. We can do this by cross-referencing the
    PCA-based snowfall classifications from the PIP with nearby surface radar observations
    (i.e., a [Micro Rain Radar](https://metek.de/product-group/micro-rain-radar-24-ghz/))
    and reanalysis (i.e., [ERA5](https://www.ecmwf.int/en/forecasts/dataset/ecmwf-reanalysis-v5))
    estimates to evaluate physical consistency. This is one reason we recommend not
    always using all available data in the dimensionality reduction, as it limits
    the ability to later assess the robustness of the embeddings. To validate our
    approach, we examined a series of case studies at Marquette (MQT), Michigan, to
    see how well these classifications align. For instance, in Fig. 10, we observe
    a transition from a high-intensity snowstorm (red) to partially melted mixed-phase
    snow crystals (sleet) as temperatures briefly rise above zero degrees C (panel
    h), and then back to high-intensity snow as temperatures drop below zero later
    in the day. This also aligns with the changes we see in reflectivity (panel a)
    and we can see this transition in the n0-λ plot in panel i.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 增强我们对这些归因的信心的另一种方法是将这些组与独立观察结果进行比较。我们可以通过交叉引用来自PIP的基于PCA的降雪分类与附近地表雷达观测（即，[微雨雷达](https://metek.de/product-group/micro-rain-radar-24-ghz/)）和再分析（即，[ERA5](https://www.ecmwf.int/en/forecasts/dataset/ecmwf-reanalysis-v5)）估计来评估物理一致性。这也是我们建议不总是使用所有可用数据在降维中的原因之一，因为它限制了后来评估嵌入鲁棒性的能力。为了验证我们的方法，我们检查了密歇根州马凯特（MQT）的一系列案例研究，以了解这些分类的匹配程度。例如，在图10中，我们观察到从强降雪（红色）到部分融化的混合相雪花（雨夹雪）的转变，当温度短暂上升到零度以上（面板h）时，然后随着当天晚些时候温度下降到零度以下，又回到强降雪。这也与我们观察到的反射率（面板a）的变化一致，我们可以在面板i的n0-λ图中看到这种转变。
- en: '![](../Images/19bf44039070ffec127a924459e0c8a4.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/19bf44039070ffec127a924459e0c8a4.png)'
- en: 'Figure 10: PC groups 2 and 4 with ancillary observations at MQT on 2018-12-02\.
    PC groups for a single day are highlighted across the top figure panels in 5-minute
    time steps against collocated a) MRR reflectivity (Ze) observations; b) ERA5 atmospheric
    temperature (T) estimates (zero degree isotherm highlighted in the black dashed
    line); c) MRR Doppler velocity (DV) observations; d) ERA5 atmospheric relative
    humidity (RH) estimates; e) MRR spectral width (SW) observations; f) ERA5 atmospheric
    vertical velocity (ω) estimates; g) EOF1, EOF2 and EOF3 values from the PCA; h)
    Surface meteorologic observations of 2-meter air T in black, RH in gray and pressure
    (P) in brown; and i) each PIP observation plotted in n0-λ space in gray for ambiguous
    points, red for PC group 2, and purple for PC group 4 (black circles represent
    all other points across all sites). Dashed black lines indicate the location of
    the dendritic growth zone — Image by Author'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**图10**：2018-12-02在MQT的辅助观测下的PC组2和4。单日PC组在顶部图面板中以5分钟的时间步长突出显示，与同位素的a) MRR反射率（Ze）观测；b)
    ERA5大气温度（T）估计（零度等温线用黑色虚线突出显示）；c) MRR多普勒速度（DV）观测；d) ERA5大气相对湿度（RH）估计；e) MRR光谱宽度（SW）观测；f)
    ERA5大气垂直速度（ω）估计；g) PCA的EOF1，EOF2和EOF3值；h) 2米空气温度的表面气象观测用黑色表示，湿度用灰色表示，压力（P）用棕色表示；i)每个PIP观测在n0-λ空间中以灰色表示的模糊点，红色表示PC组2，紫色表示PC组4（黑色圆圈代表所有站点上的其他点）。虚线黑色线表示树枝状生长区的位置——图片由作者提供'
- en: Building on our PCA analysis and the consistency observed with collocated observations,
    we also created Fig. 11, which summarizes how the primary linear embeddings identified
    through PCA are distributed across different physical variable spaces. These classifications
    offer critical microphysical insights that can enhance a priori datasets, ultimately
    improving the accuracy of state-of-the-art models and snowfall retrievals.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的PCA分析和与同位素观测的一致性基础上，我们还创建了图11，该图总结了通过PCA识别出的主要线性嵌入在不同物理变量空间中的分布。这些分类提供了关键的微物理洞察，可以增强先验数据集，最终提高最先进模型和降雪检索的准确性。
- en: '![](../Images/7226b42cbdfb6cb271e6a53f00d57c90.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7226b42cbdfb6cb271e6a53f00d57c90.png)'
- en: '**Figure 11:** PCA-derived snowfall attribute conceptual model in a) n0-λ;
    and b) Fs-Rho spaces. Black points represent all PIP observations from all sites,
    with the colored contours depicting each of the PC groups produced from a smoothed
    kernel density approximation. Each of the inferred physical attributes are labeled
    on each contour in white — Image by Author'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**图11**：在a) n0-λ空间和b) Fs-Rho空间中由PCA导出的降雪属性概念模型。黑色点代表所有站点所有PIP观测值，彩色轮廓描绘了从平滑核密度近似中产生的每个PC组。每个推断出的物理属性都在每个轮廓上用白色标注——图片由作者提供'
- en: However, since PCA is limited to linear embeddings, this raises an important
    question:** are there nonlinear patterns within this dataset that we have yet
    to explore?** Additionally, what new insights might emerge if we extend this analysis
    beyond snow to include other types of precipitation?
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于PCA仅限于线性嵌入，这引发了一个重要问题：**在这个数据集中是否存在我们尚未探索的非线性模式？** 此外，如果我们将这种分析扩展到雪之外，包括其他类型的降水，可能会出现哪些新的见解？
- en: Let’s tackle these questions in the next section!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在下一节中解决这些问题！
- en: '* * *'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Nonlinear dimensionality reduction using UMAP
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 使用UMAP进行非线性降维
- en: '[https://doi.org/10.1126/sciadv.adu0162](https://doi.org/10.1126/sciadv.adu0162)'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://doi.org/10.1126/sciadv.adu0162](https://doi.org/10.1126/sciadv.adu0162)'
- en: In order to examine more complex, nonlinear embeddings, we need to consider
    a different type of unsupervised learning that loosens the linearity assumptions
    of techniques like PCA. This brings us to the concept of manifold learning. The
    idea behind manifold learning is that high-dimensional data often lie on a lower-dimensional,
    curved manifold within the original data space (McInnes et al., 2020). By mapping
    this manifold, we can uncover the underlying structure and relationships that
    linear methods might miss. Techniques like t-SNE, UMAP, VAEs, or Isomap can reveal
    these intricate patterns, providing a more nuanced understanding of the dataset’s
    latent features. Applying manifold learning to our dataset could uncover nonlinear
    embeddings that further distinguish precipitation types, potentially offering
    even deeper insights into the microphysical processes at play. As a little hint
    as to what is to come, see Fig. 12\. As mentioned before, I won’t go into the
    implementation details of such methods, as this has been covered many times [here
    on TDS](https://towardsdatascience.com/how-exactly-umap-works-13e3040e1668).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查更复杂、非线性的嵌入，我们需要考虑一种不同类型的无监督学习，这种学习放松了PCA等技术线性的假设。这使我们来到了流形学习这一概念。流形学习的理念是，高维数据通常位于原始数据空间中一个较低维度的、弯曲的流形上（McInnes
    et al., 2020）。通过映射这个流形，我们可以揭示线性方法可能错过的潜在结构和关系。像t-SNE、UMAP、VAEs或Isomap这样的技术可以揭示这些复杂的模式，提供对数据集潜在特征的更细致的理解。作为即将到来的内容的提示，参见图12。如前所述，我不会深入探讨这些方法的实现细节，因为这已经在TDS上多次介绍过[这里](https://towardsdatascience.com/how-exactly-umap-works-13e3040e1668)。
- en: '![](../Images/77f6bf225c085c2ece4b418e998884f3.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/77f6bf225c085c2ece4b418e998884f3.png)'
- en: '**Figure 12:** 3D UMAP embedding of our precipitation dataset — Image by Author'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**图12**：我们的降水数据集的3D UMAP嵌入图——图片由作者提供'
- en: Additionally, we would like to use our entire dataset of both disdrometer observations
    and collocated surface metoeologic variables this time around to see if the additional
    dimensions provide useful context for better differentiating between highly complex
    physical processes. For example, can we detect different types of mixed-phase
    precipitation if we knew more about the temperature and humidity at the time of
    observation? So, unlike the previous section where we limited the inputs to **just
    PIP data** and **just snowfall**, we now include **all 12 dimensions for the entire
    dataset**. This also somewhat reduces our total sample down to 128,233 5-minute
    periods at 7 locations, since not all sites have operating surface meteorologic
    stations to pull data from. As is always the case with these types of problems,
    as we add more dimensions, we run up against the dreaded **curse of dimentionality**.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们这次希望使用我们整个数据集，包括降尘仪观测数据和同位表面气象变量，以查看额外的维度是否为区分高度复杂的物理过程提供了有用的背景。例如，如果我们知道观测时的温度和湿度，我们能否检测到不同类型的混合相降水？因此，与之前限制输入仅为**仅
    PIP 数据**和**仅降雪**的章节不同，我们现在包括**整个数据集的12个维度**。这也使我们的总样本量减少到128,233个5分钟周期，分布在7个地点，因为并非所有地点都有运行的表面气象站来获取数据。正如这些类型问题通常的情况一样，当我们增加更多维度时，我们会遇到可怕的**维度诅咒**。
- en: As the dimensionality of the feature space increases, the number of configurations
    can grow exponentially, and thus the number of configurations covered by an observation
    decreases — Richard Bellman
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 随着特征空间维度的增加，配置的数量可以呈指数增长，因此观察到的配置数量减少——理查德·贝尔曼
- en: This tradeoff in the number of inputs and feature sparsity is a challenge we
    will have to keep in mind moving forward. Luckily for us, we only have 12 dimensions
    which may seem like a lot, but is really quite small compared to many other projects
    in the Natural Sciences with potentially thousands of dimensions (Auton et al.,
    2015).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入数量和特征稀疏性之间的这种权衡是我们未来必须牢记的挑战。幸运的是，我们只有12个维度，这看起来可能很多，但与自然科学中许多其他可能拥有数千个维度的项目相比，实际上非常小（Auton
    等人，2015年）。
- en: As mentioned earlier, we explored a variety of nonlinear models for this phase
    of the project (see Table 2). In any Machine Learning (ML) project we undertake,
    we prefer to start with simpler, more interpretable methods and gradually progress
    to more sophisticated techniques, as less complex approaches are often more efficient
    and easily understood.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们探索了多种非线性模型来完成项目的这一阶段（见表2）。在我们进行的任何机器学习（ML）项目中，我们更喜欢从更简单、更可解释的方法开始，然后逐渐过渡到更复杂的技术，因为更简单的方法通常更有效且易于理解。
- en: With this strategy in mind, we began by building on the results from Part 2,
    using PCA once again as a baseline for this larger dataset of rain and snow particles.
    We then compared PCA to nonlinear techniques such as Isomap, VAEs, t-SNE, and
    UMAP. After conducting a series of sensitivity analyses, we found that UMAP outperformed
    the others in producing clear embeddings in a more computationally efficient manner,
    making it the focus of our discussion here. Additionally, with UMAP’s improved
    global separation of data across the manifold, we can move beyond manual clustering,
    employing a more objective method like Hierarchical Density-Based Spatial Clustering
    of Applications with Noise (HDBSCAN) to group similar cases together (McInnes
    et al., 2017).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑这种策略的同时，我们首先基于第2部分的结果进行工作，再次使用PCA作为更大数据集（雨和雪粒子）的基线。然后，我们将PCA与非线性技术如Isomap、VAEs、t-SNE和UMAP进行比较。在进行了系列敏感性分析后，我们发现UMAP在以更计算效率的方式产生清晰的嵌入方面优于其他方法，因此成为我们讨论的重点。此外，由于UMAP在流形上对数据的全局分离得到改善，我们可以超越手动聚类，采用更客观的方法，如具有噪声的层次密度空间聚类（HDBSCAN），将相似案例分组在一起（McInnes
    等人，2017年）。
- en: '![](../Images/98378d4d3f57f694453a9cdaf265c36f.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/98378d4d3f57f694453a9cdaf265c36f.png)'
- en: '**Table 2:** Overview of methods examined in the nonlinear comparison portion
    of the project — Image by Author'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**表 2:** 项目非线性比较部分所考察的方法概述——图片由作者提供'
- en: Applying UMAP to this 12-dimensional dataset resulted in the identification
    of three primary latent embeddings (LEs). We experimented with various hyperparameters,
    including the number of embeddings, and found that, similar to PCA, the first
    two embeddings were the most significant. The third embedding also displayed some
    separation between certain groups, but beyond this third level, additional embeddings
    provided little separation and were therefore excluded from the analysis (although
    these might be interesting to look at more in future work). The first two LEs,
    along with a case study example from Marquette, Michigan, illustrating discrete
    data points over a 24-hour period, are shown below in Fig. 13.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 将 UMAP 应用于这个 12 维数据集，识别出了三个主要的潜在嵌入（LE）。我们尝试了各种超参数，包括嵌入的数量，发现与 PCA 类似，前两个嵌入是最重要的。第三个嵌入也显示出某些组之间的分离，但在此第三级以上，额外的嵌入提供的分离很少，因此被排除在分析之外（尽管这些可能在未来的工作中更值得研究）。下面图
    13 中展示了前两个 LE，以及来自密歇根州马凯特的案例研究示例，展示了 24 小时内的离散数据点。
- en: '![](../Images/4a5c791d3c6bd12f68b2d0314fb4a1fa.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4a5c791d3c6bd12f68b2d0314fb4a1fa.png)'
- en: '**Figure 13: **Overview of precipitation process clusters derived from UMAP+HDBSCAN.
    a) UMAP coordinates for all observations across all sites (gray points), overlaid
    with colored HDBSCAN-derived density clusters (centroids shown as white circles),
    and annotated with attributed physical precipitation processes and key summary
    characteristics. b) Example day showing the particle habit evolution throughout
    the day at MQT, MI. c) Ancillary observations for the event in b) — Image by Author'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 13：**由 UMAP+HDBSCAN 得到的降水过程簇概述。a) 所有站点所有观测值的 UMAP 坐标（灰色点），叠加了用彩色 HDBSCAN
    导出的密度簇（质心以白色圆圈表示），并标注了属性物理降水过程和关键总结特征。b) 显示 MQT，MI 一天内粒子习性演化的示例日。c) b) 事件的相关观测数据——图片由作者提供'
- en: Immediately, we notice several key differences from the previous snowfall-focused
    study using PCA. With the addition of rain and mixed-phase data, the first and
    second empirical orthogonal functions (EOF1 and EOF2) have now swapped places.
    The primary embedding now encodes information about particle phase rather than
    intensity. Intensity shifts to the second latent embedding (LE2), remaining significant
    but now secondary. The third LE still appears to relate to particle size and shape,
    particularly within the snowfall portion of the manifold.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 立即，我们注意到与之前使用 PCA 进行以降雪为重点的研究相比，有几个关键差异。随着降雨和混合相数据的加入，第一和第二个经验正交函数（EOF1 和 EOF2）现在已经交换了位置。主要嵌入现在编码了关于粒子相的信息，而不是强度。强度转移到第二个潜在嵌入（LE2），仍然很重要，但现在是次要的。第三个
    LE 似乎仍然与粒子大小和形状有关，尤其是在流形中的降雪部分。
- en: Applying HDBSCAN to the manifold groups generated by UMAP resulted in nine distinct
    clusters, plus one ambiguous cluster (Fig. 13.a). The separation between clusters
    is much clearer compared to PCA, and these groups seem to represent distinct physical
    precipitation processes, ranging from snowfall to mixed-phase to rainfall at various
    intensity levels. Interestingly, the ambiguous points and the connections between
    nodes in the graph form **distinct pathways** of particle habit evolution. This
    finding is particularly intriguing as it outlines clear particle evolutionary
    pathways, showing how a raindrop can transform into a frozen snow crystal under
    the right atmospheric conditions.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 将 HDBSCAN 应用于由 UMAP 生成的流形组，产生了九个不同的簇，以及一个模糊的簇（图 13.a）。与 PCA 相比，簇之间的分离更加清晰，这些组似乎代表了从降雪到混合相再到不同强度水平的降雨的不同的物理降水过程。有趣的是，模糊点和图中节点之间的连接形成了粒子习性演化的**不同路径**。这一发现特别引人入胜，因为它概述了清晰的粒子进化路径，展示了在适当的气象条件下，雨滴如何转化为冰晶。
- en: A real-world example of this phenomenon is shown in Fig. 13.b, observed in Marquette
    on February 15, 2023\. Each colored ring represents an individual (5-minute) data
    point throughout the day, with an arrow indicating the direction of time. In Fig.
    13.c, we overlay ancillary radar observations with surface temperatures. Up until
    around 12:00 UTC, a clear brightband in reflectivity can be seen at approximately
    1 km, indicative of a melting layer where temperatures are warm enough for snow
    to melt into rain. This period was correctly classified as rainfall using our
    UMAP+HDBSCAN (UH) clustering method. Then, around 17:00 UTC, temperatures rapidly
    dropped well below freezing, leading to the classification of particles as mixed-phase
    and eventually as snowfall. These types of tests are critically important for
    making sure what your manifold shape suggests makes sense physically.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 该现象的一个真实世界示例如图13.b所示，于2023年2月15日在Marquette观察到。每个彩色环代表一天中个体的（5分钟）数据点，箭头指示时间的方向。在图13.c中，我们将辅助雷达观测与地表温度叠加。直到大约12:00
    UTC，在约1公里的地方可以看到明显的亮带，这表明融化层温度足够高，使得雪融化成雨。这一时期被我们的UMAP+HDBSCAN（UH）聚类方法正确分类为降雨。然后，大约在17:00
    UTC，温度迅速下降至冰点以下，导致将粒子分类为混合相，最终为降雪。这些类型的测试对于确保你的流形形状在物理上是有意义的至关重要。
- en: If you’d like to explore this manifold yourself, examining different sites and
    seeing how various variables map to the embedding, check out our [interactive
    data analysis tool](https://frasertheking.com/interactive/), or click Fig. 14
    below.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要自己探索这个流形，检查不同的站点，看看各种变量如何映射到嵌入中，请查看我们的[交互式数据分析工具](https://frasertheking.com/interactive/)，或点击下面的图14。
- en: '[![](../Images/6b253ac770fb8cfe48e9d6c65e32911b.png)](http://frasertheking.com/interactive/)'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/6b253ac770fb8cfe48e9d6c65e32911b.png)(http://frasertheking.com/interactive/)'
- en: '**Figure 14:** Interactive 3D plotly scatter of UMAP LE embeddings. Points
    are colored by their respective HDBSCAN cluster groups (with ambiguous in black).
    Click to interact with the data yourself — Image by Author'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**图14**：UMAP LE嵌入的交互式3D plotly散点图。点根据各自的HDBSCAN簇组着色（模糊的用黑色表示）。点击以自行交互数据——图片由作者提供'
- en: When you explore the tool mentioned above, you’ll notice that mapping various
    input features to the manifold embedding results in smooth gradients. These gradients
    indicate that the general global structure of the data is likely being captured
    in a meaningful way, offering valuable insights into what the embeddings are encoding.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当你探索上述工具时，你会注意到将各种输入特征映射到流形嵌入中会产生平滑的梯度。这些梯度表明数据的一般全局结构可能以有意义的方式被捕捉，为嵌入编码的内容提供了宝贵的见解。
- en: Comparing the separation of points using UMAP to that of PCA (where PCA is applied
    to the exact same dataset as UMAP) reveals significantly better separation with
    UMAP, especially concerning precipitation phase. While PCA can broadly distinguish
    between “liquid” and “solid” particles, it struggles with the more complex mixed-phase
    particles. This limitation is evident in the distributions shown in Fig. 15.d-e.
    PCA often suffers from variance overcrowding near the origin, leading to a tradeoff
    between the number of clusters we can identify and the size of the ambiguous supercluster.
    Although HDBSCAN can be applied to PCA in the same manner as UMAP, it only generates
    two clusters (rain and snow) which isn’t particularly useful on its own, and can
    be achieved with a simple linear threshold. In contrast, UMAP provides much better
    separation, resulting in 37% fewer ambiguous points and a +0.14 higher [silhouette
    score](https://medium.com/@hazallgultekin/what-is-silhouette-score-f428fb39bf9a) for
    the clusters compared to PCA (0.51).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 使用UMAP与PCA（PCA应用于与UMAP相同的精确数据集）的点分离进行比较，UMAP显示出显著更好的分离，尤其是在降水相方面。虽然PCA可以大致区分“液体”和“固体”粒子，但它难以处理更复杂的混合相粒子。这种限制在图15.d-e所示的分布中很明显。PCA通常在原点附近遭受方差过度拥挤，导致我们能够识别的簇的数量与模糊超簇的大小之间产生权衡。尽管HDBSCAN可以像UMAP一样应用于PCA，但它只生成两个簇（雨和雪），这本身并不特别有用，并且可以通过简单的线性阈值实现。相比之下，UMAP提供了更好的分离，导致模糊点减少37%，与PCA（0.51）相比，簇的[轮廓分数](https://medium.com/@hazallgultekin/what-is-silhouette-score-f428fb39bf9a)提高了0.14。
- en: '![](../Images/3697482a6158023dab4241745d9dc73d.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3697482a6158023dab4241745d9dc73d.png)'
- en: '**Figure 15: **Comparison of PCA to UMAP trained using the same dataset, showing
    the PCA and UMAP groups in a) and b), respectively; c) shows the total number
    of ambiguous points between each technique; d) and e) show 1D KDEs of LE1/EOF1
    and LE2/EOF2 for each technique — Image by Author'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**图15：** 使用相同数据集训练的PCA与UMAP的比较，分别显示了a)和b)中的PCA和UMAP组；c)显示了每种技术之间模糊点的总数；d)和e)显示了LE1/EOF1和LE2/EOF2的1D
    KDEs——图片由作者提供'
- en: As we did previously with PCA, we can conduct a series of case study comparisons
    when using UMAP to reinforce our physical cluster attributions. By comparing these
    with collocated MRR observations, we can assess whether the conditions reported
    in the astmosphere above the PIP align with the attributions produced by the UH
    clusters, and how these compare to the clusters from PCA. In Fig. 16 below, we
    examine a few of these cases at Marquette.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前使用PCA所做的那样，在使用UMAP进行一系列案例研究比较时，我们可以加强我们对物理聚类归属的理解。通过将这些与同位MRR观测结果进行比较，我们可以评估报告在PIP上方的对流层中的条件是否与UH聚类产生的归属一致，以及这些与PCA聚类相比如何。在下面的图16中，我们检查了Marquette的一些这些案例。
- en: '![](../Images/90758a625fe2f07add916695180460dc.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/90758a625fe2f07add916695180460dc.png)'
- en: '**Figure 16:** Case study comparison of UMAP and PCA classifications against
    collocated surface radar data for three days at MQT — Image by Author'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**图16：** UMAP和PCA分类与MQT三天同位表面雷达数据的案例研究比较——图片由作者提供'
- en: In the first column (a), we present an example of a prolonged mixed-phase event,
    emphasizing LE1, which we know occurred at MQT from recorded weather reports.
    Along the top panel, both PCA and UMAP identify the period up until 19:00 UTC
    as rain. However, after this period, the PCA groupings become sparse and largely
    ambiguous, whereas UMAP successfully maps the post-19:00 UTC period as mixed-phase,
    distinguishing between wet sleet (green) and colder, slushy pellets (purple).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一列(a)中，我们展示了一个长期混合相事件的例子，强调LE1，我们知道MQT从记录的天气报告中发生了这一事件。在上面的面板中，PCA和UMAP都确定了直到19:00
    UTC的时期为雨。然而，在此之后，PCA分组变得稀疏且很大程度上是模糊的，而UMAP成功地将19:00 UTC之后的时期映射为混合相，区分了湿雪（绿色）和更冷的、湿滑的冰粒（紫色）。
- en: In panel (b), we highlight a case focusing on intensity changes (LE2), where
    conditions shift from high-intensity mixed-phase to low-intensity mixed-phase,
    and then back to high-intensity snowfall as temperatures cool. Again, UMAP provides
    a more detailed and consistent classification compared to the sparser results
    from PCA.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在面板(b)中，我们突出显示了一个关注强度变化（LE2）的案例，其中条件从高强度混合相转变为低强度混合相，然后随着温度的降低又回到高强度降雪。同样，与PCA的稀疏结果相比，UMAP提供了更详细和一致的分类。
- en: Finally, in panel (c), we explore an LE3 case involving a shallow system until
    15:00 UTC, followed by a deep convective system moving over the site, leading
    to an increase in the size, shape complexity, and intensity of the snow particles.
    Here too, UMAP demonstrates a more comprehensive mapping of the event. Note that
    these are only a few handpicked case studies however, and we recommend checking
    out our full paper for multi-year comparisons.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在面板(c)中，我们探索了一个涉及浅层系统直到15:00 UTC的LE3案例，随后是一个深对流系统在该地点上方移动，导致雪粒的大小、形状复杂性和强度增加。在这里，UMAP也展示了事件更全面的映射。请注意，这些只是一些精选的案例研究，我们建议您查看我们的完整论文以进行多年比较。
- en: Overall, we found that the nonlinear 3D manifold generated using UMAP provided
    a smooth and accurate approximation of precipitation phase, intensity, and particle
    size/shape (Fig. 17). When combined with hierarchical density-based clustering,
    the resulting groups were distinct and physically consistent with independent
    observations. While PCA was able to capture the general embedding structure (with
    EOFs 1-3 largely analogous to LEs 1-3), it struggled to represent the global structure
    of the data, as many of these processes are inherently nonlinear.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，我们发现使用UMAP生成的非线性3D流形为降水相、强度以及粒子大小/形状提供了一个平滑且准确的近似（图17）。当与基于密度的分层聚类相结合时，结果组是独特的，并且与独立观测结果物理上是一致的。虽然PCA能够捕捉到一般的嵌入结构（EOFs
    1-3大致相当于LEs 1-3），但它难以表示数据的全局结构，因为许多这些过程本质上是非线性的。
- en: '![](../Images/08acf4050a0e14a321be1cb5cf85421a.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/08acf4050a0e14a321be1cb5cf85421a.png)'
- en: '**Figure 17:** 3D Visualization of the final UMAP manifold for our precipitation
    dataset — Image by Author'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**图17：** 我们降水数据集最终UMAP流形的三维可视化——图片由作者提供'
- en: So what does this all mean?
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这一切意味着什么呢？
- en: '* * *'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusions
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: '**You’ve made it to the end!**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**你已经到达了终点！**'
- en: I realize this has been a lengthy post, so I’ll keep this section brief. In
    summary, we’ve developed a high-quality dataset of precipitation observations
    from multiple sites over several years and used this data to apply both linear
    and nonlinear dimensionality reduction techniques, **aiming** **to learn more
    about the structure of the data itself!** Across all methods, embeddings related
    to particle phase, precipitation intensity, and particle size/shape were the most
    dominant. However, only the nonlinear techniques were able to capture the complex
    global structure of the data, revealing distinct precipitation groups that aligned
    well with independent observations.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我意识到这已经是一篇很长的帖子，所以我会保持这一部分简短。总之，我们开发了一个高质量的多年多站点降水观测数据集，并使用这些数据应用了线性和非线性降维技术，**旨在**更深入地了解数据本身的**结构**！在所有方法中，与粒子相、降水强度以及粒子大小/形状相关的嵌入是最占主导地位的。然而，只有非线性技术能够捕捉数据的复杂全局结构，揭示了与独立观测结果吻合良好的降水组。
- en: We believe these groups (and particle transitionary pathways) can be used to
    improve current satellite precipitation retrievals as well as numerical model
    microphysical parameterizations. With this in mind, we have constructed an operational
    parameter matrix (the lookup space is illustrated in Fig. 18) which produces a
    smooth conditional probability vector for each group based on temperature (T)
    and particle counts (Nt). Please see the associated manuscript for access/API
    details to this table.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们相信这些组（以及粒子过渡路径）可以用来改进当前的卫星降水反演以及数值模型微物理参数化。本着这个想法，我们构建了一个操作参数矩阵（查找空间如图18所示），它根据温度（T）和粒子计数（Nt）为每个组生成一个平滑的条件概率向量。请参阅相关论文以获取访问/API细节。
- en: '![](../Images/e0361990fc2a6511f4539a12ec7a420c.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e0361990fc2a6511f4539a12ec7a420c.png)'
- en: '**Figure 18:** *UMAP+HDBSCAN lookup table histogram* mapped in 2D — Image by Author'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**图18:** *UMAP+HDBSCAN查找表直方图* 在二维空间中映射 — 图像由作者提供'
- en: Nonlinear dimensionality reduction techniques like UMAP are still *relatively* new
    and have yet to be widely applied to the large datasets emerging in the Geosciences.
    It should be noted that [these techniques are imperfect, and there are tradeoffs
    based on your problem context,](https://towardsdatascience.com/why-you-should-not-rely-on-t-sne-umap-or-trimap-f8f5dc333e59/) so
    keep that in mind. However, our findings here, building first on PCA, suggest
    that these techniques can be highly effective,** emphasizing the value of carefully
    curated and comprehensive observational databases**, which we hope to see more
    of in the coming years.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 非线性降维技术如UMAP仍然*相对较新*，尚未广泛应用于地学领域出现的大数据集。需要注意的是，[这些技术并不完美，并且根据你的问题背景存在权衡](https://towardsdatascience.com/why-you-should-not-rely-on-t-sne-umap-or-trimap-f8f5dc333e59/)，所以请记住这一点。然而，我们的发现，首先基于PCA，表明这些技术可以非常有效，**强调了精心策划和全面观测数据库的价值**，我们希望在未来几年看到更多这样的数据库。
- en: Thanks again for reading, and let us know in the comments how you are thinking
    about learning more from your large observational datasets!
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 再次感谢阅读，请在评论中告诉我们您是如何从您的大型观测数据集中学习更多知识的！
- en: '* * *'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Data and Code
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据和代码
- en: PIP and surface meteorologic observations used as input to the PCA and UMAP
    are publicly available for download on the University of Michigan’s DeepBlue data
    repository ([https://doi.org/10.7302/37yx-9q53](https://doi.org/10.7302/37yx-9q53)).
    This dataset is provided as a series of folders containing NetCDF files for each
    site and year, with standardized CF metadata naming conventions. For more detailed
    information, please see our data paper ([https://doi.org/10.1029/2024EA003538](https://doi.org/10.1029/2024EA003538)).
    ERA5 data can be downloaded from the [Copernicus Climate Data Store](https://cds.climate.copernicus.eu/cdsapp#!/dataset/reanalysis-era5-single-levels?tab=form).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 用于PCA和UMAP的输入为PIP和地表气象观测数据，可在密歇根大学DeepBlue数据存储库中公开下载（[https://doi.org/10.7302/37yx-9q53](https://doi.org/10.7302/37yx-9q53)）。该数据集以一系列文件夹的形式提供，每个站点和年份包含NetCDF文件，并遵循标准化的CF元数据命名约定。更多详细信息，请参阅我们的数据论文（[https://doi.org/10.1029/2024EA003538](https://doi.org/10.1029/2024EA003538)）。ERA5数据可从[Copernicus气候数据存储库](https://cds.climate.copernicus.eu/cdsapp#!/dataset/reanalysis-era5-single-levels?tab=form)下载。
- en: PIP data preprocessing code is available on our public GitHub repository ([https://github.com/frasertheking/pip_processing](https://github.com/frasertheking/pip_processing)),
    and we have provided a custom API for interacting with the particle microphysics
    data in Python called *pipdb* ([https://github.com/frasertheking/pipdb](https://github.com/frasertheking/pipdb)).
    The snowfall PCA project code is available on Github ([https://github.com/frasertheking/snowfall_pca](https://github.com/frasertheking/snowfall_pca)).
    Additionally, the code used to fit the DR methods, cluster cases, analyze inputs
    and generate figures is also available for download on a separate, public GitHub
    repository ([https://github.com/frasertheking/umap](https://github.com/frasertheking/umap)).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: PIP 数据预处理代码可在我们的公共 GitHub 仓库中找到（[https://github.com/frasertheking/pip_processing](https://github.com/frasertheking/pip_processing)），我们提供了一个名为
    *pipdb* 的自定义 API，用于在 Python 中与粒子微物理数据交互（[https://github.com/frasertheking/pipdb](https://github.com/frasertheking/pipdb)）。雪降
    PCA 项目代码可在 Github 上找到（[https://github.com/frasertheking/snowfall_pca](https://github.com/frasertheking/snowfall_pca)）。此外，用于拟合
    DR 方法、聚类案例、分析输入和生成图表的代码也可在另一个单独的公共 GitHub 仓库中下载（[https://github.com/frasertheking/umap](https://github.com/frasertheking/umap)）。
