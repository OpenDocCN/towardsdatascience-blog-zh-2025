- en: Data Science Use Cases
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学用例
- en: 'Use Case 1: Feature Engineering'
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用例 1：特征工程
- en: 'Modular arithmetic has a number of interesting use cases in data science. An
    intuitive one is in the context of feature engineering, for encoding cyclical
    features like hours of the day. Since time wraps around every 24 hours, treating
    hours as linear values can misrepresent relationships (e.g., 11 PM and 1 AM are
    numerically far apart but temporally close). By applying modular encoding (e.g.,
    using sine and cosine transformations of the hour modulo 24), we can preserve
    the circular nature of time, allowing machine learning (ML) models to recognize
    patterns that occur during specific periods like nighttime. The following Python
    code shows how such an encoding can be implemented:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学中，模运算有许多有趣的用例。一个直观的用例是在特征工程的背景下，用于编码像一天中的小时这样的循环特征。由于时间每 24 小时就会循环一次，将小时视为线性值可能会错误地表示关系（例如，晚上
    11 点和凌晨 1 点在数值上相距很远，但在时间上很接近）。通过应用模编码（例如，使用小时模 24 的正弦和余弦变换），我们可以保留时间的循环性质，使机器学习（ML）模型能够识别在特定时间段（如夜间）发生的模式。以下
    Python 代码展示了如何实现这种编码：
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The resulting dataframe `df`:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的数据框 `df`：
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Notice how the use of sine still differentiates between the hours before and
    after 12 (e.g., encoding 11 p.m. and 1 a.m. as -0.258819 and 0.258819, respectively),
    while the use of cosine does not (e.g., both 11 p.m. and 1 a.m. are mapped to
    the value 0.965926). The optimal choice of encoding will depend on the business
    context in which the ML model is to be deployed. Ultimately, the technique enhances
    feature engineering for tasks such as anomaly detection, forecasting, and classification
    where temporal proximity matters.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到正弦的使用如何区分 12 点之前和之后的小时（例如，将晚上 11 点和凌晨 1 点分别编码为 -0.258819 和 0.258819），而余弦的使用则没有这种区分（例如，晚上
    11 点和凌晨 1 点都被映射到值 0.965926）。编码的最佳选择将取决于要部署机器学习模型的业务环境。最终，这项技术增强了特征工程，适用于异常检测、预测和分类等任务，在这些任务中，时间邻近性很重要。
- en: In the following sections, we will consider two larger data science use cases
    of linear congruence that involve solving for *y* in modular expressions of the
    form *n* ⋅ *y* ≡ *x* (mod *d*).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下章节中，我们将考虑两个涉及求解形式为 *n* ⋅ *y* ≡ *x* (mod *d*) 的模表达式中 *y* 的较大数据科学用例。
- en: 'Use Case 2: Resharding in Distributed Database Systems'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用例 2：分布式数据库系统中的重新分片
- en: In distributed databases, data is often partitioned (or *sharded*) across multiple
    nodes using a hash function. When the number of shards changes — say, from *d*
    to *d’* — we need to *reshard* the data efficiently without rehashing everything
    from scratch.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在分布式数据库中，数据通常使用哈希函数跨多个节点进行分区（或 *分片*）。当分片数量发生变化时——比如说，从 *d* 变为 *d’*——我们需要有效地重新分片数据，而无需从头开始重新哈希一切。
- en: 'Suppose each data item is assigned to a shard as follows:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 假设每个数据项都按照以下方式分配到片段：
- en: '`shard = hash(key) mod d`'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '`shard = hash(key) mod d`'
- en: 'When redistributing items to a new set of *d’* shards, we might want to map
    the old shard indices to the new ones in a way that preserves balance and minimizes
    data movement. This can lead to solving for *y* in the expression *n* ⋅ *y* ≡
    *x* (mod *d*), where:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当将项目重新分配到新的 *d’* 片段集时，我们可能希望以保持平衡和最小化数据移动的方式将旧片段索引映射到新索引。这可能导致在表达式 *n* ⋅ *y*
    ≡ *x* (mod *d*) 中求解 *y*，其中：
- en: '*x* is the original shard index,'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*x* 是原始片段索引，'
- en: '*d* is the old number of shards,'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*d* 是旧的片段数量，'
- en: '*n* is a scaling factor (or transformation coefficient),'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*n* 是缩放因子（或变换系数），'
- en: '*y* is the new shard index that we are solving for'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*y* 是我们正在求解的新片段索引'
- en: Using modular arithmetic in this context ensures consistent mapping between
    old and new shard layouts, minimizes reallocation, preserves data locality, and
    enables deterministic and reversible transformations during resharding.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在此上下文中使用模数算术确保了旧片段布局和新片段布局之间的一致映射，最小化了重新分配，保持了数据局部性，并在重新分片期间实现了确定性和可逆的转换。
