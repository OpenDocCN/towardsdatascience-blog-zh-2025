- en: Modular Arithmetic in Data Science
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学中的模运算
- en: 原文：[https://towardsdatascience.com/modular-arithmetic-in-data-science/](https://towardsdatascience.com/modular-arithmetic-in-data-science/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/modular-arithmetic-in-data-science/](https://towardsdatascience.com/modular-arithmetic-in-data-science/)
- en: '*<mdspan datatext="el1755445157197" class="mdspan-comment">Modular arithmetic</mdspan>*
    is a mathematical system where numbers cycle <mdspan datatext="el1755561291714"
    class="mdspan-comment">back to the beginning</mdspan> after reaching a value called
    the *modulus*. The system is often referred to as “clock arithmetic” due to its
    similarity to how analog 12-hour clocks represent time. This article provides
    a conceptual overview of modular arithmetic and explores practical use cases in
    data science.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1755445157197" class="mdspan-comment">模运算</mdspan>* 是一种数学系统，其中数字在达到一个称为**模数**的值后循环**回到起点**。这个系统通常被称为“时钟算术”，因为它与模拟12小时时钟表示时间的方式相似。本文提供了模运算的概念概述，并探讨了数据科学中的实际应用案例。'
- en: Conceptual Overview
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概念概述
- en: The Basics
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基础知识
- en: Modular arithmetic defines a system of operations on integers based on a particular
    integer called the modulus. The expression *x mod d* is equivalent to the remainder
    obtained when *x* is divided by *d*. If *r* ≡ *x mod d*, then *r* is said to be
    *congruent* to *x mod d*. In other words, this means that *r* and *x* differ by
    a multiple of *d*, or that *x – r* is divisible by *d*. The symbol ‘≡’ (three
    horizontal lines) is used instead of ‘=’ in modular arithmetic to emphasize that
    we’re dealing with congruence rather than equality in the usual sense.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 模运算定义了一个基于称为模数的特定整数的整数运算系统。表达式 *x mod d* 等价于 *x* 除以 *d* 所得到的余数。如果 *r* ≡ *x mod
    d*，则说 *r* 与 *x mod d* **同余**。换句话说，这意味着 *r* 和 *x* 之间的差是 *d* 的倍数，或者说 *x – r* 能被
    *d* 整除。在模运算中，使用符号‘≡’（三条水平线）而不是‘=’，以强调我们处理的是同余而不是通常意义上的相等。
- en: For example, in modulo 7, the number 10 is congruent to 3 because 10 divided
    by 7 leaves a remainder of 3\. So, we can write 3 ≡ 10 *mod* 7\. In the case of
    a 12-hour clock, 2 a.m. is congruent to 2 p.m. (which is 14 *mod* 12). In programming
    languages such as Python, the percent sign (‘%’) serves as the modulus operator
    (e.g., `10 % 7` would evaluate to 3).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在模7的情况下，数字10与3同余，因为10除以7的余数是3。因此，我们可以写成 3 ≡ 10 *mod* 7。在12小时钟的情况下，凌晨2点与下午2点（即14
    *mod* 12）同余。在Python等编程语言中，百分号（‘%’）用作模运算符（例如，`10 % 7` 将计算为3）。
- en: 'Here is a video that explains these concepts in more detail:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个视频，更详细地解释了这些概念：
- en: Solving Linear Congruences
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解线性同余
- en: 'A *linear congruence* can be a modular expression of the form *n* ⋅ *y* ≡ *x*
    (mod *d*), where the coefficient *n*, target *x*, and modulus *d* are known integers,
    and the unknown integer *y* has a degree of one (i.e., it is not squared, cubed,
    and so on). The expression 2017 ⋅ *y* ≡ 2025 (mod 10000) is an example of a linear
    congruence; it states that when 2017 is multiplied by some integer *y*, the product
    leaves a remainder of 2025 when divided by 10000\. To solve for *y* in the expression
    *n* ⋅ *y* ≡ *x* (mod *d*), follow these steps:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一个**线性同余**可以是一个形式为 *n* ⋅ *y* ≡ *x* (mod *d*) 的模表达式，其中系数 *n*、目标 *x* 和模数 *d* 是已知的整数，未知整数
    *y* 的一次方（即，它没有被平方、立方等）。表达式 2017 ⋅ *y* ≡ 2025 (mod 10000) 是一个线性同余的例子；它表明当2017乘以某个整数
    *y* 时，该乘积除以10000的余数是2025。要解表达式 *n* ⋅ *y* ≡ *x* (mod *d*) 中的 *y*，请遵循以下步骤：
- en: Find the *greatest common divisor* (GCD) of the coefficient *n* and modulus
    *d*, also written as GCD(*n*, *d*), which is the greatest positive integer that
    is a divisor of both *n* and *d*. The [Extended Euclidean Algorithm](https://en.wikipedia.org/wiki/Extended_Euclidean_algorithm)
    may be used to efficiently compute the GCD; this will also yield a candidate for
    *n^(-1)*, the *modular inverse* of the coefficient *n*.
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到系数 *n* 和模数 *d* 的最大公约数（GCD），也写作 GCD(*n*, *d*), 它是既是 *n* 也是 *d* 的最大正整数。可以使用[扩展欧几里得算法](https://en.wikipedia.org/wiki/Extended_Euclidean_algorithm)来高效地计算GCD；这也会得到
    *n^(-1)* 的一个候选值，即系数 *n* 的**模逆**。
- en: Determine whether a solution exists. If the target *x* is not divisible by GCD(*n*,
    *d*), then the equation has no solution. This is because the congruence is only
    solvable when the GCD divides the target.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定是否存在解。如果目标 *x* 不能被 GCD(*n*, *d*) 整除，则方程无解。这是因为同余只有在GCD能整除目标时才有解。
- en: Simplify the modular expression, if needed, by dividing the coefficient *n*,
    target *x*, and modulus *d* by GCD(*n*, *d*) to reduce the problem to a simpler
    equivalent form; let us call these simplified quantities *n[0]*, *x[0]*, and *d[0]*,
    respectively. This ensures that **n[0]** and **d[0]** are *coprime* (i.e., 1 is
    their only common divisor), which is necessary for finding a modular inverse.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如有必要，通过将系数 *n*、目标 *x* 和模数 *d* 除以最大公约数 GCD(*n*, *d*) 来简化模表达式，将问题简化为更简单的等价形式；我们分别称这些简化量为
    *n[0]*、*x[0]* 和 *d[0]*。这确保了 **n[0]** 和 **d[0]** 是 *互质的*（即，1 是它们的唯一公约数），这对于找到模逆是必要的。
- en: Compute the modular inverse *n[0]^(-1)* of ***n[0]*** mod ***d[0]*** (again,
    using the Extended Euclidean Algorithm).
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算模逆 *n[0]^(-1)*，即 ***n[0]*** mod ***d[0]*** 的模逆（再次使用扩展欧几里得算法）。
- en: Find one solution for the unknown value *y*. To do this, multiply the modular
    inverse *n[0]^(-1)* by the reduced target *x[0]* to obtain one valid solution
    for *y* mod **d[0]**.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到一个未知值 *y* 的解。为此，将模逆 *n[0]^(-1)* 乘以简化后的目标 *x[0]*，以获得 *y* mod **d[0]** 的一个有效解。
- en: Finally, by building on the result of step 5, generate all possible solutions.
    Since the original equation was reduced by GCD(*n*, *d*), there are GCD(*n*, *d*)
    distinct solutions. These solutions are spaced evenly apart by the reduced modulus
    **d[0]**, and all are valid with respect to the original modulus *d*.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，基于步骤 5 的结果，生成所有可能的解。由于原始方程通过 GCD(*n*, *d*) 被简化，因此有 GCD(*n*, *d*) 个不同的解。这些解均匀地分布在简化的模数
    **d[0]** 之间，并且所有解都与原始模数 *d* 相对应。
