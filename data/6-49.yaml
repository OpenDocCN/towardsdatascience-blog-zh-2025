- en: What I’m Updating in My AI Ethics Class for 2025
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我在2025年AI伦理课程中的更新内容
- en: 原文：[https://towardsdatascience.com/what-im-updating-in-my-ai-ethics-class-for-2025-27cd55aa9587/](https://towardsdatascience.com/what-im-updating-in-my-ai-ethics-class-for-2025-27cd55aa9587/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-im-updating-in-my-ai-ethics-class-for-2025-27cd55aa9587/](https://towardsdatascience.com/what-im-updating-in-my-ai-ethics-class-for-2025-27cd55aa9587/)
- en: The new technology developments have come in fast, but what has ethical or values
    implications that are going to matter long-term?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 新技术发展迅速，但哪些具有长期伦理或价值观影响的问题将会产生重要影响？
- en: I’ve been working on updates for my 2025 class on Values and Ethics in Artificial
    Intelligence. This course is part of the Johns Hopkins Education for Professionals
    program, part of the Master’s degree in Artificial Intelligence.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直在为2025年的《人工智能价值观与伦理》课程进行更新。这门课程是约翰霍普金斯大学专业教育项目的一部分，也是人工智能硕士学位课程的一部分。
- en: 'Overview of my changes:'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我所做的变更概述：
- en: I’m doing major updates on three topics based on 2024 developments, and a number
    of small updates, integrating other news and filling gaps in the course.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在基于2024年的发展对三个主题进行重大更新，并对多个小主题进行更新，整合其他新闻并填补课程中的空白。
- en: 'Topic 1: LLM interpretability.'
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主题1：LLM可解释性。
- en: Anthropic’s work in interpretability was a breakthrough in explainable AI (XAI).
    We will be discussing how this method can be used in practice, as well as implications
    for how we think about AI understanding.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic在可解释性方面的工作是可解释人工智能（XAI）的一个突破。我们将讨论这种方法在实际中的应用，以及对我们思考AI理解的影响。
- en: 'Topic 2: Human-Centered AI.'
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主题2：以人为本的AI。
- en: 'Rapid AI development adds urgency to the question: How do we design AI to empower
    rather than replace human beings? I have added content throughout my course on
    this, including two new design exercises.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 快速的人工智能发展使得以下问题变得更加紧迫：我们如何设计人工智能来赋能人类而不是取代人类？我在我的课程中增加了相关内容，包括两个新的设计练习。
- en: '![](../Images/b82a0296e5daf97d4a355d9f1a67e284.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b82a0296e5daf97d4a355d9f1a67e284.png)'
- en: 'Topic 3: AI Law and Governance.'
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主题3：AI法律与治理。
- en: Major developments were the EU’s AI Act and the raft of California legislation,
    including laws targeting deep fakes, misinformation, intellectual property, medical
    communications and minor’s use of ‘addictive’ social media, among other. For class
    I developed some heuristics for evaluating AI legislation, such as studying definitions,
    and explain how legislation is only one piece of the solution to the AI governance
    puzzle.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 主要的发展包括欧盟的AI法案和一系列加州立法，包括针对深度伪造、虚假信息、知识产权、医疗通信和未成年人使用“成瘾性”社交媒体等法律。我为课程开发了一些评估AI立法的启发式方法，例如研究定义，并解释立法只是解决AI治理难题的一个方面。
- en: '![California Governor Gavin Newsome signing one of several new AI laws; public
    domain photo by the State of California](../Images/a731faf73872532f81f8794c9bc50150.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![加利福尼亚州州长加文·纽瑟姆签署了多项新AI法律之一；公共领域照片由加州州政府提供](../Images/a731faf73872532f81f8794c9bc50150.png)'
- en: California Governor Gavin Newsome signing one of several new AI laws; public
    domain [photo by the State of California](https://www.gov.ca.gov/2024/09/17/governor-newsom-signs-bills-to-protect-digital-likeness-of-performers/)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 加利福尼亚州州长加文·纽瑟姆签署了多项新AI法律之一；公共领域[照片由加州州政府提供](https://www.gov.ca.gov/2024/09/17/governor-newsom-signs-bills-to-protect-digital-likeness-of-performers/)
- en: 'Miscellaneous new material:'
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他新材料：
- en: I am integrating material from news stories into existing topics on copyright,
    risk, privacy, safety and social media/ smartphone harms.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在将新闻报道中的材料整合到现有的关于版权、风险、隐私、安全和社交媒体/智能手机危害等主题中。
- en: '**Topic 1: Generative AI Interpretability**'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**主题1：生成式AI可解释性**'
- en: '**What’s new:**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**新内容：**'
- en: Anthropic’s pathbreaking 2024 work on interpretability was a fascination of
    mine. They published a blog post [here](https://www.anthropic.com/research/mapping-mind-language-model),
    and there is also a [paper](https://transformer-circuits.pub/2024/scaling-monosemanticity/index.html),
    and there was an interactive feature browser. Most tech-savvy readers should be
    able to get something out of the blog and paper, despite some technical content
    and a daunting paper title (‘Scaling Monosemanticity’).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic在2024年关于可解释性的开创性工作是我关注的焦点。他们在这里发布了一篇博客文章[这里](https://www.anthropic.com/research/mapping-mind-language-model)，还有一篇[论文](https://transformer-circuits.pub/2024/scaling-monosemanticity/index.html)，以及一个交互式功能浏览器。大多数技术熟练的读者应该能够从博客和论文中获得一些东西，尽管有些技术内容和一个令人畏惧的论文标题（“扩展单义性”）。
- en: Below is a screenshot of one discovered feature, ‘sycophantic praise’. I like
    this one because of the psychological subtlety; it amazes me that they could separate
    this abstract concept from simple ‘flattery’, or ‘praise’.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是发现的一个功能截图，‘sycophantic praise’。我喜欢这个，因为它具有心理上的微妙之处；令我惊讶的是，他们能够将这个抽象概念与简单的‘奉承’或‘赞美’区分开来。
- en: '![Graphic from the paper ''Scaling Monosemanticity: Extracting Interpretable
    Features from Claude 3 Sonnet''.](../Images/cd215caf4885a72a57bdf9de095ba678.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![来自论文《Scaling Monosemanticity: Extracting Interpretable Features from Claude
    3 Sonnet》的图形](../Images/cd215caf4885a72a57bdf9de095ba678.png)'
- en: 'Graphic from the paper ‘Scaling Monosemanticity: Extracting Interpretable Features
    from Claude 3 Sonnet’.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '来自论文《Scaling Monosemanticity: Extracting Interpretable Features from Claude
    3 Sonnet》的图形。'
- en: '**What’s important:**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么是重要的：**'
- en: '**Explainable AI:** For my ethics class, this is most relevant to explainable
    AI (XAI), which is a key ingredient of human-centered design. The question I will
    pose to the class is, how might this new capability be used to promote human understanding
    and empowerment when using LLMs? SAEs (sparse autoencoders) are too expensive
    and hard to train to be a complete solution to XAI problems, but they can add
    depth to a multi-pronged XAI strategy.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**可解释人工智能：**对于我的伦理学课程，这最相关于可解释人工智能（XAI），它是以人为本设计的核心组成部分。我将向课堂提出的问题是，这种新能力如何被用来在使用大型语言模型（LLMs）时促进人类理解和赋权？SAEs（稀疏自动编码器）由于成本高昂且难以训练，不能成为
    XAI 问题的完整解决方案，但它们可以为多方面的 XAI 策略增添深度。'
- en: '**Safety implications:** Anthropic’s work on safety is also worth a mention.
    They identified the ‘syncophantic praise’ feature as part of their work on safety,
    specifically relevant to this question: could a very powerful AI hide its intentions
    from humans, possibly by flattering users into complacency? This general direction
    is especially salient in light of this recent work: [Frontier Models are Capable
    of In-context Scheming.](https://arxiv.org/abs/2412.04984) (NB: see also Anthropic’s
    work on [alignment faking](https://www.anthropic.com/research/alignment-faking).
    Thanks for the pointer Sean Sica.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**安全影响：**Anthropic 在安全领域的工作也值得提及。他们将其“谄媚的赞美”功能作为安全工作的一部分，特别相关于这个问题：一个非常强大的
    AI 是否能隐藏其意图，可能通过奉承用户使其自满来实现？这一方向在最近的研究中尤为突出：[Frontier Models are Capable of In-context
    Scheming.](https://arxiv.org/abs/2412.04984)（注意：也可参见 Anthropic 在 [alignment faking](https://www.anthropic.com/research/alignment-faking)
    方面的工作。感谢 Sean Sica 的提示。）'
- en: '**Evidence of AI ‘Understanding’?** Did interpretability kill the ‘stochastic
    parrot’? I have been convinced for a while that LLMs must have some internal representations
    of complex and inter-related concepts. They could not do what they do as one-deep
    stimulus-response or word-association engines, (‘stochastic parrots’) no matter
    how many patterns were memorized. The use of complex abstractions, such as those
    identified by Anthropic, fits my definition of ‘understanding’, although some
    reserve that term only for human understanding. Perhaps we should just add a qualifier
    for ‘AI understanding’. This is not a topic that I explicitly cover in my ethics
    class, but it does come up in discussion of related topics.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI ''理解'' 的证据？**可解释性是否终结了‘随机鹦鹉’？我已经确信了一段时间，LLMs 必须有一些关于复杂和相互关联概念的内部表示。他们不能仅仅作为单层刺激-反应或词关联引擎（‘随机鹦鹉’）来做他们所做的事情，无论记住了多少模式。使用复杂抽象，如
    Anthropic 所识别的，符合我对‘理解’的定义，尽管有些人只将这个术语保留给人类理解。也许我们应该为‘AI 理解’添加一个限定词。这不是我在伦理学课程中明确涉及的话题，但它确实在相关话题的讨论中出现了。'
- en: '**SAE visualization needed.** I am still looking for a good visual illustration
    of how complex features across a deep network are mapped onto to a very thin,
    very wide SAEs with sparsely represented features. What I have now is the Powerpoint
    approximation I created for class use, below. Props to Brendan Boycroft for his
    LLM visualizer, which has helped me understand more about the mechanics of LLMs.
    [https://bbycroft.net/llm](https://bbycroft.net/llm)'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**需要 SAE 可视化。**我仍在寻找一个很好的视觉说明，说明深度网络中的复杂特征是如何映射到一个非常薄、非常宽的、具有稀疏表示特征的 SAEs 上的。我现在所拥有的只是我为课堂使用创建的
    Powerpoint 近似图，如下所示。感谢 Brendan Boycroft 的 LLM 可视化器，它帮助我更好地理解了 LLMs 的机制。[https://bbycroft.net/llm](https://bbycroft.net/llm)'
- en: '![Author''s depiction of SAE mapping](../Images/a88300992d0df013a26b701895d09405.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![作者对 SAE 映射的描述](../Images/a88300992d0df013a26b701895d09405.png)'
- en: Author’s depiction of SAE mapping
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 作者对 SAE 映射的描述
- en: 'Topic 2: Human Centered AI (HCAI)'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主题 2：以人为本的人工智能（HCAI）
- en: '**What’s new?**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**有什么新内容？**'
- en: In 2024 it was increasingly apparent that AI will affect every human endeavor
    and seems to be doing so at a much faster rate than previous technologies such
    as steam power or computers. The speed of change matters almost more than the
    nature of change because human culture, values, and ethics do not usually change
    quickly. Maladaptive patterns and precedents set now will be increasingly difficult
    to change later.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 到2024年，AI将影响每一个人类事业，这似乎比蒸汽动力或计算机等以前的技术变化得更快。变化的速度几乎比变化的性质更重要，因为人类文化、价值观和伦理通常不会快速改变。现在设定的不适应模式和先例将越来越难以在以后改变。
- en: '**What’s important?**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么是重要的？**'
- en: Human-Centered AI needs to become more than an academic interest, it needs to
    become a well-understood and widely practiced set of values, practices and design
    principles. Some people and organizations that I like, along with the Anthropic
    explainability work already mentioned, are [Stanford’s Human-Centered AI](https://hai.stanford.edu/),
    Google’s [People + AI](https://pair.withgoogle.com/) effort, and [Ben Schneiderman’](https://www.cs.umd.edu/users/ben/)s
    early leadership and community organizing.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 以人为中心的AI需要不仅仅是一个学术兴趣，它需要成为一个被广泛理解和实践的价值观、实践和设计原则的集合。我喜欢的一些人和组织，包括之前提到的Anthropic可解释性工作，有斯坦福大学的以人为中心的AI
    [Stanford’s Human-Centered AI](https://hai.stanford.edu/)，谷歌的[People + AI](https://pair.withgoogle.com/)努力，以及[Ben
    Schneiderman](https://www.cs.umd.edu/users/ben/)早期的领导和社区组织。
- en: 'For my class of working AI engineers, I am trying to focus on practical and
    specific design principles. We need to counter the dysfunctional design principles
    I seem to see everywhere: ‘automate everything as fast as possible’, and ‘hide
    everything from the users so they can’t mess it up’. I am looking for cases and
    examples that challenge people to step up and use AI in ways that empower humans
    to be smarter, wiser and better than ever before.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的工作型AI工程师班级，我正在尝试专注于实用和具体的设计原则。我们需要对抗我似乎无处不在的无效设计原则：“尽可能快地自动化一切”，以及“隐藏一切，以免用户搞砸”。我正在寻找挑战人们站起来并以赋予人类前所未有的智慧、智慧和更好方式使用AI的案例和例子。
- en: I wrote fictional cases for class modules on the Future of Work, HCAI and Lethal
    Autonomous Weapons. [Case 1](https://medium.com/@nathanbos/2c4885b9560e) is about
    a customer-facing LLM system that tried to do too much too fast and cut the expert
    humans out of the loop. [Case 2](https://medium.com/@nathanbos/0ad4caf4787f) is
    about a high school teacher who figured out most of her students were cheating
    on a camp application essay with an LLM and wants to use GenAI in a better way.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我为关于工作未来、HCAI和致命自主武器的课程模块写了虚构案例。[案例1](https://medium.com/@nathanbos/2c4885b9560e)是关于一个面向客户的LLM系统，它试图做得太多太快，并排除了专家人类。
    [案例2](https://medium.com/@nathanbos/0ad4caf4787f)是关于一位高中教师，她发现大多数学生都在用LLM作弊申请露营申请论文，并希望更好地使用GenAI。
- en: '![](../Images/ce3c262707f522e6680e3625c10fa31e.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce3c262707f522e6680e3625c10fa31e.png)'
- en: The cases are on separate Medium pages [[here](https://medium.com/@nathanbos/0ad4caf4787f)](https://medium.com/@nathanbos/2c4885b9560e)
    and here, and I love feedback! Thanks to Sara Bos and Andrew Taylor for comments
    already received.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例在Medium的单独页面上 [[这里](https://medium.com/@nathanbos/0ad4caf4787f)](https://medium.com/@nathanbos/2c4885b9560e)
    和这里，我非常欢迎反馈！感谢Sara Bos和Andrew Taylor已经收到的评论。
- en: The second case might be controversial; some people argue that it is OK for
    students to learn to write with AI before learning to write without it. I disagree,
    but that debate will no doubt continue.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种情况可能会有争议；有些人认为，在学会不用AI写作之前，学生先学会用AI写作是可以接受的。我不同意，但无疑这种辩论将继续下去。
- en: I prefer real-world design cases when possible, but good HCAI cases have been
    hard to find. My colleague [John (Ian) McCulloh](https://www.youtube.com/@dr_smoke)
    recently gave me some great ideas from examples he uses in his class lectures,
    including the [Organ Donation case](https://www.youtube.com/watch?v=A__M4O0Z5mY),
    an Accenture project that helped doctors and patients make time-sensitive kidney
    transplant decision quickly and well. Ian teaches in the same program that I do.
    I hope to work with Ian to turn this into an interactive case for next year.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果可能的话，我更喜欢现实世界的案例设计，但好的HCAI案例很难找到。我的同事[John (Ian) McCulloh](https://www.youtube.com/@dr_smoke)最近给了我一些很好的想法，这些想法来自他在课堂讲座中使用的例子，包括[器官捐赠案例](https://www.youtube.com/watch?v=A__M4O0Z5mY)，这是一个Accenture项目，帮助医生和患者快速、合理地做出时间敏感的肾脏移植决定。Ian和我教的是同一个项目。我希望与Ian合作，把这个案例变成明年的互动案例。
- en: 'Topic 3: AI governance'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主题3：AI治理
- en: Most people agree that AI development needs to be governed, through laws or
    by other means, but there’s a lot of disagreement about how.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人同意人工智能的发展需要通过法律或其他手段进行治理，但关于如何治理存在很多分歧。
- en: What’s new?
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有什么新动态？
- en: The [EU’s AI Act](https://artificialintelligenceact.eu/high-level-summary/)
    came into effect, giving a tiered system for AI risk, and prohibiting a list of
    highest-risk applications including social scoring systems and remote biometric
    identification. The AI Act joins the EU’s [Digital Markets Act](https://digital-markets-act.ec.europa.eu/index_en)
    and the [General Data Protection Regulation](https://gdpr.eu/what-is-gdpr/), to
    form the world’s broadest and most comprehensive set of AI-related legislation.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 欧盟的《人工智能法案》（[EU’s AI Act](https://artificialintelligenceact.eu/high-level-summary/)）开始生效，为人工智能风险提供分层体系，并禁止包括社会评分系统和远程生物识别在内的最高风险应用。人工智能法案与欧盟的《数字市场法案》（[Digital
    Markets Act](https://digital-markets-act.ec.europa.eu/index_en)）和《通用数据保护条例》（[General
    Data Protection Regulation](https://gdpr.eu/what-is-gdpr/)）一起，形成了世界上最广泛和最全面的与人工智能相关的法律体系。
- en: California passed a set of AI governance related laws, which may have national
    implications, in the same way that California laws on things like the environment
    have often set precedent. I like [this (incomplete) review](https://www.whitecase.com/insight-alert/raft-california-ai-legislation-adds-growing-patchwork-us-regulation)
    from the White & Case law firm.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 加利福尼亚通过了一系列与人工智能治理相关的法律，这可能会产生全国性的影响，就像加利福尼亚关于环境等事物的法律经常设定先例一样。我喜欢来自White &
    Case律师事务所的这篇（不完整）评论[这个（不完整）评论](https://www.whitecase.com/insight-alert/raft-california-ai-legislation-adds-growing-patchwork-us-regulation)。
- en: For international comparisons on privacy, I like DLA Piper’s website [Data Protection
    Laws of the World](https://www.dlapiperdataprotection.com/).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 对于隐私的国际比较，我喜欢DLA Piper的网站[世界数据保护法](https://www.dlapiperdataprotection.com/)。
- en: What’s Important?
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么很重要？
- en: 'My class will focus on two things:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我的课程将关注两个方面：
- en: How we should evaluate new legislation
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们应该如何评估新的立法
- en: How legislation fits into the larger context of AI governance
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 立法如何融入人工智能治理的更大背景
- en: '**How do you evaluate new legislation?**'
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**如何评估新的立法？**'
- en: Given the pace of change, the most useful thing I thought I could give my class
    is a set of heuristics for evaluating new governance structures.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到变化的步伐，我认为我能给我的班级提供的最有用的一套东西是一套评估新治理结构的启发式方法。
- en: '**Pay attention to the definitions.** Each of the new legal acts faced problems
    with defining exactly what would be covered; some definitions are probably too
    narrow (easily bypassed with small changes to the approach), some too broad (inviting
    abuse) and some may be dated quickly.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意定义。** 每项新的法律都面临着定义确切涵盖内容的难题；有些定义可能过于狭窄（通过改变方法的小幅调整就能轻易规避），有些过于宽泛（容易引起滥用），还有些可能很快就会过时。'
- en: California had to solve some difficult definitional problems in order to try
    to regulate things like ‘Addictive Media’ (see [SB-976](https://leginfo.legislature.ca.gov/faces/billTextClient.xhtml?bill_id=202320240SB976#:~:text=(b)%20(1)%20%E2%80%9C,provides%20users%20with%20an%20addictive)),
    ‘AI Generated Media’ (see [AB-1836](https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240AB1836)),
    and to write separate legislation for ‘Generative AI’, (see [SB-896](https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB896)).
    Each of these has some potentially problematic aspects, worthy of class discussion.
    As one example, The Digital Replicas Act defines AI-generated media as "*an engineered
    or machine-based system that varies in its level of autonomy and that can, for
    explicit or implicit objectives, infer from the input it receives how to generate
    outputs that can influence physical or virtual environments.*" There’s a lot of
    room for interpretation here.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 加利福尼亚必须解决一些定义上的难题，以试图规范诸如“成瘾性媒体”（见[SB-976](https://leginfo.legislature.ca.gov/faces/billTextClient.xhtml?bill_id=202320240SB976#:~:text=(b)%20(1)%20%E2%80%9C,provides%20users%20with%20an%20addictive))、“人工智能生成媒体”（见[AB-1836](https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240AB1836)）以及为“生成式人工智能”制定单独的法律（见[SB-896](https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB896)）。这些都有一些可能存在问题的方面，值得课堂讨论。例如，数字复制品法案将人工智能生成媒体定义为“一种工程或基于机器的系统，其自主程度不同，并且可以，为了明确或隐含的目标，从其接收的输入中推断出如何生成可以影响物理或虚拟环境的输出。”这里有很多解释的空间。
- en: '**Who is covered and what are the penalties?** Are the penalties financial
    or criminal? Are there exceptions for law enforcement or government use? How does
    it apply across international lines? Does it have a tiered system based on an
    organization’s size? On the last point, technology regulation often tries to protect
    startups and small companies with thresholds or tiers for compliance. But California’s
    governor vetoed SB 1047 on AI safety for exempting small companies, arguing that
    "Smaller, specialized models may emerge as equally or even more dangerous". Was
    this a wise move, or was he just protecting California’s tech giants?'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**谁会受到处罚以及处罚是什么？** 是财务处罚还是刑事处罚？是否存在执法或政府使用的例外？它是如何跨越国际边界的？它是否有基于组织规模的分层体系？关于最后一点，技术监管通常试图通过合规的阈值或分层来保护初创公司和中小企业。但加利福尼亚州州长否决了SB
    1047号关于人工智能安全的法案，以豁免小型公司，理由是“小型、专业化的模型可能变得同样危险，甚至更危险”。这是一个明智的决定，还是他只是在保护加利福尼亚的技术巨头？'
- en: '**Is it enforceable, flexible, and ‘future-proof’?** Technology legislation
    is very difficult to get right because technology is a fast-moving target. If
    it is too specific it risks quickly becoming obsolete, or worse, hindering innovations.
    But the more general or vague it is, the less enforceable it may be, or more easily
    ‘gamed’. One strategy is to require companies to define their own risks and solutions,
    which provides flexibility, but will only work if the legislature, the courts
    and the public later pay attention to what companies actually do. This is a gamble
    on a well-functioning judiciary and an engaged, empowered citizenry… but democracy
    always is.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**它是否可执行、灵活，并且‘面向未来’？** 技术立法非常难以正确实施，因为技术是一个快速移动的目标。如果它过于具体，可能会很快过时，或者更糟，阻碍创新。但是，如果它更普遍或含糊，可能更难以执行，或者更容易被“操纵”。一种策略是要求公司定义自己的风险和解决方案，这提供了灵活性，但只有在立法机构、法院和公众后来关注公司实际做什么时才能奏效。这是对一个高效运作的司法系统和积极参与、赋权的公民社会的赌注……但民主总是如此。'
- en: How does legislation fit into the bigger picture of AI governance?
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 立法如何融入人工智能治理的更大图景中？
- en: 'Not every problem can or should be solved with legislation. AI governance is
    a multi-tiered system. It includes the proliferation of AI frameworks and independent
    AI guidance documents that go further than legislation should, and provide non-binding,
    sometimes idealistic goals. A few that I think are important:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个问题都可以或应该通过立法来解决。人工智能治理是一个多层次的体系。它包括人工智能框架的扩散和独立的人工智能指导文件，这些文件比立法更进一步，提供非约束性、有时甚至是理想化的目标。以下是我认为重要的几点：
- en: The NIST [AI Risk Management Framework](https://www.nist.gov/itl/ai-risk-management-framework).
    NIST has a good reputation, at least within the federal government, and this framework
    is being used as the foundation for a lot of other work.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NIST的[人工智能风险管理框架](https://www.nist.gov/itl/ai-risk-management-framework)。NIST在联邦政府内部享有良好的声誉，这个框架被用作许多其他工作的基础。
- en: The [Santa Clara Principles](https://santaclaraprinciples.org/), focused on
    content moderation, has some industry buy-in and specifically calls out [government
    regulators](https://santaclaraprinciples.org/regulators/) and [Mark Zuckerberg](https://santaclaraprinciples.org/open-letter/)
    for compliance.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[圣克拉拉原则](https://santaclaraprinciples.org/)，专注于内容审核，得到了一些行业的认可，并特别指出[政府监管者](https://santaclaraprinciples.org/regulators/)和[马克·扎克伯格](https://santaclaraprinciples.org/open-letter/)的合规性。'
- en: The [AI Moratorium](https://moratorium.ai/) addresses the longer-term, existential
    safety risks. ‘[An Overview of AI Catastrophic Risk](https://arxiv.org/abs/2306.12001)‘
    is a good follow-up.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[人工智能暂停令](https://moratorium.ai/)针对的是长期、存在性的安全风险。“[人工智能灾难性风险概述](https://arxiv.org/abs/2306.12001)”是一个很好的后续阅读材料。'
- en: Professional societies have been active also; IEEE is very involved in publishing
    standards and has one for [Ethically Aligned Design](https://standards.ieee.org/wp-content/uploads/import/documents/other/ead_v2.pdf),
    ACM has a professional [Code of Ethics](https://www.acm.org/code-of-ethics).
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专业协会也一直很活跃；IEEE 在发布标准方面非常积极，并有一个关于[道德一致设计](https://standards.ieee.org/wp-content/uploads/import/documents/other/ead_v2.pdf)的标准，ACM
    有一个专业的[道德规范](https://www.acm.org/code-of-ethics)。
- en: '[Microsoft Responsible AI Standards](https://blogs.microsoft.com/wp-content/uploads/prod/sites/5/2022/06/Microsoft-Responsible-AI-Standard-v2-General-Requirements-3.pdf)
    is a good example of a corporate AI document with specific requirements, tools
    and practices.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[微软负责任的人工智能标准](https://blogs.microsoft.com/wp-content/uploads/prod/sites/5/2022/06/Microsoft-Responsible-AI-Standard-v2-General-Requirements-3.pdf)是公司人工智能文档具有具体要求、工具和实践的良例。'
- en: Here’s a partial list of [many other frameworks](https://www.aiethicist.org/frameworks-guidelines-toolkits)
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这是一份[许多其他框架](https://www.aiethicist.org/frameworks-guidelines-toolkits)的部分列表。
- en: Other miscellaneous topics
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他杂项主题
- en: 'Here’s some other news items and topics I am integrating into my class, some
    of which are new to 2024 and some are not. I will:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一些我正在整合到我的课程中的其他新闻项目和主题，其中一些是2024年新出现的，而另一些则不是。我将：
- en: Include a summary of the 2024 bestseller [The Anxious Generation](https://www.anxiousgeneration.com/book),
    an important synthesis of harms related to social media, smartphones, and associated
    lifestyle changes. I’m a big fan of Jonathan Haidt’s work.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包括2024年畅销书[《焦虑的一代》](https://www.anxiousgeneration.com/book)的摘要，这是一本关于社交媒体、智能手机和相关生活方式变化相关危害的重要综合著作。我是乔纳森·海伊特工作的忠实粉丝。
- en: Note whether a verdict on the [NY Times/ OpenAI case](https://hls.harvard.edu/today/does-chatgpt-violate-new-york-times-copyrights/)
    comes out during the semester.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意在学期内是否会有关于[NY Times/OpenAI案件](https://hls.harvard.edu/today/does-chatgpt-violate-new-york-times-copyrights/)的裁决。
- en: Mention the cautionary tale of the [OnStar/ Lexus-Nexus privacy violation](https://www.nytimes.com/2024/03/11/technology/carmakers-driver-tracking-insurance.html)
    in the module on privacy.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在隐私模块中提及[OnStar/Lexus-Nexus隐私侵犯](https://www.nytimes.com/2024/03/11/technology/carmakers-driver-tracking-insurance.html)的警示故事。
- en: Work in the issues of AI’s [increasing power demands](https://e360.yale.edu/features/artificial-intelligence-climate-energy-emissions),
    and the questionable labor practices related to [AI content moderators](https://www.theguardian.com/technology/article/2024/jul/06/mercy-anita-african-workers-ai-artificial-intelligence-exploitation-feeding-machine)
    and data labelers.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探讨人工智能[日益增长的需求](https://e360.yale.edu/features/artificial-intelligence-climate-energy-emissions)以及与[人工智能内容审核员](https://www.theguardian.com/technology/article/2024/jul/06/mercy-anita-african-workers-ai-artificial-intelligence-exploitation-feeding-machine)和数据标注员相关的可疑劳动实践问题。
- en: 'Give an assignment on the dangers of synthetic biology, starting with ‘[The
    New Bioweapons](https://www.rand.org/pubs/external_publications/EP70594.html)‘
    article from RAND and a (paywalled) article from a Chinese research team, ‘Challenges
    and recent progress in the governance of biosecurity risks in the era of synthetic
    biology’, (DOI: [10.1016/j.jobb.2022.02.002](http://dx.doi.org/10.1016/j.jobb.2022.02.002)).
    Students can go deeper with a ‘[Special Issue on Artificial Intelligence for Synthetic
    Biology](https://doi.org/10.1021/acssynbio.3c00760)‘.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分配一个关于合成生物学危险的作业，从RAND的“[新生物武器](https://www.rand.org/pubs/external_publications/EP70594.html)”文章和一个（付费墙）来自中国研究团队的文章“合成生物学时代生物安全风险治理的挑战和最新进展”（DOI：[10.1016/j.jobb.2022.02.002](http://dx.doi.org/10.1016/j.jobb.2022.02.002)）开始。学生可以通过“[合成生物学人工智能特刊](https://doi.org/10.1021/acssynbio.3c00760)”进行更深入的学习。
- en: Include more on LLM-aided misinformation, with good starter articles ‘[Combatting
    Misinformation in the age of LLMs](https://onlinelibrary.wiley.com/doi/10.1002/aaai.12188)‘
    and ‘[A Survey on the use of Large Language Models (LLMs) in Fake News](https://www.mdpi.com/1999-5903/16/8/298)‘.
    Go deeper with ‘[A meta-analysis of correction effects in science-relevant misinformation](https://doi.org/10.1038/s41562-023-01623-8).’
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包括更多关于LLM辅助虚假信息的材料，以及优秀的入门文章“[在LLM时代对抗虚假信息](https://onlinelibrary.wiley.com/doi/10.1002/aaai.12188)”和“[关于在假新闻中使用大型语言模型（LLMs）的调查](https://www.mdpi.com/1999-5903/16/8/298)”。通过“[科学相关虚假信息校正效果的元分析](https://doi.org/10.1038/s41562-023-01623-8)”进行深入探讨。
- en: Add material on the [Content Authenticity Initiative](https://contentauthenticity.org/how-it-works)
    and related [C2PA](https://c2pa.org/).
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加关于[内容真实性倡议](https://contentauthenticity.org/how-it-works)和相关[C2PA](https://c2pa.org/)的材料。
- en: Compare student predictions to the aggregate opinions of ‘[Thousands of AI Authors
    on the Future of AI](https://arxiv.org/abs/2401.02843)‘, an update on forecasting
    work that I use every year. If anyone else has a class of students and wants to
    compare predictions I can send a Qualtrics link.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将学生预测与“[数千名AI作者关于AI未来的看法](https://arxiv.org/abs/2401.02843)”的汇总意见进行比较，这是我对每年预测工作的更新。如果其他人有学生班级并想比较预测，我可以发送一个Qualtrics链接。
- en: Thanks for reading! I always appreciate making contact with other people teaching
    similar courses or with deep knowledge of related areas. And I also always appreciate
    Claps and Comments!
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！我总是很欣赏与其他教授类似课程或对相关领域有深入了解的人联系。我也总是很欣赏点赞和评论！
