- en: On Adding a Start Value to a Waterfall Chart in Power BI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在Power BI中添加瀑布图的起始值
- en: 原文：[https://towardsdatascience.com/on-adding-a-start-value-to-a-waterfall-chart-in-power-bi/](https://towardsdatascience.com/on-adding-a-start-value-to-a-waterfall-chart-in-power-bi/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/on-adding-a-start-value-to-a-waterfall-chart-in-power-bi/](https://towardsdatascience.com/on-adding-a-start-value-to-a-waterfall-chart-in-power-bi/)
- en: '![](../Images/e2109530475d154b79b9189bf26e781b.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e2109530475d154b79b9189bf26e781b.png)'
- en: Photo by [Jeffrey Workman](https://unsplash.com/@jeffreyp?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/long-exposure-photo-of-lake-with-waterfall-at-daytime-YvkH8R1zoQM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由 [Jeffrey Workman](https://unsplash.com/@jeffreyp?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/long-exposure-photo-of-lake-with-waterfall-at-daytime-YvkH8R1zoQM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    拍摄的照片
- en: <mdspan datatext="el1754326196090" class="mdspan-comment">Introduction</mdspan>
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754326196090" class="mdspan-comment">引言</mdspan>
- en: 'First, let’s define the scope of the challenge: Imagine that we want to track
    the growth in your customer base over time.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们定义挑战的范围：想象一下，我们想要跟踪客户群随时间的变化。
- en: We create a measure to count customers based on their first order, identifying
    new customers for each month.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了一个度量值来根据客户的首次订单计数客户，以识别每个月的新客户。
- en: 'But now, we want to create a visualization of this measure with a waterfall
    visual, and we get something like this:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在，我们想要使用瀑布视觉效果创建这个度量值的可视化，我们得到的结果如下：
- en: '![](../Images/efd99b8d23c02d13b1b980bf8683ec55.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/efd99b8d23c02d13b1b980bf8683ec55.png)'
- en: Figure 1 – Initial Waterfall chart in Excel (Figure by the Author)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – Excel中的初始瀑布图（图由作者提供）
- en: But we need something more.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们需要更多。
- en: We need the initial value, which is the customer count as of the end of the
    previous year, and then add the number of new customers for each month to the
    total number of customers by the end of the reporting period.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要初始值，即截至上年末的客户数量，然后为每个月的新客户数量加到报告期末的客户总数中。
- en: 'Something like this:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 大概是这样的：
- en: '![](../Images/46842be18aafd4fdc22ae05e6c3dedc8.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/46842be18aafd4fdc22ae05e6c3dedc8.png)'
- en: Figure 2 – Second example in Excel with the Initial Total, be End of 2024, and
    the total be August 2025 (Figure by the Author)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – Excel中的第二个示例，包括初始总数、2024年末和2025年8月的总数（图由作者提供）
- en: Unfortunately, we are unable to set one column as the start total in Power BI.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们无法在Power BI中将一列设置为起始总数。
- en: 'Therefore, when adding the measure to a waterfall visual in Power BI, the result
    is similar to the one in the first example in Excel:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当将度量值添加到Power BI的瀑布视觉效果中时，结果类似于Excel中的第一个示例：
- en: '![](../Images/d2408caefc2c0caf3460dd3fbffea9d0.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d2408caefc2c0caf3460dd3fbffea9d0.png)'
- en: Figure 3 – The initial approach in Power BI. Notice that Power BI automatically
    calculates the total in the Waterfall (Figure by the Author)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – Power BI中的初始方法。注意Power BI自动计算瀑布中的总数（图由作者提供）
- en: 'Even when using a commercial custom visual like Zebra BI, the result isn’t
    as needed:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 即使使用像Zebra BI这样的商业自定义视觉，结果也不是我们需要的：
- en: '![](../Images/fe19647eb4d7d060d9e7924442244993.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fe19647eb4d7d060d9e7924442244993.png)'
- en: Figure 4 – Example with a Zebra BI Visual (Figure by the Author)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 使用Zebra BI视觉效果的示例（图由作者提供）
- en: In this case, I added the previous year’s measure to set the start value. However,
    the visual calculates the deviation from the PY for each month and displays the
    Total based on these deviations.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我添加了上年的度量值来设置起始值。然而，视觉效果计算了与上年的偏差，并基于这些偏差显示总数。
- en: The result 141 for the previous year is calculated because Zebra BI detects
    that there are only 7 months of data for the current year, and it calculates the
    sum in the prior year only for those 7 months.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 上年的结果141是由于Zebra BI检测到当前年份只有7个月的数据，并且只为那7个月计算了上年的总和。
- en: In this specific case, it’s not what we need, as we are not interested in the
    deviation from the previous year, but rather in the growth starting at the end
    of the last year.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定情况下，这并不是我们需要的，因为我们不感兴趣的是与上年的偏差，而是从去年年末开始的增长。
- en: Although this custom visual is extremely powerful, it isn’t helpful in our case.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这个自定义视觉非常强大，但在我们的情况下并没有帮助。
- en: Expand the data model
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展数据模型
- en: What we need now is a method not only to calculate, but to show the last month
    of the previous year when selecting a year, for example, 2025.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在需要的方法不仅能够计算，而且能够在选择年份，例如2025年时，显示上一年的最后一个月。
- en: I have already solved this problem by adding a second date table and writing
    the corresponding measure.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经通过添加第二个日期表并编写相应的度量解决了这个问题。
- en: You can find the full description of this solution and an explanation of how
    it works in the References section below.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在下面的参考资料部分找到这个解决方案的完整描述以及其工作原理的解释。
- en: 'The modified data model looks like this:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 修改后的数据模型看起来是这样的：
- en: '![](../Images/b5e37c9c120d2bea019668c43b8394f1.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b5e37c9c120d2bea019668c43b8394f1.png)'
- en: Figure 5 – Modified data model with the new Reporting date table in the middle
    (Figure by the Author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 带有中间新报告日期表的修改后的数据模型（作者提供的图）
- en: This new date table enables us to work with the item selected in the “Selection
    Date” table and perform calculations with the date table.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这个新的日期表使我们能够使用在“选择日期”表中选择的项，并使用日期表进行计算。
- en: To support this, I set both tables as “Date table”. I can still use the “Date”
    table as usual without restrictions.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 为了支持这一点，我将两个表都设置为“日期表”。我仍然可以像往常一样无限制地使用“日期”表。
- en: Developing the Measure(s)
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发度量
- en: The next step is writing the measures.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是编写度量。
- en: First, I must calculate the start value, which is the number of customers by
    the end of the (previous) year.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我必须计算起始值，即（上一）年末的客户数量。
- en: 'To achieve this goal, I must calculate the sum of all rows for the previous
    year, but for all months:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这个目标，我必须计算前一年所有行的总和，但对于所有月份：
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The result is 280 for 2024.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是2024年的280。
- en: You might wonder why I calculate the sum over the selected year instead of over
    the previous year.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想知道为什么我计算所选年份的总和而不是前一年的总和。
- en: The reason is that we want to show the result of this measure for December 2024
    (When 2025 is selected). Please wait a moment until you see the results. These
    will help you understand it.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 原因是我们想显示这个度量在2024年12月（当选择2025年时）的结果。请稍等，直到你看到结果。这些将帮助你理解它。
- en: Now, we must develop a measure that returns the correct values depending on
    the month on the X-axis.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们必须开发一个度量，它根据X轴上的月份返回正确的值。
- en: This should be the year-end value of the previous year for December 2024, or
    the count of new customers for each month of the current (selected) year. See
    the previous measure.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这应该是2024年12月的上一年的年末值，或者当前（所选）每年每月的新客户数量。参见前面的度量。
- en: 'The measure we need must perform the following steps:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要的度量必须执行以下步骤：
- en: Get the selected year from the date table.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从日期表中获取所选年份。
- en: Calculate the first and last months to display in the report.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算报告中要显示的第一个和最后一个月。
- en: Calculate the result by removing the filter from the date table used in the
    Slicer (The table “Selection Date”).
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过从用于筛选器的日期表中移除过滤器来计算结果（“选择日期”表）。
- en: Decide which result must be displayed for which month.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决定哪些结果需要显示在哪些月份。
- en: The last step is crucial.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步至关重要。
- en: As we remove the filter for the selected year from both the Date tables, we
    must control whether a result should be shown for each month. You will find this
    step in the [SWITCH()](https://dax.guide/switch/) part of the measure below.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们从两个日期表中移除所选年份的过滤器时，我们必须控制是否应该为每个月显示一个结果。你将在下面的度量中的[SWITCH()](https://dax.guide/switch/)部分找到这个步骤。
- en: 'This is the full measure:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这是完整的度量：
- en: '[PRE1]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'This is the result:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这是结果：
- en: '![](../Images/401b9b3894657d00ee0d2b432ce347c6.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/401b9b3894657d00ee0d2b432ce347c6.png)'
- en: Figure 6 – Final result with the starting value by the end of the previous year
    (Figure by the Author)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 以上一年的年末起始值显示的最终结果（作者提供的图）
- en: Above the waterfall chart, you can see the numbers returned by the Measure.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在瀑布图上方，你可以看到度量返回的数字。
- en: As mentioned above, the year slicer in the top left corner doesn’t use the year
    column from the “Date” table, but from the “Selection Date” table. This is vital.
    The solution will not work when using the year column from the “Date” table.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，左上角的年份筛选器不使用“日期”表中的年份列，而是使用“选择日期”表中的年份列。这是至关重要的。当使用“日期”表中的年份列时，解决方案将无法工作。
- en: Conclusion
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The waterfall visual is excellent for showing the change in values from one
    element to another. An Element can be a month or something different. For example,
    you can find another article in the References section below, where I demonstrate
    how to modify a data model to display a business process with a waterfall visual
    in Power BI.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 瀑布图视觉效果非常适合展示从一个元素到另一个元素的价值变化。一个元素可以是一个月或其它不同的东西。例如，您可以在下面的参考文献部分找到另一篇文章，其中我展示了如何在Power
    BI中通过瀑布图视觉展示业务流程的数据模型修改方法。
- en: The solution shown here is a typical example of where I reused a previously
    developed approach to address a new challenge.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示的解决方案是一个典型的例子，说明我如何重用之前开发的方法来解决新的挑战。
- en: The beauty of this approach is that it allows me to continue using all Measures
    using the “regular” Date table without restriction and use the “Selection Date”
    table to add more functionality to the Report.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的优点在于，它允许我继续无限制地使用所有度量值，使用“常规”日期表，并且使用“选择日期”表为报告添加更多功能。
- en: In this case, I added a feature to the waterfall chart that was previously unavailable.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我为瀑布图添加了一个之前不可用的功能。
- en: I will not say that you always need two Date tables. Only add them when required.
    It makes no sense to add tables to a data model only for the sake of having them.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会说你需要总是有两个日期表。只有在你需要的时候才添加它们。仅仅为了拥有它们而添加表到数据模型中是没有意义的。
- en: References
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'Here is my piece, where I show how I expanded my data model to be able to show
    more dates than selected:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我的作品，展示了我是如何扩展我的数据模型以展示比所选日期更多的日期：
- en: '[How to show more dates than selected in DAX](https://towardsdatascience.com/how-to-show-more-dates-than-selected-in-dax-bda0c4140121/)'
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何在DAX中展示比所选日期更多的日期](https://towardsdatascience.com/how-to-show-more-dates-than-selected-in-dax-bda0c4140121/)'
- en: 'Here, my piece where I explain how to change the data to show a business process
    with a waterfall chart:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我解释了如何通过瀑布图来展示业务流程的数据转换方法：
- en: '[Visualize a business process through data serialization](https://towardsdatascience.com/visualize-a-business-process-through-data-serialization-772cd9510c31/)'
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[通过数据序列化可视化业务流程](https://towardsdatascience.com/visualize-a-business-process-through-data-serialization-772cd9510c31/)'
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在我之前的文章中一样，我使用了Contoso样本数据集。您可以从微软[这里](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载ContosoRetailDW数据集。
- en: The Contoso Data can be freely used under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 根据描述[在此文档](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)中的MIT许可证，Contoso数据可以自由使用。我将数据集更改以将数据转移到当代日期。
