- en: About the Authors
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于作者
- en: '**Vrushali Channapattan** is the Director of Engineering at Okta, where she
    leads Data and AI initiatives with a strong focus on Responsible AI. With over
    20 years of experience, she has shaped large-scale data systems and contributed
    to open source as a Committer for Apache Hadoop. Before Okta, she spent nearly
    a decade at Twitter, helping drive its growth from startup to public company.
    Vrushali earned a Master’s in Computer Systems Engineering from Northeastern University
    and has presented at global conferences. She is a patent holder in AI, identity,
    and distributed systems, and a published author in IEEE journals and industry
    blogs.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**Vrushali Channapattan** 是Okta的工程总监，在那里她领导数据与AI项目，重点放在负责任的AI上。拥有超过20年的经验，她塑造了大规模数据系统，并作为Apache
    Hadoop的Committer为开源项目做出了贡献。在Okta之前，她在Twitter工作了近十年，帮助推动其从初创公司发展到上市公司。Vrushali在东北大学获得了计算机系统工程硕士学位，并在全球会议上发表过演讲。她是AI、身份和分布式系统的专利持有者，并在IEEE期刊和行业博客上发表了作品。'
- en: '**Anusha Dwivedula** is the Director of Product for the Analytics group at
    Morningstar. She led the design and rollout of Morningstar’s centralized data
    platform, which unified pipelines, analytics, and observability across the enterprise
    to support AI readiness at scale. Her work bridges cloud infrastructure, data
    governance, and AI product development in high-stakes, regulated environments.
    Anusha has extensive experience leading global teams and complex modernization
    initiatives, focusing on building trusted, explainable, and scalable data systems.
    She is a frequent speaker on topics such as responsible AI, data quality, and
    observability, and has presented at more than 15 high-impact conferences. She
    is also an AI 2030 Global Fellow, participating in high-impact initiatives, co-creating
    global AI frameworks, and championing the adoption of ethical AI in industry and
    policy. Learn more at [https://anushadwivedula.com/](https://anushadwivedula.com/).'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**Anusha Dwivedula** 是Morningstar分析小组的产品总监。她领导了Morningstar集中数据平台的设计和推广，该平台统一了企业内的管道、分析和可观察性，以支持大规模的AI准备。她的工作在风险高、受监管的环境中连接了云基础设施、数据治理和AI产品开发。Anusha拥有丰富的领导全球团队和复杂的现代化项目经验，专注于构建可信、可解释和可扩展的数据系统。她经常在责任AI、数据质量和可观察性等主题上发表演讲，并在超过15个具有重大影响力的会议上发表过演讲。她还是AI
    2030全球研究员，参与具有重大影响的项目，共同创建全球AI框架，并在行业和政策中推广道德AI的采用。更多信息请访问[https://anushadwivedula.com/](https://anushadwivedula.com/)。'
