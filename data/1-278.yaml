- en: Deploying AI Safely and Responsibly
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 安全和负责任地部署人工智能
- en: 原文：[https://towardsdatascience.com/deploying-ai-safely-and-responsibly/](https://towardsdatascience.com/deploying-ai-safely-and-responsibly/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/deploying-ai-safely-and-responsibly/](https://towardsdatascience.com/deploying-ai-safely-and-responsibly/)
- en: <mdspan datatext="el1758065185759" class="mdspan-comment">It’s become a truism</mdspan>
    that “AI must be trustworthy before we can use it in production.” However, in
    practice, when we develop and deploy AI-based solutions in industry, trust is
    often treated as a buzzword. High accuracy gets celebrated, flashy demos win headlines,
    and governance is seen as an afterthought. That is, until AI mishaps bring on
    bad PR or lawsuits cost the company millions. Smart business leaders look ahead
    and take AI safety, security, and trust seriously before problems show up.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758065185759" class="mdspan-comment">“在我们将人工智能用于生产之前，人工智能必须是可靠的。”这已经成为一个真理。</mdspan>然而，在实践中，当我们开发和部署基于人工智能的行业解决方案时，可靠性往往被视为一个时髦词汇。高准确性受到赞扬，炫目的演示赢得头条，治理被视为事后之想。也就是说，直到人工智能的失误带来了负面公关或诉讼使公司损失数百万。聪明的商业领袖会提前考虑，在问题出现之前，认真对待人工智能的安全、安全和可靠性。
- en: 'At the IEEE panel [*Beyond Accuracy: Engineering Trustworthy AI in Production*](https://conf.researchr.org/track/cisose-2025/ai-test2025#Panel),
    five experienced practitioners in all the stages of the AI development life cycle
    shared their lessons from the field about how to make AI trustworthy while also
    deploying valuable solutions that move business metrics. In this article, four
    of the expert panelists each tackle one common myth about AI trust and explain
    what you need to know to make your AI projects a trustworthy, safe success.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在IEEE研讨会[*超越准确性：在生产中构建可靠的人工智能*](https://conf.researchr.org/track/cisose-2025/ai-test2025#Panel)上，五位在人工智能开发生命周期各个阶段的资深从业者分享了他们在现场的经验教训，关于如何使人工智能可靠，同时部署有价值的解决方案，推动业务指标。在这篇文章中，四位专家小组成员各自解决了一个关于人工智能可靠性的常见误区，并解释了你需要了解的内容，以确保你的人工智能项目成为一个可靠、安全的成功。
- en: 'Myth 1: “If the model is accurate, it’s trustworthy.”'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 误区1：“如果模型准确，它就是可靠的。”
- en: '*By Anusha Dwivedula, Director of Product, Analytics Morningstar and AI 2030
    Global Fellow*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '*作者：Anusha Dwivedula，产品总监，晨星分析公司，AI 2030全球研究员*'
- en: “Accuracy is just the middle layer; without solid foundations and transparency,
    trust collapses.”
  id: totrans-6
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “准确性只是中间层；没有坚实的基础和透明度，可靠性就会崩溃。”
- en: Would you trust stepping into a beautiful skyscraper elevator that promises
    100% accuracy, always getting you to the top floor every time, but whose safety
    standards were opaque, and the certification sticker was years out of date? Accuracy
    is a non-negotiable, but it alone doesn’t guarantee safety, and more importantly,
    trustworthiness.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 你会信任走进一个承诺100%准确性的美丽摩天大楼电梯吗？它每次都能把你带到顶层，但其安全标准却模糊不清，认证标签已经过期多年。准确性是不可或缺的，但它本身并不能保证安全，更重要的是，可靠性。
- en: We see the same with AI systems. Credit scoring algorithms delivered high predictive
    accuracy while reinforcing systemic bias. Recommendation engines optimized engagement
    but lacked resilience checks, amplifying misinformation. Accuracy looked impressive,
    but trust collapsed.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在人工智能系统中也看到了相同的情况。信用评分算法提供了高预测准确性，同时强化了系统性偏见。推荐引擎优化了参与度，但缺乏弹性检查，放大了错误信息。准确性看起来令人印象深刻，但可靠性崩溃了。
- en: 'That’s why accuracy is only one layer in what I call the Trust Sandwich Framework,
    which is built on ideas I explored in an [IEEE paper on multi-layer quality control](https://ieeexplore.ieee.org/document/11127259).
    The following layers ensure trust is built into every aspect of your AI model:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，准确性只是我所说的“信任三明治框架”中的一层，这个框架建立在我在一篇[IEEE关于多层质量控制论文](https://ieeexplore.ieee.org/document/11127259)中探讨的想法之上。以下各层确保信任融入你人工智能模型的每个方面：
- en: '**Foundation: scalable data processing** – Just as elevators require strong
    cables and pulleys to carry weight safely, AI systems rely on scalable, reliable
    data pipelines. Metrics like completeness (coverage of key attributes), timeliness
    (data freshness), and processing reliability (failure rates, throughput) ensure
    the infrastructure can sustain trust at scale.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础：可扩展的数据处理** – 正如电梯需要坚固的电缆和滑轮来安全地承载重量一样，人工智能系统依赖于可扩展、可靠的数据管道。如完整性（关键属性的覆盖范围）、时效性（数据新鲜度）和处理可靠性（故障率、吞吐量）等指标确保基础设施能够在大规模上维持信任。'
- en: '**Middle: AI logic + performance metrics** – Accuracy belongs here, but it
    must be complemented with fairness (e.g., disparate impact ratio), robustness
    (sensitivity to adversarial changes), and resilience (mean time-to-recovery from
    pipeline failures).'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**中间：AI逻辑 + 性能指标** – 准确性属于这里，但它必须与公平性（例如，不同影响比率）、鲁棒性（对对抗性变化的敏感性）和弹性（从管道故障中恢复的平均时间）相补充。'
- en: '**Top: explainability + transparency** – The posted inspection certificate
    is what convinces people to ride. Similarly, interpretability metrics, such as
    the percentage of predictions explained using SHAP or LIME, make AI outputs more
    understandable and credible to users. Trust deepens further when humans are kept
    in the loop: validating model outputs and feeding their feedback back into the
    middle layer, strengthening performance and resilience over time.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**顶部：可解释性 + 透明度** – 发布的检查证书是说服人们乘坐的原因。同样，可解释性指标，如使用SHAP或LIME解释的预测百分比，使AI输出对用户更加可理解和可信。当人类参与其中：验证模型输出并将他们的反馈反馈到中间层时，信任会进一步加深，随着时间的推移，性能和弹性得到加强。'
- en: In a separate [IEEE publication, Data Trust Score](https://ieeexplore.ieee.org/abstract/document/11050490),
    I formalized this thinking into a composite measure that integrates accuracy,
    timeliness, fairness, transparency, and resilience. A model may achieve 92% accuracy,
    but if its timeliness is only 65% and fairness is 70%, the trust score reveals
    the fuller story.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在一篇独立的[IEEE出版物，数据信任分数](https://ieeexplore.ieee.org/abstract/document/11050490)中，我将这种思考形式化为一个综合度量，它整合了准确性、及时性、公平性、透明度和弹性。一个模型可能达到92%的准确性，但如果其及时性只有65%，公平性为70%，信任分数揭示了更全面的故事。
- en: Accuracy can remain steady while input distributions drift. Drift metrics, such
    as population stability indices, KL divergence, or shifts in confidence intervals,
    serve as early warnings, much like sensors that detect wear and tear of elevator
    cables before a failure occurs.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性可以在输入分布漂移的情况下保持稳定。漂移指标，如人口稳定性指数、KL散度或置信区间的变化，充当早期预警信号，就像在发生故障之前检测到电梯电缆磨损和损坏的传感器一样。
- en: '**Key Takeaway:** Trust is a design choice that must be integrated into all
    components of your AI system. By measuring trust metrics and making them transparent
    to end-users, trustworthiness improves the adoption of AI systems. The frameworks
    and metrics mentioned above give you practical ways to achieve the layered trust
    architecture.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键要点**：信任是一种设计选择，必须集成到AI系统的所有组件中。通过测量信任指标并将它们透明化给最终用户，可信度提高了AI系统的采用率。上述框架和指标为您提供了实现分层信任架构的实用方法。'
- en: 'Myth 2: “Observability is just a monitoring dashboard.”'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 误区2：“可观察性只是一个监控仪表盘。”
- en: '*By Shane Murray, SVP Digital Platform Analytics, Versant Media*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*作者：Shane Murray，Versant Media数字平台分析高级副总裁*'
- en: “Dashboards don’t prevent failures; connected visibility and response do.”
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “仪表盘不能防止故障；连接的可见性和响应才能做到。”
- en: It’s tempting to think of observability as little more than a monitoring dashboard
    — a few charts showing model accuracy, latency, or usage. But in production AI,
    especially with complex pipelines built on proprietary data, LLMs, and retrieval
    systems, this view is dangerously narrow.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 人们很容易将可观察性仅仅视为一个监控仪表盘——几个图表显示模型准确性、延迟或使用情况。但在生产AI中，尤其是在基于专有数据、大型语言模型和检索系统的复杂管道中，这种观点是危险地狭隘的。
- en: Real-world failure modes rarely reveal themselves neatly on a dashboard. A schema
    change upstream can silently corrupt a feature set. A pipeline delay might propagate
    stale information into a retrieval index, resulting in a misinformed chatbot.
    Model or prompt updates often cause unexpected shifts in agent behavior, resulting
    in degraded output quality overnight. Evaluations may look “healthy” in aggregate
    while still producing hallucinations in specific contexts. Meanwhile, dashboards
    continue to show green until customers notice the problem for the first time.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现实世界的故障模式很少在仪表盘上整洁地展现出来。上游的架构变更可能会无声地破坏特征集。管道延迟可能会将过时信息传播到检索索引中，导致聊天机器人信息不准确。模型或提示更新通常会导致代理行为出现意外的变化，导致一夜之间输出质量下降。评估可能从整体上看“健康”，但在特定情境下仍然会产生幻觉。同时，仪表盘继续显示绿色，直到客户第一次注意到问题。
- en: 'That’s why observability must extend across the entire system: data, systems,
    code, and models. Failures can originate in any of these layers, and without connected
    visibility, you risk chasing symptoms instead of identifying the root cause. In
    AI systems, sustaining trust is as much about ensuring the reliability of inputs
    and pipelines as it is about monitoring model performance.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，可观察性必须扩展到整个系统：数据、系统、代码和模型。故障可能起源于这些层中的任何一层，如果没有连接的可见性，你可能会追逐症状而不是识别根本原因。在人工智能系统中，维持信任与确保输入和管道的可靠性一样重要，也关乎监控模型性能。
- en: 'Equally important, observability isn’t just about what you track but how you
    respond. The discipline looks a lot like site reliability engineering: detect,
    triage, resolve, and measure. Automated monitors and anomaly detection are vital
    for speed, but automation alone won’t save you. Operational practices — incident
    playbooks, human-in-the-loop triage, and on-call rotations — are the glue that
    turn detection into resolution. By measuring and learning from each incident,
    teams make the system more resilient, rather than repeating the same failures.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 同样重要的是，可观察性不仅仅是关于你追踪的内容，还关乎你的响应方式。这门学科与站点可靠性工程非常相似：检测、分类、解决和衡量。自动监控和异常检测对于速度至关重要，但仅仅自动化并不能救你。运营实践——事件剧本、人工介入的分类和值班轮换——是将检测转化为解决方案的粘合剂。通过衡量和学习每次事件，团队使系统更具弹性，而不是重复同样的失败。
- en: '**Key Takeaway**: Observability in AI is not about creating visually appealing
    charts; it’s about developing the organizational muscle to continuously detect,
    diagnose, and resolve failures across the entire data and AI stack. That combination
    of automation and disciplined operations is what ensures quality, reliability,
    and ultimately, trust.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键要点**：人工智能中的可观察性不仅仅是创建视觉上吸引人的图表；它关乎发展组织肌肉，以持续检测、诊断和解决整个数据与人工智能堆栈中的故障。这种自动化与纪律性操作的组合确保了质量、可靠性和最终的可信度。'
- en: 'Myth 3: “Governance slows down innovation”'
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 误区3：“治理会减缓创新”
- en: '*By Vrushali Channapattan, Director of Engineering, Data and AI*'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '*作者：Vrushali Channapattan，数据与AI工程总监*'
- en: “Safe playgrounds and paved paths make responsible AI adoption faster, not slower.”
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “安全的游乐场和铺就的道路使负责任的人工智能采用更快，而不是更慢。”
- en: Effective governance, often misunderstood as a brake on progress, in reality
    acts as a ramp towards faster innovation while ensuring that trust rides shotgun
    for responsible AI adoption.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的治理，常被误解为进步的刹车，但实际上它充当着通往更快创新的斜坡，同时确保信任成为负责任人工智能采用的护航者。
- en: '**Safe Experimentation Space:** Experimentation is the fuel for innovation.
    Effective governance strategies promote the creation of safe environments for
    exploring AI capabilities. For instance, creating structured experimentation zones,
    such as internal hackathons with dedicated AI sandboxes, builds confidence since
    necessary oversight can be maintained with controlled conditions.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**安全的实验空间**：实验是创新的燃料。有效的治理策略促进创建安全的实验环境，以探索人工智能能力。例如，创建结构化的实验区域，如专门的AI沙盒的内部黑客马拉松，可以建立信心，因为必要的监督可以在受控条件下维持。'
- en: '**Building Trust Through Paved Paths**: One of the most effective means of
    fostering responsible innovation is to enable pre-approved and standardized workflows,
    tools, and libraries. These ‘paved paths’ are vetted by governance teams and have
    privacy, security, and compliance guardrails baked in. This approach enables teams
    to focus on building innovative capabilities rather than struggling with security
    and compliance ambiguity and friction.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过铺就的道路建立信任**：促进负责任创新的最有效方式之一是启用预先批准和标准化的工作流程、工具和库。这些“铺就的道路”经过治理团队的审查，并内置了隐私、安全和合规的护栏。这种方法使团队能够专注于构建创新能力，而不是与安全和合规的模糊性和摩擦作斗争。'
- en: '**Encouraging Transparency and Alignment:** Transparency is crucial for building
    trust, and effective communication is foundational to achieving it. Bringing together
    stakeholders from legal, security, privacy, human rights, sustainability, product,
    and engineering, early and often, to align on internal guidance on responsible
    AI adoption, nurtures understanding of not just the “what” but the “why” behind
    the constraint. AI risk needs to be addressed as seriously as data privacy or
    cloud security. Generative AI technologies in particular introduce new attack
    surfaces and channels for misuse, and active risk perception and its mitigation
    are thus imperative, as discussed in the IEEE paper on [AI, Cybercrime & Society:
    Closing the Gap between threats and defenses](https://ieeexplore.ieee.org/document/11050699).'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**鼓励透明度和一致性：**透明度对于建立信任至关重要，而有效的沟通是实现这一目标的基础。将法律、安全、隐私、人权、可持续性、产品和工程等利益相关者早期且经常性地聚集在一起，就负责任的AI采用的内部分析达成一致，有助于理解约束背后的“是什么”和“为什么”。AI风险需要像数据隐私或云安全一样被严肃对待。特别是生成式AI技术引入了新的攻击面和滥用渠道，因此，正如IEEE论文[AI、网络犯罪与社会：缩小威胁与防御之间的差距](https://ieeexplore.ieee.org/document/11050699)所讨论的，积极的风险评估及其缓解是必不可少的。'
- en: '**Key Takeaway:** Paved paths and consistent communication transform governance
    perception from a roadblock into a runway. They empower teams with vetted building
    blocks, enabling them to build faster and iteratively, while still adhering to
    governance considerations. This approach fosters innovation while reducing risk
    and friction, allowing a safe shift in focus from the question of “could we?”
    to the question of “should we?”'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键要点：**铺好的道路和持续的沟通将治理观念从障碍转变为跑道。它们赋予团队经过验证的构建模块，使他们能够更快地迭代构建，同时仍然遵守治理考虑因素。这种方法在降低风险和摩擦的同时促进创新，允许安全地将重点从“我们能否做到？”转移到“我们应该做到吗？”的问题上。'
- en: 'Myth 4: “Responsible AI is only about compliance.”'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 误区4：“负责任的AI只是关于合规。”
- en: '*By Stephanie Kirmer, Staff Machine Learning Engineer, DataGrail*'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '*作者：Stephanie Kirmer，DataGrail员工机器学习工程师*'
- en: “Ethical AI is everyone’s responsibility, not just the engineer’s.”
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “道德AI是每个人的责任，而不仅仅是工程师的责任。”
- en: Developing AI for production is challenging and exciting, as we work to solve
    business problems using complex machine learning strategies. However, turning
    a working solution into a responsible, ethical one takes more work.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 开发用于生产的AI具有挑战性和激动人心，因为我们正努力使用复杂的机器学习策略来解决商业问题。然而，将一个可行的解决方案转变为负责任和道德的解决方案需要更多的工作。
- en: Whether a technology can complete the task immediately in front of us is not
    the only consideration – this is true with AI or anything else. We are responsible
    for the externalities of what we do. This can include big, macro-level social
    impacts, but also organization-level impacts or individual-level ones. If we deploy
    a model that uses customer data without consent, or has the potential to unintentionally
    reveal PII, we create risk that can and does result in harm to individuals, legal
    and financial liability, and potential brand reputation destruction.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一项技术是否能够立即完成我们面前的工作并不是唯一的考虑因素——这一点对AI或任何其他事物都适用。我们对我们所做的事情的外部性负责。这可能包括宏观层面的重大社会影响，也可能包括组织层面的影响或个人层面的影响。如果我们部署了一个未经同意使用客户数据的模型，或者有可能无意中泄露PII，我们就会创造可能并确实导致个人伤害、法律和财务责任以及潜在的品牌声誉破坏的风险。
- en: We can get helpful guidance from legal and regulatory frameworks, such as GDPR,
    CCPA, and the EU AI Act, but we can’t rely on lawmakers to do all the thinking
    for us.  Legal frameworks can’t include every possible scenario where problems
    could arise, and often need to be interpreted and applied to technical realities.
    For example, models should not use protected characteristics to make decisions
    about people’s opportunities or access to resources. If you’ve been asked to build
    a model that evaluates data about consumers, you need to figure out how (or if!)
    you can construct that model so protected characteristics aren’t driving decisions.
    Perhaps you need to curate the input data, or you need to apply rigorous guardrails
    on output. You probably also need to inform the end users about this principle
    and educate them on how to spot discriminatory output, in case of an accident
    in the data.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从法律和监管框架中获得有用的指导，例如GDPR、CCPA和欧盟人工智能法案，但我们不能依赖立法者为我们做所有思考。法律框架不能包括所有可能出现问题的可能场景，通常需要解释并应用于技术现实。例如，模型不应使用受保护的特征来做出关于人们机会或资源获取的决定。如果你被要求构建一个评估消费者数据的模型，你需要弄清楚如何（或是否！）构建该模型，以确保受保护的特征不会驱动决策。也许你需要整理输入数据，或者你需要对输出应用严格的保障措施。你可能还需要通知最终用户这一原则，并教育他们如何识别歧视性输出，以防数据出现意外。
- en: But this isn’t just the engineer’s responsibility. Everyone involved in the
    development lifecycle for AI, such as product, infosec, and legal should be well
    informed about the real capabilities of an AI product and know that errors or
    unwanted effects are always a risk. Often, models that are doing exactly what
    they were designed to do can have negative surprise side effects, because they
    weren’t accounted for during training. This is why involving people across your
    organization from different perspectives and backgrounds in planning and architectural
    design is so vital. Different viewpoints can catch blind spots and prevent unexpected
    risks, particularly to underrepresented groups or marginalized communities, from
    making it to production.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 但这不仅仅是工程师的责任。所有参与人工智能开发生命周期的人员，如产品、信息安全法和法律，都应该充分了解人工智能产品的实际能力，并知道错误或不受欢迎的后果始终是风险。通常，模型会按照它们被设计的那样做，但可能会产生负面的意外副作用，因为它们在训练过程中没有被考虑到。这就是为什么将来自组织内部不同视角和背景的人纳入规划和架构设计是如此至关重要的。不同的观点可以捕捉盲点，防止意外风险，尤其是那些代表性不足的群体或边缘化社区的风险，进入生产。
- en: '**Key Takeaways:** Ethical AI development is the responsibility of everyone
    involved in the production of AI solutions. Models don’t have to fail to have
    unwanted side effects, so diverse perspectives should be consulted in development.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键要点：** 伦理人工智能开发是所有参与人工智能解决方案生产人员的责任。模型不必失败就会产生不受欢迎的副作用，因此在开发过程中应咨询多样化的观点。'
- en: Closing Thoughts
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: '**Trustworthy AI isn’t a single feature that can be added at the end; it’s
    a layered practice. From building reliable data pipelines to democratizing observability,
    to embedding governance, and designing for responsibility, every step in the lifecycle
    shapes how much users and stakeholders can rely on your system.**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**可信赖的人工智能不是可以添加到最后的单一功能；它是一种分层实践。从构建可靠的数据管道到民主化可观察性，再到嵌入治理和为责任而设计，生命周期中的每一步都塑造了用户和利益相关者可以依赖您的系统的程度。**'
- en: 'The experts in this article all agree on one thing: trust is not automatic.
    It’s engineered through metrics, frameworks, and organizational practices that
    make AI safer and more resilient.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 本文中的专家们一致认为：信任不是自动的。它是通过指标、框架和组织实践来构建的，这些指标、框架和组织实践使人工智能更安全、更有弹性。
- en: 'As generative and agentic AI systems become embedded in critical workflows,
    the difference between hype and lasting adoption will come down to one question:
    *can people trust the system enough to depend on it?*'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 随着生成式和代理式人工智能系统嵌入到关键工作流程中，炒作与持续采用之间的区别将归结为一个问题：*人们是否足够信任系统，以至于可以依赖它？*
- en: The answer depends not on pushing models to 99% accuracy, but on building a
    culture, processes, and guardrails that ensure AI systems are transparent, resilient,
    and responsible from the outset.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 答案不在于将模型推向99%的准确率，而在于建立一个文化、流程和保障措施，确保人工智能系统从一开始就是透明的、有弹性的和负责任的。
