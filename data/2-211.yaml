- en: How to Unlock the Power of Multi-Agent Apps
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何释放多人代理应用的力量
- en: 原文：[https://towardsdatascience.com/how-to-unlock-the-power-of-multi-agent-apps/](https://towardsdatascience.com/how-to-unlock-the-power-of-multi-agent-apps/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-unlock-the-power-of-multi-agent-apps/](https://towardsdatascience.com/how-to-unlock-the-power-of-multi-agent-apps/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的最新一期，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: Is one really the loneliest number? When it comes to [AI agents](https://towardsdatascience.com/tag/agentic-ai/),
    the answer is likely “it depends.” For simple and narrowly scoped workflows, sticking
    to a single-agent setup can help you keep things tidy and efficient.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 真的只有一个数字是最孤独的吗？当涉及到[AI代理](https://towardsdatascience.com/tag/agentic-ai/)时，答案可能是“这取决于。”对于简单和范围狭窄的工作流程，坚持使用单个代理设置可以帮助你保持事情整洁和高效。
- en: It’s hard to ignore, however, just how many more possibilities open up when
    you start combining the power of multiple agents. To help you reap the benefits
    of multi-agent systems without adding unnecessary complexity or clunkiness, don’t
    miss the lineup of detailed, actionable articles we’ve selected for you this week.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当你开始结合多个代理的力量时，会有更多可能性出现。为了帮助你充分利用多人代理系统的好处，而不会增加不必要的复杂性和笨拙，不要错过我们本周为你精选的详细、实用的文章系列。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: A Multi-Agent SQL Assistant You Can Trust with Human-in-Loop Checkpoint & LLM
    Cost Control
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你可以信赖的、经济高效的、具有人类在环检查点和LLM成本控制的多人代理SQL助手
- en: A trustworthy, cost-effective, AI-powered SQL assistant? What might have sounded
    like sci-fi a couple of years ago is now within reach: [Alle Sravani](https://towardsdatascience.com/author/alle-sravani/) walks
    us through the process of building such an assistant by leveraging SQLite, CrewAI,
    and Streamlit.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一个值得信赖的、经济高效的、由AI驱动的SQL助手？几年前这可能听起来像是科幻小说，但现在它触手可及：[Alle Sravani](https://towardsdatascience.com/author/alle-sravani/)
    带我们了解如何利用SQLite、CrewAI和Streamlit构建这样的助手。
- en: '[A Multi-Agent SQL Assistant You Can Trust with Human-in-Loop Checkpoint &
    LLM Cost Control](https://towardsdatascience.com/a-multi-agent-sql-assistant-you-can-trust-with-human-in-loop-checkpoint-llm-cost-control/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[具有人类在环检查点和LLM成本控制的多人代理SQL助手](https://towardsdatascience.com/a-multi-agent-sql-assistant-you-can-trust-with-human-in-loop-checkpoint-llm-cost-control/)'
- en: Build Multi-Agent Apps with OpenAI’s Agent SDK
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用OpenAI的Agent SDK构建多人代理应用
- en: For a different approach to multi-agent app-building, Alan Jones introduces
    us to OpenAI’s open-source package and some of its most compelling features.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 对于构建多人代理应用的不同方法，Alan Jones向我们介绍了OpenAI的开源包及其一些最吸引人的特性。
- en: '[Build Multi-Agent Apps with OpenAI’s Agent SDK](https://towardsdatascience.com/build-multi-agent-apps-with-openais-agent-sdk/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用OpenAI的Agent SDK构建多人代理应用](https://towardsdatascience.com/build-multi-agent-apps-with-openais-agent-sdk/)'
- en: Building AI-Powered Low-Code Workflows with n8
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用n8构建AI驱动的低代码工作流程
- en: What if you don’t want to build your own agent at all? Alessandra Costa shows
    how an automation platform can serve as a low-barrier alternative.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你根本不想构建自己的代理怎么办？Alessandra Costa展示了自动化平台如何作为一个低门槛的替代方案。
- en: '[Building AI-Powered Low-Code Workflows with n8n](https://towardsdatascience.com/building-ai-powered-low-code-workflows-with-n8n/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用n8构建AI驱动的低代码工作流程](https://towardsdatascience.com/building-ai-powered-low-code-workflows-with-n8n/)'
