- en: “My biggest lesson was realizing that domain expertise matters more than algorithmic
    complexity.“
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: “我最大的教训是意识到领域专业知识比算法复杂性更重要。”
- en: 原文：[https://towardsdatascience.com/my-biggest-lesson-was-realizing-that-domain-expertise-matters-more-than-algorithmic-complexity/](https://towardsdatascience.com/my-biggest-lesson-was-realizing-that-domain-expertise-matters-more-than-algorithmic-complexity/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/my-biggest-lesson-was-realizing-that-domain-expertise-matters-more-than-algorithmic-complexity/](https://towardsdatascience.com/my-biggest-lesson-was-realizing-that-domain-expertise-matters-more-than-algorithmic-complexity/)
- en: '*In the Author Spotlight series, TDS Editors chat with members of our community
    about their career path in data science and AI, their writing, and their sources
    of inspiration. Today, we’re thrilled to share our conversation with* [*Claudia
    Ng*](https://towardsdatascience.com/author/ds-claudia/)*.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*在“作者聚焦”系列中，TDS编辑们与我们的社区成员交谈，了解他们在数据科学和AI领域的职业道路、他们的写作以及他们的灵感来源。今天，我们很高兴分享我们与[*Claudia
    Ng*](https://towardsdatascience.com/author/ds-claudia/)的对话。*'
- en: '*Claudia is an AI entrepreneur and data scientist with 6+ years of experience
    building production machine learning models in FinTech. She placed second and
    won $10,000 in a Web3 credit scoring ML competition in 2024.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*Claudia是一位拥有6年以上经验的AI企业家和数据科学家，她在金融科技领域构建了生产级机器学习模型。她在2024年的Web3信用评分机器学习竞赛中排名第二，赢得了10,000美元。*'
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '[You recently won $10,000 in a machine learning competition](https://towardsdatascience.com/i-won-10000-in-a-machine-learning-competition-heres-my-complete-strategy/)
    — congratulations! What was the biggest lesson you took away from that experience,
    and how has it shaped your approach to real-world ML problems?'
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[你最近在机器学习竞赛中赢得了10,000美元](https://towardsdatascience.com/i-won-10000-in-a-machine-learning-competition-heres-my-complete-strategy/)
    — 恭喜！从这次经历中，你学到了什么最大的教训，它是如何塑造你解决现实世界机器学习问题的方法的？'
- en: My biggest lesson was realizing that domain expertise matters more than algorithmic
    complexity. It was a Web3 credit scoring ML competition, and despite never having
    worked with blockchain data or neural networks for credit scoring, my 6+ years
    in FinTech gave me the business intuition to treat this as a standard credit risk
    problem. This perspective proved more valuable than any degree or deep learning
    specialization.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我最大的教训是意识到领域专业知识比算法复杂性更重要。这是一场Web3信用评分机器学习竞赛，尽管我从未与区块链数据或信用评分中的神经网络合作过，但我在金融科技领域的6年以上经验给了我处理这个问题作为标准信用风险问题的商业直觉。这种观点比任何学位或深度学习专业都更有价值。
- en: 'This experience fundamentally shifted how I approach ML problems in two ways:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这次经历从根本上改变了我在两个方面的ML问题处理方式：
- en: '**First, I learned that shipped is better than perfect.** I spent only 10 hours
    on the competition and submitted an “MVP” approach rather than over-engineering
    it. This applies directly to industry work: a decent model running in production
    delivers more value than a highly optimized model sitting in a Jupyter notebook.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先，我学会了完成比完美更重要。** 我只花了10个小时参加竞赛，提交了一个“MVP”方法，而不是过度工程化。这直接适用于行业工作：一个在生产中运行的合理模型比一个坐在Jupyter笔记本中的高度优化的模型更有价值。'
- en: '**Second, I discovered that most barriers are mental, not technical.** I almost
    didn’t enter because I didn’t know Web3 or feel like a “competition person”, but
    in retrospect, I was overthinking it. While I’m still working on applying this
    lesson more broadly, it has changed how I evaluate opportunities. I now focus
    on whether I understand the core problem and whether it excites me, and trust
    that I’ll be able to figure it out as I go.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**其次，我发现大多数障碍都是心理上的，而不是技术上的。** 我差点没有参加，因为我不知道Web3，也不觉得自己像“竞赛型”的人，但回顾起来，我过于思考了。虽然我仍在努力将这个教训更广泛地应用，但它已经改变了我评估机会的方式。我现在关注的是我是否理解核心问题，以及它是否让我兴奋，并相信我会在过程中找到答案。'
- en: Your career path spans business, public policy, machine learning, and now AI
    Consultant. What motivated your shift from corporate tech to the [AI freelance
    world](https://ds-claudia.com/), and what excites you most about this new chapter?
    What kinds of challenges or clients are you most excited to work with?
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你的职业道路涵盖了商业、公共政策、机器学习和现在的AI顾问。是什么促使你从企业科技转向[AI自由职业者世界](https://ds-claudia.com/)，你对这个新篇章中最兴奋的是什么？你最想与哪些挑战或客户合作？
- en: The shift to independent work was driven by wanting to build something I could
    truly own and grow. In corporate roles, you build valuable systems that outlive
    your tenure, but you can’t take them with you or get ongoing credit for their
    success. Winning this competition showed me I had the skills to create my own
    solutions rather than just contributing to someone else’s vision. I learned valuable
    skills in corporate roles, but I’m excited to apply them to challenges I care
    deeply about.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 转向独立工作的动力是想要创建一些真正属于自己的并能不断成长的东西。在企业管理层，你构建了超越你任期价值的宝贵系统，但你不能带走它们，也不能持续获得它们成功的认可。赢得这次比赛让我意识到，我有能力创造自己的解决方案，而不仅仅是贡献于他人的愿景。我在企业管理层学到了宝贵的技能，但我很兴奋将这些技能应用到我所关心的挑战上。
- en: 'I’m pursuing this through two main paths: consulting projects that leverage
    my data science and machine learning expertise, and building an AI language learning
    product. The consulting work provides immediate revenue and keeps me connected
    to real business problems, while the language product represents my long-term
    vision. I’m learning to build in public and sharing my journey through my [newsletter](https://aiweekender.substack.com/).'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过两条主要途径来实现这一目标：利用我的数据科学和机器学习专业知识进行咨询项目，以及构建人工智能语言学习产品。咨询工作提供了即时的收入，并使我与真实商业问题保持联系，而语言产品代表了我的长期愿景。我正在学习公开构建，并通过我的[通讯](https://aiweekender.substack.com/)分享我的旅程。
- en: As a polyglot who speaks nine languages, I’ve thought deeply about the challenges
    of achieving conversational fluency and not just textbook knowledge when learning
    a foreign language. I’m developing an AI language learning partner that helps
    people practice real-world scenarios and cultural contexts.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 作为会说九种语言的polyglot，我深入思考了在学外语时实现对话流利性的挑战，而不仅仅是书本知识。我正在开发一个AI语言学习伙伴，帮助人们练习真实世界的场景和文化背景。
- en: What excites me most is the technical challenge of building AI solutions that
    take into account cultural context and conversational nuance. On the consulting
    side, I’m energized by working with companies that want to solve real problems
    rather than just implementing AI for the sake of having AI. Whether it’s working
    on risk models or streamlining information retrieval, I love projects where domain
    expertise and practical AI intersect.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 最让我兴奋的是，构建考虑文化背景和对话细微差别的AI解决方案的技术挑战。在咨询方面，与那些想要解决真实问题的公司合作让我充满活力，而不是仅仅为了拥有人工智能而实施人工智能。无论是工作在风险模型上还是简化信息检索，我都喜欢那些领域专业知识与实际人工智能交汇的项目。
- en: Many companies are eager to “do something with AI” but don’t always know where
    to start. What’s your typical process for helping a new client scope and prioritize
    their first AI initiative?
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 许多公司都渴望“用人工智能做点什么”，但并不总是知道从哪里开始。你帮助新客户确定和优先考虑他们第一个AI项目的典型流程是什么？
- en: I take a problem-first approach rather than lead with AI solutions. Too many
    companies want to “do something with AI” without identifying what specific business
    problem they’re trying to solve, which usually leads to impressive demos that
    don’t move the needle.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我采取的是以问题为导向的方法，而不是以人工智能解决方案为起点。太多公司想要“用人工智能做点什么”，但没有确定他们试图解决的具体商业问题，这通常会导致令人印象深刻的演示，但并没有真正推动进展。
- en: 'My typical process follows three steps:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我的典型流程遵循三个步骤：
- en: '**First, I focus on problem diagnosis.** We identify specific pain points with
    measurable impact. For example, I recently worked with a client in the restaurant
    space facing slowing revenue growth. Instead of jumping to an “AI-powered solution,”
    we examined customer review data to identify patterns. For example, which menu
    items drove complaints, what service elements generated positive feedback, and
    which operational issues appeared most frequently. This data-driven diagnosis
    led to specific recommendations rather than generic AI implementations.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先，我专注于问题诊断**。我们识别出具有可衡量影响的特定痛点。例如，我最近与一位在餐饮行业面临收入增长放缓的客户合作。我们并没有急于提出一个“人工智能解决方案”，而是检查了客户评论数据以识别模式。例如，哪些菜单项引发了投诉，哪些服务元素产生了积极反馈，以及哪些运营问题出现频率最高。这种数据驱动的诊断导致了具体的建议，而不是通用的AI实施。'
- en: '**Second, we define success upfront.** I insist on quantifiable metrics like
    time savings, quality improvements, or revenue increases. If we can’t measure
    it, we can’t prove it worked. This prevents scope creep and ensures we’re solving
    real problems, not just building cool technology.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**其次，我们提前定义成功。** 我坚持使用可量化的指标，如时间节省、质量改进或收入增加。如果我们无法衡量它，我们就无法证明它有效。这防止了范围蔓延，并确保我们解决的是真正的问题，而不是仅仅构建酷技术。'
- en: '**Third, we go through viable solutions and align on the best one.** Sometimes
    that’s a visualization dashboard, sometimes it’s a RAG system, sometimes it’s
    adding predictive capabilities. AI isn’t always the answer, but when it is, we
    know exactly why we’re using it and what success looks like.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三，我们评估可行的解决方案并确定最佳方案。** 有时候那是一个可视化仪表板，有时候是一个 RAG 系统，有时候是添加预测功能。AI 并非总是答案，但如果是，我们就知道为什么使用它以及成功是什么样的。'
- en: This approach has delivered positive results. Clients typically see improved
    decision-making speed and clearer data insights. While I’m building my independent
    practice, focusing on real problems rather than AI buzzwords has been key to client
    satisfaction and repeat engagements.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法产生了积极的结果。客户通常看到决策速度的提高和更清晰的数据洞察。在我建立我的独立实践时，专注于真正的问题而不是 AI 炫耀词汇，这对客户满意度和重复合作至关重要。
- en: You’ve mentored aspiring data scientists — what’s one common pitfall you see
    among people trying to break into the field, and how do you advise them to avoid
    it?
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你辅导过有抱负的数据科学家——你在看到试图进入该领域的人中看到的一个常见陷阱是什么，你如何建议他们避免它？
- en: The biggest pitfall I see is trying to learn everything instead of focusing
    on one role. Many people, including myself early on, feel like they need to take
    every AI course and master every concept before they’re “qualified.”
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到的最大陷阱是试图学习一切，而不是专注于一个角色。许多人，包括我早期的时候，都觉得自己需要参加每一个 AI 课程并掌握每一个概念，才能被认为是“合格”的。
- en: 'The reality is that data science encompasses very different roles: from product
    data scientists running A/B tests to ML engineers deploying models in production.
    You don’t need to be an expert at everything.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，数据科学涵盖了非常不同的角色：从运行 A/B 测试的产品数据科学家到在生产中部署模型的 ML 工程师。你不需要在所有事情上都是专家。
- en: '**My advice: Pick your lane first.** Figure out which role excites you most,
    then focus on sharpening those core skills. I personally transitioned from analyst
    to ML engineer by intensely studying machine learning and taking on real projects
    (you can read my transition story [here](https://aiweekender.substack.com/p/how-i-broke-into-data-science-without?r=2nz2lx)).
    I leveraged my domain expertise in credit and fraud risk, and applied this to
    feature engineering and business impact calculations.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**我的建议：首先选择你的车道。** 确定哪个角色最让你兴奋，然后专注于磨练那些核心技能。我个人通过深入研究机器学习和承担真实项目（你可以在[这里](https://aiweekender.substack.com/p/how-i-broke-into-data-science-without?r=2nz2lx)阅读我的转型故事）从分析师转型为
    ML 工程师。我利用我在信用和欺诈风险领域的专业知识，并将其应用于特征工程和业务影响计算。'
- en: '**The key is applying these skills to real problems, not getting stuck in tutorial
    hell.** I see this pattern constantly through my newsletter and mentoring. People
    who break through are the ones who start building, even when they don’t feel ready.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键是将这些技能应用于实际问题，而不是陷入教程地狱。** 我在我的通讯和辅导中不断看到这种模式。那些突破的人是那些即使感觉没有准备好，也开始构建的人。'
- en: The landscape of AI roles keeps evolving. How should newcomers decide where
    to focus — ML engineering, data analytics, LLMs, or something else entirely?
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AI 角色的领域不断演变。新来者应该如何决定关注点——ML 工程师、数据分析、LLM 还是其他完全不同的领域？
- en: Start with your current skill set and what interests you, not what sounds most
    prestigious. I’ve worked across different roles (analyst, data scientist, ML engineer)
    and each brought valuable, transferable skills.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 从你当前技能集和你的兴趣点开始，而不是从听起来最体面的开始。我在不同的角色（分析师、数据科学家、ML 工程师）中工作过，每个角色都带来了有价值的、可转移的技能。
- en: 'Here’s how I’d approach the decision:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我将如何处理这个决定如下：
- en: '**If you’re coming from a business background:** Product data scientist roles
    are often the easiest entry point. Focus on SQL, A/B testing, and data visualization
    skills. These roles often value business intuition over deep technical skills.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你来自商业背景：** 产品数据科学家角色通常是进入该领域的最简单途径。专注于 SQL、A/B 测试和数据可视化技能。这些角色通常更重视商业直觉而非深厚的技术技能。'
- en: '**If you have programming experience:** Consider ML engineering or AI engineering.
    The demand is high, and you can build on existing software development skills.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你有编程经验：** 考虑ML工程或AI工程。需求很高，你可以利用现有的软件开发技能。'
- en: '**If you’re drawn to infrastructure:** MLOps engineering is highly in demand,
    especially as more companies deploy ML and AI models at scale.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你对基础设施感兴趣：** MLOps工程需求很高，尤其是在越来越多的公司大规模部署ML和AI模型的情况下。'
- en: The landscape keeps evolving, but as mentioned above, domain expertise often
    matters more than following the latest trend. I won that ML competition because
    I understood credit risk fundamentals, not because I knew the fanciest algorithms.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这个领域不断演变，但如上所述，专业领域知识往往比追随最新趋势更重要。我赢得那次ML比赛是因为我理解信用风险的基本原理，而不是因为我知道最花哨的算法。
- en: Focus on solving real problems in domains you understand, then let the technical
    skills follow. To learn more about different roles, I’ve written about the 5 types
    of data science career paths [here](https://aiweekender.substack.com/p/5-data-science-and-ai-career-paths).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于解决你理解的领域中的实际问题，然后让技术技能紧随其后。为了了解更多关于不同角色的信息，我在[这里](https://aiweekender.substack.com/p/5-data-science-and-ai-career-paths)写过了5种数据科学职业路径。
- en: What’s one AI or data science topic you think more people should be writing
    about or one trend you’re watching closely right now?
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你认为有哪些AI或数据科学主题更多的人应该撰写或你目前密切关注的热门趋势？
- en: I’ve been blown away by the speed and quality of text-to-speech (TTS) technology
    in mimicking real conversational patterns and tone. I think more people should
    be writing about TTS technology for endangered language preservation.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我对文本到语音（TTS）技术在模仿真实对话模式和语调方面的速度和质量感到震惊。我认为更多的人应该撰写关于TTS技术在濒危语言保护方面的文章。
- en: As a polyglot who’s passionate about cross-cultural understanding, I’m fascinated
    by how AI could help prevent languages from disappearing entirely. Most TTS development
    focuses on major languages with massive datasets, but there are over 7,000 languages
    worldwide, and many are at risk of extinction.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位对跨文化理解充满热情的polyglot，我对AI如何帮助防止语言完全消失感到着迷。大多数TTS开发都集中在拥有大量数据集的主要语言上，但全世界有超过7000种语言，其中许多都处于灭绝的危险之中。
- en: What excites me is the potential for AI to create voice synthesis for languages
    that might only have a few hundred speakers left. This is technology serving humanity
    and cultural preservation at its best! When a language dies, we lose unique ways
    of thinking about the world, specific knowledge systems, and cultural memory that
    can’t be translated.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 让我兴奋的是，AI有可能为可能只剩下几百名说话者的语言创造语音合成。这是技术服务于人类和文化保护的最佳体现！当一种语言消失时，我们就失去了独特的世界观，特定的知识体系，以及无法翻译的文化记忆。
- en: The trend I’m watching closely is how transfer learning and voice cloning are
    making this technically feasible. We’re reaching a point where you might only
    need hours rather than thousands of hours of audio data to create quality TTS
    for new languages, especially using existing multilingual models. While this technology
    raises valid concerns about misuse, applications like language preservation show
    how we can use these capabilities responsibly for cultural good.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我密切关注的一个趋势是迁移学习和语音克隆如何使这项技术变得技术上可行。我们正达到一个点，你可能只需要几个小时而不是数千小时的音频数据来为新的语言创建高质量的TTS，尤其是在使用现有的多语言模型的情况下。虽然这项技术引发了关于滥用的合理担忧，但像语言保护这样的应用展示了我们如何负责任地利用这些能力为文化造福。
- en: As I continue developing my language learning product and building my consulting
    practice, I’m constantly reminded that the most interesting AI applications often
    come from combining technical capabilities with deep domain understanding. Whether
    it’s building machine learning models or cultural communication tools, the magic
    happens at the intersection.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在我继续开发我的语言学习产品并建立我的咨询业务的过程中，我不断被提醒，最有趣的AI应用往往来自将技术能力与深入的专业领域理解相结合。无论是构建机器学习模型还是文化沟通工具，魔法发生在交汇处。
