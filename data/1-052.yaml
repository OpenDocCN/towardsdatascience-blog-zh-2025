- en: 'RISAT’s Silent Promise: Decoding Disasters with Synthetic Aperture Radar'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RISAT的沉默承诺：利用合成孔径雷达解码灾难
- en: 原文：[https://towardsdatascience.com/risats-silent-promise-decoding-disasters-with-synthetic-aperture-radar/](https://towardsdatascience.com/risats-silent-promise-decoding-disasters-with-synthetic-aperture-radar/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/risats-silent-promise-decoding-disasters-with-synthetic-aperture-radar/](https://towardsdatascience.com/risats-silent-promise-decoding-disasters-with-synthetic-aperture-radar/)
- en: <mdspan datatext="el1764118325455" class="mdspan-comment">When I first began</mdspan>
    looking at satellite data, it seemed totally impossible to me that a spacecraft
    that orbits the Earth at a distance of several hundred kilometers can actually
    see a flooded street in my city. Floods are very disorderly, dirty, and generally
    unpredictable. However, radar satellites have become very sensitive in the last
    couple of years, and algorithms have become very intelligent, so now it is possible
    to monitor the water that is flowing through the houses, fields, and riverbanks.
    I wrote this article to explain how the trick works. It is not the perfect “AI
    + satellites = magic” version, but the real one, from the perspective of a person
    who has spent numerous nights looking at SAR (Synthetic Aperture Radar) images
    full of noise, trying to figure out what they really mean.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764118325455" class="mdspan-comment">当我最初开始</mdspan>查看卫星数据时，对我来说，一艘在距离地球几百公里的轨道上运行的航天器实际上能看到我城市中洪水淹没的街道是完全不可能的。洪水非常混乱、肮脏，通常不可预测。然而，在过去几年里，雷达卫星已经变得非常敏感，算法也变得非常智能，现在可以监测通过房屋、田野和河岸的水流。我写这篇文章是为了解释这个技巧是如何工作的。这并不是完美的“AI
    + 卫星 = 魔法”版本，而是真实的一个，从一个在无数个夜晚看着充满噪声的SAR（合成孔径雷达）图像，试图弄清楚它们真正含义的人的角度来看。
- en: 'My core message: to be able to locate floods in real-time and to be able to
    rely on such maps, one has to move beyond optical images and understand the geometry
    of SAR backscatter. India’s RISAT (Radar Imaging Satellite) program is an excellent
    example of how physics-based data pipelines can give the stability and weather
    independence required for the timely delivery of the flood intelligence that can
    be used in situations of extreme catastrophes, such as the monsoon ‍season.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我的核心信息：要能够实时定位洪水并能够依赖这样的地图，必须超越光学图像，理解SAR回波的几何形状。印度的RISAT（雷达成像卫星）计划是物理学数据管道如何提供及时交付洪水情报的稳定性和天气独立性的一个绝佳例子，这种情报可以在极端灾难情况中使用，例如雨季。
- en: The Strange Beauty and Physics of SAR Data
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SAR数据的奇异美与物理
- en: Most ‍people envision satellites as photo-taking devices, but SAR is quite different
    from a camera. It does not record light; in fact, it generates its own light.
    In the case of a satellite such as RISAT, it is an active operation in which the
    satellite sends a concentrated beam of microwaves to the Earth and records the
    very small part of the energy that is reflected back to it, which is called ‍backscatter.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人将卫星想象成拍照设备，但SAR与相机截然不同。它不记录光；实际上，它产生自己的光。在RISAT这样的卫星的情况下，这是一个主动操作，卫星向地球发送一束集中的微波，并记录反射回它的小部分能量，这被称为**回波**。
- en: Why Water Appears Dark (The Specular Effect)
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么水看起来是黑色的（镜面效应）
- en: The brightness of the image produced is not a measure of visible light, but
    an account of how the radar energy is changing through interaction with the surface
    below. Such an interaction depends on how rough and what the properties of the
    surface are in relation to the radar’s wavelength.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 产生的图像亮度并不是可见光的度量，而是雷达能量如何通过与下表面的相互作用而变化的描述。这种相互作用取决于表面的粗糙程度以及与雷达波长的关系。
- en: '**Dry, Rough Surfaces (Vegetation, Urban Areas) :** The radar waves scatter
    in many different directions when they hit a rough surface, like light hitting
    a crumpled piece of foil. A large part of this scattered energy returns to the
    satellite → Bright Pixels.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**干燥、粗糙的表面（植被、城市区域）**：当雷达波击中粗糙表面时，它们会向许多不同的方向散射，就像光线击中皱巴巴的箔片一样。这部分散射能量中有很大一部分返回到卫星→明亮的像素。'
- en: '**Smooth Water Surfaces :** A calm water surface is like a very smooth mirror.
    When radar waves hit it, they reflect almost all the energy away from the satellite,
    just as a mirror reflects light in a single direction. Only a very small amount
    of energy is sent back to the sensor → Dark Pixels (indicating very low backscatter).'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平滑水面**：平静的水面就像一面非常光滑的镜子。当雷达波击中它时，几乎会将所有能量反射回卫星，就像镜子以单一方向反射光线一样。只有极小量的能量被发送回传感器
    → 暗像素（表示非常低的散射）。'
- en: Such an ability to penetrate darkness, rain, dust, and smoke is what makes SAR
    irreplaceable for disaster response in cloudy, high-moisture environments.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这种穿透黑暗、雨水、尘埃和烟雾的能力，使得SAR在多云、高湿度环境中的灾害响应变得不可替代。
- en: '![](../Images/95ea8708b2140e7f050dde63abef690d.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/95ea8708b2140e7f050dde63abef690d.png)'
- en: Diagram showing Specular Reflection (calm water) vs. Diffuse Scattering (rough
    land). Image by author.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 展示镜面反射（平静水面）与漫反射（粗糙陆地）的图表。图片由作者提供。
- en: 'The Core Flood Mapping Pipeline: From Echo to Map'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核心洪水测绘管道：从回波到地图
- en: ‍ A SAR satellite image is not directly available from the download. An average
    RISAT flood detection process is a well-organized, physics-based data science
    pipeline. Any error made at the beginning can spoil all the results that follow,
    hence the careful processing is very important. ‍ ‍‌
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: SAR卫星图像不能直接从下载中获得。平均RISAT洪水检测过程是一个组织良好、基于物理的数据科学管道。任何在开始时犯的错误都可能破坏所有后续的结果，因此仔细处理非常重要。
- en: 1\. Preparing the Radar Data
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 准备雷达数据
- en: Essentially ‍the first step is to change the satellite’s raw data in such a
    way that it expresses meaningful backscatter measurements. This step makes the
    numerical values in the picture a true representation of the Earth’s surface that
    can be compared with other pictures ‍ ‍‌ reliably.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，第一步是改变卫星的原始数据，使其表达有意义的后向散射测量。这一步骤使得图片中的数值成为地球表面的真实表示，可以与其他图片可靠地比较。
- en: 2\. Reducing Image Noise
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 降低图像噪声
- en: Speckle ‍is a granular, salt-and-pepper-like noise that SAR images have inherently.
    This noise should be lessened in a way that does not blur the outline of the land,
    in particular, the sharp boundaries between land and water.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 斑纹噪声是SAR图像固有的颗粒状、盐粒般的噪声。这种噪声应该以不模糊陆地轮廓的方式减少，特别是陆地和水域之间尖锐的边界。
- en: 'The Challenge: Inappropriate strong use of a noise reduction method may delete
    small flood details or change water boundaries. An insufficiently strong method
    leaves too much noise that may cause errors in the identification of flooded areas.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战：不恰当地过度使用噪声减少方法可能会删除小的洪水细节或改变水域边界。方法不够强可能会留下过多的噪声，这可能导致洪水区域识别错误。
- en: 'The Solution: It is a clear result of the image, which is suitable for analysis,
    because specialized filters are brought in to smooth out the noisy parts while
    preserving the important edges.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：这是一个清晰的图像结果，适合分析，因为引入了专门的过滤器来平滑噪声部分，同时保留重要的边缘。
- en: '3\. Detecting Change: The Algorithmic Centerpiece'
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 检测变化：算法的核心
- en: Essentially, flooding is a major change in the reflectivity of the surface to
    radar energy—from a bright-scattering land surface to a dark-scattering water
    surface. So, a comparison of a radar image taken before the flood with one taken
    after allows us to determine the exact locations of inundation.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，洪水是地表对雷达能量的反射率发生的主要变化——从明亮的散射陆地表面到暗散射的水面。因此，比较洪水前后的雷达图像，可以确定淹没的确切位置。
- en: One of the most effective methods is to determine the change in brightness between
    the images taken before and after the flood. Those locations that have changed
    from land to water will have a huge difference, thus disclosing the flooded area
    almost ‍entirely
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 最有效的方法之一是确定洪水前后图像之间亮度的变化。那些从陆地变为水域的位置将有巨大的差异，从而几乎完全揭示洪水区域。
- en: 4\. Isolating and Refining the Flood Zones
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 隔离和细化洪水区域
- en: 'The last operations are all about finding the pixels that correspond to the
    flooded areas and ensuring the map is correct:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的操作都是关于找到对应于洪水区域的像素，并确保地图正确：
- en: 'Thresholding: An automatic method locates those pixels whose change is significant
    enough to be considered ‘flooded’. Thus, a first map of the flooded areas is obtained.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阈值化：一种自动方法定位那些变化足够显著，可以被认为是“洪水”的像素。因此，获得洪水区域的第一张地图。
- en: 'Use of Additional Data: To refine the accuracy, we resort to different types
    of geographical data. For instance, we take out the zones that are always under
    water (like permanent lakes or rivers) and do not consider very steep slopes (which
    can be sometimes wrongly interpreted as dark areas in radar images due to shadows).
    This provides the means to get rid of the false detections and makes sure that
    the final flood map is ‍accurate.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用额外数据：为了提高准确性，我们求助于不同类型的地理数据。例如，我们排除那些始终处于水下（如永久性湖泊或河流）的区域，并且不考虑非常陡峭的斜坡（这些斜坡有时可能因为阴影而被错误地解释为雷达图像中的暗区）。这为我们提供了去除错误检测的方法，并确保最终的洪水地图是准确的。
- en: '![](../Images/97cbe4ca721d5782f208703bb1dd8841.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/97cbe4ca721d5782f208703bb1dd8841.png)'
- en: Log-Ratio Flood Extent Map illustrating the Assam Monsoon Event. Image by author.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 展示阿萨姆季风事件的对数比洪水范围图。图片由作者提供。
- en: The Nuance of Radar Settings and Human Intervention
  id: totrans-30
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 雷达设置和人类干预的细微差别
- en: One of the small decisions which has more impact than the algorithm is the choice
    of the correct radar settings, especially the manner in which the radar waves
    are sent and received (known as polarization).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个比算法影响更大的小决策是选择正确的雷达设置，特别是雷达波发送和接收的方式（称为极化）。
- en: Various polarization configurations can reveal different aspects of the terrain.
    When it comes to flood monitoring, a certain polarization setting (frequently
    referred to as VV polarization) is usually selected since it results in the greatest
    contrast between the dark signal coming from the water and the light signal coming
    from the land around it.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的极化配置可以揭示地形的不同方面。在洪水监测方面，通常选择一种特定的极化设置（通常称为VV极化），因为它在来自水的暗信号和来自周围陆地的亮信号之间产生了最大的对比度。
- en: Why Human Judgment Still Tops Pure AI
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么人类判断仍然优于纯人工智能
- en: In current operational flood mapping, traditional methods have been found to
    produce more reliable results than complex artificial intelligence models. This
    is mainly because traditional methods are more consistent and adaptable.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在当前的洪水映射操作中，传统方法已被发现比复杂的人工智能模型产生更可靠的结果。这主要是因为传统方法更一致且更具适应性。
- en: 'The AI Challenge: General-purpose AI models have a hard time dealing with the
    inherent noise in radar data. Additionally, these models fail when they are relocated
    to a new geographic area. For example, an AI model trained on floods in a flat,
    urban city might not be applicable in a hilly, agricultural river delta.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能挑战：通用人工智能模型在处理雷达数据中的固有噪声方面有困难。此外，当这些模型被转移到新的地理区域时，它们会失败。例如，在一个平坦的城市地区训练的洪水人工智能模型可能不适用于多山的农业河口三角洲。
- en: 'The Human Edge: Even though the same satellite data is used, two expert analysts
    may come up with slightly different flood maps. This is not inaccuracy;rather,
    it is nuance. The analyst applies their knowledge to:'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类优势：即使使用相同的卫星数据，两位专家分析师也可能得出略有不同的洪水地图。这并不是不准确，而是细微差别。分析师将他们的知识应用于：
- en: Adjust the flood zones according to the local setting (recognizing that a flooded
    rice field would look different from a flooded road).
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据当地设置调整洪水区域（认识到洪水稻田与洪水道路的外观会有所不同）。
- en: Weigh the necessity of finding all flooded areas against the possibility of
    identifying non-flooded areas as flooded (false alarms).
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权衡寻找所有洪水区域的需要与将非洪水区域误判为洪水区域（误报）的可能性。
- en: Whereas AI is gradually gaining ground, it is mostly in a helping capacity.
    Advanced methods utilize the dependable physical principles of radar along with
    AI to not only narrow down flood boundaries but also to elevate the level of detail.
    By doing so, the comprehension of radar physics is still the primary consideration
    while AI is used to enhance the end product.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然人工智能正在逐渐占据优势，但它主要还是处于辅助地位。高级方法利用雷达的可靠物理原理以及人工智能，不仅缩小洪水边界，而且提高细节水平。通过这样做，雷达物理学的理解仍然是首要考虑的因素，而人工智能则用于增强最终产品。
- en: Conclusion
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The RISAT program is one such initiative that essentially accomplishes this
    by providing consistent and reliable data which is instrumental in transforming
    the flood chaos into a manageable and strategic geospatial intelligence. At present,
    flood mapping is essentially the point of convergence of the latest developments
    in physical models, data processing, and the application of geo-spatial expertise
    by human agents.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: RISAT项目就是这样一项举措，它通过提供一致和可靠的数据来实现这一目标，这些数据对于将洪水混乱转化为可管理和战略性的地理空间情报至关重要。目前，洪水测绘基本上是物理模型、数据处理和人类代理应用地理空间专业知识的最新发展的交汇点。
- en: Understanding and interpreting the backscatter patterns is the key step in moving
    from a mere visual of the catastrophe to a deep understanding of the extent and
    the flow of the disaster, thus allowing for a timely intervention. Besides, RISAT
    and similar initiatives should not be considered as mere technological devices
    stationed somewhere in the space, but rather as the indispensable instruments
    that sustain the harmonious functioning of the analyst and responder ecosystems.
    That is, the quicker and more precise our maps become, the relief teams are able
    to mobilize and execute their tasks in a much shorter time—being a perfect example
    of how data science can be a direct asset to humanity.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和解释后向散射模式是从对灾难的简单视觉认识到对灾害范围和流动的深入理解的关键步骤，从而允许及时干预。此外，RISAT和类似举措不应被视为仅位于太空某处的单纯技术设备，而应被视为维持分析师和响应者生态系统和谐运作的不可或缺的工具。也就是说，我们的地图变得越快、越精确，救援队伍就能在更短的时间内动员和执行他们的任务——这是一个完美的例子，说明了数据科学如何成为人类直接资产。
- en: Thank you for visiting and reading.
  id: totrans-43
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
  zh: 感谢您的访问和阅读。
