- en: 'The State of Quantum Computing: Where Are We Today?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 量子计算的状态：我们今天在哪里？
- en: 原文：[https://towardsdatascience.com/the-state-of-quantum-computing-where-are-we-today-17ee19f51b1d/](https://towardsdatascience.com/the-state-of-quantum-computing-where-are-we-today-17ee19f51b1d/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[量子计算的状态：我们今天在哪里？](https://towardsdatascience.com/the-state-of-quantum-computing-where-are-we-today-17ee19f51b1d/)'
- en: '![Picture by the author of a model of the IBM Quantalier](../Images/5319ae27113f000601a126938344a3c0.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![作者提供的IBM Quantalier模型的图片](../Images/5319ae27113f000601a126938344a3c0.png)'
- en: Picture by the author of a model of the IBM Quantalier
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者提供的IBM Quantalier模型的图片
- en: The advancements in quantum computing technology have been increasing rapidly
    over the past couple of years. When I first joined the field in 2018, not many
    people were aware of the practical side of the field or sought it out as much,
    perhaps because only a few knew what quantum computers were or because we did
    not have quantum computers at the time. All that has changed since then.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 过去几年，量子计算技术的进步一直在迅速增加。当我于2018年首次加入这个领域时，很少有人了解这个领域的实际应用，或者寻求了解它，可能是因为当时只有少数人知道量子计算机是什么，或者因为我们当时没有量子计算机。从那时起，一切都变了。
- en: More and more people have become interested in the field, from academia to industry
    and even some of the public. So, when I was sitting to think about my first article
    of 2025, the current status of quantum computing seemed like a good idea.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 越来越多的人对这个领域产生了兴趣，从学术界到工业界，甚至一些公众。所以，当我坐下来思考我的2025年第一篇文章时，量子计算的现状似乎是个不错的主题。
- en: Not just because of how fast the quantum field has come but also because this
    year, the 100th year since the start of the development of quantum mechanics,
    the United Nations has announced 2025 as the [international year of quantum science
    and technology](https://quantum2025.org/en/).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅是因为量子领域发展得如此之快，而且因为今年，量子力学开始发展的第100年，联合国宣布2025年为[国际量子科学和技术年](https://quantum2025.org/en/)。
- en: So, what better time to discuss the field for those who are curious about where
    we are now as a field?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，对于那些好奇我们现在作为领域处于何种状态的人来说，现在讨论这个领域不是最好的时机吗？
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What are quantum computers? A very short intro
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是量子计算机？一个非常简短的介绍
- en: But first, for anyone new to the field, let us briefly address what quantum
    computing is and why anyone should care about it.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，对于这个领域的新手，让我们简要地谈谈量子计算是什么以及为什么每个人都应该关心它。
- en: The computers we use today (we’ll call them classical computers) work in binary,
    as in 0 or 1\. These represent whether an electric current passes through a circuit;
    we refer to them as bits. Fundamentally, we use transistors to control whether
    a current passes through the circuit inside the computer. To simplify things,
    think of the transistor as a switch; if the switch is closed, a current passes,
    or we have 1\. If it is not, no current passes, and we have 0.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们今天使用的计算机（我们将它们称为经典计算机）以二进制方式工作，即0或1。这些代表电流是否通过电路；我们称它们为比特。从根本上说，我们使用晶体管来控制电流是否通过计算机内部的电路。为了简化，可以把晶体管想象成一个开关；如果开关是闭合的，电流就会通过，或者我们有1。如果它没有闭合，就没有电流通过，我们就有0。
- en: Computers today have millions of tiny transistors (switches), and manipulating
    the state of those transistors allows us to perform all kinds of computations
    and solve problems.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的计算机有数百万个微小的晶体管（开关），操纵这些晶体管的状况使我们能够执行各种计算和解决问题。
- en: Quantum computers, on the other hand, work differently. In quantum computers,
    we utilize the phenomena of quantum mechanics to solve some problems better. But
    before I get ahead of myself, let me take a step back and talk about the equivalent
    of a bit in quantum computers.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，量子计算机以不同的方式工作。在量子计算机中，我们利用量子力学的现象来解决一些问题。但在我不自量力之前，让我退一步，谈谈量子计算机中比特的等价物。
- en: '*Qubits*, or quantum bits, are the fundamental building blocks of quantum computers.
    They are a bit more complex than classical bits, mainly because we can use them
    to encode more information. You may ask, how are they different?'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '*量子比特*，或量子位，是量子计算机的基本构建块。它们比经典比特复杂一些，主要是因为我们可以用它们来编码更多信息。你可能会问，它们有什么不同？'
- en: '*Classical bits* represent whether a current passes in a circuit or not. Conversely,
    a qubit is a small system (or quantum system), like a photon or a small superconducting
    circuit. Because of that, qubits give us more freedom to encode information while
    presenting a different set of challenges (which we will discuss shortly).'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*经典比特*表示电路中是否有电流通过。相反，一个量子比特是一个小系统（或量子系统），如光子或一个小超导电路。正因为如此，量子比特为我们提供了更多的自由度来编码信息，同时也带来了一组不同的挑战（我们将在稍后讨论）。'
- en: Because qubits are quantum systems, we can then manipulate their status (like
    superposition and entanglement) to perform computations and solve *some* problems
    better than classical computers.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于量子比特是量子系统，我们可以操纵它们的状态（如叠加和纠缠）以执行计算并解决 *一些* 问题，比经典计算机更好。
- en: '![Image by author](../Images/91e0698faaf19cf70367520813930281.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/91e0698faaf19cf70367520813930281.png)'
- en: Image by author
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '* * *'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The keyword here is "*some*" problems. This brings me to my next point: Why
    should we care about quantum computers? What kind of problems will these computers
    solve better than our current computers?'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的关键词是 "*一些*" 问题。这让我想到了下一个问题：为什么我们应该关心量子计算机？这些计算机将比我们当前的计算机更好地解决哪些问题？
- en: Problems quantum computers will be good at solving
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 量子计算机将擅长解决的问题
- en: Quantum computers will be pretty good at solving "Multivariable problems." These
    problems involve multiple variables that interact with each other and influence
    the outcome. They are common across various fields, such as mathematics, science,
    engineering, economics, and machine learning.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 量子计算机将非常擅长解决 "多变量问题"。这些问题涉及多个变量，它们相互作用并影响结果。它们在数学、科学、工程、经济学和机器学习等多个领域都很常见。
- en: '**Examples of such problems include:**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下是一些此类问题的例子：**'
- en: Finding the maximum or minimum of a function.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找函数的最大值或最小值。
- en: Allocating resources to maximize efficiency or minimize costs.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将资源分配以最大化效率或最小化成本。
- en: Scheduling tasks to minimize total completion time.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排任务以最小化总完成时间。
- en: Training models where inputs (features) are multi-dimensional vectors.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练输入（特征）是多维向量的模型。
- en: Modeling supply and demand based on price, income, and production cost.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于价格、收入和生产成本来模拟供需关系。
- en: Designing systems with constraints on multiple variables, such as speed, efficiency,
    and safety.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计受多个变量（如速度、效率和安全性）约束的系统。
- en: 'What is unique about these kinds of problems is how the variables interact
    in a complex way. Solving these problems involves understanding their interdependencies
    and how they collectively influence the system and the final solution. So, we
    can summarize the challenges in solving these problems as:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这些类型的问题的独特之处在于变量在复杂方式中的相互作用。解决这些问题需要理解它们的相互依赖性以及它们如何共同影响系统和最终解决方案。因此，我们可以将这些问题的挑战总结如下：
- en: Complex Interactions between the variables.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变量之间的复杂相互作用。
- en: As the number of variables increases, the complexity grows.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着变量数量的增加，复杂性也在增长。
- en: Variables may relate in non-linear ways.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变量可能以非线性方式相互关联。
- en: Real-world problems often have uncertain or noisy data.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现实世界中的问题通常具有不确定或噪声数据。
- en: We use different methods today to attempt to solve these problems to the best
    of our ability using current technology. We use techniques like Substitution and
    Elimination, Gradient Descent, Lagrange Multipliers, Monte Carlo simulations,
    Neural networks, regression models, or clustering algorithms. Though these techniques
    work fine for most problems, they may take a very long time (years) to solve something
    like finding a large number of factors. That is where quantum computers shine.
    The quantum systems’ ability to exist in superposition and be entangled allows
    us to solve multivariable problems much faster than we can today.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们今天使用不同的方法，尽我们所能使用当前技术来尝试解决这些问题。我们使用诸如代换和消元、梯度下降、拉格朗日乘数、蒙特卡洛模拟、神经网络、回归模型或聚类算法等技术。尽管这些技术在大多数问题上都工作得很好，但它们可能需要非常长的时间（数年）来解决像找到大量因子这样的问题。这正是量子计算机大放异彩的地方。量子系统存在于叠加态和纠缠态的能力使我们能够比今天更快地解决多变量问题。
- en: 'Now that we know what quantum computers are and what problems they can solve
    let’s discuss where we are currently in the field. I will discuss the two sides
    of quantum computing: the hardware side and the software side.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经知道了量子计算机是什么以及它们能解决什么问题，那么让我们讨论一下我们目前在这个领域的位置。我将讨论量子计算的两个方面：硬件方面和软件方面。
- en: '* * *'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Quantum Hardware**'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**量子硬件**'
- en: Currently, there are different ways to construct qubits, and researchers are
    working on improving these methods and developing new ones. But since we are talking
    about the current state of quantum hardware, we will address the 5 leading methods
    to construct qubits.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，有不同方法构建量子比特，研究人员正在努力改进这些方法并开发新的方法。但既然我们正在讨论量子硬件的当前状态，我们将讨论构建量子比特的5种领先方法。
- en: '**Superconducting Qubits** (used by IBM and Google): These tiny superconducting
    circuits cooled to near absolute zero to create and manipulate quantum states.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**超导量子比特**（由IBM和谷歌使用）：这些微型超导电路冷却至接近绝对零度以创建和操纵量子状态。'
- en: '**Trapped Ions** (used by IonQ and Honeywell): This method uses individual
    ions trapped by electromagnetic fields, with quantum states controlled via lasers.
    Trapped ion qubits are known for their long coherence times and high precision.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**捕获离子**（由IonQ和霍尼韦尔使用）：这种方法使用电磁场捕获的单独离子，通过激光控制量子状态。捕获离子量子比特以其较长的相干时间和高精度而闻名。'
- en: '**Photonics-Based Systems**: Rely on photons (light particles) as qubits for
    their potential to achieve long-distance communication.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于光学的系统**：依赖于光子（光粒子）作为量子比特，因为它们有可能实现长距离通信。'
- en: '**Neutral Atoms**: These systems use individual atoms held in place by laser
    fields, with quantum states manipulated using light. Due to the natural uniformity
    of atoms, they promise scalability.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**中性原子**：这些系统使用激光场固定在原位的单个原子，通过光来操纵量子状态。由于原子的自然均匀性，它们承诺具有可扩展性。'
- en: '**Topological Qubits** are a theoretical approach based on exotic particles
    that encode information in their braided paths to produce more robust systems.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**拓扑量子比特**是一种基于奇异粒子的理论方法，这些粒子通过其编织路径编码信息，以产生更稳健的系统。'
- en: 'Though each of these systems has their own advantages and disadvantages, the
    challenges facing quantum computing overall are:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些系统各自都有其优势和劣势，但量子计算整体面临的挑战包括：
- en: Scalability Issues
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 规模化问题
- en: 'Scaling quantum systems is quite a complex challenge on different levels, including:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 规模化量子系统在不同层面上都是一个相当复杂的挑战，包括：
- en: '**Physical Limitations**:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**物理限制**：'
- en: Each qubit requires precise control and isolation from noise. As the number
    of qubits grows, maintaining control becomes exponentially more complicated.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个量子比特都需要精确的控制和从噪声中隔离。随着量子比特数量的增加，保持控制变得指数级复杂。
- en: Space and infrastructure requirements (like using cryogenic cooling for superconducting
    qubits) increase with system size.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 空间和基础设施需求（如使用超导量子比特的低温冷却）随着系统规模的增加而增加。
- en: '**Qubit Connectivity**:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**量子比特互连**：'
- en: Quantum algorithms often require qubits to interact with each other.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 量子算法通常需要量子比特相互交互。
- en: '**Control Systems**:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**控制系统**：'
- en: Scaling up requires complex control systems to manage each qubit’s operations
    without introducing additional noise or complexity.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 规模化需要复杂的控制系统来管理每个量子比特的操作，同时不引入额外的噪声或复杂性。
- en: '**Fabrication**:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**制造**：'
- en: Producing uniform, high-quality qubits at scale is a challenge for superconducting
    circuits or trapped ions because variability in manufacturing can lead to inconsistent
    performance.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在规模上生产均匀、高质量的量子比特对超导电路或捕获离子来说是一个挑战，因为制造中的可变性可能导致性能不一致。
- en: Error Rates and Decoherence
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 错误率和破坏性
- en: 'Unfortunately, quantum systems are susceptible to errors and loss of information
    due to their sensitivity to external factors. And that can happen in one of two
    ways:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，由于量子系统对外部因素的敏感性，它们容易受到错误和信息丢失的影响。这可以通过两种方式之一发生：
- en: '**Error Rates**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**错误率**'
- en: '**Gate Errors**: These are introduced during quantum gate operations due to
    imperfections in control pulses or environmental factors.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**门错误**：这些错误是在量子门操作过程中由于控制脉冲的不完美或环境因素而引入的。'
- en: '**Readout Errors**: Errors that occur when measuring qubits’ states. These
    can be due to imperfections in the measurement process or interference from neighboring
    qubits.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**读出错误**：在测量量子比特状态时发生的错误。这些错误可能源于测量过程中的不完美或来自邻近量子比特的干扰。'
- en: '**Cross-Talk**: Interaction between not intentionally entangled qubits can
    introduce errors during operations.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**串扰**：未有意纠缠的量子比特之间的相互作用可以在操作过程中引入错误。'
- en: Decoherence
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 破坏性
- en: Decoherence is the loss of a qubit’s quantum state due to interactions with
    its environment, such as thermal fluctuations, electromagnetic interference, or
    the quantum system’s imperfect isolation.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 破坏性是量子比特由于与其环境（如热波动、电磁干扰或量子系统的不完美隔离）的相互作用而失去其量子状态。
- en: Scientists and companies are working on different approaches to tackle these
    problems and finding solutions to build larger quantum computers using approaches
    like Quantum Error Correction.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 科学家和公司正在研究不同的方法来解决这些问题，并寻找使用量子纠错等方法的解决方案来构建更大的量子计算机。
- en: '**Software and Algorithmic Development**'
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**软件和算法开发**'
- en: '![Image by author](../Images/a5d1d9fd7924e65eb411bd5d0f7b18c8.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/a5d1d9fd7924e65eb411bd5d0f7b18c8.png)'
- en: Image by author
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The hardware aspect of quantum computing is not the only aspect still under
    development. For scientists and engineers to utilize the current hardware and
    help advance it, we need software that is on the same level (if not better) to
    implement algorithms that use the different strengths of quantum systems.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 量子计算硬件方面并不是唯一仍在开发中的方面。为了科学家和工程师利用当前硬件并推动其发展，我们需要软件达到相同水平（如果不是更好），以实现利用量子系统不同优势的算法。
- en: Today, scientists and anyone interested in quantum technology can start using
    quantum computers using open-source solutions like Qiskit, Cirq, and TKET to develop
    and implement algorithms for optimization problems (e.g., logistics, financial
    modeling), quantum chemistry and material science, and cryptography and its implications
    for cybersecurity.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，科学家和任何对量子技术感兴趣的人都可以开始使用Qiskit、Cirq和TKET等开源解决方案来开发和实现针对优化问题（例如，物流、金融建模）的算法，量子化学和材料科学，以及密码学和其对网络安全的含义。
- en: Though these tools are good for the time being, the software side of quantum
    is not moving as rapidly as the hardware side. We still need to develop tools
    along the stack to be ready to utilize the current and future hardware fully.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些工具目前很好，但量子软件方面的发展速度并不像硬件方面那样快。我们仍然需要开发堆栈中的工具，以便充分利用当前和未来的硬件。
- en: We need higher-level approaches to implementing algorithms, debugging and testing
    tools and strategies, and the ability to implement algorithms independently from
    the target hardware.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要更高级的方法来实现算法、调试和测试工具及策略，以及能够独立于目标硬件实现算法的能力。
- en: '* * *'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Final Thoughts
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Though quantum computers have come a long way from the research labs into practice,
    they still face many challenges. However, the field’s promise and the possible
    applications it can solve make it an excellent tool to improve our current technology.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管量子计算机已经从研究实验室走向实践，但它们仍然面临着许多挑战。然而，该领域的承诺和它能够解决的潜在应用使其成为改善我们当前技术的优秀工具。
- en: So, if you’re wondering if it is too late to get into quantum, I am here to
    tell you that it is not. In fact, 2025 is a great time to get into quantum and
    be part of this exciting field with many options.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你在想是否已经太晚进入量子领域，我想告诉你，并不是。事实上，2025年是进入量子领域并成为这个充满选择和激动人心的领域的绝佳时机。
- en: There are so many opportunities within the field that anyone can contribute
    to without the need to know quantum physics, mechanics, or even math.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 该领域内有许多机会，任何人都可以参与其中，而无需了解量子物理、力学，甚至数学。
- en: My goal in writing this article is to shed light on the field of quantum computing
    with a very brief summary of its current state.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇文章的目的是通过对其当前状态的简要总结来阐明量子计算领域。
