- en: How to Develop Complex DAX Expressions
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何开发复杂的DAX表达式
- en: 原文：[https://towardsdatascience.com/how-to-develop-complex-dax-expressions/](https://towardsdatascience.com/how-to-develop-complex-dax-expressions/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-develop-complex-dax-expressions/](https://towardsdatascience.com/how-to-develop-complex-dax-expressions/)
- en: '*At some point or another, any Power BI developer must write complex DAX expressions
    to analyze data. But nobody tells you how to do it. What’s the process for doing
    it? What is the best way to do it, and how supportive can a development process
    be? These are the questions I will answer here.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*在某个时候，任何Power BI开发者都必须编写复杂的DAX表达式来分析数据。但没有人告诉你如何做。这个过程是怎样的？最好的做法是什么，开发过程可以提供多少支持？这些问题我将在这里回答。*'
- en: Introduction
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Sometimes my clients ask me how I came up with the solution for a specific measure
    in DAX. My answer is always that I follow a specific process to find a solution.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 有时我的客户会问我如何为特定的DAX度量想出解决方案。我的回答总是，我遵循一个特定的过程来找到解决方案。
- en: Sometimes, the process is not straightforward, and I must deviate or start from
    scratch when I  see that I have taken the wrong direction.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，过程并不直接，当我看到我走错了方向时，我必须偏离或从头开始。
- en: 'But the development process is always the same:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但开发过程始终是一样的：
- en: '**1.** Understand the requirements.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 理解需求。'
- en: '**2.** Define the math to calculate the result.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 定义计算结果的数学公式。'
- en: '**3.** Understand if the measure must work in any or one specific scenario.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 确认该度量必须在任何或特定场景下工作。'
- en: '**4.** Start with intermediary results and work my way step-by-step until I
    fully understand how it should work and can deliver the requested result.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.** 从中间结果开始，逐步工作，直到我完全理解它应该如何工作，并能够交付所需的结果。'
- en: '**5.** Calculate the final result.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.** 计算最终结果。'
- en: The third step is the most difficult.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步是最困难的。
- en: 'Sometimes my client asks me to calculate a specific result in a particular
    scenario. But after I ask again, the answer is: Yes, I will also use it in other
    scenarios.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 有时我的客户会要求我在特定场景下计算一个特定的结果。但当我再次询问时，答案是：是的，我还会在其他场景中使用它。
- en: For example, some time ago, a client asked me to create some measures for a
    specific scenario in a report. I had to do it live during a workshop with the
    client’s team.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，不久前，一位客户要求我为报告中的特定场景创建一些度量。我不得不在客户团队的工作坊中现场完成这项工作。
- en: Days after I delivered the requested results, he asked me to create another
    report based on the same semantic model and logic we elaborated on during the
    workshop, but for a more flexible scenario.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在我交付了所需结果后的几天，他让我基于我们在研讨会中详细阐述的相同语义模型和逻辑，但针对一个更灵活的场景，创建另一份报告。
- en: The first set of measures was designed to work tightly with the first scenario,
    so I didn’t want to change them. Therefore, I created a new set of more generic
    measures.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第一组度量是为了与第一个场景紧密配合而设计的，所以我并不想改变它们。因此，我创建了一套更通用的新度量。
- en: Yes, this is a worst-case scenario, but it is something that can happen.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这是一个最坏的情况，但这是可能发生的事情。
- en: This was just an example of how important it is to take some time to thoroughly
    understand the needs and the possible future use cases for the requested measures.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个例子，说明了花时间彻底理解所需度量需求和可能的未来用例是多么重要。
- en: 'Step 1: The requirements'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步：需求
- en: For this piece, I take one measure from my previous article to calculate the
    linear extrapolation of my customer count.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这篇文章，我从我之前的一篇文章中选取了一个度量来计算客户数量的线性外推。
- en: 'The requirements are:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 需求是：
- en: Use the Customer Count Measure as the Basis Measure.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用客户数量度量作为基础度量。
- en: The user can select the year to analyze.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户可以选择要分析的年份。
- en: The user can select any other dimension in any Slicer.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户可以在任何切片器中选择任何其他维度。
- en: The User will analyze the result over time per month.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户将按月分析结果。
- en: The past Customer Count should be taken as the input values.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应将过去的客户数量作为输入值。
- en: The YTD growth rate must be used as the basis for the result.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须以YTD增长率作为结果的基础。
- en: Based on the YTD growth rate, the Customer Count should be extrapolated to the
    end of  the year.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据YTD增长率，客户数量应该外推到年底。
- en: The YTD Customer Count and the Extrapolation must be shown on the same Line-Chart.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YTD客户数量和外推必须显示在同一张折线图上。
- en: 'The result should look like this for the year 2022:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 对于2022年，结果应该看起来像这样：
- en: '![](../Images/dcb4e68194d782058df583273c83d391.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dcb4e68194d782058df583273c83d391.png)'
- en: Figure 1 – Requested result for the linear extrapolation of the Customer Count
    (Figure by the Author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 客户计数线性外推的请求结果（作者制图）
- en: OK, let’s look at how I developed this measure.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，让我们看看我是如何开发这个度量的。
- en: But before doing so, we must understand what the filter context is.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 但在这样做之前，我们必须理解过滤器上下文是什么。
- en: If you are already familiar with it, you can skip this section. Or you can read
    it anyway to ensure we are at the same level.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经熟悉它，你可以跳过这一节。或者你也可以随便读一读，以确保我们处于同一水平。
- en: 'Interlude: The filter context'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 间奏：过滤器上下文
- en: The filter context is the central concept of DAX.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤器上下文是DAX的核心概念。
- en: When writing measures in a semantic model, whether in Power BI, a fabric semantic
    model, or an analysis services semantic model, you must always understand the
    current filter context.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 当在语义模型中编写度量时，无论是在Power BI、fabric语义模型还是分析服务语义模型中，你必须始终理解当前的过滤器上下文。
- en: 'The filter context is:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤器上下文是：
- en: '*The sum of all Filters which affect the result of a DAX expression. *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '*影响DAX表达式结果的所有过滤器的总和。*'
- en: 'Look at the following picture:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 看看下面的图片：
- en: '![](../Images/9cd4d1afa009ff3302ac828b5800dbba.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9cd4d1afa009ff3302ac828b5800dbba.png)'
- en: 'Figure 2 – Ask yourself: What is the Filter Context of the marked cells? (Figure
    by the Author) Can you explain the Filter Context of the marked cells?'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – 自问：标记单元格的过滤器上下文是什么？（作者制图）你能解释标记单元格的过滤器上下文吗？
- en: 'Now, look at the following picture:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，看看下面的图片：
- en: '![](../Images/e9eea49f92aac5ffe48f7e4d5b1d2cf8.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e9eea49f92aac5ffe48f7e4d5b1d2cf8.png)'
- en: Figure 3 – All the Filters that affect the Filter Context of the marked cells
    (Figure by the Author)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – 影响标记单元格过滤器上下文的全部过滤器（作者制图）
- en: 'There are six filters, that affect the filter context of the marked cells for
    the two measures “Sum Retail Sales” and “Avg Retail Sales”:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 有六个过滤器，影响两个度量“总零售销售额”和“平均零售销售额”的标记单元格的过滤器上下文：
- en: The Store “Contoso Paris Store”
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商店“Contoso巴黎店”
- en: The City “Paris”
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 城市“巴黎”
- en: The ClassName “Economy”
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 类别名称“经济”
- en: The Month of April 2024
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2024年4月
- en: The Country “France”
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 国家“法国”
- en: The Manufacturer “Proseware Inc.”
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制造商“Proseware Inc.”
- en: The first three filters come from the visual. We can call them “Internal Filters”.
    They control how the Matrix-Visual can expand and how many details we can see.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 前三个过滤器来自视觉。我们可以称它们为“内部过滤器”。它们控制矩阵视觉如何扩展以及我们可以看到多少细节。
- en: The other filters are “External Filters”, which come from the Slicers or the
    Filter Pane in Power BI  and are controlled by the user.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 其他过滤器是“外部过滤器”，来自Power BI的切片器或过滤器面板，并由用户控制。
- en: The Power of DAX Measures lies in the possibility of extracting the value of
    the Filter Context and the capability of manipulating the Filter context.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: DAX度量的力量在于提取过滤器上下文值和操作过滤器上下文的能力。
- en: 'We do this when writing DAX expressions: We manipulate the filter context.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们这样做是在编写DAX表达式时：我们操作过滤器上下文。
- en: 'Step 2: Intermediary results'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤2：中间结果
- en: OK, now we are good to go.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们可以开始了。
- en: First, I do not start with the Line-Visual, but with a Table or a Matrix Visual.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我不从行视觉开始，而是从表格或矩阵视觉开始。
- en: This is because it’s easier to see the result as a number than a line.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为将结果看作一个数字比看作一条线更容易。
- en: Even though a linear progression is visible only as a line.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管线性进展只表现为一条线。
- en: However, the intermediary results are better readable in a Matrix.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，中间结果在矩阵中更容易阅读。
- en: 'If you are not familiar with working with Variables in DAX, I recommend [reading
    this piece](https://towardsdatascience.com/three-things-you-need-to-know-when-using-variables-in-dax-c67724862b57/),
    where  I explain the concepts for Variables:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不太熟悉在DAX中使用变量，我推荐[阅读这篇文章](https://towardsdatascience.com/three-things-you-need-to-know-when-using-variables-in-dax-c67724862b57/)，我在其中解释了变量的概念：
- en: The next step is to define the Base Measure. This is the Measure we want to
    use to calculate the intended Result.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是定义基本度量。这是我们想要用来计算预期结果的度量。
- en: 'As we want to calculate the YTD result, we can use a YTD Measure for the Customer
    Count:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们想要计算YTD结果，我们可以使用客户计数的YTD度量：
- en: '[PRE0]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now we must consider what to do with these intermediary results.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们必须考虑如何处理这些中间结果。
- en: This means that we must define the arithmetic of the Measure.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们必须定义度量的算术。
- en: For each month, I must calculate the last known Customer Count YTD.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个月，我必须计算已知的最后客户计数YTD。
- en: This means, I always want to calculate 2,091 for each month. This is the last
    YTD Customer  Count for the year 2022.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，我总是想为每个月计算2,091。这是2022年的最后一个YTD客户计数。
- en: Then, I want to divide this result by the last month with Sales, in this case
    6, for June. Then multiply it by the current month number.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我想将这个结果除以最后一个有销售记录的月份，在这个例子中是6月，然后乘以当前月份编号。
- en: Therefore, the first intermediary result is to know when the last Sale was made.
    We must get the latest date in the Online Sales table for this.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，第一个中间结果是知道最后一次销售是在什么时候。我们必须获取在线销售表中的最新日期。
- en: According to the requirements, the User can select any year to analyze, and
    the result must be calculated monthly.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 根据要求，用户可以选择任何年份进行分析，并且结果必须按月计算。
- en: 'Therefore, the correct definition is: I must first know the month when the
    last sale was made for the selected year.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，正确的定义是：我必须首先知道所选年份最后一次销售发生的月份。
- en: 'The Fact table contains a date and a Relationship to the Date table, which
    includes the month number (Column: [Month]).'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 事实表包含一个日期和与日期表的关联，该日期表包括月份编号（列：[月份]）。
- en: 'So, the first variable will be something like this:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，第一个变量将类似于这样：
- en: '[PRE1]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'This is the result:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这是结果：
- en: '![](../Images/9eb7d7ef8a927a4594c4a4f66d1c4879.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9eb7d7ef8a927a4594c4a4f66d1c4879.png)'
- en: Figure 4 – Get the last month with Sales (Figure by the Author)
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 获取最后一个有销售记录的月份（作者制图）
- en: 'Hold on: We must always get the last month with sales. As it is now, we always
    get the same month as the Month of the current row.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 等一下：我们必须始终获取最后一个有销售记录的月份。现在，我们总是得到与当前行月份相同的月份。
- en: This is because each row has the Filter Context set to each month.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为每一行都将过滤器上下文设置为每个月。
- en: 'Therefore, we must remove the Filter for the Month, while retaining the Year.
    We can do this with `ALLEXCEPT()`:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们必须移除月份的过滤器，同时保留年份。我们可以使用 `ALLEXCEPT()` 来做到这一点：
- en: '[PRE2]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Now, the result looks much better:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，结果看起来好多了：
- en: '![](../Images/a959b5d33cc8a9ea734d2c07d5d4ac37.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a959b5d33cc8a9ea734d2c07d5d4ac37.png)'
- en: Figure 5 – Last month with Sales calculated for all months (Figure by the Author)
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 上个月为所有月份计算了销售（作者制图）
- en: As we calculate the result for each month, we must know the month number of
    the current row (Month). We will reuse this as the factor for which we multiply
    the Average to get the linear extrapolation.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算每个月的结果时，我们必须知道当前行的月份编号（月份）。我们将重复使用这个作为乘以平均值的因子，以获得线性外推。
- en: 'The next intermediary result is to get the Month number:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个中间结果是获取月份编号：
- en: '[PRE3]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'I can leave the first Variable in place and only use the MaxMonth variable
    after the return. The result shows the month number per month:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以保留第一个变量不变，并在返回后仅使用MaxMonth变量。结果显示每个月的月份编号：
- en: '![](../Images/1a05587e8469eb52a5d3a430902b05dd.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1a05587e8469eb52a5d3a430902b05dd.png)'
- en: Figure 6 – Get the current month number per row (Figure by the Author)
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 获取每行的当前月份编号（作者制图）
- en: According to the definition formulated before, we must get the last Customer
    Count YTD for the latest month with Sales.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 根据之前制定的定义，我们必须获取最后一个有销售记录的月份的最后客户计数YTD。
- en: 'I can do this with the following Expression:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以用以下表达式做到这一点：
- en: '[PRE4]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'As expected, the result shows 2,091 for each month:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，结果显示每个月都是2,091：
- en: '![](../Images/91d9dd8c42f5bdf2a7b886cb71c3ebd3.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/91d9dd8c42f5bdf2a7b886cb71c3ebd3.png)'
- en: Figure 7 – Calculating the latest Customer Count YTD for each month (Figure
    by the Author)
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图7 – 每月计算最新的客户计数YTD（作者制图）
- en: You can see why I start with a table or a Matrix when developing complex Measures.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到为什么我在开发复杂度量时总是从表格或矩阵开始。
- en: Now, imagine that one intermediary result is a date or a text.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下，一个中间结果是一个日期或文本。
- en: Showing such a result in a line visual will not be practical.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 以线条图的形式展示这样的结果并不实用。
- en: We are ready to calculate the final result according to the mathematical definition
    above.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经准备好根据上述数学定义计算最终结果。
- en: 'Step 3: The final result'
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步：最终结果
- en: 'We have two ways to calculate the result:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两种计算结果的方法：
- en: 1\. Write the expression after the `RETURN` statement.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在 `RETURN` 语句之后编写表达式。
- en: '2\. Create a new Variable “Result” and use this Variable after the RETURN statement.
    The final Expression is this:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创建一个新的变量“结果”，并在 `RETURN` 语句之后使用这个变量。最终的表达式是这样的：
- en: '[PRE5]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The first Variant looks like this:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个变体看起来像这样：
- en: '[PRE6]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'This is the second Variant:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这是第二个变体：
- en: '[PRE7]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The result is the same.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是相同的。
- en: The second variant allows us to quickly switch back to the Intermediary results
    if the final result  is incorrect without needing to set the expression after
    the `RETURN` statement as a comment.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种变体允许我们在最终结果不正确时快速切换回中间结果，而无需将 `RETURN` 语句后的表达式设置为注释。
- en: It simply makes life easier.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 它只是让生活变得更简单。
- en: But it’s up to you which variant you like more.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 但选择哪种变体取决于您。
- en: 'The result is this:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 结果如下：
- en: '![](../Images/402f1f260ed2dc570766f14c910f601b.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/402f1f260ed2dc570766f14c910f601b.png)'
- en: Figure 8 – Final result in a table (Figure by the Author)
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8 – 表格中的最终结果（图由作者绘制）
- en: When converting this table to a Line Visual, we get the same result as in the
    first figure. The last step will be to set the line as a Dashed line, to get the
    needed visualization.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 当将此表转换为折线图时，我们得到与第一图相同的结果。最后一步是将线条设置为虚线，以获得所需的可视化。
- en: '![](../Images/a52951b1012a41ffaf698337180be686.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a52951b1012a41ffaf698337180be686.png)'
- en: Figure 9 – Set the line for the extrapolation as a dashed line (Figure by the
    Author)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9 – 将外推线的线条设置为虚线（图由作者绘制）
- en: Complex calculated columns
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 复杂的计算列
- en: The process is the same when writing complex DAX expressions for calculated
    columns. The difference is that we can see the result in the Table View of Power
    BI Desktop.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 当为计算列编写复杂的 DAX 表达式时，过程是相同的。区别在于我们可以在 Power BI Desktop 的表格视图中看到结果。
- en: Be aware that when calculated columns are calculated, the results are physically
    stored in the table when you press Enter.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，当计算列被计算时，当您按下 Enter 键，结果会物理地存储在表中。
- en: The results of Measures are not stored in the Model. They are calculated on
    the fly in the Visualizations.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: Measures 的结果不会存储在模型中。它们在可视化中实时计算。
- en: Another difference is that we can leverage Context Transition to get our result
    when we need it to depend on other rows in the table.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个区别在于，我们可以利用上下文转换在需要时根据表中的其他行获取结果。
- en: 'Read this piece to learn more about this fascinating topic:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读这篇文章了解更多关于这个有趣话题的信息：
- en: '[What’s fancy about context transition in DAX](https://towardsdatascience.com/whats-fancy-about-context-transition-in-dax-efb5d5bc4c01/)'
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[DAX 中上下文转换的奇妙之处](https://towardsdatascience.com/whats-fancy-about-context-transition-in-dax-efb5d5bc4c01/)'
- en: Conclusion
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'The development process for complex expressions always follows the same steps:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂表达式的开发过程始终遵循相同的步骤：
- en: '**1.** Understand the requirements – Ask if something is unclear.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 理解需求 – 如果有不清楚的地方，请提问。'
- en: '**2.** Define the math for the results.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 定义结果的数学公式。'
- en: '**3.** Start with intermediary results and understand the results.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 从中间结果开始，并理解结果。'
- en: '**4.** Build on the intermediary results one by one – Do not try to write all
    in one step.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.** 逐个构建中间结果 – 不要尝试一次性写完所有内容。'
- en: '**5.** Decide where to write the expression for the final result.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.** 决定在哪里编写最终结果的公式。'
- en: Following such a process can save you the day, as you don’t need to write everything
    in one step.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 按照这样的流程可以帮您解决问题，因为您不需要一次性写完所有内容。
- en: Moreover, getting these intermediary results allows you to understand what’s
    happening and explore the Filter Context.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，获取这些中间结果允许您了解正在发生的事情并探索筛选上下文。
- en: This will help you learn DAX more efficiently and build even more complex stuff.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这将帮助您更有效地学习 DAX 并构建更复杂的内容。
- en: 'But, be aware: Even though a certain level of complexity is needed, a good
    developer will keep it as simple as possible, while maintaining the least amount
    of complexity.'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 但请注意：尽管需要一定程度的复杂性，但优秀的开发者会尽可能保持简单，同时保持最小的复杂性。
- en: References
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考资料
- en: '[Here](https://towardsdatascience.com/calculating-a-linear-extrapolation-or-trend-in-dax-72a5705d949c/)
    is the article mentioned at the beginning of this piece, to calculate the linear
    interpolation.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '[这里](https://towardsdatascience.com/calculating-a-linear-extrapolation-or-trend-in-dax-72a5705d949c/)是本文开头提到的文章，用于计算线性外推。'
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the  ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如同我之前的文章，我使用了 Contoso 示例数据集。您可以从微软[这里](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载
    ContosoRetailDW 数据集。
- en: The Contoso Data can be freely used under the MIT License, as described [here](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 根据描述，Contoso 数据可以在 MIT 许可证下自由使用[这里](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)。我将数据集更改以将数据移至当代日期。
