- en: Should Businesses Really Hear Their Customers’ Voices?
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 企业真的应该倾听客户的声音吗？
- en: In a rapidly evolving world that is getting more and more AI-driven every instant,
    businesses now need to constantly seek a competitive edge to remain sustainable.
    Companies may do this by regularly observing and analyzing customer opinions regarding
    their products and services. They achieve this by assessing comments from many
    sources, both online and offline. Identifying positive and negative trends in
    customer feedback allows them to fine-tune product features and design marketing
    strategies that meet the needs of customers.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个快速发展的世界中，每一刻都变得更加以人工智能驱动，企业现在需要不断寻求竞争优势以保持可持续性。公司可以通过定期观察和分析客户对其产品和服务意见来做到这一点。他们通过评估来自许多来源的评论来实现这一点，包括在线和离线。识别客户反馈中的正面和负面趋势，使他们能够微调产品特性，并设计满足客户需求的营销策略。
- en: Thus, customer opinions need to be discerned appropriately to find valuable
    insights that can help make informed business decisions.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，需要适当地辨别客户意见，以找到有价值的见解，这有助于做出明智的商业决策。
- en: Familiarizing Yourself with Sentiment Analysis
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 熟悉情感分析
- en: Sentiment analysis, a part of natural language processing (NLP), is a popular
    technique today because it studies people’s opinions, sentiments, and emotions
    in any given text. Businesses can understand public opinion, monitor brand reputation,
    and improve customer experiences by applying sentiment analysis to their collected
    feedback, which contains valuable information, but its unstructured nature can
    make it difficult to analyze. By regularly analyzing customer sentiments, companies
    can identify their strengths and weaknesses, decide on how to boost product development,
    and build better marketing strategies.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析，作为自然语言处理（NLP）的一部分，是一种流行的技术，因为它研究任何给定文本中人们的意见、情感和情绪。通过将情感分析应用于他们收集到的包含有价值信息的反馈，企业可以理解公众舆论，监控品牌声誉，并改善客户体验。然而，其非结构化的性质可能会使其难以分析。通过定期分析客户情感，公司可以识别其优势和劣势，决定如何提升产品开发，并构建更好的营销策略。
- en: Powerful packages for sentiment analysis in both Python and R enable businesses
    to uncover valuable patterns, track sentiment trends, and make data-driven decisions.
    In this article, we will explore how to use different packages (**[Quanteda](https://cran.r-project.org/web/packages/quanteda/readme/README.html),
    [Sentimentr](https://cran.r-project.org/web/packages/sentimentr/index.html)**
    and **[Textstem](https://cran.r-project.org/web/packages/textstem/index.html)**)
    to perform sentiment analysis on customer feedback by processing, analyzing, and
    visualizing textual data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: Python 和 R 中的强大情感分析包使企业能够揭示有价值模式，跟踪情感趋势，并做出数据驱动的决策。在本文中，我们将探讨如何使用不同的包（**[Quanteda](https://cran.r-project.org/web/packages/quanteda/readme/README.html)**，[Sentimentr](https://cran.r-project.org/web/packages/sentimentr/index.html)**
    和 **[Textstem](https://cran.r-project.org/web/packages/textstem/index.html)**）通过处理、分析和可视化文本数据来对客户反馈进行情感分析。
- en: Adding a Real-world Context
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 添加现实世界背景
- en: For this tutorial, let us consider a fictional tech company, PhoneTech, that
    has recently launched a new smartphone in the budget segment for its young audience.
    Now, they want to know the public perception of their newly launched product and,
    hence, want to analyze the customer feedback from social media, online reviews,
    and customer surveys.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个教程，让我们考虑一家虚构的科技公司 PhoneTech，它最近为其年轻受众推出了一个预算范围内的新智能手机。现在，他们想了解公众对其新产品的看法，因此想分析来自社交媒体、在线评论和客户调查的客户反馈。
- en: 'To achieve this, PhoneTech needs to use sentiment analysis to find product
    strengths and weaknesses, guide product development, and adjust marketing strategies.
    For example, PhoneTech has collected feedback from various platforms like **social
    media** (e.g., informal comments like "The camera is 🔥 but battery life 😒 . #Disappointed"),
    **online reviews** (e.g., semi-structured comments such as "Amazing build quality!
    ⭐⭐⭐⭐ Battery could last longer, though"), and **customer surveys** (e.g., structured
    responses to questions like "What do you like/dislike about the product?").'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '为了实现这一点，PhoneTech需要使用情感分析来找出产品的优势和劣势，指导产品开发，并调整营销策略。例如，PhoneTech已从各种平台收集反馈，如**社交媒体**（例如，非正式评论如“相机很棒
    🔥 但电池续航 😒 . #失望”）、**在线评论**（例如，半结构化评论如“惊人的构建质量！ ⭐⭐⭐⭐ 电池续航可以更长一些”），以及**客户调查**（例如，对“您喜欢/不喜欢产品的哪些方面？”等问题的结构化回答）。'
- en: It’s important to note that customer feedback often includes informal language,
    emojis, and specific terms. We can use R packages to clean, tokenize, and analyze
    this data in order to turn raw text into actionable business insights.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，客户反馈通常包括非正式语言、表情符号和特定术语。我们可以使用R包来清理、分词和分析这些数据，以便将原始文本转化为可操作的商业洞察。
- en: Implementing Sentiment Analysis
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施情感分析
- en: Next, we’ll build a model for sentiment analysis in R using the chosen `quanteda`package.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将使用选定的`quanteda`包在R中构建情感分析模型。
- en: 1\. Importing necessary packages and dataset
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 导入必要的包和数据集
- en: 'For evaluating sentiments in a given dataset, we need several packages, including
    `dplyr` to manipulate the data of customer feedback entries, `quanteda`**(License:
    [GPL-3.0 license](https://github.com/quanteda/quanteda#GPL-3.0-1-ov-file)**) for
    text analysis, and `quanteda.textplots` to create a word cloud. Additionally,
    `tidytext` **(License: [[MIT](https://cran.r-project.org/web/licenses/MIT)](https://cran.r-project.org/web/licenses/MIT)
    + file [[LICENSE](https://cran.r-project.org/web/packages/sentimentr/LICENSE)](https://cran.r-project.org/web/packages/tidytext/LICENSE))**
    to use sentiment lexicons for scoring while `ggplot2` will be used for data visualization,
    `textstem` **(License: [GPL-2](https://cran.r-project.org/web/licenses/GPL-2))**
    will aid in text stemming and lemmatization, `sentimentr` **(License: MIT + file
    LICENSE)** will be utilized for sentiment analysis, and `RColorBrewer` will provide
    color palettes for our visualizations.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估给定数据集中的情感，我们需要几个包，包括`dplyr`来操作客户反馈条目的数据，`quanteda`**(许可：[GPL-3.0许可](https://github.com/quanteda/quanteda#GPL-3.0-1-ov-file)**)用于文本分析，以及`quanteda.textplots`来创建词云。此外，`tidytext`
    **(许可：[MIT](https://cran.r-project.org/web/licenses/MIT)](https://cran.r-project.org/web/licenses/MIT)
    + 文件 [[LICENSE](https://cran.r-project.org/web/packages/sentimentr/LICENSE)](https://cran.r-project.org/web/packages/sentimentr/LICENSE))**
    用于使用情感词典进行评分，而`ggplot2`将用于数据可视化，`textstem` **(许可：[GPL-2](https://cran.r-project.org/web/licenses/GPL-2))**
    将帮助进行文本词干提取和词元还原，`sentimentr` **(许可：MIT + 文件 LICENSE)** 将用于情感分析，而`RColorBrewer`将为我们的可视化提供调色板。
- en: These can be easily installed with the following command-
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这些包可以通过以下命令轻松安装-
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'After installation, we can load the packages as:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，我们可以按以下方式加载包：
- en: '[PRE1]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Dataset for customer reviews**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**客户评论数据集**'
- en: In the case of the real-world dataset, this data would actually be scraped using
    multiple tools from various social media platforms. The collected data would represent
    the feedback that includes informal language, emojis, and domain-specific terms.
    Such a combined dataset can allow for a detailed analysis of customer sentiments
    and opinions across different sources.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界数据集的情况下，这些数据实际上会使用来自各种社交媒体平台的多款工具进行抓取。收集到的数据将代表包含非正式语言、表情符号和特定领域术语的反馈。这样的综合数据集可以允许对来自不同来源的客户情感和意见进行详细分析。
- en: However, for this tutorial, let us use a synthetic dataset generated in R using
    packages that cover these above points. The dataset with 200 rows represents customer
    feedback (~2–3 sentences in each row) from different sources and includes raw
    text with emojis and symbols, abbreviations, etc., mimicking real-world scenarios.
    These sentences are simply a generic representation of the reviews commonly seen
    on e-commerce or product websites (talk about keywords such as UI, design, phone
    features and price, experienced battery life, customer service support, etc.)
    and are combined in random patterns with emojis for creating a review text.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于本教程，让我们使用在R中生成的合成数据集，这些数据集通过包含上述点的包来生成。包含200行的数据集代表了来自不同来源的客户反馈（每行约2-3句话），包括带有表情符号和符号的原始文本、缩写等，模拟现实世界场景。这些句子只是电子商务或产品网站上常见评论的通用表示（讨论UI、设计、手机功能、价格、电池寿命、客户服务支持等关键词），并且与表情符号随机组合以创建评论文本。
- en: You can find the synthetic dataset generated using R on GitHub [here](https://github.com/Devashree21/Decision-Making-with-Sentiment-Analysis-in-R/blob/main/sentiment_data.csv).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在GitHub上找到使用R生成的合成数据集[这里](https://github.com/Devashree21/Decision-Making-with-Sentiment-Analysis-in-R/blob/main/sentiment_data.csv)。
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/e82f080ba9253d47a8ae3265753c72ef.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e82f080ba9253d47a8ae3265753c72ef.png)'
- en: Since the dataset has a lot of text, let’s print a few words per row for the
    dataset overview.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据集中有很多文本，让我们每行打印一些单词来概述数据集。
- en: To achieve this, we’ll first define a function to extract the first few words
    from each feedback entry in our dataset. We’ll then randomly sample 5 rows from
    the dataset and apply the function to truncate the feedback text. Finally, we’ll
    print the resulting data frame to get an idea of the feedback text.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点，我们首先定义一个函数来从数据集中的每个反馈条目中提取前几个单词。然后，我们将从数据集中随机抽取5行，并应用该函数来截断反馈文本。最后，我们将打印结果数据帧，以了解反馈文本。
- en: '[PRE3]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/43a5f9b0107dcb920a5f045ae9094cbd.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/43a5f9b0107dcb920a5f045ae9094cbd.png)'
- en: 2\. Preprocessing Text Data
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 预处理文本数据
- en: 'Before moving to text analysis, we need to preprocess the text to ensure a
    clean and consistent format. Preprocessing will involve several key steps:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行文本分析之前，我们需要对文本进行预处理，以确保格式干净且一致。预处理将涉及几个关键步骤：
- en: '**Text Cleaning** which includes removal of punctuation, numbers, and special
    characters;'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文本清理**，包括移除标点符号、数字和特殊字符；'
- en: '**Text Normalizing** which includes conversion of the alphabets to lowercase;'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文本归一化**，这包括将字母转换为小写；'
- en: '**Tokenizing the text** which includes splitting the text into individual words
    or tokens;'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分词文本**，这包括将文本分割成单个单词或标记；'
- en: '**Removing stop words** which includes intentional removal of words that do
    not contribute to sentiment analysis (e.g., "the," "and"); and finally,'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**移除停用词**，这包括有意移除对情感分析不贡献的单词（例如，“the”、“and”）；最后，'
- en: '**Stemming or lemmatizing the text** where the words are reduced to their root
    forms. These steps help lessen the noise and improve the accuracy of the analysis.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**词干提取或词形还原**，其中单词被还原到其基本形式。这些步骤有助于减少噪声并提高分析的准确性。'
- en: Now, we’ll implement the above preprocessing steps on our dataset.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将对数据集实施上述预处理步骤。
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: In this code, we convert the dataset’s text column into a quanteda corpus object.
    We clean the text by tokenizing it, which involves removing punctuation, numbers,
    and symbols, converting all words to lowercase, and filtering out common stopwords.
    Finally, stemming is applied to reduce words to their root forms, such as changing
    "running" to "run," to ensure consistency in text analysis. It is important to
    note here that we haven’t used stemming since it can cause partial or incomplete
    extraction of words due to the simplification of words to root forms. In another
    way, it applies simple rules to chop off the ends of words. For example, the algorithm
    might remove the suffix "-ing" from "amazing," resulting in "amaz," or "terrible"
    could be "terribl". To avoid that and get more accurate root forms, instead, we’ll
    use lemmatization, which is a more sophisticated process that relies on dictionaries
    to map words and considers the context and part of speech of the words to return
    their base or dictionary forms.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代码中，我们将数据集的文本列转换为quanteda语料库对象。我们通过分词来清理文本，这包括去除标点符号、数字和符号，将所有单词转换为小写，并过滤掉常见的停用词。最后，应用词干提取以将单词还原到其基本形式，例如将"running"改为"run"，以确保文本分析的一致性。在此需要注意的是，我们没有使用词干提取，因为它可能会由于将单词简化为基本形式而导致部分或不完整的单词提取。从另一方面来说，它应用简单的规则来截断单词的末尾。例如，算法可能会从"amazing"中移除后缀"-ing"，得到"amaz"，或者"terrible"可能变成"terribl"。为了避免这种情况并获得更准确的根形式，我们将使用词元化，这是一个更复杂的过程，它依赖于词典来映射单词，并考虑单词的上下文和词性，以返回它们的基形式或词典形式。
- en: Now that we have cleaned and tokenized the text data, we can move on to the
    next step. Our goal is to analyze the sentiments in the feedback entries. We will
    use the sentimentr package to evaluate the sentiments in our structured data,
    providing insights into the emotional tone of the feedback entries.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经清理并分词了文本数据，我们可以进行下一步。我们的目标是分析反馈条目中的情感。我们将使用sentimentr包来评估结构化数据中的情感，从而深入了解反馈条目的情感基调。
- en: 3\. Performing Sentiment Analysis Using Sentimentr package
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 使用Sentimentr包进行情感分析
- en: Now, we can perform sentiment analysis on these sentences with the sentiment
    function from the `sentimentr` package. This function calculates sentiment scores
    for each piece of text, identifying positive and negative words.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以使用来自`sentimentr`包的`sentiment`函数对这些句子进行情感分析。此函数为每段文本计算情感分数，识别出积极和消极的词汇。
- en: Next, we summarize the sentiment scores for each document. We group the scores
    by document and calculate the total number of positive and negative words. We
    also calculate a compound score and categorize the overall sentiment as either
    positive or negative.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们总结每个文档的情感分数。我们将分数按文档分组，计算积极和消极词汇的总数。我们还计算一个复合分数，并将整体情感分为积极或消极。
- en: '[PRE5]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Finally, we merge this sentiment summary with the original text data and print
    the results. This gives us a clear, concise evaluation of the sentiment in our
    dataset.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将这个情感摘要与原始文本数据合并，并打印结果。这为我们提供了对数据集中情感的一个清晰、简洁的评价。
- en: '[PRE6]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/f403e1849e5b7b84b99597290b4201a7.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f403e1849e5b7b84b99597290b4201a7.png)'
- en: The output table clearly shows the positive and negative word count per review
    in each row along with the compound score as well as the predictive sentiment.
    At a glance, the model does a reasonably good job of sorting positive and negative
    reviews. Although some reviews clearly look negative (e.g. "Would not recommend….")
    due to the incomplete display of the review content in a table, it is quite likely
    that there are more positive keywords (satisfies, best, good, etc) contained in
    that particular review that resulted in a positive sentiment as per the model
    evaluation. Hence, such reviews need to be carefully reviewed separately before
    being included in the interpretation of the results for decision-making.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 输出表格清晰地显示了每行每个评论的积极和消极词汇计数，以及复合分数和预测情感。一眼看去，模型在排序积极和消极评论方面做得相当不错。尽管由于评论内容在表格中的不完全显示，一些评论明显看起来是负面的（例如，“不会推荐……”），但很可能在该特定评论中包含更多积极关键词（如satisfies、best、good等），根据模型评估导致积极情感。因此，在将这些评论包含在结果解释和决策制定之前，需要仔细单独审查这些评论。
- en: Next, we need to print a Document-Feature Matrix (DFM) which is a structured
    representation of the text where rows represent documents and columns represent
    features (words). Each cell contains the frequency of a specific word in a document.
    Here, the cleaned corpus is transformed into a DFM, making it ready for statistical
    analysis and visualization.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要打印一个文档-特征矩阵（DFM），它是对文本的结构化表示，其中行代表文档，列代表特征（单词）。每个单元格包含文档中特定单词的频率。在这里，清洗后的语料库被转换成DFM，使其准备好进行统计分析与可视化。
- en: '[PRE7]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This section calculates sentiment metrics for each text entry. Positive and
    negative word counts are summed, and a compound score is computed as the difference
    between these counts. A positive compound score indicates positive sentiment and
    a negative score indicates negative sentiment. This information is combined with
    the original text for a comprehensive sentiment evaluation.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 本节计算每个文本条目的情绪指标。将正面和负面单词计数相加，并计算一个复合分数，作为这些计数的差值。正的复合分数表示正面情绪，负的分数表示负面情绪。这些信息与原始文本结合，进行全面的情绪评估。
- en: 4\. Analyzing Sentiment Proportions
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 分析情绪比例
- en: '[PRE8]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/b5c583af560bd0d9c80dd4ab78ebab3e.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b5c583af560bd0d9c80dd4ab78ebab3e.png)'
- en: To understand the overall sentiment distribution, we calculate the proportions
    of positive and negative sentiments in the dataset. Grouping by sentiment type,
    the count of entries in each category is calculated and normalized to derive their
    proportions.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解整体的情绪分布，我们计算数据集中正负情绪的比例。按情绪类型分组，计算每个类别的条目数，并将其归一化以得出其比例。
- en: 5\. Visualizing Sentiment Distribution
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 可视化情绪分布
- en: We’ll create a bar chart in `ggplot2` to visualize the proportions of positive
    and negative sentiments for an intuitive visualization of the sentiment distribution,
    making it easy to observe which type of sentiment seems dominant.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在 `ggplot2` 中创建一个柱状图来可视化正负情绪的比例，以便直观地展示情绪分布，使观察哪种情绪似乎占主导地位变得容易。
- en: '[PRE9]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![Image by Author](../Images/1bce41f44dad9d500587f335565b1d9e.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/1bce41f44dad9d500587f335565b1d9e.png)'
- en: Image by Author
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: In our dataset, positive sentiment seems dominant. Hence, a larger proportion
    of the customers are happy with PhoneTech’s product.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的数据集中，正面情绪似乎占主导地位。因此，大多数客户对PhoneTech的产品表示满意。
- en: 6\. Visualizing Top Terms
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 可视化高频词
- en: '[PRE10]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![Image by Author](../Images/317a409a8c5796638b57666f8b8761d0.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/317a409a8c5796638b57666f8b8761d0.png)'
- en: Image by Author
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: The 5 most frequent terms in the dataset seem to be "recommend", "design", "smartphone",
    "display," and "terrible". Although such words are not very useful standalone
    for understanding sentiment, PhoneTech personnel could dig deeper into how these
    words are associated with the product in the reviews and build some other plots
    to add more context in which it would be clear whether these words are used in
    a certain review.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集中出现频率最高的5个词似乎是“recommend”（推荐）、“design”（设计）、“smartphone”（智能手机）、“display”（显示）和“terrible”（糟糕）。尽管这些词单独使用并不很有助于理解情绪，但PhoneTech人员可以深入挖掘这些词在评论中与产品的关联，并构建一些其他图表，以增加更多上下文，从而清楚地了解这些词是否在某个评论中使用。
- en: So, let’s filter out the positive feedback, create a DFM, and plot again to
    see what customers are really saying about the product.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们过滤掉正面反馈，创建一个DFM，并再次绘图，看看客户真正对产品说了什么。
- en: '[PRE11]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![Image by Author](../Images/70f0dc34d12b8f539c16f1d0dec9a683.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/70f0dc34d12b8f539c16f1d0dec9a683.png)'
- en: Image by Author
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: The product performance, smartphone (could likely indicate brand), display,
    and design seem to be the most talked about in the dataset.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据集中，产品性能、智能手机（可能表明品牌）、显示和设计似乎是最常讨论的。
- en: Another way to visualize these sentiments in our dataset is by generating a
    word cloud and fine-tuning the word frequencies using the `max_words` parameter
    as needed.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的数据集中可视化这些情绪的另一种方法是生成一个词云，并根据需要使用 `max_words` 参数微调词频。
- en: 7\. Generating a Word Cloud
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 生成词云
- en: '[PRE12]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We can also display the most frequent terms in an engaging and intuitive format
    with the use of word cloud when working on sentiment analysis tasks. It is important
    to note that larger words indicate higher frequencies, and this plot is particularly
    useful for quickly identifying key themes in the given dataset.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行情绪分析任务时，我们还可以使用词云以引人入胜和直观的方式显示最频繁的词。需要注意的是，较大的词表示更高的频率，这个图表特别有助于快速识别给定数据集中的关键主题。
- en: '![Image by Author](../Images/a2c8389f670dbf35aef1f41c18754906.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/a2c8389f670dbf35aef1f41c18754906.png)'
- en: Image by Author
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: For the PhoneTech team, it might be worth considering two separate positive
    and negative word clouds to understand better what the most loved feature of the
    product is and what the pain point is.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 对于PhoneTech团队来说，考虑两个分别针对正面和负面的词云可能值得考虑，以更好地了解产品最被喜爱的功能和痛点。
- en: 8\. Sampling and Reviewing Sentiments
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 样本和审查情感
- en: Finally, we’ll print five random sentences from the dataset to inspect their
    sentiment evaluation results. This will help us validate the sentiment analysis
    outputs and gain insights into individual entries.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将从数据集中随机打印五句话来检查其情感评估结果。这将帮助我们验证情感分析输出并深入了解单个条目。
- en: '[PRE13]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![](../Images/ff04ccbda0016e093a1db25b128ecf80.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ff04ccbda0016e093a1db25b128ecf80.png)'
- en: So, all the above steps form a comprehensive pipeline for analyzing textual
    data as well as extracting valuable insights. Together, these steps help to transform
    raw text into actionable insights, supporting data-driven decision-making for
    any company.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，上述所有步骤形成了一个分析文本数据以及提取有价值见解的全面流程。这些步骤共同帮助将原始文本转化为可操作的见解，支持任何公司的数据驱动决策。
- en: Interpreting Sentiment Analysis Results
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解释情感分析结果
- en: It is crucial to assess and evaluate the findings of the sentiment analysis
    correctly. **** For this, we generated a Document-Feature Matrix (DFM) to find
    top words and overall sentiment distribution, helping us understand the overall
    customer mood and identify patterns in the feedback. Additionally, our model generated
    sentiment scores to provide an idea about the tone of the reviews.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 正确评估和评估情感分析的结果至关重要。****为此，我们生成了一个文档-特征矩阵（DFM），以找到顶级词汇和整体情感分布，帮助我们了解整体客户情绪并在反馈中识别模式。此外，我们的模型生成了情感分数，以提供关于评论语气的概念。
- en: For example, PhoneTech finds that **68%** of the feedback is positive, with
    the top words being "design" and "performance," it highlights key selling points
    for marketing. Conversely, the remaining **32%** of reviews, i.e., negative comments,
    talk about customer service and poor photos, indicate potential areas for improvement.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，PhoneTech发现**68%**的反馈是正面的，最常用的词汇是“设计”和“性能”，这突出了营销的关键销售点。相反，剩余的**32%**的评论，即负面评论，讨论了客户服务和糟糕的图片，表明了潜在的改进领域。
- en: Comparing sentiment trends over time or across sources, such as social media
    versus online reviews, helps identify shifts in customer perception. An accurate
    interpretation is important for making informed decisions and developing targeted
    strategies.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 比较随时间或跨来源（如社交媒体与在线评论）的情感趋势，有助于识别客户感知的变化。准确的解释对于做出明智的决定和制定针对性策略至关重要。
- en: While the model seems to effectively identify positive and negative reviews,
    further steps can involve fine-tuning the model to sort neutral reviews, if any,
    for a more comprehensive analysis.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然模型似乎能够有效地识别正面和负面评论，但进一步的步骤可以包括微调模型以对中性评论（如果有的话）进行排序，以进行更全面的分析。
- en: Applying Sentiment Insights to Fine-tune Strategy
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将情感见解应用于微调策略
- en: The sentiment analysis has revealed some key areas of product improvement and
    its strengths for PhoneTech that can be leveraged to enhance its business. By
    addressing both positive and negative customer feedback, PhoneTech can drive overall
    satisfaction and attract more buyers.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析揭示了PhoneTech产品改进的关键领域及其优势，这些优势可以用来提升其业务。通过解决正面和负面的客户反馈，PhoneTech可以推动整体满意度并吸引更多买家。
- en: 'Based on sentiment analysis results, PhoneTech could identify the following
    actionable insights and strategies to improve its business:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 根据情感分析结果，PhoneTech可以识别以下可操作见解和策略来改善其业务：
- en: 'Positive Strategies:'
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正面策略：
- en: '**(1) Refine Marketing Strategies**:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**(1) 精炼营销策略**：'
- en: Customers seem to be happy with the sleek and fast UI.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户似乎对简洁且快速的UI感到满意。
- en: Positive feedback on the UI design indicates that this is a key selling point,
    which PhoneTech should continue promoting in their marketing campaigns to attract
    more buyers.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对UI设计的正面反馈表明这是关键的销售点，PhoneTech应在其营销活动中继续推广以吸引更多买家。
- en: 'Negative Strategies:'
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 负面策略：
- en: '**(1) Enhance Product Features**:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**(1) 提升产品功能**：'
- en: Frequent complaints about image quality suggest an issue with either the hardware
    or software.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经常对图像质量的投诉表明硬件或软件存在问题。
- en: Improving these areas quickly can enhance the user experience and reduce negative
    reviews.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速改进这些领域可以提升用户体验并减少负面评论。
- en: '**(2) Addressing Customer Service Issues**:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**(2) 解决客户服务问题**：'
- en: Handling customer service issues and resolving them promptly will boost product
    satisfaction.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 及时处理客户服务问题并解决它们将提升产品满意度。
- en: These actions can prevent or reduce negative reviews while ensuring a better
    user experience and increasing overall reliability.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些行动可以防止或减少负面评论，同时确保更好的用户体验并提高整体可靠性。
- en: Best Practices in Sentiment Analysis
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情感分析的最佳实践
- en: '**Text Context**: As lexicon-based sentiment analysis often misses sarcasm
    and context, using advanced techniques like machine learning helps better capture
    nuances.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本上下文**：由于基于词汇的情感分析常常忽略讽刺和上下文，使用像机器学习这样的高级技术有助于更好地捕捉细微差别。'
- en: '**Domain-Specific Language**: As general lexicons may not understand industry-specific
    terms and slang, tailoring lexicons to include technical terms relevant to the
    industry improves accuracy.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特定领域的语言**：由于通用词汇表可能不理解行业特定术语和俚语，将词汇表定制以包括与行业相关的技术术语可以提高准确性。'
- en: '**Use of Informal Language and Emojis**: Since informal language and emojis
    can be challenging to analyze, using tools like `quanteda` to clean and systematically
    analyze data is beneficial.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非正式语言和表情符号的使用**：由于非正式语言和表情符号可能难以分析，使用像 `quanteda` 这样的工具进行数据清理和系统分析是有益的。'
- en: '**Combining Techniques**: As relying on one method limits analysis depth, combining
    text processing with machine learning provides comprehensive insights.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合技术**：由于依赖单一方法会限制分析深度，将文本处理与机器学习相结合提供全面的见解。'
- en: Key Takeaways
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: Sentiment analysis helps businesses understand customer opinions to improve
    products and services.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感分析帮助业务了解客户意见，以改进产品和服务的质量。
- en: The R packages `quanteda`, `sentimentr`, and `textstem`work well together for
    text analysis of customer reviews.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: R 包 `quanteda`、`sentimentr` 和 `textstem` 在分析客户评论的文本方面协同工作得很好。
- en: The outlined approach for sentiment analysis can be easily applied across industries
    like finance, healthcare, and retail for actionable insights.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所概述的情感分析方法可以轻松应用于金融、医疗保健和零售等行业以获得可操作见解。
- en: Conclusion
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Sentiment analysis gives businesses a clear idea about their customer needs
    and pain points. Companies can leverage insights to improve products and craft
    data-driven strategies.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析使企业对其客户需求和痛点有清晰的认识。公司可以利用这些见解来改进产品并制定数据驱动的策略。
- en: In this article, we explored how R packages can help with sentiment analysis
    on customer feedback for a tech product. We discussed the background of the challenge
    with possible steps such as including data collection and preparation, corpus
    creation, tokenization, feature extraction, building sentiment models, and visualizing
    results to implement the sentiment analysis in R. We also considered the outcomes
    of the analysis that seem to have an impact and need to be considered by the company
    for further refining the product.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了如何使用 R 包帮助对科技产品的客户反馈进行情感分析。我们讨论了挑战的背景，包括可能的数据收集和准备、语料库创建、分词、特征提取、构建情感模型和可视化结果，以在
    R 中实现情感分析。我们还考虑了分析结果，这些结果似乎有影响，并且公司需要考虑以进一步改进产品。
- en: Other domain companies that are looking to gain actionable insights, enhance
    product features, refine marketing strategies, and monitor brand reputation effectively
    could take a significantly similar approach to sentiment analysis.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 其他寻求获得可操作见解、增强产品功能、完善营销策略和有效监控品牌声誉的领域公司可以在情感分析方面采取显著相似的方法。
