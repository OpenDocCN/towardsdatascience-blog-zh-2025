  type: TYPE_NORMAL
  zh: 这是该函数的完整源代码：
- en: '[PRE3]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Once you’ve defined the function, simply call it and print the results:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你定义了函数，只需调用它并打印结果：
- en: '[PRE4]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/eb575dfc67efcca25de3125b5dde7a3e.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eb575dfc67efcca25de3125b5dde7a3e.png)'
