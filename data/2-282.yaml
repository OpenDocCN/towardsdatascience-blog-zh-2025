  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集介绍和探索
- en: For this guide, I’m using the [MBA admissions dataset from Kaggle](https://www.kaggle.com/datasets/taweilo/mba-admission-dataset).
    Download it if you want to follow along.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 对于本指南，我使用的是来自Kaggle的[MBA录取数据集](https://www.kaggle.com/datasets/taweilo/mba-admission-dataset)。如果你想跟学，请下载它。
- en: The dataset is licensed under the **Apache 2.0 license**, which means you can
    use it freely for both personal and commercial projects.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集受**Apache 2.0许可证**的许可，这意味着你可以自由地用于个人和商业项目。
- en: To get started, you’ll need a few Python libraries installed on your system.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，你需要在你的系统上安装几个Python库。
