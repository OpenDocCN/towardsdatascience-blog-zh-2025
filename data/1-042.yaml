- en: How to Scale Your LLM Usage
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何扩展你的LLM使用
- en: 原文：[https://towardsdatascience.com/how-to-scale-your-llm-usage/](https://towardsdatascience.com/how-to-scale-your-llm-usage/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何扩展你的LLM使用](https://towardsdatascience.com/how-to-scale-your-llm-usage/)'
- en: <mdspan datatext="el1764225009291" class="mdspan-comment">The word *scaling*</mdspan>
    has perhaps been the most important word when it comes to Large Language Models
    (LLMs), with the release of ChatGPT. ChatGPT was made so successful, largely because
    of the scaled **pre-training** OpenAI did, making it a powerful language model.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764225009291" class="mdspan-comment">“扩展”这个词可能是大型语言模型（LLM）中最重要的词，尤其是随着ChatGPT的发布。ChatGPT之所以如此成功，很大程度上是因为OpenAI进行了扩展的**预训练**，使其成为一个强大的语言模型。
- en: Following that, Frontier LLM labs started scaling the **post-training**,with
    supervised fine-tuning and RLHF, where models got increasingly better at instruction
    following and performing complex tasks.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，Frontier LLM实验室开始扩展**后训练**，使用监督微调和RLHF，模型在遵循指令和执行复杂任务方面变得越来越出色。
- en: And just when we thought LLMs were about to plateau, we started doing **inference-time
    scaling** with the release of reasoning models, where spending *thinking tokens*
    gave huge improvements to the quality of outputs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 就在我们认为LLM即将达到顶峰时，我们开始通过推理模型的发布进行**推理时间扩展**，其中花费*思考令牌*极大地提高了输出质量。
- en: '![Infographic: Scaling LLM Usage](../Images/ee6604f2e640fa08e46a283e6c0bf3e0.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![信息图：扩展LLM使用](../Images/ee6604f2e640fa08e46a283e6c0bf3e0.png)'
- en: This infographic highlights the main contents of this article. I’ll first discuss
    why you should scale your LLM usage, highlighting how it can lead to increased
    productivity. Continuing, I’ll specify how you can increase your LLM usage, covering
    techniques like running parallel coding agents and using deep research mode in
    Gemini 3 Pro. Image by Gemini
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图突出了本文的主要内容。我首先会讨论为什么你应该扩展你的LLM使用，强调它如何提高生产力。接着，我会具体说明如何增加你的LLM使用，包括运行并行编码代理和使用Gemini
    3 Pro中的深度研究模式。图片由Gemini提供
- en: 'I now argue we should continue this scaling with a new scaling paradigm: **usage-based
    scaling**, where you scale how much you’re using LLMs:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在认为我们应该继续这种扩展，采用一种新的扩展范式：**基于使用的扩展**，即扩展你使用LLM的程度：
- en: Run more coding agents in parallel
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并行运行更多编码代理
- en: Always start a deep research on a topic of interest
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总是开始深入研究一个感兴趣的话题
- en: Run information fetching workflows
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行信息检索工作流程
- en: If you’re not firing off an agent before going to lunch, or going to sleep,
    you’re wasting time
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你不在午餐前或睡觉前启动代理，你就是在浪费时间
- en: In this article, I’ll discuss why scaling LLM usage can lead to increased productivity,
    especially when working as a programmer. Furthermore, I’ll discuss specific techniques
    you can use to scale your LLM usage, both personally, and for companies you’re
    working for. I’ll keep this article high-level, aiming to inspire how you can
    maximally utilize AI to your advantage.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将讨论扩展LLM使用如何提高生产力，尤其是在作为程序员工作时。此外，我将讨论你可以使用的具体技术来扩展你的LLM使用，无论是个人还是为公司工作。我会保持这篇文章的高层次，旨在激发你如何最大限度地利用AI来获得优势。
- en: Why you should scale LLM usage
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该扩展LLM使用
- en: 'We have already seen scaling be incredibly powerful previously with:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前已经看到扩展是多么强大，例如：
- en: pre-training
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预训练
- en: post-training
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 后训练
- en: inference time scaling
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理时间扩展
- en: The reason for this is that it turns out the more computing power you spend
    on something, the better output quality you’ll achieve. This, of course, assumes
    you’re able to spend the computer effectively. For example, for pre-training,
    being able to scale computing relies on
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 原因是，结果证明，你在某件事上投入的算力越多，你将获得更好的输出质量。当然，这假设你能够有效地使用计算机。例如，对于预训练，能够扩展计算依赖于
- en: Large enough models (enough weights to train)
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 足够大的模型（足够的权重进行训练）
- en: Enough data to train on
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 足够的数据进行训练
- en: If you scale compute without these two components, you won’t see improvements.
    However, if you do scale all three, you get amazing results, like the frontier
    LLMs we’re seeing now, for example, with the release of Gemini 3.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有这两个组件就扩展计算，你不会看到改进。然而，如果你扩展了这三个组件，你会得到惊人的结果，比如我们现在看到的Frontier LLM，例如，随着Gemini
    3的发布。
- en: I thus argue you should look to scale your own LLM usage as much as possible.
    This could, for example, be firing off several agents to code in parallel, or
    starting Gemini deep research on a topic you’re interested in.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我主张你应该尽可能扩展你自己的LLM使用。例如，这可以是同时启动几个代理进行并行编码，或者在你感兴趣的主题上启动Gemini深度研究。
- en: 'Of course, the usage must still be of value. There’s no point in starting a
    coding agent on some obscure task you have no need for. Rather, you should start
    a coding agent on:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，使用必须仍然具有价值。在你不需要的某些晦涩的任务上启动编码代理是没有意义的。相反，你应该在以下情况下启动编码代理：
- en: A linear issue you never felt you had time to sit down and do yourself
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个你从未觉得有时间坐下来自己解决的问题
- en: A quick feature was requested in the last sales call
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上次销售通话中请求的一个快速功能
- en: Some UI improvements, you know, today’s coding agents handle easily
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些UI改进，你知道的，今天的编码代理可以轻松处理
- en: '![](../Images/f55238fbff6168244237013b24d74ba8.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f55238fbff6168244237013b24d74ba8.png)'
- en: This image shows scaling laws, showing how we can see increased performance
    with increased scaling. I argue the same thing will happen when scaling our LLM
    usage. Image from [NodeMasters.](https://www.node-masters.com/blog/why-openai-is-so-confident-on-future-ai-progress)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图像显示了扩展定律，展示了我们可以看到随着扩展的增加而性能增加。我主张当我们扩展我们的LLM使用时，也会发生同样的事情。图片来自[NodeMasters.](https://www.node-masters.com/blog/why-openai-is-so-confident-on-future-ai-progress)
- en: '* * *'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In a world with abundance of resources, we should look to maximize our use of
    them
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在资源丰富的世界里，我们应该努力最大化使用它们
- en: My main point here is that the threshold to perform tasks has decreased significantly
    since the release of LLMs. Previously, when you got a bug report, you had to sit
    down for 2 hours in deep concentration, thinking about how to solve that bug.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里的主要观点是，自从LLM发布以来，执行任务的门槛已经显著降低。以前，当你收到一个错误报告时，你必须坐下来集中精力2小时，思考如何解决这个问题。
- en: However, today, that’s no longer the case. Instead, you can go into Cursor,
    put in the bug report, and ask Claude Sonnet 4.5 to attempt to fix it. You can
    then come back 10 minutes later, test if the problem is fixed, and create the
    pull request.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，今天，情况不再是这样。相反，你可以进入Cursor，输入错误报告，让Claude Sonnet 4.5尝试修复它。然后你可以10分钟后回来，测试问题是否已修复，并创建拉取请求。
- en: How many tokens can you spend while still doing something useful with the tokens
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你在仍然使用这些令牌做些有用的事情的同时能花费多少令牌
- en: How to scale LLM usage
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何扩展LLM的使用
- en: I talked about why you should scale LLM usage by running more coding agents,
    deep research agents, and any other AI agents. However, it can be hard to think
    of exactly what LLMs you should fire off. Thus, in this section, I’ll discuss
    specific agents you can fire off to scale your LLM usage.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我谈到了为什么你应该通过运行更多的编码代理、深度研究代理和任何其他AI代理来扩展LLM的使用。然而，确定应该启动哪些LLM可能很难。因此，在本节中，我将讨论你可以启动以扩展你的LLM使用的特定代理。
- en: Parallel coding agents
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 并行编码代理
- en: Parallel coding agents are one of the simplest ways to scale LLM usage for any
    programmer. Instead of only working on one problem at a time, you start two or
    more agents at the same time, either using Cursor agents, Claude code, or any
    other agentic coding tool. This is typically made very easy to do by utilizing
    Git worktrees.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 并行编码代理是任何程序员扩展LLM使用最简单的方法之一。你不再一次只处理一个问题，而是同时启动两个或更多代理，无论是使用光标代理、Claude代码还是任何其他代理编码工具。通常，通过利用Git工作树，这使得并行编码变得非常容易。
- en: For example, I typically have one main task or project that I’m working on,
    where I’m sitting in Cursor and programming. However, sometimes I get a bug report
    coming in, and I automatically route it to Claude Code to make it search for why
    the problem is happening and fix it if possible. Sometimes, this works out of
    the box; sometimes, I have to help it a bit.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我通常有一个主要任务或项目在处理，我在Cursor中坐着编程。然而，有时我会收到一个错误报告，我会自动将其路由到Claude Code，让它搜索问题发生的原因，并在可能的情况下修复它。有时，这会直接解决问题；有时，我需要稍微帮助它一下。
- en: However, the cost of starting this bug fixing agent is super low (I can literally
    just copy the Linear issue into Cursor, which can read the issue using Linear
    MCP). Similarly, I also have a script automatically researching relevant prospects,
    which I have running in the background.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，启动这个错误修复代理的成本超级低（我实际上只需将线性问题复制到Cursor中，Cursor可以使用线性MCP读取问题）。同样，我还有一个自动研究相关潜在客户的脚本，我在后台运行它。
- en: Deep research
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度研究
- en: Deep research is a functionality you can use in any of the frontier model providers
    like Google Gemini, OpenAI ChatGPT, and Anthropic’s Claude. I prefer Gemini 3
    deep research, though there are many other solid deep research tools out there.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 深度研究是你可以使用任何前沿模型提供商（如 Google Gemini、OpenAI ChatGPT 和 Anthropic 的 Claude）的功能。尽管有许多其他可靠的深度研究工具，但我更喜欢
    Gemini 3 的深度研究。
- en: Whenever I’m interested in learning more about a topic, finding information,
    or anything similar, I fire off a deep research agent with Gemini.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 每当我想要了解更多关于某个主题的信息，寻找信息，或类似的事情时，我都会用 Gemini 启动一个深度研究代理。
- en: For example, I was interested in finding some prospects given a specific ICP.
    I then quickly pasted the ICP information into Gemini, gave it some contextual
    information, and had it start researching, so that it could run while I was working
    on my main programming project.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我对根据特定的 ICP 寻找一些潜在客户感兴趣。然后我迅速将 ICP 信息粘贴到 Gemini 中，给它一些上下文信息，并让它开始研究，这样它就可以在我忙于主要编程项目时运行。
- en: After 20 minutes, I had a brief report from Gemini, which turned out to contain
    loads of useful information.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 20 分钟后，我从 Gemini 那里得到了一份简短的报告，结果发现其中包含大量有用的信息。
- en: Creating workflows with n8n
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 n8n 创建工作流程
- en: Another way to scale LLM usage is to create workflows with n8n or any similar
    workflow-building tool. With n8n, you can build specific workflows that, for example,
    read Slack messages and perform some action based on those Slack messages.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种扩展 LLM 使用的方法是使用 n8n 或任何类似的流程构建工具。使用 n8n，你可以构建特定的流程，例如，读取 Slack 消息并根据这些 Slack
    消息执行某些操作。
- en: You could, for instance, have a workflow that reads a bug report group on Slack
    and automatically starts a Claude code agent for a given bug report. Or you could
    create another workflow that aggregates information from a lot of different sources
    and provides it to you in an easily readable format. There are essentially endless
    opportunities with workflow-building tools.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以有一个工作流程，它读取 Slack 上的错误报告组，并自动为特定的错误报告启动一个 Claude 代码代理。或者，你可以创建另一个工作流程，从许多不同的来源汇总信息，并以易于阅读的格式提供给你。使用工作流程构建工具，实际上有无数的机会。
- en: More
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更多
- en: There are many other techniques you can use to scale your LLM usage. I’ve only
    listed the first few items that came to mind for me when I’m working with LLMs.
    I recommend always keeping in mind what you can automate using AI, and how you
    can leverage it to become more effective. How to scale LLM usage will vary widely
    from different companies, job titles, and many other factors.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用许多其他技术来扩展你的 LLM 使用。我只列出了当我与 LLM 一起工作时想到的前几项。我建议始终牢记你可以使用 AI 自动化的内容，以及你可以如何利用它来提高效率。如何扩展
    LLM 使用将因公司、职位和其他许多因素而大相径庭。
- en: Conclusion
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I’ve discussed how to scale your LLM usage to become a more
    effective engineer. I argue that we’ve seen scaling work incredibly well in the
    past, and it’s highly likely we can see increasingly powerful results by scaling
    our own usage of LLMs. This could be firing off more coding agents in parallel,
    running deep research agents while eating lunch. In general, I believe that by
    increasing our LLM usage, we can become increasingly productive.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了如何扩展你的 LLM 使用，以成为一个更有效的工程师。我认为我们过去看到扩展工作做得非常出色，并且我们很可能通过扩展我们自己的 LLM
    使用看到越来越强大的结果。这可能是并行启动更多的编码代理，在吃午饭时运行深度研究代理。总的来说，我相信通过增加我们的 LLM 使用，我们可以变得越来越高效。
