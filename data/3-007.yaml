- en: A Practical Guide to BERTopic for Transformer-Based Topic Modeling
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于转换器的主题建模的 BERTopic 实用指南
- en: 原文：[https://towardsdatascience.com/a-practical-guide-to-bertopic-for-transformer-based-topic-modeling/](https://towardsdatascience.com/a-practical-guide-to-bertopic-for-transformer-based-topic-modeling/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-practical-guide-to-bertopic-for-transformer-based-topic-modeling/](https://towardsdatascience.com/a-practical-guide-to-bertopic-for-transformer-based-topic-modeling/)
- en: <mdspan datatext="el1746680777805" class="mdspan-comment">Topic modeling</mdspan>
    has a wide range of use cases in the natural language processing (NLP) domain,
    such as document tagging, survey analysis, and content organization. It falls
    under the realm of unsupervised learning technique, making it a very cost-effective
    technique that reduces the resources required to collect human-annotated data.
    We will dive deeper into BERTopic, a popular python library for transformer-based
    topic modeling, to help us process financial news faster and reveal how the trending
    topics change overtime.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746680777805" class="mdspan-comment">主题建模</mdspan>在自然语言处理（NLP）领域有广泛的应用场景，例如文档标记、调查分析和内容组织。它属于无监督学习技术范畴，因此是一种非常经济高效的技术，可以减少收集人工标注数据所需的资源。我们将深入了解
    BERTopic，这是一个流行的基于转换器的主题建模的 Python 库，帮助我们更快地处理财经新闻，并揭示热门话题随时间的变化。
- en: BERTopic consists of 6 core modules that can be customized to suit different
    use cases. In this article, we’ll examine, experiment with each module individually
    and explore how they work together coherently to produce the end results.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: BERTopic 由 6 个核心模块组成，可以根据不同的用例进行定制。在本文中，我们将逐一检查、实验每个模块，并探讨它们如何协同工作以产生最终结果。
- en: 'At a high level, a typical BERTopic architecture is composed of:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 从高层次来看，典型的 BERTopic 架构由以下部分组成：
- en: 'Embeddings: transform text into vector representations (i.e. embeddings) that
    capture semantic meaning using sentence-transformer models.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 嵌入：使用 sentence-transformer 模型将文本转换为捕获语义意义的向量表示（即嵌入）。
- en: 'Dimensionality Reduction: reduce the high-dimensional embeddings to a lower-dimensional
    space while preserving important relationships, including PCA, UMAP …'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维度降低：在保留重要关系的同时，将高维嵌入降低到低维空间，包括 PCA、UMAP 等…
- en: 'Clustering: group similar documents together based on their embeddings with
    reduced dimensionality to form distinct topics, including HDBSCAN, K-Means algorithms
    …'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聚类：根据具有降低维度的嵌入将相似文档分组，以形成不同的主题，包括 HDBSCAN、K-Means 算法等…
- en: 'Vectorizers: after topic clusters are formed, vectorizers convert text into
    numerical features that can be used for topic analysis, including count vectorizer,
    online vectorizer …'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向量化器：在形成主题簇之后，向量化器将文本转换为可用于主题分析的数值特征，包括计数向量化器、在线向量化器等…
- en: 'c-TF-IDF: calculate importance scores for words within and across topic clusters
    to identify key terms.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: c-TF-IDF：计算主题簇内和跨主题簇的单词重要性分数，以识别关键术语。
- en: 'Representation Model: leverage semantic similarity between the embedding of
    candidate keywords and the embedding of documents to find the most representative
    topic keywords, including KeyBERT, LLM-based techniques …'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表示模型：利用候选关键词嵌入与文档嵌入之间的语义相似性，找到最具代表性的主题关键词，包括 KeyBERT、基于 LLM 的技术等…
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Project Overview
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目概述
- en: In this practical application, we will use topic modeling to identify trending
    topics in Apple financial news. Using NewsAPI, we collect daily top-ranked Apple
    stock news from Google Search and compile them into a dataset of 250 documents,
    with each document containing financial news for one specific day. However, this
    is not the main focus of this article so feel free to replace it with your own
    dataset. The objective is to demonstrate how to transform raw text documents containing
    top Google search results into meaningful topic keywords and refine those keywords
    to be more representative.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实际应用中，我们将使用主题建模来识别苹果财经新闻中的热门话题。使用 NewsAPI，我们从谷歌搜索中收集每日排名靠前的苹果股票新闻，并将它们整理成包含
    250 篇文档的数据集，每篇文档包含一天的具体财经新闻。然而，这并不是本文的重点，所以您可以随意替换为您自己的数据集。目标是展示如何将包含顶级谷歌搜索结果的原始文本文档转换为有意义的主题关键词，并进一步提炼这些关键词以使其更具代表性。
- en: '![](../Images/e1f055c7062fb58530e8191869778831.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e1f055c7062fb58530e8191869778831.png)'
- en: 'If you prefer a video walkthrough, please check out my YouTube video: **BERTopic
    Tutorial in 10 Mins | Topic Modeling Applied in Financial News Analysis**.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您更喜欢视频教程，请查看我的 YouTube 视频：**BERTopic 教程 10 分钟 | 财经新闻分析中的主题建模应用**。
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: BERTopic’s 6 Fundamental Modules
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: BERTopic 的 6 个基本模块
- en: 1\. Embeddings
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 嵌入
- en: '![embeddings](../Images/9f041fb6107e4cdeacfec4742b150af9.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![嵌入](../Images/9f041fb6107e4cdeacfec4742b150af9.png)'
- en: 'BERTopic uses sentence transformer models as its first building block, converting
    sentences into dense vector representations (i.e. embeddings) that capture semantic
    meanings. These models are based on transformer architectures like BERT and are
    specifically trained to produce high-quality sentence embeddings. We then compute
    the semantic similarity between sentences using cosine distance between the embeddings.
    Common models include:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: BERTopic 使用句子转换器模型作为其第一个构建块，将句子转换为密集的向量表示（即嵌入），这些嵌入捕捉语义含义。这些模型基于 BERT 等转换器架构，并专门训练以产生高质量的句子嵌入。然后，我们使用嵌入之间的余弦距离来计算句子之间的语义相似度。常见的模型包括：
- en: 'all-MiniLM-L6-v2: lightweight, fast, good general performance'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: all-MiniLM-L6-v2：轻量级、快速、良好的通用性能
- en: 'BAAI/bge-base-en-v1.5: larger model with strong semantic understanding hence
    gives much slower training and inference speed.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: BAAI/bge-base-en-v1.5：更大的模型，具有更强的语义理解能力，因此训练和推理速度较慢。
- en: There are a massive range of pre-trained sentence transformers for you to choose
    from on the “[Sentence Transformer”](https://www.sbert.net/docs/sentence_transformer/pretrained_models.html)
    website and [Huggingface model hub](https://huggingface.co/models). We can use
    a few lines of code to load a sentence transformer model and encode the text sequences
    into high dimensional numerical embeddings.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在 “[Sentence Transformer”](https://www.sbert.net/docs/sentence_transformer/pretrained_models.html)
    网站和 [Huggingface 模型库](https://huggingface.co/models) 上，你可以选择大量的预训练句子转换器。我们可以用几行代码加载一个句子转换器模型，并将文本序列编码成高维数值嵌入。
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In this instance, we input a collection of financial news data from October
    2024 to March 2025 into the sentence transformer “bge-base-en-v1.5”. As shown
    in the result below. these text documents are transformed into vector embedding
    with the shape of 250 rows and each with 384 dimensions.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将 2024 年 10 月至 2025 年 3 月的金融新闻数据集输入到句子转换器“bge-base-en-v1.5”中。如下所示的结果显示，这些文本文档被转换成了具有
    250 行和每行 384 维度的向量嵌入。
- en: '![embeddings result](../Images/9c02cf466386b8caf5aa0555901837e5.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![嵌入结果](../Images/9c02cf466386b8caf5aa0555901837e5.png)'
- en: We can then feed this sentence transformer to BERTopic pipeline and keep all
    other modules as the default settings.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以将这个句子转换器输入到 BERTopic 管道中，并保持所有其他模块为默认设置。
- en: '[PRE1]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As the end result, we get the following topic representation.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 最终结果，我们得到以下主题表示。
- en: '![topic result ](../Images/b80cb7444565c04be3ecbbeddbfecc23.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![主题结果](../Images/b80cb7444565c04be3ecbbeddbfecc23.png)'
- en: Compared to the more powerful and larger “bge-base-en-v1.5” model, we get the
    following result which is slightly more meaningful than the smaller “all-MiniLM-L6-v2”
    model but still leaves large room for improvement.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 与更强大、更大的“bge-base-en-v1.5”模型相比，我们得到以下结果，它比较小的“all-MiniLM-L6-v2”模型稍微更有意义，但仍有很大的改进空间。
- en: '![](../Images/706aa2fd30c1127c7e3d8ea3562f093c.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/706aa2fd30c1127c7e3d8ea3562f093c.png)'
- en: One area for improvement is reducing the dimensionality, because sentence transformers
    typically results in high-dimensional embeddings. As BERTopic relies on comparing
    the spatial proximity between embedding space to form meaningful clusters, it
    is crucial to apply a dimensionality reduction technique to make the embeddings
    less sparse. Therefore, we are going to introduce various dimensionality reduction
    techniques in the next section.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一个改进的领域是降低维度，因为句子转换器通常会产生高维嵌入。由于 BERTopic 依赖于比较嵌入空间中的空间邻近性来形成有意义的聚类，因此应用维度降低技术以使嵌入更密集是至关重要的。因此，我们将在下一节介绍各种维度降低技术。
- en: 2\. Dimensionality Reduction
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 维度降低
- en: '![dimensionality reduction](../Images/cac14c94061ed37f84185001060708c8.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![维度降低](../Images/cac14c94061ed37f84185001060708c8.png)'
- en: After converting the financial news documents into embeddings, we face the problem
    of high dimensionality. Since each embedding contains 384 dimensions, the vector
    space becomes too sparse to create meaningful distance measurement between two
    vector embeddings. Principal Component Analysis (PCA) and Uniform Manifold Approximation
    and Projection (UMAP) are common techniques to reduce dimensionalities while preserving
    the maximum variance in the data. We will look at UMAP, BERTopic’s default dimensionality
    reduction technique, in more details. It is a non-linear algorithm adopted from
    topology analysis that seeks diverse structure within the data. It works by extending
    a radius outwards from each data point and connecting points with its close neighbors.
    You can dive more into the UMAP visualization on this website “[Understanding
    UMAP](https://pair-code.github.io/understanding-umap/)“.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在将金融新闻文档转换为嵌入后，我们面临高维度的难题。由于每个嵌入包含 384 维，向量空间变得过于稀疏，无法在两个向量嵌入之间创建有意义的距离测量。主成分分析（PCA）和均匀流形近似与投影（UMAP）是常见的降低维度同时保留数据最大方差的技术。我们将更详细地探讨
    UMAP，BERTopic 的默认维度降低技术。它是一个从拓扑分析中采用的非线性算法，旨在寻找数据中的多样性结构。它通过从每个数据点向外扩展一个半径，并连接其邻近的点来实现。您可以在本网站上深入了解
    UMAP 可视化：“[理解 UMAP](https://pair-code.github.io/understanding-umap/)”。
- en: '**UMAP `n_neighbours` Experimentation**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**UMAP `n_neighbours` 实验**'
- en: An important UMAP parameter is `n_neighbours` that controls how UMAP balances
    local and global structure in the data. Low values of `n_neighbors` will force
    UMAP to concentrate on local structure, while large values will look at larger
    neighborhoods of each point.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 一个重要的 UMAP 参数是 `n_neighbours`，它控制 UMAP 在数据中平衡局部和全局结构的方式。较低的 `n_neighbors` 值将迫使
    UMAP 专注于局部结构，而较大的值将查看每个点的更大邻域。
- en: The diagram below shows multiple scatterplots demonstrating the effect of different
    `n_neighbors` values, with each plot visualizing the embeddings in an 2-dimensional
    space after applying UMAP dimensionality reduction.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表展示了多个散点图，展示了不同 `n_neighbors` 值的影响，每个图表都展示了在应用 UMAP 维度降低后，在二维空间中的嵌入可视化。
- en: With smaller `n_neighbors` values (e.g. n=2, n=5), the plots show more tightly
    coupled micro clusters, indicating a focus on local structure. As `n_neighbors`
    increases (towards n=100, n=150), the points form more cohesive global patterns,
    demonstrating how larger neighborhood sizes help UMAP capture broader relationships
    in the data.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当 `n_neighbors` 值较小时（例如 n=2, n=5），图表显示更紧密耦合的微观簇，表明关注局部结构。随着 `n_neighbors` 的增加（趋向于
    n=100, n=150），点形成更紧密的全局模式，展示了较大的邻域大小如何帮助 UMAP 捕获数据中的更广泛关系。
- en: '![UMAP experimentation](../Images/77467b727f07ab82b2fd17a5a7fba069.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![UMAP 实验图](../Images/77467b727f07ab82b2fd17a5a7fba069.png)'
- en: '**UMAP `min_dist` Experimentation**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**UMAP `min_dist` 实验**'
- en: The `min_dist` parameter in UMAP controls how tightly points are allowed to
    be packed together in the lower dimensional representation. It sets the minimum
    distance between points in the embedding space. A smaller `min_dist` allows points
    to be packed very closely together whereas a larger `min_dist` forces points to
    be more scattered and evenly spread out. The diagram below shows an experimentation
    on `min_dist` value from 0.0001 to 1 when setting the `n_neighbors=5.` When min_dist
    is set to smaller values, UMAP emphasizes on preserving local structure whereas
    larger values transform the embeddings into a circular shape.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: UMAP 中的 `min_dist` 参数控制点在低维表示中允许多紧密地打包在一起。它设置了嵌入空间中点之间的最小距离。较小的 `min_dist` 允许点非常紧密地打包在一起，而较大的
    `min_dist` 则迫使点更加分散并均匀分布。下面的图表展示了在设置 `n_neighbors=5` 时，`min_dist` 值从 0.0001 到
    1 的实验。当 min_dist 设置为较小的值时，UMAP 强调保留局部结构，而较大的值将嵌入转换为圆形形状。
- en: '![UMAP experimentation](../Images/cb2c6f992bc02e5c9b415c32840c6ca7.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![UMAP 实验图](../Images/cb2c6f992bc02e5c9b415c32840c6ca7.png)'
- en: We decide to set `n_neighbors=5` and `min_dist=0.01` based on the hyperparameter
    tuning results, as it forms more distinct data clusters that are easier for the
    subsequent clustering model to process.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 根据超参数调整结果，我们决定将 `n_neighbors` 设置为 5 和 `min_dist` 设置为 0.01，因为它形成了更明显的数据簇，这有助于后续的聚类模型处理。
- en: '[PRE2]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 3\. Clustering
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 聚类
- en: '![clustering](../Images/680490dcafb33eb0881376c9b065f126.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![聚类图](../Images/680490dcafb33eb0881376c9b065f126.png)'
- en: Following the dimensionality reduction module, it’s the process of grouping
    embeddings with close proximity into clusters. This process is fundamental to
    topic modeling, as it categorizes relevant text documents together by looking
    at their semantic relationships. BERTopic employs HDBSCAN model by default, which
    has the advantage in capturing structures with diverse densities. Additionally,
    BERTopic provides the flexibility of choosing other clustering models based on
    the nature of the dataset, such as K-Means (for spherical, equally-sized clusters)
    or agglomerative clustering (for hirerarchical clusters).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在降维模块之后，这是将接近的嵌入分组到簇中的过程。这个过程对主题建模是基本的，因为它通过查看它们的语义关系将相关的文本文档分类在一起。BERTopic默认使用HDBSCAN模型，它在捕捉具有不同密度的结构方面具有优势。此外，BERTopic还提供了根据数据集的性质选择其他聚类模型的灵活性，例如K-Means（用于球形、等大小的簇）或层次聚类（用于层次簇）。
- en: '**HDBSCAN Experimentation**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**HDBSCAN实验**'
- en: We will explore how two important parameters, `min_cluster_size` and `min_samples`,
    impact the behavior of HDBSCAN model.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨两个重要参数`min_cluster_size`和`min_samples`如何影响HDBSCAN模型的行为。
- en: '`min_cluster_size` determines the minimum number of data points allowed to
    form a cluster and clusters not meeting the threshold are treated as outliers.
    When setting `min_cluster_size` too low, you might get many small, unstable clusters
    which might be noise. If setting it too high, you might merge multiple clusters
    into one, losing their distinct characteristics.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`min_cluster_size`确定形成簇所需的最小数据点数量，未达到阈值的簇被视为异常值。当设置`min_cluster_size`太低时，可能会得到许多小而不稳定的簇，这些簇可能是噪声。如果设置得太高，可能会将多个簇合并为一个，失去它们的独特特征。'
- en: '`min_samples` calculates the distance between a point and its k-th nearest
    neighbor, determining how strict the cluster formation process is. The larger
    the `min_samples` value, the more conservative the clustering becomes, as clusters
    will be restricted to form in dense areas, classifying sparse points as noise.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`min_samples`计算一个点与其第k个最近邻之间的距离，确定簇形成过程的严格程度。`min_samples`值越大，聚类就越保守，因为簇将限制在密集区域形成，将稀疏点分类为噪声。'
- en: Condensed Tree is a useful technique to help us decide appropriate values of
    these two parameters. Clusters that persist for a large range of lambda values
    (shown as the left vertical axis in a condense tree plot) are considered stable
    and more meaningful. We prefer the selected clusters to be both tall (more stable)
    and wide (large cluster size). We use `condensed_tree_` from HDBSCAN to compare
    `min_cluster_size` from 3 to 50, then visualize the data points in their vector
    space, color coded by the predicted cluster labels. As we progress through different
    `min_cluster_size`, we can identify optimal values that group close data points
    together.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 压缩树是一种有用的技术，可以帮助我们决定这两个参数的适当值。在压缩树图中左侧垂直轴显示的lambda值范围内持续存在的簇被认为是稳定的且更有意义。我们更喜欢选择的簇既高（更稳定）又宽（簇大小大）。我们使用HDBSCAN的`condensed_tree_`来比较从3到50的`min_cluster_size`，然后根据预测的簇标签对向量空间中的数据点进行着色可视化。随着我们通过不同的`min_cluster_size`值，我们可以识别出将接近数据点分组在一起的优化值。
- en: In this experimentation, we selected `min_cluster_size=15` as it generates 4
    clusters (highlighted in red in the condensed tree plot below) with good stability
    and cluster size. Additionally the scatterplot also indicates reasonable cluster
    formation based on proximity and density.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中，我们选择了`min_cluster_size=15`，因为它生成了4个具有良好稳定性和簇大小的簇（在下面的压缩树图中用红色突出显示）。此外，散点图也表明基于邻近性和密度形成了合理的簇。
- en: '![Condensed Tree for HDBSCAN min_cluster_size](../Images/d85265a0994d65623246a0b1884d5530.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![HDBSCAN最小聚类大小压缩树](../Images/d85265a0994d65623246a0b1884d5530.png)'
- en: Condensed Trees for HDBSCAN `<code>min_cluster_size` Experimentation
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: HDBSCAN `<code>min_cluster_size` 实验的压缩树
- en: '![Condensed Tree for HDBSCAN min_samples](../Images/3e3917952174a92db5ad0844498a49e8.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![HDBSCAN最小样本大小压缩树](../Images/3e3917952174a92db5ad0844498a49e8.png)'
- en: Scatterplots for HDBSCAN `<code>min_cluster_size` Experimentation
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: HDBSCAN `<code>min_cluster_size` 实验的散点图
- en: We then carry out a similar exercise to compare `min_samples` from 1 to 80 and
    selected `min_samples=5`. As you can observe from the visuals, the parameters
    `min_samples` and `min_cluster_size` exert distinct impacts on the clustering
    process.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接着进行类似的练习，比较从1到80的`min_samples`值，并选择了`min_samples=5`。正如您可以从视觉中观察到的，参数`min_samples`和`min_cluster_size`对聚类过程有不同的影响。
- en: '![](../Images/970ae2a95c4825da6cfb0913c4d448f1.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/970ae2a95c4825da6cfb0913c4d448f1.png)'
- en: Condensed Trees for HDBSCAN `min_samples` Experimentation
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: HDBSCAN `min_samples` 实验的压缩树
- en: '![](../Images/d7173f0efe5f5fd780e408fd8dffdbe3.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d7173f0efe5f5fd780e408fd8dffdbe3.png)'
- en: Scatterplots for HDBSCAN `min_samples` Experimentation
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: HDBSCAN `min_samples` 实验的散点图
- en: '[PRE3]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**K-Means Experimentation**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**K-Means 实验**'
- en: Compared to HDBSCAN, using K-Means clustering allows us to generate more granular
    topics by specifying the `n_cluster` parameter, consequently, controlling the
    number of topics generated from the text documents.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 与 HDBSCAN 相比，使用 K-Means 聚类通过指定 `n_cluster` 参数可以生成更细粒度的主题，从而控制从文本文档中生成的主题数量。
- en: This image shows a series of scatter plots demonstrating different clustering
    results when varying the number of clusters (`n_cluster`) from 3 to 50 using K-Means.
    With `n_cluster=3`, the data is divided into just three large groups. As `n_cluster`
    increases (5, 8, 10, etc.), the data points are split into more granular groupings.
    Overall, it forms rounded-shape clusters compared to HDBSCAN. We selected `n_cluster=8`
    where the clusters are neither too broad (losing important distinctions) nor too
    granular (creating artificial divisions). Additionally, it is a right amount of
    topics for categorizing 250 days of financial news. However, feel free to adjust
    the code snippet to your requirements if need to identify more granular or broader
    topics.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图显示了一系列散点图，展示了当使用 K-Means 从 3 到 50 变化簇数 (`n_cluster`) 时不同的聚类结果。当 `n_cluster=3`
    时，数据被分为仅三个大型组。随着 `n_cluster` 的增加（5、8、10 等），数据点被分割成更细粒度的分组。总体上，与 HDBSCAN 相比，它形成了圆形的簇。我们选择了
    `n_cluster=8`，其中簇既不太宽（丢失重要区分）也不太细（创建人工划分）。此外，这是对 250 天金融新闻进行分类的正确数量的主题。然而，如果您需要识别更细粒度或更宽泛的主题，请随意调整代码片段。
- en: '![](../Images/71619e5cecc458504381d46bf0db0678.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/71619e5cecc458504381d46bf0db0678.png)'
- en: Scatterplots for K-Means `n_cluster` Experimentation
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: K-Means `n_cluster` 实验的散点图
- en: '[PRE4]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Comparing the topic cluster results of K-Means and HDBSCAN reveals that K-Means
    produces more distinct and meaningful topic representations. However, both methods
    still generate many stop words, indicating that subsequent modules are critical
    to refine the topic representations.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 比较K-Means和HDBSCAN的主题聚类结果，可以发现K-Means产生了更明显和有意义的主题表示。然而，两种方法仍然生成了许多停用词，这表明后续模块对于细化主题表示至关重要。
- en: '![HDBSCAN Output](../Images/503dbca1c547e46f4cf35aca8e884dd7.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![HDBSCAN 输出](../Images/503dbca1c547e46f4cf35aca8e884dd7.png)'
- en: HDBSCAN Output
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: HDBSCAN 输出
- en: '![K-Means Output](../Images/7991f68822747ac0e2c696f3e81b7886.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![K-Means 输出](../Images/7991f68822747ac0e2c696f3e81b7886.png)'
- en: K-Means Output
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: K-Means 输出
- en: 4\. Vectorizer
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 向量器
- en: '![vectorizer](../Images/c20ccf4bb4c6b4ffcef099d9880b4591.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![向量器](../Images/c20ccf4bb4c6b4ffcef099d9880b4591.png)'
- en: Previous modules serve the role of grouping documents into semantically similar
    clusters, and starting from this module the main focus is to fine-tune the topics
    by choosing more representative and meaningful keywords. BERTopic offers various
    Vectorizer options from the basic `CountVectorizer` to more advanced `OnlineCountVectorizer`
    which incrementally update topic representations. For this exercise, we will experiment
    on `CountVectorizer`, a text processing tool that creates a matrix of token counts
    out of a collection of documents. Each row in the matrix represents a document
    and each column represents a term from the vocabulary, with the values showing
    how many times each term appears in each document. This matrix representation
    enables machine learning algorithms to process the text data mathematically.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的模块负责将文档分组到语义上相似的簇中，而从这个模块开始，主要关注通过选择更具代表性和意义的关键词来微调主题。BERTopic 提供了从基本的 `CountVectorizer`
    到更高级的 `OnlineCountVectorizer` 的各种向量器选项，这些选项会增量更新主题表示。在这个练习中，我们将对 `CountVectorizer`
    进行实验，这是一个将文档集合转换为词频矩阵的文本处理工具。矩阵中的每一行代表一个文档，每一列代表词汇表中的一个术语，值表示每个术语在每个文档中出现的次数。这种矩阵表示使机器学习算法能够以数学方式处理文本数据。
- en: '**Vectorizer Experimentation**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**向量器实验**'
- en: We will go through a few important parameters of the `CountVectorizer` and see
    how they might affect the topic representations.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨 `CountVectorizer` 的几个重要参数，并了解它们如何可能影响主题表示。
- en: '`ngram_range` specifies how many words to combine together into topic phrases.
    It is particularly useful for documents consists of short phrases, which is not
    needed in this situation.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ngram_range` 指定了将多少个单词组合成主题短语。这对于由短短语组成的文档特别有用，但在此情况下并不需要。'
- en: example output if we set `ngram_range=(1, 3)`
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果我们设置 `ngram_range=(1, 3)` 的示例输出
- en: '[PRE5]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '`stop_words` determines whether stop words are removed from the topics, which
    significantly improves topic representations.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`stop_words`确定是否从主题中移除停用词，这显著提高了主题表示。'
- en: '`min_df` and `max_df` determines the frequency thresholds for terms to be included
    in the vocabulary. `min_df` sets the minimum number of documents a term must appear
    while `max_df` sets the maximum document frequency above which terms are considered
    too common and discarded.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`min_df`和`max_df`确定术语包含在词汇表中的频率阈值。`min_df`设置术语必须出现的最小文档数，而`max_df`设置术语被认为是过于常见而被丢弃的最大文档频率。'
- en: We explore the effect of adding `CountVectorizer` with `max_df=0.8` (i.e. ignore
    words appearing in more than 80% of the documents) to both HDBSCAN and K-Means
    models from the previous step.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们探索了将`max_df=0.8`（即忽略在超过80%的文档中出现的单词）的`CountVectorizer`添加到前一步的HDBSCAN和K-Means模型的效应。
- en: '[PRE6]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Both shows improvements after introducing the `CountVectorizer`, significantly
    reducing keywords frequently appeared in all documents and not bringing extra
    values, such as “appl”, “stock”, and “apple”.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 两个都显示了在引入`CountVectorizer`后有所改进，显著减少了所有文档中频繁出现的关键词，而没有带来额外的值，例如“appl”、“stock”和“apple”。
- en: '![HDBSCAN Output with Vectorizer](../Images/dee17df0bc9a6382fac3b832dc6cecbf.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![使用向量器的HDBSCAN输出](../Images/dee17df0bc9a6382fac3b832dc6cecbf.png)'
- en: HDBSCAN Output with Vectorizer
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 使用向量器的HDBSCAN输出
- en: '![K-Means Output with Vectorizer](../Images/24d173937edc729b973adc3202294459.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![使用向量器的K-Means输出](../Images/24d173937edc729b973adc3202294459.png)'
- en: K-Means Output with Vectorizer
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 使用向量器的K-Means输出
- en: 5\. c-TF-IDF
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. c-TF-IDF
- en: '![c-TF-IDF](../Images/41711269372fb56e48eef0ecb82afa4e.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![c-TF-IDF](../Images/41711269372fb56e48eef0ecb82afa4e.png)'
- en: While the Vectorizer module focuses on adjusting the topic representation at
    the document level, c-TF-IDF mainly look at the cluster level to reduce frequently
    encountered topics across clusters. This is achieved by converting all documents
    belonging to one cluster as a single document and calculated the keyword importance
    based on the traditional TF-IDF approach.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然向量器模块专注于调整文档级别的主题表示，但c-TF-IDF主要关注聚类级别，以减少跨聚类中频繁遇到的主题。这是通过将属于一个聚类的所有文档视为单个文档，并基于传统的TF-IDF方法计算关键词重要性来实现的。
- en: '**c-TF-IDF Experimentation**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**c-TF-IDF实验**'
- en: '`reduce_frequent_words`: determines whether to down-weight frequently occurring
    words across topics'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`reduce_frequent_words`：确定是否对主题中的频繁出现的单词进行降权'
- en: '`bm25_weighting`: when set to True, uses BM25 weighting instead of standard
    TF-IDF, which can help better handle document length variations. In smaller datasets,
    this variant can be more robust to stop words.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`bm25_weighting`：当设置为True时，使用BM25加权而不是标准的TF-IDF，这有助于更好地处理文档长度的变化。在较小的数据集中，这种变体可以更稳健地处理停用词。'
- en: We use the following code snippet to add c-TF-IDF (with `bm25_weighting=True`)
    into our BERTopic pipeline.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用以下代码片段将c-TF-IDF（`bm25_weighting=True`）添加到我们的BERTopic管道中。
- en: '[PRE7]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The topic cluster outputs below show that adding c-TF-IDF has no major impact
    to the end results when `CountVectorizer` has already been added. This is potentially
    because our `CountVectorizer` has already set a high bar of eliminating words
    appearing in more than 80% at the document level. Subsequently, this already reduces
    overlapping vocabularies at the topic cluster level, which is what c-TF-IDF is
    intended to achieve.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的主题聚类输出显示，当`CountVectorizer`已经添加时，添加c-TF-IDF对最终结果没有产生重大影响。这可能是由于我们的`CountVectorizer`已经设定了一个很高的标准，即消除在文档级别出现超过80%的单词。随后，这已经在主题聚类级别减少了重叠词汇，这正是c-TF-IDF旨在实现的。
- en: '![](../Images/e99232afca9c2af54a75bdd94ce686da.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e99232afca9c2af54a75bdd94ce686da.png)'
- en: HDBSCAN Output with Vectorizer and c-TF-IDF
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 使用向量器和c-TF-IDF的HDBSCAN输出
- en: '![](../Images/3010a514f3d19951a0d328b98ff2ef45.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3010a514f3d19951a0d328b98ff2ef45.png)'
- en: K-Means Output with Vectorizer and c-TF-IDF
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 使用向量器和c-TF-IDF的K-Means输出
- en: However, If we replace `CountVectorizer` with c-TF-IDF, although the result
    below shows slight improvements compared to when both are not added, there are
    too many stop words present, making the topic representations less valuable. Therefore,
    it appears that for the documents we are dealing with in this scenario, c-TF-IDF
    module does not bring extra value.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们用c-TF-IDF替换`CountVectorizer`，尽管下面的结果与两者都没有添加时相比略有改进，但存在太多的停用词，使得主题表示的价值降低。因此，在这种情况下，对于我们正在处理的文档，c-TF-IDF模块没有带来额外的价值。
- en: '![](../Images/c00b88e21486141d75e63ca76e731ab2.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c00b88e21486141d75e63ca76e731ab2.png)'
- en: HDBSCAN Output with c-TF-IDF only
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 仅使用c-TF-IDF的HDBSCAN输出
- en: '![](../Images/930b8deae9fe18e1d96b85d6e6ddde65.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/930b8deae9fe18e1d96b85d6e6ddde65.png)'
- en: K-Means Output with c-TF-IDF only
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: K-Means Output with c-TF-IDF only
- en: 6\. Representation Model
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 表示模型
- en: '![](../Images/dc6adddd33bd95151812835f0e84b4bc.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dc6adddd33bd95151812835f0e84b4bc.png)'
- en: 'The last module is the representation model which has been observed having
    a significant impact on tuning the topic representations. Instead of using the
    frequency based approach like Vectorizer and c-TF-IDF, it leverages semantic similarity
    between the embeddings of candidate keywords and the embeddings of documents to
    find the most representative topic keywords. This can result in more semantically
    coherent topic representations and reducing the number of synonymically similar
    keywords. BERTopic also offers various customization options for representation
    models, including but not limited to the following:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个模块是表示模型，该模型在调整主题表示方面已被观察到具有显著影响。它不是使用像Vectorizer和c-TF-IDF这样的基于频率的方法，而是利用候选关键词嵌入与文档嵌入之间的语义相似性来找到最具代表性的主题关键词。这可以导致更语义上连贯的主题表示，并减少同义相似关键词的数量。BERTopic还提供了各种表示模型的定制选项，包括但不限于以下内容：
- en: '`KeyBERTInspired`: employ [KeyBERT](https://maartengr.github.io/KeyBERT/) technique
    to extract topic words based semantic similarity.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`KeyBERTInspired`: 使用[KeyBERT](https://maartengr.github.io/KeyBERT/)技术根据语义相似性提取主题词。'
- en: '`ZeroShotClassification`: make the most of open-source transformers in the
    [Huggingface model hub](https://huggingface.co/models?pipeline_tag=zero-shot-classification&sort=downloads)
    to assign labels to topics.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ZeroShotClassification`: 充分利用[Huggingface模型库](https://huggingface.co/models?pipeline_tag=zero-shot-classification&sort=downloads)中的开源transformers来为主题分配标签。'
- en: '`MaximalMarginalRelevance`: decrease synonyms in topics (e.g. stock and stocks).'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`MaximalMarginalRelevance`: 减少主题中的同义词（例如，股票和stocks）。'
- en: '**KeyBERTInspired Experimentation**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**KeyBERTInspired Experimentation**'
- en: We found that KeyBERTInspired is a very cost-effective approach as it significantly
    improves the end result by adding a few extra lines of code, without the need
    of extensive hyperparameter tuning.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现KeyBERT-Inspired是一种非常经济高效的方法，因为它通过添加几行额外的代码显著提高了最终结果，而不需要广泛的超参数调整。
- en: '[PRE8]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: After incorporating the KeyBERT-Inspired representation model, we now observe
    that both models generate noticeably more coherent and valuable themes.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在引入KeyBERT-Inspired表示模型后，我们现在观察到这两个模型生成的主题更加连贯和有价值。
