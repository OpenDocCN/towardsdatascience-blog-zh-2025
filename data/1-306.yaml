  zh: 在我的[*Substack 数据科学咖啡厅*](https://sarahleaschrch.substack.com/)上，我分享来自数据科学、Python、AI、机器学习和科技领域的实用指南和精简更新——专为像你这样好奇的心灵而准备。
- en: '*Have a look and subscribe on [Medium](https://medium.com/@schuerch_sarah)
