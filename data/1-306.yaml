  type: TYPE_NORMAL
  zh: 接下来，我们创建一个名为 *prepare_data.py* 的 Python 文件。我使用 Visual Studio Code 进行此操作，但您也可以使用其他
    IDE。在此文件中，我们加载泰坦尼克号数据集，因为它公开可用。
- en: '[PRE2]'
