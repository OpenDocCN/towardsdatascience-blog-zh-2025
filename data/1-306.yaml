- en: 'LangChain for EDA: Build a CSV Sanity-Check Agent in Python'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LangChain for EDA：使用 Python 构建 CSV 精确性检查代理
- en: 原文：[https://towardsdatascience.com/langchain-for-eda-build-a-csv-sanity-check-agent-in-python/](https://towardsdatascience.com/langchain-for-eda-build-a-csv-sanity-check-agent-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/langchain-for-eda-build-a-csv-sanity-check-agent-in-python/](https://towardsdatascience.com/langchain-for-eda-build-a-csv-sanity-check-agent-in-python/)
- en: <mdspan datatext="el1757360600202" class="mdspan-comment">Chatbots answer questions</mdspan>,
    agents perform actions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757360600202" class="mdspan-comment">聊天机器人回答问题</mdspan>，代理执行动作。
- en: That’s exactly what we’re going to try out in today’s article.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我们今天文章中将要尝试的内容。
- en: In this article, we’ll use LangChain and Python to build our own CSV sanity
    check agent. With this agent, we’ll automate typical exploratory data analysis
    (EDA) tasks as displaying columns, detecting missing values (NaNs) and retrieving
    descriptive statistics.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将使用 LangChain 和 Python 构建我们自己的 CSV 精确性检查代理。有了这个代理，我们将自动化典型的探索性数据分析（EDA）任务，如显示列、检测缺失值（NaNs）和检索描述性统计。
- en: Agents decide step by step which tool to call and when to answer a question
    about our data. This is a big difference from an application in the traditional
    sense, where the developer defines how the process works (e.g., via if-else loops).
    It also goes far beyond simple prompting because we are building a system that
    acts (albeit in a simple way) and doesn’t just talk.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 代理逐步决定调用哪个工具以及何时回答关于我们数据的问题。这与传统意义上的应用程序有很大不同，在传统意义上，开发者定义了过程是如何工作的（例如，通过 if-else
    循环）。这也远远超出了简单的提示，因为我们正在构建一个行动系统（尽管是简单的），而不仅仅是说话。
- en: 'This article is for you if you:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你：
- en: …work with Pandas and want to automate EDA.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …使用 Pandas 并希望自动化 EDA。
- en: …find LLMs exciting, but have little experience with LangChain so far.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …对 LLM 感兴趣，但迄今为止对 LangChain 的经验很少。
- en: …want to understand how agents really work (from setup to mini-evaluation) using
    a simple example.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …想通过一个简单的例子了解代理是如何真正工作的（从设置到迷你评估）。
