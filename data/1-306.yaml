- en: Side Note – Titanic dataset
  id: totrans-77
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 侧记 - 泰坦尼克号数据集
- en: The analysis is based on the Titanic dataset ([OpenML ID 40945](https://www.openml.org/search?type=data&sort=runs&id=40945&status=active)),
    which is marked as public on OpenML.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 分析基于泰坦尼克号数据集 ([OpenML ID 40945](https://www.openml.org/search?type=data&sort=runs&id=40945&status=active))，该数据集在
    OpenML 上标记为公开。
- en: When we open the file, we see the following 14 columns and 891 rows of data.
    The Titanic dataset is a classic example of exploratory data analysis (EDA). It
    contains information on 891 passengers of the Titanic and is often used to investigate
    the relationship between characteristics (e.g., gender, age, ticket class) and
    survival.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们打开文件时，我们看到以下 14 个列和 891 行数据。泰坦尼克号数据集是探索性数据分析（EDA）的经典示例。它包含有关泰坦尼克号 891 名乘客的信息，常用于研究特征（例如，性别、年龄、票舱等级）与生存之间的关系。
- en: '![The image shows the Titanic dataset in Excel.](../Images/91b322b1d04b64c9d501def1e9097f83.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图像显示了 Excel 中的泰坦尼克号数据集。](../Images/91b322b1d04b64c9d501def1e9097f83.png)'
- en: Screenshot taken by the author.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 作者拍摄的截图。
- en: 'Here are the 14 columns with a brief explanation:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 14 个列及其简要说明：
- en: '**survived**: Survived (1) or did not survive (0).'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生存**: 生存（1）或未生存（0）。'
- en: '**pclass**: Ticket class (1 = 1st class, 2 = 2nd class, 3 = 3rd class).'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pclass**: 票舱等级（1 = 一等舱，2 = 二等舱，3 = 三等舱）。'
- en: '**sex**: Gender of the passenger.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性别**: 乘客的性别。'
- en: '**age**: Age of the passenger (in years, may be missing).'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**年龄**: 乘客的年龄（以年为单位，可能缺失）。'
- en: '**sibsp**: Number of siblings/spouses on board.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**sibsp**: 船上兄弟姐妹/配偶的数量。'
- en: '**parch**: Number of parents/children on board.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**parch**: 船上父母/孩子的数量。'
- en: '**fare**: Fare paid by the passenger.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**票价**: 乘客支付的票价。'
- en: '**embarked**: Port of embarkation (C = Cherbourg, Q = Queenstown, S = Southampton).'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**登船港口**: 登船港口（C = 雷恩，Q = 皇后镇，S = 南安普顿）。'
- en: '**class**: Ticket class as text (First, Second, Third). Corresponds to pclass.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**舱位等级**: 作为文本的票舱等级（一等舱，二等舱，三等舱）。对应于 pclass。'
- en: '**who**: Categorization “man,” “woman,” “child.”'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**who**: 分类“男性”、“女性”、“儿童”。'
- en: '**adult_male**: Boolean field: Was the passenger an adult male (True/False)?'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**adult_male**: 布尔字段：乘客是否为成年男性（True/False）？'
- en: '**deck**: Cabin deck (often missing).'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**deck**: 船舱甲板（通常缺失）。'
- en: '**embark_town**: City of port of embarkation (Cherbourg, Queenstown, Southampton).'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**embark_town**: 登船港口城市（如瑟堡、昆士敦、南安普顿）。'
- en: '**alone**: Boolean field: Did the passenger travel alone (True/False)?'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**alone**: 布尔字段：乘客是否独自旅行（True/False）？'
- en: '***Optional for advanced readers**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '***高级读者可选**'
- en: If you want to track and evaluate your agent runs later, you can use [LangSmith](https://docs.langchain.com/langsmith/home).*
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想以后跟踪和评估您的代理运行，可以使用 [LangSmith](https://docs.langchain.com/langsmith/home)。
- en: 2) Define tools in main.py
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 在 main.py 中定义工具
- en: 'Next, we define the various tools. To do this, we create a new Python file
    called *main.py* and save it in the csv-agent folder as well. We add the following
    code to it:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义各种工具。为此，我们创建一个新的 Python 文件，命名为 *main.py*，并将其保存在 csv-agent 文件夹中。我们向其中添加以下代码：
- en: '[PRE4]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'After importing the necessary packages, we load titanic.csv into *df* once
    and define three small, narrowly defined tools. Let’s take a closer look at each
    of these tools:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在导入必要的包后，我们将 titanic.csv 一次性加载到 *df* 中，并定义了三个小型、定义明确的工具。让我们逐一详细看看这些工具：
- en: '*tool_schema* returns the column names and data types as JSON. This gives us
    an overview of what we are dealing with and is usually the first step in any data
    analysis. Even if a tool doesn’t need input (like schema), it must still accept
    one argument, because the agent always passes a string. We simply ignore it.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*tool_schema* 返回列名和数据类型作为 JSON。这让我们对正在处理的内容有一个概述，通常是任何数据分析的第一步。即使工具不需要输入（如模式），它也必须接受一个参数，因为代理总是传递一个字符串。我们简单地忽略它。'
- en: '*tool_nulls* counts missing values per column and returns only columns with
    missing values.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*tool_nulls* 统计每列的缺失值并只返回具有缺失值的列。'
- en: '*tool_describe* calls df.describe(). It is important to note that this tool
    only works for numeric columns. Strings or Booleans, on the other hand, are ignored.
    This is an important step in the sanity check or EDA. This allows us to quickly
    see the mean, min, max, etc. of the different columns. For large CSVs, describe()
    can take a long time. In this case, you could integrate *df.sample(n=10000)* as
    sampling logic, for example.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*tool_describe* 调用 df.describe()。需要注意的是，此工具仅适用于数值列。另一方面，字符串或布尔值将被忽略。这是在检查或
    EDA 中的重要步骤。这使我们能够快速查看不同列的平均值、最小值、最大值等。对于大型 CSV 文件，describe() 可能需要很长时间。在这种情况下，您可以将
    *df.sample(n=10000)* 作为采样逻辑进行集成，例如。'
- en: 'These tools are the controlled interfaces through which the LLM is allowed
    to access the data. They are deterministic and therefore reproducible. Tools should
    ideally be clear and limited: In other words, they should have only one function
    or task.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具是通过它们访问数据的受控接口。它们是确定性的，因此是可重复的。工具应该是清晰和有限的：换句话说，它们应该只有一个功能或任务。
- en: '* * *'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why do we need tools at all?
  id: totrans-108
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 我们为什么需要工具呢？
- en: '*An LLM can generate text, but it cannot directly “see” data. In order for
    the LLM to work meaningfully with a CSV, we need to provide interfaces.* *That’s
    exactly what tools are for:*'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个 LLM 可以生成文本，但不能直接“看到”数据。为了使 LLM 能够有意义地与 CSV 文件一起工作，我们需要提供接口。这正是工具的作用：*'
- en: '*Tools are small Python functions that the agent is allowed to call. Instead
    of making everything free, we only allow very specific, reproducible actions.*'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具是代理允许调用的小型 Python 函数。我们不是让所有东西都免费，而是只允许非常具体、可重复的操作。*'
- en: '* * *'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What exactly does the code do?
  id: totrans-112
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码究竟做了什么？
- en: With the @tool decorator, LangChain automatically infers the tool’s name, description
    and argument schema from the function signature and docstring. This means we only
    need to write the function itself. LangChain takes care of the rest.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 @tool 装饰器，LangChain 会自动从函数签名和文档字符串中推断工具的名称、描述和参数模式。这意味着我们只需要编写函数本身。LangChain
    会处理其余部分。
- en: 'The model passes arguments that match the tool’s schema (often JSON). In this
    tutorial we keep things simple and accept a single string argument (e.g., `input_str:
    str` or a dummy string we ignore).'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '模型传递与工具模式匹配的参数（通常是 JSON）。在本教程中，我们保持简单，接受单个字符串参数（例如，`input_str: str` 或我们忽略的虚拟字符串）。'
- en: Tools always return a string (text). JSON is ideal for structured data, which
    we define with *return json.dumps(…)*.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具总是返回一个字符串（文本）。JSON 是结构化数据的理想选择，我们使用 *return json.dumps(…)* 定义。
- en: '![This image shows how the agent uses multi-step reasoning with tools.](../Images/df70afb61c2552613bac21a3f6e006e4.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![该图像显示了代理如何使用工具进行多步骤推理。](../Images/df70afb61c2552613bac21a3f6e006e4.png)'
- en: Visualization by the author.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者进行可视化。
- en: 'This is a multi-step thought process. The LLM plans iteratively. Instead of
    responding directly, it thinks step by step: it decides which tool to call, interprets
    the result, and may continue until it has enough information to respond.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个多步骤的思维过程。LLM 逐次迭代地计划。它不会直接响应，而是逐步思考：它决定调用哪个工具，解释结果，并可能继续进行，直到它有足够的信息来响应。
- en: 4) Registering tools for LangChain in main.py
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 在 main.py 中注册 LangChain 的工具
- en: 'We add the code below to the same *main.py* file to register the previously
    defined tools for the agent:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将以下代码添加到相同的 *main.py* 文件中，以注册之前定义的工具：
- en: '[PRE5]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: With this code, we simply collect the decorated functions into a list. Each
    function has already been converted into a LangChain tool by the @tool decorator.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 通过此代码，我们只需将装饰过的函数收集到一个列表中。每个函数都已经通过 @tool 装饰器转换成了 LangChain 工具。
- en: 5) Configuring LLM in main.py
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 在 main.py 中配置 LLM
- en: Next, we configure the LLM that the agent uses. Here, you can either use the
    variant for OpenAI or for an open-source tool with Ollama.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们配置代理使用的 LLM。在这里，你可以使用 OpenAI 的变体或使用 Ollama 的开源工具。
- en: 'I used OpenAI, which is why we first need to set the API key:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用了 OpenAI，因此我们首先需要设置 API 密钥：
- en: 'At [OpenAI](https://platform.openai.com/api-keys), we create a new API key:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [OpenAI](https://platform.openai.com/api-keys) 中，我们创建一个新的 API 密钥：
- en: '![The image shows how to create an API-Key in OpenAI.](../Images/a8434e3f3a33020358aaeb4c1260b1f8.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![该图像显示了如何在 OpenAI 中创建 API 密钥。](../Images/a8434e3f3a33020358aaeb4c1260b1f8.png)'
- en: Screenshot taken by the author.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者拍摄的截图。
- en: We then copy it directly (it will not be displayed later) and set it as an environment
    variable in the terminal with the following command.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我们然后直接复制它（它将不会在以后显示）并在终端中使用以下命令将其设置为环境变量。
- en: '[PRE6]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: It is important to restart cmd and reactivate .venv afterwards. We can use echo
    to check whether an API key has been saved.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是在之后重启 cmd 并重新激活 .venv。我们可以使用 echo 来检查 API 密钥是否已保存。
- en: '![The image shows how to check in the terminal, if the API-Key was saved.](../Images/1e8643114bfae0bda613198c34a9e846.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![该图像显示了如何在终端中检查 API 密钥是否已保存。](../Images/1e8643114bfae0bda613198c34a9e846.png)'
- en: Screenshot taken by the author.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者拍摄的截图。
- en: 'Now we add the following code to the end of *main.py*:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将以下代码添加到 *main.py* 的末尾：
- en: '[PRE7]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The code uses OpenAI if an OpenAI_API_KEY is available, otherwise Ollama locally.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 如果可用 OpenAI_API_KEY，代码将使用 OpenAI，否则使用本地 Ollama。
- en: We set the temperature to 0.1\. This ensures that the responses are more deterministic,
    which is important for the subsequent test.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将温度设置为 0.1。这确保了响应更加确定性，这对于后续测试很重要。
- en: We also use gpt-4o-mini as the LLM. This is a lightweight model from OpenAI
    with a focus on tool usage.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还使用 gpt-4o-mini 作为 LLM。这是一个由 OpenAI 提供的轻量级模型，专注于工具使用。
- en: '*Tip for Newbies:*'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '*新手提示：*'
- en: '*The temperature determines how creatively an LLM responds. If we enter 0.0,
    it responds deterministically. This means that the model almost always returns
    the same answer when the input is the same. This is good for structured tasks
    such as tool usage, code or facts, for example. If we specify 1.0, the model responds
    creatively and with a wide variety of options. This means that the model varies
    more and can suggest different formulations or solutions, which is good for brainstorming
    or text ideas, for example.*'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '*温度决定了大型语言模型（LLM）的创造性响应程度。如果我们输入 0.0，它将以确定性方式响应。这意味着当输入相同时，模型几乎总是返回相同的答案。这对于结构化任务，例如工具使用、代码或事实等，是有益的。如果我们指定
    1.0，模型将以创造性和多样化的方式响应。这意味着模型变化更多，可以提出不同的表述或解决方案，这对于头脑风暴或文本创意等是有益的。*'
- en: 6) Defining the agent’s behavior in main.py using the policy
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6) 使用策略在 main.py 中定义代理的行为
- en: In this step, we define how the agent should behave. The system prompt sets
    the policy.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一步中，我们定义了代理应该如何表现。系统提示设置了策略。
- en: '[PRE8]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'First, we import *ChatPromptTemplate* to structure our agent’s prompt. The
    most important part of the code is the system prompt: it defines the policy, i.e.,
    the “rules of the game” for the agent. In it, we define that the agent may only
    use one tool per step, that it should be concise, and that it may only use the
    tools we have defined.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们导入 *ChatPromptTemplate* 以结构化我们的代理提示。代码最重要的部分是系统提示：它定义了策略，即代理的“游戏规则”。在其中，我们定义代理每步只能使用一个工具，它应该是简洁的，并且它只能使用我们定义的工具。
- en: With the last two lines in the system prompt, we ensure that *{tools}* lists
    all available tools with their descriptions and with *{tool_names}*, we ensure
    that the agent can only use these names and cannot invent fantasy tools.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在系统提示的最后两行中，我们确保 *{tools}* 列出了所有可用的工具及其描述，并且通过 *{tool_names}*，我们确保智能体只能使用这些名称，而不能发明幻想工具。
- en: 'In addition, we use *MesagesPlaceholder(“agent_scratchpad”)*. This is where
    the agent stores intermediate steps: The agent stores which tools it has called
    and which results it has received. This allows it to continue its own chain of
    reasoning until it arrives at a final answer.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们使用 *MessagesPlaceholder(“agent_scratchpad”)*。这是智能体存储中间步骤的地方：智能体存储它调用了哪些工具以及它接收了哪些结果。这允许它继续自己的推理链，直到得出最终答案。
- en: 7) Create tool-calling agent in main.py
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7) 在 main.py 中创建工具调用智能体
- en: 'In the last step, we define the agent:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后一步，我们定义智能体：
- en: '[PRE9]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: With *create_tool_calling_agent*, we connect our LLM, the tools and the prompt
    to form a tool-calling agent.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *create_tool_calling_agent*，我们将我们的 LLM、工具和提示连接起来，形成一个工具调用智能体。
- en: 'To ensure that the process runs smoothly, we use the *AgentExecutor*. It takes
    care of the so-called agent loop: The agent first plans what needs to be done,
    then calls up a tool, receives the result and decides whether another tool is
    needed or whether it can provide the final answer. This cycle repeats until the
    result is ready.'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保过程顺利运行，我们使用 *AgentExecutor*。它负责所谓的智能体循环：智能体首先计划需要做什么，然后调用一个工具，接收结果并决定是否需要另一个工具或是否可以提供最终答案。这个循环重复进行，直到结果准备好。
- en: With *verbose=True*, we can view the intermediate steps in the terminal, which
    is extremely helpful for debugging. For example, we can see which tool was called
    when or what data was returned. If everything is running smoothly, we can also
    set it to *=False* to keep the output clearer.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *verbose=True*，我们可以在终端中查看中间步骤，这对于调试非常有帮助。例如，我们可以看到何时调用了哪个工具或返回了什么数据。如果一切运行顺利，我们也可以将其设置为
    *=False* 以保持输出更清晰。
- en: With *max_iterations=3*, we limit how many reasoning–tool–response cycles the
    agent may perform. This helps prevent infinite loops or excessive tool calls.
    In our example, the agent might reasonably call schema → nulls → describe before
    answering.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *max_iterations=3*，我们限制智能体可能执行的推理-工具-响应周期数量。这有助于防止无限循环或过多的工具调用。在我们的例子中，智能体在回答之前可能会合理地调用模式
    → nulls → 描述。
- en: With the last part of the code, the agent is executed with the sample input
    “Which columns have missing values?”. The result is printed in the terminal.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 代码的最后部分，智能体使用示例输入“哪些列有缺失值？”进行执行。结果在终端中打印出来。
- en: '*Tip for newbies:*'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '*新手提示：*'
- en: '*if name == “main”: is a standard Python pattern: If we execute the file directly
    in the terminal with python main.py, the code in this block will be started. However,
    if we only import the file (e.g., later in the mini_eval.py file), this block
    is skipped. This allows us to use the file as a standalone script or reuse it
    as a module in other projects.*'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '*if name == “main”:* 是一个标准的 Python 模式：如果我们直接在终端中通过 python main.py 执行文件，这个块中的代码将被启动。然而，如果我们只导入文件（例如，在
    mini_eval.py 文件中稍后），这个块将被跳过。这允许我们将文件用作独立的脚本或在其他项目中作为模块重用。'
- en: '8) Run the script: Run the file main.py in the terminal.'
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8) 运行脚本：在终端中运行文件 main.py。
- en: 'Now we enter *python main.py* in the terminal to start the agent. We then see
    the final answer in the terminal:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们在终端中输入 *python main.py* 来启动智能体。然后我们在终端中看到最终答案：
- en: '![The image shows the result that the agent shows in the terminal (how many
    missing values).](../Images/d35936b13da1ec02ed38712d0128883a.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![该图像显示了智能体在终端中显示的结果（缺失值数量）](../Images/d35936b13da1ec02ed38712d0128883a.png)'
- en: Screenshot taken by the author.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 作者拍摄的截图。
- en: Mini-Evaluation
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 小型评估
- en: Finally, we want to check our agent, which we do with a small evaluation. This
    ensures that the agent behaves correctly and does not introduce any “regressions”
    when we change something in the code later on.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们想要检查我们的智能体，这通过一个小型评估来完成。这确保了当我们在代码中稍后更改某些内容时，智能体能够正确行为并且不会引入任何“回归”。
- en: 'At the end of *main.py*, we add the code below:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *main.py* 的末尾，我们添加以下代码：
- en: '[PRE10]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: With *ask_agent*, we encapsulate the agent call in a function that simply returns
    a string. This allows us to call the agent later from other files.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *ask_agent*，我们将智能体调用封装在一个简单地返回字符串的函数中。这允许我们稍后从其他文件中调用智能体。
- en: The lower block ensures that a test run is performed when *main.py* is called
    directly. If, on the other hand, we import main into another file, only the function
    is provided.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个块确保当直接调用`main.py`时执行测试运行。另一方面，如果我们把`main`导入到另一个文件中，只提供函数。
- en: 'Now we create the *mini_eval.py* file and insert the following code:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们创建`mini_eval.py`文件并插入以下代码：
- en: '[PRE11]'
  id: totrans-168
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: In the code, we define three test cases. Each test consists of a question for
    the agent and a list of keywords that must appear in the answer. The *passed()*
    function checks whether these keywords are included.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码中，我们定义了三个测试案例。每个测试案例包括一个针对代理的问题和一个必须在答案中出现的关键词列表。`passed()` 函数检查这些关键词是否包含在内。
- en: '**Expected test results**'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '**预期测试结果**'
- en: '**Test 1: “Which columns have missing values?”**'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试 1：“哪些列有缺失值？”**'
- en: 'Expected: Output mentions age, deck, embarked, embark_town.'
  id: totrans-172
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 预期：输出提到age、deck、embarked、embark_town。
- en: '**Test 2: “Show me the first 3 columns with their data types.”** Expected:
    Output contains survived, pclass, sex with types such as int64 or object.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试 2：“展示包含数据类型的头3列。”** 预期：输出包含survived、pclass、sex等类型，如int64或object。'
- en: '**Test 3: “Give me a statistical summary of the ‘age’ column.”** Expected output:
    Output contains mean ≈ 29.7, min = 0.42, max = 80.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试 3：“给出‘age’列的统计摘要。”** 预期输出：输出包含mean ≈ 29.7，min = 0.42，max = 80。'
- en: If everything runs correctly, the script reports “Passed 3/3” at the end.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切运行正确，脚本在最后会报告“Passed 3/3”。
- en: 'We get this output in the terminal. So the test works:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在终端中得到这个输出。所以测试是有效的：
- en: '![The image shows the result of the mini-evaluation.](../Images/1312936a3f9c2490104bcd15f04fe0c2.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![图像显示了小型评估的结果。](../Images/1312936a3f9c2490104bcd15f04fe0c2.png)'
- en: Screenshot taken by the author.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者拍摄的截图。
