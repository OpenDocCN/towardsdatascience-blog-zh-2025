- en: How to Access NASA’s Climate Data — And How It’s Powering the Fight Against
    Climate Change Pt. 1
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何获取NASA的气候数据——以及它是如何助力对抗气候变化的 Pt. 1
- en: 原文：[https://towardsdatascience.com/how-to-access-nasas-climate-data-and-how-its-powering-the-fight-against-climate-change-pt-1/](https://towardsdatascience.com/how-to-access-nasas-climate-data-and-how-its-powering-the-fight-against-climate-change-pt-1/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/how-to-access-nasas-climate-data-and-how-its-powering-the-fight-against-climate-change-pt-1/)'
- en: 'I can’t think of a more important dataset. Just today, I saw a headline like
    this**: ‘Heat Waves Are Getting More Dangerous with Climate Change.’** You can’t
    say we haven’t been warned. In 1988, we saw headlines like this: **‘Global Warming
    Has Begun, Expert Tells Senate**.’ And while data science has played its role
    in revealing that we will likely surpass the 1.5 °C target set by the Paris Agreement,
    there is far more we could be doing. For one, people don’t believe it, yet the
    data is readily available, free, and easy to access. You can check it yourself!
    So in this episode, we will. We’ll also talk about the surprising and interesting
    ways this data is currently being utilized to combat the effects of climate change.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我想不到一个更重要的数据集。就在今天，我看到了这样的标题：“随着气候变化，热浪变得更加危险。”你不能说我们没有收到警告。在1988年，我们看到了这样的标题：“专家告诉参议院全球变暖已经开始。”虽然数据科学在揭示我们可能会超过巴黎协定设定的1.5°C目标方面发挥了作用，但我们还有更多可以做的。首先，人们不相信它，但数据是现成的、免费的，而且易于获取。你可以自己检查！所以在这个环节中，我们将这样做。我们还将讨论目前这些数据被用来对抗气候变化影响的令人惊讶和有趣的方式。
- en: 'But climate data is also incredibly interesting. You’ve probably also seen
    headlines like: **Blue Origin launch of 6 people to suborbital space delayed again
    due to weather.**Which makes you think, if we can send someone to the moon, then
    why can’t we be sure about the weather? If difficult doesn’t describe it, then
    a *multidimensional stochastic process* might. From a data science perspective,
    this is our Riemann Hypothesis, our P vs NP problem. How well we can model and
    understand climate data will shape our next decades on this earth. This is the
    most important problem we could be working on.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但气候数据也同样非常有趣。你可能也见过这样的标题：**“蓝色起源将6人送入亚轨道空间再次因天气延误。”**这让你想，如果我们能送人上月球，那么为什么我们无法确定天气？如果“困难”这个词不足以描述，那么一个**多维随机过程**可能更合适。从数据科学的角度来看，这就是我们的黎曼猜想，我们的P
    vs NP问题。我们如何建模和理解气候数据将决定我们在地球上的未来几十年。这是我们可能正在努力解决的最重要的问题。
- en: And while New York just went through a heat wave, it’s necessary to note that
    climate change is worse than just hotter weather.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管纽约刚刚经历了一波热浪，但有必要指出，气候变化不仅仅是天气变热。
- en: Failing harvests undermine global food security, especially in vulnerable regions.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收获失败破坏了全球粮食安全，尤其是在脆弱地区。
- en: Vector-borne diseases expand into new regions as temperatures rise.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着温度升高，由载体传播的疾病扩散到新的地区。
- en: Mass extinctions disrupt ecosystems and erode planetary resilience.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大规模灭绝破坏了生态系统，削弱了行星的韧性。
- en: Ocean acidification unravels marine food chains, threatening fisheries and biodiversity.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 海洋酸化破坏了海洋食物链，威胁到渔业和生物多样性。
- en: Freshwater supplies dwindle under the pressure of drought, pollution, and overuse.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在干旱、污染和过度使用的压力下，淡水供应减少。
- en: But not all is lost; we will talk about some of the ways data has been used
    to address these problems. Here’s a summary of some of the data NASA keeps track
    of. We will access some of these parameters.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但并非一切都已失去；我们将讨论一些使用数据解决这些问题的方法。以下是NASA跟踪的一些数据的总结。我们将访问其中的一些参数。
- en: '![Table of NASA Climate variables available from the NASA POWER API by Marco
    Hening Tallarico](../Images/0f60d92eb055405ee103ae27c0d39270.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![由Marco Hening Tallarico提供的NASA气候变量表，可通过NASA POWER API获取](../Images/0f60d92eb055405ee103ae27c0d39270.png)'
- en: Image by Author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: Getting the data
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获取数据
- en: We’ll start by picking some interesting locations we’ll examine in this series.
    All we need are their coordinates — a click away on Google Maps. I use quite a
    bit of decimal places here, but the meteorological data source resolution is ½°
    x ⅝°, so there’s no need to be this accurate.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从挑选一些我们将在这系列文章中考察的有趣地点开始。我们需要的只是它们的坐标——在谷歌地图上点击一下即可。我在这里使用了相当多的小数位数，但气象数据源的分辨率是½°
    x ⅝°，因此没有必要这么精确。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Next, let’s select some parameters. You can flip through them in the Parameter
    Dictionary [https://power.larc.nasa.gov/parameters/](https://power.larc.nasa.gov/parameters/)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们选择一些参数。您可以在参数字典 [https://power.larc.nasa.gov/parameters/](https://power.larc.nasa.gov/parameters/)
    中浏览它们。
- en: '![NASA POWER API by Marco Hening Tallarico](../Images/ca0621a698201d7ef0d7585d1dec6dae.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![NASA POWER API by Marco Hening Tallarico](../Images/ca0621a698201d7ef0d7585d1dec6dae.png)'
- en: Image by Author
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: You can only request from one community at a time, so we group the parameters
    by community.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 您一次只能从一个社区请求，因此我们将参数按社区分组。
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: How is this data used?
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这些数据是如何被使用的？
- en: '**AG = Agricultural**. Agroeconomists typically use this community in crop
    growth models, such as DSSAT and APSIM, as well as in irrigation planners like
    FAO CROPWAT. It’s also used for livestock heat stress assessment and in building
    **food security early warning systems**. This helps mitigate food insecurity due
    to climate change. This data follows agroeconomic conventions, allowing it to
    be ingested directly by agricultural decision-support tools.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AG = 农业**。农业经济学家通常在作物生长模型（如DSSAT和APSIM）以及灌溉规划器（如FAO CROPWAT）中使用这个社区。它还用于牲畜热应激评估和建立**食品安全早期预警系统**。这有助于减轻气候变化引起的粮食不安全。这些数据遵循农业经济惯例，允许它们直接被农业决策支持工具摄取。'
- en: '**RE = Renewable Energy.** Given the name and the fact that you can get windspeed
    data from here, you might be able to guess its use. This data is primarily used
    to forecast long-term energy yields. Wind speed for turbines, solar radiation
    for solar farms. This data can be fed into PVsyst, NREL-SAM and WindPRO to estimate
    annual energy yields and costs. This data supports everything from rooftop array
    design to national clean energy targets.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RE = 可再生能源**。根据名称以及您可以从这里获取风速数据的事实，您可能能够猜出它的用途。这些数据主要用于预测长期能源产量。风力涡轮机的风速，太阳能农场的太阳辐射。这些数据可以输入到PVsyst、NREL-SAM和WindPRO中，以估算年度能源产量和成本。这些数据支持从屋顶阵列设计到国家清洁能源目标的一切。'
- en: '**SB = Sustainable Buildings.** Architects and HVAC engineers utilize this
    data to ensure their buildings comply with energy performance regulations, like
    IECC or ASHRAE 90.1\. It can be directly dropped into EnergyPlus, OpenStudio,
    RETScreen, or LEED/ASHRAE compliance calculators to verify buildings are up to
    code.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SB = 可持续建筑**。建筑师和暖通空调工程师利用这些数据来确保他们的建筑符合能源性能规范，如IECC或ASHRAE 90.1。它可以直接放入EnergyPlus、OpenStudio、RETScreen或LEED/ASHRAE合规计算器中，以验证建筑是否符合规范。'
- en: Now we pick a start and end date.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们选择开始和结束日期。
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: To make the API call something repeatable, we use a function. We will work with
    daily data, but if you prefer yearly, monthly, or even hourly data, you just need
    to change the URL to
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使API调用可重复，我们使用一个函数。我们将处理每日数据，但如果您更喜欢年度、月度或甚至每小时数据，只需更改URL到
- en: …/temporal/{resolution}/point.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: …/temporal/{resolution}/point.
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This function retrieves the parameters we requested from the community we specified.
    It also converts JSON into a dataframe. Each response always contains a property
    key — if it’s missing, we print an error.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数从我们指定的社区检索我们请求的参数。它还将JSON转换为数据框。每个响应都包含一个属性键——如果它缺失，我们会打印错误信息。
- en: Let’s call this function in a loop to fetch the data for all our locations.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在循环中调用这个函数，以获取所有位置的资料。
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Right now, our data is a dictionary where the values are also dictionaries. It
    looks like this:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我们的数据是一个字典，其值也是字典。它看起来像这样：
- en: '![Dataframe inside a Dataframe by Marco Hening Tallarico](../Images/3c46b996e6424ff20a5fc72ca8c10288.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![Dataframe inside a Dataframe by Marco Hening Tallarico](../Images/3c46b996e6424ff20a5fc72ca8c10288.png)'
- en: This makes using the data complicated. Next, we combine these into one dataframe.
    We join on the data and then concatenate. Since there were no missing values,
    an inner join would yield the same result.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得使用数据变得复杂。接下来，我们将这些数据合并到一个数据框中。我们通过数据连接然后拼接。由于没有缺失值，内部连接会产生相同的结果。
- en: '[PRE5]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: If you’re tired of coding for the day, you can also use their **data access
    tool.** Just click anywhere on the map to retrieve the data. Here I clicked on
    Venice. Then just select a Community, Temporal Average, and your preferred file
    type, CSV, JSON, ASCII, NETCDF, and hit submit. A couple of clicks and you can
    get all the weather data in the world.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您一天编程累了，您也可以使用他们的**数据访问工具**。只需在地图上的任何地方点击以检索数据。这里我点击了威尼斯。然后只需选择一个社区、时间平均值和您首选的文件类型，CSV、JSON、ASCII、NETCDF，然后提交。几个点击后，您就可以获取世界上所有的天气数据。
- en: '[https://power.larc.nasa.gov/data-access-viewer](https://power.larc.nasa.gov/data-access-viewer)'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://power.larc.nasa.gov/data-access-viewer](https://power.larc.nasa.gov/data-access-viewer)'
- en: '![Data Access tool of the NASA POWER API by Marco Hening Tallarico](../Images/9be0fa0a529a1f8b9706427c0ab31dd4.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![NASA POWER API的数据访问工具图，由Marco Hening Tallarico提供](../Images/9be0fa0a529a1f8b9706427c0ab31dd4.png)'
- en: Image by Author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Sanity check
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 合理性检查
- en: Now, let’s perform a quick sanity check to verify that the data we have makes
    sense.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进行快速合理性检查，以验证我们所拥有的数据是否合理。
- en: '[PRE6]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Yes, temperatures in Bangkok are quite a bit hotter than in the Arctic.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，曼谷的气温比北极要高得多。
- en: '![Daily temperatures in Antartica and Thailand by Marco Hening Tallarico](../Images/50956e46bdac7054b9462e2891a32ee1.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![南极和泰国的每日气温图，由Marco Hening Tallarico提供](../Images/50956e46bdac7054b9462e2891a32ee1.png)'
- en: Image by Author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '[PRE7]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Yes, it’s raining more in the Amazon Rainforest than in South Africa.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，亚马逊雨林比南非的降雨量更多。
- en: South Africa experiences droughts, which place a significant burden on the agricultural
    sector.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 南非经历干旱，这对农业部门造成了重大负担。
- en: '![Daily precipitation in South Africa and the amazon rainforest by Marco Hening
    Tallarico](../Images/3579a38c11ea646cde6916aaf86725e7.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![南非和亚马逊雨林的每日降水量图，由Marco Hening Tallarico提供](../Images/3579a38c11ea646cde6916aaf86725e7.png)'
- en: Image by Author
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Yes, wind speeds at 50 meters are a lot faster than at 2 meters.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，50米处的风速比2米处的风速快得多。
- en: Typically, the higher you go, the faster the wind moves. At flight altitude,
    the wind can reach speeds of 200 km/h. That is, until you reach space at 100,000
    meters.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，越高风速越快。在飞行高度，风速可以达到每小时200公里。直到你达到10万米的太空。
- en: '![Wind Speeds in Mexico City at 50m and 10m by Marco Hening Tallarico](../Images/d526586496a9940c33564fdd571e5f57.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![墨西哥城50米和10米处的风速图，由Marco Hening Tallarico提供](../Images/d526586496a9940c33564fdd571e5f57.png)'
- en: Image by Author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We’ll take a much closer look at this data in the following chapters.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在接下来的章节中更详细地研究这些数据。
- en: It’s heating up
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正在变暖
- en: We just went through a heat wave here in Toronto. By the sounds my AC made,
    I think it nearly broke. But in a temperature graph, you need to look quite carefully
    to see that they are rising. This is because there is seasonality and significant
    variability. Things become clearer when we look at the yearly average. We call
    an anomaly the difference between the average for a specific year and the baseline.
    The baseline being the average temperature over 1981–2024, we can then see that
    the recent yearly average is significantly higher than the baseline, primarily
    due to the cooler temperatures present in earlier years. The converse is equally
    true; The early yearly average is significantly lower than the baseline due to
    hotter temperatures in recent years.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在多伦多经历了一场热浪。根据我空调的声音，我觉得它差点就坏了。但在温度图表中，你需要仔细观察才能看出它们在上升。这是因为存在季节性和显著的变异性。当我们查看年平均值时，事情就变得清晰了。我们将特定年份的平均值与基线之间的差异称为异常。基线是1981-2024年的平均温度，然后我们可以看到，近年来的年平均值显著高于基线，这主要是由于早年较冷的温度。反之亦然；由于近年来的高温，早期的年平均值显著低于基线。
- en: 'With all the technical articles present here, headlines like ‘**Grammar as
    an Injectable: A Trojan Horse to NLP Natural Language Processing’.** I hope you’re
    not disappointed by a simple linear regression. But that’s all it takes to show
    that temperatures are rising. Yet people don’t believe.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，所有这些技术文章中，标题如“**语法作为可注射物：自然语言处理（NLP）的特洛伊木马”**。我希望你们不会因为简单的线性回归而感到失望。但仅此就足以表明气温正在上升。然而，人们并不相信。
- en: '[PRE9]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![Photo of rising temperatures in the Sahara by Marco Hening Tallarico](../Images/aa0e73c88fc9830abc2a67638b243207.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![撒哈拉沙漠气温上升的图片，由Marco Hening Tallarico提供](../Images/aa0e73c88fc9830abc2a67638b243207.png)'
- en: Image by Author
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The Sahara is getting hotter by 0.03°C per year. That’s the hottest desert in
    the world. We can even check every location we picked and see that not a single
    one has a negative trend.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 撒哈拉沙漠每年气温上升0.03°C。这是世界上气温最高的沙漠。我们甚至可以检查我们挑选的每一个地点，看看是否有一个地方有负增长趋势。
- en: '![Global temperatures increasing by Marco Hening Tallarico](../Images/41def19d17a236392c07c0929d67bd1b.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![全球气温上升图，由Marco Hening Tallarico提供](../Images/41def19d17a236392c07c0929d67bd1b.png)'
- en: Image by Author
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: So yes, Temperatures are rising.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，是的，气温正在上升。
- en: The forest for the trees
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 专注于树木而忽略了森林
- en: A big reason NASA makes this data open-source is to combat the effects of Climate
    Change. We’ve mentioned modelling crop yields, renewable energy, and sustainable
    building compliance. However, there are additional ways data can be utilized to
    address climate change in a scientific and mathematically grounded manner. If
    you’re interested in this topic, this video by Luis Seco covers things I did not
    get to address in this article, like
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 美国宇航局将数据公开的主要原因是为了对抗气候变化的影响。我们提到了建模作物产量、可再生能源和可持续建筑合规性。然而，还有其他方法可以利用数据以科学和数学为基础的方式应对气候变化。如果你对这个话题感兴趣，Luis
    Seco的这段视频涵盖了我在这篇文章中没有涉及到的内容，比如
- en: The carbon trade and the price of carbon
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 碳交易和碳价
- en: Predictive biomass tool optimizing tree planting
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测性生物量工具优化植树
- en: Safe drinking water in Kenya
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 肯尼亚的饮用水安全
- en: The socioeconomic costs of emissions
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 排放的社会经济成本
- en: Controlled burning of forests
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 森林控制燃烧
- en: I hope you will join me on this journey. In the next episode, we will discuss
    how **differential equations** have been used to model climate. And while much
    is being done to address climate change, the earlier list of effects was not exhaustive.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你们能和我一起踏上这段旅程。在下一集中，我们将讨论如何使用**微分方程**来模拟气候。尽管正在采取许多措施来应对气候变化，但之前列出的影响并不全面。
- en: Melting ice sheets destabilize global climate regulation and accelerate sea-level
    rise.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 冰川融化破坏了全球气候调节，并加速了海平面上升。
- en: Climate-related damages cripple economies through escalating infrastructure
    and health costs.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 气候相关损害通过不断上升的基础设施和医疗保健成本削弱了经济。
- en: Rising numbers of climate refugees strain borders and fuel geopolitical instability.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 气候难民数量增加，边境压力加剧，并推动地缘政治不稳定。
- en: Coastal cities face submersion as seas rise relentlessly
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 海平面持续上升，沿海城市面临淹没的威胁
- en: Extreme weather events shatter records, displacing millions.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极端天气事件打破记录，迫使数百万人流离失所。
- en: But there’s noise, and there’s signal, and they can be separated.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 但有噪音，也有信号，它们可以被区分开来。
