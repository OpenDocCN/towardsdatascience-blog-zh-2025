- en: A Beginner’s Guide to Robotics with Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python机器人入门指南
- en: 原文：[https://towardsdatascience.com/robotics-with-python-for-beginners/](https://towardsdatascience.com/robotics-with-python-for-beginners/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/robotics-with-python-for-beginners/](https://towardsdatascience.com/robotics-with-python-for-beginners/)
- en: Intro
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: '<mdspan datatext="el1760587356728" class="mdspan-comment">**Robots** are machines</mdspan>
    that can perform tasks and make decisions by replicating or substituting human
    actions. **Robotics** is the scientific field focused on the design and construction
    of robots. It is a multidisciplinary combination of:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760587356728" class="mdspan-comment">**机器人**是机器</mdspan>，可以通过复制或替代人类动作来执行任务和做出决策。**机器人学**是专注于机器设计和构建的科学领域。它是一个多学科的结合：
- en: '**Electrical Engineering** for sensors and actuators. [Sensors](https://en.wikipedia.org/wiki/Robotic_sensors)
    gather data from the environment, converting physical properties into electrical
    signals (like our 5 senses). [Actuators](https://en.wikipedia.org/wiki/Actuator)
    convert these signals into physical actions or movements (like our muscles).'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**电气工程**用于传感器和执行器。[传感器](https://en.wikipedia.org/wiki/Robotic_sensors)从环境中收集数据，将物理属性转换为电信号（就像我们的五种感官）。[执行器](https://en.wikipedia.org/wiki/Actuator)将这些信号转换为物理动作或运动（就像我们的肌肉）。'
- en: '**Mechanical Engineering** for the design and movement of the physical structure.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机械工程**用于物理结构的结构和运动。'
- en: '**Computer Science** for the AI software and algorithms.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算机科学**用于AI软件和算法。'
- en: Currently, [***ROS* (Robot Operating System)**](https://www.ros.org/)is the
    main framework for Robotics that handles all the different parts of a robot (sensors,
    motors, controllers, cameras…), where all the components exchange data in a modular
    way. The *ROS* framework is meant for real robot prototypes, and it can be used
    with both Python and C++. Given its popularity, there are many libraries built
    on top of *ROS*, like [***Gazebo***](https://gazebosim.org/home), the most advanced
    3D simulator.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，[***ROS* (机器人操作系统)**](https://www.ros.org/)是机器人领域的主要框架，它处理机器的所有不同部分（传感器、电机、控制器、摄像头…），其中所有组件以模块化的方式交换数据。*ROS*框架旨在用于真实机器人原型，并且可以使用Python和C++。鉴于其受欢迎程度，许多库建立在*ROS*之上，如[***Gazebo***](https://gazebosim.org/home)，最先进的3D模拟器。
- en: '![](../Images/7c86ab126a4a0a2ca264550a08c42882.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7c86ab126a4a0a2ca264550a08c42882.png)'
- en: Photo by [Simon Kadula](https://unsplash.com/@simonkadula?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Simon Kadula](https://unsplash.com/@simonkadula?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上拍摄
- en: 'Since *Gazebo* is quite complicated, one can still learn the basics of Robotics
    and build user-friendly simulations **outside the *ROS* ecosystem**. The main
    Python libraries are:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由于*Gazebo*相当复杂，人们仍然可以在*ROS*生态系统之外学习机器人学的基础知识并构建用户友好的模拟。主要的Python库包括：
- en: '[***PyBullet***](https://pybullet.org/wordpress/)(beginners) — great for experimenting
    with URDF (Unified Robot Description Format), which is the XML schema for describing
    robot bodies, parts, and geometry.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[***PyBullet***](https://pybullet.org/wordpress/)(初学者) — 非常适合实验URDF（统一机器人描述格式），这是描述机器人身体、部件和几何形状的XML模式。'
- en: '[***Webots***](https://cyberbotics.com/)(intermediate) — the physics is more
    accurate, so it can build more complex simulations.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[***Webots***](https://cyberbotics.com/)(中级) — 物理更精确，因此可以构建更复杂的模拟。'
- en: '[***MuJoCo***](https://mujoco.org/)(advanced) — real world simulator, it’s
    used for research-grade experiments. OpenAI’s [***RoboGYM***](https://github.com/openai/robogym)
    library is built on top of *MuJoCo*.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[***MuJoCo***](https://mujoco.org/)(高级) — 真实世界模拟器，用于研究级实验。OpenAI的[***RoboGYM***](https://github.com/openai/robogym)库建立在*MuJoCo*之上。'
- en: '![](../Images/a3a42b8f8574088417eaf6abe9cf8f0d.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a3a42b8f8574088417eaf6abe9cf8f0d.png)'
- en: I created this visualization with *PyBullet*
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我用*PyBullet*创建了此可视化
- en: Since this is a tutorial for beginners, I’m going to show how to **build simple
    3D simulations with *PyBullet***. I will present some useful Python code that
    can be easily applied in other similar cases (just copy, paste, run) and walk
    through every line of code with comments so that you can replicate this example.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这是一个面向初学者的教程，我将展示如何使用*PyBullet***构建简单的3D模拟**。我将展示一些可以轻松应用于其他类似情况的实用Python代码（只需复制、粘贴、运行），并逐行带注释地讲解代码，以便您可以复制此示例。
- en: Setup
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: '*PyBullet* is the most user-friendly physics simulator for games, visual effects,
    Robotics, and Reinforcement Learning. You can easily install it with one of the
    following commands (if *pip* fails, *conda* should definitely work):'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*PyBullet*是游戏、视觉效果、机器人和强化学习中最用户友好的物理模拟器。你可以使用以下命令之一轻松安装它（如果*pip*失败，*conda*应该肯定可以工作）：'
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'You can run *PyBullet* in two main modes:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在两种主要模式下运行*PyBullet*：
- en: '`p.GUI` → opens a window and shows the simulation in real time.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`p.GUI` → 打开一个窗口并实时显示模拟。'
- en: '`p.DIRECT` → no graphics mode, used for scripts.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`p.DIRECT` → 无图形模式，用于脚本。'
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/4c4a9e62d752c150a484d4364ba75996.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4c4a9e62d752c150a484d4364ba75996.png)'
- en: 'Since this is a physics simulator, the first thing to do is set up **gravity**:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这是一个物理模拟器，首先要做的是设置**重力**：
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Sets the global gravity vector for the simulation. “-9.8” on the z-axis means
    an acceleration of [*9.8 m/s^2* downward](https://en.wikipedia.org/wiki/Gravity_of_Earth),
    just like on Earth. Without this, your robot and plane would float in zero-gravity,
    just like in space.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为模拟设置全局重力向量。“-9.8”在z轴上表示向下的加速度为[*9.8 m/s^2*](https://en.wikipedia.org/wiki/Gravity_of_Earth)，就像在地球上一样。没有这个设置，你的机器人和飞机就会在零重力中漂浮，就像在太空中一样。
- en: URDF file
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: URDF文件
- en: If the robot was a human body, the **URDF** **file** would be the skeleton that
    defines its physical structure. It’s written in XML, and it’s basically theblueprint
    for the machine, defining what your robot looks like and how it moves.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果机器人是人体，**URDF** **文件**将是定义其物理结构的骨骼。它是用XML编写的，基本上是机器的蓝图，定义了你的机器人看起来像什么以及它如何移动。
- en: I’m going to show how to create a **simple cube**, which is the 3D equivalent
    of *print(“hello world”)*.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我将展示如何创建一个**简单的立方体**，这是*print(“hello world”)*的3D等价物。
- en: '[PRE3]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: You can either save the XLM code as a URDF file or use it as a string.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将XLM代码保存为URDF文件或将其用作字符串。
- en: '[PRE4]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/ab851db7d4ac1a72a528946f46ed98da.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab851db7d4ac1a72a528946f46ed98da.png)'
- en: Please note that the loop did run with 240 steps. **Why 240?** It’s a fixed
    timestep commonly used in videogame development for a smooth and responsive experience
    without overtaxing the CPU. 60 FPS (frames per second) with 1 frame displayed
    every 1/60 of a second, which means that a physics step of 1/240 seconds provides
    4 physics updates for every rendered frame.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，循环确实运行了240步。**为什么是240？**这是一个在视频游戏开发中常用的固定时间步长，用于提供平滑且响应迅速的体验，而不会过度占用CPU。60
    FPS（每秒帧数）意味着每秒显示1帧，这意味着每渲染一帧提供4次物理更新。
- en: In the previous code, I rendered the cube with `p.stepSimulation()`. It means
    that the simulation is not in real-time and you control when the next physics
    step happens. Alternatively, you could use *time sleep* to bind it to the real
    world clock.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的代码中，我使用`p.stepSimulation()`渲染了立方体。这意味着模拟不是实时进行的，你可以控制下一次物理步骤何时发生。或者，你也可以使用*time
    sleep*将其绑定到现实世界时钟。
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/762e5b666f470adf76f1cdc4a8ed9abc.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/762e5b666f470adf76f1cdc4a8ed9abc.png)'
- en: Going forward, the XML code for robots will get much more complicated. Luckily,
    *PyBullet* comes with a collection of preset URDF files. You can easily load the
    default cube without creating the XML for it.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，机器人的XML代码将变得更加复杂。幸运的是，*PyBullet*附带了一系列预设的URDF文件。你可以轻松加载默认的立方体，而无需为其创建XML。
- en: '[PRE6]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'At its core, a URDF file defines two main things: **links** and **joints**.
    Links are the solid part of the robots (like our bones), and a joint is the connection
    between two rigid links (like our muscles). Without joints, your robot would be
    just a statue, but with joints it becomes a machine with motion and purpose.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，URDF文件定义了两件主要事情：**链接**和**关节**。链接是机器人的实体部分（就像我们的骨骼），而关节是两个刚体链接之间的连接（就像我们的肌肉）。没有关节，你的机器人将只是一个雕像，但有了关节，它就变成了一个具有运动和目的的机器。
- en: In a nutshell, every robot is a tree of links connected by joints. Each joint
    can be fixed (no movement) or rotate (“revolute joint”) and slide (“prismatic
    joint”). Therefore, you need to know the robot you’re using.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，每个机器人都是通过关节连接的链接树。每个关节可以是固定的（无运动）或旋转（“旋转关节”）和滑动（“滑动关节”）。因此，你需要了解你使用的机器人。
- en: Let’s make an example with the famous robot R2D2 from Star Wars.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以著名的机器人R2D2为例，来自《星球大战》。
- en: '![](../Images/5fecb8e1c79d3717f893ae15c92e9223.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5fecb8e1c79d3717f893ae15c92e9223.png)'
- en: Photo by [Alexandr Popadin](https://unsplash.com/@irrabagon?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Alexandr Popadin](https://unsplash.com/@irrabagon?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供
- en: Joints
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关节
- en: This time, we have to **import a plane** as well in order to create a ground
    for the robot. Without a plane, objects would not have a surface to collide with
    and they would just fall indefinitely.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我们必须**导入一个平面**来为机器人创建地面。没有平面，物体就没有表面可以碰撞，它们会无限期地坠落。
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/69a4517b4b019593d45f5f91c8b3532a.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69a4517b4b019593d45f5f91c8b3532a.png)'
- en: Before using the robot, we must understand its components. *PyBullet* has standardized
    the information structure so that every robot you import shall always be defined
    by the same **17 universal attributes**. Since I just want to run a script, I’m
    going to connect to the physics server without the graphic interface (`p.DIRECT`).
    The main function to analyze a joint is `p.getJointInfo()`.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用机器人之前，我们必须了解其组件。*PyBullet*已经标准化了信息结构，因此你导入的每个机器人都应始终由相同的**17个通用属性**定义。由于我只是想运行一个脚本，我将不使用图形界面连接到物理服务器（`p.DIRECT`）。分析关节的主要函数是`p.getJointInfo()`。
- en: '[PRE8]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/c39b7e1cb81b4a92d2d51ad867b882d1.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c39b7e1cb81b4a92d2d51ad867b882d1.png)'
- en: 'Every joint, no matter if it’s a wheel, elbow, or gripper, has to expose those
    same features. The code above shows that R2D2 has 15 joints. Let’s analyze the
    first one, called “base to right-leg”:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 每个关节，无论它是轮子、肘部还是夹爪，都必须展示相同的特征。上面的代码显示R2D2有15个关节。让我们分析第一个，称为“基座到右腿”：
- en: The **joint type** is 4, which means it doesn’t move. The **parent link** is
    -1, which means it is connected to the **base**, the root part of the robot (like
    our skeleton spine). For R2D2, the base is the main cylindrical body, that big
    blue and white barrel.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关节类型**是4，这意味着它不会移动。**父链接**是-1，这意味着它与**基座**连接，即机器人的根部（就像我们的骨骼脊柱）。对于R2D2来说，基座是主要圆柱形身体，那个大蓝白色桶。'
- en: The **link name** is “right leg”, so we understand that this joint connects
    the robot’s base with the right leg, but it’s not motorized. That is confirmed
    by **joint axis**, **joint dumping**, and **joint friction** being all zeros.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链接名称**是“右腿”，因此我们理解这个关节连接了机器人的基座和右腿，但它不是电动的。这一点通过**关节轴**、**关节倾倒**和**关节摩擦**均为零得到证实。'
- en: '**Parent frame position** and **orientation** define where the right leg is
    attached to the base.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**父框架位置**和**方向**定义了右腿连接到基座的位置。'
- en: Links
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 链接
- en: 'On the other hand, in order to analyze the links (the physical body segments),
    one must loop through the joints to extract the link name. Then, you can use two
    main functions: `p.getDynamicsInfo()` to understand the physical properties of
    the link, and `p.getLinkState()` to know its spatial state.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，为了分析链接（物理身体段），必须遍历关节以提取链接名称。然后，你可以使用两个主要函数：`p.getDynamicsInfo()`来了解链接的物理属性，以及`p.getLinkState()`来了解其空间状态。
- en: '[PRE9]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/2b6e572ecb37bea5bb004561be8233c8.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2b6e572ecb37bea5bb004561be8233c8.png)'
- en: Let’s analyze the first one, the “right-leg”. The **mass** of 10 kg contributes
    to gravity and inertia, while the **friction** affects how much it slides when
    contacting the ground. The **orientation** (0.707=*sin(45°)/cos(45°)*) and **position**
    indicate that the right-leg link is a solid piece, slightly forward (5cm), tilted
    90° relative to the base.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析第一个，即“右腿”。10公斤的**质量**对重力惯量有贡献，而**摩擦**影响它接触地面时的滑动程度。**方向**（0.707=**sin(45°)/cos(45°)**）和**位置**表明右腿链接是一个实心部件，略微向前（5cm），相对于基座倾斜90°。
- en: Movements
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运动
- en: Let’s have a look at a joint that can actually move.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个可以实际移动的关节。
- en: 'For istance, joint 2 is the right front wheel. It’s a type=0 joint, so it rotates.
    This joint connects the right leg (link index 1) to the right front wheel: base_link
    → right_leg → right_front_wheel. The joint axis is (0,0,1), so we know that the
    wheel spins around the z-axis. The limits (lower=0, upper=-1) indicate that the
    wheel can spin infinitely, which is normal for rotors.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，关节2是右前轮。它是一个type=0的关节，因此它会旋转。这个关节将右腿（链接索引1）与右前轮连接：base_link → right_leg →
    right_front_wheel。关节轴是（0,0,1），因此我们知道轮子是围绕z轴旋转的。限制（下限=0，上限=-1）表明轮子可以无限旋转，这对于转子来说是正常的。
- en: We can easily **move this joint**. The main command for controlling actuators
    on your robot is `p.setJointMotorControl2()`, it allows to control the force,
    velocity, and position of a joint. In this case, I want to make the wheel spin,
    so I will [apply force to gradually bring the velocity from zero to a target velocity,
    then maintain it by balancing applied force and resistive forces](https://en.wikipedia.org/wiki/Newton%27s_laws_of_motion)
    (i.e. friction, damping, gravity).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以轻松地**移动这个关节**。控制你机器人上执行器的最主要命令是`p.setJointMotorControl2()`，它允许控制关节的力、速度和位置。在这种情况下，我想让轮子旋转，所以我将[逐渐施加力，将速度从零增加到目标速度，然后通过平衡施加的力和阻力来维持它](https://en.wikipedia.org/wiki/Newton%27s_laws_of_motion)（即摩擦、阻尼、重力）。
- en: '[PRE10]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Now, if we apply the same force to **all the 4 wheels**, we will make our little
    robot move forward. From the analysis carried out earlier, we know that the joints
    for the wheel are number 2 and 3 (right side), and number 6 and 7 (left side).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们对**所有4个轮子**施加相同的力，我们的迷你机器人就会向前移动。根据之前进行的分析，我们知道轮子的关节编号为2和3（右侧），以及6和7（左侧）。
- en: '![](../Images/32860610f0c0d819a4e94eb4e65a079e.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/32860610f0c0d819a4e94eb4e65a079e.png)'
- en: Considering that, I shall first make R2D2 turn around by spinning only one side,
    and then apply force to every wheel at the same time to make it move forward.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，我首先让R2D2通过仅旋转一侧来转身，然后同时施加力到每个轮子上，使其向前移动。
- en: '[PRE11]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![](../Images/b619b308442cbda174e828b9183a74fd.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b619b308442cbda174e828b9183a74fd.png)'
- en: Please note that every robot has a different mass (weight) so the movements
    can be different based on the simulation physics (i.e. gravity). You can play
    and try different force and velocity until you find the desired outcome.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，每个机器人的质量（重量）都不同，因此根据模拟的物理（即重力），运动可能会有所不同。您可以尝试不同的力和速度，直到找到理想的结果。
- en: '![](../Images/96fced3b21822c03972c3e0c83e5817d.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/96fced3b21822c03972c3e0c83e5817d.png)'
- en: Conclusion
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article has been a tutorial to **introduce PyBullet and how to create very
    basic 3D simulations** **for Robotics**. We learned how to import URDF objects
    and how to analyze joints and links. We also played with the famous robot R2D2\.
    New tutorials with more advanced robots will come.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章是一个教程，旨在**介绍PyBullet以及如何创建基本的3D模拟** **用于机器人技术**。我们学习了如何导入URDF对象以及如何分析关节和链接。我们还玩了一下著名的机器人R2D2。更多高级机器人的新教程即将到来。
- en: Full code for this article: **[GitHub](https://github.com/mdipietro09/RoboticsPy)**
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章的完整代码：**[GitHub](https://github.com/mdipietro09/RoboticsPy)**
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  id: totrans-77
