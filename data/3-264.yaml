- en: 'Branching Out: 4 Git Workflows for Collaborating on ML'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分支拓展：适用于机器学习协作的4种Git工作流程
- en: 原文：[https://towardsdatascience.com/branching-out-4-git-workflows-for-collaborating-on-ml/](https://towardsdatascience.com/branching-out-4-git-workflows-for-collaborating-on-ml/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/branching-out-4-git-workflows-for-collaborating-on-ml/](https://towardsdatascience.com/branching-out-4-git-workflows-for-collaborating-on-ml/)
- en: It’s been more than 15 years since I finished my master’s degree, but I’m still
    haunted by the hair-pulling frustration of managing my of *R* scripts. As a (recovering)
    perfectionist, I named each script very systematically by date (think: `ancova_DDMMYYYY.r`).
    A system I just *knew* was better than `_v1`, `_v2`, `_final` and its frenemies.
    Right?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 自从完成硕士学位已经超过15年了，但我仍然被管理我的*R*脚本的痛苦和挫败感所困扰。作为一个（正在恢复中的）完美主义者，我按照日期非常系统地给每个脚本命名（想想：`ancova_DDMMYYYY.r`）。一个我确信比`_v1`、`_v2`、`_final`及其竞争对手更好的系统。对吧？
- en: Trouble was, every time I wanted to tweak my model inputs or review a previous
    model version, I had to swim through a sea of scripts.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，每次我想调整我的模型输入或审查先前的模型版本时，我不得不在脚本海洋中游泳。
- en: Fast forward a few years, a few programming languages, and a career slalom later,
    I can clearly see how my solo struggles with code versioning were a lucky wake-up
    call.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 快进几年，几种编程语言，以及职业生涯的滑雪滑行之后，我清楚地看到，我独自与代码版本控制斗争的经历是一个幸运的觉醒。
- en: While I managed to navigate those early challenges (with a few cringey moments!),
    I now recognise that most development, especially with Agile ways of working,
    thrives on robust version control systems. The ability to track changes, revert
    to previous versions, and ensure reproducibility within a collaborative codebase
    can’t be an afterthought. It’s actually a necessity.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我设法克服了那些早期的挑战（伴随着一些令人尴尬的时刻！），但现在我认识到，大多数开发，尤其是在敏捷工作方式下，都依赖于强大的版本控制系统。跟踪变更、回滚到先前版本以及在协作代码库中确保可重复性不能是事后才考虑的事情。实际上，这是一个必需品。
- en: When we use version control workflows, often in Git, we lay the groundwork for
    developing and deploying more reliable and higher quality data and AI solutions.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用版本控制工作流程，通常在Git中，我们为开发并部署更可靠、更高品质的数据和AI解决方案打下基础。
- en: '**Before we begin**'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**在我们开始之前**'
- en: If you already use version control and you’re thinking about different workflows
    for your team, welcome! You’ve come to the right place.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经使用版本控制并且正在考虑为你的团队制定不同的工作流程，欢迎！你来到了正确的地点。
- en: If you’re new to Git or have only used it on solo projects, I recommend reviewing
    some introductory Git principles. You’ll want more background before jumping into
    team workflows. GitHub provides links to several Git and GitHub tutorials [here](https://docs.github.com/en/get-started/start-your-journey/git-and-github-learning-resources).
    And [this](https://towardsdatascience.com/a-simple-git-workflow-for-github-beginners-and-everyone-else-87e39b50ee08) getting
    started post introduces basics like how to create a repo and add a file.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚开始使用Git或者只在使用个人项目时使用过它，我建议你回顾一些Git的入门原则。在跳入团队工作流程之前，你需要更多的背景知识。GitHub提供了几个Git和GitHub教程的链接[这里](https://docs.github.com/en/get-started/start-your-journey/git-and-github-learning-resources)。而且[这篇](https://towardsdatascience.com/a-simple-git-workflow-for-github-beginners-and-everyone-else-87e39b50ee08)入门文章介绍了如何创建仓库和添加文件等基础知识。
- en: '**Development teams work in different ways**'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**开发团队以不同的方式工作**'
- en: But a ubiquitous feature is reliance on version control.
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 但一个普遍的特征是依赖版本控制。
- en: Git is incredibly flexible as a version control system, and it allows developers
    a lot of freedom in how they manage their code. If you’re not careful, though,
    flexibility leaves room for chaos if not managed effectively. Establishing Git
    workflows can guide your team’s development so you’re using Git more consistently
    and efficiently. Think of it as the team’s shared roadmap for navigating Git’s
    highways and byways.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Git作为一个版本控制系统非常灵活，它允许开发者以很大的自由度来管理他们的代码。不过，如果你不小心，灵活性如果没有得到有效管理，就会留下混乱的空间。建立Git工作流程可以指导你的团队开发，使你更一致、更有效地使用Git。把它看作是团队在Git高速公路和旁路上导航的共同路线图。
- en: By defining when we create branches, how we merge changes, and why we review
    code, we create a common understanding and foster more reliable ways of developing
    as a team. Which means that every team has the opportunity to create their own
    Git workflows that work for their specific organisational structure, use-cases,
    tech stack, and requirements. It’s possible to have as many ways of using Git
    as a team as there are development teams. Ultimate flexibility.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 通过定义何时创建分支、如何合并更改以及为什么审查代码，我们创造了一个共同的理解，并培养出更可靠的团队开发方式。这意味着每个团队都有机会创建适合其特定组织结构、用例、技术堆栈和需求的Git工作流程。团队使用Git的方式可能和开发团队一样多。极致的灵活性。
- en: You may find that idea liberating. You and your team have the freedom to design
    a Git workflow that works for you!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会觉得这个想法很自由。你和你的团队有自由设计一个适合你们的工作流程！
- en: But if that sounds intimidating, not to worry. There are several established
    protocols to use as a starting point for agreeing on team workflows.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果这听起来令人生畏，不必担心。有几种既定的协议可以作为团队工作流程的起点。
- en: '**Make Git your friend**'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**让Git成为你的朋友**'
- en: Version control is useful in so many ways, but the benefits I see over and over
    on my teams cluster into a few essential categories. We’re here to focus on workflows
    so I won’t go into great depth, but the central premise and advantages of Git
    and GitHub are worth highlighting.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 版本控制以多种方式有用，但我在我的团队中反复看到的益处主要集中在几个基本类别上。我们在这里关注工作流程，所以不会深入探讨，但Git和GitHub的核心前提和优势值得强调。
- en: '**(Almost) anything is reversible.** Which means that version control systems
    free you up to get creative and make mistakes. Rolling back any regrettable code
    changes is as simple as `git revert`. Like a good neighbour, Git commands are
    there.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**（几乎）任何操作都是可逆的。** 这意味着版本控制系统让您可以自由地发挥创意和犯错误。回滚任何令人遗憾的代码更改就像`git revert`一样简单。就像一个好邻居一样，Git命令就在那里。'
- en: '**Simplifies code collaboration.** Once you get into the flow of using it,
    Git really facilitates seamless collaboration across the team. Work can happen
    concurrently without interfering with anyone else’s code, and code changes are
    all documented in commit snapshots. This means anyone on the team can take a peek
    at what the others have been working on and how they went about it, because the
    changes are captured in the Git history. Collaboration made easy.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**简化代码协作。** 一旦你开始使用它，Git就能真正促进团队间的无缝协作。工作可以并行进行，而不会干扰到任何人的代码，所有的代码更改都记录在提交快照中。这意味着团队中的任何人都可以查看其他人正在做什么以及他们是如何做的，因为更改都记录在Git历史中。协作变得简单易行。'
- en: '**Isolating exploratory work in feature branches.** How will you know which
    model gives the best performance for your specific business problem? In a recent
    revenues use case, it could’ve been time series models, maybe tree-based methods,
    or convolutional neural networks. Possibly even Bayesian approaches. Without the
    parallel branching ability Git provided my team, trialling the different methods
    would’ve resulted in a codebase of pure chaos.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**在功能分支中隔离探索性工作。** 如何知道哪种模型最适合您特定的业务问题？在最近的一个收入案例中，可能是时间序列模型，也许是基于树的算法，或者是卷积神经网络。甚至可能是贝叶斯方法。如果没有Git为我们团队提供的并行分支能力，尝试不同的方法可能会导致代码库陷入混乱。'
- en: '**In-built review process (massively improves code quality).** By putting code
    through peer review using GitHub’s pull request system, I’ve seen team after team
    grow in their abilities to leverage their collective knowledge to write cleaner,
    faster, more modular code. As code review helps team members identify and address
    bugs, design flaws, and maintainability, it ultimately leads to higher quality
    code.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**内置的审查流程（大幅提高代码质量）。** 通过使用GitHub的拉取请求系统进行代码同行评审，我看到一个又一个团队在利用集体知识编写更干净、更快、更模块化的代码方面取得了进步。由于代码审查有助于团队成员识别和解决错误、设计缺陷和可维护性，最终导致代码质量更高。'
- en: '**Reproducibility.** As in, every change made to the codebase is recorded in
    the Git history. Which makes it incredibly easy to track changes, revert to previous
    versions, and reproduce past experiments. I can’t understate its importance for
    debugging, code maintenance, and ensuring the reliability of any experimental
    findings.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**可重现性。** 指的是对代码库的每次更改都记录在Git历史中。这使得跟踪更改、回滚到先前版本和重现过去的实验变得极其容易。我无法低估其在调试、代码维护和确保任何实验发现可靠性的重要性。'
- en: '**Different flavours of workflows for different types of work**'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**针对不同类型工作的不同工作流程**'
- en: '**Feature-branching workflow: The Standard Bearer**'
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**特性分支工作流程：标准代表**'
- en: This is the most common Git workflow used in dev teams. It’d be difficult to
    unseat it in terms of its popularity, and for good reason. In a feature branching
    workflow, each new functionality or improvement to the code is developed in its
    own dedicated branch, separate from the main codebase.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这是开发团队中最常见的Git工作流程。它在流行度方面很难被取代，而且有很好的理由。在特性分支工作流程中，每个新的功能或代码的改进都在其自己的专用分支中开发，与主代码库分开。
- en: A branching workflow provides each developer with an isolated workspace (a branch)
    — their own complete copy of the project. This lets every person on the team do
    focused work, independent of what’s happening elsewhere in the project. They can
    make code changes and forget about upstream development, working independently
    until they’re ready to share their code.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 分支工作流程为每个开发者提供了一个隔离的工作空间（一个分支）——他们自己的项目完整副本。这允许团队中的每个人都能专注于独立的工作，不受项目其他部分发生的事情的影响。他们可以做出代码变更并忘记上游开发，独立工作直到他们准备好分享他们的代码。
- en: At that point, they can take advantage of GitHub’s pull request (PR) functionality
    to facilitate code review and collaborate with the team to ensure the changes
    are evaluated and approved before being merged into the codebase.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 到那时，他们可以利用GitHub的拉取请求（PR）功能来促进代码审查，并与团队协作，确保更改在合并到代码库之前得到评估和批准。
- en: This approach is especially beneficial to Agile development teams and teams
    working on complex projects that call for frequent code changes.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法对敏捷开发团队以及需要频繁代码变更的复杂项目团队特别有益。
- en: 'A feature branching workflow might look like this:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 特性分支工作流程可能看起来是这样的：
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Centralised workflow: Git Primer**'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**集中式工作流程：Git入门**'
- en: This approach is what I think of as an introductory workflow. What I mean is
    that the `main` trunk is the only point where changes enter the repository. A
    single `main` branch is used for all development and all changes are committed
    to this branch, ignoring the existence of branching (we ignore software features
    all the time, right?).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这种方法是一种入门级工作流程。我的意思是，`main`主分支是唯一一个变更进入仓库的点。一个单一的`main`分支被用于所有开发和所有变更都提交到这个分支，忽略分支的存在（我们不是一直忽略软件功能吗？）。
- en: This isn’t an approach you’ll find being used by high-velocity dev teams or
    continuous delivery teams. So you might be wondering — is there ever good reason
    for a centralised Git workflow?
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是你会在高速开发团队或持续交付团队中找到的方法。所以你可能想知道——集中式Git工作流程是否真的有合理的理由？
- en: Two use-cases come to mind.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 想到了两个用例。
- en: First, centralised Git workflows can streamline the initial explorations of
    a very small team. When the focus is on rapid prototyping and the risk of conflicts
    is minimal — as in a project’s early days — a centralised workflow can be convenient.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，集中式Git工作流程可以简化非常小团队的初始探索。当重点是快速原型设计和冲突风险最小——就像项目的早期阶段——集中式工作流程可以很方便。
- en: And second, using a centralised Git workflow can be a good way to migrate a
    team onto version control because it doesn’t require any branches other than `main`.
    Just use with caution as things can quickly go pear shaped. As the codebase grows
    or as more people contribute there’s an greater risk of code conflicts and accidental
    overwrites.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，使用集中式Git工作流程可以是一个将团队迁移到版本控制的好方法，因为它不需要除了`main`以外的任何分支。但请谨慎使用，因为事情可能会迅速变得一团糟。随着代码库的增长或更多人参与，代码冲突和意外覆盖的风险会更大。
- en: Otherwise, centralised Git workflows are generally not recommended for sustained
    development, especially in a team setting.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 否则，集中式Git工作流程通常不推荐用于持续开发，尤其是在团队环境中。
- en: 'A centralised workflow might look like this:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 集中式工作流程可能看起来是这样的：
- en: '[PRE1]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**ML workflows: Branching Experiments**'
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**ML工作流程：分支实验**'
- en: Data scientists and MLOps teams have a somewhat unique use-case compared to
    traditional software development teams. The development of machine learning and
    AI projects is inherently experimental. So from a Git workflow perspective, protocols
    need to flex to accommodate frequent iteration and complex branching strategies.
    You may also need the ability to track more than code, like experiment results,
    data, or model artifacts.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统软件开发团队相比，数据科学家和MLOps团队有一个相对独特的用例。机器学习和AI项目的开发本质上是实验性的。因此，从Git工作流程的角度来看，协议需要灵活以适应频繁迭代和复杂的分支策略。你可能还需要跟踪代码之外的内容，如实验结果、数据或模型工件。
- en: Feature branching augmented with experiment branches is probably the most popular
    approach.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 功能分支与实验分支相结合可能是最受欢迎的方法。
- en: 'This approach starts with the familiar feature branching workflow. Then within
    a feature branch, you create sub-branches for specific experiments. Think: “experiment_hyperparam_tuning”,
    or “experiment_xgboost”. This workflow affords enough granularity and flexibility
    to track individual experiments. And as with standard feature branches, this isolates
    development allowing experimental approaches to be explored without affecting
    the main codebase or other developers’ work.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法从熟悉的功能分支工作流程开始。然后在功能分支内，为特定的实验创建子分支。想想：“experiment_hyperparam_tuning”或“experiment_xgboost”。这种工作流程提供了足够的粒度和灵活性，以跟踪单个实验。并且与标准功能分支一样，这可以隔离开发，允许探索实验方法，而不会影响主代码库或其他开发者的工作。
- en: 'But *caveat emptor*: I said it was popular, but that doesn’t mean the branching
    experiments workflow is simple to manage. It can all turn to a tangled mess of
    spaghetti-branches if things are allowed to grow overly complex. This workflow
    involves frequent branching and merging, which can feel like unnecessary overhead
    in the face of rapid experimentation.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但**注意**：我说它很受欢迎，但这并不意味着分支实验工作流程易于管理。如果事情变得过于复杂，所有这些都可能变成一团糟的意大利面式分支。这种工作流程涉及频繁的分支和合并，这在快速实验面前可能感觉像是不必要的开销。
- en: 'A branching experiments workflow might look like this:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 分支实验工作流程可能看起来像这样：
- en: '[PRE2]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Reproducible ML workflow**'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**可重复的ML工作流程**'
- en: Integrating tools like [MLflow](https://mlflow.org/docs/latest/getting-started/index.html) into
    a feature branching workflow or branching experiments workflow offers additional
    possibilities. Reproducibility is a key concern for ML projects, which is why
    tools like MLflow exist. To help manage the full machine learning lifecycle.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 将像[MLflow](https://mlflow.org/docs/latest/getting-started/index.html)这样的工具集成到功能分支工作流程或分支实验工作流程中，提供了额外的可能性。可重复性是ML项目的一个关键关注点，这也是为什么存在像MLflow这样的工具。它有助于管理整个机器学习生命周期。
- en: For our workflows, MLflow enhances our capabilities by enabling experiment tracking,
    logging model runs in the registry, and comparing the performance of various model
    specifications.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的工作流程，MLflow通过启用实验跟踪、在注册表中记录模型运行和比较不同模型规格的性能来增强我们的能力。
- en: 'For a branching experiments workflow, the MLflow integration might look like
    this:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对于分支实验工作流程，MLflow的集成可能看起来像这样：
- en: '[PRE3]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Takeaways**'
  id: totrans-52
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**要点**'
- en: The Git workflows I’ve shared above should provide a good starting point for
    your team to streamline collaborative development and help them to build high-quality
    data and AI solutions. They’re not rigid templates, but rather adaptable frameworks.
    Try experimenting with different workflows. Then adjust them to craft the an approach
    that’s most effective for your needs.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我上面分享的Git工作流程应该为你的团队提供一个良好的起点，以简化协作开发，并帮助他们构建高质量的数据和AI解决方案。它们不是僵化的模板，而是可适应的框架。尝试实验不同的工作流程。然后调整它们，以制定最适合你需求的方法。
- en: '**Git Workflows Simplify: **The alternative is too frightening, too messy,
    too slow to be sustainable. It’s holding you back.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Git工作流程简化**：另一种选择过于可怕，过于混乱，过于缓慢，无法持续。它正在阻碍你。'
- en: '**Your Team Matters:** The ideal workflow will vary depending on your team’s
    size, structure, and project complexity.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你的团队很重要**：理想的流程将根据你团队的大小、结构和项目复杂性而有所不同。'
- en: '**Project Requirements:** The specific needs of the project, such as the frequency
    of releases and the level of ML experimentation, will also influence your choice
    of workflow.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**项目需求**：项目的具体需求，如发布频率和ML实验水平，也将影响你对工作流程的选择。'
- en: Ultimately, the best Git workflow for any data or MLOps dev team is the one
    that suits the specific requirements and development process of that team.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，最适合任何数据或MLOps开发团队的Git工作流程是满足该团队特定需求和开发过程的那个。
