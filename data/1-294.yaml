- en: If we use AI to do our work – what is our job, then?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果我们用AI来完成我们的工作——那么我们的工作又是什么呢？
- en: 原文：[https://towardsdatascience.com/if-we-use-ai-to-do-our-work/](https://towardsdatascience.com/if-we-use-ai-to-do-our-work/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/if-we-use-ai-to-do-our-work/](https://towardsdatascience.com/if-we-use-ai-to-do-our-work/)
- en: <mdspan datatext="el1757670469677" class="mdspan-comment">Images. Text. Audio.</mdspan>
    There’s no modality that is not handled by AI. And AI systems reach even further,
    planning advertisement and marketing campaigns, automating social media postings,
    … Most of this was unthinkable a mere ten years ago.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757670469677" class="mdspan-comment">图像。文本。音频。</mdspan>
    没有任何一种模式不是由AI处理的。AI系统甚至走得更远，规划广告和营销活动，自动化社交媒体帖子……其中大部分在十年前还是不可想象的。
- en: 'But then, the first machine learning-driven algorithms did their initial steps:
    out of the research labs, into first products. They began to curate content on
    YouTube and social media sites. They started recommending movies on Netflix and
    songs on Spotify. The ranked search results. They played strategic games on par
    with humans. The general rise of AI-enabled *things* has been spectacular.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，最初由机器学习驱动的算法已经迈出了第一步：从研究实验室走向了最初的产品。它们开始在YouTube和社交媒体网站上编辑内容。它们开始在Netflix上推荐电影，在Spotify上推荐歌曲。它们提供了排名搜索结果。它们与人类进行战略游戏。AI赋能的*事物*的普遍兴起是惊人的。
- en: AI in the workplace
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工作场所的AI
- en: And the workplace is not immune against this. As an undergrad, I was studying
    how to construct hyperplanes, centroids, and backpropagation rules, and for most
    of my studies, AI was mostly regarded as an academic research direction. Since
    I entered the job market, this has changed A LOT. Employers and employees alike
    realized the potential of AI for work. In most (digital) workplaces, AI is rapidly
    becoming an invisible co-worker.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 工作场所对此并不免疫。作为一个本科生，我正在学习如何构建超平面、质心以及反向传播规则，在大多数学习期间，AI主要被视为一个学术研究方向。自从我进入职场以来，这一切都发生了很大的变化。雇主和雇员都意识到了AI在工作中的潜力。在大多数（数字）工作场所，AI正在迅速成为一个无形的同事。
- en: 'Many dedicated AI tools already made the leap onto our desktops: programmers
    use AI-assisted coding tools, data analysts prepare pipelines from single sample
    files through AI, and designers draft faster with AI-generated visuals. These
    tools undeniably make work easier. But they also raise a deeper question:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 许多专门的AI工具已经跃上我们的桌面：程序员使用AI辅助编码工具，数据分析师通过AI从单个样本文件准备管道，设计师使用AI生成的视觉元素来快速草绘。这些工具无疑使工作变得更简单。但它们也引发了一个更深层次的问题：
- en: What is one’s work?
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一个人工作的本质是什么？
- en: What is truly my own work? Do I still need to interact with my code, with anything,
    really, in detail?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我真正的工作是什么？我是否还需要与我的代码，与任何事物，真正地详细互动？
- en: The more we AI-ify our workflows, the less we need to engage with our work material.
    It might well turn out that we no longer *need* to become experts, possessing
    deep knowledge about a fairly narrow topic, but rather shallow surfers, taking
    an AI-glimpse here and there.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的工作流程越AI化，我们就越不需要与我们的工作材料互动。很可能会出现这样的情况：我们不再*需要*成为专家，拥有关于相当狭窄主题的深厚知识，而是成为浅尝辄止的冲浪者，在这里那里对AI进行一瞥。
- en: In other words, we become mere managers of how work is done by AI. Notice there’s
    no “our” in front of *work*.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我们变成了AI完成工作的简单管理者。注意，在*工作*前面没有“我们”。
- en: Is that, can that be fulfilling? Do we not need some sense of depth in our work?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 那是，那能令人满足吗？我们工作中不需要一些深度感吗？
- en: I well remember a time when I had to handle multiple concurrent projects. At
    that time, which was before AI took hold in the offices, I was often switching
    between three different and mostly unrelated projects per day. Together with semi-urgent
    interruptions, one can imagine that there was not much time to spend extended
    time on a single topic; before I could go deep enough into any topic to make actual
    progress, I already had to switch.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我清楚地记得有一次我不得不处理多个并发项目。在那时，也就是在AI在办公室站稳脚跟之前，我每天通常要在这三个不同且大多无关的项目之间切换。加上半紧急的干扰，可以想象，没有太多时间可以花在单个主题上；在我能够足够深入地研究任何主题以取得实际进展之前，我就不得不切换。
- en: 'Nowadays, AI systems often act as proxies, preventing us from needing to engage
    with a project in the first place. Even though we might be working on a single
    project only, we *prompt our way forward* – which leads to the question:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，AI系统通常充当代理，防止我们一开始就需要与项目互动。即使我们可能只在一个项目上工作，我们也会*提示性地前进*——这引发了一个问题：
- en: '**If we use AI to do our work, what is our work, then?**'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果我们用AI来完成我们的工作，那么我们的工作又是什么呢？**'
- en: Is our work simply doing more work? AI is often hailed as allowing us to do
    more, which implies that, given the same working times, we need to engage with
    the material even less.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的工作仅仅是做更多的工作吗？AI经常被赞扬为让我们可以做更多，这意味着，在相同的工作时间内，我们甚至需要更少地与材料互动。
- en: This implies that, by definition, we cannot gain profound experience in one
    topic.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，根据定义，我们无法在一个主题上获得深刻的经验。
- en: This, further, implies that we could, in principle, do any job that is related
    enough to our skills.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这进一步意味着，原则上，我们可以做任何与我们技能相关足够紧密的工作。
- en: Which, finally, means that somebody else could do our job.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，这意味着别人可以代替我们工作。
- en: We are, thus, replaceable as soon as AI automation scales.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一旦AI自动化扩展，我们就会变得可替代。
- en: How can we prevent this?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何防止这种情况发生？
- en: 'Use AI deliberately: Think first, prompt later'
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 故意使用AI：先思考，后提示
- en: 'In my opinion, the only way* is: use AI deliberately, selectively. Do not outsource
    your thinking. Don’t let your ability to think deeply and critically decay through
    unconscious non-use.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，唯一的方式*是：有选择地、故意地使用AI。不要外包你的思考。不要让你的深度思考和批判性思维能力因为无意识的非使用而退化。
- en: 'It’s completely fine — often even smart — to use AI tools for the truly boring
    tasks that any decently skilled person could do. For programmers, safe (in the
    sense of not making us dumber) uses of AI include: summarizing codebases, creating
    README documents, generating boilerplate, or loading and cleaning data.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI工具来完成那些真正无聊的任务——任何具备一定技能的人都能完成的任务——是完全没问题的一—甚至有时还很聪明。对于程序员来说，AI的合理使用（在不会让我们变得更笨的意义上）包括：总结代码库、创建README文档、生成模板代码，或者加载数据并进行清理。
- en: But when the task at hand requires human judgment, interpretation, or specific
    design choices and tradeoffs, that’s when you should resist the temptation to
    hand it off. These are exactly the moments where you build the expertise that
    keeps you irreplaceable.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 但当手头的任务需要人类的判断、解释或特定的设计选择和权衡时，这就是你应该抵制将任务外包的诱惑。这些正是你建立保持你不可替代的专业知识的时刻。
- en: 'To make this more concrete, you can use this simple heuristic when deciding
    on using AI assistance:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点更具体，你可以在决定使用AI辅助时使用这个简单的经验法则：
- en: Task that are Low-stake, repetitive, well-defined → Let AI help.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 低风险、重复性、定义明确的任务→让AI帮忙。
- en: 'Examples are: formatting code, generating test stubs, writing SQL queries.'
  id: totrans-27
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如：格式化代码、生成测试桩、编写SQL查询。
- en: 'Task that are high-stake, ambiguous, or require human judgment → Do it yourself.
    Examples are: designing system architecture, interpreting experiment results,
    making ethical decisions.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高风险、模糊或需要人类判断的任务→自己完成。例如：设计系统架构、解释实验结果、做出道德决策。
- en: This rule of thumb keeps the “boring” stuff automated while protecting the work
    that actually builds your expertise. To integrate the heuristics into daily practice,
    you should Intentionally pause before a task. Ask yourself: *Do I want to/need
    to understand this deeply, or just get it done?*
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这个经验法则可以在自动化“无聊”任务的同时，保护那些真正构建你专业知识的工作。为了将启发式方法融入日常实践，你应该在任务开始前有意地暂停。问问自己：*我是否想要/需要深入理解这个，或者只是完成它？*
- en: Then, if the goal is understanding → start manually. Code the first draft, debug
    yourself, sketch the design. Once you’ve thought it through, you can augment your
    works with the output of an AI system.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，如果目标是理解→开始手动操作。编写第一个草稿，自己调试，草图设计。一旦你深思熟虑，你就可以用AI系统的输出增强你的作品。
- en: However, if the goal is mere output → let AI accelerate you. Prompt it, adapt
    it, and repeat with the next task.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果目标是仅仅输出→让AI加速你。提示它，适应它，然后对下一个任务重复。
- en: Think of it as a mantra: **“Think first, prompt later.”**
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 将其视为一个咒语：**“先思考，后提示。”**
- en: 'Then, at the end of a work week, you can reflect back: which tasks did you
    outsource to AI this week? Did you *learn* something from those tasks, or just
    complete them? Where could you have benefited from engaging more deeply?'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在一周工作结束时，你可以回顾一下：这周你将哪些任务外包给了AI？你是否从那些任务中*学习*到了什么，或者只是完成了它们？你可以在哪里从更深入地参与中受益？
- en: Closing thought
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结尾思考
- en: It turns out that, as AI is more and more used in the workplace, our real job
    might not be to churn out more output with AI. Instead, our job is to engage directly
    with the material when it matters — to build the kind of judgment, insight, and
    depth that no system can replace.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，随着AI在职场中越来越被广泛使用，我们的真正工作可能不是用AI产生更多的输出。相反，我们的工作是在关键时刻直接与材料互动——建立那种任何系统都无法替代的判断力、洞察力和深度。
- en: So, use AI deliberately. Yes, automate the boring parts, but protect the parts
    that make you grow. That balance is what will keep your work not only valuable,
    but also fulfilling.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，有意识地使用人工智能。是的，自动化那些无聊的部分，但保护那些让你成长的部分。这种平衡将使你的工作不仅有价值，而且令人满足。
- en: '* * *'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '* A non-alternative for most machine learning folks who spent considerable
    time building a career in data science: switching careers to do something manual
    and offline. Examples are construction work, hair dressing, waiting, etc.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '* 对于大多数投入大量时间在数据科学领域建立职业生涯的机器学习人员来说，这不是一个替代方案：转行从事手动和离线工作。例如，建筑工作、理发、等待等。'
