- en: When You Just Can’t Decide on a Single Action
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 当你无法决定采取单一行动时
- en: 原文：[https://towardsdatascience.com/when-you-just-cant-decide-on-a-single-action/](https://towardsdatascience.com/when-you-just-cant-decide-on-a-single-action/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/when-you-just-cant-decide-on-a-single-action/)'
- en: In game theory, the players typically have to make assumptions about the other
    players’ actions. What will the other player do? Will he use rock, paper or scissors?
    You never know, but in some cases, you might have an idea of the probability of
    some actions being higher than others. Adding such a notion of probability or
    randomness opens up a new chapter in game theory that lets us analyse more complicated
    scenarios.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在博弈论中，玩家通常必须对其他玩家的行动做出假设。其他玩家会做什么？他们会出石头、剪刀还是布？你永远不知道，但在某些情况下，你可能会对某些行动发生的概率高于其他行动有所了解。添加这种概率或随机性的概念为博弈论开辟了新的篇章，使我们能够分析更复杂的场景。
- en: This article is the third in a four-chapter series on the fundamentals of game
    theory. If you haven’t checked out the [first](https://towardsdatascience.com/talking-about-games/)
    [two](https://towardsdatascience.com/i-wont-change-unless-you-do/) chapters yet,
    I’d encourage you to do that to become familiar with the basic terms and concepts
    used in the following. If you feel ready, let’s go ahead!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章是关于博弈论基础的四章系列中的第三篇。如果你还没有阅读前两章[第一篇](https://towardsdatascience.com/talking-about-games/)
    [第二篇](https://towardsdatascience.com/i-wont-change-unless-you-do/)，我鼓励你先阅读它们，以便熟悉以下内容中使用的术语和概念。如果你准备好了，我们就继续吧！
- en: '**Mixed Strategies**'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**混合策略**'
- en: '![](../Images/d5268174c2f49602ef1099ba688c5838.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5268174c2f49602ef1099ba688c5838.png)'
- en: To the best of my knowledge, soccer is all about hitting the goal, although
    that happens very infrequently. Photo by [Zainu Color](https://unsplash.com/@zainukappan)
    on [Unsplash](https://unsplash.com)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我所知，足球就是射门得分，尽管这种情况发生的频率很低。照片由[Zainu Color](https://unsplash.com/@zainukappan)在[Unsplash](https://unsplash.com)提供。
- en: So far we have always considered games where each player chooses exactly one
    action. Now we will extend our games by allowing each player to select different
    actions with given *probabilities*, which we call a **mixed strategy**. If you
    play rock-paper-scissors, you do not know which action your opponent takes, but
    you might guess that they select each action with a probability of 33%, and if
    you play 99 games of rock-paper-scissors, you might indeed find your opponent
    to choose each action roughly 33 times. With this example, you directly see the
    main reasons why we want to introduce probability. First, it allows us to describe
    games that are played multiple times, and second, it enables us to consider a
    notion of the (assumed) likelihood of a player’s actions.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直考虑的是每个玩家都恰好选择一个行动的游戏。现在我们将通过允许每个玩家以给定的*概率*选择不同的行动来扩展我们的游戏，这种策略我们称之为**混合策略**。如果你玩石头剪刀布，你不知道你的对手会采取什么行动，但你可能会猜测他们选择每个行动的概率是33%，如果你玩99场石头剪刀布，你确实可能会发现你的对手每个行动大约选择33次。通过这个例子，你直接看到我们引入概率的主要原因。首先，它允许我们描述多次进行的游戏，其次，它使我们能够考虑（假设的）玩家行动的可能性。
- en: Let me demonstrate the later point in more detail. We come back to the soccer
    game we saw in chapter 2, where the keeper decides on a corner to jump into and
    the other player decides on a corner to aim for.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我更详细地说明后面的观点。我们回到第二章中看到的足球比赛，守门员决定跳入哪个角球，而另一名球员决定瞄准哪个角球。
- en: '![](../Images/de743d866edeb1b19d6b403d28dd13c1.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/de743d866edeb1b19d6b403d28dd13c1.png)'
- en: A game matrix for a penalty shooting.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 一张点球大战的博弈矩阵。
- en: 'If you are the keeper, you win (reward of 1) if you choose the same corner
    as the opponent and you lose (reward of -1) if you choose the other one. For your
    opponent, it is the other way round: They win, if you select different corners.
    This game only makes sense, if both the keeper and the opponent select a corner
    randomly. To be precise, if one player knows that the other always selects the
    same corner, they know exactly what to do to win. So, the key to success in this
    game is to choose the corner by some random mechanism. The main question now is,
    what probability should the keeper and the opponent assign to both corners? Would
    it be a good strategy to choose the right corner with a probability of 80%? Probably
    not.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你担任守门员，如果你选择了与对手相同的角落，你将获胜（奖励为1），如果你选择了另一个角落，你将失败（奖励为-1）。对于你的对手来说，情况正好相反：如果你选择了不同的角落，他们将获胜。这种游戏只有在守门员和对手都随机选择角落时才有意义。更准确地说，如果一个玩家知道另一个玩家总是选择相同的角落，他们就知道如何做才能获胜。因此，在这个游戏中取得成功的关键是通过某种随机机制来选择角落。现在的主要问题是，守门员和对手应该将什么概率分配给两个角落？以80%的概率选择正确的角落是否是一个好策略？可能不是。
- en: To find the best strategy, we need to find the Nash equilibrium, because that
    is the state where no player can get any better by changing their behaviour. In
    the case of mixed strategies, such a Nash Equilibrium is described by a probability
    distribution over the actions, where no player wants to increase or decrease any
    probability anymore. In other words, it is optimal (because if it were not optimal,
    one player would like to change). We can find this optimal probability distribution
    if we consider the **expected reward**. As you might guess, the expected reward
    is composed of the reward (also called utility) the players get (which is given
    in the matrix above) times the likelihood of that reward. Let’s say the shooter
    chooses the left corner with probability p and the right corner with probability
    1-p. What reward can the keeper expect? Well, if they choose the left corner,
    they can expect a reward of p*1 + (1-p)*(-1). Do you see how this is derived from
    the game matrix? If the keeper chooses the left corner, there is a probability
    of p, that the shooter chooses the same corner, which is good for the keeper (reward
    of 1). But with a chance of (1-p), the shooter chooses the other corner and the
    keeper loses (reward of -1). In a likewise fashion, if the keeper chooses the
    right corner, he can expect a reward of (1-p)*1 + p*(-1). Consequently, if the
    keeper chooses the left corner with probability q and the right corner with probability
    (1-q), the overall expected reward for the keeper is q times the expected reward
    for the left corner plus (1-q) times the reward for the right corner.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到最佳策略，我们需要找到纳什均衡，因为那是没有玩家可以通过改变自己的行为来获得更好结果的唯一状态。在混合策略的情况下，这种纳什均衡由一个概率分布来描述，其中没有任何玩家想要增加或减少任何概率。换句话说，它是最优的（因为如果不是最优的，一个玩家会想要改变）。如果我们考虑**预期奖励**，我们就可以找到这个最优概率分布。正如你可能猜到的，预期奖励是由玩家获得的奖励（也称为效用，如上表所示）乘以获得该奖励的可能性。假设射手以概率
    p 选择左边的角落，以概率 1-p 选择右边的角落。守门员可以期望获得什么奖励？好吧，如果他们选择左边的角落，他们可以期望获得 p*1 + (1-p)*(-1)
    的奖励。你能看到这是如何从游戏矩阵中推导出来的吗？如果守门员选择左边的角落，有概率 p，射手会选择相同的角落，这对守门员是有利的（奖励为1）。但以 (1-p)
    的概率，射手会选择另一个角落，守门员会输（奖励为-1）。同样地，如果守门员选择右边的角落，他可以期望获得 (1-p)*1 + p*(-1) 的奖励。因此，如果守门员以概率
    q 选择左边的角落，以概率 (1-q) 选择右边的角落，守门员的整体预期奖励是 q 乘以左边的预期奖励加上 (1-q) 乘以右边的奖励。
- en: Now let’s take the perspective of the shooter. He wants the keeper to be indecisive
    between the corners. In other words, he wants the keeper to see no advantage in
    any corner so he chooses randomly. Mathematically that means that the expected
    rewards for both corners should be equal, i.e.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们从射手的视角来看。他希望守门员在两个角落之间犹豫不决。换句话说，他希望守门员在任何一个角落都看不到优势，因此他会随机选择。从数学上讲，这意味着两个角落的预期奖励应该是相等的，即
- en: '![](../Images/520ed895acb6028a0009720e642e8e8f.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/520ed895acb6028a0009720e642e8e8f.png)'
- en: which can be solved to p=0.5\. So the optimal strategy for the shooter to keep
    the keeper indecisive is to choose the right corner with a probability of p=0.5
    and hence choose the left corner with an equal probability of p=0.5.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以解为 p=0.5。因此，射手使守门员犹豫不决的最佳策略是以概率 p=0.5 选择正确的角落，并以相同的概率 p=0.5 选择左边的角落。
- en: 'But now imagine a shooter who is well known for his tendency to choose the
    right corner. You might not expect a 50/50 probability for each corner, but you
    assume he will choose the right corner with a probability of 70%. If the keeper
    stays with their 50/50 split for choosing a corner, their expected reward is 0.5
    times the expected reward for the left corner plus 0.5 times the expected reward
    for the right corner:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在想象一个以倾向于选择正确角而闻名的射手。你可能不会期望每个角都有50/50的概率，但你假设他会以70%的概率选择正确的角。如果守门员保持50/50的分割选择角，他们的预期奖励是左角预期奖励的0.5倍加上右角预期奖励的0.5倍：
- en: '![](../Images/f0727b7a1773885f95d7541dc958b255.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f0727b7a1773885f95d7541dc958b255.png)'
- en: That does not sound too bad, but there is a better option still. If the keeper
    always chooses the right corner (i.e., q=1), they get a reward of 0.4, which is
    better than 0\. In this case, there is a clear best answer for the keeper which
    is to favour the corner the shooter prefers. That, however, would lower the shooter’s
    reward. If the keeper always chooses the right corner, the shooter would get a
    reward of -1 with a probability of 70% (because the shooter themself chooses the
    right corner with a probability of 70%) and a reward of 1 in the remaining 30%
    of cases, which yields an expected reward of 0.7*(-1) + 0.3*1 = -0.4\. That is
    worse than the reward of 0 they got when they chose 50/50\. Do you remember that
    a Nash equilibrium is a state, where no player has any reason to change his action
    unless any other player does? This scenario is not a Nash equilibrium, because
    the shooter has an incentive to change his action more towards a 50/50 split,
    even if the keeper does not change his strategy. This 50/50 split, however, is
    a Nash equilibrium, because in that scenario neither the shooter nor the keeper
    gains anything from changing their probability of choosing the one or the other
    corner.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来并不太糟糕，但仍然有更好的选择。如果守门员总是选择右角（即，q=1），他们可以得到0.4的奖励，这比0要好。在这种情况下，守门员有一个明显的最佳答案，那就是偏向射手偏好的角。然而，这会降低射手的奖励。如果守门员总是选择右角，射手将以70%的概率得到-1的奖励（因为射手自己以70%的概率选择右角），在剩余的30%的情况下得到1的奖励，这导致预期奖励为0.7*(-1)
    + 0.3*1 = -0.4。这比他们选择50/50时得到的0的奖励要差。你还记得纳什均衡是一个状态，在这个状态下，除非其他玩家改变他们的行动，否则没有玩家有理由改变自己的行动吗？这个场景不是纳什均衡，因为射手有动力改变自己的行动，使其更接近50/50的分割，即使守门员没有改变策略。然而，这个50/50的分割是一个纳什均衡，因为在那种情况下，射手和守门员都不会从改变他们选择一个或另一个角的概率中获得任何好处。
- en: '**Fighting birds**'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**斗鸡**'
- en: '![](../Images/34385a42df2e9ab23fbeb84a75528916.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/34385a42df2e9ab23fbeb84a75528916.png)'
- en: Food can be a reason for birds to fight each other. Photo by [](https://unsplash.com)
    [Viktor Keri](https://unsplash.com/@viktorkeri) on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 食物可以是鸟类相互争斗的原因。照片由[Viktor Keri](https://unsplash.com/@viktorkeri)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供。
- en: From the previous example we saw, that a player’s assumptions about the other
    player’s actions influence the first player’s action selection as well. If a player
    wants to behave rationally (and this is what we always expect in game theory),
    they would choose actions such that they maximize their expected reward given
    the other players’ mixed action strategies. In the soccer scenario it is quite
    simple to more often jump into a corner, if you assume that the opponent will
    choose that corner more often, so let us continue with a more complicated example,
    that takes us outside into nature.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的例子中我们可以看到，一个玩家对另一个玩家行为的假设会影响第一个玩家的行动选择。如果一个玩家想要理性地行动（在博弈论中我们总是期望如此），他们会选择那些在考虑其他玩家混合行动策略的情况下最大化预期奖励的行动。在足球场景中，如果你假设对手会更多地选择某个角，那么更频繁地跳入那个角是很简单的，所以让我们继续一个更复杂的例子，这个例子将我们带入了自然之中。
- en: 'As we walk across the forest, we notice some interesting behaviour in wild
    animals. Say two birds come to a place where there is something to eat. If you
    were a bird, what would you do? Would you share the food with the other bird,
    which means less food for both of you? Or would you fight? If you threaten your
    opponent, they might give in and you have all the food for yourself. But if the
    other bird is as aggressive as you, you end up in a real fight and you hurt each
    other. Then again you might have preferred to give in in the first place and just
    leave without a fight. As you see, the outcome of your action depends on the other
    bird. Preparing to fight can be very rewarding if the opponent gives in, but very
    costly if the other bird is willing to fight as well. In matrix notation, this
    game looks like this:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们穿越森林时，我们注意到野生动物中的一些有趣行为。比如说，两只鸟来到一个有食物的地方。如果你是一只鸟，你会怎么做？你会和另一只鸟分享食物，这意味着你们两个都会少吃一些？还是你会战斗？如果你威胁你的对手，他们可能会屈服，你就可以独自享用所有的食物。但如果是另一只鸟和你一样好斗，你最终会陷入真正的战斗，你们两个都会受伤。然后，你可能一开始就宁愿屈服，不战斗就离开。正如你所看到的，你的行动结果取决于另一只鸟。如果对手屈服，准备战斗可能非常有回报，但如果另一只鸟也愿意战斗，成本可能非常高。在矩阵表示法中，这个游戏看起来是这样的：
- en: '![](../Images/40d1b814c9d405f87430fe9243ea0f34.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/40d1b814c9d405f87430fe9243ea0f34.png)'
- en: A matrix for a game that is someties called hawk vs. dove.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个有时被称为鹰对鸽子的游戏的矩阵。
- en: 'The question is, what would be the rational behaviour for a given distribution
    of birds who fight or give in? If you are in a very dangerous environment, where
    most birds are known to be aggressive fighters, you might prefer giving in to
    not get hurt. But if you assume that most other birds are cowards, you might see
    a potential benefit in preparing for a fight to scare the others away. By calculating
    the expected reward, we can figure out the exact proportions of birds fighting
    and birds giving in, which forms an equilibrium. Say the probability to fight
    is denoted p for bird 1 and q for bird 2, then the probability for giving in is
    1-p for bird 1 and 1-q for bird 2\. In a Nash equilibrium, no player wants to
    change their strategies unless any other payer does. Formally that means, that
    both options need to yield the same expected reward. So, for bird 2 fighting with
    a probability of q needs to be as good as giving in with a probability of (1-q).
    This leads us to the following formula we can solve for q:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，对于战斗或屈服的鸟的分布，理性的行为是什么？如果你处于一个非常危险的环境中，大多数鸟都已知是好斗的战斗者，你可能会更喜欢屈服以避免受伤。但如果你假设大多数其他鸟都是懦夫，你可能会看到为战斗做准备以吓跑其他鸟的潜在好处。通过计算预期回报，我们可以找出战斗和屈服的鸟的确切比例，这形成了一个平衡状态。假设战斗的概率用p表示鸟1，q表示鸟2，那么屈服的概率对鸟1来说是1-p，对鸟2来说是1-q。在纳什均衡中，没有玩家想要改变他们的策略，除非其他玩家这样做。正式来说，这意味着两种选择都需要产生相同的预期回报。所以，鸟2以q的概率战斗需要和以(1-q)的概率屈服一样好。这导致我们得到以下可以解出q的公式：
- en: '![](../Images/8170a3742df1d2f3f73e2d4a6fef6106.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8170a3742df1d2f3f73e2d4a6fef6106.png)'
- en: For bird 2 it would be optimal to fight with a probability of 1/3 and give in
    with a probability of 2/3, and the same holds for bird 1 because of the symmetry
    of the game. In a big population of birds, that would mean that a third of the
    birds are fighters, who usually seek the fight and the other two-thirds prefer
    giving in. As this is an equilibrium, these ratios will stay stable over time.
    If it were to happen that more birds became cowards who always give in, fighting
    would become more rewarding, as the chance of winning increased. Then, however,
    more birds would choose to fight and the number of cowardly birds decreases and
    the stable equilibrium is reached again.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于鸟2来说，以1/3的概率战斗，以2/3的概率屈服是最佳选择，由于游戏的对称性，鸟1也是如此。在一个大型的鸟群中，这意味着有三分之一的鸟是战斗者，它们通常寻求战斗，而另外三分之二的鸟更喜欢屈服。由于这是一个平衡状态，这些比例将随着时间的推移而保持稳定。如果发生更多鸟成为总是屈服的懦夫，那么战斗将变得更加有利可图，因为获胜的机会增加了。然而，随后更多的鸟会选择战斗，懦夫鸟的数量减少，并再次达到稳定的平衡状态。
- en: '**Report a crime**'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**报告犯罪**'
- en: '![](../Images/40ba39319600b4c01af4363e8061f387.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/40ba39319600b4c01af4363e8061f387.png)'
- en: There is nothing to see here. Move on and learn more about game theory. Photo
    by [JOSHUA COLEMAN](https://unsplash.com/@joshstyle) on [Unsplash](https://unsplash.com)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这里没有什么可看的。继续前进，了解更多关于博弈论的知识。照片由[JOSHUA COLEMAN](https://unsplash.com/@joshstyle)在[Unsplash](https://unsplash.com)提供。
- en: Now that we have understood that we can find optimal Nash equilibria by comparing
    the expected rewards for the different options, we will use this strategy on a
    more sophisticated example to unleash the power game theory analyses can have
    for realistic complex scenarios.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经理解了我们可以通过比较不同选项的预期奖励来找到最优的纳什均衡，我们将使用这个策略在更复杂的例子上展示博弈论分析在现实复杂场景中的力量。
- en: 'Say a crime happened in the middle of the city centre and there are multiple
    witnesses to it. The question is, who calls the police now? As there are many
    people around, everybody might expect others to call the police and hence refrain
    from doing it themself. We can model this scenario as a game again. Let’s say
    we have *n* players and everybody has two options, namely *calling the police*
    or *not calling it*. And what is the *reward*? For the reward, we distinguish
    three cases. If nobody calls the police, the reward is zero, because then the
    crime is not reported. If you call the police, you have some costs (e.g. the time
    you have to spend to wait and tell the police what happened), but the crime is
    reported which helps keep your city safe. If somebody else reports the crime,
    the city would still be kept safe, but you didn’t have the costs of calling the
    police yourself. Formally, we can write this down as follows:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 假设犯罪发生在市中心，有多个目击者。问题是，现在谁会打电话报警？由于周围有很多人，每个人都可能期望其他人会打电话报警，因此他们自己会避免这样做。我们可以再次将这个场景建模为一个游戏。假设我们有
    *n* 个玩家，每个人都有两个选择，即 *打电话报警* 或 *不打电话报警*。那么奖励是什么？对于奖励，我们区分三种情况。如果没有人打电话报警，奖励为零，因为这样犯罪就不会被报告。如果你打电话报警，你会有一些成本（例如，你必须花费的时间等待并告诉警察发生了什么），但犯罪会被报告，这有助于保持你的城市安全。如果其他人报告了犯罪，城市仍然会被保持安全，但你没有自己打电话报警的成本。正式地，我们可以这样写下：
- en: '![](../Images/6fac5af32cf69a454e1e16540c030e6a.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6fac5af32cf69a454e1e16540c030e6a.png)'
- en: '*v* is the reward of keeping the city safe, which you get either if somebody
    else calls the police (first row) or if you call the police yourself (second row).
    However, in the second case, your reward is diminished a little by the costs *c*
    you have to take. However, let us assume that *c* is smaller than *v*, which means,
    that the costs of calling the police never exceed the reward you get from keeping
    your city safe. In the last case, where nobody calls the police, your reward is
    zero.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '*v* 是保持城市安全的奖励，你可以通过其他人打电话报警（第一行）或者你自己打电话报警（第二行）来获得。然而，在第二种情况下，你的奖励会因为你要承担的成本
    *c* 而稍微减少。然而，让我们假设 *c* 小于 *v*，这意味着，打电话报警的成本永远不会超过你从保持你的城市安全中获得的奖励。在最后一种情况中，没有人打电话报警，你的奖励为零。'
- en: 'This game looks a little different from the previous ones we had, mainly because
    we didn’t display it as a matrix. In fact, it is more complicated. We didn’t specify
    the exact number of players (we just called it *n*), and we also didn’t specify
    the rewards explicitly but just introduced some values *v* and *c*. However, this
    helps us model a quite complicated real situation as a game and will allow us
    to answer more interesting questions: First, what happens if more people witness
    the crime? Will it become more likely that somebody will report the crime? Second,
    how do the costs *c* influence the likelihood of the crime being reported? We
    can answer these questions with the game-theoretic concepts we have learned already.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这个博弈看起来与之前的有些不同，主要是因为我们没有以矩阵的形式展示它。事实上，它更复杂。我们没有指定确切的玩家数量（我们只是称之为 *n*），我们也没有明确指定奖励，只是引入了一些值
    *v* 和 *c*。然而，这有助于我们将一个相当复杂的情况建模为一个游戏，并允许我们回答更有趣的问题：首先，如果更多的人目击了犯罪行为，会发生什么？有人报告犯罪的可能性会增加吗？其次，成本
    *c* 如何影响犯罪被报告的可能性？我们可以用我们已经学到的博弈论概念来回答这些问题。
- en: 'As in the previous examples, we will use the Nash equilibrium’s property that
    in an optimal state, nobody should want to change their action. That means, for
    every individual calling the police should be as good as not calling it, which
    leads us to the following formula:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 就像之前的例子一样，我们将使用纳什均衡的性质，即在最优状态下，没有人应该想要改变他们的行动。这意味着，对于每一个打电话报警的人来说，应该和没有打电话报警一样好，这导致我们得到以下公式：
- en: '![](../Images/9c3a720ddcaa7849afac1663a5b5001e.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c3a720ddcaa7849afac1663a5b5001e.png)'
- en: 'On the left, you have the reward if you call the police yourself (*v-c*). This
    should be as good as a reward of *v* times the likelihood that anybody else calls
    the police. Now, the probability of anybody else calling the police is the same
    as 1 minus the probability that nobody else calls the police. If we denote the
    probability that an individual calls the police with *p*, the probability that
    a single individual does *not* call the police is *1-p*. Consequently, the probability
    that two individuals don’t call the police is the product of the single probabilities,
    (1-p)*(1-p). For n-1 individuals (all individuals except you), this gives us the
    term 1-p to the power of n-1 in the last row. We can solve this equation and finally
    arrive at:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在左边，如果你自己打电话报警，你会得到奖励（v-c）。这应该和任何人打电话报警的奖励 v 一样好。现在，其他人打电话报警的概率与没有人打电话报警的概率相同。如果我们用
    p 表示个体打电话报警的概率，那么单个个体不打电话报警的概率是 1-p。因此，两个个体都不打电话报警的概率是单个概率的乘积，即 (1-p)*(1-p)。对于
    n-1 个个体（除了你之外的所有个体），这在上面的最后一行给出了 1-p 的 n-1 次方项。我们可以解这个方程，最终得到：
- en: '![](../Images/4f48385112c4486b49714c9807661165.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4f48385112c4486b49714c9807661165.png)'
- en: 'This last row gives you the probability of a single individual calling the
    police. What happens, if there are more witnesses to the crime? If n gets larger,
    the exponent becomes smaller (1/n goes towards 0), which finally leads to:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这最后一行给出了单个个体打电话报警的概率。如果有更多的见证者目睹犯罪行为会发生什么？如果 n 变得更大，指数会变得更小（1/n 趋向于 0），最终导致：
- en: '![](../Images/35cfb9305665f6aa9f8f72cd4ecc5b95.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/35cfb9305665f6aa9f8f72cd4ecc5b95.png)'
- en: Given that x to the power of 0 is always 1, p becomes zero. In other words,
    the more witnesses are around (higher n), the less likely it becomes that you
    call the police, and for an infinite amount of other witnesses, the probability
    drops to zero. This sounds reasonable. The more other people around, the more
    likely you are to expect that anybody else will call the police and the smaller
    you see your responsibility. Naturally, all other individuals will have the same
    chain of thought. But that also sounds a little tragic, doesn’t it? Does this
    mean that nobody will call the police if there are many witnesses?
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 x 的 0 次方始终等于 1，p 变为 0。换句话说，周围见证者越多（n 越高），你打电话报警的可能性就越小，对于无限多的见证者，概率会降至 0。这听起来合情合理。周围的人越多，你越有可能期望其他人会报警，而你自己的责任感就越小。自然，所有其他个体都会有相同的思维链。但这听起来也有些悲剧，不是吗？这难道意味着如果有许多见证者，没有人会打电话报警吗？
- en: Well, not necessarily. We just saw that the probability of a single person calling
    the police declines with higher n, but there are still more people around. Maybe
    the sheer number of people around counteracts this diminishing probability. A
    hundred people with a small probability of calling the police each might still
    be worth more than a few people with moderate individual probabilities. Let us
    now take a look at the probability that anybody calls the police.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，不一定。我们刚刚看到，单个个体打电话报警的概率随着 n 的增加而下降，但周围的人仍然更多。也许人数的多少抵消了这种下降的概率。一百个人每个人有很小的报警概率可能仍然比几个有适度个人概率的人更有价值。现在让我们来看看任何人打电话报警的概率。
- en: '![](../Images/29adf56be338ac5beab2d1b9508e956b.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29adf56be338ac5beab2d1b9508e956b.png)'
- en: The probability that anybody calls the police is equal to 1 minus the probability
    that nobody calls the police. Like in the example before, the probability of nobody
    calling the police is described by 1-p to the power of n. We then use an equation
    we derived previously (see formulas above) to replace (1-p)^(n-1) with c/v.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人打电话报警的概率等于 1 减去没有人打电话报警的概率。就像之前的例子一样，没有人打电话报警的概率由 1-p 的 n 次方来描述。然后我们使用之前推导出的方程（见上方公式）将
    (1-p)^(n-1) 替换为 c/v。
- en: When we look at the last line of our calculations, what happens for big n now?
    We already know that p drops to zero, leaving us with a probability of 1-c/v.
    This is the likelihood that *anybody* will call the police if there are many people
    around (note that this is different from the probability that a *single individual*
    calls the police). We see that this likelihood heavily depends on the ratio of
    c and v. The smaller c, the more likely it is that anybody calls the police. If
    c is (close to) zero, it is almost certain that the police will be called, but
    if c is almost as big as v (that is, the costs of calling the police eat up the
    reward of reporting the crime), it becomes unlikely that anybody calls the police.
    This gives us a lever to influence the probability of reporting crimes. Calling
    the police and reporting a crime should be as effortless and low-threshold as
    possible.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们查看计算的最后一条线时，对于大的n现在会发生什么？我们已经知道p下降到零，留下1-c/v的概率。这是在许多人周围时任何人都会报警的可能性（注意，这与一个**单个个体**报警的概率不同）。我们看到这个可能性很大程度上取决于c和v的比率。c越小，任何人报警的可能性就越大。如果c接近于零，几乎可以肯定警察会被叫来，但如果c几乎和v一样大（即报警的成本吞噬了报告犯罪的奖励），那么任何人报警的可能性就变得很小。这为我们提供了一个影响报告犯罪概率的杠杆。报警和报告犯罪应该尽可能轻松和低门槛。
- en: '**Summary**'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**摘要**'
- en: '![](../Images/ac13eccb137673874c59f6d9afe73904.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ac13eccb137673874c59f6d9afe73904.png)'
- en: We have learned a lot about probabilities and choosing actions randomly today.
    Photo by [Robert Stump](https://unsplash.com/@stumpie10) on [Unsplash](https://unsplash.com)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们今天学到了很多关于概率和随机选择行动的知识。照片由[Robert Stump](https://unsplash.com/@stumpie10)在[Unsplash](https://unsplash.com)提供
- en: 'In this chapter on our journey through the realms of game theory, we have introduced
    so-called **mixed strategies,** which allowed us to describe games by the probabilities
    with which different actions are taken. We can summarize our key findings as follows:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们探索博弈论领域的旅程中，我们介绍了所谓的**混合策略**，这使我们能够通过不同行动被采取的概率来描述游戏。我们可以总结我们的主要发现如下：
- en: A mixed strategy is described by a probability distribution over the different
    actions.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 混合策略由不同行动的概率分布来描述。
- en: In a **Nash equilibrium**, the **expected reward** for all actions a player
    can take must be equal.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**纳什均衡**中，玩家可以采取的所有行动的**预期收益**必须相等。
- en: In mixed strategies, a Nash equilibrium means that no player wants to **change
    the probabilities** of their actions
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在混合策略中，纳什均衡意味着没有任何玩家想要**改变他们行动的概率**
- en: We can find out the probabilities of different actions in a Nash equilibrium
    by setting the expected rewards of two (or more) options equal.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以通过将两个（或更多）选项的预期收益设为相等来找出纳什均衡中不同行动的概率。
- en: Game-theoretic concepts allow us to analyze scenarios with an infinite amount
    of players. Such analyses can also tell us how the exact shaping of the reward
    can influence the probabilities in a Nash equilibrium. This can be used to inspire
    decisions in the real world, as we saw in the crime reporting example.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 博弈论概念使我们能够分析有无限多玩家的场景。这样的分析还可以告诉我们，精确塑造奖励如何影响纳什均衡中的概率。这可以用来启发现实世界的决策，正如我们在犯罪报告的例子中所看到的。
- en: We are almost through with our series on the fundamentals of game theory. In
    the next and final chapter, we will introduce the idea of taking turns in games.
    Stay tuned!
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们即将完成关于博弈论基础的系列文章。在下一章和最后一章中，我们将介绍游戏中轮流的概念。敬请期待！
- en: '**References**'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**参考文献**'
- en: 'The topics introduced here are typically covered in standard textbooks on game
    theory. I mainly used this one, which is written in German though:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这里介绍的主题通常在博弈论的标准教科书中都有涉及。我主要使用了这本，尽管它是用德语写的：
- en: 'Bartholomae, F., & Wiens, M. (2016). *Spieltheorie. Ein anwendungsorientiertes
    Lehrbuch*. Wiesbaden: Springer Fachmedien Wiesbaden.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Bartholomae, F., & Wiens, M. (2016). *博弈论. 一本应用导向的教科书*. 沃斯巴登: 斯普林格专业媒体沃斯巴登.'
- en: 'An alternative in English language could be this one:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 英文中的一个替代版本可以是这个：
- en: 'Espinola-Arredondo, A., & Muñoz-Garcia, F. (2023). *Game Theory: An Introduction
    with Step-by-step Examples*. Springer Nature.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Espinola-Arredondo, A., & Muñoz-Garcia, F. (2023). *博弈论：带步骤示例的入门*. 斯普林格自然出版社.
- en: 'Game theory is a rather young field of research, with the first main textbook
    being this one:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 博弈论是一个相对较新的研究领域，其第一本主要教科书就是这本：
- en: Von Neumann, J., & Morgenstern, O. (1944). Theory of games and economic behavior.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Von Neumann, J., & Morgenstern, O. (1944). Theory of games and economic behavior.
- en: '*Like this article?*[*Follow me*](https://medium.com/@doriandrost) *to be notified
