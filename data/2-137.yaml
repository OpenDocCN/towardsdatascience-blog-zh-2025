- en: How to Overlay a Heatmap on a Real Map with Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用Python在真实地图上叠加热力图
- en: 原文：[https://towardsdatascience.com/how-to-overlay-a-heatmap-on-a-real-map-with-python/](https://towardsdatascience.com/how-to-overlay-a-heatmap-on-a-real-map-with-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-overlay-a-heatmap-on-a-real-map-with-python/](https://towardsdatascience.com/how-to-overlay-a-heatmap-on-a-real-map-with-python/)
- en: <mdspan datatext="el1752691461711" class="mdspan-comment">When data journalists</mdspan>
    need a simple, engaging, and scalable method for presenting geospatial data, they
    often turn to a *heatmap*. This 2D visualization divides a map into equal-sized
    grid cells and uses color to represent the magnitude of aggregated data values
    within the cells.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752691461711" class="mdspan-comment">当数据记者</mdspan>需要一种简单、吸引人且可扩展的方法来展示地理空间数据时，他们通常会转向*热力图*。这种二维可视化将地图划分为等大小的网格单元格，并使用颜色来表示单元格内聚合数据值的强度。
- en: Overlaying heatmaps on geographical maps permits quick visualization of spatial
    phenomena. Patterns such as clusters, hotspots, outliers, or gradients become
    immediately obvious. This format can be useful to decision-makers and the public,
    who might not be well-versed in raw statistical outputs.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在地理地图上叠加热力图允许快速可视化空间现象。例如，集群、热点、异常值或梯度等模式会立即变得明显。这种格式对于决策者和公众来说可能很有用，他们可能不太熟悉原始的统计输出。
- en: Heatmaps may be composed of square cells (called *grid-based* or *matrix* heatmaps)
    or smoothly contoured “continuous” values (called *spatial* or *kernel density*
    heatmaps). The following maps show the density of tornado *starting* locations
    using both approaches.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 热力图可能由正方形单元格（称为*基于网格*或*矩阵*热力图）或平滑的“连续”值（称为*空间*或*核密度*热力图）组成。以下地图展示了使用这两种方法计算出的龙卷风*起始*位置的密度。
- en: '![](../Images/7211e2945f7397e6e1b562e579cbcec1.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7211e2945f7397e6e1b562e579cbcec1.png)'
- en: Example of a grid-based heatmap (top) and kernel-density heatmap (bottom) (by
    the author)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 网格型热力图（顶部）和核密度热力图（底部）的示例（作者提供）
- en: If you squint your eyes while looking at the top map, you should see trends
    similar to those in the bottom map.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你眯着眼睛看上面的地图，你应该会看到与下面地图中类似的趋势。
- en: I prefer grid-based heatmaps because the sharp, distinct boundaries make it
    easier to compare the values of adjacent cells, and outliers don’t get “smoothed
    away.” I also have a soft spot for their pixelated appearance as my first video
    games were Pong and Wolfenstein 3D.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢基于网格的热力图，因为清晰的、明显的边界使得比较相邻单元格的值变得更容易，并且异常值不会被“平滑掉”。我也对它们的像素化外观情有独钟，因为我的第一款视频游戏是Pong和Wolfenstein
    3D。
- en: In addition, kernel density heatmaps can be computationally expensive and sensitive
    to the input parameters. Their appearance is highly dependent on the chosen kernel
    function and its bandwidth or radius. A poor parameterization choice can either
    over-smooth or under-smooth the data, obscuring patterns.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，核密度热力图可能计算成本高，且对输入参数敏感。它们的形状高度依赖于选择的核函数及其带宽或半径。参数化选择不当可能会导致数据过度平滑或不足平滑，从而掩盖模式。
- en: In this *Quick Success Data Science* project, we’ll use Python to make static,
    grid-based heatmaps for tornado activity in the continental United States.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个*快速成功数据科学*项目中，我们将使用Python为美国大陆的龙卷风活动创建静态的、基于网格的热力图。
- en: The Dataset
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: For this tutorial, we’ll use tornado data from the *National Oceanic and Atmospheric
    Administration’s* wonderful [public-domain](https://www.weather.gov/disclaimer)
    database. Extending back to 1950, it covers tornado starting and ending locations,
    magnitudes, injuries, fatalities, financial costs, and more.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个教程，我们将使用来自**国家海洋和大气管理局**的精彩[公有领域](https://www.weather.gov/disclaimer)数据库中的龙卷风数据。这些数据可以追溯到1950年，涵盖了龙卷风的起始和结束位置、强度、伤害、死亡人数、经济损失等更多信息。
- en: The data is accessible through NOAA’s [Storm Prediction Center](https://www.spc.noaa.gov/wcm/). The
    CSV-format dataset, highlighted yellow in the following figure, covers the period
    1950 to 2023\. Don’t bother downloading it. For convenience, I’ve provided a link
    in the code to access it programmatically.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可以通过NOAA的[风暴预测中心](https://www.spc.noaa.gov/wcm/)获取。以下图中突出显示的黄色CSV格式数据集涵盖了1950年至2023年的时期。请勿下载它。为了方便，我在代码中提供了一个链接，可以编程访问它。
- en: '![](../Images/d48ad85d4e7a620abefe496a384bd336.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d48ad85d4e7a620abefe496a384bd336.png)'
- en: From the NOAA Severe Weather Database download page (by the author)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 来自NOAA严重天气数据库下载页面（作者提供）
- en: This CSV file contains 29 columns for almost 69,000 tornadoes. You can find
    a key to the column names [here](https://www.spc.noaa.gov/wcm/data/SPC_severe_database_description.pdf).
    We’ll work primarily with the tornado starting locations (slat, slon), the year
    (yr), and the storm magnitudes (mag).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 此CSV文件包含29列，几乎有69,000个龙卷风。您可以在[这里](https://www.spc.noaa.gov/wcm/data/SPC_severe_database_description.pdf)找到列名键。我们将主要使用龙卷风起始位置（slat,
    slon）、年份（yr）和风暴强度（mag）。
- en: Installing Libraries
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装库
- en: You’ll want to install [NumPy](https://numpy.org/install/), [Matplotlib](https://matplotlib.org/stable/users/getting_started/),
    [pandas](https://pandas.pydata.org/pandas-docs/stable/getting_started/install.html),
    and [GeoPandas](https://geopandas.org/en/stable/getting_started/install.html).
    The previous links provide installation instructions. We’ll also use the Shapely
    library, which is part of the GeoPandas installation.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要安装[NumPy](https://numpy.org/install/)、[Matplotlib](https://matplotlib.org/stable/users/getting_started/)、[pandas](https://pandas.pydata.org/pandas-docs/stable/getting_started/install.html)和[GeoPandas](https://geopandas.org/en/stable/getting_started/install.html)。前面的链接提供了安装说明。我们还将使用Shapely库，它是GeoPandas安装的一部分。
- en: 'For reference, this project used the following versions:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 作为参考，此项目使用了以下版本：
- en: '**python 3.10.18**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**python 3.10.18**'
- en: '**numpy 2.2.5**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**numpy 2.2.5**'
- en: '**matplotlib 3.10.0**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**matplotlib 3.10.0**'
- en: '**pandas 2.2.3**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**pandas 2.2.3**'
- en: '**geopandas 1.0.1**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**geopandas 1.0.1**'
- en: '**shapely 2.0.6**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**shapely 2.0.6**'
- en: The Simplified Code
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简化代码
- en: It doesn’t take a lot of code to overlay a heatmap on a geographical map. The
    following code illustrates the basic process, although much of it serves ancillary
    purposes, such as limiting the US data to the Lower 48 states and improving the
    look of the colorbar.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在地理地图上叠加热图不需要很多代码。以下代码展示了基本过程，尽管其中大部分服务于辅助目的，例如将美国数据限制在48个州以下，并改善颜色条的外观。
- en: In the next section, we’ll refactor and expand this code to perform additional
    filtering, employ more configuration constants for easy updates, and use helper
    functions for clarity.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将重构和扩展此代码以执行额外的过滤、使用更多配置常量以方便更新，并使用辅助函数以提高清晰度。
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Here’s the result:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是结果：
- en: '![](../Images/a0bf216d14d0b256532a15bf81048a39.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a0bf216d14d0b256532a15bf81048a39.png)'
- en: Tornado density heatmap of all recorded tornado starting locations (by the author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 所有记录的龙卷风起始位置（作者提供）的龙卷风密度热图
- en: The Expanded Code
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展代码
- en: The following Python code was written in JupyterLab and is described by cell.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 以下Python代码是在JupyterLab中编写的，并由单元格描述。
- en: Importing Libraries / Assigning Constants
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 导入库 / 分配常量
- en: After importing the necessary libraries, we define a series of configuration
    constants that allow us to easily adjust the filter criteria, map boundaries,
    plot dimensions, and more. For this analysis, we focus on tornadoes within the
    contiguous United States, filtering out states and territories outside this area
    and selecting only significant events (those rated EF3 to EF5 on the [Enhanced
    Fujita Scale](https://www.weather.gov/oun/efscale)) from the complete dataset
    spanning 1950 to 2023\. The results are aggregated to 50×50-mile grid cells.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在导入必要的库之后，我们定义了一系列配置常量，使我们能够轻松调整过滤标准、地图边界、绘图尺寸等。对于这次分析，我们专注于美国本土的龙卷风，过滤掉该区域外的州和领土，并从1950年到2023年的完整数据集中选择仅包含EF3至EF5级（[增强藤田等级](https://www.weather.gov/oun/efscale)）的重要事件。结果被聚合到50×50英里网格单元格中。
- en: '[PRE1]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Defining Helper Functions
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义辅助函数
- en: The next cell defines two helper functions for loading and filtering the dataset
    and for loading and filtering the state boundaries. Note that we call on previous
    configuration constants during the process.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个单元格定义了两个辅助函数，用于加载数据集并进行过滤，以及加载数据集状态边界并进行过滤。请注意，我们在过程中调用了之前的配置常量。
- en: '[PRE2]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Note that the tilde (`~`) in front of the mask and `states_temp_gdf` expressions
    inverts the results, so we select rows where the state abbreviation is *not* in
    the excluded list.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在掩码和`states_temp_gdf`表达式前的波浪号（`~`）会反转结果，因此我们选择那些州缩写不在排除列表中的行。
- en: Running Helper Functions and Generating the Heatmap
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行辅助函数并生成热图
- en: The following cell calls the helper functions to load and filter the dataset
    and then clip the data to the map boundaries, generate the heatmap (with the NumPy
    `histogram2d()` method), and define a continuous colormap for the heatmap. Note
    that we again call on previous configuration constants during the process.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 以下单元格调用辅助函数来加载数据集并进行过滤，然后将数据裁剪到地图边界内，生成热图（使用NumPy的`histogram2d()`方法），并为热图定义一个连续的颜色映射。请注意，我们在过程中再次调用了之前的配置常量。
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Because this process can take a few seconds, the `print()` function keeps us
    up-to-date on the program’s progress:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个过程可能需要几秒钟，`print()`函数使我们能够了解程序的进度：
- en: '[PRE4]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Plotting the Results
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绘制结果
- en: The final cell generates and saves the plot. Matplotlib’s `imshow()` method
    is responsible for plotting the heatmap. For more on `imshow()`, see this [article](https://towardsdatascience.com/heatmaps-for-time-series/).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 最终单元格生成并保存了图表。Matplotlib的`imshow()`方法是负责绘制热图的。有关`imshow()`的更多信息，请参阅这篇文章[热图用于时间序列](https://towardsdatascience.com/heatmaps-for-time-series/)。
- en: '[PRE5]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'This produces the following map:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这产生了以下地图：
- en: '![](../Images/b9678076375c287c580d32c0534e86c2.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9678076375c287c580d32c0534e86c2.png)'
- en: Tornado density map of EF 3-5 tornado starting locations (by the author)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: EF 3-5级龙卷风起始位置密度图（作者绘制）
- en: This is a beautiful map and more informative than a smooth KDE alternative.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一张美丽的地图，比平滑的KDE替代方案更有信息量。
- en: Adding Tornado Ending Locations
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加龙卷风结束位置
- en: Our tornado density heatmaps are based on the *starting* locations of tornadoes.
    But tornadoes move after touching down. The average tornado track is about 3 miles
    long, but when you look at stronger storms, the numbers increase. EF‑3 tornadoes
    average 18 miles, and EF‑4 tornadoes average 27 miles. Long-track tornadoes are
    rare, however, comprising [less than 2%](https://www.tornadopath.com/united-states)
    of all tornadoes.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的龙卷风密度热图基于龙卷风的**起始**位置。但龙卷风着陆后会移动。平均龙卷风轨迹长度约为3英里，但当你观察更强的风暴时，数字会增加。EF-3龙卷风平均18英里，EF-4龙卷风平均27英里。然而，长轨迹龙卷风很少见，占所有龙卷风的[不到2%](https://www.tornadopath.com/united-states)。
- en: Because the average tornado track length is less than the 50-mile dimension
    of our grid cells, we can expect them to cover only one or two cells in general.
    Thus, including the tornado ending location should help us improve our density
    measurement.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 由于平均龙卷风轨迹长度小于我们网格单元的50英里维度，我们预计它们通常只会覆盖一个或两个单元。因此，包括龙卷风结束位置应该有助于我们改进密度测量。
- en: To do this, we’ll need to combine the starting and ending lat-lon locations
    and *filter out* endpoints that share the *same cell* as their corresponding starting
    points. Otherwise, we’ll “double-dip” when counting. The code for this is a bit
    long, so I’ve stored it in this [Gist](https://gist.github.com/rlvaugh/68c858f577fbd592224228ec1afa3464).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们需要结合起始和结束的经纬度位置，并**过滤掉**与对应起始点**相同单元格**的端点。否则，在计数时会出现“双重计算”。这段代码有点长，所以我将它存储在这个[Gist](https://gist.github.com/rlvaugh/68c858f577fbd592224228ec1afa3464)中。
- en: 'Here’s a comparison of the “start only” map with the combined starting and
    ending locations:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是“仅起始”地图与结合起始和结束位置的地图的比较：
- en: '![](../Images/5139863bffca4e62725adbd108af2dd0.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5139863bffca4e62725adbd108af2dd0.png)'
- en: Comparison of heatmap of starting locations (top) with heatmap of starting and
    ending locations (bottom) (by the author)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 起始位置热图（顶部）与起始和结束位置热图（底部）的比较（作者绘制）
- en: The prevailing winds drive most tornadoes toward the east and northeast. You
    can see the impact in states like Missouri, Mississippi, Alabama, and Tennessee.
    These areas have brighter cells in the bottom map due to tornadoes starting in
    one cell and ending in the adjacent easterly cell. Note also that the maximum
    number of tornadoes in a given cell has increased from 29 (in the upper map) to
    33 (in the bottom map).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 主要的风向将大多数龙卷风推向东方和东北方。你可以在密苏里州、密西西比州、阿拉巴马州和田纳西州等州看到其影响。这些区域在底部地图中具有更亮的细胞，因为龙卷风从一个细胞开始并在相邻的东向细胞中结束。注意，给定细胞中的龙卷风最大数量已从上图的29个增加到下图的33个。
- en: Recap
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: We used Python, pandas, GeoPandas, and Matplotlib to project and overlay heatmaps
    onto geographical maps. Geospatial heatmaps are a highly effective way to visualize
    regional trends, patterns, hotspots, and outliers in statistical data.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用了Python、pandas、GeoPandas和Matplotlib将热图投影并叠加到地理地图上。地理空间热图是可视化统计数据中区域趋势、模式、热点和异常的高效方法。
- en: 'If you enjoy these types of projects, be sure to check out my book, [*Real
    World Python: A Hacker’s Guide to Solving Problems with Code*](https://a.co/d/cejWu6d),
    available in bookstores and online.'
  id: totrans-64
