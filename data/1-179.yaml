- en: How I Tailored the Resume That Landed Me $100K+ Data Science and ML Offers
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我如何定制简历，获得10万+美元的数据科学和机器学习报价
- en: 原文：[https://towardsdatascience.com/this-resume-landed-me-100k-data-science-ml-offers/](https://towardsdatascience.com/this-resume-landed-me-100k-data-science-ml-offers/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/this-resume-landed-me-100k-data-science-ml-offers/](https://towardsdatascience.com/this-resume-landed-me-100k-data-science-ml-offers/)
- en: <mdspan datatext="el1760986204715" class="mdspan-comment">I have reviewed</mdspan>
    over 100 data science and machine learning resumes, both as a practitioner in
    the field and a career coach
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760986204715" class="mdspan-comment">我已经审查了</mdspan>超过100份数据科学和机器学习简历，无论是作为该领域的从业者还是职业导师。
- en: And being honest, most of them *suck*.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 诚实地讲，其中大多数都**很糟糕**。
- en: It’s actually not that hard to write a good resume, yet many people can’t seem
    to get the basics right.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，写一份好的简历并不难，但许多人似乎无法掌握基本要点。
- en: A good resume is what gets your foot in the door for interviews, so nailing
    this part of the interview process is essential.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 一份好的简历是让你进入面试的第一步，因此掌握面试过程中的这一部分至关重要。
- en: So in this article, I want to walk you through my resume that landed me multiple
    $100k+ offers across data science and machine learning, and offer my key advice
    through every section.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在这篇文章中，我想带你们看看我的简历，它让我在数据科学和机器学习领域获得了多个10万+美元的报价，并在我每个部分提供关键建议。
- en: The Resume (at a glance)
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简历（概览）
- en: If you haven’t got time to read through the whole article, this is the resume
    in PDF format from [LaTeX](https://www.latex-project.org/) (using [Overleaf](https://www.overleaf.com/project))
    and a Google Doc version.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有时间阅读整篇文章，这是来自 [LaTeX](https://www.latex-project.org/)（使用 [Overleaf](https://www.overleaf.com/project)）的PDF格式简历和一个Google文档版本。
- en: '![](../Images/b2a8c01c3ad6b7210000ed808aa23170.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b2a8c01c3ad6b7210000ed808aa23170.png)'
- en: Image by author.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: If you want to get this template and learn how to apply it, then check the link
    below.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要获取这个模板并学习如何应用它，请查看下面的链接。
- en: '[**https://resume.egorhowell.com**](https://resume.egorhowell.com)'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[**https://resume.egorhowell.com**](https://resume.egorhowell.com)'
- en: The reason I have two versions is that the PDF version generated by LaTeX looks
    more aesthetically pleasing, [but it can be problematic with the Application Tracking
    System (ATS)](https://academia.stackexchange.com/questions/193671/do-applicant-tracking-systems-ats-struggle-with-latex-generated-resumes).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我有两个版本的原因是，LaTeX生成的PDF版本看起来更美观，[但与申请跟踪系统（ATS）可能会有问题](https://academia.stackexchange.com/questions/193671/do-applicant-tracking-systems-ats-struggle-with-latex-generated-resumes)。
- en: That’s why I have a separate version in Google Doc format, which is much more
    ATS-friendly.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么我有一个单独的Google文档格式版本，它对ATS更加友好。
- en: The ATS is essentially an automated system that helps filter candidates who
    don’t match well with the job role or description. Like any system, it has flaws
    and sometimes struggles to parse formats, such as PDF versions produced by LaTeX.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: ATS本质上是一个自动化系统，帮助筛选与工作角色或描述不匹配的候选人。像任何系统一样，它有缺陷，有时难以解析格式，例如由LaTeX生成的PDF版本。
- en: '[Almost all Fortune 500 companies (99%)](https://www.selectsoftwarereviews.com/blog/applicant-tracking-system-statistics)
    utilise ATS for recruitment, and [75% of resumes fail to pass ATS](https://www.expertresumepros.com/post/the-shocking-of-resumes-that-fail-employers-applicant-tracking-software-ats-system)
    and are never seen by a recruiter.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[几乎所有财富500强公司（99%）](https://www.selectsoftwarereviews.com/blog/applicant-tracking-system-statistics)
    都使用ATS进行招聘，而 [75%的简历未能通过ATS](https://www.expertresumepros.com/post/the-shocking-of-resumes-that-fail-employers-applicant-tracking-software-ats-system)
    并且从未被招聘人员看到。'
- en: So, if I am applying in a scenario where there is no guarantee a real human
    will see it, like LinkedIn quick apply or Indeed job forms, I use the Google Doc
    format to be safe.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果我在一个没有保证有真人会看到我的简历的场景下申请，比如LinkedIn快速申请或Indeed工作表单，我会使用Google文档格式以确保安全。
- en: If I know a recruiter, hiring manager or any other physical human will see my
    resume, then I provide them with the PDF version from LaTeX/Overleaf.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我知道招聘人员、招聘经理或其他任何真人会看到我的简历，那么我会提供从LaTeX/Overleaf生成的PDF版本。
- en: Let’s now break down each section along with my top tips!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在逐个分析每个部分，并分享我的顶级技巧！
- en: '*The LaTeX template is based from this [template](https://www.overleaf.com/latex/templates/data-science-tech-resume-template/zcdmpfxrzjhv)
    by [Timmy Chan](https://www.linkedin.com/in/timmy-l-chan/). You can check the
    [source code here](https://github.com/TimmyChan/data-science-tech-resume-template)
    on his GitHub. The template and code are under a [Creative Commons CC BY 4.0 licence](https://creativecommons.org/licenses/by/4.0/deed.en).*'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这个LaTeX模板是基于Timmy Chan的[这个模板](https://www.overleaf.com/latex/templates/data-science-tech-resume-template/zcdmpfxrzjhv)。你可以在他的GitHub上查看[源代码](https://github.com/TimmyChan/data-science-tech-resume-template)。模板和代码受[Creative
    Commons CC BY 4.0许可](https://creativecommons.org/licenses/by/4.0/deed.en)保护。*'
- en: General Principles
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本原则
- en: 'I will outline the most fundamental principles that your resume should adhere
    to. I reckon you might be missing at least one of these points:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我将概述你的简历应该遵循的最基本的原则。我认为你可能至少遗漏了这些点中的一个：
- en: Absolutely no spelling mistakes, and the grammar is correct. This is a big red
    flag to anyone reviewing the resume.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 绝对不能有拼写错误，语法也要正确。这对任何审查简历的人来说都是一个很大的红旗。
- en: Keep it 1 page, unless you have 10+ years of experience.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持一页，除非你有10年以上的经验。
- en: Font sizes are consistent across sections and avoid excessive use of **bolding**
    and *italicisation*.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 字体大小在各个部分之间保持一致，并避免过度使用**粗体**和*斜体*。
- en: No fancy formatting, keep it simple.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要使用花哨的格式，保持简单。
- en: No graphics, images or icons.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要使用图形、图像或图标。
- en: Avoid anything that could lead to bias, like age, gender, nationality, etc.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免任何可能导致偏见的内容，如年龄、性别、国籍等。
- en: Use bullet points, not block text.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用项目符号，而不是块文本。
- en: For your Google Doc version, use an easy-to-read font, such as Times New Roman,
    Calibri, or Georgia.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于你的Google Doc版本，使用易于阅读的字体，例如Times New Roman、Calibri或Georgia。
- en: For your PDF version, I highly recommend using LaTeX, as it produces a clean
    and aesthetically pleasing resume.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于你的PDF版本，我强烈推荐使用LaTeX，因为它可以生成干净且美观的简历。
- en: Finally, if you have time, tailor every section in your resume to the corresponding
    job description.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，如果你有时间，请将简历中的每个部分都定制到相应的职位描述中。
- en: Header
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 标题
- en: '![](../Images/ae6b54f643f76c9dbc302ab5c340f94c.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ae6b54f643f76c9dbc302ab5c340f94c.png)'
- en: Header.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 标题。
- en: This section should be easy to get right, and I am still surprised people get
    this part wrong at all.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这个部分应该很容易做对，但我仍然惊讶于人们竟然会在这个部分出错。
- en: 'All you need is:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你所需要的只是：
- en: Your name.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的名字。
- en: Job title or how you see yourself. This is optional.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 职位名称或你如何看待自己。这是可选的。
- en: Contact details, such as phone number and email.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 联系方式，如电话号码和电子邮件。
- en: Location, city and country.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 位置、城市和国家。
- en: Relevant links like LinkedIn, GitHub, Medium, Kaggle etc. One thing to ensure
    is that the links work! They contain helpful information about you, so you want
    to make sure whoever clicks on them actually goes where you want them to.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关链接，如LinkedIn、GitHub、Medium、Kaggle等。有一点需要确保的是，链接是有效的！它们包含关于你的有用信息，所以你想要确保点击链接的人实际上会去你想让他们去的地方。
- en: Summary Statement
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结陈述
- en: If your resume clearly states what you have done and who you are, then this
    section is not necessary. You will be repeating yourself and potentially using
    up valuable space on your resume.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的简历清楚地说明了你做了什么以及你是谁，那么这个部分就不是必要的。你会重复自己，并且可能会占用简历上宝贵的空间。
- en: For example, I personally don’t have a summary statement, and it hasn’t affected
    me (as far as I know anyway!). However, it can be beneficial when you want to
    tailor it to a specific company or role, or even play the ATS a bit.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我个人没有总结陈述，而且这并没有影响我（至少据我所知是这样！）。然而，当你想要针对特定的公司或职位进行定制，或者甚至想要在ATS（自动跟踪系统）上玩点花样时，这可能会很有益处。
- en: One key thing I will say, It’s really easy to go wrong here using words like
    “passionate”, “hard working” or “determined.”
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我要说的一个关键点是，使用像“热情”、“勤奋”或“决心”这样的词很容易出错。
- en: '*Don’t do that.*'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '*不要这样做*。'
- en: I can’t tell you the number of resumes I have seen where the person claims to
    be a hardworking, motivated, and passionate individual.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我无法告诉你我见过多少份简历，其中的人声称自己是勤奋的、有动力的和充满热情的个体。
- en: That’s the baseline of anyone a company wants to hire.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是任何公司想要雇佣的人的基本标准。
- en: A good summary statement explicitly states who you are and what you have done
    in a couple of sentences.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的总结陈述明确地用几句话说明你是谁以及你做了什么。
- en: For example, if I were to do this for myself, I would write.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我要为自己做这件事，我会写。
- en: '*Data Scientist / Machine Learning Engineer with 4+ years experience specialising
    in time series forecasting, operations research / optimisation problems and applied
    machine learning. Domain expertise lies in Insurance, supply chain and logistics
    business areas from the various companies I have worked in.*'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*拥有4年以上经验的数据科学家/机器学习工程师，专注于时间序列预测、运筹学/优化问题和应用机器学习。我的领域专业知识在于保险、供应链和物流业务领域，这些领域是我曾经工作过的各种公司。*'
- en: No fluff, just straight to the point.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 没有废话，直接切入要点。
- en: Technical Skills
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术技能
- en: '![](../Images/3e88a8d85f39edfcab6c25d62e5c6641.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3e88a8d85f39edfcab6c25d62e5c6641.png)'
- en: Technical Skills
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 技术技能
- en: This is a very brief summary of all your abilities, and should not really exceed
    4–5 lines and that is pushing it.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对你所有能力的非常简短的总结，实际上不应超过4-5行，这已经很接近极限了。
- en: This is high on the resume because it will immediately help the recruiter know
    if you meet the job’s technical requirements.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这在简历中非常重要，因为它会立即帮助招聘人员了解你是否符合工作的技术要求。
- en: Now, typically, candidates introduce many red flags in this section without
    even realising it. They think they are adding things that recruiters and hiring
    managers want to see, but it’s actually the exact opposite.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，通常，候选人会在这一部分引入许多红旗，而他们甚至没有意识到。他们认为他们正在添加招聘人员和招聘经理想要看到的东西，但实际上正好相反。
- en: 'Let’s break down the most common mistakes:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析最常见的错误：
- en: Don’t list too many technologies; this looks suspicious. I would be sceptical
    if you listed something like “Python, SQL, C++, Rust, Assembly.” It seems like
    a bunch of buzzwords, and I would find it highly unlikely you knew them all to
    a reasonable level.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要列出太多的技术；这看起来可疑。如果你列出了像“Python、SQL、C++、Rust、汇编”这样的东西，我会怀疑。这看起来像是一堆流行词汇，我会觉得你不太可能对它们都达到合理的水平。
- en: When it comes to coding abilities, it’s best to use language like “proficient”
    or “familiar with.” Avoid using arbitrary star ratings like “Python 4/5” or claiming
    to be “advanced.” This way, you’re setting realistic expectations and ensuring
    that your skills are accurately represented. My criterion is that if you feel
    comfortable answering easy Leetcode problems in that language, then you are proficient.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当谈到编码能力时，最好使用“熟练”或“熟悉”这样的语言。避免使用任意的星级评分，如“Python 4/5”或声称自己是“高级”。这样，你设定了现实的期望，并确保你的技能得到准确的表现。我的标准是，如果你觉得在这个语言中回答简单的Leetcode问题感到舒适，那么你就是熟练的。
- en: Don’t write out every Python package you know. If you are applying for a data
    science position, I assume you are familiar with NumPy, Pandas, and Matplotlib;
    there is no need to explicitly state this. Instead, list things like Git, AWS,
    Argo, Bash and Databricks, which are actual technologies that not every candidate
    will have.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要列出你所知道的每一个Python包。如果你正在申请数据科学职位，我假设你熟悉NumPy、Pandas和Matplotlib；没有必要明确地陈述这一点。相反，列出像Git、AWS、Argo、Bash和Databricks这样的实际技术，这些技术并不是每个候选人都会有的。
- en: Experience/Projects
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 经验/项目
- en: '![](../Images/262f303b83d36092055657b2023971a3.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/262f303b83d36092055657b2023971a3.png)'
- en: Experience.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 经验。
- en: The most important part here is to demonstrate exactly what you have done at
    each company and what the outcome was, always using **numbers** and **figures**.
    Ideally, they would be financial impact.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这里最重要的部分是展示你在每家公司所做的一切以及结果如何，始终使用**数字**和**图表**。理想情况下，它们应该是财务影响。
- en: Don’t try to be too humble; really “flex” the work you have done and the impact
    you have produced. Really showoff your skills.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 不要过于谦虚；真正“展示”你所做的工作和产生的影响。真正展示你的技能。
- en: For example, notice in my resume how I discuss technical steps or models like
    “ARIMAX” or “XGBoost” with the goal of better forecasting or predicting some business
    problem, mentioning the improvement of the model using some metric, and finally
    tying that to business impact.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，注意在我的简历中我是如何讨论像“ARIMAX”或“XGBoost”这样的技术步骤或模型，目的是为了更好地预测或预测某些业务问题，提到使用某些指标改进模型，并将其最终与业务影响联系起来。
- en: This shows my technical abilities and that I think of business impact with my
    projects.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这展示了我的技术能力，以及我在项目中考虑业务影响。
- en: If you think about it, companies only care about the financial benefit you bring
    them. Whether you use a neural network or linear regression, it doesn’t matter.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细想想，公司只关心你为他们带来的财务利益。无论你使用神经网络还是线性回归，这都不重要。
- en: '*Profit is profit*.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '*利润就是利润*。'
- en: It may seem reductive, but it is true, so if you can showcase precisely how
    you know how to link technical topics like machine learning to business outcomes,
    then you are doing better than like 80% of applicants.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来有些简化，但这是真的，所以如果你能精确展示如何将像机器学习这样的技术主题与业务成果联系起来，那么你比80%的申请者做得更好。
- en: 'This is the framework I recommend you follow for every bullet point in the
    experience section:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我为经验部分中的每个项目符号推荐你遵循的框架：
- en: '*State what you were analysing, predicting or modelling.*'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*说明你分析了什么，预测了什么或建模了什么。*'
- en: '*State the technologies, algorithms and statistical tools you used.*'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*说明你使用了哪些技术、算法和统计工具。*'
- en: '*State the metrics you improved.*'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*说明你改进的指标。*'
- en: '*State the business value you generated.*'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*说明你创造的商业价值。*'
- en: Another thing is don’t be scared to be explicit about the exact technologies,
    packages and algorithms you used. It’s better that way than using vague language,
    and it will also allow you to hit the ATS better.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 另一件事是，不要害怕明确说明你使用的确切技术、软件包和算法。这样做比使用模糊的语言更好，这也会让你更好地通过ATS。
- en: 'Some extra, but arguably obvious things are:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 一些额外的，但可以说是明显的事情是：
- en: Only include paid work experience, but research experience is ok too.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只包括有偿工作经验，但研究经验也可以。
- en: Start with your most recent job and work backwards chronologically.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从你最近的工作开始，按时间顺序倒序排列。
- en: Differentiate between internships and full-time positions.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区分实习和全职职位。
- en: Don’t use sub-bullet points; they are not necessary.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要使用子项目符号；它们不是必需的。
- en: If you haven’t got any experience, replace this with a projects section and
    carry out similar wording regarding the technical and business parts. Try to list
    projects most relevant to the role you are applying for to demonstrate an interest
    in that particular area.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有经验，可以用项目部分替换这部分，并就技术和商业部分进行类似的措辞。尽量列出与你要申请的职位最相关的项目，以展示你对该特定领域的兴趣。
- en: Education
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教育
- en: '![](../Images/4d638d62ec66cf58d7d15543fa7f40d5.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4d638d62ec66cf58d7d15543fa7f40d5.png)'
- en: Education.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 教育。
- en: If you don’t have any relevant work experience, I recommend putting the education
    section before work experience and then a projects section after.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有相关工作经验，我建议将教育部分放在工作经验之前，然后是项目部分。
- en: As I have 4+ years of experience, my education section is pretty simple. I keep
    it in as many data science and machine learning jobs explicitly state a need for
    a master’s degree in a STEM subject.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我有4+年的经验，我的教育部分相当简单。我保留它，因为许多数据科学和机器学习工作明确表示需要STEM学科的硕士学位。
- en: If you don’t have experience, you could flesh this education section out and
    discuss any relevant work you have done in your degree. However, I don’t recommend
    listing out all your modules as that’s a bit overkill, and being honest, no one
    really reads that or cares. A few extra things to take into account
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有经验，你可以充实这个教育部分，并讨论你在学位期间完成的任何相关工作。然而，我不建议列出所有模块，因为这有点过度，而且说实话，没有人真的会读它或关心。还有一些额外的事情要考虑
- en: If your grade is impressive, list it; if not, leave it blank.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你的成绩很出色，就列出来；如果不怎么样，就留空。
- en: List any relevant specialised thing you have done, like hackathons, projects
    etc.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你做过的任何相关专门事情，比如黑客马拉松、项目等。
- en: List any awards and prizes you achieved whilst at school.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你在学校期间获得的任何奖项和奖品。
- en: Leave out course certificates, unless it’s something like the “AWS practitioner
    ones” or you have loads of space left.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 留出课程证书，除非是像“AWS实践者”这样的东西，或者你还有很多空间。
- en: Activities / Extracurricular
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 活动 / 课外活动
- en: '![](../Images/120393be45acbe6b4438723d02e96cab.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/120393be45acbe6b4438723d02e96cab.png)'
- en: Extracurricular.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 课外活动。
- en: This is optional, and many people will say don’t add this section.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分是可选的，很多人都会说不要添加这个部分。
- en: I controversially think, however, that showing a little bit of personality in
    your resume is not a bad thing, but it’s definitely not needed, and this would
    be the first section to cut if you are lacking space.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我持不同意见，认为在简历中展示一点个性并不是坏事，但这绝对不是必需的，而且如果你空间不足，这将是第一个要删除的部分。
- en: I use this part to showcase my YouTube channel and blog posts, as it adds to
    my resume and application, but this is a rare case.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我用这部分来展示我的YouTube频道和博客文章，因为这增加了我的简历和申请，但这是一个罕见的情况。
- en: So, if you have something similar you want to mention, this section is excellent
    for that purpose.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你有类似的事情想要提及，这个部分非常适合这个目的。
- en: '* * *'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Earlier, I discussed how if you don’t have any experience, you should replace
    this with a projects section.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，我讨论了如果你没有任何经验，你应该用项目部分来替代这一点。
- en: But what projects should you do to get hired?
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 但你应该做什么项目才能被雇佣？
- en: 'Well, this is precisely the question I have answered in one of my previous
    articles, which you can check out below:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这正是我在之前的一篇文章中回答过的问题，您可以在下面查看：
- en: '[STOP Building Useless ML Projects – What Actually Works](https://towardsdatascience.com/stop-building-useless-ml-projects-what-actually-works/)'
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[停止构建无用的机器学习项目——真正有效的方法](https://towardsdatascience.com/stop-building-useless-ml-projects-what-actually-works/)'
- en: Another Thing!
  id: totrans-108
  prefs:
