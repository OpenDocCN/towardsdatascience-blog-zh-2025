- en: From Pixels to Plots
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从像素到图表
- en: 原文：[https://towardsdatascience.com/from-pixels-to-plots/](https://towardsdatascience.com/from-pixels-to-plots/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/from-pixels-to-plots/](https://towardsdatascience.com/from-pixels-to-plots/)
- en: Turning tedious lab work quickly into actionable insights
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将繁琐的实验室工作迅速转化为可操作的见解
- en: During my time as a Physics student, manually extracting and analysing experimental
    measurements was often an unavoidable and frustrating part of Physics labs. Reading
    values from instruments, writing them down, transferring them into spreadsheets,
    and finally plotting the results was slow, repetitive, and error-prone.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我作为物理学生期间，手动提取和分析实验测量数据往往是物理实验室中不可避免且令人沮丧的一部分。从仪器读取数值、写下它们、将它们转移到电子表格中，最后绘制结果，这个过程既缓慢又重复，且容易出错。
- en: 'Now that I work in Generative AI, I wondered: *Why not automate this with AI?*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我从事生成式AI工作，我想：*为什么不使用AI来自动化这个过程呢？*
- en: This led me to build **AI-OCR**, an open-source prototype that uses AI to extract
    numerical data from images and turn it into insightful plots. The process of extracting
    text or numbers from images is commonly referred to as Optical Character Recognition
    (OCR) – hence the name for this project.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这引导我构建了**AI-OCR**，这是一个开源原型，它使用AI从图像中提取数值数据并将其转换为有洞察力的图表。从图像中提取文本或数字的过程通常被称为光学字符识别（OCR），因此这个项目的名字就是这样来的。
- en: 'How it works:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 它是如何工作的：
- en: Upload images of measurements (or structured PDFs like financial reports)
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传测量图像（或如财务报告这样的结构化PDF）
- en: Prompt the AI to extract specific values into a clean DataFrame
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指示AI将特定值提取到干净的DataFrame中
- en: Prompt the AI to generate visualisations like time series, histograms, scatter
    plots, etc.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指示AI生成时间序列、直方图、散点图等可视化
- en: By automating what used to be tedious, AI-OCR helps reduce manual work while
    also breaking free from vendor lock-in. In many lab and industrial environments,
    even digital data often lives in proprietary formats, requiring expensive and/or
    restrictive software for access and analysis. With AI-OCR, you can simply photograph
    the measurements, extract the data from the image, and analyse as well as visualise
    the results with a simple prompt.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自动化原本繁琐的工作，AI-OCR帮助减少了人工工作量，同时也打破了供应商锁定。在许多实验室和工业环境中，即使是数字数据也常常存在于专有格式中，需要昂贵的软件或受限制的软件才能访问和分析。使用AI-OCR，你可以简单地拍照测量数据，从图像中提取数据，并通过简单的提示进行分析和可视化。
- en: While conceived with simplifying lab workflows in mind, the tool’s applications
    extend far beyond science. **From tracking health metrics to analysing utility
    bills or financial statements, AI-OCR can support a wide range of everyday data
    tasks.**
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这个工具的初衷是简化实验室工作流程，但其应用范围远超科学领域。**从跟踪健康指标到分析水电费或财务报表，AI-OCR可以支持广泛的日常数据任务**。
- en: 'In this article, I will walk through:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将介绍：
- en: Real-world use cases for the prototype
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原型在实际应用中的案例
- en: A breakdown of how it works under the hood
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它内部工作原理的分解
- en: Challenges, limits, and trade-offs encountered
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遇到的挑战、限制和权衡
- en: Potential approaches for further development
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进一步发展的潜在方法
- en: 'Practical use cases: Where AI-OCR shines'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际应用案例：AI-OCR的亮点
- en: Since I no longer work in a physics lab and I unfortunately do not have one
    in my basement, I was not able to test AI-OCR in its originally intended environment.
    Instead, I discovered several everyday use cases where this prototype proved to
    be surprisingly helpful.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我不再在物理实验室工作，而且很不幸，我地下室里也没有实验室，所以我无法在最初预期的环境中测试AI-OCR。相反，我发现了一些日常应用场景，这个原型在这些场景中证明非常有帮助。
- en: In this section, I will walk through four real-world examples. I used AI-OCR
    to extract numerical data from everyday images/documents like the ones in the
    image below and generate meaningful plots with minimal effort. For each of these
    use cases, I used **OpenAI’s API to the GPT-4.1 model** for both the OCR and the
    data visualisation (more technical details in section 3).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将介绍四个现实世界例子。我使用AI-OCR从日常图像/文档中提取数值数据，如下面的图像所示，并投入最小的努力生成有意义的图表。对于这些用例中的每一个，我都使用了**OpenAI的GPT-4.1模型API**进行OCR和数据可视化（更多技术细节在第3节中）。
- en: '![](../Images/2ddb17a1819a6867c4c01784cbd95eef.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ddb17a1819a6867c4c01784cbd95eef.png)'
- en: Four real-world examples where AI-OCR can be used. *Image by author*.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 四个AI-OCR可以应用的现实世界例子。*图片由作者提供*。
- en: Blood pressure tracking
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 血压跟踪
- en: 'In this first use case, I used AI-OCR to track my blood pressure and heart
    rate throughout the day. You can see a full demonstration of this use case in
    the following video:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个第一个用例中，我使用AI-OCR跟踪我一天中的血压和心率。你可以在以下视频中看到这个用例的完整演示：
- en: 🎥 **[https://youtu.be/pTk9RgQ5SkM](https://youtu.be/pTk9RgQ5SkM)**
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 🎥 **[https://youtu.be/pTk9RgQ5SkM](https://youtu.be/pTk9RgQ5SkM)**
- en: 'Here is how I used it in practice:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何在实际中使用的：
- en: I recorded my blood pressure roughly every 30 minutes by taking photos of the
    monitor’s display.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我大约每30分钟记录一次血压，通过拍照监控器的显示。
- en: 'I uploaded the images and prompted the AI to extract: systolic pressure, diastolic
    pressure, and heart rate.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我上传了图像，并提示AI提取：收缩压、舒张压和心率。
- en: AI-OCR returned a `pandas.DataFrame` with the extracted values, timestamped
    using the image metadata.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI-OCR返回了一个`pandas.DataFrame`，其中包含提取的值，并使用图像元数据进行了时间戳。
- en: Finally, I asked the AI to plot systolic and diastolic pressure as a time series,
    including horizontal lines indicating standard healthy ranges, as well as the
    heart rate in a separate subplot.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我要求AI绘制收缩压和舒张压的时间序列图，包括表示标准健康范围的水平线，以及心率在单独的子图中。
- en: '![](../Images/2db82efbcda266d41ee0ccecaf707c0f.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/2db82efbcda266d41ee0ccecaf707c0f.png)'
- en: AI-generated plot of my blood pressure and heart rate over the course of a day.
    *Image by author*.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的我一天内血压和心率的图表。*图片由作者提供*。
- en: The result? A visual overview of my (slightly elevated) blood pressure fluctuations
    throughout the day, with a clear drop after lunch at 1PM. What’s particularly
    encouraging is that the plot does not show any obvious outliers, a good sanity
    check that indicates the AI extracted the values correctly from the images.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 结果？一天中我（略有升高）的血压波动直观概述，下午1点午餐后明显下降。特别令人鼓舞的是，图表没有显示出任何明显的异常值，这是一个很好的合理性检查，表明AI正确地从图像中提取了值。
- en: Most modern blood pressure monitors only store a limited number of readings
    internally. The device I used, for example, can hold up to 120 values. However,
    many affordable models (like mine) do not support data export. Even when they
    do, they often require proprietary apps, locking your health data into closed
    ecosystems. As you can see, this is not the case here.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数现代血压计只存储有限数量的读数。例如，我使用的设备可以存储多达120个值。然而，许多经济实惠的型号（如我的）不支持数据导出。即使它们支持，通常也需要专有应用程序，将你的健康数据锁定在封闭的生态系统中。正如你所看到的，这里并非如此。
- en: Body weight tracking
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 体重跟踪
- en: In another health-related use case, I used AI-OCR to track my body weight over
    several weeks during a personal weight- loss effort.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一个与健康相关的用例中，我使用AI-OCR跟踪我在个人减肥努力期间几周内的体重。
- en: Traditionally, you might weigh yourself and manually enter the result into a
    fitness app. Some modern scales offer synchronisation via Bluetooth, but again
    the data is often locked inside proprietary apps. These apps typically limit both
    data access and the kinds of visualisations you can generate, making it difficult
    to truly own or analyse your own health data.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，你可能需要称重并将结果手动输入到健身应用程序中。一些现代体重秤提供通过蓝牙同步，但数据通常被锁定在专有应用程序中。这些应用程序通常限制数据访问和可以生成的可视化类型，这使得真正拥有或分析自己的健康数据变得困难。
- en: With AI-OCR, I simply took a photo of my scale reading every morning. For someone
    who is not exactly a morning person, it felt far easier than fiddling with an
    app before my breakfast tea. Once I had a batch of images, I uploaded them and
    asked AI-OCR to extract the weight values and generate a time series plot of my
    weight.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI-OCR，我只需每天早上拍一张体重秤的读数照片。对于不是特别喜欢早上的人来说，这比在早餐茶前摆弄应用程序要容易得多。一旦我有一批图像，我就上传它们，并要求AI-OCR提取体重值并生成我体重的时序图。
- en: '![](../Images/eaea3fd914eadbe919971201b06d7f6f.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/eaea3fd914eadbe919971201b06d7f6f.png)'
- en: AI-generated plot of my body weight over time together with a linear regression.
    *Image by autho*r
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的我体重随时间变化的图表以及线性回归。*图片由作者提供*
- en: 'From the resulting graph, you can see that I lost around 3 kg over roughly
    two month. I also asked the AI to perform a linear regression, estimating a weight
    loss rate of ~0.4 kg/week**.** Withthis approach, the user has full control over
    the analysis: I can ask the AI to generate a trend line, estimate my weight loss
    rate, or apply any custom logic I need.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 从生成的图表中，你可以看到我大约在两个月内减重了3公斤。我还让AI进行线性回归，估计每周减重率为~0.4公斤**。**使用这种方法，用户可以完全控制分析过程：我可以要求AI生成趋势线，估计我的减重率，或者应用我需要的任何自定义逻辑。
- en: Financial data analysis
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 财务数据分析
- en: AI-OCR is not just useful for health tracking. It can also help make sense of
    your personal finances. In my case, I found that the analytics provided by my
    brokerage app offered only basic summaries of my portfolio and often missed key
    insights about my investment strategy. Some numbers were even inaccurate or incomplete.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: AI-OCR不仅对健康跟踪有用，还可以帮助你理解个人财务。在我的情况下，我发现我的经纪应用提供的分析只是对投资组合的基本总结，并且经常错过关于我的投资策略的关键见解。一些数字甚至不准确或不完整。
- en: 'One example: after moving my portfolio to a new brokerage, I wanted to verify
    that my buy-in values were transferred correctly. This can be cumbersome, especially
    when shares are accumulated over time through savings plans or multiple partial
    purchases. Doing this manually would mean digging through many PDFs, copying numbers
    into spreadsheets, and double-checking formulas, all of which is time-consuming
    and error-prone.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 举个例子：在我将投资组合转移到新经纪人后，我想验证我的买入价值是否正确转移。这可能会很麻烦，尤其是当股票通过储蓄计划或多次部分购买积累起来时。手动做这件事意味着要翻阅许多PDF文件，将数字复制到电子表格中，并双重检查公式，所有这些都很耗时且容易出错。
- en: 'AI-OCR automated the entire workflow. I uploaded all the PDF purchase confirmations
    from my previous broker and prompted the AI to extract share name, nominal value,
    and purchase price. In the second step, I asked it to compute the buy-in values
    for each share and generate a bar plot of the results. In the prompt I explained
    how to calculate the buy-in value:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: AI-OCR自动化了整个工作流程。我将之前经纪人的所有PDF购买确认上传，并提示AI提取股票名称、面值和购买价格。在第二步，我要求它计算每只股票的买入价值，并生成结果条形图。在提示中，我解释了如何计算买入价值：
- en: '*“Buy-in value = share price × nominal value, normalized over total nominal
    value.”*'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“买入价值 = 股票价格 × 面值，按总面值标准化。”*'
- en: The generated plot let me quickly spot inconsistencies in the transfer of the
    buy in-values. In fact, this plot allowed me to catch a few errors in the numbers
    from my new brokerage app.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的图表让我能快速发现买入价值转移中的不一致性。事实上，这个图表让我发现了来自新经纪应用中数字的一些错误。
- en: Similarly, you can prompt AI-OCR to calculate realised gains or losses over
    time, based on your transaction history. This is a metric my brokerage app does
    not even provide.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，你可以提示AI-OCR根据你的交易历史计算随时间实现的收益或损失。这是我的经纪应用甚至不提供的指标。
- en: Electricity metre readings
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 电表读数
- en: For the final use case, I will demonstrate how I digitised and tracked my electricity
    consumption using this prototype.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最终的使用案例，我将演示我是如何使用这个原型将我的电力消耗数字化并跟踪的。
- en: Like many older houses in Germany, mine still uses an analogue electricity metre,
    which makes daily tracking nearly impossible using modern (digital) technology.
    If I want to analyse consumption over a time period, I have to read the metre
    manually at the beginning and end of the period. Then I must repeat this for each
    interval/day. Doing this over multiple days quickly becomes mundane and error-prone.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 像德国许多老房子一样，我的房子仍然使用着模拟电表，这使得使用现代（数字）技术进行日常跟踪几乎不可能。如果我想分析某个时间段内的消耗，我必须在时间段开始和结束时手动读取电表。然后我必须为每个间隔/天重复这一过程。这样做在多天之内很快就会变得单调乏味且容易出错。
- en: Instead, I photographed the metre (almost) every day for a few weeks and uploaded
    the images to AI-OCR. With two simple prompts, the tool extracted the readings
    and generated a time-series plot of my cumulative electricity consumption in kWh.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我几乎每天都会拍照电表几周，并将图像上传到AI-OCR。通过两个简单的提示，该工具提取了读数，并生成了我累计电力消耗（千瓦时）的时间序列图。
- en: '![](../Images/2e8a7b48027099d8c95533f600afaadc.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2e8a7b48027099d8c95533f600afaadc.png)'
- en: AI-generated plot of my cumulative electricity consumption over time. *Image
    by author*.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的我累计电力消耗随时间变化的图表。*图片由作者提供*。
- en: The plot reveals a generally linear trend, a sign that my daily consumption
    was relatively steady. However, three outliers can be seen. These were not caused
    by my secret bitcoin mining rigs but instead resulted from misread digits during
    the OCR process. In three out of the 27 images, the model simply made a recognition
    error.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图表显示了一个大致的线性趋势，这是我的日常消耗相对稳定的迹象。然而，可以看到三个异常值。这些并不是由我的秘密比特币挖矿设备引起的，而是由于OCR过程中的误读数字。在27张图像中的3张，模型简单地犯了识别错误。
- en: These glitches point us to current limitations of AI-OCR, which I will explore
    in more detail shortly. But first, let’s have a closer look at how this prototype
    actually works under the hood.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这些故障指向了AI-OCR当前的局限性，我将在稍后更详细地探讨。但首先，让我们更仔细地看看这个原型实际上是如何在底层工作的。
- en: 'Under the hood: How AI-OCR works'
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 底层：AI-OCR是如何工作的
- en: 'AI-OCR is split into two main components: a [frontend](https://github.com/jWinman91/AI-OCR-Frontend)
    and a [backend](https://github.com/jWinman91/AI-OCR). The frontend is built using
    [Streamlit](https://streamlit.io/), a Python library that lets you quickly turn
    Python scripts into web apps with little effort. It is a popular choice for machine
    learning prototypes and proofs of concept, thanks to its simplicity. That said:
    Streamlit is not intended for production-scale applications though.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: AI-OCR分为两个主要组件：一个[前端](https://github.com/jWinman91/AI-OCR-Frontend)和一个[后端](https://github.com/jWinman91/AI-OCR)。前端使用[Streamlit](https://streamlit.io/)构建，这是一个Python库，让您轻松地将Python脚本转换为Web应用，几乎不需要额外的工作。它因其简单性而成为机器学习原型和概念验证的流行选择。尽管如此：Streamlit并不适用于生产规模的应用。
- en: 'This is why the main focus of this article is on the backend, which is where
    data extraction and visualisation take place. It is designed around two distinct
    processes:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么本文的主要关注点是后端，数据提取和可视化在这里进行。它围绕两个不同的过程设计：
- en: '**OCR (Optical Character Recognition):** Recognising the numerical data from
    images or documents using AI.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**OCR（光学字符识别）**：使用AI从图像或文档中识别数值数据。'
- en: '**Data visualisation:** Transforming the extracted data into insightful plots.'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据可视化**：将提取的数据转化为有洞察力的图表。'
- en: 'One of AI-OCR’s strengths is its flexibility: it is model-agnostic. You are
    not locked into a single Large Language Model (LLM) vendor. Both commercial and
    open-source models can be configured and swapped depending on the use case. Each
    process is powered by configurable LLMs. Besides OpenAI models such as GPT-4.1,
    the prototype supports (so far) quantised models in GGUF format, a binary file
    format that packages model weights and metadata together. These are loaded in
    and run locally via the `llama.cpp` Python library.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: AI-OCR的一个优势是其灵活性：它不依赖于单一的大型语言模型（LLM）供应商。根据用例，可以配置和交换商业和开源模型。每个过程都由可配置的LLM提供动力。除了OpenAI的GPT-4.1等模型外，原型（到目前为止）还支持GGUF格式的量化模型，这是一种将模型权重和元数据打包在一起的二进制文件格式。这些模型通过`llama.cpp`
    Python库加载并在本地运行。
- en: For the OCR task, Hugging Face offers a huge variety of quantised models such
    as LLaVa, DeepSeek-VL, or Llama-3-vision. For the code generation of the visualisation
    component, models with strong coding capabilities are most effective. Due to lack
    of computational resources at home (I do not have access to a powerful GPU), I
    have only thoroughly tested this prototype with OpenAI models via the API.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 对于OCR任务，Hugging Face提供了大量的量化模型，如LLaVa、DeepSeek-VL或Llama-3-vision。对于可视化组件的代码生成，具有强大编码能力的模型最为有效。由于家中缺乏计算资源（我没有访问到强大的GPU），我仅通过API彻底测试了此原型与OpenAI模型。
- en: 'The OCR component: Extracting the data'
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OCR组件：提取数据
- en: To turn images into insights, the relevant data must be recognised from the
    images, which is handled in the OCR component. The process begins when the user
    uploads images and submits a prompt describing which values should be recognised
    from the image and optional additional context to assist the model. The output
    is a `pandas.DataFrame` containing the extracted values alongside the timestamps
    of the images.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将图像转化为洞察，必须从图像中识别出相关数据，这由OCR组件处理。这个过程从用户上传图像并提交一个提示开始，描述了应从图像中识别哪些值以及可选的附加上下文以协助模型。输出是一个包含提取值和图像时间戳的`pandas.DataFrame`。
- en: The diagram below illustrates the design of the data extraction pipeline. The
    outer box represents the Streamlit-based frontend, while the inner section details
    the backend architecture, a REST API. Arrows connecting the frontend and backend
    represent API calls. Within the backend, each icon symbolises a distinct component
    of the backend.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图示说明了数据提取管道的设计。外框代表基于Streamlit的前端，而内部部分详细说明了后端架构，一个REST API。连接前端和后端的箭头代表API调用。在后端中，每个图标代表后端的一个不同组件。
- en: '![](../Images/04da49a1f77519ad713bc5c6598da7dc.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/04da49a1f77519ad713bc5c6598da7dc.png)'
- en: Design of the OCR component. *Image by author*.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: OCR组件的设计。*图片由作者提供*。
- en: At the core of the backend is the OCR Modelling object. When a prompt is submitted,
    this object receives it along with the selected model configuration. It loads
    the appropriate model and accesses the uploaded images.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 后端的核心是 OCR 模型对象。当提交提示时，该对象接收它以及选定的模型配置。它加载适当的模型并访问上传的图像。
- en: 'One particularly instructive part of this design is the way the prompt is handled.
    Before the actual OCR task is performed, the prompt from the user is enhanced
    with the help of a Small Language Model (SLM). The SLM’s role is to identify the
    specific values mentioned in the user’s prompt and return them as a list. For
    example, in the blood pressure use case, the SLM would return:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 此设计的一个特别有教育意义的部分是处理提示的方式。在实际 OCR 任务执行之前，用户提示通过一个小型语言模型（SLM）得到增强。SLM 的作用是识别用户提示中提到的特定值，并将它们作为列表返回。例如，在血压用例中，SLM
    会返回：
- en: '`[“heart rate”, “diastolic pressure”, “systolic pressure”]`.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '`[“心率”， “舒张压”， “收缩压”]`。'
- en: 'This information is used to automatically enhance the original user prompt.
    The LLM is always requested to return structured output. Thus, the prompt needs
    to be enhanced by the specific JSON output format, which for the blood pressure
    case reads:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 此信息用于自动增强原始用户提示。LLM 总是请求返回结构化输出。因此，提示需要通过特定的 JSON 输出格式进行增强，对于血压案例，其格式如下：
- en: '`{“heart rate”: “value”, “diastolic pressure”: “value”, “systolic pressure”:
    “value”}`.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '`{“心率”： “值”， “舒张压”： “值”， “收缩压”： “值”}`。'
- en: Notice that the SLM used here runs locally using `llama.cpp`. For the use cases
    discussed previously, I used Gemma-2 9B (in quantised GGUF format). This technique
    highlights how smaller, lightweight models can be used for efficient and automatic
    prompt optimisation.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这里使用的 SLM 是通过 `llama.cpp` 在本地运行的。对于之前讨论的用例，我使用了 Gemma-2 9B（以量化 GGUF 格式）。这项技术突出了如何使用更小、更轻量级的模型进行高效和自动的提示优化。
- en: This enhanced prompt is then sent sequentially, along with each image, to the
    selected LLM. The model infers the requested values from the image. The responses
    are then aggregated into a `pandas.DataFrame`, which is eventually returned to
    the user for viewing and downloading.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 此增强的提示随后依次与每个图像一起发送到选定的 LLM。模型从图像中推断出请求的值。然后将这些响应汇总到一个 `pandas.DataFrame` 中，最终将其返回给用户以供查看和下载。
- en: Visualising the result
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化结果
- en: The second part of turning your images into insights is the visualisation process.
    Here, the numerical data extracted into the DataFrame during the OCR process is
    transformed into meaningful plots based on the user’s request.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 将您的图像转换为洞察力的第二部分是可视化过程。在这里，OCR 过程中提取到 DataFrame 中的数值数据根据用户请求转换为有意义的图表。
- en: The user provides a prompt describing the type of visualisation they want (e.g.,
    time series, histogram, scatter plot). The LLM then generates Python code to create
    the requested plot. This generated code is executed on the frontend, and the resulting
    visualisation is displayed directly within the frontend.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 用户提供一个描述他们想要的视觉类型（例如，时间序列、直方图、散点图）的提示。然后 LLM 生成 Python 代码来创建所需的图表。此生成的代码在前端执行，并将生成的可视化直接显示在前端。
- en: 'The diagram below once again illustrates this process in detail. The core of
    this particular process is the Plot Modelling object. It receives two key inputs:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图再次详细说明了此过程。此特定过程的重点是 Plot 模型对象。它接收两个关键输入：
- en: The user’s prompt describing the desired visualisation
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户描述所需可视化的提示
- en: The `pandas.DataFrame` generated by the OCR process.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由 OCR 处理生成的 `pandas.DataFrame`。
- en: '![](../Images/f1d3bbd997abd648a8352967d2a7c445.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f1d3bbd997abd648a8352967d2a7c445.png)'
- en: Design of the data visualisation component. *Image by author.*
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可视化组件的设计。*图片由作者提供。*
- en: Before passing the prompt and metadata about the DataFrame to the LLM, the prompt
    first passes through a Governance Gateway. Its job is to ensure security by preventing
    the generation or execution of malicious code. It is implemented as an SLM. As
    previously, I used Gemma-2 9B (in quantized GGUF format) as an SLM that runs locally
    using `llama.cpp`.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在将 DataFrame 的提示和元数据传递给 LLM 之前，提示首先通过一个治理网关。其任务是确保安全，通过防止生成或执行恶意代码。它被实现为一个 SLM。正如之前所述，我使用了
    Gemma-2 9B（以量化 GGUF 格式）作为本地运行的 SLM，使用 `llama.cpp`。
- en: Specifically, the Governance Gateway first verifies via the instructed SLM that
    the user’s prompt contains a valid data visualisation request and does not include
    any harmful or suspicious instructions. Only if the prompt passes this initial
    check, it is forwarded to the LLM to generate the Python plotting code. After
    the code is generated, it is sent back to the SLM for a second security review
    to ensure the code is safe to execute.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，治理门户首先通过指示的SLM验证用户的提示包含有效的数据可视化请求，并且不包含任何有害或可疑的指令。只有当提示通过这一初步检查后，它才会被转发给LLM生成Python绘图代码。代码生成后，它会被发送回SLM进行第二次安全审查，以确保代码可以安全执行。
- en: After passing the second security validation, the generated code is sent back
    to the frontend, where it is executed to generate the requested plot. This two-factor
    governance approach helps ensure that AI-generated code runs safely and securely,
    while giving the user the flexibility to generate any desired data visualisation
    within the Matplotlib ecosystem.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 通过第二次安全验证后，生成的代码被发送回前端，在那里执行以生成所需的图表。这种双因素治理方法有助于确保AI生成的代码安全且安全地运行，同时使用户能够在Matplotlib生态系统中生成任何所需的数据可视化。
- en: Challenges, limits, and trade-offs
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 挑战、限制和权衡
- en: As already touched upon in the use case section, this prototype, particularly
    the OCR component, has notable limitations due to the constraints of the underlying
    language models.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 正如在用例部分已经提到的，这个原型，特别是OCR组件，由于底层语言模型的限制，存在明显的局限性。
- en: In this section, I want to explicitly demonstrate two scenarios (illustrated
    in the image below) where the tool currently struggles significantly, and why,
    in some cases, it might not be the most optimal solution. These two scenarios
    both require interpreting analogue data. Despite the increasing digitization of
    lab equipment, this is still an important requirement for the application of such
    a tool in many physics labs.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我想明确展示两个当前工具在处理上存在显著困难的场景（如图下所示），以及为什么在某些情况下，它可能不是最佳解决方案。这两个场景都需要解释模拟数据。尽管实验室设备的数字化程度不断提高，但这对于许多物理实验室中此类工具的应用仍然是一个重要要求。
- en: '![](../Images/28d8147a04cfa78539555685d448d714.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/28d8147a04cfa78539555685d448d714.png)'
- en: Two example scenarios where AI-OCR struggles. *Image by author.*
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: AI-OCR在两个示例场景中挣扎的例子。*图片由作者提供。*
- en: 'On the left is an attempt to measure the length of an object (in this case,
    a book) using a physical ruler. On the right is an image of my car’s analogue
    RPM metre. In both cases, I processed multiple images with the prototype: static
    images for measuring the length of the book and video frames for reading the RPM
    metre. Despite supplying high-quality inputs and carefully crafted prompts, the
    resulting measurements were imprecise. While the extracted values always fell
    within the expected numeric range, they were consistently too far off for real-world
    applications.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在左边是使用物理尺子测量物体长度（在这种情况下，一本书）的尝试。在右边是我的汽车模拟转速表的图片。在这两种情况下，我都使用原型处理了多个图像：用于测量书本长度的静态图像和用于读取转速表的视频帧。尽管提供了高质量的输入并精心设计了提示，但得到的测量结果仍然不够精确。虽然提取的值始终在预期的数值范围内，但它们对于实际应用来说偏差太大。
- en: While AI-OCR offers convenience, in some cases the overall cost might outweigh
    its benefits. In cases like the body weight tracker, it is worth mentioning, the
    tool provides convenience but at a cost in memory and token usage. Each image
    may be several megabytes, while the extracted data (a single float) is just a
    few bytes. Image analysis with LLMs can also be expensive. These trade-offs highlight
    the need to always align AI applications with clear business value.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI-OCR提供了便利，但在某些情况下，整体成本可能会超过其好处。例如，在体重追踪器的情况下，值得指出的是，这个工具提供了便利，但代价是内存和令牌的使用。每张图片可能有好几兆字节，而提取的数据（一个浮点数）只有几字节。使用LLM进行图像分析也可能很昂贵。这些权衡突出了始终将AI应用与明确业务价值对齐的必要性。
- en: 'Conclusion: Custom AI agents for tomorrow’s lab'
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论：面向未来的实验室定制AI代理
- en: In this article, we explored how to build an LLM-powered prototype that transforms
    measurement images into structured data and insightful plots. Users can upload
    images, describe the values they want to be recognised from the images as well
    as the type of data visualisation to be performed. The user then receives both
    raw values and visual interpretations.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了如何构建一个由LLM驱动的原型，该原型将测量图像转换为结构化数据和有洞察力的图表。用户可以上传图像，描述他们想要从图像中识别的值以及要执行的数据可视化类型。然后，用户将收到原始值和视觉解释。
- en: 'If you have tried ChatGPT or other LLM platforms, you may have noticed: it
    can already do much of this and perhaps more. Simply upload an image to the chat,
    describe your desired data visualisation (optionally add context), and the system
    (e.g. ChatGPT) figures out the rest. Under the hood, this likely relies on a system
    of AI agents working in concert.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您尝试过ChatGPT或其他LLM平台，您可能已经注意到：它已经可以做到很多，也许更多。只需将图像上传到聊天中，描述您希望的数据可视化（可选添加上下文），系统（例如ChatGPT）就会处理其余部分。在底层，这很可能依赖于一组协同工作的AI代理系统。
- en: That same type of architecture is what a future version of AI-OCR could embrace.
    *But why bother building it if one could simply use ChatGPT instead?* **Because
    of customisation and control**. Unlike ChatGPT, the AI agents in AI-OCR can be
    tailored to your specific needs (like that of a lab assistant), and with local
    models, you retain full control over your data. For instance, you very likely
    would prefer not to upload your personal finance documents to ChatGPT.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的架构也是未来版本的AI-OCR可能采用的。*但为什么还要费心去构建它，如果可以直接使用ChatGPT呢？* **这是因为定制化和控制**。与ChatGPT不同，AI-OCR中的AI代理可以根据您的特定需求（如实验室助手的需求）进行定制，并且使用本地模型，您可以完全控制您的数据。例如，您很可能不愿意将您的个人财务文件上传到ChatGPT。
- en: 'A possible architecture for such a system of AI agents (that ChatGPT very likely
    relies on as well) is illustrated in the diagram below:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表展示了这种AI代理系统的可能架构（ChatGPT很可能也依赖于这种架构）：
- en: '![](../Images/29bc32a314bcfc0b7ac220ad8ca45c40.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/29bc32a314bcfc0b7ac220ad8ca45c40.png)'
- en: Possible architecture for a system of AI agents that could be integrated in
    a lab assistant. *Image by author.*
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 可能在实验室助手中集成的AI代理系统的可能架构。*图片由作者提供。*
- en: 'At the top level, a Root Agent receives the user’s input and delegates tasks
    via an Agent Communication Protocol (ACP). It can choose between two auxiliary
    agents:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在最高级别，根代理接收用户的输入并通过代理通信协议（ACP）委派任务。它可以选择两个辅助代理：
- en: '**OCR Agent**: Extracts relevant numerical data from images and interfaces
    with a Model Context Protocol (MCP) server that manages CSV data storage.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OCR代理**：从图像中提取相关的数值数据，并与管理CSV数据存储的模型上下文协议（MCP）服务器接口。'
- en: 'The **Data Vis(ualisation) Agent**: Connects to a separate MCP plot server
    capable of executing Python code. This server includes the Governance Gateway
    powered by an SLM, which ensures all code is safe and appropriate before execution.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据可视化代理**：连接到一个可以执行Python代码的独立MCP绘图服务器。该服务器包括由SLM驱动的治理网关，确保所有代码在执行前都是安全和适当的。'
- en: 'Unlike ChatGPT, this setup can be fully tailored: from local LLMs for data
    protection to system prompt tuning of the agents for niche tasks. AI-OCR is not
    meant to replace ChatGPT, but rather complement it. It could evolve into an autonomous
    lab assistant that streamlines data extraction, plotting, and analysis in specialised
    environments.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '与ChatGPT不同，这个设置可以完全定制：从用于数据保护的本地LLM到针对特定任务的代理的系统提示调整。AI-OCR并非旨在取代ChatGPT，而是补充它。它可能演变成一个自主的实验室助手，在特定环境中简化数据提取、绘图和分析。 '
- en: Acknowledgement
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 致谢
- en: If you’re curious about the future of AI-OCR or interested in exploring ideas
    and collaborations, feel free to connect with me on [LinkedIn](https://www.linkedin.com/in/jens-winkelmann-phd-685555168/).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对AI-OCR的未来感兴趣或想探讨想法和合作，请随时通过[LinkedIn](https://www.linkedin.com/in/jens-winkelmann-phd-685555168/)与我联系。
- en: At the end, I would like to thank Oliver Sharif, Tobias Jung, Sascha Niechciol,
    Oisín Culhane, and [Justin Mayer](https://justinmayer.com/) for their feedback
