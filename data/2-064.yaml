- en: The Machine, the Expert, and the Common Folks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器、专家和普通人
- en: 原文：[https://towardsdatascience.com/the-machine-the-expert-and-the-common-folks/](https://towardsdatascience.com/the-machine-the-expert-and-the-common-folks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-machine-the-expert-and-the-common-folks/](https://towardsdatascience.com/the-machine-the-expert-and-the-common-folks/)
- en: <mdspan datatext="el1754437383241" class="mdspan-comment">Picture a judge</mdspan>
    about to hand down a sentence just before lunch. Most people would assume the
    timing doesn’t matter for the outcome, but a provocative study suggested that
    when judges get hungry, justice gets harsh – a phenomenon that became known as
    the hungry judge effect [1]. While this specific finding remains hotly debated,
    there are other seemingly irrelevant factors beyond a growling stomach and low
    blood sugar that can influence a judge’s, or in fact anyone’s, decision [2,3],
    such as whether it is the defendant’s birthday, whether it’s hot outside, or more
    generally, the mood of the judge.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754437383241" class="mdspan-comment">想象一下一位法官</mdspan>在午餐前即将宣判。大多数人会认为时间对结果没有影响，但一项挑衅性的研究表明，当法官感到饥饿时，正义变得严厉——这一现象被称为“饥饿法官效应”
    [1]。尽管这一具体发现仍然存在激烈争论，但除了咕咕作响的胃和低血糖之外，还有其他看似无关的因素可以影响法官，或者实际上任何人的决策 [2,3]，例如是否是被告的生日，外面是否很热，或者更普遍地说，法官的情绪。
- en: 'This highlights one of the main concerns in decision-making: where there are
    people, there is variability (“noise”) and bias. So it begs the question: can
    the machine do better? Before we get there, let us first explore in what way people
    are noisy. Disclaimer: many of the concepts introduced in this article are described
    in the book *Noise* by Daniel Kahneman (author of *Thinking, Fast and Slow*) and
    his colleagues Oliver Sibony and Cass R. Sunstein [4].'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这突出了决策中的一个主要担忧：只要有人的地方，就有变异性（“噪声”）和偏见。因此，它引出了一个问题：机器能否做得更好？在我们到达那里之前，让我们首先探索人们如何变得嘈杂。免责声明：本文中介绍的大多数概念都在丹尼尔·卡尼曼（著有《思考，快与慢》）及其同事奥利弗·西博尼和卡斯·R·桑斯坦合著的《噪声》一书中进行了描述
    [4]。
- en: Noisy people
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 噪音人群
- en: The authors of Noise identify three sources of human noise.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 《噪声》一书的作者们确定了人类噪声的三个来源。
- en: One is called *level noise*. This describes how soft or extreme an individual’s
    judgement is compared to the average individual. For example, a judge with a high
    *justice sensitivity* might impose harsher sentences than a more lenient colleague.
    Level noise is also related to the subjective scale by which we rate something.
    Imagine that two judges agree on a “moderate sentence”, but due to level noise,
    a moderate sentence in one’s perspective is a harsh sentence to the other judge.
    This is similar to when rating a restaurant. You and your friend might have enjoyed
    the experience equally. Still one of you “only” gave it four out of five stars,
    while the other gave it five stars.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个是被称为 *水平噪声*。这描述了与平均水平相比，个体的判断是温和的还是极端的。例如，一个具有高 *正义敏感性* 的法官可能会比一个更加宽容的同事施加更严厉的判决。水平噪声也与我们对事物进行评分的主观尺度有关。想象一下，两位法官对“适度判决”达成一致，但由于水平噪声，一个法官眼中的适度判决对另一个法官来说可能是严厉的判决。这类似于对餐厅的评分。你和你的朋友可能都同样享受了这次体验。但其中一个人“仅仅”给了四颗星，而另一个人给了五颗星。
- en: Another source is called *(stable) pattern noise*. This describes how an individual’s
    decision is influenced by factors that should be irrelevant in a given situation.
    Say, if a judge is more lenient (compared to the judge’s baseline level) when
    the defendant is a single mother – perhaps because the judge has a daughter who
    happens to be a single mother. Or going back to the restaurant rating example,
    if, for whatever reason, your rating system is different based on whether it is
    an Italian or French restaurant.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个来源被称为 *(稳定)模式噪声*。这描述了在特定情况下，个体的决策如何受到看似无关因素的影响。比如说，如果一个法官在被告是一位单身母亲时（与法官的基准水平相比）更加宽容——可能是因为法官有一个恰好也是单身母亲的女儿。或者回到餐厅评分的例子，如果出于任何原因，你的评分系统根据是意大利餐厅还是法国餐厅而有所不同。
- en: The final source of noise is occasion *noise*. It is also called *transient*
    pattern noise, because like pattern noise, it involves irrelevant factors influencing
    decisions. But unlike pattern noise, occasion noise is only momentary. The hungry
    judge from the introduction is an example of occassion noise, where the timing
    (before/after lunch) changes the severity of the sentence (assuming the effect
    exists). More generally, mood causes occasion noise and changes how we respond
    to different situations. You might have noticed how the same experience can feel
    very different depending on your mental state.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 噪声的最后一个来源是场合噪声。它也被称为*短暂模式噪声*，因为像模式噪声一样，它涉及无关因素影响决策。但与模式噪声不同，场合噪声只是瞬时的。引言中提到的饥饿法官就是一个场合噪声的例子，其中时间（饭前/饭后）改变了判决的严重性（假设这种影响存在）。更普遍地说，情绪引起场合噪声，并改变我们对不同情况的反应。你可能已经注意到，同样的经历可能会根据你的心理状态感觉非常不同。
- en: Now that we better understand noise, let’s now look at two types of decisions
    where noise infiltrates.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们更好地理解了噪声，让我们看看两种决策类型，其中噪声渗透进来。
- en: Prediction and evaluation
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预测与评估
- en: 'Often we want the quality of a decision to be measurable. When we go to a doctor,
    it is nice to know that many patients before you got the proper treatment: the
    assessment of the doctor was correct. On the other hand, when you’re watching
    the Lord of the Rings movies with friends who have wildly different opinions about
    how to rate it, you have to respect that there’s no universal truth (and if there
    were, it would obviously be that Lord of the Rings is the greatest film series
    ever).'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常希望决策的质量是可以衡量的。当我们去看医生时，知道许多在你之前的病人得到了适当的治疗：医生的评估是正确的。另一方面，当你和朋友一起看《指环王》电影，他们对如何评分有截然不同的看法时，你必须尊重没有普遍真理（如果有的话，显然是《指环王》是有史以来最伟大的电影系列）。
- en: With that in mind, we need to distinguish between *predictions* and *evaluations*.
    Predictions imply a single (verifiable) truth, evaluations do not. This in turn
    implies that predictions can be biased, since there is a universal truth, whereas
    evaluations cannot be biased per se. Both can still be noisy however. See the
    Figure below.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，我们需要区分*预测*和*评估*。预测意味着一个单一（可验证）的真理，而评估则不是。这反过来又意味着预测可能会存在偏见，因为有一个普遍的真理，而评估本身则不可能存在偏见。然而，两者仍然可能存在噪声。参见下面的图。
- en: '![](../Images/092d4b6d6ae03354ece6f697020dc6b8.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/092d4b6d6ae03354ece6f697020dc6b8.png)'
- en: My movie example likely made it seem as if cases of evaluations are unimportant.
    It is a matter of taste, right? But even if there is no bias (in the statistical
    sense), there is still noise. The example with the judge given in the introduction
    is a case of evaluation. There is no universal correct sentence. Still, if different
    judges impose different sentences the result is a noisy and unjust judicial system.
    Thus, cases of evaluations can be very important.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我的电影例子可能让你觉得评估案例并不重要。这是一个口味问题，对吧？但即使没有偏见（在统计意义上），仍然存在噪声。引言中给出的法官例子就是一个评估案例。没有普遍正确的句子。尽管如此，如果不同的法官给出不同的判决，结果将是一个嘈杂和不公正的司法体系。因此，评估案例可能非常重要。
- en: Next I will show that what distinguishes humans from machines is (among many
    other things) our lack of consistency.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将展示人类与机器的区别（在许多其他事物中）是我们缺乏一致性。
- en: Consistency beats complex rules
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一致性胜过复杂规则
- en: In a study from 2020, researchers wanted to see how experts matched up against
    simple rules in predictive tasks [5]. The researchers acquired three archival
    datasets (associated with three different groups of candidates) supplied by a
    large consulting firm, which contained performance information on a total of 847
    candidates, such as the result of personality tests, cognitive tests and interviews.
    Experts assessors were then asked to rate all 847 candidates across 7 categories
    (such as Leadership, Communication, Motivation, etc.) by assigning scores from
    1 to 10 points. Based on their assigned scores across these 7 categories, the
    experts then had to predict what score the candidates would achieve in a performance
    evaluation (also from 1 to 10 points) which were conducted two years later.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在2020年的一项研究中，研究人员想看看专家在预测任务中如何与简单规则相匹配 [5]。研究人员从一家大型咨询公司获得了三个存档数据集（与三个不同的候选人群体相关），其中包含847个候选人的绩效信息，例如性格测试、认知测试和面试结果。然后要求专家评估员对7个类别（如领导力、沟通、动机等）的所有847个候选人进行评分，评分从1到10分。基于他们在这些7个类别中的评分，专家随后必须预测候选人在两年后的绩效评估（也是1到10分）中将获得多少分数。
- en: The researchers then built more than 10,000 linear models, where each model
    generated its own random weights for each of the 7 categories. Each model then
    used the randomly generated weights along with the points given by experts for
    each of the seven categories to make consistent (i.e. fixed weight) performance
    evaluation predictions across all 847 candidates. Finally, these predictions were
    compared against the experts’ predictions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员随后构建了超过10,000个线性模型，其中每个模型为7个类别中的每一个生成自己的随机权重。然后，每个模型使用随机生成的权重以及专家为每个七个类别给出的点数，对所有847个候选人的持续（即固定权重）绩效评估预测进行预测。最后，这些预测与专家的预测进行了比较。
- en: 'The result was thought-provoking: in two out of the three candidate groups,
    *every single* model was better at predicting the performance evaluation scores
    than the experts. In the remaining group, “only” 77% of the models came closer
    to the final evaluation than the human experts did.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 结果令人深思：在三个候选组中的两个组中，*每个*模型在预测绩效评估分数方面都比专家做得更好。在剩下的一个组中，“只有”77%的模型在接近最终评估方面比人类专家做得更好。
- en: '![](../Images/73dfabe3af80f00e71f2859148069286.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/73dfabe3af80f00e71f2859148069286.png)'
- en: Image generated by DALL·E (OpenAI, 2025)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 由 DALL·E（OpenAI，2025）生成的图像
- en: So how could simple mathematical models beat experts? According to the authors
    of Noise (from which the example is taken), we humans weight different categories
    similar to the simple models. But unlike the simple models, our own mental models
    are so complex that we lose the ability to reproduce our own rules, and *noise*
    takes over. The simple models, by contrast, are both consistent and free of noise.
    They are only affected by whatever occasion noise (mood for example) or pattern
    noise that went into the category evaluation score, but not in the prediction
    stage.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 那么简单的数学模型是如何战胜专家的呢？根据《噪声》（例子取自该书）的作者，我们人类对不同类别的权重与简单模型相似。但与简单模型不同，我们自己的心理模型过于复杂，以至于我们失去了复制自己规则的能力，*噪声*取而代之。相比之下，简单模型既一致又无噪声。它们只受类别评估分数中包含的任何偶然噪声（例如情绪）或模式噪声的影响，但在预测阶段不受影响。
- en: The study is interesting, because it shows the extent of human noise in predictive
    tasks, where mindless consistency (i.e. sticking with some random weights for
    each candidate) appears superior to mindful expertise (i.e. using elaborate mental
    rules for each candidate). But as the authors also warn, we should be careful
    not to overgeneralize from these specific datasets focused on managerial assessment,
    as different settings and other types of expertise may show different results.
    In this study, it was also shown that the experts outperformed pure randomness
    (i.e. where the model used new random weights for each candidate), which indicates
    the presence of valid expert insight. Consistency appeared to be the critical
    missing ingredient.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究很有趣，因为它展示了人类在预测任务中的噪声程度，在这些任务中，无意识的连贯性（即对每个候选人坚持一些随机权重）似乎优于有意识的专家知识（即对每个候选人使用复杂的心智规则）。但正如作者也警告的那样，我们应谨慎不要从这些专注于管理评估的具体数据集中过度泛化，因为不同的环境和其他类型的专业知识可能显示出不同的结果。在这项研究中，还显示专家的表现优于纯随机（即模型为每个候选人使用新的随机权重），这表明存在有效的专家洞察力。一致性似乎是最关键的缺失成分。
- en: There are several other studies that have documented how “machines” (or simple
    rules) tend to outperform humans and experts. Another popular example is found
    in the book Expert Political Judgment by Philip Tetlock who became famous for
    the statement that “the average expert was roughly as accurate as a dart-throwing
    chimpanzee”. Behind this statement lies a study involving 80,000 predictions made
    by 284 expert forecasters across different fields, all assessed after a 20-year
    period. You can imagine how that turned out from the aforementioned statement.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 有几项其他研究记录了“机器”（或简单规则）往往能超越人类和专家的情况。另一个流行的例子可以在菲利普·泰特洛克（Philip Tetlock）的《专家政治判断》一书中找到，他因提出“平均专家的准确性大致与投掷飞镖的黑猩猩相当”的言论而闻名。这句话背后是一项研究，涉及284位来自不同领域的专家预报员在20年期间做出的80,000个预测，所有预测都在20年后进行了评估。你可以想象从上述陈述中得出的结果。
- en: '![](../Images/83ad041baee28c89b57e799b838aa510.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/83ad041baee28c89b57e799b838aa510.png)'
- en: Image generated by DALL·E (OpenAI, 2025)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 由DALL·E（OpenAI，2025）生成的图像
- en: Since mathematical models are the backbone of machines, the examples provide
    some evidence that machines can outperform humans. It is not hard however to think
    of examples, where the complexity and nuanced view of the expert will be superior
    to a simple machine. Consider a famous example by the psychologist Paul Meehl.
    If a machine confidently predicts that a person will go to the movies with a 90%
    probability, but the clinician knows that the same person has just broken his
    leg, the clinician (who now takes the role of “the expert”) has access to information
    that should allow clinician to confidently overwrite the machine prediction.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数学模型是机器的骨架，这些例子提供了一些证据表明机器可以超越人类。然而，不难想到一些例子，其中专家的复杂和细微的观点将优于简单的机器。考虑心理学家保罗·米厄尔（Paul
    Meehl）的一个著名例子。如果一个机器自信地预测某人有90%的概率去看电影，但临床医生知道同一个人刚刚摔断了腿，那么临床医生（现在扮演“专家”的角色）可以获取到应该允许临床医生自信地覆盖机器预测的信息。
- en: Both the movie-goer and performance evaluation examples consider predictions.
    But when it comes to evaluations, machine limitation becomes even more obvious
    in domains that demand contextual judgements. Such as providing emotional support
    or giving career advice to an individual. Both situations demand a deep understanding
    of the subtle details that make up this individual, something humans understand
    better, especially those who know the person well. Ethical decisions are another
    example, which frequently involve emotions and moral intuitions that many machines
    currently struggle with understanding.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 电影观众和绩效评估的例子都考虑了预测。但当涉及到评估时，机器在需要情境判断的领域中的局限性变得更加明显。例如，提供情感支持或为个人提供职业建议。这两种情况都需要对构成这个个体的微妙细节有深入的理解，这是人类更擅长的事情，尤其是那些了解这个人的人。道德决策是另一个例子，它经常涉及情感和道德直觉，许多机器目前都难以理解。
- en: Despite these few human advantages, there is much literature supporting that
    machines are generally better at prediction, but only little evidence documenting
    that machines are generally *much* better. Some litterature on the human-AI interaction
    suggest that we are more demanding of the capability of automated systems before
    trusting them with important decisions. If this is true, it would likely require
    great technological advancement and documented performance superiority that clearly
    justify replacing the human expert in such high-stakes situations.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人类有这些微小的优势，但有许多文献支持机器在预测方面通常表现更好，但只有很少的证据记录了机器在预测方面通常*远远*更好。一些关于人机交互的文献表明，在信任自动化系统做出重要决策之前，我们对它们的性能要求更高。如果这是真的，那么可能需要巨大的技术进步和记录在案的明显性能优势，才能清楚地证明在高风险情况下取代人类专家的合理性。
- en: 'AI: Finding the broken legs'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI：寻找摔断的腿
- en: It is well known that complex (unregularized) models are prone to overfitting,
    especially on small datasets. Luckily, in many domains today, datasets are large
    enough to support more complex deep learning models. If we go back to Paul Meehl’s
    example with the movie-goer and the broken leg, this was a data problem. The clinician
    was more informed than the machine. Now imagine that the machine was more knowledgeable,
    in the sense that it is trained on more data. For example, it might have discovered
    a connection between hospitalisation and the lower probability of going to the
    cinema. There is a good chance that this model now correctly predicts a low probability
    of seeing this person at the movie, rather than the 90% the simple model produced.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 众所周知，复杂的（未正则化的）模型容易过拟合，尤其是在小数据集上。幸运的是，在许多领域，今天的数据集足够大，可以支持更复杂的深度学习模型。如果我们回顾保罗·米尔的例子，即电影观众和断腿，这是一个数据问题。临床医生比机器更有信息。现在想象一下，如果机器更有知识，从更大量的数据中训练出来。例如，它可能发现了住院与去看电影的概率降低之间的联系。这个模型现在正确预测这个人去看电影的概率很低，而不是简单模型产生的90%。
- en: In Meehl’s example, a broken leg was a metaphor for something unforeseen by
    the machine, but understood by the human. For the complex model (lets call it
    AI) the roles have changed. This AI has not only removed the broken leg, it might
    also be able to see patterns that we, as humans, cannot. In that sense, the AI
    is now more knowledgeable and able to foresee broken legs that we could not have
    imagined. We are in a weaker position to overwrite or question the predictions.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在米尔的例子中，断腿是机器无法预见但人类理解的东西的隐喻。对于复杂的模型（我们可以称之为AI），角色已经发生了变化。这个AI不仅消除了断腿，还可能能够看到我们作为人类无法看到的模式。从这个意义上说，AI现在更有知识，能够预见我们无法想象的断腿。我们在修改或质疑预测方面处于更弱势的地位。
- en: We can only understand so much
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们只能理解这么多
- en: 'If we go back to Philip Tetlock’s study, and the dart-throwing chimpanzees,
    the problem leading to the inaccurate forecasts of the experts is likely caused
    by a well established cognitive bias: overconfidence. Specifically, confidence
    that one is perfectly imformed to make a plausible forecast of (highly uncertain)
    events in the future. In fact, one typically underestimates how little we know,
    and what we cannot know (for whatever reason) is called *objective ignorance*.
    AI is impressive, but also suffers from the same limitation. No matter how much
    data we feed it, there are things that it cannot anticipate in this wildly complex
    world of billions and billions of interacting events. So while AI might do better
    than humans in keeping objective ignorance to a minimum, it will, as with human
    experts, have a natural limit where predictions become no better than those of
    a dart-throwing chimpanzee. Consider weather prediction. Despite modern and complex
    methods, such as ensemble forecasting, it remains hard to make predictions more
    than 2 weeks forward. This is because weather systems are chaotic, where small
    perturbations in the initial atmospheric conditions of the models can lead to
    entirely different chain of events. There is a lot of objective ignorance when
    doing weather forecasts.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们回顾菲利普·特洛克的研究，以及投掷飞镖的黑猩猩实验，专家们不准确预测的问题很可能是由于一个根深蒂固的认知偏差：过度自信。具体来说，是对自己完美了解以对（高度不确定的）未来事件做出合理预测的信心。事实上，人们通常低估了我们知道得有多少，以及我们无法知道（无论什么原因）的东西被称为*客观无知*。人工智能令人印象深刻，但也受到同样的限制。无论我们给它提供多少数据，在这个由数十亿相互作用的复杂事件世界中，总有一些它无法预见的事情。因此，尽管人工智能可能在将客观无知降到最低方面比人类做得更好，但它仍然会像人类专家一样，有一个自然的极限，即预测的准确性不会超过投掷飞镖的黑猩猩。以天气预报为例。尽管有现代和复杂的方法，如集合预测，但预测超过两周的时间仍然很困难。这是因为天气系统是混沌的，模型初始大气条件中的微小扰动可能导致完全不同的连锁事件。在天气预报中存在大量的客观无知。
- en: Expert Proficiency and the Crowd
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 专家熟练度和群体
- en: 'Human experts are inherently biased and noisy due to our complex, individual
    nature. This raises a natural question: Are some people less susceptible to noise,
    bias, and objective ignorance than others? The answer is yes. Loosely speaking,
    there are two major categories that contribute to performance within decision-making.
    One is general intelligence (or general mental ability; GMA), the other we can
    call your Style Of Thinking (SOT). Concerning GMA, one would assume that many
    experts are already high-scorers, and one would be correct. Still, even within
    this group of high-scorers there is evidence on how the top quantile outperforms
    the lower quantiles [6]. The other factor, SOT, addresses how people engage in
    cognitive reflection. Kahneman is known for his system 1 and system 2 model of
    thinking. In this framework, people with an advanced style of thinking are more
    likely to engage in slow thinking (system 2). Thus these people are likely to
    overcome the fast conclusions of system 1, an inherent source to cognitive biases
    and noise.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们复杂、个性化的本质，人类专家天生具有偏见和噪声。这引发了一个自然的问题：是否有些人比其他人更不容易受到噪声、偏见和客观无知的影响？答案是肯定的。粗略地说，有两个主要类别对决策中的表现有贡献。一个是通用智力（或一般心理能力；GMA），另一个我们可以称之为你的思维方式（SOT）。关于GMA，人们会假设许多专家已经是高分者，这是正确的。然而，即使在高分者群体中，也有证据表明最高分位数的专家比低分位数的专家表现更好[6]。另一个因素，SOT，涉及人们如何进行认知反思。卡尼曼以其系统1和系统2的思维模型而闻名。在这个框架中，具有高级思维风格的人更有可能进行慢速思考（系统2）。因此，这些人更有可能克服系统1的快速结论，这是认知偏见和噪声的固有来源。
- en: '![](../Images/80caaf9adc4f6c5b19791dd1d0d90aaa.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/80caaf9adc4f6c5b19791dd1d0d90aaa.png)'
- en: Cloud effects generated by DALL·E (OpenAI, 2025)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E（OpenAI，2025）生成的云效果
- en: These performance traits are also found in so-called Superforecasters, a term
    invented by Philip Tetlock, author of Expert Political Judgement and inventor
    of the dart-throwing chimpanzees. Following his study on expert forecasting, Tetlock
    founded The Good Judgement Project, an initiative that wanted to exploit the concept
    known as Wisdom of the Crowd (WotC) to predict future world events. Around 2%
    of the volunteers that entered the program did exceptionally well and were recruited
    into Tetlock’s team of Superforecasters. Not surprisingly, these forecasters excelled
    in both GMA and SOT and, perhaps a little more surprising, these forecasters reportedly
    offered 30% better predictions than intelligence officers with access to actual
    classified information [7].
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这些表现特征也存在于所谓的超级预测者中，这是菲利普·泰特洛克（Philip Tetlock）发明的术语，他是《专家政治判断》一书的作者，也是投掷飞镖的黑猩猩的发明者。在研究专家预测之后，泰特洛克创立了“良好判断项目”（The
    Good Judgement Project），这是一个旨在利用所谓的群体智慧（WotC）来预测未来世界事件的倡议。大约有2%的志愿者在进入该项目后表现出色，并被招募到泰特洛克的超级预测者团队中。不出所料，这些预测者在GMA和SOT方面都表现出色，也许更令人惊讶的是，据报道，这些预测者的预测准确率比能够获取实际机密信息的情报官员高出30%[7]。
- en: 'The motivation for using WotC for prediction is simple: people are noisy, and
    we should not rely on a single prediction, be it expert or non-expert. Aggregating
    several predictions however, we can hope to eliminate sources of noise. For this
    to work we need many forecasters, but equally important, if not more so, is diversity
    among them. Imagine we were predicting the next pandemic using a crowd high in
    neuroticism, then this homogeneous group might systematically overestimate the
    risk, predicting it would occur much sooner than in reality.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 使用群体智慧进行预测的动机很简单：人们是有噪声的，我们不应该依赖于单一的预测，无论是专家还是非专家。然而，汇总多个预测，我们可以希望消除噪声的来源。为了使这起作用，我们需要许多预测者，但同样重要的是，如果不仅仅如此，那就是他们之间的多样性。想象一下，如果我们使用一个神经质程度高的群体来预测下一次流行病，那么这个同质群体可能会系统地高估风险，预测它会比现实中更早发生。
- en: One must also consider how to aggregate information. Since one person might
    be more knowledgeable about a subject than the next person (experts being the
    extreme), a simple average of votes might not be the best choice. Instead, one
    could weight the votes by each person’s past accuracy to promote more robust predictions.
    There are other ways to strengthen the prediction, and in the Good Judgement Project
    they have developed an elaborate training program with the goal of reducing noise
    and combat cognitive bias, thus enhancing accuracy of their Superforecasters (and
    in fact anyone else). It goes without saying that when it comes to domain specific
    predictions, a crowd needs expert knowledge. Letting the common folks try to predict
    when the sun burns out might yield alarmingly variable predictions, compared to
    those of astrophysicists.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一个人还必须考虑如何汇总信息。由于一个人可能比另一个人对某个主题了解得更多（专家是极端情况），简单的投票平均可能不是最佳选择。相反，可以通过每个人过去的准确性来加权投票，以促进更稳健的预测。还有其他方法来加强预测，在Good
    Judgement项目中，他们已经开发了一个复杂的培训计划，目标是减少噪声和对抗认知偏差，从而提高他们的超级预测者（以及事实上任何其他人）的准确性。当涉及到特定领域的预测时，一群人需要专业知识。让普通人尝试预测太阳何时耗尽，与天体物理学家相比，可能会得出令人惊讶的变量预测。
- en: Shallow predictions
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 浅层预测
- en: We have seen that machines can offer certain advantages over individual humans,
    partly because they process information more consistently, although they remain
    vulnerable to the biases and noise present in their training data. Even if some
    humans tend to overcome their own noise and bias owing to refined cognitive abilities
    (measured by GMA and SOT) they can still produce inaccurate decisions.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到，机器可以提供某些优于个人的优势，部分原因是因为它们处理信息更一致，尽管它们仍然容易受到其训练数据中存在的偏差和噪声的影响。即使有些人倾向于克服他们自己的噪声和偏差，这得益于他们精细的认知能力（通过GMA和SOT衡量），他们仍然可能做出不准确的决策。
- en: One way to mitigate this is aggregating different opinions from several people,
    preferably those less influenced by noise, bias and objective ignorance (such
    as the Superforecasters). This approach recognizes that each person functions
    as a repository of vast information, though individuals often struggle to use
    that information consistently. When we aggregate predictions from multiple such
    “data-rich” individuals to compensate for their individual inaccuracies, this
    process bears some resemblance to how we feed large amounts of data into a machine
    and ask for its prediction. The key difference is that humans already contain
    extensive knowledge without requiring external data feeding.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 缓解这一问题的方法之一是汇总来自几个不同人的不同意见，最好是那些受噪声、偏差和客观无知影响较小的人（如超级预测者）。这种方法认识到每个人都是一个庞大信息的存储库，尽管个人往往难以一致地使用这些信息。当我们从多个这样的“数据丰富”的个人那里汇总预测，以补偿他们的个人不准确性时，这个过程与我们向机器输入大量数据并请求其预测的过程有相似之处。关键的区别是，人类已经包含了大量的知识，而无需外部数据输入。
- en: One important distinction between people and current machine learning systems
    is that people can engage in explicit causal reasoning and understand underlying
    mechanisms. So while many deep learning models might produce more accurate predictions
    and discover subtler patterns, they typically cannot match humans intuitive ability
    to understand causal structure. In that sense, despite superior accuracy, the
    machine prediction appears shallow. But with the ongoing AI innovations, this
    human edge seem increasingly vulnerable.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 人类和当前机器学习系统之间的重要区别之一是，人类可以进行明确的因果推理并理解潜在机制。因此，尽管许多深度学习模型可能产生更准确的预测并发现更微妙的模式，但它们通常无法与人类对因果结构的直观理解能力相匹配。从这个意义上说，尽管准确性更高，但机器预测似乎很肤浅。但随着人工智能创新的持续发展，这种人类优势似乎越来越脆弱。
