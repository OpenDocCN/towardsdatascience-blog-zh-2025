- en: Because it can’t split any node with fewer than 20% (0.2) of the total samples
    (as you can see in the leaves samples %), it’s limited to a depth of 4, with only
    15 nodes and 8 leaves.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它不能分裂少于总样本数20%（0.2）的任何节点（如叶子样本百分比所示），它被限制在4个深度，只有15个节点和8个叶子。
- en: For the tree with depth 10, many of the leaves contained a single sample. Having
    so many leaves with so few sample can be a sign of overfitting. For the constrained
    tree, the smallest leaf contains over 1000 samples.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 对于深度为10的树，许多叶子节点只包含单个样本。这么多叶子节点却只有这么少的样本可能是一个过拟合的迹象。对于约束树，最小的叶子节点包含超过1000个样本。
- en: 'In this case, the constrained tree is worse than the unconstrained tree on
    all counts; however, setting `min_samples_split` to 10 (i.e. 10 samples, not 10%)
    improved the results:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个案例中，约束树在所有指标上都比非约束树差；然而，将`min_samples_split`设置为10（即10个样本，而不是10%）改善了结果：
- en: '| Metric | Mean | Std |'
