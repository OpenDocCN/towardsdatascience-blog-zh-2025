- en: 'Each row is a “block group”, a geographical area. The columns are, in order:
    median income, median house age, average number of rooms, average number of bedrooms,
    population, average number of occupants, latitude, longitude, and the median house
    value (the target). The target values range from 0.15 to 5.00, with a mean of
    2.1.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 每一行代表一个“区块群”，一个地理区域。列的顺序是：中位数收入、中位数房屋年龄、平均房间数、平均卧室数、人口、平均居住人数、纬度、经度和中位数房屋价值（目标）。目标值范围从0.15到5.00，平均值为2.1。
- en: 'I set aside the last item to use as my own personal tester:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我留出了最后的项目作为我自己的个人测试器：
