  type: TYPE_NORMAL
  zh: 这意味着有1563个节点和782个叶子。
- en: 'Whereas `max_depth=10, min_samples_split=0.2` looks like:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 而`max_depth=10, min_samples_split=0.2`看起来是这样的：
- en: '![](../Images/1000d477ecd90f5265d09f84847b2804.png)'
