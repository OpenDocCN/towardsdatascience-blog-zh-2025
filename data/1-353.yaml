  id: totrans-76
  prefs: []
  type: TYPE_TB
  zh: '| MAE | 0.531 | 0.012 |'
- en: '| MAPE | 0.325 | 0.012 |'
  id: totrans-77
  prefs: []
  type: TYPE_TB
  zh: '| MAPE | 0.325 | 0.012 |'
- en: '| MSE | 0.521 | 0.021 |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
  zh: '| MSE | 0.521 | 0.021 |'
- en: '| RMSE | 0.722 | 0.015 |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '| RMSE | 0.722 | 0.015 |'
- en: '| R² | 0.609 | 0.016 |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| R² | 0.609 | 0.016 |'
- en: Compared with the deep tree, across all error stats, the shallow tree has higher
    errors (also known as biases), but lower standard deviations (also known as variances).
    In more casual terminology, there’s a trade-off between precision (all predictions
    being close together) and accuracy (all predictions being near the true value).
    The pruned deep tree generally performed between the two, but took far longer
    to fit.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 与深树相比，在所有误差统计中，浅树具有更高的误差（也称为偏差），但标准差较低（也称为方差）。用更通俗的话来说，在精度（所有预测都接近）和准确性（所有预测都接近真实值）之间有一个权衡。剪枝的深树通常介于两者之间，但拟合所需时间更长。
- en: 'We can visualise all the stats these with box plots:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用箱线图可视化所有这些统计数据：
- en: '![](../Images/c936a21fd7cbc19a8980e171ab6f584c.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c936a21fd7cbc19a8980e171ab6f584c.png)'
- en: 'We can see the deep trees (green boxes) typically have lower errors (smaller
    y-axis value) but larger variations (larger gap between the lines) than the shallow
    tree (blue boxes). Normalising the means (so they’re all 0), we can see the variation
    more clearly; for example, for the MAEs:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到深树（绿色框）通常具有更低的误差（y轴值更小），但比浅树（蓝色框）具有更大的变化（线条之间的差距更大）。通过归一化平均值（使它们都是0），我们可以更清楚地看到变化；例如，对于MAE：
- en: '![](../Images/35bc2679c92ab3c74e9424e5ed106c70.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/35bc2679c92ab3c74e9424e5ed106c70.png)'
- en: 'Histograms can also be interesting. Again for the MAEs:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图也可能很有趣。再次以MAE为例：
- en: '![](../Images/2bdcfcd22e38126c2ffa62378dd88903.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2bdcfcd22e38126c2ffa62378dd88903.png)'
- en: The green (deep) has lower errors, but the blue (shallow) has a narrower band.
    Interestingly, the pruned tree results are less normal than the other two – although
    this is not typical behaviour.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 绿色（深）的误差较低，但蓝色（浅）的误差范围较窄。有趣的是，剪枝树的结果比其他两种结果更不正常——尽管这不是典型行为。
- en: Other hyperparameters
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他超参数
- en: What are the other hyperparameters we can tweak? The full list can be found
    in the docs: [https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeClassifier.html](https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeClassifier.html)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以调整哪些其他超参数？完整的列表可以在文档中找到：[https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeClassifier.html](https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeClassifier.html)
- en: Minimum samples to split
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最小分割样本数
- en: This is the minimum number of samples *of the total* that an individual node
    can contain to allow splitting. It can be a number or a percentage (implemented
    as a float between 0 and 1). It helps avoid overfitting by ensure each branch
    contains a decent number of results, rather than splitting into smaller and smaller
    branches based on only a few samples.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这是单个节点可以包含的最小样本数，以允许分裂。它可以是数字或百分比（实现为介于0和1之间的浮点数）。它通过确保每个分支包含合理数量的结果，而不是仅基于少量样本不断分裂成更小的分支，从而有助于避免过拟合。
- en: 'For example, `max_depth=10`, which I’ll use as a reference, looks like:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，`max_depth=10`，我将将其作为参考，看起来是这样的：
- en: '![](../Images/4f8070dc9dd15ef36c1e263c2b2a8c69.png)'
  id: totrans-94
