- en: I’ll use `train_test_split` to create training and testing data, which I’ll
    use to compare the trees.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用`train_test_split`创建训练和测试数据，我将使用这些数据来比较树。
- en: Tree depth
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 树深度
- en: Shallow
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 浅度
- en: I’ll start with a small tree, with `max_depth` of 3\. I’ll use `timeit` to record
    how long it takes to fit and predict. Of course, this is based on my machine;
    the objective is to give an idea of relative, not absolute, times. To get a more
    accurate timing, I took the mean of 10 fit-and-predicts.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我将从一个小树开始，`max_depth`为3。我将使用`timeit`来记录拟合和预测所需的时间。当然，这是基于我的机器；目的是给出相对时间，而不是绝对时间。为了获得更准确的计时，我取了10次拟合和预测的平均值。
- en: It took 0.024s to fit, 0.0002 to predict, and resulted in a mean absolute error
    (MAE) of 0.6, a mean absolute percentage error (MAPE) of 0.38 (i.e. 38%), a mean
    squared error (MSE) of 0.65, a root mean squared error (RMSE) of 0.80, and an
    R² of 0.50\. Note that for R², unlike the previous error stats, the higher the
    better. For my chosen block, it predicted 1.183, vs 0.894 actual. Overall, not
    great.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 拟合需要0.024秒，预测需要0.0002秒，结果得到平均绝对误差（MAE）为0.6，平均绝对百分比误差（MAPE）为0.38（即38%），平均平方误差（MSE）为0.65，均方根误差（RMSE）为0.80，R²为0.50。请注意，对于R²，与之前的误差统计不同，越高越好。对于我选择的块，它预测了1.183，与实际值0.894相比，总体来说并不理想。
- en: 'This is the tree itself, using `plot_tree`:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这是树本身，使用`plot_tree`：
- en: '![](../Images/effef43f8650ae2f3271ac31cb2c6a98.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/effef43f8650ae2f3271ac31cb2c6a98.png)'
- en: You can see it only uses the MedInc, AveRooms, and AveOccup features – in other
    words, removing HouseAge, AveBedrms, Population, Latitude, and Longitude from
    the dataset would give the same predictions.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到它只使用了MedInc、AveRooms和AveOccup特征——换句话说，从数据集中删除HouseAge、AveBedrms、Population、Latitude和Longitude将给出相同的预测。
- en: Deep
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度
- en: Let’s go to `max_depth` of `None`, i.e. unlimited.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们设置`max_depth`为`None`，即无限。
- en: It took 0.09s to fit (~4x longer), 0.0007 to predict (~4x longer), and resulted
    in an MAE of 0.47, an MAPE of 0.26, an MSE of 0.53, an RMSE of 0.73, and an R²
    of 0.60\. For my chosen block, it predicted 0.819, vs 0.894 actual. Much better.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 拟合需要0.09秒（约4倍更长），预测需要0.0007秒（约4倍更长），结果得到MAE为0.47，MAPE为0.26，MSE为0.53，RMSE为0.73，R²为0.60。对于我选择的块，它预测了0.819，与实际值0.894相比，要好得多。
- en: 'The tree:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 树：
- en: '![](../Images/cdc0fe2dcfcfbb763f5be1aec91519e4.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cdc0fe2dcfcfbb763f5be1aec91519e4.png)'
- en: Wow. It has 34 levels (`.get_depth()`), 29,749 nodes (`.tree_.node_count`),
    and 14,875 individual branches (`.get_n_leaves()`) – in other words, up to 14,875
    different final values for MedHouseVal.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 哇。它有34层（`.get_depth()`），29,749个节点（`.tree_.node_count`），和14,875个单独的分支（`.get_n_leaves()`）——换句话说，对于MedHouseVal有高达14,875个不同的最终值。
- en: 'Using some custom code, I can plot one of the branches:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 使用一些自定义代码，我可以绘制其中一个分支：
- en: '![](../Images/eb0d56850a6d8d4dc00bac7a0362d111.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eb0d56850a6d8d4dc00bac7a0362d111.png)'
- en: This branch alone uses six of the eight features, so it’s likely that, across
    all ~15,000 branches, all features are represented.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这个分支单独使用了八个特征中的六个，所以很可能是，在所有约15,000个分支中，所有特征都被表示了。
- en: However, a tree this complex can lead to overfitting, as it can split into very
    small groups and capture noise.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如此复杂的树可能导致过拟合，因为它可以分裂成非常小的组并捕捉噪声。
- en: Pruned
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 剪枝
- en: The `ccp_alpha` parameter (ccp = cost-complexity pruning) can prune a tree after
    it’s built. Adding in a value of 0.005 to the unlimited depth tree results in
    an MAE of 0.53, an MAPE of 0.33, an MSE of 0.52, an RMSE of 0.72, and an R² of
    0.60 – so it performed between the deep and shallow trees. For my chosen block,
    it predicted 1.279, so in this case, worse than the shallow one. It took 0.64s
    to fit (>6x longer than the deep tree) and 0.0002 to predict (the same as the
    shallow tree) – so, it’s slow to fit, but fast to predict.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '`ccp_alpha`参数（ccp = cost-complexity pruning）可以在树构建后进行剪枝。将0.005的值添加到无限深度的树中，结果得到MAE为0.53，MAPE为0.33，MSE为0.52，RMSE为0.72，R²为0.60——因此它在深度和浅度树之间表现。对于我选择的块，它预测了1.279，所以在这种情况下，比浅度树差。拟合需要0.64秒（比深度树长6倍以上），预测需要0.0002秒（与浅度树相同）——因此，拟合速度慢，但预测速度快。'
- en: 'This tree looks like:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这棵树看起来像：
- en: '![](../Images/242d06965c3aa245d0f609da45e04f21.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/242d06965c3aa245d0f609da45e04f21.png)'
- en: Cross validating
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交叉验证
- en: What if we mix up the data? Within a loop, I used `train_test_split` *without
    a random state* (to get new data each time), and fitted and predicted each tree
    based on the new data. Every loop I recorded the MAE/MAPE/MSE/RMSE/R², and then
    found the mean and standard deviation for each. I did 1000 loops. This helps (as
    the name suggests) validate our results – a single high or low error result could
    simply be a fluke, so taking the mean gives a better idea of the typical error
    on new data, and the standard deviation helps understand how stable/reliable a
    model is.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们混合数据会怎样？在循环中，我使用了 `train_test_split` *不带随机状态* （每次都获取新的数据），并根据新数据拟合和预测每棵树。每次循环我都会记录MAE/MAPE/MSE/RMSE/R²，然后为每个找到平均值和标准差。我进行了1000次循环。这有助于（正如其名所示）验证我们的结果——单个高或低误差结果可能只是偶然，所以取平均值可以更好地了解新数据上的典型误差，而标准差有助于了解模型有多稳定/可靠。
- en: It’s worth noting that sklearn has some built-in tools for this form of validation,
    namely `cross_validation`, using `ShuffleSplit` or `RepeatedKFold`, and they’re
    typically much faster; I just did it manually to make it clearer what was going
    on, and to emphasise the time difference.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，sklearn有一些内置工具可以进行这种形式的验证，即`cross_validation`，使用`ShuffleSplit`或`RepeatedKFold`，它们通常要快得多；我只是手动做了，以便更清楚地了解发生了什么，并强调时间差异。
