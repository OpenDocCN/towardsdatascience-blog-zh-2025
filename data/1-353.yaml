- en: A Visual Guide to Tuning Decision-Tree Hyperparameters
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 决策树超参数调优的视觉指南
- en: 原文：[https://towardsdatascience.com/visualising-decision-trees/](https://towardsdatascience.com/visualising-decision-trees/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/visualising-decision-trees/](https://towardsdatascience.com/visualising-decision-trees/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: <mdspan datatext="el1756317823059" class="mdspan-comment">Decision trees</mdspan>
    are one of the oldest and most popular forms of machine learning used for classification
    and regression. It’s unsurprising, then, that there’s a lot of content about them.
    However, most of it seems to focus on how the algorithms work, covering areas
    such as Gini impurity or error-minimisation. While this is useful knowledge, I’m
    more interested in how best to use decision trees to get the results I want —
    after all, my job doesn’t involve reinventing the tree, only growing them. Additionally,
    decision trees are some of the most easily visualised machine learning techniques,
    providing high interpretability, yet often content is primarily textual, with
    minimal, if any, graphics.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756317823059" class="mdspan-comment">决策树</mdspan>是用于分类和回归的最古老和最受欢迎的机器学习形式之一。因此，关于它们的内容很多也就不足为奇了。然而，大部分内容似乎都集中在算法的工作原理上，涵盖了诸如基尼不纯度或误差最小化等领域。虽然这是有用的知识，但我更感兴趣的是如何最好地使用决策树来获得我想要的结果——毕竟，我的工作不涉及重新发明树，只是扩展它们。此外，决策树是机器学习技术中最容易可视化的之一，提供了高可解释性，但内容通常是文本性的，图形很少，几乎没有。
- en: Based on these two factors, I’ve decided to do an exploration of how different
    decision tree hyperparameters affect both the performance of the tree (measured
    by factors such as MAE, RMSE, and R²) and visually how it looks (to see factors
    such as depth, node/leaf counts, and overall structure).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这两个因素，我决定探索不同的决策树超参数如何影响树的表现（通过如MAE、RMSE和R²等因素衡量）以及其视觉外观（查看深度、节点/叶计数和整体结构等因素）。
- en: For the model, I’ll use scikit-learn’s `DecisionTreeRegressor`. Classification
    decision trees requires similar hyperparameter tuning to regression ones, so I
    won’t discuss them separately. The hyperparameters I’ll look at are `max_depth`, `ccp_alpha`, `min_samples_split`, `min_samples_leaf`,
    and `max_leaf_nodes`. I’ll use the California housing dataset, available through
    scikit-learn ([more info here](https://scikit-learn.org/stable/datasets/real_world.html#california-housing-dataset))
    (CC-BY). All images below are created by me. The code for this little project,
    if you want to have a play yourself, is available in my GitHub: [https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees](https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 对于模型，我将使用scikit-learn的`DecisionTreeRegressor`。分类决策树需要与回归决策树相似的超参数调整，因此我将不会单独讨论它们。我将查看的超参数包括`max_depth`、`ccp_alpha`、`min_samples_split`、`min_samples_leaf`和`max_leaf_nodes`。我将使用加州住房数据集，可通过scikit-learn获得([更多信息在这里](https://scikit-learn.org/stable/datasets/real_world.html#california-housing-dataset))
    (CC-BY)。下面所有的图像都是我制作的。如果你想要亲自尝试这个小型项目，代码在我的GitHub上可用：[https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees](https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees)
