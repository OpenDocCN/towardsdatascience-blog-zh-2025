- en: This one was back to depth 10, with 1133 nodes and 567 leaves (so about 1/3
    less than the unconstrained tree). Many of these leaves also contain a single
    sample.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这个又回到了10个深度，有1133个节点和567个叶子（所以比非约束树少约1/3）。其中许多叶子也只包含一个样本。
- en: Minimum samples per leaf
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 每个叶子节点的最小样本数
- en: Another way of constraining a tree is by setting a minimum number of samples
    a leaf can have. Again, this can be a number or a percentage.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种约束树的方法是通过设置叶子节点可以拥有的最小样本数。同样，它可以是数字或百分比。
- en: 'With `max_depth=10, min_samples_leaf=0.1`:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 对于`max_depth=10, min_samples_leaf=0.1`：
- en: '![](../Images/2614c2a3f2d34d7d08fff6eb1c0989dd.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2614c2a3f2d34d7d08fff6eb1c0989dd.png)'
- en: Similar to the first `min_samples_split` one, it has a depth of 4, 15 nodes,
    and 8 leaves. However, notice the nodes and leaves are different; for example,
    in the right-most leaf in the `min_samples_split` tree, there were 5.8% of the
    samples, whereas in this one, the “same” leaf has 10% (that’s the 0.1).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 与第一个`min_samples_split`类似，它有4个深度，15个节点和8个叶子。然而，请注意节点和叶子是不同的；例如，在`min_samples_split`树的最右侧叶子中，有5.8%的样本，而在这个中，"相同"的叶子有10%（即0.1）。
- en: 'The stats are similar to that one also:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这些统计数据与那个也相似：
- en: '| Metric | Mean | Std |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
  zh: '| 指标 | 平均值 | 标准差 |'
- en: '| --- | --- | --- |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| MAE | 0.609 | 0.010 |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
  zh: '| MAE | 0.609 | 0.010 |'
- en: '| MAPE | 0.367 | 0.007 |'
  id: totrans-132
  prefs: []
  type: TYPE_TB
  zh: '| MAPE | 0.367 | 0.007 |'
- en: '| MSE | 0.659 | 0.023 |'
  id: totrans-133
  prefs: []
  type: TYPE_TB
  zh: '| MSE | 0.659 | 0.023 |'
- en: '| RMSE | 0.811 | 0.014 |'
  id: totrans-134
  prefs: []
  type: TYPE_TB
  zh: '| RMSE | 0.811 | 0.014 |'
- en: '| R² | 0.505 | 0.016 |'
  id: totrans-135
  prefs: []
  type: TYPE_TB
  zh: '| R² | 0.505 | 0.016 |'
- en: Allowing “larger” leaves can improve results. `min_samples_leaf=10` has depth
    10, 961 nodes and 481 leaves – so similar to a `min_samples_split=10`. It gives
    our best results so far, suggesting limiting the number of 1-sample leaves has
    indeed reduced overfitting.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 允许“更大的”叶子可以提高结果。`min_samples_leaf=10`有10个深度，961个节点和481个叶子——所以与`min_samples_split=10`相似。它给出了迄今为止的最佳结果，表明限制1样本叶子的数量确实减少了过拟合。
- en: '| Metric | Mean | Std |'
  id: totrans-137
  prefs: []
  type: TYPE_TB
  zh: '| 指标 | 平均值 | 标准差 |'
- en: '| --- | --- | --- |'
  id: totrans-138
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| MAE | 0.417 | 0.010 |'
  id: totrans-139
  prefs: []
  type: TYPE_TB
  zh: '| MAE | 0.417 | 0.010 |'
- en: '| MAPE | 0.235 | 0.008 |'
  id: totrans-140
  prefs: []
  type: TYPE_TB
  zh: '| MAPE | 0.235 | 0.008 |'
- en: '| MSE | 0.380 | 0.017 |'
  id: totrans-141
