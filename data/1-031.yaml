- en: 'JSON Parsing for Large Payloads: Balancing Speed, Memory, and Scalability'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 大负载JSON解析：平衡速度、内存和可扩展性
- en: 原文：[https://towardsdatascience.com/json-parsing-for-large-payloads-balancing-speed-memory-and-scalability/](https://towardsdatascience.com/json-parsing-for-large-payloads-balancing-speed-memory-and-scalability/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/json-parsing-for-large-payloads-balancing-speed-memory-and-scalability/](https://towardsdatascience.com/json-parsing-for-large-payloads-balancing-speed-memory-and-scalability/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1764656085968" class="mdspan-comment">Imagine that the marketing</mdspan>
    campaign you set up for Black Friday was a massive success, and customers start
    pouring into your website. Your Mixpanel setup which would usually have around
    1000 customer events an hour ends up having millions of customer events within
    an hour. Thereby, your data pipeline is now tasked with parsing vast amounts of
    JSON data and storing it in your database. You see that your standard JSON parsing
    library is not able to scale up to the sudden data growth, and your near real-time
    analytics reports fall behind. This is when you realize the importance of an efficient
    JSON parsing library. In addition to handling large payloads, JSON parsing libraries
    should be able to serialize and deserialize highly nested JSON payloads.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764656085968" class="mdspan-comment">想象一下，你为黑色星期五设置的营销活动取得了巨大成功，顾客开始涌入你的网站。你通常每小时有大约1000个客户事件的Mixpanel设置，结果在一小时内就产生了数百万个客户事件。因此，你的数据管道现在需要解析大量JSON数据并将其存储到数据库中。你发现你的标准JSON解析库无法扩展到突然的数据增长，你的近实时分析报告落后了。这时，你意识到一个高效的JSON解析库的重要性。除了处理大量负载外，JSON解析库还应该能够序列化和反序列化高度嵌套的JSON负载。
- en: In this article, we explore Python parsing libraries for large payloads. We
    specifically look at the capabilities of ujson, orjson, and ijson. We then benchmark
    the standard JSON library (stdlib/json), ujson, and orjson for serialization and
    deserialization performance. As we use the terms serialization and deserialization
    throughout the article, here’s a refresher on the concepts. Serialization involves
    converting your Python objects to a JSON string, whereas Deserialization involves
    rebuilding the JSON string from your Python data structures.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了用于大负载的Python解析库。我们特别关注了ujson、orjson和ijson的功能。然后，我们对标准JSON库（stdlib/json）、ujson和orjson的序列化和反序列化性能进行了基准测试。由于我们在整篇文章中使用了序列化和反序列化这两个术语，以下是对这些概念的重温。序列化涉及将你的Python对象转换为JSON字符串，而反序列化涉及从你的Python数据结构重建JSON字符串。
- en: As we progress through the article, you will find a decision flow diagram to
    help decide on the parser to use based on your workflow and unique parsing needs.
    In addition to this, we also explore NDJSON and libraries to parse NDJSON payloads.
    Let’s get started.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 随着文章的推进，你将找到一个决策流程图，帮助你根据你的工作流程和独特的解析需求选择解析器。此外，我们还探讨了NDJSON及其解析NDJSON负载的库。让我们开始吧。
- en: Stdlib JSON
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Stdlib JSON
- en: Stdlib JSON supports serialization for all basic Python data types, including
    dicts, lists, and tuples. When the function json.loads() is called, it loads the
    entire JSON into memory at once. This is fine for smaller payloads, but for larger
    payloads, json.loads() can cause critical performance issues such as out-of-memory
    errors and choking of downstream workflows.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Stdlib JSON支持所有基本Python数据类型的序列化，包括dicts、lists和tuples。当调用json.loads()函数时，它会一次性将整个JSON加载到内存中。这对于较小的负载来说是可行的，但对于较大的负载，json.loads()可能会导致关键性能问题，如内存不足错误和下游工作流程的阻塞。
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: ijson
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ijson
- en: For payloads that are in the order of hundreds of MBs, it is advisable to use
    ijson. ijson, short for ‘iterative json’, reads files one token at a time without
    the memory overhead. In the code below, we compare json and ijson.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数百兆字节的负载，建议使用ijson。ijson，即“迭代JSON”，一次读取一个标记，没有内存开销。在下面的代码中，我们比较了json和ijson。
- en: '[PRE1]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As you can see, ijson fetches one element at a time from the JSON and loads
    it into a Python dict object. This is then fed to the calling function, in this
    case, the process(record) function. The overall working of ijson has been provided
    in the illustration below.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，ijson一次从JSON中获取一个元素，并将其加载到一个Python字典对象中。然后将其传递给调用函数，在这种情况下，是process(record)函数。ijson的整体工作原理已在下面的插图提供。
- en: '![](../Images/a8c40f4faa375e2cf6ddf52a530c5fc2.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a8c40f4faa375e2cf6ddf52a530c5fc2.png)'
- en: A high-level illustration of ijson (Image by the Author)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: ijson 的高级说明（图片由作者提供）
- en: ujson
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ujson
- en: '![](../Images/7868117148fdaf9971e1e35319318c43.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7868117148fdaf9971e1e35319318c43.png)'
- en: Ujson – Under the Hood (Image by the Author)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: Ujson – 内部结构（作者图片）
- en: Ujson has been a widely used library in many applications involving large JSON
    payloads, as it was designed to be a faster alternative to the stdlib JSON in
    Python. The speed of parsing is great since the underlying code of ujson has been
    written in C, with Python bindings that connect to the Python interface. The areas
    that needed improvement in the standard JSON library were optimized in Ujson for
    speed and performance. But, Ujson is no longer used in newer projects, as the
    makers themselves have mentioned on PyPI that the library has been placed in maintenance-only
    mode. Below is an illustration of ujson’s processes at a high-level.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: Ujson 在许多涉及大量 JSON 负载的应用程序中已被广泛使用，因为它被设计为 Python 中 stdlib JSON 的更快替代品。解析速度非常快，因为
    ujson 的底层代码是用 C 编写的，并通过 Python 绑定连接到 Python 接口。在标准 JSON 库中需要改进的领域在 Ujson 中进行了优化，以提高速度和性能。但是，正如制作者在
    PyPI 上提到的，Ujson 已不再用于新的项目，该库已被置于仅维护模式。以下是对 ujson 高级流程的说明。
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We move to the next potential library named ‘orjson’.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们转向下一个潜在的库，名为“orjson”。
- en: orjson
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: orjson
- en: Since Orjson is written in Rust, it is optimized not only for speed but also
    has memory-safe mechanisms to prevent buffer overflows that developers face while
    using C-based JSON libraries like ujson. Moreover, Orjson supports serialization
    of several additional datatypes beyond the standard Python datatypes, including
    dataclass and datetime objects. Another key difference between orjson and the
    other libraries is that orjson’s dumps() function returns a bytes object, whereas
    the others return a string. Returning the data as a bytes object is one of the
    main reasons for orjson’s fast throughput.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Orjson 是用 Rust 编写的，它不仅优化了速度，还具备内存安全机制，以防止开发者在使用类似 ujson 这样的基于 C 的 JSON 库时遇到的缓冲区溢出问题。此外，Orjson
    支持序列化多种额外的数据类型，超出了标准的 Python 数据类型，包括 dataclass 和 datetime 对象。与其它库相比，orjson 的另一个关键区别在于，orjson
    的 dumps() 函数返回一个字节对象，而其它库返回一个字符串。以字节对象的形式返回数据是 orjson 高吞吐量主要原因之一。
- en: '[PRE3]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now that we’ve explored some JSON parsing libraries, let’s test their serialization
    capabilities.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经探索了一些 JSON 解析库，让我们测试它们的序列化能力。
- en: Testing Serialization Capabilities of JSON, ujson and orjson
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试 JSON、ujson 和 orjson 的序列化能力
- en: We create a sample dataclass object with an integer, string and a datetime variable.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了一个包含整数、字符串和 datetime 变量的样本 dataclass 对象。
- en: '[PRE4]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We then pass it to each of the libraries to see what happens. We begin with
    the stdlib JSON.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将它们传递给每个库以查看会发生什么。我们首先从 stdlib JSON 开始。
- en: '[PRE5]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: As expected, we get the following error. (The standard JSON library doesn’t
    support serialization of “dataclass” objects and datetime objects.)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，我们得到了以下错误。（标准 JSON 库不支持序列化“dataclass”对象和 datetime 对象。）
- en: '![](../Images/33784eab7da3ce19918725082660a746.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/33784eab7da3ce19918725082660a746.png)'
- en: Next, we test the same with the ujson library.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们使用 ujson 库进行相同的测试。
- en: '[PRE6]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/058d62a9c2da91b35016d0f0710b6341.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/058d62a9c2da91b35016d0f0710b6341.png)'
- en: As we see above, ujson is not able to serialize the data class object and the
    datetime datatype. Lastly, we use the orjson library for serialization.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，ujson 无法序列化数据类对象和 datetime 数据类型。最后，我们使用 orjson 库进行序列化。
- en: '[PRE7]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: We see that orjson was able to serialize both the dataclass and the datetime
    datatypes.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到 orjson 能够序列化数据类和 datetime 数据类型。
- en: '![](../Images/cc37edcf5dfeb826fa3f46b10735d02e.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cc37edcf5dfeb826fa3f46b10735d02e.png)'
- en: Working with NDJSON (A special Mention)
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与 NDJSON 一起工作（特别说明）
- en: We’ve seen the libraries for JSON parsing, but what about NDJSON? NDJSON (Newline
    Delimited JSON), as you might know, is a format in which each line is a JSON object.
    In other words, the delimiter is not a comma but a newline character. As an example,
    this is what NDJSON looks like.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了 JSON 解析库，那么 NDJSON 呢？NDJSON（Newline Delimited JSON），正如你可能知道的，是一种格式，其中每一行都是一个
    JSON 对象。换句话说，分隔符不是逗号，而是换行符。以下是一个 NDJSON 的例子。
- en: '[PRE8]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: NDJSON is mostly used for logs and streaming data, and hence, NDJSON payloads
    are excellent candidates for being parsed using the ijson library. For small to
    moderate NDJSON payloads, it is recommended to use the stdlib JSON. Other than
    ijson and stdlib JSON, there’s a dedicated NDJSON library. Below are code snippets
    showing each approach.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: NDJSON 主要用于日志和流数据，因此，NDJSON 负载数据非常适合使用 ijson 库进行解析。对于小型到中型的 NDJSON 负载数据，建议使用
    stdlib JSON。除了 ijson 和 stdlib JSON 之外，还有一个专门的 NDJSON 库。以下是一些展示每种方法的代码片段。
- en: NDJSON using stdlib JSON & ijson
  id: totrans-43
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用 stdlib JSON 和 ijson 的 NDJSON
- en: As NDJSON is not delimited by commas, it doesn’t qualify for a bulk load, because
    stdlib json expects to see a list of dicts. In other words, stdlib JSON’s parser
    looks for a single valid JSON element, but is instead given several JSON elements
    in the payload file. Therefore, the file has to be parsed iteratively, line by
    line, and sent to the caller function for further processing.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 由于NDJSON不以逗号分隔，它不符合批量加载的条件，因为stdlib json期望看到字典列表。换句话说，stdlib JSON的解析器寻找单个有效的JSON元素，但给定的有效载荷文件中有多个JSON元素。因此，必须逐行迭代解析文件，并将数据发送到调用函数进行进一步处理。
- en: '[PRE9]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: With ijson, the parsing is done as shown below. With standard JSON, we have
    just one root element, which is either a dictionary if it’s a single JSON or an
    array if it is a list of dicts. But with NDJSON, each line is its own root element.
    The argument “” in ijson.items() tells the ijson parser to look at each root element.
    The arguments “” and multiple_values=True let the ijson parser know that there
    are multiple JSON root elements in the file, and to fetch one line (each JSON)
    at a time.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ijson，解析过程如下所示。使用标准JSON，我们只有一个根元素，如果是单个JSON，则是一个字典；如果是字典列表，则是一个数组。但使用NDJSON，每一行都是其自己的根元素。ijson.items()中的“”参数告诉ijson解析器查看每个根元素。参数“”和multiple_values=True让ijson解析器知道文件中有多个JSON根元素，并且一次获取一行（每个JSON）。
- en: '[PRE10]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Lastly, we have the dedicated library NDJSON. It basically converts the NDJSON
    format to standard JSON.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们有专门的NDJSON库。它基本上是将NDJSON格式转换为标准JSON。
- en: '[PRE11]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: As you have seen, NDJSON file formats can usually be parsed using stdlib json
    and ijson. For very large payloads, ijson is the best choice as it is memory-efficient.
    But if you are looking to generate NDJSON payloads from other Python objects,
    the NDJSON library is the ideal choice. This is because the function ndjson.dumps()
    automatically converts python objects to NDJSON format without having to iterate
    over these data structures.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，NDJSON文件格式通常可以使用stdlib json和ijson进行解析。对于非常大的有效载荷，ijson是最佳选择，因为它内存高效。但如果你想要从其他Python对象生成NDJSON有效载荷，NDJSON库是理想的选择。这是因为ndjson.dumps()函数会自动将Python对象转换为NDJSON格式，而无需遍历这些数据结构。
- en: Now that we’ve explored NDJSON, let’s pivot back to benchmarking the libraries
    stdlib json, ujson, and orjson.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了NDJSON，让我们回到基准测试stdlib json、ujson和orjson库。
- en: The reason IJSON is not considered for Benchmarking
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我不认为ijson适合用于基准测试
- en: ‘ijson’ being a streaming parser is very different from the bulk parsers that
    we looked at. If we benchmarked ijson along with these bulk parsers, we would
    be comparing apples to oranges. Even if we benchmarked ijson alongside the other
    parsers, we would get the false impression that ijson is the slowest, when in
    fact it serves a different purpose altogether. ijson is optimized for memory efficiency
    and therefore has lower throughput than bulk parsers.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 由于‘ijson’是一个流式解析器，这与我们所查看的批量解析器非常不同。如果我们与这些批量解析器一起基准测试ijson，我们就是在比较苹果和橘子。即使我们与其他解析器一起基准测试ijson，我们也会产生一种错误的印象，即ijson是最慢的，而实际上它完全服务于不同的目的。ijson针对内存效率进行了优化，因此其吞吐量低于批量解析器。
- en: Generating a Synthetic JSON Payload for Benchmarking Purposes
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为基准测试目的生成合成JSON有效载荷
- en: We generate a large synthetic JSON payload having 1 million records, using the
    library ‘mimesis’. This data will be used to benchmark the libraries. The below
    code can be used to create the payload for this benchmarking, if you wish to replicate
    this. The generated file would be between 100 MB and 150 MB in size, which I believe,
    is large enough to conduct tests on benchmarking.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用库‘mimesis’生成一个包含100万条记录的大型合成JSON有效载荷，用于基准测试。这些数据将被用于基准测试。以下代码可以用于创建此基准测试的有效载荷，如果你希望复制此操作。生成的文件大小将在100
    MB到150 MB之间，我认为这足够大，可以用于基准测试。
- en: '[PRE12]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Below is a sample of what the generated data would look like. As you can see,
    the address fields are nested to ensure that the JSON is not just large in size
    but also represents real-world hierarchical JSONs.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是生成数据的示例。如你所见，地址字段是嵌套的，以确保JSON不仅体积大，而且代表真实世界的分层JSON。
- en: '[PRE13]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Let’s start with benchmarking.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从基准测试开始。
- en: Benchmarking Pre-requisites
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基准测试先决条件
- en: We use the read() function to store the JSON file as a string. We then use the
    loads() function in each of the libraries (json, ujson, and orjson) to deserialize
    the JSON string into a Python object. First of all, we create the payload_str
    object from the raw JSON text.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用read()函数将JSON文件存储为字符串。然后，我们使用每个库（json、ujson和orjson）中的loads()函数将JSON字符串反序列化为Python对象。首先，我们从原始JSON文本创建payload_str对象。
- en: '[PRE14]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We then create a benchmarking function with two arguments. The first argument
    is the function that is being tested. In this case, it is the loads() function.
    The second argument is the payload_str constructed from the file above.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了一个带有两个参数的基准测试函数。第一个参数是要测试的函数。在这种情况下，它是loads()函数。第二个参数是从上述文件构建的payload_str。
- en: '[PRE15]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We use the above function to test for both serialization and deserialization
