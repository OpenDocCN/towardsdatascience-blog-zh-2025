- en: Customizing Your Fine-tuning Code Using HuggingFace’s Transformers Library
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 HuggingFace 的 Transformers 库自定义微调代码
- en: 原文：[https://towardsdatascience.com/customizing-your-fine-tuning-code-using-huggingfaces-transformers-library-65cf2aa806ca/](https://towardsdatascience.com/customizing-your-fine-tuning-code-using-huggingfaces-transformers-library-65cf2aa806ca/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/customizing-your-fine-tuning-code-using-huggingfaces-transformers-library-65cf2aa806ca/](https://towardsdatascience.com/customizing-your-fine-tuning-code-using-huggingfaces-transformers-library-65cf2aa806ca/)
- en: '![Image generated by Gemini](../Images/e9fec722de6b88b952d29ec080a579ba.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由 Gemini 生成的图像](../Images/e9fec722de6b88b952d29ec080a579ba.png)'
- en: Image generated by Gemini
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由 Gemini 生成的图像
- en: 'The HuggingFace transformer library offers many basic building blocks and a
    variety of functionality to kickstart your AI code. Many products and libraries
    have been built on top of it and in this short blog, I will talk about some of
    the ways people have extended it to add custom training code on top of the HuggingFace
    transformer’s library:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: HuggingFace 的 transformer 库提供了许多基本构建块和多种功能，以启动您的 AI 代码。许多产品和库都是基于它构建的，在这篇简短的博客中，我将讨论一些人们扩展它以在
    HuggingFace transformer 库之上添加自定义训练代码的方法：
- en: '**Reimplement the training code** by iterating through the training data to
    recreate the fine-tuning loop and then adding in custom code, and'
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新实现训练代码**，通过遍历训练数据来重新创建微调循环，然后添加自定义代码，并且'
- en: '**Creating custom callbacks** tacked onto the _[Trainer](https://huggingface.co/docs/transformers/en/main_classes/trainer)_
    class so that custom code be added to the callbacks.'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建自定义回调**附加到 _[Trainer](https://huggingface.co/docs/transformers/en/main_classes/trainer)_
    类，以便将自定义代码添加到回调中。'
- en: Obviously, there may be other ways to customize the fine-tuning loop, but this
    blog is intended to focus on these two approaches.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，可能还有其他方式来自定义微调循环，但本博客旨在关注这两种方法。
- en: Reimplementing the Training Code for a Custom Fine-tuning Loop
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重新实现用于自定义微调循环的训练代码
- en: 'Typically when you train a model, a _[Trainer](https://huggingface.co/docs/transformers/en/main_classes/trainer)_
    object is created that allows you to specify the parameters for training a model.
    The Trainer object surfaces a *train()* method that you can call that initiates
    the training loop:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 通常在训练模型时，会创建一个 _[Trainer](https://huggingface.co/docs/transformers/en/main_classes/trainer)_
    对象，该对象允许您指定训练模型的参数。Trainer 对象提供了一个 *train()* 方法，您可以通过调用该方法来启动训练循环：
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Instead of calling a Trainer object, some libraries add custom code by 1) reimplementing
    the code in the *train()* function that passes the data to fine-tune the model
    and then 2) adding in custom code at different points of that reimplementation.
    A good example of this is AllenAI’s open-source library for [Data Cartography](https://github.com/allenai/cartography/tree/main).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一些库不是通过调用 Trainer 对象，而是通过以下方式添加自定义代码：1) 在 *train()* 函数中重新实现传递数据以微调模型的代码，然后 2)
    在重新实现的各个点添加自定义代码。一个很好的例子是 AllenAI 的开源库 [Data Cartography](https://github.com/allenai/cartography/tree/main)。
- en: 'In the library, *training dynamics –* the characteristics of the model and
    the training datapoints – are captured after each training epoch during the fine-tuning
    loop. Capturing the training dynamics requires custom [code](https://github.com/allenai/cartography/blob/3df3438fcc7324e706dee2e787426389bbd8fb1a/cartography/classification/run_glue.py#L204-L264)
    within the fine-tuning loop. In the code, an iterator is created that goes through
    each of the training epochs, and for each of the training epochs, the batches
    of the training data are passed to the model for training (the following is a
    condensed, commented version of the [implementation](https://github.com/allenai/cartography/blob/3df3438fcc7324e706dee2e787426389bbd8fb1a/cartography/classification/run_glue.py#L204-L264)):'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '在库中，*训练动态* - 模型和训练数据点的特征 - 在微调循环的每个训练周期后都会被捕获。捕获训练动态需要在微调循环中编写自定义 [代码](https://github.com/allenai/cartography/blob/3df3438fcc7324e706dee2e787426389bbd8fb1a/cartography/classification/run_glue.py#L204-L264)。在代码中，创建了一个迭代器，遍历每个训练周期，并为每个训练周期将训练数据的批次传递给模型进行训练（以下是一个简化和带注释的
    [实现](https://github.com/allenai/cartography/blob/3df3438fcc7324e706dee2e787426389bbd8fb1a/cartography/classification/run_glue.py#L204-L264)
    版本）:'
- en: '[PRE1]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: By reimplementing what is done within the fine-tuning loop, the **basic [parts
    of what the Trainer object](https://github.com/huggingface/trl/blob/v0.13.0/trl/trainer/base.py)
    also does are reimplemented**, including performing a step of training on batches
    of the training data and computing the model’s loss on a batch of data. While
    this approach of customizing your fine-tuning loop gives developers fine-grained
    control over the implementation, this approach also requires a lot of work to
    ensure the code works. The second approach for adding custom code does not require
    reimplementing parts of the Trainer object since it uses *custom callbacks*.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 通过重新实现微调循环内部的操作，**Trainer对象的基本[部分](https://github.com/huggingface/trl/blob/v0.13.0/trl/trainer/base.py)也被重新实现了**，包括在训练数据批次上执行训练步骤和计算模型在数据批次上的损失。虽然这种自定义微调循环的方法让开发者对实现有更精细的控制，但这种方法也需要大量工作来确保代码能够正常工作。第二种添加自定义代码的方法不需要重新实现Trainer对象的部分，因为它使用
    *自定义回调*。
- en: '**Creating Custom Callbacks** to Customize the Trainer Class'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**创建自定义回调**以自定义Trainer类'
- en: A callback is a function passed as an argument to another function. The second
    function can call the passed function at a later time. Callbacks enable you to
    add custom code within the function that you pass to the second function. There
    is a _[TrainerCallback](https://huggingface.co/docs/transformers/v4.47.1/en/main_classes/callback#transformers.TrainerCallback)_
    class that contains [empty callback functions](https://github.com/huggingface/transformers/blob/241c04d36867259cdf11dbb4e9d9a60f9cb65ebc/src/transformers/trainer_callback.py#L260)
    that you can override with your custom code. These callback functions are essentially
    called at different parts of the training loop within the Trainer class (or its
    inherited version of the class such as SFTTrainer, if you are using one).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 回调是一个作为参数传递给另一个函数的函数。第二个函数可以在稍后调用传递的函数。回调允许你在传递给第二个函数的函数中添加自定义代码。有一个名为 _[TrainerCallback](https://huggingface.co/docs/transformers/v4.47.1/en/main_classes/callback#transformers.TrainerCallback)_
    的类，它包含 [空的回调函数](https://github.com/huggingface/transformers/blob/241c04d36867259cdf11dbb4e9d9a60f9cb65ebc/src/transformers/trainer_callback.py#L260)，你可以用你的自定义代码覆盖它们。这些回调函数本质上是在Trainer类（或如果你使用的是SFTTrainer等继承版本，则在其内部）的训练循环的不同部分被调用的。
- en: '[PRE2]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Each of the empty functions passes several arguments (1) *args* of type TrainingArguments,
    (2) *state* of type TrainerState, (3) *control* of type TrainerControl, and (4)
    additional arbitrary arguments that are combined into the *kwargs*** argument.
    These arguments contain objects current to the Trainer class that you can access
    and then add custom code to. More details about these arguments can be found [here](https://huggingface.co/docs/transformers/v4.47.0/en/main_classes/callback#transformers.TrainerCallback).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 每个空函数都传递几个参数（1）*args* 类型为TrainingArguments，(2) *state* 类型为TrainerState，(3) *control*
    类型为TrainerControl，以及（4）组合到 *kwargs*** 参数中的额外任意参数。这些参数包含当前对Trainer类有效的对象，你可以访问它们并添加自定义代码。更多关于这些参数的详细信息可以在
    [这里](https://huggingface.co/docs/transformers/v4.47.0/en/main_classes/callback#transformers.TrainerCallback)
    找到。
- en: For instance, if you want to access the current state of the model after each
    epoch, you would
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你想在每个epoch后访问模型的当前状态，你就可以
- en: Override the _on_epoch*end* function and
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 覆盖 _on_epoch*end* 函数并
- en: Access the model within the _on_epoch*end* function
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 _on_epoch*end* 函数中访问模型
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In the above code, we access the current state of the model after every epoch
    ends using the *kwargs["model"]* line, and then we add some custom code (in this
    case we performance inference on some dataset that we tokenized in the init function
    of the ExampleTrainerCallback class). The nice part about using TrainerCallback
    is we do not have to go into the nitty gritty of reimplementing some of the core
    things done in the Trainer class, including computing loss and passing the batches
    of training data into the model for learning. We preserve all of those things
    using existing code (that other people have tested!) and build on top of the existing
    code with our custom code.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码中，我们使用 *kwargs["model"]* 行在每个epoch结束后访问模型的当前状态，然后添加一些自定义代码（在这种情况下，我们在ExampleTrainerCallback类的init函数中对一些数据集进行tokenization后进行推理）。使用TrainerCallback的好处是，我们不必深入到Trainer类中一些核心操作的重新实现，包括计算损失和将训练数据批次传递到模型中进行学习。我们通过使用现有的代码（其他人已经测试过的代码）来保留所有这些操作，并在现有代码的基础上添加我们的自定义代码。
- en: 'One major thing with custom callbacks is to ensure you also pass it into the
    Trainer object you will use:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义回调的一个主要问题是确保你也将它传递给将要使用的Trainer对象：
- en: '[PRE4]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'To illustrate a concrete example, the [Weights and Biases](https://wandb.ai/site/)
    library has an example TrainerCallback, called the [WandbCallback](https://github.com/huggingface/transformers/blob/v4.47.1/src/transformers/integrations/integration_utils.py#L759),
    that adds custom code during the fine-tuning loop. The WandbCallback logs several
    things such as metrics and model checkpoints throughout the training loop that
    then get sent to Weights and Biases for you to later on do things like visualizing
    your experiments using their tools (the following is a condensed, commented version
    of the [custom callback](https://github.com/huggingface/transformers/blob/v4.47.1/src/transformers/integrations/integration_utils.py#L759)):'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明一个具体的例子，[Weights and Biases](https://wandb.ai/site/)库有一个名为[WandbCallback](https://github.com/huggingface/transformers/blob/v4.47.1/src/transformers/integrations/integration_utils.py#L759)的示例TrainerCallback，它在微调循环期间添加自定义代码。WandbCallback在训练循环中记录了多个事项，例如指标和模型检查点，然后这些信息被发送到Weights
    and Biases，以便你可以稍后使用他们的工具可视化实验（以下是对[自定义回调](https://github.com/huggingface/transformers/blob/v4.47.1/src/transformers/integrations/integration_utils.py#L759)的简化、注释版本）：
- en: '[PRE5]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**Side note:** Weights and Biases sometimes come enabled by default when fine-tuning
    using the TrainingArgument class (which then gets passed to the Trainer class).
    They should be disabled if you are using proprietary data (also depending on your
    organization’s policy):'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**旁注：**在使用TrainingArgument类（随后传递给Trainer类）进行微调时，权重和偏差有时默认启用。如果你使用专有数据（也取决于你所在组织的政策），则应将其禁用：'
- en: '[PRE6]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Conclusion
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This short blog introduces some approaches to customizing your fine-tuning loop
    in the HuggingFace Transformers library. I draw on two different examples from
    existing libraries and code and talk about the benefits and drawbacks of each
    approach. Many other creative approaches should exist, but they are beyond the
    scope of this mini-blog.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇简短的博客介绍了在HuggingFace Transformers库中自定义微调循环的一些方法。我借鉴了现有库和代码中的两个不同示例，并讨论了每种方法的优缺点。应该还存在许多其他创造性的方法，但它们超出了这篇迷你博客的范围。
