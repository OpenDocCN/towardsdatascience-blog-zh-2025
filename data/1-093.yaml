- en: Pro Tips
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级技巧
- en: '***Make sure you explore the problem.**** Ask questions, make sure that there
    are enough questions, to make sure that you collect the right data, big picture,
    and not miss the scale. Not knowing what you are trying to solve or solving a
    wrong problem would reflect badly on you.*'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确保你探索了问题**。提问，确保有足够的问题，以确保你收集了正确的数据，大局观，不要错过规模。不知道你试图解决的问题或解决错误的问题会对你产生不利影响。'
- en: '***Drive the conversation****. If you wait for the interviewer to drive the
    conversation, it simply shows a lack of initiative, and you always want to show
    the opposite. You should be speaking most of the time. *'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推动对话**。如果你等待面试官推动对话，这仅仅显示出缺乏主动性，而你总是想展示相反的一面。你应该大部分时间都在说话。*'
- en: '***Practice drawing****. Prior to the interview, practice drawing a few design
    diagrams on *[*Excalidraw*](https://excalidraw.com/)*. This will make it a bit
    easier during the interview: if you can save a few seconds of figuring out how
    to draw a circle, that’s a few seconds more you can spend on brainstorming.*'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**练习绘图**。在面试之前，练习在[*Excalidraw*](https://excalidraw.com/)上绘制几个设计图。这将使面试时更容易一些：如果你能节省几秒钟来弄清楚如何画圆，那么你就有更多时间用于头脑风暴。'
- en: '***Take notes as you study****. During prep, always take notes about what you’ve
    learned. Don’t just copy-paste, write things in your own words as a way to probe
    your understanding.*'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习时做笔记**。在准备过程中，始终记录你所学的知识。不要只是复制粘贴，用自己的话写下东西，作为一种检验你理解的方式。'
- en: '**Perceiv*e the interviewer as a junior. ****Do not think about the assessor
    as an interviewer, think of them as a junior engineer to whom you are explaining
    how the final pipeline should look.*'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将面试官视为初级工程师**。不要将评估者视为面试官，而应将其视为一个初级工程师，向其解释最终管道应该如何看起来。'
- en: Frequently Asked Questions
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见问题
- en: '***What do I do if I don’t know the answer to the problem?***'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果我不知道问题的答案怎么办？**'
- en: That’s the whole point — the interview is testing your ability to face an unfamiliar
    and ambiguous problem and navigate your way to a solution. Don’t stress if you
    feel like the solution is not coming straight away. Gather the requirements, the
    constraints, and think about the most simple thing that would crack it, and then
    add complexity as you go.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是整个目的——面试是在测试你面对不熟悉和模糊问题的能力，并找到解决问题的方法。如果你觉得解决方案没有立即出现，不要感到紧张。收集需求、约束条件，思考最简单的方法来破解它，然后随着过程的进行逐步增加复杂性。
- en: '***What if I am not familiar with the area?***'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果我不熟悉这个领域怎么办？**'
- en: Interestingly this is more common than not. If you have been specialising in
    generative models and interviewed with Meta, you have most likely been asked about
    ranking in one way or another. While the areas differ, there are still common
    flows for cracking these problems and common machine learning fundamentals to
    build on. While you might not know the area, your experience might bring a fresh
    perspective. There is no right or wrong — the interviewer is interested in your
    thinking process and overall understanding of the machine learning area. However,
    the best way to not fall into this trap is to prepare for the company you are
    interviewing for.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这实际上比不常见的情况要多。如果你一直在专注于生成模型，并且与Meta进行了面试，你很可能以某种方式被问到了排名问题。虽然领域不同，但仍然有一些常见的流程可以破解这些问题，以及一些常见的机器学习基础知识可以在此基础上构建。虽然你可能不了解这个领域，但你的经验可能会带来新的视角。没有对错之分——面试官对你的思维过程和对机器学习领域的整体理解感兴趣。然而，避免陷入这个陷阱的最好方法是为你面试的公司做好准备。
- en: '***What if I am running out of time?***'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果我时间不够怎么办？**'
- en: It does happen very often — after all you’d have a big and unfamiliar problem
    to solve. Some interviewers don’t even expect you to finish and would want you
    to focus on certain parts more than the others. However, generally, if you notice
    that you are falling behind the schedule you have several options. First is to
    ask — one is to ask the interviewer, explicitly say that you see that you are
    running out of time and if they want you to focus on a specific section; another
    one is to summarise what you have already talked about and move on prioritising
    the remaining parts. As obvious as it sounds, the key to not falling into the
    trap is to practice and allocate exact time frames for each section.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实很常见——毕竟你有一个大而陌生的难题要解决。有些面试官甚至不期望你完成，可能更希望你专注于某些部分而不是其他部分。然而，一般来说，如果你注意到你落后于进度，你有几个选择。首先是要询问——一个是询问面试官，明确表示你看到你时间不够了，如果他们希望你专注于特定部分；另一个是总结你已经讨论过的内容，然后优先处理剩余的部分。虽然听起来很明显，但避免陷入困境的关键是练习并为每个部分分配确切的时间框架。
- en: '***What if I have finished earlier?***'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '***如果我提前完成了呢？***'
- en: It’s your chance to cover in more details the sections you feel are important.
    You can also seek help from the interviewer and ask them if they have questions.
    Generally, good things to cover would be corner cases, practical considerations,
    and managing the lifecycle.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你更详细地介绍你认为重要的部分的机会。你也可以向面试官寻求帮助，并询问他们是否有问题。一般来说，应该涵盖的好内容包括边缘情况、实际考虑因素和生命周期管理。
- en: '***What if I get stuck?*** Getting stuck is normal — you are under pressure
    to solve a complex problem that often takes several engineers to solve. The first
    thing is to stop hitting the wall. Second: verbalise this to the interviewer — we
    are all humans and verbalising that you are stuck takes off the stress of pretending
    that you are not, and hence freeing up mental resources. Third: repeat what you
    have gathered and built so far. Fourth: if you feel like you are not moving at
    all, start working on a different part of the pipeline. In any case an experienced
    interviewer would pick up the cues and will guide you out of a dead end.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '***如果我卡住了怎么办？*** 卡住是正常的——你正在压力下解决一个通常需要几个工程师才能解决的问题。首先是要停止撞墙。其次：向面试官口头表达这一点——我们都是人，口头表达你卡住了可以减轻假装你没有卡住的压力，从而释放心理资源。第三：重复你已经收集和构建的内容。第四：如果你感觉一点进展都没有，开始处理管道的不同部分。在任何情况下，经验丰富的面试官都会注意到这些线索，并将引导你走出死胡同。'
- en: '***How do I use the whiteboard?***'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '***我该如何使用白板？***'
- en: 'Most interviews use [excalidraw](http://excalidraw.com/). Make sure to open
    it before the interview and learn the interface — for example, how to put text
    in the shapes and draw arrows. Overall, as you explore the problem, take notes — what
    is the scale of the problem, what are the requirements, etc. Make sure that you
    are not typing all your answers word by word — it’s too time-consuming, but that
    the notes are self-sufficient, as interviewers might go back to these notes when
    writing feedback. Overall, notes are important because they also help you structure
    your response. One thing that you could do is to explicitly outline all the sections
    that you are planning to cover, making it easier for you to follow through. Ask
    the interviewer what they would prefer: notes or drawing when it gets to the design
    part. For the drawing part, you might want to make sure that you are focusing
    on the big picture first — drawing large dependencies and the flow, and jumping
    into details only if necessary.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数面试都使用 [excalidraw](http://excalidraw.com/)。确保在面试前打开它并学习界面——例如，如何将文本放入形状中并绘制箭头。总的来说，当你探索问题时，做好笔记——问题的规模是什么，有哪些要求等。确保你不是逐字逐句地打字回答——这太耗时了，但笔记应该是自给自足的，因为面试官可能会在写反馈时回顾这些笔记。总的来说，笔记很重要，因为它们也有助于你组织回答。你可以做的一件事是明确列出你计划涵盖的所有部分，这样你更容易跟进。询问面试官他们更喜欢笔记还是设计部分的绘图。对于绘图部分，你可能想确保你首先关注大局——绘制大的依赖关系和流程，只有在必要时才深入细节。
- en: Summary
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In the end, mastering ML design interviews isn’t about memorizing patterns — it’s
    about developing structured thinking, curiosity, and the ability to connect business
    goals with technical solutions. Every interview is a rehearsal for real-world
    engineering, where trade-offs, ambiguity, and communication matter as much as
    the model itself.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，掌握机器学习设计面试并不是关于记忆模式——它是关于培养结构化思维、好奇心以及将业务目标与技术解决方案联系起来的能力。每一次面试都是为现实世界中的工程实践进行排练，其中权衡、模糊性和沟通的重要性不亚于模型本身。
- en: 'To turn preparation into progress, start small: pick one design question from
    the list above, time-box 40 minutes, and talk through your solution out loud.
    Then review what went well and what felt unclear — that reflection loop is where
    real improvement happens. Build a habit of doing one mock interview a week, refine
    your frameworks, and share your learnings with others.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 要将准备转化为进步，从小处着手：从上面的列表中选择一个问题，设定40分钟的时间限制，大声说出你的解决方案。然后回顾哪些做得好，哪些感觉不清楚——那个反思循环正是真正改进发生的地方。养成每周进行一次模拟面试的习惯，完善你的框架，并与他人分享你的学习成果。
- en: 'Over time, your answers will sound less rehearsed and more like what they truly
    test for: practical, confident, system-level thinking. You’ve got it!'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，你的回答将听起来不那么像排练，更像真正测试的内容：实用、自信、系统化思考。你已经做到了！
