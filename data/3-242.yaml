- en: Learning How to Play Atari Games Through Deep Neural Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过深度神经网络学习如何玩Atari游戏
- en: 原文：[https://towardsdatascience.com/learning-how-to-play-atari-games-through-deep-neural-networks/](https://towardsdatascience.com/learning-how-to-play-atari-games-through-deep-neural-networks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/learning-how-to-play-atari-games-through-deep-neural-networks/](https://towardsdatascience.com/learning-how-to-play-atari-games-through-deep-neural-networks/)
- en: In July 1959, Arthur Samuel developed one of the first *agents* to play the
    game of checkers. What constitutes an agent that plays checkers can be best described
    in Samuel’s own words, “…a computer [that] can be programmed so that it will learn
    to play a better game of checkers than can be played by the person who wrote the
    program” [1]. The checkers’ agent tries to follow the idea of simulating every
    possible move **given the current situation** and selecting the most *advantageous*
    one i.e. one that brings the player closer to winning. The move’s “advantageousness*”*
    is determined by an evaluation function, which the agent improves through experience.
    Naturally, the concept of an agent is not restricted to the game of checkers,
    and many practitioners have sought to match or surpass human performance in popular
    games. Notable examples include IBM’s *Deep Blue* (which managed to defeat Garry
    Kasparov, a chess world champion at the time), and Tesauro’s *TD-Gammon,* a **temporal-difference**
    approach, where the evaluation function was modelled using a neural network. In
    fact, *TD-Gammon*’s playing style was so uncommon that some experts even adopted
    some strategies it conjured up [2].
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 1959年7月，Arthur Samuel开发了一个最早的玩跳棋的**智能体**。一个能够玩跳棋的智能体的构成可以用Samuel自己的话来最好地描述，即“一台计算机，可以被编程以学会玩比编写程序的人更好的跳棋”
    [1]。跳棋智能体试图遵循模拟所有可能移动的**当前情况**并选择最**有利**的一个，即最接近获胜的移动。移动的“有利性”由一个评估函数决定，智能体通过经验来改进这个评估函数。自然地，智能体的概念并不局限于跳棋游戏，许多从业者都试图在流行的游戏中达到或超越人类的表现。值得注意的例子包括IBM的**Deep
    Blue**（当时成功击败了世界象棋冠军Garry Kasparov），以及Tesauro的**TD-Gammon**，这是一种**时间差分**方法，其中评估函数使用神经网络进行建模。事实上，**TD-Gammon**的玩法如此罕见，以至于一些专家甚至采用了它所提出的某些策略
    [2]。
- en: 'Unsurprisingly, research into creating such ‘agents’ only skyrocketed, with
    novel approaches able to reach peak human performance in complex games. In this
    post, we explore one such approach: the **DQN** approach introduced in 2013 by
    Mnih et al, in which playing Atari games is approached through a synthesis of
    **Deep Neural Networks** and **TD-Learning** (**NB:** the original paper came
    out in 2013, but we will focus on the 2015 version which comes with some technical
    improvements) [3, 4]. Before we continue, you should note that in the ever-expanding
    space of new approaches, DQN has been superseded by faster and more refined state-of-the-art
    methods. Yet, it remains an ideal stepping stone in the field of **Deep Reinforcement
    Learning**, widely recognized for combining deep learning with reinforcement learning.
    Hence, readers aiming to dive into Deep-RL are encouraged to begin with DQN.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 毫不奇怪，对创建这种“智能体”的研究仅是飞速增长，新颖的方法能够在复杂的游戏中达到人类巅峰表现。在这篇文章中，我们将探讨其中一种方法：2013年由Mnih等人提出的**DQN**方法，该方法通过**深度神经网络**和**TD-Learning**的融合来玩Atari游戏（**注意**：原始论文于2013年发表，但我们将关注2015年的版本，它包含一些技术改进）[3,
    4]。在我们继续之前，你应该注意，在不断扩大的新方法空间中，DQN已经被更快、更精细的先进方法所取代。然而，它仍然是**深度强化学习**领域的一个理想的垫脚石，深度学习与强化学习的结合得到了广泛的认可。因此，那些想要深入研究深度强化学习（Deep-RL）的读者被鼓励从DQN开始。
- en: 'This post is sectioned as follows: first, I define the problem with playing
    Atari games and explain why some traditional methods can be intractable. Finally,
    I present the specifics of the DQN approach and dive into the technical implementation.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文分为以下几部分：首先，我定义了玩Atari游戏的问题，并解释了为什么一些传统方法可能难以处理。最后，我将详细介绍DQN方法的具体内容，并深入探讨其技术实现。
- en: The Problem At Hand
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当前的问题
- en: '*For the remainder of the post, I’ll assume that you know the basics of supervised
    learning, neural networks (basic* [*FFNs*](https://d2l.ai/chapter_multilayer-perceptrons/index.html)
    *and* [*CNNs*](https://d2l.ai/chapter_convolutional-neural-networks/)*) and also
    basic reinforcement learning concepts (Bellman equations, TD-learning, Q-learning
    etc) If some of these RL concepts are foreign to you, then this* [*playlist*](https://www.youtube.com/watch?v=NFo9v_yKQXA&list=PLzvYlJMoZ02Dxtwe-MmH4nOB5jYlMGBjr&ab_channel=MutualInformation)
    *is a good introduction.*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的剩余部分，我将假设您已经了解了监督学习、神经网络（基本[*FFNs*](https://d2l.ai/chapter_multilayer-perceptrons/index.html)和[*CNNs*](https://d2l.ai/chapter_convolutional-neural-networks/)）以及基本的强化学习概念（贝尔曼方程、TD学习、Q学习等）。如果您对其中的一些强化学习概念感到陌生，那么这个[*播放列表*](https://www.youtube.com/watch?v=NFo9v_yKQXA&list=PLzvYlJMoZ02Dxtwe-MmH4nOB5jYlMGBjr&ab_channel=MutualInformation)是一个很好的介绍。
- en: '![](../Images/cedb36f984cb85aa2ef98aa752a8b60f.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cedb36f984cb85aa2ef98aa752a8b60f.png)'
- en: 'Figure 2: Pong as shown in the ALE environment. [All media hereafter is created
    by the author unless otherwise noted]'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：在ALE环境中显示的乒乓。[以下所有媒体均由作者创建，除非另有说明]
- en: '*Atari* is a nostalgia-laden term, featuring iconic games such as *Pong, Breakout,
    Asteroids* and many more. In this post, we restrict ourselves to Pong. Pong is
    a 2-player game, where each player controls a paddle and can use said paddle to
    hit the incoming ball. Points are scored when the opponent is unable to return
    the ball, in other words, the ball goes past them. A player wins when they reach
    21 points.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*Atari*是一个充满怀旧感的术语，包括像*乒乓、Breakout、Asteroids*等标志性游戏以及更多。在这篇文章中，我们将限制自己只讨论乒乓。乒乓是一款两人游戏，每位玩家控制一个拍子，可以使用这个拍子来击打
    incoming 球。当对手无法回球时，即球越过他们时，得一分。当玩家达到21分时，他们获胜。'
- en: 'Considering the sequential nature of the game, it might be appropriate to frame
    the problem as an RL problem, and then apply one of the solution methods. We can
    frame the game as an MDP:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到游戏的顺序性，将问题表述为强化学习问题并应用解决方案之一可能是合适的。我们可以将游戏表述为马尔可夫决策过程（MDP）：
- en: '![](../Images/127b6e48de7ea1229ab1c787bed3137f.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/127b6e48de7ea1229ab1c787bed3137f.png)'
- en: The states would represent the current game state (where the ball or player
    paddle is etc, analogous to the idea of a search state). The rewards encapsulate
    our idea of winning and the actions correspond to the buttons on the Atari 2600
    console. Our goal now becomes finding a policy
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 状态将代表当前游戏状态（球或玩家拍子的位置等，类似于搜索状态的概念）。奖励封装了我们的获胜想法，而动作对应于Atari 2600控制台上的按钮。我们的目标现在变成了找到一种策略
- en: '![](../Images/f4ce914c50b31f2abb1a23075c90a9eb.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f4ce914c50b31f2abb1a23075c90a9eb.png)'
- en: also known as the *optimal policy*. Let’s see what might happen if we try to
    train an agent using some classical RL algorithms.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 也称为*最优策略*。让我们看看如果我们尝试使用一些经典的强化学习算法来训练一个智能体，可能会发生什么。
- en: A straightforward solution might entail solving the problem using a tabular
    approach. We could enumerate all states (and actions) and associate each state
    with a corresponding state or state-action value. We could then apply one of the
    classical RL methods (Monte-Carlo, TD-Learning, Value Iteration etc), taking a
    dynamic programming approach. However, employing this approach faces large pitfalls
    rather quickly. What do we consider as states? How many states do we have to enumerate?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一个直接的方法可能是使用表格方法来解决问题。我们可以列举所有状态（和动作），并将每个状态与相应的状态或状态-动作值相关联。然后我们可以应用经典强化学习方法之一（蒙特卡洛、TD学习、值迭代等），采用动态规划方法。然而，采用这种方法很快就会面临巨大的陷阱。我们将什么视为状态？我们需要列举多少个状态？
- en: It quickly becomes quite difficult to answer these questions. Defining a state
    becomes difficult as many elements are in play when considering the idea of a
    state (i.e. the states need to be Markovian, encapsulate a search state etc).
    What about visual output (frames) to represent a state? After all this is how
    we as humans interact with Atari games. We see frames, deduce information regarding
    the game state and then choose the appropriate action. However, there are impossibly
    many states when using this representation, which would make our tabular approach
    quite intractable, memory-wise.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 很快就会变得非常难以回答这些问题。定义状态变得困难，因为在考虑状态的概念时，有很多元素在起作用（即，状态需要是马尔可夫的，封装搜索状态等）。那么，用视觉输出（帧）来表示状态怎么办？毕竟这是我们作为人类与Atari游戏互动的方式。我们看到帧，推断有关游戏状态的信息，然后选择适当的动作。然而，使用这种表示方法时，状态的数量是难以想象的，这将使我们的表格方法在内存上变得难以处理。
- en: Now for the sake of argument imagine that we have enough memory to hold a table
    of this size. Even then we would need to explore all the states a good number
    of times to get good approximations of the value function. We would need to *explore*
    all possible states (or state-action) enough times to arrive at a useful value.
    Herein lies the runtime hurdle; it would be quite infeasible for the values to
    converge for all the states in the table in a reasonable amount of time as we
    have infinite states.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在为了辩论的目的，假设我们有足够的内存来存储这个大小的表格。即使如此，我们仍然需要多次探索所有状态以获得价值函数的良好近似。我们需要足够地探索所有可能的状态（或状态-动作）以获得有用的价值。这就是运行时障碍；由于我们有无限的状态，要在合理的时间内使表格中所有状态的价值收敛几乎是不可能的。
- en: Perhaps instead of framing it as a reinforcement learning problem, can we instead
    rephrase it into a supervised learning problem? Perhaps a formulation in which
    the states are samples and the labels are the actions performed. Even this perspective
    brings forth new problems. Atari games are inherently sequential, each state is
    sampled based on the previous. This breaks the i.i.d assumptions applied in supervised
    learning, negatively affecting supervised learning-based solutions. Similarly,
    we would need to create a hand-labelled dataset, perhaps employing a human expert
    to hand label actions for each frame. This would be expensive and laborious, and
    still might yield insufficient results.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 也许我们可以将其重新表述为一个监督学习问题，而不是强化学习问题？也许是一种状态为样本、标签为执行的动作的表述。即使这种观点也带来了新的问题。Atari游戏本质上是序列的，每个状态都是基于前一个状态采样的。这打破了监督学习中应用的独立同分布（i.i.d）假设，对基于监督学习的解决方案产生了负面影响。同样，我们可能需要创建一个手工标注的数据集，可能需要雇佣一个人类专家为每个帧标注动作。这将既昂贵又费时，而且可能仍然产生不充分的结果。
- en: Solely relying on either supervised learning or RL may lead to inefficient learning,
    whether due to computational constraints or suboptimal policies. This calls for
    a more efficient approach to solving Atari games.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 单独依赖监督学习或强化学习可能会导致学习效率低下，无论是由于计算限制还是次优策略。这要求我们采取更有效的方法来解决Atari游戏。
- en: 'DQN: Intuition & Implementation'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DQN：直觉与实现
- en: '*I assume you have some basic knowledge of PyTorch, Numpy and Python, though
    I’ll try to be as articulate as possible. For those unfamiliar, I recommend consulting:*
    [*pytorch*](https://pytorch.org/tutorials/beginner/deep_learning_60min_blitz.html)
    *&* [*numpy*](https://numpy.org/devdocs/user/absolute_beginners.html)*. *'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*我假设您对PyTorch、Numpy和Python有一些基本了解，尽管我会尽量表达得尽可能清晰。对于那些不熟悉这些的人，我建议查阅：[*pytorch*](https://pytorch.org/tutorials/beginner/deep_learning_60min_blitz.html)
    和 [*numpy*](https://numpy.org/devdocs/user/absolute_beginners.html)。*'
- en: Deep-Q Networks aim to overcome the aforementioned barriers through a variety
    of techniques. Let’s go through each of the problems step-by-step and address
    how DQN mitigates or solves these challenges.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 深度Q网络（Deep-Q Networks）旨在通过各种技术克服上述障碍。让我们一步步分析每个问题，并探讨DQN如何缓解或解决这些挑战。
- en: It’s quite hard to come up with a formal state definition for Atari games due
    to their diversity. DQN is designed to work for most Atari games, and as a result,
    we need a stated formalization that is compatible with said games. To this end,
    the visual representation (pixel values) of the games at any given moment are
    used to fashion a state. Naturally, this entails a continuous state space. This
    connects to our previous discussion on potential ways to represent states.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Atari游戏的多样性，很难为它们提供一个正式的状态定义。DQN被设计为适用于大多数Atari游戏，因此我们需要一个与这些游戏兼容的正式化表述。为此，任何给定时刻游戏的视觉表示（像素值）被用来构建状态。自然地，这涉及到一个连续的状态空间。这与我们之前讨论的表示状态的可能方法相联系。
- en: '![](../Images/81d752f3a7fd85cc8631fc737d09528d.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/81d752f3a7fd85cc8631fc737d09528d.png)'
- en: 'Figure 3: The function approximation visualized. Image from [3].'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：函数逼近的可视化。图片来自[3]。
- en: The challenge of continuous states is solved through *function approximation.*
    Function approximation (FA) aims to approximate the state-action value function
    directly using a function approximation. Let’s go through the steps to understand
    what the FA does.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 连续状态的挑战通过 *函数逼近* 解决。函数逼近（FA）旨在直接使用函数逼近来近似状态-动作价值函数。让我们通过步骤来了解FA做了什么。
- en: 'Imagine that we have a network that given a state outputs the value of being
    in said state and performing a certain action. We then select actions based on
    the highest reward. However, this network would be short-sighted, only taking
    into account one timestep. Can we incorporate possible rewards from further down
    the line? Yes we can! This is the idea of the *expected return*. From this view,
    the FA becomes quite simple to understand; we aim to find a function:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，我们有一个网络，给定一个状态，输出处于该状态并执行特定动作的价值。然后我们根据最高的奖励选择动作。然而，这个网络是短视的，只考虑了一个时间步。我们能否结合未来可能的奖励？是的，我们可以！这就是期望回报的概念。从这个角度来看，FA变得相当容易理解；我们的目标是找到一个函数：
- en: '![](../Images/828b976ebc3395781cbd3581a2d2a6a6.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/828b976ebc3395781cbd3581a2d2a6a6.png)'
- en: In other words, a function which outputs the expected return of being in a given
    state after performing an action*. *
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，一个输出在执行动作后处于给定状态的期望回报的函数**。**
- en: This idea of approximation becomes crucial due to the continuous nature of the
    state space. By using a FA, we can exploit the idea of generalization. States
    close to each other (similar pixel values) will have similar Q-values, meaning
    that we don’t need to cover the entire (infinite) state space, greatly lowering
    our computational overhead.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 由于状态空间是连续的，这种近似的思想变得至关重要。通过使用FA（函数近似），我们可以利用泛化的思想。相邻的状态（相似的像素值）将具有相似的价值函数（Q-values），这意味着我们不需要覆盖整个（无限的）状态空间，从而大大降低我们的计算开销。
- en: DQN employs FA in tandem with *Q-learning.* As a small refresher, Q-learning
    aims to find the expected return for being in a state and performing a certain
    action using *bootstrapping*. Bootstrapping models the expected return that we
    mentioned using the current Q-function. This ensures that we don’t need to wait
    till the end of an episode to update our Q-function. Q-learning is also *0ff-policy*,
    which means that the data we use to learn the Q-function is different from the
    actual policy being learned. The resulting *Q-function* then corresponds to the
    optimal Q-function and can be used to find the optimal policy (just find the action
    that maximizes the Q-value in a given state). Moreover, Q-learning is a *model-free*
    solution, meaning that we don’t need to know the dynamics of the environment (transition
    functions etc) to learn an optimal policy, unlike in value iteration. Thus, DQN
    is also off-policy and model-free.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: DQN结合了Q-learning使用FA。作为一个小的复习，Q-learning旨在使用自举（bootstrapping）找到处于某个状态并执行特定动作的期望回报。自举使用当前的Q函数来模拟我们之前提到的期望回报。这确保了我们在一个剧集结束时不需要等待来更新我们的Q函数。Q-learning也是**离线策略**，这意味着我们用来学习Q函数的数据与实际学习策略的数据不同。结果得到的**Q函数**对应于最优Q函数，可以用来找到最优策略（只需找到在给定状态下最大化Q值的动作）。此外，Q-learning是一个**无模型**的解决方案，这意味着我们不需要知道环境的动态（转移函数等）来学习最优策略，这与价值迭代不同。因此，DQN也是离线策略和无模型的。
- en: By using a neural network as our approximator, we need not construct a full
    table containing all the states and their respective Q-values. Our neural network
    will output the Q-value for being a given state and performing a certain action.
    From this point on, we refer to the approximator as the Q-network.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用神经网络作为我们的近似器，我们不需要构建一个包含所有状态及其相应Q值的完整表。我们的神经网络将输出给定状态和执行特定动作的Q值。从这一点开始，我们将近似器称为Q网络。
- en: '![](../Images/0efa455628dbaf37863b0c33b5226b03.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0efa455628dbaf37863b0c33b5226b03.png)'
- en: 'Figure 4: DQN architecture. Note that the last layer must equal the number
    of possible actions for the given game, in the case of Pong this is 6.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：DQN架构。注意，最后一层必须等于给定游戏的可能动作数，在Pong的情况下是6。
- en: 'Since our states are defined by images, using a basic feed-forward network
    (FFN) would incur a large computational overhead. For this specific reason, we
    employ the use of a convolutional network, which is much better able to learn
    the distinct features of each state. The CNNs are able to distill the images down
    to a representation (this is the idea of representation learning), which is then
    fed to a FFN. The neural network architecture can be seen above. Instead of returning
    one value for:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的状态由图像定义，使用基本的正向传播网络（FFN）将产生巨大的计算开销。出于这个特定的原因，我们采用了卷积网络，它能够更好地学习每个状态的独特特征。CNNs能够将图像提炼成一个表示（这就是表示学习），然后将其输入到FFN。神经网络架构如上图所示。而不是返回一个值：
- en: '![](../Images/0204715717b888047c269147189b6448.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0204715717b888047c269147189b6448.png)'
- en: we return an array with each value corresponding to a possible action in the
    given state (for Pong we can perform 6 actions, so we return 6 values).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们返回一个数组，每个值对应于给定状态中可能采取的一个动作（对于Pong，我们可以执行6个动作，因此返回6个值）。
- en: '![](../Images/18d23f208fc2a87c3cd0989e8ee42375.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/18d23f208fc2a87c3cd0989e8ee42375.png)'
- en: 'Figure 5: MSE loss function, often used for regression tasks.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：MSE损失函数，常用于回归任务。
- en: 'Recall that to train a neural network we need to define a loss function that
    captures our goals. DQN uses the MSE loss function. For the predicted values we
    the output of our Q-network. For the true values, we use the bootstrapped values.
    Hence, our loss function becomes the following:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，为了训练一个神经网络，我们需要定义一个能够捕捉我们目标的损失函数。DQN使用均方误差（MSE）损失函数。对于预测值，我们使用Q网络的输出。对于真实值，我们使用自举值。因此，我们的损失函数变为以下形式：
- en: '![](../Images/967d123d6c834b022fe73bd2ac67ddeb.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/967d123d6c834b022fe73bd2ac67ddeb.png)'
- en: If we differentiate the loss function with respect to the weights we arrive
    at the following equation.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们对损失函数相对于权重的导数进行微分，我们得到以下方程。
- en: '![](../Images/f043e3fe0ba2448d177200f0609bc2d8.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f043e3fe0ba2448d177200f0609bc2d8.png)'
- en: Plugging this into the stochastic gradient descent (SGD) equation, we arrive
    at Q-learning[4].
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 将其代入随机梯度下降（SGD）方程中，我们得到Q-learning[4]。
- en: By performing SGD updates using the MSE loss function, we perform Q-learning.
    However, this is an approximation of Q-learning, as we don’t update on a single
    move but instead on a batch of moves. The expectation is simplified for expedience,
    though the message remains the same.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用MSE损失函数执行SGD更新，我们执行Q-learning。然而，这只是一个Q-learning的近似，因为我们不是在单一步骤上更新，而是在一批步骤上更新。虽然期望值被简化以方便起见，但信息保持不变。
- en: From another perspective, you can also think of the MSE loss function as nudging
    the predicted Q-values as close to the bootstrapped Q-values (after all this is
    what the MSE loss intends). This inadvertently mimics Q-learning, and slowly converges
    to the optimal Q-function.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 从另一个角度来看，你也可以将MSE损失函数视为将预测的Q值推向自举Q值（毕竟这是MSE损失的目的）。这无意中模仿了Q-learning，并逐渐收敛到最优Q函数。
- en: By employing a function approximator, we become subject to the conditions of
    supervised learning, namely that the data is i.i.d. But in the case of Atari games
    (or MDPs) this condition is often not upheld. Samples from the environment are
    sequential in nature, making them dependent on each other. Similarly, as the agent
    improves the value function and updates its policy, the distribution from which
    we sample also changes, violating the condition of sampling from an identical
    distribution.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用函数逼近器，我们受到监督学习条件的约束，即数据是独立同分布的。但在Atari游戏（或MDP）的情况下，这个条件通常不成立。环境中的样本在本质上是有序的，这使得它们相互依赖。同样，随着智能体改进价值函数并更新其策略，我们从中抽取的分布也会发生变化，违反了从相同分布中抽取样本的条件。
- en: To solve this the authors of DQN capitalize on the idea of an *experience replay*.
    This concept is core to keep the training of DQN stable and convergent. An experience
    replay is a buffer which stores the tuple *(s, a, r, s’, d)* where *s, a, r, s’*
    are returned after performing an action in an MDP, and *d* is a boolean representing
    whether the episode has finished or not. The replay has a maximum capacity which
    is defined beforehand. It might be simpler to think of the replay as a queue or
    a FIFO data structure; old samples are removed to make room for new samples. The
    experience replay is used to sample a random batch of tuples which are then used
    for training.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，DQN的作者们利用了“经验回放”这一想法。这个概念对于保持DQN的训练稳定和收敛至关重要。经验回放是一个缓冲区，它存储了元组 *(s,
    a, r, s’，d)*，其中 *s, a, r, s’* 是在MDP中执行动作后返回的，而 *d* 是一个布尔值，表示游戏是否结束。回放有一个事先定义的最大容量。可能更容易将回放想象成一个队列或FIFO数据结构；为了为新样本腾出空间，会移除旧样本。经验回放用于随机抽取一批元组，然后用于训练。
- en: The experience replay helps with the alleviation of two major challenges when
    using neural network function approximators with RL problems. The first deals
    with the independence of the samples. By **randomly** sampling a batch of moves
    and then using those for training we decouple the training process from the sequential
    nature of Atari games. Each batch may have actions from different timesteps (or
    even different episodes), giving a stronger semblance of independence.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 经验回放有助于缓解在使用强化学习问题中的神经网络函数逼近器时遇到的两个主要挑战。第一个挑战是样本的独立性。通过**随机**抽取一批动作并使用这些动作进行训练，我们使训练过程与Atari游戏的顺序性解耦。每个批次可能包含来自不同时间步（甚至不同剧集）的动作，从而增强了独立性的外观。
- en: Secondly, the experience replay addresses the issue of non-stationarity. As
    the agent learns, changes in its behaviour are reflected in the data. This is
    the idea of *non-stationarity;* the distribution of data changes over time. By
    reusing samples in the replay and using a FIFO structure, we limit the adverse
    effects of non-stationarity on training. The distribution of the data still changes,
    but slowly and its effects are less impactful. Since Q-learning is an off-policy
    algorithm, we still end up learning the optimal policy, making this a viable solution.
    These changes allow for a more stable training procedure.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，经验回放解决了非平稳性问题。随着代理的学习，其行为的变化会反映在数据中。这就是非平稳性的概念；数据分布随时间变化。通过在回放中重复使用样本并使用FIFO结构，我们限制了非平稳性对训练的负面影响。数据的分布仍然会变化，但变化缓慢，其影响较小。由于Q学习是一个离策略算法，我们最终仍然学习到最优策略，这使得这是一个可行的解决方案。这些变化使得训练过程更加稳定。
- en: As a serendipitous side effect, the experience replay also allows for better
    data efficiency. Before training examples were discarded after being used for
    a single update step. However, through the use of an experience replay, we can
    reuse moves that we have made in the past for updates.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一种意外的副作用，经验回放还允许提高数据效率。在训练之前，示例在用于单个更新步骤后被丢弃。然而，通过使用经验回放，我们可以重复使用过去为更新所做的动作。
- en: A change made in the 2015 Nature version of DQN was the introduction of a target
    network. Neural networks are fickle; slight changes in the weights can introduce
    drastic changes in the output. This is unfavourable for us, as we use the outputs
    of the Q-network to bootstrap our targets. If the targets are prone to large changes,
    it will destabilize training, which naturally we want to avoid. To alleviate this
    issue, the authors introduce a *target network*, which copies the weights of the
    Q-network every set amount of timesteps. By using the target network for bootstrapping,
    our bootstrapped targets are less unstable, making training more efficient.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 2015年Nature版DQN所做的更改是引入了目标网络。神经网络是易变的；权重的微小变化可能会引起输出的大幅变化。这对我们来说是不利的，因为我们使用Q网络的输出作为目标的自举。如果目标是易变的，它将使训练不稳定，这是我们自然想要避免的。为了减轻这个问题，作者们引入了一个**目标网络**，该网络每隔一定时间步复制Q网络的权重。通过使用目标网络进行自举，我们的自举目标更加稳定，从而使训练更加高效。
- en: Lastly, the DQN authors stack four consecutive frames after executing an action.
    This remark is made to ensure the Markovian property holds [9]. A singular frame
    omits many details of the game state such as the velocity and direction of the
    ball. A stacked representation is able to overcome these obstacles, providing
    a holistic view of the game at any given timestep.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，DQN的作者们在执行动作后堆叠了四个连续的帧。这个评论是为了确保马尔可夫性质成立[9]。单个帧忽略了游戏状态中的许多细节，例如球的速率和方向。堆叠表示能够克服这些障碍，在任何给定时间步提供游戏的整体视图。
- en: With this, we have covered most of the major techniques used for training a
    DQN agent. Let’s go over the training procedure. The procedure will be more of
    an overview, and we’ll iron out the details in the implementation section.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种方式，我们已经涵盖了用于训练DQN代理的大多数主要技术。让我们回顾一下训练过程。这个过程将更多地是一个概述，我们将在实现部分详细说明。
- en: '![](../Images/69ba01f335e41eea33d959a74997e393.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69ba01f335e41eea33d959a74997e393.png)'
- en: 'Figure 6: Training procedure to train a DQN agent.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：训练DQN代理的训练过程。
- en: One important clarification arises from step 2\. In this step, we perform a
    process called ε-greedy action selection. In ε-greedy, we randomly choose an action
    with probability ε, and otherwise choose the best possible action (according to
    our learned Q-network). Choosing an appropriate ε allows for the sufficient exploration
    of actions which is crucial to converge to a reliable Q-function. We often start
    with a high ε and slowly decay this value over time.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步出现了一个重要的澄清。在这个步骤中，我们执行了一个称为ε-greedy动作选择的过程。在ε-greedy中，我们以概率ε随机选择一个动作，否则选择最佳可能的动作（根据我们学习的Q网络）。选择适当的ε可以允许对动作进行足够的探索，这对于收敛到可靠的Q函数至关重要。我们通常从高ε开始，并随着时间的推移逐渐衰减这个值。
- en: Implementation
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现
- en: If you want to follow along with my implementation of DQN then you will need
    the following libraries (apart from Numpy and PyTorch). I provide a concise explanation
    of their use.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要跟随我的DQN实现过程，你需要以下库（除了Numpy和PyTorch）。我提供了它们用途的简要说明。
- en: '[**Arcade Learning Environment**](https://ale.farama.org/index.html) → ALE
    is a framework that allows us to interact with Atari 2600 environments. Technically
    we interface ALE through [gymnasium](https://gymnasium.farama.org/), an API for
    RL environments and benchmarking.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Arcade Learning Environment**](https://ale.farama.org/index.html) → ALE是一个允许我们与Atari
    2600环境交互的框架。技术上，我们通过[gymnasium](https://gymnasium.farama.org/)与ALE接口，这是一个用于RL环境和基准测试的API。'
- en: '[**StableBaselines3**](https://stable-baselines3.readthedocs.io/en/master/)
    → SB3 is a deep reinforcement learning framework with a backend designed in Pytorch.
    We will only need this for some preprocessing wrappers.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**StableBaselines3**](https://stable-baselines3.readthedocs.io/en/master/)
    → SB3是一个后端由Pytorch设计的深度强化学习框架。我们只需要这个框架的一些预处理包装器。'
- en: Let’s import all of the necessary libraries.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们导入所有必要的库。
- en: '[PRE0]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'First, we construct an environment, using the ALE framework. Since we are working
    with pong we create an environment with the name `PongNoFrameskip-v4`. With this,
    we can create an environment using the following code:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们使用ALE框架构建一个环境。由于我们正在处理pong，我们创建了一个名为`PongNoFrameskip-v4`的环境。这样，我们可以使用以下代码创建一个环境：
- en: '[PRE1]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The `rgb_array` parameter tells ALE to return pixel values instead of RAM codes
    (which is the default). The code to interact with the Atari becomes extremely
    simple with `gym`. The following excerpt encapsulates most of the utilities that
    we will need from `gym`.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '`rgb_array`参数告诉ALE返回像素值而不是RAM代码（这是默认值）。使用`gym`，与Atari的交互变得极其简单。以下摘录封装了我们将从`gym`中需要的绝大多数实用工具。'
- en: '[PRE2]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: With this, we are given states (we name them observations) with the shape (210,
    160, 3). Hence the states are RGB images with the shape 210×160\. An example can
    be seen in Figure 2\. When training our DQN agent, an image of this size adds
    unnecessary computational overhead. A similar observation can be made about the
    fact that the frames are RGB (3 channels).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这个，我们得到了形状为（210，160，3）的状态（我们称之为观测）。因此，状态是210×160的RGB图像。一个例子可以在图2中看到。在训练我们的DQN代理时，这个大小的图像会增加不必要的计算开销。对于帧是RGB（3通道）的事实，也可以得出类似的观察。
- en: To solve this, we downsample the frame down to 84×84 and transform it into grayscale.
    We can do this by employing a wrapper from SB3, which does this for us. Now every
    time we perform an action our output will be in grayscale (with 1 channel) and
    of size 84×84.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们将帧下采样到84×84，并将其转换为灰度。我们可以通过使用SB3的包装器来完成这个操作，它会为我们做这件事。现在，每次我们执行一个动作，我们的输出都将是在灰度（1通道）下，大小为84×84。
- en: '[PRE3]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The wrapper above does more than downsample and turn our frame into grayscale.
    Let’s go over some other changes the wrapper introduces.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的包装器除了下采样并将我们的帧转换为灰度之外，还引入了一些其他的变化。
- en: '**Noop Reset** → The start state of each Atari game is deterministic, i.e.
    you start at the same state each time the game ends. With this the agent may learn
    to memorize a sequence of actions from the starting state, resulting in a sub-optimal
    policy. To prevent this, we perform no actions for a set amount of timesteps in
    the beginning.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Noop Reset** → 每个Atari游戏的起始状态是确定的，即每次游戏结束时，你都会从相同的状态开始。因此，代理可能会学会记住从起始状态的一系列动作，从而导致次优策略。为了防止这种情况，我们在开始时进行一定数量的时间步长的不动作。'
- en: '**Frame Skipping** → In the ALE environment each frame needs an action. Instead
    of choosing an action at each frame, we select an action and repeat it for a set
    number of timesteps. This is the idea of frame skipping and allows for smoother
    transitions.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**帧跳过** → 在ALE环境中，每个帧都需要一个动作。我们不是在每个帧选择一个动作，而是选择一个动作并在一定数量的时间步内重复它。这就是帧跳过的概念，它允许更平滑的过渡。'
- en: '**Max-pooling** → Due to the manner in which ALE/Atari renders its frames and
    the downsampling, it is possible that we encounter flickering. To solve this we
    take the max over two consecutive frames.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最大池化** → 由于ALE/Atari渲染帧的方式和下采样，我们可能会遇到闪烁。为了解决这个问题，我们对连续的两个帧取最大值。'
- en: '**Terminal Life on Loss** → Many Atari games do not end when the player dies.
    Consider Pong, no player wins until the score hits 21\. However, by default agents
    might consider the loss of life as the end of an episode, which is undesirable.
    This wrapper counteracts this and ends the episode when the game is truly over.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**终端生命损失** → 许多Atari游戏在玩家死亡时不会结束。以Pong为例，没有玩家得分达到21分之前，没有玩家获胜。然而，默认情况下，智能体可能会将生命的损失视为一局的结束，这是不希望的。这个包装器可以抵消这种情况，并在游戏真正结束时结束一局。'
- en: '**Clip Reward** → The gradients are highly sensitive to the magnitude of the
    rewards. To avoid unstable updates, we clip the rewards to be between {-1, 0,
    1}.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**剪辑奖励** → 梯度对奖励幅度的敏感度很高。为了避免不稳定的更新，我们将奖励剪辑到{-1, 0, 1}之间。'
- en: Apart from these we also introduce an additional frame stack wrapper (`FrameStack`).
    This performs what was discussed above, stacking 4 frames on top of each to keep
    the states Markovian. The ALE environment returns LazyFrames, which are designed
    to be more memory efficient, as the same frame might occur multiple times. However,
    they are not compatible with many of the operations that we perform throughout
    the training procedure. To convert LazyFrames into usable objects, we apply a
    custom wrapper which converts an observation to Numpy before returning it to us.
    The code is shown below.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些之外，我们还引入了一个额外的帧堆叠包装器（`FrameStack`）。这个包装器执行上述讨论的操作，在每个状态上方堆叠4个帧以保持马尔可夫状态。ALE环境返回LazyFrames，这些LazyFrames设计得更加内存高效，因为相同的帧可能会出现多次。然而，它们与我们在整个训练过程中执行的大多数操作不兼容。为了将LazyFrames转换为可用的对象，我们应用了一个自定义包装器，在返回给我们之前将观察结果转换为Numpy。代码如下。
- en: '[PRE4]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Let’s combine all of the wrappers into one function that returns an environment
    that does all of the above.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将所有的包装器组合成一个函数，该函数返回一个执行上述所有操作的环境。
- en: '[PRE5]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: These changes are derived from the 2015 Nature paper and help to stabilize training
    [3]. The interfacing with `gym` remains the same as shown above. An example of
    the preprocessed states can be seen in Figure 7.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这些更改源自2015年的Nature论文，有助于稳定训练[3]。与`gym`的接口与上面显示的相同。预处理后的状态的示例可以在图7中看到。
- en: '![](../Images/addcfc0e6bae2f1fcf2e1a614814d5d5.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/addcfc0e6bae2f1fcf2e1a614814d5d5.png)'
- en: 'Figure 7: Preprocessed successive Atari frames; each frame is preprocessed
    by turning the image from RGB to grayscale, and downsampling the size of the image
    from 210×160 pixels to 84×84 pixels.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：预处理后的连续Atari帧；每个帧都通过将图像从RGB转换为灰度，并将图像大小从210×160像素下采样到84×84像素进行预处理。
- en: Now that we have an appropriate environment let’s move on to create the replay
    buffer.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经有一个合适的环境了，让我们继续创建重放缓冲区。
- en: '[PRE6]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The replay buffer works by allocating space in the memory for the given capacity.
    We maintain a pointer that keeps track of the number of objects added. Every time
    a new tuple is added we replace the oldest tuples with the new ones. To sample
    a minibatch, we first randomly sample a minibatch in `numpy` and then convert
    it into `torch` tensors, also loading it to the appropriate device.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 重放缓冲区通过在内存中为给定容量分配空间来工作。我们维护一个指针，以跟踪添加的对象数量。每次添加新的元组时，我们用新的元组替换最旧的元组。为了采样一个minibatch，我们首先在`numpy`中随机采样一个minibatch，然后将其转换为`torch`张量，并将其加载到适当的设备上。
- en: Some of the aspects of the replay buffer are inspired by [8]. The replay buffer
    proved to be the biggest bottleneck in training the agent, and thus small speed-ups
    in the code proved to be monumentally important. An alternative strategy which
    uses an `deque` object to hold the tuples can also be used. If you are creating
    your own buffer, I would emphasize that you spend a little more time to ensure
    its efficiency.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 重放缓冲区的一些方面受到了[8]的启发。重放缓冲区被证明是训练智能体的最大瓶颈，因此代码中的微小速度提升证明是极其重要的。还可以使用使用`deque`对象来保存元组的替代策略。如果您正在创建自己的缓冲区，我强调您应该花更多的时间来确保其效率。
- en: We can now use this to create a function that creates a buffer and preloads
    a given number of tuples with a random policy.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用这个来创建一个函数，该函数创建一个缓冲区，并使用随机策略预加载给定数量的元组。
- en: '[PRE7]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The function is quite straightforward, we create a buffer and environment object
    and then preload the buffer using a random policy. Note that we squeeze the observations
    to remove the redundant color channel. Let’s move on to the next step and define
    the function approximator.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 函数相当直接，我们创建一个缓冲区和环境对象，然后使用随机策略预加载缓冲区。请注意，我们压缩了观察结果以去除冗余的颜色通道。让我们继续下一步，并定义函数逼近器。
- en: '[PRE8]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: That covers the model architecture. I used a linear ε-decay scheme, but feel
    free to try another. We can also create an auxiliary class that keeps track of
    important metrics. The class keeps track of rewards received for the last few
    episodes along with the respective lengths of said episodes.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这涵盖了模型架构。我使用了线性ε衰减方案，但你可以自由尝试其他方案。我们还可以创建一个辅助类来跟踪重要的指标。该类跟踪最后几个回合获得的奖励以及相应回合的长度。
- en: '[PRE9]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Great! Now we have everything we need to start training our agent. Let’s define
    the training function and go over how it works. Before that, we need to create
    the necessary objects to pass into our training function along with some hyperparameters.
    A small note: in the paper the authors use RMSProp, but instead we’ll use Adam.
    Adam proved to work for me with the given parameters, but you are welcome to try
    RMSProp or other variations.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！现在我们拥有了开始训练智能体所需的一切。让我们定义训练函数并了解它是如何工作的。在此之前，我们需要创建必要的对象，包括损失函数等，并将一些超参数传递给训练函数。一个小提示：在论文中，作者使用了RMSProp，但我们将使用Adam。Adam在给定的参数下证明对我有效，但你可以尝试RMSProp或其他变体。
- en: '[PRE10]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '[PRE11]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'The training procedure closely follows Figure 6 and the algorithm described
    in the paper [4]. We first create the necessary objects such as the loss function
    etc and reset the environment. Then we can start the training loop, by using the
    Q-network to give us an action based on the ε-greedy policy. We simulate the environment
    one step forward using the action and push the resultant tuple onto the replay.
    If the update frequency condition is met, we can proceed with a training step.
    The motivation behind the update frequency element is something I am not 100%
    confident in. Currently, the explanation I can provide revolves around computational
    efficiency: training every 4 steps instead of every step majorly speeds up the
    algorithm and seems to work relatively well. In the update step itself, we sample
    a minibatch of tuples and run the model forward to produce predicted Q-values.
    We then create the target values (the bootstrapped true labels) using the piecewise
    function in step 5 in Figure 6\. Performing an SGD step becomes quite straightforward
    from this point, since we can rely on [autograd](https://pytorch.org/tutorials/beginner/blitz/autograd_tutorial.html)
    to compute the gradients and the optimizer to update the parameters.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程紧密遵循图6和论文中描述的算法[4]。我们首先创建必要的对象，如损失函数等，并重置环境。然后我们可以开始训练循环，使用Q网络根据ε贪婪策略给出动作。我们使用动作模拟环境的一步，并将结果元组推送到重放中。如果满足更新频率条件，我们可以进行训练步骤。更新频率元素背后的动机我并不完全自信。目前，我能提供的解释主要围绕计算效率：每4步训练一次而不是每步都训练，大大加快了算法的速度，并且似乎效果相当不错。在更新步骤本身中，我们采样一个元组小批量，并运行模型以产生预测的Q值。然后我们使用图6中的步骤5中的分段函数创建目标值（自举的真实标签）。从这个点开始，执行SGD步骤变得相当直接，因为我们可以依赖[autograd](https://pytorch.org/tutorials/beginner/blitz/autograd_tutorial.html)来计算梯度，并使用优化器更新参数。
- en: If you followed along until now, you can use the following test function to
    test your saved model.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您一直跟到现在，您可以使用以下测试函数来测试您的保存模型。
- en: '[PRE12]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Here’s how you can use it:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是您如何使用它的方法：
- en: '[PRE13]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: That’s everything for the code! You can see a trained agent below in Figure
    8\. It behaves quite similar to a human might play Pong, and is able to (consistently)
    beat the AI on the easiest difficulty. This naturally invites the question, how
    well does it perform on higher difficulties? Try it out using your own agent or
    my trained one!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 代码部分就到这里！您可以在图8中看到下面的训练好的智能体。它的行为相当类似于人类玩Pong，并且能够在最简单的难度上（一致地）击败AI。这自然引发了一个问题，它在更高难度上的表现如何？你可以使用自己的智能体或我训练好的智能体来尝试一下！
- en: '![](../Images/9ecb6f9a53ef0c44303626134d7d944a.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9ecb6f9a53ef0c44303626134d7d944a.png)'
- en: 'Figure 8: DQN agent playing Pong.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图8：DQN智能体玩Pong。
- en: An additional agent was trained on the game Breakout as well, the agent can
    be seen in Figure 9\. Once again, I used the default mode and difficulty. It might
    be interesting to see how well it performs in different modes or difficulties.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 还训练了一个额外的智能体在Breakout游戏中，该智能体如图9所示。再次，我使用了默认模式和难度。看看它在不同模式或难度下的表现可能很有趣。
- en: '![](../Images/fec58e5bc48eeec4a506ca4f372473c9.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fec58e5bc48eeec4a506ca4f372473c9.png)'
- en: 'Figure 9: DQN agent playing Breakout.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图9：DQN智能体在玩Breakout游戏。
- en: '**Summary**'
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**摘要**'
- en: DQN solves the issue of training agents to play Atari games. By using a FA,
    experience replay etc, we are able to train an agent that mimics or even surpasses
    human performance in Atari games [3]. Deep-RL agents can be finicky and you might
    have noticed that we use a **lot** of techniques to ensure that training is stable.
    If things are going wrong with your implementation it might not hurt to look at
    the details again.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: DQN解决了训练智能体玩Atari游戏的问题。通过使用FA、经验回放等，我们能够训练一个模仿甚至超越人类在Atari游戏中的表现的智能体[3]。深度强化学习智能体可能很挑剔，你可能已经注意到我们使用了大量的技术来确保训练的稳定性。如果你的实现出现问题，再次查看细节可能不会有害。
- en: If you want to check out the code for my implementation you can use this [link](https://github.com/aryangarg794/DQN-DRQN).
    The repo also contains code to train your own model on the game of your choice
    (as long as it’s in ALE), as well as the trained weights for both Pong and Breakout.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想查看我实现代码，可以使用这个[链接](https://github.com/aryangarg794/DQN-DRQN)。该仓库还包含用于在所选游戏（只要它在ALE中）上训练你自己的模型的代码，以及Pong和Breakout的训练权重。
- en: I hope this was a helpful introduction to training DQN agents. To take things
    to the next level maybe you can try to tweak details to beat the higher difficulties.
    If you want to look further, there are many extensions to DQN you can explore,
    such as Dueling DQNs, Prioritized Replay etc.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这为训练DQN智能体提供了一个有用的介绍。为了将事情提升到下一个层次，也许你可以尝试调整细节以克服更高的难度。如果你想进一步了解，有许多DQN的扩展你可以探索，例如对抗性DQN、优先级回放等。
