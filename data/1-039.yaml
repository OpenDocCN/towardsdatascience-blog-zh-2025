- en: 'The Machine Learning and Deep Learning “Advent Calendar” Series: The Blueprint'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习和深度学习“圣诞日历”系列：蓝图
- en: 原文：[https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/)
- en: Why Excel Is the Best Way to Truly Understand Machine Learning Models
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么 Excel 是真正理解机器学习模型的最佳方式
- en: '**The Illusion of Simplicity in Modern Training**'
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**现代训练中的简单幻觉**'
- en: With scikit-learn, everything feels easy.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 scikit-learn，一切感觉都很简单。
- en: And the training process is always done with the seemingly same method fit.
    So we get used to this idea that training any model is similar and simple.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 并且训练过程总是以看似相同的方法拟合。因此，我们习惯了这样的想法，即训练任何模型都是相似且简单的。
- en: With autoML, Grid search, and Gen AI, “training” machine learning models can
    be done with a simple “prompt”.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自动机器学习、网格搜索和生成式 AI，使用简单的“提示”就可以“训练”机器学习模型。
- en: But the reality is that, when we do model.fit, behind each model, the process
    can be very different. And each model itself works very differently with the data.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但现实是，当我们进行模型拟合时，每个模型背后的过程可能非常不同。每个模型本身与数据的工作方式也非常不同。
- en: '**Two Opposite Trends in Machine Learning**'
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**机器学习中的两种相反趋势**'
- en: 'We can observe two very different trends, almost in two opposite directions:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以观察到两个截然不同的趋势，几乎在两个相反的方向上：
- en: On the one hand, we train, use, manipulate, and predict with models (such as
    generative models) more and more complex.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一方面，我们使用模型（例如生成模型）进行训练、使用、操作和预测变得越来越复杂。
- en: On the other hand, we are not always capable of explaining simple models (such
    as linear regression, linear discriminant classifier), and recalculating results
    by hand.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，我们并不总是能够解释简单的模型（例如线性回归、线性判别分类器），并且手动重新计算结果。
- en: '**Why Understanding Models Matters**'
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**为什么理解模型很重要**'
- en: It is important to understand the models we use. And the best way to understand
    them is to implement them ourselves. Some people do it with Python, R, or other
    programming languages. But there is still a barrier for those who do not program.
    And nowadays, understanding AI is essential for everyone. Moreover, using a programming
    language can also hide some operations behind already existing functions. And
    it is not visually explained, meaning that each operation is not clearly shown,
    since the function is coded then run, to only give the results.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 理解我们使用的模型很重要。而理解它们最好的方式就是亲自实现它们。有些人用 Python、R 或其他编程语言来做。但对于那些不编程的人来说，仍然存在障碍。而且如今，理解人工智能对每个人来说都是必不可少的。此外，使用编程语言也可能隐藏一些操作在已存在的函数背后。而且它没有视觉上的解释，这意味着每个操作都没有清楚地展示出来，因为函数是编码后运行的，只提供结果。
- en: So the best tool to explore, in my opinion, is **Excel**.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在我看来，最好的探索工具是 **Excel**。
- en: With the formulas that clearly show every step of the calculations.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 通过清晰地展示计算每一步的公式。
- en: '**Why Excel Is the Best Tool to Learn ML**'
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**为什么 Excel 是学习机器学习的最佳工具**'
- en: In fact, when we receive a dataset, most non-programmers will open it in Excel
    to understand what is inside. This is very common in the business world.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，当我们收到一个数据集时，大多数非程序员都会在 Excel 中打开它来了解里面的内容。这在商业界是非常常见的。
- en: Even many data scientists, myself included, use Excel to take a quick look.
    And when it is time to explain the results, showing them directly in Excel is
    often the most effective way, especially in front of executives.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 即使许多数据科学家，包括我自己，也会使用 Excel 来快速查看。当需要解释结果时，直接在 Excel 中展示通常是最高效的方式，尤其是在面对高管时。
- en: In Excel, everything is **visible**. There is no “black box”. You can see every
    formula, every number, every calculation.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Excel 中，一切 **都是可见的**。没有“黑盒”。你可以看到每一个公式，每一个数字，每一次计算。
- en: This helps a lot to understand how the models really work, without shortcuts.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于更好地理解模型的实际工作原理，而不走捷径。
- en: Also, you do not need to install anything. Just a spreadsheet.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你不需要安装任何东西。只需一个电子表格。
- en: '**A Series of Articles to Learn ML and DL in Excel**'
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**一系列在 Excel 中学习机器学习和深度学习的文章**'
- en: I will publish a series of articles about how to **understand** and **implement**,
    and **visualize** machine learning and deep learning models in **Excel**.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我将发布一系列关于如何在 **Excel** 中 **理解**、**实现** 和 **可视化** 机器学习和深度学习模型的文章。
- en: For the “Advent Calendar”, I will publish one article per day.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于“圣诞日历”，我每天将发布一篇文章。
- en: Who is this series for?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这个系列是为谁准备的？
- en: 'Different people use machine learning in very different ways. But all of them
    face the same problem: understanding what is really happening inside the models.
    This series shows how Excel can give each audience the clarity they need.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的人以非常不同的方式使用机器学习。但它们都面临着相同的问题：理解模型内部真正发生的事情。本系列展示了Excel如何为每个受众提供他们需要的清晰度。
- en: 'For Students: Making Complex Formulas Finally Make Sense'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于学生：让复杂的公式最终变得有意义
- en: For students who are studying, I think that these articles offer a practical
    point of view. It is to make sense of complex formulas.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于正在学习的学生，我认为这些文章提供了一个实用的观点。那就是理解复杂的公式。
- en: Students often learn machine learning with a lot of algebra, matrices, and probability.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 学生们经常用大量的代数、矩阵和概率来学习机器学习。
- en: But they rarely *see* the calculations happen.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 但他们很少“看到”计算发生。
- en: Excel changes this.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Excel改变了这一点。
- en: Every step becomes visible.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 每一步都变得清晰可见。
- en: Every formula becomes concrete.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 每个公式都变得具体。
- en: A model that looked abstract suddenly becomes intuitive.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一个看起来很抽象的模型突然变得直观。
- en: For students, coding skills are great. But in the business world, Python alone
    is not enough to communicate. People understand Excel instantly. It becomes the
    bridge that connects your technical skills with real business understanding.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对于学生来说，编程技能很棒。但在商业世界中，仅Python是不够的来传达。人们立刻就能理解Excel。它成为连接你的技术技能与真实商业理解的桥梁。
- en: 'For ML and AI Developers: Opening the Black Box Behind `model.fit`'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于机器学习和人工智能开发者：打开`model.fit`背后的黑盒
- en: For ML or AI developers, who, sometimes, have not studied theory. but now, without
    complicated algebra, probability, or statistics, you can open the black box behind
    model.fit. Because for all models, you do model.fit. But in reality, the models
    can be very different.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 对于机器学习或人工智能开发者来说，他们有时没有学习理论，但现在，没有复杂的代数、概率或统计学，你就可以打开模型.fit背后的黑盒。因为对于所有模型，你都会做模型.fit。但在现实中，模型可能非常不同。
- en: Excel shows the hidden steps.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Excel展示了隐藏的步骤。
- en: No heavy math.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 没有复杂的数学。
- en: No advanced notation.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 没有高级符号。
- en: Just simple formulas, laid out one by one.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 只是一些简单的公式，一个接一个地排列。
- en: So you can finally see why two models both use `.fit` but behave in totally
    different ways.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你最终可以看到为什么两个模型都使用 `.fit` 但表现完全不同。
- en: For developers, Python is perfect to run models. But in the business world,
    it can make you look like a geek from another planet. Excel helps you communicate
    your ideas clearly, and it builds the bridge with non-technical teams.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 对于开发者来说，Python是运行模型的最佳选择。但在商业世界中，它可能会让你看起来像来自另一个星球的极客。Excel帮助你清晰地传达你的想法，并搭建与非技术团队的桥梁。
- en: 'For Managers: Intuition First, Then Better Decisions'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于管理者：直觉优先，然后是更好的决策
- en: This is also for managers who may not have all the technical background, but
    to whom Excel will give all the intuitive ideas behind the models. Therefore,
    combined with your business expertise, you can better judge if machine learning
    is really necessary, and which model might be more suitable.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于可能没有全部技术背景，但Excel能给出模型背后所有直观想法的管理者。因此，结合你的业务专业知识，你可以更好地判断机器学习是否真的必要，以及哪种模型可能更合适。
- en: 'For Teachers: A Tool That Makes Learning Simple'
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于教师：一个使学习变得简单的工具
- en: Teachers need ways to explain difficult concepts.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 教师需要方法来解释困难的概念。
- en: 'Excel gives students an immediate understanding of:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Excel让学生立即理解：
- en: what a model calculates
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型计算的内容
- en: why it works this way
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么它会以这种方式工作
- en: how each variable influences the result
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个变量如何影响结果
- en: It is a visual, step-by-step classroom.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个视觉的、一步一步的课堂。
- en: 'For Beginners: A Friendly Starting Point'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于初学者：一个友好的起点
- en: For beginners, this is the easiest way to start.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学者来说，这是开始的最简单方式。
- en: 'You often hear advice like: *“If you want to learn Machine Learning, you must
    first study probability, statistics, linear algebra…”*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你经常听到这样的建议：“如果你想学习机器学习，你必须首先学习概率、统计学、线性代数……”
- en: No.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 不。
- en: 'The prerequisite for this series is much simpler: you only need to know addition,
    multiplication, and how to open a spreadsheet with a tiny dataset (10 rows, or
    even fewer).'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 本系列的前提条件要简单得多：你只需要知道加法、乘法以及如何用一个小数据集（10行，甚至更少）打开电子表格。
- en: Because with such a small dataset, you can actually follow every calculation.
    You can understand where each number comes from. And you can add your own columns
    to test your ideas as you go.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在这样的小数据集上，你实际上可以跟随每一个计算。你可以理解每个数字的来源。你可以在进行过程中添加自己的列来测试你的想法。
- en: You do not need to program, install packages, or configure anything.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要编程，安装包或配置任何东西。
- en: You just open a spreadsheet.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需打开一个工作表。
- en: You can change a number and instantly see how the model reacts.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以改变一个数字，并立即看到模型如何反应。
- en: You can add a feature, remove a row, modify a label, reorganize your sheet,
    and immediately observe the consequences.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以添加一个功能，删除一行，修改标签，重新组织你的工作表，并立即观察结果。
- en: This kind of direct experimentation is impossible to see in most programming
    environments.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这种直接实验在大多数编程环境中是看不到的。
- en: 'And this is why spreadsheets are so powerful for beginners:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么电子表格对初学者来说如此强大的原因：
- en: they give you the right intuition from the very beginning, and you learn by
    doing, not by memorizing formulas.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 它们从一开始就给你正确的直觉，你通过实践学习，而不是通过记忆公式。
- en: 'For Seniors: Excel Is Only a Pretext'
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于高级用户：Excel 只是一个借口
- en: For seniors, because Excel is a pretext, and I will revel many untaught lessons
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 对于高级用户来说，因为 Excel 只是一个借口，我将揭示许多未教授的课程
- en: 'For experienced people, Excel becomes a way to reveal:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于有经验的人来说，Excel 成为了揭示的方式：
- en: the hidden logic behind models
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型背后的隐藏逻辑
- en: the untaught links between algorithms
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法之间未教授的联系
- en: the common structure that connects many techniques
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接许多技术的常见结构
- en: the lessons that are usually missed in traditional ML courses
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 传统机器学习课程中通常被忽视的课程
- en: Excel is simple, but what it reveals is deep.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 简单，但它揭示的是深刻的。
- en: For Those Who Also Want Better Excel Skills
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于那些也想提高 Excel 技能的人来说
- en: For people who want to use Excel for data manipulation and organisation, this
    series is also helpful.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想用 Excel 进行数据处理和组织的人来说，这个系列也有帮助。
- en: 'It is not the main goal, but it is an opportunity to practise Excel with simple
    formulas: **IF, SUM, SUMIF, SUMIFS, SUMPRODUCT, AVERAGE, VLOOKUP**, even VLOOKUP
    with multiple conditions and more.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是主要目标，但这是一个练习使用简单公式的机会：**IF、SUM、SUMIF、SUMIFS、SUMPRODUCT、AVERAGE、VLOOKUP**，甚至带有多个条件的
    VLOOKUP 等。
- en: You will use them in a real context, and understand how to structure a sheet
    so the formulas can scale.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 你将在实际环境中使用它们，并了解如何构建工作表，以便公式可以扩展。
- en: Because in Excel, people (myself included) tend to calculate wherever they want.
    Since cells are everywhere, formulas end up everywhere.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在 Excel 中，人们（包括我自己）倾向于在任何地方进行计算。由于单元格无处不在，公式最终也无处不在。
- en: 'My main concern is actually to **organise the calculations**: sometimes in
    a visual way, sometimes so that formulas remain dragable.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我的主要关注点实际上是**组织计算**：有时以可视化的方式，有时让公式保持可拖动。
- en: The visualisation part is also quite painful to build. I actually use Google
    Sheets, and the plotting logic is not the same as in Excel. So some charts may
    not work perfectly when you download the file and open it in Excel, because the
    underlying principles are different. I still do not fully understand how Excel
    handles this, but in Google Sheets, I think I understand it much better now.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化部分构建起来也很痛苦。我实际上使用的是 Google Sheets，其绘图逻辑与 Excel 不同。因此，当你下载文件并在 Excel 中打开时，某些图表可能无法完美工作，因为其底层原理不同。我仍然不完全理解
    Excel 如何处理这个问题，但在 Google Sheets 中，我认为我现在理解得更好了。
- en: '**In Summary**, the real goal'
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总之**，真正的目标是'
- en: 'These articles exist for one reason:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这些文章存在的一个原因是：
- en: '**To help everyone truly understand models, how they are trained, how to interpret
    them, and how different algorithms connect to each other.**'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**为了帮助每个人真正理解模型，它们是如何训练的，如何解释它们，以及不同的算法如何相互连接。**'
- en: Excel is the tool.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 是工具。
- en: Understanding is the goal.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 理解是目标。
- en: So, in summary, It is to better understand the models, the training of the models,
    the interpretability of the models, and the links between different models.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，总的来说，是为了更好地理解模型、模型的训练、模型的可解释性以及不同模型之间的联系。
- en: And remember, in the business world, Excel is the universal language. Python
    impresses technical people, but Excel is what makes everyone else understand you.
    It is the bridge between your expertise and the people who will actually use your
    insights.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，在商业世界中，Excel 是一种通用语言。Python 给技术人士留下了深刻印象，但 Excel 是让其他人理解你的东西。它是你的专业知识与实际使用你见解的人之间的桥梁。
- en: Structure of the articles
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文章的结构
- en: '**Why Classic ML Categories Are Not Enough**'
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**为什么经典机器学习分类不够**'
- en: 'From a practitioner’s point of view, we usually categorize the models in the
    following two categories: supervised learning and unsupervised learning.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 从实践者的角度来看，我们通常将模型分为以下两类：监督学习和无监督学习。
- en: Then for supervised learning, we have regression and classification. And for
    unsupervised learning, we have clustering and dimensionality reduction.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 然后对于监督学习，我们有回归和分类。对于无监督学习，我们有聚类和降维。
- en: '![](../Images/d45649771e5fd6bc063321fa8f7b6f4e.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d45649771e5fd6bc063321fa8f7b6f4e.png)'
- en: Overview of machine learning models from a practioner’s point of view – image
    by author
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 从实践者的角度概述机器学习模型——图片由作者提供
- en: But you surely already notice that some algorithms may share the same or similar
    approach, such as KNN classifier vs. KNN regressor, decision tree classifier vs.
    decision tree regressor, linear regression vs. “linear classifier”.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 但你肯定已经注意到，一些算法可能具有相同或类似的方法，例如 KNN 分类器与 KNN 回归器，决策树分类器与决策树回归器，线性回归与“线性分类器”。
- en: A regression tree and linear regression have the same objective, that is, to
    do a regression task. But when you try to implement them in Excel, you will see
    that the regression tree is very close to the classification tree. And linear
    regression is closer to a neural network.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 回归树和线性回归具有相同的目标，即执行回归任务。但是，当你尝试在 Excel 中实现它们时，你会发现回归树非常接近分类树。而线性回归更接近神经网络。
- en: And sometimes people confuse K-NN with K-means. Some may argue that their goals
    are completely different, and that confusing them is a beginner’s mistake. BUT,
    we also have to admit that they share the same approach of calculating distances
    between the data points. So there is a relationship between them.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 有时人们会将 K-NN 与 K-means 混淆。有些人可能会争论它们的目标完全不同，混淆它们是初学者的错误。但是，我们也要承认，它们在计算数据点之间距离的方法上是相同的。因此，它们之间存在某种联系。
- en: The same goes for isolation forest, as we can see that in random forest there
    also is a “forest”.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于隔离森林，正如我们可以在随机森林中看到也存在一个“森林”。
- en: 'Another Organization: Models by Theoretical Approaches'
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 另一个组织：按理论方法组织的模型
- en: So I will organize all the models from a theoretical point of view. There are
    three main approaches, and we will clearly see how these approaches are implemented
    in a very different way in Excel.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我将从理论角度组织所有模型。有三种主要方法，我们将清楚地看到这些方法如何在 Excel 中以非常不同的方式实现。
- en: This overview will help us to navigate through all the different models, and
    connect the dots between many of them.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概述将帮助我们导航所有不同的模型，并在许多模型之间建立联系。
- en: '![](../Images/450ca70f3cc7e1b1b8217a807a1c543e.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/450ca70f3cc7e1b1b8217a807a1c543e.png)'
- en: Overview of machine learning models organised by theoritial approaches – image
    by author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 按理论方法组织的机器学习模型概述——图片由作者提供
- en: For distance-based models, we will calculate local or global distances, between
    a new observation and the training dataset.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于基于距离的模型，我们将计算新观测值与训练数据集之间的局部或全局距离。
- en: For tree based models, we have to define the splits or rules that will be used
    to make categories of the features.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于基于树的模型，我们必须定义用于对特征进行分类的分割或规则。
- en: For math functions, the idea is to apply weights to features. And to train the
    model, the gradient descent is mainly used.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数学函数，想法是应用权重到特征上。而为了训练模型，主要使用梯度下降法。
- en: For deep learning models, we will that the main point is about feature engineering,
    to create adequate representation of the data.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于深度学习模型，我们将看到主要点是关于特征工程，以创建数据的适当表示。
- en: The Key Questions We Will Answer for Every Model
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们将为每个模型解答的关键问题
- en: For each model, we will try to answer these questions.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个模型，我们将尝试回答这些问题。
- en: '**General questions about the model:**'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于模型的一般问题：**'
- en: What is the nature of the model?
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的本质是什么？
- en: How is the model trained?
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型是如何训练的？
- en: What are the hyperparameters of the model?
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的超参数是什么？
- en: How can the same model approach be used for regression, classification, or even
    clustering?
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同样的模型方法如何用于回归、分类，甚至聚类？
- en: '**How features **are**** **modelled:**'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何对特征进行建模：**'
- en: How are categorical features handled?
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何处理分类特征？
- en: How are missing values managed?
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺失值是如何处理的？
- en: For continuous features, does scaling make a difference?
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于连续特征，缩放是否有影响？
- en: How do we measure the importance of one feature?
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们如何衡量一个特征的重要性？
- en: How can we qualify **the importance of the features**? This question will also
    be discussed. You may know that packages like LIME and SHAP are very popular,
    and they are model-agnostic. But the truth is that each model behaves quite differently,
    and it is also interesting, and important to interpret directly with the model.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何衡量**特征的重要性**？这个问题也将被讨论。你可能知道，像LIME和SHAP这样的包非常受欢迎，它们是模型无关的。但事实是，每个模型的行为都相当不同，直接用模型进行解释也是很有趣且重要的。
- en: The Hidden Links Between Models
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型之间的隐藏联系
- en: Each model will be in a separate article, but we will discuss the links with
    other models.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 每个模型将单独成文，但我们将讨论它们与其他模型之间的联系。
- en: We will also discuss the relationships between different models. Since we truly
    open each “black box”, we will also know how to make theoretical improvement to
    some models.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将讨论不同模型之间的关系。因为我们真正打开了每个“黑盒”，我们也将知道如何对某些模型进行理论上的改进。
- en: KNN and LDA (Linear Discriminant Analysis) are very close. The first uses a
    local distance, and the latter uses a global distance.
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: KNN和LDA（线性判别分析）非常接近。前者使用局部距离，而后者使用全局距离。
- en: Gradient boosting is the same as gradient descent, only the vector space is
    different.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 梯度提升与梯度下降相同，只是向量空间不同。
- en: Linear regression is also a classifier.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性回归也是一种分类器。
- en: Label encoding can be, sort of, used for categorical feature, and it can be
    very useful, very powerful, but you have to choose the “labels” wisely.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标签编码可以，某种程度上，用于分类特征，它可以非常有用，非常强大，但你必须明智地选择“标签”。
- en: SVM is very close to linear regression, even closer to ridge regression.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SVM非常接近线性回归，甚至比岭回归更接近。
- en: LASSO and SVM use one similar principle to select features or data points. Do
    you know that the second S in LASSO is for selection?
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LASSO和SVM使用一个类似的原则来选择特征或数据点。你知道LASSO中的第二个S是用于选择吗？
- en: For each model, we also will discuss one particular point that most traditional
    courses will miss. I call it the untaught lesson of the machine learning model.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个模型，我们还将讨论一个大多数传统课程会忽略的特定点。我称之为机器学习模型的未教授课程。
- en: 'What We Will Not Cover: Hyperparameter Tuning'
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们不会涵盖的内容：超参数调整
- en: In these articles, we will focus only on how the models work and how they are
    trained. We will not discuss hyperparameter tuning, because the process is essentially
    the same for every model. We typically use grid search.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些文章中，我们将只关注模型的工作原理和训练方式。我们不会讨论超参数调整，因为对于每个模型，这个过程本质上都是相同的。我们通常使用网格搜索。
- en: '![](../Images/4b055c39b2cc81943356c94254dd5fda.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4b055c39b2cc81943356c94254dd5fda.png)'
- en: Get the Excel Files on Ko-fi and Support the Project
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在Ko-fi上获取Excel文件并支持项目
- en: Below there will be a list, which I will update by publishing one article per
    day, beginning December 1st!
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 下面将有一个列表，我将通过每天发布一篇文章来更新，从12月1日开始！
- en: And you can find all the Excel files in this [Kofi link](https://ko-fi.com/s/4ddca6dff1).
    If you want to support my work, it means a lot to me. The price will increase
    during the month, so early supporters get the best value.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这个[Kofi链接](https://ko-fi.com/s/4ddca6dff1)中找到所有的Excel文件。如果你想要支持我的工作，这对我很重要。价格将在本月内上涨，所以早期支持者将获得最佳价值。
- en: '![](../Images/0da376d36a7d209b31fb1e65b3e05c53.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0da376d36a7d209b31fb1e65b3e05c53.png)'
- en: All Excel/Google sheet files for ML and DL
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 所有用于机器学习和深度学习的Excel/Google表格文件
- en: Part A. Distance-based models
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一部分。基于距离的模型
- en: We start with models built on distances between points. They are intuitive,
    visual, and perfect for Excel. You will see something as simple as “who are my
    closest neighbors?”
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从基于点之间距离的模型开始。它们是直观的，可视的，非常适合Excel。你将看到像“我的最近邻是谁？”这样简单的东西。
- en: '[**Day 1: KNN Regressor**](https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/)'
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第1天：KNN回归器**](https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/)'
- en: 'So, to begin, with Machine Learning, this is THE simplest model. So simple
    that we may say: is this really machine learning?'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，首先，在机器学习中，这是最简单的模型。简单到我们可以说：这真的是机器学习吗？
- en: Behind model.fit, we will see that the fit does not NOTHING.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在model.fit后面，我们将看到fit实际上什么都没做。
- en: 'The untaught lesson: standardization or min-max scaling is not always the right
    way to handle feature scales?'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 未教授的课程：标准化或最小-最大缩放是否总是处理特征尺度的正确方式？
- en: '[**Day 2: KNN Classifier**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/)'
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第2天：KNN分类器**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/)'
- en: KNN classifier works in a very similar way as KNN regressor.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: KNN 分类器与 KNN 回归器非常相似地工作。
- en: What is interesting is that we can move from a *local* distance (Euclidean distance
    to nearby points) to a *global* distance, which generalizes the usual k-NN idea.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，我们可以从局部距离（到附近点的欧几里得距离）移动到全局距离，这推广了通常的 k-NN 概念。
- en: One drawback is that there is no variable weighting.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 一个缺点是没有变量加权。
- en: We will also see the links with Nearest Centroids, Gaussian Naive Bayes…
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将看到与最近中心、高斯朴素贝叶斯等模型的联系…
- en: '[**Day 3: GNB, LDA and QDA**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-3-gnb-lda-and-qda-in-excel/)'
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第3天：GNB、LDA 和 QDA**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-3-gnb-lda-and-qda-in-excel/)'
- en: Linear Discriminant Analysis and Quadratic Discriminant Analysis are very close
    to K-NN Classifier. Both introduce a form of “global distance”, known as the Mahalanobis
    distance, instead of the local Euclidean distance used in k-NN.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 线性判别分析和二次判别分析与 K-NN 分类器非常接近。两者都引入了一种“全局距离”，称为马氏距离，而不是 k-NN 中使用的局部欧几里得距离。
- en: 'One more thing: the Kernel Density Estimator can also be used to customize
    the shape of the distribution. Keep this idea in mind, because we will see later
    how it appears again in other models.'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 一件额外的事情：核密度估计器也可以用来定制分布的形状。记住这个想法，因为我们稍后会在其他模型中看到它再次出现。
- en: '**[Day 4: k-means](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-4-k-means-in-excel/)**'
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第4天：k-means](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-4-k-means-in-excel/)**'
- en: K-means is an **unsupervised** model that also uses distances. Sometimes it
    is confused with k-NN, and you will soon see why.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: K-means 是一个**无监督**模型，它也使用距离。有时它与 k-NN 混淆，你很快就会看到原因。
- en: 'Spoiler: the two **k** do not mean the same thing.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 揭秘：两个**k**并不代表同一件事。
- en: And k-means is actually closer to another model we already saw.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: k-means 实际上更接近我们之前看到的其他模型。
- en: '[Day **5: GMM (Gaussian Mixture Model)**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-5-gmm-in-excel/)'
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[第5天：GMM（高斯混合模型）](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-5-gmm-in-excel/)'
- en: GMM is the natural extension of k-means.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: GMM 是 k-means 的自然扩展。
- en: K-means assigns each point to one cluster with Euclidean Distance. GMM assigns
    probabilities.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: K-means 使用欧几里得距离将每个点分配到一个簇中。GMM 分配概率。
- en: Clusters are no longer just centers, they are Gaussian distributions with variance
    (and even covariance).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 簇不再仅仅是中心，它们是具有方差（甚至协方差）的高斯分布。
- en: In Excel, you clearly see how this makes clusters more flexible, and why formulas
    quickly become longer.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Excel 中，你可以清楚地看到这如何使簇更加灵活，以及为什么公式会迅速变长。
- en: '[**Day 9:**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-9-lof-in-excel/)
    [**LOF – Local Outlier Factor**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-10-dbscan-in-excel/)'
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第9天**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-9-lof-in-excel/)
    [**LOF – 局部异常因子**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-10-dbscan-in-excel/)'
- en: LOF detects anomalies using local density.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: LOF 使用局部密度检测异常。
- en: A point is abnormal not because it is far away, but because it is much less
    dense than its neighbors.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 一个点异常不是因为它离得很远，而是因为它比其邻居的密度小得多。
- en: 'In Excel, every step is visible: distances, neighbors, densities, and the final
    anomaly score.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Excel 中，每一步都是可见的：距离、邻居、密度和最终的异常分数。
- en: '[**Day 10:**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-10-dbscan-in-excel/)
    **[DBSCAN](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-9-lof-in-excel/)**'
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第10天**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-10-dbscan-in-excel/)
    **[DBSCAN](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-9-lof-in-excel/)**'
- en: DBSCAN clusters by density, not by distance to a center.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: DBSCAN 通过密度而不是到中心的距离进行聚类。
- en: Dense areas become clusters. Sparse points become noise.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 密集区域成为簇。稀疏点成为噪声。
- en: It naturally finds clusters of any shape and detects outliers at the same time.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 它自然地找到任何形状的簇，并同时检测异常值。
- en: '**Part B. Tree-based models**'
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第二部分：基于树的模型**'
- en: These models do not use distances or probabilities.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型不使用距离或概率。
- en: They use **rules**. They cut features into pieces. This family is all about
    **splits**.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 他们使用**规则**。他们将特征分割成片段。这个系列都是关于**分割**的。
- en: By stacking these rules one after another, we build what we call a **Decision
    Tree**.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 通过逐个堆叠这些规则，我们构建了我们所说的**决策树**。
- en: The model itself is nothing more than a sequence of rules. And these rules are
    learned **one by one**, using a simple criterion that selects the best split at
    each step.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 模型本身不过是一系列规则。这些规则是逐个通过一个简单的标准学到的，该标准在每个步骤中选择最佳的分割。
- en: The hyperparameters then decide **how many rules** the model is allowed to add.
    In other words, how deep the tree can grow.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 超参数然后决定模型可以添加多少规则。换句话说，树可以长多深。
- en: '**[Day 6: **Decision Tree Regressor**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)**'
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第6天：**决策树回归器**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)**'
- en: A Decision Tree Regressor tests every possible split and computes the error
    (MSE).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树回归器测试所有可能的分割并计算误差（均方误差）。
- en: In Excel, you will see a simpler way to express this MSE.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，你会看到一种更简单的方式来表示这个均方误差。
- en: 'Everything is just loops: test, compute, compare.'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的东西都是循环：测试、计算、比较。
- en: When you build the synthetic table, every split and every decision becomes visible.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 当你构建合成表时，每一个分割和每一个决策都变得可见。
- en: With multiple features, nothing changes.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在多个特征的情况下，没有任何变化。
- en: The same loop is repeated, and Excel shows clearly how all splits can be combined
    into one table.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 重复相同的循环，Excel清楚地显示了如何将所有分割组合成一个表格。
- en: '**[Day 7: Decision Tree Classifier](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-7-decision-tree-classifier/)**'
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第7天：决策树分类器](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-7-decision-tree-classifier/)**'
- en: Same structure as regression trees, but with a different objective.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 与回归树具有相同的结构，但目标不同。
- en: Instead of minimizing MSE, we minimize impurity (Gini, or any valid alternative).
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是最小化均方误差，而是最小化不纯度（基尼系数或任何有效的替代方案）。
- en: The model just tests all possible splits, measures impurity, and keeps the best
    one.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 模型只是测试所有可能的分割，测量不纯度，并保留最佳分割。
- en: 'Excel makes this very clear: trees do not “think”, they try everything.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: Excel使这一点非常清晰：树不会“思考”，它们会尝试一切。
- en: Multi-class classification is conceptually straightforward.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 多类分类在概念上很简单。
- en: In Excel, it becomes simple as soon as the data is well structured and formulas
    can be dragged.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，一旦数据结构良好且公式可以拖动，它就变得简单。
- en: '**[Day 8: Isolation Forest](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-8-isolation-forest-in-excel/)**'
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第8天：隔离森林](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-8-isolation-forest-in-excel/)**'
- en: Isolation Forest detects anomalies by isolating points instead of modeling normal
    behavior.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 隔离森林通过隔离点而不是建模正常行为来检测异常。
- en: Anomalies are easier to separate, so they get isolated in fewer splits.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 异常更容易分离，因此它们在更少的分割中被隔离。
- en: The model builds random trees and measures how quickly each point is isolated.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 模型构建随机树并测量每个点被隔离的速度。
- en: 'In Excel, this makes anomaly detection very concrete: random splits, path lengths,
    and anomaly scores become easy to visualize.'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，这使得异常检测变得非常具体：随机分割、路径长度和异常分数变得容易可视化。
- en: '**Part C. Weight-based models**'
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**C部分. 基于权重的模型**'
- en: Weight-based models all share the same core idea.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 基于权重的模型都共享相同的核心思想。
- en: They combine the input features using weights to produce a score.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 它们通过使用权重组合输入特征来生成分数。
- en: Each feature has a coefficient.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 每个特征都有一个系数。
- en: The model learns these coefficients by minimizing a loss function that measures
    how wrong the predictions are.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 模型通过最小化一个损失函数来学习这些系数，该函数衡量预测的错误程度。
- en: Training is simply an optimization problem.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 训练只是一个优化问题。
- en: Compute the loss, compute its gradients with respect to the weights, and update
    them step by step.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 计算损失，计算其相对于权重的梯度，并逐步更新它们。
- en: When you build these models in Excel, this becomes very clear.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在Excel中构建这些模型时，这一点变得非常清晰。
- en: There is no magic, just scores, losses, and gradients repeated in a loop.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 没有魔法，只有重复循环的分数、损失和梯度。
- en: '**[Day 11: Linear Regression](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-11-linear-regression-in-excel/)**'
  id: totrans-203
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第11天：线性回归](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-11-linear-regression-in-excel/)**'
- en: The simplest weight-based model.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最简单的基于权重的模型。
- en: 'But it is essential to master the basics: gradient descent, handling categorical
    features, and the fact that linear regression can also be used as a classifier.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 但掌握基础知识是至关重要的：梯度下降、处理分类特征以及线性回归也可以用作分类器的事实。
- en: 'This is also where an important distinction appears:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是重要区别出现的地方：
- en: parametric generative models versus parametric discriminative models.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 参数生成模型与参数判别模型。
- en: '**[Day 12: Logistic Regression](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-12-logistic-regression-in-excel/)**'
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第12天：逻辑回归](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-12-logistic-regression-in-excel/)**'
- en: Same linear score, but passed through a sigmoid to produce probabilities.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的线性分数，但通过Sigmoid函数产生概率。
- en: The loss changes, the logic stays the same.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 损失变化，逻辑保持不变。
- en: Excel makes the link between score, probability, loss, and gradient very clear.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: Excel使得分数、概率、损失和梯度之间的联系非常清晰。
- en: '**[Day 13: Ridge and Lasso Regression](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-13-lasso-and-ridge-regression-in-excel/)**'
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第13天：岭回归和Lasso 回归](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-13-lasso-and-ridge-regression-in-excel/)**'
- en: Linear regression with a penalty on the coefficients.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 对系数进行惩罚的线性回归。
- en: Nothing changes in the model itself, only in the objective function.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 模型本身没有变化，只是目标函数发生了变化。
- en: In Excel, you clearly see how the penalty shrinks the weights.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，你可以清楚地看到惩罚是如何缩小权重的。
- en: '**[Day 14: Softmax Regression](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-14-softmax-regression-in-excel/)**'
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第14天：Softmax 回归](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-14-softmax-regression-in-excel/)**'
- en: Logistic regression extended to multiple classes.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归扩展到多类。
- en: Several linear scores are computed in parallel and normalized into probabilities.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 几个线性分数并行计算并归一化为概率。
- en: In Excel, the multiclass logic becomes surprisingly simple.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，多类逻辑变得异常简单。
- en: '[**Day 15: SVM**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-15-svm-in-excel/)'
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第15天：支持向量机（SVM**）](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-15-svm-in-excel/)'
- en: This will be a very different explanation from the usual “maximum margin” story.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是一个非常不同的解释，不同于通常的“最大间隔”故事。
- en: 'We will connect SVM to models you already know: linear regression and logistic
    regression.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把SVM与您已经了解的模型联系起来：线性回归和逻辑回归。
- en: Same linear score, same weights, but a completely different objective.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的线性分数，同样的权重，但完全不同的目标。
- en: Once you see this link, SVM stops looking like a special geometric trick and
    becomes a natural continuation of weight-based models.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你看到这个链接，SVM就不再像是一个特殊的几何技巧，而成为基于权重的模型的自然延续。
- en: '**[Day 16: Kernel trick](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-16-kernel-trick-in-excel/)**'
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第16天：核技巧](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-16-kernel-trick-in-excel/)**'
- en: The kernel trick is often presented as mysterious, but it is simply a change
    of viewpoint.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 核技巧通常被描绘得神秘莫测，但它仅仅是一种观点的改变。
- en: We do not change the model, only the way similarities are computed.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有改变模型，只是改变了相似度计算的方式。
- en: In Excel, you clearly see how non-linear decision boundaries emerge from a linear
    algorithm.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，你可以清楚地看到非线性决策边界是如何从一个线性算法中产生的。
- en: '[**Day 17: Neural Network Regressor**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-17-neural-network-regressor-in-excel/)'
  id: totrans-229
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第17天：神经网络回归器**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-17-neural-network-regressor-in-excel/)'
- en: A neural network is not a new object, but a composition of simple functions.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络不是一个新对象，而是简单函数的组合。
- en: Linear combinations, non-linear activations, and gradient descent, nothing more.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 线性组合、非线性激活和梯度下降，仅此而已。
- en: When everything is written in Excel, the so-called black box disappears.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 当所有内容都在Excel中编写时，所谓的黑盒就消失了。
- en: '[**Day 18: Neural Network Classifier**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-18-neural-network-classifier-in-excel/)'
  id: totrans-233
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[**第18天：神经网络分类器**](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-18-neural-network-classifier-in-excel/)'
- en: The classifier version changes almost nothing.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 分类器版本几乎没有任何变化。
- en: The structure stays the same, only the output and the loss function differ.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 结构保持不变，只是输出和损失函数不同。
- en: This final step shows how all weight-based models follow the same training logic.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 这最后一步展示了所有基于权重的模型遵循相同的训练逻辑。
- en: The classifier version of neural networks is far more commonly used in practice.
    Working through it in Excel helps build an intuition for why a single hidden layer
    is usually sufficient, and for how many neurons are actually needed.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的分类器版本在实践中更为常用。在Excel中处理它有助于建立对为什么通常只需要一个隐藏层以及实际需要多少神经元的直觉。
- en: This should not be confused with deep learning, which relies on many hidden
    layers.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 这不应与深度学习混淆，深度学习依赖于许多隐藏层。
- en: Part D. Ensemble models
  id: totrans-239
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Part D. 集合模型
- en: '**[Day 19: Bagging](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-19-bagging-in-excel/)**'
  id: totrans-240
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第19天：Bagging](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-19-bagging-in-excel/)**'
- en: Bagging builds many independent models on bootstrapped samples and averages
    their predictions.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: Bagging在自助样本上构建了许多独立的模型，并平均它们的预测。
- en: 'Its role is simple and effective: reduce variance without changing the bias
    of the base model.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 它的作用简单而有效：在不改变基础模型偏差的情况下减少方差。
- en: It works best with unstable learners, such as decision trees, where small data
    changes lead to very different models.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 它与不稳定的学习者配合得最好，例如决策树，其中小的数据变化会导致非常不同的模型。
- en: And I will also talk about Random Forest.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 我还会谈到随机森林。
- en: '**[Day 20: Gradient Boosted Linear Regression](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-20-gradient-boosted-linear-regression-in-excel/)**'
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第20天：梯度提升线性回归](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-20-gradient-boosted-linear-regression-in-excel/)**'
- en: This construction of models is mainly a pedagogical step.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模型构建主要是一个教学步骤。
- en: The goal is not performance, but to introduce the boosting concept with the
    simplest possible base model.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 目标不是性能，而是用最简单的基模型介绍提升概念。
- en: 'By using linear regression as the weak learner, the focus stays on the boosting
    mechanism itself: residuals, additive updates, and loss minimization in function
    space.'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用线性回归作为弱学习器，重点保持在提升机制本身：残差、增量更新和在函数空间中的损失最小化。
- en: Each iteration adds a new linear model fitted on the residuals of the previous
    ones.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 每次迭代都会添加一个新的线性模型，该模型拟合于前一个模型的残差。
- en: '**[Day 21: Gradient Boosted Decision Tree](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-21-gradient-boosted-decision-tree-regressor-in-excel/)**'
  id: totrans-250
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[第21天：梯度提升决策树](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-21-gradient-boosted-decision-tree-regressor-in-excel/)**'
- en: This is the most widely used boosting variant in real-world applications.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 这是实际应用中最广泛使用的提升变体。
- en: Weak decision trees are added sequentially, each correcting the errors of the
    previous ensemble.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 弱决策树依次添加，每个都纠正前一个集成中的错误。
- en: The result is a powerful non-linear model that captures interactions automatically,
    with strong generalization and excellent practical performance.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个强大的非线性模型，可以自动捕捉交互，具有强大的泛化能力和出色的实际性能。
- en: Part E. Deep Learning – introduction
  id: totrans-254
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第E部分. 深度学习 – 简介
- en: This final part introduces deep learning through a small number of core ideas,
    applied to text.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分通过少数核心思想介绍深度学习，应用于文本。
- en: The goal is not to be exhaustive, but to understand the **logic** behind modern
    deep learning models, using the same intuitive, spreadsheet-based approach as
    in the rest of this series.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 目标不是详尽无遗，而是通过使用与系列中其他部分相同的直观、基于电子表格的方法来理解现代深度学习模型的**逻辑**。
- en: 'This section covers three complementary ideas:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 本节涵盖了三个互补的想法：
- en: how words are represented numerically,
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 单词如何以数值形式表示，
- en: how local patterns are detected in text,
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 在文本中如何检测局部模式，
- en: and how global context is modeled.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 以及如何建模全局上下文。
- en: Convolutional Neural Networks were already introduced earlier in this series
    for **images**
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络在本系列早期已经介绍过，用于**图像**。
- en: (see *[Understanding Convolutional Neural Networks (CNNs) through Excel](https://towardsdatascience.com/understanding-convolutional-neural-networks-cnns-through-excel/)*).
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: （参见*[通过Excel理解卷积神经网络（CNNs）](https://towardsdatascience.com/understanding-convolutional-neural-networks-cnns-through-excel/)*）。
- en: Here, we focus on how similar mechanisms apply to text, and how more recent
    architectures extend these ideas.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们关注这些类似机制如何应用于文本，以及如何更近期的架构扩展这些想法。
- en: Deep learning deserves more space than an advent calendar can offer.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习需要的空间比日历还要多。
- en: That is why this section remains an introduction.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么本节仍然是一个简介。
- en: A separate series, fully dedicated to deep learning, will follow, with deeper
    explanations and more detailed examples.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 将有一系列专门介绍深度学习的文章，包含更深入的解释和更详细的例子。
- en: '[Day 22: Text Embeddings](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-22-embeddings-in-excel/)'
  id: totrans-267
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[第22天：文本嵌入](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-22-embeddings-in-excel/)'
- en: Before a model can learn from text, words must be turned into numbers.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型可以从文本中学习之前，单词必须被转换为数字。
- en: This day shows how words are represented as vectors, and how meaning becomes
    a geometric object that models can work with.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 这一天展示了单词如何表示为向量，以及意义如何成为模型可以处理的空间几何对象。
- en: '[Day 23: 1D CNN for Text Classification](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-23-cnn-in-excel/)'
  id: totrans-270
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[第23天：用于文本分类的1D CNN](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-23-cnn-in-excel/)'
- en: A 1D Convolutional Neural Network scans a sentence using small sliding windows.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 1D卷积神经网络使用小的滑动窗口扫描句子。
- en: Each filter detects simple local patterns, such as short word sequences or expressions.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 每个过滤器检测简单的局部模式，例如短词序列或表达。
- en: By combining these local signals, the model can recognize higher-level patterns
    and make a classification decision.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合这些局部信号，模型可以识别更高层次的模式并做出分类决策。
- en: Despite its simplicity, this approach is very effective for many text classification
    tasks.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这种方法很简单，但它对于许多文本分类任务非常有效。
- en: '[Day 24: Transformers for Text](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-24-transformers-for-text-in-excel/)'
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[第24天：文本中的变压器](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-24-transformers-for-text-in-excel/)'
- en: Transformers look at text differently.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器以不同的方式看待文本。
- en: Each word interacts with all other words through attention, allowing the model
    to capture global context and long-range dependencies.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 每个词通过注意力与其他所有词进行交互，使模型能够捕捉全局上下文和长距离依赖关系。
- en: This final day introduces the core idea behind transformers, which are the foundation
    of modern large language models.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的最后一天介绍了变压器背后的核心思想，这是现代大型语言模型的基础。
- en: Bonuses
  id: totrans-279
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖金
- en: This series does not end here.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 这个系列并没有在这里结束。
- en: Come back for bonus articles with additional examples, clarifications, and practical
    extensions.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 回来获取带有额外示例、澄清和实际扩展的奖金文章。
- en: See you soon!
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 拜拜，很快见！
