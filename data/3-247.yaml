- en: 'Tutorial: Semantic Clustering of User Messages with LLM Prompts'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 教程：使用LLM提示进行用户消息语义聚类
- en: 原文：[https://towardsdatascience.com/tutorial-semantic-clustering-of-user-messages-with-llm-prompts/](https://towardsdatascience.com/tutorial-semantic-clustering-of-user-messages-with-llm-prompts/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tutorial-semantic-clustering-of-user-messages-with-llm-prompts/](https://towardsdatascience.com/tutorial-semantic-clustering-of-user-messages-with-llm-prompts/)
- en: As a Developer Advocate, it’s challenging to keep up with user forum messages
    and understand the big picture of what users are saying. There’s plenty of valuable
    content — but how can you quickly spot the key conversations? In this tutorial,
    I’ll show you an AI hack to perform semantic clustering simply by prompting LLMs!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 作为开发者倡导者，跟上用户论坛消息并理解用户所说的大致情况是一项挑战。有很多有价值的内容——但如何快速找到关键对话呢？在这个教程中，我将向您展示一个通过提示LLM进行语义聚类的AI技巧！
- en: 'TL;DR 🔄 this blog post is about how to go from (data science + code) → (AI
    prompts + LLMs) for the same results — just faster and with less effort! 🤖⚡. It
    is organized as follows:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: TL;DR 🔄 这篇博客文章是关于如何从（数据科学 + 代码）→（AI提示 + LLMs）获得相同的结果——只是更快、更省力！🤖⚡。它组织如下：
- en: Inspiration and Data Sources
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 灵感与数据来源
- en: Exploring the Data with Dashboards
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用仪表板探索数据
- en: LLM Prompting to produce KNN Clusters
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用LLM提示生成KNN聚类
- en: Experimenting with Custom Embeddings
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试自定义嵌入
- en: Clustering Across Multiple Discord Servers
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在多个Discord服务器上进行聚类
- en: '**Inspiration and Data Sources**'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**灵感与数据来源**'
- en: First, I’ll give **props to the December 2024 paper** [**Clio**](https://arxiv.org/abs/2412.13678)
    **(Claude insights and observations)**, a privacy-preserving platform that uses
    AI assistants to analyze and surface aggregated usage patterns across millions
    of conversations. Reading this paper inspired me to try this.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我要给2024年12月的论文**[Clio**](https://arxiv.org/abs/2412.13678) **（Claude见解和观察）**点个赞，这是一个保护隐私的平台，它使用AI助手分析并展示数百万对话中的聚合使用模式。阅读这篇论文激发了我尝试这个想法。
- en: '**Data**. I used only publicly available [Discord](https://discord.com/) messages,
    specifically “forum threads”, where users ask for tech help. In addition, I aggregated
    and anonymized content for this blog.  Per thread, I formatted the data into conversation
    turn format, with user roles identified as either “user”, asking the question
    or “assistant”, anyone answering the user’s initial question. I also added a simple,
    hard-coded binary sentiment score (0 for “not happy” and 1 for “happy”) based
    on whether the user said thank you anytime in their thread. For vectorDB vendors
    I used Zilliz/Milvus, Chroma, and Qdrant.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据**。我只使用了公开可用的[Discord](https://discord.com/)消息，特别是“论坛线程”，其中用户寻求技术帮助。此外，我还汇总并匿名化了本博客的内容。每个线程，我将数据格式化为对话轮格式，用户角色被标识为“用户”，提出问题，或“助手”，任何回答用户初始问题的人。我还添加了一个简单的、硬编码的二进制情感评分函数（0表示“不开心”，1表示“开心”），基于用户在其线程中是否任何时候说了谢谢。对于vectorDB供应商，我使用了Zilliz/Milvus、Chroma和Qdrant。'
- en: The first step was to convert the data into a pandas data frame. Below is an
    excerpt. You can see for thread_id=2, a user only asked 1 question. But for thread_id=3,
    a user asked 4 different questions in the same thread (other 2 questions at farther
    down timestamps, not shown below).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是将数据转换为pandas数据框。下面是摘录。您可以看到对于thread_id=2，用户只问了一个问题。但对于thread_id=3，用户在同一个线程中问了4个不同的问题（其他2个问题在更晚的时间戳下，下面未显示）。
- en: '![](../Images/378d7f3eb398b2fc199b45e15f9f2923.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/378d7f3eb398b2fc199b45e15f9f2923.png)'
- en: 'The first step was to convert the anonymized data into a pandas data frame
    with columns: score, user, role, message, timestamp, thread, user_turns.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是将匿名数据转换为具有以下列的pandas数据框：score, user, role, message, timestamp, thread, user_turns。
- en: I added a naive sentiment 0|1 scoring function.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我添加了一个简单的0|1情感评分函数。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Exploring the Data with Dashboards**'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**使用仪表板探索数据**'
- en: 'From the processed data above, I built traditional dashboards:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 从上述处理后的数据中，我构建了传统的仪表板：
- en: '**Message Volumes:** One-off peaks in vendors like Qdrant and Milvus (possibly
    due to marketing events).'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**消息量：** 在Qdrant和Milvus等供应商中的一次性峰值（可能由于营销活动）。'
- en: '**User Engagement:** *Top users bar charts and scatterplots of response time
    vs. number of user turns show that, in general, more user turns mean higher satisfaction.
    But, satisfaction does NOT look correlated with response time*. Scatterplot dark
    dots seem random with regard to y-axis (response time). Maybe users are not in
    production, their questions are not very urgent? Outliers exist, such as Qdrant
    and Chroma, which may have bot-driven anomalies.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户参与度：** 顶级用户条形图和响应时间与用户回合数的散点图显示，总的来说，更多的用户回合意味着更高的满意度。但是，满意度与响应时间**并不相关**。散点图的暗点在
    y 轴（响应时间）上似乎随机。也许用户不在生产环境中，他们的问题不是非常紧急？存在异常值，如 Qdrant 和 Chroma，可能是由机器人驱动的异常。'
- en: '**Satisfaction Trends:** Around 70% of users appear happy to have any interaction.
    *Data note: make sure to check emojis per vendor, sometimes users respond using
    emojis instead of words! Example Qdrant and Chroma.*'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**满意度趋势：** 大约 70% 的用户对任何互动都感到满意。*数据说明：请确保检查每个供应商的表情符号，有时用户会使用表情符号而不是文字来回应！例如
    Qdrant 和 Chroma。*'
- en: '![](../Images/2543521796c48f94e3428a25f09c2c7a.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2543521796c48f94e3428a25f09c2c7a.png)'
- en: 'Image by author of aggregated, anonymized data. Top lefts: Charts display Chroma’s
    highest message volume, followed by Qdrant, and then Milvus. Top rights: Top messaging
    users, Qdrant + Chroma possible bots (see top bar in top messaging users chart).
    Middle rights: Scatterplots of Response time vs Number of user turns shows no
    correlation with respect to dark dots and y-axis (response time). Usually higher
    satisfaction w.r.t. x-axis (user turns), except Chroma. Bottom lefts: Bar charts
    of satisfaction levels, make sure you catch possible emoji-based feedback, see
    Qdrant and Chroma.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供的汇总、匿名化数据。左上角：图表显示 Chroma 的最高消息量，其次是 Qdrant，然后是 Milvus。右上角：顶级消息用户，Qdrant
    + Chroma 可能的机器人（见顶级消息用户图表中的顶部栏）。中间右侧：响应时间与用户回合数的散点图显示与暗点及 y 轴（响应时间）无相关性。通常与 x
    轴（用户回合数）的满意度更高，除了 Chroma。左下角：满意度水平的条形图，确保你捕捉到可能的基于表情符号的反馈，见 Qdrant 和 Chroma。
- en: '**LLM Prompting to produce KNN Clusters**'
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**LLM 提示以生成 KNN 聚类**'
- en: For prompting, the next step was to aggregate data by thread_id. For LLMs, you
    need the texts concatenated together. I separate out user messages from entire
    thread messages, to see if one or the other would produce better clusters. I ended
    up using just user messages.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 对于提示，下一步是按 thread_id 汇总数据。对于 LLM，你需要将文本连接在一起。我将用户消息从整个线程消息中分离出来，以查看是否其中之一会产生更好的聚类。最终我仅使用了用户消息。
- en: '![](../Images/e3dd265d3c31da56ff52150a93bb2679.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e3dd265d3c31da56ff52150a93bb2679.png)'
- en: Example anonymized data for prompting. All message texts concatenated together.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的示例匿名化数据。所有消息文本连接在一起。
- en: With a CSV file for prompting, you’re ready to get started using a LLM to do
    data science!
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 CSV 文件进行提示，你就可以开始使用 LLM 进行数据科学了！
- en: '[PRE1]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/e6c8813b9546c2bd6aea1e9227514ae0.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e6c8813b9546c2bd6aea1e9227514ae0.png)'
- en: 'Image by author. Top: Example LLM model names. Bottom: Example inference call
    to Gemini LLM token counts: prompt_token_count = input tokens; candidates_token_count
    = output tokens; total_token_count = sum total tokens used.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。顶部：示例 LLM 模型名称。底部：示例推理调用至 Gemini LLM 令牌计数：prompt_token_count = 输入令牌；candidates_token_count
    = 输出令牌；total_token_count = 总令牌使用量。
- en: Unfortunately Gemini API kept cutting short the `response.text`. I had better
    luck using [AI Studio](https://aistudio.google.com/) directly.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，Gemini API 一直截断 `response.text`。我直接使用 [AI Studio](https://aistudio.google.com/)
    时运气更好。
- en: '![](../Images/424ee13a7ccdab8d98e1edf832988253.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/424ee13a7ccdab8d98e1edf832988253.png)'
- en: 'Image by author: Screenshot of example outputs from Google [AI Studio](https://aistudio.google.com/).'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供：Google [AI Studio](https://aistudio.google.com/) 的示例输出截图。
- en: My 5 prompts to [Gemini Flash & Pro](https://ai.google.dev/gemini-api/docs/models/gemini)
    (temperature set to 0) are below.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我为 [Gemini Flash & Pro](https://ai.google.dev/gemini-api/docs/models/gemini)（温度设置为
    0）的 5 个提示如下。
- en: '**Prompt#1: Get thread Summaries:**'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**提示#1：获取线程摘要：**'
- en: '*Given this .csv file, per row, add 3 columns:**– thread_summary = 205 characters
    or less summary of the row’s column ‘message_content’**– user_thread_summary =
    126 characters or less summary of the row’s column ‘message_content_user’**– thread_topic
    = 3–5 word super high-level category**Make sure the summaries capture the main
    content without losing too much detail. Make user thread summaries straight to
    the point, capture the main content without losing too much detail, skip the intro
    text. If a shorter summary is good enough prefer the shorter summary. Make sure
    the topic is general enough that there are fewer than 20 high-level topics for
    all the data. Prefer fewer topics. Output JSON columns: thread_id, thread_summary,
    user_thread_summary, thread_topic.*'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*给定这个.csv文件，每行添加3列：**– thread_summary = 205个字符或更少的对行‘message_content’列的总结**–
    user_thread_summary = 126个字符或更少的对行‘message_content_user’列的总结**– thread_topic =
    3-5个词的超高级分类**确保总结捕捉到主要内容，同时不丢失太多细节。确保用户线程总结直接了当，捕捉主要内容，避免过多细节，跳过引言文本。如果简短的总结足够好，则优先选择简短的总结。确保主题足够通用，以至于所有数据中只有不到20个高级主题。优先选择较少的主题。输出JSON列：thread_id,
    thread_summary, user_thread_summary, thread_topic.*'
- en: '**Prompt#2: Get cluster stats:**'
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**提示#2：获取聚类统计信息：**'
- en: '*Given this CSV file of messages, use column=’user_thread_summary’ to perform
    semantic clustering of all the rows. Use technique = Silhouette, with linkage
    method = ward, and distance_metric = Cosine Similarity. Just give me the stats
    for the method Silhouette analysis for now.*'
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*给定这个消息的CSV文件，使用列=’user_thread_summary’对所有行执行语义聚类。使用技术=Silhouette，链接方法=ward，距离度量=余弦相似度。现在只需给我Silhouette分析方法的统计信息。*'
- en: '**Prompt#3: Perform initial clustering:**'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**提示#3：执行初始聚类：**'
- en: '*Given this CSV file of messages, use column=’user_thread_summary’ to perform
    semantic clustering of all the rows into N=6 clusters using the Silhouette method.
    Use column=”thread_topic” to summarize each cluster topic in 1–3 words. Output
    JSON with columns: thread_id, level0_cluster_id, level0_cluster_topic.*'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*给定这个消息的CSV文件，使用列=’user_thread_summary’使用Silhouette方法将所有行聚类到N=6个聚类中。使用列=”thread_topic”用1-3个词总结每个聚类主题。输出包含以下列的JSON：thread_id,
    level0_cluster_id, level0_cluster_topic.*'
- en: '**Silhouette Score** measures how similar an object is to its own cluster (cohesion)
    versus other clusters (separation). Scores range from -1 to 1\. A higher average
    silhouette score generally indicates better-defined clusters with good separation.
    For more details, check out the [scikit-learn silhouette score documentation](https://scikit-learn.org/stable/modules/generated/sklearn.metrics.silhouette_score.html).'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**Silhouette分数**衡量一个对象与其自身聚类（凝聚力）相比与其他聚类（分离度）的相似度。分数范围从-1到1。较高的平均轮廓分数通常表示定义良好且分离度好的聚类。更多详情，请查看[scikit-learn轮廓分数文档](https://scikit-learn.org/stable/modules/generated/sklearn.metrics.silhouette_score.html)。'
- en: '**Applying it to Chroma Data.** Below, I show results from Prompt#2, as a plot
    of silhouette scores. I chose **N=6 clusters** as a compromise between high score
    and fewer clusters. Most LLMs these days for data analysis take input as CSV and
    output JSON.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**应用于Chroma数据。** 下面，我展示了Prompt#2的结果，即轮廓分数的图表。我选择了**N=6个聚类**作为高分和较少聚类之间的折中方案。如今，大多数用于数据分析的LLM都接受CSV作为输入，输出JSON。'
- en: '![](../Images/bf8c200f189c3fcdba2dc0d7f0c4a13f.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bf8c200f189c3fcdba2dc0d7f0c4a13f.png)'
- en: 'Image by author of aggregated, anonymized data. Left: I chose N=6 clusters
    as compromise between higher score and fewer clusters. Right: The actual clusters
    using N=6\. Highest sentiment (highest scores) are for topics about Query. Lowest
    sentiment (lowest scores) are for topics about “Client Problems”.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由聚合、匿名化数据的作者提供。左：我选择了N=6个聚类作为高分和较少聚类之间的折中方案。右：使用N=6的实际聚类。最高情感（最高分数）是关于查询的主题。最低情感（最低分数）是关于“客户问题”的主题。
- en: From the plot above, you can see we are finally getting into the meat of what
    users are saying!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的图表中，你可以看到我们终于进入了用户所说内容的实质部分！
- en: '**Prompt#4: Get hierarchical cluster stats:**'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**提示#4：获取层次聚类统计信息：**'
- en: '*Given this CSV file of messages, use the column=’thread_summary_user’ to perform
    semantic clustering of all the rows into Hierarchical Clustering (Agglomerative)
    with 2 levels. Use Silhouette score. What is the optimal number of next Level0
    and Level1 clusters? How many threads per Level1 cluster? Just give me the stats
    for now, we’ll do the actual clustering later.*'
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*给定这个消息的CSV文件，使用列=’thread_summary_user’将所有行聚类到具有2个级别的层次聚类（聚合）中。使用Silhouette分数。下一个级别0和级别1的最佳聚类数量是多少？每个级别1聚类有多少个线程？现在只需给我统计信息，我们稍后会进行实际聚类。*'
- en: '**Prompt#5: Perform hierarchical clustering:**'
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**提示#5：执行层次聚类：**'
- en: '*Accept this clustering with 2-levels. Add cluster topics that summarize text
    column “thread_topic”. Cluster topics should be as short as possible without losing
    too much detail in the cluster meaning.**– Level0 cluster topics ~1–3 words.**–
    Level1 cluster topics ~2–5 words.**Output JSON with columns: thread_id, level0_cluster_id,
    level0_cluster_topic, level1_cluster_id, level1_cluster_topic.*'
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**接受2级聚类。添加总结文本列“thread_topic”的聚类主题。聚类主题应尽可能简短，同时不失去太多聚类意义中的细节。**– Level0聚类主题约1-3个单词。**–
    Level1聚类主题约2-5个单词。**输出包含以下列的JSON：thread_id, level0_cluster_id, level0_cluster_topic,
    level1_cluster_id, level1_cluster_topic.*'
- en: I also prompted to generate Streamlit code to visualize the clusters (since
    I’m not a JS expert 😄). Results for the same Chroma data are shown below.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我还提示生成Streamlit代码来可视化聚类（因为我不是JS专家😄）。以下显示了相同Chroma数据的可视化结果。
- en: '![](../Images/641c8558fe8291805f42191aeebc0400.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/641c8558fe8291805f42191aeebc0400.png)'
- en: 'Image by author of aggregated, anonymized data. Left image: Each scatterplot
    dot is a thread with hover-info. Right image: Hierarchical clustering with raw
    data drill-down capabilities. Api and Package Errors looks like Chroma’s most
    urgent topic to fix, because sentiment is low and volume of messages is high.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由聚合、匿名化数据的作者提供。左图：每个散点图点代表一个带有悬停信息的线程。右图：具有原始数据钻取功能的层次聚类。Api和Package Errors看起来是Chroma最需要修复的紧急话题，因为情绪低落且消息量高。
- en: I found this very insightful. For Chroma, clustering revealed that while users
    were happy with topics like Query, Distance, and Performance, they were unhappy
    about areas such as Data, Client, and Deployment.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现这一点非常有见地。对于Chroma，聚类结果显示，尽管用户对查询、距离和性能等主题感到满意，但他们对于数据、客户端和部署等领域则不太满意。
- en: '**Experimenting with Custom Embeddings**'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**尝试自定义嵌入向量**'
- en: I repeated the above clustering prompts, using just the numerical embedding
    (“user_embedding”) in the CSV instead of the raw text summaries (“user_text”).I’ve
    explained embeddings in detail in previous [blogs](https://zilliz.com/blog/choosing-the-right-embedding-model-for-your-data)
    before, and the risks of overfit models on leaderboards. OpenAI has reliable [embeddings](https://openai.com/index/new-embedding-models-and-api-updates/)
    which are extremely affordable by API call. Below is an example code snippet how
    to create embeddings.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我重复了上述聚类提示，在CSV中仅使用数值嵌入向量（“user_embedding”），而不是原始文本摘要（“user_text”）。我之前在[博客](https://zilliz.com/blog/choosing-the-right-embedding-model-for-your-data)中详细解释了嵌入向量，以及过度拟合模型在排行榜上的风险。OpenAI提供了可靠的[嵌入向量](https://openai.com/index/new-embedding-models-and-api-updates/)，通过API调用非常经济实惠。以下是如何创建嵌入向量的示例代码片段。
- en: '[PRE2]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/11e08e73ba1d85ec80c04e57f20eeaad.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/11e08e73ba1d85ec80c04e57f20eeaad.png)'
- en: Example data for prompting. Column “user_embedding” is an array length=512 of
    floating point numbers.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例数据。列“user_embedding”是一个长度为512的浮点数数组。
- en: Interestingly, both Perplexity Pro and Gemini 2.0 Pro sometimes hallucinated
    cluster topics (e.g., misclassifying a question about slow queries as “Personal
    Matter”).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，Perplexity Pro和Gemini 2.0 Pro有时会产生关于聚类主题的幻觉（例如，将关于慢查询的问题错误地分类为“个人事务”）。
- en: '***Conclusion: When performing NLP with prompts, let the LLM generate its own
    embeddings — externally generated embeddings seem to confuse the model.***'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '***结论：在进行带有提示的NLP操作时，让LLM生成自己的嵌入向量——外部生成的嵌入向量似乎会混淆模型。***'
- en: '![](../Images/69393cbc5dc6bb80cbb9d179e85222af.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69393cbc5dc6bb80cbb9d179e85222af.png)'
- en: Image by author of aggregated, anonymized data. Both Perplexity Pro and Google’s
    Gemini 1.5 Pro hallucinated Cluster Topics when given an externally-generated
    embedding column. Conclusion — when performing NLP with prompts, just keep the
    raw text and let the LLM create its own embeddings behind the scenes. Feeding
    in externally-generated embeddings seems to confuse the LLM!
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由聚合、匿名化数据的作者提供。Perplexity Pro和Google的Gemini 1.5 Pro在给定外部生成的嵌入列时，都产生了关于聚类主题的幻觉。结论——在进行带有提示的NLP操作时，只需保留原始文本，让LLM在幕后创建自己的嵌入向量。输入外部生成的嵌入向量似乎会混淆LLM！
- en: '**Clustering Across Multiple Discord Servers**'
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**跨多个Discord服务器进行聚类**'
- en: Finally, I broadened the analysis to include Discord messages from three different
    VectorDB vendors. The resulting visualization highlighted common issues — like
    both Milvus and Chroma facing authentication problems.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我将分析范围扩大到包括来自三个不同VectorDB供应商的Discord消息。生成的可视化突出了常见问题——例如，Milvus和Chroma都面临着身份验证问题。
- en: '![](../Images/b0cc3862ec606d013a01b292b5357048.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b0cc3862ec606d013a01b292b5357048.png)'
- en: 'Image by author of aggregated, anonymized data: A multi-vendor VectorDB dashboard
    displays top issues across many companies. One thing that stands out is both Milvus
    and Chroma are having trouble with Authentication.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者提供的聚合、匿名化数据图像：多厂商 VectorDB 仪表板显示了许多公司的顶级问题。值得注意的是，Milvus 和 Chroma 都在身份验证方面遇到了麻烦。
- en: '**Summary**'
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**总结**'
- en: 'Here’s a summary of the steps I followed to perform semantic clustering using
    LLM prompts:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我在使用 LLM 提示进行语义聚类时遵循的步骤总结：
- en: Extract Discord threads.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提取 Discord 线程。
- en: Format data into conversation turns with roles (“user”, “assistant”).
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据格式化为带有角色的对话轮次（“用户”，“助手”）。
- en: Score sentiment and save as CSV.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评分情感并保存为 CSV。
- en: Prompt Google Gemini 2.0 flash for thread summaries.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 Google Gemini 2.0 快闪提示进行线程摘要。
- en: Prompt Perplexity Pro or Gemini 2.0 Pro for clustering based on thread summaries
    using the same CSV.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用相同的 CSV 文件，通过 Prompt Perplexity Pro 或 Gemini 2.0 Pro 进行基于线程摘要的聚类。
- en: Prompt Perplexity Pro or Gemini 2.0 Pro to write [Streamlit](https://streamlit.io/)
    code to visualize clusters (because I’m not a JS expert 😆).
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 Prompt Perplexity Pro 或 Gemini 2.0 Pro 编写 [Streamlit](https://streamlit.io/)
    代码以可视化聚类（因为我不是 JavaScript 专家 😆）。
- en: By following these steps, you can quickly transform raw forum data into actionable
    insights — what used to take days of coding can now be done in just one afternoon!
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些步骤，您可以快速将原始论坛数据转换为可操作的见解——过去需要几天编码的工作现在只需一个下午就能完成！
