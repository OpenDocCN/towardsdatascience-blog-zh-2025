- en: 'The Cultural Impact of AI Generated Content: Part 2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI生成内容的文化影响：第二部分
- en: 原文：[https://towardsdatascience.com/the-cultural-impact-of-ai-generated-content-part-2-228bf685b8ff/](https://towardsdatascience.com/the-cultural-impact-of-ai-generated-content-part-2-228bf685b8ff/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-cultural-impact-of-ai-generated-content-part-2-228bf685b8ff/](https://towardsdatascience.com/the-cultural-impact-of-ai-generated-content-part-2-228bf685b8ff/)
- en: '![Photo by Meszárcsek Gergely on Unsplash](../Images/b8acbfea3c9cd44f7953404389bbc7dd.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![图片由Meszárcsek Gergely在Unsplash提供](../Images/b8acbfea3c9cd44f7953404389bbc7dd.png)'
- en: Photo by [Meszárcsek Gergely](https://unsplash.com/@geri_art?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Meszárcsek Gergely](https://unsplash.com/@geri_art?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供
- en: '[In my prior column](https://medium.com/towards-data-science/the-cultural-impact-of-ai-generated-content-part-1-6e6a8a51800f),
    I established how AI generated content is expanding online, and described scenarios
    to illustrate why it’s occurring. (Please read [that](https://medium.com/towards-data-science/the-cultural-impact-of-ai-generated-content-part-1-6e6a8a51800f)
    before you go on here!) Let’s move on now to talking about what the impact is,
    and what possibilities the future might hold.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的专栏文章中（[In my prior column](https://medium.com/towards-data-science/the-cultural-impact-of-ai-generated-content-part-1-6e6a8a51800f)），我阐述了AI生成内容是如何在线上扩展的，并描述了说明为什么这种情况发生的场景。（请在继续阅读之前先阅读[that](https://medium.com/towards-data-science/the-cultural-impact-of-ai-generated-content-part-1-6e6a8a51800f)！）现在让我们继续讨论这种影响是什么，以及未来可能有哪些可能性。
- en: Social and Creative Creatures
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 社交和创意生物
- en: Human beings are social creatures, and visual ones as well. We learn about our
    world through images and language, and we use visual inputs to shape how we think
    and understand concepts. We are shaped by our surroundings, whether we want to
    be or not.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 人类是社交生物，也是视觉生物。我们通过图像和语言了解我们的世界，我们使用视觉输入来塑造我们的思考和概念理解。无论我们是否愿意，我们都会受到周围环境的影响。
- en: Accordingly, no matter how much we are consciously aware of the existence of
    AI generated content in our own ecosystems of media consumption, our subconscious
    response and reaction to that content will not be fully within our control. As
    the truism goes, everyone thinks they’re immune to advertising – they’re too smart
    to be led by the nose by some ad executive. But advertising continues! Why? Because
    it works. It inclines people to make purchasing choices that they otherwise wouldn’t
    have, whether just from increasing brand visibility, to appealing to emotion,
    or any other advertising technique.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，无论我们多么清醒地意识到在我们自己的媒体消费生态系统中存在AI生成的内容，我们对这些内容的潜意识反应和反应将不会完全在我们控制之下。正如俗话所说，每个人都认为自己对广告免疫——他们太聪明了，不会被某个广告主管牵着鼻子走。但广告仍在继续！为什么？因为它有效。它促使人们做出他们否则不会做出的购买选择，无论是仅仅通过增加品牌可见性，还是通过触动情感，或其他任何广告技巧。
- en: AI-generated content may end up being similar, albeit in a less controlled way.
    We’re all inclined to believe we’re not being fooled by some bot with an LLM generating
    text in a chat box, but in subtle or overt ways, we’re being affected by the continued
    exposure. As much as it may be alarming that advertising really does work on us,
    consider that with advertising the subconscious or subtle effects are being designed
    and intentionally driven by ad creators. In the case of generative AI, a great
    deal of what goes into creating the content, no matter what its purpose, is based
    on an algorithm using historical information to choose the features most likely
    to appeal, based on its training, and human actors are less in control of what
    that model generates.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的内容最终可能类似，尽管方式可能不那么受控。我们都倾向于相信我们不会被某个在聊天框中生成文本的LLM机器人所欺骗，但无论是微妙还是明显的方式，我们都在持续暴露中受到影响。尽管广告确实对我们有效可能令人震惊，但考虑到广告中潜意识或微妙的效果是由广告创作者设计和有意推动的，这一点值得考虑。在生成式AI的情况下，无论内容的目的如何，创造内容的大部分内容都是基于使用历史信息来选择最有可能吸引其训练数据的特征的算法，而人类演员对模型生成的内容的控制力较弱。
- en: I mean to say that the results of generative AI routinely surprise us, because
    we’re not that well attuned to what our history really says, and we often don’t
    think of edge cases or interpretations of prompts we write. The patterns that
    AI is uncovering in the data are sometimes completely invisible to human beings,
    and we can’t control how these patterns influence the output. As a result, our
    thinking and understanding are being influenced by models that we don’t completely
    understand and can’t always control.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我的意思是说，生成式AI的结果经常让我们感到惊讶，因为我们并没有很好地适应我们历史真正告诉我们的内容，我们通常也不会考虑我们编写的提示的边缘情况或解释。AI在数据中发现的模式有时对人类来说是完全看不见的，我们无法控制这些模式如何影响输出。因此，我们的思考和理解正受到我们不完全理解且无法总是控制的模型的影响。
- en: Critical Thinking
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 批判性思维
- en: Beyond that, as I’ve mentioned, [public critical thinking and critical media
    consumption skills are struggling to keep pace with AI generated content](https://www.psu.edu/news/information-sciences-and-technology/story/qa-increasing-difficulty-detecting-ai-versus-human),
    to give us the ability to be as discerning and thoughtful as the situation demands.
    Similarly to the development of Photoshop, we need to adapt, but it’s unclear
    whether we have the ability to do so.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，正如我提到的，[公共批判性思维和批判性媒体消费技能正努力跟上AI生成内容](https://www.psu.edu/news/information-sciences-and-technology/story/qa-increasing-difficulty-detecting-ai-versus-human)，以便我们能够像情况所要求的那样具有辨别力和深思熟虑。类似于Photoshop的发展，我们需要适应，但尚不清楚我们是否有能力做到这一点。
- en: We are all learning tell-tale signs of AI generated content, such as certain
    visual clues in images, or phrasing choices in text. The average internet user
    today has learned a huge amount in just a few years about what AI generated content
    is and what it looks like. However, suppliers of the models used to create this
    content are trying to improve their performance to make such clues subtler, attempting
    to close the gap between obviously AI generated and obviously human produced media.
    We’re in a race with AI companies, to see whether they can make more sophisticated
    models faster than we can learn to spot their output.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都在学习AI生成内容的明显迹象，比如图像中的某些视觉线索，或者文本中的措辞选择。如今，普通互联网用户在短短几年内就学到了大量关于AI生成内容是什么以及它看起来像什么的知识。然而，用于创建这种内容的模型的供应商正在努力提高其性能，使这些线索更加微妙，试图缩小明显由AI生成和明显由人类生产的媒体之间的差距。我们与AI公司展开了一场竞赛，看他们是否能比我们更快地学会识别他们的输出。
- en: We’re in a race with AI companies, to see whether they can make more sophisticated
    models faster than we can learn to spot their output.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们与AI公司展开了一场竞赛，看他们是否能比我们更快地制造出更复杂的模型。
- en: 'In this race, it’s unclear if [we](https://dl.acm.org/doi/abs/10.1145/3658644.3670306)
    will catch up, as people’s perceptions of patterns and aesthetic data have limitations.
    (If you’re skeptical, try your hand at detecting AI generated text: [https://roft.io/](https://roft.io/))
    We can’t examine images down to the pixel level the way a model can. We can’t
    independently analyze word choices and frequencies throughout a document at a
    glance. We can and should build tools that help do this work for us, and there
    are some promising approaches for this, but when it’s just us facing an image,
    a video, or a paragraph, it’s just our eyes and brains versus the content. Can
    we win? Right now, we [often](https://iris.uniroma1.it/bitstream/11573/1710645/1/Maiano_Human_2024.pdf)
    don’t. People are fooled every day by AI-generated content, and for every piece
    that gets debunked or revealed, there must be many that slip past us unnoticed.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这场竞赛中，我们是否能够[赶上](https://dl.acm.org/doi/abs/10.1145/3658644.3670306)还不清楚，因为人们对模式和审美数据的感觉有限。（如果你持怀疑态度，可以尝试检测AI生成的文本：[https://roft.io/](https://roft.io/))
    我们无法像模型那样逐像素检查图像。我们无法一眼就独立分析文档中的词汇选择和频率。我们可以也应该构建帮助我们完成这项工作的工具，并且有一些有希望的方法，但当我们只是面对一张图片、一段视频或一段段落时，我们只有我们的眼睛和大脑与内容对抗。我们能赢吗？目前，我们[经常](https://iris.uniroma1.it/bitstream/11573/1710645/1/Maiano_Human_2024.pdf)不能。人们每天都在被AI生成的内容所欺骗，对于每一篇被揭穿或揭露的文章，肯定有许多我们未察觉地滑过的。
- en: One takeaway to keep in mind is that it’s not just a matter of "people need
    to be more discerning" – it’s not as simple as that, and if you don’t catch AI
    generated materials or deepfakes when they cross your path every time, it’s not
    all your fault. This is being made increasingly difficult on purpose.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 需要记住的一个启示是，这不仅仅是“人们需要更加挑剔”的问题——事情并没有那么简单，如果你每次遇到AI生成的材料或深度伪造时都没有捕捉到，这并不全是你的错。这被故意变得越来越困难。
- en: Plus, Bots!
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加上，还有机器人！
- en: So, living in this reality, we have to cope with a disturbing fact. We can’t
    trust what we see, at least not in the way we have become accustomed to. In a
    lot of ways, however, this isn’t that new. As I described in my first part of
    this series, we kind of know, deep down, that photographs may be manipulated to
    change how we interpret them and how we perceive events. Hoaxes have been perpetuated
    with newspapers and radio since their invention as well. But it’s a little different
    because of the race – the hoaxes are coming fast and furious, always getting a
    little more sophisticated and a little harder to spot.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，生活在这个现实世界中，我们必须应对一个令人不安的事实。我们无法相信我们所看到的，至少不是我们习惯的那种方式。然而，在许多方面，这并不是什么新鲜事。正如我在本系列的第一个部分所描述的，我们内心深处都知道，照片可能会被操纵以改变我们对它们的解释和我们对事件的感知。报纸和广播自发明以来就一直在传播骗局。但有一点不同，因为竞争——骗局正在迅速且激烈地出现，总是变得越来越复杂，越来越难以察觉。
- en: We can’t trust what we see, at least not in the way we have become accustomed
    to.
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们无法相信我们所看到的，至少不是我们习惯的那种方式。
- en: There’s also an additional layer of complexity in the fact that a large amount
    of the AI generated content we see, particularly on social media, is being created
    and posted by bots (or agents, in the new generative AI parlance), for engagement
    farming/clickbait/scams and other purposes as I discussed in part 1 of this series.
    Frequently we are quite a few steps disconnected from a person responsible for
    the content we’re seeing, who used models and automation as tools to produce it.
    This obfuscates the origins of the content, and can make it harder to infer the
    artificiality of the content by context clues. If, for example, a post or image
    seems too good (or weird) to be true, I might investigate the motives of the poster
    to help me figure out if I should be skeptical. Does the user have a credible
    history, or institutional affiliations that inspire trust? But what if the poster
    is a fake account, with an AI generated profile picture and fake name? It only
    adds to the challenge for a regular person to try and spot the artificiality and
    avoid a scam, deepfake, or fraud.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一个额外的复杂性层面，那就是我们看到的很大一部分AI生成内容，尤其是在社交媒体上，是由机器人（或新生成AI术语中的代理）创建和发布的，目的是为了参与农场/点击诱饵/诈骗和其他目的，正如我在本系列的第一个部分所讨论的。我们通常与负责我们看到的内容的个人相隔数步之遥，他们使用模型和自动化作为工具来生产内容。这模糊了内容的来源，并可能使通过上下文线索推断内容的虚假性变得更加困难。例如，如果一条帖子或图片看起来太好（或奇怪）以至于不真实，我可能会调查发帖者的动机，以帮助我判断我是否应该怀疑。用户是否有可信的历史，或者有值得信赖的机构联系？但万一发帖者是一个假账户，有AI生成的头像和假名字呢？这只会给普通人尝试识别虚假性并避免诈骗、深度伪造或欺诈增加挑战。
- en: As an aside, I also think there’s general harm from our continued exposure to
    unlabeled bot content. When we get more and more social media in front of us that
    is fake and the "users" are plausibly convincing bots, we can end up dehumanizing
    all social media engagement outside of people we know in analog life. People already
    struggle to humanize and empathize through computer screens, hence the longstanding
    problems with abuse and mistreatment online in comments sections, on social media
    threads, and so on. **Is there a risk that people’s numbness to humanity online
    worsens, and degrades the way they respond to people and models/bots/computers?**
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 作为补充，我也认为我们持续接触未标记的机器人内容会带来普遍的损害。当我们面前越来越多的社交媒体内容是虚假的，而“用户”可能是令人信服的机器人时，我们可能会最终使所有除了我们现实生活中认识的人之外的社会媒体互动都变得非人性化。人们已经通过电脑屏幕努力实现人性化并产生同理心，因此长期以来在线评论部分、社交媒体帖子等问题上存在滥用和虐待。**人们在网上对人类的麻木感是否会加剧，并降低他们对人和模型/机器人/计算机的反应方式吗？**
- en: What Now?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现在怎么办？
- en: How do we as a society respond, to try and prevent being taken in by AI-generated
    fictions? There’s no amount of individual effort or "do your homework" that can
    necessarily get us out of this. The patterns and clues in AI-generated content
    may be undetectable to the human eye, and even undetectable to the person who
    built the model. Where you might normally do online searches to validate what
    you see or read, those searches are heavily populated with AI-generated content
    themselves, so they are increasingly no more trustworthy than anything else. We
    absolutely need photographs, videos, text, and music to learn about the world
    around us, as well as to connect with each other and understand the broader human
    experience. Even though this pool of material is becoming poisoned, we can’t quit
    using it.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们作为社会应该如何回应，以尝试防止被AI生成的虚构故事所欺骗？无论个人付出多少努力或“做好你的作业”，都不一定能让我们摆脱这种困境。AI生成内容中的模式和线索可能对人类眼睛来说是不可检测的，甚至对构建模型的人来说也是不可检测的。你通常会在网上搜索以验证你所看到或读到的内容，但这些搜索本身充满了AI生成的内容，因此它们越来越不可信。我们绝对需要照片、视频、文本和音乐来了解我们周围的世界，以及与他人建立联系和理解更广泛的人类经验。即使这个材料池正在被毒化，我们也不能停止使用它。
- en: There are a number of possibilities for what I think might come next that could
    help with this dilemma.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我认为接下来可能出现的各种可能性，这有助于解决这个困境。
- en: '**AI declines in popularity or fails due to resource issues.** There are a
    lot of factors that threaten the growth and expansion of generative AI commercially,
    and these are mostly not mutually exclusive. Generative AI very possibly could
    suffer some degree of collapse due to AI generated content infiltrating the training
    datasets. [Economic](https://medium.com/towards-data-science/the-coming-copyright-reckoning-for-generative-ai-b7fe0963c58f)
    and/or [environmental](https://medium.com/towards-data-science/environmental-implications-of-the-ai-boom-279300a24184)
    challenges (insufficient power, natural resources, or capital for investment)
    could all slow down or hinder the expansion of AI generation systems. Even if
    these issues don’t affect the commercialization of generative AI, they could create
    barriers to the technology’s progressing further past the point of easy human
    detection.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI因资源问题而失去人气或失败**。有很多因素威胁着生成式AI在商业上的增长和扩张，而这些因素大多不是相互排斥的。生成式AI很可能因为AI生成的内容渗透到训练数据集中而遭受一定程度的中断。经济[挑战](https://medium.com/towards-data-science/the-coming-copyright-reckoning-for-generative-ai-b7fe0963c58f)和/或环境[挑战](https://medium.com/towards-data-science/environmental-implications-of-the-ai-boom-279300a24184)（电力不足、自然资源或投资资本）都可能减缓或阻碍AI生成系统的扩张。即使这些问题不影响生成式AI的商业化，它们也可能成为技术进一步发展的障碍，超过人类容易检测到的程度。'
- en: '**Organic content becomes premium and gains new market appeal.** If we are
    swarmed with AI generated content, that becomes cheap and low quality, but the
    scarcity of organic, human-produced content may drive a demand for it. In addition,
    there is a significant growth already in backlash against AI. When customers and
    consumers find AI generated material off-putting, companies will move to adapt.
    This aligns with some arguments that AI is in a bubble, and that the excessive
    hype will die down in time.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有机内容成为高端产品并吸引新的市场吸引力**。如果我们被AI生成的内容所淹没，那么这些内容就会变得廉价且质量低下，但有机、人类产生的内容的稀缺可能会推动对其的需求。此外，对AI的抵制已经显著增长。当客户和消费者发现AI生成的材料令人反感时，公司将会转向适应。这与一些观点相符，即AI正处于泡沫中，过度的炒作最终会平息。'
- en: '**Technological work challenges the negative effects of AI.** Detector models
    and algorithms will be necessary to differentiate organic and generated content
    where we can’t do it ourselves, and work is already going on in this direction.
    As generative AI grows in sophistication, making this necessary, a commercial
    and social market for these detector models may develop. [These models need to
    become a lot more accurate than they are today](https://edscoop.com/ai-detectors-are-easily-fooled-researchers-find/)
    for this to be possible – we don’t want to rely upon [notably bad models like
    those being used to identify generative AI content in student essays in educational
    institutions today](https://www.trails.umd.edu/news/detecting-ai-may-be-impossible-thats-a-big-problem-for-teachers).
    But, a lot of work is being done in this space, so there’s reason for hope. (I
    have included a few research papers on these topics in the notes at the end of
    this article.)'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术工作挑战了人工智能的负面影响**。在无法自行区分有机内容和生成内容的地方，检测模型和算法将是必要的，在这方面的工作已经在进行中。随着生成式人工智能的复杂性增加，这使得这一点变得必要，这些检测模型的商业和社会市场可能会发展。为了实现这一点，[这些模型需要比现在更准确得多](https://edscoop.com/ai-detectors-are-easily-fooled-researchers-find/)
    ——我们不希望依赖于[明显糟糕的模型，例如现在在教育机构中用于识别学生论文中生成式人工智能内容的那些模型](https://www.trails.umd.edu/news/detecting-ai-may-be-impossible-thats-a-big-problem-for-teachers)。但是，在这个领域正在进行大量工作，因此有理由保持希望。（我在本文末尾的注释中包含了一些关于这些主题的研究论文。）'
- en: '**Regulatory efforts expand and gain sophistication.** Regulatory frameworks
    may develop sufficiently to be helpful in reining in the excesses and abuses generative
    AI enables. Establishing accountability and provenance for AI agents and bots
    would be a massively positive step. However, all this relies on the effectiveness
    of governments around the world, which is always uncertain. We know big tech companies
    are intent on fighting against regulatory obligations and have immense resources
    to do so.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监管努力扩展并变得更加复杂**。监管框架可能发展到足以帮助遏制生成式人工智能带来的过度和滥用。为人工智能代理和机器人建立问责制和来源将是迈出巨大积极一步。然而，所有这些都依赖于世界各地政府的效果，这始终是不确定的。我们知道大型科技公司有意对抗监管义务，并且拥有巨大的资源来做这件事。'
- en: I think it very unlikely that generative AI will continue to gain sophistication
    at the rate seen in 2022–2023, unless a significantly different training methodology
    is developed. We are running short of organic training data, and throwing more
    data at the problem is showing diminishing returns, for exorbitant costs. I am
    concerned about the ubiquity of AI-generated content, but I (optimistically) don’t
    think these technologies are going to advance at more than a slow incremental
    rate going forward, for reasons I have written about [before](https://medium.com/towards-data-science/how-do-we-know-if-ai-is-smoke-and-mirrors-16ed5b6877aa).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为生成式人工智能将继续以2022-2023年看到的速度继续发展，除非开发出显著不同的训练方法。我们有机训练数据正在减少，向问题投入更多数据正显示出收益递减，成本高昂。我对人工智能生成内容的普遍性感到担忧，但我（乐观地）不认为这些技术将以后以超过缓慢渐进的速度发展，原因我在之前[写过](https://medium.com/towards-data-science/how-do-we-know-if-ai-is-smoke-and-mirrors-16ed5b6877aa)。
- en: This means our efforts to moderate the negative externalities of generative
    AI have a pretty clear target. While we continue to struggle with difficulty detecting
    AI-generated content, we have a chance to catch up if technologists and regulators
    put the effort in. I also think it is vital that we work to counteract the cynicism
    this AI "slop" inspires. I love machine learning, and I’m very glad to be a part
    of this field, but I’m also a sociologist and a citizen, and we need to take care
    of our communities and our world as well as pursuing technical progress.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们努力调节生成式人工智能的负面影响有一个相当明确的目标。虽然我们继续在检测人工智能生成内容方面遇到困难，但如果技术专家和监管机构付出努力，我们就有机会迎头赶上。我还认为，我们努力对抗这种人工智能“垃圾”带来的怀疑主义至关重要。我爱机器学习，我很高兴成为这个领域的一部分，但我也是一名社会学家和公民，我们需要照顾我们的社区和我们的世界，同时追求技术进步。
