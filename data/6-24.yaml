  type: TYPE_NORMAL
  zh: 如何安全地将Microsoft Fabric连接到Azure Databricks SQL API
- en: 原文：[https://towardsdatascience.com/how-to-securely-connect-microsoft-fabric-to-azure-databricks-sql-api-50d363c71104/](https://towardsdatascience.com/how-to-securely-connect-microsoft-fabric-to-azure-databricks-sql-api-50d363c71104/)
