  id: totrans-175
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**GitHub – qtalen/multi-agent-customer-service**](https://github.com/qtalen/multi-agent-customer-service)'
- en: '* * *'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Conclusion
  id: totrans-177
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: To summarize today’s lesson, in this customer service chatbot project, we successfully
    simulated the agent handoff capability of OpenAI Swarm using LlamaIndex Workflow,
    achieving seamless collaboration among multiple agents.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 总结今天的课程，在这个客户服务聊天机器人项目中，我们成功使用LlamaIndex Workflow模拟了OpenAI Swarm的代理转交功能，实现了多个代理之间的无缝协作。
- en: 'We can see that the agents handoff brings obvious advantages to the project:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，代理转交给项目带来了明显的优势：
- en: The workflow autonomously decides which agent to use based on the dialogue context,
    there is no fixed code process, and it is completely decided by LLM.
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 工作流程根据对话上下文自主决定使用哪个代理，没有固定的代码流程，完全由LLM决定。
- en: Once the workflow decides which agent will serve the user, the user interacts
    directly with the corresponding agent, without any intermediate steps.
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦工作流程决定哪个代理将为用户提供服务，用户将直接与相应的代理互动，没有任何中间步骤。
- en: 'However, there are still some shortcomings in the project:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，项目中还有一些不足之处：
- en: The call to the agent is too low-level, causing us to handle the function calling
    process in the code.
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对代理的调用太低级，导致我们在代码中处理函数调用过程。
- en: The modularity of the workflow is not well done, I have also mentioned this
    in previous articles, which brings some obstacles to team collaboration.
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 工作流程的模块化做得不好，我也在之前的文章中提到过，这给团队协作带来了一些障碍。
- en: I look forward to gradually solving these problems in the upcoming articles.
    I welcome your comments and discussions and will reply to everyone as soon as
    possible.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 我期待在未来的文章中逐步解决这些问题。欢迎您的评论和讨论，我会尽快回复每个人。
