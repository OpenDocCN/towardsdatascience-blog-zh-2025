- en: Google’s AlphaEvolve Is Evolving New Algorithms — And It Could Be a Game Changer
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 谷歌的AlphaEvolve正在进化新的算法——它可能是一个游戏规则的改变者
- en: 原文：[https://towardsdatascience.com/googles-alphaevolve-is-evolving-new-algorithms-and-it-could-be-a-game-changer/](https://towardsdatascience.com/googles-alphaevolve-is-evolving-new-algorithms-and-it-could-be-a-game-changer/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/googles-alphaevolve-is-evolving-new-algorithms-and-it-could-be-a-game-changer/](https://towardsdatascience.com/googles-alphaevolve-is-evolving-new-algorithms-and-it-could-be-a-game-changer/)
- en: '![AlphaEvolve as a genetic algorithm coupled to a large language model](../Images/bf9ab3a2915716c171276f2905564b8e.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![AlphaEvolve作为与大型语言模型耦合的遗传算法](../Images/bf9ab3a2915716c171276f2905564b8e.png)'
- en: AlphaEvolve imagined as a genetic algorithm coupled to a large language model.
    Picture created by the author using various tools including Dall-E3 via ChatGPT.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 将AlphaEvolve想象为与大型语言模型耦合的遗传算法。这幅图是由作者使用包括Dall-E3通过ChatGPT在内的各种工具创作的。
- en: <mdspan datatext="el1747355961098" class="mdspan-comment">Large Language</mdspan>
    Models have undeniably revolutionized how many of us approach coding, but they’re
    often more like a super-powered intern than a seasoned architect. Errors, bugs
    and hallucinations happen all the time, and it might even happen that the code
    runs well but… it’s not doing exactly what we wanted.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747355961098" class="mdspan-comment">大型语言模型</mdspan>无疑已经革命性地改变了我们许多人对待编码的方式，但它们往往更像是一个超级实习生，而不是经验丰富的建筑师。错误、bug和幻觉时常发生，甚至可能发生代码运行良好，但…它并没有做我们想要的事情。
- en: 'Now, imagine an AI that doesn’t just write code based on what it’s seen, but
    actively *evolves* it. To a first surprise, this means you increase the chances
    of getting the right code written; however, it goes far beyond: Google showed
    that it can also use such AI methodology to discover new algorithms that are faster,
    more efficient, and sometimes, entirely new.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象一个AI不仅根据它所看到的编写代码，而且积极地*进化*它。出人意料的是，这意味着你增加了编写正确代码的机会；然而，它远远超出了这个范围：谷歌展示了它可以使用这种AI方法来发现更快、更高效，有时甚至是全新的算法。
- en: 'I’m talking about AlphaEvolve, the recent bombshell from Google DeepMind. Let
    me say it again: it isn’t just another code generator, but rather a system that
    generates and evolves code, allowing it to discover new algorithms. Powered by
    Google’s formidable Gemini models (that I intend to cover soon, because I’m amazed
    at their power!), AlphaEvolve could revolutionize how we approach coding, mathematics,
    algorithm design, and why not data analysis itself.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我在谈论AlphaEvolve，这是谷歌DeepMind最近的一个重磅炸弹。让我再说一遍：它不仅仅是一个代码生成器，而是一个生成和进化代码的系统，允许它发现新的算法。由谷歌强大的Gemini模型（我打算很快介绍，因为我对其力量感到震惊！）提供支持，AlphaEvolve可能会彻底改变我们对待编码、数学、算法设计，甚至数据分析的方式。
- en: How Does AlphaEvolve ‘Evolve’ Code?
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AlphaEvolve是如何“进化”代码的？
- en: Think of it like natural selection, but for software. That is, think about Genetic
    Algorithms, which have existed in data science, numerical methods and computational
    mathematics for decades. Briefly, instead of starting from scratch every time,
    AlphaEvolve takes an initial piece of code – possibly a “skeleton” provided by
    a human, with specific areas marked for improvement – and then runs on it an iterative
    process of refinement.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，就像自然选择，但针对软件。也就是说，考虑一下已经存在于数据科学、数值方法和计算数学几十年的遗传算法。简而言之，AlphaEvolve不是每次都从头开始，而是从一个初始的代码片段开始——可能是人类提供的“骨架”，其中标明了需要改进的特定区域——然后对其进行迭代的过程进行优化。
- en: 'Let me summarize here the procedure detailed in Deepmind’s white paper:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我在这里总结一下Deepmind的白皮书中详细说明的程序：
- en: '**Intelligent prompting:** AlphaEvolve is “smart” enough to craft its own prompts
    for the underlying Gemini LLM. These prompts instruct Gemini to act like a world-class
    expert in a specific domain, armed with context from previous attempts, including
    the points that seemed to have worked correctly and those that are clear failures.
    This is where those massive context windows of models like Gemini (even you can
    run up to a million tokens at Google’s AI studio) come into play.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**智能提示**：AlphaEvolve“足够聪明”，可以为底层的Gemini LLM构建自己的提示。这些提示指示Gemini像某个特定领域的世界级专家一样行动，拥有来自先前尝试的上下文，包括似乎工作正确的点和明显的失败点。这就是像Gemini这样的模型（甚至在谷歌的AI工作室中你可以运行多达一百万个标记）的巨大上下文窗口发挥作用的地方。'
- en: '**Creative mutation:** The LLM then generates a diverse pool of “candidate”
    solutions – variations and mutations of the original code, exploring different
    approaches to solve the given problem. This parallels very closely the inner working
    of regular genetic algorithms.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**创造性突变：** 然后LLM生成一个多样化的“候选”解决方案池——原始代码的变体和突变，探索解决给定问题的不同方法。这非常接近常规遗传算法的内部工作原理。'
- en: '**Survival of the fittest:** Again like in genetic algorithms, but candidate
    solutions are automatically compiled, run, and rigorously evaluated against predefined
    metrics.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**适者生存：** 再次像在遗传算法中一样，但候选解决方案会自动编译、运行，并严格根据预定义的指标进行评估。'
- en: '**Breeding of the top programs:** The best-performing solutions are selected
    and become the “parents” for a next generation, just like in genetic algorithms.
    The successful traits of the parent programs are fed back into the prompting mechanism.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**顶级程序的繁殖：** 表现最好的解决方案被选中，成为下一代“父母”，就像在遗传算法中一样。父母程序的优良特性被反馈到提示机制中。'
- en: '**Repeat (to evolve):** This cycle – generate, test, select, learn – repeats,
    and with each iteration, AlphaEvolve explores the vast search space of possible
    programs thus gradually homing in on solutions that are better and better, while
    purging those that fail. The longer you let it run (what the researchers call
    “test-time compute”), the more sophisticated and optimized the solutions can become.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**重复（以进化）：** 这个循环——生成、测试、选择、学习——是重复的，并且随着每一次迭代，AlphaEvolve探索可能的程序的大搜索空间，从而逐渐聚焦于更好和更好的解决方案，同时清除那些失败的方案。你让它运行的时间越长（研究人员称之为“测试时间计算”），解决方案可以变得更加复杂和优化。'
- en: Building on Previous Attempts
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立在先前的尝试之上
- en: AlphaEvolve is the successor to earlier Google projects like AlphaCode (which
    tackled competitive programming) and, more directly, of FunSearch. FunSearch was
    a fascinating proof of concept that showed how LLMs could discover new mathematical
    insights by evolving small Python functions.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: AlphaEvolve是早期Google项目如AlphaCode（解决竞技编程）和FunSearch（更直接地说）的继承者。FunSearch是一个令人着迷的概念证明，展示了LLM如何通过进化小的Python函数来发现新的数学见解。
- en: AlphaEvolve took that concept and “injected it with steroids”. I mean this for
    various reasons…
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: AlphaEvolve将这个概念“注入了类固醇”。我是指这个意思……
- en: First, because thanks to Gemini’s huge token window, AlphaEvolve can grapple
    with entire codebases, hundreds of lines long, not just tiny functions as in the
    early tests like FunSearch. Second, because like other LLMs, Gemini has seen thousands
    and thousands of code in tens of programming languages; hence it has covered a
    wider variety of tasks (as typically different languages are used more in some
    domains than others) and it became a kind of polyglot programmer.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，由于Gemini拥有巨大的token窗口，AlphaEvolve可以处理整个代码库，长达数百行，而不仅仅是像早期测试FunSearch那样的微小函数。其次，因为像其他LLM一样，Gemini已经看到了成千上万种代码，涉及数十种编程语言；因此，它涵盖了更广泛的任务（因为通常不同的语言在某个领域比其他领域使用得更多），它成为了一种多语言程序员。
- en: Note that with smarter LLMs as engines, AlphaEvolve can itself evolve to become
    faster and more efficient in its search for solutions and optimal programs.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，随着更智能的LLM作为引擎，AlphaEvolve本身可以进化，以在寻找解决方案和最优程序时变得更加快速和高效。
- en: AlphaEvolve’s Mind-Blowing Results on Real-World Problems
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AlphaEvolve在现实世界问题上的令人惊叹的结果
- en: 'Here are the most interesting applications presented in the white paper:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在白皮书中展示了以下最有趣的应用：
- en: '**Optimizing efficiency at Google’s data centers:** AlphaEvolve discovered
    a new scheduling heuristic that squeezed out a 0.7% saving in Google’s computing
    resources. This may look small, but Google’s scale this means a substantial ecological
    and monetary cut!'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化Google数据中心效率：** AlphaEvolve发现了一种新的调度启发式方法，在Google的计算资源中节省了0.7%。这可能看起来很小，但考虑到Google的规模，这意味着实质性的生态和货币削减！'
- en: '**Designing better AI chips:** AlphaEvolve could simplify some of the complex
    circuits within Google’s TPUs, specifically for the matrix multiplication operations
    that are the lifeblood of modern AI. This improves calculation speeds and again
    contributes to lower ecological and economical costs.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计更好的AI芯片：** AlphaEvolve可以简化Google的TPU中的一些复杂电路，特别是对于现代AI的生命线——矩阵乘法操作。这提高了计算速度，再次有助于降低生态和经济成本。'
- en: '**Faster AI training:** AlphaEvolve even turned its optimization gaze inward,
    by accelerating a matrix multiplication library used in training the very Gemini
    models that power it! This means a slight but sizable reduction in AI training
    times and again lower ecological and economical costs!'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更快的AI训练：**AlphaEvolve甚至将它的优化目光转向了内部，通过加速训练它所依赖的Gemini模型所使用的矩阵乘法库！这意味着AI训练时间略有但显著减少，再次降低了生态和经济成本！'
- en: '**Numerical methods:** In a kind of validation test, AlphaEvolve was set loose
    on over 50 notoriously tricky open problems in mathematics. In around 75% of them,
    it independently rediscovered the best-known human solutions!'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数值方法：**在一种验证测试中，AlphaEvolve被释放到超过50个臭名昭著的数学难题中。在其中的大约75%中，它独立地重新发现了最著名的人类解决方案！'
- en: Towards Self-Improving AI?
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向着自我改进的AI？
- en: One of the most profound implications of tools like AlphaEvolve is the “virtuous
    cycle” by which AI could improve AI models themselves. Moreover, more efficient
    models and hardware make AlphaEvolve itself more powerful, enabling it to discover
    even deeper optimizations. That’s a feedback loop that could dramatically accelerate
    AI progress, and lead who knows where. This is somehow using AI to make AI better,
    faster, and smarter – a genuine step on the path towards more powerful and perhaps
    general artificial intelligence.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 工具如AlphaEvolve的最深远影响之一是AI能够通过“良性循环”改进AI模型本身。此外，更高效的模式和硬件使AlphaEvolve本身更加强大，使其能够发现更深层次的优化。这是一个可能极大地加速AI进步并导致未知领域的反馈循环。这是某种使用AI来使AI变得更好、更快、更智能的方式——这是通往更强大甚至可能是通用人工智能道路上的真正一步。
- en: Leaving aside this reflection, which quickly gets close to the realm of science
    function, the point is that for a vast class of problems in science, engineering,
    and computation, AlphaEvolve could represent a paradigm shift. As a computational
    chemist and biologist, I myself use tools based in LLMs and reasoning AI systems
    to assist my work, write and debug programs, test them, analyze data more rapidly,
    and more. With what Deepmind has presented now, it becomes even clearer that we
    approach a future where AI doesn’t just execute human instructions but becomes
    a creative partner in discovery and innovation.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 不考虑这个反思，它很快就会接近科学功能的领域，关键是对于科学、工程和计算中的一大类问题，AlphaEvolve可能代表一个范式转变。作为一名计算化学家和生物学家，我自己使用基于LLMs和推理AI系统的工具来协助我的工作，编写和调试程序，测试它们，更快地分析数据等等。现在Deepmind所展示的，更加清晰地表明我们正走向一个未来，AI不仅仅是执行人类的指令，而是成为发现和创新中的创造性伙伴。
- en: Already for some months we have been moving from AI that completes our code
    to AI that creates it almost entirely, and tools like AlphaFold will push us to
    times where AI just sits to crack problems with (or for!) us, writing and evolving
    code to get to optimal and possibly entirely unexpected solutions. No doubt that
    the next few years are going to be wild.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 已经有几个月的时间，我们正在从完成我们代码的AI转向几乎完全创建代码的AI，像AlphaFold这样的工具将推动我们进入AI仅仅坐着解决问题（或为我们！）的时代，编写和进化代码以获得最优解，甚至可能是完全意想不到的解决方案。毫无疑问，接下来的几年将会非常疯狂。
