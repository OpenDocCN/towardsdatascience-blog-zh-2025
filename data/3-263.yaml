- en: 'Pandas Can’t Handle This: How ArcticDB Powers Massive Datasets'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Pandas无法处理：ArcticDB如何驱动大规模数据集
- en: 原文：[https://towardsdatascience.com/pandas-cant-handle-this-how-arcticdb-powers-massive-datasets/](https://towardsdatascience.com/pandas-cant-handle-this-how-arcticdb-powers-massive-datasets/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文：https://towardsdatascience.com/pandas-cant-handle-this-how-arcticdb-powers-massive-datasets/](https://towardsdatascience.com/pandas-cant-handle-this-how-arcticdb-powers-massive-datasets/)'
- en: Python has grown to dominate data science, and its package Pandas has become
    the go-to tool for data analysis. It is great for tabular data and supports data
    files of up to 1GB if you have a large RAM. Within these size limits, it is also
    good with time-series data because it comes with some in-built support.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: Python已经主导了数据科学，其包Pandas已成为数据分析的首选工具。它非常适合表格数据，如果你有大量的RAM，它支持高达1GB的数据文件。在这些大小限制内，它也很好地处理时间序列数据，因为它提供了一些内置支持。
- en: That being said, when it comes to larger datasets, Pandas alone might not be
    enough. And modern datasets are growing exponentially, whether they’re from finance,
    climate science, or other fields.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，当涉及到更大的数据集时，仅使用Pandas可能就不够了。而且，现代数据集正在呈指数级增长，无论是来自金融、气候科学还是其他领域。
- en: This means that, as of today, Pandas is a great tool for smaller projects or
    exploratory analysis. It is not great, however, when you’re facing bigger tasks
    or want to scale into production fast. Workarounds exist — [Dask](https://www.dask.org/), [Spark](https://spark.apache.org/docs/latest/api/python/index.html), [Polars](https://pola.rs/),
    and [chunking](https://realpython.com/how-to-split-a-python-list-into-chunks/) are
    some of them — but they come with additional complexity and bottlenecks.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，截至目前，Pandas对于小型项目或探索性分析来说是一个很好的工具。然而，当你面临更大的任务或想要快速扩展到生产环境时，它就不那么好了。存在一些解决方案——[Dask](https://www.dask.org/)、[Spark](https://spark.apache.org/docs/latest/api/python/index.html)、[Polars](https://pola.rs/)和[分块处理](https://realpython.com/how-to-split-a-python-list-into-chunks/)就是其中一些——但它们带来了额外的复杂性和瓶颈。
- en: I faced this problem recently. I was looking to see whether there are correlations
    between weather data from the past 10 years, and stock prices of energy companies.
    The rationale here is there might be sensitivities between global temperatures
    and the stock price evolution of fossil fuel- and renewable energy companies.
    If one found such sensitivities, that would be a strong signal for Big Energy
    CEOs to start cutting their emissions in their own self-interest.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近遇到了这个问题。我想看看过去10年的气象数据与能源公司股价之间是否存在相关性。这里的逻辑是，全球温度与化石燃料和可再生能源公司的股价演变之间可能存在敏感性。如果发现了这样的敏感性，这将是对大型能源公司首席执行官们开始削减自身排放的强烈信号。
- en: I obtained the stock price data quite easily through [Yahoo! Finance’s API](https://pypi.org/project/yfinance/).
    I used 16 stocks and ETFs — seven fossil fuel companies, six renewables companies,
    and three energy ETFs — and their daily close over ten years between 2013 to 2023\.
    That resulted in about 45,000 datapoints. That’s a piece of cake for Pandas.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过[Yahoo! Finance的API](https://pypi.org/project/yfinance/)轻松地获得了股价数据。我使用了16支股票和ETF——七家化石燃料公司、六家可再生能源公司和三家能源ETF——以及2013年至2023年间的十年每日收盘价。这产生了大约45,000个数据点。对于Pandas来说，这不过是小菜一碟。
- en: Global weather data was an entirely different picture. First of all, it took
    me hours to download it through the [Copernicus API](https://cds.climate.copernicus.eu/how-to-api).
    The API itself is amazing; the problem is just that there is *so much* data. I
    wanted worldwide daily temperature data between 2013 and 2023\. The little problem
    with this is that, with weather stations at 721 points of geographical latitude
    and 1440 points of geographical longitude, you’re downloading and later processing
    close to **3.8 billion datapoints**.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 全球气象数据呈现了完全不同的景象。首先，我花费数小时通过[Copernicus API](https://cds.climate.copernicus.eu/how-to-api)下载它。API本身很棒；问题只是数据实在太多了。我想要2013年至2023年间的全球每日气温数据。这个问题在于，有721个地理纬度点和1440个地理经度点的气象站，你将下载并随后处理近**38亿个数据点**。
- en: That’s a lot of datapoints. Worth 185 GB of space on my hard drive.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这是个庞大的数据量。在我的硬盘上占据了185GB的空间。
- en: To evaluate this much data I tried chunking, but this overloaded my state-of-the-art
    computer. Iterating through that dataset one step at a time worked, but it took
    me half a day to process it every time I wanted to run a simple analysis.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估这么多数据，我尝试了分块处理，但这超载了我的最先进电脑。逐个步骤迭代这个数据集是可行的，但每次我想要运行简单的分析时，都需要花费半天时间来处理。
- en: The good news is that I’m quite well-connected in the financial services industry.
    I’d heard about [ArcticDB](https://arcticdb.io/) a while back but had never given
    it a shot so far. It is a database which was developed at [Man Group](https://www.man.com/),
    a hedge fund where several contacts of mine work at.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是我在金融服务行业人脉很广。我之前听说过[ArcticDB](https://arcticdb.io/)，但至今未曾尝试过。这是一个由[Man Group](https://www.man.com/)开发的数据库，我的几位联系人就在这家对冲基金工作。
- en: So I gave ArcticDB a shot for this project — and I’m not looking back. I’m not
    abandoning Pandas, but for datasets in the billions I’ll choose ArcticDB over
    Pandas any day.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我为这个项目尝试了ArcticDB——并且我没有回头。我没有放弃Pandas，但对于数十亿规模的数据集，我任何一天都会选择ArcticDB而不是Pandas。
- en: 'I should clarify two things at this point: First, although I know people at
    ArcticDB / Man Group, I’m not formally affiliated with them. I did this project
    independently and chose to share the results with you. Second, ArcticDB is not
    fully open-source. It is free for individual users within reasonable limits but
    has paid tiers for power users and corporations. I used the free version, which
    gets you pretty far—and well beyond the scope of this project actually.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在此澄清两点：首先，尽管我认识ArcticDB / Man Group的人，但我并没有正式与他们合作。我是独立完成这个项目的，并选择与您分享结果。其次，ArcticDB并非完全开源。对于个人用户，在合理范围内是免费的，但对于高级用户和公司有付费层级。我使用了免费版本，它可以帮助你走得很远——实际上远远超出了这个项目的范围。
- en: With that out of the way, I’ll now show you how to set up ArcticDB and what
    its basic usage is. I’ll then go into my project and how I used ArcticDB in this
    case. You’ll also get to see some exciting results on the correlations I found
    between energy stocks and worldwide temperatures. I’ll follow with a performance
    comparison of ArcticDB and Pandas. Finally, I’ll show exactly when you’ll be better
    off using ArcticDB, and when you can safely use Pandas without worrying about
    bottlenecks.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在此基础上，我现在将向您展示如何设置ArcticDB以及其基本用法。然后我会介绍我的项目以及在这个案例中如何使用ArcticDB。您还将看到一些关于能源股票和全球温度之间相关性的激动人心的结果。接下来，我会进行ArcticDB和Pandas的性能比较。最后，我会展示何时使用ArcticDB更合适，何时可以安全地使用Pandas而不用担心瓶颈。
- en: ArcticDB For Novices
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ArcticDB 新手指南
- en: 'At this point, you might have been wondering why I’ve been comparing a data
    manipulation tool — Pandas — with a full-blown database. The truth is that ArcticDB
    is a bit of both: It stores data conveniently, but it also helps manipulating
    data. Some powerful perks of it include fast queries, versioning, and better memory
    management.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可能一直在想为什么我会将数据操作工具Pandas与完整的数据库进行比较。事实是，ArcticDB兼具两者：它方便地存储数据，同时也帮助操作数据。它的一些强大优势包括快速查询、版本控制和更好的内存管理。
- en: Installation and Setup
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装和设置
- en: 'For Linux- and Windows users, getting ArcticDB is as simple as getting any
    other Python package:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Linux和Windows用户，获取ArcticDB就像获取任何其他Python包一样简单：
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'For Mac users, things are a little more complicated. ArcticDB does not support
    Apple chips at this time. Here are two workarounds (I’m on a Mac, and after testing
    I chose the first):'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Mac用户，事情要复杂一些。目前ArcticDB不支持苹果芯片。这里有两个解决方案（我使用的是Mac，经过测试后我选择了第一个）：
- en: Run ArcticDB inside a [Docker container](https://www.docker.com/resources/what-container/).
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在[Docker容器](https://www.docker.com/resources/what-container/)中运行ArcticDB。
- en: Use [Rosetta 2](https://www.makeuseof.com/what-is-rosetta-2-mac/) to emulate
    an x86 environment.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用[Rosetta 2](https://www.makeuseof.com/what-is-rosetta-2-mac/)来模拟x86环境。
- en: The second workaround works, but the performance is slower. It therefore wipes
    out some of the gains of using ArcticDB in the first place. Nevertheless, it is
    a valid option if you can’t or don’t want to use Docker.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种解决方案是可行的，但性能较慢。因此，它消除了使用ArcticDB的一些优势。尽管如此，如果你不能或不想使用Docker，它仍然是一个有效的选择。
- en: 'To set up ArcticDB, you need to create a local instance in the following fashion:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 要设置ArcticDB，你需要按照以下方式创建本地实例：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: ArcticDB supports multiple storage backends like AWS S3, Mongo DB, and LMDB.
    This makes it very easy to scale into production without having to think about
    data engineering.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: ArcticDB支持多种存储后端，如AWS S3、Mongo DB和LMDB。这使得它非常容易扩展到生产环境，而无需考虑数据工程。
- en: Basic Usage
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基本用法
- en: 'If you know how to use Pandas, ArcticDB won’t be hard for you. Here’s how you’d
    read in a Pandas dataframe:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你熟悉Pandas的使用，那么ArcticDB对你来说不会很难。以下是读取Pandas数据框的方法：
- en: '[PRE2]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'To retrieve data from ArcticDB, you’d proceed in the following fashion:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 要从ArcticDB检索数据，你可以按照以下方式操作：
- en: '[PRE3]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'One of the coolest features about ArcticDB is that it provides versioning support.
    If you are updating your data frequently and only want to retrieve the latest
    version, this is how you’d do it:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: ArcticDB 最酷的特性之一是它提供了版本支持。如果你经常更新数据，只想检索最新版本，你可以这样做：
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'And if you want a specific version, you do this:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要特定版本，你可以这样做：
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Generally speaking, the versioning works as follows: Much like in Numpy, the
    index 0 (following `as_of=` in the snippets above) refers to the first version,
    -1 is the latest, and -3 is two versions before that.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，版本控制的工作方式如下：与 Numpy 类似，索引 0（在上述片段中的 `as_of=` 之后）指的是第一个版本，-1 是最新的，-3 是那之前的两个版本。
- en: Next Steps
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 下一步
- en: Once you have a grip around how to handle your data, you can analyse your dataset
    as you always have done. Even while using ArcticDB, chunking can be a good way
    to reduce memory usage. Once you scale to production, its native integration with
    AWS S3 and other storage systems will be your friend.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你掌握了如何处理你的数据，你就可以像以前一样分析你的数据集。即使在使用 ArcticDB 的同时，分块也可以是一种减少内存使用的有效方法。一旦你扩展到生产环境，它与
    AWS S3 和其他存储系统的原生集成将成为你的朋友。
- en: Energy Stocks Versus Global Temperatures
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 能源股票与全球温度
- en: 'Building my study around energy stocks and their potential dependence on global
    temperatures was fairly easy. First, I used ArcticDB to retrieve the stock returns
    data and temperature data. This was the script I used for obtaining the data:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 以能源股票及其对全球温度的潜在依赖性为基础进行研究相对容易。首先，我使用 ArcticDB 获取股票回报数据和温度数据。这是获取数据的脚本：
- en: '[PRE6]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'A quick note about the data licenses: It is permitted to use all this data
    for commercial use. The [Copernicus license](https://www.copernicus.eu/en/access-data/copyright-and-licences) allows
    this for the weather data; the [yfinance license](https://github.com/ranaroussi/yfinance/blob/main/LICENSE.txt) allows
    this for the stock data. (The latter is a community-maintained project that makes
    use of Yahoo Finance data but is not officially part of Yahoo. This means that,
    should Yahoo at some point change its stance on `yfinance`—right now it tolerates
    it—I’ll have to find another way to legally get this data.)'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 关于数据许可的简要说明：允许将所有这些数据用于商业用途。[Copernicus 许可证](https://www.copernicus.eu/en/access-data/copyright-and-licences)允许使用这些天气数据；[yfinance
    许可证](https://github.com/ranaroussi/yfinance/blob/main/LICENSE.txt)允许使用这些股票数据。（后者是一个由社区维护的项目，它利用了雅虎财经数据，但不是雅虎的官方部分。这意味着，如果雅虎在某个时候改变其对
    `yfinance` 的立场——目前它容忍这种做法——我必须找到另一种合法获取这些数据的方法。）
- en: The above code does the heavy lifting around billions of datapoints within a
    few lines. If, like me, you’ve been battling data engineering challenges in the
    past, I would not be surprised if you feel a little baffled by this.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码在几行之内完成了围绕数十亿数据点的繁重工作。如果你像我一样，过去一直在与数据工程挑战作斗争，我不会对你觉得有点困惑感到惊讶。
- en: I then calculated the annual temperature anomaly. I did this by first computing
    the mean temperature across all grid points in the dataset. I then subtracted
    this from the actual temperature each day to determine the deviation from the
    expected norm.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我接着计算了年温度异常值。我是通过首先计算数据集中所有网格点的平均温度来做到这一点的。然后我从每天的实际温度中减去这个平均值，以确定与预期标准的偏差。
- en: This approach is unusual because one would usually calculate the *daily* mean
    temperature over 30 years of data in order to help capture unusual temperature
    fluctuations relative to historical trends. But since I only had 10 years of data
    on hand, I feared that this would muddy the results to the point where they’d
    be statistically laughable; hence this approach. (I’ll follow up with 30 years
    of data — and the help of ArcticDB — in due time!)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法不寻常，因为人们通常会计算 30 年数据中的每日平均温度，以帮助捕捉与历史趋势相比的不寻常温度波动。但由于我只有 10 年的数据在手，我担心这会模糊结果，以至于它们在统计学上会显得可笑；因此采取了这种方法。（我将在适当的时候使用
    30 年的数据——以及 ArcticDB 的帮助！）
- en: Additionally, for the rolling correlations, I used a 30-day moving window to
    calculate the correlation between stock returns and my somewhat special temperature
    anomalies, ensuring that short-term trends and fluctuations were accounted for
    while smoothing out noise in the data.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，对于滚动相关性，我使用 30 天移动窗口来计算股票回报和我的特殊温度异常之间的相关性，确保考虑到短期趋势和波动，同时平滑数据中的噪声。
- en: As expected and to be seen below, we get two bumps — one for summer and one
    for winter. (As mentioned above, one could also calculate the daily anomaly, but
    this usually requires at least 30 years’ worth of temperature data — better to
    do in production.)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，可以看到有两个峰值——一个代表夏季，一个代表冬季。（如上所述，也可以计算每日异常值，但这通常需要至少30年的温度数据——在生产中更好处理。）
- en: '![](../Images/f15e4c44b9a60de3f6baeb3a9b76c01b.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f15e4c44b9a60de3f6baeb3a9b76c01b.png)'
- en: Global temperature anomaly between 2013 and 2023\. Image by author
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 2013年至2023年间的全球温度异常。图片由作者提供
- en: Global temperature anomaly between 2013 and 2023\. Image by author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 2013年至2023年间的全球温度异常。图片由作者提供
- en: I then calculated the rolling correlation between various stock tickers and
    the global average temperature. I did this by computing the Pearson correlation
    coefficient between the daily returns of each stock ticker and the corresponding
    daily temperature anomaly over the rolling window. This method captures how the
    relationship evolves over time, revealing periods of heightened or diminished
    correlation.A selection of this can be seen below.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我接着计算了各种股票代码与全球平均温度之间的滚动相关性。我是通过计算每个股票代码的每日回报与滚动窗口内相应的每日温度异常之间的皮尔逊相关系数来做到这一点的。这种方法捕捉了关系随时间的变化，揭示了相关性增强或减弱的时期。以下是一些选择性的结果。
- en: On the whole, one can see that the correlation changes often. However, one can
    also see that there are more pronounced peaks in the correlation for the featured
    fossil fuel companies (XOM, SHEL, EOG) and energy ETFs (XOP). There is significant
    correlation with temperatures for renewables companies as well (ORSTED.CO, ENPH),
    but it remains within stricter limits.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来看，可以看到相关性经常发生变化。然而，也可以看到，对于特色化石燃料公司（XOM, SHEL, EOG）和能源ETF（XOP）的相关性峰值更为明显。可再生能源公司（ORSTED.CO,
    ENPH）与温度也有显著的相关性，但仍然在更严格的限制范围内。
- en: '![](../Images/688fd2fc63f368a44f83a9b6532a0d05.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/688fd2fc63f368a44f83a9b6532a0d05.png)'
- en: Correlation of selected stocks with global temperature anomaly, 2013 to 2023\.
    Image by author
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 选定股票与全球温度异常的相关性，2013年至2023年。图片由作者提供
- en: Correlation of selected stocks with global temperature anomaly, 2013 to 2023\.
    Image by author
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 选定股票与全球温度异常的相关性，2013年至2023年。图片由作者提供
- en: 'This graph is rather busy, so I decided to take the average correlation with
    temperature for several stocks. Essentially this means that I used the average
    over time of the daily correlations. The results are rather interesting: All fossil
    fuel stocks have a negative correlation with the global temperature anomaly (everything
    from XOM to EOG below).'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图相当复杂，所以我决定取几个股票与温度的平均相关性。本质上这意味着我使用了每日相关性的时间平均值。结果相当有趣：所有化石燃料股票与全球温度异常呈负相关（从XOM到EOG以下的所有股票）。
- en: This means that when the anomalies increase (i.e., there is more extreme heat
    or cold) the fossil stock prices decrease. The effect is significant but weak,
    which suggests that global average temperature anomalies alone might not be the
    primary drivers of stock price movements. Nevertheless, it’s an interesting observation.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着当异常值增加（即，有更多的极端高温或低温）时，化石燃料股票价格会下降。这种影响是显著的但较微弱，这表明全球平均温度异常可能不是股价变动的主要驱动因素。尽管如此，这是一个有趣的观察。
- en: Most renewables stocks (from NEE to ENPH) have positive correlations with the
    temperature anomaly. This is somewhat expected; if temperatures get extreme, investors
    might start thinking more about renewable energy.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数可再生能源股票（从NEE到ENPH）与温度异常呈正相关。这在某种程度上是可以预料的；如果温度变得极端，投资者可能会更多地考虑可再生能源。
- en: Energy ETFs (XLE, IXC, XOP) are also negatively correlated with temperature
    anomalies. This is not surprising because these ETFs often contain a large amount
    of fossil fuel companies.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 能源ETF（XLE, IXC, XOP）也与温度异常呈负相关。这并不令人惊讶，因为这些ETF通常包含大量化石燃料公司。
- en: '![](../Images/46721d6ed20a66f4797f7dd088cae2a0.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/46721d6ed20a66f4797f7dd088cae2a0.png)'
- en: Average correlation of selected stocks with temperature anomaly, 2013–2023\.
    Image by author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 选定股票与温度异常的平均相关性，2013–2023年。图片由作者提供
- en: Average correlation of selected stocks with temperature anomaly, 2013–2023\.
    Image by author
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 选定股票与温度异常的平均相关性，2013–2023年。图片由作者提供
- en: 'All these effects are significant but small. To take this analysis to the next
    level, I will:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些影响都是显著的但较小的。为了将这一分析提升到下一个层次，我将：
- en: Test the regional weather impact on selected stocks. For example, cold snaps
    in Texas might have outsized effects on fossil fuel stocks. (Luckily, retrieving
    such data subsets is a charm with ArcticDB!)
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 测试选定股票的区域天气影响。例如，德克萨斯州的寒冷天气可能会对化石燃料股票产生不成比例的影响。（幸运的是，使用 ArcticDB 检索这样的数据子集非常容易！）
- en: 'Use more weather variables: Aside from temperatures, I expect wind speeds (and
    therefore storms) and precipitation (droughts and flooding) to affect fossil and
    renewables stocks in distinct ways.'
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用更多的气象变量：除了温度外，我预计风速（因此风暴）和降水（干旱和洪水）将以不同的方式影响化石燃料和可再生能源的储量。
- en: 'Using AI-driven models: Simple correlation can say a lot, but nonlinear dependencies
    are better found with Bayesian networks, random forests, or deep learning techniques.'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 AI 驱动的模型：简单的相关性可以说明很多，但贝叶斯网络、随机森林或深度学习技术可以更好地找到非线性依赖。
- en: These insights will be published on this blog when they’re ready. Hopefully
    they can inspire the one or other Big Energy CEO to reshape their sustainability
    strategy!
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当这些见解准备好时，将发布在这个博客上。希望它们能够激励一位或多位大型能源公司的首席执行官重塑他们的可持续性战略！
- en: 'ArcticDB Versus Pandas: Performance Checks'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ArcticDB 与 Pandas：性能检查
- en: For the sake of this article, I went ahead and painstakingly re-ran my codes
    just in Pandas, as well as in a chunked version.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这篇文章，我仔细地重新在我的 Pandas 中以及分块版本中运行了我的代码。
- en: We have four operations pertaining to 10 years of stock- and of climate data.
    The table below shows how the performances compare with a basic Pandas setup,
    with some chunking, and with the best way I could come up with using ArcticDB.
    As you can see, the setup with ArcticDB is easily five times faster, if not more.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有四个与 10 年的股票和气候数据相关的操作。下表显示了与基本 Pandas 设置、一些分块以及我能想出的使用 ArcticDB 的最佳方式相比的性能。正如你所见，使用
    ArcticDB 的设置至少快五倍，如果不是更多的话。
- en: Pandas works like a charm for a small dataset of 45k rows, but loading a dataset
    of 3.8 billion rows into a basic Pandas setup is not even possible on my machine.
    Loading it through chunking also only worked with more workarounds, essentially
    going one step at a time. With ArcticDB, on the other hand, this was easy.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 对于 45k 行的小数据集来说工作得很好，但将 38 亿行的数据集加载到基本 Pandas 设置中在我的机器上甚至是不可能的。通过分块加载它也只通过更多的工作方案工作，本质上是一步一步地。另一方面，使用
    ArcticDB，这很容易。
- en: In my setup, ArcticDB sped the whole process up by an order of magnitude. Loading
    a very large dataset was not even possible without ArcticDB, if major workarounds
    were not employed!
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的设置中，ArcticDB 将整个过程的速度提高了十倍。如果没有采用主要的工作方案，那么即使是非常大的数据集也无法在没有 ArcticDB 的情况下加载！
- en: '![](../Images/25f3f31e18adccaf3baf5e906184d65a.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/25f3f31e18adccaf3baf5e906184d65a.png)'
- en: Source: Ari Joury / Wangari – GlobalCreated with [Datawrapper](https://www.datawrapper.de/_/lGKN9)
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Ari Joury / Wangari – 全球
- en: When To Use ArcticDB
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 何时使用 ArcticDB
- en: Pandas is great for relatively small, exploratory analyses. However, when performance,
    scalability, and quick data retrieval become mission-critical, ArcticDB can be
    an amazing ally. Below are some cases in which ArcticDB is worth a serious consideration.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 对于相对较小的、探索性的分析来说非常棒。然而，当性能、可扩展性和快速数据检索成为关键任务时，ArcticDB 可以成为一个惊人的盟友。以下是一些值得认真考虑使用
    ArcticDB 的情况。
- en: When Your Dataset is Too Large For Pandas
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你的数据集太大而无法使用 Pandas
- en: Pandas loads everything into RAM. Even with an excellent machine, this means
    that datasets above a few GB are bound to crash. ArcticDB also works with very
    wide datasets spanning millions of columns. Pandas often fails at this.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 将所有内容都加载到 RAM 中。即使拥有优秀的机器，这也意味着超过几 GB 的数据集很可能会崩溃。ArcticDB 也可以处理非常宽的数据集，跨越数百万列。Pandas
    在这一点上往往失败。
- en: When You’re Working With Time-Series Data
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你处理时间序列数据时
- en: Time-series queries are common in fields like finance, climate science, or IoT.
    Pandas has some native support for time-series data, but ArcticDB features faster
    time-based indexing and filtering. It also supports versioning, which is amazing
    for retrieving historical snapshots without having to reload an entire dataset.
    Even if you’re using Pandas for analytics, ArcticDB speeds up data retrieval,
    which can make your workflows much smoother.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列查询在金融、气候科学或物联网等领域很常见。Pandas 对时间序列数据有一些原生支持，但 ArcticDB 具有更快的时间索引和过滤功能。它还支持版本控制，这对于检索历史快照而不必重新加载整个数据集来说非常棒。即使你使用
    Pandas 进行分析，ArcticDB 也能加快数据检索，这可以使你的工作流程更加顺畅。
- en: When You Need a Production-Ready Database
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你需要一个生产就绪的数据库时
- en: 'Once you scale to production, Pandas won’t cut it anymore. You’ll need a database.
    Instead of thinking long and deep about the best database to use and dealing with
    plenty of data engineering challenges, you can use ArcticDB because:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦扩展到生产环境，Pandas就不再适用了。你需要一个数据库。与其长时间深入思考使用哪个最佳数据库以及处理大量数据工程挑战，不如使用ArcticDB，因为它：
- en: It easily integrates with cloud storage, notably AWS S3 and Azure.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以轻松集成到云存储中，特别是AWS S3和Azure。
- en: It works as a centralized database even for large teams. In contrast, Pandas
    is just an in-memory tool.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使对于大型团队，它也能作为一个集中式数据库运行。相比之下，Pandas只是一个内存工具。
- en: It allows for parallelized reads and writes.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它允许并行读取和写入。
- en: It seamlessly complements analytical libraries like NumPy, PyTorch, and Pandas
    for more complex queries.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它无缝地补充了NumPy、PyTorch和Pandas等分析库，以进行更复杂的查询。
- en: 'The Bottom Line: Use Cool Tools To Gain Time'
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结：使用酷工具以节省时间
- en: Without ArcticDB, my study on weather data and energy stocks would not have
    been possible. At least not without major headaches around speed and memory bottlenecks.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 没有ArcticDB，我的关于气象数据和能源股票的研究将无法进行。至少没有在速度和内存瓶颈方面的重大头痛。
- en: I’ve been using and loving Pandas for years, so this is not a statement to take
    lightly. I still think that it’s great for smaller projects and exploratory data
    analysis. However, if you’re handling substantial datasets or if you want to scale
    your model into production, ArcticDB is your friend.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经使用并喜爱Pandas多年，所以这不是一个可以轻率做出的声明。我仍然认为它非常适合小型项目和探索性数据分析。然而，如果你处理的是大量数据集，或者你想要将你的模型扩展到生产环境，ArcticDB是你的朋友。
- en: Think of ArcticDB as an ally to Pandas rather than a replacement — it bridges
    the gap between interactive data exploration and production-scale analytics. To
    me, ArcticDB is therefore a lot more than a database. It is also an advanced data
    manipulation tool, and it automates all the data engineering backend so that you
    can focus on the truly exciting stuff.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 将ArcticDB视为Pandas的盟友而不是替代品——它弥合了交互式数据探索和生产规模分析之间的差距。对我来说，因此ArcticDB远不止是一个数据库。它还是一个高级数据处理工具，并自动化所有数据工程后端，这样你就可以专注于真正令人兴奋的事情。
- en: One exciting result to me is the clear difference in how fossil and renewables
    stocks respond to temperature anomalies. As these anomalies increase due to climate
    change, fossil stocks will suffer. Is that not something to tell Big Energy CEOs?
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，一个令人兴奋的结果是化石燃料和可再生能源股票对温度异常的反应差异。随着这些异常因气候变化而增加，化石燃料股票将受到影响。这不是告诉大型能源公司首席执行官们的事情吗？
- en: To take this further, I might focus on more localized weather and go beyond
    temperature. I’ll also go beyond simple correlations and use more advanced techniques
    to tease out nonlinear relationships in the data. (And yes, ArcticDB will likely
    help me with that.)
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步探讨，我可能将重点放在更本地化的天气上，并超越温度。我还会超越简单的相关性，并使用更高级的技术来揭示数据中的非线性关系。（是的，ArcticDB可能会在这方面帮助我。）
- en: On the whole, if you’re handling large or wide datasets, lots of time series
    data, need to version your data, or want to scale quickly into production, ArcticDB
    is your friend. I’m looking forward to exploring this tool in more detail as my
    case studies progress!
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，如果你处理的是大型或宽数据集，大量的时间序列数据，需要版本控制你的数据，或者想要快速扩展到生产环境，ArcticDB是你的朋友。随着我的案例研究进展，我期待更详细地探索这个工具！
- en: '*Originally published at *[*https://wangari.substack.com*](https://wangari.substack.com/p/pandas-cant-handle-this-how-arcticdb)*.*'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '*原文发表于[https://wangari.substack.com](https://wangari.substack.com/p/pandas-cant-handle-this-how-arcticdb)*。'
