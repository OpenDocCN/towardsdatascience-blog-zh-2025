- en: Why Variable Scoping Can Make or Break Your Data Science Workflow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么变量作用域可以决定你的数据科学工作流程的成功或失败
- en: 原文：[https://towardsdatascience.com/why-variable-scoping-can-make-or-break-your-data-science-workflow-5b449291ac73/](https://towardsdatascience.com/why-variable-scoping-can-make-or-break-your-data-science-workflow-5b449291ac73/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-variable-scoping-can-make-or-break-your-data-science-workflow-5b449291ac73/](https://towardsdatascience.com/why-variable-scoping-can-make-or-break-your-data-science-workflow-5b449291ac73/)
- en: '![Image by Swello from Unsplash](../Images/f743ecb098c1096c2e5d2951422c04f6.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![Swello 来自 Unsplash 的图片](../Images/f743ecb098c1096c2e5d2951422c04f6.png)'
- en: Image by [Swello](https://unsplash.com/@getswello) from [Unsplash](https://unsplash.com/)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Swello](https://unsplash.com/@getswello) 来自 [Unsplash](https://unsplash.com/)
- en: When you’re deep in rapid prototyping, it’s tempting to skip clean scoping or
    reuse common variable names (hello, `df`!), thinking it will save time. But this
    can lead to sneaky bugs that break your workflow.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当你深入快速原型设计时，可能会倾向于跳过干净的作用域或重用常见的变量名（你好，`df`！），认为这样可以节省时间。但这样做可能会导致隐藏的bug，破坏你的工作流程。
- en: The good news? Writing clean, well-scoped code does not require additional effort
    once you understand the basic principles.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是？一旦你理解了基本原理，编写干净、作用域明确的代码并不需要额外的努力。
- en: Let’s break it down.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解一下。
- en: What is variable scope?
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是变量作用域？
- en: Think of a variable as a container that will store some information. **Scope
    refers to the region of your code where a variable is accessible.**
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将变量想象成一个容器，它将存储一些信息。**作用域指的是代码中变量可访问的区域。**
- en: Scope prevents accidental changes by limiting where variables can be read or
    modified. If every variable was accessible from anywhere, you’ll have to keep
    track of all of them to avoid overwriting it accidentally.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 作用域通过限制变量可以读取或修改的位置来防止意外的更改。如果每个变量都可以从任何地方访问，你将不得不跟踪所有这些变量以避免意外覆盖。
- en: 'In Python, scope is defined by the **LEGB rule**, which stands for: **local,
    enclosing, global and built-in**.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Python 中，作用域由 **LEGB 规则** 定义，它代表：**局部、封装、全局和内置**。
- en: '![Scoping in Python, referred as LEGB (by author)](../Images/bd187a966f701c7e601a67f4ca32b1bf.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![Python 中的作用域，称为 LEGB（作者命名）](../Images/bd187a966f701c7e601a67f4ca32b1bf.png)'
- en: Scoping in Python, referred as LEGB (by author)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Python 中的作用域，称为 LEGB（作者命名）
- en: 'Scoping in Python: LEGB rule'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python 中的作用域：LEGB 规则
- en: Let’s illustrate this with an example.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个例子来说明这一点。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 1\. Local scope
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 局部作用域
- en: '**Variables inside a function are in the local scope.** They can only be accessed
    within that function.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**函数内部的变量位于局部作用域中。它们只能在函数内部访问。**'
- en: In the example, `tax` is a local variable inside `apply_discount`. It is not
    accessible outside this function.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在示例中，`tax` 是 `apply_discount` 函数内部的局部变量。它在这个函数外部不可访问。
- en: 2\. Enclosing scope
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 封装作用域
- en: These refer to variables in a function that contains a **nested** function.
    These variables are not global but can be accessed by the inner (nested) function.
    In this example, `discount` and `total_after_discount` are variables in the enclosing
    scope of `apply_discount` .
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指的是包含嵌套函数的函数中的变量。这些变量不是全局的，但可以被嵌套（内部）函数访问。在这个例子中，`discount` 和 `total_after_discount`
    是 `apply_discount` 的封装作用域中的变量。
- en: '**The `nonlocal` keyword:**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**`nonlocal` 关键字：**'
- en: The `nonlocal` keyword is used to **modify** variables in the enclosing scope,
    **not just read them**.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '`nonlocal` 关键字用于**修改**封装作用域中的变量，**而不仅仅是读取它们**。'
- en: For example, suppose you want to update the variable `total_after_discount`,
    which is in the enclosing scope of the function. Without `nonlocal`, if you assign
    to `total_after_discount` inside the inner function, **Python will treat it as
    a new local variable**, effectively **shadowing** the outer variable. This can
    introduce bugs and unexpected behavior.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你想更新位于函数封装作用域中的变量 `total_after_discount`。如果没有 `nonlocal`，你在内部函数中对其赋值时，**Python
    会将其视为一个新的局部变量**，从而**覆盖**了外部变量。这可能会引入错误和意外的行为。
- en: 3\. Global scope
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 全局作用域
- en: Variables that are defined **outside all functions** and accessible throughout.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 定义在所有函数**外部**且在整个程序中可访问的变量。
- en: '**The `global` statement**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**`global` 语句**'
- en: When you declare a variable as `global` inside a function, Python treats it
    as a reference to the variable outside the function. This means that changes to
    it will affect the variable in the global scope.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在函数内部将变量声明为 `global` 时，Python 会将其视为对函数外部变量的引用。这意味着对其所做的更改将影响全局作用域中的变量。
- en: With the `global` keyword, Python will create a new local variable.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `global` 关键字，Python 将创建一个新的局部变量。
- en: '[PRE1]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 4\. Built-in scope
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 内置作用域
- en: Refers to the reserved keywords that Python uses for it’s built-in functions,
    such as `print` , `def` , `round` and so on. This can be accessed at any level.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 指的是Python用于其内置函数的保留关键字，例如`print`、`def`、`round`等。这可以在任何级别访问。
- en: 'Key concept: global vs nonlocal keywords'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键概念：全局与`nonlocal`关键字
- en: Both keywords are crucial for modifying variables in different scopes, but they’re
    used differently.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个关键字对于修改不同作用域中的变量至关重要，但它们的用法不同。
- en: '**`global`**: Used to modify variables in the global scope.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`global`**：用于修改全局作用域中的变量。'
- en: '**`nonlocal`**: Used to modify variables in the enclosing (non-global) scope.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`nonlocal`**：用于修改封装（非全局）作用域中的变量。'
- en: Variable shadowing
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 变量遮蔽
- en: Variable shadowing happens when a variable in an inner scope hides a variable
    from an outer scope.
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 变量遮蔽发生在内部作用域中的变量隐藏了外部作用域中的变量时。
- en: Within the inner scope, all references to the variable will point to the inner
    variable, not the outer one. This can lead to confusion and unexpected outputs
    if you’re not careful.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在内部作用域内，所有对该变量的引用都将指向内部变量，而不是外部变量。如果不小心，这可能会导致混淆和意外的输出。
- en: Once execution returns to the outer scope, the inner variable ceases to exist,
    and any reference to the variable will point back to the outer scope variable.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦执行返回到外部作用域，内部变量就会停止存在，任何对该变量的引用都将指向外部作用域变量。
- en: Here’s a quick example. `x` is shadowed in each scope, resulting in different
    outputs depending on the context.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个快速示例。`x`在每一个作用域中被遮蔽，导致根据上下文产生不同的输出。
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Parameter shadowing
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参数遮蔽
- en: A similar concept to variable shadowing, but this occurs when a local variable
    redefines or overwrites a parameter passed to a function.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这与变量遮蔽类似，但发生在局部变量重新定义或覆盖传递给函数的参数时。
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '`x` is passed as 10\. But it is immediately shadowed and overwritten by `x=5`'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '`x` 被传递为 10。但它立即被`x=5`遮蔽和覆盖。'
- en: Scoping in recursive functions
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 递归函数中的作用域
- en: Each recursive call gets **its own execution context**, meaning that the local
    variables and parameters in that call are independent of previous calls.
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 每次递归调用都获得**自己的执行上下文**，这意味着该调用中的局部变量和参数与之前的调用是独立的。
- en: However, if a variable is modified globally or passed down explicitly as a parameter,
    the change can influence subsequent recursive calls.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果全局修改了一个变量或显式地将其作为参数传递，这种变化可以影响后续的递归调用。
- en: '**Local variables**: These are defined inside the function and only affect
    the **current** recursion level. They do not persist between calls.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**局部变量**：这些是在函数内部定义的，并且只影响**当前**递归级别。它们在调用之间不会持续存在。'
- en: '**Parameters passed explicitly** to the next recursive call retain their values
    from the previous call, allowing the recursion to accumulate state across levels.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**显式传递给下一级递归的参数**保留了从上一级递归的值，允许递归在各级之间累积状态。'
- en: '**Global variables**: These are **shared across all recursion levels**. If
    modified, the change will be visible to all levels of recursion.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全局变量**：这些是在**所有递归级别之间共享的**。如果修改，变化将对所有递归级别可见。'
- en: Let’s illustrate this with an example.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个例子来说明这一点。
- en: '**Example 1: Using a global variable (not recommended)**'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**示例 1：使用全局变量（不推荐）**'
- en: '[PRE4]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '`counter` is a global variable shared across all recursive calls. It gets incremented
    at each level of recursion, and its final value (5) is printed after the recursion
    completes.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '`counter` 是一个在所有递归调用之间共享的全局变量。它在每一级递归中递增，并在递归完成后打印其最终值（5）。'
- en: '**Example 2: Using parameters (recommended)**'
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**示例 2：使用参数（推荐）**'
- en: '[PRE5]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '`counter` is now a **parameter** of the function.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`counter` 现在是函数的**参数**。'
- en: '`counter` is passed from one recursion level to the next, with it’s value updated
    at each level. The `counter` is not reinitialised in each call, rather, it’s **current
    state is passed forward to the next recursion level**.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`counter` 在递归的每一级之间传递，并在每一级更新其值。`counter` 在每次调用中不会被重置，而是**将其当前状态传递到下一级递归**。'
- en: The function is now **pure** – there are no side effects and it only operates
    within it’s own scope.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 函数现在是**纯函数**——没有副作用，并且它只在其自己的作用域内操作。
- en: As the recursive function returns, the `counter` "bubbles up" to the top level
    and is returned at the base case.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着递归函数的返回，`counter` “冒泡”到顶层，并在基本情况下返回。
- en: Best practices
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 1\. Use descriptive variable names
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 使用描述性的变量名
- en: Avoid vague names like `df` or `x`. Use descriptive names such as `customer_sales_df`
    or `sales_records_df` for clarity.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 避免使用模糊的名称，如`df`或`x`。为了清晰，使用描述性的名称，如`customer_sales_df`或`sales_records_df`。
- en: 2\. Use `capital letters` for constants
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 使用`大写字母`表示常量
- en: This is the standard naming convention for constants in Python. For example,
    `MAX_RETRIES = 5`.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这是Python中常量的标准命名约定。例如，`MAX_RETRIES = 5`。
- en: 3\. Avoid global variables as much as possible
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 尽可能避免使用全局变量
- en: Global variables introduces bugs and makes code harder to test and maintain.
    It’s best to pass variables explicitly between functions.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 全局变量引入了错误，并使代码更难测试和维护。最好在函数之间显式传递变量。
- en: 4\. Aim to write pure functions where possible
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 尽可能编写纯函数
- en: '**What’s a pure function?**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么是纯函数？**'
- en: '**Deterministic**: It always produces the same output for the same input. It’s
    not affected by external states or randomness.'
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确定性**：对于相同的输入总是产生相同的输出。它不受外部状态或随机性的影响。'
- en: '**Side-effect-free**: It does not modify any external variables or states.
    It operates solely within its local scope.'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无副作用**：它不修改任何外部变量或状态。它仅在本地作用域内操作。'
- en: Using `nonlocal` or `global` would make the function impure.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`nonlocal`或`global`会使函数变得不纯。
- en: However, if you’re working with a **closure**, you should use the `nonlocal`
    keyword to modify variables in the enclosing (outer) scope, which helps prevent
    variable shadowing.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你正在使用**闭包**，你应该使用`nonlocal`关键字来修改封装（外部）作用域中的变量，这有助于防止变量遮蔽。
- en: A **closure** occurs when a nested function (inner function) captures and refers
    to variables from its enclosing function (outer function). This allows the inner
    function to "remember" the environment in which it was created, including access
    to variables from the outer function’s scope, even after the outer function has
    finished executing.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**闭包**发生在嵌套函数（内部函数）捕获并引用其封装函数（外部函数）中的变量时。这允许内部函数“记住”其创建的环境，包括访问外部函数作用域中的变量，即使外部函数已经执行完毕。'
- en: '***The concept of closures can go really deep, so tell me in the comments if
    this is something I should dive into in the next article! 🙂***'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '***闭包的概念可以非常深入，所以如果我在下一篇文章中应该深入探讨这个话题，请在评论中告诉我！ :)***'
- en: 5\. Avoid variable shadowing and parameter shadowing
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 避免变量遮蔽和参数遮蔽
- en: If you need to refer to an outer variable, avoid reusing its name in an inner
    scope. Use distinct names to clearly distinguish the variables.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要引用外部变量，避免在内层作用域中重复使用其名称。使用不同的名称来清楚地区分变量。
- en: Wrapping up
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: That’s a wrap! Thanks for sticking with me till the end.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 就到这里！感谢你一直陪伴我到最后。
- en: Have you encountered any of these challenges in your own work? Drop your thoughts
    in the comments below!
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你在自己的工作中遇到过这些挑战吗？在下面的评论中分享你的想法！
- en: I write regularly on Python, software development and the projects I build,
    so give me a follow to not miss out. See you in the next article 🙂
  id: totrans-82
