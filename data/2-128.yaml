- en: 'From Reactive to Predictive: Forecasting Network Congestion with Machine Learning
    and INT'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从反应式到预测式：使用机器学习和INT预测网络拥塞
- en: 原文：[https://towardsdatascience.com/from-reactive-to-predictive-forecasting-network-congestion-with-machine-learning-and-int/](https://towardsdatascience.com/from-reactive-to-predictive-forecasting-network-congestion-with-machine-learning-and-int/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/from-reactive-to-predictive-forecasting-network-congestion-with-machine-learning-and-int/](https://towardsdatascience.com/from-reactive-to-predictive-forecasting-network-congestion-with-machine-learning-and-int/)
- en: Context
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: <mdspan datatext="el1752859713484" class="mdspan-comment">In large-scale data</mdspan>
    centers, network slowdowns can appear out of nowhere. A sudden burst of traffic
    from distributed systems, microservices, or AI training jobs can overwhelm switch
    buffers in seconds. The problem is not just knowing when something goes wrong.
    It is being able to see it coming before it happens.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在大型数据中心中，网络减速可能突然出现。分布式系统、微服务或AI训练作业的突然流量激增可能在几秒钟内耗尽交换机缓冲区。问题不仅仅是知道何时出现问题，而是能够在问题发生之前看到它。
- en: Telemetry systems are widely used to monitor network health, but most operate
    in a reactive mode. They flag congestion only after performance has degraded.
    Once a link is saturated or a queue is full, you are already past the point of
    early diagnosis, and tracing the original cause becomes significantly harder.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 遥测系统被广泛用于监控网络健康，但大多数系统处于反应式模式。它们只有在性能下降后才会标记拥塞。一旦链路饱和或队列满载，你已经错过了早期诊断的机会，追溯原始原因也变得非常困难。
- en: In-band Network Telemetry, or INT, tries to solve that gap by tagging live packets
    with metadata as they travel through the network. It gives you a real-time view
    of how traffic flows, where queues are building up, where latency is creeping
    in, and how each switch is handling forwarding. It is a powerful tool when used
    carefully. But it comes with a cost. Enabling INT on every packet can introduce
    serious overhead and push a flood of telemetry data to the control plane, much
    of which you might not even need.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 带内网络遥测，或称INT，试图通过在数据包通过网络时标记元数据来解决这一差距。它为你提供了实时查看流量流动、队列在哪里积累、延迟在哪里出现以及每个交换机如何处理转发的视图。当谨慎使用时，它是一个强大的工具。但它也有代价。在所有数据包上启用INT可能会引入严重开销，并将大量遥测数据推送到控制平面，其中大部分你可能甚至不需要。
- en: What if we could be more selective? Instead of tracking everything, we forecast
    where trouble is likely to form and enable INT just for those regions and just
    for a short time. This way, we get detailed visibility when it matters most without
    paying the full cost of always-on monitoring.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们能更具有选择性会怎样？不是跟踪所有事物，而是预测问题可能形成的地方，并只为这些区域和短时间内启用INT。这样，在关键时刻我们能够获得详细的可见性，而不必支付持续监控的全部成本。
- en: The Problem with Always-On Telemetry
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 持续遥测的问题
- en: 'INT gives you a powerful, detailed view of what’s happening inside the network.
    You can track queue lengths, hop-by-hop latency, and timestamps directly from
    the packet path. But there’s a cost: this telemetry data adds weight to every
    packet, and if you apply it to all traffic, it can eat up significant bandwidth
    and processing capacity.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: INT为你提供了一个强大、详细的网络内部情况视图。你可以直接从数据包路径中跟踪队列长度、逐跳延迟和时间戳。但这也带来了一定的代价：这种遥测数据会增加每个数据包的重量，如果你将其应用于所有流量，它可能会消耗大量的带宽和处理能力。
- en: 'To get around that, many systems take shortcuts:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，许多系统采取了捷径：
- en: '**Sampling:** Tag only a fraction (e.g. — 1%) of packets with telemetry data.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**采样：**仅对一小部分（例如——1%）的数据包添加遥测数据。'
- en: '**Event-triggered telemetry:** Turn on INT only when something bad is already
    happening, like a queue crossing a threshold.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**事件触发遥测：**仅在出现严重问题时才启用INT，例如队列超过阈值。'
- en: These techniques help control overhead, but they miss the critical early moments
    of a traffic surge, the part you most want to understand if you’re trying to prevent
    slowdowns.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技术有助于控制开销，但它们错过了流量激增的关键早期时刻，如果你试图防止减速，这是你最想了解的部分。
- en: Introducing a Predictive Approach
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 介绍一种预测方法
- en: 'Instead of reacting to symptoms, we designed a system that can forecast congestion
    before it happens and activate detailed telemetry proactively. The idea is simple:
    if we can anticipate when and where traffic is going to spike, we can selectively
    enable INT just for that hotspot and only for the right window of time.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们设计了一个系统，可以在拥塞发生之前预测拥塞并主动激活详细遥测，而不是对症状做出反应。想法很简单：如果我们能够预测流量何时何地会激增，我们就可以选择性地只为那个热点和正确的时间窗口启用INT。
- en: This keeps overhead low but gives you deep visibility when it actually matters.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这样可以降低开销，但在真正需要的时候提供深入可见性。
- en: System Design
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统设计
- en: We came up with a simple approach that makes network monitoring more intelligent.
    It can predict when and where monitoring is actually needed. The idea is not to
    sample every packet and not to wait for congestion to happen. Instead, we want
    a system that could catch signs of trouble early and selectively enable high-fidelity
    monitoring only when it’s needed.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提出了一种简单的方法，使网络监控更加智能。它可以预测何时何地需要进行监控。想法不是采样每个数据包，也不是等待拥塞发生。相反，我们希望有一个系统可以早期捕捉到问题的迹象，并在需要时选择性地启用高保真监控。
- en: So, how’d we get this done? We created the following four critical components,
    each for a distinct task.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们是如何完成这个任务的？我们创建了以下四个关键组件，每个组件都针对一个特定的任务。
- en: '![](../Images/2ef9cdb5d1c90db7fbd7bb96c5a2d552.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ef9cdb5d1c90db7fbd7bb96c5a2d552.png)'
- en: 'Image source: Author'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：作者
- en: Data Collector
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据收集器
- en: We begin by collecting network data to monitor how much data is moving through
    different network ports at any given moment. We use sFlow for data collection
    because it helps to collect important metrics without affecting network performance.
    These metrics are captured at regular intervals to get a real-time view of the
    network at any time.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先收集网络数据以监控在任何给定时刻有多少数据正在通过不同的网络端口移动。我们使用sFlow进行数据收集，因为它有助于收集重要指标而不影响网络性能。这些指标以固定的时间间隔捕获，以获得任何时间点的实时网络视图。
- en: Forecasting Engine
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测引擎
- en: The Forecasting engine is the most important component of our system. It’s built
    using a Long Short-Term Memory (LSTM) model. We went with LSTM because it learns
    how patterns evolve over time, making it suitable for network traffic. We’re not
    looking for perfection here. The important thing is to spot unusual traffic spikes
    that typically show up before congestion starts.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 预测引擎是我们系统最重要的组件。它是使用长短期记忆（LSTM）模型构建的。我们选择LSTM是因为它学习如何随时间演变模式，这使得它适合网络流量。我们在这里不追求完美。重要的是要发现通常在拥塞开始之前出现的异常流量峰值。
- en: Telemetry Controller
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 遥测控制器
- en: The controller listens to those forecasts and makes decisions. When a predicted
    spike crosses alert threshold the system would respond. It sends a command to
    the switches to switch into a detailed monitoring mode, but only for the flows
    or ports that matter. It also knows when to back off, turning off the extra telemetry
    once conditions return to normal.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 控制器监听这些预测并做出决策。当一个预测的峰值超过警报阈值时，系统会做出响应。它向交换机发送命令，切换到详细监控模式，但仅针对相关的流或端口。它也知道何时退回，一旦条件恢复正常，关闭额外的遥测。
- en: Programmable Data Plane
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可编程数据平面
- en: The final piece is the switch itself. In our setup, we use P4 programmable BMv2
    switches that let us adjust packet behavior on the fly. Most of the time, the
    switch simply forwards traffic without making any changes. But when the controller
    turns on INT, the switch begins embedding telemetry metadata into packets that
    match specific rules. These rules are pushed by the controller and let us target
    just the traffic we care about.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的部分是交换机本身。在我们的设置中，我们使用P4可编程BMv2交换机，它允许我们动态调整数据包的行为。大多数时候，交换机只是简单地转发流量而不做任何改变。但是当控制器开启INT时，交换机开始将遥测元数据嵌入到匹配特定规则的包中。这些规则由控制器推送，并允许我们针对我们关心的流量进行定位。
- en: This avoids the tradeoff between constant monitoring and blind sampling. Instead,
    we get detailed visibility exactly when it is needed, without flooding the system
    with unnecessary data the rest of the time.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这样可以避免在持续监控和盲目采样之间的权衡。相反，我们可以在需要的时候获得详细的可见性，而不会在系统其余时间中淹没不必要的数据。
- en: Experimental Setup
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验设置
- en: 'We built a full simulation of this system using:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用以下工具构建了这个系统的完整模拟：
- en: '**Mininet** for emulating a leaf-spine network'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Mininet** 用于模拟叶-脊网络'
- en: '**BMv2 (P4 software switch)** for programmable data plane behavior'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**BMv2 (P4软件交换机)** 用于可编程数据平面行为'
- en: '**sFlow-RT** for real-time traffic stats'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**sFlow-RT** 用于实时流量统计'
- en: '**TensorFlow + Keras** for the LSTM forecasting model'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TensorFlow + Keras** 用于 LSTM 预测模型'
- en: '**Python + gRPC + P4Runtime** for the controller logic'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python + gRPC + P4Runtime** 用于控制器逻辑'
- en: The LSTM was trained on synthetic traffic traces generated in Mininet using iperf.
    Once trained, the model runs in a loop, making predictions every 30 seconds and
    storing forecasts for the controller to act on.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 模型是在 Mininet 中使用 iperf 生成的合成交通轨迹上训练的。一旦训练完成，该模型将循环运行，每 30 秒进行一次预测，并将预测结果存储起来供控制器执行。
- en: 'Here’s a simplified version of the prediction loop:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是预测循环的简化版本：
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Switches respond immediately by switching telemetry modes for specific flows.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 交换机立即响应，为特定流量切换遥测模式。
- en: Why LSTM?
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么选择 LSTM？
- en: We went with an LSTM model because network traffic tends to have structure.
    It’s not entirely random. There are patterns tied to time of day, background load,
    or batch processing jobs, and LSTMs are particularly good at picking up on those
    temporal relationships. Unlike simpler models that treat each data point independently,
    an LSTM can remember what came before and use that memory to make better short-term
    predictions. For our use case, that means spotting early signs of an upcoming
    surge just by looking at how the last few minutes behaved. We didn’t need it to
    forecast exact numbers, just to flag when something abnormal might be coming.
    LSTM gave us just enough accuracy to trigger proactive telemetry without overfitting
    to noise.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择 LSTM 模型是因为网络流量往往具有结构。它并非完全随机。存在与一天中的时间、背景负载或批量处理作业相关的模式，而 LSTM 特别擅长捕捉这些时间关系。与独立处理每个数据点的简单模型不同，LSTM
    可以记住之前发生的事情，并利用这种记忆来做出更好的短期预测。对于我们的用例，这意味着只需观察最后几分钟的行为，就能发现即将到来的激增的早期迹象。我们不需要它来预测确切的数字，只需要标记可能出现的异常情况。LSTM
    给我们足够的准确性，可以触发主动遥测，而不会过度拟合噪声。
- en: Evaluation
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估
- en: We didn’t run large-scale performance benchmarks, but through our prototype
    and system behavior in test conditions, we can outline the practical advantages
    of this design approach.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有运行大规模的性能基准测试，但通过我们的原型和测试条件下的系统行为，我们可以概述这种设计方法的实际优势。
- en: Lead Time Advantage
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预先期优势
- en: One of the main benefits of a predictive system like this is its ability to
    catch trouble early. Reactive telemetry solutions typically wait until a queue
    threshold is crossed or performance degrades, which means you’re already behind
    the curve. By contrast, our design anticipates congestion based on traffic trends
    and activates detailed monitoring in advance, giving operators a clearer picture
    of what led to the issue, not just the symptoms once they appear.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这种预测系统的主要好处之一是它能够早期捕捉到问题。反应式遥测解决方案通常要等到队列阈值被越过或性能下降，这意味着你已经落后了。相比之下，我们的设计基于交通趋势预测拥堵，并提前激活详细监控，为操作员提供更清晰的关于问题原因的图景，而不仅仅是症状出现后的情况。
- en: Monitoring Efficiency
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 监控效率
- en: A key goal in this project was to keep overhead low without compromising visibility.
    Instead of applying full INT across all traffic or relying on coarse-grained sampling,
    our system selectively enables high-fidelity telemetry for short bursts, and only
    where forecasts indicate potential problems. While we haven’t quantified the exact
    cost savings, the design naturally limits overhead by keeping INT focused and
    short-lived, something that static sampling or reactive triggering can’t match.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，一个关键目标是保持开销低而不牺牲可见性。我们不是在所有流量上应用完整的 INT 或依赖粗粒度采样，而是我们的系统选择性地为短暂的高保真遥测启用，并且仅在预测表明可能存在问题的位置。虽然我们没有量化确切的成本节约，但设计自然地通过保持
    INT 集中和短暂来限制开销，这是静态采样或反应式触发无法比拟的。
- en: Conceptual Comparison of Telemetry Strategies
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 遥测策略的概念比较
- en: 'While we didn’t record overhead metrics, the intent of the design was to find
    a middle ground, delivering deeper visibility than sampling or reactive systems
    but at a fraction of the cost of always-on telemetry. Here’s how the approach
    compares at a high level:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们没有记录开销指标，但设计的意图是找到一个中间地带，提供比采样或反应式系统更深入的可见性，但成本仅为始终开启遥测的一小部分。以下是这种方法在高级别上的比较：
- en: '![](../Images/63ce1b0f7181f24ee10ce525b32bc538.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/63ce1b0f7181f24ee10ce525b32bc538.png)'
- en: 'Image source: Author'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：作者
- en: Conclusion
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: We wanted to figure out a better way to monitor the network traffic. By combining
    machine learning and programmable switches, we built a system that predicts congestion
    before it happens and activates detailed telemetry in just the right place and
    time.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要找到一种更好的方法来监控网络流量。通过结合机器学习和可编程交换机，我们构建了一个系统，该系统能够在拥堵发生之前预测拥堵，并在恰当的位置和时间激活详细的遥测。
- en: It seems like a minor change to predict instead of react, but it opens up a
    new level of observability. As telemetry becomes increasingly important in AI-scale
    data centers and low-latency services, this kind of intelligent monitoring will
    become a baseline expectation, not just a nice to have.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎只是从反应变为预测的微小变化，但它开启了一个新的可观察性层面。随着遥测在AI规模数据中心和低延迟服务中变得越来越重要，这种智能监控将成为基本期望，而不仅仅是锦上添花。
