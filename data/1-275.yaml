- en: 'Analysis of Sales Shift in Retail with Causal Impact: A Case Study at Carrefour'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 因果影响在零售销售转移分析中的应用：家乐福案例研究
- en: 原文：[https://towardsdatascience.com/analysis-of-sales-shift-in-retail-with-causal-impact-a-case-study-at-carrefour/](https://towardsdatascience.com/analysis-of-sales-shift-in-retail-with-causal-impact-a-case-study-at-carrefour/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/analysis-of-sales-shift-in-retail-with-causal-impact-a-case-study-at-carrefour/](https://towardsdatascience.com/analysis-of-sales-shift-in-retail-with-causal-impact-a-case-study-at-carrefour/)
- en: '***Disclosure:** I work at Carrefour. The views expressed in this article are
    my own. The data and examples presented are published with my employer’s permission
    and do not contain any confidential information.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**披露：**我在家乐福工作。本文中表达的观点是我个人的观点。所提供的数据和示例已获得雇主许可并不含任何机密信息。'
- en: <mdspan datatext="el1758136907017" class="mdspan-comment">Introduction</mdspan>
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758136907017" class="mdspan-comment">简介</mdspan>
- en: 'A store’s assortment is a complete and varied range of products sold to customers.
    It is subject to evolve based on various factors such as: economic conditions,
    consumer trends, profitability, quality or compliance issues, renewal of some
    product ranges, stock levels, seasonal changes, etc.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 商店的商品组合是向顾客销售的完整且多样化的产品范围。它受各种因素的影响而演变，例如：经济条件、消费趋势、盈利能力、质量或合规性问题、某些产品系列的更新、库存水平、季节性变化等。
- en: When a product is no longer available on the store shelves, some of its sales
    may shift to other products. For a major food retailer like Carrefour, it is crucial
    to estimate this sales shift accurately to manage the risk of loss due to product
    unavailability and approximate the loss due to it.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个产品在商店货架上不再可用时，其部分销售额可能会转移到其他产品。对于像家乐福这样的主要食品零售商来说，准确估计这种销售转移对于管理因产品不可用而造成的损失风险以及估算由此产生的损失至关重要。
- en: This measurement serves as an indicator of the consequences of the unavailability
    of a product. Additionally, it gradually builds a valuable history of sales shift
    impact estimates.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这种测量作为产品不可用后果的指标。此外，它逐渐构建了一个有价值的销售转移影响估计历史。
- en: Yet, estimating sales shifts is complex. Customer behavior — influenced by hard-to-predict
    emotional factors — seasonality of certain products, or introduction of new products
    can all affect sales shifts. In addition, many products become unavailable across
    all stores simultaneously, making it impossible to establish a control population.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，估计销售转移是复杂的。顾客行为——受难以预测的情感因素影响——某些产品的季节性，或新产品的推出都可能影响销售转移。此外，许多产品同时在所有商店中不可用，这使得建立控制群体成为不可能。
- en: The Causal Impact synthetic control approach, developed by a Google team, fits
    the particularities of our analysis framework. It enables us to isolate the effect
    of product unavailability on sales from influencing factors, and is suitable for
    both quasi-experimental and observational studies. Based on Bayesian structural
    time-series models, Causal Impact performs a counterfactual analysis, calculating
    the effect on sales as the difference between the sales observed after a product
    becomes unavailable and, through a synthetic control, the sales that would have
    been observed had the product remained available.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 由谷歌团队开发的因果影响合成控制方法符合我们分析框架的特定性。它使我们能够将产品不可用对销售的影响与影响因素隔离开来，并且适用于准实验和观察性研究。基于贝叶斯结构时间序列模型，因果影响进行反事实分析，计算销售影响为产品不可用后观察到的销售与通过合成控制本应观察到的销售之间的差异。
- en: This article presents our Causal Impact approach for estimating the sales shift
    effect following product unavailability, as well as a heuristic for selecting
    control group time series.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本文介绍了我们估算产品不可用后销售转移效应的因果影响方法，以及选择控制组时间序列的启发式方法。
- en: '*Due to confidentiality concerns, the quantitative values on the graphs have
    been redacted. Note that each block represents one month along the x-axis, and
    the y-axis represents a variable quantity, which can be quite large.*'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*由于保密问题，图表上的数值已被删除。请注意，每个块代表x轴上一个月，y轴代表一个变量数量，这可能相当大。*'
- en: I) Specifying the Use Case
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I) 指定用例
- en: 'Product unavailability occurs in two main forms:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 产品不可用主要有两种形式：
- en: 'Complete unavailability: the product is no longer available in the national
    assortment, affecting all stores.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全不可用：该产品不再在国家组合中可用，影响所有商店。
- en: 'Partial unavailability: the product is no longer available from some — but
    not all — stores. It remains available in others.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 部分不可用：产品在某些商店中不再可用——但不是所有商店——在其他商店中仍然可用。
- en: We consider that a reliable sales shift impact estimate should accurately assess
    both lost sales and portion of sales transferred to other products. Yet, knowing
    the exact value of these quantities is impossible, making this challenge complex.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们认为，可靠的销售额变化影响估计应该准确评估损失的销售和转移到其他产品的销售额部分。然而，知道这些数量的确切值是不可能的，这使得这个挑战变得复杂。
- en: Our study analyzes cases of complete product unavailability as these cases are
    the most significant in terms of sales impact.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的研究分析了产品完全不可用的情况，因为这些情况在销售影响方面最为重要。
- en: 'Please also note that causal inference is not a predictive framework for future
    events: it identifies causal links in the past rather than forecasting future
    events.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，因果推断不是未来事件的预测框架：它识别过去中的因果关系，而不是预测未来事件。
- en: II) Why did we choose Google’s Causal Impact model?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II) 为什么我们选择了谷歌的 Causal Impact 模型？
- en: Causal approaches aim to understand causal relationships between variables,
    explaining how one affects another by isolating the effect we are trying to analyze
    from all other existing effects.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 因果方法旨在理解变量之间的因果关系，通过隔离我们试图分析的效果，从所有其他现有效果中解释一个变量如何影响另一个变量。
- en: Among these tools, Causal Impact is a user-friendly library, and it operates
    within a fully Bayesian framework, allowing prior information integration while
    providing inherent credibility intervals in its results. Its predictions represent
    expected outcomes had the intervention not occurred, expressed as distribution
    functions rather than single values.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些工具中，Causal Impact 是一个用户友好的库，它在一个完全贝叶斯框架内运行，允许集成先验信息，同时在结果中提供内在的置信区间。其预测表示如果没有干预，预期的结果，以分布函数的形式表示，而不是单一值。
- en: Causal Impact generates predictions by combining endogenous components, such
    as seasonality and local level, with user-chosen external time series (covariates).
    These covariates must be unaffected by the intervention and should capture trends
    or factors that could influence the main time series. We will discuss covariate
    selection later.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Causal Impact 通过结合内生成分（如季节性和局部水平）与用户选择的对外时间序列（协变量）来生成预测。这些协变量必须不受干预的影响，并且应该捕捉到可能影响主要时间序列的趋势或因素。我们将在后面讨论协变量选择。
- en: '![](../Images/6101512d18aa72b2ad16e22862f828c2.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6101512d18aa72b2ad16e22862f828c2.png)'
- en: '***Fig. 1:*** *A simplified example of Causal Impact in action. The top graph
    shows two time series: the orange line represents actual observed data, while
    the blue line is the model’s prediction, created using covariates and endogenous
    components. Each block represents a month. This prediction estimates what would
    have happened if the event of interest (marked by the vertical dashed line) had
    not occurred. The blue shaded area indicates the prediction’s uncertainty. The
    second graph displays the point-by-point difference between the prediction and
    the observed data, and the bottom graph shows the cumulative impact.*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 1：*** *Causal Impact 在实际应用中的简化示例。顶部图表显示了两个时间序列：橙色线代表实际观察到的数据，而蓝色线是模型预测，使用协变量和内生成分创建。每个方块代表一个月。这个预测估计了如果感兴趣的事件（由垂直虚线标记）没有发生，会发生什么。蓝色阴影区域表示预测的不确定性。第二个图表显示了预测和观察数据之间的点对点差异，底部图表显示了累积影响。*'
- en: III) Managing Outliers and Anomalies in data
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III) 管理数据中的异常值和异常
- en: 'To ensure accurate analysis, we addressed sales data anomalies by following
    two key steps:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保分析准确，我们通过以下两个关键步骤解决了销售数据异常：
- en: We excluded time series with negative sales or a large number of zero sales
    from the analysis.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们排除了分析中销售为负或大量零销售的时间序列。
- en: For time series with occasional zero sales, we replaced these values with the
    average of the preceding and following weeks’ sales.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于偶尔出现零销售的时间序列，我们将这些值替换为前一周和后一周销售的平均值。
- en: IV) Model Design
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: IV) 模型设计
- en: The choice of covariates significantly influences counterfactual prediction
    accuracy. These time series must capture trends or external factors likely to
    influence the target time series without being affected by the intervention.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 协变量的选择对反事实预测的准确性有显著影响。这些时间序列必须捕捉到可能影响目标时间序列的趋势或外部因素，同时不受干预的影响。
- en: 'In addition, it is crucial to consider the size of the estimated sales shift
    effect relative to the time series being studied: if the intervention is expected
    to affect the target series by only a few percent, the series may not be appropriate,
    as small effects are difficult to distinguish from random noise (especially as
    the library designers have shown that effects less than 1% are difficult to prove
    as being linked to the intervention). Therefore, we analyzed sales shift only
    when the theoretical maximum sales shift rate exceeds 5% of sales in its sub-family.
    We calculated this as S/(1-S), where S represents the percentage of turnover the
    product generated in its sub-family before becoming unavailable.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，考虑估计的销售位移效应相对于所研究的时间序列的大小至关重要：如果干预预计只会使目标序列受到影响几个百分点，则该序列可能不合适，因为小效应难以与随机噪声区分（尤其是图书馆设计者已经表明，小于1%的效果难以证明与干预有关）。因此，我们仅在理论最大销售位移率超过其子系列销售5%的情况下分析销售位移。我们将其计算为S/(1-S)，其中S表示产品在变得不可用之前在其子系列中产生的营业额百分比。
- en: 'Given those preliminary considerations, we designed our Causal Impact model
    as follows:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些初步考虑，我们设计了以下Causal Impact模型：
- en: '**Target**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标**'
- en: As the target time series, we selected the sum of sales for the product’s sub-family,
    excluding the product that became unavailable.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 作为目标时间序列，我们选择了产品子系列的销售总和，排除了已不可用的产品。
- en: '**Covariates**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**协变量**'
- en: 'We first excluded the following types of time series:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先排除了以下类型的时间序列：
- en: Products from the same sub-family as the discontinued product, to prevent any
    influence from its unavailability.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与已停售产品属于同一子系列的产品，以防止其不可用性产生任何影响。
- en: Products from different families than the discontinued product, since covariates
    should remain business-relevant.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与已停售产品不属于同一系列的其它产品，因为协变量应保持业务相关性。
- en: Time series that showed correlation but not co-integration with the target series,
    to avoid spurious relationships.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与目标序列相关但不是协整的时间序列，以避免虚假关系。
- en: 'Using these filters, we selected 60 covariates:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些过滤器，我们选择了60个协变量：
- en: 20 covariates were chosen based on their highest co-integration with the target
    series during the year before intervention.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 20个协变量是基于它们在干预前一年与目标序列的最高协整性选择的。
- en: 40 additional covariates were selected from the top 200 co-integrated series,
    based on their strongest correlation with the target series during the year before
    intervention.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从前200个协整序列中选择了40个额外的协变量，基于它们在干预前一年与目标序列的最强相关性。
- en: Note that these numbers (20, 40, and 60) are rules of thumb derived from our
    previous model fits.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这些数字（20、40和60）是从我们之前的模型拟合中得出的经验法则。
- en: This empirical approach combines time series that capture both long-term trends
    (through co-integration) and short-term variations (through correlation). We deliberately
    chose a large number of covariates because Causal Impact employs a “spike and
    slab” method, which automatically reduces the influence of less significant series
    by assigning them near-zero regression coefficients, while giving greater weight
    to important ones.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这种经验方法结合了捕捉长期趋势（通过协整）和短期变化（通过相关性）的时间序列。我们故意选择了大量的协变量，因为Causal Impact采用了一种“尖峰和板”方法，该方法通过分配接近零的回归系数自动减少不显著序列的影响，同时给予重要序列更大的权重。
- en: V) Model Validation
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: V) 模型验证
- en: 'To validate our covariate selection strategy, we drew heavily on the approach
    used by the Causal Impact designers. We conducted a study of partial product unavailability
    as follows:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了验证我们的协变量选择策略，我们大量借鉴了Causal Impact设计者所采用的方法。我们进行了以下部分产品不可用性的研究：
- en: We examined cases where products became partially unavailable and performed
    an initial conventional statistical analysis using difference-in-differences.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们检查了产品部分不可用的情况，并使用差异-差异方法进行了初步的传统统计分析。
- en: We applied Causal Impact using, as covariates, a control population that consisted
    of the product’s sub-family sales (excluding the unavailable product) in stores
    where the product remained available. These covariates provided the best available
    counterfactual since these stores were unaffected by the intervention.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们应用Causal Impact时，将控制人口作为协变量，该人口由产品子系列的销售（不包括不可用的产品）组成，这些产品在商店中仍然可用。这些协变量提供了最佳的可供选择的假设，因为这些商店未受到干预的影响。
- en: Finally, we applied Causal Impact without a control population, instead using
    our selection process based on co-integration and correlation as outlined in the
    Model Design section.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们在没有对照组的情况下应用了因果影响，而是使用我们在模型设计部分概述的基于协整和相关的选择过程。
- en: Consistent estimates across multiple reports (spanning different products, quantities,
    and categories) would demonstrate that we can reliably apply this approach on
    a broader scale.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在多个报告（涵盖不同产品、数量和类别）中的一致估计将证明我们可以在更广泛的范围内可靠地应用这种方法。
- en: 'Additionally we developed two metrics to evaluate the synthetic control’s quality:
    a fitness measure and a predictive capability measure.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还开发了两个指标来评估合成控制的品质：一个适应性指标和一个预测能力指标。
- en: The fitness measure, scored between 0 and 1, assesses how well the synthetic
    control models the target over the pre-intervention period.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适应性指标，评分在0到1之间，评估合成控制模型在干预前期间对目标建模的优劣。
- en: The predictive capability measure is a form of backtesting that evaluates the
    synthetic control’s quality during a simulated false intervention in the past.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测能力指标是一种回溯测试，它评估了合成控制在过去模拟的虚假干预期间的质量。
- en: '**A Practical Validation Example**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个实际验证示例**'
- en: To validate the process described above with a practical example, we analyzed
    a case where a yogurt pack became unavailable in certain stores. We established
    treatment and control groups by matching each store where the product became unavailable
    with a similar store that still had the product, based on criteria such as sales
    performance, customer characteristics, and geographic location.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 为了通过一个实际案例验证上述描述的过程，我们分析了一个酸奶包装在某些商店中不可用的情况。我们通过匹配每个产品不可用的商店与一个具有相似销售表现、客户特征和地理位置的仍有产品的商店，建立了治疗组和对照组。
- en: The theoretical maximum sales shift rate for this product was 9.5%, and our
    previous analyses showed very high sales shift rates in the dairy product family.
    Consequently, we anticipated to obtain an estimate close to the theoretical maximum
    rate.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 该产品的理论最大销售转移率为9.5%，我们之前的分析显示乳制品家族的销售转移率非常高。因此，我们预计将获得接近理论最大率的估计。
- en: 'Following our three-step validation method, we obtained these results:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 按照我们的三步验证方法，我们获得了以下结果：
- en: The difference-in-differences analysis estimated the causal effect at 8.7% with
    98.7% probability.
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 差分差分分析估计的因果效应为8.7%，概率为98.7%。
- en: As shown in Figure 2 (below), the Causal Impact analysis using a control population
    estimated a causal effect of 9.0%, with a confidence interval of [3.7%, 14.4%]
    and 99.9% probability. We can also see that while the model effectively tracks
    the time series fluctuations, it does show some minor deviations.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如图2（下方所示），使用对照组进行因果影响分析估计的因果效应为9.0%，置信区间为[3.7%，14.4%]，概率为99.9%。我们还可以看到，虽然模型有效地追踪了时间序列波动，但它确实显示出一些小的偏差。
- en: '![](../Images/335b272b2e696d164931f7d758956807.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/335b272b2e696d164931f7d758956807.png)'
- en: '***Fig. 2:*** *Causal effect estimation for the dairy product brand after product
    unavailability, using a control population to construct the synthetic control.*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2：** 使用对照组构建的合成控制对产品不可用后乳制品品牌因果效应的估计。'
- en: In addition, when using covariates selected based on co-integration and correlation
    instead of a control population, the Causal Impact analysis estimated a causal
    effect of 8.5%, with a confidence interval of [2.4%, 15.1%] and 99.9% probability
    as shown in Figure 3 (below). Again, the model effectively tracks the time series
    fluctuations, yet showing some minor deviations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，当使用基于协整和相关的协变量而不是对照组时，因果影响分析估计的因果效应为8.5%，置信区间为[2.4%，15.1%]，概率为99.9%，如图3（下方所示）。同样，模型有效地追踪了时间序列波动，但显示出一些小的偏差。
- en: '![](../Images/371e6d9522f632de1d692287603ee6b8.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/371e6d9522f632de1d692287603ee6b8.png)'
- en: '***Fig. 3:*** *Causal effect estimation for the dairy product brand after product
    unavailability, using proxies (only data from stores in the treatment population
    to constitute the synthetic control).*'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3：** 使用代理（仅使用治疗群体中的商店数据构成合成控制）对产品不可用后乳制品品牌因果效应的估计。'
- en: 'Here is a summary of the estimates obtained across the three different analysis
    methods:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是三种不同分析方法获得的估计总结：
- en: '| **Analysis** | **Effect estimation** | **Causal effect probability** |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| **分析** | **效应估计** | **因果效应概率** |'
- en: '| Difference in Differences | 8.7% | 98.7% (significant) |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| 差分法 | 8.7% | 98.7%（显著）|'
- en: '| Causal Impact with a control population | 9.0% CI: [3.7%, 14.4%] | 99.9%
    (significant) |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| 带有控制人群的因果影响 | 9.0% CI: [3.7%, 14.4%] | 99.9%（显著）|'
- en: '| Causal Impact without a control population information | 8.5% CI: [2.4, 15.1%]
    | 99.1% (significant) |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| 没有控制人群信息的因果影响 | 8.5% CI: [2.4, 15.1%] | 99.1%（显著）|'
- en: It shows that the estimates remain consistent in magnitude, whether using a
    control population or not, thus validating our selection process for covariates
    when no control population is available.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明，无论是否使用控制人群，估计值的大小保持一致，从而验证了在没有控制人群时我们对协变量的选择过程。
- en: 'VI) Complete unavailability: A rice pack no longer available'
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: VI) 完全不可用：不再可用的米包
- en: We examined a nationwide case where a pack of rice brand became unavailable.
    We restrained our analysis to the following few months after the product became
    unavailable to avoid capturing unrelated effects that might emerge over a longer
    period. The theoretical maximum sales shift rate for the product was 31.2%. We
    applied the covariate selection methodology described earlier to estimate the
    potential sales shift effect.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们考察了一个全国性的案例，其中一种米品牌变得不可用。我们将分析限制在产品不可用后的几个月内，以避免捕捉到可能在未来更长时期内出现的无关效应。该产品的理论最大销售转移率为31.2%。我们应用了前面描述的协变量选择方法来估计潜在的销售额转移效应。
- en: '![](../Images/125546611acc9c40fa1f67217551a082.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/125546611acc9c40fa1f67217551a082.png)'
- en: '***Fig. 4:*** *Causal effect estimation after the pack of rice brand became
    unavailable, using proxies (only data from stores in the treatment population
    to constitute the synthetic control).*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '***图4：*** *在米品牌不再可用后，使用代理（仅使用治疗人群中的商店数据构成合成控制）进行因果效应估计。*'
- en: As shown in Figure 4, the synthetic control models the target very well over
    the period before the intervention. The prediction accurately captures seasonal
    trends after the intervention. The credibility interval is very narrow around
    the estimate.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如图4所示，合成控制模型在干预前很好地模拟了目标。干预后，预测准确捕捉到了季节性趋势。估计值的可信区间非常窄。
- en: We obtained a statistically significant estimate at 22% increase in turnover
    caused by the product unavailability over the following months, with over 99.9%
    probability. This quantity represents approximately 70% of the pack of rice total
    sales before the product became unavailable, implying that 30% of the pack of
    rice sales did not shift.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们获得了统计上显著的估计值，表明产品不可用导致的销售额在接下来的几个月内增加了22%，概率超过99.9%。这个数量大约代表了产品不可用前米包总销售额的70%，这意味着30%的米包销售额没有转移。
- en: VII) Usage recommendations and experience report
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: VII) 使用建议和经验报告
- en: Causal Impact is a robust and user-friendly tool for causal inferences. Yet
    after significant time spent specifying the model and improving its accuracy,
    we encountered challenges in fine-tuning it to obtain an industrializable solution.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 因果影响是一个稳健且用户友好的因果推断工具。然而，在花费大量时间指定模型并提高其精度后，我们在将其微调以获得可工业化的解决方案时遇到了挑战。
- en: The first point we want to highlight is the importance of the “garbage in, garbage
    out” principle, which is particularly relevant when using Causal Impact. Regardless
    of the covariates used, Causal Impact will always produce a result, sometimes
    with very high probability, even in cases where results are unrealistic, or impossible.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们想要强调的第一个要点是“垃圾输入，垃圾输出”原则的重要性，这在使用因果影响时尤其相关。无论使用哪些协变量，因果影响总会产生结果，有时概率非常高，即使在结果不现实或不可能的情况下。
- en: Time series selected solely based on the co-integration criterion sometimes
    overshadow others in model feature importance, which can drastically reduce the
    estimation accuracy when adjustment is not well-controlled.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仅根据协整标准选择的时间序列有时会掩盖模型特征的重要性，如果不严格控制调整，这可能会极大地降低估计精度。
- en: The selection of 20 series for co-integration and 40 for correlation is an empirical
    rule of thumb. While effective in most cases we encountered, it could benefit
    from further refinement.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择20个序列进行协整和40个序列进行相关性的选择是一个经验法则。虽然在我们遇到的大多数情况下都有效，但它可能需要进一步的细化。
- en: Conclusion
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article we proposed a causal approach to estimate the sales shift effect
    when a product becomes unavailable, using Causal Impact. We outlined a methodology
    for selecting analyzable products, and covariates.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们提出了一种因果方法来估计产品不可用时的销售转移效应，使用了因果影响（Causal Impact）。我们概述了选择可分析产品和协变量的方法。
- en: Although this approach is functional and robust in most cases, it has limitations
    and areas for improvement. Some are structural, while others require spending
    more time on model adjustment.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这种方法在大多数情况下是功能性和稳健的，但它存在局限性和改进领域。一些是结构性的，而另一些则需要花费更多时间在模型调整上。
- en: We tested the methodology on different products with promising results, but
    it is not exhaustive. Some very seasonal products or ones with little historical
    data pose challenges. Additionally, products that became unavailable in only a
    few stores are rare, limiting our ability to validate the method on a large number
    of diverse cases.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在不同产品上测试了该方法，并取得了有希望的结果，但它并不全面。一些非常季节性或历史数据很少的产品具有挑战性。此外，仅在少数几家商店中不可用的产品很少见，这限制了我们在大量不同案例中验证该方法的能力。
- en: 'Another structural limitation is the model’s requirement for post-hoc analysis:
    the tool does not allow sales shift effect prediction before a product becomes
    unavailable. Being able to do so would greatly benefit business teams. Work is
    underway to approach sales shift prediction using bayesian structural time series
    forecasting.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一个结构性的限制是模型对事后分析的要求：在产品不可用之前，该工具不允许预测销售转移效应。能够这样做将极大地有利于业务团队。目前正在努力使用贝叶斯结构时间序列预测方法来接近销售转移预测。
- en: 'The sales shift effect analysis ignores margin impacts: the product that became
    unavailable may have a higher unit margin than the products to which its sales
    shifted. The commercial conclusions to be drawn could then differ, but analysis
    at a sub-family level precludes this level of detail.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售转移效应分析忽略了边际影响：变得不可用的产品可能比其销售转移到的产品具有更高的单位边际利润。由此得出的商业结论可能不同，但在子家族级别的分析中排除了这一级别的细节。
- en: Finally we could explore alternative synthetic controls, such as Augmented SC,
    Robust SC, Penalized SC, or even other causal approaches such as the two-way fixed
    effect model.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们可以探索其他替代合成控制，例如增强SC（Augmented SC）、鲁棒SC（Robust SC）、惩罚SC（Penalized SC），甚至其他因果方法，如双向固定效应模型。
