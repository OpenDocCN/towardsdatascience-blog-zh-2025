- en: The Fallacy of Complacent Distroless Containers
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 满足现状的 Distroless 容器的谬误
- en: 原文：[https://towardsdatascience.com/the-fallacy-of-complacent-distroless-containers-8b09bd3ad55a/](https://towardsdatascience.com/the-fallacy-of-complacent-distroless-containers-8b09bd3ad55a/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-fallacy-of-complacent-distroless-containers-8b09bd3ad55a/](https://towardsdatascience.com/the-fallacy-of-complacent-distroless-containers-8b09bd3ad55a/)
- en: '![Image generated with Leonardo AI](../Images/38cc1d9a8790a87a89a8a75f406b92e9.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由 Leonardo AI 生成的图像](../Images/38cc1d9a8790a87a89a8a75f406b92e9.png)'
- en: Image generated with Leonardo AI
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由 Leonardo AI 生成的镜像
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Building [Docker images](https://docs.docker.com/get-started/docker-concepts/the-basics/what-is-an-image/)
    is an [easy and accessible practice](https://medium.com/better-programming/the-whole-shebang-dockerfiles-5d59ace94d28),
    however, perfecting them is still an art that is challenging to master. In pursuit
    of the smallest, most secure and yet functional container images, developers face
    themselves with [distroless](https://github.com/GoogleContainerTools/distroless)
    practices that usually involve complex tooling, deep distro knowledge and error-prone
    trimming strategies. In fact, such practices often neglect the use of package
    managers, contributing to a security abyss, as most vulnerability scanners rely
    on package manager metadata to detect the software components within the container
    image.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 构建 [Docker 镜像](https://docs.docker.com/get-started/docker-concepts/the-basics/what-is-an-image/)
    是一种 [简单易行的实践](https://medium.com/better-programming/the-whole-shebang-dockerfiles-5d59ace94d28)，然而，完美地构建它们仍然是一门难以掌握的艺术。为了追求最小、最安全且功能齐全的容器镜像，开发者们面临着涉及复杂工具、深入的分发知识以及易出错的裁剪策略的
    [distroless](https://github.com/GoogleContainerTools/distroless) 实践。实际上，这些实践往往忽略了包管理器的使用，这导致了安全漏洞，因为大多数漏洞扫描器依赖于包管理器元数据来检测容器镜像中的软件组件。
- en: Building container images
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建容器镜像
- en: When you build a container image, you’re packaging your application, together
    with its dependencies, in a portable software unit that can later be deployed
    in isolation, without the need to virtualize an entire operating system.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当您构建容器镜像时，您正在将应用程序及其依赖项打包成一个可移植的软件单元，稍后可以独立部署，无需虚拟化整个操作系统。
- en: Building container images is actually a very accessible practice nowadays. There’s
    an abundance of tools (e.g. [Docker](https://docs.docker.com/reference/dockerfile/),
    [Rockcraft](https://documentation.ubuntu.com/rockcraft/en/stable/), [Buildah](https://buildah.io/)…)
    specifically for that purpose.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 构建容器镜像现在实际上是一种非常容易接触到的实践。有大量工具（例如 [Docker](https://docs.docker.com/reference/dockerfile/)、[Rockcraft](https://documentation.ubuntu.com/rockcraft/en/stable/)、[Buildah](https://buildah.io/)…）专门为此目的而设计。
- en: '**But**, in the process of packing your application and everything it needs
    in order to run, could you possibly be adding more that what’s needed?'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**但是**，在打包您的应用程序及其运行所需的一切的过程中，您是否可能添加了不需要的东西？'
- en: Most of the time, the answer is **yes**!
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数情况下，答案是 **是的**！
- en: 'Here’s a very simple Dockerfile:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个非常简单的 Dockerfile：
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In this example, we’re packing [Nginx](https://nginx.org/en/) on top of an Ubuntu
    24.04 image. But,
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们是在 Ubuntu 24.04 图像之上打包 [Nginx](https://nginx.org/en/)。
- en: '`ubuntu:24.04` will be in our final image. Do we actually need it? Most likely
    not. With it, a bunch of unnecessary software (e.g. utilities like `apt`) will
    be kept and thus increase the image’s attack surface;'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ubuntu:24.04` 将在我们的最终镜像中。我们实际上需要它吗？很可能不需要。有了它，一大堆不必要的软件（例如 `apt` 这样的实用工具）将被保留，从而增加了镜像的攻击面；'
- en: even though we were careful not to install recommendations and clean the `apt`
    lists, we still installed the whole Nginx package and all its dependencies. Do
    we need all that? This is a trickier one to answer as it depends a lot on the
    use case, but we surely know we don’t want things like Nginx’s man pages, for
    example.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽管我们小心地没有安装推荐项并清理 `apt` 列表，但我们仍然安装了整个 Nginx 软件包及其所有依赖项。我们需要所有这些吗？这个问题比较棘手，因为它很大程度上取决于使用场景，但我们确实知道我们不想有像
    Nginx 的 man 页面这样的东西。
- en: Distroless containers
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Distroless 容器
- en: '"[Distroless](https://github.com/GoogleContainerTools/distroless)" images contain
    only your application and its runtime dependencies.'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '"[Distroless](https://github.com/GoogleContainerTools/distroless)" 镜像仅包含您的应用程序及其运行时依赖项。'
- en: They do not contain the typical additional libraries or utilities from a Linux
    distribution.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 它们不包含来自 Linux 分发的典型附加库或实用工具。
- en: This has been the most advocated practice in the space of container security
    for the past 7 years. And although conceptually right, what’s the cost of building
    these smaller and "more secure(?)" distroless containers?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这在过去 7 年的容器安全领域一直是最推崇的做法。尽管在概念上是正确的，但构建这些更小且“更安全（？）”的无发行版容器有什么成本？
- en: '**Easy to build?** Not really. It can be a hard craft to master as you may
    need to use specialized tooling and require deep distro knowledge to effectively
    "remove the distro".'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容易构建吗？**并不真的容易。这可能是一项需要使用专用工具并需要深入了解发行版以有效“去除发行版”的艰难工艺。'
- en: '**Error-prone?** Yes. Some of the most advocated strategies for building distroless
    images involve following a "top-down" approach – i.e. bloating a base container
    with your application, and then **manually** cherry-picking the desired contents
    into a "scratch" environment.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容易出错吗？**是的。一些最推崇的构建无发行版镜像的策略涉及采用“自上而下”的方法——即用你的应用程序膨胀基础容器，然后**手动**将所需内容挑选到“scratch”环境中。'
- en: Correlation is not causation
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 相关性不等于因果关系
- en: It’s not because your container is smaller, that it will necessarily be more
    secure! In fact, the making of distroless containers is prone to the creation
    of *blind spots*.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 并不是因为你的容器更小，它就一定会更安全！事实上，构建无发行版容器容易产生**盲点**。
- en: A [2022 Rezilion report by Yotam Perkal](https://www.linkedin.com/posts/yotam-perkal_scanning-the-scanners-vulnerability-scanner-activity-7086727226372587521-pd94?utm_source=share&utm_medium=member_desktop)
    tested the reliability and consistency of different vulnerability scanners by
    scanning 20 of the most popular container images and comparing the resulting vulnerability
    reports. Besides the abundance of HIGH and CRITICAL misidentifications, the report
    also shows an 82% average precision from these tools, with a significant portion
    of the resulting being comprised of both *False Positives* and *False Negatives*.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Yotam Perkal 的 [2022 Rezilion 报告](https://www.linkedin.com/posts/yotam-perkal_scanning-the-scanners-vulnerability-scanner-activity-7086727226372587521-pd94?utm_source=share&utm_medium=member_desktop)
    通过扫描 20 个最受欢迎的容器镜像并比较结果漏洞报告，测试了不同漏洞扫描器的可靠性和一致性。除了大量的高和关键误识别外，报告还显示这些工具的平均精确度为
    82%，其中很大一部分结果由**假阳性**和**假阴性**组成。
- en: To be honest, I’m ok with *False Positives* – it’s like being told you’re sick,
    when in reality it was just an examination error – it’s scary, but not truly dangerous.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 说实话，我对**假阳性**可以接受——就像被告知你生病了，而实际上只是检查错误——虽然很可怕，但并不真正危险。
- en: '*False Negatives*, on the other hand, are much worse! It’s like having a problem
    you’re not aware of – **a blind spot**!'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，**假阴性**要糟糕得多！就像有一个你不知道的问题——**一个盲点**！
- en: The main cause for security blind spots
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全盲点的根本原因
- en: One of the main reasons why vulnerability scanners are unable to detect certain
    vulnerabilities is because most of them **rely on package metadata** and are thus
    **unable to detect software components not managed by package managers**.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 防漏洞扫描器无法检测某些漏洞的主要原因之一是，它们中的大多数**依赖于包元数据**，因此**无法检测到由包管理器未管理的软件组件**。
- en: Don’t believe me? Let me show you.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你不相信我？让我来给你展示。
- en: For demonstration purposes, let’s just take a popular and vulnerable Docker
    image from Docker Hub, and a popular vulnerability scanner.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示目的，我们只需从 Docker Hub 选取一个流行且存在漏洞的 Docker 镜像，以及一个流行的漏洞扫描器。
- en: 'Let’s say:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们说：
- en: '[Trivy](https://trivy.dev/latest/) as the scanner, and'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Trivy](https://trivy.dev/latest/) 作为扫描器，'
- en: '`[ubuntu:lunar](https://hub.docker.com/layers/library/ubuntu/lunar/images/sha256-ea1285dffce8a938ef356908d1be741da594310c8dced79b870d66808cb12b0f)`
    as the Docker image.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`[ubuntu:lunar](https://hub.docker.com/layers/library/ubuntu/lunar/images/sha256-ea1285dffce8a938ef356908d1be741da594310c8dced79b870d66808cb12b0f)`
    作为 Docker 镜像。'
- en: 'At the time of writing this, the chosen Docker image is already EOL, and vulnerable.
    According to Trivy, this image has a total of 11 CVEs:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，所选的 Docker 镜像已经过时，并且存在漏洞。根据 Trivy 的分析，这个镜像总共有 11 个 CVE：
- en: '[PRE1]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: BUT, this is a Debian-based container image, so what does Trivy say if we delete
    the image’s package metadata? Let’s see…
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这是一个基于 Debian 的容器镜像，那么如果我们删除镜像的包元数据，Trivy 会说什么呢？让我们看看…
- en: '[PRE2]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Drumroll please… 🥁
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓掌吧… 🥁
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Zero, zip, zilch, nada…no vulnerabilities! Or so it looks. But we know there
    are still 11 CVEs. We just deleted the package metadata Trivy relies on to perform
    the scan.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 零，零，什么都没有…没有漏洞！看起来是这样。但我们知道仍有 11 个 CVE。我们只是删除了 Trivy 扫描所依赖的包元数据。
- en: '* * *'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What now?
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现在怎么办？
- en: Vulnerability scanners behave differently and may rely on information within
    the container image itself in order to produce accurate reports!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 漏洞扫描器的工作方式不同，它们可能依赖于容器镜像本身的信息来生成准确的报告！
- en: 'So here’s a checklist you can use to ensure the containers you build and consume
    are not carrying hidden vulnerabilities:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这里有一个你可以使用的清单，以确保你构建和使用的容器没有携带隐藏的漏洞：
- en: it’s not because it’s small and distroless that the container you’re planning
    to use is secure.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 并不是因为容器小巧且无分发系统，你计划使用的容器就是安全的。
- en: look beyond the vulnerability scanner. As we saw in the example above, a single
    missing file can cause the scanners to fail to identify CVEs. So don’t turn a
    blind eye on this! Yes, use scanners! But also try looking around for hints that
    blind spots may exist. How?
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 看看超越漏洞扫描器。正如我们在上面的例子中看到的，一个缺失的文件可能导致扫描器无法识别CVE。所以，不要对此视而不见！是的，使用扫描器！但也要尝试寻找可能存在的盲点的线索。如何？
- en: 'some scanners, like Trivy, will actually issue a warning when the files they
    rely on (like `dpkg/status` above) are missing. E.g. Trivy will say: | *WARN No
    OS package is detected. Make sure you haven’t deleted any files | that contain
    information about the installed packages. | WARN e.g. files under "/lib/apk/db/",
    "/var/lib/dpkg/" and "/var/lib/rpm" –* some of these tools, Trivy included, can
    also produce SBOMs. This is a more user-friendly way of double-checking the image’s
    software components. So try to produce an SBOM (e.g. `trivy image --format spdx-json
    --output result.json <yourImage>`). Is this SBOM empty? Is it missing components
    that you’d expect to see in that image? If so, then the vulnerability scanner
    will very likely also fail to produce an accurate report.'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些扫描器，如Trivy，实际上会在它们依赖的文件（如上面的`dpkg/status`）缺失时发出警告。例如，Trivy会说：| *WARN 没有检测到操作系统包。请确保您没有删除包含有关已安装包信息的任何文件
    | WARN 例如，位于"/lib/apk/db/"、"/var/lib/dpkg/"和"/var/lib/rpm"下的文件 –* 一些工具，包括Trivy，也可以生成SBOM。这是一种更用户友好的方式来双重检查镜像的软件组件。所以尝试生成一个SBOM（例如，`trivy
    image --format spdx-json --output result.json <yourImage>`）。这个SBOM是空的吗？它是否缺少您期望在该镜像中看到的组件？如果是这样，那么漏洞扫描器很可能也无法生成准确的报告。
- en: vulnerability scanners vary, so don’t rely just on one scanner. Try choosing
    the ones with better support for the type of software ecosystem that is packed
    inside the image you want to use.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 漏洞扫描器各不相同，所以不要只依赖一个扫描器。尝试选择那些对您想要使用的镜像中包含的软件生态系统有更好支持的扫描器。
- en: avoid "dead drops" when building your container. I.e. cherry-picking the minimum
    set of files you need to make your application work might sound appealing, but
    you may unintentionally be leaving out the necessary metadata for the scanners
    to work properly.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在构建容器时避免“死点”。也就是说，选择使您的应用程序工作的最小文件集可能听起来很有吸引力，但您可能无意中遗漏了扫描器正常工作的必要元数据。
- en: related to the above, favor the use of package managers. Yes, some of them aren’t
    really well adjusted to work with minimal containers, but as we saw above, some
    of the metadata they produce is critical for a proper security scan.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关于上述内容，优先考虑使用包管理器。是的，其中一些可能并不真正适合与最小化容器一起工作，但正如我们上面看到的，它们产生的某些元数据对于进行适当的安全扫描是至关重要的。
- en: '* * *'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In a coming article, I’ll explore a few techniques for building minimal container
    images, from the typical multi-stage approach to the distroless-friendly tools
    like [Chisel](https://ubuntu.com/containers/chiselled).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在即将发表的这篇文章中，我将探讨一些构建最小化容器镜像的技术，从典型的多阶段方法到对无分发系统友好的工具，如[Chisel](https://ubuntu.com/containers/chiselled)。
