- en: Motivation
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: My motivation for this article is that I have been writing articles for about
    2.5 years. I decided to reflect a bit on my writing journey and why writing technical
    articles is one of the best decisions I have made so far in my career.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我撰写本文的动机是我已经撰写文章大约2.5年了。我决定反思一下我的写作之旅，以及为什么撰写技术文章是我职业生涯中做出的最佳决定之一。
- en: '**Learning the topics better**: The best way of learning is to teach others.
    This is essentially what you’re doing when writing technical articles.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深入学习主题**：最好的学习方法就是教授他人。当你撰写技术文章时，本质上就是在做这件事。'
- en: '**Networking**: You get to connect with a lot of readers of your articles and
    other writers doing the same as you. This presents opportunities both for gaining
    a following and learning from others.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立人脉**：你可以与许多阅读你文章的读者以及其他与你做同样事情的小说家建立联系。这既为你赢得追随者提供了机会，也为你从他人那里学习提供了机会。'
- en: '**Monitization:** If you have enough readers, writing is also a way of economically
    supporting yourself, though I preface that this should not be your primary motivation
    to start writing.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**货币化**：如果你有足够的读者，写作也是一种经济上支持自己的方式，尽管我必须提前说明，这不应该是你开始写作的主要动机。'
- en: I believe the first point on learning topics outweighs any other benefit I’ve
    had from writing. Writing provides an avenue to both teach others about a topic
    and simultaneously further deepen your knowledge on a topic. Teaching others is
    the best way to learn something yourself.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为学习主题的第一点比我从写作中获得的其他任何好处都重要。写作提供了一个途径，既可以教授他人关于一个主题的知识，同时也能进一步深化你对这个主题的了解。教授他人是自我学习最好的方式。
- en: I find it incredibly rewarding to write an article to teach others while also
    further enhancing my understanding of a topic through writing about it. I truly
    reckon this to be one of the greatest parts of practicing technical writing, and
    a significant reason I recommend that you also write technical articles.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现，在写作教授他人的同时，通过写作加深对主题的理解，这是一种非常有益的经历。我真心认为这是实践技术写作最伟大的部分之一，也是我推荐您也写技术文章的一个重要原因。
- en: Types of technical articles
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术文章的类型
- en: '*“How to* …” programming articles'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*“如何”…* 编程文章'
- en: Testing/reporting on new releases
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试/报告新版本
- en: Teach about a topic
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讲解一个主题
- en: '![](../Images/b2e174a242670d6c967703f419777351.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b2e174a242670d6c967703f419777351.png)'
- en: This taxonomy highlights some different types of technical articles. Image by
    ChatGPT.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这类分类突出了不同类型的技术文章。图由ChatGPT提供。
- en: “How to” articles
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: “如何”文章
- en: A how-to article is an article detailing how to do something within programming.
    It could be as specific as how to utilize a particular Python package, or as vague
    as [how to use context engineering](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/).
    These are the kinds of articles I prefer to write, as they fit both within what
    I enjoy writing about and the kinds of articles I receive the inspiration to write
    about. For example, I utilize a new framework in a project, or learn about a topic
    ([for example, context engineering](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/)),
    and write a specific article on how to utilize the framework, or how to do something
    specific within the topic.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一篇“如何”文章是一篇详细说明如何在编程中做某事的文章。它可以像如何利用特定的Python包那样具体，也可以像[如何使用上下文工程](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/)那样模糊。这些就是我更喜欢写的那种文章，因为它们既符合我喜欢写的内容，也符合我想要写的内容。例如，我在项目中使用了一个新的框架，或者学习了某个主题（例如，上下文工程](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/)），然后写了一篇关于如何利用该框架或如何在主题中做某事的具体文章。
- en: Testing new releases
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试新版本
- en: A lot of technical articles also focus on testing out and reporting on new releases.
    Lately, most of these revolve around testing new LLM models, such as the recent
    Qwen 3 release or Grok 4\. I regularly read such articles to stay on top of everything
    happening in the AI space and to understand the performance of different models.
    I also tried writing such articles myself for a while, but I found it a bit monotone.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 许多技术文章也专注于测试和报告新版本。最近，这些文章大多围绕测试新的LLM模型，如最近的Qwen 3版本或Grok 4。我经常阅读这类文章，以了解AI领域发生的一切，并了解不同模型的表现。我也尝试过自己写这类文章，但我觉得有点单调。
- en: Teaching about a topic
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 讲解一个主题
- en: Another common technical article is one teaching about a specific topic. These
    articles usually cover wider areas than the “how-to” articles, but can be enormously
    helpful. These kinds of articles can be introductory articles to a topic, a deep
    dive article for experienced readers, or anything in between. I usually read such
    articles when getting into a new topic, or to stay on top of topics I’m particularly
    interested in. You should note that these articles are often very time-consuming
    to make, but they often represent some of the highest-quality articles I read
    online.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种常见的技术文章是关于特定主题的教学文章。这些文章通常涵盖的范围比“如何”文章更广，但非常有帮助。这类文章可以是某个主题的入门文章，为经验丰富的读者提供深入的文章，或者介于两者之间的任何内容。我通常在接触新主题时阅读这类文章，或者为了保持对特别感兴趣的主题的了解。您应该注意，这些文章通常制作起来非常耗时，但它们往往是我在网上阅读的最高质量文章之一。
- en: Finding your niche
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 找到您的细分市场
- en: 'When writing, it’s essential to find your niche. Finding your niche involves
    finding the types of articles:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 写作时，找到您的细分市场至关重要。找到细分市场包括寻找以下类型的文章：
- en: You enjoy writing (and you’re good at writing)
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您喜欢写作（并且您擅长写作）
- en: Your readers enjoy reading
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的读者喜欢阅读
- en: Your niche can be super specific (i.e., only Python AI tutorials), or it can
    cast a wider net, such as “How-to” tutorials for AI.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 您的细分市场可以是超级具体的（例如，仅限Python AI教程），或者它可以撒得更广，例如“如何”教程的AI。
- en: '![](../Images/38e527dc542e270ff936e4c3e8b31583.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/38e527dc542e270ff936e4c3e8b31583.png)'
- en: 'This figure highlights finding your niche. Your niche will be a combination
    of the types of articles you enjoy writing and that your (future) readers enjoy
    reading. For me, I found it with “how-to” articles, covering topics I’ve worked
    on: Context engineering, Utilizing OpenAI Whisper, or Building a RAG System. Image
    by ChatGPT.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 此图突出了寻找你的细分市场。你的细分市场将是你喜欢撰写的文章类型和你的（未来）读者喜欢阅读的文章类型的组合。对我来说，我通过“如何”文章找到了它，涵盖了我所工作的主题：上下文工程、利用
    OpenAI Whisper 或构建 RAG 系统。图片由 ChatGPT 提供。
- en: To find your own niche, I recommend you try writing the different article types
    I listed in the last section. The most important aspect is to find something you
    enjoy writing about. This can, of course, also change over time. After finding
    what you enjoy writing about, you need to start writing articles regularly. I
    write around once a week, which I think is a good balance between consistently
    sharing my knowledge online, while also avoiding creative burnout by writing too
    often.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到你自己的细分市场，我建议你尝试写我在上一节中列出的不同文章类型。最重要的方面是找到你喜欢写的内容。当然，这也可以随着时间的推移而改变。在找到你喜欢写的内容之后，你需要开始定期撰写文章。我大约每周写一次文章，我认为这是在持续在线分享我的知识的同时，避免因写作过多而导致的创造力枯竭的好平衡。
- en: Furthermore, I also find that it is usually much easier to write about topics
    on which you have some background knowledge. For me, for example, I write mostly
    about AI, which I work with every day at my full-time job. This gives me a lot
    of background information, which is useful for the article, and provides me with
    inspiration for topics to write about.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我还发现，通常来说，写你有一些背景知识的主题要容易得多。例如，我主要写关于人工智能的文章，这是我全职工作中每天都在处理的内容。这为我提供了大量的背景信息，这对文章很有用，并为我提供了写作主题的灵感。
- en: My learnings
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的经验教训
- en: Improvements for each article
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 每篇文章的改进
- en: I’ve learned a lot through writing for 2.5 years. I see vast improvements between
    my first article and my current articles. My goal has always been to try to improve
    something specific for each article. This way, I can see considerable improvements
    over a series of articles. Thus, my first learning is to try to improve something
    in each article you write.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我在写作两年半的时间里学到了很多。我发现我的第一篇文章和现在的文章之间有很大的进步。我的目标始终是尝试为每一篇文章改进某个具体方面。这样，我可以在一系列文章中看到显著的进步。因此，我的第一个学习经验是尝试在每篇文章中改进某个方面。
- en: List of ideas
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理念清单
- en: The ideas for my article usually come from topics I work on, as well as reading
    LinkedIn, X, and Medium. I then learn more about the topics and write an article
    on them. Ideas can come at any time, whether it be while scrolling social media
    or while taking a walk. I thus recommend keeping a list of different ideas you
    want to write about. I keep this list in Google Keep, so I can access it both
    via my phone and computer.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我文章的想法通常来自我所工作的主题，以及阅读 LinkedIn、X 和 Medium。然后我更多地了解这些主题，并为他们撰写文章。想法可能随时出现，无论是刷社交媒体还是散步时。因此，我建议保留一个你想要撰写的不同想法清单。我把这个清单保存在
    Google Keep 中，这样我可以通过手机和电脑访问它。
- en: When I then sit down on Sundays to write an article, I can choose one from my
    list of ideas. I find this much simpler than having to come up with a topic to
    write about on the spot.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当我周日坐下来写文章时，我可以从我的想法清单中选择一个。我发现这比现场想出一个写作主题要简单得多。
- en: Article outline
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文章大纲
- en: After I chose my idea to write about, I created an outline for the article.
    I find that this makes the article easier to read (the content is more coherent),
    and it’s easier for me to have an overview while writing the article. I do this
    by first writing down all the headers and subheaders in my article, before writing
    anything else. This helps me scope what to include and exclude in my article,
    and makes it easier to keep the red thread in the article. You can naturally add
    or remove headlines later on, but I find that initially writing down all the headlines
    makes the writing process easier and the output better.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在我选择要撰写的想法之后，我为文章创建了一个大纲。我发现这使文章更容易阅读（内容更连贯），并且在写作文章时更容易有一个概览。我是通过首先写下文章中所有的标题和副标题来做到这一点的，然后再写其他内容。这有助于我确定文章中要包含和排除的内容，并使文章的线索更容易保持。你可以自然地添加或删除标题，但我发现最初写下所有标题使写作过程更容易，输出质量更高。
- en: While writing, I also try to interrupt the process as little as possible. For
    example, suppose I think of something I have to include in the article while writing
    (for example, an article I want to refer to). In that case, I write “TODO to find
    the article to refer to here” in my article, and then continue writing. After
    finishing the article, I then came back to this TODO and did the task. This way,
    you avoid an interruption. I recommend minimizing the number of interruptions
    while writing because it takes quite a bit of time to get into the writing rhythm
    again after being interrupted. Keeping the interruptions to a minimum makes you
    a much more efficient writer, while you can also remember everything you need
    to do, using the *TODOs*.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在写作时，我也尽量减少中断。例如，假设我在写作时想到一些必须包含在文章中的内容（例如，我想引用的文章）。在这种情况下，我在文章中写下“TODO 在这里找到要引用的文章”，然后继续写作。完成文章后，我然后回到这个
    TODO 并完成任务。这样，您可以避免中断。我建议在写作时尽量减少中断次数，因为中断后再次进入写作节奏需要相当多的时间。将中断保持在最低限度可以使您成为一个更高效的作家，同时您还可以通过使用
    *TODOs* 记住您需要做的一切。
- en: Checklist
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 清单
- en: 'Another important learning I made is to maintain a checklist of everything
    you need to do for each article. There are a lot of different things you need
    to remember to do, and simply maintaining a checklist you fill out for each article
    ensures you remember everything. My checklist, for example, includes:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我还学到的另一个重要经验是，为每篇文章维护一个需要完成的清单。有许多不同的事情您需要记住去做，而简单地为每篇文章填写清单可以确保您记住所有内容。例如，我的清单包括：
- en: Add featured image, subtitle, excerpt, tags, and category
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加特色图片、副标题、摘要、标签和分类
- en: Go through the article with Grammarly for spell check
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Grammarly 检查文章的拼写错误
- en: Ensure all code in the article has syntax highlighting
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保文章中的所有代码都有语法高亮显示
- en: Share the post on LinkedIn and X
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 LinkedIn 和 X 上分享这篇文章
- en: …
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: Publisher
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 出版社
- en: I also highly recommend finding a publisher for your articles. This could be
    a publication on Medium or a separate site such as [Towards Data Science](https://towardsdatascience.com/).
    Having a publisher ensures a lot more people view your article, which is essential
    both for your motivation when writing and for sharing your knowledge with as many
    people as possible.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我还强烈建议为您的文章找到一个出版社。这可能是在 Medium 上的出版物或像 [Towards Data Science](https://towardsdatascience.com/)
    这样的独立网站。拥有一个出版社可以确保更多的人看到您的文章，这对于您写作时的动力以及尽可能多地向人们分享您的知识都是至关重要的。
- en: Keep writing
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 继续写作
- en: I genuinely believe consistency is one of the most important factors when writing.
    You should find a specific interval you can maintain over a period of time. It
    could be once a month, once a week, or any other interval you prefer. You should
    then try to stick to that schedule over time, while improving one element of your
    articles each time. Over time, you will find that your articles vastly improve,
    and more people are reading your content.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我真诚地相信，一致性是写作时最重要的因素之一。您应该找到一个您可以在一段时间内维持的具体间隔。这可能是一个月一次，一周一次，或者您喜欢的任何其他间隔。然后您应该尝试随着时间的推移坚持这个时间表，同时每次改进文章的一个元素。随着时间的推移，您会发现您的文章有了很大的改进，更多的人在阅读您的作品。
- en: Conclusion
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed how to write technical articles. I discussed
    the different types of technical articles you can find online and how you can
    find your own niche when writing. I believe writing provides enormous benefits,
    not only for the people reading, but also for the author explaining a topic. This
    is also the reason I have kept writing over the years. Lastly, I discussed some
    of my own learnings from writing, such as keeping a consistent writing schedule,
    maintaining a checklist for each article, and finding a publisher.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了如何撰写技术文章。我讨论了您在网上可以找到的不同类型的技术文章，以及您如何在撰写时找到自己的细分市场。我相信写作提供了巨大的好处，不仅对阅读的人，也对解释主题的作者来说都是如此。这也是我多年来一直坚持写作的原因。最后，我还讨论了一些我从写作中学到的经验，例如保持一致的写作时间表，为每篇文章制定清单，以及寻找出版社。
