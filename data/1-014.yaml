- en: The Step-by-Step Process of Adding a New Feature to My IOS App with Cursor
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用光标将新功能添加到我的iOS应用中的分步过程
- en: 原文：[https://towardsdatascience.com/step-by-step-process-of-adding-a-new-feature-to-my-ios-app-with-cursor/](https://towardsdatascience.com/step-by-step-process-of-adding-a-new-feature-to-my-ios-app-with-cursor/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/step-by-step-process-of-adding-a-new-feature-to-my-ios-app-with-cursor/](https://towardsdatascience.com/step-by-step-process-of-adding-a-new-feature-to-my-ios-app-with-cursor/)'
- en: I <mdspan datatext="el1764830031688" class="mdspan-comment">recently started</mdspan>
    vibe-coding to create websites and IOS apps. I already have two apps live on the
    App Store.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近开始vibe-coding，以创建网站和iOS应用。我已经在App Store上发布了两个应用。
- en: My first app was [Brush Tracker](https://apps.apple.com/us/app/brush-tracker/id6754214621),
    which helps you track your daily brushing habits, stay consistent, and keep your
    teeth clean through small motivational nudges. I also wrote an [article](https://towardsdatascience.com/i-built-an-ios-app-in-3-days-with-literally-no-prior-swift-knowledge/)
    on the entire process of building the app and shipping it to the App Store.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第一个应用是[Brush Tracker](https://apps.apple.com/us/app/brush-tracker/id6754214621)，它帮助你跟踪日常刷牙习惯，保持一致性，并通过小激励提醒保持牙齿清洁。我还写了一篇[文章](https://towardsdatascience.com/i-built-an-ios-app-in-3-days-with-literally-no-prior-swift-knowledge/)，讲述了构建应用并将其发布到App
    Store的整个过程。
- en: 'Recently, I decided to add a new feature to Brush Tracker: a calendar-like
    grid that shows the user’s monthly brushing consistency. In this article, I’ll
    walk you through how I implemented this feature using Cursor and a few manual
    adjustments I made.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，我决定向Brush Tracker添加一个新功能：一个类似日历的网格，显示用户的月度刷洗一致性。在这篇文章中，我将向您展示我是如何使用光标和一些手动调整来实现这个功能的。
- en: Initial prompt
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初始提示
- en: What I had in mind was similar to the grids you see in habit-tracking apps or
    the contribution graph on GitHub.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我心里想的是类似于你在习惯跟踪应用中看到的网格或GitHub上的贡献图。
- en: I started with the Plan Mode of Cursor, which I’ve found highly efficient when
    adding a new feature or making a big change. You define the feature or explain
    the task and Cursor generates a detailed implementation plan.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我从Cursor的计划模式开始，我发现当添加新功能或进行重大更改时，这个模式非常高效。你定义功能或解释任务，Cursor就会生成详细的实施计划。
- en: 'Here is the exact prompt I used in the Plan Mode to get started:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我用于在计划模式中开始时使用的确切提示：
- en: I want to add a calendar-like grid to track days user complete brushings. Make
    the grid with squares where each square represents a day in a month. The initial
    state of the squares in the grid are black. Paint the square with green if the
    user completes all the brushings, with light green if the user partially complete
    the brushings. For example, user sets the daily brushings count as 2\. If they
    complete one brushing in a day, the square should be light green. If they complete
    two brushings in day, the square for that day should be green. The grid should
    be accessible by pressing a calendar icon on the top left of the screen.
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我想添加一个类似日历的网格来跟踪用户完成的刷洗天数。网格中的每个方块代表一个月中的某一天。网格中方块的初始状态是黑色。如果用户完成所有刷洗，则用绿色填充方块；如果用户部分完成刷洗，则用浅绿色填充。例如，用户将每日刷洗次数设置为2。如果他们在一天内完成一次刷洗，则该天的方块应该是浅绿色。如果他们在一天内完成两次刷洗，则该天的方块应该是绿色。网格可以通过按屏幕左上角的日历图标来访问。
- en: Cursor asked me two questions to clarify some details before finalizing the
    implementation plan. I really liked this step because it’s reassuring to see Cursor
    seek clarification instead of making assumptions on its own.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 光标向我提出了两个问题，以在最终确定实施计划之前澄清一些细节。我真的喜欢这个步骤，因为看到光标寻求澄清而不是自己做出假设，这让人感到安心。
- en: 'The two questions Cursor asked:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 光标提出的两个问题：
- en: Should the calendar grid show only the current month, or allow navigation between
    months?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日历网格应该只显示当前月份，还是允许在月份之间导航？
- en: Should we start tracking from today forward, or also show past days (which would
    be black)?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们应该从今天开始跟踪，还是也显示过去的日子（这将显示为黑色）？
- en: I instructed Cursor to allow navigation between months and to display the previous
    days of the month in black. Then, Cursor created a markdown file outlining a detailed
    implementation plan.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我指示光标允许在月份之间导航，并在黑色中显示月份的前几天。然后，光标创建了一个Markdown文件，概述了详细的实施计划。
- en: The plan explains in detail how the feature will be implemented and also includes
    a list of actionable todo items.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 计划详细说明了如何实施该功能，并包括一个可操作的待办事项列表。
- en: 'Cursor’s TODO items:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 光标的待办事项：
- en: '*Extend BrushModel to track historical daily brushing data with persistence*'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*扩展BrushModel以跟踪具有持久性的历史每日刷牙数据*'
- en: '*Create CalendarGridView component with month grid and color-coded squares*'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*创建具有月网格和彩色正方形的CalendarGridView组件*'
- en: '*Add calendar icon button to top left of ContentView*'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*将日历图标按钮添加到ContentView的左上角*'
- en: '*Integrate CalendarGridView with ContentView using sheet presentation*'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*将CalendarGridView与ContentView使用sheet呈现方式集成*'
- en: Next, I asked Cursor to implement the plan. It also allows for modifying the
    plan before execution, but I wanted to stick with Cursor’s original outline as-is.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我要求Cursor实施这个计划。它还允许在执行前修改计划，但我希望坚持Cursor原始的轮廓不变。
- en: 'The implementation worked on the very first try, and I was able to test the
    feature directly in the Xcode simulator. However, the design was terrible:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 实现第一次尝试就成功了，我能够在Xcode模拟器中直接测试这个功能。然而，设计非常糟糕：
- en: '![](../Images/1da92ecba491343a00d462cbc0798a2a.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1da92ecba491343a00d462cbc0798a2a.png)'
- en: 'Note: All images used in this article include screenshots from my app, Brush
    Tracker.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本文中使用的所有图片均包含来自我的应用Brush Tracker的屏幕截图。
- en: Xcode simulator no longer includes date and time settings, so I changed the
    system date on my Mac to test how the grid colors updated across different days.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Xcode模拟器不再包括日期和时间设置，所以我将我的Mac系统日期更改以测试网格颜色在不同日期的更新情况。
- en: 'I did not like this style at all. So I asked Cursor to redesign the grid using
    the following prompt:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我一点也不喜欢这种风格。所以我要求Cursor使用以下提示重新设计网格：
- en: We need to change the design of the grid. What I have in mind is something like
    Github contributions grid. Also, do not show the day values in the squares representing
    days.
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们需要改变网格的设计。我心目中的样子类似于Github贡献网格。此外，不要在代表日期的正方形中显示日期值。
- en: 'This prompt did not work as I’d hoped. The only change it made was removing
    the day numbers:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示没有达到我预期的效果。它所做的唯一改变是移除了日期数字：
- en: '![](../Images/717c93b67de793ed725971371c3ad0cf.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/717c93b67de793ed725971371c3ad0cf.png)'
- en: Next, I shared a sample image of the grid style I want and asked Cursor to make
    a similar design.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我分享了一个我想要的网格样式的样本图像，并要求Cursor制作一个类似的设计。
- en: 'The new design was closer to what I had in mind but it had structural issues.
    The squares were too small and did not scale well within the layout:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 新的设计更接近我心目中的样子，但它存在结构问题。正方形太小，在布局中扩展得不好：
- en: '![](../Images/d9ae4e6e9ac581749151a2c02b42e7e9.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d9ae4e6e9ac581749151a2c02b42e7e9.png)'
- en: 'So there are two main problems with this design:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这个设计中存在两个主要问题：
- en: Each month contains 42 squares (not representing the days in any month).
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个月包含42个正方形（不表示任何月份的日期）。
- en: Squares are too small.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 正方形太小。
- en: 'I asked Cursor to fix the first problem with this prompt:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我用以下提示要求Cursor修复第一个问题：
- en: In the current implementation, there are 42 squares in November and December.
    Squares in the grid represent days in a month so the number of squares must be
    equal to the number of days in that month.
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在当前实现中，11月和12月有42个正方形。网格中的正方形代表一个月中的日期，所以正方形的数量必须等于该月的天数。
- en: 'The other problem was simpler and I could solve it by adjusting some parameter
    values. For instance, the size of the squares in the grid can be changed by the
    `squareSize` parameter:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个问题更简单，我可以通过调整一些参数值来解决。例如，可以通过`squareSize`参数改变网格中正方形的大小：
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Here is how the grid looks after I changed the square size to 32:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在我将正方形大小更改为32后，网格看起来是这样的：
- en: '![](../Images/1496bd94196f8bd0fee49b5b68210ebc.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1496bd94196f8bd0fee49b5b68210ebc.png)'
- en: The other problem that could be solved by adjusting parameter values is the
    padding between rows.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个问题可以通过调整参数值来解决，即行之间的填充。
- en: In the screenshot above, there seems to be no space between rows. This can be
    changed by increasing padding between rows.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的屏幕截图中，似乎行与行之间没有空间。这可以通过增加行之间的填充来改变。
- en: I also want to have 8 squares (i.e. days) in a row and change the space between
    rows.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我还希望每行有8个正方形（即天数）并改变行之间的空间。
- en: 'All of these can be done in the following code snippet:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都可以在以下代码片段中完成：
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`spacing` controls the space between squares in a row'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`spacing`控制行中正方形之间的空间'
- en: '`padding` controls the space between rows'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`padding`控制行之间的空间'
- en: '`count` controls the number of squares in a row'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`count`控制每行中的正方形数量'
- en: 'After playing around with these parameter values in the code snippet above,
    I got the following grid:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码片段中调整这些参数值后，我得到了以下网格：
- en: '![](../Images/02a158b58111151a2591daa28f68f4c5.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/02a158b58111151a2591daa28f68f4c5.png)'
- en: If the user completes all brushings in a day, she gets a bright green. In case
    of partial completion, the square for that day is colored with pale green. The
    other days are shown in black and the current day is indicated with a white frame.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果用户在一天内完成了所有的刷牙，她会得到一个明亮的绿色。如果只是部分完成，那天对应的方块会用浅绿色着色。其他天用黑色显示，而当前天用白色边框标出。
- en: 'After implementing the feature to keep track of past days, it seemed natural
    to add notifications for streaks. I asked Cursor to do this using the following
    prompt:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现了跟踪过去几天的功能之后，添加关于连续性的通知似乎是顺理成章的。我要求Cursor使用以下提示来完成这项任务：
- en: Add notifications for when the user completed all brushings for 10, 20, and
    30 days. Also, add a month notification for when the user completes all days in
    a month. Notifications should be encouraging and motivating.
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 添加当用户连续完成10天、20天和30天刷牙的通知。此外，当用户在一个月内完成所有天数时，也要添加一个月度通知。通知应该是鼓舞人心和激励人的。
- en: The grid I created is not the best design but it’s good enough to deliver the
    message. When a user looks at this grid, she immediately gets an idea of her teeth
    brushing frequency.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建的网格不是最佳设计，但足以传达信息。当用户查看这个网格时，她立即就能了解她的刷牙频率。
- en: With the help of Cursor and some manual tweaks, I was able to implement and
    ship this feature in a few hours. At the time of writing this article, this version
    is still in App Store review. By the time you read the article, it might be distributed.
    Here is the App Store link to [Brush Tracker](https://apps.apple.com/us/app/brush-tracker/id6754214621)
    if you’d like to take a look at it or try out the app.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在Cursor的帮助和一些手动调整下，我能够在几个小时内实现并发布这个功能。在撰写本文时，这个版本仍在App Store审核中。当你阅读这篇文章时，它可能已经被分发。如果你想查看或试用这个应用，这里有一个App
    Store链接到[Brush Tracker](https://apps.apple.com/us/app/brush-tracker/id6754214621)。
- en: Thank you for reading! If you have any feedback about the article or the app,
    I’d love to hear your thoughts.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读！如果您对这篇文章或应用有任何反馈，我很乐意听听您的想法。
