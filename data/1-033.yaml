- en: How to Generate QR Codes in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在Python中生成QR码
- en: 原文：[https://towardsdatascience.com/how-to-generate-qr-code-in-python/](https://towardsdatascience.com/how-to-generate-qr-code-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-generate-qr-code-in-python/](https://towardsdatascience.com/how-to-generate-qr-code-in-python/)
- en: <mdspan datatext="el1764654022082" class="mdspan-comment">Introduction</mdspan>
    to QR Codes
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764654022082" class="mdspan-comment">QR码简介</mdspan>
- en: “QR” in QR code stands for quick response. QR codes are an emerging and easy
    way to retrieve information without typing or searching anything on your phone.
    These codes are essentially a pattern of black and white squares, with scannable
    digital codes embedded in them. Nowadays, restaurants use these QR Codes to present
    the menu to their customers, shops and marts use them as a form of contactless
    digital payments, event management teams use them as a quick check-in to their
    events and conferences, and so forth and so on.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: QR码中的“QR”代表快速响应。QR码是一种新兴且简单的方式，可以在不输入或搜索任何内容的情况下检索信息。这些代码本质上是一种黑白方格图案，其中嵌入可扫描的数字代码。如今，餐馆使用这些QR码向顾客展示菜单，商店和便利店将其作为无接触式数字支付的一种形式，活动管理团队将其作为快速签到到他们的活动和会议，等等。
- en: Generating QR Codes
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成QR码
- en: As was mentioned earlier, QR Codes are developed as a pattern or a grid of small
    black and white squares that store information in binary form, that is, as 0s
    and 1s. Information is encoded within the code in special arrangements with the
    feature of customizing the colors, background, and frames, as long as the pattern
    remains the same.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，QR码作为一个小型黑白方格图案或网格开发，以二进制形式存储信息，即0和1。信息在代码中以特殊排列编码，具有自定义颜色、背景和边框的功能，只要图案保持不变。
- en: 'The following is an example of a QR code that has been generated using the
    Python “[qrcode](https://pypi.org/project/qrcode/)” package:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个使用Python `[qrcode](https://pypi.org/project/qrcode/)` 包生成的QR码示例：
- en: '![](../Images/242268f6ce8f7a5d558649e8f234a2dc.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/242268f6ce8f7a5d558649e8f234a2dc.png)'
- en: Link to my TDS Author Profile (Image by Author)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 链接到我的TDS作者个人资料（图片由作者提供）
- en: Scanning the above code with a scanner that has QR code scanning capabilities
    will take you to my TDS profile, where you can easily access beginner-friendly
    Python projects.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 使用具有QR码扫描功能的扫描仪扫描上述代码将带您到我的TDS个人资料，在那里您可以轻松访问适合初学者的Python项目。
- en: In this article, we will go through the Python Package `qrcode`, installing
    it and exploring its different functions to design QR Codes.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将介绍Python包`qrcode`，包括安装它并探索其不同的功能来设计QR码。
- en: Installing the Package
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装包
- en: 'Before starting the project, we will install the relevant packages. I am using
    PyCharm IDE for this task. In order to install the “qrcode” Python package, I
    will go to the Python terminal and type the following:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始项目之前，我们将安装相关包。我使用PyCharm IDE来完成这项任务。为了安装“qrcode”Python包，我将进入Python终端并输入以下内容：
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/6091c3f3b0d78aef2915dac4e02e37f8.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6091c3f3b0d78aef2915dac4e02e37f8.png)'
