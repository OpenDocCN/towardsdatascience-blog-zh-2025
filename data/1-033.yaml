- en: Conclusion
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we explored the Python package QR Code, which includes the
    blueprint for creating QR codes and saving them in different file formats. It
    also includes advanced customisation of the QR code generation, which we have
    gone through with the understanding of classes and objects. This was an easy and
    beginner-friendly Python Tutorial that required some surface-level knowledge of
    classes and objects.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了 Python 包 QR Code，它包含了创建 QR 码并将其保存为不同文件格式的蓝图。它还包括了 QR 码生成的高级定制，我们通过理解类和对象来实现了这一点。这是一个简单且适合初学者的
    Python 教程，需要一些关于类和对象的基础知识。
