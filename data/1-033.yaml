  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 安装qrcode包（图片由作者提供）
- en: Installing the QRCode package will allow us to create QR codes as PNG files
    and render them into the Python console. However, if we require more image-related
    functionality, we should install the [`Pillow`](https://pypi.org/project/pillow/)
    package for image processing capabilities.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 安装QRCode包将允许我们创建PNG格式的QR码并在Python控制台中渲染。然而，如果我们需要更多的图像处理功能，我们应该安装`Pillow`包以获得图像处理能力。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/a7de5968b0e7bb5ba62f89e3790093ef.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a7de5968b0e7bb5ba62f89e3790093ef.png)'
- en: Installing the QRCode package with Pillow (Image by Author)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Pillow安装QRCode包（图片由作者提供）
- en: Importing Library and Generating a Simple QR Code
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入库和生成简单的QR码
- en: 'Now we will begin the coding. First, we will import the library and include
    an alias name for our ease. As can be seen in the QR Code Python documentation,
    the QR Code image for a URL can easily be generated and saved as a PNG using the
    following lines of code:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将开始编码。首先，我们将导入库并包含一个别名以方便使用。如QR Code Python文档中所示，可以通过以下代码行轻松生成和保存URL的QR
    Code图像为PNG格式：
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/109a3154133ddc7cf03ca4ece53606f7.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/109a3154133ddc7cf03ca4ece53606f7.png)'
- en: Python QR Code Documentation (Image by Author)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Python QR码文档（图片由作者提供）
- en: This is a simple QR code that has been created using the `make()` function and
    saved as a PNG file using the `save()` function.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个使用`make()`函数创建并使用`save()`函数保存为PNG文件的简单QR码。
- en: Advanced Functionality
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级功能
- en: For advanced image processing features, we will use the QRCode Class in the
    `qrcode` Python Package.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现高级图像处理功能，我们将使用`qrcode` Python 包中的QRCode类。
- en: Classes and Objects are a useful concept in programming. Python classes provide
    a blueprint for the creation of objects that share similar features, their attributes
    (variables), and methods (functions). We will use the Python Class constructor
    to create QR codes as objects of that class.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 类和对象是编程中的一个有用概念。Python类为创建具有相似特征的对象提供了一个蓝图，包括它们的属性（变量）和方法（函数）。我们将使用Python类构造函数来创建QR码作为该类的对象。
- en: 'Below is the generic code that allows us to create and save QR codes:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是通用代码，允许我们创建和保存QR码：
- en: '[PRE3]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/89898cd60f04c4af99c052c12c1b40d6.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/89898cd60f04c4af99c052c12c1b40d6.png)'
- en: Understanding Classes and Objects in Python (Image by Author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 理解Python中的类和对象（图片由作者提供）
- en: The above code has created and saved the QR code as a PNG. If you scan the above
    code, you will land on an interesting Python Tutorial that explores how the concept
    of Python classes and objects is implemented in real-world projects.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码已创建并保存了PNG格式的QR码。如果您扫描上述代码，您将进入一个有趣的Python教程，该教程探讨了Python类和对象的概念如何在现实世界项目中实现。
- en: Now, let us deep dive into the generic code above and explore the functions
    and play along with their variations.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们深入探讨上面提到的通用代码，并探索其功能和它们的变体。
- en: Object Creation
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对象创建
- en: The first line of code after importing the `qrcode` library creates the object,
    with its attributes and methods enclosed within the round brackets.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在导入`qrcode`库后的第一行代码创建对象，其属性和方法包含在圆括号内。
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Here, `qrcode` refers to the Python package and `QRCode()` refers to the Class.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，`qrcode`指的是Python包，`QRCode()`指的是类。
- en: Defining the Version
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义版本
- en: Next is to define the `version`. We can set the integer from 1 to 40, and this
    will result in different sizes of the QR Code.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是定义`version`。我们可以设置一个从1到40的整数，这将导致QR码的不同大小。
- en: '[PRE5]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Let’s create a QR Code with the `version` variable set to 5.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个将`version`变量设置为5的QR码。
- en: '![](../Images/a9fb3359619e8c783b339c633cd3b317.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a9fb3359619e8c783b339c633cd3b317.png)'
- en: Version Attribute set to 5 (Image by Author)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 版本属性设置为5（图片由作者提供）
- en: 'Now let us set the `version` parameter to 15:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们将`version`参数设置为15：
- en: '![](../Images/cf9fb7796ea3ce819aafffd9dba35276.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cf9fb7796ea3ce819aafffd9dba35276.png)'
- en: Version Attribute set to 15 (Image by Author)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 版本属性设置为15（图片由作者提供）
- en: As can be seen in the two QR Codes above, the `version` attribute determines
    the size of the QR Code. The smallest `version` 1 outputs a QR Code as a 21×21
    grid.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如上两个QR码所示，`version`属性决定了QR码的大小。最小的`version` 1输出一个21×21的网格。
- en: Error Correction
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 错误纠正
- en: 'The next attribute that we will go through is `error_correction`. The Error
    Correction attribute deals with the data redundancy, so that even if the QR Code
    is damaged, it still remains scannable. There are 4 different levels of `error_correction`:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来要讨论的下一个属性是`error_correction`。错误纠正属性处理数据冗余，即使QR码损坏，它仍然可扫描。有4种不同的`error_correction`级别：
- en: 'Error Correct L: This provides the lowest level of error correction, that is
    7%'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误纠正L：这提供了最低级别的错误纠正，即7%
- en: 'Error Correct M: This provides a moderate level of data correction, 15% or
    less, thus providing a balance between error correction and data size'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误纠正M：这提供了中等程度的数据纠正，15%或更少，从而在错误纠正和数据大小之间提供了平衡
- en: 'Error Correct Q: This provides 25% or less of error correction'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误纠正Q：这提供了25%或更少的错误纠正
- en: 'Error Correct H: This provides a high level of error correction and is suitable
    for applications that may have serious damage, and where data size is not a concern.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误纠正H：这提供了高水平的错误纠正，适用于可能严重损坏的应用程序，并且数据大小不是问题。
- en: '[PRE6]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The more the percentage value of `error_correction`, the more easily it becomes
    scannable, even when parts of it are damaged. On the flip side, the QR Codes become
    larger in size, and this poses a problem when data compression is a main requirement.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '`error_correction`的百分比值越高，它就越容易扫描，即使部分损坏。另一方面，QR码的大小会变大，这在数据压缩是主要要求的情况下会成为一个问题。'
- en: Let us create QR Codes with different `error_correction` types.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建具有不同`error_correction`类型的QR码。
- en: '![](../Images/09ae9d08328f0a21f9a123310de5f041.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/09ae9d08328f0a21f9a123310de5f041.png)'
- en: Error Correction Type L (Image by Author)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 错误纠正类型L（图片由作者提供）
- en: '![](../Images/11618c8c63763bfa9d430c68e30ac234.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/11618c8c63763bfa9d430c68e30ac234.png)'
- en: Error Correction Type M (Image by Author)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 错误纠正类型M（图片由作者提供）
- en: '![](../Images/ed2d8d2dafda3e319de674221c651e29.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ed2d8d2dafda3e319de674221c651e29.png)'
- en: Error Correction Type Q (Image by Author)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 错误纠正类型 Q（图片由作者提供）
- en: '![](../Images/ca3334854a5856eaa6575066a69a33b0.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ca3334854a5856eaa6575066a69a33b0.png)'
- en: Error Correction Type H (Image by Author)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 错误纠正类型 H（图片由作者提供）
- en: As can be seen from the variety of the QR Codes generated above, as the `error_correction`
    increases, the complexity of the QR Codes increases, meaning the data size increases,
    while the data redundancy also increases.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，从生成的各种二维码中可以看出，随着`error_correction`的增加，二维码的复杂性增加，这意味着数据大小增加，同时数据冗余也增加。
- en: Box Size
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 盒子大小
- en: The next attribute we will explore and play with is the `box_size`. The `box_size`
    in the Python `qrcode` library refers to the number of pixels the QR Code will
    have.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来要探索和操作的下一个属性是`box_size`。在Python的`qrcode`库中，`box_size`指的是二维码将有的像素数。
- en: '[PRE7]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Let us see how our QR Code changes with different values of the `box_size`:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看不同的`box_size`值如何改变我们的二维码：
- en: '![](../Images/ead65eda105cd7e124a5c3509311d2ff.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ead65eda105cd7e124a5c3509311d2ff.png)'
- en: Box Size = 1 (Image by Author)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 盒子大小 = 1（图片由作者提供）
- en: '![](../Images/5c42cb384ad42009a3aa5898d20c9d04.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5c42cb384ad42009a3aa5898d20c9d04.png)'
- en: Box Size = 100 (Image by Author)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 盒子大小 = 100（图片由作者提供）
- en: '![](../Images/daa608704185ba1f0329ce3f29463c2e.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/daa608704185ba1f0329ce3f29463c2e.png)'
- en: Variation of box_size (Image by Author)
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: box_size 变化（图片由作者提供）
- en: The above images demonstrate the difference when the pixel values changes, although
    they might be negligible to the naked eye when it comes to small differences.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的图片展示了像素值变化时的差异，尽管当涉及到小的差异时，这些变化可能对肉眼来说微不足道。
- en: Border
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 边框
- en: 'The last attribute that we need to define to create the object is the `border`.
    This refers to the surrounding box around the code. The minimum value is 4, and
    we can increase it as much as we like. Let us see how the code changes with changes
    in this attribute:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要定义的最后一个属性来创建对象是`border`。这指的是围绕代码的周围框。最小值是4，我们可以随意增加它。让我们看看这个属性的变化如何影响代码：
- en: '![](../Images/e3d2c342790e0bec8e2b65fb1741b4b2.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e3d2c342790e0bec8e2b65fb1741b4b2.png)'
- en: Border = 4 (Image by Author)
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 边框 = 4（图片由作者提供）
- en: '![](../Images/22e5ed6e22130353cdf82d1bb3aed898.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/22e5ed6e22130353cdf82d1bb3aed898.png)'
- en: Border = 10 (Image by Author)
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 边框 = 10（图片由作者提供）
- en: We can see the difference in the border of the above images, which can easily
    be customised with the `border` variable.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从上述图像的边框中看到差异，这可以通过`border`变量轻松自定义。
- en: Adding Data
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加数据
- en: Once our object has been created, with particular values of `version`, `error_correction`
    type, `box_size` and `border`, we will now add the data that needs to be encoded
    as QR Code. This data can be a string, a URL, a location, contact information,
    etc. This can be easily done through the `add_data()` method of this class.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们的对象被创建，具有特定的`version`、`error_correction`类型、`box_size`和`border`值，我们现在将添加需要编码为二维码的数据。这些数据可以是字符串、URL、位置、联系信息等。这可以通过这个类的`add_data()`方法轻松完成。
- en: '[PRE8]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The last line of code above calls `qr.make(fit=True)`. This automatically fits
    the QR Code to the data that has been given, after analyzing it. It uses the smallest
    possible QR Code to accommodate the data, and does not require us to manually
    set the sizing attributes.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的代码最后一行调用`qr.make(fit=True)`。在分析后，它会自动将二维码调整到给定的数据大小，使用尽可能小的二维码来容纳数据，而不需要我们手动设置尺寸属性。
