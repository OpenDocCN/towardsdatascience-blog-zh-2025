- en: Beyond Causal Language Modeling
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超越因果语言模型
- en: 原文：[https://towardsdatascience.com/beyond-causal-language-modeling-a-deep-dive-into-not-all-tokens-are-what-you-need-for-781166bc35b3/](https://towardsdatascience.com/beyond-causal-language-modeling-a-deep-dive-into-not-all-tokens-are-what-you-need-for-781166bc35b3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/beyond-causal-language-modeling-a-deep-dive-into-not-all-tokens-are-what-you-need-for-781166bc35b3/](https://towardsdatascience.com/beyond-causal-language-modeling-a-deep-dive-into-not-all-tokens-are-what-you-need-for-781166bc35b3/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: 'A few days ago, I had the chance to present at a local reading group that focused
    on some of the most exciting and insightful papers from *NeurIPS 2024*. As a presenter,
    I selected a paper titled ***["Not All Tokens Are What You Need for Pretraining"](https://openreview.net/forum?id=0NMzBwqaAJ)***.
    It addresses a super simple but reasonable question: *do we really need to apply
    the next-token prediction loss to all tokens during language model pretraining*?'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 几天前，我有机会在一个专注于 *NeurIPS 2024* 中一些最激动人心和有洞察力的论文的本地阅读小组上做报告。作为一个报告人，我选择了一篇题为 ***["Not
    All Tokens Are What You Need for Pretraining"](https://openreview.net/forum?id=0NMzBwqaAJ)***
    的论文。它解决了一个超级简单但合理的问题：*我们真的需要在语言模型预训练期间将下一个标记预测损失应用于所有标记吗*？
- en: 'Most of us have gotten used to the standard approach: feed in a huge web-scraping
    corpus, apply causal language modeling (CLM) across every token, and trust that
    bigger is better. The authors of this paper push back on that assumption, instead
    arguing that some tokens might actually be detrimental to the learning process.
    From their analysis, it becomes clear that focusing your training budget on particularly
    "useful" tokens can yield significant efficiency and performance gains in data
    efficiency and downstream tasks.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的大多数人都习惯了标准方法：输入大量的网络抓取语料库，对每个标记应用因果语言模型（CLM），并相信更大的更好。这篇论文的作者对这一假设提出了质疑，相反，他们认为一些标记实际上可能对学习过程有害。从他们的分析中可以看出，将训练预算集中在特别“有用”的标记上可以在数据效率和下游任务中带来显著的效率和性能提升。
- en: In this post, I’ll summarize the paper’s core ideas of the proposed method called
    Selective Language Modeling (SLM) and share some insights from the experiments
    that impressed me the most.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇帖子中，我将总结这篇论文中提出的称为选择性语言模型（SLM）的方法的核心思想，并分享一些让我印象最深刻的实验见解。
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Background
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: Token-Level Noise in Large Web Corpora
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 大型网络语料库中的标记级噪声
- en: 'When you scrape huge amounts of texts from the web, it’s no surprise to find
    a fair amount of noise. Researchers have tried refining their corpora by applying
    document-level filters – removing entire documents that look suspicious or low
    quality. However, the authors note that noise can exist inside documents as well:
    a good article might still contain a handful of nonsense or extremely unpredictable
    tokens. If your model is forced to learn from everything, these noisy tokens can
    waste computation or even confuse the model.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当你从网络上抓取大量文本时，发现相当数量的噪声并不奇怪。研究人员已经尝试通过应用文档级过滤器来精炼他们的语料库——移除看起来可疑或低质量的整个文档。然而，作者指出噪声也可能存在于文档内部：一篇好文章可能仍然包含一些无意义或极其不可预测的标记。如果你的模型被迫从所有内容中学习，这些噪声标记可能会浪费计算资源，甚至可能使模型混淆。
- en: Token-Level Learning Dynamics
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 标记级学习动态
- en: 'By examining training checkpoints at multiple stages, the authors categorized
    tokens based on whether their cross-entropy loss was high or low over time:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通过检查多个阶段的训练检查点，作者根据它们的交叉熵损失随时间的高低对标记进行了分类：
- en: '**L→L (low to low):** These tokens are learned early and remain "easy" for
    the model, giving no further significant gradient updates later on.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**L→L (低到低):** 这些标记早期就被学习，并且对模型来说始终“简单”，在之后没有进一步的显著梯度更新。'
- en: '**H→L (high to low):** A subset that starts off hard and eventually gets learned.
    This means that those tokens still have significant room for improvement in learning.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**H→L (高到低):** 一个开始很难但最终被学习的子集。这意味着这些标记在学习上仍有很大的改进空间。'
- en: '**H→H (high to high):** Tokens that remain difficult and fluctuate heavily,
    often due to their inherent unpredictability (i.e., *aleatoric uncertainty*)'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**H→H (高到高):** 始终难以捉摸且波动剧烈的标记，这通常是由于它们固有的不可预测性（即，*随机不确定性*）'
- en: '**L→H (low to high):** Tokens that were initially learned but become confusing
    later, possibly due to context shifts or noise.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**L→H (低到高):** 最初学习但后来变得令人困惑的标记，这可能是由于上下文变化或噪声造成的。'
- en: The big takeaway is that only a fraction of tokens truly contributes meaningful
    learning signals. Many tokens get mastered early (L→L) and then stop being beneficial.
    Meanwhile tokens that stay consistently hard (H→H) can be extremely noisy and
    unproductive throughout the entire training run.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的收获是只有一小部分标记真正贡献了有意义的信号。许多标记早期就掌握了（L→L），然后停止有益。同时，那些持续困难的标记（H→H）在整个训练过程中可能非常嘈杂且无益。
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The Proposed Approach: Selective Language Modeling (SLM)'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提出的方法：选择性语言建模（SLM）
- en: '![Figure 1\. Created by the author based on the figure presented in the original
    paper, with additional explanations and interpretations](../Images/15c7bdac2d9db279728993f5f02715c2.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图1. 由作者根据原始论文中的图创建，增加了额外的解释和解读](../Images/15c7bdac2d9db279728993f5f02715c2.png)'
- en: '*Figure 1\. Created by the author based on the figure presented in the original
    paper, with additional explanations and interpretations*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*图1. 由作者根据原始论文中的图创建，增加了额外的解释和解读*'
- en: 'The authors propose **Selective Language Modeling (SLM)** as a more nuanced
    approach. Here’s how it works:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提出**选择性语言建模（SLM**）作为一种更细致的方法。以下是它是如何工作的：
- en: 'Step 1: Train a Reference Model (RM)'
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一步：训练参考模型（RM）
- en: They first take a small but *high-quality dataset* that reflects their "ideal"
    data distribution. Using an already partially pre-trained base model, they fine-tune
    this model to create a RM. This model essentially becomes the judge that decide
    which tokens are worth training on later.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 他们首先采取一个小但*高质量的语料库*，反映了他们的“理想”数据分布。使用已经部分预训练的基础模型，他们微调这个模型以创建一个RM。这个模型本质上成为了一个法官，决定哪些标记值得在以后进行训练。
- en: 'Step 2: Score Tokens with Excess Loss'
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二步：使用额外损失评分标记
- en: For each token in the large-scale corpus, they compute the **RM loss** (how
    well the RM predicts that token) and compare it with the **current training model’s
    loss**. The difference, called the **excess loss**, indicates how much improvement
    is still possible on a token that "should" be predictable under the reference
    distribution.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大规模语料库中的每个标记，他们计算**RM损失**（RM预测该标记有多好）并将其与**当前训练模型的损失**进行比较。差异，称为**额外损失**，表明在参考分布下“应该”可预测的标记上还有多少改进空间。
- en: 'Step 3: Select Top-k% Tokens for Back-Propagation'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第三步：选择top-k%标记进行反向传播
- en: During the main pretraining, they still run the **full forward pass across all
    tokens, but only back-propagate the loss on the top k% of tokens** (those with
    the highest excess loss). This means that model devotes most of its capacity to
    the tokens that are both learnable and relevant, while ignoring tokens deemed
    less helpful. This dynamic selection happens at each step or batch, so it adapts
    as the training model itself changes.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在主要预训练期间，他们仍然对所有的标记执行**完整的正向传递，但只对top k%的标记的损失进行反向传播**（那些具有最高额外损失的标记）。这意味着模型将大部分能力用于那些既是可学习的又是相关的标记，而忽略被认为不太有帮助的标记。这种动态选择在每个步骤或批次发生，因此它会随着训练模型本身的变化而适应。
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Experiments
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验
- en: 'This paper demonstrates SLM’s benefits across several experimental setups:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 本文展示了SLM在多个实验设置中的优势：
- en: '![Figure 2\. Created by the author to summarize the experimental setup](../Images/04fe187a8963dffc44a5a70334497454.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图2. 作者创建以总结实验设置](../Images/04fe187a8963dffc44a5a70334497454.png)'
- en: Figure 2\. Created by the author to summarize the experimental setup
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 作者创建以总结实验设置
- en: Math Domain Results
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数学领域结果
- en: When they continued pretraining smaller 1B models on *OpenWebMath*, the improvements
    were striking – up to 10% or even more gains on GSM8K and MATH over the same model
    trained with CLM. The authors highlight that SLM can reach baseline performance
    5–10 times faster, requiring fewer tokens and less computation.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们在*OpenWebMath*上继续预训练较小的1B模型时，改进是显著的——在GSM8K和MATH上比使用CLM训练的相同模型提高了10%甚至更多。作者强调，SLM可以达到基线性能5-10倍快，需要更少的标记和更少的计算。
- en: In one remarkable case, their 7B model matched the accuracy of a prior SOTA
    approach while consuming only 3% of the training tokens that the prior had used.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个引人注目的案例中，他们的7B模型与先前SOTA方法的准确性相匹配，而只消耗了先前所用的3%的训练标记。
- en: On top of that, a simple fine-tuning step further boosted MATH scores over 40%
    for a 1B model – a level that smaller open-source models usually struggle to reach
    without huge training budgets.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，一个简单的微调步骤进一步提高了1B模型的MATH分数超过40%——这是一个较小的开源模型通常难以达到的水平，除非有巨大的训练预算。
- en: General Domain Results
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通用领域结果
- en: What if you already have a model that has seen a ton of general text? The authors
    show that SLM still helps.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经有一个看过大量通用文本的模型，作者们表明SLM仍然有帮助。
- en: Even a strong base model improved by around 5.8 percentage points on average
    across 15 benchmarks, especially in tougher domains like code and math. Therefore,
    even after large-scale training, there’s still a subset of tokens that can be
    conducive to improving the performance.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是一个强大的基础模型，在15个基准测试中平均提高了约5.8个百分点，尤其是在代码和数学等更具挑战性的领域。因此，即使在大规模训练之后，仍然有一小部分标记有助于提高性能。
- en: Self-Referencing
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自引用
- en: 'A question arises: what if you don’t have a curated dataset to t rain your
    reference model in the first place? The authors show a creative workaround: you
    can train a quick-and-dirty reference model on the same raw corpus at just few
    epochs.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 出现了一个问题：如果你一开始就没有精心策划的数据集来训练你的参考模型，怎么办？作者们展示了一个创造性的解决方案：你可以在相同的原始语料库上快速训练一个粗略的参考模型，只需几个epoch。
- en: Even though that reference model might not be perfect, it still does an okay
    job identifying the noisier tokens that hamper training. The result is a 2–3%
    downstream accuracy boost and a 30–40% reduction in tokens used.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 即使那个参考模型可能并不完美，它仍然能够很好地识别那些妨碍训练的噪声标记。结果是下游准确率提高了2-3%，使用的标记减少了30-40%。
- en: '* * *'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion and Future Directions
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论和未来方向
- en: Contributions of This Work
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本工作的贡献
- en: 'This paper provides both an illuminating analysis of token-level training dynamics
    and a new technique called SLM:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇论文提供了对标记级训练动态的启发式分析，以及一种名为SLM的新技术：
- en: '**Token Loss Analysis:**They demonstrate that a majority of tokens contribute
    little beyond the initial training phase, while a small subset stays persistently
    high loss.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**标记损失分析**：他们证明，大多数标记在初始训练阶段之后贡献很小，而一小部分标记的损失持续很高。'
- en: '**SLM for Focused Learning:**By leveraging a reference model to gauge how "useful"
    each token is, they manage to r*educe training tokens drastically* without sacrificing
    quality – in many cases even boosting downstream performance.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**SLM用于专注学习**：通过利用参考模型来衡量每个标记的“有用性”，他们设法*大幅减少训练标记*而不牺牲质量——在许多情况下甚至提高了下游性能。'
- en: '**Broad Demonstration of Effectiveness:**SLM works not only on math-specific
    tasks but also in more general domains, with either a meticulously curated reference
    dataset or a reference model drawn from the same large corpus.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**广泛展示有效性**：SLM不仅适用于数学特定任务，也适用于更广泛的领域，无论是精心策划的参考数据集还是来自相同大型语料库的参考模型。'
- en: Where Could This Go Next?
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这一切接下来会走向何方？
- en: 'SLM encompasses various potential directions for future research. For example:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: SLM涵盖了未来研究的各种潜在方向。例如：
- en: '**Scaling Up Further:**Though the paper primarily focuses on models around
    1B to 7B parameters, there remains the open question of how SLM performs at the
    30B, 70B, or 100B+ scale. If the token-level approach generalizes well, the cost
    savings could be enormous for truly massive LLMs.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步扩展规模**：尽管这篇论文主要关注1B到7B参数的模型，但仍然存在一个开放问题，即SLM在30B、70B或100B+规模上的表现如何。如果标记级方法具有良好的泛化能力，对于真正巨大的LLM来说，成本节约可能是巨大的。'
- en: '**Reference Models via API:**If you can’t gather curated data, maybe you could
    use an API-based language model as your reference. That might make SLM more practical
    for smaller research teams who lack the resources for selective reference training.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过API的参考模型**：如果你无法收集精心策划的数据，也许你可以使用基于API的语言模型作为你的参考。这可能使SLM对缺乏选择性参考训练资源的较小研究团队更加实用。'
- en: '**Reinforcement Learning Extensions:**Imagine coupling SLM with reinforcement
    learning. The reference model could act as a "reward model," and token selection
    might then be optimized through something akin to policy gradients.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**强化学习扩展**：想象一下将SLM与强化学习相结合。参考模型可以充当“奖励模型”，然后可以通过类似策略梯度的方法来优化标记选择。'
- en: '**Multiple Reference Models:**Instead of a single RM, you could train or gather
    *several*, each focusing on a different domain or style. Then, combine their token
    scores to produce a more robust multi-domain filtering system.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**多个参考模型**：而不是一个单一的RM，你可以训练或收集*几个*，每个都专注于不同的领域或风格。然后，将它们的标记分数结合起来，以产生一个更稳健的多领域过滤系统。'
- en: '**Alignment and Safety:**There’s a growing trend toward factoring in alignment
    or truthfulness. One might train a reference model to give higher scores to well-supported
    statements and zero out tokens that look factually incorrect or harmful.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**对齐与安全：**越来越倾向于将对齐或真实性考虑在内。一个人可能训练一个参考模型，使其对有充分支持的陈述给予更高的评分，并将看似事实错误或有害的标记归零。'
- en: '* * *'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '*Thanks for reading, and I hope this breakdown helps you understand this NeurIPS
    2024 best-paperwork.*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*感谢阅读，希望这个分析能帮助你理解NeurIPS 2024最佳论文工作。*'
