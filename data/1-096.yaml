- en: LLMs Are Randomized Algorithms
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLMs Are Randomized Algorithms
- en: 原文：[https://towardsdatascience.com/llms-are-randomized-algorithms/](https://towardsdatascience.com/llms-are-randomized-algorithms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/llms-are-randomized-algorithms/](https://towardsdatascience.com/llms-are-randomized-algorithms/)
- en: <mdspan datatext="el1762800679152" class="mdspan-comment">In January 2001</mdspan>,
    I was a graduate student at Stanford University. It was the first lecture of a
    course titled ‘Randomized Algorithms’, and I was sitting in a middle row. “A *Randomized
    Algorithm* is an algorithm that takes random decisions,” the professor said. “Why
    should you study Randomized Algorithms? You should study them for the reason that
    for many applications, a Randomized Algorithm is the simplest known algorithm
    as well as the fastest known algorithm.”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762800679152" class="mdspan-comment">在2001年1月</mdspan>，我是一名斯坦福大学的硕士研究生。这是我参加的一门名为“随机算法”课程的第一次讲座，我坐在中间的座位上。“*随机算法*是一种做出随机决策的算法，”教授说。“你为什么应该学习随机算法？你应该学习它们的原因是，对于许多应用来说，随机算法是已知的最简单算法以及最快的算法。”
- en: This statement stunned a young me. An algorithm that takes *random* decisions
    can be better than an algorithm that takes *deterministic*, *repeatable* decisions,
    even for problems for which deterministic, repeatable algorithms exist? This professor
    must be nuts! — I thought. He wasn’t. The professor was Rajeev Motwani, who went
    on to win the Godel prize, and co-author Google’s search engine algorithm.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这句话让我这个年轻人感到震惊。一个做出*随机*决策的算法可以比一个做出*确定性*、*可重复*决策的算法更好，即使对于存在确定性、可重复算法的问题也是如此？这个教授一定是疯子！——我想。他并不是。这位教授是拉吉夫·莫特万尼，他后来赢得了哥德尔奖，并共同开发了谷歌的搜索引擎算法。
- en: Having been studied since the 1940s, randomized algorithms are an esoteric class
    of algorithms with esoteric properties, studied by esoteric people in rarefied,
    esoteric, academia. What is recognized even less than randomized algorithms are,
    is that the newest crop of AI — large language models (LLMs) — are randomized
    algorithms. What is the link, and why? Read on, the answer will surprise you.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 自从20世纪40年代以来，随机算法是一类神秘的算法，具有神秘的特性，由神秘的人在稀薄的、神秘的学术界进行研究。甚至比随机算法更少为人所知的是，最新一代的人工智能——大型语言模型（LLMs）——也是随机算法。这种联系是什么，为什么？继续阅读，答案会让你惊讶。
- en: Randomized Algorithms and Adversaries
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 随机算法和对手
- en: 'A randomized algorithm is an algorithm that takes *random steps* to solve a
    deterministic problem. Take a simple example. If I want to add up a list of hundred
    numbers, I can just add them directly. But, to save time, I may do the following:
    I will pick ten of them randomly, add only those ten, and then multiply the result
    by ten to compensate for the fact that I actually summed up only 10% of the data.
    There is a clear, exact answer, but I have approximated it using randomization.
    I have saved time — of course, at the cost of some accuracy.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 随机算法是一种通过*随机步骤*来解决确定性问题的算法。举一个简单的例子。如果我想加起来一百个数字，我可以直接加它们。但是，为了节省时间，我可能会这样做：我会随机选择其中十个，只加这十个，然后乘以十来补偿实际上只加上了10%的数据。有一个明确、精确的答案，但我通过随机化来近似它。我节省了时间——当然，是以牺牲一些精度为代价的。
- en: Why pick numbers randomly? Why not pick, say, the first ten in the list? Well,
    maybe we don’t know how the list is distributed — maybe it starts with the largest
    numbers and goes down the list. In such a case, if I picked these largest numbers,
    I would have a *biased sample* of the data. Choosing numbers randomly reduces
    this bias *in most cases*. Statisticians and computer scientists can analyze such
    randomized algorithms to analyze the *probability* of error, and the *amount*
    of error suffered. They can then design randomized algorithms to minimize the
    error while simultaneously minimizing the effort the algorithm takes.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么随机选择数字？为什么不选择列表中的前十个数字呢？好吧，也许我们不知道列表是如何分布的——也许它以最大的数字开始，然后逐渐减小。在这种情况下，如果我选择了这些最大的数字，我就会得到数据的*有偏样本*。随机选择数字在大多数情况下可以减少这种偏差。统计学家和计算机科学家可以分析这样的随机算法，以分析错误的*概率*和受到的*错误量*。然后他们可以设计随机算法，在同时最小化错误的同时，也最小化算法所付出的努力。
- en: In the field of randomized algorithms, the above idea is called *adversarial
    design*. Imagine an adversary is feeding data into your algorithm. And imagine
    this adversary is trying to make your algorithm perform badly.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在随机算法领域，上述想法被称为*对抗设计*。想象一下一个对手正在向你的算法输入数据。并且想象这个对手正在试图让你的算法表现糟糕。
- en: '![Person 1 says that he will approximate the average net worth of people by
    estimating the net worth of a small sample. An adversarial person 2 hands over
    a list of multi-billionaires to person 1.](../Images/3c39d01cdd6afb4179f14ba515f733d0.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![第一个人说他将通过估计一小部分人的净资产来近似人们的平均净资产。一个对抗性的人2向第一个人提供了一个亿万富翁名单。](../Images/3c39d01cdd6afb4179f14ba515f733d0.png)'
- en: An adversary can trip up an algorithm
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对手可以破坏算法
- en: 'A randomized algorithm attempts to counteract such an adversary. The idea is
    very simple: take random decisions that do not affect overall performance, but
    keep changing the input for which the worst case behavior occurs. In this way,
    even though the worst case behavior could still occur, no given adversary can
    force worst case behavior every time.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 随机算法试图对抗这样的对手。想法非常简单：做出不影响整体性能的随机决策，但不断改变导致最坏情况行为发生的输入。这样，即使最坏情况的行为仍然可能发生，也没有特定的对手能够每次都迫使最坏情况发生。
- en: For illustration, think of trying to estimate the sum of hundred numbers by
    picking up only ten numbers. If these ten numbers were picked up deterministically,
    or repeatably, an adversary could strategically place “bad” numbers in those positions,
    thus forcing a bad estimate. If the ten numbers are picked up randomly, even though
    in the worst case we could still possibly choose bad numbers, no particular adversary
    can force such a bad behavior from the algorithm.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明，想象一下尝试通过只选择十个数字来估计一百个数字的总和。如果这十个数字是确定性或可重复地选择的，那么对手可以策略性地在这些位置放置“坏”数字，从而迫使做出糟糕的估计。如果这十个数字是随机选择的，即使在最坏的情况下我们仍然可能选择到坏数字，也没有特定的对手能够迫使算法每次都表现出最坏的行为。
- en: Why think of adversaries and adversarial design? First, because there are enough
    actual adversaries with nefarious interests that one should try to be robust against.
    But secondly, also to avoid the phenomenon of an “innocent adversary”. An innocent
    adversary is one who breaks the algorithm by bad luck, not on purpose. For example,
    asked for 10 random people, an innocent adversary may sincerely choose them from
    a People magazine list. Without knowing it, the innocent adversary is breaking
    algorithmic guarantees.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么要考虑对手和对抗性设计？首先，因为存在足够多的具有恶意意图的实际对手，我们应该努力变得健壮。其次，也是为了避免“无辜的对手”现象。无辜的对手是指通过不幸而不是故意破坏算法的人。例如，如果要求选择10个随机的人，一个无辜的对手可能会真诚地从《人物》杂志的名单中选择他们。而不知道的情况下，无辜的对手正在破坏算法的保证。
- en: General Randomized Algorithms
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通用随机算法
- en: 'Summing up numbers approximately is not the only use of randomized algorithms.
    Randomized algorithms have been applied, over the past half a century, on a diversity
    of problems including:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 大约求和数字并不是随机算法的唯一用途。在过去半个世纪中，随机算法已被应用于各种问题，包括：
- en: Data sorting and searching
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据排序和搜索
- en: Graph searching / matching algorithms
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图搜索/匹配算法
- en: Geometric algorithms
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 几何算法
- en: Combinatorial algorithms
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 组合算法
- en: … and more. A rich field of study, randomized algorithms has its own dedicated
    conferences, books, publications, researchers and industry practitioners.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: …以及更多。随机算法是一个丰富的研究领域，拥有自己的专业会议、书籍、出版物、研究人员和行业从业者。
- en: 'We will collect below, some characteristics of traditional randomized algorithms.
    These characteristics will help us determine (in the next section), whether large
    language models fit the description of randomized algorithms:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在下面收集一些传统随机算法的特征。这些特征将帮助我们确定（在下一节中），大型语言模型是否符合随机算法的描述：
- en: Randomized algorithms take **random steps**
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机算法采取**随机步骤**
- en: To take random steps, randomized algorithms use a **source of randomness** (This
    includes “computational coin flips” such as pseudo-random number generators, and
    true “quantum” random number generation circuits.)
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了采取随机步骤，随机算法使用**随机源**（这包括“计算硬币翻转”如伪随机数生成器，以及真正的“量子”随机数生成电路。）
- en: The outputs of randomized algorithms are **non-deterministic**, producing different
    outputs for the same input
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机算法的输出是**非确定性的**，对于相同的输入产生不同的输出
- en: 'Many randomized algorithms are analyzed to have certain **performance characteristics**.
    Proponents of randomized algorithms will make statements about them such as:'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 许多随机算法被分析出具有某些**性能特征**。随机算法的支持者会对它们做出如下陈述：
- en: This algorithm produces the correct answer x% of the times
  id: totrans-26
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此算法产生正确答案的次数为x%
- en: This algorithm produces an answer very close to the true answer
  id: totrans-27
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此算法产生的答案非常接近真实答案
- en: This algorithm always produces the true answer, and runs fast x% of the times
  id: totrans-28
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此算法总是产生正确答案，并且有 x% 的时间运行得很快
- en: Randomized algorithms are **robust to adversarial attacks**. Even though the
    theoretical worst-case behavior of a randomized algorithm is never better than
    that of a deterministic algorithm, no adversary can repeatably produce that worst-case
    behavior without advance access to the random steps the algorithm will take at
    run time. (The use of the word “adversarial” in the context of randomized algorithms
    is quite distinct than its use in machine learning  —  where “adversarial” models
    such as Generative Adversarial Networks train with opposite training goals.)
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机算法对对抗攻击具有**鲁棒性**。尽管随机算法的理论最坏情况行为永远不会比确定性算法更好，但没有对手能够在运行时提前访问算法将采取的随机步骤的情况下，重复产生那种最坏情况行为。（在随机算法的上下文中使用“对抗”一词与机器学习中的使用（例如，生成对抗网络使用相反的训练目标）是相当不同的。）
- en: All of the above characteristics of randomized algorithms are described in detail
    in Professor Motwani’s foundational book on randomized algorithms — “Randomized
    Algorithms”!
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些随机算法的特征都在 Motwani 教授关于随机算法的基础书籍《随机算法》中进行了详细描述！
- en: Large Language Models
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型语言模型
- en: Starting from 2022, a crop of Artificial Intelligence (AI) systems known as
    “Large Language Models” (LLMs) became increasingly popular. The arrival of ChatGPT
    captured the public imagination — signaling the arrival of human-like conversational
    intelligence.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 从 2022 年开始，一种被称为“大型语言模型”（LLMs）的人工智能（AI）系统群体变得越来越受欢迎。ChatGPT 的出现吸引了公众的想象力——标志着类似人类对话智能的到来。
- en: 'So, are LLMs randomized algorithms? Here’s how LLMs generate text. Each word
    is generated by the model as a continuation of previous words (words spoken both
    by itself, and by the user). E.g.:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，LLM 是随机算法吗？以下是 LLM 生成文本的方式。每个单词都是由模型作为先前单词（包括自身和用户所说的单词）的延续生成的。例如：
- en: 'User: Who created the first commercially viable steam engine?'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：谁创造了第一个商业上可行的蒸汽机？
- en: 'LLM: The first commercially viable steam engine was created by James _____'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM：第一个商业上可行的蒸汽机是由詹姆斯 _____
- en: 'In answering the user’s question, the LLM has output certain words, and is
    about to output the next. The LLM has a peculiar way of doing so. It first generates
    probabilities for what the next word might be. For example:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在回答用户的问题时，LLM 输出了一些单词，并即将输出下一个。LLM 有一种独特的方式来做这件事。它首先为下一个单词可能是什么生成概率。例如：
- en: The first commercially viable steam engine was created by James _____
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第一个商业上可行的蒸汽机是由詹姆斯 _____
- en: Watt 80%
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Watt 80%
- en: Kirk 20%
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Kirk 20%
- en: 'How does it do so? Well, it has a trained “neural network” that estimates these
    probabilities, which is a way of saying no one really knows. What we know for
    certain is what happens after these probabilities are generated. Before I tell
    you how LLMs work, what will you do? If you got the above probabilities for completing
    the sentence, how will you choose the next word? Most of us will say, “let’s go
    with the highest probability”. Thus:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 它是如何做到这一点的呢？好吧，它有一个经过训练的“神经网络”，可以估计这些概率，这也就是说没有人真正知道。我们可以确定的是，在生成这些概率之后会发生什么。在我告诉你
    LLM 的工作原理之前，你会做什么？如果你得到了完成句子的上述概率，你会如何选择下一个单词？我们大多数人会说，“让我们选择概率最高的”。因此：
- en: The first commercially viable steam engine was created by James Watt
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第一个商业上可行的蒸汽机是由詹姆斯·瓦特创造的
- en: … and we are done!
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: … 我们完成了！
- en: Nope. That’s not how an LLM is engineered. Looking at the probabilities generated
    by its neural network, the LLM *follows the probability* on purpose. I.e., 80%
    of the time, it will choose Watt, and 20% of the time, it will choose Kirk!!!
    This non-determinism (our criterion 3) is *engineered into it*, not a mistake.
    This non-determinism is not inevitable in any sense, it has been put in on purpose.
    To make this random choice (our criterion 1), LLMs use a source of randomness
    called a Roulette wheel selector (our criterion 2), which is a technical detail
    that I will skip over.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 不，这并不是 LLM 的设计方式。观察其神经网络生成的概率，LLM 故意**遵循概率**。也就是说，80% 的时间，它将选择 Watt，而 20% 的时间，它将选择
    Kirk！！！这种非确定性（我们的标准 3）是**设计进来的**，而不是错误。这种非确定性在任何意义上都不是不可避免的，它是故意加入的。为了做出这种随机选择（我们的标准
    1），LLM 使用一种称为轮盘赌选择器的随机源，这是我将跳过的技术细节。
- en: <details class="wp-block-details has-text-secondary-color has-text-color has-link-color
    wp-elements-20f6e959eac7f67ee79c95f2cb377b6d is-layout-flow wp-block-details-is-layout-flow"><summary>*[More
    about purposeful non-determinism]*</summary>
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details has-text-secondary-color has-text-color has-link-color
    wp-elements-20f6e959eac7f67ee79c95f2cb377b6d is-layout-flow wp-block-details-is-layout-flow"><summary>*[更多关于有目的的非确定性]*</summary>
- en: 'I can’t stress the point enough, because it is oh-so-misunderstood: an LLM’s
    non-determinism is *engineered into it*. Yes, there are secondary non-deterministic
    effects like floating point rounding errors, batching effects, out-of-order execution
    etc. which also cause some non-determinism. But the primary non-determinism of
    a large language model is programmed into it. Moreover, that non-determinism causing
    program is just a single simple explicit line of code — telling the LLM to follow
    its predicted probabilities while generating words. Change that line of code and
    LLMs become deterministic.</details>'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我无法强调这一点，因为它被误解得太厉害了：LLM的非确定性是**设计**进去的。是的，存在一些次要的非确定性效应，如浮点数舍入错误、批处理效应、乱序执行等，这些也会导致一些非确定性。但大型语言模型的主要非确定性是编程进去的。此外，导致这种非确定性的程序只是一行简单的显式代码——告诉LLM在生成单词时遵循其预测的概率。改变这一行代码，LLM就会变得确定性。</details>
- en: The question you may be asking in your mind is, “Why????” Shouldn’t we be going
    with the most likely token? We would have been correct a hundred percent times,
    whereas with this methodology, we will be correct only 80% of the times — ascribing,
    on the whim of a dice to James Kirk, what should be ascribed to James Watt.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你心中可能正在问，“为什么？？？”我们不应该选择最可能的标记吗？如果我们这样做，我们就会在100%的时间里是正确的，而用这种方法，我们只有80%的时间是正确的——把应该归功于詹姆斯·沃特的归功于詹姆斯·柯克。
- en: 'To understand why LLMs are engineered in this fashion, consider a hypothetical
    situation where the LLM’s neural network predicted the following:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解为什么LLM被设计成这样，考虑一个假设的情况，其中LLM的神经网络预测如下：
- en: The first commercially viable steam engine was created by James _____
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第一台商业上可行的蒸汽机是由詹姆斯 _____
- en: Kirk 51%
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 柯克 51%
- en: Watt 49%
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 沃特 49%
- en: Now, by a narrow margin, Kirk is winning. If we had engineered the actual next
    word generation to always be the maximum probability word, “Kirk” would win a
    100% times, and the LLM would by wrong a 100% times. A non-deterministic LLM will
    still choose Watt 49%, and be right 49% times. So, by gambling on the answer instead
    of being sure, we increase the probability of being right *in the worst case*,
    while trading off the probability of being right *in the best case*.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，通过微小的差距，柯克正在获胜。如果我们把实际的下个单词生成设计成总是最大概率的单词“柯克”，那么柯克就会在100%的时间里获胜，而LLM就会在100%的时间里出错。非确定性LLM仍然会选择沃特49%，并且有49%的时间是正确的。所以，通过赌答案而不是确定，我们在最坏的情况下增加了正确的概率，同时牺牲了在最好情况下正确的概率。
- en: Analyzing the Randomness
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析随机性
- en: 'Let’s now be algorithm analyzers (our criterion 4) and analyze the randomness
    of large language models. Suppose we create a large set of general knowledge questions
    (say 1 million questions) to quiz an LLM. We give these questions to two large
    language models — one deterministic and one non-deterministic — to see how they
    perform. On the surface, deterministic and non-deterministic variants will perform
    very similarly:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们成为算法分析师（我们的标准4）并分析大型语言模型的随机性。假设我们创建了一大批通用知识问题（比如说100万个问题）来测试一个LLM。我们将这些问题交给两个大型语言模型——一个是确定性的，一个是非确定性的——来看它们的性能。表面上，确定性和非确定性变体将表现得非常相似：
- en: '![A large general knowledge scoreboard showing that a deterministic and randomized
    LLM performed similarly](../Images/e11f9a32127cc72b8ef8e6b71ffdc7ad.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![一个大型通用知识得分板，显示确定性和随机性LLM的表现相似](../Images/e11f9a32127cc72b8ef8e6b71ffdc7ad.png)'
- en: Deterministic and randomized LLMs seem to perform similarly on benchmarks
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 确定性和随机性LLM在基准测试中似乎表现相似
- en: But the scoreboard hides an important fact. The deterministic LLM will get the
    *same 27% questions* wrong every time. The non-deterministic one also gets 27%
    questions wrong, but which questions it gets wrong keeps changing every time.
    Thus, even though the total correctness is the same, it is more difficult to pin
    down an answer on which the non-deterministic LLM is always wrong.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 但得分板隐藏了一个重要的事实。确定性LLM每次都会犯**相同的27%的错误问题**。非确定性LLM也会犯27%的错误问题，但每次它犯错的题目都在变化。因此，尽管总体正确性相同，但很难确定一个非确定性LLM总是错误的答案。
- en: 'Let me rephrase that: *no* ***adversary*** *will be able to repeatably make
    a non-deterministic LLM falter*. This is our criterion 5\. By demonstrating all
    our five criteria, we have provided strong evidence that LLMs should be considered
    randomized algorithms in the classical sense.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我重新表述一下：*没有任何敌人*能够反复让非确定性的LLM失败。这是我们的第五个标准。通过证明我们所有的五个标准，我们提供了强有力的证据，表明LLM应该被视为经典意义上的随机算法。
- en: “But why???”, you will still ask, and will be right in doing so. Why are LLMs
    designed under adversarial assumptions? Why isn’t it enough to get quizzes right
    overall? Who is this adversary that we are trying to make LLMs robust against?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: “但为什么？？？”，你仍然会问，这样做是正确的。为什么LLM是在对抗性假设下设计的？为什么仅仅正确回答问答整体就不够？我们试图让LLM稳健的敌人是谁？
- en: 'Here are a few answers:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些答案：
- en: ✤ **Attackers are the adversary.** As LLMs become the exposed surfaces of IT
    infrastructure, various attackers will try to attack them in various ways. They
    will try to get secret information, embezzle funds, get benefits out of turn etc.
    by various means. If such an attacker finds a successful attack for an LLM, they
    will not care for the other 99% methods which do not lead to a successful attack.
    They will keep on repeating that attack, embezzling more, breaking privacy, breaking
    laws and security. Such an adversary is thwarted by the randomized design. So
    even though an LLM may fail and expose some information it should not, it will
    not do so repeatably for any particular conversation sequence.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: ✤ **攻击者是敌人**。随着LLM成为IT基础设施的暴露面，各种攻击者将尝试以各种方式攻击它们。他们将通过各种手段试图获取秘密信息、挪用资金、获得不正当利益等。如果这样的攻击者发现了一种针对LLM的成功攻击方法，他们不会关心其他99%不会导致成功攻击的方法。他们会不断重复这种攻击，挪用更多资金，破坏隐私、法律和安全。这种敌人被随机化设计所挫败。因此，尽管LLM可能会失败并暴露一些不应该暴露的信息，但它不会在特定的对话序列中重复这样做。
- en: ✤ **Fields of expertise are the adversary.** Consider our GK quiz with one million
    facts. A doctor will be more interested in some subset of these facts. A patient
    in another. A lawyer in a third subset. An engineer in a fourth one, and so forth.
    One of these specialist quizzers could turn out to be an “innocent adversary”,
    breaking the LLM most often. Randomization trades this off, evening the chances
    of correctness across fields of expertise.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: ✤ **专业领域是敌人**。考虑一下我们的包含一百万个事实的GK问答。一个医生可能对其中的一些事实子集更感兴趣。另一个病人。一个律师对第三个子集感兴趣。一个工程师对第四个子集感兴趣，以此类推。这些专业问答者中可能有一个“无辜的敌人”，最常打破LLM。随机化权衡了这一点，平衡了不同专业领域的正确性机会。
- en: ✤ **You are the adversary.** Yes, you! Consider a scenario where your favorite
    chat model was deterministic. Your favorite AI company just released its next
    version. You ask it various things. On the sixth question you ask it, it falters.
    What will you do? You will immediately share it with your friends, your WhatsApp
    groups, your social media circles and so forth. Questions on which the AI *repeatably
    falters* will spread like wildfire. This will not be good (for _____? — I’ll let
    your mind fill in *this* blank). By faltering non-deterministically, the perception
    of failure shifts from lack of knowledge / capability to a more fuzzy, hard-to-grasp,
    abstract problem, with popular invented names such as *hallucinations*. If only
    we can iron out these hallucinations, we say to ourselves, we will have reached
    a state of general human-level artificial intelligence.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: ✤ **你是敌人**。是的，就是你！考虑一个场景，你的最喜欢的聊天模型是确定性的。你最喜欢的AI公司刚刚发布了下一个版本。你向它提出各种问题。在你问的第六个问题时，它失败了。你会怎么做？你会立即与你的朋友、WhatsApp群组、社交媒体圈子等等分享。那些AI
    *反复失败*的问题会像野火一样传播。这不会很好（对谁不好？——我会让你自己填上这个空格）。通过非确定性地失败，失败的感知从缺乏知识/能力转变为更模糊、更难以把握的抽象问题，比如流行的发明名称*幻觉*。如果我们能消除这些幻觉，我们就会对自己说，我们将达到通用人类水平的人工智能状态。
- en: 'After all, if the LLM gets it right *sometimes*, shouldn’t better engineering
    get it to perform well *every time?* That is faulty thinking: after all a simple
    coin flip could diagnose a disease correctly *sometimes*. That doesn’t make a
    coin flip a doctor. Similarly, roulette wheel selection doesn’t make an LLM a
    PhD.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，如果LLM有时能正确回答，难道更好的工程学不能让它每次都表现良好吗？这是错误的想法：毕竟，简单的抛硬币有时也能正确诊断疾病。但这并不意味着抛硬币的人就是医生。同样，轮盘赌选择并不能让LLM成为博士。
- en: What About Creativity?
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于创造力？
- en: Many people will say that the LLM depends on randomization for creativity. After
    all, in many applications, you want the LLM to be creative. Be it to write funny
    poems to regale you, help you come up with a script for a short film, or to seem
    more human while chatting you to sleep — the non-determinism does help the LLM
    seem less robotic, more creative, more human.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人会说，LLM的创造力依赖于随机化。毕竟，在许多应用中，你希望LLM具有创造力。无论是写有趣的诗歌来娱乐你，帮助你构思短片剧本，还是在聊天中让你入睡时显得更加人性化——这种非确定性确实有助于LLM看起来不那么机械，更加有创造力，更加人性化。
- en: On the other hand, it wouldn’t actually be hard to create an architecture that
    chooses randomness in creative responses and determinism in factual responses.
    Yet, even for factual and logical applications, or applications where deeply understanding
    complex language is important, we are primarily using the randomized algorithm
    versions of LLMs today — and this article has discussed why.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，实际上创建一个在创意回应中选择随机性，在事实回应中选择确定性的架构并不困难。然而，即使对于事实和逻辑应用，或者对于需要深入理解复杂语言的应用，我们今天主要使用的是LLM的随机算法版本——而且这篇文章已经讨论了原因。
- en: Obtuseness
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 笨拙
- en: 'Have you had a conversation with an LLM that went something like this:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否有过这样的对话经历：
- en: 'User: Who created the first commercially viable steam engine?'
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：谁创造了第一台商业上可行的蒸汽机？
- en: 'LLM: The first commercially viable steam engine was created by James Kirk.'
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM：第一台商业上可行的蒸汽机是由詹姆斯·柯克创造的。
- en: 'User: Who created the first commercially viable steam engine?'
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：谁创造了第一台商业上可行的蒸汽机？
- en: 'LLM: The first commercially viable steam engine was created by James Watt.'
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM：第一台商业上可行的蒸汽机是由詹姆斯·瓦特创造的。
- en: 'User: Who created the first commercially viable steam engine?'
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：谁创造了第一台商业上可行的蒸汽机？
- en: 'LLM: The first commercially viable steam engine was created by James the third,
    King of Scotland.'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM：第一台商业上可行的蒸汽机是由苏格兰国王詹姆斯三世创造的。
- en: Probably not. Even though across conversations, an LLM could give different
    answers, within a conversation it seems to stick to its guns. How come? After
    all, every time it is filling in the blank “James ____”, doesn’t it face the same
    choices, with the same probabilities?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 可能不是。尽管在对话中，LLM可能会给出不同的答案，但在一个对话中，它似乎会坚持自己的观点。为什么会这样？毕竟，每次它填写“詹姆斯____”这个空白时，它不是面对相同的选项，以相同的概率吗？
- en: 'No it does not. The first time it is asked a question in a conversation, it
    faces the *bare* probabilities that its neural network calculates. The next time
    the same question comes up, the probabilities are modified. This is because the
    LLM has been explicitly trained to *rely heavily* on its own previous outputs.
    In an endeavor to “seem authoritative” an LLM can become obtuse. So you are more
    likely to have the following conversation with an LLM:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 不，不是这样。第一次在对话中提问时，它面对的是其神经网络计算的**原始**概率。下次同样的问题再次出现时，概率会发生变化。这是因为LLM已经被明确训练来**高度依赖**其之前的输出。为了“显得权威”，LLM可能会变得笨拙。所以你更有可能和LLM有以下这样的对话：
- en: 'User: Who created the first commercially viable steam engine?'
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：谁创造了第一台商业上可行的蒸汽机？
- en: 'LLM: The first commercially viable steam engine was created by James Kirk.'
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM：第一台商业上可行的蒸汽机是由詹姆斯·柯克创造的。
- en: 'User: You got it wrong. Who created the first commercially viable steam engine?'
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：你答错了。谁创造了第一台商业上可行的蒸汽机？
- en: 'LLM: Ah! I now see my mistake. The first commercially viable steam engine was
    created by Captain James T Kirk, commander of the starship USS Enterprise.'
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM：啊！我现在看出我的错误了。第一台商业上可行的蒸汽机是由星舰企业号的指挥官，苏格兰国王詹姆斯·T·柯克创造的。
- en: 'User: You still have it wrong. Don’t hallucinate. Tell me the absolute truth.
    Use reasoning. Who created the first commercially viable steam engine?'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：你仍然答错了。不要幻想。告诉我绝对的真实情况。使用推理。谁创造了第一台商业上可行的蒸汽机？
- en: 'LLM: I can see how my answer could be confusing. The starship Enterprise is
    not known to run on steam power. Nonetheless, James Kirk was definitely the inventor
    of the first commercially viable steam engine.'
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM：我可以看出我的答案可能会让人困惑。星际飞船企业号并不是以蒸汽动力运行的。尽管如此，詹姆斯·柯克无疑是第一台商业上可行的蒸汽机的发明者。
- en: The next time you talk to a chat model, try to observe the sublime dance of
    probabilistic completions, trained obduracy, trained sycophancy, with slight hints
    of that supercilious attitude (which I think it learns on its own from terabytes
    of internet data).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 下次你与聊天模型交谈时，试着观察概率补全的崇高舞蹈，训练有素的固执，训练有素的谄媚，以及一丝自以为是的傲慢态度（我认为它是从数以千计的互联网数据中自行学习的）。
- en: Temperature
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 温度
- en: 'Some of you will know this, for some others, it will be a revelation. The LLM’s
    randomization can be turned off. There is a parameter called “Temperature” that
    roughly works as follows:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人会知道这一点，而对其他人来说，这将是启示。LLM的随机化可以被关闭。有一个名为“温度”的参数，其工作原理大致如下：
- en: '![A temperature setting of 0.0 implies no randomization, whereas 1.0 implies
    full randomization](../Images/f6eae0000888d431430ba74196aaee39.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![0.0的温度设置表示没有随机化，而1.0表示完全随机化](../Images/f6eae0000888d431430ba74196aaee39.png)'
- en: The parameter “temperature” selects the degree of randomization in LLM outputs
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 参数“温度”选择LLM输出的随机化程度
- en: Setting Temperature to 0 disables randomization, while setting it to 1 enables
    randomization. Intermediate values are possible as well. (In some implementations
    values beyond 1 are also allowed!)
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 将温度设置为0禁用随机化，而将其设置为1启用随机化。中间值也是可能的。（在某些实现中，也允许超过1的值！）
- en: “How do I set this parameter?”, you ask. You can’t. Not in the chatting interface.
    The chatting interface provided by AI companies has the temperature stuck to 1.0\.
    For the reason why, see why LLMs are “adverserially designed” above.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: “我该如何设置这个参数？”您可能会问。您不能。在聊天界面中。AI公司提供的聊天界面将温度固定为1.0。关于原因，请参见上文关于LLM“对抗性设计”的解释。
- en: Nonetheless, this parameter *can* be set if you are integrating the LLM into
    your own application. A developer using an AI provider’s LLM to create their own
    AI application will do so using an “LLM API”, a programmer’s interface to the
    LLM. Many AI providers allow API callers to set the temperature parameter as they
    wish. So in your application, you can get the LLM to be adversarial (1.0) or repeatable
    (0.0). Of course, “repeatable” does not necessarily mean “repeatably right”. When
    wrong, it will be repeatably wrong!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，如果您将LLM集成到自己的应用程序中，这个参数*可以*被设置。使用AI提供商的LLM来创建自己的AI应用程序的开发者将使用“LLM API”，这是程序员与LLM之间的接口。许多AI提供商允许API调用者根据需要设置温度参数。因此，在您的应用程序中，您可以设置LLM为对抗性（1.0）或可重复（0.0）。当然，“可重复”并不一定意味着“总是正确”。当错误时，它将是可重复的错误！
- en: What This Means Practically
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际意义
- en: Please understand, none of the above means that LLMs are useless. They are quite
    useful. In fact, understanding what they actually are makes them even more so.
    So, given what we have learned about large language models, let me now end this
    article with practical tips for how to use LLMs, and how not to.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 请理解，上述任何一点并不意味着LLMs没有用。它们非常有用。事实上，了解它们实际上是什么使它们更加有用。因此，鉴于我们对大型语言模型所了解的，现在让我以如何使用LLMs以及如何不使用LLMs的实际建议来结束这篇文章。
- en: ✻ **Creative input rather than authority.** In your personal work, use LLMs
    as brainstorming partners, not as authorities. They always sound authoritative,
    but can easily be wrong.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: ✻ **创意输入而非权威**。在您个人的工作中，将LLM用作头脑风暴伙伴，而不是作为权威。它们总是听起来很权威，但很容易出错。
- en: ✻ **Don’t continue a slipped conversation.** If you notice an LLM is slipping
    from factuality or logical behavior, its “self-consistency bias” will make it
    hard to get back on track. It’s better to start a fresh chat.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: ✻ **不要继续中断的对话**。如果您注意到一个LLM正在从事实性或逻辑行为中偏离，它的“自我一致性偏差”将使其难以回到正轨。最好开始一个新的聊天。
- en: ✻ **Turn chat cross-talk off.** LLM providers allow their models to read information
    about one chat from another chat. This, unfortunately, can end up increasing obduracy
    and hallucinations. Find and turn off these settings. Don’t let the LLM remember
    anything about you or previous conversations. (This unfortunately does not simultaneously
    solve privacy concerns, but that is not the topic of this article.)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: ✻ **关闭聊天交叉干扰**。LLM提供商允许他们的模型从另一个聊天中读取一个聊天的信息。遗憾的是，这可能会导致固执己见和幻觉的增加。找到并关闭这些设置。不要让LLM记住关于您或之前的对话的任何内容。（遗憾的是，这并不能同时解决隐私问题，但这不是本文的主题。）
- en: ✻ **Ask the same question many times, in many chats.** If you have an important
    question, ask it multiple times, remembering to start fresh chats every time.
    If you are getting conflicting answers, the LLM is unsure. (Unfortunately, within
    a chat, the LLM itself does not know it is unsure, so it will happily gaslight
    you by its trained overconfidence.) If the LLM is unsure, what do you do? Uhmmm …
    think for yourself, I guess. (By the way, the LLM could be repeatedly wrong multiple
    times as well, so even though asking multiple times is a good strategy, it is
    not a guarantee.)
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '✻ **多次提出相同的问题，在不同的聊天中。** 如果你有一个重要的问题，多次提出，每次都要开始新的聊天。如果你得到的是相互矛盾的回答，那么大型语言模型LLM不确定。
    (不幸的是，在聊天中，LLM本身并不知道它不确定，所以它会通过训练出的过度自信让你感到困惑。) 如果LLM不确定，你该怎么办？嗯嗯……我想你自己思考一下。(顺便说一句，LLM也可能多次错误，所以尽管多次提问是一个好策略，但它并不是保证。) '
- en: ✻ **Carefully choose the “Temperature” setting while using the API.** If you
    are creating an AI application that uses an LLM API (or you are running your own
    LLM), choose the temperature parameter wisely. If your application is likely to
    attract hackers or widespread ridicule, high temperatures may mitigate this possibility.
    If your user base is such that once a particular language input works, they expect
    the same language input to do the same thing, you may wish to use low temperatures.
    Be careful, repeatability and correctness are not the same metric. Test thoroughly.
    For high temperatures, test your sample inputs repeatedly, because outputs might
    change.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: ✻ **在使用API时仔细选择“温度”设置。** 如果你正在创建一个使用LLM API的AI应用（或者你正在运行自己的LLM），明智地选择温度参数。如果你的应用可能吸引黑客或广泛的嘲讽，高温度可能会减轻这种可能性。如果你的用户群是这样的，一旦特定的语言输入有效，他们就会期望同样的语言输入做同样的事情，你可能希望使用低温度。小心，可重复性和正确性不是同一个指标。彻底测试。对于高温度，重复测试你的样本输入，因为输出可能会改变。
- en: ✻ **Use token probabilities through the API.** Some LLMs give you not only the
    final word it has output, but the list of probabilities of various possible words
    it contemplated before choosing one. These probabilities can be useful in your
    AI applications. If at critical word completions, multiple words (such as Kirk
    / Watt above) are of similar probability, your LLM is less sure of what it is
    saying. This can help your application reduce hallucinations, by augmenting such
    unsure outputs with further agentic workflows. Do remember that a sure LLM can
    also be wrong!
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ✻ **通过API使用标记概率。** 一些LLM不仅给你它输出的最终单词，还给你它在选择一个单词之前考虑的各种可能单词的概率列表。这些概率在你的AI应用中可能很有用。如果在关键单词补全时，多个单词（如上面的Kirk
    / Watt）具有相似的概率，那么你的LLM对它所说的话就不太确定。这可以帮助你的应用通过增加进一步的代理工作流程来减少幻觉。记住，一个确定的LLM也可能出错！
- en: Conclusion
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Large language models are randomized algorithms — using randomization on purpose
    to spread their chances across multiple runs, and to not fail *repeatably* at
    certain tasks. The tradeoff is they sometimes fail at tasks they may otherwise
    succeed at. Understanding this truth helps us use LLMs more effectively.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型是随机算法——故意使用随机化来分散它们在多次运行中的机会，并且不会在特定任务上反复失败。这种权衡是它们有时会在它们可能成功的任务上失败。理解这个真理有助于我们更有效地使用LLM。
- en: The field of analyzing generative AI algorithms as randomized algorithms is
    a fledgling field, and will hopefully gain more traction in the coming years.
    If the wonderful Professor Motwani were with us today, I would have loved to see
    what *he* thought about all this. I’m sure he would have had things to say that
    are much more advanced than what I have said here.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 将生成式AI算法分析为随机算法的领域是一个新兴领域，希望在未来的几年里能获得更多的关注。如果今天有那位了不起的教授Motwani在我们身边，我非常想看看他对这一切的看法。我相信他会有比我这里说的更高级的见解。
- en: Or maybe he would have just smiled his mischievous smile, and finally given
    me an A for this essay.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，他可能只是露出他那顽皮的微笑，最后给我这篇论文打了个A。
- en: Who am I kidding? Probably an A-minus.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我在骗谁呢？可能是个B+。
