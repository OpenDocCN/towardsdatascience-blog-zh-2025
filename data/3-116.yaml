- en: Are We Watching More Ads Than Content? Analyzing YouTube Sponsor Data
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们是否比内容看了更多的广告？分析YouTube赞助数据
- en: 原文：[https://towardsdatascience.com/are-we-watching-more-ads-than-content-analyzing-youtube-sponsor-data/](https://towardsdatascience.com/are-we-watching-more-ads-than-content-analyzing-youtube-sponsor-data/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/are-we-watching-more-ads-than-content-analyzing-youtube-sponsor-data/](https://towardsdatascience.com/are-we-watching-more-ads-than-content-analyzing-youtube-sponsor-data/)
- en: <mdspan datatext="el1742417761800" class="mdspan-comment">I’m definitely</mdspan>
    not the only person who feels that YouTube sponsor segments have become longer
    and more frequent recently. Sometimes, I watch videos that seem to be trying to
    sell me something every couple of seconds.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1742417761800" class="mdspan-comment">我确实</mdspan>不是唯一一个觉得YouTube的赞助片段最近变得更长、更频繁的人。有时候，我观看的视频似乎每隔几秒钟就在试图向我推销什么。
- en: <mdspan datatext="el1742607365299" class="mdspan-comment">On one hand, it’s
    great that both small and medium-sized YouTubers are able to make a living from
    their craft, but on the other hand</mdspan>, it sure is annoying to be bombarded
    by ads.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1742607365299" class="mdspan-comment">一方面，很高兴小型和中型YouTube创作者能够通过他们的技艺谋生，但另一方面</mdspan>，确实很烦人，总是被广告轰炸。
- en: In this blog post, I will explore these sponsor segments, using data from a
    popular browser extension called SponsorBlock, to figure out if the perceived
    increase in ads actually did happen and also to quantify how many ads I’m watching.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我将探讨这些赞助片段，使用来自一个流行的浏览器扩展SponsorBlock的数据，来找出感知到的广告增加实际上是否真的发生了，以及量化我看了多少广告。
- en: I will walk you through my analysis, providing code snippets in SQL, DuckDB,
    and pandas. All the code is available [on my GitHub](https://github.com/mtrentz/sponsorblock-analysis),
    and since the dataset is open, I will also teach you how to download it, so that
    you can follow along and play with the data yourself.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我将带你了解我的分析，提供SQL、DuckDB和pandas的代码片段。所有代码都可在我的GitHub上找到[https://github.com/mtrentz/sponsorblock-analysis]，由于数据集是开放的，我还会教你如何下载它，这样你就可以跟随并自己玩转这些数据。
- en: 'These are the questions I will be trying to answer in this analysis:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我将在这次分析中试图回答的问题：
- en: '**Have sponsor segments increased over the years?**'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**赞助片段在过去几年中是否有所增加？**'
- en: '**Which channels have the highest percentage of sponsor time per video?**'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**哪些频道每视频的赞助时间百分比最高？**'
- en: '**What is the density of sponsor segments throughout a video?**'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视频中的赞助片段密度是多少？**'
- en: 'To get to these answers, we will have to cover much ground. This is the agenda
    for this post:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了得到这些答案，我们不得不走很长的路。这是本篇文章的议程：
- en: '[How SponsorBlock Works](#sponsorblock)'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[SponsorBlock是如何工作的](#sponsorblock)'
- en: '[Cleaning the Data](#data-cleaning)'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[清洗数据](#data-cleaning)'
- en: '[Exploring and Enhancing the Data](#data-exploration)'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[探索和增强数据](#data-exploration)'
- en: '[Answering Each of the Questions](#increased-sponsor-time)'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[回答每个问题](#increased-sponsor-time)'
- en: '[Conclusion](#conclusion)'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[结论](#conclusion)'
- en: Let’s get this started!
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: How SponsorBlock Works
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何工作
- en: SponsorBlock is an extension that allows you to skip ad segments in videos,
    similar to how you skip Netflix intros. It’s incredibly accurate, as I don’t remember
    seeing one wrong segment since I started using it around a month ago, and I watch
    a lot of smaller non-English creators.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: SponsorBlock是一个扩展程序，允许你跳过视频中的广告片段，类似于你跳过Netflix的片头。它非常准确，因为我记得自从我大约一个月前开始使用它以来，我没有看到任何一个错误的片段，而且我观看了很多非英语创作者的视频。
- en: You might be asking yourself how the extension knows which parts of the video
    are sponsors, and, believe it or not, the answer is through crowdsourcing!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会问自己这个扩展程序是如何知道视频的哪些部分是赞助内容的，信不信由你，答案是众包！
- en: Users submit the timestamps for the ad segments, and other users vote if it’s
    accurate or not. For the average user, who isn’t contributing at all, the only
    thing you have to do is to press Enter to skip the ad.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 用户提交广告片段的时间戳，其他用户投票决定其准确性。对于没有贡献的平均用户来说，你唯一需要做的就是按Enter键跳过广告。
- en: '![](../Images/6eaca3d8bd5c5d5f6c2766790271faf7.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6eaca3d8bd5c5d5f6c2766790271faf7.png)'
- en: Okay, now that you know what SponsorBlock is, let’s talk about the data.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在你已经知道了SponsorBlock是什么，让我们来谈谈数据。
- en: Cleaning the Data
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 清洗数据
- en: If you want to follow along, you can download a copy of the data using this
    [SponsorBlock Mirror](https://github.com/mchangrh/sb-mirror) (it might take you
    quite a few minutes to download it all). The database schema can be [seen here](https://github.com/ajayyy/SponsorBlockServer/blob/master/DatabaseSchema.md),
    although most of it won’t be useful for this project.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想跟进，你可以使用这个[SponsorBlock镜像](https://github.com/mchangrh/sb-mirror)（下载所有内容可能需要相当多的时间）。数据库模式可以在[这里](https://github.com/ajayyy/SponsorBlockServer/blob/master/DatabaseSchema.md)查看，尽管其中大部分对这个项目来说都不会很有用。
- en: As one might expect, their database schema is made for the extension to work
    properly, and not for some guy to basically leech from a huge community effort
    to find what percentage of ads his favorite creator runs. For this, some work
    will need to be done to clean and model the data.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，他们的数据库模式是为了使扩展正常工作而设计的，而不是为了某个家伙从巨大的社区努力中窃取信息，以找出他最喜欢的创作者运行广告的百分比。为此，需要对数据进行一些清理和建模工作。
- en: 'The only two tables that are important for this analysis are:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个分析来说，只有两个表是重要的：
- en: '`sponsorTimes.csv` : This is the most important table, containing the `startTime`
    and `endTime` of all crowdsourced sponsor segments. The CSV is around 5GB.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`sponsorTimes.csv`：这是最重要的表，包含所有众包赞助片段的`startTime`和`endTime`。CSV文件大约有5GB。'
- en: '`videoInfo.csv` : Contains the video title, publication date, and channel ID
    associated with each video.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`videoInfo.csv`：包含每个视频的标题、发布日期和与每个视频关联的频道ID。'
- en: Before we get into it, these are all the libraries I ended up using. I will
    explain the less obvious ones as we go.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入之前，这些都是我最终使用的所有库。随着我们的进行，我会解释那些不太明显的库。
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The first step, then, is to load the data. Surprisingly, this was already a
    bit challenging, as I was getting a lot of errors parsing some rows of the CSV.
    These were the settings I found to work for the majority of the rows:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，第一步是加载数据。令人惊讶的是，这已经有点具有挑战性，因为我解析CSV文件的一些行时遇到了很多错误。这是我找到的大多数行可以正常工作的设置：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Here is what a sample of the data looks like:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是数据样本的示例：
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/52e90ebf31412d799b5326bfec298e0e.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/52e90ebf31412d799b5326bfec298e0e.png)'
- en: Sample of sponsorTimes.csv
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: sponsorTimes.csv样本
- en: '![](../Images/da5bbeb83da8f167eb327e57dfcf9ead.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/da5bbeb83da8f167eb327e57dfcf9ead.png)'
- en: Sample of videoInfo.csv
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: videoInfo.csv样本
- en: Understanding the data in the `sponsorTimes` table is ridiculously important,
    otherwise, the cleaning process won’t make any sense.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 理解`sponsorTimes`表中的数据非常重要，否则清理过程将没有任何意义。
- en: Each row represents a user-submitted timestamp for a sponsored segment. **Since
    multiple users can submit segments for the same video, the dataset contains duplicate
    and potentially incorrect entries**, which will need to be dealt with during cleaning.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 每一行代表一个用户提交的赞助视频的时间戳。**由于多个用户可以为同一视频提交片段，数据集中包含重复和可能不正确的条目**，这些条目在清理过程中需要处理。
- en: To find incorrect segments, I will use the `votes` and the `locked` column,
    as the latter one represents segments that were confirmed to be correct.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 为了找到不正确的片段，我将使用`votes`和`locked`列，因为后者代表已确认正确的片段。
- en: Another important column is the `category`. There are a bunch of categories
    like Intro, Outro, Filler, etc. **For this analysis, I will only work with Sponsor
    and Self-Promo.**
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的列是`category`。有许多类别，如简介、结束语、填充等。**对于这次分析，我将只处理赞助和自我推广。**
- en: 'I started by applying some filters:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先应用了一些过滤器：
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Filtering for locked segments or segments with more than 0 votes was a big
    decision.** This reduced the dataset by a huge percentage, but doing so made the
    data very reliable. For example, before doing this, all of the Top 50 channels
    with the highest percentage of ads were just spam, random channels that ran 99.9%
    of ads.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**过滤锁定片段或拥有超过0票的片段是一个重大的决定**。这大幅减少了数据集的大小，但这样做使得数据非常可靠。例如，在这样做之前，所有广告比例最高的前50个频道都是垃圾邮件，随机频道，播放了99.9%的广告。'
- en: With this done, the next step is to get a dataset where each sponsor segment
    shows up only once. For example, a video with a sponsor segment at the beginning
    and another at the end should have only two rows of data.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 完成这些后，下一步是获取一个数据集，其中每个赞助片段只出现一次。例如，一个在开头和结尾都有赞助片段的视频应该只有两行数据。
- en: This is very much not the case so far, since in one video we can have multiple
    user-submitted entries for each segment. To do this, I will use window functions
    to identify if two or more rows of data represent the same segment.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，情况并非如此，因为在单个视频中，我们可以为每个段落有多个用户提交的条目。为了做到这一点，我将使用窗口函数来识别是否有两个或更多行数据代表同一段落。
- en: The first window function compares the `startTime` of one row with the `endTime`
    of the previous. If these values don’t overlap, it means they are entries for
    separate segments, otherwise they are repeated entries for the same segment.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个窗口函数比较一行中的`startTime`与前一行的`endTime`。如果这些值不重叠，则表示它们是不同段落的条目，否则它们是同一段落的重复条目。
- en: '[PRE4]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/cbce4fba92fece3b40a00b3c83f231fe.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cbce4fba92fece3b40a00b3c83f231fe.png)'
- en: Window Function example for a single video.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 单个视频的窗口函数示例。
- en: The `new_ad_segment` column is TRUE every time a row represents a new segment
    of a video. The first two rows, as their timestamps overlap, are properly marked
    as the same segment.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当一行代表视频的新段落时，`new_ad_segment`列总是为TRUE。前两行，由于它们的时间戳重叠，被正确标记为同一段落。
- en: 'Next up, the second window function will label each ad segment by number:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，第二个窗口函数将按编号标记每个广告段落：
- en: '[PRE5]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/1a0ef9663c1592a6640112afbbc8202c.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1a0ef9663c1592a6640112afbbc8202c.png)'
- en: Example of labels for ad segments for a single video.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 单个视频的广告段落的标签示例。
- en: Finally, now that each segment is properly numbered, it’s easy to get the segment
    that is either locked or has the highest amount of votes.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，现在每个段落都已正确编号，很容易找到被锁定或拥有最高投票数的段落。
- en: '[PRE6]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/c9b0b0c5c49b8beefc136a8721072b84.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c9b0b0c5c49b8beefc136a8721072b84.png)'
- en: Example of what the final dataset looks like for a single video.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 单个视频的最终数据集示例。
- en: That’s it! Now this table has one row for each unique ad segment, and I can
    start exploring the data.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！现在这个表格为每个唯一的广告段落有一行，我可以开始探索数据了。
- en: If these queries feel complicated, and you need a refresher on window functions,
    check out [this blog](https://towardsdatascience.com/understand-sql-window-functions-once-and-for-all-4447824c1cb4/)
    post that will teach you all you need to know about them! The last example covered
    in the blog post is almost exactly the process I used here.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些查询看起来很复杂，并且你需要对窗口函数进行复习，请查看这篇[博客](https://towardsdatascience.com/understand-sql-window-functions-once-and-for-all-4447824c1cb4/)，它将教你所有你需要知道的关于它们的知识！博客中最后讨论的例子几乎就是我这里使用的几乎完全相同的过程。
- en: Exploring and Enhancing the Data
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索和增强数据
- en: 'Finally, the dataset is good enough to start exploring. The first thing I did
    was to get a sense of the size of the data:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，数据集已经足够好，可以开始探索了。我做的第一件事是了解数据的规模：
- en: '**36.0k Unique Channels**'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**36.0k个独特的频道**'
- en: '**552.6k Unique Videos**'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**552.6k个独特的视频**'
- en: '**673.8k Unique Sponsor Segments**, for an average of 1.22 segments per video'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**673.8k个独特的赞助段落**，平均每个视频有1.22个段落'
- en: As mentioned earlier, filtering by segments that were either locked or had at
    least 1 upvote, reduced the dataset massively, by around 80%. But this is the
    price I had to pay to have data that I could work with.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，通过筛选出被锁定或至少有1个赞的段落，数据集大幅减少，大约减少了80%。但这是我为了得到可以工作的数据而必须付出的代价。
- en: 'To check if there is nothing immediately wrong with the data, I gathered the
    channels that have the most amount of videos:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查数据是否没有立即出现错误，我收集了拥有最多视频的频道：
- en: '[PRE7]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/fa2fd2ecc5e8d58d55d3ff4818c9343f.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fa2fd2ecc5e8d58d55d3ff4818c9343f.png)'
- en: The amount of videos per channel looks realistic… But this is terrible to work
    with. I don’t want to go to my browser and look up channel IDs every time I want
    to know the name of a channel.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 每个频道的视频数量看起来很真实……但与它们一起工作真是太糟糕了。我不想每次想知道频道名称时都去浏览器查找频道ID。
- en: To fix this, I created a small script with functions to get these values from
    the YouTube API in Python. I’m using the library `requests_cache` to make sure
    I won’t be repeating API calls and depleting the API limits.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我创建了一个小脚本，其中包含从YouTube API获取这些值的函数。我使用`requests_cache`库来确保我不会重复API调用并耗尽API限制。
- en: '[PRE8]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Besides this, I also created very similar functions to get the country and thumbnail
    of each channel, which will be useful later. If you’re interested in the code,
    check [the GitHub repo](https://github.com/mtrentz/sponsorblock-analysis).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我还创建了非常类似的功能来获取每个频道的国家和缩略图，这将在以后很有用。如果你对代码感兴趣，请查看[GitHub仓库](https://github.com/mtrentz/sponsorblock-analysis)。
- en: On my DuckDB code, I’m now able to register this Python function and call them
    within SQL! I just need to be very careful to always use them on aggregated and
    filtered data, otherwise, I can say bye-bye to my API quota.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的DuckDB代码中，我现在能够注册这个Python函数并在SQL中调用它们！我只需要非常小心地始终在聚合和过滤的数据上使用它们，否则，我可以说再见了我的API配额。
- en: '[PRE9]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/b6b997fd66c6677ccce8c96f72a1ece6.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b6b997fd66c6677ccce8c96f72a1ece6.png)'
- en: Much better! I looked up two channels that I’m familiar with on YouTube for
    a quick sanity check. Linus Tech Tips has a total of 7.2k videos uploaded, with
    2.3k present in this dataset. Gamers Nexus has 3k videos, with 700 in the dataset.
    Looks good enough for me!
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 好多了！我查看了YouTube上我熟悉的两个频道，进行快速合理性检查。Linus Tech Tips共有7.2k个视频上传，其中2.3k包含在这个数据集中。Gamers
    Nexus有3k个视频，其中700个包含在数据集中。对我来说看起来足够好了！
- en: The last thing to do, before moving over to actually answering the question
    I set myself to answer, is to have an idea of the average duration of videos.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在真正回答我设定要回答的问题之前，最后一件事是了解视频的平均时长。
- en: '![](../Images/fcf5fd0e9ed0c227761342580330cd4a.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fcf5fd0e9ed0c227761342580330cd4a.png)'
- en: This matches my expectations, for the most part. I’m still a bit surprised by
    the amount of 20-40-minute videos, as for many years the “meta” was to have videos
    of 10 minutes to maximize YouTube’s own ads.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这在很大程度上符合我的预期。我仍然对20-40分钟视频的数量有点惊讶，因为多年来“元规则”是制作10分钟的视频以最大化YouTube自身的广告。
- en: Also, I thought those buckets of video durations used in the previous graph
    were quite representative of how I think about video lengths, so I will be sticking
    with them for the next sections.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我认为之前图表中使用的视频时长桶相当能代表我对视频长度的看法，所以我会继续使用它们在接下来的部分。
- en: For reference, this is the pandas code used to create those buckets.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 作为参考，这是创建那些桶所使用的pandas代码。
- en: '[PRE10]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Have Sponsor Segments Increased Over the Years?
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 赞助段落是否在过去几年中增加？
- en: The big question. This will prove if I’m being paranoid or not about everyone
    trying to sell me something at all times. I will start, though, by answering a
    simpler question, which is the percentage of sponsors for different video durations.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的问题。这将证明我是否过于担心每个人都在试图随时随地向我推销东西。不过，我会先回答一个更简单的问题，即不同视频时长中赞助商的百分比。
- en: My expectation is that shorter videos have a higher share of their runtime from
    sponsors in comparison to longer videos. Let’s check if this is actually the case.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我的预期是，短视频相比长视频，其运行时间中来自赞助商的部分比例更高。让我们看看这是否确实如此。
- en: '[PRE11]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: To keep the visualization simple, I’m applying similar buckets, but only up
    to 90 minutes.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持可视化简单，我应用了类似的桶，但只到90分钟。
- en: '[PRE12]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![](../Images/d593230279e4ae58713a3899268d8af9.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d593230279e4ae58713a3899268d8af9.png)'
- en: As expected, if you’re watching shorter-form content on YouTube, then around
    10% of it is sponsored! Videos of 12–20 min in duration have 6.5% of sponsors,
    while 20–30 min have only 4.8%.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，如果你在YouTube上观看的是短时长的内容，那么其中大约10%是赞助视频！时长为12-20分钟的视频有6.5%的赞助商，而20-30分钟的视频只有4.8%。
- en: To move forward to the year-by-year analysis I need to join the sponsor times
    with the `videoInfo` table.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进行年度分析，我需要将赞助时间与`videoInfo`表连接起来。
- en: '[PRE13]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Next, let’s just check how many videos we have per year:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看每年有多少视频：
- en: '[PRE14]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/a026e46af2582c8786747baca37438b0.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a026e46af2582c8786747baca37438b0.png)'
- en: Not good, not good at all. I’m not exactly sure why but there are a lot of videos
    that didn’t have the timestamp recorded. It seems that only in 2021 and 2022 videos
    were reliably stored with their published date.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 不太好，一点也不好。我并不完全清楚原因，但有很多视频没有记录时间戳。似乎只有2021年和2022年的视频才可靠地存储了它们的发布日期。
- en: I do have some ideas on how I can improve this dataset with other public data,
    but it’s a very time-consuming process and I will leave this for a future blog
    post. I don’t intend to settle for an answer based on limited data, but for now,
    I will have to make do with what I have.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我确实有一些想法，关于如何使用其他公开数据来改进这个数据集，但这是一个非常耗时的工作，我会把这个留到未来的博客文章中。我不打算满足于基于有限数据的答案，但现在，我必须将就我所拥有的。
- en: I chose to keep the analysis between the years 2018 and 2023, given that those
    years had more data points.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择将分析限制在2018年至2023年之间，因为这些年份有更多的数据点。
- en: '[PRE15]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '![](../Images/2b4fbf294f280e780bcb949fb9b5c94c.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2b4fbf294f280e780bcb949fb9b5c94c.png)'
- en: There is a steep increase in ad percentage, especially from 2020 to 2021, but
    afterward, it plateaus, especially for longer videos. This makes a lot of sense
    since during those years online advertisement grew a lot as people spent more
    and more time at home.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 广告百分比急剧增加，尤其是在2020年到2021年之间，但之后趋于平稳，尤其是在较长的视频中。这在很大程度上是有道理的，因为在那几年里，随着人们在家的时间越来越多，在线广告增长了很多。
- en: For shorter videos, there does seem to be an increase from 2022 to 2023\. But
    as the data is limited, and I don’t have data for 2024, I can’t get a conclusive
    answer to this.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对于较短的视频，从2022年到2023年似乎有所增加。但由于数据有限，我没有2024年的数据，所以我无法得出结论性的答案。
- en: Next up, let’s move into questions that don’t depend on the publishing date,
    this way I can work with a larger portion of the dataset.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们进入不依赖于发布日期的问题，这样我就可以处理更大一部分数据集。
- en: Which Channels Have the Highest Percentage of Sponsor Time Per Video?
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪些频道的视频赞助时间百分比最高？
- en: This is a fun one for me, as I wonder if the channels I actively watch are the
    ones that run the most ads.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我来说很有趣，因为我想知道我积极观看的频道是否是运行最多广告的频道。
- en: 'Continuing from the table created previously, I can easily group the ad and
    video amount by channel:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 从之前创建的表格继续，我可以轻松按频道分组广告和视频数量：
- en: '[PRE16]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: I decided to filter for channels that had at least 30 minutes of videos in the
    data, as a way of eliminating outliers.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定筛选出数据中至少有30分钟视频的频道，作为消除异常值的一种方式。
- en: '[PRE17]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: As quickly mentioned earlier, I also created some functions to get the country
    and thumbnail of channels. This allowed me to create this visualization.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我还创建了一些函数来获取频道的国家和缩略图。这让我能够创建这个可视化。
- en: '![](../Images/6d89ba243de0291b79a6b896db949a0b.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6d89ba243de0291b79a6b896db949a0b.png)'
- en: I’m not sure if this surprised me or not. Some of the channels on this list
    I watch very frequently, especially Gaveta (#31), a Brazilian YouTuber who covers
    movies and film editing.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我不确定这让我感到惊讶与否。我经常观看列表上的一些频道，特别是Gaveta（#31），一位巴西YouTube红人，他涵盖电影和电影剪辑。
- en: I also know that both he and Corridor Crew (#32) do a lot of self-sponsor, promoting
    their own content and products, so maybe this is also the case for other channels!
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我也知道，他和走廊团队（#32）都做了很多自我赞助，推广自己的内容和产品，所以也许其他频道也是这样！
- en: In any case, the data seems good, and the percentages seem to match my manual
    checks and personal experience.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，数据看起来不错，百分比似乎与我的手动检查和个人经验相符。
- en: I would love to know if channels that you watch were present in this list, and
    if it surprised you or not!
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我很想知道你观看的频道是否在这个列表中，以及这让你感到惊讶与否！
- en: If you want to see the Top 150 Creators, [subscribe to my free newsletter](https://mtrentz.substack.com/subscribe),
    as I will be publishing the full list as well as more information about this analysis
    in there!
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想看到前150位创作者，请[订阅我的免费通讯](https://mtrentz.substack.com/subscribe)，因为我会在这里发布完整的列表以及更多关于这次分析的信息！
- en: What is the Density of Sponsor Segments Throughout a Video?
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视频中赞助片段的密度是多少？
- en: Have you ever thought about at which point of the video ads work best? People
    probably just skip sponsor segments placed at the beginning, and just move on
    and close the video for those placed at the end.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有想过视频广告在哪个点效果最好？人们可能只是跳过放在开始处的赞助片段，然后继续观看并关闭视频，对于放在结尾处的也是如此。
- en: From personal experience, I feel that I’m more likely to watch an ad if it plays
    around the middle of a video, but I don’t think this is what creators do in most
    cases.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 从个人经验来看，我觉得如果广告在视频中间播放，我更有可能观看，但我不认为这是创作者在大多数情况下所做的事情。
- en: My goal, then, is to create a heatmap that shows the density of ads during a
    video runtime. Doing this was surprisingly not obvious, and the solution that
    I found was so clever that it kinda blew my mind. Let me show you.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我的目标就是创建一个显示视频播放期间广告密度的热图。做这件事出人意料地并不明显，而我找到的解决方案非常巧妙，几乎让我震惊。让我给你展示一下。
- en: 'This is the data needed for this analysis. One row per ad, with the timestamp
    when each segment starts and ends:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这是进行此分析所需的数据。每行一个广告，包括每个片段开始和结束的时间戳：
- en: '![](../Images/6ccbc639ee98e698cb218bf937b11598.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6ccbc639ee98e698cb218bf937b11598.png)'
- en: The first step is to normalize the intervals, e.g., I don’t care that an ad
    started at 63s, what I want to know is if it started at 1% of the video runtime
    or 50% of the video runtime.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是标准化间隔，例如，我不在乎广告从63秒开始，我想要知道的是它是否在视频运行时间的1%处开始，还是在50%处开始。
- en: '[PRE18]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '![](../Images/4e9516376300277bccce7e6cfaca78e1.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4e9516376300277bccce7e6cfaca78e1.png)'
- en: Great, now all intervals are comparable, but the problem is far from solved.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 很好，现在所有区间都是可比较的，但问题远未解决。
- en: I want you to think, how would you solve this? If I asked you “At 10% runtime
    out of all videos, how many ads are running?”
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你思考，你会如何解决这个问题？如果我问你“在所有视频的10%运行时间处，有多少广告正在播放？”
- en: I do not believe that this is an obvious problem to solve. My first instinct
    was to create a bunch of buckets, and then, for each row, I would ask “Is there
    an ad running at 1% of the runtime? What about at 2%? And so on…”
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我不相信这是一个显而易见的问题。我的第一反应是创建一些桶，然后，对于每一行，我会问“在运行时间的1%处是否有广告正在播放？2%呢？等等……”
- en: This seemed like a terrible idea, though. I wouldn’t be able to do it in SQL,
    and the code to solve it would be incredibly messy. In the end, the implementation
    of the solution I found was remarkably simple, using the Sweep Line Algorithm,
    which is an algorithm that is often used in programming interviews and puzzles.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这听起来是个糟糕的想法。我无法用SQL完成它，解决这个问题的代码将会非常混乱。最终，我找到的解决方案的实现非常简单，使用了Sweep Line Algorithm（扫描线算法），这是一种在编程面试和谜题中经常使用的算法。
- en: I will show you how I solved it but don’t worry if you don’t understand what
    is happening. I will share other resources for you to learn more about it later
    on.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我将向您展示我是如何解决这个问题的，但如果你不理解发生了什么，请不要担心。我将在稍后分享其他资源，让您了解更多相关信息。
- en: The first thing to do is to transform each interval (startTime, endTime) into
    two events, one that will count as +1 when the ad starts, and another that will
    count as -1 when the ad finishes. Afterward, just order the dataset by the “start
    time”.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要做的事情是将每个区间（startTime, endTime）转换为两个事件，一个事件在广告开始时计为+1，另一个事件在广告结束时计为-1。之后，只需按“开始时间”对数据集进行排序。
- en: '[PRE19]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '![](../Images/86ce946a56817406b43d6ebb32408295.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/86ce946a56817406b43d6ebb32408295.png)'
- en: Now it’s already much easier to see the path forward! All I have to do is use
    a running sum on the delta column, and then, at any point of the dataset, I can
    know how many ads are running!
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 现在已经更容易看到前进的道路了！我需要做的就是使用对delta列的累积求和，然后，在数据集的任何一点，我都可以知道正在运行的广告数量！
- en: For example, if from 0s to 10s three ads started, but two of those also finished,
    I would have a delta of +3 and then -2, which means that there is only one ad
    currently running!
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果从0秒到10秒有三次广告开始，但其中两次也结束了，那么delta值将是+3然后-2，这意味着目前只有一个广告正在运行！
- en: Going forward, and to simplify the data a bit, I first round the fractions to
    4 decimal points and aggregate them. This is not necessary, but having too many
    rows was a problem when trying to plot the data. Finally, I divide the amount
    of running ads by the total amount of videos, to have it as a percentage.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，为了简化数据，我首先将分数四舍五入到小数点后四位，然后进行汇总。这并不是必需的，但在尝试绘制数据时，行数过多是个问题。最后，我将正在运行的广告数量除以视频总数，以得到百分比。
- en: '[PRE20]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '![](../Images/cd4e4bb4c145f1c7ed67f4bcdebf1139.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cd4e4bb4c145f1c7ed67f4bcdebf1139.png)'
- en: With this data not only do I know that at the beginning of the videos (0.0%
    fraction), there are 69987 videos running ads, this also represents 17% of all
    videos in the dataset.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些数据，我不仅知道在视频开始时（0.0%的分数）有69987个视频正在播放广告，这也代表了数据集中所有视频的17%。
- en: 'Now I can finally plot it as a heatmap:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我终于可以将其绘制为热图：
- en: '![](../Images/77137159fc84555e251ed31dec2c38ab.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/77137159fc84555e251ed31dec2c38ab.png)'
- en: As expected, the bumps at the extremities show that it’s way more common for
    channels to run ads at the beginning and end of the video. It’s also interesting
    that there is a plateau around the middle of the video, but then a drop, as the
    second half of the video is generally more ad-free.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，两端的小波表明，频道在视频的开始和结束时播放广告的情况更为常见。而且，视频中间部分也有一个平台期，但随后下降，因为视频的后半部分通常广告较少。
- en: What I found funny is that it’s apparently common for some videos to start straight
    away with an ad. I couldn’t picture this, so I manually checked 10 videos and
    it’s actually true… I’m not sure how representative it is, but most of the ones
    that I opened were gaming-related and in Russian, and they started directly with
    ads!
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得有趣的是，一些视频显然会直接开始播放广告。我无法想象这种情况，所以我手动检查了10个视频，结果确实如此……我不确定这有多具代表性，但大多数我打开的视频都与游戏相关，且是俄语，它们直接开始播放广告！
- en: Before we move on to the conclusions, what did you think of the solution to
    this problem? I was surprised at how simple was doing this with the Sweep Line
    trick. If you want to know more about it, I recently published a [blog post](https://towardsdatascience.com/practical-sql-puzzles-that-will-level-up-your-skill/)
    covering some SQL Patterns, and the last one is exactly this problem! Just repackaged
    in the context of counting concurrent meetings.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续到结论之前，你认为这个问题的解决方案如何？我惊讶于使用Sweep Line技巧做这件事是多么简单。如果你想了解更多，我最近发布了一篇[博客文章](https://towardsdatascience.com/practical-sql-puzzles-that-will-level-up-your-skill/)，涵盖了一些SQL模式，最后一个就是这个问题！只是重新包装在计算并发会议的上下文中。
- en: Conclusion
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I really enjoyed doing this analysis since the data feels very personal to me,
    especially because I’ve been addicted to YouTube lately. I also feel that the
    answers I found were quite satisfactory, at least for the most part. To finish
    it off, let’s do a last recap!
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我真的很享受做这个分析，因为数据对我来说非常个人化，尤其是因为我最近沉迷于YouTube。我还觉得我找到的答案相当令人满意，至少大部分是这样。为了结束这个话题，让我们来做最后的回顾！
- en: Have Sponsor Segments Increased Over the Years?
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随着时间的推移，赞助段落是否有所增加？
- en: There was a clear increase from 2020 to 2021\. This was an effect that happened
    throughout all digital media and it’s clearly shown in this data. In more recent
    years, I can’t say whether there was an increase or not, as I don’t have enough
    data to be confident.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 从2020年到2021年有一个明显的增加。这是一个在整个数字媒体中发生的效果，在这份数据中表现得非常明显。在最近几年，我说不出是否有增加，因为我没有足够的数据来有信心地说。
- en: Which Channels Have the Highest Percentage of Sponsor Time Per Video?
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 哪些频道的视频广告比例最高？
- en: I got to create a very convincing list of the Top 50 channels that run the highest
    amount of ads. And I discovered that some of my favorite creators are the ones
    that spend the most amount of time trying to sell me something!
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我成功地创建了一个非常令人信服的列表，列出了运行最多广告的前50个频道。我还发现，我最喜欢的创作者中，有一些花了很多时间试图向我推销东西！
- en: What is the density of sponsor segments throughout a video?
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 视频中赞助段落的密度是多少？
- en: As expected, most people run ads at the beginning and the end of videos. Besides
    this, a lot of creators run ads around the middle of the video, making the second
    half slightly more ad-free.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，大多数人会在视频的开始和结束时运行广告。除此之外，很多创作者会在视频中间运行广告，使得视频的后半部分稍微不那么广告密集。
- en: Also, there are YouTubers who immediately start a video with ads, which I think
    it’s a crazy strategy.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一些YouTube创作者会立即开始播放带有广告的视频，我认为这是一个疯狂的战略。
- en: Other Learnings and Next Steps
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他学习和下一步
- en: I liked how clear the data was in showing the percentage of ads in different
    video sizes. Now I know that I’m probably spending 5–6% of my time on YouTube
    watching ads if I’m not skipping them since I mostly watch videos that are 10–20
    min.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢数据在展示不同视频尺寸中广告百分比时的清晰度。现在我知道，如果我不跳过广告，我可能在YouTube上花费5-6%的时间观看广告，因为我主要观看10-20分钟的视频。
- en: I’m still not fully happy though with the year-by-year analysis. I’ve already
    looked into other data and downloaded more than 100 GB of YouTube metadata datasets.
    I’m confident that I can use it, together with the YouTube API, to fill some gaps
    and get a more convincing answer to my question.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，我对于按年分析仍然不完全满意。我已经查看了其他数据，并下载了超过100GB的YouTube元数据数据集。我确信我可以使用它，结合YouTube
    API，填补一些空白，并得到一个更有说服力的答案来回答我的问题。
- en: Visualization Code
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化代码
- en: You might have noticed that I didn’t provide snippets to plot the charts shown
    here. This was on purpose to make the blog post more readable, as matplotlib code
    occupies a lot of space.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经注意到，我没有提供图表的代码片段。这是故意的，为了使博客文章更易于阅读，因为matplotlib代码占用空间很大。
- en: You can find all the code in [my GitHub repo](https://github.com/mtrentz/sponsorblock-analysis),
    that way you can copy my charts if you want to.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在[我的GitHub仓库](https://github.com/mtrentz/sponsorblock-analysis)中找到所有代码，这样你就可以复制我的图表了。
- en: '* * *'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: That’s it for this one! I really hope you enjoyed reading this blog post and
    learned something new!
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这篇文章的全部内容！我真的希望你喜欢阅读这篇博客文章，并学到了一些新东西！
- en: If you’re curious about interesting topics that didn’t make it into this post,
    or enjoy learning about data, **subscribe to my** [**free newsletter on Substack**](https://mtrentz.substack.com/subscribe).
    I publish whenever I have something genuinely interesting to share.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这个帖子中没有提到的有趣话题感兴趣，或者喜欢学习数据，**请订阅我的** [**Substack上的免费通讯**](https://mtrentz.substack.com/subscribe)。只要我有真正有趣的内容要分享，我就会发布。
- en: Want to connect directly or have questions? **Reach out anytime at** [**mtrentz.com**](https://mtrentz.com/)**.**
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 想要直接联系或有疑问？**随时通过** [**mtrentz.com**](https://mtrentz.com/)**联系**。
