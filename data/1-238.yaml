- en: MCP in Practice
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: MCP实践
- en: 原文：[https://towardsdatascience.com/mcp-in-practice/](https://towardsdatascience.com/mcp-in-practice/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mcp-in-practice/](https://towardsdatascience.com/mcp-in-practice/)
- en: 'Written together with **Ilan Strauss**, **Isobel Moure**, and **Tim O’Reilly**
    as part of the [AI Disclosures Project](https://www.ssrc.org/programs/ai-disclosures-project/).
    Originally published on our blog: [Asimov’s Addendum](https://asimovaddendum.substack.com/p/read-write-act-inside-the-mcp-server).'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 与**Ilan Strauss**、**Isobel Moure**和**Tim O’Reilly**共同撰写，作为[AI披露项目](https://www.ssrc.org/programs/ai-disclosures-project/)的一部分。最初发表在我们的博客上：[Asimov的附录](https://asimovaddendum.substack.com/p/read-write-act-inside-the-mcp-server)。
- en: 1\. <mdspan datatext="el1758912208244" class="mdspan-comment">The Rise and Rise</mdspan>
    of MCP
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1\. <mdspan datatext="el1758912208244" class="mdspan-comment">MCP的兴起与兴起</mdspan>
- en: Anthropic’s [Model Context Protocol](https://www.anthropic.com/news/model-context-protocol) (MCP)
    was released in November 2024 as a way to make tools and platforms model-agnostic.
    MCP works by defining servers and clients. MCP servers are local or remote end
    points where tools and resources are defined. For example, GitHub released an
    MCP server that allows LLMs to both read from and write to GitHub. MCP clients
    are the connection from an AI application to MCP servers—they allow an LLM to
    interact with context and tools from different servers. An example of an MCP client
    is Claude Desktop, which allows the Claude models to interact with thousands of
    MCP servers.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic的[模型上下文协议](https://www.anthropic.com/news/model-context-protocol)（MCP）于2024年11月发布，作为一种使工具和平台模型无关的方法。MCP通过定义服务器和客户端来工作。MCP服务器是定义工具和资源的本地或远程端点。例如，GitHub发布了一个MCP服务器，允许LLM从GitHub读取和写入。MCP客户端是从AI应用程序到MCP服务器的连接——它们允许LLM与来自不同服务器的上下文和工具交互。一个MCP客户端的例子是Claude
    Desktop，它允许Claude模型与数千个MCP服务器交互。
- en: '**In a relatively short time, MCP has become the backbone of hundreds of AI
    pipelines and applications**. Major players like Anthropic and OpenAI have built
    it into their products. Developer tools such as Cursor (a coding-focused text
    editor or IDE) and productivity apps like [Raycast](https://www.raycast.com/EvanZhouDev/mcp) also
    use MCP. Additionally, thousands of [developers](https://arxiv.org/abs/2506.13538) use
    it to integrate AI models and access external tools and data without having to
    build an entire ecosystem from scratch.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**在相对较短的时间内，MCP已经成为了数百个AI管道和应用程序的骨干**。像Anthropic和OpenAI这样的主要玩家已经将其集成到他们的产品中。开发者工具，如Cursor（一个以编码为重点的文本编辑器或IDE），以及生产力应用如[Raycast](https://www.raycast.com/EvanZhouDev/mcp)也使用了MCP。此外，成千上万的[开发者](https://arxiv.org/abs/2506.13538)使用它来集成AI模型和访问外部工具和数据，而无需从头开始构建整个生态系统。'
- en: 'In previous work published with *AI Frontiers*, we argued that [MCP can act](https://ai-frontiers.org/articles/open-protocols-prevent-ai-monopolies) as
    a great unbundler of “context”—the data that helps AI applications provide more
    relevant answers to consumers. In doing so, it can help decentralize AI markets. **We
    argued that, for MCP to truly achieve its goals, it requires support from**:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在与*AI Frontiers*合作发表的前期工作中，我们论证了[MCP可以作为“上下文”的绝佳解包者](https://ai-frontiers.org/articles/open-protocols-prevent-ai-monopolies)，即帮助AI应用程序向消费者提供更相关答案的数据。这样做可以帮助去中心化AI市场。**我们论证，为了MCP真正实现其目标，它需要以下支持**：
- en: '**Open APIs**: So that MCP applications can access third-party tools for agentic
    use (*write* actions) and context (*read*)'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**开放API**：这样MCP应用程序就可以访问第三方工具进行代理使用（*写*操作）和上下文（*读*）'
- en: '**Fluid memory**: Interoperable LLM memory standards, accessed via MCP-like
    open protocols, so that the memory context accrued at OpenAI and other leading
    developers does not get stuck there, preventing downstream innovation'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**流体记忆**：通过类似MCP的开放协议访问的互操作LLM内存标准，这样OpenAI和其他领先开发者积累的记忆上下文就不会被困在那里，从而防止下游创新。'
- en: We expand upon these two points in a [recent policy note](https://ssrc-static.s3.us-east-1.amazonaws.com/Protocols-and-Power-Moure-OReilly-Strauss_SSRC_08272025.pdf),
    for those looking to dig deeper.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在一份[最新政策简报](https://ssrc-static.s3.us-east-1.amazonaws.com/Protocols-and-Power-Moure-OReilly-Strauss_SSRC_08272025.pdf)中进一步阐述了这两点，供那些想要深入了解的人参考。
- en: More generally, **we argue that protocols**,** like MCP**,** are actually **[**foundational
    “rules of the road” for AI markets**](https://asimovaddendum.substack.com/p/disclosures-i-do-not-think-that-word), *whereby
    open disclosure and communication standards are built* *into the network itself*,
    rather than imposed *after the fact* by regulators. Protocols are fundamentally
    market-shaping devices, architecting markets through the permissions, rules, and
    interoperability of the network itself. They can have a big impact on how the
    commercial markets built on top of them function too.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 更普遍地说，**我们认为协议**，**如MCP**，**实际上是**[**AI市场的根本“交通规则”**](https://asimovaddendum.substack.com/p/disclosures-i-do-not-think-that-word)，*其中开放披露和通信标准被构建到网络本身中*，而不是由监管者在事后强加。协议是塑造市场的根本工具，通过网络的权限、规则和互操作性来构建市场。它们对在它们之上构建的商业市场的运作方式也有重大影响。
- en: 1.1 But how is the MCP ecosystem evolving?
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1 但MCP生态系统是如何演变的呢？
- en: '**Yet we don’t have a clear idea of the shape of the MCP ecosystem today**.*What
    are the most common use cases of MCP? What sort of access is being given by MCP
    servers and used by MCP clients? Is the data accessed via MCP “read-only” for
    context, or does it allow agents to “write” and interact with it—for example,
    by editing files or sending emails?*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**然而，我们并没有一个清晰的MCP生态系统当前的形状**。MCP最常见的使用案例是什么？MCP服务器提供的访问类型是什么？MCP客户端使用的通过MCP访问的数据是“只读”的上下文，还是允许代理“写入”并与之交互——例如，通过编辑文件或发送电子邮件？'
- en: To begin answering these questions, we look at the tools and context which AI
    agents use via *MCP servers*. This gives us a clue about what is being built and
    what is getting attention. In this article, we don’t analyze *MCP clients*—the
    applications that use MCP servers. We instead limit our analysis to what MCP servers
    are making available for building.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开始回答这些问题，我们来看看AI代理通过**MCP服务器**使用的工具和上下文。这为我们提供了关于正在构建的内容和受到关注的线索。在这篇文章中，我们不分析**MCP客户端**——使用MCP服务器的应用程序。我们反而将我们的分析限制在MCP服务器为构建提供的内容上。
- en: We assembled a large dataset of MCP servers (n = 2,874), scraped from [Pulse](https://www.pulsemcp.com/). We
    then enriched it with GitHub star-count data on each server. On GitHub, stars
    are similar to Facebook “likes,” and [developers use them](https://homepages.dcc.ufmg.br/~mtov/pub/2018-jss-github-stars.pdf) to
    show appreciation, bookmark projects, or indicate usage.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们收集了一个大型MCP服务器数据集（n = 2,874），这些数据是从[Pulse](https://www.pulsemcp.com/)爬取的。然后我们为每个服务器添加了GitHub星星计数数据。在GitHub上，星星类似于Facebook的“赞”，[开发者使用它们](https://homepages.dcc.ufmg.br/~mtov/pub/2018-jss-github-stars.pdf)来表示赞赏、收藏项目或指示使用。
- en: In practice, *while there were plenty of MCP servers, we found that the top
    few garnered most of the attention and, likely by extension, most of the use.* **Just
    the top 10 servers had nearly half of all GitHub stars given to MCP servers**.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，**尽管有大量的MCP服务器，但我们发现，前几个服务器获得了最多的关注，并且很可能是通过扩展，也获得了最多的使用**。**仅前10个服务器就几乎获得了所有GitHub星星中MCP服务器的近一半**。
- en: '**Some of our takeaways are:**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们的一些见解包括：**'
- en: '*MCP usage appears to be fairly concentrated*. This means that, if left unchecked,
    a small number of servers and (by extension) APIs could have outsize control over
    the MCP ecosystem being created.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**MCP的使用似乎相当集中**。这意味着，如果不受控制，少数服务器和（通过扩展）API可能会对正在创建的MCP生态系统产生不成比例的控制。'
- en: '*MCP use (tools and data being accessed) is dominated by just three categories*:
    Database & Search (RAG), Computer & Web Automation, and Software Engineering.
    Together, they received nearly three-quarters (72.6%) of all stars on GitHub (which
    we proxy for usage).'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**MCP的使用（访问的工具和数据）主要由三个类别主导**：数据库与搜索（RAG）、计算机与网络自动化、以及软件工程。它们共同获得了近四分之三（72.6%）的GitHub星星（我们将其作为使用量的代理）。'
- en: Most MCP servers support both *read *(access context) and *write* (change context)
    operations, showing that developers want their agents to be able to act on context,
    not just consume it.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 大多数MCP服务器都支持**读取**（访问上下文）和**写入**（更改上下文）操作，这表明开发者希望他们的代理能够对上下文进行操作，而不仅仅是消费它。
- en: 2\. Findings
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 发现
- en: '*To start with, we analyzed the MCP ecosystem for concentration risk.*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先，我们分析了MCP生态系统的集中风险**。'
- en: 2.1 MCP server use is concentrated
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 MCP服务器使用集中
- en: '**We found that MCP usage is concentrated among several key MCP servers**, *judged
    by the number of GitHub stars each repo received*.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们发现MCP的使用集中在几个关键的MCP服务器上**，这是根据每个仓库收到的GitHub星星数量来判断的。'
- en: Despite there being thousands of MCP servers, **the top 10 servers make up nearly
    half (45.7%) of all GitHub stars given to MCP servers** (pie chart below) and
    the top 10% of servers make up 88.3% of all GitHub stars (not shown).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在数千个 MCP 服务器，但**前 10 个服务器占据了 GitHub 上所有 MCP 服务器星标的近一半（45.7%）**（下方的饼图所示），而前
    10% 的服务器占据了 88.3% 的所有 GitHub 星标（未显示）。
- en: '![The top 10 servers received 45.7% of all GitHub stars in our dataset of 2,874
    servers.](../Images/546422ff70b2e3f81ed4eb7568bce933.png "Chart")'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![在我们的 2,874 个服务器的数据集中，顶级 10 个服务器获得了 45.7% 的所有 GitHub 星标。](../Images/546422ff70b2e3f81ed4eb7568bce933.png
    "图表")'
- en: '*The top 10 servers received 45.7% of all GitHub stars in our dataset of *2,874* servers.*
    Image Ours.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**在我们的 2,874 个服务器的数据集中，顶级 10 个服务器获得了 45.7% 的所有 GitHub 星标。** 图片版权所有。'
- en: '*This means that the majority of real-world MCP users are likely relying on
    the same few services made available via a handful of APIs*. This concentration
    likely stems from network effects and practical utility: All developers gravitate
    toward servers that solve universal problems like web browsing, database access,
    and integration with widely used platforms like GitHub, Figma, and Blender. This
    concentration pattern seems typical of developer-tool ecosystems. A few well-executed,
    broadly applicable solutions tend to dominate. Meanwhile, more specialized tools
    occupy smaller niches.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**这意味着，大多数现实世界的 MCP 用户可能依赖于通过少数几个 API 提供的相同几个服务**。这种集中化可能源于网络效应和实际效用：所有开发者都会倾向于使用解决像网络浏览、数据库访问以及与
    GitHub、Figma 和 Blender 等广泛使用的平台集成的通用问题的服务器。这种集中化模式似乎在开发者工具生态系统中很典型。一些执行得很好、适用范围广泛的解决方案往往会占据主导地位。与此同时，更多专业化的工具则占据了较小的细分市场。'
- en: 2.2 The top 10 MCP servers really matter
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2 顶级 10 个 MCP 服务器真的很重要
- en: Next, the top 10 MCP servers are shown in the table below, along with their
    star count and what they do.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，下表展示了前 10 个 MCP 服务器，包括它们的星标数量和功能。
- en: '**Among the top 10 MCP servers,** *GitHub,* *Repomix*, *Context7*, and *Framelink* are
    built to assist with software development: *Context7* and *Repomix* by gathering
    context, *GitHub* by allowing agents to interact with projects, and *Framelink *by
    passing on the design specifications from *Figma* directly to the model. The *Blender* server
    allows agents to create 3D models of anything, using the popular open source *Blender* application.
    Finally, *Activepieces* and *MindsDB* connect the agent to multiple APIs with
    one standardized interface: in *MindsDB*’s case, primarily to read data from databases,
    and in *Activepieces* to automate services.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**在顶级 10 个 MCP 服务器中**，*GitHub*、*Repomix*、*Context7* 和 *Framelink* 都旨在协助软件开发：*Context7*
    和 *Repomix* 通过收集上下文，*GitHub* 通过允许代理与项目交互，*Framelink* 通过将来自 *Figma* 的设计规范直接传递给模型。*Blender*
    服务器允许代理使用流行的开源 *Blender* 应用创建任何东西的 3D 模型。最后，*Activepieces* 和 *MindsDB* 通过一个标准化的界面将代理连接到多个
    API：在 *MindsDB* 的情况下，主要是从数据库中读取数据，而在 *Activepieces* 中则是自动化服务。'
- en: '![The top 10 MCP servers with short descriptions, design courtesy of Claude.](../Images/4ba67c9ef6f1a754a7f6b78c0413f133.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![顶级 10 个 MCP 服务器及其简短描述，设计由 Claude 提供。](../Images/4ba67c9ef6f1a754a7f6b78c0413f133.png)'
- en: '*The top 10 MCP servers with short descriptions, design courtesy of Claude.*
    Image Ours.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**顶级 10 个 MCP 服务器及其简短描述，设计由 Claude 提供。** 图片版权所有。'
- en: '**The dominance of agentic browsing**, **in the form of *Browser Use* (61,000
    stars) and *Playwright MCP* (18,425 stars)**,** stands out**. This reflects the
    fundamental need for AI systems to interact with web content. These tools allow
    AI to navigate websites, click buttons, fill out forms, and extract data just
    like a human would. *Agentic browsing has surged*,* even though it’s far less
    token-efficient than calling an API*. Browsing agents often need to wade through
    multiple pages of boilerplate to extract slivers of data a single API request
    could return. Because many services lack usable APIs or tightly gate them, browser-based
    agents are often the simplest—sometimes the only—way to integrate, underscoring
    the limits of today’s APIs.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理浏览的统治地位**，以**浏览器使用**（61,000 个星标）和**Playwright MCP**（18,425 个星标）的形式出现，**格外引人注目**。这反映了人工智能系统与网络内容交互的基本需求。这些工具允许人工智能像人类一样导航网站、点击按钮、填写表格和提取数据。**尽管代理浏览的效率远低于调用
    API**，但其使用量却大幅增加。浏览代理通常需要浏览多页的模板文本才能提取出单个 API 请求就能返回的数据片段。由于许多服务缺乏可用的 API 或严格控制
    API 的访问，基于浏览器的代理通常是——有时是唯一的方式——来集成，这突显了当今 API 的局限性。'
- en: '**Some of the top servers are unofficial. **Both the *Framelink* and *Blender
    MCP* are servers that interact with just a single application, but they are both
    “unofficial” products. This means that they are not officially endorsed by the
    developers of the application they are integrating with—those who own the underlying
    service or API (e.g., GitHub, Slack, Google). Instead, they are built by independent
    developers who create a bridge between an AI client and a service—often by reverse-engineering
    APIs, wrapping unofficial SDKs, or using browser automation to mimic user interactions.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**一些顶级服务器是非官方的。**Framelink和Blender MCP都是仅与单个应用程序交互的服务器，但它们都是“非官方”产品。这意味着它们没有得到它们所集成的应用程序的开发者（即拥有底层服务或API的人，例如GitHub、Slack、Google）的官方认可。相反，它们是由独立开发者构建的，这些开发者创建了一个AI客户端和服务的桥梁——通常是通过逆向工程API、包装非官方SDK或使用浏览器自动化来模拟用户交互。'
- en: It is healthy that third-party developers can build their own MCP servers, since
    this openness encourages innovation. But it also introduces an intermediary layer
    between the user and the API, which brings risks around trust, verification, and
    even potential abuse. With open source local servers, the code is transparent
    and can be vetted. By contrast, remote third-party servers are harder to audit,
    since users must trust code they can’t easily inspect.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 第三方开发者可以构建自己的MCP服务器是件好事，因为这种开放性鼓励创新。但这也引入了用户和API之间的中介层，这带来了关于信任、验证甚至潜在滥用的风险。使用开源本地服务器，代码是透明的，可以被审查。相比之下，远程第三方服务器更难审计，因为用户必须信任他们无法轻易检查的代码。
- en: '**At a deeper level, the repos that currently dominate MCP servers highlight
    three encouraging facts about the MCP ecosystem:**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**在更深的层次上，目前主导MCP服务器的仓库突出了MCP生态系统的三个令人鼓舞的事实：**'
- en: '**First, several prominent MCP servers support multiple third-party services
    for their functionality. ***MindsDB* and *Activepieces* serve as gateways to multiple
    (often competing) service providers through a single server. *MindsDB* allows
    developers to query different databases like PostgreSQL, MongoDB, and MySQL through
    a single interface, while *Taskmaster *allows the agent to delegate tasks to a
    range of AI models from OpenAI, Anthropic, and Google, all without changing servers.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**首先，一些突出的MCP服务器支持多个第三方服务以增强其功能。**MindsDB和Activepieces通过单个服务器充当多个（通常是竞争的）服务提供商的网关。MindsDB允许开发者通过单个界面查询不同的数据库，如PostgreSQL、MongoDB和MySQL，而Taskmaster允许代理将任务委托给来自OpenAI、Anthropic和Google的各种AI模型，而无需更改服务器。'
- en: '**Second, agentic browsing MCP servers are being used to get around potentially
    restrictive APIs.** As noted above, *Browser Use *and *Playwright* access internet
    services through a web browser, helping to bypass API restrictions, but they instead
    run up against anti-bot protections. This circumvents the limitations that APIs
    can impose on what developers are able to build.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**其次，代理浏览MCP服务器被用来绕过可能限制性的API。**如上所述，Browser Use和Playwright通过网页浏览器访问互联网服务，帮助绕过API限制，但它们却遇到了反机器人保护。这绕过了API对开发者能够构建的内容可能施加的限制。'
- en: '**Third, some MCP servers do their processing on the developer’s computer (locally)**,** making
    them less dependent on a vendor maintaining API access**.*Some MCP servers examined
    here can run entirely on a local computer without sending data to the cloud—meaning
    that no gatekeeper has the power to cut you off*. Of the 10 MCP servers examined
    above, only *Framelink*, *Context7,* and *GitHub* rely on just a single cloud-only
    API dependency that can’t be run locally end-to-end on your machine. *Blender* and *Repomix* are
    completely open source and don’t require any internet access to work, while *MindsDB*, *Browser
    Use, *and *Activepieces *have local open source implementations.'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**第三，一些MCP服务器在开发者的计算机上（本地）进行其处理**，**这使得它们对供应商维护API访问的依赖性降低**。这里检查的一些MCP服务器可以在本地计算机上完全运行，无需将数据发送到云端——这意味着没有任何守门人有权切断你的服务。在上面的10个MCP服务器中，只有Framelink、Context7和GitHub依赖于仅适用于云端的单一API依赖项，无法在您的机器上端到端本地运行。Blender和Repomix是完全开源的，无需任何互联网访问即可工作，而MindsDB、Browser
    Use和Activepieces都有本地开源实现。'
- en: 2.3 The three categories that dominate MCP use
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3 主导MCP使用的三个类别
- en: '*Next, we grouped MCP servers into different categories based on their functionality*.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '*接下来，我们将MCP服务器根据其功能分为不同的类别*。'
- en: When we analyzed what types of servers are most popular, we found that three
    dominated: **Computer & Web Automation (24.8%)**,** Software Engineering (24.7%)**,
    and **Database & Search (23.1%)**.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们分析最受欢迎的服务器类型时，我们发现三种类型主导：**计算机与网络自动化（24.8%）**、**软件工程（24.7%）**和**数据库与搜索（23.1%）**。
- en: '![Software engineering, computer and web automation, and database and search
    received 72.6% of all stars given to MCP servers.](../Images/be47484c3a6359ff9e6b4bc9db1e1aef.png
    "Chart")'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![软件工程、计算机和网络自动化、数据库与搜索获得了分配给MCP服务器的所有星星的72.6%。](../Images/be47484c3a6359ff9e6b4bc9db1e1aef.png
    "图表")'
- en: '*Software Engineering, Computer & Web Automation, and Database & Search received
    72.6% of all stars given to MCP servers.* Image Ours.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '*软件工程、计算机与网络自动化和数据库与搜索获得了分配给MCP服务器的所有星星的72.6%。* 图片来源：我们。'
- en: Widespread use of Software Engineering (24.7%) MCP servers aligns with [Anthropic’s
    economic index](https://arxiv.org/abs/2503.04761), which found that an outsize
    portion of AI interactions were related to software development.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 软件工程（24.7%）MCP服务器的广泛应用与[Anthropic的经济指数](https://arxiv.org/abs/2503.04761)相一致，该指数发现，大量的人工智能交互与软件开发相关。
- en: The popularity of both Computer & Web Automation (24.8%) and Database & Search
    (23.1%) also makes sense. Before the advent of MCP, web scraping and database
    search were highly integrated applications across platforms like ChatGPT, Perplexity,
    and Gemini. With MCP, however, users can now access that same search functionality
    and connect their agents to any database with minimal effort. In other words,
    MCP’s [unbundling](https://ai-frontiers.org/articles/open-protocols-prevent-ai-monopolies) effect
    is highly visible here.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机与网络自动化（24.8%）和数据库与搜索（23.1%）的普及也是有道理的。在MCP出现之前，网络爬虫和数据库搜索是ChatGPT、Perplexity和Gemini等平台上的高度集成应用。然而，有了MCP，用户现在可以轻松访问相同的搜索功能，并将他们的代理连接到任何数据库。换句话说，MCP的[解包](https://ai-frontiers.org/articles/open-protocols-prevent-ai-monopolies)效应在这里非常明显。
- en: 2.4 Agents interact with their environments
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4 代理与环境交互
- en: '*Lastly, we analyzed the capabilities of these servers*: Are they allowing
    AI applications just to access data and tools (*read*), or instead do agentic
    operations with them (*write*)?'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '*最后，我们分析了这些服务器的功能：它们是否只是允许人工智能应用程序访问数据和工具（*读取*），或者相反，使用它们进行代理操作（*写入*）？'
- en: '**Across all but two of the MCP server categories looked at, the most popular
    MCP servers supported both *reading* (access context)and *writing* (agentic) operations**—shown
    in turquoise. The prevalence of servers with combined read and write access suggests
    that agents are not being built just to answer questions based on data but also
    to take action and interact with services on a user’s behalf.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**在查看的所有MCP服务器类别中，除了两个之外，最受欢迎的MCP服务器都支持*读取*（访问上下文）和*写入*（代理）操作**——以青色显示。具有读写访问权限的服务器普遍存在，这表明代理不仅仅是为了根据数据回答问题而构建，而是为了代表用户采取行动和与服务交互。'
- en: '![Showing MCP servers by category. Dotted red line at 10,000 stars (likes).
    The most popular servers support both read and write operations by agents. In
    contrast, almost no servers support just write operations.](../Images/6f37cd9e082b772279b6332206be91f0.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![按类别显示MCP服务器。10,000颗星（点赞）处的虚线红色线。最受欢迎的服务器支持代理的读写操作。相比之下，几乎没有服务器只支持写操作。](../Images/6f37cd9e082b772279b6332206be91f0.png)'
- en: '*Showing MCP servers by category. Dotted red line at 10,000 stars (likes).
    The most popular servers support both read and write operations by agents. In
    contrast, almost no servers support just write operations.* Image Ours.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*按类别显示MCP服务器。10,000颗星（点赞）处的虚线红色线。最受欢迎的服务器支持代理的读写操作。相比之下，几乎没有服务器只支持写操作。* 图片来源：我们。'
- en: The two exceptions are Database & Search (RAG) and Finance MCP servers, in which *read-only* access
    is a common permission given. This is likely because data integrity is critical
    to ensuring reliability.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 两个例外是数据库与搜索（RAG）和金融MCP服务器，在这些服务器中，*只读*访问是一种常见的权限。这很可能是由于数据完整性对于确保可靠性至关重要。
- en: 3\. The Importance of Multiple Access Points
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 多个访问点的意义
- en: A few implications of our analysis can be drawn out at this preliminary stage.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个初步阶段，我们可以从我们的分析中得出一些启示。
- en: '**First, concentrated MCP server use compounds the risks of API access being
    restricted**. As we discussed in “[Protocols and Power](https://asimovaddendum.substack.com/p/protocols-and-power),”
    MCP remains constrained by “*what a particular service (such as GitHub or Slack)
    happens to expose through its API*.” A few powerful digital service providers
    have the power to shut down access to their servers.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先，集中使用MCP服务器会加剧API访问受限的风险**。正如我们在“[协议与权力](https://asimovaddendum.substack.com/p/protocols-and-power)”中讨论的那样，MCP仍然受到“*特定服务（如GitHub或Slack）通过其API暴露的内容*”的限制。一些强大的数字服务提供商有权关闭对其服务器的访问。'
- en: '*One important hedge against API gatekeeping is that many of the top servers
    try not to rely on a single provide*r. **In addition**,** the following two safeguards
    are relevant**:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '*一种重要的防范API审查的措施是，许多顶级服务器尽量避免依赖单一供应商*。**此外**，**以下两项安全措施也相关**：'
- en: '**They offer local processing** of data on a user’s machine whenever possible,
    instead of sending the data for processing to a third-party server. Local processing
    ensures that functionality cannot be restricted.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它们在可能的情况下提供本地数据处理**，而不是将数据发送到第三方服务器进行处理。本地处理确保功能无法被限制。'
- en: If running a service locally is not possible (e.g., email or web search), the
    server should still **support multiple avenues of getting at the needed context
    through competing APIs**. For example, *MindsDB* functions as a gateway to multiple
    data sources, so instead of relying on just one database to read and write data,
    it goes to great lengths to support multiple databases in one unified interface,
    essentially making the backend tools interchangeable.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果在本地运行服务不可行（例如，电子邮件或网络搜索），服务器仍然应该**支持通过竞争性API获取所需上下文的多种途径**。例如，*MindsDB*充当多个数据源的网关，因此它不依赖于单一数据库来读取和写入数据，而是尽力在一个统一的界面中支持多个数据库，本质上使后端工具可互换。
- en: '**Second, our analysis points to the fact that current restrictive API access
    policies are not sustainable. **Web scraping and bots, accessed via MCP servers,
    are probably being used (at least in part) to circumvent overly restrictive API
    access, complicating the [increasingly common](https://slate.com/technology/2025/08/uk-online-safety-act-reddit-wikipedia-open-internet.html) practice
    of banning bots. Even OpenAI is coloring outside the API lines, using a third-party
    service to access Google Search’s results through web scraping, thereby [circumventing
    its restrictive API](https://www.theinformation.com/articles/openai-challenging-google-using-search-data).'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**其次，我们的分析指出，当前的严格API访问政策是不可持续的**。通过MCP服务器访问的网页抓取和机器人（至少部分）可能被用来规避过于严格的API访问，从而复杂化了越来越常见的禁止机器人的做法。甚至OpenAI也在API线外行动，通过第三方服务使用网页抓取来访问谷歌搜索的结果，从而**规避其限制性的API**（[参见](https://www.theinformation.com/articles/openai-challenging-google-using-search-data)）。'
- en: '**Expanding structured API access in a meaningful way is vital**. *This ensures
    that legitimate AI automation runs through stable, documented end points.* Otherwise,
    developers resort to brittle browser automation where privacy and authorization
    have not been properly addressed. Regulatory guidance [could push](https://ai-frontiers.org/articles/open-protocols-prevent-ai-monopolies) the
    market in this direction, as with open banking in the US.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**以有意义的方式扩展结构化API访问至关重要**。*这确保了合法的AI自动化可以通过稳定、文档化的端点运行*。否则，开发者会求助于脆弱的浏览器自动化，其中隐私和授权没有得到妥善处理。监管指导[可能推动](https://ai-frontiers.org/articles/open-protocols-prevent-ai-monopolies)市场向这一方向发展，就像美国的开放银行一样。'
- en: '**Finally, encouraging greater transparency and disclosure **could help identify
    where the bottlenecks in the MCP ecosystem are.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**最后，鼓励更大的透明度和披露**可能有助于确定MCP生态系统中瓶颈所在。'
- en: Developers operating popular MCP servers (above a certain usage threshold) or
    providing APIs used by top servers should report usage statistics, access denials,
    and rate-limiting policies. This data would help regulators identify emerging
    bottlenecks before they become entrenched. *GitHub might facilitate this by encouraging
    these disclosures, for example*.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营流行MCP服务器（超过一定使用阈值）或提供顶级服务器使用的API的开发者应报告使用统计、访问拒绝和速率限制策略。这些数据将帮助监管者识别在成为根深蒂固之前的新兴瓶颈。*例如，GitHub可以通过鼓励这些披露来促进这一点*。
- en: Additionally, MCP servers above certain usage thresholds should clearly list
    their dependencies on external APIs and what fallback options exist if the primary
    APIs become unavailable. This is not only helpful in determining the market structure,
    but also essential information for security and robustness for downstream applications.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，超过一定使用阈值的MCP服务器应明确列出其对外部API的依赖，以及如果主API不可用时的回退选项。这不仅有助于确定市场结构，而且对于下游应用的安全性和鲁棒性也是关键信息。
- en: The goal is not to eliminate all concentration in the network but to ensure
    that the MCP ecosystem remains contestable, with multiple viable paths for innovation
    and user choice. By addressing both technical architecture and market dynamics,
    these suggested tweaks could help MCP achieve its potential as a democratizing
    force in AI development, rather than merely shifting bottlenecks from one layer
    to another.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 目标不是消除网络中的所有集中，而是确保MCP生态系统保持可竞争性，有多个可行的创新路径和用户选择。通过解决技术架构和市场动态，这些建议的调整可以帮助MCP实现其在AI发展中作为民主化力量的潜力，而不仅仅是将瓶颈从一层转移到另一层。
- en: '* * *'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Appendix
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 附录
- en: Dataset
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: For this analysis, we categorized MCP servers found on [PulseMCP.com](http://PulseMCP.com)
    into one of 15 categories using GPT-5 mini. We then human-reviewed and edited
    the top 50 servers that make up around 70% of the total star count in our dataset.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这次分析，我们使用GPT-5 mini将[PulseMCP.com](http://PulseMCP.com)上发现的MCP服务器分为15个类别之一。然后我们对构成数据集中约70%总星标数的顶级50个服务器进行了人工审查和编辑。
- en: 'The full dataset, along with descriptions of the categories, can be found here
    (constructed by Sruly Rosenblat):'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 完整数据集以及类别的描述可以在这里找到（由Sruly Rosenblat构建）：
- en: '[https://huggingface.co/datasets/sruly/MCP-In-Practice](https://huggingface.co/datasets/sruly/MCP-In-Practice)'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://huggingface.co/datasets/sruly/MCP-In-Practice](https://huggingface.co/datasets/sruly/MCP-In-Practice)'
- en: Limitations
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 局限性
- en: 'There are a few limitations to our preliminary research:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们初步研究有一些局限性：
- en: GitHub stars aren’t a measure of download counts or even necessarily a repo’s
    popularity.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub的星标并不是下载次数的衡量标准，甚至不一定能反映仓库的流行程度。
- en: Only the name and description were used when categorizing repos with the LLM.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在使用LLM对仓库进行分类时，只使用了名称和描述。
- en: Categorization was subject to both human and AI errors and many servers would
    likely fit into multiple categories.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类受到人类和AI错误的限制，许多服务器可能适合多个类别。
- en: We only used the PulseMCP list for our dataset; other lists had different servers
    (e.g., Browser Use isn’t on mcpmarket.com).
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们只使用了PulseMCP列表作为我们的数据集；其他列表有不同的服务器（例如，Browser Use不在mcpmarket.com上）。
- en: We excluded some repos from our analysis, such as those that had multiple servers
    per code repository and those we weren’t able to fetch the star count for. We
    also only looked at servers listed on PulseMCP. Our server list is non exhaustive.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们排除了一些仓库的分析，例如那些每个代码仓库有多个服务器以及我们无法获取星标数的仓库。我们还只看了PulseMCP上列出的服务器。我们的服务器列表并不全面。
- en: MCP Server Use Over Time
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MCP服务器使用情况随时间变化
- en: '![The growth of the top nine repos’ star count over time from MCP’s launch
    date on November 25, 2024, until September 2025\. NOTE: We were only able to track
    the Browser-Use’s repo until 40,000 stars; hence the flat line for its graph.
    In reality, roughly 21,000 stars were added over the next few months (the other
    graphs in this blog are properly adjusted).](../Images/98862fa6f07fda9c65a91eed90581954.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![从MCP于2024年11月25日启动至2025年9月期间，前九个仓库的星标数量随时间增长。注意：我们只能追踪到Browser-Use的仓库有40,000颗星；因此其图表呈现为水平线。实际上，在接下来的几个月里大约增加了21,000颗星（本博客中的其他图表已适当调整）](../Images/98862fa6f07fda9c65a91eed90581954.png)'
- en: '*The growth of the top nine repos’ star count over time from MCP’s launch date
    on November 25, 2024, until September 2025.*'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '*从MCP于2024年11月25日启动至2025年9月期间，前九个仓库的星标数量随时间增长。*'
- en: '*Note: We were only able to track Browser Use’s repo until 40,000 stars; hence
    the flat line for its graph. In reality, roughly 21,000 stars were added over
    the next few months. (The other graphs in this post are properly adjusted.)*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：我们只能追踪到Browser Use的仓库有40,000颗星；因此其图表呈现为水平线。实际上，在接下来的几个月里大约增加了21,000颗星。（本博客中的其他图表已适当调整。）*'
